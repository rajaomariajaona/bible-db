document_id: EXO.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Moses and the Burning Bush
  - type: text
    content: One day Moses was tending the flock of his father-in-law, Jethro,
  - type: note
    content: Moses’ father-in-law went by two names, Jethro and Reuel.
  - type: text
    content: ' the priest of Midian. He led the flock far into the wilderness and came to Sinai,'
  - type: note
    content: Hebrew Horeb, another name for Sinai.
  - type: text
    content: ' the mountain of God. '
  '10':
  - type: text
    content: Now go, for I am sending you to Pharaoh. You must lead my people Israel out of Egypt.”
  '11':
  - type: text
    content: But Moses protested to God, “Who am I to appear before Pharaoh? Who am I to lead the people of Israel out of Egypt?”
  '12':
  - type: text
    content: 'God answered, “I will be with you. And this is your sign that I am the one who has sent you: When you have brought the people out of Egypt, you will worship God at this very mountain.”'
  '13':
  - type: text
    content: But Moses protested, “If I go to the people of Israel and tell them, ‘The God of your ancestors has sent me to you,’ they will ask me, ‘What is his name?’ Then what should I tell them?”
  '14':
  - type: text
    content: God replied to Moses, “
  - type: text
    content: I Am Who I Am
  - type: text
    content: .
  - type: note
    content: Or I Will Be What I Will Be.
  - type: text
    content: ' Say this to the people of Israel: '
  - type: text
    content: I Am
  - type: text
    content: ' has sent me to you.” '
  '15':
  - type: text
    content: 'God also said to Moses, “Say this to the people of Israel: Yahweh,'
  - type: note
    content: Yahweh (also in 3:16) is a transliteration of the proper name YHWH that is sometimes rendered “Jehovah”; in this translation it is usually rendered “the Lord” (note the use of small capitals).
  - type: text
    content: ' the God of your ancestors—the God of Abraham, the God of Isaac, and the God of Jacob—has sent me to you.'
  - type: text
    content: This is my eternal name,
  - type: text
    content: my name to remember for all generations.
  '16':
  - type: text
    content: '“Now go and call together all the elders of Israel. Tell them, ‘Yahweh, the God of your ancestors—the God of Abraham, Isaac, and Jacob—has appeared to me. He told me, “I have been watching closely, and I see how the Egyptians are treating you. '
  '17':
  - type: text
    content: I have promised to rescue you from your oppression in Egypt. I will lead you to a land flowing with milk and honey—the land where the Canaanites, Hittites, Amorites, Perizzites, Hivites, and Jebusites now live.”’
  '18':
  - type: text
    content: '“The elders of Israel will accept your message. Then you and the elders must go to the king of Egypt and tell him, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of the Hebrews, has met with us. So please let us take a three-day journey into the wilderness to offer sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: ', our God.’'
  '19':
  - type: text
    content: “But I know that the king of Egypt will not let you go unless a mighty hand forces him.
  - type: note
    content: As in Greek and Latin versions; Hebrew reads will not let you go, not by a mighty hand.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'There the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to him in a blazing fire from the middle of a bush. Moses stared in amazement. Though the bush was engulfed in flames, it didn’t burn up. '
  '20':
  - type: text
    content: 'So I will raise my hand and strike the Egyptians, performing all kinds of miracles among them. Then at last he will let you go. '
  '21':
  - type: text
    content: 'And I will cause the Egyptians to look favorably on you. They will give you gifts when you go so you will not leave empty-handed. '
  '22':
  - type: text
    content: Every Israelite woman will ask for articles of silver and gold and fine clothing from her Egyptian neighbors and from the foreign women in their houses. You will dress your sons and daughters with these, stripping the Egyptians of their wealth.”
  '3':
  - type: text
    content: “This is amazing,” Moses said to himself. “Why isn’t that bush burning up? I must go see it.”
  '4':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' saw Moses coming to take a closer look, God called to him from the middle of the bush, “Moses! Moses!”'
  - type: text
    content: “Here I am!” Moses replied.
  '5':
  - type: text
    content: '“Do not come any closer,” the '
  - type: text
    content: Lord
  - type: text
    content: ' warned. “Take off your sandals, for you are standing on holy ground. '
  '6':
  - type: text
    content: I am the God of your father
  - type: note
    content: Greek version reads your fathers.
  - type: text
    content: —the God of Abraham, the God of Isaac, and the God of Jacob.” When Moses heard this, he covered his face because he was afraid to look at God.
  '7':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' told him, “I have certainly seen the oppression of my people in Egypt. I have heard their cries of distress because of their harsh slave drivers. Yes, I am aware of their suffering. '
  '8':
  - type: text
    content: 'So I have come down to rescue them from the power of the Egyptians and lead them out of Egypt into their own fertile and spacious land. It is a land flowing with milk and honey—the land where the Canaanites, Hittites, Amorites, Perizzites, Hivites, and Jebusites now live. '
  '9':
  - type: text
    content: 'Look! The cry of the people of Israel has reached me, and I have seen how harshly the Egyptians abuse them. '
