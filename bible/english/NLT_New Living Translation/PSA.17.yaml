document_id: PSA.17,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A prayer of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', hear my plea for justice.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Listen to my cry for help.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pay attention to my prayer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for it comes from honest lips.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are without pity.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Listen to their boasting!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They track me down and surround me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: watching for the chance to throw me to the ground.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are like hungry lions, eager to tear me apart—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like young lions hiding in ambush.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Arise, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Stand against them, and bring them to their knees!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rescue me from the wicked with your sword!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'By the power of your hand, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: destroy those who look to this world for their reward.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But satisfy the hunger of your treasured ones.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May their children have plenty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaving an inheritance for their descendants.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because I am righteous, I will see you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When I awake, I will see you face to face and be satisfied.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Declare me innocent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you see those who do right.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have tested my thoughts and examined my heart in the night.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have scrutinized me and found nothing wrong.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am determined not to sin in what I say.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have followed your commands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which keep me from following cruel and evil people.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My steps have stayed on your path;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have not wavered from following you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am praying to you because I know you will answer, O God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Bend down and listen as I pray.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Show me your unfailing love in wonderful ways.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By your mighty power you rescue
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who seek refuge from their enemies.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guard me as you would guard your own eyes.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: as the pupil of your eye.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hide me in the shadow of your wings.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protect me from wicked people who attack me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from murderous enemies who surround me.
