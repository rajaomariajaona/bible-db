document_id: PSA.17,116
type_code: eng
verses:
  '1':
  - type: text
    content: A prayer of David.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', hear my plea for justice.'
  - type: text
    content: Listen to my cry for help.
  - type: text
    content: Pay attention to my prayer,
  - type: text
    content: for it comes from honest lips.
  '10':
  - type: text
    content: They are without pity.
  - type: text
    content: Listen to their boasting!
  '11':
  - type: text
    content: They track me down and surround me,
  - type: text
    content: watching for the chance to throw me to the ground.
  '12':
  - type: text
    content: They are like hungry lions, eager to tear me apart—
  - type: text
    content: like young lions hiding in ambush.
  '13':
  - type: text
    content: 'Arise, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Stand against them, and bring them to their knees!
  - type: text
    content: Rescue me from the wicked with your sword!
  '14':
  - type: text
    content: 'By the power of your hand, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: destroy those who look to this world for their reward.
  - type: text
    content: But satisfy the hunger of your treasured ones.
  - type: text
    content: May their children have plenty,
  - type: text
    content: leaving an inheritance for their descendants.
  '15':
  - type: text
    content: Because I am righteous, I will see you.
  - type: text
    content: When I awake, I will see you face to face and be satisfied.
  '2':
  - type: text
    content: Declare me innocent,
  - type: text
    content: for you see those who do right.
  '3':
  - type: text
    content: You have tested my thoughts and examined my heart in the night.
  - type: text
    content: You have scrutinized me and found nothing wrong.
  - type: text
    content: I am determined not to sin in what I say.
  '4':
  - type: text
    content: I have followed your commands,
  - type: text
    content: which keep me from following cruel and evil people.
  '5':
  - type: text
    content: My steps have stayed on your path;
  - type: text
    content: I have not wavered from following you.
  '6':
  - type: text
    content: I am praying to you because I know you will answer, O God.
  - type: text
    content: Bend down and listen as I pray.
  '7':
  - type: text
    content: Show me your unfailing love in wonderful ways.
  - type: text
    content: By your mighty power you rescue
  - type: text
    content: those who seek refuge from their enemies.
  '8':
  - type: text
    content: Guard me as you would guard your own eyes.
  - type: note
    content: Hebrew as the pupil of your eye.
  - type: text
    content: Hide me in the shadow of your wings.
  '9':
  - type: text
    content: Protect me from wicked people who attack me,
  - type: text
    content: from murderous enemies who surround me.
