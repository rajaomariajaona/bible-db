document_id: 1KI.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon Asks for Wisdom
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Solomon made an alliance with Pharaoh, the king of Egypt, and married one of his daughters. He brought her to live in the City of David until he could finish building his palace and the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and the wall around the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'At that time the people of Israel sacrificed their offerings at local places of worship, for a temple honoring the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had not yet been built.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Solomon loved the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and followed all the decrees of his father, David, except that Solomon, too, offered sacrifices and burned incense at the local places of worship. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The most important of these places of worship was at Gibeon, so the king went there and sacrificed 1,000 burnt offerings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'That night the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' appeared to Solomon in a dream, and God said, “What do you want? Ask, and I will give it to you!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Solomon replied, “You showed great and faithful love to your servant my father, David, because he was honest and true and faithful to you. And you have continued to show this great and faithful love to him today by giving him a son to sit on his throne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Now, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God, you have made me king instead of my father, David, but I am like a little child who doesn’t know his way around. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And here I am in the midst of your own chosen people, a nation so great and numerous they cannot be counted! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Give me an understanding heart so that I can govern your people well and know the difference between right and wrong. For who by himself is able to govern this great people of yours?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The Lord was pleased that Solomon had asked for wisdom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So God replied, “Because you have asked for wisdom in governing my people with justice and have not asked for a long life or wealth or the death of your enemies— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I will give you what you asked for! I will give you a wise and understanding heart such as no one else has had or ever will have! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And I will also give you what you did not ask for—riches and fame! No other king in all the world will be compared to you for the rest of your life! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And if you follow me and obey my decrees and my commands as your father, David, did, I will give you a long life.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then Solomon woke up and realized it had been a dream. He returned to Jerusalem and stood before the Ark of the Lord’s Covenant, where he sacrificed burnt offerings and peace offerings. Then he invited all his officials to a great banquet.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon Judges Wisely
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Some time later two prostitutes came to the king to have an argument settled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Please, my lord,” one of them began, “this woman and I live in the same house. I gave birth to a baby while she was with me in the house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Three days later this woman also had a baby. We were alone; there were only two of us in the house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“But her baby died during the night when she rolled over on it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then she got up in the night and took my son from beside me while I was asleep. She laid her dead child in my arms and took mine to sleep beside her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And in the morning when I tried to nurse my son, he was dead! But when I looked more closely in the morning light, I saw that it wasn’t my son at all.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then the other woman interrupted, “It certainly was your son, and the living child is mine.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “No,” the first woman said, “the living child is mine, and the dead one is yours.” And so they argued back and forth before the king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then the king said, “Let’s get the facts straight. Both of you claim the living child is yours, and each says that the dead one belongs to the other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: All right, bring me a sword.” So a sword was brought to the king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then he said, “Cut the living child in two, and give half to one woman and half to the other!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then the woman who was the real mother of the living child, and who loved him very much, cried out, “Oh no, my lord! Give her the child—please do not kill him!”
- type: usfm
  marker: p
  children:
  - type: text
    text: But the other woman said, “All right, he will be neither yours nor mine; divide him between us!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then the king said, “Do not kill the child, but give him to the woman who wants him to live, for she is his mother!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: When all Israel heard the king’s decision, the people were in awe of the king, for they saw the wisdom God had given him for rendering justice.
