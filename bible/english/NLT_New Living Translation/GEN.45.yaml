document_id: GEN.45
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph Reveals His Identity
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joseph could stand it no longer. There were many people in the room, and he said to his attendants, “Out, all of you!” So he was alone with his brothers when he told them who he was. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Then he broke down and wept. He wept so loudly the Egyptians could hear him, and word of it quickly carried to Pharaoh’s palace.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“I am Joseph!” he said to his brothers. “Is my father still alive?” But his brothers were speechless! They were stunned to realize that Joseph was standing there in front of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“Please, come closer,” he said to them. So they came closer. And he said again, “I am Joseph, your brother, whom you sold into slavery in Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But don’t be upset, and don’t be angry with yourselves for selling me to this place. It was God who sent me here ahead of you to preserve your lives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'This famine that has ravaged the land for two years will last five more years, and there will be neither plowing nor harvesting. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: God has sent me ahead of you to keep you and your families alive and to preserve many survivors.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'and to save you with an extraordinary rescue. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So it was God who sent me here, not you! And he is the one who made me an adviser
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a father.
    marker-yv: yv-n
  - type: text
    text: ' to Pharaoh—the manager of his entire palace and the governor of all Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Now hurry back to my father and tell him, ‘This is what your son Joseph says: God has made me master over all the land of Egypt. So come down to me immediately! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'You can live in the region of Goshen, where you can be near me with all your children and grandchildren, your flocks and herds, and everything you own. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I will take care of you there, for there are still five years of famine ahead of us. Otherwise you, your household, and all your animals will starve.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then Joseph added, “Look! You can see for yourselves, and so can my brother Benjamin, that I really am Joseph! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Go tell my father of my honored position here in Egypt. Describe for him everything you have seen, and then bring my father here quickly.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Weeping with joy, he embraced Benjamin, and Benjamin did the same. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then Joseph kissed each of his brothers and wept over them, and after that they began talking freely with him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pharaoh Invites Jacob to Egypt
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The news soon reached Pharaoh’s palace: “Joseph’s brothers have arrived!” Pharaoh and his officials were all delighted to hear this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Pharaoh said to Joseph, “Tell your brothers, ‘This is what you must do: Load your pack animals, and hurry back to the land of Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then get your father and all of your families, and return here to me. I will give you the very best land in Egypt, and you will eat from the best that the land produces.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Pharaoh said to Joseph, “Tell your brothers, ‘Take wagons from the land of Egypt to carry your little children and your wives, and bring your father here. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Don’t worry about your personal belongings, for the best of all the land of Egypt is yours.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So the sons of Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Israel; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 45:28. See note on 35:21.
    marker-yv: yv-n
  - type: text
    text: ' did as they were told. Joseph provided them with wagons, as Pharaoh had commanded, and he gave them supplies for the journey. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And he gave each of them new clothes—but to Benjamin he gave five changes of clothes and 300 pieces
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '300 [shekels], '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 7.5 pounds or 3.4 kilograms in weight.
    marker-yv: yv-n
  - type: text
    text: ' of silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He also sent his father ten male donkeys loaded with the finest products of Egypt, and ten female donkeys loaded with grain and bread and other supplies he would need on his journey.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So Joseph sent his brothers off, and as they left, he called after them, “Don’t quarrel about all this along the way!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: And they left Egypt and returned to their father, Jacob, in the land of Canaan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“Joseph is still alive!” they told him. “And he is governor of all the land of Egypt!” Jacob was stunned at the news—he couldn’t believe it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But when they repeated to Jacob everything Joseph had told them, and when he saw the wagons Joseph had sent to carry him, their father’s spirits revived.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then Jacob exclaimed, “It must be true! My son Joseph is alive! I must go and see him before I die.”
