document_id: NUM.24
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'By now Balaam realized that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was determined to bless Israel, so he did not resort to divination as before. Instead, he turned and looked out toward the wilderness, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'where he saw the people of Israel camped, tribe by tribe. Then the Spirit of God came upon him, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and this is the message he delivered:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “This is the message of Balaam son of Beor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the message of the man whose eyes see clearly,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: the message of one who hears the words of God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who sees a vision from the Almighty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'who bows down with eyes wide open:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: How beautiful are your tents, O Jacob;
- type: usfm
  marker: q2
  children:
  - type: text
    text: how lovely are your homes, O Israel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They spread before me like palm groves,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: like a majestic valley.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: like gardens by the riverside.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They are like tall trees planted by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: like cedars beside the waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Water will flow from their buckets;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their offspring have all they need.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their king will be greater than Agag;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their kingdom will be exalted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: God brought them out of Egypt;
- type: usfm
  marker: q2
  children:
  - type: text
    text: for them he is as strong as a wild ox.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He devours all the nations that oppose him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: breaking their bones in pieces,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shooting them with arrows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Like a lion, Israel crouches and lies down;
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a lioness, who dares to arouse her?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blessed is everyone who blesses you, O Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cursed is everyone who curses you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'King Balak flew into a rage against Balaam. He angrily clapped his hands and shouted, “I called you to curse my enemies! Instead, you have blessed them three times. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now get out of here! Go back home! I promised to reward you richly, but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has kept you from your reward.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Balaam told Balak, “Don’t you remember what I told your messengers? I said, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '‘Even if Balak were to give me his palace filled with silver and gold, I would be powerless to do anything against the will of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '.’ I told you that I could say only what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Now I am returning to my own people. But first let me tell you what the Israelites will do to your people in the future.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Balaam’s Final Messages
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'This is the message Balaam delivered:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “This is the message of Balaam son of Beor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the message of the man whose eyes see clearly,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: the message of one who hears the words of God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who has knowledge from the Most High,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who sees a vision from the Almighty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'who bows down with eyes wide open:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I see him, but not here and now.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I perceive him, but far in the distant future.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A star will rise from Jacob;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a scepter will emerge from Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will crush the heads of Moab’s people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: cracking the skulls
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As in Samaritan Pentateuch; the meaning of the Hebrew word is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' of the people of Sheth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Edom will be taken over,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Seir, its enemy, will be conquered,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while Israel marches on in triumph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A ruler will rise in Jacob
- type: usfm
  marker: q2
  children:
  - type: text
    text: who will destroy the survivors of Ir.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Balaam looked over toward the people of Amalek and delivered this message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Amalek was the greatest of nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but its destiny is destruction!”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then he looked over toward the Kenites and delivered this message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Your home is secure;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your nest is set in the rocks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But the Kenites will be destroyed
- type: usfm
  marker: q2
  children:
  - type: text
    text: when Assyria
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Asshur; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 24:24.
    marker-yv: yv-n
  - type: text
    text: ' takes you captive.”'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Balaam concluded his messages by saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Alas, who can survive
- type: usfm
  marker: q2
  children:
  - type: text
    text: unless God has willed it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ships will come from the coasts of Cyprus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Kittim.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will oppress Assyria and afflict Eber,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they, too, will be utterly destroyed.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then Balaam left and returned home, and Balak also went on his way.
