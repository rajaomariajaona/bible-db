document_id: NUM.24,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'By now Balaam realized that the '
  - type: text
    content: Lord
  - type: text
    content: ' was determined to bless Israel, so he did not resort to divination as before. Instead, he turned and looked out toward the wilderness, '
  '10':
  - type: text
    content: 'King Balak flew into a rage against Balaam. He angrily clapped his hands and shouted, “I called you to curse my enemies! Instead, you have blessed them three times. '
  '11':
  - type: text
    content: 'Now get out of here! Go back home! I promised to reward you richly, but the '
  - type: text
    content: Lord
  - type: text
    content: ' has kept you from your reward.”'
  '12':
  - type: text
    content: 'Balaam told Balak, “Don’t you remember what I told your messengers? I said, '
  '13':
  - type: text
    content: '‘Even if Balak were to give me his palace filled with silver and gold, I would be powerless to do anything against the will of the '
  - type: text
    content: Lord
  - type: text
    content: '.’ I told you that I could say only what the '
  - type: text
    content: Lord
  - type: text
    content: ' says! '
  '14':
  - type: text
    content: Now I am returning to my own people. But first let me tell you what the Israelites will do to your people in the future.”
  - type: heading
    content: Balaam’s Final Messages
  '15':
  - type: text
    content: 'This is the message Balaam delivered:'
  - type: text
    content: “This is the message of Balaam son of Beor,
  - type: text
    content: the message of the man whose eyes see clearly,
  '16':
  - type: text
    content: the message of one who hears the words of God,
  - type: text
    content: who has knowledge from the Most High,
  - type: text
    content: who sees a vision from the Almighty,
  - type: text
    content: 'who bows down with eyes wide open:'
  '17':
  - type: text
    content: I see him, but not here and now.
  - type: text
    content: I perceive him, but far in the distant future.
  - type: text
    content: A star will rise from Jacob;
  - type: text
    content: a scepter will emerge from Israel.
  - type: text
    content: It will crush the heads of Moab’s people,
  - type: text
    content: cracking the skulls
  - type: note
    content: As in Samaritan Pentateuch; the meaning of the Hebrew word is uncertain.
  - type: text
    content: ' of the people of Sheth.'
  '18':
  - type: text
    content: Edom will be taken over,
  - type: text
    content: and Seir, its enemy, will be conquered,
  - type: text
    content: while Israel marches on in triumph.
  '19':
  - type: text
    content: A ruler will rise in Jacob
  - type: text
    content: who will destroy the survivors of Ir.”
  '2':
  - type: text
    content: 'where he saw the people of Israel camped, tribe by tribe. Then the Spirit of God came upon him, '
  '20':
  - type: text
    content: 'Then Balaam looked over toward the people of Amalek and delivered this message:'
  - type: text
    content: “Amalek was the greatest of nations,
  - type: text
    content: but its destiny is destruction!”
  '21':
  - type: text
    content: 'Then he looked over toward the Kenites and delivered this message:'
  - type: text
    content: “Your home is secure;
  - type: text
    content: your nest is set in the rocks.
  '22':
  - type: text
    content: But the Kenites will be destroyed
  - type: text
    content: when Assyria
  - type: note
    content: Hebrew Asshur; also in 24:24.
  - type: text
    content: ' takes you captive.”'
  '23':
  - type: text
    content: 'Balaam concluded his messages by saying:'
  - type: text
    content: “Alas, who can survive
  - type: text
    content: unless God has willed it?
  '24':
  - type: text
    content: Ships will come from the coasts of Cyprus
  - type: note
    content: Hebrew Kittim.
  - type: text
    content: ;
  - type: text
    content: they will oppress Assyria and afflict Eber,
  - type: text
    content: but they, too, will be utterly destroyed.”
  '25':
  - type: text
    content: Then Balaam left and returned home, and Balak also went on his way.
  '3':
  - type: text
    content: 'and this is the message he delivered:'
  - type: text
    content: “This is the message of Balaam son of Beor,
  - type: text
    content: the message of the man whose eyes see clearly,
  '4':
  - type: text
    content: the message of one who hears the words of God,
  - type: text
    content: who sees a vision from the Almighty,
  - type: text
    content: 'who bows down with eyes wide open:'
  '5':
  - type: text
    content: How beautiful are your tents, O Jacob;
  - type: text
    content: how lovely are your homes, O Israel!
  '6':
  - type: text
    content: They spread before me like palm groves,
  - type: note
    content: Or like a majestic valley.
  - type: text
    content: like gardens by the riverside.
  - type: text
    content: 'They are like tall trees planted by the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: like cedars beside the waters.
  '7':
  - type: text
    content: Water will flow from their buckets;
  - type: text
    content: their offspring have all they need.
  - type: text
    content: Their king will be greater than Agag;
  - type: text
    content: their kingdom will be exalted.
  '8':
  - type: text
    content: God brought them out of Egypt;
  - type: text
    content: for them he is as strong as a wild ox.
  - type: text
    content: He devours all the nations that oppose him,
  - type: text
    content: breaking their bones in pieces,
  - type: text
    content: shooting them with arrows.
  '9':
  - type: text
    content: Like a lion, Israel crouches and lies down;
  - type: text
    content: like a lioness, who dares to arouse her?
  - type: text
    content: Blessed is everyone who blesses you, O Israel,
  - type: text
    content: and cursed is everyone who curses you.”
