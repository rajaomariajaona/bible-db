document_id: JUD.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings from Jude
  - type: text
    content: This letter is from Jude, a slave of Jesus Christ and a brother of James.
  - type: text
    content: I am writing to all who have been called by God the Father, who loves you and keeps you safe in the care of Jesus Christ.
  - type: note
    content: Or keeps you for Jesus Christ.
  '10':
  - type: text
    content: 'But these people scoff at things they do not understand. Like unthinking animals, they do whatever their instincts tell them, and so they bring about their own destruction. '
  '11':
  - type: text
    content: What sorrow awaits them! For they follow in the footsteps of Cain, who killed his brother. Like Balaam, they deceive people for money. And like Korah, they perish in their rebellion.
  '12':
  - type: text
    content: When these people eat with you in your fellowship meals commemorating the Lord’s love, they are like dangerous reefs that can shipwreck you.
  - type: note
    content: Or they are contaminants among you; or they are stains.
  - type: text
    content: ' They are like shameless shepherds who care only for themselves. They are like clouds blowing over the land without giving any rain. They are like trees in autumn that are doubly dead, for they bear no fruit and have been pulled up by the roots. '
  '13':
  - type: text
    content: They are like wild waves of the sea, churning up the foam of their shameful deeds. They are like wandering stars, doomed forever to blackest darkness.
  '14':
  - type: text
    content: 'Enoch, who lived in the seventh generation after Adam, prophesied about these people. He said, “Listen! The Lord is coming with countless thousands of his holy ones '
  '15':
  - type: text
    content: to execute judgment on the people of the world. He will convict every person of all the ungodly things they have done and for all the insults that ungodly sinners have spoken against him.”
  - type: note
    content: 'The quotation comes from intertestamental literature: 1 Enoch 1:9.'
  '16':
  - type: text
    content: These people are grumblers and complainers, living only to satisfy their desires. They brag loudly about themselves, and they flatter others to get what they want.
  - type: heading
    content: A Call to Remain Faithful
  '17':
  - type: text
    content: 'But you, my dear friends, must remember what the apostles of our Lord Jesus Christ predicted. '
  '18':
  - type: text
    content: 'They told you that in the last times there would be scoffers whose purpose in life is to satisfy their ungodly desires. '
  '19':
  - type: text
    content: These people are the ones who are creating divisions among you. They follow their natural instincts because they do not have God’s Spirit in them.
  '2':
  - type: text
    content: May God give you more and more mercy, peace, and love.
  - type: heading
    content: The Danger of False Teachers
  '20':
  - type: text
    content: But you, dear friends, must build each other up in your most holy faith, pray in the power of the Holy Spirit,
  - type: note
    content: Greek pray in the Holy Spirit.
  - type: text
    content: ' '
  '21':
  - type: text
    content: and await the mercy of our Lord Jesus Christ, who will bring you eternal life. In this way, you will keep yourselves safe in God’s love.
  '22':
  - type: text
    content: And you must show mercy to
  - type: note
    content: Some manuscripts read must reprove.
  - type: text
    content: ' those whose faith is wavering. '
  '23':
  - type: text
    content: Rescue others by snatching them from the flames of judgment. Show mercy to still others,
  - type: note
    content: 'Some manuscripts have only two categories of people: (1) those whose faith is wavering and therefore need to be snatched from the flames of judgment, and (2) those who need to be shown mercy.'
  - type: text
    content: ' but do so with great caution, hating the sins that contaminate their lives.'
  - type: note
    content: Greek with fear, hating even the clothing stained by the flesh.
  - type: heading
    content: A Prayer of Praise
  '24':
  - type: text
    content: 'Now all glory to God, who is able to keep you from falling away and will bring you with great joy into his glorious presence without a single fault. '
  '25':
  - type: text
    content: All glory to him who alone is God, our Savior through Jesus Christ our Lord. All glory, majesty, power, and authority are his before all time, and in the present, and beyond all time! Amen.
  '3':
  - type: text
    content: 'Dear friends, I had been eagerly planning to write to you about the salvation we all share. But now I find that I must write about something else, urging you to defend the faith that God has entrusted once for all time to his holy people. '
  '4':
  - type: text
    content: I say this because some ungodly people have wormed their way into your churches, saying that God’s marvelous grace allows us to live immoral lives. The condemnation of such people was recorded long ago, for they have denied our only Master and Lord, Jesus Christ.
  '5':
  - type: text
    content: So I want to remind you, though you already know these things, that Jesus
  - type: note
    content: Other manuscripts read [the] Lord, or God, or God Christ.
  - type: text
    content: ' first rescued the nation of Israel from Egypt, but later he destroyed those who did not remain faithful. '
  '6':
  - type: text
    content: 'And I remind you of the angels who did not stay within the limits of authority God gave them but left the place where they belonged. God has kept them securely chained in prisons of darkness, waiting for the great day of judgment. '
  '7':
  - type: text
    content: And don’t forget Sodom and Gomorrah and their neighboring towns, which were filled with immorality and every kind of sexual perversion. Those cities were destroyed by fire and serve as a warning of the eternal fire of God’s judgment.
  '8':
  - type: text
    content: In the same way, these people—who claim authority from their dreams—live immoral lives, defy authority, and scoff at supernatural beings.
  - type: note
    content: Greek at glorious ones, which are probably evil angels.
  - type: text
    content: ' '
  '9':
  - type: text
    content: But even Michael, one of the mightiest of the angels,
  - type: note
    content: Greek Michael, the archangel.
  - type: text
    content: ' did not dare accuse the devil of blasphemy, but simply said, “The Lord rebuke you!” (This took place when Michael was arguing with the devil about Moses’ body.) '
