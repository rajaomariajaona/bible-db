document_id: REV.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Songs of Victory in Heaven
  - type: text
    content: After this, I heard what sounded like a vast crowd in heaven shouting,
  - type: text
    content: '“Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: note
    content: Greek Hallelujah; also in 19:3, 4, 6. Hallelujah is the transliteration of a Hebrew term that means “Praise the Lord.”
  - type: text
    content: Salvation and glory and power belong to our God.
  '10':
  - type: text
    content: Then I fell down at his feet to worship him, but he said, “No, don’t worship me. I am a servant of God, just like you and your brothers and sisters
  - type: note
    content: Greek brothers.
  - type: text
    content: ' who testify about their faith in Jesus. Worship only God. For the essence of prophecy is to give a clear witness for Jesus.'
  - type: note
    content: Or is the message confirmed by Jesus.
  - type: text
    content: ”
  - type: heading
    content: The Rider on the White Horse
  '11':
  - type: text
    content: 'Then I saw heaven opened, and a white horse was standing there. Its rider was named Faithful and True, for he judges fairly and wages a righteous war. '
  '12':
  - type: text
    content: 'His eyes were like flames of fire, and on his head were many crowns. A name was written on him that no one understood except himself. '
  '13':
  - type: text
    content: 'He wore a robe dipped in blood, and his title was the Word of God. '
  '14':
  - type: text
    content: 'The armies of heaven, dressed in the finest of pure white linen, followed him on white horses. '
  '15':
  - type: text
    content: 'From his mouth came a sharp sword to strike down the nations. He will rule them with an iron rod. He will release the fierce wrath of God, the Almighty, like juice flowing from a winepress. '
  '16':
  - type: text
    content: On his robe at his thigh
  - type: note
    content: Or On his robe and thigh.
  - type: text
    content: ' was written this title: King of all kings and Lord of all lords.'
  '17':
  - type: text
    content: 'Then I saw an angel standing in the sun, shouting to the vultures flying high in the sky: “Come! Gather together for the great banquet God has prepared. '
  '18':
  - type: text
    content: Come and eat the flesh of kings, generals, and strong warriors; of horses and their riders; and of all humanity, both free and slave, small and great.”
  '19':
  - type: text
    content: 'Then I saw the beast and the kings of the world and their armies gathered together to fight against the one sitting on the horse and his army. '
  '2':
  - type: text
    content: His judgments are true and just.
  - type: text
    content: He has punished the great prostitute
  - type: text
    content: who corrupted the earth with her immorality.
  - type: text
    content: He has avenged the murder of his servants.”
  '20':
  - type: text
    content: 'And the beast was captured, and with him the false prophet who did mighty miracles on behalf of the beast—miracles that deceived all who had accepted the mark of the beast and who worshiped his statue. Both the beast and his false prophet were thrown alive into the fiery lake of burning sulfur. '
  '21':
  - type: text
    content: Their entire army was killed by the sharp sword that came from the mouth of the one riding the white horse. And the vultures all gorged themselves on the dead bodies.
  '3':
  - type: text
    content: 'And again their voices rang out:'
  - type: text
    content: '“Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: The smoke from that city ascends forever and ever!”
  '4':
  - type: text
    content: 'Then the twenty-four elders and the four living beings fell down and worshiped God, who was sitting on the throne. They cried out, “Amen! Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!”'
  '5':
  - type: text
    content: And from the throne came a voice that said,
  - type: text
    content: “Praise our God,
  - type: text
    content: all his servants,
  - type: text
    content: all who fear him,
  - type: text
    content: from the least to the greatest.”
  '6':
  - type: text
    content: 'Then I heard again what sounded like the shout of a vast crowd or the roar of mighty ocean waves or the crash of loud thunder:'
  - type: text
    content: '“Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: For the Lord our God,
  - type: note
    content: Some manuscripts read the Lord God.
  - type: text
    content: ' the Almighty, reigns.'
  '7':
  - type: text
    content: Let us be glad and rejoice,
  - type: text
    content: and let us give honor to him.
  - type: text
    content: For the time has come for the wedding feast of the Lamb,
  - type: text
    content: and his bride has prepared herself.
  '8':
  - type: text
    content: She has been given the finest of pure white linen to wear.”
  - type: text
    content: For the fine linen represents the good deeds of God’s holy people.
  '9':
  - type: text
    content: 'And the angel said to me, “Write this: Blessed are those who are invited to the wedding feast of the Lamb.” And he added, “These are true words that come from God.”'
