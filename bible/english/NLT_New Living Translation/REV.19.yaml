    - type: text
      text: Songs of Victory in Heaven
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: After this, I heard what sounded like a vast crowd in heaven shouting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hallelujah; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'also in 19:3, 4, 6. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hallelujah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'is the transliteration of a Hebrew term that means “Praise the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: .”
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Salvation and glory and power belong to our God.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I fell down at his feet to worship him, but he said, “No, don’t worship me. I am a servant of God, just like you and your brothers and sisters
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:10a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers.
      marker-yv: yv-n
    - type: text
      text: ' who testify about their faith in Jesus. Worship only God. For the essence of prophecy is to give a clear witness for Jesus.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:10b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: is the message confirmed by Jesus.
      marker-yv: yv-n
    - type: text
      text: ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Rider on the White Horse
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then I saw heaven opened, and a white horse was standing there. Its rider was named Faithful and True, for he judges fairly and wages a righteous war. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'His eyes were like flames of fire, and on his head were many crowns. A name was written on him that no one understood except himself. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He wore a robe dipped in blood, and his title was the Word of God. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The armies of heaven, dressed in the finest of pure white linen, followed him on white horses. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'From his mouth came a sharp sword to strike down the nations. He will rule them with an iron rod. He will release the fierce wrath of God, the Almighty, like juice flowing from a winepress. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: On his robe at his thigh
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: On his robe and thigh.
      marker-yv: yv-n
    - type: text
      text: ' was written this title: King of all kings and Lord of all lords.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I saw an angel standing in the sun, shouting to the vultures flying high in the sky: “Come! Gather together for the great banquet God has prepared. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Come and eat the flesh of kings, generals, and strong warriors; of horses and their riders; and of all humanity, both free and slave, small and great.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I saw the beast and the kings of the world and their armies gathered together to fight against the one sitting on the horse and his army. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His judgments are true and just.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has punished the great prostitute
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who corrupted the earth with her immorality.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has avenged the murder of his servants.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the beast was captured, and with him the false prophet who did mighty miracles on behalf of the beast—miracles that deceived all who had accepted the mark of the beast and who worshiped his statue. Both the beast and his false prophet were thrown alive into the fiery lake of burning sulfur. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Their entire army was killed by the sharp sword that came from the mouth of the one riding the white horse. And the vultures all gorged themselves on the dead bodies.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And again their voices rang out:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The smoke from that city ascends forever and ever!”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the twenty-four elders and the four living beings fell down and worshiped God, who was sitting on the throne. They cried out, “Amen! Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And from the throne came a voice that said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Praise our God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all his servants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all who fear him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the least to the greatest.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I heard again what sounded like the shout of a vast crowd or the roar of mighty ocean waves or the crash of loud thunder:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the Lord our God,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Lord God.
      marker-yv: yv-n
    - type: text
      text: ' the Almighty, reigns.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us be glad and rejoice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let us give honor to him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the time has come for the wedding feast of the Lamb,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his bride has prepared herself.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She has been given the finest of pure white linen to wear.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the fine linen represents the good deeds of God’s holy people.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the angel said to me, “Write this: Blessed are those who are invited to the wedding feast of the Lamb.” And he added, “These are true words that come from God.”'
