document_id: ACT.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Promise of the Holy Spirit
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: In my first book
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The reference is to the Gospel of Luke.
      marker-yv: yv-n
    - type: text
      text: ' I told you, Theophilus, about everything Jesus began to do and teach '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'As they strained to see him rising into heaven, two white-robed men suddenly stood among them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Men of Galilee,” they said, “why are you standing here staring into heaven? Jesus has been taken from you into heaven, but someday he will return from heaven in the same way you saw him go!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Matthias Replaces Judas
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then the apostles returned to Jerusalem from the Mount of Olives, a distance of half a mile.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a Sabbath day’s journey.
      marker-yv: yv-n
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: When they arrived, they went to the upstairs room of the house where they were staying.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here are the names of those who were present: Peter, John, James, Andrew, Philip, Thomas, Bartholomew, Matthew, James (son of Alphaeus), Simon (the zealot), and Judas (son of James). '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: They all met together and were constantly united in prayer, along with Mary the mother of Jesus, several other women, and the brothers of Jesus.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: During this time, when about 120 believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers.
      marker-yv: yv-n
    - type: text
      text: ' were together in one place, Peter stood up and addressed them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“Brothers,” he said, “the Scriptures had to be fulfilled concerning Judas, who guided those who arrested Jesus. This was predicted long ago by the Holy Spirit, speaking through King David. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Judas was one of us and shared in the ministry with us.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '(Judas had bought a field with the money he received for his treachery. Falling headfirst there, his body split open, spilling out all his intestines. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The news of his death spread to all the people of Jerusalem, and they gave the place the Aramaic name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Akeldama,
    - type: text
      text: ' which means “Field of Blood.”)'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'until the day he was taken up to heaven after giving his chosen apostles further instructions through the Holy Spirit. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Peter continued, “This was written in the book of Psalms, where it says, ‘Let his home become desolate, with no one living in it.’ It also says, ‘Let someone else take his position.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pss 69:25; 109:8.
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“So now we must choose a replacement for Judas from among the men who were with us the entire time we were traveling with the Lord Jesus— '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: from the time he was baptized by John until the day he was taken from us. Whoever is chosen will join us as a witness of Jesus’ resurrection.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So they nominated two men: Joseph called Barsabbas (also known as Justus) and Matthias. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then they all prayed, “O Lord, you know every heart. Show us which of these men you have chosen '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'as an apostle to replace Judas in this ministry, for he has deserted us and gone where he belongs.” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Then they cast lots, and Matthias was selected to become an apostle with the other eleven.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: During the forty days after he suffered and died, he appeared to the apostles from time to time, and he proved to them in many ways that he was actually alive. And he talked to them about the Kingdom of God.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Once when he was eating with them, he commanded them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do not leave Jerusalem until the Father sends you the gift he promised, as I told you before.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: John baptized with
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 1:5b.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: water, but in just a few days you will be baptized with the Holy Spirit.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ascension of Jesus
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: So when the apostles were with Jesus, they kept asking him, “Lord, has the time come for you to free Israel and restore our kingdom?”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'He replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The Father alone has the authority to set those dates and times, and they are not for you to know.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But you will receive power when the Holy Spirit comes upon you. And you will be my witnesses, telling people about me everywhere—in Jerusalem, throughout Judea, in Samaria, and to the ends of the earth.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'After saying this, he was taken up into a cloud while they were watching, and they could no longer see him. '
