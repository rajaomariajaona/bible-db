document_id: ACT.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Promise of the Holy Spirit
  - type: text
    content: In my first book
  - type: note
    content: The reference is to the Gospel of Luke.
  - type: text
    content: ' I told you, Theophilus, about everything Jesus began to do and teach '
  '10':
  - type: text
    content: 'As they strained to see him rising into heaven, two white-robed men suddenly stood among them. '
  '11':
  - type: text
    content: “Men of Galilee,” they said, “why are you standing here staring into heaven? Jesus has been taken from you into heaven, but someday he will return from heaven in the same way you saw him go!”
  - type: heading
    content: Matthias Replaces Judas
  '12':
  - type: text
    content: Then the apostles returned to Jerusalem from the Mount of Olives, a distance of half a mile.
  - type: note
    content: Greek a Sabbath day’s journey.
  - type: text
    content: ' '
  '13':
  - type: text
    content: When they arrived, they went to the upstairs room of the house where they were staying.
  - type: text
    content: 'Here are the names of those who were present: Peter, John, James, Andrew, Philip, Thomas, Bartholomew, Matthew, James (son of Alphaeus), Simon (the zealot), and Judas (son of James). '
  '14':
  - type: text
    content: They all met together and were constantly united in prayer, along with Mary the mother of Jesus, several other women, and the brothers of Jesus.
  '15':
  - type: text
    content: During this time, when about 120 believers
  - type: note
    content: Greek brothers.
  - type: text
    content: ' were together in one place, Peter stood up and addressed them. '
  '16':
  - type: text
    content: '“Brothers,” he said, “the Scriptures had to be fulfilled concerning Judas, who guided those who arrested Jesus. This was predicted long ago by the Holy Spirit, speaking through King David. '
  '17':
  - type: text
    content: Judas was one of us and shared in the ministry with us.”
  '18':
  - type: text
    content: '(Judas had bought a field with the money he received for his treachery. Falling headfirst there, his body split open, spilling out all his intestines. '
  '19':
  - type: text
    content: 'The news of his death spread to all the people of Jerusalem, and they gave the place the Aramaic name '
  - type: text
    content: Akeldama,
  - type: text
    content: ' which means “Field of Blood.”)'
  '2':
  - type: text
    content: 'until the day he was taken up to heaven after giving his chosen apostles further instructions through the Holy Spirit. '
  '20':
  - type: text
    content: Peter continued, “This was written in the book of Psalms, where it says, ‘Let his home become desolate, with no one living in it.’ It also says, ‘Let someone else take his position.’
  - type: note
    content: Pss 69:25; 109:8.
  '21':
  - type: text
    content: '“So now we must choose a replacement for Judas from among the men who were with us the entire time we were traveling with the Lord Jesus— '
  '22':
  - type: text
    content: from the time he was baptized by John until the day he was taken from us. Whoever is chosen will join us as a witness of Jesus’ resurrection.”
  '23':
  - type: text
    content: 'So they nominated two men: Joseph called Barsabbas (also known as Justus) and Matthias. '
  '24':
  - type: text
    content: 'Then they all prayed, “O Lord, you know every heart. Show us which of these men you have chosen '
  '25':
  - type: text
    content: 'as an apostle to replace Judas in this ministry, for he has deserted us and gone where he belongs.” '
  '26':
  - type: text
    content: Then they cast lots, and Matthias was selected to become an apostle with the other eleven.
  '3':
  - type: text
    content: During the forty days after he suffered and died, he appeared to the apostles from time to time, and he proved to them in many ways that he was actually alive. And he talked to them about the Kingdom of God.
  '4':
  - type: text
    content: 'Once when he was eating with them, he commanded them, '
  - type: text
    content: “Do not leave Jerusalem until the Father sends you the gift he promised, as I told you before.
  - type: text
    content: ' '
  '5':
  - type: text
    content: John baptized with
  - type: note
    content: Or in; also in 1:5b.
  - type: text
    content: ' '
  - type: text
    content: water, but in just a few days you will be baptized with the Holy Spirit.”
  - type: heading
    content: The Ascension of Jesus
  '6':
  - type: text
    content: So when the apostles were with Jesus, they kept asking him, “Lord, has the time come for you to free Israel and restore our kingdom?”
  '7':
  - type: text
    content: 'He replied, '
  - type: text
    content: “The Father alone has the authority to set those dates and times, and they are not for you to know.
  - type: text
    content: ' '
  '8':
  - type: text
    content: But you will receive power when the Holy Spirit comes upon you. And you will be my witnesses, telling people about me everywhere—in Jerusalem, throughout Judea, in Samaria, and to the ends of the earth.”
  '9':
  - type: text
    content: 'After saying this, he was taken up into a cloud while they were watching, and they could no longer see him. '
