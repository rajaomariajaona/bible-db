document_id: PRO.16,116
type_code: eng
verses:
  '1':
  - type: text
    content: We can make our own plans,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' gives the right answer.'
  '10':
  - type: text
    content: The king speaks with divine wisdom;
  - type: text
    content: he must never judge unfairly.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' demands accurate scales and balances;'
  - type: text
    content: he sets the standards for fairness.
  '12':
  - type: text
    content: A king detests wrongdoing,
  - type: text
    content: for his rule is built on justice.
  '13':
  - type: text
    content: The king is pleased with words from righteous lips;
  - type: text
    content: he loves those who speak honestly.
  '14':
  - type: text
    content: The anger of the king is a deadly threat;
  - type: text
    content: the wise will try to appease it.
  '15':
  - type: text
    content: When the king smiles, there is life;
  - type: text
    content: his favor refreshes like a spring rain.
  '16':
  - type: text
    content: How much better to get wisdom than gold,
  - type: text
    content: and good judgment than silver!
  '17':
  - type: text
    content: The path of the virtuous leads away from evil;
  - type: text
    content: whoever follows that path is safe.
  '18':
  - type: text
    content: Pride goes before destruction,
  - type: text
    content: and haughtiness before a fall.
  '19':
  - type: text
    content: Better to live humbly with the poor
  - type: text
    content: than to share plunder with the proud.
  '2':
  - type: text
    content: People may be pure in their own eyes,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' examines their motives.'
  '20':
  - type: text
    content: Those who listen to instruction will prosper;
  - type: text
    content: 'those who trust the '
  - type: text
    content: Lord
  - type: text
    content: ' will be joyful.'
  '21':
  - type: text
    content: The wise are known for their understanding,
  - type: text
    content: and pleasant words are persuasive.
  '22':
  - type: text
    content: Discretion is a life-giving fountain to those who possess it,
  - type: text
    content: but discipline is wasted on fools.
  '23':
  - type: text
    content: From a wise mind comes wise speech;
  - type: text
    content: the words of the wise are persuasive.
  '24':
  - type: text
    content: Kind words are like honey—
  - type: text
    content: sweet to the soul and healthy for the body.
  '25':
  - type: text
    content: There is a path before each person that seems right,
  - type: text
    content: but it ends in death.
  '26':
  - type: text
    content: It is good for workers to have an appetite;
  - type: text
    content: an empty stomach drives them on.
  '27':
  - type: text
    content: Scoundrels create trouble;
  - type: text
    content: their words are a destructive blaze.
  '28':
  - type: text
    content: A troublemaker plants seeds of strife;
  - type: text
    content: gossip separates the best of friends.
  '29':
  - type: text
    content: Violent people mislead their companions,
  - type: text
    content: leading them down a harmful path.
  '3':
  - type: text
    content: 'Commit your actions to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and your plans will succeed.
  '30':
  - type: text
    content: With narrowed eyes, people plot evil;
  - type: text
    content: with a smirk, they plan their mischief.
  '31':
  - type: text
    content: Gray hair is a crown of glory;
  - type: text
    content: it is gained by living a godly life.
  '32':
  - type: text
    content: Better to be patient than powerful;
  - type: text
    content: better to have self-control than to conquer a city.
  '33':
  - type: text
    content: We may throw the dice,
  - type: note
    content: Hebrew We may cast lots.
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' determines how they fall.'
  '4':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has made everything for his own purposes,'
  - type: text
    content: even the wicked for a day of disaster.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests the proud;'
  - type: text
    content: they will surely be punished.
  '6':
  - type: text
    content: Unfailing love and faithfulness make atonement for sin.
  - type: text
    content: 'By fearing the '
  - type: text
    content: Lord
  - type: text
    content: ', people avoid evil.'
  '7':
  - type: text
    content: 'When people’s lives please the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: even their enemies are at peace with them.
  '8':
  - type: text
    content: Better to have little, with godliness,
  - type: text
    content: than to be rich and dishonest.
  '9':
  - type: text
    content: We can make our plans,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' determines our steps.'
