document_id: PRO.16
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: We can make our own plans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gives the right answer.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: People may be pure in their own eyes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' examines their motives.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Commit your actions to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your plans will succeed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has made everything for his own purposes,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: even the wicked for a day of disaster.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests the proud;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will surely be punished.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Unfailing love and faithfulness make atonement for sin.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'By fearing the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', people avoid evil.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When people’s lives please the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: even their enemies are at peace with them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Better to have little, with godliness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: than to be rich and dishonest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: We can make our plans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' determines our steps.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The king speaks with divine wisdom;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he must never judge unfairly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' demands accurate scales and balances;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he sets the standards for fairness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: A king detests wrongdoing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for his rule is built on justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The king is pleased with words from righteous lips;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he loves those who speak honestly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The anger of the king is a deadly threat;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wise will try to appease it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: When the king smiles, there is life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his favor refreshes like a spring rain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: How much better to get wisdom than gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and good judgment than silver!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The path of the virtuous leads away from evil;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever follows that path is safe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Pride goes before destruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and haughtiness before a fall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Better to live humbly with the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: than to share plunder with the proud.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Those who listen to instruction will prosper;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'those who trust the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be joyful.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The wise are known for their understanding,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pleasant words are persuasive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Discretion is a life-giving fountain to those who possess it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but discipline is wasted on fools.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: From a wise mind comes wise speech;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the words of the wise are persuasive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Kind words are like honey—
- type: usfm
  marker: q2
  children:
  - type: text
    text: sweet to the soul and healthy for the body.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: There is a path before each person that seems right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but it ends in death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: It is good for workers to have an appetite;
- type: usfm
  marker: q2
  children:
  - type: text
    text: an empty stomach drives them on.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Scoundrels create trouble;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their words are a destructive blaze.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A troublemaker plants seeds of strife;
- type: usfm
  marker: q2
  children:
  - type: text
    text: gossip separates the best of friends.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Violent people mislead their companions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: leading them down a harmful path.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: With narrowed eyes, people plot evil;
- type: usfm
  marker: q2
  children:
  - type: text
    text: with a smirk, they plan their mischief.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Gray hair is a crown of glory;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is gained by living a godly life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Better to be patient than powerful;
- type: usfm
  marker: q2
  children:
  - type: text
    text: better to have self-control than to conquer a city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: We may throw the dice,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: We may cast lots.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' determines how they fall.'
