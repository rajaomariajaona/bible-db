document_id: EZK.33,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Ezekiel as Israel’s Watchman
  - type: text
    content: 'Once again a message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: '“Son of man, give the people of Israel this message: You are saying, ‘Our sins are heavy upon us; we are wasting away! How can we survive?’ '
  '11':
  - type: text
    content: 'As surely as I live, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', I take no pleasure in the death of wicked people. I only want them to turn from their wicked ways so they can live. Turn! Turn from your wickedness, O people of Israel! Why should you die?'
  '12':
  - type: text
    content: '“Son of man, give your people this message: The righteous behavior of righteous people will not save them if they turn to sin, nor will the wicked behavior of wicked people destroy them if they repent and turn from their sins. '
  '13':
  - type: text
    content: 'When I tell righteous people that they will live, but then they sin, expecting their past righteousness to save them, then none of their righteous acts will be remembered. I will destroy them for their sins. '
  '14':
  - type: text
    content: 'And suppose I tell some wicked people that they will surely die, but then they turn from their sins and do what is just and right. '
  '15':
  - type: text
    content: 'For instance, they might give back a debtor’s security, return what they have stolen, and obey my life-giving laws, no longer doing what is evil. If they do this, then they will surely live and not die. '
  '16':
  - type: text
    content: None of their past sins will be brought up again, for they have done what is just and right, and they will surely live.
  '17':
  - type: text
    content: '“Your people are saying, ‘The Lord isn’t doing what’s right,’ but it is they who are not doing what’s right. '
  '18':
  - type: text
    content: 'For again I say, when righteous people turn away from their righteous behavior and turn to evil, they will die. '
  '19':
  - type: text
    content: 'But if wicked people turn from their wickedness and do what is just and right, they will live. '
  '2':
  - type: text
    content: '“Son of man, give your people this message: ‘When I bring an army against a country, the people of that land choose one of their own to be a watchman. '
  '20':
  - type: text
    content: O people of Israel, you are saying, ‘The Lord isn’t doing what’s right.’ But I judge each of you according to your deeds.”
  - type: heading
    content: Explanation of Jerusalem’s Fall
  '21':
  - type: text
    content: On January 8,
  - type: note
    content: Hebrew On the fifth day of the tenth month, of the ancient Hebrew lunar calendar. This event occurred on January 8, 585 b.c.; also see note on 1:1.
  - type: text
    content: ' during the twelfth year of our captivity, a survivor from Jerusalem came to me and said, “The city has fallen!” '
  '22':
  - type: text
    content: 'The previous evening the '
  - type: text
    content: Lord
  - type: text
    content: ' had taken hold of me and given me back my voice. So I was able to speak when this man arrived the next morning.'
  '23':
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '24':
  - type: text
    content: '“Son of man, the scattered remnants of Israel living among the ruined cities keep saying, ‘Abraham was only one man, yet he gained possession of the entire land. We are many; surely the land has been given to us as a possession.’ '
  '25':
  - type: text
    content: 'So tell these people, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: You eat meat with blood in it, you worship idols,'
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung.
  - type: text
    content: ' and you murder the innocent. Do you really think the land should be yours? '
  '26':
  - type: text
    content: Murderers! Idolaters! Adulterers! Should the land belong to you?’
  '27':
  - type: text
    content: '“Say to them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: As surely as I live, those living in the ruins will die by the sword. And I will send wild animals to eat those living in the open fields. Those hiding in the forts and caves will die of disease. '
  '28':
  - type: text
    content: 'I will completely destroy the land and demolish her pride. Her arrogant power will come to an end. The mountains of Israel will be so desolate that no one will even travel through them. '
  '29':
  - type: text
    content: 'When I have completely destroyed the land because of their detestable sins, then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’
  '3':
  - type: text
    content: 'When the watchman sees the enemy coming, he sounds the alarm to warn the people. '
  '30':
  - type: text
    content: '“Son of man, your people talk about you in their houses and whisper about you at the doors. They say to each other, ‘Come on, let’s go hear the prophet tell us what the '
  - type: text
    content: Lord
  - type: text
    content: ' is saying!’ '
  '31':
  - type: text
    content: 'So my people come pretending to be sincere and sit before you. They listen to your words, but they have no intention of doing what you say. Their mouths are full of lustful words, and their hearts seek only after money. '
  '32':
  - type: text
    content: 'You are very entertaining to them, like someone who sings love songs with a beautiful voice or plays fine music on an instrument. They hear what you say, but they don’t act on it! '
  '33':
  - type: text
    content: But when all these terrible things happen to them—as they certainly will—then they will know a prophet has been among them.”
  '4':
  - type: text
    content: 'Then if those who hear the alarm refuse to take action, it is their own fault if they die. '
  '5':
  - type: text
    content: 'They heard the alarm but ignored it, so the responsibility is theirs. If they had listened to the warning, they could have saved their lives. '
  '6':
  - type: text
    content: But if the watchman sees the enemy coming and doesn’t sound the alarm to warn the people, he is responsible for their captivity. They will die in their sins, but I will hold the watchman responsible for their deaths.’
  '7':
  - type: text
    content: '“Now, son of man, I am making you a watchman for the people of Israel. Therefore, listen to what I say and warn them for me. '
  '8':
  - type: text
    content: 'If I announce that some wicked people are sure to die and you fail to tell them to change their ways, then they will die in their sins, and I will hold you responsible for their deaths. '
  '9':
  - type: text
    content: But if you warn them to repent and they don’t repent, they will die in their sins, but you will have saved yourself.
  - type: heading
    content: The Watchman’s Message
