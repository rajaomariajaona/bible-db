document_id: JON.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonah Runs from the Lord
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave this message to Jonah son of Amittai: '
  '10':
  - type: text
    content: 'The sailors were terrified when they heard this, for he had already told them he was running away from the '
  - type: text
    content: Lord
  - type: text
    content: '. “Oh, why did you do it?” they groaned. '
  '11':
  - type: text
    content: And since the storm was getting worse all the time, they asked him, “What should we do to you to stop this storm?”
  '12':
  - type: text
    content: “Throw me into the sea,” Jonah said, “and it will become calm again. I know that this terrible storm is all my fault.”
  '13':
  - type: text
    content: 'Instead, the sailors rowed even harder to get the ship to the land. But the stormy sea was too violent for them, and they couldn’t make it. '
  '14':
  - type: text
    content: 'Then they cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', Jonah’s God. “O '
  - type: text
    content: Lord
  - type: text
    content: ',” they pleaded, “don’t make us die for this man’s sin. And don’t hold us responsible for his death. O '
  - type: text
    content: Lord
  - type: text
    content: ', you have sent this storm upon him for your own good reasons.”'
  '15':
  - type: text
    content: 'Then the sailors picked Jonah up and threw him into the raging sea, and the storm stopped at once! '
  '16':
  - type: text
    content: 'The sailors were awestruck by the '
  - type: text
    content: Lord
  - type: text
    content: ’s great power, and they offered him a sacrifice and vowed to serve him.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Verse 1:17 is numbered 2:1 in Hebrew text.
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' had arranged for a great fish to swallow Jonah. And Jonah was inside the fish for three days and three nights.'
  '2':
  - type: text
    content: “Get up and go to the great city of Nineveh. Announce my judgment against it because I have seen how wicked its people are.”
  '3':
  - type: text
    content: 'But Jonah got up and went in the opposite direction to get away from the '
  - type: text
    content: Lord
  - type: text
    content: '. He went down to the port of Joppa, where he found a ship leaving for Tarshish. He bought a ticket and went on board, hoping to escape from the '
  - type: text
    content: Lord
  - type: text
    content: ' by sailing to Tarshish.'
  '4':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' hurled a powerful wind over the sea, causing a violent storm that threatened to break the ship apart. '
  '5':
  - type: text
    content: Fearing for their lives, the desperate sailors shouted to their gods for help and threw the cargo overboard to lighten the ship.
  - type: text
    content: 'But all this time Jonah was sound asleep down in the hold. '
  '6':
  - type: text
    content: So the captain went down after him. “How can you sleep at a time like this?” he shouted. “Get up and pray to your god! Maybe he will pay attention to us and spare our lives.”
  '7':
  - type: text
    content: 'Then the crew cast lots to see which of them had offended the gods and caused the terrible storm. When they did this, the lots identified Jonah as the culprit. '
  '8':
  - type: text
    content: “Why has this awful storm come down on us?” they demanded. “Who are you? What is your line of work? What country are you from? What is your nationality?”
  '9':
  - type: text
    content: 'Jonah answered, “I am a Hebrew, and I worship the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of heaven, who made the sea and the land.”'
