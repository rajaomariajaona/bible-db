document_id: 1SA.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonathan Helps David
  - type: text
    content: David now fled from Naioth in Ramah and found Jonathan. “What have I done?” he exclaimed. “What is my crime? How have I offended your father that he is so determined to kill me?”
  '10':
  - type: text
    content: Then David asked, “How will I know whether or not your father is angry?”
  '11':
  - type: text
    content: '“Come out to the field with me,” Jonathan replied. And they went out there together. '
  '12':
  - type: text
    content: 'Then Jonathan told David, “I promise by the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, that by this time tomorrow, or the next day at the latest, I will talk to my father and let you know at once how he feels about you. If he speaks favorably about you, I will let you know. '
  '13':
  - type: text
    content: 'But if he is angry and wants you killed, may the '
  - type: text
    content: Lord
  - type: text
    content: ' strike me and even kill me if I don’t warn you so you can escape and live. May the '
  - type: text
    content: Lord
  - type: text
    content: ' be with you as he used to be with my father. '
  '14':
  - type: text
    content: 'And may you treat me with the faithful love of the '
  - type: text
    content: Lord
  - type: text
    content: ' as long as I live. But if I die, '
  '15':
  - type: text
    content: 'treat my family with this faithful love, even when the '
  - type: text
    content: Lord
  - type: text
    content: ' destroys all your enemies from the face of the earth.”'
  '16':
  - type: text
    content: So Jonathan made a solemn pact with David,
  - type: note
    content: Hebrew with the house of David.
  - type: text
    content: ' saying, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' destroy all your enemies!” '
  '17':
  - type: text
    content: And Jonathan made David reaffirm his vow of friendship again, for Jonathan loved David as he loved himself.
  '18':
  - type: text
    content: 'Then Jonathan said, “Tomorrow we celebrate the new moon festival. You will be missed when your place at the table is empty. '
  '19':
  - type: text
    content: The day after tomorrow, toward evening, go to the place where you hid before, and wait there by the stone pile.
  - type: note
    content: Hebrew the stone Ezel. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' '
  '2':
  - type: text
    content: “That’s not true!” Jonathan protested. “You’re not going to die. He always tells me everything he’s going to do, even the little things. I know my father wouldn’t hide something like this from me. It just isn’t so!”
  '20':
  - type: text
    content: 'I will come out and shoot three arrows to the side of the stone pile as though I were shooting at a target. '
  '21':
  - type: text
    content: 'Then I will send a boy to bring the arrows back. If you hear me tell him, ‘They’re on this side,’ then you will know, as surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, that all is well, and there is no trouble. '
  '22':
  - type: text
    content: 'But if I tell him, ‘Go farther—the arrows are still ahead of you,’ then it will mean that you must leave immediately, for the '
  - type: text
    content: Lord
  - type: text
    content: ' is sending you away. '
  '23':
  - type: text
    content: 'And may the '
  - type: text
    content: Lord
  - type: text
    content: ' make us keep our promises to each other, for he has witnessed them.”'
  '24':
  - type: text
    content: 'So David hid himself in the field, and when the new moon festival began, the king sat down to eat. '
  '25':
  - type: text
    content: He sat at his usual place against the wall, with Jonathan sitting opposite him
  - type: note
    content: As in Greek version; Hebrew reads with Jonathan standing.
  - type: text
    content: ' and Abner beside him. But David’s place was empty. '
  '26':
  - type: text
    content: 'Saul didn’t say anything about it that day, for he said to himself, “Something must have made David ceremonially unclean.” '
  '27':
  - type: text
    content: But when David’s place was empty again the next day, Saul asked Jonathan, “Why hasn’t the son of Jesse been here for the meal either yesterday or today?”
  '28':
  - type: text
    content: 'Jonathan replied, “David earnestly asked me if he could go to Bethlehem. '
  '29':
  - type: text
    content: He said, ‘Please let me go, for we are having a family sacrifice. My brother demanded that I be there. So please let me get away to see my brothers.’ That’s why he isn’t here at the king’s table.”
  '3':
  - type: text
    content: 'Then David took an oath before Jonathan and said, “Your father knows perfectly well about our friendship, so he has said to himself, ‘I won’t tell Jonathan—why should I hurt him?’ But I swear to you that I am only a step away from death! I swear it by the '
  - type: text
    content: Lord
  - type: text
    content: ' and by your own soul!”'
  '30':
  - type: text
    content: Saul boiled with rage at Jonathan. “You stupid son of a whore!”
  - type: note
    content: Hebrew You son of a perverse and rebellious woman.
  - type: text
    content: ' he swore at him. “Do you think I don’t know that you want him to be king in your place, shaming yourself and your mother? '
  '31':
  - type: text
    content: As long as that son of Jesse is alive, you’ll never be king. Now go and get him so I can kill him!”
  '32':
  - type: text
    content: '“But why should he be put to death?” Jonathan asked his father. “What has he done?” '
  '33':
  - type: text
    content: Then Saul hurled his spear at Jonathan, intending to kill him. So at last Jonathan realized that his father was really determined to kill David.
  '34':
  - type: text
    content: Jonathan left the table in fierce anger and refused to eat on that second day of the festival, for he was crushed by his father’s shameful behavior toward David.
  '35':
  - type: text
    content: 'The next morning, as agreed, Jonathan went out into the field and took a young boy with him to gather his arrows. '
  '36':
  - type: text
    content: '“Start running,” he told the boy, “so you can find the arrows as I shoot them.” So the boy ran, and Jonathan shot an arrow beyond him. '
  '37':
  - type: text
    content: 'When the boy had almost reached the arrow, Jonathan shouted, “The arrow is still ahead of you. '
  '38':
  - type: text
    content: 'Hurry, hurry, don’t wait.” So the boy quickly gathered up the arrows and ran back to his master. '
  '39':
  - type: text
    content: 'He, of course, suspected nothing; only Jonathan and David understood the signal. '
  '4':
  - type: text
    content: “Tell me what I can do to help you,” Jonathan exclaimed.
  '40':
  - type: text
    content: Then Jonathan gave his bow and arrows to the boy and told him to take them back to town.
  '41':
  - type: text
    content: As soon as the boy was gone, David came out from where he had been hiding near the stone pile.
  - type: note
    content: As in Greek version; Hebrew reads near the south edge.
  - type: text
    content: ' Then David bowed three times to Jonathan with his face to the ground. Both of them were in tears as they embraced each other and said good-bye, especially David.'
  '42':
  - type: text
    content: 'At last Jonathan said to David, “Go in peace, for we have sworn loyalty to each other in the '
  - type: text
    content: Lord
  - type: text
    content: '’s name. The '
  - type: text
    content: Lord
  - type: text
    content: ' is the witness of a bond between us and our children forever.” Then David left, and Jonathan returned to the town.'
  - type: note
    content: This sentence is numbered 21:1 in Hebrew text.
  '5':
  - type: text
    content: 'David replied, “Tomorrow we celebrate the new moon festival. I’ve always eaten with the king on this occasion, but tomorrow I’ll hide in the field and stay there until the evening of the third day. '
  '6':
  - type: text
    content: 'If your father asks where I am, tell him I asked permission to go home to Bethlehem for an annual family sacrifice. '
  '7':
  - type: text
    content: 'If he says, ‘Fine!’ you will know all is well. But if he is angry and loses his temper, you will know he is determined to kill me. '
  '8':
  - type: text
    content: 'Show me this loyalty as my sworn friend—for we made a solemn pact before the '
  - type: text
    content: Lord
  - type: text
    content: —or kill me yourself if I have sinned against your father. But please don’t betray me to him!”
  '9':
  - type: text
    content: “Never!” Jonathan exclaimed. “You know that if I had the slightest notion my father was planning to kill you, I would tell you at once.”
