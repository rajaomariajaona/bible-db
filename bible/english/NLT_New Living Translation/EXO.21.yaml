document_id: EXO.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Fair Treatment of Slaves
  - type: text
    content: “These are the regulations you must present to Israel.
  '10':
  - type: text
    content: '“If a man who has married a slave wife takes another wife for himself, he must not neglect the rights of the first wife to food, clothing, and sexual intimacy. '
  '11':
  - type: text
    content: If he fails in any of these three obligations, she may leave as a free woman without making any payment.
  - type: heading
    content: Cases of Personal Injury
  '12':
  - type: text
    content: '“Anyone who assaults and kills another person must be put to death. '
  '13':
  - type: text
    content: 'But if it was simply an accident permitted by God, I will appoint a place of refuge where the slayer can run for safety. '
  '14':
  - type: text
    content: However, if someone deliberately kills another person, then the slayer must be dragged even from my altar and be put to death.
  '15':
  - type: text
    content: “Anyone who strikes father or mother must be put to death.
  '16':
  - type: text
    content: “Kidnappers must be put to death, whether they are caught in possession of their victims or have already sold them as slaves.
  '17':
  - type: text
    content: “Anyone who dishonors
  - type: note
    content: Greek version reads Anyone who speaks disrespectfully of. Compare Matt 15:4; Mark 7:10.
  - type: text
    content: ' father or mother must be put to death.'
  '18':
  - type: text
    content: '“Now suppose two men quarrel, and one hits the other with a stone or fist, and the injured person does not die but is confined to bed. '
  '19':
  - type: text
    content: If he is later able to walk outside again, even with a crutch, the assailant will not be punished but must compensate his victim for lost wages and provide for his full recovery.
  '2':
  - type: text
    content: '“If you buy a Hebrew slave, he may serve for no more than six years. Set him free in the seventh year, and he will owe you nothing for his freedom. '
  '20':
  - type: text
    content: '“If a man beats his male or female slave with a club and the slave dies as a result, the owner must be punished. '
  '21':
  - type: text
    content: But if the slave recovers within a day or two, then the owner shall not be punished, since the slave is his property.
  '22':
  - type: text
    content: “Now suppose two men are fighting, and in the process they accidentally strike a pregnant woman so she gives birth prematurely.
  - type: note
    content: Or so she has a miscarriage; Hebrew reads so her children come out.
  - type: text
    content: ' If no further injury results, the man who struck the woman must pay the amount of compensation the woman’s husband demands and the judges approve. '
  '23':
  - type: text
    content: 'But if there is further injury, the punishment must match the injury: a life for a life, '
  '24':
  - type: text
    content: 'an eye for an eye, a tooth for a tooth, a hand for a hand, a foot for a foot, '
  '25':
  - type: text
    content: a burn for a burn, a wound for a wound, a bruise for a bruise.
  '26':
  - type: text
    content: '“If a man hits his male or female slave in the eye and the eye is blinded, he must let the slave go free to compensate for the eye. '
  '27':
  - type: text
    content: And if a man knocks out the tooth of his male or female slave, he must let the slave go free to compensate for the tooth.
  '28':
  - type: text
    content: “If an ox
  - type: note
    content: Or bull, or cow; also in 21:29-36.
  - type: text
    content: ' gores a man or woman to death, the ox must be stoned, and its flesh may not be eaten. In such a case, however, the owner will not be held liable. '
  '29':
  - type: text
    content: 'But suppose the ox had a reputation for goring, and the owner had been informed but failed to keep it under control. If the ox then kills someone, it must be stoned, and the owner must also be put to death. '
  '3':
  - type: text
    content: If he was single when he became your slave, he shall leave single. But if he was married before he became a slave, then his wife must be freed with him.
  '30':
  - type: text
    content: However, the dead person’s relatives may accept payment to compensate for the loss of life. The owner of the ox may redeem his life by paying whatever is demanded.
  '31':
  - type: text
    content: '“The same regulation applies if the ox gores a boy or a girl. '
  '32':
  - type: text
    content: But if the ox gores a slave, either male or female, the animal’s owner must pay the slave’s owner thirty silver coins,
  - type: note
    content: Hebrew 30 shekels of silver, about 12 ounces or 342 grams in weight.
  - type: text
    content: ' and the ox must be stoned.'
  '33':
  - type: text
    content: '“Suppose someone digs or uncovers a pit and fails to cover it, and then an ox or a donkey falls into it. '
  '34':
  - type: text
    content: The owner of the pit must pay full compensation to the owner of the animal, but then he gets to keep the dead animal.
  '35':
  - type: text
    content: '“If someone’s ox injures a neighbor’s ox and the injured ox dies, then the two owners must sell the live ox and divide the price equally between them. They must also divide the dead animal. '
  '36':
  - type: text
    content: But if the ox had a reputation for goring, yet its owner failed to keep it under control, he must pay full compensation—a live ox for the dead one—but he may keep the dead ox.
  '4':
  - type: text
    content: '“If his master gave him a wife while he was a slave and they had sons or daughters, then only the man will be free in the seventh year, but his wife and children will still belong to his master. '
  '5':
  - type: text
    content: 'But the slave may declare, ‘I love my master, my wife, and my children. I don’t want to go free.’ '
  '6':
  - type: text
    content: If he does this, his master must present him before God.
  - type: note
    content: Or before the judges.
  - type: text
    content: ' Then his master must take him to the door or doorpost and publicly pierce his ear with an awl. After that, the slave will serve his master for life.'
  '7':
  - type: text
    content: '“When a man sells his daughter as a slave, she will not be freed at the end of six years as the men are. '
  '8':
  - type: text
    content: 'If she does not satisfy her owner, he must allow her to be bought back again. But he is not allowed to sell her to foreigners, since he is the one who broke the contract with her. '
  '9':
  - type: text
    content: But if the slave’s owner arranges for her to marry his son, he may no longer treat her as a slave but as a daughter.
