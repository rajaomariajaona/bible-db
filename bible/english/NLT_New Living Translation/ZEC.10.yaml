document_id: ZEC.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Will Restore His People
  - type: text
    content: 'Ask the '
  - type: text
    content: Lord
  - type: text
    content: ' for rain in the spring,'
  - type: text
    content: for he makes the storm clouds.
  - type: text
    content: And he will send showers of rain
  - type: text
    content: so every field becomes a lush pasture.
  '10':
  - type: text
    content: I will bring them back from Egypt
  - type: text
    content: and gather them from Assyria.
  - type: text
    content: I will resettle them in Gilead and Lebanon
  - type: text
    content: until there is no more room for them all.
  '11':
  - type: text
    content: They will pass safely through the sea of distress,
  - type: note
    content: Or the sea of Egypt, referring to the Red Sea.
  - type: text
    content: for the waves of the sea will be held back,
  - type: text
    content: and the waters of the Nile will dry up.
  - type: text
    content: The pride of Assyria will be crushed,
  - type: text
    content: and the rule of Egypt will end.
  '12':
  - type: text
    content: By my power
  - type: note
    content: Hebrew In the Lord.
  - type: text
    content: ' I will make my people strong,'
  - type: text
    content: and by my authority they will go wherever they wish.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '2':
  - type: text
    content: Household gods give worthless advice,
  - type: text
    content: fortune-tellers predict only lies,
  - type: text
    content: and interpreters of dreams pronounce
  - type: text
    content: falsehoods that give no comfort.
  - type: text
    content: So my people are wandering like lost sheep;
  - type: text
    content: they are attacked because they have no shepherd.
  '3':
  - type: text
    content: “My anger burns against your shepherds,
  - type: text
    content: and I will punish these leaders.
  - type: note
    content: Or these male goats.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies has arrived'
  - type: text
    content: to look after Judah, his flock.
  - type: text
    content: He will make them strong and glorious,
  - type: text
    content: like a proud warhorse in battle.
  '4':
  - type: text
    content: From Judah will come the cornerstone,
  - type: text
    content: the tent peg,
  - type: text
    content: the bow for battle,
  - type: text
    content: and all the rulers.
  '5':
  - type: text
    content: They will be like mighty warriors in battle,
  - type: text
    content: trampling their enemies in the mud under their feet.
  - type: text
    content: 'Since the '
  - type: text
    content: Lord
  - type: text
    content: ' is with them as they fight,'
  - type: text
    content: they will overthrow even the enemy’s horsemen.
  '6':
  - type: text
    content: “I will strengthen Judah and save Israel
  - type: note
    content: Hebrew save the house of Joseph.
  - type: text
    content: ;
  - type: text
    content: I will restore them because of my compassion.
  - type: text
    content: It will be as though I had never rejected them,
  - type: text
    content: 'for I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, who will hear their cries.'
  '7':
  - type: text
    content: The people of Israel
  - type: note
    content: Hebrew of Ephraim.
  - type: text
    content: ' will become like mighty warriors,'
  - type: text
    content: and their hearts will be made happy as if by wine.
  - type: text
    content: Their children, too, will see it and be glad;
  - type: text
    content: 'their hearts will rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: .
  '8':
  - type: text
    content: When I whistle to them, they will come running,
  - type: text
    content: for I have redeemed them.
  - type: text
    content: From the few who are left,
  - type: text
    content: they will grow as numerous as they were before.
  '9':
  - type: text
    content: Though I have scattered them like seeds among the nations,
  - type: text
    content: they will still remember me in distant lands.
  - type: text
    content: They and their children will survive
  - type: text
    content: and return again to Israel.
