document_id: ZEC.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Will Restore His People'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ask the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for rain in the spring,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he makes the storm clouds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he will send showers of rain
- type: usfm
  marker: q2
  children:
  - type: text
    text: so every field becomes a lush pasture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Household gods give worthless advice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fortune-tellers predict only lies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and interpreters of dreams pronounce
- type: usfm
  marker: q2
  children:
  - type: text
    text: falsehoods that give no comfort.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So my people are wandering like lost sheep;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are attacked because they have no shepherd.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “My anger burns against your shepherds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will punish these leaders.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: these male goats.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies has arrived'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to look after Judah, his flock.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will make them strong and glorious,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a proud warhorse in battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: From Judah will come the cornerstone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the tent peg,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the bow for battle,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the rulers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They will be like mighty warriors in battle,
- type: usfm
  marker: q2
  children:
  - type: text
    text: trampling their enemies in the mud under their feet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Since the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is with them as they fight,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will overthrow even the enemy’s horsemen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “I will strengthen Judah and save Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: save the house of Joseph.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will restore them because of my compassion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will be as though I had never rejected them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God, who will hear their cries.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The people of Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of Ephraim.
    marker-yv: yv-n
  - type: text
    text: ' will become like mighty warriors,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their hearts will be made happy as if by wine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their children, too, will see it and be glad;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'their hearts will rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: When I whistle to them, they will come running,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have redeemed them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the few who are left,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will grow as numerous as they were before.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Though I have scattered them like seeds among the nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will still remember me in distant lands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They and their children will survive
- type: usfm
  marker: q2
  children:
  - type: text
    text: and return again to Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I will bring them back from Egypt
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gather them from Assyria.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will resettle them in Gilead and Lebanon
- type: usfm
  marker: q2
  children:
  - type: text
    text: until there is no more room for them all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They will pass safely through the sea of distress,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the sea of Egypt, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: referring to the Red Sea.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the waves of the sea will be held back,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the waters of the Nile will dry up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The pride of Assyria will be crushed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the rule of Egypt will end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: By my power
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'In the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' I will make my people strong,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and by my authority they will go wherever they wish.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
