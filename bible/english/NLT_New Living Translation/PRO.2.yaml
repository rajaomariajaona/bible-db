document_id: PRO.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Benefits of Wisdom
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My child,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: My son.
      marker-yv: yv-n
    - type: text
      text: ' listen to what I say,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and treasure my commands.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For wisdom will enter your heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and knowledge will fill you with joy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Wise choices will watch over you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Understanding will keep you safe.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Wisdom will save you from evil people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from those whose words are twisted.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: These men turn from the right way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to walk down dark paths.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: They take pleasure in doing wrong,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they enjoy the twisted ways of evil.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Their actions are crooked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their ways are wrong.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Wisdom will save you from the immoral woman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the seductive words of the promiscuous woman.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: She has abandoned her husband
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ignores the covenant she made before God.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Entering her house leads to death;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is the road to the grave.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to the spirits of the dead.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The man who visits her is doomed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will never reach the paths of life.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tune your ears to wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and concentrate on understanding.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So follow the steps of the good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stay on the paths of the righteous.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: For only the godly will live in the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those with integrity will remain in it.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: But the wicked will be removed from the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the treacherous will be uprooted.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Cry out for insight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ask for understanding.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Search for them as you would for silver;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: seek them like hidden treasures.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then you will understand what it means to fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will gain knowledge of God.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' grants wisdom!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From his mouth come knowledge and understanding.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: He grants a treasure of common sense to the honest.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is a shield to those who walk with integrity.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He guards the paths of the just
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and protects those who are faithful to him.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then you will understand what is right, just, and fair,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will find the right way to go.
