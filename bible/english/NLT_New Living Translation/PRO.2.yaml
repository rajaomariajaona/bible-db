document_id: PRO.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Benefits of Wisdom
  - type: text
    content: My child,
  - type: note
    content: Hebrew My son.
  - type: text
    content: ' listen to what I say,'
  - type: text
    content: and treasure my commands.
  '10':
  - type: text
    content: For wisdom will enter your heart,
  - type: text
    content: and knowledge will fill you with joy.
  '11':
  - type: text
    content: Wise choices will watch over you.
  - type: text
    content: Understanding will keep you safe.
  '12':
  - type: text
    content: Wisdom will save you from evil people,
  - type: text
    content: from those whose words are twisted.
  '13':
  - type: text
    content: These men turn from the right way
  - type: text
    content: to walk down dark paths.
  '14':
  - type: text
    content: They take pleasure in doing wrong,
  - type: text
    content: and they enjoy the twisted ways of evil.
  '15':
  - type: text
    content: Their actions are crooked,
  - type: text
    content: and their ways are wrong.
  '16':
  - type: text
    content: Wisdom will save you from the immoral woman,
  - type: text
    content: from the seductive words of the promiscuous woman.
  '17':
  - type: text
    content: She has abandoned her husband
  - type: text
    content: and ignores the covenant she made before God.
  '18':
  - type: text
    content: Entering her house leads to death;
  - type: text
    content: it is the road to the grave.
  - type: note
    content: Hebrew to the spirits of the dead.
  '19':
  - type: text
    content: The man who visits her is doomed.
  - type: text
    content: He will never reach the paths of life.
  '2':
  - type: text
    content: Tune your ears to wisdom,
  - type: text
    content: and concentrate on understanding.
  '20':
  - type: text
    content: So follow the steps of the good,
  - type: text
    content: and stay on the paths of the righteous.
  '21':
  - type: text
    content: For only the godly will live in the land,
  - type: text
    content: and those with integrity will remain in it.
  '22':
  - type: text
    content: But the wicked will be removed from the land,
  - type: text
    content: and the treacherous will be uprooted.
  '3':
  - type: text
    content: Cry out for insight,
  - type: text
    content: and ask for understanding.
  '4':
  - type: text
    content: Search for them as you would for silver;
  - type: text
    content: seek them like hidden treasures.
  '5':
  - type: text
    content: 'Then you will understand what it means to fear the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and you will gain knowledge of God.
  '6':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' grants wisdom!'
  - type: text
    content: From his mouth come knowledge and understanding.
  '7':
  - type: text
    content: He grants a treasure of common sense to the honest.
  - type: text
    content: He is a shield to those who walk with integrity.
  '8':
  - type: text
    content: He guards the paths of the just
  - type: text
    content: and protects those who are faithful to him.
  '9':
  - type: text
    content: Then you will understand what is right, just, and fair,
  - type: text
    content: and you will find the right way to go.
