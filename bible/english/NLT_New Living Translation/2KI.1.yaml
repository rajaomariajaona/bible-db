document_id: 2KI.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elijah Confronts King Ahaziah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: After King Ahab’s death, the land of Moab rebelled against Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: One day Israel’s new king, Ahaziah, fell through the latticework of an upper room at his palace in Samaria and was seriously injured. So he sent messengers to the temple of Baal-zebub, the god of Ekron, to ask whether he would recover.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told Elijah, who was from Tishbe, “Go and confront the messengers of the king of Samaria and ask them, ‘Is there no God in Israel? Why are you going to Baal-zebub, the god of Ekron, to ask whether the king will recover? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now, therefore, this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: You will never leave the bed you are lying on; you will surely die.’” So Elijah went to deliver the message.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: When the messengers returned to the king, he asked them, “Why have you returned so soon?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They replied, “A man came up to us and told us to go back to the king and give him this message. ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Is there no God in Israel? Why are you sending men to Baal-zebub, the god of Ekron, to ask whether you will recover? Therefore, because you have done this, you will never leave the bed you are lying on; you will surely die.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “What sort of man was he?” the king demanded. “What did he look like?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They replied, “He was a hairy man,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: He was wearing clothing made of hair.
    marker-yv: yv-n
  - type: text
    text: ' and he wore a leather belt around his waist.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: “Elijah from Tishbe!” the king exclaimed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then he sent an army captain with fifty soldiers to arrest him. They found him sitting on top of a hill. The captain said to him, “Man of God, the king has commanded you to come down with us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But Elijah replied to the captain, “If I am a man of God, let fire come down from heaven and destroy you and your fifty men!” Then fire fell from heaven and killed them all.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So the king sent another captain with fifty men. The captain said to him, “Man of God, the king demands that you come down at once.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Elijah replied, “If I am a man of God, let fire come down from heaven and destroy you and your fifty men!” And again the fire of God fell from heaven and killed them all.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Once more the king sent a third captain with fifty men. But this time the captain went up the hill and fell to his knees before Elijah. He pleaded with him, “O man of God, please spare my life and the lives of these, your fifty servants. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: See how the fire from heaven came down and destroyed the first two groups. But now please spare my life!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Elijah, “Go down with him, and don’t be afraid of him.” So Elijah got up and went with him to the king.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Elijah said to the king, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Why did you send messengers to Baal-zebub, the god of Ekron, to ask whether you will recover? Is there no God in Israel to answer your question? Therefore, because you have done this, you will never leave the bed you are lying on; you will surely die.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So Ahaziah died, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had promised through Elijah. Since Ahaziah did not have a son to succeed him, his brother Joram'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jehoram, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Joram.
    marker-yv: yv-n
  - type: text
    text: ' became the next king. This took place in the second year of the reign of Jehoram son of Jehoshaphat, king of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The rest of the events in Ahaziah’s reign and everything he did are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Israel.
