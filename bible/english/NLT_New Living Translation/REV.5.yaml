document_id: REV.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lamb Opens the Scroll
  - type: text
    content: Then I saw a scroll
  - type: note
    content: Or book; also in 5:2, 3, 4, 5, 7, 8, 9.
  - type: text
    content: ' in the right hand of the one who was sitting on the throne. There was writing on the inside and the outside of the scroll, and it was sealed with seven seals. '
  '10':
  - type: text
    content: And you have caused them to become
  - type: text
    content: a Kingdom of priests for our God.
  - type: text
    content: And they will reign
  - type: note
    content: Some manuscripts read they are reigning.
  - type: text
    content: ' on the earth.”'
  '11':
  - type: text
    content: 'Then I looked again, and I heard the voices of thousands and millions of angels around the throne and of the living beings and the elders. '
  '12':
  - type: text
    content: 'And they sang in a mighty chorus:'
  - type: text
    content: “Worthy is the Lamb who was slaughtered—
  - type: text
    content: to receive power and riches
  - type: text
    content: and wisdom and strength
  - type: text
    content: and honor and glory and blessing.”
  '13':
  - type: text
    content: 'And then I heard every creature in heaven and on earth and under the earth and in the sea. They sang:'
  - type: text
    content: “Blessing and honor and glory and power
  - type: text
    content: belong to the one sitting on the throne
  - type: text
    content: and to the Lamb forever and ever.”
  '14':
  - type: text
    content: And the four living beings said, “Amen!” And the twenty-four elders fell down and worshiped the Lamb.
  '2':
  - type: text
    content: 'And I saw a strong angel, who shouted with a loud voice: “Who is worthy to break the seals on this scroll and open it?” '
  '3':
  - type: text
    content: But no one in heaven or on earth or under the earth was able to open the scroll and read it.
  '4':
  - type: text
    content: 'Then I began to weep bitterly because no one was found worthy to open the scroll and read it. '
  '5':
  - type: text
    content: But one of the twenty-four elders said to me, “Stop weeping! Look, the Lion of the tribe of Judah, the heir to David’s throne,
  - type: note
    content: Greek the root of David. See Isa 11:10.
  - type: text
    content: ' has won the victory. He is worthy to open the scroll and its seven seals.”'
  '6':
  - type: text
    content: Then I saw a Lamb that looked as if it had been slaughtered, but it was now standing between the throne and the four living beings and among the twenty-four elders. He had seven horns and seven eyes, which represent the sevenfold Spirit
  - type: note
    content: Greek which are the seven spirits.
  - type: text
    content: ' of God that is sent out into every part of the earth. '
  '7':
  - type: text
    content: 'He stepped forward and took the scroll from the right hand of the one sitting on the throne. '
  '8':
  - type: text
    content: 'And when he took the scroll, the four living beings and the twenty-four elders fell down before the Lamb. Each one had a harp, and they held gold bowls filled with incense, which are the prayers of God’s people. '
  '9':
  - type: text
    content: 'And they sang a new song with these words:'
  - type: text
    content: “You are worthy to take the scroll
  - type: text
    content: and break its seals and open it.
  - type: text
    content: For you were slaughtered, and your blood has ransomed people for God
  - type: text
    content: from every tribe and language and people and nation.
