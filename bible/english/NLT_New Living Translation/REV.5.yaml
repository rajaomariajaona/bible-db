document_id: REV.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Lamb Opens the Scroll
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then I saw a scroll
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'book; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 5:2, 3, 4, 5, 7, 8, 9.
      marker-yv: yv-n
    - type: text
      text: ' in the right hand of the one who was sitting on the throne. There was writing on the inside and the outside of the scroll, and it was sealed with seven seals. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And you have caused them to become
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a Kingdom of priests for our God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they will reign
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: they are reigning.
      marker-yv: yv-n
    - type: text
      text: ' on the earth.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then I looked again, and I heard the voices of thousands and millions of angels around the throne and of the living beings and the elders. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And they sang in a mighty chorus:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Worthy is the Lamb who was slaughtered—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to receive power and riches
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and wisdom and strength
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and honor and glory and blessing.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And then I heard every creature in heaven and on earth and under the earth and in the sea. They sang:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Blessing and honor and glory and power
  - type: usfm
    marker: q2
    children:
    - type: text
      text: belong to the one sitting on the throne
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to the Lamb forever and ever.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: And the four living beings said, “Amen!” And the twenty-four elders fell down and worshiped the Lamb.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And I saw a strong angel, who shouted with a loud voice: “Who is worthy to break the seals on this scroll and open it?” '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But no one in heaven or on earth or under the earth was able to open the scroll and read it.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then I began to weep bitterly because no one was found worthy to open the scroll and read it. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But one of the twenty-four elders said to me, “Stop weeping! Look, the Lion of the tribe of Judah, the heir to David’s throne,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the root of David. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Isa 11:10.
      marker-yv: yv-n
    - type: text
      text: ' has won the victory. He is worthy to open the scroll and its seven seals.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then I saw a Lamb that looked as if it had been slaughtered, but it was now standing between the throne and the four living beings and among the twenty-four elders. He had seven horns and seven eyes, which represent the sevenfold Spirit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: which are the seven spirits.
      marker-yv: yv-n
    - type: text
      text: ' of God that is sent out into every part of the earth. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'He stepped forward and took the scroll from the right hand of the one sitting on the throne. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And when he took the scroll, the four living beings and the twenty-four elders fell down before the Lamb. Each one had a harp, and they held gold bowls filled with incense, which are the prayers of God’s people. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And they sang a new song with these words:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You are worthy to take the scroll
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and break its seals and open it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you were slaughtered, and your blood has ransomed people for God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from every tribe and language and people and nation.
