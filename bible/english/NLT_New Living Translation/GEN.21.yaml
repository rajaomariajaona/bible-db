document_id: GEN.21,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Birth of Isaac
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' kept his word and did for Sarah exactly what he had promised. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: So she turned to Abraham and demanded, “Get rid of that slave woman and her son. He is not going to share the inheritance with my son, Isaac. I won’t have it!”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'This upset Abraham very much because Ishmael was his son. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But God told Abraham, “Do not be upset over the boy and your servant. Do whatever Sarah tells you, for Isaac is the son through whom your descendants will be counted. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But I will also make a nation of the descendants of Hagar’s son because he is your son, too.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So Abraham got up early the next morning, prepared food and a container of water, and strapped them on Hagar’s shoulders. Then he sent her away with their son, and she wandered aimlessly in the wilderness of Beersheba.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'When the water was gone, she put the boy in the shade of a bush. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Then she went and sat down by herself about a hundred yards
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a bowshot.
      marker-yv: yv-n
    - type: text
      text: ' away. “I don’t want to watch the boy die,” she said, as she burst into tears.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But God heard the boy crying, and the angel of God called to Hagar from heaven, “Hagar, what’s wrong? Do not be afraid! God has heard the boy crying as he lies there. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Go to him and comfort him, for I will make a great nation from his descendants.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then God opened Hagar’s eyes, and she saw a well full of water. She quickly filled her water container and gave the boy a drink.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'She became pregnant, and she gave birth to a son for Abraham in his old age. This happened at just the time God had said it would. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And God was with the boy as he grew up in the wilderness. He became a skillful archer, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: and he settled in the wilderness of Paran. His mother arranged for him to marry a woman from the land of Egypt.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abraham’s Covenant with Abimelech
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'About this time, Abimelech came with Phicol, his army commander, to visit Abraham. “God is obviously with you, helping you in everything you do,” Abimelech said. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “Swear to me in God’s name that you will never deceive me, my children, or any of my descendants. I have been loyal to you, so now swear that you will be loyal to me and to this country where you are living as a foreigner.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Abraham replied, “Yes, I swear to it!” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Then Abraham complained to Abimelech about a well that Abimelech’s servants had taken by force from Abraham’s servants.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “This is the first I’ve heard of it,” Abimelech answered. “I have no idea who is responsible. You have never complained about this before.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Abraham then gave some of his sheep, goats, and cattle to Abimelech, and they made a treaty. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'But Abraham also took seven additional female lambs and set them off by themselves. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Abimelech asked, “Why have you set these seven apart from the others?”
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And Abraham named their son Isaac. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Abraham replied, “Please accept these seven lambs to show your agreement that I dug this well.” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Then he named the place Beersheba (which means “well of the oath”), because that was where they had sworn the oath.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'After making their covenant at Beersheba, Abimelech left with Phicol, the commander of his army, and they returned home to the land of the Philistines. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Then Abraham planted a tamarisk tree at Beersheba, and there he worshiped the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the Eternal God.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: El-Olam.
      marker-yv: yv-n
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: And Abraham lived as a foreigner in Philistine country for a long time.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Eight days after Isaac was born, Abraham circumcised him as God had commanded. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Abraham was 100 years old when Isaac was born.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And Sarah declared, “God has brought me laughter.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The name '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Isaac '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “he laughs.”
      marker-yv: yv-n
    - type: text
      text: ' All who hear about this will laugh with me. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Who would have said to Abraham that Sarah would nurse a baby? Yet I have given Abraham a son in his old age!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hagar and Ishmael Are Sent Away
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'When Isaac grew up and was about to be weaned, Abraham prepared a huge feast to celebrate the occasion. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: But Sarah saw Ishmael—the son of Abraham and her Egyptian servant Hagar—making fun of her son, Isaac.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version and Latin Vulgate; Hebrew lacks '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of her son, Isaac.
      marker-yv: yv-n
    - type: text
      text: ' '
