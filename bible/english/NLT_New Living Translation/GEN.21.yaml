document_id: GEN.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Birth of Isaac
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' kept his word and did for Sarah exactly what he had promised. '
  '10':
  - type: text
    content: So she turned to Abraham and demanded, “Get rid of that slave woman and her son. He is not going to share the inheritance with my son, Isaac. I won’t have it!”
  '11':
  - type: text
    content: 'This upset Abraham very much because Ishmael was his son. '
  '12':
  - type: text
    content: 'But God told Abraham, “Do not be upset over the boy and your servant. Do whatever Sarah tells you, for Isaac is the son through whom your descendants will be counted. '
  '13':
  - type: text
    content: But I will also make a nation of the descendants of Hagar’s son because he is your son, too.”
  '14':
  - type: text
    content: So Abraham got up early the next morning, prepared food and a container of water, and strapped them on Hagar’s shoulders. Then he sent her away with their son, and she wandered aimlessly in the wilderness of Beersheba.
  '15':
  - type: text
    content: 'When the water was gone, she put the boy in the shade of a bush. '
  '16':
  - type: text
    content: Then she went and sat down by herself about a hundred yards
  - type: note
    content: Hebrew a bowshot.
  - type: text
    content: ' away. “I don’t want to watch the boy die,” she said, as she burst into tears.'
  '17':
  - type: text
    content: 'But God heard the boy crying, and the angel of God called to Hagar from heaven, “Hagar, what’s wrong? Do not be afraid! God has heard the boy crying as he lies there. '
  '18':
  - type: text
    content: Go to him and comfort him, for I will make a great nation from his descendants.”
  '19':
  - type: text
    content: Then God opened Hagar’s eyes, and she saw a well full of water. She quickly filled her water container and gave the boy a drink.
  '2':
  - type: text
    content: 'She became pregnant, and she gave birth to a son for Abraham in his old age. This happened at just the time God had said it would. '
  '20':
  - type: text
    content: 'And God was with the boy as he grew up in the wilderness. He became a skillful archer, '
  '21':
  - type: text
    content: and he settled in the wilderness of Paran. His mother arranged for him to marry a woman from the land of Egypt.
  - type: heading
    content: Abraham’s Covenant with Abimelech
  '22':
  - type: text
    content: 'About this time, Abimelech came with Phicol, his army commander, to visit Abraham. “God is obviously with you, helping you in everything you do,” Abimelech said. '
  '23':
  - type: text
    content: “Swear to me in God’s name that you will never deceive me, my children, or any of my descendants. I have been loyal to you, so now swear that you will be loyal to me and to this country where you are living as a foreigner.”
  '24':
  - type: text
    content: 'Abraham replied, “Yes, I swear to it!” '
  '25':
  - type: text
    content: Then Abraham complained to Abimelech about a well that Abimelech’s servants had taken by force from Abraham’s servants.
  '26':
  - type: text
    content: “This is the first I’ve heard of it,” Abimelech answered. “I have no idea who is responsible. You have never complained about this before.”
  '27':
  - type: text
    content: 'Abraham then gave some of his sheep, goats, and cattle to Abimelech, and they made a treaty. '
  '28':
  - type: text
    content: 'But Abraham also took seven additional female lambs and set them off by themselves. '
  '29':
  - type: text
    content: Abimelech asked, “Why have you set these seven apart from the others?”
  '3':
  - type: text
    content: 'And Abraham named their son Isaac. '
  '30':
  - type: text
    content: 'Abraham replied, “Please accept these seven lambs to show your agreement that I dug this well.” '
  '31':
  - type: text
    content: Then he named the place Beersheba (which means “well of the oath”), because that was where they had sworn the oath.
  '32':
  - type: text
    content: 'After making their covenant at Beersheba, Abimelech left with Phicol, the commander of his army, and they returned home to the land of the Philistines. '
  '33':
  - type: text
    content: 'Then Abraham planted a tamarisk tree at Beersheba, and there he worshiped the '
  - type: text
    content: Lord
  - type: text
    content: ', the Eternal God.'
  - type: note
    content: Hebrew El-Olam.
  - type: text
    content: ' '
  '34':
  - type: text
    content: And Abraham lived as a foreigner in Philistine country for a long time.
  '4':
  - type: text
    content: 'Eight days after Isaac was born, Abraham circumcised him as God had commanded. '
  '5':
  - type: text
    content: Abraham was 100 years old when Isaac was born.
  '6':
  - type: text
    content: And Sarah declared, “God has brought me laughter.
  - type: note
    content: The name Isaac means “he laughs.”
  - type: text
    content: ' All who hear about this will laugh with me. '
  '7':
  - type: text
    content: Who would have said to Abraham that Sarah would nurse a baby? Yet I have given Abraham a son in his old age!”
  - type: heading
    content: Hagar and Ishmael Are Sent Away
  '8':
  - type: text
    content: 'When Isaac grew up and was about to be weaned, Abraham prepared a huge feast to celebrate the occasion. '
  '9':
  - type: text
    content: But Sarah saw Ishmael—the son of Abraham and her Egyptian servant Hagar—making fun of her son, Isaac.
  - type: note
    content: As in Greek version and Latin Vulgate; Hebrew lacks of her son, Isaac.
  - type: text
    content: ' '
