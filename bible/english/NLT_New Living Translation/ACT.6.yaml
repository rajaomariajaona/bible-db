document_id: ACT.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Seven Men Chosen to Serve
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: But as the believers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'disciples; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 6:2, 7.
    marker-yv: yv-n
  - type: text
    text: ' rapidly multiplied, there were rumblings of discontent. The Greek-speaking believers complained about the Hebrew-speaking believers, saying that their widows were being discriminated against in the daily distribution of food.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So the Twelve called a meeting of all the believers. They said, “We apostles should spend our time teaching the word of God, not running a food program. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And so, brothers, select seven men who are well respected and are full of the Spirit and wisdom. We will give them this responsibility. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then we apostles can spend our time in prayer and teaching the word.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Everyone liked this idea, and they chose the following: Stephen (a man full of faith and the Holy Spirit), Philip, Procorus, Nicanor, Timon, Parmenas, and Nicolas of Antioch (an earlier convert to the Jewish faith). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: These seven were presented to the apostles, who prayed for them as they laid their hands on them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So God’s message continued to spread. The number of believers greatly increased in Jerusalem, and many of the Jewish priests were converted, too.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Stephen Is Arrested
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Stephen, a man full of God’s grace and power, performed amazing miracles and signs among the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But one day some men from the Synagogue of Freed Slaves, as it was called, started to debate with him. They were Jews from Cyrene, Alexandria, Cilicia, and the province of Asia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: None of them could stand against the wisdom and the Spirit with which Stephen spoke.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So they persuaded some men to lie about Stephen, saying, “We heard him blaspheme Moses, and even God.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: This roused the people, the elders, and the teachers of religious law. So they arrested Stephen and brought him before the high council.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sanhedrin; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 6:15.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The lying witnesses said, “This man is always speaking against the holy Temple and against the law of Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: We have heard him say that this Jesus of Nazareth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jesus the Nazarene.
    marker-yv: yv-n
  - type: text
    text: ' will destroy the Temple and change the customs Moses handed down to us.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: At this point everyone in the high council stared at Stephen, because his face became as bright as an angel’s.
