document_id: ACT.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Seven Men Chosen to Serve
  - type: text
    content: But as the believers
  - type: note
    content: Greek disciples; also in 6:2, 7.
  - type: text
    content: ' rapidly multiplied, there were rumblings of discontent. The Greek-speaking believers complained about the Hebrew-speaking believers, saying that their widows were being discriminated against in the daily distribution of food.'
  '10':
  - type: text
    content: None of them could stand against the wisdom and the Spirit with which Stephen spoke.
  '11':
  - type: text
    content: 'So they persuaded some men to lie about Stephen, saying, “We heard him blaspheme Moses, and even God.” '
  '12':
  - type: text
    content: This roused the people, the elders, and the teachers of religious law. So they arrested Stephen and brought him before the high council.
  - type: note
    content: Greek Sanhedrin; also in 6:15.
  '13':
  - type: text
    content: 'The lying witnesses said, “This man is always speaking against the holy Temple and against the law of Moses. '
  '14':
  - type: text
    content: We have heard him say that this Jesus of Nazareth
  - type: note
    content: Or Jesus the Nazarene.
  - type: text
    content: ' will destroy the Temple and change the customs Moses handed down to us.”'
  '15':
  - type: text
    content: At this point everyone in the high council stared at Stephen, because his face became as bright as an angel’s.
  '2':
  - type: text
    content: 'So the Twelve called a meeting of all the believers. They said, “We apostles should spend our time teaching the word of God, not running a food program. '
  '3':
  - type: text
    content: 'And so, brothers, select seven men who are well respected and are full of the Spirit and wisdom. We will give them this responsibility. '
  '4':
  - type: text
    content: Then we apostles can spend our time in prayer and teaching the word.”
  '5':
  - type: text
    content: 'Everyone liked this idea, and they chose the following: Stephen (a man full of faith and the Holy Spirit), Philip, Procorus, Nicanor, Timon, Parmenas, and Nicolas of Antioch (an earlier convert to the Jewish faith). '
  '6':
  - type: text
    content: These seven were presented to the apostles, who prayed for them as they laid their hands on them.
  '7':
  - type: text
    content: So God’s message continued to spread. The number of believers greatly increased in Jerusalem, and many of the Jewish priests were converted, too.
  - type: heading
    content: Stephen Is Arrested
  '8':
  - type: text
    content: 'Stephen, a man full of God’s grace and power, performed amazing miracles and signs among the people. '
  '9':
  - type: text
    content: 'But one day some men from the Synagogue of Freed Slaves, as it was called, started to debate with him. They were Jews from Cyrene, Alexandria, Cilicia, and the province of Asia. '
