document_id: PSA.67,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A song. A psalm, to be accompanied by stringed instruments.'
  - type: text
    content: May God be merciful and bless us.
  - type: text
    content: 'May his face smile with favor on us. '
  - type: text
    content: Interlude
  '2':
  - type: text
    content: May your ways be known throughout the earth,
  - type: text
    content: your saving power among people everywhere.
  '3':
  - type: text
    content: May the nations praise you, O God.
  - type: text
    content: Yes, may all the nations praise you.
  '4':
  - type: text
    content: Let the whole world sing for joy,
  - type: text
    content: because you govern the nations with justice
  - type: text
    content: 'and guide the people of the whole world. '
  - type: text
    content: Interlude
  '5':
  - type: text
    content: May the nations praise you, O God.
  - type: text
    content: Yes, may all the nations praise you.
  '6':
  - type: text
    content: Then the earth will yield its harvests,
  - type: text
    content: and God, our God, will richly bless us.
  '7':
  - type: text
    content: Yes, God will bless us,
  - type: text
    content: and people all over the world will fear him.
