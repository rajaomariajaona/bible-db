document_id: PSA.67,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A song. A psalm, to be accompanied by stringed instruments.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: May God be merciful and bless us.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'May his face smile with favor on us. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: May your ways be known throughout the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your saving power among people everywhere.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: May the nations praise you, O God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, may all the nations praise you.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Let the whole world sing for joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you govern the nations with justice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and guide the people of the whole world. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: May the nations praise you, O God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, may all the nations praise you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then the earth will yield its harvests,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and God, our God, will richly bless us.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Yes, God will bless us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and people all over the world will fear him.
