document_id: PRO.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom Calls for a Hearing
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen as Wisdom calls out!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hear as understanding raises her voice!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Choose my instruction rather than silver,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and knowledge rather than pure gold.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For wisdom is far more valuable than rubies.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nothing you desire can compare with it.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I, Wisdom, live together with good judgment.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I know where to discover knowledge and discernment.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All who fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will hate evil.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore, I hate pride and arrogance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: corruption and perverse speech.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Common sense and success belong to me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Insight and strength are mine.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of me, kings reign,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rulers make just decrees.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rulers lead with my help,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and nobles make righteous judgments.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Hebrew manuscripts and Greek version read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and nobles are judges over the earth.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I love all who love me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Those who search will surely find me.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have riches and honor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as well as enduring wealth and justice.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My gifts are better than gold, even the purest gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my wages better than sterling silver!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the hilltop along the road,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she takes her stand at the crossroads.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I walk in righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in paths of justice.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who love me inherit wealth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will fill their treasuries.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' formed me from the beginning,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before he created anything else.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was appointed in ages past,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the very first, before the earth began.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was born before the oceans were created,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before the springs bubbled forth their waters.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before the mountains were formed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before the hills, I was born—
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: before he had made the earth and fields
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the first handfuls of soil.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was there when he established the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when he drew the horizon on the oceans.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was there when he set the clouds above,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when he established springs deep in the earth.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was there when he set the limits of the seas,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so they would not spread beyond their boundaries.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And when he marked off the earth’s foundations,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By the gates at the entrance to the town,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the road leading in, she cries aloud,
  '30':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I was the architect at his side.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was his constant delight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rejoicing always in his presence.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And how happy I was with the world he created;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how I rejoiced with the human family!
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And so, my children,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: my sons.
      marker-yv: yv-n
    - type: text
      text: ' listen to me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all who follow my ways are joyful.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to my instruction and be wise.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t ignore it.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Joyful are those who listen to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: watching for me daily at my gates,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: waiting for me outside my home!
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For whoever finds me finds life
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and receives favor from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But those who miss me injure themselves.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All who hate me love death.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I call to you, to all of you!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I raise my voice to all people.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You simple people, use good judgment.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You foolish people, show some understanding.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to me! For I have important things to tell you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Everything I say is right,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I speak the truth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and detest every kind of deception.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My advice is wholesome.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There is nothing devious or crooked in it.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My words are plain to anyone with understanding,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: clear to those with knowledge.
