document_id: PRO.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom Calls for a Hearing
  - type: text
    content: Listen as Wisdom calls out!
  - type: text
    content: Hear as understanding raises her voice!
  '10':
  - type: text
    content: Choose my instruction rather than silver,
  - type: text
    content: and knowledge rather than pure gold.
  '11':
  - type: text
    content: For wisdom is far more valuable than rubies.
  - type: text
    content: Nothing you desire can compare with it.
  '12':
  - type: text
    content: “I, Wisdom, live together with good judgment.
  - type: text
    content: I know where to discover knowledge and discernment.
  '13':
  - type: text
    content: 'All who fear the '
  - type: text
    content: Lord
  - type: text
    content: ' will hate evil.'
  - type: text
    content: Therefore, I hate pride and arrogance,
  - type: text
    content: corruption and perverse speech.
  '14':
  - type: text
    content: Common sense and success belong to me.
  - type: text
    content: Insight and strength are mine.
  '15':
  - type: text
    content: Because of me, kings reign,
  - type: text
    content: and rulers make just decrees.
  '16':
  - type: text
    content: Rulers lead with my help,
  - type: text
    content: and nobles make righteous judgments.
  - type: note
    content: Some Hebrew manuscripts and Greek version read and nobles are judges over the earth.
  '17':
  - type: text
    content: “I love all who love me.
  - type: text
    content: Those who search will surely find me.
  '18':
  - type: text
    content: I have riches and honor,
  - type: text
    content: as well as enduring wealth and justice.
  '19':
  - type: text
    content: My gifts are better than gold, even the purest gold,
  - type: text
    content: my wages better than sterling silver!
  '2':
  - type: text
    content: On the hilltop along the road,
  - type: text
    content: she takes her stand at the crossroads.
  '20':
  - type: text
    content: I walk in righteousness,
  - type: text
    content: in paths of justice.
  '21':
  - type: text
    content: Those who love me inherit wealth.
  - type: text
    content: I will fill their treasuries.
  '22':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' formed me from the beginning,'
  - type: text
    content: before he created anything else.
  '23':
  - type: text
    content: I was appointed in ages past,
  - type: text
    content: at the very first, before the earth began.
  '24':
  - type: text
    content: I was born before the oceans were created,
  - type: text
    content: before the springs bubbled forth their waters.
  '25':
  - type: text
    content: Before the mountains were formed,
  - type: text
    content: before the hills, I was born—
  '26':
  - type: text
    content: before he had made the earth and fields
  - type: text
    content: and the first handfuls of soil.
  '27':
  - type: text
    content: I was there when he established the heavens,
  - type: text
    content: when he drew the horizon on the oceans.
  '28':
  - type: text
    content: I was there when he set the clouds above,
  - type: text
    content: when he established springs deep in the earth.
  '29':
  - type: text
    content: I was there when he set the limits of the seas,
  - type: text
    content: so they would not spread beyond their boundaries.
  - type: text
    content: And when he marked off the earth’s foundations,
  '3':
  - type: text
    content: By the gates at the entrance to the town,
  - type: text
    content: on the road leading in, she cries aloud,
  '30':
  - type: text
    content: I was the architect at his side.
  - type: text
    content: I was his constant delight,
  - type: text
    content: rejoicing always in his presence.
  '31':
  - type: text
    content: And how happy I was with the world he created;
  - type: text
    content: how I rejoiced with the human family!
  '32':
  - type: text
    content: “And so, my children,
  - type: note
    content: Hebrew my sons.
  - type: text
    content: ' listen to me,'
  - type: text
    content: for all who follow my ways are joyful.
  '33':
  - type: text
    content: Listen to my instruction and be wise.
  - type: text
    content: Don’t ignore it.
  '34':
  - type: text
    content: Joyful are those who listen to me,
  - type: text
    content: watching for me daily at my gates,
  - type: text
    content: waiting for me outside my home!
  '35':
  - type: text
    content: For whoever finds me finds life
  - type: text
    content: 'and receives favor from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '36':
  - type: text
    content: But those who miss me injure themselves.
  - type: text
    content: All who hate me love death.”
  '4':
  - type: text
    content: “I call to you, to all of you!
  - type: text
    content: I raise my voice to all people.
  '5':
  - type: text
    content: You simple people, use good judgment.
  - type: text
    content: You foolish people, show some understanding.
  '6':
  - type: text
    content: Listen to me! For I have important things to tell you.
  - type: text
    content: Everything I say is right,
  '7':
  - type: text
    content: for I speak the truth
  - type: text
    content: and detest every kind of deception.
  '8':
  - type: text
    content: My advice is wholesome.
  - type: text
    content: There is nothing devious or crooked in it.
  '9':
  - type: text
    content: My words are plain to anyone with understanding,
  - type: text
    content: clear to those with knowledge.
