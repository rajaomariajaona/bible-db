document_id: PRO.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom Calls for a Hearing
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Listen as Wisdom calls out!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hear as understanding raises her voice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: On the hilltop along the road,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she takes her stand at the crossroads.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: By the gates at the entrance to the town,
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the road leading in, she cries aloud,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “I call to you, to all of you!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I raise my voice to all people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You simple people, use good judgment.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You foolish people, show some understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Listen to me! For I have important things to tell you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Everything I say is right,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: for I speak the truth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and detest every kind of deception.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: My advice is wholesome.
- type: usfm
  marker: q2
  children:
  - type: text
    text: There is nothing devious or crooked in it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: My words are plain to anyone with understanding,
- type: usfm
  marker: q2
  children:
  - type: text
    text: clear to those with knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Choose my instruction rather than silver,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and knowledge rather than pure gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For wisdom is far more valuable than rubies.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nothing you desire can compare with it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “I, Wisdom, live together with good judgment.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I know where to discover knowledge and discernment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'All who fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will hate evil.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore, I hate pride and arrogance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: corruption and perverse speech.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Common sense and success belong to me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Insight and strength are mine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Because of me, kings reign,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rulers make just decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Rulers lead with my help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and nobles make righteous judgments.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Hebrew manuscripts and Greek version read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and nobles are judges over the earth.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “I love all who love me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Those who search will surely find me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I have riches and honor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as well as enduring wealth and justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: My gifts are better than gold, even the purest gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my wages better than sterling silver!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I walk in righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in paths of justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Those who love me inherit wealth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will fill their treasuries.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' formed me from the beginning,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: before he created anything else.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I was appointed in ages past,
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the very first, before the earth began.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: I was born before the oceans were created,
- type: usfm
  marker: q2
  children:
  - type: text
    text: before the springs bubbled forth their waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Before the mountains were formed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: before the hills, I was born—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: before he had made the earth and fields
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the first handfuls of soil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: I was there when he established the heavens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he drew the horizon on the oceans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: I was there when he set the clouds above,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he established springs deep in the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: I was there when he set the limits of the seas,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so they would not spread beyond their boundaries.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And when he marked off the earth’s foundations,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: I was the architect at his side.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I was his constant delight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rejoicing always in his presence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: And how happy I was with the world he created;
- type: usfm
  marker: q2
  children:
  - type: text
    text: how I rejoiced with the human family!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “And so, my children,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: my sons.
    marker-yv: yv-n
  - type: text
    text: ' listen to me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all who follow my ways are joyful.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Listen to my instruction and be wise.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t ignore it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Joyful are those who listen to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: watching for me daily at my gates,
- type: usfm
  marker: q2
  children:
  - type: text
    text: waiting for me outside my home!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: For whoever finds me finds life
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and receives favor from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: But those who miss me injure themselves.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All who hate me love death.”
