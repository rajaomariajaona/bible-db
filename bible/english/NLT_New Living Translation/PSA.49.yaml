document_id: PSA.49,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of the descendants of Korah.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to this, all you people!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pay attention, everyone in the world!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who are wise must finally die,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just like the foolish and senseless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaving all their wealth behind.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The grave
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Their inward [thought].
      marker-yv: yv-n
    - type: text
      text: ' is their eternal home,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where they will stay forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They may name their estates after themselves,
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but their fame will not last.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will die, just like animals.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is the fate of fools,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though they are remembered as being wise.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like sheep, they are led to the grave,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sheol; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 49:14b, 15.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where death will be their shepherd.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the morning the godly will rule over them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their bodies will rot in the grave,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: far from their grand estates.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But as for me, God will redeem my life.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He will snatch me from the power of the grave. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So don’t be dismayed when the wicked grow rich
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their homes become ever more splendid.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For when they die, they take nothing with them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their wealth will not follow them into the grave.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In this life they consider themselves fortunate
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and are applauded for their success.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they will die like all before them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and never again see the light of day.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: High and low,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rich and poor—listen!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People who boast of their wealth don’t understand;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will die, just like animals.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my words are wise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my thoughts are filled with insight.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I listen carefully to many proverbs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and solve riddles with inspiration from a harp.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why should I fear when trouble comes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when enemies surround me?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They trust in their wealth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and boast of great riches.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet they cannot redeem themselves from death
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: no one can redeem the life of another.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by paying a ransom to God.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Redemption does not come so easily,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for no one can ever pay enough
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to live forever
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and never see the grave.
