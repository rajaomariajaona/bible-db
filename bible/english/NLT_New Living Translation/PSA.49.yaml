document_id: PSA.49,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of the descendants of Korah.'
  - type: text
    content: Listen to this, all you people!
  - type: text
    content: Pay attention, everyone in the world!
  '10':
  - type: text
    content: Those who are wise must finally die,
  - type: text
    content: just like the foolish and senseless,
  - type: text
    content: leaving all their wealth behind.
  '11':
  - type: text
    content: The grave
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads Their inward [thought].
  - type: text
    content: ' is their eternal home,'
  - type: text
    content: where they will stay forever.
  - type: text
    content: They may name their estates after themselves,
  '12':
  - type: text
    content: but their fame will not last.
  - type: text
    content: They will die, just like animals.
  '13':
  - type: text
    content: This is the fate of fools,
  - type: text
    content: though they are remembered as being wise.
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' '
  - type: text
    content: Interlude
  '14':
  - type: text
    content: Like sheep, they are led to the grave,
  - type: note
    content: Hebrew Sheol; also in 49:14b, 15.
  - type: text
    content: where death will be their shepherd.
  - type: text
    content: In the morning the godly will rule over them.
  - type: text
    content: Their bodies will rot in the grave,
  - type: text
    content: far from their grand estates.
  '15':
  - type: text
    content: But as for me, God will redeem my life.
  - type: text
    content: 'He will snatch me from the power of the grave. '
  - type: text
    content: Interlude
  '16':
  - type: text
    content: So don’t be dismayed when the wicked grow rich
  - type: text
    content: and their homes become ever more splendid.
  '17':
  - type: text
    content: For when they die, they take nothing with them.
  - type: text
    content: Their wealth will not follow them into the grave.
  '18':
  - type: text
    content: In this life they consider themselves fortunate
  - type: text
    content: and are applauded for their success.
  '19':
  - type: text
    content: But they will die like all before them
  - type: text
    content: and never again see the light of day.
  '2':
  - type: text
    content: High and low,
  - type: text
    content: rich and poor—listen!
  '20':
  - type: text
    content: People who boast of their wealth don’t understand;
  - type: text
    content: they will die, just like animals.
  '3':
  - type: text
    content: For my words are wise,
  - type: text
    content: and my thoughts are filled with insight.
  '4':
  - type: text
    content: I listen carefully to many proverbs
  - type: text
    content: and solve riddles with inspiration from a harp.
  '5':
  - type: text
    content: Why should I fear when trouble comes,
  - type: text
    content: when enemies surround me?
  '6':
  - type: text
    content: They trust in their wealth
  - type: text
    content: and boast of great riches.
  '7':
  - type: text
    content: Yet they cannot redeem themselves from death
  - type: note
    content: Some Hebrew manuscripts read no one can redeem the life of another.
  - type: text
    content: by paying a ransom to God.
  '8':
  - type: text
    content: Redemption does not come so easily,
  - type: text
    content: for no one can ever pay enough
  '9':
  - type: text
    content: to live forever
  - type: text
    content: and never see the grave.
