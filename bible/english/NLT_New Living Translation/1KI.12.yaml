document_id: 1KI.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Northern Tribes Revolt
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehoboam went to Shechem, where all Israel had gathered to make him king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When Jeroboam son of Nebat heard of this, he returned from Egypt,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version and Latin Vulgate (see also 2 Chr 10:2); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he lived in Egypt.
    marker-yv: yv-n
  - type: text
    text: ' for he had fled to Egypt to escape from King Solomon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The leaders of Israel summoned him, and Jeroboam and the whole assembly of Israel went to speak with Rehoboam. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Your father was a hard master,” they said. “Lighten the harsh labor demands and heavy taxes that your father imposed on us. Then we will be your loyal subjects.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rehoboam replied, “Give me three days to think this over. Then come back for my answer.” So the people went away.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then King Rehoboam discussed the matter with the older men who had counseled his father, Solomon. “What is your advice?” he asked. “How should I answer these people?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The older counselors replied, “If you are willing to be a servant to these people today and give them a favorable answer, they will always be your loyal subjects.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But Rehoboam rejected the advice of the older men and instead asked the opinion of the young men who had grown up with him and were now his advisers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “What is your advice?” he asked them. “How should I answer these people who want me to lighten the burdens imposed by my father?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The young men replied, “This is what you should tell those complainers who want a lighter burden: ‘My little finger is thicker than my father’s waist! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Yes, my father laid heavy burdens on you, but I’m going to make them even heavier! My father beat you with whips, but I will beat you with scorpions!’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Three days later Jeroboam and all the people returned to hear Rehoboam’s decision, just as the king had ordered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But Rehoboam spoke harshly to the people, for he rejected the advice of the older counselors '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: and followed the counsel of his younger advisers. He told the people, “My father laid heavy burdens on you, but I’m going to make them even heavier! My father beat you with whips, but I will beat you with scorpions!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So the king paid no attention to the people. This turn of events was the will of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for it fulfilled the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s message to Jeroboam son of Nebat through the prophet Ahijah from Shiloh.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When all Israel realized that the king had refused to listen to them, they responded,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Down with the dynasty of David!
- type: usfm
  marker: q2
  children:
  - type: text
    text: We have no interest in the son of Jesse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Back to your homes, O Israel!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Look out for your own house, O David!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So the people of Israel returned home. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But Rehoboam continued to rule over the Israelites who lived in the towns of Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: King Rehoboam sent Adoniram,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Greek manuscripts and Syriac version (see also 4:6; 5:14); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Adoram.
    marker-yv: yv-n
  - type: text
    text: ' who was in charge of forced labor, to restore order, but the people of Israel stoned him to death. When this news reached King Rehoboam, he quickly jumped into his chariot and fled to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And to this day the northern tribes of Israel have refused to be ruled by a descendant of David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: When the people of Israel learned of Jeroboam’s return from Egypt, they called an assembly and made him king over all Israel. So only the tribe of Judah remained loyal to the family of David.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Shemaiah’s Prophecy
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: When Rehoboam arrived at Jerusalem, he mobilized the men of Judah and the tribe of Benjamin—180,000 select troops—to fight against the men of Israel and to restore the kingdom to himself.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But God said to Shemaiah, the man of God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“Say to Rehoboam son of Solomon, king of Judah, and to all the people of Judah and Benjamin, and to the rest of the people, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Do not fight against your relatives, the Israelites. Go back home, for what has happened is my doing!’” So they obeyed the message of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and went home, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeroboam Makes Gold Calves
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Jeroboam then built up the city of Shechem in the hill country of Ephraim, and it became his capital. Later he went and built up the town of Peniel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Penuel, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Peniel.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jeroboam thought to himself, “Unless I am careful, the kingdom will return to the dynasty of David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'When these people go to Jerusalem to offer sacrifices at the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', they will again give their allegiance to King Rehoboam of Judah. They will kill me and make him their king instead.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: So on the advice of his counselors, the king made two gold calves. He said to the people,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to them.
    marker-yv: yv-n
  - type: text
    text: ' “It is too much trouble for you to worship in Jerusalem. Look, Israel, these are the gods who brought you out of Egypt!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'He placed these calf idols in Bethel and in Dan—at either end of his kingdom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: But this became a great sin, for the people worshiped the idols, traveling as far north as Dan to worship the one there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jeroboam also erected buildings at the pagan shrines and ordained priests from the common people—those who were not from the priestly tribe of Levi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: And Jeroboam instituted a religious festival in Bethel, held on the fifteenth day of the eighth month,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This day of the ancient Hebrew lunar calendar occurred in late October or early November, exactly one month after the annual Festival of Shelters in Judah (see Lev 23:34).
    marker-yv: yv-n
  - type: text
    text: ' in imitation of the annual Festival of Shelters in Judah. There at Bethel he himself offered sacrifices to the calves he had made, and he appointed priests for the pagan shrines he had made. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: So on the fifteenth day of the eighth month, a day that he himself had designated, Jeroboam offered sacrifices on the altar at Bethel. He instituted a religious festival for Israel, and he went up to the altar to burn incense.
