document_id: ISA.62,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Isaiah’s Prayer for Jerusalem
  - type: text
    content: Because I love Zion,
  - type: text
    content: I will not keep still.
  - type: text
    content: Because my heart yearns for Jerusalem,
  - type: text
    content: I cannot remain silent.
  - type: text
    content: I will not stop praying for her
  - type: text
    content: until her righteousness shines like the dawn,
  - type: text
    content: and her salvation blazes like a burning torch.
  '10':
  - type: text
    content: Go out through the gates!
  - type: text
    content: Prepare the highway for my people to return!
  - type: text
    content: Smooth out the road; pull out the boulders;
  - type: text
    content: raise a flag for all the nations to see.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has sent this message to every land:'
  - type: text
    content: “Tell the people of Israel,
  - type: note
    content: Hebrew Tell the daughter of Zion.
  - type: text
    content: ‘Look, your Savior is coming.
  - type: text
    content: See, he brings his reward with him as he comes.’”
  '12':
  - type: text
    content: They will be called “The Holy People”
  - type: text
    content: 'and “The People Redeemed by the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: text
    content: And Jerusalem will be known as “The Desirable Place”
  - type: text
    content: and “The City No Longer Forsaken.”
  '2':
  - type: text
    content: The nations will see your righteousness.
  - type: text
    content: World leaders will be blinded by your glory.
  - type: text
    content: And you will be given a new name
  - type: text
    content: 'by the '
  - type: text
    content: Lord
  - type: text
    content: ’s own mouth.
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will hold you in his hand for all to see—'
  - type: text
    content: a splendid crown in the hand of God.
  '4':
  - type: text
    content: Never again will you be called “The Forsaken City”
  - type: note
    content: Hebrew Azubah, which means “forsaken.”
  - type: text
    content: or “The Desolate Land.”
  - type: note
    content: Hebrew Shemamah, which means “desolate.”
  - type: text
    content: Your new name will be “The City of God’s Delight”
  - type: note
    content: Hebrew Hephzibah, which means “my delight is in her.”
  - type: text
    content: and “The Bride of God,”
  - type: note
    content: Hebrew Beulah, which means “married.”
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' delights in you'
  - type: text
    content: and will claim you as his bride.
  '5':
  - type: text
    content: Your children will commit themselves to you, O Jerusalem,
  - type: text
    content: just as a young man commits himself to his bride.
  - type: text
    content: Then God will rejoice over you
  - type: text
    content: as a bridegroom rejoices over his bride.
  '6':
  - type: text
    content: O Jerusalem, I have posted watchmen on your walls;
  - type: text
    content: they will pray day and night, continually.
  - type: text
    content: 'Take no rest, all you who pray to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: 'Give the '
  - type: text
    content: Lord
  - type: text
    content: ' no rest until he completes his work,'
  - type: text
    content: until he makes Jerusalem the pride of the earth.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has sworn to Jerusalem by his own strength:'
  - type: text
    content: “I will never again hand you over to your enemies.
  - type: text
    content: Never again will foreign warriors come
  - type: text
    content: and take away your grain and new wine.
  '9':
  - type: text
    content: You raised the grain, and you will eat it,
  - type: text
    content: 'praising the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Within the courtyards of the Temple,
  - type: text
    content: you yourselves will drink the wine you have pressed.”
