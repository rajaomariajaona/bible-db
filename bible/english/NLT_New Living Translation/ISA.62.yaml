document_id: ISA.62,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isaiah’s Prayer for Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because I love Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not keep still.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because my heart yearns for Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I cannot remain silent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not stop praying for her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until her righteousness shines like the dawn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her salvation blazes like a burning torch.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go out through the gates!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Prepare the highway for my people to return!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Smooth out the road; pull out the boulders;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: raise a flag for all the nations to see.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sent this message to every land:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Tell the people of Israel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tell the daughter of Zion.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Look, your Savior is coming.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: See, he brings his reward with him as he comes.’”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be called “The Holy People”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and “The People Redeemed by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Jerusalem will be known as “The Desirable Place”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and “The City No Longer Forsaken.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nations will see your righteousness.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: World leaders will be blinded by your glory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will be given a new name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s own mouth.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will hold you in his hand for all to see—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a splendid crown in the hand of God.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never again will you be called “The Forsaken City”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62:4a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Azubah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: which means “forsaken.”
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or “The Desolate Land.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62:4b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Shemamah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: which means “desolate.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your new name will be “The City of God’s Delight”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62:4c '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hephzibah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: which means “my delight is in her.”
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and “The Bride of God,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '62:4d '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Beulah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: which means “married.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' delights in you'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will claim you as his bride.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your children will commit themselves to you, O Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as a young man commits himself to his bride.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then God will rejoice over you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as a bridegroom rejoices over his bride.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Jerusalem, I have posted watchmen on your walls;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will pray day and night, continually.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Take no rest, all you who pray to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' no rest until he completes his work,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until he makes Jerusalem the pride of the earth.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sworn to Jerusalem by his own strength:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I will never again hand you over to your enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never again will foreign warriors come
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and take away your grain and new wine.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You raised the grain, and you will eat it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'praising the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Within the courtyards of the Temple,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you yourselves will drink the wine you have pressed.”
