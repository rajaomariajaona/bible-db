document_id: ISA.28,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Samaria
  - type: text
    content: What sorrow awaits the proud city of Samaria—
  - type: text
    content: the glorious crown of the drunks of Israel.
  - type: note
    content: Hebrew What sorrow awaits the crowning glory of the drunks of Ephraim, referring to Samaria, capital of the northern kingdom of Israel.
  - type: text
    content: It sits at the head of a fertile valley,
  - type: text
    content: but its glorious beauty will fade like a flower.
  - type: text
    content: It is the pride of a people
  - type: text
    content: brought down by wine.
  '10':
  - type: text
    content: He tells us everything over and over—
  - type: text
    content: one line at a time,
  - type: text
    content: one line at a time,
  - type: text
    content: a little here,
  - type: text
    content: and a little there!”
  '11':
  - type: text
    content: So now God will have to speak to his people
  - type: text
    content: through foreign oppressors who speak a strange language!
  '12':
  - type: text
    content: God has told his people,
  - type: text
    content: “Here is a place of rest;
  - type: text
    content: let the weary rest here.
  - type: text
    content: This is a place of quiet rest.”
  - type: text
    content: But they would not listen.
  '13':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' will spell out his message for them again,'
  - type: text
    content: one line at a time,
  - type: text
    content: one line at a time,
  - type: text
    content: a little here,
  - type: text
    content: and a little there,
  - type: text
    content: so that they will stumble and fall.
  - type: text
    content: They will be injured, trapped, and captured.
  '14':
  - type: text
    content: 'Therefore, listen to this message from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: you scoffing rulers in Jerusalem.
  '15':
  - type: text
    content: You boast, “We have struck a bargain to cheat death
  - type: text
    content: and have made a deal to dodge the grave.
  - type: note
    content: Hebrew Sheol; also in 28:18.
  - type: text
    content: The coming destruction can never touch us,
  - type: text
    content: for we have built a strong refuge made of lies and deception.”
  '16':
  - type: text
    content: 'Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Look! I am placing a foundation stone in Jerusalem,
  - type: note
    content: Hebrew in Zion.
  - type: text
    content: a firm and tested stone.
  - type: text
    content: It is a precious cornerstone that is safe to build on.
  - type: text
    content: Whoever believes need never be shaken.
  - type: note
    content: Greek version reads Look! I am placing a stone in the foundation of Jerusalem [literally Zion], / a precious cornerstone for its foundation, chosen for great honor. / Anyone who trusts in him will never be disgraced. Compare Rom 9:33; 1 Pet 2:6.
  '17':
  - type: text
    content: I will test you with the measuring line of justice
  - type: text
    content: and the plumb line of righteousness.
  - type: text
    content: Since your refuge is made of lies,
  - type: text
    content: a hailstorm will knock it down.
  - type: text
    content: Since it is made of deception,
  - type: text
    content: a flood will sweep it away.
  '18':
  - type: text
    content: I will cancel the bargain you made to cheat death,
  - type: text
    content: and I will overturn your deal to dodge the grave.
  - type: text
    content: When the terrible enemy sweeps through,
  - type: text
    content: you will be trampled into the ground.
  '19':
  - type: text
    content: Again and again that flood will come,
  - type: text
    content: morning after morning,
  - type: text
    content: day and night,
  - type: text
    content: until you are carried away.”
  - type: text
    content: This message will bring terror to your people.
  '2':
  - type: text
    content: For the Lord will send a mighty army against it.
  - type: text
    content: Like a mighty hailstorm and a torrential rain,
  - type: text
    content: they will burst upon it like a surging flood
  - type: text
    content: and smash it to the ground.
  '20':
  - type: text
    content: The bed you have made is too short to lie on.
  - type: text
    content: The blankets are too narrow to cover you.
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will come as he did against the Philistines at Mount Perazim'
  - type: text
    content: and against the Amorites at Gibeon.
  - type: text
    content: He will come to do a strange thing;
  - type: text
    content: 'he will come to do an unusual deed:'
  '22':
  - type: text
    content: 'For the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: has plainly said that he is determined to crush the whole land.
  - type: text
    content: So scoff no more,
  - type: text
    content: or your punishment will be even greater.
  '23':
  - type: text
    content: Listen to me;
  - type: text
    content: listen, and pay close attention.
  '24':
  - type: text
    content: Does a farmer always plow and never sow?
  - type: text
    content: Is he forever cultivating the soil and never planting?
  '25':
  - type: text
    content: Does he not finally plant his seeds—
  - type: text
    content: black cumin, cumin, wheat, barley, and emmer wheat—
  - type: text
    content: each in its proper way,
  - type: text
    content: and each in its proper place?
  '26':
  - type: text
    content: The farmer knows just what to do,
  - type: text
    content: for God has given him understanding.
  '27':
  - type: text
    content: A heavy sledge is never used to thresh black cumin;
  - type: text
    content: rather, it is beaten with a light stick.
  - type: text
    content: A threshing wheel is never rolled on cumin;
  - type: text
    content: instead, it is beaten lightly with a flail.
  '28':
  - type: text
    content: Grain for bread is easily crushed,
  - type: text
    content: so he doesn’t keep on pounding it.
  - type: text
    content: He threshes it under the wheels of a cart,
  - type: text
    content: but he doesn’t pulverize it.
  '29':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies is a wonderful teacher,'
  - type: text
    content: and he gives the farmer great wisdom.
  '3':
  - type: text
    content: The proud city of Samaria—
  - type: text
    content: the glorious crown of the drunks of Israel
  - type: note
    content: Hebrew The crowning glory of the drunks of Ephraim; see note on 28:1.
  - type: text
    content: —
  - type: text
    content: will be trampled beneath its enemies’ feet.
  '4':
  - type: text
    content: It sits at the head of a fertile valley,
  - type: text
    content: but its glorious beauty will fade like a flower.
  - type: text
    content: Whoever sees it will snatch it up,
  - type: text
    content: as an early fig is quickly picked and eaten.
  '5':
  - type: text
    content: 'Then at last the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies'
  - type: text
    content: will himself be Israel’s glorious crown.
  - type: text
    content: He will be the pride and joy
  - type: text
    content: of the remnant of his people.
  '6':
  - type: text
    content: He will give a longing for justice
  - type: text
    content: to their judges.
  - type: text
    content: He will give great courage
  - type: text
    content: to their warriors who stand at the gates.
  '7':
  - type: text
    content: Now, however, Israel is led by drunks
  - type: text
    content: who reel with wine and stagger with alcohol.
  - type: text
    content: The priests and prophets stagger with alcohol
  - type: text
    content: and lose themselves in wine.
  - type: text
    content: They reel when they see visions
  - type: text
    content: and stagger as they render decisions.
  '8':
  - type: text
    content: Their tables are covered with vomit;
  - type: text
    content: filth is everywhere.
  '9':
  - type: text
    content: '“Who does the '
  - type: text
    content: Lord
  - type: text
    content: ' think we are?” they ask.'
  - type: text
    content: “Why does he speak to us like this?
  - type: text
    content: Are we little children,
  - type: text
    content: just recently weaned?
