document_id: ISA.28,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message about Samaria
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What sorrow awaits the proud city of Samaria—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the glorious crown of the drunks of Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'What sorrow awaits the crowning glory of the drunks of Ephraim, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referring to Samaria, capital of the northern kingdom of Israel.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It sits at the head of a fertile valley,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but its glorious beauty will fade like a flower.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is the pride of a people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: brought down by wine.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He tells us everything over and over—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: one line at a time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one line at a time,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a little here,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a little there!”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So now God will have to speak to his people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through foreign oppressors who speak a strange language!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God has told his people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Here is a place of rest;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the weary rest here.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is a place of quiet rest.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But they would not listen.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will spell out his message for them again,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: one line at a time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one line at a time,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a little here,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a little there,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that they will stumble and fall.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be injured, trapped, and captured.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore, listen to this message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you scoffing rulers in Jerusalem.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You boast, “We have struck a bargain to cheat death
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have made a deal to dodge the grave.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sheol; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 28:18.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The coming destruction can never touch us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for we have built a strong refuge made of lies and deception.”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore, this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look! I am placing a foundation stone in Jerusalem,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:16a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in Zion.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a firm and tested stone.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is a precious cornerstone that is safe to build on.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whoever believes need never be shaken.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:16b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Look! I am placing a stone in the foundation of Jerusalem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[literally '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '], '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '/ a precious cornerstone for its foundation, chosen for great honor. / Anyone who trusts in him will never be disgraced. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Rom 9:33; 1 Pet 2:6.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will test you with the measuring line of justice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the plumb line of righteousness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Since your refuge is made of lies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a hailstorm will knock it down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Since it is made of deception,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a flood will sweep it away.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will cancel the bargain you made to cheat death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will overturn your deal to dodge the grave.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the terrible enemy sweeps through,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will be trampled into the ground.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Again and again that flood will come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: morning after morning,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: day and night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until you are carried away.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This message will bring terror to your people.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the Lord will send a mighty army against it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like a mighty hailstorm and a torrential rain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will burst upon it like a surging flood
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and smash it to the ground.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The bed you have made is too short to lie on.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The blankets are too narrow to cover you.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will come as he did against the Philistines at Mount Perazim'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and against the Amorites at Gibeon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will come to do a strange thing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'he will come to do an unusual deed:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has plainly said that he is determined to crush the whole land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So scoff no more,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or your punishment will be even greater.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen, and pay close attention.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does a farmer always plow and never sow?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is he forever cultivating the soil and never planting?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does he not finally plant his seeds—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: black cumin, cumin, wheat, barley, and emmer wheat—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: each in its proper way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and each in its proper place?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The farmer knows just what to do,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for God has given him understanding.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A heavy sledge is never used to thresh black cumin;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rather, it is beaten with a light stick.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A threshing wheel is never rolled on cumin;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: instead, it is beaten lightly with a flail.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Grain for bread is easily crushed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so he doesn’t keep on pounding it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He threshes it under the wheels of a cart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he doesn’t pulverize it.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies is a wonderful teacher,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he gives the farmer great wisdom.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The proud city of Samaria—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the glorious crown of the drunks of Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The crowning glory of the drunks of Ephraim; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see note on 28:1.
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be trampled beneath its enemies’ feet.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It sits at the head of a fertile valley,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but its glorious beauty will fade like a flower.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever sees it will snatch it up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as an early fig is quickly picked and eaten.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then at last the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will himself be Israel’s glorious crown.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will be the pride and joy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of the remnant of his people.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will give a longing for justice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to their judges.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will give great courage
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to their warriors who stand at the gates.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now, however, Israel is led by drunks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who reel with wine and stagger with alcohol.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The priests and prophets stagger with alcohol
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lose themselves in wine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They reel when they see visions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stagger as they render decisions.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their tables are covered with vomit;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: filth is everywhere.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Who does the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' think we are?” they ask.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Why does he speak to us like this?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are we little children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just recently weaned?
