document_id: GEN.48,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Blesses Manasseh and Ephraim
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: One day not long after this, word came to Joseph, “Your father is failing rapidly.” So Joseph went to visit his father, and he took with him his two sons, Manasseh and Ephraim.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jacob was half blind because of his age and could hardly see. So Joseph brought the boys close to him, and Jacob kissed and embraced them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then Jacob said to Joseph, “I never thought I would see your face again, but now God has let me see your children, too!”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Joseph moved the boys, who were at their grandfather’s knees, and he bowed with his face to the ground. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then he positioned the boys in front of Jacob. With his right hand he directed Ephraim toward Jacob’s left hand, and with his left hand he put Manasseh at Jacob’s right hand. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But Jacob crossed his arms as he reached out to lay his hands on the boys’ heads. He put his right hand on the head of Ephraim, though he was the younger boy, and his left hand on the head of Manasseh, though he was the firstborn. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then he blessed Joseph and said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “May the God before whom my grandfather Abraham
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my father, Isaac, walked—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the God who has been my shepherd
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all my life, to this very day,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: the Angel who has redeemed me from all harm—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may he bless these boys.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May they preserve my name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the names of Abraham and Isaac.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And may their descendants multiply greatly
  - type: usfm
    marker: q2
    children:
    - type: text
      text: throughout the earth.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But Joseph was upset when he saw that his father placed his right hand on Ephraim’s head. So Joseph lifted it to move it from Ephraim’s head to Manasseh’s head. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “No, my father,” he said. “This one is the firstborn. Put your right hand on his head.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: But his father refused. “I know, my son; I know,” he replied. “Manasseh will also become a great people, but his younger brother will become even greater. And his descendants will become a multitude of nations.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: When Joseph arrived, Jacob was told, “Your son Joseph has come to see you.” So Jacob
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Israel; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 48:8, 10, 11, 13, 14, 21. See note on 35:21.
      marker-yv: yv-n
    - type: text
      text: ' gathered his strength and sat up in his bed.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So Jacob blessed the boys that day with this blessing: “The people of Israel will use your names when they give a blessing. They will say, ‘May God make you as prosperous as Ephraim and Manasseh.’” In this way, Jacob put Ephraim ahead of Manasseh.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then Jacob said to Joseph, “Look, I am about to die, but God will be with you and will take you back to Canaan, the land of your ancestors. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: And beyond what I have given your brothers, I am giving you an extra portion of the land
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'an extra ridge of land. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' that I took from the Amorites with my sword and bow.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jacob said to Joseph, “God Almighty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: El-Shaddai.
      marker-yv: yv-n
    - type: text
      text: ' appeared to me at Luz in the land of Canaan and blessed me. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He said to me, ‘I will make you fruitful, and I will multiply your descendants. I will make you a multitude of nations. And I will give this land of Canaan to your descendants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'seed; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 48:19.
      marker-yv: yv-n
    - type: text
      text: ' after you as an everlasting possession.’'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“Now I am claiming as my own sons these two boys of yours, Ephraim and Manasseh, who were born here in the land of Egypt before I arrived. They will be my sons, just as Reuben and Simeon are. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: But any children born to you in the future will be your own, and they will inherit land within the territories of their brothers Ephraim and Manasseh.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Long ago, as I was returning from Paddan-aram,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Paddan, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referring to Paddan-aram; compare Gen 35:9.
      marker-yv: yv-n
    - type: text
      text: ' Rachel died in the land of Canaan. We were still on the way, some distance from Ephrath (that is, Bethlehem). So with great sorrow I buried her there beside the road to Ephrath.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Then Jacob looked over at the two boys. “Are these your sons?” he asked.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Yes,” Joseph told him, “these are the sons God has given me here in Egypt.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Jacob said, “Bring them closer to me, so I can bless them.”
