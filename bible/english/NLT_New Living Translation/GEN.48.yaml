document_id: GEN.48,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Blesses Manasseh and Ephraim
  - type: text
    content: One day not long after this, word came to Joseph, “Your father is failing rapidly.” So Joseph went to visit his father, and he took with him his two sons, Manasseh and Ephraim.
  '10':
  - type: text
    content: 'Jacob was half blind because of his age and could hardly see. So Joseph brought the boys close to him, and Jacob kissed and embraced them. '
  '11':
  - type: text
    content: Then Jacob said to Joseph, “I never thought I would see your face again, but now God has let me see your children, too!”
  '12':
  - type: text
    content: 'Joseph moved the boys, who were at their grandfather’s knees, and he bowed with his face to the ground. '
  '13':
  - type: text
    content: 'Then he positioned the boys in front of Jacob. With his right hand he directed Ephraim toward Jacob’s left hand, and with his left hand he put Manasseh at Jacob’s right hand. '
  '14':
  - type: text
    content: 'But Jacob crossed his arms as he reached out to lay his hands on the boys’ heads. He put his right hand on the head of Ephraim, though he was the younger boy, and his left hand on the head of Manasseh, though he was the firstborn. '
  '15':
  - type: text
    content: Then he blessed Joseph and said,
  - type: text
    content: “May the God before whom my grandfather Abraham
  - type: text
    content: and my father, Isaac, walked—
  - type: text
    content: the God who has been my shepherd
  - type: text
    content: all my life, to this very day,
  '16':
  - type: text
    content: the Angel who has redeemed me from all harm—
  - type: text
    content: may he bless these boys.
  - type: text
    content: May they preserve my name
  - type: text
    content: and the names of Abraham and Isaac.
  - type: text
    content: And may their descendants multiply greatly
  - type: text
    content: throughout the earth.”
  '17':
  - type: text
    content: 'But Joseph was upset when he saw that his father placed his right hand on Ephraim’s head. So Joseph lifted it to move it from Ephraim’s head to Manasseh’s head. '
  '18':
  - type: text
    content: “No, my father,” he said. “This one is the firstborn. Put your right hand on his head.”
  '19':
  - type: text
    content: But his father refused. “I know, my son; I know,” he replied. “Manasseh will also become a great people, but his younger brother will become even greater. And his descendants will become a multitude of nations.”
  '2':
  - type: text
    content: When Joseph arrived, Jacob was told, “Your son Joseph has come to see you.” So Jacob
  - type: note
    content: Hebrew Israel; also in 48:8, 10, 11, 13, 14, 21. See note on 35:21.
  - type: text
    content: ' gathered his strength and sat up in his bed.'
  '20':
  - type: text
    content: 'So Jacob blessed the boys that day with this blessing: “The people of Israel will use your names when they give a blessing. They will say, ‘May God make you as prosperous as Ephraim and Manasseh.’” In this way, Jacob put Ephraim ahead of Manasseh.'
  '21':
  - type: text
    content: 'Then Jacob said to Joseph, “Look, I am about to die, but God will be with you and will take you back to Canaan, the land of your ancestors. '
  '22':
  - type: text
    content: And beyond what I have given your brothers, I am giving you an extra portion of the land
  - type: note
    content: Or an extra ridge of land. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' that I took from the Amorites with my sword and bow.”'
  '3':
  - type: text
    content: Jacob said to Joseph, “God Almighty
  - type: note
    content: Hebrew El-Shaddai.
  - type: text
    content: ' appeared to me at Luz in the land of Canaan and blessed me. '
  '4':
  - type: text
    content: He said to me, ‘I will make you fruitful, and I will multiply your descendants. I will make you a multitude of nations. And I will give this land of Canaan to your descendants
  - type: note
    content: Hebrew seed; also in 48:19.
  - type: text
    content: ' after you as an everlasting possession.’'
  '5':
  - type: text
    content: '“Now I am claiming as my own sons these two boys of yours, Ephraim and Manasseh, who were born here in the land of Egypt before I arrived. They will be my sons, just as Reuben and Simeon are. '
  '6':
  - type: text
    content: But any children born to you in the future will be your own, and they will inherit land within the territories of their brothers Ephraim and Manasseh.
  '7':
  - type: text
    content: “Long ago, as I was returning from Paddan-aram,
  - type: note
    content: Hebrew Paddan, referring to Paddan-aram; compare Gen 35:9.
  - type: text
    content: ' Rachel died in the land of Canaan. We were still on the way, some distance from Ephrath (that is, Bethlehem). So with great sorrow I buried her there beside the road to Ephrath.”'
  '8':
  - type: text
    content: Then Jacob looked over at the two boys. “Are these your sons?” he asked.
  '9':
  - type: text
    content: “Yes,” Joseph told him, “these are the sons God has given me here in Egypt.”
  - type: text
    content: And Jacob said, “Bring them closer to me, so I can bless them.”
