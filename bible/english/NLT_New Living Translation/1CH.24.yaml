document_id: 1CH.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Duties of the Priests
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is how Aaron’s descendants, the priests, were divided into groups for service. The sons of Aaron were Nadab, Abihu, Eleazar, and Ithamar. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: But Nadab and Abihu died before their father, and they had no sons. So only Eleazar and Ithamar were left to carry on as priests.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'With the help of Zadok, who was a descendant of Eleazar, and of Ahimelech, who was a descendant of Ithamar, David divided Aaron’s descendants into groups according to their various duties. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eleazar’s descendants were divided into sixteen groups and Ithamar’s into eight, for there were more family leaders among the descendants of Eleazar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'All tasks were assigned to the various groups by means of sacred lots so that no preference would be shown, for there were many qualified officials serving God in the sanctuary from among the descendants of both Eleazar and Ithamar. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Shemaiah son of Nethanel, a Levite, acted as secretary and wrote down the names and assignments in the presence of the king, the officials, Zadok the priest, Ahimelech son of Abiathar, and the family leaders of the priests and Levites. The descendants of Eleazar and Ithamar took turns casting lots.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The first lot fell to Jehoiarib.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The second lot fell to Jedaiah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The third lot fell to Harim.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The fourth lot fell to Seorim.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The fifth lot fell to Malkijah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The sixth lot fell to Mijamin.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The seventh lot fell to Hakkoz.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The eighth lot fell to Abijah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The ninth lot fell to Jeshua.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The tenth lot fell to Shecaniah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The eleventh lot fell to Eliashib.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The twelfth lot fell to Jakim.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The thirteenth lot fell to Huppah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The fourteenth lot fell to Jeshebeab.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The fifteenth lot fell to Bilgah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The sixteenth lot fell to Immer.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The seventeenth lot fell to Hezir.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The eighteenth lot fell to Happizzez.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The nineteenth lot fell to Pethahiah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The twentieth lot fell to Jehezkel.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The twenty-first lot fell to Jakin.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The twenty-second lot fell to Gamul.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The twenty-third lot fell to Delaiah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The twenty-fourth lot fell to Maaziah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Each group carried out its appointed duties in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' according to the procedures established by their ancestor Aaron in obedience to the commands of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Family Leaders among the Levites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'These were the other family leaders descended from Levi:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: From the descendants of Amram, the leader was Shebuel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shubael '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (also in 24:20b), a variant spelling of Shebuel; compare 23:16 and 26:24.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: From the descendants of Shebuel, the leader was Jehdeiah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: From the descendants of Rehabiah, the leader was Isshiah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: From the descendants of Izhar, the leader was Shelomith.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shelomoth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (also in 24:22b), a variant spelling of Shelomith; compare 23:18.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: From the descendants of Shelomith, the leader was Jahath.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: From the descendants of Hebron, Jeriah was the leader,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'From the descendants of Jeriah; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare 23:19.
    marker-yv: yv-n
  - type: text
    text: ' Amariah was second, Jahaziel was third, and Jekameam was fourth.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: From the descendants of Uzziel, the leader was Micah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'From the descendants of Micah, the leader was Shamir, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: along with Isshiah, the brother of Micah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: From the descendants of Isshiah, the leader was Zechariah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: From the descendants of Merari, the leaders were Mahli and Mushi.
- type: usfm
  marker: li1
  children:
  - type: text
    text: From the descendants of Jaaziah, the leader was Beno.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: From the descendants of Merari through Jaaziah, the leaders were Beno, Shoham, Zaccur, and Ibri.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: From the descendants of Mahli, the leader was Eleazar, though he had no sons.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: From the descendants of Kish, the leader was Jerahmeel.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: From the descendants of Mushi, the leaders were Mahli, Eder, and Jerimoth.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'These were the descendants of Levi in their various families. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Like the descendants of Aaron, they were assigned to their duties by means of sacred lots, without regard to age or rank. Lots were drawn in the presence of King David, Zadok, Ahimelech, and the family leaders of the priests and the Levites.
