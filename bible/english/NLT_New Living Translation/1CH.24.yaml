document_id: 1CH.24,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Duties of the Priests
  - type: text
    content: 'This is how Aaron’s descendants, the priests, were divided into groups for service. The sons of Aaron were Nadab, Abihu, Eleazar, and Ithamar. '
  '10':
  - type: text
    content: The seventh lot fell to Hakkoz.
  - type: text
    content: The eighth lot fell to Abijah.
  '11':
  - type: text
    content: The ninth lot fell to Jeshua.
  - type: text
    content: The tenth lot fell to Shecaniah.
  '12':
  - type: text
    content: The eleventh lot fell to Eliashib.
  - type: text
    content: The twelfth lot fell to Jakim.
  '13':
  - type: text
    content: The thirteenth lot fell to Huppah.
  - type: text
    content: The fourteenth lot fell to Jeshebeab.
  '14':
  - type: text
    content: The fifteenth lot fell to Bilgah.
  - type: text
    content: The sixteenth lot fell to Immer.
  '15':
  - type: text
    content: The seventeenth lot fell to Hezir.
  - type: text
    content: The eighteenth lot fell to Happizzez.
  '16':
  - type: text
    content: The nineteenth lot fell to Pethahiah.
  - type: text
    content: The twentieth lot fell to Jehezkel.
  '17':
  - type: text
    content: The twenty-first lot fell to Jakin.
  - type: text
    content: The twenty-second lot fell to Gamul.
  '18':
  - type: text
    content: The twenty-third lot fell to Delaiah.
  - type: text
    content: The twenty-fourth lot fell to Maaziah.
  '19':
  - type: text
    content: 'Each group carried out its appointed duties in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' according to the procedures established by their ancestor Aaron in obedience to the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel.'
  - type: heading
    content: Family Leaders among the Levites
  '2':
  - type: text
    content: But Nadab and Abihu died before their father, and they had no sons. So only Eleazar and Ithamar were left to carry on as priests.
  '20':
  - type: text
    content: 'These were the other family leaders descended from Levi:'
  - type: text
    content: From the descendants of Amram, the leader was Shebuel.
  - type: note
    content: Hebrew Shubael (also in 24:20b), a variant spelling of Shebuel; compare 23:16 and 26:24.
  - type: text
    content: From the descendants of Shebuel, the leader was Jehdeiah.
  '21':
  - type: text
    content: From the descendants of Rehabiah, the leader was Isshiah.
  '22':
  - type: text
    content: From the descendants of Izhar, the leader was Shelomith.
  - type: note
    content: Hebrew Shelomoth (also in 24:22b), a variant spelling of Shelomith; compare 23:18.
  - type: text
    content: From the descendants of Shelomith, the leader was Jahath.
  '23':
  - type: text
    content: From the descendants of Hebron, Jeriah was the leader,
  - type: note
    content: Hebrew From the descendants of Jeriah; compare 23:19.
  - type: text
    content: ' Amariah was second, Jahaziel was third, and Jekameam was fourth.'
  '24':
  - type: text
    content: From the descendants of Uzziel, the leader was Micah.
  - type: text
    content: 'From the descendants of Micah, the leader was Shamir, '
  '25':
  - type: text
    content: along with Isshiah, the brother of Micah.
  - type: text
    content: From the descendants of Isshiah, the leader was Zechariah.
  '26':
  - type: text
    content: From the descendants of Merari, the leaders were Mahli and Mushi.
  - type: text
    content: From the descendants of Jaaziah, the leader was Beno.
  '27':
  - type: text
    content: From the descendants of Merari through Jaaziah, the leaders were Beno, Shoham, Zaccur, and Ibri.
  '28':
  - type: text
    content: From the descendants of Mahli, the leader was Eleazar, though he had no sons.
  '29':
  - type: text
    content: From the descendants of Kish, the leader was Jerahmeel.
  '3':
  - type: text
    content: 'With the help of Zadok, who was a descendant of Eleazar, and of Ahimelech, who was a descendant of Ithamar, David divided Aaron’s descendants into groups according to their various duties. '
  '30':
  - type: text
    content: From the descendants of Mushi, the leaders were Mahli, Eder, and Jerimoth.
  - type: text
    content: 'These were the descendants of Levi in their various families. '
  '31':
  - type: text
    content: Like the descendants of Aaron, they were assigned to their duties by means of sacred lots, without regard to age or rank. Lots were drawn in the presence of King David, Zadok, Ahimelech, and the family leaders of the priests and the Levites.
  '4':
  - type: text
    content: Eleazar’s descendants were divided into sixteen groups and Ithamar’s into eight, for there were more family leaders among the descendants of Eleazar.
  '5':
  - type: text
    content: 'All tasks were assigned to the various groups by means of sacred lots so that no preference would be shown, for there were many qualified officials serving God in the sanctuary from among the descendants of both Eleazar and Ithamar. '
  '6':
  - type: text
    content: Shemaiah son of Nethanel, a Levite, acted as secretary and wrote down the names and assignments in the presence of the king, the officials, Zadok the priest, Ahimelech son of Abiathar, and the family leaders of the priests and Levites. The descendants of Eleazar and Ithamar took turns casting lots.
  '7':
  - type: text
    content: The first lot fell to Jehoiarib.
  - type: text
    content: The second lot fell to Jedaiah.
  '8':
  - type: text
    content: The third lot fell to Harim.
  - type: text
    content: The fourth lot fell to Seorim.
  '9':
  - type: text
    content: The fifth lot fell to Malkijah.
  - type: text
    content: The sixth lot fell to Mijamin.
