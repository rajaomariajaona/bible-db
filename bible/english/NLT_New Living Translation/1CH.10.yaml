document_id: 1CH.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Death of King Saul
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the Philistines attacked Israel, and the men of Israel fled before them. Many were slaughtered on the slopes of Mount Gilboa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The Philistines closed in on Saul and his sons, and they killed three of his sons—Jonathan, Abinadab, and Malkishua. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The fighting grew very fierce around Saul, and the Philistine archers caught up with him and wounded him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Saul groaned to his armor bearer, “Take your sword and kill me before these pagan Philistines come to taunt and torture me.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But his armor bearer was afraid and would not do it. So Saul took his own sword and fell on it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When his armor bearer realized that Saul was dead, he fell on his own sword and died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So Saul and his three sons died there together, bringing his dynasty to an end.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When all the Israelites in the Jezreel Valley saw that their army had fled and that Saul and his sons were dead, they abandoned their towns and fled. So the Philistines moved in and occupied their towns.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The next day, when the Philistines went out to strip the dead, they found the bodies of Saul and his sons on Mount Gilboa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So they stripped off Saul’s armor and cut off his head. Then they proclaimed the good news of Saul’s death before their idols and to the people throughout the land of Philistia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They placed his armor in the temple of their gods, and they fastened his head to the temple of Dagon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But when everyone in Jabesh-gilead heard about everything the Philistines had done to Saul, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: all their mighty warriors brought the bodies of Saul and his sons back to Jabesh. Then they buried their bones beneath the great tree at Jabesh, and they fasted for seven days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So Saul died because he was unfaithful to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. He failed to obey the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s command, and he even consulted a medium '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'instead of asking the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for guidance. So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' killed him and turned the kingdom over to David son of Jesse.'
