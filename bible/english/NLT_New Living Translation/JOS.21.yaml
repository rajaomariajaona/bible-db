document_id: JOS.21,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Towns Given to the Levites
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the leaders of the tribe of Levi came to consult with Eleazar the priest, Joshua son of Nun, and the leaders of the other tribes of Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'to the descendants of Aaron, who were members of the Kohathite clan within the tribe of Levi, since the sacred lot fell to them first: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Kiriath-arba (that is, Hebron), in the hill country of Judah, along with its surrounding pasturelands. (Arba was an ancestor of Anak.) '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: But the open fields beyond the town and the surrounding villages were given to Caleb son of Jephunneh as his possession.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The following towns with their pasturelands were given to the descendants of Aaron the priest: Hebron (a city of refuge for those who accidentally killed someone), Libnah, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jattir, Eshtemoa, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Holon, Debir, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ain, Juttah, and Beth-shemesh—nine towns from these two tribes.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'From the tribe of Benjamin the priests were given the following towns with their pasturelands: Gibeon, Geba, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Anathoth, and Almon—four towns. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: So in all, thirteen towns with their pasturelands were given to the priests, the descendants of Aaron.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'They came to them at Shiloh in the land of Canaan and said, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses to give us towns to live in and pasturelands for our livestock.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The rest of the Kohathite clan from the tribe of Levi was allotted the following towns and pasturelands from the tribe of Ephraim: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Shechem in the hill country of Ephraim (a city of refuge for those who accidentally killed someone), Gezer, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Kibzaim, and Beth-horon—four towns.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The following towns and pasturelands were allotted to the priests from the tribe of Dan: Eltekeh, Gibbethon, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Aijalon, and Gath-rimmon—four towns.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The half-tribe of Manasseh allotted the following towns with their pasturelands to the priests: Taanach and Gath-rimmon—two towns. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: So in all, ten towns with their pasturelands were given to the rest of the Kohathite clan.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The descendants of Gershon, another clan within the tribe of Levi, received the following towns with their pasturelands from the half-tribe of Manasseh: Golan in Bashan (a city of refuge for those who accidentally killed someone) and Be-eshterah—two towns.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'From the tribe of Issachar they received the following towns with their pasturelands: Kishion, Daberath, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Jarmuth, and En-gannim—four towns.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So by the command of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the people of Israel gave the Levites the following towns and pasturelands out of their own grants of land.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'From the tribe of Asher they received the following towns with their pasturelands: Mishal, Abdon, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Helkath, and Rehob—four towns.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'From the tribe of Naphtali they received the following towns with their pasturelands: Kedesh in Galilee (a city of refuge for those who accidentally killed someone), Hammoth-dor, and Kartan—three towns. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: So in all, thirteen towns with their pasturelands were allotted to the clan of Gershon.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'The rest of the Levites—the Merari clan—were given the following towns with their pasturelands from the tribe of Zebulun: Jokneam, Kartah, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Dimnah, and Nahalal—four towns.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'From the tribe of Reuben they received the following towns with their pasturelands: Bezer, Jahaz,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jahzah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Jahaz.
      marker-yv: yv-n
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Kedemoth, and Mephaath—four towns.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'From the tribe of Gad they received the following towns with their pasturelands: Ramoth in Gilead (a city of refuge for those who accidentally killed someone), Mahanaim, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Heshbon, and Jazer—four towns. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The descendants of Aaron, who were members of the Kohathite clan within the tribe of Levi, were allotted thirteen towns that were originally assigned to the tribes of Judah, Simeon, and Benjamin. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: So in all, twelve towns were allotted to the clan of Merari.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'The total number of towns and pasturelands within Israelite territory given to the Levites came to forty-eight. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Every one of these towns had pasturelands surrounding it.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave to Israel all the land he had sworn to give their ancestors, and they took possession of it and settled there. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave them rest on every side, just as he had solemnly promised their ancestors. None of their enemies could stand against them, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' helped them conquer all their enemies. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Not a single one of all the good promises the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given to the family of Israel was left unfulfilled; everything he had spoken came true.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The other families of the Kohathite clan were allotted ten towns from the tribes of Ephraim, Dan, and the half-tribe of Manasseh.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The clan of Gershon was allotted thirteen towns from the tribes of Issachar, Asher, Naphtali, and the half-tribe of Manasseh in Bashan.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The clan of Merari was allotted twelve towns from the tribes of Reuben, Gad, and Zebulun.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So the Israelites obeyed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s command to Moses and assigned these towns and pasturelands to the Levites by casting sacred lots.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The Israelites gave the following towns from the tribes of Judah and Simeon '
