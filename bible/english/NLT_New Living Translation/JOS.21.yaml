document_id: JOS.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Towns Given to the Levites
  - type: text
    content: 'Then the leaders of the tribe of Levi came to consult with Eleazar the priest, Joshua son of Nun, and the leaders of the other tribes of Israel. '
  '10':
  - type: text
    content: 'to the descendants of Aaron, who were members of the Kohathite clan within the tribe of Levi, since the sacred lot fell to them first: '
  '11':
  - type: text
    content: 'Kiriath-arba (that is, Hebron), in the hill country of Judah, along with its surrounding pasturelands. (Arba was an ancestor of Anak.) '
  '12':
  - type: text
    content: But the open fields beyond the town and the surrounding villages were given to Caleb son of Jephunneh as his possession.
  '13':
  - type: text
    content: 'The following towns with their pasturelands were given to the descendants of Aaron the priest: Hebron (a city of refuge for those who accidentally killed someone), Libnah, '
  '14':
  - type: text
    content: 'Jattir, Eshtemoa, '
  '15':
  - type: text
    content: 'Holon, Debir, '
  '16':
  - type: text
    content: Ain, Juttah, and Beth-shemesh—nine towns from these two tribes.
  '17':
  - type: text
    content: 'From the tribe of Benjamin the priests were given the following towns with their pasturelands: Gibeon, Geba, '
  '18':
  - type: text
    content: 'Anathoth, and Almon—four towns. '
  '19':
  - type: text
    content: So in all, thirteen towns with their pasturelands were given to the priests, the descendants of Aaron.
  '2':
  - type: text
    content: 'They came to them at Shiloh in the land of Canaan and said, “The '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses to give us towns to live in and pasturelands for our livestock.” '
  '20':
  - type: text
    content: 'The rest of the Kohathite clan from the tribe of Levi was allotted the following towns and pasturelands from the tribe of Ephraim: '
  '21':
  - type: text
    content: 'Shechem in the hill country of Ephraim (a city of refuge for those who accidentally killed someone), Gezer, '
  '22':
  - type: text
    content: Kibzaim, and Beth-horon—four towns.
  '23':
  - type: text
    content: 'The following towns and pasturelands were allotted to the priests from the tribe of Dan: Eltekeh, Gibbethon, '
  '24':
  - type: text
    content: Aijalon, and Gath-rimmon—four towns.
  '25':
  - type: text
    content: 'The half-tribe of Manasseh allotted the following towns with their pasturelands to the priests: Taanach and Gath-rimmon—two towns. '
  '26':
  - type: text
    content: So in all, ten towns with their pasturelands were given to the rest of the Kohathite clan.
  '27':
  - type: text
    content: 'The descendants of Gershon, another clan within the tribe of Levi, received the following towns with their pasturelands from the half-tribe of Manasseh: Golan in Bashan (a city of refuge for those who accidentally killed someone) and Be-eshterah—two towns.'
  '28':
  - type: text
    content: 'From the tribe of Issachar they received the following towns with their pasturelands: Kishion, Daberath, '
  '29':
  - type: text
    content: Jarmuth, and En-gannim—four towns.
  '3':
  - type: text
    content: 'So by the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' the people of Israel gave the Levites the following towns and pasturelands out of their own grants of land.'
  '30':
  - type: text
    content: 'From the tribe of Asher they received the following towns with their pasturelands: Mishal, Abdon, '
  '31':
  - type: text
    content: Helkath, and Rehob—four towns.
  '32':
  - type: text
    content: 'From the tribe of Naphtali they received the following towns with their pasturelands: Kedesh in Galilee (a city of refuge for those who accidentally killed someone), Hammoth-dor, and Kartan—three towns. '
  '33':
  - type: text
    content: So in all, thirteen towns with their pasturelands were allotted to the clan of Gershon.
  '34':
  - type: text
    content: 'The rest of the Levites—the Merari clan—were given the following towns with their pasturelands from the tribe of Zebulun: Jokneam, Kartah, '
  '35':
  - type: text
    content: Dimnah, and Nahalal—four towns.
  '36':
  - type: text
    content: 'From the tribe of Reuben they received the following towns with their pasturelands: Bezer, Jahaz,'
  - type: note
    content: Hebrew Jahzah, a variant spelling of Jahaz.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Kedemoth, and Mephaath—four towns.
  '38':
  - type: text
    content: 'From the tribe of Gad they received the following towns with their pasturelands: Ramoth in Gilead (a city of refuge for those who accidentally killed someone), Mahanaim, '
  '39':
  - type: text
    content: 'Heshbon, and Jazer—four towns. '
  '4':
  - type: text
    content: 'The descendants of Aaron, who were members of the Kohathite clan within the tribe of Levi, were allotted thirteen towns that were originally assigned to the tribes of Judah, Simeon, and Benjamin. '
  '40':
  - type: text
    content: So in all, twelve towns were allotted to the clan of Merari.
  '41':
  - type: text
    content: 'The total number of towns and pasturelands within Israelite territory given to the Levites came to forty-eight. '
  '42':
  - type: text
    content: Every one of these towns had pasturelands surrounding it.
  '43':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' gave to Israel all the land he had sworn to give their ancestors, and they took possession of it and settled there. '
  '44':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them rest on every side, just as he had solemnly promised their ancestors. None of their enemies could stand against them, for the '
  - type: text
    content: Lord
  - type: text
    content: ' helped them conquer all their enemies. '
  '45':
  - type: text
    content: 'Not a single one of all the good promises the '
  - type: text
    content: Lord
  - type: text
    content: ' had given to the family of Israel was left unfulfilled; everything he had spoken came true.'
  '5':
  - type: text
    content: The other families of the Kohathite clan were allotted ten towns from the tribes of Ephraim, Dan, and the half-tribe of Manasseh.
  '6':
  - type: text
    content: The clan of Gershon was allotted thirteen towns from the tribes of Issachar, Asher, Naphtali, and the half-tribe of Manasseh in Bashan.
  '7':
  - type: text
    content: The clan of Merari was allotted twelve towns from the tribes of Reuben, Gad, and Zebulun.
  '8':
  - type: text
    content: 'So the Israelites obeyed the '
  - type: text
    content: Lord
  - type: text
    content: ’s command to Moses and assigned these towns and pasturelands to the Levites by casting sacred lots.
  '9':
  - type: text
    content: 'The Israelites gave the following towns from the tribes of Judah and Simeon '
