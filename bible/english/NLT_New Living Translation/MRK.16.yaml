document_id: MRK.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Resurrection
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Saturday evening, when the Sabbath ended, Mary Magdalene, Mary the mother of James, and Salome went out and purchased burial spices so they could anoint Jesus’ body. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Very early on Sunday morning,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on the first day of the week; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 16:9.
    marker-yv: yv-n
  - type: text
    text: ' just at sunrise, they went to the tomb. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On the way they were asking each other, “Who will roll away the stone for us from the entrance to the tomb?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But as they arrived, they looked up and saw that the stone, which was very large, had already been rolled aside.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When they entered the tomb, they saw a young man clothed in a white robe sitting on the right side. The women were shocked, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: but the angel said, “Don’t be alarmed. You are looking for Jesus of Nazareth,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jesus the Nazarene.
    marker-yv: yv-n
  - type: text
    text: ' who was crucified. He isn’t here! He is risen from the dead! Look, this is where they laid his body. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Now go and tell his disciples, including Peter, that Jesus is going ahead of you to Galilee. You will see him there, just as he told you before he died.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The women fled from the tomb, trembling and bewildered, and they said nothing to anyone because they were too frightened.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The most reliable early manuscripts of the Gospel of Mark end at verse 8. Other manuscripts include various endings to the Gospel. A few include both the “shorter ending” and the “longer ending.” The majority of manuscripts include the “longer ending” immediately after verse 8.
    marker-yv: yv-n
- type: usfm
  marker: pc
  children:
  - type: text
    text: '----------'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '['
  - type: usfm
    marker: it
    children:
    - type: text
      text: The most ancient manuscripts of Mark conclude with verse 16:8. Later manuscripts add one or both of the following endings.
  - type: text
    text: ']'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '['
  - type: usfm
    marker: it
    children:
    - type: text
      text: Shorter Ending of Mark
  - type: text
    text: ']'
- type: usfm
  marker: m
  children:
  - type: text
    text: Then they briefly reported all this to Peter and his companions. Afterward Jesus himself sent them out from east to west with the sacred and unfailing message of salvation that gives eternal life. Amen.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '['
  - type: usfm
    marker: it
    children:
    - type: text
      text: Longer Ending of Mark
  - type: text
    text: ']'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'After Jesus rose from the dead early on Sunday morning, the first person who saw him was Mary Magdalene, the woman from whom he had cast out seven demons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'She went to the disciples, who were grieving and weeping, and told them what had happened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But when she told them that Jesus was alive and she had seen him, they didn’t believe her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Afterward he appeared in a different form to two of his followers who were walking from Jerusalem into the country. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They rushed back to tell the others, but no one believed them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Still later he appeared to the eleven disciples as they were eating together. He rebuked them for their stubborn unbelief because they refused to believe those who had seen him after he had been raised from the dead.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some early manuscripts add: '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: And they excused themselves, saying, “This age of lawlessness and unbelief is under Satan, who does not permit God’s truth and power to conquer the evil [unclean] spirits. Therefore, reveal your justice now.” This is what they said to Christ. And Christ replied to them, “The period of years of Satan’s power has been fulfilled, but other dreadful things will happen soon. And I was handed over to death for those who have sinned, so that they may return to the truth and sin no more, and so they may inherit the spiritual, incorruptible, and righteous glory in heaven.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And then he told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go into all the world and preach the Good News to everyone.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Anyone who believes and is baptized will be saved. But anyone who refuses to believe will be condemned.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'These miraculous signs will accompany those who believe: They will cast out demons in my name, and they will speak in new languages.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'new tongues; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'some manuscripts do not include '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: new.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They will be able to handle snakes with safety, and if they drink anything poisonous, it won’t hurt them. They will be able to place their hands on the sick, and they will be healed.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'When the Lord Jesus had finished talking with them, he was taken up into heaven and sat down in the place of honor at God’s right hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And the disciples went everywhere and preached, and the Lord worked through them, confirming what they said by many miraculous signs.
