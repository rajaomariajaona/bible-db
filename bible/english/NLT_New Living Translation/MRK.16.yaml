document_id: MRK.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection
  - type: text
    content: 'Saturday evening, when the Sabbath ended, Mary Magdalene, Mary the mother of James, and Salome went out and purchased burial spices so they could anoint Jesus’ body. '
  '10':
  - type: text
    content: 'She went to the disciples, who were grieving and weeping, and told them what had happened. '
  '11':
  - type: text
    content: But when she told them that Jesus was alive and she had seen him, they didn’t believe her.
  '12':
  - type: text
    content: 'Afterward he appeared in a different form to two of his followers who were walking from Jerusalem into the country. '
  '13':
  - type: text
    content: They rushed back to tell the others, but no one believed them.
  '14':
  - type: text
    content: Still later he appeared to the eleven disciples as they were eating together. He rebuked them for their stubborn unbelief because they refused to believe those who had seen him after he had been raised from the dead.
  - type: note
    content: 'Some early manuscripts add: And they excused themselves, saying, “This age of lawlessness and unbelief is under Satan, who does not permit God’s truth and power to conquer the evil [unclean] spirits. Therefore, reveal your justice now.” This is what they said to Christ. And Christ replied to them, “The period of years of Satan’s power has been fulfilled, but other dreadful things will happen soon. And I was handed over to death for those who have sinned, so that they may return to the truth and sin no more, and so they may inherit the spiritual, incorruptible, and righteous glory in heaven.”'
  '15':
  - type: text
    content: 'And then he told them, '
  - type: text
    content: “Go into all the world and preach the Good News to everyone.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Anyone who believes and is baptized will be saved. But anyone who refuses to believe will be condemned.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'These miraculous signs will accompany those who believe: They will cast out demons in my name, and they will speak in new languages.'
  - type: note
    content: Or new tongues; some manuscripts do not include new.
  - type: text
    content: ' '
  '18':
  - type: text
    content: They will be able to handle snakes with safety, and if they drink anything poisonous, it won’t hurt them. They will be able to place their hands on the sick, and they will be healed.”
  '19':
  - type: text
    content: 'When the Lord Jesus had finished talking with them, he was taken up into heaven and sat down in the place of honor at God’s right hand. '
  '2':
  - type: text
    content: Very early on Sunday morning,
  - type: note
    content: Greek on the first day of the week; also in 16:9.
  - type: text
    content: ' just at sunrise, they went to the tomb. '
  '20':
  - type: text
    content: And the disciples went everywhere and preached, and the Lord worked through them, confirming what they said by many miraculous signs.
  '3':
  - type: text
    content: 'On the way they were asking each other, “Who will roll away the stone for us from the entrance to the tomb?” '
  '4':
  - type: text
    content: But as they arrived, they looked up and saw that the stone, which was very large, had already been rolled aside.
  '5':
  - type: text
    content: 'When they entered the tomb, they saw a young man clothed in a white robe sitting on the right side. The women were shocked, '
  '6':
  - type: text
    content: but the angel said, “Don’t be alarmed. You are looking for Jesus of Nazareth,
  - type: note
    content: Or Jesus the Nazarene.
  - type: text
    content: ' who was crucified. He isn’t here! He is risen from the dead! Look, this is where they laid his body. '
  '7':
  - type: text
    content: Now go and tell his disciples, including Peter, that Jesus is going ahead of you to Galilee. You will see him there, just as he told you before he died.”
  '8':
  - type: text
    content: The women fled from the tomb, trembling and bewildered, and they said nothing to anyone because they were too frightened.
  - type: note
    content: The most reliable early manuscripts of the Gospel of Mark end at verse 8. Other manuscripts include various endings to the Gospel. A few include both the “shorter ending” and the “longer ending.” The majority of manuscripts include the “longer ending” immediately after verse 8.
  - type: text
    content: '----------'
  - type: text
    content: '['
  - type: text
    content: The most ancient manuscripts of Mark conclude with verse 16:8. Later manuscripts add one or both of the following endings.
  - type: text
    content: ']'
  - type: text
    content: '['
  - type: text
    content: Shorter Ending of Mark
  - type: text
    content: ']'
  - type: text
    content: Then they briefly reported all this to Peter and his companions. Afterward Jesus himself sent them out from east to west with the sacred and unfailing message of salvation that gives eternal life. Amen.
  - type: text
    content: '['
  - type: text
    content: Longer Ending of Mark
  - type: text
    content: ']'
  '9':
  - type: text
    content: 'After Jesus rose from the dead early on Sunday morning, the first person who saw him was Mary Magdalene, the woman from whom he had cast out seven demons. '
