document_id: PRO.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Lessons for Daily Life
  - type: text
    content: My child,
  - type: note
    content: Hebrew My son.
  - type: text
    content: ' if you have put up security for a friend’s debt'
  - type: text
    content: or agreed to guarantee the debt of a stranger—
  '10':
  - type: text
    content: A little extra sleep, a little more slumber,
  - type: text
    content: a little folding of the hands to rest—
  '11':
  - type: text
    content: then poverty will pounce on you like a bandit;
  - type: text
    content: scarcity will attack you like an armed robber.
  '12':
  - type: text
    content: What are worthless and wicked people like?
  - type: text
    content: They are constant liars,
  '13':
  - type: text
    content: signaling their deceit with a wink of the eye,
  - type: text
    content: a nudge of the foot, or the wiggle of fingers.
  '14':
  - type: text
    content: Their perverted hearts plot evil,
  - type: text
    content: and they constantly stir up trouble.
  '15':
  - type: text
    content: But they will be destroyed suddenly,
  - type: text
    content: broken in an instant beyond all hope of healing.
  '16':
  - type: text
    content: 'There are six things the '
  - type: text
    content: Lord
  - type: text
    content: ' hates—'
  - type: text
    content: 'no, seven things he detests:'
  '17':
  - type: text
    content: haughty eyes,
  - type: text
    content: a lying tongue,
  - type: text
    content: hands that kill the innocent,
  '18':
  - type: text
    content: a heart that plots evil,
  - type: text
    content: feet that race to do wrong,
  '19':
  - type: text
    content: a false witness who pours out lies,
  - type: text
    content: a person who sows discord in a family.
  '2':
  - type: text
    content: if you have trapped yourself by your agreement
  - type: text
    content: and are caught by what you said—
  '20':
  - type: text
    content: My son, obey your father’s commands,
  - type: text
    content: and don’t neglect your mother’s instruction.
  '21':
  - type: text
    content: Keep their words always in your heart.
  - type: text
    content: Tie them around your neck.
  '22':
  - type: text
    content: When you walk, their counsel will lead you.
  - type: text
    content: When you sleep, they will protect you.
  - type: text
    content: When you wake up, they will advise you.
  '23':
  - type: text
    content: For their command is a lamp
  - type: text
    content: and their instruction a light;
  - type: text
    content: their corrective discipline
  - type: text
    content: is the way to life.
  '24':
  - type: text
    content: It will keep you from the immoral woman,
  - type: text
    content: from the smooth tongue of a promiscuous woman.
  '25':
  - type: text
    content: Don’t lust for her beauty.
  - type: text
    content: Don’t let her coy glances seduce you.
  '26':
  - type: text
    content: For a prostitute will bring you to poverty,
  - type: note
    content: Hebrew to a loaf of bread.
  - type: text
    content: but sleeping with another man’s wife will cost you your life.
  '27':
  - type: text
    content: Can a man scoop a flame into his lap
  - type: text
    content: and not have his clothes catch on fire?
  '28':
  - type: text
    content: Can he walk on hot coals
  - type: text
    content: and not blister his feet?
  '29':
  - type: text
    content: So it is with the man who sleeps with another man’s wife.
  - type: text
    content: He who embraces her will not go unpunished.
  '3':
  - type: text
    content: follow my advice and save yourself,
  - type: text
    content: for you have placed yourself at your friend’s mercy.
  - type: text
    content: Now swallow your pride;
  - type: text
    content: go and beg to have your name erased.
  '30':
  - type: text
    content: Excuses might be found for a thief
  - type: text
    content: who steals because he is starving.
  '31':
  - type: text
    content: But if he is caught, he must pay back seven times what he stole,
  - type: text
    content: even if he has to sell everything in his house.
  '32':
  - type: text
    content: But the man who commits adultery is an utter fool,
  - type: text
    content: for he destroys himself.
  '33':
  - type: text
    content: He will be wounded and disgraced.
  - type: text
    content: His shame will never be erased.
  '34':
  - type: text
    content: For the woman’s jealous husband will be furious,
  - type: text
    content: and he will show no mercy when he takes revenge.
  '35':
  - type: text
    content: He will accept no compensation,
  - type: text
    content: nor be satisfied with a payoff of any size.
  '4':
  - type: text
    content: Don’t put it off; do it now!
  - type: text
    content: Don’t rest until you do.
  '5':
  - type: text
    content: Save yourself like a gazelle escaping from a hunter,
  - type: text
    content: like a bird fleeing from a net.
  '6':
  - type: text
    content: Take a lesson from the ants, you lazybones.
  - type: text
    content: Learn from their ways and become wise!
  '7':
  - type: text
    content: Though they have no prince
  - type: text
    content: or governor or ruler to make them work,
  '8':
  - type: text
    content: they labor hard all summer,
  - type: text
    content: gathering food for the winter.
  '9':
  - type: text
    content: But you, lazybones, how long will you sleep?
  - type: text
    content: When will you wake up?
