document_id: PRO.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lessons for Daily Life
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My child,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: My son.
    marker-yv: yv-n
  - type: text
    text: ' if you have put up security for a friend’s debt'
- type: usfm
  marker: q2
  children:
  - type: text
    text: or agreed to guarantee the debt of a stranger—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: if you have trapped yourself by your agreement
- type: usfm
  marker: q2
  children:
  - type: text
    text: and are caught by what you said—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: follow my advice and save yourself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you have placed yourself at your friend’s mercy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now swallow your pride;
- type: usfm
  marker: q2
  children:
  - type: text
    text: go and beg to have your name erased.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Don’t put it off; do it now!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t rest until you do.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Save yourself like a gazelle escaping from a hunter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a bird fleeing from a net.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Take a lesson from the ants, you lazybones.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Learn from their ways and become wise!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Though they have no prince
- type: usfm
  marker: q2
  children:
  - type: text
    text: or governor or ruler to make them work,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: they labor hard all summer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gathering food for the winter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But you, lazybones, how long will you sleep?
- type: usfm
  marker: q2
  children:
  - type: text
    text: When will you wake up?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A little extra sleep, a little more slumber,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a little folding of the hands to rest—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: then poverty will pounce on you like a bandit;
- type: usfm
  marker: q2
  children:
  - type: text
    text: scarcity will attack you like an armed robber.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: What are worthless and wicked people like?
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are constant liars,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: signaling their deceit with a wink of the eye,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a nudge of the foot, or the wiggle of fingers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Their perverted hearts plot evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they constantly stir up trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But they will be destroyed suddenly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: broken in an instant beyond all hope of healing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'There are six things the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' hates—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'no, seven things he detests:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: haughty eyes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a lying tongue,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hands that kill the innocent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: a heart that plots evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: feet that race to do wrong,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: a false witness who pours out lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a person who sows discord in a family.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: My son, obey your father’s commands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and don’t neglect your mother’s instruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Keep their words always in your heart.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tie them around your neck.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: When you walk, their counsel will lead you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When you sleep, they will protect you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When you wake up, they will advise you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: For their command is a lamp
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their instruction a light;
- type: usfm
  marker: q1
  children:
  - type: text
    text: their corrective discipline
- type: usfm
  marker: q2
  children:
  - type: text
    text: is the way to life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: It will keep you from the immoral woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the smooth tongue of a promiscuous woman.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Don’t lust for her beauty.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t let her coy glances seduce you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: For a prostitute will bring you to poverty,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to a loaf of bread.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: but sleeping with another man’s wife will cost you your life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Can a man scoop a flame into his lap
- type: usfm
  marker: q2
  children:
  - type: text
    text: and not have his clothes catch on fire?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Can he walk on hot coals
- type: usfm
  marker: q2
  children:
  - type: text
    text: and not blister his feet?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: So it is with the man who sleeps with another man’s wife.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He who embraces her will not go unpunished.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Excuses might be found for a thief
- type: usfm
  marker: q2
  children:
  - type: text
    text: who steals because he is starving.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: But if he is caught, he must pay back seven times what he stole,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even if he has to sell everything in his house.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: But the man who commits adultery is an utter fool,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he destroys himself.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: He will be wounded and disgraced.
- type: usfm
  marker: q2
  children:
  - type: text
    text: His shame will never be erased.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: For the woman’s jealous husband will be furious,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will show no mercy when he takes revenge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: He will accept no compensation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor be satisfied with a payoff of any size.
