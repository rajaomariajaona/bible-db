document_id: PSA.72,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of Solomon.
  - type: text
    content: Give your love of justice to the king, O God,
  - type: text
    content: and righteousness to the king’s son.
  '10':
  - type: text
    content: The western kings of Tarshish and other distant lands
  - type: text
    content: will bring him tribute.
  - type: text
    content: The eastern kings of Sheba and Seba
  - type: text
    content: will bring him gifts.
  '11':
  - type: text
    content: All kings will bow before him,
  - type: text
    content: and all nations will serve him.
  '12':
  - type: text
    content: He will rescue the poor when they cry to him;
  - type: text
    content: he will help the oppressed, who have no one to defend them.
  '13':
  - type: text
    content: He feels pity for the weak and the needy,
  - type: text
    content: and he will rescue them.
  '14':
  - type: text
    content: He will redeem them from oppression and violence,
  - type: text
    content: for their lives are precious to him.
  '15':
  - type: text
    content: Long live the king!
  - type: text
    content: May the gold of Sheba be given to him.
  - type: text
    content: May the people always pray for him
  - type: text
    content: and bless him all day long.
  '16':
  - type: text
    content: May there be abundant grain throughout the land,
  - type: text
    content: flourishing even on the hilltops.
  - type: text
    content: May the fruit trees flourish like the trees of Lebanon,
  - type: text
    content: and may the people thrive like grass in a field.
  '17':
  - type: text
    content: May the king’s name endure forever;
  - type: text
    content: may it continue as long as the sun shines.
  - type: text
    content: May all nations be blessed through him
  - type: text
    content: and bring him praise.
  '18':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ' God, the God of Israel,'
  - type: text
    content: who alone does such wonderful things.
  '19':
  - type: text
    content: Praise his glorious name forever!
  - type: text
    content: Let the whole earth be filled with his glory.
  - type: text
    content: Amen and amen!
  '2':
  - type: text
    content: Help him judge your people in the right way;
  - type: text
    content: let the poor always be treated fairly.
  '20':
  - type: text
    content: (This ends the prayers of David son of Jesse.)
  '3':
  - type: text
    content: May the mountains yield prosperity for all,
  - type: text
    content: and may the hills be fruitful.
  '4':
  - type: text
    content: Help him to defend the poor,
  - type: text
    content: to rescue the children of the needy,
  - type: text
    content: and to crush their oppressors.
  '5':
  - type: text
    content: May they fear you
  - type: note
    content: Greek version reads May they endure.
  - type: text
    content: ' as long as the sun shines,'
  - type: text
    content: as long as the moon remains in the sky.
  - type: text
    content: Yes, forever!
  '6':
  - type: text
    content: May the king’s rule be refreshing like spring rain on freshly cut grass,
  - type: text
    content: like the showers that water the earth.
  '7':
  - type: text
    content: May all the godly flourish during his reign.
  - type: text
    content: May there be abundant prosperity until the moon is no more.
  '8':
  - type: text
    content: May he reign from sea to sea,
  - type: text
    content: and from the Euphrates River
  - type: note
    content: Hebrew the river.
  - type: text
    content: ' to the ends of the earth.'
  '9':
  - type: text
    content: Desert nomads will bow before him;
  - type: text
    content: his enemies will fall before him in the dust.
