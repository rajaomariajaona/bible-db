document_id: PSA.72,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of Solomon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give your love of justice to the king, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and righteousness to the king’s son.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The western kings of Tarshish and other distant lands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will bring him tribute.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The eastern kings of Sheba and Seba
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will bring him gifts.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All kings will bow before him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all nations will serve him.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will rescue the poor when they cry to him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will help the oppressed, who have no one to defend them.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He feels pity for the weak and the needy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will rescue them.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will redeem them from oppression and violence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for their lives are precious to him.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Long live the king!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May the gold of Sheba be given to him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the people always pray for him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bless him all day long.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May there be abundant grain throughout the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flourishing even on the hilltops.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the fruit trees flourish like the trees of Lebanon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and may the people thrive like grass in a field.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the king’s name endure forever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may it continue as long as the sun shines.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May all nations be blessed through him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bring him praise.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God, the God of Israel,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who alone does such wonderful things.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise his glorious name forever!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the whole earth be filled with his glory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amen and amen!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Help him judge your people in the right way;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the poor always be treated fairly.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (This ends the prayers of David son of Jesse.)
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the mountains yield prosperity for all,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and may the hills be fruitful.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Help him to defend the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to rescue the children of the needy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to crush their oppressors.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May they fear you
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '72:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: May they endure.
      marker-yv: yv-n
    - type: text
      text: ' as long as the sun shines,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as long as the moon remains in the sky.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, forever!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the king’s rule be refreshing like spring rain on freshly cut grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like the showers that water the earth.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May all the godly flourish during his reign.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May there be abundant prosperity until the moon is no more.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May he reign from sea to sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from the Euphrates River
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '72:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the river.
      marker-yv: yv-n
    - type: text
      text: ' to the ends of the earth.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Desert nomads will bow before him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his enemies will fall before him in the dust.
