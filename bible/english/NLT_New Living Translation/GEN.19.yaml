document_id: GEN.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sodom and Gomorrah Destroyed
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'That evening the two angels came to the entrance of the city of Sodom. Lot was sitting there, and when he saw them, he stood up to meet them. Then he welcomed them and bowed with his face to the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “My lords,” he said, “come to my home to wash your feet, and be my guests for the night. You may then get up early in the morning and be on your way again.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Oh no,” they replied. “We’ll just spend the night out here in the city square.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But Lot insisted, so at last they went home with him. Lot prepared a feast for them, complete with fresh bread made without yeast, and they ate. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But before they retired for the night, all the men of Sodom, young and old, came from all over the city and surrounded the house. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They shouted to Lot, “Where are the men who came to spend the night with you? Bring them out to us so we can have sex with them!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Lot stepped outside to talk to them, shutting the door behind him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Please, my brothers,” he begged, “don’t do such a wicked thing. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Look, I have two virgin daughters. Let me bring them out to you, and you can do with them as you wish. But please, leave these men alone, for they are my guests and are under my protection.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Stand back!” they shouted. “This fellow came to town as an outsider, and now he’s acting like our judge! We’ll treat you far worse than those other men!” And they lunged toward Lot to break down the door.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But the two angels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'men; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 19:12, 16.
    marker-yv: yv-n
  - type: text
    text: ' reached out, pulled Lot into the house, and bolted the door. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then they blinded all the men, young and old, who were at the door of the house, so they gave up trying to get inside.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Meanwhile, the angels questioned Lot. “Do you have any other relatives here in the city?” they asked. “Get them out of this place—your sons-in-law, sons, daughters, or anyone else. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For we are about to destroy this city completely. The outcry against this place is so great it has reached the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and he has sent us to destroy it.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So Lot rushed out to tell his daughters’ fiancés, “Quick, get out of the city! The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is about to destroy it.” But the young men thought he was only joking.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: At dawn the next morning the angels became insistent. “Hurry,” they said to Lot. “Take your wife and your two daughters who are here. Get out right now, or you will be swept away in the destruction of the city!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When Lot still hesitated, the angels seized his hand and the hands of his wife and two daughters and rushed them to safety outside the city, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was merciful. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: When they were safely out of the city, one of the angels ordered, “Run for your lives! And don’t look back or stop anywhere in the valley! Escape to the mountains, or you will be swept away!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“Oh no, my lord!” Lot begged. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“You have been so gracious to me and saved my life, and you have shown such great kindness. But I cannot go to the mountains. Disaster would catch up to me there, and I would soon die. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: See, there is a small village nearby. Please let me go there instead; don’t you see how small it is? Then my life will be saved.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“All right,” the angel said, “I will grant your request. I will not destroy the little village. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But hurry! Escape to it, for I can do nothing until you arrive there.” (This explains why that village was known as Zoar, which means “little place.”)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lot reached the village just as the sun was rising over the horizon. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rained down fire and burning sulfur from the sky on Sodom and Gomorrah. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He utterly destroyed them, along with the other cities and villages of the plain, wiping out all the people and every bit of vegetation. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: But Lot’s wife looked back as she was following behind him, and she turned into a pillar of salt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Abraham got up early that morning and hurried out to the place where he had stood in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s presence. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: He looked out across the plain toward Sodom and Gomorrah and watched as columns of smoke rose from the cities like smoke from a furnace.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: But God had listened to Abraham’s request and kept Lot safe, removing him from the disaster that engulfed the cities on the plain.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lot and His Daughters
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Afterward Lot left Zoar because he was afraid of the people there, and he went to live in a cave in the mountains with his two daughters. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'One day the older daughter said to her sister, “There are no men left anywhere in this entire area, so we can’t get married like everyone else. And our father will soon be too old to have children. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Come, let’s get him drunk with wine, and then we will have sex with him. That way we will preserve our family line through our father.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: So that night they got him drunk with wine, and the older daughter went in and had intercourse with her father. He was unaware of her lying down or getting up again.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The next morning the older daughter said to her younger sister, “I had sex with our father last night. Let’s get him drunk with wine again tonight, and you go in and have sex with him. That way we will preserve our family line through our father.” '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: So that night they got him drunk with wine again, and the younger daughter went in and had intercourse with him. As before, he was unaware of her lying down or getting up again.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'As a result, both of Lot’s daughters became pregnant by their own father. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: When the older daughter gave birth to a son, she named him Moab.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:37 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Moab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sounds like a Hebrew term that means “from father.”
    marker-yv: yv-n
  - type: text
    text: ' He became the ancestor of the nation now known as the Moabites. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: When the younger daughter gave birth to a son, she named him Ben-ammi.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:38 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ben-ammi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “son of my kinsman.”
    marker-yv: yv-n
  - type: text
    text: ' He became the ancestor of the nation now known as the Ammonites.'
