document_id: GEN.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Sodom and Gomorrah Destroyed
  - type: text
    content: 'That evening the two angels came to the entrance of the city of Sodom. Lot was sitting there, and when he saw them, he stood up to meet them. Then he welcomed them and bowed with his face to the ground. '
  '10':
  - type: text
    content: But the two angels
  - type: note
    content: Hebrew men; also in 19:12, 16.
  - type: text
    content: ' reached out, pulled Lot into the house, and bolted the door. '
  '11':
  - type: text
    content: Then they blinded all the men, young and old, who were at the door of the house, so they gave up trying to get inside.
  '12':
  - type: text
    content: 'Meanwhile, the angels questioned Lot. “Do you have any other relatives here in the city?” they asked. “Get them out of this place—your sons-in-law, sons, daughters, or anyone else. '
  '13':
  - type: text
    content: 'For we are about to destroy this city completely. The outcry against this place is so great it has reached the '
  - type: text
    content: Lord
  - type: text
    content: ', and he has sent us to destroy it.”'
  '14':
  - type: text
    content: 'So Lot rushed out to tell his daughters’ fiancés, “Quick, get out of the city! The '
  - type: text
    content: Lord
  - type: text
    content: ' is about to destroy it.” But the young men thought he was only joking.'
  '15':
  - type: text
    content: At dawn the next morning the angels became insistent. “Hurry,” they said to Lot. “Take your wife and your two daughters who are here. Get out right now, or you will be swept away in the destruction of the city!”
  '16':
  - type: text
    content: 'When Lot still hesitated, the angels seized his hand and the hands of his wife and two daughters and rushed them to safety outside the city, for the '
  - type: text
    content: Lord
  - type: text
    content: ' was merciful. '
  '17':
  - type: text
    content: When they were safely out of the city, one of the angels ordered, “Run for your lives! And don’t look back or stop anywhere in the valley! Escape to the mountains, or you will be swept away!”
  '18':
  - type: text
    content: '“Oh no, my lord!” Lot begged. '
  '19':
  - type: text
    content: '“You have been so gracious to me and saved my life, and you have shown such great kindness. But I cannot go to the mountains. Disaster would catch up to me there, and I would soon die. '
  '2':
  - type: text
    content: “My lords,” he said, “come to my home to wash your feet, and be my guests for the night. You may then get up early in the morning and be on your way again.”
  - type: text
    content: “Oh no,” they replied. “We’ll just spend the night out here in the city square.”
  '20':
  - type: text
    content: See, there is a small village nearby. Please let me go there instead; don’t you see how small it is? Then my life will be saved.”
  '21':
  - type: text
    content: '“All right,” the angel said, “I will grant your request. I will not destroy the little village. '
  '22':
  - type: text
    content: But hurry! Escape to it, for I can do nothing until you arrive there.” (This explains why that village was known as Zoar, which means “little place.”)
  '23':
  - type: text
    content: 'Lot reached the village just as the sun was rising over the horizon. '
  '24':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' rained down fire and burning sulfur from the sky on Sodom and Gomorrah. '
  '25':
  - type: text
    content: 'He utterly destroyed them, along with the other cities and villages of the plain, wiping out all the people and every bit of vegetation. '
  '26':
  - type: text
    content: But Lot’s wife looked back as she was following behind him, and she turned into a pillar of salt.
  '27':
  - type: text
    content: 'Abraham got up early that morning and hurried out to the place where he had stood in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence. '
  '28':
  - type: text
    content: He looked out across the plain toward Sodom and Gomorrah and watched as columns of smoke rose from the cities like smoke from a furnace.
  '29':
  - type: text
    content: But God had listened to Abraham’s request and kept Lot safe, removing him from the disaster that engulfed the cities on the plain.
  - type: heading
    content: Lot and His Daughters
  '3':
  - type: text
    content: 'But Lot insisted, so at last they went home with him. Lot prepared a feast for them, complete with fresh bread made without yeast, and they ate. '
  '30':
  - type: text
    content: 'Afterward Lot left Zoar because he was afraid of the people there, and he went to live in a cave in the mountains with his two daughters. '
  '31':
  - type: text
    content: 'One day the older daughter said to her sister, “There are no men left anywhere in this entire area, so we can’t get married like everyone else. And our father will soon be too old to have children. '
  '32':
  - type: text
    content: Come, let’s get him drunk with wine, and then we will have sex with him. That way we will preserve our family line through our father.”
  '33':
  - type: text
    content: So that night they got him drunk with wine, and the older daughter went in and had intercourse with her father. He was unaware of her lying down or getting up again.
  '34':
  - type: text
    content: 'The next morning the older daughter said to her younger sister, “I had sex with our father last night. Let’s get him drunk with wine again tonight, and you go in and have sex with him. That way we will preserve our family line through our father.” '
  '35':
  - type: text
    content: So that night they got him drunk with wine again, and the younger daughter went in and had intercourse with him. As before, he was unaware of her lying down or getting up again.
  '36':
  - type: text
    content: 'As a result, both of Lot’s daughters became pregnant by their own father. '
  '37':
  - type: text
    content: When the older daughter gave birth to a son, she named him Moab.
  - type: note
    content: Moab sounds like a Hebrew term that means “from father.”
  - type: text
    content: ' He became the ancestor of the nation now known as the Moabites. '
  '38':
  - type: text
    content: When the younger daughter gave birth to a son, she named him Ben-ammi.
  - type: note
    content: Ben-ammi means “son of my kinsman.”
  - type: text
    content: ' He became the ancestor of the nation now known as the Ammonites.'
  '4':
  - type: text
    content: 'But before they retired for the night, all the men of Sodom, young and old, came from all over the city and surrounded the house. '
  '5':
  - type: text
    content: They shouted to Lot, “Where are the men who came to spend the night with you? Bring them out to us so we can have sex with them!”
  '6':
  - type: text
    content: 'So Lot stepped outside to talk to them, shutting the door behind him. '
  '7':
  - type: text
    content: '“Please, my brothers,” he begged, “don’t do such a wicked thing. '
  '8':
  - type: text
    content: Look, I have two virgin daughters. Let me bring them out to you, and you can do with them as you wish. But please, leave these men alone, for they are my guests and are under my protection.”
  '9':
  - type: text
    content: “Stand back!” they shouted. “This fellow came to town as an outsider, and now he’s acting like our judge! We’ll treat you far worse than those other men!” And they lunged toward Lot to break down the door.
