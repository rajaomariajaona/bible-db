document_id: SNG.1,116
type_code: eng
verses:
  '1':
  - type: text
    content: This is Solomon’s song of songs, more wonderful than any other.
  - type: heading
    content: Young WomanThe headings identifying the speakers are not in the original text, though the Hebrew usually gives clues by means of the gender of the person speaking.
  '10':
  - type: text
    content: How lovely are your cheeks;
  - type: text
    content: your earrings set them afire!
  - type: text
    content: How lovely is your neck,
  - type: text
    content: enhanced by a string of jewels.
  '11':
  - type: text
    content: We will make for you earrings of gold
  - type: text
    content: and beads of silver.
  - type: heading
    content: Young Woman
  '12':
  - type: text
    content: The king is lying on his couch,
  - type: text
    content: enchanted by the fragrance of my perfume.
  '13':
  - type: text
    content: My lover is like a sachet of myrrh
  - type: text
    content: lying between my breasts.
  '14':
  - type: text
    content: He is like a bouquet of sweet henna blossoms
  - type: text
    content: from the vineyards of En-gedi.
  - type: heading
    content: Young Man
  '15':
  - type: text
    content: How beautiful you are, my darling,
  - type: text
    content: how beautiful!
  - type: text
    content: Your eyes are like doves.
  - type: heading
    content: Young Woman
  '16':
  - type: text
    content: You are so handsome, my love,
  - type: text
    content: pleasing beyond words!
  - type: text
    content: The soft grass is our bed;
  '17':
  - type: text
    content: fragrant cedar branches are the beams of our house,
  - type: text
    content: and pleasant smelling firs are the rafters.
  '2':
  - type: text
    content: Kiss me and kiss me again,
  - type: text
    content: for your love is sweeter than wine.
  '3':
  - type: text
    content: How pleasing is your fragrance;
  - type: text
    content: your name is like the spreading fragrance of scented oils.
  - type: text
    content: No wonder all the young women love you!
  '4':
  - type: text
    content: Take me with you; come, let’s run!
  - type: text
    content: The king has brought me into his bedroom.
  - type: heading
    content: Young Women of Jerusalem
  - type: text
    content: How happy we are for you, O king.
  - type: text
    content: We praise your love even more than wine.
  - type: heading
    content: Young Woman
  - type: text
    content: How right they are to adore you.
  '5':
  - type: text
    content: I am dark but beautiful,
  - type: text
    content: O women of Jerusalem—
  - type: text
    content: dark as the tents of Kedar,
  - type: text
    content: dark as the curtains of Solomon’s tents.
  '6':
  - type: text
    content: Don’t stare at me because I am dark—
  - type: text
    content: the sun has darkened my skin.
  - type: text
    content: My brothers were angry with me;
  - type: text
    content: they forced me to care for their vineyards,
  - type: text
    content: so I couldn’t care for myself—my own vineyard.
  '7':
  - type: text
    content: Tell me, my love, where are you leading your flock today?
  - type: text
    content: Where will you rest your sheep at noon?
  - type: text
    content: For why should I wander like a prostitute
  - type: note
    content: Hebrew like a veiled woman.
  - type: text
    content: among your friends and their flocks?
  - type: heading
    content: Young Man
  '8':
  - type: text
    content: If you don’t know, O most beautiful woman,
  - type: text
    content: follow the trail of my flock,
  - type: text
    content: and graze your young goats by the shepherds’ tents.
  '9':
  - type: text
    content: You are as exciting, my darling,
  - type: text
    content: as a mare among Pharaoh’s stallions.
