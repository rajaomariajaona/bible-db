document_id: EZK.41
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: After that, the man brought me into the sanctuary of the Temple. He measured the walls on either side of its doorway,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As in Greek version; the meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' and they were 10-1/2 feet'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '6 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3.2 meters]; also in 41:3, 5.'
    marker-yv: yv-n
  - type: text
    text: ' thick. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The doorway was 17-1/2 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:2a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '10 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[5.3 meters].'
    marker-yv: yv-n
  - type: text
    text: ' wide, and the walls on each side of it were 8-3/4 feet'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:2b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '5 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2.7 meters]; also in 41:9, 11.'
    marker-yv: yv-n
  - type: text
    text: ' long. The sanctuary itself was 70 feet long and 35 feet wide.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:2c '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '40 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[21.2 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'long and 20 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[10.6 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: wide.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then he went beyond the sanctuary into the inner room. He measured the walls on either side of its entrance, and they were 3-1/2 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:3a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '2 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[1.1 meters].'
    marker-yv: yv-n
  - type: text
    text: ' thick. The entrance was 10-1/2 feet wide, and the walls on each side of the entrance were 12-1/4 feet'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:3b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '7 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3.7 meters].'
    marker-yv: yv-n
  - type: text
    text: ' long. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The inner room of the sanctuary was 35 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '20 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[10.6 meters]; also in 41:4b, 10.'
    marker-yv: yv-n
  - type: text
    text: ' long and 35 feet wide. “This,” he told me, “is the Most Holy Place.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then he measured the wall of the Temple, and it was 10-1/2 feet thick. There was a row of rooms along the outside wall; each room was 7 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '4 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2.1 meters].'
    marker-yv: yv-n
  - type: text
    text: ' wide. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'These side rooms were built in three levels, one above the other, with thirty rooms on each level. The supports for these side rooms rested on exterior ledges on the Temple wall; they did not extend into the wall. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Each level was wider than the one below it, corresponding to the narrowing of the Temple wall as it rose higher. A stairway led up from the bottom level through the middle level to the top level.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I saw that the Temple was built on a terrace, which provided a foundation for the side rooms. This terrace was 10-1/2 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1 rod, 6 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3.2 meters].'
    marker-yv: yv-n
  - type: text
    text: ' high. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The outer wall of the Temple’s side rooms was 8-3/4 feet thick. This left an open area between these side rooms '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and the row of rooms along the outer wall of the inner courtyard. This open area was 35 feet wide, and it went all the way around the Temple. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Two doors opened from the side rooms into the terrace yard, which was 8-3/4 feet wide. One door faced north and the other south.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: A large building stood on the west, facing the Temple courtyard. It was 122-1/2 feet wide and 157-1/2 feet long, and its walls were 8-3/4 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '70 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[37.1 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'wide and 90 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[47.7 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'long, and its walls were 5 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2.7 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: thick.
    marker-yv: yv-n
  - type: text
    text: ' thick. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then the man measured the Temple, and it was 175 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '100 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[53 meters]; also in 41:13b, 14, 15.'
    marker-yv: yv-n
  - type: text
    text: ' long. The courtyard around the building, including its walls, was an additional 175 feet in length. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The inner courtyard to the east of the Temple was also 175 feet wide. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The building to the west, including its two walls, was also 175 feet wide.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The sanctuary, the inner room, and the entry room of the Temple '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'were all paneled with wood, as were the frames of the recessed windows. The inner walls of the Temple were paneled with wood above and below the windows. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The space above the door leading into the inner room, and its walls inside and out, were also paneled. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'All the walls were decorated with carvings of cherubim, each with two faces, and there was a carving of a palm tree between each of the cherubim. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'One face—that of a man—looked toward the palm tree on one side. The other face—that of a young lion—looked toward the palm tree on the other side. The figures were carved all along the inside of the Temple, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: from the floor to the top of the walls, including the outer wall of the sanctuary.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'There were square columns at the entrance to the sanctuary, and the ones at the entrance of the Most Holy Place were similar. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: There was an altar made of wood, 5-1/4 feet high and 3-1/2 feet across.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '3 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[1.6 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'high and 2 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[1.1 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: across.
    marker-yv: yv-n
  - type: text
    text: ' Its corners, base, and sides were all made of wood. “This,” the man told me, “is the table that stands in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s presence.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Both the sanctuary and the Most Holy Place had double doorways, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'each with two swinging doors. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The doors leading into the sanctuary were decorated with carved cherubim and palm trees, just as on the walls. And there was a wooden roof at the front of the entry room to the Temple. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: On both sides of the entry room were recessed windows decorated with carved palm trees. The side rooms along the outside wall also had roofs.
