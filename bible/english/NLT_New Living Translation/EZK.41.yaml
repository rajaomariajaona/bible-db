document_id: EZK.41,116
type_code: eng
verses:
  '1':
  - type: text
    content: After that, the man brought me into the sanctuary of the Temple. He measured the walls on either side of its doorway,
  - type: note
    content: As in Greek version; the meaning of the Hebrew is uncertain.
  - type: text
    content: ' and they were 10-1/2 feet'
  - type: note
    content: Hebrew 6 cubits [3.2 meters]; also in 41:3, 5.
  - type: text
    content: ' thick. '
  '10':
  - type: text
    content: 'and the row of rooms along the outer wall of the inner courtyard. This open area was 35 feet wide, and it went all the way around the Temple. '
  '11':
  - type: text
    content: Two doors opened from the side rooms into the terrace yard, which was 8-3/4 feet wide. One door faced north and the other south.
  '12':
  - type: text
    content: A large building stood on the west, facing the Temple courtyard. It was 122-1/2 feet wide and 157-1/2 feet long, and its walls were 8-3/4 feet
  - type: note
    content: Hebrew 70 cubits [37.1 meters] wide and 90 cubits [47.7 meters] long, and its walls were 5 cubits [2.7 meters] thick.
  - type: text
    content: ' thick. '
  '13':
  - type: text
    content: Then the man measured the Temple, and it was 175 feet
  - type: note
    content: Hebrew 100 cubits [53 meters]; also in 41:13b, 14, 15.
  - type: text
    content: ' long. The courtyard around the building, including its walls, was an additional 175 feet in length. '
  '14':
  - type: text
    content: 'The inner courtyard to the east of the Temple was also 175 feet wide. '
  '15':
  - type: text
    content: The building to the west, including its two walls, was also 175 feet wide.
  - type: text
    content: 'The sanctuary, the inner room, and the entry room of the Temple '
  '16':
  - type: text
    content: 'were all paneled with wood, as were the frames of the recessed windows. The inner walls of the Temple were paneled with wood above and below the windows. '
  '17':
  - type: text
    content: 'The space above the door leading into the inner room, and its walls inside and out, were also paneled. '
  '18':
  - type: text
    content: 'All the walls were decorated with carvings of cherubim, each with two faces, and there was a carving of a palm tree between each of the cherubim. '
  '19':
  - type: text
    content: 'One face—that of a man—looked toward the palm tree on one side. The other face—that of a young lion—looked toward the palm tree on the other side. The figures were carved all along the inside of the Temple, '
  '2':
  - type: text
    content: The doorway was 17-1/2 feet
  - type: note
    content: Hebrew 10 cubits [5.3 meters].
  - type: text
    content: ' wide, and the walls on each side of it were 8-3/4 feet'
  - type: note
    content: Hebrew 5 cubits [2.7 meters]; also in 41:9, 11.
  - type: text
    content: ' long. The sanctuary itself was 70 feet long and 35 feet wide.'
  - type: note
    content: Hebrew 40 cubits [21.2 meters] long and 20 cubits [10.6 meters] wide.
  '20':
  - type: text
    content: from the floor to the top of the walls, including the outer wall of the sanctuary.
  '21':
  - type: text
    content: 'There were square columns at the entrance to the sanctuary, and the ones at the entrance of the Most Holy Place were similar. '
  '22':
  - type: text
    content: There was an altar made of wood, 5-1/4 feet high and 3-1/2 feet across.
  - type: note
    content: Hebrew 3 cubits [1.6 meters] high and 2 cubits [1.1 meters] across.
  - type: text
    content: ' Its corners, base, and sides were all made of wood. “This,” the man told me, “is the table that stands in the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence.”
  '23':
  - type: text
    content: 'Both the sanctuary and the Most Holy Place had double doorways, '
  '24':
  - type: text
    content: 'each with two swinging doors. '
  '25':
  - type: text
    content: 'The doors leading into the sanctuary were decorated with carved cherubim and palm trees, just as on the walls. And there was a wooden roof at the front of the entry room to the Temple. '
  '26':
  - type: text
    content: On both sides of the entry room were recessed windows decorated with carved palm trees. The side rooms along the outside wall also had roofs.
  '3':
  - type: text
    content: Then he went beyond the sanctuary into the inner room. He measured the walls on either side of its entrance, and they were 3-1/2 feet
  - type: note
    content: Hebrew 2 cubits [1.1 meters].
  - type: text
    content: ' thick. The entrance was 10-1/2 feet wide, and the walls on each side of the entrance were 12-1/4 feet'
  - type: note
    content: Hebrew 7 cubits [3.7 meters].
  - type: text
    content: ' long. '
  '4':
  - type: text
    content: The inner room of the sanctuary was 35 feet
  - type: note
    content: Hebrew 20 cubits [10.6 meters]; also in 41:4b, 10.
  - type: text
    content: ' long and 35 feet wide. “This,” he told me, “is the Most Holy Place.”'
  '5':
  - type: text
    content: Then he measured the wall of the Temple, and it was 10-1/2 feet thick. There was a row of rooms along the outside wall; each room was 7 feet
  - type: note
    content: Hebrew 4 cubits [2.1 meters].
  - type: text
    content: ' wide. '
  '6':
  - type: text
    content: 'These side rooms were built in three levels, one above the other, with thirty rooms on each level. The supports for these side rooms rested on exterior ledges on the Temple wall; they did not extend into the wall. '
  '7':
  - type: text
    content: Each level was wider than the one below it, corresponding to the narrowing of the Temple wall as it rose higher. A stairway led up from the bottom level through the middle level to the top level.
  '8':
  - type: text
    content: I saw that the Temple was built on a terrace, which provided a foundation for the side rooms. This terrace was 10-1/2 feet
  - type: note
    content: Hebrew 1 rod, 6 cubits [3.2 meters].
  - type: text
    content: ' high. '
  '9':
  - type: text
    content: 'The outer wall of the Temple’s side rooms was 8-3/4 feet thick. This left an open area between these side rooms '
