document_id: PSA.16
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:TITLE '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'miktam. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may be a literary or musical term.
    marker-yv: yv-n
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Keep me safe, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have come to you for refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I said to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “You are my Master!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Every good thing I have comes from you.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The godly people in the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: are my true heroes!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I take pleasure in them!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Troubles multiply for those who chase after other gods.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not take part in their sacrifices of blood
- type: usfm
  marker: q2
  children:
  - type: text
    text: or even speak the names of their gods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you alone are my inheritance, my cup of blessing.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You guard all that is mine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The land you have given me is a pleasant land.
- type: usfm
  marker: q2
  children:
  - type: text
    text: What a wonderful inheritance!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I will bless the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' who guides me;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: even at night my heart instructs me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I know the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is always with me.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not be shaken, for he is right beside me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: No wonder my heart is glad, and I rejoice.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'and my tongue shouts his praises. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Acts 2:26.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: My body rests in safety.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For you will not leave my soul among the dead
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:10a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in Sheol.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: or allow your holy one
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:10b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: your Holy One.
    marker-yv: yv-n
  - type: text
    text: ' to rot in the grave.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You will show me the way of life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: granting me the joy of your presence
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the pleasures of living with you forever.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'You have shown me the way of life, / and you will fill me with the joy of your presence. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Acts 2:28.
    marker-yv: yv-n
