document_id: PSA.16,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm
  - type: note
    content: Hebrew miktam. This may be a literary or musical term.
  - type: text
    content: ' of David.'
  - type: text
    content: Keep me safe, O God,
  - type: text
    content: for I have come to you for refuge.
  '10':
  - type: text
    content: For you will not leave my soul among the dead
  - type: note
    content: Hebrew in Sheol.
  - type: text
    content: or allow your holy one
  - type: note
    content: Or your Holy One.
  - type: text
    content: ' to rot in the grave.'
  '11':
  - type: text
    content: You will show me the way of life,
  - type: text
    content: granting me the joy of your presence
  - type: text
    content: and the pleasures of living with you forever.
  - type: note
    content: Greek version reads You have shown me the way of life, / and you will fill me with the joy of your presence. Compare Acts 2:28.
  '2':
  - type: text
    content: 'I said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “You are my Master!'
  - type: text
    content: Every good thing I have comes from you.”
  '3':
  - type: text
    content: The godly people in the land
  - type: text
    content: are my true heroes!
  - type: text
    content: I take pleasure in them!
  '4':
  - type: text
    content: Troubles multiply for those who chase after other gods.
  - type: text
    content: I will not take part in their sacrifices of blood
  - type: text
    content: or even speak the names of their gods.
  '5':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you alone are my inheritance, my cup of blessing.'
  - type: text
    content: You guard all that is mine.
  '6':
  - type: text
    content: The land you have given me is a pleasant land.
  - type: text
    content: What a wonderful inheritance!
  '7':
  - type: text
    content: 'I will bless the '
  - type: text
    content: Lord
  - type: text
    content: ' who guides me;'
  - type: text
    content: even at night my heart instructs me.
  '8':
  - type: text
    content: 'I know the '
  - type: text
    content: Lord
  - type: text
    content: ' is always with me.'
  - type: text
    content: I will not be shaken, for he is right beside me.
  '9':
  - type: text
    content: No wonder my heart is glad, and I rejoice.
  - type: note
    content: Greek version reads and my tongue shouts his praises. Compare Acts 2:26.
  - type: text
    content: My body rests in safety.
