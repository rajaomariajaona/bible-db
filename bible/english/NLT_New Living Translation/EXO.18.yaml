document_id: EXO.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jethro’s Visit to Moses
  - type: text
    content: 'Moses’ father-in-law, Jethro, the priest of Midian, heard about everything God had done for Moses and his people, the Israelites. He heard especially about how the '
  - type: text
    content: Lord
  - type: text
    content: ' had rescued them from Egypt.'
  '10':
  - type: text
    content: '“Praise the '
  - type: text
    content: Lord
  - type: text
    content: ',” Jethro said, “for he has rescued you from the Egyptians and from Pharaoh. Yes, he has rescued Israel from the powerful hand of Egypt! '
  '11':
  - type: text
    content: 'I know now that the '
  - type: text
    content: Lord
  - type: text
    content: ' is greater than all other gods, because he rescued his people from the oppression of the proud Egyptians.”'
  '12':
  - type: text
    content: Then Jethro, Moses’ father-in-law, brought a burnt offering and sacrifices to God. Aaron and all the elders of Israel came out and joined him in a sacrificial meal in God’s presence.
  - type: heading
    content: Jethro’s Wise Advice
  '13':
  - type: text
    content: The next day, Moses took his seat to hear the people’s disputes against each other. They waited before him from morning till evening.
  '14':
  - type: text
    content: When Moses’ father-in-law saw all that Moses was doing for the people, he asked, “What are you really accomplishing here? Why are you trying to do all this alone while everyone stands around you from morning till evening?”
  '15':
  - type: text
    content: 'Moses replied, “Because the people come to me to get a ruling from God. '
  '16':
  - type: text
    content: When a dispute arises, they come to me, and I am the one who settles the case between the quarreling parties. I inform the people of God’s decrees and give them his instructions.”
  '17':
  - type: text
    content: '“This is not good!” Moses’ father-in-law exclaimed. '
  '18':
  - type: text
    content: '“You’re going to wear yourself out—and the people, too. This job is too heavy a burden for you to handle all by yourself. '
  '19':
  - type: text
    content: 'Now listen to me, and let me give you a word of advice, and may God be with you. You should continue to be the people’s representative before God, bringing their disputes to him. '
  '2':
  - type: text
    content: 'Earlier, Moses had sent his wife, Zipporah, and his two sons back to Jethro, who had taken them in. '
  '20':
  - type: text
    content: 'Teach them God’s decrees, and give them his instructions. Show them how to conduct their lives. '
  '21':
  - type: text
    content: 'But select from all the people some capable, honest men who fear God and hate bribes. Appoint them as leaders over groups of one thousand, one hundred, fifty, and ten. '
  '22':
  - type: text
    content: 'They should always be available to solve the people’s common disputes, but have them bring the major cases to you. Let the leaders decide the smaller matters themselves. They will help you carry the load, making the task easier for you. '
  '23':
  - type: text
    content: If you follow this advice, and if God commands you to do so, then you will be able to endure the pressures, and all these people will go home in peace.”
  '24':
  - type: text
    content: 'Moses listened to his father-in-law’s advice and followed his suggestions. '
  '25':
  - type: text
    content: 'He chose capable men from all over Israel and appointed them as leaders over the people. He put them in charge of groups of one thousand, one hundred, fifty, and ten. '
  '26':
  - type: text
    content: These men were always available to solve the people’s common disputes. They brought the major cases to Moses, but they took care of the smaller matters themselves.
  '27':
  - type: text
    content: Soon after this, Moses said good-bye to his father-in-law, who returned to his own land.
  '3':
  - type: text
    content: (Moses’ first son was named Gershom,
  - type: note
    content: Gershom sounds like a Hebrew term that means “a foreigner there.”
  - type: text
    content: ' for Moses had said when the boy was born, “I have been a foreigner in a foreign land.” '
  '4':
  - type: text
    content: His second son was named Eliezer,
  - type: note
    content: Eliezer means “God is my helper.”
  - type: text
    content: ' for Moses had said, “The God of my ancestors was my helper; he rescued me from the sword of Pharaoh.”) '
  '5':
  - type: text
    content: 'Jethro, Moses’ father-in-law, now came to visit Moses in the wilderness. He brought Moses’ wife and two sons with him, and they arrived while Moses and the people were camped near the mountain of God. '
  '6':
  - type: text
    content: Jethro had sent a message to Moses, saying, “I, Jethro, your father-in-law, am coming to see you with your wife and your two sons.”
  '7':
  - type: text
    content: 'So Moses went out to meet his father-in-law. He bowed low and kissed him. They asked about each other’s welfare and then went into Moses’ tent. '
  '8':
  - type: text
    content: 'Moses told his father-in-law everything the '
  - type: text
    content: Lord
  - type: text
    content: ' had done to Pharaoh and Egypt on behalf of Israel. He also told about all the hardships they had experienced along the way and how the '
  - type: text
    content: Lord
  - type: text
    content: ' had rescued his people from all their troubles. '
  '9':
  - type: text
    content: 'Jethro was delighted when he heard about all the good things the '
  - type: text
    content: Lord
  - type: text
    content: ' had done for Israel as he rescued them from the hand of the Egyptians.'
