document_id: 1CH.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Other Descendants of Judah
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The descendants of Judah were Perez, Hezron, Carmi, Hur, and Shobal.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Shobal’s son Reaiah was the father of Jahath. Jahath was the father of Ahumai and Lahad. These were the families of the Zorathites.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The descendants of
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'father of. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' Etam were Jezreel, Ishma, Idbash, their sister Hazzelelponi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Penuel (the father of
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the founder of; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'also in 4:5, 12, 14, 17, 18, and perhaps other instances where the text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the father of.
    marker-yv: yv-n
  - type: text
    text: ' Gedor), and Ezer (the father of Hushah). These were the descendants of Hur (the firstborn of Ephrathah), the ancestor of Bethlehem.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ashhur (the father of Tekoa) had two wives, named Helah and Naarah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Naarah gave birth to Ahuzzam, Hepher, Temeni, and Haahashtari. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Helah gave birth to Zereth, Izhar,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in an alternate reading in the Masoretic Text (see also Latin Vulgate); the other alternate and the Greek version read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zohar.
    marker-yv: yv-n
  - type: text
    text: ' Ethnan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: and Koz, who became the ancestor of Anub, Zobebah, and all the families of Aharhel son of Harum.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: There was a man named Jabez who was more honorable than any of his brothers. His mother named him Jabez
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:9 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jabez '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sounds like a Hebrew word meaning “distress” or “pain.”
    marker-yv: yv-n
  - type: text
    text: ' because his birth had been so painful. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He was the one who prayed to the God of Israel, “Oh, that you would bless me and expand my territory! Please be with me in all that I do, and keep me from all trouble and pain!” And God granted him his request.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Kelub (the brother of Shuhah) was the father of Mehir. Mehir was the father of Eshton. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eshton was the father of Beth-rapha, Paseah, and Tehinnah. Tehinnah was the father of Ir-nahash. These were the descendants of Recah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The sons of Kenaz were Othniel and Seraiah. Othniel’s sons were Hathath and Meonothai.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Greek manuscripts and Latin Vulgate; Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and Meonothai.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Meonothai was the father of Ophrah. Seraiah was the father of Joab, the founder of the Valley of Craftsmen,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Joab, the father of Ge-harashim.
    marker-yv: yv-n
  - type: text
    text: ' so called because they were craftsmen.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The sons of Caleb son of Jephunneh were Iru, Elah, and Naam. The son of Elah was Kenaz.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The sons of Jehallelel were Ziph, Ziphah, Tiria, and Asarel.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The sons of Ezrah were Jether, Mered, Epher, and Jalon. One of Mered’s wives became
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jether’s wife became; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: She became.
    marker-yv: yv-n
  - type: text
    text: ' the mother of Miriam, Shammai, and Ishbah (the father of Eshtemoa). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He married a woman from Judah, who became the mother of Jered (the father of Gedor), Heber (the father of Soco), and Jekuthiel (the father of Zanoah). Mered also married Bithia, a daughter of Pharaoh, and she bore him children.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hodiah’s wife was the sister of Naham. One of her sons was the father of Keilah the Garmite, and another was the father of Eshtemoa the Maacathite.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The sons of Shimon were Amnon, Rinnah, Ben-hanan, and Tilon.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The descendants of Ishi were Zoheth and Ben-zoheth.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Judah’s Son Shelah
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Shelah was one of Judah’s sons. The descendants of Shelah were Er (the father of Lecah); Laadah (the father of Mareshah); the families of linen workers at Beth-ashbea; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jokim; the men of Cozeba; and Joash and Saraph, who ruled over Moab and Jashubi-lehem. These names all come from ancient records. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They were the pottery makers who lived in Netaim and Gederah. They lived there and worked for the king.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Simeon
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The sons of Simeon were Jemuel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:24a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Syriac version (see also Gen 46:10; Exod 6:15); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Nemuel.
    marker-yv: yv-n
  - type: text
    text: ' Jamin, Jarib, Zohar,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:24b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel texts at Gen 46:10 and Exod 6:15; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zerah.
    marker-yv: yv-n
  - type: text
    text: ' and Shaul.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The descendants of Shaul were Shallum, Mibsam, and Mishma.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The descendants of Mishma were Hammuel, Zaccur, and Shimei.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Shimei had sixteen sons and six daughters, but none of his brothers had large families. So Simeon’s tribe never grew as large as the tribe of Judah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'They lived in Beersheba, Moladah, Hazar-shual, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Bilhah, Ezem, Tolad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Bethuel, Hormah, Ziklag, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Beth-marcaboth, Hazar-susim, Beth-biri, and Shaaraim. These towns were under their control until the time of King David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Their descendants also lived in Etam, Ain, Rimmon, Token, and Ashan—five towns '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: and their surrounding villages as far away as Baalath.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Greek manuscripts (see also Josh 19:8); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Baal.
    marker-yv: yv-n
  - type: text
    text: ' This was their territory, and these names are listed in their genealogical records.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Other descendants of Simeon included Meshobab, Jamlech, Joshah son of Amaziah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Joel, Jehu son of Joshibiah, son of Seraiah, son of Asiel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Elioenai, Jaakobah, Jeshohaiah, Asaiah, Adiel, Jesimiel, Benaiah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: and Ziza son of Shiphi, son of Allon, son of Jedaiah, son of Shimri, son of Shemaiah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'These were the names of some of the leaders of Simeon’s wealthy clans. Their families grew, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: and they traveled to the region of Gerar,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gedor.
    marker-yv: yv-n
  - type: text
    text: ' in the east part of the valley, seeking pastureland for their flocks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: They found lush pastures there, and the land was spacious, quiet, and peaceful.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Some of Ham’s descendants had been living in that region. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: But during the reign of King Hezekiah of Judah, these leaders of Simeon invaded the region and completely destroyed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering.'
    marker-yv: yv-n
  - type: text
    text: ' the homes of the descendants of Ham and of the Meunites. No trace of them remains today. They killed everyone who lived there and took the land for themselves, because they wanted its good pastureland for their flocks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Five hundred of these invaders from the tribe of Simeon went to Mount Seir, led by Pelatiah, Neariah, Rephaiah, and Uzziel—all sons of Ishi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: They destroyed the few Amalekites who had survived, and they have lived there ever since.
