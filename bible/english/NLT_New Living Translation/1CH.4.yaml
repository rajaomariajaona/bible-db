document_id: 1CH.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Other Descendants of Judah
  - type: text
    content: The descendants of Judah were Perez, Hezron, Carmi, Hur, and Shobal.
  '10':
  - type: text
    content: He was the one who prayed to the God of Israel, “Oh, that you would bless me and expand my territory! Please be with me in all that I do, and keep me from all trouble and pain!” And God granted him his request.
  '11':
  - type: text
    content: 'Kelub (the brother of Shuhah) was the father of Mehir. Mehir was the father of Eshton. '
  '12':
  - type: text
    content: Eshton was the father of Beth-rapha, Paseah, and Tehinnah. Tehinnah was the father of Ir-nahash. These were the descendants of Recah.
  '13':
  - type: text
    content: The sons of Kenaz were Othniel and Seraiah. Othniel’s sons were Hathath and Meonothai.
  - type: note
    content: As in some Greek manuscripts and Latin Vulgate; Hebrew lacks and Meonothai.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Meonothai was the father of Ophrah. Seraiah was the father of Joab, the founder of the Valley of Craftsmen,
  - type: note
    content: Or Joab, the father of Ge-harashim.
  - type: text
    content: ' so called because they were craftsmen.'
  '15':
  - type: text
    content: The sons of Caleb son of Jephunneh were Iru, Elah, and Naam. The son of Elah was Kenaz.
  '16':
  - type: text
    content: The sons of Jehallelel were Ziph, Ziphah, Tiria, and Asarel.
  '17':
  - type: text
    content: The sons of Ezrah were Jether, Mered, Epher, and Jalon. One of Mered’s wives became
  - type: note
    content: Or Jether’s wife became; Hebrew reads She became.
  - type: text
    content: ' the mother of Miriam, Shammai, and Ishbah (the father of Eshtemoa). '
  '18':
  - type: text
    content: He married a woman from Judah, who became the mother of Jered (the father of Gedor), Heber (the father of Soco), and Jekuthiel (the father of Zanoah). Mered also married Bithia, a daughter of Pharaoh, and she bore him children.
  '19':
  - type: text
    content: Hodiah’s wife was the sister of Naham. One of her sons was the father of Keilah the Garmite, and another was the father of Eshtemoa the Maacathite.
  '2':
  - type: text
    content: Shobal’s son Reaiah was the father of Jahath. Jahath was the father of Ahumai and Lahad. These were the families of the Zorathites.
  '20':
  - type: text
    content: The sons of Shimon were Amnon, Rinnah, Ben-hanan, and Tilon.
  - type: text
    content: The descendants of Ishi were Zoheth and Ben-zoheth.
  - type: heading
    content: Descendants of Judah’s Son Shelah
  '21':
  - type: text
    content: 'Shelah was one of Judah’s sons. The descendants of Shelah were Er (the father of Lecah); Laadah (the father of Mareshah); the families of linen workers at Beth-ashbea; '
  '22':
  - type: text
    content: 'Jokim; the men of Cozeba; and Joash and Saraph, who ruled over Moab and Jashubi-lehem. These names all come from ancient records. '
  '23':
  - type: text
    content: They were the pottery makers who lived in Netaim and Gederah. They lived there and worked for the king.
  - type: heading
    content: Descendants of Simeon
  '24':
  - type: text
    content: The sons of Simeon were Jemuel,
  - type: note
    content: As in Syriac version (see also Gen 46:10; Exod 6:15); Hebrew reads Nemuel.
  - type: text
    content: ' Jamin, Jarib, Zohar,'
  - type: note
    content: As in parallel texts at Gen 46:10 and Exod 6:15; Hebrew reads Zerah.
  - type: text
    content: ' and Shaul.'
  '25':
  - type: text
    content: The descendants of Shaul were Shallum, Mibsam, and Mishma.
  '26':
  - type: text
    content: The descendants of Mishma were Hammuel, Zaccur, and Shimei.
  '27':
  - type: text
    content: Shimei had sixteen sons and six daughters, but none of his brothers had large families. So Simeon’s tribe never grew as large as the tribe of Judah.
  '28':
  - type: text
    content: 'They lived in Beersheba, Moladah, Hazar-shual, '
  '29':
  - type: text
    content: 'Bilhah, Ezem, Tolad, '
  '3':
  - type: text
    content: The descendants of
  - type: note
    content: As in Greek version; Hebrew reads father of. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' Etam were Jezreel, Ishma, Idbash, their sister Hazzelelponi, '
  '30':
  - type: text
    content: 'Bethuel, Hormah, Ziklag, '
  '31':
  - type: text
    content: 'Beth-marcaboth, Hazar-susim, Beth-biri, and Shaaraim. These towns were under their control until the time of King David. '
  '32':
  - type: text
    content: 'Their descendants also lived in Etam, Ain, Rimmon, Token, and Ashan—five towns '
  '33':
  - type: text
    content: and their surrounding villages as far away as Baalath.
  - type: note
    content: As in some Greek manuscripts (see also Josh 19:8); Hebrew reads Baal.
  - type: text
    content: ' This was their territory, and these names are listed in their genealogical records.'
  '34':
  - type: text
    content: 'Other descendants of Simeon included Meshobab, Jamlech, Joshah son of Amaziah, '
  '35':
  - type: text
    content: 'Joel, Jehu son of Joshibiah, son of Seraiah, son of Asiel, '
  '36':
  - type: text
    content: 'Elioenai, Jaakobah, Jeshohaiah, Asaiah, Adiel, Jesimiel, Benaiah, '
  '37':
  - type: text
    content: and Ziza son of Shiphi, son of Allon, son of Jedaiah, son of Shimri, son of Shemaiah.
  '38':
  - type: text
    content: 'These were the names of some of the leaders of Simeon’s wealthy clans. Their families grew, '
  '39':
  - type: text
    content: and they traveled to the region of Gerar,
  - type: note
    content: As in Greek version; Hebrew reads Gedor.
  - type: text
    content: ' in the east part of the valley, seeking pastureland for their flocks. '
  '4':
  - type: text
    content: Penuel (the father of
  - type: note
    content: Or the founder of; also in 4:5, 12, 14, 17, 18, and perhaps other instances where the text reads the father of.
  - type: text
    content: ' Gedor), and Ezer (the father of Hushah). These were the descendants of Hur (the firstborn of Ephrathah), the ancestor of Bethlehem.'
  '40':
  - type: text
    content: They found lush pastures there, and the land was spacious, quiet, and peaceful.
  - type: text
    content: 'Some of Ham’s descendants had been living in that region. '
  '41':
  - type: text
    content: But during the reign of King Hezekiah of Judah, these leaders of Simeon invaded the region and completely destroyed
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering.
  - type: text
    content: ' the homes of the descendants of Ham and of the Meunites. No trace of them remains today. They killed everyone who lived there and took the land for themselves, because they wanted its good pastureland for their flocks. '
  '42':
  - type: text
    content: 'Five hundred of these invaders from the tribe of Simeon went to Mount Seir, led by Pelatiah, Neariah, Rephaiah, and Uzziel—all sons of Ishi. '
  '43':
  - type: text
    content: They destroyed the few Amalekites who had survived, and they have lived there ever since.
  '5':
  - type: text
    content: 'Ashhur (the father of Tekoa) had two wives, named Helah and Naarah. '
  '6':
  - type: text
    content: 'Naarah gave birth to Ahuzzam, Hepher, Temeni, and Haahashtari. '
  '7':
  - type: text
    content: Helah gave birth to Zereth, Izhar,
  - type: note
    content: As in an alternate reading in the Masoretic Text (see also Latin Vulgate); the other alternate and the Greek version read Zohar.
  - type: text
    content: ' Ethnan, '
  '8':
  - type: text
    content: and Koz, who became the ancestor of Anub, Zobebah, and all the families of Aharhel son of Harum.
  '9':
  - type: text
    content: There was a man named Jabez who was more honorable than any of his brothers. His mother named him Jabez
  - type: note
    content: Jabez sounds like a Hebrew word meaning “distress” or “pain.”
  - type: text
    content: ' because his birth had been so painful. '
