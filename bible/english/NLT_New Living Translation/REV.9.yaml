document_id: REV.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Fifth Trumpet Brings the First Terror
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the fifth angel blew his trumpet, and I saw a star that had fallen to earth from the sky, and he was given the key to the shaft of the bottomless pit.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the abyss, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the underworld; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 9:11.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When he opened it, smoke poured out as though from a huge furnace, and the sunlight and air turned dark from the smoke.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then locusts came from the smoke and descended on the earth, and they were given power to sting like scorpions. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They were told not to harm the grass or plants or trees, but only the people who did not have the seal of God on their foreheads. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They were told not to kill them but to torture them for five months with pain like the pain of a scorpion sting. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: In those days people will seek death but will not find it. They will long to die, but death will flee from them!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The locusts looked like horses prepared for battle. They had what looked like gold crowns on their heads, and their faces looked like human faces. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'They had hair like women’s hair and teeth like the teeth of a lion. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'They wore armor made of iron, and their wings roared like an army of chariots rushing into battle. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They had tails that stung like scorpions, and for five months they had the power to torment people. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Their king is the angel from the bottomless pit; his name in Hebrew is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Abaddon,
  - type: text
    text: ' and in Greek, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Apollyon
  - type: text
    text: —the Destroyer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The first terror is past, but look, two more terrors are coming!
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sixth Trumpet Brings the Second Terror
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the sixth angel blew his trumpet, and I heard a voice speaking from the four horns of the gold altar that stands in the presence of God. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the voice said to the sixth angel who held the trumpet, “Release the four angels who are bound at the great Euphrates River.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the four angels who had been prepared for this hour and day and month and year were turned loose to kill one-third of all the people on earth. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I heard the size of their army, which was 200 million mounted troops.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And in my vision, I saw the horses and the riders sitting on them. The riders wore armor that was fiery red and dark blue and yellow. The horses had heads like lions, and fire and smoke and burning sulfur billowed from their mouths. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'One-third of all the people on earth were killed by these three plagues—by the fire and smoke and burning sulfur that came from the mouths of the horses. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Their power was in their mouths and in their tails. For their tails had heads like snakes, with the power to injure people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But the people who did not die in these plagues still refused to repent of their evil deeds and turn to God. They continued to worship demons and idols made of gold, silver, bronze, stone, and wood—idols that can neither see nor hear nor walk! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And they did not repent of their murders or their witchcraft or their sexual immorality or their thefts.
