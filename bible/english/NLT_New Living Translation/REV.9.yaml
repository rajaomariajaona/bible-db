document_id: REV.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fifth Trumpet Brings the First Terror
  - type: text
    content: Then the fifth angel blew his trumpet, and I saw a star that had fallen to earth from the sky, and he was given the key to the shaft of the bottomless pit.
  - type: note
    content: Or the abyss, or the underworld; also in 9:11.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'They had tails that stung like scorpions, and for five months they had the power to torment people. '
  '11':
  - type: text
    content: 'Their king is the angel from the bottomless pit; his name in Hebrew is '
  - type: text
    content: Abaddon,
  - type: text
    content: ' and in Greek, '
  - type: text
    content: Apollyon
  - type: text
    content: —the Destroyer.
  '12':
  - type: text
    content: The first terror is past, but look, two more terrors are coming!
  - type: heading
    content: The Sixth Trumpet Brings the Second Terror
  '13':
  - type: text
    content: 'Then the sixth angel blew his trumpet, and I heard a voice speaking from the four horns of the gold altar that stands in the presence of God. '
  '14':
  - type: text
    content: 'And the voice said to the sixth angel who held the trumpet, “Release the four angels who are bound at the great Euphrates River.” '
  '15':
  - type: text
    content: 'Then the four angels who had been prepared for this hour and day and month and year were turned loose to kill one-third of all the people on earth. '
  '16':
  - type: text
    content: I heard the size of their army, which was 200 million mounted troops.
  '17':
  - type: text
    content: 'And in my vision, I saw the horses and the riders sitting on them. The riders wore armor that was fiery red and dark blue and yellow. The horses had heads like lions, and fire and smoke and burning sulfur billowed from their mouths. '
  '18':
  - type: text
    content: 'One-third of all the people on earth were killed by these three plagues—by the fire and smoke and burning sulfur that came from the mouths of the horses. '
  '19':
  - type: text
    content: Their power was in their mouths and in their tails. For their tails had heads like snakes, with the power to injure people.
  '2':
  - type: text
    content: When he opened it, smoke poured out as though from a huge furnace, and the sunlight and air turned dark from the smoke.
  '20':
  - type: text
    content: 'But the people who did not die in these plagues still refused to repent of their evil deeds and turn to God. They continued to worship demons and idols made of gold, silver, bronze, stone, and wood—idols that can neither see nor hear nor walk! '
  '21':
  - type: text
    content: And they did not repent of their murders or their witchcraft or their sexual immorality or their thefts.
  '3':
  - type: text
    content: 'Then locusts came from the smoke and descended on the earth, and they were given power to sting like scorpions. '
  '4':
  - type: text
    content: 'They were told not to harm the grass or plants or trees, but only the people who did not have the seal of God on their foreheads. '
  '5':
  - type: text
    content: 'They were told not to kill them but to torture them for five months with pain like the pain of a scorpion sting. '
  '6':
  - type: text
    content: In those days people will seek death but will not find it. They will long to die, but death will flee from them!
  '7':
  - type: text
    content: 'The locusts looked like horses prepared for battle. They had what looked like gold crowns on their heads, and their faces looked like human faces. '
  '8':
  - type: text
    content: 'They had hair like women’s hair and teeth like the teeth of a lion. '
  '9':
  - type: text
    content: 'They wore armor made of iron, and their wings roared like an army of chariots rushing into battle. '
