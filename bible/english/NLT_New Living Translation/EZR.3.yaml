document_id: EZR.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Altar Is Rebuilt
  - type: text
    content: In early autumn,
  - type: note
    content: Hebrew In the seventh month. The year is not specified, so it may have been during Cyrus’s first year (538 b.c.) or second year (537 b.c.). The seventh month of the ancient Hebrew lunar calendar occurred within the months of September/October 538 b.c. and October/November 537 b.c.
  - type: text
    content: ' when the Israelites had settled in their towns, all the people assembled in Jerusalem with a unified purpose. '
  '10':
  - type: text
    content: 'When the builders completed the foundation of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple, the priests put on their robes and took their places to blow their trumpets. And the Levites, descendants of Asaph, clashed their cymbals to praise the '
  - type: text
    content: Lord
  - type: text
    content: ', just as King David had prescribed. '
  '11':
  - type: text
    content: 'With praise and thanks, they sang this song to the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “He is so good!
  - type: text
    content: His faithful love for Israel endures forever!”
  - type: text
    content: 'Then all the people gave a great shout, praising the '
  - type: text
    content: Lord
  - type: text
    content: ' because the foundation of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple had been laid.
  '12':
  - type: text
    content: 'But many of the older priests, Levites, and other leaders who had seen the first Temple wept aloud when they saw the new Temple’s foundation. The others, however, were shouting for joy. '
  '13':
  - type: text
    content: The joyful shouting and weeping mingled together in a loud noise that could be heard far in the distance.
  '2':
  - type: text
    content: Then Jeshua son of Jehozadak
  - type: note
    content: Hebrew Jozadak, a variant spelling of Jehozadak; also in 3:8.
  - type: text
    content: ' joined his fellow priests and Zerubbabel son of Shealtiel with his family in rebuilding the altar of the God of Israel. They wanted to sacrifice burnt offerings on it, as instructed in the Law of Moses, the man of God. '
  '3':
  - type: text
    content: 'Even though the people were afraid of the local residents, they rebuilt the altar at its old site. Then they began to sacrifice burnt offerings on the altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' each morning and evening.'
  '4':
  - type: text
    content: 'They celebrated the Festival of Shelters as prescribed in the Law, sacrificing the number of burnt offerings specified for each day of the festival. '
  '5':
  - type: text
    content: 'They also offered the regular burnt offerings and the offerings required for the new moon celebrations and the annual festivals as prescribed by the '
  - type: text
    content: Lord
  - type: text
    content: '. The people also gave voluntary offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: Fifteen days before the Festival of Shelters began,
  - type: note
    content: Hebrew On the first day of the seventh month. This day in the ancient Hebrew lunar calendar occurred in September or October. The Festival of Shelters began on the fifteenth day of the seventh month.
  - type: text
    content: ' the priests had begun to sacrifice burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '. This was even before they had started to lay the foundation of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple.
  - type: heading
    content: The People Begin to Rebuild the Temple
  '7':
  - type: text
    content: Then the people hired masons and carpenters and bought cedar logs from the people of Tyre and Sidon, paying them with food, wine, and olive oil. The logs were brought down from the Lebanon mountains and floated along the coast of the Mediterranean Sea
  - type: note
    content: Hebrew the sea.
  - type: text
    content: ' to Joppa, for King Cyrus had given permission for this.'
  '8':
  - type: text
    content: The construction of the Temple of God began in midspring,
  - type: note
    content: Hebrew in the second month. This month in the ancient Hebrew lunar calendar occurred within the months of April and May 536 b.c.
  - type: text
    content: ' during the second year after they arrived in Jerusalem. The work force was made up of everyone who had returned from exile, including Zerubbabel son of Shealtiel, Jeshua son of Jehozadak and his fellow priests, and all the Levites. The Levites who were twenty years old or older were put in charge of rebuilding the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple. '
  '9':
  - type: text
    content: The workers at the Temple of God were supervised by Jeshua with his sons and relatives, and Kadmiel and his sons, all descendants of Hodaviah.
  - type: note
    content: Hebrew sons of Judah (i.e., bene Yehudah). Bene might also be read here as the proper name Binnui; Yehudah is probably another name for Hodaviah. Compare 2:40; Neh 7:43; 1 Esdras 5:58.
  - type: text
    content: ' They were helped in this task by the Levites of the family of Henadad.'
