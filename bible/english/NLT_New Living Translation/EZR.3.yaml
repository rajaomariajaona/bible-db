document_id: EZR.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Altar Is Rebuilt
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: In early autumn,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'In the seventh month. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The year is not specified, so it may have been during Cyrus’s first year (538 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ') or second year (537 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: '). The seventh month of the ancient Hebrew lunar calendar occurred within the months of September/October 538 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ' and October/November 537 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' when the Israelites had settled in their towns, all the people assembled in Jerusalem with a unified purpose. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Then Jeshua son of Jehozadak
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jozadak, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehozadak; also in 3:8.
    marker-yv: yv-n
  - type: text
    text: ' joined his fellow priests and Zerubbabel son of Shealtiel with his family in rebuilding the altar of the God of Israel. They wanted to sacrifice burnt offerings on it, as instructed in the Law of Moses, the man of God. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Even though the people were afraid of the local residents, they rebuilt the altar at its old site. Then they began to sacrifice burnt offerings on the altar to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' each morning and evening.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They celebrated the Festival of Shelters as prescribed in the Law, sacrificing the number of burnt offerings specified for each day of the festival. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They also offered the regular burnt offerings and the offerings required for the new moon celebrations and the annual festivals as prescribed by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. The people also gave voluntary offerings to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fifteen days before the Festival of Shelters began,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the first day of the seventh month. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This day in the ancient Hebrew lunar calendar occurred in September or October. The Festival of Shelters began on the fifteenth day of the seventh month.
    marker-yv: yv-n
  - type: text
    text: ' the priests had begun to sacrifice burnt offerings to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. This was even before they had started to lay the foundation of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The People Begin to Rebuild the Temple
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then the people hired masons and carpenters and bought cedar logs from the people of Tyre and Sidon, paying them with food, wine, and olive oil. The logs were brought down from the Lebanon mountains and floated along the coast of the Mediterranean Sea
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the sea.
    marker-yv: yv-n
  - type: text
    text: ' to Joppa, for King Cyrus had given permission for this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The construction of the Temple of God began in midspring,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in the second month. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This month in the ancient Hebrew lunar calendar occurred within the months of April and May 536 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' during the second year after they arrived in Jerusalem. The work force was made up of everyone who had returned from exile, including Zerubbabel son of Shealtiel, Jeshua son of Jehozadak and his fellow priests, and all the Levites. The Levites who were twenty years old or older were put in charge of rebuilding the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The workers at the Temple of God were supervised by Jeshua with his sons and relatives, and Kadmiel and his sons, all descendants of Hodaviah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sons of Judah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(i.e., '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bene Yehudah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Bene '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'might also be read here as the proper name Binnui; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yehudah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is probably another name for Hodaviah. Compare 2:40; Neh 7:43; 1 Esdras 5:58.
    marker-yv: yv-n
  - type: text
    text: ' They were helped in this task by the Levites of the family of Henadad.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When the builders completed the foundation of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple, the priests put on their robes and took their places to blow their trumpets. And the Levites, descendants of Asaph, clashed their cymbals to praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', just as King David had prescribed. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'With praise and thanks, they sang this song to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “He is so good!
- type: usfm
  marker: q2
  children:
  - type: text
    text: His faithful love for Israel endures forever!”
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Then all the people gave a great shout, praising the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' because the foundation of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple had been laid.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But many of the older priests, Levites, and other leaders who had seen the first Temple wept aloud when they saw the new Temple’s foundation. The others, however, were shouting for joy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The joyful shouting and weeping mingled together in a loud noise that could be heard far in the distance.
