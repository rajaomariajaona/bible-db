document_id: MRK.7,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Teaches about Inner Purity
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'One day some Pharisees and teachers of religious law arrived from Jerusalem to see Jesus. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For instance, Moses gave you this law from God: ‘Honor your father and mother,’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:10a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 20:12; Deut 5:16.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and ‘Anyone who speaks disrespectfully of father or mother must be put to death.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:10b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 21:17 (Greek version); Lev 20:9 (Greek version).
      marker-yv: yv-n
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But you say it is all right for people to say to their parents, ‘Sorry, I can’t help you. For I have vowed to give to God what I would have given to you.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ‘What I would have given to you is Corban’ (that is, a gift).
      marker-yv: yv-n
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In this way, you let them disregard their needy parents.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And so you cancel the word of God in order to hand down your own tradition. And this is only one example among many others.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus called to the crowd to come and hear. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“All of you listen,” '
    - type: text
      text: 'he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “and try to understand.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It’s not what goes into your body that defiles you; you are defiled by what comes from your heart.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add verse 16, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Anyone with ears to hear should listen and understand. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare 4:9, 23.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus went into a house to get away from the crowd, and his disciples asked him what he meant by the parable he had just used. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Don’t you understand either?” '
    - type: text
      text: 'he asked. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Can’t you see that the food you put into your body cannot defile you?
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Food doesn’t go into your heart, but only passes through the stomach and then goes into the sewer.”
    - type: text
      text: ' (By saying this, he declared that every kind of food is acceptable in God’s eyes.)'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They noticed that some of his disciples failed to follow the Jewish ritual of hand washing before eating. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And then he added, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It is what comes from inside that defiles you.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For from within, out of a person’s heart, come evil thoughts, sexual immorality, theft, murder,
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: adultery, greed, wickedness, deceit, lustful desires, envy, slander, pride, and foolishness.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: All these vile things come from within; they are what defile you.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Faith of a Gentile Woman
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then Jesus left Galilee and went north to the region of Tyre.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and Sidon.
      marker-yv: yv-n
    - type: text
      text: ' He didn’t want anyone to know which house he was staying in, but he couldn’t keep it a secret. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Right away a woman who had heard about him came and fell at his feet. Her little girl was possessed by an evil
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: unclean.
      marker-yv: yv-n
    - type: text
      text: ' spirit, '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: and she begged him to cast out the demon from her daughter.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since she was a Gentile, born in Syrian Phoenicia, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus told her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “First I should feed the children—my own family, the Jews.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Let the children eat first.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It isn’t right to take food from the children and throw it to the dogs.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She replied, “That’s true, Lord, but even the dogs under the table are allowed to eat the scraps from the children’s plates.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Good answer!” '
    - type: text
      text: 'he said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now go home, for the demon has left your daughter.”
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: (The Jews, especially the Pharisees, do not eat until they have poured water over their cupped hands,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: have washed with the fist.
      marker-yv: yv-n
    - type: text
      text: ' as required by their ancient traditions. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when she arrived home, she found her little girl lying quietly in bed, and the demon was gone.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals a Deaf Man
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Jesus left Tyre and went up to Sidon before going back to the Sea of Galilee and the region of the Ten Towns.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Decapolis.
      marker-yv: yv-n
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: A deaf man with a speech impediment was brought to him, and the people begged Jesus to lay his hands on the man to heal him.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus led him away from the crowd so they could be alone. He put his fingers into the man’s ears. Then, spitting on his own fingers, he touched the man’s tongue. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Looking up to heaven, he sighed and said, '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: “Ephphatha,”
    - type: text
      text: ' which means, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Be opened!”
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Instantly the man could hear perfectly, and his tongue was freed so he could speak plainly!
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus told the crowd not to tell anyone, but the more he told them not to, the more they spread the news. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They were completely amazed and said again and again, “Everything he does is wonderful. He even makes the deaf to hear and gives speech to those who cannot speak.”
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Similarly, they don’t eat anything from the market until they immerse their hands
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:4a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sprinkle themselves.
      marker-yv: yv-n
    - type: text
      text: ' in water. This is but one of many traditions they have clung to—such as their ceremonial washing of cups, pitchers, and kettles.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:4b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and dining couches.
      marker-yv: yv-n
    - type: text
      text: )
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the Pharisees and teachers of religious law asked him, “Why don’t your disciples follow our age-old tradition? They eat without first performing the hand-washing ceremony.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You hypocrites! Isaiah was right when he prophesied about you, for he wrote,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘These people honor me with their lips,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but their hearts are far from me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Their worship is a farce,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for they teach man-made ideas as commands from God.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 29:13 (Greek version).
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For you ignore God’s law and substitute your own tradition.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You skillfully sidestep God’s law in order to hold on to your own tradition.
    - type: text
      text: ' '
