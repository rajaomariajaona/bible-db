document_id: MRK.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Teaches about Inner Purity
  - type: text
    content: 'One day some Pharisees and teachers of religious law arrived from Jerusalem to see Jesus. '
  '10':
  - type: text
    content: 'For instance, Moses gave you this law from God: ‘Honor your father and mother,’'
  - type: note
    content: Exod 20:12; Deut 5:16.
  - type: text
    content: ' '
  - type: text
    content: and ‘Anyone who speaks disrespectfully of father or mother must be put to death.’
  - type: note
    content: Exod 21:17 (Greek version); Lev 20:9 (Greek version).
  - type: text
    content: ' '
  '11':
  - type: text
    content: But you say it is all right for people to say to their parents, ‘Sorry, I can’t help you. For I have vowed to give to God what I would have given to you.’
  - type: note
    content: Greek ‘What I would have given to you is Corban’ (that is, a gift).
  - type: text
    content: ' '
  '12':
  - type: text
    content: In this way, you let them disregard their needy parents.
  - type: text
    content: ' '
  '13':
  - type: text
    content: And so you cancel the word of God in order to hand down your own tradition. And this is only one example among many others.”
  '14':
  - type: text
    content: 'Then Jesus called to the crowd to come and hear. '
  - type: text
    content: '“All of you listen,” '
  - type: text
    content: 'he said, '
  - type: text
    content: “and try to understand.
  - type: text
    content: ' '
  '15':
  - type: text
    content: It’s not what goes into your body that defiles you; you are defiled by what comes from your heart.
  - type: note
    content: Some manuscripts add verse 16, Anyone with ears to hear should listen and understand. Compare 4:9, 23.
  - type: text
    content: ”
  '17':
  - type: text
    content: 'Then Jesus went into a house to get away from the crowd, and his disciples asked him what he meant by the parable he had just used. '
  '18':
  - type: text
    content: '“Don’t you understand either?” '
  - type: text
    content: 'he asked. '
  - type: text
    content: “Can’t you see that the food you put into your body cannot defile you?
  - type: text
    content: ' '
  '19':
  - type: text
    content: Food doesn’t go into your heart, but only passes through the stomach and then goes into the sewer.”
  - type: text
    content: ' (By saying this, he declared that every kind of food is acceptable in God’s eyes.)'
  '2':
  - type: text
    content: 'They noticed that some of his disciples failed to follow the Jewish ritual of hand washing before eating. '
  '20':
  - type: text
    content: 'And then he added, '
  - type: text
    content: “It is what comes from inside that defiles you.
  - type: text
    content: ' '
  '21':
  - type: text
    content: For from within, out of a person’s heart, come evil thoughts, sexual immorality, theft, murder,
  - type: text
    content: ' '
  '22':
  - type: text
    content: adultery, greed, wickedness, deceit, lustful desires, envy, slander, pride, and foolishness.
  - type: text
    content: ' '
  '23':
  - type: text
    content: All these vile things come from within; they are what defile you.”
  - type: heading
    content: The Faith of a Gentile Woman
  '24':
  - type: text
    content: Then Jesus left Galilee and went north to the region of Tyre.
  - type: note
    content: Some manuscripts add and Sidon.
  - type: text
    content: ' He didn’t want anyone to know which house he was staying in, but he couldn’t keep it a secret. '
  '25':
  - type: text
    content: Right away a woman who had heard about him came and fell at his feet. Her little girl was possessed by an evil
  - type: note
    content: Greek unclean.
  - type: text
    content: ' spirit, '
  '26':
  - type: text
    content: and she begged him to cast out the demon from her daughter.
  - type: text
    content: 'Since she was a Gentile, born in Syrian Phoenicia, '
  '27':
  - type: text
    content: 'Jesus told her, '
  - type: text
    content: “First I should feed the children—my own family, the Jews.
  - type: note
    content: Greek Let the children eat first.
  - type: text
    content: ' '
  - type: text
    content: It isn’t right to take food from the children and throw it to the dogs.”
  '28':
  - type: text
    content: She replied, “That’s true, Lord, but even the dogs under the table are allowed to eat the scraps from the children’s plates.”
  '29':
  - type: text
    content: ' '
  - type: text
    content: '“Good answer!” '
  - type: text
    content: 'he said. '
  - type: text
    content: “Now go home, for the demon has left your daughter.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: (The Jews, especially the Pharisees, do not eat until they have poured water over their cupped hands,
  - type: note
    content: Greek have washed with the fist.
  - type: text
    content: ' as required by their ancient traditions. '
  '30':
  - type: text
    content: And when she arrived home, she found her little girl lying quietly in bed, and the demon was gone.
  - type: heading
    content: Jesus Heals a Deaf Man
  '31':
  - type: text
    content: Jesus left Tyre and went up to Sidon before going back to the Sea of Galilee and the region of the Ten Towns.
  - type: note
    content: Greek Decapolis.
  - type: text
    content: ' '
  '32':
  - type: text
    content: A deaf man with a speech impediment was brought to him, and the people begged Jesus to lay his hands on the man to heal him.
  '33':
  - type: text
    content: 'Jesus led him away from the crowd so they could be alone. He put his fingers into the man’s ears. Then, spitting on his own fingers, he touched the man’s tongue. '
  '34':
  - type: text
    content: 'Looking up to heaven, he sighed and said, '
  - type: text
    content: “Ephphatha,”
  - type: text
    content: ' which means, '
  - type: text
    content: “Be opened!”
  - type: text
    content: ' '
  '35':
  - type: text
    content: Instantly the man could hear perfectly, and his tongue was freed so he could speak plainly!
  '36':
  - type: text
    content: 'Jesus told the crowd not to tell anyone, but the more he told them not to, the more they spread the news. '
  '37':
  - type: text
    content: They were completely amazed and said again and again, “Everything he does is wonderful. He even makes the deaf to hear and gives speech to those who cannot speak.”
  '4':
  - type: text
    content: Similarly, they don’t eat anything from the market until they immerse their hands
  - type: note
    content: Some manuscripts read sprinkle themselves.
  - type: text
    content: ' in water. This is but one of many traditions they have clung to—such as their ceremonial washing of cups, pitchers, and kettles.'
  - type: note
    content: Some manuscripts add and dining couches.
  - type: text
    content: )
  '5':
  - type: text
    content: So the Pharisees and teachers of religious law asked him, “Why don’t your disciples follow our age-old tradition? They eat without first performing the hand-washing ceremony.”
  '6':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You hypocrites! Isaiah was right when he prophesied about you, for he wrote,
  - type: text
    content: ‘These people honor me with their lips,
  - type: text
    content: but their hearts are far from me.
  '7':
  - type: text
    content: ' '
  - type: text
    content: Their worship is a farce,
  - type: text
    content: for they teach man-made ideas as commands from God.’
  - type: note
    content: Isa 29:13 (Greek version).
  '8':
  - type: text
    content: ' '
  - type: text
    content: For you ignore God’s law and substitute your own tradition.”
  '9':
  - type: text
    content: 'Then he said, '
  - type: text
    content: “You skillfully sidestep God’s law in order to hold on to your own tradition.
  - type: text
    content: ' '
