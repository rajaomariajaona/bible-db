document_id: JOB.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Eliphaz’s First Response to Job
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Eliphaz the Temanite replied to Job:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Will you be patient and let me say a word?
- type: usfm
  marker: q2
  children:
  - type: text
    text: For who could keep from speaking out?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “In the past you have encouraged many people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have strengthened those who were weak.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Your words have supported those who were falling;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you encouraged those with shaky knees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But now when trouble strikes, you lose heart.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are terrified when it touches you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Doesn’t your reverence for God give you confidence?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Doesn’t your life of integrity give you hope?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Stop and think! Do the innocent die?
- type: usfm
  marker: q2
  children:
  - type: text
    text: When have the upright been destroyed?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: My experience shows that those who plant trouble
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cultivate evil will harvest the same.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: A breath from God destroys them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They vanish in a blast of his anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The lion roars and the wildcat snarls,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the teeth of strong lions will be broken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The fierce lion will starve for lack of prey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the cubs of the lioness will be scattered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “This truth was given to me in secret,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as though whispered in my ear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: It came to me in a disturbing vision at night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when people are in a deep sleep.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fear gripped me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my bones trembled.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: A spirit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:15a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'wind; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 4:16.
    marker-yv: yv-n
  - type: text
    text: ' swept past my face,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my hair stood on end.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:15b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: its wind sent shivers up my spine.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The spirit stopped, but I couldn’t see its shape.
- type: usfm
  marker: q2
  children:
  - type: text
    text: There was a form before my eyes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the silence I heard a voice say,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ‘Can a mortal be innocent before God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can anyone be pure before the Creator?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “If God does not trust his own angels
- type: usfm
  marker: q2
  children:
  - type: text
    text: and has charged his messengers with foolishness,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: how much less will he trust people made of clay!
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are made of dust, crushed as easily as a moth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They are alive in the morning but dead by evening,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gone forever without a trace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Their tent-cords are pulled and the tent collapses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they die in ignorance.
