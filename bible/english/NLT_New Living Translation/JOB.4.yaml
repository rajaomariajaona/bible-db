document_id: JOB.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Eliphaz’s First Response to Job
  - type: text
    content: 'Then Eliphaz the Temanite replied to Job:'
  '10':
  - type: text
    content: The lion roars and the wildcat snarls,
  - type: text
    content: but the teeth of strong lions will be broken.
  '11':
  - type: text
    content: The fierce lion will starve for lack of prey,
  - type: text
    content: and the cubs of the lioness will be scattered.
  '12':
  - type: text
    content: “This truth was given to me in secret,
  - type: text
    content: as though whispered in my ear.
  '13':
  - type: text
    content: It came to me in a disturbing vision at night,
  - type: text
    content: when people are in a deep sleep.
  '14':
  - type: text
    content: Fear gripped me,
  - type: text
    content: and my bones trembled.
  '15':
  - type: text
    content: A spirit
  - type: note
    content: Or wind; also in 4:16.
  - type: text
    content: ' swept past my face,'
  - type: text
    content: and my hair stood on end.
  - type: note
    content: Or its wind sent shivers up my spine.
  '16':
  - type: text
    content: The spirit stopped, but I couldn’t see its shape.
  - type: text
    content: There was a form before my eyes.
  - type: text
    content: In the silence I heard a voice say,
  '17':
  - type: text
    content: ‘Can a mortal be innocent before God?
  - type: text
    content: Can anyone be pure before the Creator?’
  '18':
  - type: text
    content: “If God does not trust his own angels
  - type: text
    content: and has charged his messengers with foolishness,
  '19':
  - type: text
    content: how much less will he trust people made of clay!
  - type: text
    content: They are made of dust, crushed as easily as a moth.
  '2':
  - type: text
    content: “Will you be patient and let me say a word?
  - type: text
    content: For who could keep from speaking out?
  '20':
  - type: text
    content: They are alive in the morning but dead by evening,
  - type: text
    content: gone forever without a trace.
  '21':
  - type: text
    content: Their tent-cords are pulled and the tent collapses,
  - type: text
    content: and they die in ignorance.
  '3':
  - type: text
    content: “In the past you have encouraged many people;
  - type: text
    content: you have strengthened those who were weak.
  '4':
  - type: text
    content: Your words have supported those who were falling;
  - type: text
    content: you encouraged those with shaky knees.
  '5':
  - type: text
    content: But now when trouble strikes, you lose heart.
  - type: text
    content: You are terrified when it touches you.
  '6':
  - type: text
    content: Doesn’t your reverence for God give you confidence?
  - type: text
    content: Doesn’t your life of integrity give you hope?
  '7':
  - type: text
    content: “Stop and think! Do the innocent die?
  - type: text
    content: When have the upright been destroyed?
  '8':
  - type: text
    content: My experience shows that those who plant trouble
  - type: text
    content: and cultivate evil will harvest the same.
  '9':
  - type: text
    content: A breath from God destroys them.
  - type: text
    content: They vanish in a blast of his anger.
