document_id: ROM.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Judgment of Sin
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'You may think you can condemn such people, but you are just as bad, and you have no excuse! When you say they are wicked and should be punished, you are condemning yourself, for you who judge others do these very same things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And we know that God, in his justice, will punish anyone who does such things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Since you judge others for doing these things, why do you think you can avoid God’s judgment when you do the same things? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Don’t you see how wonderfully kind, tolerant, and patient God is with you? Does this mean nothing to you? Can’t you see that his kindness is intended to turn you from your sin?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But because you are stubborn and refuse to turn from your sin, you are storing up terrible punishment for yourself. For a day of anger is coming, when God’s righteous judgment will be revealed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He will judge everyone according to what they have done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He will give eternal life to those who keep on doing good, seeking after the glory and honor and immortality that God offers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But he will pour out his anger and wrath on those who live for themselves, who refuse to obey the truth and instead live lives of wickedness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: There will be trouble and calamity for everyone who keeps on doing what is evil—for the Jew first and also for the Gentile.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'also for the Greek; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 2:10.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But there will be glory and honor and peace from God for all who do good—for the Jew first and also for the Gentile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For God does not show favoritism.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When the Gentiles sin, they will be destroyed, even though they never had God’s written law. And the Jews, who do have God’s law, will be judged by that law when they fail to obey it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For merely listening to the law doesn’t make us right with God. It is obeying the law that makes us right in his sight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Even Gentiles, who do not have God’s written law, show that they know his law when they instinctively obey it, even without having heard it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'They demonstrate that God’s law is written in their hearts, for their own conscience and thoughts either accuse them or tell them they are doing right. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And this is the message I proclaim—that the day is coming when God, through Christ Jesus, will judge everyone’s secret life.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Jews and the Law
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'You who call yourselves Jews are relying on God’s law, and you boast about your special relationship with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'You know what he wants; you know what is right because you have been taught his law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'You are convinced that you are a guide for the blind and a light for people who are lost in darkness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You think you can instruct the ignorant and teach children the ways of God. For you are certain that God’s law gives you complete knowledge and truth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Well then, if you teach others, why don’t you teach yourself? You tell others not to steal, but do you steal? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: You say it is wrong to commit adultery, but do you commit adultery? You condemn idolatry, but do you use items stolen from pagan temples?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: do you steal from temples?
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'You are so proud of knowing the law, but you dishonor God by breaking it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: No wonder the Scriptures say, “The Gentiles blaspheme the name of God because of you.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 52:5 (Greek version).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The Jewish ceremony of circumcision has value only if you obey God’s law. But if you don’t obey God’s law, you are no better off than an uncircumcised Gentile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And if the Gentiles obey God’s law, won’t God declare them to be his own people? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: In fact, uncircumcised Gentiles who keep God’s law will condemn you Jews who are circumcised and possess God’s law but don’t obey it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For you are not a true Jew just because you were born of Jewish parents or because you have gone through the ceremony of circumcision. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: No, a true Jew is one whose heart is right with God. And true circumcision is not merely obeying the letter of the law; rather, it is a change of heart produced by the Spirit. And a person with a changed heart seeks praise
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: receives praise.
    marker-yv: yv-n
  - type: text
    text: ' from God, not from people.'
