document_id: ROM.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Judgment of Sin
  - type: text
    content: 'You may think you can condemn such people, but you are just as bad, and you have no excuse! When you say they are wicked and should be punished, you are condemning yourself, for you who judge others do these very same things. '
  '10':
  - type: text
    content: 'But there will be glory and honor and peace from God for all who do good—for the Jew first and also for the Gentile. '
  '11':
  - type: text
    content: For God does not show favoritism.
  '12':
  - type: text
    content: 'When the Gentiles sin, they will be destroyed, even though they never had God’s written law. And the Jews, who do have God’s law, will be judged by that law when they fail to obey it. '
  '13':
  - type: text
    content: 'For merely listening to the law doesn’t make us right with God. It is obeying the law that makes us right in his sight. '
  '14':
  - type: text
    content: 'Even Gentiles, who do not have God’s written law, show that they know his law when they instinctively obey it, even without having heard it. '
  '15':
  - type: text
    content: 'They demonstrate that God’s law is written in their hearts, for their own conscience and thoughts either accuse them or tell them they are doing right. '
  '16':
  - type: text
    content: And this is the message I proclaim—that the day is coming when God, through Christ Jesus, will judge everyone’s secret life.
  - type: heading
    content: The Jews and the Law
  '17':
  - type: text
    content: 'You who call yourselves Jews are relying on God’s law, and you boast about your special relationship with him. '
  '18':
  - type: text
    content: 'You know what he wants; you know what is right because you have been taught his law. '
  '19':
  - type: text
    content: 'You are convinced that you are a guide for the blind and a light for people who are lost in darkness. '
  '2':
  - type: text
    content: 'And we know that God, in his justice, will punish anyone who does such things. '
  '20':
  - type: text
    content: You think you can instruct the ignorant and teach children the ways of God. For you are certain that God’s law gives you complete knowledge and truth.
  '21':
  - type: text
    content: 'Well then, if you teach others, why don’t you teach yourself? You tell others not to steal, but do you steal? '
  '22':
  - type: text
    content: You say it is wrong to commit adultery, but do you commit adultery? You condemn idolatry, but do you use items stolen from pagan temples?
  - type: note
    content: Greek do you steal from temples?
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'You are so proud of knowing the law, but you dishonor God by breaking it. '
  '24':
  - type: text
    content: No wonder the Scriptures say, “The Gentiles blaspheme the name of God because of you.”
  - type: note
    content: Isa 52:5 (Greek version).
  '25':
  - type: text
    content: 'The Jewish ceremony of circumcision has value only if you obey God’s law. But if you don’t obey God’s law, you are no better off than an uncircumcised Gentile. '
  '26':
  - type: text
    content: 'And if the Gentiles obey God’s law, won’t God declare them to be his own people? '
  '27':
  - type: text
    content: In fact, uncircumcised Gentiles who keep God’s law will condemn you Jews who are circumcised and possess God’s law but don’t obey it.
  '28':
  - type: text
    content: 'For you are not a true Jew just because you were born of Jewish parents or because you have gone through the ceremony of circumcision. '
  '29':
  - type: text
    content: No, a true Jew is one whose heart is right with God. And true circumcision is not merely obeying the letter of the law; rather, it is a change of heart produced by the Spirit. And a person with a changed heart seeks praise
  - type: note
    content: Or receives praise.
  - type: text
    content: ' from God, not from people.'
  '3':
  - type: text
    content: 'Since you judge others for doing these things, why do you think you can avoid God’s judgment when you do the same things? '
  '4':
  - type: text
    content: Don’t you see how wonderfully kind, tolerant, and patient God is with you? Does this mean nothing to you? Can’t you see that his kindness is intended to turn you from your sin?
  '5':
  - type: text
    content: 'But because you are stubborn and refuse to turn from your sin, you are storing up terrible punishment for yourself. For a day of anger is coming, when God’s righteous judgment will be revealed. '
  '6':
  - type: text
    content: 'He will judge everyone according to what they have done. '
  '7':
  - type: text
    content: 'He will give eternal life to those who keep on doing good, seeking after the glory and honor and immortality that God offers. '
  '8':
  - type: text
    content: 'But he will pour out his anger and wrath on those who live for themselves, who refuse to obey the truth and instead live lives of wickedness. '
  '9':
  - type: text
    content: There will be trouble and calamity for everyone who keeps on doing what is evil—for the Jew first and also for the Gentile.
  - type: note
    content: Greek also for the Greek; also in 2:10.
  - type: text
    content: ' '
