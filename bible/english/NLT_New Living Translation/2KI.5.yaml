document_id: 2KI.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Healing of Naaman
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The king of Aram had great admiration for Naaman, the commander of his army, because through him the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given Aram great victories. But though Naaman was a mighty warrior, he suffered from leprosy.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'from a contagious skin disease. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word used here and throughout this passage can describe various skin diseases.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But Elisha sent a messenger out to him with this message: “Go and wash yourself seven times in the Jordan River. Then your skin will be restored, and you will be healed of your leprosy.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But Naaman became angry and stalked away. “I thought he would certainly come out to meet me!” he said. “I expected him to wave his hand over the leprosy and call on the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God and heal me! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Aren’t the rivers of Damascus, the Abana and the Pharpar, better than any of the rivers of Israel? Why shouldn’t I wash in them and be healed?” So Naaman turned and went away in a rage.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But his officers tried to reason with him and said, “Sir,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: My father.
      marker-yv: yv-n
    - type: text
      text: ' if the prophet had told you to do something very difficult, wouldn’t you have done it? So you should certainly obey him when he says simply, ‘Go and wash and be cured!’” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So Naaman went down to the Jordan River and dipped himself seven times, as the man of God had instructed him. And his skin became as healthy as the skin of a young child, and he was healed!
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then Naaman and his entire party went back to find the man of God. They stood before him, and Naaman said, “Now I know that there is no God in all the world except in Israel. So please accept a gift from your servant.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But Elisha replied, “As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, whom I serve, I will not accept any gifts.” And though Naaman urged him to take the gift, Elisha refused.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Naaman said, “All right, but please allow me to load two of my mules with earth from this place, and I will take it back home with me. From now on I will never again offer burnt offerings or sacrifices to any other god except the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'However, may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' pardon me in this one thing: When my master the king goes into the temple of the god Rimmon to worship there and leans on my arm, may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' pardon me when I bow, too.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “Go in peace,” Elisha said. So Naaman started home again.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Greed of Gehazi
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'At this time Aramean raiders had invaded the land of Israel, and among their captives was a young girl who had been given to Naaman’s wife as a maid. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But Gehazi, the servant of Elisha, the man of God, said to himself, “My master should not have let this Aramean get away without accepting any of his gifts. As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, I will chase after him and get something from him.” '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: So Gehazi set off after Naaman.
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Naaman saw Gehazi running after him, he climbed down from his chariot and went to meet him. “Is everything all right?” Naaman asked.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Yes,” Gehazi said, “but my master has sent me to tell you that two young prophets from the hill country of Ephraim have just arrived. He would like 75 pounds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 talent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[34 kilograms].'
      marker-yv: yv-n
    - type: text
      text: ' of silver and two sets of clothing to give to them.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “By all means, take twice as much
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'take 2 talents '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[150 pounds or 68 kilograms].'
      marker-yv: yv-n
    - type: text
      text: ' silver,” Naaman insisted. He gave him two sets of clothing, tied up the money in two bags, and sent two of his servants to carry the gifts for Gehazi. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: But when they arrived at the citadel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Ophel.
      marker-yv: yv-n
    - type: text
      text: ' Gehazi took the gifts from the servants and sent the men back. Then he went and hid the gifts inside the house.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: When he went in to his master, Elisha asked him, “Where have you been, Gehazi?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I haven’t been anywhere,” he replied.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'But Elisha asked him, “Don’t you realize that I was there in spirit when Naaman stepped down from his chariot to meet you? Is this the time to receive money and clothing, olive groves and vineyards, sheep and cattle, and male and female servants? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Because you have done this, you and your descendants will suffer from Naaman’s leprosy forever.” When Gehazi left the room, he was covered with leprosy; his skin was white as snow.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: One day the girl said to her mistress, “I wish my master would go to see the prophet in Samaria. He would heal him of his leprosy.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So Naaman told the king what the young girl from Israel had said. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Go and visit the prophet,” the king of Aram told him. “I will send a letter of introduction for you to take to the king of Israel.” So Naaman started out, carrying as gifts 750 pounds of silver, 150 pounds of gold,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '10 talents '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[340 kilograms] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of silver, 6,000 [shekels] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[68 kilograms] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of gold.
      marker-yv: yv-n
    - type: text
      text: ' and ten sets of clothing. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The letter to the king of Israel said: “With this letter I present my servant Naaman. I want you to heal him of his leprosy.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: When the king of Israel read the letter, he tore his clothes in dismay and said, “Am I God, that I can give life and take it away? Why is this man asking me to heal someone with leprosy? I can see that he’s just trying to pick a fight with me.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But when Elisha, the man of God, heard that the king of Israel had torn his clothes in dismay, he sent this message to him: “Why are you so upset? Send Naaman to me, and he will learn that there is a true prophet here in Israel.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So Naaman went with his horses and chariots and waited at the door of Elisha’s house. '
