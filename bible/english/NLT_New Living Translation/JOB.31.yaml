document_id: JOB.31,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Job’s Final Protest of Innocence
  - type: text
    content: “I made a covenant with my eyes
  - type: text
    content: not to look with lust at a young woman.
  '10':
  - type: text
    content: then let my wife serve
  - type: note
    content: Hebrew grind for.
  - type: text
    content: ' another man;'
  - type: text
    content: let other men sleep with her.
  '11':
  - type: text
    content: For lust is a shameful sin,
  - type: text
    content: a crime that should be punished.
  '12':
  - type: text
    content: It is a fire that burns all the way to hell.
  - type: note
    content: Hebrew to Abaddon.
  - type: text
    content: It would wipe out everything I own.
  '13':
  - type: text
    content: “If I have been unfair to my male or female servants
  - type: text
    content: when they brought their complaints to me,
  '14':
  - type: text
    content: how could I face God?
  - type: text
    content: What could I say when he questioned me?
  '15':
  - type: text
    content: For God created both me and my servants.
  - type: text
    content: He created us both in the womb.
  '16':
  - type: text
    content: “Have I refused to help the poor,
  - type: text
    content: or crushed the hopes of widows?
  '17':
  - type: text
    content: Have I been stingy with my food
  - type: text
    content: and refused to share it with orphans?
  '18':
  - type: text
    content: No, from childhood I have cared for orphans like a father,
  - type: text
    content: and all my life I have cared for widows.
  '19':
  - type: text
    content: Whenever I saw the homeless without clothes
  - type: text
    content: and the needy with nothing to wear,
  '2':
  - type: text
    content: For what has God above chosen for us?
  - type: text
    content: What is our inheritance from the Almighty on high?
  '20':
  - type: text
    content: did they not praise me
  - type: text
    content: for providing wool clothing to keep them warm?
  '21':
  - type: text
    content: “If I raised my hand against an orphan,
  - type: text
    content: knowing the judges would take my side,
  '22':
  - type: text
    content: then let my shoulder be wrenched out of place!
  - type: text
    content: Let my arm be torn from its socket!
  '23':
  - type: text
    content: That would be better than facing God’s judgment.
  - type: text
    content: For if the majesty of God opposes me, what hope is there?
  '24':
  - type: text
    content: “Have I put my trust in money
  - type: text
    content: or felt secure because of my gold?
  '25':
  - type: text
    content: Have I gloated about my wealth
  - type: text
    content: and all that I own?
  '26':
  - type: text
    content: “Have I looked at the sun shining in the skies,
  - type: text
    content: or the moon walking down its silver pathway,
  '27':
  - type: text
    content: and been secretly enticed in my heart
  - type: text
    content: to throw kisses at them in worship?
  '28':
  - type: text
    content: If so, I should be punished by the judges,
  - type: text
    content: for it would mean I had denied the God of heaven.
  '29':
  - type: text
    content: “Have I ever rejoiced when disaster struck my enemies,
  - type: text
    content: or become excited when harm came their way?
  '3':
  - type: text
    content: Isn’t it calamity for the wicked
  - type: text
    content: and misfortune for those who do evil?
  '30':
  - type: text
    content: No, I have never sinned by cursing anyone
  - type: text
    content: or by asking for revenge.
  '31':
  - type: text
    content: “My servants have never said,
  - type: text
    content: ‘He let others go hungry.’
  '32':
  - type: text
    content: I have never turned away a stranger
  - type: text
    content: but have opened my doors to everyone.
  '33':
  - type: text
    content: “Have I tried to hide my sins like other people do,
  - type: text
    content: concealing my guilt in my heart?
  '34':
  - type: text
    content: Have I feared the crowd
  - type: text
    content: or the contempt of the masses,
  - type: text
    content: so that I kept quiet and stayed indoors?
  '35':
  - type: text
    content: “If only someone would listen to me!
  - type: text
    content: Look, I will sign my name to my defense.
  - type: text
    content: Let the Almighty answer me.
  - type: text
    content: Let my accuser write out the charges against me.
  '36':
  - type: text
    content: I would face the accusation proudly.
  - type: text
    content: I would wear it like a crown.
  '37':
  - type: text
    content: For I would tell him exactly what I have done.
  - type: text
    content: I would come before him like a prince.
  '38':
  - type: text
    content: “If my land accuses me
  - type: text
    content: and all its furrows cry out together,
  '39':
  - type: text
    content: or if I have stolen its crops
  - type: text
    content: or murdered its owners,
  '4':
  - type: text
    content: Doesn’t he see everything I do
  - type: text
    content: and every step I take?
  '40':
  - type: text
    content: then let thistles grow on that land instead of wheat,
  - type: text
    content: and weeds instead of barley.”
  - type: text
    content: Job’s words are ended.
  '5':
  - type: text
    content: “Have I lied to anyone
  - type: text
    content: or deceived anyone?
  '6':
  - type: text
    content: Let God weigh me on the scales of justice,
  - type: text
    content: for he knows my integrity.
  '7':
  - type: text
    content: If I have strayed from his pathway,
  - type: text
    content: or if my heart has lusted for what my eyes have seen,
  - type: text
    content: or if I am guilty of any other sin,
  '8':
  - type: text
    content: then let someone else eat the crops I have planted.
  - type: text
    content: Let all that I have planted be uprooted.
  '9':
  - type: text
    content: “If my heart has been seduced by a woman,
  - type: text
    content: or if I have lusted for my neighbor’s wife,
