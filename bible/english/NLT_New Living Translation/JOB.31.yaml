document_id: JOB.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job’s Final Protest of Innocence
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “I made a covenant with my eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: not to look with lust at a young woman.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For what has God above chosen for us?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What is our inheritance from the Almighty on high?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Isn’t it calamity for the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: and misfortune for those who do evil?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Doesn’t he see everything I do
- type: usfm
  marker: q2
  children:
  - type: text
    text: and every step I take?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Have I lied to anyone
- type: usfm
  marker: q2
  children:
  - type: text
    text: or deceived anyone?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Let God weigh me on the scales of justice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he knows my integrity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: If I have strayed from his pathway,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or if my heart has lusted for what my eyes have seen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or if I am guilty of any other sin,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: then let someone else eat the crops I have planted.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let all that I have planted be uprooted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “If my heart has been seduced by a woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or if I have lusted for my neighbor’s wife,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: then let my wife serve
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: grind for.
    marker-yv: yv-n
  - type: text
    text: ' another man;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: let other men sleep with her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For lust is a shameful sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a crime that should be punished.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It is a fire that burns all the way to hell.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to Abaddon.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: It would wipe out everything I own.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “If I have been unfair to my male or female servants
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they brought their complaints to me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: how could I face God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What could I say when he questioned me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For God created both me and my servants.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He created us both in the womb.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Have I refused to help the poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or crushed the hopes of widows?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Have I been stingy with my food
- type: usfm
  marker: q2
  children:
  - type: text
    text: and refused to share it with orphans?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: No, from childhood I have cared for orphans like a father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all my life I have cared for widows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Whenever I saw the homeless without clothes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the needy with nothing to wear,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: did they not praise me
- type: usfm
  marker: q2
  children:
  - type: text
    text: for providing wool clothing to keep them warm?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “If I raised my hand against an orphan,
- type: usfm
  marker: q2
  children:
  - type: text
    text: knowing the judges would take my side,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: then let my shoulder be wrenched out of place!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let my arm be torn from its socket!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: That would be better than facing God’s judgment.
- type: usfm
  marker: q2
  children:
  - type: text
    text: For if the majesty of God opposes me, what hope is there?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Have I put my trust in money
- type: usfm
  marker: q2
  children:
  - type: text
    text: or felt secure because of my gold?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Have I gloated about my wealth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all that I own?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Have I looked at the sun shining in the skies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the moon walking down its silver pathway,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: and been secretly enticed in my heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: to throw kisses at them in worship?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: If so, I should be punished by the judges,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for it would mean I had denied the God of heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Have I ever rejoiced when disaster struck my enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or become excited when harm came their way?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: No, I have never sinned by cursing anyone
- type: usfm
  marker: q2
  children:
  - type: text
    text: or by asking for revenge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “My servants have never said,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘He let others go hungry.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: I have never turned away a stranger
- type: usfm
  marker: q2
  children:
  - type: text
    text: but have opened my doors to everyone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: “Have I tried to hide my sins like other people do,
- type: usfm
  marker: q2
  children:
  - type: text
    text: concealing my guilt in my heart?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Have I feared the crowd
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the contempt of the masses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that I kept quiet and stayed indoors?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “If only someone would listen to me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Look, I will sign my name to my defense.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the Almighty answer me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let my accuser write out the charges against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: I would face the accusation proudly.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would wear it like a crown.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: For I would tell him exactly what I have done.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would come before him like a prince.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: “If my land accuses me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all its furrows cry out together,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: or if I have stolen its crops
- type: usfm
  marker: q2
  children:
  - type: text
    text: or murdered its owners,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: then let thistles grow on that land instead of wheat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and weeds instead of barley.”
- type: usfm
  marker: m
  children:
  - type: text
    text: Job’s words are ended.
