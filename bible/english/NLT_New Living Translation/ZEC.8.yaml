document_id: ZEC.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Promised Blessings for Jerusalem
  - type: text
    content: 'Then another message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies: '
  '10':
  - type: text
    content: Before the work on the Temple began, there were no jobs and no money to hire people or animals. No traveler was safe from the enemy, for there were enemies on all sides. I had turned everyone against each other.
  '11':
  - type: text
    content: '“But now I will not treat the remnant of my people as I treated them before, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. '
  '12':
  - type: text
    content: 'For I am planting seeds of peace and prosperity among you. The grapevines will be heavy with fruit. The earth will produce its crops, and the heavens will release the dew. Once more I will cause the remnant in Judah and Israel to inherit these blessings. '
  '13':
  - type: text
    content: Among the other nations, Judah and Israel became symbols of a cursed nation. But no longer! Now I will rescue you and make you both a symbol and a source of blessing. So don’t be afraid. Be strong, and get on with rebuilding the Temple!
  '14':
  - type: text
    content: '“For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: I was determined to punish you when your ancestors angered me, and I did not change my mind, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. '
  '15':
  - type: text
    content: 'But now I am determined to bless Jerusalem and the people of Judah. So don’t be afraid. '
  '16':
  - type: text
    content: 'But this is what you must do: Tell the truth to each other. Render verdicts in your courts that are just and that lead to peace. '
  '17':
  - type: text
    content: 'Don’t scheme against each other. Stop your love of telling lies that you swear are the truth. I hate all these things, says the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '18':
  - type: text
    content: 'Here is another message that came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. '
  '19':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: The traditional fasts and times of mourning you have kept in early summer, midsummer, autumn, and winter'
  - type: note
    content: Hebrew in the fourth, fifth, seventh, and tenth months. The fourth month of the ancient Hebrew lunar calendar usually occurs within the months of June and July. The fifth month usually occurs within the months of July and August. The seventh month usually occurs within the months of September and October. The tenth month usually occurs within the months of December and January.
  - type: text
    content: ' are now ended. They will become festivals of joy and celebration for the people of Judah. So love truth and peace.'
  '2':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: My love for Mount Zion is passionate and strong; I am consumed with passion for Jerusalem!'
  '20':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: People from nations and cities around the world will travel to Jerusalem. '
  '21':
  - type: text
    content: 'The people of one city will say to the people of another, ‘Come with us to Jerusalem to ask the '
  - type: text
    content: Lord
  - type: text
    content: ' to bless us. Let’s worship the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. I’m determined to go.’ '
  '22':
  - type: text
    content: 'Many peoples and powerful nations will come to Jerusalem to seek the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies and to ask for his blessing.'
  '23':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: In those days ten men from different nations and languages of the world will clutch at the sleeve of one Jew. And they will say, ‘Please let us walk with you, for we have heard that God is with you.’”'
  '3':
  - type: text
    content: '“And now the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am returning to Mount Zion, and I will live in Jerusalem. Then Jerusalem will be called the Faithful City; the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies will be called the Holy Mountain.'
  '4':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: Once again old men and women will walk Jerusalem’s streets with their canes and will sit together in the city squares. '
  '5':
  - type: text
    content: And the streets of the city will be filled with boys and girls at play.
  '6':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: All this may seem impossible to you now, a small remnant of God’s people. But is it impossible for me? says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '7':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: You can be sure that I will rescue my people from the east and from the west. '
  '8':
  - type: text
    content: I will bring them home again to live safely in Jerusalem. They will be my people, and I will be faithful and just toward them as their God.
  '9':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: Be strong and finish the task! Ever since the laying of the foundation of the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, you have heard what the prophets have been saying about completing the building. '
