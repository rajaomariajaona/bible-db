document_id: ACT.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Barnabas and Saul Are Commissioned
  - type: text
    content: Among the prophets and teachers of the church at Antioch of Syria were Barnabas, Simeon (called “the black man”
  - type: note
    content: Greek who was called Niger.
  - type: text
    content: ), Lucius (from Cyrene), Manaen (the childhood companion of King Herod Antipas
  - type: note
    content: Greek Herod the tetrarch.
  - type: text
    content: '), and Saul. '
  '10':
  - type: text
    content: 'Then he said, “You son of the devil, full of every sort of deceit and fraud, and enemy of all that is good! Will you never stop perverting the true ways of the Lord? '
  '11':
  - type: text
    content: Watch now, for the Lord has laid his hand of punishment upon you, and you will be struck blind. You will not see the sunlight for some time.” Instantly mist and darkness came over the man’s eyes, and he began groping around begging for someone to take his hand and lead him.
  '12':
  - type: text
    content: When the governor saw what had happened, he became a believer, for he was astonished at the teaching about the Lord.
  - type: heading
    content: Paul Preaches in Antioch of Pisidia
  '13':
  - type: text
    content: 'Paul and his companions then left Paphos by ship for Pamphylia, landing at the port town of Perga. There John Mark left them and returned to Jerusalem. '
  '14':
  - type: text
    content: But Paul and Barnabas traveled inland to Antioch of Pisidia.
  - type: note
    content: Pamphylia and Pisidia were districts in what is now Turkey.
  - type: text
    content: 'On the Sabbath they went to the synagogue for the services. '
  '15':
  - type: text
    content: After the usual readings from the books of Moses
  - type: note
    content: Greek from the law.
  - type: text
    content: ' and the prophets, those in charge of the service sent them this message: “Brothers, if you have any word of encouragement for the people, come and give it.”'
  '16':
  - type: text
    content: So Paul stood, lifted his hand to quiet them, and started speaking. “Men of Israel,” he said, “and you God-fearing Gentiles, listen to me.
  '17':
  - type: text
    content: '“The God of this nation of Israel chose our ancestors and made them multiply and grow strong during their stay in Egypt. Then with a powerful arm he led them out of their slavery. '
  '18':
  - type: text
    content: He put up with them
  - type: note
    content: Some manuscripts read He cared for them; compare Deut 1:31.
  - type: text
    content: ' through forty years of wandering in the wilderness. '
  '19':
  - type: text
    content: 'Then he destroyed seven nations in Canaan and gave their land to Israel as an inheritance. '
  '2':
  - type: text
    content: 'One day as these men were worshiping the Lord and fasting, the Holy Spirit said, “Appoint Barnabas and Saul for the special work to which I have called them.” '
  '20':
  - type: text
    content: All this took about 450 years.
  - type: text
    content: '“After that, God gave them judges to rule until the time of Samuel the prophet. '
  '21':
  - type: text
    content: 'Then the people begged for a king, and God gave them Saul son of Kish, a man of the tribe of Benjamin, who reigned for forty years. '
  '22':
  - type: text
    content: But God removed Saul and replaced him with David, a man about whom God said, ‘I have found David son of Jesse, a man after my own heart. He will do everything I want him to do.’
  - type: note
    content: 1 Sam 13:14.
  '23':
  - type: text
    content: '“And it is one of King David’s descendants, Jesus, who is God’s promised Savior of Israel! '
  '24':
  - type: text
    content: 'Before he came, John the Baptist preached that all the people of Israel needed to repent of their sins and turn to God and be baptized. '
  '25':
  - type: text
    content: As John was finishing his ministry he asked, ‘Do you think I am the Messiah? No, I am not! But he is coming soon—and I’m not even worthy to be his slave and untie the sandals on his feet.’
  '26':
  - type: text
    content: '“Brothers—you sons of Abraham, and also you God-fearing Gentiles—this message of salvation has been sent to us! '
  '27':
  - type: text
    content: 'The people in Jerusalem and their leaders did not recognize Jesus as the one the prophets had spoken about. Instead, they condemned him, and in doing this they fulfilled the prophets’ words that are read every Sabbath. '
  '28':
  - type: text
    content: They found no legal reason to execute him, but they asked Pilate to have him killed anyway.
  '29':
  - type: text
    content: “When they had done all that the prophecies said about him, they took him down from the cross
  - type: note
    content: Greek from the tree.
  - type: text
    content: ' and placed him in a tomb. '
  '3':
  - type: text
    content: So after more fasting and prayer, the men laid their hands on them and sent them on their way.
  - type: heading
    content: Paul’s First Missionary Journey
  '30':
  - type: text
    content: 'But God raised him from the dead! '
  '31':
  - type: text
    content: And over a period of many days he appeared to those who had gone with him from Galilee to Jerusalem. They are now his witnesses to the people of Israel.
  '32':
  - type: text
    content: '“And now we are here to bring you this Good News. The promise was made to our ancestors, '
  '33':
  - type: text
    content: 'and God has now fulfilled it for us, their descendants, by raising Jesus. This is what the second psalm says about Jesus:'
  - type: text
    content: ‘You are my Son.
  - type: text
    content: Today I have become your Father.
  - type: note
    content: Or Today I reveal you as my Son. Ps 2:7.
  - type: text
    content: ’
  '34':
  - type: text
    content: For God had promised to raise him from the dead, not leaving him to rot in the grave. He said, ‘I will give you the sacred blessings I promised to David.’
  - type: note
    content: Isa 55:3.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Another psalm explains it more fully: ‘You will not allow your Holy One to rot in the grave.’'
  - type: note
    content: Ps 16:10.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'This is not a reference to David, for after David had done the will of God in his own generation, he died and was buried with his ancestors, and his body decayed. '
  '37':
  - type: text
    content: No, it was a reference to someone else—someone whom God raised and whose body did not decay.
  '38':
  - type: text
    content: ' '
  - type: note
    content: English translations divide verses 38 and 39 in various ways.
  - type: text
    content: '“Brothers, listen! We are here to proclaim that through this man Jesus there is forgiveness for your sins. '
  '39':
  - type: text
    content: 'Everyone who believes in him is made right in God’s sight—something the law of Moses could never do. '
  '4':
  - type: text
    content: 'So Barnabas and Saul were sent out by the Holy Spirit. They went down to the seaport of Seleucia and then sailed for the island of Cyprus. '
  '40':
  - type: text
    content: Be careful! Don’t let the prophets’ words apply to you. For they said,
  '41':
  - type: text
    content: ‘Look, you mockers,
  - type: text
    content: be amazed and die!
  - type: text
    content: For I am doing something in your own day,
  - type: text
    content: something you wouldn’t believe
  - type: text
    content: even if someone told you about it.’
  - type: note
    content: Hab 1:5 (Greek version).
  - type: text
    content: ”
  '42':
  - type: text
    content: 'As Paul and Barnabas left the synagogue that day, the people begged them to speak about these things again the next week. '
  '43':
  - type: text
    content: Many Jews and devout converts to Judaism followed Paul and Barnabas, and the two men urged them to continue to rely on the grace of God.
  - type: heading
    content: Paul Turns to the Gentiles
  '44':
  - type: text
    content: 'The following week almost the entire city turned out to hear them preach the word of the Lord. '
  '45':
  - type: text
    content: But when some of the Jews saw the crowds, they were jealous; so they slandered Paul and argued against whatever he said.
  '46':
  - type: text
    content: 'Then Paul and Barnabas spoke out boldly and declared, “It was necessary that we first preach the word of God to you Jews. But since you have rejected it and judged yourselves unworthy of eternal life, we will offer it to the Gentiles. '
  '47':
  - type: text
    content: For the Lord gave us this command when he said,
  - type: text
    content: ‘I have made you a light to the Gentiles,
  - type: text
    content: to bring salvation to the farthest corners of the earth.’
  - type: note
    content: Isa 49:6.
  - type: text
    content: ”
  '48':
  - type: text
    content: 'When the Gentiles heard this, they were very glad and thanked the Lord for his message; and all who were chosen for eternal life became believers. '
  '49':
  - type: text
    content: So the Lord’s message spread throughout that region.
  '5':
  - type: text
    content: There, in the town of Salamis, they went to the Jewish synagogues and preached the word of God. John Mark went with them as their assistant.
  '50':
  - type: text
    content: 'Then the Jews stirred up the influential religious women and the leaders of the city, and they incited a mob against Paul and Barnabas and ran them out of town. '
  '51':
  - type: text
    content: 'So they shook the dust from their feet as a sign of rejection and went to the town of Iconium. '
  '52':
  - type: text
    content: And the believers
  - type: note
    content: Greek the disciples.
  - type: text
    content: ' were filled with joy and with the Holy Spirit.'
  '6':
  - type: text
    content: 'Afterward they traveled from town to town across the entire island until finally they reached Paphos, where they met a Jewish sorcerer, a false prophet named Bar-Jesus. '
  '7':
  - type: text
    content: 'He had attached himself to the governor, Sergius Paulus, who was an intelligent man. The governor invited Barnabas and Saul to visit him, for he wanted to hear the word of God. '
  '8':
  - type: text
    content: But Elymas, the sorcerer (as his name means in Greek), interfered and urged the governor to pay no attention to what Barnabas and Saul said. He was trying to keep the governor from believing.
  '9':
  - type: text
    content: 'Saul, also known as Paul, was filled with the Holy Spirit, and he looked the sorcerer in the eye. '
