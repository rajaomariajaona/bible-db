document_id: ACT.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Barnabas and Saul Are Commissioned
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Among the prophets and teachers of the church at Antioch of Syria were Barnabas, Simeon (called “the black man”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: who was called Niger.
      marker-yv: yv-n
    - type: text
      text: ), Lucius (from Cyrene), Manaen (the childhood companion of King Herod Antipas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Herod the tetrarch.
      marker-yv: yv-n
    - type: text
      text: '), and Saul. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then he said, “You son of the devil, full of every sort of deceit and fraud, and enemy of all that is good! Will you never stop perverting the true ways of the Lord? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Watch now, for the Lord has laid his hand of punishment upon you, and you will be struck blind. You will not see the sunlight for some time.” Instantly mist and darkness came over the man’s eyes, and he began groping around begging for someone to take his hand and lead him.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: When the governor saw what had happened, he became a believer, for he was astonished at the teaching about the Lord.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Preaches in Antioch of Pisidia
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Paul and his companions then left Paphos by ship for Pamphylia, landing at the port town of Perga. There John Mark left them and returned to Jerusalem. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: But Paul and Barnabas traveled inland to Antioch of Pisidia.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:13-14 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Pamphylia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'and '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Pisidia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: were districts in what is now Turkey.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the Sabbath they went to the synagogue for the services. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: After the usual readings from the books of Moses
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from the law.
      marker-yv: yv-n
    - type: text
      text: ' and the prophets, those in charge of the service sent them this message: “Brothers, if you have any word of encouragement for the people, come and give it.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: So Paul stood, lifted his hand to quiet them, and started speaking. “Men of Israel,” he said, “and you God-fearing Gentiles, listen to me.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“The God of this nation of Israel chose our ancestors and made them multiply and grow strong during their stay in Egypt. Then with a powerful arm he led them out of their slavery. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: He put up with them
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'He cared for them; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare Deut 1:31.
      marker-yv: yv-n
    - type: text
      text: ' through forty years of wandering in the wilderness. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then he destroyed seven nations in Canaan and gave their land to Israel as an inheritance. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'One day as these men were worshiping the Lord and fasting, the Holy Spirit said, “Appoint Barnabas and Saul for the special work to which I have called them.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: All this took about 450 years.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“After that, God gave them judges to rule until the time of Samuel the prophet. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then the people begged for a king, and God gave them Saul son of Kish, a man of the tribe of Benjamin, who reigned for forty years. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: But God removed Saul and replaced him with David, a man about whom God said, ‘I have found David son of Jesse, a man after my own heart. He will do everything I want him to do.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1 Sam 13:14.
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“And it is one of King David’s descendants, Jesus, who is God’s promised Savior of Israel! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Before he came, John the Baptist preached that all the people of Israel needed to repent of their sins and turn to God and be baptized. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: As John was finishing his ministry he asked, ‘Do you think I am the Messiah? No, I am not! But he is coming soon—and I’m not even worthy to be his slave and untie the sandals on his feet.’
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“Brothers—you sons of Abraham, and also you God-fearing Gentiles—this message of salvation has been sent to us! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The people in Jerusalem and their leaders did not recognize Jesus as the one the prophets had spoken about. Instead, they condemned him, and in doing this they fulfilled the prophets’ words that are read every Sabbath. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: They found no legal reason to execute him, but they asked Pilate to have him killed anyway.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “When they had done all that the prophecies said about him, they took him down from the cross
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from the tree.
      marker-yv: yv-n
    - type: text
      text: ' and placed him in a tomb. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So after more fasting and prayer, the men laid their hands on them and sent them on their way.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s First Missionary Journey
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'But God raised him from the dead! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: And over a period of many days he appeared to those who had gone with him from Galilee to Jerusalem. They are now his witnesses to the people of Israel.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: '“And now we are here to bring you this Good News. The promise was made to our ancestors, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'and God has now fulfilled it for us, their descendants, by raising Jesus. This is what the second psalm says about Jesus:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘You are my Son.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Today I have become your Father.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Today I reveal you as my Son. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 2:7.
      marker-yv: yv-n
    - type: text
      text: ’
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: For God had promised to raise him from the dead, not leaving him to rot in the grave. He said, ‘I will give you the sacred blessings I promised to David.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 55:3.
      marker-yv: yv-n
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Another psalm explains it more fully: ‘You will not allow your Holy One to rot in the grave.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 16:10.
      marker-yv: yv-n
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'This is not a reference to David, for after David had done the will of God in his own generation, he died and was buried with his ancestors, and his body decayed. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: No, it was a reference to someone else—someone whom God raised and whose body did not decay.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: English translations divide verses 38 and 39 in various ways.
      marker-yv: yv-n
    - type: text
      text: '“Brothers, listen! We are here to proclaim that through this man Jesus there is forgiveness for your sins. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Everyone who believes in him is made right in God’s sight—something the law of Moses could never do. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So Barnabas and Saul were sent out by the Holy Spirit. They went down to the seaport of Seleucia and then sailed for the island of Cyprus. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Be careful! Don’t let the prophets’ words apply to you. For they said,
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: ‘Look, you mockers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be amazed and die!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I am doing something in your own day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: something you wouldn’t believe
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even if someone told you about it.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hab 1:5 (Greek version).
      marker-yv: yv-n
    - type: text
      text: ”
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'As Paul and Barnabas left the synagogue that day, the people begged them to speak about these things again the next week. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Many Jews and devout converts to Judaism followed Paul and Barnabas, and the two men urged them to continue to rely on the grace of God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Turns to the Gentiles
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'The following week almost the entire city turned out to hear them preach the word of the Lord. '
  '45':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: But when some of the Jews saw the crowds, they were jealous; so they slandered Paul and argued against whatever he said.
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Then Paul and Barnabas spoke out boldly and declared, “It was necessary that we first preach the word of God to you Jews. But since you have rejected it and judged yourselves unworthy of eternal life, we will offer it to the Gentiles. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: For the Lord gave us this command when he said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘I have made you a light to the Gentiles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to bring salvation to the farthest corners of the earth.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 49:6.
      marker-yv: yv-n
    - type: text
      text: ”
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'When the Gentiles heard this, they were very glad and thanked the Lord for his message; and all who were chosen for eternal life became believers. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: So the Lord’s message spread throughout that region.
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: There, in the town of Salamis, they went to the Jewish synagogues and preached the word of God. John Mark went with them as their assistant.
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Then the Jews stirred up the influential religious women and the leaders of the city, and they incited a mob against Paul and Barnabas and ran them out of town. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'So they shook the dust from their feet as a sign of rejection and went to the town of Iconium. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: And the believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:52 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the disciples.
      marker-yv: yv-n
    - type: text
      text: ' were filled with joy and with the Holy Spirit.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Afterward they traveled from town to town across the entire island until finally they reached Paphos, where they met a Jewish sorcerer, a false prophet named Bar-Jesus. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'He had attached himself to the governor, Sergius Paulus, who was an intelligent man. The governor invited Barnabas and Saul to visit him, for he wanted to hear the word of God. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But Elymas, the sorcerer (as his name means in Greek), interfered and urged the governor to pay no attention to what Barnabas and Saul said. He was trying to keep the governor from believing.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Saul, also known as Paul, was filled with the Holy Spirit, and he looked the sorcerer in the eye. '
