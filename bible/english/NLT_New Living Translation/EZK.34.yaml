document_id: EZK.34,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Shepherds of Israel
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I now consider these shepherds my enemies, and I will hold them responsible for what has happened to my flock. I will take away their right to feed the flock, and I will stop them from feeding themselves. I will rescue my flock from their mouths; the sheep will no longer be their prey.'
  - type: heading
    content: The Good Shepherd
  '11':
  - type: text
    content: '“For this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I myself will search and find my sheep. '
  '12':
  - type: text
    content: 'I will be like a shepherd looking for his scattered flock. I will find my sheep and rescue them from all the places where they were scattered on that dark and cloudy day. '
  '13':
  - type: text
    content: 'I will bring them back home to their own land of Israel from among the peoples and nations. I will feed them on the mountains of Israel and by the rivers and in all the places where people live. '
  '14':
  - type: text
    content: 'Yes, I will give them good pastureland on the high hills of Israel. There they will lie down in pleasant places and feed in the lush pastures of the hills. '
  '15':
  - type: text
    content: 'I myself will tend my sheep and give them a place to lie down in peace, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: I will search for my lost ones who strayed away, and I will bring them safely home again. I will bandage the injured and strengthen the weak. But I will destroy those who are fat and powerful. I will feed them, yes—feed them justice!
  '17':
  - type: text
    content: '“And as for you, my flock, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says to his people: I will judge between one animal of the flock and another, separating the sheep from the goats. '
  '18':
  - type: text
    content: 'Isn’t it enough for you to keep the best of the pastures for yourselves? Must you also trample down the rest? Isn’t it enough for you to drink clear water for yourselves? Must you also muddy the rest with your feet? '
  '19':
  - type: text
    content: Why must my flock eat what you have trampled down and drink water you have fouled?
  '2':
  - type: text
    content: '“Son of man, prophesy against the shepherds, the leaders of Israel. Give them this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ': What sorrow awaits you shepherds who feed yourselves instead of your flocks. Shouldn’t shepherds feed their sheep? '
  '20':
  - type: text
    content: '“Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will surely judge between the fat sheep and the scrawny sheep. '
  '21':
  - type: text
    content: 'For you fat sheep pushed and butted and crowded my sick and hungry flock until you scattered them to distant lands. '
  '22':
  - type: text
    content: 'So I will rescue my flock, and they will no longer be abused. I will judge between one animal of the flock and another. '
  '23':
  - type: text
    content: 'And I will set over them one shepherd, my servant David. He will feed them and be a shepherd to them. '
  '24':
  - type: text
    content: 'And I, the '
  - type: text
    content: Lord
  - type: text
    content: ', will be their God, and my servant David will be a prince among my people. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  - type: heading
    content: The Lord’s Covenant of Peace
  '25':
  - type: text
    content: '“I will make a covenant of peace with my people and drive away the dangerous animals from the land. Then they will be able to camp safely in the wildest places and sleep in the woods without fear. '
  '26':
  - type: text
    content: 'I will bless my people and their homes around my holy hill. And in the proper season I will send the showers they need. There will be showers of blessing. '
  '27':
  - type: text
    content: 'The orchards and fields of my people will yield bumper crops, and everyone will live in safety. When I have broken their chains of slavery and rescued them from those who enslaved them, then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: They will no longer be prey for other nations, and wild animals will no longer devour them. They will live in safety, and no one will frighten them.
  '29':
  - type: text
    content: '“And I will make their land famous for its crops, so my people will never again suffer from famines or the insults of foreign nations. '
  '3':
  - type: text
    content: 'You drink the milk, wear the wool, and butcher the best animals, but you let your flocks starve. '
  '30':
  - type: text
    content: 'In this way, they will know that I, the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, am with them. And they will know that they, the people of Israel, are my people, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'You are my flock, the sheep of my pasture. You are my people, and I am your God. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '4':
  - type: text
    content: 'You have not taken care of the weak. You have not tended the sick or bound up the injured. You have not gone looking for those who have wandered away and are lost. Instead, you have ruled them with harshness and cruelty. '
  '5':
  - type: text
    content: 'So my sheep have been scattered without a shepherd, and they are easy prey for any wild animal. '
  '6':
  - type: text
    content: They have wandered through all the mountains and all the hills, across the face of the earth, yet no one has gone to search for them.
  '7':
  - type: text
    content: '“Therefore, you shepherds, hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '8':
  - type: text
    content: 'As surely as I live, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', you abandoned my flock and left them to be attacked by every wild animal. And though you were my shepherds, you didn’t search for my sheep when they were lost. You took care of yourselves and left the sheep to starve. '
  '9':
  - type: text
    content: 'Therefore, you shepherds, hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
