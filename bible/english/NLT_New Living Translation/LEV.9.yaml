document_id: LEV.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Priests Begin Their Work
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'After the ordination ceremony, on the eighth day, Moses called together Aaron and his sons and the elders of Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he burned on the altar the fat, the kidneys, and the long lobe of the liver from the sin offering, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The meat and the hide, however, he burned outside the camp.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Next Aaron slaughtered the animal for the burnt offering. His sons brought him the blood, and he splattered it against all sides of the altar. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they handed him each piece of the burnt offering, including the head, and he burned them on the altar. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he washed the internal organs and the legs and burned them on the altar along with the rest of the burnt offering.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Next Aaron presented the offerings of the people. He slaughtered the people’s goat and presented it as an offering for their sin, just as he had first done with the offering for his own sin. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he presented the burnt offering and sacrificed it in the prescribed way. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also presented the grain offering, burning a handful of the flour mixture on the altar, in addition to the regular burnt offering for the morning.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Aaron slaughtered the bull and the ram for the people’s peace offering. His sons brought him the blood, and he splattered it against all sides of the altar. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he took the fat of the bull and the ram—the fat of the broad tail and from around the internal organs—along with the kidneys and the long lobes of the livers. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He said to Aaron, “Take a young bull for a sin offering and a ram for a burnt offering, both without defects, and present them to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He placed these fat portions on top of the breasts of these animals and burned them on the altar. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron then lifted up the breasts and right thighs as a special offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', just as Moses had commanded.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After that, Aaron raised his hands toward the people and blessed them. Then, after presenting the sin offering, the burnt offering, and the peace offering, he stepped down from the altar. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses and Aaron went into the Tabernacle, and when they came back out, they blessed the people again, and the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to the whole community. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fire blazed forth from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s presence and consumed the burnt offering and the fat on the altar. When the people saw this, they shouted with joy and fell face down on the ground.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then tell the Israelites, ‘Take a male goat for a sin offering, and take a calf and a lamb, both a year old and without defects, for a burnt offering. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Also take a bull
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cow; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 9:18, 19.
      marker-yv: yv-n
    - type: text
      text: ' and a ram for a peace offering and flour moistened with olive oil for a grain offering. Present all these offerings to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will appear to you today.’”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the people presented all these things at the entrance of the Tabernacle,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tent of Meeting; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 9:23.
      marker-yv: yv-n
    - type: text
      text: ' just as Moses had commanded. Then the whole community came forward and stood before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded you to do so that the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' may appear to you.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses said to Aaron, “Come to the altar and sacrifice your sin offering and your burnt offering to purify yourself and the people. Then present the offerings of the people to purify them, making them right with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to make atonement for them.
      marker-yv: yv-n
    - type: text
      text: ' just as he has commanded.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Aaron went to the altar and slaughtered the calf as a sin offering for himself. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His sons brought him the blood, and he dipped his finger in it and put it on the horns of the altar. He poured out the rest of the blood at the base of the altar. '
