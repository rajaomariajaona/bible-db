document_id: MIC.1,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave this message to Micah of Moresheth during the years when Jotham, Ahaz, and Hezekiah were kings of Judah. The visions he saw concerned both Samaria and Jerusalem.'
  - type: heading
    content: Grief over Samaria and Jerusalem
  '10':
  - type: text
    content: Don’t tell our enemies in Gath
  - type: note
    content: Gath sounds like the Hebrew term for “tell.”
  - type: text
    content: ;
  - type: text
    content: don’t weep at all.
  - type: text
    content: You people in Beth-leaphrah,
  - type: note
    content: Beth-leaphrah means “house of dust.”
  - type: text
    content: roll in the dust to show your despair.
  '11':
  - type: text
    content: You people in Shaphir,
  - type: note
    content: Shaphir means “pleasant.”
  - type: text
    content: go as captives into exile—naked and ashamed.
  - type: text
    content: The people of Zaanan
  - type: note
    content: Zaanan sounds like the Hebrew term for “come out.”
  - type: text
    content: dare not come outside their walls.
  - type: text
    content: The people of Beth-ezel
  - type: note
    content: Beth-ezel means “adjoining house.”
  - type: text
    content: ' mourn,'
  - type: text
    content: for their house has no support.
  '12':
  - type: text
    content: The people of Maroth
  - type: note
    content: Maroth sounds like the Hebrew term for “bitter.”
  - type: text
    content: ' anxiously wait for relief,'
  - type: text
    content: but only bitterness awaits them
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ’s judgment reaches
  - type: text
    content: even to the gates of Jerusalem.
  '13':
  - type: text
    content: Harness your chariot horses and flee,
  - type: text
    content: you people of Lachish.
  - type: note
    content: Lachish sounds like the Hebrew term for “team of horses.”
  - type: text
    content: You were the first city in Judah
  - type: text
    content: to follow Israel in her rebellion,
  - type: text
    content: and you led Jerusalem
  - type: note
    content: Hebrew the daughter of Zion.
  - type: text
    content: ' into sin.'
  '14':
  - type: text
    content: Send farewell gifts to Moresheth-gath
  - type: note
    content: Moresheth sounds like the Hebrew term for “gift” or “dowry.”
  - type: text
    content: ;
  - type: text
    content: there is no hope of saving it.
  - type: text
    content: The town of Aczib
  - type: note
    content: Aczib means “deception.”
  - type: text
    content: has deceived the kings of Israel.
  '15':
  - type: text
    content: O people of Mareshah,
  - type: note
    content: Mareshah sounds like the Hebrew term for “conqueror.”
  - type: text
    content: I will bring a conqueror to capture your town.
  - type: text
    content: And the leaders
  - type: note
    content: Hebrew the glory.
  - type: text
    content: ' of Israel'
  - type: text
    content: will go to Adullam.
  '16':
  - type: text
    content: Oh, people of Judah, shave your heads in sorrow,
  - type: text
    content: for the children you love will be snatched away.
  - type: text
    content: Make yourselves as bald as a vulture,
  - type: text
    content: for your little ones will be exiled to distant lands.
  '2':
  - type: text
    content: Attention! Let all the people of the world listen!
  - type: text
    content: Let the earth and everything in it hear.
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' is making accusations against you;'
  - type: text
    content: the Lord speaks from his holy Temple.
  '3':
  - type: text
    content: 'Look! The '
  - type: text
    content: Lord
  - type: text
    content: ' is coming!'
  - type: text
    content: He leaves his throne in heaven
  - type: text
    content: and tramples the heights of the earth.
  '4':
  - type: text
    content: The mountains melt beneath his feet
  - type: text
    content: and flow into the valleys
  - type: text
    content: like wax in a fire,
  - type: text
    content: like water pouring down a hill.
  '5':
  - type: text
    content: And why is this happening?
  - type: text
    content: Because of the rebellion of Israel
  - type: note
    content: Hebrew Jacob; also in 1:5b. The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
  - type: text
    content: —
  - type: text
    content: yes, the sins of the whole nation.
  - type: text
    content: Who is to blame for Israel’s rebellion?
  - type: text
    content: Samaria, its capital city!
  - type: text
    content: Where is the center of idolatry in Judah?
  - type: text
    content: In Jerusalem, its capital!
  '6':
  - type: text
    content: '“So I, the '
  - type: text
    content: Lord
  - type: text
    content: ', will make the city of Samaria'
  - type: text
    content: a heap of ruins.
  - type: text
    content: Her streets will be plowed up
  - type: text
    content: for planting vineyards.
  - type: text
    content: I will roll the stones of her walls into the valley below,
  - type: text
    content: exposing her foundations.
  '7':
  - type: text
    content: All her carved images will be smashed.
  - type: text
    content: All her sacred treasures will be burned.
  - type: text
    content: These things were bought with the money
  - type: text
    content: earned by her prostitution,
  - type: text
    content: and they will now be carried away
  - type: text
    content: to pay prostitutes elsewhere.”
  '8':
  - type: text
    content: Therefore, I will mourn and lament.
  - type: text
    content: I will walk around barefoot and naked.
  - type: text
    content: I will howl like a jackal
  - type: text
    content: and moan like an owl.
  '9':
  - type: text
    content: For my people’s wound
  - type: text
    content: is too deep to heal.
  - type: text
    content: It has reached into Judah,
  - type: text
    content: even to the gates of Jerusalem.
