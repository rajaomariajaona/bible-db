segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave this message to Micah of Moresheth during the years when Jotham, Ahaz, and Hezekiah were kings of Judah. The visions he saw concerned both Samaria and Jerusalem.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Grief over Samaria and Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Attention! Let all the people of the world listen!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let the earth and everything in it hear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is making accusations against you;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Lord speaks from his holy Temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Look! The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is coming!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He leaves his throne in heaven
- type: usfm
  marker: q2
  children:
  - type: text
    text: and tramples the heights of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The mountains melt beneath his feet
- type: usfm
  marker: q2
  children:
  - type: text
    text: and flow into the valleys
- type: usfm
  marker: q1
  children:
  - type: text
    text: like wax in a fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like water pouring down a hill.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And why is this happening?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because of the rebellion of Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jacob; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 1:5b. The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
    marker-yv: yv-n
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, the sins of the whole nation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who is to blame for Israel’s rebellion?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Samaria, its capital city!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where is the center of idolatry in Judah?
- type: usfm
  marker: q2
  children:
  - type: text
    text: In Jerusalem, its capital!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“So I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', will make the city of Samaria'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a heap of ruins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her streets will be plowed up
- type: usfm
  marker: q2
  children:
  - type: text
    text: for planting vineyards.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will roll the stones of her walls into the valley below,
- type: usfm
  marker: q2
  children:
  - type: text
    text: exposing her foundations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All her carved images will be smashed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All her sacred treasures will be burned.
- type: usfm
  marker: q1
  children:
  - type: text
    text: These things were bought with the money
- type: usfm
  marker: q2
  children:
  - type: text
    text: earned by her prostitution,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they will now be carried away
- type: usfm
  marker: q2
  children:
  - type: text
    text: to pay prostitutes elsewhere.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Therefore, I will mourn and lament.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will walk around barefoot and naked.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will howl like a jackal
- type: usfm
  marker: q2
  children:
  - type: text
    text: and moan like an owl.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For my people’s wound
- type: usfm
  marker: q2
  children:
  - type: text
    text: is too deep to heal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It has reached into Judah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even to the gates of Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Don’t tell our enemies in Gath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10a '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gath '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sounds like the Hebrew term for “tell.”
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t weep at all.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You people in Beth-leaphrah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10b '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beth-leaphrah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “house of dust.”
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: roll in the dust to show your despair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You people in Shaphir,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11a '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shaphir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “pleasant.”
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: go as captives into exile—naked and ashamed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The people of Zaanan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11b '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Zaanan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sounds like the Hebrew term for “come out.”
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: dare not come outside their walls.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The people of Beth-ezel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11c '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beth-ezel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “adjoining house.”
    marker-yv: yv-n
  - type: text
    text: ' mourn,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for their house has no support.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The people of Maroth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:12 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Maroth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sounds like the Hebrew term for “bitter.”
    marker-yv: yv-n
  - type: text
    text: ' anxiously wait for relief,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but only bitterness awaits them
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s judgment reaches
- type: usfm
  marker: q2
  children:
  - type: text
    text: even to the gates of Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Harness your chariot horses and flee,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you people of Lachish.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:13a '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Lachish '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sounds like the Hebrew term for “team of horses.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: You were the first city in Judah
- type: usfm
  marker: q2
  children:
  - type: text
    text: to follow Israel in her rebellion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you led Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:13b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the daughter of Zion.
    marker-yv: yv-n
  - type: text
    text: ' into sin.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Send farewell gifts to Moresheth-gath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:14a '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Moresheth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sounds like the Hebrew term for “gift” or “dowry.”
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is no hope of saving it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The town of Aczib
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:14b '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Aczib '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “deception.”
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: has deceived the kings of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: O people of Mareshah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:15a '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Mareshah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sounds like the Hebrew term for “conqueror.”
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will bring a conqueror to capture your town.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the leaders
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:15b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the glory.
    marker-yv: yv-n
  - type: text
    text: ' of Israel'
- type: usfm
  marker: q2
  children:
  - type: text
    text: will go to Adullam.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Oh, people of Judah, shave your heads in sorrow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the children you love will be snatched away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make yourselves as bald as a vulture,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your little ones will be exiled to distant lands.
