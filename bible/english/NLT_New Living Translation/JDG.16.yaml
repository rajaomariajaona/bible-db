document_id: JDG.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samson Carries Away Gaza’s Gates
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'One day Samson went to the Philistine town of Gaza and spent the night with a prostitute. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Word soon spread
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions and Latin Vulgate; Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Word soon spread.
    marker-yv: yv-n
  - type: text
    text: ' that Samson was there, so the men of Gaza gathered together and waited all night at the town gates. They kept quiet during the night, saying to themselves, “When the light of morning comes, we will kill him.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But Samson stayed in bed only until midnight. Then he got up, took hold of the doors of the town gate, including the two posts, and lifted them up, bar and all. He put them on his shoulders and carried them all the way to the top of the hill across from Hebron.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samson and Delilah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Some time later Samson fell in love with a woman named Delilah, who lived in the valley of Sorek. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The rulers of the Philistines went to her and said, “Entice Samson to tell you what makes him so strong and how he can be overpowered and tied up securely. Then each of us will give you 1,100 pieces
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1,100 [shekels], '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 28 pounds or 12.5 kilograms in weight.
    marker-yv: yv-n
  - type: text
    text: ' of silver.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So Delilah said to Samson, “Please tell me what makes you so strong and what it would take to tie you up securely.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Samson replied, “If I were tied up with seven new bowstrings that have not yet been dried, I would become as weak as anyone else.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So the Philistine rulers brought Delilah seven new bowstrings, and she tied Samson up with them. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: She had hidden some men in one of the inner rooms of her house, and she cried out, “Samson! The Philistines have come to capture you!” But Samson snapped the bowstrings as a piece of string snaps when it is burned by a fire. So the secret of his strength was not discovered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Afterward Delilah said to him, “You’ve been making fun of me and telling me lies! Now please tell me how you can be tied up securely.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Samson replied, “If I were tied up with brand-new ropes that had never been used, I would become as weak as anyone else.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So Delilah took new ropes and tied him up with them. The men were hiding in the inner room as before, and again Delilah cried out, “Samson! The Philistines have come to capture you!” But again Samson snapped the ropes from his arms as if they were thread.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then Delilah said, “You’ve been making fun of me and telling me lies! Now tell me how you can be tied up securely.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Samson replied, “If you were to weave the seven braids of my hair into the fabric on your loom and tighten it with the loom shuttle, I would become as weak as anyone else.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So while he slept, Delilah wove the seven braids of his hair into the fabric. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then she tightened it with the loom shuttle.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:13-14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version and Latin Vulgate; Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'I would become as weak as anyone else. / So while he slept, Delilah wove the seven braids of his hair into the fabric. '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Then she tightened it with the loom shuttle.
    marker-yv: yv-n
  - type: text
    text: ' Again she cried out, “Samson! The Philistines have come to capture you!” But Samson woke up, pulled back the loom shuttle, and yanked his hair away from the loom and the fabric.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Delilah pouted, “How can you tell me, ‘I love you,’ when you don’t share your secrets with me? You’ve made fun of me three times now, and you still haven’t told me what makes you so strong!” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: She tormented him with her nagging day after day until he was sick to death of it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Finally, Samson shared his secret with her. “My hair has never been cut,” he confessed, “for I was dedicated to God as a Nazirite from birth. If my head were shaved, my strength would leave me, and I would become as weak as anyone else.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Delilah realized he had finally told her the truth, so she sent for the Philistine rulers. “Come back one more time,” she said, “for he has finally told me his secret.” So the Philistine rulers returned with the money in their hands. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Delilah lulled Samson to sleep with his head in her lap, and then she called in a man to shave off the seven locks of his hair. In this way she began to bring him down,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'she began to torment him. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: He began to grow weak.
    marker-yv: yv-n
  - type: text
    text: ' and his strength left him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then she cried out, “Samson! The Philistines have come to capture you!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'When he woke up, he thought, “I will do as before and shake myself free.” But he didn’t realize the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had left him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So the Philistines captured him and gouged out his eyes. They took him to Gaza, where he was bound with bronze chains and forced to grind grain in the prison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But before long, his hair began to grow back.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samson’s Final Victory
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The Philistine rulers held a great festival, offering sacrifices and praising their god, Dagon. They said, “Our god has given us victory over our enemy Samson!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: When the people saw him, they praised their god, saying, “Our god has delivered our enemy to us! The one who killed so many of us is now in our power!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Half drunk by now, the people demanded, “Bring out Samson so he can amuse us!” So he was brought from the prison to amuse them, and they had him stand between the pillars supporting the roof.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Samson said to the young servant who was leading him by the hand, “Place my hands against the pillars that hold up the temple. I want to rest against them.” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Now the temple was completely filled with people. All the Philistine rulers were there, and there were about 3,000 men and women on the roof who were watching as Samson amused them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then Samson prayed to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', remember me again. O God, please strengthen me just one more time. With one blow let me pay back the Philistines for the loss of my two eyes.” '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Samson put his hands on the two center pillars that held up the temple. Pushing against them with both hands, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: he prayed, “Let me die with the Philistines.” And the temple crashed down on the Philistine rulers and all the people. So he killed more people when he died than he had during his entire lifetime.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Later his brothers and other relatives went down to get his body. They took him back home and buried him between Zorah and Eshtaol, where his father, Manoah, was buried. Samson had judged Israel for twenty years.
