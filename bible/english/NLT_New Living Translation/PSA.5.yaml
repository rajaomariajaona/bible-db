document_id: PSA.5,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David, to be accompanied by the flute.'
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', hear me as I pray;'
  - type: text
    content: pay attention to my groaning.
  '10':
  - type: text
    content: O God, declare them guilty.
  - type: text
    content: Let them be caught in their own traps.
  - type: text
    content: Drive them away because of their many sins,
  - type: text
    content: for they have rebelled against you.
  '11':
  - type: text
    content: But let all who take refuge in you rejoice;
  - type: text
    content: let them sing joyful praises forever.
  - type: text
    content: Spread your protection over them,
  - type: text
    content: that all who love your name may be filled with joy.
  '12':
  - type: text
    content: 'For you bless the godly, O '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: you surround them with your shield of love.
  '2':
  - type: text
    content: Listen to my cry for help, my King and my God,
  - type: text
    content: for I pray to no one but you.
  '3':
  - type: text
    content: 'Listen to my voice in the morning, '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Each morning I bring my requests to you and wait expectantly.
  '4':
  - type: text
    content: O God, you take no pleasure in wickedness;
  - type: text
    content: you cannot tolerate the sins of the wicked.
  '5':
  - type: text
    content: Therefore, the proud may not stand in your presence,
  - type: text
    content: for you hate all who do evil.
  '6':
  - type: text
    content: You will destroy those who tell lies.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests murderers and deceivers.'
  '7':
  - type: text
    content: Because of your unfailing love, I can enter your house;
  - type: text
    content: I will worship at your Temple with deepest awe.
  '8':
  - type: text
    content: 'Lead me in the right path, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: or my enemies will conquer me.
  - type: text
    content: Make your way plain for me to follow.
  '9':
  - type: text
    content: My enemies cannot speak a truthful word.
  - type: text
    content: Their deepest desire is to destroy others.
  - type: text
    content: Their talk is foul, like the stench from an open grave.
  - type: text
    content: Their tongues are filled with flattery.
  - type: note
    content: Greek version reads with lies. Compare Rom 3:13.
