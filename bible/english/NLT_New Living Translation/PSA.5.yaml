document_id: PSA.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of David, to be accompanied by the flute.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', hear me as I pray;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pay attention to my groaning.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: O God, declare them guilty.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them be caught in their own traps.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Drive them away because of their many sins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they have rebelled against you.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But let all who take refuge in you rejoice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let them sing joyful praises forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Spread your protection over them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that all who love your name may be filled with joy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For you bless the godly, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you surround them with your shield of love.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Listen to my cry for help, my King and my God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I pray to no one but you.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Listen to my voice in the morning, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Each morning I bring my requests to you and wait expectantly.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: O God, you take no pleasure in wickedness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you cannot tolerate the sins of the wicked.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Therefore, the proud may not stand in your presence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you hate all who do evil.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You will destroy those who tell lies.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' detests murderers and deceivers.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Because of your unfailing love, I can enter your house;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will worship at your Temple with deepest awe.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Lead me in the right path, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or my enemies will conquer me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make your way plain for me to follow.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: My enemies cannot speak a truthful word.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their deepest desire is to destroy others.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their talk is foul, like the stench from an open grave.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their tongues are filled with flattery.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'with lies. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Rom 3:13.
      marker-yv: yv-n
