document_id: NEH.8,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'all the people assembled with a unified purpose at the square just inside the Water Gate. They asked Ezra the scribe to bring out the Book of the Law of Moses, which the '
  - type: text
    content: Lord
  - type: text
    content: ' had given for Israel to obey.'
  '10':
  - type: text
    content: And Nehemiah
  - type: note
    content: Hebrew he.
  - type: text
    content: ' continued, “Go and celebrate with a feast of rich foods and sweet drinks, and share gifts of food with people who have nothing prepared. This is a sacred day before our Lord. Don’t be dejected and sad, for the joy of the '
  - type: text
    content: Lord
  - type: text
    content: ' is your strength!”'
  '11':
  - type: text
    content: 'And the Levites, too, quieted the people, telling them, “Hush! Don’t weep! For this is a sacred day.” '
  '12':
  - type: text
    content: So the people went away to eat and drink at a festive meal, to share gifts of food, and to celebrate with great joy because they had heard God’s words and understood them.
  - type: heading
    content: The Festival of Shelters
  '13':
  - type: text
    content: On October 9
  - type: note
    content: Hebrew On the second day, of the seventh month of the ancient Hebrew lunar calendar. This day was October 9, 445 b.c.; also see notes on 1:1 and 8:2.
  - type: text
    content: ' the family leaders of all the people, together with the priests and Levites, met with Ezra the scribe to go over the Law in greater detail. '
  '14':
  - type: text
    content: 'As they studied the Law, they discovered that the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded through Moses that the Israelites should live in shelters during the festival to be held that month.'
  - type: note
    content: Hebrew in the seventh month. This month of the ancient Hebrew lunar calendar usually occurs within the months of September and October. See Lev 23:39-43.
  - type: text
    content: ' '
  '15':
  - type: text
    content: He had said that a proclamation should be made throughout their towns and in Jerusalem, telling the people to go to the hills to get branches from olive, wild olive,
  - type: note
    content: Or pine; Hebrew reads oil tree.
  - type: text
    content: ' myrtle, palm, and other leafy trees. They were to use these branches to make shelters in which they would live during the festival, as prescribed in the Law.'
  '16':
  - type: text
    content: 'So the people went out and cut branches and used them to build shelters on the roofs of their houses, in their courtyards, in the courtyards of God’s Temple, or in the squares just inside the Water Gate and the Ephraim Gate. '
  '17':
  - type: text
    content: So everyone who had returned from captivity lived in these shelters during the festival, and they were all filled with great joy! The Israelites had not celebrated like this since the days of Joshua
  - type: note
    content: Hebrew Jeshua, a variant spelling of Joshua.
  - type: text
    content: ' son of Nun.'
  '18':
  - type: text
    content: Ezra read from the Book of the Law of God on each of the seven days of the festival. Then on the eighth day they held a solemn assembly, as was required by law.
  '2':
  - type: text
    content: So on October 8
  - type: note
    content: Hebrew on the first day of the seventh month, of the ancient Hebrew lunar calendar. This day was October 8, 445 b.c.; also see note on 1:1.
  - type: text
    content: ' Ezra the priest brought the Book of the Law before the assembly, which included the men and women and all the children old enough to understand. '
  '3':
  - type: text
    content: He faced the square just inside the Water Gate from early morning until noon and read aloud to everyone who could understand. All the people listened closely to the Book of the Law.
  '4':
  - type: text
    content: 'Ezra the scribe stood on a high wooden platform that had been made for the occasion. To his right stood Mattithiah, Shema, Anaiah, Uriah, Hilkiah, and Maaseiah. To his left stood Pedaiah, Mishael, Malkijah, Hashum, Hashbaddanah, Zechariah, and Meshullam. '
  '5':
  - type: text
    content: Ezra stood on the platform in full view of all the people. When they saw him open the book, they all rose to their feet.
  '6':
  - type: text
    content: 'Then Ezra praised the '
  - type: text
    content: Lord
  - type: text
    content: ', the great God, and all the people chanted, “Amen! Amen!” as they lifted their hands. Then they bowed down and worshiped the '
  - type: text
    content: Lord
  - type: text
    content: ' with their faces to the ground.'
  '7':
  - type: text
    content: 'The Levites—Jeshua, Bani, Sherebiah, Jamin, Akkub, Shabbethai, Hodiah, Maaseiah, Kelita, Azariah, Jozabad, Hanan, and Pelaiah—then instructed the people in the Law while everyone remained in their places. '
  '8':
  - type: text
    content: They read from the Book of the Law of God and clearly explained the meaning of what was being read, helping the people understand each passage.
  '9':
  - type: text
    content: 'Then Nehemiah the governor, Ezra the priest and scribe, and the Levites who were interpreting for the people said to them, “Don’t mourn or weep on such a day as this! For today is a sacred day before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.” For the people had all been weeping as they listened to the words of the Law.'
