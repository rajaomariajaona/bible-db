document_id: JOS.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When all the Amorite kings west of the Jordan and all the Canaanite kings who lived along the Mediterranean coast
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: along the sea.
    marker-yv: yv-n
  - type: text
    text: ' heard how the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had dried up the Jordan River so the people of Israel could cross, they lost heart and were paralyzed with fear because of them.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Reestablishes Covenant Ceremonies
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'At that time the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told Joshua, “Make flint knives and circumcise this second generation of Israelites.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: circumcise the Israelites a second time.
    marker-yv: yv-n
  - type: text
    text: '” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So Joshua made flint knives and circumcised the entire male population of Israel at Gibeath-haaraloth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:3 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gibeath-haaraloth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “hill of foreskins.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Joshua had to circumcise them because all the men who were old enough to fight in battle when they left Egypt had died in the wilderness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Those who left Egypt had all been circumcised, but none of those born after the Exodus, during the years in the wilderness, had been circumcised. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The Israelites had traveled in the wilderness for forty years until all the men who were old enough to fight in battle when they left Egypt had died. For they had disobeyed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' vowed he would not let them enter the land he had sworn to give us—a land flowing with milk and honey. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Joshua circumcised their sons—those who had grown up to take their fathers’ places—for they had not been circumcised on the way to the Promised Land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: After all the males had been circumcised, they rested in the camp until they were healed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Joshua, “Today I have rolled away the shame of your slavery in Egypt.” So that place has been called Gilgal'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:9 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gilgal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sounds like the Hebrew word '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'galal, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: meaning “to roll.”
    marker-yv: yv-n
  - type: text
    text: ' to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: While the Israelites were camped at Gilgal on the plains of Jericho, they celebrated Passover on the evening of the fourteenth day of the first month.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This day in the ancient Hebrew lunar calendar occurred in late March, April, or early May.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The very next day they began to eat unleavened bread and roasted grain harvested from the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: No manna appeared on the day they first ate from the crops of the land, and it was never seen again. So from that time on the Israelites ate from the crops of Canaan.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Commander Confronts Joshua
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When Joshua was near the town of Jericho, he looked up and saw a man standing in front of him with sword in hand. Joshua went up to him and demanded, “Are you friend or foe?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“Neither one,” he replied. “I am the commander of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s army.”
- type: usfm
  marker: p
  children:
  - type: text
    text: At this, Joshua fell with his face to the ground in reverence. “I am at your command,” Joshua said. “What do you want your servant to do?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The commander of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s army replied, “Take off your sandals, for the place where you are standing is holy.” And Joshua did as he was told.
