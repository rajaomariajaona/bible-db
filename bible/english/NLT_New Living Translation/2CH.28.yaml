document_id: 2CH.28,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Ahaz Rules in Judah
  - type: text
    content: 'Ahaz was twenty years old when he became king, and he reigned in Jerusalem sixteen years. He did not do what was pleasing in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ', as his ancestor David had done. '
  '10':
  - type: text
    content: 'And now you are planning to make slaves of these people from Judah and Jerusalem. What about your own sins against the '
  - type: text
    content: Lord
  - type: text
    content: ' your God? '
  '11':
  - type: text
    content: 'Listen to me and return these prisoners you have taken, for they are your own relatives. Watch out, because now the '
  - type: text
    content: Lord
  - type: text
    content: ’s fierce anger has been turned against you!”
  '12':
  - type: text
    content: Then some of the leaders of Israel
  - type: note
    content: Hebrew Ephraim, referring to the northern kingdom of Israel.
  - type: text
    content: '—Azariah son of Jehohanan, Berekiah son of Meshillemoth, Jehizkiah son of Shallum, and Amasa son of Hadlai—agreed with this and confronted the men returning from battle. '
  '13':
  - type: text
    content: '“You must not bring the prisoners here!” they declared. “We cannot afford to add to our sins and guilt. Our guilt is already great, and the '
  - type: text
    content: Lord
  - type: text
    content: ’s fierce anger is already turned against Israel.”
  '14':
  - type: text
    content: 'So the warriors released the prisoners and handed over the plunder in the sight of the leaders and all the people. '
  '15':
  - type: text
    content: Then the four men just mentioned by name came forward and distributed clothes from the plunder to the prisoners who were naked. They provided clothing and sandals to wear, gave them enough food and drink, and dressed their wounds with olive oil. They put those who were weak on donkeys and took all the prisoners back to their own people in Jericho, the city of palms. Then they returned to Samaria.
  - type: heading
    content: Ahaz Closes the Temple
  '16':
  - type: text
    content: 'At that time King Ahaz of Judah asked the king of Assyria for help. '
  '17':
  - type: text
    content: 'The armies of Edom had again invaded Judah and taken captives. '
  '18':
  - type: text
    content: And the Philistines had raided towns located in the foothills of Judah
  - type: note
    content: Hebrew the Shephelah.
  - type: text
    content: ' and in the Negev of Judah. They had already captured and occupied Beth-shemesh, Aijalon, Gederoth, Soco with its villages, Timnah with its villages, and Gimzo with its villages. '
  '19':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' was humbling Judah because of King Ahaz of Judah,'
  - type: note
    content: Masoretic Text reads of Israel; also in 28:23, 27. The author of Chronicles sees Judah as representative of the true Israel. (Some Hebrew manuscripts and Greek version read of Judah.)
  - type: text
    content: ' for he had encouraged his people to sin and had been utterly unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: 'Instead, he followed the example of the kings of Israel. He cast metal images for the worship of Baal. '
  '20':
  - type: text
    content: So when King Tiglath-pileser
  - type: note
    content: Hebrew Tilgath-pilneser, a variant spelling of Tiglath-pileser.
  - type: text
    content: ' of Assyria arrived, he attacked Ahaz instead of helping him. '
  '21':
  - type: text
    content: 'Ahaz took valuable items from the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple, the royal palace, and from the homes of his officials and gave them to the king of Assyria as tribute. But this did not help him.
  '22':
  - type: text
    content: 'Even during this time of trouble, King Ahaz continued to reject the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: He offered sacrifices to the gods of Damascus who had defeated him, for he said, “Since these gods helped the kings of Aram, they will help me, too, if I sacrifice to them.” But instead, they led to his ruin and the ruin of all Judah.
  '24':
  - type: text
    content: 'The king took the various articles from the Temple of God and broke them into pieces. He shut the doors of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple so that no one could worship there, and he set up altars to pagan gods in every corner of Jerusalem. '
  '25':
  - type: text
    content: 'He made pagan shrines in all the towns of Judah for offering sacrifices to other gods. In this way, he aroused the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of his ancestors.'
  '26':
  - type: text
    content: 'The rest of the events of Ahaz’s reign and everything he did, from beginning to end, are recorded in '
  - type: text
    content: The Book of the Kings of Judah and Israel.
  - type: text
    content: ' '
  '27':
  - type: text
    content: When Ahaz died, he was buried in Jerusalem but not in the royal cemetery of the kings of Judah. Then his son Hezekiah became the next king.
  '3':
  - type: text
    content: He offered sacrifices in the valley of Ben-Hinnom, even sacrificing his own sons in the fire.
  - type: note
    content: Or even making his sons pass through the fire.
  - type: text
    content: ' In this way, he followed the detestable practices of the pagan nations the '
  - type: text
    content: Lord
  - type: text
    content: ' had driven from the land ahead of the Israelites. '
  '4':
  - type: text
    content: He offered sacrifices and burned incense at the pagan shrines and on the hills and under every green tree.
  '5':
  - type: text
    content: 'Because of all this, the '
  - type: text
    content: Lord
  - type: text
    content: ' his God allowed the king of Aram to defeat Ahaz and to exile large numbers of his people to Damascus. The armies of the king of Israel also defeated Ahaz and inflicted many casualties on his army. '
  '6':
  - type: text
    content: 'In a single day Pekah son of Remaliah, Israel’s king, killed 120,000 of Judah’s troops, all of them experienced warriors, because they had abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors. '
  '7':
  - type: text
    content: 'Then Zicri, a warrior from Ephraim, killed Maaseiah, the king’s son; Azrikam, the king’s palace commander; and Elkanah, the king’s second-in-command. '
  '8':
  - type: text
    content: The armies of Israel captured 200,000 women and children from Judah and seized tremendous amounts of plunder, which they took back to Samaria.
  '9':
  - type: text
    content: 'But a prophet of the '
  - type: text
    content: Lord
  - type: text
    content: ' named Oded was there in Samaria when the army of Israel returned home. He went out to meet them and said, “The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestors, was angry with Judah and let you defeat them. But you have gone too far, killing them without mercy, and all heaven is disturbed. '
