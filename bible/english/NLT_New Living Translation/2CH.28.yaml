document_id: 2CH.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ahaz Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ahaz was twenty years old when he became king, and he reigned in Jerusalem sixteen years. He did not do what was pleasing in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', as his ancestor David had done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Instead, he followed the example of the kings of Israel. He cast metal images for the worship of Baal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He offered sacrifices in the valley of Ben-Hinnom, even sacrificing his own sons in the fire.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: even making his sons pass through the fire.
    marker-yv: yv-n
  - type: text
    text: ' In this way, he followed the detestable practices of the pagan nations the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had driven from the land ahead of the Israelites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He offered sacrifices and burned incense at the pagan shrines and on the hills and under every green tree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Because of all this, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God allowed the king of Aram to defeat Ahaz and to exile large numbers of his people to Damascus. The armies of the king of Israel also defeated Ahaz and inflicted many casualties on his army. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'In a single day Pekah son of Remaliah, Israel’s king, killed 120,000 of Judah’s troops, all of them experienced warriors, because they had abandoned the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of their ancestors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then Zicri, a warrior from Ephraim, killed Maaseiah, the king’s son; Azrikam, the king’s palace commander; and Elkanah, the king’s second-in-command. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The armies of Israel captured 200,000 women and children from Judah and seized tremendous amounts of plunder, which they took back to Samaria.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But a prophet of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' named Oded was there in Samaria when the army of Israel returned home. He went out to meet them and said, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of your ancestors, was angry with Judah and let you defeat them. But you have gone too far, killing them without mercy, and all heaven is disturbed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And now you are planning to make slaves of these people from Judah and Jerusalem. What about your own sins against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Listen to me and return these prisoners you have taken, for they are your own relatives. Watch out, because now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s fierce anger has been turned against you!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then some of the leaders of Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ephraim, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: referring to the northern kingdom of Israel.
    marker-yv: yv-n
  - type: text
    text: '—Azariah son of Jehohanan, Berekiah son of Meshillemoth, Jehizkiah son of Shallum, and Amasa son of Hadlai—agreed with this and confronted the men returning from battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“You must not bring the prisoners here!” they declared. “We cannot afford to add to our sins and guilt. Our guilt is already great, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s fierce anger is already turned against Israel.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So the warriors released the prisoners and handed over the plunder in the sight of the leaders and all the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then the four men just mentioned by name came forward and distributed clothes from the plunder to the prisoners who were naked. They provided clothing and sandals to wear, gave them enough food and drink, and dressed their wounds with olive oil. They put those who were weak on donkeys and took all the prisoners back to their own people in Jericho, the city of palms. Then they returned to Samaria.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ahaz Closes the Temple
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'At that time King Ahaz of Judah asked the king of Assyria for help. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The armies of Edom had again invaded Judah and taken captives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And the Philistines had raided towns located in the foothills of Judah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Shephelah.
    marker-yv: yv-n
  - type: text
    text: ' and in the Negev of Judah. They had already captured and occupied Beth-shemesh, Aijalon, Gederoth, Soco with its villages, Timnah with its villages, and Gimzo with its villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was humbling Judah because of King Ahaz of Judah,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of Israel; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'also in 28:23, 27. The author of Chronicles sees Judah as representative of the true Israel. (Some Hebrew manuscripts and Greek version read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of Judah.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: )
    marker-yv: yv-n
  - type: text
    text: ' for he had encouraged his people to sin and had been utterly unfaithful to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So when King Tiglath-pileser
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tilgath-pilneser, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Tiglath-pileser.
    marker-yv: yv-n
  - type: text
    text: ' of Assyria arrived, he attacked Ahaz instead of helping him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ahaz took valuable items from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple, the royal palace, and from the homes of his officials and gave them to the king of Assyria as tribute. But this did not help him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Even during this time of trouble, King Ahaz continued to reject the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He offered sacrifices to the gods of Damascus who had defeated him, for he said, “Since these gods helped the kings of Aram, they will help me, too, if I sacrifice to them.” But instead, they led to his ruin and the ruin of all Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The king took the various articles from the Temple of God and broke them into pieces. He shut the doors of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple so that no one could worship there, and he set up altars to pagan gods in every corner of Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He made pagan shrines in all the towns of Judah for offering sacrifices to other gods. In this way, he aroused the anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of his ancestors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The rest of the events of Ahaz’s reign and everything he did, from beginning to end, are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the Kings of Judah and Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: When Ahaz died, he was buried in Jerusalem but not in the royal cemetery of the kings of Judah. Then his son Hezekiah became the next king.
