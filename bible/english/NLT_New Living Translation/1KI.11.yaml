document_id: 1KI.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon’s Many Wives
  - type: text
    content: 'Now King Solomon loved many foreign women. Besides Pharaoh’s daughter, he married women from Moab, Ammon, Edom, Sidon, and from among the Hittites. '
  '10':
  - type: text
    content: 'He had warned Solomon specifically about worshiping other gods, but Solomon did not listen to the '
  - type: text
    content: Lord
  - type: text
    content: '’s command. '
  '11':
  - type: text
    content: 'So now the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Since you have not kept my covenant and have disobeyed my decrees, I will surely tear the kingdom away from you and give it to one of your servants. '
  '12':
  - type: text
    content: 'But for the sake of your father, David, I will not do this while you are still alive. I will take the kingdom away from your son. '
  '13':
  - type: text
    content: And even so, I will not take away the entire kingdom; I will let him be king of one tribe, for the sake of my servant David and for the sake of Jerusalem, my chosen city.”
  - type: heading
    content: Solomon’s Adversaries
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' raised up Hadad the Edomite, a member of Edom’s royal family, to be Solomon’s adversary. '
  '15':
  - type: text
    content: 'Years before, David had defeated Edom. Joab, his army commander, had stayed to bury some of the Israelite soldiers who had died in battle. While there, they killed every male in Edom. '
  '16':
  - type: text
    content: Joab and the army of Israel had stayed there for six months, killing them.
  '17':
  - type: text
    content: 'But Hadad and a few of his father’s royal officials escaped and headed for Egypt. (Hadad was just a boy at the time.) '
  '18':
  - type: text
    content: 'They set out from Midian and went to Paran, where others joined them. Then they traveled to Egypt and went to Pharaoh, who gave them a home, food, and some land. '
  '19':
  - type: text
    content: 'Pharaoh grew very fond of Hadad, and he gave him his wife’s sister in marriage—the sister of Queen Tahpenes. '
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' had clearly instructed the people of Israel, “You must not marry them, because they will turn your hearts to their gods.” Yet Solomon insisted on loving them anyway. '
  '20':
  - type: text
    content: She bore him a son named Genubath. Tahpenes raised him
  - type: note
    content: As in Greek version; Hebrew reads weaned him.
  - type: text
    content: ' in Pharaoh’s palace among Pharaoh’s own sons.'
  '21':
  - type: text
    content: When the news reached Hadad in Egypt that David and his commander Joab were both dead, he said to Pharaoh, “Let me return to my own country.”
  '22':
  - type: text
    content: “Why?” Pharaoh asked him. “What do you lack here that makes you want to go home?”
  - type: text
    content: “Nothing,” he replied. “But even so, please let me return home.”
  '23':
  - type: text
    content: 'God also raised up Rezon son of Eliada as Solomon’s adversary. Rezon had fled from his master, King Hadadezer of Zobah, '
  '24':
  - type: text
    content: 'and had become the leader of a gang of rebels. After David conquered Hadadezer, Rezon and his men fled to Damascus, where he became king. '
  '25':
  - type: text
    content: Rezon was Israel’s bitter adversary for the rest of Solomon’s reign, and he made trouble, just as Hadad did. Rezon hated Israel intensely and continued to reign in Aram.
  - type: heading
    content: Jeroboam Rebels against Solomon
  '26':
  - type: text
    content: Another rebel leader was Jeroboam son of Nebat, one of Solomon’s own officials. He came from the town of Zeredah in Ephraim, and his mother was Zeruah, a widow.
  '27':
  - type: text
    content: This is the story behind his rebellion. Solomon was rebuilding the supporting terraces
  - type: note
    content: Hebrew the millo. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' and repairing the walls of the city of his father, David. '
  '28':
  - type: text
    content: Jeroboam was a very capable young man, and when Solomon saw how industrious he was, he put him in charge of the labor force from the tribes of Ephraim and Manasseh, the descendants of Joseph.
  '29':
  - type: text
    content: 'One day as Jeroboam was leaving Jerusalem, the prophet Ahijah from Shiloh met him along the way. Ahijah was wearing a new cloak. The two of them were alone in a field, '
  '3':
  - type: text
    content: 'He had 700 wives of royal birth and 300 concubines. And in fact, they did turn his heart away from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '30':
  - type: text
    content: 'and Ahijah took hold of the new cloak he was wearing and tore it into twelve pieces. '
  '31':
  - type: text
    content: 'Then he said to Jeroboam, “Take ten of these pieces, for this is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: ‘I am about to tear the kingdom from the hand of Solomon, and I will give ten of the tribes to you! '
  '32':
  - type: text
    content: 'But I will leave him one tribe for the sake of my servant David and for the sake of Jerusalem, which I have chosen out of all the tribes of Israel. '
  '33':
  - type: text
    content: For Solomon has
  - type: note
    content: As in Greek, Syriac, and Latin Vulgate; Hebrew reads For they have.
  - type: text
    content: ' abandoned me and worshiped Ashtoreth, the goddess of the Sidonians; Chemosh, the god of Moab; and Molech, the god of the Ammonites. He has not followed my ways and done what is pleasing in my sight. He has not obeyed my decrees and regulations as David his father did.'
  '34':
  - type: text
    content: '“‘But I will not take the entire kingdom from Solomon at this time. For the sake of my servant David, the one whom I chose and who obeyed my commands and decrees, I will keep Solomon as leader for the rest of his life. '
  '35':
  - type: text
    content: 'But I will take the kingdom away from his son and give ten of the tribes to you. '
  '36':
  - type: text
    content: 'His son will have one tribe so that the descendants of David my servant will continue to reign, shining like a lamp in Jerusalem, the city I have chosen to be the place for my name. '
  '37':
  - type: text
    content: 'And I will place you on the throne of Israel, and you will rule over all that your heart desires. '
  '38':
  - type: text
    content: 'If you listen to what I tell you and follow my ways and do whatever I consider to be right, and if you obey my decrees and commands, as my servant David did, then I will always be with you. I will establish an enduring dynasty for you as I did for David, and I will give Israel to you. '
  '39':
  - type: text
    content: Because of Solomon’s sin I will punish the descendants of David—though not forever.’”
  '4':
  - type: text
    content: 'In Solomon’s old age, they turned his heart to worship other gods instead of being completely faithful to the '
  - type: text
    content: Lord
  - type: text
    content: ' his God, as his father, David, had been. '
  '40':
  - type: text
    content: Solomon tried to kill Jeroboam, but he fled to King Shishak of Egypt and stayed there until Solomon died.
  - type: heading
    content: Summary of Solomon’s Reign
  '41':
  - type: text
    content: 'The rest of the events in Solomon’s reign, including all his deeds and his wisdom, are recorded in '
  - type: text
    content: The Book of the Acts of Solomon.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Solomon ruled in Jerusalem over all Israel for forty years. '
  '43':
  - type: text
    content: When he died, he was buried in the City of David, named for his father. Then his son Rehoboam became the next king.
  '5':
  - type: text
    content: Solomon worshiped Ashtoreth, the goddess of the Sidonians, and Molech,
  - type: note
    content: Hebrew Milcom, a variant spelling of Molech; also in 11:33.
  - type: text
    content: ' the detestable god of the Ammonites. '
  '6':
  - type: text
    content: 'In this way, Solomon did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight; he refused to follow the '
  - type: text
    content: Lord
  - type: text
    content: ' completely, as his father, David, had done.'
  '7':
  - type: text
    content: On the Mount of Olives, east of Jerusalem,
  - type: note
    content: Hebrew On the mountain east of Jerusalem.
  - type: text
    content: ' he even built a pagan shrine for Chemosh, the detestable god of Moab, and another for Molech, the detestable god of the Ammonites. '
  '8':
  - type: text
    content: Solomon built such shrines for all his foreign wives to use for burning incense and sacrificing to their gods.
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' was very angry with Solomon, for his heart had turned away from the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, who had appeared to him twice. '
