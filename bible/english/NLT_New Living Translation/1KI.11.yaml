document_id: 1KI.11,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon’s Many Wives
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now King Solomon loved many foreign women. Besides Pharaoh’s daughter, he married women from Moab, Ammon, Edom, Sidon, and from among the Hittites. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He had warned Solomon specifically about worshiping other gods, but Solomon did not listen to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s command. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, “Since you have not kept my covenant and have disobeyed my decrees, I will surely tear the kingdom away from you and give it to one of your servants. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But for the sake of your father, David, I will not do this while you are still alive. I will take the kingdom away from your son. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And even so, I will not take away the entire kingdom; I will let him be king of one tribe, for the sake of my servant David and for the sake of Jerusalem, my chosen city.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon’s Adversaries
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' raised up Hadad the Edomite, a member of Edom’s royal family, to be Solomon’s adversary. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Years before, David had defeated Edom. Joab, his army commander, had stayed to bury some of the Israelite soldiers who had died in battle. While there, they killed every male in Edom. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Joab and the army of Israel had stayed there for six months, killing them.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Hadad and a few of his father’s royal officials escaped and headed for Egypt. (Hadad was just a boy at the time.) '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They set out from Midian and went to Paran, where others joined them. Then they traveled to Egypt and went to Pharaoh, who gave them a home, food, and some land. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaoh grew very fond of Hadad, and he gave him his wife’s sister in marriage—the sister of Queen Tahpenes. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had clearly instructed the people of Israel, “You must not marry them, because they will turn your hearts to their gods.” Yet Solomon insisted on loving them anyway. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She bore him a son named Genubath. Tahpenes raised him
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: weaned him.
      marker-yv: yv-n
    - type: text
      text: ' in Pharaoh’s palace among Pharaoh’s own sons.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the news reached Hadad in Egypt that David and his commander Joab were both dead, he said to Pharaoh, “Let me return to my own country.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Why?” Pharaoh asked him. “What do you lack here that makes you want to go home?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Nothing,” he replied. “But even so, please let me return home.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God also raised up Rezon son of Eliada as Solomon’s adversary. Rezon had fled from his master, King Hadadezer of Zobah, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and had become the leader of a gang of rebels. After David conquered Hadadezer, Rezon and his men fled to Damascus, where he became king. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rezon was Israel’s bitter adversary for the rest of Solomon’s reign, and he made trouble, just as Hadad did. Rezon hated Israel intensely and continued to reign in Aram.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeroboam Rebels against Solomon
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Another rebel leader was Jeroboam son of Nebat, one of Solomon’s own officials. He came from the town of Zeredah in Ephraim, and his mother was Zeruah, a widow.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This is the story behind his rebellion. Solomon was rebuilding the supporting terraces
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the millo. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' and repairing the walls of the city of his father, David. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jeroboam was a very capable young man, and when Solomon saw how industrious he was, he put him in charge of the labor force from the tribes of Ephraim and Manasseh, the descendants of Joseph.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day as Jeroboam was leaving Jerusalem, the prophet Ahijah from Shiloh met him along the way. Ahijah was wearing a new cloak. The two of them were alone in a field, '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He had 700 wives of royal birth and 300 concubines. And in fact, they did turn his heart away from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Ahijah took hold of the new cloak he was wearing and tore it into twelve pieces. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said to Jeroboam, “Take ten of these pieces, for this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: ‘I am about to tear the kingdom from the hand of Solomon, and I will give ten of the tribes to you! '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I will leave him one tribe for the sake of my servant David and for the sake of Jerusalem, which I have chosen out of all the tribes of Israel. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For Solomon has
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek, Syriac, and Latin Vulgate; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: For they have.
      marker-yv: yv-n
    - type: text
      text: ' abandoned me and worshiped Ashtoreth, the goddess of the Sidonians; Chemosh, the god of Moab; and Molech, the god of the Ammonites. He has not followed my ways and done what is pleasing in my sight. He has not obeyed my decrees and regulations as David his father did.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘But I will not take the entire kingdom from Solomon at this time. For the sake of my servant David, the one whom I chose and who obeyed my commands and decrees, I will keep Solomon as leader for the rest of his life. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I will take the kingdom away from his son and give ten of the tribes to you. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His son will have one tribe so that the descendants of David my servant will continue to reign, shining like a lamp in Jerusalem, the city I have chosen to be the place for my name. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will place you on the throne of Israel, and you will rule over all that your heart desires. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you listen to what I tell you and follow my ways and do whatever I consider to be right, and if you obey my decrees and commands, as my servant David did, then I will always be with you. I will establish an enduring dynasty for you as I did for David, and I will give Israel to you. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Because of Solomon’s sin I will punish the descendants of David—though not forever.’”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In Solomon’s old age, they turned his heart to worship other gods instead of being completely faithful to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God, as his father, David, had been. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Solomon tried to kill Jeroboam, but he fled to King Shishak of Egypt and stayed there until Solomon died.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Summary of Solomon’s Reign
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The rest of the events in Solomon’s reign, including all his deeds and his wisdom, are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the Acts of Solomon.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Solomon ruled in Jerusalem over all Israel for forty years. '
  '43':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When he died, he was buried in the City of David, named for his father. Then his son Rehoboam became the next king.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Solomon worshiped Ashtoreth, the goddess of the Sidonians, and Molech,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Milcom, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Molech; also in 11:33.
      marker-yv: yv-n
    - type: text
      text: ' the detestable god of the Ammonites. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In this way, Solomon did what was evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight; he refused to follow the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' completely, as his father, David, had done.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On the Mount of Olives, east of Jerusalem,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: On the mountain east of Jerusalem.
      marker-yv: yv-n
    - type: text
      text: ' he even built a pagan shrine for Chemosh, the detestable god of Moab, and another for Molech, the detestable god of the Ammonites. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Solomon built such shrines for all his foreign wives to use for burning incense and sacrificing to their gods.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was very angry with Solomon, for his heart had turned away from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, who had appeared to him twice. '
