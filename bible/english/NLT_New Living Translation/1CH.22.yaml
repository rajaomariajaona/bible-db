document_id: 1CH.22
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then David said, “This will be the location for the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God and the place of the altar for Israel’s burnt offerings!”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Preparations for the Temple
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So David gave orders to call together the foreigners living in Israel, and he assigned them the task of preparing finished stone for building the Temple of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David provided large amounts of iron for the nails that would be needed for the doors in the gates and for the clamps, and he gave more bronze than could be weighed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He also provided innumerable cedar logs, for the men of Tyre and Sidon had brought vast amounts of cedar to David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'David said, “My son Solomon is still young and inexperienced. And since the Temple to be built for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' must be a magnificent structure, famous and glorious throughout the world, I will begin making preparations for it now.” So David collected vast amounts of building materials before his death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then David sent for his son Solomon and instructed him to build a Temple for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“My son, I wanted to build a Temple to honor the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God,” David told him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, ‘You have killed many men in the battles you have fought. And since you have shed so much blood in my sight, you will not be the one to build a Temple to honor my name. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But you will have a son who will be a man of peace. I will give him peace with his enemies in all the surrounding lands. His name will be Solomon,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:9 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Solomon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sounds like and is probably derived from the Hebrew word for “peace.”
    marker-yv: yv-n
  - type: text
    text: ' and I will give peace and quiet to Israel during his reign. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He is the one who will build a Temple to honor my name. He will be my son, and I will be his father. And I will secure the throne of his kingdom over Israel forever.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Now, my son, may the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' be with you and give you success as you follow his directions in building the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And may the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' give you wisdom and understanding, that you may obey the Law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God as you rule over Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For you will be successful if you carefully obey the decrees and regulations that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave to Israel through Moses. Be strong and courageous; do not be afraid or lose heart!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“I have worked hard to provide materials for building the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: —nearly 4,000 tons of gold, 40,000 tons of silver,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '100,000 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3,400 metric tons] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of gold, 1,000,000 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[34,000 metric tons] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of silver.
    marker-yv: yv-n
  - type: text
    text: ' and so much iron and bronze that it cannot be weighed. I have also gathered timber and stone for the walls, though you may need to add more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'You have a large number of skilled stonemasons and carpenters and craftsmen of every kind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'You have expert goldsmiths and silversmiths and workers of bronze and iron. Now begin the work, and may the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' be with you!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then David ordered all the leaders of Israel to assist Solomon in this project. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is with you,” he declared. “He has given you peace with the surrounding nations. He has handed them over to me, and they are now subject to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and his people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God with all your heart and soul. Build the sanctuary of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God so that you can bring the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Covenant and the holy vessels of God into the Temple built to honor the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s name.”
