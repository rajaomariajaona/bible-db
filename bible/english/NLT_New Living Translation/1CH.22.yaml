document_id: 1CH.22,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then David said, “This will be the location for the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' God and the place of the altar for Israel’s burnt offerings!”'
  - type: heading
    content: Preparations for the Temple
  '10':
  - type: text
    content: He is the one who will build a Temple to honor my name. He will be my son, and I will be his father. And I will secure the throne of his kingdom over Israel forever.’
  '11':
  - type: text
    content: '“Now, my son, may the '
  - type: text
    content: Lord
  - type: text
    content: ' be with you and give you success as you follow his directions in building the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '12':
  - type: text
    content: 'And may the '
  - type: text
    content: Lord
  - type: text
    content: ' give you wisdom and understanding, that you may obey the Law of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God as you rule over Israel. '
  '13':
  - type: text
    content: 'For you will be successful if you carefully obey the decrees and regulations that the '
  - type: text
    content: Lord
  - type: text
    content: ' gave to Israel through Moses. Be strong and courageous; do not be afraid or lose heart!'
  '14':
  - type: text
    content: '“I have worked hard to provide materials for building the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: —nearly 4,000 tons of gold, 40,000 tons of silver,
  - type: note
    content: Hebrew 100,000 talents [3,400 metric tons] of gold, 1,000,000 talents [34,000 metric tons] of silver.
  - type: text
    content: ' and so much iron and bronze that it cannot be weighed. I have also gathered timber and stone for the walls, though you may need to add more. '
  '15':
  - type: text
    content: 'You have a large number of skilled stonemasons and carpenters and craftsmen of every kind. '
  '16':
  - type: text
    content: 'You have expert goldsmiths and silversmiths and workers of bronze and iron. Now begin the work, and may the '
  - type: text
    content: Lord
  - type: text
    content: ' be with you!”'
  '17':
  - type: text
    content: 'Then David ordered all the leaders of Israel to assist Solomon in this project. '
  '18':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' your God is with you,” he declared. “He has given you peace with the surrounding nations. He has handed them over to me, and they are now subject to the '
  - type: text
    content: Lord
  - type: text
    content: ' and his people. '
  '19':
  - type: text
    content: 'Now seek the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with all your heart and soul. Build the sanctuary of the '
  - type: text
    content: Lord
  - type: text
    content: ' God so that you can bring the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Covenant and the holy vessels of God into the Temple built to honor the '
  - type: text
    content: Lord
  - type: text
    content: ’s name.”
  '2':
  - type: text
    content: 'So David gave orders to call together the foreigners living in Israel, and he assigned them the task of preparing finished stone for building the Temple of God. '
  '3':
  - type: text
    content: 'David provided large amounts of iron for the nails that would be needed for the doors in the gates and for the clamps, and he gave more bronze than could be weighed. '
  '4':
  - type: text
    content: He also provided innumerable cedar logs, for the men of Tyre and Sidon had brought vast amounts of cedar to David.
  '5':
  - type: text
    content: 'David said, “My son Solomon is still young and inexperienced. And since the Temple to be built for the '
  - type: text
    content: Lord
  - type: text
    content: ' must be a magnificent structure, famous and glorious throughout the world, I will begin making preparations for it now.” So David collected vast amounts of building materials before his death.'
  '6':
  - type: text
    content: 'Then David sent for his son Solomon and instructed him to build a Temple for the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '7':
  - type: text
    content: '“My son, I wanted to build a Temple to honor the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' my God,” David told him. '
  '8':
  - type: text
    content: '“But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, ‘You have killed many men in the battles you have fought. And since you have shed so much blood in my sight, you will not be the one to build a Temple to honor my name. '
  '9':
  - type: text
    content: But you will have a son who will be a man of peace. I will give him peace with his enemies in all the surrounding lands. His name will be Solomon,
  - type: note
    content: Solomon sounds like and is probably derived from the Hebrew word for “peace.”
  - type: text
    content: ' and I will give peace and quiet to Israel during his reign. '
