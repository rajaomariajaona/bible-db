document_id: PSA.78,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78:TITLE '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maskil. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may be a literary or musical term.
      marker-yv: yv-n
    - type: text
      text: ' of Asaph.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O my people, listen to my instructions.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Open your ears to what I am saying,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They did not keep God’s covenant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and refused to live by his instructions.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They forgot what he had done—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the great wonders he had shown them,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: the miracles he did for their ancestors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the plain of Zoan in the land of Egypt.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: For he divided the sea and led them through,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: making the water stand up like walls!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: In the daytime he led them by a cloud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all night by a pillar of fire.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: He split open the rocks in the wilderness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to give them water, as from a gushing spring.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: He made streams pour from the rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: making the waters flow down like a river!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Yet they kept on sinning against him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rebelling against the Most High in the desert.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: They stubbornly tested God in their hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: demanding the foods they craved.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: They even spoke against God himself, saying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “God can’t give us food in the wilderness.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: for I will speak to you in a parable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will teach you hidden lessons from our past—
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Yes, he can strike a rock so water gushes out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he can’t give his people bread and meat.”
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' heard them, he was furious.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The fire of his wrath burned against Jacob.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, his anger rose against Israel,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: for they did not believe God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or trust him to care for them.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: But he commanded the skies to open;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he opened the doors of heaven.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: He rained down manna for them to eat;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he gave them bread from heaven.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: They ate the food of angels!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God gave them all they could hold.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: He released the east wind in the heavens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and guided the south wind by his mighty power.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: He rained down meat as thick as dust—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: birds as plentiful as the sand on the seashore!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: He caused the birds to fall within their camp
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all around their tents.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The people ate their fill.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He gave them what they craved.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: stories we have heard and known,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stories our ancestors handed down to us.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: But before they satisfied their craving,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while the meat was yet in their mouths,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: the anger of God rose against them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he killed their strongest men.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He struck down the finest of Israel’s young men.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: But in spite of this, the people kept sinning.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Despite his wonders, they refused to trust him.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: So he ended their lives in failure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their years in terror.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: When God began killing them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they finally sought him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They repented and took God seriously.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Then they remembered that God was their rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that God Most High
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: El-Elyon.
      marker-yv: yv-n
    - type: text
      text: ' was their redeemer.'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: But all they gave him was lip service;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they lied to him with their tongues.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Their hearts were not loyal to him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They did not keep his covenant.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Yet he was merciful and forgave their sins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and did not destroy them all.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many times he held back his anger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and did not unleash his fury!
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: For he remembered that they were merely mortal,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gone like a breath of wind that never returns.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: We will not hide these truths from our children;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we will tell the next generation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'about the glorious deeds of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: about his power and his mighty wonders.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Oh, how often they rebelled against him in the wilderness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and grieved his heart in that dry wasteland.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Again and again they tested God’s patience
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and provoked the Holy One of Israel.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: They did not remember his power
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and how he rescued them from their enemies.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: They did not remember his miraculous signs in Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his wonders on the plain of Zoan.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: For he turned their rivers into blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so no one could drink from the streams.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: He sent vast swarms of flies to consume them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hordes of frogs to ruin them.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: He gave their crops to caterpillars;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their harvest was consumed by locusts.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: He destroyed their grapevines with hail
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shattered their sycamore-figs with sleet.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: He abandoned their cattle to the hail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their livestock to bolts of lightning.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: He loosed on them his fierce anger—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all his fury, rage, and hostility.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He dispatched against them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a band of destroying angels.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: For he issued his laws to Jacob;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he gave his instructions to Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He commanded our ancestors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to teach them to their children,
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: He turned his anger against them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he did not spare the Egyptians’ lives
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but ravaged them with the plague.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: He killed the oldest son in each Egyptian family,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the flower of youth throughout the land of Egypt.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78:51 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in the tents of Ham.
      marker-yv: yv-n
  '52':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: But he led his own people like a flock of sheep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: guiding them safely through the wilderness.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: He kept them safe so they were not afraid;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the sea covered their enemies.
  '54':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: He brought them to the border of his holy land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to this land of hills he had won for them.
  '55':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: He drove out the nations before them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he gave them their inheritance by lot.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He settled the tribes of Israel into their homes.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: But they kept testing and rebelling against God Most High.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They did not obey his laws.
  '57':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: They turned back and were as faithless as their parents.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They were as undependable as a crooked bow.
  '58':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: They angered God by building shrines to other gods;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they made him jealous with their idols.
  '59':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: When God heard them, he was very angry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he completely rejected Israel.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: so the next generation might know them—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even the children not yet born—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they in turn will teach their own children.
  '60':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: Then he abandoned his dwelling at Shiloh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Tabernacle where he had lived among the people.
  '61':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: He allowed the Ark of his might to be captured;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he surrendered his glory into enemy hands.
  '62':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: He gave his people over to be butchered by the sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because he was so angry with his own people—his special possession.
  '63':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: Their young men were killed by fire;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their young women died before singing their wedding songs.
  '64':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: Their priests were slaughtered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their widows could not mourn their deaths.
  '65':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: Then the Lord rose up as though waking from sleep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a warrior aroused from a drunken stupor.
  '66':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: He routed his enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sent them to eternal shame.
  '67':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: But he rejected Joseph’s descendants;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he did not choose the tribe of Ephraim.
  '68':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: He chose instead the tribe of Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Mount Zion, which he loved.
  '69':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: There he built his sanctuary as high as the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as solid and enduring as the earth.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: So each generation should set its hope anew on God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not forgetting his glorious miracles
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and obeying his commands.
  '70':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: He chose his servant David,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: calling him from the sheep pens.
  '71':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '71'
    - type: text
      text: He took David from tending the ewes and lambs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made him the shepherd of Jacob’s descendants—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God’s own people, Israel.
  '72':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '72'
    - type: text
      text: He cared for them with a true heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and led them with skillful hands.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Then they will not be like their ancestors—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stubborn, rebellious, and unfaithful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: refusing to give their hearts to God.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The warriors of Ephraim, though armed with bows,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turned their backs and fled on the day of battle.
