document_id: PSA.78,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm
  - type: note
    content: Hebrew maskil. This may be a literary or musical term.
  - type: text
    content: ' of Asaph.'
  - type: text
    content: O my people, listen to my instructions.
  - type: text
    content: Open your ears to what I am saying,
  '10':
  - type: text
    content: They did not keep God’s covenant
  - type: text
    content: and refused to live by his instructions.
  '11':
  - type: text
    content: They forgot what he had done—
  - type: text
    content: the great wonders he had shown them,
  '12':
  - type: text
    content: the miracles he did for their ancestors
  - type: text
    content: on the plain of Zoan in the land of Egypt.
  '13':
  - type: text
    content: For he divided the sea and led them through,
  - type: text
    content: making the water stand up like walls!
  '14':
  - type: text
    content: In the daytime he led them by a cloud,
  - type: text
    content: and all night by a pillar of fire.
  '15':
  - type: text
    content: He split open the rocks in the wilderness
  - type: text
    content: to give them water, as from a gushing spring.
  '16':
  - type: text
    content: He made streams pour from the rock,
  - type: text
    content: making the waters flow down like a river!
  '17':
  - type: text
    content: Yet they kept on sinning against him,
  - type: text
    content: rebelling against the Most High in the desert.
  '18':
  - type: text
    content: They stubbornly tested God in their hearts,
  - type: text
    content: demanding the foods they craved.
  '19':
  - type: text
    content: They even spoke against God himself, saying,
  - type: text
    content: “God can’t give us food in the wilderness.
  '2':
  - type: text
    content: for I will speak to you in a parable.
  - type: text
    content: I will teach you hidden lessons from our past—
  '20':
  - type: text
    content: Yes, he can strike a rock so water gushes out,
  - type: text
    content: but he can’t give his people bread and meat.”
  '21':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' heard them, he was furious.'
  - type: text
    content: The fire of his wrath burned against Jacob.
  - type: text
    content: Yes, his anger rose against Israel,
  '22':
  - type: text
    content: for they did not believe God
  - type: text
    content: or trust him to care for them.
  '23':
  - type: text
    content: But he commanded the skies to open;
  - type: text
    content: he opened the doors of heaven.
  '24':
  - type: text
    content: He rained down manna for them to eat;
  - type: text
    content: he gave them bread from heaven.
  '25':
  - type: text
    content: They ate the food of angels!
  - type: text
    content: God gave them all they could hold.
  '26':
  - type: text
    content: He released the east wind in the heavens
  - type: text
    content: and guided the south wind by his mighty power.
  '27':
  - type: text
    content: He rained down meat as thick as dust—
  - type: text
    content: birds as plentiful as the sand on the seashore!
  '28':
  - type: text
    content: He caused the birds to fall within their camp
  - type: text
    content: and all around their tents.
  '29':
  - type: text
    content: The people ate their fill.
  - type: text
    content: He gave them what they craved.
  '3':
  - type: text
    content: stories we have heard and known,
  - type: text
    content: stories our ancestors handed down to us.
  '30':
  - type: text
    content: But before they satisfied their craving,
  - type: text
    content: while the meat was yet in their mouths,
  '31':
  - type: text
    content: the anger of God rose against them,
  - type: text
    content: and he killed their strongest men.
  - type: text
    content: He struck down the finest of Israel’s young men.
  '32':
  - type: text
    content: But in spite of this, the people kept sinning.
  - type: text
    content: Despite his wonders, they refused to trust him.
  '33':
  - type: text
    content: So he ended their lives in failure,
  - type: text
    content: their years in terror.
  '34':
  - type: text
    content: When God began killing them,
  - type: text
    content: they finally sought him.
  - type: text
    content: They repented and took God seriously.
  '35':
  - type: text
    content: Then they remembered that God was their rock,
  - type: text
    content: that God Most High
  - type: note
    content: Hebrew El-Elyon.
  - type: text
    content: ' was their redeemer.'
  '36':
  - type: text
    content: But all they gave him was lip service;
  - type: text
    content: they lied to him with their tongues.
  '37':
  - type: text
    content: Their hearts were not loyal to him.
  - type: text
    content: They did not keep his covenant.
  '38':
  - type: text
    content: Yet he was merciful and forgave their sins
  - type: text
    content: and did not destroy them all.
  - type: text
    content: Many times he held back his anger
  - type: text
    content: and did not unleash his fury!
  '39':
  - type: text
    content: For he remembered that they were merely mortal,
  - type: text
    content: gone like a breath of wind that never returns.
  '4':
  - type: text
    content: We will not hide these truths from our children;
  - type: text
    content: we will tell the next generation
  - type: text
    content: 'about the glorious deeds of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: about his power and his mighty wonders.
  '40':
  - type: text
    content: Oh, how often they rebelled against him in the wilderness
  - type: text
    content: and grieved his heart in that dry wasteland.
  '41':
  - type: text
    content: Again and again they tested God’s patience
  - type: text
    content: and provoked the Holy One of Israel.
  '42':
  - type: text
    content: They did not remember his power
  - type: text
    content: and how he rescued them from their enemies.
  '43':
  - type: text
    content: They did not remember his miraculous signs in Egypt,
  - type: text
    content: his wonders on the plain of Zoan.
  '44':
  - type: text
    content: For he turned their rivers into blood,
  - type: text
    content: so no one could drink from the streams.
  '45':
  - type: text
    content: He sent vast swarms of flies to consume them
  - type: text
    content: and hordes of frogs to ruin them.
  '46':
  - type: text
    content: He gave their crops to caterpillars;
  - type: text
    content: their harvest was consumed by locusts.
  '47':
  - type: text
    content: He destroyed their grapevines with hail
  - type: text
    content: and shattered their sycamore-figs with sleet.
  '48':
  - type: text
    content: He abandoned their cattle to the hail,
  - type: text
    content: their livestock to bolts of lightning.
  '49':
  - type: text
    content: He loosed on them his fierce anger—
  - type: text
    content: all his fury, rage, and hostility.
  - type: text
    content: He dispatched against them
  - type: text
    content: a band of destroying angels.
  '5':
  - type: text
    content: For he issued his laws to Jacob;
  - type: text
    content: he gave his instructions to Israel.
  - type: text
    content: He commanded our ancestors
  - type: text
    content: to teach them to their children,
  '50':
  - type: text
    content: He turned his anger against them;
  - type: text
    content: he did not spare the Egyptians’ lives
  - type: text
    content: but ravaged them with the plague.
  '51':
  - type: text
    content: He killed the oldest son in each Egyptian family,
  - type: text
    content: the flower of youth throughout the land of Egypt.
  - type: note
    content: Hebrew in the tents of Ham.
  '52':
  - type: text
    content: But he led his own people like a flock of sheep,
  - type: text
    content: guiding them safely through the wilderness.
  '53':
  - type: text
    content: He kept them safe so they were not afraid;
  - type: text
    content: but the sea covered their enemies.
  '54':
  - type: text
    content: He brought them to the border of his holy land,
  - type: text
    content: to this land of hills he had won for them.
  '55':
  - type: text
    content: He drove out the nations before them;
  - type: text
    content: he gave them their inheritance by lot.
  - type: text
    content: He settled the tribes of Israel into their homes.
  '56':
  - type: text
    content: But they kept testing and rebelling against God Most High.
  - type: text
    content: They did not obey his laws.
  '57':
  - type: text
    content: They turned back and were as faithless as their parents.
  - type: text
    content: They were as undependable as a crooked bow.
  '58':
  - type: text
    content: They angered God by building shrines to other gods;
  - type: text
    content: they made him jealous with their idols.
  '59':
  - type: text
    content: When God heard them, he was very angry,
  - type: text
    content: and he completely rejected Israel.
  '6':
  - type: text
    content: so the next generation might know them—
  - type: text
    content: even the children not yet born—
  - type: text
    content: and they in turn will teach their own children.
  '60':
  - type: text
    content: Then he abandoned his dwelling at Shiloh,
  - type: text
    content: the Tabernacle where he had lived among the people.
  '61':
  - type: text
    content: He allowed the Ark of his might to be captured;
  - type: text
    content: he surrendered his glory into enemy hands.
  '62':
  - type: text
    content: He gave his people over to be butchered by the sword,
  - type: text
    content: because he was so angry with his own people—his special possession.
  '63':
  - type: text
    content: Their young men were killed by fire;
  - type: text
    content: their young women died before singing their wedding songs.
  '64':
  - type: text
    content: Their priests were slaughtered,
  - type: text
    content: and their widows could not mourn their deaths.
  '65':
  - type: text
    content: Then the Lord rose up as though waking from sleep,
  - type: text
    content: like a warrior aroused from a drunken stupor.
  '66':
  - type: text
    content: He routed his enemies
  - type: text
    content: and sent them to eternal shame.
  '67':
  - type: text
    content: But he rejected Joseph’s descendants;
  - type: text
    content: he did not choose the tribe of Ephraim.
  '68':
  - type: text
    content: He chose instead the tribe of Judah,
  - type: text
    content: and Mount Zion, which he loved.
  '69':
  - type: text
    content: There he built his sanctuary as high as the heavens,
  - type: text
    content: as solid and enduring as the earth.
  '7':
  - type: text
    content: So each generation should set its hope anew on God,
  - type: text
    content: not forgetting his glorious miracles
  - type: text
    content: and obeying his commands.
  '70':
  - type: text
    content: He chose his servant David,
  - type: text
    content: calling him from the sheep pens.
  '71':
  - type: text
    content: He took David from tending the ewes and lambs
  - type: text
    content: and made him the shepherd of Jacob’s descendants—
  - type: text
    content: God’s own people, Israel.
  '72':
  - type: text
    content: He cared for them with a true heart
  - type: text
    content: and led them with skillful hands.
  '8':
  - type: text
    content: Then they will not be like their ancestors—
  - type: text
    content: stubborn, rebellious, and unfaithful,
  - type: text
    content: refusing to give their hearts to God.
  '9':
  - type: text
    content: The warriors of Ephraim, though armed with bows,
  - type: text
    content: turned their backs and fled on the day of battle.
