document_id: DEU.11,116
type_code: eng
verses:
  '1':
  - type: text
    content: '“You must love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and always obey his requirements, decrees, regulations, and commands. '
  '10':
  - type: text
    content: 'For the land you are about to enter and take over is not like the land of Egypt from which you came, where you planted your seed and made irrigation ditches with your foot as in a vegetable garden. '
  '11':
  - type: text
    content: 'Rather, the land you will soon take over is a land of hills and valleys with plenty of rain— '
  '12':
  - type: text
    content: 'a land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God cares for. He watches over it through each season of the year!'
  '13':
  - type: text
    content: '“If you carefully obey the commands I am giving you today, and if you love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and serve him with all your heart and soul, '
  '14':
  - type: text
    content: 'then he will send the rains in their proper seasons—the early and late rains—so you can bring in your harvests of grain, new wine, and olive oil. '
  '15':
  - type: text
    content: He will give you lush pastureland for your livestock, and you yourselves will have all you want to eat.
  '16':
  - type: text
    content: '“But be careful. Don’t let your heart be deceived so that you turn away from the '
  - type: text
    content: Lord
  - type: text
    content: ' and serve and worship other gods. '
  '17':
  - type: text
    content: 'If you do, the '
  - type: text
    content: Lord
  - type: text
    content: '’s anger will burn against you. He will shut up the sky and hold back the rain, and the ground will fail to produce its harvests. Then you will quickly die in that good land the '
  - type: text
    content: Lord
  - type: text
    content: ' is giving you.'
  '18':
  - type: text
    content: '“So commit yourselves wholeheartedly to these words of mine. Tie them to your hands and wear them on your forehead as reminders. '
  '19':
  - type: text
    content: 'Teach them to your children. Talk about them when you are at home and when you are on the road, when you are going to bed and when you are getting up. '
  '2':
  - type: text
    content: 'Keep in mind that I am not talking now to your children, who have never experienced the discipline of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God or seen his greatness and his strong hand and powerful arm. '
  '20':
  - type: text
    content: 'Write them on the doorposts of your house and on your gates, '
  '21':
  - type: text
    content: 'so that as long as the sky remains above the earth, you and your children may flourish in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' swore to give your ancestors.'
  '22':
  - type: text
    content: '“Be careful to obey all these commands I am giving you. Show love to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God by walking in his ways and holding tightly to him. '
  '23':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will drive out all the nations ahead of you, though they are much greater and stronger than you, and you will take over their land. '
  '24':
  - type: text
    content: Wherever you set foot, that land will be yours. Your frontiers will stretch from the wilderness in the south to Lebanon in the north, and from the Euphrates River in the east to the Mediterranean Sea in the west.
  - type: note
    content: Hebrew to the western sea.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'No one will be able to stand against you, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will cause the people to fear and dread you, as he promised, wherever you go in the whole land.'
  '26':
  - type: text
    content: '“Look, today I am giving you the choice between a blessing and a curse! '
  '27':
  - type: text
    content: 'You will be blessed if you obey the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God that I am giving you today. '
  '28':
  - type: text
    content: 'But you will be cursed if you reject the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and turn away from him and worship gods you have not known before.'
  '29':
  - type: text
    content: '“When the '
  - type: text
    content: Lord
  - type: text
    content: ' your God brings you into the land and helps you take possession of it, you must pronounce the blessing at Mount Gerizim and the curse at Mount Ebal. '
  '3':
  - type: text
    content: 'They didn’t see the miraculous signs and wonders he performed in Egypt against Pharaoh and all his land. '
  '30':
  - type: text
    content: (These two mountains are west of the Jordan River in the land of the Canaanites who live in the Jordan Valley,
  - type: note
    content: Hebrew the Arabah.
  - type: text
    content: ' near the town of Gilgal, not far from the oaks of Moreh.) '
  '31':
  - type: text
    content: 'For you are about to cross the Jordan River to take over the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you. When you take that land and are living in it, '
  '32':
  - type: text
    content: you must be careful to obey all the decrees and regulations I am giving you today.
  '4':
  - type: text
    content: 'They didn’t see what the '
  - type: text
    content: Lord
  - type: text
    content: ' did to the armies of Egypt and to their horses and chariots—how he drowned them in the Red Sea'
  - type: note
    content: Hebrew sea of reeds.
  - type: text
    content: ' as they were chasing you. He destroyed them, and they have not recovered to this very day!'
  '5':
  - type: text
    content: '“Your children didn’t see how the '
  - type: text
    content: Lord
  - type: text
    content: ' cared for you in the wilderness until you arrived here. '
  '6':
  - type: text
    content: 'They didn’t see what he did to Dathan and Abiram (the sons of Eliab, a descendant of Reuben) when the earth opened its mouth in the Israelite camp and swallowed them, along with their households and tents and every living thing that belonged to them. '
  '7':
  - type: text
    content: 'But you have seen the '
  - type: text
    content: Lord
  - type: text
    content: ' perform all these mighty deeds with your own eyes!'
  - type: heading
    content: The Blessings of Obedience
  '8':
  - type: text
    content: '“Therefore, be careful to obey every command I am giving you today, so you may have strength to go in and take over the land you are about to enter. '
  '9':
  - type: text
    content: 'If you obey, you will enjoy a long life in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' swore to give to your ancestors and to you, their descendants—a land flowing with milk and honey! '
