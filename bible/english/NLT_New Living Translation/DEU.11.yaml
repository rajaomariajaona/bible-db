document_id: DEU.11,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You must love the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and always obey his requirements, decrees, regulations, and commands. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For the land you are about to enter and take over is not like the land of Egypt from which you came, where you planted your seed and made irrigation ditches with your foot as in a vegetable garden. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Rather, the land you will soon take over is a land of hills and valleys with plenty of rain— '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'a land that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God cares for. He watches over it through each season of the year!'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If you carefully obey the commands I am giving you today, and if you love the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and serve him with all your heart and soul, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then he will send the rains in their proper seasons—the early and late rains—so you can bring in your harvests of grain, new wine, and olive oil. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He will give you lush pastureland for your livestock, and you yourselves will have all you want to eat.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But be careful. Don’t let your heart be deceived so that you turn away from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and serve and worship other gods. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you do, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anger will burn against you. He will shut up the sky and hold back the rain, and the ground will fail to produce its harvests. Then you will quickly die in that good land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is giving you.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“So commit yourselves wholeheartedly to these words of mine. Tie them to your hands and wear them on your forehead as reminders. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teach them to your children. Talk about them when you are at home and when you are on the road, when you are going to bed and when you are getting up. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Keep in mind that I am not talking now to your children, who have never experienced the discipline of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God or seen his greatness and his strong hand and powerful arm. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Write them on the doorposts of your house and on your gates, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that as long as the sky remains above the earth, you and your children may flourish in the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' swore to give your ancestors.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Be careful to obey all these commands I am giving you. Show love to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God by walking in his ways and holding tightly to him. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will drive out all the nations ahead of you, though they are much greater and stronger than you, and you will take over their land. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Wherever you set foot, that land will be yours. Your frontiers will stretch from the wilderness in the south to Lebanon in the north, and from the Euphrates River in the east to the Mediterranean Sea in the west.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to the western sea.
      marker-yv: yv-n
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No one will be able to stand against you, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will cause the people to fear and dread you, as he promised, wherever you go in the whole land.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Look, today I am giving you the choice between a blessing and a curse! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will be blessed if you obey the commands of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God that I am giving you today. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you will be cursed if you reject the commands of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and turn away from him and worship gods you have not known before.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God brings you into the land and helps you take possession of it, you must pronounce the blessing at Mount Gerizim and the curse at Mount Ebal. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They didn’t see the miraculous signs and wonders he performed in Egypt against Pharaoh and all his land. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (These two mountains are west of the Jordan River in the land of the Canaanites who live in the Jordan Valley,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Arabah.
      marker-yv: yv-n
    - type: text
      text: ' near the town of Gilgal, not far from the oaks of Moreh.) '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you are about to cross the Jordan River to take over the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you. When you take that land and are living in it, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: you must be careful to obey all the decrees and regulations I am giving you today.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They didn’t see what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did to the armies of Egypt and to their horses and chariots—how he drowned them in the Red Sea'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sea of reeds.
      marker-yv: yv-n
    - type: text
      text: ' as they were chasing you. He destroyed them, and they have not recovered to this very day!'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Your children didn’t see how the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' cared for you in the wilderness until you arrived here. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They didn’t see what he did to Dathan and Abiram (the sons of Eliab, a descendant of Reuben) when the earth opened its mouth in the Israelite camp and swallowed them, along with their households and tents and every living thing that belonged to them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you have seen the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' perform all these mighty deeds with your own eyes!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Blessings of Obedience
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Therefore, be careful to obey every command I am giving you today, so you may have strength to go in and take over the land you are about to enter. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'If you obey, you will enjoy a long life in the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' swore to give to your ancestors and to you, their descendants—a land flowing with milk and honey! '
