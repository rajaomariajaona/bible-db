document_id: HEB.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So let us stop going over the basic teachings about Christ again and again. Let us go on instead and become mature in our understanding. Surely we don’t need to start again with the fundamental importance of repenting from evil deeds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from dead works.
      marker-yv: yv-n
    - type: text
      text: ' and placing our faith in God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For God is not unjust. He will not forget how hard you have worked for him and how you have shown your love to him by caring for other believers,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for God’s holy people.
      marker-yv: yv-n
    - type: text
      text: ' as you still do. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Our great desire is that you will keep on loving others as long as life lasts, in order to make certain that what you hope for will come true. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then you will not become spiritually dull and indifferent. Instead, you will follow the example of those who are going to inherit God’s promises because of their faith and endurance.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Promises Bring Hope
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For example, there was God’s promise to Abraham. Since there was no one greater to swear by, God took an oath in his own name, saying:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will certainly bless you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will multiply your descendants beyond number.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen 22:17.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then Abraham waited patiently, and he received what God had promised.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when people take an oath, they call on someone greater than themselves to hold them to it. And without any question that oath is binding. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God also bound himself with an oath, so that those who received the promise could be perfectly sure that he would never change his mind. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So God has given both his promise and his oath. These two things are unchangeable because it is impossible for God to lie. Therefore, we who have fled to him for refuge can have great confidence as we hold to the hope that lies before us. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This hope is a strong and trustworthy anchor for our souls. It leads us through the curtain into God’s inner sanctuary. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You don’t need further instruction about baptisms, the laying on of hands, the resurrection of the dead, and eternal judgment. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus has already gone in there for us. He has become our eternal High Priest in the order of Melchizedek.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And so, God willing, we will move forward to further understanding.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it is impossible to bring back to repentance those who were once enlightened—those who have experienced the good things of heaven and shared in the Holy Spirit, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who have tasted the goodness of the word of God and the power of the age to come— '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and who then turn away from God. It is impossible to bring such people back to repentance; by rejecting the Son of God, they themselves are nailing him to the cross once again and holding him up to public shame.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the ground soaks up the falling rain and bears a good crop for the farmer, it has God’s blessing. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if a field bears thorns and thistles, it is useless. The farmer will soon condemn that field and burn it.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dear friends, even though we are talking this way, we really don’t believe it applies to you. We are confident that you are meant for better things, things that come with salvation. '
