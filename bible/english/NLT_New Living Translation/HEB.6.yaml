document_id: HEB.6,116
type_code: eng
verses:
  '1':
  - type: text
    content: So let us stop going over the basic teachings about Christ again and again. Let us go on instead and become mature in our understanding. Surely we don’t need to start again with the fundamental importance of repenting from evil deeds
  - type: note
    content: Greek from dead works.
  - type: text
    content: ' and placing our faith in God. '
  '10':
  - type: text
    content: For God is not unjust. He will not forget how hard you have worked for him and how you have shown your love to him by caring for other believers,
  - type: note
    content: Greek for God’s holy people.
  - type: text
    content: ' as you still do. '
  '11':
  - type: text
    content: 'Our great desire is that you will keep on loving others as long as life lasts, in order to make certain that what you hope for will come true. '
  '12':
  - type: text
    content: Then you will not become spiritually dull and indifferent. Instead, you will follow the example of those who are going to inherit God’s promises because of their faith and endurance.
  - type: heading
    content: God’s Promises Bring Hope
  '13':
  - type: text
    content: 'For example, there was God’s promise to Abraham. Since there was no one greater to swear by, God took an oath in his own name, saying:'
  '14':
  - type: text
    content: “I will certainly bless you,
  - type: text
    content: and I will multiply your descendants beyond number.”
  - type: note
    content: Gen 22:17.
  '15':
  - type: text
    content: Then Abraham waited patiently, and he received what God had promised.
  '16':
  - type: text
    content: 'Now when people take an oath, they call on someone greater than themselves to hold them to it. And without any question that oath is binding. '
  '17':
  - type: text
    content: 'God also bound himself with an oath, so that those who received the promise could be perfectly sure that he would never change his mind. '
  '18':
  - type: text
    content: 'So God has given both his promise and his oath. These two things are unchangeable because it is impossible for God to lie. Therefore, we who have fled to him for refuge can have great confidence as we hold to the hope that lies before us. '
  '19':
  - type: text
    content: 'This hope is a strong and trustworthy anchor for our souls. It leads us through the curtain into God’s inner sanctuary. '
  '2':
  - type: text
    content: 'You don’t need further instruction about baptisms, the laying on of hands, the resurrection of the dead, and eternal judgment. '
  '20':
  - type: text
    content: Jesus has already gone in there for us. He has become our eternal High Priest in the order of Melchizedek.
  '3':
  - type: text
    content: And so, God willing, we will move forward to further understanding.
  '4':
  - type: text
    content: 'For it is impossible to bring back to repentance those who were once enlightened—those who have experienced the good things of heaven and shared in the Holy Spirit, '
  '5':
  - type: text
    content: 'who have tasted the goodness of the word of God and the power of the age to come— '
  '6':
  - type: text
    content: and who then turn away from God. It is impossible to bring such people back to repentance; by rejecting the Son of God, they themselves are nailing him to the cross once again and holding him up to public shame.
  '7':
  - type: text
    content: 'When the ground soaks up the falling rain and bears a good crop for the farmer, it has God’s blessing. '
  '8':
  - type: text
    content: But if a field bears thorns and thistles, it is useless. The farmer will soon condemn that field and burn it.
  '9':
  - type: text
    content: 'Dear friends, even though we are talking this way, we really don’t believe it applies to you. We are confident that you are meant for better things, things that come with salvation. '
