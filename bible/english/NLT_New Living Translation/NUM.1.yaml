    - type: text
      text: 26-27
  - type: text
    text: Judah74,600
  '28':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29
  - type: text
    text: Issachar54,400
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'twenty years old or older who are able to go to war. You and Aaron must register the troops, '
  '30':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: Zebulun57,400
  '32':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-33
  - type: text
    text: Ephraim son of Joseph40,500
  '34':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-35
  - type: text
    text: Manasseh son of Joseph32,200
  '36':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-37
  - type: text
    text: Benjamin35,400
  '38':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 38-39
  - type: text
    text: Dan62,700
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: and you will be assisted by one family leader from each tribe.
  '40':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 40-41
  - type: text
    text: Asher41,500
  '42':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 42-43
  - type: text
    text: Naphtali53,400
  '44':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'These were the men registered by Moses and Aaron and the twelve leaders of Israel, all listed according to their ancestral descent. '
  '45':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'They were registered by families—all the men of Israel who were twenty years old or older and able to go to war. '
  '46':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: The total number was 603,550.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'But this total did not include the Levites. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said to Moses, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: '“Do not include the tribe of Levi in the registration; do not count them with the rest of the Israelites. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“These are the tribes and the names of the leaders who will assist you:'
  - type: text
    text: TribeLeaderReubenElizur son of Shedeur
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Put the Levites in charge of the Tabernacle of the Covenant,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tabernacle of the Testimony; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 1:53.
      marker-yv: yv-n
    - type: text
      text: ' along with all its furnishings and equipment. They must carry the Tabernacle and all its furnishings as you travel, and they must take care of it and camp around it. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Whenever it is time for the Tabernacle to move, the Levites will take it down. And when it is time to stop, they will set it up again. But any unauthorized person who goes too near the Tabernacle must be put to death. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Each tribe of Israel will camp in a designated area with its own family banner. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'But the Levites will camp around the Tabernacle of the Covenant to protect the community of Israel from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger. The Levites are responsible to stand guard around the Tabernacle.”
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'So the Israelites did everything just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses.'
  '6':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: SimeonShelumiel son of Zurishaddai
  '7':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: JudahNahshon son of Amminadab
  '8':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: IssacharNethanel son of Zuar
  '9':
  - type: usfm
    marker: vlbl
    children:
    - type: text
