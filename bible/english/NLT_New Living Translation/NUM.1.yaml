  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: Simeon59,300
  '24':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: Gad45,650
  '26':
  - type: usfm
    marker: vlbl
