  '44':
  - type: text
    content: 'These were the men registered by Moses and Aaron and the twelve leaders of Israel, all listed according to their ancestral descent. '
  '45':
  - type: text
    content: 'They were registered by families—all the men of Israel who were twenty years old or older and able to go to war. '
  '46':
  - type: text
    content: The total number was 603,550.
  '47':
  - type: text
    content: 'But this total did not include the Levites. '
  '48':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' had said to Moses, '
  '49':
  - type: text
    content: '“Do not include the tribe of Levi in the registration; do not count them with the rest of the Israelites. '
  '5':
  - type: text
    content: '“These are the tribes and the names of the leaders who will assist you:'
  - type: text
    content: Tribe
  - type: text
    content: Leader
  - type: text
    content: Reuben
  - type: text
    content: Elizur son of Shedeur
  '50':
  - type: text
    content: Put the Levites in charge of the Tabernacle of the Covenant,
  - type: note
    content: Or Tabernacle of the Testimony; also in 1:53.
  - type: text
    content: ' along with all its furnishings and equipment. They must carry the Tabernacle and all its furnishings as you travel, and they must take care of it and camp around it. '
  '51':
  - type: text
    content: 'Whenever it is time for the Tabernacle to move, the Levites will take it down. And when it is time to stop, they will set it up again. But any unauthorized person who goes too near the Tabernacle must be put to death. '
  '52':
  - type: text
    content: 'Each tribe of Israel will camp in a designated area with its own family banner. '
  '53':
  - type: text
    content: 'But the Levites will camp around the Tabernacle of the Covenant to protect the community of Israel from the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger. The Levites are responsible to stand guard around the Tabernacle.”
  '54':
  - type: text
    content: 'So the Israelites did everything just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
