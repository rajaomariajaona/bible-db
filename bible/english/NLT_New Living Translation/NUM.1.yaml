    content: Registration of Israel’s Troops
  - type: text
    content: 'A year after Israel’s departure from Egypt, the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses in the Tabernacle'
  - type: note
    content: Hebrew the Tent of Meeting.
  - type: text
    content: ' in the wilderness of Sinai. On the first day of the second month'
  - type: note
    content: This day in the ancient Hebrew lunar calendar occurred in April or May.
  - type: text
    content: ' of that year he said, '
