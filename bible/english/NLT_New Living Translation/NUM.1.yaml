verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Registration of Israel’s Troops
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A year after Israel’s departure from Egypt, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses in the Tabernacle'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Tent of Meeting.
      marker-yv: yv-n
    - type: text
      text: ' in the wilderness of Sinai. On the first day of the second month'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This day in the ancient Hebrew lunar calendar occurred in April or May.
      marker-yv: yv-n
    - type: text
      text: ' of that year he said, '
  '10':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ephraim son of JosephElishama son of AmmihudManasseh son of JosephGamaliel son of Pedahzur
  '11':
  - type: usfm
