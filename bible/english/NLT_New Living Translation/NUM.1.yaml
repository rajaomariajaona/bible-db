  '16':
  - type: text
    content: These are the chosen leaders of the community, the leaders of their ancestral tribes, the heads of the clans of Israel.”
  '17':
  - type: text
    content: 'So Moses and Aaron called together these chosen leaders, '
  '18':
  - type: text
    content: and they assembled the whole community of Israel on that very day.
  - type: note
    content: Hebrew on the first day of the second month; see 1:1.
  - type: text
    content: ' All the people were registered according to their ancestry by their clans and families. The men of Israel who were twenty years old or older were listed one by one, '
  '19':
  - type: text
    content: 'just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. So Moses recorded their names in the wilderness of Sinai.'
  '2':
  - type: text
    content: '“From the whole community of Israel, record the names of all the warriors by their clans and families. List all the men '
  '20':
  - type: text
    content: This is the number of men twenty years old or older who were able to go to war, as their names were listed in the records of their clans and families
  - type: note
