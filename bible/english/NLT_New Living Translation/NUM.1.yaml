  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: These are the chosen leaders of the community, the leaders of their ancestral tribes, the heads of the clans of Israel.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So Moses and Aaron called together these chosen leaders, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: and they assembled the whole community of Israel on that very day.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on the first day of the second month; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see 1:1.
      marker-yv: yv-n
    - type: text
      text: ' All the people were registered according to their ancestry by their clans and families. The men of Israel who were twenty years old or older were listed one by one, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses. So Moses recorded their names in the wilderness of Sinai.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“From the whole community of Israel, record the names of all the warriors by their clans and families. List all the men '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: This is the number of men twenty years old or older who were able to go to war, as their names were listed in the records of their clans and families
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:20-21a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the Hebrew text, this sentence (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: This is the number of men twenty years old or older who were able to go to war, as their names were listed in the records of their clans and families
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) is repeated in 1:22, 24, 26, 28, 30, 32, 34, 36, 38, 40, 42.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: text
    text: TribeNumberReuben (Jacob’s
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:20-21b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Israel’s. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
    marker-yv: yv-n
  - type: text
    text: ' oldest son)46,500'
