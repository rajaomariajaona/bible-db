document_id: 2KI.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Woman from Shunem Returns Home
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Elisha had told the woman whose son he had brought back to life, “Take your family and move to some other place, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has called for a famine on Israel that will last for seven years.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So the woman did as the man of God instructed. She took her family and settled in the land of the Philistines for seven years.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'After the famine ended she returned from the land of the Philistines, and she went to see the king about getting back her house and land. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'As she came in, the king was talking with Gehazi, the servant of the man of God. The king had just said, “Tell me some stories about the great things Elisha has done.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And Gehazi was telling the king about the time Elisha had brought a boy back to life. At that very moment, the mother of the boy walked in to make her appeal to the king about her house and land.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Look, my lord the king!” Gehazi exclaimed. “Here is the woman now, and this is her son—the very one Elisha brought back to life!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Is this true?” the king asked her. And she told him the story. So he directed one of his officials to see that everything she had lost was restored to her, including the value of any crops that had been harvested during her absence.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hazael Murders Ben-Hadad
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Elisha went to Damascus, the capital of Aram, where King Ben-hadad lay sick. When someone told the king that the man of God had come, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'the king said to Hazael, “Take a gift to the man of God. Then tell him to ask the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', ‘Will I recover from this illness?’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So Hazael loaded down forty camels with the finest products of Damascus as a gift for Elisha. He went to him and said, “Your servant Ben-hadad, the king of Aram, has sent me to ask, ‘Will I recover from this illness?’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Elisha replied, “Go and tell him, ‘You will surely recover.’ But actually the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has shown me that he will surely die!” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Elisha stared at Hazael
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:11a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: He stared at him.
    marker-yv: yv-n
  - type: text
    text: ' with a fixed gaze until Hazael became uneasy.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:11b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' Then the man of God started weeping.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “What’s the matter, my lord?” Hazael asked him.
- type: usfm
  marker: p
  children:
  - type: text
    text: Elisha replied, “I know the terrible things you will do to the people of Israel. You will burn their fortified cities, kill their young men with the sword, dash their little children to the ground, and rip open their pregnant women!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hazael responded, “How could a nobody like me
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a dog.
    marker-yv: yv-n
  - type: text
    text: ' ever accomplish such great things?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elisha answered, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has shown me that you are going to be the king of Aram.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When Hazael left Elisha and went back, the king asked him, “What did Elisha tell you?”
- type: usfm
  marker: p
  children:
  - type: text
    text: And Hazael replied, “He told me that you will surely recover.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But the next day Hazael took a blanket, soaked it in water, and held it over the king’s face until he died. Then Hazael became the next king of Aram.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoram Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jehoram son of King Jehoshaphat of Judah began to rule over Judah in the fifth year of the reign of Joram son of Ahab, king of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jehoram was thirty-two years old when he became king, and he reigned in Jerusalem eight years. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But Jehoram followed the example of the kings of Israel and was as wicked as King Ahab, for he had married one of Ahab’s daughters. So Jehoram did what was evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s sight. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' did not want to destroy Judah, for he had promised his servant David that his descendants would continue to rule, shining like a lamp forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'During Jehoram’s reign, the Edomites revolted against Judah and crowned their own king. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So Jehoram
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:21a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Joram, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoram; also in 8:23, 24.
    marker-yv: yv-n
  - type: text
    text: ' went with all his chariots to attack the town of Zair.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:21b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Seir.
    marker-yv: yv-n
  - type: text
    text: ' The Edomites surrounded him and his chariot commanders, but he went out at night and attacked them'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:21c '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'he went out and escaped. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' under cover of darkness. But Jehoram’s army deserted him and fled to their homes. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: So Edom has been independent from Judah to this day. The town of Libnah also revolted about that same time.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The rest of the events in Jehoram’s reign and everything he did are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Judah.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: When Jehoram died, he was buried with his ancestors in the City of David. Then his son Ahaziah became the next king.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ahaziah Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ahaziah son of Jehoram began to rule over Judah in the twelfth year of the reign of Joram son of Ahab, king of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ahaziah was twenty-two years old when he became king, and he reigned in Jerusalem one year. His mother was Athaliah, a granddaughter of King Omri of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ahaziah followed the evil example of King Ahab’s family. He did what was evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s sight, just as Ahab’s family had done, for he was related by marriage to the family of Ahab.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ahaziah joined Joram son of Ahab in his war against King Hazael of Aram at Ramoth-gilead. When the Arameans wounded King Joram in the battle, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: he returned to Jezreel to recover from the wounds he had received at Ramoth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ramah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Ramoth.
    marker-yv: yv-n
  - type: text
    text: ' Because Joram was wounded, King Ahaziah of Judah went to Jezreel to visit him.'
