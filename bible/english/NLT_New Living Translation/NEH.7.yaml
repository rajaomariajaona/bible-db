  '3':
  - type: text
    content: I said to them, “Do not leave the gates open during the hottest part of the day.
  - type: note
    content: Or Keep the gates of Jerusalem closed until the sun is hot.
  - type: text
    content: ' And even while the gatekeepers are on duty, have them shut and bar the doors. Appoint the residents of Jerusalem to act as guards, everyone on a regular watch. Some will serve at sentry posts and some in front of their own homes.”'
