  - type: text
    text: ' and Immer. However, they could not prove that they or their families were descendants of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: This group included the families of Delaiah, Tobiah, and Nekoda—a total of 642 people.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Three families of priests—Hobaiah, Hakkoz, and Barzillai—also returned. (This Barzillai had married a woman who was a descendant of Barzillai of Gilead, and he had taken her family name.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'They searched for their names in the genealogical records, but they were not found, so they were disqualified from serving as priests. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'The governor told them not to eat the priests’ share of food from the sacrifices until a priest could consult the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' about the matter by using the Urim and Thummim—the sacred lots.'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'So a total of 42,360 people returned to Judah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'in addition to 7,337 servants and 245 singers, both men and women. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: They took with them 736 horses, 245 mules,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:68 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As in some Hebrew manuscripts (see also Ezra 2:66); most Hebrew manuscripts lack this verse. Verses 7:69-73 are numbered 7:68-72 in Hebrew text.
    marker-yv: yv-n
