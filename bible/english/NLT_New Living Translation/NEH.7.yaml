  '5':
  - type: text
    content: 'So my God gave me the idea to call together all the nobles and leaders of the city, along with the ordinary citizens, for registration. I had found the genealogical record of those who had first returned to Judah. This is what was written there:'
  '50':
  - type: text
    content: Reaiah, Rezin, Nekoda,
  '51':
  - type: text
    content: Gazzam, Uzza, Paseah,
  '52':
  - type: text
    content: Besai, Meunim, Nephusim,
  - type: note
    content: As in parallel text at Ezra 2:50; Hebrew reads Nephushesim.
  '53':
  - type: text
    content: Bakbuk, Hakupha, Harhur,
  '54':
  - type: text
    content: Bazluth,
  - type: note
    content: As in parallel text at Ezra 2:52; Hebrew reads Bazlith.
  - type: text
    content: ' Mehida, Harsha,'
  '55':
  - type: text
    content: Barkos, Sisera, Temah,
  '56':
  - type: text
    content: Neziah, and Hatipha.
  '57':
  - type: text
    content: 'The descendants of these servants of King Solomon returned from exile:'
  - type: text
    content: Sotai, Hassophereth, Peruda,
  - type: note
    content: As in parallel text at Ezra 2:55; Hebrew reads Sotai, Sophereth, Perida.
  '58':
  - type: text
    content: Jaalah,
  - type: note
    content: As in parallel text at Ezra 2:56; Hebrew reads Jaala.
  - type: text
    content: ' Darkon, Giddel,'
  '59':
  - type: text
    content: Shephatiah, Hattil, Pokereth-hazzebaim, and Ami.
  - type: note
    content: As in parallel text at Ezra 2:57; Hebrew reads Amon.
  '6':
  - type: text
    content: 'Here is the list of the Jewish exiles of the provinces who returned from their captivity. King Nebuchadnezzar had deported them to Babylon, but now they returned to Jerusalem and the other towns in Judah where they originally lived. '
  '60':
  - type: text
    content: In all, the Temple servants and the descendants of Solomon’s servants numbered 392.
  '61':
  - type: text
    content: Another group returned at this time from the towns of Tel-melah, Tel-harsha, Kerub, Addan,
  - type: note
    content: As in parallel text at Ezra 2:59; Hebrew reads Addon.
  - type: text
    content: ' and Immer. However, they could not prove that they or their families were descendants of Israel. '
  '62':
  - type: text
    content: This group included the families of Delaiah, Tobiah, and Nekoda—a total of 642 people.
  '63':
  - type: text
    content: 'Three families of priests—Hobaiah, Hakkoz, and Barzillai—also returned. (This Barzillai had married a woman who was a descendant of Barzillai of Gilead, and he had taken her family name.) '
  '64':
  - type: text
    content: 'They searched for their names in the genealogical records, but they were not found, so they were disqualified from serving as priests. '
  '65':
  - type: text
    content: 'The governor told them not to eat the priests’ share of food from the sacrifices until a priest could consult the '
  - type: text
    content: Lord
  - type: text
    content: ' about the matter by using the Urim and Thummim—the sacred lots.'
  '66':
  - type: text
    content: 'So a total of 42,360 people returned to Judah, '
  '67':
  - type: text
    content: 'in addition to 7,337 servants and 245 singers, both men and women. '
  '68':
  - type: text
    content: They took with them 736 horses, 245 mules,
  - type: note
    content: As in some Hebrew manuscripts (see also Ezra 2:66); most Hebrew manuscripts lack this verse. Verses 7:69-73 are numbered 7:68-72 in Hebrew text.
  - type: text
    content: ' '
  '69':
  - type: text
    content: 435 camels, and 6,720 donkeys.
  '7':
  - type: text
    content: Their leaders were Zerubbabel, Jeshua, Nehemiah, Seraiah,
  - type: note
    content: As in parallel text at Ezra 2:2; Hebrew reads Azariah.
  - type: text
    content: ' Reelaiah,'
  - type: note
    content: As in parallel text at Ezra 2:2; Hebrew reads Raamiah.
  - type: text
    content: ' Nahamani, Mordecai, Bilshan, Mispar,'
  - type: note
    content: As in parallel text at Ezra 2:2; Hebrew reads Mispereth.
  - type: text
    content: ' Bigvai, Rehum,'
  - type: note
    content: As in parallel text at Ezra 2:2; Hebrew reads Nehum.
  - type: text
    content: ' and Baanah.'
  - type: text
    content: 'This is the number of the men of Israel who returned from exile:'
  '70':
  - type: text
    content: Some of the family leaders gave gifts for the work. The governor gave to the treasury 1,000 gold coins,
  - type: note
    content: Hebrew 1,000 darics of gold, about 19 pounds or 8.6 kilograms in weight.
  - type: text
    content: ' 50 gold basins, and 530 robes for the priests. '
  '71':
  - type: text
    content: The other leaders gave to the treasury a total of 20,000 gold coins
  - type: note
    content: Hebrew 20,000 darics of gold, about 375 pounds or 170 kilograms in weight; also in 7:72.
  - type: text
    content: ' and some 2,750 pounds'
  - type: note
    content: Hebrew 2,200 minas [1,300 kilograms].
  - type: text
    content: ' of silver for the work. '
  '72':
  - type: text
    content: The rest of the people gave 20,000 gold coins, about 2,500 pounds
  - type: note
    content: Hebrew 2,000 minas [1,200 kilograms].
  - type: text
    content: ' of silver, and 67 robes for the priests.'
  '73':
  - type: text
    content: So the priests, the Levites, the gatekeepers, the singers, the Temple servants, and some of the common people settled near Jerusalem. The rest of the people returned to their own towns throughout Israel.
  - type: heading
    content: Ezra Reads the Law
  - type: text
    content: In October
  - type: note
    content: Hebrew In the seventh month. This month of the ancient Hebrew lunar calendar occurred within the months of October and November 445 b.c.
  - type: text
    content: ' when the Israelites had settled in their towns,'
