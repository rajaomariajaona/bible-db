document_id: PSA.3,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David, regarding the time David fled from his son Absalom.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', I have so many enemies;'
  - type: text
    content: so many are against me.
  '2':
  - type: text
    content: So many are saying,
  - type: text
    content: '“God will never rescue him!” '
  - type: text
    content: Interlude
  - type: note
    content: Hebrew Selah. The meaning of this word is uncertain, though it is probably a musical or literary term. It is rendered Interlude throughout the Psalms.
  '3':
  - type: text
    content: 'But you, O '
  - type: text
    content: Lord
  - type: text
    content: ', are a shield around me;'
  - type: text
    content: you are my glory, the one who holds my head high.
  '4':
  - type: text
    content: 'I cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'and he answered me from his holy mountain. '
  - type: text
    content: Interlude
  '5':
  - type: text
    content: I lay down and slept,
  - type: text
    content: yet I woke up in safety,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' was watching over me.'
  '6':
  - type: text
    content: I am not afraid of ten thousand enemies
  - type: text
    content: who surround me on every side.
  '7':
  - type: text
    content: 'Arise, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Rescue me, my God!
  - type: text
    content: Slap all my enemies in the face!
  - type: text
    content: Shatter the teeth of the wicked!
  '8':
  - type: text
    content: 'Victory comes from you, O '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: 'May you bless your people. '
  - type: text
    content: Interlude
