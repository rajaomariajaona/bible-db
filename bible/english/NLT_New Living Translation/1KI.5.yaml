document_id: 1KI.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Preparations for Building the Temple
  - type: text
    content: ' '
  - type: note
    content: Verses 5:1-18 are numbered 5:15-32 in Hebrew text.
  - type: text
    content: King Hiram of Tyre had always been a loyal friend of David. When Hiram learned that David’s son Solomon was the new king of Israel, he sent ambassadors to congratulate him.
  '10':
  - type: text
    content: 'So Hiram supplied as much cedar and cypress timber as Solomon desired. '
  '11':
  - type: text
    content: In return, Solomon sent him an annual payment of 100,000 bushels
  - type: note
    content: Hebrew 20,000 cors [4,400 kiloliters].
  - type: text
    content: ' of wheat for his household and 110,000 gallons'
  - type: note
    content: As in Greek version, which reads 20,000 baths [420 kiloliters] (see also 2 Chr 2:10); Hebrew reads 20 cors, about 1,000 gallons or 4.4 kiloliters in volume.
  - type: text
    content: ' of pure olive oil. '
  '12':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' gave wisdom to Solomon, just as he had promised. And Hiram and Solomon made a formal alliance of peace.'
  '13':
  - type: text
    content: 'Then King Solomon conscripted a labor force of 30,000 men from all Israel. '
  '14':
  - type: text
    content: 'He sent them to Lebanon in shifts, 10,000 every month, so that each man would be one month in Lebanon and two months at home. Adoniram was in charge of this labor force. '
  '15':
  - type: text
    content: 'Solomon also had 70,000 common laborers, 80,000 quarry workers in the hill country, '
  '16':
  - type: text
    content: and 3,600
  - type: note
    content: As in some Greek manuscripts (see also 2 Chr 2:2, 18); Hebrew reads 3,300.
  - type: text
    content: ' foremen to supervise the work. '
  '17':
  - type: text
    content: 'At the king’s command, they quarried large blocks of high-quality stone and shaped them to make the foundation of the Temple. '
  '18':
  - type: text
    content: Men from the city of Gebal helped Solomon’s and Hiram’s builders prepare the timber and stone for the Temple.
  '2':
  - type: text
    content: 'Then Solomon sent this message back to Hiram:'
  '3':
  - type: text
    content: '“You know that my father, David, was not able to build a Temple to honor the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God because of the many wars waged against him by surrounding nations. He could not build until the '
  - type: text
    content: Lord
  - type: text
    content: ' gave him victory over all his enemies. '
  '4':
  - type: text
    content: 'But now the '
  - type: text
    content: Lord
  - type: text
    content: ' my God has given me peace on every side; I have no enemies, and all is well. '
  '5':
  - type: text
    content: 'So I am planning to build a Temple to honor the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' my God, just as he had instructed my father, David. For the '
  - type: text
    content: Lord
  - type: text
    content: ' told him, ‘Your son, whom I will place on your throne, will build the Temple to honor my name.’'
  '6':
  - type: text
    content: “Therefore, please command that cedars from Lebanon be cut for me. Let my men work alongside yours, and I will pay your men whatever wages you ask. As you know, there is no one among us who can cut timber like you Sidonians!”
  '7':
  - type: text
    content: 'When Hiram received Solomon’s message, he was very pleased and said, “Praise the '
  - type: text
    content: Lord
  - type: text
    content: ' today for giving David a wise son to be king of the great nation of Israel.” '
  '8':
  - type: text
    content: 'Then he sent this reply to Solomon:'
  - type: text
    content: '“I have received your message, and I will supply all the cedar and cypress timber you need. '
  '9':
  - type: text
    content: My servants will bring the logs from the Lebanon mountains to the Mediterranean Sea
  - type: note
    content: Hebrew the sea.
  - type: text
    content: ' and make them into rafts and float them along the coast to whatever place you choose. Then we will break the rafts apart so you can carry the logs away. You can pay me by supplying me with food for my household.”'
