document_id: 1KI.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Preparations for Building the Temple
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 5:1-18 are numbered 5:15-32 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: King Hiram of Tyre had always been a loyal friend of David. When Hiram learned that David’s son Solomon was the new king of Israel, he sent ambassadors to congratulate him.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So Hiram supplied as much cedar and cypress timber as Solomon desired. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: In return, Solomon sent him an annual payment of 100,000 bushels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20,000 cors '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[4,400 kiloliters].'
      marker-yv: yv-n
    - type: text
      text: ' of wheat for his household and 110,000 gallons'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version, which reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20,000 baths '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[420 kiloliters] (see also 2 Chr 2:10); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20 cors, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: about 1,000 gallons or 4.4 kiloliters in volume.
      marker-yv: yv-n
    - type: text
      text: ' of pure olive oil. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave wisdom to Solomon, just as he had promised. And Hiram and Solomon made a formal alliance of peace.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then King Solomon conscripted a labor force of 30,000 men from all Israel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'He sent them to Lebanon in shifts, 10,000 every month, so that each man would be one month in Lebanon and two months at home. Adoniram was in charge of this labor force. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Solomon also had 70,000 common laborers, 80,000 quarry workers in the hill country, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: and 3,600
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts (see also 2 Chr 2:2, 18); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 3,300.
      marker-yv: yv-n
    - type: text
      text: ' foremen to supervise the work. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'At the king’s command, they quarried large blocks of high-quality stone and shaped them to make the foundation of the Temple. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Men from the city of Gebal helped Solomon’s and Hiram’s builders prepare the timber and stone for the Temple.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then Solomon sent this message back to Hiram:'
  '3':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“You know that my father, David, was not able to build a Temple to honor the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God because of the many wars waged against him by surrounding nations. He could not build until the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave him victory over all his enemies. '
  '4':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God has given me peace on every side; I have no enemies, and all is well. '
  '5':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So I am planning to build a Temple to honor the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, just as he had instructed my father, David. For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told him, ‘Your son, whom I will place on your throne, will build the Temple to honor my name.’'
  '6':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Therefore, please command that cedars from Lebanon be cut for me. Let my men work alongside yours, and I will pay your men whatever wages you ask. As you know, there is no one among us who can cut timber like you Sidonians!”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'When Hiram received Solomon’s message, he was very pleased and said, “Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' today for giving David a wise son to be king of the great nation of Israel.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then he sent this reply to Solomon:'
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: '“I have received your message, and I will supply all the cedar and cypress timber you need. '
  '9':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: My servants will bring the logs from the Lebanon mountains to the Mediterranean Sea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the sea.
      marker-yv: yv-n
    - type: text
      text: ' and make them into rafts and float them along the coast to whatever place you choose. Then we will break the rafts apart so you can carry the logs away. You can pay me by supplying me with food for my household.”'
