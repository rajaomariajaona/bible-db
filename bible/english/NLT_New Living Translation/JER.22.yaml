document_id: JER.22,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message for Judah’s Kings
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me: “Go over and speak directly to the king of Judah. Say to him, '
  '10':
  - type: text
    content: Do not weep for the dead king or mourn his loss.
  - type: text
    content: Instead, weep for the captive king being led away!
  - type: text
    content: For he will never return to see his native land again.
  '11':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says about Jehoahaz,'
  - type: note
    content: Hebrew Shallum, another name for Jehoahaz.
  - type: text
    content: ' who succeeded his father, King Josiah, and was taken away as a captive: “He will never return. '
  '12':
  - type: text
    content: He will die in a distant land and will never again see his own country.”
  - type: heading
    content: A Message about Jehoiakim
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' says, “What sorrow awaits Jehoiakim,'
  - type: note
    content: The brother and successor of the exiled Jehoahaz. See 22:18.
  - type: text
    content: who builds his palace with forced labor.
  - type: note
    content: Hebrew by unrighteousness.
  - type: text
    content: He builds injustice into its walls,
  - type: text
    content: for he makes his neighbors work for nothing.
  - type: text
    content: He does not pay them for their labor.
  '14':
  - type: text
    content: He says, ‘I will build a magnificent palace
  - type: text
    content: with huge rooms and many windows.
  - type: text
    content: I will panel it throughout with fragrant cedar
  - type: text
    content: and paint it a lovely red.’
  '15':
  - type: text
    content: But a beautiful cedar palace does not make a great king!
  - type: text
    content: Your father, Josiah, also had plenty to eat and drink.
  - type: text
    content: But he was just and right in all his dealings.
  - type: text
    content: That is why God blessed him.
  '16':
  - type: text
    content: He gave justice and help to the poor and needy,
  - type: text
    content: and everything went well for him.
  - type: text
    content: Isn’t that what it means to know me?”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '17':
  - type: text
    content: “But you! You have eyes only for greed and dishonesty!
  - type: text
    content: You murder the innocent,
  - type: text
    content: oppress the poor, and reign ruthlessly.”
  '18':
  - type: text
    content: 'Therefore, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says about Jehoiakim, son of King Josiah:'
  - type: text
    content: “The people will not mourn for him, crying to one another,
  - type: text
    content: ‘Alas, my brother! Alas, my sister!’
  - type: text
    content: His subjects will not mourn for him, crying,
  - type: text
    content: ‘Alas, our master is dead! Alas, his splendor is gone!’
  '19':
  - type: text
    content: He will be buried like a dead donkey—
  - type: text
    content: dragged out of Jerusalem and dumped outside the gates!
  '2':
  - type: text
    content: '‘Listen to this message from the '
  - type: text
    content: Lord
  - type: text
    content: ', you king of Judah, sitting on David’s throne. Let your attendants and your people listen, too. '
  '20':
  - type: text
    content: Weep for your allies in Lebanon.
  - type: text
    content: Shout for them in Bashan.
  - type: text
    content: Search for them in the regions east of the river.
  - type: note
    content: Or in Abarim.
  - type: text
    content: See, they are all destroyed.
  - type: text
    content: Not one is left to help you.
  '21':
  - type: text
    content: I warned you when you were prosperous,
  - type: text
    content: but you replied, ‘Don’t bother me.’
  - type: text
    content: You have been that way since childhood—
  - type: text
    content: you simply will not obey me!
  '22':
  - type: text
    content: And now the wind will blow away your allies.
  - type: text
    content: All your friends will be taken away as captives.
  - type: text
    content: Surely then you will see your wickedness and be ashamed.
  '23':
  - type: text
    content: It may be nice to live in a beautiful palace
  - type: text
    content: paneled with wood from the cedars of Lebanon,
  - type: text
    content: but soon you will groan with pangs of anguish—
  - type: text
    content: anguish like that of a woman in labor.
  - type: heading
    content: A Message for Jehoiachin
  '24':
  - type: text
    content: '“As surely as I live,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “I will abandon you, Jehoiachin'
  - type: note
    content: Hebrew Coniah, a variant spelling of Jehoiachin; also in 22:28.
  - type: text
    content: ' son of Jehoiakim, king of Judah. Even if you were the signet ring on my right hand, I would pull you off. '
  '25':
  - type: text
    content: I will hand you over to those who seek to kill you, those you so desperately fear—to King Nebuchadnezzar
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar.
  - type: text
    content: ' of Babylon and the mighty Babylonian'
  - type: note
    content: Or Chaldean.
  - type: text
    content: ' army. '
  '26':
  - type: text
    content: 'I will expel you and your mother from this land, and you will die in a foreign country, not in your native land. '
  '27':
  - type: text
    content: You will never again return to the land you yearn for.
  '28':
  - type: text
    content: “Why is this man Jehoiachin like a discarded, broken jar?
  - type: text
    content: Why are he and his children to be exiled to a foreign land?
  '29':
  - type: text
    content: O earth, earth, earth!
  - type: text
    content: 'Listen to this message from the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '3':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Be fair-minded and just. Do what is right! Help those who have been robbed; rescue them from their oppressors. Quit your evil deeds! Do not mistreat foreigners, orphans, and widows. Stop murdering the innocent! '
  '30':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: ‘Let the record show that this man Jehoiachin was childless.
  - type: text
    content: He is a failure,
  - type: text
    content: for none of his children will succeed him on the throne of David
  - type: text
    content: to rule over Judah.’
  '4':
  - type: text
    content: 'If you obey me, there will always be a descendant of David sitting on the throne here in Jerusalem. The king will ride through the palace gates in chariots and on horses, with his parade of attendants and subjects. '
  '5':
  - type: text
    content: 'But if you refuse to pay attention to this warning, I swear by my own name, says the '
  - type: text
    content: Lord
  - type: text
    content: ', that this palace will become a pile of rubble.’”'
  - type: heading
    content: A Message about the Palace
  '6':
  - type: text
    content: 'Now this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says concerning Judah’s royal palace:'
  - type: text
    content: “I love you as much as fruitful Gilead
  - type: text
    content: and the green forests of Lebanon.
  - type: text
    content: But I will turn you into a desert,
  - type: text
    content: with no one living within your walls.
  '7':
  - type: text
    content: I will call for wreckers,
  - type: text
    content: who will bring out their tools to dismantle you.
  - type: text
    content: They will tear out all your fine cedar beams
  - type: text
    content: and throw them on the fire.
  '8':
  - type: text
    content: '“People from many nations will pass by the ruins of this city and say to one another, ‘Why did the '
  - type: text
    content: Lord
  - type: text
    content: ' destroy such a great city?’ '
  '9':
  - type: text
    content: 'And the answer will be, ‘Because they violated their covenant with the '
  - type: text
    content: Lord
  - type: text
    content: ' their God by worshiping other gods.’”'
  - type: heading
    content: A Message about Jehoahaz
