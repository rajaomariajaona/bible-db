document_id: JER.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message for Judah’s Kings
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me: “Go over and speak directly to the king of Judah. Say to him, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '‘Listen to this message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you king of Judah, sitting on David’s throne. Let your attendants and your people listen, too. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Be fair-minded and just. Do what is right! Help those who have been robbed; rescue them from their oppressors. Quit your evil deeds! Do not mistreat foreigners, orphans, and widows. Stop murdering the innocent! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'If you obey me, there will always be a descendant of David sitting on the throne here in Jerusalem. The king will ride through the palace gates in chariots and on horses, with his parade of attendants and subjects. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But if you refuse to pay attention to this warning, I swear by my own name, says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', that this palace will become a pile of rubble.’”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message about the Palace
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says concerning Judah’s royal palace:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I love you as much as fruitful Gilead
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the green forests of Lebanon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I will turn you into a desert,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with no one living within your walls.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I will call for wreckers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who will bring out their tools to dismantle you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will tear out all your fine cedar beams
- type: usfm
  marker: q2
  children:
  - type: text
    text: and throw them on the fire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“People from many nations will pass by the ruins of this city and say to one another, ‘Why did the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' destroy such a great city?’ '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the answer will be, ‘Because they violated their covenant with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God by worshiping other gods.’”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message about Jehoahaz
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Do not weep for the dead king or mourn his loss.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Instead, weep for the captive king being led away!
- type: usfm
  marker: q2
  children:
  - type: text
    text: For he will never return to see his native land again.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says about Jehoahaz,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shallum, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: another name for Jehoahaz.
    marker-yv: yv-n
  - type: text
    text: ' who succeeded his father, King Josiah, and was taken away as a captive: “He will never return. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He will die in a distant land and will never again see his own country.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message about Jehoiakim
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says, “What sorrow awaits Jehoiakim,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:13a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The brother and successor of the exiled Jehoahaz. See 22:18.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: who builds his palace with forced labor.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:13b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: by unrighteousness.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: He builds injustice into its walls,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he makes his neighbors work for nothing.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He does not pay them for their labor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He says, ‘I will build a magnificent palace
- type: usfm
  marker: q2
  children:
  - type: text
    text: with huge rooms and many windows.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will panel it throughout with fragrant cedar
- type: usfm
  marker: q2
  children:
  - type: text
    text: and paint it a lovely red.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But a beautiful cedar palace does not make a great king!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your father, Josiah, also had plenty to eat and drink.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he was just and right in all his dealings.
- type: usfm
  marker: q2
  children:
  - type: text
    text: That is why God blessed him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He gave justice and help to the poor and needy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and everything went well for him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isn’t that what it means to know me?”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “But you! You have eyes only for greed and dishonesty!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You murder the innocent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: oppress the poor, and reign ruthlessly.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Therefore, this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says about Jehoiakim, son of King Josiah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The people will not mourn for him, crying to one another,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Alas, my brother! Alas, my sister!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: His subjects will not mourn for him, crying,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Alas, our master is dead! Alas, his splendor is gone!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He will be buried like a dead donkey—
- type: usfm
  marker: q2
  children:
  - type: text
    text: dragged out of Jerusalem and dumped outside the gates!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Weep for your allies in Lebanon.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shout for them in Bashan.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Search for them in the regions east of the river.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in Abarim.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: See, they are all destroyed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Not one is left to help you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I warned you when you were prosperous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you replied, ‘Don’t bother me.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have been that way since childhood—
- type: usfm
  marker: q2
  children:
  - type: text
    text: you simply will not obey me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And now the wind will blow away your allies.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All your friends will be taken away as captives.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Surely then you will see your wickedness and be ashamed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: It may be nice to live in a beautiful palace
- type: usfm
  marker: q2
  children:
  - type: text
    text: paneled with wood from the cedars of Lebanon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but soon you will groan with pangs of anguish—
- type: usfm
  marker: q2
  children:
  - type: text
    text: anguish like that of a woman in labor.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message for Jehoiachin
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“As surely as I live,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “I will abandon you, Jehoiachin'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Coniah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoiachin; also in 22:28.
    marker-yv: yv-n
  - type: text
    text: ' son of Jehoiakim, king of Judah. Even if you were the signet ring on my right hand, I would pull you off. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I will hand you over to those who seek to kill you, those you so desperately fear—to King Nebuchadnezzar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:25a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nebuchadrezzar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Nebuchadnezzar.
    marker-yv: yv-n
  - type: text
    text: ' of Babylon and the mighty Babylonian'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:25b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Chaldean.
    marker-yv: yv-n
  - type: text
    text: ' army. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I will expel you and your mother from this land, and you will die in a foreign country, not in your native land. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: You will never again return to the land you yearn for.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “Why is this man Jehoiachin like a discarded, broken jar?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why are he and his children to be exiled to a foreign land?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: O earth, earth, earth!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Listen to this message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Let the record show that this man Jehoiachin was childless.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is a failure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for none of his children will succeed him on the throne of David
- type: usfm
  marker: q2
  children:
  - type: text
    text: to rule over Judah.’
