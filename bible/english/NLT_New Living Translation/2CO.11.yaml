document_id: 2CO.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul and the False Apostles
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I hope you will put up with a little more of my foolishness. Please bear with me. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For I am jealous for you with the jealousy of God himself. I promised you as a pure bride
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a virgin.
    marker-yv: yv-n
  - type: text
    text: ' to one husband—Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But I fear that somehow your pure and undivided devotion to Christ will be corrupted, just as Eve was deceived by the cunning ways of the serpent. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You happily put up with whatever anyone tells you, even if they preach a different Jesus than the one we preach, or a different kind of Spirit than the one you received, or a different kind of gospel than the one you believed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But I don’t consider myself inferior in any way to these “super apostles” who teach such things. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I may be unskilled as a speaker, but I’m not lacking in knowledge. We have made this clear to you in every possible way.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Was I wrong when I humbled myself and honored you by preaching God’s Good News to you without expecting anything in return? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I “robbed” other churches by accepting their contributions so I could serve you at no cost. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And when I was with you and didn’t have enough to live on, I did not become a financial burden to anyone. For the brothers who came from Macedonia brought me all that I needed. I have never been a burden to you, and I never will be. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: As surely as the truth of Christ is in me, no one in all of Greece
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Achaia, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: the southern region of the Greek peninsula.
    marker-yv: yv-n
  - type: text
    text: ' will ever stop me from boasting about this. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Why? Because I don’t love you? God knows that I do.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But I will continue doing what I have always done. This will undercut those who are looking for an opportunity to boast that their work is just like ours. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'These people are false apostles. They are deceitful workers who disguise themselves as apostles of Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But I am not surprised! Even Satan disguises himself as an angel of light. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So it is no wonder that his servants also disguise themselves as servants of righteousness. In the end they will get the punishment their wicked deeds deserve.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Many Trials
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Again I say, don’t think that I am a fool to talk like this. But even if you do, listen to me, as you would to a foolish person, while I also boast a little. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Such boasting is not from the Lord, but I am acting like a fool. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And since others boast about their human achievements, I will, too. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'After all, you think you are so wise, but you enjoy putting up with fools! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'You put up with it when someone enslaves you, takes everything you have, takes advantage of you, takes control of everything, and slaps you in the face. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I’m ashamed to say that we’ve been too “weak” to do that!
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But whatever they dare to boast about—I’m talking like a fool again—I dare to boast about it, too. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Are they Hebrews? So am I. Are they Israelites? So am I. Are they descendants of Abraham? So am I. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Are they servants of Christ? I know I sound like a madman, but I have served him far more! I have worked harder, been put in prison more often, been whipped times without number, and faced death again and again. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Five different times the Jewish leaders gave me thirty-nine lashes. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Three times I was beaten with rods. Once I was stoned. Three times I was shipwrecked. Once I spent a whole night and a day adrift at sea. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I have traveled on many long journeys. I have faced danger from rivers and from robbers. I have faced danger from my own people, the Jews, as well as from the Gentiles. I have faced danger in the cities, in the deserts, and on the seas. And I have faced danger from men who claim to be believers but are not.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from false brothers.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: I have worked hard and long, enduring many sleepless nights. I have been hungry and thirsty and have often gone without food. I have shivered in the cold, without enough clothing to keep me warm.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then, besides all this, I have the daily burden of my concern for all the churches. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Who is weak without my feeling that weakness? Who is led astray, and I do not burn with anger?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'If I must boast, I would rather boast about the things that show how weak I am. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'God, the Father of our Lord Jesus, who is worthy of eternal praise, knows I am not lying. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'When I was in Damascus, the governor under King Aretas kept guards at the city gates to catch me. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: I had to be lowered in a basket through a window in the city wall to escape from him.
