document_id: EZK.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sins of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, are you ready to judge Jerusalem? Are you ready to judge this city of murderers? Publicly denounce her detestable sins, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and give her this message from the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': O city of murderers, doomed and damned—city of idols,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term (literally '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: round things
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) probably alludes to dung; also in 22:4.
    marker-yv: yv-n
  - type: text
    text: ' filthy and foul— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'you are guilty because of the blood you have shed. You are defiled because of the idols you have made. Your day of destruction has come! You have reached the end of your years. I will make you an object of mockery throughout the world. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: O infamous city, filled with confusion, you will be mocked by people far and near.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Every leader in Israel who lives within your walls is bent on murder. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fathers and mothers are treated with contempt. Foreigners are forced to pay for protection. Orphans and widows are wronged and oppressed among you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'You despise my holy things and violate my Sabbath days of rest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'People accuse others falsely and send them to their death. You are filled with idol worshipers and people who do obscene things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Men sleep with their fathers’ wives and force themselves on women who are menstruating. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Within your walls live men who commit adultery with their neighbors’ wives, who defile their daughters-in-law, or who rape their own sisters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'There are hired murderers, loan racketeers, and extortioners everywhere. They never even think of me and my commands, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“But now I clap my hands in indignation over your dishonest gain and bloodshed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'How strong and courageous will you be in my day of reckoning? I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken, and I will do what I said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I will scatter you among the nations and purge you of your wickedness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And when I have been dishonored among the nations because of you,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in one Hebrew manuscript and Greek and Syriac versions; Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: when you have been dishonored among the nations.
    marker-yv: yv-n
  - type: text
    text: ' you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Refining Furnace
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“Son of man, the people of Israel are the worthless slag that remains after silver is smelted. They are the dross that is left over—a useless mixture of copper, tin, iron, and lead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So tell them, ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Because you are all worthless slag, I will bring you to my crucible in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Just as silver, copper, iron, lead, and tin are melted down in a furnace, I will melt you down in the heat of my fury. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I will gather you together and blow the fire of my anger upon you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and you will melt like silver in fierce heat. Then you will know that I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have poured out my fury on you.’”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sins of Israel’s Leaders
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Again a message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“Son of man, give the people of Israel this message: In the day of my indignation, you will be like a polluted land, a land without rain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Your princes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prophets.
    marker-yv: yv-n
  - type: text
    text: ' plot conspiracies just as lions stalk their prey. They devour innocent people, seizing treasures and extorting wealth. They make many widows in the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Your priests have violated my instructions and defiled my holy things. They make no distinction between what is holy and what is not. And they do not teach my people the difference between what is ceremonially clean and unclean. They disregard my Sabbath days so that I am dishonored among them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Your leaders are like wolves who tear apart their victims. They actually destroy people’s lives for money! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And your prophets cover up for them by announcing false visions and making lying predictions. They say, ‘My message is from the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ',’ when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'Lord '
  - type: text
    text: 'hasn’t spoken a single word to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Even common people oppress the poor, rob the needy, and deprive foreigners of justice.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“I looked for someone who might rebuild the wall of righteousness that guards the land. I searched for someone to stand in the gap in the wall so I wouldn’t have to destroy the land, but I found no one. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'So now I will pour out my fury on them, consuming them with the fire of my anger. I will heap on their heads the full penalty for all their sins. I, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
