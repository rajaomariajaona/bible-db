document_id: EZK.22,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sins of Jerusalem
  - type: text
    content: 'Now this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'Men sleep with their fathers’ wives and force themselves on women who are menstruating. '
  '11':
  - type: text
    content: 'Within your walls live men who commit adultery with their neighbors’ wives, who defile their daughters-in-law, or who rape their own sisters. '
  '12':
  - type: text
    content: 'There are hired murderers, loan racketeers, and extortioners everywhere. They never even think of me and my commands, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: '“But now I clap my hands in indignation over your dishonest gain and bloodshed. '
  '14':
  - type: text
    content: 'How strong and courageous will you be in my day of reckoning? I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken, and I will do what I said. '
  '15':
  - type: text
    content: 'I will scatter you among the nations and purge you of your wickedness. '
  '16':
  - type: text
    content: And when I have been dishonored among the nations because of you,
  - type: note
    content: As in one Hebrew manuscript and Greek and Syriac versions; Masoretic Text reads when you have been dishonored among the nations.
  - type: text
    content: ' you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: The Lord’s Refining Furnace
  '17':
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '18':
  - type: text
    content: '“Son of man, the people of Israel are the worthless slag that remains after silver is smelted. They are the dross that is left over—a useless mixture of copper, tin, iron, and lead. '
  '19':
  - type: text
    content: 'So tell them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Because you are all worthless slag, I will bring you to my crucible in Jerusalem. '
  '2':
  - type: text
    content: '“Son of man, are you ready to judge Jerusalem? Are you ready to judge this city of murderers? Publicly denounce her detestable sins, '
  '20':
  - type: text
    content: 'Just as silver, copper, iron, lead, and tin are melted down in a furnace, I will melt you down in the heat of my fury. '
  '21':
  - type: text
    content: 'I will gather you together and blow the fire of my anger upon you, '
  '22':
  - type: text
    content: 'and you will melt like silver in fierce heat. Then you will know that I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have poured out my fury on you.’”'
  - type: heading
    content: The Sins of Israel’s Leaders
  '23':
  - type: text
    content: 'Again a message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '24':
  - type: text
    content: '“Son of man, give the people of Israel this message: In the day of my indignation, you will be like a polluted land, a land without rain. '
  '25':
  - type: text
    content: Your princes
  - type: note
    content: As in Greek version; Hebrew reads prophets.
  - type: text
    content: ' plot conspiracies just as lions stalk their prey. They devour innocent people, seizing treasures and extorting wealth. They make many widows in the land. '
  '26':
  - type: text
    content: 'Your priests have violated my instructions and defiled my holy things. They make no distinction between what is holy and what is not. And they do not teach my people the difference between what is ceremonially clean and unclean. They disregard my Sabbath days so that I am dishonored among them. '
  '27':
  - type: text
    content: 'Your leaders are like wolves who tear apart their victims. They actually destroy people’s lives for money! '
  '28':
  - type: text
    content: 'And your prophets cover up for them by announcing false visions and making lying predictions. They say, ‘My message is from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ',’ when the '
  - type: text
    content: 'Lord '
  - type: text
    content: 'hasn’t spoken a single word to them. '
  '29':
  - type: text
    content: Even common people oppress the poor, rob the needy, and deprive foreigners of justice.
  '3':
  - type: text
    content: 'and give her this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ': O city of murderers, doomed and damned—city of idols,'
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung; also in 22:4.
  - type: text
    content: ' filthy and foul— '
  '30':
  - type: text
    content: '“I looked for someone who might rebuild the wall of righteousness that guards the land. I searched for someone to stand in the gap in the wall so I wouldn’t have to destroy the land, but I found no one. '
  '31':
  - type: text
    content: 'So now I will pour out my fury on them, consuming them with the fire of my anger. I will heap on their heads the full penalty for all their sins. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '4':
  - type: text
    content: 'you are guilty because of the blood you have shed. You are defiled because of the idols you have made. Your day of destruction has come! You have reached the end of your years. I will make you an object of mockery throughout the world. '
  '5':
  - type: text
    content: O infamous city, filled with confusion, you will be mocked by people far and near.
  '6':
  - type: text
    content: '“Every leader in Israel who lives within your walls is bent on murder. '
  '7':
  - type: text
    content: 'Fathers and mothers are treated with contempt. Foreigners are forced to pay for protection. Orphans and widows are wronged and oppressed among you. '
  '8':
  - type: text
    content: 'You despise my holy things and violate my Sabbath days of rest. '
  '9':
  - type: text
    content: 'People accuse others falsely and send them to their death. You are filled with idol worshipers and people who do obscene things. '
