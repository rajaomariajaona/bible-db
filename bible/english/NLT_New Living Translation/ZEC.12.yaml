document_id: ZEC.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Future Deliverance for Jerusalem
  - type: text
    content: This
  - type: note
    content: 'Hebrew An Oracle: This.'
  - type: text
    content: ' message concerning the fate of Israel came from the '
  - type: text
    content: Lord
  - type: text
    content: ': “This message is from the '
  - type: text
    content: Lord
  - type: text
    content: ', who stretched out the heavens, laid the foundations of the earth, and formed the human spirit. '
  '10':
  - type: text
    content: “Then I will pour out a spirit
  - type: note
    content: Or the Spirit.
  - type: text
    content: ' of grace and prayer on the family of David and on the people of Jerusalem. They will look on me whom they have pierced and mourn for him as for an only son. They will grieve bitterly for him as for a firstborn son who has died. '
  '11':
  - type: text
    content: The sorrow and mourning in Jerusalem on that day will be like the great mourning for Hadad-rimmon in the valley of Megiddo.
  '12':
  - type: text
    content: '“All Israel will mourn, each clan by itself, and with the husbands separate from their wives. The clan of David will mourn alone, as will the clan of Nathan, '
  '13':
  - type: text
    content: 'the clan of Levi, and the clan of Shimei. '
  '14':
  - type: text
    content: Each of the surviving clans from Judah will mourn separately, and with the husbands separate from their wives.
  '2':
  - type: text
    content: 'I will make Jerusalem like an intoxicating drink that makes the nearby nations stagger when they send their armies to besiege Jerusalem and Judah. '
  '3':
  - type: text
    content: On that day I will make Jerusalem an immovable rock. All the nations will gather against it to try to move it, but they will only hurt themselves.
  '4':
  - type: text
    content: '“On that day,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “I will cause every horse to panic and every rider to lose his nerve. I will watch over the people of Judah, but I will blind all the horses of their enemies. '
  '5':
  - type: text
    content: 'And the clans of Judah will say to themselves, ‘The people of Jerusalem have found strength in the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, their God.’'
  '6':
  - type: text
    content: “On that day I will make the clans of Judah like a flame that sets a woodpile ablaze or like a burning torch among sheaves of grain. They will burn up all the neighboring nations right and left, while the people living in Jerusalem remain secure.
  '7':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will give victory to the rest of Judah first, before Jerusalem, so that the people of Jerusalem and the royal line of David will not have greater honor than the rest of Judah. '
  '8':
  - type: text
    content: 'On that day the '
  - type: text
    content: Lord
  - type: text
    content: ' will defend the people of Jerusalem; the weakest among them will be as mighty as King David! And the royal descendants will be like God, like the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' who goes before them! '
  '9':
  - type: text
    content: For on that day I will begin to destroy all the nations that come against Jerusalem.
