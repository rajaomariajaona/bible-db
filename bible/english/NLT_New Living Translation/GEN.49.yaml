document_id: GEN.49,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob’s Last Words to His Sons
  - type: text
    content: Then Jacob called together all his sons and said, “Gather around me, and I will tell you what will happen to each of you in the days to come.
  '10':
  - type: text
    content: The scepter will not depart from Judah,
  - type: text
    content: nor the ruler’s staff from his descendants,
  - type: note
    content: Hebrew from between his feet.
  - type: text
    content: until the coming of the one to whom it belongs,
  - type: note
    content: Or until tribute is brought to him and the peoples obey; traditionally rendered until Shiloh comes.
  - type: text
    content: the one whom all nations will honor.
  '11':
  - type: text
    content: He ties his foal to a grapevine,
  - type: text
    content: the colt of his donkey to a choice vine.
  - type: text
    content: He washes his clothes in wine,
  - type: text
    content: his robes in the blood of grapes.
  '12':
  - type: text
    content: His eyes are darker than wine,
  - type: text
    content: and his teeth are whiter than milk.
  '13':
  - type: text
    content: “Zebulun will settle by the seashore
  - type: text
    content: and will be a harbor for ships;
  - type: text
    content: his borders will extend to Sidon.
  '14':
  - type: text
    content: “Issachar is a sturdy donkey,
  - type: text
    content: resting between two saddlepacks.
  - type: note
    content: Or sheepfolds, or hearths.
  '15':
  - type: text
    content: When he sees how good the countryside is
  - type: text
    content: and how pleasant the land,
  - type: text
    content: he will bend his shoulder to the load
  - type: text
    content: and submit himself to hard labor.
  '16':
  - type: text
    content: “Dan will govern his people,
  - type: text
    content: like any other tribe in Israel.
  '17':
  - type: text
    content: Dan will be a snake beside the road,
  - type: text
    content: a poisonous viper along the path
  - type: text
    content: that bites the horse’s hooves
  - type: text
    content: so its rider is thrown off.
  '18':
  - type: text
    content: 'I trust in you for salvation, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '19':
  - type: text
    content: “Gad will be attacked by marauding bands,
  - type: text
    content: but he will attack them when they retreat.
  '2':
  - type: text
    content: “Come and listen, you sons of Jacob;
  - type: text
    content: listen to Israel, your father.
  '20':
  - type: text
    content: “Asher will dine on rich foods
  - type: text
    content: and produce food fit for kings.
  '21':
  - type: text
    content: “Naphtali is a doe set free
  - type: text
    content: that bears beautiful fawns.
  '22':
  - type: text
    content: “Joseph is the foal of a wild donkey,
  - type: text
    content: the foal of a wild donkey at a spring—
  - type: text
    content: one of the wild donkeys on the ridge.
  - type: note
    content: Or Joseph is a fruitful tree, / a fruitful tree beside a spring. / His branches reach over the wall. The meaning of the Hebrew is uncertain.
  '23':
  - type: text
    content: Archers attacked him savagely;
  - type: text
    content: they shot at him and harassed him.
  '24':
  - type: text
    content: But his bow remained taut,
  - type: text
    content: and his arms were strengthened
  - type: text
    content: by the hands of the Mighty One of Jacob,
  - type: text
    content: by the Shepherd, the Rock of Israel.
  '25':
  - type: text
    content: May the God of your father help you;
  - type: text
    content: may the Almighty bless you
  - type: text
    content: with the blessings of the heavens above,
  - type: text
    content: and blessings of the watery depths below,
  - type: text
    content: and blessings of the breasts and womb.
  '26':
  - type: text
    content: May my fatherly blessings on you
  - type: text
    content: surpass the blessings of my ancestors,
  - type: note
    content: Or of the ancient mountains.
  - type: text
    content: reaching to the heights of the eternal hills.
  - type: text
    content: May these blessings rest on the head of Joseph,
  - type: text
    content: who is a prince among his brothers.
  '27':
  - type: text
    content: “Benjamin is a ravenous wolf,
  - type: text
    content: devouring his enemies in the morning
  - type: text
    content: and dividing his plunder in the evening.”
  '28':
  - type: text
    content: These are the twelve tribes of Israel, and this is what their father said as he told his sons good-bye. He blessed each one with an appropriate message.
  - type: heading
    content: Jacob’s Death and Burial
  '29':
  - type: text
    content: 'Then Jacob instructed them, “Soon I will die and join my ancestors. Bury me with my father and grandfather in the cave in the field of Ephron the Hittite. '
  '3':
  - type: text
    content: “Reuben, you are my firstborn, my strength,
  - type: text
    content: the child of my vigorous youth.
  - type: text
    content: You are first in rank and first in power.
  '30':
  - type: text
    content: 'This is the cave in the field of Machpelah, near Mamre in Canaan, that Abraham bought from Ephron the Hittite as a permanent burial site. '
  '31':
  - type: text
    content: 'There Abraham and his wife Sarah are buried. There Isaac and his wife, Rebekah, are buried. And there I buried Leah. '
  '32':
  - type: text
    content: It is the plot of land and the cave that my grandfather Abraham bought from the Hittites.”
  '33':
  - type: text
    content: When Jacob had finished this charge to his sons, he drew his feet into the bed, breathed his last, and joined his ancestors in death.
  '4':
  - type: text
    content: But you are as unruly as a flood,
  - type: text
    content: and you will be first no longer.
  - type: text
    content: For you went to bed with my wife;
  - type: text
    content: you defiled my marriage couch.
  '5':
  - type: text
    content: “Simeon and Levi are two of a kind;
  - type: text
    content: their weapons are instruments of violence.
  '6':
  - type: text
    content: May I never join in their meetings;
  - type: text
    content: may I never be a party to their plans.
  - type: text
    content: For in their anger they murdered men,
  - type: text
    content: and they crippled oxen just for sport.
  '7':
  - type: text
    content: A curse on their anger, for it is fierce;
  - type: text
    content: a curse on their wrath, for it is cruel.
  - type: text
    content: I will scatter them among the descendants of Jacob;
  - type: text
    content: I will disperse them throughout Israel.
  '8':
  - type: text
    content: “Judah, your brothers will praise you.
  - type: text
    content: You will grasp your enemies by the neck.
  - type: text
    content: All your relatives will bow before you.
  '9':
  - type: text
    content: Judah, my son, is a young lion
  - type: text
    content: that has finished eating its prey.
  - type: text
    content: Like a lion he crouches and lies down;
  - type: text
    content: like a lioness—who dares to rouse him?
