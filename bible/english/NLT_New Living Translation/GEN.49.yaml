document_id: GEN.49
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob’s Last Words to His Sons
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Jacob called together all his sons and said, “Gather around me, and I will tell you what will happen to each of you in the days to come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Come and listen, you sons of Jacob;
- type: usfm
  marker: q2
  children:
  - type: text
    text: listen to Israel, your father.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Reuben, you are my firstborn, my strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the child of my vigorous youth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are first in rank and first in power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But you are as unruly as a flood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will be first no longer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you went to bed with my wife;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you defiled my marriage couch.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Simeon and Levi are two of a kind;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their weapons are instruments of violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: May I never join in their meetings;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may I never be a party to their plans.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For in their anger they murdered men,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they crippled oxen just for sport.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A curse on their anger, for it is fierce;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a curse on their wrath, for it is cruel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will scatter them among the descendants of Jacob;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will disperse them throughout Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Judah, your brothers will praise you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You will grasp your enemies by the neck.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All your relatives will bow before you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Judah, my son, is a young lion
- type: usfm
  marker: q2
  children:
  - type: text
    text: that has finished eating its prey.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a lion he crouches and lies down;
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a lioness—who dares to rouse him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The scepter will not depart from Judah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor the ruler’s staff from his descendants,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:10a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from between his feet.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: until the coming of the one to whom it belongs,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:10b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'until tribute is brought to him and the peoples obey; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traditionally rendered '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: until Shiloh comes.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: the one whom all nations will honor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He ties his foal to a grapevine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the colt of his donkey to a choice vine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He washes his clothes in wine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his robes in the blood of grapes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: His eyes are darker than wine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his teeth are whiter than milk.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Zebulun will settle by the seashore
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will be a harbor for ships;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his borders will extend to Sidon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Issachar is a sturdy donkey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: resting between two saddlepacks.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sheepfolds, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hearths.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: When he sees how good the countryside is
- type: usfm
  marker: q2
  children:
  - type: text
    text: and how pleasant the land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: he will bend his shoulder to the load
- type: usfm
  marker: q2
  children:
  - type: text
    text: and submit himself to hard labor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Dan will govern his people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like any other tribe in Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dan will be a snake beside the road,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a poisonous viper along the path
- type: usfm
  marker: q1
  children:
  - type: text
    text: that bites the horse’s hooves
- type: usfm
  marker: q2
  children:
  - type: text
    text: so its rider is thrown off.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I trust in you for salvation, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Gad will be attacked by marauding bands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he will attack them when they retreat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Asher will dine on rich foods
- type: usfm
  marker: q2
  children:
  - type: text
    text: and produce food fit for kings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Naphtali is a doe set free
- type: usfm
  marker: q2
  children:
  - type: text
    text: that bears beautiful fawns.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Joseph is the foal of a wild donkey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the foal of a wild donkey at a spring—
- type: usfm
  marker: q2
  children:
  - type: text
    text: one of the wild donkeys on the ridge.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Joseph is a fruitful tree, / a fruitful tree beside a spring. / His branches reach over the wall. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Archers attacked him savagely;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they shot at him and harassed him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: But his bow remained taut,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his arms were strengthened
- type: usfm
  marker: q1
  children:
  - type: text
    text: by the hands of the Mighty One of Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: by the Shepherd, the Rock of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: May the God of your father help you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may the Almighty bless you
- type: usfm
  marker: q1
  children:
  - type: text
    text: with the blessings of the heavens above,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and blessings of the watery depths below,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and blessings of the breasts and womb.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: May my fatherly blessings on you
- type: usfm
  marker: q2
  children:
  - type: text
    text: surpass the blessings of my ancestors,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of the ancient mountains.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: reaching to the heights of the eternal hills.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May these blessings rest on the head of Joseph,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who is a prince among his brothers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “Benjamin is a ravenous wolf,
- type: usfm
  marker: q2
  children:
  - type: text
    text: devouring his enemies in the morning
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dividing his plunder in the evening.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: These are the twelve tribes of Israel, and this is what their father said as he told his sons good-bye. He blessed each one with an appropriate message.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob’s Death and Burial
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Jacob instructed them, “Soon I will die and join my ancestors. Bury me with my father and grandfather in the cave in the field of Ephron the Hittite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'This is the cave in the field of Machpelah, near Mamre in Canaan, that Abraham bought from Ephron the Hittite as a permanent burial site. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'There Abraham and his wife Sarah are buried. There Isaac and his wife, Rebekah, are buried. And there I buried Leah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: It is the plot of land and the cave that my grandfather Abraham bought from the Hittites.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: When Jacob had finished this charge to his sons, he drew his feet into the bed, breathed his last, and joined his ancestors in death.
