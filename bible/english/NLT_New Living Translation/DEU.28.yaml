document_id: DEU.28,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Blessings for Obedience
  - type: text
    content: '“If you fully obey the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and carefully keep all his commands that I am giving you today, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will set you high above all the nations of the world. '
  '10':
  - type: text
    content: 'Then all the nations of the world will see that you are a people claimed by the '
  - type: text
    content: Lord
  - type: text
    content: ', and they will stand in awe of you.'
  '11':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will give you prosperity in the land he swore to your ancestors to give you, blessing you with many children, numerous livestock, and abundant crops. '
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will send rain at the proper time from his rich treasury in the heavens and will bless all the work you do. You will lend to many nations, but you will never need to borrow from them. '
  '13':
  - type: text
    content: 'If you listen to these commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God that I am giving you today, and if you carefully obey them, the '
  - type: text
    content: Lord
  - type: text
    content: ' will make you the head and not the tail, and you will always be on top and never at the bottom. '
  '14':
  - type: text
    content: You must not turn away from any of the commands I am giving you today, nor follow after other gods and worship them.
  - type: heading
    content: Curses for Disobedience
  '15':
  - type: text
    content: '“But if you refuse to listen to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and do not obey all the commands and decrees I am giving you today, all these curses will come and overwhelm you:'
  '16':
  - type: text
    content: Your towns and your fields
  - type: text
    content: will be cursed.
  '17':
  - type: text
    content: Your fruit baskets and breadboards
  - type: text
    content: will be cursed.
  '18':
  - type: text
    content: Your children and your crops
  - type: text
    content: will be cursed.
  - type: text
    content: The offspring of your herds and flocks
  - type: text
    content: will be cursed.
  '19':
  - type: text
    content: Wherever you go and whatever you do,
  - type: text
    content: you will be cursed.
  '2':
  - type: text
    content: 'You will experience all these blessings if you obey the '
  - type: text
    content: Lord
  - type: text
    content: ' your God:'
  '20':
  - type: text
    content: '“The '
  - type: text
    content: 'Lord '
  - type: text
    content: 'himself will send on you curses, confusion, and frustration in everything you do, until at last you are completely destroyed for doing evil and abandoning me. '
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will afflict you with diseases until none of you are left in the land you are about to enter and occupy. '
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will strike you with wasting diseases, fever, and inflammation, with scorching heat and drought, and with blight and mildew. These disasters will pursue you until you die. '
  '23':
  - type: text
    content: 'The skies above will be as unyielding as bronze, and the earth beneath will be as hard as iron. '
  '24':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will change the rain that falls on your land into powder, and dust will pour down from the sky until you are destroyed.'
  '25':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will cause you to be defeated by your enemies. You will attack your enemies from one direction, but you will scatter from them in seven! You will be an object of horror to all the kingdoms of the earth. '
  '26':
  - type: text
    content: Your corpses will be food for all the scavenging birds and wild animals, and no one will be there to chase them away.
  '27':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will afflict you with the boils of Egypt and with tumors, scurvy, and the itch, from which you cannot be cured. '
  '28':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will strike you with madness, blindness, and panic. '
  '29':
  - type: text
    content: You will grope around in broad daylight like a blind person groping in the darkness, but you will not find your way. You will be oppressed and robbed continually, and no one will come to save you.
  '3':
  - type: text
    content: Your towns and your fields
  - type: text
    content: will be blessed.
  '30':
  - type: text
    content: '“You will be engaged to a woman, but another man will sleep with her. You will build a house, but someone else will live in it. You will plant a vineyard, but you will never enjoy its fruit. '
  '31':
  - type: text
    content: 'Your ox will be butchered before your eyes, but you will not eat a single bite of the meat. Your donkey will be taken from you, never to be returned. Your sheep and goats will be given to your enemies, and no one will be there to help you. '
  '32':
  - type: text
    content: 'You will watch as your sons and daughters are taken away as slaves. Your heart will break for them, but you won’t be able to help them. '
  '33':
  - type: text
    content: 'A foreign nation you have never heard about will eat the crops you worked so hard to grow. You will suffer under constant oppression and harsh treatment. '
  '34':
  - type: text
    content: 'You will go mad because of all the tragedy you see around you. '
  '35':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will cover your knees and legs with incurable boils. In fact, you will be covered from head to foot.'
  '36':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will exile you and your king to a nation unknown to you and your ancestors. There in exile you will worship gods of wood and stone! '
  '37':
  - type: text
    content: 'You will become an object of horror, ridicule, and mockery among all the nations to which the '
  - type: text
    content: Lord
  - type: text
    content: ' sends you.'
  '38':
  - type: text
    content: '“You will plant much but harvest little, for locusts will eat your crops. '
  '39':
  - type: text
    content: 'You will plant vineyards and care for them, but you will not drink the wine or eat the grapes, for worms will destroy the vines. '
  '4':
  - type: text
    content: Your children and your crops
  - type: text
    content: will be blessed.
  - type: text
    content: The offspring of your herds and flocks
  - type: text
    content: will be blessed.
  '40':
  - type: text
    content: 'You will grow olive trees throughout your land, but you will never use the olive oil, for the fruit will drop before it ripens. '
  '41':
  - type: text
    content: 'You will have sons and daughters, but you will lose them, for they will be led away into captivity. '
  '42':
  - type: text
    content: Swarms of insects will destroy your trees and crops.
  '43':
  - type: text
    content: '“The foreigners living among you will become stronger and stronger, while you become weaker and weaker. '
  '44':
  - type: text
    content: They will lend money to you, but you will not lend to them. They will be the head, and you will be the tail!
  '45':
  - type: text
    content: '“If you refuse to listen to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and to obey the commands and decrees he has given you, all these curses will pursue and overtake you until you are destroyed. '
  '46':
  - type: text
    content: 'These horrors will serve as a sign and warning among you and your descendants forever. '
  '47':
  - type: text
    content: 'If you do not serve the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with joy and enthusiasm for the abundant benefits you have received, '
  '48':
  - type: text
    content: 'you will serve your enemies whom the '
  - type: text
    content: Lord
  - type: text
    content: ' will send against you. You will be left hungry, thirsty, naked, and lacking in everything. The '
  - type: text
    content: Lord
  - type: text
    content: ' will put an iron yoke on your neck, oppressing you harshly until he has destroyed you.'
  '49':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will bring a distant nation against you from the end of the earth, and it will swoop down on you like a vulture. It is a nation whose language you do not understand, '
  '5':
  - type: text
    content: Your fruit baskets and breadboards
  - type: text
    content: will be blessed.
  '50':
  - type: text
    content: 'a fierce and heartless nation that shows no respect for the old and no pity for the young. '
  '51':
  - type: text
    content: 'Its armies will devour your livestock and crops, and you will be destroyed. They will leave you no grain, new wine, olive oil, calves, or lambs, and you will starve to death. '
  '52':
  - type: text
    content: 'They will attack your cities until all the fortified walls in your land—the walls you trusted to protect you—are knocked down. They will attack all the towns in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given you.'
  '53':
  - type: text
    content: '“The siege and terrible distress of the enemy’s attack will be so severe that you will eat the flesh of your own sons and daughters, whom the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given you. '
  '54':
  - type: text
    content: 'The most tenderhearted man among you will have no compassion for his own brother, his beloved wife, and his surviving children. '
  '55':
  - type: text
    content: 'He will refuse to share with them the flesh he is devouring—the flesh of one of his own children—because he has nothing else to eat during the siege and terrible distress that your enemy will inflict on all your towns. '
  '56':
  - type: text
    content: 'The most tender and delicate woman among you—so delicate she would not so much as touch the ground with her foot—will be selfish toward the husband she loves and toward her own son or daughter. '
  '57':
  - type: text
    content: She will hide from them the afterbirth and the new baby she has borne, so that she herself can secretly eat them. She will have nothing else to eat during the siege and terrible distress that your enemy will inflict on all your towns.
  '58':
  - type: text
    content: '“If you refuse to obey all the words of instruction that are written in this book, and if you do not fear the glorious and awesome name of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  '59':
  - type: text
    content: 'then the '
  - type: text
    content: Lord
  - type: text
    content: ' will overwhelm you and your children with indescribable plagues. These plagues will be intense and without relief, making you miserable and unbearably sick. '
  '6':
  - type: text
    content: Wherever you go and whatever you do,
  - type: text
    content: you will be blessed.
  '60':
  - type: text
    content: 'He will afflict you with all the diseases of Egypt that you feared so much, and you will have no relief. '
  '61':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will afflict you with every sickness and plague there is, even those not mentioned in this Book of Instruction, until you are destroyed. '
  '62':
  - type: text
    content: 'Though you become as numerous as the stars in the sky, few of you will be left because you would not listen to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '63':
  - type: text
    content: '“Just as the '
  - type: text
    content: Lord
  - type: text
    content: ' has found great pleasure in causing you to prosper and multiply, the '
  - type: text
    content: Lord
  - type: text
    content: ' will find pleasure in destroying you. You will be torn from the land you are about to enter and occupy. '
  '64':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will scatter you among all the nations from one end of the earth to the other. There you will worship foreign gods that neither you nor your ancestors have known, gods made of wood and stone! '
  '65':
  - type: text
    content: 'There among those nations you will find no peace or place to rest. And the '
  - type: text
    content: Lord
  - type: text
    content: ' will cause your heart to tremble, your eyesight to fail, and your soul to despair. '
  '66':
  - type: text
    content: 'Your life will constantly hang in the balance. You will live night and day in fear, unsure if you will survive. '
  '67':
  - type: text
    content: 'In the morning you will say, ‘If only it were night!’ And in the evening you will say, ‘If only it were morning!’ For you will be terrified by the awful horrors you see around you. '
  '68':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will send you back to Egypt in ships, to a destination I promised you would never see again. There you will offer to sell yourselves to your enemies as slaves, but no one will buy you.”'
  '7':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will conquer your enemies when they attack you. They will attack you from one direction, but they will scatter from you in seven!'
  '8':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will guarantee a blessing on everything you do and will fill your storehouses with grain. The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will bless you in the land he is giving you.'
  '9':
  - type: text
    content: '“If you obey the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and walk in his ways, the '
  - type: text
    content: Lord
  - type: text
    content: ' will establish you as his holy people as he swore he would do. '
