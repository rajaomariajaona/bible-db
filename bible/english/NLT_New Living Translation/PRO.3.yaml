document_id: PRO.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Trusting in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My child,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'My son; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 3:11, 21.
    marker-yv: yv-n
  - type: text
    text: ' never forget the things I have taught you.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Store my commands in your heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: If you do this, you will live many years,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your life will be satisfying.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Never let loyalty and kindness leave you!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tie them around your neck as a reminder.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Write them deep within your heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then you will find favor with both God and people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will earn a good reputation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with all your heart;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not depend on your own understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Seek his will in all you do,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will show you which path to take.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Don’t be impressed with your own wisdom.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Instead, fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and turn away from evil.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then you will have healing for your body
- type: usfm
  marker: q2
  children:
  - type: text
    text: and strength for your bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Honor the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with your wealth'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and with the best part of everything you produce.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then he will fill your barns with grain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your vats will overflow with good wine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'My child, don’t reject the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s discipline,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and don’t be upset when he corrects you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' corrects those he loves,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: just as a father corrects a child in whom he delights.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'loves, / and he punishes those he accepts as his children. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Heb 12:6.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Joyful is the person who finds wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the one who gains understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For wisdom is more profitable than silver,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and her wages are better than gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Wisdom is more precious than rubies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing you desire can compare with her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: She offers you long life in her right hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and riches and honor in her left.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: She will guide you down delightful paths;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all her ways are satisfying.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Wisdom is a tree of life to those who embrace her;
- type: usfm
  marker: q2
  children:
  - type: text
    text: happy are those who hold her tightly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'By wisdom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' founded the earth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: by understanding he created the heavens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: By his knowledge the deep fountains of the earth burst forth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the dew settles beneath the night sky.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: My child, don’t lose sight of common sense and discernment.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hang on to them,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: for they will refresh your soul.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are like jewels on a necklace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They keep you safe on your way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your feet will not stumble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: You can go to bed without fear;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will lie down and sleep soundly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: You need not be afraid of sudden disaster
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the destruction that comes upon the wicked,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is your security.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will keep your foot from being caught in a trap.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Do not withhold good from those who deserve it
- type: usfm
  marker: q2
  children:
  - type: text
    text: when it’s in your power to help them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: If you can help your neighbor now, don’t say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Come back tomorrow, and then I’ll help you.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Don’t plot harm against your neighbor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for those who live nearby trust you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Don’t pick a fight without reason,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when no one has done you harm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Don’t envy violent people
- type: usfm
  marker: q2
  children:
  - type: text
    text: or copy their ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Such wicked people are detestable to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he offers his friendship to the godly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' curses the house of the wicked,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he blesses the home of the upright.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' mocks the mockers'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but is gracious to the humble.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'The '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' opposes the proud / but gives grace to the humble. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Jas 4:6; 1 Pet 5:5.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: The wise inherit honor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but fools are put to shame!
