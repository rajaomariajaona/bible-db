document_id: PRO.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Trusting in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My child,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'My son; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 3:11, 21.
      marker-yv: yv-n
    - type: text
      text: ' never forget the things I have taught you.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Store my commands in your heart.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he will fill your barns with grain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your vats will overflow with good wine.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My child, don’t reject the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s discipline,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and don’t be upset when he corrects you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' corrects those he loves,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as a father corrects a child in whom he delights.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'loves, / and he punishes those he accepts as his children. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Heb 12:6.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Joyful is the person who finds wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the one who gains understanding.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For wisdom is more profitable than silver,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her wages are better than gold.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom is more precious than rubies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing you desire can compare with her.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She offers you long life in her right hand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and riches and honor in her left.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She will guide you down delightful paths;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all her ways are satisfying.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom is a tree of life to those who embrace her;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: happy are those who hold her tightly.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'By wisdom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' founded the earth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by understanding he created the heavens.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you do this, you will live many years,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your life will be satisfying.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By his knowledge the deep fountains of the earth burst forth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the dew settles beneath the night sky.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My child, don’t lose sight of common sense and discernment.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hang on to them,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they will refresh your soul.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are like jewels on a necklace.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They keep you safe on your way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your feet will not stumble.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You can go to bed without fear;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will lie down and sleep soundly.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You need not be afraid of sudden disaster
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or the destruction that comes upon the wicked,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is your security.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will keep your foot from being caught in a trap.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not withhold good from those who deserve it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when it’s in your power to help them.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you can help your neighbor now, don’t say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Come back tomorrow, and then I’ll help you.”
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t plot harm against your neighbor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for those who live nearby trust you.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never let loyalty and kindness leave you!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tie them around your neck as a reminder.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Write them deep within your heart.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t pick a fight without reason,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when no one has done you harm.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t envy violent people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or copy their ways.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Such wicked people are detestable to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he offers his friendship to the godly.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' curses the house of the wicked,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he blesses the home of the upright.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' mocks the mockers'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but is gracious to the humble.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' opposes the proud / but gives grace to the humble. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Jas 4:6; 1 Pet 5:5.
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wise inherit honor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but fools are put to shame!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you will find favor with both God and people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will earn a good reputation.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with all your heart;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not depend on your own understanding.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seek his will in all you do,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will show you which path to take.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t be impressed with your own wisdom.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Instead, fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and turn away from evil.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you will have healing for your body
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and strength for your bones.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Honor the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with your wealth'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with the best part of everything you produce.
