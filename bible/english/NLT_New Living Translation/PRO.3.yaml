document_id: PRO.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Trusting in the Lord
  - type: text
    content: My child,
  - type: note
    content: Hebrew My son; also in 3:11, 21.
  - type: text
    content: ' never forget the things I have taught you.'
  - type: text
    content: Store my commands in your heart.
  '10':
  - type: text
    content: Then he will fill your barns with grain,
  - type: text
    content: and your vats will overflow with good wine.
  '11':
  - type: text
    content: 'My child, don’t reject the '
  - type: text
    content: Lord
  - type: text
    content: ’s discipline,
  - type: text
    content: and don’t be upset when he corrects you.
  '12':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' corrects those he loves,'
  - type: text
    content: just as a father corrects a child in whom he delights.
  - type: note
    content: Greek version reads loves, / and he punishes those he accepts as his children. Compare Heb 12:6.
  '13':
  - type: text
    content: Joyful is the person who finds wisdom,
  - type: text
    content: the one who gains understanding.
  '14':
  - type: text
    content: For wisdom is more profitable than silver,
  - type: text
    content: and her wages are better than gold.
  '15':
  - type: text
    content: Wisdom is more precious than rubies;
  - type: text
    content: nothing you desire can compare with her.
  '16':
  - type: text
    content: She offers you long life in her right hand,
  - type: text
    content: and riches and honor in her left.
  '17':
  - type: text
    content: She will guide you down delightful paths;
  - type: text
    content: all her ways are satisfying.
  '18':
  - type: text
    content: Wisdom is a tree of life to those who embrace her;
  - type: text
    content: happy are those who hold her tightly.
  '19':
  - type: text
    content: 'By wisdom the '
  - type: text
    content: Lord
  - type: text
    content: ' founded the earth;'
  - type: text
    content: by understanding he created the heavens.
  '2':
  - type: text
    content: If you do this, you will live many years,
  - type: text
    content: and your life will be satisfying.
  '20':
  - type: text
    content: By his knowledge the deep fountains of the earth burst forth,
  - type: text
    content: and the dew settles beneath the night sky.
  '21':
  - type: text
    content: My child, don’t lose sight of common sense and discernment.
  - type: text
    content: Hang on to them,
  '22':
  - type: text
    content: for they will refresh your soul.
  - type: text
    content: They are like jewels on a necklace.
  '23':
  - type: text
    content: They keep you safe on your way,
  - type: text
    content: and your feet will not stumble.
  '24':
  - type: text
    content: You can go to bed without fear;
  - type: text
    content: you will lie down and sleep soundly.
  '25':
  - type: text
    content: You need not be afraid of sudden disaster
  - type: text
    content: or the destruction that comes upon the wicked,
  '26':
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' is your security.'
  - type: text
    content: He will keep your foot from being caught in a trap.
  '27':
  - type: text
    content: Do not withhold good from those who deserve it
  - type: text
    content: when it’s in your power to help them.
  '28':
  - type: text
    content: If you can help your neighbor now, don’t say,
  - type: text
    content: “Come back tomorrow, and then I’ll help you.”
  '29':
  - type: text
    content: Don’t plot harm against your neighbor,
  - type: text
    content: for those who live nearby trust you.
  '3':
  - type: text
    content: Never let loyalty and kindness leave you!
  - type: text
    content: Tie them around your neck as a reminder.
  - type: text
    content: Write them deep within your heart.
  '30':
  - type: text
    content: Don’t pick a fight without reason,
  - type: text
    content: when no one has done you harm.
  '31':
  - type: text
    content: Don’t envy violent people
  - type: text
    content: or copy their ways.
  '32':
  - type: text
    content: 'Such wicked people are detestable to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: but he offers his friendship to the godly.
  '33':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' curses the house of the wicked,'
  - type: text
    content: but he blesses the home of the upright.
  '34':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' mocks the mockers'
  - type: text
    content: but is gracious to the humble.
  - type: note
    content: Greek version reads The Lord opposes the proud / but gives grace to the humble. Compare Jas 4:6; 1 Pet 5:5.
  '35':
  - type: text
    content: The wise inherit honor,
  - type: text
    content: but fools are put to shame!
  '4':
  - type: text
    content: Then you will find favor with both God and people,
  - type: text
    content: and you will earn a good reputation.
  '5':
  - type: text
    content: 'Trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' with all your heart;'
  - type: text
    content: do not depend on your own understanding.
  '6':
  - type: text
    content: Seek his will in all you do,
  - type: text
    content: and he will show you which path to take.
  '7':
  - type: text
    content: Don’t be impressed with your own wisdom.
  - type: text
    content: 'Instead, fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and turn away from evil.'
  '8':
  - type: text
    content: Then you will have healing for your body
  - type: text
    content: and strength for your bones.
  '9':
  - type: text
    content: 'Honor the '
  - type: text
    content: Lord
  - type: text
    content: ' with your wealth'
  - type: text
    content: and with the best part of everything you produce.
