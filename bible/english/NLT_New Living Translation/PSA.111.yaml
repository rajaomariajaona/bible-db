document_id: PSA.111,116
type_code: eng
verses:
  '1':
  - type: note
    content: This psalm is a Hebrew acrostic poem; after the introductory note of praise, each line begins with a successive letter of the Hebrew alphabet.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'I will thank the '
  - type: text
    content: Lord
  - type: text
    content: ' with all my heart'
  - type: text
    content: as I meet with his godly people.
  '10':
  - type: text
    content: 'Fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' is the foundation of true wisdom.'
  - type: text
    content: All who obey his commandments will grow in wisdom.
  - type: text
    content: Praise him forever!
  '2':
  - type: text
    content: 'How amazing are the deeds of the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: All who delight in him should ponder them.
  '3':
  - type: text
    content: Everything he does reveals his glory and majesty.
  - type: text
    content: His righteousness never fails.
  '4':
  - type: text
    content: He causes us to remember his wonderful works.
  - type: text
    content: 'How gracious and merciful is our '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '5':
  - type: text
    content: He gives food to those who fear him;
  - type: text
    content: he always remembers his covenant.
  '6':
  - type: text
    content: He has shown his great power to his people
  - type: text
    content: by giving them the lands of other nations.
  '7':
  - type: text
    content: All he does is just and good,
  - type: text
    content: and all his commandments are trustworthy.
  '8':
  - type: text
    content: They are forever true,
  - type: text
    content: to be obeyed faithfully and with integrity.
  '9':
  - type: text
    content: He has paid a full ransom for his people.
  - type: text
    content: He has guaranteed his covenant with them forever.
  - type: text
    content: What a holy, awe-inspiring name he has!
