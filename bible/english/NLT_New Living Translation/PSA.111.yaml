document_id: PSA.111,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '111 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm is a Hebrew acrostic poem; after the introductory note of praise, each line begins with a successive letter of the Hebrew alphabet.
      marker-yv: yv-n
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will thank the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with all my heart'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as I meet with his godly people.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is the foundation of true wisdom.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All who obey his commandments will grow in wisdom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise him forever!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How amazing are the deeds of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All who delight in him should ponder them.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything he does reveals his glory and majesty.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His righteousness never fails.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He causes us to remember his wonderful works.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'How gracious and merciful is our '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gives food to those who fear him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he always remembers his covenant.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has shown his great power to his people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by giving them the lands of other nations.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All he does is just and good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all his commandments are trustworthy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are forever true,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to be obeyed faithfully and with integrity.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has paid a full ransom for his people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has guaranteed his covenant with them forever.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What a holy, awe-inspiring name he has!
