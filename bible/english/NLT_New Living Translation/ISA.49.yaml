document_id: ISA.49,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Servant Commissioned
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to me, all you in distant lands!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pay attention, you who are far away!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' called me before my birth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from within the womb he called me by name.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will neither hunger nor thirst.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The searing sun will not reach them anymore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in his mercy will lead them;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will lead them beside cool waters.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will make my mountains into level paths for them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The highways will be raised above the valleys.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See, my people will return from far away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from lands to the north and west,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from as far south as Egypt.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Dead Sea Scrolls, which read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'from the region of Aswan, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'which is in southern Egypt. Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from the region of Sinim.
      marker-yv: yv-n
    - type: text
      text: ”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing for joy, O heavens!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rejoice, O earth!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Burst into song, O mountains!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has comforted his people'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will have compassion on them in their suffering.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet Jerusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zion.
      marker-yv: yv-n
    - type: text
      text: ' says, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has deserted us;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Lord has forgotten us.”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Never! Can a mother forget her nursing child?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can she feel no love for the child she has borne?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But even if that were possible,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would not forget you!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See, I have written your name on the palms of my hands.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Always in my mind is a picture of Jerusalem’s walls in ruins.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soon your descendants will come back,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all who are trying to destroy you will go away.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look around you and see,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all your children will come back to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As surely as I live,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “they will be like jewels or bridal ornaments for you to display.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Even the most desolate parts of your abandoned land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will soon be crowded with your people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your enemies who enslaved you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be far away.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made my words of judgment as sharp as a sword.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has hidden me in the shadow of his hand.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am like a sharp arrow in his quiver.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The generations born in exile will return and say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘We need more room! It’s crowded here!’
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you will think to yourself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Who has given me all these descendants?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For most of my children were killed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the rest were carried away into exile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was left here all alone.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Where did all these people come from?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who bore these children?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who raised them for me?’”
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “See, I will give a signal to the godless nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will carry your little sons back to you in their arms;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will bring your daughters on their shoulders.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kings and queens will serve you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and care for all your needs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will bow to the earth before you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lick the dust from your feet.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Those who trust in me will never be put to shame.”
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can snatch the plunder of war from the hands of a warrior?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can demand that a tyrant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Dead Sea Scrolls, Syriac version, and Latin Vulgate (also see 49:25); Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a righteous person.
      marker-yv: yv-n
    - type: text
      text: ' let his captives go?'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The captives of warriors will be released,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the plunder of tyrants will be retrieved.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I will fight those who fight you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will save your children.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will feed your enemies with their own flesh.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be drunk with rivers of their own blood.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All the world will know that I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: am your Savior and your Redeemer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Mighty One of Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of Jacob. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 14:1.
      marker-yv: yv-n
    - type: text
      text: ”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He said to me, “You are my servant, Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will bring me glory.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I replied, “But my work seems so useless!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have spent my strength for nothing and to no purpose.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet I leave it all in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s hand;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will trust God for my reward.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' speaks—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the one who formed me in my mother’s womb to be his servant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who commissioned me to bring Israel back to him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has honored me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my God has given me strength.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He says, “You will do more than restore the people of Israel to me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will make you a light to the Gentiles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will bring my salvation to the ends of the earth.”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the Redeemer'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Holy One of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: says to the one who is despised and rejected by the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to the one who is the servant of rulers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Kings will stand at attention when you pass by.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Princes will also bow low
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the faithful one,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Holy One of Israel, who has chosen you.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promises of Israel’s Restoration
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “At just the right time, I will respond to you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'I heard you. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare 2 Cor 6:2.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: On the day of salvation I will help you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will protect you and give you to the people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as my covenant with them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Through you I will reestablish the land of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and assign it to its own people again.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will say to the prisoners, ‘Come out in freedom,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to those in darkness, ‘Come into the light.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be my sheep, grazing in green pastures
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and on hills that were previously bare.
