document_id: ISA.49,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Servant Commissioned
  - type: text
    content: Listen to me, all you in distant lands!
  - type: text
    content: Pay attention, you who are far away!
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' called me before my birth;'
  - type: text
    content: from within the womb he called me by name.
  '10':
  - type: text
    content: They will neither hunger nor thirst.
  - type: text
    content: The searing sun will not reach them anymore.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' in his mercy will lead them;'
  - type: text
    content: he will lead them beside cool waters.
  '11':
  - type: text
    content: And I will make my mountains into level paths for them.
  - type: text
    content: The highways will be raised above the valleys.
  '12':
  - type: text
    content: See, my people will return from far away,
  - type: text
    content: from lands to the north and west,
  - type: text
    content: and from as far south as Egypt.
  - type: note
    content: As in Dead Sea Scrolls, which read from the region of Aswan, which is in southern Egypt. Masoretic Text reads from the region of Sinim.
  - type: text
    content: ”
  '13':
  - type: text
    content: Sing for joy, O heavens!
  - type: text
    content: Rejoice, O earth!
  - type: text
    content: Burst into song, O mountains!
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has comforted his people'
  - type: text
    content: and will have compassion on them in their suffering.
  '14':
  - type: text
    content: Yet Jerusalem
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ' says, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has deserted us;'
  - type: text
    content: the Lord has forgotten us.”
  '15':
  - type: text
    content: “Never! Can a mother forget her nursing child?
  - type: text
    content: Can she feel no love for the child she has borne?
  - type: text
    content: But even if that were possible,
  - type: text
    content: I would not forget you!
  '16':
  - type: text
    content: See, I have written your name on the palms of my hands.
  - type: text
    content: Always in my mind is a picture of Jerusalem’s walls in ruins.
  '17':
  - type: text
    content: Soon your descendants will come back,
  - type: text
    content: and all who are trying to destroy you will go away.
  '18':
  - type: text
    content: Look around you and see,
  - type: text
    content: for all your children will come back to you.
  - type: text
    content: 'As surely as I live,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “they will be like jewels or bridal ornaments for you to display.
  '19':
  - type: text
    content: “Even the most desolate parts of your abandoned land
  - type: text
    content: will soon be crowded with your people.
  - type: text
    content: Your enemies who enslaved you
  - type: text
    content: will be far away.
  '2':
  - type: text
    content: He made my words of judgment as sharp as a sword.
  - type: text
    content: He has hidden me in the shadow of his hand.
  - type: text
    content: I am like a sharp arrow in his quiver.
  '20':
  - type: text
    content: The generations born in exile will return and say,
  - type: text
    content: ‘We need more room! It’s crowded here!’
  '21':
  - type: text
    content: Then you will think to yourself,
  - type: text
    content: ‘Who has given me all these descendants?
  - type: text
    content: For most of my children were killed,
  - type: text
    content: and the rest were carried away into exile.
  - type: text
    content: I was left here all alone.
  - type: text
    content: Where did all these people come from?
  - type: text
    content: Who bore these children?
  - type: text
    content: Who raised them for me?’”
  '22':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “See, I will give a signal to the godless nations.
  - type: text
    content: They will carry your little sons back to you in their arms;
  - type: text
    content: they will bring your daughters on their shoulders.
  '23':
  - type: text
    content: Kings and queens will serve you
  - type: text
    content: and care for all your needs.
  - type: text
    content: They will bow to the earth before you
  - type: text
    content: and lick the dust from your feet.
  - type: text
    content: 'Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Those who trust in me will never be put to shame.”
  '24':
  - type: text
    content: Who can snatch the plunder of war from the hands of a warrior?
  - type: text
    content: Who can demand that a tyrant
  - type: note
    content: As in Dead Sea Scrolls, Syriac version, and Latin Vulgate (also see 49:25); Masoretic Text reads a righteous person.
  - type: text
    content: ' let his captives go?'
  '25':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' says,'
  - type: text
    content: “The captives of warriors will be released,
  - type: text
    content: and the plunder of tyrants will be retrieved.
  - type: text
    content: For I will fight those who fight you,
  - type: text
    content: and I will save your children.
  '26':
  - type: text
    content: I will feed your enemies with their own flesh.
  - type: text
    content: They will be drunk with rivers of their own blood.
  - type: text
    content: 'All the world will know that I, the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: am your Savior and your Redeemer,
  - type: text
    content: the Mighty One of Israel.
  - type: note
    content: Hebrew of Jacob. See note on 14:1.
  - type: text
    content: ”
  '3':
  - type: text
    content: He said to me, “You are my servant, Israel,
  - type: text
    content: and you will bring me glory.”
  '4':
  - type: text
    content: I replied, “But my work seems so useless!
  - type: text
    content: I have spent my strength for nothing and to no purpose.
  - type: text
    content: 'Yet I leave it all in the '
  - type: text
    content: Lord
  - type: text
    content: ’s hand;
  - type: text
    content: I will trust God for my reward.”
  '5':
  - type: text
    content: 'And now the '
  - type: text
    content: Lord
  - type: text
    content: ' speaks—'
  - type: text
    content: the one who formed me in my mother’s womb to be his servant,
  - type: text
    content: who commissioned me to bring Israel back to him.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has honored me,'
  - type: text
    content: and my God has given me strength.
  '6':
  - type: text
    content: He says, “You will do more than restore the people of Israel to me.
  - type: text
    content: I will make you a light to the Gentiles,
  - type: text
    content: and you will bring my salvation to the ends of the earth.”
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ', the Redeemer'
  - type: text
    content: and Holy One of Israel,
  - type: text
    content: says to the one who is despised and rejected by the nations,
  - type: text
    content: 'to the one who is the servant of rulers:'
  - type: text
    content: “Kings will stand at attention when you pass by.
  - type: text
    content: Princes will also bow low
  - type: text
    content: 'because of the '
  - type: text
    content: Lord
  - type: text
    content: ', the faithful one,'
  - type: text
    content: the Holy One of Israel, who has chosen you.”
  - type: heading
    content: Promises of Israel’s Restoration
  '8':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “At just the right time, I will respond to you.
  - type: note
    content: Greek version reads I heard you. Compare 2 Cor 6:2.
  - type: text
    content: On the day of salvation I will help you.
  - type: text
    content: I will protect you and give you to the people
  - type: text
    content: as my covenant with them.
  - type: text
    content: Through you I will reestablish the land of Israel
  - type: text
    content: and assign it to its own people again.
  '9':
  - type: text
    content: I will say to the prisoners, ‘Come out in freedom,’
  - type: text
    content: and to those in darkness, ‘Come into the light.’
  - type: text
    content: They will be my sheep, grazing in green pastures
  - type: text
    content: and on hills that were previously bare.
