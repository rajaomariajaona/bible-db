document_id: 2KI.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hezekiah’s Sickness and Recovery
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'About that time Hezekiah became deathly ill, and the prophet Isaiah son of Amoz went to visit him. He gave the king this message: “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Set your affairs in order, for you are going to die. You will not recover from this illness.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When Hezekiah heard this, he turned his face to the wall and prayed to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Remember, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', how I have always been faithful to you and have served you single-mindedly, always doing what pleases you.” Then he broke down and wept bitterly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But before Isaiah had left the middle courtyard,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version and an alternate reading in the Masoretic Text; the other alternate reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the middle of the city.
    marker-yv: yv-n
  - type: text
    text: ' this message came to him from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Go back to Hezekiah, the leader of my people. Tell him, ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of your ancestor David, says: I have heard your prayer and seen your tears. I will heal you, and three days from now you will get out of bed and go to the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I will add fifteen years to your life, and I will rescue you and this city from the king of Assyria. I will defend this city for my own honor and for the sake of my servant David.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then Isaiah said, “Make an ointment from figs.” So Hezekiah’s servants spread the ointment over the boil, and Hezekiah recovered!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Meanwhile, Hezekiah had said to Isaiah, “What sign will the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' give to prove that he will heal me and that I will go to the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' three days from now?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Isaiah replied, “This is the sign from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to prove that he will do as he promised. Would you like the shadow on the sundial to go forward ten steps or backward ten steps?'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The shadow on the sundial has gone forward ten steps; do you want it to go backward ten steps?
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“The shadow always moves forward,” Hezekiah replied, “so that would be easy. Make it go ten steps backward instead.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So Isaiah the prophet asked the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to do this, and he caused the shadow to move ten steps backward on the sundial'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the steps.
    marker-yv: yv-n
  - type: text
    text: ' of Ahaz!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Envoys from Babylon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Soon after this, Merodach-baladan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Hebrew manuscripts and Greek and Syriac versions (see also Isa 39:1); Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Berodach-baladan.
    marker-yv: yv-n
  - type: text
    text: ' son of Baladan, king of Babylon, sent Hezekiah his best wishes and a gift, for he had heard that Hezekiah had been very sick. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hezekiah received the Babylonian envoys and showed them everything in his treasure-houses—the silver, the gold, the spices, and the aromatic oils. He also took them to see his armory and showed them everything in his royal treasuries! There was nothing in his palace or kingdom that Hezekiah did not show them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then Isaiah the prophet went to King Hezekiah and asked him, “What did those men want? Where were they from?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Hezekiah replied, “They came from the distant land of Babylon.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “What did they see in your palace?” Isaiah asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: “They saw everything,” Hezekiah replied. “I showed them everything I own—all my royal treasuries.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Isaiah said to Hezekiah, “Listen to this message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The time is coming when everything in your palace—all the treasures stored up by your ancestors until now—will be carried off to Babylon. Nothing will be left, says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Some of your very own sons will be taken away into exile. They will become eunuchs who will serve in the palace of Babylon’s king.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Hezekiah said to Isaiah, “This message you have given me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is good.” For the king was thinking, “At least there will be peace and security during my lifetime.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The rest of the events in Hezekiah’s reign, including the extent of his power and how he built a pool and dug a tunnel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: watercourse.
    marker-yv: yv-n
  - type: text
    text: ' to bring water into the city, are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Judah.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Hezekiah died, and his son Manasseh became the next king.
