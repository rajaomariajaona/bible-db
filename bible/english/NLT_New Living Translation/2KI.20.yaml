document_id: 2KI.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah’s Sickness and Recovery
  - type: text
    content: 'About that time Hezekiah became deathly ill, and the prophet Isaiah son of Amoz went to visit him. He gave the king this message: “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Set your affairs in order, for you are going to die. You will not recover from this illness.”'
  '10':
  - type: text
    content: '“The shadow always moves forward,” Hezekiah replied, “so that would be easy. Make it go ten steps backward instead.” '
  '11':
  - type: text
    content: 'So Isaiah the prophet asked the '
  - type: text
    content: Lord
  - type: text
    content: ' to do this, and he caused the shadow to move ten steps backward on the sundial'
  - type: note
    content: Hebrew the steps.
  - type: text
    content: ' of Ahaz!'
  - type: heading
    content: Envoys from Babylon
  '12':
  - type: text
    content: Soon after this, Merodach-baladan
  - type: note
    content: As in some Hebrew manuscripts and Greek and Syriac versions (see also Isa 39:1); Masoretic Text reads Berodach-baladan.
  - type: text
    content: ' son of Baladan, king of Babylon, sent Hezekiah his best wishes and a gift, for he had heard that Hezekiah had been very sick. '
  '13':
  - type: text
    content: Hezekiah received the Babylonian envoys and showed them everything in his treasure-houses—the silver, the gold, the spices, and the aromatic oils. He also took them to see his armory and showed them everything in his royal treasuries! There was nothing in his palace or kingdom that Hezekiah did not show them.
  '14':
  - type: text
    content: Then Isaiah the prophet went to King Hezekiah and asked him, “What did those men want? Where were they from?”
  - type: text
    content: Hezekiah replied, “They came from the distant land of Babylon.”
  '15':
  - type: text
    content: “What did they see in your palace?” Isaiah asked.
  - type: text
    content: “They saw everything,” Hezekiah replied. “I showed them everything I own—all my royal treasuries.”
  '16':
  - type: text
    content: 'Then Isaiah said to Hezekiah, “Listen to this message from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '17':
  - type: text
    content: 'The time is coming when everything in your palace—all the treasures stored up by your ancestors until now—will be carried off to Babylon. Nothing will be left, says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: Some of your very own sons will be taken away into exile. They will become eunuchs who will serve in the palace of Babylon’s king.”
  '19':
  - type: text
    content: 'Then Hezekiah said to Isaiah, “This message you have given me from the '
  - type: text
    content: Lord
  - type: text
    content: ' is good.” For the king was thinking, “At least there will be peace and security during my lifetime.”'
  '2':
  - type: text
    content: 'When Hezekiah heard this, he turned his face to the wall and prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '20':
  - type: text
    content: The rest of the events in Hezekiah’s reign, including the extent of his power and how he built a pool and dug a tunnel
  - type: note
    content: Hebrew watercourse.
  - type: text
    content: ' to bring water into the city, are recorded in '
  - type: text
    content: The Book of the History of the Kings of Judah.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Hezekiah died, and his son Manasseh became the next king.
  '3':
  - type: text
    content: '“Remember, O '
  - type: text
    content: Lord
  - type: text
    content: ', how I have always been faithful to you and have served you single-mindedly, always doing what pleases you.” Then he broke down and wept bitterly.'
  '4':
  - type: text
    content: But before Isaiah had left the middle courtyard,
  - type: note
    content: As in Greek version and an alternate reading in the Masoretic Text; the other alternate reads the middle of the city.
  - type: text
    content: ' this message came to him from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '5':
  - type: text
    content: '“Go back to Hezekiah, the leader of my people. Tell him, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestor David, says: I have heard your prayer and seen your tears. I will heal you, and three days from now you will get out of bed and go to the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: I will add fifteen years to your life, and I will rescue you and this city from the king of Assyria. I will defend this city for my own honor and for the sake of my servant David.’”
  '7':
  - type: text
    content: Then Isaiah said, “Make an ointment from figs.” So Hezekiah’s servants spread the ointment over the boil, and Hezekiah recovered!
  '8':
  - type: text
    content: 'Meanwhile, Hezekiah had said to Isaiah, “What sign will the '
  - type: text
    content: Lord
  - type: text
    content: ' give to prove that he will heal me and that I will go to the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' three days from now?”'
  '9':
  - type: text
    content: 'Isaiah replied, “This is the sign from the '
  - type: text
    content: Lord
  - type: text
    content: ' to prove that he will do as he promised. Would you like the shadow on the sundial to go forward ten steps or backward ten steps?'
  - type: note
    content: Or The shadow on the sundial has gone forward ten steps; do you want it to go backward ten steps?
  - type: text
    content: ”
