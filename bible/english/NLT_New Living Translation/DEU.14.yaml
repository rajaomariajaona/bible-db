document_id: DEU.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Ceremonially Clean and Unclean Animals
  - type: text
    content: '“Since you are the people of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, never cut yourselves or shave the hair above your foreheads in mourning for the dead. '
  '10':
  - type: text
    content: You may not, however, eat marine animals that do not have both fins and scales. They are ceremonially unclean for you.
  '11':
  - type: text
    content: '“You may eat any bird that is ceremonially clean. '
  '12':
  - type: text
    content: 'These are the birds you may not eat: the griffon vulture, the bearded vulture, the black vulture, '
  '13':
  - type: text
    content: 'the kite, the falcon, buzzards of all kinds, '
  '14':
  - type: text
    content: 'ravens of all kinds, '
  '15':
  - type: text
    content: 'the eagle owl, the short-eared owl, the seagull, hawks of all kinds, '
  '16':
  - type: text
    content: 'the little owl, the great owl, the barn owl, '
  '17':
  - type: text
    content: 'the desert owl, the Egyptian vulture, the cormorant, '
  '18':
  - type: text
    content: the stork, herons of all kinds, the hoopoe, and the bat.
  '19':
  - type: text
    content: '“All winged insects that walk along the ground are ceremonially unclean for you and may not be eaten. '
  '2':
  - type: text
    content: 'You have been set apart as holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and he has chosen you from all the nations of the earth to be his own special treasure.'
  '20':
  - type: text
    content: But you may eat any winged bird or insect that is ceremonially clean.
  '21':
  - type: text
    content: '“You must not eat anything that has died a natural death. You may give it to a foreigner living in your town, or you may sell it to a stranger. But do not eat it yourselves, for you are set apart as holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  - type: text
    content: “You must not cook a young goat in its mother’s milk.
  - type: heading
    content: The Giving of Tithes
  '22':
  - type: text
    content: '“You must set aside a tithe of your crops—one-tenth of all the crops you harvest each year. '
  '23':
  - type: text
    content: 'Bring this tithe to the designated place of worship—the place the '
  - type: text
    content: Lord
  - type: text
    content: ' your God chooses for his name to be honored—and eat it there in his presence. This applies to your tithes of grain, new wine, olive oil, and the firstborn males of your flocks and herds. Doing this will teach you always to fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '24':
  - type: text
    content: '“Now when the '
  - type: text
    content: Lord
  - type: text
    content: ' your God blesses you with a good harvest, the place of worship he chooses for his name to be honored might be too far for you to bring the tithe. '
  '25':
  - type: text
    content: 'If so, you may sell the tithe portion of your crops and herds, put the money in a pouch, and go to the place the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has chosen. '
  '26':
  - type: text
    content: 'When you arrive, you may use the money to buy any kind of food you want—cattle, sheep, goats, wine, or other alcoholic drink. Then feast there in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and celebrate with your household. '
  '27':
  - type: text
    content: And do not neglect the Levites in your town, for they will receive no allotment of land among you.
  '28':
  - type: text
    content: '“At the end of every third year, bring the entire tithe of that year’s harvest and store it in the nearest town. '
  '29':
  - type: text
    content: 'Give it to the Levites, who will receive no allotment of land among you, as well as to the foreigners living among you, the orphans, and the widows in your towns, so they can eat and be satisfied. Then the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will bless you in all your work.'
  '3':
  - type: text
    content: '“You must not eat any detestable animals that are ceremonially unclean. '
  '4':
  - type: text
    content: These are the animals
  - type: note
    content: The identification of some of the animals and birds listed in this chapter is uncertain.
  - type: text
    content: ' you may eat: the ox, the sheep, the goat, '
  '5':
  - type: text
    content: the deer, the gazelle, the roe deer, the wild goat, the addax, the antelope, and the mountain sheep.
  '6':
  - type: text
    content: '“You may eat any animal that has completely split hooves and chews the cud, '
  '7':
  - type: text
    content: but if the animal doesn’t have both, it may not be eaten. So you may not eat the camel, the hare, or the hyrax.
  - type: note
    content: Or coney, or rock badger.
  - type: text
    content: ' They chew the cud but do not have split hooves, so they are ceremonially unclean for you. '
  '8':
  - type: text
    content: And you may not eat the pig. It has split hooves but does not chew the cud, so it is ceremonially unclean for you. You may not eat the meat of these animals or even touch their carcasses.
  '9':
  - type: text
    content: '“Of all the marine animals, you may eat whatever has both fins and scales. '
