document_id: DEU.14,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ceremonially Clean and Unclean Animals
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Since you are the people of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, never cut yourselves or shave the hair above your foreheads in mourning for the dead. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You may not, however, eat marine animals that do not have both fins and scales. They are ceremonially unclean for you.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You may eat any bird that is ceremonially clean. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the birds you may not eat: the griffon vulture, the bearded vulture, the black vulture, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the kite, the falcon, buzzards of all kinds, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ravens of all kinds, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the eagle owl, the short-eared owl, the seagull, hawks of all kinds, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the little owl, the great owl, the barn owl, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the desert owl, the Egyptian vulture, the cormorant, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the stork, herons of all kinds, the hoopoe, and the bat.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“All winged insects that walk along the ground are ceremonially unclean for you and may not be eaten. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'You have been set apart as holy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, and he has chosen you from all the nations of the earth to be his own special treasure.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But you may eat any winged bird or insect that is ceremonially clean.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You must not eat anything that has died a natural death. You may give it to a foreigner living in your town, or you may sell it to a stranger. But do not eat it yourselves, for you are set apart as holy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You must not cook a young goat in its mother’s milk.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Giving of Tithes
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“You must set aside a tithe of your crops—one-tenth of all the crops you harvest each year. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Bring this tithe to the designated place of worship—the place the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God chooses for his name to be honored—and eat it there in his presence. This applies to your tithes of grain, new wine, olive oil, and the firstborn males of your flocks and herds. Doing this will teach you always to fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God blesses you with a good harvest, the place of worship he chooses for his name to be honored might be too far for you to bring the tithe. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If so, you may sell the tithe portion of your crops and herds, put the money in a pouch, and go to the place the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has chosen. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When you arrive, you may use the money to buy any kind of food you want—cattle, sheep, goats, wine, or other alcoholic drink. Then feast there in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and celebrate with your household. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And do not neglect the Levites in your town, for they will receive no allotment of land among you.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“At the end of every third year, bring the entire tithe of that year’s harvest and store it in the nearest town. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Give it to the Levites, who will receive no allotment of land among you, as well as to the foreigners living among you, the orphans, and the widows in your towns, so they can eat and be satisfied. Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will bless you in all your work.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You must not eat any detestable animals that are ceremonially unclean. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These are the animals
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The identification of some of the animals and birds listed in this chapter is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' you may eat: the ox, the sheep, the goat, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the deer, the gazelle, the roe deer, the wild goat, the addax, the antelope, and the mountain sheep.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You may eat any animal that has completely split hooves and chews the cud, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but if the animal doesn’t have both, it may not be eaten. So you may not eat the camel, the hare, or the hyrax.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'coney, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rock badger.
      marker-yv: yv-n
    - type: text
      text: ' They chew the cud but do not have split hooves, so they are ceremonially unclean for you. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And you may not eat the pig. It has split hooves but does not chew the cud, so it is ceremonially unclean for you. You may not eat the meat of these animals or even touch their carcasses.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Of all the marine animals, you may eat whatever has both fins and scales. '
