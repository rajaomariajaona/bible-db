document_id: 1TI.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'All slaves should show full respect for their masters so they will not bring shame on the name of God and his teaching. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: If the masters are believers, that is no excuse for being disrespectful. Those slaves should work all the harder because their efforts are helping other believers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: brothers.
    marker-yv: yv-n
  - type: text
    text: ' who are well loved.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: False Teaching and True Riches
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Teach these things, Timothy, and encourage everyone to obey them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Some people may contradict our teaching, but these are the wholesome teachings of the Lord Jesus Christ. These teachings promote a godly life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Anyone who teaches something different is arrogant and lacks understanding. Such a person has an unhealthy desire to quibble over the meaning of words. This stirs up arguments ending in jealousy, division, slander, and evil suspicions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: These people always cause trouble. Their minds are corrupt, and they have turned their backs on the truth. To them, a show of godliness is just a way to become wealthy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Yet true godliness with contentment is itself great wealth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'After all, we brought nothing with us when we came into the world, and we can’t take anything with us when we leave it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So if we have enough food and clothing, let us be content.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But people who long to be rich fall into temptation and are trapped by many foolish and harmful desires that plunge them into ruin and destruction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For the love of money is the root of all kinds of evil. And some people, craving money, have wandered from the true faith and pierced themselves with many sorrows.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Final Instructions
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But you, Timothy, are a man of God; so run from all these evil things. Pursue righteousness and a godly life, along with faith, love, perseverance, and gentleness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fight the good fight for the true faith. Hold tightly to the eternal life to which God has called you, which you have declared so well before many witnesses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And I charge you before God, who gives life to all, and before Christ Jesus, who gave a good testimony before Pontius Pilate, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'that you obey this command without wavering. Then no one can find fault with you from now until our Lord Jesus Christ comes again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For,
- type: usfm
  marker: pmo
  children:
  - type: text
    text: 'At just the right time Christ will be revealed from heaven by the blessed and only almighty God, the King of all kings and Lord of all lords. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He alone can never die, and he lives in light so brilliant that no human can approach him. No human eye has ever seen him, nor ever will. All honor and power to him forever! Amen.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Teach those who are rich in this world not to be proud and not to trust in their money, which is so unreliable. Their trust should be in God, who richly gives us all we need for our enjoyment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tell them to use their money to do good. They should be rich in good works and generous to those in need, always being ready to share with others. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: By doing this they will be storing up their treasure as a good foundation for the future so that they may experience true life.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Timothy, guard what God has entrusted to you. Avoid godless, foolish discussions with those who oppose you with their so-called knowledge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Some people have wandered from the faith by following such foolishness.
- type: usfm
  marker: p
  children:
  - type: text
    text: May God’s grace be with you all.
