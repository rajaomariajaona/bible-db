document_id: PSA.8,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David, to be accompanied by a stringed instrument.'
  - type: note
    content: Hebrew according to the gittith.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', our Lord, your majestic name fills the earth!'
  - type: text
    content: Your glory is higher than the heavens.
  '2':
  - type: text
    content: You have taught children and infants
  - type: text
    content: to tell of your strength,
  - type: note
    content: Greek version reads to give you praise. Compare Matt 21:16.
  - type: text
    content: silencing your enemies
  - type: text
    content: and all who oppose you.
  '3':
  - type: text
    content: When I look at the night sky and see the work of your fingers—
  - type: text
    content: the moon and the stars you set in place—
  '4':
  - type: text
    content: what are mere mortals that you should think about them,
  - type: text
    content: human beings that you should care for them?
  - type: note
    content: Hebrew what is man that you should think of him, / the son of man that you should care for him?
  '5':
  - type: text
    content: Yet you made them only a little lower than God
  - type: note
    content: Or Yet you made them only a little lower than the angels; Hebrew reads Yet you made him [i.e., man] a little lower than Elohim.
  - type: text
    content: and crowned them
  - type: note
    content: Hebrew him [i.e., man]; similarly in 8:6.
  - type: text
    content: ' with glory and honor.'
  '6':
  - type: text
    content: You gave them charge of everything you made,
  - type: text
    content: putting all things under their authority—
  '7':
  - type: text
    content: the flocks and the herds
  - type: text
    content: and all the wild animals,
  '8':
  - type: text
    content: the birds in the sky, the fish in the sea,
  - type: text
    content: and everything that swims the ocean currents.
  '9':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', our Lord, your majestic name fills the earth!'
