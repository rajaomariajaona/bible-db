document_id: PSA.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of David, to be accompanied by a stringed instrument.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:TITLE '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: according to the gittith.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', our Lord, your majestic name fills the earth!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your glory is higher than the heavens.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have taught children and infants
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to tell of your strength,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'to give you praise. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Matt 21:16.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: silencing your enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all who oppose you.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I look at the night sky and see the work of your fingers—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the moon and the stars you set in place—
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: what are mere mortals that you should think about them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: human beings that you should care for them?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: what is man that you should think of him, / the son of man that you should care for him?
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet you made them only a little lower than God
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:5a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yet you made them only a little lower than the angels; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yet you made him '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[i.e., man] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a little lower than Elohim.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and crowned them
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:5b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'him '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[i.e., man]; similarly in 8:6.'
      marker-yv: yv-n
    - type: text
      text: ' with glory and honor.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You gave them charge of everything you made,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: putting all things under their authority—
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the flocks and the herds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the wild animals,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the birds in the sky, the fish in the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and everything that swims the ocean currents.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', our Lord, your majestic name fills the earth!'
