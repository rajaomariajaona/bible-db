document_id: LUK.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Discussion about the Sabbath
  - type: text
    content: 'One Sabbath day as Jesus was walking through some grainfields, his disciples broke off heads of grain, rubbed off the husks in their hands, and ate the grain. '
  '10':
  - type: text
    content: 'He looked around at them one by one and then said to the man, '
  - type: text
    content: “Hold out your hand.”
  - type: text
    content: ' So the man held out his hand, and it was restored! '
  '11':
  - type: text
    content: At this, the enemies of Jesus were wild with rage and began to discuss what to do with him.
  - type: heading
    content: Jesus Chooses the Twelve Apostles
  '12':
  - type: text
    content: 'One day soon afterward Jesus went up on a mountain to pray, and he prayed to God all night. '
  '13':
  - type: text
    content: 'At daybreak he called together all of his disciples and chose twelve of them to be apostles. Here are their names:'
  '14':
  - type: text
    content: Simon (whom he named Peter),
  - type: text
    content: Andrew (Peter’s brother),
  - type: text
    content: James,
  - type: text
    content: John,
  - type: text
    content: Philip,
  - type: text
    content: Bartholomew,
  '15':
  - type: text
    content: Matthew,
  - type: text
    content: Thomas,
  - type: text
    content: James (son of Alphaeus),
  - type: text
    content: Simon (who was called the zealot),
  '16':
  - type: text
    content: Judas (son of James),
  - type: text
    content: Judas Iscariot (who later betrayed him).
  - type: heading
    content: Crowds Follow Jesus
  '17':
  - type: text
    content: 'When they came down from the mountain, the disciples stood with Jesus on a large, level area, surrounded by many of his followers and by the crowds. There were people from all over Judea and from Jerusalem and from as far north as the seacoasts of Tyre and Sidon. '
  '18':
  - type: text
    content: They had come to hear him and to be healed of their diseases; and those troubled by evil
  - type: note
    content: Greek unclean.
  - type: text
    content: ' spirits were healed. '
  '19':
  - type: text
    content: Everyone tried to touch him, because healing power went out from him, and he healed everyone.
  - type: heading
    content: The Beatitudes
  '2':
  - type: text
    content: But some Pharisees said, “Why are you breaking the law by harvesting grain on the Sabbath?”
  '20':
  - type: text
    content: Then Jesus turned to his disciples and said,
  - type: text
    content: “God blesses you who are poor,
  - type: text
    content: for the Kingdom of God is yours.
  '21':
  - type: text
    content: ' '
  - type: text
    content: God blesses you who are hungry now,
  - type: text
    content: for you will be satisfied.
  - type: text
    content: God blesses you who weep now,
  - type: text
    content: for in due time you will laugh.
  '22':
  - type: text
    content: ' '
  - type: text
    content: What blessings await you when people hate you and exclude you and mock you and curse you as evil because you follow the Son of Man.
  - type: text
    content: ' '
  '23':
  - type: text
    content: When that happens, be happy! Yes, leap for joy! For a great reward awaits you in heaven. And remember, their ancestors treated the ancient prophets that same way.
  - type: heading
    content: Sorrows Foretold
  '24':
  - type: text
    content: ' '
  - type: text
    content: “What sorrow awaits you who are rich,
  - type: text
    content: for you have your only happiness now.
  '25':
  - type: text
    content: ' '
  - type: text
    content: What sorrow awaits you who are fat and prosperous now,
  - type: text
    content: for a time of awful hunger awaits you.
  - type: text
    content: What sorrow awaits you who laugh now,
  - type: text
    content: for your laughing will turn to mourning and sorrow.
  '26':
  - type: text
    content: ' '
  - type: text
    content: What sorrow awaits you who are praised by the crowds,
  - type: text
    content: for their ancestors also praised false prophets.
  - type: heading
    content: Love for Enemies
  '27':
  - type: text
    content: ' '
  - type: text
    content: “But to you who are willing to listen, I say, love your enemies! Do good to those who hate you.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Bless those who curse you. Pray for those who hurt you.
  - type: text
    content: ' '
  '29':
  - type: text
    content: If someone slaps you on one cheek, offer the other cheek also. If someone demands your coat, offer your shirt also.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Haven’t you read in the Scriptures what David did when he and his companions were hungry?
  - type: text
    content: ' '
  '30':
  - type: text
    content: Give to anyone who asks; and when things are taken away from you, don’t try to get them back.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Do to others as you would like them to do to you.
  '32':
  - type: text
    content: ' '
  - type: text
    content: “If you love only those who love you, why should you get credit for that? Even sinners love those who love them!
  - type: text
    content: ' '
  '33':
  - type: text
    content: And if you do good only to those who do good to you, why should you get credit? Even sinners do that much!
  - type: text
    content: ' '
  '34':
  - type: text
    content: And if you lend money only to those who can repay you, why should you get credit? Even sinners will lend to other sinners for a full return.
  '35':
  - type: text
    content: ' '
  - type: text
    content: “Love your enemies! Do good to them. Lend to them without expecting to be repaid. Then your reward from heaven will be very great, and you will truly be acting as children of the Most High, for he is kind to those who are unthankful and wicked.
  - type: text
    content: ' '
  '36':
  - type: text
    content: You must be compassionate, just as your Father is compassionate.
  - type: heading
    content: Do Not Judge Others
  '37':
  - type: text
    content: ' '
  - type: text
    content: “Do not judge others, and you will not be judged. Do not condemn others, or it will all come back against you. Forgive others, and you will be forgiven.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Give, and you will receive. Your gift will return to you in full—pressed down, shaken together to make room for more, running over, and poured into your lap. The amount you give will determine the amount you get back.
  - type: note
    content: Or The measure you give will be the measure you get back.
  - type: text
    content: ”
  '39':
  - type: text
    content: 'Then Jesus gave the following illustration: '
  - type: text
    content: “Can one blind person lead another? Won’t they both fall into a ditch?
  - type: text
    content: ' '
  '4':
  - type: text
    content: He went into the house of God and broke the law by eating the sacred loaves of bread that only the priests can eat. He also gave some to his companions.”
  - type: text
    content: ' '
  '40':
  - type: text
    content: Students
  - type: note
    content: Or Disciples.
  - type: text
    content: ' '
  - type: text
    content: are not greater than their teacher. But the student who is fully trained will become like the teacher.
  '41':
  - type: text
    content: ' '
  - type: text
    content: “And why worry about a speck in your friend’s eye
  - type: text
    content: ' '
  - type: note
    content: Greek your brother’s eye; also in 6:42.
  - type: text
    content: when you have a log in your own?
  - type: text
    content: ' '
  '42':
  - type: text
    content: How can you think of saying, ‘Friend,
  - type: note
    content: Greek Brother.
  - type: text
    content: ' '
  - type: text
    content: let me help you get rid of that speck in your eye,’ when you can’t see past the log in your own eye? Hypocrite! First get rid of the log in your own eye; then you will see well enough to deal with the speck in your friend’s eye.
  - type: heading
    content: The Tree and Its Fruit
  '43':
  - type: text
    content: ' '
  - type: text
    content: “A good tree can’t produce bad fruit, and a bad tree can’t produce good fruit.
  - type: text
    content: ' '
  '44':
  - type: text
    content: A tree is identified by its fruit. Figs are never gathered from thornbushes, and grapes are not picked from bramble bushes.
  - type: text
    content: ' '
  '45':
  - type: text
    content: A good person produces good things from the treasury of a good heart, and an evil person produces evil things from the treasury of an evil heart. What you say flows from what is in your heart.
  - type: heading
    content: Building on a Solid Foundation
  '46':
  - type: text
    content: ' '
  - type: text
    content: “So why do you keep calling me ‘Lord, Lord!’ when you don’t do what I say?
  - type: text
    content: ' '
  '47':
  - type: text
    content: I will show you what it’s like when someone comes to me, listens to my teaching, and then follows it.
  - type: text
    content: ' '
  '48':
  - type: text
    content: It is like a person building a house who digs deep and lays the foundation on solid rock. When the floodwaters rise and break against that house, it stands firm because it is well built.
  - type: text
    content: ' '
  '49':
  - type: text
    content: But anyone who hears and doesn’t obey is like a person who builds a house right on the ground, without a foundation. When the floods sweep down against that house, it will collapse into a heap of ruins.”
  '5':
  - type: text
    content: 'And Jesus added, '
  - type: text
    content: “The Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: is Lord, even over the Sabbath.”
  - type: heading
    content: Jesus Heals on the Sabbath
  '6':
  - type: text
    content: 'On another Sabbath day, a man with a deformed right hand was in the synagogue while Jesus was teaching. '
  '7':
  - type: text
    content: The teachers of religious law and the Pharisees watched Jesus closely. If he healed the man’s hand, they planned to accuse him of working on the Sabbath.
  '8':
  - type: text
    content: 'But Jesus knew their thoughts. He said to the man with the deformed hand, '
  - type: text
    content: “Come and stand in front of everyone.”
  - type: text
    content: ' So the man came forward. '
  '9':
  - type: text
    content: 'Then Jesus said to his critics, '
  - type: text
    content: “I have a question for you. Does the law permit good deeds on the Sabbath, or is it a day for doing evil? Is this a day to save life or to destroy it?”
