document_id: PSA.52,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:TITLE '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maskil. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may be a literary or musical term.
      marker-yv: yv-n
    - type: text
      text: ' of David, regarding the time Doeg the Edomite said to Saul, “David has gone to see Ahimelech.”'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Why do you boast about your crimes, great warrior?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t you realize God’s justice continues forever?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: All day long you plot destruction.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your tongue cuts like a sharp razor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’re an expert at telling lies.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: You love evil more than good
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and lies more than truth. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: You love to destroy others with your words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you liar!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But God will strike you down once and for all.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will pull you from your home
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and uproot you from the land of the living. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The righteous will see it and be amazed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will laugh and say,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Look what happens to mighty warriors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who do not trust in God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They trust their wealth instead
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and grow more and more bold in their wickedness.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But I am like an olive tree, thriving in the house of God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will always trust in God’s unfailing love.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I will praise you forever, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for what you have done.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will trust in your good name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the presence of your faithful people.
