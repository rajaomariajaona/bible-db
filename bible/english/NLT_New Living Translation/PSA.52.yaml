document_id: PSA.52,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm'
  - type: note
    content: Hebrew maskil. This may be a literary or musical term.
  - type: text
    content: ' of David, regarding the time Doeg the Edomite said to Saul, “David has gone to see Ahimelech.”'
  - type: text
    content: Why do you boast about your crimes, great warrior?
  - type: text
    content: Don’t you realize God’s justice continues forever?
  '2':
  - type: text
    content: All day long you plot destruction.
  - type: text
    content: Your tongue cuts like a sharp razor;
  - type: text
    content: you’re an expert at telling lies.
  '3':
  - type: text
    content: You love evil more than good
  - type: text
    content: 'and lies more than truth. '
  - type: text
    content: Interlude
  '4':
  - type: text
    content: You love to destroy others with your words,
  - type: text
    content: you liar!
  '5':
  - type: text
    content: But God will strike you down once and for all.
  - type: text
    content: He will pull you from your home
  - type: text
    content: 'and uproot you from the land of the living. '
  - type: text
    content: Interlude
  '6':
  - type: text
    content: The righteous will see it and be amazed.
  - type: text
    content: They will laugh and say,
  '7':
  - type: text
    content: “Look what happens to mighty warriors
  - type: text
    content: who do not trust in God.
  - type: text
    content: They trust their wealth instead
  - type: text
    content: and grow more and more bold in their wickedness.”
  '8':
  - type: text
    content: But I am like an olive tree, thriving in the house of God.
  - type: text
    content: I will always trust in God’s unfailing love.
  '9':
  - type: text
    content: I will praise you forever, O God,
  - type: text
    content: for what you have done.
  - type: text
    content: I will trust in your good name
  - type: text
    content: in the presence of your faithful people.
