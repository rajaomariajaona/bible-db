document_id: 1SA.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saul Tries to Kill David
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Saul now urged his servants and his son Jonathan to assassinate David. But Jonathan, because of his strong affection for David, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'told him what his father was planning. “Tomorrow morning,” he warned him, “you must find a hiding place out in the fields. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I’ll ask my father to go out there with me, and I’ll talk to him about you. Then I’ll tell you everything I can find out.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The next morning Jonathan spoke with his father about David, saying many good things about him. “The king must not sin against his servant David,” Jonathan said. “He’s never done anything to harm you. He has always helped you in any way he could. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Have you forgotten about the time he risked his life to kill the Philistine giant and how the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' brought a great victory to all Israel as a result? You were certainly happy about it then. Why should you murder an innocent man like David? There is no reason for it at all!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Saul listened to Jonathan and vowed, “As surely as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lives, David will not be killed.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Afterward Jonathan called David and told him what had happened. Then he brought David to Saul, and David served in the court as before.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: War broke out again after that, and David led his troops against the Philistines. He attacked them with such fury that they all ran away.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But one day when Saul was sitting at home, with spear in hand, the tormenting spirit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: evil spirit.
    marker-yv: yv-n
  - type: text
    text: ' from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' suddenly came upon him again. As David played his harp, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Saul hurled his spear at David. But David dodged out of the way, and leaving the spear stuck in the wall, he fled and escaped into the night.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Michal Saves David’s Life
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Saul sent troops to watch David’s house. They were told to kill David when he came out the next morning. But Michal, David’s wife, warned him, “If you don’t escape tonight, you will be dead by morning.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So she helped him climb out through a window, and he fled and escaped. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then she took an idol
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'teraphim; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 19:16.
    marker-yv: yv-n
  - type: text
    text: ' and put it in his bed, covered it with blankets, and put a cushion of goat’s hair at its head.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When the troops came to arrest David, she told them he was sick and couldn’t get out of bed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But Saul sent the troops back to get David. He ordered, “Bring him to me in his bed so I can kill him!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But when they came to carry David out, they discovered that it was only an idol in the bed with a cushion of goat’s hair at its head.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Why have you betrayed me like this and let my enemy escape?” Saul demanded of Michal.
- type: usfm
  marker: p
  children:
  - type: text
    text: “I had to,” Michal replied. “He threatened to kill me if I didn’t help him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So David escaped and went to Ramah to see Samuel, and he told him all that Saul had done to him. Then Samuel took David with him to live at Naioth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'When the report reached Saul that David was at Naioth in Ramah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'he sent troops to capture him. But when they arrived and saw Samuel leading a group of prophets who were prophesying, the Spirit of God came upon Saul’s men, and they also began to prophesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'When Saul heard what had happened, he sent other troops, but they, too, prophesied! The same thing happened a third time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Finally, Saul himself went to Ramah and arrived at the great well in Secu. “Where are Samuel and David?” he demanded.
- type: usfm
  marker: p
  children:
  - type: text
    text: “They are at Naioth in Ramah,” someone told him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But on the way to Naioth in Ramah the Spirit of God came even upon Saul, and he, too, began to prophesy all the way to Naioth! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He tore off his clothes and lay naked on the ground all day and all night, prophesying in the presence of Samuel. The people who were watching exclaimed, “What? Is even Saul a prophet?”
