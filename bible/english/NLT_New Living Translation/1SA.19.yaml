document_id: 1SA.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul Tries to Kill David
  - type: text
    content: 'Saul now urged his servants and his son Jonathan to assassinate David. But Jonathan, because of his strong affection for David, '
  '10':
  - type: text
    content: Saul hurled his spear at David. But David dodged out of the way, and leaving the spear stuck in the wall, he fled and escaped into the night.
  - type: heading
    content: Michal Saves David’s Life
  '11':
  - type: text
    content: 'Then Saul sent troops to watch David’s house. They were told to kill David when he came out the next morning. But Michal, David’s wife, warned him, “If you don’t escape tonight, you will be dead by morning.” '
  '12':
  - type: text
    content: 'So she helped him climb out through a window, and he fled and escaped. '
  '13':
  - type: text
    content: Then she took an idol
  - type: note
    content: Hebrew teraphim; also in 19:16.
  - type: text
    content: ' and put it in his bed, covered it with blankets, and put a cushion of goat’s hair at its head.'
  '14':
  - type: text
    content: When the troops came to arrest David, she told them he was sick and couldn’t get out of bed.
  '15':
  - type: text
    content: 'But Saul sent the troops back to get David. He ordered, “Bring him to me in his bed so I can kill him!” '
  '16':
  - type: text
    content: But when they came to carry David out, they discovered that it was only an idol in the bed with a cushion of goat’s hair at its head.
  '17':
  - type: text
    content: “Why have you betrayed me like this and let my enemy escape?” Saul demanded of Michal.
  - type: text
    content: “I had to,” Michal replied. “He threatened to kill me if I didn’t help him.”
  '18':
  - type: text
    content: 'So David escaped and went to Ramah to see Samuel, and he told him all that Saul had done to him. Then Samuel took David with him to live at Naioth. '
  '19':
  - type: text
    content: 'When the report reached Saul that David was at Naioth in Ramah, '
  '2':
  - type: text
    content: 'told him what his father was planning. “Tomorrow morning,” he warned him, “you must find a hiding place out in the fields. '
  '20':
  - type: text
    content: 'he sent troops to capture him. But when they arrived and saw Samuel leading a group of prophets who were prophesying, the Spirit of God came upon Saul’s men, and they also began to prophesy. '
  '21':
  - type: text
    content: 'When Saul heard what had happened, he sent other troops, but they, too, prophesied! The same thing happened a third time. '
  '22':
  - type: text
    content: Finally, Saul himself went to Ramah and arrived at the great well in Secu. “Where are Samuel and David?” he demanded.
  - type: text
    content: “They are at Naioth in Ramah,” someone told him.
  '23':
  - type: text
    content: 'But on the way to Naioth in Ramah the Spirit of God came even upon Saul, and he, too, began to prophesy all the way to Naioth! '
  '24':
  - type: text
    content: He tore off his clothes and lay naked on the ground all day and all night, prophesying in the presence of Samuel. The people who were watching exclaimed, “What? Is even Saul a prophet?”
  '3':
  - type: text
    content: I’ll ask my father to go out there with me, and I’ll talk to him about you. Then I’ll tell you everything I can find out.”
  '4':
  - type: text
    content: 'The next morning Jonathan spoke with his father about David, saying many good things about him. “The king must not sin against his servant David,” Jonathan said. “He’s never done anything to harm you. He has always helped you in any way he could. '
  '5':
  - type: text
    content: 'Have you forgotten about the time he risked his life to kill the Philistine giant and how the '
  - type: text
    content: Lord
  - type: text
    content: ' brought a great victory to all Israel as a result? You were certainly happy about it then. Why should you murder an innocent man like David? There is no reason for it at all!”'
  '6':
  - type: text
    content: 'So Saul listened to Jonathan and vowed, “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, David will not be killed.”'
  '7':
  - type: text
    content: Afterward Jonathan called David and told him what had happened. Then he brought David to Saul, and David served in the court as before.
  '8':
  - type: text
    content: War broke out again after that, and David led his troops against the Philistines. He attacked them with such fury that they all ran away.
  '9':
  - type: text
    content: But one day when Saul was sitting at home, with spear in hand, the tormenting spirit
  - type: note
    content: Or evil spirit.
  - type: text
    content: ' from the '
  - type: text
    content: Lord
  - type: text
    content: ' suddenly came upon him again. As David played his harp, '
