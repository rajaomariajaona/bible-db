document_id: PSA.6,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David, to be accompanied by an eight-stringed instrument.'
  - type: note
    content: Hebrew with stringed instruments; according to the sheminith.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', don’t rebuke me in your anger'
  - type: text
    content: or discipline me in your rage.
  '10':
  - type: text
    content: May all my enemies be disgraced and terrified.
  - type: text
    content: May they suddenly turn back in shame.
  '2':
  - type: text
    content: 'Have compassion on me, '
  - type: text
    content: Lord
  - type: text
    content: ', for I am weak.'
  - type: text
    content: 'Heal me, '
  - type: text
    content: Lord
  - type: text
    content: ', for my bones are in agony.'
  '3':
  - type: text
    content: I am sick at heart.
  - type: text
    content: 'How long, O '
  - type: text
    content: Lord
  - type: text
    content: ', until you restore me?'
  '4':
  - type: text
    content: 'Return, O '
  - type: text
    content: Lord
  - type: text
    content: ', and rescue me.'
  - type: text
    content: Save me because of your unfailing love.
  '5':
  - type: text
    content: For the dead do not remember you.
  - type: text
    content: Who can praise you from the grave?
  - type: note
    content: Hebrew from Sheol?
  '6':
  - type: text
    content: I am worn out from sobbing.
  - type: text
    content: All night I flood my bed with weeping,
  - type: text
    content: drenching it with my tears.
  '7':
  - type: text
    content: My vision is blurred by grief;
  - type: text
    content: my eyes are worn out because of all my enemies.
  '8':
  - type: text
    content: Go away, all you who do evil,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has heard my weeping.'
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has heard my plea;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will answer my prayer.'
