document_id: PSA.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of David, to be accompanied by an eight-stringed instrument.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:TITLE '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: with stringed instruments; according to the sheminith.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', don’t rebuke me in your anger'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or discipline me in your rage.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May all my enemies be disgraced and terrified.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May they suddenly turn back in shame.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Have compassion on me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for I am weak.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Heal me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for my bones are in agony.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am sick at heart.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'How long, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', until you restore me?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Return, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and rescue me.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Save me because of your unfailing love.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the dead do not remember you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can praise you from the grave?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from Sheol?
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am worn out from sobbing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All night I flood my bed with weeping,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: drenching it with my tears.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My vision is blurred by grief;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my eyes are worn out because of all my enemies.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go away, all you who do evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has heard my weeping.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has heard my plea;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will answer my prayer.'
