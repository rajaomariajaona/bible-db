document_id: PSA.129
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A song for pilgrims ascending to Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: From my earliest youth my enemies have persecuted me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Let all Israel repeat this:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: From my earliest youth my enemies have persecuted me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they have never defeated me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: My back is covered with cuts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as if a farmer had plowed long furrows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is good;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has cut me free from the ropes of the ungodly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: May all who hate Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '129:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zion.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: be turned back in shameful defeat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: May they be as useless as grass on a rooftop,
- type: usfm
  marker: q2
  children:
  - type: text
    text: turning yellow when only half grown,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ignored by the harvester,
- type: usfm
  marker: q2
  children:
  - type: text
    text: despised by the binder.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And may those who pass by
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'refuse to give them this blessing:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' bless you;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'we bless you in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s name.”
