document_id: PSA.129,116
type_code: eng
verses:
  '1':
  - type: text
    content: A song for pilgrims ascending to Jerusalem.
  - type: text
    content: From my earliest youth my enemies have persecuted me.
  - type: text
    content: 'Let all Israel repeat this:'
  '2':
  - type: text
    content: From my earliest youth my enemies have persecuted me,
  - type: text
    content: but they have never defeated me.
  '3':
  - type: text
    content: My back is covered with cuts,
  - type: text
    content: as if a farmer had plowed long furrows.
  '4':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' is good;'
  - type: text
    content: he has cut me free from the ropes of the ungodly.
  '5':
  - type: text
    content: May all who hate Jerusalem
  - type: note
    content: Hebrew Zion.
  - type: text
    content: be turned back in shameful defeat.
  '6':
  - type: text
    content: May they be as useless as grass on a rooftop,
  - type: text
    content: turning yellow when only half grown,
  '7':
  - type: text
    content: ignored by the harvester,
  - type: text
    content: despised by the binder.
  '8':
  - type: text
    content: And may those who pass by
  - type: text
    content: 'refuse to give them this blessing:'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' bless you;'
  - type: text
    content: 'we bless you in the '
  - type: text
    content: Lord
  - type: text
    content: ’s name.”
