document_id: 1SA.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonathan’s Daring Plan
  - type: text
    content: One day Jonathan said to his armor bearer, “Come on, let’s go over to where the Philistines have their outpost.” But Jonathan did not tell his father what he was doing.
  '10':
  - type: text
    content: 'But if they say, ‘Come on up and fight,’ then we will go up. That will be the '
  - type: text
    content: Lord
  - type: text
    content: ’s sign that he will help us defeat them.”
  '11':
  - type: text
    content: 'When the Philistines saw them coming, they shouted, “Look! The Hebrews are crawling out of their holes!” '
  '12':
  - type: text
    content: Then the men from the outpost shouted to Jonathan, “Come on up here, and we’ll teach you a lesson!”
  - type: text
    content: '“Come on, climb right behind me,” Jonathan said to his armor bearer, “for the '
  - type: text
    content: Lord
  - type: text
    content: ' will help us defeat them!”'
  '13':
  - type: text
    content: 'So they climbed up using both hands and feet, and the Philistines fell before Jonathan, and his armor bearer killed those who came behind them. '
  '14':
  - type: text
    content: They killed some twenty men in all, and their bodies were scattered over about half an acre.
  - type: note
    content: Hebrew half a yoke; a “yoke” was the amount of land plowed by a pair of yoked oxen in one day.
  '15':
  - type: text
    content: Suddenly, panic broke out in the Philistine army, both in the camp and in the field, including even the outposts and raiding parties. And just then an earthquake struck, and everyone was terrified.
  - type: heading
    content: Israel Defeats the Philistines
  '16':
  - type: text
    content: Saul’s lookouts in Gibeah of Benjamin saw a strange sight—the vast army of Philistines began to melt away in every direction.
  - type: note
    content: As in Greek version; Hebrew reads they went and there.
  - type: text
    content: ' '
  '17':
  - type: text
    content: “Call the roll and find out who’s missing,” Saul ordered. And when they checked, they found that Jonathan and his armor bearer were gone.
  '18':
  - type: text
    content: Then Saul shouted to Ahijah, “Bring the ephod here!” For at that time Ahijah was wearing the ephod in front of the Israelites.
  - type: note
    content: As in some Greek manuscripts; Hebrew reads “Bring the Ark of God.” For at that time the Ark of God was with the Israelites.
  - type: text
    content: ' '
  '19':
  - type: text
    content: But while Saul was talking to the priest, the confusion in the Philistine camp grew louder and louder. So Saul said to the priest, “Never mind; let’s get going!”
  - type: note
    content: Hebrew Withdraw your hand.
  '2':
  - type: text
    content: Meanwhile, Saul and his 600 men were camped on the outskirts of Gibeah, around the pomegranate tree
  - type: note
    content: Or around the rock of Rimmon; compare Judg 20:45, 47; 21:13.
  - type: text
    content: ' at Migron. '
  '20':
  - type: text
    content: 'Then Saul and all his men rushed out to the battle and found the Philistines killing each other. There was terrible confusion everywhere. '
  '21':
  - type: text
    content: 'Even the Hebrews who had previously gone over to the Philistine army revolted and joined in with Saul, Jonathan, and the rest of the Israelites. '
  '22':
  - type: text
    content: 'Likewise, the men of Israel who were hiding in the hill country of Ephraim joined the chase when they saw the Philistines running away. '
  '23':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' saved Israel that day, and the battle continued to rage even beyond Beth-aven.'
  - type: heading
    content: Saul’s Foolish Oath
  '24':
  - type: text
    content: 'Now the men of Israel were pressed to exhaustion that day, because Saul had placed them under an oath, saying, “Let a curse fall on anyone who eats before evening—before I have full revenge on my enemies.” So no one ate anything all day, '
  '25':
  - type: text
    content: 'even though they had all found honeycomb on the ground in the forest. '
  '26':
  - type: text
    content: They didn’t dare touch the honey because they all feared the oath they had taken.
  '27':
  - type: text
    content: But Jonathan had not heard his father’s command, and he dipped the end of his stick into a piece of honeycomb and ate the honey. After he had eaten it, he felt refreshed.
  - type: note
    content: Or his eyes brightened; similarly in 14:29.
  - type: text
    content: ' '
  '28':
  - type: text
    content: But one of the men saw him and said, “Your father made the army take a strict oath that anyone who eats food today will be cursed. That is why everyone is weary and faint.”
  '29':
  - type: text
    content: '“My father has made trouble for us all!” Jonathan exclaimed. “A command like that only hurts us. See how refreshed I am now that I have eaten this little bit of honey. '
  '3':
  - type: text
    content: 'Among Saul’s men was Ahijah the priest, who was wearing the ephod, the priestly vest. Ahijah was the son of Ichabod’s brother Ahitub, son of Phinehas, son of Eli, the priest of the '
  - type: text
    content: Lord
  - type: text
    content: ' who had served at Shiloh.'
  - type: text
    content: 'No one realized that Jonathan had left the Israelite camp. '
  '30':
  - type: text
    content: If the men had been allowed to eat freely from the food they found among our enemies, think how many more Philistines we could have killed!”
  '31':
  - type: text
    content: 'They chased and killed the Philistines all day from Micmash to Aijalon, growing more and more faint. '
  '32':
  - type: text
    content: 'That evening they rushed for the battle plunder and butchered the sheep, goats, cattle, and calves, but they ate them without draining the blood. '
  '33':
  - type: text
    content: 'Someone reported to Saul, “Look, the men are sinning against the '
  - type: text
    content: Lord
  - type: text
    content: ' by eating meat that still has blood in it.”'
  - type: text
    content: '“That is very wrong,” Saul said. “Find a large stone and roll it over here. '
  '34':
  - type: text
    content: 'Then go out among the troops and tell them, ‘Bring the cattle, sheep, and goats here to me. Kill them here, and drain the blood before you eat them. Do not sin against the '
  - type: text
    content: Lord
  - type: text
    content: ' by eating meat with the blood still in it.’”'
  - type: text
    content: 'So that night all the troops brought their animals and slaughtered them there. '
  '35':
  - type: text
    content: 'Then Saul built an altar to the '
  - type: text
    content: Lord
  - type: text
    content: '; it was the first of the altars he built to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '36':
  - type: text
    content: Then Saul said, “Let’s chase the Philistines all night and plunder them until sunrise. Let’s destroy every last one of them.”
  - type: text
    content: His men replied, “We’ll do whatever you think is best.”
  - type: text
    content: But the priest said, “Let’s ask God first.”
  '37':
  - type: text
    content: So Saul asked God, “Should we go after the Philistines? Will you help us defeat them?” But God made no reply that day.
  '38':
  - type: text
    content: 'Then Saul said to the leaders, “Something’s wrong! I want all my army commanders to come here. We must find out what sin was committed today. '
  '39':
  - type: text
    content: 'I vow by the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' who rescued Israel that the sinner will surely die, even if it is my own son Jonathan!” But no one would tell him what the trouble was.'
  '4':
  - type: text
    content: 'To reach the Philistine outpost, Jonathan had to go down between two rocky cliffs that were called Bozez and Seneh. '
  '40':
  - type: text
    content: Then Saul said, “Jonathan and I will stand over here, and all of you stand over there.”
  - type: text
    content: And the people responded to Saul, “Whatever you think is best.”
  '41':
  - type: text
    content: 'Then Saul prayed, “O '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, please show us who is guilty and who is innocent.'
  - type: note
    content: Greek version adds If the fault is with me or my son Jonathan, respond with Urim; but if the men of Israel are at fault, respond with Thummim.
  - type: text
    content: ” Then they cast sacred lots, and Jonathan and Saul were chosen as the guilty ones, and the people were declared innocent.
  '42':
  - type: text
    content: Then Saul said, “Now cast lots again and choose between me and Jonathan.” And Jonathan was shown to be the guilty one.
  '43':
  - type: text
    content: “Tell me what you have done,” Saul demanded of Jonathan.
  - type: text
    content: “I tasted a little honey,” Jonathan admitted. “It was only a little bit on the end of my stick. Does that deserve death?”
  '44':
  - type: text
    content: “Yes, Jonathan,” Saul said, “you must die! May God strike me and even kill me if you do not die for this.”
  '45':
  - type: text
    content: 'But the people broke in and said to Saul, “Jonathan has won this great victory for Israel. Should he die? Far from it! As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, not one hair on his head will be touched, for God helped him do a great deed today.” So the people rescued Jonathan, and he was not put to death.'
  '46':
  - type: text
    content: Then Saul called back the army from chasing the Philistines, and the Philistines returned home.
  - type: heading
    content: Saul’s Military Successes
  '47':
  - type: text
    content: Now when Saul had secured his grasp on Israel’s throne, he fought against his enemies in every direction—against Moab, Ammon, Edom, the kings of Zobah, and the Philistines. And wherever he turned, he was victorious.
  - type: note
    content: As in Greek version; Hebrew reads he acted wickedly.
  - type: text
    content: ' '
  '48':
  - type: text
    content: He performed great deeds and conquered the Amalekites, saving Israel from all those who had plundered them.
  '49':
  - type: text
    content: Saul’s sons included Jonathan, Ishbosheth,
  - type: note
    content: Hebrew Ishvi, a variant name for Ishbosheth; also known as Esh-baal.
  - type: text
    content: ' and Malkishua. He also had two daughters: Merab, who was older, and Michal. '
  '5':
  - type: text
    content: 'The cliff on the north was in front of Micmash, and the one on the south was in front of Geba. '
  '50':
  - type: text
    content: 'Saul’s wife was Ahinoam, the daughter of Ahimaaz. The commander of Saul’s army was Abner, the son of Saul’s uncle Ner. '
  '51':
  - type: text
    content: Saul’s father, Kish, and Abner’s father, Ner, were both sons of Abiel.
  '52':
  - type: text
    content: The Israelites fought constantly with the Philistines throughout Saul’s lifetime. So whenever Saul observed a young man who was brave and strong, he drafted him into his army.
  '6':
  - type: text
    content: '“Let’s go across to the outpost of those pagans,” Jonathan said to his armor bearer. “Perhaps the '
  - type: text
    content: Lord
  - type: text
    content: ' will help us, for nothing can hinder the '
  - type: text
    content: Lord
  - type: text
    content: . He can win a battle whether he has many warriors or only a few!”
  '7':
  - type: text
    content: “Do what you think is best,” the armor bearer replied. “I’m with you completely, whatever you decide.”
  '8':
  - type: text
    content: '“All right, then,” Jonathan told him. “We will cross over and let them see us. '
  '9':
  - type: text
    content: 'If they say to us, ‘Stay where you are or we’ll kill you,’ then we will stop and not go up to them. '
