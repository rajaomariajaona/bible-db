document_id: 1SA.14,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jonathan’s Daring Plan
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: One day Jonathan said to his armor bearer, “Come on, let’s go over to where the Philistines have their outpost.” But Jonathan did not tell his father what he was doing.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if they say, ‘Come on up and fight,’ then we will go up. That will be the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s sign that he will help us defeat them.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Philistines saw them coming, they shouted, “Look! The Hebrews are crawling out of their holes!” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the men from the outpost shouted to Jonathan, “Come on up here, and we’ll teach you a lesson!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Come on, climb right behind me,” Jonathan said to his armor bearer, “for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will help us defeat them!”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they climbed up using both hands and feet, and the Philistines fell before Jonathan, and his armor bearer killed those who came behind them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They killed some twenty men in all, and their bodies were scattered over about half an acre.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'half a yoke; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a “yoke” was the amount of land plowed by a pair of yoked oxen in one day.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Suddenly, panic broke out in the Philistine army, both in the camp and in the field, including even the outposts and raiding parties. And just then an earthquake struck, and everyone was terrified.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel Defeats the Philistines
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Saul’s lookouts in Gibeah of Benjamin saw a strange sight—the vast army of Philistines began to melt away in every direction.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: they went and there.
      marker-yv: yv-n
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “Call the roll and find out who’s missing,” Saul ordered. And when they checked, they found that Jonathan and his armor bearer were gone.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Saul shouted to Ahijah, “Bring the ephod here!” For at that time Ahijah was wearing the ephod in front of the Israelites.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: “Bring the Ark of God.” For at that time the Ark of God was with the Israelites.
      marker-yv: yv-n
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But while Saul was talking to the priest, the confusion in the Philistine camp grew louder and louder. So Saul said to the priest, “Never mind; let’s get going!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Withdraw your hand.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, Saul and his 600 men were camped on the outskirts of Gibeah, around the pomegranate tree
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'around the rock of Rimmon; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare Judg 20:45, 47; 21:13.
      marker-yv: yv-n
    - type: text
      text: ' at Migron. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul and all his men rushed out to the battle and found the Philistines killing each other. There was terrible confusion everywhere. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even the Hebrews who had previously gone over to the Philistine army revolted and joined in with Saul, Jonathan, and the rest of the Israelites. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Likewise, the men of Israel who were hiding in the hill country of Ephraim joined the chase when they saw the Philistines running away. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saved Israel that day, and the battle continued to rage even beyond Beth-aven.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul’s Foolish Oath
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now the men of Israel were pressed to exhaustion that day, because Saul had placed them under an oath, saying, “Let a curse fall on anyone who eats before evening—before I have full revenge on my enemies.” So no one ate anything all day, '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'even though they had all found honeycomb on the ground in the forest. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: They didn’t dare touch the honey because they all feared the oath they had taken.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Jonathan had not heard his father’s command, and he dipped the end of his stick into a piece of honeycomb and ate the honey. After he had eaten it, he felt refreshed.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'his eyes brightened; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly in 14:29.
      marker-yv: yv-n
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But one of the men saw him and said, “Your father made the army take a strict oath that anyone who eats food today will be cursed. That is why everyone is weary and faint.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“My father has made trouble for us all!” Jonathan exclaimed. “A command like that only hurts us. See how refreshed I am now that I have eaten this little bit of honey. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Among Saul’s men was Ahijah the priest, who was wearing the ephod, the priestly vest. Ahijah was the son of Ichabod’s brother Ahitub, son of Phinehas, son of Eli, the priest of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who had served at Shiloh.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No one realized that Jonathan had left the Israelite camp. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If the men had been allowed to eat freely from the food they found among our enemies, think how many more Philistines we could have killed!”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They chased and killed the Philistines all day from Micmash to Aijalon, growing more and more faint. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That evening they rushed for the battle plunder and butchered the sheep, goats, cattle, and calves, but they ate them without draining the blood. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Someone reported to Saul, “Look, the men are sinning against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by eating meat that still has blood in it.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“That is very wrong,” Saul said. “Find a large stone and roll it over here. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then go out among the troops and tell them, ‘Bring the cattle, sheep, and goats here to me. Kill them here, and drain the blood before you eat them. Do not sin against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by eating meat with the blood still in it.’”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So that night all the troops brought their animals and slaughtered them there. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul built an altar to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '; it was the first of the altars he built to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Saul said, “Let’s chase the Philistines all night and plunder them until sunrise. Let’s destroy every last one of them.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: His men replied, “We’ll do whatever you think is best.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the priest said, “Let’s ask God first.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Saul asked God, “Should we go after the Philistines? Will you help us defeat them?” But God made no reply that day.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul said to the leaders, “Something’s wrong! I want all my army commanders to come here. We must find out what sin was committed today. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I vow by the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who rescued Israel that the sinner will surely die, even if it is my own son Jonathan!” But no one would tell him what the trouble was.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To reach the Philistine outpost, Jonathan had to go down between two rocky cliffs that were called Bozez and Seneh. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Saul said, “Jonathan and I will stand over here, and all of you stand over there.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the people responded to Saul, “Whatever you think is best.”
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul prayed, “O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of Israel, please show us who is guilty and who is innocent.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version adds '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: If the fault is with me or my son Jonathan, respond with Urim; but if the men of Israel are at fault, respond with Thummim.
      marker-yv: yv-n
    - type: text
      text: ” Then they cast sacred lots, and Jonathan and Saul were chosen as the guilty ones, and the people were declared innocent.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Saul said, “Now cast lots again and choose between me and Jonathan.” And Jonathan was shown to be the guilty one.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Tell me what you have done,” Saul demanded of Jonathan.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I tasted a little honey,” Jonathan admitted. “It was only a little bit on the end of my stick. Does that deserve death?”
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, Jonathan,” Saul said, “you must die! May God strike me and even kill me if you do not die for this.”
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people broke in and said to Saul, “Jonathan has won this great victory for Israel. Should he die? Far from it! As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, not one hair on his head will be touched, for God helped him do a great deed today.” So the people rescued Jonathan, and he was not put to death.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Saul called back the army from chasing the Philistines, and the Philistines returned home.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul’s Military Successes
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Now when Saul had secured his grasp on Israel’s throne, he fought against his enemies in every direction—against Moab, Ammon, Edom, the kings of Zobah, and the Philistines. And wherever he turned, he was victorious.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he acted wickedly.
      marker-yv: yv-n
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He performed great deeds and conquered the Amalekites, saving Israel from all those who had plundered them.
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul’s sons included Jonathan, Ishbosheth,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ishvi, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant name for Ishbosheth; also known as Esh-baal.
      marker-yv: yv-n
    - type: text
      text: ' and Malkishua. He also had two daughters: Merab, who was older, and Michal. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The cliff on the north was in front of Micmash, and the one on the south was in front of Geba. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul’s wife was Ahinoam, the daughter of Ahimaaz. The commander of Saul’s army was Abner, the son of Saul’s uncle Ner. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul’s father, Kish, and Abner’s father, Ner, were both sons of Abiel.
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Israelites fought constantly with the Philistines throughout Saul’s lifetime. So whenever Saul observed a young man who was brave and strong, he drafted him into his army.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Let’s go across to the outpost of those pagans,” Jonathan said to his armor bearer. “Perhaps the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will help us, for nothing can hinder the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . He can win a battle whether he has many warriors or only a few!”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do what you think is best,” the armor bearer replied. “I’m with you completely, whatever you decide.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“All right, then,” Jonathan told him. “We will cross over and let them see us. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If they say to us, ‘Stay where you are or we’ll kill you,’ then we will stop and not go up to them. '
