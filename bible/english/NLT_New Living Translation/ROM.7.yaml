document_id: ROM.7,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: No Longer Bound to the Law
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Now, dear brothers and sisters
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 7:4.
      marker-yv: yv-n
    - type: text
      text: '—you who are familiar with the law—don’t you know that the law applies only while a person is living? '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'and I died. So I discovered that the law’s commands, which were supposed to bring life, brought spiritual death instead. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Sin took advantage of those commands and deceived me; it used the commands to kill me. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But still, the law itself is holy, and its commands are holy and right and good.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But how can that be? Did the law, which is good, cause my death? Of course not! Sin used what was good to bring about my condemnation to death. So we can see how terrible sin really is. It uses God’s good commands for its own evil purposes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Struggling with Sin
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So the trouble is not with the law, for it is spiritual and good. The trouble is with me, for I am all too human, a slave to sin. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I don’t really understand myself, for I want to do what is right, but I don’t do it. Instead, I do what I hate. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But if I know that what I am doing is wrong, this shows that I agree that the law is good. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So I am not the one doing wrong; it is sin living in me that does it.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I know that nothing good lives in me, that is, in my sinful nature.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'my flesh; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 7:25.
      marker-yv: yv-n
    - type: text
      text: ' I want to do what is right, but I can’t. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I want to do what is good, but I don’t. I don’t want to do what is wrong, but I do it anyway. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For example, when a woman marries, the law binds her to her husband as long as he is alive. But if he dies, the laws of marriage no longer apply to her. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if I do what I don’t want to do, I am not really the one doing wrong; it is sin living in me that does it.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have discovered this principle of life—that when I want to do what is right, I inevitably do what is wrong. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I love God’s law with all my heart. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But there is another power
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'law; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 7:23b.
      marker-yv: yv-n
    - type: text
      text: ' within me that is at war with my mind. This power makes me a slave to the sin that is still within me. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oh, what a miserable person I am! Who will free me from this life that is dominated by sin and death? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thank God! The answer is in Jesus Christ our Lord. So you see how it is: In my mind I really want to obey God’s law, but because of my sinful nature I am a slave to sin.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So while her husband is alive, she would be committing adultery if she married another man. But if her husband dies, she is free from that law and does not commit adultery when she remarries.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So, my dear brothers and sisters, this is the point: You died to the power of the law when you died with Christ. And now you are united with the one who was raised from the dead. As a result, we can produce a harvest of good deeds for God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When we were controlled by our old nature,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: When we were in the flesh.
      marker-yv: yv-n
    - type: text
      text: ' sinful desires were at work within us, and the law aroused these evil desires that produced a harvest of sinful deeds, resulting in death. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But now we have been released from the law, for we died to it and are no longer captive to its power. Now we can serve God, not in the old way of obeying the letter of the law, but in the new way of living in the Spirit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Law Reveals Our Sin
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Well then, am I suggesting that the law of God is sinful? Of course not! In fact, it was the law that showed me my sin. I would never have known that coveting is wrong if the law had not said, “You must not covet.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 20:17; Deut 5:21.
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But sin used this command to arouse all kinds of covetous desires within me! If there were no law, sin would not have that power. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'At one time I lived without understanding the law. But when I learned the command not to covet, for instance, the power of sin came to life, '
