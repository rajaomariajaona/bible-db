document_id: PSA.71,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', I have come to you for protection;'
  - type: text
    content: don’t let me be disgraced.
  '10':
  - type: text
    content: For my enemies are whispering against me.
  - type: text
    content: They are plotting together to kill me.
  '11':
  - type: text
    content: They say, “God has abandoned him.
  - type: text
    content: Let’s go and get him,
  - type: text
    content: for no one will help him now.”
  '12':
  - type: text
    content: O God, don’t stay away.
  - type: text
    content: My God, please hurry to help me.
  '13':
  - type: text
    content: Bring disgrace and destruction on my accusers.
  - type: text
    content: Humiliate and shame those who want to harm me.
  '14':
  - type: text
    content: But I will keep on hoping for your help;
  - type: text
    content: I will praise you more and more.
  '15':
  - type: text
    content: I will tell everyone about your righteousness.
  - type: text
    content: All day long I will proclaim your saving power,
  - type: text
    content: though I am not skilled with words.
  - type: note
    content: Or though I cannot count it.
  '16':
  - type: text
    content: 'I will praise your mighty deeds, O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: I will tell everyone that you alone are just.
  '17':
  - type: text
    content: O God, you have taught me from my earliest childhood,
  - type: text
    content: and I constantly tell others about the wonderful things you do.
  '18':
  - type: text
    content: Now that I am old and gray,
  - type: text
    content: do not abandon me, O God.
  - type: text
    content: Let me proclaim your power to this new generation,
  - type: text
    content: your mighty miracles to all who come after me.
  '19':
  - type: text
    content: Your righteousness, O God, reaches to the highest heavens.
  - type: text
    content: You have done such wonderful things.
  - type: text
    content: Who can compare with you, O God?
  '2':
  - type: text
    content: Save me and rescue me,
  - type: text
    content: for you do what is right.
  - type: text
    content: Turn your ear to listen to me,
  - type: text
    content: and set me free.
  '20':
  - type: text
    content: You have allowed me to suffer much hardship,
  - type: text
    content: but you will restore me to life again
  - type: text
    content: and lift me up from the depths of the earth.
  '21':
  - type: text
    content: You will restore me to even greater honor
  - type: text
    content: and comfort me once again.
  '22':
  - type: text
    content: Then I will praise you with music on the harp,
  - type: text
    content: because you are faithful to your promises, O my God.
  - type: text
    content: I will sing praises to you with a lyre,
  - type: text
    content: O Holy One of Israel.
  '23':
  - type: text
    content: I will shout for joy and sing your praises,
  - type: text
    content: for you have ransomed me.
  '24':
  - type: text
    content: I will tell about your righteous deeds
  - type: text
    content: all day long,
  - type: text
    content: for everyone who tried to hurt me
  - type: text
    content: has been shamed and humiliated.
  '3':
  - type: text
    content: Be my rock of safety
  - type: text
    content: where I can always hide.
  - type: text
    content: Give the order to save me,
  - type: text
    content: for you are my rock and my fortress.
  '4':
  - type: text
    content: My God, rescue me from the power of the wicked,
  - type: text
    content: from the clutches of cruel oppressors.
  '5':
  - type: text
    content: O Lord, you alone are my hope.
  - type: text
    content: 'I’ve trusted you, O '
  - type: text
    content: Lord
  - type: text
    content: ', from childhood.'
  '6':
  - type: text
    content: Yes, you have been with me from birth;
  - type: text
    content: from my mother’s womb you have cared for me.
  - type: text
    content: No wonder I am always praising you!
  '7':
  - type: text
    content: My life is an example to many,
  - type: text
    content: because you have been my strength and protection.
  '8':
  - type: text
    content: That is why I can never stop praising you;
  - type: text
    content: I declare your glory all day long.
  '9':
  - type: text
    content: And now, in my old age, don’t set me aside.
  - type: text
    content: Don’t abandon me when my strength is failing.
