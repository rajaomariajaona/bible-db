document_id: PSA.71
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I have come to you for protection;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t let me be disgraced.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Save me and rescue me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you do what is right.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Turn your ear to listen to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and set me free.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Be my rock of safety
- type: usfm
  marker: q2
  children:
  - type: text
    text: where I can always hide.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give the order to save me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you are my rock and my fortress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: My God, rescue me from the power of the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the clutches of cruel oppressors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: O Lord, you alone are my hope.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I’ve trusted you, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', from childhood.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Yes, you have been with me from birth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: from my mother’s womb you have cared for me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No wonder I am always praising you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: My life is an example to many,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because you have been my strength and protection.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: That is why I can never stop praising you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I declare your glory all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And now, in my old age, don’t set me aside.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t abandon me when my strength is failing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For my enemies are whispering against me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are plotting together to kill me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They say, “God has abandoned him.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let’s go and get him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for no one will help him now.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: O God, don’t stay away.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My God, please hurry to help me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Bring disgrace and destruction on my accusers.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Humiliate and shame those who want to harm me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But I will keep on hoping for your help;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will praise you more and more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I will tell everyone about your righteousness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All day long I will proclaim your saving power,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though I am not skilled with words.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '71:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: though I cannot count it.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I will praise your mighty deeds, O Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will tell everyone that you alone are just.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: O God, you have taught me from my earliest childhood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I constantly tell others about the wonderful things you do.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Now that I am old and gray,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not abandon me, O God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let me proclaim your power to this new generation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your mighty miracles to all who come after me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Your righteousness, O God, reaches to the highest heavens.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have done such wonderful things.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can compare with you, O God?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You have allowed me to suffer much hardship,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you will restore me to life again
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lift me up from the depths of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: You will restore me to even greater honor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and comfort me once again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then I will praise you with music on the harp,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because you are faithful to your promises, O my God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will sing praises to you with a lyre,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I will shout for joy and sing your praises,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you have ransomed me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: I will tell about your righteous deeds
- type: usfm
  marker: q2
  children:
  - type: text
    text: all day long,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for everyone who tried to hurt me
- type: usfm
  marker: q2
  children:
  - type: text
    text: has been shamed and humiliated.
