document_id: LEV.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Instructions for the Priests
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, “Give the following instructions to the priests, the descendants of Aaron.'
- type: usfm
  marker: p
  children:
  - type: text
    text: '“A priest must not make himself ceremonially unclean by touching the dead body of a relative. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The only exceptions are his closest relatives—his mother or father, son or daughter, brother, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'or his virgin sister who depends on him because she has no husband. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But a priest must not defile himself and make himself unclean for someone who is related to him only by marriage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“The priests must not shave their heads or trim their beards or cut their bodies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They must be set apart as holy to their God and must never bring shame on the name of God. They must be holy, for they are the ones who present the special gifts to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', gifts of food for their God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Priests may not marry a woman defiled by prostitution, and they may not marry a woman who is divorced from her husband, for the priests are set apart as holy to their God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'You must treat them as holy because they offer up food to your God. You must consider them holy because I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', am holy, and I make you holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “If a priest’s daughter defiles herself by becoming a prostitute, she also defiles her father’s holiness, and she must be burned to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “The high priest has the highest rank of all the priests. The anointing oil has been poured on his head, and he has been ordained to wear the priestly garments. He must never leave his hair uncombed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: never uncover his head.
    marker-yv: yv-n
  - type: text
    text: ' or tear his clothing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He must not defile himself by going near a dead body. He may not make himself ceremonially unclean even for his father or mother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He must not defile the sanctuary of his God by leaving it to attend to a dead person, for he has been made holy by the anointing oil of his God. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“The high priest may marry only a virgin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He may not marry a widow, a woman who is divorced, or a woman who has defiled herself by prostitution. She must be a virgin from his own clan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'so that he will not dishonor his descendants among his clan, for I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' who makes him holy.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Give the following instructions to Aaron: In all future generations, none of your descendants who has any defect will qualify to offer food to his God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'No one who has a defect qualifies, whether he is blind, lame, disfigured, deformed, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'or has a broken foot or arm, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'or is hunchbacked or dwarfed, or has a defective eye, or skin sores or scabs, or damaged testicles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'No descendant of Aaron who has a defect may approach the altar to present special gifts to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. Since he has a defect, he may not approach the altar to offer food to his God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'However, he may eat from the food offered to God, including the holy offerings and the most holy offerings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Yet because of his physical defect, he may not enter the room behind the inner curtain or approach the altar, for this would defile my holy places. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' who makes them holy.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So Moses gave these instructions to Aaron and his sons and to all the Israelites.
