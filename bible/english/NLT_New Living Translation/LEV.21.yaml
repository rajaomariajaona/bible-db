document_id: LEV.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Instructions for the Priests
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Give the following instructions to the priests, the descendants of Aaron.'
  - type: text
    content: '“A priest must not make himself ceremonially unclean by touching the dead body of a relative. '
  '10':
  - type: text
    content: “The high priest has the highest rank of all the priests. The anointing oil has been poured on his head, and he has been ordained to wear the priestly garments. He must never leave his hair uncombed
  - type: note
    content: Or never uncover his head.
  - type: text
    content: ' or tear his clothing. '
  '11':
  - type: text
    content: 'He must not defile himself by going near a dead body. He may not make himself ceremonially unclean even for his father or mother. '
  '12':
  - type: text
    content: 'He must not defile the sanctuary of his God by leaving it to attend to a dead person, for he has been made holy by the anointing oil of his God. I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: '“The high priest may marry only a virgin. '
  '14':
  - type: text
    content: 'He may not marry a widow, a woman who is divorced, or a woman who has defiled herself by prostitution. She must be a virgin from his own clan, '
  '15':
  - type: text
    content: 'so that he will not dishonor his descendants among his clan, for I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who makes him holy.”'
  '16':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '17':
  - type: text
    content: '“Give the following instructions to Aaron: In all future generations, none of your descendants who has any defect will qualify to offer food to his God. '
  '18':
  - type: text
    content: 'No one who has a defect qualifies, whether he is blind, lame, disfigured, deformed, '
  '19':
  - type: text
    content: 'or has a broken foot or arm, '
  '2':
  - type: text
    content: 'The only exceptions are his closest relatives—his mother or father, son or daughter, brother, '
  '20':
  - type: text
    content: 'or is hunchbacked or dwarfed, or has a defective eye, or skin sores or scabs, or damaged testicles. '
  '21':
  - type: text
    content: 'No descendant of Aaron who has a defect may approach the altar to present special gifts to the '
  - type: text
    content: Lord
  - type: text
    content: '. Since he has a defect, he may not approach the altar to offer food to his God. '
  '22':
  - type: text
    content: 'However, he may eat from the food offered to God, including the holy offerings and the most holy offerings. '
  '23':
  - type: text
    content: 'Yet because of his physical defect, he may not enter the room behind the inner curtain or approach the altar, for this would defile my holy places. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who makes them holy.”'
  '24':
  - type: text
    content: So Moses gave these instructions to Aaron and his sons and to all the Israelites.
  '3':
  - type: text
    content: 'or his virgin sister who depends on him because she has no husband. '
  '4':
  - type: text
    content: But a priest must not defile himself and make himself unclean for someone who is related to him only by marriage.
  '5':
  - type: text
    content: '“The priests must not shave their heads or trim their beards or cut their bodies. '
  '6':
  - type: text
    content: 'They must be set apart as holy to their God and must never bring shame on the name of God. They must be holy, for they are the ones who present the special gifts to the '
  - type: text
    content: Lord
  - type: text
    content: ', gifts of food for their God.'
  '7':
  - type: text
    content: '“Priests may not marry a woman defiled by prostitution, and they may not marry a woman who is divorced from her husband, for the priests are set apart as holy to their God. '
  '8':
  - type: text
    content: 'You must treat them as holy because they offer up food to your God. You must consider them holy because I, the '
  - type: text
    content: Lord
  - type: text
    content: ', am holy, and I make you holy.'
  '9':
  - type: text
    content: “If a priest’s daughter defiles herself by becoming a prostitute, she also defiles her father’s holiness, and she must be burned to death.
