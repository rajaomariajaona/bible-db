document_id: JHN.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Washes His Disciples’ Feet
  - type: text
    content: Before the Passover celebration, Jesus knew that his hour had come to leave this world and return to his Father. He had loved his disciples during his ministry on earth, and now he loved them to the very end.
  - type: note
    content: Or he showed them the full extent of his love.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “A person who has bathed all over does not need to wash, except for the feet,
  - type: note
    content: Some manuscripts do not include except for the feet.
  - type: text
    content: ' '
  - type: text
    content: to be entirely clean. And you disciples are clean, but not all of you.”
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'For Jesus knew who would betray him. That is what he meant when he said, '
  - type: text
    content: “Not all of you are clean.”
  '12':
  - type: text
    content: 'After washing their feet, he put on his robe again and sat down and asked, '
  - type: text
    content: “Do you understand what I was doing?
  - type: text
    content: ' '
  '13':
  - type: text
    content: You call me ‘Teacher’ and ‘Lord,’ and you are right, because that’s what I am.
  - type: text
    content: ' '
  '14':
  - type: text
    content: And since I, your Lord and Teacher, have washed your feet, you ought to wash each other’s feet.
  - type: text
    content: ' '
  '15':
  - type: text
    content: I have given you an example to follow. Do as I have done to you.
  - type: text
    content: ' '
  '16':
  - type: text
    content: I tell you the truth, slaves are not greater than their master. Nor is the messenger more important than the one who sends the message.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Now that you know these things, God will bless you for doing them.
  - type: heading
    content: Jesus Predicts His Betrayal
  '18':
  - type: text
    content: ' '
  - type: text
    content: “I am not saying these things to all of you; I know the ones I have chosen. But this fulfills the Scripture that says, ‘The one who eats my food has turned against me.’
  - type: text
    content: ' '
  - type: note
    content: Ps 41:9.
  '19':
  - type: text
    content: 'I tell you this beforehand, so that when it happens you will believe that '
  - type: text
    content: I Am
  - type: text
    content: ' the Messiah.'
  - type: note
    content: Or that the ‘I Am’ has come; or that I am the Lord; Greek reads that I am. See Exod 3:14.
  - type: text
    content: ' '
  '2':
  - type: text
    content: It was time for supper, and the devil had already prompted Judas,
  - type: note
    content: Or the devil had already intended for Judas.
  - type: text
    content: ' son of Simon Iscariot, to betray Jesus. '
  '20':
  - type: text
    content: I tell you the truth, anyone who welcomes my messenger is welcoming me, and anyone who welcomes me is welcoming the Father who sent me.”
  '21':
  - type: text
    content: Now Jesus was deeply troubled,
  - type: note
    content: Greek was troubled in his spirit.
  - type: text
    content: ' and he exclaimed, '
  - type: text
    content: “I tell you the truth, one of you will betray me!”
  '22':
  - type: text
    content: 'The disciples looked at each other, wondering whom he could mean. '
  '23':
  - type: text
    content: The disciple Jesus loved was sitting next to Jesus at the table.
  - type: note
    content: Greek was reclining on Jesus’ bosom. The “disciple Jesus loved” was probably John.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Simon Peter motioned to him to ask, “Who’s he talking about?” '
  '25':
  - type: text
    content: So that disciple leaned over to Jesus and asked, “Lord, who is it?”
  '26':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “It is the one to whom I give the bread I dip in the bowl.”
  - type: text
    content: ' And when he had dipped it, he gave it to Judas, son of Simon Iscariot. '
  '27':
  - type: text
    content: 'When Judas had eaten the bread, Satan entered into him. Then Jesus told him, '
  - type: text
    content: “Hurry and do what you’re going to do.”
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'None of the others at the table knew what Jesus meant. '
  '29':
  - type: text
    content: 'Since Judas was their treasurer, some thought Jesus was telling him to go and pay for the food or to give some money to the poor. '
  '3':
  - type: text
    content: 'Jesus knew that the Father had given him authority over everything and that he had come from God and would return to God. '
  '30':
  - type: text
    content: So Judas left at once, going out into the night.
  - type: heading
    content: Jesus Predicts Peter’s Denial
  '31':
  - type: text
    content: 'As soon as Judas left the room, Jesus said, '
  - type: text
    content: “The time has come for the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: to enter into his glory, and God will be glorified because of him.
  - type: text
    content: ' '
  '32':
  - type: text
    content: And since God receives glory because of the Son,
  - type: note
    content: Several early manuscripts do not include And since God receives glory because of the Son.
  - type: text
    content: ' '
  - type: text
    content: he will give his own glory to the Son, and he will do so at once.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Dear children, I will be with you only a little longer. And as I told the Jewish leaders, you will search for me, but you can’t come where I am going.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'So now I am giving you a new commandment: Love each other. Just as I have loved you, you should love each other.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: Your love for one another will prove to the world that you are my disciples.”
  '36':
  - type: text
    content: Simon Peter asked, “Lord, where are you going?”
  - type: text
    content: 'And Jesus replied, '
  - type: text
    content: “You can’t go with me now, but you will follow me later.”
  '37':
  - type: text
    content: “But why can’t I come now, Lord?” he asked. “I’m ready to die for you.”
  '38':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Die for me? I tell you the truth, Peter—before the rooster crows tomorrow morning, you will deny three times that you even know me.
  '4':
  - type: text
    content: 'So he got up from the table, took off his robe, wrapped a towel around his waist, '
  '5':
  - type: text
    content: and poured water into a basin. Then he began to wash the disciples’ feet, drying them with the towel he had around him.
  '6':
  - type: text
    content: When Jesus came to Simon Peter, Peter said to him, “Lord, are you going to wash my feet?”
  '7':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You don’t understand now what I am doing, but someday you will.”
  '8':
  - type: text
    content: “No,” Peter protested, “you will never ever wash my feet!”
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Unless I wash you, you won’t belong to me.”
  '9':
  - type: text
    content: Simon Peter exclaimed, “Then wash my hands and head as well, Lord, not just my feet!”
