document_id: JHN.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Washes His Disciples’ Feet
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Before the Passover celebration, Jesus knew that his hour had come to leave this world and return to his Father. He had loved his disciples during his ministry on earth, and now he loved them to the very end.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he showed them the full extent of his love.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: It was time for supper, and the devil had already prompted Judas,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the devil had already intended for Judas.
    marker-yv: yv-n
  - type: text
    text: ' son of Simon Iscariot, to betray Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jesus knew that the Father had given him authority over everything and that he had come from God and would return to God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So he got up from the table, took off his robe, wrapped a towel around his waist, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: and poured water into a basin. Then he began to wash the disciples’ feet, drying them with the towel he had around him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When Jesus came to Simon Peter, Peter said to him, “Lord, are you going to wash my feet?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You don’t understand now what I am doing, but someday you will.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “No,” Peter protested, “you will never ever wash my feet!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Unless I wash you, you won’t belong to me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Simon Peter exclaimed, “Then wash my hands and head as well, Lord, not just my feet!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A person who has bathed all over does not need to wash, except for the feet,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts do not include '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: except for the feet.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to be entirely clean. And you disciples are clean, but not all of you.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For Jesus knew who would betray him. That is what he meant when he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Not all of you are clean.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'After washing their feet, he put on his robe again and sat down and asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do you understand what I was doing?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You call me ‘Teacher’ and ‘Lord,’ and you are right, because that’s what I am.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And since I, your Lord and Teacher, have washed your feet, you ought to wash each other’s feet.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I have given you an example to follow. Do as I have done to you.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I tell you the truth, slaves are not greater than their master. Nor is the messenger more important than the one who sends the message.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now that you know these things, God will bless you for doing them.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Predicts His Betrayal
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I am not saying these things to all of you; I know the ones I have chosen. But this fulfills the Scripture that says, ‘The one who eats my food has turned against me.’
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 41:9.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I tell you this beforehand, so that when it happens you will believe that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: I Am
    - type: text
      text: ' the Messiah.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: that the ‘
      - type: usfm
        marker: nd
        children:
        - type: text
          text: I Am
      - type: text
        text: '’ has come; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'that I am the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: '; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'that I am. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Exod 3:14.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I tell you the truth, anyone who welcomes my messenger is welcoming me, and anyone who welcomes me is welcoming the Father who sent me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Now Jesus was deeply troubled,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: was troubled in his spirit.
    marker-yv: yv-n
  - type: text
    text: ' and he exclaimed, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I tell you the truth, one of you will betray me!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The disciples looked at each other, wondering whom he could mean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The disciple Jesus loved was sitting next to Jesus at the table.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'was reclining on Jesus’ bosom. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The “disciple Jesus loved” was probably John.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Simon Peter motioned to him to ask, “Who’s he talking about?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: So that disciple leaned over to Jesus and asked, “Lord, who is it?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “It is the one to whom I give the bread I dip in the bowl.”
  - type: text
    text: ' And when he had dipped it, he gave it to Judas, son of Simon Iscariot. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'When Judas had eaten the bread, Satan entered into him. Then Jesus told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Hurry and do what you’re going to do.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'None of the others at the table knew what Jesus meant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Since Judas was their treasurer, some thought Jesus was telling him to go and pay for the food or to give some money to the poor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: So Judas left at once, going out into the night.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Predicts Peter’s Denial
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'As soon as Judas left the room, Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The time has come for the Son of Man
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Son of Man” is a title Jesus used for himself.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to enter into his glory, and God will be glorified because of him.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And since God receives glory because of the Son,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Several early manuscripts do not include '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: And since God receives glory because of the Son.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: he will give his own glory to the Son, and he will do so at once.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dear children, I will be with you only a little longer. And as I told the Jewish leaders, you will search for me, but you can’t come where I am going.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'So now I am giving you a new commandment: Love each other. Just as I have loved you, you should love each other.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Your love for one another will prove to the world that you are my disciples.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Simon Peter asked, “Lord, where are you going?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You can’t go with me now, but you will follow me later.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: “But why can’t I come now, Lord?” he asked. “I’m ready to die for you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Die for me? I tell you the truth, Peter—before the rooster crows tomorrow morning, you will deny three times that you even know me.
