document_id: JER.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah’s Shattered Jar
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me: “Go and buy a clay jar. Then ask some of the leaders of the people and of the priests to follow you. '
  '10':
  - type: text
    content: '“As these men watch you, Jeremiah, smash the jar you brought. '
  '11':
  - type: text
    content: 'Then say to them, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: As this jar lies shattered, so I will shatter the people of Judah and Jerusalem beyond all hope of repair. They will bury the bodies here in Topheth, the garbage dump, until there is no more room for them. '
  '12':
  - type: text
    content: 'This is what I will do to this place and its people, says the '
  - type: text
    content: Lord
  - type: text
    content: '. I will cause this city to become defiled like Topheth. '
  '13':
  - type: text
    content: Yes, all the houses in Jerusalem, including the palace of Judah’s kings, will become like Topheth—all the houses where you burned incense on the rooftops to your star gods, and where liquid offerings were poured out to your idols.’”
  '14':
  - type: text
    content: 'Then Jeremiah returned from Topheth, the garbage dump where he had delivered this message, and he stopped in front of the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. He said to the people there, '
  '15':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: ‘I will bring disaster upon this city and its surrounding towns as I promised, because you have stubbornly refused to listen to me.’”'
  '2':
  - type: text
    content: 'Go out through the Gate of Broken Pots to the garbage dump in the valley of Ben-Hinnom, and give them this message. '
  '3':
  - type: text
    content: 'Say to them, ‘Listen to this message from the '
  - type: text
    content: Lord
  - type: text
    content: ', you kings of Judah and citizens of Jerusalem! This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: I will bring a terrible disaster on this place, and the ears of those who hear about it will ring!'
  '4':
  - type: text
    content: '“‘For Israel has forsaken me and turned this valley into a place of wickedness. The people burn incense to foreign gods—idols never before acknowledged by this generation, by their ancestors, or by the kings of Judah. And they have filled this place with the blood of innocent children. '
  '5':
  - type: text
    content: 'They have built pagan shrines to Baal, and there they burn their sons as sacrifices to Baal. I have never commanded such a horrible deed; it never even crossed my mind to command such a thing! '
  '6':
  - type: text
    content: 'So beware, for the time is coming, says the '
  - type: text
    content: Lord
  - type: text
    content: ', when this garbage dump will no longer be called Topheth or the valley of Ben-Hinnom, but the Valley of Slaughter.'
  '7':
  - type: text
    content: '“‘For I will upset the careful plans of Judah and Jerusalem. I will allow the people to be slaughtered by invading armies, and I will leave their dead bodies as food for the vultures and wild animals. '
  '8':
  - type: text
    content: 'I will reduce Jerusalem to ruins, making it a monument to their stupidity. All who pass by will be astonished and will gasp at the destruction they see there. '
  '9':
  - type: text
    content: I will see to it that your enemies lay siege to the city until all the food is gone. Then those trapped inside will eat their own sons and daughters and friends. They will be driven to utter despair.’
