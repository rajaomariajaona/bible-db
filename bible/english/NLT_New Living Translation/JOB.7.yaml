document_id: JOB.7
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Is not all human life a struggle?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Our lives are like that of a hired hand,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: like a worker who longs for the shade,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a servant waiting to be paid.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I, too, have been assigned months of futility,
- type: usfm
  marker: q2
  children:
  - type: text
    text: long and weary nights of misery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Lying in bed, I think, ‘When will it be morning?’
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the night drags on, and I toss till dawn.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: My body is covered with maggots and scabs.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My skin breaks open, oozing with pus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job Cries Out to God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “My days fly faster than a weaver’s shuttle.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They end without hope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: O God, remember that my life is but a breath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will never again feel happiness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You see me now, but not for long.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You will look for me, but I will be gone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Just as a cloud dissipates and vanishes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who die
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: who go down to Sheol.
    marker-yv: yv-n
  - type: text
    text: ' will not come back.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They are gone forever from their home—
- type: usfm
  marker: q2
  children:
  - type: text
    text: never to be seen again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “I cannot keep from speaking.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I must express my anguish.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My bitter soul must complain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Am I a sea monster or a dragon
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you must place me under guard?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I think, ‘My bed will comfort me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sleep will ease my misery,’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: but then you shatter me with dreams
- type: usfm
  marker: q2
  children:
  - type: text
    text: and terrify me with visions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I would rather be strangled—
- type: usfm
  marker: q2
  children:
  - type: text
    text: rather die than suffer like this.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I hate my life and don’t want to go on living.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Oh, leave me alone for my few remaining days.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “What are people, that you should make so much of us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you should think of us so often?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For you examine us every morning
- type: usfm
  marker: q2
  children:
  - type: text
    text: and test us every moment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Why won’t you leave me alone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: at least long enough for me to swallow!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: If I have sinned, what have I done to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O watcher of all humanity?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why make me your target?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Am I a burden to you?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: target, so that I am a burden to myself?
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Why not just forgive my sin
- type: usfm
  marker: q2
  children:
  - type: text
    text: and take away my guilt?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For soon I will lie down in the dust and die.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When you look for me, I will be gone.”
