document_id: JOB.7,116
type_code: eng
verses:
  '1':
  - type: text
    content: “Is not all human life a struggle?
  - type: text
    content: Our lives are like that of a hired hand,
  '10':
  - type: text
    content: They are gone forever from their home—
  - type: text
    content: never to be seen again.
  '11':
  - type: text
    content: “I cannot keep from speaking.
  - type: text
    content: I must express my anguish.
  - type: text
    content: My bitter soul must complain.
  '12':
  - type: text
    content: Am I a sea monster or a dragon
  - type: text
    content: that you must place me under guard?
  '13':
  - type: text
    content: I think, ‘My bed will comfort me,
  - type: text
    content: and sleep will ease my misery,’
  '14':
  - type: text
    content: but then you shatter me with dreams
  - type: text
    content: and terrify me with visions.
  '15':
  - type: text
    content: I would rather be strangled—
  - type: text
    content: rather die than suffer like this.
  '16':
  - type: text
    content: I hate my life and don’t want to go on living.
  - type: text
    content: Oh, leave me alone for my few remaining days.
  '17':
  - type: text
    content: “What are people, that you should make so much of us,
  - type: text
    content: that you should think of us so often?
  '18':
  - type: text
    content: For you examine us every morning
  - type: text
    content: and test us every moment.
  '19':
  - type: text
    content: Why won’t you leave me alone,
  - type: text
    content: at least long enough for me to swallow!
  '2':
  - type: text
    content: like a worker who longs for the shade,
  - type: text
    content: like a servant waiting to be paid.
  '20':
  - type: text
    content: If I have sinned, what have I done to you,
  - type: text
    content: O watcher of all humanity?
  - type: text
    content: Why make me your target?
  - type: text
    content: Am I a burden to you?
  - type: note
    content: As in Greek version; Hebrew reads target, so that I am a burden to myself?
  '21':
  - type: text
    content: Why not just forgive my sin
  - type: text
    content: and take away my guilt?
  - type: text
    content: For soon I will lie down in the dust and die.
  - type: text
    content: When you look for me, I will be gone.”
  '3':
  - type: text
    content: I, too, have been assigned months of futility,
  - type: text
    content: long and weary nights of misery.
  '4':
  - type: text
    content: Lying in bed, I think, ‘When will it be morning?’
  - type: text
    content: But the night drags on, and I toss till dawn.
  '5':
  - type: text
    content: My body is covered with maggots and scabs.
  - type: text
    content: My skin breaks open, oozing with pus.
  - type: heading
    content: Job Cries Out to God
  '6':
  - type: text
    content: “My days fly faster than a weaver’s shuttle.
  - type: text
    content: They end without hope.
  '7':
  - type: text
    content: O God, remember that my life is but a breath,
  - type: text
    content: and I will never again feel happiness.
  '8':
  - type: text
    content: You see me now, but not for long.
  - type: text
    content: You will look for me, but I will be gone.
  '9':
  - type: text
    content: Just as a cloud dissipates and vanishes,
  - type: text
    content: those who die
  - type: note
    content: Hebrew who go down to Sheol.
  - type: text
    content: ' will not come back.'
