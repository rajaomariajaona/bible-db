document_id: JOB.7,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Is not all human life a struggle?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Our lives are like that of a hired hand,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are gone forever from their home—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never to be seen again.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I cannot keep from speaking.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I must express my anguish.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My bitter soul must complain.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Am I a sea monster or a dragon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you must place me under guard?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I think, ‘My bed will comfort me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sleep will ease my misery,’
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but then you shatter me with dreams
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and terrify me with visions.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would rather be strangled—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rather die than suffer like this.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hate my life and don’t want to go on living.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, leave me alone for my few remaining days.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What are people, that you should make so much of us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you should think of us so often?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you examine us every morning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and test us every moment.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why won’t you leave me alone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at least long enough for me to swallow!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a worker who longs for the shade,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a servant waiting to be paid.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I have sinned, what have I done to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O watcher of all humanity?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why make me your target?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Am I a burden to you?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: target, so that I am a burden to myself?
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why not just forgive my sin
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and take away my guilt?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For soon I will lie down in the dust and die.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When you look for me, I will be gone.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I, too, have been assigned months of futility,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: long and weary nights of misery.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lying in bed, I think, ‘When will it be morning?’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But the night drags on, and I toss till dawn.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My body is covered with maggots and scabs.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My skin breaks open, oozing with pus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job Cries Out to God
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My days fly faster than a weaver’s shuttle.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They end without hope.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, remember that my life is but a breath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will never again feel happiness.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You see me now, but not for long.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will look for me, but I will be gone.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just as a cloud dissipates and vanishes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who die
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: who go down to Sheol.
      marker-yv: yv-n
    - type: text
      text: ' will not come back.'
