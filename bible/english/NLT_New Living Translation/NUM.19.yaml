document_id: NUM.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Water of Purification
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses and Aaron, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Here is another legal requirement commanded by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': Tell the people of Israel to bring you a red heifer, a perfect animal that has no defects and has never been yoked to a plow. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Give it to Eleazar the priest, and it will be taken outside the camp and slaughtered in his presence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eleazar will take some of its blood on his finger and sprinkle it seven times toward the front of the Tabernacle.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Tent of Meeting.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'As Eleazar watches, the heifer must be burned—its hide, meat, blood, and dung. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eleazar the priest must then take a stick of cedar,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: juniper.
    marker-yv: yv-n
  - type: text
    text: ' a hyssop branch, and some scarlet yarn and throw them into the fire where the heifer is burning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Then the priest must wash his clothes and bathe himself in water. Afterward he may return to the camp, though he will remain ceremonially unclean until evening. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The man who burns the animal must also wash his clothes and bathe himself in water, and he, too, will remain unclean until evening. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then someone who is ceremonially clean will gather up the ashes of the heifer and deposit them in a purified place outside the camp. They will be kept there for the community of Israel to use in the water for the purification ceremony. This ceremony is performed for the removal of sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The man who gathers up the ashes of the heifer must also wash his clothes, and he will remain ceremonially unclean until evening. This is a permanent law for the people of Israel and any foreigners who live among them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“All those who touch a dead human body will be ceremonially unclean for seven days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They must purify themselves on the third and seventh days with the water of purification; then they will be purified. But if they do not do this on the third and seventh days, they will continue to be unclean even after the seventh day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'All those who touch a dead body and do not purify themselves in the proper way defile the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Tabernacle, and they will be cut off from the community of Israel. Since the water of purification was not sprinkled on them, their defilement continues.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“This is the ritual law that applies when someone dies inside a tent: All those who enter that tent and those who were inside when the death occurred will be ceremonially unclean for seven days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Any open container in the tent that was not covered with a lid is also defiled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And if someone in an open field touches the corpse of someone who was killed with a sword or who died a natural death, or if someone touches a human bone or a grave, that person will be defiled for seven days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“To remove the defilement, put some of the ashes from the burnt purification offering in a jar, and pour fresh water over them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then someone who is ceremonially clean must take a hyssop branch and dip it into the water. That person must sprinkle the water on the tent, on all the furnishings in the tent, and on the people who were in the tent; also on the person who touched a human bone, or touched someone who was killed or who died naturally, or touched a grave. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: On the third and seventh days the person who is ceremonially clean must sprinkle the water on those who are defiled. Then on the seventh day the people being cleansed must wash their clothes and bathe themselves, and that evening they will be cleansed of their defilement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“But those who become defiled and do not purify themselves will be cut off from the community, for they have defiled the sanctuary of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. Since the water of purification has not been sprinkled on them, they remain defiled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'This is a permanent law for the people. Those who sprinkle the water of purification must afterward wash their clothes, and anyone who then touches the water used for purification will remain defiled until evening. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Anything and anyone that a defiled person touches will be ceremonially unclean until evening.”
