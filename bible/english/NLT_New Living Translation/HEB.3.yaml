document_id: HEB.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Is Greater Than Moses
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: And so, dear brothers and sisters who belong to God and
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: And so, holy brothers who.
      marker-yv: yv-n
    - type: text
      text: ' are partners with those called to heaven, think carefully about this Jesus whom we declare to be God’s messenger'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: God’s apostle.
      marker-yv: yv-n
    - type: text
      text: ' and High Priest. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: So I was angry with them, and I said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Their hearts always turn away from me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They refuse to do what I tell them.’
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So in my anger I took an oath:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘They will never enter my place of rest.’”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:7-11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 95:7-11.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Be careful then, dear brothers and sisters.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers.
      marker-yv: yv-n
    - type: text
      text: ' Make sure that your own hearts are not evil and unbelieving, turning you away from the living God. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'You must warn each other every day, while it is still “today,” so that none of you will be deceived by sin and hardened against God. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For if we are faithful to the end, trusting God just as firmly as when we first believed, we will share in all that belongs to Christ. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Remember what it says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Today when you hear his voice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t harden your hearts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as Israel did when they rebelled.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 95:7-8.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And who was it who rebelled against God, even though they heard his voice? Wasn’t it the people Moses led out of Egypt? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And who made God angry for forty years? Wasn’t it the people who sinned, whose corpses lay in the wilderness? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And to whom was God speaking when he took an oath that they would never enter his rest? Wasn’t it the people who disobeyed him? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: So we see that because of their unbelief they were not able to enter his rest.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: For he was faithful to God, who appointed him, just as Moses served faithfully when he was entrusted with God’s entire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts do not include '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: entire.
      marker-yv: yv-n
    - type: text
      text: ' house.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But Jesus deserves far more glory than Moses, just as a person who builds a house deserves more praise than the house itself. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For every house has a builder, but the one who built everything is God.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Moses was certainly faithful in God’s house as a servant. His work was an illustration of the truths God would reveal later. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: But Christ, as the Son, is in charge of God’s entire house. And we are God’s house, if we keep our courage and remain confident in our hope in Christ.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faithful to the end.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: That is why the Holy Spirit says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Today when you hear his voice,
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: don’t harden your hearts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as Israel did when they rebelled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they tested me in the wilderness.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: There your ancestors tested and tried my patience,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even though they saw my miracles for forty years.
