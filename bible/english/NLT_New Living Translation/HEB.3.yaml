document_id: HEB.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Is Greater Than Moses
  - type: text
    content: And so, dear brothers and sisters who belong to God and
  - type: note
    content: Greek And so, holy brothers who.
  - type: text
    content: ' are partners with those called to heaven, think carefully about this Jesus whom we declare to be God’s messenger'
  - type: note
    content: Greek God’s apostle.
  - type: text
    content: ' and High Priest. '
  '10':
  - type: text
    content: So I was angry with them, and I said,
  - type: text
    content: ‘Their hearts always turn away from me.
  - type: text
    content: They refuse to do what I tell them.’
  '11':
  - type: text
    content: 'So in my anger I took an oath:'
  - type: text
    content: ‘They will never enter my place of rest.’”
  - type: note
    content: Ps 95:7-11.
  '12':
  - type: text
    content: Be careful then, dear brothers and sisters.
  - type: note
    content: Greek brothers.
  - type: text
    content: ' Make sure that your own hearts are not evil and unbelieving, turning you away from the living God. '
  '13':
  - type: text
    content: 'You must warn each other every day, while it is still “today,” so that none of you will be deceived by sin and hardened against God. '
  '14':
  - type: text
    content: 'For if we are faithful to the end, trusting God just as firmly as when we first believed, we will share in all that belongs to Christ. '
  '15':
  - type: text
    content: 'Remember what it says:'
  - type: text
    content: “Today when you hear his voice,
  - type: text
    content: don’t harden your hearts
  - type: text
    content: as Israel did when they rebelled.”
  - type: note
    content: Ps 95:7-8.
  '16':
  - type: text
    content: 'And who was it who rebelled against God, even though they heard his voice? Wasn’t it the people Moses led out of Egypt? '
  '17':
  - type: text
    content: 'And who made God angry for forty years? Wasn’t it the people who sinned, whose corpses lay in the wilderness? '
  '18':
  - type: text
    content: 'And to whom was God speaking when he took an oath that they would never enter his rest? Wasn’t it the people who disobeyed him? '
  '19':
  - type: text
    content: So we see that because of their unbelief they were not able to enter his rest.
  '2':
  - type: text
    content: For he was faithful to God, who appointed him, just as Moses served faithfully when he was entrusted with God’s entire
  - type: note
    content: Some manuscripts do not include entire.
  - type: text
    content: ' house.'
  '3':
  - type: text
    content: 'But Jesus deserves far more glory than Moses, just as a person who builds a house deserves more praise than the house itself. '
  '4':
  - type: text
    content: For every house has a builder, but the one who built everything is God.
  '5':
  - type: text
    content: 'Moses was certainly faithful in God’s house as a servant. His work was an illustration of the truths God would reveal later. '
  '6':
  - type: text
    content: But Christ, as the Son, is in charge of God’s entire house. And we are God’s house, if we keep our courage and remain confident in our hope in Christ.
  - type: note
    content: Some manuscripts add faithful to the end.
  '7':
  - type: text
    content: That is why the Holy Spirit says,
  - type: text
    content: “Today when you hear his voice,
  '8':
  - type: text
    content: don’t harden your hearts
  - type: text
    content: as Israel did when they rebelled,
  - type: text
    content: when they tested me in the wilderness.
  '9':
  - type: text
    content: There your ancestors tested and tried my patience,
  - type: text
    content: even though they saw my miracles for forty years.
