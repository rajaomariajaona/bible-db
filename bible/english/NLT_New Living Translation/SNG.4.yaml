segments:
- type: usfm
  marker: sp
  children:
  - type: text
    text: Young Man
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: You are beautiful, my darling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: beautiful beyond words.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your eyes are like doves
- type: usfm
  marker: q2
  children:
  - type: text
    text: behind your veil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your hair falls in waves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a flock of goats winding down the slopes of Gilead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Your teeth are as white as sheep,
- type: usfm
  marker: q2
  children:
  - type: text
    text: recently shorn and freshly washed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your smile is flawless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: each tooth matched with its twin.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Not one is missing; each has a twin.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Your lips are like scarlet ribbon;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your mouth is inviting.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your cheeks are like rosy pomegranates
- type: usfm
  marker: q2
  children:
  - type: text
    text: behind your veil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Your neck is as beautiful as the tower of David,
- type: usfm
  marker: q2
  children:
  - type: text
    text: jeweled with the shields of a thousand heroes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Your breasts are like two fawns,
- type: usfm
  marker: q2
  children:
  - type: text
    text: twin fawns of a gazelle grazing among the lilies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Before the dawn breezes blow
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the night shadows flee,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will hurry to the mountain of myrrh
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to the hill of frankincense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You are altogether beautiful, my darling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: beautiful in every way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Come with me from Lebanon, my bride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: come with me from Lebanon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come down
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Look down.
    marker-yv: yv-n
  - type: text
    text: ' from Mount Amana,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the peaks of Senir and Hermon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: where the lions have their dens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and leopards live among the hills.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You have captured my heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my treasure,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'my sister; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 4:10, 12.
    marker-yv: yv-n
  - type: text
    text: ' my bride.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You hold it hostage with one glance of your eyes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with a single jewel of your necklace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Your love delights me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my treasure, my bride.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your love is better than wine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your perfume more fragrant than spices.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Your lips are as sweet as nectar, my bride.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Honey and milk are under your tongue.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your clothes are scented
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the cedars of Lebanon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You are my private garden, my treasure, my bride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a secluded spring, a hidden fountain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Your thighs shelter a paradise of pomegranates
- type: usfm
  marker: q2
  children:
  - type: text
    text: with rare spices—
- type: usfm
  marker: q1
  children:
  - type: text
    text: henna with nard,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: nard and saffron,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fragrant calamus and cinnamon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: with all the trees of frankincense, myrrh, and aloes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and every other lovely spice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: You are a garden fountain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a well of fresh water
- type: usfm
  marker: q2
  children:
  - type: text
    text: streaming down from Lebanon’s mountains.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Young Woman
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Awake, north wind!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rise up, south wind!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blow on my garden
- type: usfm
  marker: q2
  children:
  - type: text
    text: and spread its fragrance all around.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come into your garden, my love;
- type: usfm
  marker: q2
  children:
  - type: text
    text: taste its finest fruits.
