document_id: SNG.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Young Man
  - type: text
    content: You are beautiful, my darling,
  - type: text
    content: beautiful beyond words.
  - type: text
    content: Your eyes are like doves
  - type: text
    content: behind your veil.
  - type: text
    content: Your hair falls in waves,
  - type: text
    content: like a flock of goats winding down the slopes of Gilead.
  '10':
  - type: text
    content: Your love delights me,
  - type: text
    content: my treasure, my bride.
  - type: text
    content: Your love is better than wine,
  - type: text
    content: your perfume more fragrant than spices.
  '11':
  - type: text
    content: Your lips are as sweet as nectar, my bride.
  - type: text
    content: Honey and milk are under your tongue.
  - type: text
    content: Your clothes are scented
  - type: text
    content: like the cedars of Lebanon.
  '12':
  - type: text
    content: You are my private garden, my treasure, my bride,
  - type: text
    content: a secluded spring, a hidden fountain.
  '13':
  - type: text
    content: Your thighs shelter a paradise of pomegranates
  - type: text
    content: with rare spices—
  - type: text
    content: henna with nard,
  '14':
  - type: text
    content: nard and saffron,
  - type: text
    content: fragrant calamus and cinnamon,
  - type: text
    content: with all the trees of frankincense, myrrh, and aloes,
  - type: text
    content: and every other lovely spice.
  '15':
  - type: text
    content: You are a garden fountain,
  - type: text
    content: a well of fresh water
  - type: text
    content: streaming down from Lebanon’s mountains.
  - type: heading
    content: Young Woman
  '16':
  - type: text
    content: Awake, north wind!
  - type: text
    content: Rise up, south wind!
  - type: text
    content: Blow on my garden
  - type: text
    content: and spread its fragrance all around.
  - type: text
    content: Come into your garden, my love;
  - type: text
    content: taste its finest fruits.
  '2':
  - type: text
    content: Your teeth are as white as sheep,
  - type: text
    content: recently shorn and freshly washed.
  - type: text
    content: Your smile is flawless,
  - type: text
    content: each tooth matched with its twin.
  - type: note
    content: Hebrew Not one is missing; each has a twin.
  '3':
  - type: text
    content: Your lips are like scarlet ribbon;
  - type: text
    content: your mouth is inviting.
  - type: text
    content: Your cheeks are like rosy pomegranates
  - type: text
    content: behind your veil.
  '4':
  - type: text
    content: Your neck is as beautiful as the tower of David,
  - type: text
    content: jeweled with the shields of a thousand heroes.
  '5':
  - type: text
    content: Your breasts are like two fawns,
  - type: text
    content: twin fawns of a gazelle grazing among the lilies.
  '6':
  - type: text
    content: Before the dawn breezes blow
  - type: text
    content: and the night shadows flee,
  - type: text
    content: I will hurry to the mountain of myrrh
  - type: text
    content: and to the hill of frankincense.
  '7':
  - type: text
    content: You are altogether beautiful, my darling,
  - type: text
    content: beautiful in every way.
  '8':
  - type: text
    content: Come with me from Lebanon, my bride,
  - type: text
    content: come with me from Lebanon.
  - type: text
    content: Come down
  - type: note
    content: Or Look down.
  - type: text
    content: ' from Mount Amana,'
  - type: text
    content: from the peaks of Senir and Hermon,
  - type: text
    content: where the lions have their dens
  - type: text
    content: and leopards live among the hills.
  '9':
  - type: text
    content: You have captured my heart,
  - type: text
    content: my treasure,
  - type: note
    content: Hebrew my sister; also in 4:10, 12.
  - type: text
    content: ' my bride.'
  - type: text
    content: You hold it hostage with one glance of your eyes,
  - type: text
    content: with a single jewel of your necklace.
