document_id: JHN.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Feeds Five Thousand
  - type: text
    content: 'After this, Jesus crossed over to the far side of the Sea of Galilee, also known as the Sea of Tiberias. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: '“Tell everyone to sit down,” '
  - type: text
    content: 'Jesus said. So they all sat down on the grassy slopes. (The men alone numbered about 5,000.) '
  '11':
  - type: text
    content: 'Then Jesus took the loaves, gave thanks to God, and distributed them to the people. Afterward he did the same with the fish. And they all ate as much as they wanted. '
  '12':
  - type: text
    content: 'After everyone was full, Jesus told his disciples, '
  - type: text
    content: “Now gather the leftovers, so that nothing is wasted.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: So they picked up the pieces and filled twelve baskets with scraps left by the people who had eaten from the five barley loaves.
  '14':
  - type: text
    content: When the people saw him
  - type: note
    content: Some manuscripts read Jesus.
  - type: text
    content: ' do this miraculous sign, they exclaimed, “Surely, he is the Prophet we have been expecting!”'
  - type: note
    content: See Deut 18:15, 18; Mal 4:5-6.
  - type: text
    content: ' '
  '15':
  - type: text
    content: When Jesus saw that they were ready to force him to be their king, he slipped away into the hills by himself.
  - type: heading
    content: Jesus Walks on Water
  '16':
  - type: text
    content: 'That evening Jesus’ disciples went down to the shore to wait for him. '
  '17':
  - type: text
    content: 'But as darkness fell and Jesus still hadn’t come back, they got into the boat and headed across the lake toward Capernaum. '
  '18':
  - type: text
    content: 'Soon a gale swept down upon them, and the sea grew very rough. '
  '19':
  - type: text
    content: They had rowed three or four miles
  - type: note
    content: Greek 25 or 30 stadia [4.6 or 5.5 kilometers].
  - type: text
    content: ' when suddenly they saw Jesus walking on the water toward the boat. They were terrified, '
  '2':
  - type: text
    content: 'A huge crowd kept following him wherever he went, because they saw his miraculous signs as he healed the sick. '
  '20':
  - type: text
    content: 'but he called out to them, '
  - type: text
    content: “Don’t be afraid. I am here!
  - type: note
    content: Or The ‘I Am’ is here; Greek reads I am. See Exod 3:14.
  - type: text
    content: ”
  - type: text
    content: ' '
  '21':
  - type: text
    content: Then they were eager to let him in the boat, and immediately they arrived at their destination!
  - type: heading
    content: Jesus, the Bread of Life
  '22':
  - type: text
    content: 'The next day the crowd that had stayed on the far shore saw that the disciples had taken the only boat, and they realized Jesus had not gone with them. '
  '23':
  - type: text
    content: 'Several boats from Tiberias landed near the place where the Lord had blessed the bread and the people had eaten. '
  '24':
  - type: text
    content: 'So when the crowd saw that neither Jesus nor his disciples were there, they got into the boats and went across to Capernaum to look for him. '
  '25':
  - type: text
    content: They found him on the other side of the lake and asked, “Rabbi, when did you get here?”
  '26':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I tell you the truth, you want to be with me because I fed you, not because you understood the miraculous signs.
  - type: text
    content: ' '
  '27':
  - type: text
    content: But don’t be so concerned about perishable things like food. Spend your energy seeking the eternal life that the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: can give you. For God the Father has given me the seal of his approval.”
  '28':
  - type: text
    content: They replied, “We want to perform God’s works, too. What should we do?”
  '29':
  - type: text
    content: 'Jesus told them, '
  - type: text
    content: '“This is the only work God wants from you: Believe in the one he has sent.”'
  '3':
  - type: text
    content: 'Then Jesus climbed a hill and sat down with his disciples around him. '
  '30':
  - type: text
    content: 'They answered, “Show us a miraculous sign if you want us to believe in you. What can you do? '
  '31':
  - type: text
    content: After all, our ancestors ate manna while they journeyed through the wilderness! The Scriptures say, ‘Moses gave them bread from heaven to eat.’
  - type: note
    content: Exod 16:4; Ps 78:24.
  - type: text
    content: ”
  '32':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “I tell you the truth, Moses didn’t give you bread from heaven. My Father did. And now he offers you the true bread from heaven.
  - type: text
    content: ' '
  '33':
  - type: text
    content: The true bread of God is the one who comes down from heaven and gives life to the world.”
  '34':
  - type: text
    content: “Sir,” they said, “give us that bread every day.”
  '35':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I am the bread of life. Whoever comes to me will never be hungry again. Whoever believes in me will never be thirsty.
  - type: text
    content: ' '
  '36':
  - type: text
    content: But you haven’t believed in me even though you have seen me.
  - type: text
    content: ' '
  '37':
  - type: text
    content: However, those the Father has given me will come to me, and I will never reject them.
  - type: text
    content: ' '
  '38':
  - type: text
    content: For I have come down from heaven to do the will of God who sent me, not to do my own will.
  - type: text
    content: ' '
  '39':
  - type: text
    content: And this is the will of God, that I should not lose even one of all those he has given me, but that I should raise them up at the last day.
  - type: text
    content: ' '
  '4':
  - type: text
    content: '(It was nearly time for the Jewish Passover celebration.) '
  '40':
  - type: text
    content: For it is my Father’s will that all who see his Son and believe in him should have eternal life. I will raise them up at the last day.”
  '41':
  - type: text
    content: Then the people
  - type: note
    content: Greek Jewish people; also in 6:52.
  - type: text
    content: ' began to murmur in disagreement because he had said, '
  - type: text
    content: “I am the bread that came down from heaven.”
  - type: text
    content: ' '
  '42':
  - type: text
    content: They said, “Isn’t this Jesus, the son of Joseph? We know his father and mother. How can he say, ‘I came down from heaven’?”
  '43':
  - type: text
    content: 'But Jesus replied, '
  - type: text
    content: “Stop complaining about what I said.
  - type: text
    content: ' '
  '44':
  - type: text
    content: For no one can come to me unless the Father who sent me draws them to me, and at the last day I will raise them up.
  - type: text
    content: ' '
  '45':
  - type: text
    content: As it is written in the Scriptures,
  - type: note
    content: Greek in the prophets. Isa 54:13.
  - type: text
    content: ' '
  - type: text
    content: ‘They will all be taught by God.’ Everyone who listens to the Father and learns from him comes to me.
  - type: text
    content: ' '
  '46':
  - type: text
    content: (Not that anyone has ever seen the Father; only I, who was sent from God, have seen him.)
  '47':
  - type: text
    content: ' '
  - type: text
    content: “I tell you the truth, anyone who believes has eternal life.
  - type: text
    content: ' '
  '48':
  - type: text
    content: Yes, I am the bread of life!
  - type: text
    content: ' '
  '49':
  - type: text
    content: Your ancestors ate manna in the wilderness, but they all died.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Jesus soon saw a huge crowd of people coming to look for him. Turning to Philip, he asked, '
  - type: text
    content: “Where can we buy bread to feed all these people?”
  - type: text
    content: ' '
  '50':
  - type: text
    content: Anyone who eats the bread from heaven, however, will never die.
  - type: text
    content: ' '
  '51':
  - type: text
    content: I am the living bread that came down from heaven. Anyone who eats this bread will live forever; and this bread, which I will offer so the world may live, is my flesh.”
  '52':
  - type: text
    content: Then the people began arguing with each other about what he meant. “How can this man give us his flesh to eat?” they asked.
  '53':
  - type: text
    content: 'So Jesus said again, '
  - type: text
    content: “I tell you the truth, unless you eat the flesh of the Son of Man and drink his blood, you cannot have eternal life within you.
  - type: text
    content: ' '
  '54':
  - type: text
    content: But anyone who eats my flesh and drinks my blood has eternal life, and I will raise that person at the last day.
  - type: text
    content: ' '
  '55':
  - type: text
    content: For my flesh is true food, and my blood is true drink.
  - type: text
    content: ' '
  '56':
  - type: text
    content: Anyone who eats my flesh and drinks my blood remains in me, and I in him.
  - type: text
    content: ' '
  '57':
  - type: text
    content: I live because of the living Father who sent me; in the same way, anyone who feeds on me will live because of me.
  - type: text
    content: ' '
  '58':
  - type: text
    content: I am the true bread that came down from heaven. Anyone who eats this bread will not die as your ancestors did (even though they ate the manna) but will live forever.”
  '59':
  - type: text
    content: He said these things while he was teaching in the synagogue in Capernaum.
  - type: heading
    content: Many Disciples Desert Jesus
  '6':
  - type: text
    content: He was testing Philip, for he already knew what he was going to do.
  '60':
  - type: text
    content: Many of his disciples said, “This is very hard to understand. How can anyone accept it?”
  '61':
  - type: text
    content: 'Jesus was aware that his disciples were complaining, so he said to them, '
  - type: text
    content: “Does this offend you?
  - type: text
    content: ' '
  '62':
  - type: text
    content: Then what will you think if you see the Son of Man ascend to heaven again?
  - type: text
    content: ' '
  '63':
  - type: text
    content: The Spirit alone gives eternal life. Human effort accomplishes nothing. And the very words I have spoken to you are spirit and life.
  - type: text
    content: ' '
  '64':
  - type: text
    content: But some of you do not believe me.”
  - type: text
    content: ' (For Jesus knew from the beginning which ones didn’t believe, and he knew who would betray him.) '
  '65':
  - type: text
    content: 'Then he said, '
  - type: text
    content: “That is why I said that people can’t come to me unless the Father gives them to me.”
  '66':
  - type: text
    content: 'At this point many of his disciples turned away and deserted him. '
  '67':
  - type: text
    content: 'Then Jesus turned to the Twelve and asked, '
  - type: text
    content: “Are you also going to leave?”
  '68':
  - type: text
    content: 'Simon Peter replied, “Lord, to whom would we go? You have the words that give eternal life. '
  '69':
  - type: text
    content: We believe, and we know you are the Holy One of God.
  - type: note
    content: Other manuscripts read you are the Christ, the Holy One of God; still others read you are the Christ, the Son of God; and still others read you are the Christ, the Son of the living God.
  - type: text
    content: ”
  '7':
  - type: text
    content: Philip replied, “Even if we worked for months, we wouldn’t have enough money
  - type: note
    content: Greek Two hundred denarii would not be enough. A denarius was equivalent to a laborer’s full day’s wage.
  - type: text
    content: ' to feed them!”'
  '70':
  - type: text
    content: 'Then Jesus said, '
  - type: text
    content: “I chose the twelve of you, but one is a devil.”
  - type: text
    content: ' '
  '71':
  - type: text
    content: He was speaking of Judas, son of Simon Iscariot, one of the Twelve, who would later betray him.
  '8':
  - type: text
    content: 'Then Andrew, Simon Peter’s brother, spoke up. '
  '9':
  - type: text
    content: “There’s a young boy here with five barley loaves and two fish. But what good is that with this huge crowd?”
