document_id: JHN.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Feeds Five Thousand
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'After this, Jesus crossed over to the far side of the Sea of Galilee, also known as the Sea of Tiberias. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Tell everyone to sit down,” '
    - type: text
      text: 'Jesus said. So they all sat down on the grassy slopes. (The men alone numbered about 5,000.) '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus took the loaves, gave thanks to God, and distributed them to the people. Afterward he did the same with the fish. And they all ate as much as they wanted. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After everyone was full, Jesus told his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now gather the leftovers, so that nothing is wasted.”
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they picked up the pieces and filled twelve baskets with scraps left by the people who had eaten from the five barley loaves.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the people saw him
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jesus.
      marker-yv: yv-n
    - type: text
      text: ' do this miraculous sign, they exclaimed, “Surely, he is the Prophet we have been expecting!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Deut 18:15, 18; Mal 4:5-6.
      marker-yv: yv-n
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Jesus saw that they were ready to force him to be their king, he slipped away into the hills by himself.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Walks on Water
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'That evening Jesus’ disciples went down to the shore to wait for him. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But as darkness fell and Jesus still hadn’t come back, they got into the boat and headed across the lake toward Capernaum. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Soon a gale swept down upon them, and the sea grew very rough. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: They had rowed three or four miles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '25 or 30 stadia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[4.6 or 5.5 kilometers].'
      marker-yv: yv-n
    - type: text
      text: ' when suddenly they saw Jesus walking on the water toward the boat. They were terrified, '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'A huge crowd kept following him wherever he went, because they saw his miraculous signs as he healed the sick. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'but he called out to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t be afraid. I am here!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The ‘
        - type: usfm
          marker: nd
          children:
          - type: text
            text: I Am
        - type: text
          text: '’ is here; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'I am. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Exod 3:14.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then they were eager to let him in the boat, and immediately they arrived at their destination!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus, the Bread of Life
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The next day the crowd that had stayed on the far shore saw that the disciples had taken the only boat, and they realized Jesus had not gone with them. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Several boats from Tiberias landed near the place where the Lord had blessed the bread and the people had eaten. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So when the crowd saw that neither Jesus nor his disciples were there, they got into the boats and went across to Capernaum to look for him. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: They found him on the other side of the lake and asked, “Rabbi, when did you get here?”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you the truth, you want to be with me because I fed you, not because you understood the miraculous signs.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But don’t be so concerned about perishable things like food. Spend your energy seeking the eternal life that the Son of Man
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: can give you. For God the Father has given me the seal of his approval.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They replied, “We want to perform God’s works, too. What should we do?”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“This is the only work God wants from you: Believe in the one he has sent.”'
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Jesus climbed a hill and sat down with his disciples around him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They answered, “Show us a miraculous sign if you want us to believe in you. What can you do? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After all, our ancestors ate manna while they journeyed through the wilderness! The Scriptures say, ‘Moses gave them bread from heaven to eat.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 16:4; Ps 78:24.
      marker-yv: yv-n
    - type: text
      text: ”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you the truth, Moses didn’t give you bread from heaven. My Father did. And now he offers you the true bread from heaven.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The true bread of God is the one who comes down from heaven and gives life to the world.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Sir,” they said, “give us that bread every day.”
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am the bread of life. Whoever comes to me will never be hungry again. Whoever believes in me will never be thirsty.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But you haven’t believed in me even though you have seen me.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: However, those the Father has given me will come to me, and I will never reject them.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For I have come down from heaven to do the will of God who sent me, not to do my own will.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And this is the will of God, that I should not lose even one of all those he has given me, but that I should raise them up at the last day.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '(It was nearly time for the Jewish Passover celebration.) '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For it is my Father’s will that all who see his Son and believe in him should have eternal life. I will raise them up at the last day.”
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the people
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jewish people; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 6:52.
      marker-yv: yv-n
    - type: text
      text: ' began to murmur in disagreement because he had said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am the bread that came down from heaven.”
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They said, “Isn’t this Jesus, the son of Joseph? We know his father and mother. How can he say, ‘I came down from heaven’?”
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Stop complaining about what I said.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For no one can come to me unless the Father who sent me draws them to me, and at the last day I will raise them up.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: As it is written in the Scriptures,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:45 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in the prophets. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 54:13.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘They will all be taught by God.’ Everyone who listens to the Father and learns from him comes to me.
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: (Not that anyone has ever seen the Father; only I, who was sent from God, have seen him.)
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you the truth, anyone who believes has eternal life.
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yes, I am the bread of life!
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your ancestors ate manna in the wilderness, but they all died.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus soon saw a huge crowd of people coming to look for him. Turning to Philip, he asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Where can we buy bread to feed all these people?”
    - type: text
      text: ' '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Anyone who eats the bread from heaven, however, will never die.
    - type: text
      text: ' '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am the living bread that came down from heaven. Anyone who eats this bread will live forever; and this bread, which I will offer so the world may live, is my flesh.”
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the people began arguing with each other about what he meant. “How can this man give us his flesh to eat?” they asked.
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jesus said again, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you the truth, unless you eat the flesh of the Son of Man and drink his blood, you cannot have eternal life within you.
    - type: text
      text: ' '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But anyone who eats my flesh and drinks my blood has eternal life, and I will raise that person at the last day.
    - type: text
      text: ' '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For my flesh is true food, and my blood is true drink.
    - type: text
      text: ' '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Anyone who eats my flesh and drinks my blood remains in me, and I in him.
    - type: text
      text: ' '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I live because of the living Father who sent me; in the same way, anyone who feeds on me will live because of me.
    - type: text
      text: ' '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am the true bread that came down from heaven. Anyone who eats this bread will not die as your ancestors did (even though they ate the manna) but will live forever.”
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said these things while he was teaching in the synagogue in Capernaum.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Many Disciples Desert Jesus
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He was testing Philip, for he already knew what he was going to do.
  '60':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Many of his disciples said, “This is very hard to understand. How can anyone accept it?”
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus was aware that his disciples were complaining, so he said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Does this offend you?
    - type: text
      text: ' '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then what will you think if you see the Son of Man ascend to heaven again?
    - type: text
      text: ' '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The Spirit alone gives eternal life. Human effort accomplishes nothing. And the very words I have spoken to you are spirit and life.
    - type: text
      text: ' '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But some of you do not believe me.”
    - type: text
      text: ' (For Jesus knew from the beginning which ones didn’t believe, and he knew who would betray him.) '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “That is why I said that people can’t come to me unless the Father gives them to me.”
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At this point many of his disciples turned away and deserted him. '
  '67':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus turned to the Twelve and asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Are you also going to leave?”
  '68':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Peter replied, “Lord, to whom would we go? You have the words that give eternal life. '
  '69':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We believe, and we know you are the Holy One of God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:69 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Other manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'you are the Christ, the Holy One of God; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'still others read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'you are the Christ, the Son of God; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'and still others read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: you are the Christ, the Son of the living God.
      marker-yv: yv-n
    - type: text
      text: ”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Philip replied, “Even if we worked for months, we wouldn’t have enough money
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Two hundred denarii would not be enough. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A denarius was equivalent to a laborer’s full day’s wage.
      marker-yv: yv-n
    - type: text
      text: ' to feed them!”'
  '70':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I chose the twelve of you, but one is a devil.”
    - type: text
      text: ' '
  '71':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was speaking of Judas, son of Simon Iscariot, one of the Twelve, who would later betray him.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Andrew, Simon Peter’s brother, spoke up. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “There’s a young boy here with five barley loaves and two fish. But what good is that with this huge crowd?”
