document_id: LUK.24,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Resurrection
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: But very early on Sunday morning
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: But on the first day of the week, very early in the morning.
      marker-yv: yv-n
    - type: text
      text: ' the women went to the tomb, taking the spices they had prepared. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was Mary Magdalene, Joanna, Mary the mother of James, and several other women who told the apostles what had happened. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the story sounded like nonsense to the men, so they didn’t believe it. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: However, Peter jumped up and ran to the tomb to look. Stooping, he peered in and saw the empty linen wrappings; then he went home again, wondering what had happened.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Walk to Emmaus
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: That same day two of Jesus’ followers were walking to the village of Emmaus, seven miles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '60 stadia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[11.1 kilometers].'
      marker-yv: yv-n
    - type: text
      text: ' from Jerusalem. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As they walked along they were talking about everything that had happened. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As they talked and discussed these things, Jesus himself suddenly came and began walking with them. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But God kept them from recognizing him.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What are you discussing so intently as you walk along?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They stopped short, sadness written across their faces. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then one of them, Cleopas, replied, “You must be the only person in Jerusalem who hasn’t heard about all the things that have happened there the last few days.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“What things?” '
    - type: text
      text: Jesus asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The things that happened to Jesus, the man from Nazareth,” they said. “He was a prophet who did powerful miracles, and he was a mighty teacher in the eyes of God and all the people. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They found that the stone had been rolled away from the entrance. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But our leading priests and other religious leaders handed him over to be condemned to death, and they crucified him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We had hoped he was the Messiah who had come to rescue Israel. This all happened three days ago.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then some women from our group of his followers were at his tomb early this morning, and they came back with an amazing report. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said his body was missing, and they had seen angels who told them Jesus is alive! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Some of our men ran out to see, and sure enough, his body was gone, just as the women had said.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You foolish people! You find it so hard to believe all that the prophets wrote in the Scriptures.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Wasn’t it clearly predicted that the Messiah would have to suffer all these things before entering his glory?”
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Jesus took them through the writings of Moses and all the prophets, explaining from all the Scriptures the things concerning himself.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By this time they were nearing Emmaus and the end of their journey. Jesus acted as if he were going on, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but they begged him, “Stay the night with us, since it is getting late.” So he went home with them. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So they went in, but they didn’t find the body of the Lord Jesus. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As they sat down to eat,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: As they reclined.
      marker-yv: yv-n
    - type: text
      text: ' he took the bread and blessed it. Then he broke it and gave it to them. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Suddenly, their eyes were opened, and they recognized him. And at that moment he disappeared!
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said to each other, “Didn’t our hearts burn within us as he talked with us on the road and explained the Scriptures to us?” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And within the hour they were on their way back to Jerusalem. There they found the eleven disciples and the others who had gathered with them, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: who said, “The Lord has really risen! He appeared to Peter.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Simon.
      marker-yv: yv-n
    - type: text
      text: ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Appears to the Disciples
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the two from Emmaus told their story of how Jesus had appeared to them as they were walking along the road, and how they had recognized him as he was breaking the bread. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And just as they were telling about it, Jesus himself was suddenly standing there among them. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Peace be with you,” '
    - type: text
      text: 'he said. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But the whole group was startled and frightened, thinking they were seeing a ghost!
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Why are you frightened?” '
    - type: text
      text: 'he asked. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why are your hearts filled with doubt?
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Look at my hands. Look at my feet. You can see that it’s really me. Touch me and make sure that I am not a ghost, because ghosts don’t have bodies, as you see that I do.”
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: As they stood there puzzled, two men suddenly appeared to them, clothed in dazzling robes.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As he spoke, he showed them his hands and his feet.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Still they stood there in disbelief, filled with joy and wonder. Then he asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you have anything here to eat?”
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They gave him a piece of broiled fish, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and he ate it as they watched.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When I was with you before, I told you that everything written about me in the law of Moses and the prophets and in the Psalms must be fulfilled.”
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he opened their minds to understand the Scriptures. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Yes, it was written long ago that the Messiah would suffer and die and rise from the dead on the third day.
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It was also written that this message would be proclaimed in the authority of his name to all the nations,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: all peoples.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'beginning in Jerusalem: ‘There is forgiveness of sins for all who repent.’'
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You are witnesses of all these things.
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And now I will send the Holy Spirit, just as my Father promised. But stay here in the city until the Holy Spirit comes and fills you with power from heaven.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ascension
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The women were terrified and bowed with their faces to the ground. Then the men asked, “Why are you looking among the dead for someone who is alive? '
  '50':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Jesus led them to Bethany, and lifting his hands to heaven, he blessed them. '
  '51':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'While he was blessing them, he left them and was taken up to heaven. '
  '52':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So they worshiped him and then returned to Jerusalem filled with great joy. '
  '53':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And they spent all of their time in the Temple, praising God.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He isn’t here! He is risen from the dead! Remember what he told you back in Galilee, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: that the Son of Man
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: text
      text: ' must be betrayed into the hands of sinful men and be crucified, and that he would rise again on the third day.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they remembered that he had said this. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they rushed back from the tomb to tell his eleven disciples—and everyone else—what had happened. '
