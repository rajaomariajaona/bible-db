document_id: LUK.24,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection
  - type: text
    content: But very early on Sunday morning
  - type: note
    content: Greek But on the first day of the week, very early in the morning.
  - type: text
    content: ' the women went to the tomb, taking the spices they had prepared. '
  '10':
  - type: text
    content: 'It was Mary Magdalene, Joanna, Mary the mother of James, and several other women who told the apostles what had happened. '
  '11':
  - type: text
    content: 'But the story sounded like nonsense to the men, so they didn’t believe it. '
  '12':
  - type: text
    content: However, Peter jumped up and ran to the tomb to look. Stooping, he peered in and saw the empty linen wrappings; then he went home again, wondering what had happened.
  - type: heading
    content: The Walk to Emmaus
  '13':
  - type: text
    content: That same day two of Jesus’ followers were walking to the village of Emmaus, seven miles
  - type: note
    content: Greek 60 stadia [11.1 kilometers].
  - type: text
    content: ' from Jerusalem. '
  '14':
  - type: text
    content: 'As they walked along they were talking about everything that had happened. '
  '15':
  - type: text
    content: 'As they talked and discussed these things, Jesus himself suddenly came and began walking with them. '
  '16':
  - type: text
    content: But God kept them from recognizing him.
  '17':
  - type: text
    content: 'He asked them, '
  - type: text
    content: “What are you discussing so intently as you walk along?”
  - type: text
    content: 'They stopped short, sadness written across their faces. '
  '18':
  - type: text
    content: Then one of them, Cleopas, replied, “You must be the only person in Jerusalem who hasn’t heard about all the things that have happened there the last few days.”
  '19':
  - type: text
    content: ' '
  - type: text
    content: '“What things?” '
  - type: text
    content: Jesus asked.
  - type: text
    content: '“The things that happened to Jesus, the man from Nazareth,” they said. “He was a prophet who did powerful miracles, and he was a mighty teacher in the eyes of God and all the people. '
  '2':
  - type: text
    content: 'They found that the stone had been rolled away from the entrance. '
  '20':
  - type: text
    content: 'But our leading priests and other religious leaders handed him over to be condemned to death, and they crucified him. '
  '21':
  - type: text
    content: We had hoped he was the Messiah who had come to rescue Israel. This all happened three days ago.
  '22':
  - type: text
    content: '“Then some women from our group of his followers were at his tomb early this morning, and they came back with an amazing report. '
  '23':
  - type: text
    content: 'They said his body was missing, and they had seen angels who told them Jesus is alive! '
  '24':
  - type: text
    content: Some of our men ran out to see, and sure enough, his body was gone, just as the women had said.”
  '25':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: “You foolish people! You find it so hard to believe all that the prophets wrote in the Scriptures.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Wasn’t it clearly predicted that the Messiah would have to suffer all these things before entering his glory?”
  - type: text
    content: ' '
  '27':
  - type: text
    content: Then Jesus took them through the writings of Moses and all the prophets, explaining from all the Scriptures the things concerning himself.
  '28':
  - type: text
    content: 'By this time they were nearing Emmaus and the end of their journey. Jesus acted as if he were going on, '
  '29':
  - type: text
    content: 'but they begged him, “Stay the night with us, since it is getting late.” So he went home with them. '
  '3':
  - type: text
    content: 'So they went in, but they didn’t find the body of the Lord Jesus. '
  '30':
  - type: text
    content: As they sat down to eat,
  - type: note
    content: Or As they reclined.
  - type: text
    content: ' he took the bread and blessed it. Then he broke it and gave it to them. '
  '31':
  - type: text
    content: Suddenly, their eyes were opened, and they recognized him. And at that moment he disappeared!
  '32':
  - type: text
    content: 'They said to each other, “Didn’t our hearts burn within us as he talked with us on the road and explained the Scriptures to us?” '
  '33':
  - type: text
    content: 'And within the hour they were on their way back to Jerusalem. There they found the eleven disciples and the others who had gathered with them, '
  '34':
  - type: text
    content: who said, “The Lord has really risen! He appeared to Peter.
  - type: note
    content: Greek Simon.
  - type: text
    content: ”
  - type: heading
    content: Jesus Appears to the Disciples
  '35':
  - type: text
    content: 'Then the two from Emmaus told their story of how Jesus had appeared to them as they were walking along the road, and how they had recognized him as he was breaking the bread. '
  '36':
  - type: text
    content: 'And just as they were telling about it, Jesus himself was suddenly standing there among them. '
  - type: text
    content: '“Peace be with you,” '
  - type: text
    content: 'he said. '
  '37':
  - type: text
    content: But the whole group was startled and frightened, thinking they were seeing a ghost!
  '38':
  - type: text
    content: ' '
  - type: text
    content: '“Why are you frightened?” '
  - type: text
    content: 'he asked. '
  - type: text
    content: “Why are your hearts filled with doubt?
  - type: text
    content: ' '
  '39':
  - type: text
    content: Look at my hands. Look at my feet. You can see that it’s really me. Touch me and make sure that I am not a ghost, because ghosts don’t have bodies, as you see that I do.”
  - type: text
    content: ' '
  '4':
  - type: text
    content: As they stood there puzzled, two men suddenly appeared to them, clothed in dazzling robes.
  '40':
  - type: text
    content: As he spoke, he showed them his hands and his feet.
  '41':
  - type: text
    content: 'Still they stood there in disbelief, filled with joy and wonder. Then he asked them, '
  - type: text
    content: “Do you have anything here to eat?”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'They gave him a piece of broiled fish, '
  '43':
  - type: text
    content: and he ate it as they watched.
  '44':
  - type: text
    content: 'Then he said, '
  - type: text
    content: “When I was with you before, I told you that everything written about me in the law of Moses and the prophets and in the Psalms must be fulfilled.”
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Then he opened their minds to understand the Scriptures. '
  '46':
  - type: text
    content: 'And he said, '
  - type: text
    content: “Yes, it was written long ago that the Messiah would suffer and die and rise from the dead on the third day.
  - type: text
    content: ' '
  '47':
  - type: text
    content: It was also written that this message would be proclaimed in the authority of his name to all the nations,
  - type: note
    content: Or all peoples.
  - type: text
    content: ' '
  - type: text
    content: 'beginning in Jerusalem: ‘There is forgiveness of sins for all who repent.’'
  - type: text
    content: ' '
  '48':
  - type: text
    content: You are witnesses of all these things.
  '49':
  - type: text
    content: ' '
  - type: text
    content: “And now I will send the Holy Spirit, just as my Father promised. But stay here in the city until the Holy Spirit comes and fills you with power from heaven.”
  - type: heading
    content: The Ascension
  '5':
  - type: text
    content: 'The women were terrified and bowed with their faces to the ground. Then the men asked, “Why are you looking among the dead for someone who is alive? '
  '50':
  - type: text
    content: 'Then Jesus led them to Bethany, and lifting his hands to heaven, he blessed them. '
  '51':
  - type: text
    content: 'While he was blessing them, he left them and was taken up to heaven. '
  '52':
  - type: text
    content: 'So they worshiped him and then returned to Jerusalem filled with great joy. '
  '53':
  - type: text
    content: And they spent all of their time in the Temple, praising God.
  '6':
  - type: text
    content: 'He isn’t here! He is risen from the dead! Remember what he told you back in Galilee, '
  '7':
  - type: text
    content: that the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' must be betrayed into the hands of sinful men and be crucified, and that he would rise again on the third day.”'
  '8':
  - type: text
    content: 'Then they remembered that he had said this. '
  '9':
  - type: text
    content: 'So they rushed back from the tomb to tell his eleven disciples—and everyone else—what had happened. '
