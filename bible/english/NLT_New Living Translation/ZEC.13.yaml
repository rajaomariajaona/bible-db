document_id: ZEC.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Fountain of Cleansing
  - type: text
    content: “On that day a fountain will be opened for the dynasty of David and for the people of Jerusalem, a fountain to cleanse them from all their sins and impurity.
  '2':
  - type: text
    content: '“And on that day,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, “I will erase idol worship throughout the land, so that even the names of the idols will be forgotten. I will remove from the land both the false prophets and the spirit of impurity that came with them. '
  '3':
  - type: text
    content: 'If anyone continues to prophesy, his own father and mother will tell him, ‘You must die, for you have prophesied lies in the name of the '
  - type: text
    content: Lord
  - type: text
    content: .’ And as he prophesies, his own father and mother will stab him.
  '4':
  - type: text
    content: '“On that day people will be ashamed to claim the prophetic gift. No one will pretend to be a prophet by wearing prophet’s clothes. '
  '5':
  - type: text
    content: 'He will say, ‘I’m no prophet; I’m a farmer. I began working for a farmer as a boy.’ '
  '6':
  - type: text
    content: And if someone asks, ‘Then what about those wounds on your chest?
  - type: note
    content: Hebrew wounds between your hands?
  - type: text
    content: ’ he will say, ‘I was wounded at my friends’ house!’
  - type: heading
    content: The Scattering of the Sheep
  '7':
  - type: text
    content: “Awake, O sword, against my shepherd,
  - type: text
    content: the man who is my partner,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  - type: text
    content: “Strike down the shepherd,
  - type: text
    content: and the sheep will be scattered,
  - type: text
    content: and I will turn against the lambs.
  '8':
  - type: text
    content: Two-thirds of the people in the land
  - type: text
    content: 'will be cut off and die,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “But one-third will be left in the land.
  '9':
  - type: text
    content: I will bring that group through the fire
  - type: text
    content: and make them pure.
  - type: text
    content: I will refine them like silver
  - type: text
    content: and purify them like gold.
  - type: text
    content: They will call on my name,
  - type: text
    content: and I will answer them.
  - type: text
    content: I will say, ‘These are my people,’
  - type: text
    content: 'and they will say, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' is our God.’”'
