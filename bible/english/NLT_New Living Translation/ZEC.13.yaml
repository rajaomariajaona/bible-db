document_id: ZEC.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Fountain of Cleansing
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “On that day a fountain will be opened for the dynasty of David and for the people of Jerusalem, a fountain to cleanse them from all their sins and impurity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“And on that day,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, “I will erase idol worship throughout the land, so that even the names of the idols will be forgotten. I will remove from the land both the false prophets and the spirit of impurity that came with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'If anyone continues to prophesy, his own father and mother will tell him, ‘You must die, for you have prophesied lies in the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .’ And as he prophesies, his own father and mother will stab him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“On that day people will be ashamed to claim the prophetic gift. No one will pretend to be a prophet by wearing prophet’s clothes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He will say, ‘I’m no prophet; I’m a farmer. I began working for a farmer as a boy.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And if someone asks, ‘Then what about those wounds on your chest?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: wounds between your hands?
    marker-yv: yv-n
  - type: text
    text: ’ he will say, ‘I was wounded at my friends’ house!’
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Scattering of the Sheep
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Awake, O sword, against my shepherd,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the man who is my partner,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Strike down the shepherd,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the sheep will be scattered,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will turn against the lambs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Two-thirds of the people in the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'will be cut off and die,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: “But one-third will be left in the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I will bring that group through the fire
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make them pure.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will refine them like silver
- type: usfm
  marker: q2
  children:
  - type: text
    text: and purify them like gold.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will call on my name,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will answer them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will say, ‘These are my people,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and they will say, ‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is our God.’”'
