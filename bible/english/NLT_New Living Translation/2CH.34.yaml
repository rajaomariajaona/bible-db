document_id: 2CH.34,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josiah Rules in Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Josiah was eight years old when he became king, and he reigned in Jerusalem thirty-one years. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He entrusted the money to the men assigned to supervise the restoration of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple. Then they paid the workers who did the repairs and renovation of the Temple. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They hired carpenters and builders, who purchased finished stone for the walls and timber for the rafters and beams. They restored what earlier kings of Judah had allowed to fall into ruin.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The workers served faithfully under the leadership of Jahath and Obadiah, Levites of the Merarite clan, and Zechariah and Meshullam, Levites of the Kohathite clan. Other Levites, all of whom were skilled musicians, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: were put in charge of the laborers of the various trades. Still others assisted as secretaries, officials, and gatekeepers.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hilkiah Discovers God’s Law
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'While they were bringing out the money collected at the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple, Hilkiah the priest found the Book of the Law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that was written by Moses. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Hilkiah said to Shaphan the court secretary, “I have found the Book of the Law in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Temple!” Then Hilkiah gave the scroll to Shaphan.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shaphan took the scroll to the king and reported, “Your officials are doing everything they were assigned to do. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The money that was collected at the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has been turned over to the supervisors and workmen.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Shaphan also told the king, “Hilkiah the priest has given me a scroll.” So Shaphan read it to the king.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the king heard what was written in the Law, he tore his clothes in despair. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He did what was pleasing in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s sight and followed the example of his ancestor David. He did not turn away from doing what was right.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he gave these orders to Hilkiah, Ahikam son of Shaphan, Acbor son of Micaiah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 2 Kgs 22:12; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abdon son of Micah.
      marker-yv: yv-n
    - type: text
      text: ' Shaphan the court secretary, and Asaiah the king’s personal adviser: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go to the Temple and speak to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for me and for all the remnant of Israel and Judah. Inquire about the words written in the scroll that has been found. For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s great anger has been poured out on us because our ancestors have not obeyed the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . We have not been doing everything this scroll says we must do.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Hilkiah and the other men went to the New Quarter
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:22a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Second Quarter, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a newer section of Jerusalem. Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Mishneh.
      marker-yv: yv-n
    - type: text
      text: ' of Jerusalem to consult with the prophet Huldah. She was the wife of Shallum son of Tikvah, son of Harhas,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:22b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 2 Kgs 22:14; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son of Tokhath, son of Hasrah.
      marker-yv: yv-n
    - type: text
      text: ' the keeper of the Temple wardrobe.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She said to them, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, has spoken! Go back and tell the man who sent you, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I am going to bring disaster on this city'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'this place; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 34:27, 28.
      marker-yv: yv-n
    - type: text
      text: ' and its people. All the curses written in the scroll that was read to the king of Judah will come true. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For my people have abandoned me and offered sacrifices to pagan gods, and I am very angry with them for everything they have done. My anger will be poured out on this place, and it will not be quenched.’
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But go to the king of Judah who sent you to seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and tell him: ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says concerning the message you have just heard: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You were sorry and humbled yourself before God when you heard his words against this city and its people. You humbled yourself and tore your clothing in despair and wept before me in repentance. And I have indeed heard you, says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I will not send the promised disaster until after you have died and been buried in peace. You yourself will not see the disaster I am going to bring on this city and its people.’”
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they took her message back to the king.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josiah’s Religious Reforms
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the king summoned all the elders of Judah and Jerusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'During the eighth year of his reign, while he was still young, Josiah began to seek the God of his ancestor David. Then in the twelfth year he began to purify Judah and Jerusalem, destroying all the pagan shrines, the Asherah poles, and the carved idols and cast images. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And the king went up to the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with all the people of Judah and Jerusalem, along with the priests and the Levites—all the people from the greatest to the least. There the king read to them the entire Book of the Covenant that had been found in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The king took his place of authority beside the pillar and renewed the covenant in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s presence. He pledged to obey the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by keeping all his commands, laws, and decrees with all his heart and soul. He promised to obey all the terms of the covenant that were written in the scroll. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And he required everyone in Jerusalem and the people of Benjamin to make a similar pledge. The people of Jerusalem did so, renewing their covenant with God, the God of their ancestors.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Josiah removed all detestable idols from the entire land of Israel and required everyone to worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God. And throughout the rest of his lifetime, they did not turn away from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their ancestors.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He ordered that the altars of Baal be demolished and that the incense altars which stood above them be broken down. He also made sure that the Asherah poles, the carved idols, and the cast images were smashed and scattered over the graves of those who had sacrificed to them. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He burned the bones of the pagan priests on their own altars, and so he purified Judah and Jerusalem.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He did the same thing in the towns of Manasseh, Ephraim, and Simeon, even as far as Naphtali, and in the regions
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Syriac version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in their temples, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in their ruins. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' all around them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He destroyed the pagan altars and the Asherah poles, and he crushed the idols into dust. He cut down all the incense altars throughout the land of Israel. Finally, he returned to Jerusalem.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the eighteenth year of his reign, after he had purified the land and the Temple, Josiah appointed Shaphan son of Azaliah, Maaseiah the governor of Jerusalem, and Joah son of Joahaz, the royal historian, to repair the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They gave Hilkiah the high priest the money that had been collected by the Levites who served as gatekeepers at the Temple of God. The gifts were brought by people from Manasseh, Ephraim, and from all the remnant of Israel, as well as from all Judah, Benjamin, and the people of Jerusalem.
