verses:
  '1':
  - type: heading
    content: The Philistines Reject David
  - type: text
    content: 'The entire Philistine army now mobilized at Aphek, and the Israelites camped at the spring in Jezreel. '
  '10':
  - type: text
    content: Now get up early in the morning, and leave with your men as soon as it gets light.”
  '11':
  - type: text
    content: So David and his men headed back into the land of the Philistines, while the Philistine army went on to Jezreel.
  '2':
  - type: text
    content: 'As the Philistine rulers were leading out their troops in groups of hundreds and thousands, David and his men marched at the rear with King Achish. '
  '3':
  - type: text
    content: But the Philistine commanders demanded, “What are these Hebrews doing here?”
  - type: text
    content: And Achish told them, “This is David, the servant of King Saul of Israel. He’s been with me for years, and I’ve never found a single fault in him from the day he arrived until today.”
  '4':
  - type: text
    content: 'But the Philistine commanders were angry. “Send him back to the town you’ve given him!” they demanded. “He can’t go into the battle with us. What if he turns against us in battle and becomes our adversary? Is there any better way for him to reconcile himself with his master than by handing our heads over to him? '
  '5':
  - type: text
    content: Isn’t this the same David about whom the women of Israel sing in their dances,
  - type: text
    content: ‘Saul has killed his thousands,
  - type: text
    content: and David his ten thousands’?”
  '6':
  - type: text
    content: 'So Achish finally summoned David and said to him, “I swear by the '
  - type: text
    content: Lord
  - type: text
    content: ' that you have been a trustworthy ally. I think you should go with me into battle, for I’ve never found a single flaw in you from the day you arrived until today. But the other Philistine rulers won’t hear of it. '
  '7':
  - type: text
    content: Please don’t upset them, but go back quietly.”
  '8':
  - type: text
    content: “What have I done to deserve this treatment?” David demanded. “What have you ever found in your servant, that I can’t go and fight the enemies of my lord the king?”
  '9':
  - type: text
    content: 'But Achish insisted, “As far as I’m concerned, you’re as perfect as an angel of God. But the Philistine commanders are afraid to have you with them in the battle. '
