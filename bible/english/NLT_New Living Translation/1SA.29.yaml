document_id: 1SA.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Philistines Reject David
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The entire Philistine army now mobilized at Aphek, and the Israelites camped at the spring in Jezreel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'As the Philistine rulers were leading out their troops in groups of hundreds and thousands, David and his men marched at the rear with King Achish. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But the Philistine commanders demanded, “What are these Hebrews doing here?”
- type: usfm
  marker: p
  children:
  - type: text
    text: And Achish told them, “This is David, the servant of King Saul of Israel. He’s been with me for years, and I’ve never found a single fault in him from the day he arrived until today.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But the Philistine commanders were angry. “Send him back to the town you’ve given him!” they demanded. “He can’t go into the battle with us. What if he turns against us in battle and becomes our adversary? Is there any better way for him to reconcile himself with his master than by handing our heads over to him? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Isn’t this the same David about whom the women of Israel sing in their dances,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Saul has killed his thousands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and David his ten thousands’?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Achish finally summoned David and said to him, “I swear by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' that you have been a trustworthy ally. I think you should go with me into battle, for I’ve never found a single flaw in you from the day you arrived until today. But the other Philistine rulers won’t hear of it. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Please don’t upset them, but go back quietly.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “What have I done to deserve this treatment?” David demanded. “What have you ever found in your servant, that I can’t go and fight the enemies of my lord the king?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But Achish insisted, “As far as I’m concerned, you’re as perfect as an angel of God. But the Philistine commanders are afraid to have you with them in the battle. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Now get up early in the morning, and leave with your men as soon as it gets light.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So David and his men headed back into the land of the Philistines, while the Philistine army went on to Jezreel.
