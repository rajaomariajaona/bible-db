document_id: EZK.42,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rooms for the Priests
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the man led me out of the Temple courtyard by way of the north gateway. We entered the outer courtyard and came to a group of rooms against the north wall of the inner courtyard. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: On the south
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: east.
      marker-yv: yv-n
    - type: text
      text: ' side of the Temple there were two blocks of rooms just south of the inner courtyard between the Temple and the outer courtyard. These rooms were arranged just like the rooms on the north. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'There was a walkway between the two blocks of rooms just like the complex on the north side of the Temple. This complex of rooms was the same length and width as the other one, and it had the same entrances and doors. The dimensions of each were identical. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: So there was an entrance in the wall facing the doors of the inner block of rooms, and another on the east at the end of the interior walkway.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then the man told me, “These rooms that overlook the Temple from the north and south are holy. Here the priests who offer sacrifices to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will eat the most holy offerings. And because these rooms are holy, they will be used to store the sacred offerings—the grain offerings, sin offerings, and guilt offerings. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: When the priests leave the sanctuary, they must not go directly to the outer courtyard. They must first take off the clothes they wore while ministering, because these clothes are holy. They must put on other clothes before entering the parts of the building complex open to the public.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'When the man had finished measuring the inside of the Temple area, he led me out through the east gateway to measure the entire perimeter. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: He measured the east side with his measuring rod, and it was 875 feet long.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in 45:2 and in Greek version at 42:17, which reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '500 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[265 meters]; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '500 rods '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[5,250 feet or 1,590 meters]; similarly in 42:17, 18, 19, 20.'
      marker-yv: yv-n
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then he measured the north side, and it was also 875 feet. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The south side was also 875 feet, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and the west side was also 875 feet. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: This structure, whose entrance opened toward the north, was 175 feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:2a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '100 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[53 meters]; also in 42:8.'
      marker-yv: yv-n
    - type: text
      text: ' long and 87-1/2 feet'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:2b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '50 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[26.5 meters]; also in 42:7, 8.'
      marker-yv: yv-n
    - type: text
      text: ' wide. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So the area was 875 feet on each side with a wall all around it to separate what was holy from what was common.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: One block of rooms overlooked the 35-foot
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20[-cubit] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[10.6-meter].'
      marker-yv: yv-n
    - type: text
      text: ' width of the inner courtyard. Another block of rooms looked out onto the pavement of the outer courtyard. The two blocks were built three levels high and stood across from each other. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Between the two blocks of rooms ran a walkway 17-1/2 feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:4a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '10 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[5.3 meters].'
      marker-yv: yv-n
    - type: text
      text: ' wide. It extended the entire 175 feet of the complex,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:4b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions, which read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Its length was 100 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[53 meters]; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and a passage 1 cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[21 inches or 53 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wide.
      marker-yv: yv-n
    - type: text
      text: ' and all the doors faced north. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Each of the two upper levels of rooms was narrower than the one beneath it because the upper levels had to allow space for walkways in front of them. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Since there were three levels and they did not have supporting columns as in the courtyards, each of the upper levels was set back from the level beneath it. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'There was an outer wall that separated the rooms from the outer courtyard; it was 87-1/2 feet long. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'This wall added length to the outer block of rooms, which extended for only 87-1/2 feet, while the inner block—the rooms toward the Temple—extended for 175 feet. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: There was an eastern entrance from the outer courtyard to these rooms.
