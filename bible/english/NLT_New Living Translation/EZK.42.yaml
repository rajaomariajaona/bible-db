document_id: EZK.42,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Rooms for the Priests
  - type: text
    content: 'Then the man led me out of the Temple courtyard by way of the north gateway. We entered the outer courtyard and came to a group of rooms against the north wall of the inner courtyard. '
  '10':
  - type: text
    content: On the south
  - type: note
    content: As in Greek version; Hebrew reads east.
  - type: text
    content: ' side of the Temple there were two blocks of rooms just south of the inner courtyard between the Temple and the outer courtyard. These rooms were arranged just like the rooms on the north. '
  '11':
  - type: text
    content: 'There was a walkway between the two blocks of rooms just like the complex on the north side of the Temple. This complex of rooms was the same length and width as the other one, and it had the same entrances and doors. The dimensions of each were identical. '
  '12':
  - type: text
    content: So there was an entrance in the wall facing the doors of the inner block of rooms, and another on the east at the end of the interior walkway.
  '13':
  - type: text
    content: 'Then the man told me, “These rooms that overlook the Temple from the north and south are holy. Here the priests who offer sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: ' will eat the most holy offerings. And because these rooms are holy, they will be used to store the sacred offerings—the grain offerings, sin offerings, and guilt offerings. '
  '14':
  - type: text
    content: When the priests leave the sanctuary, they must not go directly to the outer courtyard. They must first take off the clothes they wore while ministering, because these clothes are holy. They must put on other clothes before entering the parts of the building complex open to the public.”
  '15':
  - type: text
    content: 'When the man had finished measuring the inside of the Temple area, he led me out through the east gateway to measure the entire perimeter. '
  '16':
  - type: text
    content: He measured the east side with his measuring rod, and it was 875 feet long.
  - type: note
    content: As in 45:2 and in Greek version at 42:17, which reads 500 cubits [265 meters]; Hebrew reads 500 rods [5,250 feet or 1,590 meters]; similarly in 42:17, 18, 19, 20.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Then he measured the north side, and it was also 875 feet. '
  '18':
  - type: text
    content: 'The south side was also 875 feet, '
  '19':
  - type: text
    content: 'and the west side was also 875 feet. '
  '2':
  - type: text
    content: This structure, whose entrance opened toward the north, was 175 feet
  - type: note
    content: Hebrew 100 cubits [53 meters]; also in 42:8.
  - type: text
    content: ' long and 87-1/2 feet'
  - type: note
    content: Hebrew 50 cubits [26.5 meters]; also in 42:7, 8.
  - type: text
    content: ' wide. '
  '20':
  - type: text
    content: So the area was 875 feet on each side with a wall all around it to separate what was holy from what was common.
  '3':
  - type: text
    content: One block of rooms overlooked the 35-foot
  - type: note
    content: Hebrew 20[-cubit] [10.6-meter].
  - type: text
    content: ' width of the inner courtyard. Another block of rooms looked out onto the pavement of the outer courtyard. The two blocks were built three levels high and stood across from each other. '
  '4':
  - type: text
    content: Between the two blocks of rooms ran a walkway 17-1/2 feet
  - type: note
    content: Hebrew 10 cubits [5.3 meters].
  - type: text
    content: ' wide. It extended the entire 175 feet of the complex,'
  - type: note
    content: As in Greek and Syriac versions, which read Its length was 100 cubits [53 meters]; Hebrew reads and a passage 1 cubit [21 inches or 53 centimeters] wide.
  - type: text
    content: ' and all the doors faced north. '
  '5':
  - type: text
    content: 'Each of the two upper levels of rooms was narrower than the one beneath it because the upper levels had to allow space for walkways in front of them. '
  '6':
  - type: text
    content: 'Since there were three levels and they did not have supporting columns as in the courtyards, each of the upper levels was set back from the level beneath it. '
  '7':
  - type: text
    content: 'There was an outer wall that separated the rooms from the outer courtyard; it was 87-1/2 feet long. '
  '8':
  - type: text
    content: 'This wall added length to the outer block of rooms, which extended for only 87-1/2 feet, while the inner block—the rooms toward the Temple—extended for 175 feet. '
  '9':
  - type: text
    content: There was an eastern entrance from the outer courtyard to these rooms.
