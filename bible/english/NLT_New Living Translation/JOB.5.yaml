document_id: JOB.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Eliphaz’s Response Continues
  - type: text
    content: “Cry for help, but will anyone answer you?
  - type: text
    content: Which of the angels
  - type: note
    content: Hebrew the holy ones.
  - type: text
    content: ' will help you?'
  '10':
  - type: text
    content: He gives rain for the earth
  - type: text
    content: and water for the fields.
  '11':
  - type: text
    content: He gives prosperity to the poor
  - type: text
    content: and protects those who suffer.
  '12':
  - type: text
    content: He frustrates the plans of schemers
  - type: text
    content: so the work of their hands will not succeed.
  '13':
  - type: text
    content: He traps the wise in their own cleverness
  - type: text
    content: so their cunning schemes are thwarted.
  '14':
  - type: text
    content: They find it is dark in the daytime,
  - type: text
    content: and they grope at noon as if it were night.
  '15':
  - type: text
    content: He rescues the poor from the cutting words of the strong,
  - type: text
    content: and rescues them from the clutches of the powerful.
  '16':
  - type: text
    content: And so at last the poor have hope,
  - type: text
    content: and the snapping jaws of the wicked are shut.
  '17':
  - type: text
    content: “But consider the joy of those corrected by God!
  - type: text
    content: Do not despise the discipline of the Almighty when you sin.
  '18':
  - type: text
    content: For though he wounds, he also bandages.
  - type: text
    content: He strikes, but his hands also heal.
  '19':
  - type: text
    content: From six disasters he will rescue you;
  - type: text
    content: even in the seventh, he will keep you from evil.
  '2':
  - type: text
    content: Surely resentment destroys the fool,
  - type: text
    content: and jealousy kills the simple.
  '20':
  - type: text
    content: He will save you from death in time of famine,
  - type: text
    content: from the power of the sword in time of war.
  '21':
  - type: text
    content: You will be safe from slander
  - type: text
    content: and have no fear when destruction comes.
  '22':
  - type: text
    content: You will laugh at destruction and famine;
  - type: text
    content: wild animals will not terrify you.
  '23':
  - type: text
    content: You will be at peace with the stones of the field,
  - type: text
    content: and its wild animals will be at peace with you.
  '24':
  - type: text
    content: You will know that your home is safe.
  - type: text
    content: When you survey your possessions, nothing will be missing.
  '25':
  - type: text
    content: You will have many children;
  - type: text
    content: your descendants will be as plentiful as grass!
  '26':
  - type: text
    content: You will go to the grave at a ripe old age,
  - type: text
    content: like a sheaf of grain harvested at the proper time!
  '27':
  - type: text
    content: “We have studied life and found all this to be true.
  - type: text
    content: Listen to my counsel, and apply it to yourself.”
  '3':
  - type: text
    content: I have seen that fools may be successful for the moment,
  - type: text
    content: but then comes sudden disaster.
  '4':
  - type: text
    content: Their children are abandoned far from help;
  - type: text
    content: they are crushed in court with no one to defend them.
  '5':
  - type: text
    content: The hungry devour their harvest,
  - type: text
    content: even when it is guarded by brambles.
  - type: note
    content: The meaning of the Hebrew for this phrase is uncertain.
  - type: text
    content: The thirsty pant after their wealth.
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads A snare snatches their wealth.
  '6':
  - type: text
    content: But evil does not spring from the soil,
  - type: text
    content: and trouble does not sprout from the earth.
  '7':
  - type: text
    content: People are born for trouble
  - type: text
    content: as readily as sparks fly up from a fire.
  '8':
  - type: text
    content: “If I were you, I would go to God
  - type: text
    content: and present my case to him.
  '9':
  - type: text
    content: He does great things too marvelous to understand.
  - type: text
    content: He performs countless miracles.
