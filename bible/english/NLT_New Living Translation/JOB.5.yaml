document_id: JOB.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Eliphaz’s Response Continues
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Cry for help, but will anyone answer you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Which of the angels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the holy ones.
    marker-yv: yv-n
  - type: text
    text: ' will help you?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Surely resentment destroys the fool,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and jealousy kills the simple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I have seen that fools may be successful for the moment,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but then comes sudden disaster.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Their children are abandoned far from help;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are crushed in court with no one to defend them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The hungry devour their harvest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even when it is guarded by brambles.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:5a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this phrase is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: The thirsty pant after their wealth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:5b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: A snare snatches their wealth.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But evil does not spring from the soil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and trouble does not sprout from the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: People are born for trouble
- type: usfm
  marker: q2
  children:
  - type: text
    text: as readily as sparks fly up from a fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “If I were you, I would go to God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and present my case to him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He does great things too marvelous to understand.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He performs countless miracles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He gives rain for the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and water for the fields.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He gives prosperity to the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and protects those who suffer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He frustrates the plans of schemers
- type: usfm
  marker: q2
  children:
  - type: text
    text: so the work of their hands will not succeed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He traps the wise in their own cleverness
- type: usfm
  marker: q2
  children:
  - type: text
    text: so their cunning schemes are thwarted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They find it is dark in the daytime,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they grope at noon as if it were night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He rescues the poor from the cutting words of the strong,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rescues them from the clutches of the powerful.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And so at last the poor have hope,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the snapping jaws of the wicked are shut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “But consider the joy of those corrected by God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not despise the discipline of the Almighty when you sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For though he wounds, he also bandages.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He strikes, but his hands also heal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: From six disasters he will rescue you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: even in the seventh, he will keep you from evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He will save you from death in time of famine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the power of the sword in time of war.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: You will be safe from slander
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have no fear when destruction comes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: You will laugh at destruction and famine;
- type: usfm
  marker: q2
  children:
  - type: text
    text: wild animals will not terrify you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: You will be at peace with the stones of the field,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and its wild animals will be at peace with you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: You will know that your home is safe.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When you survey your possessions, nothing will be missing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: You will have many children;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your descendants will be as plentiful as grass!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: You will go to the grave at a ripe old age,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a sheaf of grain harvested at the proper time!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “We have studied life and found all this to be true.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen to my counsel, and apply it to yourself.”
