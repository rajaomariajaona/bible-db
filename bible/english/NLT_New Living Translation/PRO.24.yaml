document_id: PRO.24,116
type_code: eng
verses:
  '1':
  - type: text
    content: Don’t envy evil people
  - type: text
    content: or desire their company.
  '10':
  - type: text
    content: If you fail under pressure,
  - type: text
    content: your strength is too small.
  '11':
  - type: text
    content: Rescue those who are unjustly sentenced to die;
  - type: text
    content: save them as they stagger to their death.
  '12':
  - type: text
    content: Don’t excuse yourself by saying, “Look, we didn’t know.”
  - type: text
    content: For God understands all hearts, and he sees you.
  - type: text
    content: He who guards your soul knows you knew.
  - type: text
    content: He will repay all people as their actions deserve.
  '13':
  - type: text
    content: My child,
  - type: note
    content: Hebrew My son; also in 24:21.
  - type: text
    content: ' eat honey, for it is good,'
  - type: text
    content: and the honeycomb is sweet to the taste.
  '14':
  - type: text
    content: In the same way, wisdom is sweet to your soul.
  - type: text
    content: If you find it, you will have a bright future,
  - type: text
    content: and your hopes will not be cut short.
  '15':
  - type: text
    content: Don’t wait in ambush at the home of the godly,
  - type: text
    content: and don’t raid the house where the godly live.
  '16':
  - type: text
    content: The godly may trip seven times, but they will get up again.
  - type: text
    content: But one disaster is enough to overthrow the wicked.
  '17':
  - type: text
    content: Don’t rejoice when your enemies fall;
  - type: text
    content: don’t be happy when they stumble.
  '18':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will be displeased with you'
  - type: text
    content: and will turn his anger away from them.
  '19':
  - type: text
    content: Don’t fret because of evildoers;
  - type: text
    content: don’t envy the wicked.
  '2':
  - type: text
    content: For their hearts plot violence,
  - type: text
    content: and their words always stir up trouble.
  '20':
  - type: text
    content: For evil people have no future;
  - type: text
    content: the light of the wicked will be snuffed out.
  '21':
  - type: text
    content: 'My child, fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and the king.'
  - type: text
    content: Don’t associate with rebels,
  '22':
  - type: text
    content: for disaster will hit them suddenly.
  - type: text
    content: Who knows what punishment will come
  - type: text
    content: 'from the '
  - type: text
    content: Lord
  - type: text
    content: ' and the king?'
  - type: heading
    content: More Sayings of the Wise
  '23':
  - type: text
    content: 'Here are some further sayings of the wise:'
  - type: text
    content: It is wrong to show favoritism when passing judgment.
  '24':
  - type: text
    content: A judge who says to the wicked, “You are innocent,”
  - type: text
    content: will be cursed by many people and denounced by the nations.
  '25':
  - type: text
    content: But it will go well for those who convict the guilty;
  - type: text
    content: rich blessings will be showered on them.
  '26':
  - type: text
    content: An honest answer
  - type: text
    content: is like a kiss of friendship.
  '27':
  - type: text
    content: Do your planning and prepare your fields
  - type: text
    content: before building your house.
  '28':
  - type: text
    content: Don’t testify against your neighbors without cause;
  - type: text
    content: don’t lie about them.
  '29':
  - type: text
    content: And don’t say, “Now I can pay them back for what they’ve done to me!
  - type: text
    content: I’ll get even with them!”
  '3':
  - type: text
    content: A house is built by wisdom
  - type: text
    content: and becomes strong through good sense.
  '30':
  - type: text
    content: I walked by the field of a lazy person,
  - type: text
    content: the vineyard of one with no common sense.
  '31':
  - type: text
    content: I saw that it was overgrown with nettles.
  - type: text
    content: It was covered with weeds,
  - type: text
    content: and its walls were broken down.
  '32':
  - type: text
    content: Then, as I looked and thought about it,
  - type: text
    content: 'I learned this lesson:'
  '33':
  - type: text
    content: A little extra sleep, a little more slumber,
  - type: text
    content: a little folding of the hands to rest—
  '34':
  - type: text
    content: then poverty will pounce on you like a bandit;
  - type: text
    content: scarcity will attack you like an armed robber.
  '4':
  - type: text
    content: Through knowledge its rooms are filled
  - type: text
    content: with all sorts of precious riches and valuables.
  '5':
  - type: text
    content: The wise are mightier than the strong,
  - type: note
    content: As in Greek version; Hebrew reads A wise man is strength.
  - type: text
    content: and those with knowledge grow stronger and stronger.
  '6':
  - type: text
    content: So don’t go to war without wise guidance;
  - type: text
    content: victory depends on having many advisers.
  '7':
  - type: text
    content: Wisdom is too lofty for fools.
  - type: text
    content: Among leaders at the city gate, they have nothing to say.
  '8':
  - type: text
    content: A person who plans evil
  - type: text
    content: will get a reputation as a troublemaker.
  '9':
  - type: text
    content: The schemes of a fool are sinful;
  - type: text
    content: everyone detests a mocker.
