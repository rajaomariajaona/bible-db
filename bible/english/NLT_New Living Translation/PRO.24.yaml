document_id: PRO.24,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Don’t envy evil people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or desire their company.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: If you fail under pressure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your strength is too small.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Rescue those who are unjustly sentenced to die;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: save them as they stagger to their death.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Don’t excuse yourself by saying, “Look, we didn’t know.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For God understands all hearts, and he sees you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who guards your soul knows you knew.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will repay all people as their actions deserve.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: My child,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'My son; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 24:21.
      marker-yv: yv-n
    - type: text
      text: ' eat honey, for it is good,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the honeycomb is sweet to the taste.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: In the same way, wisdom is sweet to your soul.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If you find it, you will have a bright future,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your hopes will not be cut short.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Don’t wait in ambush at the home of the godly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and don’t raid the house where the godly live.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The godly may trip seven times, but they will get up again.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But one disaster is enough to overthrow the wicked.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Don’t rejoice when your enemies fall;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t be happy when they stumble.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be displeased with you'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will turn his anger away from them.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Don’t fret because of evildoers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t envy the wicked.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: For their hearts plot violence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their words always stir up trouble.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: For evil people have no future;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the light of the wicked will be snuffed out.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'My child, fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the king.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t associate with rebels,
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: for disaster will hit them suddenly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who knows what punishment will come
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the king?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: More Sayings of the Wise
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Here are some further sayings of the wise:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is wrong to show favoritism when passing judgment.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: A judge who says to the wicked, “You are innocent,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be cursed by many people and denounced by the nations.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: But it will go well for those who convict the guilty;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rich blessings will be showered on them.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: An honest answer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like a kiss of friendship.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Do your planning and prepare your fields
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before building your house.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Don’t testify against your neighbors without cause;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t lie about them.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: And don’t say, “Now I can pay them back for what they’ve done to me!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll get even with them!”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: A house is built by wisdom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and becomes strong through good sense.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: I walked by the field of a lazy person,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the vineyard of one with no common sense.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: I saw that it was overgrown with nettles.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It was covered with weeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and its walls were broken down.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Then, as I looked and thought about it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I learned this lesson:'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: A little extra sleep, a little more slumber,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a little folding of the hands to rest—
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: then poverty will pounce on you like a bandit;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: scarcity will attack you like an armed robber.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Through knowledge its rooms are filled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with all sorts of precious riches and valuables.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The wise are mightier than the strong,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: A wise man is strength.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those with knowledge grow stronger and stronger.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: So don’t go to war without wise guidance;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: victory depends on having many advisers.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Wisdom is too lofty for fools.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Among leaders at the city gate, they have nothing to say.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: A person who plans evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will get a reputation as a troublemaker.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The schemes of a fool are sinful;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone detests a mocker.
