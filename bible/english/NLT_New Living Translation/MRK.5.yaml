document_id: MRK.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals a Demon-Possessed Man
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: So they arrived at the other side of the lake, in the region of the Gerasenes.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Other manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gadarenes; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'still others read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gergesenes. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Matt 8:28; Luke 8:26.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When Jesus climbed out of the boat, a man possessed by an evil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'unclean; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 5:8, 13.
    marker-yv: yv-n
  - type: text
    text: ' spirit came out from the tombs to meet him. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'This man lived in the burial caves and could no longer be restrained, even with a chain. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Whenever he was put into chains and shackles—as he often was—he snapped the chains from his wrists and smashed the shackles. No one was strong enough to subdue him. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Day and night he wandered among the burial caves and in the hills, howling and cutting himself with sharp stones.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When Jesus was still some distance away, the man saw him, ran to meet him, and bowed low before him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'With a shriek, he screamed, “Why are you interfering with me, Jesus, Son of the Most High God? In the name of God, I beg you, don’t torture me!” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For Jesus had already said to the spirit, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come out of the man, you evil spirit.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Jesus demanded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What is your name?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And he replied, “My name is Legion, because there are many of us inside this man.” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then the evil spirits begged him again and again not to send them to some distant place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'There happened to be a large herd of pigs feeding on the hillside nearby. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Send us into those pigs,” the spirits begged. “Let us enter them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So Jesus gave them permission. The evil spirits came out of the man and entered the pigs, and the entire herd of about 2,000 pigs plunged down the steep hillside into the lake and drowned in the water.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The herdsmen fled to the nearby town and the surrounding countryside, spreading the news as they ran. People rushed out to see what had happened. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'A crowd soon gathered around Jesus, and they saw the man who had been possessed by the legion of demons. He was sitting there fully clothed and perfectly sane, and they were all afraid. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then those who had seen what happened told the others about the demon-possessed man and the pigs. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And the crowd began pleading with Jesus to go away and leave them alone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'As Jesus was getting into the boat, the man who had been demon possessed begged to go with him. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “No, go home to your family, and tell them everything the Lord has done for you and how merciful he has been.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So the man started off to visit the Ten Towns
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Decapolis.
    marker-yv: yv-n
  - type: text
    text: ' of that region and began to proclaim the great things Jesus had done for him; and everyone was amazed at what he told them.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals in Response to Faith
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jesus got into the boat again and went back to the other side of the lake, where a large crowd gathered around him on the shore. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then a leader of the local synagogue, whose name was Jairus, arrived. When he saw Jesus, he fell at his feet, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: pleading fervently with him. “My little daughter is dying,” he said. “Please come and lay your hands on her; heal her so she can live.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jesus went with him, and all the people followed, crowding around him. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'A woman in the crowd had suffered for twelve years with constant bleeding. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'She had suffered a great deal from many doctors, and over the years she had spent everything she had to pay them, but she had gotten no better. In fact, she had gotten worse. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'She had heard about Jesus, so she came up behind him through the crowd and touched his robe. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For she thought to herself, “If I can just touch his robe, I will be healed.” '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Immediately the bleeding stopped, and she could feel in her body that she had been healed of her terrible condition.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jesus realized at once that healing power had gone out from him, so he turned around in the crowd and asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who touched my robe?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: His disciples said to him, “Look at this crowd pressing around you. How can you ask, ‘Who touched me?’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But he kept on looking around to see who had done it. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then the frightened woman, trembling at the realization of what had happened to her, came and fell to her knees in front of him and told him what she had done. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And he said to her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Daughter, your faith has made you well. Go in peace. Your suffering is over.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: While he was still speaking to her, messengers arrived from the home of Jairus, the leader of the synagogue. They told him, “Your daughter is dead. There’s no use troubling the Teacher now.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: But Jesus overheard
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ignored.
    marker-yv: yv-n
  - type: text
    text: ' them and said to Jairus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t be afraid. Just have faith.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Then Jesus stopped the crowd and wouldn’t let anyone go with him except Peter, James, and John (the brother of James). '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'When they came to the home of the synagogue leader, Jesus saw much commotion and weeping and wailing. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'He went inside and asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why all this commotion and weeping? The child isn’t dead; she’s only asleep.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'The crowd laughed at him. But he made them all leave, and he took the girl’s father and mother and his three disciples into the room where the girl was lying. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Holding her hand, he said to her, '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: “Talitha koum,”
  - type: text
    text: ' which means '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Little girl, get up!”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And the girl, who was twelve years old, immediately stood up and walked around! They were overwhelmed and totally amazed. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Jesus gave them strict orders not to tell anyone what had happened, and then he told them to give her something to eat.
