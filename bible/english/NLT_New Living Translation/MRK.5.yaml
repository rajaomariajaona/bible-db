document_id: MRK.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals a Demon-Possessed Man
  - type: text
    content: So they arrived at the other side of the lake, in the region of the Gerasenes.
  - type: note
    content: Other manuscripts read Gadarenes; still others read Gergesenes. See Matt 8:28; Luke 8:26.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Then the evil spirits begged him again and again not to send them to some distant place.
  '11':
  - type: text
    content: 'There happened to be a large herd of pigs feeding on the hillside nearby. '
  '12':
  - type: text
    content: “Send us into those pigs,” the spirits begged. “Let us enter them.”
  '13':
  - type: text
    content: So Jesus gave them permission. The evil spirits came out of the man and entered the pigs, and the entire herd of about 2,000 pigs plunged down the steep hillside into the lake and drowned in the water.
  '14':
  - type: text
    content: 'The herdsmen fled to the nearby town and the surrounding countryside, spreading the news as they ran. People rushed out to see what had happened. '
  '15':
  - type: text
    content: 'A crowd soon gathered around Jesus, and they saw the man who had been possessed by the legion of demons. He was sitting there fully clothed and perfectly sane, and they were all afraid. '
  '16':
  - type: text
    content: 'Then those who had seen what happened told the others about the demon-possessed man and the pigs. '
  '17':
  - type: text
    content: And the crowd began pleading with Jesus to go away and leave them alone.
  '18':
  - type: text
    content: 'As Jesus was getting into the boat, the man who had been demon possessed begged to go with him. '
  '19':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “No, go home to your family, and tell them everything the Lord has done for you and how merciful he has been.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: When Jesus climbed out of the boat, a man possessed by an evil
  - type: note
    content: Greek unclean; also in 5:8, 13.
  - type: text
    content: ' spirit came out from the tombs to meet him. '
  '20':
  - type: text
    content: So the man started off to visit the Ten Towns
  - type: note
    content: Greek Decapolis.
  - type: text
    content: ' of that region and began to proclaim the great things Jesus had done for him; and everyone was amazed at what he told them.'
  - type: heading
    content: Jesus Heals in Response to Faith
  '21':
  - type: text
    content: 'Jesus got into the boat again and went back to the other side of the lake, where a large crowd gathered around him on the shore. '
  '22':
  - type: text
    content: 'Then a leader of the local synagogue, whose name was Jairus, arrived. When he saw Jesus, he fell at his feet, '
  '23':
  - type: text
    content: pleading fervently with him. “My little daughter is dying,” he said. “Please come and lay your hands on her; heal her so she can live.”
  '24':
  - type: text
    content: 'Jesus went with him, and all the people followed, crowding around him. '
  '25':
  - type: text
    content: 'A woman in the crowd had suffered for twelve years with constant bleeding. '
  '26':
  - type: text
    content: 'She had suffered a great deal from many doctors, and over the years she had spent everything she had to pay them, but she had gotten no better. In fact, she had gotten worse. '
  '27':
  - type: text
    content: 'She had heard about Jesus, so she came up behind him through the crowd and touched his robe. '
  '28':
  - type: text
    content: 'For she thought to herself, “If I can just touch his robe, I will be healed.” '
  '29':
  - type: text
    content: Immediately the bleeding stopped, and she could feel in her body that she had been healed of her terrible condition.
  '3':
  - type: text
    content: 'This man lived in the burial caves and could no longer be restrained, even with a chain. '
  '30':
  - type: text
    content: 'Jesus realized at once that healing power had gone out from him, so he turned around in the crowd and asked, '
  - type: text
    content: “Who touched my robe?”
  '31':
  - type: text
    content: His disciples said to him, “Look at this crowd pressing around you. How can you ask, ‘Who touched me?’”
  '32':
  - type: text
    content: 'But he kept on looking around to see who had done it. '
  '33':
  - type: text
    content: 'Then the frightened woman, trembling at the realization of what had happened to her, came and fell to her knees in front of him and told him what she had done. '
  '34':
  - type: text
    content: 'And he said to her, '
  - type: text
    content: “Daughter, your faith has made you well. Go in peace. Your suffering is over.”
  '35':
  - type: text
    content: While he was still speaking to her, messengers arrived from the home of Jairus, the leader of the synagogue. They told him, “Your daughter is dead. There’s no use troubling the Teacher now.”
  '36':
  - type: text
    content: But Jesus overheard
  - type: note
    content: Or ignored.
  - type: text
    content: ' them and said to Jairus, '
  - type: text
    content: “Don’t be afraid. Just have faith.”
  '37':
  - type: text
    content: 'Then Jesus stopped the crowd and wouldn’t let anyone go with him except Peter, James, and John (the brother of James). '
  '38':
  - type: text
    content: 'When they came to the home of the synagogue leader, Jesus saw much commotion and weeping and wailing. '
  '39':
  - type: text
    content: 'He went inside and asked, '
  - type: text
    content: “Why all this commotion and weeping? The child isn’t dead; she’s only asleep.”
  '4':
  - type: text
    content: 'Whenever he was put into chains and shackles—as he often was—he snapped the chains from his wrists and smashed the shackles. No one was strong enough to subdue him. '
  '40':
  - type: text
    content: 'The crowd laughed at him. But he made them all leave, and he took the girl’s father and mother and his three disciples into the room where the girl was lying. '
  '41':
  - type: text
    content: 'Holding her hand, he said to her, '
  - type: text
    content: “Talitha koum,”
  - type: text
    content: ' which means '
  - type: text
    content: “Little girl, get up!”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'And the girl, who was twelve years old, immediately stood up and walked around! They were overwhelmed and totally amazed. '
  '43':
  - type: text
    content: Jesus gave them strict orders not to tell anyone what had happened, and then he told them to give her something to eat.
  '5':
  - type: text
    content: Day and night he wandered among the burial caves and in the hills, howling and cutting himself with sharp stones.
  '6':
  - type: text
    content: 'When Jesus was still some distance away, the man saw him, ran to meet him, and bowed low before him. '
  '7':
  - type: text
    content: 'With a shriek, he screamed, “Why are you interfering with me, Jesus, Son of the Most High God? In the name of God, I beg you, don’t torture me!” '
  '8':
  - type: text
    content: 'For Jesus had already said to the spirit, '
  - type: text
    content: “Come out of the man, you evil spirit.”
  '9':
  - type: text
    content: 'Then Jesus demanded, '
  - type: text
    content: “What is your name?”
  - type: text
    content: 'And he replied, “My name is Legion, because there are many of us inside this man.” '
