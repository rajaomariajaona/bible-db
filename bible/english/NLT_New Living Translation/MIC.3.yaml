document_id: MIC.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judgment against Israel’s Leaders
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I said, “Listen, you leaders of Israel!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are supposed to know right from wrong,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: but you are the very ones
- type: usfm
  marker: q2
  children:
  - type: text
    text: who hate good and love evil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You skin my people alive
- type: usfm
  marker: q2
  children:
  - type: text
    text: and tear the flesh from their bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Yes, you eat my people’s flesh,
- type: usfm
  marker: q2
  children:
  - type: text
    text: strip off their skin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and break their bones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You chop them up
- type: usfm
  marker: q2
  children:
  - type: text
    text: like meat for the cooking pot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then you beg the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for help in times of trouble!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you really expect him to answer?
- type: usfm
  marker: q1
  children:
  - type: text
    text: After all the evil you have done,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he won’t even look at you!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “You false prophets are leading my people astray!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You promise peace for those who give you food,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you declare war on those who refuse to feed you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Now the night will close around you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: cutting off all your visions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Darkness will cover you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: putting an end to your predictions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sun will set for you prophets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your day will come to an end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then you seers will be put to shame,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you fortune-tellers will be disgraced.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you will cover your faces
- type: usfm
  marker: q2
  children:
  - type: text
    text: because there is no answer from God.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But as for me, I am filled with power—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'with the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am filled with justice and strength
- type: usfm
  marker: q2
  children:
  - type: text
    text: to boldly declare Israel’s sin and rebellion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Listen to me, you leaders of Israel!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You hate justice and twist all that is right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You are building Jerusalem
- type: usfm
  marker: q2
  children:
  - type: text
    text: on a foundation of murder and corruption.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You rulers make decisions based on bribes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you priests teach God’s laws only for a price;
- type: usfm
  marker: q1
  children:
  - type: text
    text: you prophets won’t prophesy unless you are paid.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Yet all of you claim to depend on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “No harm can come to us,” you say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: '“for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is here among us.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Because of you, Mount Zion will be plowed like an open field;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jerusalem will be reduced to ruins!
- type: usfm
  marker: q1
  children:
  - type: text
    text: A thicket will grow on the heights
- type: usfm
  marker: q2
  children:
  - type: text
    text: where the Temple now stands.
