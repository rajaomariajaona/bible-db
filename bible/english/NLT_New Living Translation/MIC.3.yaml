document_id: MIC.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment against Israel’s Leaders
  - type: text
    content: I said, “Listen, you leaders of Israel!
  - type: text
    content: You are supposed to know right from wrong,
  '10':
  - type: text
    content: You are building Jerusalem
  - type: text
    content: on a foundation of murder and corruption.
  '11':
  - type: text
    content: You rulers make decisions based on bribes;
  - type: text
    content: you priests teach God’s laws only for a price;
  - type: text
    content: you prophets won’t prophesy unless you are paid.
  - type: text
    content: 'Yet all of you claim to depend on the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “No harm can come to us,” you say,
  - type: text
    content: '“for the '
  - type: text
    content: Lord
  - type: text
    content: ' is here among us.”'
  '12':
  - type: text
    content: Because of you, Mount Zion will be plowed like an open field;
  - type: text
    content: Jerusalem will be reduced to ruins!
  - type: text
    content: A thicket will grow on the heights
  - type: text
    content: where the Temple now stands.
  '2':
  - type: text
    content: but you are the very ones
  - type: text
    content: who hate good and love evil.
  - type: text
    content: You skin my people alive
  - type: text
    content: and tear the flesh from their bones.
  '3':
  - type: text
    content: Yes, you eat my people’s flesh,
  - type: text
    content: strip off their skin,
  - type: text
    content: and break their bones.
  - type: text
    content: You chop them up
  - type: text
    content: like meat for the cooking pot.
  '4':
  - type: text
    content: 'Then you beg the '
  - type: text
    content: Lord
  - type: text
    content: ' for help in times of trouble!'
  - type: text
    content: Do you really expect him to answer?
  - type: text
    content: After all the evil you have done,
  - type: text
    content: he won’t even look at you!”
  '5':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “You false prophets are leading my people astray!
  - type: text
    content: You promise peace for those who give you food,
  - type: text
    content: but you declare war on those who refuse to feed you.
  '6':
  - type: text
    content: Now the night will close around you,
  - type: text
    content: cutting off all your visions.
  - type: text
    content: Darkness will cover you,
  - type: text
    content: putting an end to your predictions.
  - type: text
    content: The sun will set for you prophets,
  - type: text
    content: and your day will come to an end.
  '7':
  - type: text
    content: Then you seers will be put to shame,
  - type: text
    content: and you fortune-tellers will be disgraced.
  - type: text
    content: And you will cover your faces
  - type: text
    content: because there is no answer from God.”
  '8':
  - type: text
    content: But as for me, I am filled with power—
  - type: text
    content: 'with the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: I am filled with justice and strength
  - type: text
    content: to boldly declare Israel’s sin and rebellion.
  '9':
  - type: text
    content: Listen to me, you leaders of Israel!
  - type: text
    content: You hate justice and twist all that is right.
