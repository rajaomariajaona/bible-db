document_id: EXO.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Clothing for the Priests
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Call for your brother, Aaron, and his sons, Nadab, Abihu, Eleazar, and Ithamar. Set them apart from the rest of the people of Israel so they may minister to me and be my priests. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Make sacred garments for Aaron that are glorious and beautiful. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Instruct all the skilled craftsmen whom I have filled with the spirit of wisdom. Have them make garments for Aaron that will distinguish him as a priest set apart for my service. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'These are the garments they are to make: a chestpiece, an ephod, a robe, a patterned tunic, a turban, and a sash. They are to make these sacred garments for your brother, Aaron, and his sons to wear when they serve me as priests. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So give them fine linen cloth, gold thread, and blue, purple, and scarlet thread.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Design of the Ephod
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“The craftsmen must make the ephod of finely woven linen and skillfully embroider it with gold and with blue, purple, and scarlet thread. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'It will consist of two pieces, front and back, joined at the shoulders with two shoulder-pieces. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The decorative sash will be made of the same materials: finely woven linen embroidered with gold and with blue, purple, and scarlet thread.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Take two onyx stones, and engrave on them the names of the tribes of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Six names will be on each stone, arranged in the order of the births of the original sons of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Engrave these names on the two stones in the same way a jeweler engraves a seal. Then mount the stones in settings of gold filigree. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fasten the two stones on the shoulder-pieces of the ephod as a reminder that Aaron represents the people of Israel. Aaron will carry these names on his shoulders as a constant reminder whenever he goes before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Make the settings of gold filigree, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: then braid two cords of pure gold and attach them to the filigree settings on the shoulders of the ephod.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Design of the Chestpiece
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Then, with great skill and care, make a chestpiece to be worn for seeking a decision from God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a chestpiece for decision.
    marker-yv: yv-n
  - type: text
    text: ' Make it to match the ephod, using finely woven linen embroidered with gold and with blue, purple, and scarlet thread. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Make the chestpiece of a single piece of cloth folded to form a pouch nine inches
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1 span '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[23 centimeters].'
    marker-yv: yv-n
  - type: text
    text: ' square. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mount four rows of gemstones
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The identification of some of these gemstones is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' on it. The first row will contain a red carnelian, a pale-green peridot, and an emerald. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The second row will contain a turquoise, a blue lapis lazuli, and a white moonstone. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The third row will contain an orange jacinth, an agate, and a purple amethyst. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The fourth row will contain a blue-green beryl, an onyx, and a green jasper. All these stones will be set in gold filigree. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Each stone will represent one of the twelve sons of Israel, and the name of that tribe will be engraved on it like a seal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“To attach the chestpiece to the ephod, make braided cords of pure gold thread. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then make two gold rings and attach them to the top corners of the chestpiece. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tie the two gold cords to the two rings on the chestpiece. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tie the other ends of the cords to the gold settings on the shoulder-pieces of the ephod. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then make two more gold rings and attach them to the inside edges of the chestpiece next to the ephod. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And make two more gold rings and attach them to the front of the ephod, below the shoulder-pieces, just above the knot where the decorative sash is fastened to the ephod. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then attach the bottom rings of the chestpiece to the rings on the ephod with blue cords. This will hold the chestpiece securely to the ephod above the decorative sash.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “In this way, Aaron will carry the names of the tribes of Israel on the sacred chestpiece
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the chestpiece for decision; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 28:30. See 28:15.
    marker-yv: yv-n
  - type: text
    text: ' over his heart when he goes into the Holy Place. This will be a continual reminder that he represents the people when he comes before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Insert the Urim and Thummim into the sacred chestpiece so they will be carried over Aaron’s heart when he goes into the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s presence. In this way, Aaron will always carry over his heart the objects used to determine the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s will for his people whenever he goes in before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Additional Clothing for the Priests
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“Make the robe that is worn with the ephod from a single piece of blue cloth, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: with an opening for Aaron’s head in the middle of it. Reinforce the opening with a woven collar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' so it will not tear. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Make pomegranates out of blue, purple, and scarlet yarn, and attach them to the hem of the robe, with gold bells between them. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The gold bells and pomegranates are to alternate all around the hem. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Aaron will wear this robe whenever he ministers before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and the bells will tinkle as he goes in and out of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s presence in the Holy Place. If he wears it, he will not die.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '“Next make a medallion of pure gold, and engrave it like a seal with these words: '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Holy to the Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Attach the medallion with a blue cord to the front of Aaron’s turban, where it must remain. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Aaron must wear it on his forehead so he may take on himself any guilt of the people of Israel when they consecrate their sacred offerings. He must always wear it on his forehead so the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will accept the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: “Weave Aaron’s patterned tunic from fine linen cloth. Fashion the turban from this linen as well. Also make a sash, and decorate it with colorful embroidery.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: '“For Aaron’s sons, make tunics, sashes, and special head coverings that are glorious and beautiful. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Clothe your brother, Aaron, and his sons with these garments, and then anoint and ordain them. Consecrate them so they can serve as my priests. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Also make linen undergarments for them, to be worn next to their bodies, reaching from their hips to their thighs. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: These must be worn whenever Aaron and his sons enter the Tabernacle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Tent of Meeting.
    marker-yv: yv-n
  - type: text
    text: ' or approach the altar in the Holy Place to perform their priestly duties. Then they will not incur guilt and die. This is a permanent law for Aaron and all his descendants after him.'
