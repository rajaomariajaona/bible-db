document_id: EXO.28,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Clothing for the Priests
  - type: text
    content: '“Call for your brother, Aaron, and his sons, Nadab, Abihu, Eleazar, and Ithamar. Set them apart from the rest of the people of Israel so they may minister to me and be my priests. '
  '10':
  - type: text
    content: 'Six names will be on each stone, arranged in the order of the births of the original sons of Israel. '
  '11':
  - type: text
    content: 'Engrave these names on the two stones in the same way a jeweler engraves a seal. Then mount the stones in settings of gold filigree. '
  '12':
  - type: text
    content: 'Fasten the two stones on the shoulder-pieces of the ephod as a reminder that Aaron represents the people of Israel. Aaron will carry these names on his shoulders as a constant reminder whenever he goes before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Make the settings of gold filigree, '
  '14':
  - type: text
    content: then braid two cords of pure gold and attach them to the filigree settings on the shoulders of the ephod.
  - type: heading
    content: Design of the Chestpiece
  '15':
  - type: text
    content: “Then, with great skill and care, make a chestpiece to be worn for seeking a decision from God.
  - type: note
    content: Hebrew a chestpiece for decision.
  - type: text
    content: ' Make it to match the ephod, using finely woven linen embroidered with gold and with blue, purple, and scarlet thread. '
  '16':
  - type: text
    content: Make the chestpiece of a single piece of cloth folded to form a pouch nine inches
  - type: note
    content: Hebrew 1 span [23 centimeters].
  - type: text
    content: ' square. '
  '17':
  - type: text
    content: Mount four rows of gemstones
  - type: note
    content: The identification of some of these gemstones is uncertain.
  - type: text
    content: ' on it. The first row will contain a red carnelian, a pale-green peridot, and an emerald. '
  '18':
  - type: text
    content: 'The second row will contain a turquoise, a blue lapis lazuli, and a white moonstone. '
  '19':
  - type: text
    content: 'The third row will contain an orange jacinth, an agate, and a purple amethyst. '
  '2':
  - type: text
    content: 'Make sacred garments for Aaron that are glorious and beautiful. '
  '20':
  - type: text
    content: 'The fourth row will contain a blue-green beryl, an onyx, and a green jasper. All these stones will be set in gold filigree. '
  '21':
  - type: text
    content: Each stone will represent one of the twelve sons of Israel, and the name of that tribe will be engraved on it like a seal.
  '22':
  - type: text
    content: '“To attach the chestpiece to the ephod, make braided cords of pure gold thread. '
  '23':
  - type: text
    content: 'Then make two gold rings and attach them to the top corners of the chestpiece. '
  '24':
  - type: text
    content: 'Tie the two gold cords to the two rings on the chestpiece. '
  '25':
  - type: text
    content: 'Tie the other ends of the cords to the gold settings on the shoulder-pieces of the ephod. '
  '26':
  - type: text
    content: 'Then make two more gold rings and attach them to the inside edges of the chestpiece next to the ephod. '
  '27':
  - type: text
    content: 'And make two more gold rings and attach them to the front of the ephod, below the shoulder-pieces, just above the knot where the decorative sash is fastened to the ephod. '
  '28':
  - type: text
    content: Then attach the bottom rings of the chestpiece to the rings on the ephod with blue cords. This will hold the chestpiece securely to the ephod above the decorative sash.
  '29':
  - type: text
    content: “In this way, Aaron will carry the names of the tribes of Israel on the sacred chestpiece
  - type: note
    content: Hebrew the chestpiece for decision; also in 28:30. See 28:15.
  - type: text
    content: ' over his heart when he goes into the Holy Place. This will be a continual reminder that he represents the people when he comes before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Instruct all the skilled craftsmen whom I have filled with the spirit of wisdom. Have them make garments for Aaron that will distinguish him as a priest set apart for my service. '
  '30':
  - type: text
    content: 'Insert the Urim and Thummim into the sacred chestpiece so they will be carried over Aaron’s heart when he goes into the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence. In this way, Aaron will always carry over his heart the objects used to determine the '
  - type: text
    content: Lord
  - type: text
    content: '’s will for his people whenever he goes in before the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Additional Clothing for the Priests
  '31':
  - type: text
    content: '“Make the robe that is worn with the ephod from a single piece of blue cloth, '
  '32':
  - type: text
    content: with an opening for Aaron’s head in the middle of it. Reinforce the opening with a woven collar
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' so it will not tear. '
  '33':
  - type: text
    content: 'Make pomegranates out of blue, purple, and scarlet yarn, and attach them to the hem of the robe, with gold bells between them. '
  '34':
  - type: text
    content: 'The gold bells and pomegranates are to alternate all around the hem. '
  '35':
  - type: text
    content: 'Aaron will wear this robe whenever he ministers before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the bells will tinkle as he goes in and out of the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence in the Holy Place. If he wears it, he will not die.
  '36':
  - type: text
    content: '“Next make a medallion of pure gold, and engrave it like a seal with these words: '
  - type: text
    content: Holy to the Lord
  - type: text
    content: '. '
  '37':
  - type: text
    content: 'Attach the medallion with a blue cord to the front of Aaron’s turban, where it must remain. '
  '38':
  - type: text
    content: 'Aaron must wear it on his forehead so he may take on himself any guilt of the people of Israel when they consecrate their sacred offerings. He must always wear it on his forehead so the '
  - type: text
    content: Lord
  - type: text
    content: ' will accept the people.'
  '39':
  - type: text
    content: “Weave Aaron’s patterned tunic from fine linen cloth. Fashion the turban from this linen as well. Also make a sash, and decorate it with colorful embroidery.
  '4':
  - type: text
    content: 'These are the garments they are to make: a chestpiece, an ephod, a robe, a patterned tunic, a turban, and a sash. They are to make these sacred garments for your brother, Aaron, and his sons to wear when they serve me as priests. '
  '40':
  - type: text
    content: '“For Aaron’s sons, make tunics, sashes, and special head coverings that are glorious and beautiful. '
  '41':
  - type: text
    content: 'Clothe your brother, Aaron, and his sons with these garments, and then anoint and ordain them. Consecrate them so they can serve as my priests. '
  '42':
  - type: text
    content: 'Also make linen undergarments for them, to be worn next to their bodies, reaching from their hips to their thighs. '
  '43':
  - type: text
    content: These must be worn whenever Aaron and his sons enter the Tabernacle
  - type: note
    content: Hebrew Tent of Meeting.
  - type: text
    content: ' or approach the altar in the Holy Place to perform their priestly duties. Then they will not incur guilt and die. This is a permanent law for Aaron and all his descendants after him.'
  '5':
  - type: text
    content: So give them fine linen cloth, gold thread, and blue, purple, and scarlet thread.
  - type: heading
    content: Design of the Ephod
  '6':
  - type: text
    content: '“The craftsmen must make the ephod of finely woven linen and skillfully embroider it with gold and with blue, purple, and scarlet thread. '
  '7':
  - type: text
    content: 'It will consist of two pieces, front and back, joined at the shoulders with two shoulder-pieces. '
  '8':
  - type: text
    content: 'The decorative sash will be made of the same materials: finely woven linen embroidered with gold and with blue, purple, and scarlet thread.'
  '9':
  - type: text
    content: '“Take two onyx stones, and engrave on them the names of the tribes of Israel. '
