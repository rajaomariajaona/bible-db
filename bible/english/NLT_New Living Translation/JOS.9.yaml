document_id: JOS.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Gibeonites Deceive Israel
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now all the kings west of the Jordan River heard about what had happened. These were the kings of the Hittites, Amorites, Canaanites, Perizzites, Hivites, and Jebusites, who lived in the hill country, in the western foothills,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Shephelah.
      marker-yv: yv-n
    - type: text
      text: ' and along the coast of the Mediterranean Sea'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Great Sea.
      marker-yv: yv-n
    - type: text
      text: ' as far north as the Lebanon mountains. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'We have also heard what he did to the two Amorite kings east of the Jordan River—King Sihon of Heshbon and King Og of Bashan (who lived in Ashtaroth). '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So our elders and all our people instructed us, ‘Take supplies for a long journey. Go meet with the people of Israel and tell them, “We are your servants; please make a treaty with us.”’
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“This bread was hot from the ovens when we left our homes. But now, as you can see, it is dry and moldy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: These wineskins were new when we filled them, but now they are old and split open. And our clothing and sandals are worn out from our very long journey.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So the Israelites examined their food, but they did not consult the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then Joshua made a peace treaty with them and guaranteed their safety, and the leaders of the community ratified their agreement with a binding oath.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Three days after making the treaty, they learned that these people actually lived nearby! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The Israelites set out at once to investigate and reached their towns in three days. The names of these towns were Gibeon, Kephirah, Beeroth, and Kiriath-jearim. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But the Israelites did not attack the towns, for the Israelite leaders had made a vow to them in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people of Israel grumbled against their leaders because of the treaty. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But the leaders replied, “Since we have sworn an oath in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, we cannot touch them. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: These kings combined their armies to fight as one against Joshua and the Israelites.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'This is what we must do. We must let them live, for divine anger would come upon us if we broke our oath. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Let them live.” So they made them woodcutters and water carriers for the entire community, as the Israelite leaders directed.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Joshua called together the Gibeonites and said, “Why did you lie to us? Why did you say that you live in a distant land when you live right here among us? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: May you be cursed! From now on you will always be servants who cut wood and carry water for the house of my God.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'They replied, “We did it because we—your servants—were clearly told that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God commanded his servant Moses to give you this entire land and to destroy all the people living in it. So we feared greatly for our lives because of you. That is why we have done this. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Now we are at your mercy—do to us whatever you think is right.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'So Joshua did not allow the people of Israel to kill them. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'But that day he made the Gibeonites the woodcutters and water carriers for the community of Israel and for the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '—wherever the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' would choose to build it. And that is what they do to this day.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But when the people of Gibeon heard what Joshua had done to Jericho and Ai, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'they resorted to deception to save themselves. They sent ambassadors to Joshua, loading their donkeys with weathered saddlebags and old, patched wineskins. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'They put on worn-out, patched sandals and ragged clothes. And the bread they took with them was dry and moldy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: When they arrived at the camp of Israel at Gilgal, they told Joshua and the men of Israel, “We have come from a distant land to ask you to make a peace treaty with us.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The Israelites replied to these Hivites, “How do we know you don’t live nearby? For if you do, we cannot make a treaty with you.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: They replied, “We are your servants.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But who are you?” Joshua demanded. “Where do you come from?”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'They answered, “Your servants have come from a very distant country. We have heard of the might of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and of all he did in Egypt. '
