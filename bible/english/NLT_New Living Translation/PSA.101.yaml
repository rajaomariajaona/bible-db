document_id: PSA.101,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David.
  - type: text
    content: 'I will sing of your love and justice, '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: I will praise you with songs.
  '2':
  - type: text
    content: I will be careful to live a blameless life—
  - type: text
    content: when will you come to help me?
  - type: text
    content: I will lead a life of integrity
  - type: text
    content: in my own home.
  '3':
  - type: text
    content: I will refuse to look at
  - type: text
    content: anything vile and vulgar.
  - type: text
    content: I hate all who deal crookedly;
  - type: text
    content: I will have nothing to do with them.
  '4':
  - type: text
    content: I will reject perverse ideas
  - type: text
    content: and stay away from every evil.
  '5':
  - type: text
    content: I will not tolerate people who slander their neighbors.
  - type: text
    content: I will not endure conceit and pride.
  '6':
  - type: text
    content: I will search for faithful people
  - type: text
    content: to be my companions.
  - type: text
    content: Only those who are above reproach
  - type: text
    content: will be allowed to serve me.
  '7':
  - type: text
    content: I will not allow deceivers to serve in my house,
  - type: text
    content: and liars will not stay in my presence.
  '8':
  - type: text
    content: My daily task will be to ferret out the wicked
  - type: text
    content: 'and free the city of the '
  - type: text
    content: Lord
  - type: text
    content: ' from their grip.'
