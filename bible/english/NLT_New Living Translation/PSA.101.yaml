document_id: PSA.101
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I will sing of your love and justice, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will praise you with songs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I will be careful to live a blameless life—
- type: usfm
  marker: q2
  children:
  - type: text
    text: when will you come to help me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will lead a life of integrity
- type: usfm
  marker: q2
  children:
  - type: text
    text: in my own home.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I will refuse to look at
- type: usfm
  marker: q2
  children:
  - type: text
    text: anything vile and vulgar.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I hate all who deal crookedly;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will have nothing to do with them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will reject perverse ideas
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stay away from every evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I will not tolerate people who slander their neighbors.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not endure conceit and pride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I will search for faithful people
- type: usfm
  marker: q2
  children:
  - type: text
    text: to be my companions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Only those who are above reproach
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be allowed to serve me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I will not allow deceivers to serve in my house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and liars will not stay in my presence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: My daily task will be to ferret out the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and free the city of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' from their grip.'
