document_id: NUM.36,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Women Who Inherit Property
  - type: text
    content: 'Then the heads of the clans of Gilead—descendants of Makir, son of Manasseh, son of Joseph—came to Moses and the family leaders of Israel with a petition. '
  '10':
  - type: text
    content: 'The daughters of Zelophehad did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses. '
  '11':
  - type: text
    content: 'Mahlah, Tirzah, Hoglah, Milcah, and Noah all married cousins on their father’s side. '
  '12':
  - type: text
    content: They married into the clans of Manasseh son of Joseph. Thus, their inheritance of land remained within their ancestral tribe.
  '13':
  - type: text
    content: 'These are the commands and regulations that the '
  - type: text
    content: Lord
  - type: text
    content: ' gave to the people of Israel through Moses while they were camped on the plains of Moab beside the Jordan River, across from Jericho.'
  '2':
  - type: text
    content: 'They said, “Sir, the '
  - type: text
    content: Lord
  - type: text
    content: ' instructed you to divide the land by sacred lot among the people of Israel. You were told by the '
  - type: text
    content: Lord
  - type: text
    content: ' to give the grant of land owned by our brother Zelophehad to his daughters. '
  '3':
  - type: text
    content: 'But if they marry men from another tribe, their grants of land will go with them to the tribe into which they marry. In this way, the total area of our tribal land will be reduced. '
  '4':
  - type: text
    content: Then when the Year of Jubilee comes, their portion of land will be added to that of the new tribe, causing it to be lost forever to our ancestral tribe.”
  '5':
  - type: text
    content: 'So Moses gave the Israelites this command from the '
  - type: text
    content: Lord
  - type: text
    content: ': “The claim of the men of the tribe of Joseph is legitimate. '
  '6':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' commands concerning the daughters of Zelophehad: Let them marry anyone they like, as long as it is within their own ancestral tribe. '
  '7':
  - type: text
    content: 'None of the territorial land may pass from tribe to tribe, for all the land given to each tribe must remain within the tribe to which it was first allotted. '
  '8':
  - type: text
    content: 'The daughters throughout the tribes of Israel who are in line to inherit property must marry within their tribe, so that all the Israelites will keep their ancestral property. '
  '9':
  - type: text
    content: No grant of land may pass from one tribe to another; each tribe of Israel must keep its allotted portion of land.”
