document_id: NUM.36,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Women Who Inherit Property
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the heads of the clans of Gilead—descendants of Makir, son of Manasseh, son of Joseph—came to Moses and the family leaders of Israel with a petition. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The daughters of Zelophehad did as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahlah, Tirzah, Hoglah, Milcah, and Noah all married cousins on their father’s side. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They married into the clans of Manasseh son of Joseph. Thus, their inheritance of land remained within their ancestral tribe.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the commands and regulations that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave to the people of Israel through Moses while they were camped on the plains of Moab beside the Jordan River, across from Jericho.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They said, “Sir, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' instructed you to divide the land by sacred lot among the people of Israel. You were told by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to give the grant of land owned by our brother Zelophehad to his daughters. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But if they marry men from another tribe, their grants of land will go with them to the tribe into which they marry. In this way, the total area of our tribal land will be reduced. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then when the Year of Jubilee comes, their portion of land will be added to that of the new tribe, causing it to be lost forever to our ancestral tribe.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses gave the Israelites this command from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': “The claim of the men of the tribe of Joseph is legitimate. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commands concerning the daughters of Zelophehad: Let them marry anyone they like, as long as it is within their own ancestral tribe. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'None of the territorial land may pass from tribe to tribe, for all the land given to each tribe must remain within the tribe to which it was first allotted. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The daughters throughout the tribes of Israel who are in line to inherit property must marry within their tribe, so that all the Israelites will keep their ancestral property. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No grant of land may pass from one tribe to another; each tribe of Israel must keep its allotted portion of land.”
