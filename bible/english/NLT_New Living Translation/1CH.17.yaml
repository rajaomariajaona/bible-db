document_id: 1CH.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Covenant Promise to David
  - type: text
    content: When David was settled in his palace, he summoned Nathan the prophet. “Look,” David said, “I am living in a beautiful cedar palace,
  - type: note
    content: Hebrew a house of cedar.
  - type: text
    content: ' but the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Covenant is out there under a tent!”
  '10':
  - type: text
    content: starting from the time I appointed judges to rule my people Israel. And I will defeat all your enemies.
  - type: text
    content: '“‘Furthermore, I declare that the '
  - type: text
    content: Lord
  - type: text
    content: ' will build a house for you—a dynasty of kings! '
  '11':
  - type: text
    content: 'For when you die and join your ancestors, I will raise up one of your descendants, one of your sons, and I will make his kingdom strong. '
  '12':
  - type: text
    content: 'He is the one who will build a house—a temple—for me. And I will secure his throne forever. '
  '13':
  - type: text
    content: 'I will be his father, and he will be my son. I will never take my favor from him as I took it from the one who ruled before you. '
  '14':
  - type: text
    content: I will confirm him as king over my house and my kingdom for all time, and his throne will be secure forever.’”
  '15':
  - type: text
    content: 'So Nathan went back to David and told him everything the '
  - type: text
    content: Lord
  - type: text
    content: ' had said in this vision.'
  - type: heading
    content: David’s Prayer of Thanks
  '16':
  - type: text
    content: 'Then King David went in and sat before the '
  - type: text
    content: Lord
  - type: text
    content: ' and prayed,'
  - type: text
    content: '“Who am I, O '
  - type: text
    content: Lord
  - type: text
    content: ' God, and what is my family, that you have brought me this far? '
  '17':
  - type: text
    content: And now, O God, in addition to everything else, you speak of giving your servant a lasting dynasty! You speak as though I were someone very great,
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' O '
  - type: text
    content: Lord
  - type: text
    content: ' God!'
  '18':
  - type: text
    content: '“What more can I say to you about the way you have honored me? You know what your servant is really like. '
  '19':
  - type: text
    content: 'For the sake of your servant, O '
  - type: text
    content: Lord
  - type: text
    content: ', and according to your will, you have done all these great things and have made them known.'
  '2':
  - type: text
    content: Nathan replied to David, “Do whatever you have in mind, for God is with you.”
  '20':
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ', there is no one like you. We have never even heard of another God like you! '
  '21':
  - type: text
    content: 'What other nation on earth is like your people Israel? What other nation, O God, have you redeemed from slavery to be your own people? You made a great name for yourself when you redeemed your people from Egypt. You performed awesome miracles and drove out the nations that stood in their way. '
  '22':
  - type: text
    content: 'You chose Israel to be your very own people forever, and you, O '
  - type: text
    content: Lord
  - type: text
    content: ', became their God.'
  '23':
  - type: text
    content: '“And now, O '
  - type: text
    content: Lord
  - type: text
    content: ', I am your servant; do as you have promised concerning me and my family. May it be a promise that will last forever. '
  '24':
  - type: text
    content: 'And may your name be established and honored forever so that everyone will say, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, is Israel’s God!’ And may the house of your servant David continue before you forever.'
  '25':
  - type: text
    content: '“O my God, I have been bold enough to pray to you because you have revealed to your servant that you will build a house for him—a dynasty of kings! '
  '26':
  - type: text
    content: 'For you are God, O '
  - type: text
    content: Lord
  - type: text
    content: '. And you have promised these good things to your servant. '
  '27':
  - type: text
    content: 'And now, it has pleased you to bless the house of your servant, so that it will continue forever before you. For when you grant a blessing, O '
  - type: text
    content: Lord
  - type: text
    content: ', it is an eternal blessing!”'
  '3':
  - type: text
    content: But that same night God said to Nathan,
  '4':
  - type: text
    content: '“Go and tell my servant David, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has declared: You are not the one to build a house for me to live in. '
  '5':
  - type: text
    content: 'I have never lived in a house, from the day I brought the Israelites out of Egypt until this very day. My home has always been a tent, moving from one place to another in a Tabernacle. '
  '6':
  - type: text
    content: Yet no matter where I have gone with the Israelites, I have never once complained to Israel’s leaders, the shepherds of my people. I have never asked them, “Why haven’t you built me a beautiful cedar house?”’
  '7':
  - type: text
    content: '“Now go and say to my servant David, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies has declared: I took you from tending sheep in the pasture and selected you to be the leader of my people Israel. '
  '8':
  - type: text
    content: 'I have been with you wherever you have gone, and I have destroyed all your enemies before your eyes. Now I will make your name as famous as anyone who has ever lived on the earth! '
  '9':
  - type: text
    content: 'And I will provide a homeland for my people Israel, planting them in a secure place where they will never be disturbed. Evil nations won’t oppress them as they’ve done in the past, '
