document_id: HOS.11,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Love for Israel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When Israel was a child, I loved him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I called my son out of Egypt.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For someday the people will follow me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', will roar like a lion.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And when I roar,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my people will return trembling from the west.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a flock of birds, they will come from Egypt.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Trembling like doves, they will return from Assyria.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will bring them home again,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Charges against Israel and Judah
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:12a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verse 11:12 is numbered 12:1 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: Israel surrounds me with lies and deceit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but Judah still obeys God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and is faithful to the Holy One.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:12b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and Judah is unruly against God, the faithful Holy One. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the more I called to him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the farther he moved from me,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the more they called to him, the farther he moved from them.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: offering sacrifices to the images of Baal
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and burning incense to idols.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I myself taught Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ephraim, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referring to the northern kingdom of Israel; also in 11:8, 9, 12.
      marker-yv: yv-n
    - type: text
      text: ' how to walk,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leading him along by the hand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he doesn’t know or even care
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that it was I who took care of him.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I led Israel along
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with my ropes of kindness and love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I lifted the yoke from his neck,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I myself stooped to feed him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But since my people refuse to return to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will return to Egypt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will be forced to serve Assyria.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: War will swirl through their cities;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their enemies will crash through their gates.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will destroy them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trapping them in their own evil plans.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my people are determined to desert me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They call me the Most High,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they don’t truly honor me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Oh, how can I give you up, Israel?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How can I let you go?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How can I destroy you like Admah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or demolish you like Zeboiim?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart is torn within me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my compassion overflows.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No, I will not unleash my fierce anger.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not completely destroy Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I am God and not a mere mortal.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am the Holy One living among you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will not come to destroy.
