document_id: HOS.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Love for Israel
  - type: text
    content: “When Israel was a child, I loved him,
  - type: text
    content: and I called my son out of Egypt.
  '10':
  - type: text
    content: For someday the people will follow me.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', will roar like a lion.'
  - type: text
    content: And when I roar,
  - type: text
    content: my people will return trembling from the west.
  '11':
  - type: text
    content: Like a flock of birds, they will come from Egypt.
  - type: text
    content: Trembling like doves, they will return from Assyria.
  - type: text
    content: And I will bring them home again,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Charges against Israel and Judah
  '12':
  - type: text
    content: ' '
  - type: note
    content: Verse 11:12 is numbered 12:1 in Hebrew text.
  - type: text
    content: Israel surrounds me with lies and deceit,
  - type: text
    content: but Judah still obeys God
  - type: text
    content: and is faithful to the Holy One.
  - type: note
    content: Or and Judah is unruly against God, the faithful Holy One. The meaning of the Hebrew is uncertain.
  '2':
  - type: text
    content: But the more I called to him,
  - type: text
    content: the farther he moved from me,
  - type: note
    content: As in Greek version; Hebrew reads the more they called to him, the farther he moved from them.
  - type: text
    content: offering sacrifices to the images of Baal
  - type: text
    content: and burning incense to idols.
  '3':
  - type: text
    content: I myself taught Israel
  - type: note
    content: Hebrew Ephraim, referring to the northern kingdom of Israel; also in 11:8, 9, 12.
  - type: text
    content: ' how to walk,'
  - type: text
    content: leading him along by the hand.
  - type: text
    content: But he doesn’t know or even care
  - type: text
    content: that it was I who took care of him.
  '4':
  - type: text
    content: I led Israel along
  - type: text
    content: with my ropes of kindness and love.
  - type: text
    content: I lifted the yoke from his neck,
  - type: text
    content: and I myself stooped to feed him.
  '5':
  - type: text
    content: “But since my people refuse to return to me,
  - type: text
    content: they will return to Egypt
  - type: text
    content: and will be forced to serve Assyria.
  '6':
  - type: text
    content: War will swirl through their cities;
  - type: text
    content: their enemies will crash through their gates.
  - type: text
    content: They will destroy them,
  - type: text
    content: trapping them in their own evil plans.
  '7':
  - type: text
    content: For my people are determined to desert me.
  - type: text
    content: They call me the Most High,
  - type: text
    content: but they don’t truly honor me.
  '8':
  - type: text
    content: “Oh, how can I give you up, Israel?
  - type: text
    content: How can I let you go?
  - type: text
    content: How can I destroy you like Admah
  - type: text
    content: or demolish you like Zeboiim?
  - type: text
    content: My heart is torn within me,
  - type: text
    content: and my compassion overflows.
  '9':
  - type: text
    content: No, I will not unleash my fierce anger.
  - type: text
    content: I will not completely destroy Israel,
  - type: text
    content: for I am God and not a mere mortal.
  - type: text
    content: I am the Holy One living among you,
  - type: text
    content: and I will not come to destroy.
