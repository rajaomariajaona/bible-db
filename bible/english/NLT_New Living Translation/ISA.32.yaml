document_id: ISA.32,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Ultimate Deliverance
  - type: text
    content: Look, a righteous king is coming!
  - type: text
    content: And honest princes will rule under him.
  '10':
  - type: text
    content: In a short time—just a little more than a year—
  - type: text
    content: you careless ones will suddenly begin to care.
  - type: text
    content: For your fruit crops will fail,
  - type: text
    content: and the harvest will never take place.
  '11':
  - type: text
    content: Tremble, you women of ease;
  - type: text
    content: throw off your complacency.
  - type: text
    content: Strip off your pretty clothes,
  - type: text
    content: and put on burlap to show your grief.
  '12':
  - type: text
    content: Beat your breasts in sorrow for your bountiful farms
  - type: text
    content: and your fruitful grapevines.
  '13':
  - type: text
    content: For your land will be overgrown with thorns and briers.
  - type: text
    content: Your joyful homes and happy towns will be gone.
  '14':
  - type: text
    content: The palace and the city will be deserted,
  - type: text
    content: and busy towns will be empty.
  - type: text
    content: Wild donkeys will frolic and flocks will graze
  - type: text
    content: in the empty forts
  - type: note
    content: Hebrew the Ophel.
  - type: text
    content: ' and watchtowers'
  '15':
  - type: text
    content: until at last the Spirit is poured out
  - type: text
    content: on us from heaven.
  - type: text
    content: Then the wilderness will become a fertile field,
  - type: text
    content: and the fertile field will yield bountiful crops.
  '16':
  - type: text
    content: Justice will rule in the wilderness
  - type: text
    content: and righteousness in the fertile field.
  '17':
  - type: text
    content: And this righteousness will bring peace.
  - type: text
    content: Yes, it will bring quietness and confidence forever.
  '18':
  - type: text
    content: My people will live in safety, quietly at home.
  - type: text
    content: They will be at rest.
  '19':
  - type: text
    content: Even if the forest should be destroyed
  - type: text
    content: and the city torn down,
  '2':
  - type: text
    content: Each one will be like a shelter from the wind
  - type: text
    content: and a refuge from the storm,
  - type: text
    content: like streams of water in the desert
  - type: text
    content: and the shadow of a great rock in a parched land.
  '20':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will greatly bless his people.'
  - type: text
    content: Wherever they plant seed, bountiful crops will spring up.
  - type: text
    content: Their cattle and donkeys will graze freely.
  '3':
  - type: text
    content: Then everyone who has eyes will be able to see the truth,
  - type: text
    content: and everyone who has ears will be able to hear it.
  '4':
  - type: text
    content: Even the hotheads will be full of sense and understanding.
  - type: text
    content: Those who stammer will speak out plainly.
  '5':
  - type: text
    content: In that day ungodly fools will not be heroes.
  - type: text
    content: Scoundrels will not be respected.
  '6':
  - type: text
    content: For fools speak foolishness
  - type: text
    content: and make evil plans.
  - type: text
    content: They practice ungodliness
  - type: text
    content: 'and spread false teachings about the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: They deprive the hungry of food
  - type: text
    content: and give no water to the thirsty.
  '7':
  - type: text
    content: The smooth tricks of scoundrels are evil.
  - type: text
    content: They plot crooked schemes.
  - type: text
    content: They lie to convict the poor,
  - type: text
    content: even when the cause of the poor is just.
  '8':
  - type: text
    content: But generous people plan to do what is generous,
  - type: text
    content: and they stand firm in their generosity.
  '9':
  - type: text
    content: Listen, you women who lie around in ease.
  - type: text
    content: Listen to me, you who are so smug.
