document_id: ISA.32,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Ultimate Deliverance
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look, a righteous king is coming!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And honest princes will rule under him.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In a short time—just a little more than a year—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you careless ones will suddenly begin to care.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your fruit crops will fail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the harvest will never take place.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tremble, you women of ease;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: throw off your complacency.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strip off your pretty clothes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and put on burlap to show your grief.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beat your breasts in sorrow for your bountiful farms
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your fruitful grapevines.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your land will be overgrown with thorns and briers.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your joyful homes and happy towns will be gone.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The palace and the city will be deserted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and busy towns will be empty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wild donkeys will frolic and flocks will graze
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the empty forts
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Ophel.
      marker-yv: yv-n
    - type: text
      text: ' and watchtowers'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until at last the Spirit is poured out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on us from heaven.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the wilderness will become a fertile field,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the fertile field will yield bountiful crops.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Justice will rule in the wilderness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and righteousness in the fertile field.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And this righteousness will bring peace.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, it will bring quietness and confidence forever.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My people will live in safety, quietly at home.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be at rest.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if the forest should be destroyed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the city torn down,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each one will be like a shelter from the wind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a refuge from the storm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like streams of water in the desert
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the shadow of a great rock in a parched land.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will greatly bless his people.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wherever they plant seed, bountiful crops will spring up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their cattle and donkeys will graze freely.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then everyone who has eyes will be able to see the truth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and everyone who has ears will be able to hear it.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the hotheads will be full of sense and understanding.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Those who stammer will speak out plainly.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In that day ungodly fools will not be heroes.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Scoundrels will not be respected.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For fools speak foolishness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make evil plans.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They practice ungodliness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and spread false teachings about the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They deprive the hungry of food
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and give no water to the thirsty.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The smooth tricks of scoundrels are evil.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They plot crooked schemes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They lie to convict the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even when the cause of the poor is just.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But generous people plan to do what is generous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they stand firm in their generosity.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, you women who lie around in ease.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Listen to me, you who are so smug.
