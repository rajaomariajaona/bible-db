document_id: ROM.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Faith of Abraham
  - type: text
    content: 'Abraham was, humanly speaking, the founder of our Jewish nation. What did he discover about being made right with God? '
  '10':
  - type: text
    content: But how did this happen? Was he counted as righteous only after he was circumcised, or was it before he was circumcised? Clearly, God accepted Abraham before he was circumcised!
  '11':
  - type: text
    content: 'Circumcision was a sign that Abraham already had faith and that God had already accepted him and declared him to be righteous—even before he was circumcised. So Abraham is the spiritual father of those who have faith but have not been circumcised. They are counted as righteous because of their faith. '
  '12':
  - type: text
    content: And Abraham is also the spiritual father of those who have been circumcised, but only if they have the same kind of faith Abraham had before he was circumcised.
  '13':
  - type: text
    content: 'Clearly, God’s promise to give the whole earth to Abraham and his descendants was based not on his obedience to God’s law, but on a right relationship with God that comes by faith. '
  '14':
  - type: text
    content: 'If God’s promise is only for those who obey the law, then faith is not necessary and the promise is pointless. '
  '15':
  - type: text
    content: For the law always brings punishment on those who try to obey it. (The only way to avoid breaking the law is to have no law to break!)
  '16':
  - type: text
    content: 'So the promise is received by faith. It is given as a free gift. And we are all certain to receive it, whether or not we live according to the law of Moses, if we have faith like Abraham’s. For Abraham is the father of all who believe. '
  '17':
  - type: text
    content: That is what the Scriptures mean when God told him, “I have made you the father of many nations.”
  - type: note
    content: Gen 17:5.
  - type: text
    content: ' This happened because Abraham believed in the God who brings the dead back to life and who creates new things out of nothing.'
  '18':
  - type: text
    content: Even when there was no reason for hope, Abraham kept hoping—believing that he would become the father of many nations. For God had said to him, “That’s how many descendants you will have!”
  - type: note
    content: Gen 15:5.
  - type: text
    content: ' '
  '19':
  - type: text
    content: And Abraham’s faith did not weaken, even though, at about 100 years of age, he figured his body was as good as dead—and so was Sarah’s womb.
  '2':
  - type: text
    content: 'If his good deeds had made him acceptable to God, he would have had something to boast about. But that was not God’s way. '
  '20':
  - type: text
    content: 'Abraham never wavered in believing God’s promise. In fact, his faith grew stronger, and in this he brought glory to God. '
  '21':
  - type: text
    content: 'He was fully convinced that God is able to do whatever he promises. '
  '22':
  - type: text
    content: 'And because of Abraham’s faith, God counted him as righteous. '
  '23':
  - type: text
    content: 'And when God counted him as righteous, it wasn’t just for Abraham’s benefit. It was recorded '
  '24':
  - type: text
    content: 'for our benefit, too, assuring us that God will also count us as righteous if we believe in him, the one who raised Jesus our Lord from the dead. '
  '25':
  - type: text
    content: He was handed over to die because of our sins, and he was raised to life to make us right with God.
  '3':
  - type: text
    content: For the Scriptures tell us, “Abraham believed God, and God counted him as righteous because of his faith.”
  - type: note
    content: Gen 15:6.
  '4':
  - type: text
    content: 'When people work, their wages are not a gift, but something they have earned. '
  '5':
  - type: text
    content: 'But people are counted as righteous, not because of their work, but because of their faith in God who forgives sinners. '
  '6':
  - type: text
    content: 'David also spoke of this when he described the happiness of those who are declared righteous without working for it:'
  '7':
  - type: text
    content: “Oh, what joy for those
  - type: text
    content: whose disobedience is forgiven,
  - type: text
    content: whose sins are put out of sight.
  '8':
  - type: text
    content: Yes, what joy for those
  - type: text
    content: 'whose record the '
  - type: text
    content: Lord
  - type: text
    content: ' has cleared of sin.”'
  - type: note
    content: Ps 32:1-2 (Greek version).
  '9':
  - type: text
    content: Now, is this blessing only for the Jews, or is it also for uncircumcised Gentiles?
  - type: note
    content: Greek is this blessing only for the circumcised, or is it also for the uncircumcised?
  - type: text
    content: ' Well, we have been saying that Abraham was counted as righteous by God because of his faith. '
