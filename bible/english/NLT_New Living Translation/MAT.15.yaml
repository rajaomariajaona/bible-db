document_id: MAT.15,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Teaches about Inner Purity
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Some Pharisees and teachers of religious law now arrived from Jerusalem to see Jesus. They asked him, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus called to the crowd to come and hear. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Listen,” '
    - type: text
      text: 'he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “and try to understand.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It’s not what goes into your mouth that defiles you; you are defiled by the words that come out of your mouth.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the disciples came to him and asked, “Do you realize you offended the Pharisees by what you just said?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Every plant not planted by my heavenly Father will be uprooted,
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: so ignore them. They are blind guides leading the blind, and if one blind person guides another, they will both fall into a ditch.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Peter said to Jesus, “Explain to us the parable that says people aren’t defiled by what they eat.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Don’t you understand yet?” '
    - type: text
      text: 'Jesus asked. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Anything you eat passes through the stomach and then goes into the sewer.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But the words you speak come from the heart—that’s what defiles you.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For from the heart come evil thoughts, murder, adultery, all sexual immorality, theft, lying, and slander.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “Why do your disciples disobey our age-old tradition? For they ignore our tradition of ceremonial hand washing before they eat.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: These are what defile you. Eating with unwashed hands will never defile you.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Faith of a Gentile Woman
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Jesus left Galilee and went north to the region of Tyre and Sidon. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: A Gentile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Canaanite.
      marker-yv: yv-n
    - type: text
      text: ' woman who lived there came to him, pleading, “Have mercy on me, O Lord, Son of David! For my daughter is possessed by a demon that torments her severely.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Jesus gave her no reply, not even a word. Then his disciples urged him to send her away. “Tell her to go away,” they said. “She is bothering us with all her begging.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said to the woman, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I was sent only to help God’s lost sheep—the people of Israel.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But she came and worshiped him, pleading again, “Lord, help me!”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus responded, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It isn’t right to take food from the children and throw it to the dogs.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She replied, “That’s true, Lord, but even dogs are allowed to eat the scraps that fall beneath their masters’ table.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Dear woman,” '
    - type: text
      text: 'Jesus said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “your faith is great. Your request is granted.”
    - type: text
      text: ' And her daughter was instantly healed.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals Many People
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus returned to the Sea of Galilee and climbed a hill and sat down. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And why do you, by your traditions, violate the direct commandments of God?
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'A vast crowd brought to him people who were lame, blind, crippled, those who couldn’t speak, and many others. They laid them before Jesus, and he healed them all. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The crowd was amazed! Those who hadn’t been able to speak were talking, the crippled were made well, the lame were walking, and the blind could see again! And they praised the God of Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Feeds Four Thousand
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Jesus called his disciples and told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I feel sorry for these people. They have been here with me for three days, and they have nothing left to eat. I don’t want to send them away hungry, or they will faint along the way.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The disciples replied, “Where would we get enough food here in the wilderness for such a huge crowd?”
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How much bread do you have?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They replied, “Seven loaves, and a few small fish.”
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jesus told all the people to sit down on the ground. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he took the seven loaves and the fish, thanked God for them, and broke them into pieces. He gave them to the disciples, who distributed the food to the crowd.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They all ate as much as they wanted. Afterward, the disciples picked up seven large baskets of leftover food. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There were 4,000 men who were fed that day, in addition to all the women and children. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Jesus sent the people home, and he got into a boat and crossed over to the region of Magadan.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For instance, God says, ‘Honor your father and mother,’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:4a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 20:12; Deut 5:16.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and ‘Anyone who speaks disrespectfully of father or mother must be put to death.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:4b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 21:17 (Greek version); Lev 20:9 (Greek version).
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But you say it is all right for people to say to their parents, ‘Sorry, I can’t help you. For I have vowed to give to God what I would have given to you.’
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In this way, you say they don’t need to honor their parents.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'their father; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'other manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: their father or their mother.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And so you cancel the word of God for the sake of your own tradition.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You hypocrites! Isaiah was right when he prophesied about you, for he wrote,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘These people honor me with their lips,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but their hearts are far from me.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Their worship is a farce,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for they teach man-made ideas as commands from God.’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:8-9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 29:13 (Greek version).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
