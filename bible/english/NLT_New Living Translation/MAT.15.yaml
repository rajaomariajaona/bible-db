document_id: MAT.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Teaches about Inner Purity
  - type: text
    content: 'Some Pharisees and teachers of religious law now arrived from Jerusalem to see Jesus. They asked him, '
  '10':
  - type: text
    content: 'Then Jesus called to the crowd to come and hear. '
  - type: text
    content: '“Listen,” '
  - type: text
    content: 'he said, '
  - type: text
    content: “and try to understand.
  - type: text
    content: ' '
  '11':
  - type: text
    content: It’s not what goes into your mouth that defiles you; you are defiled by the words that come out of your mouth.”
  '12':
  - type: text
    content: Then the disciples came to him and asked, “Do you realize you offended the Pharisees by what you just said?”
  '13':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Every plant not planted by my heavenly Father will be uprooted,
  - type: text
    content: ' '
  '14':
  - type: text
    content: so ignore them. They are blind guides leading the blind, and if one blind person guides another, they will both fall into a ditch.”
  '15':
  - type: text
    content: Then Peter said to Jesus, “Explain to us the parable that says people aren’t defiled by what they eat.”
  '16':
  - type: text
    content: ' '
  - type: text
    content: '“Don’t you understand yet?” '
  - type: text
    content: 'Jesus asked. '
  '17':
  - type: text
    content: “Anything you eat passes through the stomach and then goes into the sewer.
  - type: text
    content: ' '
  '18':
  - type: text
    content: But the words you speak come from the heart—that’s what defiles you.
  - type: text
    content: ' '
  '19':
  - type: text
    content: For from the heart come evil thoughts, murder, adultery, all sexual immorality, theft, lying, and slander.
  - type: text
    content: ' '
  '2':
  - type: text
    content: “Why do your disciples disobey our age-old tradition? For they ignore our tradition of ceremonial hand washing before they eat.”
  '20':
  - type: text
    content: These are what defile you. Eating with unwashed hands will never defile you.”
  - type: heading
    content: The Faith of a Gentile Woman
  '21':
  - type: text
    content: 'Then Jesus left Galilee and went north to the region of Tyre and Sidon. '
  '22':
  - type: text
    content: A Gentile
  - type: note
    content: Greek Canaanite.
  - type: text
    content: ' woman who lived there came to him, pleading, “Have mercy on me, O Lord, Son of David! For my daughter is possessed by a demon that torments her severely.”'
  '23':
  - type: text
    content: But Jesus gave her no reply, not even a word. Then his disciples urged him to send her away. “Tell her to go away,” they said. “She is bothering us with all her begging.”
  '24':
  - type: text
    content: 'Then Jesus said to the woman, '
  - type: text
    content: “I was sent only to help God’s lost sheep—the people of Israel.”
  '25':
  - type: text
    content: But she came and worshiped him, pleading again, “Lord, help me!”
  '26':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “It isn’t right to take food from the children and throw it to the dogs.”
  '27':
  - type: text
    content: She replied, “That’s true, Lord, but even dogs are allowed to eat the scraps that fall beneath their masters’ table.”
  '28':
  - type: text
    content: ' '
  - type: text
    content: '“Dear woman,” '
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: “your faith is great. Your request is granted.”
  - type: text
    content: ' And her daughter was instantly healed.'
  - type: heading
    content: Jesus Heals Many People
  '29':
  - type: text
    content: 'Jesus returned to the Sea of Galilee and climbed a hill and sat down. '
  '3':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “And why do you, by your traditions, violate the direct commandments of God?
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'A vast crowd brought to him people who were lame, blind, crippled, those who couldn’t speak, and many others. They laid them before Jesus, and he healed them all. '
  '31':
  - type: text
    content: The crowd was amazed! Those who hadn’t been able to speak were talking, the crippled were made well, the lame were walking, and the blind could see again! And they praised the God of Israel.
  - type: heading
    content: Jesus Feeds Four Thousand
  '32':
  - type: text
    content: 'Then Jesus called his disciples and told them, '
  - type: text
    content: “I feel sorry for these people. They have been here with me for three days, and they have nothing left to eat. I don’t want to send them away hungry, or they will faint along the way.”
  '33':
  - type: text
    content: The disciples replied, “Where would we get enough food here in the wilderness for such a huge crowd?”
  '34':
  - type: text
    content: 'Jesus asked, '
  - type: text
    content: “How much bread do you have?”
  - type: text
    content: They replied, “Seven loaves, and a few small fish.”
  '35':
  - type: text
    content: 'So Jesus told all the people to sit down on the ground. '
  '36':
  - type: text
    content: Then he took the seven loaves and the fish, thanked God for them, and broke them into pieces. He gave them to the disciples, who distributed the food to the crowd.
  '37':
  - type: text
    content: 'They all ate as much as they wanted. Afterward, the disciples picked up seven large baskets of leftover food. '
  '38':
  - type: text
    content: 'There were 4,000 men who were fed that day, in addition to all the women and children. '
  '39':
  - type: text
    content: Then Jesus sent the people home, and he got into a boat and crossed over to the region of Magadan.
  '4':
  - type: text
    content: For instance, God says, ‘Honor your father and mother,’
  - type: note
    content: Exod 20:12; Deut 5:16.
  - type: text
    content: ' '
  - type: text
    content: and ‘Anyone who speaks disrespectfully of father or mother must be put to death.’
  - type: note
    content: Exod 21:17 (Greek version); Lev 20:9 (Greek version).
  - type: text
    content: ' '
  '5':
  - type: text
    content: But you say it is all right for people to say to their parents, ‘Sorry, I can’t help you. For I have vowed to give to God what I would have given to you.’
  - type: text
    content: ' '
  '6':
  - type: text
    content: In this way, you say they don’t need to honor their parents.
  - type: note
    content: Greek their father; other manuscripts read their father or their mother.
  - type: text
    content: ' '
  - type: text
    content: And so you cancel the word of God for the sake of your own tradition.
  - type: text
    content: ' '
  '7':
  - type: text
    content: You hypocrites! Isaiah was right when he prophesied about you, for he wrote,
  '8':
  - type: text
    content: ' '
  - type: text
    content: ‘These people honor me with their lips,
  - type: text
    content: but their hearts are far from me.
  '9':
  - type: text
    content: ' '
  - type: text
    content: Their worship is a farce,
  - type: text
    content: for they teach man-made ideas as commands from God.’
  - type: text
    content: ' '
  - type: note
    content: Isa 29:13 (Greek version).
  - type: text
    content: ”
