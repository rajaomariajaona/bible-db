document_id: REV.10,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Angel and the Small Scroll
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then I saw another mighty angel coming down from heaven, surrounded by a cloud, with a rainbow over his head. His face shone like the sun, and his feet were like pillars of fire. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I took the small scroll from the hand of the angel, and I ate it! It was sweet in my mouth, but when I swallowed it, it turned sour in my stomach.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I was told, “You must prophesy again about many peoples, nations, languages, and kings.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And in his hand was a small scroll
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'book; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 10:8, 9, 10.
      marker-yv: yv-n
    - type: text
      text: ' that had been opened. He stood with his right foot on the sea and his left foot on the land. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And he gave a great shout like the roar of a lion. And when he shouted, the seven thunders answered.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the seven thunders spoke, I was about to write. But I heard a voice from heaven saying, “Keep secret
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Seal up.
      marker-yv: yv-n
    - type: text
      text: ' what the seven thunders said, and do not write it down.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the angel I saw standing on the sea and on the land raised his right hand toward heaven. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He swore an oath in the name of the one who lives forever and ever, who created the heavens and everything in them, the earth and everything in it, and the sea and everything in it. He said, “There will be no more delay. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the seventh angel blows his trumpet, God’s mysterious plan will be fulfilled. It will happen just as he announced it to his servants the prophets.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the voice from heaven spoke to me again: “Go and take the open scroll from the hand of the angel who is standing on the sea and on the land.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I went to the angel and told him to give me the small scroll. “Yes, take it and eat it,” he said. “It will be sweet as honey in your mouth, but it will turn sour in your stomach!” '
