document_id: NUM.35,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Towns for the Levites
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'While Israel was camped beside the Jordan on the plains of Moab across from Jericho, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “Give the following instructions to the people of Israel.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When you cross the Jordan into the land of Canaan, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'designate cities of refuge to which people can flee if they have killed someone accidentally. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These cities will be places of protection from a dead person’s relatives who want to avenge the death. The slayer must not be put to death before being tried by the community. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Designate six cities of refuge for yourselves, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'three on the east side of the Jordan River and three on the west in the land of Canaan. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These cities are for the protection of Israelites, foreigners living among you, and traveling merchants. Anyone who accidentally kills someone may flee there for safety.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But if someone strikes and kills another person with a piece of iron, it is murder, and the murderer must be executed. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or if someone with a stone in his hand strikes and kills another person, it is murder, and the murderer must be put to death. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or if someone strikes and kills another person with a wooden object, it is murder, and the murderer must be put to death. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The victim’s nearest relative is responsible for putting the murderer to death. When they meet, the avenger must put the murderer to death. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Command the people of Israel to give to the Levites from their property certain towns to live in, along with the surrounding pasturelands. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So if someone hates another person and waits in ambush, then pushes him or throws something at him and he dies, it is murder. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or if someone hates another person and hits him with a fist and he dies, it is murder. In such cases, the avenger must put the murderer to death when they meet.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But suppose someone pushes another person without having shown previous hostility, or throws something that unintentionally hits another person, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or accidentally drops a huge stone on someone, though they were not enemies, and the person dies. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If this should happen, the community must follow these regulations in making a judgment between the slayer and the avenger, the victim’s nearest relative: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The community must protect the slayer from the avenger and must escort the slayer back to live in the city of refuge to which he fled. There he must remain until the death of the high priest, who was anointed with the sacred oil.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But if the slayer ever leaves the limits of the city of refuge, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the avenger finds him outside the city and kills him, it will not be considered murder. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The slayer should have stayed inside the city of refuge until the death of the high priest. But after the death of the high priest, the slayer may return to his own property. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These are legal requirements for you to observe from generation to generation, wherever you may live.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'These towns will be for the Levites to live in, and the surrounding lands will provide pasture for their cattle, flocks, and other livestock. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“All murderers must be put to death, but only if evidence is presented by more than one witness. No one may be put to death on the testimony of only one witness. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also, you must never accept a ransom payment for the life of someone judged guilty of murder and subject to execution; murderers must always be put to death. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And never accept a ransom payment from someone who has fled to a city of refuge, allowing a slayer to return to his property before the death of the high priest. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This will ensure that the land where you live will not be polluted, for murder pollutes the land. And no sacrifice except the execution of the murderer can purify the land from murder.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: can make atonement for murder.
      marker-yv: yv-n
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You must not defile the land where you live, for I live there myself. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who lives among the people of Israel.”'
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The pastureland assigned to the Levites around these towns will extend 1,500 feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1,000 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[460 meters].'
      marker-yv: yv-n
    - type: text
      text: ' from the town walls in every direction. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Measure off 3,000 feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2,000 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[920 meters].'
      marker-yv: yv-n
    - type: text
      text: ' outside the town walls in every direction—east, south, west, north—with the town at the center. This area will serve as the larger pastureland for the towns.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Six of the towns you give the Levites will be cities of refuge, where a person who has accidentally killed someone can flee for safety. In addition, give them forty-two other towns. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In all, forty-eight towns with the surrounding pastureland will be given to the Levites. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These towns will come from the property of the people of Israel. The larger tribes will give more towns to the Levites, while the smaller tribes will give fewer. Each tribe will give property in proportion to the size of its land.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cities of Refuge
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
