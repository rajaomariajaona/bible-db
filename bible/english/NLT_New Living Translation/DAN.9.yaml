document_id: DAN.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel’s Prayer for His People
  - type: text
    content: It was the first year of the reign of Darius the Mede, the son of Ahasuerus, who became king of the Babylonians.
  - type: note
    content: Or the Chaldeans.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'We have not obeyed the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, for we have not followed the instructions he gave us through his servants the prophets. '
  '11':
  - type: text
    content: All Israel has disobeyed your instruction and turned away, refusing to listen to your voice.
  - type: text
    content: '“So now the solemn curses and judgments written in the Law of Moses, the servant of God, have been poured down on us because of our sin. '
  '12':
  - type: text
    content: 'You have kept your word and done to us and our rulers exactly as you warned. Never has there been such a disaster as happened in Jerusalem. '
  '13':
  - type: text
    content: 'Every curse written against us in the Law of Moses has come true. Yet we have refused to seek mercy from the '
  - type: text
    content: Lord
  - type: text
    content: ' our God by turning from our sins and recognizing his truth. '
  '14':
  - type: text
    content: 'Therefore, the '
  - type: text
    content: Lord
  - type: text
    content: ' has brought upon us the disaster he prepared. The '
  - type: text
    content: Lord
  - type: text
    content: ' our God was right to do all of these things, for we did not obey him.'
  '15':
  - type: text
    content: '“O Lord our God, you brought lasting honor to your name by rescuing your people from Egypt in a great display of power. But we have sinned and are full of wickedness. '
  '16':
  - type: text
    content: In view of all your faithful mercies, Lord, please turn your furious anger away from your city Jerusalem, your holy mountain. All the neighboring nations mock Jerusalem and your people because of our sins and the sins of our ancestors.
  '17':
  - type: text
    content: “O our God, hear your servant’s prayer! Listen as I plead. For your own sake, Lord, smile again on your desolate sanctuary.
  '18':
  - type: text
    content: “O my God, lean down and listen to me. Open your eyes and see our despair. See how your city—the city that bears your name—lies in ruins. We make this plea, not because we deserve help, but because of your mercy.
  '19':
  - type: text
    content: “O Lord, hear. O Lord, forgive. O Lord, listen and act! For your own sake, do not delay, O my God, for your people and your city bear your name.”
  - type: heading
    content: Gabriel’s Message about the Anointed One
  '2':
  - type: text
    content: 'During the first year of his reign, I, Daniel, learned from reading the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', as revealed to Jeremiah the prophet, that Jerusalem must lie desolate for seventy years.'
  - type: note
    content: See Jer 25:11-12; 29:10.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'I went on praying and confessing my sin and the sin of my people, pleading with the '
  - type: text
    content: Lord
  - type: text
    content: ' my God for Jerusalem, his holy mountain. '
  '21':
  - type: text
    content: 'As I was praying, Gabriel, whom I had seen in the earlier vision, came swiftly to me at the time of the evening sacrifice. '
  '22':
  - type: text
    content: 'He explained to me, “Daniel, I have come here to give you insight and understanding. '
  '23':
  - type: text
    content: The moment you began praying, a command was given. And now I am here to tell you what it was, for you are very precious to God. Listen carefully so that you can understand the meaning of your vision.
  '24':
  - type: text
    content: “A period of seventy sets of seven
  - type: note
    content: Hebrew seventy sevens.
  - type: text
    content: ' has been decreed for your people and your holy city to finish their rebellion, to put an end to their sin, to atone for their guilt, to bring in everlasting righteousness, to confirm the prophetic vision, and to anoint the Most Holy Place.'
  - type: note
    content: Or the Most Holy One.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Now listen and understand! Seven sets of seven plus sixty-two sets of seven
  - type: note
    content: Hebrew Seven sevens plus sixty-two sevens.
  - type: text
    content: ' will pass from the time the command is given to rebuild Jerusalem until a ruler—the Anointed One'
  - type: note
    content: Or an anointed one; similarly in 9:26. Hebrew reads a messiah.
  - type: text
    content: —comes. Jerusalem will be rebuilt with streets and strong defenses,
  - type: note
    content: Or and a moat, or and trenches.
  - type: text
    content: ' despite the perilous times.'
  '26':
  - type: text
    content: “After this period of sixty-two sets of seven,
  - type: note
    content: Hebrew After sixty-two sevens.
  - type: text
    content: ' the Anointed One will be killed, appearing to have accomplished nothing, and a ruler will arise whose armies will destroy the city and the Temple. The end will come with a flood, and war and its miseries are decreed from that time to the very end. '
  '27':
  - type: text
    content: The ruler will make a treaty with the people for a period of one set of seven,
  - type: note
    content: Hebrew for one seven.
  - type: text
    content: ' but after half this time, he will put an end to the sacrifices and offerings. And as a climax to all his terrible deeds,'
  - type: note
    content: Hebrew And on the wing; the meaning of the Hebrew is uncertain.
  - type: text
    content: ' he will set up a sacrilegious object that causes desecration,'
  - type: note
    content: Hebrew an abomination of desolation.
  - type: text
    content: ' until the fate decreed for this defiler is finally poured out on him.”'
  '3':
  - type: text
    content: So I turned to the Lord God and pleaded with him in prayer and fasting. I also wore rough burlap and sprinkled myself with ashes.
  '4':
  - type: text
    content: 'I prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' my God and confessed:'
  - type: text
    content: '“O Lord, you are a great and awesome God! You always fulfill your covenant and keep your promises of unfailing love to those who love you and obey your commands. '
  '5':
  - type: text
    content: 'But we have sinned and done wrong. We have rebelled against you and scorned your commands and regulations. '
  '6':
  - type: text
    content: We have refused to listen to your servants the prophets, who spoke on your authority to our kings and princes and ancestors and to all the people of the land.
  '7':
  - type: text
    content: '“Lord, you are in the right; but as you see, our faces are covered with shame. This is true of all of us, including the people of Judah and Jerusalem and all Israel, scattered near and far, wherever you have driven us because of our disloyalty to you. '
  '8':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', we and our kings, princes, and ancestors are covered with shame because we have sinned against you. '
  '9':
  - type: text
    content: 'But the Lord our God is merciful and forgiving, even though we have rebelled against him. '
