document_id: DAN.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Daniel’s Prayer for His People
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: It was the first year of the reign of Darius the Mede, the son of Ahasuerus, who became king of the Babylonians.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Chaldeans.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'We have not obeyed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, for we have not followed the instructions he gave us through his servants the prophets. '
  '11':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: All Israel has disobeyed your instruction and turned away, refusing to listen to your voice.
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“So now the solemn curses and judgments written in the Law of Moses, the servant of God, have been poured down on us because of our sin. '
  '12':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'You have kept your word and done to us and our rulers exactly as you warned. Never has there been such a disaster as happened in Jerusalem. '
  '13':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Every curse written against us in the Law of Moses has come true. Yet we have refused to seek mercy from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God by turning from our sins and recognizing his truth. '
  '14':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Therefore, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has brought upon us the disaster he prepared. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God was right to do all of these things, for we did not obey him.'
  '15':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“O Lord our God, you brought lasting honor to your name by rescuing your people from Egypt in a great display of power. But we have sinned and are full of wickedness. '
  '16':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: In view of all your faithful mercies, Lord, please turn your furious anger away from your city Jerusalem, your holy mountain. All the neighboring nations mock Jerusalem and your people because of our sins and the sins of our ancestors.
  '17':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: “O our God, hear your servant’s prayer! Listen as I plead. For your own sake, Lord, smile again on your desolate sanctuary.
  '18':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: “O my God, lean down and listen to me. Open your eyes and see our despair. See how your city—the city that bears your name—lies in ruins. We make this plea, not because we deserve help, but because of your mercy.
  '19':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: “O Lord, hear. O Lord, forgive. O Lord, listen and act! For your own sake, do not delay, O my God, for your people and your city bear your name.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gabriel’s Message about the Anointed One
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'During the first year of his reign, I, Daniel, learned from reading the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', as revealed to Jeremiah the prophet, that Jerusalem must lie desolate for seventy years.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Jer 25:11-12; 29:10.
      marker-yv: yv-n
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I went on praying and confessing my sin and the sin of my people, pleading with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God for Jerusalem, his holy mountain. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As I was praying, Gabriel, whom I had seen in the earlier vision, came swiftly to me at the time of the evening sacrifice. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He explained to me, “Daniel, I have come here to give you insight and understanding. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The moment you began praying, a command was given. And now I am here to tell you what it was, for you are very precious to God. Listen carefully so that you can understand the meaning of your vision.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “A period of seventy sets of seven
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:24a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: seventy sevens.
      marker-yv: yv-n
    - type: text
      text: ' has been decreed for your people and your holy city to finish their rebellion, to put an end to their sin, to atone for their guilt, to bring in everlasting righteousness, to confirm the prophetic vision, and to anoint the Most Holy Place.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:24b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Most Holy One.
      marker-yv: yv-n
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now listen and understand! Seven sets of seven plus sixty-two sets of seven
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:25a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Seven sevens plus sixty-two sevens.
      marker-yv: yv-n
    - type: text
      text: ' will pass from the time the command is given to rebuild Jerusalem until a ruler—the Anointed One'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:25b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'an anointed one; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'similarly in 9:26. Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a messiah.
      marker-yv: yv-n
    - type: text
      text: —comes. Jerusalem will be rebuilt with streets and strong defenses,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:25c '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and a moat, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and trenches.
      marker-yv: yv-n
    - type: text
      text: ' despite the perilous times.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “After this period of sixty-two sets of seven,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: After sixty-two sevens.
      marker-yv: yv-n
    - type: text
      text: ' the Anointed One will be killed, appearing to have accomplished nothing, and a ruler will arise whose armies will destroy the city and the Temple. The end will come with a flood, and war and its miseries are decreed from that time to the very end. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The ruler will make a treaty with the people for a period of one set of seven,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:27a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for one seven.
      marker-yv: yv-n
    - type: text
      text: ' but after half this time, he will put an end to the sacrifices and offerings. And as a climax to all his terrible deeds,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:27b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'And on the wing; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: the meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' he will set up a sacrilegious object that causes desecration,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:27c '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: an abomination of desolation.
      marker-yv: yv-n
    - type: text
      text: ' until the fate decreed for this defiler is finally poured out on him.”'
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So I turned to the Lord God and pleaded with him in prayer and fasting. I also wore rough burlap and sprinkled myself with ashes.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I prayed to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God and confessed:'
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: '“O Lord, you are a great and awesome God! You always fulfill your covenant and keep your promises of unfailing love to those who love you and obey your commands. '
  '5':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'But we have sinned and done wrong. We have rebelled against you and scorned your commands and regulations. '
  '6':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: We have refused to listen to your servants the prophets, who spoke on your authority to our kings and princes and ancestors and to all the people of the land.
  '7':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“Lord, you are in the right; but as you see, our faces are covered with shame. This is true of all of us, including the people of Judah and Jerusalem and all Israel, scattered near and far, wherever you have driven us because of our disloyalty to you. '
  '8':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', we and our kings, princes, and ancestors are covered with shame because we have sinned against you. '
  '9':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'But the Lord our God is merciful and forgiving, even though we have rebelled against him. '
