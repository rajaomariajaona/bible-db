document_id: ACT.26
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Agrippa said to Paul, “You may speak in your defense.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So Paul, gesturing with his hand, started his defense: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“I am fortunate, King Agrippa, that you are the one hearing my defense today against all these accusations made by the Jewish leaders, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: for I know you are an expert on all Jewish customs and controversies. Now please listen to me patiently!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“As the Jewish leaders are well aware, I was given a thorough Jewish training from my earliest childhood among my own people and in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'If they would admit it, they know that I have been a member of the Pharisees, the strictest sect of our religion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now I am on trial because of my hope in the fulfillment of God’s promise made to our ancestors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'In fact, that is why the twelve tribes of Israel zealously worship God night and day, and they share the same hope I have. Yet, Your Majesty, they accuse me for having this hope! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Why does it seem incredible to any of you that God can raise the dead?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “I used to believe that I ought to do everything I could to oppose the very name of Jesus the Nazarene.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jesus of Nazareth.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Indeed, I did just that in Jerusalem. Authorized by the leading priests, I caused many believers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: many of God’s holy people.
    marker-yv: yv-n
  - type: text
    text: ' there to be sent to prison. And I cast my vote against them when they were condemned to death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Many times I had them punished in the synagogues to get them to curse Jesus.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to blaspheme.
    marker-yv: yv-n
  - type: text
    text: ' I was so violently opposed to them that I even chased them down in foreign cities.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“One day I was on such a mission to Damascus, armed with the authority and commission of the leading priests. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'About noon, Your Majesty, as I was on the road, a light from heaven brighter than the sun shone down on me and my companions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: We all fell down, and I heard a voice saying to me in Aramaic,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:14a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hebrew.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Saul, Saul, why are you persecuting me? It is useless for you to fight against my will.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:14b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: It is hard for you to kick against the oxgoads.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “‘Who are you, lord?’ I asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“And the Lord replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘I am Jesus, the one you are persecuting.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now get to your feet! For I have appeared to you to appoint you as my servant and witness. Tell people that you have seen me, and tell them what I will show you in the future.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And I will rescue you from both your own people and the Gentiles. Yes, I am sending you to the Gentiles
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to open their eyes, so they may turn from darkness to light and from the power of Satan to God. Then they will receive forgiveness for their sins and be given a place among God’s people, who are set apart by faith in me.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“And so, King Agrippa, I obeyed that vision from heaven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'I preached first to those in Damascus, then in Jerusalem and throughout all Judea, and also to the Gentiles, that all must repent of their sins and turn to God—and prove they have changed by the good things they do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Some Jews arrested me in the Temple for preaching this, and they tried to kill me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But God has protected me right up to this present time so I can testify to everyone, from the least to the greatest. I teach nothing except what the prophets and Moses said would happen— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: that the Messiah would suffer and be the first to rise from the dead, and in this way announce God’s light to Jews and Gentiles alike.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Suddenly, Festus shouted, “Paul, you are insane. Too much study has made you crazy!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But Paul replied, “I am not insane, Most Excellent Festus. What I am saying is the sober truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And King Agrippa knows about these things. I speak boldly, for I am sure these events are all familiar to him, for they were not done in a corner! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: King Agrippa, do you believe the prophets? I know you do—”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Agrippa interrupted him. “Do you think you can persuade me to become a Christian so quickly?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: “A little more, and your arguments would make me a Christian.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Paul replied, “Whether quickly or not, I pray to God that both you and everyone here in this audience might become the same as I am, except for these chains.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then the king, the governor, Bernice, and all the others stood and left. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: As they went out, they talked it over and agreed, “This man hasn’t done anything to deserve death or imprisonment.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: And Agrippa said to Festus, “He could have been set free if he hadn’t appealed to Caesar.”
