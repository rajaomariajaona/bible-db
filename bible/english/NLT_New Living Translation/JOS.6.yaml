document_id: JOS.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Jericho
  - type: text
    content: 'Now the gates of Jericho were tightly shut because the people were afraid of the Israelites. No one was allowed to go out or in. '
  '10':
  - type: text
    content: '“Do not shout; do not even talk,” Joshua commanded. “Not a single word from any of you until I tell you to shout. Then shout!” '
  '11':
  - type: text
    content: 'So the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' was carried around the town once that day, and then everyone returned to spend the night in the camp.'
  '12':
  - type: text
    content: 'Joshua got up early the next morning, and the priests again carried the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'The seven priests with the rams’ horns marched in front of the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', blowing their horns. Again the armed men marched both in front of the priests with the horns and behind the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '. All this time the priests were blowing their horns. '
  '14':
  - type: text
    content: On the second day they again marched around the town once and returned to the camp. They followed this pattern for six days.
  '15':
  - type: text
    content: 'On the seventh day the Israelites got up at dawn and marched around the town as they had done before. But this time they went around the town seven times. '
  '16':
  - type: text
    content: 'The seventh time around, as the priests sounded the long blast on their horns, Joshua commanded the people, “Shout! For the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you the town! '
  '17':
  - type: text
    content: Jericho and everything in it must be completely destroyed
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering; similarly in 6:18, 21.
  - type: text
    content: ' as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: . Only Rahab the prostitute and the others in her house will be spared, for she protected our spies.
  '18':
  - type: text
    content: '“Do not take any of the things set apart for destruction, or you yourselves will be completely destroyed, and you will bring trouble on the camp of Israel. '
  '19':
  - type: text
    content: 'Everything made from silver, gold, bronze, or iron is sacred to the '
  - type: text
    content: Lord
  - type: text
    content: ' and must be brought into his treasury.”'
  '2':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “I have given you Jericho, its king, and all its strong warriors. '
  '20':
  - type: text
    content: 'When the people heard the sound of the rams’ horns, they shouted as loud as they could. Suddenly, the walls of Jericho collapsed, and the Israelites charged straight into the town and captured it. '
  '21':
  - type: text
    content: They completely destroyed everything in it with their swords—men and women, young and old, cattle, sheep, goats, and donkeys.
  '22':
  - type: text
    content: Meanwhile, Joshua said to the two spies, “Keep your promise. Go to the prostitute’s house and bring her out, along with all her family.”
  '23':
  - type: text
    content: The men who had been spies went in and brought out Rahab, her father, mother, brothers, and all the other relatives who were with her. They moved her whole family to a safe place near the camp of Israel.
  '24':
  - type: text
    content: 'Then the Israelites burned the town and everything in it. Only the things made from silver, gold, bronze, or iron were kept for the treasury of the '
  - type: text
    content: Lord
  - type: text
    content: '’s house. '
  '25':
  - type: text
    content: So Joshua spared Rahab the prostitute and her relatives who were with her in the house, because she had hidden the spies Joshua sent to Jericho. And she lives among the Israelites to this day.
  '26':
  - type: text
    content: 'At that time Joshua invoked this curse:'
  - type: text
    content: '“May the curse of the '
  - type: text
    content: Lord
  - type: text
    content: ' fall on anyone'
  - type: text
    content: who tries to rebuild the town of Jericho.
  - type: text
    content: At the cost of his firstborn son,
  - type: text
    content: he will lay its foundation.
  - type: text
    content: At the cost of his youngest son,
  - type: text
    content: he will set up its gates.”
  '27':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' was with Joshua, and his reputation spread throughout the land.'
  '3':
  - type: text
    content: 'You and your fighting men should march around the town once a day for six days. '
  '4':
  - type: text
    content: 'Seven priests will walk ahead of the Ark, each carrying a ram’s horn. On the seventh day you are to march around the town seven times, with the priests blowing the horns. '
  '5':
  - type: text
    content: When you hear the priests give one long blast on the rams’ horns, have all the people shout as loud as they can. Then the walls of the town will collapse, and the people can charge straight into the town.”
  '6':
  - type: text
    content: 'So Joshua called together the priests and said, “Take up the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Covenant, and assign seven priests to walk in front of it, each carrying a ram’s horn.” '
  '7':
  - type: text
    content: 'Then he gave orders to the people: “March around the town, and the armed men will lead the way in front of the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '8':
  - type: text
    content: 'After Joshua spoke to the people, the seven priests with the rams’ horns started marching in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ', blowing the horns as they marched. And the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Covenant followed behind them. '
  '9':
  - type: text
    content: 'Some of the armed men marched in front of the priests with the horns and some behind the Ark, with the priests continually blowing the horns. '
