document_id: PRO.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Another Warning about Immoral Women
  - type: text
    content: Follow my advice, my son;
  - type: text
    content: always treasure my commands.
  '10':
  - type: text
    content: The woman approached him,
  - type: text
    content: seductively dressed and sly of heart.
  '11':
  - type: text
    content: She was the brash, rebellious type,
  - type: text
    content: never content to stay at home.
  '12':
  - type: text
    content: She is often in the streets and markets,
  - type: text
    content: soliciting at every corner.
  '13':
  - type: text
    content: She threw her arms around him and kissed him,
  - type: text
    content: and with a brazen look she said,
  '14':
  - type: text
    content: “I’ve just made my peace offerings
  - type: text
    content: and fulfilled my vows.
  '15':
  - type: text
    content: You’re the one I was looking for!
  - type: text
    content: I came out to find you, and here you are!
  '16':
  - type: text
    content: My bed is spread with beautiful blankets,
  - type: text
    content: with colored sheets of Egyptian linen.
  '17':
  - type: text
    content: I’ve perfumed my bed
  - type: text
    content: with myrrh, aloes, and cinnamon.
  '18':
  - type: text
    content: Come, let’s drink our fill of love until morning.
  - type: text
    content: Let’s enjoy each other’s caresses,
  '19':
  - type: text
    content: for my husband is not home.
  - type: text
    content: He’s away on a long trip.
  '2':
  - type: text
    content: Obey my commands and live!
  - type: text
    content: Guard my instructions as you guard your own eyes.
  - type: note
    content: Hebrew as the pupil of your eye.
  '20':
  - type: text
    content: He has taken a wallet full of money with him
  - type: text
    content: and won’t return until later this month.
  - type: note
    content: Hebrew until the moon is full.
  - type: text
    content: ”
  '21':
  - type: text
    content: So she seduced him with her pretty speech
  - type: text
    content: and enticed him with her flattery.
  '22':
  - type: text
    content: He followed her at once,
  - type: text
    content: like an ox going to the slaughter.
  - type: text
    content: He was like a stag caught in a trap,
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads slaughter, as shackles are for the discipline of a fool.
  '23':
  - type: text
    content: awaiting the arrow that would pierce its heart.
  - type: text
    content: He was like a bird flying into a snare,
  - type: text
    content: little knowing it would cost him his life.
  '24':
  - type: text
    content: So listen to me, my sons,
  - type: text
    content: and pay attention to my words.
  '25':
  - type: text
    content: Don’t let your hearts stray away toward her.
  - type: text
    content: Don’t wander down her wayward path.
  '26':
  - type: text
    content: For she has been the ruin of many;
  - type: text
    content: many men have been her victims.
  '27':
  - type: text
    content: Her house is the road to the grave.
  - type: note
    content: Hebrew to Sheol.
  - type: text
    content: Her bedroom is the den of death.
  '3':
  - type: text
    content: Tie them on your fingers as a reminder.
  - type: text
    content: Write them deep within your heart.
  '4':
  - type: text
    content: Love wisdom like a sister;
  - type: text
    content: make insight a beloved member of your family.
  '5':
  - type: text
    content: Let them protect you from an affair with an immoral woman,
  - type: text
    content: from listening to the flattery of a promiscuous woman.
  '6':
  - type: text
    content: While I was at the window of my house,
  - type: text
    content: looking through the curtain,
  '7':
  - type: text
    content: I saw some naive young men,
  - type: text
    content: and one in particular who lacked common sense.
  '8':
  - type: text
    content: He was crossing the street near the house of an immoral woman,
  - type: text
    content: strolling down the path by her house.
  '9':
  - type: text
    content: It was at twilight, in the evening,
  - type: text
    content: as deep darkness fell.
