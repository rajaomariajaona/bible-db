document_id: PRO.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Another Warning about Immoral Women
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Follow my advice, my son;
- type: usfm
  marker: q2
  children:
  - type: text
    text: always treasure my commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Obey my commands and live!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Guard my instructions as you guard your own eyes.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: as the pupil of your eye.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tie them on your fingers as a reminder.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Write them deep within your heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Love wisdom like a sister;
- type: usfm
  marker: q2
  children:
  - type: text
    text: make insight a beloved member of your family.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Let them protect you from an affair with an immoral woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from listening to the flattery of a promiscuous woman.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: While I was at the window of my house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: looking through the curtain,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I saw some naive young men,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and one in particular who lacked common sense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He was crossing the street near the house of an immoral woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: strolling down the path by her house.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: It was at twilight, in the evening,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as deep darkness fell.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The woman approached him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: seductively dressed and sly of heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: She was the brash, rebellious type,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never content to stay at home.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: She is often in the streets and markets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: soliciting at every corner.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: She threw her arms around him and kissed him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and with a brazen look she said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “I’ve just made my peace offerings
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fulfilled my vows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: You’re the one I was looking for!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I came out to find you, and here you are!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: My bed is spread with beautiful blankets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with colored sheets of Egyptian linen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I’ve perfumed my bed
- type: usfm
  marker: q2
  children:
  - type: text
    text: with myrrh, aloes, and cinnamon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Come, let’s drink our fill of love until morning.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let’s enjoy each other’s caresses,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: for my husband is not home.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s away on a long trip.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He has taken a wallet full of money with him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and won’t return until later this month.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: until the moon is full.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So she seduced him with her pretty speech
- type: usfm
  marker: q2
  children:
  - type: text
    text: and enticed him with her flattery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: He followed her at once,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like an ox going to the slaughter.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He was like a stag caught in a trap,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: slaughter, as shackles are for the discipline of a fool.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: awaiting the arrow that would pierce its heart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He was like a bird flying into a snare,
- type: usfm
  marker: q2
  children:
  - type: text
    text: little knowing it would cost him his life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So listen to me, my sons,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pay attention to my words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Don’t let your hearts stray away toward her.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t wander down her wayward path.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: For she has been the ruin of many;
- type: usfm
  marker: q2
  children:
  - type: text
    text: many men have been her victims.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Her house is the road to the grave.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to Sheol.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her bedroom is the den of death.
