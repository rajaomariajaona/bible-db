document_id: JHN.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus, the True Vine
  - type: text
    content: ' '
  - type: text
    content: “I am the true grapevine, and my Father is the gardener.
  - type: text
    content: ' '
  '10':
  - type: text
    content: When you obey my commandments, you remain in my love, just as I obey my Father’s commandments and remain in his love.
  - type: text
    content: ' '
  '11':
  - type: text
    content: I have told you these things so that you will be filled with my joy. Yes, your joy will overflow!
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'This is my commandment: Love each other in the same way I have loved you.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: There is no greater love than to lay down one’s life for one’s friends.
  - type: text
    content: ' '
  '14':
  - type: text
    content: You are my friends if you do what I command.
  - type: text
    content: ' '
  '15':
  - type: text
    content: I no longer call you slaves, because a master doesn’t confide in his slaves. Now you are my friends, since I have told you everything the Father told me.
  - type: text
    content: ' '
  '16':
  - type: text
    content: You didn’t choose me. I chose you. I appointed you to go and produce lasting fruit, so that the Father will give you whatever you ask for, using my name.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'This is my command: Love each other.'
  - type: heading
    content: The World’s Hatred
  '18':
  - type: text
    content: ' '
  - type: text
    content: “If the world hates you, remember that it hated me first.
  - type: text
    content: ' '
  '19':
  - type: text
    content: The world would love you as one of its own if you belonged to it, but you are no longer part of the world. I chose you to come out of the world, so it hates you.
  - type: text
    content: ' '
  '2':
  - type: text
    content: He cuts off every branch of mine that doesn’t produce fruit, and he prunes the branches that do bear fruit so they will produce even more.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Do you remember what I told you? ‘A slave is not greater than the master.’ Since they persecuted me, naturally they will persecute you. And if they had listened to me, they would listen to you.
  - type: text
    content: ' '
  '21':
  - type: text
    content: They will do all this to you because of me, for they have rejected the one who sent me.
  - type: text
    content: ' '
  '22':
  - type: text
    content: They would not be guilty if I had not come and spoken to them. But now they have no excuse for their sin.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Anyone who hates me also hates my Father.
  - type: text
    content: ' '
  '24':
  - type: text
    content: If I hadn’t done such miraculous signs among them that no one else could do, they would not be guilty. But as it is, they have seen everything I did, yet they still hate me and my Father.
  - type: text
    content: ' '
  '25':
  - type: text
    content: This fulfills what is written in their Scriptures
  - type: note
    content: Greek in their law. Pss 35:19; 69:4.
  - type: text
    content: ': ‘They hated me without cause.’'
  '26':
  - type: text
    content: ' '
  - type: text
    content: “But I will send you the Advocate
  - type: text
    content: ' '
  - type: note
    content: Or Comforter, or Encourager, or Counselor. Greek reads Paraclete.
  - type: text
    content: —the Spirit of truth. He will come to you from the Father and will testify all about me.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And you must also testify about me because you have been with me from the beginning of my ministry.
  '3':
  - type: text
    content: You have already been pruned and purified by the message I have given you.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Remain in me, and I will remain in you. For a branch cannot produce fruit if it is severed from the vine, and you cannot be fruitful unless you remain in me.
  '5':
  - type: text
    content: ' '
  - type: text
    content: “Yes, I am the vine; you are the branches. Those who remain in me, and I in them, will produce much fruit. For apart from me you can do nothing.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Anyone who does not remain in me is thrown away like a useless branch and withers. Such branches are gathered into a pile to be burned.
  - type: text
    content: ' '
  '7':
  - type: text
    content: But if you remain in me and my words remain in you, you may ask for anything you want, and it will be granted!
  - type: text
    content: ' '
  '8':
  - type: text
    content: When you produce much fruit, you are my true disciples. This brings great glory to my Father.
  '9':
  - type: text
    content: ' '
  - type: text
    content: “I have loved you even as the Father has loved me. Remain in my love.
  - type: text
    content: ' '
