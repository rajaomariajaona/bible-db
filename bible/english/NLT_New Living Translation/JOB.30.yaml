document_id: JOB.30
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job Speaks of His Anguish
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “But now I am mocked by people younger than I,
- type: usfm
  marker: q2
  children:
  - type: text
    text: by young men whose fathers are not worthy to run with my sheepdogs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A lot of good they are to me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: those worn-out wretches!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They are gaunt from poverty and hunger.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They claw the dry ground in desolate wastelands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They pluck wild greens from among the bushes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and eat from the roots of broom trees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They are driven from human society,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and people shout at them as if they were thieves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So now they live in frightening ravines,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in caves and among the rocks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They sound like animals howling among the bushes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: huddled together beneath the nettles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They are nameless fools,
- type: usfm
  marker: q2
  children:
  - type: text
    text: outcasts from society.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “And now they mock me with vulgar songs!
- type: usfm
  marker: q2
  children:
  - type: text
    text: They taunt me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They despise me and won’t come near me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: except to spit in my face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For God has cut my bowstring.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has humbled me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so they have thrown off all restraint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: These outcasts oppose me to my face.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They send me sprawling
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lay traps in my path.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They block my road
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do everything they can to destroy me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They know I have no one to help me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They come at me from all directions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They jump on me when I am down.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I live in terror now.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My honor has blown away in the wind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my prosperity has vanished like a cloud.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “And now my life seeps away.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Depression haunts my days.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: At night my bones are filled with pain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: which gnaws at me relentlessly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: With a strong hand, God grabs my shirt.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hand, my garment is disfigured.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: He grips me by the collar of my coat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He has thrown me into the mud.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m nothing more than dust and ashes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “I cry to you, O God, but you don’t answer.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I stand before you, but you don’t even look.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: You have become cruel toward me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You use your power to persecute me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: You throw me into the whirlwind
- type: usfm
  marker: q2
  children:
  - type: text
    text: and destroy me in the storm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And I know you are sending me to my death—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the destination of all who live.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Surely no one would turn against the needy
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they cry for help in their trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Did I not weep for those in trouble?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Was I not deeply grieved for the needy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: So I looked for good, but evil came instead.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I waited for the light, but darkness fell.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: My heart is troubled and restless.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Days of suffering torment me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: I walk in gloom, without sunlight.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I stand in the public square and cry for help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Instead, I am considered a brother to jackals
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a companion to owls.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: My skin has turned dark,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my bones burn with fever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: My harp plays sad music,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my flute accompanies those who weep.
