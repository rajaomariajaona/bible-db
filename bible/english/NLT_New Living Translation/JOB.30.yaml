document_id: JOB.30,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Speaks of His Anguish
  - type: text
    content: “But now I am mocked by people younger than I,
  - type: text
    content: by young men whose fathers are not worthy to run with my sheepdogs.
  '10':
  - type: text
    content: They despise me and won’t come near me,
  - type: text
    content: except to spit in my face.
  '11':
  - type: text
    content: For God has cut my bowstring.
  - type: text
    content: He has humbled me,
  - type: text
    content: so they have thrown off all restraint.
  '12':
  - type: text
    content: These outcasts oppose me to my face.
  - type: text
    content: They send me sprawling
  - type: text
    content: and lay traps in my path.
  '13':
  - type: text
    content: They block my road
  - type: text
    content: and do everything they can to destroy me.
  - type: text
    content: They know I have no one to help me.
  '14':
  - type: text
    content: They come at me from all directions.
  - type: text
    content: They jump on me when I am down.
  '15':
  - type: text
    content: I live in terror now.
  - type: text
    content: My honor has blown away in the wind,
  - type: text
    content: and my prosperity has vanished like a cloud.
  '16':
  - type: text
    content: “And now my life seeps away.
  - type: text
    content: Depression haunts my days.
  '17':
  - type: text
    content: At night my bones are filled with pain,
  - type: text
    content: which gnaws at me relentlessly.
  '18':
  - type: text
    content: With a strong hand, God grabs my shirt.
  - type: note
    content: As in Greek version; Hebrew reads hand, my garment is disfigured.
  - type: text
    content: He grips me by the collar of my coat.
  '19':
  - type: text
    content: He has thrown me into the mud.
  - type: text
    content: I’m nothing more than dust and ashes.
  '2':
  - type: text
    content: A lot of good they are to me—
  - type: text
    content: those worn-out wretches!
  '20':
  - type: text
    content: “I cry to you, O God, but you don’t answer.
  - type: text
    content: I stand before you, but you don’t even look.
  '21':
  - type: text
    content: You have become cruel toward me.
  - type: text
    content: You use your power to persecute me.
  '22':
  - type: text
    content: You throw me into the whirlwind
  - type: text
    content: and destroy me in the storm.
  '23':
  - type: text
    content: And I know you are sending me to my death—
  - type: text
    content: the destination of all who live.
  '24':
  - type: text
    content: “Surely no one would turn against the needy
  - type: text
    content: when they cry for help in their trouble.
  '25':
  - type: text
    content: Did I not weep for those in trouble?
  - type: text
    content: Was I not deeply grieved for the needy?
  '26':
  - type: text
    content: So I looked for good, but evil came instead.
  - type: text
    content: I waited for the light, but darkness fell.
  '27':
  - type: text
    content: My heart is troubled and restless.
  - type: text
    content: Days of suffering torment me.
  '28':
  - type: text
    content: I walk in gloom, without sunlight.
  - type: text
    content: I stand in the public square and cry for help.
  '29':
  - type: text
    content: Instead, I am considered a brother to jackals
  - type: text
    content: and a companion to owls.
  '3':
  - type: text
    content: They are gaunt from poverty and hunger.
  - type: text
    content: They claw the dry ground in desolate wastelands.
  '30':
  - type: text
    content: My skin has turned dark,
  - type: text
    content: and my bones burn with fever.
  '31':
  - type: text
    content: My harp plays sad music,
  - type: text
    content: and my flute accompanies those who weep.
  '4':
  - type: text
    content: They pluck wild greens from among the bushes
  - type: text
    content: and eat from the roots of broom trees.
  '5':
  - type: text
    content: They are driven from human society,
  - type: text
    content: and people shout at them as if they were thieves.
  '6':
  - type: text
    content: So now they live in frightening ravines,
  - type: text
    content: in caves and among the rocks.
  '7':
  - type: text
    content: They sound like animals howling among the bushes,
  - type: text
    content: huddled together beneath the nettles.
  '8':
  - type: text
    content: They are nameless fools,
  - type: text
    content: outcasts from society.
  '9':
  - type: text
    content: “And now they mock me with vulgar songs!
  - type: text
    content: They taunt me!
