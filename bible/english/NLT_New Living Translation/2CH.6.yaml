document_id: 2CH.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Praises the Lord
  - type: text
    content: 'Then Solomon prayed, “O '
  - type: text
    content: Lord
  - type: text
    content: ', you have said that you would live in a thick cloud of darkness. '
  '10':
  - type: text
    content: '“And now the '
  - type: text
    content: Lord
  - type: text
    content: ' has fulfilled the promise he made, for I have become king in my father’s place, and now I sit on the throne of Israel, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' promised. I have built this Temple to honor the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '11':
  - type: text
    content: 'There I have placed the Ark, which contains the covenant that the '
  - type: text
    content: Lord
  - type: text
    content: ' made with the people of Israel.”'
  - type: heading
    content: Solomon’s Prayer of Dedication
  '12':
  - type: text
    content: 'Then Solomon stood before the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' in front of the entire community of Israel, and he lifted his hands in prayer. '
  '13':
  - type: text
    content: Now Solomon had made a bronze platform 7-1/2 feet long, 7-1/2 feet wide, and 4-1/2 feet high
  - type: note
    content: Hebrew 5 cubits [2.3 meters] long, 5 cubits wide, and 3 cubits [1.4 meters] high.
  - type: text
    content: ' and had placed it at the center of the Temple’s outer courtyard. He stood on the platform, and then he knelt in front of the entire community of Israel and lifted his hands toward heaven. '
  '14':
  - type: text
    content: He prayed,
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, there is no God like you in all of heaven and earth. You keep your covenant and show unfailing love to all who walk before you in wholehearted devotion. '
  '15':
  - type: text
    content: You have kept your promise to your servant David, my father. You made that promise with your own mouth, and with your own hands you have fulfilled it today.
  '16':
  - type: text
    content: '“And now, O '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, carry out the additional promise you made to your servant David, my father. For you said to him, ‘If your descendants guard their behavior and faithfully follow my Law as you have done, one of them will always sit on the throne of Israel.’ '
  '17':
  - type: text
    content: 'Now, O '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, fulfill this promise to your servant David.'
  '18':
  - type: text
    content: '“But will God really live on earth among people? Why, even the highest heavens cannot contain you. How much less this Temple I have built! '
  '19':
  - type: text
    content: 'Nevertheless, listen to my prayer and my plea, O '
  - type: text
    content: Lord
  - type: text
    content: ' my God. Hear the cry and the prayer that your servant is making to you. '
  '2':
  - type: text
    content: Now I have built a glorious Temple for you, a place where you can live forever!”
  '20':
  - type: text
    content: 'May you watch over this Temple day and night, this place where you have said you would put your name. May you always hear the prayers I make toward this place. '
  '21':
  - type: text
    content: May you hear the humble and earnest requests from me and your people Israel when we pray toward this place. Yes, hear us from heaven where you live, and when you hear, forgive.
  '22':
  - type: text
    content: '“If someone wrongs another person and is required to take an oath of innocence in front of your altar at this Temple, '
  '23':
  - type: text
    content: then hear from heaven and judge between your servants—the accuser and the accused. Pay back the guilty as they deserve. Acquit the innocent because of their innocence.
  '24':
  - type: text
    content: '“If your people Israel are defeated by their enemies because they have sinned against you, and if they turn back and acknowledge your name and pray to you here in this Temple, '
  '25':
  - type: text
    content: then hear from heaven and forgive the sin of your people Israel and return them to this land you gave to them and to their ancestors.
  '26':
  - type: text
    content: '“If the skies are shut up and there is no rain because your people have sinned against you, and if they pray toward this Temple and acknowledge your name and turn from their sins because you have punished them, '
  '27':
  - type: text
    content: then hear from heaven and forgive the sins of your servants, your people Israel. Teach them to follow the right path, and send rain on your land that you have given to your people as their special possession.
  '28':
  - type: text
    content: '“If there is a famine in the land or a plague or crop disease or attacks of locusts or caterpillars, or if your people’s enemies are in the land besieging their towns—whatever disaster or disease there is— '
  '29':
  - type: text
    content: 'and if your people Israel pray about their troubles or sorrow, raising their hands toward this Temple, '
  '3':
  - type: text
    content: 'Then the king turned around to the entire community of Israel standing before him and gave this blessing: '
  '30':
  - type: text
    content: 'then hear from heaven where you live, and forgive. Give your people what their actions deserve, for you alone know each human heart. '
  '31':
  - type: text
    content: Then they will fear you and walk in your ways as long as they live in the land you gave to our ancestors.
  '32':
  - type: text
    content: '“In the future, foreigners who do not belong to your people Israel will hear of you. They will come from distant lands when they hear of your great name and your strong hand and your powerful arm. And when they pray toward this Temple, '
  '33':
  - type: text
    content: then hear from heaven where you live, and grant what they ask of you. In this way, all the people of the earth will come to know and fear you, just as your own people Israel do. They, too, will know that this Temple I have built honors your name.
  '34':
  - type: text
    content: '“If your people go out where you send them to fight their enemies, and if they pray to you by turning toward this city you have chosen and toward this Temple I have built to honor your name, '
  '35':
  - type: text
    content: then hear their prayers from heaven and uphold their cause.
  '36':
  - type: text
    content: '“If they sin against you—and who has never sinned?—you might become angry with them and let their enemies conquer them and take them captive to a foreign land far away or near. '
  '37':
  - type: text
    content: 'But in that land of exile, they might turn to you in repentance and pray, ‘We have sinned, done evil, and acted wickedly.’ '
  '38':
  - type: text
    content: 'If they turn to you with their whole heart and soul in the land of their captivity and pray toward the land you gave to their ancestors—toward this city you have chosen, and toward this Temple I have built to honor your name— '
  '39':
  - type: text
    content: then hear their prayers and their petitions from heaven where you live, and uphold their cause. Forgive your people who have sinned against you.
  '4':
  - type: text
    content: '“Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, who has kept the promise he made to my father, David. For he told my father, '
  '40':
  - type: text
    content: “O my God, may your eyes be open and your ears attentive to all the prayers made to you in this place.
  '41':
  - type: text
    content: '“And now arise, O '
  - type: text
    content: Lord
  - type: text
    content: ' God, and enter your resting place,'
  - type: text
    content: along with the Ark, the symbol of your power.
  - type: text
    content: 'May your priests, O '
  - type: text
    content: Lord
  - type: text
    content: ' God, be clothed with salvation;'
  - type: text
    content: may your loyal servants rejoice in your goodness.
  '42':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' God, do not reject the king you have anointed.'
  - type: text
    content: Remember your unfailing love for your servant David.”
  '5':
  - type: text
    content: '‘From the day I brought my people out of the land of Egypt, I have never chosen a city among any of the tribes of Israel as the place where a Temple should be built to honor my name. Nor have I chosen a king to lead my people Israel. '
  '6':
  - type: text
    content: But now I have chosen Jerusalem as the place for my name to be honored, and I have chosen David to be king over my people Israel.’”
  '7':
  - type: text
    content: 'Then Solomon said, “My father, David, wanted to build this Temple to honor the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '8':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' told him, ‘You wanted to build the Temple to honor my name. Your intention is good, '
  '9':
  - type: text
    content: but you are not the one to do it. One of your own sons will build the Temple to honor me.’
