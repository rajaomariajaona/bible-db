document_id: 2CH.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Solomon Praises the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Solomon prayed, “O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you have said that you would live in a thick cloud of darkness. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has fulfilled the promise he made, for I have become king in my father’s place, and now I sit on the throne of Israel, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' promised. I have built this Temple to honor the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There I have placed the Ark, which contains the covenant that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made with the people of Israel.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon’s Prayer of Dedication
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Solomon stood before the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in front of the entire community of Israel, and he lifted his hands in prayer. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Now Solomon had made a bronze platform 7-1/2 feet long, 7-1/2 feet wide, and 4-1/2 feet high
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.3 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long, 5 cubits wide, and 3 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[1.4 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: high.
      marker-yv: yv-n
    - type: text
      text: ' and had placed it at the center of the Temple’s outer courtyard. He stood on the platform, and then he knelt in front of the entire community of Israel and lifted his hands toward heaven. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He prayed,
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: '“O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of Israel, there is no God like you in all of heaven and earth. You keep your covenant and show unfailing love to all who walk before you in wholehearted devotion. '
  '15':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: You have kept your promise to your servant David, my father. You made that promise with your own mouth, and with your own hands you have fulfilled it today.
  '16':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“And now, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of Israel, carry out the additional promise you made to your servant David, my father. For you said to him, ‘If your descendants guard their behavior and faithfully follow my Law as you have done, one of them will always sit on the throne of Israel.’ '
  '17':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Now, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of Israel, fulfill this promise to your servant David.'
  '18':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“But will God really live on earth among people? Why, even the highest heavens cannot contain you. How much less this Temple I have built! '
  '19':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Nevertheless, listen to my prayer and my plea, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God. Hear the cry and the prayer that your servant is making to you. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Now I have built a glorious Temple for you, a place where you can live forever!”
  '20':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'May you watch over this Temple day and night, this place where you have said you would put your name. May you always hear the prayers I make toward this place. '
  '21':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: May you hear the humble and earnest requests from me and your people Israel when we pray toward this place. Yes, hear us from heaven where you live, and when you hear, forgive.
  '22':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“If someone wrongs another person and is required to take an oath of innocence in front of your altar at this Temple, '
  '23':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: then hear from heaven and judge between your servants—the accuser and the accused. Pay back the guilty as they deserve. Acquit the innocent because of their innocence.
  '24':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“If your people Israel are defeated by their enemies because they have sinned against you, and if they turn back and acknowledge your name and pray to you here in this Temple, '
  '25':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: then hear from heaven and forgive the sin of your people Israel and return them to this land you gave to them and to their ancestors.
  '26':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“If the skies are shut up and there is no rain because your people have sinned against you, and if they pray toward this Temple and acknowledge your name and turn from their sins because you have punished them, '
  '27':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: then hear from heaven and forgive the sins of your servants, your people Israel. Teach them to follow the right path, and send rain on your land that you have given to your people as their special possession.
  '28':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“If there is a famine in the land or a plague or crop disease or attacks of locusts or caterpillars, or if your people’s enemies are in the land besieging their towns—whatever disaster or disease there is— '
  '29':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'and if your people Israel pray about their troubles or sorrow, raising their hands toward this Temple, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king turned around to the entire community of Israel standing before him and gave this blessing: '
  '30':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'then hear from heaven where you live, and forgive. Give your people what their actions deserve, for you alone know each human heart. '
  '31':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Then they will fear you and walk in your ways as long as they live in the land you gave to our ancestors.
  '32':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“In the future, foreigners who do not belong to your people Israel will hear of you. They will come from distant lands when they hear of your great name and your strong hand and your powerful arm. And when they pray toward this Temple, '
  '33':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: then hear from heaven where you live, and grant what they ask of you. In this way, all the people of the earth will come to know and fear you, just as your own people Israel do. They, too, will know that this Temple I have built honors your name.
  '34':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“If your people go out where you send them to fight their enemies, and if they pray to you by turning toward this city you have chosen and toward this Temple I have built to honor your name, '
  '35':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: then hear their prayers from heaven and uphold their cause.
  '36':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“If they sin against you—and who has never sinned?—you might become angry with them and let their enemies conquer them and take them captive to a foreign land far away or near. '
  '37':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'But in that land of exile, they might turn to you in repentance and pray, ‘We have sinned, done evil, and acted wickedly.’ '
  '38':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'If they turn to you with their whole heart and soul in the land of their captivity and pray toward the land you gave to their ancestors—toward this city you have chosen, and toward this Temple I have built to honor your name— '
  '39':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: then hear their prayers and their petitions from heaven where you live, and uphold their cause. Forgive your people who have sinned against you.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, who has kept the promise he made to my father, David. For he told my father, '
  '40':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: “O my God, may your eyes be open and your ears attentive to all the prayers made to you in this place.
  '41':
  - type: usfm
    marker: qm1
    children:
    - type: text
      text: '“And now arise, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God, and enter your resting place,'
  - type: usfm
    marker: qm2
    children:
    - type: text
      text: along with the Ark, the symbol of your power.
  - type: usfm
    marker: qm1
    children:
    - type: text
      text: 'May your priests, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God, be clothed with salvation;'
  - type: usfm
    marker: qm2
    children:
    - type: text
      text: may your loyal servants rejoice in your goodness.
  '42':
  - type: usfm
    marker: qm1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God, do not reject the king you have anointed.'
  - type: usfm
    marker: qm2
    children:
    - type: text
      text: Remember your unfailing love for your servant David.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘From the day I brought my people out of the land of Egypt, I have never chosen a city among any of the tribes of Israel as the place where a Temple should be built to honor my name. Nor have I chosen a king to lead my people Israel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But now I have chosen Jerusalem as the place for my name to be honored, and I have chosen David to be king over my people Israel.’”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Solomon said, “My father, David, wanted to build this Temple to honor the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told him, ‘You wanted to build the Temple to honor my name. Your intention is good, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but you are not the one to do it. One of your own sons will build the Temple to honor me.’
