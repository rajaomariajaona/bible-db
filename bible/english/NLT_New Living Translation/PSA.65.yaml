document_id: PSA.65
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A song. A psalm of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: What mighty praise, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: belongs to you in Zion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We will fulfill our vows to you,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: for you answer our prayers.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All of us must come to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Though we are overwhelmed by our sins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you forgive them all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: What joy for those you choose to bring near,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who live in your holy courts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What festivities await us
- type: usfm
  marker: q2
  children:
  - type: text
    text: inside your holy Temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You faithfully answer our prayers with awesome deeds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O God our savior.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are the hope of everyone on earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even those who sail on distant seas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You formed the mountains by your power
- type: usfm
  marker: q2
  children:
  - type: text
    text: and armed yourself with mighty strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You quieted the raging oceans
- type: usfm
  marker: q2
  children:
  - type: text
    text: with their pounding waves
- type: usfm
  marker: q2
  children:
  - type: text
    text: and silenced the shouting of the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Those who live at the ends of the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: stand in awe of your wonders.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From where the sun rises to where it sets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you inspire shouts of joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You take care of the earth and water it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: making it rich and fertile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The river of God has plenty of water;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it provides a bountiful harvest of grain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you have ordered it so.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You drench the plowed ground with rain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: melting the clods and leveling the ridges.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You soften the earth with showers
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bless its abundant crops.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You crown the year with a bountiful harvest;
- type: usfm
  marker: q2
  children:
  - type: text
    text: even the hard pathways overflow with abundance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The grasslands of the wilderness become a lush pasture,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the hillsides blossom with joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The meadows are clothed with flocks of sheep,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the valleys are carpeted with grain.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They all shout and sing for joy!
