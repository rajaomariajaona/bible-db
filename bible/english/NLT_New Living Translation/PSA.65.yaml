document_id: PSA.65,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A song. A psalm of David.'
  - type: text
    content: What mighty praise, O God,
  - type: text
    content: belongs to you in Zion.
  - type: text
    content: We will fulfill our vows to you,
  '10':
  - type: text
    content: You drench the plowed ground with rain,
  - type: text
    content: melting the clods and leveling the ridges.
  - type: text
    content: You soften the earth with showers
  - type: text
    content: and bless its abundant crops.
  '11':
  - type: text
    content: You crown the year with a bountiful harvest;
  - type: text
    content: even the hard pathways overflow with abundance.
  '12':
  - type: text
    content: The grasslands of the wilderness become a lush pasture,
  - type: text
    content: and the hillsides blossom with joy.
  '13':
  - type: text
    content: The meadows are clothed with flocks of sheep,
  - type: text
    content: and the valleys are carpeted with grain.
  - type: text
    content: They all shout and sing for joy!
  '2':
  - type: text
    content: for you answer our prayers.
  - type: text
    content: All of us must come to you.
  '3':
  - type: text
    content: Though we are overwhelmed by our sins,
  - type: text
    content: you forgive them all.
  '4':
  - type: text
    content: What joy for those you choose to bring near,
  - type: text
    content: those who live in your holy courts.
  - type: text
    content: What festivities await us
  - type: text
    content: inside your holy Temple.
  '5':
  - type: text
    content: You faithfully answer our prayers with awesome deeds,
  - type: text
    content: O God our savior.
  - type: text
    content: You are the hope of everyone on earth,
  - type: text
    content: even those who sail on distant seas.
  '6':
  - type: text
    content: You formed the mountains by your power
  - type: text
    content: and armed yourself with mighty strength.
  '7':
  - type: text
    content: You quieted the raging oceans
  - type: text
    content: with their pounding waves
  - type: text
    content: and silenced the shouting of the nations.
  '8':
  - type: text
    content: Those who live at the ends of the earth
  - type: text
    content: stand in awe of your wonders.
  - type: text
    content: From where the sun rises to where it sets,
  - type: text
    content: you inspire shouts of joy.
  '9':
  - type: text
    content: You take care of the earth and water it,
  - type: text
    content: making it rich and fertile.
  - type: text
    content: The river of God has plenty of water;
  - type: text
    content: it provides a bountiful harvest of grain,
  - type: text
    content: for you have ordered it so.
