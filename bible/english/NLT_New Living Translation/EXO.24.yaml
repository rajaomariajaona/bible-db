document_id: EXO.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Israel Accepts the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Covenant
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' instructed Moses: “Come up here to me, and bring along Aaron, Nadab, Abihu, and seventy of Israel’s elders. All of you must worship from a distance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Only Moses is allowed to come near to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . The others must not come near, and none of the other people are allowed to climb up the mountain with him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Moses went down to the people and repeated all the instructions and regulations the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had given him. All the people answered with one voice, “We will do everything the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has commanded.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Moses carefully wrote down all the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s instructions. Early the next morning Moses got up and built an altar at the foot of the mountain. He also set up twelve pillars, one for each of the twelve tribes of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then he sent some of the young Israelite men to present burnt offerings and to sacrifice bulls as peace offerings to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moses drained half the blood from these animals into basins. The other half he splattered against the altar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he took the Book of the Covenant and read it aloud to the people. Again they all responded, “We will do everything the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has commanded. We will obey.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Moses took the blood from the basins and splattered it over the people, declaring, “Look, this blood confirms the covenant the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has made with you in giving you these instructions.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Moses, Aaron, Nadab, Abihu, and the seventy elders of Israel climbed up the mountain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'There they saw the God of Israel. Under his feet there seemed to be a surface of brilliant blue lapis lazuli, as clear as the sky itself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And though these nobles of Israel gazed upon God, he did not destroy them. In fact, they ate a covenant meal, eating and drinking in his presence!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, “Come up to me on the mountain. Stay there, and I will give you the tablets of stone on which I have inscribed the instructions and commands so you can teach the people.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So Moses and his assistant Joshua set out, and Moses climbed up the mountain of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Moses told the elders, “Stay here and wait for us until we come back. Aaron and Hur are here with you. If anyone has a dispute while I am gone, consult with them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Moses climbed up the mountain, and the cloud covered it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' settled down on Mount Sinai, and the cloud covered it for six days. On the seventh day the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' called to Moses from inside the cloud. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'To the Israelites at the foot of the mountain, the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' appeared at the summit like a consuming fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then Moses disappeared into the cloud as he climbed higher up the mountain. He remained on the mountain forty days and forty nights.
