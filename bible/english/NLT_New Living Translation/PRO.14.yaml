document_id: PRO.14,116
type_code: eng
verses:
  '1':
  - type: text
    content: A wise woman builds her home,
  - type: text
    content: but a foolish woman tears it down with her own hands.
  '10':
  - type: text
    content: Each heart knows its own bitterness,
  - type: text
    content: and no one else can fully share its joy.
  '11':
  - type: text
    content: The house of the wicked will be destroyed,
  - type: text
    content: but the tent of the godly will flourish.
  '12':
  - type: text
    content: There is a path before each person that seems right,
  - type: text
    content: but it ends in death.
  '13':
  - type: text
    content: Laughter can conceal a heavy heart,
  - type: text
    content: but when the laughter ends, the grief remains.
  '14':
  - type: text
    content: Backsliders get what they deserve;
  - type: text
    content: good people receive their reward.
  '15':
  - type: text
    content: Only simpletons believe everything they’re told!
  - type: text
    content: The prudent carefully consider their steps.
  '16':
  - type: text
    content: The wise are cautious
  - type: note
    content: Hebrew The wise fear.
  - type: text
    content: ' and avoid danger;'
  - type: text
    content: fools plunge ahead with reckless confidence.
  '17':
  - type: text
    content: Short-tempered people do foolish things,
  - type: text
    content: and schemers are hated.
  '18':
  - type: text
    content: Simpletons are clothed with foolishness,
  - type: note
    content: Or inherit foolishness.
  - type: text
    content: but the prudent are crowned with knowledge.
  '19':
  - type: text
    content: Evil people will bow before good people;
  - type: text
    content: the wicked will bow at the gates of the godly.
  '2':
  - type: text
    content: 'Those who follow the right path fear the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: those who take the wrong path despise him.
  '20':
  - type: text
    content: The poor are despised even by their neighbors,
  - type: text
    content: while the rich have many “friends.”
  '21':
  - type: text
    content: It is a sin to belittle one’s neighbor;
  - type: text
    content: blessed are those who help the poor.
  '22':
  - type: text
    content: If you plan to do evil, you will be lost;
  - type: text
    content: if you plan to do good, you will receive unfailing love and faithfulness.
  '23':
  - type: text
    content: Work brings profit,
  - type: text
    content: but mere talk leads to poverty!
  '24':
  - type: text
    content: Wealth is a crown for the wise;
  - type: text
    content: the effort of fools yields only foolishness.
  '25':
  - type: text
    content: A truthful witness saves lives,
  - type: text
    content: but a false witness is a traitor.
  '26':
  - type: text
    content: 'Those who fear the '
  - type: text
    content: Lord
  - type: text
    content: ' are secure;'
  - type: text
    content: he will be a refuge for their children.
  '27':
  - type: text
    content: 'Fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' is a life-giving fountain;'
  - type: text
    content: it offers escape from the snares of death.
  '28':
  - type: text
    content: A growing population is a king’s glory;
  - type: text
    content: a prince without subjects has nothing.
  '29':
  - type: text
    content: People with understanding control their anger;
  - type: text
    content: a hot temper shows great foolishness.
  '3':
  - type: text
    content: A fool’s proud talk becomes a rod that beats him,
  - type: text
    content: but the words of the wise keep them safe.
  '30':
  - type: text
    content: A peaceful heart leads to a healthy body;
  - type: text
    content: jealousy is like cancer in the bones.
  '31':
  - type: text
    content: Those who oppress the poor insult their Maker,
  - type: text
    content: but helping the poor honors him.
  '32':
  - type: text
    content: The wicked are crushed by disaster,
  - type: text
    content: but the godly have a refuge when they die.
  '33':
  - type: text
    content: Wisdom is enshrined in an understanding heart;
  - type: text
    content: wisdom is not
  - type: note
    content: As in Greek and Syriac versions; Hebrew lacks not.
  - type: text
    content: ' found among fools.'
  '34':
  - type: text
    content: Godliness makes a nation great,
  - type: text
    content: but sin is a disgrace to any people.
  '35':
  - type: text
    content: A king rejoices in wise servants
  - type: text
    content: but is angry with those who disgrace him.
  '4':
  - type: text
    content: Without oxen a stable stays clean,
  - type: text
    content: but you need a strong ox for a large harvest.
  '5':
  - type: text
    content: An honest witness does not lie;
  - type: text
    content: a false witness breathes lies.
  '6':
  - type: text
    content: A mocker seeks wisdom and never finds it,
  - type: text
    content: but knowledge comes easily to those with understanding.
  '7':
  - type: text
    content: Stay away from fools,
  - type: text
    content: for you won’t find knowledge on their lips.
  '8':
  - type: text
    content: The prudent understand where they are going,
  - type: text
    content: but fools deceive themselves.
  '9':
  - type: text
    content: Fools make fun of guilt,
  - type: text
    content: but the godly acknowledge it and seek reconciliation.
