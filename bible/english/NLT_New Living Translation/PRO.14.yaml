document_id: PRO.14
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A wise woman builds her home,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a foolish woman tears it down with her own hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Those who follow the right path fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who take the wrong path despise him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A fool’s proud talk becomes a rod that beats him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the words of the wise keep them safe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Without oxen a stable stays clean,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you need a strong ox for a large harvest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: An honest witness does not lie;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a false witness breathes lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A mocker seeks wisdom and never finds it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but knowledge comes easily to those with understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Stay away from fools,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you won’t find knowledge on their lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The prudent understand where they are going,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but fools deceive themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fools make fun of guilt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the godly acknowledge it and seek reconciliation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Each heart knows its own bitterness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one else can fully share its joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The house of the wicked will be destroyed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the tent of the godly will flourish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: There is a path before each person that seems right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but it ends in death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Laughter can conceal a heavy heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but when the laughter ends, the grief remains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Backsliders get what they deserve;
- type: usfm
  marker: q2
  children:
  - type: text
    text: good people receive their reward.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Only simpletons believe everything they’re told!
- type: usfm
  marker: q2
  children:
  - type: text
    text: The prudent carefully consider their steps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The wise are cautious
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The wise fear.
    marker-yv: yv-n
  - type: text
    text: ' and avoid danger;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: fools plunge ahead with reckless confidence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Short-tempered people do foolish things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and schemers are hated.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Simpletons are clothed with foolishness,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: inherit foolishness.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the prudent are crowned with knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Evil people will bow before good people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wicked will bow at the gates of the godly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The poor are despised even by their neighbors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while the rich have many “friends.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: It is a sin to belittle one’s neighbor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: blessed are those who help the poor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: If you plan to do evil, you will be lost;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you plan to do good, you will receive unfailing love and faithfulness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Work brings profit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but mere talk leads to poverty!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Wealth is a crown for the wise;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the effort of fools yields only foolishness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: A truthful witness saves lives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a false witness is a traitor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Those who fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' are secure;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will be a refuge for their children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is a life-giving fountain;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: it offers escape from the snares of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A growing population is a king’s glory;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a prince without subjects has nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: People with understanding control their anger;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a hot temper shows great foolishness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: A peaceful heart leads to a healthy body;
- type: usfm
  marker: q2
  children:
  - type: text
    text: jealousy is like cancer in the bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Those who oppress the poor insult their Maker,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but helping the poor honors him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The wicked are crushed by disaster,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the godly have a refuge when they die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Wisdom is enshrined in an understanding heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: wisdom is not
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions; Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: not.
    marker-yv: yv-n
  - type: text
    text: ' found among fools.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Godliness makes a nation great,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but sin is a disgrace to any people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: A king rejoices in wise servants
- type: usfm
  marker: q2
  children:
  - type: text
    text: but is angry with those who disgrace him.
