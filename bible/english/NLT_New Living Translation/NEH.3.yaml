document_id: NEH.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Rebuilding the Wall of Jerusalem
  - type: text
    content: 'Then Eliashib the high priest and the other priests started to rebuild at the Sheep Gate. They dedicated it and set up its doors, building the wall as far as the Tower of the Hundred, which they dedicated, and the Tower of Hananel. '
  '10':
  - type: text
    content: 'Next Jedaiah son of Harumaph repaired the wall across from his own house, and next to him was Hattush son of Hashabneiah. '
  '11':
  - type: text
    content: 'Then came Malkijah son of Harim and Hasshub son of Pahath-moab, who repaired another section of the wall and the Tower of the Ovens. '
  '12':
  - type: text
    content: Shallum son of Hallohesh and his daughters repaired the next section. He was the leader of the other half of the district of Jerusalem.
  '13':
  - type: text
    content: The Valley Gate was repaired by the people from Zanoah, led by Hanun. They set up its doors and installed its bolts and bars. They also repaired the 1,500 feet
  - type: note
    content: Hebrew 1,000 cubits [460 meters].
  - type: text
    content: ' of wall to the Dung Gate.'
  '14':
  - type: text
    content: The Dung Gate was repaired by Malkijah son of Recab, the leader of the Beth-hakkerem district. He rebuilt it, set up its doors, and installed its bolts and bars.
  '15':
  - type: text
    content: The Fountain Gate was repaired by Shallum
  - type: note
    content: As in Syriac version; Hebrew reads Shallun.
  - type: text
    content: ' son of Col-hozeh, the leader of the Mizpah district. He rebuilt it, roofed it, set up its doors, and installed its bolts and bars. Then he repaired the wall of the pool of Siloam'
  - type: note
    content: Hebrew pool of Shelah, another name for the pool of Siloam.
  - type: text
    content: ' near the king’s garden, and he rebuilt the wall as far as the stairs that descend from the City of David. '
  '16':
  - type: text
    content: Next to him was Nehemiah son of Azbuk, the leader of half the district of Beth-zur. He rebuilt the wall from a place across from the tombs of David’s family as far as the water reservoir and the House of the Warriors.
  '17':
  - type: text
    content: 'Next to him, repairs were made by a group of Levites working under the supervision of Rehum son of Bani. Then came Hashabiah, the leader of half the district of Keilah, who supervised the building of the wall on behalf of his own district. '
  '18':
  - type: text
    content: Next down the line were his countrymen led by Binnui
  - type: note
    content: As in a few Hebrew manuscripts, some Greek manuscripts, and Syriac version (see also 3:24; 10:9); most Hebrew manuscripts read Bavvai.
  - type: text
    content: ' son of Henadad, the leader of the other half of the district of Keilah.'
  '19':
  - type: text
    content: 'Next to them, Ezer son of Jeshua, the leader of Mizpah, repaired another section of wall across from the ascent to the armory near the angle in the wall. '
  '2':
  - type: text
    content: People from the town of Jericho worked next to them, and beyond them was Zaccur son of Imri.
  '20':
  - type: text
    content: 'Next to him was Baruch son of Zabbai, who zealously repaired an additional section from the angle to the door of the house of Eliashib the high priest. '
  '21':
  - type: text
    content: Meremoth son of Uriah and grandson of Hakkoz rebuilt another section of the wall extending from the door of Eliashib’s house to the end of the house.
  '22':
  - type: text
    content: 'The next repairs were made by the priests from the surrounding region. '
  '23':
  - type: text
    content: 'After them, Benjamin and Hasshub repaired the section across from their house, and Azariah son of Maaseiah and grandson of Ananiah repaired the section across from his house. '
  '24':
  - type: text
    content: 'Next was Binnui son of Henadad, who rebuilt another section of the wall from Azariah’s house to the angle and the corner. '
  '25':
  - type: text
    content: 'Palal son of Uzai carried on the work from a point opposite the angle and the tower that projects up from the king’s upper house beside the court of the guard. Next to him were Pedaiah son of Parosh, '
  '26':
  - type: text
    content: 'with the Temple servants living on the hill of Ophel, who repaired the wall as far as a point across from the Water Gate to the east and the projecting tower. '
  '27':
  - type: text
    content: Then came the people of Tekoa, who repaired another section across from the great projecting tower and over to the wall of Ophel.
  '28':
  - type: text
    content: 'Above the Horse Gate, the priests repaired the wall. Each one repaired the section immediately across from his own house. '
  '29':
  - type: text
    content: 'Next Zadok son of Immer also rebuilt the wall across from his own house, and beyond him was Shemaiah son of Shecaniah, the gatekeeper of the East Gate. '
  '3':
  - type: text
    content: 'The Fish Gate was built by the sons of Hassenaah. They laid the beams, set up its doors, and installed its bolts and bars. '
  '30':
  - type: text
    content: 'Next Hananiah son of Shelemiah and Hanun, the sixth son of Zalaph, repaired another section, while Meshullam son of Berekiah rebuilt the wall across from where he lived. '
  '31':
  - type: text
    content: 'Malkijah, one of the goldsmiths, repaired the wall as far as the housing for the Temple servants and merchants, across from the Inspection Gate. Then he continued as far as the upper room at the corner. '
  '32':
  - type: text
    content: The other goldsmiths and merchants repaired the wall from that corner to the Sheep Gate.
  '4':
  - type: text
    content: 'Meremoth son of Uriah and grandson of Hakkoz repaired the next section of wall. Beside him were Meshullam son of Berekiah and grandson of Meshezabel, and then Zadok son of Baana. '
  '5':
  - type: text
    content: Next were the people from Tekoa, though their leaders refused to work with the construction supervisors.
  '6':
  - type: text
    content: The Old City Gate
  - type: note
    content: Or The Mishneh Gate, or The Jeshanah Gate.
  - type: text
    content: ' was repaired by Joiada son of Paseah and Meshullam son of Besodeiah. They laid the beams, set up its doors, and installed its bolts and bars. '
  '7':
  - type: text
    content: Next to them were Melatiah from Gibeon, Jadon from Meronoth, people from Gibeon, and people from Mizpah, the headquarters of the governor of the province west of the Euphrates River.
  - type: note
    content: Hebrew the province beyond the river.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Next was Uzziel son of Harhaiah, a goldsmith by trade, who also worked on the wall. Beyond him was Hananiah, a manufacturer of perfumes. They left out a section of Jerusalem as they built the Broad Wall.
  - type: note
    content: Or They fortified Jerusalem up to the Broad Wall.
  '9':
  - type: text
    content: 'Rephaiah son of Hur, the leader of half the district of Jerusalem, was next to them on the wall. '
