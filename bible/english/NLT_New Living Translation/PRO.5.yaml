document_id: PRO.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avoid Immoral Women
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My son, pay attention to my wisdom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen carefully to my wise counsel.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Strangers will consume your wealth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and someone else will enjoy the fruit of your labor.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: In the end you will groan in anguish
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when disease consumes your body.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: You will say, “How I hated discipline!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If only I had not ignored all the warnings!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Oh, why didn’t I listen to my teachers?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why didn’t I pay attention to my instructors?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I have come to the brink of utter ruin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and now I must face public disgrace.”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Drink water from your own well—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: share your love only with your wife.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Drink water from your own cistern, / flowing water from your own well.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Why spill the water of your springs in the streets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: having sex with just anyone?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Why spill your springs in the streets, / your streams in the city squares?
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: You should reserve it for yourselves.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Never share it with strangers.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Let your wife be a fountain of blessing for you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rejoice in the wife of your youth.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: She is a loving deer, a graceful doe.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let her breasts satisfy you always.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May you always be captivated by her love.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Then you will show discernment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your lips will express what you’ve learned.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Why be captivated, my son, by an immoral woman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or fondle the breasts of a promiscuous woman?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sees clearly what a man does,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: examining every path he takes.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: An evil man is held captive by his own sins;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are ropes that catch and hold him.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: He will die for lack of self-control;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will be lost because of his great foolishness.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For the lips of an immoral woman are as sweet as honey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her mouth is smoother than oil.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But in the end she is as bitter as poison,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as dangerous as a double-edged sword.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Her feet go down to death;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her steps lead straight to the grave.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to Sheol.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For she cares nothing about the path to life.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She staggers down a crooked trail and doesn’t realize it.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: So now, my sons, listen to me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Never stray from what I am about to say:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Stay away from her!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t go near the door of her house!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: If you do, you will lose your honor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will lose to merciless people all you have achieved.
