document_id: PRO.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Avoid Immoral Women
  - type: text
    content: My son, pay attention to my wisdom;
  - type: text
    content: listen carefully to my wise counsel.
  '10':
  - type: text
    content: Strangers will consume your wealth,
  - type: text
    content: and someone else will enjoy the fruit of your labor.
  '11':
  - type: text
    content: In the end you will groan in anguish
  - type: text
    content: when disease consumes your body.
  '12':
  - type: text
    content: You will say, “How I hated discipline!
  - type: text
    content: If only I had not ignored all the warnings!
  '13':
  - type: text
    content: Oh, why didn’t I listen to my teachers?
  - type: text
    content: Why didn’t I pay attention to my instructors?
  '14':
  - type: text
    content: I have come to the brink of utter ruin,
  - type: text
    content: and now I must face public disgrace.”
  '15':
  - type: text
    content: Drink water from your own well—
  - type: text
    content: share your love only with your wife.
  - type: note
    content: Hebrew Drink water from your own cistern, / flowing water from your own well.
  '16':
  - type: text
    content: Why spill the water of your springs in the streets,
  - type: text
    content: having sex with just anyone?
  - type: note
    content: Hebrew Why spill your springs in the streets, / your streams in the city squares?
  '17':
  - type: text
    content: You should reserve it for yourselves.
  - type: text
    content: Never share it with strangers.
  '18':
  - type: text
    content: Let your wife be a fountain of blessing for you.
  - type: text
    content: Rejoice in the wife of your youth.
  '19':
  - type: text
    content: She is a loving deer, a graceful doe.
  - type: text
    content: Let her breasts satisfy you always.
  - type: text
    content: May you always be captivated by her love.
  '2':
  - type: text
    content: Then you will show discernment,
  - type: text
    content: and your lips will express what you’ve learned.
  '20':
  - type: text
    content: Why be captivated, my son, by an immoral woman,
  - type: text
    content: or fondle the breasts of a promiscuous woman?
  '21':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' sees clearly what a man does,'
  - type: text
    content: examining every path he takes.
  '22':
  - type: text
    content: An evil man is held captive by his own sins;
  - type: text
    content: they are ropes that catch and hold him.
  '23':
  - type: text
    content: He will die for lack of self-control;
  - type: text
    content: he will be lost because of his great foolishness.
  '3':
  - type: text
    content: For the lips of an immoral woman are as sweet as honey,
  - type: text
    content: and her mouth is smoother than oil.
  '4':
  - type: text
    content: But in the end she is as bitter as poison,
  - type: text
    content: as dangerous as a double-edged sword.
  '5':
  - type: text
    content: Her feet go down to death;
  - type: text
    content: her steps lead straight to the grave.
  - type: note
    content: Hebrew to Sheol.
  '6':
  - type: text
    content: For she cares nothing about the path to life.
  - type: text
    content: She staggers down a crooked trail and doesn’t realize it.
  '7':
  - type: text
    content: So now, my sons, listen to me.
  - type: text
    content: 'Never stray from what I am about to say:'
  '8':
  - type: text
    content: Stay away from her!
  - type: text
    content: Don’t go near the door of her house!
  '9':
  - type: text
    content: If you do, you will lose your honor
  - type: text
    content: and will lose to merciless people all you have achieved.
