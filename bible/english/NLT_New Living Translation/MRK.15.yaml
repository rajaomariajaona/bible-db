document_id: MRK.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus’ Trial before Pilate
  - type: text
    content: Very early in the morning the leading priests, the elders, and the teachers of religious law—the entire high council
  - type: note
    content: Greek the Sanhedrin; also in 15:43.
  - type: text
    content: —met to discuss their next step. They bound Jesus, led him away, and took him to Pilate, the Roman governor.
  '10':
  - type: text
    content: '(For he realized by now that the leading priests had arrested Jesus out of envy.) '
  '11':
  - type: text
    content: 'But at this point the leading priests stirred up the crowd to demand the release of Barabbas instead of Jesus. '
  '12':
  - type: text
    content: Pilate asked them, “Then what should I do with this man you call the king of the Jews?”
  '13':
  - type: text
    content: They shouted back, “Crucify him!”
  '14':
  - type: text
    content: “Why?” Pilate demanded. “What crime has he committed?”
  - type: text
    content: But the mob roared even louder, “Crucify him!”
  '15':
  - type: text
    content: So to pacify the crowd, Pilate released Barabbas to them. He ordered Jesus flogged with a lead-tipped whip, then turned him over to the Roman soldiers to be crucified.
  - type: heading
    content: The Soldiers Mock Jesus
  '16':
  - type: text
    content: 'The soldiers took Jesus into the courtyard of the governor’s headquarters (called the Praetorium) and called out the entire regiment. '
  '17':
  - type: text
    content: 'They dressed him in a purple robe, and they wove thorn branches into a crown and put it on his head. '
  '18':
  - type: text
    content: 'Then they saluted him and taunted, “Hail! King of the Jews!” '
  '19':
  - type: text
    content: 'And they struck him on the head with a reed stick, spit on him, and dropped to their knees in mock worship. '
  '2':
  - type: text
    content: Pilate asked Jesus, “Are you the king of the Jews?”
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You have said it.”
  '20':
  - type: text
    content: When they were finally tired of mocking him, they took off the purple robe and put his own clothes on him again. Then they led him away to be crucified.
  - type: heading
    content: The Crucifixion
  '21':
  - type: text
    content: A passerby named Simon, who was from Cyrene,
  - type: note
    content: Cyrene was a city in northern Africa.
  - type: text
    content: ' was coming in from the countryside just then, and the soldiers forced him to carry Jesus’ cross. (Simon was the father of Alexander and Rufus.) '
  '22':
  - type: text
    content: 'And they brought Jesus to a place called Golgotha (which means “Place of the Skull”). '
  '23':
  - type: text
    content: They offered him wine drugged with myrrh, but he refused it.
  '24':
  - type: text
    content: Then the soldiers nailed him to the cross. They divided his clothes and threw dice
  - type: note
    content: Greek cast lots. See Ps 22:18.
  - type: text
    content: ' to decide who would get each piece. '
  '25':
  - type: text
    content: 'It was nine o’clock in the morning when they crucified him. '
  '26':
  - type: text
    content: 'A sign announced the charge against him. It read, “The King of the Jews.” '
  '27':
  - type: text
    content: Two revolutionaries
  - type: note
    content: Or Two criminals.
  - type: text
    content: ' were crucified with him, one on his right and one on his left.'
  - type: note
    content: Some manuscripts add verse 28, And the Scripture was fulfilled that said, “He was counted among those who were rebels.” See Isa 53:12; also compare Luke 22:37.
  '29':
  - type: text
    content: 'The people passing by shouted abuse, shaking their heads in mockery. “Ha! Look at you now!” they yelled at him. “You said you were going to destroy the Temple and rebuild it in three days. '
  '3':
  - type: text
    content: 'Then the leading priests kept accusing him of many crimes, '
  '30':
  - type: text
    content: Well then, save yourself and come down from the cross!”
  '31':
  - type: text
    content: 'The leading priests and teachers of religious law also mocked Jesus. “He saved others,” they scoffed, “but he can’t save himself! '
  '32':
  - type: text
    content: Let this Messiah, this King of Israel, come down from the cross so we can see it and believe him!” Even the men who were crucified with Jesus ridiculed him.
  - type: heading
    content: The Death of Jesus
  '33':
  - type: text
    content: 'At noon, darkness fell across the whole land until three o’clock. '
  '34':
  - type: text
    content: 'Then at three o’clock Jesus called out with a loud voice, '
  - type: text
    content: “Eloi, Eloi, lema sabachthani?”
  - type: text
    content: ' which means '
  - type: text
    content: “My God, my God, why have you abandoned me?”
  - type: note
    content: Ps 22:1.
  '35':
  - type: text
    content: 'Some of the bystanders misunderstood and thought he was calling for the prophet Elijah. '
  '36':
  - type: text
    content: One of them ran and filled a sponge with sour wine, holding it up to him on a reed stick so he could drink. “Wait!” he said. “Let’s see whether Elijah comes to take him down!”
  '37':
  - type: text
    content: 'Then Jesus uttered another loud cry and breathed his last. '
  '38':
  - type: text
    content: And the curtain in the sanctuary of the Temple was torn in two, from top to bottom.
  '39':
  - type: text
    content: When the Roman officer
  - type: note
    content: Greek the centurion; similarly in 15:44, 45.
  - type: text
    content: ' who stood facing him'
  - type: note
    content: Some manuscripts add heard his cry and.
  - type: text
    content: ' saw how he had died, he exclaimed, “This man truly was the Son of God!”'
  '4':
  - type: text
    content: 'and Pilate asked him, “Aren’t you going to answer them? What about all these charges they are bringing against you?” '
  '40':
  - type: text
    content: Some women were there, watching from a distance, including Mary Magdalene, Mary (the mother of James the younger and of Joseph
  - type: note
    content: Greek Joses; also in 15:47. See Matt 27:56.
  - type: text
    content: '), and Salome. '
  '41':
  - type: text
    content: They had been followers of Jesus and had cared for him while he was in Galilee. Many other women who had come with him to Jerusalem were also there.
  - type: heading
    content: The Burial of Jesus
  '42':
  - type: text
    content: This all happened on Friday, the day of preparation,
  - type: note
    content: Greek It was the day of preparation.
  - type: text
    content: ' the day before the Sabbath. As evening approached, '
  '43':
  - type: text
    content: 'Joseph of Arimathea took a risk and went to Pilate and asked for Jesus’ body. (Joseph was an honored member of the high council, and he was waiting for the Kingdom of God to come.) '
  '44':
  - type: text
    content: 'Pilate couldn’t believe that Jesus was already dead, so he called for the Roman officer and asked if he had died yet. '
  '45':
  - type: text
    content: 'The officer confirmed that Jesus was dead, so Pilate told Joseph he could have the body. '
  '46':
  - type: text
    content: 'Joseph bought a long sheet of linen cloth. Then he took Jesus’ body down from the cross, wrapped it in the cloth, and laid it in a tomb that had been carved out of the rock. Then he rolled a stone in front of the entrance. '
  '47':
  - type: text
    content: Mary Magdalene and Mary the mother of Joseph saw where Jesus’ body was laid.
  '5':
  - type: text
    content: But Jesus said nothing, much to Pilate’s surprise.
  '6':
  - type: text
    content: 'Now it was the governor’s custom each year during the Passover celebration to release one prisoner—anyone the people requested. '
  '7':
  - type: text
    content: 'One of the prisoners at that time was Barabbas, a revolutionary who had committed murder in an uprising. '
  '8':
  - type: text
    content: The crowd went to Pilate and asked him to release a prisoner as usual.
  '9':
  - type: text
    content: '“Would you like me to release to you this ‘King of the Jews’?” Pilate asked. '
