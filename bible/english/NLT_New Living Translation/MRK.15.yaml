document_id: MRK.15,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus’ Trial before Pilate
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Very early in the morning the leading priests, the elders, and the teachers of religious law—the entire high council
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Sanhedrin; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 15:43.
      marker-yv: yv-n
    - type: text
      text: —met to discuss their next step. They bound Jesus, led him away, and took him to Pilate, the Roman governor.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(For he realized by now that the leading priests had arrested Jesus out of envy.) '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But at this point the leading priests stirred up the crowd to demand the release of Barabbas instead of Jesus. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pilate asked them, “Then what should I do with this man you call the king of the Jews?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They shouted back, “Crucify him!”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Why?” Pilate demanded. “What crime has he committed?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the mob roared even louder, “Crucify him!”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So to pacify the crowd, Pilate released Barabbas to them. He ordered Jesus flogged with a lead-tipped whip, then turned him over to the Roman soldiers to be crucified.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Soldiers Mock Jesus
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The soldiers took Jesus into the courtyard of the governor’s headquarters (called the Praetorium) and called out the entire regiment. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They dressed him in a purple robe, and they wove thorn branches into a crown and put it on his head. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then they saluted him and taunted, “Hail! King of the Jews!” '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And they struck him on the head with a reed stick, spit on him, and dropped to their knees in mock worship. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pilate asked Jesus, “Are you the king of the Jews?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have said it.”
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When they were finally tired of mocking him, they took off the purple robe and put his own clothes on him again. Then they led him away to be crucified.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Crucifixion
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: A passerby named Simon, who was from Cyrene,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:21 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Cyrene '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was a city in northern Africa.
      marker-yv: yv-n
    - type: text
      text: ' was coming in from the countryside just then, and the soldiers forced him to carry Jesus’ cross. (Simon was the father of Alexander and Rufus.) '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And they brought Jesus to a place called Golgotha (which means “Place of the Skull”). '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: They offered him wine drugged with myrrh, but he refused it.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the soldiers nailed him to the cross. They divided his clothes and threw dice
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cast lots. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Ps 22:18.
      marker-yv: yv-n
    - type: text
      text: ' to decide who would get each piece. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was nine o’clock in the morning when they crucified him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A sign announced the charge against him. It read, “The King of the Jews.” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Two revolutionaries
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:27a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Two criminals.
      marker-yv: yv-n
    - type: text
      text: ' were crucified with him, one on his right and one on his left.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:27b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add verse 28, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'And the Scripture was fulfilled that said, “He was counted among those who were rebels.” '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Isa 53:12; also compare Luke 22:37.
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people passing by shouted abuse, shaking their heads in mockery. “Ha! Look at you now!” they yelled at him. “You said you were going to destroy the Temple and rebuild it in three days. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the leading priests kept accusing him of many crimes, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Well then, save yourself and come down from the cross!”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The leading priests and teachers of religious law also mocked Jesus. “He saved others,” they scoffed, “but he can’t save himself! '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Let this Messiah, this King of Israel, come down from the cross so we can see it and believe him!” Even the men who were crucified with Jesus ridiculed him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Jesus
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'At noon, darkness fell across the whole land until three o’clock. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then at three o’clock Jesus called out with a loud voice, '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: “Eloi, Eloi, lema sabachthani?”
    - type: text
      text: ' which means '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My God, my God, why have you abandoned me?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 22:1.
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some of the bystanders misunderstood and thought he was calling for the prophet Elijah. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One of them ran and filled a sponge with sour wine, holding it up to him on a reed stick so he could drink. “Wait!” he said. “Let’s see whether Elijah comes to take him down!”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus uttered another loud cry and breathed his last. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the curtain in the sanctuary of the Temple was torn in two, from top to bottom.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the Roman officer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:39a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the centurion; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly in 15:44, 45.
      marker-yv: yv-n
    - type: text
      text: ' who stood facing him'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:39b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: heard his cry and.
      marker-yv: yv-n
    - type: text
      text: ' saw how he had died, he exclaimed, “This man truly was the Son of God!”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Pilate asked him, “Aren’t you going to answer them? What about all these charges they are bringing against you?” '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Some women were there, watching from a distance, including Mary Magdalene, Mary (the mother of James the younger and of Joseph
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Joses; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 15:47. See Matt 27:56.
      marker-yv: yv-n
    - type: text
      text: '), and Salome. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They had been followers of Jesus and had cared for him while he was in Galilee. Many other women who had come with him to Jerusalem were also there.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Burial of Jesus
    marker-yv: yv-h
  '42':
  - type: usfm
    marker: m
    children:
    - type: text
      text: This all happened on Friday, the day of preparation,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: It was the day of preparation.
      marker-yv: yv-n
    - type: text
      text: ' the day before the Sabbath. As evening approached, '
  '43':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Joseph of Arimathea took a risk and went to Pilate and asked for Jesus’ body. (Joseph was an honored member of the high council, and he was waiting for the Kingdom of God to come.) '
  '44':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Pilate couldn’t believe that Jesus was already dead, so he called for the Roman officer and asked if he had died yet. '
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The officer confirmed that Jesus was dead, so Pilate told Joseph he could have the body. '
  '46':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Joseph bought a long sheet of linen cloth. Then he took Jesus’ body down from the cross, wrapped it in the cloth, and laid it in a tomb that had been carved out of the rock. Then he rolled a stone in front of the entrance. '
  '47':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Mary Magdalene and Mary the mother of Joseph saw where Jesus’ body was laid.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Jesus said nothing, much to Pilate’s surprise.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it was the governor’s custom each year during the Passover celebration to release one prisoner—anyone the people requested. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of the prisoners at that time was Barabbas, a revolutionary who had committed murder in an uprising. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The crowd went to Pilate and asked him to release a prisoner as usual.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Would you like me to release to you this ‘King of the Jews’?” Pilate asked. '
