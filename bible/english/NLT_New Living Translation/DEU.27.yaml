document_id: DEU.27,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Altar on Mount Ebal
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Moses and the leaders of Israel gave this charge to the people: “Obey all these commands that I am giving you today. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So you must obey the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God by keeping all these commands and decrees that I am giving you today.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Curses from Mount Ebal
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'That same day Moses also gave this charge to the people: '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“When you cross the Jordan River, the tribes of Simeon, Levi, Judah, Issachar, Joseph, and Benjamin must stand on Mount Gerizim to proclaim a blessing over the people. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: And the tribes of Reuben, Gad, Asher, Zebulun, Dan, and Naphtali must stand on Mount Ebal to proclaim a curse.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“Then the Levites will shout to all the people of Israel:'
  '15':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '‘Cursed is anyone who carves or casts an idol and secretly sets it up. These idols, the work of craftsmen, are detestable to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the people will reply, ‘Amen.’
  '16':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ‘Cursed is anyone who dishonors father or mother.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the people will reply, ‘Amen.’
  '17':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ‘Cursed is anyone who steals property from a neighbor by moving a boundary marker.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the people will reply, ‘Amen.’
  '18':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ‘Cursed is anyone who leads a blind person astray on the road.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the people will reply, ‘Amen.’
  '19':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ‘Cursed is anyone who denies justice to foreigners, orphans, or widows.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the people will reply, ‘Amen.’
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'When you cross the Jordan River and enter the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you, set up some large stones and coat them with plaster. '
  '20':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ‘Cursed is anyone who has sexual intercourse with one of his father’s wives, for he has violated his father.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the people will reply, ‘Amen.’
  '21':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ‘Cursed is anyone who has sexual intercourse with an animal.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the people will reply, ‘Amen.’
  '22':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ‘Cursed is anyone who has sexual intercourse with his sister, whether she is the daughter of his father or his mother.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the people will reply, ‘Amen.’
  '23':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ‘Cursed is anyone who has sexual intercourse with his mother-in-law.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the people will reply, ‘Amen.’
  '24':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ‘Cursed is anyone who attacks a neighbor in secret.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the people will reply, ‘Amen.’
  '25':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ‘Cursed is anyone who accepts payment to kill an innocent person.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the people will reply, ‘Amen.’
  '26':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ‘Cursed is anyone who does not affirm and obey the terms of these instructions.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And all the people will reply, ‘Amen.’
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Write this whole body of instruction on them when you cross the river to enter the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you—a land flowing with milk and honey, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your ancestors, promised you. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: When you cross the Jordan, set up these stones at Mount Ebal and coat them with plaster, as I am commanding you today.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“Then build an altar there to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, using natural, uncut stones. You must not shape the stones with an iron tool. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Build the altar of uncut stones, and use it to offer burnt offerings to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Also sacrifice peace offerings on it, and celebrate by feasting there before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: You must clearly write all these instructions on the stones coated with plaster.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then Moses and the Levitical priests addressed all Israel as follows: “O Israel, be quiet and listen! Today you have become the people of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
