document_id: DEU.27,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Altar on Mount Ebal
  - type: text
    content: 'Then Moses and the leaders of Israel gave this charge to the people: “Obey all these commands that I am giving you today. '
  '10':
  - type: text
    content: 'So you must obey the '
  - type: text
    content: Lord
  - type: text
    content: ' your God by keeping all these commands and decrees that I am giving you today.”'
  - type: heading
    content: Curses from Mount Ebal
  '11':
  - type: text
    content: 'That same day Moses also gave this charge to the people: '
  '12':
  - type: text
    content: '“When you cross the Jordan River, the tribes of Simeon, Levi, Judah, Issachar, Joseph, and Benjamin must stand on Mount Gerizim to proclaim a blessing over the people. '
  '13':
  - type: text
    content: And the tribes of Reuben, Gad, Asher, Zebulun, Dan, and Naphtali must stand on Mount Ebal to proclaim a curse.
  '14':
  - type: text
    content: '“Then the Levites will shout to all the people of Israel:'
  '15':
  - type: text
    content: '‘Cursed is anyone who carves or casts an idol and secretly sets it up. These idols, the work of craftsmen, are detestable to the '
  - type: text
    content: Lord
  - type: text
    content: .’
  - type: text
    content: And all the people will reply, ‘Amen.’
  '16':
  - type: text
    content: ‘Cursed is anyone who dishonors father or mother.’
  - type: text
    content: And all the people will reply, ‘Amen.’
  '17':
  - type: text
    content: ‘Cursed is anyone who steals property from a neighbor by moving a boundary marker.’
  - type: text
    content: And all the people will reply, ‘Amen.’
  '18':
  - type: text
    content: ‘Cursed is anyone who leads a blind person astray on the road.’
  - type: text
    content: And all the people will reply, ‘Amen.’
  '19':
  - type: text
    content: ‘Cursed is anyone who denies justice to foreigners, orphans, or widows.’
  - type: text
    content: And all the people will reply, ‘Amen.’
  '2':
  - type: text
    content: 'When you cross the Jordan River and enter the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, set up some large stones and coat them with plaster. '
  '20':
  - type: text
    content: ‘Cursed is anyone who has sexual intercourse with one of his father’s wives, for he has violated his father.’
  - type: text
    content: And all the people will reply, ‘Amen.’
  '21':
  - type: text
    content: ‘Cursed is anyone who has sexual intercourse with an animal.’
  - type: text
    content: And all the people will reply, ‘Amen.’
  '22':
  - type: text
    content: ‘Cursed is anyone who has sexual intercourse with his sister, whether she is the daughter of his father or his mother.’
  - type: text
    content: And all the people will reply, ‘Amen.’
  '23':
  - type: text
    content: ‘Cursed is anyone who has sexual intercourse with his mother-in-law.’
  - type: text
    content: And all the people will reply, ‘Amen.’
  '24':
  - type: text
    content: ‘Cursed is anyone who attacks a neighbor in secret.’
  - type: text
    content: And all the people will reply, ‘Amen.’
  '25':
  - type: text
    content: ‘Cursed is anyone who accepts payment to kill an innocent person.’
  - type: text
    content: And all the people will reply, ‘Amen.’
  '26':
  - type: text
    content: ‘Cursed is anyone who does not affirm and obey the terms of these instructions.’
  - type: text
    content: And all the people will reply, ‘Amen.’
  '3':
  - type: text
    content: 'Write this whole body of instruction on them when you cross the river to enter the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you—a land flowing with milk and honey, just as the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestors, promised you. '
  '4':
  - type: text
    content: When you cross the Jordan, set up these stones at Mount Ebal and coat them with plaster, as I am commanding you today.
  '5':
  - type: text
    content: '“Then build an altar there to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, using natural, uncut stones. You must not shape the stones with an iron tool. '
  '6':
  - type: text
    content: 'Build the altar of uncut stones, and use it to offer burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '7':
  - type: text
    content: 'Also sacrifice peace offerings on it, and celebrate by feasting there before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '8':
  - type: text
    content: You must clearly write all these instructions on the stones coated with plaster.”
  '9':
  - type: text
    content: 'Then Moses and the Levitical priests addressed all Israel as follows: “O Israel, be quiet and listen! Today you have become the people of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
