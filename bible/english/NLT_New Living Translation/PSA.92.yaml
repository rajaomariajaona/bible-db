document_id: PSA.92
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm. A song to be sung on the Sabbath Day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'It is good to give thanks to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: to sing praises to the Most High.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: It is good to proclaim your unfailing love in the morning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your faithfulness in the evening,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: accompanied by a ten-stringed instrument, a harp,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the melody of a lyre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'You thrill me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', with all you have done for me!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I sing for joy because of what you have done.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', what great works you do!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And how deep are your thoughts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Only a simpleton would not know,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and only a fool would not understand this:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Though the wicked sprout like weeds
- type: usfm
  marker: q2
  children:
  - type: text
    text: and evildoers flourish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will be destroyed forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But you, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', will be exalted forever.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Your enemies, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', will surely perish;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: all evildoers will be scattered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But you have made me as strong as a wild ox.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have anointed me with the finest oil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: My eyes have seen the downfall of my enemies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my ears have heard the defeat of my wicked opponents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But the godly will flourish like palm trees
- type: usfm
  marker: q2
  children:
  - type: text
    text: and grow strong like the cedars of Lebanon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For they are transplanted to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s own house.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They flourish in the courts of our God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Even in old age they will still produce fruit;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will remain vital and green.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'They will declare, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is just!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is my rock!
- type: usfm
  marker: q2
  children:
  - type: text
    text: There is no evil in him!”
