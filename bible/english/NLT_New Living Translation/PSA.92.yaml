document_id: PSA.92,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm. A song to be sung on the Sabbath Day.
  - type: text
    content: 'It is good to give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: to sing praises to the Most High.
  '10':
  - type: text
    content: But you have made me as strong as a wild ox.
  - type: text
    content: You have anointed me with the finest oil.
  '11':
  - type: text
    content: My eyes have seen the downfall of my enemies;
  - type: text
    content: my ears have heard the defeat of my wicked opponents.
  '12':
  - type: text
    content: But the godly will flourish like palm trees
  - type: text
    content: and grow strong like the cedars of Lebanon.
  '13':
  - type: text
    content: 'For they are transplanted to the '
  - type: text
    content: Lord
  - type: text
    content: ’s own house.
  - type: text
    content: They flourish in the courts of our God.
  '14':
  - type: text
    content: Even in old age they will still produce fruit;
  - type: text
    content: they will remain vital and green.
  '15':
  - type: text
    content: 'They will declare, “The '
  - type: text
    content: Lord
  - type: text
    content: ' is just!'
  - type: text
    content: He is my rock!
  - type: text
    content: There is no evil in him!”
  '2':
  - type: text
    content: It is good to proclaim your unfailing love in the morning,
  - type: text
    content: your faithfulness in the evening,
  '3':
  - type: text
    content: accompanied by a ten-stringed instrument, a harp,
  - type: text
    content: and the melody of a lyre.
  '4':
  - type: text
    content: 'You thrill me, '
  - type: text
    content: Lord
  - type: text
    content: ', with all you have done for me!'
  - type: text
    content: I sing for joy because of what you have done.
  '5':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', what great works you do!'
  - type: text
    content: And how deep are your thoughts.
  '6':
  - type: text
    content: Only a simpleton would not know,
  - type: text
    content: 'and only a fool would not understand this:'
  '7':
  - type: text
    content: Though the wicked sprout like weeds
  - type: text
    content: and evildoers flourish,
  - type: text
    content: they will be destroyed forever.
  '8':
  - type: text
    content: 'But you, O '
  - type: text
    content: Lord
  - type: text
    content: ', will be exalted forever.'
  '9':
  - type: text
    content: 'Your enemies, '
  - type: text
    content: Lord
  - type: text
    content: ', will surely perish;'
  - type: text
    content: all evildoers will be scattered.
