document_id: ROM.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Selection of Israel
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'With Christ as my witness, I speak with utter truthfulness. My conscience and the Holy Spirit confirm it. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: This son was our ancestor Isaac. When he married Rebekah, she gave birth to twins.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: she conceived children through this one man.
      marker-yv: yv-n
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But before they were born, before they had done anything good or bad, she received a message from God. (This message shows that God chooses people according to his own purposes; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: he calls people, but not according to their good or bad works.) She was told, “Your older son will serve your younger son.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen 25:23.
      marker-yv: yv-n
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: In the words of the Scriptures, “I loved Jacob, but I rejected Esau.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mal 1:2-3.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Are we saying, then, that God was unfair? Of course not! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: For God said to Moses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will show mercy to anyone I choose,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will show compassion to anyone I choose.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 33:19.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: So it is God who decides to show mercy. We can neither choose it nor work for it.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: For the Scriptures say that God told Pharaoh, “I have appointed you for the very purpose of displaying my power in you and to spread my fame throughout the earth.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 9:16 (Greek version).
      marker-yv: yv-n
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: So you see, God chooses to show mercy to some, and he chooses to harden the hearts of others so they refuse to listen.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Well then, you might say, “Why does God blame people for not responding? Haven’t they simply done what he makes them do?”
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'My heart is filled with bitter sorrow and unending grief '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'No, don’t say that. Who are you, a mere human being, to argue with God? Should the thing that was created say to the one who created it, “Why have you made me like this?” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'When a potter makes jars out of clay, doesn’t he have a right to use the same lump of clay to make one jar for decoration and another to throw garbage into? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'In the same way, even though God has the right to show his anger and his power, he is very patient with those on whom his anger falls, who are destined for destruction. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'He does this to make the riches of his glory shine even brighter on those to whom he shows mercy, who were prepared in advance for glory. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: And we are among those whom he selected, both from the Jews and from the Gentiles.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Concerning the Gentiles, God says in the prophecy of Hosea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Those who were not my people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will now call my people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will love those
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whom I did not love before.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hos 2:23.
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: And,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then, at the place where they were told,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘You are not my people,’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: there they will be called
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘children of the living God.’”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sons of the living God. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hos 1:10.
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: And concerning Israel, Isaiah the prophet cried out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Though the people of Israel are as numerous as the sand of the seashore,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: only a remnant will be saved.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will carry out his sentence upon the earth'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: quickly and with finality.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:27-28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 10:22-23 (Greek version).
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And Isaiah said the same thing in another place:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“If the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: had not spared a few of our children,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we would have been wiped out like Sodom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: destroyed like Gomorrah.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 1:9 (Greek version).
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Unbelief
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: for my people, my Jewish brothers and sisters.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: my brothers.
      marker-yv: yv-n
    - type: text
      text: ' I would be willing to be forever cursed—cut off from Christ!—if that would save them. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'What does all this mean? Even though the Gentiles were not trying to follow God’s standards, they were made right with God. And it was by faith that this took place. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'But the people of Israel, who tried so hard to get right with God by keeping the law, never succeeded. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Why not? Because they were trying to get right with God by keeping the law
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: by works.
      marker-yv: yv-n
    - type: text
      text: ' instead of by trusting in him. They stumbled over the great rock in their path. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: God warned them of this in the Scriptures when he said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am placing a stone in Jerusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:33a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in Zion.
      marker-yv: yv-n
    - type: text
      text: ' that makes people stumble,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a rock that makes them fall.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But anyone who trusts in him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will never be disgraced.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:33b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 8:14; 28:16 (Greek version).
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They are the people of Israel, chosen to be God’s adopted children.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chosen for sonship.
      marker-yv: yv-n
    - type: text
      text: ' God revealed his glory to them. He made covenants with them and gave them his law. He gave them the privilege of worshiping him and receiving his wonderful promises. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Abraham, Isaac, and Jacob are their ancestors, and Christ himself was an Israelite as far as his human nature is concerned. And he is God, the one who rules over everything and is worthy of eternal praise! Amen.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: May God, the one who rules over everything, be praised forever. Amen.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Well then, has God failed to fulfill his promise to Israel? No, for not all who are born into the nation of Israel are truly members of God’s people! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Being descendants of Abraham doesn’t make them truly Abraham’s children. For the Scriptures say, “Isaac is the son through whom your descendants will be counted,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen 21:12.
      marker-yv: yv-n
    - type: text
      text: ' though Abraham had other children, too. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'This means that Abraham’s physical descendants are not necessarily children of God. Only the children of the promise are considered to be Abraham’s children. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For God had promised, “I will return about this time next year, and Sarah will have a son.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen 18:10, 14.
      marker-yv: yv-n
