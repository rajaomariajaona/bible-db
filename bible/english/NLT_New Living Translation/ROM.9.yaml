document_id: ROM.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Selection of Israel
  - type: text
    content: 'With Christ as my witness, I speak with utter truthfulness. My conscience and the Holy Spirit confirm it. '
  '10':
  - type: text
    content: This son was our ancestor Isaac. When he married Rebekah, she gave birth to twins.
  - type: note
    content: Greek she conceived children through this one man.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'But before they were born, before they had done anything good or bad, she received a message from God. (This message shows that God chooses people according to his own purposes; '
  '12':
  - type: text
    content: he calls people, but not according to their good or bad works.) She was told, “Your older son will serve your younger son.”
  - type: note
    content: Gen 25:23.
  - type: text
    content: ' '
  '13':
  - type: text
    content: In the words of the Scriptures, “I loved Jacob, but I rejected Esau.”
  - type: note
    content: Mal 1:2-3.
  '14':
  - type: text
    content: 'Are we saying, then, that God was unfair? Of course not! '
  '15':
  - type: text
    content: For God said to Moses,
  - type: text
    content: “I will show mercy to anyone I choose,
  - type: text
    content: and I will show compassion to anyone I choose.”
  - type: note
    content: Exod 33:19.
  '16':
  - type: text
    content: So it is God who decides to show mercy. We can neither choose it nor work for it.
  '17':
  - type: text
    content: For the Scriptures say that God told Pharaoh, “I have appointed you for the very purpose of displaying my power in you and to spread my fame throughout the earth.”
  - type: note
    content: Exod 9:16 (Greek version).
  - type: text
    content: ' '
  '18':
  - type: text
    content: So you see, God chooses to show mercy to some, and he chooses to harden the hearts of others so they refuse to listen.
  '19':
  - type: text
    content: Well then, you might say, “Why does God blame people for not responding? Haven’t they simply done what he makes them do?”
  '2':
  - type: text
    content: 'My heart is filled with bitter sorrow and unending grief '
  '20':
  - type: text
    content: 'No, don’t say that. Who are you, a mere human being, to argue with God? Should the thing that was created say to the one who created it, “Why have you made me like this?” '
  '21':
  - type: text
    content: 'When a potter makes jars out of clay, doesn’t he have a right to use the same lump of clay to make one jar for decoration and another to throw garbage into? '
  '22':
  - type: text
    content: 'In the same way, even though God has the right to show his anger and his power, he is very patient with those on whom his anger falls, who are destined for destruction. '
  '23':
  - type: text
    content: 'He does this to make the riches of his glory shine even brighter on those to whom he shows mercy, who were prepared in advance for glory. '
  '24':
  - type: text
    content: And we are among those whom he selected, both from the Jews and from the Gentiles.
  '25':
  - type: text
    content: Concerning the Gentiles, God says in the prophecy of Hosea,
  - type: text
    content: “Those who were not my people,
  - type: text
    content: I will now call my people.
  - type: text
    content: And I will love those
  - type: text
    content: whom I did not love before.”
  - type: note
    content: Hos 2:23.
  '26':
  - type: text
    content: And,
  - type: text
    content: “Then, at the place where they were told,
  - type: text
    content: ‘You are not my people,’
  - type: text
    content: there they will be called
  - type: text
    content: ‘children of the living God.’”
  - type: note
    content: Greek sons of the living God. Hos 1:10.
  '27':
  - type: text
    content: And concerning Israel, Isaiah the prophet cried out,
  - type: text
    content: “Though the people of Israel are as numerous as the sand of the seashore,
  - type: text
    content: only a remnant will be saved.
  '28':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will carry out his sentence upon the earth'
  - type: text
    content: quickly and with finality.”
  - type: note
    content: Isa 10:22-23 (Greek version).
  '29':
  - type: text
    content: 'And Isaiah said the same thing in another place:'
  - type: text
    content: '“If the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies'
  - type: text
    content: had not spared a few of our children,
  - type: text
    content: we would have been wiped out like Sodom,
  - type: text
    content: destroyed like Gomorrah.”
  - type: note
    content: Isa 1:9 (Greek version).
  - type: heading
    content: Israel’s Unbelief
  '3':
  - type: text
    content: for my people, my Jewish brothers and sisters.
  - type: note
    content: Greek my brothers.
  - type: text
    content: ' I would be willing to be forever cursed—cut off from Christ!—if that would save them. '
  '30':
  - type: text
    content: 'What does all this mean? Even though the Gentiles were not trying to follow God’s standards, they were made right with God. And it was by faith that this took place. '
  '31':
  - type: text
    content: 'But the people of Israel, who tried so hard to get right with God by keeping the law, never succeeded. '
  '32':
  - type: text
    content: Why not? Because they were trying to get right with God by keeping the law
  - type: note
    content: Greek by works.
  - type: text
    content: ' instead of by trusting in him. They stumbled over the great rock in their path. '
  '33':
  - type: text
    content: God warned them of this in the Scriptures when he said,
  - type: text
    content: “I am placing a stone in Jerusalem
  - type: note
    content: Greek in Zion.
  - type: text
    content: ' that makes people stumble,'
  - type: text
    content: a rock that makes them fall.
  - type: text
    content: But anyone who trusts in him
  - type: text
    content: will never be disgraced.”
  - type: note
    content: Isa 8:14; 28:16 (Greek version).
  '4':
  - type: text
    content: They are the people of Israel, chosen to be God’s adopted children.
  - type: note
    content: Greek chosen for sonship.
  - type: text
    content: ' God revealed his glory to them. He made covenants with them and gave them his law. He gave them the privilege of worshiping him and receiving his wonderful promises. '
  '5':
  - type: text
    content: Abraham, Isaac, and Jacob are their ancestors, and Christ himself was an Israelite as far as his human nature is concerned. And he is God, the one who rules over everything and is worthy of eternal praise! Amen.
  - type: note
    content: Or May God, the one who rules over everything, be praised forever. Amen.
  '6':
  - type: text
    content: 'Well then, has God failed to fulfill his promise to Israel? No, for not all who are born into the nation of Israel are truly members of God’s people! '
  '7':
  - type: text
    content: Being descendants of Abraham doesn’t make them truly Abraham’s children. For the Scriptures say, “Isaac is the son through whom your descendants will be counted,”
  - type: note
    content: Gen 21:12.
  - type: text
    content: ' though Abraham had other children, too. '
  '8':
  - type: text
    content: 'This means that Abraham’s physical descendants are not necessarily children of God. Only the children of the promise are considered to be Abraham’s children. '
  '9':
  - type: text
    content: For God had promised, “I will return about this time next year, and Sarah will have a son.”
  - type: note
    content: Gen 18:10, 14.
