document_id: 2SA.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Moving the Ark to Jerusalem
  - type: text
    content: 'Then David again gathered all the elite troops in Israel, 30,000 in all. '
  '10':
  - type: text
    content: 'So David decided not to move the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' into the City of David. Instead, he took it to the house of Obed-edom of Gath. '
  '11':
  - type: text
    content: 'The Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' remained there in Obed-edom’s house for three months, and the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed Obed-edom and his entire household.'
  '12':
  - type: text
    content: 'Then King David was told, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed Obed-edom’s household and everything he has because of the Ark of God.” So David went there and brought the Ark of God from the house of Obed-edom to the City of David with a great celebration. '
  '13':
  - type: text
    content: 'After the men who were carrying the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' had gone six steps, David sacrificed a bull and a fattened calf. '
  '14':
  - type: text
    content: 'And David danced before the '
  - type: text
    content: Lord
  - type: text
    content: ' with all his might, wearing a priestly garment.'
  - type: note
    content: Hebrew a linen ephod.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'So David and all the people of Israel brought up the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' with shouts of joy and the blowing of rams’ horns.'
  - type: heading
    content: Michal’s Contempt for David
  '16':
  - type: text
    content: 'But as the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' entered the City of David, Michal, the daughter of Saul, looked down from her window. When she saw King David leaping and dancing before the '
  - type: text
    content: Lord
  - type: text
    content: ', she was filled with contempt for him.'
  '17':
  - type: text
    content: 'They brought the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' and set it in its place inside the special tent David had prepared for it. And David sacrificed burnt offerings and peace offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'When he had finished his sacrifices, David blessed the people in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. '
  '19':
  - type: text
    content: Then he gave to every Israelite man and woman in the crowd a loaf of bread, a cake of dates,
  - type: note
    content: Or a portion of meat. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' and a cake of raisins. Then all the people returned to their homes.'
  '2':
  - type: text
    content: He led them to Baalah of Judah
  - type: note
    content: Hebrew Baale of Judah, another name for Kiriath-jearim; compare 1 Chr 13:6.
  - type: text
    content: ' to bring back the Ark of God, which bears the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: note
    content: Or the Ark of God where the Name is proclaimed—the name of the Lord of Heaven’s Armies.
  - type: text
    content: ' who is enthroned between the cherubim. '
  '20':
  - type: text
    content: When David returned home to bless his own family, Michal, the daughter of Saul, came out to meet him. She said in disgust, “How distinguished the king of Israel looked today, shamelessly exposing himself to the servant girls like any vulgar person might do!”
  '21':
  - type: text
    content: 'David retorted to Michal, “I was dancing before the '
  - type: text
    content: Lord
  - type: text
    content: ', who chose me above your father and all his family! He appointed me as the leader of Israel, the people of the '
  - type: text
    content: Lord
  - type: text
    content: ', so I celebrate before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Yes, and I am willing to look even more foolish than this, even to be humiliated in my own eyes! But those servant girls you mentioned will indeed think I am distinguished!” '
  '23':
  - type: text
    content: So Michal, the daughter of Saul, remained childless throughout her entire life.
  '3':
  - type: text
    content: 'They placed the Ark of God on a new cart and brought it from Abinadab’s house, which was on a hill. Uzzah and Ahio, Abinadab’s sons, were guiding the cart '
  '4':
  - type: text
    content: that carried the Ark of God.
  - type: note
    content: As in Dead Sea Scrolls and some Greek manuscripts; Masoretic Text reads 4and they brought it from Abinadab’s house, which was on a hill, with the Ark of God.
  - type: text
    content: ' Ahio walked in front of the Ark. '
  '5':
  - type: text
    content: 'David and all the people of Israel were celebrating before the '
  - type: text
    content: Lord
  - type: text
    content: ', singing songs'
  - type: note
    content: As in Dead Sea Scrolls and Greek version (see also 1 Chr 13:8); Masoretic Text reads before the Lord with all manner of cypress wood.
  - type: text
    content: ' and playing all kinds of musical instruments—lyres, harps, tambourines, castanets, and cymbals.'
  '6':
  - type: text
    content: 'But when they arrived at the threshing floor of Nacon, the oxen stumbled, and Uzzah reached out his hand and steadied the Ark of God. '
  '7':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger was aroused against Uzzah, and God struck him dead because of this.
  - type: note
    content: As in Dead Sea Scrolls; Masoretic Text reads because of his irreverence.
  - type: text
    content: ' So Uzzah died right there beside the Ark of God.'
  '8':
  - type: text
    content: 'David was angry because the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger had burst out against Uzzah. He named that place Perez-uzzah (which means “to burst out against Uzzah”), as it is still called today.
  '9':
  - type: text
    content: 'David was now afraid of the '
  - type: text
    content: Lord
  - type: text
    content: ', and he asked, “How can I ever bring the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' back into my care?” '
