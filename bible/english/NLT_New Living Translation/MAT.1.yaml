document_id: MAT.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ancestors of Jesus the Messiah
  - type: text
    content: This is a record of the ancestors of Jesus the Messiah, a descendant of David and of Abraham
  - type: note
    content: Greek Jesus the Messiah, Son of David and son of Abraham.
  - type: text
    content: ':'
  '10':
  - type: text
    content: Hezekiah was the father of Manasseh.
  - type: text
    content: Manasseh was the father of Amon.
  - type: note
    content: Greek Amos, a variant spelling of Amon; also in 1:10b. See 1 Chr 3:14.
  - type: text
    content: Amon was the father of Josiah.
  '11':
  - type: text
    content: Josiah was the father of Jehoiachin
  - type: note
    content: Greek Jeconiah, a variant spelling of Jehoiachin; also in 1:12. See 2 Kgs 24:6 and note at 1 Chr 3:16.
  - type: text
    content: ' and his brothers (born at the time of the exile to Babylon).'
  '12':
  - type: text
    content: 'After the Babylonian exile:'
  - type: text
    content: Jehoiachin was the father of Shealtiel.
  - type: text
    content: Shealtiel was the father of Zerubbabel.
  '13':
  - type: text
    content: Zerubbabel was the father of Abiud.
  - type: text
    content: Abiud was the father of Eliakim.
  - type: text
    content: Eliakim was the father of Azor.
  '14':
  - type: text
    content: Azor was the father of Zadok.
  - type: text
    content: Zadok was the father of Akim.
  - type: text
    content: Akim was the father of Eliud.
  '15':
  - type: text
    content: Eliud was the father of Eleazar.
  - type: text
    content: Eleazar was the father of Matthan.
  - type: text
    content: Matthan was the father of Jacob.
  '16':
  - type: text
    content: Jacob was the father of Joseph, the husband of Mary.
  - type: text
    content: Mary gave birth to Jesus, who is called the Messiah.
  '17':
  - type: text
    content: All those listed above include fourteen generations from Abraham to David, fourteen from David to the Babylonian exile, and fourteen from the Babylonian exile to the Messiah.
  - type: heading
    content: The Birth of Jesus the Messiah
  '18':
  - type: text
    content: 'This is how Jesus the Messiah was born. His mother, Mary, was engaged to be married to Joseph. But before the marriage took place, while she was still a virgin, she became pregnant through the power of the Holy Spirit. '
  '19':
  - type: text
    content: Joseph, to whom she was engaged, was a righteous man and did not want to disgrace her publicly, so he decided to break the engagement
  - type: note
    content: Greek to divorce her.
  - type: text
    content: ' quietly.'
  '2':
  - type: text
    content: Abraham was the father of Isaac.
  - type: text
    content: Isaac was the father of Jacob.
  - type: text
    content: Jacob was the father of Judah and his brothers.
  '20':
  - type: text
    content: 'As he considered this, an angel of the Lord appeared to him in a dream. “Joseph, son of David,” the angel said, “do not be afraid to take Mary as your wife. For the child within her was conceived by the Holy Spirit. '
  '21':
  - type: text
    content: And she will have a son, and you are to name him Jesus,
  - type: note
    content: Jesus means “The Lord saves.”
  - type: text
    content: ' for he will save his people from their sins.”'
  '22':
  - type: text
    content: 'All of this occurred to fulfill the Lord’s message through his prophet:'
  '23':
  - type: text
    content: “Look! The virgin will conceive a child!
  - type: text
    content: She will give birth to a son,
  - type: text
    content: and they will call him Immanuel,
  - type: note
    content: Isa 7:14; 8:8, 10 (Greek version).
  - type: text
    content: which means ‘God is with us.’”
  '24':
  - type: text
    content: 'When Joseph woke up, he did as the angel of the Lord commanded and took Mary as his wife. '
  '25':
  - type: text
    content: But he did not have sexual relations with her until her son was born. And Joseph named him Jesus.
  '3':
  - type: text
    content: Judah was the father of Perez and Zerah (whose mother was Tamar).
  - type: text
    content: Perez was the father of Hezron.
  - type: text
    content: Hezron was the father of Ram.
  - type: note
    content: Greek Aram, a variant spelling of Ram; also in 1:4. See 1 Chr 2:9-10.
  '4':
  - type: text
    content: Ram was the father of Amminadab.
  - type: text
    content: Amminadab was the father of Nahshon.
  - type: text
    content: Nahshon was the father of Salmon.
  '5':
  - type: text
    content: Salmon was the father of Boaz (whose mother was Rahab).
  - type: text
    content: Boaz was the father of Obed (whose mother was Ruth).
  - type: text
    content: Obed was the father of Jesse.
  '6':
  - type: text
    content: Jesse was the father of King David.
  - type: text
    content: David was the father of Solomon (whose mother was Bathsheba, the widow of Uriah).
  '7':
  - type: text
    content: Solomon was the father of Rehoboam.
  - type: text
    content: Rehoboam was the father of Abijah.
  - type: text
    content: Abijah was the father of Asa.
  - type: note
    content: Greek Asaph, a variant spelling of Asa; also in 1:8. See 1 Chr 3:10.
  '8':
  - type: text
    content: Asa was the father of Jehoshaphat.
  - type: text
    content: Jehoshaphat was the father of Jehoram.
  - type: note
    content: Greek Joram, a variant spelling of Jehoram; also in 1:8b. See 1 Kgs 22:50 and note at 1 Chr 3:11.
  - type: text
    content: Jehoram was the father
  - type: note
    content: Or ancestor; also in 1:11.
  - type: text
    content: ' of Uzziah.'
  '9':
  - type: text
    content: Uzziah was the father of Jotham.
  - type: text
    content: Jotham was the father of Ahaz.
  - type: text
    content: Ahaz was the father of Hezekiah.
