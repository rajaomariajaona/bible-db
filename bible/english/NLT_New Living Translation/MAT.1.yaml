document_id: MAT.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ancestors of Jesus the Messiah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: This is a record of the ancestors of Jesus the Messiah, a descendant of David and of Abraham
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jesus the Messiah, Son of David and son of Abraham.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Abraham was the father of Isaac.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Isaac was the father of Jacob.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jacob was the father of Judah and his brothers.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Judah was the father of Perez and Zerah (whose mother was Tamar).
- type: usfm
  marker: li1
  children:
  - type: text
    text: Perez was the father of Hezron.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Hezron was the father of Ram.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Aram, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Ram; also in 1:4. See 1 Chr 2:9-10.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ram was the father of Amminadab.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Amminadab was the father of Nahshon.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Nahshon was the father of Salmon.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Salmon was the father of Boaz (whose mother was Rahab).
- type: usfm
  marker: li1
  children:
  - type: text
    text: Boaz was the father of Obed (whose mother was Ruth).
- type: usfm
  marker: li1
  children:
  - type: text
    text: Obed was the father of Jesse.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Jesse was the father of King David.
- type: usfm
  marker: li1
  children:
  - type: text
    text: David was the father of Solomon (whose mother was Bathsheba, the widow of Uriah).
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Solomon was the father of Rehoboam.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Rehoboam was the father of Abijah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Abijah was the father of Asa.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Asaph, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Asa; also in 1:8. See 1 Chr 3:10.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Asa was the father of Jehoshaphat.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jehoshaphat was the father of Jehoram.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Joram, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoram; also in 1:8b. See 1 Kgs 22:50 and note at 1 Chr 3:11.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jehoram was the father
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ancestor; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 1:11.
    marker-yv: yv-n
  - type: text
    text: ' of Uzziah.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Uzziah was the father of Jotham.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jotham was the father of Ahaz.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ahaz was the father of Hezekiah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hezekiah was the father of Manasseh.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Manasseh was the father of Amon.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Amos, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Amon; also in 1:10b. See 1 Chr 3:14.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: Amon was the father of Josiah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Josiah was the father of Jehoiachin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jeconiah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoiachin; also in 1:12. See 2 Kgs 24:6 and note at 1 Chr 3:16.
    marker-yv: yv-n
  - type: text
    text: ' and his brothers (born at the time of the exile to Babylon).'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'After the Babylonian exile:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jehoiachin was the father of Shealtiel.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Shealtiel was the father of Zerubbabel.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Zerubbabel was the father of Abiud.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Abiud was the father of Eliakim.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Eliakim was the father of Azor.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Azor was the father of Zadok.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Zadok was the father of Akim.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Akim was the father of Eliud.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Eliud was the father of Eleazar.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Eleazar was the father of Matthan.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Matthan was the father of Jacob.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Jacob was the father of Joseph, the husband of Mary.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Mary gave birth to Jesus, who is called the Messiah.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: All those listed above include fourteen generations from Abraham to David, fourteen from David to the Babylonian exile, and fourteen from the Babylonian exile to the Messiah.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Birth of Jesus the Messiah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'This is how Jesus the Messiah was born. His mother, Mary, was engaged to be married to Joseph. But before the marriage took place, while she was still a virgin, she became pregnant through the power of the Holy Spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Joseph, to whom she was engaged, was a righteous man and did not want to disgrace her publicly, so he decided to break the engagement
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to divorce her.
    marker-yv: yv-n
  - type: text
    text: ' quietly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'As he considered this, an angel of the Lord appeared to him in a dream. “Joseph, son of David,” the angel said, “do not be afraid to take Mary as your wife. For the child within her was conceived by the Holy Spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And she will have a son, and you are to name him Jesus,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:21 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jesus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means “The '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' saves.”'
    marker-yv: yv-n
  - type: text
    text: ' for he will save his people from their sins.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'All of this occurred to fulfill the Lord’s message through his prophet:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “Look! The virgin will conceive a child!
- type: usfm
  marker: q2
  children:
  - type: text
    text: She will give birth to a son,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they will call him Immanuel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 7:14; 8:8, 10 (Greek version).
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: which means ‘God is with us.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When Joseph woke up, he did as the angel of the Lord commanded and took Mary as his wife. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: But he did not have sexual relations with her until her son was born. And Joseph named him Jesus.
