document_id: PSA.106,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he is good!'
  - type: text
    content: His faithful love endures forever.
  '10':
  - type: text
    content: So he rescued them from their enemies
  - type: text
    content: and redeemed them from their foes.
  '11':
  - type: text
    content: Then the water returned and covered their enemies;
  - type: text
    content: not one of them survived.
  '12':
  - type: text
    content: Then his people believed his promises.
  - type: text
    content: Then they sang his praise.
  '13':
  - type: text
    content: Yet how quickly they forgot what he had done!
  - type: text
    content: They wouldn’t wait for his counsel!
  '14':
  - type: text
    content: In the wilderness their desires ran wild,
  - type: text
    content: testing God’s patience in that dry wasteland.
  '15':
  - type: text
    content: So he gave them what they asked for,
  - type: text
    content: but he sent a plague along with it.
  '16':
  - type: text
    content: The people in the camp were jealous of Moses
  - type: text
    content: 'and envious of Aaron, the '
  - type: text
    content: Lord
  - type: text
    content: ’s holy priest.
  '17':
  - type: text
    content: Because of this, the earth opened up;
  - type: text
    content: it swallowed Dathan
  - type: text
    content: and buried Abiram and the other rebels.
  '18':
  - type: text
    content: Fire fell upon their followers;
  - type: text
    content: a flame consumed the wicked.
  '19':
  - type: text
    content: The people made a calf at Mount Sinai
  - type: note
    content: Hebrew at Horeb, another name for Sinai.
  - type: text
    content: ;
  - type: text
    content: they bowed before an image made of gold.
  '2':
  - type: text
    content: 'Who can list the glorious miracles of the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: Who can ever praise him enough?
  '20':
  - type: text
    content: They traded their glorious God
  - type: text
    content: for a statue of a grass-eating bull.
  '21':
  - type: text
    content: They forgot God, their savior,
  - type: text
    content: who had done such great things in Egypt—
  '22':
  - type: text
    content: such wonderful things in the land of Ham,
  - type: text
    content: such awesome deeds at the Red Sea.
  '23':
  - type: text
    content: So he declared he would destroy them.
  - type: text
    content: 'But Moses, his chosen one, stepped between the '
  - type: text
    content: Lord
  - type: text
    content: ' and the people.'
  - type: text
    content: He begged him to turn from his anger and not destroy them.
  '24':
  - type: text
    content: The people refused to enter the pleasant land,
  - type: text
    content: for they wouldn’t believe his promise to care for them.
  '25':
  - type: text
    content: Instead, they grumbled in their tents
  - type: text
    content: 'and refused to obey the '
  - type: text
    content: Lord
  - type: text
    content: .
  '26':
  - type: text
    content: Therefore, he solemnly swore
  - type: text
    content: that he would kill them in the wilderness,
  '27':
  - type: text
    content: that he would scatter their descendants
  - type: note
    content: As in Syriac version; Hebrew reads he would cause their descendants to fall.
  - type: text
    content: ' among the nations,'
  - type: text
    content: exiling them to distant lands.
  '28':
  - type: text
    content: Then our ancestors joined in the worship of Baal at Peor;
  - type: text
    content: they even ate sacrifices offered to the dead!
  '29':
  - type: text
    content: 'They angered the '
  - type: text
    content: Lord
  - type: text
    content: ' with all these things,'
  - type: text
    content: so a plague broke out among them.
  '3':
  - type: text
    content: There is joy for those who deal justly with others
  - type: text
    content: and always do what is right.
  '30':
  - type: text
    content: But Phinehas had the courage to intervene,
  - type: text
    content: and the plague was stopped.
  '31':
  - type: text
    content: So he has been regarded as a righteous man
  - type: text
    content: ever since that time.
  '32':
  - type: text
    content: 'At Meribah, too, they angered the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: causing Moses serious trouble.
  '33':
  - type: text
    content: They made Moses angry,
  - type: note
    content: Hebrew They embittered his spirit.
  - type: text
    content: and he spoke foolishly.
  '34':
  - type: text
    content: Israel failed to destroy the nations in the land,
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded them.'
  '35':
  - type: text
    content: Instead, they mingled among the pagans
  - type: text
    content: and adopted their evil customs.
  '36':
  - type: text
    content: They worshiped their idols,
  - type: text
    content: which led to their downfall.
  '37':
  - type: text
    content: They even sacrificed their sons
  - type: text
    content: and their daughters to the demons.
  '38':
  - type: text
    content: They shed innocent blood,
  - type: text
    content: the blood of their sons and daughters.
  - type: text
    content: By sacrificing them to the idols of Canaan,
  - type: text
    content: they polluted the land with murder.
  '39':
  - type: text
    content: They defiled themselves by their evil deeds,
  - type: text
    content: 'and their love of idols was adultery in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight.
  '4':
  - type: text
    content: 'Remember me, '
  - type: text
    content: Lord
  - type: text
    content: ', when you show favor to your people;'
  - type: text
    content: come near and rescue me.
  '40':
  - type: text
    content: 'That is why the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger burned against his people,
  - type: text
    content: and he abhorred his own special possession.
  '41':
  - type: text
    content: He handed them over to pagan nations,
  - type: text
    content: and they were ruled by those who hated them.
  '42':
  - type: text
    content: Their enemies crushed them
  - type: text
    content: and brought them under their cruel power.
  '43':
  - type: text
    content: Again and again he rescued them,
  - type: text
    content: but they chose to rebel against him,
  - type: text
    content: and they were finally destroyed by their sin.
  '44':
  - type: text
    content: Even so, he pitied them in their distress
  - type: text
    content: and listened to their cries.
  '45':
  - type: text
    content: He remembered his covenant with them
  - type: text
    content: and relented because of his unfailing love.
  '46':
  - type: text
    content: He even caused their captors
  - type: text
    content: to treat them with kindness.
  '47':
  - type: text
    content: 'Save us, O '
  - type: text
    content: Lord
  - type: text
    content: ' our God!'
  - type: text
    content: Gather us back from among the nations,
  - type: text
    content: so we can thank your holy name
  - type: text
    content: and rejoice and praise you.
  '48':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel,'
  - type: text
    content: who lives from everlasting to everlasting!
  - type: text
    content: Let all the people say, “Amen!”
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '5':
  - type: text
    content: Let me share in the prosperity of your chosen ones.
  - type: text
    content: Let me rejoice in the joy of your people;
  - type: text
    content: let me praise you with those who are your heritage.
  '6':
  - type: text
    content: Like our ancestors, we have sinned.
  - type: text
    content: We have done wrong! We have acted wickedly!
  '7':
  - type: text
    content: Our ancestors in Egypt
  - type: text
    content: 'were not impressed by the '
  - type: text
    content: Lord
  - type: text
    content: ’s miraculous deeds.
  - type: text
    content: They soon forgot his many acts of kindness to them.
  - type: text
    content: Instead, they rebelled against him at the Red Sea.
  - type: note
    content: Hebrew at the sea, the sea of reeds.
  '8':
  - type: text
    content: Even so, he saved them—
  - type: text
    content: to defend the honor of his name
  - type: text
    content: and to demonstrate his mighty power.
  '9':
  - type: text
    content: He commanded the Red Sea
  - type: note
    content: Hebrew sea of reeds; also in 106:22.
  - type: text
    content: ' to dry up.'
  - type: text
    content: He led Israel across the sea as if it were a desert.
