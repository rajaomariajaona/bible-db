document_id: PSA.106,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for he is good!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His faithful love endures forever.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So he rescued them from their enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and redeemed them from their foes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the water returned and covered their enemies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not one of them survived.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then his people believed his promises.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then they sang his praise.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet how quickly they forgot what he had done!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They wouldn’t wait for his counsel!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the wilderness their desires ran wild,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: testing God’s patience in that dry wasteland.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So he gave them what they asked for,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he sent a plague along with it.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people in the camp were jealous of Moses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and envious of Aaron, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s holy priest.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of this, the earth opened up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it swallowed Dathan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and buried Abiram and the other rebels.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fire fell upon their followers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a flame consumed the wicked.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people made a calf at Mount Sinai
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '106:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'at Horeb, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: another name for Sinai.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they bowed before an image made of gold.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who can list the glorious miracles of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can ever praise him enough?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They traded their glorious God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for a statue of a grass-eating bull.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They forgot God, their savior,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who had done such great things in Egypt—
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: such wonderful things in the land of Ham,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: such awesome deeds at the Red Sea.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So he declared he would destroy them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But Moses, his chosen one, stepped between the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the people.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He begged him to turn from his anger and not destroy them.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people refused to enter the pleasant land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they wouldn’t believe his promise to care for them.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead, they grumbled in their tents
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and refused to obey the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, he solemnly swore
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that he would kill them in the wilderness,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that he would scatter their descendants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '106:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Syriac version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he would cause their descendants to fall.
      marker-yv: yv-n
    - type: text
      text: ' among the nations,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: exiling them to distant lands.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then our ancestors joined in the worship of Baal at Peor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they even ate sacrifices offered to the dead!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They angered the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with all these things,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so a plague broke out among them.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is joy for those who deal justly with others
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and always do what is right.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But Phinehas had the courage to intervene,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the plague was stopped.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So he has been regarded as a righteous man
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ever since that time.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'At Meribah, too, they angered the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: causing Moses serious trouble.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They made Moses angry,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '106:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: They embittered his spirit.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he spoke foolishly.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israel failed to destroy the nations in the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded them.'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead, they mingled among the pagans
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and adopted their evil customs.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They worshiped their idols,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which led to their downfall.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They even sacrificed their sons
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their daughters to the demons.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shed innocent blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the blood of their sons and daughters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By sacrificing them to the idols of Canaan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they polluted the land with murder.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They defiled themselves by their evil deeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and their love of idols was adultery in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s sight.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Remember me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', when you show favor to your people;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come near and rescue me.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That is why the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger burned against his people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he abhorred his own special possession.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He handed them over to pagan nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they were ruled by those who hated them.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their enemies crushed them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and brought them under their cruel power.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Again and again he rescued them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they chose to rebel against him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they were finally destroyed by their sin.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even so, he pitied them in their distress
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and listened to their cries.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He remembered his covenant with them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and relented because of his unfailing love.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He even caused their captors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to treat them with kindness.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Save us, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Gather us back from among the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so we can thank your holy name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rejoice and praise you.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who lives from everlasting to everlasting!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all the people say, “Amen!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me share in the prosperity of your chosen ones.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let me rejoice in the joy of your people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let me praise you with those who are your heritage.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like our ancestors, we have sinned.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We have done wrong! We have acted wickedly!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our ancestors in Egypt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'were not impressed by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s miraculous deeds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They soon forgot his many acts of kindness to them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Instead, they rebelled against him at the Red Sea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '106:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: at the sea, the sea of reeds.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even so, he saved them—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to defend the honor of his name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to demonstrate his mighty power.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He commanded the Red Sea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '106:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sea of reeds; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 106:22.
      marker-yv: yv-n
    - type: text
      text: ' to dry up.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He led Israel across the sea as if it were a desert.
