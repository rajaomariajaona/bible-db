document_id: MRK.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Discussion about Divorce and Marriage
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Jesus left Capernaum and went down to the region of Judea and into the area east of the Jordan River. Once again crowds gathered around him, and as usual he was teaching them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Some Pharisees came and tried to trap him with this question: “Should a man be allowed to divorce his wife?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jesus answered them with a question: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What did Moses say in the law about divorce?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Well, he permitted it,” they replied. “He said a man can give his wife a written notice of divorce and send her away.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Deut 24:1.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “He wrote this commandment only as a concession to your hard hearts.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But ‘God made them male and female’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gen 1:27; 5:2.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: from the beginning of creation.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘This explains why a man leaves his father and mother and is joined to his wife,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts do not include '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and is joined to his wife.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and the two are united into one.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:7-8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gen 2:24.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Since they are no longer two but one,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: let no one split apart what God has joined together.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Later, when he was alone with his disciples in the house, they brought up the subject again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Whoever divorces his wife and marries someone else commits adultery against her.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if a woman divorces her husband and marries someone else, she commits adultery.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Blesses the Children
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: One day some parents brought their children to Jesus so he could touch and bless them. But the disciples scolded the parents for bothering him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When Jesus saw what was happening, he was angry with his disciples. He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Let the children come to me. Don’t stop them! For the Kingdom of God belongs to those who are like these children.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I tell you the truth, anyone who doesn’t receive the Kingdom of God like a child will never enter it.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then he took the children in his arms and placed his hands on their heads and blessed them.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Rich Man
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: As Jesus was starting out on his way to Jerusalem, a man came running up to him, knelt down, and asked, “Good Teacher, what must I do to inherit eternal life?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Why do you call me good?” '
  - type: text
    text: 'Jesus asked. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Only God is truly good.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But to answer your question, you know the commandments: ‘You must not murder. You must not commit adultery. You must not steal. You must not testify falsely. You must not cheat anyone. Honor your father and mother.’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Exod 20:12-16; Deut 5:16-20.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Teacher,” the man replied, “I’ve obeyed all these commandments since I was young.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Looking at the man, Jesus felt genuine love for him. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“There is still one thing you haven’t done,” '
  - type: text
    text: 'he told him. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go and sell all your possessions and give the money to the poor, and you will have treasure in heaven. Then come, follow me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: At this the man’s face fell, and he went away sad, for he had many possessions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jesus looked around and said to his disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How hard it is for the rich to enter the Kingdom of God!”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'This amazed them. But Jesus said again, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Dear children, it is very hard
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: very hard for those who trust in riches.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to enter the Kingdom of God.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: In fact, it is easier for a camel to go through the eye of a needle than for a rich person to enter the Kingdom of God!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The disciples were astounded. “Then who in the world can be saved?” they asked.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jesus looked at them intently and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Humanly speaking, it is impossible. But not with God. Everything is possible with God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then Peter began to speak up. “We’ve given up everything to follow you,” he said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Yes,” '
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “and I assure you that everyone who has given up house or brothers or sisters or mother or father or children or property, for my sake and for the Good News,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will receive now in return a hundred times as many houses, brothers, sisters, mothers, children, and property—along with persecution. And in the world to come that person will have eternal life.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But many who are the greatest now will be least important then, and those who seem least important now will be the greatest then.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: But many who are first will be last; and the last, first.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Again Predicts His Death
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'They were now on the way up to Jerusalem, and Jesus was walking ahead of them. The disciples were filled with awe, and the people following behind were overwhelmed with fear. Taking the twelve disciples aside, Jesus once more began to describe everything that was about to happen to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Listen,” '
  - type: text
    text: 'he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “we’re going up to Jerusalem, where the Son of Man
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:33a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Son of Man” is a title Jesus used for himself.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will be betrayed to the leading priests and the teachers of religious law. They will sentence him to die and hand him over to the Romans.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:33b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Gentiles.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They will mock him, spit on him, flog him with a whip, and kill him, but after three days he will rise again.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Teaches about Serving Others
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Then James and John, the sons of Zebedee, came over and spoke to him. “Teacher,” they said, “we want you to do us a favor.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“What is your request?” '
  - type: text
    text: he asked.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: They replied, “When you sit on your glorious throne, we want to sit in places of honor next to you, one on your right and the other on your left.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'But Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You don’t know what you are asking! Are you able to drink from the bitter cup of suffering I am about to drink? Are you able to be baptized with the baptism of suffering I must be baptized with?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: “Oh yes,” they replied, “we are able!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then Jesus told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You will indeed drink from my bitter cup and be baptized with my baptism of suffering.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I have no right to say who will sit on my right or my left. God has prepared those places for the ones he has chosen.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'When the ten other disciples heard what James and John had asked, they were indignant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'So Jesus called them together and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You know that the rulers in this world lord it over their people, and officials flaunt their authority over those under them.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But among you it will be different. Whoever wants to be a leader among you must be your servant,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and whoever wants to be first among you must be the slave of everyone else.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For even the Son of Man came not to be served but to serve others and to give his life as a ransom for many.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals Blind Bartimaeus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Then they reached Jericho, and as Jesus and his disciples left town, a large crowd followed him. A blind beggar named Bartimaeus (son of Timaeus) was sitting beside the road. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: When Bartimaeus heard that Jesus of Nazareth was nearby, he began to shout, “Jesus, Son of David, have mercy on me!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: “Be quiet!” many of the people yelled at him.
- type: usfm
  marker: p
  children:
  - type: text
    text: But he only shouted louder, “Son of David, have mercy on me!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'When Jesus heard him, he stopped and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Tell him to come here.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So they called the blind man. “Cheer up,” they said. “Come on, he’s calling you!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Bartimaeus threw aside his coat, jumped up, and came to Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“What do you want me to do for you?” '
  - type: text
    text: Jesus asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: “My Rabbi,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:51 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek uses the Hebrew term '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Rabboni.
    marker-yv: yv-n
  - type: text
    text: ” the blind man said, “I want to see!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'And Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go, for your faith has healed you.”
  - type: text
    text: ' Instantly the man could see, and he followed Jesus down the road.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:52 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on the way.
    marker-yv: yv-n
