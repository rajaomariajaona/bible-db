document_id: MRK.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Discussion about Divorce and Marriage
  - type: text
    content: Then Jesus left Capernaum and went down to the region of Judea and into the area east of the Jordan River. Once again crowds gathered around him, and as usual he was teaching them.
  '10':
  - type: text
    content: 'Later, when he was alone with his disciples in the house, they brought up the subject again. '
  '11':
  - type: text
    content: 'He told them, '
  - type: text
    content: “Whoever divorces his wife and marries someone else commits adultery against her.
  - type: text
    content: ' '
  '12':
  - type: text
    content: And if a woman divorces her husband and marries someone else, she commits adultery.”
  - type: heading
    content: Jesus Blesses the Children
  '13':
  - type: text
    content: One day some parents brought their children to Jesus so he could touch and bless them. But the disciples scolded the parents for bothering him.
  '14':
  - type: text
    content: 'When Jesus saw what was happening, he was angry with his disciples. He said to them, '
  - type: text
    content: “Let the children come to me. Don’t stop them! For the Kingdom of God belongs to those who are like these children.
  - type: text
    content: ' '
  '15':
  - type: text
    content: I tell you the truth, anyone who doesn’t receive the Kingdom of God like a child will never enter it.”
  - type: text
    content: ' '
  '16':
  - type: text
    content: Then he took the children in his arms and placed his hands on their heads and blessed them.
  - type: heading
    content: The Rich Man
  '17':
  - type: text
    content: As Jesus was starting out on his way to Jerusalem, a man came running up to him, knelt down, and asked, “Good Teacher, what must I do to inherit eternal life?”
  '18':
  - type: text
    content: ' '
  - type: text
    content: '“Why do you call me good?” '
  - type: text
    content: 'Jesus asked. '
  - type: text
    content: “Only God is truly good.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'But to answer your question, you know the commandments: ‘You must not murder. You must not commit adultery. You must not steal. You must not testify falsely. You must not cheat anyone. Honor your father and mother.’'
  - type: note
    content: Exod 20:12-16; Deut 5:16-20.
  - type: text
    content: ”
  '2':
  - type: text
    content: 'Some Pharisees came and tried to trap him with this question: “Should a man be allowed to divorce his wife?”'
  '20':
  - type: text
    content: “Teacher,” the man replied, “I’ve obeyed all these commandments since I was young.”
  '21':
  - type: text
    content: 'Looking at the man, Jesus felt genuine love for him. '
  - type: text
    content: '“There is still one thing you haven’t done,” '
  - type: text
    content: 'he told him. '
  - type: text
    content: “Go and sell all your possessions and give the money to the poor, and you will have treasure in heaven. Then come, follow me.”
  '22':
  - type: text
    content: At this the man’s face fell, and he went away sad, for he had many possessions.
  '23':
  - type: text
    content: 'Jesus looked around and said to his disciples, '
  - type: text
    content: “How hard it is for the rich to enter the Kingdom of God!”
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'This amazed them. But Jesus said again, '
  - type: text
    content: “Dear children, it is very hard
  - type: note
    content: Some manuscripts read very hard for those who trust in riches.
  - type: text
    content: ' '
  - type: text
    content: to enter the Kingdom of God.
  - type: text
    content: ' '
  '25':
  - type: text
    content: In fact, it is easier for a camel to go through the eye of a needle than for a rich person to enter the Kingdom of God!”
  '26':
  - type: text
    content: The disciples were astounded. “Then who in the world can be saved?” they asked.
  '27':
  - type: text
    content: 'Jesus looked at them intently and said, '
  - type: text
    content: “Humanly speaking, it is impossible. But not with God. Everything is possible with God.”
  '28':
  - type: text
    content: Then Peter began to speak up. “We’ve given up everything to follow you,” he said.
  '29':
  - type: text
    content: ' '
  - type: text
    content: '“Yes,” '
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “and I assure you that everyone who has given up house or brothers or sisters or mother or father or children or property, for my sake and for the Good News,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Jesus answered them with a question: '
  - type: text
    content: “What did Moses say in the law about divorce?”
  '30':
  - type: text
    content: will receive now in return a hundred times as many houses, brothers, sisters, mothers, children, and property—along with persecution. And in the world to come that person will have eternal life.
  - type: text
    content: ' '
  '31':
  - type: text
    content: But many who are the greatest now will be least important then, and those who seem least important now will be the greatest then.
  - type: note
    content: Greek But many who are first will be last; and the last, first.
  - type: text
    content: ”
  - type: heading
    content: Jesus Again Predicts His Death
  '32':
  - type: text
    content: 'They were now on the way up to Jerusalem, and Jesus was walking ahead of them. The disciples were filled with awe, and the people following behind were overwhelmed with fear. Taking the twelve disciples aside, Jesus once more began to describe everything that was about to happen to him. '
  '33':
  - type: text
    content: '“Listen,” '
  - type: text
    content: 'he said, '
  - type: text
    content: “we’re going up to Jerusalem, where the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: will be betrayed to the leading priests and the teachers of religious law. They will sentence him to die and hand him over to the Romans.
  - type: note
    content: Greek the Gentiles.
  - type: text
    content: ' '
  '34':
  - type: text
    content: They will mock him, spit on him, flog him with a whip, and kill him, but after three days he will rise again.”
  - type: heading
    content: Jesus Teaches about Serving Others
  '35':
  - type: text
    content: Then James and John, the sons of Zebedee, came over and spoke to him. “Teacher,” they said, “we want you to do us a favor.”
  '36':
  - type: text
    content: ' '
  - type: text
    content: '“What is your request?” '
  - type: text
    content: he asked.
  '37':
  - type: text
    content: They replied, “When you sit on your glorious throne, we want to sit in places of honor next to you, one on your right and the other on your left.”
  '38':
  - type: text
    content: 'But Jesus said to them, '
  - type: text
    content: “You don’t know what you are asking! Are you able to drink from the bitter cup of suffering I am about to drink? Are you able to be baptized with the baptism of suffering I must be baptized with?”
  '39':
  - type: text
    content: “Oh yes,” they replied, “we are able!”
  - type: text
    content: 'Then Jesus told them, '
  - type: text
    content: “You will indeed drink from my bitter cup and be baptized with my baptism of suffering.
  - type: text
    content: ' '
  '4':
  - type: text
    content: “Well, he permitted it,” they replied. “He said a man can give his wife a written notice of divorce and send her away.”
  - type: note
    content: See Deut 24:1.
  '40':
  - type: text
    content: But I have no right to say who will sit on my right or my left. God has prepared those places for the ones he has chosen.”
  '41':
  - type: text
    content: 'When the ten other disciples heard what James and John had asked, they were indignant. '
  '42':
  - type: text
    content: 'So Jesus called them together and said, '
  - type: text
    content: “You know that the rulers in this world lord it over their people, and officials flaunt their authority over those under them.
  - type: text
    content: ' '
  '43':
  - type: text
    content: But among you it will be different. Whoever wants to be a leader among you must be your servant,
  - type: text
    content: ' '
  '44':
  - type: text
    content: and whoever wants to be first among you must be the slave of everyone else.
  - type: text
    content: ' '
  '45':
  - type: text
    content: For even the Son of Man came not to be served but to serve others and to give his life as a ransom for many.”
  - type: heading
    content: Jesus Heals Blind Bartimaeus
  '46':
  - type: text
    content: 'Then they reached Jericho, and as Jesus and his disciples left town, a large crowd followed him. A blind beggar named Bartimaeus (son of Timaeus) was sitting beside the road. '
  '47':
  - type: text
    content: When Bartimaeus heard that Jesus of Nazareth was nearby, he began to shout, “Jesus, Son of David, have mercy on me!”
  '48':
  - type: text
    content: “Be quiet!” many of the people yelled at him.
  - type: text
    content: But he only shouted louder, “Son of David, have mercy on me!”
  '49':
  - type: text
    content: 'When Jesus heard him, he stopped and said, '
  - type: text
    content: “Tell him to come here.”
  - type: text
    content: 'So they called the blind man. “Cheer up,” they said. “Come on, he’s calling you!” '
  '5':
  - type: text
    content: 'But Jesus responded, '
  - type: text
    content: “He wrote this commandment only as a concession to your hard hearts.
  - type: text
    content: ' '
  '50':
  - type: text
    content: Bartimaeus threw aside his coat, jumped up, and came to Jesus.
  '51':
  - type: text
    content: ' '
  - type: text
    content: '“What do you want me to do for you?” '
  - type: text
    content: Jesus asked.
  - type: text
    content: “My Rabbi,
  - type: note
    content: Greek uses the Hebrew term Rabboni.
  - type: text
    content: ” the blind man said, “I want to see!”
  '52':
  - type: text
    content: 'And Jesus said to him, '
  - type: text
    content: “Go, for your faith has healed you.”
  - type: text
    content: ' Instantly the man could see, and he followed Jesus down the road.'
  - type: note
    content: Or on the way.
  '6':
  - type: text
    content: But ‘God made them male and female’
  - type: note
    content: Gen 1:27; 5:2.
  - type: text
    content: ' '
  - type: text
    content: from the beginning of creation.
  - type: text
    content: ' '
  '7':
  - type: text
    content: ‘This explains why a man leaves his father and mother and is joined to his wife,
  - type: note
    content: Some manuscripts do not include and is joined to his wife.
  - type: text
    content: ' '
  '8':
  - type: text
    content: and the two are united into one.’
  - type: note
    content: Gen 2:24.
  - type: text
    content: ' '
  - type: text
    content: Since they are no longer two but one,
  - type: text
    content: ' '
  '9':
  - type: text
    content: let no one split apart what God has joined together.”
