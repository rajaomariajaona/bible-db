document_id: 2TI.4,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'I solemnly urge you in the presence of God and Christ Jesus, who will someday judge the living and the dead when he comes to set up his Kingdom: '
  '10':
  - type: text
    content: 'Demas has deserted me because he loves the things of this life and has gone to Thessalonica. Crescens has gone to Galatia, and Titus has gone to Dalmatia. '
  '11':
  - type: text
    content: 'Only Luke is with me. Bring Mark with you when you come, for he will be helpful to me in my ministry. '
  '12':
  - type: text
    content: 'I sent Tychicus to Ephesus. '
  '13':
  - type: text
    content: When you come, be sure to bring the coat I left with Carpus at Troas. Also bring my books, and especially my papers.
  - type: note
    content: Greek especially the parchments.
  '14':
  - type: text
    content: 'Alexander the coppersmith did me much harm, but the Lord will judge him for what he has done. '
  '15':
  - type: text
    content: Be careful of him, for he fought against everything we said.
  '16':
  - type: text
    content: 'The first time I was brought before the judge, no one came with me. Everyone abandoned me. May it not be counted against them. '
  '17':
  - type: text
    content: But the Lord stood with me and gave me strength so that I might preach the Good News in its entirety for all the Gentiles to hear. And he rescued me from certain death.
  - type: note
    content: Greek from the mouth of a lion.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Yes, and the Lord will deliver me from every evil attack and will bring me safely into his heavenly Kingdom. All glory to God forever and ever! Amen.
  - type: heading
    content: Paul’s Final Greetings
  '19':
  - type: text
    content: 'Give my greetings to Priscilla and Aquila and those living in the household of Onesiphorus. '
  '2':
  - type: text
    content: Preach the word of God. Be prepared, whether the time is favorable or not. Patiently correct, rebuke, and encourage your people with good teaching.
  '20':
  - type: text
    content: Erastus stayed at Corinth, and I left Trophimus sick at Miletus.
  '21':
  - type: text
    content: Do your best to get here before winter. Eubulus sends you greetings, and so do Pudens, Linus, Claudia, and all the brothers and sisters.
  - type: note
    content: Greek brothers.
  '22':
  - type: text
    content: May the Lord be with your spirit. And may his grace be with all of you.
  '3':
  - type: text
    content: 'For a time is coming when people will no longer listen to sound and wholesome teaching. They will follow their own desires and will look for teachers who will tell them whatever their itching ears want to hear. '
  '4':
  - type: text
    content: They will reject the truth and chase after myths.
  '5':
  - type: text
    content: But you should keep a clear mind in every situation. Don’t be afraid of suffering for the Lord. Work at telling others the Good News, and fully carry out the ministry God has given you.
  '6':
  - type: text
    content: 'As for me, my life has already been poured out as an offering to God. The time of my death is near. '
  '7':
  - type: text
    content: 'I have fought the good fight, I have finished the race, and I have remained faithful. '
  '8':
  - type: text
    content: And now the prize awaits me—the crown of righteousness, which the Lord, the righteous Judge, will give me on the day of his return. And the prize is not just for me but for all who eagerly look forward to his appearing.
  - type: heading
    content: Paul’s Final Words
  '9':
  - type: text
    content: 'Timothy, please come as soon as you can. '
