document_id: EZK.44,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Prince, Levites, and Priests
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the man brought me back to the east gateway in the outer wall of the Temple area, but it was closed. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And the men of the tribe of Levi who abandoned me when Israel strayed away from me to worship idols
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term (literally '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: round things
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) probably alludes to dung; also in 44:12.
      marker-yv: yv-n
    - type: text
      text: ' must bear the consequences of their unfaithfulness. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'They may still be Temple guards and gatekeepers, and they may slaughter the animals brought for burnt offerings and be present to help the people. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But they encouraged my people to worship idols, causing Israel to fall into deep sin. So I have taken a solemn oath that they must bear the consequences for their sins, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'They may not approach me to minister as priests. They may not touch any of my holy things or the holy offerings, for they must bear the shame of all the detestable sins they have committed. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: They are to serve as the Temple caretakers, taking charge of the maintenance work and performing general duties.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“However, the Levitical priests of the family of Zadok continued to minister faithfully in the Temple when Israel abandoned me for idols. These men will serve as my ministers. They will stand in my presence and offer the fat and blood of the sacrifices, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They alone will enter my sanctuary and approach my table to serve me. They will fulfill all my requirements.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“When they enter the gateway to the inner courtyard, they must wear only linen clothing. They must wear no wool while on duty in the inner courtyard or in the Temple itself. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'They must wear linen turbans and linen undergarments. They must not wear anything that would cause them to perspire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: When they return to the outer courtyard where the people are, they must take off the clothes they wear while ministering to me. They must leave them in the sacred rooms and put on other clothes so they do not endanger anyone by transmitting holiness to them through this clothing.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “This gate must remain closed; it will never again be opened. No one will ever open it and pass through, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, has entered here. Therefore, it must always remain shut. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“They must neither shave their heads nor let their hair grow too long. Instead, they must trim it regularly. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The priests must not drink wine before entering the inner courtyard. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'They may choose their wives only from among the virgins of Israel or the widows of the priests. They may not marry other widows or divorced women. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: They will teach my people the difference between what is holy and what is common, what is ceremonially clean and unclean.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “They will serve as judges to resolve any disagreements among my people. Their decisions must be based on my regulations. And the priests themselves must obey my instructions and decrees at all the sacred festivals, and see to it that the Sabbaths are set apart as holy days.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“A priest must not defile himself by being in the presence of a dead person unless it is his father, mother, child, brother, or unmarried sister. In such cases it is permitted. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Even then, he can return to his Temple duties only after being ceremonially cleansed and then waiting for seven days. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The first day he returns to work and enters the inner courtyard and the sanctuary, he must offer a sin offering for himself, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '“The priests will not have any property or possession of land, for I alone am their special possession. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Their food will come from the gifts and sacrifices brought to the Temple by the people—the grain offerings, the sin offerings, and the guilt offerings. Whatever anyone sets apart
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', either by destroying them or by giving them as an offering.'
      marker-yv: yv-n
    - type: text
      text: ' for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will belong to the priests. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Only the prince himself may sit inside this gateway to feast in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s presence. But he may come and go only through the entry room of the gateway.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'The first of the ripe fruits and all the gifts brought to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will go to the priests. The first batch of dough must also be given to the priests so the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will bless your homes. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: The priests may not eat meat from any bird or animal that dies a natural death or that dies after being attacked by another animal.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then the man brought me through the north gateway to the front of the Temple. I looked and saw that the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' filled the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and I fell face down on the ground.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Son of man, take careful notice. Use your eyes and ears, and listen to everything I tell you about the regulations concerning the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple. Take careful note of the procedures for using the Temple’s entrances and exits. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And give these rebels, the people of Israel, this message from the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': O people of Israel, enough of your detestable sins! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'You have brought uncircumcised foreigners into my sanctuary—people who have no heart for God. In this way, you defiled my Temple even as you offered me my food, the fat and blood of sacrifices. In addition to all your other detestable sins, you have broken my covenant. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Instead of safeguarding my sacred rituals, you have hired foreigners to take charge of my sanctuary.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“So this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: No foreigners, including those who live among the people of Israel, will enter my sanctuary if they have not been circumcised and have not surrendered themselves to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
