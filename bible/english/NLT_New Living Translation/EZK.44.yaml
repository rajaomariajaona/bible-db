document_id: EZK.44,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Prince, Levites, and Priests
  - type: text
    content: 'Then the man brought me back to the east gateway in the outer wall of the Temple area, but it was closed. '
  '10':
  - type: text
    content: And the men of the tribe of Levi who abandoned me when Israel strayed away from me to worship idols
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung; also in 44:12.
  - type: text
    content: ' must bear the consequences of their unfaithfulness. '
  '11':
  - type: text
    content: 'They may still be Temple guards and gatekeepers, and they may slaughter the animals brought for burnt offerings and be present to help the people. '
  '12':
  - type: text
    content: 'But they encouraged my people to worship idols, causing Israel to fall into deep sin. So I have taken a solemn oath that they must bear the consequences for their sins, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'They may not approach me to minister as priests. They may not touch any of my holy things or the holy offerings, for they must bear the shame of all the detestable sins they have committed. '
  '14':
  - type: text
    content: They are to serve as the Temple caretakers, taking charge of the maintenance work and performing general duties.
  '15':
  - type: text
    content: '“However, the Levitical priests of the family of Zadok continued to minister faithfully in the Temple when Israel abandoned me for idols. These men will serve as my ministers. They will stand in my presence and offer the fat and blood of the sacrifices, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: They alone will enter my sanctuary and approach my table to serve me. They will fulfill all my requirements.
  '17':
  - type: text
    content: '“When they enter the gateway to the inner courtyard, they must wear only linen clothing. They must wear no wool while on duty in the inner courtyard or in the Temple itself. '
  '18':
  - type: text
    content: 'They must wear linen turbans and linen undergarments. They must not wear anything that would cause them to perspire. '
  '19':
  - type: text
    content: When they return to the outer courtyard where the people are, they must take off the clothes they wear while ministering to me. They must leave them in the sacred rooms and put on other clothes so they do not endanger anyone by transmitting holiness to them through this clothing.
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “This gate must remain closed; it will never again be opened. No one will ever open it and pass through, for the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, has entered here. Therefore, it must always remain shut. '
  '20':
  - type: text
    content: '“They must neither shave their heads nor let their hair grow too long. Instead, they must trim it regularly. '
  '21':
  - type: text
    content: 'The priests must not drink wine before entering the inner courtyard. '
  '22':
  - type: text
    content: 'They may choose their wives only from among the virgins of Israel or the widows of the priests. They may not marry other widows or divorced women. '
  '23':
  - type: text
    content: They will teach my people the difference between what is holy and what is common, what is ceremonially clean and unclean.
  '24':
  - type: text
    content: “They will serve as judges to resolve any disagreements among my people. Their decisions must be based on my regulations. And the priests themselves must obey my instructions and decrees at all the sacred festivals, and see to it that the Sabbaths are set apart as holy days.
  '25':
  - type: text
    content: '“A priest must not defile himself by being in the presence of a dead person unless it is his father, mother, child, brother, or unmarried sister. In such cases it is permitted. '
  '26':
  - type: text
    content: 'Even then, he can return to his Temple duties only after being ceremonially cleansed and then waiting for seven days. '
  '27':
  - type: text
    content: 'The first day he returns to work and enters the inner courtyard and the sanctuary, he must offer a sin offering for himself, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '28':
  - type: text
    content: '“The priests will not have any property or possession of land, for I alone am their special possession. '
  '29':
  - type: text
    content: Their food will come from the gifts and sacrifices brought to the Temple by the people—the grain offerings, the sin offerings, and the guilt offerings. Whatever anyone sets apart
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering.
  - type: text
    content: ' for the '
  - type: text
    content: Lord
  - type: text
    content: ' will belong to the priests. '
  '3':
  - type: text
    content: 'Only the prince himself may sit inside this gateway to feast in the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence. But he may come and go only through the entry room of the gateway.”
  '30':
  - type: text
    content: 'The first of the ripe fruits and all the gifts brought to the '
  - type: text
    content: Lord
  - type: text
    content: ' will go to the priests. The first batch of dough must also be given to the priests so the '
  - type: text
    content: Lord
  - type: text
    content: ' will bless your homes. '
  '31':
  - type: text
    content: The priests may not eat meat from any bird or animal that dies a natural death or that dies after being attacked by another animal.
  '4':
  - type: text
    content: 'Then the man brought me through the north gateway to the front of the Temple. I looked and saw that the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', and I fell face down on the ground.'
  '5':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Son of man, take careful notice. Use your eyes and ears, and listen to everything I tell you about the regulations concerning the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple. Take careful note of the procedures for using the Temple’s entrances and exits. '
  '6':
  - type: text
    content: 'And give these rebels, the people of Israel, this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ': O people of Israel, enough of your detestable sins! '
  '7':
  - type: text
    content: 'You have brought uncircumcised foreigners into my sanctuary—people who have no heart for God. In this way, you defiled my Temple even as you offered me my food, the fat and blood of sacrifices. In addition to all your other detestable sins, you have broken my covenant. '
  '8':
  - type: text
    content: Instead of safeguarding my sacred rituals, you have hired foreigners to take charge of my sanctuary.
  '9':
  - type: text
    content: '“So this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: No foreigners, including those who live among the people of Israel, will enter my sanctuary if they have not been circumcised and have not surrendered themselves to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
