document_id: EXO.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The First Passover
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'While the Israelites were still in the land of Egypt, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave the following instructions to Moses and Aaron: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“From now on, this month will be the first month of the year for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Announce to the whole community of Israel that on the tenth day of this month each family must choose a lamb or a young goat for a sacrifice, one animal for each household. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'If a family is too small to eat a whole animal, let them share with another family in the neighborhood. Divide the animal according to the size of each family and how much they can eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The animal you select must be a one-year-old male, either a sheep or a goat, with no defects.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Take special care of this chosen animal until the evening of the fourteenth day of this first month. Then the whole assembly of the community of Israel must slaughter their lamb or young goat at twilight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They are to take some of the blood and smear it on the sides and top of the doorframes of the houses where they eat the animal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'That same night they must roast the meat over a fire and eat it along with bitter salad greens and bread made without yeast. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Do not eat any of the meat raw or boiled in water. The whole animal—including the head, legs, and internal organs—must be roasted over a fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Do not leave any of it until the next morning. Burn whatever is not eaten before morning.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“These are your instructions for eating this meal: Be fully dressed,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Bind up your loins.
    marker-yv: yv-n
  - type: text
    text: ' wear your sandals, and carry your walking stick in your hand. Eat the meal with urgency, for this is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Passover. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On that night I will pass through the land of Egypt and strike down every firstborn son and firstborn male animal in the land of Egypt. I will execute judgment against all the gods of Egypt, for I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But the blood on your doorposts will serve as a sign, marking the houses where you are staying. When I see the blood, I will pass over you. This plague of death will not touch you when I strike the land of Egypt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“This is a day to remember. Each year, from generation to generation, you must celebrate it as a special festival to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. This is a law for all time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For seven days the bread you eat must be made without yeast. On the first day of the festival, remove every trace of yeast from your homes. Anyone who eats bread made with yeast during the seven days of the festival will be cut off from the community of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: On the first day of the festival and again on the seventh day, all the people must observe an official day for holy assembly. No work of any kind may be done on these days except in the preparation of food.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Celebrate this Festival of Unleavened Bread, for it will remind you that I brought your forces out of the land of Egypt on this very day. This festival will be a permanent law for you; celebrate this day from generation to generation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The bread you eat must be made without yeast from the evening of the fourteenth day of the first month until the evening of the twenty-first day of that month. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'During those seven days, there must be no trace of yeast in your homes. Anyone who eats anything made with yeast during this week will be cut off from the community of Israel. These regulations apply both to the foreigners living among you and to the native-born Israelites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: During those days you must not eat anything made with yeast. Wherever you live, eat only bread made without yeast.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Moses called all the elders of Israel together and said to them, “Go, pick out a lamb or young goat for each of your families, and slaughter the Passover animal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Drain the blood into a basin. Then take a bundle of hyssop branches and dip it into the blood. Brush the hyssop across the top and sides of the doorframes of your houses. And no one may go out through the door until morning. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will pass through the land to strike down the Egyptians. But when he sees the blood on the top and sides of the doorframe, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will pass over your home. He will not permit his death angel to enter your house and strike you down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“Remember, these instructions are a permanent law that you and your descendants must observe forever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When you enter the land the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has promised to give you, you will continue to observe this ceremony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then your children will ask, ‘What does this ceremony mean?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And you will reply, ‘It is the Passover sacrifice to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for he passed over the houses of the Israelites in Egypt. And though he struck the Egyptians, he spared our families.’” When Moses had finished speaking, all the people bowed down to the ground and worshiped.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So the people of Israel did just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded through Moses and Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And that night at midnight, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' struck down all the firstborn sons in the land of Egypt, from the firstborn son of Pharaoh, who sat on his throne, to the firstborn son of the prisoner in the dungeon. Even the firstborn of their livestock were killed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Pharaoh and all his officials and all the people of Egypt woke up during the night, and loud wailing was heard throughout the land of Egypt. There was not a single house where someone had not died.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel’s Exodus from Egypt
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Pharaoh sent for Moses and Aaron during the night. “Get out!” he ordered. “Leave my people—and take the rest of the Israelites with you! Go and worship the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as you have requested. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Take your flocks and herds, as you said, and be gone. Go, but bless me as you leave.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: All the Egyptians urged the people of Israel to get out of the land as quickly as possible, for they thought, “We will all die!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The Israelites took their bread dough before yeast was added. They wrapped their kneading boards in their cloaks and carried them on their shoulders. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And the people of Israel did as Moses had instructed; they asked the Egyptians for clothing and articles of silver and gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' caused the Egyptians to look favorably on the Israelites, and they gave the Israelites whatever they asked for. So they stripped the Egyptians of their wealth!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: That night the people of Israel left Rameses and started for Succoth. There were about 600,000 men,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fighting men; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: men on foot.
    marker-yv: yv-n
  - type: text
    text: ' plus all the women and children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'A rabble of non-Israelites went with them, along with great flocks and herds of livestock. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: For bread they baked flat cakes from the dough without yeast they had brought from Egypt. It was made without yeast because the people were driven out of Egypt in such a hurry that they had no time to prepare the bread or other food.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: The people of Israel had lived in Egypt
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Samaritan Pentateuch reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in Canaan and Egypt; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in Egypt and Canaan.
    marker-yv: yv-n
  - type: text
    text: ' for 430 years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'In fact, it was on the last day of the 430th year that all the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s forces left the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'On this night the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' kept his promise to bring his people out of the land of Egypt. So this night belongs to him, and it must be commemorated every year by all the Israelites, from generation to generation.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Instructions for the Passover
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses and Aaron, “These are the instructions for the festival of Passover. No outsiders are allowed to eat the Passover meal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'But any slave who has been purchased may eat it if he has been circumcised. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Temporary residents and hired servants may not eat it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Each Passover lamb must be eaten in one house. Do not carry any of its meat outside, and do not break any of its bones. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: The whole community of Israel must celebrate this Passover festival.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: '“If there are foreigners living among you who want to celebrate the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Passover, let all their males be circumcised. Only then may they celebrate the Passover with you like any native-born Israelite. But no uncircumcised male may ever eat the Passover meal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: This instruction applies to everyone, whether a native-born Israelite or a foreigner living among you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'So all the people of Israel followed all the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s commands to Moses and Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'On that very day the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' brought the people of Israel out of the land of Egypt like an army.'
