document_id: EXO.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The First Passover
  - type: text
    content: 'While the Israelites were still in the land of Egypt, the '
  - type: text
    content: Lord
  - type: text
    content: ' gave the following instructions to Moses and Aaron: '
  '10':
  - type: text
    content: Do not leave any of it until the next morning. Burn whatever is not eaten before morning.
  '11':
  - type: text
    content: '“These are your instructions for eating this meal: Be fully dressed,'
  - type: note
    content: Hebrew Bind up your loins.
  - type: text
    content: ' wear your sandals, and carry your walking stick in your hand. Eat the meal with urgency, for this is the '
  - type: text
    content: Lord
  - type: text
    content: '’s Passover. '
  '12':
  - type: text
    content: 'On that night I will pass through the land of Egypt and strike down every firstborn son and firstborn male animal in the land of Egypt. I will execute judgment against all the gods of Egypt, for I am the '
  - type: text
    content: Lord
  - type: text
    content: '! '
  '13':
  - type: text
    content: But the blood on your doorposts will serve as a sign, marking the houses where you are staying. When I see the blood, I will pass over you. This plague of death will not touch you when I strike the land of Egypt.
  '14':
  - type: text
    content: '“This is a day to remember. Each year, from generation to generation, you must celebrate it as a special festival to the '
  - type: text
    content: Lord
  - type: text
    content: '. This is a law for all time. '
  '15':
  - type: text
    content: 'For seven days the bread you eat must be made without yeast. On the first day of the festival, remove every trace of yeast from your homes. Anyone who eats bread made with yeast during the seven days of the festival will be cut off from the community of Israel. '
  '16':
  - type: text
    content: On the first day of the festival and again on the seventh day, all the people must observe an official day for holy assembly. No work of any kind may be done on these days except in the preparation of food.
  '17':
  - type: text
    content: '“Celebrate this Festival of Unleavened Bread, for it will remind you that I brought your forces out of the land of Egypt on this very day. This festival will be a permanent law for you; celebrate this day from generation to generation. '
  '18':
  - type: text
    content: 'The bread you eat must be made without yeast from the evening of the fourteenth day of the first month until the evening of the twenty-first day of that month. '
  '19':
  - type: text
    content: 'During those seven days, there must be no trace of yeast in your homes. Anyone who eats anything made with yeast during this week will be cut off from the community of Israel. These regulations apply both to the foreigners living among you and to the native-born Israelites. '
  '2':
  - type: text
    content: '“From now on, this month will be the first month of the year for you. '
  '20':
  - type: text
    content: During those days you must not eat anything made with yeast. Wherever you live, eat only bread made without yeast.”
  '21':
  - type: text
    content: 'Then Moses called all the elders of Israel together and said to them, “Go, pick out a lamb or young goat for each of your families, and slaughter the Passover animal. '
  '22':
  - type: text
    content: 'Drain the blood into a basin. Then take a bundle of hyssop branches and dip it into the blood. Brush the hyssop across the top and sides of the doorframes of your houses. And no one may go out through the door until morning. '
  '23':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will pass through the land to strike down the Egyptians. But when he sees the blood on the top and sides of the doorframe, the '
  - type: text
    content: Lord
  - type: text
    content: ' will pass over your home. He will not permit his death angel to enter your house and strike you down.'
  '24':
  - type: text
    content: '“Remember, these instructions are a permanent law that you and your descendants must observe forever. '
  '25':
  - type: text
    content: 'When you enter the land the '
  - type: text
    content: Lord
  - type: text
    content: ' has promised to give you, you will continue to observe this ceremony. '
  '26':
  - type: text
    content: 'Then your children will ask, ‘What does this ceremony mean?’ '
  '27':
  - type: text
    content: 'And you will reply, ‘It is the Passover sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he passed over the houses of the Israelites in Egypt. And though he struck the Egyptians, he spared our families.’” When Moses had finished speaking, all the people bowed down to the ground and worshiped.'
  '28':
  - type: text
    content: 'So the people of Israel did just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded through Moses and Aaron. '
  '29':
  - type: text
    content: 'And that night at midnight, the '
  - type: text
    content: Lord
  - type: text
    content: ' struck down all the firstborn sons in the land of Egypt, from the firstborn son of Pharaoh, who sat on his throne, to the firstborn son of the prisoner in the dungeon. Even the firstborn of their livestock were killed. '
  '3':
  - type: text
    content: 'Announce to the whole community of Israel that on the tenth day of this month each family must choose a lamb or a young goat for a sacrifice, one animal for each household. '
  '30':
  - type: text
    content: Pharaoh and all his officials and all the people of Egypt woke up during the night, and loud wailing was heard throughout the land of Egypt. There was not a single house where someone had not died.
  - type: heading
    content: Israel’s Exodus from Egypt
  '31':
  - type: text
    content: 'Pharaoh sent for Moses and Aaron during the night. “Get out!” he ordered. “Leave my people—and take the rest of the Israelites with you! Go and worship the '
  - type: text
    content: Lord
  - type: text
    content: ' as you have requested. '
  '32':
  - type: text
    content: 'Take your flocks and herds, as you said, and be gone. Go, but bless me as you leave.” '
  '33':
  - type: text
    content: All the Egyptians urged the people of Israel to get out of the land as quickly as possible, for they thought, “We will all die!”
  '34':
  - type: text
    content: 'The Israelites took their bread dough before yeast was added. They wrapped their kneading boards in their cloaks and carried them on their shoulders. '
  '35':
  - type: text
    content: 'And the people of Israel did as Moses had instructed; they asked the Egyptians for clothing and articles of silver and gold. '
  '36':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' caused the Egyptians to look favorably on the Israelites, and they gave the Israelites whatever they asked for. So they stripped the Egyptians of their wealth!'
  '37':
  - type: text
    content: That night the people of Israel left Rameses and started for Succoth. There were about 600,000 men,
  - type: note
    content: Or fighting men; Hebrew reads men on foot.
  - type: text
    content: ' plus all the women and children. '
  '38':
  - type: text
    content: 'A rabble of non-Israelites went with them, along with great flocks and herds of livestock. '
  '39':
  - type: text
    content: For bread they baked flat cakes from the dough without yeast they had brought from Egypt. It was made without yeast because the people were driven out of Egypt in such a hurry that they had no time to prepare the bread or other food.
  '4':
  - type: text
    content: 'If a family is too small to eat a whole animal, let them share with another family in the neighborhood. Divide the animal according to the size of each family and how much they can eat. '
  '40':
  - type: text
    content: The people of Israel had lived in Egypt
  - type: note
    content: Samaritan Pentateuch reads in Canaan and Egypt; Greek version reads in Egypt and Canaan.
  - type: text
    content: ' for 430 years. '
  '41':
  - type: text
    content: 'In fact, it was on the last day of the 430th year that all the '
  - type: text
    content: Lord
  - type: text
    content: '’s forces left the land. '
  '42':
  - type: text
    content: 'On this night the '
  - type: text
    content: Lord
  - type: text
    content: ' kept his promise to bring his people out of the land of Egypt. So this night belongs to him, and it must be commemorated every year by all the Israelites, from generation to generation.'
  - type: heading
    content: Instructions for the Passover
  '43':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, “These are the instructions for the festival of Passover. No outsiders are allowed to eat the Passover meal. '
  '44':
  - type: text
    content: 'But any slave who has been purchased may eat it if he has been circumcised. '
  '45':
  - type: text
    content: 'Temporary residents and hired servants may not eat it. '
  '46':
  - type: text
    content: 'Each Passover lamb must be eaten in one house. Do not carry any of its meat outside, and do not break any of its bones. '
  '47':
  - type: text
    content: The whole community of Israel must celebrate this Passover festival.
  '48':
  - type: text
    content: '“If there are foreigners living among you who want to celebrate the '
  - type: text
    content: Lord
  - type: text
    content: '’s Passover, let all their males be circumcised. Only then may they celebrate the Passover with you like any native-born Israelite. But no uncircumcised male may ever eat the Passover meal. '
  '49':
  - type: text
    content: This instruction applies to everyone, whether a native-born Israelite or a foreigner living among you.”
  '5':
  - type: text
    content: The animal you select must be a one-year-old male, either a sheep or a goat, with no defects.
  '50':
  - type: text
    content: 'So all the people of Israel followed all the '
  - type: text
    content: Lord
  - type: text
    content: '’s commands to Moses and Aaron. '
  '51':
  - type: text
    content: 'On that very day the '
  - type: text
    content: Lord
  - type: text
    content: ' brought the people of Israel out of the land of Egypt like an army.'
  '6':
  - type: text
    content: '“Take special care of this chosen animal until the evening of the fourteenth day of this first month. Then the whole assembly of the community of Israel must slaughter their lamb or young goat at twilight. '
  '7':
  - type: text
    content: 'They are to take some of the blood and smear it on the sides and top of the doorframes of the houses where they eat the animal. '
  '8':
  - type: text
    content: 'That same night they must roast the meat over a fire and eat it along with bitter salad greens and bread made without yeast. '
  '9':
  - type: text
    content: 'Do not eat any of the meat raw or boiled in water. The whole animal—including the head, legs, and internal organs—must be roasted over a fire. '
