document_id: DEU.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Remember and Obey
  - type: text
    content: '“Be careful to obey all the commands I am giving you today. Then you will live and multiply, and you will enter and occupy the land the '
  - type: text
    content: Lord
  - type: text
    content: ' swore to give your ancestors. '
  '10':
  - type: text
    content: 'When you have eaten your fill, be sure to praise the '
  - type: text
    content: Lord
  - type: text
    content: ' your God for the good land he has given you.'
  '11':
  - type: text
    content: '“But that is the time to be careful! Beware that in your plenty you do not forget the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and disobey his commands, regulations, and decrees that I am giving you today. '
  '12':
  - type: text
    content: 'For when you have become full and prosperous and have built fine homes to live in, '
  '13':
  - type: text
    content: 'and when your flocks and herds have become very large and your silver and gold have multiplied along with everything else, be careful! '
  '14':
  - type: text
    content: 'Do not become proud at that time and forget the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who rescued you from slavery in the land of Egypt. '
  '15':
  - type: text
    content: 'Do not forget that he led you through the great and terrifying wilderness with its poisonous snakes and scorpions, where it was so hot and dry. He gave you water from the rock! '
  '16':
  - type: text
    content: 'He fed you with manna in the wilderness, a food unknown to your ancestors. He did this to humble you and test you for your own good. '
  '17':
  - type: text
    content: 'He did all this so you would never say to yourself, ‘I have achieved this wealth with my own strength and energy.’ '
  '18':
  - type: text
    content: 'Remember the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. He is the one who gives you power to be successful, in order to fulfill the covenant he confirmed to your ancestors with an oath.'
  '19':
  - type: text
    content: '“But I assure you of this: If you ever forget the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and follow other gods, worshiping and bowing down to them, you will certainly be destroyed. '
  '2':
  - type: text
    content: 'Remember how the '
  - type: text
    content: Lord
  - type: text
    content: ' your God led you through the wilderness for these forty years, humbling you and testing you to prove your character, and to find out whether or not you would obey his commands. '
  '20':
  - type: text
    content: 'Just as the '
  - type: text
    content: Lord
  - type: text
    content: ' has destroyed other nations in your path, you also will be destroyed if you refuse to obey the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '3':
  - type: text
    content: 'Yes, he humbled you by letting you go hungry and then feeding you with manna, a food previously unknown to you and your ancestors. He did it to teach you that people do not live by bread alone; rather, we live by every word that comes from the mouth of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'For all these forty years your clothes didn’t wear out, and your feet didn’t blister or swell. '
  '5':
  - type: text
    content: 'Think about it: Just as a parent disciplines a child, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God disciplines you for your own good.'
  '6':
  - type: text
    content: '“So obey the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God by walking in his ways and fearing him. '
  '7':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is bringing you into a good land of flowing streams and pools of water, with fountains and springs that gush out in the valleys and hills. '
  '8':
  - type: text
    content: 'It is a land of wheat and barley; of grapevines, fig trees, and pomegranates; of olive oil and honey. '
  '9':
  - type: text
    content: 'It is a land where food is plentiful and nothing is lacking. It is a land where iron is as common as stone, and copper is abundant in the hills. '
