document_id: LEV.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Appointed Festivals
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Give the following instructions to the people of Israel. These are the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s appointed festivals, which you are to proclaim as official days for holy assembly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“You have six days each week for your ordinary work, but the seventh day is a Sabbath day of complete rest, an official day for holy assembly. It is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Sabbath day, and it must be observed wherever you live.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“In addition to the Sabbath, these are the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s appointed festivals, the official days for holy assembly that are to be celebrated at their proper times each year.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Passover and the Festival of Unleavened Bread
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Passover begins at sundown on the fourteenth day of the first month.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This day in the ancient Hebrew lunar calendar occurred in late March, April, or early May.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'On the next day, the fifteenth day of the month, you must begin celebrating the Festival of Unleavened Bread. This festival to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' continues for seven days, and during that time the bread you eat must be made without yeast. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'On the first day of the festival, all the people must stop their ordinary work and observe an official day for holy assembly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For seven days you must present special gifts to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . On the seventh day the people must again stop all their ordinary work to observe an official day for holy assembly.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Celebration of First Harvest
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Give the following instructions to the people of Israel. When you enter the land I am giving you and you harvest its first crops, bring the priest a bundle of grain from the first cutting of your grain harvest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'On the day after the Sabbath, the priest will lift it up before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' so it may be accepted on your behalf. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On that same day you must sacrifice a one-year-old male lamb with no defects as a burnt offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: With it you must present a grain offering consisting of four quarts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:13a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '2/10 of an ephah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[4.4 liters]; also in 23:17.'
    marker-yv: yv-n
  - type: text
    text: ' of choice flour moistened with olive oil. It will be a special gift, a pleasing aroma to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . You must also offer one quart
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:13b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1/4 of a hin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[1 liter].'
    marker-yv: yv-n
  - type: text
    text: ' of wine as a liquid offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Do not eat any bread or roasted grain or fresh kernels on that day until you bring this offering to your God. This is a permanent law for you, and it must be observed from generation to generation wherever you live.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Festival of Harvest
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“From the day after the Sabbath—the day you bring the bundle of grain to be lifted up as a special offering—count off seven full weeks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Keep counting until the day after the seventh Sabbath, fifty days later. Then present an offering of new grain to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'From wherever you live, bring two loaves of bread to be lifted up before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as a special offering. Make these loaves from four quarts of choice flour, and bake them with yeast. They will be an offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' from the first of your crops. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Along with the bread, present seven one-year-old male lambs with no defects, one young bull, and two rams as burnt offerings to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. These burnt offerings, together with the grain offerings and liquid offerings, will be a special gift, a pleasing aroma to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then you must offer one male goat as a sin offering and two one-year-old male lambs as a peace offering.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“The priest will lift up the two lambs as a special offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', together with the loaves representing the first of your crops. These offerings, which are holy to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', belong to the priests. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: That same day will be proclaimed an official day for holy assembly, a day on which you do no ordinary work. This is a permanent law for you, and it must be observed from generation to generation wherever you live.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This celebration, called the Festival of Harvest or the Festival of Weeks, was later called the Festival of Pentecost (see Acts 2:1). It is celebrated today as Shavuot (or Shabuoth).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“When you harvest the crops of your land, do not harvest the grain along the edges of your fields, and do not pick up what the harvesters drop. Leave it for the poor and the foreigners living among you. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Festival of Trumpets
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Give the following instructions to the people of Israel. On the first day of the appointed month in early autumn,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the first day of the seventh month. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This day in the ancient Hebrew lunar calendar occurred in September or October. This festival is celebrated today as Rosh Hashanah, the Jewish new year.
    marker-yv: yv-n
  - type: text
    text: ' you are to observe a day of complete rest. It will be an official day for holy assembly, a day commemorated with loud blasts of a trumpet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'You must do no ordinary work on that day. Instead, you are to present special gifts to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Day of Atonement
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “Be careful to celebrate the Day of Atonement on the tenth day of that same month—nine days after the Festival of Trumpets.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:27a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on the tenth day of the seventh month; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see 23:24 and the note there. This day in the ancient Hebrew lunar calendar occurred in September or October. It is celebrated today as Yom Kippur.
    marker-yv: yv-n
  - type: text
    text: ' You must observe it as an official day for holy assembly, a day to deny yourselves'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:27b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'to fast; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: similarly in 23:29, 32.
    marker-yv: yv-n
  - type: text
    text: ' and present special gifts to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Do no work during that entire day because it is the Day of Atonement, when offerings of purification are made for you, making you right with
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: when atonement is made for you before.
    marker-yv: yv-n
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'All who do not deny themselves that day will be cut off from God’s people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And I will destroy anyone among you who does any work on that day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'You must not do any work at all! This is a permanent law for you, and it must be observed from generation to generation wherever you live. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: This will be a Sabbath day of complete rest for you, and on that day you must deny yourselves. This day of rest will begin at sundown on the ninth day of the month and extend until sundown on the tenth day.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Festival of Shelters
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “Give the following instructions to the people of Israel. Begin celebrating the Festival of Shelters
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:34a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Festival of Booths, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Festival of Tabernacles. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was earlier called the Festival of the Final Harvest or Festival of Ingathering (see Exod 23:16b). It is celebrated today as Sukkot (or Succoth).
    marker-yv: yv-n
  - type: text
    text: ' on the fifteenth day of the appointed month—five days after the Day of Atonement.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:34b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on the fifteenth day of the seventh month; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see 23:27a and the note there.
    marker-yv: yv-n
  - type: text
    text: ' This festival to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will last for seven days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'On the first day of the festival you must proclaim an official day for holy assembly, when you do no ordinary work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'For seven days you must present special gifts to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. The eighth day is another holy day on which you present your special gifts to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . This will be a solemn occasion, and no ordinary work may be done that day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '(“These are the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s appointed festivals. Celebrate them each year as official days for holy assembly by presenting special gifts to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '—burnt offerings, grain offerings, sacrifices, and liquid offerings—each on its proper day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'These festivals must be observed in addition to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s regular Sabbath days, and the offerings are in addition to your personal gifts, the offerings you give to fulfill your vows, and the voluntary offerings you present to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '“Remember that this seven-day festival to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: —the Festival of Shelters—begins on the fifteenth day of the appointed month,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on the fifteenth day of the seventh month.
    marker-yv: yv-n
  - type: text
    text: ' after you have harvested all the produce of the land. The first day and the eighth day of the festival will be days of complete rest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: On the first day gather branches from magnificent trees
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: gather fruit from majestic trees.
    marker-yv: yv-n
  - type: text
    text: '—palm fronds, boughs from leafy trees, and willows that grow by the streams. Then celebrate with joy before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God for seven days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'You must observe this festival to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for seven days every year. This is a permanent law for you, and it must be observed in the appointed month'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the seventh month.
    marker-yv: yv-n
  - type: text
    text: ' from generation to generation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'For seven days you must live outside in little shelters. All native-born Israelites must live in shelters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
