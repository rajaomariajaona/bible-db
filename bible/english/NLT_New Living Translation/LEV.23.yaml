document_id: LEV.23,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Appointed Festivals
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: '“Give the following instructions to the people of Israel. When you enter the land I am giving you and you harvest its first crops, bring the priest a bundle of grain from the first cutting of your grain harvest. '
  '11':
  - type: text
    content: 'On the day after the Sabbath, the priest will lift it up before the '
  - type: text
    content: Lord
  - type: text
    content: ' so it may be accepted on your behalf. '
  '12':
  - type: text
    content: 'On that same day you must sacrifice a one-year-old male lamb with no defects as a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: With it you must present a grain offering consisting of four quarts
  - type: note
    content: Hebrew 2/10 of an ephah [4.4 liters]; also in 23:17.
  - type: text
    content: ' of choice flour moistened with olive oil. It will be a special gift, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: . You must also offer one quart
  - type: note
    content: Hebrew 1/4 of a hin [1 liter].
  - type: text
    content: ' of wine as a liquid offering. '
  '14':
  - type: text
    content: Do not eat any bread or roasted grain or fresh kernels on that day until you bring this offering to your God. This is a permanent law for you, and it must be observed from generation to generation wherever you live.
  - type: heading
    content: The Festival of Harvest
  '15':
  - type: text
    content: '“From the day after the Sabbath—the day you bring the bundle of grain to be lifted up as a special offering—count off seven full weeks. '
  '16':
  - type: text
    content: 'Keep counting until the day after the seventh Sabbath, fifty days later. Then present an offering of new grain to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'From wherever you live, bring two loaves of bread to be lifted up before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a special offering. Make these loaves from four quarts of choice flour, and bake them with yeast. They will be an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' from the first of your crops. '
  '18':
  - type: text
    content: 'Along with the bread, present seven one-year-old male lambs with no defects, one young bull, and two rams as burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '. These burnt offerings, together with the grain offerings and liquid offerings, will be a special gift, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: Then you must offer one male goat as a sin offering and two one-year-old male lambs as a peace offering.
  '2':
  - type: text
    content: '“Give the following instructions to the people of Israel. These are the '
  - type: text
    content: Lord
  - type: text
    content: ’s appointed festivals, which you are to proclaim as official days for holy assembly.
  '20':
  - type: text
    content: '“The priest will lift up the two lambs as a special offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', together with the loaves representing the first of your crops. These offerings, which are holy to the '
  - type: text
    content: Lord
  - type: text
    content: ', belong to the priests. '
  '21':
  - type: text
    content: That same day will be proclaimed an official day for holy assembly, a day on which you do no ordinary work. This is a permanent law for you, and it must be observed from generation to generation wherever you live.
  - type: note
    content: This celebration, called the Festival of Harvest or the Festival of Weeks, was later called the Festival of Pentecost (see Acts 2:1). It is celebrated today as Shavuot (or Shabuoth).
  '22':
  - type: text
    content: '“When you harvest the crops of your land, do not harvest the grain along the edges of your fields, and do not pick up what the harvesters drop. Leave it for the poor and the foreigners living among you. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.”'
  - type: heading
    content: The Festival of Trumpets
  '23':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '24':
  - type: text
    content: “Give the following instructions to the people of Israel. On the first day of the appointed month in early autumn,
  - type: note
    content: Hebrew On the first day of the seventh month. This day in the ancient Hebrew lunar calendar occurred in September or October. This festival is celebrated today as Rosh Hashanah, the Jewish new year.
  - type: text
    content: ' you are to observe a day of complete rest. It will be an official day for holy assembly, a day commemorated with loud blasts of a trumpet. '
  '25':
  - type: text
    content: 'You must do no ordinary work on that day. Instead, you are to present special gifts to the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: The Day of Atonement
  '26':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '27':
  - type: text
    content: “Be careful to celebrate the Day of Atonement on the tenth day of that same month—nine days after the Festival of Trumpets.
  - type: note
    content: Hebrew on the tenth day of the seventh month; see 23:24 and the note there. This day in the ancient Hebrew lunar calendar occurred in September or October. It is celebrated today as Yom Kippur.
  - type: text
    content: ' You must observe it as an official day for holy assembly, a day to deny yourselves'
  - type: note
    content: Or to fast; similarly in 23:29, 32.
  - type: text
    content: ' and present special gifts to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: Do no work during that entire day because it is the Day of Atonement, when offerings of purification are made for you, making you right with
  - type: note
    content: Or when atonement is made for you before.
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '29':
  - type: text
    content: 'All who do not deny themselves that day will be cut off from God’s people. '
  '3':
  - type: text
    content: '“You have six days each week for your ordinary work, but the seventh day is a Sabbath day of complete rest, an official day for holy assembly. It is the '
  - type: text
    content: Lord
  - type: text
    content: ’s Sabbath day, and it must be observed wherever you live.
  '30':
  - type: text
    content: 'And I will destroy anyone among you who does any work on that day. '
  '31':
  - type: text
    content: 'You must not do any work at all! This is a permanent law for you, and it must be observed from generation to generation wherever you live. '
  '32':
  - type: text
    content: This will be a Sabbath day of complete rest for you, and on that day you must deny yourselves. This day of rest will begin at sundown on the ninth day of the month and extend until sundown on the tenth day.”
  - type: heading
    content: The Festival of Shelters
  '33':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '34':
  - type: text
    content: “Give the following instructions to the people of Israel. Begin celebrating the Festival of Shelters
  - type: note
    content: Or Festival of Booths, or Festival of Tabernacles. This was earlier called the Festival of the Final Harvest or Festival of Ingathering (see Exod 23:16b). It is celebrated today as Sukkot (or Succoth).
  - type: text
    content: ' on the fifteenth day of the appointed month—five days after the Day of Atonement.'
  - type: note
    content: Hebrew on the fifteenth day of the seventh month; see 23:27a and the note there.
  - type: text
    content: ' This festival to the '
  - type: text
    content: Lord
  - type: text
    content: ' will last for seven days. '
  '35':
  - type: text
    content: 'On the first day of the festival you must proclaim an official day for holy assembly, when you do no ordinary work. '
  '36':
  - type: text
    content: 'For seven days you must present special gifts to the '
  - type: text
    content: Lord
  - type: text
    content: '. The eighth day is another holy day on which you present your special gifts to the '
  - type: text
    content: Lord
  - type: text
    content: . This will be a solemn occasion, and no ordinary work may be done that day.
  '37':
  - type: text
    content: '(“These are the '
  - type: text
    content: Lord
  - type: text
    content: '’s appointed festivals. Celebrate them each year as official days for holy assembly by presenting special gifts to the '
  - type: text
    content: Lord
  - type: text
    content: '—burnt offerings, grain offerings, sacrifices, and liquid offerings—each on its proper day. '
  '38':
  - type: text
    content: 'These festivals must be observed in addition to the '
  - type: text
    content: Lord
  - type: text
    content: '’s regular Sabbath days, and the offerings are in addition to your personal gifts, the offerings you give to fulfill your vows, and the voluntary offerings you present to the '
  - type: text
    content: Lord
  - type: text
    content: .)
  '39':
  - type: text
    content: '“Remember that this seven-day festival to the '
  - type: text
    content: Lord
  - type: text
    content: —the Festival of Shelters—begins on the fifteenth day of the appointed month,
  - type: note
    content: Hebrew on the fifteenth day of the seventh month.
  - type: text
    content: ' after you have harvested all the produce of the land. The first day and the eighth day of the festival will be days of complete rest. '
  '4':
  - type: text
    content: '“In addition to the Sabbath, these are the '
  - type: text
    content: Lord
  - type: text
    content: ’s appointed festivals, the official days for holy assembly that are to be celebrated at their proper times each year.
  - type: heading
    content: Passover and the Festival of Unleavened Bread
  '40':
  - type: text
    content: On the first day gather branches from magnificent trees
  - type: note
    content: Or gather fruit from majestic trees.
  - type: text
    content: '—palm fronds, boughs from leafy trees, and willows that grow by the streams. Then celebrate with joy before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God for seven days. '
  '41':
  - type: text
    content: 'You must observe this festival to the '
  - type: text
    content: Lord
  - type: text
    content: ' for seven days every year. This is a permanent law for you, and it must be observed in the appointed month'
  - type: note
    content: Hebrew the seventh month.
  - type: text
    content: ' from generation to generation. '
  '42':
  - type: text
    content: 'For seven days you must live outside in little shelters. All native-born Israelites must live in shelters. '
  '43':
  - type: text
    content: 'This will remind each new generation of Israelites that I made their ancestors live in shelters when I rescued them from the land of Egypt. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.”'
  '44':
  - type: text
    content: 'So Moses gave the Israelites these instructions regarding the annual festivals of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ’s Passover begins at sundown on the fourteenth day of the first month.
  - type: note
    content: This day in the ancient Hebrew lunar calendar occurred in late March, April, or early May.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'On the next day, the fifteenth day of the month, you must begin celebrating the Festival of Unleavened Bread. This festival to the '
  - type: text
    content: Lord
  - type: text
    content: ' continues for seven days, and during that time the bread you eat must be made without yeast. '
  '7':
  - type: text
    content: 'On the first day of the festival, all the people must stop their ordinary work and observe an official day for holy assembly. '
  '8':
  - type: text
    content: 'For seven days you must present special gifts to the '
  - type: text
    content: Lord
  - type: text
    content: . On the seventh day the people must again stop all their ordinary work to observe an official day for holy assembly.”
  - type: heading
    content: Celebration of First Harvest
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
