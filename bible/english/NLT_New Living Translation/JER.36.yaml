document_id: JER.36,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Baruch Reads the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Messages
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: During the fourth year that Jehoiakim son of Josiah was king in Judah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The fourth year of Jehoiakim’s reign was 605 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
      marker-yv: yv-n
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave this message to Jeremiah: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Baruch read Jeremiah’s words on the scroll to all the people. He stood in front of the Temple room of Gemariah, son of Shaphan the secretary. This room was just off the upper courtyard of the Temple, near the New Gate entrance.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'When Micaiah son of Gemariah and grandson of Shaphan heard the messages from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'he went down to the secretary’s room in the palace where the administrative officials were meeting. Elishama the secretary was there, along with Delaiah son of Shemaiah, Elnathan son of Acbor, Gemariah son of Shaphan, Zedekiah son of Hananiah, and all the other officials. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When Micaiah told them about the messages Baruch was reading to the people, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'the officials sent Jehudi son of Nethaniah, grandson of Shelemiah and great-grandson of Cushi, to ask Baruch to come and read the messages to them, too. So Baruch took the scroll and went to them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “Sit down and read the scroll to us,” the officials said, and Baruch did as they requested.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'When they heard all the messages, they looked at one another in alarm. “We must tell the king what we have heard,” they said to Baruch. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “But first, tell us how you got these messages. Did they come directly from Jeremiah?”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: So Baruch explained, “Jeremiah dictated them, and I wrote them down in ink, word for word, on this scroll.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“You and Jeremiah should both hide,” the officials told Baruch. “Don’t tell anyone where you are!” '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Get a scroll, and write down all my messages against Israel, Judah, and the other nations. Begin with the first message back in the days of Josiah, and write down every message, right up to the present time. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Then the officials left the scroll for safekeeping in the room of Elishama the secretary and went to tell the king what had happened.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: King Jehoiakim Burns the Scroll
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The king sent Jehudi to get the scroll. Jehudi brought it from Elishama’s room and read it to the king as all his officials stood by. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'It was late autumn, and the king was in a winterized part of the palace, sitting in front of a fire to keep warm. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Each time Jehudi finished reading three or four columns, the king took a knife and cut off that section of the scroll. He then threw it into the fire, section by section, until the whole scroll was burned up. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Neither the king nor his attendants showed any signs of fear or repentance at what they heard. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Even when Elnathan, Delaiah, and Gemariah begged the king not to burn the scroll, he wouldn’t listen.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Then the king commanded his son Jerahmeel, Seraiah son of Azriel, and Shelemiah son of Abdeel to arrest Baruch and Jeremiah. But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had hidden them.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah Rewrites the Scroll
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'After the king had burned the scroll on which Baruch had written Jeremiah’s words, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave Jeremiah another message. He said, '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '“Get another scroll, and write everything again just as you did on the scroll King Jehoiakim burned. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then say to the king, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: You burned the scroll because it said the king of Babylon would destroy this land and empty it of people and animals. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Perhaps the people of Judah will repent when they hear again all the terrible things I have planned for them. Then I will be able to forgive their sins and wrongdoings.”
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Now this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says about King Jehoiakim of Judah: He will have no heirs to sit on the throne of David. His dead body will be thrown out to lie unburied—exposed to the heat of the day and the frost of the night. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: I will punish him and his family and his attendants for their sins. I will pour out on them and on all the people of Jerusalem and Judah all the disasters I promised, for they would not listen to my warnings.’”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: So Jeremiah took another scroll and dictated again to his secretary, Baruch. He wrote everything that had been on the scroll King Jehoiakim had burned in the fire. Only this time he added much more!
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So Jeremiah sent for Baruch son of Neriah, and as Jeremiah dictated all the prophecies that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given him, Baruch wrote them on a scroll. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then Jeremiah said to Baruch, “I am a prisoner here and unable to go to the Temple. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So you go to the Temple on the next day of fasting, and read the messages from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that I have had you write on this scroll. Read them so the people who are there from all over Judah will hear them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Perhaps even yet they will turn from their evil ways and ask the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s forgiveness before it is too late. For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has threatened them with his terrible anger.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Baruch did as Jeremiah told him and read these messages from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to the people at the Temple. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He did this on a day of sacred fasting held in late autumn,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in the ninth month, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'of the ancient Hebrew lunar calendar (also in 36:22). The ninth month in the fifth year of Jehoiakim’s reign occurred within the months of November and December 604 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ' Also see note on 1:3.'
      marker-yv: yv-n
    - type: text
      text: ' during the fifth year of the reign of Jehoiakim son of Josiah. People from all over Judah had come to Jerusalem to attend the services at the Temple on that day. '
