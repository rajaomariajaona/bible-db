document_id: PSA.135,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'Praise the name of the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'Praise him, you who serve the '
  - type: text
    content: Lord
  - type: text
    content: ','
  '10':
  - type: text
    content: He struck down great nations
  - type: text
    content: and slaughtered mighty kings—
  '11':
  - type: text
    content: Sihon king of the Amorites,
  - type: text
    content: Og king of Bashan,
  - type: text
    content: and all the kings of Canaan.
  '12':
  - type: text
    content: He gave their land as an inheritance,
  - type: text
    content: a special possession to his people Israel.
  '13':
  - type: text
    content: 'Your name, O '
  - type: text
    content: Lord
  - type: text
    content: ', endures forever;'
  - type: text
    content: 'your fame, O '
  - type: text
    content: Lord
  - type: text
    content: ', is known to every generation.'
  '14':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will give justice to his people'
  - type: text
    content: and have compassion on his servants.
  '15':
  - type: text
    content: The idols of the nations are merely things of silver and gold,
  - type: text
    content: shaped by human hands.
  '16':
  - type: text
    content: They have mouths but cannot speak,
  - type: text
    content: and eyes but cannot see.
  '17':
  - type: text
    content: They have ears but cannot hear,
  - type: text
    content: and mouths but cannot breathe.
  '18':
  - type: text
    content: And those who make idols are just like them,
  - type: text
    content: as are all who trust in them.
  '19':
  - type: text
    content: 'O Israel, praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'O priests—descendants of Aaron—praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '2':
  - type: text
    content: 'you who serve in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: in the courts of the house of our God.
  '20':
  - type: text
    content: 'O Levites, praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'All you who fear the '
  - type: text
    content: Lord
  - type: text
    content: ', praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' be praised from Zion,'
  - type: text
    content: for he lives here in Jerusalem.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '3':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', for the '
  - type: text
    content: Lord
  - type: text
    content: ' is good;'
  - type: text
    content: celebrate his lovely name with music.
  '4':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen Jacob for himself,'
  - type: text
    content: Israel for his own special treasure.
  '5':
  - type: text
    content: 'I know the greatness of the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: that our Lord is greater than any other god.
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' does whatever pleases him'
  - type: text
    content: throughout all heaven and earth,
  - type: text
    content: and on the seas and in their depths.
  '7':
  - type: text
    content: He causes the clouds to rise over the whole earth.
  - type: text
    content: He sends the lightning with the rain
  - type: text
    content: and releases the wind from his storehouses.
  '8':
  - type: text
    content: He destroyed the firstborn in each Egyptian home,
  - type: text
    content: both people and animals.
  '9':
  - type: text
    content: He performed miraculous signs and wonders in Egypt
  - type: text
    content: against Pharaoh and all his people.
