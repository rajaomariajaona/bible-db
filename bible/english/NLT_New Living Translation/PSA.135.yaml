    children:
    - type: text
      text: '1'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Praise the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Praise him, you who serve the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'you who serve in the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the courts of the house of our God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is good;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: celebrate his lovely name with music.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has chosen Jacob for himself,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel for his own special treasure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I know the greatness of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: that our Lord is greater than any other god.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' does whatever pleases him'
- type: usfm
  marker: q2
  children:
  - type: text
    text: throughout all heaven and earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and on the seas and in their depths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He causes the clouds to rise over the whole earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He sends the lightning with the rain
- type: usfm
  marker: q2
  children:
  - type: text
    text: and releases the wind from his storehouses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He destroyed the firstborn in each Egyptian home,
- type: usfm
  marker: q2
  children:
  - type: text
    text: both people and animals.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He performed miraculous signs and wonders in Egypt
- type: usfm
  marker: q2
  children:
  - type: text
    text: against Pharaoh and all his people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He struck down great nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: and slaughtered mighty kings—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sihon king of the Amorites,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Og king of Bashan,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the kings of Canaan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He gave their land as an inheritance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a special possession to his people Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Your name, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', endures forever;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'your fame, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', is known to every generation.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will give justice to his people'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have compassion on his servants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The idols of the nations are merely things of silver and gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shaped by human hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: They have mouths but cannot speak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and eyes but cannot see.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They have ears but cannot hear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and mouths but cannot breathe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And those who make idols are just like them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as are all who trust in them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'O Israel, praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'O priests—descendants of Aaron—praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'O Levites, praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All you who fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' be praised from Zion,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he lives here in Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
