  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mighty King, lover of justice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have established fairness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have acted with justice
- type: usfm
  marker: q2
  children:
  - type: text
    text: and righteousness throughout Israel.
  - type: usfm
