document_id: PSA.99,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is king!'
  - type: text
    content: Let the nations tremble!
  - type: text
    content: He sits on his throne between the cherubim.
  - type: text
    content: Let the whole earth quake!
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' sits in majesty in Jerusalem,'
  - type: note
    content: Hebrew Zion.
  - type: text
    content: exalted above all the nations.
  '3':
  - type: text
    content: Let them praise your great and awesome name.
  - type: text
    content: Your name is holy!
  '4':
  - type: text
    content: Mighty King, lover of justice,
  - type: text
    content: you have established fairness.
  - type: text
    content: You have acted with justice
  - type: text
    content: and righteousness throughout Israel.
  - type: note
    content: Hebrew Jacob. See note on 44:4.
  '5':
  - type: text
    content: 'Exalt the '
  - type: text
    content: Lord
  - type: text
    content: ' our God!'
  - type: text
    content: Bow low before his feet, for he is holy!
  '6':
  - type: text
    content: Moses and Aaron were among his priests;
  - type: text
    content: Samuel also called on his name.
  - type: text
    content: 'They cried to the '
  - type: text
    content: Lord
  - type: text
    content: ' for help,'
  - type: text
    content: and he answered them.
  '7':
  - type: text
    content: He spoke to Israel from the pillar of cloud,
  - type: text
    content: and they followed the laws and decrees he gave them.
  '8':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' our God, you answered them.'
  - type: text
    content: You were a forgiving God to them,
  - type: text
    content: but you punished them when they went wrong.
  '9':
  - type: text
    content: 'Exalt the '
  - type: text
    content: Lord
  - type: text
    content: ' our God,'
  - type: text
    content: and worship at his holy mountain in Jerusalem,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' our God is holy!'
