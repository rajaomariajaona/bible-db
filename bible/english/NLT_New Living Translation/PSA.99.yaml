  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God, you answered them.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You were a forgiving God to them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you punished them when they went wrong.
- type: usfm
  marker: q1
  children:
  - type: usfm
