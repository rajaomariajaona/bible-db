document_id: PSA.99,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is king!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the nations tremble!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sits on his throne between the cherubim.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the whole earth quake!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sits in majesty in Jerusalem,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '99:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zion.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: exalted above all the nations.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Let them praise your great and awesome name.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your name is holy!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mighty King, lover of justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have established fairness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have acted with justice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and righteousness throughout Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '99:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jacob. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 44:4.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Exalt the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Bow low before his feet, for he is holy!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Moses and Aaron were among his priests;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Samuel also called on his name.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They cried to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for help,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he answered them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: He spoke to Israel from the pillar of cloud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they followed the laws and decrees he gave them.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, you answered them.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You were a forgiving God to them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you punished them when they went wrong.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Exalt the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and worship at his holy mountain in Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God is holy!'
