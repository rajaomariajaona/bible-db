  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moses and Aaron were among his priests;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Samuel also called on his name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They cried to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for help,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he answered them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He spoke to Israel from the pillar of cloud,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they followed the laws and decrees he gave them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
