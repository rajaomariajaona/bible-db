    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and worship at his holy mountain in Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the '
  - type: usfm
