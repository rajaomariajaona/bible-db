  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Let them praise your great and awesome name.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your name is holy!
- type: usfm
  marker: q1
  children:
  - type: usfm
