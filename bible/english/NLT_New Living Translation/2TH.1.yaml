document_id: 2TH.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings from Paul
  - type: text
    content: This letter is from Paul, Silas,
  - type: note
    content: Greek Silvanus, the Greek form of the name.
  - type: text
    content: ' and Timothy.'
  - type: text
    content: We are writing to the church in Thessalonica, to you who belong to God our Father and the Lord Jesus Christ.
  '10':
  - type: text
    content: When he comes on that day, he will receive glory from his holy people—praise from all who believe. And this includes you, for you believed what we told you about him.
  '11':
  - type: text
    content: 'So we keep on praying for you, asking our God to enable you to live a life worthy of his call. May he give you the power to accomplish all the good things your faith prompts you to do. '
  '12':
  - type: text
    content: Then the name of our Lord Jesus will be honored because of the way you live, and you will be honored along with him. This is all made possible because of the grace of our God and Lord, Jesus Christ.
  - type: note
    content: Or of our God and our Lord Jesus Christ.
  '2':
  - type: text
    content: May God our Father
  - type: note
    content: Some manuscripts read God the Father.
  - type: text
    content: ' and the Lord Jesus Christ give you grace and peace.'
  - type: heading
    content: Encouragement during Persecution
  '3':
  - type: text
    content: Dear brothers and sisters,
  - type: note
    content: Greek Brothers.
  - type: text
    content: ' we can’t help but thank God for you, because your faith is flourishing and your love for one another is growing. '
  '4':
  - type: text
    content: 'We proudly tell God’s other churches about your endurance and faithfulness in all the persecutions and hardships you are suffering. '
  '5':
  - type: text
    content: 'And God will use this persecution to show his justice and to make you worthy of his Kingdom, for which you are suffering. '
  '6':
  - type: text
    content: In his justice he will pay back those who persecute you.
  '7':
  - type: text
    content: 'And God will provide rest for you who are being persecuted and also for us when the Lord Jesus appears from heaven. He will come with his mighty angels, '
  '8':
  - type: text
    content: 'in flaming fire, bringing judgment on those who don’t know God and on those who refuse to obey the Good News of our Lord Jesus. '
  '9':
  - type: text
    content: 'They will be punished with eternal destruction, forever separated from the Lord and from his glorious power. '
