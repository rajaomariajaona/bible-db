document_id: 2TH.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greetings from Paul
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: This letter is from Paul, Silas,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Silvanus, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: the Greek form of the name.
      marker-yv: yv-n
    - type: text
      text: ' and Timothy.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: We are writing to the church in Thessalonica, to you who belong to God our Father and the Lord Jesus Christ.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he comes on that day, he will receive glory from his holy people—praise from all who believe. And this includes you, for you believed what we told you about him.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So we keep on praying for you, asking our God to enable you to live a life worthy of his call. May he give you the power to accomplish all the good things your faith prompts you to do. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the name of our Lord Jesus will be honored because of the way you live, and you will be honored along with him. This is all made possible because of the grace of our God and Lord, Jesus Christ.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of our God and our Lord Jesus Christ.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: May God our Father
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: God the Father.
      marker-yv: yv-n
    - type: text
      text: ' and the Lord Jesus Christ give you grace and peace.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Encouragement during Persecution
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Brothers.
      marker-yv: yv-n
    - type: text
      text: ' we can’t help but thank God for you, because your faith is flourishing and your love for one another is growing. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'We proudly tell God’s other churches about your endurance and faithfulness in all the persecutions and hardships you are suffering. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And God will use this persecution to show his justice and to make you worthy of his Kingdom, for which you are suffering. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: In his justice he will pay back those who persecute you.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God will provide rest for you who are being persecuted and also for us when the Lord Jesus appears from heaven. He will come with his mighty angels, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in flaming fire, bringing judgment on those who don’t know God and on those who refuse to obey the Good News of our Lord Jesus. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will be punished with eternal destruction, forever separated from the Lord and from his glorious power. '
