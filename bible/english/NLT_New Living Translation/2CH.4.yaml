document_id: 2CH.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Furnishings for the Temple
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Solomon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Huram-abi; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He.
      marker-yv: yv-n
    - type: text
      text: ' also made a bronze altar 30 feet long, 30 feet wide, and 15 feet high.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[9.2 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long, 20 cubits wide, and 10 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[4.6 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: high.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The great bronze basin called the Sea was placed near the southeast corner of the Temple.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Huram-abi also made the necessary washbasins, shovels, and bowls.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So at last Huram-abi completed everything King Solomon had assigned him to make for the Temple of God:'
  '12':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the two pillars;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the two bowl-shaped capitals on top of the pillars;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the two networks of interwoven chains that decorated the capitals;
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the 400 pomegranates that hung from the chains on the capitals (two rows of pomegranates for each of the chain networks that decorated the capitals on top of the pillars);
  '14':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the water carts holding the basins;
  '15':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the Sea and the twelve oxen under it;
  '16':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the ash buckets, the shovels, the meat hooks, and all the related articles.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Huram-abi made all these things of burnished bronze for the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', just as King Solomon had directed. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The king had them cast in clay molds in the Jordan Valley between Succoth and Zarethan.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 1 Kgs 7:46; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zeredah.
      marker-yv: yv-n
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Solomon used such great quantities of bronze that its weight could not be determined.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Solomon also made all the furnishings for the Temple of God:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the gold altar;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the tables for the Bread of the Presence;
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then he cast a great round basin, 15 feet across from rim to rim, called the Sea. It was 7-1/2 feet deep and about 45 feet in circumference.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '10 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[4.6 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'across . . . 5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.3 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'deep and 30 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[13.8 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in circumference.
      marker-yv: yv-n
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the lampstands and their lamps of solid gold, to burn in front of the Most Holy Place as prescribed;
  '21':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the flower decorations, lamps, and tongs—all of the purest gold;
  '22':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the lamp snuffers, bowls, ladles, and incense burners—all of solid gold;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the doors for the entrances to the Most Holy Place and the main room of the Temple, overlaid with gold.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: It was encircled just below its rim by two rows of figures that resembled oxen. There were about six oxen per foot
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20 oxen per meter; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 10 per cubit.
      marker-yv: yv-n
    - type: text
      text: ' all the way around, and they were cast as part of the basin.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Sea was placed on a base of twelve bronze oxen, all facing outward. Three faced north, three faced west, three faced south, and three faced east, and the Sea rested on them. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The walls of the Sea were about three inches
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a handbreadth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[8 centimeters].'
      marker-yv: yv-n
    - type: text
      text: ' thick, and its rim flared out like a cup and resembled a water lily blossom. It could hold about 16,500 gallons'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '3,000 baths '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[63 kiloliters].'
      marker-yv: yv-n
    - type: text
      text: ' of water.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also made ten smaller basins for washing the utensils for the burnt offerings. He set five on the south side and five on the north. But the priests washed themselves in the Sea.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He then cast ten gold lampstands according to the specifications that had been given, and he put them in the Temple. Five were placed against the south wall, and five were placed against the north wall.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also built ten tables and placed them in the Temple, five along the south wall and five along the north wall. Then he molded 100 gold basins.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He then built a courtyard for the priests, and also the large outer courtyard. He made doors for the courtyard entrances and overlaid them with bronze. '
