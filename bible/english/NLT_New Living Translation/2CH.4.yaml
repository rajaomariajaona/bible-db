document_id: 2CH.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Furnishings for the Temple
  - type: text
    content: Solomon
  - type: note
    content: Or Huram-abi; Hebrew reads He.
  - type: text
    content: ' also made a bronze altar 30 feet long, 30 feet wide, and 15 feet high.'
  - type: note
    content: Hebrew 20 cubits [9.2 meters] long, 20 cubits wide, and 10 cubits [4.6 meters] high.
  - type: text
    content: ' '
  '10':
  - type: text
    content: The great bronze basin called the Sea was placed near the southeast corner of the Temple.
  '11':
  - type: text
    content: Huram-abi also made the necessary washbasins, shovels, and bowls.
  - type: text
    content: 'So at last Huram-abi completed everything King Solomon had assigned him to make for the Temple of God:'
  '12':
  - type: text
    content: the two pillars;
  - type: text
    content: the two bowl-shaped capitals on top of the pillars;
  - type: text
    content: the two networks of interwoven chains that decorated the capitals;
  '13':
  - type: text
    content: the 400 pomegranates that hung from the chains on the capitals (two rows of pomegranates for each of the chain networks that decorated the capitals on top of the pillars);
  '14':
  - type: text
    content: the water carts holding the basins;
  '15':
  - type: text
    content: the Sea and the twelve oxen under it;
  '16':
  - type: text
    content: the ash buckets, the shovels, the meat hooks, and all the related articles.
  - type: text
    content: 'Huram-abi made all these things of burnished bronze for the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', just as King Solomon had directed. '
  '17':
  - type: text
    content: The king had them cast in clay molds in the Jordan Valley between Succoth and Zarethan.
  - type: note
    content: As in parallel text at 1 Kgs 7:46; Hebrew reads Zeredah.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Solomon used such great quantities of bronze that its weight could not be determined.
  '19':
  - type: text
    content: 'Solomon also made all the furnishings for the Temple of God:'
  - type: text
    content: the gold altar;
  - type: text
    content: the tables for the Bread of the Presence;
  '2':
  - type: text
    content: Then he cast a great round basin, 15 feet across from rim to rim, called the Sea. It was 7-1/2 feet deep and about 45 feet in circumference.
  - type: note
    content: Hebrew 10 cubits [4.6 meters] across . . . 5 cubits [2.3 meters] deep and 30 cubits [13.8 meters] in circumference.
  - type: text
    content: ' '
  '20':
  - type: text
    content: the lampstands and their lamps of solid gold, to burn in front of the Most Holy Place as prescribed;
  '21':
  - type: text
    content: the flower decorations, lamps, and tongs—all of the purest gold;
  '22':
  - type: text
    content: the lamp snuffers, bowls, ladles, and incense burners—all of solid gold;
  - type: text
    content: the doors for the entrances to the Most Holy Place and the main room of the Temple, overlaid with gold.
  '3':
  - type: text
    content: It was encircled just below its rim by two rows of figures that resembled oxen. There were about six oxen per foot
  - type: note
    content: Or 20 oxen per meter; Hebrew reads 10 per cubit.
  - type: text
    content: ' all the way around, and they were cast as part of the basin.'
  '4':
  - type: text
    content: 'The Sea was placed on a base of twelve bronze oxen, all facing outward. Three faced north, three faced west, three faced south, and three faced east, and the Sea rested on them. '
  '5':
  - type: text
    content: The walls of the Sea were about three inches
  - type: note
    content: Hebrew a handbreadth [8 centimeters].
  - type: text
    content: ' thick, and its rim flared out like a cup and resembled a water lily blossom. It could hold about 16,500 gallons'
  - type: note
    content: Hebrew 3,000 baths [63 kiloliters].
  - type: text
    content: ' of water.'
  '6':
  - type: text
    content: He also made ten smaller basins for washing the utensils for the burnt offerings. He set five on the south side and five on the north. But the priests washed themselves in the Sea.
  '7':
  - type: text
    content: He then cast ten gold lampstands according to the specifications that had been given, and he put them in the Temple. Five were placed against the south wall, and five were placed against the north wall.
  '8':
  - type: text
    content: He also built ten tables and placed them in the Temple, five along the south wall and five along the north wall. Then he molded 100 gold basins.
  '9':
  - type: text
    content: 'He then built a courtyard for the priests, and also the large outer courtyard. He made doors for the courtyard entrances and overlaid them with bronze. '
