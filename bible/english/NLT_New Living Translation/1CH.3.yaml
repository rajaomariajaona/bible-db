document_id: 1CH.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of David
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'These are the sons of David who were born in Hebron:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The oldest was Amnon, whose mother was Ahinoam from Jezreel.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The second was Daniel, whose mother was Abigail from Carmel.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The third was Absalom, whose mother was Maacah, the daughter of Talmai, king of Geshur.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The fourth was Adonijah, whose mother was Haggith.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The fifth was Shephatiah, whose mother was Abital.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The sixth was Ithream, whose mother was Eglah, David’s wife.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: These six sons were born to David in Hebron, where he reigned seven and a half years.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then David reigned another thirty-three years in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The sons born to David in Jerusalem included Shammua,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:5a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Syriac version (see also 14:4; 2 Sam 5:14); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shimea.
    marker-yv: yv-n
  - type: text
    text: ' Shobab, Nathan, and Solomon. Their mother was Bathsheba,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:5b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Bathshua, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Bathsheba.
    marker-yv: yv-n
  - type: text
    text: ' the daughter of Ammiel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David also had nine other sons: Ibhar, Elishua,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Hebrew and Greek manuscripts (see also 14:5-7 and 2 Sam 5:15); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Elishama.
    marker-yv: yv-n
  - type: text
    text: ' Elpelet,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Eliphelet; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare parallel text at 14:5-7.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nogah, Nepheg, Japhia, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Elishama, Eliada, and Eliphelet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: These were the sons of David, not including his sons born to his concubines. Their sister was named Tamar.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Solomon
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The descendants of Solomon were Rehoboam, Abijah, Asa, Jehoshaphat, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jehoram,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Joram, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoram.
    marker-yv: yv-n
  - type: text
    text: ' Ahaziah, Joash, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Amaziah, Uzziah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Azariah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Uzziah.
    marker-yv: yv-n
  - type: text
    text: ' Jotham, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ahaz, Hezekiah, Manasseh, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Amon, and Josiah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The sons of Josiah were Johanan (the oldest), Jehoiakim (the second), Zedekiah (the third), and Jehoahaz
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shallum, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: another name for Jehoahaz.
    marker-yv: yv-n
  - type: text
    text: ' (the fourth).'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The successors of Jehoiakim were his son Jehoiachin and his brother Zedekiah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'The sons of Jehoiakim were his son Jeconiah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[a variant spelling of Jehoiachin] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and his son Zedekiah.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Jehoiachin
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The sons of Jehoiachin,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jeconiah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoiachin.
    marker-yv: yv-n
  - type: text
    text: ' who was taken prisoner by the Babylonians, were Shealtiel, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Malkiram, Pedaiah, Shenazzar, Jekamiah, Hoshama, and Nedabiah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The sons of Pedaiah were Zerubbabel and Shimei.
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'The sons of Zerubbabel were Meshullam and Hananiah. (Their sister was Shelomith.) '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: His five other sons were Hashubah, Ohel, Berekiah, Hasadiah, and Jushab-hesed.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The sons of Hananiah were Pelatiah and Jeshaiah. Jeshaiah’s son was Rephaiah. Rephaiah’s son was Arnan. Arnan’s son was Obadiah. Obadiah’s son was Shecaniah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The descendants of Shecaniah were Shemaiah and his sons, Hattush, Igal, Bariah, Neariah, and Shaphat—six in all.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The sons of Neariah were Elioenai, Hizkiah, and Azrikam—three in all.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The sons of Elioenai were Hodaviah, Eliashib, Pelaiah, Akkub, Johanan, Delaiah, and Anani—seven in all.
