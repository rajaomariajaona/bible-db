document_id: 1CH.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Descendants of David
  - type: text
    content: 'These are the sons of David who were born in Hebron:'
  - type: text
    content: The oldest was Amnon, whose mother was Ahinoam from Jezreel.
  - type: text
    content: The second was Daniel, whose mother was Abigail from Carmel.
  '10':
  - type: text
    content: 'The descendants of Solomon were Rehoboam, Abijah, Asa, Jehoshaphat, '
  '11':
  - type: text
    content: Jehoram,
  - type: note
    content: Hebrew Joram, a variant spelling of Jehoram.
  - type: text
    content: ' Ahaziah, Joash, '
  '12':
  - type: text
    content: Amaziah, Uzziah,
  - type: note
    content: Hebrew Azariah, a variant spelling of Uzziah.
  - type: text
    content: ' Jotham, '
  '13':
  - type: text
    content: 'Ahaz, Hezekiah, Manasseh, '
  '14':
  - type: text
    content: Amon, and Josiah.
  '15':
  - type: text
    content: The sons of Josiah were Johanan (the oldest), Jehoiakim (the second), Zedekiah (the third), and Jehoahaz
  - type: note
    content: Hebrew Shallum, another name for Jehoahaz.
  - type: text
    content: ' (the fourth).'
  '16':
  - type: text
    content: The successors of Jehoiakim were his son Jehoiachin and his brother Zedekiah.
  - type: note
    content: Hebrew The sons of Jehoiakim were his son Jeconiah [a variant spelling of Jehoiachin] and his son Zedekiah.
  - type: heading
    content: Descendants of Jehoiachin
  '17':
  - type: text
    content: The sons of Jehoiachin,
  - type: note
    content: Hebrew Jeconiah, a variant spelling of Jehoiachin.
  - type: text
    content: ' who was taken prisoner by the Babylonians, were Shealtiel, '
  '18':
  - type: text
    content: Malkiram, Pedaiah, Shenazzar, Jekamiah, Hoshama, and Nedabiah.
  '19':
  - type: text
    content: The sons of Pedaiah were Zerubbabel and Shimei.
  - type: text
    content: 'The sons of Zerubbabel were Meshullam and Hananiah. (Their sister was Shelomith.) '
  '2':
  - type: text
    content: The third was Absalom, whose mother was Maacah, the daughter of Talmai, king of Geshur.
  - type: text
    content: The fourth was Adonijah, whose mother was Haggith.
  '20':
  - type: text
    content: His five other sons were Hashubah, Ohel, Berekiah, Hasadiah, and Jushab-hesed.
  '21':
  - type: text
    content: The sons of Hananiah were Pelatiah and Jeshaiah. Jeshaiah’s son was Rephaiah. Rephaiah’s son was Arnan. Arnan’s son was Obadiah. Obadiah’s son was Shecaniah.
  '22':
  - type: text
    content: The descendants of Shecaniah were Shemaiah and his sons, Hattush, Igal, Bariah, Neariah, and Shaphat—six in all.
  '23':
  - type: text
    content: The sons of Neariah were Elioenai, Hizkiah, and Azrikam—three in all.
  '24':
  - type: text
    content: The sons of Elioenai were Hodaviah, Eliashib, Pelaiah, Akkub, Johanan, Delaiah, and Anani—seven in all.
  '3':
  - type: text
    content: The fifth was Shephatiah, whose mother was Abital.
  - type: text
    content: The sixth was Ithream, whose mother was Eglah, David’s wife.
  '4':
  - type: text
    content: These six sons were born to David in Hebron, where he reigned seven and a half years.
  - type: text
    content: 'Then David reigned another thirty-three years in Jerusalem. '
  '5':
  - type: text
    content: The sons born to David in Jerusalem included Shammua,
  - type: note
    content: As in Syriac version (see also 14:4; 2 Sam 5:14); Hebrew reads Shimea.
  - type: text
    content: ' Shobab, Nathan, and Solomon. Their mother was Bathsheba,'
  - type: note
    content: Hebrew Bathshua, a variant spelling of Bathsheba.
  - type: text
    content: ' the daughter of Ammiel. '
  '6':
  - type: text
    content: 'David also had nine other sons: Ibhar, Elishua,'
  - type: note
    content: As in some Hebrew and Greek manuscripts (see also 14:5-7 and 2 Sam 5:15); most Hebrew manuscripts read Elishama.
  - type: text
    content: ' Elpelet,'
  - type: note
    content: Hebrew Eliphelet; compare parallel text at 14:5-7.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Nogah, Nepheg, Japhia, '
  '8':
  - type: text
    content: Elishama, Eliada, and Eliphelet.
  '9':
  - type: text
    content: These were the sons of David, not including his sons born to his concubines. Their sister was named Tamar.
  - type: heading
    content: Descendants of Solomon
