document_id: 1SA.18,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul Becomes Jealous of David
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After David had finished talking with Saul, he met Jonathan, the king’s son. There was an immediate bond between them, for Jonathan loved David. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The very next day a tormenting spirit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: an evil spirit.
      marker-yv: yv-n
    - type: text
      text: ' from God overwhelmed Saul, and he began to rave in his house like a madman. David was playing the harp, as he did each day. But Saul had a spear in his hand, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: and he suddenly hurled it at David, intending to pin him to the wall. But David escaped him twice.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Saul was then afraid of David, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with David and had turned away from Saul. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Finally, Saul sent him away and appointed him commander over 1,000 men, and David faithfully led his troops into battle.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'David continued to succeed in everything he did, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with him. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'When Saul recognized this, he became even more afraid of him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But all Israel and Judah loved David because he was so successful at leading his troops into battle.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Marries Saul’s Daughter
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'One day Saul said to David, “I am ready to give you my older daughter, Merab, as your wife. But first you must prove yourself to be a real warrior by fighting the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s battles.” For Saul thought, “I’ll send him out against the Philistines and let them kill him rather than doing it myself.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Who am I, and what is my family in Israel that I should be the king’s son-in-law?” David exclaimed. “My father’s family is nothing!” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: So
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: But.
      marker-yv: yv-n
    - type: text
      text: ' when the time came for Saul to give his daughter Merab in marriage to David, he gave her instead to Adriel, a man from Meholah.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'From that day on Saul kept David with him and wouldn’t let him return home. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'In the meantime, Saul’s daughter Michal had fallen in love with David, and Saul was delighted when he heard about it. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “Here’s another chance to see him killed by the Philistines!” Saul said to himself. But to David he said, “Today you have a second chance to become my son-in-law!”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Then Saul told his men to say to David, “The king really likes you, and so do we. Why don’t you accept the king’s offer and become his son-in-law?”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: When Saul’s men said these things to David, he replied, “How can a poor man from a humble family afford the bride price for the daughter of a king?”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'When Saul’s men reported this back to the king, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: he told them, “Tell David that all I want for the bride price is 100 Philistine foreskins! Vengeance on my enemies is all I really want.” But what Saul had in mind was that David would be killed in the fight.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'David was delighted to accept the offer. Before the time limit expired, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: he and his men went out and killed 200 Philistines. Then David fulfilled the king’s requirement by presenting all their foreskins to him. So Saul gave his daughter Michal to David to be his wife.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'When Saul realized that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with David and how much his daughter Michal loved him, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Saul became even more afraid of him, and he remained David’s enemy for the rest of his life.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And Jonathan made a solemn pact with David, because he loved him as he loved himself. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Every time the commanders of the Philistines attacked, David was more successful against them than all the rest of Saul’s officers. So David’s name became very famous.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Jonathan sealed the pact by taking off his robe and giving it to David, together with his tunic, sword, bow, and belt.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Whatever Saul asked David to do, David did it successfully. So Saul made him a commander over the men of war, an appointment that was welcomed by the people and Saul’s officers alike.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: When the victorious Israelite army was returning home after David had killed the Philistine, women from all the towns of Israel came out to meet King Saul. They sang and danced for joy with tambourines and cymbals.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The type of instrument represented by the word '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cymbals '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'This was their song:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Saul has killed his thousands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and David his ten thousands!”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'This made Saul very angry. “What’s this?” he said. “They credit David with ten thousands and me with only thousands. Next they’ll be making him their king!” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: So from that time on Saul kept a jealous eye on David.
