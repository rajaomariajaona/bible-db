document_id: HAB.1,116
type_code: eng
verses:
  '1':
  - type: text
    content: This is the message that the prophet Habakkuk received in a vision.
  - type: heading
    content: Habakkuk’s Complaint
  '10':
  - type: text
    content: They scoff at kings and princes
  - type: text
    content: and scorn all their fortresses.
  - type: text
    content: They simply pile ramps of earth
  - type: text
    content: against their walls and capture them!
  '11':
  - type: text
    content: They sweep past like the wind
  - type: text
    content: and are gone.
  - type: text
    content: But they are deeply guilty,
  - type: text
    content: for their own strength is their god.”
  - type: heading
    content: Habakkuk’s Second Complaint
  '12':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, my Holy One, you who are eternal—'
  - type: text
    content: surely you do not plan to wipe us out?
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', our Rock, you have sent these Babylonians to correct us,'
  - type: text
    content: to punish us for our many sins.
  '13':
  - type: text
    content: But you are pure and cannot stand the sight of evil.
  - type: text
    content: Will you wink at their treachery?
  - type: text
    content: Should you be silent while the wicked
  - type: text
    content: swallow up people more righteous than they?
  '14':
  - type: text
    content: Are we only fish to be caught and killed?
  - type: text
    content: Are we only sea creatures that have no leader?
  '15':
  - type: text
    content: Must we be strung up on their hooks
  - type: text
    content: and caught in their nets while they rejoice and celebrate?
  '16':
  - type: text
    content: Then they will worship their nets
  - type: text
    content: and burn incense in front of them.
  - type: text
    content: “These nets are the gods who have made us rich!”
  - type: text
    content: they will claim.
  '17':
  - type: text
    content: Will you let them get away with this forever?
  - type: text
    content: Will they succeed forever in their heartless conquests?
  '2':
  - type: text
    content: 'How long, O '
  - type: text
    content: Lord
  - type: text
    content: ', must I call for help?'
  - type: text
    content: But you do not listen!
  - type: text
    content: “Violence is everywhere!” I cry,
  - type: text
    content: but you do not come to save.
  '3':
  - type: text
    content: Must I forever see these evil deeds?
  - type: text
    content: Why must I watch all this misery?
  - type: text
    content: Wherever I look,
  - type: text
    content: I see destruction and violence.
  - type: text
    content: I am surrounded by people
  - type: text
    content: who love to argue and fight.
  '4':
  - type: text
    content: The law has become paralyzed,
  - type: text
    content: and there is no justice in the courts.
  - type: text
    content: The wicked far outnumber the righteous,
  - type: text
    content: so that justice has become perverted.
  - type: heading
    content: The Lord’s Reply
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied,'
  - type: text
    content: “Look around at the nations;
  - type: text
    content: look and be amazed!
  - type: note
    content: Greek version reads Look, you mockers; / look and be amazed and die. Compare Acts 13:41.
  - type: text
    content: For I am doing something in your own day,
  - type: text
    content: something you wouldn’t believe
  - type: text
    content: even if someone told you about it.
  '6':
  - type: text
    content: I am raising up the Babylonians,
  - type: note
    content: Or Chaldeans.
  - type: text
    content: a cruel and violent people.
  - type: text
    content: They will march across the world
  - type: text
    content: and conquer other lands.
  '7':
  - type: text
    content: They are notorious for their cruelty
  - type: text
    content: and do whatever they like.
  '8':
  - type: text
    content: Their horses are swifter than cheetahs
  - type: note
    content: Or leopards.
  - type: text
    content: and fiercer than wolves at dusk.
  - type: text
    content: Their charioteers charge from far away.
  - type: text
    content: Like eagles, they swoop down to devour their prey.
  '9':
  - type: text
    content: “On they come, all bent on violence.
  - type: text
    content: Their hordes advance like a desert wind,
  - type: text
    content: sweeping captives ahead of them like sand.
