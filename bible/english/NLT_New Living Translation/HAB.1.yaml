document_id: HAB.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This is the message that the prophet Habakkuk received in a vision.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Habakkuk’s Complaint
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They scoff at kings and princes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and scorn all their fortresses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They simply pile ramps of earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against their walls and capture them!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sweep past like the wind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and are gone.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they are deeply guilty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for their own strength is their god.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Habakkuk’s Second Complaint
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, my Holy One, you who are eternal—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: surely you do not plan to wipe us out?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', our Rock, you have sent these Babylonians to correct us,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to punish us for our many sins.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you are pure and cannot stand the sight of evil.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you wink at their treachery?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should you be silent while the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: swallow up people more righteous than they?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are we only fish to be caught and killed?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Are we only sea creatures that have no leader?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Must we be strung up on their hooks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and caught in their nets while they rejoice and celebrate?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they will worship their nets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and burn incense in front of them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “These nets are the gods who have made us rich!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will claim.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you let them get away with this forever?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will they succeed forever in their heartless conquests?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How long, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', must I call for help?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But you do not listen!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Violence is everywhere!” I cry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you do not come to save.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Must I forever see these evil deeds?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why must I watch all this misery?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wherever I look,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I see destruction and violence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am surrounded by people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who love to argue and fight.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The law has become paralyzed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there is no justice in the courts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked far outnumber the righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that justice has become perverted.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Reply
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replied,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look around at the nations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: look and be amazed!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Look, you mockers; / look and be amazed and die. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Acts 13:41.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I am doing something in your own day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: something you wouldn’t believe
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even if someone told you about it.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am raising up the Babylonians,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a cruel and violent people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will march across the world
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and conquer other lands.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are notorious for their cruelty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do whatever they like.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their horses are swifter than cheetahs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leopards.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fiercer than wolves at dusk.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their charioteers charge from far away.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like eagles, they swoop down to devour their prey.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “On they come, all bent on violence.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their hordes advance like a desert wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sweeping captives ahead of them like sand.
