      text: '59'
  - type: text
    text: The prophet Jeremiah gave this message to Seraiah son of Neriah and grandson of Mahseiah, a staff officer, when Seraiah went to Babylon with King Zedekiah of Judah. This was during the fourth year of Zedekiah’s reign.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51:59 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The fourth year of Zedekiah’s reign was 593 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Jeremiah had recorded on a scroll all the terrible disasters that would soon come upon Babylon—all the words written here. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'He said to Seraiah, “When you get to Babylon, read aloud everything on this scroll. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Then say, ‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you have said that you will destroy Babylon so that neither people nor animals will remain here. She will lie empty and abandoned forever.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'When you have finished reading the scroll, tie it to a stone and throw it into the Euphrates River. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: Then say, ‘In this same way Babylon and her people will sink, never again to rise, because of the disasters I will bring upon her.’”
- type: usfm
  marker: p
  children:
  - type: text
    text: This is the end of Jeremiah’s messages.
