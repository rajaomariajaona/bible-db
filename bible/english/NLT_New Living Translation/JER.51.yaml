document_id: JER.51,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “I will stir up a destroyer against Babylon
  - type: text
    content: and the people of Babylonia.
  - type: note
    content: Hebrew of Leb-kamai, a code name for Babylonia.
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has vindicated us.'
  - type: text
    content: Come, let us announce in Jerusalem
  - type: note
    content: Hebrew Zion; also in 51:24.
  - type: text
    content: 'everything the '
  - type: text
    content: Lord
  - type: text
    content: ' our God has done.'
  '11':
  - type: text
    content: Sharpen the arrows!
  - type: text
    content: Lift up the shields!
  - type: note
    content: Greek version reads Fill up the quivers.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has inspired the kings of the Medes'
  - type: text
    content: to march against Babylon and destroy her.
  - type: text
    content: This is his vengeance against those
  - type: text
    content: who desecrated his Temple.
  '12':
  - type: text
    content: Raise the battle flag against Babylon!
  - type: text
    content: Reinforce the guard and station the watchmen.
  - type: text
    content: Prepare an ambush,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' will fulfill all his plans against Babylon.'
  '13':
  - type: text
    content: You are a city by a great river,
  - type: text
    content: a great center of commerce,
  - type: text
    content: but your end has come.
  - type: text
    content: The thread of your life is cut.
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies has taken this vow'
  - type: text
    content: 'and has sworn to it by his own name:'
  - type: text
    content: “Your cities will be filled with enemies,
  - type: text
    content: like fields swarming with locusts,
  - type: text
    content: and they will shout in triumph over you.”
  - type: heading
    content: A Hymn of Praise to the Lord
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' made the earth by his power,'
  - type: text
    content: and he preserves it by his wisdom.
  - type: text
    content: With his own understanding
  - type: text
    content: he stretched out the heavens.
  '16':
  - type: text
    content: When he speaks in the thunder,
  - type: text
    content: the heavens roar with rain.
  - type: text
    content: He causes the clouds to rise over the earth.
  - type: text
    content: He sends the lightning with the rain
  - type: text
    content: and releases the wind from his storehouses.
  '17':
  - type: text
    content: The whole human race is foolish and has no knowledge!
  - type: text
    content: The craftsmen are disgraced by the idols they make,
  - type: text
    content: for their carefully shaped works are a fraud.
  - type: text
    content: These idols have no breath or power.
  '18':
  - type: text
    content: Idols are worthless; they are ridiculous lies!
  - type: text
    content: On the day of reckoning they will all be destroyed.
  '19':
  - type: text
    content: But the God of Israel
  - type: note
    content: Hebrew the Portion of Jacob. See note on 5:20.
  - type: text
    content: ' is no idol!'
  - type: text
    content: He is the Creator of everything that exists,
  - type: text
    content: including his people, his own special possession.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies is his name!'
  - type: heading
    content: Babylon’s Great Punishment
  '2':
  - type: text
    content: Foreigners will come and winnow her,
  - type: text
    content: blowing her away as chaff.
  - type: text
    content: They will come from every side
  - type: text
    content: to rise against her in her day of trouble.
  '20':
  - type: text
    content: “You
  - type: note
    content: Possibly Cyrus, whom God used to conquer Babylon. Compare Isa 44:28; 45:1.
  - type: text
    content: ' are my battle-ax and sword,”'
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “With you I will shatter nations
  - type: text
    content: and destroy many kingdoms.
  '21':
  - type: text
    content: With you I will shatter armies—
  - type: text
    content: destroying the horse and rider,
  - type: text
    content: the chariot and charioteer.
  '22':
  - type: text
    content: With you I will shatter men and women,
  - type: text
    content: old people and children,
  - type: text
    content: young men and young women.
  '23':
  - type: text
    content: With you I will shatter shepherds and flocks,
  - type: text
    content: farmers and oxen,
  - type: text
    content: captains and officers.
  '24':
  - type: text
    content: “I will repay Babylon
  - type: text
    content: and the people of Babylonia
  - type: note
    content: Or Chaldea; also in 51:35.
  - type: text
    content: for all the wrong they have done
  - type: text
    content: 'to my people in Jerusalem,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '25':
  - type: text
    content: “Look, O mighty mountain, destroyer of the earth!
  - type: text
    content: 'I am your enemy,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “I will raise my fist against you,
  - type: text
    content: to knock you down from the heights.
  - type: text
    content: When I am finished,
  - type: text
    content: you will be nothing but a heap of burnt rubble.
  '26':
  - type: text
    content: You will be desolate forever.
  - type: text
    content: Even your stones will never again be used for building.
  - type: text
    content: You will be completely wiped out,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '27':
  - type: text
    content: Raise a signal flag to the nations.
  - type: text
    content: Sound the battle cry!
  - type: text
    content: Mobilize them all against Babylon.
  - type: text
    content: Prepare them to fight against her!
  - type: text
    content: Bring out the armies of Ararat, Minni, and Ashkenaz.
  - type: text
    content: Appoint a commander,
  - type: text
    content: and bring a multitude of horses like swarming locusts!
  '28':
  - type: text
    content: Bring against her the armies of the nations—
  - type: text
    content: led by the kings of the Medes
  - type: text
    content: and all their captains and officers.
  '29':
  - type: text
    content: The earth trembles and writhes in pain,
  - type: text
    content: 'for everything the '
  - type: text
    content: Lord
  - type: text
    content: ' has planned against Babylon stands unchanged.'
  - type: text
    content: Babylon will be left desolate without a single inhabitant.
  '3':
  - type: text
    content: Don’t let the archers put on their armor
  - type: text
    content: or draw their bows.
  - type: text
    content: Don’t spare even her best soldiers!
  - type: text
    content: Let her army be completely destroyed.
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering.
  '30':
  - type: text
    content: Her mightiest warriors no longer fight.
  - type: text
    content: They stay in their barracks, their courage gone.
  - type: text
    content: They have become like women.
  - type: text
    content: The invaders have burned the houses
  - type: text
    content: and broken down the city gates.
  '31':
  - type: text
    content: The news is passed from one runner to the next
  - type: text
    content: as the messengers hurry to tell the king
  - type: text
    content: that his city has been captured.
  '32':
  - type: text
    content: All the escape routes are blocked.
  - type: text
    content: The marshes have been set aflame,
  - type: text
    content: and the army is in a panic.
  '33':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: 'the God of Israel, says:'
  - type: text
    content: “Babylon is like wheat on a threshing floor,
  - type: text
    content: about to be trampled.
  - type: text
    content: In just a little while
  - type: text
    content: her harvest will begin.”
  '34':
  - type: text
    content: “King Nebuchadnezzar
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar.
  - type: text
    content: ' of Babylon has eaten and crushed us'
  - type: text
    content: and drained us of strength.
  - type: text
    content: He has swallowed us like a great monster
  - type: text
    content: and filled his belly with our riches.
  - type: text
    content: He has thrown us out of our own country.
  '35':
  - type: text
    content: Make Babylon suffer as she made us suffer,”
  - type: text
    content: say the people of Zion.
  - type: text
    content: “Make the people of Babylonia pay for spilling our blood,”
  - type: text
    content: says Jerusalem.
  - type: heading
    content: The Lord’s Vengeance on Babylon
  '36':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to Jerusalem:'
  - type: text
    content: “I will be your lawyer to plead your case,
  - type: text
    content: and I will avenge you.
  - type: text
    content: I will dry up her river,
  - type: text
    content: as well as her springs,
  '37':
  - type: text
    content: and Babylon will become a heap of ruins,
  - type: text
    content: haunted by jackals.
  - type: text
    content: She will be an object of horror and contempt,
  - type: text
    content: a place where no one lives.
  '38':
  - type: text
    content: Her people will roar together like strong lions.
  - type: text
    content: They will growl like lion cubs.
  '39':
  - type: text
    content: And while they lie inflamed with all their wine,
  - type: text
    content: I will prepare a different kind of feast for them.
  - type: text
    content: I will make them drink until they fall asleep,
  - type: text
    content: and they will never wake up again,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: They will fall dead in the land of the Babylonians,
  - type: note
    content: Or Chaldeans; also in 51:54.
  - type: text
    content: slashed to death in her streets.
  '40':
  - type: text
    content: “I will bring them down
  - type: text
    content: like lambs to the slaughter,
  - type: text
    content: like rams and goats to be sacrificed.
  '41':
  - type: text
    content: “How Babylon
  - type: note
    content: Hebrew Sheshach, a code name for Babylon.
  - type: text
    content: ' is fallen—'
  - type: text
    content: great Babylon, praised throughout the earth!
  - type: text
    content: Now she has become an object of horror
  - type: text
    content: among the nations.
  '42':
  - type: text
    content: The sea has risen over Babylon;
  - type: text
    content: she is covered by its crashing waves.
  '43':
  - type: text
    content: Her cities now lie in ruins;
  - type: text
    content: she is a dry wasteland
  - type: text
    content: where no one lives or even passes by.
  '44':
  - type: text
    content: And I will punish Bel, the god of Babylon,
  - type: text
    content: and make him vomit up all he has eaten.
  - type: text
    content: The nations will no longer come and worship him.
  - type: text
    content: The wall of Babylon has fallen!
  - type: heading
    content: A Message for the Exiles
  '45':
  - type: text
    content: “Come out, my people, flee from Babylon.
  - type: text
    content: 'Save yourselves! Run from the '
  - type: text
    content: Lord
  - type: text
    content: ’s fierce anger.
  '46':
  - type: text
    content: But do not panic; don’t be afraid
  - type: text
    content: when you hear the first rumor of approaching forces.
  - type: text
    content: For rumors will keep coming year by year.
  - type: text
    content: Violence will erupt in the land
  - type: text
    content: as the leaders fight against each other.
  '47':
  - type: text
    content: For the time is surely coming
  - type: text
    content: when I will punish this great city and all her idols.
  - type: text
    content: Her whole land will be disgraced,
  - type: text
    content: and her dead will lie in the streets.
  '48':
  - type: text
    content: Then the heavens and earth will rejoice,
  - type: text
    content: for out of the north will come destroying armies
  - type: text
    content: 'against Babylon,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '49':
  - type: text
    content: “Just as Babylon killed the people of Israel
  - type: text
    content: and others throughout the world,
  - type: text
    content: so must her people be killed.
  '5':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies'
  - type: text
    content: has not abandoned Israel and Judah.
  - type: text
    content: He is still their God,
  - type: text
    content: even though their land was filled with sin
  - type: text
    content: against the Holy One of Israel.”
  '50':
  - type: text
    content: Get out, all you who have escaped the sword!
  - type: text
    content: Do not stand and watch—flee while you can!
  - type: text
    content: 'Remember the '
  - type: text
    content: Lord
  - type: text
    content: ', though you are in a far-off land,'
  - type: text
    content: and think about your home in Jerusalem.”
  '51':
  - type: text
    content: “We are ashamed,” the people say.
  - type: text
    content: “We are insulted and disgraced
  - type: text
    content: 'because the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple
  - type: text
    content: has been defiled by foreigners.”
  '52':
  - type: text
    content: '“Yes,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “but the time is coming'
  - type: text
    content: when I will destroy Babylon’s idols.
  - type: text
    content: The groans of her wounded people
  - type: text
    content: will be heard throughout the land.
  '53':
  - type: text
    content: Though Babylon reaches as high as the heavens
  - type: text
    content: and makes her fortifications incredibly strong,
  - type: text
    content: I will still send enemies to plunder her.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  - type: heading
    content: Babylon’s Complete Destruction
  '54':
  - type: text
    content: “Listen! Hear the cry of Babylon,
  - type: text
    content: the sound of great destruction from the land of the Babylonians.
  '55':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is destroying Babylon.'
  - type: text
    content: He will silence her loud voice.
  - type: text
    content: Waves of enemies pound against her;
  - type: text
    content: the noise of battle rings through the city.
  '56':
  - type: text
    content: Destroying armies come against Babylon.
  - type: text
    content: Her mighty men are captured,
  - type: text
    content: and their weapons break in their hands.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is a God who gives just punishment;'
  - type: text
    content: he always repays in full.
  '57':
  - type: text
    content: I will make her officials and wise men drunk,
  - type: text
    content: along with her captains, officers, and warriors.
  - type: text
    content: They will fall asleep
  - type: text
    content: and never wake up again!”
  - type: text
    content: says the King, whose name is
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '58':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says:'
  - type: text
    content: “The thick walls of Babylon will be leveled to the ground,
  - type: text
    content: and her massive gates will be burned.
  - type: text
    content: The builders from many lands have worked in vain,
  - type: text
    content: for their work will be destroyed by fire!”
  - type: heading
    content: Jeremiah’s Message Sent to Babylon
  '59':
  - type: text
    content: The prophet Jeremiah gave this message to Seraiah son of Neriah and grandson of Mahseiah, a staff officer, when Seraiah went to Babylon with King Zedekiah of Judah. This was during the fourth year of Zedekiah’s reign.
  - type: note
    content: The fourth year of Zedekiah’s reign was 593 b.c.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Flee from Babylon! Save yourselves!
  - type: text
    content: Don’t get trapped in her punishment!
  - type: text
    content: 'It is the '
  - type: text
    content: Lord
  - type: text
    content: ’s time for vengeance;
  - type: text
    content: he will repay her in full.
  '60':
  - type: text
    content: 'Jeremiah had recorded on a scroll all the terrible disasters that would soon come upon Babylon—all the words written here. '
  '61':
  - type: text
    content: 'He said to Seraiah, “When you get to Babylon, read aloud everything on this scroll. '
  '62':
  - type: text
    content: Then say, ‘
  - type: text
    content: Lord
  - type: text
    content: ', you have said that you will destroy Babylon so that neither people nor animals will remain here. She will lie empty and abandoned forever.’ '
  '63':
  - type: text
    content: 'When you have finished reading the scroll, tie it to a stone and throw it into the Euphrates River. '
  '64':
  - type: text
    content: Then say, ‘In this same way Babylon and her people will sink, never again to rise, because of the disasters I will bring upon her.’”
  - type: text
    content: This is the end of Jeremiah’s messages.
  '7':
  - type: text
    content: 'Babylon has been a gold cup in the '
  - type: text
    content: Lord
  - type: text
    content: ’s hands,
  - type: text
    content: a cup that made the whole earth drunk.
  - type: text
    content: The nations drank Babylon’s wine,
  - type: text
    content: and it drove them all mad.
  '8':
  - type: text
    content: But suddenly Babylon, too, has fallen.
  - type: text
    content: Weep for her.
  - type: text
    content: Give her medicine.
  - type: text
    content: Perhaps she can yet be healed.
  '9':
  - type: text
    content: We would have helped her if we could,
  - type: text
    content: but nothing can save her now.
  - type: text
    content: Let her go; abandon her.
  - type: text
    content: Return now to your own land.
  - type: text
    content: For her punishment reaches to the heavens;
  - type: text
    content: it is so great it cannot be measured.
