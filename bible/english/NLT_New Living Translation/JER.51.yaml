document_id: JER.51
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will stir up a destroyer against Babylon
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the people of Babylonia.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of Leb-kamai, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a code name for Babylonia.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Foreigners will come and winnow her,
- type: usfm
  marker: q2
  children:
  - type: text
    text: blowing her away as chaff.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will come from every side
- type: usfm
  marker: q2
  children:
  - type: text
    text: to rise against her in her day of trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Don’t let the archers put on their armor
- type: usfm
  marker: q2
  children:
  - type: text
    text: or draw their bows.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t spare even her best soldiers!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let her army be completely destroyed.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They will fall dead in the land of the Babylonians,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Chaldeans; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 51:54.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: slashed to death in her streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies'
- type: usfm
  marker: q2
  children:
  - type: text
    text: has not abandoned Israel and Judah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is still their God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even though their land was filled with sin
- type: usfm
  marker: q2
  children:
  - type: text
    text: against the Holy One of Israel.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Flee from Babylon! Save yourselves!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t get trapped in her punishment!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'It is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s time for vengeance;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will repay her in full.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Babylon has been a gold cup in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s hands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a cup that made the whole earth drunk.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The nations drank Babylon’s wine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and it drove them all mad.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But suddenly Babylon, too, has fallen.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Weep for her.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give her medicine.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Perhaps she can yet be healed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: We would have helped her if we could,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but nothing can save her now.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let her go; abandon her.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Return now to your own land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For her punishment reaches to the heavens;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is so great it cannot be measured.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has vindicated us.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Come, let us announce in Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Zion; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 51:24.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'everything the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God has done.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sharpen the arrows!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Lift up the shields!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Fill up the quivers.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has inspired the kings of the Medes'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to march against Babylon and destroy her.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is his vengeance against those
- type: usfm
  marker: q2
  children:
  - type: text
    text: who desecrated his Temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raise the battle flag against Babylon!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Reinforce the guard and station the watchmen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prepare an ambush,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will fulfill all his plans against Babylon.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You are a city by a great river,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a great center of commerce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but your end has come.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The thread of your life is cut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies has taken this vow'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and has sworn to it by his own name:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Your cities will be filled with enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like fields swarming with locusts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will shout in triumph over you.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'A Hymn of Praise to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' made the earth by his power,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he preserves it by his wisdom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: With his own understanding
- type: usfm
  marker: q2
  children:
  - type: text
    text: he stretched out the heavens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When he speaks in the thunder,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the heavens roar with rain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He causes the clouds to rise over the earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He sends the lightning with the rain
- type: usfm
  marker: q2
  children:
  - type: text
    text: and releases the wind from his storehouses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The whole human race is foolish and has no knowledge!
- type: usfm
  marker: q2
  children:
  - type: text
    text: The craftsmen are disgraced by the idols they make,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for their carefully shaped works are a fraud.
- type: usfm
  marker: q2
  children:
  - type: text
    text: These idols have no breath or power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Idols are worthless; they are ridiculous lies!
- type: usfm
  marker: q2
  children:
  - type: text
    text: On the day of reckoning they will all be destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But the God of Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the Portion of Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note on 5:20.
    marker-yv: yv-n
  - type: text
    text: ' is no idol!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is the Creator of everything that exists,
- type: usfm
  marker: q1
  children:
  - type: text
    text: including his people, his own special possession.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies is his name!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Babylon’s Great Punishment
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “You
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Possibly Cyrus, whom God used to conquer Babylon. Compare Isa 44:28; 45:1.
    marker-yv: yv-n
  - type: text
    text: ' are my battle-ax and sword,”'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “With you I will shatter nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: and destroy many kingdoms.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: With you I will shatter armies—
- type: usfm
  marker: q2
  children:
  - type: text
    text: destroying the horse and rider,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the chariot and charioteer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: With you I will shatter men and women,
- type: usfm
  marker: q2
  children:
  - type: text
    text: old people and children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: young men and young women.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: With you I will shatter shepherds and flocks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: farmers and oxen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: captains and officers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “I will repay Babylon
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the people of Babylonia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Chaldea; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 51:35.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: for all the wrong they have done
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to my people in Jerusalem,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “Look, O mighty mountain, destroyer of the earth!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I am your enemy,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will raise my fist against you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to knock you down from the heights.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I am finished,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will be nothing but a heap of burnt rubble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: You will be desolate forever.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even your stones will never again be used for building.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will be completely wiped out,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Raise a signal flag to the nations.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Sound the battle cry!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mobilize them all against Babylon.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Prepare them to fight against her!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring out the armies of Ararat, Minni, and Ashkenaz.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Appoint a commander,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring a multitude of horses like swarming locusts!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Bring against her the armies of the nations—
- type: usfm
  marker: q2
  children:
  - type: text
    text: led by the kings of the Medes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all their captains and officers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The earth trembles and writhes in pain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for everything the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has planned against Babylon stands unchanged.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babylon will be left desolate without a single inhabitant.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Her mightiest warriors no longer fight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They stay in their barracks, their courage gone.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They have become like women.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The invaders have burned the houses
- type: usfm
  marker: q2
  children:
  - type: text
    text: and broken down the city gates.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
