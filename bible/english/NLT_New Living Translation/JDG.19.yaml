document_id: JDG.19,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Levite and His Concubine
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now in those days Israel had no king. There was a man from the tribe of Levi living in a remote area of the hill country of Ephraim. One day he brought home a woman from Bethlehem in Judah to be his concubine. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But this time the man was determined to leave. So he took his two saddled donkeys and his concubine and headed in the direction of Jebus (that is, Jerusalem). '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: It was late in the day when they neared Jebus, and the man’s servant said to him, “Let’s stop at this Jebusite town and spend the night there.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“No,” his master said, “we can’t stay in this foreign town where there are no Israelites. Instead, we will go on to Gibeah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Come on, let’s try to get as far as Gibeah or Ramah, and we’ll spend the night in one of those towns.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So they went on. The sun was setting as they came to Gibeah, a town in the land of Benjamin, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: so they stopped there to spend the night. They rested in the town square, but no one took them in for the night.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'That evening an old man came home from his work in the fields. He was from the hill country of Ephraim, but he was living in Gibeah, where the people were from the tribe of Benjamin. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: When he saw the travelers sitting in the town square, he asked them where they were from and where they were going.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “We have been in Bethlehem in Judah,” the man replied. “We are on our way to a remote area in the hill country of Ephraim, which is my home. I traveled to Bethlehem, and now I’m returning home.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version (see also 19:29); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'now I’m going to the Tabernacle of the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' But no one has taken us in for the night, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: even though we have everything we need. We have straw and feed for our donkeys and plenty of bread and wine for ourselves.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: But she became angry with him
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: she was unfaithful to him.
      marker-yv: yv-n
    - type: text
      text: ' and returned to her father’s home in Bethlehem.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After about four months, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“You are welcome to stay with me,” the old man said. “I will give you anything you might need. But whatever you do, don’t spend the night in the square.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: So he took them home with him and fed the donkeys. After they washed their feet, they ate and drank together.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: While they were enjoying themselves, a crowd of troublemakers from the town surrounded the house. They began beating at the door and shouting to the old man, “Bring out the man who is staying with you so we can have sex with him.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The old man stepped outside to talk to them. “No, my brothers, don’t do such an evil thing. For this man is a guest in my house, and such a thing would be shameful. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Here, take my virgin daughter and this man’s concubine. I will bring them out to you, and you can abuse them and do whatever you like. But don’t do such a shameful thing to this man.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But they wouldn’t listen to him. So the Levite took hold of his concubine and pushed her out the door. The men of the town abused her all night, taking turns raping her until morning. Finally, at dawn they let her go. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: At daybreak the woman returned to the house where her husband was staying. She collapsed at the door of the house and lay there until it was light.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'When her husband opened the door to leave, there lay his concubine with her hands on the threshold. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: He said, “Get up! Let’s go!” But there was no answer.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version adds '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for she was dead.
      marker-yv: yv-n
    - type: text
      text: ' So he put her body on his donkey and took her home.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: When he got home, he took a knife and cut his concubine’s body into twelve pieces. Then he sent one piece to each tribe throughout all the territory of Israel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: her husband set out for Bethlehem to speak personally to her and persuade her to come back. He took with him a servant and a pair of donkeys. When he arrived at
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: When she brought him to.
      marker-yv: yv-n
    - type: text
      text: ' her father’s house, her father saw him and welcomed him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Everyone who saw it said, “Such a horrible crime has not been committed in all the time since Israel left Egypt. Think about it! What are we going to do? Who’s going to speak up?”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Her father urged him to stay awhile, so he stayed three days, eating, drinking, and sleeping there.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'On the fourth day the man was up early, ready to leave, but the woman’s father said to his son-in-law, “Have something to eat before you go.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So the two men sat down together and had something to eat and drink. Then the woman’s father said, “Please stay another night and enjoy yourself.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The man got up to leave, but his father-in-law kept urging him to stay, so he finally gave in and stayed the night.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'On the morning of the fifth day he was up early again, ready to leave, and again the woman’s father said, “Have something to eat; then you can leave later this afternoon.” So they had another day of feasting. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Later, as the man and his concubine and servant were preparing to leave, his father-in-law said, “Look, it’s almost evening. Stay the night and enjoy yourself. Tomorrow you can get up early and be on your way.”
