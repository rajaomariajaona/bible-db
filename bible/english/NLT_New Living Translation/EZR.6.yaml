document_id: EZR.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Darius Approves the Rebuilding
  - type: text
    content: 'So King Darius issued orders that a search be made in the Babylonian archives, which were stored in the treasury. '
  '10':
  - type: text
    content: Then they will be able to offer acceptable sacrifices to the God of heaven and pray for the welfare of the king and his sons.
  '11':
  - type: text
    content: “Those who violate this decree in any way will have a beam pulled from their house. Then they will be lifted up and impaled on it, and their house will be reduced to a pile of rubble.
  - type: note
    content: Aramaic a dunghill.
  - type: text
    content: ' '
  '12':
  - type: text
    content: May the God who has chosen the city of Jerusalem as the place to honor his name destroy any king or nation that violates this command and destroys this Temple.
  - type: text
    content: “I, Darius, have issued this decree. Let it be obeyed with all diligence.”
  - type: heading
    content: The Temple’s Dedication
  '13':
  - type: text
    content: 'Tattenai, governor of the province west of the Euphrates River, and Shethar-bozenai and their colleagues complied at once with the command of King Darius. '
  '14':
  - type: text
    content: 'So the Jewish elders continued their work, and they were greatly encouraged by the preaching of the prophets Haggai and Zechariah son of Iddo. The Temple was finally finished, as had been commanded by the God of Israel and decreed by Cyrus, Darius, and Artaxerxes, the kings of Persia. '
  '15':
  - type: text
    content: The Temple was completed on March 12,
  - type: note
    content: Aramaic on the third day of the month Adar, of the ancient Hebrew lunar calendar. A number of events in Ezra can be cross-checked with dates in surviving Persian records and related accurately to our modern calendar. This day was March 12, 515 b.c.
  - type: text
    content: ' during the sixth year of King Darius’s reign.'
  '16':
  - type: text
    content: 'The Temple of God was then dedicated with great joy by the people of Israel, the priests, the Levites, and the rest of the people who had returned from exile. '
  '17':
  - type: text
    content: 'During the dedication ceremony for the Temple of God, 100 young bulls, 200 rams, and 400 male lambs were sacrificed. And 12 male goats were presented as a sin offering for the twelve tribes of Israel. '
  '18':
  - type: text
    content: Then the priests and Levites were divided into their various divisions to serve at the Temple of God in Jerusalem, as prescribed in the Book of Moses.
  - type: heading
    content: Celebration of Passover
  '19':
  - type: text
    content: On April 21
  - type: note
    content: Hebrew On the fourteenth day of the first month, of the ancient Hebrew lunar calendar. This day was April 21, 515 b.c.; also see note on 6:15.
  - type: text
    content: ' the returned exiles celebrated Passover. '
  '2':
  - type: text
    content: 'But it was at the fortress at Ecbatana in the province of Media that a scroll was found. This is what it said:'
  - type: text
    content: '“Memorandum:'
  '20':
  - type: text
    content: 'The priests and Levites had purified themselves and were ceremonially clean. So they slaughtered the Passover lamb for all the returned exiles, for their fellow priests, and for themselves. '
  '21':
  - type: text
    content: 'The Passover meal was eaten by the people of Israel who had returned from exile and by the others in the land who had turned from their corrupt practices to worship the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '22':
  - type: text
    content: 'Then they celebrated the Festival of Unleavened Bread for seven days. There was great joy throughout the land because the '
  - type: text
    content: Lord
  - type: text
    content: ' had caused the king of Assyria'
  - type: note
    content: King Darius of Persia is here identified as the king of Assyria because Persia had conquered the Babylonian Empire, which included the earlier Assyrian Empire.
  - type: text
    content: ' to be favorable to them, so that he helped them to rebuild the Temple of God, the God of Israel.'
  '3':
  - type: text
    content: “In the first year of King Cyrus’s reign, a decree was sent out concerning the Temple of God at Jerusalem.
  - type: text
    content: “Let the Temple be rebuilt on the site where Jews used to offer their sacrifices, using the original foundations. Its height will be ninety feet, and its width will be ninety feet.
  - type: note
    content: 'Aramaic Its height will be 60 cubits [27.6 meters], and its width will be 60 cubits. It is commonly held that this verse should be emended to read: “Its height will be 30 cubits [45 feet or 13.8 meters], its length will be 60 cubits [90 feet or 27.6 meters], and its width will be 20 cubits [30 feet or 9.2 meters]”; compare 1 Kgs 6:2. The emendation regarding the width is supported by the Syriac version.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Every three layers of specially prepared stones will be topped by a layer of timber. All expenses will be paid by the royal treasury. '
  '5':
  - type: text
    content: Furthermore, the gold and silver cups, which were taken to Babylon by Nebuchadnezzar from the Temple of God in Jerusalem, must be returned to Jerusalem and put back where they belong. Let them be taken back to the Temple of God.”
  '6':
  - type: text
    content: 'So King Darius sent this message:'
  - type: text
    content: “Now therefore, Tattenai, governor of the province west of the Euphrates River,
  - type: note
    content: Aramaic the province beyond the river; also in 6:6b, 8, 13.
  - type: text
    content: ' and Shethar-bozenai, and your colleagues and other officials west of the Euphrates River—stay away from there! '
  '7':
  - type: text
    content: Do not disturb the construction of the Temple of God. Let it be rebuilt on its original site, and do not hinder the governor of Judah and the elders of the Jews in their work.
  '8':
  - type: text
    content: “Moreover, I hereby decree that you are to help these elders of the Jews as they rebuild this Temple of God. You must pay the full construction costs, without delay, from my taxes collected in the province west of the Euphrates River so that the work will not be interrupted.
  '9':
  - type: text
    content: '“Give the priests in Jerusalem whatever is needed in the way of young bulls, rams, and male lambs for the burnt offerings presented to the God of heaven. And without fail, provide them with as much wheat, salt, wine, and olive oil as they need each day. '
