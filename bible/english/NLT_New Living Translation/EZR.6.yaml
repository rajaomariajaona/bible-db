document_id: EZR.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Darius Approves the Rebuilding
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So King Darius issued orders that a search be made in the Babylonian archives, which were stored in the treasury. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But it was at the fortress at Ecbatana in the province of Media that a scroll was found. This is what it said:'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: '“Memorandum:'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “In the first year of King Cyrus’s reign, a decree was sent out concerning the Temple of God at Jerusalem.
- type: usfm
  marker: pm
  children:
  - type: text
    text: “Let the Temple be rebuilt on the site where Jews used to offer their sacrifices, using the original foundations. Its height will be ninety feet, and its width will be ninety feet.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Its height will be 60 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[27.6 meters], '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'and its width will be 60 cubits. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'It is commonly held that this verse should be emended to read: “Its height will be 30 cubits [45 feet or 13.8 meters], its length will be 60 cubits [90 feet or 27.6 meters], and its width will be 20 cubits [30 feet or 9.2 meters]”; compare 1 Kgs 6:2. The emendation regarding the width is supported by the Syriac version.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Every three layers of specially prepared stones will be topped by a layer of timber. All expenses will be paid by the royal treasury. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Furthermore, the gold and silver cups, which were taken to Babylon by Nebuchadnezzar from the Temple of God in Jerusalem, must be returned to Jerusalem and put back where they belong. Let them be taken back to the Temple of God.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So King Darius sent this message:'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: “Now therefore, Tattenai, governor of the province west of the Euphrates River,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the province beyond the river; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 6:6b, 8, 13.
    marker-yv: yv-n
  - type: text
    text: ' and Shethar-bozenai, and your colleagues and other officials west of the Euphrates River—stay away from there! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Do not disturb the construction of the Temple of God. Let it be rebuilt on its original site, and do not hinder the governor of Judah and the elders of the Jews in their work.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Moreover, I hereby decree that you are to help these elders of the Jews as they rebuild this Temple of God. You must pay the full construction costs, without delay, from my taxes collected in the province west of the Euphrates River so that the work will not be interrupted.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Give the priests in Jerusalem whatever is needed in the way of young bulls, rams, and male lambs for the burnt offerings presented to the God of heaven. And without fail, provide them with as much wheat, salt, wine, and olive oil as they need each day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then they will be able to offer acceptable sacrifices to the God of heaven and pray for the welfare of the king and his sons.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Those who violate this decree in any way will have a beam pulled from their house. Then they will be lifted up and impaled on it, and their house will be reduced to a pile of rubble.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a dunghill.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: May the God who has chosen the city of Jerusalem as the place to honor his name destroy any king or nation that violates this command and destroys this Temple.
- type: usfm
  marker: pm
  children:
  - type: text
    text: “I, Darius, have issued this decree. Let it be obeyed with all diligence.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Temple’s Dedication
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tattenai, governor of the province west of the Euphrates River, and Shethar-bozenai and their colleagues complied at once with the command of King Darius. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So the Jewish elders continued their work, and they were greatly encouraged by the preaching of the prophets Haggai and Zechariah son of Iddo. The Temple was finally finished, as had been commanded by the God of Israel and decreed by Cyrus, Darius, and Artaxerxes, the kings of Persia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The Temple was completed on March 12,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on the third day of the month Adar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. A number of events in Ezra can be cross-checked with dates in surviving Persian records and related accurately to our modern calendar. This day was March 12, 515 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' during the sixth year of King Darius’s reign.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The Temple of God was then dedicated with great joy by the people of Israel, the priests, the Levites, and the rest of the people who had returned from exile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'During the dedication ceremony for the Temple of God, 100 young bulls, 200 rams, and 400 male lambs were sacrificed. And 12 male goats were presented as a sin offering for the twelve tribes of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then the priests and Levites were divided into their various divisions to serve at the Temple of God in Jerusalem, as prescribed in the Book of Moses.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Celebration of Passover
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: On April 21
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the fourteenth day of the first month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. This day was April 21, 515 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 6:15.
    marker-yv: yv-n
  - type: text
    text: ' the returned exiles celebrated Passover. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The priests and Levites had purified themselves and were ceremonially clean. So they slaughtered the Passover lamb for all the returned exiles, for their fellow priests, and for themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The Passover meal was eaten by the people of Israel who had returned from exile and by the others in the land who had turned from their corrupt practices to worship the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then they celebrated the Festival of Unleavened Bread for seven days. There was great joy throughout the land because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had caused the king of Assyria'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: King Darius of Persia is here identified as the king of Assyria because Persia had conquered the Babylonian Empire, which included the earlier Assyrian Empire.
    marker-yv: yv-n
  - type: text
    text: ' to be favorable to them, so that he helped them to rebuild the Temple of God, the God of Israel.'
