document_id: ISA.51,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'A Call to Trust the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen to me, all who hope for deliverance—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'all who seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Consider the rock from which you were cut,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the quarry from which you were mined.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are you not the same today,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the one who dried up the sea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: making a path of escape through the depths
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that your people could cross over?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Those who have been ransomed by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will return.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will enter Jerusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zion.
      marker-yv: yv-n
    - type: text
      text: ' singing,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: crowned with everlasting joy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sorrow and mourning will disappear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will be filled with joy and gladness.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I, yes I, am the one who comforts you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So why are you afraid of mere humans,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who wither like the grass and disappear?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet you have forgotten the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', your Creator,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the one who stretched out the sky like a canopy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and laid the foundations of the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you remain in constant dread of human oppressors?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you continue to fear the anger of your enemies?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where is their fury and anger now?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It is gone!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soon all you captives will be released!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Imprisonment, starvation, and death will not be your fate!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who stirs up the sea, causing its waves to roar.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My name is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I have put my words in your mouth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hidden you safely in my hand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I stretched out
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Syriac version (see also 51:13); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: planted.
      marker-yv: yv-n
    - type: text
      text: ' the sky like a canopy'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and laid the foundations of the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am the one who says to Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘You are my people!’”
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wake up, wake up, O Jerusalem!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You have drunk the cup of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s fury.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have drunk the cup of terror,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tipping out its last drops.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not one of your children is left alive
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to take your hand and guide you.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'These two calamities have fallen on you:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: desolation and destruction, famine and war.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who is left to sympathize with you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who is left to comfort you?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Dead Sea Scrolls and Greek, Latin, and Syriac versions; Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: How can I comfort you?
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, think about Abraham, your ancestor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Sarah, who gave birth to your nation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Abraham was only one man when I called him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But when I blessed him, he became a great nation.”
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your children have fainted and lie in the streets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: helpless as antelopes caught in a net.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has poured out his fury;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God has rebuked them.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But now listen to this, you afflicted ones
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who sit in a drunken stupor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though not from drinking wine.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'your God and Defender, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See, I have taken the terrible cup from your hands.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will drink no more of my fury.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead, I will hand that cup to your tormentors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who said, ‘We will trample you into the dust
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and walk on your backs.’”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will comfort Israel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Zion; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 51:16.
      marker-yv: yv-n
    - type: text
      text: ' again'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have pity on her ruins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her desert will blossom like Eden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'her barren wilderness like the garden of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Joy and gladness will be found there.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Songs of thanksgiving will fill the air.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen to me, my people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hear me, Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for my law will be proclaimed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my justice will become a light to the nations.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My mercy and justice are coming soon.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My salvation is on the way.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My strong arm will bring justice to the nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All distant lands will look to me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wait in hope for my powerful arm.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look up to the skies above,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gaze down on the earth below.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the skies will disappear like smoke,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the earth will wear out like a piece of clothing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people of the earth will die like flies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but my salvation lasts forever.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My righteous rule will never end!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen to me, you who know right from wrong,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who cherish my law in your hearts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not be afraid of people’s scorn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor fear their insults.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the moth will devour them as it devours clothing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The worm will eat at them as it eats wool.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But my righteousness will last forever.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My salvation will continue from generation to generation.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wake up, wake up, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! Clothe yourself with strength!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Flex your mighty right arm!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rouse yourself as in the days of old
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you slew Egypt, the dragon of the Nile.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'You slew Rahab; you pierced the dragon. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rahab is the name of a mythical sea monster that represents chaos in ancient literature. The name is used here as a poetic name for Egypt.
      marker-yv: yv-n
