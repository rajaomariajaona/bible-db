document_id: ISA.51,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Trust the Lord
  - type: text
    content: “Listen to me, all who hope for deliverance—
  - type: text
    content: 'all who seek the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Consider the rock from which you were cut,
  - type: text
    content: the quarry from which you were mined.
  '10':
  - type: text
    content: Are you not the same today,
  - type: text
    content: the one who dried up the sea,
  - type: text
    content: making a path of escape through the depths
  - type: text
    content: so that your people could cross over?
  '11':
  - type: text
    content: 'Those who have been ransomed by the '
  - type: text
    content: Lord
  - type: text
    content: ' will return.'
  - type: text
    content: They will enter Jerusalem
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ' singing,'
  - type: text
    content: crowned with everlasting joy.
  - type: text
    content: Sorrow and mourning will disappear,
  - type: text
    content: and they will be filled with joy and gladness.
  '12':
  - type: text
    content: “I, yes I, am the one who comforts you.
  - type: text
    content: So why are you afraid of mere humans,
  - type: text
    content: who wither like the grass and disappear?
  '13':
  - type: text
    content: 'Yet you have forgotten the '
  - type: text
    content: Lord
  - type: text
    content: ', your Creator,'
  - type: text
    content: the one who stretched out the sky like a canopy
  - type: text
    content: and laid the foundations of the earth.
  - type: text
    content: Will you remain in constant dread of human oppressors?
  - type: text
    content: Will you continue to fear the anger of your enemies?
  - type: text
    content: Where is their fury and anger now?
  - type: text
    content: It is gone!
  '14':
  - type: text
    content: Soon all you captives will be released!
  - type: text
    content: Imprisonment, starvation, and death will not be your fate!
  '15':
  - type: text
    content: 'For I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: who stirs up the sea, causing its waves to roar.
  - type: text
    content: 'My name is the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '16':
  - type: text
    content: And I have put my words in your mouth
  - type: text
    content: and hidden you safely in my hand.
  - type: text
    content: I stretched out
  - type: note
    content: As in Syriac version (see also 51:13); Hebrew reads planted.
  - type: text
    content: ' the sky like a canopy'
  - type: text
    content: and laid the foundations of the earth.
  - type: text
    content: I am the one who says to Israel,
  - type: text
    content: ‘You are my people!’”
  '17':
  - type: text
    content: Wake up, wake up, O Jerusalem!
  - type: text
    content: 'You have drunk the cup of the '
  - type: text
    content: Lord
  - type: text
    content: ’s fury.
  - type: text
    content: You have drunk the cup of terror,
  - type: text
    content: tipping out its last drops.
  '18':
  - type: text
    content: Not one of your children is left alive
  - type: text
    content: to take your hand and guide you.
  '19':
  - type: text
    content: 'These two calamities have fallen on you:'
  - type: text
    content: desolation and destruction, famine and war.
  - type: text
    content: And who is left to sympathize with you?
  - type: text
    content: Who is left to comfort you?
  - type: note
    content: As in Dead Sea Scrolls and Greek, Latin, and Syriac versions; Masoretic Text reads How can I comfort you?
  '2':
  - type: text
    content: Yes, think about Abraham, your ancestor,
  - type: text
    content: and Sarah, who gave birth to your nation.
  - type: text
    content: Abraham was only one man when I called him.
  - type: text
    content: But when I blessed him, he became a great nation.”
  '20':
  - type: text
    content: For your children have fainted and lie in the streets,
  - type: text
    content: helpless as antelopes caught in a net.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has poured out his fury;'
  - type: text
    content: God has rebuked them.
  '21':
  - type: text
    content: But now listen to this, you afflicted ones
  - type: text
    content: who sit in a drunken stupor,
  - type: text
    content: though not from drinking wine.
  '22':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'your God and Defender, says:'
  - type: text
    content: “See, I have taken the terrible cup from your hands.
  - type: text
    content: You will drink no more of my fury.
  '23':
  - type: text
    content: Instead, I will hand that cup to your tormentors,
  - type: text
    content: those who said, ‘We will trample you into the dust
  - type: text
    content: and walk on your backs.’”
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will comfort Israel'
  - type: note
    content: Hebrew Zion; also in 51:16.
  - type: text
    content: ' again'
  - type: text
    content: and have pity on her ruins.
  - type: text
    content: Her desert will blossom like Eden,
  - type: text
    content: 'her barren wilderness like the garden of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Joy and gladness will be found there.
  - type: text
    content: Songs of thanksgiving will fill the air.
  '4':
  - type: text
    content: “Listen to me, my people.
  - type: text
    content: Hear me, Israel,
  - type: text
    content: for my law will be proclaimed,
  - type: text
    content: and my justice will become a light to the nations.
  '5':
  - type: text
    content: My mercy and justice are coming soon.
  - type: text
    content: My salvation is on the way.
  - type: text
    content: My strong arm will bring justice to the nations.
  - type: text
    content: All distant lands will look to me
  - type: text
    content: and wait in hope for my powerful arm.
  '6':
  - type: text
    content: Look up to the skies above,
  - type: text
    content: and gaze down on the earth below.
  - type: text
    content: For the skies will disappear like smoke,
  - type: text
    content: and the earth will wear out like a piece of clothing.
  - type: text
    content: The people of the earth will die like flies,
  - type: text
    content: but my salvation lasts forever.
  - type: text
    content: My righteous rule will never end!
  '7':
  - type: text
    content: “Listen to me, you who know right from wrong,
  - type: text
    content: you who cherish my law in your hearts.
  - type: text
    content: Do not be afraid of people’s scorn,
  - type: text
    content: nor fear their insults.
  '8':
  - type: text
    content: For the moth will devour them as it devours clothing.
  - type: text
    content: The worm will eat at them as it eats wool.
  - type: text
    content: But my righteousness will last forever.
  - type: text
    content: My salvation will continue from generation to generation.”
  '9':
  - type: text
    content: 'Wake up, wake up, O '
  - type: text
    content: Lord
  - type: text
    content: '! Clothe yourself with strength!'
  - type: text
    content: Flex your mighty right arm!
  - type: text
    content: Rouse yourself as in the days of old
  - type: text
    content: when you slew Egypt, the dragon of the Nile.
  - type: note
    content: Hebrew You slew Rahab; you pierced the dragon. Rahab is the name of a mythical sea monster that represents chaos in ancient literature. The name is used here as a poetic name for Egypt.
