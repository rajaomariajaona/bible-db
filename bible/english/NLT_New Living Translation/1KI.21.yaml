document_id: 1KI.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Naboth’s Vineyard
  - type: text
    content: 'Now there was a man named Naboth, from Jezreel, who owned a vineyard in Jezreel beside the palace of King Ahab of Samaria. '
  '10':
  - type: text
    content: And then seat two scoundrels across from him who will accuse him of cursing God and the king. Then take him out and stone him to death.”
  '11':
  - type: text
    content: 'So the elders and other town leaders followed the instructions Jezebel had written in the letters. '
  '12':
  - type: text
    content: 'They called for a fast and put Naboth at a prominent place before the people. '
  '13':
  - type: text
    content: 'Then the two scoundrels came and sat down across from him. And they accused Naboth before all the people, saying, “He cursed God and the king.” So he was dragged outside the town and stoned to death. '
  '14':
  - type: text
    content: The town leaders then sent word to Jezebel, “Naboth has been stoned to death.”
  '15':
  - type: text
    content: 'When Jezebel heard the news, she said to Ahab, “You know the vineyard Naboth wouldn’t sell you? Well, you can have it now! He’s dead!” '
  '16':
  - type: text
    content: So Ahab immediately went down to the vineyard of Naboth to claim it.
  '17':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Elijah,'
  - type: note
    content: Hebrew Elijah the Tishbite; also in 21:28.
  - type: text
    content: ' '
  '18':
  - type: text
    content: '“Go down to meet King Ahab of Israel, who rules in Samaria. He will be at Naboth’s vineyard in Jezreel, claiming it for himself. '
  '19':
  - type: text
    content: 'Give him this message: ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Wasn’t it enough that you killed Naboth? Must you rob him, too? Because you have done this, dogs will lick your blood at the very place where they licked the blood of Naboth!’”'
  '2':
  - type: text
    content: One day Ahab said to Naboth, “Since your vineyard is so convenient to my palace, I would like to buy it to use as a vegetable garden. I will give you a better vineyard in exchange, or if you prefer, I will pay you for it.”
  '20':
  - type: text
    content: “So, my enemy, you have found me!” Ahab exclaimed to Elijah.
  - type: text
    content: '“Yes,” Elijah answered, “I have come because you have sold yourself to what is evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight. '
  '21':
  - type: text
    content: 'So now the '
  - type: text
    content: Lord
  - type: text
    content: ' says,'
  - type: note
    content: As in Greek version; Hebrew lacks So now the Lord says.
  - type: text
    content: ' ‘I will bring disaster on you and consume you. I will destroy every one of your male descendants, slave and free alike, anywhere in Israel! '
  '22':
  - type: text
    content: I am going to destroy your family as I did the family of Jeroboam son of Nebat and the family of Baasha son of Ahijah, for you have made me very angry and have led Israel into sin.’
  '23':
  - type: text
    content: '“And regarding Jezebel, the '
  - type: text
    content: Lord
  - type: text
    content: ' says, ‘Dogs will eat Jezebel’s body at the plot of land in Jezreel.'
  - type: note
    content: As in several Hebrew manuscripts, Syriac, and Latin Vulgate (see also 2 Kgs 9:26, 36); most Hebrew manuscripts read at the city wall.
  - type: text
    content: ’
  '24':
  - type: text
    content: “The members of Ahab’s family who die in the city will be eaten by dogs, and those who die in the field will be eaten by vultures.”
  '25':
  - type: text
    content: '(No one else so completely sold himself to what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight as Ahab did under the influence of his wife Jezebel. '
  '26':
  - type: text
    content: His worst outrage was worshiping idols
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung.
  - type: text
    content: ' just as the Amorites had done—the people whom the '
  - type: text
    content: Lord
  - type: text
    content: ' had driven out from the land ahead of the Israelites.)'
  '27':
  - type: text
    content: But when Ahab heard this message, he tore his clothing, dressed in burlap, and fasted. He even slept in burlap and went about in deep mourning.
  '28':
  - type: text
    content: 'Then another message from the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Elijah: '
  '29':
  - type: text
    content: “Do you see how Ahab has humbled himself before me? Because he has done this, I will not do what I promised during his lifetime. It will happen to his sons; I will destroy his dynasty.”
  '3':
  - type: text
    content: 'But Naboth replied, “The '
  - type: text
    content: Lord
  - type: text
    content: ' forbid that I should give you the inheritance that was passed down by my ancestors.”'
  '4':
  - type: text
    content: So Ahab went home angry and sullen because of Naboth’s answer. The king went to bed with his face to the wall and refused to eat!
  '5':
  - type: text
    content: “What’s the matter?” his wife Jezebel asked him. “What’s made you so upset that you’re not eating?”
  '6':
  - type: text
    content: “I asked Naboth to sell me his vineyard or trade it, but he refused!” Ahab told her.
  '7':
  - type: text
    content: “Are you the king of Israel or not?” Jezebel demanded. “Get up and eat something, and don’t worry about it. I’ll get you Naboth’s vineyard!”
  '8':
  - type: text
    content: 'So she wrote letters in Ahab’s name, sealed them with his seal, and sent them to the elders and other leaders of the town where Naboth lived. '
  '9':
  - type: text
    content: 'In her letters she commanded: “Call the citizens together for a time of fasting, and give Naboth a place of honor. '
