document_id: JHN.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Is Betrayed and Arrested
  - type: text
    content: 'After saying these things, Jesus crossed the Kidron Valley with his disciples and entered a grove of olive trees. '
  '10':
  - type: text
    content: 'Then Simon Peter drew a sword and slashed off the right ear of Malchus, the high priest’s slave. '
  '11':
  - type: text
    content: 'But Jesus said to Peter, '
  - type: text
    content: “Put your sword back into its sheath. Shall I not drink from the cup of suffering the Father has given me?”
  - type: heading
    content: Jesus at the High Priest’s House
  '12':
  - type: text
    content: 'So the soldiers, their commanding officer, and the Temple guards arrested Jesus and tied him up. '
  '13':
  - type: text
    content: First they took him to Annas, since he was the father-in-law of Caiaphas, the high priest at that time.
  - type: note
    content: Greek that year.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Caiaphas was the one who had told the other Jewish leaders, “It’s better that one man should die for the people.”
  - type: heading
    content: Peter’s First Denial
  '15':
  - type: text
    content: 'Simon Peter followed Jesus, as did another of the disciples. That other disciple was acquainted with the high priest, so he was allowed to enter the high priest’s courtyard with Jesus. '
  '16':
  - type: text
    content: 'Peter had to stay outside the gate. Then the disciple who knew the high priest spoke to the woman watching at the gate, and she let Peter in. '
  '17':
  - type: text
    content: The woman asked Peter, “You’re not one of that man’s disciples, are you?”
  - type: text
    content: “No,” he said, “I am not.”
  '18':
  - type: text
    content: Because it was cold, the household servants and the guards had made a charcoal fire. They stood around it, warming themselves, and Peter stood with them, warming himself.
  - type: heading
    content: The High Priest Questions Jesus
  '19':
  - type: text
    content: 'Inside, the high priest began asking Jesus about his followers and what he had been teaching them. '
  '2':
  - type: text
    content: 'Judas, the betrayer, knew this place, because Jesus had often gone there with his disciples. '
  '20':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Everyone knows what I teach. I have preached regularly in the synagogues and the Temple, where the people
  - type: note
    content: Greek Jewish people; also in 18:38.
  - type: text
    content: ' '
  - type: text
    content: gather. I have not spoken in secret.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Why are you asking me this question? Ask those who heard me. They know what I said.”
  '22':
  - type: text
    content: Then one of the Temple guards standing nearby slapped Jesus across the face. “Is that the way to answer the high priest?” he demanded.
  '23':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “If I said anything wrong, you must prove it. But if I’m speaking the truth, why are you beating me?”
  '24':
  - type: text
    content: Then Annas bound Jesus and sent him to Caiaphas, the high priest.
  - type: heading
    content: Peter’s Second and Third Denials
  '25':
  - type: text
    content: Meanwhile, as Simon Peter was standing by the fire warming himself, they asked him again, “You’re not one of his disciples, are you?”
  - type: text
    content: He denied it, saying, “No, I am not.”
  '26':
  - type: text
    content: 'But one of the household slaves of the high priest, a relative of the man whose ear Peter had cut off, asked, “Didn’t I see you out there in the olive grove with Jesus?” '
  '27':
  - type: text
    content: Again Peter denied it. And immediately a rooster crowed.
  - type: heading
    content: Jesus’ Trial before Pilate
  '28':
  - type: text
    content: Jesus’ trial before Caiaphas ended in the early hours of the morning. Then he was taken to the headquarters of the Roman governor.
  - type: note
    content: Greek to the Praetorium; also in 18:33.
  - type: text
    content: ' His accusers didn’t go inside because it would defile them, and they wouldn’t be allowed to celebrate the Passover. '
  '29':
  - type: text
    content: So Pilate, the governor, went out to them and asked, “What is your charge against this man?”
  '3':
  - type: text
    content: The leading priests and Pharisees had given Judas a contingent of Roman soldiers and Temple guards to accompany him. Now with blazing torches, lanterns, and weapons, they arrived at the olive grove.
  '30':
  - type: text
    content: “We wouldn’t have handed him over to you if he weren’t a criminal!” they retorted.
  '31':
  - type: text
    content: “Then take him away and judge him by your own law,” Pilate told them.
  - type: text
    content: '“Only the Romans are permitted to execute someone,” the Jewish leaders replied. '
  '32':
  - type: text
    content: (This fulfilled Jesus’ prediction about the way he would die.
  - type: note
    content: See John 12:32-33.
  - type: text
    content: )
  '33':
  - type: text
    content: Then Pilate went back into his headquarters and called for Jesus to be brought to him. “Are you the king of the Jews?” he asked him.
  '34':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Is this your own question, or did others tell you about me?”
  '35':
  - type: text
    content: “Am I a Jew?” Pilate retorted. “Your own people and their leading priests brought you to me for trial. Why? What have you done?”
  '36':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “My Kingdom is not an earthly kingdom. If it were, my followers would fight to keep me from being handed over to the Jewish leaders. But my Kingdom is not of this world.”
  '37':
  - type: text
    content: Pilate said, “So you are a king?”
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “You say I am a king. Actually, I was born and came into the world to testify to the truth. All who love the truth recognize that what I say is true.”
  '38':
  - type: text
    content: '“What is truth?” Pilate asked. Then he went out again to the people and told them, “He is not guilty of any crime. '
  '39':
  - type: text
    content: But you have a custom of asking me to release one prisoner each year at Passover. Would you like me to release this ‘King of the Jews’?”
  '4':
  - type: text
    content: 'Jesus fully realized all that was going to happen to him, so he stepped forward to meet them. '
  - type: text
    content: '“Who are you looking for?” '
  - type: text
    content: he asked.
  '40':
  - type: text
    content: But they shouted back, “No! Not this man. We want Barabbas!” (Barabbas was a revolutionary.)
  '5':
  - type: text
    content: “Jesus the Nazarene,”
  - type: note
    content: Or Jesus of Nazareth; also in 18:7.
  - type: text
    content: ' they replied.'
  - type: text
    content: “
  - type: text
    content: I Am
  - type: text
    content: ' he,”'
  - type: text
    content: ' '
  - type: note
    content: Or “The ‘I Am’ is here”; or “I am the Lord”; Greek reads I am; also in 18:6, 8. See Exod 3:14.
  - type: text
    content: 'Jesus said. (Judas, who betrayed him, was standing with them.) '
  '6':
  - type: text
    content: 'As Jesus said '
  - type: text
    content: “
  - type: text
    content: I Am
  - type: text
    content: ' he,”'
  - type: text
    content: ' they all drew back and fell to the ground! '
  '7':
  - type: text
    content: 'Once more he asked them, '
  - type: text
    content: “Who are you looking for?”
  - type: text
    content: And again they replied, “Jesus the Nazarene.”
  '8':
  - type: text
    content: ' '
  - type: text
    content: '“I told you that '
  - type: text
    content: I Am
  - type: text
    content: ' he,” '
  - type: text
    content: 'Jesus said. '
  - type: text
    content: “And since I am the one you want, let these others go.”
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'He did this to fulfill his own statement: '
  - type: text
    content: “I did not lose a single one of those you have given me.”
  - type: note
    content: See John 6:39 and 17:12.
