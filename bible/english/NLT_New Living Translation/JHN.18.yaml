document_id: JHN.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Is Betrayed and Arrested
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After saying these things, Jesus crossed the Kidron Valley with his disciples and entered a grove of olive trees. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Judas, the betrayer, knew this place, because Jesus had often gone there with his disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The leading priests and Pharisees had given Judas a contingent of Roman soldiers and Temple guards to accompany him. Now with blazing torches, lanterns, and weapons, they arrived at the olive grove.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jesus fully realized all that was going to happen to him, so he stepped forward to meet them. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Who are you looking for?” '
  - type: text
    text: he asked.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Jesus the Nazarene,”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:5a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jesus of Nazareth; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 18:7.
    marker-yv: yv-n
  - type: text
    text: ' they replied.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: I Am
    - type: text
      text: ' he,”'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:5b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: “The ‘
      - type: usfm
        marker: nd
        children:
        - type: text
          text: I Am
      - type: text
        text: '’ is here”; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '“I am the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: '”; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'I am; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 18:6, 8. See Exod 3:14.
    marker-yv: yv-n
  - type: text
    text: 'Jesus said. (Judas, who betrayed him, was standing with them.) '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'As Jesus said '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: I Am
    - type: text
      text: ' he,”'
  - type: text
    text: ' they all drew back and fell to the ground! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Once more he asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who are you looking for?”
- type: usfm
  marker: p
  children:
  - type: text
    text: And again they replied, “Jesus the Nazarene.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I told you that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: I Am
    - type: text
      text: ' he,” '
  - type: text
    text: 'Jesus said. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “And since I am the one you want, let these others go.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He did this to fulfill his own statement: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I did not lose a single one of those you have given me.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See John 6:39 and 17:12.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Simon Peter drew a sword and slashed off the right ear of Malchus, the high priest’s slave. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But Jesus said to Peter, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Put your sword back into its sheath. Shall I not drink from the cup of suffering the Father has given me?”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus at the High Priest’s House
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So the soldiers, their commanding officer, and the Temple guards arrested Jesus and tied him up. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: First they took him to Annas, since he was the father-in-law of Caiaphas, the high priest at that time.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: that year.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Caiaphas was the one who had told the other Jewish leaders, “It’s better that one man should die for the people.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter’s First Denial
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Simon Peter followed Jesus, as did another of the disciples. That other disciple was acquainted with the high priest, so he was allowed to enter the high priest’s courtyard with Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Peter had to stay outside the gate. Then the disciple who knew the high priest spoke to the woman watching at the gate, and she let Peter in. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The woman asked Peter, “You’re not one of that man’s disciples, are you?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “No,” he said, “I am not.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Because it was cold, the household servants and the guards had made a charcoal fire. They stood around it, warming themselves, and Peter stood with them, warming himself.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The High Priest Questions Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Inside, the high priest began asking Jesus about his followers and what he had been teaching them. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Everyone knows what I teach. I have preached regularly in the synagogues and the Temple, where the people
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jewish people; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 18:38.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: gather. I have not spoken in secret.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Why are you asking me this question? Ask those who heard me. They know what I said.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then one of the Temple guards standing nearby slapped Jesus across the face. “Is that the way to answer the high priest?” he demanded.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If I said anything wrong, you must prove it. But if I’m speaking the truth, why are you beating me?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Then Annas bound Jesus and sent him to Caiaphas, the high priest.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter’s Second and Third Denials
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Meanwhile, as Simon Peter was standing by the fire warming himself, they asked him again, “You’re not one of his disciples, are you?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He denied it, saying, “No, I am not.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But one of the household slaves of the high priest, a relative of the man whose ear Peter had cut off, asked, “Didn’t I see you out there in the olive grove with Jesus?” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Again Peter denied it. And immediately a rooster crowed.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus’ Trial before Pilate
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Jesus’ trial before Caiaphas ended in the early hours of the morning. Then he was taken to the headquarters of the Roman governor.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'to the Praetorium; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 18:33.
    marker-yv: yv-n
  - type: text
    text: ' His accusers didn’t go inside because it would defile them, and they wouldn’t be allowed to celebrate the Passover. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: So Pilate, the governor, went out to them and asked, “What is your charge against this man?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “We wouldn’t have handed him over to you if he weren’t a criminal!” they retorted.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “Then take him away and judge him by your own law,” Pilate told them.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Only the Romans are permitted to execute someone,” the Jewish leaders replied. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: (This fulfilled Jesus’ prediction about the way he would die.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See John 12:32-33.
    marker-yv: yv-n
  - type: text
    text: )
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Then Pilate went back into his headquarters and called for Jesus to be brought to him. “Are you the king of the Jews?” he asked him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Is this your own question, or did others tell you about me?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “Am I a Jew?” Pilate retorted. “Your own people and their leading priests brought you to me for trial. Why? What have you done?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My Kingdom is not an earthly kingdom. If it were, my followers would fight to keep me from being handed over to the Jewish leaders. But my Kingdom is not of this world.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Pilate said, “So you are a king?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You say I am a king. Actually, I was born and came into the world to testify to the truth. All who love the truth recognize that what I say is true.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '“What is truth?” Pilate asked. Then he went out again to the people and told them, “He is not guilty of any crime. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: But you have a custom of asking me to release one prisoner each year at Passover. Would you like me to release this ‘King of the Jews’?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: But they shouted back, “No! Not this man. We want Barabbas!” (Barabbas was a revolutionary.)
