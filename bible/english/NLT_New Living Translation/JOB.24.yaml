document_id: JOB.24,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Asks Why the Wicked Are Not Punished
  - type: text
    content: “Why doesn’t the Almighty bring the wicked to judgment?
  - type: text
    content: Why must the godly wait for him in vain?
  '10':
  - type: text
    content: The poor must go about naked, without any clothing.
  - type: text
    content: They harvest food for others while they themselves are starving.
  '11':
  - type: text
    content: They press out olive oil without being allowed to taste it,
  - type: text
    content: and they tread in the winepress as they suffer from thirst.
  '12':
  - type: text
    content: The groans of the dying rise from the city,
  - type: text
    content: and the wounded cry for help,
  - type: text
    content: yet God ignores their moaning.
  '13':
  - type: text
    content: “Wicked people rebel against the light.
  - type: text
    content: They refuse to acknowledge its ways
  - type: text
    content: or stay in its paths.
  '14':
  - type: text
    content: The murderer rises in the early dawn
  - type: text
    content: to kill the poor and needy;
  - type: text
    content: at night he is a thief.
  '15':
  - type: text
    content: The adulterer waits for the twilight,
  - type: text
    content: saying, ‘No one will see me then.’
  - type: text
    content: He hides his face so no one will know him.
  '16':
  - type: text
    content: Thieves break into houses at night
  - type: text
    content: and sleep in the daytime.
  - type: text
    content: They are not acquainted with the light.
  '17':
  - type: text
    content: The black night is their morning.
  - type: text
    content: They ally themselves with the terrors of the darkness.
  '18':
  - type: text
    content: “But they disappear like foam down a river.
  - type: text
    content: Everything they own is cursed,
  - type: text
    content: and they are afraid to enter their own vineyards.
  '19':
  - type: text
    content: The grave
  - type: note
    content: Hebrew Sheol.
  - type: text
    content: ' consumes sinners'
  - type: text
    content: just as drought and heat consume snow.
  '2':
  - type: text
    content: Evil people steal land by moving the boundary markers.
  - type: text
    content: They steal livestock and put them in their own pastures.
  '20':
  - type: text
    content: Their own mothers will forget them.
  - type: text
    content: Maggots will find them sweet to eat.
  - type: text
    content: No one will remember them.
  - type: text
    content: Wicked people are broken like a tree in the storm.
  '21':
  - type: text
    content: They cheat the woman who has no son to help her.
  - type: text
    content: They refuse to help the needy widow.
  '22':
  - type: text
    content: “God, in his power, drags away the rich.
  - type: text
    content: They may rise high, but they have no assurance of life.
  '23':
  - type: text
    content: They may be allowed to live in security,
  - type: text
    content: but God is always watching them.
  '24':
  - type: text
    content: And though they are great now,
  - type: text
    content: in a moment they will be gone like all others,
  - type: text
    content: cut off like heads of grain.
  '25':
  - type: text
    content: Can anyone claim otherwise?
  - type: text
    content: Who can prove me wrong?”
  '3':
  - type: text
    content: They take the orphan’s donkey
  - type: text
    content: and demand the widow’s ox as security for a loan.
  '4':
  - type: text
    content: The poor are pushed off the path;
  - type: text
    content: the needy must hide together for safety.
  '5':
  - type: text
    content: Like wild donkeys in the wilderness,
  - type: text
    content: the poor must spend all their time looking for food,
  - type: text
    content: searching even in the desert for food for their children.
  '6':
  - type: text
    content: They harvest a field they do not own,
  - type: text
    content: and they glean in the vineyards of the wicked.
  '7':
  - type: text
    content: All night they lie naked in the cold,
  - type: text
    content: without clothing or covering.
  '8':
  - type: text
    content: They are soaked by mountain showers,
  - type: text
    content: and they huddle against the rocks for want of a home.
  '9':
  - type: text
    content: “The wicked snatch a widow’s child from her breast,
  - type: text
    content: taking the baby as security for a loan.
