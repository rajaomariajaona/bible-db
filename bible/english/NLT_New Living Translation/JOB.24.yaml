document_id: JOB.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job Asks Why the Wicked Are Not Punished
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Why doesn’t the Almighty bring the wicked to judgment?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why must the godly wait for him in vain?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Evil people steal land by moving the boundary markers.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They steal livestock and put them in their own pastures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They take the orphan’s donkey
- type: usfm
  marker: q2
  children:
  - type: text
    text: and demand the widow’s ox as security for a loan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The poor are pushed off the path;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the needy must hide together for safety.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Like wild donkeys in the wilderness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the poor must spend all their time looking for food,
- type: usfm
  marker: q2
  children:
  - type: text
    text: searching even in the desert for food for their children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They harvest a field they do not own,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they glean in the vineyards of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All night they lie naked in the cold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: without clothing or covering.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They are soaked by mountain showers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they huddle against the rocks for want of a home.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “The wicked snatch a widow’s child from her breast,
- type: usfm
  marker: q2
  children:
  - type: text
    text: taking the baby as security for a loan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The poor must go about naked, without any clothing.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They harvest food for others while they themselves are starving.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They press out olive oil without being allowed to taste it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they tread in the winepress as they suffer from thirst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The groans of the dying rise from the city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the wounded cry for help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet God ignores their moaning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Wicked people rebel against the light.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They refuse to acknowledge its ways
- type: usfm
  marker: q2
  children:
  - type: text
    text: or stay in its paths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The murderer rises in the early dawn
- type: usfm
  marker: q2
  children:
  - type: text
    text: to kill the poor and needy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: at night he is a thief.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The adulterer waits for the twilight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: saying, ‘No one will see me then.’
- type: usfm
  marker: q2
  children:
  - type: text
    text: He hides his face so no one will know him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Thieves break into houses at night
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sleep in the daytime.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are not acquainted with the light.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The black night is their morning.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They ally themselves with the terrors of the darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “But they disappear like foam down a river.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Everything they own is cursed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they are afraid to enter their own vineyards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The grave
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Sheol.
    marker-yv: yv-n
  - type: text
    text: ' consumes sinners'
- type: usfm
  marker: q2
  children:
  - type: text
    text: just as drought and heat consume snow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Their own mothers will forget them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Maggots will find them sweet to eat.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one will remember them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wicked people are broken like a tree in the storm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They cheat the woman who has no son to help her.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They refuse to help the needy widow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “God, in his power, drags away the rich.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They may rise high, but they have no assurance of life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They may be allowed to live in security,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but God is always watching them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And though they are great now,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in a moment they will be gone like all others,
- type: usfm
  marker: q2
  children:
  - type: text
    text: cut off like heads of grain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Can anyone claim otherwise?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can prove me wrong?”
