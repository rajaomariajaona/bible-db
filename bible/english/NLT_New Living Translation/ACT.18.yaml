document_id: ACT.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Meets Priscilla and Aquila in Corinth
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Paul left Athens and went to Corinth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:1 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Athens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'and '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Corinth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: were major cities in Achaia, the region in the southern portion of the Greek peninsula.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'There he became acquainted with a Jew named Aquila, born in Pontus, who had recently arrived from Italy with his wife, Priscilla. They had left Italy when Claudius Caesar deported all Jews from Rome. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Paul lived and worked with them, for they were tentmakers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leatherworkers.
    marker-yv: yv-n
  - type: text
    text: ' just as he was.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Each Sabbath found Paul at the synagogue, trying to convince the Jews and Greeks alike. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And after Silas and Timothy came down from Macedonia, Paul spent all his time preaching the word. He testified to the Jews that Jesus was the Messiah. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But when they opposed and insulted him, Paul shook the dust from his clothes and said, “Your blood is upon your own heads—I am innocent. From now on I will go preach to the Gentiles.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he left and went to the home of Titius Justus, a Gentile who worshiped God and lived next door to the synagogue. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Crispus, the leader of the synagogue, and everyone in his household believed in the Lord. Many others in Corinth also heard Paul, became believers, and were baptized.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'One night the Lord spoke to Paul in a vision and told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t be afraid! Speak out! Don’t be silent!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For I am with you, and no one will attack and harm you, for many people in this city belong to me.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So Paul stayed there for the next year and a half, teaching the word of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But when Gallio became governor of Achaia, some Jews rose up together against Paul and brought him before the governor for judgment. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They accused Paul of “persuading people to worship God in ways that are contrary to our law.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But just as Paul started to make his defense, Gallio turned to Paul’s accusers and said, “Listen, you Jews, if this were a case involving some wrongdoing or a serious crime, I would have a reason to accept your case. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But since it is merely a question of words and names and your Jewish law, take care of it yourselves. I refuse to judge such matters.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And he threw them out of the courtroom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The crowd
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Everyone; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'other manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: All the Greeks.
    marker-yv: yv-n
  - type: text
    text: ' then grabbed Sosthenes, the leader of the synagogue, and beat him right there in the courtroom. But Gallio paid no attention.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Returns to Antioch of Syria
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Paul stayed in Corinth for some time after that, then said good-bye to the brothers and sisters
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'brothers; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 18:27.
    marker-yv: yv-n
  - type: text
    text: ' and went to nearby Cenchrea. There he shaved his head according to Jewish custom, marking the end of a vow. Then he set sail for Syria, taking Priscilla and Aquila with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They stopped first at the port of Ephesus, where Paul left the others behind. While he was there, he went to the synagogue to reason with the Jews. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'They asked him to stay longer, but he declined. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: As he left, however, he said, “I will come back later,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: “I must by all means be at Jerusalem for the upcoming festival, but I will come back later.”
    marker-yv: yv-n
  - type: text
    text: ' God willing.” Then he set sail from Ephesus. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The next stop was at the port of Caesarea. From there he went up and visited the church at Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the church.
    marker-yv: yv-n
  - type: text
    text: ' and then went back to Antioch.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: After spending some time in Antioch, Paul went back through Galatia and Phrygia, visiting and strengthening all the believers.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'disciples; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 18:27.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Apollos Instructed at Ephesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Meanwhile, a Jew named Apollos, an eloquent speaker who knew the Scriptures well, had arrived in Ephesus from Alexandria in Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: He had been taught the way of the Lord, and he taught others about Jesus with an enthusiastic spirit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: with enthusiasm in the Spirit.
    marker-yv: yv-n
  - type: text
    text: ' and with accuracy. However, he knew only about John’s baptism. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: When Priscilla and Aquila heard him preaching boldly in the synagogue, they took him aside and explained the way of God even more accurately.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Apollos had been thinking about going to Achaia, and the brothers and sisters in Ephesus encouraged him to go. They wrote to the believers in Achaia, asking them to welcome him. When he arrived there, he proved to be of great benefit to those who, by God’s grace, had believed. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: He refuted the Jews with powerful arguments in public debate. Using the Scriptures, he explained to them that Jesus was the Messiah.
