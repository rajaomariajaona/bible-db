document_id: ACT.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Meets Priscilla and Aquila in Corinth
  - type: text
    content: Then Paul left Athens and went to Corinth.
  - type: note
    content: Athens and Corinth were major cities in Achaia, the region in the southern portion of the Greek peninsula.
  - type: text
    content: ' '
  '10':
  - type: text
    content: For I am with you, and no one will attack and harm you, for many people in this city belong to me.”
  - type: text
    content: ' '
  '11':
  - type: text
    content: So Paul stayed there for the next year and a half, teaching the word of God.
  '12':
  - type: text
    content: 'But when Gallio became governor of Achaia, some Jews rose up together against Paul and brought him before the governor for judgment. '
  '13':
  - type: text
    content: They accused Paul of “persuading people to worship God in ways that are contrary to our law.”
  '14':
  - type: text
    content: 'But just as Paul started to make his defense, Gallio turned to Paul’s accusers and said, “Listen, you Jews, if this were a case involving some wrongdoing or a serious crime, I would have a reason to accept your case. '
  '15':
  - type: text
    content: 'But since it is merely a question of words and names and your Jewish law, take care of it yourselves. I refuse to judge such matters.” '
  '16':
  - type: text
    content: And he threw them out of the courtroom.
  '17':
  - type: text
    content: The crowd
  - type: note
    content: Greek Everyone; other manuscripts read All the Greeks.
  - type: text
    content: ' then grabbed Sosthenes, the leader of the synagogue, and beat him right there in the courtroom. But Gallio paid no attention.'
  - type: heading
    content: Paul Returns to Antioch of Syria
  '18':
  - type: text
    content: Paul stayed in Corinth for some time after that, then said good-bye to the brothers and sisters
  - type: note
    content: Greek brothers; also in 18:27.
  - type: text
    content: ' and went to nearby Cenchrea. There he shaved his head according to Jewish custom, marking the end of a vow. Then he set sail for Syria, taking Priscilla and Aquila with him.'
  '19':
  - type: text
    content: 'They stopped first at the port of Ephesus, where Paul left the others behind. While he was there, he went to the synagogue to reason with the Jews. '
  '2':
  - type: text
    content: 'There he became acquainted with a Jew named Aquila, born in Pontus, who had recently arrived from Italy with his wife, Priscilla. They had left Italy when Claudius Caesar deported all Jews from Rome. '
  '20':
  - type: text
    content: 'They asked him to stay longer, but he declined. '
  '21':
  - type: text
    content: As he left, however, he said, “I will come back later,
  - type: note
    content: Some manuscripts read “I must by all means be at Jerusalem for the upcoming festival, but I will come back later.”
  - type: text
    content: ' God willing.” Then he set sail from Ephesus. '
  '22':
  - type: text
    content: The next stop was at the port of Caesarea. From there he went up and visited the church at Jerusalem
  - type: note
    content: Greek the church.
  - type: text
    content: ' and then went back to Antioch.'
  '23':
  - type: text
    content: After spending some time in Antioch, Paul went back through Galatia and Phrygia, visiting and strengthening all the believers.
  - type: note
    content: Greek disciples; also in 18:27.
  - type: heading
    content: Apollos Instructed at Ephesus
  '24':
  - type: text
    content: 'Meanwhile, a Jew named Apollos, an eloquent speaker who knew the Scriptures well, had arrived in Ephesus from Alexandria in Egypt. '
  '25':
  - type: text
    content: He had been taught the way of the Lord, and he taught others about Jesus with an enthusiastic spirit
  - type: note
    content: Or with enthusiasm in the Spirit.
  - type: text
    content: ' and with accuracy. However, he knew only about John’s baptism. '
  '26':
  - type: text
    content: When Priscilla and Aquila heard him preaching boldly in the synagogue, they took him aside and explained the way of God even more accurately.
  '27':
  - type: text
    content: 'Apollos had been thinking about going to Achaia, and the brothers and sisters in Ephesus encouraged him to go. They wrote to the believers in Achaia, asking them to welcome him. When he arrived there, he proved to be of great benefit to those who, by God’s grace, had believed. '
  '28':
  - type: text
    content: He refuted the Jews with powerful arguments in public debate. Using the Scriptures, he explained to them that Jesus was the Messiah.
  '3':
  - type: text
    content: Paul lived and worked with them, for they were tentmakers
  - type: note
    content: Or leatherworkers.
  - type: text
    content: ' just as he was.'
  '4':
  - type: text
    content: 'Each Sabbath found Paul at the synagogue, trying to convince the Jews and Greeks alike. '
  '5':
  - type: text
    content: 'And after Silas and Timothy came down from Macedonia, Paul spent all his time preaching the word. He testified to the Jews that Jesus was the Messiah. '
  '6':
  - type: text
    content: But when they opposed and insulted him, Paul shook the dust from his clothes and said, “Your blood is upon your own heads—I am innocent. From now on I will go preach to the Gentiles.”
  '7':
  - type: text
    content: 'Then he left and went to the home of Titius Justus, a Gentile who worshiped God and lived next door to the synagogue. '
  '8':
  - type: text
    content: Crispus, the leader of the synagogue, and everyone in his household believed in the Lord. Many others in Corinth also heard Paul, became believers, and were baptized.
  '9':
  - type: text
    content: 'One night the Lord spoke to Paul in a vision and told him, '
  - type: text
    content: “Don’t be afraid! Speak out! Don’t be silent!
  - type: text
    content: ' '
