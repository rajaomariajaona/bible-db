document_id: HOS.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Anger against Israel
  - type: text
    content: When the tribe of Ephraim spoke,
  - type: text
    content: the people shook with fear,
  - type: text
    content: for that tribe was important in Israel.
  - type: text
    content: But the people of Ephraim sinned by worshiping Baal
  - type: text
    content: and thus sealed their destruction.
  '10':
  - type: text
    content: Now where is
  - type: note
    content: As in Greek and Syriac versions and Latin Vulgate; Hebrew reads I will be.
  - type: text
    content: ' your king?'
  - type: text
    content: Let him save you!
  - type: text
    content: Where are all the leaders of the land,
  - type: text
    content: the king and the officials you demanded of me?
  '11':
  - type: text
    content: In my anger I gave you kings,
  - type: text
    content: and in my fury I took them away.
  '12':
  - type: text
    content: “Ephraim’s guilt has been collected,
  - type: text
    content: and his sin has been stored up for punishment.
  '13':
  - type: text
    content: Pain has come to the people
  - type: text
    content: like the pain of childbirth,
  - type: text
    content: but they are like a child
  - type: text
    content: who resists being born.
  - type: text
    content: The moment of birth has arrived,
  - type: text
    content: but they stay in the womb!
  '14':
  - type: text
    content: “Should I ransom them from the grave
  - type: note
    content: Hebrew Sheol; also in 13:14b.
  - type: text
    content: '?'
  - type: text
    content: Should I redeem them from death?
  - type: text
    content: O death, bring on your terrors!
  - type: text
    content: O grave, bring on your plagues!
  - type: note
    content: Greek version reads O death, where is your punishment? / O grave [Hades], where is your sting? Compare 1 Cor 15:55.
  - type: text
    content: For I will not take pity on them.
  '15':
  - type: text
    content: Ephraim was the most fruitful of all his brothers,
  - type: text
    content: 'but the east wind—a blast from the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: will arise in the desert.
  - type: text
    content: All their flowing springs will run dry,
  - type: text
    content: and all their wells will disappear.
  - type: text
    content: Every precious thing they own
  - type: text
    content: will be plundered and carried away.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Verse 16 is numbered 14:1 in Hebrew text.
  - type: text
    content: The people of Samaria
  - type: text
    content: must bear the consequences of their guilt
  - type: text
    content: because they rebelled against their God.
  - type: text
    content: They will be killed by an invading army,
  - type: text
    content: their little ones dashed to death against the ground,
  - type: text
    content: their pregnant women ripped open by swords.”
  '2':
  - type: text
    content: Now they continue to sin by making silver idols,
  - type: text
    content: images shaped skillfully with human hands.
  - type: text
    content: “Sacrifice to these,” they cry,
  - type: text
    content: “and kiss the calf idols!”
  '3':
  - type: text
    content: Therefore, they will disappear like the morning mist,
  - type: text
    content: like dew in the morning sun,
  - type: text
    content: like chaff blown by the wind,
  - type: text
    content: like smoke from a chimney.
  '4':
  - type: text
    content: '“I have been the '
  - type: text
    content: Lord
  - type: text
    content: ' your God'
  - type: text
    content: ever since I brought you out of Egypt.
  - type: text
    content: You must acknowledge no God but me,
  - type: text
    content: for there is no other savior.
  '5':
  - type: text
    content: I took care of you in the wilderness,
  - type: text
    content: in that dry and thirsty land.
  '6':
  - type: text
    content: But when you had eaten and were satisfied,
  - type: text
    content: you became proud and forgot me.
  '7':
  - type: text
    content: So now I will attack you like a lion,
  - type: text
    content: like a leopard that lurks along the road.
  '8':
  - type: text
    content: Like a bear whose cubs have been taken away,
  - type: text
    content: I will tear out your heart.
  - type: text
    content: I will devour you like a hungry lioness
  - type: text
    content: and mangle you like a wild animal.
  '9':
  - type: text
    content: “You are about to be destroyed, O Israel—
  - type: text
    content: yes, by me, your only helper.
