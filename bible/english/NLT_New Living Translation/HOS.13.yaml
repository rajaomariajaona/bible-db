document_id: HOS.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Anger against Israel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the tribe of Ephraim spoke,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the people shook with fear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for that tribe was important in Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the people of Ephraim sinned by worshiping Baal
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and thus sealed their destruction.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now where is
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions and Latin Vulgate; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: I will be.
      marker-yv: yv-n
    - type: text
      text: ' your king?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let him save you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where are all the leaders of the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the king and the officials you demanded of me?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In my anger I gave you kings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in my fury I took them away.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Ephraim’s guilt has been collected,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his sin has been stored up for punishment.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pain has come to the people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like the pain of childbirth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but they are like a child
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who resists being born.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The moment of birth has arrived,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they stay in the womb!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Should I ransom them from the grave
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:14a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sheol; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 13:14b.
      marker-yv: yv-n
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Should I redeem them from death?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O death, bring on your terrors!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O grave, bring on your plagues!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:14b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'O death, where is your punishment? / O grave '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[Hades], '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'where is your sting? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare 1 Cor 15:55.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For I will not take pity on them.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim was the most fruitful of all his brothers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the east wind—a blast from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will arise in the desert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All their flowing springs will run dry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all their wells will disappear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every precious thing they own
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be plundered and carried away.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verse 16 is numbered 14:1 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: The people of Samaria
  - type: usfm
    marker: q2
    children:
    - type: text
      text: must bear the consequences of their guilt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because they rebelled against their God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be killed by an invading army,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their little ones dashed to death against the ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their pregnant women ripped open by swords.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now they continue to sin by making silver idols,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: images shaped skillfully with human hands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Sacrifice to these,” they cry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “and kiss the calf idols!”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, they will disappear like the morning mist,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like dew in the morning sun,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like chaff blown by the wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like smoke from a chimney.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I have been the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ever since I brought you out of Egypt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You must acknowledge no God but me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for there is no other savior.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I took care of you in the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in that dry and thirsty land.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when you had eaten and were satisfied,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you became proud and forgot me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So now I will attack you like a lion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a leopard that lurks along the road.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a bear whose cubs have been taken away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will tear out your heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will devour you like a hungry lioness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and mangle you like a wild animal.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You are about to be destroyed, O Israel—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, by me, your only helper.
