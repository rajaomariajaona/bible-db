document_id: MRK.9,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Jesus went on to say, '
  - type: text
    content: “I tell you the truth, some standing here right now will not die before they see the Kingdom of God arrive in great power!”
  - type: heading
    content: The Transfiguration
  '10':
  - type: text
    content: So they kept it to themselves, but they often asked each other what he meant by “rising from the dead.”
  '11':
  - type: text
    content: Then they asked him, “Why do the teachers of religious law insist that Elijah must return before the Messiah comes?
  - type: note
    content: Greek that Elijah must come first?
  - type: text
    content: ”
  '12':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “Elijah is indeed coming first to get everything ready. Yet why do the Scriptures say that the Son of Man must suffer greatly and be treated with utter contempt?
  - type: text
    content: ' '
  '13':
  - type: text
    content: But I tell you, Elijah has already come, and they chose to abuse him, just as the Scriptures predicted.”
  - type: heading
    content: Jesus Heals a Demon-Possessed Boy
  '14':
  - type: text
    content: 'When they returned to the other disciples, they saw a large crowd surrounding them, and some teachers of religious law were arguing with them. '
  '15':
  - type: text
    content: When the crowd saw Jesus, they were overwhelmed with awe, and they ran to greet him.
  '16':
  - type: text
    content: ' '
  - type: text
    content: '“What is all this arguing about?” '
  - type: text
    content: Jesus asked.
  '17':
  - type: text
    content: 'One of the men in the crowd spoke up and said, “Teacher, I brought my son so you could heal him. He is possessed by an evil spirit that won’t let him talk. '
  '18':
  - type: text
    content: And whenever this spirit seizes him, it throws him violently to the ground. Then he foams at the mouth and grinds his teeth and becomes rigid.
  - type: note
    content: Or becomes weak.
  - type: text
    content: ' So I asked your disciples to cast out the evil spirit, but they couldn’t do it.”'
  '19':
  - type: text
    content: Jesus said to them,
  - type: note
    content: Or said to his disciples.
  - type: text
    content: ' '
  - type: text
    content: “You faithless people! How long must I be with you? How long must I put up with you? Bring the boy to me.”
  '2':
  - type: text
    content: 'Six days later Jesus took Peter, James, and John, and led them up a high mountain to be alone. As the men watched, Jesus’ appearance was transformed, '
  '20':
  - type: text
    content: So they brought the boy. But when the evil spirit saw Jesus, it threw the child into a violent convulsion, and he fell to the ground, writhing and foaming at the mouth.
  '21':
  - type: text
    content: ' '
  - type: text
    content: '“How long has this been happening?” '
  - type: text
    content: Jesus asked the boy’s father.
  - type: text
    content: 'He replied, “Since he was a little boy. '
  '22':
  - type: text
    content: The spirit often throws him into the fire or into water, trying to kill him. Have mercy on us and help us, if you can.”
  '23':
  - type: text
    content: ' '
  - type: text
    content: '“What do you mean, ‘If I can’?” '
  - type: text
    content: 'Jesus asked. '
  - type: text
    content: “Anything is possible if a person believes.”
  '24':
  - type: text
    content: The father instantly cried out, “I do believe, but help me overcome my unbelief!”
  '25':
  - type: text
    content: When Jesus saw that the crowd of onlookers was growing, he rebuked the evil
  - type: note
    content: Greek unclean.
  - type: text
    content: ' spirit. '
  - type: text
    content: '“Listen, you spirit that makes this boy unable to hear and speak,” '
  - type: text
    content: 'he said. '
  - type: text
    content: “I command you to come out of this child and never enter him again!”
  '26':
  - type: text
    content: 'Then the spirit screamed and threw the boy into another violent convulsion and left him. The boy appeared to be dead. A murmur ran through the crowd as people said, “He’s dead.” '
  '27':
  - type: text
    content: But Jesus took him by the hand and helped him to his feet, and he stood up.
  '28':
  - type: text
    content: Afterward, when Jesus was alone in the house with his disciples, they asked him, “Why couldn’t we cast out that evil spirit?”
  '29':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “This kind can be cast out only by prayer.
  - type: note
    content: Some manuscripts read by prayer and fasting.
  - type: text
    content: ”
  - type: heading
    content: Jesus Again Predicts His Death
  '3':
  - type: text
    content: 'and his clothes became dazzling white, far whiter than any earthly bleach could ever make them. '
  '30':
  - type: text
    content: 'Leaving that region, they traveled through Galilee. Jesus didn’t want anyone to know he was there, '
  '31':
  - type: text
    content: 'for he wanted to spend more time with his disciples and teach them. He said to them, '
  - type: text
    content: “The Son of Man is going to be betrayed into the hands of his enemies. He will be killed, but three days later he will rise from the dead.”
  - type: text
    content: ' '
  '32':
  - type: text
    content: They didn’t understand what he was saying, however, and they were afraid to ask him what he meant.
  - type: heading
    content: The Greatest in the Kingdom
  '33':
  - type: text
    content: 'After they arrived at Capernaum and settled in a house, Jesus asked his disciples, '
  - type: text
    content: “What were you discussing out on the road?”
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'But they didn’t answer, because they had been arguing about which of them was the greatest. '
  '35':
  - type: text
    content: 'He sat down, called the twelve disciples over to him, and said, '
  - type: text
    content: “Whoever wants to be first must take last place and be the servant of everyone else.”
  '36':
  - type: text
    content: 'Then he put a little child among them. Taking the child in his arms, he said to them, '
  '37':
  - type: text
    content: “Anyone who welcomes a little child like this on my behalf
  - type: note
    content: Greek in my name.
  - type: text
    content: ' '
  - type: text
    content: welcomes me, and anyone who welcomes me welcomes not only me but also my Father who sent me.”
  - type: heading
    content: Using the Name of Jesus
  '38':
  - type: text
    content: John said to Jesus, “Teacher, we saw someone using your name to cast out demons, but we told him to stop because he wasn’t in our group.”
  '39':
  - type: text
    content: ' '
  - type: text
    content: '“Don’t stop him!” '
  - type: text
    content: 'Jesus said. '
  - type: text
    content: “No one who performs a miracle in my name will soon be able to speak evil of me.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Then Elijah and Moses appeared and began talking with Jesus.
  '40':
  - type: text
    content: Anyone who is not against us is for us.
  - type: text
    content: ' '
  '41':
  - type: text
    content: If anyone gives you even a cup of water because you belong to the Messiah, I tell you the truth, that person will surely be rewarded.
  '42':
  - type: text
    content: ' '
  - type: text
    content: “But if you cause one of these little ones who trusts in me to fall into sin, it would be better for you to be thrown into the sea with a large millstone hung around your neck.
  - type: text
    content: ' '
  '43':
  - type: text
    content: If your hand causes you to sin, cut it off. It’s better to enter eternal life with only one hand than to go into the unquenchable fires of hell
  - type: note
    content: Greek Gehenna; also in 9:45, 47.
  - type: text
    content: ' '
  - type: text
    content: with two hands.
  - type: note
    content: Some manuscripts add verse 44, ‘where the maggots never die and the fire never goes out.’ See 9:48.
  - type: text
    content: ' '
  '45':
  - type: text
    content: If your foot causes you to sin, cut it off. It’s better to enter eternal life with only one foot than to be thrown into hell with two feet.
  - type: note
    content: Some manuscripts add verse 46, ‘where the maggots never die and the fire never goes out.’ See 9:48.
  - type: text
    content: ' '
  '47':
  - type: text
    content: And if your eye causes you to sin, gouge it out. It’s better to enter the Kingdom of God with only one eye than to have two eyes and be thrown into hell,
  - type: text
    content: ' '
  '48':
  - type: text
    content: ‘where the maggots never die and the fire never goes out.’
  - type: note
    content: Isa 66:24.
  '49':
  - type: text
    content: ' '
  - type: text
    content: “For everyone will be tested with fire.
  - type: text
    content: ' '
  - type: note
    content: Greek salted with fire; other manuscripts add and every sacrifice will be salted with salt.
  '5':
  - type: text
    content: Peter exclaimed, “Rabbi, it’s wonderful for us to be here! Let’s make three shelters as memorials
  - type: note
    content: Greek three tabernacles.
  - type: text
    content: '—one for you, one for Moses, and one for Elijah.” '
  '50':
  - type: text
    content: Salt is good for seasoning. But if it loses its flavor, how do you make it salty again? You must have the qualities of salt among yourselves and live in peace with each other.”
  '6':
  - type: text
    content: He said this because he didn’t really know what else to say, for they were all terrified.
  '7':
  - type: text
    content: 'Then a cloud overshadowed them, and a voice from the cloud said, “This is my dearly loved Son. Listen to him.” '
  '8':
  - type: text
    content: Suddenly, when they looked around, Moses and Elijah were gone, and they saw only Jesus with them.
  '9':
  - type: text
    content: As they went back down the mountain, he told them not to tell anyone what they had seen until the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' had risen from the dead. '
