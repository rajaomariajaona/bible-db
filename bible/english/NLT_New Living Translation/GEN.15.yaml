document_id: GEN.15,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Covenant Promise to Abram
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Some time later, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Abram in a vision and said to him, “Do not be afraid, Abram, for I will protect you, and your reward will be great.”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Abram presented all these to him and killed them. Then he cut each animal down the middle and laid the halves side by side; he did not, however, cut the birds in half. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Some vultures swooped down to eat the carcasses, but Abram chased them away.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the sun was going down, Abram fell into a deep sleep, and a terrifying darkness came down over him. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Abram, “You can be sure that your descendants will be strangers in a foreign land, where they will be oppressed as slaves for 400 years. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I will punish the nation that enslaves them, and in the end they will come away with great wealth. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(As for you, you will die in peace and be buried at a ripe old age.) '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After four generations your descendants will return here to this land, for the sins of the Amorites do not yet warrant their destruction.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the sun went down and darkness fell, Abram saw a smoking firepot and a flaming torch pass between the halves of the carcasses. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made a covenant with Abram that day and said, “I have given this land to your descendants, all the way from the border of Egypt'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the river of Egypt, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referring either to an eastern branch of the Nile River or to the Brook of Egypt in the Sinai (see Num 34:5).
      marker-yv: yv-n
    - type: text
      text: ' to the great Euphrates River— '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the land now occupied by the Kenites, Kenizzites, Kadmonites, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Abram replied, “O Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', what good are all your blessings when I don’t even have a son? Since you’ve given me no children, Eliezer of Damascus, a servant in my household, will inherit all my wealth. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hittites, Perizzites, Rephaites, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amorites, Canaanites, Girgashites, and Jebusites.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You have given me no descendants of my own, so one of my servants will be my heir.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, “No, your servant will not be your heir, for you will have a son of your own who will be your heir.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' took Abram outside and said to him, “Look up into the sky and count the stars if you can. That’s how many descendants you will have!”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abram believed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' counted him as righteous because of his faith.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told him, “I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who brought you out of Ur of the Chaldeans to give you this land as your possession.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Abram replied, “O Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', how can I be sure that I will actually possess it?”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told him, “Bring me a three-year-old heifer, a three-year-old female goat, a three-year-old ram, a turtledove, and a young pigeon.” '
