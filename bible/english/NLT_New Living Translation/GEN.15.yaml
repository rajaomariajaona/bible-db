document_id: GEN.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Covenant Promise to Abram
  - type: text
    content: 'Some time later, the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Abram in a vision and said to him, “Do not be afraid, Abram, for I will protect you, and your reward will be great.”'
  '10':
  - type: text
    content: 'So Abram presented all these to him and killed them. Then he cut each animal down the middle and laid the halves side by side; he did not, however, cut the birds in half. '
  '11':
  - type: text
    content: Some vultures swooped down to eat the carcasses, but Abram chased them away.
  '12':
  - type: text
    content: 'As the sun was going down, Abram fell into a deep sleep, and a terrifying darkness came down over him. '
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Abram, “You can be sure that your descendants will be strangers in a foreign land, where they will be oppressed as slaves for 400 years. '
  '14':
  - type: text
    content: 'But I will punish the nation that enslaves them, and in the end they will come away with great wealth. '
  '15':
  - type: text
    content: '(As for you, you will die in peace and be buried at a ripe old age.) '
  '16':
  - type: text
    content: After four generations your descendants will return here to this land, for the sins of the Amorites do not yet warrant their destruction.”
  '17':
  - type: text
    content: 'After the sun went down and darkness fell, Abram saw a smoking firepot and a flaming torch pass between the halves of the carcasses. '
  '18':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' made a covenant with Abram that day and said, “I have given this land to your descendants, all the way from the border of Egypt'
  - type: note
    content: Hebrew the river of Egypt, referring either to an eastern branch of the Nile River or to the Brook of Egypt in the Sinai (see Num 34:5).
  - type: text
    content: ' to the great Euphrates River— '
  '19':
  - type: text
    content: 'the land now occupied by the Kenites, Kenizzites, Kadmonites, '
  '2':
  - type: text
    content: 'But Abram replied, “O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', what good are all your blessings when I don’t even have a son? Since you’ve given me no children, Eliezer of Damascus, a servant in my household, will inherit all my wealth. '
  '20':
  - type: text
    content: 'Hittites, Perizzites, Rephaites, '
  '21':
  - type: text
    content: Amorites, Canaanites, Girgashites, and Jebusites.”
  '3':
  - type: text
    content: You have given me no descendants of my own, so one of my servants will be my heir.”
  '4':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “No, your servant will not be your heir, for you will have a son of your own who will be your heir.” '
  '5':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' took Abram outside and said to him, “Look up into the sky and count the stars if you can. That’s how many descendants you will have!”'
  '6':
  - type: text
    content: 'And Abram believed the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: text
    content: ' counted him as righteous because of his faith.'
  '7':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' told him, “I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who brought you out of Ur of the Chaldeans to give you this land as your possession.”'
  '8':
  - type: text
    content: 'But Abram replied, “O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', how can I be sure that I will actually possess it?”'
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' told him, “Bring me a three-year-old heifer, a three-year-old female goat, a three-year-old ram, a turtledove, and a young pigeon.” '
