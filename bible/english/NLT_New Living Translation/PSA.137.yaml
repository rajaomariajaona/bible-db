document_id: PSA.137,116
type_code: eng
verses:
  '1':
  - type: text
    content: Beside the rivers of Babylon, we sat and wept
  - type: text
    content: as we thought of Jerusalem.
  - type: note
    content: Hebrew Zion; also in 137:3.
  '2':
  - type: text
    content: We put away our harps,
  - type: text
    content: hanging them on the branches of poplar trees.
  '3':
  - type: text
    content: For our captors demanded a song from us.
  - type: text
    content: 'Our tormentors insisted on a joyful hymn:'
  - type: text
    content: “Sing us one of those songs of Jerusalem!”
  '4':
  - type: text
    content: 'But how can we sing the songs of the '
  - type: text
    content: Lord
  - type: text
    content: while in a pagan land?
  '5':
  - type: text
    content: If I forget you, O Jerusalem,
  - type: text
    content: let my right hand forget how to play the harp.
  '6':
  - type: text
    content: May my tongue stick to the roof of my mouth
  - type: text
    content: if I fail to remember you,
  - type: text
    content: if I don’t make Jerusalem my greatest joy.
  '7':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', remember what the Edomites did'
  - type: text
    content: on the day the armies of Babylon captured Jerusalem.
  - type: text
    content: “Destroy it!” they yelled.
  - type: text
    content: “Level it to the ground!”
  '8':
  - type: text
    content: O Babylon, you will be destroyed.
  - type: text
    content: Happy is the one who pays you back
  - type: text
    content: for what you have done to us.
  '9':
  - type: text
    content: Happy is the one who takes your babies
  - type: text
    content: and smashes them against the rocks!
