document_id: PSA.137
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Beside the rivers of Babylon, we sat and wept
- type: usfm
  marker: q2
  children:
  - type: text
    text: as we thought of Jerusalem.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '137:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Zion; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 137:3.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: We put away our harps,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hanging them on the branches of poplar trees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For our captors demanded a song from us.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Our tormentors insisted on a joyful hymn:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Sing us one of those songs of Jerusalem!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But how can we sing the songs of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: while in a pagan land?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: If I forget you, O Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let my right hand forget how to play the harp.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: May my tongue stick to the roof of my mouth
- type: usfm
  marker: q2
  children:
  - type: text
    text: if I fail to remember you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: if I don’t make Jerusalem my greatest joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', remember what the Edomites did'
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the day the armies of Babylon captured Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Destroy it!” they yelled.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Level it to the ground!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: O Babylon, you will be destroyed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Happy is the one who pays you back
- type: usfm
  marker: q2
  children:
  - type: text
    text: for what you have done to us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Happy is the one who takes your babies
- type: usfm
  marker: q2
  children:
  - type: text
    text: and smashes them against the rocks!
