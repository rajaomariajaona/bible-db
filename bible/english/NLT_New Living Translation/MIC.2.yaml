document_id: MIC.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment against Wealthy Oppressors
  - type: text
    content: What sorrow awaits you who lie awake at night,
  - type: text
    content: thinking up evil plans.
  - type: text
    content: You rise at dawn and hurry to carry them out,
  - type: text
    content: simply because you have the power to do so.
  '10':
  - type: text
    content: Up! Begone!
  - type: text
    content: This is no longer your land and home,
  - type: text
    content: for you have filled it with sin
  - type: text
    content: and ruined it completely.
  '11':
  - type: text
    content: Suppose a prophet full of lies would say to you,
  - type: text
    content: “I’ll preach to you the joys of wine and alcohol!”
  - type: text
    content: That’s just the kind of prophet you would like!
  - type: heading
    content: Hope for Restoration
  '12':
  - type: text
    content: “Someday, O Israel, I will gather you;
  - type: text
    content: I will gather the remnant who are left.
  - type: text
    content: I will bring you together again like sheep in a pen,
  - type: text
    content: like a flock in its pasture.
  - type: text
    content: Yes, your land will again
  - type: text
    content: be filled with noisy crowds!
  '13':
  - type: text
    content: Your leader will break out
  - type: text
    content: and lead you out of exile,
  - type: text
    content: out through the gates of the enemy cities,
  - type: text
    content: back to your own land.
  - type: text
    content: Your king will lead you;
  - type: text
    content: 'the '
  - type: text
    content: 'Lord '
  - type: text
    content: himself will guide you.”
  '2':
  - type: text
    content: When you want a piece of land,
  - type: text
    content: you find a way to seize it.
  - type: text
    content: When you want someone’s house,
  - type: text
    content: you take it by fraud and violence.
  - type: text
    content: You cheat a man of his property,
  - type: text
    content: stealing his family’s inheritance.
  '3':
  - type: text
    content: 'But this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “I will reward your evil with evil;
  - type: text
    content: you won’t be able to pull your neck out of the noose.
  - type: text
    content: You will no longer walk around proudly,
  - type: text
    content: for it will be a terrible time.”
  '4':
  - type: text
    content: In that day your enemies will make fun of you
  - type: text
    content: 'by singing this song of despair about you:'
  - type: text
    content: “We are finished,
  - type: text
    content: completely ruined!
  - type: text
    content: God has confiscated our land,
  - type: text
    content: taking it from us.
  - type: text
    content: He has given our fields
  - type: text
    content: to those who betrayed us.
  - type: note
    content: Or to those who took us captive.
  - type: text
    content: ”
  '5':
  - type: text
    content: Others will set your boundaries then,
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ’s people will have no say
  - type: text
    content: in how the land is divided.
  - type: heading
    content: True and False Prophets
  '6':
  - type: text
    content: “Don’t say such things,”
  - type: text
    content: the people respond.
  - type: note
    content: Or the prophets respond; Hebrew reads they prophesy.
  - type: text
    content: “Don’t prophesy like that.
  - type: text
    content: Such disasters will never come our way!”
  '7':
  - type: text
    content: Should you talk that way, O family of Israel?
  - type: note
    content: Hebrew O house of Jacob? See note on 1:5a.
  - type: text
    content: 'Will the '
  - type: text
    content: Lord
  - type: text
    content: ’s Spirit have patience with such behavior?
  - type: text
    content: If you would do what is right,
  - type: text
    content: you would find my words comforting.
  '8':
  - type: text
    content: Yet to this very hour
  - type: text
    content: my people rise against me like an enemy!
  - type: text
    content: You steal the shirts right off the backs
  - type: text
    content: of those who trusted you,
  - type: text
    content: making them as ragged as men
  - type: text
    content: returning from battle.
  '9':
  - type: text
    content: You have evicted women from their pleasant homes
  - type: text
    content: and forever stripped their children of all that God would give them.
