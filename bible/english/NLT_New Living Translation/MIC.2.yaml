document_id: MIC.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment against Wealthy Oppressors
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: What sorrow awaits you who lie awake at night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thinking up evil plans.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You rise at dawn and hurry to carry them out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: simply because you have the power to do so.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Up! Begone!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: This is no longer your land and home,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you have filled it with sin
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ruined it completely.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Suppose a prophet full of lies would say to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I’ll preach to you the joys of wine and alcohol!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s just the kind of prophet you would like!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hope for Restoration
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “Someday, O Israel, I will gather you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will gather the remnant who are left.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring you together again like sheep in a pen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a flock in its pasture.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, your land will again
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be filled with noisy crowds!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Your leader will break out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lead you out of exile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: out through the gates of the enemy cities,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: back to your own land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your king will lead you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'Lord '
    - type: text
      text: himself will guide you.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: When you want a piece of land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you find a way to seize it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you want someone’s house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you take it by fraud and violence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You cheat a man of his property,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stealing his family’s inheritance.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will reward your evil with evil;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you won’t be able to pull your neck out of the noose.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will no longer walk around proudly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for it will be a terrible time.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: In that day your enemies will make fun of you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'by singing this song of despair about you:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “We are finished,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: completely ruined!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God has confiscated our land,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: taking it from us.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has given our fields
  - type: usfm
    marker: q3
    children:
    - type: text
      text: to those who betrayed us.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to those who took us captive.
      marker-yv: yv-n
    - type: text
      text: ”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Others will set your boundaries then,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s people will have no say
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in how the land is divided.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: True and False Prophets
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Don’t say such things,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the people respond.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the prophets respond; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: they prophesy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Don’t prophesy like that.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Such disasters will never come our way!”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Should you talk that way, O family of Israel?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'O house of Jacob? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 1:5a.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Will the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Spirit have patience with such behavior?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you would do what is right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you would find my words comforting.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Yet to this very hour
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my people rise against me like an enemy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You steal the shirts right off the backs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of those who trusted you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: making them as ragged as men
  - type: usfm
    marker: q2
    children:
    - type: text
      text: returning from battle.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You have evicted women from their pleasant homes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and forever stripped their children of all that God would give them.
