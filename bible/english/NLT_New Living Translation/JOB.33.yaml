document_id: JOB.33,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elihu Presents His Case against Job
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen to my words, Job;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pay attention to what I have to say.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God is picking a quarrel with me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he considers me his enemy.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He puts my feet in the stocks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and watches my every move.’
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But you are wrong, and I will show you why.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For God is greater than any human being.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So why are you bringing a charge against him?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why say he does not respond to people’s complaints?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For God speaks again and again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though people do not recognize it.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He speaks in dreams, in visions of the night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when deep sleep falls on people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they lie in their beds.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He whispers in their ears
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and terrifies them with warnings.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes them turn from doing wrong;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he keeps them from pride.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He protects them from the grave,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from crossing over the river of death.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Or God disciplines people with pain on their sickbeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with ceaseless aching in their bones.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now that I have begun to speak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let me continue.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They lose their appetite
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for even the most delicious food.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their flesh wastes away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their bones stick out.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are at death’s door;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the angels of death wait for them.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But if an angel from heaven appears—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a special messenger to intercede for a person
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and declare that he is upright—
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will be gracious and say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Rescue him from the grave,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have found a ransom for his life.’
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then his body will become as healthy as a child’s,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: firm and youthful again.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he prays to God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will be accepted.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And God will receive him with joy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and restore him to good standing.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will declare to his friends,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘I sinned and twisted the truth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but it was not worth it.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'but he '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[God] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: did not punish me as my sin deserved.
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God rescued me from the grave,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and now my life is filled with light.’
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yes, God does these things
  - type: usfm
    marker: q2
    children:
    - type: text
      text: again and again for people.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I speak with all sincerity;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I speak the truth.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rescues them from the grave
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so they may enjoy the light of life.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mark this well, Job. Listen to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have more to say.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you have anything to say, go ahead.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Speak, for I am anxious to see you justified.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if not, then listen to me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Keep silent and I will teach you wisdom!”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the Spirit of God has made me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the breath of the Almighty gives me life.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Answer me, if you can;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make your case and take your stand.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look, you and I both belong to God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I, too, was formed from clay.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So you don’t need to be afraid of me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I won’t come down hard on you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You have spoken in my hearing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I have heard your very words.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You said, ‘I am pure; I am without sin;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am innocent; I have no guilt.
