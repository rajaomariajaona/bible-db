document_id: JOB.33,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Elihu Presents His Case against Job
  - type: text
    content: “Listen to my words, Job;
  - type: text
    content: pay attention to what I have to say.
  '10':
  - type: text
    content: God is picking a quarrel with me,
  - type: text
    content: and he considers me his enemy.
  '11':
  - type: text
    content: He puts my feet in the stocks
  - type: text
    content: and watches my every move.’
  '12':
  - type: text
    content: “But you are wrong, and I will show you why.
  - type: text
    content: For God is greater than any human being.
  '13':
  - type: text
    content: So why are you bringing a charge against him?
  - type: text
    content: Why say he does not respond to people’s complaints?
  '14':
  - type: text
    content: For God speaks again and again,
  - type: text
    content: though people do not recognize it.
  '15':
  - type: text
    content: He speaks in dreams, in visions of the night,
  - type: text
    content: when deep sleep falls on people
  - type: text
    content: as they lie in their beds.
  '16':
  - type: text
    content: He whispers in their ears
  - type: text
    content: and terrifies them with warnings.
  '17':
  - type: text
    content: He makes them turn from doing wrong;
  - type: text
    content: he keeps them from pride.
  '18':
  - type: text
    content: He protects them from the grave,
  - type: text
    content: from crossing over the river of death.
  '19':
  - type: text
    content: “Or God disciplines people with pain on their sickbeds,
  - type: text
    content: with ceaseless aching in their bones.
  '2':
  - type: text
    content: Now that I have begun to speak,
  - type: text
    content: let me continue.
  '20':
  - type: text
    content: They lose their appetite
  - type: text
    content: for even the most delicious food.
  '21':
  - type: text
    content: Their flesh wastes away,
  - type: text
    content: and their bones stick out.
  '22':
  - type: text
    content: They are at death’s door;
  - type: text
    content: the angels of death wait for them.
  '23':
  - type: text
    content: “But if an angel from heaven appears—
  - type: text
    content: a special messenger to intercede for a person
  - type: text
    content: and declare that he is upright—
  '24':
  - type: text
    content: he will be gracious and say,
  - type: text
    content: ‘Rescue him from the grave,
  - type: text
    content: for I have found a ransom for his life.’
  '25':
  - type: text
    content: Then his body will become as healthy as a child’s,
  - type: text
    content: firm and youthful again.
  '26':
  - type: text
    content: When he prays to God,
  - type: text
    content: he will be accepted.
  - type: text
    content: And God will receive him with joy
  - type: text
    content: and restore him to good standing.
  '27':
  - type: text
    content: He will declare to his friends,
  - type: text
    content: ‘I sinned and twisted the truth,
  - type: text
    content: but it was not worth it.
  - type: note
    content: Greek version reads but he [God] did not punish me as my sin deserved.
  '28':
  - type: text
    content: God rescued me from the grave,
  - type: text
    content: and now my life is filled with light.’
  '29':
  - type: text
    content: “Yes, God does these things
  - type: text
    content: again and again for people.
  '3':
  - type: text
    content: I speak with all sincerity;
  - type: text
    content: I speak the truth.
  '30':
  - type: text
    content: He rescues them from the grave
  - type: text
    content: so they may enjoy the light of life.
  '31':
  - type: text
    content: Mark this well, Job. Listen to me,
  - type: text
    content: for I have more to say.
  '32':
  - type: text
    content: But if you have anything to say, go ahead.
  - type: text
    content: Speak, for I am anxious to see you justified.
  '33':
  - type: text
    content: But if not, then listen to me.
  - type: text
    content: Keep silent and I will teach you wisdom!”
  '4':
  - type: text
    content: For the Spirit of God has made me,
  - type: text
    content: and the breath of the Almighty gives me life.
  '5':
  - type: text
    content: Answer me, if you can;
  - type: text
    content: make your case and take your stand.
  '6':
  - type: text
    content: Look, you and I both belong to God.
  - type: text
    content: I, too, was formed from clay.
  '7':
  - type: text
    content: So you don’t need to be afraid of me.
  - type: text
    content: I won’t come down hard on you.
  '8':
  - type: text
    content: “You have spoken in my hearing,
  - type: text
    content: and I have heard your very words.
  '9':
  - type: text
    content: You said, ‘I am pure; I am without sin;
  - type: text
    content: I am innocent; I have no guilt.
