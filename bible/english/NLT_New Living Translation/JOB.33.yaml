document_id: JOB.33
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elihu Presents His Case against Job
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Listen to my words, Job;
- type: usfm
  marker: q2
  children:
  - type: text
    text: pay attention to what I have to say.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Now that I have begun to speak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let me continue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I speak with all sincerity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I speak the truth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For the Spirit of God has made me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the breath of the Almighty gives me life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Answer me, if you can;
- type: usfm
  marker: q2
  children:
  - type: text
    text: make your case and take your stand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Look, you and I both belong to God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I, too, was formed from clay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So you don’t need to be afraid of me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I won’t come down hard on you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “You have spoken in my hearing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I have heard your very words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You said, ‘I am pure; I am without sin;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am innocent; I have no guilt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: God is picking a quarrel with me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he considers me his enemy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He puts my feet in the stocks
- type: usfm
  marker: q2
  children:
  - type: text
    text: and watches my every move.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “But you are wrong, and I will show you why.
- type: usfm
  marker: q2
  children:
  - type: text
    text: For God is greater than any human being.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So why are you bringing a charge against him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why say he does not respond to people’s complaints?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For God speaks again and again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though people do not recognize it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He speaks in dreams, in visions of the night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when deep sleep falls on people
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they lie in their beds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He whispers in their ears
- type: usfm
  marker: q2
  children:
  - type: text
    text: and terrifies them with warnings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He makes them turn from doing wrong;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he keeps them from pride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He protects them from the grave,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from crossing over the river of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Or God disciplines people with pain on their sickbeds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with ceaseless aching in their bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They lose their appetite
- type: usfm
  marker: q2
  children:
  - type: text
    text: for even the most delicious food.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Their flesh wastes away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their bones stick out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: They are at death’s door;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the angels of death wait for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “But if an angel from heaven appears—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a special messenger to intercede for a person
- type: usfm
  marker: q2
  children:
  - type: text
    text: and declare that he is upright—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: he will be gracious and say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Rescue him from the grave,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have found a ransom for his life.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then his body will become as healthy as a child’s,
- type: usfm
  marker: q2
  children:
  - type: text
    text: firm and youthful again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: When he prays to God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will be accepted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And God will receive him with joy
- type: usfm
  marker: q2
  children:
  - type: text
    text: and restore him to good standing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: He will declare to his friends,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘I sinned and twisted the truth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but it was not worth it.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'but he '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[God] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: did not punish me as my sin deserved.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: God rescued me from the grave,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and now my life is filled with light.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Yes, God does these things
- type: usfm
  marker: q2
  children:
  - type: text
    text: again and again for people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: He rescues them from the grave
- type: usfm
  marker: q2
  children:
  - type: text
    text: so they may enjoy the light of life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mark this well, Job. Listen to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have more to say.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: But if you have anything to say, go ahead.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Speak, for I am anxious to see you justified.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: But if not, then listen to me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Keep silent and I will teach you wisdom!”
