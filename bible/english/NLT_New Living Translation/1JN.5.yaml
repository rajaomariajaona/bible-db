document_id: 1JN.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Faith in the Son of God
  - type: text
    content: Everyone who believes that Jesus is the Christ
  - type: note
    content: Or the Messiah.
  - type: text
    content: ' has become a child of God. And everyone who loves the Father loves his children, too. '
  '10':
  - type: text
    content: All who believe in the Son of God know in their hearts that this testimony is true. Those who don’t believe this are actually calling God a liar because they don’t believe what God has testified about his Son.
  '11':
  - type: text
    content: 'And this is what God has testified: He has given us eternal life, and this life is in his Son. '
  '12':
  - type: text
    content: Whoever has the Son has life; whoever does not have God’s Son does not have life.
  - type: heading
    content: Conclusion
  '13':
  - type: text
    content: 'I have written this to you who believe in the name of the Son of God, so that you may know you have eternal life. '
  '14':
  - type: text
    content: 'And we are confident that he hears us whenever we ask for anything that pleases him. '
  '15':
  - type: text
    content: And since we know he hears us when we make our requests, we also know that he will give us what we ask for.
  '16':
  - type: text
    content: If you see a fellow believer
  - type: note
    content: Greek a brother.
  - type: text
    content: ' sinning in a way that does not lead to death, you should pray, and God will give that person life. But there is a sin that leads to death, and I am not saying you should pray for those who commit it. '
  '17':
  - type: text
    content: All wicked actions are sin, but not every sin leads to death.
  '18':
  - type: text
    content: 'We know that God’s children do not make a practice of sinning, for God’s Son holds them securely, and the evil one cannot touch them. '
  '19':
  - type: text
    content: We know that we are children of God and that the world around us is under the control of the evil one.
  '2':
  - type: text
    content: 'We know we love God’s children if we love God and obey his commandments. '
  '20':
  - type: text
    content: And we know that the Son of God has come, and he has given us understanding so that we can know the true God.
  - type: note
    content: Greek the one who is true.
  - type: text
    content: ' And now we live in fellowship with the true God because we live in fellowship with his Son, Jesus Christ. He is the only true God, and he is eternal life.'
  '21':
  - type: text
    content: Dear children, keep away from anything that might take God’s place in your hearts.
  - type: note
    content: Greek keep yourselves from idols.
  '3':
  - type: text
    content: 'Loving God means keeping his commandments, and his commandments are not burdensome. '
  '4':
  - type: text
    content: 'For every child of God defeats this evil world, and we achieve this victory through our faith. '
  '5':
  - type: text
    content: And who can win this battle against the world? Only those who believe that Jesus is the Son of God.
  '6':
  - type: text
    content: And Jesus Christ was revealed as God’s Son by his baptism in water and by shedding his blood on the cross
  - type: note
    content: Greek This is he who came by water and blood.
  - type: text
    content: '—not by water only, but by water and blood. And the Spirit, who is truth, confirms it with his testimony. '
  '7':
  - type: text
    content: So we have these three witnesses
  - type: note
    content: A few very late manuscripts add in heaven—the Father, the Word, and the Holy Spirit, and these three are one. And we have three witnesses on earth.
  - type: text
    content: '— '
  '8':
  - type: text
    content: 'the Spirit, the water, and the blood—and all three agree. '
  '9':
  - type: text
    content: 'Since we believe human testimony, surely we can believe the greater testimony that comes from God. And God has testified about his Son. '
