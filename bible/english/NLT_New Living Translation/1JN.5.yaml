document_id: 1JN.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faith in the Son of God
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Everyone who believes that Jesus is the Christ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Messiah.
      marker-yv: yv-n
    - type: text
      text: ' has become a child of God. And everyone who loves the Father loves his children, too. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All who believe in the Son of God know in their hearts that this testimony is true. Those who don’t believe this are actually calling God a liar because they don’t believe what God has testified about his Son.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this is what God has testified: He has given us eternal life, and this life is in his Son. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whoever has the Son has life; whoever does not have God’s Son does not have life.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conclusion
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I have written this to you who believe in the name of the Son of God, so that you may know you have eternal life. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And we are confident that he hears us whenever we ask for anything that pleases him. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And since we know he hears us when we make our requests, we also know that he will give us what we ask for.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If you see a fellow believer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a brother.
      marker-yv: yv-n
    - type: text
      text: ' sinning in a way that does not lead to death, you should pray, and God will give that person life. But there is a sin that leads to death, and I am not saying you should pray for those who commit it. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All wicked actions are sin, but not every sin leads to death.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We know that God’s children do not make a practice of sinning, for God’s Son holds them securely, and the evil one cannot touch them. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We know that we are children of God and that the world around us is under the control of the evil one.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'We know we love God’s children if we love God and obey his commandments. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And we know that the Son of God has come, and he has given us understanding so that we can know the true God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the one who is true.
      marker-yv: yv-n
    - type: text
      text: ' And now we live in fellowship with the true God because we live in fellowship with his Son, Jesus Christ. He is the only true God, and he is eternal life.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dear children, keep away from anything that might take God’s place in your hearts.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: keep yourselves from idols.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Loving God means keeping his commandments, and his commandments are not burdensome. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For every child of God defeats this evil world, and we achieve this victory through our faith. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And who can win this battle against the world? Only those who believe that Jesus is the Son of God.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Jesus Christ was revealed as God’s Son by his baptism in water and by shedding his blood on the cross
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: This is he who came by water and blood.
      marker-yv: yv-n
    - type: text
      text: '—not by water only, but by water and blood. And the Spirit, who is truth, confirms it with his testimony. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So we have these three witnesses
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A few very late manuscripts add '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in heaven—the Father, the Word, and the Holy Spirit, and these three are one. And we have three witnesses on earth.
      marker-yv: yv-n
    - type: text
      text: '— '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the Spirit, the water, and the blood—and all three agree. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since we believe human testimony, surely we can believe the greater testimony that comes from God. And God has testified about his Son. '
