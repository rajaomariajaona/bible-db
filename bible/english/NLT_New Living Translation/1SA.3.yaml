document_id: 1SA.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Speaks to Samuel'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Meanwhile, the boy Samuel served the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by assisting Eli. Now in those days messages from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' were very rare, and visions were quite uncommon.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came and called as before, “Samuel! Samuel!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Samuel replied, “Speak, your servant is listening.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Samuel, “I am about to do a shocking thing in Israel. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am going to carry out all my threats against Eli and his family, from beginning to end. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I have warned him that judgment is coming upon his family forever, because his sons are blaspheming God
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his sons have made themselves contemptible.
      marker-yv: yv-n
    - type: text
      text: ' and he hasn’t disciplined them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I have vowed that the sins of Eli and his sons will never be forgiven by sacrifices or offerings.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Samuel Speaks for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Samuel stayed in bed until morning, then got up and opened the doors of the Tabernacle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the house of the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' as usual. He was afraid to tell Eli what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said to him. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But Eli called out to him, “Samuel, my son.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Here I am,” Samuel replied.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“What did the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' say to you? Tell me everything. And may God strike you and even kill you if you hide anything from me!” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Samuel told Eli everything; he didn’t hold anything back. “It is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s will,” Eli replied. “Let him do what he thinks best.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Samuel grew up, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with him, and everything Samuel said proved to be reliable. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One night Eli, who was almost blind by now, had gone to bed. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all Israel, from Dan in the north to Beersheba in the south, knew that Samuel was confirmed as a prophet of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' continued to appear at Shiloh and gave messages to Samuel there at the Tabernacle.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The lamp of God had not yet gone out, and Samuel was sleeping in the Tabernacle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Temple of the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' near the Ark of God. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Suddenly the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' called out, “Samuel!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Yes?” Samuel replied. “What is it?” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He got up and ran to Eli. “Here I am. Did you call me?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I didn’t call you,” Eli replied. “Go back to bed.” So he did.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' called out again, “Samuel!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Again Samuel got up and went to Eli. “Here I am. Did you call me?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I didn’t call you, my son,” Eli said. “Go back to bed.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel did not yet know the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' because he had never had a message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' before. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' called a third time, and once more Samuel got up and went to Eli. “Here I am. Did you call me?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Eli realized it was the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who was calling the boy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he said to Samuel, “Go and lie down again, and if someone calls again, say, ‘Speak, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', your servant is listening.’” So Samuel went back to bed.'
