document_id: 1SA.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Speaks to Samuel
  - type: text
    content: 'Meanwhile, the boy Samuel served the '
  - type: text
    content: Lord
  - type: text
    content: ' by assisting Eli. Now in those days messages from the '
  - type: text
    content: Lord
  - type: text
    content: ' were very rare, and visions were quite uncommon.'
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' came and called as before, “Samuel! Samuel!”'
  - type: text
    content: And Samuel replied, “Speak, your servant is listening.”
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Samuel, “I am about to do a shocking thing in Israel. '
  '12':
  - type: text
    content: 'I am going to carry out all my threats against Eli and his family, from beginning to end. '
  '13':
  - type: text
    content: I have warned him that judgment is coming upon his family forever, because his sons are blaspheming God
  - type: note
    content: As in Greek version; Hebrew reads his sons have made themselves contemptible.
  - type: text
    content: ' and he hasn’t disciplined them. '
  '14':
  - type: text
    content: So I have vowed that the sins of Eli and his sons will never be forgiven by sacrifices or offerings.”
  - type: heading
    content: Samuel Speaks for the Lord
  '15':
  - type: text
    content: Samuel stayed in bed until morning, then got up and opened the doors of the Tabernacle
  - type: note
    content: Hebrew the house of the Lord.
  - type: text
    content: ' as usual. He was afraid to tell Eli what the '
  - type: text
    content: Lord
  - type: text
    content: ' had said to him. '
  '16':
  - type: text
    content: But Eli called out to him, “Samuel, my son.”
  - type: text
    content: “Here I am,” Samuel replied.
  '17':
  - type: text
    content: '“What did the '
  - type: text
    content: Lord
  - type: text
    content: ' say to you? Tell me everything. And may God strike you and even kill you if you hide anything from me!” '
  '18':
  - type: text
    content: 'So Samuel told Eli everything; he didn’t hold anything back. “It is the '
  - type: text
    content: Lord
  - type: text
    content: ’s will,” Eli replied. “Let him do what he thinks best.”
  '19':
  - type: text
    content: 'As Samuel grew up, the '
  - type: text
    content: Lord
  - type: text
    content: ' was with him, and everything Samuel said proved to be reliable. '
  '2':
  - type: text
    content: 'One night Eli, who was almost blind by now, had gone to bed. '
  '20':
  - type: text
    content: 'And all Israel, from Dan in the north to Beersheba in the south, knew that Samuel was confirmed as a prophet of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' continued to appear at Shiloh and gave messages to Samuel there at the Tabernacle.'
  '3':
  - type: text
    content: The lamp of God had not yet gone out, and Samuel was sleeping in the Tabernacle
  - type: note
    content: Hebrew the Temple of the Lord.
  - type: text
    content: ' near the Ark of God. '
  '4':
  - type: text
    content: 'Suddenly the '
  - type: text
    content: Lord
  - type: text
    content: ' called out, “Samuel!”'
  - type: text
    content: '“Yes?” Samuel replied. “What is it?” '
  '5':
  - type: text
    content: He got up and ran to Eli. “Here I am. Did you call me?”
  - type: text
    content: “I didn’t call you,” Eli replied. “Go back to bed.” So he did.
  '6':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' called out again, “Samuel!”'
  - type: text
    content: Again Samuel got up and went to Eli. “Here I am. Did you call me?”
  - type: text
    content: “I didn’t call you, my son,” Eli said. “Go back to bed.”
  '7':
  - type: text
    content: 'Samuel did not yet know the '
  - type: text
    content: Lord
  - type: text
    content: ' because he had never had a message from the '
  - type: text
    content: Lord
  - type: text
    content: ' before. '
  '8':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' called a third time, and once more Samuel got up and went to Eli. “Here I am. Did you call me?”'
  - type: text
    content: 'Then Eli realized it was the '
  - type: text
    content: Lord
  - type: text
    content: ' who was calling the boy. '
  '9':
  - type: text
    content: 'So he said to Samuel, “Go and lie down again, and if someone calls again, say, ‘Speak, '
  - type: text
    content: Lord
  - type: text
    content: ', your servant is listening.’” So Samuel went back to bed.'
