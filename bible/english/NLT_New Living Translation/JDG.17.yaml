document_id: JDG.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Micah’s Idols
  - type: text
    content: 'There was a man named Micah, who lived in the hill country of Ephraim. '
  '10':
  - type: text
    content: “Stay here with me,” Micah said, “and you can be a father and priest to me. I will give you ten pieces of silver
  - type: note
    content: Hebrew 10 [shekels] of silver, about 4 ounces or 114 grams in weight.
  - type: text
    content: ' a year, plus a change of clothes and your food.” '
  '11':
  - type: text
    content: The Levite agreed to this, and the young man became like one of Micah’s sons.
  '12':
  - type: text
    content: 'So Micah installed the Levite as his personal priest, and he lived in Micah’s house. '
  '13':
  - type: text
    content: '“I know the '
  - type: text
    content: Lord
  - type: text
    content: ' will bless me now,” Micah said, “because I have a Levite serving as my priest.”'
  '2':
  - type: text
    content: One day he said to his mother, “I heard you place a curse on the person who stole 1,100 pieces
  - type: note
    content: Hebrew 1,100 [shekels], about 28 pounds or 12.5 kilograms in weight.
  - type: text
    content: ' of silver from you. Well, I have the money. I was the one who took it.”'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' bless you for admitting it,” his mother replied. '
  '3':
  - type: text
    content: 'He returned the money to her, and she said, “I now dedicate these silver coins to the '
  - type: text
    content: Lord
  - type: text
    content: . In honor of my son, I will have an image carved and an idol cast.”
  '4':
  - type: text
    content: 'So when he returned the money to his mother, she took 200 silver coins and gave them to a silversmith, who made them into an image and an idol. And these were placed in Micah’s house. '
  '5':
  - type: text
    content: Micah set up a shrine for the idol, and he made a sacred ephod and some household idols. Then he installed one of his sons as his personal priest.
  '6':
  - type: text
    content: In those days Israel had no king; all the people did whatever seemed right in their own eyes.
  '7':
  - type: text
    content: 'One day a young Levite, who had been living in Bethlehem in Judah, arrived in that area. '
  '8':
  - type: text
    content: 'He had left Bethlehem in search of another place to live, and as he traveled, he came to the hill country of Ephraim. He happened to stop at Micah’s house as he was traveling through. '
  '9':
  - type: text
    content: “Where are you from?” Micah asked him.
  - type: text
    content: He replied, “I am a Levite from Bethlehem in Judah, and I am looking for a place to live.”
