document_id: JDG.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Micah’s Idols
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'There was a man named Micah, who lived in the hill country of Ephraim. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: One day he said to his mother, “I heard you place a curse on the person who stole 1,100 pieces
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1,100 [shekels], '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 28 pounds or 12.5 kilograms in weight.
    marker-yv: yv-n
  - type: text
    text: ' of silver from you. Well, I have the money. I was the one who took it.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' bless you for admitting it,” his mother replied. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He returned the money to her, and she said, “I now dedicate these silver coins to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . In honor of my son, I will have an image carved and an idol cast.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So when he returned the money to his mother, she took 200 silver coins and gave them to a silversmith, who made them into an image and an idol. And these were placed in Micah’s house. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Micah set up a shrine for the idol, and he made a sacred ephod and some household idols. Then he installed one of his sons as his personal priest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: In those days Israel had no king; all the people did whatever seemed right in their own eyes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'One day a young Levite, who had been living in Bethlehem in Judah, arrived in that area. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He had left Bethlehem in search of another place to live, and as he traveled, he came to the hill country of Ephraim. He happened to stop at Micah’s house as he was traveling through. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Where are you from?” Micah asked him.
- type: usfm
  marker: p
  children:
  - type: text
    text: He replied, “I am a Levite from Bethlehem in Judah, and I am looking for a place to live.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Stay here with me,” Micah said, “and you can be a father and priest to me. I will give you ten pieces of silver
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '10 [shekels] of silver, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 4 ounces or 114 grams in weight.
    marker-yv: yv-n
  - type: text
    text: ' a year, plus a change of clothes and your food.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The Levite agreed to this, and the young man became like one of Micah’s sons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So Micah installed the Levite as his personal priest, and he lived in Micah’s house. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“I know the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will bless me now,” Micah said, “because I have a Levite serving as my priest.”'
