document_id: 2SA.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Defeats the Ammonites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Some time after this, King Nahash
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 1 Chr 19:1; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the king.
    marker-yv: yv-n
  - type: text
    text: ' of the Ammonites died, and his son Hanun became king. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: David said, “I am going to show loyalty to Hanun just as his father, Nahash, was always loyal to me.” So David sent ambassadors to express sympathy to Hanun about his father’s death.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But when David’s ambassadors arrived in the land of Ammon, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'the Ammonite commanders said to Hanun, their master, “Do you really think these men are coming here to honor your father? No! David has sent them to spy out the city so they can come in and conquer it!” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So Hanun seized David’s ambassadors and shaved off half of each man’s beard, cut off their robes at the buttocks, and sent them back to David in shame.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: When David heard what had happened, he sent messengers to tell the men, “Stay at Jericho until your beards grow out, and then come back.” For they felt deep shame because of their appearance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When the people of Ammon realized how seriously they had angered David, they sent and hired 20,000 Aramean foot soldiers from the lands of Beth-rehob and Zobah, 1,000 from the king of Maacah, and 12,000 from the land of Tob. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When David heard about this, he sent Joab and all his warriors to fight them. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The Ammonite troops came out and drew up their battle lines at the entrance of the city gate, while the Arameans from Zobah and Rehob and the men from Tob and Maacah positioned themselves to fight in the open fields.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When Joab saw that he would have to fight on both the front and the rear, he chose some of Israel’s elite troops and placed them under his personal command to fight the Arameans in the fields. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He left the rest of the army under the command of his brother Abishai, who was to attack the Ammonites. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“If the Arameans are too strong for me, then come over and help me,” Joab told his brother. “And if the Ammonites are too strong for you, I will come and help you. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Be courageous! Let us fight bravely for our people and the cities of our God. May the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s will be done.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When Joab and his troops attacked, the Arameans began to run away. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And when the Ammonites saw the Arameans running, they ran from Abishai and retreated into the city. After the battle was over, Joab returned to Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The Arameans now realized that they were no match for Israel. So when they regrouped, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: they were joined by additional Aramean troops summoned by Hadadezer from the other side of the Euphrates River.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the river.
    marker-yv: yv-n
  - type: text
    text: ' These troops arrived at Helam under the command of Shobach, the commander of Hadadezer’s forces.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When David heard what was happening, he mobilized all Israel, crossed the Jordan River, and led the army to Helam. The Arameans positioned themselves in battle formation and fought against David. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But again the Arameans fled from the Israelites. This time David’s forces killed 700 charioteers and 40,000 foot soldiers,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Greek manuscripts (see also 1 Chr 19:18); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: charioteers.
    marker-yv: yv-n
  - type: text
    text: ' including Shobach, the commander of their army. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: When all the kings allied with Hadadezer saw that they had been defeated by Israel, they surrendered to Israel and became their subjects. After that, the Arameans were afraid to help the Ammonites.
