document_id: 2SA.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David Defeats the Ammonites
  - type: text
    content: Some time after this, King Nahash
  - type: note
    content: As in parallel text at 1 Chr 19:1; Hebrew reads the king.
  - type: text
    content: ' of the Ammonites died, and his son Hanun became king. '
  '10':
  - type: text
    content: 'He left the rest of the army under the command of his brother Abishai, who was to attack the Ammonites. '
  '11':
  - type: text
    content: '“If the Arameans are too strong for me, then come over and help me,” Joab told his brother. “And if the Ammonites are too strong for you, I will come and help you. '
  '12':
  - type: text
    content: 'Be courageous! Let us fight bravely for our people and the cities of our God. May the '
  - type: text
    content: Lord
  - type: text
    content: ’s will be done.”
  '13':
  - type: text
    content: 'When Joab and his troops attacked, the Arameans began to run away. '
  '14':
  - type: text
    content: And when the Ammonites saw the Arameans running, they ran from Abishai and retreated into the city. After the battle was over, Joab returned to Jerusalem.
  '15':
  - type: text
    content: 'The Arameans now realized that they were no match for Israel. So when they regrouped, '
  '16':
  - type: text
    content: they were joined by additional Aramean troops summoned by Hadadezer from the other side of the Euphrates River.
  - type: note
    content: Hebrew the river.
  - type: text
    content: ' These troops arrived at Helam under the command of Shobach, the commander of Hadadezer’s forces.'
  '17':
  - type: text
    content: 'When David heard what was happening, he mobilized all Israel, crossed the Jordan River, and led the army to Helam. The Arameans positioned themselves in battle formation and fought against David. '
  '18':
  - type: text
    content: But again the Arameans fled from the Israelites. This time David’s forces killed 700 charioteers and 40,000 foot soldiers,
  - type: note
    content: As in some Greek manuscripts (see also 1 Chr 19:18); Hebrew reads charioteers.
  - type: text
    content: ' including Shobach, the commander of their army. '
  '19':
  - type: text
    content: When all the kings allied with Hadadezer saw that they had been defeated by Israel, they surrendered to Israel and became their subjects. After that, the Arameans were afraid to help the Ammonites.
  '2':
  - type: text
    content: David said, “I am going to show loyalty to Hanun just as his father, Nahash, was always loyal to me.” So David sent ambassadors to express sympathy to Hanun about his father’s death.
  - type: text
    content: 'But when David’s ambassadors arrived in the land of Ammon, '
  '3':
  - type: text
    content: 'the Ammonite commanders said to Hanun, their master, “Do you really think these men are coming here to honor your father? No! David has sent them to spy out the city so they can come in and conquer it!” '
  '4':
  - type: text
    content: So Hanun seized David’s ambassadors and shaved off half of each man’s beard, cut off their robes at the buttocks, and sent them back to David in shame.
  '5':
  - type: text
    content: When David heard what had happened, he sent messengers to tell the men, “Stay at Jericho until your beards grow out, and then come back.” For they felt deep shame because of their appearance.
  '6':
  - type: text
    content: 'When the people of Ammon realized how seriously they had angered David, they sent and hired 20,000 Aramean foot soldiers from the lands of Beth-rehob and Zobah, 1,000 from the king of Maacah, and 12,000 from the land of Tob. '
  '7':
  - type: text
    content: 'When David heard about this, he sent Joab and all his warriors to fight them. '
  '8':
  - type: text
    content: The Ammonite troops came out and drew up their battle lines at the entrance of the city gate, while the Arameans from Zobah and Rehob and the men from Tob and Maacah positioned themselves to fight in the open fields.
  '9':
  - type: text
    content: 'When Joab saw that he would have to fight on both the front and the rear, he chose some of Israel’s elite troops and placed them under his personal command to fight the Arameans in the fields. '
