document_id: JHN.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Prologue: Christ, the Eternal Word'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: In the beginning the Word already existed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Word was with God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the Word was God.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'He came into the very world he created, but the world didn’t recognize him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'He came to his own people, and even they rejected him. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But to all who believed him and accepted him, he gave the right to become children of God. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: They are reborn—not with a physical birth resulting from human passion or plan, but a birth that comes from God.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So the Word became human
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:14a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: became flesh.
      marker-yv: yv-n
    - type: text
      text: ' and made his home among us. He was full of unfailing love and faithfulness.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:14b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'grace and truth; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 1:17.
      marker-yv: yv-n
    - type: text
      text: ' And we have seen his glory, the glory of the Father’s one and only Son.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: John testified about him when he shouted to the crowds, “This is the one I was talking about when I said, ‘Someone is coming after me who is far greater than I am, for he existed long before me.’”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: From his abundance we have all received one gracious blessing after another.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'received the grace of Christ rather than the grace of the law; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: received grace upon grace.
      marker-yv: yv-n
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For the law was given through Moses, but God’s unfailing love and faithfulness came through Jesus Christ. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: No one has ever seen God. But the unique One, who is himself God,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: But the one and only Son.
      marker-yv: yv-n
    - type: text
      text: ' is near to the Father’s heart. He has revealed God to us.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Testimony of John the Baptist
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: This was John’s testimony when the Jewish leaders sent priests and Temple assistants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and Levites.
      marker-yv: yv-n
    - type: text
      text: ' from Jerusalem to ask John, “Who are you?” '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He existed in the beginning with God.
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: He came right out and said, “I am not the Messiah.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “Well then, who are you?” they asked. “Are you Elijah?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No,” he replied.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Are you the Prophet we are expecting?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Are you the Prophet? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Deut 18:15, 18; Mal 4:5-6.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Then who are you? We need an answer for those who sent us. What do you have to say about yourself?”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'John replied in the words of the prophet Isaiah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am a voice shouting in the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '‘Clear the way for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s coming!’”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 40:3.
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then the Pharisees who had been sent '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: asked him, “If you aren’t the Messiah or Elijah or the Prophet, what right do you have to baptize?”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: John told them, “I baptize with
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 1:31, 33.
      marker-yv: yv-n
    - type: text
      text: ' water, but right here in the crowd is someone you do not recognize. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Though his ministry follows mine, I’m not even worthy to be his slave and untie the straps of his sandal.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: This encounter took place in Bethany, an area east of the Jordan River, where John was baptizing.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus, the Lamb of God
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The next day John saw Jesus coming toward him and said, “Look! The Lamb of God who takes away the sin of the world! '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: God created everything through him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and nothing was created except through him.
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'He is the one I was talking about when I said, ‘A man is coming after me who is far greater than I am, for he existed long before me.’ '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: I did not recognize him as the Messiah, but I have been baptizing with water so that he might be revealed to Israel.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Then John testified, “I saw the Holy Spirit descending like a dove from heaven and resting upon him. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'I didn’t know he was the one, but when God sent me to baptize with water, he told me, ‘The one on whom you see the Spirit descend and rest is the one who will baptize with the Holy Spirit.’ '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: I saw this happen to Jesus, so I testify that he is the Chosen One of God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Son of God.
      marker-yv: yv-n
    - type: text
      text: ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The First Disciples
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'The following day John was again standing with two of his disciples. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'As Jesus walked by, John looked at him and declared, “Look! There is the Lamb of God!” '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: When John’s two disciples heard this, they followed Jesus.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Jesus looked around and saw them following. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“What do you want?” '
    - type: text
      text: he asked them.
  - type: usfm
    marker: p
    children:
    - type: text
      text: They replied, “Rabbi” (which means “Teacher”), “where are you staying?”
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Come and see,” '
    - type: text
      text: he said. It was about four o’clock in the afternoon when they went with him to the place where he was staying, and they remained with him the rest of the day.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The Word gave life to everything that was created,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:3-4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and nothing that was created was created except through him. The Word gave life to everything.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his life brought light to everyone.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Andrew, Simon Peter’s brother, was one of these men who heard what John said and then followed Jesus. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Andrew went to find his brother, Simon, and told him, “We have found the Messiah” (which means “Christ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:41 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Messiah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(a Hebrew term) and '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a Greek term) both mean “anointed one.”
      marker-yv: yv-n
    - type: text
      text: ).
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Then Andrew brought Simon to meet Jesus. Looking intently at Simon, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Your name is Simon, son of John—but you will be called Cephas”
    - type: text
      text: ' (which means “Peter”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The names '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Cephas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(from Aramaic) and '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Peter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (from Greek) both mean “rock.”
      marker-yv: yv-n
    - type: text
      text: ).
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'The next day Jesus decided to go to Galilee. He found Philip and said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Come, follow me.”
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Philip was from Bethsaida, Andrew and Peter’s hometown.
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Philip went to look for Nathanael and told him, “We have found the very person Moses
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:45 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Moses in the law.
      marker-yv: yv-n
    - type: text
      text: ' and the prophets wrote about! His name is Jesus, the son of Joseph from Nazareth.”'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: “Nazareth!” exclaimed Nathanael. “Can anything good come from Nazareth?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Come and see for yourself,” Philip replied.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'As they approached, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now here is a genuine son of Israel—a man of complete integrity.”
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: “How do you know about me?” Nathanael asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I could see you under the fig tree before Philip found you.”
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Then Nathanael exclaimed, “Rabbi, you are the Son of God—the King of Israel!”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The light shines in the darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the darkness can never extinguish it.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and the darkness has not understood it.
      marker-yv: yv-n
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Jesus asked him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you believe this just because I told you I had seen you under the fig tree? You will see greater things than this.”
    - type: text
      text: ' '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Then he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you the truth, you will all see heaven open and the angels of God going up and down on the Son of Man, the one who is the stairway between heaven and earth.
    - type: usfm
      marker: f
      children:
      - type: usfm
