document_id: JHN.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Prologue: Christ, the Eternal Word'
  - type: text
    content: In the beginning the Word already existed.
  - type: text
    content: The Word was with God,
  - type: text
    content: and the Word was God.
  '10':
  - type: text
    content: 'He came into the very world he created, but the world didn’t recognize him. '
  '11':
  - type: text
    content: 'He came to his own people, and even they rejected him. '
  '12':
  - type: text
    content: 'But to all who believed him and accepted him, he gave the right to become children of God. '
  '13':
  - type: text
    content: They are reborn—not with a physical birth resulting from human passion or plan, but a birth that comes from God.
  '14':
  - type: text
    content: So the Word became human
  - type: note
    content: Greek became flesh.
  - type: text
    content: ' and made his home among us. He was full of unfailing love and faithfulness.'
  - type: note
    content: Or grace and truth; also in 1:17.
  - type: text
    content: ' And we have seen his glory, the glory of the Father’s one and only Son.'
  '15':
  - type: text
    content: John testified about him when he shouted to the crowds, “This is the one I was talking about when I said, ‘Someone is coming after me who is far greater than I am, for he existed long before me.’”
  '16':
  - type: text
    content: From his abundance we have all received one gracious blessing after another.
  - type: note
    content: Or received the grace of Christ rather than the grace of the law; Greek reads received grace upon grace.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'For the law was given through Moses, but God’s unfailing love and faithfulness came through Jesus Christ. '
  '18':
  - type: text
    content: No one has ever seen God. But the unique One, who is himself God,
  - type: note
    content: Some manuscripts read But the one and only Son.
  - type: text
    content: ' is near to the Father’s heart. He has revealed God to us.'
  - type: heading
    content: The Testimony of John the Baptist
  '19':
  - type: text
    content: This was John’s testimony when the Jewish leaders sent priests and Temple assistants
  - type: note
    content: Greek and Levites.
  - type: text
    content: ' from Jerusalem to ask John, “Who are you?” '
  '2':
  - type: text
    content: He existed in the beginning with God.
  '20':
  - type: text
    content: He came right out and said, “I am not the Messiah.”
  '21':
  - type: text
    content: “Well then, who are you?” they asked. “Are you Elijah?”
  - type: text
    content: “No,” he replied.
  - type: text
    content: “Are you the Prophet we are expecting?”
  - type: note
    content: Greek Are you the Prophet? See Deut 18:15, 18; Mal 4:5-6.
  - type: text
    content: “No.”
  '22':
  - type: text
    content: “Then who are you? We need an answer for those who sent us. What do you have to say about yourself?”
  '23':
  - type: text
    content: 'John replied in the words of the prophet Isaiah:'
  - type: text
    content: “I am a voice shouting in the wilderness,
  - type: text
    content: '‘Clear the way for the '
  - type: text
    content: Lord
  - type: text
    content: ’s coming!’”
  - type: note
    content: Isa 40:3.
  '24':
  - type: text
    content: 'Then the Pharisees who had been sent '
  '25':
  - type: text
    content: asked him, “If you aren’t the Messiah or Elijah or the Prophet, what right do you have to baptize?”
  '26':
  - type: text
    content: John told them, “I baptize with
  - type: note
    content: Or in; also in 1:31, 33.
  - type: text
    content: ' water, but right here in the crowd is someone you do not recognize. '
  '27':
  - type: text
    content: Though his ministry follows mine, I’m not even worthy to be his slave and untie the straps of his sandal.”
  '28':
  - type: text
    content: This encounter took place in Bethany, an area east of the Jordan River, where John was baptizing.
  - type: heading
    content: Jesus, the Lamb of God
  '29':
  - type: text
    content: 'The next day John saw Jesus coming toward him and said, “Look! The Lamb of God who takes away the sin of the world! '
  '3':
  - type: text
    content: God created everything through him,
  - type: text
    content: and nothing was created except through him.
  '30':
  - type: text
    content: 'He is the one I was talking about when I said, ‘A man is coming after me who is far greater than I am, for he existed long before me.’ '
  '31':
  - type: text
    content: I did not recognize him as the Messiah, but I have been baptizing with water so that he might be revealed to Israel.”
  '32':
  - type: text
    content: 'Then John testified, “I saw the Holy Spirit descending like a dove from heaven and resting upon him. '
  '33':
  - type: text
    content: 'I didn’t know he was the one, but when God sent me to baptize with water, he told me, ‘The one on whom you see the Spirit descend and rest is the one who will baptize with the Holy Spirit.’ '
  '34':
  - type: text
    content: I saw this happen to Jesus, so I testify that he is the Chosen One of God.
  - type: note
    content: Some manuscripts read the Son of God.
  - type: text
    content: ”
  - type: heading
    content: The First Disciples
  '35':
  - type: text
    content: 'The following day John was again standing with two of his disciples. '
  '36':
  - type: text
    content: 'As Jesus walked by, John looked at him and declared, “Look! There is the Lamb of God!” '
  '37':
  - type: text
    content: When John’s two disciples heard this, they followed Jesus.
  '38':
  - type: text
    content: 'Jesus looked around and saw them following. '
  - type: text
    content: '“What do you want?” '
  - type: text
    content: he asked them.
  - type: text
    content: They replied, “Rabbi” (which means “Teacher”), “where are you staying?”
  '39':
  - type: text
    content: ' '
  - type: text
    content: '“Come and see,” '
  - type: text
    content: he said. It was about four o’clock in the afternoon when they went with him to the place where he was staying, and they remained with him the rest of the day.
  '4':
  - type: text
    content: The Word gave life to everything that was created,
  - type: note
    content: Or and nothing that was created was created except through him. The Word gave life to everything.
  - type: text
    content: and his life brought light to everyone.
  '40':
  - type: text
    content: 'Andrew, Simon Peter’s brother, was one of these men who heard what John said and then followed Jesus. '
  '41':
  - type: text
    content: Andrew went to find his brother, Simon, and told him, “We have found the Messiah” (which means “Christ”
  - type: note
    content: Messiah (a Hebrew term) and Christ (a Greek term) both mean “anointed one.”
  - type: text
    content: ).
  '42':
  - type: text
    content: 'Then Andrew brought Simon to meet Jesus. Looking intently at Simon, Jesus said, '
  - type: text
    content: “Your name is Simon, son of John—but you will be called Cephas”
  - type: text
    content: ' (which means “Peter”'
  - type: note
    content: The names Cephas (from Aramaic) and Peter (from Greek) both mean “rock.”
  - type: text
    content: ).
  '43':
  - type: text
    content: 'The next day Jesus decided to go to Galilee. He found Philip and said to him, '
  - type: text
    content: “Come, follow me.”
  - type: text
    content: ' '
  '44':
  - type: text
    content: Philip was from Bethsaida, Andrew and Peter’s hometown.
  '45':
  - type: text
    content: Philip went to look for Nathanael and told him, “We have found the very person Moses
  - type: note
    content: Greek Moses in the law.
  - type: text
    content: ' and the prophets wrote about! His name is Jesus, the son of Joseph from Nazareth.”'
  '46':
  - type: text
    content: “Nazareth!” exclaimed Nathanael. “Can anything good come from Nazareth?”
  - type: text
    content: “Come and see for yourself,” Philip replied.
  '47':
  - type: text
    content: 'As they approached, Jesus said, '
  - type: text
    content: “Now here is a genuine son of Israel—a man of complete integrity.”
  '48':
  - type: text
    content: “How do you know about me?” Nathanael asked.
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I could see you under the fig tree before Philip found you.”
  '49':
  - type: text
    content: Then Nathanael exclaimed, “Rabbi, you are the Son of God—the King of Israel!”
  '5':
  - type: text
    content: The light shines in the darkness,
  - type: text
    content: and the darkness can never extinguish it.
  - type: note
    content: Or and the darkness has not understood it.
  '50':
  - type: text
    content: 'Jesus asked him, '
  - type: text
    content: “Do you believe this just because I told you I had seen you under the fig tree? You will see greater things than this.”
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'Then he said, '
  - type: text
    content: “I tell you the truth, you will all see heaven open and the angels of God going up and down on the Son of Man, the one who is the stairway between heaven and earth.
  - type: note
    content: Greek going up and down on the Son of Man; see Gen 28:10-17. “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ”
  '6':
  - type: text
    content: God sent a man, John the Baptist,
  - type: note
    content: Greek a man named John.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'to tell about the light so that everyone might believe because of his testimony. '
  '8':
  - type: text
    content: 'John himself was not the light; he was simply a witness to tell about the light. '
  '9':
  - type: text
    content: The one who is the true light, who gives light to everyone, was coming into the world.
