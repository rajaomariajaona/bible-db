document_id: ROM.10,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Brothers.
      marker-yv: yv-n
    - type: text
      text: ' the longing of my heart and my prayer to God is for the people of Israel to be saved. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For it is by believing in your heart that you are made right with God, and it is by openly declaring your faith that you are saved. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: As the Scriptures tell us, “Anyone who trusts in him will never be disgraced.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 28:16 (Greek version).
      marker-yv: yv-n
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Jew and Gentile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and Greek.
      marker-yv: yv-n
    - type: text
      text: ' are the same in this respect. They have the same Lord, who gives generously to all who call on him. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For “Everyone who calls on the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be saved.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joel 2:32.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But how can they call on him to save them unless they believe in him? And how can they believe in him if they have never heard about him? And how can they hear about him unless someone tells them? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And how will anyone go and tell them without being sent? That is why the Scriptures say, “How beautiful are the feet of messengers who bring good news!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 52:7.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But not everyone welcomes the Good News, for Isaiah the prophet said, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who has believed our message?”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 53:1.
      marker-yv: yv-n
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So faith comes from hearing, that is, hearing the Good News about Christ. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But I ask, have the people of Israel actually heard the message? Yes, they have:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The message has gone throughout the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the words to all the world.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 19:4.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: But I ask, did the people of Israel really understand? Yes, they did, for even in the time of Moses, God said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will rouse your jealousy through people who are not even a nation.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will provoke your anger through the foolish Gentiles.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut 32:21.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I know what enthusiasm they have for God, but it is misdirected zeal. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: And later Isaiah spoke boldly for God, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I was found by people who were not looking for me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I showed myself to those who were not asking for me.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 65:1 (Greek version).
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: But regarding Israel, God said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “All day long I opened my arms to them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they were disobedient and rebellious.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 65:2 (Greek version).
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For they don’t understand God’s way of making people right with himself. Refusing to accept God’s way, they cling to their own way of getting right with God by trying to keep the law. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For Christ has already accomplished the purpose for which the law was given.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: For Christ is the end of the law.
      marker-yv: yv-n
    - type: text
      text: ' As a result, all who believe in him are made right with God.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salvation Is for Everyone
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: For Moses writes that the law’s way of making a person right with God requires obedience to all of its commands.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Lev 18:5.
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But faith’s way of getting right with God says, “Don’t say in your heart, ‘Who will go up to heaven?’ (to bring Christ down to earth). '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And don’t say, ‘Who will go down to the place of the dead?’ (to bring Christ back to life again).” '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: In fact, it says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The message is very close at hand;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is on your lips and in your heart.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:6-8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut 30:12-14.
      marker-yv: yv-n
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And that message is the very message about faith that we preach: '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'If you openly declare that Jesus is Lord and believe in your heart that God raised him from the dead, you will be saved. '
