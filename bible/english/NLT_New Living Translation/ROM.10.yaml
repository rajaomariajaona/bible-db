document_id: ROM.10,116
type_code: eng
verses:
  '1':
  - type: text
    content: Dear brothers and sisters,
  - type: note
    content: Greek Brothers.
  - type: text
    content: ' the longing of my heart and my prayer to God is for the people of Israel to be saved. '
  '10':
  - type: text
    content: 'For it is by believing in your heart that you are made right with God, and it is by openly declaring your faith that you are saved. '
  '11':
  - type: text
    content: As the Scriptures tell us, “Anyone who trusts in him will never be disgraced.”
  - type: note
    content: Isa 28:16 (Greek version).
  - type: text
    content: ' '
  '12':
  - type: text
    content: Jew and Gentile
  - type: note
    content: Greek and Greek.
  - type: text
    content: ' are the same in this respect. They have the same Lord, who gives generously to all who call on him. '
  '13':
  - type: text
    content: 'For “Everyone who calls on the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' will be saved.”'
  - type: note
    content: Joel 2:32.
  '14':
  - type: text
    content: 'But how can they call on him to save them unless they believe in him? And how can they believe in him if they have never heard about him? And how can they hear about him unless someone tells them? '
  '15':
  - type: text
    content: And how will anyone go and tell them without being sent? That is why the Scriptures say, “How beautiful are the feet of messengers who bring good news!”
  - type: note
    content: Isa 52:7.
  '16':
  - type: text
    content: But not everyone welcomes the Good News, for Isaiah the prophet said, “
  - type: text
    content: Lord
  - type: text
    content: ', who has believed our message?”'
  - type: note
    content: Isa 53:1.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'So faith comes from hearing, that is, hearing the Good News about Christ. '
  '18':
  - type: text
    content: 'But I ask, have the people of Israel actually heard the message? Yes, they have:'
  - type: text
    content: “The message has gone throughout the earth,
  - type: text
    content: and the words to all the world.”
  - type: note
    content: Ps 19:4.
  '19':
  - type: text
    content: But I ask, did the people of Israel really understand? Yes, they did, for even in the time of Moses, God said,
  - type: text
    content: “I will rouse your jealousy through people who are not even a nation.
  - type: text
    content: I will provoke your anger through the foolish Gentiles.”
  - type: note
    content: Deut 32:21.
  '2':
  - type: text
    content: 'I know what enthusiasm they have for God, but it is misdirected zeal. '
  '20':
  - type: text
    content: And later Isaiah spoke boldly for God, saying,
  - type: text
    content: “I was found by people who were not looking for me.
  - type: text
    content: I showed myself to those who were not asking for me.”
  - type: note
    content: Isa 65:1 (Greek version).
  '21':
  - type: text
    content: But regarding Israel, God said,
  - type: text
    content: “All day long I opened my arms to them,
  - type: text
    content: but they were disobedient and rebellious.”
  - type: note
    content: Isa 65:2 (Greek version).
  '3':
  - type: text
    content: 'For they don’t understand God’s way of making people right with himself. Refusing to accept God’s way, they cling to their own way of getting right with God by trying to keep the law. '
  '4':
  - type: text
    content: For Christ has already accomplished the purpose for which the law was given.
  - type: note
    content: Or For Christ is the end of the law.
  - type: text
    content: ' As a result, all who believe in him are made right with God.'
  - type: heading
    content: Salvation Is for Everyone
  '5':
  - type: text
    content: For Moses writes that the law’s way of making a person right with God requires obedience to all of its commands.
  - type: note
    content: See Lev 18:5.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'But faith’s way of getting right with God says, “Don’t say in your heart, ‘Who will go up to heaven?’ (to bring Christ down to earth). '
  '7':
  - type: text
    content: 'And don’t say, ‘Who will go down to the place of the dead?’ (to bring Christ back to life again).” '
  '8':
  - type: text
    content: In fact, it says,
  - type: text
    content: “The message is very close at hand;
  - type: text
    content: it is on your lips and in your heart.”
  - type: note
    content: Deut 30:12-14.
  - type: text
    content: 'And that message is the very message about faith that we preach: '
  '9':
  - type: text
    content: 'If you openly declare that Jesus is Lord and believe in your heart that God raised him from the dead, you will be saved. '
