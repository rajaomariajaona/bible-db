document_id: NEH.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: These are the memoirs of Nehemiah son of Hacaliah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nehemiah’s Concern for Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: In late autumn, in the month of Kislev, in the twentieth year of King Artaxerxes’ reign,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'In the month of Kislev of the twentieth year. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A number of dates in the book of Nehemiah can be cross-checked with dates in surviving Persian records and related accurately to our modern calendar. This month of the ancient Hebrew lunar calendar occurred within the months of November and December 446 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ' The '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'twentieth year '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: probably refers to the reign of King Artaxerxes I; compare 2:1; 5:14.
      marker-yv: yv-n
    - type: text
      text: ' I was at the fortress of Susa. '
  '10':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“The people you rescued by your great power and strong hand are your servants. '
  '11':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: O Lord, please hear my prayer! Listen to the prayers of those of us who delight in honoring you. Please grant me success today by making the king favorable to me.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: today in the sight of this man.
      marker-yv: yv-n
    - type: text
      text: ' Put it into his heart to be kind to me.”'
  - type: usfm
    marker: m
    children:
    - type: text
      text: In those days I was the king’s cup-bearer.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hanani, one of my brothers, came to visit me with some other men who had just arrived from Judah. I asked them about the Jews who had returned there from captivity and about how things were going in Jerusalem.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: They said to me, “Things are not going well for those who returned to the province of Judah. They are in great trouble and disgrace. The wall of Jerusalem has been torn down, and the gates have been destroyed by fire.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'When I heard this, I sat down and wept. In fact, for days I mourned, fasted, and prayed to the God of heaven. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then I said,
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: '“O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of heaven, the great and awesome God who keeps his covenant of unfailing love with those who love him and obey his commands, '
  '6':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'listen to my prayer! Look down and see me praying night and day for your people Israel. I confess that we have sinned against you. Yes, even my own family and I have sinned! '
  '7':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: We have sinned terribly by not obeying the commands, decrees, and regulations that you gave us through your servant Moses.
  '8':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“Please remember what you told your servant Moses: ‘If you are unfaithful to me, I will scatter you among the nations. '
  '9':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: But if you return to me and obey my commands and live by them, then even if you are exiled to the ends of the earth,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of the heavens.
      marker-yv: yv-n
    - type: text
      text: ' I will bring you back to the place I have chosen for my name to be honored.’'
