document_id: 1SA.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Philistines Return the Ark
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' remained in Philistine territory seven months in all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then the Philistines called in their priests and diviners and asked them, “What should we do about the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '? Tell us how to return it to its own country.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Send the Ark of the God of Israel back with a gift,” they were told. “Send a guilt offering so the plague will stop. Then, if you are healed, you will know it was his hand that caused the plague.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “What sort of guilt offering should we send?” they asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And they were told, “Since the plague has struck both you and your five rulers, make five gold tumors and five gold rats, just like those that have ravaged your land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Make these things to show honor to the God of Israel. Perhaps then he will stop afflicting you, your gods, and your land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Don’t be stubborn and rebellious as Pharaoh and the Egyptians were. By the time God was finished with them, they were eager to let Israel go.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Now build a new cart, and find two cows that have just given birth to calves. Make sure the cows have never been yoked to a cart. Hitch the cows to the cart, but shut their calves away from them in a pen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Put the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' on the cart, and beside it place a chest containing the gold rats and gold tumors you are sending as a guilt offering. Then let the cows go wherever they want. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'If they cross the border of our land and go to Beth-shemesh, we will know it was the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' who brought this great disaster upon us. If they don’t, we will know it was not his hand that caused the plague. It came simply by chance.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So these instructions were carried out. Two cows were hitched to the cart, and their newborn calves were shut up in a pen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and the chest containing the gold rats and gold tumors were placed on the cart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And sure enough, without veering off in other directions, the cows went straight along the road toward Beth-shemesh, lowing as they went. The Philistine rulers followed them as far as the border of Beth-shemesh.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The people of Beth-shemesh were harvesting wheat in the valley, and when they saw the Ark, they were overjoyed! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The cart came into the field of a man named Joshua and stopped beside a large rock. So the people broke up the wood of the cart for a fire and killed the cows and sacrificed them to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as a burnt offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Several men of the tribe of Levi lifted the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and the chest containing the gold rats and gold tumors from the cart and placed them on the large rock. Many sacrifices and burnt offerings were offered to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' that day by the people of Beth-shemesh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The five Philistine rulers watched all this and then returned to Ekron that same day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The five gold tumors sent by the Philistines as a guilt offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' were gifts from the rulers of Ashdod, Gaza, Ashkelon, Gath, and Ekron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The five gold rats represented the five Philistine towns and their surrounding villages, which were controlled by the five rulers. The large rock
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Hebrew manuscripts and Greek version; most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'great meadow '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Abel-haggedolah.
    marker-yv: yv-n
  - type: text
    text: ' at Beth-shemesh, where they set the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', still stands in the field of Joshua as a witness to what happened there.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ark Moved to Kiriath-Jearim
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' killed seventy men'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in a few Hebrew manuscripts; most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '70 men, 50,000 men. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Perhaps the text should be understood to read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' killed 70 men and 50 oxen.'
    marker-yv: yv-n
  - type: text
    text: ' from Beth-shemesh because they looked into the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. And the people mourned greatly because of what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“Who is able to stand in the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', this holy God?” they cried out. “Where can we send the Ark from here?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So they sent messengers to the people at Kiriath-jearim and told them, “The Philistines have returned the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . Come here and get it!”
