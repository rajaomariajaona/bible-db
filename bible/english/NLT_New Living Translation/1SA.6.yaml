document_id: 1SA.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Philistines Return the Ark
  - type: text
    content: 'The Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' remained in Philistine territory seven months in all. '
  '10':
  - type: text
    content: 'So these instructions were carried out. Two cows were hitched to the cart, and their newborn calves were shut up in a pen. '
  '11':
  - type: text
    content: 'Then the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the chest containing the gold rats and gold tumors were placed on the cart. '
  '12':
  - type: text
    content: And sure enough, without veering off in other directions, the cows went straight along the road toward Beth-shemesh, lowing as they went. The Philistine rulers followed them as far as the border of Beth-shemesh.
  '13':
  - type: text
    content: 'The people of Beth-shemesh were harvesting wheat in the valley, and when they saw the Ark, they were overjoyed! '
  '14':
  - type: text
    content: 'The cart came into the field of a man named Joshua and stopped beside a large rock. So the people broke up the wood of the cart for a fire and killed the cows and sacrificed them to the '
  - type: text
    content: Lord
  - type: text
    content: ' as a burnt offering. '
  '15':
  - type: text
    content: 'Several men of the tribe of Levi lifted the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the chest containing the gold rats and gold tumors from the cart and placed them on the large rock. Many sacrifices and burnt offerings were offered to the '
  - type: text
    content: Lord
  - type: text
    content: ' that day by the people of Beth-shemesh. '
  '16':
  - type: text
    content: The five Philistine rulers watched all this and then returned to Ekron that same day.
  '17':
  - type: text
    content: 'The five gold tumors sent by the Philistines as a guilt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' were gifts from the rulers of Ashdod, Gaza, Ashkelon, Gath, and Ekron. '
  '18':
  - type: text
    content: The five gold rats represented the five Philistine towns and their surrounding villages, which were controlled by the five rulers. The large rock
  - type: note
    content: As in some Hebrew manuscripts and Greek version; most Hebrew manuscripts read great meadow or Abel-haggedolah.
  - type: text
    content: ' at Beth-shemesh, where they set the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', still stands in the field of Joshua as a witness to what happened there.'
  - type: heading
    content: The Ark Moved to Kiriath-Jearim
  '19':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' killed seventy men'
  - type: note
    content: As in a few Hebrew manuscripts; most Hebrew manuscripts read 70 men, 50,000 men. Perhaps the text should be understood to read the Lord killed 70 men and 50 oxen.
  - type: text
    content: ' from Beth-shemesh because they looked into the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '. And the people mourned greatly because of what the '
  - type: text
    content: Lord
  - type: text
    content: ' had done. '
  '2':
  - type: text
    content: 'Then the Philistines called in their priests and diviners and asked them, “What should we do about the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '? Tell us how to return it to its own country.”'
  '20':
  - type: text
    content: '“Who is able to stand in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ', this holy God?” they cried out. “Where can we send the Ark from here?”'
  '21':
  - type: text
    content: 'So they sent messengers to the people at Kiriath-jearim and told them, “The Philistines have returned the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: . Come here and get it!”
  '3':
  - type: text
    content: “Send the Ark of the God of Israel back with a gift,” they were told. “Send a guilt offering so the plague will stop. Then, if you are healed, you will know it was his hand that caused the plague.”
  '4':
  - type: text
    content: “What sort of guilt offering should we send?” they asked.
  - type: text
    content: 'And they were told, “Since the plague has struck both you and your five rulers, make five gold tumors and five gold rats, just like those that have ravaged your land. '
  '5':
  - type: text
    content: 'Make these things to show honor to the God of Israel. Perhaps then he will stop afflicting you, your gods, and your land. '
  '6':
  - type: text
    content: Don’t be stubborn and rebellious as Pharaoh and the Egyptians were. By the time God was finished with them, they were eager to let Israel go.
  '7':
  - type: text
    content: '“Now build a new cart, and find two cows that have just given birth to calves. Make sure the cows have never been yoked to a cart. Hitch the cows to the cart, but shut their calves away from them in a pen. '
  '8':
  - type: text
    content: 'Put the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' on the cart, and beside it place a chest containing the gold rats and gold tumors you are sending as a guilt offering. Then let the cows go wherever they want. '
  '9':
  - type: text
    content: 'If they cross the border of our land and go to Beth-shemesh, we will know it was the '
  - type: text
    content: Lord
  - type: text
    content: ' who brought this great disaster upon us. If they don’t, we will know it was not his hand that caused the plague. It came simply by chance.”'
