document_id: PSA.2
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Why are the nations so angry?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why do they waste their time with futile plans?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The kings of the earth prepare for battle;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rulers plot together
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and against his anointed one.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Let us break their chains,” they cry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “and free ourselves from slavery to God.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But the one who rules in heaven laughs.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The Lord scoffs at them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then in anger he rebukes them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: terrifying them with his fierce fury.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For the Lord declares, “I have placed my chosen king on the throne
- type: usfm
  marker: q2
  children:
  - type: text
    text: in Jerusalem,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on Zion.
    marker-yv: yv-n
  - type: text
    text: ' on my holy mountain.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The king proclaims the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s decree:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, ‘You are my son.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Son; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 2:12.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: Today I have become your Father.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Today I reveal you as my son.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Only ask, and I will give you the nations as your inheritance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the whole earth as your possession.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You will break
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'rule. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Rev 2:27.
    marker-yv: yv-n
  - type: text
    text: ' them with an iron rod'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and smash them like clay pots.’”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Now then, you kings, act wisely!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Be warned, you rulers of the earth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Serve the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with reverent fear,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rejoice with trembling.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Submit to God’s royal son,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' or he will become angry,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will be destroyed in the midst of all your activities—
- type: usfm
  marker: q1
  children:
  - type: text
    text: for his anger flares up in an instant.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But what joy for all who take refuge in him!
