document_id: PSA.2,116
type_code: eng
verses:
  '1':
  - type: text
    content: Why are the nations so angry?
  - type: text
    content: Why do they waste their time with futile plans?
  '10':
  - type: text
    content: Now then, you kings, act wisely!
  - type: text
    content: Be warned, you rulers of the earth!
  '11':
  - type: text
    content: 'Serve the '
  - type: text
    content: Lord
  - type: text
    content: ' with reverent fear,'
  - type: text
    content: and rejoice with trembling.
  '12':
  - type: text
    content: Submit to God’s royal son,
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' or he will become angry,'
  - type: text
    content: and you will be destroyed in the midst of all your activities—
  - type: text
    content: for his anger flares up in an instant.
  - type: text
    content: But what joy for all who take refuge in him!
  '2':
  - type: text
    content: The kings of the earth prepare for battle;
  - type: text
    content: the rulers plot together
  - type: text
    content: 'against the '
  - type: text
    content: Lord
  - type: text
    content: and against his anointed one.
  '3':
  - type: text
    content: “Let us break their chains,” they cry,
  - type: text
    content: “and free ourselves from slavery to God.”
  '4':
  - type: text
    content: But the one who rules in heaven laughs.
  - type: text
    content: The Lord scoffs at them.
  '5':
  - type: text
    content: Then in anger he rebukes them,
  - type: text
    content: terrifying them with his fierce fury.
  '6':
  - type: text
    content: For the Lord declares, “I have placed my chosen king on the throne
  - type: text
    content: in Jerusalem,
  - type: note
    content: Hebrew on Zion.
  - type: text
    content: ' on my holy mountain.”'
  '7':
  - type: text
    content: 'The king proclaims the '
  - type: text
    content: Lord
  - type: text
    content: '’s decree:'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, ‘You are my son.'
  - type: note
    content: Or Son; also in 2:12.
  - type: text
    content: Today I have become your Father.
  - type: note
    content: Or Today I reveal you as my son.
  '8':
  - type: text
    content: Only ask, and I will give you the nations as your inheritance,
  - type: text
    content: the whole earth as your possession.
  '9':
  - type: text
    content: You will break
  - type: note
    content: Greek version reads rule. Compare Rev 2:27.
  - type: text
    content: ' them with an iron rod'
  - type: text
    content: and smash them like clay pots.’”
