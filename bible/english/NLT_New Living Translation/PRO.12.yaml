document_id: PRO.12,116
type_code: eng
verses:
  '1':
  - type: text
    content: To learn, you must love discipline;
  - type: text
    content: it is stupid to hate correction.
  '10':
  - type: text
    content: The godly care for their animals,
  - type: text
    content: but the wicked are always cruel.
  '11':
  - type: text
    content: A hard worker has plenty of food,
  - type: text
    content: but a person who chases fantasies has no sense.
  '12':
  - type: text
    content: Thieves are jealous of each other’s loot,
  - type: text
    content: but the godly are well rooted and bear their own fruit.
  '13':
  - type: text
    content: The wicked are trapped by their own words,
  - type: text
    content: but the godly escape such trouble.
  '14':
  - type: text
    content: Wise words bring many benefits,
  - type: text
    content: and hard work brings rewards.
  '15':
  - type: text
    content: Fools think their own way is right,
  - type: text
    content: but the wise listen to others.
  '16':
  - type: text
    content: A fool is quick-tempered,
  - type: text
    content: but a wise person stays calm when insulted.
  '17':
  - type: text
    content: An honest witness tells the truth;
  - type: text
    content: a false witness tells lies.
  '18':
  - type: text
    content: Some people make cutting remarks,
  - type: text
    content: but the words of the wise bring healing.
  '19':
  - type: text
    content: Truthful words stand the test of time,
  - type: text
    content: but lies are soon exposed.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' approves of those who are good,'
  - type: text
    content: but he condemns those who plan wickedness.
  '20':
  - type: text
    content: Deceit fills hearts that are plotting evil;
  - type: text
    content: joy fills hearts that are planning peace!
  '21':
  - type: text
    content: No harm comes to the godly,
  - type: text
    content: but the wicked have their fill of trouble.
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests lying lips,'
  - type: text
    content: but he delights in those who tell the truth.
  '23':
  - type: text
    content: The wise don’t make a show of their knowledge,
  - type: text
    content: but fools broadcast their foolishness.
  '24':
  - type: text
    content: Work hard and become a leader;
  - type: text
    content: be lazy and become a slave.
  '25':
  - type: text
    content: Worry weighs a person down;
  - type: text
    content: an encouraging word cheers a person up.
  '26':
  - type: text
    content: The godly give good advice to their friends;
  - type: note
    content: Or The godly are cautious in friendship; or The godly are freed from evil. The meaning of the Hebrew is uncertain.
  - type: text
    content: the wicked lead them astray.
  '27':
  - type: text
    content: Lazy people don’t even cook the game they catch,
  - type: text
    content: but the diligent make use of everything they find.
  '28':
  - type: text
    content: The way of the godly leads to life;
  - type: text
    content: that path does not lead to death.
  '3':
  - type: text
    content: Wickedness never brings stability,
  - type: text
    content: but the godly have deep roots.
  '4':
  - type: text
    content: A worthy wife is a crown for her husband,
  - type: text
    content: but a disgraceful woman is like cancer in his bones.
  '5':
  - type: text
    content: The plans of the godly are just;
  - type: text
    content: the advice of the wicked is treacherous.
  '6':
  - type: text
    content: The words of the wicked are like a murderous ambush,
  - type: text
    content: but the words of the godly save lives.
  '7':
  - type: text
    content: The wicked die and disappear,
  - type: text
    content: but the family of the godly stands firm.
  '8':
  - type: text
    content: A sensible person wins admiration,
  - type: text
    content: but a warped mind is despised.
  '9':
  - type: text
    content: Better to be an ordinary person with a servant
  - type: text
    content: than to be self-important but have no food.
