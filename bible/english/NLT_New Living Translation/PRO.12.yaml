document_id: PRO.12
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: To learn, you must love discipline;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is stupid to hate correction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' approves of those who are good,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he condemns those who plan wickedness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Wickedness never brings stability,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the godly have deep roots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A worthy wife is a crown for her husband,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a disgraceful woman is like cancer in his bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The plans of the godly are just;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the advice of the wicked is treacherous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The words of the wicked are like a murderous ambush,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the words of the godly save lives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The wicked die and disappear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the family of the godly stands firm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A sensible person wins admiration,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a warped mind is despised.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Better to be an ordinary person with a servant
- type: usfm
  marker: q2
  children:
  - type: text
    text: than to be self-important but have no food.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The godly care for their animals,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the wicked are always cruel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: A hard worker has plenty of food,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a person who chases fantasies has no sense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Thieves are jealous of each other’s loot,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the godly are well rooted and bear their own fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The wicked are trapped by their own words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the godly escape such trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Wise words bring many benefits,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and hard work brings rewards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fools think their own way is right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the wise listen to others.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A fool is quick-tempered,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a wise person stays calm when insulted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: An honest witness tells the truth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a false witness tells lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Some people make cutting remarks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the words of the wise bring healing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Truthful words stand the test of time,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but lies are soon exposed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Deceit fills hearts that are plotting evil;
- type: usfm
  marker: q2
  children:
  - type: text
    text: joy fills hearts that are planning peace!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: No harm comes to the godly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the wicked have their fill of trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests lying lips,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he delights in those who tell the truth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The wise don’t make a show of their knowledge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but fools broadcast their foolishness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Work hard and become a leader;
- type: usfm
  marker: q2
  children:
  - type: text
    text: be lazy and become a slave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Worry weighs a person down;
- type: usfm
  marker: q2
  children:
  - type: text
    text: an encouraging word cheers a person up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The godly give good advice to their friends;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'The godly are cautious in friendship; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'The godly are freed from evil. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wicked lead them astray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Lazy people don’t even cook the game they catch,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the diligent make use of everything they find.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The way of the godly leads to life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: that path does not lead to death.
