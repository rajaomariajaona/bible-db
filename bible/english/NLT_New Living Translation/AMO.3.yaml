document_id: AMO.3,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Listen to this message that the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken against you, O people of Israel—against the entire family I rescued from Egypt:'
  '10':
  - type: text
    content: “My people have forgotten how to do right,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Their fortresses are filled with wealth
  - type: text
    content: taken by theft and violence.
  '11':
  - type: text
    content: 'Therefore,” says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “an enemy is coming!
  - type: text
    content: He will surround them and shatter their defenses.
  - type: text
    content: Then he will plunder all their fortresses.”
  '12':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “A shepherd who tries to rescue a sheep from a lion’s mouth
  - type: text
    content: will recover only two legs or a piece of an ear.
  - type: text
    content: So it will be for the Israelites in Samaria lying on luxurious beds,
  - type: text
    content: and for the people of Damascus reclining on couches.
  - type: note
    content: The meaning of the Hebrew in this sentence is uncertain.
  '13':
  - type: text
    content: “Now listen to this, and announce it throughout all Israel,
  - type: note
    content: Hebrew the house of Jacob. The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
  - type: text
    content: '” says the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies.'
  '14':
  - type: text
    content: “On the very day I punish Israel for its sins,
  - type: text
    content: I will destroy the pagan altars at Bethel.
  - type: text
    content: The horns of the altar will be cut off
  - type: text
    content: and fall to the ground.
  '15':
  - type: text
    content: And I will destroy the beautiful homes of the wealthy—
  - type: text
    content: their winter mansions and their summer houses, too—
  - type: text
    content: all their palaces filled with ivory,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: “From among all the families on the earth,
  - type: text
    content: I have been intimate with you alone.
  - type: text
    content: That is why I must punish you
  - type: text
    content: for all your sins.”
  - type: heading
    content: Witnesses against Guilty Israel
  '3':
  - type: text
    content: Can two people walk together
  - type: text
    content: without agreeing on the direction?
  '4':
  - type: text
    content: Does a lion ever roar in a thicket
  - type: text
    content: without first finding a victim?
  - type: text
    content: Does a young lion growl in its den
  - type: text
    content: without first catching its prey?
  '5':
  - type: text
    content: Does a bird ever get caught in a trap
  - type: text
    content: that has no bait?
  - type: text
    content: Does a trap spring shut
  - type: text
    content: when there’s nothing to catch?
  '6':
  - type: text
    content: When the ram’s horn blows a warning,
  - type: text
    content: shouldn’t the people be alarmed?
  - type: text
    content: Does disaster come to a city
  - type: text
    content: 'unless the '
  - type: text
    content: Lord
  - type: text
    content: ' has planned it?'
  '7':
  - type: text
    content: 'Indeed, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' never does anything'
  - type: text
    content: until he reveals his plans to his servants the prophets.
  '8':
  - type: text
    content: The lion has roared—
  - type: text
    content: so who isn’t frightened?
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken—'
  - type: text
    content: so who can refuse to proclaim his message?
  '9':
  - type: text
    content: Announce this to the leaders of Philistia
  - type: note
    content: Hebrew Ashdod.
  - type: text
    content: 'and to the great ones of Egypt:'
  - type: text
    content: “Take your seats now on the hills around Samaria,
  - type: text
    content: and witness the chaos and oppression in Israel.”
