      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Listen to this message that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken against you, O people of Israel—against the entire family I rescued from Egypt:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “From among all the families on the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have been intimate with you alone.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That is why I must punish you
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all your sins.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Witnesses against Guilty Israel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Can two people walk together
- type: usfm
  marker: q2
  children:
  - type: text
    text: without agreeing on the direction?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Does a lion ever roar in a thicket
- type: usfm
  marker: q2
  children:
  - type: text
    text: without first finding a victim?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does a young lion growl in its den
- type: usfm
  marker: q2
  children:
  - type: text
    text: without first catching its prey?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Does a bird ever get caught in a trap
- type: usfm
  marker: q2
  children:
  - type: text
    text: that has no bait?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does a trap spring shut
- type: usfm
  marker: q2
  children:
  - type: text
    text: when there’s nothing to catch?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When the ram’s horn blows a warning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shouldn’t the people be alarmed?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does disaster come to a city
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'unless the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has planned it?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Indeed, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' never does anything'
- type: usfm
  marker: q2
  children:
  - type: text
    text: until he reveals his plans to his servants the prophets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The lion has roared—
- type: usfm
  marker: q2
  children:
  - type: text
    text: so who isn’t frightened?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: so who can refuse to proclaim his message?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Announce this to the leaders of Philistia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ashdod.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and to the great ones of Egypt:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Take your seats now on the hills around Samaria,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and witness the chaos and oppression in Israel.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “My people have forgotten how to do right,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Their fortresses are filled with wealth
- type: usfm
  marker: q2
  children:
  - type: text
    text: taken by theft and violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Therefore,” says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: “an enemy is coming!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will surround them and shatter their defenses.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then he will plunder all their fortresses.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “A shepherd who tries to rescue a sheep from a lion’s mouth
- type: usfm
  marker: q2
  children:
  - type: text
    text: will recover only two legs or a piece of an ear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So it will be for the Israelites in Samaria lying on luxurious beds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and for the people of Damascus reclining on couches.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew in this sentence is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Now listen to this, and announce it throughout all Israel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the house of Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
    marker-yv: yv-n
  - type: text
    text: '” says the Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Heaven’s Armies.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “On the very day I punish Israel for its sins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will destroy the pagan altars at Bethel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The horns of the altar will be cut off
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fall to the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And I will destroy the beautiful homes of the wealthy—
- type: usfm
  marker: q2
  children:
  - type: text
    text: their winter mansions and their summer houses, too—
- type: usfm
  marker: q1
  children:
  - type: text
    text: all their palaces filled with ivory,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
