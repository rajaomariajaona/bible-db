document_id: EXO.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promises of Deliverance
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told Moses, “Now you will see what I will do to Pharaoh. When he feels the force of my strong hand, he will let the people go. In fact, he will force them to leave his land!”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go back to Pharaoh, the king of Egypt, and tell him to let the people of Israel leave his country.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!” Moses objected. “My own people won’t listen to me anymore. How can I expect Pharaoh to listen? I’m such a clumsy speaker!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'I have uncircumcised lips; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 6:30.
      marker-yv: yv-n
    - type: text
      text: ”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses and Aaron and gave them orders for the Israelites and for Pharaoh, the king of Egypt. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses and Aaron to lead the people of Israel out of Egypt.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ancestors of Moses and Aaron
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'These are the ancestors of some of the clans of Israel:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sons of Reuben, Israel’s oldest son, were Hanoch, Pallu, Hezron, and Carmi. Their descendants became the clans of Reuben.
  '15':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sons of Simeon were Jemuel, Jamin, Ohad, Jakin, Zohar, and Shaul. (Shaul’s mother was a Canaanite woman.) Their descendants became the clans of Simeon.
  '16':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'These are the descendants of Levi, as listed in their family records: The sons of Levi were Gershon, Kohath, and Merari. (Levi lived to be 137 years old.)'
  '17':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: The descendants of Gershon included Libni and Shimei, each of whom became the ancestor of a clan.
  '18':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: The descendants of Kohath included Amram, Izhar, Hebron, and Uzziel. (Kohath lived to be 133 years old.)
  '19':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: The descendants of Merari included Mahli and Mushi.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These are the clans of the Levites, as listed in their family records.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God said to Moses, “I am Yahweh—‘the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:2 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yahweh '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'is a transliteration of the proper name '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'YHWH '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'that is sometimes rendered “Jehovah”; in this translation it is usually rendered “the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ” (note the use of small capitals).
      marker-yv: yv-n
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Amram married his father’s sister Jochebed, and she gave birth to his sons, Aaron and Moses. (Amram lived to be 137 years old.)
  '21':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sons of Izhar were Korah, Nepheg, and Zicri.
  '22':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sons of Uzziel were Mishael, Elzaphan, and Sithri.
  '23':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Aaron married Elisheba, the daughter of Amminadab and sister of Nahshon, and she gave birth to his sons, Nadab, Abihu, Eleazar, and Ithamar.
  '24':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sons of Korah were Assir, Elkanah, and Abiasaph. Their descendants became the clans of Korah.
  '25':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eleazar son of Aaron married one of the daughters of Putiel, and she gave birth to his son, Phinehas.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These are the ancestors of the Levite families, listed according to their clans.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Aaron and Moses named in this list are the same ones to whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “Lead the people of Israel out of the land of Egypt like an army.” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It was Moses and Aaron who spoke to Pharaoh, the king of Egypt, about leading the people of Israel out of Egypt.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses in the land of Egypt, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he said to him, “I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! Tell Pharaoh, the king of Egypt, everything I am telling you.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I appeared to Abraham, to Isaac, and to Jacob as El-Shaddai—‘God Almighty’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:3 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'El-Shaddai, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: which means “God Almighty,” is the name for God used in Gen 17:1; 28:3; 35:11; 43:14; 48:3.
      marker-yv: yv-n
    - type: text
      text: '—but I did not reveal my name, Yahweh, to them. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Moses argued with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, “I can’t do it! I’m such a clumsy speaker! Why should Pharaoh listen to me?”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I reaffirmed my covenant with them. Under its terms, I promised to give them the land of Canaan, where they were living as foreigners. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You can be sure that I have heard the groans of the people of Israel, who are now slaves to the Egyptians. And I am well aware of my covenant with them.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore, say to the people of Israel: ‘I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. I will free you from your oppression and will rescue you from your slavery in Egypt. I will redeem you with a powerful arm and great acts of judgment. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will claim you as my own people, and I will be your God. Then you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God who has freed you from your oppression in Egypt. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will bring you into the land I swore to give to Abraham, Isaac, and Jacob. I will give it to you as your very own possession. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!’”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses told the people of Israel what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said, but they refused to listen anymore. They had become too discouraged by the brutality of their slavery.'
