document_id: EXO.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Promises of Deliverance
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' told Moses, “Now you will see what I will do to Pharaoh. When he feels the force of my strong hand, he will let the people go. In fact, he will force them to leave his land!”'
  '10':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '11':
  - type: text
    content: “Go back to Pharaoh, the king of Egypt, and tell him to let the people of Israel leave his country.”
  '12':
  - type: text
    content: '“But '
  - type: text
    content: Lord
  - type: text
    content: '!” Moses objected. “My own people won’t listen to me anymore. How can I expect Pharaoh to listen? I’m such a clumsy speaker!'
  - type: note
    content: Hebrew I have uncircumcised lips; also in 6:30.
  - type: text
    content: ”
  '13':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron and gave them orders for the Israelites and for Pharaoh, the king of Egypt. The '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses and Aaron to lead the people of Israel out of Egypt.'
  - type: heading
    content: The Ancestors of Moses and Aaron
  '14':
  - type: text
    content: 'These are the ancestors of some of the clans of Israel:'
  - type: text
    content: The sons of Reuben, Israel’s oldest son, were Hanoch, Pallu, Hezron, and Carmi. Their descendants became the clans of Reuben.
  '15':
  - type: text
    content: The sons of Simeon were Jemuel, Jamin, Ohad, Jakin, Zohar, and Shaul. (Shaul’s mother was a Canaanite woman.) Their descendants became the clans of Simeon.
  '16':
  - type: text
    content: 'These are the descendants of Levi, as listed in their family records: The sons of Levi were Gershon, Kohath, and Merari. (Levi lived to be 137 years old.)'
  '17':
  - type: text
    content: The descendants of Gershon included Libni and Shimei, each of whom became the ancestor of a clan.
  '18':
  - type: text
    content: The descendants of Kohath included Amram, Izhar, Hebron, and Uzziel. (Kohath lived to be 133 years old.)
  '19':
  - type: text
    content: The descendants of Merari included Mahli and Mushi.
  - type: text
    content: These are the clans of the Levites, as listed in their family records.
  '2':
  - type: text
    content: 'And God said to Moses, “I am Yahweh—‘the '
  - type: text
    content: Lord
  - type: text
    content: .’
  - type: note
    content: Yahweh is a transliteration of the proper name YHWH that is sometimes rendered “Jehovah”; in this translation it is usually rendered “the Lord” (note the use of small capitals).
  - type: text
    content: ' '
  '20':
  - type: text
    content: Amram married his father’s sister Jochebed, and she gave birth to his sons, Aaron and Moses. (Amram lived to be 137 years old.)
  '21':
  - type: text
    content: The sons of Izhar were Korah, Nepheg, and Zicri.
  '22':
  - type: text
    content: The sons of Uzziel were Mishael, Elzaphan, and Sithri.
  '23':
  - type: text
    content: Aaron married Elisheba, the daughter of Amminadab and sister of Nahshon, and she gave birth to his sons, Nadab, Abihu, Eleazar, and Ithamar.
  '24':
  - type: text
    content: The sons of Korah were Assir, Elkanah, and Abiasaph. Their descendants became the clans of Korah.
  '25':
  - type: text
    content: Eleazar son of Aaron married one of the daughters of Putiel, and she gave birth to his son, Phinehas.
  - type: text
    content: These are the ancestors of the Levite families, listed according to their clans.
  '26':
  - type: text
    content: 'The Aaron and Moses named in this list are the same ones to whom the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Lead the people of Israel out of the land of Egypt like an army.” '
  '27':
  - type: text
    content: It was Moses and Aaron who spoke to Pharaoh, the king of Egypt, about leading the people of Israel out of Egypt.
  '28':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses in the land of Egypt, '
  '29':
  - type: text
    content: 'he said to him, “I am the '
  - type: text
    content: Lord
  - type: text
    content: '! Tell Pharaoh, the king of Egypt, everything I am telling you.” '
  '3':
  - type: text
    content: I appeared to Abraham, to Isaac, and to Jacob as El-Shaddai—‘God Almighty’
  - type: note
    content: El-Shaddai, which means “God Almighty,” is the name for God used in Gen 17:1; 28:3; 35:11; 43:14; 48:3.
  - type: text
    content: '—but I did not reveal my name, Yahweh, to them. '
  '30':
  - type: text
    content: 'But Moses argued with the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, “I can’t do it! I’m such a clumsy speaker! Why should Pharaoh listen to me?”'
  '4':
  - type: text
    content: 'And I reaffirmed my covenant with them. Under its terms, I promised to give them the land of Canaan, where they were living as foreigners. '
  '5':
  - type: text
    content: You can be sure that I have heard the groans of the people of Israel, who are now slaves to the Egyptians. And I am well aware of my covenant with them.
  '6':
  - type: text
    content: '“Therefore, say to the people of Israel: ‘I am the '
  - type: text
    content: Lord
  - type: text
    content: '. I will free you from your oppression and will rescue you from your slavery in Egypt. I will redeem you with a powerful arm and great acts of judgment. '
  '7':
  - type: text
    content: 'I will claim you as my own people, and I will be your God. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God who has freed you from your oppression in Egypt. '
  '8':
  - type: text
    content: 'I will bring you into the land I swore to give to Abraham, Isaac, and Jacob. I will give it to you as your very own possession. I am the '
  - type: text
    content: Lord
  - type: text
    content: '!’”'
  '9':
  - type: text
    content: 'So Moses told the people of Israel what the '
  - type: text
    content: Lord
  - type: text
    content: ' had said, but they refused to listen anymore. They had become too discouraged by the brutality of their slavery.'
