document_id: JDG.14,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samson’s Riddle
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'One day when Samson was in Timnah, one of the Philistine women caught his eye. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'As his father was making final arrangements for the marriage, Samson threw a party at Timnah, as was the custom for elite young men. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: When the bride’s parents
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: they.
      marker-yv: yv-n
    - type: text
      text: ' saw him, they selected thirty young men from the town to be his companions.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Samson said to them, “Let me tell you a riddle. If you solve my riddle during these seven days of the celebration, I will give you thirty fine linen robes and thirty sets of festive clothing. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But if you can’t solve it, then you must give me thirty fine linen robes and thirty sets of festive clothing.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “All right,” they agreed, “let’s hear your riddle.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So he said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Out of the one who eats came something to eat;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: out of the strong came something sweet.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Three days later they were still trying to figure it out. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: On the fourth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: seventh.
      marker-yv: yv-n
    - type: text
      text: ' day they said to Samson’s wife, “Entice your husband to explain the riddle for us, or we will burn down your father’s house with you in it. Did you invite us to this party just to make us poor?”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: So Samson’s wife came to him in tears and said, “You don’t love me; you hate me! You have given my people a riddle, but you haven’t told me the answer.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I haven’t even given the answer to my father or mother,” he replied. “Why should I tell you?” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: So she cried whenever she was with him and kept it up for the rest of the celebration. At last, on the seventh day he told her the answer because she was tormenting him with her nagging. Then she explained the riddle to the young men.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'So before sunset of the seventh day, the men of the town came to Samson with their answer:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What is sweeter than honey?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What is stronger than a lion?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samson replied, “If you hadn’t plowed with my heifer, you wouldn’t have solved my riddle!”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came powerfully upon him. He went down to the town of Ashkelon, killed thirty men, took their belongings, and gave their clothing to the men who had solved his riddle. But Samson was furious about what had happened, and he went back home to live with his father and mother. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: When he returned home, he told his father and mother, “A young Philistine woman in Timnah caught my eye. I want to marry her. Get her for me.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So his wife was given in marriage to the man who had been Samson’s best man at the wedding.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: His father and mother objected. “Isn’t there even one woman in our tribe or among all the Israelites you could marry?” they asked. “Why must you go to the pagan Philistines to find a wife?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Samson told his father, “Get her for me! She looks good to me.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'His father and mother didn’t realize the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was at work in this, creating an opportunity to work against the Philistines, who ruled over Israel at that time.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'As Samson and his parents were going down to Timnah, a young lion suddenly attacked Samson near the vineyards of Timnah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'At that moment the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came powerfully upon him, and he ripped the lion’s jaws apart with his bare hands. He did it as easily as if it were a young goat. But he didn’t tell his father or mother about it. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: When Samson arrived in Timnah, he talked with the woman and was very pleased with her.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Later, when he returned to Timnah for the wedding, he turned off the path to look at the carcass of the lion. And he found that a swarm of bees had made some honey in the carcass. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He scooped some of the honey into his hands and ate it along the way. He also gave some to his father and mother, and they ate it. But he didn’t tell them he had taken the honey from the carcass of the lion.
