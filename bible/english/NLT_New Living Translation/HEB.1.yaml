document_id: HEB.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Christ Is God’s Son
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Long ago God spoke many times and in many ways to our ancestors through the prophets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And now in these final days, he has spoken to us through his Son. God promised everything to the Son as an inheritance, and through the Son he created the universe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The Son radiates God’s own glory and expresses the very character of God, and he sustains everything by the mighty power of his command. When he had cleansed us from our sins, he sat down in the place of honor at the right hand of the majestic God in heaven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: This shows that the Son is far greater than the angels, just as the name God gave him is greater than their names.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Son Is Greater Than the Angels
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For God never said to any angel what he said to Jesus:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You are my Son.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Today I have become your Father.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Today I reveal you as my Son. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 2:7.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: m
  children:
  - type: text
    text: God also said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will be his Father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will be my Son.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2 Sam 7:14.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And when he brought his supreme
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: firstborn.
    marker-yv: yv-n
  - type: text
    text: ' Son into the world, God said,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'when he again brings his supreme Son '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: firstborn Son
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: into the world, God will say.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let all of God’s angels worship him.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6c '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deut 32:43.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Regarding the angels, he says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “He sends his angels like the winds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his servants like flames of fire.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 104:4 (Greek version).
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But to the Son he says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Your throne, O God, endures forever and ever.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You rule with a scepter of justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You love justice and hate evil.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore, O God, your God has anointed you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pouring out the oil of joy on you more than on anyone else.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8-9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 45:6-7.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He also says to the Son,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “In the beginning, Lord, you laid the foundation of the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and made the heavens with your hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They will perish, but you remain forever.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will wear out like old clothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You will fold them up like a cloak
- type: usfm
  marker: q2
  children:
  - type: text
    text: and discard them like old clothing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you are always the same;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will live forever.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10-12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 102:25-27.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And God never said to any of the angels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Sit in the place of honor at my right hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: until I humble your enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: making them a footstool under your feet.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 110:1.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Therefore, angels are only servants—spirits sent to care for people who will inherit salvation.
