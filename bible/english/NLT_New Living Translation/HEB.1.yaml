document_id: HEB.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Christ Is God’s Son
  - type: text
    content: 'Long ago God spoke many times and in many ways to our ancestors through the prophets. '
  '10':
  - type: text
    content: He also says to the Son,
  - type: text
    content: “In the beginning, Lord, you laid the foundation of the earth
  - type: text
    content: and made the heavens with your hands.
  '11':
  - type: text
    content: They will perish, but you remain forever.
  - type: text
    content: They will wear out like old clothing.
  '12':
  - type: text
    content: You will fold them up like a cloak
  - type: text
    content: and discard them like old clothing.
  - type: text
    content: But you are always the same;
  - type: text
    content: you will live forever.”
  - type: note
    content: Ps 102:25-27.
  '13':
  - type: text
    content: And God never said to any of the angels,
  - type: text
    content: “Sit in the place of honor at my right hand
  - type: text
    content: until I humble your enemies,
  - type: text
    content: making them a footstool under your feet.”
  - type: note
    content: Ps 110:1.
  '14':
  - type: text
    content: Therefore, angels are only servants—spirits sent to care for people who will inherit salvation.
  '2':
  - type: text
    content: 'And now in these final days, he has spoken to us through his Son. God promised everything to the Son as an inheritance, and through the Son he created the universe. '
  '3':
  - type: text
    content: 'The Son radiates God’s own glory and expresses the very character of God, and he sustains everything by the mighty power of his command. When he had cleansed us from our sins, he sat down in the place of honor at the right hand of the majestic God in heaven. '
  '4':
  - type: text
    content: This shows that the Son is far greater than the angels, just as the name God gave him is greater than their names.
  - type: heading
    content: The Son Is Greater Than the Angels
  '5':
  - type: text
    content: 'For God never said to any angel what he said to Jesus:'
  - type: text
    content: “You are my Son.
  - type: text
    content: Today I have become your Father.
  - type: note
    content: Or Today I reveal you as my Son. Ps 2:7.
  - type: text
    content: ”
  - type: text
    content: God also said,
  - type: text
    content: “I will be his Father,
  - type: text
    content: and he will be my Son.”
  - type: note
    content: 2 Sam 7:14.
  '6':
  - type: text
    content: And when he brought his supreme
  - type: note
    content: Or firstborn.
  - type: text
    content: ' Son into the world, God said,'
  - type: note
    content: Or when he again brings his supreme Son [or firstborn Son] into the world, God will say.
  - type: text
    content: “Let all of God’s angels worship him.”
  - type: note
    content: Deut 32:43.
  '7':
  - type: text
    content: Regarding the angels, he says,
  - type: text
    content: “He sends his angels like the winds,
  - type: text
    content: his servants like flames of fire.”
  - type: note
    content: Ps 104:4 (Greek version).
  '8':
  - type: text
    content: But to the Son he says,
  - type: text
    content: “Your throne, O God, endures forever and ever.
  - type: text
    content: You rule with a scepter of justice.
  '9':
  - type: text
    content: You love justice and hate evil.
  - type: text
    content: Therefore, O God, your God has anointed you,
  - type: text
    content: pouring out the oil of joy on you more than on anyone else.”
  - type: note
    content: Ps 45:6-7.
