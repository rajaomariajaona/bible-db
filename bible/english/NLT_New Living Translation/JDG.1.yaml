document_id: JDG.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judah and Simeon Conquer the Land
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After the death of Joshua, the Israelites asked the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “Which tribe should go first to attack the Canaanites?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' answered, “Judah, for I have given them victory over the land.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The men of Judah said to their relatives from the tribe of Simeon, “Join with us to fight against the Canaanites living in the territory allotted to us. Then we will help you conquer your territory.” So the men of Simeon went with Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When the men of Judah attacked, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave them victory over the Canaanites and Perizzites, and they killed 10,000 enemy warriors at the town of Bezek. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'While at Bezek they encountered King Adoni-bezek and fought against him, and the Canaanites and Perizzites were defeated. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Adoni-bezek escaped, but the Israelites soon captured him and cut off his thumbs and big toes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Adoni-bezek said, “I once had seventy kings with their thumbs and big toes cut off, eating scraps from under my table. Now God has paid me back for what I did to them.” They took him to Jerusalem, and he died there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The men of Judah attacked Jerusalem and captured it, killing all its people and setting the city on fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then they went down to fight the Canaanites living in the hill country, the Negev, and the western foothills.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Shephelah.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Judah marched against the Canaanites in Hebron (formerly called Kiriath-arba), defeating the forces of Sheshai, Ahiman, and Talmai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'From there they went to fight against the people living in the town of Debir (formerly called Kiriath-sepher). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Caleb said, “I will give my daughter Acsah in marriage to the one who attacks and captures Kiriath-sepher.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Othniel, the son of Caleb’s younger brother, Kenaz, was the one who conquered it, so Acsah became Othniel’s wife.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When Acsah married Othniel, she urged him
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version and Latin Vulgate read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he urged her.
    marker-yv: yv-n
  - type: text
    text: ' to ask her father for a field. As she got down off her donkey, Caleb asked her, “What’s the matter?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: She said, “Let me have another gift. You have already given me land in the Negev; now please give me springs of water, too.” So Caleb gave her the upper and lower springs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When the tribe of Judah left Jericho—the city of palms—the Kenites, who were descendants of Moses’ father-in-law, traveled with them into the wilderness of Judah. They settled among the people there, near the town of Arad in the Negev.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then Judah joined with Simeon to fight against the Canaanites living in Zephath, and they completely destroyed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering.'
    marker-yv: yv-n
  - type: text
    text: ' the town. So the town was named Hormah.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17b '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hormah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “destruction.”
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: In addition, Judah captured the towns of Gaza, Ashkelon, and Ekron, along with their surrounding territories.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Fails to Conquer the Land
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was with the people of Judah, and they took possession of the hill country. But they failed to drive out the people living in the plains, who had iron chariots. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The town of Hebron was given to Caleb as Moses had promised. And Caleb drove out the people living there, who were descendants of the three sons of Anak.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The tribe of Benjamin, however, failed to drive out the Jebusites, who were living in Jerusalem. So to this day the Jebusites live in Jerusalem among the people of Benjamin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The descendants of Joseph attacked the town of Bethel, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'They sent men to scout out Bethel (formerly known as Luz). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'They confronted a man coming out of the town and said to him, “Show us a way into the town, and we will have mercy on you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So he showed them a way in, and they killed everyone in the town except that man and his family. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Later the man moved to the land of the Hittites, where he built a town. He named it Luz, which is its name to this day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The tribe of Manasseh failed to drive out the people living in Beth-shan,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beth-shean, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Beth-shan.
    marker-yv: yv-n
  - type: text
    text: ' Taanach, Dor, Ibleam, Megiddo, and all their surrounding settlements, because the Canaanites were determined to stay in that region. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: When the Israelites grew stronger, they forced the Canaanites to work as slaves, but they never did drive them completely out of the land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The tribe of Ephraim failed to drive out the Canaanites living in Gezer, so the Canaanites continued to live there among them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The tribe of Zebulun failed to drive out the residents of Kitron and Nahalol, so the Canaanites continued to live among them. But the Canaanites were forced to work as slaves for the people of Zebulun.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The tribe of Asher failed to drive out the residents of Acco, Sidon, Ahlab, Aczib, Helbah, Aphik, and Rehob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Instead, the people of Asher moved in among the Canaanites, who controlled the land, for they failed to drive them out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Likewise, the tribe of Naphtali failed to drive out the residents of Beth-shemesh and Beth-anath. Instead, they moved in among the Canaanites, who controlled the land. Nevertheless, the people of Beth-shemesh and Beth-anath were forced to work as slaves for the people of Naphtali.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'As for the tribe of Dan, the Amorites forced them back into the hill country and would not let them come down into the plains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'The Amorites were determined to stay in Mount Heres, Aijalon, and Shaalbim, but when the descendants of Joseph became stronger, they forced the Amorites to work as slaves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: The boundary of the Amorites ran from Scorpion Pass
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Akrabbim.
    marker-yv: yv-n
  - type: text
    text: ' to Sela and continued upward from there.'
