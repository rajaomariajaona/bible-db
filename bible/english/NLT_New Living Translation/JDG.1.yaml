document_id: JDG.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah and Simeon Conquer the Land
  - type: text
    content: 'After the death of Joshua, the Israelites asked the '
  - type: text
    content: Lord
  - type: text
    content: ', “Which tribe should go first to attack the Canaanites?”'
  '10':
  - type: text
    content: Judah marched against the Canaanites in Hebron (formerly called Kiriath-arba), defeating the forces of Sheshai, Ahiman, and Talmai.
  '11':
  - type: text
    content: 'From there they went to fight against the people living in the town of Debir (formerly called Kiriath-sepher). '
  '12':
  - type: text
    content: 'Caleb said, “I will give my daughter Acsah in marriage to the one who attacks and captures Kiriath-sepher.” '
  '13':
  - type: text
    content: Othniel, the son of Caleb’s younger brother, Kenaz, was the one who conquered it, so Acsah became Othniel’s wife.
  '14':
  - type: text
    content: When Acsah married Othniel, she urged him
  - type: note
    content: Greek version and Latin Vulgate read he urged her.
  - type: text
    content: ' to ask her father for a field. As she got down off her donkey, Caleb asked her, “What’s the matter?”'
  '15':
  - type: text
    content: She said, “Let me have another gift. You have already given me land in the Negev; now please give me springs of water, too.” So Caleb gave her the upper and lower springs.
  '16':
  - type: text
    content: When the tribe of Judah left Jericho—the city of palms—the Kenites, who were descendants of Moses’ father-in-law, traveled with them into the wilderness of Judah. They settled among the people there, near the town of Arad in the Negev.
  '17':
  - type: text
    content: Then Judah joined with Simeon to fight against the Canaanites living in Zephath, and they completely destroyed
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering.
  - type: text
    content: ' the town. So the town was named Hormah.'
  - type: note
    content: Hormah means “destruction.”
  - type: text
    content: ' '
  '18':
  - type: text
    content: In addition, Judah captured the towns of Gaza, Ashkelon, and Ekron, along with their surrounding territories.
  - type: heading
    content: Israel Fails to Conquer the Land
  '19':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' was with the people of Judah, and they took possession of the hill country. But they failed to drive out the people living in the plains, who had iron chariots. '
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' answered, “Judah, for I have given them victory over the land.”'
  '20':
  - type: text
    content: The town of Hebron was given to Caleb as Moses had promised. And Caleb drove out the people living there, who were descendants of the three sons of Anak.
  '21':
  - type: text
    content: The tribe of Benjamin, however, failed to drive out the Jebusites, who were living in Jerusalem. So to this day the Jebusites live in Jerusalem among the people of Benjamin.
  '22':
  - type: text
    content: 'The descendants of Joseph attacked the town of Bethel, and the '
  - type: text
    content: Lord
  - type: text
    content: ' was with them. '
  '23':
  - type: text
    content: 'They sent men to scout out Bethel (formerly known as Luz). '
  '24':
  - type: text
    content: 'They confronted a man coming out of the town and said to him, “Show us a way into the town, and we will have mercy on you.” '
  '25':
  - type: text
    content: 'So he showed them a way in, and they killed everyone in the town except that man and his family. '
  '26':
  - type: text
    content: Later the man moved to the land of the Hittites, where he built a town. He named it Luz, which is its name to this day.
  '27':
  - type: text
    content: The tribe of Manasseh failed to drive out the people living in Beth-shan,
  - type: note
    content: Hebrew Beth-shean, a variant spelling of Beth-shan.
  - type: text
    content: ' Taanach, Dor, Ibleam, Megiddo, and all their surrounding settlements, because the Canaanites were determined to stay in that region. '
  '28':
  - type: text
    content: When the Israelites grew stronger, they forced the Canaanites to work as slaves, but they never did drive them completely out of the land.
  '29':
  - type: text
    content: The tribe of Ephraim failed to drive out the Canaanites living in Gezer, so the Canaanites continued to live there among them.
  '3':
  - type: text
    content: The men of Judah said to their relatives from the tribe of Simeon, “Join with us to fight against the Canaanites living in the territory allotted to us. Then we will help you conquer your territory.” So the men of Simeon went with Judah.
  '30':
  - type: text
    content: The tribe of Zebulun failed to drive out the residents of Kitron and Nahalol, so the Canaanites continued to live among them. But the Canaanites were forced to work as slaves for the people of Zebulun.
  '31':
  - type: text
    content: 'The tribe of Asher failed to drive out the residents of Acco, Sidon, Ahlab, Aczib, Helbah, Aphik, and Rehob. '
  '32':
  - type: text
    content: Instead, the people of Asher moved in among the Canaanites, who controlled the land, for they failed to drive them out.
  '33':
  - type: text
    content: Likewise, the tribe of Naphtali failed to drive out the residents of Beth-shemesh and Beth-anath. Instead, they moved in among the Canaanites, who controlled the land. Nevertheless, the people of Beth-shemesh and Beth-anath were forced to work as slaves for the people of Naphtali.
  '34':
  - type: text
    content: 'As for the tribe of Dan, the Amorites forced them back into the hill country and would not let them come down into the plains. '
  '35':
  - type: text
    content: 'The Amorites were determined to stay in Mount Heres, Aijalon, and Shaalbim, but when the descendants of Joseph became stronger, they forced the Amorites to work as slaves. '
  '36':
  - type: text
    content: The boundary of the Amorites ran from Scorpion Pass
  - type: note
    content: Hebrew Akrabbim.
  - type: text
    content: ' to Sela and continued upward from there.'
  '4':
  - type: text
    content: 'When the men of Judah attacked, the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them victory over the Canaanites and Perizzites, and they killed 10,000 enemy warriors at the town of Bezek. '
  '5':
  - type: text
    content: 'While at Bezek they encountered King Adoni-bezek and fought against him, and the Canaanites and Perizzites were defeated. '
  '6':
  - type: text
    content: Adoni-bezek escaped, but the Israelites soon captured him and cut off his thumbs and big toes.
  '7':
  - type: text
    content: Adoni-bezek said, “I once had seventy kings with their thumbs and big toes cut off, eating scraps from under my table. Now God has paid me back for what I did to them.” They took him to Jerusalem, and he died there.
  '8':
  - type: text
    content: 'The men of Judah attacked Jerusalem and captured it, killing all its people and setting the city on fire. '
  '9':
  - type: text
    content: Then they went down to fight the Canaanites living in the hill country, the Negev, and the western foothills.
  - type: note
    content: Hebrew the Shephelah.
  - type: text
    content: ' '
