document_id: 1KI.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Builds His Palace
  - type: text
    content: Solomon also built a palace for himself, and it took him thirteen years to complete the construction.
  '10':
  - type: text
    content: Some of the huge foundation stones were 15 feet long, and some were 12 feet
  - type: note
    content: Hebrew 10 cubits [4.6 meters] . . . 8 cubits [3.7 meters].
  - type: text
    content: ' long. '
  '11':
  - type: text
    content: 'The blocks of high-quality stone used in the walls were also cut to measure, and cedar beams were also used. '
  '12':
  - type: text
    content: 'The walls of the great courtyard were built so that there was one layer of cedar beams between every three layers of finished stone, just like the walls of the inner courtyard of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple with its entry room.
  - type: heading
    content: Furnishings for the Temple
  '13':
  - type: text
    content: King Solomon then asked for a man named Huram
  - type: note
    content: Hebrew Hiram (also in 7:40, 45); compare 2 Chr 2:13. This is not the same person mentioned in 5:1.
  - type: text
    content: ' to come from Tyre. '
  '14':
  - type: text
    content: He was half Israelite, since his mother was a widow from the tribe of Naphtali, and his father had been a craftsman in bronze from Tyre. Huram was extremely skillful and talented in any work in bronze, and he came to do all the metal work for King Solomon.
  '15':
  - type: text
    content: Huram cast two bronze pillars, each 27 feet tall and 18 feet in circumference.
  - type: note
    content: Hebrew 18 cubits [8.3 meters] tall and 12 cubits [5.5 meters] in circumference.
  - type: text
    content: ' '
  '16':
  - type: text
    content: For the tops of the pillars he cast bronze capitals, each 7-1/2 feet
  - type: note
    content: Hebrew 5 cubits [2.3 meters].
  - type: text
    content: ' tall. '
  '17':
  - type: text
    content: 'Each capital was decorated with seven sets of latticework and interwoven chains. '
  '18':
  - type: text
    content: 'He also encircled the latticework with two rows of pomegranates to decorate the capitals over the pillars. '
  '19':
  - type: text
    content: The capitals on the columns inside the entry room were shaped like water lilies, and they were six feet
  - type: note
    content: Hebrew 4 cubits [1.8 meters]; also in 7:38.
  - type: text
    content: ' tall. '
  '2':
  - type: text
    content: One of Solomon’s buildings was called the Palace of the Forest of Lebanon. It was 150 feet long, 75 feet wide, and 45 feet high.
  - type: note
    content: Hebrew 100 cubits [46 meters] long, 50 cubits [23 meters] wide, and 30 cubits [13.8 meters] high.
  - type: text
    content: ' There were four rows of cedar pillars, and great cedar beams rested on the pillars. '
  '20':
  - type: text
    content: 'The capitals on the two pillars had 200 pomegranates in two rows around them, beside the rounded surface next to the latticework. '
  '21':
  - type: text
    content: Huram set the pillars at the entrance of the Temple, one toward the south and one toward the north. He named the one on the south Jakin, and the one on the north Boaz.
  - type: note
    content: Jakin probably means “he establishes”; Boaz probably means “in him is strength.”
  - type: text
    content: ' '
  '22':
  - type: text
    content: The capitals on the pillars were shaped like water lilies. And so the work on the pillars was finished.
  '23':
  - type: text
    content: Then Huram cast a great round basin, 15 feet across from rim to rim, called the Sea. It was 7-1/2 feet deep and about 45 feet in circumference.
  - type: note
    content: Hebrew 10 cubits [4.6 meters] across. . . . 5 cubits [2.3 meters] deep and 30 cubits [13.8 meters] in circumference.
  - type: text
    content: ' '
  '24':
  - type: text
    content: It was encircled just below its rim by two rows of decorative gourds. There were about six gourds per foot
  - type: note
    content: Or 20 gourds per meter; Hebrew reads 10 per cubit.
  - type: text
    content: ' all the way around, and they were cast as part of the basin.'
  '25':
  - type: text
    content: The Sea was placed on a base of twelve bronze oxen,
  - type: note
    content: Hebrew 12 oxen; compare 2 Kgs 16:17, which specifies bronze oxen.
  - type: text
    content: ' all facing outward. Three faced north, three faced west, three faced south, and three faced east, and the Sea rested on them. '
  '26':
  - type: text
    content: The walls of the Sea were about three inches
  - type: note
    content: Hebrew a handbreadth [8 centimeters].
  - type: text
    content: ' thick, and its rim flared out like a cup and resembled a water lily blossom. It could hold about 11,000 gallons'
  - type: note
    content: Hebrew 2,000 baths [42 kiloliters].
  - type: text
    content: ' of water.'
  '27':
  - type: text
    content: Huram also made ten bronze water carts, each 6 feet long, 6 feet wide, and 4-1/2 feet tall.
  - type: note
    content: Hebrew 4 cubits [1.8 meters] long, 4 cubits wide, and 3 cubits [1.4 meters] high.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'They were constructed with side panels braced with crossbars. '
  '29':
  - type: text
    content: 'Both the panels and the crossbars were decorated with carved lions, oxen, and cherubim. Above and below the lions and oxen were wreath decorations. '
  '3':
  - type: text
    content: The hall had a cedar roof. Above the beams on the pillars were forty-five side rooms,
  - type: note
    content: Or 45 rafters, or 45 beams, or 45 pillars. The architectural details in 7:2-6 can be interpreted in many different ways.
  - type: text
    content: ' arranged in three tiers of fifteen each. '
  '30':
  - type: text
    content: 'Each of these carts had four bronze wheels and bronze axles. There were supporting posts for the bronze basins at the corners of the carts; these supports were decorated on each side with carvings of wreaths. '
  '31':
  - type: text
    content: The top of each cart had a rounded frame for the basin. It projected 1-1/2 feet
  - type: note
    content: Hebrew a cubit [46 centimeters].
  - type: text
    content: ' above the cart’s top like a round pedestal, and its opening was 2-1/4 feet'
  - type: note
    content: Hebrew 1-1/2 cubits [69 centimeters]; also in 7:32.
  - type: text
    content: ' across; it was decorated on the outside with carvings of wreaths. The panels of the carts were square, not round. '
  '32':
  - type: text
    content: 'Under the panels were four wheels that were connected to axles that had been cast as one unit with the cart. The wheels were 2-1/4 feet in diameter '
  '33':
  - type: text
    content: and were similar to chariot wheels. The axles, spokes, rims, and hubs were all cast from molten bronze.
  '34':
  - type: text
    content: 'There were handles at each of the four corners of the carts, and these, too, were cast as one unit with the cart. '
  '35':
  - type: text
    content: Around the top of each cart was a rim nine inches wide.
  - type: note
    content: Hebrew half a cubit wide [23 centimeters].
  - type: text
    content: ' The corner supports and side panels were cast as one unit with the cart. '
  '36':
  - type: text
    content: 'Carvings of cherubim, lions, and palm trees decorated the panels and corner supports wherever there was room, and there were wreaths all around. '
  '37':
  - type: text
    content: All ten water carts were the same size and were made alike, for each was cast from the same mold.
  '38':
  - type: text
    content: Huram also made ten smaller bronze basins, one for each cart. Each basin was six feet across and could hold 220 gallons
  - type: note
    content: Hebrew 40 baths [840 liters].
  - type: text
    content: ' of water. '
  '39':
  - type: text
    content: 'He set five water carts on the south side of the Temple and five on the north side. The great bronze basin called the Sea was placed near the southeast corner of the Temple. '
  '4':
  - type: text
    content: 'On each end of the long hall were three rows of windows facing each other. '
  '40':
  - type: text
    content: He also made the necessary washbasins, shovels, and bowls.
  - type: text
    content: 'So at last Huram completed everything King Solomon had assigned him to make for the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  '41':
  - type: text
    content: the two pillars;
  - type: text
    content: the two bowl-shaped capitals on top of the pillars;
  - type: text
    content: the two networks of interwoven chains that decorated the capitals;
  '42':
  - type: text
    content: the 400 pomegranates that hung from the chains on the capitals (two rows of pomegranates for each of the chain networks that decorated the capitals on top of the pillars);
  '43':
  - type: text
    content: the ten water carts holding the ten basins;
  '44':
  - type: text
    content: the Sea and the twelve oxen under it;
  '45':
  - type: text
    content: the ash buckets, the shovels, and the bowls.
  - type: text
    content: 'Huram made all these things of burnished bronze for the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', just as King Solomon had directed. '
  '46':
  - type: text
    content: 'The king had them cast in clay molds in the Jordan Valley between Succoth and Zarethan. '
  '47':
  - type: text
    content: Solomon did not weigh all these things because there were so many; the weight of the bronze could not be measured.
  '48':
  - type: text
    content: 'Solomon also made all the furnishings of the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: the gold altar;
  - type: text
    content: the gold table for the Bread of the Presence;
  '49':
  - type: text
    content: the lampstands of solid gold, five on the south and five on the north, in front of the Most Holy Place;
  - type: text
    content: the flower decorations, lamps, and tongs—all of gold;
  '5':
  - type: text
    content: All the doorways and doorposts
  - type: note
    content: Greek version reads windows.
  - type: text
    content: ' had rectangular frames and were arranged in sets of three, facing each other.'
  '50':
  - type: text
    content: the small bowls, lamp snuffers, bowls, ladles, and incense burners—all of solid gold;
  - type: text
    content: the doors for the entrances to the Most Holy Place and the main room of the Temple, with their fronts overlaid with gold.
  '51':
  - type: text
    content: 'So King Solomon finished all his work on the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. Then he brought all the gifts his father, David, had dedicated—the silver, the gold, and the various articles—and he stored them in the treasuries of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple.
  '6':
  - type: text
    content: Solomon also built the Hall of Pillars, which was 75 feet long and 45 feet wide.
  - type: note
    content: Hebrew 50 cubits [23 meters] long and 30 cubits [13.8 meters] wide.
  - type: text
    content: ' There was a porch in front, along with a canopy supported by pillars.'
  '7':
  - type: text
    content: Solomon also built the throne room, known as the Hall of Justice, where he sat to hear legal matters. It was paneled with cedar from floor to ceiling.
  - type: note
    content: As in Syriac version and Latin Vulgate; Hebrew reads from floor to floor.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Solomon’s living quarters surrounded a courtyard behind this hall, and they were constructed the same way. He also built similar living quarters for Pharaoh’s daughter, whom he had married.
  '9':
  - type: text
    content: 'From foundation to eaves, all these buildings were built from huge blocks of high-quality stone, cut with saws and trimmed to exact measure on all sides. '
