document_id: 1KI.7,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon Builds His Palace
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Solomon also built a palace for himself, and it took him thirteen years to complete the construction.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Some of the huge foundation stones were 15 feet long, and some were 12 feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '10 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[4.6 meters] . . . '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '8 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[3.7 meters].'
      marker-yv: yv-n
    - type: text
      text: ' long. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The blocks of high-quality stone used in the walls were also cut to measure, and cedar beams were also used. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The walls of the great courtyard were built so that there was one layer of cedar beams between every three layers of finished stone, just like the walls of the inner courtyard of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Temple with its entry room.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Furnishings for the Temple
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: King Solomon then asked for a man named Huram
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hiram '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (also in 7:40, 45); compare 2 Chr 2:13. This is not the same person mentioned in 5:1.
      marker-yv: yv-n
    - type: text
      text: ' to come from Tyre. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: He was half Israelite, since his mother was a widow from the tribe of Naphtali, and his father had been a craftsman in bronze from Tyre. Huram was extremely skillful and talented in any work in bronze, and he came to do all the metal work for King Solomon.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Huram cast two bronze pillars, each 27 feet tall and 18 feet in circumference.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '18 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[8.3 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tall and 12 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[5.5 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in circumference.
      marker-yv: yv-n
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: For the tops of the pillars he cast bronze capitals, each 7-1/2 feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.3 meters].'
      marker-yv: yv-n
    - type: text
      text: ' tall. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Each capital was decorated with seven sets of latticework and interwoven chains. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'He also encircled the latticework with two rows of pomegranates to decorate the capitals over the pillars. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The capitals on the columns inside the entry room were shaped like water lilies, and they were six feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '4 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[1.8 meters]; also in 7:38.'
      marker-yv: yv-n
    - type: text
      text: ' tall. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: One of Solomon’s buildings was called the Palace of the Forest of Lebanon. It was 150 feet long, 75 feet wide, and 45 feet high.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '100 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[46 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long, 50 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[23 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'wide, and 30 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[13.8 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: high.
      marker-yv: yv-n
    - type: text
      text: ' There were four rows of cedar pillars, and great cedar beams rested on the pillars. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The capitals on the two pillars had 200 pomegranates in two rows around them, beside the rounded surface next to the latticework. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Huram set the pillars at the entrance of the Temple, one toward the south and one toward the north. He named the one on the south Jakin, and the one on the north Boaz.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:21 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jakin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'probably means “he establishes”; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Boaz '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: probably means “in him is strength.”
      marker-yv: yv-n
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The capitals on the pillars were shaped like water lilies. And so the work on the pillars was finished.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Then Huram cast a great round basin, 15 feet across from rim to rim, called the Sea. It was 7-1/2 feet deep and about 45 feet in circumference.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '10 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[4.6 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'across. . . . 5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.3 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'deep and 30 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[13.8 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in circumference.
      marker-yv: yv-n
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: It was encircled just below its rim by two rows of decorative gourds. There were about six gourds per foot
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20 gourds per meter; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 10 per cubit.
      marker-yv: yv-n
    - type: text
      text: ' all the way around, and they were cast as part of the basin.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The Sea was placed on a base of twelve bronze oxen,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '12 oxen; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'compare 2 Kgs 16:17, which specifies '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bronze oxen.
      marker-yv: yv-n
    - type: text
      text: ' all facing outward. Three faced north, three faced west, three faced south, and three faced east, and the Sea rested on them. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: The walls of the Sea were about three inches
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:26a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a handbreadth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[8 centimeters].'
      marker-yv: yv-n
    - type: text
      text: ' thick, and its rim flared out like a cup and resembled a water lily blossom. It could hold about 11,000 gallons'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:26b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2,000 baths '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[42 kiloliters].'
      marker-yv: yv-n
    - type: text
      text: ' of water.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Huram also made ten bronze water carts, each 6 feet long, 6 feet wide, and 4-1/2 feet tall.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '4 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[1.8 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long, 4 cubits wide, and 3 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[1.4 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: high.
      marker-yv: yv-n
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'They were constructed with side panels braced with crossbars. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Both the panels and the crossbars were decorated with carved lions, oxen, and cherubim. Above and below the lions and oxen were wreath decorations. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The hall had a cedar roof. Above the beams on the pillars were forty-five side rooms,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '45 rafters, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '45 beams, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '45 pillars. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The architectural details in 7:2-6 can be interpreted in many different ways.
      marker-yv: yv-n
    - type: text
      text: ' arranged in three tiers of fifteen each. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Each of these carts had four bronze wheels and bronze axles. There were supporting posts for the bronze basins at the corners of the carts; these supports were decorated on each side with carvings of wreaths. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: The top of each cart had a rounded frame for the basin. It projected 1-1/2 feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:31a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[46 centimeters].'
      marker-yv: yv-n
    - type: text
      text: ' above the cart’s top like a round pedestal, and its opening was 2-1/4 feet'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:31b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1-1/2 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[69 centimeters]; also in 7:32.'
      marker-yv: yv-n
    - type: text
      text: ' across; it was decorated on the outside with carvings of wreaths. The panels of the carts were square, not round. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Under the panels were four wheels that were connected to axles that had been cast as one unit with the cart. The wheels were 2-1/4 feet in diameter '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: and were similar to chariot wheels. The axles, spokes, rims, and hubs were all cast from molten bronze.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'There were handles at each of the four corners of the carts, and these, too, were cast as one unit with the cart. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Around the top of each cart was a rim nine inches wide.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'half a cubit wide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[23 centimeters].'
      marker-yv: yv-n
    - type: text
      text: ' The corner supports and side panels were cast as one unit with the cart. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Carvings of cherubim, lions, and palm trees decorated the panels and corner supports wherever there was room, and there were wreaths all around. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: All ten water carts were the same size and were made alike, for each was cast from the same mold.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Huram also made ten smaller bronze basins, one for each cart. Each basin was six feet across and could hold 220 gallons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '40 baths '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[840 liters].'
      marker-yv: yv-n
    - type: text
      text: ' of water. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'He set five water carts on the south side of the Temple and five on the north side. The great bronze basin called the Sea was placed near the southeast corner of the Temple. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'On each end of the long hall were three rows of windows facing each other. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: He also made the necessary washbasins, shovels, and bowls.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So at last Huram completed everything King Solomon had assigned him to make for the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ':'
  '41':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: the two pillars;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the two bowl-shaped capitals on top of the pillars;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the two networks of interwoven chains that decorated the capitals;
  '42':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: the 400 pomegranates that hung from the chains on the capitals (two rows of pomegranates for each of the chain networks that decorated the capitals on top of the pillars);
  '43':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: the ten water carts holding the ten basins;
  '44':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: the Sea and the twelve oxen under it;
  '45':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: the ash buckets, the shovels, and the bowls.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Huram made all these things of burnished bronze for the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', just as King Solomon had directed. '
  '46':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'The king had them cast in clay molds in the Jordan Valley between Succoth and Zarethan. '
  '47':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Solomon did not weigh all these things because there were so many; the weight of the bronze could not be measured.
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Solomon also made all the furnishings of the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ':'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the gold altar;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the gold table for the Bread of the Presence;
  '49':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: the lampstands of solid gold, five on the south and five on the north, in front of the Most Holy Place;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the flower decorations, lamps, and tongs—all of gold;
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: All the doorways and doorposts
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: windows.
      marker-yv: yv-n
    - type: text
      text: ' had rectangular frames and were arranged in sets of three, facing each other.'
  '50':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: the small bowls, lamp snuffers, bowls, ladles, and incense burners—all of solid gold;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the doors for the entrances to the Most Holy Place and the main room of the Temple, with their fronts overlaid with gold.
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'So King Solomon finished all his work on the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Then he brought all the gifts his father, David, had dedicated—the silver, the gold, and the various articles—and he stored them in the treasuries of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Temple.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Solomon also built the Hall of Pillars, which was 75 feet long and 45 feet wide.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '50 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[23 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long and 30 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[13.8 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wide.
      marker-yv: yv-n
    - type: text
      text: ' There was a porch in front, along with a canopy supported by pillars.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Solomon also built the throne room, known as the Hall of Justice, where he sat to hear legal matters. It was paneled with cedar from floor to ceiling.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Syriac version and Latin Vulgate; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from floor to floor.
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Solomon’s living quarters surrounded a courtyard behind this hall, and they were constructed the same way. He also built similar living quarters for Pharaoh’s daughter, whom he had married.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'From foundation to eaves, all these buildings were built from huge blocks of high-quality stone, cut with saws and trimmed to exact measure on all sides. '
