document_id: EZK.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Story of Two Eagles
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, give this riddle, and tell this story to the people of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Give them this message from the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “A great eagle with broad wings and long feathers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: covered with many-colored plumage,
- type: usfm
  marker: q2
  children:
  - type: text
    text: came to Lebanon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He seized the top of a cedar tree
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: and plucked off its highest branch.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He carried it away to a city filled with merchants.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He planted it in a city of traders.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He also took a seedling from the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and planted it in fertile soil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He placed it beside a broad river,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where it could grow like a willow tree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: It took root there
- type: usfm
  marker: q2
  children:
  - type: text
    text: and grew into a low, spreading vine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its branches turned up toward the eagle,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and its roots grew down into the ground.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It produced strong branches
- type: usfm
  marker: q2
  children:
  - type: text
    text: and put out shoots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But then another great eagle came
- type: usfm
  marker: q2
  children:
  - type: text
    text: with broad wings and full plumage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So the vine now sent its roots and branches
- type: usfm
  marker: q2
  children:
  - type: text
    text: toward him for water,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: even though it was already planted in good soil
- type: usfm
  marker: q2
  children:
  - type: text
    text: and had plenty of water
- type: usfm
  marker: q1
  children:
  - type: text
    text: so it could grow into a splendid vine
- type: usfm
  marker: q2
  children:
  - type: text
    text: and produce rich leaves and luscious fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“So now the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' asks:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will this vine grow and prosper?
- type: usfm
  marker: q2
  children:
  - type: text
    text: No! I will pull it up, roots and all!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will cut off its fruit
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let its leaves wither and die.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will pull it up easily
- type: usfm
  marker: q2
  children:
  - type: text
    text: without a strong arm or a large army.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But when the vine is transplanted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will it thrive?
- type: usfm
  marker: q1
  children:
  - type: text
    text: No, it will wither away
- type: usfm
  marker: q2
  children:
  - type: text
    text: when the east wind blows against it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will die in the same good soil
- type: usfm
  marker: q2
  children:
  - type: text
    text: where it had grown so well.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Riddle Explained
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Say to these rebels of Israel: Don’t you understand the meaning of this riddle of the eagles? The king of Babylon came to Jerusalem, took away her king and princes, and brought them to Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He made a treaty with a member of the royal family and forced him to take an oath of loyalty. He also exiled Israel’s most influential leaders, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: so Israel would not become strong again and revolt. Only by keeping her treaty with Babylon could Israel survive.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Nevertheless, this man of Israel’s royal family rebelled against Babylon, sending ambassadors to Egypt to request a great army and many horses. Can Israel break her sworn treaties like that and get away with it? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'No! For as surely as I live, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the king of Israel will die in Babylon, the land of the king who put him in power and whose treaty he disregarded and broke. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Pharaoh and all his mighty army will fail to help Israel when the king of Babylon lays siege to Jerusalem again and destroys many lives. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For the king of Israel disregarded his treaty and broke it after swearing to obey; therefore, he will not escape.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“So this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: As surely as I live, I will punish him for breaking my covenant and disregarding the solemn oath he made in my name. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'I will throw my net over him and capture him in my snare. I will bring him to Babylon and put him on trial for this treason against me. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And all his best warriors
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in many Hebrew manuscripts; Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'his fleeing warriors. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' will be killed in battle, and those who survive will be scattered to the four winds. Then you will know that I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I will take a branch from the top of a tall cedar, and I will plant it on the top of Israel’s highest mountain. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'It will become a majestic cedar, sending forth its branches and producing seed. Birds of every sort will nest in it, finding shelter in the shade of its branches. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And all the trees will know that it is I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who cuts the tall tree down and makes the short tree grow tall. It is I who makes the green tree wither and gives the dead tree new life. I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken, and I will do what I said!”'
