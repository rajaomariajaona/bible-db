document_id: EZK.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Story of Two Eagles
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: But when the vine is transplanted,
  - type: text
    content: will it thrive?
  - type: text
    content: No, it will wither away
  - type: text
    content: when the east wind blows against it.
  - type: text
    content: It will die in the same good soil
  - type: text
    content: where it had grown so well.”
  - type: heading
    content: The Riddle Explained
  '11':
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '12':
  - type: text
    content: '“Say to these rebels of Israel: Don’t you understand the meaning of this riddle of the eagles? The king of Babylon came to Jerusalem, took away her king and princes, and brought them to Babylon. '
  '13':
  - type: text
    content: 'He made a treaty with a member of the royal family and forced him to take an oath of loyalty. He also exiled Israel’s most influential leaders, '
  '14':
  - type: text
    content: so Israel would not become strong again and revolt. Only by keeping her treaty with Babylon could Israel survive.
  '15':
  - type: text
    content: '“Nevertheless, this man of Israel’s royal family rebelled against Babylon, sending ambassadors to Egypt to request a great army and many horses. Can Israel break her sworn treaties like that and get away with it? '
  '16':
  - type: text
    content: 'No! For as surely as I live, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', the king of Israel will die in Babylon, the land of the king who put him in power and whose treaty he disregarded and broke. '
  '17':
  - type: text
    content: 'Pharaoh and all his mighty army will fail to help Israel when the king of Babylon lays siege to Jerusalem again and destroys many lives. '
  '18':
  - type: text
    content: For the king of Israel disregarded his treaty and broke it after swearing to obey; therefore, he will not escape.
  '19':
  - type: text
    content: '“So this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: As surely as I live, I will punish him for breaking my covenant and disregarding the solemn oath he made in my name. '
  '2':
  - type: text
    content: '“Son of man, give this riddle, and tell this story to the people of Israel. '
  '20':
  - type: text
    content: 'I will throw my net over him and capture him in my snare. I will bring him to Babylon and put him on trial for this treason against me. '
  '21':
  - type: text
    content: And all his best warriors
  - type: note
    content: As in many Hebrew manuscripts; Masoretic Text reads his fleeing warriors. The meaning is uncertain.
  - type: text
    content: ' will be killed in battle, and those who survive will be scattered to the four winds. Then you will know that I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken.'
  '22':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will take a branch from the top of a tall cedar, and I will plant it on the top of Israel’s highest mountain. '
  '23':
  - type: text
    content: 'It will become a majestic cedar, sending forth its branches and producing seed. Birds of every sort will nest in it, finding shelter in the shade of its branches. '
  '24':
  - type: text
    content: 'And all the trees will know that it is I, the '
  - type: text
    content: Lord
  - type: text
    content: ', who cuts the tall tree down and makes the short tree grow tall. It is I who makes the green tree wither and gives the dead tree new life. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken, and I will do what I said!”'
  '3':
  - type: text
    content: 'Give them this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “A great eagle with broad wings and long feathers,
  - type: text
    content: covered with many-colored plumage,
  - type: text
    content: came to Lebanon.
  - type: text
    content: He seized the top of a cedar tree
  '4':
  - type: text
    content: and plucked off its highest branch.
  - type: text
    content: He carried it away to a city filled with merchants.
  - type: text
    content: He planted it in a city of traders.
  '5':
  - type: text
    content: He also took a seedling from the land
  - type: text
    content: and planted it in fertile soil.
  - type: text
    content: He placed it beside a broad river,
  - type: text
    content: where it could grow like a willow tree.
  '6':
  - type: text
    content: It took root there
  - type: text
    content: and grew into a low, spreading vine.
  - type: text
    content: Its branches turned up toward the eagle,
  - type: text
    content: and its roots grew down into the ground.
  - type: text
    content: It produced strong branches
  - type: text
    content: and put out shoots.
  '7':
  - type: text
    content: But then another great eagle came
  - type: text
    content: with broad wings and full plumage.
  - type: text
    content: So the vine now sent its roots and branches
  - type: text
    content: toward him for water,
  '8':
  - type: text
    content: even though it was already planted in good soil
  - type: text
    content: and had plenty of water
  - type: text
    content: so it could grow into a splendid vine
  - type: text
    content: and produce rich leaves and luscious fruit.
  '9':
  - type: text
    content: '“So now the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' asks:'
  - type: text
    content: Will this vine grow and prosper?
  - type: text
    content: No! I will pull it up, roots and all!
  - type: text
    content: I will cut off its fruit
  - type: text
    content: and let its leaves wither and die.
  - type: text
    content: I will pull it up easily
  - type: text
    content: without a strong arm or a large army.
