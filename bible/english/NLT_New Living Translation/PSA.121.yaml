document_id: PSA.121,116
type_code: eng
verses:
  '1':
  - type: text
    content: A song for pilgrims ascending to Jerusalem.
  - type: text
    content: I look up to the mountains—
  - type: text
    content: does my help come from there?
  '2':
  - type: text
    content: 'My help comes from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who made heaven and earth!
  '3':
  - type: text
    content: He will not let you stumble;
  - type: text
    content: the one who watches over you will not slumber.
  '4':
  - type: text
    content: Indeed, he who watches over Israel
  - type: text
    content: never slumbers or sleeps.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: 'Lord '
  - type: text
    content: himself watches over you!
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' stands beside you as your protective shade.'
  '6':
  - type: text
    content: The sun will not harm you by day,
  - type: text
    content: nor the moon at night.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' keeps you from all harm'
  - type: text
    content: and watches over your life.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' keeps watch over you as you come and go,'
  - type: text
    content: both now and forever.
