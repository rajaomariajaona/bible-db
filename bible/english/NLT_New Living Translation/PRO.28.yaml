document_id: PRO.28
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The wicked run away when no one is chasing them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the godly are as bold as lions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When there is moral rot within a nation, its government topples easily.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But wise and knowledgeable leaders bring stability.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A poor person who oppresses the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: is like a pounding rain that destroys the crops.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: To reject the law is to praise the wicked;
- type: usfm
  marker: q2
  children:
  - type: text
    text: to obey the law is to fight them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Evil people don’t understand justice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but those who follow the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' understand completely.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Better to be poor and honest
- type: usfm
  marker: q2
  children:
  - type: text
    text: than to be dishonest and rich.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Young people who obey the law are wise;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those with wild friends bring shame to their parents.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: their father.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Income from charging high interest rates
- type: usfm
  marker: q2
  children:
  - type: text
    text: will end up in the pocket of someone who is kind to the poor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: God detests the prayers
- type: usfm
  marker: q2
  children:
  - type: text
    text: of a person who ignores the law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Those who lead good people along an evil path
- type: usfm
  marker: q2
  children:
  - type: text
    text: will fall into their own trap,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the honest will inherit good things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Rich people may think they are wise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a poor person with discernment can see right through them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When the godly succeed, everyone is glad.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When the wicked take charge, people go into hiding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: People who conceal their sins will not prosper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but if they confess and turn from them, they will receive mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Blessed are those who fear to do wrong,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'those who fear the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: '; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: those who fear.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the stubborn are headed for serious trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: A wicked ruler is as dangerous to the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: as a roaring lion or an attacking bear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A ruler with no understanding will oppress his people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but one who hates corruption will have a long life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A murderer’s tormented conscience will drive him into the grave.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t protect him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The blameless will be rescued from harm,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the crooked will be suddenly destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A hard worker has plenty of food,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a person who chases fantasies ends up in poverty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The trustworthy person will get a rich reward,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a person who wants quick riches will get into trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Showing partiality is never good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet some will do wrong for a mere piece of bread.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Greedy people try to get rich quick
- type: usfm
  marker: q2
  children:
  - type: text
    text: but don’t realize they’re headed for poverty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: In the end, people appreciate honest criticism
- type: usfm
  marker: q2
  children:
  - type: text
    text: far more than flattery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Anyone who steals from his father and mother
- type: usfm
  marker: q2
  children:
  - type: text
    text: and says, “What’s wrong with that?”
- type: usfm
  marker: q2
  children:
  - type: text
    text: is no better than a murderer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Greed causes fighting;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'trusting the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' leads to prosperity.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Those who trust their own insight are foolish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but anyone who walks in wisdom is safe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Whoever gives to the poor will lack nothing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but those who close their eyes to poverty will be cursed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: When the wicked take charge, people go into hiding.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When the wicked meet disaster, the godly flourish.
