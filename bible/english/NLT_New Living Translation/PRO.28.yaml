document_id: PRO.28,116
type_code: eng
verses:
  '1':
  - type: text
    content: The wicked run away when no one is chasing them,
  - type: text
    content: but the godly are as bold as lions.
  '10':
  - type: text
    content: Those who lead good people along an evil path
  - type: text
    content: will fall into their own trap,
  - type: text
    content: but the honest will inherit good things.
  '11':
  - type: text
    content: Rich people may think they are wise,
  - type: text
    content: but a poor person with discernment can see right through them.
  '12':
  - type: text
    content: When the godly succeed, everyone is glad.
  - type: text
    content: When the wicked take charge, people go into hiding.
  '13':
  - type: text
    content: People who conceal their sins will not prosper,
  - type: text
    content: but if they confess and turn from them, they will receive mercy.
  '14':
  - type: text
    content: Blessed are those who fear to do wrong,
  - type: note
    content: Or those who fear the Lord; Hebrew reads those who fear.
  - type: text
    content: but the stubborn are headed for serious trouble.
  '15':
  - type: text
    content: A wicked ruler is as dangerous to the poor
  - type: text
    content: as a roaring lion or an attacking bear.
  '16':
  - type: text
    content: A ruler with no understanding will oppress his people,
  - type: text
    content: but one who hates corruption will have a long life.
  '17':
  - type: text
    content: A murderer’s tormented conscience will drive him into the grave.
  - type: text
    content: Don’t protect him!
  '18':
  - type: text
    content: The blameless will be rescued from harm,
  - type: text
    content: but the crooked will be suddenly destroyed.
  '19':
  - type: text
    content: A hard worker has plenty of food,
  - type: text
    content: but a person who chases fantasies ends up in poverty.
  '2':
  - type: text
    content: When there is moral rot within a nation, its government topples easily.
  - type: text
    content: But wise and knowledgeable leaders bring stability.
  '20':
  - type: text
    content: The trustworthy person will get a rich reward,
  - type: text
    content: but a person who wants quick riches will get into trouble.
  '21':
  - type: text
    content: Showing partiality is never good,
  - type: text
    content: yet some will do wrong for a mere piece of bread.
  '22':
  - type: text
    content: Greedy people try to get rich quick
  - type: text
    content: but don’t realize they’re headed for poverty.
  '23':
  - type: text
    content: In the end, people appreciate honest criticism
  - type: text
    content: far more than flattery.
  '24':
  - type: text
    content: Anyone who steals from his father and mother
  - type: text
    content: and says, “What’s wrong with that?”
  - type: text
    content: is no better than a murderer.
  '25':
  - type: text
    content: Greed causes fighting;
  - type: text
    content: 'trusting the '
  - type: text
    content: Lord
  - type: text
    content: ' leads to prosperity.'
  '26':
  - type: text
    content: Those who trust their own insight are foolish,
  - type: text
    content: but anyone who walks in wisdom is safe.
  '27':
  - type: text
    content: Whoever gives to the poor will lack nothing,
  - type: text
    content: but those who close their eyes to poverty will be cursed.
  '28':
  - type: text
    content: When the wicked take charge, people go into hiding.
  - type: text
    content: When the wicked meet disaster, the godly flourish.
  '3':
  - type: text
    content: A poor person who oppresses the poor
  - type: text
    content: is like a pounding rain that destroys the crops.
  '4':
  - type: text
    content: To reject the law is to praise the wicked;
  - type: text
    content: to obey the law is to fight them.
  '5':
  - type: text
    content: Evil people don’t understand justice,
  - type: text
    content: 'but those who follow the '
  - type: text
    content: Lord
  - type: text
    content: ' understand completely.'
  '6':
  - type: text
    content: Better to be poor and honest
  - type: text
    content: than to be dishonest and rich.
  '7':
  - type: text
    content: Young people who obey the law are wise;
  - type: text
    content: those with wild friends bring shame to their parents.
  - type: note
    content: Hebrew their father.
  '8':
  - type: text
    content: Income from charging high interest rates
  - type: text
    content: will end up in the pocket of someone who is kind to the poor.
  '9':
  - type: text
    content: God detests the prayers
  - type: text
    content: of a person who ignores the law.
