document_id: 1CO.15,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Resurrection of Christ
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Let me now remind you, dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 15:31, 50, 58.
      marker-yv: yv-n
    - type: text
      text: ' of the Good News I preached to you before. You welcomed it then, and you still stand firm in it. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But whatever I am now, it is all because God poured out his special favor on me—and not without results. For I have worked harder than any of the other apostles; yet it was not I but God who was working through me by his grace. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So it makes no difference whether I preach or they preach, for we all preach the same message you have already believed.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Resurrection of the Dead
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But tell me this—since we preach that Christ rose from the dead, why are some of you saying there will be no resurrection of the dead? '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For if there is no resurrection of the dead, then Christ has not been raised either. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And if Christ has not been raised, then all our preaching is useless, and your faith is useless. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And we apostles would all be lying about God—for we have said that God raised Christ from the grave. But that can’t be true if there is no resurrection of the dead. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And if there is no resurrection of the dead, then Christ has not been raised. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And if Christ has not been raised, then your faith is useless and you are still guilty of your sins. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'In that case, all who have died believing in Christ are lost! '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: And if our hope in Christ is only for this life, we are more to be pitied than anyone in the world.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: It is this Good News that saves you if you continue to believe the message I told you—unless, of course, you believed something that was never true in the first place.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: unless you never believed it in the first place.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: But in fact, Christ has been raised from the dead. He is the first of a great harvest of all who have died.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So you see, just as death came into the world through a man, now the resurrection from the dead has begun through another man. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Just as everyone dies because we all belong to Adam, everyone who belongs to Christ will be given new life. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But there is an order to this resurrection: Christ was raised as the first of the harvest; then all who belong to Christ will be raised when he comes back.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'After that the end will come, when he will turn the Kingdom over to God the Father, having destroyed every ruler and authority and power. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'For Christ must reign until he humbles all his enemies beneath his feet. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And the last enemy to be destroyed is death. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: For the Scriptures say, “God has put all things under his authority.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 8:6.
      marker-yv: yv-n
    - type: text
      text: ' (Of course, when it says “all things are under his authority,” that does not include God himself, who gave Christ his authority.) '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Then, when all things are under his authority, the Son will put himself under God’s authority, so that God, who gave his Son authority over all things, will be utterly supreme over everything everywhere.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: If the dead will not be raised, what point is there in people being baptized for those who are dead? Why do it unless the dead will someday rise again?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I passed on to you what was most important and what had also been passed on to me. Christ died for our sins, just as the Scriptures said. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And why should we ourselves risk our lives hour by hour? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'For I swear, dear brothers and sisters, that I face death daily. This is as certain as my pride in what Christ Jesus our Lord has done in you. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: And what value was there in fighting wild beasts—those people of Ephesus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:32a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fighting wild beasts in Ephesus.
      marker-yv: yv-n
    - type: text
      text: —if there will be no resurrection from the dead? And if there is no resurrection, “Let’s feast and drink, for tomorrow we die!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:32b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 22:13.
      marker-yv: yv-n
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Don’t be fooled by those who say such things, for “bad company corrupts good character.” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Think carefully about what is right, and stop sinning. For to your shame I say that some of you don’t know God at all.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Resurrection Body
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'But someone may ask, “How will the dead be raised? What kind of bodies will they have?” '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'What a foolish question! When you put a seed into the ground, it doesn’t grow into a plant unless it dies first. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And what you put in the ground is not the plant that will grow, but only a bare seed of wheat or whatever you are planting. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Then God gives it the new body he wants it to have. A different plant grows from each kind of seed. '
  '39':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Similarly there are different kinds of flesh—one kind for humans, another for animals, another for birds, and another for fish.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He was buried, and he was raised from the dead on the third day, just as the Scriptures said. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'There are also bodies in the heavens and bodies on the earth. The glory of the heavenly bodies is different from the glory of the earthly bodies. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: The sun has one kind of glory, while the moon and stars each have another kind. And even the stars differ from each other in their glory.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'It is the same way with the resurrection of the dead. Our earthly bodies are planted in the ground when we die, but they will be raised to live forever. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Our bodies are buried in brokenness, but they will be raised in glory. They are buried in weakness, but they will be raised in strength. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: They are buried as natural human bodies, but they will be raised as spiritual bodies. For just as there are natural bodies, there are also spiritual bodies.
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: The Scriptures tell us, “The first man, Adam, became a living person.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:45 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen 2:7.
      marker-yv: yv-n
    - type: text
      text: ' But the last Adam—that is, Christ—is a life-giving Spirit. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'What comes first is the natural body, then the spiritual body comes later. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Adam, the first man, was made from the dust of the earth, while Christ, the second man, came from heaven. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Earthly people are like the earthly man, and heavenly people are like the heavenly man. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Just as we are now like the earthly man, we will someday be like
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: let us be like.
      marker-yv: yv-n
    - type: text
      text: ' the heavenly man.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: He was seen by Peter
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Cephas.
      marker-yv: yv-n
    - type: text
      text: ' and then by the Twelve. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: What I am saying, dear brothers and sisters, is that our physical bodies cannot inherit the Kingdom of God. These dying bodies cannot inherit what will last forever.
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'But let me reveal to you a wonderful secret. We will not all die, but we will all be transformed! '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'It will happen in a moment, in the blink of an eye, when the last trumpet is blown. For when the trumpet sounds, those who have died will be raised to live forever. And we who are living will also be transformed. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: For our dying bodies must be transformed into bodies that will never die; our mortal bodies must be transformed into immortal bodies.
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Then, when our dying bodies have been transformed into bodies that will never die,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:54a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and our mortal bodies have been transformed into immortal bodies.
      marker-yv: yv-n
    - type: text
      text: ' this Scripture will be fulfilled:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Death is swallowed up in victory.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:54b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 25:8.
      marker-yv: yv-n
  '55':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: O death, where is your victory?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O death, where is your sting?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:55 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hos 13:14 (Greek version).
      marker-yv: yv-n
    - type: text
      text: ”
  '56':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'For sin is the sting that results in death, and the law gives sin its power. '
  '57':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: But thank God! He gives us victory over sin and death through our Lord Jesus Christ.
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: So, my dear brothers and sisters, be strong and immovable. Always work enthusiastically for the Lord, for you know that nothing you do for the Lord is ever useless.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: After that, he was seen by more than 500 of his followers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the brothers.
      marker-yv: yv-n
    - type: text
      text: ' at one time, most of whom are still alive, though some have died. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then he was seen by James and later by all the apostles. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Last of all, as though I had been born at the wrong time, I also saw him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For I am the least of all the apostles. In fact, I’m not even worthy to be called an apostle after the way I persecuted God’s church.
