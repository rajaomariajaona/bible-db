document_id: MAT.27,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judas Hangs Himself
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Very early in the morning the leading priests and the elders of the people met again to lay plans for putting Jesus to death. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and purchased the potter’s field,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' directed.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:9-10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'as the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' directed me. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Zech 11:12-13; Jer 32:6-9.
      marker-yv: yv-n
    - type: text
      text: ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus’ Trial before Pilate
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Now Jesus was standing before Pilate, the Roman governor. “Are you the king of the Jews?” the governor asked him.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have said it.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the leading priests and the elders made their accusations against him, Jesus remained silent. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Don’t you hear all these charges they are bringing against you?” Pilate demanded. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Jesus made no response to any of the charges, much to the governor’s surprise.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it was the governor’s custom each year during the Passover celebration to release one prisoner to the crowd—anyone they wanted. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This year there was a notorious prisoner, a man named Barabbas.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jesus Barabbas; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 27:17.
      marker-yv: yv-n
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the crowds gathered before Pilate’s house that morning, he asked them, “Which one do you want me to release to you—Barabbas, or Jesus who is called the Messiah?” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (He knew very well that the religious leaders had arrested Jesus out of envy.)
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just then, as Pilate was sitting on the judgment seat, his wife sent him this message: “Leave that innocent man alone. I suffered through a terrible nightmare about him last night.”'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then they bound him, led him away, and took him to Pilate, the Roman governor.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meanwhile, the leading priests and the elders persuaded the crowd to ask for Barabbas to be released and for Jesus to be put to death. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the governor asked again, “Which of these two do you want me to release to you?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: The crowd shouted back, “Barabbas!”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pilate responded, “Then what should I do with Jesus who is called the Messiah?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They shouted back, “Crucify him!”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Why?” Pilate demanded. “What crime has he committed?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the mob roared even louder, “Crucify him!”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pilate saw that he wasn’t getting anywhere and that a riot was developing. So he sent for a bowl of water and washed his hands before the crowd, saying, “I am innocent of this man’s blood. The responsibility is yours!”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And all the people yelled back, “We will take responsibility for his death—we and our children!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: “His blood be on us and on our children.”
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Pilate released Barabbas to them. He ordered Jesus flogged with a lead-tipped whip, then turned him over to the Roman soldiers to be crucified.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Soldiers Mock Jesus
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Some of the governor’s soldiers took Jesus into their headquarters
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: into the Praetorium.
      marker-yv: yv-n
    - type: text
      text: ' and called out the entire regiment. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They stripped him and put a scarlet robe on him. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They wove thorn branches into a crown and put it on his head, and they placed a reed stick in his right hand as a scepter. Then they knelt before him in mockery and taunted, “Hail! King of the Jews!” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Judas, who had betrayed him, realized that Jesus had been condemned to die, he was filled with remorse. So he took the thirty pieces of silver back to the leading priests and the elders. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And they spit on him and grabbed the stick and struck him on the head with it. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When they were finally tired of mocking him, they took off the robe and put his own clothes on him again. Then they led him away to be crucified.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Crucifixion
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Along the way, they came across a man named Simon, who was from Cyrene,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:32 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Cyrene '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was a city in northern Africa.
      marker-yv: yv-n
    - type: text
      text: ' and the soldiers forced him to carry Jesus’ cross. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And they went out to a place called Golgotha (which means “Place of the Skull”). '
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The soldiers gave Jesus wine mixed with bitter gall, but when he had tasted it, he refused to drink it.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After they had nailed him to the cross, the soldiers gambled for his clothes by throwing dice.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'by casting lots. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A few late manuscripts add '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'This fulfilled the word of the prophet: “They divided my garments among themselves and cast lots for my robe.” '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Ps 22:18.
      marker-yv: yv-n
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they sat around and kept guard as he hung there. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A sign was fastened above Jesus’ head, announcing the charge against him. It read: “This is Jesus, the King of the Jews.” '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Two revolutionaries
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'criminals; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 27:44.
      marker-yv: yv-n
    - type: text
      text: ' were crucified with him, one on his right and one on his left.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people passing by shouted abuse, shaking their heads in mockery. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I have sinned,” he declared, “for I have betrayed an innocent man.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What do we care?” they retorted. “That’s your problem.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Look at you now!” they yelled at him. “You said you were going to destroy the Temple and rebuild it in three days. Well then, if you are the Son of God, save yourself and come down from the cross!”
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The leading priests, the teachers of religious law, and the elders also mocked Jesus. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“He saved others,” they scoffed, “but he can’t save himself! So he is the King of Israel, is he? Let him come down from the cross right now, and we will believe in him! '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He trusted God, so let God rescue him now if he wants him! For he said, ‘I am the Son of God.’” '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Even the revolutionaries who were crucified with him ridiculed him in the same way.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Jesus
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'At noon, darkness fell across the whole land until three o’clock. '
  '46':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'At about three o’clock, Jesus called out with a loud voice, '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: “Eli, Eli,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:46a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Eloi, Eloi.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: lema sabachthani?”
    - type: text
      text: ' which means '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My God, my God, why have you abandoned me?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:46b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 22:1.
      marker-yv: yv-n
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some of the bystanders misunderstood and thought he was calling for the prophet Elijah. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of them ran and filled a sponge with sour wine, holding it up to him on a reed stick so he could drink. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the rest said, “Wait! Let’s see whether Elijah comes to save him.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'And another took a spear and pierced his side, and out flowed water and blood. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare John 19:34.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Judas threw the silver coins down in the Temple and went out and hanged himself.
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus shouted out again, and he released his spirit. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that moment the curtain in the sanctuary of the Temple was torn in two, from top to bottom. The earth shook, rocks split apart, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and tombs opened. The bodies of many godly men and women who had died were raised from the dead. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They left the cemetery after Jesus’ resurrection, went into the holy city of Jerusalem, and appeared to many people.
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Roman officer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:54 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The centurion.
      marker-yv: yv-n
    - type: text
      text: ' and the other soldiers at the crucifixion were terrified by the earthquake and all that had happened. They said, “This man truly was the Son of God!”'
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And many women who had come from Galilee with Jesus to care for him were watching from a distance. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Among them were Mary Magdalene, Mary (the mother of James and Joseph), and the mother of James and John, the sons of Zebedee.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Burial of Jesus
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As evening approached, Joseph, a rich man from Arimathea who had become a follower of Jesus, '
  '58':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'went to Pilate and asked for Jesus’ body. And Pilate issued an order to release it to him. '
  '59':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Joseph took the body and wrapped it in a long sheet of clean linen cloth. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The leading priests picked up the coins. “It wouldn’t be right to put this money in the Temple treasury,” they said, “since it was payment for murder.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: since it is the price for blood.
      marker-yv: yv-n
    - type: text
      text: ' '
  '60':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He placed it in his own new tomb, which had been carved out of the rock. Then he rolled a great stone across the entrance and left. '
  '61':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Both Mary Magdalene and the other Mary were sitting across from the tomb and watching.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Guard at the Tomb
    marker-yv: yv-h
  '62':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The next day, on the Sabbath,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:62 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: On the next day, which is after the Preparation.
      marker-yv: yv-n
    - type: text
      text: ' the leading priests and Pharisees went to see Pilate. '
  '63':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They told him, “Sir, we remember what that deceiver once said while he was still alive: ‘After three days I will rise from the dead.’ '
  '64':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So we request that you seal the tomb until the third day. This will prevent his disciples from coming and stealing his body and then telling everyone he was raised from the dead! If that happens, we’ll be worse off than we were at first.”
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate replied, “Take guards and secure it the best you can.” '
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they sealed the tomb and posted guards to protect it.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After some discussion they finally decided to buy the potter’s field, and they made it into a cemetery for foreigners. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That is why the field is still called the Field of Blood. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This fulfilled the prophecy of Jeremiah that says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They took
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: I took.
      marker-yv: yv-n
    - type: text
      text: ' the thirty pieces of silver—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the price at which he was valued by the people of Israel,
