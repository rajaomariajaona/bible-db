document_id: MAT.27,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judas Hangs Himself
  - type: text
    content: 'Very early in the morning the leading priests and the elders of the people met again to lay plans for putting Jesus to death. '
  '10':
  - type: text
    content: and purchased the potter’s field,
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' directed.'
  - type: note
    content: Greek as the Lord directed me. Zech 11:12-13; Jer 32:6-9.
  - type: text
    content: ”
  - type: heading
    content: Jesus’ Trial before Pilate
  '11':
  - type: text
    content: Now Jesus was standing before Pilate, the Roman governor. “Are you the king of the Jews?” the governor asked him.
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You have said it.”
  '12':
  - type: text
    content: 'But when the leading priests and the elders made their accusations against him, Jesus remained silent. '
  '13':
  - type: text
    content: '“Don’t you hear all these charges they are bringing against you?” Pilate demanded. '
  '14':
  - type: text
    content: But Jesus made no response to any of the charges, much to the governor’s surprise.
  '15':
  - type: text
    content: 'Now it was the governor’s custom each year during the Passover celebration to release one prisoner to the crowd—anyone they wanted. '
  '16':
  - type: text
    content: This year there was a notorious prisoner, a man named Barabbas.
  - type: note
    content: Some manuscripts read Jesus Barabbas; also in 27:17.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'As the crowds gathered before Pilate’s house that morning, he asked them, “Which one do you want me to release to you—Barabbas, or Jesus who is called the Messiah?” '
  '18':
  - type: text
    content: (He knew very well that the religious leaders had arrested Jesus out of envy.)
  '19':
  - type: text
    content: 'Just then, as Pilate was sitting on the judgment seat, his wife sent him this message: “Leave that innocent man alone. I suffered through a terrible nightmare about him last night.”'
  '2':
  - type: text
    content: Then they bound him, led him away, and took him to Pilate, the Roman governor.
  '20':
  - type: text
    content: 'Meanwhile, the leading priests and the elders persuaded the crowd to ask for Barabbas to be released and for Jesus to be put to death. '
  '21':
  - type: text
    content: So the governor asked again, “Which of these two do you want me to release to you?”
  - type: text
    content: The crowd shouted back, “Barabbas!”
  '22':
  - type: text
    content: Pilate responded, “Then what should I do with Jesus who is called the Messiah?”
  - type: text
    content: They shouted back, “Crucify him!”
  '23':
  - type: text
    content: “Why?” Pilate demanded. “What crime has he committed?”
  - type: text
    content: But the mob roared even louder, “Crucify him!”
  '24':
  - type: text
    content: Pilate saw that he wasn’t getting anywhere and that a riot was developing. So he sent for a bowl of water and washed his hands before the crowd, saying, “I am innocent of this man’s blood. The responsibility is yours!”
  '25':
  - type: text
    content: And all the people yelled back, “We will take responsibility for his death—we and our children!”
  - type: note
    content: Greek “His blood be on us and on our children.”
  '26':
  - type: text
    content: So Pilate released Barabbas to them. He ordered Jesus flogged with a lead-tipped whip, then turned him over to the Roman soldiers to be crucified.
  - type: heading
    content: The Soldiers Mock Jesus
  '27':
  - type: text
    content: Some of the governor’s soldiers took Jesus into their headquarters
  - type: note
    content: Or into the Praetorium.
  - type: text
    content: ' and called out the entire regiment. '
  '28':
  - type: text
    content: 'They stripped him and put a scarlet robe on him. '
  '29':
  - type: text
    content: 'They wove thorn branches into a crown and put it on his head, and they placed a reed stick in his right hand as a scepter. Then they knelt before him in mockery and taunted, “Hail! King of the Jews!” '
  '3':
  - type: text
    content: 'When Judas, who had betrayed him, realized that Jesus had been condemned to die, he was filled with remorse. So he took the thirty pieces of silver back to the leading priests and the elders. '
  '30':
  - type: text
    content: 'And they spit on him and grabbed the stick and struck him on the head with it. '
  '31':
  - type: text
    content: When they were finally tired of mocking him, they took off the robe and put his own clothes on him again. Then they led him away to be crucified.
  - type: heading
    content: The Crucifixion
  '32':
  - type: text
    content: Along the way, they came across a man named Simon, who was from Cyrene,
  - type: note
    content: Cyrene was a city in northern Africa.
  - type: text
    content: ' and the soldiers forced him to carry Jesus’ cross. '
  '33':
  - type: text
    content: 'And they went out to a place called Golgotha (which means “Place of the Skull”). '
  '34':
  - type: text
    content: The soldiers gave Jesus wine mixed with bitter gall, but when he had tasted it, he refused to drink it.
  '35':
  - type: text
    content: After they had nailed him to the cross, the soldiers gambled for his clothes by throwing dice.
  - type: note
    content: 'Greek by casting lots. A few late manuscripts add This fulfilled the word of the prophet: “They divided my garments among themselves and cast lots for my robe.” See Ps 22:18.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Then they sat around and kept guard as he hung there. '
  '37':
  - type: text
    content: 'A sign was fastened above Jesus’ head, announcing the charge against him. It read: “This is Jesus, the King of the Jews.” '
  '38':
  - type: text
    content: Two revolutionaries
  - type: note
    content: Or criminals; also in 27:44.
  - type: text
    content: ' were crucified with him, one on his right and one on his left.'
  '39':
  - type: text
    content: 'The people passing by shouted abuse, shaking their heads in mockery. '
  '4':
  - type: text
    content: “I have sinned,” he declared, “for I have betrayed an innocent man.”
  - type: text
    content: “What do we care?” they retorted. “That’s your problem.”
  '40':
  - type: text
    content: “Look at you now!” they yelled at him. “You said you were going to destroy the Temple and rebuild it in three days. Well then, if you are the Son of God, save yourself and come down from the cross!”
  '41':
  - type: text
    content: 'The leading priests, the teachers of religious law, and the elders also mocked Jesus. '
  '42':
  - type: text
    content: '“He saved others,” they scoffed, “but he can’t save himself! So he is the King of Israel, is he? Let him come down from the cross right now, and we will believe in him! '
  '43':
  - type: text
    content: 'He trusted God, so let God rescue him now if he wants him! For he said, ‘I am the Son of God.’” '
  '44':
  - type: text
    content: Even the revolutionaries who were crucified with him ridiculed him in the same way.
  - type: heading
    content: The Death of Jesus
  '45':
  - type: text
    content: 'At noon, darkness fell across the whole land until three o’clock. '
  '46':
  - type: text
    content: 'At about three o’clock, Jesus called out with a loud voice, '
  - type: text
    content: “Eli, Eli,
  - type: note
    content: Some manuscripts read Eloi, Eloi.
  - type: text
    content: ' '
  - type: text
    content: lema sabachthani?”
  - type: text
    content: ' which means '
  - type: text
    content: “My God, my God, why have you abandoned me?”
  - type: note
    content: Ps 22:1.
  '47':
  - type: text
    content: 'Some of the bystanders misunderstood and thought he was calling for the prophet Elijah. '
  '48':
  - type: text
    content: 'One of them ran and filled a sponge with sour wine, holding it up to him on a reed stick so he could drink. '
  '49':
  - type: text
    content: But the rest said, “Wait! Let’s see whether Elijah comes to save him.”
  - type: note
    content: Some manuscripts add And another took a spear and pierced his side, and out flowed water and blood. Compare John 19:34.
  '5':
  - type: text
    content: Then Judas threw the silver coins down in the Temple and went out and hanged himself.
  '50':
  - type: text
    content: 'Then Jesus shouted out again, and he released his spirit. '
  '51':
  - type: text
    content: 'At that moment the curtain in the sanctuary of the Temple was torn in two, from top to bottom. The earth shook, rocks split apart, '
  '52':
  - type: text
    content: 'and tombs opened. The bodies of many godly men and women who had died were raised from the dead. '
  '53':
  - type: text
    content: They left the cemetery after Jesus’ resurrection, went into the holy city of Jerusalem, and appeared to many people.
  '54':
  - type: text
    content: The Roman officer
  - type: note
    content: Greek The centurion.
  - type: text
    content: ' and the other soldiers at the crucifixion were terrified by the earthquake and all that had happened. They said, “This man truly was the Son of God!”'
  '55':
  - type: text
    content: 'And many women who had come from Galilee with Jesus to care for him were watching from a distance. '
  '56':
  - type: text
    content: Among them were Mary Magdalene, Mary (the mother of James and Joseph), and the mother of James and John, the sons of Zebedee.
  - type: heading
    content: The Burial of Jesus
  '57':
  - type: text
    content: 'As evening approached, Joseph, a rich man from Arimathea who had become a follower of Jesus, '
  '58':
  - type: text
    content: 'went to Pilate and asked for Jesus’ body. And Pilate issued an order to release it to him. '
  '59':
  - type: text
    content: 'Joseph took the body and wrapped it in a long sheet of clean linen cloth. '
  '6':
  - type: text
    content: The leading priests picked up the coins. “It wouldn’t be right to put this money in the Temple treasury,” they said, “since it was payment for murder.”
  - type: note
    content: Greek since it is the price for blood.
  - type: text
    content: ' '
  '60':
  - type: text
    content: 'He placed it in his own new tomb, which had been carved out of the rock. Then he rolled a great stone across the entrance and left. '
  '61':
  - type: text
    content: Both Mary Magdalene and the other Mary were sitting across from the tomb and watching.
  - type: heading
    content: The Guard at the Tomb
  '62':
  - type: text
    content: The next day, on the Sabbath,
  - type: note
    content: Or On the next day, which is after the Preparation.
  - type: text
    content: ' the leading priests and Pharisees went to see Pilate. '
  '63':
  - type: text
    content: 'They told him, “Sir, we remember what that deceiver once said while he was still alive: ‘After three days I will rise from the dead.’ '
  '64':
  - type: text
    content: So we request that you seal the tomb until the third day. This will prevent his disciples from coming and stealing his body and then telling everyone he was raised from the dead! If that happens, we’ll be worse off than we were at first.”
  '65':
  - type: text
    content: 'Pilate replied, “Take guards and secure it the best you can.” '
  '66':
  - type: text
    content: So they sealed the tomb and posted guards to protect it.
  '7':
  - type: text
    content: 'After some discussion they finally decided to buy the potter’s field, and they made it into a cemetery for foreigners. '
  '8':
  - type: text
    content: 'That is why the field is still called the Field of Blood. '
  '9':
  - type: text
    content: This fulfilled the prophecy of Jeremiah that says,
  - type: text
    content: “They took
  - type: note
    content: Or I took.
  - type: text
    content: ' the thirty pieces of silver—'
  - type: text
    content: the price at which he was valued by the people of Israel,
