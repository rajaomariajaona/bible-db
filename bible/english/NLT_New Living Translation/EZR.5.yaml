document_id: EZR.5,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'At that time the prophets Haggai and Zechariah son of Iddo prophesied to the Jews in Judah and Jerusalem. They prophesied in the name of the God of Israel who was over them. '
  '10':
  - type: text
    content: And we demanded their names so that we could tell you who the leaders were.
  '11':
  - type: text
    content: '“This was their answer: ‘We are the servants of the God of heaven and earth, and we are rebuilding the Temple that was built here many years ago by a great king of Israel. '
  '12':
  - type: text
    content: But because our ancestors angered the God of heaven, he abandoned them to King Nebuchadnezzar of Babylon,
  - type: note
    content: Aramaic Nebuchadnezzar the Chaldean.
  - type: text
    content: ' who destroyed this Temple and exiled the people to Babylonia. '
  '13':
  - type: text
    content: However, King Cyrus of Babylon,
  - type: note
    content: King Cyrus of Persia is here identified as the king of Babylon because Persia had conquered the Babylonian Empire.
  - type: text
    content: ' during the first year of his reign, issued a decree that the Temple of God should be rebuilt. '
  '14':
  - type: text
    content: 'King Cyrus returned the gold and silver cups that Nebuchadnezzar had taken from the Temple of God in Jerusalem and had placed in the temple of Babylon. These cups were taken from that temple and presented to a man named Sheshbazzar, whom King Cyrus appointed as governor of Judah. '
  '15':
  - type: text
    content: 'The king instructed him to return the cups to their place in Jerusalem and to rebuild the Temple of God there on its original site. '
  '16':
  - type: text
    content: So this Sheshbazzar came and laid the foundations of the Temple of God in Jerusalem. The people have been working on it ever since, though it is not yet completed.’
  '17':
  - type: text
    content: “Therefore, if it pleases the king, we request that a search be made in the royal archives of Babylon to discover whether King Cyrus ever issued a decree to rebuild God’s Temple in Jerusalem. And then let the king send us his decision in this matter.”
  '2':
  - type: text
    content: Zerubbabel son of Shealtiel and Jeshua son of Jehozadak
  - type: note
    content: Aramaic Jozadak, a variant spelling of Jehozadak.
  - type: text
    content: ' responded by starting again to rebuild the Temple of God in Jerusalem. And the prophets of God were with them and helped them.'
  '3':
  - type: text
    content: But Tattenai, governor of the province west of the Euphrates River,
  - type: note
    content: Aramaic the province beyond the river; also in 5:6.
  - type: text
    content: ' and Shethar-bozenai and their colleagues soon arrived in Jerusalem and asked, “Who gave you permission to rebuild this Temple and restore this structure?” '
  '4':
  - type: text
    content: They also asked for
  - type: note
    content: As in one Hebrew manuscript and Greek and Syriac versions; Masoretic Text reads Then we told them.
  - type: text
    content: ' the names of all the men working on the Temple. '
  '5':
  - type: text
    content: But because their God was watching over them, the leaders of the Jews were not prevented from building until a report was sent to Darius and he returned his decision.
  - type: heading
    content: Tattenai’s Letter to King Darius
  '6':
  - type: text
    content: 'This is a copy of the letter that Tattenai the governor, Shethar-bozenai, and the other officials of the province west of the Euphrates River sent to King Darius:'
  '7':
  - type: text
    content: “To King Darius. Greetings.
  '8':
  - type: text
    content: “The king should know that we went to the construction site of the Temple of the great God in the province of Judah. It is being rebuilt with specially prepared stones, and timber is being laid in its walls. The work is going forward with great energy and success.
  '9':
  - type: text
    content: '“We asked the leaders, ‘Who gave you permission to rebuild this Temple and restore this structure?’ '
