document_id: ISA.60
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Future Glory for Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Arise, Jerusalem! Let your light shine for all to see.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rises to shine on you.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Darkness as black as night covers all the nations of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rises and appears over you.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: All nations will come to your light;
- type: usfm
  marker: q2
  children:
  - type: text
    text: mighty kings will come to see your radiance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Look and see, for everyone is coming home!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your sons are coming from distant lands;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your little daughters will be carried home.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Your eyes will shine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your heart will thrill with joy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for merchants from around the world will come to you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will bring you the wealth of many lands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Vast caravans of camels will converge on you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the camels of Midian and Ephah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The people of Sheba will bring gold and frankincense
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and will come worshiping the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The flocks of Kedar will be given to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the rams of Nebaioth will be brought for my altars.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will accept their offerings,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will make my Temple glorious.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “And what do I see flying like clouds to Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like doves to their nests?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They are ships from the ends of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from lands that trust in me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: led by the great ships of Tarshish.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are bringing the people of Israel home from far away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: carrying their silver and gold.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They will honor the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Holy One of Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he has filled you with splendor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Foreigners will come to rebuild your towns,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their kings will serve you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For though I have destroyed you in my anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will now have mercy on you through my grace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Your gates will stay open day and night
- type: usfm
  marker: q2
  children:
  - type: text
    text: to receive the wealth of many lands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The kings of the world will be led as captives
- type: usfm
  marker: q2
  children:
  - type: text
    text: in a victory procession.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For the nations that refuse to serve you
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “The glory of Lebanon will be yours—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the forests of cypress, fir, and pine—
- type: usfm
  marker: q1
  children:
  - type: text
    text: to beautify my sanctuary.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My Temple will be glorious!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The descendants of your tormentors
- type: usfm
  marker: q2
  children:
  - type: text
    text: will come and bow before you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who despised you
- type: usfm
  marker: q2
  children:
  - type: text
    text: will kiss your feet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They will call you the City of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Zion of the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Though you were once despised and hated,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with no one traveling through you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will make you beautiful forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a joy to all generations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Powerful kings and mighty nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: will satisfy your every need,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as though you were a child
- type: usfm
  marker: q2
  children:
  - type: text
    text: nursing at the breast of a queen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You will know at last that I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: am your Savior and your Redeemer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Mighty One of Israel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note on 14:1.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I will exchange your bronze for gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your iron for silver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: your wood for bronze,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your stones for iron.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will make peace your leader
- type: usfm
  marker: q2
  children:
  - type: text
    text: and righteousness your ruler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Violence will disappear from your land;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the desolation and destruction of war will end.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Salvation will surround you like city walls,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and praise will be on the lips of all who enter there.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “No longer will you need the sun to shine by day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor the moon to give its light by night,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will be your everlasting light,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your God will be your glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Your sun will never set;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your moon will not go down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be your everlasting light.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your days of mourning will come to an end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: All your people will be righteous.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will possess their land forever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for I will plant them there with my own hands
- type: usfm
  marker: q2
  children:
  - type: text
    text: in order to bring myself glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The smallest family will become a thousand people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the tiniest group will become a mighty nation.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'At the right time, I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', will make it happen.”'
