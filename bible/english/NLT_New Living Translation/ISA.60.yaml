document_id: ISA.60,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Future Glory for Jerusalem
  - type: text
    content: “Arise, Jerusalem! Let your light shine for all to see.
  - type: text
    content: 'For the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' rises to shine on you.'
  '10':
  - type: text
    content: “Foreigners will come to rebuild your towns,
  - type: text
    content: and their kings will serve you.
  - type: text
    content: For though I have destroyed you in my anger,
  - type: text
    content: I will now have mercy on you through my grace.
  '11':
  - type: text
    content: Your gates will stay open day and night
  - type: text
    content: to receive the wealth of many lands.
  - type: text
    content: The kings of the world will be led as captives
  - type: text
    content: in a victory procession.
  '12':
  - type: text
    content: For the nations that refuse to serve you
  - type: text
    content: will be destroyed.
  '13':
  - type: text
    content: “The glory of Lebanon will be yours—
  - type: text
    content: the forests of cypress, fir, and pine—
  - type: text
    content: to beautify my sanctuary.
  - type: text
    content: My Temple will be glorious!
  '14':
  - type: text
    content: The descendants of your tormentors
  - type: text
    content: will come and bow before you.
  - type: text
    content: Those who despised you
  - type: text
    content: will kiss your feet.
  - type: text
    content: 'They will call you the City of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and Zion of the Holy One of Israel.
  '15':
  - type: text
    content: “Though you were once despised and hated,
  - type: text
    content: with no one traveling through you,
  - type: text
    content: I will make you beautiful forever,
  - type: text
    content: a joy to all generations.
  '16':
  - type: text
    content: Powerful kings and mighty nations
  - type: text
    content: will satisfy your every need,
  - type: text
    content: as though you were a child
  - type: text
    content: nursing at the breast of a queen.
  - type: text
    content: 'You will know at last that I, the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: am your Savior and your Redeemer,
  - type: text
    content: the Mighty One of Israel.
  - type: note
    content: Hebrew of Jacob. See note on 14:1.
  '17':
  - type: text
    content: I will exchange your bronze for gold,
  - type: text
    content: your iron for silver,
  - type: text
    content: your wood for bronze,
  - type: text
    content: and your stones for iron.
  - type: text
    content: I will make peace your leader
  - type: text
    content: and righteousness your ruler.
  '18':
  - type: text
    content: Violence will disappear from your land;
  - type: text
    content: the desolation and destruction of war will end.
  - type: text
    content: Salvation will surround you like city walls,
  - type: text
    content: and praise will be on the lips of all who enter there.
  '19':
  - type: text
    content: “No longer will you need the sun to shine by day,
  - type: text
    content: nor the moon to give its light by night,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will be your everlasting light,'
  - type: text
    content: and your God will be your glory.
  '2':
  - type: text
    content: Darkness as black as night covers all the nations of the earth,
  - type: text
    content: 'but the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' rises and appears over you.'
  '20':
  - type: text
    content: Your sun will never set;
  - type: text
    content: your moon will not go down.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will be your everlasting light.'
  - type: text
    content: Your days of mourning will come to an end.
  '21':
  - type: text
    content: All your people will be righteous.
  - type: text
    content: They will possess their land forever,
  - type: text
    content: for I will plant them there with my own hands
  - type: text
    content: in order to bring myself glory.
  '22':
  - type: text
    content: The smallest family will become a thousand people,
  - type: text
    content: and the tiniest group will become a mighty nation.
  - type: text
    content: 'At the right time, I, the '
  - type: text
    content: Lord
  - type: text
    content: ', will make it happen.”'
  '3':
  - type: text
    content: All nations will come to your light;
  - type: text
    content: mighty kings will come to see your radiance.
  '4':
  - type: text
    content: “Look and see, for everyone is coming home!
  - type: text
    content: Your sons are coming from distant lands;
  - type: text
    content: your little daughters will be carried home.
  '5':
  - type: text
    content: Your eyes will shine,
  - type: text
    content: and your heart will thrill with joy,
  - type: text
    content: for merchants from around the world will come to you.
  - type: text
    content: They will bring you the wealth of many lands.
  '6':
  - type: text
    content: Vast caravans of camels will converge on you,
  - type: text
    content: the camels of Midian and Ephah.
  - type: text
    content: The people of Sheba will bring gold and frankincense
  - type: text
    content: 'and will come worshiping the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: The flocks of Kedar will be given to you,
  - type: text
    content: and the rams of Nebaioth will be brought for my altars.
  - type: text
    content: I will accept their offerings,
  - type: text
    content: and I will make my Temple glorious.
  '8':
  - type: text
    content: “And what do I see flying like clouds to Israel,
  - type: text
    content: like doves to their nests?
  '9':
  - type: text
    content: They are ships from the ends of the earth,
  - type: text
    content: from lands that trust in me,
  - type: text
    content: led by the great ships of Tarshish.
  - type: text
    content: They are bringing the people of Israel home from far away,
  - type: text
    content: carrying their silver and gold.
  - type: text
    content: 'They will honor the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: the Holy One of Israel,
  - type: text
    content: for he has filled you with splendor.
