document_id: ISA.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Songs of Praise for Salvation
  - type: text
    content: 'In that day you will sing:'
  - type: text
    content: '“I will praise you, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: You were angry with me, but not anymore.
  - type: text
    content: Now you comfort me.
  '2':
  - type: text
    content: See, God has come to save me.
  - type: text
    content: I will trust in him and not be afraid.
  - type: text
    content: 'The '
  - type: text
    content: Lord God
  - type: text
    content: ' is my strength and my song;'
  - type: text
    content: he has given me victory.”
  '3':
  - type: text
    content: With joy you will drink deeply
  - type: text
    content: from the fountain of salvation!
  '4':
  - type: text
    content: 'In that wonderful day you will sing:'
  - type: text
    content: '“Thank the '
  - type: text
    content: Lord
  - type: text
    content: '! Praise his name!'
  - type: text
    content: Tell the nations what he has done.
  - type: text
    content: Let them know how mighty he is!
  '5':
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he has done wonderful things.'
  - type: text
    content: Make known his praise around the world.
  '6':
  - type: text
    content: Let all the people of Jerusalem
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ' shout his praise with joy!'
  - type: text
    content: For great is the Holy One of Israel who lives among you.”
