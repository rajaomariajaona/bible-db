document_id: EXO.11,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Death for Egypt’s Firstborn
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “I will strike Pharaoh and the land of Egypt with one more blow. After that, Pharaoh will let you leave this country. In fact, he will be so eager to get rid of you that he will force you all to leave. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses and Aaron performed these miracles in Pharaoh’s presence, but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' hardened Pharaoh’s heart, and he wouldn’t let the Israelites leave the country.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tell all the Israelite men and women to ask their Egyptian neighbors for articles of silver and gold.” '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '(Now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had caused the Egyptians to look favorably on the people of Israel. And Moses was considered a very great man in the land of Egypt, respected by Pharaoh’s officials and the Egyptian people alike.)'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses had announced to Pharaoh, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: At midnight tonight I will pass through the heart of Egypt. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the firstborn sons will die in every family in Egypt, from the oldest son of Pharaoh, who sits on his throne, to the oldest son of his lowliest servant girl who grinds the flour. Even the firstborn of all the livestock will die. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a loud wail will rise throughout the land of Egypt, a wail like no one has heard before or will ever hear again. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But among the Israelites it will be so peaceful that not even a dog will bark. Then you will know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' makes a distinction between the Egyptians and the Israelites. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the officials of Egypt will run to me and fall to the ground before me. ‘Please leave!’ they will beg. ‘Hurry! And take all your followers with you.’ Only then will I go!” Then, burning with anger, Moses left Pharaoh.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had told Moses earlier, “Pharaoh will not listen to you, but then I will do even more mighty miracles in the land of Egypt.” '
