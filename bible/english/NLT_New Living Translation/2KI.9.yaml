document_id: 2KI.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehu Anointed King of Israel
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Meanwhile, Elisha the prophet had summoned a member of the group of prophets. “Get ready to travel,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Bind up your loins.
      marker-yv: yv-n
    - type: text
      text: ' he told him, “and take this flask of olive oil with you. Go to Ramoth-gilead, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dogs will eat Ahab’s wife Jezebel at the plot of land in Jezreel, and no one will bury her.” Then the young prophet opened the door and ran.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehu went back to his fellow officers, and one of them asked him, “What did that madman want? Is everything all right?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You know how a man like that babbles on,” Jehu replied.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You’re hiding something,” they said. “Tell us.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jehu told them, “He said to me, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I have anointed you to be king over Israel.’”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they quickly spread out their cloaks on the bare steps and blew the ram’s horn, shouting, “Jehu is king!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehu Kills Joram and Ahaziah
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So Jehu son of Jehoshaphat, son of Nimshi, led a conspiracy against King Joram. (Now Joram had been with the army at Ramoth-gilead, defending Israel against the forces of King Hazael of Aram. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But King Joram
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jehoram, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Joram; also in 9:17, 21, 22, 23, 24.
      marker-yv: yv-n
    - type: text
      text: ' was wounded in the fighting and returned to Jezreel to recover from his wounds.) So Jehu told the men with him, “If you want me to be king, don’t let anyone leave town and go to Jezreel to report what we have done.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jehu got into a chariot and rode to Jezreel to find King Joram, who was lying there wounded. King Ahaziah of Judah was there, too, for he had gone to visit him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The watchman on the tower of Jezreel saw Jehu and his company approaching, so he shouted to Joram, “I see a company of troops coming!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Send out a rider to ask if they are coming in peace,” King Joram ordered.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So a horseman went out to meet Jehu and said, “The king wants to know if you are coming in peace.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehu replied, “What do you know about peace? Fall in behind me!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: The watchman called out to the king, “The messenger has met them, but he’s not returning.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the king sent out a second horseman. He rode up to them and said, “The king wants to know if you come in peace.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Again Jehu answered, “What do you know about peace? Fall in behind me!”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'and find Jehu son of Jehoshaphat, son of Nimshi. Call him into a private room away from his friends, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The watchman exclaimed, “The messenger has met them, but he isn’t returning either! It must be Jehu son of Nimshi, for he’s driving like a madman.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Quick! Get my chariot ready!” King Joram commanded.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then King Joram of Israel and King Ahaziah of Judah rode out in their chariots to meet Jehu. They met him at the plot of land that had belonged to Naboth of Jezreel. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: King Joram demanded, “Do you come in peace, Jehu?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehu replied, “How can there be peace as long as the idolatry and witchcraft of your mother, Jezebel, are all around us?”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then King Joram turned the horses around
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: turned his hands
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' and fled, shouting to King Ahaziah, “Treason, Ahaziah!” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Jehu drew his bow and shot Joram between the shoulders. The arrow pierced his heart, and he sank down dead in his chariot.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehu said to Bidkar, his officer, “Throw him into the plot of land that belonged to Naboth of Jezreel. Do you remember when you and I were riding along behind his father, Ahab? The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' pronounced this message against him: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘I solemnly swear that I will repay him here on this plot of land, says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for the murder of Naboth and his sons that I saw yesterday.’ So throw him out on Naboth’s property, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When King Ahaziah of Judah saw what was happening, he fled along the road to Beth-haggan. Jehu rode after him, shouting, “Shoot him, too!” So they shot Ahaziah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions; Hebrew lacks '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: So they shot Ahaziah.
      marker-yv: yv-n
    - type: text
      text: ' in his chariot at the Ascent of Gur, near Ibleam. He was able to go on as far as Megiddo, but he died there. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His servants took him by chariot to Jerusalem, where they buried him with his ancestors in the City of David. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ahaziah had become king over Judah in the eleventh year of the reign of Joram son of Ahab.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Jezebel
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'and pour the oil over his head. Say to him, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I anoint you to be the king over Israel.’ Then open the door and run for your life!”'
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When Jezebel, the queen mother, heard that Jehu had come to Jezreel, she painted her eyelids and fixed her hair and sat at a window. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When Jehu entered the gate of the palace, she shouted at him, “Have you come in peace, you murderer? You’re just like Zimri, who murdered his master!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See 1 Kgs 16:9-10, where Zimri killed his master, King Elah.
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehu looked up and saw her at the window and shouted, “Who is on my side?” And two or three eunuchs looked out at him. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Throw her down!” Jehu yelled. So they threw her out the window, and her blood spattered against the wall and on the horses. And Jehu trampled her body under his horses’ hooves.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jehu went into the palace and ate and drank. Afterward he said, “Someone go and bury this cursed woman, for she is the daughter of a king.” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when they went out to bury her, they found only her skull, her feet, and her hands.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they returned and told Jehu, he stated, “This fulfills the message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', which he spoke through his servant Elijah from Tishbe: ‘At the plot of land in Jezreel, dogs will eat Jezebel’s body. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Her remains will be scattered like dung on the plot of land in Jezreel, so that no one will be able to recognize her.’”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the young prophet did as he was told and went to Ramoth-gilead. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he arrived there, he found Jehu sitting around with the other army officers. “I have a message for you, Commander,” he said.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “For which one of us?” Jehu asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “For you, Commander,” he replied.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jehu left the others and went into the house. Then the young prophet poured the oil over Jehu’s head and said, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: I anoint you king over the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s people, Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You are to destroy the family of Ahab, your master. In this way, I will avenge the murder of my prophets and all the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s servants who were killed by Jezebel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The entire family of Ahab must be wiped out. I will destroy every one of his male descendants, slave and free alike, anywhere in Israel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will destroy the family of Ahab as I destroyed the families of Jeroboam son of Nebat and of Baasha son of Ahijah. '
