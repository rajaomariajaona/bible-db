document_id: REV.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s People Will Be Preserved
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then I saw four angels standing at the four corners of the earth, holding back the four winds so they did not blow on the earth or the sea, or even on any tree. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And I saw another angel coming up from the east, carrying the seal of the living God. And he shouted to those four angels, who had been given power to harm land and sea, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Wait! Don’t harm the land or the sea or the trees until we have placed the seal of God on the foreheads of his servants.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And I heard how many were marked with the seal of God—144,000 were sealed from all the tribes of Israel:'
- type: usfm
  marker: v
  metadata:
    v: '5'
- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '5'
- type: text
  text: from Judah12,000from Reuben12,000from Gad12,000
- type: usfm
  marker: v
  metadata:
    v: '6'
- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '6'
- type: text
  text: from Asher12,000from Naphtali12,000from Manasseh12,000
- type: usfm
  marker: v
  metadata:
    v: '7'
- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '7'
- type: text
  text: from Simeon12,000from Levi12,000from Issachar12,000
- type: usfm
  marker: v
  metadata:
    v: '8'
- type: usfm
  marker: vlbl
  children:
  - type: text
    text: '8'
- type: text
  text: from Zebulun12,000from Joseph12,000from Benjamin12,000
- type: usfm
  marker: s1
  children:
  - type: text
    text: Praise from the Great Crowd
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'After this I saw a vast crowd, too great to count, from every nation and tribe and people and language, standing in front of the throne and before the Lamb. They were clothed in white robes and held palm branches in their hands. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And they were shouting with a great roar,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Salvation comes from our God who sits on the throne
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from the Lamb!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And all the angels were standing around the throne and around the elders and the four living beings. And they fell before the throne with their faces to the ground and worshiped God. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Amen! Blessing and glory and wisdom
- type: usfm
  marker: q2
  children:
  - type: text
    text: and thanksgiving and honor
- type: usfm
  marker: q1
  children:
  - type: text
    text: and power and strength belong to our God
- type: usfm
  marker: q2
  children:
  - type: text
    text: forever and ever! Amen.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then one of the twenty-four elders asked me, “Who are these who are clothed in white? Where did they come from?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And I said to him, “Sir, you are the one who knows.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Then he said to me, “These are the ones who died in
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:14a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: who came out of.
    marker-yv: yv-n
  - type: text
    text: ' the great tribulation.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:14b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the great suffering.
    marker-yv: yv-n
  - type: text
    text: ' They have washed their robes in the blood of the Lamb and made them white.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “That is why they stand in front of God’s throne
- type: usfm
  marker: q2
  children:
  - type: text
    text: and serve him day and night in his Temple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he who sits on the throne
- type: usfm
  marker: q2
  children:
  - type: text
    text: will give them shelter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: They will never again be hungry or thirsty;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will never be scorched by the heat of the sun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For the Lamb on the throne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on the center of the throne.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be their Shepherd.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will lead them to springs of life-giving water.
- type: usfm
  marker: q2
  children:
  - type: text
    text: And God will wipe every tear from their eyes.”
