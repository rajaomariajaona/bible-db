document_id: REV.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s People Will Be Preserved
  - type: text
    content: 'Then I saw four angels standing at the four corners of the earth, holding back the four winds so they did not blow on the earth or the sea, or even on any tree. '
  '10':
  - type: text
    content: And they were shouting with a great roar,
  - type: text
    content: “Salvation comes from our God who sits on the throne
  - type: text
    content: and from the Lamb!”
  '11':
  - type: text
    content: 'And all the angels were standing around the throne and around the elders and the four living beings. And they fell before the throne with their faces to the ground and worshiped God. '
  '12':
  - type: text
    content: They sang,
  - type: text
    content: “Amen! Blessing and glory and wisdom
  - type: text
    content: and thanksgiving and honor
  - type: text
    content: and power and strength belong to our God
  - type: text
    content: forever and ever! Amen.”
  '13':
  - type: text
    content: Then one of the twenty-four elders asked me, “Who are these who are clothed in white? Where did they come from?”
  '14':
  - type: text
    content: And I said to him, “Sir, you are the one who knows.”
  - type: text
    content: Then he said to me, “These are the ones who died in
  - type: note
    content: Greek who came out of.
  - type: text
    content: ' the great tribulation.'
  - type: note
    content: Or the great suffering.
  - type: text
    content: ' They have washed their robes in the blood of the Lamb and made them white.'
  '15':
  - type: text
    content: “That is why they stand in front of God’s throne
  - type: text
    content: and serve him day and night in his Temple.
  - type: text
    content: And he who sits on the throne
  - type: text
    content: will give them shelter.
  '16':
  - type: text
    content: They will never again be hungry or thirsty;
  - type: text
    content: they will never be scorched by the heat of the sun.
  '17':
  - type: text
    content: For the Lamb on the throne
  - type: note
    content: Greek on the center of the throne.
  - type: text
    content: will be their Shepherd.
  - type: text
    content: He will lead them to springs of life-giving water.
  - type: text
    content: And God will wipe every tear from their eyes.”
  '2':
  - type: text
    content: 'And I saw another angel coming up from the east, carrying the seal of the living God. And he shouted to those four angels, who had been given power to harm land and sea, '
  '3':
  - type: text
    content: “Wait! Don’t harm the land or the sea or the trees until we have placed the seal of God on the foreheads of his servants.”
  '4':
  - type: text
    content: 'And I heard how many were marked with the seal of God—144,000 were sealed from all the tribes of Israel:'
  '5':
  - type: text
    content: from Judah
  - type: text
    content: 12,000
  - type: text
    content: from Reuben
  - type: text
    content: 12,000
  - type: text
    content: from Gad
  - type: text
    content: 12,000
  '6':
  - type: text
