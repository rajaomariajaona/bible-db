  - type: heading
    content: Praise from the Great Crowd
  '9':
  - type: text
    content: 'After this I saw a vast crowd, too great to count, from every nation and tribe and people and language, standing in front of the throne and before the Lamb. They were clothed in white robes and held palm branches in their hands. '
