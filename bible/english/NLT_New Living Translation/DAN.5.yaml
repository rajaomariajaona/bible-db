document_id: DAN.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Writing on the Wall
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Many years later King Belshazzar gave a great feast for 1,000 of his nobles, and he drank wine with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: While Belshazzar was drinking the wine, he gave orders to bring in the gold and silver cups that his predecessor,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'father; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 5:11, 13, 18.
    marker-yv: yv-n
  - type: text
    text: ' Nebuchadnezzar, had taken from the Temple in Jerusalem. He wanted to drink from them with his nobles, his wives, and his concubines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So they brought these gold cups taken from the Temple, the house of God in Jerusalem, and the king and his nobles, his wives, and his concubines drank from them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: While they drank from them they praised their idols made of gold, silver, bronze, iron, wood, and stone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Suddenly, they saw the fingers of a human hand writing on the plaster wall of the king’s palace, near the lampstand. The king himself saw the hand as it wrote, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and his face turned pale with fright. His knees knocked together in fear and his legs gave way beneath him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The king shouted for the enchanters, astrologers,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Chaldeans; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 5:11.
    marker-yv: yv-n
  - type: text
    text: ' and fortune-tellers to be brought before him. He said to these wise men of Babylon, “Whoever can read this writing and tell me what it means will be dressed in purple robes of royal honor and will have a gold chain placed around his neck. He will become the third highest ruler in the kingdom!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But when all the king’s wise men had come in, none of them could read the writing or tell him what it meant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So the king grew even more alarmed, and his face turned pale. His nobles, too, were shaken.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But when the queen mother heard what was happening, she hurried to the banquet hall. She said to Belshazzar, “Long live the king! Don’t be so pale and frightened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'There is a man in your kingdom who has within him the spirit of the holy gods. During Nebuchadnezzar’s reign, this man was found to have insight, understanding, and wisdom like that of the gods. Your predecessor, the king—your predecessor King Nebuchadnezzar—made him chief over all the magicians, enchanters, astrologers, and fortune-tellers of Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: This man Daniel, whom the king named Belteshazzar, has exceptional ability and is filled with divine knowledge and understanding. He can interpret dreams, explain riddles, and solve difficult problems. Call for Daniel, and he will tell you what the writing means.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Daniel Explains the Writing
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So Daniel was brought in before the king. The king asked him, “Are you Daniel, one of the exiles brought from Judah by my predecessor, King Nebuchadnezzar? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I have heard that you have the spirit of the gods within you and that you are filled with insight, understanding, and wisdom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'My wise men and enchanters have tried to read the words on the wall and tell me their meaning, but they cannot do it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I am told that you can give interpretations and solve difficult problems. If you can read these words and tell me their meaning, you will be clothed in purple robes of royal honor, and you will have a gold chain placed around your neck. You will become the third highest ruler in the kingdom.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Daniel answered the king, “Keep your gifts or give them to someone else, but I will tell you what the writing means. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Your Majesty, the Most High God gave sovereignty, majesty, glory, and honor to your predecessor, Nebuchadnezzar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He made him so great that people of all races and nations and languages trembled before him in fear. He killed those he wanted to kill and spared those he wanted to spare. He honored those he wanted to honor and disgraced those he wanted to disgrace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But when his heart and mind were puffed up with arrogance, he was brought down from his royal throne and stripped of his glory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: He was driven from human society. He was given the mind of a wild animal, and he lived among the wild donkeys. He ate grass like a cow, and he was drenched with the dew of heaven, until he learned that the Most High God rules over the kingdoms of the world and appoints anyone he desires to rule over them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “You are his successor,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son.
    marker-yv: yv-n
  - type: text
    text: ' O Belshazzar, and you knew all this, yet you have not humbled yourself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For you have proudly defied the Lord of heaven and have had these cups from his Temple brought before you. You and your nobles and your wives and concubines have been drinking wine from them while praising gods of silver, gold, bronze, iron, wood, and stone—gods that neither see nor hear nor know anything at all. But you have not honored the God who gives you the breath of life and controls your destiny! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So God has sent this hand to write this message.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“This is the message that was written: '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Mene, Mene, Tekel
  - type: text
    text: ', and '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Parsin
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'This is what these words mean:'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Mene
  - type: text
    text: ' means ‘numbered’—God has numbered the days of your reign and has brought it to an end.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tekel
  - type: text
    text: ' means ‘weighed’—you have been weighed on the balances and have not measured up.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parsin
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Peres, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'the singular of '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Parsin.
    marker-yv: yv-n
  - type: text
    text: means ‘divided’—your kingdom has been divided and given to the Medes and Persians.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Then at Belshazzar’s command, Daniel was dressed in purple robes, a gold chain was hung around his neck, and he was proclaimed the third highest ruler in the kingdom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: That very night Belshazzar, the Babylonian
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:30a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Chaldean.
    marker-yv: yv-n
  - type: text
    text: ' king, was killed.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:30b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Persians and Medes conquered Babylon in October 539 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verse 5:31 is numbered 6:1 in Aramaic text.
    marker-yv: yv-n
  - type: text
    text: And Darius the Mede took over the kingdom at the age of sixty-two.
