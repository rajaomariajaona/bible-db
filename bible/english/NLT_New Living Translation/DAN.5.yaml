document_id: DAN.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Writing on the Wall
  - type: text
    content: 'Many years later King Belshazzar gave a great feast for 1,000 of his nobles, and he drank wine with them. '
  '10':
  - type: text
    content: 'But when the queen mother heard what was happening, she hurried to the banquet hall. She said to Belshazzar, “Long live the king! Don’t be so pale and frightened. '
  '11':
  - type: text
    content: 'There is a man in your kingdom who has within him the spirit of the holy gods. During Nebuchadnezzar’s reign, this man was found to have insight, understanding, and wisdom like that of the gods. Your predecessor, the king—your predecessor King Nebuchadnezzar—made him chief over all the magicians, enchanters, astrologers, and fortune-tellers of Babylon. '
  '12':
  - type: text
    content: This man Daniel, whom the king named Belteshazzar, has exceptional ability and is filled with divine knowledge and understanding. He can interpret dreams, explain riddles, and solve difficult problems. Call for Daniel, and he will tell you what the writing means.”
  - type: heading
    content: Daniel Explains the Writing
  '13':
  - type: text
    content: 'So Daniel was brought in before the king. The king asked him, “Are you Daniel, one of the exiles brought from Judah by my predecessor, King Nebuchadnezzar? '
  '14':
  - type: text
    content: 'I have heard that you have the spirit of the gods within you and that you are filled with insight, understanding, and wisdom. '
  '15':
  - type: text
    content: 'My wise men and enchanters have tried to read the words on the wall and tell me their meaning, but they cannot do it. '
  '16':
  - type: text
    content: I am told that you can give interpretations and solve difficult problems. If you can read these words and tell me their meaning, you will be clothed in purple robes of royal honor, and you will have a gold chain placed around your neck. You will become the third highest ruler in the kingdom.”
  '17':
  - type: text
    content: 'Daniel answered the king, “Keep your gifts or give them to someone else, but I will tell you what the writing means. '
  '18':
  - type: text
    content: 'Your Majesty, the Most High God gave sovereignty, majesty, glory, and honor to your predecessor, Nebuchadnezzar. '
  '19':
  - type: text
    content: 'He made him so great that people of all races and nations and languages trembled before him in fear. He killed those he wanted to kill and spared those he wanted to spare. He honored those he wanted to honor and disgraced those he wanted to disgrace. '
  '2':
  - type: text
    content: While Belshazzar was drinking the wine, he gave orders to bring in the gold and silver cups that his predecessor,
  - type: note
    content: Aramaic father; also in 5:11, 13, 18.
  - type: text
    content: ' Nebuchadnezzar, had taken from the Temple in Jerusalem. He wanted to drink from them with his nobles, his wives, and his concubines. '
  '20':
  - type: text
    content: 'But when his heart and mind were puffed up with arrogance, he was brought down from his royal throne and stripped of his glory. '
  '21':
  - type: text
    content: He was driven from human society. He was given the mind of a wild animal, and he lived among the wild donkeys. He ate grass like a cow, and he was drenched with the dew of heaven, until he learned that the Most High God rules over the kingdoms of the world and appoints anyone he desires to rule over them.
  '22':
  - type: text
    content: “You are his successor,
  - type: note
    content: Aramaic son.
  - type: text
    content: ' O Belshazzar, and you knew all this, yet you have not humbled yourself. '
  '23':
  - type: text
    content: 'For you have proudly defied the Lord of heaven and have had these cups from his Temple brought before you. You and your nobles and your wives and concubines have been drinking wine from them while praising gods of silver, gold, bronze, iron, wood, and stone—gods that neither see nor hear nor know anything at all. But you have not honored the God who gives you the breath of life and controls your destiny! '
  '24':
  - type: text
    content: So God has sent this hand to write this message.
  '25':
  - type: text
    content: '“This is the message that was written: '
  - type: heading
    content: Mene, Mene, Tekel
  - type: text
    content: ', and '
  - type: heading
    content: Parsin
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'This is what these words mean:'
  - type: text
    content: Mene
  - type: text
    content: ' means ‘numbered’—God has numbered the days of your reign and has brought it to an end.'
  '27':
  - type: text
    content: ' '
  - type: text
    content: Tekel
  - type: text
    content: ' means ‘weighed’—you have been weighed on the balances and have not measured up.'
  '28':
  - type: text
    content: ' '
  - type: text
    content: Parsin
  - type: text
    content: ' '
  - type: note
    content: Aramaic Peres, the singular of Parsin.
  - type: text
    content: means ‘divided’—your kingdom has been divided and given to the Medes and Persians.”
  '29':
  - type: text
    content: Then at Belshazzar’s command, Daniel was dressed in purple robes, a gold chain was hung around his neck, and he was proclaimed the third highest ruler in the kingdom.
  '3':
  - type: text
    content: 'So they brought these gold cups taken from the Temple, the house of God in Jerusalem, and the king and his nobles, his wives, and his concubines drank from them. '
  '30':
  - type: text
    content: That very night Belshazzar, the Babylonian
  - type: note
    content: Or Chaldean.
  - type: text
    content: ' king, was killed.'
  - type: note
    content: The Persians and Medes conquered Babylon in October 539 b.c.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Verse 5:31 is numbered 6:1 in Aramaic text.
  - type: text
    content: And Darius the Mede took over the kingdom at the age of sixty-two.
  '4':
  - type: text
    content: While they drank from them they praised their idols made of gold, silver, bronze, iron, wood, and stone.
  '5':
  - type: text
    content: 'Suddenly, they saw the fingers of a human hand writing on the plaster wall of the king’s palace, near the lampstand. The king himself saw the hand as it wrote, '
  '6':
  - type: text
    content: and his face turned pale with fright. His knees knocked together in fear and his legs gave way beneath him.
  '7':
  - type: text
    content: The king shouted for the enchanters, astrologers,
  - type: note
    content: Or Chaldeans; also in 5:11.
  - type: text
    content: ' and fortune-tellers to be brought before him. He said to these wise men of Babylon, “Whoever can read this writing and tell me what it means will be dressed in purple robes of royal honor and will have a gold chain placed around his neck. He will become the third highest ruler in the kingdom!”'
  '8':
  - type: text
    content: 'But when all the king’s wise men had come in, none of them could read the writing or tell him what it meant. '
  '9':
  - type: text
    content: So the king grew even more alarmed, and his face turned pale. His nobles, too, were shaken.
