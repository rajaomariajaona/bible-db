document_id: PSA.148,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ' from the heavens!'
  - type: text
    content: Praise him from the skies!
  '10':
  - type: text
    content: wild animals and all livestock,
  - type: text
    content: small scurrying animals and birds,
  '11':
  - type: text
    content: kings of the earth and all people,
  - type: text
    content: rulers and judges of the earth,
  '12':
  - type: text
    content: young men and young women,
  - type: text
    content: old men and children.
  '13':
  - type: text
    content: 'Let them all praise the name of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: For his name is very great;
  - type: text
    content: his glory towers over the earth and heaven!
  '14':
  - type: text
    content: He has made his people strong,
  - type: text
    content: honoring his faithful ones—
  - type: text
    content: the people of Israel who are close to him.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '2':
  - type: text
    content: Praise him, all his angels!
  - type: text
    content: Praise him, all the armies of heaven!
  '3':
  - type: text
    content: Praise him, sun and moon!
  - type: text
    content: Praise him, all you twinkling stars!
  '4':
  - type: text
    content: Praise him, skies above!
  - type: text
    content: Praise him, vapors high above the clouds!
  '5':
  - type: text
    content: 'Let every created thing give praise to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for he issued his command, and they came into being.
  '6':
  - type: text
    content: He set them in place forever and ever.
  - type: text
    content: His decree will never be revoked.
  '7':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ' from the earth,'
  - type: text
    content: you creatures of the ocean depths,
  '8':
  - type: text
    content: fire and hail, snow and clouds,
  - type: note
    content: Or mist, or smoke.
  - type: text
    content: wind and weather that obey him,
  '9':
  - type: text
    content: mountains and all hills,
  - type: text
    content: fruit trees and all cedars,
