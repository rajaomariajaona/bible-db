document_id: GEN.44,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph’s Silver Cup
  - type: text
    content: 'When his brothers were ready to leave, Joseph gave these instructions to his palace manager: “Fill each of their sacks with as much grain as they can carry, and put each man’s money back into his sack. '
  '10':
  - type: text
    content: “That’s fair,” the man replied. “But only the one who stole the cup will be my slave. The rest of you may go free.”
  '11':
  - type: text
    content: 'They all quickly took their sacks from the backs of their donkeys and opened them. '
  '12':
  - type: text
    content: 'The palace manager searched the brothers’ sacks, from the oldest to the youngest. And the cup was found in Benjamin’s sack! '
  '13':
  - type: text
    content: When the brothers saw this, they tore their clothing in despair. Then they loaded their donkeys again and returned to the city.
  '14':
  - type: text
    content: 'Joseph was still in his palace when Judah and his brothers arrived, and they fell to the ground before him. '
  '15':
  - type: text
    content: “What have you done?” Joseph demanded. “Don’t you know that a man like me can predict the future?”
  '16':
  - type: text
    content: Judah answered, “Oh, my lord, what can we say to you? How can we explain this? How can we prove our innocence? God is punishing us for our sins. My lord, we have all returned to be your slaves—all of us, not just our brother who had your cup in his sack.”
  '17':
  - type: text
    content: “No,” Joseph said. “I would never do such a thing! Only the man who stole the cup will be my slave. The rest of you may go back to your father in peace.”
  - type: heading
    content: Judah Speaks for His Brothers
  '18':
  - type: text
    content: Then Judah stepped forward and said, “Please, my lord, let your servant say just one word to you. Please, do not be angry with me, even though you are as powerful as Pharaoh himself.
  '19':
  - type: text
    content: '“My lord, previously you asked us, your servants, ‘Do you have a father or a brother?’ '
  '2':
  - type: text
    content: Then put my personal silver cup at the top of the youngest brother’s sack, along with the money for his grain.” So the manager did as Joseph instructed him.
  '20':
  - type: text
    content: And we responded, ‘Yes, my lord, we have a father who is an old man, and his youngest son is a child of his old age. His full brother is dead, and he alone is left of his mother’s children, and his father loves him very much.’
  '21':
  - type: text
    content: '“And you said to us, ‘Bring him here so I can see him with my own eyes.’ '
  '22':
  - type: text
    content: 'But we said to you, ‘My lord, the boy cannot leave his father, for his father would die.’ '
  '23':
  - type: text
    content: But you told us, ‘Unless your youngest brother comes with you, you will never see my face again.’
  '24':
  - type: text
    content: '“So we returned to your servant, our father, and told him what you had said. '
  '25':
  - type: text
    content: 'Later, when he said, ‘Go back again and buy us more food,’ '
  '26':
  - type: text
    content: we replied, ‘We can’t go unless you let our youngest brother go with us. We’ll never get to see the man’s face unless our youngest brother is with us.’
  '27':
  - type: text
    content: '“Then my father said to us, ‘As you know, my wife had two sons, '
  '28':
  - type: text
    content: 'and one of them went away and never returned. Doubtless he was torn to pieces by some wild animal. I have never seen him since. '
  '29':
  - type: text
    content: Now if you take his brother away from me, and any harm comes to him, you will send this grieving, white-haired man to his grave.
  - type: note
    content: Hebrew to Sheol; also in 44:31.
  - type: text
    content: ’
  '3':
  - type: text
    content: 'The brothers were up at dawn and were sent on their journey with their loaded donkeys. '
  '30':
  - type: text
    content: '“And now, my lord, I cannot go back to my father without the boy. Our father’s life is bound up in the boy’s life. '
  '31':
  - type: text
    content: 'If he sees that the boy is not with us, our father will die. We, your servants, will indeed be responsible for sending that grieving, white-haired man to his grave. '
  '32':
  - type: text
    content: My lord, I guaranteed to my father that I would take care of the boy. I told him, ‘If I don’t bring him back to you, I will bear the blame forever.’
  '33':
  - type: text
    content: '“So please, my lord, let me stay here as a slave instead of the boy, and let the boy return with his brothers. '
  '34':
  - type: text
    content: For how can I return to my father if the boy is not with me? I couldn’t bear to see the anguish this would cause my father!”
  '4':
  - type: text
    content: 'But when they had gone only a short distance and were barely out of the city, Joseph said to his palace manager, “Chase after them and stop them. When you catch up with them, ask them, ‘Why have you repaid my kindness with such evil? '
  '5':
  - type: text
    content: Why have you stolen my master’s silver cup,
  - type: note
    content: As in Greek version; Hebrew lacks this phrase.
  - type: text
    content: ' which he uses to predict the future? What a wicked thing you have done!’”'
  '6':
  - type: text
    content: When the palace manager caught up with the men, he spoke to them as he had been instructed.
  '7':
  - type: text
    content: '“What are you talking about?” the brothers responded. “We are your servants and would never do such a thing! '
  '8':
  - type: text
    content: 'Didn’t we return the money we found in our sacks? We brought it back all the way from the land of Canaan. Why would we steal silver or gold from your master’s house? '
  '9':
  - type: text
    content: If you find his cup with any one of us, let that man die. And all the rest of us, my lord, will be your slaves.”
