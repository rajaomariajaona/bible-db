document_id: 1CH.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David’s Palace and Family
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then King Hiram of Tyre sent messengers to David, along with cedar timber, and stonemasons and carpenters to build him a palace. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And David realized that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had confirmed him as king over Israel and had greatly blessed his kingdom for the sake of his people Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then David married more wives in Jerusalem, and they had more sons and daughters. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'These are the names of David’s sons who were born in Jerusalem: Shammua, Shobab, Nathan, Solomon, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ibhar, Elishua, Elpelet, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nogah, Nepheg, Japhia, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Elishama, Eliada,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beeliada, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Eliada; compare 3:8 and parallel text at 2 Sam 5:16.
    marker-yv: yv-n
  - type: text
    text: ' and Eliphelet.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Conquers the Philistines
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When the Philistines heard that David had been anointed king over all Israel, they mobilized all their forces to capture him. But David was told they were coming, so he marched out to meet them. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The Philistines arrived and made a raid in the valley of Rephaim. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So David asked God, “Should I go out to fight the Philistines? Will you hand them over to me?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' replied, “Yes, go ahead. I will hand them over to you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So David and his troops went up to Baal-perazim and defeated the Philistines there. “God did it!” David exclaimed. “He used me to burst through my enemies like a raging flood!” So they named that place Baal-perazim (which means “the Lord who bursts through”). '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The Philistines had abandoned their gods there, so David gave orders to burn them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But after a while the Philistines returned and raided the valley again. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And once again David asked God what to do. “Do not attack them straight on,” God replied. “Instead, circle around behind and attack them near the poplar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'aspen, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'balsam; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 14:15. The exact identification of this tree is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' trees. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When you hear a sound like marching feet in the tops of the poplar trees, go out and attack! That will be the signal that God is moving ahead of you to strike down the Philistine army.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So David did what God commanded, and they struck down the Philistine army all the way from Gibeon to Gezer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So David’s fame spread everywhere, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' caused all the nations to fear David.'
