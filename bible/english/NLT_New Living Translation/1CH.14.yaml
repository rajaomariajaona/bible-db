document_id: 1CH.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Palace and Family
  - type: text
    content: 'Then King Hiram of Tyre sent messengers to David, along with cedar timber, and stonemasons and carpenters to build him a palace. '
  '10':
  - type: text
    content: So David asked God, “Should I go out to fight the Philistines? Will you hand them over to me?”
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “Yes, go ahead. I will hand them over to you.”'
  '11':
  - type: text
    content: 'So David and his troops went up to Baal-perazim and defeated the Philistines there. “God did it!” David exclaimed. “He used me to burst through my enemies like a raging flood!” So they named that place Baal-perazim (which means “the Lord who bursts through”). '
  '12':
  - type: text
    content: The Philistines had abandoned their gods there, so David gave orders to burn them.
  '13':
  - type: text
    content: 'But after a while the Philistines returned and raided the valley again. '
  '14':
  - type: text
    content: And once again David asked God what to do. “Do not attack them straight on,” God replied. “Instead, circle around behind and attack them near the poplar
  - type: note
    content: Or aspen, or balsam; also in 14:15. The exact identification of this tree is uncertain.
  - type: text
    content: ' trees. '
  '15':
  - type: text
    content: 'When you hear a sound like marching feet in the tops of the poplar trees, go out and attack! That will be the signal that God is moving ahead of you to strike down the Philistine army.” '
  '16':
  - type: text
    content: So David did what God commanded, and they struck down the Philistine army all the way from Gibeon to Gezer.
  '17':
  - type: text
    content: 'So David’s fame spread everywhere, and the '
  - type: text
    content: Lord
  - type: text
    content: ' caused all the nations to fear David.'
  '2':
  - type: text
    content: 'And David realized that the '
  - type: text
    content: Lord
  - type: text
    content: ' had confirmed him as king over Israel and had greatly blessed his kingdom for the sake of his people Israel.'
  '3':
  - type: text
    content: 'Then David married more wives in Jerusalem, and they had more sons and daughters. '
  '4':
  - type: text
    content: 'These are the names of David’s sons who were born in Jerusalem: Shammua, Shobab, Nathan, Solomon, '
  '5':
  - type: text
    content: 'Ibhar, Elishua, Elpelet, '
  '6':
  - type: text
    content: 'Nogah, Nepheg, Japhia, '
  '7':
  - type: text
    content: Elishama, Eliada,
  - type: note
    content: Hebrew Beeliada, a variant spelling of Eliada; compare 3:8 and parallel text at 2 Sam 5:16.
  - type: text
    content: ' and Eliphelet.'
  - type: heading
    content: David Conquers the Philistines
  '8':
  - type: text
    content: 'When the Philistines heard that David had been anointed king over all Israel, they mobilized all their forces to capture him. But David was told they were coming, so he marched out to meet them. '
  '9':
  - type: text
    content: 'The Philistines arrived and made a raid in the valley of Rephaim. '
