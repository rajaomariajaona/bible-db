document_id: 2CH.32,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Assyria Invades Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After Hezekiah had faithfully carried out this work, King Sennacherib of Assyria invaded Judah. He laid siege to the fortified towns, giving orders for his army to break through their walls. '
  '10':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“This is what King Sennacherib of Assyria says: What are you trusting in that makes you think you can survive my siege of Jerusalem? '
  '11':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hezekiah has said, ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God will rescue us from the king of Assyria.’ Surely Hezekiah is misleading you, sentencing you to death by famine and thirst! '
  '12':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Don’t you realize that Hezekiah is the very person who destroyed all the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s shrines and altars? He commanded Judah and Jerusalem to worship only at the altar at the Temple and to offer sacrifices on it alone.
  '13':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“Surely you must realize what I and the other kings of Assyria before me have done to all the people of the earth! Were any of the gods of those nations able to rescue their people from my power? '
  '14':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Which of their gods was able to rescue its people from the destructive power of my predecessors? What makes you think your God can rescue you from me? '
  '15':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Don’t let Hezekiah deceive you! Don’t let him fool you like this! I say it again—no god of any nation or kingdom has ever yet been able to rescue his people from me or my ancestors. How much less will your God rescue you from my power!”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And Sennacherib’s officers further mocked the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God and his servant Hezekiah, heaping insult upon insult. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The king also sent letters scorning the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel. He wrote, “Just as the gods of all the other nations failed to rescue their people from my power, so the God of Hezekiah will also fail.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The Assyrian officials who brought the letters shouted this in Hebrew
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in the dialect of Judah.
      marker-yv: yv-n
    - type: text
      text: ' to the people gathered on the walls of the city, trying to terrify them so it would be easier to capture the city. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: These officers talked about the God of Jerusalem as though he were one of the pagan gods, made by human hands.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'When Hezekiah realized that Sennacherib also intended to attack Jerusalem, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then King Hezekiah and the prophet Isaiah son of Amoz cried out in prayer to God in heaven. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent an angel who destroyed the Assyrian army with all its commanders and officers. So Sennacherib was forced to return home in disgrace to his own land. And when he entered the temple of his god, some of his own sons killed him there with a sword.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'That is how the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rescued Hezekiah and the people of Jerusalem from King Sennacherib of Assyria and from all the others who threatened them. So there was peace throughout the land. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'From then on King Hezekiah became highly respected among all the surrounding nations, and many gifts for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' arrived at Jerusalem, with valuable presents for King Hezekiah, too.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hezekiah’s Sickness and Recovery
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'About that time Hezekiah became deathly ill. He prayed to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who healed him and gave him a miraculous sign. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But Hezekiah did not respond appropriately to the kindness shown him, and he became proud. So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anger came against him and against Judah and Jerusalem. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Then Hezekiah humbled himself and repented of his pride, as did the people of Jerusalem. So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger did not fall on them during Hezekiah’s lifetime.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Hezekiah was very wealthy and highly honored. He built special treasury buildings for his silver, gold, precious stones, and spices, and for his shields and other valuable items. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'He also constructed many storehouses for his grain, new wine, and olive oil; and he made many stalls for his cattle and pens for his flocks of sheep and goats. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'He built many towns and acquired vast flocks and herds, for God had given him great wealth. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'he consulted with his officials and military advisers, and they decided to stop the flow of the springs outside the city. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: He blocked up the upper spring of Gihon and brought the water down through a tunnel to the west side of the City of David. And so he succeeded in everything he did.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: However, when ambassadors arrived from Babylon to ask about the remarkable events that had taken place in the land, God withdrew from Hezekiah in order to test him and to see what was really in his heart.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Summary of Hezekiah’s Reign
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'The rest of the events in Hezekiah’s reign and his acts of devotion are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Vision of the Prophet Isaiah Son of Amoz,
    - type: text
      text: ' which is included in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the Kings of Judah and Israel.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: When Hezekiah died, he was buried in the upper area of the royal cemetery, and all Judah and Jerusalem honored him at his death. And his son Manasseh became the next king.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They organized a huge work crew to stop the flow of the springs, cutting off the brook that ran through the fields. For they said, “Why should the kings of Assyria come here and find plenty of water?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then Hezekiah worked hard at repairing all the broken sections of the wall, erecting towers, and constructing a second wall outside the first. He also reinforced the supporting terraces
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the millo. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' in the City of David and manufactured large numbers of weapons and shields. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'He appointed military officers over the people and assembled them before him in the square at the city gate. Then Hezekiah encouraged them by saying: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“Be strong and courageous! Don’t be afraid or discouraged because of the king of Assyria or his mighty army, for there is a power far greater on our side! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He may have a great army, but they are merely men. We have the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God to help us and to fight our battles for us!” Hezekiah’s words greatly encouraged the people.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sennacherib Threatens Jerusalem
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'While King Sennacherib of Assyria was still besieging the town of Lachish, he sent his officers to Jerusalem with this message for Hezekiah and all the people in the city:'
