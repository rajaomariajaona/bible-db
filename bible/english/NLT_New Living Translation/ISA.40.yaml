document_id: ISA.40,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Comfort for God’s People
  - type: text
    content: “Comfort, comfort my people,”
  - type: text
    content: says your God.
  '10':
  - type: text
    content: 'Yes, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' is coming in power.'
  - type: text
    content: He will rule with a powerful arm.
  - type: text
    content: See, he brings his reward with him as he comes.
  '11':
  - type: text
    content: He will feed his flock like a shepherd.
  - type: text
    content: He will carry the lambs in his arms,
  - type: text
    content: holding them close to his heart.
  - type: text
    content: He will gently lead the mother sheep with their young.
  - type: heading
    content: The Lord Has No Equal
  '12':
  - type: text
    content: Who else has held the oceans in his hand?
  - type: text
    content: Who has measured off the heavens with his fingers?
  - type: text
    content: Who else knows the weight of the earth
  - type: text
    content: or has weighed the mountains and hills on a scale?
  '13':
  - type: text
    content: 'Who is able to advise the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: note
    content: Greek version reads Who can know the Lord’s thoughts? Compare Rom 11:34; 1 Cor 2:16.
  - type: text
    content: Who knows enough to give him advice or teach him?
  '14':
  - type: text
    content: 'Has the '
  - type: text
    content: Lord
  - type: text
    content: ' ever needed anyone’s advice?'
  - type: text
    content: Does he need instruction about what is good?
  - type: text
    content: Did someone teach him what is right
  - type: text
    content: or show him the path of justice?
  '15':
  - type: text
    content: No, for all the nations of the world
  - type: text
    content: are but a drop in the bucket.
  - type: text
    content: They are nothing more
  - type: text
    content: than dust on the scales.
  - type: text
    content: He picks up the whole earth
  - type: text
    content: as though it were a grain of sand.
  '16':
  - type: text
    content: All the wood in Lebanon’s forests
  - type: text
    content: and all Lebanon’s animals would not be enough
  - type: text
    content: to make a burnt offering worthy of our God.
  '17':
  - type: text
    content: The nations of the world are worth nothing to him.
  - type: text
    content: In his eyes they count for less than nothing—
  - type: text
    content: mere emptiness and froth.
  '18':
  - type: text
    content: To whom can you compare God?
  - type: text
    content: What image can you find to resemble him?
  '19':
  - type: text
    content: Can he be compared to an idol formed in a mold,
  - type: text
    content: overlaid with gold, and decorated with silver chains?
  '2':
  - type: text
    content: “Speak tenderly to Jerusalem.
  - type: text
    content: Tell her that her sad days are gone
  - type: text
    content: and her sins are pardoned.
  - type: text
    content: 'Yes, the '
  - type: text
    content: Lord
  - type: text
    content: ' has punished her twice over'
  - type: text
    content: for all her sins.”
  '20':
  - type: text
    content: Or if people are too poor for that,
  - type: text
    content: they might at least choose wood that won’t decay
  - type: text
    content: and a skilled craftsman
  - type: text
    content: to carve an image that won’t fall down!
  '21':
  - type: text
    content: Haven’t you heard? Don’t you understand?
  - type: text
    content: Are you deaf to the words of God—
  - type: text
    content: the words he gave before the world began?
  - type: text
    content: Are you so ignorant?
  '22':
  - type: text
    content: God sits above the circle of the earth.
  - type: text
    content: The people below seem like grasshoppers to him!
  - type: text
    content: He spreads out the heavens like a curtain
  - type: text
    content: and makes his tent from them.
  '23':
  - type: text
    content: He judges the great people of the world
  - type: text
    content: and brings them all to nothing.
  '24':
  - type: text
    content: They hardly get started, barely taking root,
  - type: text
    content: when he blows on them and they wither.
  - type: text
    content: The wind carries them off like chaff.
  '25':
  - type: text
    content: “To whom will you compare me?
  - type: text
    content: Who is my equal?” asks the Holy One.
  '26':
  - type: text
    content: Look up into the heavens.
  - type: text
    content: Who created all the stars?
  - type: text
    content: He brings them out like an army, one after another,
  - type: text
    content: calling each by its name.
  - type: text
    content: Because of his great power and incomparable strength,
  - type: text
    content: not a single one is missing.
  '27':
  - type: text
    content: 'O Jacob, how can you say the '
  - type: text
    content: Lord
  - type: text
    content: ' does not see your troubles?'
  - type: text
    content: O Israel, how can you say God ignores your rights?
  '28':
  - type: text
    content: Have you never heard?
  - type: text
    content: Have you never understood?
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is the everlasting God,'
  - type: text
    content: the Creator of all the earth.
  - type: text
    content: He never grows weak or weary.
  - type: text
    content: No one can measure the depths of his understanding.
  '29':
  - type: text
    content: He gives power to the weak
  - type: text
    content: and strength to the powerless.
  '3':
  - type: text
    content: Listen! It’s the voice of someone shouting,
  - type: text
    content: “Clear the way through the wilderness
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Make a straight highway through the wasteland
  - type: text
    content: for our God!
  '30':
  - type: text
    content: Even youths will become weak and tired,
  - type: text
    content: and young men will fall in exhaustion.
  '31':
  - type: text
    content: 'But those who trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' will find new strength.'
  - type: text
    content: They will soar high on wings like eagles.
  - type: text
    content: They will run and not grow weary.
  - type: text
    content: They will walk and not faint.
  '4':
  - type: text
    content: Fill in the valleys,
  - type: text
    content: and level the mountains and hills.
  - type: text
    content: Straighten the curves,
  - type: text
    content: and smooth out the rough places.
  '5':
  - type: text
    content: 'Then the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' will be revealed,'
  - type: text
    content: and all people will see it together.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken!”'
  - type: note
    content: Greek version reads He is a voice shouting in the wilderness, / “Prepare the way for the Lord’s coming! / Clear a road for our God! / Fill in the valleys, / and level the mountains and hills. / And then the glory of the Lord will be revealed, / and all people will see the salvation sent from God. / The Lord has spoken!” Compare Matt 3:3; Mark 1:3; Luke 3:4-6.
  '6':
  - type: text
    content: A voice said, “Shout!”
  - type: text
    content: I asked, “What should I shout?”
  - type: text
    content: “Shout that people are like the grass.
  - type: text
    content: Their beauty fades as quickly
  - type: text
    content: as the flowers in a field.
  '7':
  - type: text
    content: The grass withers and the flowers fade
  - type: text
    content: 'beneath the breath of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: And so it is with people.
  '8':
  - type: text
    content: The grass withers and the flowers fade,
  - type: text
    content: but the word of our God stands forever.”
  '9':
  - type: text
    content: O Zion, messenger of good news,
  - type: text
    content: shout from the mountaintops!
  - type: text
    content: Shout it louder, O Jerusalem.
  - type: note
    content: Or O messenger of good news, shout to Zion from the mountaintops! Shout it louder to Jerusalem.
  - type: text
    content: Shout, and do not be afraid.
  - type: text
    content: Tell the towns of Judah,
  - type: text
    content: “Your God is coming!”
