document_id: ISA.40
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Comfort for God’s People
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Comfort, comfort my people,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: says your God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Speak tenderly to Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell her that her sad days are gone
- type: usfm
  marker: q2
  children:
  - type: text
    text: and her sins are pardoned.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yes, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has punished her twice over'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all her sins.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Listen! It’s the voice of someone shouting,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Clear the way through the wilderness
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make a straight highway through the wasteland
- type: usfm
  marker: q2
  children:
  - type: text
    text: for our God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fill in the valleys,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and level the mountains and hills.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Straighten the curves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and smooth out the rough places.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be revealed,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all people will see it together.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken!”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:3-5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'He is a voice shouting in the wilderness, / “Prepare the way for the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: '’s coming! / Clear a road for our God! / Fill in the valleys, / and level the mountains and hills. / And then the glory of the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' will be revealed, / and all people will see the salvation sent from God. / The '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' has spoken!” '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Matt 3:3; Mark 1:3; Luke 3:4-6.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A voice said, “Shout!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: I asked, “What should I shout?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Shout that people are like the grass.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their beauty fades as quickly
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the flowers in a field.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The grass withers and the flowers fade
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'beneath the breath of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: And so it is with people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The grass withers and the flowers fade,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the word of our God stands forever.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: O Zion, messenger of good news,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shout from the mountaintops!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shout it louder, O Jerusalem.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: O messenger of good news, shout to Zion from the mountaintops! Shout it louder to Jerusalem.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shout, and do not be afraid.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell the towns of Judah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Your God is coming!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Yes, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is coming in power.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will rule with a powerful arm.
- type: usfm
  marker: q2
  children:
  - type: text
    text: See, he brings his reward with him as he comes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He will feed his flock like a shepherd.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will carry the lambs in his arms,
- type: usfm
  marker: q1
  children:
  - type: text
    text: holding them close to his heart.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will gently lead the mother sheep with their young.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Has No Equal'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Who else has held the oceans in his hand?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who has measured off the heavens with his fingers?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who else knows the weight of the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: or has weighed the mountains and hills on a scale?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Who is able to advise the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '?'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Who can know the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: '’s thoughts? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Rom 11:34; 1 Cor 2:16.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who knows enough to give him advice or teach him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Has the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' ever needed anyone’s advice?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Does he need instruction about what is good?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Did someone teach him what is right
- type: usfm
  marker: q2
  children:
  - type: text
    text: or show him the path of justice?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: No, for all the nations of the world
- type: usfm
  marker: q2
  children:
  - type: text
    text: are but a drop in the bucket.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are nothing more
- type: usfm
  marker: q2
  children:
  - type: text
    text: than dust on the scales.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He picks up the whole earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: as though it were a grain of sand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: All the wood in Lebanon’s forests
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all Lebanon’s animals would not be enough
- type: usfm
  marker: q2
  children:
  - type: text
    text: to make a burnt offering worthy of our God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The nations of the world are worth nothing to him.
- type: usfm
  marker: q2
  children:
  - type: text
    text: In his eyes they count for less than nothing—
- type: usfm
  marker: q2
  children:
  - type: text
    text: mere emptiness and froth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: To whom can you compare God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What image can you find to resemble him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Can he be compared to an idol formed in a mold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: overlaid with gold, and decorated with silver chains?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Or if people are too poor for that,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they might at least choose wood that won’t decay
- type: usfm
  marker: q1
  children:
  - type: text
    text: and a skilled craftsman
- type: usfm
  marker: q2
  children:
  - type: text
    text: to carve an image that won’t fall down!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Haven’t you heard? Don’t you understand?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Are you deaf to the words of God—
- type: usfm
  marker: q1
  children:
  - type: text
    text: the words he gave before the world began?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Are you so ignorant?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: God sits above the circle of the earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The people below seem like grasshoppers to him!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He spreads out the heavens like a curtain
- type: usfm
  marker: q2
  children:
  - type: text
    text: and makes his tent from them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He judges the great people of the world
- type: usfm
  marker: q2
  children:
  - type: text
    text: and brings them all to nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: They hardly get started, barely taking root,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he blows on them and they wither.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The wind carries them off like chaff.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “To whom will you compare me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who is my equal?” asks the Holy One.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Look up into the heavens.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who created all the stars?
- type: usfm
  marker: q1
  children:
  - type: text
    text: He brings them out like an army, one after another,
- type: usfm
  marker: q2
  children:
  - type: text
    text: calling each by its name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of his great power and incomparable strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not a single one is missing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'O Jacob, how can you say the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' does not see your troubles?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: O Israel, how can you say God ignores your rights?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Have you never heard?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have you never understood?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is the everlasting God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Creator of all the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He never grows weak or weary.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No one can measure the depths of his understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: He gives power to the weak
- type: usfm
  marker: q2
  children:
  - type: text
    text: and strength to the powerless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Even youths will become weak and tired,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and young men will fall in exhaustion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'But those who trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will find new strength.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will soar high on wings like eagles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will run and not grow weary.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will walk and not faint.
