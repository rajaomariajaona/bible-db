document_id: JOS.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Israelites Cross the Jordan
  - type: text
    content: Early the next morning Joshua and all the Israelites left Acacia Grove
  - type: note
    content: Hebrew Shittim.
  - type: text
    content: ' and arrived at the banks of the Jordan River, where they camped before crossing. '
  '10':
  - type: text
    content: 'Today you will know that the living God is among you. He will surely drive out the Canaanites, Hittites, Hivites, Perizzites, Girgashites, Amorites, and Jebusites ahead of you. '
  '11':
  - type: text
    content: 'Look, the Ark of the Covenant, which belongs to the Lord of the whole earth, will lead you across the Jordan River! '
  '12':
  - type: text
    content: 'Now choose twelve men from the tribes of Israel, one from each tribe. '
  '13':
  - type: text
    content: 'The priests will carry the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', the Lord of all the earth. As soon as their feet touch the water, the flow of water will be cut off upstream, and the river will stand up like a wall.”'
  '14':
  - type: text
    content: 'So the people left their camp to cross the Jordan, and the priests who were carrying the Ark of the Covenant went ahead of them. '
  '15':
  - type: text
    content: 'It was the harvest season, and the Jordan was overflowing its banks. But as soon as the feet of the priests who were carrying the Ark touched the water at the river’s edge, '
  '16':
  - type: text
    content: the water above that point began backing up a great distance away at a town called Adam, which is near Zarethan. And the water below that point flowed on to the Dead Sea
  - type: note
    content: Hebrew the sea of the Arabah, the Salt Sea.
  - type: text
    content: ' until the riverbed was dry. Then all the people crossed over near the town of Jericho.'
  '17':
  - type: text
    content: 'Meanwhile, the priests who were carrying the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Covenant stood on dry ground in the middle of the riverbed as the people passed by. They waited there until the whole nation of Israel had crossed the Jordan on dry ground.
  '2':
  - type: text
    content: 'Three days later the Israelite officers went through the camp, '
  '3':
  - type: text
    content: 'giving these instructions to the people: “When you see the Levitical priests carrying the Ark of the Covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, move out from your positions and follow them. '
  '4':
  - type: text
    content: Since you have never traveled this way before, they will guide you. Stay about half a mile
  - type: note
    content: Hebrew about 2,000 cubits [920 meters].
  - type: text
    content: ' behind them, keeping a clear distance between you and the Ark. Make sure you don’t come any closer.”'
  '5':
  - type: text
    content: 'Then Joshua told the people, “Purify yourselves, for tomorrow the '
  - type: text
    content: Lord
  - type: text
    content: ' will do great wonders among you.”'
  '6':
  - type: text
    content: In the morning Joshua said to the priests, “Lift up the Ark of the Covenant and lead the people across the river.” And so they started out and went ahead of the people.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' told Joshua, “Today I will begin to make you a great leader in the eyes of all the Israelites. They will know that I am with you, just as I was with Moses. '
  '8':
  - type: text
    content: 'Give this command to the priests who carry the Ark of the Covenant: ‘When you reach the banks of the Jordan River, take a few steps into the river and stop there.’”'
  '9':
  - type: text
    content: 'So Joshua told the Israelites, “Come and listen to what the '
  - type: text
    content: Lord
  - type: text
    content: ' your God says. '
