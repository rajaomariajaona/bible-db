document_id: JOS.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Israelites Cross the Jordan
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Early the next morning Joshua and all the Israelites left Acacia Grove
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shittim.
    marker-yv: yv-n
  - type: text
    text: ' and arrived at the banks of the Jordan River, where they camped before crossing. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Three days later the Israelite officers went through the camp, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'giving these instructions to the people: “When you see the Levitical priests carrying the Ark of the Covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, move out from your positions and follow them. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Since you have never traveled this way before, they will guide you. Stay about half a mile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'about 2,000 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[920 meters].'
    marker-yv: yv-n
  - type: text
    text: ' behind them, keeping a clear distance between you and the Ark. Make sure you don’t come any closer.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Joshua told the people, “Purify yourselves, for tomorrow the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will do great wonders among you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: In the morning Joshua said to the priests, “Lift up the Ark of the Covenant and lead the people across the river.” And so they started out and went ahead of the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told Joshua, “Today I will begin to make you a great leader in the eyes of all the Israelites. They will know that I am with you, just as I was with Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Give this command to the priests who carry the Ark of the Covenant: ‘When you reach the banks of the Jordan River, take a few steps into the river and stop there.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So Joshua told the Israelites, “Come and listen to what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God says. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Today you will know that the living God is among you. He will surely drive out the Canaanites, Hittites, Hivites, Perizzites, Girgashites, Amorites, and Jebusites ahead of you. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Look, the Ark of the Covenant, which belongs to the Lord of the whole earth, will lead you across the Jordan River! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now choose twelve men from the tribes of Israel, one from each tribe. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The priests will carry the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the Lord of all the earth. As soon as their feet touch the water, the flow of water will be cut off upstream, and the river will stand up like a wall.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So the people left their camp to cross the Jordan, and the priests who were carrying the Ark of the Covenant went ahead of them. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'It was the harvest season, and the Jordan was overflowing its banks. But as soon as the feet of the priests who were carrying the Ark touched the water at the river’s edge, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: the water above that point began backing up a great distance away at a town called Adam, which is near Zarethan. And the water below that point flowed on to the Dead Sea
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the sea of the Arabah, the Salt Sea.
    marker-yv: yv-n
  - type: text
    text: ' until the riverbed was dry. Then all the people crossed over near the town of Jericho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Meanwhile, the priests who were carrying the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Covenant stood on dry ground in the middle of the riverbed as the people passed by. They waited there until the whole nation of Israel had crossed the Jordan on dry ground.
