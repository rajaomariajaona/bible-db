document_id: ISA.63
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Judgment against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Enemies
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Who is this who comes from Edom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the city of Bozrah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with his clothing stained red?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who is this in royal robes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: marching in his great strength?
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“It is I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', announcing your salvation!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'It is I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who has the power to save!”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Why are your clothes so red,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as if you have been treading out grapes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “I have been treading the winepress alone;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one was there to help me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In my anger I have trampled my enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: as if they were grapes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In my fury I have trampled my foes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their blood has stained my clothes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For the time has come for me to avenge my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to ransom them from their oppressors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I was amazed to see that no one intervened
- type: usfm
  marker: q2
  children:
  - type: text
    text: to help the oppressed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I myself stepped in to save them with my strong arm,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my wrath sustained me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I crushed the nations in my anger
- type: usfm
  marker: q2
  children:
  - type: text
    text: and made them stagger and fall to the ground,
- type: usfm
  marker: q2
  children:
  - type: text
    text: spilling their blood upon the earth.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Praise for Deliverance
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I will tell of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s unfailing love.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I will praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for all he has done.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will rejoice in his great goodness to Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: which he has granted according to his mercy and love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He said, “They are my very own people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Surely they will not betray me again.”
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he became their Savior.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: In all their suffering he also suffered,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he personally
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '63:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and the angel of his presence.
    marker-yv: yv-n
  - type: text
    text: ' rescued them.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In his love and mercy he redeemed them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He lifted them up and carried them
- type: usfm
  marker: q2
  children:
  - type: text
    text: through all the years.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But they rebelled against him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and grieved his Holy Spirit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So he became their enemy
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fought against them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then they remembered those days of old
- type: usfm
  marker: q2
  children:
  - type: text
    text: when Moses led his people out of Egypt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cried out, “Where is the one who brought Israel through the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with Moses as their shepherd?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where is the one who sent his Holy Spirit
- type: usfm
  marker: q2
  children:
  - type: text
    text: to be among his people?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Where is the one whose power was displayed
- type: usfm
  marker: q2
  children:
  - type: text
    text: when Moses lifted up his hand—
- type: usfm
  marker: q1
  children:
  - type: text
    text: the one who divided the sea before them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: making himself famous forever?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Where is the one who led them through the bottom of the sea?
- type: usfm
  marker: q2
  children:
  - type: text
    text: They were like fine stallions
- type: usfm
  marker: q2
  children:
  - type: text
    text: racing through the desert, never stumbling.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: As with cattle going down into a peaceful valley,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave them rest.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You led your people, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gained a magnificent reputation.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prayer for Mercy and Pardon
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', look down from heaven;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: look from your holy, glorious home, and see us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where is the passion and the might
- type: usfm
  marker: q2
  children:
  - type: text
    text: you used to show on our behalf?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where are your mercy and compassion now?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Surely you are still our Father!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even if Abraham and Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '63:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Israel. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note on 14:1.
    marker-yv: yv-n
  - type: text
    text: ' would disown us,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you would still be our Father.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are our Redeemer from ages past.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', why have you allowed us to turn from your path?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why have you given us stubborn hearts so we no longer fear you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Return and help us, for we are your servants,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the tribes that are your special possession.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: How briefly your holy people possessed your holy place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and now our enemies have destroyed it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Sometimes it seems as though we never belonged to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as though we had never been known as your people.
