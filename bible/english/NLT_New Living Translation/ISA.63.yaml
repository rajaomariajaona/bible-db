document_id: ISA.63,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment against the Lord’s Enemies
  - type: text
    content: Who is this who comes from Edom,
  - type: text
    content: from the city of Bozrah,
  - type: text
    content: with his clothing stained red?
  - type: text
    content: Who is this in royal robes,
  - type: text
    content: marching in his great strength?
  - type: text
    content: '“It is I, the '
  - type: text
    content: Lord
  - type: text
    content: ', announcing your salvation!'
  - type: text
    content: 'It is I, the '
  - type: text
    content: Lord
  - type: text
    content: ', who has the power to save!”'
  '10':
  - type: text
    content: But they rebelled against him
  - type: text
    content: and grieved his Holy Spirit.
  - type: text
    content: So he became their enemy
  - type: text
    content: and fought against them.
  '11':
  - type: text
    content: Then they remembered those days of old
  - type: text
    content: when Moses led his people out of Egypt.
  - type: text
    content: They cried out, “Where is the one who brought Israel through the sea,
  - type: text
    content: with Moses as their shepherd?
  - type: text
    content: Where is the one who sent his Holy Spirit
  - type: text
    content: to be among his people?
  '12':
  - type: text
    content: Where is the one whose power was displayed
  - type: text
    content: when Moses lifted up his hand—
  - type: text
    content: the one who divided the sea before them,
  - type: text
    content: making himself famous forever?
  '13':
  - type: text
    content: Where is the one who led them through the bottom of the sea?
  - type: text
    content: They were like fine stallions
  - type: text
    content: racing through the desert, never stumbling.
  '14':
  - type: text
    content: As with cattle going down into a peaceful valley,
  - type: text
    content: 'the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them rest.'
  - type: text
    content: 'You led your people, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and gained a magnificent reputation.”
  - type: heading
    content: Prayer for Mercy and Pardon
  '15':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', look down from heaven;'
  - type: text
    content: look from your holy, glorious home, and see us.
  - type: text
    content: Where is the passion and the might
  - type: text
    content: you used to show on our behalf?
  - type: text
    content: Where are your mercy and compassion now?
  '16':
  - type: text
    content: Surely you are still our Father!
  - type: text
    content: Even if Abraham and Jacob
  - type: note
    content: Hebrew Israel. See note on 14:1.
  - type: text
    content: ' would disown us,'
  - type: text
    content: Lord
  - type: text
    content: ', you would still be our Father.'
  - type: text
    content: You are our Redeemer from ages past.
  '17':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', why have you allowed us to turn from your path?'
  - type: text
    content: Why have you given us stubborn hearts so we no longer fear you?
  - type: text
    content: Return and help us, for we are your servants,
  - type: text
    content: the tribes that are your special possession.
  '18':
  - type: text
    content: How briefly your holy people possessed your holy place,
  - type: text
    content: and now our enemies have destroyed it.
  '19':
  - type: text
    content: Sometimes it seems as though we never belonged to you,
  - type: text
    content: as though we had never been known as your people.
  '2':
  - type: text
    content: Why are your clothes so red,
  - type: text
    content: as if you have been treading out grapes?
  '3':
  - type: text
    content: “I have been treading the winepress alone;
  - type: text
    content: no one was there to help me.
  - type: text
    content: In my anger I have trampled my enemies
  - type: text
    content: as if they were grapes.
  - type: text
    content: In my fury I have trampled my foes.
  - type: text
    content: Their blood has stained my clothes.
  '4':
  - type: text
    content: For the time has come for me to avenge my people,
  - type: text
    content: to ransom them from their oppressors.
  '5':
  - type: text
    content: I was amazed to see that no one intervened
  - type: text
    content: to help the oppressed.
  - type: text
    content: So I myself stepped in to save them with my strong arm,
  - type: text
    content: and my wrath sustained me.
  '6':
  - type: text
    content: I crushed the nations in my anger
  - type: text
    content: and made them stagger and fall to the ground,
  - type: text
    content: spilling their blood upon the earth.”
  - type: heading
    content: Praise for Deliverance
  '7':
  - type: text
    content: 'I will tell of the '
  - type: text
    content: Lord
  - type: text
    content: ’s unfailing love.
  - type: text
    content: 'I will praise the '
  - type: text
    content: Lord
  - type: text
    content: ' for all he has done.'
  - type: text
    content: I will rejoice in his great goodness to Israel,
  - type: text
    content: which he has granted according to his mercy and love.
  '8':
  - type: text
    content: He said, “They are my very own people.
  - type: text
    content: Surely they will not betray me again.”
  - type: text
    content: And he became their Savior.
  '9':
  - type: text
    content: In all their suffering he also suffered,
  - type: text
    content: and he personally
  - type: note
    content: Hebrew and the angel of his presence.
  - type: text
    content: ' rescued them.'
  - type: text
    content: In his love and mercy he redeemed them.
  - type: text
    content: He lifted them up and carried them
  - type: text
    content: through all the years.
