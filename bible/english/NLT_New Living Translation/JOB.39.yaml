document_id: JOB.39,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Challenge Continues
  - type: text
    content: “Do you know when the wild goats give birth?
  - type: text
    content: Have you watched as deer are born in the wild?
  '10':
  - type: text
    content: Can you hitch a wild ox to a plow?
  - type: text
    content: Will it plow a field for you?
  '11':
  - type: text
    content: Given its strength, can you trust it?
  - type: text
    content: Can you leave and trust the ox to do your work?
  '12':
  - type: text
    content: Can you rely on it to bring home your grain
  - type: text
    content: and deliver it to your threshing floor?
  '13':
  - type: text
    content: “The ostrich flaps her wings grandly,
  - type: text
    content: but they are no match for the feathers of the stork.
  '14':
  - type: text
    content: She lays her eggs on top of the earth,
  - type: text
    content: letting them be warmed in the dust.
  '15':
  - type: text
    content: She doesn’t worry that a foot might crush them
  - type: text
    content: or a wild animal might destroy them.
  '16':
  - type: text
    content: She is harsh toward her young,
  - type: text
    content: as if they were not her own.
  - type: text
    content: She doesn’t care if they die.
  '17':
  - type: text
    content: For God has deprived her of wisdom.
  - type: text
    content: He has given her no understanding.
  '18':
  - type: text
    content: But whenever she jumps up to run,
  - type: text
    content: she passes the swiftest horse with its rider.
  '19':
  - type: text
    content: “Have you given the horse its strength
  - type: text
    content: or clothed its neck with a flowing mane?
  '2':
  - type: text
    content: Do you know how many months they carry their young?
  - type: text
    content: Are you aware of the time of their delivery?
  '20':
  - type: text
    content: Did you give it the ability to leap like a locust?
  - type: text
    content: Its majestic snorting is terrifying!
  '21':
  - type: text
    content: It paws the earth and rejoices in its strength
  - type: text
    content: when it charges out to battle.
  '22':
  - type: text
    content: It laughs at fear and is unafraid.
  - type: text
    content: It does not run from the sword.
  '23':
  - type: text
    content: The arrows rattle against it,
  - type: text
    content: and the spear and javelin flash.
  '24':
  - type: text
    content: It paws the ground fiercely
  - type: text
    content: and rushes forward into battle when the ram’s horn blows.
  '25':
  - type: text
    content: It snorts at the sound of the horn.
  - type: text
    content: It senses the battle in the distance.
  - type: text
    content: It quivers at the captain’s commands and the noise of battle.
  '26':
  - type: text
    content: “Is it your wisdom that makes the hawk soar
  - type: text
    content: and spread its wings toward the south?
  '27':
  - type: text
    content: Is it at your command that the eagle rises
  - type: text
    content: to the heights to make its nest?
  '28':
  - type: text
    content: It lives on the cliffs,
  - type: text
    content: making its home on a distant, rocky crag.
  '29':
  - type: text
    content: From there it hunts its prey,
  - type: text
    content: keeping watch with piercing eyes.
  '3':
  - type: text
    content: They crouch down to give birth to their young
  - type: text
    content: and deliver their offspring.
  '30':
  - type: text
    content: Its young gulp down blood.
  - type: text
    content: Where there’s a carcass, there you’ll find it.”
  '4':
  - type: text
    content: Their young grow up in the open fields,
  - type: text
    content: then leave home and never return.
  '5':
  - type: text
    content: “Who gives the wild donkey its freedom?
  - type: text
    content: Who untied its ropes?
  '6':
  - type: text
    content: I have placed it in the wilderness;
  - type: text
    content: its home is the wasteland.
  '7':
  - type: text
    content: It hates the noise of the city
  - type: text
    content: and has no driver to shout at it.
  '8':
  - type: text
    content: The mountains are its pastureland,
  - type: text
    content: where it searches for every blade of grass.
  '9':
  - type: text
    content: “Will the wild ox consent to being tamed?
  - type: text
    content: Will it spend the night in your stall?
