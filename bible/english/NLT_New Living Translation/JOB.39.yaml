document_id: JOB.39
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Challenge Continues
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Do you know when the wild goats give birth?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have you watched as deer are born in the wild?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Do you know how many months they carry their young?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Are you aware of the time of their delivery?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They crouch down to give birth to their young
- type: usfm
  marker: q2
  children:
  - type: text
    text: and deliver their offspring.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Their young grow up in the open fields,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then leave home and never return.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Who gives the wild donkey its freedom?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who untied its ropes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I have placed it in the wilderness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: its home is the wasteland.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: It hates the noise of the city
- type: usfm
  marker: q2
  children:
  - type: text
    text: and has no driver to shout at it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The mountains are its pastureland,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where it searches for every blade of grass.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Will the wild ox consent to being tamed?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will it spend the night in your stall?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Can you hitch a wild ox to a plow?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will it plow a field for you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Given its strength, can you trust it?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can you leave and trust the ox to do your work?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Can you rely on it to bring home your grain
- type: usfm
  marker: q2
  children:
  - type: text
    text: and deliver it to your threshing floor?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “The ostrich flaps her wings grandly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they are no match for the feathers of the stork.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: She lays her eggs on top of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: letting them be warmed in the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: She doesn’t worry that a foot might crush them
- type: usfm
  marker: q2
  children:
  - type: text
    text: or a wild animal might destroy them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: She is harsh toward her young,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as if they were not her own.
- type: usfm
  marker: q2
  children:
  - type: text
    text: She doesn’t care if they die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For God has deprived her of wisdom.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has given her no understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But whenever she jumps up to run,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she passes the swiftest horse with its rider.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Have you given the horse its strength
- type: usfm
  marker: q2
  children:
  - type: text
    text: or clothed its neck with a flowing mane?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Did you give it the ability to leap like a locust?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Its majestic snorting is terrifying!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: It paws the earth and rejoices in its strength
- type: usfm
  marker: q2
  children:
  - type: text
    text: when it charges out to battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: It laughs at fear and is unafraid.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It does not run from the sword.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The arrows rattle against it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the spear and javelin flash.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: It paws the ground fiercely
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rushes forward into battle when the ram’s horn blows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: It snorts at the sound of the horn.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It senses the battle in the distance.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It quivers at the captain’s commands and the noise of battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Is it your wisdom that makes the hawk soar
- type: usfm
  marker: q2
  children:
  - type: text
    text: and spread its wings toward the south?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Is it at your command that the eagle rises
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the heights to make its nest?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: It lives on the cliffs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: making its home on a distant, rocky crag.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: From there it hunts its prey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: keeping watch with piercing eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Its young gulp down blood.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where there’s a carcass, there you’ll find it.”
