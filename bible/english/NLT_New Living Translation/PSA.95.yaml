document_id: PSA.95,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Come, let us sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let us shout joyfully to the Rock of our salvation.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For forty years I was angry with them, and I said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘They are a people whose hearts turn away from me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They refuse to do what I tell them.’
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So in my anger I took an oath:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘They will never enter my place of rest.’”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Let us come to him with thanksgiving.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let us sing psalms of praise to him.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is a great God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a great King above all gods.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He holds in his hands the depths of the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the mightiest mountains.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The sea belongs to him, for he made it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His hands formed the dry land, too.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Come, let us worship and bow down.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let us kneel before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our maker,'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: for he is our God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are the people he watches over,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the flock under his care.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If only you would listen to his voice today!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says, “Don’t harden your hearts as Israel did at Meribah,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they did at Massah in the wilderness.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For there your ancestors tested and tried my patience,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even though they saw everything I did.
