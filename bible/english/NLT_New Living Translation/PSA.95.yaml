document_id: PSA.95,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Come, let us sing to the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Let us shout joyfully to the Rock of our salvation.
  '10':
  - type: text
    content: For forty years I was angry with them, and I said,
  - type: text
    content: ‘They are a people whose hearts turn away from me.
  - type: text
    content: They refuse to do what I tell them.’
  '11':
  - type: text
    content: 'So in my anger I took an oath:'
  - type: text
    content: ‘They will never enter my place of rest.’”
  '2':
  - type: text
    content: Let us come to him with thanksgiving.
  - type: text
    content: Let us sing psalms of praise to him.
  '3':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is a great God,'
  - type: text
    content: a great King above all gods.
  '4':
  - type: text
    content: He holds in his hands the depths of the earth
  - type: text
    content: and the mightiest mountains.
  '5':
  - type: text
    content: The sea belongs to him, for he made it.
  - type: text
    content: His hands formed the dry land, too.
  '6':
  - type: text
    content: Come, let us worship and bow down.
  - type: text
    content: 'Let us kneel before the '
  - type: text
    content: Lord
  - type: text
    content: ' our maker,'
  '7':
  - type: text
    content: for he is our God.
  - type: text
    content: We are the people he watches over,
  - type: text
    content: the flock under his care.
  - type: text
    content: If only you would listen to his voice today!
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says, “Don’t harden your hearts as Israel did at Meribah,'
  - type: text
    content: as they did at Massah in the wilderness.
  '9':
  - type: text
    content: For there your ancestors tested and tried my patience,
  - type: text
    content: even though they saw everything I did.
