document_id: LEV.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Sins Requiring a Guilt Offering
  - type: text
    content: ' '
  - type: note
    content: Verses 6:1-7 are numbered 5:20-26 in Hebrew text.
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'In the morning, after the priest on duty has put on his official linen clothing and linen undergarments, he must clean out the ashes of the burnt offering and put them beside the altar. '
  '11':
  - type: text
    content: 'Then he must take off these garments, change back into his regular clothes, and carry the ashes outside the camp to a place that is ceremonially clean. '
  '12':
  - type: text
    content: 'Meanwhile, the fire on the altar must be kept burning; it must never go out. Each morning the priest will add fresh wood to the fire and arrange the burnt offering on it. He will then burn the fat of the peace offerings on it. '
  '13':
  - type: text
    content: Remember, the fire must be kept burning on the altar at all times. It must never go out.
  - type: heading
    content: Further Instructions for the Grain Offering
  '14':
  - type: text
    content: '“These are the instructions regarding the grain offering. Aaron’s sons must present this offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' in front of the altar. '
  '15':
  - type: text
    content: 'The priest on duty will take from the grain offering a handful of the choice flour moistened with olive oil, together with all the frankincense. He will burn this representative portion on the altar as a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: Aaron and his sons may eat the rest of the flour, but it must be baked without yeast and eaten in a sacred place within the courtyard of the Tabernacle.
  - type: note
    content: Hebrew Tent of Meeting; also in 6:26, 30.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Remember, it must never be prepared with yeast. I have given it to the priests as their share of the special gifts presented to me. Like the sin offering and the guilt offering, it is most holy. '
  '18':
  - type: text
    content: 'Any of Aaron’s male descendants may eat from the special gifts presented to the '
  - type: text
    content: Lord
  - type: text
    content: . This is their permanent right from generation to generation. Anyone or anything that touches these offerings will become holy.”
  - type: heading
    content: Procedures for the Ordination Offering
  '19':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '2':
  - type: text
    content: '“Suppose one of you sins against your associate and is unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: '. Suppose you cheat in a deal involving a security deposit, or you steal or commit fraud, '
  '20':
  - type: text
    content: '“On the day Aaron and his sons are anointed, they must present to the '
  - type: text
    content: Lord
  - type: text
    content: ' the standard grain offering of two quarts'
  - type: note
    content: Hebrew 1/10 of an ephah [2.2 liters].
  - type: text
    content: ' of choice flour, half to be offered in the morning and half to be offered in the evening. '
  '21':
  - type: text
    content: It must be carefully mixed with olive oil and cooked on a griddle. Then slice
  - type: note
    content: The meaning of this Hebrew term is uncertain.
  - type: text
    content: ' this grain offering and present it as a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: In each generation, the high priest
  - type: note
    content: Hebrew the anointed priest.
  - type: text
    content: ' who succeeds Aaron must prepare this same offering. It belongs to the '
  - type: text
    content: Lord
  - type: text
    content: ' and must be burned up completely. This is a permanent law. '
  '23':
  - type: text
    content: All such grain offerings of a priest must be burned up entirely. None of it may be eaten.”
  - type: heading
    content: Further Instructions for the Sin Offering
  '24':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '25':
  - type: text
    content: '“Give Aaron and his sons the following instructions regarding the sin offering. The animal given as an offering for sin is a most holy offering, and it must be slaughtered in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence at the place where the burnt offerings are slaughtered. '
  '26':
  - type: text
    content: 'The priest who offers the sacrifice as a sin offering must eat his portion in a sacred place within the courtyard of the Tabernacle. '
  '27':
  - type: text
    content: 'Anyone or anything that touches the sacrificial meat will become holy. If any of the sacrificial blood spatters on a person’s clothing, the soiled garment must be washed in a sacred place. '
  '28':
  - type: text
    content: 'If a clay pot is used to boil the sacrificial meat, it must then be broken. If a bronze pot is used, it must be scoured and thoroughly rinsed with water. '
  '29':
  - type: text
    content: 'Any male from a priest’s family may eat from this offering; it is most holy. '
  '3':
  - type: text
    content: 'or you find lost property and lie about it, or you lie while swearing to tell the truth, or you commit any other such sin. '
  '30':
  - type: text
    content: But the offering for sin may not be eaten if its blood was brought into the Tabernacle as an offering for purification
  - type: note
    content: Or an offering to make atonement.
  - type: text
    content: ' in the Holy Place. It must be completely burned with fire.'
  '4':
  - type: text
    content: 'If you have sinned in any of these ways, you are guilty. You must give back whatever you stole, or the money you took by extortion, or the security deposit, or the lost property you found, '
  '5':
  - type: text
    content: 'or anything obtained by swearing falsely. You must make restitution by paying the full price plus an additional 20 percent to the person you have harmed. On the same day you must present a guilt offering. '
  '6':
  - type: text
    content: 'As a guilt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', you must bring to the priest your own ram with no defects, or you may buy one of equal value. '
  '7':
  - type: text
    content: 'Through this process, the priest will purify you before the '
  - type: text
    content: Lord
  - type: text
    content: ', making you right with him,'
  - type: note
    content: Or will make atonement for you before the Lord.
  - type: text
    content: ' and you will be forgiven for any of these sins you have committed.”'
  - type: heading
    content: Further Instructions for the Burnt Offering
  '8':
  - type: text
    content: ' '
  - type: note
    content: Verses 6:8-30 are numbered 6:1-23 in Hebrew text.
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '9':
  - type: text
    content: '“Give Aaron and his sons the following instructions regarding the burnt offering. The burnt offering must be left on top of the altar until the next morning, and the fire on the altar must be kept burning all night. '
