document_id: JER.44
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judgment for Idolatry
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: This is the message Jeremiah received concerning the Judeans living in northern Egypt in the cities of Migdol, Tahpanhes, and Memphis,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Noph.
    marker-yv: yv-n
  - type: text
    text: ' and in southern Egypt'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in Pathros.
    marker-yv: yv-n
  - type: text
    text: ' as well: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: You saw the calamity I brought on Jerusalem and all the towns of Judah. They now lie deserted and in ruins. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They provoked my anger with all their wickedness. They burned incense and worshiped other gods—gods that neither they nor you nor any of your ancestors had ever even known.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“Again and again I sent my servants, the prophets, to plead with them, ‘Don’t do these horrible things that I hate so much.’ '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But my people would not listen or turn back from their wicked ways. They kept on burning incense to these gods. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And so my fury boiled over and fell like fire on the towns of Judah and into the streets of Jerusalem, and they are still a desolate ruin today.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“And now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Heaven’s Armies, the God of Israel, asks you: Why are you destroying yourselves? For not one of you will survive—not a man, woman, or child among you who has come here from Judah, not even the babies in your arms. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Why provoke my anger by burning incense to the idols you have made here in Egypt? You will only destroy yourselves and make yourselves an object of cursing and mockery for all the nations of the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Have you forgotten the sins of your ancestors, the sins of the kings and queens of Judah, and the sins you and your wives committed in Judah and Jerusalem? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: To this very hour you have shown no remorse or reverence. No one has chosen to follow my word and the decrees I gave to you and your ancestors before you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Therefore, this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: I am determined to destroy every one of you! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I will take this remnant of Judah—those who were determined to come here and live in Egypt—and I will consume them. They will fall here in Egypt, killed by war and famine. All will die, from the least to the greatest. They will be an object of damnation, horror, cursing, and mockery. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I will punish them in Egypt just as I punished them in Jerusalem, by war, famine, and disease. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Of that remnant who fled to Egypt, hoping someday to return to Judah, there will be no survivors. Even though they long to return home, only a handful will do so.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then all the women present and all the men who knew that their wives had burned incense to idols—a great crowd of all the Judeans living in northern Egypt and southern Egypt
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in Egypt, in Pathros.
    marker-yv: yv-n
  - type: text
    text: '—answered Jeremiah, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“We will not listen to your messages from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'We will do whatever we want. We will burn incense and pour out liquid offerings to the Queen of Heaven just as much as we like—just as we, and our ancestors, and our kings and officials have always done in the towns of Judah and in the streets of Jerusalem. For in those days we had plenty to eat, and we were well off and had no troubles! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But ever since we quit burning incense to the Queen of Heaven and stopped worshiping her with liquid offerings, we have been in great trouble and have been dying from war and famine.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Besides,” the women added, “do you suppose that we were burning incense and pouring out liquid offerings to the Queen of Heaven, and making cakes marked with her image, without our husbands knowing it and helping us? Of course not!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Jeremiah said to all of them, men and women alike, who had given him that answer, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“Do you think the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' did not know that you and your ancestors, your kings and officials, and all the people were burning incense to idols in the towns of Judah and in the streets of Jerusalem? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'It was because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' could no longer bear all the disgusting things you were doing that he made your land an object of cursing—a desolate ruin without inhabitants—as it is today. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'All these terrible things happened to you because you have burned incense to idols and sinned against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . You have refused to obey him and have not followed his instructions, his decrees, and his laws.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then Jeremiah said to them all, including the women, “Listen to this message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', all you citizens of Judah who live in Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: ‘You and your wives have said, “We will keep our promises to burn incense and pour out liquid offerings to the Queen of Heaven,” and you have proved by your actions that you meant it. So go ahead and carry out your promises and vows to her!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“But listen to this message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', all you Judeans now living in Egypt: ‘I have sworn by my great name,’ says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', ‘that my name will no longer be spoken by any of the Judeans in the land of Egypt. None of you may invoke my name or use this oath: “As surely as the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lives.” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For I will watch over you to bring you disaster and not good. Everyone from Judah who is now living in Egypt will suffer war and famine until all of you are dead. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Only a small number will escape death and return to Judah from Egypt. Then all those who came to Egypt will find out whose words are true—mine or theirs!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“‘And this is the proof I give you,’ says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', ‘that all I have threatened will happen to you and that I will punish you here.’ '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: ‘I will turn Pharaoh Hophra, king of Egypt, over to his enemies who want to kill him, just as I turned King Zedekiah of Judah over to King Nebuchadnezzar'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nebuchadrezzar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Nebuchadnezzar.
    marker-yv: yv-n
  - type: text
    text: ' of Babylon.’”'
