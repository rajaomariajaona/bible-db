document_id: ECC.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Time for Everything
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: For everything there is a season,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a time for every activity under heaven.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I have seen the burden God has placed on us all. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Yet God has made everything beautiful for its own time. He has planted eternity in the human heart, but even so, people cannot see the whole scope of God’s work from beginning to end. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So I concluded there is nothing better than to be happy and enjoy ourselves as long as we can. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: And people should eat and drink and enjoy the fruits of their labor, for these are gifts from God.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And I know that whatever God does is final. Nothing can be added to it or taken from it. God’s purpose is that people should fear him. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: What is happening now has happened before, and what will happen in the future has happened before, because God makes the same things happen over and over again.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Injustices of Life
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'I also noticed that under the sun there is evil in the courtroom. Yes, even the courts of law are corrupt! '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I said to myself, “In due season God will judge everyone, both good and bad, for all their deeds.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'I also thought about the human condition—how God proves to people that they are like animals. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: For people and animals share the same fate—both breathe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: both have the same spirit.
      marker-yv: yv-n
    - type: text
      text: ' and both must die. So people have no real advantage over the animals. How meaningless! '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: A time to be born and a time to die.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time to plant and a time to harvest.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Both go to the same place—they came from dust and they return to dust. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For who can prove that the human spirit goes up and the spirit of animals goes down into the earth? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: So I saw that there is nothing better for people than to be happy in their work. That is our lot in life. And no one can bring us back to see what happens after we die.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: A time to kill and a time to heal.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time to tear down and a time to build up.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: A time to cry and a time to laugh.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time to grieve and a time to dance.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: A time to scatter stones and a time to gather stones.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time to embrace and a time to turn away.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: A time to search and a time to quit searching.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time to keep and a time to throw away.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: A time to tear and a time to mend.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time to be quiet and a time to speak.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: A time to love and a time to hate.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A time for war and a time for peace.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'What do people really get for all their hard work? '
