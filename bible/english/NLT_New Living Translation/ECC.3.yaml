document_id: ECC.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Time for Everything
  - type: text
    content: For everything there is a season,
  - type: text
    content: a time for every activity under heaven.
  '10':
  - type: text
    content: 'I have seen the burden God has placed on us all. '
  '11':
  - type: text
    content: 'Yet God has made everything beautiful for its own time. He has planted eternity in the human heart, but even so, people cannot see the whole scope of God’s work from beginning to end. '
  '12':
  - type: text
    content: 'So I concluded there is nothing better than to be happy and enjoy ourselves as long as we can. '
  '13':
  - type: text
    content: And people should eat and drink and enjoy the fruits of their labor, for these are gifts from God.
  '14':
  - type: text
    content: 'And I know that whatever God does is final. Nothing can be added to it or taken from it. God’s purpose is that people should fear him. '
  '15':
  - type: text
    content: What is happening now has happened before, and what will happen in the future has happened before, because God makes the same things happen over and over again.
  - type: heading
    content: The Injustices of Life
  '16':
  - type: text
    content: 'I also noticed that under the sun there is evil in the courtroom. Yes, even the courts of law are corrupt! '
  '17':
  - type: text
    content: I said to myself, “In due season God will judge everyone, both good and bad, for all their deeds.”
  '18':
  - type: text
    content: 'I also thought about the human condition—how God proves to people that they are like animals. '
  '19':
  - type: text
    content: For people and animals share the same fate—both breathe
  - type: note
    content: Or both have the same spirit.
  - type: text
    content: ' and both must die. So people have no real advantage over the animals. How meaningless! '
  '2':
  - type: text
    content: A time to be born and a time to die.
  - type: text
    content: A time to plant and a time to harvest.
  '20':
  - type: text
    content: 'Both go to the same place—they came from dust and they return to dust. '
  '21':
  - type: text
    content: 'For who can prove that the human spirit goes up and the spirit of animals goes down into the earth? '
  '22':
  - type: text
    content: So I saw that there is nothing better for people than to be happy in their work. That is our lot in life. And no one can bring us back to see what happens after we die.
  '3':
  - type: text
    content: A time to kill and a time to heal.
  - type: text
    content: A time to tear down and a time to build up.
  '4':
  - type: text
    content: A time to cry and a time to laugh.
  - type: text
    content: A time to grieve and a time to dance.
  '5':
  - type: text
    content: A time to scatter stones and a time to gather stones.
  - type: text
    content: A time to embrace and a time to turn away.
  '6':
  - type: text
    content: A time to search and a time to quit searching.
  - type: text
    content: A time to keep and a time to throw away.
  '7':
  - type: text
    content: A time to tear and a time to mend.
  - type: text
    content: A time to be quiet and a time to speak.
  '8':
  - type: text
    content: A time to love and a time to hate.
  - type: text
    content: A time for war and a time for peace.
  '9':
  - type: text
    content: 'What do people really get for all their hard work? '
