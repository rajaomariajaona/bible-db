document_id: PRO.21,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'The king’s heart is like a stream of water directed by the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: he guides it wherever he pleases.
  '10':
  - type: text
    content: Evil people desire evil;
  - type: text
    content: their neighbors get no mercy from them.
  '11':
  - type: text
    content: If you punish a mocker, the simpleminded become wise;
  - type: text
    content: if you instruct the wise, they will be all the wiser.
  '12':
  - type: text
    content: The Righteous One
  - type: note
    content: Or The righteous man.
  - type: text
    content: ' knows what is going on in the homes of the wicked;'
  - type: text
    content: he will bring disaster on them.
  '13':
  - type: text
    content: Those who shut their ears to the cries of the poor
  - type: text
    content: will be ignored in their own time of need.
  '14':
  - type: text
    content: A secret gift calms anger;
  - type: text
    content: a bribe under the table pacifies fury.
  '15':
  - type: text
    content: Justice is a joy to the godly,
  - type: text
    content: but it terrifies evildoers.
  '16':
  - type: text
    content: The person who strays from common sense
  - type: text
    content: will end up in the company of the dead.
  '17':
  - type: text
    content: Those who love pleasure become poor;
  - type: text
    content: those who love wine and luxury will never be rich.
  '18':
  - type: text
    content: The wicked are punished in place of the godly,
  - type: text
    content: and traitors in place of the honest.
  '19':
  - type: text
    content: It’s better to live alone in the desert
  - type: text
    content: than with a quarrelsome, complaining wife.
  '2':
  - type: text
    content: People may be right in their own eyes,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' examines their heart.'
  '20':
  - type: text
    content: The wise have wealth and luxury,
  - type: text
    content: but fools spend whatever they get.
  '21':
  - type: text
    content: Whoever pursues righteousness and unfailing love
  - type: text
    content: will find life, righteousness, and honor.
  '22':
  - type: text
    content: The wise conquer the city of the strong
  - type: text
    content: and level the fortress in which they trust.
  '23':
  - type: text
    content: Watch your tongue and keep your mouth shut,
  - type: text
    content: and you will stay out of trouble.
  '24':
  - type: text
    content: Mockers are proud and haughty;
  - type: text
    content: they act with boundless arrogance.
  '25':
  - type: text
    content: Despite their desires, the lazy will come to ruin,
  - type: text
    content: for their hands refuse to work.
  '26':
  - type: text
    content: Some people are always greedy for more,
  - type: text
    content: but the godly love to give!
  '27':
  - type: text
    content: The sacrifice of an evil person is detestable,
  - type: text
    content: especially when it is offered with wrong motives.
  '28':
  - type: text
    content: A false witness will be cut off,
  - type: text
    content: but a credible witness will be allowed to speak.
  '29':
  - type: text
    content: The wicked bluff their way through,
  - type: text
    content: but the virtuous think before they act.
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is more pleased when we do what is right and just'
  - type: text
    content: than when we offer him sacrifices.
  '30':
  - type: text
    content: No human wisdom or understanding or plan
  - type: text
    content: 'can stand against the '
  - type: text
    content: Lord
  - type: text
    content: .
  '31':
  - type: text
    content: The horse is prepared for the day of battle,
  - type: text
    content: 'but the victory belongs to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: Haughty eyes, a proud heart,
  - type: text
    content: and evil actions are all sin.
  '5':
  - type: text
    content: Good planning and hard work lead to prosperity,
  - type: text
    content: but hasty shortcuts lead to poverty.
  '6':
  - type: text
    content: Wealth created by a lying tongue
  - type: text
    content: is a vanishing mist and a deadly trap.
  - type: note
    content: As in Greek version; Hebrew reads mist for those who seek death.
  '7':
  - type: text
    content: The violence of the wicked sweeps them away,
  - type: text
    content: because they refuse to do what is just.
  '8':
  - type: text
    content: The guilty walk a crooked path;
  - type: text
    content: the innocent travel a straight road.
  '9':
  - type: text
    content: It’s better to live alone in the corner of an attic
  - type: text
    content: than with a quarrelsome wife in a lovely home.
