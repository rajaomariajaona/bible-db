document_id: PRO.21,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The king’s heart is like a stream of water directed by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he guides it wherever he pleases.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Evil people desire evil;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their neighbors get no mercy from them.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: If you punish a mocker, the simpleminded become wise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if you instruct the wise, they will be all the wiser.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The Righteous One
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The righteous man.
      marker-yv: yv-n
    - type: text
      text: ' knows what is going on in the homes of the wicked;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will bring disaster on them.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Those who shut their ears to the cries of the poor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be ignored in their own time of need.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: A secret gift calms anger;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a bribe under the table pacifies fury.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Justice is a joy to the godly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but it terrifies evildoers.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The person who strays from common sense
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will end up in the company of the dead.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Those who love pleasure become poor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who love wine and luxury will never be rich.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The wicked are punished in place of the godly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and traitors in place of the honest.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: It’s better to live alone in the desert
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than with a quarrelsome, complaining wife.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: People may be right in their own eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' examines their heart.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The wise have wealth and luxury,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but fools spend whatever they get.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Whoever pursues righteousness and unfailing love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will find life, righteousness, and honor.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The wise conquer the city of the strong
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and level the fortress in which they trust.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Watch your tongue and keep your mouth shut,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will stay out of trouble.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Mockers are proud and haughty;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they act with boundless arrogance.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Despite their desires, the lazy will come to ruin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for their hands refuse to work.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Some people are always greedy for more,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the godly love to give!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The sacrifice of an evil person is detestable,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: especially when it is offered with wrong motives.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: A false witness will be cut off,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a credible witness will be allowed to speak.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The wicked bluff their way through,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the virtuous think before they act.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is more pleased when we do what is right and just'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than when we offer him sacrifices.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: No human wisdom or understanding or plan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'can stand against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: The horse is prepared for the day of battle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the victory belongs to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Haughty eyes, a proud heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and evil actions are all sin.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Good planning and hard work lead to prosperity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but hasty shortcuts lead to poverty.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Wealth created by a lying tongue
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is a vanishing mist and a deadly trap.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mist for those who seek death.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The violence of the wicked sweeps them away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because they refuse to do what is just.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The guilty walk a crooked path;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the innocent travel a straight road.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: It’s better to live alone in the corner of an attic
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than with a quarrelsome wife in a lovely home.
