document_id: NEH.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Nehemiah Goes to Jerusalem
  - type: text
    content: Early the following spring, in the month of Nisan,
  - type: note
    content: Hebrew In the month of Nisan. This month of the ancient Hebrew lunar calendar occurred within the months of April and May 445 b.c.
  - type: text
    content: ' during the twentieth year of King Artaxerxes’ reign, I was serving the king his wine. I had never before appeared sad in his presence. '
  '10':
  - type: text
    content: But when Sanballat the Horonite and Tobiah the Ammonite official heard of my arrival, they were very displeased that someone had come to help the people of Israel.
  - type: heading
    content: Nehemiah Inspects Jerusalem’s Wall
  '11':
  - type: text
    content: 'So I arrived in Jerusalem. Three days later, '
  '12':
  - type: text
    content: 'I slipped out during the night, taking only a few others with me. I had not told anyone about the plans God had put in my heart for Jerusalem. We took no pack animals with us except the donkey I was riding. '
  '13':
  - type: text
    content: After dark I went out through the Valley Gate, past the Jackal’s Well,
  - type: note
    content: Or Serpent’s Well.
  - type: text
    content: ' and over to the Dung Gate to inspect the broken walls and burned gates. '
  '14':
  - type: text
    content: 'Then I went to the Fountain Gate and to the King’s Pool, but my donkey couldn’t get through the rubble. '
  '15':
  - type: text
    content: So, though it was still dark, I went up the Kidron Valley
  - type: note
    content: Hebrew the valley.
  - type: text
    content: ' instead, inspecting the wall before I turned back and entered again at the Valley Gate.'
  '16':
  - type: text
    content: 'The city officials did not know I had been out there or what I was doing, for I had not yet said anything to anyone about my plans. I had not yet spoken to the Jewish leaders—the priests, the nobles, the officials, or anyone else in the administration. '
  '17':
  - type: text
    content: 'But now I said to them, “You know very well what trouble we are in. Jerusalem lies in ruins, and its gates have been destroyed by fire. Let us rebuild the wall of Jerusalem and end this disgrace!” '
  '18':
  - type: text
    content: Then I told them about how the gracious hand of God had been on me, and about my conversation with the king.
  - type: text
    content: They replied at once, “Yes, let’s rebuild the wall!” So they began the good work.
  '19':
  - type: text
    content: But when Sanballat, Tobiah, and Geshem the Arab heard of our plan, they scoffed contemptuously. “What are you doing? Are you rebelling against the king?” they asked.
  '2':
  - type: text
    content: So the king asked me, “Why are you looking so sad? You don’t look sick to me. You must be deeply troubled.”
  - type: text
    content: 'Then I was terrified, '
  '20':
  - type: text
    content: I replied, “The God of heaven will help us succeed. We, his servants, will start rebuilding this wall. But you have no share, legal right, or historic claim in Jerusalem.”
  '3':
  - type: text
    content: but I replied, “Long live the king! How can I not be sad? For the city where my ancestors are buried is in ruins, and the gates have been destroyed by fire.”
  '4':
  - type: text
    content: The king asked, “Well, how can I help you?”
  - type: text
    content: 'With a prayer to the God of heaven, '
  '5':
  - type: text
    content: I replied, “If it please the king, and if you are pleased with me, your servant, send me to Judah to rebuild the city where my ancestors are buried.”
  '6':
  - type: text
    content: The king, with the queen sitting beside him, asked, “How long will you be gone? When will you return?” After I told him how long I would be gone, the king agreed to my request.
  '7':
  - type: text
    content: I also said to the king, “If it please the king, let me have letters addressed to the governors of the province west of the Euphrates River,
  - type: note
    content: Hebrew the province beyond the river; also in 2:9.
  - type: text
    content: ' instructing them to let me travel safely through their territories on my way to Judah. '
  '8':
  - type: text
    content: And please give me a letter addressed to Asaph, the manager of the king’s forest, instructing him to give me timber. I will need it to make beams for the gates of the Temple fortress, for the city walls, and for a house for myself.” And the king granted these requests, because the gracious hand of God was on me.
  '9':
  - type: text
    content: When I came to the governors of the province west of the Euphrates River, I delivered the king’s letters to them. The king, I should add, had sent along army officers and horsemen
  - type: note
    content: Or charioteers.
  - type: text
    content: ' to protect me. '
