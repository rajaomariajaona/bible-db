document_id: GEN.40
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph Interprets Two Dreams
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Some time later, Pharaoh’s chief cup-bearer and chief baker offended their royal master. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pharaoh became angry with these two officials, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and he put them in the prison where Joseph was, in the palace of the captain of the guard. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They remained in prison for quite some time, and the captain of the guard assigned them to Joseph, who looked after them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'While they were in prison, Pharaoh’s cup-bearer and baker each had a dream one night, and each dream had its own meaning. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When Joseph saw them the next morning, he noticed that they both looked upset. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Why do you look so worried today?” he asked them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And they replied, “We both had dreams last night, but no one can tell us what they mean.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Interpreting dreams is God’s business,” Joseph replied. “Go ahead and tell me your dreams.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So the chief cup-bearer told Joseph his dream first. “In my dream,” he said, “I saw a grapevine in front of me. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The vine had three branches that began to bud and blossom, and soon it produced clusters of ripe grapes. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I was holding Pharaoh’s wine cup in my hand, so I took a cluster of grapes and squeezed the juice into the cup. Then I placed the cup in Pharaoh’s hand.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“This is what the dream means,” Joseph said. “The three branches represent three days. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Within three days Pharaoh will lift you up and restore you to your position as his chief cup-bearer. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And please remember me and do me a favor when things go well for you. Mention me to Pharaoh, so he might let me out of this place. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For I was kidnapped from my homeland, the land of the Hebrews, and now I’m here in prison, but I did nothing to deserve it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When the chief baker saw that Joseph had given the first dream such a positive interpretation, he said to Joseph, “I had a dream, too. In my dream there were three baskets of white pastries stacked on my head. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The top basket contained all kinds of pastries for Pharaoh, but the birds came and ate them from the basket on my head.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“This is what the dream means,” Joseph told him. “The three baskets also represent three days. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Three days from now Pharaoh will lift you up and impale your body on a pole. Then birds will come and peck away at your flesh.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Pharaoh’s birthday came three days later, and he prepared a banquet for all his officials and staff. He summoned
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: He lifted up the head of.
    marker-yv: yv-n
  - type: text
    text: ' his chief cup-bearer and chief baker to join the other officials. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He then restored the chief cup-bearer to his former position, so he could again hand Pharaoh his cup. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But Pharaoh impaled the chief baker, just as Joseph had predicted when he interpreted his dream. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Pharaoh’s chief cup-bearer, however, forgot all about Joseph, never giving him another thought.
