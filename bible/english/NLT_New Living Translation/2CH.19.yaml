document_id: 2CH.19,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoshaphat Appoints Judges
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When King Jehoshaphat of Judah arrived safely home in Jerusalem, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Whenever a case comes to you from fellow citizens in an outlying town, whether a murder case or some other violation of God’s laws, commands, decrees, or regulations, you must warn them not to sin against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', so that he will not be angry with you and them. Do this and you will not be guilty.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“Amariah the high priest will have final say in all cases involving the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Zebadiah son of Ishmael, a leader from the tribe of Judah, will have final say in all civil cases. The Levites will assist you in making sure that justice is served. Take courage as you fulfill your duties, and may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be with those who do what is right.”'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jehu son of Hanani the seer went out to meet him. “Why should you help the wicked and love those who hate the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?” he asked the king. “Because of what you have done, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is very angry with you. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Even so, there is some good in you, for you have removed the Asherah poles throughout the land, and you have committed yourself to seeking God.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jehoshaphat lived in Jerusalem, but he went out among the people, traveling from Beersheba to the hill country of Ephraim, encouraging the people to return to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their ancestors. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He appointed judges throughout the nation in all the fortified towns, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and he said to them, “Always think carefully before pronouncing judgment. Remember that you do not judge to please people but to please the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. He will be with you when you render the verdict in each case. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and judge with integrity, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God does not tolerate perverted justice, partiality, or the taking of bribes.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: In Jerusalem, Jehoshaphat appointed some of the Levites and priests and clan leaders in Israel to serve as judges
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As in Greek version; the meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' for cases involving the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s regulations and for civil disputes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'These were his instructions to them: “You must always act in the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', with faithfulness and an undivided heart. '
