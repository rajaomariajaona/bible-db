document_id: 2CH.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoshaphat Appoints Judges
  - type: text
    content: 'When King Jehoshaphat of Judah arrived safely home in Jerusalem, '
  '10':
  - type: text
    content: 'Whenever a case comes to you from fellow citizens in an outlying town, whether a murder case or some other violation of God’s laws, commands, decrees, or regulations, you must warn them not to sin against the '
  - type: text
    content: Lord
  - type: text
    content: ', so that he will not be angry with you and them. Do this and you will not be guilty.'
  '11':
  - type: text
    content: '“Amariah the high priest will have final say in all cases involving the '
  - type: text
    content: Lord
  - type: text
    content: '. Zebadiah son of Ishmael, a leader from the tribe of Judah, will have final say in all civil cases. The Levites will assist you in making sure that justice is served. Take courage as you fulfill your duties, and may the '
  - type: text
    content: Lord
  - type: text
    content: ' be with those who do what is right.”'
  '2':
  - type: text
    content: 'Jehu son of Hanani the seer went out to meet him. “Why should you help the wicked and love those who hate the '
  - type: text
    content: Lord
  - type: text
    content: '?” he asked the king. “Because of what you have done, the '
  - type: text
    content: Lord
  - type: text
    content: ' is very angry with you. '
  '3':
  - type: text
    content: Even so, there is some good in you, for you have removed the Asherah poles throughout the land, and you have committed yourself to seeking God.”
  '4':
  - type: text
    content: 'Jehoshaphat lived in Jerusalem, but he went out among the people, traveling from Beersheba to the hill country of Ephraim, encouraging the people to return to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors. '
  '5':
  - type: text
    content: 'He appointed judges throughout the nation in all the fortified towns, '
  '6':
  - type: text
    content: 'and he said to them, “Always think carefully before pronouncing judgment. Remember that you do not judge to please people but to please the '
  - type: text
    content: Lord
  - type: text
    content: '. He will be with you when you render the verdict in each case. '
  '7':
  - type: text
    content: 'Fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and judge with integrity, for the '
  - type: text
    content: Lord
  - type: text
    content: ' our God does not tolerate perverted justice, partiality, or the taking of bribes.”'
  '8':
  - type: text
    content: In Jerusalem, Jehoshaphat appointed some of the Levites and priests and clan leaders in Israel to serve as judges
  - type: note
    content: As in Greek version; the meaning of the Hebrew is uncertain.
  - type: text
    content: ' for cases involving the '
  - type: text
    content: Lord
  - type: text
    content: '’s regulations and for civil disputes. '
  '9':
  - type: text
    content: 'These were his instructions to them: “You must always act in the fear of the '
  - type: text
    content: Lord
  - type: text
    content: ', with faithfulness and an undivided heart. '
