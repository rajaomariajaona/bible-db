document_id: MAT.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of the Farmer Scattering Seed
  - type: text
    content: 'Later that same day Jesus left the house and sat beside the lake. '
  '10':
  - type: text
    content: His disciples came and asked him, “Why do you use parables when you talk to the people?”
  '11':
  - type: text
    content: 'He replied, '
  - type: text
    content: “You are permitted to understand the secrets
  - type: note
    content: Greek the mysteries.
  - type: text
    content: ' '
  - type: text
    content: of the Kingdom of Heaven, but others are not.
  - type: text
    content: ' '
  '12':
  - type: text
    content: To those who listen to my teaching, more understanding will be given, and they will have an abundance of knowledge. But for those who are not listening, even what little understanding they have will be taken away from them.
  - type: text
    content: ' '
  '13':
  - type: text
    content: That is why I use these parables,
  - type: text
    content: For they look, but they don’t really see.
  - type: text
    content: They hear, but they don’t really listen or understand.
  '14':
  - type: text
    content: ' '
  - type: text
    content: This fulfills the prophecy of Isaiah that says,
  - type: text
    content: ‘When you hear what I say,
  - type: text
    content: you will not understand.
  - type: text
    content: When you see what I do,
  - type: text
    content: you will not comprehend.
  '15':
  - type: text
    content: ' '
  - type: text
    content: For the hearts of these people are hardened,
  - type: text
    content: and their ears cannot hear,
  - type: text
    content: and they have closed their eyes—
  - type: text
    content: so their eyes cannot see,
  - type: text
    content: and their ears cannot hear,
  - type: text
    content: and their hearts cannot understand,
  - type: text
    content: and they cannot turn to me
  - type: text
    content: and let me heal them.’
  - type: note
    content: Isa 6:9-10 (Greek version).
  '16':
  - type: text
    content: ' '
  - type: text
    content: “But blessed are your eyes, because they see; and your ears, because they hear.
  - type: text
    content: ' '
  '17':
  - type: text
    content: I tell you the truth, many prophets and righteous people longed to see what you see, but they didn’t see it. And they longed to hear what you hear, but they didn’t hear it.
  '18':
  - type: text
    content: ' '
  - type: text
    content: '“Now listen to the explanation of the parable about the farmer planting seeds:'
  - type: text
    content: ' '
  '19':
  - type: text
    content: The seed that fell on the footpath represents those who hear the message about the Kingdom and don’t understand it. Then the evil one comes and snatches away the seed that was planted in their hearts.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'A large crowd soon gathered around him, so he got into a boat. Then he sat there and taught as the people stood on the shore. '
  '20':
  - type: text
    content: The seed on the rocky soil represents those who hear the message and immediately receive it with joy.
  - type: text
    content: ' '
  '21':
  - type: text
    content: But since they don’t have deep roots, they don’t last long. They fall away as soon as they have problems or are persecuted for believing God’s word.
  - type: text
    content: ' '
  '22':
  - type: text
    content: The seed that fell among the thorns represents those who hear God’s word, but all too quickly the message is crowded out by the worries of this life and the lure of wealth, so no fruit is produced.
  - type: text
    content: ' '
  '23':
  - type: text
    content: The seed that fell on good soil represents those who truly hear and understand God’s word and produce a harvest of thirty, sixty, or even a hundred times as much as had been planted!”
  - type: heading
    content: Parable of the Wheat and Weeds
  '24':
  - type: text
    content: 'Here is another story Jesus told: '
  - type: text
    content: “The Kingdom of Heaven is like a farmer who planted good seed in his field.
  - type: text
    content: ' '
  '25':
  - type: text
    content: But that night as the workers slept, his enemy came and planted weeds among the wheat, then slipped away.
  - type: text
    content: ' '
  '26':
  - type: text
    content: When the crop began to grow and produce grain, the weeds also grew.
  '27':
  - type: text
    content: ' '
  - type: text
    content: “The farmer’s workers went to him and said, ‘Sir, the field where you planted that good seed is full of weeds! Where did they come from?’
  '28':
  - type: text
    content: ' '
  - type: text
    content: “‘An enemy has done this!’ the farmer exclaimed.
  - type: text
    content: “‘Should we pull out the weeds?’ they asked.
  '29':
  - type: text
    content: ' '
  - type: text
    content: “‘No,’ he replied, ‘you’ll uproot the wheat if you do.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'He told many stories in the form of parables, such as this one:'
  - type: text
    content: “Listen! A farmer went out to plant some seeds.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Let both grow together until the harvest. Then I will tell the harvesters to sort out the weeds, tie them into bundles, and burn them, and to put the wheat in the barn.’”
  - type: heading
    content: Parable of the Mustard Seed
  '31':
  - type: text
    content: 'Here is another illustration Jesus used: '
  - type: text
    content: “The Kingdom of Heaven is like a mustard seed planted in a field.
  - type: text
    content: ' '
  '32':
  - type: text
    content: It is the smallest of all seeds, but it becomes the largest of garden plants; it grows into a tree, and birds come and make nests in its branches.”
  - type: heading
    content: Parable of the Yeast
  '33':
  - type: text
    content: 'Jesus also used this illustration: '
  - type: text
    content: “The Kingdom of Heaven is like the yeast a woman used in making bread. Even though she put only a little yeast in three measures of flour, it permeated every part of the dough.”
  '34':
  - type: text
    content: 'Jesus always used stories and illustrations like these when speaking to the crowds. In fact, he never spoke to them without using such parables. '
  '35':
  - type: text
    content: 'This fulfilled what God had spoken through the prophet:'
  - type: text
    content: “I will speak to you in parables.
  - type: text
    content: I will explain things hidden since the creation of the world.
  - type: note
    content: Some manuscripts do not include of the world. Ps 78:2.
  - type: text
    content: ”
  - type: heading
    content: Parable of the Wheat and Weeds Explained
  '36':
  - type: text
    content: Then, leaving the crowds outside, Jesus went into the house. His disciples said, “Please explain to us the story of the weeds in the field.”
  '37':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “The Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: is the farmer who plants the good seed.
  - type: text
    content: ' '
  '38':
  - type: text
    content: The field is the world, and the good seed represents the people of the Kingdom. The weeds are the people who belong to the evil one.
  - type: text
    content: ' '
  '39':
  - type: text
    content: The enemy who planted the weeds among the wheat is the devil. The harvest is the end of the world,
  - type: note
    content: Or the age; also in 13:40, 49.
  - type: text
    content: ' '
  - type: text
    content: and the harvesters are the angels.
  '4':
  - type: text
    content: As he scattered them across his field, some seeds fell on a footpath, and the birds came and ate them.
  - type: text
    content: ' '
  '40':
  - type: text
    content: ' '
  - type: text
    content: “Just as the weeds are sorted out and burned in the fire, so it will be at the end of the world.
  - type: text
    content: ' '
  '41':
  - type: text
    content: The Son of Man will send his angels, and they will remove from his Kingdom everything that causes sin and all who do evil.
  - type: text
    content: ' '
  '42':
  - type: text
    content: And the angels will throw them into the fiery furnace, where there will be weeping and gnashing of teeth.
  - type: text
    content: ' '
  '43':
  - type: text
    content: Then the righteous will shine like the sun in their Father’s Kingdom. Anyone with ears to hear should listen and understand!
  - type: heading
    content: Parables of the Hidden Treasure and the Pearl
  '44':
  - type: text
    content: ' '
  - type: text
    content: “The Kingdom of Heaven is like a treasure that a man discovered hidden in a field. In his excitement, he hid it again and sold everything he owned to get enough money to buy the field.
  '45':
  - type: text
    content: ' '
  - type: text
    content: “Again, the Kingdom of Heaven is like a merchant on the lookout for choice pearls.
  - type: text
    content: ' '
  '46':
  - type: text
    content: When he discovered a pearl of great value, he sold everything he owned and bought it!
  - type: heading
    content: Parable of the Fishing Net
  '47':
  - type: text
    content: ' '
  - type: text
    content: “Again, the Kingdom of Heaven is like a fishing net that was thrown into the water and caught fish of every kind.
  - type: text
    content: ' '
  '48':
  - type: text
    content: When the net was full, they dragged it up onto the shore, sat down, and sorted the good fish into crates, but threw the bad ones away.
  - type: text
    content: ' '
  '49':
  - type: text
    content: That is the way it will be at the end of the world. The angels will come and separate the wicked people from the righteous,
  - type: text
    content: ' '
  '5':
  - type: text
    content: Other seeds fell on shallow soil with underlying rock. The seeds sprouted quickly because the soil was shallow.
  - type: text
    content: ' '
  '50':
  - type: text
    content: throwing the wicked into the fiery furnace, where there will be weeping and gnashing of teeth.
  - type: text
    content: ' '
  '51':
  - type: text
    content: Do you understand all these things?”
  - type: text
    content: “Yes,” they said, “we do.”
  '52':
  - type: text
    content: 'Then he added, '
  - type: text
    content: “Every teacher of religious law who becomes a disciple in the Kingdom of Heaven is like a homeowner who brings from his storeroom new gems of truth as well as old.”
  - type: heading
    content: Jesus Rejected at Nazareth
  '53':
  - type: text
    content: 'When Jesus had finished telling these stories and illustrations, he left that part of the country. '
  '54':
  - type: text
    content: 'He returned to Nazareth, his hometown. When he taught there in the synagogue, everyone was amazed and said, “Where does he get this wisdom and the power to do miracles?” '
  '55':
  - type: text
    content: Then they scoffed, “He’s just the carpenter’s son, and we know Mary, his mother, and his brothers—James, Joseph,
  - type: note
    content: Other manuscripts read Joses; still others read John.
  - type: text
    content: ' Simon, and Judas. '
  '56':
  - type: text
    content: 'All his sisters live right here among us. Where did he learn all these things?” '
  '57':
  - type: text
    content: And they were deeply offended and refused to believe in him.
  - type: text
    content: 'Then Jesus told them, '
  - type: text
    content: “A prophet is honored everywhere except in his own hometown and among his own family.”
  - type: text
    content: ' '
  '58':
  - type: text
    content: And so he did only a few miracles there because of their unbelief.
  '6':
  - type: text
    content: But the plants soon wilted under the hot sun, and since they didn’t have deep roots, they died.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Other seeds fell among thorns that grew up and choked out the tender plants.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Still other seeds fell on fertile soil, and they produced a crop that was thirty, sixty, and even a hundred times as much as had been planted!
  - type: text
    content: ' '
  '9':
  - type: text
    content: Anyone with ears to hear should listen and understand.”
