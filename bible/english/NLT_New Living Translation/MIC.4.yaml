document_id: MIC.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Future Reign
  - type: text
    content: 'In the last days, the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: ’s house
  - type: text
    content: will be the highest of all—
  - type: text
    content: the most important place on earth.
  - type: text
    content: It will be raised above the other hills,
  - type: text
    content: and people from all over the world will stream there to worship.
  '10':
  - type: text
    content: Writhe and groan like a woman in labor,
  - type: text
    content: you people of Jerusalem,
  - type: note
    content: Hebrew O daughter of Zion.
  - type: text
    content: for now you must leave this city
  - type: text
    content: to live in the open country.
  - type: text
    content: You will soon be sent in exile
  - type: text
    content: to distant Babylon.
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' will rescue you there;'
  - type: text
    content: he will redeem you from the grip of your enemies.
  '11':
  - type: text
    content: Now many nations have gathered against you.
  - type: text
    content: “Let her be desecrated,” they say.
  - type: text
    content: “Let us see the destruction of Jerusalem.
  - type: note
    content: Hebrew of Zion.
  - type: text
    content: ”
  '12':
  - type: text
    content: 'But they do not know the '
  - type: text
    content: Lord
  - type: text
    content: ’s thoughts
  - type: text
    content: or understand his plan.
  - type: text
    content: These nations don’t know
  - type: text
    content: that he is gathering them together
  - type: text
    content: to be beaten and trampled
  - type: text
    content: like sheaves of grain on a threshing floor.
  '13':
  - type: text
    content: “Rise up and crush the nations, O Jerusalem!”
  - type: note
    content: Hebrew “Rise up and thresh, O daughter of Zion.”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “For I will give you iron horns and bronze hooves,
  - type: text
    content: so you can trample many nations to pieces.
  - type: text
    content: 'You will present their stolen riches to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: their wealth to the Lord of all the earth.”
  '2':
  - type: text
    content: People from many nations will come and say,
  - type: text
    content: '“Come, let us go up to the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: to the house of Jacob’s God.
  - type: text
    content: There he will teach us his ways,
  - type: text
    content: and we will walk in his paths.”
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ’s teaching will go out from Zion;
  - type: text
    content: his word will go out from Jerusalem.
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will mediate between peoples'
  - type: text
    content: and will settle disputes between strong nations far away.
  - type: text
    content: They will hammer their swords into plowshares
  - type: text
    content: and their spears into pruning hooks.
  - type: text
    content: Nation will no longer fight against nation,
  - type: text
    content: nor train for war anymore.
  '4':
  - type: text
    content: Everyone will live in peace and prosperity,
  - type: text
    content: enjoying their own grapevines and fig trees,
  - type: text
    content: for there will be nothing to fear.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies'
  - type: text
    content: has made this promise!
  '5':
  - type: text
    content: Though the nations around us follow their idols,
  - type: text
    content: 'we will follow the '
  - type: text
    content: Lord
  - type: text
    content: ' our God forever and ever.'
  - type: heading
    content: Israel’s Return from Exile
  '6':
  - type: text
    content: '“In that coming day,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “I will gather together those who are lame,
  - type: text
    content: those who have been exiles,
  - type: text
    content: and those whom I have filled with grief.
  '7':
  - type: text
    content: Those who are weak will survive as a remnant;
  - type: text
    content: those who were exiles will become a strong nation.
  - type: text
    content: 'Then I, the '
  - type: text
    content: Lord
  - type: text
    content: ', will rule from Jerusalem'
  - type: note
    content: Hebrew Mount Zion.
  - type: text
    content: as their king forever.”
  '8':
  - type: text
    content: As for you, Jerusalem,
  - type: text
    content: the citadel of God’s people,
  - type: note
    content: Hebrew As for you, Migdal-eder, / the Ophel of the daughter of Zion.
  - type: text
    content: your royal might and power
  - type: text
    content: will come back to you again.
  - type: text
    content: The kingship will be restored
  - type: text
    content: to my precious Jerusalem.
  '9':
  - type: text
    content: But why are you now screaming in terror?
  - type: text
    content: Have you no king to lead you?
  - type: text
    content: Have your wise people all died?
  - type: text
    content: Pain has gripped you like a woman in childbirth.
