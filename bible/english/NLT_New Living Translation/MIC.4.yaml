segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Future Reign
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the last days, the mountain of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s house
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be the highest of all—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the most important place on earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will be raised above the other hills,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and people from all over the world will stream there to worship.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: People from many nations will come and say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Come, let us go up to the mountain of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the house of Jacob’s God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There he will teach us his ways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and we will walk in his paths.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s teaching will go out from Zion;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his word will go out from Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will mediate between peoples'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will settle disputes between strong nations far away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will hammer their swords into plowshares
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their spears into pruning hooks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nation will no longer fight against nation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor train for war anymore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Everyone will live in peace and prosperity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: enjoying their own grapevines and fig trees,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for there will be nothing to fear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies'
- type: usfm
  marker: q2
  children:
  - type: text
    text: has made this promise!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Though the nations around us follow their idols,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'we will follow the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God forever and ever.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel’s Return from Exile
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“In that coming day,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will gather together those who are lame,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who have been exiles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those whom I have filled with grief.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Those who are weak will survive as a remnant;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who were exiles will become a strong nation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', will rule from Jerusalem'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mount Zion.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: as their king forever.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: As for you, Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the citadel of God’s people,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: As for you, Migdal-eder, / the Ophel of the daughter of Zion.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: your royal might and power
- type: usfm
  marker: q2
  children:
  - type: text
    text: will come back to you again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The kingship will be restored
- type: usfm
  marker: q2
  children:
  - type: text
    text: to my precious Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But why are you now screaming in terror?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have you no king to lead you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have your wise people all died?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Pain has gripped you like a woman in childbirth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Writhe and groan like a woman in labor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you people of Jerusalem,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: O daughter of Zion.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: for now you must leave this city
- type: usfm
  marker: q2
  children:
  - type: text
    text: to live in the open country.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will soon be sent in exile
- type: usfm
  marker: q2
  children:
  - type: text
    text: to distant Babylon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will rescue you there;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will redeem you from the grip of your enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Now many nations have gathered against you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Let her be desecrated,” they say.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Let us see the destruction of Jerusalem.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of Zion.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But they do not know the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s thoughts
- type: usfm
  marker: q2
  children:
  - type: text
    text: or understand his plan.
- type: usfm
  marker: q1
  children:
  - type: text
    text: These nations don’t know
- type: usfm
  marker: q2
  children:
  - type: text
    text: that he is gathering them together
- type: usfm
  marker: q1
  children:
  - type: text
    text: to be beaten and trampled
- type: usfm
  marker: q2
  children:
  - type: text
    text: like sheaves of grain on a threshing floor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Rise up and crush the nations, O Jerusalem!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: “Rise up and thresh, O daughter of Zion.”
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “For I will give you iron horns and bronze hooves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so you can trample many nations to pieces.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You will present their stolen riches to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: their wealth to the Lord of all the earth.”
