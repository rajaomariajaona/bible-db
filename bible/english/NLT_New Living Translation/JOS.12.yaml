verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Kings Defeated East of the Jordan
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: These are the kings east of the Jordan River who had been killed by the Israelites and whose land was taken. Their territory extended from the Arnon Gorge to Mount Hermon and included all the land east of the Jordan Valley.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Arabah; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 12:3, 8.
      marker-yv: yv-n
