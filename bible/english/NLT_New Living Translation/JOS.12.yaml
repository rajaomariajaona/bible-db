document_id: JOS.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Kings Defeated East of the Jordan
  - type: text
    content: These are the kings east of the Jordan River who had been killed by the Israelites and whose land was taken. Their territory extended from the Arnon Gorge to Mount Hermon and included all the land east of the Jordan Valley.
  - type: note
    content: Hebrew the Arabah; also in 12:3, 8.
  '10':
  - type: text
    content: The king of Jerusalem
  - type: text
    content: The king of Hebron
  '11':
