  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Sihon of the Amorites, who lived in Heshbon, was defeated. His kingdom included Aroer, on the edge of the Arnon Gorge, and extended from the middle of the Arnon Gorge to the Jabbok River, which serves as a border for the Ammonites. This territory included the southern half of the territory of Gilead. '
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The king of Shimron-meron
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The king of Acshaph
  '21':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The king of Taanach
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The king of Megiddo
  '22':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The king of Kedesh
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The king of Jokneam in Carmel
  '23':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The king of Dor in the town of Naphoth-dor
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:23a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Naphath-dor, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Naphoth-dor.
      marker-yv: yv-n
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The king of Goyim in Gilgal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:23b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Goyim in Galilee.
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The king of Tirzah.
  - type: usfm
    marker: m
    children:
    - type: text
      text: In all, thirty-one kings were defeated.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sihon also controlled the Jordan Valley and regions to the east—from as far north as the Sea of Galilee to as far south as the Dead Sea,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from the Sea of Kinnereth to the Sea of the Arabah, which is the Salt Sea.
      marker-yv: yv-n
    - type: text
      text: ' including the road to Beth-jeshimoth and southward to the slopes of Pisgah.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Og of Bashan, the last of the Rephaites, lived at Ashtaroth and Edrei. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He ruled a territory stretching from Mount Hermon to Salecah in the north and to all of Bashan in the east, and westward to the borders of the kingdoms of Geshur and Maacah. This territory included the northern half of Gilead, as far as the boundary of King Sihon of Heshbon.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses, the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the Israelites had destroyed the people of King Sihon and King Og. And Moses gave their land as a possession to the tribes of Reuben, Gad, and the half-tribe of Manasseh.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Kings Defeated West of the Jordan
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The following is a list of the kings that Joshua and the Israelite armies defeated on the west side of the Jordan, from Baal-gad in the valley of Lebanon to Mount Halak, which leads up to Seir. (Joshua gave this land to the tribes of Israel as their possession, '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: including the hill country, the western foothills,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Shephelah.
      marker-yv: yv-n
    - type: text
      text: ' the Jordan Valley, the mountain slopes, the Judean wilderness, and the Negev. The people who lived in this region were the Hittites, the Amorites, the Canaanites, the Perizzites, the Hivites, and the Jebusites.) These are the kings Israel defeated:'
  '9':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The king of Jericho
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The king of Ai, near Bethel
