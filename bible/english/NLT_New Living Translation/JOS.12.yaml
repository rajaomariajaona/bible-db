  '2':
  - type: text
    content: 'King Sihon of the Amorites, who lived in Heshbon, was defeated. His kingdom included Aroer, on the edge of the Arnon Gorge, and extended from the middle of the Arnon Gorge to the Jabbok River, which serves as a border for the Ammonites. This territory included the southern half of the territory of Gilead. '
  '20':
  - type: text
    content: The king of Shimron-meron
  - type: text
    content: The king of Acshaph
  '21':
  - type: text
    content: The king of Taanach
  - type: text
    content: The king of Megiddo
  '22':
  - type: text
    content: The king of Kedesh
  - type: text
    content: The king of Jokneam in Carmel
  '23':
  - type: text
    content: The king of Dor in the town of Naphoth-dor
  - type: note
    content: Hebrew Naphath-dor, a variant spelling of Naphoth-dor.
  - type: text
    content: The king of Goyim in Gilgal
  - type: note
    content: Greek version reads Goyim in Galilee.
  '24':
  - type: text
    content: The king of Tirzah.
  - type: text
    content: In all, thirty-one kings were defeated.
  '3':
  - type: text
    content: Sihon also controlled the Jordan Valley and regions to the east—from as far north as the Sea of Galilee to as far south as the Dead Sea,
  - type: note
    content: Hebrew from the Sea of Kinnereth to the Sea of the Arabah, which is the Salt Sea.
  - type: text
    content: ' including the road to Beth-jeshimoth and southward to the slopes of Pisgah.'
  '4':
  - type: text
    content: 'King Og of Bashan, the last of the Rephaites, lived at Ashtaroth and Edrei. '
  '5':
  - type: text
    content: He ruled a territory stretching from Mount Hermon to Salecah in the north and to all of Bashan in the east, and westward to the borders of the kingdoms of Geshur and Maacah. This territory included the northern half of Gilead, as far as the boundary of King Sihon of Heshbon.
  '6':
  - type: text
    content: 'Moses, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', and the Israelites had destroyed the people of King Sihon and King Og. And Moses gave their land as a possession to the tribes of Reuben, Gad, and the half-tribe of Manasseh.'
  - type: heading
    content: Kings Defeated West of the Jordan
  '7':
  - type: text
    content: 'The following is a list of the kings that Joshua and the Israelite armies defeated on the west side of the Jordan, from Baal-gad in the valley of Lebanon to Mount Halak, which leads up to Seir. (Joshua gave this land to the tribes of Israel as their possession, '
  '8':
  - type: text
    content: including the hill country, the western foothills,
  - type: note
    content: Hebrew the Shephelah.
  - type: text
    content: ' the Jordan Valley, the mountain slopes, the Judean wilderness, and the Negev. The people who lived in this region were the Hittites, the Amorites, the Canaanites, the Perizzites, the Hivites, and the Jebusites.) These are the kings Israel defeated:'
  '9':
  - type: text
    content: The king of Jericho
  - type: text
    content: The king of Ai, near Bethel
