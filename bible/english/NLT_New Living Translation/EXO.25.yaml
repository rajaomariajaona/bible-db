document_id: EXO.25,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Offerings for the Tabernacle
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: “Have the people make an Ark of acacia wood—a sacred chest 45 inches long, 27 inches wide, and 27 inches high.
  - type: note
    content: Hebrew 2.5 cubits [115 centimeters] long, 1.5 cubits [69 centimeters] wide, and 1.5 cubits high.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Overlay it inside and outside with pure gold, and run a molding of gold all around it. '
  '12':
  - type: text
    content: 'Cast four gold rings and attach them to its four feet, two rings on each side. '
  '13':
  - type: text
    content: 'Make poles from acacia wood, and overlay them with gold. '
  '14':
  - type: text
    content: 'Insert the poles into the rings at the sides of the Ark to carry it. '
  '15':
  - type: text
    content: 'These carrying poles must stay inside the rings; never remove them. '
  '16':
  - type: text
    content: When the Ark is finished, place inside it the stone tablets inscribed with the terms of the covenant,
  - type: note
    content: Hebrew Place inside the Ark the Testimony; similarly in 25:21. The Hebrew word for “testimony” refers to the terms of the Lord’s covenant with Israel as written on stone tablets, and also to the covenant itself.
  - type: text
    content: ' which I will give to you.'
  '17':
  - type: text
    content: “Then make the Ark’s cover—the place of atonement—from pure gold. It must be 45 inches long and 27 inches wide.
  - type: note
    content: Hebrew 2.5 cubits [115 centimeters] long and 1.5 cubits [69 centimeters] wide.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Then make two cherubim from hammered gold, and place them on the two ends of the atonement cover. '
  '19':
  - type: text
    content: 'Mold the cherubim on each end of the atonement cover, making it all of one piece of gold. '
  '2':
  - type: text
    content: '“Tell the people of Israel to bring me their sacred offerings. Accept the contributions from all whose hearts are moved to offer them. '
  '20':
  - type: text
    content: 'The cherubim will face each other and look down on the atonement cover. With their wings spread above it, they will protect it. '
  '21':
  - type: text
    content: 'Place inside the Ark the stone tablets inscribed with the terms of the covenant, which I will give to you. Then put the atonement cover on top of the Ark. '
  '22':
  - type: text
    content: I will meet with you there and talk to you from above the atonement cover between the gold cherubim that hover over the Ark of the Covenant.
  - type: note
    content: Or Ark of the Testimony.
  - type: text
    content: ' From there I will give you my commands for the people of Israel.'
  - type: heading
    content: Plans for the Table
  '23':
  - type: text
    content: “Then make a table of acacia wood, 36 inches long, 18 inches wide, and 27 inches high.
  - type: note
    content: Hebrew 2 cubits [92 centimeters] long, 1 cubit [46 centimeters] wide, and 1.5 cubits [69 centimeters] high.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Overlay it with pure gold and run a gold molding around the edge. '
  '25':
  - type: text
    content: Decorate it with a 3-inch border
  - type: note
    content: Hebrew a border of a handbreadth [8 centimeters].
  - type: text
    content: ' all around, and run a gold molding along the border. '
  '26':
  - type: text
    content: 'Make four gold rings for the table and attach them at the four corners next to the four legs. '
  '27':
  - type: text
    content: 'Attach the rings near the border to hold the poles that are used to carry the table. '
  '28':
  - type: text
    content: 'Make these poles from acacia wood, and overlay them with gold. '
  '29':
  - type: text
    content: 'Make special containers of pure gold for the table—bowls, ladles, pitchers, and jars—to be used in pouring out liquid offerings. '
  '3':
  - type: text
    content: 'Here is a list of sacred offerings you may accept from them:'
  - type: text
    content: gold, silver, and bronze;
  '30':
  - type: text
    content: Place the Bread of the Presence on the table to remain before me at all times.
  - type: heading
    content: Plans for the Lampstand
  '31':
  - type: text
    content: '“Make a lampstand of pure, hammered gold. Make the entire lampstand and its decorations of one piece—the base, center stem, lamp cups, buds, and petals. '
  '32':
  - type: text
    content: 'Make it with six branches going out from the center stem, three on each side. '
  '33':
  - type: text
    content: 'Each of the six branches will have three lamp cups shaped like almond blossoms, complete with buds and petals. '
  '34':
  - type: text
    content: 'Craft the center stem of the lampstand with four lamp cups shaped like almond blossoms, complete with buds and petals. '
  '35':
  - type: text
    content: 'There will also be an almond bud beneath each pair of branches where the six branches extend from the center stem. '
  '36':
  - type: text
    content: 'The almond buds and branches must all be of one piece with the center stem, and they must be hammered from pure gold. '
  '37':
  - type: text
    content: 'Then make the seven lamps for the lampstand, and set them so they reflect their light forward. '
  '38':
  - type: text
    content: 'The lamp snuffers and trays must also be made of pure gold. '
  '39':
  - type: text
    content: You will need 75 pounds
  - type: note
    content: Hebrew 1 talent [34 kilograms].
  - type: text
    content: ' of pure gold for the lampstand and its accessories.'
  '4':
  - type: text
    content: blue, purple, and scarlet thread;
  - type: text
    content: fine linen and goat hair for cloth;
  '40':
  - type: text
    content: “Be sure that you make everything according to the pattern I have shown you here on the mountain.
  '5':
  - type: text
    content: tanned ram skins and fine goatskin leather;
  - type: text
    content: acacia wood;
  '6':
  - type: text
    content: olive oil for the lamps;
  - type: text
    content: spices for the anointing oil and the fragrant incense;
  '7':
  - type: text
    content: onyx stones, and other gemstones to be set in the ephod and the priest’s chestpiece.
  '8':
  - type: text
    content: '“Have the people of Israel build me a holy sanctuary so I can live among them. '
  '9':
  - type: text
    content: You must build this Tabernacle and its furnishings exactly according to the pattern I will show you.
  - type: heading
    content: Plans for the Ark of the Covenant
