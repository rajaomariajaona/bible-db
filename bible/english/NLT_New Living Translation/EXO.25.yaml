document_id: EXO.25,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Offerings for the Tabernacle
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Have the people make an Ark of acacia wood—a sacred chest 45 inches long, 27 inches wide, and 27 inches high.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2.5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[115 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long, 1.5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[69 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wide, and 1.5 cubits high.
      marker-yv: yv-n
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Overlay it inside and outside with pure gold, and run a molding of gold all around it. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Cast four gold rings and attach them to its four feet, two rings on each side. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Make poles from acacia wood, and overlay them with gold. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Insert the poles into the rings at the sides of the Ark to carry it. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'These carrying poles must stay inside the rings; never remove them. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When the Ark is finished, place inside it the stone tablets inscribed with the terms of the covenant,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Place inside the Ark the Testimony; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'similarly in 25:21. The Hebrew word for “testimony” refers to the terms of the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ’s covenant with Israel as written on stone tablets, and also to the covenant itself.
      marker-yv: yv-n
    - type: text
      text: ' which I will give to you.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Then make the Ark’s cover—the place of atonement—from pure gold. It must be 45 inches long and 27 inches wide.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2.5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[115 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long and 1.5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[69 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wide.
      marker-yv: yv-n
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then make two cherubim from hammered gold, and place them on the two ends of the atonement cover. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mold the cherubim on each end of the atonement cover, making it all of one piece of gold. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Tell the people of Israel to bring me their sacred offerings. Accept the contributions from all whose hearts are moved to offer them. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The cherubim will face each other and look down on the atonement cover. With their wings spread above it, they will protect it. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Place inside the Ark the stone tablets inscribed with the terms of the covenant, which I will give to you. Then put the atonement cover on top of the Ark. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: I will meet with you there and talk to you from above the atonement cover between the gold cherubim that hover over the Ark of the Covenant.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ark of the Testimony.
      marker-yv: yv-n
    - type: text
      text: ' From there I will give you my commands for the people of Israel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plans for the Table
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “Then make a table of acacia wood, 36 inches long, 18 inches wide, and 27 inches high.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[92 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long, 1 cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[46 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'wide, and 1.5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[69 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: high.
      marker-yv: yv-n
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Overlay it with pure gold and run a gold molding around the edge. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Decorate it with a 3-inch border
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a border of a handbreadth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[8 centimeters].'
      marker-yv: yv-n
    - type: text
      text: ' all around, and run a gold molding along the border. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Make four gold rings for the table and attach them at the four corners next to the four legs. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Attach the rings near the border to hold the poles that are used to carry the table. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Make these poles from acacia wood, and overlay them with gold. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Make special containers of pure gold for the table—bowls, ladles, pitchers, and jars—to be used in pouring out liquid offerings. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Here is a list of sacred offerings you may accept from them:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: gold, silver, and bronze;
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Place the Bread of the Presence on the table to remain before me at all times.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plans for the Lampstand
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '“Make a lampstand of pure, hammered gold. Make the entire lampstand and its decorations of one piece—the base, center stem, lamp cups, buds, and petals. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Make it with six branches going out from the center stem, three on each side. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Each of the six branches will have three lamp cups shaped like almond blossoms, complete with buds and petals. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Craft the center stem of the lampstand with four lamp cups shaped like almond blossoms, complete with buds and petals. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'There will also be an almond bud beneath each pair of branches where the six branches extend from the center stem. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'The almond buds and branches must all be of one piece with the center stem, and they must be hammered from pure gold. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Then make the seven lamps for the lampstand, and set them so they reflect their light forward. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'The lamp snuffers and trays must also be made of pure gold. '
  '39':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: You will need 75 pounds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 talent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[34 kilograms].'
      marker-yv: yv-n
    - type: text
      text: ' of pure gold for the lampstand and its accessories.'
  '4':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: blue, purple, and scarlet thread;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: fine linen and goat hair for cloth;
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: “Be sure that you make everything according to the pattern I have shown you here on the mountain.
  '5':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: tanned ram skins and fine goatskin leather;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: acacia wood;
  '6':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: olive oil for the lamps;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: spices for the anointing oil and the fragrant incense;
  '7':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: onyx stones, and other gemstones to be set in the ephod and the priest’s chestpiece.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“Have the people of Israel build me a holy sanctuary so I can live among them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You must build this Tabernacle and its furnishings exactly according to the pattern I will show you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plans for the Ark of the Covenant
    marker-yv: yv-h
