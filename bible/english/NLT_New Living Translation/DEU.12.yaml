document_id: DEU.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Chosen Place for Worship
  - type: text
    content: '“These are the decrees and regulations you must be careful to obey when you live in the land that the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestors, is giving you. You must obey them as long as you live.'
  '10':
  - type: text
    content: 'But you will soon cross the Jordan River and live in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you. When he gives you rest from all your enemies and you’re living safely in the land, '
  '11':
  - type: text
    content: 'you must bring everything I command you—your burnt offerings, your sacrifices, your tithes, your sacred offerings, and your offerings to fulfill a vow—to the designated place of worship, the place the '
  - type: text
    content: Lord
  - type: text
    content: ' your God chooses for his name to be honored.'
  '12':
  - type: text
    content: '“You must celebrate there in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with your sons and daughters and all your servants. And remember to include the Levites who live in your towns, for they will receive no allotment of land among you. '
  '13':
  - type: text
    content: 'Be careful not to sacrifice your burnt offerings just anywhere you like. '
  '14':
  - type: text
    content: 'You may do so only at the place the '
  - type: text
    content: Lord
  - type: text
    content: ' will choose within one of your tribal territories. There you must offer your burnt offerings and do everything I command you.'
  '15':
  - type: text
    content: '“But you may butcher your animals and eat their meat in any town whenever you want. You may freely eat the animals with which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God blesses you. All of you, whether ceremonially clean or unclean, may eat that meat, just as you now eat gazelle and deer. '
  '16':
  - type: text
    content: But you must not consume the blood. You must pour it out on the ground like water.
  '17':
  - type: text
    content: '“But you may not eat your offerings in your hometown—neither the tithe of your grain and new wine and olive oil, nor the firstborn of your flocks and herds, nor any offering to fulfill a vow, nor your voluntary offerings, nor your sacred offerings. '
  '18':
  - type: text
    content: 'You must eat these in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God at the place he will choose. Eat them there with your children, your servants, and the Levites who live in your towns, celebrating in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in all you do. '
  '19':
  - type: text
    content: And be very careful never to neglect the Levites as long as you live in your land.
  '2':
  - type: text
    content: '“When you drive out the nations that live there, you must destroy all the places where they worship their gods—high on the mountains, up on the hills, and under every green tree. '
  '20':
  - type: text
    content: '“When the '
  - type: text
    content: Lord
  - type: text
    content: ' your God expands your territory as he has promised, and you have the urge to eat meat, you may freely eat meat whenever you want. '
  '21':
  - type: text
    content: 'It might happen that the designated place of worship—the place the '
  - type: text
    content: Lord
  - type: text
    content: ' your God chooses for his name to be honored—is a long way from your home. If so, you may butcher any of the cattle, sheep, or goats the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you, and you may freely eat the meat in your hometown, as I have commanded you. '
  '22':
  - type: text
    content: 'Anyone, whether ceremonially clean or unclean, may eat that meat, just as you do now with gazelle and deer. '
  '23':
  - type: text
    content: 'But never consume the blood, for the blood is the life, and you must not consume the lifeblood with the meat. '
  '24':
  - type: text
    content: 'Instead, pour out the blood on the ground like water. '
  '25':
  - type: text
    content: 'Do not consume the blood, so that all may go well with you and your children after you, because you will be doing what pleases the '
  - type: text
    content: Lord
  - type: text
    content: .
  '26':
  - type: text
    content: '“Take your sacred gifts and your offerings given to fulfill a vow to the place the '
  - type: text
    content: Lord
  - type: text
    content: ' chooses. '
  '27':
  - type: text
    content: 'You must offer the meat and blood of your burnt offerings on the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. The blood of your other sacrifices must be poured out on the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, but you may eat the meat. '
  '28':
  - type: text
    content: 'Be careful to obey all my commands, so that all will go well with you and your children after you, because you will be doing what is good and pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '29':
  - type: text
    content: '“When the '
  - type: text
    content: Lord
  - type: text
    content: ' your God goes ahead of you and destroys the nations and you drive them out and live in their land, '
  '3':
  - type: text
    content: Break down their altars and smash their sacred pillars. Burn their Asherah poles and cut down their carved idols. Completely erase the names of their gods!
  '30':
  - type: text
    content: 'do not fall into the trap of following their customs and worshiping their gods. Do not inquire about their gods, saying, ‘How do these nations worship their gods? I want to follow their example.’ '
  '31':
  - type: text
    content: 'You must not worship the '
  - type: text
    content: Lord
  - type: text
    content: ' your God the way the other nations worship their gods, for they perform for their gods every detestable act that the '
  - type: text
    content: Lord
  - type: text
    content: ' hates. They even burn their sons and daughters as sacrifices to their gods.'
  '32':
  - type: text
    content: ' '
  - type: note
    content: Verse 12:32 is numbered 13:1 in Hebrew text.
  - type: text
    content: “So be careful to obey all the commands I give you. You must not add anything to them or subtract anything from them.
  '4':
  - type: text
    content: '“Do not worship the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in the way these pagan peoples worship their gods. '
  '5':
  - type: text
    content: 'Rather, you must seek the '
  - type: text
    content: Lord
  - type: text
    content: ' your God at the place of worship he himself will choose from among all the tribes—the place where his name will be honored. '
  '6':
  - type: text
    content: 'There you will bring your burnt offerings, your sacrifices, your tithes, your sacred offerings, your offerings to fulfill a vow, your voluntary offerings, and your offerings of the firstborn animals of your herds and flocks. '
  '7':
  - type: text
    content: 'There you and your families will feast in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and you will rejoice in all you have accomplished because the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has blessed you.'
  '8':
  - type: text
    content: '“Your pattern of worship will change. Today all of you are doing as you please, '
  '9':
  - type: text
    content: 'because you have not yet arrived at the place of rest, the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you as your special possession. '
