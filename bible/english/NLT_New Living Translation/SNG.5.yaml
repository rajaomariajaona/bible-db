document_id: SNG.5
type_code: eng
segments:
- type: usfm
  marker: sp
  children:
  - type: text
    text: Young Man
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I have entered my garden, my treasure,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'my sister; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 5:2.
    marker-yv: yv-n
  - type: text
    text: ' my bride!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I gather myrrh with my spices
- type: usfm
  marker: q1
  children:
  - type: text
    text: and eat honeycomb with my honey.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I drink wine with my milk.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Young Women of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh, lover and beloved, eat and drink!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, drink deeply of your love!
- type: usfm
  marker: sp
  children:
  - type: text
    text: Young Woman
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I slept, but my heart was awake,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'when I heard my lover knocking and calling:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Open to me, my treasure, my darling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my dove, my perfect one.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My head is drenched with dew,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my hair with the dampness of the night.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But I responded,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I have taken off my robe.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Should I get dressed again?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have washed my feet.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Should I get them soiled?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: My lover tried to unlatch the door,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my heart thrilled within me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I jumped up to open the door for my love,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my hands dripped with perfume.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My fingers dripped with lovely myrrh
- type: usfm
  marker: q2
  children:
  - type: text
    text: as I pulled back the bolt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I opened to my lover,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he was gone!
- type: usfm
  marker: q2
  children:
  - type: text
    text: My heart sank.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I searched for him
- type: usfm
  marker: q2
  children:
  - type: text
    text: but could not find him anywhere.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I called to him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but there was no reply.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The night watchmen found me
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they made their rounds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They beat and bruised me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stripped off my veil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those watchmen on the walls.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Make this promise, O women of Jerusalem—
- type: usfm
  marker: q2
  children:
  - type: text
    text: If you find my lover,
- type: usfm
  marker: q2
  children:
  - type: text
    text: tell him I am weak with love.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Young Women of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Why is your lover better than all others,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O woman of rare beauty?
- type: usfm
  marker: q1
  children:
  - type: text
    text: What makes your lover so special
- type: usfm
  marker: q2
  children:
  - type: text
    text: that we must promise this?
- type: usfm
  marker: sp
  children:
  - type: text
    text: Young Woman
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: My lover is dark and dazzling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: better than ten thousand others!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: His head is finest gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his wavy hair is black as a raven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: His eyes sparkle like doves
- type: usfm
  marker: q2
  children:
  - type: text
    text: beside springs of water;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they are set like jewels
- type: usfm
  marker: q2
  children:
  - type: text
    text: washed in milk.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: His cheeks are like gardens of spices
- type: usfm
  marker: q2
  children:
  - type: text
    text: giving off fragrance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His lips are like lilies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: perfumed with myrrh.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: His arms are like rounded bars of gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: set with beryl.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His body is like bright ivory,
- type: usfm
  marker: q2
  children:
  - type: text
    text: glowing with lapis lazuli.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: His legs are like marble pillars
- type: usfm
  marker: q2
  children:
  - type: text
    text: set in sockets of finest gold.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His posture is stately,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the noble cedars of Lebanon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: His mouth is sweetness itself;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is desirable in every way.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Such, O women of Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: is my lover, my friend.
