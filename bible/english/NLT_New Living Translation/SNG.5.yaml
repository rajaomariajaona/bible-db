document_id: SNG.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Young Man
  - type: text
    content: I have entered my garden, my treasure,
  - type: note
    content: Hebrew my sister; also in 5:2.
  - type: text
    content: ' my bride!'
  - type: text
    content: I gather myrrh with my spices
  - type: text
    content: and eat honeycomb with my honey.
  - type: text
    content: I drink wine with my milk.
  - type: heading
    content: Young Women of Jerusalem
  - type: text
    content: Oh, lover and beloved, eat and drink!
  - type: text
    content: Yes, drink deeply of your love!
  - type: heading
    content: Young Woman
  '10':
  - type: text
    content: My lover is dark and dazzling,
  - type: text
    content: better than ten thousand others!
  '11':
  - type: text
    content: His head is finest gold,
  - type: text
    content: his wavy hair is black as a raven.
  '12':
  - type: text
    content: His eyes sparkle like doves
  - type: text
    content: beside springs of water;
  - type: text
    content: they are set like jewels
  - type: text
    content: washed in milk.
  '13':
  - type: text
    content: His cheeks are like gardens of spices
  - type: text
    content: giving off fragrance.
  - type: text
    content: His lips are like lilies,
  - type: text
    content: perfumed with myrrh.
  '14':
  - type: text
    content: His arms are like rounded bars of gold,
  - type: text
    content: set with beryl.
  - type: text
    content: His body is like bright ivory,
  - type: text
    content: glowing with lapis lazuli.
  '15':
  - type: text
    content: His legs are like marble pillars
  - type: text
    content: set in sockets of finest gold.
  - type: text
    content: His posture is stately,
  - type: text
    content: like the noble cedars of Lebanon.
  '16':
  - type: text
    content: His mouth is sweetness itself;
  - type: text
    content: he is desirable in every way.
  - type: text
    content: Such, O women of Jerusalem,
  - type: text
    content: is my lover, my friend.
  '2':
  - type: text
    content: I slept, but my heart was awake,
  - type: text
    content: 'when I heard my lover knocking and calling:'
  - type: text
    content: “Open to me, my treasure, my darling,
  - type: text
    content: my dove, my perfect one.
  - type: text
    content: My head is drenched with dew,
  - type: text
    content: my hair with the dampness of the night.”
  '3':
  - type: text
    content: But I responded,
  - type: text
    content: “I have taken off my robe.
  - type: text
    content: Should I get dressed again?
  - type: text
    content: I have washed my feet.
  - type: text
    content: Should I get them soiled?”
  '4':
  - type: text
    content: My lover tried to unlatch the door,
  - type: text
    content: and my heart thrilled within me.
  '5':
  - type: text
    content: I jumped up to open the door for my love,
  - type: text
    content: and my hands dripped with perfume.
  - type: text
    content: My fingers dripped with lovely myrrh
  - type: text
    content: as I pulled back the bolt.
  '6':
  - type: text
    content: I opened to my lover,
  - type: text
    content: but he was gone!
  - type: text
    content: My heart sank.
  - type: text
    content: I searched for him
  - type: text
    content: but could not find him anywhere.
  - type: text
    content: I called to him,
  - type: text
    content: but there was no reply.
  '7':
  - type: text
    content: The night watchmen found me
  - type: text
    content: as they made their rounds.
  - type: text
    content: They beat and bruised me
  - type: text
    content: and stripped off my veil,
  - type: text
    content: those watchmen on the walls.
  '8':
  - type: text
    content: Make this promise, O women of Jerusalem—
  - type: text
    content: If you find my lover,
  - type: text
    content: tell him I am weak with love.
  - type: heading
    content: Young Women of Jerusalem
  '9':
  - type: text
    content: Why is your lover better than all others,
  - type: text
    content: O woman of rare beauty?
  - type: text
    content: What makes your lover so special
  - type: text
    content: that we must promise this?
  - type: heading
    content: Young Woman
