document_id: JER.47,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message about Philistia
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s message to the prophet Jeremiah concerning the Philistines of Gaza, before it was captured by the Egyptian army. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A flood is coming from the north
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to overflow the land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will destroy the land and everything in it—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cities and people alike.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People will scream in terror,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and everyone in the land will wail.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear the clatter of stallions’ hooves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the rumble of wheels as the chariots rush by.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Terrified fathers run madly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without a backward glance at their helpless children.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The time has come for the Philistines to be destroyed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: along with their allies from Tyre and Sidon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is destroying the remnant of the Philistines,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those colonists from the island of Crete.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from Caphtor.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gaza will be humiliated, its head shaved bald;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ashkelon will lie silent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You remnant from the Mediterranean coast,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '47:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the plain.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how long will you cut yourselves in mourning?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Now, O sword of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when will you be at rest again?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go back into your sheath;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rest and be still.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But how can it be still
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sent it on a mission?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the city of Ashkelon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the people living along the sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: must be destroyed.”
