document_id: JER.47,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Philistia
  - type: text
    content: 'This is the '
  - type: text
    content: Lord
  - type: text
    content: '’s message to the prophet Jeremiah concerning the Philistines of Gaza, before it was captured by the Egyptian army. '
  '2':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “A flood is coming from the north
  - type: text
    content: to overflow the land.
  - type: text
    content: It will destroy the land and everything in it—
  - type: text
    content: cities and people alike.
  - type: text
    content: People will scream in terror,
  - type: text
    content: and everyone in the land will wail.
  '3':
  - type: text
    content: Hear the clatter of stallions’ hooves
  - type: text
    content: and the rumble of wheels as the chariots rush by.
  - type: text
    content: Terrified fathers run madly,
  - type: text
    content: without a backward glance at their helpless children.
  '4':
  - type: text
    content: “The time has come for the Philistines to be destroyed,
  - type: text
    content: along with their allies from Tyre and Sidon.
  - type: text
    content: 'Yes, the '
  - type: text
    content: Lord
  - type: text
    content: ' is destroying the remnant of the Philistines,'
  - type: text
    content: those colonists from the island of Crete.
  - type: note
    content: Hebrew from Caphtor.
  '5':
  - type: text
    content: Gaza will be humiliated, its head shaved bald;
  - type: text
    content: Ashkelon will lie silent.
  - type: text
    content: You remnant from the Mediterranean coast,
  - type: note
    content: Hebrew the plain.
  - type: text
    content: how long will you cut yourselves in mourning?
  '6':
  - type: text
    content: '“Now, O sword of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: when will you be at rest again?
  - type: text
    content: Go back into your sheath;
  - type: text
    content: rest and be still.
  '7':
  - type: text
    content: “But how can it be still
  - type: text
    content: 'when the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent it on a mission?'
  - type: text
    content: For the city of Ashkelon
  - type: text
    content: and the people living along the sea
  - type: text
    content: must be destroyed.”
