document_id: DEU.25
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Suppose two people take a dispute to court, and the judges declare that one is right and the other is wrong. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'If the person in the wrong is sentenced to be flogged, the judge must command him to lie down and be beaten in his presence with the number of lashes appropriate to the crime. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But never give more than forty lashes; more than forty lashes would publicly humiliate your neighbor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “You must not muzzle an ox to keep it from eating as it treads out the grain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“If two brothers are living together on the same property and one of them dies without a son, his widow may not be married to anyone from outside the family. Instead, her husband’s brother should marry her and have intercourse with her to fulfill the duties of a brother-in-law. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The first son she bears to him will be considered the son of the dead brother, so that his name will not be forgotten in Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“But if the man refuses to marry his brother’s widow, she must go to the town gate and say to the elders assembled there, ‘My husband’s brother refuses to preserve his brother’s name in Israel—he refuses to fulfill the duties of a brother-in-law by marrying me.’ '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The elders of the town will then summon him and talk with him. If he still refuses and says, ‘I don’t want to marry her,’ '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'the widow must walk over to him in the presence of the elders, pull his sandal from his foot, and spit in his face. Then she must declare, ‘This is what happens to a man who refuses to provide his brother with children.’ '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ever afterward in Israel his family will be referred to as ‘the family of the man whose sandal was pulled off’!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“If two Israelite men get into a fight and the wife of one tries to rescue her husband by grabbing the testicles of the other man, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: you must cut off her hand. Show her no pity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“You must use accurate scales when you weigh out merchandise, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and you must use full and honest measures. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Yes, always use honest weights and measures, so that you may enjoy a long life in the land the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is giving you. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'All who cheat with dishonest weights and measures are detestable to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Never forget what the Amalekites did to you as you came from Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They attacked you when you were exhausted and weary, and they struck down those who were straggling behind. They had no fear of God. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Therefore, when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God has given you rest from all your enemies in the land he is giving you as a special possession, you must destroy the Amalekites and erase their memory from under heaven. Never forget this!'
