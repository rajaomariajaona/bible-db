document_id: LUK.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals on the Sabbath
  - type: text
    content: 'One Sabbath day Jesus went to eat dinner in the home of a leader of the Pharisees, and the people were watching him closely. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: “Instead, take the lowest place at the foot of the table. Then when your host sees you, he will come and say, ‘Friend, we have a better place for you!’ Then you will be honored in front of all the other guests.
  - type: text
    content: ' '
  '11':
  - type: text
    content: For those who exalt themselves will be humbled, and those who humble themselves will be exalted.”
  '12':
  - type: text
    content: 'Then he turned to his host. '
  - type: text
    content: '“When you put on a luncheon or a banquet,” '
  - type: text
    content: 'he said, '
  - type: text
    content: “don’t invite your friends, brothers, relatives, and rich neighbors. For they will invite you back, and that will be your only reward.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Instead, invite the poor, the crippled, the lame, and the blind.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Then at the resurrection of the righteous, God will reward you for inviting those who could not repay you.”
  - type: heading
    content: Parable of the Great Feast
  '15':
  - type: text
    content: Hearing this, a man sitting at the table with Jesus exclaimed, “What a blessing it will be to attend a banquet
  - type: note
    content: Greek to eat bread.
  - type: text
    content: ' in the Kingdom of God!”'
  '16':
  - type: text
    content: 'Jesus replied with this story: '
  - type: text
    content: “A man prepared a great feast and sent out many invitations.
  - type: text
    content: ' '
  '17':
  - type: text
    content: When the banquet was ready, he sent his servant to tell the guests, ‘Come, the banquet is ready.’
  - type: text
    content: ' '
  '18':
  - type: text
    content: But they all began making excuses. One said, ‘I have just bought a field and must inspect it. Please excuse me.’
  - type: text
    content: ' '
  '19':
  - type: text
    content: Another said, ‘I have just bought five pairs of oxen, and I want to try them out. Please excuse me.’
  - type: text
    content: ' '
  '2':
  - type: text
    content: There was a man there whose arms and legs were swollen.
  - type: note
    content: Or who had dropsy.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Another said, ‘I just got married, so I can’t come.’
  '21':
  - type: text
    content: ' '
  - type: text
    content: “The servant returned and told his master what they had said. His master was furious and said, ‘Go quickly into the streets and alleys of the town and invite the poor, the crippled, the blind, and the lame.’
  - type: text
    content: ' '
  '22':
  - type: text
    content: After the servant had done this, he reported, ‘There is still room for more.’
  - type: text
    content: ' '
  '23':
  - type: text
    content: So his master said, ‘Go out into the country lanes and behind the hedges and urge anyone you find to come, so that the house will be full.
  - type: text
    content: ' '
  '24':
  - type: text
    content: For none of those I first invited will get even the smallest taste of my banquet.’”
  - type: heading
    content: The Cost of Being a Disciple
  '25':
  - type: text
    content: 'A large crowd was following Jesus. He turned around and said to them, '
  '26':
  - type: text
    content: “If you want to be my disciple, you must, by comparison, hate everyone else—your father and mother, wife and children, brothers and sisters—yes, even your own life. Otherwise, you cannot be my disciple.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And if you do not carry your own cross and follow me, you cannot be my disciple.
  '28':
  - type: text
    content: ' '
  - type: text
    content: “But don’t begin until you count the cost. For who would begin construction of a building without first calculating the cost to see if there is enough money to finish it?
  - type: text
    content: ' '
  '29':
  - type: text
    content: Otherwise, you might complete only the foundation before running out of money, and then everyone would laugh at you.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Jesus asked the Pharisees and experts in religious law, '
  - type: text
    content: “Is it permitted in the law to heal people on the Sabbath day, or not?”
  - type: text
    content: ' '
  '30':
  - type: text
    content: They would say, ‘There’s the person who started that building and couldn’t afford to finish it!’
  '31':
  - type: text
    content: ' '
  - type: text
    content: “Or what king would go to war against another king without first sitting down with his counselors to discuss whether his army of 10,000 could defeat the 20,000 soldiers marching against him?
  - type: text
    content: ' '
  '32':
  - type: text
    content: And if he can’t, he will send a delegation to discuss terms of peace while the enemy is still far away.
  - type: text
    content: ' '
  '33':
  - type: text
    content: So you cannot become my disciple without giving up everything you own.
  '34':
  - type: text
    content: ' '
  - type: text
    content: “Salt is good for seasoning. But if it loses its flavor, how do you make it salty again?
  - type: text
    content: ' '
  '35':
  - type: text
    content: Flavorless salt is good neither for the soil nor for the manure pile. It is thrown away. Anyone with ears to hear should listen and understand!”
  '4':
  - type: text
    content: 'When they refused to answer, Jesus touched the sick man and healed him and sent him away. '
  '5':
  - type: text
    content: 'Then he turned to them and said, '
  - type: text
    content: “Which of you doesn’t work on the Sabbath? If your son
  - type: note
    content: Some manuscripts read donkey.
  - type: text
    content: ' '
  - type: text
    content: or your cow falls into a pit, don’t you rush to get him out?”
  - type: text
    content: ' '
  '6':
  - type: text
    content: Again they could not answer.
  - type: heading
    content: Jesus Teaches about Humility
  '7':
  - type: text
    content: 'When Jesus noticed that all who had come to the dinner were trying to sit in the seats of honor near the head of the table, he gave them this advice: '
  '8':
  - type: text
    content: “When you are invited to a wedding feast, don’t sit in the seat of honor. What if someone who is more distinguished than you has also been invited?
  - type: text
    content: ' '
  '9':
  - type: text
    content: The host will come and say, ‘Give this person your seat.’ Then you will be embarrassed, and you will have to take whatever seat is left at the foot of the table!
