document_id: 2CO.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Treasure in Fragile Clay Jars
  - type: text
    content: Therefore, since God in his mercy has given us this new way,
  - type: note
    content: Or ministry.
  - type: text
    content: ' we never give up. '
  '10':
  - type: text
    content: Through suffering, our bodies continue to share in the death of Jesus so that the life of Jesus may also be seen in our bodies.
  '11':
  - type: text
    content: 'Yes, we live under constant danger of death because we serve Jesus, so that the life of Jesus will be evident in our dying bodies. '
  '12':
  - type: text
    content: So we live in the face of death, but this has resulted in eternal life for you.
  '13':
  - type: text
    content: But we continue to preach because we have the same kind of faith the psalmist had when he said, “I believed in God, so I spoke.”
  - type: note
    content: Ps 116:10.
  - type: text
    content: ' '
  '14':
  - type: text
    content: We know that God, who raised the Lord Jesus,
  - type: note
    content: Some manuscripts read who raised Jesus.
  - type: text
    content: ' will also raise us with Jesus and present us to himself together with you. '
  '15':
  - type: text
    content: All of this is for your benefit. And as God’s grace reaches more and more people, there will be great thanksgiving, and God will receive more and more glory.
  '16':
  - type: text
    content: That is why we never give up. Though our bodies are dying, our spirits are
  - type: note
    content: Greek our inner being is.
  - type: text
    content: ' being renewed every day. '
  '17':
  - type: text
    content: 'For our present troubles are small and won’t last very long. Yet they produce for us a glory that vastly outweighs them and will last forever! '
  '18':
  - type: text
    content: So we don’t look at the troubles we can see now; rather, we fix our gaze on things that cannot be seen. For the things we see now will soon be gone, but the things we cannot see will last forever.
  '2':
  - type: text
    content: We reject all shameful deeds and underhanded methods. We don’t try to trick anyone or distort the word of God. We tell the truth before God, and all who are honest know this.
  '3':
  - type: text
    content: 'If the Good News we preach is hidden behind a veil, it is hidden only from people who are perishing. '
  '4':
  - type: text
    content: Satan, who is the god of this world, has blinded the minds of those who don’t believe. They are unable to see the glorious light of the Good News. They don’t understand this message about the glory of Christ, who is the exact likeness of God.
  '5':
  - type: text
    content: 'You see, we don’t go around preaching about ourselves. We preach that Jesus Christ is Lord, and we ourselves are your servants for Jesus’ sake. '
  '6':
  - type: text
    content: For God, who said, “Let there be light in the darkness,” has made this light shine in our hearts so we could know the glory of God that is seen in the face of Jesus Christ.
  '7':
  - type: text
    content: We now have this light shining in our hearts, but we ourselves are like fragile clay jars containing this great treasure.
  - type: note
    content: Greek We now have this treasure in clay jars.
  - type: text
    content: ' This makes it clear that our great power is from God, not from ourselves.'
  '8':
  - type: text
    content: 'We are pressed on every side by troubles, but we are not crushed. We are perplexed, but not driven to despair. '
  '9':
  - type: text
    content: 'We are hunted down, but never abandoned by God. We get knocked down, but we are not destroyed. '
