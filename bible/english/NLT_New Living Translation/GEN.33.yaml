document_id: GEN.33,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob and Esau Make Peace
  - type: text
    content: 'Then Jacob looked up and saw Esau coming with his 400 men. So he divided the children among Leah, Rachel, and his two servant wives. '
  '10':
  - type: text
    content: 'But Jacob insisted, “No, if I have found favor with you, please accept this gift from me. And what a relief to see your friendly smile. It is like seeing the face of God! '
  '11':
  - type: text
    content: Please take this gift I have brought you, for God has been very gracious to me. I have more than enough.” And because Jacob insisted, Esau finally accepted the gift.
  '12':
  - type: text
    content: “Well,” Esau said, “let’s be going. I will lead the way.”
  '13':
  - type: text
    content: 'But Jacob replied, “You can see, my lord, that some of the children are very young, and the flocks and herds have their young, too. If they are driven too hard, even for one day, all the animals could die. '
  '14':
  - type: text
    content: Please, my lord, go ahead of your servant. We will follow slowly, at a pace that is comfortable for the livestock and the children. I will meet you at Seir.”
  '15':
  - type: text
    content: “All right,” Esau said, “but at least let me assign some of my men to guide and protect you.”
  - type: text
    content: Jacob responded, “That’s not necessary. It’s enough that you’ve received me warmly, my lord!”
  '16':
  - type: text
    content: 'So Esau turned around and started back to Seir that same day. '
  '17':
  - type: text
    content: Jacob, on the other hand, traveled on to Succoth. There he built himself a house and made shelters for his livestock. That is why the place was named Succoth (which means “shelters”).
  '18':
  - type: text
    content: 'Later, having traveled all the way from Paddan-aram, Jacob arrived safely at the town of Shechem, in the land of Canaan. There he set up camp outside the town. '
  '19':
  - type: text
    content: Jacob bought the plot of land where he camped from the family of Hamor, the father of Shechem, for 100 pieces of silver.
  - type: note
    content: Hebrew 100 kesitahs; the value or weight of the kesitah is no longer known.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'He put the servant wives and their children at the front, Leah and her children next, and Rachel and Joseph last. '
  '20':
  - type: text
    content: And there he built an altar and named it El-Elohe-Israel.
  - type: note
    content: El-Elohe-Israel means “God, the God of Israel.”
  '3':
  - type: text
    content: 'Then Jacob went on ahead. As he approached his brother, he bowed to the ground seven times before him. '
  '4':
  - type: text
    content: Then Esau ran to meet him and embraced him, threw his arms around his neck, and kissed him. And they both wept.
  '5':
  - type: text
    content: Then Esau looked at the women and children and asked, “Who are these people with you?”
  - type: text
    content: '“These are the children God has graciously given to me, your servant,” Jacob replied. '
  '6':
  - type: text
    content: 'Then the servant wives came forward with their children and bowed before him. '
  '7':
  - type: text
    content: Next came Leah with her children, and they bowed before him. Finally, Joseph and Rachel came forward and bowed before him.
  '8':
  - type: text
    content: “And what were all the flocks and herds I met as I came?” Esau asked.
  - type: text
    content: Jacob replied, “They are a gift, my lord, to ensure your friendship.”
  '9':
  - type: text
    content: “My brother, I have plenty,” Esau answered. “Keep what you have for yourself.”
