document_id: GEN.33
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob and Esau Make Peace
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Jacob looked up and saw Esau coming with his 400 men. So he divided the children among Leah, Rachel, and his two servant wives. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He put the servant wives and their children at the front, Leah and her children next, and Rachel and Joseph last. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Jacob went on ahead. As he approached his brother, he bowed to the ground seven times before him. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then Esau ran to meet him and embraced him, threw his arms around his neck, and kissed him. And they both wept.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then Esau looked at the women and children and asked, “Who are these people with you?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“These are the children God has graciously given to me, your servant,” Jacob replied. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the servant wives came forward with their children and bowed before him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Next came Leah with her children, and they bowed before him. Finally, Joseph and Rachel came forward and bowed before him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “And what were all the flocks and herds I met as I came?” Esau asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: Jacob replied, “They are a gift, my lord, to ensure your friendship.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “My brother, I have plenty,” Esau answered. “Keep what you have for yourself.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But Jacob insisted, “No, if I have found favor with you, please accept this gift from me. And what a relief to see your friendly smile. It is like seeing the face of God! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Please take this gift I have brought you, for God has been very gracious to me. I have more than enough.” And because Jacob insisted, Esau finally accepted the gift.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Well,” Esau said, “let’s be going. I will lead the way.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But Jacob replied, “You can see, my lord, that some of the children are very young, and the flocks and herds have their young, too. If they are driven too hard, even for one day, all the animals could die. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Please, my lord, go ahead of your servant. We will follow slowly, at a pace that is comfortable for the livestock and the children. I will meet you at Seir.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “All right,” Esau said, “but at least let me assign some of my men to guide and protect you.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Jacob responded, “That’s not necessary. It’s enough that you’ve received me warmly, my lord!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Esau turned around and started back to Seir that same day. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Jacob, on the other hand, traveled on to Succoth. There he built himself a house and made shelters for his livestock. That is why the place was named Succoth (which means “shelters”).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Later, having traveled all the way from Paddan-aram, Jacob arrived safely at the town of Shechem, in the land of Canaan. There he set up camp outside the town. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Jacob bought the plot of land where he camped from the family of Hamor, the father of Shechem, for 100 pieces of silver.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '100 kesitahs; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: the value or weight of the kesitah is no longer known.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And there he built an altar and named it El-Elohe-Israel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:20 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'El-Elohe-Israel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “God, the God of Israel.”
    marker-yv: yv-n
