document_id: LEV.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Serious Skin Diseases
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses and Aaron, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the priest finds a white swelling on the skin, and some hair on the spot has turned white, and there is an open sore in the affected area, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: it is a chronic skin disease, and the priest must pronounce the person ceremonially unclean. In such cases the person need not be quarantined, for it is obvious that the skin is defiled by the disease.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now suppose the disease has spread all over the person’s skin, covering the body from head to foot. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the priest examines the infected person and finds that the disease covers the entire body, he will pronounce the person ceremonially clean. Since the skin has turned completely white, the person is clean. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if any open sores appear, the infected person will be pronounced ceremonially unclean. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priest must make this pronouncement as soon as he sees an open sore, since open sores indicate the presence of a skin disease. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, if the open sores heal and turn white like the rest of the skin, the person must return to the priest '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for another examination. If the affected areas have indeed turned white, the priest will then pronounce the person ceremonially clean by declaring, ‘You are clean!’
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If anyone has a boil on the skin that has started to heal, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but a white swelling or a reddish white spot develops in its place, that person must go to the priest to be examined. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “If anyone has a swelling or a rash or discolored skin that might develop into a serious skin disease,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:2a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traditionally rendered '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leprosy. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word used throughout this passage is used to describe various skin diseases.
      marker-yv: yv-n
    - type: text
      text: ' that person must be brought to Aaron the priest or to one of his sons.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:2b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: one of his descendants.
      marker-yv: yv-n
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the priest examines it and finds it to be more than skin-deep, and if the hair in the affected area has turned white, the priest must pronounce the person ceremonially unclean. The boil has become a serious skin disease. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if the priest finds no white hair on the affected area and the problem appears to be no more than skin-deep and has faded, the priest must quarantine the person for seven days. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If during that time the affected area spreads on the skin, the priest must pronounce the person ceremonially unclean, because it is a serious disease. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if the area grows no larger and does not spread, it is merely the scar from the boil, and the priest will pronounce the person ceremonially clean.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If anyone has suffered a burn on the skin and the burned area changes color, becoming either reddish white or shiny white, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the priest must examine it. If he finds that the hair in the affected area has turned white and the problem appears to be more than skin-deep, a skin disease has broken out in the burn. The priest must then pronounce the person ceremonially unclean, for it is clearly a serious skin disease. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if the priest finds no white hair on the affected area and the problem appears to be no more than skin-deep and has faded, the priest must quarantine the infected person for seven days. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the seventh day the priest must examine the person again. If the affected area has spread on the skin, the priest must pronounce that person ceremonially unclean, for it is clearly a serious skin disease. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if the affected area has not changed or spread on the skin and has faded, it is simply a swelling from the burn. The priest will then pronounce the person ceremonially clean, for it is only the scar from the burn.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If anyone, either a man or woman, has a sore on the head or chin, '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The priest will examine the affected area of the skin. If the hair in the affected area has turned white and the problem appears to be more than skin-deep, it is a serious skin disease, and the priest who examines it must pronounce the person ceremonially unclean.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the priest must examine it. If he finds it is more than skin-deep and has fine yellow hair on it, the priest must pronounce the person ceremonially unclean. It is a scabby sore of the head or chin. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the priest examines the scabby sore and finds that it is only skin-deep but there is no black hair on it, he must quarantine the person for seven days. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the seventh day the priest must examine the sore again. If he finds that the scabby sore has not spread, and there is no yellow hair on it, and it appears to be only skin-deep, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the person must shave off all hair except the hair on the affected area. Then the priest must quarantine the person for another seven days. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the seventh day he will examine the sore again. If it has not spread and appears to be no more than skin-deep, the priest will pronounce the person ceremonially clean. The person’s clothing must be washed, and the person will be ceremonially clean. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if the scabby sore begins to spread after the person is pronounced clean, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the priest must do another examination. If he finds that the sore has spread, the priest does not need to look for yellow hair. The infected person is ceremonially unclean. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if the color of the scabby sore does not change and black hair has grown on it, it has healed. The priest will then pronounce the person ceremonially clean.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If anyone, either a man or woman, has shiny white patches on the skin, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the priest must examine the affected area. If he finds that the shiny patches are only pale white, this is a harmless skin rash, and the person is ceremonially clean.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But if the affected area of the skin is only a white discoloration and does not appear to be more than skin-deep, and if the hair on the spot has not turned white, the priest will quarantine the person for seven days. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If a man loses his hair and his head becomes bald, he is still ceremonially clean. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if he loses hair on his forehead, he simply has a bald forehead; he is still clean. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, if a reddish white sore appears on the bald area on top of his head or on his forehead, this is a skin disease. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priest must examine him, and if he finds swelling around the reddish white sore anywhere on the man’s head and it looks like a skin disease, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the man is indeed infected with a skin disease and is unclean. The priest must pronounce him ceremonially unclean because of the sore on his head.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Those who suffer from a serious skin disease must tear their clothing and leave their hair uncombed.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:45 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and uncover their heads.
      marker-yv: yv-n
    - type: text
      text: ' They must cover their mouth and call out, ‘Unclean! Unclean!’ '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As long as the serious disease lasts, they will be ceremonially unclean. They must live in isolation in their place outside the camp.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Treatment of Contaminated Clothing
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “Now suppose mildew
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traditionally rendered '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leprosy. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew term used throughout this passage is the same term used for the various skin diseases described in 13:1-46.
      marker-yv: yv-n
    - type: text
      text: ' contaminates some woolen or linen clothing, '
  '48':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'woolen or linen fabric, the hide of an animal, or anything made of leather. '
  '49':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'If the contaminated area in the clothing, the animal hide, the fabric, or the leather article has turned greenish or reddish, it is contaminated with mildew and must be shown to the priest. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the seventh day the priest will make another examination. If he finds the affected area has not changed and the problem has not spread on the skin, the priest will quarantine the person for seven more days. '
  '50':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'After examining the affected spot, the priest will put the article in quarantine for seven days. '
  '51':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'On the seventh day the priest must inspect it again. If the contaminated area has spread, the clothing or fabric or leather is clearly contaminated by a serious mildew and is ceremonially unclean. '
  '52':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The priest must burn the item—the clothing, the woolen or linen fabric, or piece of leather—for it has been contaminated by a serious mildew. It must be completely destroyed by fire.
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But if the priest examines it and finds that the contaminated area has not spread in the clothing, the fabric, or the leather, '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the priest will order the object to be washed and then quarantined for seven more days. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the priest must examine the object again. If he finds that the contaminated area has not changed color after being washed, even if it did not spread, the object is defiled. It must be completely burned up, whether the contaminated spot
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:55 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' is on the inside or outside. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if the priest examines it and finds that the contaminated area has faded after being washed, he must cut the spot from the clothing, the fabric, or the leather. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the spot later reappears on the clothing, the fabric, or the leather article, the mildew is clearly spreading, and the contaminated object must be burned up. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if the spot disappears from the clothing, the fabric, or the leather article after it has been washed, it must be washed again; then it will be ceremonially clean.
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “These are the instructions for dealing with mildew that contaminates woolen or linen clothing or fabric or anything made of leather. This is how the priest will determine whether these items are ceremonially clean or unclean.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the seventh day the priest will make another examination. If he finds the affected area has faded and has not spread, the priest will pronounce the person ceremonially clean. It was only a rash. The person’s clothing must be washed, and the person will be ceremonially clean. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if the rash continues to spread after the person has been examined by the priest and has been pronounced clean, the infected person must return to be examined again. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If the priest finds that the rash has spread, he must pronounce the person ceremonially unclean, for it is indeed a skin disease.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Anyone who develops a serious skin disease must go to the priest for an examination. '
