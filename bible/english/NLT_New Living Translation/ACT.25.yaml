type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Appears before Festus
  - type: text
    content: 'Three days after Festus arrived in Caesarea to take over his new responsibilities, he left for Jerusalem, '
  '10':
  - type: text
    content: 'But Paul replied, “No! This is the official Roman court, so I ought to be tried right here. You know very well I am not guilty of harming the Jews. '
  '11':
  - type: text
    content: If I have done something worthy of death, I don’t refuse to die. But if I am innocent, no one has a right to turn me over to these men to kill me. I appeal to Caesar!”
  '12':
  - type: text
    content: Festus conferred with his advisers and then replied, “Very well! You have appealed to Caesar, and to Caesar you will go!”
  '13':
  - type: text
    content: A few days later King Agrippa arrived with his sister, Bernice,
  - type: note
    content: Greek Agrippa the king and Bernice arrived.
  - type: text
    content: ' to pay their respects to Festus. '
  '14':
  - type: text
    content: 'During their stay of several days, Festus discussed Paul’s case with the king. “There is a prisoner here,” he told him, “whose case was left for me by Felix. '
  '15':
  - type: text
    content: 'When I was in Jerusalem, the leading priests and Jewish elders pressed charges against him and asked me to condemn him. '
  '16':
  - type: text
    content: I pointed out to them that Roman law does not convict people without a trial. They must be given an opportunity to confront their accusers and defend themselves.
  '17':
  - type: text
    content: '“When his accusers came here for the trial, I didn’t delay. I called the case the very next day and ordered Paul brought in. '
  '18':
  - type: text
    content: 'But the accusations made against him weren’t any of the crimes I expected. '
  '19':
  - type: text
    content: 'Instead, it was something about their religion and a dead man named Jesus, who Paul insists is alive. '
  '2':
  - type: text
    content: 'where the leading priests and other Jewish leaders met with him and made their accusations against Paul. '
  '20':
  - type: text
    content: 'I was at a loss to know how to investigate these things, so I asked him whether he would be willing to stand trial on these charges in Jerusalem. '
  '21':
  - type: text
    content: But Paul appealed to have his case decided by the emperor. So I ordered that he be held in custody until I could arrange to send him to Caesar.”
  '22':
  - type: text
    content: “I’d like to hear the man myself,” Agrippa said.
  - type: text
    content: And Festus replied, “You will—tomorrow!”
  - type: heading
    content: Paul Speaks to Agrippa
  '23':
  - type: text
    content: 'So the next day Agrippa and Bernice arrived at the auditorium with great pomp, accompanied by military officers and prominent men of the city. Festus ordered that Paul be brought in. '
  '24':
  - type: text
    content: 'Then Festus said, “King Agrippa and all who are here, this is the man whose death is demanded by all the Jews, both here and in Jerusalem. '
  '25':
  - type: text
    content: But in my opinion he has done nothing deserving death. However, since he appealed his case to the emperor, I have decided to send him to Rome.
  '26':
  - type: text
    content: '“But what shall I write the emperor? For there is no clear charge against him. So I have brought him before all of you, and especially you, King Agrippa, so that after we examine him, I might have something to write. '
  '27':
  - type: text
    content: For it makes no sense to send a prisoner to the emperor without specifying the charges against him!”
  '3':
  - type: text
    content: 'They asked Festus as a favor to transfer Paul to Jerusalem (planning to ambush and kill him on the way). '
  '4':
  - type: text
    content: 'But Festus replied that Paul was at Caesarea and he himself would be returning there soon. '
  '5':
  - type: text
    content: So he said, “Those of you in authority can return with me. If Paul has done anything wrong, you can make your accusations.”
  '6':
  - type: text
    content: 'About eight or ten days later Festus returned to Caesarea, and on the following day he took his seat in court and ordered that Paul be brought in. '
  '7':
  - type: text
    content: When Paul arrived, the Jewish leaders from Jerusalem gathered around and made many serious accusations they couldn’t prove.
  '8':
  - type: text
    content: Paul denied the charges. “I am not guilty of any crime against the Jewish laws or the Temple or the Roman government,” he said.
  '9':
  - type: text
    content: Then Festus, wanting to please the Jews, asked him, “Are you willing to go to Jerusalem and stand trial before me there?”
