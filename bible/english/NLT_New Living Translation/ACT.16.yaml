document_id: ACT.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Second Missionary Journey
  - type: text
    content: 'Paul went first to Derbe and then to Lystra, where there was a young disciple named Timothy. His mother was a Jewish believer, but his father was a Greek. '
  '10':
  - type: text
    content: So we
  - type: note
    content: Luke, the writer of this book, here joined Paul and accompanied him on his journey.
  - type: text
    content: ' decided to leave for Macedonia at once, having concluded that God was calling us to preach the Good News there.'
  - type: heading
    content: Lydia of Philippi Believes in Jesus
  '11':
  - type: text
    content: 'We boarded a boat at Troas and sailed straight across to the island of Samothrace, and the next day we landed at Neapolis. '
  '12':
  - type: text
    content: From there we reached Philippi, a major city of that district of Macedonia and a Roman colony. And we stayed there several days.
  '13':
  - type: text
    content: 'On the Sabbath we went a little way outside the city to a riverbank, where we thought people would be meeting for prayer, and we sat down to speak with some women who had gathered there. '
  '14':
  - type: text
    content: 'One of them was Lydia from Thyatira, a merchant of expensive purple cloth, who worshiped God. As she listened to us, the Lord opened her heart, and she accepted what Paul was saying. '
  '15':
  - type: text
    content: She and her household were baptized, and she asked us to be her guests. “If you agree that I am a true believer in the Lord,” she said, “come and stay at my home.” And she urged us until we agreed.
  - type: heading
    content: Paul and Silas in Prison
  '16':
  - type: text
    content: 'One day as we were going down to the place of prayer, we met a slave girl who had a spirit that enabled her to tell the future. She earned a lot of money for her masters by telling fortunes. '
  '17':
  - type: text
    content: She followed Paul and the rest of us, shouting, “These men are servants of the Most High God, and they have come to tell you how to be saved.”
  '18':
  - type: text
    content: This went on day after day until Paul got so exasperated that he turned and said to the demon within her, “I command you in the name of Jesus Christ to come out of her.” And instantly it left her.
  '19':
  - type: text
    content: 'Her masters’ hopes of wealth were now shattered, so they grabbed Paul and Silas and dragged them before the authorities at the marketplace. '
  '2':
  - type: text
    content: Timothy was well thought of by the believers
  - type: note
    content: Greek brothers; also in 16:40.
  - type: text
    content: ' in Lystra and Iconium, '
  '20':
  - type: text
    content: '“The whole city is in an uproar because of these Jews!” they shouted to the city officials. '
  '21':
  - type: text
    content: “They are teaching customs that are illegal for us Romans to practice.”
  '22':
  - type: text
    content: 'A mob quickly formed against Paul and Silas, and the city officials ordered them stripped and beaten with wooden rods. '
  '23':
  - type: text
    content: 'They were severely beaten, and then they were thrown into prison. The jailer was ordered to make sure they didn’t escape. '
  '24':
  - type: text
    content: So the jailer put them into the inner dungeon and clamped their feet in the stocks.
  '25':
  - type: text
    content: 'Around midnight Paul and Silas were praying and singing hymns to God, and the other prisoners were listening. '
  '26':
  - type: text
    content: 'Suddenly, there was a massive earthquake, and the prison was shaken to its foundations. All the doors immediately flew open, and the chains of every prisoner fell off! '
  '27':
  - type: text
    content: 'The jailer woke up to see the prison doors wide open. He assumed the prisoners had escaped, so he drew his sword to kill himself. '
  '28':
  - type: text
    content: But Paul shouted to him, “Stop! Don’t kill yourself! We are all here!”
  '29':
  - type: text
    content: 'The jailer called for lights and ran to the dungeon and fell down trembling before Paul and Silas. '
  '3':
  - type: text
    content: 'so Paul wanted him to join them on their journey. In deference to the Jews of the area, he arranged for Timothy to be circumcised before they left, for everyone knew that his father was a Greek. '
  '30':
  - type: text
    content: Then he brought them out and asked, “Sirs, what must I do to be saved?”
  '31':
  - type: text
    content: 'They replied, “Believe in the Lord Jesus and you will be saved, along with everyone in your household.” '
  '32':
  - type: text
    content: 'And they shared the word of the Lord with him and with all who lived in his household. '
  '33':
  - type: text
    content: 'Even at that hour of the night, the jailer cared for them and washed their wounds. Then he and everyone in his household were immediately baptized. '
  '34':
  - type: text
    content: He brought them into his house and set a meal before them, and he and his entire household rejoiced because they all believed in God.
  '35':
  - type: text
    content: 'The next morning the city officials sent the police to tell the jailer, “Let those men go!” '
  '36':
  - type: text
    content: So the jailer told Paul, “The city officials have said you and Silas are free to leave. Go in peace.”
  '37':
  - type: text
    content: But Paul replied, “They have publicly beaten us without a trial and put us in prison—and we are Roman citizens. So now they want us to leave secretly? Certainly not! Let them come themselves to release us!”
  '38':
  - type: text
    content: 'When the police reported this, the city officials were alarmed to learn that Paul and Silas were Roman citizens. '
  '39':
  - type: text
    content: 'So they came to the jail and apologized to them. Then they brought them out and begged them to leave the city. '
  '4':
  - type: text
    content: 'Then they went from town to town, instructing the believers to follow the decisions made by the apostles and elders in Jerusalem. '
  '40':
  - type: text
    content: When Paul and Silas left the prison, they returned to the home of Lydia. There they met with the believers and encouraged them once more. Then they left town.
  '5':
  - type: text
    content: So the churches were strengthened in their faith and grew larger every day.
  - type: heading
    content: A Call from Macedonia
  '6':
  - type: text
    content: 'Next Paul and Silas traveled through the area of Phrygia and Galatia, because the Holy Spirit had prevented them from preaching the word in the province of Asia at that time. '
  '7':
  - type: text
    content: Then coming to the borders of Mysia, they headed north for the province of Bithynia,
  - type: note
    content: Phrygia, Galatia, Asia, Mysia, and Bithynia were all districts in what is now Turkey.
  - type: text
    content: ' but again the Spirit of Jesus did not allow them to go there. '
  '8':
  - type: text
    content: So instead, they went on through Mysia to the seaport of Troas.
  '9':
  - type: text
    content: 'That night Paul had a vision: A man from Macedonia in northern Greece was standing there, pleading with him, “Come over to Macedonia and help us!” '
