document_id: MAT.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals a Man with Leprosy
  - type: text
    content: 'Large crowds followed Jesus as he came down the mountainside. '
  '10':
  - type: text
    content: 'When Jesus heard this, he was amazed. Turning to those who were following him, he said, '
  - type: text
    content: “I tell you the truth, I haven’t seen faith like this in all Israel!
  - type: text
    content: ' '
  '11':
  - type: text
    content: And I tell you this, that many Gentiles will come from all over the world—from east and west—and sit down with Abraham, Isaac, and Jacob at the feast in the Kingdom of Heaven.
  - type: text
    content: ' '
  '12':
  - type: text
    content: But many Israelites—those for whom the Kingdom was prepared—will be thrown into outer darkness, where there will be weeping and gnashing of teeth.”
  '13':
  - type: text
    content: 'Then Jesus said to the Roman officer, '
  - type: text
    content: “Go back home. Because you believed, it has happened.”
  - type: text
    content: ' And the young servant was healed that same hour.'
  - type: heading
    content: Jesus Heals Many People
  '14':
  - type: text
    content: 'When Jesus arrived at Peter’s house, Peter’s mother-in-law was sick in bed with a high fever. '
  '15':
  - type: text
    content: But when Jesus touched her hand, the fever left her. Then she got up and prepared a meal for him.
  '16':
  - type: text
    content: 'That evening many demon-possessed people were brought to Jesus. He cast out the evil spirits with a simple command, and he healed all the sick. '
  '17':
  - type: text
    content: This fulfilled the word of the Lord through the prophet Isaiah, who said,
  - type: text
    content: “He took our sicknesses
  - type: text
    content: and removed our diseases.”
  - type: note
    content: Isa 53:4.
  - type: heading
    content: The Cost of Following Jesus
  '18':
  - type: text
    content: When Jesus saw the crowd around him, he instructed his disciples to cross to the other side of the lake.
  '19':
  - type: text
    content: Then one of the teachers of religious law said to him, “Teacher, I will follow you wherever you go.”
  '2':
  - type: text
    content: Suddenly, a man with leprosy approached him and knelt before him. “Lord,” the man said, “if you are willing, you can heal me and make me clean.”
  '20':
  - type: text
    content: 'But Jesus replied, '
  - type: text
    content: “Foxes have dens to live in, and birds have nests, but the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: has no place even to lay his head.”
  '21':
  - type: text
    content: Another of his disciples said, “Lord, first let me return home and bury my father.”
  '22':
  - type: text
    content: 'But Jesus told him, '
  - type: text
    content: “Follow me now. Let the spiritually dead bury their own dead.
  - type: note
    content: Greek Let the dead bury their own dead.
  - type: text
    content: ”
  - type: heading
    content: Jesus Calms the Storm
  '23':
  - type: text
    content: 'Then Jesus got into the boat and started across the lake with his disciples. '
  '24':
  - type: text
    content: 'Suddenly, a fierce storm struck the lake, with waves breaking into the boat. But Jesus was sleeping. '
  '25':
  - type: text
    content: The disciples went and woke him up, shouting, “Lord, save us! We’re going to drown!”
  '26':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “Why are you afraid? You have so little faith!”
  - type: text
    content: ' Then he got up and rebuked the wind and waves, and suddenly there was a great calm.'
  '27':
  - type: text
    content: The disciples were amazed. “Who is this man?” they asked. “Even the winds and waves obey him!”
  - type: heading
    content: Jesus Heals Two Demon-Possessed Men
  '28':
  - type: text
    content: When Jesus arrived on the other side of the lake, in the region of the Gadarenes,
  - type: note
    content: Other manuscripts read Gerasenes; still others read Gergesenes. Compare Mark 5:1; Luke 8:26.
  - type: text
    content: ' two men who were possessed by demons met him. They came out of the tombs and were so violent that no one could go through that area.'
  '29':
  - type: text
    content: They began screaming at him, “Why are you interfering with us, Son of God? Have you come here to torture us before God’s appointed time?”
  '3':
  - type: text
    content: 'Jesus reached out and touched him. '
  - type: text
    content: '“I am willing,” '
  - type: text
    content: 'he said. '
  - type: text
    content: “Be healed!”
  - type: text
    content: ' And instantly the leprosy disappeared. '
  '30':
  - type: text
    content: 'There happened to be a large herd of pigs feeding in the distance. '
  '31':
  - type: text
    content: So the demons begged, “If you cast us out, send us into that herd of pigs.”
  '32':
  - type: text
    content: ' '
  - type: text
    content: '“All right, go!” '
  - type: text
    content: Jesus commanded them. So the demons came out of the men and entered the pigs, and the whole herd plunged down the steep hillside into the lake and drowned in the water.
  '33':
  - type: text
    content: 'The herdsmen fled to the nearby town, telling everyone what happened to the demon-possessed men. '
  '34':
  - type: text
    content: Then the entire town came out to meet Jesus, but they begged him to go away and leave them alone.
  '4':
  - type: text
    content: 'Then Jesus said to him, '
  - type: text
    content: “Don’t tell anyone about this. Instead, go to the priest and let him examine you. Take along the offering required in the law of Moses for those who have been healed of leprosy.
  - type: note
    content: See Lev 14:2-32.
  - type: text
    content: ' '
  - type: text
    content: This will be a public testimony that you have been cleansed.”
  - type: heading
    content: The Faith of a Roman Officer
  '5':
  - type: text
    content: When Jesus returned to Capernaum, a Roman officer
  - type: note
    content: Greek a centurion; similarly in 8:8, 13.
  - type: text
    content: ' came and pleaded with him, '
  '6':
  - type: text
    content: “Lord, my young servant
  - type: note
    content: Or child; also in 8:13.
  - type: text
    content: ' lies in bed, paralyzed and in terrible pain.”'
  '7':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “I will come and heal him.”
  '8':
  - type: text
    content: 'But the officer said, “Lord, I am not worthy to have you come into my home. Just say the word from where you are, and my servant will be healed. '
  '9':
  - type: text
    content: I know this because I am under the authority of my superior officers, and I have authority over my soldiers. I only need to say, ‘Go,’ and they go, or ‘Come,’ and they come. And if I say to my slaves, ‘Do this,’ they do it.”
