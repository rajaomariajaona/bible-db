document_id: MAT.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals a Man with Leprosy
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Large crowds followed Jesus as he came down the mountainside. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Suddenly, a man with leprosy approached him and knelt before him. “Lord,” the man said, “if you are willing, you can heal me and make me clean.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jesus reached out and touched him. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I am willing,” '
  - type: text
    text: 'he said. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be healed!”
  - type: text
    text: ' And instantly the leprosy disappeared. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t tell anyone about this. Instead, go to the priest and let him examine you. Take along the offering required in the law of Moses for those who have been healed of leprosy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Lev 14:2-32.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This will be a public testimony that you have been cleansed.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Faith of a Roman Officer
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: When Jesus returned to Capernaum, a Roman officer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'a centurion; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: similarly in 8:8, 13.
    marker-yv: yv-n
  - type: text
    text: ' came and pleaded with him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Lord, my young servant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'child; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 8:13.
    marker-yv: yv-n
  - type: text
    text: ' lies in bed, paralyzed and in terrible pain.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I will come and heal him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But the officer said, “Lord, I am not worthy to have you come into my home. Just say the word from where you are, and my servant will be healed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I know this because I am under the authority of my superior officers, and I have authority over my soldiers. I only need to say, ‘Go,’ and they go, or ‘Come,’ and they come. And if I say to my slaves, ‘Do this,’ they do it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When Jesus heard this, he was amazed. Turning to those who were following him, he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I tell you the truth, I haven’t seen faith like this in all Israel!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And I tell you this, that many Gentiles will come from all over the world—from east and west—and sit down with Abraham, Isaac, and Jacob at the feast in the Kingdom of Heaven.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But many Israelites—those for whom the Kingdom was prepared—will be thrown into outer darkness, where there will be weeping and gnashing of teeth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Jesus said to the Roman officer, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go back home. Because you believed, it has happened.”
  - type: text
    text: ' And the young servant was healed that same hour.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals Many People
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When Jesus arrived at Peter’s house, Peter’s mother-in-law was sick in bed with a high fever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But when Jesus touched her hand, the fever left her. Then she got up and prepared a meal for him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'That evening many demon-possessed people were brought to Jesus. He cast out the evil spirits with a simple command, and he healed all the sick. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: This fulfilled the word of the Lord through the prophet Isaiah, who said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “He took our sicknesses
- type: usfm
  marker: q2
  children:
  - type: text
    text: and removed our diseases.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 53:4.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Cost of Following Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: When Jesus saw the crowd around him, he instructed his disciples to cross to the other side of the lake.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then one of the teachers of religious law said to him, “Teacher, I will follow you wherever you go.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Foxes have dens to live in, and birds have nests, but the Son of Man
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Son of Man” is a title Jesus used for himself.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: has no place even to lay his head.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Another of his disciples said, “Lord, first let me return home and bury my father.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But Jesus told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Follow me now. Let the spiritually dead bury their own dead.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Let the dead bury their own dead.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Calms the Storm
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then Jesus got into the boat and started across the lake with his disciples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Suddenly, a fierce storm struck the lake, with waves breaking into the boat. But Jesus was sleeping. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The disciples went and woke him up, shouting, “Lord, save us! We’re going to drown!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why are you afraid? You have so little faith!”
  - type: text
    text: ' Then he got up and rebuked the wind and waves, and suddenly there was a great calm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The disciples were amazed. “Who is this man?” they asked. “Even the winds and waves obey him!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals Two Demon-Possessed Men
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: When Jesus arrived on the other side of the lake, in the region of the Gadarenes,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Other manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gerasenes; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'still others read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gergesenes. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Mark 5:1; Luke 8:26.
    marker-yv: yv-n
  - type: text
    text: ' two men who were possessed by demons met him. They came out of the tombs and were so violent that no one could go through that area.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: They began screaming at him, “Why are you interfering with us, Son of God? Have you come here to torture us before God’s appointed time?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'There happened to be a large herd of pigs feeding in the distance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: So the demons begged, “If you cast us out, send us into that herd of pigs.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“All right, go!” '
  - type: text
    text: Jesus commanded them. So the demons came out of the men and entered the pigs, and the whole herd plunged down the steep hillside into the lake and drowned in the water.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The herdsmen fled to the nearby town, telling everyone what happened to the demon-possessed men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Then the entire town came out to meet Jesus, but they begged him to go away and leave them alone.
