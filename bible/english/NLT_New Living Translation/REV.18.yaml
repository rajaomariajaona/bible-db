document_id: REV.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Babylon
  - type: text
    content: 'After all this I saw another angel come down from heaven with great authority, and the earth grew bright with his splendor. '
  '10':
  - type: text
    content: They will stand at a distance, terrified by her great torment. They will cry out,
  - type: text
    content: “How terrible, how terrible for you,
  - type: text
    content: O Babylon, you great city!
  - type: text
    content: In a single moment
  - type: text
    content: God’s judgment came on you.”
  '11':
  - type: text
    content: 'The merchants of the world will weep and mourn for her, for there is no one left to buy their goods. '
  '12':
  - type: text
    content: 'She bought great quantities of gold, silver, jewels, and pearls; fine linen, purple, silk, and scarlet cloth; things made of fragrant thyine wood, ivory goods, and objects made of expensive wood; and bronze, iron, and marble. '
  '13':
  - type: text
    content: She also bought cinnamon, spice, incense, myrrh, frankincense, wine, olive oil, fine flour, wheat, cattle, sheep, horses, wagons, and bodies—that is, human slaves.
  '14':
  - type: text
    content: “The fancy things you loved so much
  - type: text
    content: are gone,” they cry.
  - type: text
    content: “All your luxuries and splendor
  - type: text
    content: are gone forever,
  - type: text
    content: never to be yours again.”
  '15':
  - type: text
    content: The merchants who became wealthy by selling her these things will stand at a distance, terrified by her great torment. They will weep and cry out,
  '16':
  - type: text
    content: “How terrible, how terrible for that great city!
  - type: text
    content: She was clothed in finest purple and scarlet linens,
  - type: text
    content: decked out with gold and precious stones and pearls!
  '17':
  - type: text
    content: In a single moment
  - type: text
    content: all the wealth of the city is gone!”
  - type: text
    content: 'And all the captains of the merchant ships and their passengers and sailors and crews will stand at a distance. '
  '18':
  - type: text
    content: 'They will cry out as they watch the smoke ascend, and they will say, “Where is there another city as great as this?” '
  '19':
  - type: text
    content: And they will weep and throw dust on their heads to show their grief. And they will cry out,
  - type: text
    content: “How terrible, how terrible for that great city!
  - type: text
    content: The shipowners became wealthy
  - type: text
    content: by transporting her great wealth on the seas.
  - type: text
    content: In a single moment it is all gone.”
  '2':
  - type: text
    content: 'He gave a mighty shout:'
  - type: text
    content: “Babylon is fallen—that great city is fallen!
  - type: text
    content: She has become a home for demons.
  - type: text
    content: She is a hideout for every foul
  - type: note
    content: Greek unclean; also in each of the two following phrases.
  - type: text
    content: ' spirit,'
  - type: text
    content: a hideout for every foul vulture
  - type: text
    content: and every foul and dreadful animal.
  - type: note
    content: Some manuscripts condense the last two lines to read a hideout for every foul [unclean] and dreadful vulture.
  '20':
  - type: text
    content: Rejoice over her fate, O heaven
  - type: text
    content: and people of God and apostles and prophets!
  - type: text
    content: For at last God has judged her
  - type: text
    content: for your sakes.
  '21':
  - type: text
    content: Then a mighty angel picked up a boulder the size of a huge millstone. He threw it into the ocean and shouted,
  - type: text
    content: “Just like this, the great city Babylon
  - type: text
    content: will be thrown down with violence
  - type: text
    content: and will never be found again.
  '22':
  - type: text
    content: The sound of harps, singers, flutes, and trumpets
  - type: text
    content: will never be heard in you again.
  - type: text
    content: No craftsmen and no trades
  - type: text
    content: will ever be found in you again.
  - type: text
    content: The sound of the mill
  - type: text
    content: will never be heard in you again.
  '23':
  - type: text
    content: The light of a lamp
  - type: text
    content: will never shine in you again.
  - type: text
    content: The happy voices of brides and grooms
  - type: text
    content: will never be heard in you again.
  - type: text
    content: For your merchants were the greatest in the world,
  - type: text
    content: and you deceived the nations with your sorceries.
  '24':
  - type: text
    content: In your
  - type: note
    content: Greek her.
  - type: text
    content: ' streets flowed the blood of the prophets and of God’s holy people'
  - type: text
    content: and the blood of people slaughtered all over the world.”
  '3':
  - type: text
    content: For all the nations have fallen
  - type: note
    content: Some manuscripts read have drunk.
  - type: text
    content: because of the wine of her passionate immorality.
  - type: text
    content: The kings of the world
  - type: text
    content: have committed adultery with her.
  - type: text
    content: Because of her desires for extravagant luxury,
  - type: text
    content: the merchants of the world have grown rich.”
  '4':
  - type: text
    content: Then I heard another voice calling from heaven,
  - type: text
    content: “Come away from her, my people.
  - type: text
    content: Do not take part in her sins,
  - type: text
    content: or you will be punished with her.
  '5':
  - type: text
    content: For her sins are piled as high as heaven,
  - type: text
    content: and God remembers her evil deeds.
  '6':
  - type: text
    content: Do to her as she has done to others.
  - type: text
    content: Double her penalty
  - type: note
    content: Or Give her an equal penalty.
  - type: text
    content: ' for all her evil deeds.'
  - type: text
    content: She brewed a cup of terror for others,
  - type: text
    content: so brew twice as much
  - type: note
    content: Or brew just as much.
  - type: text
    content: ' for her.'
  '7':
  - type: text
    content: She glorified herself and lived in luxury,
  - type: text
    content: so match it now with torment and sorrow.
  - type: text
    content: She boasted in her heart,
  - type: text
    content: ‘I am queen on my throne.
  - type: text
    content: I am no helpless widow,
  - type: text
    content: and I have no reason to mourn.’
  '8':
  - type: text
    content: Therefore, these plagues will overtake her in a single day—
  - type: text
    content: death and mourning and famine.
  - type: text
    content: She will be completely consumed by fire,
  - type: text
    content: for the Lord God who judges her is mighty.”
  '9':
  - type: text
    content: 'And the kings of the world who committed adultery with her and enjoyed her great luxury will mourn for her as they see the smoke rising from her charred remains. '
