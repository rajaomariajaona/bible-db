document_id: REV.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Fall of Babylon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After all this I saw another angel come down from heaven with great authority, and the earth grew bright with his splendor. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He gave a mighty shout:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Babylon is fallen—that great city is fallen!
- type: usfm
  marker: q2
  children:
  - type: text
    text: She has become a home for demons.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She is a hideout for every foul
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:2a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'unclean; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in each of the two following phrases.
    marker-yv: yv-n
  - type: text
    text: ' spirit,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a hideout for every foul vulture
- type: usfm
  marker: q2
  children:
  - type: text
    text: and every foul and dreadful animal.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:2b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts condense the last two lines to read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a hideout for every foul [unclean] and dreadful vulture.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For all the nations have fallen
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: have drunk.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of the wine of her passionate immorality.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The kings of the world
- type: usfm
  marker: q2
  children:
  - type: text
    text: have committed adultery with her.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of her desires for extravagant luxury,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the merchants of the world have grown rich.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then I heard another voice calling from heaven,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Come away from her, my people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not take part in her sins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or you will be punished with her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For her sins are piled as high as heaven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and God remembers her evil deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Do to her as she has done to others.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Double her penalty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:6a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Give her an equal penalty.
    marker-yv: yv-n
  - type: text
    text: ' for all her evil deeds.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: She brewed a cup of terror for others,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so brew twice as much
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:6b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: brew just as much.
    marker-yv: yv-n
  - type: text
    text: ' for her.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: She glorified herself and lived in luxury,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so match it now with torment and sorrow.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She boasted in her heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I am queen on my throne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am no helpless widow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I have no reason to mourn.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Therefore, these plagues will overtake her in a single day—
- type: usfm
  marker: q2
  children:
  - type: text
    text: death and mourning and famine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She will be completely consumed by fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the Lord God who judges her is mighty.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And the kings of the world who committed adultery with her and enjoyed her great luxury will mourn for her as they see the smoke rising from her charred remains. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They will stand at a distance, terrified by her great torment. They will cry out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “How terrible, how terrible for you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O Babylon, you great city!
- type: usfm
  marker: q1
  children:
  - type: text
    text: In a single moment
- type: usfm
  marker: q2
  children:
  - type: text
    text: God’s judgment came on you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The merchants of the world will weep and mourn for her, for there is no one left to buy their goods. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'She bought great quantities of gold, silver, jewels, and pearls; fine linen, purple, silk, and scarlet cloth; things made of fragrant thyine wood, ivory goods, and objects made of expensive wood; and bronze, iron, and marble. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: She also bought cinnamon, spice, incense, myrrh, frankincense, wine, olive oil, fine flour, wheat, cattle, sheep, horses, wagons, and bodies—that is, human slaves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “The fancy things you loved so much
- type: usfm
  marker: q2
  children:
  - type: text
    text: are gone,” they cry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “All your luxuries and splendor
- type: usfm
  marker: q2
  children:
  - type: text
    text: are gone forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never to be yours again.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The merchants who became wealthy by selling her these things will stand at a distance, terrified by her great torment. They will weep and cry out,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “How terrible, how terrible for that great city!
- type: usfm
  marker: q2
  children:
  - type: text
    text: She was clothed in finest purple and scarlet linens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: decked out with gold and precious stones and pearls!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: In a single moment
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the wealth of the city is gone!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And all the captains of the merchant ships and their passengers and sailors and crews will stand at a distance. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They will cry out as they watch the smoke ascend, and they will say, “Where is there another city as great as this?” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And they will weep and throw dust on their heads to show their grief. And they will cry out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “How terrible, how terrible for that great city!
- type: usfm
  marker: q2
  children:
  - type: text
    text: The shipowners became wealthy
- type: usfm
  marker: q2
  children:
  - type: text
    text: by transporting her great wealth on the seas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In a single moment it is all gone.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Rejoice over her fate, O heaven
- type: usfm
  marker: q2
  children:
  - type: text
    text: and people of God and apostles and prophets!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For at last God has judged her
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your sakes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then a mighty angel picked up a boulder the size of a huge millstone. He threw it into the ocean and shouted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Just like this, the great city Babylon
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be thrown down with violence
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will never be found again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The sound of harps, singers, flutes, and trumpets
- type: usfm
  marker: q2
  children:
  - type: text
    text: will never be heard in you again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No craftsmen and no trades
- type: usfm
  marker: q2
  children:
  - type: text
    text: will ever be found in you again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sound of the mill
- type: usfm
  marker: q2
  children:
  - type: text
    text: will never be heard in you again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The light of a lamp
- type: usfm
  marker: q2
  children:
  - type: text
    text: will never shine in you again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The happy voices of brides and grooms
- type: usfm
  marker: q2
  children:
  - type: text
    text: will never be heard in you again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For your merchants were the greatest in the world,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you deceived the nations with your sorceries.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: In your
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: her.
    marker-yv: yv-n
  - type: text
    text: ' streets flowed the blood of the prophets and of God’s holy people'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the blood of people slaughtered all over the world.”
