document_id: ACT.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul’s Conversion
  - type: text
    content: Meanwhile, Saul was uttering threats with every breath and was eager to kill the Lord’s followers.
  - type: note
    content: Greek disciples.
  - type: text
    content: ' So he went to the high priest. '
  '10':
  - type: text
    content: Now there was a believer
  - type: note
    content: Greek disciple; also in 9:26, 36.
  - type: text
    content: ' in Damascus named Ananias. The Lord spoke to him in a vision, calling, '
  - type: text
    content: “Ananias!”
  - type: text
    content: “Yes, Lord!” he replied.
  '11':
  - type: text
    content: 'The Lord said, '
  - type: text
    content: “Go over to Straight Street, to the house of Judas. When you get there, ask for a man from Tarsus named Saul. He is praying to me right now.
  - type: text
    content: ' '
  '12':
  - type: text
    content: I have shown him a vision of a man named Ananias coming in and laying hands on him so he can see again.”
  '13':
  - type: text
    content: “But Lord,” exclaimed Ananias, “I’ve heard many people talk about the terrible things this man has done to the believers
  - type: note
    content: Greek God’s holy people; also in 9:32, 41.
  - type: text
    content: ' in Jerusalem! '
  '14':
  - type: text
    content: And he is authorized by the leading priests to arrest everyone who calls upon your name.”
  '15':
  - type: text
    content: 'But the Lord said, '
  - type: text
    content: “Go, for Saul is my chosen instrument to take my message to the Gentiles and to kings, as well as to the people of Israel.
  - type: text
    content: ' '
  '16':
  - type: text
    content: And I will show him how much he must suffer for my name’s sake.”
  '17':
  - type: text
    content: 'So Ananias went and found Saul. He laid his hands on him and said, “Brother Saul, the Lord Jesus, who appeared to you on the road, has sent me so that you might regain your sight and be filled with the Holy Spirit.” '
  '18':
  - type: text
    content: 'Instantly something like scales fell from Saul’s eyes, and he regained his sight. Then he got up and was baptized. '
  '19':
  - type: text
    content: Afterward he ate some food and regained his strength.
  - type: heading
    content: Saul in Damascus and Jerusalem
  - type: text
    content: Saul stayed with the believers
  - type: note
    content: Greek disciples; also in 9:26, 38.
  - type: text
    content: ' in Damascus for a few days. '
  '2':
  - type: text
    content: He requested letters addressed to the synagogues in Damascus, asking for their cooperation in the arrest of any followers of the Way he found there. He wanted to bring them—both men and women—back to Jerusalem in chains.
  '20':
  - type: text
    content: And immediately he began preaching about Jesus in the synagogues, saying, “He is indeed the Son of God!”
  '21':
  - type: text
    content: All who heard him were amazed. “Isn’t this the same man who caused such devastation among Jesus’ followers in Jerusalem?” they asked. “And didn’t he come here to arrest them and take them in chains to the leading priests?”
  '22':
  - type: text
    content: 'Saul’s preaching became more and more powerful, and the Jews in Damascus couldn’t refute his proofs that Jesus was indeed the Messiah. '
  '23':
  - type: text
    content: 'After a while some of the Jews plotted together to kill him. '
  '24':
  - type: text
    content: 'They were watching for him day and night at the city gate so they could murder him, but Saul was told about their plot. '
  '25':
  - type: text
    content: So during the night, some of the other believers
  - type: note
    content: Greek his disciples.
  - type: text
    content: ' lowered him in a large basket through an opening in the city wall.'
  '26':
  - type: text
    content: 'When Saul arrived in Jerusalem, he tried to meet with the believers, but they were all afraid of him. They did not believe he had truly become a believer! '
  '27':
  - type: text
    content: Then Barnabas brought him to the apostles and told them how Saul had seen the Lord on the way to Damascus and how the Lord had spoken to Saul. He also told them that Saul had preached boldly in the name of Jesus in Damascus.
  '28':
  - type: text
    content: 'So Saul stayed with the apostles and went all around Jerusalem with them, preaching boldly in the name of the Lord. '
  '29':
  - type: text
    content: 'He debated with some Greek-speaking Jews, but they tried to murder him. '
  '3':
  - type: text
    content: 'As he was approaching Damascus on this mission, a light from heaven suddenly shone down around him. '
  '30':
  - type: text
    content: When the believers
  - type: note
    content: Greek brothers.
  - type: text
    content: ' heard about this, they took him down to Caesarea and sent him away to Tarsus, his hometown.'
  '31':
  - type: text
    content: The church then had peace throughout Judea, Galilee, and Samaria, and it became stronger as the believers lived in the fear of the Lord. And with the encouragement of the Holy Spirit, it also grew in numbers.
  - type: heading
    content: Peter Heals Aeneas and Raises Dorcas
  '32':
  - type: text
    content: 'Meanwhile, Peter traveled from place to place, and he came down to visit the believers in the town of Lydda. '
  '33':
  - type: text
    content: 'There he met a man named Aeneas, who had been paralyzed and bedridden for eight years. '
  '34':
  - type: text
    content: 'Peter said to him, “Aeneas, Jesus Christ heals you! Get up, and roll up your sleeping mat!” And he was healed instantly. '
  '35':
  - type: text
    content: Then the whole population of Lydda and Sharon saw Aeneas walking around, and they turned to the Lord.
  '36':
  - type: text
    content: There was a believer in Joppa named Tabitha (which in Greek is Dorcas
  - type: note
    content: The names Tabitha in Aramaic and Dorcas in Greek both mean “gazelle.”
  - type: text
    content: '). She was always doing kind things for others and helping the poor. '
  '37':
  - type: text
    content: 'About this time she became ill and died. Her body was washed for burial and laid in an upstairs room. '
  '38':
  - type: text
    content: But the believers had heard that Peter was nearby at Lydda, so they sent two men to beg him, “Please come as soon as possible!”
  '39':
  - type: text
    content: 'So Peter returned with them; and as soon as he arrived, they took him to the upstairs room. The room was filled with widows who were weeping and showing him the coats and other clothes Dorcas had made for them. '
  '4':
  - type: text
    content: 'He fell to the ground and heard a voice saying to him, '
  - type: text
    content: “Saul! Saul! Why are you persecuting me?”
  '40':
  - type: text
    content: 'But Peter asked them all to leave the room; then he knelt and prayed. Turning to the body he said, “Get up, Tabitha.” And she opened her eyes! When she saw Peter, she sat up! '
  '41':
  - type: text
    content: He gave her his hand and helped her up. Then he called in the widows and all the believers, and he presented her to them alive.
  '42':
  - type: text
    content: 'The news spread through the whole town, and many believed in the Lord. '
  '43':
  - type: text
    content: And Peter stayed a long time in Joppa, living with Simon, a tanner of hides.
  '5':
  - type: text
    content: “Who are you, lord?” Saul asked.
  - type: text
    content: 'And the voice replied, '
  - type: text
    content: “I am Jesus, the one you are persecuting!
  - type: text
    content: ' '
  '6':
  - type: text
    content: Now get up and go into the city, and you will be told what you must do.”
  '7':
  - type: text
    content: 'The men with Saul stood speechless, for they heard the sound of someone’s voice but saw no one! '
  '8':
  - type: text
    content: 'Saul picked himself up off the ground, but when he opened his eyes he was blind. So his companions led him by the hand to Damascus. '
  '9':
  - type: text
    content: He remained there blind for three days and did not eat or drink.
