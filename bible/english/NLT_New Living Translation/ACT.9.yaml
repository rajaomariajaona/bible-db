document_id: ACT.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul’s Conversion
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Meanwhile, Saul was uttering threats with every breath and was eager to kill the Lord’s followers.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: disciples.
      marker-yv: yv-n
    - type: text
      text: ' So he went to the high priest. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now there was a believer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'disciple; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 9:26, 36.
      marker-yv: yv-n
    - type: text
      text: ' in Damascus named Ananias. The Lord spoke to him in a vision, calling, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Ananias!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, Lord!” he replied.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Lord said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go over to Straight Street, to the house of Judas. When you get there, ask for a man from Tarsus named Saul. He is praying to me right now.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have shown him a vision of a man named Ananias coming in and laying hands on him so he can see again.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But Lord,” exclaimed Ananias, “I’ve heard many people talk about the terrible things this man has done to the believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'God’s holy people; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 9:32, 41.
      marker-yv: yv-n
    - type: text
      text: ' in Jerusalem! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he is authorized by the leading priests to arrest everyone who calls upon your name.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Lord said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go, for Saul is my chosen instrument to take my message to the Gentiles and to kings, as well as to the people of Israel.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And I will show him how much he must suffer for my name’s sake.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Ananias went and found Saul. He laid his hands on him and said, “Brother Saul, the Lord Jesus, who appeared to you on the road, has sent me so that you might regain your sight and be filled with the Holy Spirit.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Instantly something like scales fell from Saul’s eyes, and he regained his sight. Then he got up and was baptized. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Afterward he ate some food and regained his strength.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul in Damascus and Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Saul stayed with the believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'disciples; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 9:26, 38.
      marker-yv: yv-n
    - type: text
      text: ' in Damascus for a few days. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He requested letters addressed to the synagogues in Damascus, asking for their cooperation in the arrest of any followers of the Way he found there. He wanted to bring them—both men and women—back to Jerusalem in chains.
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And immediately he began preaching about Jesus in the synagogues, saying, “He is indeed the Son of God!”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All who heard him were amazed. “Isn’t this the same man who caused such devastation among Jesus’ followers in Jerusalem?” they asked. “And didn’t he come here to arrest them and take them in chains to the leading priests?”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul’s preaching became more and more powerful, and the Jews in Damascus couldn’t refute his proofs that Jesus was indeed the Messiah. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After a while some of the Jews plotted together to kill him. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were watching for him day and night at the city gate so they could murder him, but Saul was told about their plot. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So during the night, some of the other believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his disciples.
      marker-yv: yv-n
    - type: text
      text: ' lowered him in a large basket through an opening in the city wall.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Saul arrived in Jerusalem, he tried to meet with the believers, but they were all afraid of him. They did not believe he had truly become a believer! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Barnabas brought him to the apostles and told them how Saul had seen the Lord on the way to Damascus and how the Lord had spoken to Saul. He also told them that Saul had preached boldly in the name of Jesus in Damascus.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Saul stayed with the apostles and went all around Jerusalem with them, preaching boldly in the name of the Lord. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He debated with some Greek-speaking Jews, but they tried to murder him. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As he was approaching Damascus on this mission, a light from heaven suddenly shone down around him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers.
      marker-yv: yv-n
    - type: text
      text: ' heard about this, they took him down to Caesarea and sent him away to Tarsus, his hometown.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The church then had peace throughout Judea, Galilee, and Samaria, and it became stronger as the believers lived in the fear of the Lord. And with the encouragement of the Holy Spirit, it also grew in numbers.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter Heals Aeneas and Raises Dorcas
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Meanwhile, Peter traveled from place to place, and he came down to visit the believers in the town of Lydda. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'There he met a man named Aeneas, who had been paralyzed and bedridden for eight years. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Peter said to him, “Aeneas, Jesus Christ heals you! Get up, and roll up your sleeping mat!” And he was healed instantly. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then the whole population of Lydda and Sharon saw Aeneas walking around, and they turned to the Lord.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There was a believer in Joppa named Tabitha (which in Greek is Dorcas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The names '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tabitha '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'in Aramaic and '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dorcas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in Greek both mean “gazelle.”
      marker-yv: yv-n
    - type: text
      text: '). She was always doing kind things for others and helping the poor. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'About this time she became ill and died. Her body was washed for burial and laid in an upstairs room. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the believers had heard that Peter was nearby at Lydda, so they sent two men to beg him, “Please come as soon as possible!”
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Peter returned with them; and as soon as he arrived, they took him to the upstairs room. The room was filled with widows who were weeping and showing him the coats and other clothes Dorcas had made for them. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He fell to the ground and heard a voice saying to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Saul! Saul! Why are you persecuting me?”
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Peter asked them all to leave the room; then he knelt and prayed. Turning to the body he said, “Get up, Tabitha.” And she opened her eyes! When she saw Peter, she sat up! '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He gave her his hand and helped her up. Then he called in the widows and all the believers, and he presented her to them alive.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The news spread through the whole town, and many believed in the Lord. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Peter stayed a long time in Joppa, living with Simon, a tanner of hides.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Who are you, lord?” Saul asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the voice replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am Jesus, the one you are persecuting!
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now get up and go into the city, and you will be told what you must do.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The men with Saul stood speechless, for they heard the sound of someone’s voice but saw no one! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul picked himself up off the ground, but when he opened his eyes he was blind. So his companions led him by the hand to Damascus. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He remained there blind for three days and did not eat or drink.
