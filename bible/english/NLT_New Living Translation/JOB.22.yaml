document_id: JOB.22,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Eliphaz’s Third Response to Job
  - type: text
    content: 'Then Eliphaz the Temanite replied:'
  '10':
  - type: text
    content: That is why you are surrounded by traps
  - type: text
    content: and tremble from sudden fears.
  '11':
  - type: text
    content: That is why you cannot see in the darkness,
  - type: text
    content: and waves of water cover you.
  '12':
  - type: text
    content: “God is so great—higher than the heavens,
  - type: text
    content: higher than the farthest stars.
  '13':
  - type: text
    content: But you reply, ‘That’s why God can’t see what I am doing!
  - type: text
    content: How can he judge through the thick darkness?
  '14':
  - type: text
    content: For thick clouds swirl about him, and he cannot see us.
  - type: text
    content: He is way up there, walking on the vault of heaven.’
  '15':
  - type: text
    content: “Will you continue on the old paths
  - type: text
    content: where evil people have walked?
  '16':
  - type: text
    content: They were snatched away in the prime of life,
  - type: text
    content: the foundations of their lives washed away.
  '17':
  - type: text
    content: For they said to God, ‘Leave us alone!
  - type: text
    content: What can the Almighty do to us?’
  '18':
  - type: text
    content: Yet he was the one who filled their homes with good things,
  - type: text
    content: so I will have nothing to do with that kind of thinking.
  '19':
  - type: text
    content: “The righteous will be happy to see the wicked destroyed,
  - type: text
    content: and the innocent will laugh in contempt.
  '2':
  - type: text
    content: “Can a person do anything to help God?
  - type: text
    content: Can even a wise person be helpful to him?
  '20':
  - type: text
    content: They will say, ‘See how our enemies have been destroyed.
  - type: text
    content: The last of them have been consumed in the fire.’
  '21':
  - type: text
    content: “Submit to God, and you will have peace;
  - type: text
    content: then things will go well for you.
  '22':
  - type: text
    content: Listen to his instructions,
  - type: text
    content: and store them in your heart.
  '23':
  - type: text
    content: If you return to the Almighty, you will be restored—
  - type: text
    content: so clean up your life.
  '24':
  - type: text
    content: If you give up your lust for money
  - type: text
    content: and throw your precious gold into the river,
  '25':
  - type: text
    content: the Almighty himself will be your treasure.
  - type: text
    content: He will be your precious silver!
  '26':
  - type: text
    content: “Then you will take delight in the Almighty
  - type: text
    content: and look up to God.
  '27':
  - type: text
    content: You will pray to him, and he will hear you,
  - type: text
    content: and you will fulfill your vows to him.
  '28':
  - type: text
    content: You will succeed in whatever you choose to do,
  - type: text
    content: and light will shine on the road ahead of you.
  '29':
  - type: text
    content: If people are in trouble and you say, ‘Help them,’
  - type: text
    content: God will save them.
  '3':
  - type: text
    content: Is it any advantage to the Almighty if you are righteous?
  - type: text
    content: Would it be any gain to him if you were perfect?
  '30':
  - type: text
    content: Even sinners will be rescued;
  - type: text
    content: they will be rescued because your hands are pure.”
  '4':
  - type: text
    content: Is it because you’re so pious that he accuses you
  - type: text
    content: and brings judgment against you?
  '5':
  - type: text
    content: No, it’s because of your wickedness!
  - type: text
    content: There’s no limit to your sins.
  '6':
  - type: text
    content: “For example, you must have lent money to your friend
  - type: text
    content: and demanded clothing as security.
  - type: text
    content: Yes, you stripped him to the bone.
  '7':
  - type: text
    content: You must have refused water for the thirsty
  - type: text
    content: and food for the hungry.
  '8':
  - type: text
    content: You probably think the land belongs to the powerful
  - type: text
    content: and only the privileged have a right to it!
  '9':
  - type: text
    content: You must have sent widows away empty-handed
  - type: text
    content: and crushed the hopes of orphans.
