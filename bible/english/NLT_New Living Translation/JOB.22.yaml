document_id: JOB.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Eliphaz’s Third Response to Job
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Eliphaz the Temanite replied:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Can a person do anything to help God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can even a wise person be helpful to him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Is it any advantage to the Almighty if you are righteous?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Would it be any gain to him if you were perfect?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Is it because you’re so pious that he accuses you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and brings judgment against you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: No, it’s because of your wickedness!
- type: usfm
  marker: q2
  children:
  - type: text
    text: There’s no limit to your sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “For example, you must have lent money to your friend
- type: usfm
  marker: q2
  children:
  - type: text
    text: and demanded clothing as security.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, you stripped him to the bone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You must have refused water for the thirsty
- type: usfm
  marker: q2
  children:
  - type: text
    text: and food for the hungry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You probably think the land belongs to the powerful
- type: usfm
  marker: q2
  children:
  - type: text
    text: and only the privileged have a right to it!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You must have sent widows away empty-handed
- type: usfm
  marker: q2
  children:
  - type: text
    text: and crushed the hopes of orphans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: That is why you are surrounded by traps
- type: usfm
  marker: q2
  children:
  - type: text
    text: and tremble from sudden fears.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: That is why you cannot see in the darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and waves of water cover you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “God is so great—higher than the heavens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: higher than the farthest stars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But you reply, ‘That’s why God can’t see what I am doing!
- type: usfm
  marker: q2
  children:
  - type: text
    text: How can he judge through the thick darkness?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For thick clouds swirl about him, and he cannot see us.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is way up there, walking on the vault of heaven.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Will you continue on the old paths
- type: usfm
  marker: q2
  children:
  - type: text
    text: where evil people have walked?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: They were snatched away in the prime of life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the foundations of their lives washed away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For they said to God, ‘Leave us alone!
- type: usfm
  marker: q2
  children:
  - type: text
    text: What can the Almighty do to us?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Yet he was the one who filled their homes with good things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so I will have nothing to do with that kind of thinking.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “The righteous will be happy to see the wicked destroyed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the innocent will laugh in contempt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They will say, ‘See how our enemies have been destroyed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The last of them have been consumed in the fire.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Submit to God, and you will have peace;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then things will go well for you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Listen to his instructions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and store them in your heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: If you return to the Almighty, you will be restored—
- type: usfm
  marker: q2
  children:
  - type: text
    text: so clean up your life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: If you give up your lust for money
- type: usfm
  marker: q2
  children:
  - type: text
    text: and throw your precious gold into the river,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: the Almighty himself will be your treasure.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will be your precious silver!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Then you will take delight in the Almighty
- type: usfm
  marker: q2
  children:
  - type: text
    text: and look up to God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: You will pray to him, and he will hear you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will fulfill your vows to him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: You will succeed in whatever you choose to do,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and light will shine on the road ahead of you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: If people are in trouble and you say, ‘Help them,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: God will save them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Even sinners will be rescued;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will be rescued because your hands are pure.”
