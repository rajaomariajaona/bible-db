document_id: ZEC.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Will Rule the Earth
  - type: text
    content: 'Watch, for the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is coming when your possessions will be plundered right in front of you! '
  '10':
  - type: text
    content: 'All the land from Geba, north of Judah, to Rimmon, south of Jerusalem, will become one vast plain. But Jerusalem will be raised up in its original place and will be inhabited all the way from the Benjamin Gate over to the site of the old gate, then to the Corner Gate, and from the Tower of Hananel to the king’s winepresses. '
  '11':
  - type: text
    content: And Jerusalem will be filled, safe at last, never again to be cursed and destroyed.
  '12':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will send a plague on all the nations that fought against Jerusalem. Their people will become like walking corpses, their flesh rotting away. Their eyes will rot in their sockets, and their tongues will rot in their mouths. '
  '13':
  - type: text
    content: 'On that day they will be terrified, stricken by the '
  - type: text
    content: Lord
  - type: text
    content: ' with great panic. They will fight their neighbors hand to hand. '
  '14':
  - type: text
    content: 'Judah, too, will be fighting at Jerusalem. The wealth of all the neighboring nations will be captured—great quantities of gold and silver and fine clothing. '
  '15':
  - type: text
    content: This same plague will strike the horses, mules, camels, donkeys, and all the other animals in the enemy camps.
  '16':
  - type: text
    content: 'In the end, the enemies of Jerusalem who survive the plague will go up to Jerusalem each year to worship the King, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, and to celebrate the Festival of Shelters. '
  '17':
  - type: text
    content: 'Any nation in the world that refuses to come to Jerusalem to worship the King, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, will have no rain. '
  '18':
  - type: text
    content: 'If the people of Egypt refuse to attend the festival, the '
  - type: text
    content: Lord
  - type: text
    content: ' will punish'
  - type: note
    content: As in some Hebrew manuscripts and Greek and Syriac versions; Masoretic Text reads will not punish.
  - type: text
    content: ' them with the same plague that he sends on the other nations who refuse to go. '
  '19':
  - type: text
    content: Egypt and the other nations will all be punished if they don’t go to celebrate the Festival of Shelters.
  '2':
  - type: text
    content: I will gather all the nations to fight against Jerusalem. The city will be taken, the houses looted, and the women raped. Half the population will be taken into captivity, and the rest will be left among the ruins of the city.
  '20':
  - type: text
    content: 'On that day even the harness bells of the horses will be inscribed with these words: '
  - type: text
    content: Holy to the Lord
  - type: text
    content: '. And the cooking pots in the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' will be as sacred as the basins used beside the altar. '
  '21':
  - type: text
    content: 'In fact, every cooking pot in Jerusalem and Judah will be holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. All who come to worship will be free to use any of these pots to boil their sacrifices. And on that day there will no longer be traders'
  - type: note
    content: Hebrew Canaanites.
  - type: text
    content: ' in the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '3':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will go out to fight against those nations, as he has fought in times past. '
  '4':
  - type: text
    content: 'On that day his feet will stand on the Mount of Olives, east of Jerusalem. And the Mount of Olives will split apart, making a wide valley running from east to west. Half the mountain will move toward the north and half toward the south. '
  '5':
  - type: text
    content: You will flee through this valley, for it will reach across to Azal.
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' Yes, you will flee as you did from the earthquake in the days of King Uzziah of Judah. Then the '
  - type: text
    content: Lord
  - type: text
    content: ' my God will come, and all his holy ones with him.'
  - type: note
    content: As in Greek version; Hebrew reads with you.
  '6':
  - type: text
    content: On that day the sources of light will no longer shine,
  - type: note
    content: Hebrew the precious ones shall diminish; or the precious ones and frost. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'yet there will be continuous day! Only the '
  - type: text
    content: Lord
  - type: text
    content: ' knows how this could happen. There will be no normal day and night, for at evening time it will still be light.'
  '8':
  - type: text
    content: On that day life-giving waters will flow out from Jerusalem, half toward the Dead Sea and half toward the Mediterranean,
  - type: note
    content: Hebrew half toward the eastern sea and half toward the western sea.
  - type: text
    content: ' flowing continuously in both summer and winter.'
  '9':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will be king over all the earth. On that day there will be one '
  - type: text
    content: Lord
  - type: text
    content: —his name alone will be worshiped.
