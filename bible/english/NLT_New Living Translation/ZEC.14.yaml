document_id: ZEC.14,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Will Rule the Earth'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Watch, for the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is coming when your possessions will be plundered right in front of you! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'All the land from Geba, north of Judah, to Rimmon, south of Jerusalem, will become one vast plain. But Jerusalem will be raised up in its original place and will be inhabited all the way from the Benjamin Gate over to the site of the old gate, then to the Corner Gate, and from the Tower of Hananel to the king’s winepresses. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: And Jerusalem will be filled, safe at last, never again to be cursed and destroyed.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will send a plague on all the nations that fought against Jerusalem. Their people will become like walking corpses, their flesh rotting away. Their eyes will rot in their sockets, and their tongues will rot in their mouths. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'On that day they will be terrified, stricken by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with great panic. They will fight their neighbors hand to hand. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Judah, too, will be fighting at Jerusalem. The wealth of all the neighboring nations will be captured—great quantities of gold and silver and fine clothing. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: This same plague will strike the horses, mules, camels, donkeys, and all the other animals in the enemy camps.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'In the end, the enemies of Jerusalem who survive the plague will go up to Jerusalem each year to worship the King, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, and to celebrate the Festival of Shelters. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Any nation in the world that refuses to come to Jerusalem to worship the King, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, will have no rain. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'If the people of Egypt refuse to attend the festival, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will punish'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts and Greek and Syriac versions; Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will not punish.
      marker-yv: yv-n
    - type: text
      text: ' them with the same plague that he sends on the other nations who refuse to go. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Egypt and the other nations will all be punished if they don’t go to celebrate the Festival of Shelters.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I will gather all the nations to fight against Jerusalem. The city will be taken, the houses looted, and the women raped. Half the population will be taken into captivity, and the rest will be left among the ruins of the city.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'On that day even the harness bells of the horses will be inscribed with these words: '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Holy to the Lord
    - type: text
      text: '. And the cooking pots in the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be as sacred as the basins used beside the altar. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'In fact, every cooking pot in Jerusalem and Judah will be holy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies. All who come to worship will be free to use any of these pots to boil their sacrifices. And on that day there will no longer be traders'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Canaanites.
      marker-yv: yv-n
    - type: text
      text: ' in the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will go out to fight against those nations, as he has fought in times past. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'On that day his feet will stand on the Mount of Olives, east of Jerusalem. And the Mount of Olives will split apart, making a wide valley running from east to west. Half the mountain will move toward the north and half toward the south. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You will flee through this valley, for it will reach across to Azal.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:5a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' Yes, you will flee as you did from the earthquake in the days of King Uzziah of Judah. Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God will come, and all his holy ones with him.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:5b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: with you.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: On that day the sources of light will no longer shine,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the precious ones shall diminish; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the precious ones and frost. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'yet there will be continuous day! Only the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' knows how this could happen. There will be no normal day and night, for at evening time it will still be light.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: On that day life-giving waters will flow out from Jerusalem, half toward the Dead Sea and half toward the Mediterranean,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: half toward the eastern sea and half toward the western sea.
      marker-yv: yv-n
    - type: text
      text: ' flowing continuously in both summer and winter.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be king over all the earth. On that day there will be one '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —his name alone will be worshiped.
