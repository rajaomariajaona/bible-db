document_id: EST.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mordecai Requests Esther’s Help
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When Mordecai learned about all that had been done, he tore his clothes, put on burlap and ashes, and went out into the city, crying with a loud and bitter wail. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Esther told Hathach to go back and relay this message to Mordecai: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“All the king’s officials and even the people in the provinces know that anyone who appears before the king in his inner court without being invited is doomed to die unless the king holds out his gold scepter. And the king has not called for me to come to him for thirty days.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Hathach
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: they.
      marker-yv: yv-n
    - type: text
      text: ' gave Esther’s message to Mordecai.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mordecai sent this reply to Esther: “Don’t think for a moment that because you’re in the palace you will escape when all other Jews are killed. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If you keep quiet at a time like this, deliverance and relief for the Jews will arise from some other place, but you and your relatives will die. Who knows if perhaps you were made queen for just such a time as this?”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Esther sent this reply to Mordecai: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go and gather together all the Jews of Susa and fast for me. Do not eat or drink for three days, night or day. My maids and I will do the same. And then, though it is against the law, I will go in to see the king. If I must die, I must die.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Mordecai went away and did everything as Esther had ordered him.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He went as far as the gate of the palace, for no one was allowed to enter the palace gate while wearing clothes of mourning. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And as news of the king’s decree reached all the provinces, there was great mourning among the Jews. They fasted, wept, and wailed, and many people lay in burlap and ashes.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Queen Esther’s maids and eunuchs came and told her about Mordecai, she was deeply distressed. She sent clothing to him to replace the burlap, but he refused it. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Esther sent for Hathach, one of the king’s eunuchs who had been appointed as her attendant. She ordered him to go to Mordecai and find out what was troubling him and why he was in mourning. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Hathach went out to Mordecai in the square in front of the palace gate.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mordecai told him the whole story, including the exact amount of money Haman had promised to pay into the royal treasury for the destruction of the Jews. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mordecai gave Hathach a copy of the decree issued in Susa that called for the death of all Jews. He asked Hathach to show it to Esther and explain the situation to her. He also asked Hathach to direct her to go to the king to beg for mercy and plead for her people. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Hathach returned to Esther with Mordecai’s message.
