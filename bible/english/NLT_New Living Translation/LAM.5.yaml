document_id: LAM.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prayer for Restoration
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', remember what has happened to us.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: See how we have been disgraced!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Our inheritance has been turned over to strangers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: our homes to foreigners.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: We are orphaned and fatherless.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Our mothers are widowed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: We have to pay for water to drink,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and even firewood is expensive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Those who pursue us are at our heels;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we are exhausted but are given no rest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: We submitted to Egypt and Assyria
- type: usfm
  marker: q2
  children:
  - type: text
    text: to get enough food to survive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Our ancestors sinned, but they have died—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and we are suffering the punishment they deserved!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Slaves have now become our masters;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is no one left to rescue us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: We hunt for food at the risk of our lives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for violence rules the countryside.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The famine has blackened our skin
- type: usfm
  marker: q2
  children:
  - type: text
    text: as though baked in an oven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Our enemies rape the women in Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in Zion.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the young girls in all the towns of Judah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Our princes are being hanged by their thumbs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and our elders are treated with contempt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Young men are led away to work at millstones,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and boys stagger under heavy loads of wood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The elders no longer sit in the city gates;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the young men no longer dance and sing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Joy has left our hearts;
- type: usfm
  marker: q2
  children:
  - type: text
    text: our dancing has turned to mourning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The garlands have
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The crown has.
    marker-yv: yv-n
  - type: text
    text: ' fallen from our heads.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Weep for us because we have sinned.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Our hearts are sick and weary,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and our eyes grow dim with tears.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mount Zion.
    marker-yv: yv-n
  - type: text
    text: ' is empty and desolate,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a place haunted by jackals.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you remain the same forever!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your throne continues from generation to generation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Why do you continue to forget us?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why have you abandoned us for so long?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Restore us, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and bring us back to you again!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give us back the joys we once had!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Or have you utterly rejected us?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Are you angry with us still?
