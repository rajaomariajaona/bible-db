document_id: LAM.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Prayer for Restoration
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', remember what has happened to us.'
  - type: text
    content: See how we have been disgraced!
  '10':
  - type: text
    content: The famine has blackened our skin
  - type: text
    content: as though baked in an oven.
  '11':
  - type: text
    content: Our enemies rape the women in Jerusalem
  - type: note
    content: Hebrew in Zion.
  - type: text
    content: and the young girls in all the towns of Judah.
  '12':
  - type: text
    content: Our princes are being hanged by their thumbs,
  - type: text
    content: and our elders are treated with contempt.
  '13':
  - type: text
    content: Young men are led away to work at millstones,
  - type: text
    content: and boys stagger under heavy loads of wood.
  '14':
  - type: text
    content: The elders no longer sit in the city gates;
  - type: text
    content: the young men no longer dance and sing.
  '15':
  - type: text
    content: Joy has left our hearts;
  - type: text
    content: our dancing has turned to mourning.
  '16':
  - type: text
    content: The garlands have
  - type: note
    content: Or The crown has.
  - type: text
    content: ' fallen from our heads.'
  - type: text
    content: Weep for us because we have sinned.
  '17':
  - type: text
    content: Our hearts are sick and weary,
  - type: text
    content: and our eyes grow dim with tears.
  '18':
  - type: text
    content: For Jerusalem
  - type: note
    content: Hebrew Mount Zion.
  - type: text
    content: ' is empty and desolate,'
  - type: text
    content: a place haunted by jackals.
  '19':
  - type: text
    content: 'But '
  - type: text
    content: Lord
  - type: text
    content: ', you remain the same forever!'
  - type: text
    content: Your throne continues from generation to generation.
  '2':
  - type: text
    content: Our inheritance has been turned over to strangers,
  - type: text
    content: our homes to foreigners.
  '20':
  - type: text
    content: Why do you continue to forget us?
  - type: text
    content: Why have you abandoned us for so long?
  '21':
  - type: text
    content: 'Restore us, O '
  - type: text
    content: Lord
  - type: text
    content: ', and bring us back to you again!'
  - type: text
    content: Give us back the joys we once had!
  '22':
  - type: text
    content: Or have you utterly rejected us?
  - type: text
    content: Are you angry with us still?
  '3':
  - type: text
    content: We are orphaned and fatherless.
  - type: text
    content: Our mothers are widowed.
  '4':
  - type: text
    content: We have to pay for water to drink,
  - type: text
    content: and even firewood is expensive.
  '5':
  - type: text
    content: Those who pursue us are at our heels;
  - type: text
    content: we are exhausted but are given no rest.
  '6':
  - type: text
    content: We submitted to Egypt and Assyria
  - type: text
    content: to get enough food to survive.
  '7':
  - type: text
    content: Our ancestors sinned, but they have died—
  - type: text
    content: and we are suffering the punishment they deserved!
  '8':
  - type: text
    content: Slaves have now become our masters;
  - type: text
    content: there is no one left to rescue us.
  '9':
  - type: text
    content: We hunt for food at the risk of our lives,
  - type: text
    content: for violence rules the countryside.
