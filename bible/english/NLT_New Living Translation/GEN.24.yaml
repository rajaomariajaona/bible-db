        children:
        - type: text
          text: also in 24:60.
      marker-yv: yv-n
    - type: text
      text: ' He will send his angel ahead of you, and he will see to it that you find a wife there for my son. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: If she is unwilling to come back with you, then you are free from this oath of mine. But under no circumstances are you to take my son there.”
