    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of heaven, who took me from my father’s house and my native land, solemnly promised to give this land to my descendants.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
