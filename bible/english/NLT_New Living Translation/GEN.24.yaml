document_id: GEN.24,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Wife for Isaac
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Abraham was now a very old man, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had blessed him in every way. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then he loaded ten of Abraham’s camels with all kinds of expensive gifts from his master, and he traveled to distant Aram-naharaim. There he went to the town where Abraham’s brother Nahor had settled. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He made the camels kneel beside a well just outside the town. It was evening, and the women were coming out to draw water.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of my master, Abraham,” he prayed. “Please give me success today, and show unfailing love to my master, Abraham. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'See, I am standing here beside this spring, and the young women of the town are coming out to draw water. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: This is my request. I will ask one of them, ‘Please give me a drink from your jug.’ If she says, ‘Yes, have a drink, and I will water your camels, too!’—let her be the one you have selected as Isaac’s wife. This is how I will know that you have shown unfailing love to my master.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Before he had finished praying, he saw a young woman named Rebekah coming out with her water jug on her shoulder. She was the daughter of Bethuel, who was the son of Abraham’s brother Nahor and his wife, Milcah. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Rebekah was very beautiful and old enough to be married, but she was still a virgin. She went down to the spring, filled her jug, and came up again. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Running over to her, the servant said, “Please give me a little drink of water from your jug.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Yes, my lord,” she answered, “have a drink.” And she quickly lowered her jug from her shoulder and gave him a drink. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'When she had given him a drink, she said, “I’ll draw water for your camels, too, until they have had enough to drink.” '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'One day Abraham said to his oldest servant, the man in charge of his household, “Take an oath by putting your hand under my thigh. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So she quickly emptied her jug into the watering trough and ran back to the well to draw water for all his camels.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The servant watched her in silence, wondering whether or not the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given him success in his mission. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Then at last, when the camels had finished drinking, he took out a gold ring for her nose and two large gold bracelets
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a gold nose-ring weighing a beka '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[0.2 ounces or 6 grams] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and two gold bracelets weighing 10 [shekels] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[4 ounces or 114 grams].'
      marker-yv: yv-n
    - type: text
      text: ' for her wrists.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “Whose daughter are you?” he asked. “And please tell me, would your father have any room to put us up for the night?”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“I am the daughter of Bethuel,” she replied. “My grandparents are Nahor and Milcah. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Yes, we have plenty of straw and feed for the camels, and we have room for guests.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'The man bowed low and worshiped the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of my master, Abraham,” he said. “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has shown unfailing love and faithfulness to my master, for he has led me straight to my master’s relatives.”'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The young woman ran home to tell her family everything that had happened. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Now Rebekah had a brother named Laban, who ran out to meet the man at the spring. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Swear by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of heaven and earth, that you will not allow my son to marry one of these local Canaanite women. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'He had seen the nose-ring and the bracelets on his sister’s wrists, and had heard Rebekah tell what the man had said. So he rushed out to the spring, where the man was still standing beside his camels. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Laban said to him, “Come and stay with us, you who are blessed by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! Why are you standing here outside the town when I have a room all ready for you and a place prepared for the camels?”'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'So the man went home with Laban, and Laban unloaded the camels, gave him straw for their bedding, fed them, and provided water for the man and the camel drivers to wash their feet. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Then food was served. But Abraham’s servant said, “I don’t want to eat until I have told you why I have come.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “All right,” Laban said, “tell us.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: '“I am Abraham’s servant,” he explained. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: '“And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has greatly blessed my master; he has become a wealthy man. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given him flocks of sheep and goats, herds of cattle, a fortune in silver and gold, and many male and female servants and camels and donkeys.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: '“When Sarah, my master’s wife, was very old, she gave birth to my master’s son, and my master has given him everything he owns. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And my master made me take an oath. He said, ‘Do not allow my son to marry one of these local Canaanite women. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Go instead to my father’s house, to my relatives, and find a wife there for my son.’
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: '“But I said to my master, ‘What if I can’t find a young woman who is willing to go back with me?’ '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Go instead to my homeland, to my relatives, and find a wife there for my son Isaac.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'He responded, ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', in whose presence I have lived, will send his angel with you and will make your mission successful. Yes, you must find a wife for my son from among my relatives, from my father’s family. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Then you will have fulfilled your obligation. But if you go to my relatives and they refuse to let her go with you, you will be free from my oath.’
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: '“So today when I came to the spring, I prayed this prayer: ‘O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of my master, Abraham, please give me success on this mission. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'See, I am standing here beside this spring. This is my request. When a young woman comes to draw water, I will say to her, “Please give me a little drink of water from your jug.” '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: If she says, “Yes, have a drink, and I will draw water for your camels, too,” let her be the one you have selected to be the wife of my master’s son.’
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: '“Before I had finished praying in my heart, I saw Rebekah coming out with her water jug on her shoulder. She went down to the spring and drew water. So I said to her, ‘Please give me a drink.’ '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: She quickly lowered her jug from her shoulder and said, ‘Yes, have a drink, and I will water your camels, too!’ So I drank, and then she watered the camels.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: “Then I asked, ‘Whose daughter are you?’ She replied, ‘I am the daughter of Bethuel, and my grandparents are Nahor and Milcah.’ So I put the ring on her nose, and the bracelets on her wrists.
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: '“Then I bowed low and worshiped the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. I praised the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of my master, Abraham, because he had led me straight to my master’s niece to be his son’s wife. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: So tell me—will you or won’t you show unfailing love and faithfulness to my master? Please tell me yes or no, and then I’ll know what to do next.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The servant asked, “But what if I can’t find a young woman who is willing to travel so far from home? Should I then take Isaac there to live among your relatives in the land you came from?”
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Then Laban and Bethuel replied, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has obviously brought you here, so there is nothing we can say. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Here is Rebekah; take her and go. Yes, let her be the wife of your master’s son, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has directed.”'
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'When Abraham’s servant heard their answer, he bowed down to the ground and worshiped the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Then he brought out silver and gold jewelry and clothing and presented them to Rebekah. He also gave expensive presents to her brother and mother. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Then they ate their meal, and the servant and the men with him stayed there overnight.
  - type: usfm
    marker: p
    children:
    - type: text
      text: But early the next morning, Abraham’s servant said, “Send me back to my master.”
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: “But we want Rebekah to stay with us at least ten days,” her brother and mother said. “Then she can go.”
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'But he said, “Don’t delay me. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has made my mission successful; now send me back so I can return to my master.”'
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: '“Well,” they said, “we’ll call Rebekah and ask her what she thinks.” '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: So they called Rebekah. “Are you willing to go with this man?” they asked her.
  - type: usfm
    marker: p
    children:
    - type: text
      text: And she replied, “Yes, I will go.”
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'So they said good-bye to Rebekah and sent her away with Abraham’s servant and his men. The woman who had been Rebekah’s childhood nurse went along with her. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“No!” Abraham responded. “Be careful never to take my son there. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'They gave her this blessing as she parted:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Our sister, may you become
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the mother of many millions!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May your descendants be strong
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and conquer the cities of their enemies.”
  '61':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: Then Rebekah and her servant girls mounted the camels and followed the man. So Abraham’s servant took Rebekah and went on his way.
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'Meanwhile, Isaac, whose home was in the Negev, had returned from Beer-lahai-roi. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'One evening as he was walking and meditating in the fields, he looked up and saw the camels coming. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'When Rebekah looked up and saw Isaac, she quickly dismounted from her camel. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: “Who is that man walking through the fields to meet us?” she asked the servant.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he replied, “It is my master.” So Rebekah covered her face with her veil. '
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: Then the servant told Isaac everything he had done.
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: And Isaac brought Rebekah into his mother Sarah’s tent, and she became his wife. He loved her deeply, and she was a special comfort to him after the death of his mother.
  '7':
  - type: usfm
    marker: p
    children:
