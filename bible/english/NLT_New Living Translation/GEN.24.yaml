document_id: GEN.24,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Wife for Isaac
  - type: text
    content: 'Abraham was now a very old man, and the '
  - type: text
    content: Lord
  - type: text
    content: ' had blessed him in every way. '
  '10':
  - type: text
    content: 'Then he loaded ten of Abraham’s camels with all kinds of expensive gifts from his master, and he traveled to distant Aram-naharaim. There he went to the town where Abraham’s brother Nahor had settled. '
  '11':
  - type: text
    content: He made the camels kneel beside a well just outside the town. It was evening, and the women were coming out to draw water.
  '12':
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ', God of my master, Abraham,” he prayed. “Please give me success today, and show unfailing love to my master, Abraham. '
  '13':
  - type: text
    content: 'See, I am standing here beside this spring, and the young women of the town are coming out to draw water. '
  '14':
  - type: text
    content: This is my request. I will ask one of them, ‘Please give me a drink from your jug.’ If she says, ‘Yes, have a drink, and I will water your camels, too!’—let her be the one you have selected as Isaac’s wife. This is how I will know that you have shown unfailing love to my master.”
  '15':
  - type: text
    content: 'Before he had finished praying, he saw a young woman named Rebekah coming out with her water jug on her shoulder. She was the daughter of Bethuel, who was the son of Abraham’s brother Nahor and his wife, Milcah. '
  '16':
  - type: text
    content: 'Rebekah was very beautiful and old enough to be married, but she was still a virgin. She went down to the spring, filled her jug, and came up again. '
  '17':
  - type: text
    content: Running over to her, the servant said, “Please give me a little drink of water from your jug.”
  '18':
  - type: text
    content: '“Yes, my lord,” she answered, “have a drink.” And she quickly lowered her jug from her shoulder and gave him a drink. '
  '19':
  - type: text
    content: 'When she had given him a drink, she said, “I’ll draw water for your camels, too, until they have had enough to drink.” '
  '2':
  - type: text
    content: 'One day Abraham said to his oldest servant, the man in charge of his household, “Take an oath by putting your hand under my thigh. '
  '20':
  - type: text
    content: So she quickly emptied her jug into the watering trough and ran back to the well to draw water for all his camels.
  '21':
  - type: text
    content: 'The servant watched her in silence, wondering whether or not the '
  - type: text
    content: Lord
  - type: text
    content: ' had given him success in his mission. '
  '22':
  - type: text
    content: Then at last, when the camels had finished drinking, he took out a gold ring for her nose and two large gold bracelets
  - type: note
    content: Hebrew a gold nose-ring weighing a beka [0.2 ounces or 6 grams] and two gold bracelets weighing 10 [shekels] [4 ounces or 114 grams].
  - type: text
    content: ' for her wrists.'
  '23':
  - type: text
    content: “Whose daughter are you?” he asked. “And please tell me, would your father have any room to put us up for the night?”
  '24':
  - type: text
    content: '“I am the daughter of Bethuel,” she replied. “My grandparents are Nahor and Milcah. '
  '25':
  - type: text
    content: Yes, we have plenty of straw and feed for the camels, and we have room for guests.”
  '26':
  - type: text
    content: 'The man bowed low and worshiped the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '27':
  - type: text
    content: '“Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of my master, Abraham,” he said. “The '
  - type: text
    content: Lord
  - type: text
    content: ' has shown unfailing love and faithfulness to my master, for he has led me straight to my master’s relatives.”'
  '28':
  - type: text
    content: 'The young woman ran home to tell her family everything that had happened. '
  '29':
  - type: text
    content: 'Now Rebekah had a brother named Laban, who ran out to meet the man at the spring. '
  '3':
  - type: text
    content: 'Swear by the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of heaven and earth, that you will not allow my son to marry one of these local Canaanite women. '
  '30':
  - type: text
    content: 'He had seen the nose-ring and the bracelets on his sister’s wrists, and had heard Rebekah tell what the man had said. So he rushed out to the spring, where the man was still standing beside his camels. '
  '31':
  - type: text
    content: 'Laban said to him, “Come and stay with us, you who are blessed by the '
  - type: text
    content: Lord
  - type: text
    content: '! Why are you standing here outside the town when I have a room all ready for you and a place prepared for the camels?”'
  '32':
  - type: text
    content: 'So the man went home with Laban, and Laban unloaded the camels, gave him straw for their bedding, fed them, and provided water for the man and the camel drivers to wash their feet. '
  '33':
  - type: text
    content: Then food was served. But Abraham’s servant said, “I don’t want to eat until I have told you why I have come.”
  - type: text
    content: “All right,” Laban said, “tell us.”
  '34':
  - type: text
    content: '“I am Abraham’s servant,” he explained. '
  '35':
  - type: text
    content: '“And the '
  - type: text
    content: Lord
  - type: text
    content: ' has greatly blessed my master; he has become a wealthy man. The '
  - type: text
    content: Lord
  - type: text
    content: ' has given him flocks of sheep and goats, herds of cattle, a fortune in silver and gold, and many male and female servants and camels and donkeys.'
  '36':
  - type: text
    content: '“When Sarah, my master’s wife, was very old, she gave birth to my master’s son, and my master has given him everything he owns. '
  '37':
  - type: text
    content: 'And my master made me take an oath. He said, ‘Do not allow my son to marry one of these local Canaanite women. '
  '38':
  - type: text
    content: Go instead to my father’s house, to my relatives, and find a wife there for my son.’
  '39':
  - type: text
    content: '“But I said to my master, ‘What if I can’t find a young woman who is willing to go back with me?’ '
  '4':
  - type: text
    content: Go instead to my homeland, to my relatives, and find a wife there for my son Isaac.”
  '40':
  - type: text
    content: 'He responded, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ', in whose presence I have lived, will send his angel with you and will make your mission successful. Yes, you must find a wife for my son from among my relatives, from my father’s family. '
  '41':
  - type: text
    content: Then you will have fulfilled your obligation. But if you go to my relatives and they refuse to let her go with you, you will be free from my oath.’
  '42':
  - type: text
    content: '“So today when I came to the spring, I prayed this prayer: ‘O '
  - type: text
    content: Lord
  - type: text
    content: ', God of my master, Abraham, please give me success on this mission. '
  '43':
  - type: text
    content: 'See, I am standing here beside this spring. This is my request. When a young woman comes to draw water, I will say to her, “Please give me a little drink of water from your jug.” '
  '44':
  - type: text
    content: If she says, “Yes, have a drink, and I will draw water for your camels, too,” let her be the one you have selected to be the wife of my master’s son.’
  '45':
  - type: text
    content: '“Before I had finished praying in my heart, I saw Rebekah coming out with her water jug on her shoulder. She went down to the spring and drew water. So I said to her, ‘Please give me a drink.’ '
  '46':
  - type: text
    content: She quickly lowered her jug from her shoulder and said, ‘Yes, have a drink, and I will water your camels, too!’ So I drank, and then she watered the camels.
  '47':
  - type: text
    content: “Then I asked, ‘Whose daughter are you?’ She replied, ‘I am the daughter of Bethuel, and my grandparents are Nahor and Milcah.’ So I put the ring on her nose, and the bracelets on her wrists.
  '48':
  - type: text
    content: '“Then I bowed low and worshiped the '
  - type: text
    content: Lord
  - type: text
    content: '. I praised the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of my master, Abraham, because he had led me straight to my master’s niece to be his son’s wife. '
  '49':
  - type: text
    content: So tell me—will you or won’t you show unfailing love and faithfulness to my master? Please tell me yes or no, and then I’ll know what to do next.”
  '5':
  - type: text
    content: The servant asked, “But what if I can’t find a young woman who is willing to travel so far from home? Should I then take Isaac there to live among your relatives in the land you came from?”
  '50':
  - type: text
    content: 'Then Laban and Bethuel replied, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has obviously brought you here, so there is nothing we can say. '
  '51':
  - type: text
    content: 'Here is Rebekah; take her and go. Yes, let her be the wife of your master’s son, as the '
  - type: text
    content: Lord
  - type: text
    content: ' has directed.”'
  '52':
  - type: text
    content: 'When Abraham’s servant heard their answer, he bowed down to the ground and worshiped the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '53':
  - type: text
    content: 'Then he brought out silver and gold jewelry and clothing and presented them to Rebekah. He also gave expensive presents to her brother and mother. '
  '54':
  - type: text
    content: Then they ate their meal, and the servant and the men with him stayed there overnight.
  - type: text
    content: But early the next morning, Abraham’s servant said, “Send me back to my master.”
  '55':
  - type: text
    content: “But we want Rebekah to stay with us at least ten days,” her brother and mother said. “Then she can go.”
  '56':
  - type: text
    content: 'But he said, “Don’t delay me. The '
  - type: text
    content: Lord
  - type: text
    content: ' has made my mission successful; now send me back so I can return to my master.”'
  '57':
  - type: text
    content: '“Well,” they said, “we’ll call Rebekah and ask her what she thinks.” '
  '58':
  - type: text
    content: So they called Rebekah. “Are you willing to go with this man?” they asked her.
  - type: text
    content: And she replied, “Yes, I will go.”
  '59':
  - type: text
    content: 'So they said good-bye to Rebekah and sent her away with Abraham’s servant and his men. The woman who had been Rebekah’s childhood nurse went along with her. '
  '6':
  - type: text
    content: '“No!” Abraham responded. “Be careful never to take my son there. '
  '60':
  - type: text
    content: 'They gave her this blessing as she parted:'
  - type: text
    content: “Our sister, may you become
  - type: text
    content: the mother of many millions!
  - type: text
    content: May your descendants be strong
  - type: text
    content: and conquer the cities of their enemies.”
  '61':
  - type: text
    content: Then Rebekah and her servant girls mounted the camels and followed the man. So Abraham’s servant took Rebekah and went on his way.
  '62':
  - type: text
    content: 'Meanwhile, Isaac, whose home was in the Negev, had returned from Beer-lahai-roi. '
  '63':
  - type: text
    content: 'One evening as he was walking and meditating in the fields, he looked up and saw the camels coming. '
  '64':
  - type: text
    content: 'When Rebekah looked up and saw Isaac, she quickly dismounted from her camel. '
  '65':
  - type: text
    content: “Who is that man walking through the fields to meet us?” she asked the servant.
  - type: text
    content: 'And he replied, “It is my master.” So Rebekah covered her face with her veil. '
  '66':
  - type: text
    content: Then the servant told Isaac everything he had done.
  '67':
  - type: text
    content: And Isaac brought Rebekah into his mother Sarah’s tent, and she became his wife. He loved her deeply, and she was a special comfort to him after the death of his mother.
  '7':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of heaven, who took me from my father’s house and my native land, solemnly promised to give this land to my descendants.'
  - type: note
    content: Hebrew seed; also in 24:60.
  - type: text
    content: ' He will send his angel ahead of you, and he will see to it that you find a wife there for my son. '
  '8':
  - type: text
    content: If she is unwilling to come back with you, then you are free from this oath of mine. But under no circumstances are you to take my son there.”
  '9':
  - type: text
    content: 'So the servant took an oath by putting his hand under the thigh of his master, Abraham. He swore to follow Abraham’s instructions. '
