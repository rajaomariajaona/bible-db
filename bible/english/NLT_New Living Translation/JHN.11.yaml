document_id: JHN.11,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Raising of Lazarus
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'A man named Lazarus was sick. He lived in Bethany with his sisters, Mary and Martha. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But at night there is danger of stumbling because they have no light.”
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Our friend Lazarus has fallen asleep, but now I will go and wake him up.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The disciples said, “Lord, if he is sleeping, he will soon get better!” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They thought Jesus meant Lazarus was simply sleeping, but Jesus meant Lazarus had died.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he told them plainly, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Lazarus is dead.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And for your sakes, I’m glad I wasn’t there, for now you will really believe. Come, let’s go see him.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thomas, nicknamed the Twin,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Thomas, who was called Didymus.
      marker-yv: yv-n
    - type: text
      text: ' said to his fellow disciples, “Let’s go, too—and die with Jesus.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus arrived at Bethany, he was told that Lazarus had already been in his grave for four days. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Bethany was only a few miles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'was about 15 stadia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[about 2.8 kilometers].'
      marker-yv: yv-n
    - type: text
      text: ' down the road from Jerusalem, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and many of the people had come to console Martha and Mary in their loss. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: This is the Mary who later poured the expensive perfume on the Lord’s feet and wiped them with her hair.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This incident is recorded in chapter 12.
      marker-yv: yv-n
    - type: text
      text: ' Her brother, Lazarus, was sick. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Martha got word that Jesus was coming, she went to meet him. But Mary stayed in the house. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Martha said to Jesus, “Lord, if only you had been here, my brother would not have died. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But even now I know that God will give you whatever you ask.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus told her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Your brother will rise again.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes,” Martha said, “he will rise when everyone else rises, at the last day.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus told her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am the resurrection and the life.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts do not include '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and the life.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Anyone who believes in me will live, even after dying.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Everyone who lives in me and believes in me will never ever die. Do you believe this, Martha?”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Yes, Lord,” she told him. “I have always believed you are the Messiah, the Son of God, the one who has come into the world from God.” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then she returned to Mary. She called Mary aside from the mourners and told her, “The Teacher is here and wants to see you.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Mary immediately went to him.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So the two sisters sent a message to Jesus telling him, “Lord, your dear friend is very sick.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus had stayed outside the village, at the place where Martha met him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the people who were at the house consoling Mary saw her leave so hastily, they assumed she was going to Lazarus’s grave to weep. So they followed her there. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Mary arrived and saw Jesus, she fell at his feet and said, “Lord, if only you had been here, my brother would not have died.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Jesus saw her weeping and saw the other people wailing with her, a deep anger welled up within him,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he was angry in his spirit.
      marker-yv: yv-n
    - type: text
      text: ' and he was deeply troubled. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Where have you put him?” '
    - type: text
      text: he asked them.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They told him, “Lord, come and see.” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus wept. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people who were standing nearby said, “See how much he loved him!” '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But some said, “This man healed a blind man. Couldn’t he have kept Lazarus from dying?”
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus was still angry as he arrived at the tomb, a cave with a stone rolled across its entrance. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Roll the stone aside,” '
    - type: text
      text: Jesus told them.
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Martha, the dead man’s sister, protested, “Lord, he has been dead for four days. The smell will be terrible.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when Jesus heard about it he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Lazarus’s sickness will not end in death. No, it happened for the glory of God so that the Son of God will receive glory from this.”
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus responded, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Didn’t I tell you that you would see God’s glory if you believe?”
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they rolled the stone aside. Then Jesus looked up to heaven and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Father, thank you for hearing me.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You always hear me, but I said it out loud for the sake of all these people standing here, so that they will believe you sent me.”
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus shouted, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Lazarus, come out!”
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the dead man came out, his hands and feet bound in graveclothes, his face wrapped in a headcloth. Jesus told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Unwrap him and let him go!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Plot to Kill Jesus
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Many of the people who were with Mary believed in Jesus when they saw this happen. '
  '46':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But some went to the Pharisees and told them what Jesus had done. '
  '47':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then the leading priests and Pharisees called the high council
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Sanhedrin.
      marker-yv: yv-n
    - type: text
      text: ' together. “What are we going to do?” they asked each other. “This man certainly performs many miraculous signs. '
  '48':
  - type: usfm
    marker: m
    children:
    - type: text
      text: If we allow him to go on like this, soon everyone will believe in him. Then the Roman army will come and destroy both our Temple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:48 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'our position; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: our place.
      marker-yv: yv-n
    - type: text
      text: ' and our nation.”'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Caiaphas, who was high priest at that time,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'that year; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 11:51.
      marker-yv: yv-n
    - type: text
      text: ' said, “You don’t know what you’re talking about! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So although Jesus loved Martha, Mary, and Lazarus, '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You don’t realize that it’s better for you that one man should die for the people than for the whole nation to be destroyed.”
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did not say this on his own; as high priest at that time he was led to prophesy that Jesus would die for the entire nation. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And not only for that nation, but to bring together and unite all the children of God scattered around the world.
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So from that time on, the Jewish leaders began to plot Jesus’ death. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As a result, Jesus stopped his public ministry among the people and left Jerusalem. He went to a place near the wilderness, to the village of Ephraim, and stayed there with his disciples.
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was now almost time for the Jewish Passover celebration, and many people from all over the country arrived in Jerusalem several days early so they could go through the purification ceremony before Passover began. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They kept looking for Jesus, but as they stood around in the Temple, they said to each other, “What do you think? He won’t come for Passover, will he?” '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, the leading priests and Pharisees had publicly ordered that anyone seeing Jesus must report it immediately so they could arrest him.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he stayed where he was for the next two days. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finally, he said to his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Let’s go back to Judea.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But his disciples objected. “Rabbi,” they said, “only a few days ago the people
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jewish people; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 11:19, 31, 33, 36, 45, 54.
      marker-yv: yv-n
    - type: text
      text: ' in Judea were trying to stone you. Are you going there again?”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “There are twelve hours of daylight every day. During the day people can walk safely. They can see because they have the light of this world.
    - type: text
      text: ' '
