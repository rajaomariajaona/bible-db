document_id: JHN.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Raising of Lazarus
  - type: text
    content: 'A man named Lazarus was sick. He lived in Bethany with his sisters, Mary and Martha. '
  '10':
  - type: text
    content: But at night there is danger of stumbling because they have no light.”
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Then he said, '
  - type: text
    content: “Our friend Lazarus has fallen asleep, but now I will go and wake him up.”
  '12':
  - type: text
    content: 'The disciples said, “Lord, if he is sleeping, he will soon get better!” '
  '13':
  - type: text
    content: They thought Jesus meant Lazarus was simply sleeping, but Jesus meant Lazarus had died.
  '14':
  - type: text
    content: 'So he told them plainly, '
  - type: text
    content: “Lazarus is dead.
  - type: text
    content: ' '
  '15':
  - type: text
    content: And for your sakes, I’m glad I wasn’t there, for now you will really believe. Come, let’s go see him.”
  '16':
  - type: text
    content: Thomas, nicknamed the Twin,
  - type: note
    content: Greek Thomas, who was called Didymus.
  - type: text
    content: ' said to his fellow disciples, “Let’s go, too—and die with Jesus.”'
  '17':
  - type: text
    content: 'When Jesus arrived at Bethany, he was told that Lazarus had already been in his grave for four days. '
  '18':
  - type: text
    content: Bethany was only a few miles
  - type: note
    content: Greek was about 15 stadia [about 2.8 kilometers].
  - type: text
    content: ' down the road from Jerusalem, '
  '19':
  - type: text
    content: 'and many of the people had come to console Martha and Mary in their loss. '
  '2':
  - type: text
    content: This is the Mary who later poured the expensive perfume on the Lord’s feet and wiped them with her hair.
  - type: note
    content: This incident is recorded in chapter 12.
  - type: text
    content: ' Her brother, Lazarus, was sick. '
  '20':
  - type: text
    content: 'When Martha got word that Jesus was coming, she went to meet him. But Mary stayed in the house. '
  '21':
  - type: text
    content: 'Martha said to Jesus, “Lord, if only you had been here, my brother would not have died. '
  '22':
  - type: text
    content: But even now I know that God will give you whatever you ask.”
  '23':
  - type: text
    content: 'Jesus told her, '
  - type: text
    content: “Your brother will rise again.”
  '24':
  - type: text
    content: “Yes,” Martha said, “he will rise when everyone else rises, at the last day.”
  '25':
  - type: text
    content: 'Jesus told her, '
  - type: text
    content: “I am the resurrection and the life.
  - type: note
    content: Some manuscripts do not include and the life.
  - type: text
    content: ' '
  - type: text
    content: Anyone who believes in me will live, even after dying.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Everyone who lives in me and believes in me will never ever die. Do you believe this, Martha?”
  '27':
  - type: text
    content: '“Yes, Lord,” she told him. “I have always believed you are the Messiah, the Son of God, the one who has come into the world from God.” '
  '28':
  - type: text
    content: 'Then she returned to Mary. She called Mary aside from the mourners and told her, “The Teacher is here and wants to see you.” '
  '29':
  - type: text
    content: So Mary immediately went to him.
  '3':
  - type: text
    content: So the two sisters sent a message to Jesus telling him, “Lord, your dear friend is very sick.”
  '30':
  - type: text
    content: 'Jesus had stayed outside the village, at the place where Martha met him. '
  '31':
  - type: text
    content: 'When the people who were at the house consoling Mary saw her leave so hastily, they assumed she was going to Lazarus’s grave to weep. So they followed her there. '
  '32':
  - type: text
    content: When Mary arrived and saw Jesus, she fell at his feet and said, “Lord, if only you had been here, my brother would not have died.”
  '33':
  - type: text
    content: When Jesus saw her weeping and saw the other people wailing with her, a deep anger welled up within him,
  - type: note
    content: Or he was angry in his spirit.
  - type: text
    content: ' and he was deeply troubled. '
  '34':
  - type: text
    content: '“Where have you put him?” '
  - type: text
    content: he asked them.
  - type: text
    content: 'They told him, “Lord, come and see.” '
  '35':
  - type: text
    content: 'Then Jesus wept. '
  '36':
  - type: text
    content: 'The people who were standing nearby said, “See how much he loved him!” '
  '37':
  - type: text
    content: But some said, “This man healed a blind man. Couldn’t he have kept Lazarus from dying?”
  '38':
  - type: text
    content: 'Jesus was still angry as he arrived at the tomb, a cave with a stone rolled across its entrance. '
  '39':
  - type: text
    content: '“Roll the stone aside,” '
  - type: text
    content: Jesus told them.
  - type: text
    content: But Martha, the dead man’s sister, protested, “Lord, he has been dead for four days. The smell will be terrible.”
  '4':
  - type: text
    content: 'But when Jesus heard about it he said, '
  - type: text
    content: “Lazarus’s sickness will not end in death. No, it happened for the glory of God so that the Son of God will receive glory from this.”
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “Didn’t I tell you that you would see God’s glory if you believe?”
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'So they rolled the stone aside. Then Jesus looked up to heaven and said, '
  - type: text
    content: “Father, thank you for hearing me.
  - type: text
    content: ' '
  '42':
  - type: text
    content: You always hear me, but I said it out loud for the sake of all these people standing here, so that they will believe you sent me.”
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Then Jesus shouted, '
  - type: text
    content: “Lazarus, come out!”
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'And the dead man came out, his hands and feet bound in graveclothes, his face wrapped in a headcloth. Jesus told them, '
  - type: text
    content: “Unwrap him and let him go!”
  - type: heading
    content: The Plot to Kill Jesus
  '45':
  - type: text
    content: 'Many of the people who were with Mary believed in Jesus when they saw this happen. '
  '46':
  - type: text
    content: 'But some went to the Pharisees and told them what Jesus had done. '
  '47':
  - type: text
    content: Then the leading priests and Pharisees called the high council
  - type: note
    content: Greek the Sanhedrin.
  - type: text
    content: ' together. “What are we going to do?” they asked each other. “This man certainly performs many miraculous signs. '
  '48':
  - type: text
    content: If we allow him to go on like this, soon everyone will believe in him. Then the Roman army will come and destroy both our Temple
  - type: note
    content: Or our position; Greek reads our place.
  - type: text
    content: ' and our nation.”'
  '49':
  - type: text
    content: Caiaphas, who was high priest at that time,
  - type: note
    content: Greek that year; also in 11:51.
  - type: text
    content: ' said, “You don’t know what you’re talking about! '
  '5':
  - type: text
    content: 'So although Jesus loved Martha, Mary, and Lazarus, '
  '50':
  - type: text
    content: You don’t realize that it’s better for you that one man should die for the people than for the whole nation to be destroyed.”
  '51':
  - type: text
    content: 'He did not say this on his own; as high priest at that time he was led to prophesy that Jesus would die for the entire nation. '
  '52':
  - type: text
    content: And not only for that nation, but to bring together and unite all the children of God scattered around the world.
  '53':
  - type: text
    content: 'So from that time on, the Jewish leaders began to plot Jesus’ death. '
  '54':
  - type: text
    content: As a result, Jesus stopped his public ministry among the people and left Jerusalem. He went to a place near the wilderness, to the village of Ephraim, and stayed there with his disciples.
  '55':
  - type: text
    content: 'It was now almost time for the Jewish Passover celebration, and many people from all over the country arrived in Jerusalem several days early so they could go through the purification ceremony before Passover began. '
  '56':
  - type: text
    content: 'They kept looking for Jesus, but as they stood around in the Temple, they said to each other, “What do you think? He won’t come for Passover, will he?” '
  '57':
  - type: text
    content: Meanwhile, the leading priests and Pharisees had publicly ordered that anyone seeing Jesus must report it immediately so they could arrest him.
  '6':
  - type: text
    content: 'he stayed where he was for the next two days. '
  '7':
  - type: text
    content: 'Finally, he said to his disciples, '
  - type: text
    content: “Let’s go back to Judea.”
  '8':
  - type: text
    content: But his disciples objected. “Rabbi,” they said, “only a few days ago the people
  - type: note
    content: Greek Jewish people; also in 11:19, 31, 33, 36, 45, 54.
  - type: text
    content: ' in Judea were trying to stone you. Are you going there again?”'
  '9':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “There are twelve hours of daylight every day. During the day people can walk safely. They can see because they have the light of this world.
  - type: text
    content: ' '
