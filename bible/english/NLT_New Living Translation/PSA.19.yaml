document_id: PSA.19,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The heavens proclaim the glory of God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The skies display his craftsmanship.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are more desirable than gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even the finest gold.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are sweeter than honey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even honey dripping from the comb.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are a warning to your servant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a great reward for those who obey them.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How can I know all the sins lurking in my heart?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Cleanse me from these hidden faults.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep your servant from deliberate sins!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t let them control me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I will be free of guilt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and innocent of great sin.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the words of my mouth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the meditation of my heart
  - type: usfm
    marker: q1
    children:
    - type: text
      text: be pleasing to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', my rock and my redeemer.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day after day they continue to speak;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: night after night they make him known.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They speak without a sound or word;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their voice is never heard.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: There is no speech or language where their voice is not heard.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet their message has gone throughout the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their words to all the world.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God has made a home in the heavens for the sun.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It bursts forth like a radiant bridegroom after his wedding.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It rejoices like a great athlete eager to run the race.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun rises at one end of the heavens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and follows its course to the other end.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nothing can hide from its heat.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The instructions of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' are perfect,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: reviving the soul.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The decrees of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' are trustworthy,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: making wise the simple.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The commandments of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' are right,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bringing joy to the heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The commands of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' are clear,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: giving insight for living.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Reverence for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is pure,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lasting forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The laws of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' are true;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: each one is fair.
