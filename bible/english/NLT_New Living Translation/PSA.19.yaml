document_id: PSA.19,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David.'
  - type: text
    content: The heavens proclaim the glory of God.
  - type: text
    content: The skies display his craftsmanship.
  '10':
  - type: text
    content: They are more desirable than gold,
  - type: text
    content: even the finest gold.
  - type: text
    content: They are sweeter than honey,
  - type: text
    content: even honey dripping from the comb.
  '11':
  - type: text
    content: They are a warning to your servant,
  - type: text
    content: a great reward for those who obey them.
  '12':
  - type: text
    content: How can I know all the sins lurking in my heart?
  - type: text
    content: Cleanse me from these hidden faults.
  '13':
  - type: text
    content: Keep your servant from deliberate sins!
  - type: text
    content: Don’t let them control me.
  - type: text
    content: Then I will be free of guilt
  - type: text
    content: and innocent of great sin.
  '14':
  - type: text
    content: May the words of my mouth
  - type: text
    content: and the meditation of my heart
  - type: text
    content: be pleasing to you,
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', my rock and my redeemer.'
  '2':
  - type: text
    content: Day after day they continue to speak;
  - type: text
    content: night after night they make him known.
  '3':
  - type: text
    content: They speak without a sound or word;
  - type: text
    content: their voice is never heard.
  - type: note
    content: Or There is no speech or language where their voice is not heard.
  '4':
  - type: text
    content: Yet their message has gone throughout the earth,
  - type: text
    content: and their words to all the world.
  - type: text
    content: God has made a home in the heavens for the sun.
  '5':
  - type: text
    content: It bursts forth like a radiant bridegroom after his wedding.
  - type: text
    content: It rejoices like a great athlete eager to run the race.
  '6':
  - type: text
    content: The sun rises at one end of the heavens
  - type: text
    content: and follows its course to the other end.
  - type: text
    content: Nothing can hide from its heat.
  '7':
  - type: text
    content: 'The instructions of the '
  - type: text
    content: Lord
  - type: text
    content: ' are perfect,'
  - type: text
    content: reviving the soul.
  - type: text
    content: 'The decrees of the '
  - type: text
    content: Lord
  - type: text
    content: ' are trustworthy,'
  - type: text
    content: making wise the simple.
  '8':
  - type: text
    content: 'The commandments of the '
  - type: text
    content: Lord
  - type: text
    content: ' are right,'
  - type: text
    content: bringing joy to the heart.
  - type: text
    content: 'The commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' are clear,'
  - type: text
    content: giving insight for living.
  '9':
  - type: text
    content: 'Reverence for the '
  - type: text
    content: Lord
  - type: text
    content: ' is pure,'
  - type: text
    content: lasting forever.
  - type: text
    content: 'The laws of the '
  - type: text
    content: Lord
  - type: text
    content: ' are true;'
  - type: text
    content: each one is fair.
