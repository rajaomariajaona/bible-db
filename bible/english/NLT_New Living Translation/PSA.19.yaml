document_id: PSA.19
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The heavens proclaim the glory of God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The skies display his craftsmanship.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Day after day they continue to speak;
- type: usfm
  marker: q2
  children:
  - type: text
    text: night after night they make him known.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They speak without a sound or word;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their voice is never heard.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: There is no speech or language where their voice is not heard.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Yet their message has gone throughout the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their words to all the world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God has made a home in the heavens for the sun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: It bursts forth like a radiant bridegroom after his wedding.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It rejoices like a great athlete eager to run the race.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The sun rises at one end of the heavens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and follows its course to the other end.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nothing can hide from its heat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The instructions of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' are perfect,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: reviving the soul.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The decrees of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' are trustworthy,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: making wise the simple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The commandments of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' are right,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: bringing joy to the heart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The commands of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' are clear,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: giving insight for living.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Reverence for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is pure,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: lasting forever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The laws of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' are true;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: each one is fair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They are more desirable than gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even the finest gold.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are sweeter than honey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even honey dripping from the comb.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They are a warning to your servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a great reward for those who obey them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: How can I know all the sins lurking in my heart?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cleanse me from these hidden faults.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Keep your servant from deliberate sins!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t let them control me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I will be free of guilt
- type: usfm
  marker: q2
  children:
  - type: text
    text: and innocent of great sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: May the words of my mouth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the meditation of my heart
- type: usfm
  marker: q1
  children:
  - type: text
    text: be pleasing to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', my rock and my redeemer.'
