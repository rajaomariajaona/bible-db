document_id: ACT.28,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul on the Island of Malta
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Once we were safe on shore, we learned that we were on the island of Malta. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As a result we were showered with honors, and when the time came to sail, people supplied us with everything we would need for the trip.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Arrives at Rome
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: It was three months after the shipwreck that we set sail on another ship that had wintered at the island—an Alexandrian ship with the twin gods
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'twin gods '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: were the Roman gods Castor and Pollux.
      marker-yv: yv-n
    - type: text
      text: ' as its figurehead. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Our first stop was Syracuse,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:12 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Syracuse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was on the island of Sicily.
      marker-yv: yv-n
    - type: text
      text: ' where we stayed three days. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: From there we sailed across to Rhegium.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:13 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Rhegium '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was on the southern tip of Italy.
      marker-yv: yv-n
    - type: text
      text: ' A day later a south wind began blowing, so the following day we sailed up the coast to Puteoli. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: There we found some believers,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers.
      marker-yv: yv-n
    - type: text
      text: ' who invited us to spend a week with them. And so we came to Rome.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The brothers and sisters
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:15a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers.
      marker-yv: yv-n
    - type: text
      text: ' in Rome had heard we were coming, and they came to meet us at the Forum'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:15b '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The Forum '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 43 miles (70 kilometers) from Rome.
      marker-yv: yv-n
    - type: text
      text: ' on the Appian Way. Others joined us at The Three Taverns.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:15c '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The Three Taverns '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was about 35 miles (57 kilometers) from Rome.
      marker-yv: yv-n
    - type: text
      text: ' When Paul saw them, he was encouraged and thanked God.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When we arrived in Rome, Paul was permitted to have his own private lodging, though he was guarded by a soldier.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Preaches at Rome under Guard
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Three days after Paul’s arrival, he called together the local Jewish leaders. He said to them, “Brothers, I was arrested in Jerusalem and handed over to the Roman government, even though I had done nothing against our people or the customs of our ancestors. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The Romans tried me and wanted to release me, because they found no cause for the death sentence. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But when the Jewish leaders protested the decision, I felt it necessary to appeal to Caesar, even though I had no desire to press charges against my own people. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The people of the island were very kind to us. It was cold and rainy, so they built a fire on the shore to welcome us.
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: I asked you to come here today so we could get acquainted and so I could explain to you that I am bound with this chain because I believe that the hope of Israel—the Messiah—has already come.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They replied, “We have had no letters from Judea or reports against you from anyone who has come here. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But we want to hear what you believe, for the only thing we know about this movement is that it is denounced everywhere.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So a time was set, and on that day a large number of people came to Paul’s lodging. He explained and testified about the Kingdom of God and tried to persuade them about Jesus from the Scriptures. Using the law of Moses and the books of the prophets, he spoke to them from morning until evening. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some were persuaded by the things he said, but others did not believe. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after they had argued back and forth among themselves, they left with this final word from Paul: “The Holy Spirit was right when he said to your ancestors through Isaiah the prophet,'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Go and say to this people:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you hear what I say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will not understand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you see what I do,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will not comprehend.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the hearts of these people are hardened,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their ears cannot hear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they have closed their eyes—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so their eyes cannot see,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their ears cannot hear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their hearts cannot understand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they cannot turn to me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let me heal them.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:26-27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 6:9-10 (Greek version).
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So I want you to know that this salvation from God has also been offered to the Gentiles, and they will accept it.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add verse 29, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: And when he had said these words, the Jews departed, greatly disagreeing with each other.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Paul gathered an armful of sticks and was laying them on the fire, a poisonous snake, driven out by the heat, bit him on the hand. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the next two years, Paul lived in Rome at his own expense.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in his own rented quarters.
      marker-yv: yv-n
    - type: text
      text: ' He welcomed all who visited him, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: boldly proclaiming the Kingdom of God and teaching about the Lord Jesus Christ. And no one tried to stop him.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people of the island saw it hanging from his hand and said to each other, “A murderer, no doubt! Though he escaped the sea, justice will not permit him to live.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Paul shook off the snake into the fire and was unharmed. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The people waited for him to swell up or suddenly drop dead. But when they had waited a long time and saw that he wasn’t harmed, they changed their minds and decided he was a god.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Near the shore where we landed was an estate belonging to Publius, the chief official of the island. He welcomed us and treated us kindly for three days. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As it happened, Publius’s father was ill with fever and dysentery. Paul went in and prayed for him, and laying his hands on him, he healed him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the other sick people on the island came and were healed. '
