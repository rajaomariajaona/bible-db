document_id: ACT.28,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul on the Island of Malta
  - type: text
    content: 'Once we were safe on shore, we learned that we were on the island of Malta. '
  '10':
  - type: text
    content: As a result we were showered with honors, and when the time came to sail, people supplied us with everything we would need for the trip.
  - type: heading
    content: Paul Arrives at Rome
  '11':
  - type: text
    content: It was three months after the shipwreck that we set sail on another ship that had wintered at the island—an Alexandrian ship with the twin gods
  - type: note
    content: The twin gods were the Roman gods Castor and Pollux.
  - type: text
    content: ' as its figurehead. '
  '12':
  - type: text
    content: Our first stop was Syracuse,
  - type: note
    content: Syracuse was on the island of Sicily.
  - type: text
    content: ' where we stayed three days. '
  '13':
  - type: text
    content: From there we sailed across to Rhegium.
  - type: note
    content: Rhegium was on the southern tip of Italy.
  - type: text
    content: ' A day later a south wind began blowing, so the following day we sailed up the coast to Puteoli. '
  '14':
  - type: text
    content: There we found some believers,
  - type: note
    content: Greek brothers.
  - type: text
    content: ' who invited us to spend a week with them. And so we came to Rome.'
  '15':
  - type: text
    content: The brothers and sisters
  - type: note
    content: Greek brothers.
  - type: text
    content: ' in Rome had heard we were coming, and they came to meet us at the Forum'
  - type: note
    content: The Forum was about 43 miles (70 kilometers) from Rome.
  - type: text
    content: ' on the Appian Way. Others joined us at The Three Taverns.'
  - type: note
    content: The Three Taverns was about 35 miles (57 kilometers) from Rome.
  - type: text
    content: ' When Paul saw them, he was encouraged and thanked God.'
  '16':
  - type: text
    content: When we arrived in Rome, Paul was permitted to have his own private lodging, though he was guarded by a soldier.
  - type: heading
    content: Paul Preaches at Rome under Guard
  '17':
  - type: text
    content: 'Three days after Paul’s arrival, he called together the local Jewish leaders. He said to them, “Brothers, I was arrested in Jerusalem and handed over to the Roman government, even though I had done nothing against our people or the customs of our ancestors. '
  '18':
  - type: text
    content: 'The Romans tried me and wanted to release me, because they found no cause for the death sentence. '
  '19':
  - type: text
    content: 'But when the Jewish leaders protested the decision, I felt it necessary to appeal to Caesar, even though I had no desire to press charges against my own people. '
  '2':
  - type: text
    content: The people of the island were very kind to us. It was cold and rainy, so they built a fire on the shore to welcome us.
  '20':
  - type: text
    content: I asked you to come here today so we could get acquainted and so I could explain to you that I am bound with this chain because I believe that the hope of Israel—the Messiah—has already come.”
  '21':
  - type: text
    content: 'They replied, “We have had no letters from Judea or reports against you from anyone who has come here. '
  '22':
  - type: text
    content: But we want to hear what you believe, for the only thing we know about this movement is that it is denounced everywhere.”
  '23':
  - type: text
    content: 'So a time was set, and on that day a large number of people came to Paul’s lodging. He explained and testified about the Kingdom of God and tried to persuade them about Jesus from the Scriptures. Using the law of Moses and the books of the prophets, he spoke to them from morning until evening. '
  '24':
  - type: text
    content: 'Some were persuaded by the things he said, but others did not believe. '
  '25':
  - type: text
    content: 'And after they had argued back and forth among themselves, they left with this final word from Paul: “The Holy Spirit was right when he said to your ancestors through Isaiah the prophet,'
  '26':
  - type: text
    content: '‘Go and say to this people:'
  - type: text
    content: When you hear what I say,
  - type: text
    content: you will not understand.
  - type: text
    content: When you see what I do,
  - type: text
    content: you will not comprehend.
  '27':
  - type: text
    content: For the hearts of these people are hardened,
  - type: text
    content: and their ears cannot hear,
  - type: text
    content: and they have closed their eyes—
  - type: text
    content: so their eyes cannot see,
  - type: text
    content: and their ears cannot hear,
  - type: text
    content: and their hearts cannot understand,
  - type: text
    content: and they cannot turn to me
  - type: text
    content: and let me heal them.’
  - type: note
    content: Isa 6:9-10 (Greek version).
  '28':
  - type: text
    content: So I want you to know that this salvation from God has also been offered to the Gentiles, and they will accept it.”
  - type: note
    content: Some manuscripts add verse 29, And when he had said these words, the Jews departed, greatly disagreeing with each other.
  '3':
  - type: text
    content: 'As Paul gathered an armful of sticks and was laying them on the fire, a poisonous snake, driven out by the heat, bit him on the hand. '
  '30':
  - type: text
    content: For the next two years, Paul lived in Rome at his own expense.
  - type: note
    content: Or in his own rented quarters.
  - type: text
    content: ' He welcomed all who visited him, '
  '31':
  - type: text
    content: boldly proclaiming the Kingdom of God and teaching about the Lord Jesus Christ. And no one tried to stop him.
  '4':
  - type: text
    content: 'The people of the island saw it hanging from his hand and said to each other, “A murderer, no doubt! Though he escaped the sea, justice will not permit him to live.” '
  '5':
  - type: text
    content: 'But Paul shook off the snake into the fire and was unharmed. '
  '6':
  - type: text
    content: The people waited for him to swell up or suddenly drop dead. But when they had waited a long time and saw that he wasn’t harmed, they changed their minds and decided he was a god.
  '7':
  - type: text
    content: 'Near the shore where we landed was an estate belonging to Publius, the chief official of the island. He welcomed us and treated us kindly for three days. '
  '8':
  - type: text
    content: 'As it happened, Publius’s father was ill with fever and dysentery. Paul went in and prayed for him, and laying his hands on him, he healed him. '
  '9':
  - type: text
    content: 'Then all the other sick people on the island came and were healed. '
