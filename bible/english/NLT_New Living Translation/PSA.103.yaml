document_id: PSA.103,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David.
  - type: text
    content: 'Let all that I am praise the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: with my whole heart, I will praise his holy name.
  '10':
  - type: text
    content: He does not punish us for all our sins;
  - type: text
    content: he does not deal harshly with us, as we deserve.
  '11':
  - type: text
    content: For his unfailing love toward those who fear him
  - type: text
    content: is as great as the height of the heavens above the earth.
  '12':
  - type: text
    content: He has removed our sins as far from us
  - type: text
    content: as the east is from the west.
  '13':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is like a father to his children,'
  - type: text
    content: tender and compassionate to those who fear him.
  '14':
  - type: text
    content: For he knows how weak we are;
  - type: text
    content: he remembers we are only dust.
  '15':
  - type: text
    content: Our days on earth are like grass;
  - type: text
    content: like wildflowers, we bloom and die.
  '16':
  - type: text
    content: The wind blows, and we are gone—
  - type: text
    content: as though we had never been here.
  '17':
  - type: text
    content: 'But the love of the '
  - type: text
    content: Lord
  - type: text
    content: ' remains forever'
  - type: text
    content: with those who fear him.
  - type: text
    content: His salvation extends to the children’s children
  '18':
  - type: text
    content: of those who are faithful to his covenant,
  - type: text
    content: of those who obey his commandments!
  '19':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has made the heavens his throne;'
  - type: text
    content: from there he rules over everything.
  '2':
  - type: text
    content: 'Let all that I am praise the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: may I never forget the good things he does for me.
  '20':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', you angels,'
  - type: text
    content: you mighty ones who carry out his plans,
  - type: text
    content: listening for each of his commands.
  '21':
  - type: text
    content: 'Yes, praise the '
  - type: text
    content: Lord
  - type: text
    content: ', you armies of angels'
  - type: text
    content: who serve him and do his will!
  '22':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', everything he has created,'
  - type: text
    content: everything in all his kingdom.
  - type: text
    content: 'Let all that I am praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: He forgives all my sins
  - type: text
    content: and heals all my diseases.
  '4':
  - type: text
    content: He redeems me from death
  - type: text
    content: and crowns me with love and tender mercies.
  '5':
  - type: text
    content: He fills my life with good things.
  - type: text
    content: My youth is renewed like the eagle’s!
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gives righteousness'
  - type: text
    content: and justice to all who are treated unfairly.
  '7':
  - type: text
    content: He revealed his character to Moses
  - type: text
    content: and his deeds to the people of Israel.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is compassionate and merciful,'
  - type: text
    content: slow to get angry and filled with unfailing love.
  '9':
  - type: text
    content: He will not constantly accuse us,
  - type: text
    content: nor remain angry forever.
