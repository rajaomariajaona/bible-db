document_id: PSA.103,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let all that I am praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with my whole heart, I will praise his holy name.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does not punish us for all our sins;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he does not deal harshly with us, as we deserve.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For his unfailing love toward those who fear him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is as great as the height of the heavens above the earth.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has removed our sins as far from us
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the east is from the west.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is like a father to his children,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tender and compassionate to those who fear him.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he knows how weak we are;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he remembers we are only dust.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our days on earth are like grass;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like wildflowers, we bloom and die.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wind blows, and we are gone—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as though we had never been here.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the love of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' remains forever'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with those who fear him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His salvation extends to the children’s children
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of those who are faithful to his covenant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of those who obey his commandments!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has made the heavens his throne;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from there he rules over everything.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let all that I am praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may I never forget the good things he does for me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you angels,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you mighty ones who carry out his plans,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listening for each of his commands.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you armies of angels'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who serve him and do his will!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', everything he has created,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everything in all his kingdom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let all that I am praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He forgives all my sins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and heals all my diseases.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He redeems me from death
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and crowns me with love and tender mercies.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He fills my life with good things.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My youth is renewed like the eagle’s!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gives righteousness'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and justice to all who are treated unfairly.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He revealed his character to Moses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his deeds to the people of Israel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is compassionate and merciful,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: slow to get angry and filled with unfailing love.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will not constantly accuse us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor remain angry forever.
