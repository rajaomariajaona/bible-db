document_id: PSA.103
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Let all that I am praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: with my whole heart, I will praise his holy name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Let all that I am praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may I never forget the good things he does for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He forgives all my sins
- type: usfm
  marker: q2
  children:
  - type: text
    text: and heals all my diseases.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He redeems me from death
- type: usfm
  marker: q2
  children:
  - type: text
    text: and crowns me with love and tender mercies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He fills my life with good things.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My youth is renewed like the eagle’s!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gives righteousness'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and justice to all who are treated unfairly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He revealed his character to Moses
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his deeds to the people of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is compassionate and merciful,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: slow to get angry and filled with unfailing love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He will not constantly accuse us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor remain angry forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He does not punish us for all our sins;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he does not deal harshly with us, as we deserve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For his unfailing love toward those who fear him
- type: usfm
  marker: q2
  children:
  - type: text
    text: is as great as the height of the heavens above the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He has removed our sins as far from us
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the east is from the west.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is like a father to his children,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: tender and compassionate to those who fear him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For he knows how weak we are;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he remembers we are only dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Our days on earth are like grass;
- type: usfm
  marker: q2
  children:
  - type: text
    text: like wildflowers, we bloom and die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The wind blows, and we are gone—
- type: usfm
  marker: q2
  children:
  - type: text
    text: as though we had never been here.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But the love of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' remains forever'
- type: usfm
  marker: q2
  children:
  - type: text
    text: with those who fear him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His salvation extends to the children’s children
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: of those who are faithful to his covenant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: of those who obey his commandments!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has made the heavens his throne;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: from there he rules over everything.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you angels,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you mighty ones who carry out his plans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: listening for each of his commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Yes, praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you armies of angels'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who serve him and do his will!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', everything he has created,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: everything in all his kingdom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let all that I am praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
