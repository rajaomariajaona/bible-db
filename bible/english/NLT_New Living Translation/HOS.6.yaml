document_id: HOS.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Repentance
  - type: text
    content: '“Come, let us return to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: He has torn us to pieces;
  - type: text
    content: now he will heal us.
  - type: text
    content: He has injured us;
  - type: text
    content: now he will bandage our wounds.
  '10':
  - type: text
    content: 'Yes, I have seen something horrible in Ephraim and Israel:'
  - type: text
    content: My people are defiled by prostituting themselves with other gods!
  '11':
  - type: text
    content: “O Judah, a harvest of punishment is also waiting for you,
  - type: text
    content: though I wanted to restore the fortunes of my people.
  '2':
  - type: text
    content: In just a short time he will restore us,
  - type: text
    content: so that we may live in his presence.
  '3':
  - type: text
    content: 'Oh, that we might know the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Let us press on to know him.
  - type: text
    content: He will respond to us as surely as the arrival of dawn
  - type: text
    content: or the coming of rains in early spring.”
  '4':
  - type: text
    content: “O Israel
  - type: note
    content: Hebrew Ephraim, referring to the northern kingdom of Israel.
  - type: text
    content: ' and Judah,'
  - type: text
    content: 'what should I do with you?” asks the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “For your love vanishes like the morning mist
  - type: text
    content: and disappears like dew in the sunlight.
  '5':
  - type: text
    content: I sent my prophets to cut you to pieces—
  - type: text
    content: to slaughter you with my words,
  - type: text
    content: with judgments as inescapable as light.
  '6':
  - type: text
    content: I want you to show love,
  - type: note
    content: Greek version translates this Hebrew term as to show mercy. Compare Matt 9:13; 12:7.
  - type: text
    content: not offer sacrifices.
  - type: text
    content: I want you to know me
  - type: note
    content: Hebrew to know God.
  - type: text
    content: more than I want burnt offerings.
  '7':
  - type: text
    content: But like Adam,
  - type: note
    content: Or But at Adam.
  - type: text
    content: ' you broke my covenant'
  - type: text
    content: and betrayed my trust.
  '8':
  - type: text
    content: “Gilead is a city of sinners,
  - type: text
    content: tracked with footprints of blood.
  '9':
  - type: text
    content: Priests form bands of robbers,
  - type: text
    content: waiting in ambush for their victims.
  - type: text
    content: They murder travelers along the road to Shechem
  - type: text
    content: and practice every kind of sin.
