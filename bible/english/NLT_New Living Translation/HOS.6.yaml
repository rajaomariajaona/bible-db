      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Come, let us return to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has torn us to pieces;
- type: usfm
  marker: q2
  children:
  - type: text
    text: now he will heal us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has injured us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: now he will bandage our wounds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: In just a short time he will restore us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that we may live in his presence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Oh, that we might know the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let us press on to know him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will respond to us as surely as the arrival of dawn
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the coming of rains in early spring.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “O Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ephraim, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: referring to the northern kingdom of Israel.
    marker-yv: yv-n
  - type: text
    text: ' and Judah,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'what should I do with you?” asks the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “For your love vanishes like the morning mist
- type: usfm
  marker: q2
  children:
  - type: text
    text: and disappears like dew in the sunlight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I sent my prophets to cut you to pieces—
- type: usfm
  marker: q2
  children:
  - type: text
    text: to slaughter you with my words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with judgments as inescapable as light.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I want you to show love,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:6a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version translates this Hebrew term as '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'to show mercy. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Matt 9:13; 12:7.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: not offer sacrifices.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I want you to know me
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:6b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to know God.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: more than I want burnt offerings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But like Adam,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: But at Adam.
    marker-yv: yv-n
  - type: text
    text: ' you broke my covenant'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and betrayed my trust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Gilead is a city of sinners,
- type: usfm
  marker: q2
  children:
  - type: text
    text: tracked with footprints of blood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Priests form bands of robbers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: waiting in ambush for their victims.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They murder travelers along the road to Shechem
- type: usfm
  marker: q2
  children:
  - type: text
    text: and practice every kind of sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Yes, I have seen something horrible in Ephraim and Israel:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: My people are defiled by prostituting themselves with other gods!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “O Judah, a harvest of punishment is also waiting for you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though I wanted to restore the fortunes of my people.
