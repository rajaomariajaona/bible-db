type_code: eng
verses:
  '1':
  - type: text
    content: And Samuel’s words went out to all the people of Israel.
  - type: heading
    content: The Philistines Capture the Ark
  - type: text
    content: 'At that time Israel was at war with the Philistines. The Israelite army was camped near Ebenezer, and the Philistines were at Aphek. '
  '10':
  - type: text
    content: 'So the Philistines fought desperately, and Israel was defeated again. The slaughter was great; 30,000 Israelite soldiers died that day. The survivors turned and fled to their tents. '
  '11':
  - type: text
    content: The Ark of God was captured, and Hophni and Phinehas, the two sons of Eli, were killed.
  - type: heading
    content: The Death of Eli
  '12':
  - type: text
    content: 'A man from the tribe of Benjamin ran from the battlefield and arrived at Shiloh later that same day. He had torn his clothes and put dust on his head to show his grief. '
  '13':
  - type: text
    content: Eli was waiting beside the road to hear the news of the battle, for his heart trembled for the safety of the Ark of God. When the messenger arrived and told what had happened, an outcry resounded throughout the town.
  '14':
  - type: text
    content: “What is all the noise about?” Eli asked.
  - type: text
    content: 'The messenger rushed over to Eli, '
  '15':
  - type: text
    content: 'who was ninety-eight years old and blind. '
  '16':
  - type: text
    content: He said to Eli, “I have just come from the battlefield—I was there this very day.”
  - type: text
    content: “What happened, my son?” Eli demanded.
  '17':
  - type: text
    content: “Israel has been defeated by the Philistines,” the messenger replied. “The people have been slaughtered, and your two sons, Hophni and Phinehas, were also killed. And the Ark of God has been captured.”
  '18':
  - type: text
    content: When the messenger mentioned what had happened to the Ark of God, Eli fell backward from his seat beside the gate. He broke his neck and died, for he was old and overweight. He had been Israel’s judge for forty years.
  '19':
  - type: text
    content: 'Eli’s daughter-in-law, the wife of Phinehas, was pregnant and near her time of delivery. When she heard that the Ark of God had been captured and that her father-in-law and husband were dead, she went into labor and gave birth. '
  '2':
  - type: text
    content: 'The Philistines attacked and defeated the army of Israel, killing 4,000 men. '
  '20':
  - type: text
    content: She died in childbirth, but before she passed away the midwives tried to encourage her. “Don’t be afraid,” they said. “You have a baby boy!” But she did not answer or pay attention to them.
  '21':
  - type: text
    content: 'She named the child Ichabod (which means “Where is the glory?”), for she said, “Israel’s glory is gone.” She named him this because the Ark of God had been captured and because her father-in-law and husband were dead. '
  '22':
  - type: text
    content: Then she said, “The glory has departed from Israel, for the Ark of God has been captured.”
  '3':
  - type: text
    content: 'After the battle was over, the troops retreated to their camp, and the elders of Israel asked, “Why did the '
  - type: text
    content: Lord
  - type: text
    content: ' allow us to be defeated by the Philistines?” Then they said, “Let’s bring the Ark of the Covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' from Shiloh. If we carry it into battle with us, it'
  - type: note
    content: Or he.
  - type: text
    content: ' will save us from our enemies.”'
  '4':
  - type: text
    content: 'So they sent men to Shiloh to bring the Ark of the Covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, who is enthroned between the cherubim. Hophni and Phinehas, the sons of Eli, were also there with the Ark of the Covenant of God. '
  '5':
  - type: text
    content: 'When all the Israelites saw the Ark of the Covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' coming into the camp, their shout of joy was so loud it made the ground shake!'
  '6':
  - type: text
    content: '“What’s going on?” the Philistines asked. “What’s all the shouting about in the Hebrew camp?” When they were told it was because the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' had arrived, '
  '7':
  - type: text
    content: they panicked. “The gods have
  - type: note
    content: Or A god has.
  - type: text
    content: ' come into their camp!” they cried. “This is a disaster! We have never had to face anything like this before! '
  '8':
  - type: text
    content: 'Help! Who can save us from these mighty gods of Israel? They are the same gods who destroyed the Egyptians with plagues when Israel was in the wilderness. '
  '9':
  - type: text
    content: Fight as never before, Philistines! If you don’t, we will become the Hebrews’ slaves just as they have been ours! Stand up like men and fight!”
