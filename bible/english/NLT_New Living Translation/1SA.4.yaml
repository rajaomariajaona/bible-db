          text: he.
      marker-yv: yv-n
    - type: text
      text: ' will save us from our enemies.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they sent men to Shiloh to bring the Ark of the Covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, who is enthroned between the cherubim. Hophni and Phinehas, the sons of Eli, were also there with the Ark of the Covenant of God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When all the Israelites saw the Ark of the Covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' coming into the camp, their shout of joy was so loud it made the ground shake!'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“What’s going on?” the Philistines asked. “What’s all the shouting about in the Hebrew camp?” When they were told it was because the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had arrived, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: they panicked. “The gods have
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:7 '
      - type: usfm
