document_id: 1SA.4
type_code: eng
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: And Samuel’s words went out to all the people of Israel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Philistines Capture the Ark
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: text
    text: 'At that time Israel was at war with the Philistines. The Israelite army was camped near Ebenezer, and the Philistines were at Aphek. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The Philistines attacked and defeated the army of Israel, killing 4,000 men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'After the battle was over, the troops retreated to their camp, and the elders of Israel asked, “Why did the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' allow us to be defeated by the Philistines?” Then they said, “Let’s bring the Ark of the Covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' from Shiloh. If we carry it into battle with us, it'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he.
    marker-yv: yv-n
  - type: text
    text: ' will save us from our enemies.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So they sent men to Shiloh to bring the Ark of the Covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, who is enthroned between the cherubim. Hophni and Phinehas, the sons of Eli, were also there with the Ark of the Covenant of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When all the Israelites saw the Ark of the Covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' coming into the camp, their shout of joy was so loud it made the ground shake!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“What’s going on?” the Philistines asked. “What’s all the shouting about in the Hebrew camp?” When they were told it was because the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had arrived, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: they panicked. “The gods have
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: A god has.
    marker-yv: yv-n
  - type: text
    text: ' come into their camp!” they cried. “This is a disaster! We have never had to face anything like this before! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Help! Who can save us from these mighty gods of Israel? They are the same gods who destroyed the Egyptians with plagues when Israel was in the wilderness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fight as never before, Philistines! If you don’t, we will become the Hebrews’ slaves just as they have been ours! Stand up like men and fight!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So the Philistines fought desperately, and Israel was defeated again. The slaughter was great; 30,000 Israelite soldiers died that day. The survivors turned and fled to their tents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The Ark of God was captured, and Hophni and Phinehas, the two sons of Eli, were killed.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Death of Eli
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A man from the tribe of Benjamin ran from the battlefield and arrived at Shiloh later that same day. He had torn his clothes and put dust on his head to show his grief. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eli was waiting beside the road to hear the news of the battle, for his heart trembled for the safety of the Ark of God. When the messenger arrived and told what had happened, an outcry resounded throughout the town.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “What is all the noise about?” Eli asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The messenger rushed over to Eli, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'who was ninety-eight years old and blind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He said to Eli, “I have just come from the battlefield—I was there this very day.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “What happened, my son?” Eli demanded.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Israel has been defeated by the Philistines,” the messenger replied. “The people have been slaughtered, and your two sons, Hophni and Phinehas, were also killed. And the Ark of God has been captured.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: When the messenger mentioned what had happened to the Ark of God, Eli fell backward from his seat beside the gate. He broke his neck and died, for he was old and overweight. He had been Israel’s judge for forty years.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Eli’s daughter-in-law, the wife of Phinehas, was pregnant and near her time of delivery. When she heard that the Ark of God had been captured and that her father-in-law and husband were dead, she went into labor and gave birth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: She died in childbirth, but before she passed away the midwives tried to encourage her. “Don’t be afraid,” they said. “You have a baby boy!” But she did not answer or pay attention to them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'She named the child Ichabod (which means “Where is the glory?”), for she said, “Israel’s glory is gone.” She named him this because the Ark of God had been captured and because her father-in-law and husband were dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then she said, “The glory has departed from Israel, for the Ark of God has been captured.”
