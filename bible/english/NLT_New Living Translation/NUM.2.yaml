document_id: NUM.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Organization for Israel’s Camp
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' gave these instructions to Moses and Aaron: '
  '10':
  - type: text
    content: '“The divisions of Reuben, Simeon, and Gad are to camp on the south side of the Tabernacle, beneath their family banners. These are the names of the tribes, their leaders, and the numbers of their registered troops:'
  - type: text
    content: Tribe
  - type: text
    content: Leader
  - type: text
    content: Number
  - type: text
    content: Reuben
  - type: text
    content: Elizur son of Shedeur
  - type: text
    content: 46,500
  '12':
  - type: text
    content: Simeon
  - type: text
    content: Shelumiel son of Zurishaddai
  - type: text
    content: 59,300
  '14':
  - type: text
    content: Gad
  - type: text
    content: Eliasaph son of Deuel
  - type: note
    content: As in many Hebrew manuscripts, Samaritan Pentateuch, and Latin Vulgate (see also 1:14); most Hebrew manuscripts read son of Reuel.
  - type: text
    content: 45,650
  '16':
  - type: text
    content: So the total of all the troops on Reuben’s side of the camp is 151,450. These three tribes will be second in line whenever the Israelites travel.
  '17':
  - type: text
    content: “Then the Tabernacle, carried by the Levites, will set out from the middle of the camp. All the tribes are to travel in the same order that they camp, each in position under the appropriate family banner.
  '18':
  - type: text
    content: '“The divisions of Ephraim, Manasseh, and Benjamin are to camp on the west side of the Tabernacle, beneath their family banners. These are the names of the tribes, their leaders, and the numbers of their registered troops:'
  - type: text
    content: Tribe
  - type: text
    content: Leader
  - type: text
    content: Number
  - type: text
    content: Ephraim
  - type: text
    content: Elishama son of Ammihud
  - type: text
    content: 40,500
  '2':
  - type: text
    content: “When the Israelites set up camp, each tribe will be assigned its own area. The tribal divisions will camp beneath their family banners on all four sides of the Tabernacle,
  - type: note
    content: Hebrew the Tent of Meeting; also in 2:17.
  - type: text
    content: ' but at some distance from it.'
  '20':
  - type: text
    content: Manasseh
  - type: text
    content: Gamaliel son of Pedahzur
  - type: text
    content: 32,200
  '22':
  - type: text
    content: Benjamin
  - type: text
    content: Abidan son of Gideoni
  - type: text
    content: 35,400
  '24':
  - type: text
    content: So the total of all the troops on Ephraim’s side of the camp is 108,100. These three tribes will be third in line whenever the Israelites travel.
  '25':
  - type: text
    content: '“The divisions of Dan, Asher, and Naphtali are to camp on the north side of the Tabernacle, beneath their family banners. These are the names of the tribes, their leaders, and the numbers of their registered troops:'
  - type: text
    content: Tribe
  - type: text
    content: Leader
  - type: text
    content: Number
  - type: text
    content: Dan
  - type: text
    content: Ahiezer son of Ammishaddai
  - type: text
    content: 62,700
  '27':
  - type: text
    content: Asher
  - type: text
    content: Pagiel son of Ocran
  - type: text
    content: 41,500
  '29':
  - type: text
    content: Naphtali
  - type: text
    content: Ahira son of Enan
  - type: text
    content: 53,400
  '3':
  - type: text
    content: '“The divisions of Judah, Issachar, and Zebulun are to camp toward the sunrise on the east side of the Tabernacle, beneath their family banners. These are the names of the tribes, their leaders, and the numbers of their registered troops:'
  - type: text
    content: Tribe
  - type: text
    content: Leader
  - type: text
    content: Number
  - type: text
    content: Judah
  - type: text
    content: Nahshon son of Amminadab
  - type: text
    content: 74,600
  '31':
  - type: text
    content: So the total of all the troops on Dan’s side of the camp is 157,600. These three tribes will be last, marching under their banners whenever the Israelites travel.”
  '32':
  - type: text
    content: 'In summary, the troops of Israel listed by their families totaled 603,550. '
  '33':
  - type: text
    content: 'But as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded, the Levites were not included in this registration. '
  '34':
  - type: text
    content: 'So the people of Israel did everything as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. Each clan and family set up camp and marched under their banners exactly as the '
  - type: text
    content: Lord
  - type: text
    content: ' had instructed them.'
  '5':
  - type: text
    content: Issachar
  - type: text
    content: Nethanel son of Zuar
  - type: text
    content: 54,400
  '7':
  - type: text
    content: Zebulun
  - type: text
    content: Eliab son of Helon
  - type: text
    content: 57,400
  '9':
  - type: text
    content: So the total of all the troops on Judah’s side of the camp is 186,400. These three tribes are to lead the way whenever the Israelites travel to a new campsite.
