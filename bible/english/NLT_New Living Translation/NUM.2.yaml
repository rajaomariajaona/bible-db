document_id: NUM.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Organization for Israel’s Camp
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave these instructions to Moses and Aaron: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The divisions of Reuben, Simeon, and Gad are to camp on the south side of the Tabernacle, beneath their family banners. These are the names of the tribes, their leaders, and the numbers of their registered troops:'
  - type: text
    text: TribeLeaderNumberReubenElizur son of Shedeur46,500
  '12':
  - type: text
    text: SimeonShelumiel son of Zurishaddai59,300
  '14':
  - type: text
    text: GadEliasaph son of Deuel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:14-15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in many Hebrew manuscripts, Samaritan Pentateuch, and Latin Vulgate (see also 1:14); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son of Reuel.
    marker-yv: yv-n
  - type: text
    text: 45,650
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So the total of all the troops on Reuben’s side of the camp is 151,450. These three tribes will be second in line whenever the Israelites travel.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Then the Tabernacle, carried by the Levites, will set out from the middle of the camp. All the tribes are to travel in the same order that they camp, each in position under the appropriate family banner.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The divisions of Ephraim, Manasseh, and Benjamin are to camp on the west side of the Tabernacle, beneath their family banners. These are the names of the tribes, their leaders, and the numbers of their registered troops:'
  - type: text
    text: TribeLeaderNumberEphraimElishama son of Ammihud40,500
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “When the Israelites set up camp, each tribe will be assigned its own area. The tribal divisions will camp beneath their family banners on all four sides of the Tabernacle,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Tent of Meeting; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 2:17.
      marker-yv: yv-n
    - type: text
      text: ' but at some distance from it.'
  '20':
  - type: text
    text: ManassehGamaliel son of Pedahzur32,200
  '22':
  - type: text
    text: BenjaminAbidan son of Gideoni35,400
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So the total of all the troops on Ephraim’s side of the camp is 108,100. These three tribes will be third in line whenever the Israelites travel.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The divisions of Dan, Asher, and Naphtali are to camp on the north side of the Tabernacle, beneath their family banners. These are the names of the tribes, their leaders, and the numbers of their registered troops:'
  - type: text
    text: TribeLeaderNumberDanAhiezer son of Ammishaddai62,700
  '27':
  - type: text
    text: AsherPagiel son of Ocran41,500
  '29':
  - type: text
    text: NaphtaliAhira son of Enan53,400
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The divisions of Judah, Issachar, and Zebulun are to camp toward the sunrise on the east side of the Tabernacle, beneath their family banners. These are the names of the tribes, their leaders, and the numbers of their registered troops:'
  - type: text
    text: TribeLeaderNumberJudahNahshon son of Amminadab74,600
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So the total of all the troops on Dan’s side of the camp is 157,600. These three tribes will be last, marching under their banners whenever the Israelites travel.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In summary, the troops of Israel listed by their families totaled 603,550. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded, the Levites were not included in this registration. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the people of Israel did everything as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses. Each clan and family set up camp and marched under their banners exactly as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had instructed them.'
  '5':
  - type: text
    text: IssacharNethanel son of Zuar54,400
  '7':
  - type: text
    text: ZebulunEliab son of Helon57,400
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So the total of all the troops on Judah’s side of the camp is 186,400. These three tribes are to lead the way whenever the Israelites travel to a new campsite.
