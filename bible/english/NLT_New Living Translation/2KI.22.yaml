document_id: 2KI.22,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Josiah Rules in Judah
  - type: text
    content: 'Josiah was eight years old when he became king, and he reigned in Jerusalem thirty-one years. His mother was Jedidah, the daughter of Adaiah from Bozkath. '
  '10':
  - type: text
    content: Shaphan also told the king, “Hilkiah the priest has given me a scroll.” So Shaphan read it to the king.
  '11':
  - type: text
    content: 'When the king heard what was written in the Book of the Law, he tore his clothes in despair. '
  '12':
  - type: text
    content: 'Then he gave these orders to Hilkiah the priest, Ahikam son of Shaphan, Acbor son of Micaiah, Shaphan the court secretary, and Asaiah the king’s personal adviser: '
  '13':
  - type: text
    content: '“Go to the Temple and speak to the '
  - type: text
    content: Lord
  - type: text
    content: ' for me and for the people and for all Judah. Inquire about the words written in this scroll that has been found. For the '
  - type: text
    content: Lord
  - type: text
    content: ’s great anger is burning against us because our ancestors have not obeyed the words in this scroll. We have not been doing everything it says we must do.”
  '14':
  - type: text
    content: So Hilkiah the priest, Ahikam, Acbor, Shaphan, and Asaiah went to the New Quarter
  - type: note
    content: Or the Second Quarter, a newer section of Jerusalem. Hebrew reads the Mishneh.
  - type: text
    content: ' of Jerusalem to consult with the prophet Huldah. She was the wife of Shallum son of Tikvah, son of Harhas, the keeper of the Temple wardrobe.'
  '15':
  - type: text
    content: 'She said to them, “The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, has spoken! Go back and tell the man who sent you, '
  '16':
  - type: text
    content: '‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am going to bring disaster on this city'
  - type: note
    content: Hebrew this place; also in 22:19, 20.
  - type: text
    content: ' and its people. All the words written in the scroll that the king of Judah has read will come true. '
  '17':
  - type: text
    content: For my people have abandoned me and offered sacrifices to pagan gods, and I am very angry with them for everything they have done. My anger will burn against this place, and it will not be quenched.’
  '18':
  - type: text
    content: '“But go to the king of Judah who sent you to seek the '
  - type: text
    content: Lord
  - type: text
    content: ' and tell him: ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says concerning the message you have just heard: '
  '19':
  - type: text
    content: 'You were sorry and humbled yourself before the '
  - type: text
    content: Lord
  - type: text
    content: ' when you heard what I said against this city and its people—that this land would be cursed and become desolate. You tore your clothing in despair and wept before me in repentance. And I have indeed heard you, says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'He did what was pleasing in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight and followed the example of his ancestor David. He did not turn away from doing what was right.
  '20':
  - type: text
    content: So I will not send the promised disaster until after you have died and been buried in peace. You will not see the disaster I am going to bring on this city.’”
  - type: text
    content: So they took her message back to the king.
  '3':
  - type: text
    content: 'In the eighteenth year of his reign, King Josiah sent Shaphan son of Azaliah and grandson of Meshullam, the court secretary, to the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. He told him, '
  '4':
  - type: text
    content: '“Go to Hilkiah the high priest and have him count the money the gatekeepers have collected from the people at the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple. '
  '5':
  - type: text
    content: 'Entrust this money to the men assigned to supervise the restoration of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple. Then they can use it to pay workers to repair the Temple. '
  '6':
  - type: text
    content: 'They will need to hire carpenters, builders, and masons. Also have them buy the timber and the finished stone needed to repair the Temple. '
  '7':
  - type: text
    content: But don’t require the construction supervisors to keep account of the money they receive, for they are honest and trustworthy men.”
  - type: heading
    content: Hilkiah Discovers God’s Law
  '8':
  - type: text
    content: 'Hilkiah the high priest said to Shaphan the court secretary, “I have found the Book of the Law in the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple!” Then Hilkiah gave the scroll to Shaphan, and he read it.
  '9':
  - type: text
    content: 'Shaphan went to the king and reported, “Your officials have turned over the money collected at the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' to the workers and supervisors at the Temple.” '
