document_id: 2KI.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josiah Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Josiah was eight years old when he became king, and he reigned in Jerusalem thirty-one years. His mother was Jedidah, the daughter of Adaiah from Bozkath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He did what was pleasing in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s sight and followed the example of his ancestor David. He did not turn away from doing what was right.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'In the eighteenth year of his reign, King Josiah sent Shaphan son of Azaliah and grandson of Meshullam, the court secretary, to the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. He told him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“Go to Hilkiah the high priest and have him count the money the gatekeepers have collected from the people at the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Entrust this money to the men assigned to supervise the restoration of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple. Then they can use it to pay workers to repair the Temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They will need to hire carpenters, builders, and masons. Also have them buy the timber and the finished stone needed to repair the Temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But don’t require the construction supervisors to keep account of the money they receive, for they are honest and trustworthy men.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hilkiah Discovers God’s Law
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hilkiah the high priest said to Shaphan the court secretary, “I have found the Book of the Law in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple!” Then Hilkiah gave the scroll to Shaphan, and he read it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Shaphan went to the king and reported, “Your officials have turned over the money collected at the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to the workers and supervisors at the Temple.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Shaphan also told the king, “Hilkiah the priest has given me a scroll.” So Shaphan read it to the king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When the king heard what was written in the Book of the Law, he tore his clothes in despair. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then he gave these orders to Hilkiah the priest, Ahikam son of Shaphan, Acbor son of Micaiah, Shaphan the court secretary, and Asaiah the king’s personal adviser: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“Go to the Temple and speak to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for me and for the people and for all Judah. Inquire about the words written in this scroll that has been found. For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s great anger is burning against us because our ancestors have not obeyed the words in this scroll. We have not been doing everything it says we must do.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: So Hilkiah the priest, Ahikam, Acbor, Shaphan, and Asaiah went to the New Quarter
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the Second Quarter, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a newer section of Jerusalem. Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Mishneh.
    marker-yv: yv-n
  - type: text
    text: ' of Jerusalem to consult with the prophet Huldah. She was the wife of Shallum son of Tikvah, son of Harhas, the keeper of the Temple wardrobe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'She said to them, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, has spoken! Go back and tell the man who sent you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I am going to bring disaster on this city'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'this place; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 22:19, 20.
    marker-yv: yv-n
  - type: text
    text: ' and its people. All the words written in the scroll that the king of Judah has read will come true. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For my people have abandoned me and offered sacrifices to pagan gods, and I am very angry with them for everything they have done. My anger will burn against this place, and it will not be quenched.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“But go to the king of Judah who sent you to seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and tell him: ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, says concerning the message you have just heard: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'You were sorry and humbled yourself before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' when you heard what I said against this city and its people—that this land would be cursed and become desolate. You tore your clothing in despair and wept before me in repentance. And I have indeed heard you, says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So I will not send the promised disaster until after you have died and been buried in peace. You will not see the disaster I am going to bring on this city.’”
- type: usfm
  marker: p
  children:
  - type: text
    text: So they took her message back to the king.
