document_id: 1PE.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Advice for Elders and Young Men
  - type: text
    content: 'And now, a word to you who are elders in the churches. I, too, am an elder and a witness to the sufferings of Christ. And I, too, will share in his glory when he is revealed to the whole world. As a fellow elder, I appeal to you: '
  '10':
  - type: text
    content: 'In his kindness God called you to share in his eternal glory by means of Christ Jesus. So after you have suffered a little while, he will restore, support, and strengthen you, and he will place you on a firm foundation. '
  '11':
  - type: text
    content: All power to him forever! Amen.
  - type: heading
    content: Peter’s Final Greetings
  '12':
  - type: text
    content: I have written and sent this short letter to you with the help of Silas,
  - type: note
    content: Greek Silvanus.
  - type: text
    content: ' whom I commend to you as a faithful brother. My purpose in writing is to encourage you and assure you that what you are experiencing is truly part of God’s grace for you. Stand firm in this grace.'
  '13':
  - type: text
    content: Your sister church here in Babylon
  - type: note
    content: Greek The elect one in Babylon. Babylon was probably symbolic for Rome.
  - type: text
    content: ' sends you greetings, and so does my son Mark. '
  '14':
  - type: text
    content: Greet each other with a kiss of love.
  - type: text
    content: Peace be with all of you who are in Christ.
  '2':
  - type: text
    content: 'Care for the flock that God has entrusted to you. Watch over it willingly, not grudgingly—not for what you will get out of it, but because you are eager to serve God. '
  '3':
  - type: text
    content: 'Don’t lord it over the people assigned to your care, but lead them by your own good example. '
  '4':
  - type: text
    content: And when the Great Shepherd appears, you will receive a crown of never-ending glory and honor.
  '5':
  - type: text
    content: In the same way, you who are younger must accept the authority of the elders. And all of you, dress yourselves in humility as you relate to one another, for
  - type: text
    content: “God opposes the proud
  - type: text
    content: but gives grace to the humble.”
  - type: note
    content: Prov 3:34 (Greek version).
  '6':
  - type: text
    content: 'So humble yourselves under the mighty power of God, and at the right time he will lift you up in honor. '
  '7':
  - type: text
    content: Give all your worries and cares to God, for he cares about you.
  '8':
  - type: text
    content: 'Stay alert! Watch out for your great enemy, the devil. He prowls around like a roaring lion, looking for someone to devour. '
  '9':
  - type: text
    content: Stand firm against him, and be strong in your faith. Remember that your family of believers
  - type: note
    content: Greek your brotherhood.
  - type: text
    content: ' all over the world is going through the same kind of suffering you are.'
