document_id: 1PE.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Advice for Elders and Young Men
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And now, a word to you who are elders in the churches. I, too, am an elder and a witness to the sufferings of Christ. And I, too, will share in his glory when he is revealed to the whole world. As a fellow elder, I appeal to you: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'In his kindness God called you to share in his eternal glory by means of Christ Jesus. So after you have suffered a little while, he will restore, support, and strengthen you, and he will place you on a firm foundation. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: All power to him forever! Amen.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter’s Final Greetings
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I have written and sent this short letter to you with the help of Silas,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Silvanus.
      marker-yv: yv-n
    - type: text
      text: ' whom I commend to you as a faithful brother. My purpose in writing is to encourage you and assure you that what you are experiencing is truly part of God’s grace for you. Stand firm in this grace.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Your sister church here in Babylon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The elect one in Babylon. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Babylon was probably symbolic for Rome.
      marker-yv: yv-n
    - type: text
      text: ' sends you greetings, and so does my son Mark. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Greet each other with a kiss of love.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peace be with all of you who are in Christ.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Care for the flock that God has entrusted to you. Watch over it willingly, not grudgingly—not for what you will get out of it, but because you are eager to serve God. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Don’t lord it over the people assigned to your care, but lead them by your own good example. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: And when the Great Shepherd appears, you will receive a crown of never-ending glory and honor.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: In the same way, you who are younger must accept the authority of the elders. And all of you, dress yourselves in humility as you relate to one another, for
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “God opposes the proud
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but gives grace to the humble.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Prov 3:34 (Greek version).
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So humble yourselves under the mighty power of God, and at the right time he will lift you up in honor. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Give all your worries and cares to God, for he cares about you.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Stay alert! Watch out for your great enemy, the devil. He prowls around like a roaring lion, looking for someone to devour. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Stand firm against him, and be strong in your faith. Remember that your family of believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your brotherhood.
      marker-yv: yv-n
    - type: text
      text: ' all over the world is going through the same kind of suffering you are.'
