document_id: PRO.17,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Better a dry crust eaten in peace
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than a house filled with feasting—and conflict.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A single rebuke does more for a person of understanding
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than a hundred lashes on the back of a fool.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Evil people are eager for rebellion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they will be severely punished.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is safer to meet a bear robbed of her cubs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than to confront a fool caught in foolishness.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you repay good with evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: evil will never leave your house.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Starting a quarrel is like opening a floodgate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so stop before a dispute breaks out.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Acquitting the guilty and condemning the innocent—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'both are detestable to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is senseless to pay to educate a fool,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: since he has no heart for learning.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A friend is always loyal,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a brother is born to help in time of need.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s poor judgment to guarantee another person’s debt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or put up security for a friend.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anyone who loves to quarrel loves sin;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: anyone who trusts in high walls invites disaster.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wise servant will rule over the master’s disgraceful son
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will share the inheritance of the master’s children.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The crooked heart will not prosper;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the lying tongue tumbles into trouble.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is painful to be the parent of a fool;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no joy for the father of a rebel.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cheerful heart is good medicine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a broken spirit saps a person’s strength.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked take secret bribes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to pervert the course of justice.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sensible people keep their eyes glued on wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a fool’s eyes wander to the ends of the earth.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foolish children
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: A foolish son.
      marker-yv: yv-n
    - type: text
      text: ' bring grief to their father'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bitterness to the one who gave them birth.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is wrong to punish the godly for being good
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or to flog leaders for being honest.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A truly wise person uses few words;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a person with understanding is even-tempered.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even fools are thought wise when they keep silent;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with their mouths shut, they seem intelligent.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fire tests the purity of silver and gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' tests the heart.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wrongdoers eagerly listen to gossip;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: liars pay close attention to slander.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who mock the poor insult their Maker;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who rejoice at the misfortune of others will be punished.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Grandchildren are the crowning glory of the aged;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: parents
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fathers.
      marker-yv: yv-n
    - type: text
      text: ' are the pride of their children.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eloquent words are not fitting for a fool;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even less are lies fitting for a ruler.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A bribe is like a lucky charm;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whoever gives one will prosper!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Love prospers when a fault is forgiven,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but dwelling on it separates close friends.
