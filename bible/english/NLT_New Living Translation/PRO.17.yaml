document_id: PRO.17,116
type_code: eng
verses:
  '1':
  - type: text
    content: Better a dry crust eaten in peace
  - type: text
    content: than a house filled with feasting—and conflict.
  '10':
  - type: text
    content: A single rebuke does more for a person of understanding
  - type: text
    content: than a hundred lashes on the back of a fool.
  '11':
  - type: text
    content: Evil people are eager for rebellion,
  - type: text
    content: but they will be severely punished.
  '12':
  - type: text
    content: It is safer to meet a bear robbed of her cubs
  - type: text
    content: than to confront a fool caught in foolishness.
  '13':
  - type: text
    content: If you repay good with evil,
  - type: text
    content: evil will never leave your house.
  '14':
  - type: text
    content: Starting a quarrel is like opening a floodgate,
  - type: text
    content: so stop before a dispute breaks out.
  '15':
  - type: text
    content: Acquitting the guilty and condemning the innocent—
  - type: text
    content: 'both are detestable to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '16':
  - type: text
    content: It is senseless to pay to educate a fool,
  - type: text
    content: since he has no heart for learning.
  '17':
  - type: text
    content: A friend is always loyal,
  - type: text
    content: and a brother is born to help in time of need.
  '18':
  - type: text
    content: It’s poor judgment to guarantee another person’s debt
  - type: text
    content: or put up security for a friend.
  '19':
  - type: text
    content: Anyone who loves to quarrel loves sin;
  - type: text
    content: anyone who trusts in high walls invites disaster.
  '2':
  - type: text
    content: A wise servant will rule over the master’s disgraceful son
  - type: text
    content: and will share the inheritance of the master’s children.
  '20':
  - type: text
    content: The crooked heart will not prosper;
  - type: text
    content: the lying tongue tumbles into trouble.
  '21':
  - type: text
    content: It is painful to be the parent of a fool;
  - type: text
    content: there is no joy for the father of a rebel.
  '22':
  - type: text
    content: A cheerful heart is good medicine,
  - type: text
    content: but a broken spirit saps a person’s strength.
  '23':
  - type: text
    content: The wicked take secret bribes
  - type: text
    content: to pervert the course of justice.
  '24':
  - type: text
    content: Sensible people keep their eyes glued on wisdom,
  - type: text
    content: but a fool’s eyes wander to the ends of the earth.
  '25':
  - type: text
    content: Foolish children
  - type: note
    content: Hebrew A foolish son.
  - type: text
    content: ' bring grief to their father'
  - type: text
    content: and bitterness to the one who gave them birth.
  '26':
  - type: text
    content: It is wrong to punish the godly for being good
  - type: text
    content: or to flog leaders for being honest.
  '27':
  - type: text
    content: A truly wise person uses few words;
  - type: text
    content: a person with understanding is even-tempered.
  '28':
  - type: text
    content: Even fools are thought wise when they keep silent;
  - type: text
    content: with their mouths shut, they seem intelligent.
  '3':
  - type: text
    content: Fire tests the purity of silver and gold,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' tests the heart.'
  '4':
  - type: text
    content: Wrongdoers eagerly listen to gossip;
  - type: text
    content: liars pay close attention to slander.
  '5':
  - type: text
    content: Those who mock the poor insult their Maker;
  - type: text
    content: those who rejoice at the misfortune of others will be punished.
  '6':
  - type: text
    content: Grandchildren are the crowning glory of the aged;
  - type: text
    content: parents
  - type: note
    content: Hebrew fathers.
  - type: text
    content: ' are the pride of their children.'
  '7':
  - type: text
    content: Eloquent words are not fitting for a fool;
  - type: text
    content: even less are lies fitting for a ruler.
  '8':
  - type: text
    content: A bribe is like a lucky charm;
  - type: text
    content: whoever gives one will prosper!
  '9':
  - type: text
    content: Love prospers when a fault is forgiven,
  - type: text
    content: but dwelling on it separates close friends.
