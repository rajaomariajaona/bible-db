document_id: PRO.17
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Better a dry crust eaten in peace
- type: usfm
  marker: q2
  children:
  - type: text
    text: than a house filled with feasting—and conflict.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A wise servant will rule over the master’s disgraceful son
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will share the inheritance of the master’s children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fire tests the purity of silver and gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' tests the heart.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Wrongdoers eagerly listen to gossip;
- type: usfm
  marker: q2
  children:
  - type: text
    text: liars pay close attention to slander.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Those who mock the poor insult their Maker;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who rejoice at the misfortune of others will be punished.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Grandchildren are the crowning glory of the aged;
- type: usfm
  marker: q2
  children:
  - type: text
    text: parents
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fathers.
    marker-yv: yv-n
  - type: text
    text: ' are the pride of their children.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Eloquent words are not fitting for a fool;
- type: usfm
  marker: q2
  children:
  - type: text
    text: even less are lies fitting for a ruler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A bribe is like a lucky charm;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever gives one will prosper!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Love prospers when a fault is forgiven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but dwelling on it separates close friends.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A single rebuke does more for a person of understanding
- type: usfm
  marker: q2
  children:
  - type: text
    text: than a hundred lashes on the back of a fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Evil people are eager for rebellion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they will be severely punished.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It is safer to meet a bear robbed of her cubs
- type: usfm
  marker: q2
  children:
  - type: text
    text: than to confront a fool caught in foolishness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: If you repay good with evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: evil will never leave your house.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Starting a quarrel is like opening a floodgate,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so stop before a dispute breaks out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Acquitting the guilty and condemning the innocent—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'both are detestable to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: It is senseless to pay to educate a fool,
- type: usfm
  marker: q2
  children:
  - type: text
    text: since he has no heart for learning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A friend is always loyal,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a brother is born to help in time of need.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: It’s poor judgment to guarantee another person’s debt
- type: usfm
  marker: q2
  children:
  - type: text
    text: or put up security for a friend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Anyone who loves to quarrel loves sin;
- type: usfm
  marker: q2
  children:
  - type: text
    text: anyone who trusts in high walls invites disaster.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The crooked heart will not prosper;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the lying tongue tumbles into trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: It is painful to be the parent of a fool;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is no joy for the father of a rebel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: A cheerful heart is good medicine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a broken spirit saps a person’s strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The wicked take secret bribes
- type: usfm
  marker: q2
  children:
  - type: text
    text: to pervert the course of justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Sensible people keep their eyes glued on wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a fool’s eyes wander to the ends of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Foolish children
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: A foolish son.
    marker-yv: yv-n
  - type: text
    text: ' bring grief to their father'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bitterness to the one who gave them birth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: It is wrong to punish the godly for being good
- type: usfm
  marker: q2
  children:
  - type: text
    text: or to flog leaders for being honest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: A truly wise person uses few words;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a person with understanding is even-tempered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Even fools are thought wise when they keep silent;
- type: usfm
  marker: q2
  children:
  - type: text
    text: with their mouths shut, they seem intelligent.
