document_id: DEU.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Gifts for the Priests and Levites
  - type: text
    content: '“Remember that the Levitical priests—that is, the whole of the tribe of Levi—will receive no allotment of land among the other tribes in Israel. Instead, the priests and Levites will eat from the special gifts given to the '
  - type: text
    content: Lord
  - type: text
    content: ', for that is their share. '
  '10':
  - type: text
    content: For example, never sacrifice your son or daughter as a burnt offering.
  - type: note
    content: Or never make your son or daughter pass through the fire.
  - type: text
    content: ' And do not let your people practice fortune-telling, or use sorcery, or interpret omens, or engage in witchcraft, '
  '11':
  - type: text
    content: 'or cast spells, or function as mediums or psychics, or call forth the spirits of the dead. '
  '12':
  - type: text
    content: 'Anyone who does these things is detestable to the '
  - type: text
    content: Lord
  - type: text
    content: '. It is because the other nations have done these detestable things that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will drive them out ahead of you. '
  '13':
  - type: text
    content: 'But you must be blameless before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '14':
  - type: text
    content: 'The nations you are about to displace consult sorcerers and fortune-tellers, but the '
  - type: text
    content: Lord
  - type: text
    content: ' your God forbids you to do such things.”'
  - type: heading
    content: True and False Prophets
  '15':
  - type: text
    content: 'Moses continued, “The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will raise up for you a prophet like me from among your fellow Israelites. You must listen to him. '
  '16':
  - type: text
    content: 'For this is what you yourselves requested of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God when you were assembled at Mount Sinai.'
  - type: note
    content: Hebrew Horeb, another name for Sinai.
  - type: text
    content: ' You said, ‘Don’t let us hear the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God anymore or see this blazing fire, for we will die.’'
  '17':
  - type: text
    content: '“Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, ‘What they have said is right. '
  '18':
  - type: text
    content: 'I will raise up a prophet like you from among their fellow Israelites. I will put my words in his mouth, and he will tell the people everything I command him. '
  '19':
  - type: text
    content: 'I will personally deal with anyone who will not listen to the messages the prophet proclaims on my behalf. '
  '2':
  - type: text
    content: 'They will have no land of their own among the Israelites. The '
  - type: text
    content: 'Lord '
  - type: text
    content: himself is their special possession, just as he promised them.
  '20':
  - type: text
    content: But any prophet who falsely claims to speak in my name or who speaks in the name of another god must die.’
  '21':
  - type: text
    content: '“But you may wonder, ‘How will we know whether or not a prophecy is from the '
  - type: text
    content: Lord
  - type: text
    content: '?’ '
  '22':
  - type: text
    content: 'If the prophet speaks in the '
  - type: text
    content: Lord
  - type: text
    content: '’s name but his prediction does not happen or come true, you will know that the '
  - type: text
    content: Lord
  - type: text
    content: ' did not give that message. That prophet has spoken without my authority and need not be feared.'
  '3':
  - type: text
    content: '“These are the parts the priests may claim as their share from the cattle, sheep, and goats that the people bring as offerings: the shoulder, the cheeks, and the stomach. '
  '4':
  - type: text
    content: 'You must also give to the priests the first share of the grain, the new wine, the olive oil, and the wool at shearing time. '
  '5':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God chose the tribe of Levi out of all your tribes to minister in the '
  - type: text
    content: Lord
  - type: text
    content: ’s name forever.
  '6':
  - type: text
    content: '“Suppose a Levite chooses to move from his town in Israel, wherever he is living, to the place the '
  - type: text
    content: Lord
  - type: text
    content: ' chooses for worship. '
  '7':
  - type: text
    content: 'He may minister there in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God, just like all his fellow Levites who are serving the '
  - type: text
    content: Lord
  - type: text
    content: ' there. '
  '8':
  - type: text
    content: He may eat his share of the sacrifices and offerings, even if he also receives support from his family.
  - type: heading
    content: A Call to Holy Living
  '9':
  - type: text
    content: '“When you enter the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, be very careful not to imitate the detestable customs of the nations living there. '
