document_id: EZR.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cyrus Allows the Exiles to Return
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: In the first year of King Cyrus of Persia,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The first year of Cyrus’s reign over Babylon was 538 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
      marker-yv: yv-n
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' fulfilled the prophecy he had given through Jeremiah.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Jer 25:11-12; 29:10.
      marker-yv: yv-n
    - type: text
      text: ' He stirred the heart of Cyrus to put this proclamation in writing and to send it throughout his kingdom:'
  '10':
  - type: text
    text: gold bowls30silver bowls410other items1,000
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: In all, there were 5,400 articles of gold and silver. Sheshbazzar brought all of these along when the exiles went from Babylon to Jerusalem.
  '2':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: '“This is what King Cyrus of Persia says:'
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of heaven, has given me all the kingdoms of the earth. He has appointed me to build him a Temple at Jerusalem, which is in Judah. '
  '3':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Any of you who are his people may go to Jerusalem in Judah to rebuild this Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, who lives in Jerusalem. And may your God be with you! '
  '4':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Wherever this Jewish remnant is found, let their neighbors contribute toward their expenses by giving them silver and gold, supplies for the journey, and livestock, as well as a voluntary offering for the Temple of God in Jerusalem.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then God stirred the hearts of the priests and Levites and the leaders of the tribes of Judah and Benjamin to go to Jerusalem to rebuild the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And all their neighbors assisted by giving them articles of silver and gold, supplies for the journey, and livestock. They gave them many valuable gifts in addition to all the voluntary offerings.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Cyrus himself brought out the articles that King Nebuchadnezzar had taken from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple in Jerusalem and had placed in the temple of his own gods. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cyrus directed Mithredath, the treasurer of Persia, to count these items and present them to Sheshbazzar, the leader of the exiles returning to Judah.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Sheshbazzar, the prince of Judah.
      marker-yv: yv-n
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is a list of the items that were returned:'
  - type: text
    text: gold basins30silver basins1,000silver incense burners
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of this Hebrew word is uncertain.
    marker-yv: yv-n
  - type: text
    text: '29'
