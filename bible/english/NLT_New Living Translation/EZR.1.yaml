document_id: EZR.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Cyrus Allows the Exiles to Return
  - type: text
    content: In the first year of King Cyrus of Persia,
  - type: note
    content: The first year of Cyrus’s reign over Babylon was 538 b.c.
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' fulfilled the prophecy he had given through Jeremiah.'
  - type: note
    content: See Jer 25:11-12; 29:10.
  - type: text
    content: ' He stirred the heart of Cyrus to put this proclamation in writing and to send it throughout his kingdom:'
  '10':
  - type: text
    content: gold bowls
  - type: text
    content: '30'
  - type: text
    content: silver bowls
  - type: text
    content: '410'
  - type: text
    content: other items
  - type: text
    content: 1,000
  '11':
  - type: text
    content: In all, there were 5,400 articles of gold and silver. Sheshbazzar brought all of these along when the exiles went from Babylon to Jerusalem.
  '2':
  - type: text
    content: '“This is what King Cyrus of Persia says:'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of heaven, has given me all the kingdoms of the earth. He has appointed me to build him a Temple at Jerusalem, which is in Judah. '
  '3':
  - type: text
    content: 'Any of you who are his people may go to Jerusalem in Judah to rebuild this Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, who lives in Jerusalem. And may your God be with you! '
  '4':
  - type: text
    content: Wherever this Jewish remnant is found, let their neighbors contribute toward their expenses by giving them silver and gold, supplies for the journey, and livestock, as well as a voluntary offering for the Temple of God in Jerusalem.”
  '5':
  - type: text
    content: 'Then God stirred the hearts of the priests and Levites and the leaders of the tribes of Judah and Benjamin to go to Jerusalem to rebuild the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: And all their neighbors assisted by giving them articles of silver and gold, supplies for the journey, and livestock. They gave them many valuable gifts in addition to all the voluntary offerings.
  '7':
  - type: text
    content: 'King Cyrus himself brought out the articles that King Nebuchadnezzar had taken from the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple in Jerusalem and had placed in the temple of his own gods. '
  '8':
  - type: text
    content: Cyrus directed Mithredath, the treasurer of Persia, to count these items and present them to Sheshbazzar, the leader of the exiles returning to Judah.
  - type: note
    content: Hebrew Sheshbazzar, the prince of Judah.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'This is a list of the items that were returned:'
  - type: text
    content: gold basins
  - type: text
    content: '30'
  - type: text
    content: silver basins
  - type: text
    content: 1,000
  - type: text
    content: silver incense burners
  - type: note
    content: The meaning of this Hebrew word is uncertain.
  - type: text
    content: '29'
