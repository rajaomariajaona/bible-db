document_id: LUK.7,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Faith of a Roman Officer
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When Jesus had finished saying all this to the people, he returned to Capernaum. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And when the officer’s friends returned to his house, they found the slave completely healed.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Raises a Widow’s Son
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Soon afterward Jesus went with his disciples to the village of Nain, and a large crowd followed him. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'A funeral procession was coming out as he approached the village gate. The young man who had died was a widow’s only son, and a large crowd from the village was with her. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When the Lord saw her, his heart overflowed with compassion. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Don’t cry!” '
    - type: text
      text: 'he said. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then he walked over to the coffin and touched it, and the bearers stopped. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Young man,” '
    - type: text
      text: 'he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you, get up.”
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then the dead boy sat up and began to talk! And Jesus gave him back to his mother.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Great fear swept the crowd, and they praised God, saying, “A mighty prophet has risen among us,” and “God has visited his people today.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: And the news about Jesus spread throughout Judea and the surrounding countryside.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus and John the Baptist
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The disciples of John the Baptist told John about everything Jesus was doing. So John called for two of his disciples, '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: and he sent them to the Lord to ask him, “Are you the Messiah we’ve been expecting,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Are you the one who is coming? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Also in 7:20.
      marker-yv: yv-n
    - type: text
      text: ' or should we keep looking for someone else?”'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: At that time the highly valued slave of a Roman officer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a centurion; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly in 7:6.
      marker-yv: yv-n
    - type: text
      text: ' was sick and near death. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: John’s two disciples found Jesus and said to him, “John the Baptist sent us to ask, ‘Are you the Messiah we’ve been expecting, or should we keep looking for someone else?’”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'At that very time, Jesus cured many people of their diseases, illnesses, and evil spirits, and he restored sight to many who were blind. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then he told John’s disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go back to John and tell him what you have seen and heard—the blind see, the lame walk, those with leprosy are cured, the deaf hear, the dead are raised to life, and the Good News is being preached to the poor.”
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And he added, “God blesses those who do not fall away because of me.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: who are not offended by me.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'After John’s disciples left, Jesus began talking about him to the crowds. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What kind of man did you go into the wilderness to see? Was he a weak reed, swayed by every breath of wind?
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or were you expecting to see a man dressed in expensive clothes? No, people who wear beautiful clothes and live in luxury are found in palaces.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Were you looking for a prophet? Yes, and he is more than a prophet.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: John is the man to whom the Scriptures refer when they say,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Look, I am sending my messenger ahead of you,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and he will prepare your way before you.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mal 3:1.
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you, of all who have ever lived, none is greater than John. Yet even the least person in the Kingdom of God is greater than he is!”
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: When they heard this, all the people—even the tax collectors—agreed that God’s way was right,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: praised God for his justice.
      marker-yv: yv-n
    - type: text
      text: ' for they had been baptized by John. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'When the officer heard about Jesus, he sent some respected Jewish elders to ask him to come and heal his slave. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: But the Pharisees and experts in religious law rejected God’s plan for them, for they had refused John’s baptism.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“To what can I compare the people of this generation?” '
    - type: text
      text: 'Jesus asked. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How can I describe them?
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They are like children playing a game in the public square. They complain to their friends,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘We played wedding songs,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and you didn’t dance,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: so we played funeral songs,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and you didn’t weep.’
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For John the Baptist didn’t spend his time eating bread or drinking wine, and you say, ‘He’s possessed by a demon.’
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The Son of Man,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: on the other hand, feasts and drinks, and you say, ‘He’s a glutton and a drunkard, and a friend of tax collectors and other sinners!’
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But wisdom is shown to be right by the lives of those who follow it.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: But wisdom is justified by all her children.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Anointed by a Sinful Woman
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: One of the Pharisees asked Jesus to have dinner with him, so Jesus went to his home and sat down to eat.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and reclined.
      marker-yv: yv-n
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'When a certain immoral woman from that city heard he was eating there, she brought a beautiful alabaster jar filled with expensive perfume. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Then she knelt behind him at his feet, weeping. Her tears fell on his feet, and she wiped them off with her hair. Then she kept kissing his feet and putting perfume on them.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: When the Pharisee who had invited him saw this, he said to himself, “If this man were a prophet, he would know what kind of woman is touching him. She’s a sinner!”
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So they earnestly begged Jesus to help the man. “If anyone deserves your help, he does,” they said, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Then Jesus answered his thoughts. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Simon,” '
    - type: text
      text: 'he said to the Pharisee, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have something to say to you.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go ahead, Teacher,” Simon replied.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Then Jesus told him this story: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “A man loaned money to two people—500 pieces of silver
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '500 denarii. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A denarius was equivalent to a laborer’s full day’s wage.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to one and 50 pieces to the other.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But neither of them could repay him, so he kindly forgave them both, canceling their debts. Who do you suppose loved him more after that?”
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Simon answered, “I suppose the one for whom he canceled the larger debt.”
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“That’s right,” '
    - type: text
      text: 'Jesus said. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Then he turned to the woman and said to Simon, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Look at this woman kneeling here. When I entered your home, you didn’t offer me water to wash the dust from my feet, but she has washed them with her tears and wiped them with her hair.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You didn’t greet me with a kiss, but from the time I first came in, she has not stopped kissing my feet.
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You neglected the courtesy of olive oil to anoint my head, but she has anointed my feet with rare perfume.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you, her sins—and they are many—have been forgiven, so she has shown me much love. But a person who is forgiven little shows only little love.”
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Then Jesus said to the woman, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Your sins are forgiven.”
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: The men at the table said among themselves, “Who is this man, that he goes around forgiving sins?”
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “for he loves the Jewish people and even built a synagogue for us.”
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'And Jesus said to the woman, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Your faith has saved you; go in peace.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So Jesus went with them. But just before they arrived at the house, the officer sent some friends to say, “Lord, don’t trouble yourself by coming to my home, for I am not worthy of such an honor. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I am not even worthy to come and meet you. Just say the word from where you are, and my servant will be healed. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
