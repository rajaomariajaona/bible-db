document_id: LUK.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Faith of a Roman Officer
  - type: text
    content: 'When Jesus had finished saying all this to the people, he returned to Capernaum. '
  '10':
  - type: text
    content: And when the officer’s friends returned to his house, they found the slave completely healed.
  - type: heading
    content: Jesus Raises a Widow’s Son
  '11':
  - type: text
    content: 'Soon afterward Jesus went with his disciples to the village of Nain, and a large crowd followed him. '
  '12':
  - type: text
    content: 'A funeral procession was coming out as he approached the village gate. The young man who had died was a widow’s only son, and a large crowd from the village was with her. '
  '13':
  - type: text
    content: 'When the Lord saw her, his heart overflowed with compassion. '
  - type: text
    content: '“Don’t cry!” '
  - type: text
    content: 'he said. '
  '14':
  - type: text
    content: 'Then he walked over to the coffin and touched it, and the bearers stopped. '
  - type: text
    content: '“Young man,” '
  - type: text
    content: 'he said, '
  - type: text
    content: “I tell you, get up.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: Then the dead boy sat up and began to talk! And Jesus gave him back to his mother.
  '16':
  - type: text
    content: 'Great fear swept the crowd, and they praised God, saying, “A mighty prophet has risen among us,” and “God has visited his people today.” '
  '17':
  - type: text
    content: And the news about Jesus spread throughout Judea and the surrounding countryside.
  - type: heading
    content: Jesus and John the Baptist
  '18':
  - type: text
    content: 'The disciples of John the Baptist told John about everything Jesus was doing. So John called for two of his disciples, '
  '19':
  - type: text
    content: and he sent them to the Lord to ask him, “Are you the Messiah we’ve been expecting,
  - type: note
    content: Greek Are you the one who is coming? Also in 7:20.
  - type: text
    content: ' or should we keep looking for someone else?”'
  '2':
  - type: text
    content: At that time the highly valued slave of a Roman officer
  - type: note
    content: Greek a centurion; similarly in 7:6.
  - type: text
    content: ' was sick and near death. '
  '20':
  - type: text
    content: John’s two disciples found Jesus and said to him, “John the Baptist sent us to ask, ‘Are you the Messiah we’ve been expecting, or should we keep looking for someone else?’”
  '21':
  - type: text
    content: 'At that very time, Jesus cured many people of their diseases, illnesses, and evil spirits, and he restored sight to many who were blind. '
  '22':
  - type: text
    content: 'Then he told John’s disciples, '
  - type: text
    content: “Go back to John and tell him what you have seen and heard—the blind see, the lame walk, those with leprosy are cured, the deaf hear, the dead are raised to life, and the Good News is being preached to the poor.”
  - type: text
    content: ' '
  '23':
  - type: text
    content: And he added, “God blesses those who do not fall away because of me.
  - type: note
    content: Or who are not offended by me.
  - type: text
    content: ”
  '24':
  - type: text
    content: 'After John’s disciples left, Jesus began talking about him to the crowds. '
  - type: text
    content: “What kind of man did you go into the wilderness to see? Was he a weak reed, swayed by every breath of wind?
  - type: text
    content: ' '
  '25':
  - type: text
    content: Or were you expecting to see a man dressed in expensive clothes? No, people who wear beautiful clothes and live in luxury are found in palaces.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Were you looking for a prophet? Yes, and he is more than a prophet.
  - type: text
    content: ' '
  '27':
  - type: text
    content: John is the man to whom the Scriptures refer when they say,
  - type: text
    content: ‘Look, I am sending my messenger ahead of you,
  - type: text
    content: and he will prepare your way before you.’
  - type: note
    content: Mal 3:1.
  '28':
  - type: text
    content: ' '
  - type: text
    content: I tell you, of all who have ever lived, none is greater than John. Yet even the least person in the Kingdom of God is greater than he is!”
  '29':
  - type: text
    content: When they heard this, all the people—even the tax collectors—agreed that God’s way was right,
  - type: note
    content: Or praised God for his justice.
  - type: text
    content: ' for they had been baptized by John. '
  '3':
  - type: text
    content: 'When the officer heard about Jesus, he sent some respected Jewish elders to ask him to come and heal his slave. '
  '30':
  - type: text
    content: But the Pharisees and experts in religious law rejected God’s plan for them, for they had refused John’s baptism.
  '31':
  - type: text
    content: ' '
  - type: text
    content: '“To what can I compare the people of this generation?” '
  - type: text
    content: 'Jesus asked. '
  - type: text
    content: “How can I describe them?
  - type: text
    content: ' '
  '32':
  - type: text
    content: They are like children playing a game in the public square. They complain to their friends,
  - type: text
    content: ‘We played wedding songs,
  - type: text
    content: and you didn’t dance,
  - type: text
    content: so we played funeral songs,
  - type: text
    content: and you didn’t weep.’
  '33':
  - type: text
    content: ' '
  - type: text
    content: For John the Baptist didn’t spend his time eating bread or drinking wine, and you say, ‘He’s possessed by a demon.’
  - type: text
    content: ' '
  '34':
  - type: text
    content: The Son of Man,
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: on the other hand, feasts and drinks, and you say, ‘He’s a glutton and a drunkard, and a friend of tax collectors and other sinners!’
  - type: text
    content: ' '
  '35':
  - type: text
    content: But wisdom is shown to be right by the lives of those who follow it.
  - type: note
    content: Or But wisdom is justified by all her children.
  - type: text
    content: ”
  - type: heading
    content: Jesus Anointed by a Sinful Woman
  '36':
  - type: text
    content: One of the Pharisees asked Jesus to have dinner with him, so Jesus went to his home and sat down to eat.
  - type: note
    content: Or and reclined.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'When a certain immoral woman from that city heard he was eating there, she brought a beautiful alabaster jar filled with expensive perfume. '
  '38':
  - type: text
    content: Then she knelt behind him at his feet, weeping. Her tears fell on his feet, and she wiped them off with her hair. Then she kept kissing his feet and putting perfume on them.
  '39':
  - type: text
    content: When the Pharisee who had invited him saw this, he said to himself, “If this man were a prophet, he would know what kind of woman is touching him. She’s a sinner!”
  '4':
  - type: text
    content: 'So they earnestly begged Jesus to help the man. “If anyone deserves your help, he does,” they said, '
  '40':
  - type: text
    content: 'Then Jesus answered his thoughts. '
  - type: text
    content: '“Simon,” '
  - type: text
    content: 'he said to the Pharisee, '
  - type: text
    content: “I have something to say to you.”
  - type: text
    content: “Go ahead, Teacher,” Simon replied.
  '41':
  - type: text
    content: 'Then Jesus told him this story: '
  - type: text
    content: “A man loaned money to two people—500 pieces of silver
  - type: note
    content: Greek 500 denarii. A denarius was equivalent to a laborer’s full day’s wage.
  - type: text
    content: ' '
  - type: text
    content: to one and 50 pieces to the other.
  - type: text
    content: ' '
  '42':
  - type: text
    content: But neither of them could repay him, so he kindly forgave them both, canceling their debts. Who do you suppose loved him more after that?”
  '43':
  - type: text
    content: Simon answered, “I suppose the one for whom he canceled the larger debt.”
  - type: text
    content: '“That’s right,” '
  - type: text
    content: 'Jesus said. '
  '44':
  - type: text
    content: 'Then he turned to the woman and said to Simon, '
  - type: text
    content: “Look at this woman kneeling here. When I entered your home, you didn’t offer me water to wash the dust from my feet, but she has washed them with her tears and wiped them with her hair.
  - type: text
    content: ' '
  '45':
  - type: text
    content: You didn’t greet me with a kiss, but from the time I first came in, she has not stopped kissing my feet.
  - type: text
    content: ' '
  '46':
  - type: text
    content: You neglected the courtesy of olive oil to anoint my head, but she has anointed my feet with rare perfume.
  '47':
  - type: text
    content: ' '
  - type: text
    content: “I tell you, her sins—and they are many—have been forgiven, so she has shown me much love. But a person who is forgiven little shows only little love.”
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'Then Jesus said to the woman, '
  - type: text
    content: “Your sins are forgiven.”
  '49':
  - type: text
    content: The men at the table said among themselves, “Who is this man, that he goes around forgiving sins?”
  '5':
  - type: text
    content: “for he loves the Jewish people and even built a synagogue for us.”
  '50':
  - type: text
    content: 'And Jesus said to the woman, '
  - type: text
    content: “Your faith has saved you; go in peace.”
  '6':
  - type: text
    content: 'So Jesus went with them. But just before they arrived at the house, the officer sent some friends to say, “Lord, don’t trouble yourself by coming to my home, for I am not worthy of such an honor. '
  '7':
  - type: text
    content: 'I am not even worthy to come and meet you. Just say the word from where you are, and my servant will be healed. '
  '8':
  - type: text
    content: I know this because I am under the authority of my superior officers, and I have authority over my soldiers. I only need to say, ‘Go,’ and they go, or ‘Come,’ and they come. And if I say to my slaves, ‘Do this,’ they do it.”
  '9':
  - type: text
    content: 'When Jesus heard this, he was amazed. Turning to the crowd that was following him, he said, '
  - type: text
    content: “I tell you, I haven’t seen faith like this in all Israel!”
  - type: text
    content: ' '
