document_id: 1SA.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David among the Philistines
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: But David kept thinking to himself, “Someday Saul is going to get me. The best thing I can do is escape to the Philistines. Then Saul will stop hunting for me in Israelite territory, and I will finally be safe.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So David took his 600 men and went over and joined Achish son of Maoch, the king of Gath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David and his men and their families settled there with Achish at Gath. David brought his two wives along with him—Ahinoam from Jezreel and Abigail, Nabal’s widow from Carmel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Word soon reached Saul that David had fled to Gath, so he stopped hunting for him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: One day David said to Achish, “If it is all right with you, we would rather live in one of the country towns instead of here in the royal city.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Achish gave him the town of Ziklag (which still belongs to the kings of Judah to this day), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: and they lived there among the Philistines for a year and four months.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'David and his men spent their time raiding the Geshurites, the Girzites, and the Amalekites—people who had lived near Shur, toward the land of Egypt, since ancient times. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: David did not leave one person alive in the villages he attacked. He took the sheep, goats, cattle, donkeys, camels, and clothing before returning home to see King Achish.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Where did you make your raid today?” Achish would ask.
- type: usfm
  marker: p
  children:
  - type: text
    text: And David would reply, “Against the south of Judah, the Jerahmeelites, and the Kenites.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'No one was left alive to come to Gath and tell where he had really been. This happened again and again while he was living among the Philistines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Achish believed David and thought to himself, “By now the people of Israel must hate him bitterly. Now he will have to stay here and serve me forever!”
