document_id: 1KI.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Elijah Flees to Sinai
  - type: text
    content: 'When Ahab got home, he told Jezebel everything Elijah had done, including the way he had killed all the prophets of Baal. '
  '10':
  - type: text
    content: 'Elijah replied, “I have zealously served the '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty. But the people of Israel have broken their covenant with you, torn down your altars, and killed every one of your prophets. I am the only one left, and now they are trying to kill me, too.”'
  '11':
  - type: text
    content: '“Go out and stand before me on the mountain,” the '
  - type: text
    content: Lord
  - type: text
    content: ' told him. And as Elijah stood there, the '
  - type: text
    content: Lord
  - type: text
    content: ' passed by, and a mighty windstorm hit the mountain. It was such a terrible blast that the rocks were torn loose, but the '
  - type: text
    content: Lord
  - type: text
    content: ' was not in the wind. After the wind there was an earthquake, but the '
  - type: text
    content: Lord
  - type: text
    content: ' was not in the earthquake. '
  '12':
  - type: text
    content: 'And after the earthquake there was a fire, but the '
  - type: text
    content: Lord
  - type: text
    content: ' was not in the fire. And after the fire there was the sound of a gentle whisper. '
  '13':
  - type: text
    content: When Elijah heard it, he wrapped his face in his cloak and went out and stood at the entrance of the cave.
  - type: text
    content: And a voice said, “What are you doing here, Elijah?”
  '14':
  - type: text
    content: 'He replied again, “I have zealously served the '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty. But the people of Israel have broken their covenant with you, torn down your altars, and killed every one of your prophets. I am the only one left, and now they are trying to kill me, too.”'
  '15':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' told him, “Go back the same way you came, and travel to the wilderness of Damascus. When you arrive there, anoint Hazael to be king of Aram. '
  '16':
  - type: text
    content: Then anoint Jehu grandson of Nimshi
  - type: note
    content: Hebrew descendant of Nimshi; compare 2 Kgs 9:2, 14.
  - type: text
    content: ' to be king of Israel, and anoint Elisha son of Shaphat from the town of Abel-meholah to replace you as my prophet. '
  '17':
  - type: text
    content: 'Anyone who escapes from Hazael will be killed by Jehu, and those who escape Jehu will be killed by Elisha! '
  '18':
  - type: text
    content: Yet I will preserve 7,000 others in Israel who have never bowed down to Baal or kissed him!”
  - type: heading
    content: The Call of Elisha
  '19':
  - type: text
    content: 'So Elijah went and found Elisha son of Shaphat plowing a field. There were twelve teams of oxen in the field, and Elisha was plowing with the twelfth team. Elijah went over to him and threw his cloak across his shoulders and then walked away. '
  '2':
  - type: text
    content: 'So Jezebel sent this message to Elijah: “May the gods strike me and even kill me if by this time tomorrow I have not killed you just as you killed them.”'
  '20':
  - type: text
    content: Elisha left the oxen standing there, ran after Elijah, and said to him, “First let me go and kiss my father and mother good-bye, and then I will go with you!”
  - type: text
    content: Elijah replied, “Go on back, but think about what I have done to you.”
  '21':
  - type: text
    content: So Elisha returned to his oxen and slaughtered them. He used the wood from the plow to build a fire to roast their flesh. He passed around the meat to the townspeople, and they all ate. Then he went with Elijah as his assistant.
  '3':
  - type: text
    content: 'Elijah was afraid and fled for his life. He went to Beersheba, a town in Judah, and he left his servant there. '
  '4':
  - type: text
    content: 'Then he went on alone into the wilderness, traveling all day. He sat down under a solitary broom tree and prayed that he might die. “I have had enough, '
  - type: text
    content: Lord
  - type: text
    content: ',” he said. “Take my life, for I am no better than my ancestors who have already died.”'
  '5':
  - type: text
    content: 'Then he lay down and slept under the broom tree. But as he was sleeping, an angel touched him and told him, “Get up and eat!” '
  '6':
  - type: text
    content: He looked around and there beside his head was some bread baked on hot stones and a jar of water! So he ate and drank and lay down again.
  '7':
  - type: text
    content: 'Then the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' came again and touched him and said, “Get up and eat some more, or the journey ahead will be too much for you.”'
  '8':
  - type: text
    content: So he got up and ate and drank, and the food gave him enough strength to travel forty days and forty nights to Mount Sinai,
  - type: note
    content: Hebrew to Horeb, another name for Sinai.
  - type: text
    content: ' the mountain of God. '
  '9':
  - type: text
    content: There he came to a cave, where he spent the night.
  - type: heading
    content: The Lord Speaks to Elijah
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “What are you doing here, Elijah?”'
