document_id: 1KI.19,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elijah Flees to Sinai
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When Ahab got home, he told Jezebel everything Elijah had done, including the way he had killed all the prophets of Baal. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Elijah replied, “I have zealously served the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God Almighty. But the people of Israel have broken their covenant with you, torn down your altars, and killed every one of your prophets. I am the only one left, and now they are trying to kill me, too.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“Go out and stand before me on the mountain,” the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told him. And as Elijah stood there, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' passed by, and a mighty windstorm hit the mountain. It was such a terrible blast that the rocks were torn loose, but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was not in the wind. After the wind there was an earthquake, but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was not in the earthquake. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And after the earthquake there was a fire, but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was not in the fire. And after the fire there was the sound of a gentle whisper. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: When Elijah heard it, he wrapped his face in his cloak and went out and stood at the entrance of the cave.
  - type: usfm
    marker: p
    children:
    - type: text
      text: And a voice said, “What are you doing here, Elijah?”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'He replied again, “I have zealously served the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God Almighty. But the people of Israel have broken their covenant with you, torn down your altars, and killed every one of your prophets. I am the only one left, and now they are trying to kill me, too.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told him, “Go back the same way you came, and travel to the wilderness of Damascus. When you arrive there, anoint Hazael to be king of Aram. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Then anoint Jehu grandson of Nimshi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'descendant of Nimshi; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare 2 Kgs 9:2, 14.
      marker-yv: yv-n
    - type: text
      text: ' to be king of Israel, and anoint Elisha son of Shaphat from the town of Abel-meholah to replace you as my prophet. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Anyone who escapes from Hazael will be killed by Jehu, and those who escape Jehu will be killed by Elisha! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Yet I will preserve 7,000 others in Israel who have never bowed down to Baal or kissed him!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Call of Elisha
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So Elijah went and found Elisha son of Shaphat plowing a field. There were twelve teams of oxen in the field, and Elisha was plowing with the twelfth team. Elijah went over to him and threw his cloak across his shoulders and then walked away. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So Jezebel sent this message to Elijah: “May the gods strike me and even kill me if by this time tomorrow I have not killed you just as you killed them.”'
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Elisha left the oxen standing there, ran after Elijah, and said to him, “First let me go and kiss my father and mother good-bye, and then I will go with you!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elijah replied, “Go on back, but think about what I have done to you.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: So Elisha returned to his oxen and slaughtered them. He used the wood from the plow to build a fire to roast their flesh. He passed around the meat to the townspeople, and they all ate. Then he went with Elijah as his assistant.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Elijah was afraid and fled for his life. He went to Beersheba, a town in Judah, and he left his servant there. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then he went on alone into the wilderness, traveling all day. He sat down under a solitary broom tree and prayed that he might die. “I have had enough, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ',” he said. “Take my life, for I am no better than my ancestors who have already died.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then he lay down and slept under the broom tree. But as he was sleeping, an angel touched him and told him, “Get up and eat!” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: He looked around and there beside his head was some bread baked on hot stones and a jar of water! So he ate and drank and lay down again.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came again and touched him and said, “Get up and eat some more, or the journey ahead will be too much for you.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So he got up and ate and drank, and the food gave him enough strength to travel forty days and forty nights to Mount Sinai,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'to Horeb, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: another name for Sinai.
      marker-yv: yv-n
    - type: text
      text: ' the mountain of God. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: There he came to a cave, where he spent the night.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Speaks to Elijah'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, “What are you doing here, Elijah?”'
