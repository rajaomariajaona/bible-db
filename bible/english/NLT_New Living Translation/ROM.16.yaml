document_id: ROM.16,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Greets His Friends
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I commend to you our sister Phoebe, who is a deacon in the church in Cenchrea. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Greet Apelles, a good man whom Christ approves. And give my greetings to the believers from the household of Aristobulus. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Greet Herodion, my fellow Jew.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: compatriot.
      marker-yv: yv-n
    - type: text
      text: ' Greet the Lord’s people from the household of Narcissus. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Give my greetings to Tryphena and Tryphosa, the Lord’s workers, and to dear Persis, who has worked so hard for the Lord. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Greet Rufus, whom the Lord picked out to be his very own; and also his dear mother, who has been a mother to me.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Give my greetings to Asyncritus, Phlegon, Hermes, Patrobas, Hermas, and the brothers and sisters
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 16:17.
      marker-yv: yv-n
    - type: text
      text: ' who meet with them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Give my greetings to Philologus, Julia, Nereus and his sister, and to Olympas and all the believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: all of God’s holy people.
      marker-yv: yv-n
    - type: text
      text: ' who meet with them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Greet each other with a sacred kiss. All the churches of Christ send you their greetings.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Final Instructions
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And now I make one more appeal, my dear brothers and sisters. Watch out for people who cause divisions and upset people’s faith by teaching things contrary to what you have been taught. Stay away from them. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Such people are not serving Christ our Lord; they are serving their own personal interests. By smooth talk and glowing words they deceive innocent people. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But everyone knows that you are obedient to the Lord. This makes me very happy. I want you to be wise in doing right and to stay innocent of any wrong. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Welcome her in the Lord as one who is worthy of honor among God’s people. Help her in whatever she needs, for she has been helpful to many, and especially to me.
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The God of peace will soon crush Satan under your feet. May the grace of our Lord Jesus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Lord Jesus Christ.
      marker-yv: yv-n
    - type: text
      text: ' be with you.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Timothy, my fellow worker, sends you his greetings, as do Lucius, Jason, and Sosipater, my fellow Jews.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: I, Tertius, the one writing this letter for Paul, send my greetings, too, as one of the Lord’s followers.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Gaius says hello to you. He is my host and also serves as host to the whole church. Erastus, the city treasurer, sends you his greetings, and so does our brother Quartus.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add verse 24, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'May the grace of our Lord Jesus Christ be with you all. Amen. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Still others add this sentence after verse 27.
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Now all glory to God, who is able to make you strong, just as my Good News says. This message about Jesus Christ has revealed his plan for you Gentiles, a plan kept secret from the beginning of time. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: But now as the prophets
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the prophetic writings.
      marker-yv: yv-n
    - type: text
      text: ' foretold and as the eternal God has commanded, this message is made known to all Gentiles everywhere, so that they too might believe and obey him. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: All glory to the only wise God, through Jesus Christ, forever. Amen.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:25-27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Various manuscripts place the doxology (shown here as 16:25-27) after 14:23 or after 15:33 or after 16:23.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Give my greetings to Priscilla and Aquila, my co-workers in the ministry of Christ Jesus. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'In fact, they once risked their lives for me. I am thankful to them, and so are all the Gentile churches. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Also give my greetings to the church that meets in their home.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Greet my dear friend Epenetus. He was the first person from the province of Asia to become a follower of Christ. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Give my greetings to Mary, who has worked so hard for your benefit. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Greet Andronicus and Junia,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:7a '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Junia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'is a feminine name. Some late manuscripts accent the word so it reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Junias, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a masculine name; still others read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Julia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (feminine).
      marker-yv: yv-n
    - type: text
      text: ' my fellow Jews,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:7b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'compatriots; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 16:21.
      marker-yv: yv-n
    - type: text
      text: ' who were in prison with me. They are highly respected among the apostles and became followers of Christ before I did. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Greet Ampliatus, my dear friend in the Lord. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Greet Urbanus, our co-worker in Christ, and my dear friend Stachys.
