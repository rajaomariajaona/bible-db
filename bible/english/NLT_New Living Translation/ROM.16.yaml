document_id: ROM.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Greets His Friends
  - type: text
    content: 'I commend to you our sister Phoebe, who is a deacon in the church in Cenchrea. '
  '10':
  - type: text
    content: 'Greet Apelles, a good man whom Christ approves. And give my greetings to the believers from the household of Aristobulus. '
  '11':
  - type: text
    content: Greet Herodion, my fellow Jew.
  - type: note
    content: Or compatriot.
  - type: text
    content: ' Greet the Lord’s people from the household of Narcissus. '
  '12':
  - type: text
    content: 'Give my greetings to Tryphena and Tryphosa, the Lord’s workers, and to dear Persis, who has worked so hard for the Lord. '
  '13':
  - type: text
    content: Greet Rufus, whom the Lord picked out to be his very own; and also his dear mother, who has been a mother to me.
  '14':
  - type: text
    content: Give my greetings to Asyncritus, Phlegon, Hermes, Patrobas, Hermas, and the brothers and sisters
  - type: note
    content: Greek brothers; also in 16:17.
  - type: text
    content: ' who meet with them. '
  '15':
  - type: text
    content: Give my greetings to Philologus, Julia, Nereus and his sister, and to Olympas and all the believers
  - type: note
    content: Greek all of God’s holy people.
  - type: text
    content: ' who meet with them. '
  '16':
  - type: text
    content: Greet each other with a sacred kiss. All the churches of Christ send you their greetings.
  - type: heading
    content: Paul’s Final Instructions
  '17':
  - type: text
    content: 'And now I make one more appeal, my dear brothers and sisters. Watch out for people who cause divisions and upset people’s faith by teaching things contrary to what you have been taught. Stay away from them. '
  '18':
  - type: text
    content: 'Such people are not serving Christ our Lord; they are serving their own personal interests. By smooth talk and glowing words they deceive innocent people. '
  '19':
  - type: text
    content: 'But everyone knows that you are obedient to the Lord. This makes me very happy. I want you to be wise in doing right and to stay innocent of any wrong. '
  '2':
  - type: text
    content: Welcome her in the Lord as one who is worthy of honor among God’s people. Help her in whatever she needs, for she has been helpful to many, and especially to me.
  '20':
  - type: text
    content: The God of peace will soon crush Satan under your feet. May the grace of our Lord Jesus
  - type: note
    content: Some manuscripts read Lord Jesus Christ.
  - type: text
    content: ' be with you.'
  '21':
  - type: text
    content: Timothy, my fellow worker, sends you his greetings, as do Lucius, Jason, and Sosipater, my fellow Jews.
  '22':
  - type: text
    content: I, Tertius, the one writing this letter for Paul, send my greetings, too, as one of the Lord’s followers.
  '23':
  - type: text
    content: Gaius says hello to you. He is my host and also serves as host to the whole church. Erastus, the city treasurer, sends you his greetings, and so does our brother Quartus.
  - type: note
    content: Some manuscripts add verse 24, May the grace of our Lord Jesus Christ be with you all. Amen. Still others add this sentence after verse 27.
  '25':
  - type: text
    content: 'Now all glory to God, who is able to make you strong, just as my Good News says. This message about Jesus Christ has revealed his plan for you Gentiles, a plan kept secret from the beginning of time. '
  '26':
  - type: text
    content: But now as the prophets
  - type: note
    content: Greek the prophetic writings.
  - type: text
    content: ' foretold and as the eternal God has commanded, this message is made known to all Gentiles everywhere, so that they too might believe and obey him. '
  '27':
  - type: text
    content: All glory to the only wise God, through Jesus Christ, forever. Amen.
  - type: note
    content: Various manuscripts place the doxology (shown here as 16:25-27) after 14:23 or after 15:33 or after 16:23.
  '3':
  - type: text
    content: 'Give my greetings to Priscilla and Aquila, my co-workers in the ministry of Christ Jesus. '
  '4':
  - type: text
    content: 'In fact, they once risked their lives for me. I am thankful to them, and so are all the Gentile churches. '
  '5':
  - type: text
    content: Also give my greetings to the church that meets in their home.
  - type: text
    content: 'Greet my dear friend Epenetus. He was the first person from the province of Asia to become a follower of Christ. '
  '6':
  - type: text
    content: 'Give my greetings to Mary, who has worked so hard for your benefit. '
  '7':
  - type: text
    content: Greet Andronicus and Junia,
  - type: note
    content: Junia is a feminine name. Some late manuscripts accent the word so it reads Junias, a masculine name; still others read Julia (feminine).
  - type: text
    content: ' my fellow Jews,'
  - type: note
    content: Or compatriots; also in 16:21.
  - type: text
    content: ' who were in prison with me. They are highly respected among the apostles and became followers of Christ before I did. '
  '8':
  - type: text
    content: 'Greet Ampliatus, my dear friend in the Lord. '
  '9':
  - type: text
    content: Greet Urbanus, our co-worker in Christ, and my dear friend Stachys.
