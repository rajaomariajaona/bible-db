document_id: 1SA.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Elkanah and His Family
  - type: text
    content: There was a man named Elkanah who lived in Ramah in the region of Zuph
  - type: note
    content: As in Greek version; Hebrew reads in Ramathaim-zophim; compare 1:19.
  - type: text
    content: ' in the hill country of Ephraim. He was the son of Jeroham, son of Elihu, son of Tohu, son of Zuph, of Ephraim. '
  '10':
  - type: text
    content: 'Hannah was in deep anguish, crying bitterly as she prayed to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'And she made this vow: “O '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, if you will look upon my sorrow and answer my prayer and give me a son, then I will give him back to you. He will be yours for his entire lifetime, and as a sign that he has been dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: ', his hair will never be cut.'
  - type: note
    content: Some manuscripts add He will drink neither wine nor intoxicants.
  - type: text
    content: ”
  '12':
  - type: text
    content: 'As she was praying to the '
  - type: text
    content: Lord
  - type: text
    content: ', Eli watched her. '
  '13':
  - type: text
    content: 'Seeing her lips moving but hearing no sound, he thought she had been drinking. '
  '14':
  - type: text
    content: “Must you come here drunk?” he demanded. “Throw away your wine!”
  '15':
  - type: text
    content: '“Oh no, sir!” she replied. “I haven’t been drinking wine or anything stronger. But I am very discouraged, and I was pouring out my heart to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: Don’t think I am a wicked woman! For I have been praying out of great anguish and sorrow.”
  '17':
  - type: text
    content: “In that case,” Eli said, “go in peace! May the God of Israel grant the request you have asked of him.”
  '18':
  - type: text
    content: “Oh, thank you, sir!” she exclaimed. Then she went back and began to eat again, and she was no longer sad.
  - type: heading
    content: Samuel’s Birth and Dedication
  '19':
  - type: text
    content: 'The entire family got up early the next morning and went to worship the '
  - type: text
    content: Lord
  - type: text
    content: ' once more. Then they returned home to Ramah. When Elkanah slept with Hannah, the '
  - type: text
    content: Lord
  - type: text
    content: ' remembered her plea, '
  '2':
  - type: text
    content: Elkanah had two wives, Hannah and Peninnah. Peninnah had children, but Hannah did not.
  '20':
  - type: text
    content: and in due time she gave birth to a son. She named him Samuel,
  - type: note
    content: Samuel sounds like the Hebrew term for “asked of God” or “heard by God.”
  - type: text
    content: ' for she said, “I asked the '
  - type: text
    content: Lord
  - type: text
    content: ' for him.”'
  '21':
  - type: text
    content: 'The next year Elkanah and his family went on their annual trip to offer a sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' and to keep his vow. '
  '22':
  - type: text
    content: 'But Hannah did not go. She told her husband, “Wait until the boy is weaned. Then I will take him to the Tabernacle and leave him there with the '
  - type: text
    content: Lord
  - type: text
    content: ' permanently.'
  - type: note
    content: Some manuscripts add I will offer him as a Nazirite for all time.
  - type: text
    content: ”
  '23':
  - type: text
    content: '“Whatever you think is best,” Elkanah agreed. “Stay here for now, and may the '
  - type: text
    content: Lord
  - type: text
    content: ' help you keep your promise.'
  - type: note
    content: As in Dead Sea Scrolls and Greek version; Masoretic Text reads may the Lord keep his promise.
  - type: text
    content: ” So she stayed home and nursed the boy until he was weaned.
  '24':
  - type: text
    content: When the child was weaned, Hannah took him to the Tabernacle in Shiloh. They brought along a three-year-old bull
  - type: note
    content: As in Dead Sea Scrolls, Greek and Syriac versions; Masoretic Text reads three bulls.
  - type: text
    content: ' for the sacrifice and a basket'
  - type: note
    content: Hebrew and an ephah [20 quarts or 22 liters].
  - type: text
    content: ' of flour and some wine. '
  '25':
  - type: text
    content: 'After sacrificing the bull, they brought the boy to Eli. '
  '26':
  - type: text
    content: '“Sir, do you remember me?” Hannah asked. “I am the very woman who stood here several years ago praying to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'I asked the '
  - type: text
    content: Lord
  - type: text
    content: ' to give me this boy, and he has granted my request. '
  '28':
  - type: text
    content: 'Now I am giving him to the '
  - type: text
    content: Lord
  - type: text
    content: ', and he will belong to the '
  - type: text
    content: Lord
  - type: text
    content: ' his whole life.” And they'
  - type: note
    content: Hebrew he.
  - type: text
    content: ' worshiped the '
  - type: text
    content: Lord
  - type: text
    content: ' there.'
  '3':
  - type: text
    content: 'Each year Elkanah would travel to Shiloh to worship and sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies at the Tabernacle. The priests of the '
  - type: text
    content: Lord
  - type: text
    content: ' at that time were the two sons of Eli—Hophni and Phinehas. '
  '4':
  - type: text
    content: 'On the days Elkanah presented his sacrifice, he would give portions of the meat to Peninnah and each of her children. '
  '5':
  - type: text
    content: And though he loved Hannah, he would give her only one choice portion
  - type: note
    content: Or And because he loved Hannah, he would give her a choice portion. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' because the '
  - type: text
    content: Lord
  - type: text
    content: ' had given her no children. '
  '6':
  - type: text
    content: 'So Peninnah would taunt Hannah and make fun of her because the '
  - type: text
    content: Lord
  - type: text
    content: ' had kept her from having children. '
  '7':
  - type: text
    content: Year after year it was the same—Peninnah would taunt Hannah as they went to the Tabernacle.
  - type: note
    content: Hebrew the house of the Lord; also in 1:24.
  - type: text
    content: ' Each time, Hannah would be reduced to tears and would not even eat.'
  '8':
  - type: text
    content: “Why are you crying, Hannah?” Elkanah would ask. “Why aren’t you eating? Why be downhearted just because you have no children? You have me—isn’t that better than having ten sons?”
  - type: heading
    content: Hannah’s Prayer for a Son
  '9':
  - type: text
    content: Once after a sacrificial meal at Shiloh, Hannah got up and went to pray. Eli the priest was sitting at his customary place beside the entrance of the Tabernacle.
  - type: note
    content: Hebrew the Temple of the Lord.
  - type: text
    content: ' '
