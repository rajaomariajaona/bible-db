document_id: JHN.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus and the Samaritan Woman
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Jesus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The Lord.
      marker-yv: yv-n
    - type: text
      text: ' knew the Pharisees had heard that he was baptizing and making more disciples than John '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If you only knew the gift God has for you and who you are speaking to, you would ask me, and I would give you living water.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But sir, you don’t have a rope or a bucket,” she said, “and this well is very deep. Where would you get this living water? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And besides, do you think you’re greater than our ancestor Jacob, who gave us this well? How can you offer better water than he and his sons and his animals enjoyed?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Anyone who drinks this water will soon become thirsty again.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But those who drink the water I give will never be thirsty again. It becomes a fresh, bubbling spring within them, giving them eternal life.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Please, sir,” the woman said, “give me this water! Then I’ll never be thirsty again, and I won’t have to come here to get water.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Go and get your husband,” '
    - type: text
      text: Jesus told her.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I don’t have a husband,” the woman replied.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You’re right! You don’t have a husband—
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for you have had five husbands, and you aren’t even married to the man you’re living with now. You certainly spoke the truth!”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Sir,” the woman said, “you must be a prophet. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '(though Jesus himself didn’t baptize them—his disciples did). '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So tell me, why is it that you Jews insist that Jerusalem is the only place of worship, while we Samaritans claim it is here at Mount Gerizim,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on this mountain.
      marker-yv: yv-n
    - type: text
      text: ' where our ancestors worshiped?”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Believe me, dear woman, the time is coming when it will no longer matter whether you worship the Father on this mountain or in Jerusalem.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You Samaritans know very little about the one you worship, while we Jews know all about him, for salvation comes through the Jews.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But the time is coming—indeed it’s here now—when true worshipers will worship the Father in spirit and in truth. The Father is looking for those who will worship him that way.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For God is Spirit, so those who worship him must worship in spirit and in truth.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The woman said, “I know the Messiah is coming—the one who is called Christ. When he comes, he will explain everything to us.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus told her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “
      - type: usfm
        marker: nd
        children:
        - type: text
          text: I Am
      - type: text
        text: ' the Messiah!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: “The ‘
        - type: usfm
          marker: nd
          children:
          - type: text
            text: I Am
        - type: text
          text: '’ is here”; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '“I am the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: '”; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '“I am, the one speaking to you.” '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Exod 3:14.
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just then his disciples came back. They were shocked to find him talking to a woman, but none of them had the nerve to ask, “What do you want with her?” or “Why are you talking to her?” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The woman left her water jar beside the well and ran back to the village, telling everyone, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Come and see a man who told me everything I ever did! Could he possibly be the Messiah?” '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So he left Judea and returned to Galilee.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the people came streaming from the village to see him.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, the disciples were urging Jesus, “Rabbi, eat something.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have a kind of food you know nothing about.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Did someone bring him food while we were gone?” the disciples asked each other.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus explained: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My nourishment comes from doing the will of God, who sent me, and from finishing his work.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You know the saying, ‘Four months between planting and harvest.’ But I say, wake up and look around. The fields are already ripe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: white.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for harvest.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The harvesters are paid good wages, and the fruit they harvest is people brought to eternal life. What joy awaits both the planter and the harvester alike!
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You know the saying, ‘One plants and another harvests.’ And it’s true.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I sent you to harvest where you didn’t plant; others had already done the work, and now you will get to gather the harvest.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Many Samaritans Believe
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Many Samaritans from the village believed in Jesus because the woman had said, “He told me everything I ever did!” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He had to go through Samaria on the way. '
  '40':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When they came out to see him, they begged him to stay in their village. So he stayed for two days, '
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'long enough for many more to hear his message and believe. '
  '42':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then they said to the woman, “Now we believe, not just because of what you told us, but because we have heard him ourselves. Now we know that he is indeed the Savior of the world.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals an Official’s Son
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'At the end of the two days, Jesus went on to Galilee. '
  '44':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He himself had said that a prophet is not honored in his own hometown. '
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Yet the Galileans welcomed him, for they had been in Jerusalem at the Passover celebration and had seen everything he did there.
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As he traveled through Galilee, he came to Cana, where he had turned the water into wine. There was a government official in nearby Capernaum whose son was very sick. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he heard that Jesus had come from Judea to Galilee, he went and begged Jesus to come to Capernaum to heal his son, who was about to die.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Will you never believe in me unless you see miraculous signs and wonders?”
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The official pleaded, “Lord, please come now before my little boy dies.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eventually he came to the Samaritan village of Sychar, near the field that Jacob gave to his son Joseph. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus told him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go back home. Your son will live!”
    - type: text
      text: ' And the man believed what Jesus said and started home.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While the man was on his way, some of his servants met him with the news that his son was alive and well. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He asked them when the boy had begun to get better, and they replied, “Yesterday afternoon at one o’clock his fever suddenly disappeared!” '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the father realized that that was the very time Jesus had told him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Your son will live.”
    - type: text
      text: ' And he and his entire household believed in Jesus. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This was the second miraculous sign Jesus did in Galilee after coming from Judea.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob’s well was there; and Jesus, tired from the long walk, sat wearily beside the well about noontime. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soon a Samaritan woman came to draw water, and Jesus said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Please give me a drink.”
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was alone at the time because his disciples had gone into the village to buy some food.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The woman was surprised, for Jews refuse to have anything to do with Samaritans.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts do not include this sentence.
      marker-yv: yv-n
    - type: text
      text: ' She said to Jesus, “You are a Jew, and I am a Samaritan woman. Why are you asking me for a drink?”'
