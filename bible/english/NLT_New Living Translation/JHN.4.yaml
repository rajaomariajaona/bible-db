document_id: JHN.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus and the Samaritan Woman
  - type: text
    content: Jesus
  - type: note
    content: Some manuscripts read The Lord.
  - type: text
    content: ' knew the Pharisees had heard that he was baptizing and making more disciples than John '
  '10':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “If you only knew the gift God has for you and who you are speaking to, you would ask me, and I would give you living water.”
  '11':
  - type: text
    content: '“But sir, you don’t have a rope or a bucket,” she said, “and this well is very deep. Where would you get this living water? '
  '12':
  - type: text
    content: And besides, do you think you’re greater than our ancestor Jacob, who gave us this well? How can you offer better water than he and his sons and his animals enjoyed?”
  '13':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Anyone who drinks this water will soon become thirsty again.
  - type: text
    content: ' '
  '14':
  - type: text
    content: But those who drink the water I give will never be thirsty again. It becomes a fresh, bubbling spring within them, giving them eternal life.”
  '15':
  - type: text
    content: “Please, sir,” the woman said, “give me this water! Then I’ll never be thirsty again, and I won’t have to come here to get water.”
  '16':
  - type: text
    content: ' '
  - type: text
    content: '“Go and get your husband,” '
  - type: text
    content: Jesus told her.
  '17':
  - type: text
    content: “I don’t have a husband,” the woman replied.
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “You’re right! You don’t have a husband—
  - type: text
    content: ' '
  '18':
  - type: text
    content: for you have had five husbands, and you aren’t even married to the man you’re living with now. You certainly spoke the truth!”
  '19':
  - type: text
    content: '“Sir,” the woman said, “you must be a prophet. '
  '2':
  - type: text
    content: '(though Jesus himself didn’t baptize them—his disciples did). '
  '20':
  - type: text
    content: So tell me, why is it that you Jews insist that Jerusalem is the only place of worship, while we Samaritans claim it is here at Mount Gerizim,
  - type: note
    content: Greek on this mountain.
  - type: text
    content: ' where our ancestors worshiped?”'
  '21':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Believe me, dear woman, the time is coming when it will no longer matter whether you worship the Father on this mountain or in Jerusalem.
  - type: text
    content: ' '
  '22':
  - type: text
    content: You Samaritans know very little about the one you worship, while we Jews know all about him, for salvation comes through the Jews.
  - type: text
    content: ' '
  '23':
  - type: text
    content: But the time is coming—indeed it’s here now—when true worshipers will worship the Father in spirit and in truth. The Father is looking for those who will worship him that way.
  - type: text
    content: ' '
  '24':
  - type: text
    content: For God is Spirit, so those who worship him must worship in spirit and in truth.”
  '25':
  - type: text
    content: The woman said, “I know the Messiah is coming—the one who is called Christ. When he comes, he will explain everything to us.”
  '26':
  - type: text
    content: 'Then Jesus told her, '
  - type: text
    content: “
  - type: text
    content: I Am
  - type: text
    content: ' the Messiah!”'
  - type: note
    content: Or “The ‘I Am’ is here”; or “I am the Lord”; Greek reads “I am, the one speaking to you.” See Exod 3:14.
  '27':
  - type: text
    content: 'Just then his disciples came back. They were shocked to find him talking to a woman, but none of them had the nerve to ask, “What do you want with her?” or “Why are you talking to her?” '
  '28':
  - type: text
    content: 'The woman left her water jar beside the well and ran back to the village, telling everyone, '
  '29':
  - type: text
    content: '“Come and see a man who told me everything I ever did! Could he possibly be the Messiah?” '
  '3':
  - type: text
    content: So he left Judea and returned to Galilee.
  '30':
  - type: text
    content: So the people came streaming from the village to see him.
  '31':
  - type: text
    content: Meanwhile, the disciples were urging Jesus, “Rabbi, eat something.”
  '32':
  - type: text
    content: 'But Jesus replied, '
  - type: text
    content: “I have a kind of food you know nothing about.”
  '33':
  - type: text
    content: “Did someone bring him food while we were gone?” the disciples asked each other.
  '34':
  - type: text
    content: 'Then Jesus explained: '
  - type: text
    content: “My nourishment comes from doing the will of God, who sent me, and from finishing his work.
  - type: text
    content: ' '
  '35':
  - type: text
    content: You know the saying, ‘Four months between planting and harvest.’ But I say, wake up and look around. The fields are already ripe
  - type: note
    content: Greek white.
  - type: text
    content: ' '
  - type: text
    content: for harvest.
  - type: text
    content: ' '
  '36':
  - type: text
    content: The harvesters are paid good wages, and the fruit they harvest is people brought to eternal life. What joy awaits both the planter and the harvester alike!
  - type: text
    content: ' '
  '37':
  - type: text
    content: You know the saying, ‘One plants and another harvests.’ And it’s true.
  - type: text
    content: ' '
  '38':
  - type: text
    content: I sent you to harvest where you didn’t plant; others had already done the work, and now you will get to gather the harvest.”
  - type: heading
    content: Many Samaritans Believe
  '39':
  - type: text
    content: 'Many Samaritans from the village believed in Jesus because the woman had said, “He told me everything I ever did!” '
  '4':
  - type: text
    content: 'He had to go through Samaria on the way. '
  '40':
  - type: text
    content: 'When they came out to see him, they begged him to stay in their village. So he stayed for two days, '
  '41':
  - type: text
    content: 'long enough for many more to hear his message and believe. '
  '42':
  - type: text
    content: Then they said to the woman, “Now we believe, not just because of what you told us, but because we have heard him ourselves. Now we know that he is indeed the Savior of the world.”
  - type: heading
    content: Jesus Heals an Official’s Son
  '43':
  - type: text
    content: 'At the end of the two days, Jesus went on to Galilee. '
  '44':
  - type: text
    content: 'He himself had said that a prophet is not honored in his own hometown. '
  '45':
  - type: text
    content: Yet the Galileans welcomed him, for they had been in Jerusalem at the Passover celebration and had seen everything he did there.
  '46':
  - type: text
    content: 'As he traveled through Galilee, he came to Cana, where he had turned the water into wine. There was a government official in nearby Capernaum whose son was very sick. '
  '47':
  - type: text
    content: When he heard that Jesus had come from Judea to Galilee, he went and begged Jesus to come to Capernaum to heal his son, who was about to die.
  '48':
  - type: text
    content: 'Jesus asked, '
  - type: text
    content: “Will you never believe in me unless you see miraculous signs and wonders?”
  '49':
  - type: text
    content: The official pleaded, “Lord, please come now before my little boy dies.”
  '5':
  - type: text
    content: 'Eventually he came to the Samaritan village of Sychar, near the field that Jacob gave to his son Joseph. '
  '50':
  - type: text
    content: 'Then Jesus told him, '
  - type: text
    content: “Go back home. Your son will live!”
  - type: text
    content: ' And the man believed what Jesus said and started home.'
  '51':
  - type: text
    content: 'While the man was on his way, some of his servants met him with the news that his son was alive and well. '
  '52':
  - type: text
    content: 'He asked them when the boy had begun to get better, and they replied, “Yesterday afternoon at one o’clock his fever suddenly disappeared!” '
  '53':
  - type: text
    content: 'Then the father realized that that was the very time Jesus had told him, '
  - type: text
    content: “Your son will live.”
  - type: text
    content: ' And he and his entire household believed in Jesus. '
  '54':
  - type: text
    content: This was the second miraculous sign Jesus did in Galilee after coming from Judea.
  '6':
  - type: text
    content: 'Jacob’s well was there; and Jesus, tired from the long walk, sat wearily beside the well about noontime. '
  '7':
  - type: text
    content: 'Soon a Samaritan woman came to draw water, and Jesus said to her, '
  - type: text
    content: “Please give me a drink.”
  - type: text
    content: ' '
  '8':
  - type: text
    content: He was alone at the time because his disciples had gone into the village to buy some food.
  '9':
  - type: text
    content: The woman was surprised, for Jews refuse to have anything to do with Samaritans.
  - type: note
    content: Some manuscripts do not include this sentence.
  - type: text
    content: ' She said to Jesus, “You are a Jew, and I am a Samaritan woman. Why are you asking me for a drink?”'
