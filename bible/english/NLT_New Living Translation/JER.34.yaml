document_id: JER.34
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Warning for Zedekiah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: King Nebuchadnezzar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nebuchadrezzar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Nebuchadnezzar.
    marker-yv: yv-n
  - type: text
    text: ' of Babylon came with all the armies from the kingdoms he ruled, and he fought against Jerusalem and the towns of Judah. At that time this message came to Jeremiah from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Go to King Zedekiah of Judah, and tell him, ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, says: I am about to hand this city over to the king of Babylon, and he will burn it down. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You will not escape his grasp but will be captured and taken to meet the king of Babylon face to face. Then you will be exiled to Babylon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“‘But listen to this promise from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', O Zedekiah, king of Judah. This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: You will not be killed in war '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'but will die peacefully. People will burn incense in your memory, just as they did for your ancestors, the kings who preceded you. They will mourn for you, crying, “Alas, our master is dead!” This I have decreed, says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Jeremiah the prophet delivered the message to King Zedekiah of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: At this time the Babylonian army was besieging Jerusalem, Lachish, and Azekah—the only fortified cities of Judah not yet captured.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Freedom for Hebrew Slaves
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'This message came to Jeremiah from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' after King Zedekiah made a covenant with the people, proclaiming freedom for the slaves. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He had ordered all the people to free their Hebrew slaves—both men and women. No one was to keep a fellow Judean in bondage. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The officials and all the people had obeyed the king’s command, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: but later they changed their minds. They took back the men and women they had freed, forcing them to be slaves again.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave them this message through Jeremiah: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, says: I made a covenant with your ancestors long ago when I rescued them from their slavery in Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I told them that every Hebrew slave must be freed after serving six years. But your ancestors paid no attention to me. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Recently you repented and did what was right, following my command. You freed your slaves and made a solemn covenant with me in the Temple that bears my name. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But now you have shrugged off your oath and defiled my name by taking back the men and women you had freed, forcing them to be slaves once again.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Therefore, this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Since you have not obeyed me by setting your countrymen free, I will set you free to be destroyed by war, disease, and famine. You will be an object of horror to all the nations of the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Because you have broken the terms of our covenant, I will cut you apart just as you cut apart the calf when you walked between its halves to solemnize your vows. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Yes, I will cut you apart, whether you are officials of Judah or Jerusalem, court officials, priests, or common people—for you have broken your oath. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I will give you to your enemies, and they will kill you. Your bodies will be food for the vultures and wild animals.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“I will hand over King Zedekiah of Judah and his officials to the army of the king of Babylon. And although they have left Jerusalem for a while, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: I will call the Babylonian armies back again. They will fight against this city and will capture it and burn it down. I will see to it that all the towns of Judah are destroyed, with no one living there.”
