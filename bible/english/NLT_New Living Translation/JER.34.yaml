document_id: JER.34,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Warning for Zedekiah
  - type: text
    content: King Nebuchadnezzar
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar.
  - type: text
    content: ' of Babylon came with all the armies from the kingdoms he ruled, and he fought against Jerusalem and the towns of Judah. At that time this message came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'The officials and all the people had obeyed the king’s command, '
  '11':
  - type: text
    content: but later they changed their minds. They took back the men and women they had freed, forcing them to be slaves again.
  '12':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them this message through Jeremiah: '
  '13':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: I made a covenant with your ancestors long ago when I rescued them from their slavery in Egypt. '
  '14':
  - type: text
    content: 'I told them that every Hebrew slave must be freed after serving six years. But your ancestors paid no attention to me. '
  '15':
  - type: text
    content: 'Recently you repented and did what was right, following my command. You freed your slaves and made a solemn covenant with me in the Temple that bears my name. '
  '16':
  - type: text
    content: But now you have shrugged off your oath and defiled my name by taking back the men and women you had freed, forcing them to be slaves once again.
  '17':
  - type: text
    content: '“Therefore, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Since you have not obeyed me by setting your countrymen free, I will set you free to be destroyed by war, disease, and famine. You will be an object of horror to all the nations of the earth. '
  '18':
  - type: text
    content: 'Because you have broken the terms of our covenant, I will cut you apart just as you cut apart the calf when you walked between its halves to solemnize your vows. '
  '19':
  - type: text
    content: 'Yes, I will cut you apart, whether you are officials of Judah or Jerusalem, court officials, priests, or common people—for you have broken your oath. '
  '2':
  - type: text
    content: '“Go to King Zedekiah of Judah, and tell him, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: I am about to hand this city over to the king of Babylon, and he will burn it down. '
  '20':
  - type: text
    content: I will give you to your enemies, and they will kill you. Your bodies will be food for the vultures and wild animals.
  '21':
  - type: text
    content: '“I will hand over King Zedekiah of Judah and his officials to the army of the king of Babylon. And although they have left Jerusalem for a while, '
  '22':
  - type: text
    content: I will call the Babylonian armies back again. They will fight against this city and will capture it and burn it down. I will see to it that all the towns of Judah are destroyed, with no one living there.”
  '3':
  - type: text
    content: You will not escape his grasp but will be captured and taken to meet the king of Babylon face to face. Then you will be exiled to Babylon.
  '4':
  - type: text
    content: '“‘But listen to this promise from the '
  - type: text
    content: Lord
  - type: text
    content: ', O Zedekiah, king of Judah. This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: You will not be killed in war '
  '5':
  - type: text
    content: 'but will die peacefully. People will burn incense in your memory, just as they did for your ancestors, the kings who preceded you. They will mourn for you, crying, “Alas, our master is dead!” This I have decreed, says the '
  - type: text
    content: Lord
  - type: text
    content: .’”
  '6':
  - type: text
    content: 'So Jeremiah the prophet delivered the message to King Zedekiah of Judah. '
  '7':
  - type: text
    content: At this time the Babylonian army was besieging Jerusalem, Lachish, and Azekah—the only fortified cities of Judah not yet captured.
  - type: heading
    content: Freedom for Hebrew Slaves
  '8':
  - type: text
    content: 'This message came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ' after King Zedekiah made a covenant with the people, proclaiming freedom for the slaves. '
  '9':
  - type: text
    content: 'He had ordered all the people to free their Hebrew slaves—both men and women. No one was to keep a fellow Judean in bondage. '
