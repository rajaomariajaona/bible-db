document_id: ROM.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Mercy on Israel
  - type: text
    content: I ask, then, has God rejected his own people, the nation of Israel? Of course not! I myself am an Israelite, a descendant of Abraham and a member of the tribe of Benjamin.
  '10':
  - type: text
    content: Let their eyes go blind so they cannot see,
  - type: text
    content: and let their backs be bent forever.”
  - type: note
    content: Ps 69:22-23 (Greek version).
  '11':
  - type: text
    content: 'Did God’s people stumble and fall beyond recovery? Of course not! They were disobedient, so God made salvation available to the Gentiles. But he wanted his own people to become jealous and claim it for themselves. '
  '12':
  - type: text
    content: Now if the Gentiles were enriched because the people of Israel turned down God’s offer of salvation, think how much greater a blessing the world will share when they finally accept it.
  '13':
  - type: text
    content: 'I am saying all this especially for you Gentiles. God has appointed me as the apostle to the Gentiles. I stress this, '
  '14':
  - type: text
    content: 'for I want somehow to make the people of Israel jealous of what you Gentiles have, so I might save some of them. '
  '15':
  - type: text
    content: 'For since their rejection meant that God offered salvation to the rest of the world, their acceptance will be even more wonderful. It will be life for those who were dead! '
  '16':
  - type: text
    content: And since Abraham and the other patriarchs were holy, their descendants will also be holy—just as the entire batch of dough is holy because the portion given as an offering is holy. For if the roots of the tree are holy, the branches will be, too.
  '17':
  - type: text
    content: 'But some of these branches from Abraham’s tree—some of the people of Israel—have been broken off. And you Gentiles, who were branches from a wild olive tree, have been grafted in. So now you also receive the blessing God has promised Abraham and his children, sharing in the rich nourishment from the root of God’s special olive tree. '
  '18':
  - type: text
    content: But you must not brag about being grafted in to replace the branches that were broken off. You are just a branch, not the root.
  '19':
  - type: text
    content: '“Well,” you may say, “those branches were broken off to make room for me.” '
  '2':
  - type: text
    content: 'No, God has not rejected his own people, whom he chose from the very beginning. Do you realize what the Scriptures say about this? Elijah the prophet complained to God about the people of Israel and said, '
  '20':
  - type: text
    content: 'Yes, but remember—those branches were broken off because they didn’t believe in Christ, and you are there because you do believe. So don’t think highly of yourself, but fear what could happen. '
  '21':
  - type: text
    content: For if God did not spare the original branches, he won’t
  - type: note
    content: Some manuscripts read perhaps he won’t.
  - type: text
    content: ' spare you either.'
  '22':
  - type: text
    content: 'Notice how God is both kind and severe. He is severe toward those who disobeyed, but kind to you if you continue to trust in his kindness. But if you stop trusting, you also will be cut off. '
  '23':
  - type: text
    content: 'And if the people of Israel turn from their unbelief, they will be grafted in again, for God has the power to graft them back into the tree. '
  '24':
  - type: text
    content: You, by nature, were a branch cut from a wild olive tree. So if God was willing to do something contrary to nature by grafting you into his cultivated tree, he will be far more eager to graft the original branches back into the tree where they belong.
  - type: heading
    content: God’s Mercy Is for Everyone
  '25':
  - type: text
    content: I want you to understand this mystery, dear brothers and sisters,
  - type: note
    content: Greek brothers.
  - type: text
    content: ' so that you will not feel proud about yourselves. Some of the people of Israel have hard hearts, but this will last only until the full number of Gentiles comes to Christ. '
  '26':
  - type: text
    content: And so all Israel will be saved. As the Scriptures say,
  - type: text
    content: “The one who rescues will come from Jerusalem,
  - type: note
    content: Greek from Zion.
  - type: text
    content: and he will turn Israel
  - type: note
    content: Greek Jacob.
  - type: text
    content: ' away from ungodliness.'
  '27':
  - type: text
    content: And this is my covenant with them,
  - type: text
    content: that I will take away their sins.”
  - type: note
    content: Isa 59:20-21; 27:9 (Greek version).
  '28':
  - type: text
    content: 'Many of the people of Israel are now enemies of the Good News, and this benefits you Gentiles. Yet they are still the people he loves because he chose their ancestors Abraham, Isaac, and Jacob. '
  '29':
  - type: text
    content: 'For God’s gifts and his call can never be withdrawn. '
  '3':
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', they have killed your prophets and torn down your altars. I am the only one left, and now they are trying to kill me, too.”'
  - type: note
    content: 1 Kgs 19:10, 14.
  '30':
  - type: text
    content: 'Once, you Gentiles were rebels against God, but when the people of Israel rebelled against him, God was merciful to you instead. '
  '31':
  - type: text
    content: Now they are the rebels, and God’s mercy has come to you so that they, too, will share
  - type: note
    content: Other manuscripts read will now share; still others read will someday share.
  - type: text
    content: ' in God’s mercy. '
  '32':
  - type: text
    content: For God has imprisoned everyone in disobedience so he could have mercy on everyone.
  '33':
  - type: text
    content: Oh, how great are God’s riches and wisdom and knowledge! How impossible it is for us to understand his decisions and his ways!
  '34':
  - type: text
    content: 'For who can know the '
  - type: text
    content: Lord
  - type: text
    content: ’s thoughts?
  - type: text
    content: Who knows enough to give him advice?
  - type: note
    content: Isa 40:13 (Greek version).
  '35':
  - type: text
    content: And who has given him so much
  - type: text
    content: that he needs to pay it back?
  - type: note
    content: See Job 41:11.
  '36':
  - type: text
    content: For everything comes from him and exists by his power and is intended for his glory. All glory to him forever! Amen.
  '4':
  - type: text
    content: And do you remember God’s reply? He said, “No, I have 7,000 others who have never bowed down to Baal!”
  - type: note
    content: 1 Kgs 19:18.
  '5':
  - type: text
    content: It is the same today, for a few of the people of Israel
  - type: note
    content: Greek for a remnant.
  - type: text
    content: ' have remained faithful because of God’s grace—his undeserved kindness in choosing them. '
  '6':
  - type: text
    content: And since it is through God’s kindness, then it is not by their good works. For in that case, God’s grace would not be what it really is—free and undeserved.
  '7':
  - type: text
    content: 'So this is the situation: Most of the people of Israel have not found the favor of God they are looking for so earnestly. A few have—the ones God has chosen—but the hearts of the rest were hardened. '
  '8':
  - type: text
    content: As the Scriptures say,
  - type: text
    content: “God has put them into a deep sleep.
  - type: text
    content: To this day he has shut their eyes so they do not see,
  - type: text
    content: and closed their ears so they do not hear.”
  - type: note
    content: Isa 29:10; Deut 29:4.
  '9':
  - type: text
    content: Likewise, David said,
  - type: text
    content: “Let their bountiful table become a snare,
  - type: text
    content: a trap that makes them think all is well.
  - type: text
    content: Let their blessings cause them to stumble,
  - type: text
    content: and let them get what they deserve.
