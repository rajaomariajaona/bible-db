document_id: ROM.11,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Mercy on Israel
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: I ask, then, has God rejected his own people, the nation of Israel? Of course not! I myself am an Israelite, a descendant of Abraham and a member of the tribe of Benjamin.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let their eyes go blind so they cannot see,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let their backs be bent forever.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:9-10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 69:22-23 (Greek version).
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Did God’s people stumble and fall beyond recovery? Of course not! They were disobedient, so God made salvation available to the Gentiles. But he wanted his own people to become jealous and claim it for themselves. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now if the Gentiles were enriched because the people of Israel turned down God’s offer of salvation, think how much greater a blessing the world will share when they finally accept it.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am saying all this especially for you Gentiles. God has appointed me as the apostle to the Gentiles. I stress this, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for I want somehow to make the people of Israel jealous of what you Gentiles have, so I might save some of them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For since their rejection meant that God offered salvation to the rest of the world, their acceptance will be even more wonderful. It will be life for those who were dead! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And since Abraham and the other patriarchs were holy, their descendants will also be holy—just as the entire batch of dough is holy because the portion given as an offering is holy. For if the roots of the tree are holy, the branches will be, too.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But some of these branches from Abraham’s tree—some of the people of Israel—have been broken off. And you Gentiles, who were branches from a wild olive tree, have been grafted in. So now you also receive the blessing God has promised Abraham and his children, sharing in the rich nourishment from the root of God’s special olive tree. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But you must not brag about being grafted in to replace the branches that were broken off. You are just a branch, not the root.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Well,” you may say, “those branches were broken off to make room for me.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No, God has not rejected his own people, whom he chose from the very beginning. Do you realize what the Scriptures say about this? Elijah the prophet complained to God about the people of Israel and said, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yes, but remember—those branches were broken off because they didn’t believe in Christ, and you are there because you do believe. So don’t think highly of yourself, but fear what could happen. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For if God did not spare the original branches, he won’t
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: perhaps he won’t.
      marker-yv: yv-n
    - type: text
      text: ' spare you either.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notice how God is both kind and severe. He is severe toward those who disobeyed, but kind to you if you continue to trust in his kindness. But if you stop trusting, you also will be cut off. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if the people of Israel turn from their unbelief, they will be grafted in again, for God has the power to graft them back into the tree. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You, by nature, were a branch cut from a wild olive tree. So if God was willing to do something contrary to nature by grafting you into his cultivated tree, he will be far more eager to graft the original branches back into the tree where they belong.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Mercy Is for Everyone
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: I want you to understand this mystery, dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers.
      marker-yv: yv-n
    - type: text
      text: ' so that you will not feel proud about yourselves. Some of the people of Israel have hard hearts, but this will last only until the full number of Gentiles comes to Christ. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And so all Israel will be saved. As the Scriptures say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The one who rescues will come from Jerusalem,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:26a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from Zion.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will turn Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:26b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jacob.
      marker-yv: yv-n
    - type: text
      text: ' away from ungodliness.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And this is my covenant with them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I will take away their sins.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:26-27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 59:20-21; 27:9 (Greek version).
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Many of the people of Israel are now enemies of the Good News, and this benefits you Gentiles. Yet they are still the people he loves because he chose their ancestors Abraham, Isaac, and Jacob. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For God’s gifts and his call can never be withdrawn. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', they have killed your prophets and torn down your altars. I am the only one left, and now they are trying to kill me, too.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1 Kgs 19:10, 14.
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Once, you Gentiles were rebels against God, but when the people of Israel rebelled against him, God was merciful to you instead. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now they are the rebels, and God’s mercy has come to you so that they, too, will share
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Other manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'will now share; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'still others read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will someday share.
      marker-yv: yv-n
    - type: text
      text: ' in God’s mercy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For God has imprisoned everyone in disobedience so he could have mercy on everyone.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oh, how great are God’s riches and wisdom and knowledge! How impossible it is for us to understand his decisions and his ways!
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For who can know the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s thoughts?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who knows enough to give him advice?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 40:13 (Greek version).
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who has given him so much
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that he needs to pay it back?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Job 41:11.
      marker-yv: yv-n
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For everything comes from him and exists by his power and is intended for his glory. All glory to him forever! Amen.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And do you remember God’s reply? He said, “No, I have 7,000 others who have never bowed down to Baal!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1 Kgs 19:18.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It is the same today, for a few of the people of Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for a remnant.
      marker-yv: yv-n
    - type: text
      text: ' have remained faithful because of God’s grace—his undeserved kindness in choosing them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And since it is through God’s kindness, then it is not by their good works. For in that case, God’s grace would not be what it really is—free and undeserved.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So this is the situation: Most of the people of Israel have not found the favor of God they are looking for so earnestly. A few have—the ones God has chosen—but the hearts of the rest were hardened. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As the Scriptures say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “God has put them into a deep sleep.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To this day he has shut their eyes so they do not see,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and closed their ears so they do not hear.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 29:10; Deut 29:4.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Likewise, David said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let their bountiful table become a snare,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a trap that makes them think all is well.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let their blessings cause them to stumble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let them get what they deserve.
