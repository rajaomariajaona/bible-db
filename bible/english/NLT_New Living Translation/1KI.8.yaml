document_id: 1KI.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ark Brought to the Temple
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Solomon then summoned to Jerusalem the elders of Israel and all the heads of the tribes—the leaders of the ancestral families of the Israelites. They were to bring the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Covenant to the Temple from its location in the City of David, also known as Zion. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So all the men of Israel assembled before King Solomon at the annual Festival of Shelters, which is held in early autumn in the month of Ethanim.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'at the festival in the month Ethanim, which is the seventh month. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Festival of Shelters began on the fifteenth day of the seventh month of the ancient Hebrew lunar calendar. This day occurred in late September, October, or early November.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When all the elders of Israel arrived, the priests picked up the Ark. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The priests and Levites brought up the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' along with the special tent'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the Tent of Meeting; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: i.e., the tent mentioned in 2 Sam 6:17 and 1 Chr 16:1.
    marker-yv: yv-n
  - type: text
    text: ' and all the sacred items that had been in it. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: There, before the Ark, King Solomon and the entire community of Israel sacrificed so many sheep, goats, and cattle that no one could keep count!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the priests carried the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Covenant into the inner sanctuary of the Temple—the Most Holy Place—and placed it beneath the wings of the cherubim. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The cherubim spread their wings over the Ark, forming a canopy over the Ark and its carrying poles. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'These poles were so long that their ends could be seen from the Holy Place, which is in front of the Most Holy Place, but not from the outside. They are still there to this day. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nothing was in the Ark except the two stone tablets that Moses had placed in it at Mount Sinai,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'at Horeb, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: another name for Sinai.
    marker-yv: yv-n
  - type: text
    text: ' where the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' made a covenant with the people of Israel when they left the land of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When the priests came out of the Holy Place, a thick cloud filled the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The priests could not continue their service because of the cloud, for the glorious presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' filled the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Solomon Praises the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then Solomon prayed, “O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you have said that you would live in a thick cloud of darkness. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Now I have built a glorious Temple for you, a place where you can live forever!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Greek texts add the line '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Is this not written in the Book of Jashar?
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then the king turned around to the entire community of Israel standing before him and gave this blessing: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, who has kept the promise he made to my father, David. For he told my father, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ‘From the day I brought my people Israel out of Egypt, I have never chosen a city among any of the tribes of Israel as the place where a Temple should be built to honor my name. But I have chosen David to be king over my people Israel.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Solomon said, “My father, David, wanted to build this Temple to honor the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told him, ‘You wanted to build the Temple to honor my name. Your intention is good, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: but you are not the one to do it. One of your own sons will build the Temple to honor me.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“And now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has fulfilled the promise he made, for I have become king in my father’s place, and now I sit on the throne of Israel, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' promised. I have built this Temple to honor the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And I have prepared a place there for the Ark, which contains the covenant that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' made with our ancestors when he brought them out of Egypt.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon’s Prayer of Dedication
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then Solomon stood before the altar of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in front of the entire community of Israel. He lifted his hands toward heaven, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: and he prayed,
- type: usfm
  marker: pmo
  children:
  - type: text
    text: '“O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', God of Israel, there is no God like you in all of heaven above or on the earth below. You keep your covenant and show unfailing love to all who walk before you in wholehearted devotion. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: You have kept your promise to your servant David, my father. You made that promise with your own mouth, and with your own hands you have fulfilled it today.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“And now, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', God of Israel, carry out the additional promise you made to your servant David, my father. For you said to him, ‘If your descendants guard their behavior and faithfully follow me as you have done, one of them will always sit on the throne of Israel.’ '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Now, O God of Israel, fulfill this promise to your servant David, my father.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“But will God really live on earth? Why, even the highest heavens cannot contain you. How much less this Temple I have built! '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nevertheless, listen to my prayer and my plea, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God. Hear the cry and the prayer that your servant is making to you today. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'May you watch over this Temple night and day, this place where you have said, ‘My name will be there.’ May you always hear the prayers I make toward this place. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: May you hear the humble and earnest requests from me and your people Israel when we pray toward this place. Yes, hear us from heaven where you live, and when you hear, forgive.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“If someone wrongs another person and is required to take an oath of innocence in front of your altar in this Temple, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: then hear from heaven and judge between your servants—the accuser and the accused. Punish the guilty as they deserve. Acquit the innocent because of their innocence.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '“If your people Israel are defeated by their enemies because they have sinned against you, and if they turn to you and acknowledge your name and pray to you here in this Temple, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: then hear from heaven and forgive the sin of your people Israel and return them to this land you gave their ancestors.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '“If the skies are shut up and there is no rain because your people have sinned against you, and if they pray toward this Temple and acknowledge your name and turn from their sins because you have punished them, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: then hear from heaven and forgive the sins of your servants, your people Israel. Teach them to follow the right path, and send rain on your land that you have given to your people as their special possession.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '“If there is a famine in the land or a plague or crop disease or attacks of locusts or caterpillars, or if your people’s enemies are in the land besieging their towns—whatever disaster or disease there is— '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'and if your people Israel pray about their troubles, raising their hands toward this Temple, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'then hear from heaven where you live, and forgive. Give your people what their actions deserve, for you alone know each human heart. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Then they will fear you as long as they live in the land you gave to our ancestors.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: '“In the future, foreigners who do not belong to your people Israel will hear of you. They will come from distant lands because of your name, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'for they will hear of your great name and your strong hand and your powerful arm. And when they pray toward this Temple, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: then hear from heaven where you live, and grant what they ask of you. In this way, all the people of the earth will come to know and fear you, just as your own people Israel do. They, too, will know that this Temple I have built honors your name.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: '“If your people go out where you send them to fight their enemies, and if they pray to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' by turning toward this city you have chosen and toward this Temple I have built to honor your name, '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: then hear their prayers from heaven and uphold their cause.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: '“If they sin against you—and who has never sinned?—you might become angry with them and let their enemies conquer them and take them captive to their land far away or near. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'But in that land of exile, they might turn to you in repentance and pray, ‘We have sinned, done evil, and acted wickedly.’ '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'If they turn to you with their whole heart and soul in the land of their enemies and pray toward the land you gave to their ancestors—toward this city you have chosen, and toward this Temple I have built to honor your name— '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'then hear their prayers and their petition from heaven where you live, and uphold their cause. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Forgive your people who have sinned against you. Forgive all the offenses they have committed against you. Make their captors merciful to them, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: for they are your people—your special possession—whom you brought out of the iron-smelting furnace of Egypt.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: '“May your eyes be open to my requests and to the requests of your people Israel. May you hear and answer them whenever they cry out to you. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'For when you brought our ancestors out of Egypt, O Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you told your servant Moses that you had set Israel apart from all the nations of the earth to be your own special possession.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Dedication of the Temple
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'When Solomon finished making these prayers and petitions to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', he stood up in front of the altar of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', where he had been kneeling with his hands raised toward heaven. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'He stood and in a loud voice blessed the entire congregation of Israel:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: '“Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' who has given rest to his people Israel, just as he promised. Not one word has failed of all the wonderful promises he gave through his servant Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'May the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God be with us as he was with our ancestors; may he never leave us or abandon us. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'May he give us the desire to do his will in everything and to obey all the commands, decrees, and regulations that he gave our ancestors. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'And may these words that I have prayed in the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' be before him constantly, day and night, so that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God may give justice to me and to his people Israel, according to each day’s needs. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Then people all over the earth will know that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' alone is God and there is no other. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'And may you be completely faithful to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God. May you always obey his decrees and commands, just as you are doing today.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Then the king and all Israel with him offered sacrifices to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Solomon offered to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' a peace offering of 22,000 cattle and 120,000 sheep and goats. And so the king and all the people of Israel dedicated the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'That same day the king consecrated the central area of the courtyard in front of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple. He offered burnt offerings, grain offerings, and the fat of peace offerings there, because the bronze altar in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s presence was too small to hold all the burnt offerings, grain offerings, and the fat of the peace offerings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Then Solomon and all Israel celebrated the Festival of Shelters
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:65a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the festival; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see note on 8:2.
    marker-yv: yv-n
  - type: text
    text: ' in the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God. A large congregation had gathered from as far away as Lebo-hamath in the north and the Brook of Egypt in the south. The celebration went on for fourteen days in all—seven days for the dedication of the altar and seven days for the Festival of Shelters.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:65b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'seven days and seven days, fourteen days; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare parallel text at 2 Chr 7:8-10.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: After the festival was over,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:66 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the eighth day, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: probably referring to the day following the seven-day Festival of Shelters; compare parallel text at 2 Chr 7:9-10.
    marker-yv: yv-n
  - type: text
    text: ' Solomon sent the people home. They blessed the king and went to their homes joyful and glad because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had been good to his servant David and to his people Israel.'
