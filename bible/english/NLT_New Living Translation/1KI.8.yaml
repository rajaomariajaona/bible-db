document_id: 1KI.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ark Brought to the Temple
  - type: text
    content: 'Solomon then summoned to Jerusalem the elders of Israel and all the heads of the tribes—the leaders of the ancestral families of the Israelites. They were to bring the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Covenant to the Temple from its location in the City of David, also known as Zion. '
  '10':
  - type: text
    content: 'When the priests came out of the Holy Place, a thick cloud filled the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'The priests could not continue their service because of the cloud, for the glorious presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Solomon Praises the Lord
  '12':
  - type: text
    content: 'Then Solomon prayed, “O '
  - type: text
    content: Lord
  - type: text
    content: ', you have said that you would live in a thick cloud of darkness. '
  '13':
  - type: text
    content: Now I have built a glorious Temple for you, a place where you can live forever!
  - type: note
    content: Some Greek texts add the line Is this not written in the Book of Jashar?
  - type: text
    content: ”
  '14':
  - type: text
    content: 'Then the king turned around to the entire community of Israel standing before him and gave this blessing: '
  '15':
  - type: text
    content: '“Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, who has kept the promise he made to my father, David. For he told my father, '
  '16':
  - type: text
    content: ‘From the day I brought my people Israel out of Egypt, I have never chosen a city among any of the tribes of Israel as the place where a Temple should be built to honor my name. But I have chosen David to be king over my people Israel.’”
  '17':
  - type: text
    content: 'Then Solomon said, “My father, David, wanted to build this Temple to honor the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '18':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' told him, ‘You wanted to build the Temple to honor my name. Your intention is good, '
  '19':
  - type: text
    content: but you are not the one to do it. One of your own sons will build the Temple to honor me.’
  '2':
  - type: text
    content: So all the men of Israel assembled before King Solomon at the annual Festival of Shelters, which is held in early autumn in the month of Ethanim.
  - type: note
    content: Hebrew at the festival in the month Ethanim, which is the seventh month. The Festival of Shelters began on the fifteenth day of the seventh month of the ancient Hebrew lunar calendar. This day occurred in late September, October, or early November.
  '20':
  - type: text
    content: '“And now the '
  - type: text
    content: Lord
  - type: text
    content: ' has fulfilled the promise he made, for I have become king in my father’s place, and now I sit on the throne of Israel, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' promised. I have built this Temple to honor the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '21':
  - type: text
    content: 'And I have prepared a place there for the Ark, which contains the covenant that the '
  - type: text
    content: Lord
  - type: text
    content: ' made with our ancestors when he brought them out of Egypt.”'
  - type: heading
    content: Solomon’s Prayer of Dedication
  '22':
  - type: text
    content: 'Then Solomon stood before the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' in front of the entire community of Israel. He lifted his hands toward heaven, '
  '23':
  - type: text
    content: and he prayed,
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, there is no God like you in all of heaven above or on the earth below. You keep your covenant and show unfailing love to all who walk before you in wholehearted devotion. '
  '24':
  - type: text
    content: You have kept your promise to your servant David, my father. You made that promise with your own mouth, and with your own hands you have fulfilled it today.
  '25':
  - type: text
    content: '“And now, O '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, carry out the additional promise you made to your servant David, my father. For you said to him, ‘If your descendants guard their behavior and faithfully follow me as you have done, one of them will always sit on the throne of Israel.’ '
  '26':
  - type: text
    content: Now, O God of Israel, fulfill this promise to your servant David, my father.
  '27':
  - type: text
    content: '“But will God really live on earth? Why, even the highest heavens cannot contain you. How much less this Temple I have built! '
  '28':
  - type: text
    content: 'Nevertheless, listen to my prayer and my plea, O '
  - type: text
    content: Lord
  - type: text
    content: ' my God. Hear the cry and the prayer that your servant is making to you today. '
  '29':
  - type: text
    content: 'May you watch over this Temple night and day, this place where you have said, ‘My name will be there.’ May you always hear the prayers I make toward this place. '
  '3':
  - type: text
    content: 'When all the elders of Israel arrived, the priests picked up the Ark. '
  '30':
  - type: text
    content: May you hear the humble and earnest requests from me and your people Israel when we pray toward this place. Yes, hear us from heaven where you live, and when you hear, forgive.
  '31':
  - type: text
    content: '“If someone wrongs another person and is required to take an oath of innocence in front of your altar in this Temple, '
  '32':
  - type: text
    content: then hear from heaven and judge between your servants—the accuser and the accused. Punish the guilty as they deserve. Acquit the innocent because of their innocence.
  '33':
  - type: text
    content: '“If your people Israel are defeated by their enemies because they have sinned against you, and if they turn to you and acknowledge your name and pray to you here in this Temple, '
  '34':
  - type: text
    content: then hear from heaven and forgive the sin of your people Israel and return them to this land you gave their ancestors.
  '35':
  - type: text
    content: '“If the skies are shut up and there is no rain because your people have sinned against you, and if they pray toward this Temple and acknowledge your name and turn from their sins because you have punished them, '
  '36':
  - type: text
    content: then hear from heaven and forgive the sins of your servants, your people Israel. Teach them to follow the right path, and send rain on your land that you have given to your people as their special possession.
  '37':
  - type: text
    content: '“If there is a famine in the land or a plague or crop disease or attacks of locusts or caterpillars, or if your people’s enemies are in the land besieging their towns—whatever disaster or disease there is— '
  '38':
  - type: text
    content: 'and if your people Israel pray about their troubles, raising their hands toward this Temple, '
  '39':
  - type: text
    content: 'then hear from heaven where you live, and forgive. Give your people what their actions deserve, for you alone know each human heart. '
  '4':
  - type: text
    content: 'The priests and Levites brought up the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' along with the special tent'
  - type: note
    content: Hebrew the Tent of Meeting; i.e., the tent mentioned in 2 Sam 6:17 and 1 Chr 16:1.
  - type: text
    content: ' and all the sacred items that had been in it. '
  '40':
  - type: text
    content: Then they will fear you as long as they live in the land you gave to our ancestors.
  '41':
  - type: text
    content: '“In the future, foreigners who do not belong to your people Israel will hear of you. They will come from distant lands because of your name, '
  '42':
  - type: text
    content: 'for they will hear of your great name and your strong hand and your powerful arm. And when they pray toward this Temple, '
  '43':
  - type: text
    content: then hear from heaven where you live, and grant what they ask of you. In this way, all the people of the earth will come to know and fear you, just as your own people Israel do. They, too, will know that this Temple I have built honors your name.
  '44':
  - type: text
    content: '“If your people go out where you send them to fight their enemies, and if they pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' by turning toward this city you have chosen and toward this Temple I have built to honor your name, '
  '45':
  - type: text
    content: then hear their prayers from heaven and uphold their cause.
  '46':
  - type: text
    content: '“If they sin against you—and who has never sinned?—you might become angry with them and let their enemies conquer them and take them captive to their land far away or near. '
  '47':
  - type: text
    content: 'But in that land of exile, they might turn to you in repentance and pray, ‘We have sinned, done evil, and acted wickedly.’ '
  '48':
  - type: text
    content: 'If they turn to you with their whole heart and soul in the land of their enemies and pray toward the land you gave to their ancestors—toward this city you have chosen, and toward this Temple I have built to honor your name— '
  '49':
  - type: text
    content: 'then hear their prayers and their petition from heaven where you live, and uphold their cause. '
  '5':
  - type: text
    content: There, before the Ark, King Solomon and the entire community of Israel sacrificed so many sheep, goats, and cattle that no one could keep count!
  '50':
  - type: text
    content: 'Forgive your people who have sinned against you. Forgive all the offenses they have committed against you. Make their captors merciful to them, '
  '51':
  - type: text
    content: for they are your people—your special possession—whom you brought out of the iron-smelting furnace of Egypt.
  '52':
  - type: text
    content: '“May your eyes be open to my requests and to the requests of your people Israel. May you hear and answer them whenever they cry out to you. '
  '53':
  - type: text
    content: 'For when you brought our ancestors out of Egypt, O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', you told your servant Moses that you had set Israel apart from all the nations of the earth to be your own special possession.”'
  - type: heading
    content: The Dedication of the Temple
  '54':
  - type: text
    content: 'When Solomon finished making these prayers and petitions to the '
  - type: text
    content: Lord
  - type: text
    content: ', he stood up in front of the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ', where he had been kneeling with his hands raised toward heaven. '
  '55':
  - type: text
    content: 'He stood and in a loud voice blessed the entire congregation of Israel:'
  '56':
  - type: text
    content: '“Praise the '
  - type: text
    content: Lord
  - type: text
    content: ' who has given rest to his people Israel, just as he promised. Not one word has failed of all the wonderful promises he gave through his servant Moses. '
  '57':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' our God be with us as he was with our ancestors; may he never leave us or abandon us. '
  '58':
  - type: text
    content: 'May he give us the desire to do his will in everything and to obey all the commands, decrees, and regulations that he gave our ancestors. '
  '59':
  - type: text
    content: 'And may these words that I have prayed in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' be before him constantly, day and night, so that the '
  - type: text
    content: Lord
  - type: text
    content: ' our God may give justice to me and to his people Israel, according to each day’s needs. '
  '6':
  - type: text
    content: 'Then the priests carried the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Covenant into the inner sanctuary of the Temple—the Most Holy Place—and placed it beneath the wings of the cherubim. '
  '60':
  - type: text
    content: 'Then people all over the earth will know that the '
  - type: text
    content: Lord
  - type: text
    content: ' alone is God and there is no other. '
  '61':
  - type: text
    content: 'And may you be completely faithful to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. May you always obey his decrees and commands, just as you are doing today.”'
  '62':
  - type: text
    content: 'Then the king and all Israel with him offered sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '63':
  - type: text
    content: 'Solomon offered to the '
  - type: text
    content: Lord
  - type: text
    content: ' a peace offering of 22,000 cattle and 120,000 sheep and goats. And so the king and all the people of Israel dedicated the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '64':
  - type: text
    content: 'That same day the king consecrated the central area of the courtyard in front of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple. He offered burnt offerings, grain offerings, and the fat of peace offerings there, because the bronze altar in the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence was too small to hold all the burnt offerings, grain offerings, and the fat of the peace offerings.
  '65':
  - type: text
    content: Then Solomon and all Israel celebrated the Festival of Shelters
  - type: note
    content: Hebrew the festival; see note on 8:2.
  - type: text
    content: ' in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. A large congregation had gathered from as far away as Lebo-hamath in the north and the Brook of Egypt in the south. The celebration went on for fourteen days in all—seven days for the dedication of the altar and seven days for the Festival of Shelters.'
  - type: note
    content: Hebrew seven days and seven days, fourteen days; compare parallel text at 2 Chr 7:8-10.
  - type: text
    content: ' '
  '66':
  - type: text
    content: After the festival was over,
  - type: note
    content: Hebrew On the eighth day, probably referring to the day following the seven-day Festival of Shelters; compare parallel text at 2 Chr 7:9-10.
  - type: text
    content: ' Solomon sent the people home. They blessed the king and went to their homes joyful and glad because the '
  - type: text
    content: Lord
  - type: text
    content: ' had been good to his servant David and to his people Israel.'
  '7':
  - type: text
    content: 'The cherubim spread their wings over the Ark, forming a canopy over the Ark and its carrying poles. '
  '8':
  - type: text
    content: 'These poles were so long that their ends could be seen from the Holy Place, which is in front of the Most Holy Place, but not from the outside. They are still there to this day. '
  '9':
  - type: text
    content: Nothing was in the Ark except the two stone tablets that Moses had placed in it at Mount Sinai,
  - type: note
    content: Hebrew at Horeb, another name for Sinai.
  - type: text
    content: ' where the '
  - type: text
    content: Lord
  - type: text
    content: ' made a covenant with the people of Israel when they left the land of Egypt.'
