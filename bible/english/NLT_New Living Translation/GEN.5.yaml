document_id: GEN.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Descendants of Adam
  - type: text
    content: This is the written account of the descendants of Adam. When God created human beings,
  - type: note
    content: Or man; Hebrew reads adam; similarly in 5:2.
  - type: text
    content: ' he made them to be like himself. '
  '10':
  - type: text
    content: 'After the birth of Kenan, Enosh lived another 815 years, and he had other sons and daughters. '
  '11':
  - type: text
    content: Enosh lived 905 years, and then he died.
  '12':
  - type: text
    content: 'When Kenan was 70 years old, he became the father of Mahalalel. '
  '13':
  - type: text
    content: 'After the birth of Mahalalel, Kenan lived another 840 years, and he had other sons and daughters. '
  '14':
  - type: text
    content: Kenan lived 910 years, and then he died.
  '15':
  - type: text
    content: 'When Mahalalel was 65 years old, he became the father of Jared. '
  '16':
  - type: text
    content: 'After the birth of Jared, Mahalalel lived another 830 years, and he had other sons and daughters. '
  '17':
  - type: text
    content: Mahalalel lived 895 years, and then he died.
  '18':
  - type: text
    content: 'When Jared was 162 years old, he became the father of Enoch. '
  '19':
  - type: text
    content: 'After the birth of Enoch, Jared lived another 800 years, and he had other sons and daughters. '
  '2':
  - type: text
    content: He created them male and female, and he blessed them and called them “human.”
  '20':
  - type: text
    content: Jared lived 962 years, and then he died.
  '21':
  - type: text
    content: 'When Enoch was 65 years old, he became the father of Methuselah. '
  '22':
  - type: text
    content: 'After the birth of Methuselah, Enoch lived in close fellowship with God for another 300 years, and he had other sons and daughters. '
  '23':
  - type: text
    content: 'Enoch lived 365 years, '
  '24':
  - type: text
    content: walking in close fellowship with God. Then one day he disappeared, because God took him.
  '25':
  - type: text
    content: 'When Methuselah was 187 years old, he became the father of Lamech. '
  '26':
  - type: text
    content: 'After the birth of Lamech, Methuselah lived another 782 years, and he had other sons and daughters. '
  '27':
  - type: text
    content: Methuselah lived 969 years, and then he died.
  '28':
  - type: text
    content: 'When Lamech was 182 years old, he became the father of a son. '
  '29':
  - type: text
    content: Lamech named his son Noah, for he said, “May he bring us relief
  - type: note
    content: Noah sounds like a Hebrew term that can mean “relief” or “comfort.”
  - type: text
    content: ' from our work and the painful labor of farming this ground that the '
  - type: text
    content: Lord
  - type: text
    content: ' has cursed.” '
  '3':
  - type: text
    content: 'When Adam was 130 years old, he became the father of a son who was just like him—in his very image. He named his son Seth. '
  '30':
  - type: text
    content: 'After the birth of Noah, Lamech lived another 595 years, and he had other sons and daughters. '
  '31':
  - type: text
    content: Lamech lived 777 years, and then he died.
  '32':
  - type: text
    content: After Noah was 500 years old, he became the father of Shem, Ham, and Japheth.
  '4':
  - type: text
    content: 'After the birth of Seth, Adam lived another 800 years, and he had other sons and daughters. '
  '5':
  - type: text
    content: Adam lived 930 years, and then he died.
  '6':
  - type: text
    content: When Seth was 105 years old, he became the father of
  - type: note
    content: Or the ancestor of; also in 5:9, 12, 15, 18, 21, 25.
  - type: text
    content: ' Enosh. '
  '7':
  - type: text
    content: After the birth of
  - type: note
    content: Or the birth of this ancestor of; also in 5:10, 13, 16, 19, 22, 26.
  - type: text
    content: ' Enosh, Seth lived another 807 years, and he had other sons and daughters. '
  '8':
  - type: text
    content: Seth lived 912 years, and then he died.
  '9':
  - type: text
    content: 'When Enosh was 90 years old, he became the father of Kenan. '
