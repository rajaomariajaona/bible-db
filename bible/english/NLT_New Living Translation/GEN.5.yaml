    marker-yv: yv-n
  - type: text
    text: ' Enosh, Seth lived another 807 years, and he had other sons and daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Seth lived 912 years, and then he died.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When Enosh was 90 years old, he became the father of Kenan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'After the birth of Kenan, Enosh lived another 815 years, and he had other sons and daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Enosh lived 905 years, and then he died.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When Kenan was 70 years old, he became the father of Mahalalel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'After the birth of Mahalalel, Kenan lived another 840 years, and he had other sons and daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Kenan lived 910 years, and then he died.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When Mahalalel was 65 years old, he became the father of Jared. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'After the birth of Jared, Mahalalel lived another 830 years, and he had other sons and daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mahalalel lived 895 years, and then he died.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When Jared was 162 years old, he became the father of Enoch. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'After the birth of Enoch, Jared lived another 800 years, and he had other sons and daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jared lived 962 years, and then he died.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'When Enoch was 65 years old, he became the father of Methuselah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'After the birth of Methuselah, Enoch lived in close fellowship with God for another 300 years, and he had other sons and daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Enoch lived 365 years, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: walking in close fellowship with God. Then one day he disappeared, because God took him.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When Methuselah was 187 years old, he became the father of Lamech. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'After the birth of Lamech, Methuselah lived another 782 years, and he had other sons and daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Methuselah lived 969 years, and then he died.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'When Lamech was 182 years old, he became the father of a son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Lamech named his son Noah, for he said, “May he bring us relief
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:29 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Noah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sounds like a Hebrew term that can mean “relief” or “comfort.”
    marker-yv: yv-n
  - type: text
    text: ' from our work and the painful labor of farming this ground that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has cursed.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'After the birth of Noah, Lamech lived another 595 years, and he had other sons and daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Lamech lived 777 years, and then he died.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: After Noah was 500 years old, he became the father of Shem, Ham, and Japheth.
