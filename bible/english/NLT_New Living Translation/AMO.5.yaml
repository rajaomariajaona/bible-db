document_id: AMO.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Repentance
  - type: text
    content: 'Listen, you people of Israel! Listen to this funeral song I am singing:'
  '10':
  - type: text
    content: How you hate honest judges!
  - type: text
    content: How you despise people who tell the truth!
  '11':
  - type: text
    content: You trample the poor,
  - type: text
    content: stealing their grain through taxes and unfair rent.
  - type: text
    content: Therefore, though you build beautiful stone houses,
  - type: text
    content: you will never live in them.
  - type: text
    content: Though you plant lush vineyards,
  - type: text
    content: you will never drink wine from them.
  '12':
  - type: text
    content: For I know the vast number of your sins
  - type: text
    content: and the depth of your rebellions.
  - type: text
    content: You oppress good people by taking bribes
  - type: text
    content: and deprive the poor of justice in the courts.
  '13':
  - type: text
    content: So those who are smart keep their mouths shut,
  - type: text
    content: for it is an evil time.
  '14':
  - type: text
    content: Do what is good and run from evil
  - type: text
    content: so that you may live!
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies will be your helper,'
  - type: text
    content: just as you have claimed.
  '15':
  - type: text
    content: Hate evil and love what is good;
  - type: text
    content: turn your courts into true halls of justice.
  - type: text
    content: 'Perhaps even yet the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies'
  - type: text
    content: will have mercy on the remnant of his people.
  - type: note
    content: Hebrew the remnant of Joseph.
  '16':
  - type: text
    content: 'Therefore, this is what the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies, says:'
  - type: text
    content: “There will be crying in all the public squares
  - type: text
    content: and mourning in every street.
  - type: text
    content: Call for the farmers to weep with you,
  - type: text
    content: and summon professional mourners to wail.
  '17':
  - type: text
    content: There will be wailing in every vineyard,
  - type: text
    content: for I will destroy them all,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Warning of Coming Judgment
  '18':
  - type: text
    content: What sorrow awaits you who say,
  - type: text
    content: '“If only the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' were here!”'
  - type: text
    content: You have no idea what you are wishing for.
  - type: text
    content: That day will bring darkness, not light.
  '19':
  - type: text
    content: In that day you will be like a man who runs from a lion—
  - type: text
    content: only to meet a bear.
  - type: text
    content: Escaping from the bear, he leans his hand against a wall in his house—
  - type: text
    content: and he’s bitten by a snake.
  '2':
  - type: text
    content: “The virgin Israel has fallen,
  - type: text
    content: never to rise again!
  - type: text
    content: She lies abandoned on the ground,
  - type: text
    content: with no one to help her up.”
  '20':
  - type: text
    content: 'Yes, the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' will be dark and hopeless,'
  - type: text
    content: without a ray of joy or hope.
  '21':
  - type: text
    content: “I hate all your show and pretense—
  - type: text
    content: the hypocrisy of your religious festivals and solemn assemblies.
  '22':
  - type: text
    content: I will not accept your burnt offerings and grain offerings.
  - type: text
    content: I won’t even notice all your choice peace offerings.
  '23':
  - type: text
    content: Away with your noisy hymns of praise!
  - type: text
    content: I will not listen to the music of your harps.
  '24':
  - type: text
    content: Instead, I want to see a mighty flood of justice,
  - type: text
    content: an endless river of righteous living.
  '25':
  - type: text
    content: '“Was it to me you were bringing sacrifices and offerings during the forty years in the wilderness, Israel? '
  '26':
  - type: text
    content: 'No, you served your pagan gods—Sakkuth your king god and Kaiwan your star god—the images you made for yourselves. '
  '27':
  - type: text
    content: So I will send you into exile, to a land east of Damascus,
  - type: note
    content: Greek version reads No, you carried your pagan gods—the shrine of Molech, the star of your god Rephan, and the images you made for yourselves. So I will send you into exile, to a land east of Damascus. Compare Acts 7:43.
  - type: text
    content: '” says the '
  - type: text
    content: Lord
  - type: text
    content: ', whose name is the God of Heaven’s Armies.'
  '3':
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “When a city sends a thousand men to battle,
  - type: text
    content: only a hundred will return.
  - type: text
    content: When a town sends a hundred,
  - type: text
    content: only ten will come back alive.”
  '4':
  - type: text
    content: 'Now this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to the family of Israel:'
  - type: text
    content: “Come back to me and live!
  '5':
  - type: text
    content: Don’t worship at the pagan altars at Bethel;
  - type: text
    content: don’t go to the shrines at Gilgal or Beersheba.
  - type: text
    content: For the people of Gilgal will be dragged off into exile,
  - type: text
    content: and the people of Bethel will be reduced to nothing.”
  '6':
  - type: text
    content: 'Come back to the '
  - type: text
    content: Lord
  - type: text
    content: ' and live!'
  - type: text
    content: Otherwise, he will roar through Israel
  - type: note
    content: Hebrew the house of Joseph.
  - type: text
    content: ' like a fire,'
  - type: text
    content: devouring you completely.
  - type: text
    content: Your gods in Bethel
  - type: text
    content: won’t be able to quench the flames.
  '7':
  - type: text
    content: You twist justice, making it a bitter pill for the oppressed.
  - type: text
    content: You treat the righteous like dirt.
  '8':
  - type: text
    content: 'It is the '
  - type: text
    content: Lord
  - type: text
    content: ' who created the stars,'
  - type: text
    content: the Pleiades and Orion.
  - type: text
    content: He turns darkness into morning
  - type: text
    content: and day into night.
  - type: text
    content: He draws up water from the oceans
  - type: text
    content: and pours it down as rain on the land.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is his name!'
  '9':
  - type: text
    content: With blinding speed and power he destroys the strong,
  - type: text
    content: crushing all their defenses.
