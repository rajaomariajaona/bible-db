document_id: AMO.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Call to Repentance
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Listen, you people of Israel! Listen to this funeral song I am singing:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How you hate honest judges!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How you despise people who tell the truth!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You trample the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stealing their grain through taxes and unfair rent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, though you build beautiful stone houses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will never live in them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though you plant lush vineyards,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will never drink wine from them.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I know the vast number of your sins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the depth of your rebellions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You oppress good people by taking bribes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and deprive the poor of justice in the courts.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So those who are smart keep their mouths shut,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for it is an evil time.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do what is good and run from evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that you may live!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Heaven’s Armies will be your helper,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as you have claimed.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hate evil and love what is good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turn your courts into true halls of justice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Perhaps even yet the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Heaven’s Armies'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will have mercy on the remnant of his people.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the remnant of Joseph.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Therefore, this is what the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Heaven’s Armies, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “There will be crying in all the public squares
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and mourning in every street.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Call for the farmers to weep with you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and summon professional mourners to wail.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There will be wailing in every vineyard,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I will destroy them all,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warning of Coming Judgment
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What sorrow awaits you who say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“If only the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' were here!”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have no idea what you are wishing for.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That day will bring darkness, not light.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In that day you will be like a man who runs from a lion—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: only to meet a bear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Escaping from the bear, he leans his hand against a wall in his house—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he’s bitten by a snake.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The virgin Israel has fallen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never to rise again!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She lies abandoned on the ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with no one to help her up.”
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be dark and hopeless,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without a ray of joy or hope.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I hate all your show and pretense—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the hypocrisy of your religious festivals and solemn assemblies.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not accept your burnt offerings and grain offerings.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I won’t even notice all your choice peace offerings.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Away with your noisy hymns of praise!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not listen to the music of your harps.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead, I want to see a mighty flood of justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an endless river of righteous living.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Was it to me you were bringing sacrifices and offerings during the forty years in the wilderness, Israel? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No, you served your pagan gods—Sakkuth your king god and Kaiwan your star god—the images you made for yourselves. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I will send you into exile, to a land east of Damascus,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:26-27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'No, you carried your pagan gods—the shrine of Molech, the star of your god Rephan, and the images you made for yourselves. So I will send you into exile, to a land east of Damascus. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Acts 7:43.
      marker-yv: yv-n
    - type: text
      text: '” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', whose name is the God of Heaven’s Armies.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When a city sends a thousand men to battle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: only a hundred will return.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When a town sends a hundred,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: only ten will come back alive.”
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to the family of Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Come back to me and live!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t worship at the pagan altars at Bethel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t go to the shrines at Gilgal or Beersheba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the people of Gilgal will be dragged off into exile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the people of Bethel will be reduced to nothing.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Come back to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and live!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Otherwise, he will roar through Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the house of Joseph.
      marker-yv: yv-n
    - type: text
      text: ' like a fire,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: devouring you completely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your gods in Bethel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: won’t be able to quench the flames.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You twist justice, making it a bitter pill for the oppressed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You treat the righteous like dirt.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who created the stars,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Pleiades and Orion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He turns darkness into morning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and day into night.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He draws up water from the oceans
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pours it down as rain on the land.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is his name!'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With blinding speed and power he destroys the strong,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: crushing all their defenses.
