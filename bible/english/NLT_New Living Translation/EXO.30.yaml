document_id: EXO.30,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Plans for the Incense Altar
  - type: text
    content: '“Then make another altar of acacia wood for burning incense. '
  '10':
  - type: text
    content: “Once a year Aaron must purify
  - type: note
    content: Or make atonement for; also in 30:10b.
  - type: text
    content: ' the altar by smearing its horns with blood from the offering made to purify the people from their sin. This will be a regular, annual event from generation to generation, for this is the '
  - type: text
    content: Lord
  - type: text
    content: ’s most holy altar.”
  - type: heading
    content: Money for the Tabernacle
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '12':
  - type: text
    content: '“Whenever you take a census of the people of Israel, each man who is counted must pay a ransom for himself to the '
  - type: text
    content: Lord
  - type: text
    content: '. Then no plague will strike the people as you count them. '
  '13':
  - type: text
    content: 'Each person who is counted must give a small piece of silver as a sacred offering to the '
  - type: text
    content: Lord
  - type: text
    content: . (This payment is half a shekel,
  - type: note
    content: Or 0.2 ounces [6 grams].
  - type: text
    content: ' based on the sanctuary shekel, which equals twenty gerahs.) '
  '14':
  - type: text
    content: 'All who have reached their twentieth birthday must give this sacred offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'When this offering is given to the '
  - type: text
    content: Lord
  - type: text
    content: ' to purify your lives, making you right with him,'
  - type: note
    content: Or to make atonement for your lives; similarly in 30:16.
  - type: text
    content: ' the rich must not give more than the specified amount, and the poor must not give less. '
  '16':
  - type: text
    content: Receive this ransom money from the Israelites, and use it for the care of the Tabernacle.
  - type: note
    content: Hebrew Tent of Meeting; also in 30:18, 20, 26, 36.
  - type: text
    content: ' It will bring the Israelites to the '
  - type: text
    content: Lord
  - type: text
    content: ’s attention, and it will purify your lives.”
  - type: heading
    content: Plans for the Washbasin
  '17':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '18':
  - type: text
    content: '“Make a bronze washbasin with a bronze stand. Place it between the Tabernacle and the altar, and fill it with water. '
  '19':
  - type: text
    content: 'Aaron and his sons will wash their hands and feet there. '
  '2':
  - type: text
    content: Make it 18 inches square and 36 inches high,
  - type: note
    content: Hebrew 1 cubit [46 centimeters] long and 1 cubit wide, a square, and 2 cubits [92 centimeters] high.
  - type: text
    content: ' with horns at the corners carved from the same piece of wood as the altar itself. '
  '20':
  - type: text
    content: 'They must wash with water whenever they go into the Tabernacle to appear before the '
  - type: text
    content: Lord
  - type: text
    content: ' and when they approach the altar to burn up their special gifts to the '
  - type: text
    content: Lord
  - type: text
    content: '—or they will die! '
  '21':
  - type: text
    content: They must always wash their hands and feet, or they will die. This is a permanent law for Aaron and his descendants, to be observed from generation to generation.”
  - type: heading
    content: The Anointing Oil
  '22':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '23':
  - type: text
    content: “Collect choice spices—12-1/2 pounds of pure myrrh, 6-1/4 pounds of fragrant cinnamon, 6-1/4 pounds of fragrant calamus,
  - type: note
    content: Hebrew 500 [shekels] [5.7 kilograms] of pure myrrh, 250 [shekels] [2.9 kilograms] of fragrant cinnamon, 250 [shekels] of fragrant calamus.
  - type: text
    content: ' '
  '24':
  - type: text
    content: and 12-1/2 pounds of cassia
  - type: note
    content: Hebrew 500 [shekels] [5.7 kilograms] of cassia.
  - type: text
    content: —as measured by the weight of the sanctuary shekel. Also get one gallon of olive oil.
  - type: note
    content: Hebrew 1 hin [3.8 liters] of olive oil.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Like a skilled incense maker, blend these ingredients to make a holy anointing oil. '
  '26':
  - type: text
    content: 'Use this sacred oil to anoint the Tabernacle, the Ark of the Covenant, '
  '27':
  - type: text
    content: 'the table and all its utensils, the lampstand and all its accessories, the incense altar, '
  '28':
  - type: text
    content: 'the altar of burnt offering and all its utensils, and the washbasin with its stand. '
  '29':
  - type: text
    content: Consecrate them to make them absolutely holy. After this, whatever touches them will also become holy.
  '3':
  - type: text
    content: 'Overlay the top, sides, and horns of the altar with pure gold, and run a gold molding around the entire altar. '
  '30':
  - type: text
    content: '“Anoint Aaron and his sons also, consecrating them to serve me as priests. '
  '31':
  - type: text
    content: 'And say to the people of Israel, ‘This holy anointing oil is reserved for me from generation to generation. '
  '32':
  - type: text
    content: 'It must never be used to anoint anyone else, and you must never make any blend like it for yourselves. It is holy, and you must treat it as holy. '
  '33':
  - type: text
    content: Anyone who makes a blend like it or anoints someone other than a priest will be cut off from the community.’”
  - type: heading
    content: The Incense
  '34':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Gather fragrant spices—resin droplets, mollusk shell, and galbanum—and mix these fragrant spices with pure frankincense, weighed out in equal amounts. '
  '35':
  - type: text
    content: 'Using the usual techniques of the incense maker, blend the spices together and sprinkle them with salt to produce a pure and holy incense. '
  '36':
  - type: text
    content: Grind some of the mixture into a very fine powder and put it in front of the Ark of the Covenant,
  - type: note
    content: Hebrew in front of the Testimony; see note on 25:16.
  - type: text
    content: ' where I will meet with you in the Tabernacle. You must treat this incense as most holy. '
  '37':
  - type: text
    content: 'Never use this formula to make this incense for yourselves. It is reserved for the '
  - type: text
    content: Lord
  - type: text
    content: ', and you must treat it as holy. '
  '38':
  - type: text
    content: Anyone who makes incense like this for personal use will be cut off from the community.”
  '4':
  - type: text
    content: 'Make two gold rings, and attach them on opposite sides of the altar below the gold molding to hold the carrying poles. '
  '5':
  - type: text
    content: 'Make the poles of acacia wood and overlay them with gold. '
  '6':
  - type: text
    content: Place the incense altar just outside the inner curtain that shields the Ark of the Covenant,
  - type: note
    content: Or Ark of the Testimony; also in 30:26.
  - type: text
    content: ' in front of the Ark’s cover—the place of atonement—that covers the tablets inscribed with the terms of the covenant.'
  - type: note
    content: Hebrew that covers the Testimony; see note on 25:16.
  - type: text
    content: ' I will meet with you there.'
  '7':
  - type: text
    content: '“Every morning when Aaron maintains the lamps, he must burn fragrant incense on the altar. '
  '8':
  - type: text
    content: 'And each evening when he lights the lamps, he must again burn incense in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence. This must be done from generation to generation. '
  '9':
  - type: text
    content: Do not offer any unholy incense on this altar, or any burnt offerings, grain offerings, or liquid offerings.
