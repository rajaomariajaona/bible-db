document_id: EXO.30,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plans for the Incense Altar
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Then make another altar of acacia wood for burning incense. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Once a year Aaron must purify
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'make atonement for; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 30:10b.
      marker-yv: yv-n
    - type: text
      text: ' the altar by smearing its horns with blood from the offering made to purify the people from their sin. This will be a regular, annual event from generation to generation, for this is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s most holy altar.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Money for the Tabernacle
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Whenever you take a census of the people of Israel, each man who is counted must pay a ransom for himself to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Then no plague will strike the people as you count them. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Each person who is counted must give a small piece of silver as a sacred offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . (This payment is half a shekel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '0.2 ounces '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[6 grams].'
      marker-yv: yv-n
    - type: text
      text: ' based on the sanctuary shekel, which equals twenty gerahs.) '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'All who have reached their twentieth birthday must give this sacred offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When this offering is given to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to purify your lives, making you right with him,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'to make atonement for your lives; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly in 30:16.
      marker-yv: yv-n
    - type: text
      text: ' the rich must not give more than the specified amount, and the poor must not give less. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Receive this ransom money from the Israelites, and use it for the care of the Tabernacle.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tent of Meeting; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 30:18, 20, 26, 36.
      marker-yv: yv-n
    - type: text
      text: ' It will bring the Israelites to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s attention, and it will purify your lives.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plans for the Washbasin
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Make a bronze washbasin with a bronze stand. Place it between the Tabernacle and the altar, and fill it with water. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Aaron and his sons will wash their hands and feet there. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Make it 18 inches square and 36 inches high,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[46 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long and 1 cubit wide, a square, and 2 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[92 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: high.
      marker-yv: yv-n
    - type: text
      text: ' with horns at the corners carved from the same piece of wood as the altar itself. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They must wash with water whenever they go into the Tabernacle to appear before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and when they approach the altar to burn up their special gifts to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '—or they will die! '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: They must always wash their hands and feet, or they will die. This is a permanent law for Aaron and his descendants, to be observed from generation to generation.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Anointing Oil
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “Collect choice spices—12-1/2 pounds of pure myrrh, 6-1/4 pounds of fragrant cinnamon, 6-1/4 pounds of fragrant calamus,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '500 [shekels] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[5.7 kilograms] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of pure myrrh, 250 [shekels] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.9 kilograms] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of fragrant cinnamon, 250 [shekels] of fragrant calamus.
      marker-yv: yv-n
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: and 12-1/2 pounds of cassia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:24a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '500 [shekels] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[5.7 kilograms] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of cassia.
      marker-yv: yv-n
    - type: text
      text: —as measured by the weight of the sanctuary shekel. Also get one gallon of olive oil.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:24b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 hin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[3.8 liters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of olive oil.
      marker-yv: yv-n
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Like a skilled incense maker, blend these ingredients to make a holy anointing oil. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Use this sacred oil to anoint the Tabernacle, the Ark of the Covenant, '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'the table and all its utensils, the lampstand and all its accessories, the incense altar, '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'the altar of burnt offering and all its utensils, and the washbasin with its stand. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Consecrate them to make them absolutely holy. After this, whatever touches them will also become holy.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Overlay the top, sides, and horns of the altar with pure gold, and run a gold molding around the entire altar. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Anoint Aaron and his sons also, consecrating them to serve me as priests. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And say to the people of Israel, ‘This holy anointing oil is reserved for me from generation to generation. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It must never be used to anoint anyone else, and you must never make any blend like it for yourselves. It is holy, and you must treat it as holy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anyone who makes a blend like it or anoints someone other than a priest will be cut off from the community.’”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Incense
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Gather fragrant spices—resin droplets, mollusk shell, and galbanum—and mix these fragrant spices with pure frankincense, weighed out in equal amounts. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Using the usual techniques of the incense maker, blend the spices together and sprinkle them with salt to produce a pure and holy incense. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Grind some of the mixture into a very fine powder and put it in front of the Ark of the Covenant,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in front of the Testimony; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see note on 25:16.
      marker-yv: yv-n
    - type: text
      text: ' where I will meet with you in the Tabernacle. You must treat this incense as most holy. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Never use this formula to make this incense for yourselves. It is reserved for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and you must treat it as holy. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Anyone who makes incense like this for personal use will be cut off from the community.”
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Make two gold rings, and attach them on opposite sides of the altar below the gold molding to hold the carrying poles. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Make the poles of acacia wood and overlay them with gold. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Place the incense altar just outside the inner curtain that shields the Ark of the Covenant,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:6a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ark of the Testimony; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 30:26.
      marker-yv: yv-n
    - type: text
      text: ' in front of the Ark’s cover—the place of atonement—that covers the tablets inscribed with the terms of the covenant.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:6b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'that covers the Testimony; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see note on 25:16.
      marker-yv: yv-n
    - type: text
      text: ' I will meet with you there.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Every morning when Aaron maintains the lamps, he must burn fragrant incense on the altar. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And each evening when he lights the lamps, he must again burn incense in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s presence. This must be done from generation to generation. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Do not offer any unholy incense on this altar, or any burnt offerings, grain offerings, or liquid offerings.
