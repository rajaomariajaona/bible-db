document_id: PSA.40,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I waited patiently for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to help me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he turned to me and heard my cry.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have not kept the good news of your justice hidden in my heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have talked about your faithfulness and saving power.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have told everyone in the great assembly
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of your unfailing love and faithfulness.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', don’t hold back your tender mercies from me.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let your unfailing love and faithfulness always protect me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For troubles surround me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: too many to count!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My sins pile up so high
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I can’t see my way out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They outnumber the hairs on my head.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have lost all courage.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Please, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', rescue me!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Come quickly, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and help me.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May those who try to destroy me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be humiliated and put to shame.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May those who take delight in my trouble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be turned back in disgrace.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them be horrified by their shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they said, “Aha! We’ve got him now!”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But may all who search for you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be filled with joy and gladness in you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May those who love your salvation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'repeatedly shout, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is great!”'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As for me, since I am poor and needy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the Lord keep me in his thoughts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are my helper and my savior.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O my God, do not delay.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He lifted me out of the pit of despair,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: out of the mud and the mire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He set my feet on solid ground
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and steadied me as I walked along.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has given me a new song to sing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a hymn of praise to our God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many will see what he has done and be amazed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They will put their trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oh, the joys of those who trust the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who have no confidence in the proud
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or in those who worship idols.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, you have performed many wonders for us.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your plans for us are too numerous to list.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have no equal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I tried to recite all your wonderful deeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would never come to the end of them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You take no delight in sacrifices or offerings.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Now that you have made me listen, I finally understand
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'You have given me a body. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Heb 10:5.
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you don’t require burnt offerings or sin offerings.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I said, “Look, I have come.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As is written about me in the Scriptures:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I take joy in doing your will, my God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your instructions are written on my heart.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have told all your people about your justice.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have not been afraid to speak out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'as you, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', well know.'
