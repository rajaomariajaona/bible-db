document_id: PSA.40,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David.'
  - type: text
    content: 'I waited patiently for the '
  - type: text
    content: Lord
  - type: text
    content: ' to help me,'
  - type: text
    content: and he turned to me and heard my cry.
  '10':
  - type: text
    content: I have not kept the good news of your justice hidden in my heart;
  - type: text
    content: I have talked about your faithfulness and saving power.
  - type: text
    content: I have told everyone in the great assembly
  - type: text
    content: of your unfailing love and faithfulness.
  '11':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', don’t hold back your tender mercies from me.'
  - type: text
    content: Let your unfailing love and faithfulness always protect me.
  '12':
  - type: text
    content: For troubles surround me—
  - type: text
    content: too many to count!
  - type: text
    content: My sins pile up so high
  - type: text
    content: I can’t see my way out.
  - type: text
    content: They outnumber the hairs on my head.
  - type: text
    content: I have lost all courage.
  '13':
  - type: text
    content: 'Please, '
  - type: text
    content: Lord
  - type: text
    content: ', rescue me!'
  - type: text
    content: 'Come quickly, '
  - type: text
    content: Lord
  - type: text
    content: ', and help me.'
  '14':
  - type: text
    content: May those who try to destroy me
  - type: text
    content: be humiliated and put to shame.
  - type: text
    content: May those who take delight in my trouble
  - type: text
    content: be turned back in disgrace.
  '15':
  - type: text
    content: Let them be horrified by their shame,
  - type: text
    content: for they said, “Aha! We’ve got him now!”
  '16':
  - type: text
    content: But may all who search for you
  - type: text
    content: be filled with joy and gladness in you.
  - type: text
    content: May those who love your salvation
  - type: text
    content: 'repeatedly shout, “The '
  - type: text
    content: Lord
  - type: text
    content: ' is great!”'
  '17':
  - type: text
    content: As for me, since I am poor and needy,
  - type: text
    content: let the Lord keep me in his thoughts.
  - type: text
    content: You are my helper and my savior.
  - type: text
    content: O my God, do not delay.
  '2':
  - type: text
    content: He lifted me out of the pit of despair,
  - type: text
    content: out of the mud and the mire.
  - type: text
    content: He set my feet on solid ground
  - type: text
    content: and steadied me as I walked along.
  '3':
  - type: text
    content: He has given me a new song to sing,
  - type: text
    content: a hymn of praise to our God.
  - type: text
    content: Many will see what he has done and be amazed.
  - type: text
    content: 'They will put their trust in the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: 'Oh, the joys of those who trust the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who have no confidence in the proud
  - type: text
    content: or in those who worship idols.
  '5':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, you have performed many wonders for us.'
  - type: text
    content: Your plans for us are too numerous to list.
  - type: text
    content: You have no equal.
  - type: text
    content: If I tried to recite all your wonderful deeds,
  - type: text
    content: I would never come to the end of them.
  '6':
  - type: text
    content: You take no delight in sacrifices or offerings.
  - type: text
    content: Now that you have made me listen, I finally understand
  - type: note
    content: Greek version reads You have given me a body. Compare Heb 10:5.
  - type: text
    content: —
  - type: text
    content: you don’t require burnt offerings or sin offerings.
  '7':
  - type: text
    content: Then I said, “Look, I have come.
  - type: text
    content: 'As is written about me in the Scriptures:'
  '8':
  - type: text
    content: I take joy in doing your will, my God,
  - type: text
    content: for your instructions are written on my heart.”
  '9':
  - type: text
    content: I have told all your people about your justice.
  - type: text
    content: I have not been afraid to speak out,
  - type: text
    content: 'as you, O '
  - type: text
    content: Lord
  - type: text
    content: ', well know.'
