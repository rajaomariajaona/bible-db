document_id: PSA.118,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for he is good!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His faithful love endures forever.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though hostile nations surrounded me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I destroyed them all with the authority of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, they surrounded and attacked me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but I destroyed them all with the authority of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They swarmed around me like bees;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they blazed against me like a crackling fire.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But I destroyed them all with the authority of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My enemies did their best to kill me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rescued me.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my strength and my song;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has given me victory.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Songs of joy and victory are sung in the camp of the godly.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The strong right arm of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done glorious things!'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The strong right arm of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is raised in triumph.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The strong right arm of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done glorious things!'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not die; instead, I will live
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to tell what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has punished me severely,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he did not let me die.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Open for me the gates where the righteous enter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and I will go in and thank the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let all Israel repeat:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “His faithful love endures forever.”
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'These gates lead to the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the godly enter there.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I thank you for answering my prayer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and giving me victory!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The stone that the builders rejected
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has now become the cornerstone.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s doing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and it is wonderful to see.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is the day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has made.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We will rejoice and be glad in it.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Please, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', please save us.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Please, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', please give us success.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bless the one who comes in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'We bless you from the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is God, shining upon us.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Take the sacrifice and bind it with cords on the altar.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are my God, and I will praise you!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are my God, and I will exalt you!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for he is good!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His faithful love endures forever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let Aaron’s descendants, the priests, repeat:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “His faithful love endures forever.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let all who fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' repeat:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “His faithful love endures forever.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In my distress I prayed to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered me and set me free.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is for me, so I will have no fear.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What can mere people do to me?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is for me; he will help me.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will look in triumph at those who hate me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It is better to take refuge in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than to trust in people.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It is better to take refuge in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than to trust in princes.
