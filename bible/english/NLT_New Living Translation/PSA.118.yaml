document_id: PSA.118,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he is good!'
  - type: text
    content: His faithful love endures forever.
  '10':
  - type: text
    content: Though hostile nations surrounded me,
  - type: text
    content: 'I destroyed them all with the authority of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: Yes, they surrounded and attacked me,
  - type: text
    content: 'but I destroyed them all with the authority of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: They swarmed around me like bees;
  - type: text
    content: they blazed against me like a crackling fire.
  - type: text
    content: 'But I destroyed them all with the authority of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: My enemies did their best to kill me,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' rescued me.'
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is my strength and my song;'
  - type: text
    content: he has given me victory.
  '15':
  - type: text
    content: Songs of joy and victory are sung in the camp of the godly.
  - type: text
    content: 'The strong right arm of the '
  - type: text
    content: Lord
  - type: text
    content: ' has done glorious things!'
  '16':
  - type: text
    content: 'The strong right arm of the '
  - type: text
    content: Lord
  - type: text
    content: ' is raised in triumph.'
  - type: text
    content: 'The strong right arm of the '
  - type: text
    content: Lord
  - type: text
    content: ' has done glorious things!'
  '17':
  - type: text
    content: I will not die; instead, I will live
  - type: text
    content: 'to tell what the '
  - type: text
    content: Lord
  - type: text
    content: ' has done.'
  '18':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has punished me severely,'
  - type: text
    content: but he did not let me die.
  '19':
  - type: text
    content: Open for me the gates where the righteous enter,
  - type: text
    content: 'and I will go in and thank the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: 'Let all Israel repeat:'
  - type: text
    content: “His faithful love endures forever.”
  '20':
  - type: text
    content: 'These gates lead to the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and the godly enter there.
  '21':
  - type: text
    content: I thank you for answering my prayer
  - type: text
    content: and giving me victory!
  '22':
  - type: text
    content: The stone that the builders rejected
  - type: text
    content: has now become the cornerstone.
  '23':
  - type: text
    content: 'This is the '
  - type: text
    content: Lord
  - type: text
    content: ’s doing,
  - type: text
    content: and it is wonderful to see.
  '24':
  - type: text
    content: 'This is the day the '
  - type: text
    content: Lord
  - type: text
    content: ' has made.'
  - type: text
    content: We will rejoice and be glad in it.
  '25':
  - type: text
    content: 'Please, '
  - type: text
    content: Lord
  - type: text
    content: ', please save us.'
  - type: text
    content: 'Please, '
  - type: text
    content: Lord
  - type: text
    content: ', please give us success.'
  '26':
  - type: text
    content: 'Bless the one who comes in the name of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: 'We bless you from the house of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '27':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is God, shining upon us.'
  - type: text
    content: Take the sacrifice and bind it with cords on the altar.
  '28':
  - type: text
    content: You are my God, and I will praise you!
  - type: text
    content: You are my God, and I will exalt you!
  '29':
  - type: text
    content: 'Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he is good!'
  - type: text
    content: His faithful love endures forever.
  '3':
  - type: text
    content: 'Let Aaron’s descendants, the priests, repeat:'
  - type: text
    content: “His faithful love endures forever.”
  '4':
  - type: text
    content: 'Let all who fear the '
  - type: text
    content: Lord
  - type: text
    content: ' repeat:'
  - type: text
    content: “His faithful love endures forever.”
  '5':
  - type: text
    content: 'In my distress I prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' answered me and set me free.'
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is for me, so I will have no fear.'
  - type: text
    content: What can mere people do to me?
  '7':
  - type: text
    content: 'Yes, the '
  - type: text
    content: Lord
  - type: text
    content: ' is for me; he will help me.'
  - type: text
    content: I will look in triumph at those who hate me.
  '8':
  - type: text
    content: 'It is better to take refuge in the '
  - type: text
    content: Lord
  - type: text
    content: than to trust in people.
  '9':
  - type: text
    content: 'It is better to take refuge in the '
  - type: text
    content: Lord
  - type: text
    content: than to trust in princes.
