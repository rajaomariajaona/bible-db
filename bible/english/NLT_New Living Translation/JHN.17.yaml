document_id: JHN.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Prayer of Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After saying all these things, Jesus looked up to heaven and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Father, the hour has come. Glorify your Son so he can give glory back to you.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For you have given him authority over everyone. He gives eternal life to each one you have given him.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And this is the way to have eternal life—to know you, the only true God, and Jesus Christ, the one you sent to earth.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I brought glory to you here on earth by completing the work you gave me to do.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now, Father, bring me into the glory we shared before the world began.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I have revealed you
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'have revealed your name; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 17:26.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to the ones you gave me from this world. They were always yours. You gave them to me, and they have kept your word.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now they know that everything I have is a gift from you,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for I have passed on to them the message you gave me. They accepted it and know that I came from you, and they believe you sent me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My prayer is not for the world, but for those you have given me, because they belong to you.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: All who are mine belong to you, and you have given them to me, so they bring me glory.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now I am departing from the world; they are staying in this world, but I am coming to you. Holy Father, you have given me your name;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: you have given me these [disciples].
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: now protect them by the power of your name so that they will be united just as we are.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: During my time here, I protected them by the power of the name you gave me.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: I protected those you gave me, by the power of your name.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I guarded them so that not one was lost, except the one headed for destruction, as the Scriptures foretold.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Now I am coming to you. I told them many things while I was with them in this world so they would be filled with my joy.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I have given them your word. And the world hates them because they do not belong to the world, just as I do not belong to the world.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I’m not asking you to take them out of the world, but to keep them safe from the evil one.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They do not belong to this world any more than I do.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Make them holy by your truth; teach them your word, which is truth.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Just as you sent me into the world, I am sending them into the world.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And I give myself as a holy sacrifice for them so they can be made holy by your truth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I am praying not only for these disciples but also for all who will ever believe in me through their message.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I pray that they will all be one, just as you and I are one—as you are in me, Father, and I am in you. And may they be in us so that the world will believe you sent me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I have given them the glory you gave me, so they may be one as we are one.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am in them and you are in me. May they experience such perfect unity that the world will know that you sent me and that you love them as much as you love me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Father, I want these whom you have given me to be with me where I am. Then they can see all the glory you gave me because you loved me even before the world began!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “O righteous Father, the world doesn’t know you, but I do; and these disciples know you sent me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I have revealed you to them, and I will continue to do so. Then your love for me will be in them, and I will be in them.”
