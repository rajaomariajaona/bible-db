document_id: JHN.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Prayer of Jesus
  - type: text
    content: 'After saying all these things, Jesus looked up to heaven and said, '
  - type: text
    content: “Father, the hour has come. Glorify your Son so he can give glory back to you.
  - type: text
    content: ' '
  '10':
  - type: text
    content: All who are mine belong to you, and you have given them to me, so they bring me glory.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Now I am departing from the world; they are staying in this world, but I am coming to you. Holy Father, you have given me your name;
  - type: note
    content: Some manuscripts read you have given me these [disciples].
  - type: text
    content: ' '
  - type: text
    content: now protect them by the power of your name so that they will be united just as we are.
  - type: text
    content: ' '
  '12':
  - type: text
    content: During my time here, I protected them by the power of the name you gave me.
  - type: note
    content: Some manuscripts read I protected those you gave me, by the power of your name.
  - type: text
    content: ' '
  - type: text
    content: I guarded them so that not one was lost, except the one headed for destruction, as the Scriptures foretold.
  '13':
  - type: text
    content: ' '
  - type: text
    content: “Now I am coming to you. I told them many things while I was with them in this world so they would be filled with my joy.
  - type: text
    content: ' '
  '14':
  - type: text
    content: I have given them your word. And the world hates them because they do not belong to the world, just as I do not belong to the world.
  - type: text
    content: ' '
  '15':
  - type: text
    content: I’m not asking you to take them out of the world, but to keep them safe from the evil one.
  - type: text
    content: ' '
  '16':
  - type: text
    content: They do not belong to this world any more than I do.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Make them holy by your truth; teach them your word, which is truth.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Just as you sent me into the world, I am sending them into the world.
  - type: text
    content: ' '
  '19':
  - type: text
    content: And I give myself as a holy sacrifice for them so they can be made holy by your truth.
  '2':
  - type: text
    content: For you have given him authority over everyone. He gives eternal life to each one you have given him.
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: text
    content: “I am praying not only for these disciples but also for all who will ever believe in me through their message.
  - type: text
    content: ' '
  '21':
  - type: text
    content: I pray that they will all be one, just as you and I are one—as you are in me, Father, and I am in you. And may they be in us so that the world will believe you sent me.
  '22':
  - type: text
    content: ' '
  - type: text
    content: “I have given them the glory you gave me, so they may be one as we are one.
  - type: text
    content: ' '
  '23':
  - type: text
    content: I am in them and you are in me. May they experience such perfect unity that the world will know that you sent me and that you love them as much as you love me.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Father, I want these whom you have given me to be with me where I am. Then they can see all the glory you gave me because you loved me even before the world began!
  '25':
  - type: text
    content: ' '
  - type: text
    content: “O righteous Father, the world doesn’t know you, but I do; and these disciples know you sent me.
  - type: text
    content: ' '
  '26':
  - type: text
    content: I have revealed you to them, and I will continue to do so. Then your love for me will be in them, and I will be in them.”
  '3':
  - type: text
    content: And this is the way to have eternal life—to know you, the only true God, and Jesus Christ, the one you sent to earth.
  - type: text
    content: ' '
  '4':
  - type: text
    content: I brought glory to you here on earth by completing the work you gave me to do.
  - type: text
    content: ' '
  '5':
  - type: text
    content: Now, Father, bring me into the glory we shared before the world began.
  '6':
  - type: text
    content: ' '
  - type: text
    content: “I have revealed you
  - type: text
    content: ' '
  - type: note
    content: Greek have revealed your name; also in 17:26.
  - type: text
    content: to the ones you gave me from this world. They were always yours. You gave them to me, and they have kept your word.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Now they know that everything I have is a gift from you,
  - type: text
    content: ' '
  '8':
  - type: text
    content: for I have passed on to them the message you gave me. They accepted it and know that I came from you, and they believe you sent me.
  '9':
  - type: text
    content: ' '
  - type: text
    content: “My prayer is not for the world, but for those you have given me, because they belong to you.
  - type: text
    content: ' '
