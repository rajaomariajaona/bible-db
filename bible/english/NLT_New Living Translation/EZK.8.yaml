document_id: EZK.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Idolatry in the Temple
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then on September 17,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on the fifth [day] of the sixth month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. This event occurred on September 17, 592 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 1:1.
    marker-yv: yv-n
  - type: text
    text: ' during the sixth year of King Jehoiachin’s captivity, while the leaders of Judah were in my home, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' took hold of me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I saw a figure that appeared to be a man.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:2a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: appeared to be fire.
    marker-yv: yv-n
  - type: text
    text: ' From what appeared to be his waist down, he looked like a burning flame. From the waist up he looked like gleaming amber.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:2b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: like burnished metal.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He reached out what seemed to be a hand and took me by the hair. Then the Spirit lifted me up into the sky and transported me to Jerusalem in a vision from God. I was taken to the north gate of the inner courtyard of the Temple, where there is a large idol that has made the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' very jealous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Suddenly, the glory of the God of Israel was there, just as I had seen it before in the valley.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, “Son of man, look toward the north.” So I looked, and there to the north, beside the entrance to the gate near the altar, stood the idol that had made the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' so jealous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Son of man,” he said, “do you see what they are doing? Do you see the detestable sins the people of Israel are committing to drive me from my Temple? But come, and you will see even more detestable sins than these!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he brought me to the door of the Temple courtyard, where I could see a hole in the wall. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He said to me, “Now, son of man, dig into the wall.” So I dug into the wall and found a hidden doorway.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Go in,” he said, “and see the wicked and detestable sins they are committing in there!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So I went in and saw the walls covered with engravings of all kinds of crawling animals and detestable creatures. I also saw the various idols
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term (literally '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: round things
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) probably alludes to dung.
    marker-yv: yv-n
  - type: text
    text: ' worshiped by the people of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Seventy leaders of Israel were standing there with Jaazaniah son of Shaphan in the center. Each of them held an incense burner, from which a cloud of incense rose above their heads.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, “Son of man, have you seen what the leaders of Israel are doing with their idols in dark rooms? They are saying, ‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'Lord '
  - type: text
    text: 'doesn’t see us; he has deserted our land!’” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' added, “Come, and I will show you even more detestable sins than these!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He brought me to the north gate of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple, and some women were sitting there, weeping for the god Tammuz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Have you seen this?” he asked. “But I will show you even more detestable sins than these!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then he brought me into the inner courtyard of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple. At the entrance to the sanctuary, between the entry room and the bronze altar, there were about twenty-five men with their backs to the sanctuary of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . They were facing east, bowing low to the ground, worshiping the sun!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Have you seen this, son of man?” he asked. “Is it nothing to the people of Judah that they commit these detestable sins, leading the whole nation into violence, thumbing their noses at me, and provoking my anger? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Therefore, I will respond in fury. I will neither pity nor spare them. And though they cry for mercy, I will not listen.”
