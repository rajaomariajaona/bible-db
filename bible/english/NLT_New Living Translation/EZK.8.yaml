document_id: EZK.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Idolatry in the Temple
  - type: text
    content: Then on September 17,
  - type: note
    content: Hebrew on the fifth [day] of the sixth month, of the ancient Hebrew lunar calendar. This event occurred on September 17, 592 b.c.; also see note on 1:1.
  - type: text
    content: ' during the sixth year of King Jehoiachin’s captivity, while the leaders of Judah were in my home, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' took hold of me. '
  '10':
  - type: text
    content: So I went in and saw the walls covered with engravings of all kinds of crawling animals and detestable creatures. I also saw the various idols
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung.
  - type: text
    content: ' worshiped by the people of Israel. '
  '11':
  - type: text
    content: Seventy leaders of Israel were standing there with Jaazaniah son of Shaphan in the center. Each of them held an incense burner, from which a cloud of incense rose above their heads.
  '12':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Son of man, have you seen what the leaders of Israel are doing with their idols in dark rooms? They are saying, ‘The '
  - type: text
    content: 'Lord '
  - type: text
    content: 'doesn’t see us; he has deserted our land!’” '
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' added, “Come, and I will show you even more detestable sins than these!”'
  '14':
  - type: text
    content: 'He brought me to the north gate of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple, and some women were sitting there, weeping for the god Tammuz. '
  '15':
  - type: text
    content: “Have you seen this?” he asked. “But I will show you even more detestable sins than these!”
  '16':
  - type: text
    content: 'Then he brought me into the inner courtyard of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple. At the entrance to the sanctuary, between the entry room and the bronze altar, there were about twenty-five men with their backs to the sanctuary of the '
  - type: text
    content: Lord
  - type: text
    content: . They were facing east, bowing low to the ground, worshiping the sun!
  '17':
  - type: text
    content: '“Have you seen this, son of man?” he asked. “Is it nothing to the people of Judah that they commit these detestable sins, leading the whole nation into violence, thumbing their noses at me, and provoking my anger? '
  '18':
  - type: text
    content: Therefore, I will respond in fury. I will neither pity nor spare them. And though they cry for mercy, I will not listen.”
  '2':
  - type: text
    content: I saw a figure that appeared to be a man.
  - type: note
    content: As in Greek version; Hebrew reads appeared to be fire.
  - type: text
    content: ' From what appeared to be his waist down, he looked like a burning flame. From the waist up he looked like gleaming amber.'
  - type: note
    content: Or like burnished metal.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'He reached out what seemed to be a hand and took me by the hair. Then the Spirit lifted me up into the sky and transported me to Jerusalem in a vision from God. I was taken to the north gate of the inner courtyard of the Temple, where there is a large idol that has made the '
  - type: text
    content: Lord
  - type: text
    content: ' very jealous. '
  '4':
  - type: text
    content: Suddenly, the glory of the God of Israel was there, just as I had seen it before in the valley.
  '5':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Son of man, look toward the north.” So I looked, and there to the north, beside the entrance to the gate near the altar, stood the idol that had made the '
  - type: text
    content: Lord
  - type: text
    content: ' so jealous.'
  '6':
  - type: text
    content: '“Son of man,” he said, “do you see what they are doing? Do you see the detestable sins the people of Israel are committing to drive me from my Temple? But come, and you will see even more detestable sins than these!” '
  '7':
  - type: text
    content: 'Then he brought me to the door of the Temple courtyard, where I could see a hole in the wall. '
  '8':
  - type: text
    content: He said to me, “Now, son of man, dig into the wall.” So I dug into the wall and found a hidden doorway.
  '9':
  - type: text
    content: '“Go in,” he said, “and see the wicked and detestable sins they are committing in there!” '
