document_id: PSA.35,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', oppose those who oppose me.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fight those who fight against me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'With every bone in my body I will praise him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who can compare with you?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who else rescues the helpless from the strong?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who else protects the helpless and poor from those who rob them?”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Malicious witnesses testify against me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They accuse me of crimes I know nothing about.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They repay me evil for good.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am sick with despair.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Yet when they were ill, I grieved for them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I denied myself by fasting for them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but my prayers returned unanswered.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I was sad, as though they were my friends or family,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as if I were grieving for my own mother.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: But they are glad now that I am in trouble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they gleefully join together against me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am attacked by people I don’t even know;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they slander me constantly.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They mock me and call me names;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they snarl at me.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: How long, O Lord, will you look on and do nothing?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rescue me from their fierce attacks.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Protect my life from these lions!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Then I will thank you in front of the great assembly.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will praise you before all the people.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Don’t let my treacherous enemies rejoice over my defeat.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t let those who hate me without cause gloat over my sorrow.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Put on your armor, and take up your shield.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Prepare for battle, and come to my aid.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: They don’t talk of peace;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they plot against innocent people who mind their own business.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: They shout, “Aha! Aha!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With our own eyes we saw him do it!”
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you know all about this.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not stay silent.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not abandon me now, O Lord.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Wake up! Rise to my defense!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Take up my case, my God and my Lord.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Declare me not guilty, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, for you give justice.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t let my enemies laugh about me in my troubles.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Don’t let them say, “Look, we got what we wanted!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Now we will eat him alive!”
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: May those who rejoice at my troubles
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be humiliated and disgraced.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May those who triumph over me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be covered with shame and dishonor.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: But give great joy to those who came to my defense.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let them continually say, “Great is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who delights in blessing his servant with peace!”
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Then I will proclaim your justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will praise you all day long.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Lift up your spear and javelin
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against those who pursue me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me hear you say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I will give you victory!”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Bring shame and disgrace on those trying to kill me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turn them back and humiliate those who want to harm me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Blow them away like chaff in the wind—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'a wind sent by the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Make their path dark and slippery,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'with the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' pursuing them.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I did them no wrong, but they laid a trap for me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I did them no wrong, but they dug a pit to catch me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So let sudden ruin come upon them!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them be caught in the trap they set for me!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them be destroyed in the pit they dug for me.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then I will rejoice in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will be glad because he rescues me.
