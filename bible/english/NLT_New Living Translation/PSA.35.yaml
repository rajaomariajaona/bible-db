document_id: PSA.35,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', oppose those who oppose me.'
  - type: text
    content: Fight those who fight against me.
  '10':
  - type: text
    content: 'With every bone in my body I will praise him:'
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', who can compare with you?'
  - type: text
    content: Who else rescues the helpless from the strong?
  - type: text
    content: Who else protects the helpless and poor from those who rob them?”
  '11':
  - type: text
    content: Malicious witnesses testify against me.
  - type: text
    content: They accuse me of crimes I know nothing about.
  '12':
  - type: text
    content: They repay me evil for good.
  - type: text
    content: I am sick with despair.
  '13':
  - type: text
    content: Yet when they were ill, I grieved for them.
  - type: text
    content: I denied myself by fasting for them,
  - type: text
    content: but my prayers returned unanswered.
  '14':
  - type: text
    content: I was sad, as though they were my friends or family,
  - type: text
    content: as if I were grieving for my own mother.
  '15':
  - type: text
    content: But they are glad now that I am in trouble;
  - type: text
    content: they gleefully join together against me.
  - type: text
    content: I am attacked by people I don’t even know;
  - type: text
    content: they slander me constantly.
  '16':
  - type: text
    content: They mock me and call me names;
  - type: text
    content: they snarl at me.
  '17':
  - type: text
    content: How long, O Lord, will you look on and do nothing?
  - type: text
    content: Rescue me from their fierce attacks.
  - type: text
    content: Protect my life from these lions!
  '18':
  - type: text
    content: Then I will thank you in front of the great assembly.
  - type: text
    content: I will praise you before all the people.
  '19':
  - type: text
    content: Don’t let my treacherous enemies rejoice over my defeat.
  - type: text
    content: Don’t let those who hate me without cause gloat over my sorrow.
  '2':
  - type: text
    content: Put on your armor, and take up your shield.
  - type: text
    content: Prepare for battle, and come to my aid.
  '20':
  - type: text
    content: They don’t talk of peace;
  - type: text
    content: they plot against innocent people who mind their own business.
  '21':
  - type: text
    content: They shout, “Aha! Aha!
  - type: text
    content: With our own eyes we saw him do it!”
  '22':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', you know all about this.'
  - type: text
    content: Do not stay silent.
  - type: text
    content: Do not abandon me now, O Lord.
  '23':
  - type: text
    content: Wake up! Rise to my defense!
  - type: text
    content: Take up my case, my God and my Lord.
  '24':
  - type: text
    content: 'Declare me not guilty, O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, for you give justice.'
  - type: text
    content: Don’t let my enemies laugh about me in my troubles.
  '25':
  - type: text
    content: Don’t let them say, “Look, we got what we wanted!
  - type: text
    content: Now we will eat him alive!”
  '26':
  - type: text
    content: May those who rejoice at my troubles
  - type: text
    content: be humiliated and disgraced.
  - type: text
    content: May those who triumph over me
  - type: text
    content: be covered with shame and dishonor.
  '27':
  - type: text
    content: But give great joy to those who came to my defense.
  - type: text
    content: 'Let them continually say, “Great is the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who delights in blessing his servant with peace!”
  '28':
  - type: text
    content: Then I will proclaim your justice,
  - type: text
    content: and I will praise you all day long.
  '3':
  - type: text
    content: Lift up your spear and javelin
  - type: text
    content: against those who pursue me.
  - type: text
    content: Let me hear you say,
  - type: text
    content: “I will give you victory!”
  '4':
  - type: text
    content: Bring shame and disgrace on those trying to kill me;
  - type: text
    content: turn them back and humiliate those who want to harm me.
  '5':
  - type: text
    content: Blow them away like chaff in the wind—
  - type: text
    content: 'a wind sent by the angel of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: Make their path dark and slippery,
  - type: text
    content: 'with the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' pursuing them.'
  '7':
  - type: text
    content: I did them no wrong, but they laid a trap for me.
  - type: text
    content: I did them no wrong, but they dug a pit to catch me.
  '8':
  - type: text
    content: So let sudden ruin come upon them!
  - type: text
    content: Let them be caught in the trap they set for me!
  - type: text
    content: Let them be destroyed in the pit they dug for me.
  '9':
  - type: text
    content: 'Then I will rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: I will be glad because he rescues me.
