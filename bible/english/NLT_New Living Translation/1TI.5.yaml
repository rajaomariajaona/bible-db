document_id: 1TI.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Advice about Widows, Elders, and Slaves
  - type: text
    content: Never speak harshly to an older man,
  - type: note
    content: Or an elder.
  - type: text
    content: ' but appeal to him respectfully as you would to your own father. Talk to younger men as you would to your own brothers. '
  '10':
  - type: text
    content: She must be well respected by everyone because of the good she has done. Has she brought up her children well? Has she been kind to strangers and served other believers humbly?
  - type: note
    content: Greek and washed the feet of God’s holy people?
  - type: text
    content: ' Has she helped those who are in trouble? Has she always been ready to do good?'
  '11':
  - type: text
    content: 'The younger widows should not be on the list, because their physical desires will overpower their devotion to Christ and they will want to remarry. '
  '12':
  - type: text
    content: 'Then they would be guilty of breaking their previous pledge. '
  '13':
  - type: text
    content: 'And if they are on the list, they will learn to be lazy and will spend their time gossiping from house to house, meddling in other people’s business and talking about things they shouldn’t. '
  '14':
  - type: text
    content: 'So I advise these younger widows to marry again, have children, and take care of their own homes. Then the enemy will not be able to say anything against them. '
  '15':
  - type: text
    content: For I am afraid that some of them have already gone astray and now follow Satan.
  '16':
  - type: text
    content: If a woman who is a believer has relatives who are widows, she must take care of them and not put the responsibility on the church. Then the church can care for the widows who are truly alone.
  '17':
  - type: text
    content: Elders who do their work well should be respected and paid well,
  - type: note
    content: Greek should be worthy of double honor.
  - type: text
    content: ' especially those who work hard at both preaching and teaching. '
  '18':
  - type: text
    content: 'For the Scripture says, “You must not muzzle an ox to keep it from eating as it treads out the grain.” And in another place, '
  - type: text
    content: “Those who work deserve their pay!”
  - type: note
    content: Deut 25:4; Luke 10:7.
  '19':
  - type: text
    content: 'Do not listen to an accusation against an elder unless it is confirmed by two or three witnesses. '
  '2':
  - type: text
    content: Treat older women as you would your mother, and treat younger women with all purity as you would your own sisters.
  '20':
  - type: text
    content: Those who sin should be reprimanded in front of the whole church; this will serve as a strong warning to others.
  '21':
  - type: text
    content: I solemnly command you in the presence of God and Christ Jesus and the highest angels to obey these instructions without taking sides or showing favoritism to anyone.
  '22':
  - type: text
    content: Never be in a hurry about appointing a church leader.
  - type: note
    content: Greek about the laying on of hands.
  - type: text
    content: ' Do not share in the sins of others. Keep yourself pure.'
  '23':
  - type: text
    content: Don’t drink only water. You ought to drink a little wine for the sake of your stomach because you are sick so often.
  '24':
  - type: text
    content: 'Remember, the sins of some people are obvious, leading them to certain judgment. But there are others whose sins will not be revealed until later. '
  '25':
  - type: text
    content: In the same way, the good deeds of some people are obvious. And the good deeds done in secret will someday come to light.
  '3':
  - type: text
    content: Take care of
  - type: note
    content: Or Honor.
  - type: text
    content: ' any widow who has no one else to care for her. '
  '4':
  - type: text
    content: But if she has children or grandchildren, their first responsibility is to show godliness at home and repay their parents by taking care of them. This is something that pleases God.
  '5':
  - type: text
    content: 'Now a true widow, a woman who is truly alone in this world, has placed her hope in God. She prays night and day, asking God for his help. '
  '6':
  - type: text
    content: 'But the widow who lives only for pleasure is spiritually dead even while she lives. '
  '7':
  - type: text
    content: Give these instructions to the church so that no one will be open to criticism.
  '8':
  - type: text
    content: But those who won’t care for their relatives, especially those in their own household, have denied the true faith. Such people are worse than unbelievers.
  '9':
  - type: text
    content: A widow who is put on the list for support must be a woman who is at least sixty years old and was faithful to her husband.
  - type: note
    content: Greek was the wife of one husband.
  - type: text
    content: ' '
