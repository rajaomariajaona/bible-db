document_id: 2CH.36
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoahaz Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the people of the land took Josiah’s son Jehoahaz and made him the next king in Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jehoahaz
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Joahaz, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoahaz; also in 36:4.
    marker-yv: yv-n
  - type: text
    text: ' was twenty-three years old when he became king, and he reigned in Jerusalem three months.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then he was deposed by the king of Egypt, who demanded that Judah pay 7,500 pounds of silver and 75 pounds of gold
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '100 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3,400 kilograms] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of silver and 1 talent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[34 kilograms] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of gold.
    marker-yv: yv-n
  - type: text
    text: ' as tribute.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoiakim Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The king of Egypt then installed Eliakim, the brother of Jehoahaz, as the next king of Judah and Jerusalem, and he changed Eliakim’s name to Jehoiakim. Then Neco took Jehoahaz to Egypt as a prisoner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jehoiakim was twenty-five years old when he became king, and he reigned in Jerusalem eleven years. He did what was evil in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then King Nebuchadnezzar of Babylon came to Jerusalem and captured it, and he bound Jehoiakim in bronze chains and led him away to Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nebuchadnezzar also took some of the treasures from the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and he placed them in his palace'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: temple.
    marker-yv: yv-n
  - type: text
    text: ' in Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The rest of the events in Jehoiakim’s reign, including all the evil things he did and everything found against him, are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the Kings of Israel and Judah.
  - type: text
    text: ' Then his son Jehoiachin became the next king.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoiachin Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jehoiachin was eighteen
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in one Hebrew manuscript, some Greek manuscripts, and Syriac version (see also 2 Kgs 24:8); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: eight.
    marker-yv: yv-n
  - type: text
    text: ' years old when he became king, and he reigned in Jerusalem three months and ten days. Jehoiachin did what was evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s sight.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: In the spring of the year
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:10a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'At the turn of the year. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The first day of this year in the ancient Hebrew lunar calendar was April 13, 597 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' King Nebuchadnezzar took Jehoiachin to Babylon. Many treasures from the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' were also taken to Babylon at that time. And Nebuchadnezzar installed Jehoiachin’s uncle,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:10b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 2 Kgs 24:17; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'brother, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: relative.
    marker-yv: yv-n
  - type: text
    text: ' Zedekiah, as the next king in Judah and Jerusalem.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zedekiah Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Zedekiah was twenty-one years old when he became king, and he reigned in Jerusalem eleven years. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But Zedekiah did what was evil in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God, and he refused to humble himself when the prophet Jeremiah spoke to him directly from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He also rebelled against King Nebuchadnezzar, even though he had taken an oath of loyalty in God’s name. Zedekiah was a hard and stubborn man, refusing to turn to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Likewise, all the leaders of the priests and the people became more and more unfaithful. They followed all the pagan practices of the surrounding nations, desecrating the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' that had been consecrated in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of their ancestors, repeatedly sent his prophets to warn them, for he had compassion on his people and his Temple. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But the people mocked these messengers of God and despised their words. They scoffed at the prophets until the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s anger could no longer be restrained and nothing could be done.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Fall of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' brought the king of Babylon against them. The Babylonians'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Chaldeans.
    marker-yv: yv-n
  - type: text
    text: ' killed Judah’s young men, even chasing after them into the Temple. They had no pity on the people, killing both young men and young women, the old and the infirm. God handed all of them over to Nebuchadnezzar. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The king took home to Babylon all the articles, large and small, used in the Temple of God, and the treasures from both the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple and from the palace of the king and his officials. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then his army burned the Temple of God, tore down the walls of Jerusalem, burned all the palaces, and completely destroyed everything of value.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: destroyed all the valuable articles from the Temple.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The few who survived were taken as exiles to Babylon, and they became servants to the king and his sons until the kingdom of Persia came to power.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So the message of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoken through Jeremiah was fulfilled. The land finally enjoyed its Sabbath rest, lying desolate until the seventy years were fulfilled, just as the prophet had said.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cyrus Allows the Exiles to Return
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: In the first year of King Cyrus of Persia,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:22a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The first year of Cyrus’s reign over Babylon was 538 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' fulfilled the prophecy he had given through Jeremiah.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:22b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Jer 25:11-12; 29:10.
    marker-yv: yv-n
  - type: text
    text: ' He stirred the heart of Cyrus to put this proclamation in writing and to send it throughout his kingdom:'
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“This is what King Cyrus of Persia says:'
- type: usfm
  marker: pm
  children:
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of heaven, has given me all the kingdoms of the earth. He has appointed me to build him a Temple at Jerusalem, which is in Judah. Any of you who are his people may go there for this task. And may the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God be with you!”'
