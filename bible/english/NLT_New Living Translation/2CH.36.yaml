document_id: 2CH.36,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoahaz Rules in Judah
  - type: text
    content: Then the people of the land took Josiah’s son Jehoahaz and made him the next king in Jerusalem.
  '10':
  - type: text
    content: In the spring of the year
  - type: note
    content: Hebrew At the turn of the year. The first day of this year in the ancient Hebrew lunar calendar was April 13, 597 b.c.
  - type: text
    content: ' King Nebuchadnezzar took Jehoiachin to Babylon. Many treasures from the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' were also taken to Babylon at that time. And Nebuchadnezzar installed Jehoiachin’s uncle,'
  - type: note
    content: As in parallel text at 2 Kgs 24:17; Hebrew reads brother, or relative.
  - type: text
    content: ' Zedekiah, as the next king in Judah and Jerusalem.'
  - type: heading
    content: Zedekiah Rules in Judah
  '11':
  - type: text
    content: 'Zedekiah was twenty-one years old when he became king, and he reigned in Jerusalem eleven years. '
  '12':
  - type: text
    content: 'But Zedekiah did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God, and he refused to humble himself when the prophet Jeremiah spoke to him directly from the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'He also rebelled against King Nebuchadnezzar, even though he had taken an oath of loyalty in God’s name. Zedekiah was a hard and stubborn man, refusing to turn to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel.'
  '14':
  - type: text
    content: 'Likewise, all the leaders of the priests and the people became more and more unfaithful. They followed all the pagan practices of the surrounding nations, desecrating the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' that had been consecrated in Jerusalem.'
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, repeatedly sent his prophets to warn them, for he had compassion on his people and his Temple. '
  '16':
  - type: text
    content: 'But the people mocked these messengers of God and despised their words. They scoffed at the prophets until the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger could no longer be restrained and nothing could be done.
  - type: heading
    content: The Fall of Jerusalem
  '17':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' brought the king of Babylon against them. The Babylonians'
  - type: note
    content: Or Chaldeans.
  - type: text
    content: ' killed Judah’s young men, even chasing after them into the Temple. They had no pity on the people, killing both young men and young women, the old and the infirm. God handed all of them over to Nebuchadnezzar. '
  '18':
  - type: text
    content: 'The king took home to Babylon all the articles, large and small, used in the Temple of God, and the treasures from both the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple and from the palace of the king and his officials. '
  '19':
  - type: text
    content: Then his army burned the Temple of God, tore down the walls of Jerusalem, burned all the palaces, and completely destroyed everything of value.
  - type: note
    content: Or destroyed all the valuable articles from the Temple.
  - type: text
    content: ' '
  '2':
  - type: text
    content: Jehoahaz
  - type: note
    content: Hebrew Joahaz, a variant spelling of Jehoahaz; also in 36:4.
  - type: text
    content: ' was twenty-three years old when he became king, and he reigned in Jerusalem three months.'
  '20':
  - type: text
    content: The few who survived were taken as exiles to Babylon, and they became servants to the king and his sons until the kingdom of Persia came to power.
  '21':
  - type: text
    content: 'So the message of the '
  - type: text
    content: Lord
  - type: text
    content: ' spoken through Jeremiah was fulfilled. The land finally enjoyed its Sabbath rest, lying desolate until the seventy years were fulfilled, just as the prophet had said.'
  - type: heading
    content: Cyrus Allows the Exiles to Return
  '22':
  - type: text
    content: In the first year of King Cyrus of Persia,
  - type: note
    content: The first year of Cyrus’s reign over Babylon was 538 b.c.
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' fulfilled the prophecy he had given through Jeremiah.'
  - type: note
    content: See Jer 25:11-12; 29:10.
  - type: text
    content: ' He stirred the heart of Cyrus to put this proclamation in writing and to send it throughout his kingdom:'
  '23':
  - type: text
    content: '“This is what King Cyrus of Persia says:'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of heaven, has given me all the kingdoms of the earth. He has appointed me to build him a Temple at Jerusalem, which is in Judah. Any of you who are his people may go there for this task. And may the '
  - type: text
    content: Lord
  - type: text
    content: ' your God be with you!”'
  '3':
  - type: text
    content: Then he was deposed by the king of Egypt, who demanded that Judah pay 7,500 pounds of silver and 75 pounds of gold
  - type: note
    content: Hebrew 100 talents [3,400 kilograms] of silver and 1 talent [34 kilograms] of gold.
  - type: text
    content: ' as tribute.'
  - type: heading
    content: Jehoiakim Rules in Judah
  '4':
  - type: text
    content: The king of Egypt then installed Eliakim, the brother of Jehoahaz, as the next king of Judah and Jerusalem, and he changed Eliakim’s name to Jehoiakim. Then Neco took Jehoahaz to Egypt as a prisoner.
  '5':
  - type: text
    content: 'Jehoiakim was twenty-five years old when he became king, and he reigned in Jerusalem eleven years. He did what was evil in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God.'
  '6':
  - type: text
    content: 'Then King Nebuchadnezzar of Babylon came to Jerusalem and captured it, and he bound Jehoiakim in bronze chains and led him away to Babylon. '
  '7':
  - type: text
    content: 'Nebuchadnezzar also took some of the treasures from the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', and he placed them in his palace'
  - type: note
    content: Or temple.
  - type: text
    content: ' in Babylon.'
  '8':
  - type: text
    content: 'The rest of the events in Jehoiakim’s reign, including all the evil things he did and everything found against him, are recorded in '
  - type: text
    content: The Book of the Kings of Israel and Judah.
  - type: text
    content: ' Then his son Jehoiachin became the next king.'
  - type: heading
    content: Jehoiachin Rules in Judah
  '9':
  - type: text
    content: Jehoiachin was eighteen
  - type: note
    content: As in one Hebrew manuscript, some Greek manuscripts, and Syriac version (see also 2 Kgs 24:8); most Hebrew manuscripts read eight.
  - type: text
    content: ' years old when he became king, and he reigned in Jerusalem three months and ten days. Jehoiachin did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight.
