document_id: PSA.143,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David.
  - type: text
    content: 'Hear my prayer, O '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: listen to my plea!
  - type: text
    content: Answer me because you are faithful and righteous.
  '10':
  - type: text
    content: Teach me to do your will,
  - type: text
    content: for you are my God.
  - type: text
    content: May your gracious Spirit lead me forward
  - type: text
    content: on a firm footing.
  '11':
  - type: text
    content: 'For the glory of your name, O '
  - type: text
    content: Lord
  - type: text
    content: ', preserve my life.'
  - type: text
    content: Because of your faithfulness, bring me out of this distress.
  '12':
  - type: text
    content: In your unfailing love, silence all my enemies
  - type: text
    content: and destroy all my foes,
  - type: text
    content: for I am your servant.
  '2':
  - type: text
    content: Don’t put your servant on trial,
  - type: text
    content: for no one is innocent before you.
  '3':
  - type: text
    content: My enemy has chased me.
  - type: text
    content: He has knocked me to the ground
  - type: text
    content: and forces me to live in darkness like those in the grave.
  '4':
  - type: text
    content: I am losing all hope;
  - type: text
    content: I am paralyzed with fear.
  '5':
  - type: text
    content: I remember the days of old.
  - type: text
    content: I ponder all your great works
  - type: text
    content: and think about what you have done.
  '6':
  - type: text
    content: I lift my hands to you in prayer.
  - type: text
    content: 'I thirst for you as parched land thirsts for rain. '
  - type: text
    content: Interlude
  '7':
  - type: text
    content: 'Come quickly, '
  - type: text
    content: Lord
  - type: text
    content: ', and answer me,'
  - type: text
    content: for my depression deepens.
  - type: text
    content: Don’t turn away from me,
  - type: text
    content: or I will die.
  '8':
  - type: text
    content: Let me hear of your unfailing love each morning,
  - type: text
    content: for I am trusting you.
  - type: text
    content: Show me where to walk,
  - type: text
    content: for I give myself to you.
  '9':
  - type: text
    content: 'Rescue me from my enemies, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: I run to you to hide me.
