document_id: NUM.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The People Complain to Moses
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Soon the people began to complain about their hardship, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' heard everything they said. Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s anger blazed against them, and he sent a fire to rage among them, and he destroyed some of the people in the outskirts of the camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then the people screamed to Moses for help, and when he prayed to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the fire stopped. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'After that, the area was known as Taberah (which means “the place of burning”), because fire from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had burned among them there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the foreign rabble who were traveling with the Israelites began to crave the good things of Egypt. And the people of Israel also began to complain. “Oh, for some meat!” they exclaimed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“We remember the fish we used to eat for free in Egypt. And we had all the cucumbers, melons, leeks, onions, and garlic we wanted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But now our appetites are gone. All we ever see is this manna!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The manna looked like small coriander seeds, and it was pale yellow like gum resin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The people would go out and gather it from the ground. They made flour by grinding it with hand mills or pounding it in mortars. Then they boiled it in a pot and made it into flat cakes. These cakes tasted like pastries baked with olive oil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The manna came down on the camp with the dew during the night.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moses heard all the families standing in the doorways of their tents whining, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' became extremely angry. Moses was also very aggravated. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Moses said to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “Why are you treating me, your servant, so harshly? Have mercy on me! What did I do to deserve the burden of all these people? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Did I give birth to them? Did I bring them into the world? Why did you tell me to carry them in my arms like a mother carries a nursing baby? How can I carry them to the land you swore to give their ancestors? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Where am I supposed to get meat for all these people? They keep whining to me, saying, ‘Give us meat to eat!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I can’t carry all these people by myself! The load is far too heavy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: If this is how you intend to treat me, just go ahead and kill me. Do me a favor and spare me this misery!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moses Chooses Seventy Leaders
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, “Gather before me seventy men who are recognized as elders and leaders of Israel. Bring them to the Tabernacle'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Tent of Meeting.
    marker-yv: yv-n
  - type: text
    text: ' to stand there with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I will come down and talk to you there. I will take some of the Spirit that is upon you, and I will put the Spirit upon them also. They will bear the burden of the people along with you, so you will not have to carry it alone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“And say to the people, ‘Purify yourselves, for tomorrow you will have meat to eat. You were whining, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' heard you when you cried, “Oh, for some meat! We were better off in Egypt!” Now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will give you meat, and you will have to eat it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And it won’t be for just a day or two, or for five or ten or even twenty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'You will eat it for a whole month until you gag and are sick of it. For you have rejected the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who is here among you, and you have whined to him, saying, “Why did we ever leave Egypt?”’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But Moses responded to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “There are 600,000 foot soldiers here with me, and yet you say, ‘I will give them meat for a whole month!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Even if we butchered all our flocks and herds, would that satisfy them? Even if we caught all the fish in the sea, would that be enough?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, “Has my arm lost its power? Now you will see whether or not my word comes true!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So Moses went out and reported the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s words to the people. He gathered the seventy elders and stationed them around the Tabernacle.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the tent; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 11:26.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came down in the cloud and spoke to Moses. Then he gave the seventy elders the same Spirit that was upon Moses. And when the Spirit rested upon them, they prophesied. But this never happened again.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Two men, Eldad and Medad, had stayed behind in the camp. They were listed among the elders, but they had not gone out to the Tabernacle. Yet the Spirit rested upon them as well, so they prophesied there in the camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: A young man ran and reported to Moses, “Eldad and Medad are prophesying in the camp!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Joshua son of Nun, who had been Moses’ assistant since his youth, protested, “Moses, my master, make them stop!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'But Moses replied, “Are you jealous for my sake? I wish that all the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s people were prophets and that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' would put his Spirit upon them all!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Then Moses returned to the camp with the elders of Israel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Sends Quail'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sent a wind that brought quail from the sea and let them fall all around the camp. For miles in every direction there were quail flying about three feet above the ground.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'there were quail about 3 feet '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2 cubits or 92 centimeters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: deep on the ground.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: So the people went out and caught quail all that day and throughout the night and all the next day, too. No one gathered less than fifty bushels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '10 homers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2.2 kiloliters].'
    marker-yv: yv-n
  - type: text
    text: '! They spread the quail all around the camp to dry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'But while they were gorging themselves on the meat—while it was still in their mouths—the anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' blazed against the people, and he struck them with a severe plague. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'So that place was called Kibroth-hattaavah (which means “graves of gluttony”) because there they buried the people who had craved meat from Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: From Kibroth-hattaavah the Israelites traveled to Hazeroth, where they stayed for some time.
