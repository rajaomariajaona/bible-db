document_id: 1SA.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul Defeats the Ammonites
  - type: text
    content: About a month later,
  - type: note
    content: As in Dead Sea Scroll 4QSama and Greek version; Masoretic Text lacks About a month later.
  - type: text
    content: ' King Nahash of Ammon led his army against the Israelite town of Jabesh-gilead. But all the citizens of Jabesh asked for peace. “Make a treaty with us, and we will be your servants,” they pleaded.'
  '10':
  - type: text
    content: 'The men of Jabesh then told their enemies, “Tomorrow we will come out to you, and you can do to us whatever you wish.” '
  '11':
  - type: text
    content: But before dawn the next morning, Saul arrived, having divided his army into three detachments. He launched a surprise attack against the Ammonites and slaughtered them the whole morning. The remnant of their army was so badly scattered that no two of them were left together.
  '12':
  - type: text
    content: Then the people exclaimed to Samuel, “Now where are those men who said, ‘Why should Saul rule over us?’ Bring them here, and we will kill them!”
  '13':
  - type: text
    content: 'But Saul replied, “No one will be executed today, for today the '
  - type: text
    content: Lord
  - type: text
    content: ' has rescued Israel!”'
  '14':
  - type: text
    content: 'Then Samuel said to the people, “Come, let us all go to Gilgal to renew the kingdom.” '
  '15':
  - type: text
    content: 'So they all went to Gilgal, and in a solemn ceremony before the '
  - type: text
    content: Lord
  - type: text
    content: ' they made Saul king. Then they offered peace offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ', and Saul and all the Israelites were filled with joy.'
  '2':
  - type: text
    content: “All right,” Nahash said, “but only on one condition. I will gouge out the right eye of every one of you as a disgrace to all Israel!”
  '3':
  - type: text
    content: “Give us seven days to send messengers throughout Israel!” replied the elders of Jabesh. “If no one comes to save us, we will agree to your terms.”
  '4':
  - type: text
    content: 'When the messengers came to Gibeah of Saul and told the people about their plight, everyone broke into tears. '
  '5':
  - type: text
    content: Saul had been plowing a field with his oxen, and when he returned to town, he asked, “What’s the matter? Why is everyone crying?” So they told him about the message from Jabesh.
  '6':
  - type: text
    content: 'Then the Spirit of God came powerfully upon Saul, and he became very angry. '
  '7':
  - type: text
    content: 'He took two oxen and cut them into pieces and sent the messengers to carry them throughout Israel with this message: “This is what will happen to the oxen of anyone who refuses to follow Saul and Samuel into battle!” And the '
  - type: text
    content: Lord
  - type: text
    content: ' made the people afraid of Saul’s anger, and all of them came out together as one. '
  '8':
  - type: text
    content: When Saul mobilized them at Bezek, he found that there were 300,000 men from Israel and 30,000
  - type: note
    content: Dead Sea Scrolls and Greek version read 70,000.
  - type: text
    content: ' men from Judah.'
  '9':
  - type: text
    content: So Saul sent the messengers back to Jabesh-gilead to say, “We will rescue you by noontime tomorrow!” There was great joy throughout the town when that message arrived!
