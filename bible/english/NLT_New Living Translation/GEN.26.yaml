document_id: GEN.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Isaac Deceives Abimelech
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A severe famine now struck the land, as had happened before in Abraham’s time. So Isaac moved to Gerar, where Abimelech, king of the Philistines, lived.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' appeared to Isaac and said, “Do not go down to Egypt, but do as I tell you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Live here as a foreigner in this land, and I will be with you and bless you. I hereby confirm that I will give all these lands to you and your descendants,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'seed; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 26:4, 24.
    marker-yv: yv-n
  - type: text
    text: ' just as I solemnly promised Abraham, your father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I will cause your descendants to become as numerous as the stars of the sky, and I will give them all these lands. And through your descendants all the nations of the earth will be blessed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I will do this because Abraham listened to me and obeyed all my requirements, commands, decrees, and instructions.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So Isaac stayed in Gerar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When the men who lived there asked Isaac about his wife, Rebekah, he said, “She is my sister.” He was afraid to say, “She is my wife.” He thought, “They will kill me to get her, because she is so beautiful.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But some time later, Abimelech, king of the Philistines, looked out his window and saw Isaac caressing Rebekah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Immediately, Abimelech called for Isaac and exclaimed, “She is obviously your wife! Why did you say, ‘She is my sister’?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Because I was afraid someone would kill me to get her from me,” Isaac replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “How could you do this to us?” Abimelech exclaimed. “One of my people might easily have taken your wife and slept with her, and you would have made us guilty of great sin.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Abimelech issued a public proclamation: “Anyone who touches this man or his wife will be put to death!”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conflict over Water Rights
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When Isaac planted his crops that year, he harvested a hundred times more grain than he planted, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' blessed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He became a very rich man, and his wealth continued to grow. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He acquired so many flocks of sheep and goats, herds of cattle, and servants that the Philistines became jealous of him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So the Philistines filled up all of Isaac’s wells with dirt. These were the wells that had been dug by the servants of his father, Abraham.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Finally, Abimelech ordered Isaac to leave the country. “Go somewhere else,” he said, “for you have become too powerful for us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So Isaac moved away to the Gerar Valley, where he set up their tents and settled down. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He reopened the wells his father had dug, which the Philistines had filled in after Abraham’s death. Isaac also restored the names Abraham had given them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Isaac’s servants also dug in the Gerar Valley and discovered a well of fresh water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But then the shepherds from Gerar came and claimed the spring. “This is our water,” they said, and they argued over it with Isaac’s herdsmen. So Isaac named the well Esek (which means “argument”). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Isaac’s men then dug another well, but again there was a dispute over it. So Isaac named it Sitnah (which means “hostility”). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Abandoning that one, Isaac moved on and dug another well. This time there was no dispute over it, so Isaac named the place Rehoboth (which means “open space”), for he said, “At last the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has created enough space for us to prosper in this land.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'From there Isaac moved to Beersheba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'where the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' appeared to him on the night of his arrival. “I am the God of your father, Abraham,” he said. “Do not be afraid, for I am with you and will bless you. I will multiply your descendants, and they will become a great nation. I will do this because of my promise to Abraham, my servant.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Isaac built an altar there and worshiped the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . He set up his camp at that place, and his servants dug another well.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Isaac’s Covenant with Abimelech
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'One day King Abimelech came from Gerar with his adviser, Ahuzzath, and also Phicol, his army commander. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “Why have you come here?” Isaac asked. “You obviously hate me, since you kicked me off your land.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'They replied, “We can plainly see that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is with you. So we want to enter into a sworn treaty with you. Let’s make a covenant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Swear that you will not harm us, just as we have never troubled you. We have always treated you well, and we sent you away from us in peace. And now look how the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has blessed you!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So Isaac prepared a covenant feast to celebrate the treaty, and they ate and drank together. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Early the next morning, they each took a solemn oath not to interfere with each other. Then Isaac sent them home again, and they left him in peace.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'That very day Isaac’s servants came and told him about a new well they had dug. “We’ve found water!” they exclaimed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: So Isaac named the well Shibah (which means “oath”). And to this day the town that grew up there is called Beersheba (which means “well of the oath”).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'At the age of forty, Esau married two Hittite wives: Judith, the daughter of Beeri, and Basemath, the daughter of Elon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: But Esau’s wives made life miserable for Isaac and Rebekah.
