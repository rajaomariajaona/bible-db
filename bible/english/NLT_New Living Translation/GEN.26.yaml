document_id: GEN.26,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Isaac Deceives Abimelech
  - type: text
    content: A severe famine now struck the land, as had happened before in Abraham’s time. So Isaac moved to Gerar, where Abimelech, king of the Philistines, lived.
  '10':
  - type: text
    content: “How could you do this to us?” Abimelech exclaimed. “One of my people might easily have taken your wife and slept with her, and you would have made us guilty of great sin.”
  '11':
  - type: text
    content: 'Then Abimelech issued a public proclamation: “Anyone who touches this man or his wife will be put to death!”'
  - type: heading
    content: Conflict over Water Rights
  '12':
  - type: text
    content: 'When Isaac planted his crops that year, he harvested a hundred times more grain than he planted, for the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed him. '
  '13':
  - type: text
    content: 'He became a very rich man, and his wealth continued to grow. '
  '14':
  - type: text
    content: 'He acquired so many flocks of sheep and goats, herds of cattle, and servants that the Philistines became jealous of him. '
  '15':
  - type: text
    content: So the Philistines filled up all of Isaac’s wells with dirt. These were the wells that had been dug by the servants of his father, Abraham.
  '16':
  - type: text
    content: Finally, Abimelech ordered Isaac to leave the country. “Go somewhere else,” he said, “for you have become too powerful for us.”
  '17':
  - type: text
    content: 'So Isaac moved away to the Gerar Valley, where he set up their tents and settled down. '
  '18':
  - type: text
    content: He reopened the wells his father had dug, which the Philistines had filled in after Abraham’s death. Isaac also restored the names Abraham had given them.
  '19':
  - type: text
    content: 'Isaac’s servants also dug in the Gerar Valley and discovered a well of fresh water. '
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to Isaac and said, “Do not go down to Egypt, but do as I tell you. '
  '20':
  - type: text
    content: 'But then the shepherds from Gerar came and claimed the spring. “This is our water,” they said, and they argued over it with Isaac’s herdsmen. So Isaac named the well Esek (which means “argument”). '
  '21':
  - type: text
    content: 'Isaac’s men then dug another well, but again there was a dispute over it. So Isaac named it Sitnah (which means “hostility”). '
  '22':
  - type: text
    content: 'Abandoning that one, Isaac moved on and dug another well. This time there was no dispute over it, so Isaac named the place Rehoboth (which means “open space”), for he said, “At last the '
  - type: text
    content: Lord
  - type: text
    content: ' has created enough space for us to prosper in this land.”'
  '23':
  - type: text
    content: 'From there Isaac moved to Beersheba, '
  '24':
  - type: text
    content: 'where the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to him on the night of his arrival. “I am the God of your father, Abraham,” he said. “Do not be afraid, for I am with you and will bless you. I will multiply your descendants, and they will become a great nation. I will do this because of my promise to Abraham, my servant.” '
  '25':
  - type: text
    content: 'Then Isaac built an altar there and worshiped the '
  - type: text
    content: Lord
  - type: text
    content: . He set up his camp at that place, and his servants dug another well.
  - type: heading
    content: Isaac’s Covenant with Abimelech
  '26':
  - type: text
    content: 'One day King Abimelech came from Gerar with his adviser, Ahuzzath, and also Phicol, his army commander. '
  '27':
  - type: text
    content: “Why have you come here?” Isaac asked. “You obviously hate me, since you kicked me off your land.”
  '28':
  - type: text
    content: 'They replied, “We can plainly see that the '
  - type: text
    content: Lord
  - type: text
    content: ' is with you. So we want to enter into a sworn treaty with you. Let’s make a covenant. '
  '29':
  - type: text
    content: 'Swear that you will not harm us, just as we have never troubled you. We have always treated you well, and we sent you away from us in peace. And now look how the '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed you!”'
  '3':
  - type: text
    content: Live here as a foreigner in this land, and I will be with you and bless you. I hereby confirm that I will give all these lands to you and your descendants,
  - type: note
    content: Hebrew seed; also in 26:4, 24.
  - type: text
    content: ' just as I solemnly promised Abraham, your father. '
  '30':
  - type: text
    content: 'So Isaac prepared a covenant feast to celebrate the treaty, and they ate and drank together. '
  '31':
  - type: text
    content: Early the next morning, they each took a solemn oath not to interfere with each other. Then Isaac sent them home again, and they left him in peace.
  '32':
  - type: text
    content: 'That very day Isaac’s servants came and told him about a new well they had dug. “We’ve found water!” they exclaimed. '
  '33':
  - type: text
    content: So Isaac named the well Shibah (which means “oath”). And to this day the town that grew up there is called Beersheba (which means “well of the oath”).
  '34':
  - type: text
    content: 'At the age of forty, Esau married two Hittite wives: Judith, the daughter of Beeri, and Basemath, the daughter of Elon. '
  '35':
  - type: text
    content: But Esau’s wives made life miserable for Isaac and Rebekah.
  '4':
  - type: text
    content: 'I will cause your descendants to become as numerous as the stars of the sky, and I will give them all these lands. And through your descendants all the nations of the earth will be blessed. '
  '5':
  - type: text
    content: 'I will do this because Abraham listened to me and obeyed all my requirements, commands, decrees, and instructions.” '
  '6':
  - type: text
    content: So Isaac stayed in Gerar.
  '7':
  - type: text
    content: 'When the men who lived there asked Isaac about his wife, Rebekah, he said, “She is my sister.” He was afraid to say, “She is my wife.” He thought, “They will kill me to get her, because she is so beautiful.” '
  '8':
  - type: text
    content: But some time later, Abimelech, king of the Philistines, looked out his window and saw Isaac caressing Rebekah.
  '9':
  - type: text
    content: Immediately, Abimelech called for Isaac and exclaimed, “She is obviously your wife! Why did you say, ‘She is my sister’?”
  - type: text
    content: “Because I was afraid someone would kill me to get her from me,” Isaac replied.
