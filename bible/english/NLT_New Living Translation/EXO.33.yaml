document_id: EXO.33
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, “Get going, you and the people you brought up from the land of Egypt. Go up to the land I swore to give to Abraham, Isaac, and Jacob. I told them, ‘I will give this land to your descendants.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And I will send an angel before you to drive out the Canaanites, Amorites, Hittites, Perizzites, Hivites, and Jebusites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Go up to this land that flows with milk and honey. But I will not travel among you, for you are a stubborn and rebellious people. If I did, I would surely destroy you along the way.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When the people heard these stern words, they went into mourning and stopped wearing their jewelry and fine clothes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had told Moses to tell them, “You are a stubborn and rebellious people. If I were to travel with you for even a moment, I would destroy you. Remove your jewelry and fine clothes while I decide what to do with you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So from the time they left Mount Sinai,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Horeb, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: another name for Sinai.
    marker-yv: yv-n
  - type: text
    text: ' the Israelites wore no more jewelry or fine clothes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: It was Moses’ practice to take the Tent of Meeting
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This “Tent of Meeting” is different from the Tabernacle described in chapters 26 and 36.
    marker-yv: yv-n
  - type: text
    text: ' and set it up some distance from the camp. Everyone who wanted to make a request of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' would go to the Tent of Meeting outside the camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Whenever Moses went out to the Tent of Meeting, all the people would get up and stand in the entrances of their own tents. They would all watch Moses until he disappeared inside. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'As he went into the tent, the pillar of cloud would come down and hover at its entrance while the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke with Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When the people saw the cloud standing at the entrance of the tent, they would stand and bow down in front of their own tents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Inside the Tent of Meeting, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' would speak to Moses face to face, as one speaks to a friend. Afterward Moses would return to the camp, but the young man who assisted him, Joshua son of Nun, would remain behind in the Tent of Meeting.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Moses Sees the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Glory
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'One day Moses said to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “You have been telling me, ‘Take these people up to the Promised Land.’ But you haven’t told me whom you will send with me. You have told me, ‘I know you by name, and I look favorably on you.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: If it is true that you look favorably on me, let me know your ways so I may understand you more fully and continue to enjoy your favor. And remember that this nation is your very own people.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' replied, “I will personally go with you, Moses, and I will give you rest—everything will be fine for you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Moses said, “If you don’t personally go with us, don’t make us leave this place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: How will anyone know that you look favorably on me—on me and on your people—if you don’t go with us? For your presence among us sets your people and me apart from all other people on the earth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' replied to Moses, “I will indeed do what you have asked, for I look favorably on you, and I know you by name.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Moses responded, “Then show me your glorious presence.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' replied, “I will make all my goodness pass before you, and I will call out my name, Yahweh,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:19 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yahweh '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'is a transliteration of the proper name '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'YHWH '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'that is sometimes rendered “Jehovah”; in this translation it is usually rendered “the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ” (note the use of small capitals).
    marker-yv: yv-n
  - type: text
    text: ' before you. For I will show mercy to anyone I choose, and I will show compassion to anyone I choose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But you may not look directly at my face, for no one may see me and live.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' continued, “Look, stand near me on this rock. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'As my glorious presence passes by, I will hide you in the crevice of the rock and cover you with my hand until I have passed by. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then I will remove my hand and let you see me from behind. But my face will not be seen.”
