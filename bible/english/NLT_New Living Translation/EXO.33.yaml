document_id: EXO.33,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Get going, you and the people you brought up from the land of Egypt. Go up to the land I swore to give to Abraham, Isaac, and Jacob. I told them, ‘I will give this land to your descendants.’ '
  '10':
  - type: text
    content: 'When the people saw the cloud standing at the entrance of the tent, they would stand and bow down in front of their own tents. '
  '11':
  - type: text
    content: 'Inside the Tent of Meeting, the '
  - type: text
    content: Lord
  - type: text
    content: ' would speak to Moses face to face, as one speaks to a friend. Afterward Moses would return to the camp, but the young man who assisted him, Joshua son of Nun, would remain behind in the Tent of Meeting.'
  - type: heading
    content: Moses Sees the Lord’s Glory
  '12':
  - type: text
    content: 'One day Moses said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “You have been telling me, ‘Take these people up to the Promised Land.’ But you haven’t told me whom you will send with me. You have told me, ‘I know you by name, and I look favorably on you.’ '
  '13':
  - type: text
    content: If it is true that you look favorably on me, let me know your ways so I may understand you more fully and continue to enjoy your favor. And remember that this nation is your very own people.”
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “I will personally go with you, Moses, and I will give you rest—everything will be fine for you.”'
  '15':
  - type: text
    content: 'Then Moses said, “If you don’t personally go with us, don’t make us leave this place. '
  '16':
  - type: text
    content: How will anyone know that you look favorably on me—on me and on your people—if you don’t go with us? For your presence among us sets your people and me apart from all other people on the earth.”
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied to Moses, “I will indeed do what you have asked, for I look favorably on you, and I know you by name.”'
  '18':
  - type: text
    content: Moses responded, “Then show me your glorious presence.”
  '19':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “I will make all my goodness pass before you, and I will call out my name, Yahweh,'
  - type: note
    content: Yahweh is a transliteration of the proper name YHWH that is sometimes rendered “Jehovah”; in this translation it is usually rendered “the Lord” (note the use of small capitals).
  - type: text
    content: ' before you. For I will show mercy to anyone I choose, and I will show compassion to anyone I choose. '
  '2':
  - type: text
    content: 'And I will send an angel before you to drive out the Canaanites, Amorites, Hittites, Perizzites, Hivites, and Jebusites. '
  '20':
  - type: text
    content: 'But you may not look directly at my face, for no one may see me and live.” '
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' continued, “Look, stand near me on this rock. '
  '22':
  - type: text
    content: 'As my glorious presence passes by, I will hide you in the crevice of the rock and cover you with my hand until I have passed by. '
  '23':
  - type: text
    content: Then I will remove my hand and let you see me from behind. But my face will not be seen.”
  '3':
  - type: text
    content: Go up to this land that flows with milk and honey. But I will not travel among you, for you are a stubborn and rebellious people. If I did, I would surely destroy you along the way.”
  '4':
  - type: text
    content: 'When the people heard these stern words, they went into mourning and stopped wearing their jewelry and fine clothes. '
  '5':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' had told Moses to tell them, “You are a stubborn and rebellious people. If I were to travel with you for even a moment, I would destroy you. Remove your jewelry and fine clothes while I decide what to do with you.” '
  '6':
  - type: text
    content: So from the time they left Mount Sinai,
  - type: note
    content: Hebrew Horeb, another name for Sinai.
  - type: text
    content: ' the Israelites wore no more jewelry or fine clothes.'
  '7':
  - type: text
    content: It was Moses’ practice to take the Tent of Meeting
  - type: note
    content: This “Tent of Meeting” is different from the Tabernacle described in chapters 26 and 36.
  - type: text
    content: ' and set it up some distance from the camp. Everyone who wanted to make a request of the '
  - type: text
    content: Lord
  - type: text
    content: ' would go to the Tent of Meeting outside the camp.'
  '8':
  - type: text
    content: 'Whenever Moses went out to the Tent of Meeting, all the people would get up and stand in the entrances of their own tents. They would all watch Moses until he disappeared inside. '
  '9':
  - type: text
    content: 'As he went into the tent, the pillar of cloud would come down and hover at its entrance while the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke with Moses. '
