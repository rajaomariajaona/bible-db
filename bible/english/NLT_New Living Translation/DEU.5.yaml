document_id: DEU.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Ten Commandments for the Covenant Community
  - type: text
    content: Moses called all the people of Israel together and said, “Listen carefully, Israel. Hear the decrees and regulations I am giving you today, so you may learn them and obey them!
  '10':
  - type: text
    content: But I lavish unfailing love for a thousand generations on those
  - type: note
    content: Hebrew for thousands of those.
  - type: text
    content: ' who love me and obey my commands.'
  '11':
  - type: text
    content: '“You must not misuse the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. The '
  - type: text
    content: Lord
  - type: text
    content: ' will not let you go unpunished if you misuse his name.'
  '12':
  - type: text
    content: '“Observe the Sabbath day by keeping it holy, as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has commanded you. '
  '13':
  - type: text
    content: 'You have six days each week for your ordinary work, '
  '14':
  - type: text
    content: 'but the seventh day is a Sabbath day of rest dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. On that day no one in your household may do any work. This includes you, your sons and daughters, your male and female servants, your oxen and donkeys and other livestock, and any foreigners living among you. All your male and female servants must rest as you do. '
  '15':
  - type: text
    content: 'Remember that you were once slaves in Egypt, but the '
  - type: text
    content: Lord
  - type: text
    content: ' your God brought you out with his strong hand and powerful arm. That is why the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has commanded you to rest on the Sabbath day.'
  '16':
  - type: text
    content: '“Honor your father and mother, as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God commanded you. Then you will live a long, full life in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you.'
  '17':
  - type: text
    content: “You must not murder.
  '18':
  - type: text
    content: “You must not commit adultery.
  '19':
  - type: text
    content: “You must not steal.
  '2':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' our God made a covenant with us at Mount Sinai.'
  - type: note
    content: Hebrew Horeb, another name for Sinai.
  - type: text
    content: ' '
  '20':
  - type: text
    content: “You must not testify falsely against your neighbor.
  '21':
  - type: text
    content: “You must not covet your neighbor’s wife. You must not covet your neighbor’s house or land, male or female servant, ox or donkey, or anything else that belongs to your neighbor.
  '22':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke these words to all of you assembled there at the foot of the mountain. He spoke with a loud voice from the heart of the fire, surrounded by clouds and deep darkness. This was all he said at that time, and he wrote his words on two stone tablets and gave them to me.'
  '23':
  - type: text
    content: '“But when you heard the voice from the heart of the darkness, while the mountain was blazing with fire, all your tribal leaders and elders came to me. '
  '24':
  - type: text
    content: 'They said, ‘Look, the '
  - type: text
    content: Lord
  - type: text
    content: ' our God has shown us his glory and greatness, and we have heard his voice from the heart of the fire. Today we have seen that God can speak to us humans, and yet we live! '
  '25':
  - type: text
    content: 'But now, why should we risk death again? If the '
  - type: text
    content: Lord
  - type: text
    content: ' our God speaks to us again, we will certainly die and be consumed by this awesome fire. '
  '26':
  - type: text
    content: 'Can any living thing hear the voice of the living God from the heart of the fire as we did and yet survive? '
  '27':
  - type: text
    content: 'Go yourself and listen to what the '
  - type: text
    content: Lord
  - type: text
    content: ' our God says. Then come and tell us everything he tells you, and we will listen and obey.’'
  '28':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' heard the request you made to me. And he said, ‘I have heard what the people said to you, and they are right. '
  '29':
  - type: text
    content: 'Oh, that they would always have hearts like this, that they might fear me and obey all my commands! If they did, they and their descendants would prosper forever. '
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' did not make this covenant with our ancestors, but with all of us who are alive today. '
  '30':
  - type: text
    content: 'Go and tell them, “Return to your tents.” '
  '31':
  - type: text
    content: But you stand here with me so I can give you all my commands, decrees, and regulations. You must teach them to the people so they can obey them in the land I am giving them as their possession.’”
  '32':
  - type: text
    content: 'So Moses told the people, “You must be careful to obey all the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, following his instructions in every detail. '
  '33':
  - type: text
    content: 'Stay on the path that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has commanded you to follow. Then you will live long and prosperous lives in the land you are about to enter and occupy.'
  '4':
  - type: text
    content: 'At the mountain the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to you face to face from the heart of the fire. '
  '5':
  - type: text
    content: 'I stood as an intermediary between you and the '
  - type: text
    content: Lord
  - type: text
    content: ', for you were afraid of the fire and did not want to approach the mountain. He spoke to me, and I passed his words on to you. This is what he said:'
  '6':
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who rescued you from the land of Egypt, the place of your slavery.'
  '7':
  - type: text
    content: “You must not have any other god but me.
  '8':
  - type: text
    content: '“You must not make for yourself an idol of any kind, or an image of anything in the heavens or on the earth or in the sea. '
  '9':
  - type: text
    content: 'You must not bow down to them or worship them, for I, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, am a jealous God who will not tolerate your affection for any other gods. I lay the sins of the parents upon their children; the entire family is affected—even children in the third and fourth generations of those who reject me. '
