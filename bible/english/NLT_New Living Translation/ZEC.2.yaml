document_id: ZEC.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Future Prosperity of Jerusalem
  - type: text
    content: ' '
  - type: note
    content: Verses 2:1-13 are numbered 2:5-17 in Hebrew text.
  - type: text
    content: 'When I looked again, I saw a man with a measuring line in his hand. '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says, “Shout and rejoice, O beautiful Jerusalem,'
  - type: note
    content: Hebrew O daughter of Zion.
  - type: text
    content: ' for I am coming to live among you. '
  '11':
  - type: text
    content: 'Many nations will join themselves to the '
  - type: text
    content: Lord
  - type: text
    content: ' on that day, and they, too, will be my people. I will live among you, and you will know that the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies sent me to you. '
  '12':
  - type: text
    content: 'The land of Judah will be the '
  - type: text
    content: Lord
  - type: text
    content: '’s special possession in the holy land, and he will once again choose Jerusalem to be his own city. '
  '13':
  - type: text
    content: 'Be silent before the '
  - type: text
    content: Lord
  - type: text
    content: ', all humanity, for he is springing into action from his holy dwelling.”'
  '2':
  - type: text
    content: “Where are you going?” I asked.
  - type: text
    content: He replied, “I am going to measure Jerusalem, to see how wide and how long it is.”
  '3':
  - type: text
    content: 'Then the angel who was with me went to meet a second angel who was coming toward him. '
  '4':
  - type: text
    content: 'The other angel said, “Hurry, and say to that young man, ‘Jerusalem will someday be so full of people and livestock that there won’t be room enough for everyone! Many will live outside the city walls. '
  '5':
  - type: text
    content: 'Then I, myself, will be a protective wall of fire around Jerusalem, says the '
  - type: text
    content: Lord
  - type: text
    content: . And I will be the glory inside the city!’”
  - type: heading
    content: The Exiles Are Called Home
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says, “Come away! Flee from Babylon in the land of the north, for I have scattered you to the four winds. '
  '7':
  - type: text
    content: Come away, people of Zion, you who are exiled in Babylon!”
  '8':
  - type: text
    content: 'After a period of glory, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies sent me'
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' against the nations who plundered you. For he said, “Anyone who harms you harms my most precious possession.'
  - type: note
    content: Hebrew Anyone who touches you touches the pupil of his eye.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'I will raise my fist to crush them, and their own slaves will plunder them.” Then you will know that the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies has sent me.'
