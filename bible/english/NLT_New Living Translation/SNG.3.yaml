document_id: SNG.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Young Woman
  - type: text
    content: One night as I lay in bed, I yearned for my lover.
  - type: text
    content: I yearned for him, but he did not come.
  '10':
  - type: text
    content: Its posts are silver,
  - type: text
    content: its canopy gold;
  - type: text
    content: its cushions are purple.
  - type: text
    content: It was decorated with love
  - type: text
    content: by the young women of Jerusalem.
  - type: heading
    content: Young Woman
  '11':
  - type: text
    content: Come out to see King Solomon,
  - type: text
    content: young women of Jerusalem.
  - type: note
    content: Hebrew of Zion.
  - type: text
    content: He wears the crown his mother gave him on his wedding day,
  - type: text
    content: his most joyous day.
  '2':
  - type: text
    content: So I said to myself, “I will get up and roam the city,
  - type: text
    content: searching in all its streets and squares.
  - type: text
    content: I will search for the one I love.”
  - type: text
    content: So I searched everywhere but did not find him.
  '3':
  - type: text
    content: The watchmen stopped me as they made their rounds,
  - type: text
    content: and I asked, “Have you seen the one I love?”
  '4':
  - type: text
    content: Then scarcely had I left them
  - type: text
    content: when I found my love!
  - type: text
    content: I caught and held him tightly,
  - type: text
    content: then I brought him to my mother’s house,
  - type: text
    content: into my mother’s bed, where I had been conceived.
  '5':
  - type: text
    content: Promise me, O women of Jerusalem,
  - type: text
    content: by the gazelles and wild deer,
  - type: text
    content: not to awaken love until the time is right.
  - type: note
    content: Or not to awaken love until it is ready.
  - type: heading
    content: Young Women of Jerusalem
  '6':
  - type: text
    content: Who is this sweeping in from the wilderness
  - type: text
    content: like a cloud of smoke?
  - type: text
    content: Who is it, fragrant with myrrh and frankincense
  - type: text
    content: and every kind of spice?
  '7':
  - type: text
    content: Look, it is Solomon’s carriage,
  - type: text
    content: surrounded by sixty heroic men,
  - type: text
    content: the best of Israel’s soldiers.
  '8':
  - type: text
    content: They are all skilled swordsmen,
  - type: text
    content: experienced warriors.
  - type: text
    content: Each wears a sword on his thigh,
  - type: text
    content: ready to defend the king against an attack in the night.
  '9':
  - type: text
    content: King Solomon’s carriage is built
  - type: text
    content: of wood imported from Lebanon.
