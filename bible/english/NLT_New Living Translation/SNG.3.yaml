document_id: SNG.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Young Woman
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One night as I lay in bed, I yearned for my lover.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I yearned for him, but he did not come.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its posts are silver,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its canopy gold;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its cushions are purple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was decorated with love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the young women of Jerusalem.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Young Woman
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come out to see King Solomon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: young women of Jerusalem.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of Zion.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He wears the crown his mother gave him on his wedding day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his most joyous day.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I said to myself, “I will get up and roam the city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: searching in all its streets and squares.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will search for the one I love.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So I searched everywhere but did not find him.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The watchmen stopped me as they made their rounds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I asked, “Have you seen the one I love?”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then scarcely had I left them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I found my love!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I caught and held him tightly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then I brought him to my mother’s house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into my mother’s bed, where I had been conceived.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Promise me, O women of Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the gazelles and wild deer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not to awaken love until the time is right.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: not to awaken love until it is ready.
      marker-yv: yv-n
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Young Women of Jerusalem
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who is this sweeping in from the wilderness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a cloud of smoke?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who is it, fragrant with myrrh and frankincense
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and every kind of spice?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look, it is Solomon’s carriage,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: surrounded by sixty heroic men,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the best of Israel’s soldiers.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are all skilled swordsmen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: experienced warriors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each wears a sword on his thigh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ready to defend the king against an attack in the night.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: King Solomon’s carriage is built
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of wood imported from Lebanon.
