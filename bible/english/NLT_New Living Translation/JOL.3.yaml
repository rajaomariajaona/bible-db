document_id: JOL.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment against Enemy Nations
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 3:1-21 are numbered 4:1-21 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: '“At the time of those events,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “when I restore the prosperity of Judah and Jerusalem,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hammer your plowshares into swords
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your pruning hooks into spears.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Train even your weaklings to be warriors.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come quickly, all you nations everywhere.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Gather together in the valley.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And now, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', call out your warriors!'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let the nations be called to arms.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them march to the valley of Jehoshaphat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', will sit'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to pronounce judgment on them all.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Swing the sickle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the harvest is ripe.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'for the harvest time has come. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Mark 4:29.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, tread the grapes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the winepress is full.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The storage vats are overflowing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with the wickedness of these people.”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thousands upon thousands are waiting in the valley of decision.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'There the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will soon arrive.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun and moon will grow dark,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the stars will no longer shine.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s voice will roar from Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and thunder from Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the heavens and the earth will shake.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be a refuge for his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a strong fortress for the people of Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Blessings for God’s People
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Then you will know that I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: live in Zion, my holy mountain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem will be holy forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and foreign armies will never conquer her again.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In that day the mountains will drip with sweet wine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the hills will flow with milk.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Water will fill the streambeds of Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and a fountain will burst forth from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Temple,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: watering the arid valley of acacias.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: valley of Shittim.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But Egypt will become a wasteland
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Edom will become a wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they attacked the people of Judah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and killed innocent people in their land.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will gather the armies of the world
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into the valley of Jehoshaphat.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:2 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jehoshaphat '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means “the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' judges.”'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There I will judge them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for harming my people, my special possession,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for scattering my people among the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and for dividing up my land.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But Judah will be filled with people forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Jerusalem will endure through all generations.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will pardon my people’s crimes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which I have not yet pardoned;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', will make my home'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in Jerusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zion.
      marker-yv: yv-n
    - type: text
      text: ' with my people.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They threw dice
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: They cast lots.
      marker-yv: yv-n
    - type: text
      text: ' to decide which of my people'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: would be their slaves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They traded boys to obtain prostitutes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sold girls for enough wine to get drunk.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“What do you have against me, Tyre and Sidon and you cities of Philistia? Are you trying to take revenge on me? If you are, then watch out! I will strike swiftly and pay you back for everything you have done. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You have taken my silver and gold and all my precious treasures, and have carried them off to your pagan temples. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You have sold the people of Judah and Jerusalem to the Greeks,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to the peoples of Javan.
      marker-yv: yv-n
    - type: text
      text: ' so they could take them far from their homeland.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But I will bring them back from all the places to which you sold them, and I will pay you back for everything you have done. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will sell your sons and daughters to the people of Judah, and they will sell them to the people of Arabia,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to the Sabeans.
      marker-yv: yv-n
    - type: text
      text: ' a nation far away. I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!”'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Say to the nations far and wide:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Get ready for war!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Call out your best warriors.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let all your fighting men advance for the attack.
