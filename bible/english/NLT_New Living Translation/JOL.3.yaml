document_id: JOL.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment against Enemy Nations
  - type: text
    content: ' '
  - type: note
    content: Verses 3:1-21 are numbered 4:1-21 in Hebrew text.
  - type: text
    content: '“At the time of those events,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “when I restore the prosperity of Judah and Jerusalem,
  '10':
  - type: text
    content: Hammer your plowshares into swords
  - type: text
    content: and your pruning hooks into spears.
  - type: text
    content: Train even your weaklings to be warriors.
  '11':
  - type: text
    content: Come quickly, all you nations everywhere.
  - type: text
    content: Gather together in the valley.”
  - type: text
    content: 'And now, O '
  - type: text
    content: Lord
  - type: text
    content: ', call out your warriors!'
  '12':
  - type: text
    content: “Let the nations be called to arms.
  - type: text
    content: Let them march to the valley of Jehoshaphat.
  - type: text
    content: 'There I, the '
  - type: text
    content: Lord
  - type: text
    content: ', will sit'
  - type: text
    content: to pronounce judgment on them all.
  '13':
  - type: text
    content: Swing the sickle,
  - type: text
    content: for the harvest is ripe.
  - type: note
    content: Greek version reads for the harvest time has come. Compare Mark 4:29.
  - type: text
    content: Come, tread the grapes,
  - type: text
    content: for the winepress is full.
  - type: text
    content: The storage vats are overflowing
  - type: text
    content: with the wickedness of these people.”
  '14':
  - type: text
    content: Thousands upon thousands are waiting in the valley of decision.
  - type: text
    content: 'There the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' will soon arrive.'
  '15':
  - type: text
    content: The sun and moon will grow dark,
  - type: text
    content: and the stars will no longer shine.
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s voice will roar from Zion
  - type: text
    content: and thunder from Jerusalem,
  - type: text
    content: and the heavens and the earth will shake.
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' will be a refuge for his people,'
  - type: text
    content: a strong fortress for the people of Israel.
  - type: heading
    content: Blessings for God’s People
  '17':
  - type: text
    content: '“Then you will know that I, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: live in Zion, my holy mountain.
  - type: text
    content: Jerusalem will be holy forever,
  - type: text
    content: and foreign armies will never conquer her again.
  '18':
  - type: text
    content: In that day the mountains will drip with sweet wine,
  - type: text
    content: and the hills will flow with milk.
  - type: text
    content: Water will fill the streambeds of Judah,
  - type: text
    content: 'and a fountain will burst forth from the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple,
  - type: text
    content: watering the arid valley of acacias.
  - type: note
    content: Hebrew valley of Shittim.
  '19':
  - type: text
    content: But Egypt will become a wasteland
  - type: text
    content: and Edom will become a wilderness,
  - type: text
    content: because they attacked the people of Judah
  - type: text
    content: and killed innocent people in their land.
  '2':
  - type: text
    content: I will gather the armies of the world
  - type: text
    content: into the valley of Jehoshaphat.
  - type: note
    content: Jehoshaphat means “the Lord judges.”
  - type: text
    content: There I will judge them
  - type: text
    content: for harming my people, my special possession,
  - type: text
    content: for scattering my people among the nations,
  - type: text
    content: and for dividing up my land.
  '20':
  - type: text
    content: “But Judah will be filled with people forever,
  - type: text
    content: and Jerusalem will endure through all generations.
  '21':
  - type: text
    content: I will pardon my people’s crimes,
  - type: text
    content: which I have not yet pardoned;
  - type: text
    content: 'and I, the '
  - type: text
    content: Lord
  - type: text
    content: ', will make my home'
  - type: text
    content: in Jerusalem
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ' with my people.”'
  '3':
  - type: text
    content: They threw dice
  - type: note
    content: Hebrew They cast lots.
  - type: text
    content: ' to decide which of my people'
  - type: text
    content: would be their slaves.
  - type: text
    content: They traded boys to obtain prostitutes
  - type: text
    content: and sold girls for enough wine to get drunk.
  '4':
  - type: text
    content: '“What do you have against me, Tyre and Sidon and you cities of Philistia? Are you trying to take revenge on me? If you are, then watch out! I will strike swiftly and pay you back for everything you have done. '
  '5':
  - type: text
    content: 'You have taken my silver and gold and all my precious treasures, and have carried them off to your pagan temples. '
  '6':
  - type: text
    content: You have sold the people of Judah and Jerusalem to the Greeks,
  - type: note
    content: Hebrew to the peoples of Javan.
  - type: text
    content: ' so they could take them far from their homeland.'
  '7':
  - type: text
    content: '“But I will bring them back from all the places to which you sold them, and I will pay you back for everything you have done. '
  '8':
  - type: text
    content: I will sell your sons and daughters to the people of Judah, and they will sell them to the people of Arabia,
  - type: note
    content: Hebrew to the Sabeans.
  - type: text
    content: ' a nation far away. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '9':
  - type: text
    content: 'Say to the nations far and wide:'
  - type: text
    content: “Get ready for war!
  - type: text
    content: Call out your best warriors.
  - type: text
    content: Let all your fighting men advance for the attack.
