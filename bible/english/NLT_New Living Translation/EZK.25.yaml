document_id: EZK.25,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message for Ammon
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then this message came to me from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And I will hand Moab over to nomads from the eastern deserts, just as I handed over Ammon. Yes, the Ammonites will no longer be counted among the nations. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'In the same way, I will bring my judgment down on the Moabites. Then they will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message for Edom
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: The people of Edom have sinned greatly by avenging themselves against the people of Judah. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Therefore, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I will raise my fist of judgment against Edom. I will wipe out its people and animals with the sword. I will make a wasteland of everything from Teman to Dedan. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I will accomplish this by the hand of my people of Israel. They will carry out my vengeance with anger, and Edom will know that this vengeance is from me. I, the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message for Philistia
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: The people of Philistia have acted against Judah out of bitter revenge and long-standing contempt. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Therefore, this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I will raise my fist of judgment against the land of the Philistines. I will wipe out the Kerethites and utterly destroy the people who live by the sea. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I will execute terrible vengeance against them to punish them for what they have done. And when I have inflicted my revenge, they will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Son of man, turn and face the land of Ammon and prophesy against its people. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Give the Ammonites this message from the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': Hear the word of the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! Because you cheered when my Temple was defiled, mocked Israel in her desolation, and laughed at Judah as she went away into exile, '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I will allow nomads from the eastern deserts to overrun your country. They will set up their camps among you and pitch their tents on your land. They will harvest all your fruit and drink the milk from your livestock. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And I will turn the city of Rabbah into a pasture for camels, and all the land of the Ammonites into a resting place for sheep and goats. Then you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Because you clapped and danced and cheered with glee at the destruction of my people, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will raise my fist of judgment against you. I will give you as plunder to many nations. I will cut you off from being a nation and destroy you completely. Then you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message for Moab
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Because the people of Moab'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Moab and Seir.
      marker-yv: yv-n
    - type: text
      text: ' have said that Judah is just like all the other nations, '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I will open up their eastern flank and wipe out their glorious frontier towns—Beth-jeshimoth, Baal-meon, and Kiriathaim. '
