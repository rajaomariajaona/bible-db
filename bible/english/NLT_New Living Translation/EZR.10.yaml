document_id: EZR.10,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The People Confess Their Sin
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'While Ezra prayed and made this confession, weeping and lying face down on the ground in front of the Temple of God, a very large crowd of people from Israel—men, women, and children—gathered and wept bitterly with him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Ezra the priest stood and said to them: “You have committed a terrible sin. By marrying pagan women, you have increased Israel’s guilt. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So now confess your sin to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your ancestors, and do what he demands. Separate yourselves from the people of the land and from these pagan women.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the whole assembly raised their voices and answered, “Yes, you are right; we must do as you say!” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they added, “This isn’t something that can be done in a day or two, for many of us are involved in this extremely sinful affair. And this is the rainy season, so we cannot stay out here much longer. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Let our leaders act on behalf of us all. Let everyone who has a pagan wife come at a scheduled time, accompanied by the leaders and judges of his city, so that the fierce anger of our God concerning this affair may be turned away from us.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Only Jonathan son of Asahel and Jahzeiah son of Tikvah opposed this course of action, and they were supported by Meshullam and Shabbethai the Levite.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So this was the plan they followed. Ezra selected leaders to represent their families, designating each of the representatives by name. On December 29,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'On the first day of the tenth month, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'of the ancient Hebrew lunar calendar. This day was December 29, 458 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ; also see note on 6:15.
      marker-yv: yv-n
    - type: text
      text: ' the leaders sat down to investigate the matter. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: By March 27, the first day of the new year,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'By the first day of the first month, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'of the ancient Hebrew lunar calendar. This day was March 27, 457 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ; also see note on 6:15.
      marker-yv: yv-n
    - type: text
      text: ' they had finished dealing with all the men who had married pagan wives.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Those Guilty of Intermarriage
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'These are the priests who had married pagan wives:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: From the family of Jeshua son of Jehozadak
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jozadak, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Jehozadak.
      marker-yv: yv-n
    - type: text
      text: ' and his brothers: Maaseiah, Eliezer, Jarib, and Gedaliah. '
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: They vowed to divorce their wives, and they each acknowledged their guilt by offering a ram as a guilt offering.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Shecaniah son of Jehiel, a descendant of Elam, said to Ezra, “We have been unfaithful to our God, for we have married these pagan women of the land. But in spite of this there is hope for Israel. '
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Immer: Hanani and Zebadiah.'
  '21':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Harim: Maaseiah, Elijah, Shemaiah, Jehiel, and Uzziah.'
  '22':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Pashhur: Elioenai, Maaseiah, Ishmael, Nethanel, Jozabad, and Elasah.'
  '23':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'These are the Levites who were guilty: Jozabad, Shimei, Kelaiah (also called Kelita), Pethahiah, Judah, and Eliezer.'
  '24':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'This is the singer who was guilty: Eliashib.'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'These are the gatekeepers who were guilty: Shallum, Telem, and Uri.'
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'These are the other people of Israel who were guilty:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Parosh: Ramiah, Izziah, Malkijah, Mijamin, Eleazar, Hashabiah,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 1 Esdras 9:26; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Malkijah.
      marker-yv: yv-n
    - type: text
      text: ' and Benaiah.'
  '26':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Elam: Mattaniah, Zechariah, Jehiel, Abdi, Jeremoth, and Elijah.'
  '27':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Zattu: Elioenai, Eliashib, Mattaniah, Jeremoth, Zabad, and Aziza.'
  '28':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Bebai: Jehohanan, Hananiah, Zabbai, and Athlai.'
  '29':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Bani: Meshullam, Malluch, Adaiah, Jashub, Sheal, and Jeremoth.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Let us now make a covenant with our God to divorce our pagan wives and to send them away with their children. We will follow the advice given by you and by the others who respect the commands of our God. Let it be done according to the Law of God. '
  '30':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Pahath-moab: Adna, Kelal, Benaiah, Maaseiah, Mattaniah, Bezalel, Binnui, and Manasseh.'
  '31':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Harim: Eliezer, Ishijah, Malkijah, Shemaiah, Shimeon, '
  '32':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Benjamin, Malluch, and Shemariah.
  '33':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Hashum: Mattenai, Mattattah, Zabad, Eliphelet, Jeremai, Manasseh, and Shimei.'
  '34':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Bani: Maadai, Amram, Uel, '
  '35':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Benaiah, Bedeiah, Keluhi, '
  '36':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Vaniah, Meremoth, Eliashib, '
  '37':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Mattaniah, Mattenai, and Jaasu.
  '38':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: From the family of Binnui
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:37-38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jaasu, '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '38'
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Bani, Binnui.
      marker-yv: yv-n
    - type: text
      text: ': Shimei, '
  '39':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Shelemiah, Nathan, Adaiah, '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Get up, for it is your duty to tell us how to proceed in setting things straight. We are behind you, so be strong and take action.”
  '40':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Macnadebai, Shashai, Sharai, '
  '41':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Azarel, Shelemiah, Shemariah, '
  '42':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shallum, Amariah, and Joseph.
  '43':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Nebo: Jeiel, Mattithiah, Zabad, Zebina, Jaddai, Joel, and Benaiah.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Each of these men had a pagan wife, and some even had children by these wives.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and they sent them away with their children. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Ezra stood up and demanded that the leaders of the priests and the Levites and all the people of Israel swear that they would do as Shecaniah had said. And they all swore a solemn oath. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Ezra left the front of the Temple of God and went to the room of Jehohanan son of Eliashib. He spent the night
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 1 Esdras 9:2; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He went.
      marker-yv: yv-n
    - type: text
      text: ' there without eating or drinking anything. He was still in mourning because of the unfaithfulness of the returned exiles.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a proclamation was made throughout Judah and Jerusalem that all the exiles should come to Jerusalem. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Those who failed to come within three days would, if the leaders and elders so decided, forfeit all their property and be expelled from the assembly of the exiles.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Within three days, all the people of Judah and Benjamin had gathered in Jerusalem. This took place on December 19,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on the twentieth day of the ninth month, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'of the ancient Hebrew lunar calendar. This day was December 19, 458 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ; also see note on 6:15.
      marker-yv: yv-n
    - type: text
      text: ' and all the people were sitting in the square before the Temple of God. They were trembling both because of the seriousness of the matter and because it was raining. '
