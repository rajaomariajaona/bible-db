document_id: EZR.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The People Confess Their Sin
  - type: text
    content: 'While Ezra prayed and made this confession, weeping and lying face down on the ground in front of the Temple of God, a very large crowd of people from Israel—men, women, and children—gathered and wept bitterly with him. '
  '10':
  - type: text
    content: 'Then Ezra the priest stood and said to them: “You have committed a terrible sin. By marrying pagan women, you have increased Israel’s guilt. '
  '11':
  - type: text
    content: 'So now confess your sin to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestors, and do what he demands. Separate yourselves from the people of the land and from these pagan women.”'
  '12':
  - type: text
    content: 'Then the whole assembly raised their voices and answered, “Yes, you are right; we must do as you say!” '
  '13':
  - type: text
    content: 'Then they added, “This isn’t something that can be done in a day or two, for many of us are involved in this extremely sinful affair. And this is the rainy season, so we cannot stay out here much longer. '
  '14':
  - type: text
    content: Let our leaders act on behalf of us all. Let everyone who has a pagan wife come at a scheduled time, accompanied by the leaders and judges of his city, so that the fierce anger of our God concerning this affair may be turned away from us.”
  '15':
  - type: text
    content: Only Jonathan son of Asahel and Jahzeiah son of Tikvah opposed this course of action, and they were supported by Meshullam and Shabbethai the Levite.
  '16':
  - type: text
    content: So this was the plan they followed. Ezra selected leaders to represent their families, designating each of the representatives by name. On December 29,
  - type: note
    content: Hebrew On the first day of the tenth month, of the ancient Hebrew lunar calendar. This day was December 29, 458 b.c.; also see note on 6:15.
  - type: text
    content: ' the leaders sat down to investigate the matter. '
  '17':
  - type: text
    content: By March 27, the first day of the new year,
  - type: note
    content: Hebrew By the first day of the first month, of the ancient Hebrew lunar calendar. This day was March 27, 457 b.c.; also see note on 6:15.
  - type: text
    content: ' they had finished dealing with all the men who had married pagan wives.'
  - type: heading
    content: Those Guilty of Intermarriage
  '18':
  - type: text
    content: 'These are the priests who had married pagan wives:'
  - type: text
    content: From the family of Jeshua son of Jehozadak
  - type: note
    content: Hebrew Jozadak, a variant spelling of Jehozadak.
  - type: text
    content: ' and his brothers: Maaseiah, Eliezer, Jarib, and Gedaliah. '
  '19':
  - type: text
    content: They vowed to divorce their wives, and they each acknowledged their guilt by offering a ram as a guilt offering.
  '2':
  - type: text
    content: 'Then Shecaniah son of Jehiel, a descendant of Elam, said to Ezra, “We have been unfaithful to our God, for we have married these pagan women of the land. But in spite of this there is hope for Israel. '
  '20':
  - type: text
    content: 'From the family of Immer: Hanani and Zebadiah.'
  '21':
  - type: text
    content: 'From the family of Harim: Maaseiah, Elijah, Shemaiah, Jehiel, and Uzziah.'
  '22':
  - type: text
    content: 'From the family of Pashhur: Elioenai, Maaseiah, Ishmael, Nethanel, Jozabad, and Elasah.'
  '23':
  - type: text
    content: 'These are the Levites who were guilty: Jozabad, Shimei, Kelaiah (also called Kelita), Pethahiah, Judah, and Eliezer.'
  '24':
  - type: text
    content: 'This is the singer who was guilty: Eliashib.'
  - type: text
    content: 'These are the gatekeepers who were guilty: Shallum, Telem, and Uri.'
  '25':
  - type: text
    content: 'These are the other people of Israel who were guilty:'
  - type: text
    content: 'From the family of Parosh: Ramiah, Izziah, Malkijah, Mijamin, Eleazar, Hashabiah,'
  - type: note
    content: As in parallel text at 1 Esdras 9:26; Hebrew reads Malkijah.
  - type: text
    content: ' and Benaiah.'
  '26':
  - type: text
    content: 'From the family of Elam: Mattaniah, Zechariah, Jehiel, Abdi, Jeremoth, and Elijah.'
  '27':
  - type: text
    content: 'From the family of Zattu: Elioenai, Eliashib, Mattaniah, Jeremoth, Zabad, and Aziza.'
  '28':
  - type: text
    content: 'From the family of Bebai: Jehohanan, Hananiah, Zabbai, and Athlai.'
  '29':
  - type: text
    content: 'From the family of Bani: Meshullam, Malluch, Adaiah, Jashub, Sheal, and Jeremoth.'
  '3':
  - type: text
    content: 'Let us now make a covenant with our God to divorce our pagan wives and to send them away with their children. We will follow the advice given by you and by the others who respect the commands of our God. Let it be done according to the Law of God. '
  '30':
  - type: text
    content: 'From the family of Pahath-moab: Adna, Kelal, Benaiah, Maaseiah, Mattaniah, Bezalel, Binnui, and Manasseh.'
  '31':
  - type: text
    content: 'From the family of Harim: Eliezer, Ishijah, Malkijah, Shemaiah, Shimeon, '
  '32':
  - type: text
    content: Benjamin, Malluch, and Shemariah.
  '33':
  - type: text
    content: 'From the family of Hashum: Mattenai, Mattattah, Zabad, Eliphelet, Jeremai, Manasseh, and Shimei.'
  '34':
  - type: text
    content: 'From the family of Bani: Maadai, Amram, Uel, '
  '35':
  - type: text
    content: 'Benaiah, Bedeiah, Keluhi, '
  '36':
  - type: text
    content: 'Vaniah, Meremoth, Eliashib, '
  '37':
  - type: text
    content: Mattaniah, Mattenai, and Jaasu.
  '38':
  - type: text
    content: From the family of Binnui
  - type: note
    content: As in Greek version; Hebrew reads Jaasu, 38Bani, Binnui.
  - type: text
    content: ': Shimei, '
  '39':
  - type: text
    content: 'Shelemiah, Nathan, Adaiah, '
  '4':
  - type: text
    content: Get up, for it is your duty to tell us how to proceed in setting things straight. We are behind you, so be strong and take action.”
  '40':
  - type: text
    content: 'Macnadebai, Shashai, Sharai, '
  '41':
  - type: text
    content: 'Azarel, Shelemiah, Shemariah, '
  '42':
  - type: text
    content: Shallum, Amariah, and Joseph.
  '43':
  - type: text
    content: 'From the family of Nebo: Jeiel, Mattithiah, Zabad, Zebina, Jaddai, Joel, and Benaiah.'
  '44':
  - type: text
    content: Each of these men had a pagan wife, and some even had children by these wives.
  - type: note
    content: Or and they sent them away with their children. The meaning of the Hebrew is uncertain.
  '5':
  - type: text
    content: 'So Ezra stood up and demanded that the leaders of the priests and the Levites and all the people of Israel swear that they would do as Shecaniah had said. And they all swore a solemn oath. '
  '6':
  - type: text
    content: Then Ezra left the front of the Temple of God and went to the room of Jehohanan son of Eliashib. He spent the night
  - type: note
    content: As in parallel text at 1 Esdras 9:2; Hebrew reads He went.
  - type: text
    content: ' there without eating or drinking anything. He was still in mourning because of the unfaithfulness of the returned exiles.'
  '7':
  - type: text
    content: 'Then a proclamation was made throughout Judah and Jerusalem that all the exiles should come to Jerusalem. '
  '8':
  - type: text
    content: Those who failed to come within three days would, if the leaders and elders so decided, forfeit all their property and be expelled from the assembly of the exiles.
  '9':
  - type: text
    content: Within three days, all the people of Judah and Benjamin had gathered in Jerusalem. This took place on December 19,
  - type: note
    content: Hebrew on the twentieth day of the ninth month, of the ancient Hebrew lunar calendar. This day was December 19, 458 b.c.; also see note on 6:15.
  - type: text
    content: ' and all the people were sitting in the square before the Temple of God. They were trembling both because of the seriousness of the matter and because it was raining. '
