document_id: HEB.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Great Examples of Faith
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Faith shows the reality of what we hope for; it is the evidence of things we cannot see. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Through their faith, the people in days of old earned a good reputation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: By faith we understand that the entire universe was formed at God’s command, that what we now see did not come from anything that can be seen.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: It was by faith that Abel brought a more acceptable offering to God than Cain did. Abel’s offering gave evidence that he was a righteous man, and God showed his approval of his gifts. Although Abel is long dead, he still speaks to us by his example of faith.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: It was by faith that Enoch was taken up to heaven without dying—“he disappeared, because God took him.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gen 5:24.
    marker-yv: yv-n
  - type: text
    text: ' For before he was taken up, he was known as a person who pleased God. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And it is impossible to please God without faith. Anyone who wants to come to him must believe that God exists and that he rewards those who sincerely seek him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: It was by faith that Noah built a large boat to save his family from the flood. He obeyed God, who warned him about things that had never happened before. By his faith Noah condemned the rest of the world, and he received the righteousness that comes by faith.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'It was by faith that Abraham obeyed when God called him to leave home and go to another land that God would give him as his inheritance. He went without knowing where he was going. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And even when he reached the land God promised him, he lived there by faith—for he was like a foreigner, living in tents. And so did Isaac and Jacob, who inherited the same promise. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Abraham was confidently looking forward to a city with eternal foundations, a city designed and built by God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: It was by faith that even Sarah was able to have a child, though she was barren and was too old. She believed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: It was by faith that he [Abraham] was able to have a child, even though Sarah was barren and he was too old. He believed.
    marker-yv: yv-n
  - type: text
    text: ' that God would keep his promise. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And so a whole nation came from this one man who was as good as dead—a nation with so many people that, like the stars in the sky and the sand on the seashore, there is no way to count them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'All these people died still believing what God had promised them. They did not receive what was promised, but they saw it all from a distance and welcomed it. They agreed that they were foreigners and nomads here on earth. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Obviously people who say such things are looking forward to a country they can call their own. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'If they had longed for the country they came from, they could have gone back. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But they were looking for a better place, a heavenly homeland. That is why God is not ashamed to be called their God, for he has prepared a city for them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'It was by faith that Abraham offered Isaac as a sacrifice when God was testing him. Abraham, who had received God’s promises, was ready to sacrifice his only son, Isaac, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: even though God had told him, “Isaac is the son through whom your descendants will be counted.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gen 21:12.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Abraham reasoned that if Isaac died, God was able to bring him back to life again. And in a sense, Abraham did receive his son back from the dead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: It was by faith that Isaac promised blessings for the future to his sons, Jacob and Esau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: It was by faith that Jacob, when he was old and dying, blessed each of Joseph’s sons and bowed in worship as he leaned on his staff.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: It was by faith that Joseph, when he was about to die, said confidently that the people of Israel would leave Egypt. He even commanded them to take his bones with them when they left.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: It was by faith that Moses’ parents hid him for three months when he was born. They saw that God had given them an unusual child, and they were not afraid to disobey the king’s command.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'It was by faith that Moses, when he grew up, refused to be called the son of Pharaoh’s daughter. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He chose to share the oppression of God’s people instead of enjoying the fleeting pleasures of sin. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'He thought it was better to suffer for the sake of Christ than to own the treasures of Egypt, for he was looking ahead to his great reward. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'It was by faith that Moses left the land of Egypt, not fearing the king’s anger. He kept right on going because he kept his eyes on the one who is invisible. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: It was by faith that Moses commanded the people of Israel to keep the Passover and to sprinkle blood on the doorposts so that the angel of death would not kill their firstborn sons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: It was by faith that the people of Israel went right through the Red Sea as though they were on dry ground. But when the Egyptians tried to follow, they were all drowned.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: It was by faith that the people of Israel marched around Jericho for seven days, and the walls came crashing down.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: It was by faith that Rahab the prostitute was not destroyed with the people in her city who refused to obey God. For she had given a friendly welcome to the spies.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'How much more do I need to say? It would take too long to recount the stories of the faith of Gideon, Barak, Samson, Jephthah, David, Samuel, and all the prophets. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'By faith these people overthrew kingdoms, ruled with justice, and received what God had promised them. They shut the mouths of lions, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'quenched the flames of fire, and escaped death by the edge of the sword. Their weakness was turned to strength. They became strong in battle and put whole armies to flight. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Women received their loved ones back again from death.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But others were tortured, refusing to turn from God in order to be set free. They placed their hope in a better life after the resurrection. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Some were jeered at, and their backs were cut open with whips. Others were chained in prisons. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Some died by stoning, some were sawed in half,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts add '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: some were tested.
    marker-yv: yv-n
  - type: text
    text: ' and others were killed with the sword. Some went about wearing skins of sheep and goats, destitute and oppressed and mistreated. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: They were too good for this world, wandering over deserts and mountains, hiding in caves and holes in the ground.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'All these people earned a good reputation because of their faith, yet none of them received all that God had promised. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: For God had something better in mind for us, so that they would not reach perfection without us.
