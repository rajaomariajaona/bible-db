document_id: GEN.36,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Esau
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'This is the account of the descendants of Esau (also known as Edom). '
  '10':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'These are the names of Esau’s sons: Eliphaz, the son of Esau’s wife Adah; and Reuel, the son of Esau’s wife Basemath.'
  '11':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The descendants of Eliphaz were Teman, Omar, Zepho, Gatam, and Kenaz. '
  '12':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Timna, the concubine of Esau’s son Eliphaz, gave birth to a son named Amalek. These are the descendants of Esau’s wife Adah.
  '13':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The descendants of Reuel were Nahath, Zerah, Shammah, and Mizzah. These are the descendants of Esau’s wife Basemath.
  '14':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Esau also had sons through Oholibamah, the daughter of Anah and granddaughter of Zibeon. Their names were Jeush, Jalam, and Korah.
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'These are the descendants of Esau who became the leaders of various clans:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The descendants of Esau’s oldest son, Eliphaz, became the leaders of the clans of Teman, Omar, Zepho, Kenaz, '
  '16':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Korah, Gatam, and Amalek. These are the clan leaders in the land of Edom who descended from Eliphaz. All these were descendants of Esau’s wife Adah.
  '17':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The descendants of Esau’s son Reuel became the leaders of the clans of Nahath, Zerah, Shammah, and Mizzah. These are the clan leaders in the land of Edom who descended from Reuel. All these were descendants of Esau’s wife Basemath.
  '18':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The descendants of Esau and his wife Oholibamah became the leaders of the clans of Jeush, Jalam, and Korah. These are the clan leaders who descended from Esau’s wife Oholibamah, the daughter of Anah.
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: These are the clans descended from Esau (also known as Edom), identified by their clan leaders.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Original Peoples of Edom
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Esau married two young women from Canaan: Adah, the daughter of Elon the Hittite; and Oholibamah, the daughter of Anah and granddaughter of Zibeon the Hivite. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'These are the names of the tribes that descended from Seir the Horite. They lived in the land of Edom: Lotan, Shobal, Zibeon, Anah, '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Dishon, Ezer, and Dishan. These were the Horite clan leaders, the descendants of Seir, who lived in the land of Edom.
  '22':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The descendants of Lotan were Hori and Hemam. Lotan’s sister was named Timna.
  '23':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: The descendants of Shobal were Alvan, Manahath, Ebal, Shepho, and Onam.
  '24':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: The descendants of Zibeon were Aiah and Anah. (This is the Anah who discovered the hot springs in the wilderness while he was grazing his father’s donkeys.)
  '25':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The descendants of Anah were his son, Dishon, and his daughter, Oholibamah.
  '26':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: The descendants of Dishon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dishan, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Dishon; compare 36:21, 28.
      marker-yv: yv-n
    - type: text
      text: ' were Hemdan, Eshban, Ithran, and Keran.'
  '27':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The descendants of Ezer were Bilhan, Zaavan, and Akan.
  '28':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: The descendants of Dishan were Uz and Aran.
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'So these were the leaders of the Horite clans: Lotan, Shobal, Zibeon, Anah, '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'He also married his cousin Basemath, who was the daughter of Ishmael and the sister of Nebaioth. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dishon, Ezer, and Dishan. The Horite clans are named after their clan leaders, who lived in the land of Seir.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rulers of Edom
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: These are the kings who ruled in the land of Edom before any king ruled over the Israelites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: before an Israelite king ruled over them.
      marker-yv: yv-n
    - type: text
      text: ':'
  '32':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Bela son of Beor, who ruled in Edom from his city of Dinhabah.
  '33':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: When Bela died, Jobab son of Zerah from Bozrah became king in his place.
  '34':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: When Jobab died, Husham from the land of the Temanites became king in his place.
  '35':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: When Husham died, Hadad son of Bedad became king in his place and ruled from the city of Avith. He was the one who defeated the Midianites in the land of Moab.
  '36':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: When Hadad died, Samlah from the city of Masrekah became king in his place.
  '37':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: When Samlah died, Shaul from the city of Rehoboth-on-the-River became king in his place.
  '38':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: When Shaul died, Baal-hanan son of Acbor became king in his place.
  '39':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: When Baal-hanan son of Acbor died, Hadad
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts, Samaritan Pentateuch, and Syriac version (see also 1 Chr 1:50); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hadar.
      marker-yv: yv-n
    - type: text
      text: ' became king in his place and ruled from the city of Pau. His wife was Mehetabel, the daughter of Matred and granddaughter of Me-zahab.'
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Adah gave birth to a son named Eliphaz for Esau. Basemath gave birth to a son named Reuel. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'These are the names of the leaders of the clans descended from Esau, who lived in the places named for them: Timna, Alvah, Jetheth, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Oholibamah, Elah, Pinon, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Kenaz, Teman, Mibzar, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Magdiel, and Iram. These are the leaders of the clans of Edom, listed according to their settlements in the land they occupied. They all descended from Esau, the ancestor of the Edomites.
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Oholibamah gave birth to sons named Jeush, Jalam, and Korah. All these sons were born to Esau in the land of Canaan.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Esau took his wives, his children, and his entire household, along with his livestock and cattle—all the wealth he had acquired in the land of Canaan—and moved away from his brother, Jacob. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'There was not enough land to support them both because of all the livestock and possessions they had acquired. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So Esau (also known as Edom) settled in the hill country of Seir.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: This is the account of Esau’s descendants, the Edomites, who lived in the hill country of Seir.
