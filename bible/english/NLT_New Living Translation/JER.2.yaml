segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Case against His People
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave me another message. He said, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Go and shout this message to Jerusalem. This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I remember how eager you were to please me
- type: usfm
  marker: q2
  children:
  - type: text
    text: as a young bride long ago,
- type: usfm
  marker: q1
  children:
  - type: text
    text: how you loved me and followed me
- type: usfm
  marker: q2
  children:
  - type: text
    text: even through the barren wilderness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'In those days Israel was holy to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the first of his children.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the firstfruits of his harvest.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: All who harmed his people were declared guilty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and disaster fell on them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Listen to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', people of Jacob—all you families of Israel! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “What did your ancestors find wrong with me
- type: usfm
  marker: q2
  children:
  - type: text
    text: that led them to stray so far from me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: They worshiped worthless idols,
- type: usfm
  marker: q2
  children:
  - type: text
    text: only to become worthless themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They did not ask, ‘Where is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: who brought us safely out of Egypt
- type: usfm
  marker: q1
  children:
  - type: text
    text: and led us through the barren wilderness—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a land of deserts and pits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: a land of drought and death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where no one lives or even travels?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “And when I brought you into a fruitful land
- type: usfm
  marker: q2
  children:
  - type: text
    text: to enjoy its bounty and goodness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you defiled my land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and corrupted the possession I had promised you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The priests did not ask,
- type: usfm
  marker: q2
  children:
  - type: text
    text: '‘Where is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who taught my word ignored me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rulers turned against me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the prophets spoke in the name of Baal,
- type: usfm
  marker: q2
  children:
  - type: text
    text: wasting their time on worthless idols.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Therefore, I will bring my case against you,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will even bring charges against your children’s children
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the years to come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Go west and look in the land of Cyprus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Kittim.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: go east and search through the land of Kedar.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has anyone ever heard of anything
- type: usfm
  marker: q2
  children:
  - type: text
    text: as strange as this?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Has any nation ever traded its gods for new ones,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even though they are not gods at all?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet my people have exchanged their glorious God
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: their glory.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: for worthless idols!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The heavens are shocked at such a thing
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shrink back in horror and dismay,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“For my people have done two evil things:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have abandoned me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fountain of living water.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they have dug for themselves cracked cisterns
- type: usfm
  marker: q2
  children:
  - type: text
    text: that can hold no water at all!
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Results of Israel’s Sin
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Why has Israel become a slave?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why has he been carried away as plunder?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Strong lions have roared against him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the land has been destroyed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The towns are now in ruins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one lives in them anymore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Egyptians, marching from their cities of Memphis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Noph.
    marker-yv: yv-n
  - type: text
    text: ' and Tahpanhes,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: have destroyed Israel’s glory and power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And you have brought this upon yourselves
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'by rebelling against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: even though he was leading you on the way!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “What have you gained by your alliances with Egypt
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your covenants with Assyria?
- type: usfm
  marker: q1
  children:
  - type: text
    text: What good to you are the streams of the Nile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:18a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of Shihor, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a branch of the Nile River.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the waters of the Euphrates River?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:18b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the river?
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Your wickedness will bring its own punishment.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your turning from me will shame you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will see what an evil, bitter thing it is
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to abandon the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God and not to fear him.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, have spoken!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Long ago I broke the yoke that oppressed you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and tore away the chains of your slavery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but still you said,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I will not serve you.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: On every hill and under every green tree,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have prostituted yourselves by bowing down to idols.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But I was the one who planted you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: choosing a vine of the purest stock—the very best.
- type: usfm
  marker: q2
  children:
  - type: text
    text: How did you grow into this corrupt wild vine?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: No amount of soap or lye can make you clean.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I still see the stain of your guilt.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel, an Unfaithful Wife
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “You say, ‘That’s not true!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I haven’t worshiped the images of Baal!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: But how can you say that?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Go and look in any valley in the land!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Face the awful sins you have done.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are like a restless female camel
- type: usfm
  marker: q2
  children:
  - type: text
    text: desperately searching for a mate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: You are like a wild donkey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sniffing the wind at mating time.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who can restrain her lust?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Those who desire her don’t need to search,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for she goes running to them!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: When will you stop running?
- type: usfm
  marker: q2
  children:
  - type: text
    text: When will you stop panting after other gods?
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you say, ‘Save your breath.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m in love with these foreign gods,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I can’t stop loving them now!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Israel is like a thief
- type: usfm
  marker: q2
  children:
  - type: text
    text: who feels shame only when he gets caught.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They, their kings, officials, priests, and prophets—
- type: usfm
  marker: q2
  children:
  - type: text
    text: all are alike in this.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: To an image carved from a piece of wood they say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘You are my father.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: To an idol chiseled from a block of stone they say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘You are my mother.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: They turn their backs on me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but in times of trouble they cry out to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Come and save us!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: But why not call on these gods you have made?
- type: usfm
  marker: q2
  children:
  - type: text
    text: When trouble comes, let them save you if they can!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you have as many gods
- type: usfm
  marker: q2
  children:
  - type: text
    text: as there are towns in Judah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Why do you accuse me of doing wrong?
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are the ones who have rebelled,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “I have punished your children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they did not respond to my discipline.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You yourselves have killed your prophets
- type: usfm
  marker: q2
  children:
  - type: text
    text: as a lion kills its prey.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“O my people, listen to the words of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have I been like a desert to Israel?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have I been to them a land of darkness?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why then do my people say, ‘At last we are free from God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: We don’t need him anymore!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Does a young woman forget her jewelry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or a bride her wedding dress?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet for years on end
- type: usfm
  marker: q2
  children:
  - type: text
    text: my people have forgotten me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: “How you plot and scheme to win your lovers.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even an experienced prostitute could learn from you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Your clothing is stained with the blood of the innocent and the poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though you didn’t catch them breaking into your houses!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: And yet you say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘I have done nothing wrong.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Surely God isn’t angry with me!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: But now I will punish you severely
- type: usfm
  marker: q2
  children:
  - type: text
    text: because you claim you have not sinned.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: First here, then there—
- type: usfm
  marker: q2
  children:
  - type: text
    text: you flit from one ally to another asking for help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But your new friends in Egypt will let you down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: just as Assyria did before.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: In despair, you will be led into exile
- type: usfm
  marker: q2
  children:
  - type: text
    text: with your hands on your heads,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has rejected the nations you trust.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will not help you at all.
