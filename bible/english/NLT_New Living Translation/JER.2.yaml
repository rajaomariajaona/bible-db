document_id: JER.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Case against His People
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave me another message. He said, '
  '10':
  - type: text
    content: “Go west and look in the land of Cyprus
  - type: note
    content: Hebrew Kittim.
  - type: text
    content: ;
  - type: text
    content: go east and search through the land of Kedar.
  - type: text
    content: Has anyone ever heard of anything
  - type: text
    content: as strange as this?
  '11':
  - type: text
    content: Has any nation ever traded its gods for new ones,
  - type: text
    content: even though they are not gods at all?
  - type: text
    content: Yet my people have exchanged their glorious God
  - type: note
    content: Hebrew their glory.
  - type: text
    content: for worthless idols!
  '12':
  - type: text
    content: The heavens are shocked at such a thing
  - type: text
    content: and shrink back in horror and dismay,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: '“For my people have done two evil things:'
  - type: text
    content: They have abandoned me—
  - type: text
    content: the fountain of living water.
  - type: text
    content: And they have dug for themselves cracked cisterns
  - type: text
    content: that can hold no water at all!
  - type: heading
    content: The Results of Israel’s Sin
  '14':
  - type: text
    content: “Why has Israel become a slave?
  - type: text
    content: Why has he been carried away as plunder?
  '15':
  - type: text
    content: Strong lions have roared against him,
  - type: text
    content: and the land has been destroyed.
  - type: text
    content: The towns are now in ruins,
  - type: text
    content: and no one lives in them anymore.
  '16':
  - type: text
    content: Egyptians, marching from their cities of Memphis
  - type: note
    content: Hebrew Noph.
  - type: text
    content: ' and Tahpanhes,'
  - type: text
    content: have destroyed Israel’s glory and power.
  '17':
  - type: text
    content: And you have brought this upon yourselves
  - type: text
    content: 'by rebelling against the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: even though he was leading you on the way!
  '18':
  - type: text
    content: “What have you gained by your alliances with Egypt
  - type: text
    content: and your covenants with Assyria?
  - type: text
    content: What good to you are the streams of the Nile
  - type: note
    content: Hebrew of Shihor, a branch of the Nile River.
  - type: text
    content: or the waters of the Euphrates River?
  - type: note
    content: Hebrew the river?
  '19':
  - type: text
    content: Your wickedness will bring its own punishment.
  - type: text
    content: Your turning from me will shame you.
  - type: text
    content: You will see what an evil, bitter thing it is
  - type: text
    content: 'to abandon the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and not to fear him.'
  - type: text
    content: 'I, the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, have spoken!'
  '2':
  - type: text
    content: '“Go and shout this message to Jerusalem. This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “I remember how eager you were to please me
  - type: text
    content: as a young bride long ago,
  - type: text
    content: how you loved me and followed me
  - type: text
    content: even through the barren wilderness.
  '20':
  - type: text
    content: “Long ago I broke the yoke that oppressed you
  - type: text
    content: and tore away the chains of your slavery,
  - type: text
    content: but still you said,
  - type: text
    content: ‘I will not serve you.’
  - type: text
    content: On every hill and under every green tree,
  - type: text
    content: you have prostituted yourselves by bowing down to idols.
  '21':
  - type: text
    content: But I was the one who planted you,
  - type: text
    content: choosing a vine of the purest stock—the very best.
  - type: text
    content: How did you grow into this corrupt wild vine?
  '22':
  - type: text
    content: No amount of soap or lye can make you clean.
  - type: text
    content: I still see the stain of your guilt.
  - type: text
    content: 'I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  - type: heading
    content: Israel, an Unfaithful Wife
  '23':
  - type: text
    content: “You say, ‘That’s not true!
  - type: text
    content: I haven’t worshiped the images of Baal!’
  - type: text
    content: But how can you say that?
  - type: text
    content: Go and look in any valley in the land!
  - type: text
    content: Face the awful sins you have done.
  - type: text
    content: You are like a restless female camel
  - type: text
    content: desperately searching for a mate.
  '24':
  - type: text
    content: You are like a wild donkey,
  - type: text
    content: sniffing the wind at mating time.
  - type: text
    content: Who can restrain her lust?
  - type: text
    content: Those who desire her don’t need to search,
  - type: text
    content: for she goes running to them!
  '25':
  - type: text
    content: When will you stop running?
  - type: text
    content: When will you stop panting after other gods?
  - type: text
    content: But you say, ‘Save your breath.
  - type: text
    content: I’m in love with these foreign gods,
  - type: text
    content: and I can’t stop loving them now!’
  '26':
  - type: text
    content: “Israel is like a thief
  - type: text
    content: who feels shame only when he gets caught.
  - type: text
    content: They, their kings, officials, priests, and prophets—
  - type: text
    content: all are alike in this.
  '27':
  - type: text
    content: To an image carved from a piece of wood they say,
  - type: text
    content: ‘You are my father.’
  - type: text
    content: To an idol chiseled from a block of stone they say,
  - type: text
    content: ‘You are my mother.’
  - type: text
    content: They turn their backs on me,
  - type: text
    content: but in times of trouble they cry out to me,
  - type: text
    content: ‘Come and save us!’
  '28':
  - type: text
    content: But why not call on these gods you have made?
  - type: text
    content: When trouble comes, let them save you if they can!
  - type: text
    content: For you have as many gods
  - type: text
    content: as there are towns in Judah.
  '29':
  - type: text
    content: Why do you accuse me of doing wrong?
  - type: text
    content: You are the ones who have rebelled,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: 'In those days Israel was holy to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the first of his children.
  - type: note
    content: Hebrew the firstfruits of his harvest.
  - type: text
    content: All who harmed his people were declared guilty,
  - type: text
    content: and disaster fell on them.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '30':
  - type: text
    content: “I have punished your children,
  - type: text
    content: but they did not respond to my discipline.
  - type: text
    content: You yourselves have killed your prophets
  - type: text
    content: as a lion kills its prey.
  '31':
  - type: text
    content: '“O my people, listen to the words of the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Have I been like a desert to Israel?
  - type: text
    content: Have I been to them a land of darkness?
  - type: text
    content: Why then do my people say, ‘At last we are free from God!
  - type: text
    content: We don’t need him anymore!’
  '32':
  - type: text
    content: Does a young woman forget her jewelry,
  - type: text
    content: or a bride her wedding dress?
  - type: text
    content: Yet for years on end
  - type: text
    content: my people have forgotten me.
  '33':
  - type: text
    content: “How you plot and scheme to win your lovers.
  - type: text
    content: Even an experienced prostitute could learn from you!
  '34':
  - type: text
    content: Your clothing is stained with the blood of the innocent and the poor,
  - type: text
    content: though you didn’t catch them breaking into your houses!
  '35':
  - type: text
    content: And yet you say,
  - type: text
    content: ‘I have done nothing wrong.
  - type: text
    content: Surely God isn’t angry with me!’
  - type: text
    content: But now I will punish you severely
  - type: text
    content: because you claim you have not sinned.
  '36':
  - type: text
    content: First here, then there—
  - type: text
    content: you flit from one ally to another asking for help.
  - type: text
    content: But your new friends in Egypt will let you down,
  - type: text
    content: just as Assyria did before.
  '37':
  - type: text
    content: In despair, you will be led into exile
  - type: text
    content: with your hands on your heads,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has rejected the nations you trust.'
  - type: text
    content: They will not help you at all.
  '4':
  - type: text
    content: 'Listen to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', people of Jacob—all you families of Israel! '
  '5':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “What did your ancestors find wrong with me
  - type: text
    content: that led them to stray so far from me?
  - type: text
    content: They worshiped worthless idols,
  - type: text
    content: only to become worthless themselves.
  '6':
  - type: text
    content: 'They did not ask, ‘Where is the '
  - type: text
    content: Lord
  - type: text
    content: who brought us safely out of Egypt
  - type: text
    content: and led us through the barren wilderness—
  - type: text
    content: a land of deserts and pits,
  - type: text
    content: a land of drought and death,
  - type: text
    content: where no one lives or even travels?’
  '7':
  - type: text
    content: “And when I brought you into a fruitful land
  - type: text
    content: to enjoy its bounty and goodness,
  - type: text
    content: you defiled my land
  - type: text
    content: and corrupted the possession I had promised you.
  '8':
  - type: text
    content: The priests did not ask,
  - type: text
    content: '‘Where is the '
  - type: text
    content: Lord
  - type: text
    content: ?’
  - type: text
    content: Those who taught my word ignored me,
  - type: text
    content: the rulers turned against me,
  - type: text
    content: and the prophets spoke in the name of Baal,
  - type: text
    content: wasting their time on worthless idols.
  '9':
  - type: text
    content: Therefore, I will bring my case against you,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “I will even bring charges against your children’s children
  - type: text
    content: in the years to come.
