document_id: GEN.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Burial of Sarah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When Sarah was 127 years old, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: she died at Kiriath-arba (now called Hebron) in the land of Canaan. There Abraham mourned and wept for her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then, leaving her body, he said to the Hittite elders, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Here I am, a stranger and a foreigner among you. Please sell me a piece of land so I can give my wife a proper burial.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The Hittites replied to Abraham, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Listen, my lord, you are an honored prince among us. Choose the finest of our tombs and bury her there. No one here will refuse to help you in this way.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then Abraham bowed low before the Hittites '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and said, “Since you are willing to help me in this way, be so kind as to ask Ephron son of Zohar '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: to let me buy his cave at Machpelah, down at the end of his field. I will pay the full price in the presence of witnesses, so I will have a permanent burial place for my family.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ephron was sitting there among the others, and he answered Abraham as the others listened, speaking publicly before all the Hittite elders of the town. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “No, my lord,” he said to Abraham, “please listen to me. I will give you the field and the cave. Here in the presence of my people, I give it to you. Go and bury your dead.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Abraham again bowed low before the citizens of the land, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: and he replied to Ephron as everyone listened. “No, listen to me. I will buy it from you. Let me pay the full price for the field so I can bury my dead there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ephron answered Abraham, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “My lord, please listen to me. The land is worth 400 pieces
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '400 shekels, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 10 pounds or 4.6 kilograms in weight; also in 23:16.
    marker-yv: yv-n
  - type: text
    text: ' of silver, but what is that between friends? Go ahead and bury your dead.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So Abraham agreed to Ephron’s price and paid the amount he had suggested—400 pieces of silver, weighed according to the market standard. The Hittite elders witnessed the transaction.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So Abraham bought the plot of land belonging to Ephron at Machpelah, near Mamre. This included the field itself, the cave that was in it, and all the surrounding trees. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'It was transferred to Abraham as his permanent possession in the presence of the Hittite elders at the city gate. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Abraham buried his wife, Sarah, there in Canaan, in the cave of Machpelah, near Mamre (also called Hebron). '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So the field and the cave were transferred from the Hittites to Abraham for use as a permanent burial place.
