document_id: REV.20,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Thousand Years
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then I saw an angel coming down from heaven with the key to the bottomless pit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the abyss, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the underworld; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 20:3.
      marker-yv: yv-n
    - type: text
      text: ' and a heavy chain in his hand. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the devil, who had deceived them, was thrown into the fiery lake of burning sulfur, joining the beast and the false prophet. There they will be tormented day and night forever and ever.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Final Judgment
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And I saw a great white throne and the one sitting on it. The earth and sky fled from his presence, but they found no place to hide. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I saw the dead, both great and small, standing before God’s throne. And the books were opened, including the Book of Life. And the dead were judged according to what they had done, as recorded in the books. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The sea gave up its dead, and death and the grave
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and Hades; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 20:14.
      marker-yv: yv-n
    - type: text
      text: ' gave up their dead. And all were judged according to their deeds. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then death and the grave were thrown into the lake of fire. This lake of fire is the second death. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And anyone whose name was not found recorded in the Book of Life was thrown into the lake of fire.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He seized the dragon—that old serpent, who is the devil, Satan—and bound him in chains for a thousand years. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The angel threw him into the bottomless pit, which he then shut and locked so Satan could not deceive the nations anymore until the thousand years were finished. Afterward he must be released for a little while.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I saw thrones, and the people sitting on them had been given the authority to judge. And I saw the souls of those who had been beheaded for their testimony about Jesus and for proclaiming the word of God. They had not worshiped the beast or his statue, nor accepted his mark on their foreheads or their hands. They all came to life again, and they reigned with Christ for a thousand years.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the first resurrection. (The rest of the dead did not come back to life until the thousand years had ended.) '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Blessed and holy are those who share in the first resurrection. For them the second death holds no power, but they will be priests of God and of Christ and will reign with him a thousand years.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Defeat of Satan
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When the thousand years come to an end, Satan will be let out of his prison. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He will go out to deceive the nations—called Gog and Magog—in every corner of the earth. He will gather them together for battle—a mighty army, as numberless as sand along the seashore. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And I saw them as they went up on the broad plain of the earth and surrounded God’s people and the beloved city. But fire from heaven came down on the attacking armies and consumed them.
