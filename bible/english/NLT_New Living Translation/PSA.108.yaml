document_id: PSA.108,116
type_code: eng
verses:
  '1':
  - type: text
    content: A song. A psalm of David.
  - type: text
    content: My heart is confident in you, O God;
  - type: text
    content: no wonder I can sing your praises with all my heart!
  '10':
  - type: text
    content: Who will bring me into the fortified city?
  - type: text
    content: Who will bring me victory over Edom?
  '11':
  - type: text
    content: Have you rejected us, O God?
  - type: text
    content: Will you no longer march with our armies?
  '12':
  - type: text
    content: Oh, please help us against our enemies,
  - type: text
    content: for all human help is useless.
  '13':
  - type: text
    content: With God’s help we will do mighty things,
  - type: text
    content: for he will trample down our foes.
  '2':
  - type: text
    content: Wake up, lyre and harp!
  - type: text
    content: I will wake the dawn with my song.
  '3':
  - type: text
    content: 'I will thank you, '
  - type: text
    content: Lord
  - type: text
    content: ', among all the people.'
  - type: text
    content: I will sing your praises among the nations.
  '4':
  - type: text
    content: For your unfailing love is higher than the heavens.
  - type: text
    content: Your faithfulness reaches to the clouds.
  '5':
  - type: text
    content: Be exalted, O God, above the highest heavens.
  - type: text
    content: May your glory shine over all the earth.
  '6':
  - type: text
    content: Now rescue your beloved people.
  - type: text
    content: Answer and save us by your power.
  '7':
  - type: text
    content: God has promised this by his holiness
  - type: note
    content: Or in his sanctuary.
  - type: text
    content: ':'
  - type: text
    content: “I will divide up Shechem with joy.
  - type: text
    content: I will measure out the valley of Succoth.
  '8':
  - type: text
    content: Gilead is mine,
  - type: text
    content: and Manasseh, too.
  - type: text
    content: Ephraim, my helmet, will produce my warriors,
  - type: text
    content: and Judah, my scepter, will produce my kings.
  '9':
  - type: text
    content: But Moab, my washbasin, will become my servant,
  - type: text
    content: and I will wipe my feet on Edom
  - type: text
    content: and shout in triumph over Philistia.”
