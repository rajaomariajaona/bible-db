document_id: PSA.108
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A song. A psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My heart is confident in you, O God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no wonder I can sing your praises with all my heart!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Wake up, lyre and harp!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will wake the dawn with my song.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I will thank you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', among all the people.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing your praises among the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For your unfailing love is higher than the heavens.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your faithfulness reaches to the clouds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Be exalted, O God, above the highest heavens.
- type: usfm
  marker: q2
  children:
  - type: text
    text: May your glory shine over all the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Now rescue your beloved people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Answer and save us by your power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: God has promised this by his holiness
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '108:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in his sanctuary.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will divide up Shechem with joy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will measure out the valley of Succoth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Gilead is mine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Manasseh, too.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraim, my helmet, will produce my warriors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Judah, my scepter, will produce my kings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But Moab, my washbasin, will become my servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will wipe my feet on Edom
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shout in triumph over Philistia.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Who will bring me into the fortified city?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who will bring me victory over Edom?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Have you rejected us, O God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will you no longer march with our armies?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Oh, please help us against our enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all human help is useless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: With God’s help we will do mighty things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he will trample down our foes.
