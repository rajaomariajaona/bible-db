document_id: JOB.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job’s Final Speech
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job continued speaking:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I vow by the living God, who has taken away my rights,
- type: usfm
  marker: q2
  children:
  - type: text
    text: by the Almighty who has embittered my soul—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: As long as I live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while I have breath from God,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: my lips will speak no evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my tongue will speak no lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I will never concede that you are right;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will defend my integrity until I die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I will maintain my innocence without wavering.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My conscience is clear for as long as I live.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “May my enemy be punished like the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my adversary like those who do evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For what hope do the godless have when God cuts them off
- type: usfm
  marker: q2
  children:
  - type: text
    text: and takes away their life?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Will God listen to their cry
- type: usfm
  marker: q2
  children:
  - type: text
    text: when trouble comes upon them?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Can they take delight in the Almighty?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can they call to God at any time?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I will teach you about God’s power.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not conceal anything concerning the Almighty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But you have seen all this,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet you say all these useless things to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “This is what the wicked will receive from God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: this is their inheritance from the Almighty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They may have many children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the children will die in war or starve to death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Those who survive will die of a plague,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and not even their widows will mourn them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Evil people may have piles of money
- type: usfm
  marker: q2
  children:
  - type: text
    text: and may store away mounds of clothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But the righteous will wear that clothing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the innocent will divide that money.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The wicked build houses as fragile as a spider’s web,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions (see also 8:14); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a moth.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: as flimsy as a shelter made of branches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The wicked go to bed rich
- type: usfm
  marker: q2
  children:
  - type: text
    text: but wake to find that all their wealth is gone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Terror overwhelms them like a flood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they are blown away in the storms of the night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The east wind carries them away, and they are gone.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It sweeps them away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: It whirls down on them without mercy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They struggle to flee from its power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But everyone jeers at them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and mocks them.
