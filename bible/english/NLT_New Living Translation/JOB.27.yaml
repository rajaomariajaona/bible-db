document_id: JOB.27,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Job’s Final Speech
  - type: text
    content: 'Job continued speaking:'
  '10':
  - type: text
    content: Can they take delight in the Almighty?
  - type: text
    content: Can they call to God at any time?
  '11':
  - type: text
    content: I will teach you about God’s power.
  - type: text
    content: I will not conceal anything concerning the Almighty.
  '12':
  - type: text
    content: But you have seen all this,
  - type: text
    content: yet you say all these useless things to me.
  '13':
  - type: text
    content: “This is what the wicked will receive from God;
  - type: text
    content: this is their inheritance from the Almighty.
  '14':
  - type: text
    content: They may have many children,
  - type: text
    content: but the children will die in war or starve to death.
  '15':
  - type: text
    content: Those who survive will die of a plague,
  - type: text
    content: and not even their widows will mourn them.
  '16':
  - type: text
    content: “Evil people may have piles of money
  - type: text
    content: and may store away mounds of clothing.
  '17':
  - type: text
    content: But the righteous will wear that clothing,
  - type: text
    content: and the innocent will divide that money.
  '18':
  - type: text
    content: The wicked build houses as fragile as a spider’s web,
  - type: note
    content: As in Greek and Syriac versions (see also 8:14); Hebrew reads a moth.
  - type: text
    content: as flimsy as a shelter made of branches.
  '19':
  - type: text
    content: The wicked go to bed rich
  - type: text
    content: but wake to find that all their wealth is gone.
  '2':
  - type: text
    content: “I vow by the living God, who has taken away my rights,
  - type: text
    content: by the Almighty who has embittered my soul—
  '20':
  - type: text
    content: Terror overwhelms them like a flood,
  - type: text
    content: and they are blown away in the storms of the night.
  '21':
  - type: text
    content: The east wind carries them away, and they are gone.
  - type: text
    content: It sweeps them away.
  '22':
  - type: text
    content: It whirls down on them without mercy.
  - type: text
    content: They struggle to flee from its power.
  '23':
  - type: text
    content: But everyone jeers at them
  - type: text
    content: and mocks them.
  '3':
  - type: text
    content: As long as I live,
  - type: text
    content: while I have breath from God,
  '4':
  - type: text
    content: my lips will speak no evil,
  - type: text
    content: and my tongue will speak no lies.
  '5':
  - type: text
    content: I will never concede that you are right;
  - type: text
    content: I will defend my integrity until I die.
  '6':
  - type: text
    content: I will maintain my innocence without wavering.
  - type: text
    content: My conscience is clear for as long as I live.
  '7':
  - type: text
    content: “May my enemy be punished like the wicked,
  - type: text
    content: my adversary like those who do evil.
  '8':
  - type: text
    content: For what hope do the godless have when God cuts them off
  - type: text
    content: and takes away their life?
  '9':
  - type: text
    content: Will God listen to their cry
  - type: text
    content: when trouble comes upon them?
