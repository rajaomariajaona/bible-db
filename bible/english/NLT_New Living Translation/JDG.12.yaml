document_id: JDG.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Ephraim Fights with Jephthah
  - type: text
    content: 'Then the people of Ephraim mobilized an army and crossed over the Jordan River to Zaphon. They sent this message to Jephthah: “Why didn’t you call for us to help you fight against the Ammonites? We are going to burn down your house with you in it!”'
  '10':
  - type: text
    content: When he died, he was buried at Bethlehem.
  - type: heading
    content: Elon Becomes Israel’s Judge
  '11':
  - type: text
    content: 'After Ibzan died, Elon from the tribe of Zebulun judged Israel for ten years. '
  '12':
  - type: text
    content: When he died, he was buried at Aijalon in Zebulun.
  - type: heading
    content: Abdon Becomes Israel’s Judge
  '13':
  - type: text
    content: 'After Elon died, Abdon son of Hillel, from Pirathon, judged Israel. '
  '14':
  - type: text
    content: 'He had forty sons and thirty grandsons, who rode on seventy donkeys. He judged Israel for eight years. '
  '15':
  - type: text
    content: When he died, he was buried at Pirathon in Ephraim, in the hill country of the Amalekites.
  '2':
  - type: text
    content: 'Jephthah replied, “I summoned you at the beginning of the dispute, but you refused to come! You failed to help us in our struggle against Ammon. '
  '3':
  - type: text
    content: 'So when I realized you weren’t coming, I risked my life and went to battle without you, and the '
  - type: text
    content: Lord
  - type: text
    content: ' gave me victory over the Ammonites. So why have you now come to fight me?”'
  '4':
  - type: text
    content: The people of Ephraim responded, “You men of Gilead are nothing more than fugitives from Ephraim and Manasseh.” So Jephthah gathered all the men of Gilead and attacked the men of Ephraim and defeated them.
  '5':
  - type: text
    content: 'Jephthah captured the shallow crossings of the Jordan River, and whenever a fugitive from Ephraim tried to go back across, the men of Gilead would challenge him. “Are you a member of the tribe of Ephraim?” they would ask. If the man said, “No, I’m not,” '
  '6':
  - type: text
    content: they would tell him to say “Shibboleth.” If he was from Ephraim, he would say “Sibboleth,” because people from Ephraim cannot pronounce the word correctly. Then they would take him and kill him at the shallow crossings of the Jordan. In all, 42,000 Ephraimites were killed at that time.
  '7':
  - type: text
    content: Jephthah judged Israel for six years. When he died, he was buried in one of the towns of Gilead.
  - type: heading
    content: Ibzan Becomes Israel’s Judge
  '8':
  - type: text
    content: 'After Jephthah died, Ibzan from Bethlehem judged Israel. '
  '9':
  - type: text
    content: 'He had thirty sons and thirty daughters. He sent his daughters to marry men outside his clan, and he brought in thirty young women from outside his clan to marry his sons. Ibzan judged Israel for seven years. '
