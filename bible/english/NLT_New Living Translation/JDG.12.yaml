document_id: JDG.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ephraim Fights with Jephthah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the people of Ephraim mobilized an army and crossed over the Jordan River to Zaphon. They sent this message to Jephthah: “Why didn’t you call for us to help you fight against the Ammonites? We are going to burn down your house with you in it!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jephthah replied, “I summoned you at the beginning of the dispute, but you refused to come! You failed to help us in our struggle against Ammon. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So when I realized you weren’t coming, I risked my life and went to battle without you, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave me victory over the Ammonites. So why have you now come to fight me?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The people of Ephraim responded, “You men of Gilead are nothing more than fugitives from Ephraim and Manasseh.” So Jephthah gathered all the men of Gilead and attacked the men of Ephraim and defeated them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jephthah captured the shallow crossings of the Jordan River, and whenever a fugitive from Ephraim tried to go back across, the men of Gilead would challenge him. “Are you a member of the tribe of Ephraim?” they would ask. If the man said, “No, I’m not,” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: they would tell him to say “Shibboleth.” If he was from Ephraim, he would say “Sibboleth,” because people from Ephraim cannot pronounce the word correctly. Then they would take him and kill him at the shallow crossings of the Jordan. In all, 42,000 Ephraimites were killed at that time.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Jephthah judged Israel for six years. When he died, he was buried in one of the towns of Gilead.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ibzan Becomes Israel’s Judge
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'After Jephthah died, Ibzan from Bethlehem judged Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He had thirty sons and thirty daughters. He sent his daughters to marry men outside his clan, and he brought in thirty young women from outside his clan to marry his sons. Ibzan judged Israel for seven years. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When he died, he was buried at Bethlehem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elon Becomes Israel’s Judge
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'After Ibzan died, Elon from the tribe of Zebulun judged Israel for ten years. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When he died, he was buried at Aijalon in Zebulun.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abdon Becomes Israel’s Judge
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'After Elon died, Abdon son of Hillel, from Pirathon, judged Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He had forty sons and thirty grandsons, who rode on seventy donkeys. He judged Israel for eight years. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: When he died, he was buried at Pirathon in Ephraim, in the hill country of the Amalekites.
