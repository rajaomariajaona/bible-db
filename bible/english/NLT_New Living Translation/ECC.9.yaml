document_id: ECC.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Death Comes to All
  - type: text
    content: 'This, too, I carefully explored: Even though the actions of godly and wise people are in God’s hands, no one knows whether God will show them favor. '
  '10':
  - type: text
    content: Whatever you do, do well. For when you go to the grave,
  - type: note
    content: Hebrew to Sheol.
  - type: text
    content: ' there will be no work or planning or knowledge or wisdom.'
  '11':
  - type: text
    content: I have observed something else under the sun. The fastest runner doesn’t always win the race, and the strongest warrior doesn’t always win the battle. The wise sometimes go hungry, and the skillful are not necessarily wealthy. And those who are educated don’t always lead successful lives. It is all decided by chance, by being in the right place at the right time.
  '12':
  - type: text
    content: People can never predict when hard times might come. Like fish in a net or birds in a trap, people are caught by sudden tragedy.
  - type: heading
    content: Thoughts on Wisdom and Folly
  '13':
  - type: text
    content: 'Here is another bit of wisdom that has impressed me as I have watched the way our world works. '
  '14':
  - type: text
    content: 'There was a small town with only a few people, and a great king came with his army and besieged it. '
  '15':
  - type: text
    content: 'A poor, wise man knew how to save the town, and so it was rescued. But afterward no one thought to thank him. '
  '16':
  - type: text
    content: So even though wisdom is better than strength, those who are wise will be despised if they are poor. What they say will not be appreciated for long.
  '17':
  - type: text
    content: Better to hear the quiet words of a wise person
  - type: text
    content: than the shouts of a foolish king.
  '18':
  - type: text
    content: Better to have wisdom than weapons of war,
  - type: text
    content: but one sinner can destroy much that is good.
  '2':
  - type: text
    content: The same destiny ultimately awaits everyone, whether righteous or wicked, good or bad,
  - type: note
    content: As in Greek and Syriac versions and Latin Vulgate; Hebrew lacks or bad.
  - type: text
    content: ' ceremonially clean or unclean, religious or irreligious. Good people receive the same treatment as sinners, and people who make promises to God are treated like people who don’t.'
  '3':
  - type: text
    content: 'It seems so wrong that everyone under the sun suffers the same fate. Already twisted by evil, people choose their own mad course, for they have no hope. There is nothing ahead but death anyway. '
  '4':
  - type: text
    content: There is hope only for the living. As they say, “It’s better to be a live dog than a dead lion!”
  '5':
  - type: text
    content: 'The living at least know they will die, but the dead know nothing. They have no further reward, nor are they remembered. '
  '6':
  - type: text
    content: 'Whatever they did in their lifetime—loving, hating, envying—is all long gone. They no longer play a part in anything here on earth. '
  '7':
  - type: text
    content: 'So go ahead. Eat your food with joy, and drink your wine with a happy heart, for God approves of this! '
  '8':
  - type: text
    content: Wear fine clothes, with a splash of cologne!
  '9':
  - type: text
    content: 'Live happily with the woman you love through all the meaningless days of life that God has given you under the sun. The wife God gives you is your reward for all your earthly toil. '
