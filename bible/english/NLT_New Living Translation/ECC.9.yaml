document_id: ECC.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Death Comes to All
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This, too, I carefully explored: Even though the actions of godly and wise people are in God’s hands, no one knows whether God will show them favor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The same destiny ultimately awaits everyone, whether righteous or wicked, good or bad,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions and Latin Vulgate; Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: or bad.
    marker-yv: yv-n
  - type: text
    text: ' ceremonially clean or unclean, religious or irreligious. Good people receive the same treatment as sinners, and people who make promises to God are treated like people who don’t.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'It seems so wrong that everyone under the sun suffers the same fate. Already twisted by evil, people choose their own mad course, for they have no hope. There is nothing ahead but death anyway. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: There is hope only for the living. As they say, “It’s better to be a live dog than a dead lion!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The living at least know they will die, but the dead know nothing. They have no further reward, nor are they remembered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Whatever they did in their lifetime—loving, hating, envying—is all long gone. They no longer play a part in anything here on earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So go ahead. Eat your food with joy, and drink your wine with a happy heart, for God approves of this! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Wear fine clothes, with a splash of cologne!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Live happily with the woman you love through all the meaningless days of life that God has given you under the sun. The wife God gives you is your reward for all your earthly toil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Whatever you do, do well. For when you go to the grave,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to Sheol.
    marker-yv: yv-n
  - type: text
    text: ' there will be no work or planning or knowledge or wisdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I have observed something else under the sun. The fastest runner doesn’t always win the race, and the strongest warrior doesn’t always win the battle. The wise sometimes go hungry, and the skillful are not necessarily wealthy. And those who are educated don’t always lead successful lives. It is all decided by chance, by being in the right place at the right time.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: People can never predict when hard times might come. Like fish in a net or birds in a trap, people are caught by sudden tragedy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Thoughts on Wisdom and Folly
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Here is another bit of wisdom that has impressed me as I have watched the way our world works. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'There was a small town with only a few people, and a great king came with his army and besieged it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'A poor, wise man knew how to save the town, and so it was rescued. But afterward no one thought to thank him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So even though wisdom is better than strength, those who are wise will be despised if they are poor. What they say will not be appreciated for long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Better to hear the quiet words of a wise person
- type: usfm
  marker: q2
  children:
  - type: text
    text: than the shouts of a foolish king.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Better to have wisdom than weapons of war,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but one sinner can destroy much that is good.
