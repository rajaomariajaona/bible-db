document_id: JER.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah’s Broken Covenant
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave another message to Jeremiah. He said, '
  '10':
  - type: text
    content: 'They have returned to the sins of their ancestors. They have refused to listen to me and are worshiping other gods. Israel and Judah have both broken the covenant I made with their ancestors. '
  '11':
  - type: text
    content: 'Therefore, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am going to bring calamity upon them, and they will not escape. Though they beg for mercy, I will not listen to their cries. '
  '12':
  - type: text
    content: 'Then the people of Judah and Jerusalem will pray to their idols and burn incense before them. But the idols will not save them when disaster strikes! '
  '13':
  - type: text
    content: Look now, people of Judah; you have as many gods as you have towns. You have as many altars of shame—altars for burning incense to your god Baal—as there are streets in Jerusalem.
  '14':
  - type: text
    content: “Pray no more for these people, Jeremiah. Do not weep or pray for them, for I will not listen to them when they cry out to me in distress.
  '15':
  - type: text
    content: “What right do my beloved people have to come to my Temple,
  - type: text
    content: when they have done so many immoral things?
  - type: text
    content: Can their vows and sacrifices prevent their destruction?
  - type: text
    content: They actually rejoice in doing evil!
  '16':
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', once called them a thriving olive tree,'
  - type: text
    content: beautiful to see and full of good fruit.
  - type: text
    content: But now I have sent the fury of their enemies
  - type: text
    content: to burn them with fire,
  - type: text
    content: leaving them charred and broken.
  '17':
  - type: text
    content: '“I, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, who planted this olive tree, have ordered it destroyed. For the people of Israel and Judah have done evil, arousing my anger by burning incense to Baal.”'
  - type: heading
    content: A Plot against Jeremiah
  '18':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' told me about the plots my enemies were making against me. '
  '19':
  - type: text
    content: I was like a lamb being led to the slaughter. I had no idea that they were planning to kill me! “Let’s destroy this man and all his words,” they said. “Let’s cut him down, so his name will be forgotten forever.”
  '2':
  - type: text
    content: '“Remind the people of Judah and Jerusalem about the terms of my covenant with them. '
  '20':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: you make righteous judgments,
  - type: text
    content: and you examine the deepest thoughts and secrets.
  - type: text
    content: Let me see your vengeance against them,
  - type: text
    content: for I have committed my cause to you.
  '21':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says about the men of Anathoth who wanted me dead. They had said, “We will kill you if you do not stop prophesying in the '
  - type: text
    content: Lord
  - type: text
    content: '’s name.” '
  '22':
  - type: text
    content: 'So this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says about them: “I will punish them! Their young men will die in battle, and their boys and girls will starve to death. '
  '23':
  - type: text
    content: Not one of these plotters from Anathoth will survive, for I will bring disaster upon them when their time of punishment comes.”
  '3':
  - type: text
    content: 'Say to them, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: Cursed is anyone who does not obey the terms of my covenant! '
  '4':
  - type: text
    content: 'For I said to your ancestors when I brought them out of the iron-smelting furnace of Egypt, “If you obey me and do whatever I command you, then you will be my people, and I will be your God.” '
  '5':
  - type: text
    content: I said this so I could keep my promise to your ancestors to give you a land flowing with milk and honey—the land you live in today.’”
  - type: text
    content: 'Then I replied, “Amen, '
  - type: text
    content: Lord
  - type: text
    content: '! May it be so.”'
  '6':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Broadcast this message in the streets of Jerusalem. Go from town to town throughout the land and say, ‘Remember the ancient covenant, and do everything it requires. '
  '7':
  - type: text
    content: 'For I solemnly warned your ancestors when I brought them out of Egypt, “Obey me!” I have repeated this warning over and over to this day, '
  '8':
  - type: text
    content: but your ancestors did not listen or even pay attention. Instead, they stubbornly followed their own evil desires. And because they refused to obey, I brought upon them all the curses described in this covenant.’”
  '9':
  - type: text
    content: 'Again the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to me and said, “I have discovered a conspiracy against me among the people of Judah and Jerusalem. '
