document_id: JER.11,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judah’s Broken Covenant
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave another message to Jeremiah. He said, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They have returned to the sins of their ancestors. They have refused to listen to me and are worshiping other gods. Israel and Judah have both broken the covenant I made with their ancestors. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I am going to bring calamity upon them, and they will not escape. Though they beg for mercy, I will not listen to their cries. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the people of Judah and Jerusalem will pray to their idols and burn incense before them. But the idols will not save them when disaster strikes! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Look now, people of Judah; you have as many gods as you have towns. You have as many altars of shame—altars for burning incense to your god Baal—as there are streets in Jerusalem.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Pray no more for these people, Jeremiah. Do not weep or pray for them, for I will not listen to them when they cry out to me in distress.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What right do my beloved people have to come to my Temple,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they have done so many immoral things?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can their vows and sacrifices prevent their destruction?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They actually rejoice in doing evil!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', once called them a thriving olive tree,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: beautiful to see and full of good fruit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But now I have sent the fury of their enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to burn them with fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaving them charred and broken.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, who planted this olive tree, have ordered it destroyed. For the people of Israel and Judah have done evil, arousing my anger by burning incense to Baal.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Plot against Jeremiah
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told me about the plots my enemies were making against me. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: I was like a lamb being led to the slaughter. I had no idea that they were planning to kill me! “Let’s destroy this man and all his words,” they said. “Let’s cut him down, so his name will be forgotten forever.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Remind the people of Judah and Jerusalem about the terms of my covenant with them. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you make righteous judgments,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you examine the deepest thoughts and secrets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me see your vengeance against them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have committed my cause to you.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says about the men of Anathoth who wanted me dead. They had said, “We will kill you if you do not stop prophesying in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s name.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies says about them: “I will punish them! Their young men will die in battle, and their boys and girls will starve to death. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Not one of these plotters from Anathoth will survive, for I will bring disaster upon them when their time of punishment comes.”
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Say to them, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: Cursed is anyone who does not obey the terms of my covenant! '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For I said to your ancestors when I brought them out of the iron-smelting furnace of Egypt, “If you obey me and do whatever I command you, then you will be my people, and I will be your God.” '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: I said this so I could keep my promise to your ancestors to give you a land flowing with milk and honey—the land you live in today.’”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I replied, “Amen, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! May it be so.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “Broadcast this message in the streets of Jerusalem. Go from town to town throughout the land and say, ‘Remember the ancient covenant, and do everything it requires. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I solemnly warned your ancestors when I brought them out of Egypt, “Obey me!” I have repeated this warning over and over to this day, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but your ancestors did not listen or even pay attention. Instead, they stubbornly followed their own evil desires. And because they refused to obey, I brought upon them all the curses described in this covenant.’”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to me and said, “I have discovered a conspiracy against me among the people of Judah and Jerusalem. '
