document_id: 2CO.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So I decided that I would not bring you grief with another painful visit. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For if I cause you grief, who will make me glad? Certainly not someone I have grieved. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'That is why I wrote to you as I did, so that when I do come, I won’t be grieved by the very ones who ought to give me the greatest joy. Surely you all know that my joy comes from your being joyful. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I wrote that letter in great anguish, with a troubled heart and many tears. I didn’t want to grieve you, but I wanted to let you know how much love I have for you.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Forgiveness for the Sinner
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I am not overstating it when I say that the man who caused all the trouble hurt all of you more than he hurt me. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Most of you opposed him, and that was punishment enough. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now, however, it is time to forgive and comfort him. Otherwise he may be overcome by discouragement. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So I urge you now to reaffirm your love for him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I wrote to you as I did to test you and see if you would fully comply with my instructions. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When you forgive this man, I forgive him, too. And when I forgive whatever needs to be forgiven, I do so with Christ’s authority for your benefit, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: so that Satan will not outsmart us. For we are familiar with his evil schemes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When I came to the city of Troas to preach the Good News of Christ, the Lord opened a door of opportunity for me. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But I had no peace of mind because my dear brother Titus hadn’t yet arrived with a report from you. So I said good-bye and went on to Macedonia to find him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ministers of the New Covenant
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But thank God! He has made us his captives and continues to lead us along in Christ’s triumphal procession. Now he uses us to spread the knowledge of Christ everywhere, like a sweet perfume. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Our lives are a Christ-like fragrance rising up to God. But this fragrance is perceived differently by those who are being saved and by those who are perishing. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: To those who are perishing, we are a dreadful smell of death and doom. But to those who are being saved, we are a life-giving perfume. And who is adequate for such a task as this?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: You see, we are not like the many hucksters
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the rest of the hucksters.
    marker-yv: yv-n
  - type: text
    text: ' who preach for personal profit. We preach the word of God with sincerity and with Christ’s authority, knowing that God is watching us.'
