document_id: EZK.31,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Egypt Compared to Fallen Assyria
  - type: text
    content: On June 21,
  - type: note
    content: Hebrew On the first day of the third month, of the ancient Hebrew lunar calendar. This event occurred on June 21, 587 b.c.; also see note on 1:1.
  - type: text
    content: ' during the eleventh year of King Jehoiachin’s captivity, this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: '“Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Because Egypt'
  - type: note
    content: Hebrew you.
  - type: text
    content: ' became proud and arrogant, and because it set itself so high above the others, with its top reaching to the clouds, '
  '11':
  - type: text
    content: 'I will hand it over to a mighty nation that will destroy it as its wickedness deserves. I have already discarded it. '
  '12':
  - type: text
    content: A foreign army—the terror of the nations—has cut it down and left it fallen on the ground. Its branches are scattered across the mountains and valleys and ravines of the land. All those who lived in its shadow have gone away and left it lying there.
  '13':
  - type: text
    content: “The birds roost on its fallen trunk,
  - type: text
    content: and the wild animals lie among its branches.
  '14':
  - type: text
    content: Let the tree of no other nation
  - type: text
    content: proudly exult in its own prosperity,
  - type: text
    content: though it be higher than the clouds
  - type: text
    content: and it be watered from the depths.
  - type: text
    content: For all are doomed to die,
  - type: text
    content: to go down to the depths of the earth.
  - type: text
    content: They will land in the pit
  - type: text
    content: along with everyone else on earth.
  '15':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: When Assyria went down to the grave,'
  - type: note
    content: Hebrew to Sheol; also in 31:16, 17.
  - type: text
    content: ' I made the deep springs mourn. I stopped its rivers and dried up its abundant water. I clothed Lebanon in black and caused the trees of the field to wilt. '
  '16':
  - type: text
    content: 'I made the nations shake with fear at the sound of its fall, for I sent it down to the grave with all the others who descend to the pit. And all the other proud trees of Eden, the most beautiful and the best of Lebanon, the ones whose roots went deep into the water, took comfort to find it there with them in the depths of the earth. '
  '17':
  - type: text
    content: Its allies, too, were all destroyed and had passed away. They had gone down to the grave—all those nations that had lived in its shade.
  '18':
  - type: text
    content: “O Egypt, to which of the trees of Eden will you compare your strength and glory? You, too, will be brought down to the depths with all these other nations. You will lie there among the outcasts
  - type: note
    content: Hebrew among the uncircumcised.
  - type: text
    content: ' who have died by the sword. This will be the fate of Pharaoh and all his hordes. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '2':
  - type: text
    content: '“Son of man, give this message to Pharaoh, king of Egypt, and all his hordes:'
  - type: text
    content: “To whom would you compare your greatness?
  '3':
  - type: text
    content: You are like mighty Assyria,
  - type: text
    content: which was once like a cedar of Lebanon,
  - type: text
    content: with beautiful branches that cast deep forest shade
  - type: text
    content: and with its top high among the clouds.
  '4':
  - type: text
    content: Deep springs watered it
  - type: text
    content: and helped it to grow tall and luxuriant.
  - type: text
    content: The water flowed around it like a river,
  - type: text
    content: streaming to all the trees nearby.
  '5':
  - type: text
    content: This great tree towered high,
  - type: text
    content: higher than all the other trees around it.
  - type: text
    content: It prospered and grew long thick branches
  - type: text
    content: because of all the water at its roots.
  '6':
  - type: text
    content: The birds nested in its branches,
  - type: text
    content: and in its shade all the wild animals gave birth.
  - type: text
    content: All the great nations of the world
  - type: text
    content: lived in its shadow.
  '7':
  - type: text
    content: It was strong and beautiful,
  - type: text
    content: with wide-spreading branches,
  - type: text
    content: for its roots went deep
  - type: text
    content: into abundant water.
  '8':
  - type: text
    content: No other cedar in the garden of God
  - type: text
    content: could rival it.
  - type: text
    content: No cypress had branches to equal it;
  - type: text
    content: no plane tree had boughs to compare.
  - type: text
    content: No tree in the garden of God
  - type: text
    content: came close to it in beauty.
  '9':
  - type: text
    content: Because I made this tree so beautiful,
  - type: text
    content: and gave it such magnificent foliage,
  - type: text
    content: it was the envy of all the other trees of Eden,
  - type: text
    content: the garden of God.
