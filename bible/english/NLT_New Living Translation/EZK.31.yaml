document_id: EZK.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Egypt Compared to Fallen Assyria
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: On June 21,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the first day of the third month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. This event occurred on June 21, 587 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 1:1.
    marker-yv: yv-n
  - type: text
    text: ' during the eleventh year of King Jehoiachin’s captivity, this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, give this message to Pharaoh, king of Egypt, and all his hordes:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “To whom would you compare your greatness?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You are like mighty Assyria,
- type: usfm
  marker: q2
  children:
  - type: text
    text: which was once like a cedar of Lebanon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: with beautiful branches that cast deep forest shade
- type: usfm
  marker: q2
  children:
  - type: text
    text: and with its top high among the clouds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Deep springs watered it
- type: usfm
  marker: q2
  children:
  - type: text
    text: and helped it to grow tall and luxuriant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The water flowed around it like a river,
- type: usfm
  marker: q2
  children:
  - type: text
    text: streaming to all the trees nearby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: This great tree towered high,
- type: usfm
  marker: q2
  children:
  - type: text
    text: higher than all the other trees around it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It prospered and grew long thick branches
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of all the water at its roots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The birds nested in its branches,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and in its shade all the wild animals gave birth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the great nations of the world
- type: usfm
  marker: q2
  children:
  - type: text
    text: lived in its shadow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: It was strong and beautiful,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with wide-spreading branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for its roots went deep
- type: usfm
  marker: q2
  children:
  - type: text
    text: into abundant water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: No other cedar in the garden of God
- type: usfm
  marker: q2
  children:
  - type: text
    text: could rival it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No cypress had branches to equal it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no plane tree had boughs to compare.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No tree in the garden of God
- type: usfm
  marker: q2
  children:
  - type: text
    text: came close to it in beauty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Because I made this tree so beautiful,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gave it such magnificent foliage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: it was the envy of all the other trees of Eden,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the garden of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Therefore, this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Because Egypt'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: you.
    marker-yv: yv-n
  - type: text
    text: ' became proud and arrogant, and because it set itself so high above the others, with its top reaching to the clouds, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I will hand it over to a mighty nation that will destroy it as its wickedness deserves. I have already discarded it. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: A foreign army—the terror of the nations—has cut it down and left it fallen on the ground. Its branches are scattered across the mountains and valleys and ravines of the land. All those who lived in its shadow have gone away and left it lying there.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “The birds roost on its fallen trunk,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the wild animals lie among its branches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Let the tree of no other nation
- type: usfm
  marker: q2
  children:
  - type: text
    text: proudly exult in its own prosperity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: though it be higher than the clouds
- type: usfm
  marker: q2
  children:
  - type: text
    text: and it be watered from the depths.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For all are doomed to die,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to go down to the depths of the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will land in the pit
- type: usfm
  marker: q2
  children:
  - type: text
    text: along with everyone else on earth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: When Assyria went down to the grave,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'to Sheol; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 31:16, 17.
    marker-yv: yv-n
  - type: text
    text: ' I made the deep springs mourn. I stopped its rivers and dried up its abundant water. I clothed Lebanon in black and caused the trees of the field to wilt. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I made the nations shake with fear at the sound of its fall, for I sent it down to the grave with all the others who descend to the pit. And all the other proud trees of Eden, the most beautiful and the best of Lebanon, the ones whose roots went deep into the water, took comfort to find it there with them in the depths of the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Its allies, too, were all destroyed and had passed away. They had gone down to the grave—all those nations that had lived in its shade.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “O Egypt, to which of the trees of Eden will you compare your strength and glory? You, too, will be brought down to the depths with all these other nations. You will lie there among the outcasts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: among the uncircumcised.
    marker-yv: yv-n
  - type: text
    text: ' who have died by the sword. This will be the fate of Pharaoh and all his hordes. I, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
