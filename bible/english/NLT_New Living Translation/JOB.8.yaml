document_id: JOB.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Bildad’s First Response to Job
  - type: text
    content: 'Then Bildad the Shuhite replied to Job:'
  '10':
  - type: text
    content: But those who came before us will teach you.
  - type: text
    content: They will teach you the wisdom of old.
  '11':
  - type: text
    content: “Can papyrus reeds grow tall without a marsh?
  - type: text
    content: Can marsh grass flourish without water?
  '12':
  - type: text
    content: While they are still flowering, not ready to be cut,
  - type: text
    content: they begin to wither more quickly than grass.
  '13':
  - type: text
    content: The same happens to all who forget God.
  - type: text
    content: The hopes of the godless evaporate.
  '14':
  - type: text
    content: Their confidence hangs by a thread.
  - type: text
    content: They are leaning on a spider’s web.
  '15':
  - type: text
    content: They cling to their home for security, but it won’t last.
  - type: text
    content: They try to hold it tight, but it will not endure.
  '16':
  - type: text
    content: The godless seem like a lush plant growing in the sunshine,
  - type: text
    content: its branches spreading across the garden.
  '17':
  - type: text
    content: Its roots grow down through a pile of stones;
  - type: text
    content: it takes hold on a bed of rocks.
  '18':
  - type: text
    content: But when it is uprooted,
  - type: text
    content: it’s as though it never existed!
  '19':
  - type: text
    content: That’s the end of its life,
  - type: text
    content: and others spring up from the earth to replace it.
  '2':
  - type: text
    content: “How long will you go on like this?
  - type: text
    content: You sound like a blustering wind.
  '20':
  - type: text
    content: “But look, God will not reject a person of integrity,
  - type: text
    content: nor will he lend a hand to the wicked.
  '21':
  - type: text
    content: He will once again fill your mouth with laughter
  - type: text
    content: and your lips with shouts of joy.
  '22':
  - type: text
    content: Those who hate you will be clothed with shame,
  - type: text
    content: and the home of the wicked will be destroyed.”
  '3':
  - type: text
    content: Does God twist justice?
  - type: text
    content: Does the Almighty twist what is right?
  '4':
  - type: text
    content: Your children must have sinned against him,
  - type: text
    content: so their punishment was well deserved.
  '5':
  - type: text
    content: But if you pray to God
  - type: text
    content: and seek the favor of the Almighty,
  '6':
  - type: text
    content: and if you are pure and live with integrity,
  - type: text
    content: he will surely rise up and restore your happy home.
  '7':
  - type: text
    content: And though you started with little,
  - type: text
    content: you will end with much.
  '8':
  - type: text
    content: “Just ask the previous generation.
  - type: text
    content: Pay attention to the experience of our ancestors.
  '9':
  - type: text
    content: For we were born but yesterday and know nothing.
  - type: text
    content: Our days on earth are as fleeting as a shadow.
