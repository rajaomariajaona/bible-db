document_id: JOB.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bildad’s First Response to Job
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Bildad the Shuhite replied to Job:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: But those who came before us will teach you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will teach you the wisdom of old.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Can papyrus reeds grow tall without a marsh?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can marsh grass flourish without water?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: While they are still flowering, not ready to be cut,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they begin to wither more quickly than grass.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The same happens to all who forget God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The hopes of the godless evaporate.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Their confidence hangs by a thread.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are leaning on a spider’s web.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: They cling to their home for security, but it won’t last.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They try to hold it tight, but it will not endure.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The godless seem like a lush plant growing in the sunshine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its branches spreading across the garden.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Its roots grow down through a pile of stones;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it takes hold on a bed of rocks.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But when it is uprooted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it’s as though it never existed!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: That’s the end of its life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and others spring up from the earth to replace it.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “How long will you go on like this?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You sound like a blustering wind.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “But look, God will not reject a person of integrity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor will he lend a hand to the wicked.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: He will once again fill your mouth with laughter
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your lips with shouts of joy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Those who hate you will be clothed with shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the home of the wicked will be destroyed.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Does God twist justice?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Does the Almighty twist what is right?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Your children must have sinned against him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so their punishment was well deserved.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But if you pray to God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and seek the favor of the Almighty,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: and if you are pure and live with integrity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will surely rise up and restore your happy home.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And though you started with little,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will end with much.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Just ask the previous generation.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pay attention to the experience of our ancestors.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For we were born but yesterday and know nothing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Our days on earth are as fleeting as a shadow.
