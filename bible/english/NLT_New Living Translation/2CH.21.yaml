document_id: 2CH.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoram Rules in Judah
  - type: text
    content: When Jehoshaphat died, he was buried with his ancestors in the City of David. Then his son Jehoram became the next king.
  '10':
  - type: text
    content: 'Even so, Edom has been independent from Judah to this day. The town of Libnah also revolted about that same time. All this happened because Jehoram had abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of his ancestors. '
  '11':
  - type: text
    content: He had built pagan shrines in the hill country of Judah and had led the people of Jerusalem and Judah to give themselves to pagan gods and to go astray.
  '12':
  - type: text
    content: 'Then Elijah the prophet wrote Jehoram this letter:'
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestor David, says: You have not followed the good example of your father, Jehoshaphat, or your grandfather King Asa of Judah. '
  '13':
  - type: text
    content: 'Instead, you have been as evil as the kings of Israel. You have led the people of Jerusalem and Judah to worship idols, just as King Ahab did in Israel. And you have even killed your own brothers, men who were better than you. '
  '14':
  - type: text
    content: 'So now the '
  - type: text
    content: Lord
  - type: text
    content: ' is about to strike you, your people, your children, your wives, and all that is yours with a heavy blow. '
  '15':
  - type: text
    content: You yourself will suffer with a severe intestinal disease that will get worse each day until your bowels come out.”
  '16':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' stirred up the Philistines and the Arabs, who lived near the Ethiopians,'
  - type: note
    content: Hebrew the Cushites.
  - type: text
    content: ' to attack Jehoram. '
  '17':
  - type: text
    content: They marched against Judah, broke down its defenses, and carried away everything of value in the royal palace, including the king’s sons and his wives. Only his youngest son, Ahaziah,
  - type: note
    content: Hebrew Jehoahaz, a variant spelling of Ahaziah; compare 22:1.
  - type: text
    content: ' was spared.'
  '18':
  - type: text
    content: 'After all this, the '
  - type: text
    content: Lord
  - type: text
    content: ' struck Jehoram with an incurable intestinal disease. '
  '19':
  - type: text
    content: The disease grew worse and worse, and at the end of two years it caused his bowels to come out, and he died in agony. His people did not build a great funeral fire to honor him as they had done for his ancestors.
  '2':
  - type: text
    content: Jehoram’s brothers—the other sons of Jehoshaphat—were Azariah, Jehiel, Zechariah, Azariahu, Michael, and Shephatiah; all these were the sons of Jehoshaphat king of Judah.
  - type: note
    content: Masoretic Text reads of Israel; also in 21:4. The author of Chronicles sees Judah as representative of the true Israel. (Some Hebrew manuscripts, Greek and Syriac versions, and Latin Vulgate read of Judah.)
  - type: text
    content: ' '
  '20':
  - type: text
    content: Jehoram was thirty-two years old when he became king, and he reigned in Jerusalem eight years. No one was sorry when he died. They buried him in the City of David, but not in the royal cemetery.
  '3':
  - type: text
    content: 'Their father had given each of them valuable gifts of silver, gold, and costly items, and also some of Judah’s fortified towns. However, he designated Jehoram as the next king because he was the oldest. '
  '4':
  - type: text
    content: But when Jehoram had become solidly established as king, he killed all his brothers and some of the other leaders of Judah.
  '5':
  - type: text
    content: 'Jehoram was thirty-two years old when he became king, and he reigned in Jerusalem eight years. '
  '6':
  - type: text
    content: 'But Jehoram followed the example of the kings of Israel and was as wicked as King Ahab, for he had married one of Ahab’s daughters. So Jehoram did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight. '
  '7':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' did not want to destroy David’s dynasty, for he had made a covenant with David and promised that his descendants would continue to rule, shining like a lamp forever.'
  '8':
  - type: text
    content: 'During Jehoram’s reign, the Edomites revolted against Judah and crowned their own king. '
  '9':
  - type: text
    content: So Jehoram went out with his full army and all his chariots. The Edomites surrounded him and his chariot commanders, but he went out at night and attacked them
  - type: note
    content: Or he went out and escaped. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' under cover of darkness. '
