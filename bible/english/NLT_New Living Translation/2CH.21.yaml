document_id: 2CH.21,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoram Rules in Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: When Jehoshaphat died, he was buried with his ancestors in the City of David. Then his son Jehoram became the next king.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Even so, Edom has been independent from Judah to this day. The town of Libnah also revolted about that same time. All this happened because Jehoram had abandoned the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of his ancestors. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He had built pagan shrines in the hill country of Judah and had led the people of Jerusalem and Judah to give themselves to pagan gods and to go astray.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then Elijah the prophet wrote Jehoram this letter:'
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your ancestor David, says: You have not followed the good example of your father, Jehoshaphat, or your grandfather King Asa of Judah. '
  '13':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Instead, you have been as evil as the kings of Israel. You have led the people of Jerusalem and Judah to worship idols, just as King Ahab did in Israel. And you have even killed your own brothers, men who were better than you. '
  '14':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is about to strike you, your people, your children, your wives, and all that is yours with a heavy blow. '
  '15':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: You yourself will suffer with a severe intestinal disease that will get worse each day until your bowels come out.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' stirred up the Philistines and the Arabs, who lived near the Ethiopians,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Cushites.
      marker-yv: yv-n
    - type: text
      text: ' to attack Jehoram. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: They marched against Judah, broke down its defenses, and carried away everything of value in the royal palace, including the king’s sons and his wives. Only his youngest son, Ahaziah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jehoahaz, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Ahaziah; compare 22:1.
      marker-yv: yv-n
    - type: text
      text: ' was spared.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'After all this, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' struck Jehoram with an incurable intestinal disease. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The disease grew worse and worse, and at the end of two years it caused his bowels to come out, and he died in agony. His people did not build a great funeral fire to honor him as they had done for his ancestors.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Jehoram’s brothers—the other sons of Jehoshaphat—were Azariah, Jehiel, Zechariah, Azariahu, Michael, and Shephatiah; all these were the sons of Jehoshaphat king of Judah.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of Israel; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'also in 21:4. The author of Chronicles sees Judah as representative of the true Israel. (Some Hebrew manuscripts, Greek and Syriac versions, and Latin Vulgate read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of Judah.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: )
      marker-yv: yv-n
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Jehoram was thirty-two years old when he became king, and he reigned in Jerusalem eight years. No one was sorry when he died. They buried him in the City of David, but not in the royal cemetery.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Their father had given each of them valuable gifts of silver, gold, and costly items, and also some of Judah’s fortified towns. However, he designated Jehoram as the next king because he was the oldest. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But when Jehoram had become solidly established as king, he killed all his brothers and some of the other leaders of Judah.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jehoram was thirty-two years old when he became king, and he reigned in Jerusalem eight years. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But Jehoram followed the example of the kings of Israel and was as wicked as King Ahab, for he had married one of Ahab’s daughters. So Jehoram did what was evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did not want to destroy David’s dynasty, for he had made a covenant with David and promised that his descendants would continue to rule, shining like a lamp forever.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'During Jehoram’s reign, the Edomites revolted against Judah and crowned their own king. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: So Jehoram went out with his full army and all his chariots. The Edomites surrounded him and his chariot commanders, but he went out at night and attacked them
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'he went out and escaped. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' under cover of darkness. '
