document_id: JHN.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus, the Way to the Father
  - type: text
    content: ' '
  - type: text
    content: “Don’t let your hearts be troubled. Trust in God, and trust also in me.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Don’t you believe that I am in the Father and the Father is in me? The words I speak are not my own, but my Father who lives in me does his work through me.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Just believe that I am in the Father and the Father is in me. Or at least believe because of the work you have seen me do.
  '12':
  - type: text
    content: ' '
  - type: text
    content: “I tell you the truth, anyone who believes in me will do the same works I have done, and even greater works, because I am going to be with the Father.
  - type: text
    content: ' '
  '13':
  - type: text
    content: You can ask for anything in my name, and I will do it, so that the Son can bring glory to the Father.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Yes, ask me for anything in my name, and I will do it!
  - type: heading
    content: Jesus Promises the Holy Spirit
  '15':
  - type: text
    content: ' '
  - type: text
    content: “If you love me, obey
  - type: text
    content: ' '
  - type: note
    content: Other manuscripts read you will obey; still others read you should obey.
  - type: text
    content: my commandments.
  - type: text
    content: ' '
  '16':
  - type: text
    content: And I will ask the Father, and he will give you another Advocate,
  - type: note
    content: Or Comforter, or Encourager, or Counselor. Greek reads Paraclete; also in 14:26.
  - type: text
    content: ' '
  - type: text
    content: who will never leave you.
  - type: text
    content: ' '
  '17':
  - type: text
    content: He is the Holy Spirit, who leads into all truth. The world cannot receive him, because it isn’t looking for him and doesn’t recognize him. But you know him, because he lives with you now and later will be in you.
  - type: note
    content: Some manuscripts read and is in you.
  - type: text
    content: ' '
  '18':
  - type: text
    content: No, I will not abandon you as orphans—I will come to you.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Soon the world will no longer see me, but you will see me. Since I live, you also will live.
  - type: text
    content: ' '
  '2':
  - type: text
    content: There is more than enough room in my Father’s home.
  - type: note
    content: Or There are many rooms in my Father’s house.
  - type: text
    content: ' '
  - type: text
    content: If this were not so, would I have told you that I am going to prepare a place for you?
  - type: note
    content: Or If this were not so, I would have told you that I am going to prepare a place for you. Some manuscripts read If this were not so, I would have told you. I am going to prepare a place for you.
  - type: text
    content: ' '
  '20':
  - type: text
    content: When I am raised to life again, you will know that I am in my Father, and you are in me, and I am in you.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Those who accept my commandments and obey them are the ones who love me. And because they love me, my Father will love them. And I will love them and reveal myself to each of them.”
  '22':
  - type: text
    content: Judas (not Judas Iscariot, but the other disciple with that name) said to him, “Lord, why are you going to reveal yourself only to us and not to the world at large?”
  '23':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “All who love me will do what I say. My Father will love them, and we will come and make our home with each of them.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Anyone who doesn’t love me will not obey me. And remember, my words are not my own. What I am telling you is from the Father who sent me.
  - type: text
    content: ' '
  '25':
  - type: text
    content: I am telling you these things now while I am still with you.
  - type: text
    content: ' '
  '26':
  - type: text
    content: But when the Father sends the Advocate as my representative—that is, the Holy Spirit—he will teach you everything and will remind you of everything I have told you.
  '27':
  - type: text
    content: ' '
  - type: text
    content: “I am leaving you with a gift—peace of mind and heart. And the peace I give is a gift the world cannot give. So don’t be troubled or afraid.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Remember what I told you: I am going away, but I will come back to you again. If you really loved me, you would be happy that I am going to the Father, who is greater than I am.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: I have told you these things before they happen so that when they do happen, you will believe.
  '3':
  - type: text
    content: When everything is ready, I will come and get you, so that you will always be with me where I am.
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: text
    content: “I don’t have much more time to talk to you, because the ruler of this world approaches. He has no power over me,
  - type: text
    content: ' '
  '31':
  - type: text
    content: but I will do what the Father requires of me, so that the world will know that I love the Father. Come, let’s be going.
  '4':
  - type: text
    content: And you know the way to where I am going.”
  '5':
  - type: text
    content: “No, we don’t know, Lord,” Thomas said. “We have no idea where you are going, so how can we know the way?”
  '6':
  - type: text
    content: 'Jesus told him, '
  - type: text
    content: “I am the way, the truth, and the life. No one can come to the Father except through me.
  - type: text
    content: ' '
  '7':
  - type: text
    content: If you had really known me, you would know who my Father is.
  - type: note
    content: Some manuscripts read If you have really known me, you will know who my Father is.
  - type: text
    content: ' '
  - type: text
    content: From now on, you do know him and have seen him!”
  '8':
  - type: text
    content: Philip said, “Lord, show us the Father, and we will be satisfied.”
  '9':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Have I been with you all this time, Philip, and yet you still don’t know who I am? Anyone who has seen me has seen the Father! So why are you asking me to show him to you?
  - type: text
    content: ' '
