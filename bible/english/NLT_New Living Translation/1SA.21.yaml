document_id: 1SA.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David Runs from Saul
  - type: text
    content: ' '
  - type: note
    content: Verses 21:1-15 are numbered 21:2-16 in Hebrew text.
  - type: text
    content: David went to the town of Nob to see Ahimelech the priest. Ahimelech trembled when he saw him. “Why are you alone?” he asked. “Why is no one with you?”
  '10':
  - type: text
    content: 'So David escaped from Saul and went to King Achish of Gath. '
  '11':
  - type: text
    content: But the officers of Achish were unhappy about his being there. “Isn’t this David, the king of the land?” they asked. “Isn’t he the one the people honor with dances, singing,
  - type: text
    content: ‘Saul has killed his thousands,
  - type: text
    content: and David his ten thousands’?”
  '12':
  - type: text
    content: 'David heard these comments and was very afraid of what King Achish of Gath might do to him. '
  '13':
  - type: text
    content: So he pretended to be insane, scratching on doors and drooling down his beard.
  '14':
  - type: text
    content: 'Finally, King Achish said to his men, “Must you bring me a madman? '
  '15':
  - type: text
    content: We already have enough of them around here! Why should I let someone like this be my guest?”
  '2':
  - type: text
    content: '“The king has sent me on a private matter,” David said. “He told me not to tell anyone why I am here. I have told my men where to meet me later. '
  '3':
  - type: text
    content: Now, what is there to eat? Give me five loaves of bread or anything else you have.”
  '4':
  - type: text
    content: “We don’t have any regular bread,” the priest replied. “But there is the holy bread, which you can have if your young men have not slept with any women recently.”
  '5':
  - type: text
    content: “Don’t worry,” David replied. “I never allow my men to be with women when we are on a campaign. And since they stay clean even on ordinary trips, how much more on this one!”
  '6':
  - type: text
    content: 'Since there was no other food available, the priest gave him the holy bread—the Bread of the Presence that was placed before the '
  - type: text
    content: Lord
  - type: text
    content: ' in the Tabernacle. It had just been replaced that day with fresh bread.'
  '7':
  - type: text
    content: 'Now Doeg the Edomite, Saul’s chief herdsman, was there that day, having been detained before the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: The meaning of the Hebrew is uncertain.
  '8':
  - type: text
    content: David asked Ahimelech, “Do you have a spear or sword? The king’s business was so urgent that I didn’t even have time to grab a weapon!”
  '9':
  - type: text
    content: “I only have the sword of Goliath the Philistine, whom you killed in the valley of Elah,” the priest replied. “It is wrapped in a cloth behind the ephod. Take that if you want it, for there is nothing else here.”
  - type: text
    content: “There is nothing like it!” David replied. “Give it to me!”
