  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Runs from Saul
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 21:1-15 are numbered 21:2-16 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: David went to the town of Nob to see Ahimelech the priest. Ahimelech trembled when he saw him. “Why are you alone?” he asked. “Why is no one with you?”
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So David escaped from Saul and went to King Achish of Gath. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But the officers of Achish were unhappy about his being there. “Isn’t this David, the king of the land?” they asked. “Isn’t he the one the people honor with dances, singing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Saul has killed his thousands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and David his ten thousands’?”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'David heard these comments and was very afraid of what King Achish of Gath might do to him. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: So he pretended to be insane, scratching on doors and drooling down his beard.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Finally, King Achish said to his men, “Must you bring me a madman? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: We already have enough of them around here! Why should I let someone like this be my guest?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“The king has sent me on a private matter,” David said. “He told me not to tell anyone why I am here. I have told my men where to meet me later. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Now, what is there to eat? Give me five loaves of bread or anything else you have.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “We don’t have any regular bread,” the priest replied. “But there is the holy bread, which you can have if your young men have not slept with any women recently.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Don’t worry,” David replied. “I never allow my men to be with women when we are on a campaign. And since they stay clean even on ordinary trips, how much more on this one!”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Since there was no other food available, the priest gave him the holy bread—the Bread of the Presence that was placed before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the Tabernacle. It had just been replaced that day with fresh bread.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Now Doeg the Edomite, Saul’s chief herdsman, was there that day, having been detained before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: David asked Ahimelech, “Do you have a spear or sword? The king’s business was so urgent that I didn’t even have time to grab a weapon!”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “I only have the sword of Goliath the Philistine, whom you killed in the valley of Elah,” the priest replied. “It is wrapped in a cloth behind the ephod. Take that if you want it, for there is nothing else here.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “There is nothing like it!” David replied. “Give it to me!”
