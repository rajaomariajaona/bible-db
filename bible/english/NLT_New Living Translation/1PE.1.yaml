document_id: 1PE.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greetings from Peter
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: This letter is from Peter, an apostle of Jesus Christ.
- type: usfm
  marker: p
  children:
  - type: text
    text: I am writing to God’s chosen people who are living as foreigners in the provinces of Pontus, Galatia, Cappadocia, Asia, and Bithynia.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Pontus, Galatia, Cappadocia, Asia, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'and '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Bithynia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: were Roman provinces in what is now Turkey.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: God the Father knew you and chose you long ago, and his Spirit has made you holy. As a result, you have obeyed him and have been cleansed by the blood of Jesus Christ.
- type: usfm
  marker: p
  children:
  - type: text
    text: May God give you more and more grace and peace.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Hope of Eternal Life
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'All praise to God, the Father of our Lord Jesus Christ. It is by his great mercy that we have been born again, because God raised Jesus Christ from the dead. Now we live with great expectation, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and we have a priceless inheritance—an inheritance that is kept in heaven for you, pure and undefiled, beyond the reach of change and decay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And through your faith, God is protecting you by his power until you receive this salvation, which is ready to be revealed on the last day for all to see.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So be truly glad.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: So you are truly glad.
    marker-yv: yv-n
  - type: text
    text: ' There is wonderful joy ahead, even though you must endure many trials for a little while. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: These trials will show that your faith is genuine. It is being tested as fire tests and purifies gold—though your faith is far more precious than mere gold. So when your faith remains strong through many trials, it will bring you much praise and glory and honor on the day when Jesus Christ is revealed to the whole world.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'You love him even though you have never seen him. Though you do not see him now, you trust him; and you rejoice with a glorious, inexpressible joy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The reward for trusting him will be the salvation of your souls.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'This salvation was something even the prophets wanted to know more about when they prophesied about this gracious salvation prepared for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They wondered what time or situation the Spirit of Christ within them was talking about when he told them in advance about Christ’s suffering and his great glory afterward.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They were told that their messages were not for themselves, but for you. And now this Good News has been announced to you by those who preached in the power of the Holy Spirit sent from heaven. It is all so wonderful that even the angels are eagerly watching these things happen.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Call to Holy Living
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So prepare your minds for action and exercise self-control. Put all your hope in the gracious salvation that will come to you when Jesus Christ is revealed to the world. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So you must live as God’s obedient children. Don’t slip back into your old ways of living to satisfy your own desires. You didn’t know any better then. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But now you must be holy in everything you do, just as God who chose you is holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For the Scriptures say, “You must be holy because I am holy.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lev 11:44-45; 19:2; 20:7.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And remember that the heavenly Father to whom you pray has no favorites. He will judge or reward you according to what you do. So you must live in reverent fear of him during your time here as “temporary residents.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For you know that God paid a ransom to save you from the empty life you inherited from your ancestors. And it was not paid with mere gold or silver, which lose their value. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'It was the precious blood of Christ, the sinless, spotless Lamb of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: God chose him as your ransom long before the world began, but now in these last days he has been revealed for your sake.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Through Christ you have come to trust in God. And you have placed your faith and hope in God because he raised Christ from the dead and gave him great glory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: You were cleansed from your sins when you obeyed the truth, so now you must show sincere love to each other as brothers and sisters.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:22a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: must have brotherly love.
    marker-yv: yv-n
  - type: text
    text: ' Love each other deeply with all your heart.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:22b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: with a pure heart.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For you have been born again, but not to a life that will quickly end. Your new life will last forever because it comes from the eternal, living word of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: As the Scriptures say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “People are like grass;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their beauty is like a flower in the field.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The grass withers and the flower fades.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: But the word of the Lord remains forever.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:24-25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 40:6-8.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: text
    text: And that word is the Good News that was preached to you.
