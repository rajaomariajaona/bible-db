document_id: PSA.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', how long will you forget me? Forever?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will you look the other way?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long must I struggle with anguish in my soul,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with sorrow in my heart every day?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will my enemy have the upper hand?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Turn and answer me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Restore the sparkle to my eyes, or I will die.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let my enemies gloat, saying, “We have defeated him!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t let them rejoice at my downfall.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I trust in your unfailing love.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will rejoice because you have rescued me.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because he is good to me.
