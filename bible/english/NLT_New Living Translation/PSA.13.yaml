document_id: PSA.13
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', how long will you forget me? Forever?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: How long will you look the other way?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: How long must I struggle with anguish in my soul,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with sorrow in my heart every day?
- type: usfm
  marker: q2
  children:
  - type: text
    text: How long will my enemy have the upper hand?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Turn and answer me, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Restore the sparkle to my eyes, or I will die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Don’t let my enemies gloat, saying, “We have defeated him!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t let them rejoice at my downfall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But I trust in your unfailing love.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will rejoice because you have rescued me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I will sing to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: because he is good to me.
