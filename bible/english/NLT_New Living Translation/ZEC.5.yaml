verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Flying Scroll
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I looked up again and saw a scroll flying through the air.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Where are they taking the basket?” I asked the angel.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He replied, “To the land of Babylonia,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the land of Shinar.
      marker-yv: yv-n
    - type: text
      text: ' where they will build a temple for the basket. And when the temple is ready, they will set the basket there on its pedestal.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “What do you see?” the angel asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I see a flying scroll,” I replied. “It appears to be about 30 feet long and 15 feet wide.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[9.2 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long and 10 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[4.6 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wide.
      marker-yv: yv-n
    - type: text
      text: ”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then he said to me, “This scroll contains the curse that is going out over the entire land. One side of the scroll says that those who steal will be banished from the land; the other side says that those who swear falsely will be banished from the land. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies says: I am sending this curse into the house of every thief and into the house of everyone who swears falsely using my name. And my curse will remain in that house and completely destroy it—even its timbers and stones.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Woman in a Basket
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then the angel who was talking with me came forward and said, “Look up and see what’s coming.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “What is it?” I asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: He replied, “It is a basket for measuring grain,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'an ephah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[20 quarts or 22 liters]; also in 5:7, 8, 9, 10, 11.'
      marker-yv: yv-n
    - type: text
      text: ' and it’s filled with the sins'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the appearance.
      marker-yv: yv-n
    - type: text
      text: ' of everyone throughout the land.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then the heavy lead cover was lifted off the basket, and there was a woman sitting inside it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The angel said, “The woman’s name is Wickedness,” and he pushed her back into the basket and closed the heavy lid again.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then I looked up and saw two women flying toward us, gliding on the wind. They had wings like a stork, and they picked up the basket and flew into the sky.
