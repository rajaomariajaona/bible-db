document_id: ZEC.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Flying Scroll
  - type: text
    content: I looked up again and saw a scroll flying through the air.
  '10':
  - type: text
    content: “Where are they taking the basket?” I asked the angel.
  '11':
  - type: text
    content: He replied, “To the land of Babylonia,
  - type: note
    content: Hebrew the land of Shinar.
  - type: text
    content: ' where they will build a temple for the basket. And when the temple is ready, they will set the basket there on its pedestal.”'
  '2':
  - type: text
    content: “What do you see?” the angel asked.
  - type: text
    content: “I see a flying scroll,” I replied. “It appears to be about 30 feet long and 15 feet wide.
  - type: note
    content: Hebrew 20 cubits [9.2 meters] long and 10 cubits [4.6 meters] wide.
  - type: text
    content: ”
  '3':
  - type: text
    content: 'Then he said to me, “This scroll contains the curse that is going out over the entire land. One side of the scroll says that those who steal will be banished from the land; the other side says that those who swear falsely will be banished from the land. '
  '4':
  - type: text
    content: 'And this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: I am sending this curse into the house of every thief and into the house of everyone who swears falsely using my name. And my curse will remain in that house and completely destroy it—even its timbers and stones.”'
  - type: heading
    content: A Woman in a Basket
  '5':
  - type: text
    content: Then the angel who was talking with me came forward and said, “Look up and see what’s coming.”
  '6':
  - type: text
    content: “What is it?” I asked.
  - type: text
    content: He replied, “It is a basket for measuring grain,
  - type: note
    content: Hebrew an ephah [20 quarts or 22 liters]; also in 5:7, 8, 9, 10, 11.
  - type: text
    content: ' and it’s filled with the sins'
  - type: note
    content: As in Greek version; Hebrew reads the appearance.
  - type: text
    content: ' of everyone throughout the land.”'
  '7':
  - type: text
    content: 'Then the heavy lead cover was lifted off the basket, and there was a woman sitting inside it. '
  '8':
  - type: text
    content: The angel said, “The woman’s name is Wickedness,” and he pushed her back into the basket and closed the heavy lid again.
  '9':
  - type: text
    content: Then I looked up and saw two women flying toward us, gliding on the wind. They had wings like a stork, and they picked up the basket and flew into the sky.
