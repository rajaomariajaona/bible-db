document_id: REV.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Worship in Heaven
  - type: text
    content: 'Then as I looked, I saw a door standing open in heaven, and the same voice I had heard before spoke to me like a trumpet blast. The voice said, '
  - type: text
    content: “Come up here, and I will show you what must happen after this.”
  - type: text
    content: ' '
  '10':
  - type: text
    content: the twenty-four elders fall down and worship the one sitting on the throne (the one who lives forever and ever). And they lay their crowns before the throne and say,
  '11':
  - type: text
    content: “You are worthy, O Lord our God,
  - type: text
    content: to receive glory and honor and power.
  - type: text
    content: For you created all things,
  - type: text
    content: and they exist because you created what you pleased.”
  '2':
  - type: text
    content: And instantly I was in the Spirit,
  - type: note
    content: Or in spirit.
  - type: text
    content: ' and I saw a throne in heaven and someone sitting on it. '
  '3':
  - type: text
    content: 'The one sitting on the throne was as brilliant as gemstones—like jasper and carnelian. And the glow of an emerald circled his throne like a rainbow. '
  '4':
  - type: text
    content: 'Twenty-four thrones surrounded him, and twenty-four elders sat on them. They were all clothed in white and had gold crowns on their heads. '
  '5':
  - type: text
    content: From the throne came flashes of lightning and the rumble of thunder. And in front of the throne were seven torches with burning flames. This is the sevenfold Spirit
  - type: note
    content: Greek They are the seven spirits.
  - type: text
    content: ' of God. '
  '6':
  - type: text
    content: In front of the throne was a shiny sea of glass, sparkling like crystal.
  - type: text
    content: 'In the center and around the throne were four living beings, each covered with eyes, front and back. '
  '7':
  - type: text
    content: 'The first of these living beings was like a lion; the second was like an ox; the third had a human face; and the fourth was like an eagle in flight. '
  '8':
  - type: text
    content: Each of these living beings had six wings, and their wings were covered all over with eyes, inside and out. Day after day and night after night they keep on saying,
  - type: text
    content: “Holy, holy, holy is the Lord God, the Almighty—
  - type: text
    content: the one who always was, who is, and who is still to come.”
  '9':
  - type: text
    content: 'Whenever the living beings give glory and honor and thanks to the one sitting on the throne (the one who lives forever and ever), '
