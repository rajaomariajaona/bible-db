document_id: REV.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Worship in Heaven
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then as I looked, I saw a door standing open in heaven, and the same voice I had heard before spoke to me like a trumpet blast. The voice said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Come up here, and I will show you what must happen after this.”
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: the twenty-four elders fall down and worship the one sitting on the throne (the one who lives forever and ever). And they lay their crowns before the throne and say,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You are worthy, O Lord our God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to receive glory and honor and power.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you created all things,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they exist because you created what you pleased.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And instantly I was in the Spirit,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in spirit.
      marker-yv: yv-n
    - type: text
      text: ' and I saw a throne in heaven and someone sitting on it. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The one sitting on the throne was as brilliant as gemstones—like jasper and carnelian. And the glow of an emerald circled his throne like a rainbow. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Twenty-four thrones surrounded him, and twenty-four elders sat on them. They were all clothed in white and had gold crowns on their heads. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: From the throne came flashes of lightning and the rumble of thunder. And in front of the throne were seven torches with burning flames. This is the sevenfold Spirit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: They are the seven spirits.
      marker-yv: yv-n
    - type: text
      text: ' of God. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: In front of the throne was a shiny sea of glass, sparkling like crystal.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the center and around the throne were four living beings, each covered with eyes, front and back. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The first of these living beings was like a lion; the second was like an ox; the third had a human face; and the fourth was like an eagle in flight. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Each of these living beings had six wings, and their wings were covered all over with eyes, inside and out. Day after day and night after night they keep on saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Holy, holy, holy is the Lord God, the Almighty—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the one who always was, who is, and who is still to come.”
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Whenever the living beings give glory and honor and thanks to the one sitting on the throne (the one who lives forever and ever), '
