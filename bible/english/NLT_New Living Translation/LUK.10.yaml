document_id: LUK.10,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Sends Out His Disciples
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The Lord now chose seventy-two
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'seventy; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 10:17.
      marker-yv: yv-n
    - type: text
      text: ' other disciples and sent them ahead in pairs to all the towns and places he planned to visit. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But if a town refuses to welcome you, go out into its streets and say,
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘We wipe even the dust of your town from our feet to show that we have abandoned you to your fate. And know this—the Kingdom of God is near!’
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I assure you, even wicked Sodom will be better off than such a town on judgment day.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What sorrow awaits you, Korazin and Bethsaida! For if the miracles I did in you had been done in wicked Tyre and Sidon, their people would have repented of their sins long ago, clothing themselves in burlap and throwing ashes on their heads to show their remorse.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yes, Tyre and Sidon will be better off on judgment day than you.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And you people of Capernaum, will you be honored in heaven? No, you will go down to the place of the dead.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to Hades.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then he said to the disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Anyone who accepts your message is also accepting me. And anyone who rejects you is rejecting me. And anyone who rejects me is rejecting God, who sent me.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: When the seventy-two disciples returned, they joyfully reported to him, “Lord, even the demons obey us when we use your name!”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Yes,” '
    - type: text
      text: 'he told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I saw Satan fall from heaven like lightning!
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Look, I have given you authority over all the power of the enemy, and you can walk among snakes and scorpions and crush them. Nothing will injure you.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'These were his instructions to them: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The harvest is great, but the workers are few. So pray to the Lord who is in charge of the harvest; ask him to send more workers into his fields.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But don’t rejoice because evil spirits obey you; rejoice because your names are registered in heaven.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus’ Prayer of Thanksgiving
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'At that same time Jesus was filled with the joy of the Holy Spirit, and he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “O Father, Lord of heaven and earth, thank you for hiding these things from those who think themselves wise and clever, and for revealing them to the childlike. Yes, Father, it pleased you to do it this way.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My Father has entrusted everything to me. No one truly knows the Son except the Father, and no one truly knows the Father except the Son and those to whom the Son chooses to reveal him.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Then when they were alone, he turned to the disciples and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Blessed are the eyes that see what you have seen.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you, many prophets and kings longed to see what you see, but they didn’t see it. And they longed to hear what you hear, but they didn’t hear it.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Most Important Commandment
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'One day an expert in religious law stood up to test Jesus by asking him this question: “Teacher, what should I do to inherit eternal life?”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What does the law of Moses say? How do you read it?”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The man answered, “‘You must love the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God with all your heart, all your soul, all your strength, and all your mind.’ And, ‘Love your neighbor as yourself.’”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut 6:5; Lev 19:18.
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Right!” '
    - type: text
      text: 'Jesus told him. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do this and you will live!”
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The man wanted to justify his actions, so he asked Jesus, “And who is my neighbor?”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parable of the Good Samaritan
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now go, and remember that I am sending you out as lambs among wolves.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Jesus replied with a story: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “A Jewish man was traveling from Jerusalem down to Jericho, and he was attacked by bandits. They stripped him of his clothes, beat him up, and left him half dead beside the road.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “By chance a priest came along. But when he saw the man lying there, he crossed to the other side of the road and passed him by.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A Temple assistant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: A Levite.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: walked over and looked at him lying there, but he also passed by on the other side.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then a despised Samaritan came along, and when he saw the man, he felt compassion for him.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Going over to him, the Samaritan soothed his wounds with olive oil and wine and bandaged them. Then he put the man on his own donkey and took him to an inn, where he took care of him.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The next day he handed the innkeeper two silver coins,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'two denarii. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A denarius was equivalent to a laborer’s full day’s wage.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: telling him, ‘Take care of this man. If his bill runs higher than this, I’ll pay you the next time I’m here.’
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Now which of these three would you say was a neighbor to the man who was attacked by bandits?” '
    - type: text
      text: Jesus asked.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: The man replied, “The one who showed him mercy.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Yes, now go and do the same.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Visits Martha and Mary
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'As Jesus and the disciples continued on their way to Jerusalem, they came to a certain village where a woman named Martha welcomed him into her home. '
  '39':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Her sister, Mary, sat at the Lord’s feet, listening to what he taught. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Don’t take any money with you, nor a traveler’s bag, nor an extra pair of sandals. And don’t stop to greet anyone on the road.
  '40':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: But Martha was distracted by the big dinner she was preparing. She came to Jesus and said, “Lord, doesn’t it seem unfair to you that my sister just sits here while I do all the work? Tell her to come and help me.”
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'But the Lord said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My dear Martha, you are worried and upset over all these details!
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: There is only one thing worth being concerned about. Mary has discovered it, and it will not be taken away from her.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Whenever you enter someone’s home, first say, ‘May God’s peace be on this house.’
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If those who live there are peaceful, the blessing will stand; if they are not, the blessing will return to you.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Don’t move around from home to home. Stay in one place, eating and drinking what they provide. Don’t hesitate to accept hospitality, because those who work deserve their pay.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If you enter a town and it welcomes you, eat whatever is set before you.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Heal the sick, and tell them, ‘The Kingdom of God is near you now.’
    - type: text
      text: ' '
