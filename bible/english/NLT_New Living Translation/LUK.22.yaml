document_id: LUK.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judas Agrees to Betray Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The Festival of Unleavened Bread, which is also called Passover, was approaching. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The leading priests and teachers of religious law were plotting how to kill Jesus, but they were afraid of the people’s reaction.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Satan entered into Judas Iscariot, who was one of the twelve disciples, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and he went to the leading priests and captains of the Temple guard to discuss the best way to betray Jesus to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They were delighted, and they promised to give him money. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So he agreed and began looking for an opportunity to betray Jesus so they could arrest him when the crowds weren’t around.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Last Supper
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now the Festival of Unleavened Bread arrived, when the Passover lamb is sacrificed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jesus sent Peter and John ahead and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go and prepare the Passover meal, so we can eat it together.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Where do you want us to prepare it?” they asked him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “As soon as you enter Jerusalem, a man carrying a pitcher of water will meet you. Follow him. At the house he enters,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'say to the owner, ‘The Teacher asks: Where is the guest room where I can eat the Passover meal with my disciples?’'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He will take you upstairs to a large room that is already set up. That is where you should prepare our meal.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They went off to the city and found everything just as Jesus had said, and they prepared the Passover meal there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When the time came, Jesus and the apostles sat down together at the table.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: reclined together.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I have been very eager to eat this Passover meal with you before my suffering begins.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For I tell you now that I won’t eat this meal again until its meaning is fulfilled in the Kingdom of God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then he took a cup of wine and gave thanks to God for it. Then he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Take this and share it among yourselves.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For I will not drink wine again until the Kingdom of God has come.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He took some bread and gave thanks to God for it. Then he broke it in pieces and gave it to the disciples, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This is my body, which is given for you. Do this in remembrance of me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'After supper he took another cup of wine and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This cup is the new covenant between God and his people—an agreement confirmed with my blood, which is poured out as a sacrifice for you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:19-20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts do not include 22:19b-20, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: which is given for you . . . which is poured out as a sacrifice for you.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But here at this table, sitting among us as a friend, is the man who will betray me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For it has been determined that the Son of Man
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Son of Man” is a title Jesus used for himself.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: must die. But what sorrow awaits the one who betrays him.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The disciples began to ask each other which of them would ever do such a thing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then they began to argue among themselves about who would be the greatest among them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jesus told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “In this world the kings and great men lord it over their people, yet they are called ‘friends of the people.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But among you it will be different. Those who are the greatest among you should take the lowest rank, and the leader should be like a servant.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Who is more important, the one who sits at the table or the one who serves? The one who sits at the table, of course. But not here! For I am among you as one who serves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You have stayed with me in my time of trial.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And just as my Father has granted me a Kingdom, I now grant you the right
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to eat and drink at my table in my Kingdom. And you will sit on thrones, judging the twelve tribes of Israel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Predicts Peter’s Denial
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Simon, Simon, Satan has asked to sift each of you like wheat.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I have pleaded in prayer for you, Simon, that your faith should not fail. So when you have repented and turned to me again, strengthen your brothers.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Peter said, “Lord, I am ready to go to prison with you, and even to die with you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'But Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Peter, let me tell you something. Before the rooster crows tomorrow morning, you will deny three times that you even know me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then Jesus asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When I sent you out to preach the Good News and you did not have money, a traveler’s bag, or an extra pair of sandals, did you need anything?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “No,” they replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“But now,” '
  - type: text
    text: 'he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “take your money and a traveler’s bag. And if you don’t have a sword, sell your cloak and buy one!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For the time has come for this prophecy about me to be fulfilled: ‘He was counted among the rebels.’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 53:12.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Yes, everything written about me by the prophets will come true.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: “Look, Lord,” they replied, “we have two swords among us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“That’s enough,” '
  - type: text
    text: he said.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Prays on the Mount of Olives
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Then, accompanied by the disciples, Jesus left the upstairs room and went as usual to the Mount of Olives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'There he told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Pray that you will not give in to temptation.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'He walked away, about a stone’s throw, and knelt down and prayed, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Father, if you are willing, please take this cup of suffering away from me. Yet I want your will to be done, not mine.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Then an angel from heaven appeared and strengthened him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: He prayed more fervently, and he was in such agony of spirit that his sweat fell to the ground like great drops of blood.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:43-44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses 43 and 44 are not included in the most ancient manuscripts.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'At last he stood up again and returned to the disciples, only to find them asleep, exhausted from grief. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Why are you sleeping?” '
  - type: text
    text: 'he asked them. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Get up and pray, so that you will not give in to temptation.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Is Betrayed and Arrested
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'But even as Jesus said this, a crowd approached, led by Judas, one of the twelve disciples. Judas walked over to Jesus to greet him with a kiss. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'But Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Judas, would you betray the Son of Man with a kiss?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'When the other disciples saw what was about to happen, they exclaimed, “Lord, should we fight? We brought the swords!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: And one of them struck at the high priest’s slave, slashing off his right ear.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'But Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “No more of this.”
  - type: text
    text: ' And he touched the man’s ear and healed him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Then Jesus spoke to the leading priests, the captains of the Temple guard, and the elders who had come for him. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Am I some dangerous revolutionary,” '
  - type: text
    text: 'he asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “that you come with swords and clubs to arrest me?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Why didn’t you arrest me in the Temple? I was there every day. But this is your moment, the time when the power of darkness reigns.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter Denies Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'So they arrested him and led him to the high priest’s home. And Peter followed at a distance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'The guards lit a fire in the middle of the courtyard and sat around it, and Peter joined them there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: A servant girl noticed him in the firelight and began staring at him. Finally she said, “This man was one of Jesus’ followers!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: But Peter denied it. “Woman,” he said, “I don’t even know him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: After a while someone else looked at him and said, “You must be one of them!”
- type: usfm
  marker: p
  children:
  - type: text
    text: “No, man, I’m not!” Peter retorted.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: About an hour later someone else insisted, “This must be one of them, because he is a Galilean, too.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: But Peter said, “Man, I don’t know what you are talking about.” And immediately, while he was still speaking, the rooster crowed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'At that moment the Lord turned and looked at Peter. Suddenly, the Lord’s words flashed through Peter’s mind: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Before the rooster crows tomorrow morning, you will deny three times that you even know me.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: And Peter left the courtyard, weeping bitterly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'The guards in charge of Jesus began mocking and beating him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'They blindfolded him and said, “Prophesy to us! Who hit you that time?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: And they hurled all sorts of terrible insults at him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus before the Council
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: At daybreak all the elders of the people assembled, including the leading priests and the teachers of religious law. Jesus was led before this high council,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:66 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: before their Sanhedrin.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: and they said, “Tell us, are you the Messiah?”
- type: usfm
  marker: p
