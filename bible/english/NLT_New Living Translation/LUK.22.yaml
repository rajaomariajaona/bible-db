document_id: LUK.22,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judas Agrees to Betray Jesus
  - type: text
    content: 'The Festival of Unleavened Bread, which is also called Passover, was approaching. '
  '10':
  - type: text
    content: 'He replied, '
  - type: text
    content: “As soon as you enter Jerusalem, a man carrying a pitcher of water will meet you. Follow him. At the house he enters,
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'say to the owner, ‘The Teacher asks: Where is the guest room where I can eat the Passover meal with my disciples?’'
  - type: text
    content: ' '
  '12':
  - type: text
    content: He will take you upstairs to a large room that is already set up. That is where you should prepare our meal.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: They went off to the city and found everything just as Jesus had said, and they prepared the Passover meal there.
  '14':
  - type: text
    content: When the time came, Jesus and the apostles sat down together at the table.
  - type: note
    content: Or reclined together.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “I have been very eager to eat this Passover meal with you before my suffering begins.
  - type: text
    content: ' '
  '16':
  - type: text
    content: For I tell you now that I won’t eat this meal again until its meaning is fulfilled in the Kingdom of God.”
  '17':
  - type: text
    content: 'Then he took a cup of wine and gave thanks to God for it. Then he said, '
  - type: text
    content: “Take this and share it among yourselves.
  - type: text
    content: ' '
  '18':
  - type: text
    content: For I will not drink wine again until the Kingdom of God has come.”
  '19':
  - type: text
    content: 'He took some bread and gave thanks to God for it. Then he broke it in pieces and gave it to the disciples, saying, '
  - type: text
    content: “This is my body, which is given for you. Do this in remembrance of me.”
  '2':
  - type: text
    content: The leading priests and teachers of religious law were plotting how to kill Jesus, but they were afraid of the people’s reaction.
  '20':
  - type: text
    content: 'After supper he took another cup of wine and said, '
  - type: text
    content: “This cup is the new covenant between God and his people—an agreement confirmed with my blood, which is poured out as a sacrifice for you.
  - type: note
    content: Some manuscripts do not include 22:19b-20, which is given for you . . . which is poured out as a sacrifice for you.
  '21':
  - type: text
    content: ' '
  - type: text
    content: “But here at this table, sitting among us as a friend, is the man who will betray me.
  - type: text
    content: ' '
  '22':
  - type: text
    content: For it has been determined that the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: must die. But what sorrow awaits the one who betrays him.”
  - type: text
    content: ' '
  '23':
  - type: text
    content: The disciples began to ask each other which of them would ever do such a thing.
  '24':
  - type: text
    content: 'Then they began to argue among themselves about who would be the greatest among them. '
  '25':
  - type: text
    content: 'Jesus told them, '
  - type: text
    content: “In this world the kings and great men lord it over their people, yet they are called ‘friends of the people.’
  - type: text
    content: ' '
  '26':
  - type: text
    content: But among you it will be different. Those who are the greatest among you should take the lowest rank, and the leader should be like a servant.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Who is more important, the one who sits at the table or the one who serves? The one who sits at the table, of course. But not here! For I am among you as one who serves.
  '28':
  - type: text
    content: ' '
  - type: text
    content: “You have stayed with me in my time of trial.
  - type: text
    content: ' '
  '29':
  - type: text
    content: And just as my Father has granted me a Kingdom, I now grant you the right
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Then Satan entered into Judas Iscariot, who was one of the twelve disciples, '
  '30':
  - type: text
    content: to eat and drink at my table in my Kingdom. And you will sit on thrones, judging the twelve tribes of Israel.
  - type: heading
    content: Jesus Predicts Peter’s Denial
  '31':
  - type: text
    content: ' '
  - type: text
    content: “Simon, Simon, Satan has asked to sift each of you like wheat.
  - type: text
    content: ' '
  '32':
  - type: text
    content: But I have pleaded in prayer for you, Simon, that your faith should not fail. So when you have repented and turned to me again, strengthen your brothers.”
  '33':
  - type: text
    content: Peter said, “Lord, I am ready to go to prison with you, and even to die with you.”
  '34':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “Peter, let me tell you something. Before the rooster crows tomorrow morning, you will deny three times that you even know me.”
  '35':
  - type: text
    content: 'Then Jesus asked them, '
  - type: text
    content: “When I sent you out to preach the Good News and you did not have money, a traveler’s bag, or an extra pair of sandals, did you need anything?”
  - type: text
    content: “No,” they replied.
  '36':
  - type: text
    content: ' '
  - type: text
    content: '“But now,” '
  - type: text
    content: 'he said, '
  - type: text
    content: “take your money and a traveler’s bag. And if you don’t have a sword, sell your cloak and buy one!
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'For the time has come for this prophecy about me to be fulfilled: ‘He was counted among the rebels.’'
  - type: note
    content: Isa 53:12.
  - type: text
    content: ' '
  - type: text
    content: Yes, everything written about me by the prophets will come true.”
  '38':
  - type: text
    content: “Look, Lord,” they replied, “we have two swords among us.”
  - type: text
    content: '“That’s enough,” '
  - type: text
    content: he said.
  - type: heading
    content: Jesus Prays on the Mount of Olives
  '39':
  - type: text
    content: 'Then, accompanied by the disciples, Jesus left the upstairs room and went as usual to the Mount of Olives. '
  '4':
  - type: text
    content: 'and he went to the leading priests and captains of the Temple guard to discuss the best way to betray Jesus to them. '
  '40':
  - type: text
    content: 'There he told them, '
  - type: text
    content: “Pray that you will not give in to temptation.”
  '41':
  - type: text
    content: 'He walked away, about a stone’s throw, and knelt down and prayed, '
  '42':
  - type: text
    content: “Father, if you are willing, please take this cup of suffering away from me. Yet I want your will to be done, not mine.”
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Then an angel from heaven appeared and strengthened him. '
  '44':
  - type: text
    content: He prayed more fervently, and he was in such agony of spirit that his sweat fell to the ground like great drops of blood.
  - type: note
    content: Verses 43 and 44 are not included in the most ancient manuscripts.
  '45':
  - type: text
    content: 'At last he stood up again and returned to the disciples, only to find them asleep, exhausted from grief. '
  '46':
  - type: text
    content: '“Why are you sleeping?” '
  - type: text
    content: 'he asked them. '
  - type: text
    content: “Get up and pray, so that you will not give in to temptation.”
  - type: heading
    content: Jesus Is Betrayed and Arrested
  '47':
  - type: text
    content: 'But even as Jesus said this, a crowd approached, led by Judas, one of the twelve disciples. Judas walked over to Jesus to greet him with a kiss. '
  '48':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “Judas, would you betray the Son of Man with a kiss?”
  '49':
  - type: text
    content: 'When the other disciples saw what was about to happen, they exclaimed, “Lord, should we fight? We brought the swords!” '
  '5':
  - type: text
    content: 'They were delighted, and they promised to give him money. '
  '50':
  - type: text
    content: And one of them struck at the high priest’s slave, slashing off his right ear.
  '51':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “No more of this.”
  - type: text
    content: ' And he touched the man’s ear and healed him.'
  '52':
  - type: text
    content: 'Then Jesus spoke to the leading priests, the captains of the Temple guard, and the elders who had come for him. '
  - type: text
    content: '“Am I some dangerous revolutionary,” '
  - type: text
    content: 'he asked, '
  - type: text
    content: “that you come with swords and clubs to arrest me?
  - type: text
    content: ' '
  '53':
  - type: text
    content: Why didn’t you arrest me in the Temple? I was there every day. But this is your moment, the time when the power of darkness reigns.”
  - type: heading
    content: Peter Denies Jesus
  '54':
  - type: text
    content: 'So they arrested him and led him to the high priest’s home. And Peter followed at a distance. '
  '55':
  - type: text
    content: 'The guards lit a fire in the middle of the courtyard and sat around it, and Peter joined them there. '
  '56':
  - type: text
    content: A servant girl noticed him in the firelight and began staring at him. Finally she said, “This man was one of Jesus’ followers!”
  '57':
  - type: text
    content: But Peter denied it. “Woman,” he said, “I don’t even know him!”
  '58':
  - type: text
    content: After a while someone else looked at him and said, “You must be one of them!”
  - type: text
    content: “No, man, I’m not!” Peter retorted.
  '59':
  - type: text
    content: About an hour later someone else insisted, “This must be one of them, because he is a Galilean, too.”
  '6':
  - type: text
    content: So he agreed and began looking for an opportunity to betray Jesus so they could arrest him when the crowds weren’t around.
  - type: heading
    content: The Last Supper
  '60':
  - type: text
    content: But Peter said, “Man, I don’t know what you are talking about.” And immediately, while he was still speaking, the rooster crowed.
  '61':
  - type: text
    content: 'At that moment the Lord turned and looked at Peter. Suddenly, the Lord’s words flashed through Peter’s mind: '
  - type: text
    content: “Before the rooster crows tomorrow morning, you will deny three times that you even know me.”
  - type: text
    content: ' '
  '62':
  - type: text
    content: And Peter left the courtyard, weeping bitterly.
  '63':
  - type: text
    content: 'The guards in charge of Jesus began mocking and beating him. '
  '64':
  - type: text
    content: 'They blindfolded him and said, “Prophesy to us! Who hit you that time?” '
  '65':
  - type: text
    content: And they hurled all sorts of terrible insults at him.
  - type: heading
    content: Jesus before the Council
  '66':
  - type: text
    content: At daybreak all the elders of the people assembled, including the leading priests and the teachers of religious law. Jesus was led before this high council,
  - type: note
    content: Greek before their Sanhedrin.
  - type: text
    content: ' '
  '67':
  - type: text
    content: and they said, “Tell us, are you the Messiah?”
  - type: text
    content: 'But he replied, '
  - type: text
    content: “If I tell you, you won’t believe me.
  - type: text
    content: ' '
  '68':
  - type: text
    content: And if I ask you a question, you won’t answer.
  - type: text
    content: ' '
  '69':
  - type: text
    content: But from now on the Son of Man will be seated in the place of power at God’s right hand.
  - type: note
    content: See Ps 110:1.
  - type: text
    content: ”
  '7':
  - type: text
    content: 'Now the Festival of Unleavened Bread arrived, when the Passover lamb is sacrificed. '
  '70':
  - type: text
    content: They all shouted, “So, are you claiming to be the Son of God?”
  - type: text
    content: 'And he replied, '
  - type: text
    content: “You say that I am.”
  '71':
  - type: text
    content: “Why do we need other witnesses?” they said. “We ourselves heard him say it.”
  '8':
  - type: text
    content: 'Jesus sent Peter and John ahead and said, '
  - type: text
    content: “Go and prepare the Passover meal, so we can eat it together.”
  '9':
  - type: text
    content: “Where do you want us to prepare it?” they asked him.
