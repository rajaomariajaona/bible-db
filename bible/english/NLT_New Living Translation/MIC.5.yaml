document_id: MIC.5,116
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Verse 5:1 is numbered 4:14 in Hebrew text.
  - type: text
    content: Mobilize! Marshal your troops!
  - type: text
    content: The enemy is laying siege to Jerusalem.
  - type: text
    content: They will strike Israel’s leader
  - type: text
    content: in the face with a rod.
  - type: heading
    content: A Ruler from Bethlehem
  '10':
  - type: text
    content: '“In that day,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “I will slaughter your horses
  - type: text
    content: and destroy your chariots.
  '11':
  - type: text
    content: I will tear down your walls
  - type: text
    content: and demolish your defenses.
  '12':
  - type: text
    content: I will put an end to all witchcraft,
  - type: text
    content: and there will be no more fortune-tellers.
  '13':
  - type: text
    content: I will destroy all your idols and sacred pillars,
  - type: text
    content: so you will never again worship the work of your own hands.
  '14':
  - type: text
    content: I will abolish your idol shrines with their Asherah poles
  - type: text
    content: and destroy your pagan cities.
  '15':
  - type: text
    content: I will pour out my vengeance
  - type: text
    content: on all the nations that refuse to obey me.”
  '2':
  - type: text
    content: ' '
  - type: note
    content: Verses 5:2-15 are numbered 5:1-14 in Hebrew text.
  - type: text
    content: But you, O Bethlehem Ephrathah,
  - type: text
    content: are only a small village among all the people of Judah.
  - type: text
    content: Yet a ruler of Israel,
  - type: text
    content: whose origins are in the distant past,
  - type: text
    content: will come from you on my behalf.
  '3':
  - type: text
    content: The people of Israel will be abandoned to their enemies
  - type: text
    content: until the woman in labor gives birth.
  - type: text
    content: Then at last his fellow countrymen
  - type: text
    content: will return from exile to their own land.
  '4':
  - type: text
    content: 'And he will stand to lead his flock with the '
  - type: text
    content: Lord
  - type: text
    content: ’s strength,
  - type: text
    content: 'in the majesty of the name of the '
  - type: text
    content: 'Lord '
  - type: text
    content: his God.
  - type: text
    content: Then his people will live there undisturbed,
  - type: text
    content: for he will be highly honored around the world.
  '5':
  - type: text
    content: And he will be the source of peace.
  - type: text
    content: When the Assyrians invade our land
  - type: text
    content: and break through our defenses,
  - type: text
    content: we will appoint seven rulers to watch over us,
  - type: text
    content: eight princes to lead us.
  '6':
  - type: text
    content: They will rule Assyria with drawn swords
  - type: text
    content: and enter the gates of the land of Nimrod.
  - type: text
    content: He will rescue us from the Assyrians
  - type: text
    content: when they pour over the borders to invade our land.
  - type: heading
    content: The Remnant Purified
  '7':
  - type: text
    content: Then the remnant left in Israel
  - type: note
    content: Hebrew in Jacob; also in 5:8. See note on 1:5a.
  - type: text
    content: will take their place among the nations.
  - type: text
    content: 'They will be like dew sent by the '
  - type: text
    content: Lord
  - type: text
    content: or like rain falling on the grass,
  - type: text
    content: which no one can hold back
  - type: text
    content: and no one can restrain.
  '8':
  - type: text
    content: The remnant left in Israel
  - type: text
    content: will take their place among the nations.
  - type: text
    content: They will be like a lion among the animals of the forest,
  - type: text
    content: like a strong young lion among flocks of sheep and goats,
  - type: text
    content: pouncing and tearing as they go
  - type: text
    content: with no rescuer in sight.
  '9':
  - type: text
    content: The people of Israel will stand up to their foes,
  - type: text
    content: and all their enemies will be wiped out.
