document_id: MIC.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verse 5:1 is numbered 4:14 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: Mobilize! Marshal your troops!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The enemy is laying siege to Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will strike Israel’s leader
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the face with a rod.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Ruler from Bethlehem
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“In that day,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will slaughter your horses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroy your chariots.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will tear down your walls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and demolish your defenses.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put an end to all witchcraft,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there will be no more fortune-tellers.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will destroy all your idols and sacred pillars,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so you will never again worship the work of your own hands.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will abolish your idol shrines with their Asherah poles
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroy your pagan cities.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will pour out my vengeance
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on all the nations that refuse to obey me.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 5:2-15 are numbered 5:1-14 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: But you, O Bethlehem Ephrathah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are only a small village among all the people of Judah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet a ruler of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose origins are in the distant past,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will come from you on my behalf.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people of Israel will be abandoned to their enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until the woman in labor gives birth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then at last his fellow countrymen
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will return from exile to their own land.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he will stand to lead his flock with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in the majesty of the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'Lord '
    - type: text
      text: his God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then his people will live there undisturbed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he will be highly honored around the world.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he will be the source of peace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the Assyrians invade our land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and break through our defenses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we will appoint seven rulers to watch over us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: eight princes to lead us.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will rule Assyria with drawn swords
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and enter the gates of the land of Nimrod.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will rescue us from the Assyrians
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they pour over the borders to invade our land.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Remnant Purified
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the remnant left in Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in Jacob; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 5:8. See note on 1:5a.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will take their place among the nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will be like dew sent by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or like rain falling on the grass,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: which no one can hold back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one can restrain.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The remnant left in Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will take their place among the nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be like a lion among the animals of the forest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a strong young lion among flocks of sheep and goats,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pouncing and tearing as they go
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with no rescuer in sight.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people of Israel will stand up to their foes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all their enemies will be wiped out.
