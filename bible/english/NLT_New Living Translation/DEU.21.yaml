document_id: DEU.21,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cleansing for Unsolved Murder
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“When you are in the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you, someone may be found murdered in a field, and you don’t know who committed the murder. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“Suppose you go out to war against your enemies and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God hands them over to you, and you take some of them as captives. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And suppose you see among the captives a beautiful woman, and you are attracted to her and want to marry her. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'If this happens, you may take her to your home, where she must shave her head, cut her nails, '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and change the clothes she was wearing when she was captured. She will stay in your home, but let her mourn for her father and mother for a full month. Then you may marry her, and you will be her husband and she will be your wife. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: But if you marry her and she does not please you, you must let her go free. You may not sell her or treat her as a slave, for you have humiliated her.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rights of the Firstborn
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“Suppose a man has two wives, but he loves one and not the other, and both have given him sons. And suppose the firstborn son is the son of the wife he does not love. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'When the man divides his inheritance, he may not give the larger inheritance to his younger son, the son of the wife he loves, as if he were the firstborn son. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: He must recognize the rights of his oldest son, the son of the wife he does not love, by giving him a double portion. He is the first son of his father’s virility, and the rights of the firstborn belong to him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dealing with a Rebellious Son
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Suppose a man has a stubborn and rebellious son who will not obey his father or mother, even though they discipline him. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'In such a case, the father and mother must take the son to the elders as they hold court at the town gate. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'In such a case, your elders and judges must measure the distance from the site of the crime to the nearby towns. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The parents must say to the elders, ‘This son of ours is stubborn and rebellious and refuses to obey. He is a glutton and a drunkard.’ '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then all the men of his town must stone him to death. In this way, you will purge this evil from among you, and all Israel will hear about it and be afraid.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Various Regulations
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “If someone has committed a crime worthy of death and is executed and hung on a tree,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'impaled on a pole; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly in 21:23.
      marker-yv: yv-n
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: the body must not remain hanging from the tree overnight. You must bury the body that same day, for anyone who is hung
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'for everyone who is hung on a tree. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Gal 3:13.
      marker-yv: yv-n
    - type: text
      text: ' is cursed in the sight of God. In this way, you will prevent the defilement of the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you as your special possession.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'When the nearest town has been determined, that town’s elders must select from the herd a heifer that has never been trained or yoked to a plow. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They must lead it down to a valley that has not been plowed or planted and that has a stream running through it. There in the valley they must break the heifer’s neck. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then the Levitical priests must step forward, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has chosen them to minister before him and to pronounce blessings in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s name. They are to decide all legal and criminal cases.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“The elders of the town must wash their hands over the heifer whose neck was broken. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then they must say, ‘Our hands did not shed this person’s blood, nor did we see it happen. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', forgive your people Israel whom you have redeemed. Do not charge your people with the guilt of murdering an innocent person.’ Then they will be absolved of the guilt of this person’s blood. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'By following these instructions, you will do what is right in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s sight and will cleanse the guilt of murder from your community.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Marriage to a Captive Woman
    marker-yv: yv-h
