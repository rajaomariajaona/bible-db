document_id: AMO.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Vision of God at the Altar
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then I saw a vision of the Lord standing beside the altar. He said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Strike the tops of the Temple columns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that the foundation will shake.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bring down the roof
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the heads of the people below.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will kill with the sword those who survive.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one will escape!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: But all the sinners will die by the sword—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all those who say, ‘Nothing bad will happen to us.’
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Promise of Restoration
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “In that day I will restore the fallen house
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:11a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'kingdom; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tent.
      marker-yv: yv-n
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will repair its damaged walls.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the ruins I will rebuild it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and restore its former glory.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And Israel will possess what is left of Edom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the nations I have called to be mine.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:11b-12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and restore its former glory, / so that the rest of humanity, including the Gentiles— / all those I have called to be mine—might seek me. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Acts 15:16-17.
      marker-yv: yv-n
    - type: text
      text: ”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will do these things.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“The time will come,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “when the grain and grapes will grow faster
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than they can be harvested.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the terraced vineyards on the hills of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will drip with sweet wine!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I will bring my exiled people of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: back from distant lands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they will rebuild their ruined cities
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and live in them again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will plant vineyards and gardens;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will eat their crops and drink their wine.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: I will firmly plant them there
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in their own land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will never again be uprooted
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the land I have given them,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Even if they dig down to the place of the dead,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to Sheol.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will reach down and pull them up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if they climb up into the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will bring them down.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Even if they hide at the very top of Mount Carmel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will search them out and capture them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if they hide at the bottom of the ocean,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will send the sea serpent after them to bite them.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Even if their enemies drive them into exile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will command the sword to kill them there.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am determined to bring disaster upon them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not to help them.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: touches the land and it melts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all its people mourn.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ground rises like the Nile River at floodtime,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then it sinks again.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s home reaches up to the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while its foundation is on the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He draws up water from the oceans
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pours it down as rain on the land.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is his name!'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Are you Israelites more important to me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than the Ethiopians?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:7a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Cushites?
      marker-yv: yv-n
    - type: text
      text: '” asks the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I brought Israel out of Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I also brought the Philistines from Crete
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:7b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Caphtor.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and led the Arameans out of Kir.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“I, the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: am watching this sinful nation of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will destroy it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the face of the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I will never completely destroy the family of Israel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the house of Jacob. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 3:13.
      marker-yv: yv-n
    - type: text
      text: ”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “For I will give the command
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will shake Israel along with the other nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as grain is shaken in a sieve,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet not one true kernel will be lost.
