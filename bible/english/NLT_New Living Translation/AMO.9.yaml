document_id: AMO.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Vision of God at the Altar
  - type: text
    content: Then I saw a vision of the Lord standing beside the altar. He said,
  - type: text
    content: “Strike the tops of the Temple columns,
  - type: text
    content: so that the foundation will shake.
  - type: text
    content: Bring down the roof
  - type: text
    content: on the heads of the people below.
  - type: text
    content: I will kill with the sword those who survive.
  - type: text
    content: No one will escape!
  '10':
  - type: text
    content: But all the sinners will die by the sword—
  - type: text
    content: all those who say, ‘Nothing bad will happen to us.’
  - type: heading
    content: A Promise of Restoration
  '11':
  - type: text
    content: “In that day I will restore the fallen house
  - type: note
    content: Or kingdom; Hebrew reads tent.
  - type: text
    content: ' of David.'
  - type: text
    content: I will repair its damaged walls.
  - type: text
    content: From the ruins I will rebuild it
  - type: text
    content: and restore its former glory.
  '12':
  - type: text
    content: And Israel will possess what is left of Edom
  - type: text
    content: and all the nations I have called to be mine.
  - type: note
    content: Greek version reads and restore its former glory, / so that the rest of humanity, including the Gentiles— / all those I have called to be mine—might seek me. Compare Acts 15:16-17.
  - type: text
    content: ”
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken,'
  - type: text
    content: and he will do these things.
  '13':
  - type: text
    content: '“The time will come,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “when the grain and grapes will grow faster
  - type: text
    content: than they can be harvested.
  - type: text
    content: Then the terraced vineyards on the hills of Israel
  - type: text
    content: will drip with sweet wine!
  '14':
  - type: text
    content: I will bring my exiled people of Israel
  - type: text
    content: back from distant lands,
  - type: text
    content: and they will rebuild their ruined cities
  - type: text
    content: and live in them again.
  - type: text
    content: They will plant vineyards and gardens;
  - type: text
    content: they will eat their crops and drink their wine.
  '15':
  - type: text
    content: I will firmly plant them there
  - type: text
    content: in their own land.
  - type: text
    content: They will never again be uprooted
  - type: text
    content: from the land I have given them,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '2':
  - type: text
    content: “Even if they dig down to the place of the dead,
  - type: note
    content: Hebrew to Sheol.
  - type: text
    content: I will reach down and pull them up.
  - type: text
    content: Even if they climb up into the heavens,
  - type: text
    content: I will bring them down.
  '3':
  - type: text
    content: Even if they hide at the very top of Mount Carmel,
  - type: text
    content: I will search them out and capture them.
  - type: text
    content: Even if they hide at the bottom of the ocean,
  - type: text
    content: I will send the sea serpent after them to bite them.
  '4':
  - type: text
    content: Even if their enemies drive them into exile,
  - type: text
    content: I will command the sword to kill them there.
  - type: text
    content: I am determined to bring disaster upon them
  - type: text
    content: and not to help them.”
  '5':
  - type: text
    content: 'The Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: touches the land and it melts,
  - type: text
    content: and all its people mourn.
  - type: text
    content: The ground rises like the Nile River at floodtime,
  - type: text
    content: and then it sinks again.
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s home reaches up to the heavens,
  - type: text
    content: while its foundation is on the earth.
  - type: text
    content: He draws up water from the oceans
  - type: text
    content: and pours it down as rain on the land.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is his name!'
  '7':
  - type: text
    content: “Are you Israelites more important to me
  - type: text
    content: than the Ethiopians?
  - type: note
    content: Hebrew the Cushites?
  - type: text
    content: '” asks the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “I brought Israel out of Egypt,
  - type: text
    content: but I also brought the Philistines from Crete
  - type: note
    content: Hebrew Caphtor.
  - type: text
    content: and led the Arameans out of Kir.
  '8':
  - type: text
    content: '“I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: am watching this sinful nation of Israel.
  - type: text
    content: I will destroy it
  - type: text
    content: from the face of the earth.
  - type: text
    content: But I will never completely destroy the family of Israel,
  - type: note
    content: Hebrew the house of Jacob. See note on 3:13.
  - type: text
    content: ”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: “For I will give the command
  - type: text
    content: and will shake Israel along with the other nations
  - type: text
    content: as grain is shaken in a sieve,
  - type: text
    content: yet not one true kernel will be lost.
