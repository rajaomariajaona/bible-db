document_id: GEN.2,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'So the creation of the heavens and the earth and everything in them was completed. '
  '10':
  - type: text
    content: 'A river flowed from the land of Eden, watering the garden and then dividing into four branches. '
  '11':
  - type: text
    content: 'The first branch, called the Pishon, flowed around the entire land of Havilah, where gold is found. '
  '12':
  - type: text
    content: 'The gold of that land is exceptionally pure; aromatic resin and onyx stone are also found there. '
  '13':
  - type: text
    content: 'The second branch, called the Gihon, flowed around the entire land of Cush. '
  '14':
  - type: text
    content: The third branch, called the Tigris, flowed east of the land of Asshur. The fourth branch is called the Euphrates.
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' God placed the man in the Garden of Eden to tend and watch over it. '
  '16':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' God warned him, “You may freely eat the fruit of every tree in the garden— '
  '17':
  - type: text
    content: except the tree of the knowledge of good and evil. If you eat its fruit, you are sure to die.”
  '18':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' God said, “It is not good for the man to be alone. I will make a helper who is just right for him.” '
  '19':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' God formed from the ground all the wild animals and all the birds of the sky. He brought them to the man'
  - type: note
    content: Or Adam, and so throughout the chapter.
  - type: text
    content: ' to see what he would call them, and the man chose a name for each one. '
  '2':
  - type: text
    content: On the seventh day God had finished his work of creation, so he rested
  - type: note
    content: Or ceased; also in 2:3.
  - type: text
    content: ' from all his work. '
  '20':
  - type: text
    content: He gave names to all the livestock, all the birds of the sky, and all the wild animals. But still there was no helper just right for him.
  '21':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' God caused the man to fall into a deep sleep. While the man slept, the '
  - type: text
    content: Lord
  - type: text
    content: ' God took out one of the man’s ribs'
  - type: note
    content: Or took a part of the man’s side.
  - type: text
    content: ' and closed up the opening. '
  '22':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' God made a woman from the rib, and he brought her to the man.'
  '23':
  - type: text
    content: “At last!” the man exclaimed.
  - type: text
    content: “This one is bone from my bone,
  - type: text
    content: and flesh from my flesh!
  - type: text
    content: She will be called ‘woman,’
  - type: text
    content: because she was taken from ‘man.’”
  '24':
  - type: text
    content: This explains why a man leaves his father and mother and is joined to his wife, and the two are united into one.
  '25':
  - type: text
    content: Now the man and his wife were both naked, but they felt no shame.
  '3':
  - type: text
    content: And God blessed the seventh day and declared it holy, because it was the day when he rested from all his work of creation.
  '4':
  - type: text
    content: This is the account of the creation of the heavens and the earth.
  - type: heading
    content: The Man and Woman in Eden
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' God made the earth and the heavens, '
  '5':
  - type: text
    content: 'neither wild plants nor grains were growing on the earth. For the '
  - type: text
    content: Lord
  - type: text
    content: ' God had not yet sent rain to water the earth, and there were no people to cultivate the soil. '
  '6':
  - type: text
    content: Instead, springs
  - type: note
    content: Or mist.
  - type: text
    content: ' came up from the ground and watered all the land. '
  '7':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' God formed the man from the dust of the ground. He breathed the breath of life into the man’s nostrils, and the man became a living person.'
  '8':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' God planted a garden in Eden in the east, and there he placed the man he had made. '
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' God made all sorts of trees grow up from the ground—trees that were beautiful and that produced delicious fruit. In the middle of the garden he placed the tree of life and the tree of the knowledge of good and evil.'
