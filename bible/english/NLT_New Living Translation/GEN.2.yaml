document_id: GEN.2
type_code: eng
segments:
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So the creation of the heavens and the earth and everything in them was completed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: On the seventh day God had finished his work of creation, so he rested
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ceased; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 2:3.
    marker-yv: yv-n
  - type: text
    text: ' from all his work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And God blessed the seventh day and declared it holy, because it was the day when he rested from all his work of creation.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: This is the account of the creation of the heavens and the earth.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Man and Woman in Eden
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: text
    text: 'When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God made the earth and the heavens, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'neither wild plants nor grains were growing on the earth. For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God had not yet sent rain to water the earth, and there were no people to cultivate the soil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Instead, springs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mist.
    marker-yv: yv-n
  - type: text
    text: ' came up from the ground and watered all the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God formed the man from the dust of the ground. He breathed the breath of life into the man’s nostrils, and the man became a living person.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God planted a garden in Eden in the east, and there he placed the man he had made. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God made all sorts of trees grow up from the ground—trees that were beautiful and that produced delicious fruit. In the middle of the garden he placed the tree of life and the tree of the knowledge of good and evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'A river flowed from the land of Eden, watering the garden and then dividing into four branches. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The first branch, called the Pishon, flowed around the entire land of Havilah, where gold is found. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The gold of that land is exceptionally pure; aromatic resin and onyx stone are also found there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The second branch, called the Gihon, flowed around the entire land of Cush. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The third branch, called the Tigris, flowed east of the land of Asshur. The fourth branch is called the Euphrates.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God placed the man in the Garden of Eden to tend and watch over it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God warned him, “You may freely eat the fruit of every tree in the garden— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: except the tree of the knowledge of good and evil. If you eat its fruit, you are sure to die.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God said, “It is not good for the man to be alone. I will make a helper who is just right for him.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God formed from the ground all the wild animals and all the birds of the sky. He brought them to the man'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Adam, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and so throughout the chapter.
    marker-yv: yv-n
  - type: text
    text: ' to see what he would call them, and the man chose a name for each one. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He gave names to all the livestock, all the birds of the sky, and all the wild animals. But still there was no helper just right for him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God caused the man to fall into a deep sleep. While the man slept, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God took out one of the man’s ribs'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: took a part of the man’s side.
    marker-yv: yv-n
  - type: text
    text: ' and closed up the opening. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God made a woman from the rib, and he brought her to the man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “At last!” the man exclaimed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “This one is bone from my bone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and flesh from my flesh!
- type: usfm
  marker: q1
  children:
  - type: text
    text: She will be called ‘woman,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: because she was taken from ‘man.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: This explains why a man leaves his father and mother and is joined to his wife, and the two are united into one.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Now the man and his wife were both naked, but they felt no shame.
