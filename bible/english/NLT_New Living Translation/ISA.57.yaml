document_id: ISA.57,116
type_code: eng
verses:
  '1':
  - type: text
    content: Good people pass away;
  - type: text
    content: the godly often die before their time.
  - type: text
    content: But no one seems to care or wonder why.
  - type: text
    content: No one seems to understand
  - type: text
    content: that God is protecting them from the evil to come.
  '10':
  - type: text
    content: You grew weary in your search,
  - type: text
    content: but you never gave up.
  - type: text
    content: Desire gave you renewed strength,
  - type: text
    content: and you did not grow weary.
  '11':
  - type: text
    content: “Are you afraid of these idols?
  - type: text
    content: Do they terrify you?
  - type: text
    content: Is that why you have lied to me
  - type: text
    content: and forgotten me and my words?
  - type: text
    content: Is it because of my long silence
  - type: text
    content: that you no longer fear me?
  '12':
  - type: text
    content: Now I will expose your so-called good deeds.
  - type: text
    content: None of them will help you.
  '13':
  - type: text
    content: Let’s see if your idols can save you
  - type: text
    content: when you cry to them for help.
  - type: text
    content: Why, a puff of wind can knock them down!
  - type: text
    content: If you just breathe on them, they fall over!
  - type: text
    content: But whoever trusts in me will inherit the land
  - type: text
    content: and possess my holy mountain.”
  - type: heading
    content: God Forgives the Repentant
  '14':
  - type: text
    content: God says, “Rebuild the road!
  - type: text
    content: Clear away the rocks and stones
  - type: text
    content: so my people can return from captivity.”
  '15':
  - type: text
    content: The high and lofty one who lives in eternity,
  - type: text
    content: 'the Holy One, says this:'
  - type: text
    content: “I live in the high and holy place
  - type: text
    content: with those whose spirits are contrite and humble.
  - type: text
    content: I restore the crushed spirit of the humble
  - type: text
    content: and revive the courage of those with repentant hearts.
  '16':
  - type: text
    content: For I will not fight against you forever;
  - type: text
    content: I will not always be angry.
  - type: text
    content: If I were, all people would pass away—
  - type: text
    content: all the souls I have made.
  '17':
  - type: text
    content: I was angry,
  - type: text
    content: so I punished these greedy people.
  - type: text
    content: I withdrew from them,
  - type: text
    content: but they kept going on their own stubborn way.
  '18':
  - type: text
    content: I have seen what they do,
  - type: text
    content: but I will heal them anyway!
  - type: text
    content: I will lead them.
  - type: text
    content: I will comfort those who mourn,
  '19':
  - type: text
    content: bringing words of praise to their lips.
  - type: text
    content: May they have abundant peace, both near and far,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ', who heals them.'
  '2':
  - type: text
    content: For those who follow godly paths
  - type: text
    content: will rest in peace when they die.
  - type: heading
    content: Idolatrous Worship Condemned
  '20':
  - type: text
    content: “But those who still reject me are like the restless sea,
  - type: text
    content: which is never still
  - type: text
    content: but continually churns up mud and dirt.
  '21':
  - type: text
    content: There is no peace for the wicked,”
  - type: text
    content: says my God.
  '3':
  - type: text
    content: “But you—come here, you witches’ children,
  - type: text
    content: you offspring of adulterers and prostitutes!
  '4':
  - type: text
    content: Whom do you mock,
  - type: text
    content: making faces and sticking out your tongues?
  - type: text
    content: You children of sinners and liars!
  '5':
  - type: text
    content: You worship your idols with great passion
  - type: text
    content: beneath the oaks and under every green tree.
  - type: text
    content: You sacrifice your children down in the valleys,
  - type: text
    content: among the jagged rocks in the cliffs.
  '6':
  - type: text
    content: Your gods are the smooth stones in the valleys.
  - type: text
    content: You worship them with liquid offerings and grain offerings.
  - type: text
    content: They, not I, are your inheritance.
  - type: text
    content: Do you think all this makes me happy?
  '7':
  - type: text
    content: You have committed adultery on every high mountain.
  - type: text
    content: There you have worshiped idols
  - type: text
    content: and have been unfaithful to me.
  '8':
  - type: text
    content: You have put pagan symbols
  - type: text
    content: on your doorposts and behind your doors.
  - type: text
    content: You have left me
  - type: text
    content: and climbed into bed with these detestable gods.
  - type: text
    content: You have committed yourselves to them.
  - type: text
    content: You love to look at their naked bodies.
  '9':
  - type: text
    content: You have gone to Molech
  - type: note
    content: Or to the king.
  - type: text
    content: with olive oil and many perfumes,
  - type: text
    content: sending your agents far and wide,
  - type: text
    content: even to the world of the dead.
  - type: note
    content: Hebrew to Sheol.
