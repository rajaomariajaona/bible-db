document_id: ISA.57
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Good people pass away;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the godly often die before their time.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But no one seems to care or wonder why.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one seems to understand
- type: usfm
  marker: q2
  children:
  - type: text
    text: that God is protecting them from the evil to come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For those who follow godly paths
- type: usfm
  marker: q2
  children:
  - type: text
    text: will rest in peace when they die.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Idolatrous Worship Condemned
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “But you—come here, you witches’ children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you offspring of adulterers and prostitutes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Whom do you mock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: making faces and sticking out your tongues?
- type: usfm
  marker: q2
  children:
  - type: text
    text: You children of sinners and liars!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You worship your idols with great passion
- type: usfm
  marker: q2
  children:
  - type: text
    text: beneath the oaks and under every green tree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You sacrifice your children down in the valleys,
- type: usfm
  marker: q2
  children:
  - type: text
    text: among the jagged rocks in the cliffs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Your gods are the smooth stones in the valleys.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You worship them with liquid offerings and grain offerings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They, not I, are your inheritance.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you think all this makes me happy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You have committed adultery on every high mountain.
- type: usfm
  marker: q2
  children:
  - type: text
    text: There you have worshiped idols
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have been unfaithful to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You have put pagan symbols
- type: usfm
  marker: q2
  children:
  - type: text
    text: on your doorposts and behind your doors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have left me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and climbed into bed with these detestable gods.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have committed yourselves to them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You love to look at their naked bodies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You have gone to Molech
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57:9a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to the king.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: with olive oil and many perfumes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sending your agents far and wide,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even to the world of the dead.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57:9b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to Sheol.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You grew weary in your search,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you never gave up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Desire gave you renewed strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you did not grow weary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Are you afraid of these idols?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do they terrify you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is that why you have lied to me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and forgotten me and my words?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is it because of my long silence
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you no longer fear me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Now I will expose your so-called good deeds.
- type: usfm
  marker: q2
  children:
  - type: text
    text: None of them will help you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Let’s see if your idols can save you
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you cry to them for help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why, a puff of wind can knock them down!
- type: usfm
  marker: q2
  children:
  - type: text
    text: If you just breathe on them, they fall over!
- type: usfm
  marker: q1
  children:
  - type: text
    text: But whoever trusts in me will inherit the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and possess my holy mountain.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: God Forgives the Repentant
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: God says, “Rebuild the road!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Clear away the rocks and stones
- type: usfm
  marker: q2
  children:
  - type: text
    text: so my people can return from captivity.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The high and lofty one who lives in eternity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the Holy One, says this:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I live in the high and holy place
- type: usfm
  marker: q2
  children:
  - type: text
    text: with those whose spirits are contrite and humble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I restore the crushed spirit of the humble
- type: usfm
  marker: q2
  children:
  - type: text
    text: and revive the courage of those with repentant hearts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For I will not fight against you forever;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not always be angry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If I were, all people would pass away—
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the souls I have made.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I was angry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so I punished these greedy people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I withdrew from them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they kept going on their own stubborn way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I have seen what they do,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I will heal them anyway!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will lead them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will comfort those who mourn,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: bringing words of praise to their lips.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May they have abundant peace, both near and far,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who heals them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “But those who still reject me are like the restless sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: which is never still
- type: usfm
  marker: q2
  children:
  - type: text
    text: but continually churns up mud and dirt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: There is no peace for the wicked,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: says my God.
