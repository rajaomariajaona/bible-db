document_id: LEV.14,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cleansing from Skin Diseases
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “On the eighth day each person being purified must bring two male lambs and a one-year-old female lamb, all with no defects, along with a grain offering of six quarts
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:10a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '3/10 of an ephah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[6.6 liters].'
      marker-yv: yv-n
    - type: text
      text: ' of choice flour moistened with olive oil, and a cup'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:10b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 log '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[0.3 liters]; also in 14:21.'
      marker-yv: yv-n
    - type: text
      text: ' of olive oil. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the officiating priest will present that person for purification, along with the offerings, before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at the entrance of the Tabernacle.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tent of Meeting; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 14:23.
      marker-yv: yv-n
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priest will take one of the male lambs and the olive oil and present them as a guilt offering, lifting them up as a special offering before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will then slaughter the male lamb in the sacred area where sin offerings and burnt offerings are slaughtered. As with the sin offering, the guilt offering belongs to the priest. It is a most holy offering. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The priest will then take some of the blood of the guilt offering and apply it to the lobe of the right ear, the thumb of the right hand, and the big toe of the right foot of the person being purified.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then the priest will pour some of the olive oil into the palm of his own left hand. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will dip his right finger into the oil in his palm and sprinkle some of it with his finger seven times before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priest will then apply some of the oil in his palm over the blood from the guilt offering that is on the lobe of the right ear, the thumb of the right hand, and the big toe of the right foot of the person being purified. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The priest will apply the oil remaining in his hand to the head of the person being purified. Through this process, the priest will purify
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'will make atonement for; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly in 14:19, 20, 21, 29, 31, 53.
      marker-yv: yv-n
    - type: text
      text: ' the person before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then the priest must present the sin offering to purify the person who was cured of the skin disease. After that, the priest will slaughter the burnt offering '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “The following instructions are for those seeking ceremonial purification from a skin disease.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traditionally rendered '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leprosy; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see note on 13:2a.
      marker-yv: yv-n
    - type: text
      text: ' Those who have been healed must be brought to the priest, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and offer it on the altar along with the grain offering. Through this process, the priest will purify the person who was healed, and the person will be ceremonially clean.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But anyone who is too poor and cannot afford these offerings may bring one male lamb for a guilt offering, to be lifted up as a special offering for purification. The person must also bring two quarts
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1/10 of an ephah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.2 liters].'
      marker-yv: yv-n
    - type: text
      text: ' of choice flour moistened with olive oil for the grain offering and a cup of olive oil. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The offering must also include two turtledoves or two young pigeons, whichever the person can afford. One of the pair must be used for the sin offering and the other for a burnt offering. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the eighth day of the purification ceremony, the person being purified must bring the offerings to the priest in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s presence at the entrance of the Tabernacle. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priest will take the lamb for the guilt offering, along with the olive oil, and lift them up as a special offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the priest will slaughter the lamb for the guilt offering. He will take some of its blood and apply it to the lobe of the right ear, the thumb of the right hand, and the big toe of the right foot of the person being purified.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The priest will also pour some of the olive oil into the palm of his own left hand. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will dip his right finger into the oil in his palm and sprinkle some of it seven times before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priest will then apply some of the oil in his palm over the blood from the guilt offering that is on the lobe of the right ear, the thumb of the right hand, and the big toe of the right foot of the person being purified. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priest will apply the oil remaining in his hand to the head of the person being purified. Through this process, the priest will purify the person before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'who will examine them at a place outside the camp. If the priest finds that someone has been healed of a serious skin disease, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then the priest will offer the two turtledoves or the two young pigeons, whichever the person can afford. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of them is for a sin offering and the other for a burnt offering, to be presented along with the grain offering. Through this process, the priest will purify the person before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These are the instructions for purification for those who have recovered from a serious skin disease but who cannot afford to bring the offerings normally required for the ceremony of purification.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Treatment of Contaminated Houses
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses and Aaron, '
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “When you arrive in Canaan, the land I am giving you as your own possession, I may contaminate some of the houses in your land with mildew.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traditionally rendered '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leprosy; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see note on 13:47.
      marker-yv: yv-n
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The owner of such a house must then go to the priest and say, ‘It appears that my house has some kind of mildew.’ '
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Before the priest goes in to inspect the house, he must have the house emptied so nothing inside will be pronounced ceremonially unclean. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the priest will go in and examine the mildew on the walls. If he finds greenish or reddish streaks and the contamination appears to go deeper than the wall’s surface, '
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'the priest will step outside the door and put the house in quarantine for seven days. '
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'On the seventh day the priest must return for another inspection. If he finds that the mildew on the walls of the house has spread, '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: he will perform a purification ceremony, using two live birds that are ceremonially clean, a stick of cedar,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'juniper; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 14:6, 49, 51.
      marker-yv: yv-n
    - type: text
      text: ' some scarlet yarn, and a hyssop branch. '
  '40':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'the priest must order that the stones from those areas be removed. The contaminated material will then be taken outside the town to an area designated as ceremonially unclean. '
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Next the inside walls of the entire house must be scraped thoroughly and the scrapings dumped in the unclean place outside the town. '
  '42':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Other stones will be brought in to replace the ones that were removed, and the walls will be replastered.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But if the mildew reappears after all the stones have been replaced and the house has been scraped and replastered, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the priest must return and inspect the house again. If he finds that the mildew has spread, the walls are clearly contaminated with a serious mildew, and the house is defiled. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It must be torn down, and all its stones, timbers, and plaster must be carried out of town to the place designated as ceremonially unclean. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those who enter the house during the period of quarantine will be ceremonially unclean until evening, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and all who sleep or eat in the house must wash their clothing.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But if the priest returns for his inspection and finds that the mildew has not reappeared in the house after the fresh plastering, he will pronounce it clean because the mildew is clearly gone. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To purify the house the priest must take two birds, a stick of cedar, some scarlet yarn, and a hyssop branch. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The priest will order that one bird be slaughtered over a clay pot filled with fresh water. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will slaughter one of the birds over a clay pot filled with fresh water. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will take the cedar stick, the hyssop branch, the scarlet yarn, and the live bird, and dip them into the blood of the slaughtered bird and into the fresh water. Then he will sprinkle the house seven times. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the priest has purified the house in exactly this way, '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: he will release the live bird in the open fields outside the town. Through this process, the priest will purify the house, and it will be ceremonially clean.
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “These are the instructions for dealing with serious skin diseases,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:54 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traditionally rendered '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leprosy; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see note on 13:2a.
      marker-yv: yv-n
    - type: text
      text: ' including scabby sores; '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and mildew,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:55 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traditionally rendered '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leprosy; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see note on 13:47.
      marker-yv: yv-n
    - type: text
      text: ' whether on clothing or in a house; '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and a swelling on the skin, a rash, or discolored skin. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This procedure will determine whether a person or object is ceremonially clean or unclean.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “These are the instructions regarding skin diseases and mildew.”
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He will take the live bird, the cedar stick, the scarlet yarn, and the hyssop branch, and dip them into the blood of the bird that was slaughtered over the fresh water. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The priest will then sprinkle the blood of the dead bird seven times on the person being purified of the skin disease. When the priest has purified the person, he will release the live bird in the open field to fly away.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The persons being purified must then wash their clothes, shave off all their hair, and bathe themselves in water. Then they will be ceremonially clean and may return to the camp. However, they must remain outside their tents for seven days. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On the seventh day they must again shave all the hair from their heads, including the hair of the beard and eyebrows. They must also wash their clothes and bathe themselves in water. Then they will be ceremonially clean.
