document_id: LEV.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Cleansing from Skin Diseases
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: “On the eighth day each person being purified must bring two male lambs and a one-year-old female lamb, all with no defects, along with a grain offering of six quarts
  - type: note
    content: Hebrew 3/10 of an ephah [6.6 liters].
  - type: text
    content: ' of choice flour moistened with olive oil, and a cup'
  - type: note
    content: Hebrew 1 log [0.3 liters]; also in 14:21.
  - type: text
    content: ' of olive oil. '
  '11':
  - type: text
    content: 'Then the officiating priest will present that person for purification, along with the offerings, before the '
  - type: text
    content: Lord
  - type: text
    content: ' at the entrance of the Tabernacle.'
  - type: note
    content: Hebrew Tent of Meeting; also in 14:23.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'The priest will take one of the male lambs and the olive oil and present them as a guilt offering, lifting them up as a special offering before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'He will then slaughter the male lamb in the sacred area where sin offerings and burnt offerings are slaughtered. As with the sin offering, the guilt offering belongs to the priest. It is a most holy offering. '
  '14':
  - type: text
    content: The priest will then take some of the blood of the guilt offering and apply it to the lobe of the right ear, the thumb of the right hand, and the big toe of the right foot of the person being purified.
  '15':
  - type: text
    content: '“Then the priest will pour some of the olive oil into the palm of his own left hand. '
  '16':
  - type: text
    content: 'He will dip his right finger into the oil in his palm and sprinkle some of it with his finger seven times before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'The priest will then apply some of the oil in his palm over the blood from the guilt offering that is on the lobe of the right ear, the thumb of the right hand, and the big toe of the right foot of the person being purified. '
  '18':
  - type: text
    content: The priest will apply the oil remaining in his hand to the head of the person being purified. Through this process, the priest will purify
  - type: note
    content: Or will make atonement for; similarly in 14:19, 20, 21, 29, 31, 53.
  - type: text
    content: ' the person before the '
  - type: text
    content: Lord
  - type: text
    content: .
  '19':
  - type: text
    content: '“Then the priest must present the sin offering to purify the person who was cured of the skin disease. After that, the priest will slaughter the burnt offering '
  '2':
  - type: text
    content: “The following instructions are for those seeking ceremonial purification from a skin disease.
  - type: note
    content: Traditionally rendered leprosy; see note on 13:2a.
  - type: text
    content: ' Those who have been healed must be brought to the priest, '
  '20':
  - type: text
    content: and offer it on the altar along with the grain offering. Through this process, the priest will purify the person who was healed, and the person will be ceremonially clean.
  '21':
  - type: text
    content: “But anyone who is too poor and cannot afford these offerings may bring one male lamb for a guilt offering, to be lifted up as a special offering for purification. The person must also bring two quarts
  - type: note
    content: Hebrew 1/10 of an ephah [2.2 liters].
  - type: text
    content: ' of choice flour moistened with olive oil for the grain offering and a cup of olive oil. '
  '22':
  - type: text
    content: 'The offering must also include two turtledoves or two young pigeons, whichever the person can afford. One of the pair must be used for the sin offering and the other for a burnt offering. '
  '23':
  - type: text
    content: 'On the eighth day of the purification ceremony, the person being purified must bring the offerings to the priest in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence at the entrance of the Tabernacle. '
  '24':
  - type: text
    content: 'The priest will take the lamb for the guilt offering, along with the olive oil, and lift them up as a special offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '25':
  - type: text
    content: Then the priest will slaughter the lamb for the guilt offering. He will take some of its blood and apply it to the lobe of the right ear, the thumb of the right hand, and the big toe of the right foot of the person being purified.
  '26':
  - type: text
    content: '“The priest will also pour some of the olive oil into the palm of his own left hand. '
  '27':
  - type: text
    content: 'He will dip his right finger into the oil in his palm and sprinkle some of it seven times before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'The priest will then apply some of the oil in his palm over the blood from the guilt offering that is on the lobe of the right ear, the thumb of the right hand, and the big toe of the right foot of the person being purified. '
  '29':
  - type: text
    content: 'The priest will apply the oil remaining in his hand to the head of the person being purified. Through this process, the priest will purify the person before the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: 'who will examine them at a place outside the camp. If the priest finds that someone has been healed of a serious skin disease, '
  '30':
  - type: text
    content: '“Then the priest will offer the two turtledoves or the two young pigeons, whichever the person can afford. '
  '31':
  - type: text
    content: 'One of them is for a sin offering and the other for a burnt offering, to be presented along with the grain offering. Through this process, the priest will purify the person before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '32':
  - type: text
    content: These are the instructions for purification for those who have recovered from a serious skin disease but who cannot afford to bring the offerings normally required for the ceremony of purification.”
  - type: heading
    content: Treatment of Contaminated Houses
  '33':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, '
  '34':
  - type: text
    content: “When you arrive in Canaan, the land I am giving you as your own possession, I may contaminate some of the houses in your land with mildew.
  - type: note
    content: Traditionally rendered leprosy; see note on 13:47.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'The owner of such a house must then go to the priest and say, ‘It appears that my house has some kind of mildew.’ '
  '36':
  - type: text
    content: 'Before the priest goes in to inspect the house, he must have the house emptied so nothing inside will be pronounced ceremonially unclean. '
  '37':
  - type: text
    content: 'Then the priest will go in and examine the mildew on the walls. If he finds greenish or reddish streaks and the contamination appears to go deeper than the wall’s surface, '
  '38':
  - type: text
    content: 'the priest will step outside the door and put the house in quarantine for seven days. '
  '39':
  - type: text
    content: 'On the seventh day the priest must return for another inspection. If he finds that the mildew on the walls of the house has spread, '
  '4':
  - type: text
    content: he will perform a purification ceremony, using two live birds that are ceremonially clean, a stick of cedar,
  - type: note
    content: Or juniper; also in 14:6, 49, 51.
  - type: text
    content: ' some scarlet yarn, and a hyssop branch. '
  '40':
  - type: text
    content: 'the priest must order that the stones from those areas be removed. The contaminated material will then be taken outside the town to an area designated as ceremonially unclean. '
  '41':
  - type: text
    content: 'Next the inside walls of the entire house must be scraped thoroughly and the scrapings dumped in the unclean place outside the town. '
  '42':
  - type: text
    content: Other stones will be brought in to replace the ones that were removed, and the walls will be replastered.
  '43':
  - type: text
    content: '“But if the mildew reappears after all the stones have been replaced and the house has been scraped and replastered, '
  '44':
  - type: text
    content: 'the priest must return and inspect the house again. If he finds that the mildew has spread, the walls are clearly contaminated with a serious mildew, and the house is defiled. '
  '45':
  - type: text
    content: 'It must be torn down, and all its stones, timbers, and plaster must be carried out of town to the place designated as ceremonially unclean. '
  '46':
  - type: text
    content: 'Those who enter the house during the period of quarantine will be ceremonially unclean until evening, '
  '47':
  - type: text
    content: and all who sleep or eat in the house must wash their clothing.
  '48':
  - type: text
    content: '“But if the priest returns for his inspection and finds that the mildew has not reappeared in the house after the fresh plastering, he will pronounce it clean because the mildew is clearly gone. '
  '49':
  - type: text
    content: 'To purify the house the priest must take two birds, a stick of cedar, some scarlet yarn, and a hyssop branch. '
  '5':
  - type: text
    content: 'The priest will order that one bird be slaughtered over a clay pot filled with fresh water. '
  '50':
  - type: text
    content: 'He will slaughter one of the birds over a clay pot filled with fresh water. '
  '51':
  - type: text
    content: 'He will take the cedar stick, the hyssop branch, the scarlet yarn, and the live bird, and dip them into the blood of the slaughtered bird and into the fresh water. Then he will sprinkle the house seven times. '
  '52':
  - type: text
    content: 'When the priest has purified the house in exactly this way, '
  '53':
  - type: text
    content: he will release the live bird in the open fields outside the town. Through this process, the priest will purify the house, and it will be ceremonially clean.
  '54':
  - type: text
    content: “These are the instructions for dealing with serious skin diseases,
  - type: note
    content: Traditionally rendered leprosy; see note on 13:2a.
  - type: text
    content: ' including scabby sores; '
  '55':
  - type: text
    content: and mildew,
  - type: note
    content: Traditionally rendered leprosy; see note on 13:47.
  - type: text
    content: ' whether on clothing or in a house; '
  '56':
  - type: text
    content: 'and a swelling on the skin, a rash, or discolored skin. '
  '57':
  - type: text
    content: This procedure will determine whether a person or object is ceremonially clean or unclean.
  - type: text
    content: “These are the instructions regarding skin diseases and mildew.”
  '6':
  - type: text
    content: 'He will take the live bird, the cedar stick, the scarlet yarn, and the hyssop branch, and dip them into the blood of the bird that was slaughtered over the fresh water. '
  '7':
  - type: text
    content: The priest will then sprinkle the blood of the dead bird seven times on the person being purified of the skin disease. When the priest has purified the person, he will release the live bird in the open field to fly away.
  '8':
  - type: text
    content: '“The persons being purified must then wash their clothes, shave off all their hair, and bathe themselves in water. Then they will be ceremonially clean and may return to the camp. However, they must remain outside their tents for seven days. '
  '9':
  - type: text
    content: On the seventh day they must again shave all the hair from their heads, including the hair of the beard and eyebrows. They must also wash their clothes and bathe themselves in water. Then they will be ceremonially clean.
