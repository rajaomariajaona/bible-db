document_id: EST.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Haman’s Plot against the Jews
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Some time later King Xerxes promoted Haman son of Hammedatha the Agagite over all the other nobles, making him the most powerful official in the empire. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: All the king’s officials would bow down before Haman to show him respect whenever he passed by, for so the king had commanded. But Mordecai refused to bow down or show him respect.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then the palace officials at the king’s gate asked Mordecai, “Why are you disobeying the king’s command?” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They spoke to him day after day, but still he refused to comply with the order. So they spoke to Haman about this to see if he would tolerate Mordecai’s conduct, since Mordecai had told them he was a Jew.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Haman saw that Mordecai would not bow down or show him respect, he was filled with rage. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He had learned of Mordecai’s nationality, so he decided it was not enough to lay hands on Mordecai alone. Instead, he looked for a way to destroy all the Jews throughout the entire empire of Xerxes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So in the month of April,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:7a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in the first month, the month of Nisan. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This month of the ancient Hebrew lunar calendar occurred within the months of April and May 474 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 2:16.
    marker-yv: yv-n
  - type: text
    text: ' during the twelfth year of King Xerxes’ reign, lots were cast in Haman’s presence (the lots were called '
  - type: usfm
    marker: it
    children:
    - type: text
      text: purim
  - type: text
    text: ) to determine the best day and month to take action. And the day selected was March 7, nearly a year later.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:7b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in 3:13, which reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the thirteenth day of the twelfth month, the month of Adar; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in the twelfth month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. The date selected was March 7, 473 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 2:16.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Haman approached King Xerxes and said, “There is a certain race of people scattered through all the provinces of your empire who keep themselves separate from everyone else. Their laws are different from those of any other people, and they refuse to obey the laws of the king. So it is not in the king’s interest to let them live. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: If it please the king, issue a decree that they be destroyed, and I will give 10,000 large sacks
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 10,000 talents
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', about 375 tons or 340 metric tons in weight.'
    marker-yv: yv-n
  - type: text
    text: ' of silver to the government administrators to be deposited in the royal treasury.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The king agreed, confirming his decision by removing his signet ring from his finger and giving it to Haman son of Hammedatha the Agagite, the enemy of the Jews. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The king said, “The money and the people are both yours to do with as you see fit.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So on April 17
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the thirteenth day of the first month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. This day was April 17, 474 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 2:16.
    marker-yv: yv-n
  - type: text
    text: ' the king’s secretaries were summoned, and a decree was written exactly as Haman dictated. It was sent to the king’s highest officers, the governors of the respective provinces, and the nobles of each province in their own scripts and languages. The decree was written in the name of King Xerxes and sealed with the king’s signet ring. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dispatches were sent by swift messengers into all the provinces of the empire, giving the order that all Jews—young and old, including women and children—must be killed, slaughtered, and annihilated on a single day. This was scheduled to happen on March 7 of the next year.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on the thirteenth day of the twelfth month, the month of Adar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. The date selected was March 7, 473 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 2:16.
    marker-yv: yv-n
  - type: text
    text: ' The property of the Jews would be given to those who killed them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'A copy of this decree was to be issued as law in every province and proclaimed to all peoples, so that they would be ready to do their duty on the appointed day. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: At the king’s command, the decree went out by swift messengers, and it was also proclaimed in the fortress of Susa. Then the king and Haman sat down to drink, but the city of Susa fell into confusion.
