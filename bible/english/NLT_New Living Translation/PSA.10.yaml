document_id: PSA.10
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', why do you stand so far away?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why do you hide when I am in trouble?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The wicked arrogantly hunt down the poor.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let them be caught in the evil they plan for others.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For they brag about their evil desires;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'they praise the greedy and curse the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The wicked are too proud to seek God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They seem to think that God is dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Yet they succeed in everything they do.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They do not see your punishment awaiting them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They sneer at all their enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They think, “Nothing bad will ever happen to us!
- type: usfm
  marker: q2
  children:
  - type: text
    text: We will be free of trouble forever!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Their mouths are full of cursing, lies, and threats.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cursing and bitterness. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Rom 3:14.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: Trouble and evil are on the tips of their tongues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They lurk in ambush in the villages,
- type: usfm
  marker: q2
  children:
  - type: text
    text: waiting to murder innocent people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are always searching for helpless victims.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Like lions crouched in hiding,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they wait to pounce on the helpless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like hunters they capture the helpless
- type: usfm
  marker: q2
  children:
  - type: text
    text: and drag them away in nets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Their helpless victims are crushed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they fall beneath the strength of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The wicked think, “God isn’t watching us!
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has closed his eyes and won’t even see what we do!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Arise, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Punish the wicked, O God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not ignore the helpless!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Why do the wicked get away with despising God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: They think, “God will never call us to account.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But you see the trouble and grief they cause.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You take note of it and punish them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The helpless put their trust in you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You defend the orphans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Break the arms of these wicked, evil people!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Go after them until the last one is destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is king forever and ever!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The godless nations will vanish from the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you know the hopes of the helpless.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Surely you will hear their cries and comfort them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: You will bring justice to the orphans and the oppressed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so mere people can no longer terrify them.
