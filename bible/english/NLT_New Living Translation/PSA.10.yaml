document_id: PSA.10,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', why do you stand so far away?'
  - type: text
    content: Why do you hide when I am in trouble?
  '10':
  - type: text
    content: Their helpless victims are crushed;
  - type: text
    content: they fall beneath the strength of the wicked.
  '11':
  - type: text
    content: The wicked think, “God isn’t watching us!
  - type: text
    content: He has closed his eyes and won’t even see what we do!”
  '12':
  - type: text
    content: 'Arise, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Punish the wicked, O God!
  - type: text
    content: Do not ignore the helpless!
  '13':
  - type: text
    content: Why do the wicked get away with despising God?
  - type: text
    content: They think, “God will never call us to account.”
  '14':
  - type: text
    content: But you see the trouble and grief they cause.
  - type: text
    content: You take note of it and punish them.
  - type: text
    content: The helpless put their trust in you.
  - type: text
    content: You defend the orphans.
  '15':
  - type: text
    content: Break the arms of these wicked, evil people!
  - type: text
    content: Go after them until the last one is destroyed.
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is king forever and ever!'
  - type: text
    content: The godless nations will vanish from the land.
  '17':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you know the hopes of the helpless.'
  - type: text
    content: Surely you will hear their cries and comfort them.
  '18':
  - type: text
    content: You will bring justice to the orphans and the oppressed,
  - type: text
    content: so mere people can no longer terrify them.
  '2':
  - type: text
    content: The wicked arrogantly hunt down the poor.
  - type: text
    content: Let them be caught in the evil they plan for others.
  '3':
  - type: text
    content: For they brag about their evil desires;
  - type: text
    content: 'they praise the greedy and curse the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: The wicked are too proud to seek God.
  - type: text
    content: They seem to think that God is dead.
  '5':
  - type: text
    content: Yet they succeed in everything they do.
  - type: text
    content: They do not see your punishment awaiting them.
  - type: text
    content: They sneer at all their enemies.
  '6':
  - type: text
    content: They think, “Nothing bad will ever happen to us!
  - type: text
    content: We will be free of trouble forever!”
  '7':
  - type: text
    content: Their mouths are full of cursing, lies, and threats.
  - type: note
    content: Greek version reads cursing and bitterness. Compare Rom 3:14.
  - type: text
    content: Trouble and evil are on the tips of their tongues.
  '8':
  - type: text
    content: They lurk in ambush in the villages,
  - type: text
    content: waiting to murder innocent people.
  - type: text
    content: They are always searching for helpless victims.
  '9':
  - type: text
    content: Like lions crouched in hiding,
  - type: text
    content: they wait to pounce on the helpless.
  - type: text
    content: Like hunters they capture the helpless
  - type: text
    content: and drag them away in nets.
