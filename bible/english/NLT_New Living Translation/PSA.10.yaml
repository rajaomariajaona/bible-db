document_id: PSA.10,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', why do you stand so far away?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do you hide when I am in trouble?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their helpless victims are crushed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they fall beneath the strength of the wicked.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked think, “God isn’t watching us!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has closed his eyes and won’t even see what we do!”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Arise, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Punish the wicked, O God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not ignore the helpless!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do the wicked get away with despising God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They think, “God will never call us to account.”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you see the trouble and grief they cause.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You take note of it and punish them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The helpless put their trust in you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You defend the orphans.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Break the arms of these wicked, evil people!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Go after them until the last one is destroyed.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is king forever and ever!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The godless nations will vanish from the land.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you know the hopes of the helpless.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Surely you will hear their cries and comfort them.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will bring justice to the orphans and the oppressed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so mere people can no longer terrify them.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked arrogantly hunt down the poor.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them be caught in the evil they plan for others.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they brag about their evil desires;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'they praise the greedy and curse the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked are too proud to seek God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They seem to think that God is dead.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet they succeed in everything they do.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They do not see your punishment awaiting them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They sneer at all their enemies.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They think, “Nothing bad will ever happen to us!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We will be free of trouble forever!”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their mouths are full of cursing, lies, and threats.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cursing and bitterness. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Rom 3:14.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Trouble and evil are on the tips of their tongues.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They lurk in ambush in the villages,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: waiting to murder innocent people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are always searching for helpless victims.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like lions crouched in hiding,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they wait to pounce on the helpless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like hunters they capture the helpless
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drag them away in nets.
