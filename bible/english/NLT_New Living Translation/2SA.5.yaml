document_id: 2SA.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Becomes King of All Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then all the tribes of Israel went to David at Hebron and told him, “We are your own flesh and blood. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: In the past,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: For some time.
    marker-yv: yv-n
  - type: text
    text: ' when Saul was our king, you were the one who really led the forces of Israel. And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told you, ‘You will be the shepherd of my people Israel. You will be Israel’s leader.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So there at Hebron, King David made a covenant before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with all the elders of Israel. And they anointed him king of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David was thirty years old when he began to reign, and he reigned forty years in all. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He had reigned over Judah from Hebron for seven years and six months, and from Jerusalem he reigned over all Israel and Judah for thirty-three years.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Captures Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David then led his men to Jerusalem to fight against the Jebusites, the original inhabitants of the land who were living there. The Jebusites taunted David, saying, “You’ll never get in here! Even the blind and lame could keep you out!” For the Jebusites thought they were safe. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But David captured the fortress of Zion, which is now called the City of David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: On the day of the attack, David said to his troops, “I hate those ‘lame’ and ‘blind’ Jebusites.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:8a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Those ‘lame’ and ‘blind’ Jebusites hate me.
    marker-yv: yv-n
  - type: text
    text: ' Whoever attacks them should strike by going into the city through the water tunnel.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:8b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'with scaling hooks. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ” That is the origin of the saying, “The blind and the lame may not enter the house.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:8c '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of this saying is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So David made the fortress his home, and he called it the City of David. He extended the city, starting at the supporting terraces
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the millo. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' and working inward. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And David became more and more powerful, because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Heaven’s Armies was with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then King Hiram of Tyre sent messengers to David, along with cedar timber and carpenters and stonemasons, and they built David a palace. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And David realized that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had confirmed him as king over Israel and had blessed his kingdom for the sake of his people Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'After moving from Hebron to Jerusalem, David married more concubines and wives, and they had more sons and daughters. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'These are the names of David’s sons who were born in Jerusalem: Shammua, Shobab, Nathan, Solomon, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ibhar, Elishua, Nepheg, Japhia, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Elishama, Eliada, and Eliphelet.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Conquers the Philistines
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When the Philistines heard that David had been anointed king of Israel, they mobilized all their forces to capture him. But David was told they were coming, so he went into the stronghold. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The Philistines arrived and spread out across the valley of Rephaim. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So David asked the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “Should I go out to fight the Philistines? Will you hand them over to me?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' replied to David, “Yes, go ahead. I will certainly hand them over to you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So David went to Baal-perazim and defeated the Philistines there. “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' did it!” David exclaimed. “He burst through my enemies like a raging flood!” So he named that place Baal-perazim (which means “the Lord who bursts through”). '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The Philistines had abandoned their idols there, so David and his men confiscated them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But after a while the Philistines returned and again spread out across the valley of Rephaim. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And again David asked the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' what to do. “Do not attack them straight on,” the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' replied. “Instead, circle around behind and attack them near the poplar'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'aspen, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'balsam; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 5:24. The exact identification of this tree is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' trees. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When you hear a sound like marching feet in the tops of the poplar trees, be on the alert! That will be the signal that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is moving ahead of you to strike down the Philistine army.” '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So David did what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded, and he struck down the Philistines all the way from Gibeon'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version (see also 1 Chr 14:16); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Geba.
    marker-yv: yv-n
  - type: text
    text: ' to Gezer.'
