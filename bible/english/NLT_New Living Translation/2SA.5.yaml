document_id: 2SA.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David Becomes King of All Israel
  - type: text
    content: 'Then all the tribes of Israel went to David at Hebron and told him, “We are your own flesh and blood. '
  '10':
  - type: text
    content: 'And David became more and more powerful, because the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies was with him.'
  '11':
  - type: text
    content: 'Then King Hiram of Tyre sent messengers to David, along with cedar timber and carpenters and stonemasons, and they built David a palace. '
  '12':
  - type: text
    content: 'And David realized that the '
  - type: text
    content: Lord
  - type: text
    content: ' had confirmed him as king over Israel and had blessed his kingdom for the sake of his people Israel.'
  '13':
  - type: text
    content: 'After moving from Hebron to Jerusalem, David married more concubines and wives, and they had more sons and daughters. '
  '14':
  - type: text
    content: 'These are the names of David’s sons who were born in Jerusalem: Shammua, Shobab, Nathan, Solomon, '
  '15':
  - type: text
    content: 'Ibhar, Elishua, Nepheg, Japhia, '
  '16':
  - type: text
    content: Elishama, Eliada, and Eliphelet.
  - type: heading
    content: David Conquers the Philistines
  '17':
  - type: text
    content: 'When the Philistines heard that David had been anointed king of Israel, they mobilized all their forces to capture him. But David was told they were coming, so he went into the stronghold. '
  '18':
  - type: text
    content: 'The Philistines arrived and spread out across the valley of Rephaim. '
  '19':
  - type: text
    content: 'So David asked the '
  - type: text
    content: Lord
  - type: text
    content: ', “Should I go out to fight the Philistines? Will you hand them over to me?”'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied to David, “Yes, go ahead. I will certainly hand them over to you.”'
  '2':
  - type: text
    content: In the past,
  - type: note
    content: Or For some time.
  - type: text
    content: ' when Saul was our king, you were the one who really led the forces of Israel. And the '
  - type: text
    content: Lord
  - type: text
    content: ' told you, ‘You will be the shepherd of my people Israel. You will be Israel’s leader.’”'
  '20':
  - type: text
    content: 'So David went to Baal-perazim and defeated the Philistines there. “The '
  - type: text
    content: Lord
  - type: text
    content: ' did it!” David exclaimed. “He burst through my enemies like a raging flood!” So he named that place Baal-perazim (which means “the Lord who bursts through”). '
  '21':
  - type: text
    content: The Philistines had abandoned their idols there, so David and his men confiscated them.
  '22':
  - type: text
    content: 'But after a while the Philistines returned and again spread out across the valley of Rephaim. '
  '23':
  - type: text
    content: 'And again David asked the '
  - type: text
    content: Lord
  - type: text
    content: ' what to do. “Do not attack them straight on,” the '
  - type: text
    content: Lord
  - type: text
    content: ' replied. “Instead, circle around behind and attack them near the poplar'
  - type: note
    content: Or aspen, or balsam; also in 5:24. The exact identification of this tree is uncertain.
  - type: text
    content: ' trees. '
  '24':
  - type: text
    content: 'When you hear a sound like marching feet in the tops of the poplar trees, be on the alert! That will be the signal that the '
  - type: text
    content: Lord
  - type: text
    content: ' is moving ahead of you to strike down the Philistine army.” '
  '25':
  - type: text
    content: 'So David did what the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded, and he struck down the Philistines all the way from Gibeon'
  - type: note
    content: As in Greek version (see also 1 Chr 14:16); Hebrew reads Geba.
  - type: text
    content: ' to Gezer.'
  '3':
  - type: text
    content: 'So there at Hebron, King David made a covenant before the '
  - type: text
    content: Lord
  - type: text
    content: ' with all the elders of Israel. And they anointed him king of Israel.'
  '4':
  - type: text
    content: 'David was thirty years old when he began to reign, and he reigned forty years in all. '
  '5':
  - type: text
    content: He had reigned over Judah from Hebron for seven years and six months, and from Jerusalem he reigned over all Israel and Judah for thirty-three years.
  - type: heading
    content: David Captures Jerusalem
  '6':
  - type: text
    content: 'David then led his men to Jerusalem to fight against the Jebusites, the original inhabitants of the land who were living there. The Jebusites taunted David, saying, “You’ll never get in here! Even the blind and lame could keep you out!” For the Jebusites thought they were safe. '
  '7':
  - type: text
    content: But David captured the fortress of Zion, which is now called the City of David.
  '8':
  - type: text
    content: On the day of the attack, David said to his troops, “I hate those ‘lame’ and ‘blind’ Jebusites.
  - type: note
    content: Or Those ‘lame’ and ‘blind’ Jebusites hate me.
  - type: text
    content: ' Whoever attacks them should strike by going into the city through the water tunnel.'
  - type: note
    content: Or with scaling hooks. The meaning of the Hebrew is uncertain.
  - type: text
    content: ” That is the origin of the saying, “The blind and the lame may not enter the house.”
  - type: note
    content: The meaning of this saying is uncertain.
  '9':
  - type: text
    content: So David made the fortress his home, and he called it the City of David. He extended the city, starting at the supporting terraces
  - type: note
    content: Hebrew the millo. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' and working inward. '
