document_id: PSA.58,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm'
  - type: note
    content: Hebrew miktam. This may be a literary or musical term.
  - type: text
    content: ' of David, to be sung to the tune “Do Not Destroy!”'
  - type: text
    content: Justice—do you rulers
  - type: note
    content: Or you gods.
  - type: text
    content: ' know the meaning of the word?'
  - type: text
    content: Do you judge the people fairly?
  '10':
  - type: text
    content: The godly will rejoice when they see injustice avenged.
  - type: text
    content: They will wash their feet in the blood of the wicked.
  '11':
  - type: text
    content: Then at last everyone will say,
  - type: text
    content: “There truly is a reward for those who live for God;
  - type: text
    content: surely there is a God who judges justly here on earth.”
  '2':
  - type: text
    content: No! You plot injustice in your hearts.
  - type: text
    content: You spread violence throughout the land.
  '3':
  - type: text
    content: These wicked people are born sinners;
  - type: text
    content: even from birth they have lied and gone their own way.
  '4':
  - type: text
    content: They spit venom like deadly snakes;
  - type: text
    content: they are like cobras that refuse to listen,
  '5':
  - type: text
    content: ignoring the tunes of the snake charmers,
  - type: text
    content: no matter how skillfully they play.
  '6':
  - type: text
    content: Break off their fangs, O God!
  - type: text
    content: 'Smash the jaws of these lions, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '7':
  - type: text
    content: May they disappear like water into thirsty ground.
  - type: text
    content: Make their weapons useless in their hands.
  - type: note
    content: Or Let them be trodden down and wither like grass. The meaning of the Hebrew is uncertain.
  '8':
  - type: text
    content: May they be like snails that dissolve into slime,
  - type: text
    content: like a stillborn child who will never see the sun.
  '9':
  - type: text
    content: God will sweep them away, both young and old,
  - type: text
    content: faster than a pot heats over burning thorns.
