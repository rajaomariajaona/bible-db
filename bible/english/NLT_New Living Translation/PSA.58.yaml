document_id: PSA.58
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '58:TITLE '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'miktam. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may be a literary or musical term.
    marker-yv: yv-n
  - type: text
    text: ' of David, to be sung to the tune “Do Not Destroy!”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Justice—do you rulers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '58:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: you gods.
    marker-yv: yv-n
  - type: text
    text: ' know the meaning of the word?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you judge the people fairly?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: No! You plot injustice in your hearts.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You spread violence throughout the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: These wicked people are born sinners;
- type: usfm
  marker: q2
  children:
  - type: text
    text: even from birth they have lied and gone their own way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They spit venom like deadly snakes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are like cobras that refuse to listen,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ignoring the tunes of the snake charmers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no matter how skillfully they play.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Break off their fangs, O God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Smash the jaws of these lions, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: May they disappear like water into thirsty ground.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Make their weapons useless in their hands.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '58:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Let them be trodden down and wither like grass. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: May they be like snails that dissolve into slime,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a stillborn child who will never see the sun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: God will sweep them away, both young and old,
- type: usfm
  marker: q2
  children:
  - type: text
    text: faster than a pot heats over burning thorns.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The godly will rejoice when they see injustice avenged.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will wash their feet in the blood of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then at last everyone will say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “There truly is a reward for those who live for God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: surely there is a God who judges justly here on earth.”
