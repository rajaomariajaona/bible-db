document_id: 2SA.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Covenant Promise to David
  - type: text
    content: 'When King David was settled in his palace and the '
  - type: text
    content: Lord
  - type: text
    content: ' had given him rest from all the surrounding enemies, '
  '10':
  - type: text
    content: 'And I will provide a homeland for my people Israel, planting them in a secure place where they will never be disturbed. Evil nations won’t oppress them as they’ve done in the past, '
  '11':
  - type: text
    content: starting from the time I appointed judges to rule my people Israel. And I will give you rest from all your enemies.
  - type: text
    content: '“‘Furthermore, the '
  - type: text
    content: Lord
  - type: text
    content: ' declares that he will make a house for you—a dynasty of kings! '
  '12':
  - type: text
    content: 'For when you die and are buried with your ancestors, I will raise up one of your descendants, your own offspring, and I will make his kingdom strong. '
  '13':
  - type: text
    content: 'He is the one who will build a house—a temple—for my name. And I will secure his royal throne forever. '
  '14':
  - type: text
    content: 'I will be his father, and he will be my son. If he sins, I will correct and discipline him with the rod, like any father would do. '
  '15':
  - type: text
    content: 'But my favor will not be taken from him as I took it from Saul, whom I removed from your sight. '
  '16':
  - type: text
    content: Your house and your kingdom will continue before me
  - type: note
    content: As in Greek version and some Hebrew manuscripts; Masoretic Text reads before you.
  - type: text
    content: ' for all time, and your throne will be secure forever.’”'
  '17':
  - type: text
    content: 'So Nathan went back to David and told him everything the '
  - type: text
    content: Lord
  - type: text
    content: ' had said in this vision.'
  - type: heading
    content: David’s Prayer of Thanks
  '18':
  - type: text
    content: 'Then King David went in and sat before the '
  - type: text
    content: Lord
  - type: text
    content: ' and prayed,'
  - type: text
    content: '“Who am I, O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', and what is my family, that you have brought me this far? '
  '19':
  - type: text
    content: 'And now, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', in addition to everything else, you speak of giving your servant a lasting dynasty! Do you deal with everyone this way, O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: note
    content: Or This is your instruction for all humanity, O Sovereign Lord.
  '2':
  - type: text
    content: the king summoned Nathan the prophet. “Look,” David said, “I am living in a beautiful cedar palace,
  - type: note
    content: Hebrew a house of cedar.
  - type: text
    content: ' but the Ark of God is out there in a tent!”'
  '20':
  - type: text
    content: '“What more can I say to you? You know what your servant is really like, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '21':
  - type: text
    content: Because of your promise and according to your will, you have done all these great things and have made them known to your servant.
  '22':
  - type: text
    content: '“How great you are, O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '! There is no one like you. We have never even heard of another God like you! '
  '23':
  - type: text
    content: What other nation on earth is like your people Israel? What other nation, O God, have you redeemed from slavery to be your own people? You made a great name for yourself when you redeemed your people from Egypt. You performed awesome miracles and drove out the nations and gods that stood in their way.
  - type: note
    content: As in Greek version (see also 1 Chr 17:21); Hebrew reads You made a name for yourself and awesome miracles for your land in the sight of your people, whom you redeemed from Egypt, the nations and their gods.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'You made Israel your very own people forever, and you, O '
  - type: text
    content: Lord
  - type: text
    content: ', became their God.'
  '25':
  - type: text
    content: '“And now, O '
  - type: text
    content: Lord
  - type: text
    content: ' God, I am your servant; do as you have promised concerning me and my family. Confirm it as a promise that will last forever. '
  '26':
  - type: text
    content: 'And may your name be honored forever so that everyone will say, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies is God over Israel!’ And may the house of your servant David continue before you forever.'
  '27':
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, God of Israel, I have been bold enough to pray this prayer to you because you have revealed all this to your servant, saying, ‘I will build a house for you—a dynasty of kings!’ '
  '28':
  - type: text
    content: 'For you are God, O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. Your words are truth, and you have promised these good things to your servant. '
  '29':
  - type: text
    content: 'And now, may it please you to bless the house of your servant, so that it may continue forever before you. For you have spoken, and when you grant a blessing to your servant, O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', it is an eternal blessing!”'
  '3':
  - type: text
    content: 'Nathan replied to the king, “Go ahead and do whatever you have in mind, for the '
  - type: text
    content: Lord
  - type: text
    content: ' is with you.”'
  '4':
  - type: text
    content: 'But that same night the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Nathan,'
  '5':
  - type: text
    content: '“Go and tell my servant David, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has declared: Are you the one to build a house for me to live in? '
  '6':
  - type: text
    content: 'I have never lived in a house, from the day I brought the Israelites out of Egypt until this very day. I have always moved from one place to another with a tent and a Tabernacle as my dwelling. '
  '7':
  - type: text
    content: Yet no matter where I have gone with the Israelites, I have never once complained to Israel’s tribal leaders, the shepherds of my people Israel. I have never asked them, “Why haven’t you built me a beautiful cedar house?”’
  '8':
  - type: text
    content: '“Now go and say to my servant David, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies has declared: I took you from tending sheep in the pasture and selected you to be the leader of my people Israel. '
  '9':
  - type: text
    content: 'I have been with you wherever you have gone, and I have destroyed all your enemies before your eyes. Now I will make your name as famous as anyone who has ever lived on the earth! '
