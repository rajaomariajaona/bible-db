document_id: ISA.11,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Branch from David’s Line
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Out of the stump of David’s family
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the stump of the line of Jesse. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesse was King David’s father.
      marker-yv: yv-n
    - type: text
      text: ' will grow a shoot—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, a new Branch bearing fruit from the old root.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In that day the heir to David’s throne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:10a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the root of Jesse.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be a banner of salvation to all the world.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nations will rally to him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the land where he lives will be a glorious place.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:10b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'In that day the heir to David’s throne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[literally '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the root of Jesse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'will come, / and he will rule over the Gentiles. / They will place their hopes on him. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Rom 15:12.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In that day the Lord will reach out his hand a second time
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to bring back the remnant of his people—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those who remain in Assyria and northern Egypt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in southern Egypt, Ethiopia,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:11a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in Pathros, Cush.
      marker-yv: yv-n
    - type: text
      text: ' and Elam;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in Babylonia,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:11b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in Shinar.
      marker-yv: yv-n
    - type: text
      text: ' Hamath, and all the distant coastlands.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will raise a flag among the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and assemble the exiles of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will gather the scattered people of Judah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the ends of the earth.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then at last the jealousy between Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ephraim, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referring to the northern kingdom of Israel.
      marker-yv: yv-n
    - type: text
      text: ' and Judah will end.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will not be rivals anymore.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will join forces to swoop down on Philistia to the west.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Together they will attack and plunder the nations to the east.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will occupy the lands of Edom and Moab,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Ammon will obey them.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will make a dry path through the gulf of the Red Sea.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:15a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will destroy the tongue of the sea of Egypt.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will wave his hand over the Euphrates River,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:15b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the river.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sending a mighty wind to divide it into seven streams
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so it can easily be crossed on foot.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will make a highway for the remnant of his people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the remnant coming from Assyria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: just as he did for Israel long ago
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they returned from Egypt.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will rest on him—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Spirit of wisdom and understanding,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the Spirit of counsel and might,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the Spirit of knowledge and the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He will delight in obeying the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will not judge by appearance
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor make a decision based on hearsay.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will give justice to the poor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make fair decisions for the exploited.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth will shake at the force of his word,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and one breath from his mouth will destroy the wicked.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will wear righteousness like a belt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and truth like an undergarment.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In that day the wolf and the lamb will live together;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the leopard will lie down with the baby goat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The calf and the yearling will be safe with the lion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a little child will lead them all.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The cow will graze near the bear.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The cub and the calf will lie down together.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The lion will eat hay like a cow.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The baby will play safely near the hole of a cobra.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, a little child will put its hand in a nest of deadly snakes without harm.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing will hurt or destroy in all my holy mountain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for as the waters fill the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'so the earth will be filled with people who know the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
