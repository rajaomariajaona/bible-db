document_id: ISA.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Branch from David’s Line
  - type: text
    content: Out of the stump of David’s family
  - type: note
    content: Hebrew the stump of the line of Jesse. Jesse was King David’s father.
  - type: text
    content: ' will grow a shoot—'
  - type: text
    content: yes, a new Branch bearing fruit from the old root.
  '10':
  - type: text
    content: In that day the heir to David’s throne
  - type: note
    content: Hebrew the root of Jesse.
  - type: text
    content: will be a banner of salvation to all the world.
  - type: text
    content: The nations will rally to him,
  - type: text
    content: and the land where he lives will be a glorious place.
  - type: note
    content: Greek version reads In that day the heir to David’s throne [literally the root of Jesse] will come, / and he will rule over the Gentiles. / They will place their hopes on him. Compare Rom 15:12.
  '11':
  - type: text
    content: In that day the Lord will reach out his hand a second time
  - type: text
    content: to bring back the remnant of his people—
  - type: text
    content: those who remain in Assyria and northern Egypt;
  - type: text
    content: in southern Egypt, Ethiopia,
  - type: note
    content: Hebrew in Pathros, Cush.
  - type: text
    content: ' and Elam;'
  - type: text
    content: in Babylonia,
  - type: note
    content: Hebrew in Shinar.
  - type: text
    content: ' Hamath, and all the distant coastlands.'
  '12':
  - type: text
    content: He will raise a flag among the nations
  - type: text
    content: and assemble the exiles of Israel.
  - type: text
    content: He will gather the scattered people of Judah
  - type: text
    content: from the ends of the earth.
  '13':
  - type: text
    content: Then at last the jealousy between Israel
  - type: note
    content: Hebrew Ephraim, referring to the northern kingdom of Israel.
  - type: text
    content: ' and Judah will end.'
  - type: text
    content: They will not be rivals anymore.
  '14':
  - type: text
    content: They will join forces to swoop down on Philistia to the west.
  - type: text
    content: Together they will attack and plunder the nations to the east.
  - type: text
    content: They will occupy the lands of Edom and Moab,
  - type: text
    content: and Ammon will obey them.
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will make a dry path through the gulf of the Red Sea.'
  - type: note
    content: Hebrew will destroy the tongue of the sea of Egypt.
  - type: text
    content: He will wave his hand over the Euphrates River,
  - type: note
    content: Hebrew the river.
  - type: text
    content: sending a mighty wind to divide it into seven streams
  - type: text
    content: so it can easily be crossed on foot.
  '16':
  - type: text
    content: He will make a highway for the remnant of his people,
  - type: text
    content: the remnant coming from Assyria,
  - type: text
    content: just as he did for Israel long ago
  - type: text
    content: when they returned from Egypt.
  '2':
  - type: text
    content: 'And the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' will rest on him—'
  - type: text
    content: the Spirit of wisdom and understanding,
  - type: text
    content: the Spirit of counsel and might,
  - type: text
    content: 'the Spirit of knowledge and the fear of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: 'He will delight in obeying the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: He will not judge by appearance
  - type: text
    content: nor make a decision based on hearsay.
  '4':
  - type: text
    content: He will give justice to the poor
  - type: text
    content: and make fair decisions for the exploited.
  - type: text
    content: The earth will shake at the force of his word,
  - type: text
    content: and one breath from his mouth will destroy the wicked.
  '5':
  - type: text
    content: He will wear righteousness like a belt
  - type: text
    content: and truth like an undergarment.
  '6':
  - type: text
    content: In that day the wolf and the lamb will live together;
  - type: text
    content: the leopard will lie down with the baby goat.
  - type: text
    content: The calf and the yearling will be safe with the lion,
  - type: text
    content: and a little child will lead them all.
  '7':
  - type: text
    content: The cow will graze near the bear.
  - type: text
    content: The cub and the calf will lie down together.
  - type: text
    content: The lion will eat hay like a cow.
  '8':
  - type: text
    content: The baby will play safely near the hole of a cobra.
  - type: text
    content: Yes, a little child will put its hand in a nest of deadly snakes without harm.
  '9':
  - type: text
    content: Nothing will hurt or destroy in all my holy mountain,
  - type: text
    content: for as the waters fill the sea,
  - type: text
    content: 'so the earth will be filled with people who know the '
  - type: text
    content: Lord
  - type: text
    content: .
