document_id: RUT.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Ruth at the Threshing Floor
  - type: text
    content: 'One day Naomi said to Ruth, “My daughter, it’s time that I found a permanent home for you, so that you will be provided for. '
  '10':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' bless you, my daughter!” Boaz exclaimed. “You are showing even more family loyalty now than you did before, for you have not gone after a younger man, whether rich or poor. '
  '11':
  - type: text
    content: 'Now don’t worry about a thing, my daughter. I will do what is necessary, for everyone in town knows you are a virtuous woman. '
  '12':
  - type: text
    content: 'But while it’s true that I am one of your family redeemers, there is another man who is more closely related to you than I am. '
  '13':
  - type: text
    content: 'Stay here tonight, and in the morning I will talk to him. If he is willing to redeem you, very well. Let him marry you. But if he is not willing, then as surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, I will redeem you myself! Now lie down here until morning.”'
  '14':
  - type: text
    content: 'So Ruth lay at Boaz’s feet until the morning, but she got up before it was light enough for people to recognize each other. For Boaz had said, “No one must know that a woman was here at the threshing floor.” '
  '15':
  - type: text
    content: Then Boaz said to her, “Bring your cloak and spread it out.” He measured six scoops
  - type: note
    content: Hebrew six measures, an unknown quantity.
  - type: text
    content: ' of barley into the cloak and placed it on her back. Then he'
  - type: note
    content: Most Hebrew manuscripts read he; many Hebrew manuscripts, Syriac version, and Latin Vulgate read she.
  - type: text
    content: ' returned to the town.'
  '16':
  - type: text
    content: When Ruth went back to her mother-in-law, Naomi asked, “What happened, my daughter?”
  - type: text
    content: 'Ruth told Naomi everything Boaz had done for her, '
  '17':
  - type: text
    content: and she added, “He gave me these six scoops of barley and said, ‘Don’t go back to your mother-in-law empty-handed.’”
  '18':
  - type: text
    content: Then Naomi said to her, “Just be patient, my daughter, until we hear what happens. The man won’t rest until he has settled things today.”
  '2':
  - type: text
    content: 'Boaz is a close relative of ours, and he’s been very kind by letting you gather grain with his young women. Tonight he will be winnowing barley at the threshing floor. '
  '3':
  - type: text
    content: 'Now do as I tell you—take a bath and put on perfume and dress in your nicest clothes. Then go to the threshing floor, but don’t let Boaz see you until he has finished eating and drinking. '
  '4':
  - type: text
    content: Be sure to notice where he lies down; then go and uncover his feet and lie down there. He will tell you what to do.”
  '5':
  - type: text
    content: '“I will do everything you say,” Ruth replied. '
  '6':
  - type: text
    content: So she went down to the threshing floor that night and followed the instructions of her mother-in-law.
  '7':
  - type: text
    content: 'After Boaz had finished eating and drinking and was in good spirits, he lay down at the far end of the pile of grain and went to sleep. Then Ruth came quietly, uncovered his feet, and lay down. '
  '8':
  - type: text
    content: 'Around midnight Boaz suddenly woke up and turned over. He was surprised to find a woman lying at his feet! '
  '9':
  - type: text
    content: “Who are you?” he asked.
  - type: text
    content: “I am your servant Ruth,” she replied. “Spread the corner of your covering over me, for you are my family redeemer.”
