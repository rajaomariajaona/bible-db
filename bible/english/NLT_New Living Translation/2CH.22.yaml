document_id: 2CH.22,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahaziah Rules in Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then the people of Jerusalem made Ahaziah, Jehoram’s youngest son, their next king, since the marauding bands who came with the Arabs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: marauding bands of Arabs.
      marker-yv: yv-n
    - type: text
      text: ' had killed all the older sons. So Ahaziah son of Jehoram reigned as king of Judah.'
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When Athaliah, the mother of King Ahaziah of Judah, learned that her son was dead, she began to destroy the rest of Judah’s royal family. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But Ahaziah’s sister Jehosheba,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 2 Kgs 11:2; Hebrew lacks '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ahaziah’s sister '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'and reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jehoshabeath '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[a variant spelling of Jehosheba].'
      marker-yv: yv-n
    - type: text
      text: ' the daughter of King Jehoram, took Ahaziah’s infant son, Joash, and stole him away from among the rest of the king’s children, who were about to be killed. She put Joash and his nurse in a bedroom. In this way, Jehosheba, wife of Jehoiada the priest and sister of Ahaziah, hid the child so that Athaliah could not murder him. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Joash remained hidden in the Temple of God for six years while Athaliah ruled over the land.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ahaziah was twenty-two
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts and Syriac version (see also 2 Kgs 8:26); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: forty-two.
      marker-yv: yv-n
    - type: text
      text: ' years old when he became king, and he reigned in Jerusalem one year. His mother was Athaliah, a granddaughter of King Omri. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahaziah also followed the evil example of King Ahab’s family, for his mother encouraged him in doing wrong. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did what was evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s sight, just as Ahab’s family had done. They even became his advisers after the death of his father, and they led him to ruin.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Following their evil advice, Ahaziah joined Joram,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:5a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jehoram, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Joram; also in 22:6, 7.
      marker-yv: yv-n
    - type: text
      text: ' the son of King Ahab of Israel, in his war against King Hazael of Aram at Ramoth-gilead. When the Arameans'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:5b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in two Hebrew manuscripts and Latin Vulgate (see also 2 Kgs 8:28); Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the archers.
      marker-yv: yv-n
    - type: text
      text: ' wounded Joram in the battle, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: he returned to Jezreel to recover from the wounds he had received at Ramoth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:6a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ramah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Ramoth.
      marker-yv: yv-n
    - type: text
      text: ' Because Joram was wounded, King Ahaziah'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:6b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts, Greek and Syriac versions, and Latin Vulgate (see also 2 Kgs 8:29); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Azariah.
      marker-yv: yv-n
    - type: text
      text: ' of Judah went to Jezreel to visit him.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But God had decided that this visit would be Ahaziah’s downfall. While he was there, Ahaziah went out with Joram to meet Jehu grandson of Nimshi,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'descendant of Nimshi; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare 2 Kgs 9:2, 14.
      marker-yv: yv-n
    - type: text
      text: ' whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had appointed to destroy the dynasty of Ahab.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: While Jehu was executing judgment against the family of Ahab, he happened to meet some of Judah’s officials and Ahaziah’s relatives
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version (see also 2 Kgs 10:13); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and sons of the brothers of Ahaziah.
      marker-yv: yv-n
    - type: text
      text: ' who were traveling with Ahaziah. So Jehu killed them all. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jehu’s men searched for Ahaziah, and they found him hiding in the city of Samaria. They brought him to Jehu, who killed him. Ahaziah was given a decent burial because the people said, “He was the grandson of Jehoshaphat—a man who sought the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with all his heart.” But none of the surviving members of Ahaziah’s family was capable of ruling the kingdom.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Queen Athaliah Rules in Judah
    marker-yv: yv-h
