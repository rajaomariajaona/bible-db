document_id: 2CH.22,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Ahaziah Rules in Judah
  - type: text
    content: Then the people of Jerusalem made Ahaziah, Jehoram’s youngest son, their next king, since the marauding bands who came with the Arabs
  - type: note
    content: Or marauding bands of Arabs.
  - type: text
    content: ' had killed all the older sons. So Ahaziah son of Jehoram reigned as king of Judah.'
  '10':
  - type: text
    content: 'When Athaliah, the mother of King Ahaziah of Judah, learned that her son was dead, she began to destroy the rest of Judah’s royal family. '
  '11':
  - type: text
    content: But Ahaziah’s sister Jehosheba,
  - type: note
    content: As in parallel text at 2 Kgs 11:2; Hebrew lacks Ahaziah’s sister and reads Jehoshabeath [a variant spelling of Jehosheba].
  - type: text
    content: ' the daughter of King Jehoram, took Ahaziah’s infant son, Joash, and stole him away from among the rest of the king’s children, who were about to be killed. She put Joash and his nurse in a bedroom. In this way, Jehosheba, wife of Jehoiada the priest and sister of Ahaziah, hid the child so that Athaliah could not murder him. '
  '12':
  - type: text
    content: Joash remained hidden in the Temple of God for six years while Athaliah ruled over the land.
  '2':
  - type: text
    content: Ahaziah was twenty-two
  - type: note
    content: As in some Greek manuscripts and Syriac version (see also 2 Kgs 8:26); Hebrew reads forty-two.
  - type: text
    content: ' years old when he became king, and he reigned in Jerusalem one year. His mother was Athaliah, a granddaughter of King Omri. '
  '3':
  - type: text
    content: 'Ahaziah also followed the evil example of King Ahab’s family, for his mother encouraged him in doing wrong. '
  '4':
  - type: text
    content: 'He did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight, just as Ahab’s family had done. They even became his advisers after the death of his father, and they led him to ruin.
  '5':
  - type: text
    content: Following their evil advice, Ahaziah joined Joram,
  - type: note
    content: Hebrew Jehoram, a variant spelling of Joram; also in 22:6, 7.
  - type: text
    content: ' the son of King Ahab of Israel, in his war against King Hazael of Aram at Ramoth-gilead. When the Arameans'
  - type: note
    content: As in two Hebrew manuscripts and Latin Vulgate (see also 2 Kgs 8:28); Masoretic Text reads the archers.
  - type: text
    content: ' wounded Joram in the battle, '
  '6':
  - type: text
    content: he returned to Jezreel to recover from the wounds he had received at Ramoth.
  - type: note
    content: Hebrew Ramah, a variant spelling of Ramoth.
  - type: text
    content: ' Because Joram was wounded, King Ahaziah'
  - type: note
    content: As in some Hebrew manuscripts, Greek and Syriac versions, and Latin Vulgate (see also 2 Kgs 8:29); most Hebrew manuscripts read Azariah.
  - type: text
    content: ' of Judah went to Jezreel to visit him.'
  '7':
  - type: text
    content: But God had decided that this visit would be Ahaziah’s downfall. While he was there, Ahaziah went out with Joram to meet Jehu grandson of Nimshi,
  - type: note
    content: Hebrew descendant of Nimshi; compare 2 Kgs 9:2, 14.
  - type: text
    content: ' whom the '
  - type: text
    content: Lord
  - type: text
    content: ' had appointed to destroy the dynasty of Ahab.'
  '8':
  - type: text
    content: While Jehu was executing judgment against the family of Ahab, he happened to meet some of Judah’s officials and Ahaziah’s relatives
  - type: note
    content: As in Greek version (see also 2 Kgs 10:13); Hebrew reads and sons of the brothers of Ahaziah.
  - type: text
    content: ' who were traveling with Ahaziah. So Jehu killed them all. '
  '9':
  - type: text
    content: 'Then Jehu’s men searched for Ahaziah, and they found him hiding in the city of Samaria. They brought him to Jehu, who killed him. Ahaziah was given a decent burial because the people said, “He was the grandson of Jehoshaphat—a man who sought the '
  - type: text
    content: Lord
  - type: text
    content: ' with all his heart.” But none of the surviving members of Ahaziah’s family was capable of ruling the kingdom.'
  - type: heading
    content: Queen Athaliah Rules in Judah
