document_id: JOB.36,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Elihu continued speaking:'
  '10':
  - type: text
    content: He gets their attention
  - type: text
    content: and commands that they turn from evil.
  '11':
  - type: text
    content: “If they listen and obey God,
  - type: text
    content: they will be blessed with prosperity throughout their lives.
  - type: text
    content: All their years will be pleasant.
  '12':
  - type: text
    content: But if they refuse to listen to him,
  - type: text
    content: they will cross over the river of death,
  - type: text
    content: dying from lack of understanding.
  '13':
  - type: text
    content: For the godless are full of resentment.
  - type: text
    content: Even when he punishes them,
  - type: text
    content: they refuse to cry out to him for help.
  '14':
  - type: text
    content: They die when they are young,
  - type: text
    content: after wasting their lives in immoral living.
  '15':
  - type: text
    content: But by means of their suffering, he rescues those who suffer.
  - type: text
    content: For he gets their attention through adversity.
  '16':
  - type: text
    content: “God is leading you away from danger, Job,
  - type: text
    content: to a place free from distress.
  - type: text
    content: He is setting your table with the best food.
  '17':
  - type: text
    content: But you are obsessed with whether the godless will be judged.
  - type: text
    content: Don’t worry, judgment and justice will be upheld.
  '18':
  - type: text
    content: But watch out, or you may be seduced by wealth.
  - type: note
    content: Or But don’t let your anger lead you to mockery.
  - type: text
    content: Don’t let yourself be bribed into sin.
  '19':
  - type: text
    content: Could all your wealth
  - type: note
    content: Or Could all your cries for help.
  - type: text
    content: or all your mighty efforts
  - type: text
    content: keep you from distress?
  '2':
  - type: text
    content: “Let me go on, and I will show you the truth.
  - type: text
    content: For I have not finished defending God!
  '20':
  - type: text
    content: Do not long for the cover of night,
  - type: text
    content: for that is when people will be destroyed.
  - type: note
    content: The meaning of the Hebrew in this passage is uncertain.
  '21':
  - type: text
    content: Be on guard! Turn back from evil,
  - type: text
    content: for God sent this suffering
  - type: text
    content: to keep you from a life of evil.
  - type: heading
    content: Elihu Reminds Job of God’s Power
  '22':
  - type: text
    content: “Look, God is all-powerful.
  - type: text
    content: Who is a teacher like him?
  '23':
  - type: text
    content: No one can tell him what to do,
  - type: text
    content: or say to him, ‘You have done wrong.’
  '24':
  - type: text
    content: Instead, glorify his mighty works,
  - type: text
    content: singing songs of praise.
  '25':
  - type: text
    content: Everyone has seen these things,
  - type: text
    content: though only from a distance.
  '26':
  - type: text
    content: “Look, God is greater than we can understand.
  - type: text
    content: His years cannot be counted.
  '27':
  - type: text
    content: He draws up the water vapor
  - type: text
    content: and then distills it into rain.
  '28':
  - type: text
    content: The rain pours down from the clouds,
  - type: text
    content: and everyone benefits.
  '29':
  - type: text
    content: Who can understand the spreading of the clouds
  - type: text
    content: and the thunder that rolls forth from heaven?
  '3':
  - type: text
    content: I will present profound arguments
  - type: text
    content: for the righteousness of my Creator.
  '30':
  - type: text
    content: See how he spreads the lightning around him
  - type: text
    content: and how it lights up the depths of the sea.
  '31':
  - type: text
    content: By these mighty acts he nourishes
  - type: note
    content: Or he governs.
  - type: text
    content: ' the people,'
  - type: text
    content: giving them food in abundance.
  '32':
  - type: text
    content: He fills his hands with lightning bolts
  - type: text
    content: and hurls each at its target.
  '33':
  - type: text
    content: The thunder announces his presence;
  - type: text
    content: the storm announces his indignant anger.
  - type: note
    content: Or even the cattle know when a storm is coming. The meaning of the Hebrew is uncertain.
  '4':
  - type: text
    content: I am telling you nothing but the truth,
  - type: text
    content: for I am a man of great knowledge.
  '5':
  - type: text
    content: “God is mighty, but he does not despise anyone!
  - type: text
    content: He is mighty in both power and understanding.
  '6':
  - type: text
    content: He does not let the wicked live
  - type: text
    content: but gives justice to the afflicted.
  '7':
  - type: text
    content: He never takes his eyes off the innocent,
  - type: text
    content: but he sets them on thrones with kings
  - type: text
    content: and exalts them forever.
  '8':
  - type: text
    content: If they are bound in chains
  - type: text
    content: and caught up in a web of trouble,
  '9':
  - type: text
    content: he shows them the reason.
  - type: text
    content: He shows them their sins of pride.
