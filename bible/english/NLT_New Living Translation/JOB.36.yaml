document_id: JOB.36
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Elihu continued speaking:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Let me go on, and I will show you the truth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: For I have not finished defending God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I will present profound arguments
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the righteousness of my Creator.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I am telling you nothing but the truth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I am a man of great knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “God is mighty, but he does not despise anyone!
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is mighty in both power and understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He does not let the wicked live
- type: usfm
  marker: q2
  children:
  - type: text
    text: but gives justice to the afflicted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He never takes his eyes off the innocent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he sets them on thrones with kings
- type: usfm
  marker: q2
  children:
  - type: text
    text: and exalts them forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: If they are bound in chains
- type: usfm
  marker: q2
  children:
  - type: text
    text: and caught up in a web of trouble,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: he shows them the reason.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He shows them their sins of pride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He gets their attention
- type: usfm
  marker: q2
  children:
  - type: text
    text: and commands that they turn from evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “If they listen and obey God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will be blessed with prosperity throughout their lives.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All their years will be pleasant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But if they refuse to listen to him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will cross over the river of death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: dying from lack of understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For the godless are full of resentment.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even when he punishes them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they refuse to cry out to him for help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They die when they are young,
- type: usfm
  marker: q2
  children:
  - type: text
    text: after wasting their lives in immoral living.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But by means of their suffering, he rescues those who suffer.
- type: usfm
  marker: q2
  children:
  - type: text
    text: For he gets their attention through adversity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “God is leading you away from danger, Job,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to a place free from distress.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is setting your table with the best food.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But you are obsessed with whether the godless will be judged.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t worry, judgment and justice will be upheld.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But watch out, or you may be seduced by wealth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: But don’t let your anger lead you to mockery.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t let yourself be bribed into sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Could all your wealth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Could all your cries for help.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: or all your mighty efforts
- type: usfm
  marker: q2
  children:
  - type: text
    text: keep you from distress?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Do not long for the cover of night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for that is when people will be destroyed.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:16-20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew in this passage is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Be on guard! Turn back from evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for God sent this suffering
- type: usfm
  marker: q2
  children:
  - type: text
    text: to keep you from a life of evil.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elihu Reminds Job of God’s Power
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Look, God is all-powerful.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who is a teacher like him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: No one can tell him what to do,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or say to him, ‘You have done wrong.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Instead, glorify his mighty works,
- type: usfm
  marker: q2
  children:
  - type: text
    text: singing songs of praise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Everyone has seen these things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though only from a distance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Look, God is greater than we can understand.
- type: usfm
  marker: q2
  children:
  - type: text
    text: His years cannot be counted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: He draws up the water vapor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then distills it into rain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The rain pours down from the clouds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and everyone benefits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Who can understand the spreading of the clouds
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the thunder that rolls forth from heaven?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: See how he spreads the lightning around him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and how it lights up the depths of the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: By these mighty acts he nourishes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he governs.
    marker-yv: yv-n
  - type: text
    text: ' the people,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: giving them food in abundance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: He fills his hands with lightning bolts
- type: usfm
  marker: q2
  children:
  - type: text
    text: and hurls each at its target.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: The thunder announces his presence;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the storm announces his indignant anger.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'even the cattle know when a storm is coming. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
