document_id: 1JN.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Discerning False Prophets
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dear friends, do not believe everyone who claims to speak by the Spirit. You must test them to see if the spirit they have comes from God. For there are many false prophets in the world. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This is real love—not that we loved God, but that he loved us and sent his Son as a sacrifice to take away our sins.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dear friends, since God loved us that much, we surely ought to love each other. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No one has ever seen God. But if we love each other, God lives in us, and his love is brought to full expression in us.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God has given us his Spirit as proof that we live in him and he in us. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Furthermore, we have seen with our own eyes and now testify that the Father sent his Son to be the Savior of the world. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All who declare that Jesus is the Son of God have God living in them, and they live in God. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We know how much God loves us, and we have put our trust in his love.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God is love, and all who live in love live in God, and God lives in them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And as we live in God, our love grows more perfect. So we will not be afraid on the day of judgment, but we can face him with confidence because we live like Jesus here in this world.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Such love has no fear, because perfect love expels all fear. If we are afraid, it is for fear of punishment, and this shows that we have not fully experienced his perfect love. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We love each other
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'We love. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Other manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'We love God; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'still others read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: We love him.
      marker-yv: yv-n
    - type: text
      text: ' because he loved us first.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is how we know if they have the Spirit of God: If a person claiming to be a prophet'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'If a spirit; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly in 4:3.
      marker-yv: yv-n
    - type: text
      text: ' acknowledges that Jesus Christ came in a real body, that person has the Spirit of God. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If someone says, “I love God,” but hates a fellow believer,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: hates his brother.
      marker-yv: yv-n
    - type: text
      text: ' that person is a liar; for if we don’t love people we can see, how can we love God, whom we cannot see? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he has given us this command: Those who love God must also love their fellow believers.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The one who loves God must also love his brother.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But if someone claims to be a prophet and does not acknowledge the truth about Jesus, that person is not from God. Such a person has the spirit of the Antichrist, which you heard is coming into the world and indeed is already here.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you belong to God, my dear children. You have already won a victory over those people, because the Spirit who lives in you is greater than the spirit who lives in the world. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those people belong to this world, so they speak from the world’s viewpoint, and the world listens to them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But we belong to God, and those who know God listen to us. If they do not belong to God, they do not listen to us. That is how we know if someone has the Spirit of truth or the spirit of deception.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loving One Another
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dear friends, let us continue to love one another, for love comes from God. Anyone who loves is a child of God and knows God. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But anyone who does not love does not know God, for God is love.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God showed how much he loved us by sending his one and only Son into the world so that we might have eternal life through him. '
