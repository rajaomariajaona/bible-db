document_id: EZK.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem—an Unfaithful Wife
  - type: text
    content: 'Then another message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'I gave you expensive clothing of fine linen and silk, beautifully embroidered, and sandals made of fine goatskin leather. '
  '11':
  - type: text
    content: 'I gave you lovely jewelry, bracelets, beautiful necklaces, '
  '12':
  - type: text
    content: 'a ring for your nose, earrings for your ears, and a lovely crown for your head. '
  '13':
  - type: text
    content: 'And so you were adorned with gold and silver. Your clothes were made of fine linen and costly fabric and were beautifully embroidered. You ate the finest foods—choice flour, honey, and olive oil—and became more beautiful than ever. You looked like a queen, and so you were! '
  '14':
  - type: text
    content: 'Your fame soon spread throughout the world because of your beauty. I dressed you in my splendor and perfected your beauty, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: '“But you thought your fame and beauty were your own. So you gave yourself as a prostitute to every man who came along. Your beauty was theirs for the asking. '
  '16':
  - type: text
    content: 'You used the lovely things I gave you to make shrines for idols, where you played the prostitute. Unbelievable! How could such a thing ever happen? '
  '17':
  - type: text
    content: 'You took the very jewels and gold and silver ornaments I had given you and made statues of men and worshiped them. This is adultery against me! '
  '18':
  - type: text
    content: 'You used the beautifully embroidered clothes I gave you to dress your idols. Then you used my special oil and my incense to worship them. '
  '19':
  - type: text
    content: 'Imagine it! You set before them as a sacrifice the choice flour, olive oil, and honey I had given you, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: '“Son of man, confront Jerusalem with her detestable sins. '
  '20':
  - type: text
    content: '“Then you took your sons and daughters—the children you had borne to me—and sacrificed them to your gods. Was your prostitution not enough? '
  '21':
  - type: text
    content: 'Must you also slaughter my children by sacrificing them to idols? '
  '22':
  - type: text
    content: In all your years of adultery and detestable sin, you have not once remembered the days long ago when you lay naked in a field, kicking about in your own blood.
  '23':
  - type: text
    content: '“What sorrow awaits you, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. In addition to all your other wickedness, '
  '24':
  - type: text
    content: 'you built a pagan shrine and put altars to idols in every town square. '
  '25':
  - type: text
    content: 'On every street corner you defiled your beauty, offering your body to every passerby in an endless stream of prostitution. '
  '26':
  - type: text
    content: 'Then you added lustful Egypt to your lovers, provoking my anger with your increasing promiscuity. '
  '27':
  - type: text
    content: 'That is why I struck you with my fist and reduced your boundaries. I handed you over to your enemies, the Philistines, and even they were shocked by your lewd conduct. '
  '28':
  - type: text
    content: 'You have prostituted yourself with the Assyrians, too. It seems you can never find enough new lovers! And after your prostitution there, you still were not satisfied. '
  '29':
  - type: text
    content: You added to your lovers by embracing Babylonia,
  - type: note
    content: Or Chaldea.
  - type: text
    content: ' the land of merchants, but you still weren’t satisfied.'
  '3':
  - type: text
    content: 'Give her this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ': You are nothing but a Canaanite! Your father was an Amorite and your mother a Hittite. '
  '30':
  - type: text
    content: '“What a sick heart you have, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', to do such things as these, acting like a shameless prostitute. '
  '31':
  - type: text
    content: 'You build your pagan shrines on every street corner and your altars to idols in every square. In fact, you have been worse than a prostitute, so eager for sin that you have not even demanded payment. '
  '32':
  - type: text
    content: 'Yes, you are an adulterous wife who takes in strangers instead of her own husband. '
  '33':
  - type: text
    content: 'Prostitutes charge for their services—but not you! You give gifts to your lovers, bribing them to come and have sex with you. '
  '34':
  - type: text
    content: So you are the opposite of other prostitutes. You pay your lovers instead of their paying you!
  - type: heading
    content: Judgment on Jerusalem’s Prostitution
  '35':
  - type: text
    content: '“Therefore, you prostitute, listen to this message from the '
  - type: text
    content: Lord
  - type: text
    content: '! '
  '36':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Because you have poured out your lust and exposed yourself in prostitution to all your lovers, and because you have worshiped detestable idols,'
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung.
  - type: text
    content: ' and because you have slaughtered your children as sacrifices to your gods, '
  '37':
  - type: text
    content: 'this is what I am going to do. I will gather together all your allies—the lovers with whom you have sinned, both those you loved and those you hated—and I will strip you naked in front of them so they can stare at you. '
  '38':
  - type: text
    content: 'I will punish you for your murder and adultery. I will cover you with blood in my jealous fury. '
  '39':
  - type: text
    content: 'Then I will give you to these many nations who are your lovers, and they will destroy you. They will knock down your pagan shrines and the altars to your idols. They will strip you and take your beautiful jewels, leaving you stark naked. '
  '4':
  - type: text
    content: 'On the day you were born, no one cared about you. Your umbilical cord was not cut, and you were never washed, rubbed with salt, and wrapped in cloth. '
  '40':
  - type: text
    content: 'They will band together in a mob to stone you and cut you up with swords. '
  '41':
  - type: text
    content: They will burn your homes and punish you in front of many women. I will stop your prostitution and end your payments to your many lovers.
  '42':
  - type: text
    content: '“Then at last my fury against you will be spent, and my jealous anger will subside. I will be calm and will not be angry with you anymore. '
  '43':
  - type: text
    content: 'But first, because you have not remembered your youth but have angered me by doing all these evil things, I will fully repay you for all of your sins, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. For you have added lewd acts to all your detestable sins. '
  '44':
  - type: text
    content: 'Everyone who makes up proverbs will say of you, ‘Like mother, like daughter.’ '
  '45':
  - type: text
    content: For your mother loathed her husband and her children, and so do you. And you are exactly like your sisters, for they despised their husbands and their children. Truly your mother was a Hittite and your father an Amorite.
  '46':
  - type: text
    content: '“Your older sister was Samaria, who lived with her daughters in the north. Your younger sister was Sodom, who lived with her daughters in the south. '
  '47':
  - type: text
    content: 'But you have not merely sinned as they did. You quickly surpassed them in corruption. '
  '48':
  - type: text
    content: 'As surely as I live, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', Sodom and her daughters were never as wicked as you and your daughters. '
  '49':
  - type: text
    content: 'Sodom’s sins were pride, gluttony, and laziness, while the poor and needy suffered outside her door. '
  '5':
  - type: text
    content: No one had the slightest interest in you; no one pitied you or cared for you. On the day you were born, you were unwanted, dumped in a field and left to die.
  '50':
  - type: text
    content: She was proud and committed detestable sins, so I wiped her out, as you have seen.
  - type: note
    content: As in a few Hebrew manuscripts and Greek version; Masoretic Text reads as I have seen.
  '51':
  - type: text
    content: '“Even Samaria did not commit half your sins. You have done far more detestable things than your sisters ever did. They seem righteous compared to you. '
  '52':
  - type: text
    content: Shame on you! Your sins are so terrible that you make your sisters seem righteous, even virtuous.
  '53':
  - type: text
    content: '“But someday I will restore the fortunes of Sodom and Samaria, and I will restore you, too. '
  '54':
  - type: text
    content: 'Then you will be truly ashamed of everything you have done, for your sins make them feel good in comparison. '
  '55':
  - type: text
    content: 'Yes, your sisters, Sodom and Samaria, and all their people will be restored, and at that time you also will be restored. '
  '56':
  - type: text
    content: 'In your proud days you held Sodom in contempt. '
  '57':
  - type: text
    content: But now your greater wickedness has been exposed to all the world, and you are the one who is scorned—by Edom
  - type: note
    content: As in many Hebrew manuscripts and Syriac version; Masoretic Text reads Aram.
  - type: text
    content: ' and all her neighbors and by Philistia. '
  '58':
  - type: text
    content: 'This is your punishment for all your lewdness and detestable sins, says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '59':
  - type: text
    content: '“Now this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will give you what you deserve, for you have taken your solemn vows lightly by breaking your covenant. '
  '6':
  - type: text
    content: '“But I came by and saw you there, helplessly kicking about in your own blood. As you lay there, I said, ‘Live!’ '
  '60':
  - type: text
    content: 'Yet I will remember the covenant I made with you when you were young, and I will establish an everlasting covenant with you. '
  '61':
  - type: text
    content: 'Then you will remember with shame all the evil you have done. I will make your sisters, Samaria and Sodom, to be your daughters, even though they are not part of our covenant. '
  '62':
  - type: text
    content: 'And I will reaffirm my covenant with you, and you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '63':
  - type: text
    content: 'You will remember your sins and cover your mouth in silent shame when I forgive you of all that you have done. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '7':
  - type: text
    content: 'And I helped you to thrive like a plant in the field. You grew up and became a beautiful jewel. Your breasts became full, and your body hair grew, but you were still naked. '
  '8':
  - type: text
    content: 'And when I passed by again, I saw that you were old enough for love. So I wrapped my cloak around you to cover your nakedness and declared my marriage vows. I made a covenant with you, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', and you became mine.'
  '9':
  - type: text
    content: '“Then I bathed you and washed off your blood, and I rubbed fragrant oils into your skin. '
