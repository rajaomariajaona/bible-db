document_id: ISA.55
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Invitation to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Salvation
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Is anyone thirsty?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Come and drink—
- type: usfm
  marker: q2
  children:
  - type: text
    text: even if you have no money!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come, take your choice of wine or milk—
- type: usfm
  marker: q2
  children:
  - type: text
    text: it’s all free!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Why spend your money on food that does not give you strength?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why pay for food that does you no good?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen to me, and you will eat what is good.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You will enjoy the finest food.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Come to me with your ears wide open.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen, and you will find life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will make an everlasting covenant with you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will give you all the unfailing love I promised to David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: See how I used him to display my power among the peoples.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I made him a leader among the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You also will command nations you do not know,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and peoples unknown to you will come running to obey,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'because I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Holy One of Israel, have made you glorious.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' while you can find him.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Call on him now while he is near.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Let the wicked change their ways
- type: usfm
  marker: q2
  children:
  - type: text
    text: and banish the very thought of doing wrong.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let them turn to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' that he may have mercy on them.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, turn to our God, for he will forgive generously.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“My thoughts are nothing like your thoughts,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: “And my ways are far beyond anything you could imagine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For just as the heavens are higher than the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so my ways are higher than your ways
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my thoughts higher than your thoughts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “The rain and snow come down from the heavens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stay on the ground to water the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cause the grain to grow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: producing seed for the farmer
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bread for the hungry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: It is the same with my word.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I send it out, and it always produces fruit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will accomplish all I want it to,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and it will prosper everywhere I send it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You will live in joy and peace.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The mountains and hills will burst into song,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the trees of the field will clap their hands!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Where once there were thorns, cypress trees will grow.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where nettles grew, myrtles will sprout up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'These events will bring great honor to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s name;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will be an everlasting sign of his power and love.”
