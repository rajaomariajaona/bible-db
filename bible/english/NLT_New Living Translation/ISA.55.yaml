document_id: ISA.55,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Invitation to the Lord’s Salvation
  - type: text
    content: “Is anyone thirsty?
  - type: text
    content: Come and drink—
  - type: text
    content: even if you have no money!
  - type: text
    content: Come, take your choice of wine or milk—
  - type: text
    content: it’s all free!
  '10':
  - type: text
    content: “The rain and snow come down from the heavens
  - type: text
    content: and stay on the ground to water the earth.
  - type: text
    content: They cause the grain to grow,
  - type: text
    content: producing seed for the farmer
  - type: text
    content: and bread for the hungry.
  '11':
  - type: text
    content: It is the same with my word.
  - type: text
    content: I send it out, and it always produces fruit.
  - type: text
    content: It will accomplish all I want it to,
  - type: text
    content: and it will prosper everywhere I send it.
  '12':
  - type: text
    content: You will live in joy and peace.
  - type: text
    content: The mountains and hills will burst into song,
  - type: text
    content: and the trees of the field will clap their hands!
  '13':
  - type: text
    content: Where once there were thorns, cypress trees will grow.
  - type: text
    content: Where nettles grew, myrtles will sprout up.
  - type: text
    content: 'These events will bring great honor to the '
  - type: text
    content: Lord
  - type: text
    content: ’s name;
  - type: text
    content: they will be an everlasting sign of his power and love.”
  '2':
  - type: text
    content: Why spend your money on food that does not give you strength?
  - type: text
    content: Why pay for food that does you no good?
  - type: text
    content: Listen to me, and you will eat what is good.
  - type: text
    content: You will enjoy the finest food.
  '3':
  - type: text
    content: “Come to me with your ears wide open.
  - type: text
    content: Listen, and you will find life.
  - type: text
    content: I will make an everlasting covenant with you.
  - type: text
    content: I will give you all the unfailing love I promised to David.
  '4':
  - type: text
    content: See how I used him to display my power among the peoples.
  - type: text
    content: I made him a leader among the nations.
  '5':
  - type: text
    content: You also will command nations you do not know,
  - type: text
    content: and peoples unknown to you will come running to obey,
  - type: text
    content: 'because I, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: the Holy One of Israel, have made you glorious.”
  '6':
  - type: text
    content: 'Seek the '
  - type: text
    content: Lord
  - type: text
    content: ' while you can find him.'
  - type: text
    content: Call on him now while he is near.
  '7':
  - type: text
    content: Let the wicked change their ways
  - type: text
    content: and banish the very thought of doing wrong.
  - type: text
    content: 'Let them turn to the '
  - type: text
    content: Lord
  - type: text
    content: ' that he may have mercy on them.'
  - type: text
    content: Yes, turn to our God, for he will forgive generously.
  '8':
  - type: text
    content: '“My thoughts are nothing like your thoughts,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “And my ways are far beyond anything you could imagine.
  '9':
  - type: text
    content: For just as the heavens are higher than the earth,
  - type: text
    content: so my ways are higher than your ways
  - type: text
    content: and my thoughts higher than your thoughts.
