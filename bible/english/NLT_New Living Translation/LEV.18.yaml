  '13':
  - type: text
    content: “Do not have sexual relations with your mother’s sister, for she is your mother’s close relative.
  '14':
  - type: text
    content: “Do not violate your uncle, your father’s brother, by having sexual relations with his wife, for she is your aunt.
  '15':
  - type: text
    content: “Do not have sexual relations with your daughter-in-law; she is your son’s wife, so you must not have sexual relations with her.
  '16':
  - type: text
    content: “Do not have sexual relations with your brother’s wife, for this would violate your brother.
  '17':
