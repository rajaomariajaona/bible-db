  '18':
  - type: text
    content: “While your wife is living, do not marry her sister and have sexual relations with her, for they would be rivals.
  '19':
  - type: text
    content: “Do not have sexual relations with a woman during her period of menstrual impurity.
  '2':
  - type: text
    content: '“Give the following instructions to the people of Israel. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '20':
  - type: text
    content: “Do not defile yourself by having sexual intercourse with your neighbor’s wife.
  '21':
  - type: text
    content: '“Do not permit any of your children to be offered as a sacrifice to Molech, for you must not bring shame on the name of your God. I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '22':
  - type: text
    content: “Do not practice homosexuality, having sex with another man as with a woman. It is a detestable sin.
  '23':
  - type: text
    content: “A man must not defile himself by having sex with an animal. And a woman must not offer herself to a male animal to have intercourse with it. This is a perverse act.
  '24':
  - type: text
    content: '“Do not defile yourselves in any of these ways, for the people I am driving out before you have defiled themselves in all these ways. '
  '25':
  - type: text
    content: 'Because the entire land has become defiled, I am punishing the people who live there. I will cause the land to vomit them out. '
  '26':
  - type: text
    content: You must obey all my decrees and regulations. You must not commit any of these detestable sins. This applies both to native-born Israelites and to the foreigners living among you.
  '27':
  - type: text
    content: '“All these detestable activities are practiced by the people of the land where I am taking you, and this is how the land has become defiled. '
  '28':
  - type: text
    content: 'So do not defile the land and give it a reason to vomit you out, as it will vomit out the people who live there now. '
  '29':
  - type: text
    content: 'Whoever commits any of these detestable sins will be cut off from the community of Israel. '
  '3':
  - type: text
    content: 'So do not act like the people in Egypt, where you used to live, or like the people of Canaan, where I am taking you. You must not imitate their way of life. '
  '30':
  - type: text
    content: 'So obey my instructions, and do not defile yourselves by committing any of these detestable practices that were committed by the people who lived in the land before you. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.”'
  '4':
  - type: text
    content: 'You must obey all my regulations and be careful to obey my decrees, for I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '5':
  - type: text
    content: 'If you obey my decrees and my regulations, you will find life through them. I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: '“You must never have sexual relations with a close relative, for I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: “Do not violate your father by having sexual relations with your mother. She is your mother; you must not have sexual relations with her.
  '8':
  - type: text
    content: “Do not have sexual relations with any of your father’s wives, for this would violate your father.
  '9':
  - type: text
    content: “Do not have sexual relations with your sister or half sister, whether she is your father’s daughter or your mother’s daughter, whether she was born into your household or someone else’s.
