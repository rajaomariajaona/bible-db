document_id: DEU.34,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Moses
  - type: text
    content: 'Then Moses went up to Mount Nebo from the plains of Moab and climbed Pisgah Peak, which is across from Jericho. And the '
  - type: text
    content: Lord
  - type: text
    content: ' showed him the whole land, from Gilead as far as Dan; '
  '10':
  - type: text
    content: 'There has never been another prophet in Israel like Moses, whom the '
  - type: text
    content: Lord
  - type: text
    content: ' knew face to face. '
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' sent him to perform all the miraculous signs and wonders in the land of Egypt against Pharaoh, and all his servants, and his entire land. '
  '12':
  - type: text
    content: With mighty power, Moses performed terrifying acts in the sight of all Israel.
  '2':
  - type: text
    content: all the land of Naphtali; the land of Ephraim and Manasseh; all the land of Judah, extending to the Mediterranean Sea
  - type: note
    content: Hebrew the western sea.
  - type: text
    content: '; '
  '3':
  - type: text
    content: 'the Negev; the Jordan Valley with Jericho—the city of palms—as far as Zoar. '
  '4':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “This is the land I promised on oath to Abraham, Isaac, and Jacob when I said, ‘I will give it to your descendants.’ I have now allowed you to see it with your own eyes, but you will not enter the land.”'
  '5':
  - type: text
    content: 'So Moses, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', died there in the land of Moab, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had said. '
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' buried him'
  - type: note
    content: Hebrew He buried him; Samaritan Pentateuch and some Greek manuscripts read They buried him.
  - type: text
    content: ' in a valley near Beth-peor in Moab, but to this day no one knows the exact place. '
  '7':
  - type: text
    content: 'Moses was 120 years old when he died, yet his eyesight was clear, and he was as strong as ever. '
  '8':
  - type: text
    content: The people of Israel mourned for Moses on the plains of Moab for thirty days, until the customary period of mourning was over.
  '9':
  - type: text
    content: 'Now Joshua son of Nun was full of the spirit of wisdom, for Moses had laid his hands on him. So the people of Israel obeyed him, doing just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
