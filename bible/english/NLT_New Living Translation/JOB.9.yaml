document_id: JOB.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Job’s Third Speech: A Response to Bildad'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Job spoke again:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Yes, I know all this is true in principle.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But how can a person be declared innocent in God’s sight?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: If someone wanted to take God to court,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: If God wanted to take someone to court.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: would it be possible to answer him even once in a thousand times?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For God is so wise and so mighty.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who has ever challenged him successfully?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Without warning, he moves the mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: overturning them in his anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He shakes the earth from its place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and its foundations tremble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: If he commands it, the sun won’t rise
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the stars won’t shine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He alone has spread out the heavens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and marches on the waves of the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He made all the stars—the Bear and Orion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Pleiades and the constellations of the southern sky.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He does great things too marvelous to understand.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He performs countless miracles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Yet when he comes near, I cannot see him.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When he moves by, I do not see him go.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: If he snatches someone in death, who can stop him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who dares to ask, ‘What are you doing?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And God does not restrain his anger.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even the monsters of the sea
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the helpers of Rahab, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: the name of a mythical sea monster that represents chaos in ancient literature.
    marker-yv: yv-n
  - type: text
    text: ' are crushed beneath his feet.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “So who am I, that I should try to answer God
- type: usfm
  marker: q2
  children:
  - type: text
    text: or even reason with him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Even if I were right, I would have no defense.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I could only plead for mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And even if I summoned him and he responded,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m not sure he would listen to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For he attacks me with a storm
- type: usfm
  marker: q2
  children:
  - type: text
    text: and repeatedly wounds me without cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He will not let me catch my breath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but fills me instead with bitter sorrows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: If it’s a question of strength, he’s the strong one.
- type: usfm
  marker: q2
  children:
  - type: text
    text: If it’s a matter of justice, who dares to summon him
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: me.
    marker-yv: yv-n
  - type: text
    text: ' to court?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Though I am innocent, my own mouth would pronounce me guilty.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Though I am blameless, it
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he.
    marker-yv: yv-n
  - type: text
    text: ' would prove me wicked.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “I am innocent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but it makes no difference to me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: I despise my life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Innocent or wicked, it is all the same to God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: That’s why I say, ‘He destroys both the blameless and the wicked.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: When a plague
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: disaster.
    marker-yv: yv-n
  - type: text
    text: ' sweeps through,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he laughs at the death of the innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The whole earth is in the hands of the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and God blinds the eyes of the judges.
- type: usfm
  marker: q2
  children:
  - type: text
    text: If he’s not the one who does it, who is?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “My life passes more swiftly than a runner.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It flees away without a glimpse of happiness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: It disappears like a swift papyrus boat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like an eagle swooping down on its prey.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: If I decided to forget my complaints,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to put away my sad face and be cheerful,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: I would still dread all the pain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I know you will not find me innocent, O God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Whatever happens, I will be found guilty.
- type: usfm
  marker: q2
  children:
  - type: text
    text: So what’s the use of trying?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Even if I were to wash myself with soap
- type: usfm
  marker: q2
  children:
  - type: text
    text: and clean my hands with lye,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: you would plunge me into a muddy ditch,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my own filthy clothing would hate me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “God is not a mortal like me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so I cannot argue with him or take him to trial.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: If only there were a mediator between us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: someone who could bring us together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: The mediator could make God stop beating me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I would no longer live in terror of his punishment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Then I could speak to him without fear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I cannot do that in my own strength.
