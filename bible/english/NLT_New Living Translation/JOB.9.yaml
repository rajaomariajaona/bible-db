document_id: JOB.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Job’s Third Speech: A Response to Bildad'
  - type: text
    content: 'Then Job spoke again:'
  '10':
  - type: text
    content: He does great things too marvelous to understand.
  - type: text
    content: He performs countless miracles.
  '11':
  - type: text
    content: “Yet when he comes near, I cannot see him.
  - type: text
    content: When he moves by, I do not see him go.
  '12':
  - type: text
    content: If he snatches someone in death, who can stop him?
  - type: text
    content: Who dares to ask, ‘What are you doing?’
  '13':
  - type: text
    content: And God does not restrain his anger.
  - type: text
    content: Even the monsters of the sea
  - type: note
    content: Hebrew the helpers of Rahab, the name of a mythical sea monster that represents chaos in ancient literature.
  - type: text
    content: ' are crushed beneath his feet.'
  '14':
  - type: text
    content: “So who am I, that I should try to answer God
  - type: text
    content: or even reason with him?
  '15':
  - type: text
    content: Even if I were right, I would have no defense.
  - type: text
    content: I could only plead for mercy.
  '16':
  - type: text
    content: And even if I summoned him and he responded,
  - type: text
    content: I’m not sure he would listen to me.
  '17':
  - type: text
    content: For he attacks me with a storm
  - type: text
    content: and repeatedly wounds me without cause.
  '18':
  - type: text
    content: He will not let me catch my breath,
  - type: text
    content: but fills me instead with bitter sorrows.
  '19':
  - type: text
    content: If it’s a question of strength, he’s the strong one.
  - type: text
    content: If it’s a matter of justice, who dares to summon him
  - type: note
    content: As in Greek version; Hebrew reads me.
  - type: text
    content: ' to court?'
  '2':
  - type: text
    content: “Yes, I know all this is true in principle.
  - type: text
    content: But how can a person be declared innocent in God’s sight?
  '20':
  - type: text
    content: Though I am innocent, my own mouth would pronounce me guilty.
  - type: text
    content: Though I am blameless, it
  - type: note
    content: Or he.
  - type: text
    content: ' would prove me wicked.'
  '21':
  - type: text
    content: “I am innocent,
  - type: text
    content: but it makes no difference to me—
  - type: text
    content: I despise my life.
  '22':
  - type: text
    content: Innocent or wicked, it is all the same to God.
  - type: text
    content: That’s why I say, ‘He destroys both the blameless and the wicked.’
  '23':
  - type: text
    content: When a plague
  - type: note
    content: Or disaster.
  - type: text
    content: ' sweeps through,'
  - type: text
    content: he laughs at the death of the innocent.
  '24':
  - type: text
    content: The whole earth is in the hands of the wicked,
  - type: text
    content: and God blinds the eyes of the judges.
  - type: text
    content: If he’s not the one who does it, who is?
  '25':
  - type: text
    content: “My life passes more swiftly than a runner.
  - type: text
    content: It flees away without a glimpse of happiness.
  '26':
  - type: text
    content: It disappears like a swift papyrus boat,
  - type: text
    content: like an eagle swooping down on its prey.
  '27':
  - type: text
    content: If I decided to forget my complaints,
  - type: text
    content: to put away my sad face and be cheerful,
  '28':
  - type: text
    content: I would still dread all the pain,
  - type: text
    content: for I know you will not find me innocent, O God.
  '29':
  - type: text
    content: Whatever happens, I will be found guilty.
  - type: text
    content: So what’s the use of trying?
  '3':
  - type: text
    content: If someone wanted to take God to court,
  - type: note
    content: Or If God wanted to take someone to court.
  - type: text
    content: would it be possible to answer him even once in a thousand times?
  '30':
  - type: text
    content: Even if I were to wash myself with soap
  - type: text
    content: and clean my hands with lye,
  '31':
  - type: text
    content: you would plunge me into a muddy ditch,
  - type: text
    content: and my own filthy clothing would hate me.
  '32':
  - type: text
    content: “God is not a mortal like me,
  - type: text
    content: so I cannot argue with him or take him to trial.
  '33':
  - type: text
    content: If only there were a mediator between us,
  - type: text
    content: someone who could bring us together.
  '34':
  - type: text
    content: The mediator could make God stop beating me,
  - type: text
    content: and I would no longer live in terror of his punishment.
  '35':
  - type: text
    content: Then I could speak to him without fear,
  - type: text
    content: but I cannot do that in my own strength.
  '4':
  - type: text
    content: For God is so wise and so mighty.
  - type: text
    content: Who has ever challenged him successfully?
  '5':
  - type: text
    content: “Without warning, he moves the mountains,
  - type: text
    content: overturning them in his anger.
  '6':
  - type: text
    content: He shakes the earth from its place,
  - type: text
    content: and its foundations tremble.
  '7':
  - type: text
    content: If he commands it, the sun won’t rise
  - type: text
    content: and the stars won’t shine.
  '8':
  - type: text
    content: He alone has spread out the heavens
  - type: text
    content: and marches on the waves of the sea.
  '9':
  - type: text
    content: He made all the stars—the Bear and Orion,
  - type: text
    content: the Pleiades and the constellations of the southern sky.
