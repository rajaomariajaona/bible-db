document_id: EZK.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Sign of the Coming Siege
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“And now, son of man, take a large clay brick and set it down in front of you. Then draw a map of the city of Jerusalem on it. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ration this out to yourself, eight ounces
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20 shekels '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[228 grams].'
      marker-yv: yv-n
    - type: text
      text: ' of food for each day, and eat it at set times. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then measure out a jar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1/6 of a hin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[about 1 pint or 0.6 liters].'
      marker-yv: yv-n
    - type: text
      text: ' of water for each day, and drink it at set times. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prepare and eat this food as you would barley cakes. While all the people are watching, bake it over a fire using dried human dung as fuel and then eat the bread.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “This is how Israel will eat defiled bread in the Gentile lands to which I will banish them!”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I said, “O Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', must I be defiled by using human dung? For I have never been defiled before. From the time I was a child until now I have never eaten any animal that died of sickness or was killed by other animals. I have never eaten any meat forbidden by the law.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“All right,” the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said. “You may bake your bread with cow dung instead of human dung.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he told me, “Son of man, I will make food very scarce in Jerusalem. It will be weighed out with great care and eaten fearfully. The water will be rationed out drop by drop, and the people will drink it with dismay. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lacking food and water, people will look at one another in terror, and they will waste away under their punishment.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Show the city under siege. Build a wall around it so no one can escape. Set up the enemy camp, and surround the city with siege ramps and battering rams. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then take an iron griddle and place it between you and the city. Turn toward the city and demonstrate how harsh the siege will be against Jerusalem. This will be a warning to the people of Israel.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now lie on your left side and place the sins of Israel on yourself. You are to bear their sins for the number of days you lie there on your side. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am requiring you to bear Israel’s sins for 390 days—one day for each year of their sin. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After that, turn over and lie on your right side for 40 days—one day for each year of Judah’s sin.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Meanwhile, keep staring at the siege of Jerusalem. Lie there with your arm bared and prophesy her destruction. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will tie you up with ropes so you won’t be able to turn from side to side until the days of your siege have been completed.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now go and get some wheat, barley, beans, lentils, millet, and emmer wheat, and mix them together in a storage jar. Use them to make bread for yourself during the 390 days you will be lying on your side. '
