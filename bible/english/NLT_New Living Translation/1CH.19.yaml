document_id: 1CH.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Defeats the Ammonites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Some time after this, King Nahash of the Ammonites died, and his son Hanun
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 2 Sam 10:1; Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hanun.
    marker-yv: yv-n
  - type: text
    text: ' became king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: David said, “I am going to show loyalty to Hanun because his father, Nahash, was always loyal to me.” So David sent messengers to express sympathy to Hanun about his father’s death.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But when David’s ambassadors arrived in the land of Ammon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'the Ammonite commanders said to Hanun, “Do you really think these men are coming here to honor your father? No! David has sent them to spy out the land so they can come in and conquer it!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So Hanun seized David’s ambassadors and shaved them, cut off their robes at the buttocks, and sent them back to David in shame.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: When David heard what had happened to the men, he sent messengers to tell them, “Stay at Jericho until your beards grow out, and then come back.” For they felt deep shame because of their appearance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When the people of Ammon realized how seriously they had angered David, Hanun and the Ammonites sent 75,000 pounds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1,000 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[34,000 kilograms].'
    marker-yv: yv-n
  - type: text
    text: ' of silver to hire chariots and charioteers from Aram-naharaim, Aram-maacah, and Zobah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They also hired 32,000 chariots and secured the support of the king of Maacah and his army. These forces camped at Medeba, where they were joined by the Ammonite troops that Hanun had recruited from his own towns. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When David heard about this, he sent Joab and all his warriors to fight them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The Ammonite troops came out and drew up their battle lines at the entrance of the city, while the other kings positioned themselves to fight in the open fields.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When Joab saw that he would have to fight on both the front and the rear, he chose some of Israel’s elite troops and placed them under his personal command to fight the Arameans in the fields. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He left the rest of the army under the command of his brother Abishai, who was to attack the Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“If the Arameans are too strong for me, then come over and help me,” Joab told his brother. “And if the Ammonites are too strong for you, I will help you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Be courageous! Let us fight bravely for our people and the cities of our God. May the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s will be done.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When Joab and his troops attacked, the Arameans began to run away. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And when the Ammonites saw the Arameans running, they also ran from Abishai and retreated into the city. Then Joab returned to Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The Arameans now realized that they were no match for Israel, so they sent messengers and summoned additional Aramean troops from the other side of the Euphrates River.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:16a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the river.
    marker-yv: yv-n
  - type: text
    text: ' These troops were under the command of Shobach,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:16b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 2 Sam 10:16; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shophach; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 19:18.
    marker-yv: yv-n
  - type: text
    text: ' the commander of Hadadezer’s forces.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When David heard what was happening, he mobilized all Israel, crossed the Jordan River, and positioned his troops in battle formation. Then David engaged the Arameans in battle, and they fought against him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But again the Arameans fled from the Israelites. This time David’s forces killed 7,000 charioteers and 40,000 foot soldiers, including Shobach, the commander of their army. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: When Hadadezer’s allies saw that they had been defeated by Israel, they surrendered to David and became his subjects. After that, the Arameans were no longer willing to help the Ammonites.
