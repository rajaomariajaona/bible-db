document_id: PSA.20,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David.'
  - type: text
    content: 'In times of trouble, may the '
  - type: text
    content: Lord
  - type: text
    content: ' answer your cry.'
  - type: text
    content: May the name of the God of Jacob keep you safe from all harm.
  '2':
  - type: text
    content: May he send you help from his sanctuary
  - type: text
    content: and strengthen you from Jerusalem.
  - type: note
    content: Hebrew Zion.
  '3':
  - type: text
    content: May he remember all your gifts
  - type: text
    content: 'and look favorably on your burnt offerings. '
  - type: text
    content: Interlude
  '4':
  - type: text
    content: May he grant your heart’s desires
  - type: text
    content: and make all your plans succeed.
  '5':
  - type: text
    content: May we shout for joy when we hear of your victory
  - type: text
    content: and raise a victory banner in the name of our God.
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' answer all your prayers.'
  '6':
  - type: text
    content: 'Now I know that the '
  - type: text
    content: Lord
  - type: text
    content: ' rescues his anointed king.'
  - type: text
    content: He will answer him from his holy heaven
  - type: text
    content: and rescue him by his great power.
  '7':
  - type: text
    content: Some nations boast of their chariots and horses,
  - type: text
    content: 'but we boast in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.'
  '8':
  - type: text
    content: Those nations will fall down and collapse,
  - type: text
    content: but we will rise up and stand firm.
  '9':
  - type: text
    content: 'Give victory to our king, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Answer our cry for help.
