document_id: JER.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judah’s Terrible Drought
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This message came to Jeremiah from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', explaining why he was holding back the rain:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Judah wilts;
- type: usfm
  marker: q2
  children:
  - type: text
    text: commerce at the city gates grinds to a halt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the people sit on the ground in mourning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a great cry rises from Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The nobles send servants to get water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but all the wells are dry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The servants return with empty pitchers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: confused and desperate,
- type: usfm
  marker: q2
  children:
  - type: text
    text: covering their heads in grief.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The ground is parched
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cracked for lack of rain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The farmers are deeply troubled;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they, too, cover their heads.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Even the doe abandons her newborn fawn
- type: usfm
  marker: q2
  children:
  - type: text
    text: because there is no grass in the field.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The wild donkeys stand on the bare hills
- type: usfm
  marker: q2
  children:
  - type: text
    text: panting like thirsty jackals.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They strain their eyes looking for grass,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but there is none to be found.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The people say, “Our wickedness has caught up with us, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: but help us for the sake of your own reputation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We have turned away from you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sinned against you again and again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: O Hope of Israel, our Savior in times of trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: why are you like a stranger to us?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why are you like a traveler passing through the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: stopping only for the night?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Are you also confused?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is our champion helpless to save us?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You are right here among us, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: We are known as your people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Please don’t abandon us now!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says to his people:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You love to wander far from me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do not restrain yourselves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore, I will no longer accept you as my people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Now I will remember all your wickedness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will punish you for your sins.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Forbids Jeremiah to Intercede'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, “Do not pray for these people anymore. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When they fast, I will pay no attention. When they present their burnt offerings and grain offerings to me, I will not accept them. Instead, I will devour them with war, famine, and disease.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then I said, “O Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', their prophets are telling them, ‘All is well—no war or famine will come. The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will surely send you peace.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “These prophets are telling lies in my name. I did not send them or tell them to speak. I did not give them any messages. They prophesy of visions and revelations they have never seen or heard. They speak foolishness made up in their own lying hearts. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Therefore, this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I will punish these lying prophets, for they have spoken in my name even though I never sent them. They say that no war or famine will come, but they themselves will die by war and famine! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'As for the people to whom they prophesy—their bodies will be thrown out into the streets of Jerusalem, victims of famine and war. There will be no one left to bury them. Husbands, wives, sons, and daughters—all will be gone. For I will pour out their own wickedness on them. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now, Jeremiah, say this to them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Night and day my eyes overflow with tears.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I cannot stop weeping,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for my virgin daughter—my precious people—
- type: usfm
  marker: q2
  children:
  - type: text
    text: has been struck down
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lies mortally wounded.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: If I go out into the fields,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I see the bodies of people slaughtered by the enemy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If I walk the city streets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I see people who have died of starvation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The prophets and priests continue with their work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they don’t know what they’re doing.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Prayer for Healing
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have you completely rejected Judah?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you really hate Jerusalem?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zion?
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why have you wounded us past all hope of healing?
- type: usfm
  marker: q2
  children:
  - type: text
    text: We hoped for peace, but no peace came.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We hoped for a time of healing, but found only terror.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', we confess our wickedness'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and that of our ancestors, too.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We all have sinned against you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For the sake of your reputation, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', do not abandon us.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not disgrace your own glorious throne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Please remember us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do not break your covenant with us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Can any of the worthless foreign gods send us rain?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Does it fall from the sky by itself?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'No, you are the one, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Only you can do such things.
- type: usfm
  marker: q2
  children:
  - type: text
    text: So we will wait for you to help us.
