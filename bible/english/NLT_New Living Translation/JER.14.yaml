document_id: JER.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah’s Terrible Drought
  - type: text
    content: 'This message came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ', explaining why he was holding back the rain:'
  '10':
  - type: text
    content: 'So this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to his people:'
  - type: text
    content: “You love to wander far from me
  - type: text
    content: and do not restrain yourselves.
  - type: text
    content: Therefore, I will no longer accept you as my people.
  - type: text
    content: Now I will remember all your wickedness
  - type: text
    content: and will punish you for your sins.”
  - type: heading
    content: The Lord Forbids Jeremiah to Intercede
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Do not pray for these people anymore. '
  '12':
  - type: text
    content: When they fast, I will pay no attention. When they present their burnt offerings and grain offerings to me, I will not accept them. Instead, I will devour them with war, famine, and disease.”
  '13':
  - type: text
    content: 'Then I said, “O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', their prophets are telling them, ‘All is well—no war or famine will come. The '
  - type: text
    content: Lord
  - type: text
    content: ' will surely send you peace.’”'
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “These prophets are telling lies in my name. I did not send them or tell them to speak. I did not give them any messages. They prophesy of visions and revelations they have never seen or heard. They speak foolishness made up in their own lying hearts. '
  '15':
  - type: text
    content: 'Therefore, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will punish these lying prophets, for they have spoken in my name even though I never sent them. They say that no war or famine will come, but they themselves will die by war and famine! '
  '16':
  - type: text
    content: 'As for the people to whom they prophesy—their bodies will be thrown out into the streets of Jerusalem, victims of famine and war. There will be no one left to bury them. Husbands, wives, sons, and daughters—all will be gone. For I will pour out their own wickedness on them. '
  '17':
  - type: text
    content: 'Now, Jeremiah, say this to them:'
  - type: text
    content: “Night and day my eyes overflow with tears.
  - type: text
    content: I cannot stop weeping,
  - type: text
    content: for my virgin daughter—my precious people—
  - type: text
    content: has been struck down
  - type: text
    content: and lies mortally wounded.
  '18':
  - type: text
    content: If I go out into the fields,
  - type: text
    content: I see the bodies of people slaughtered by the enemy.
  - type: text
    content: If I walk the city streets,
  - type: text
    content: I see people who have died of starvation.
  - type: text
    content: The prophets and priests continue with their work,
  - type: text
    content: but they don’t know what they’re doing.”
  - type: heading
    content: A Prayer for Healing
  '19':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', have you completely rejected Judah?'
  - type: text
    content: Do you really hate Jerusalem?
  - type: note
    content: Hebrew Zion?
  - type: text
    content: Why have you wounded us past all hope of healing?
  - type: text
    content: We hoped for peace, but no peace came.
  - type: text
    content: We hoped for a time of healing, but found only terror.
  '2':
  - type: text
    content: “Judah wilts;
  - type: text
    content: commerce at the city gates grinds to a halt.
  - type: text
    content: All the people sit on the ground in mourning,
  - type: text
    content: and a great cry rises from Jerusalem.
  '20':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', we confess our wickedness'
  - type: text
    content: and that of our ancestors, too.
  - type: text
    content: We all have sinned against you.
  '21':
  - type: text
    content: 'For the sake of your reputation, '
  - type: text
    content: Lord
  - type: text
    content: ', do not abandon us.'
  - type: text
    content: Do not disgrace your own glorious throne.
  - type: text
    content: Please remember us,
  - type: text
    content: and do not break your covenant with us.
  '22':
  - type: text
    content: Can any of the worthless foreign gods send us rain?
  - type: text
    content: Does it fall from the sky by itself?
  - type: text
    content: 'No, you are the one, O '
  - type: text
    content: Lord
  - type: text
    content: ' our God!'
  - type: text
    content: Only you can do such things.
  - type: text
    content: So we will wait for you to help us.
  '3':
  - type: text
    content: The nobles send servants to get water,
  - type: text
    content: but all the wells are dry.
  - type: text
    content: The servants return with empty pitchers,
  - type: text
    content: confused and desperate,
  - type: text
    content: covering their heads in grief.
  '4':
  - type: text
    content: The ground is parched
  - type: text
    content: and cracked for lack of rain.
  - type: text
    content: The farmers are deeply troubled;
  - type: text
    content: they, too, cover their heads.
  '5':
  - type: text
    content: Even the doe abandons her newborn fawn
  - type: text
    content: because there is no grass in the field.
  '6':
  - type: text
    content: The wild donkeys stand on the bare hills
  - type: text
    content: panting like thirsty jackals.
  - type: text
    content: They strain their eyes looking for grass,
  - type: text
    content: but there is none to be found.”
  '7':
  - type: text
    content: 'The people say, “Our wickedness has caught up with us, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: but help us for the sake of your own reputation.
  - type: text
    content: We have turned away from you
  - type: text
    content: and sinned against you again and again.
  '8':
  - type: text
    content: O Hope of Israel, our Savior in times of trouble,
  - type: text
    content: why are you like a stranger to us?
  - type: text
    content: Why are you like a traveler passing through the land,
  - type: text
    content: stopping only for the night?
  '9':
  - type: text
    content: Are you also confused?
  - type: text
    content: Is our champion helpless to save us?
  - type: text
    content: 'You are right here among us, '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: We are known as your people.
  - type: text
    content: Please don’t abandon us now!”
