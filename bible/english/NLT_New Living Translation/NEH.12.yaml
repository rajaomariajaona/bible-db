document_id: NEH.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A History of the Priests and Levites
  - type: text
    content: 'Here is the list of the priests and Levites who returned with Zerubbabel son of Shealtiel and Jeshua the high priest:'
  - type: text
    content: Seraiah, Jeremiah, Ezra,
  '10':
  - type: text
    content: Jeshua the high priest was the father of Joiakim.
  - type: text
    content: Joiakim was the father of Eliashib.
  - type: text
    content: Eliashib was the father of Joiada.
  '11':
  - type: text
    content: Joiada was the father of Johanan.
  - type: note
    content: Hebrew Jonathan; compare 12:22.
  - type: text
    content: Johanan was the father of Jaddua.
  '12':
  - type: text
    content: 'Now when Joiakim was high priest, the family leaders of the priests were as follows:'
  - type: text
    content: Meraiah was leader of the family of Seraiah.
  - type: text
    content: Hananiah was leader of the family of Jeremiah.
  '13':
  - type: text
    content: Meshullam was leader of the family of Ezra.
  - type: text
    content: Jehohanan was leader of the family of Amariah.
  '14':
  - type: text
    content: Jonathan was leader of the family of Malluch.
  - type: note
    content: As in Greek version (see also 10:4; 12:2); Hebrew reads Malluchi.
  - type: text
    content: Joseph was leader of the family of Shecaniah.
  - type: note
    content: As in many Hebrew manuscripts, some Greek manuscripts, and Syriac version (see also 12:3); most Hebrew manuscripts read Shebaniah.
  '15':
  - type: text
    content: Adna was leader of the family of Harim.
  - type: text
    content: Helkai was leader of the family of Meremoth.
  - type: note
    content: As in some Greek manuscripts (see also 12:3); Hebrew reads Meraioth.
  '16':
  - type: text
    content: Zechariah was leader of the family of Iddo.
  - type: text
    content: Meshullam was leader of the family of Ginnethon.
  '17':
  - type: text
    content: Zicri was leader of the family of Abijah.
  - type: text
    content: There was also a
  - type: note
    content: Hebrew lacks the name of this family leader.
  - type: text
    content: ' leader of the family of Miniamin.'
  - type: text
    content: Piltai was leader of the family of Moadiah.
  '18':
  - type: text
    content: Shammua was leader of the family of Bilgah.
  - type: text
    content: Jehonathan was leader of the family of Shemaiah.
  '19':
  - type: text
    content: Mattenai was leader of the family of Joiarib.
  - type: text
    content: Uzzi was leader of the family of Jedaiah.
  '2':
  - type: text
    content: Amariah, Malluch, Hattush,
  '20':
  - type: text
    content: Kallai was leader of the family of Sallu.
  - type: note
    content: Hebrew Sallai; compare 12:7.
  - type: text
    content: Eber was leader of the family of Amok.
  '21':
  - type: text
    content: Hashabiah was leader of the family of Hilkiah.
  - type: text
    content: Nethanel was leader of the family of Jedaiah.
  '22':
  - type: text
    content: A record of the Levite families was kept during the years when Eliashib, Joiada, Johanan, and Jaddua served as high priest. Another record of the priests was kept during the reign of Darius the Persian.
  - type: note
    content: Darius the Persian is probably Darius II, who reigned 423–404 b.c., or possibly Darius III, who reigned 336–331 b.c.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'A record of the heads of the Levite families was kept in '
  - type: text
    content: The Book of History
  - type: text
    content: ' down to the days of Johanan, the grandson'
  - type: note
    content: Hebrew descendant; compare 12:10-11.
  - type: text
    content: ' of Eliashib.'
  '24':
  - type: text
    content: 'These were the family leaders of the Levites: Hashabiah, Sherebiah, Jeshua, Binnui,'
  - type: note
    content: Hebrew son of (i.e., ben), which should probably be read here as the proper name Binnui; compare Ezra 3:9 and the note there.
  - type: text
    content: ' Kadmiel, and other associates, who stood opposite them during the ceremonies of praise and thanksgiving, one section responding to the other, as commanded by David, the man of God. '
  '25':
  - type: text
    content: This included Mattaniah, Bakbukiah, and Obadiah.
  - type: text
    content: 'Meshullam, Talmon, and Akkub were the gatekeepers in charge of the storerooms at the gates. '
  '26':
  - type: text
    content: These all served in the days of Joiakim son of Jeshua, son of Jehozadak,
  - type: note
    content: Hebrew Jozadak, a variant spelling of Jehozadak.
  - type: text
    content: ' and in the days of Nehemiah the governor and of Ezra the priest and scribe.'
  - type: heading
    content: Dedication of Jerusalem’s Wall
  '27':
  - type: text
    content: 'For the dedication of the new wall of Jerusalem, the Levites throughout the land were asked to come to Jerusalem to assist in the ceremonies. They were to take part in the joyous occasion with their songs of thanksgiving and with the music of cymbals, harps, and lyres. '
  '28':
  - type: text
    content: 'The singers were brought together from the region around Jerusalem and from the villages of the Netophathites. '
  '29':
  - type: text
    content: 'They also came from Beth-gilgal and the rural areas near Geba and Azmaveth, for the singers had built their own settlements around Jerusalem. '
  '3':
  - type: text
    content: Shecaniah, Harim,
  - type: note
    content: Hebrew Rehum; compare 7:42; 12:15; Ezra 2:39.
  - type: text
    content: ' Meremoth,'
  '30':
  - type: text
    content: The priests and Levites first purified themselves; then they purified the people, the gates, and the wall.
  '31':
  - type: text
    content: I led the leaders of Judah to the top of the wall and organized two large choirs to give thanks. One of the choirs proceeded southward
  - type: note
    content: Hebrew to the right.
  - type: text
    content: ' along the top of the wall to the Dung Gate. '
  '32':
  - type: text
    content: 'Hoshaiah and half the leaders of Judah followed them, '
  '33':
  - type: text
    content: 'along with Azariah, Ezra, Meshullam, '
  '34':
  - type: text
    content: 'Judah, Benjamin, Shemaiah, and Jeremiah. '
  '35':
  - type: text
    content: 'Then came some priests who played trumpets, including Zechariah son of Jonathan, son of Shemaiah, son of Mattaniah, son of Micaiah, son of Zaccur, a descendant of Asaph. '
  '36':
  - type: text
    content: 'And Zechariah’s colleagues were Shemaiah, Azarel, Milalai, Gilalai, Maai, Nethanel, Judah, and Hanani. They used the musical instruments prescribed by David, the man of God. Ezra the scribe led this procession. '
  '37':
  - type: text
    content: At the Fountain Gate they went straight up the steps on the ascent of the city wall toward the City of David. They passed the house of David and then proceeded to the Water Gate on the east.
  '38':
  - type: text
    content: The second choir giving thanks went northward
  - type: note
    content: Hebrew to the left.
  - type: text
    content: ' around the other way to meet them. I followed them, together with the other half of the people, along the top of the wall past the Tower of the Ovens to the Broad Wall, '
  '39':
  - type: text
    content: then past the Ephraim Gate to the Old City Gate,
  - type: note
    content: Or the Mishneh Gate, or the Jeshanah Gate.
  - type: text
    content: ' past the Fish Gate and the Tower of Hananel, and on to the Tower of the Hundred. Then we continued on to the Sheep Gate and stopped at the Guard Gate.'
  '4':
  - type: text
    content: Iddo, Ginnethon,
  - type: note
    content: As in some Hebrew manuscripts and Latin Vulgate (see also 12:16); most Hebrew manuscripts read Ginnethoi.
  - type: text
    content: ' Abijah,'
  '40':
  - type: text
    content: 'The two choirs that were giving thanks then proceeded to the Temple of God, where they took their places. So did I, together with the group of leaders who were with me. '
  '41':
  - type: text
    content: 'We went together with the trumpet-playing priests—Eliakim, Maaseiah, Miniamin, Micaiah, Elioenai, Zechariah, and Hananiah— '
  '42':
  - type: text
    content: and the singers—Maaseiah, Shemaiah, Eleazar, Uzzi, Jehohanan, Malkijah, Elam, and Ezer. They played and sang loudly under the direction of Jezrahiah the choir director.
  '43':
  - type: text
    content: Many sacrifices were offered on that joyous day, for God had given the people cause for great joy. The women and children also participated in the celebration, and the joy of the people of Jerusalem could be heard far away.
  - type: heading
    content: Provisions for Temple Worship
  '44':
  - type: text
    content: 'On that day men were appointed to be in charge of the storerooms for the offerings, the first part of the harvest, and the tithes. They were responsible to collect from the fields outside the towns the portions required by the Law for the priests and Levites. For all the people of Judah took joy in the priests and Levites and their work. '
  '45':
  - type: text
    content: 'They performed the service of their God and the service of purification, as commanded by David and his son Solomon, and so did the singers and the gatekeepers. '
  '46':
  - type: text
    content: 'The custom of having choir directors to lead the choirs in hymns of praise and thanksgiving to God began long ago in the days of David and Asaph. '
  '47':
  - type: text
    content: So now, in the days of Zerubbabel and of Nehemiah, all Israel brought a daily supply of food for the singers, the gatekeepers, and the Levites. The Levites, in turn, gave a portion of what they received to the priests, the descendants of Aaron.
  '5':
  - type: text
    content: Miniamin, Moadiah,
  - type: note
    content: Hebrew Mijamin, Maadiah; compare 12:17.
  - type: text
    content: ' Bilgah,'
  '6':
  - type: text
    content: Shemaiah, Joiarib, Jedaiah,
  '7':
  - type: text
    content: Sallu, Amok, Hilkiah, and Jedaiah.
  - type: text
    content: These were the leaders of the priests and their associates in the days of Jeshua.
  '8':
  - type: text
    content: 'The Levites who returned with them were Jeshua, Binnui, Kadmiel, Sherebiah, Judah, and Mattaniah, who with his associates was in charge of the songs of thanksgiving. '
  '9':
  - type: text
    content: Their associates, Bakbukiah and Unni, stood opposite them during the service.
