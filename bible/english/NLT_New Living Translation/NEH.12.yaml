document_id: NEH.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A History of the Priests and Levites
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Here is the list of the priests and Levites who returned with Zerubbabel son of Shealtiel and Jeshua the high priest:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Seraiah, Jeremiah, Ezra,
  '10':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jeshua the high priest was the father of Joiakim.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Joiakim was the father of Eliashib.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eliashib was the father of Joiada.
  '11':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Joiada was the father of Johanan.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jonathan; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare 12:22.
      marker-yv: yv-n
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Johanan was the father of Jaddua.
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now when Joiakim was high priest, the family leaders of the priests were as follows:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Meraiah was leader of the family of Seraiah.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hananiah was leader of the family of Jeremiah.
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Meshullam was leader of the family of Ezra.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jehohanan was leader of the family of Amariah.
  '14':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jonathan was leader of the family of Malluch.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:14a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version (see also 10:4; 12:2); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Malluchi.
      marker-yv: yv-n
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Joseph was leader of the family of Shecaniah.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:14b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in many Hebrew manuscripts, some Greek manuscripts, and Syriac version (see also 12:3); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shebaniah.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Adna was leader of the family of Harim.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Helkai was leader of the family of Meremoth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts (see also 12:3); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Meraioth.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zechariah was leader of the family of Iddo.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Meshullam was leader of the family of Ginnethon.
  '17':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zicri was leader of the family of Abijah.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: There was also a
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hebrew lacks the name of this family leader.
      marker-yv: yv-n
    - type: text
      text: ' leader of the family of Miniamin.'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Piltai was leader of the family of Moadiah.
  '18':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shammua was leader of the family of Bilgah.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jehonathan was leader of the family of Shemaiah.
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Mattenai was leader of the family of Joiarib.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Uzzi was leader of the family of Jedaiah.
  '2':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Amariah, Malluch, Hattush,
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Kallai was leader of the family of Sallu.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sallai; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare 12:7.
      marker-yv: yv-n
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eber was leader of the family of Amok.
  '21':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hashabiah was leader of the family of Hilkiah.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Nethanel was leader of the family of Jedaiah.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A record of the Levite families was kept during the years when Eliashib, Joiada, Johanan, and Jaddua served as high priest. Another record of the priests was kept during the reign of Darius the Persian.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:22 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Darius the Persian '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'is probably Darius II, who reigned 423–404 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ', or possibly Darius III, who reigned 336–331 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
      marker-yv: yv-n
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A record of the heads of the Levite families was kept in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of History
    - type: text
      text: ' down to the days of Johanan, the grandson'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'descendant; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare 12:10-11.
      marker-yv: yv-n
    - type: text
      text: ' of Eliashib.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These were the family leaders of the Levites: Hashabiah, Sherebiah, Jeshua, Binnui,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son of '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(i.e., '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ben
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), which should probably be read here as the proper name Binnui; compare Ezra 3:9 and the note there.
      marker-yv: yv-n
    - type: text
      text: ' Kadmiel, and other associates, who stood opposite them during the ceremonies of praise and thanksgiving, one section responding to the other, as commanded by David, the man of God. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This included Mattaniah, Bakbukiah, and Obadiah.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meshullam, Talmon, and Akkub were the gatekeepers in charge of the storerooms at the gates. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These all served in the days of Joiakim son of Jeshua, son of Jehozadak,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jozadak, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Jehozadak.
      marker-yv: yv-n
    - type: text
      text: ' and in the days of Nehemiah the governor and of Ezra the priest and scribe.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dedication of Jerusalem’s Wall
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For the dedication of the new wall of Jerusalem, the Levites throughout the land were asked to come to Jerusalem to assist in the ceremonies. They were to take part in the joyous occasion with their songs of thanksgiving and with the music of cymbals, harps, and lyres. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The singers were brought together from the region around Jerusalem and from the villages of the Netophathites. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They also came from Beth-gilgal and the rural areas near Geba and Azmaveth, for the singers had built their own settlements around Jerusalem. '
  '3':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shecaniah, Harim,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Rehum; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare 7:42; 12:15; Ezra 2:39.
      marker-yv: yv-n
    - type: text
      text: ' Meremoth,'
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The priests and Levites first purified themselves; then they purified the people, the gates, and the wall.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I led the leaders of Judah to the top of the wall and organized two large choirs to give thanks. One of the choirs proceeded southward
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to the right.
      marker-yv: yv-n
    - type: text
      text: ' along the top of the wall to the Dung Gate. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoshaiah and half the leaders of Judah followed them, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'along with Azariah, Ezra, Meshullam, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Judah, Benjamin, Shemaiah, and Jeremiah. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then came some priests who played trumpets, including Zechariah son of Jonathan, son of Shemaiah, son of Mattaniah, son of Micaiah, son of Zaccur, a descendant of Asaph. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Zechariah’s colleagues were Shemaiah, Azarel, Milalai, Gilalai, Maai, Nethanel, Judah, and Hanani. They used the musical instruments prescribed by David, the man of God. Ezra the scribe led this procession. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At the Fountain Gate they went straight up the steps on the ascent of the city wall toward the City of David. They passed the house of David and then proceeded to the Water Gate on the east.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The second choir giving thanks went northward
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to the left.
      marker-yv: yv-n
    - type: text
      text: ' around the other way to meet them. I followed them, together with the other half of the people, along the top of the wall past the Tower of the Ovens to the Broad Wall, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: then past the Ephraim Gate to the Old City Gate,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Mishneh Gate, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Jeshanah Gate.
      marker-yv: yv-n
    - type: text
      text: ' past the Fish Gate and the Tower of Hananel, and on to the Tower of the Hundred. Then we continued on to the Sheep Gate and stopped at the Guard Gate.'
  '4':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Iddo, Ginnethon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts and Latin Vulgate (see also 12:16); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ginnethoi.
      marker-yv: yv-n
    - type: text
      text: ' Abijah,'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The two choirs that were giving thanks then proceeded to the Temple of God, where they took their places. So did I, together with the group of leaders who were with me. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We went together with the trumpet-playing priests—Eliakim, Maaseiah, Miniamin, Micaiah, Elioenai, Zechariah, and Hananiah— '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and the singers—Maaseiah, Shemaiah, Eleazar, Uzzi, Jehohanan, Malkijah, Elam, and Ezer. They played and sang loudly under the direction of Jezrahiah the choir director.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Many sacrifices were offered on that joyous day, for God had given the people cause for great joy. The women and children also participated in the celebration, and the joy of the people of Jerusalem could be heard far away.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Provisions for Temple Worship
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'On that day men were appointed to be in charge of the storerooms for the offerings, the first part of the harvest, and the tithes. They were responsible to collect from the fields outside the towns the portions required by the Law for the priests and Levites. For all the people of Judah took joy in the priests and Levites and their work. '
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They performed the service of their God and the service of purification, as commanded by David and his son Solomon, and so did the singers and the gatekeepers. '
  '46':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The custom of having choir directors to lead the choirs in hymns of praise and thanksgiving to God began long ago in the days of David and Asaph. '
  '47':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So now, in the days of Zerubbabel and of Nehemiah, all Israel brought a daily supply of food for the singers, the gatekeepers, and the Levites. The Levites, in turn, gave a portion of what they received to the priests, the descendants of Aaron.
  '5':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Miniamin, Moadiah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mijamin, Maadiah; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare 12:17.
      marker-yv: yv-n
    - type: text
      text: ' Bilgah,'
  '6':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shemaiah, Joiarib, Jedaiah,
  '7':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Sallu, Amok, Hilkiah, and Jedaiah.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the leaders of the priests and their associates in the days of Jeshua.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Levites who returned with them were Jeshua, Binnui, Kadmiel, Sherebiah, Judah, and Mattaniah, who with his associates was in charge of the songs of thanksgiving. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Their associates, Bakbukiah and Unni, stood opposite them during the service.
