document_id: NEH.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A History of the Priests and Levites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Here is the list of the priests and Levites who returned with Zerubbabel son of Shealtiel and Jeshua the high priest:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Seraiah, Jeremiah, Ezra,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Amariah, Malluch, Hattush,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Shecaniah, Harim,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Rehum; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare 7:42; 12:15; Ezra 2:39.
    marker-yv: yv-n
  - type: text
    text: ' Meremoth,'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Iddo, Ginnethon,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Hebrew manuscripts and Latin Vulgate (see also 12:16); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ginnethoi.
    marker-yv: yv-n
  - type: text
    text: ' Abijah,'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Miniamin, Moadiah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Mijamin, Maadiah; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare 12:17.
    marker-yv: yv-n
  - type: text
    text: ' Bilgah,'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Shemaiah, Joiarib, Jedaiah,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Sallu, Amok, Hilkiah, and Jedaiah.
- type: usfm
  marker: m
  children:
  - type: text
    text: These were the leaders of the priests and their associates in the days of Jeshua.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The Levites who returned with them were Jeshua, Binnui, Kadmiel, Sherebiah, Judah, and Mattaniah, who with his associates was in charge of the songs of thanksgiving. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Their associates, Bakbukiah and Unni, stood opposite them during the service.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jeshua the high priest was the father of Joiakim.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Joiakim was the father of Eliashib.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Eliashib was the father of Joiada.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Joiada was the father of Johanan.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jonathan; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare 12:22.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: Johanan was the father of Jaddua.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now when Joiakim was high priest, the family leaders of the priests were as follows:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Meraiah was leader of the family of Seraiah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Hananiah was leader of the family of Jeremiah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Meshullam was leader of the family of Ezra.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jehohanan was leader of the family of Amariah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Jonathan was leader of the family of Malluch.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:14a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version (see also 10:4; 12:2); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Malluchi.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: Joseph was leader of the family of Shecaniah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:14b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in many Hebrew manuscripts, some Greek manuscripts, and Syriac version (see also 12:3); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shebaniah.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Adna was leader of the family of Harim.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Helkai was leader of the family of Meremoth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Greek manuscripts (see also 12:3); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Meraioth.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Zechariah was leader of the family of Iddo.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Meshullam was leader of the family of Ginnethon.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Zicri was leader of the family of Abijah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: There was also a
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hebrew lacks the name of this family leader.
    marker-yv: yv-n
  - type: text
    text: ' leader of the family of Miniamin.'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Piltai was leader of the family of Moadiah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Shammua was leader of the family of Bilgah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jehonathan was leader of the family of Shemaiah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mattenai was leader of the family of Joiarib.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Uzzi was leader of the family of Jedaiah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Kallai was leader of the family of Sallu.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sallai; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare 12:7.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: Eber was leader of the family of Amok.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Hashabiah was leader of the family of Hilkiah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Nethanel was leader of the family of Jedaiah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: A record of the Levite families was kept during the years when Eliashib, Joiada, Johanan, and Jaddua served as high priest. Another record of the priests was kept during the reign of Darius the Persian.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:22 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Darius the Persian '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'is probably Darius II, who reigned 423–404 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ', or possibly Darius III, who reigned 336–331 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'A record of the heads of the Levite families was kept in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of History
  - type: text
    text: ' down to the days of Johanan, the grandson'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'descendant; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare 12:10-11.
    marker-yv: yv-n
  - type: text
    text: ' of Eliashib.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'These were the family leaders of the Levites: Hashabiah, Sherebiah, Jeshua, Binnui,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'son of '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(i.e., '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ben
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), which should probably be read here as the proper name Binnui; compare Ezra 3:9 and the note there.
    marker-yv: yv-n
  - type: text
    text: ' Kadmiel, and other associates, who stood opposite them during the ceremonies of praise and thanksgiving, one section responding to the other, as commanded by David, the man of God. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: This included Mattaniah, Bakbukiah, and Obadiah.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Meshullam, Talmon, and Akkub were the gatekeepers in charge of the storerooms at the gates. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: These all served in the days of Joiakim son of Jeshua, son of Jehozadak,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jozadak, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehozadak.
    marker-yv: yv-n
  - type: text
    text: ' and in the days of Nehemiah the governor and of Ezra the priest and scribe.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dedication of Jerusalem’s Wall
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For the dedication of the new wall of Jerusalem, the Levites throughout the land were asked to come to Jerusalem to assist in the ceremonies. They were to take part in the joyous occasion with their songs of thanksgiving and with the music of cymbals, harps, and lyres. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The singers were brought together from the region around Jerusalem and from the villages of the Netophathites. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'They also came from Beth-gilgal and the rural areas near Geba and Azmaveth, for the singers had built their own settlements around Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The priests and Levites first purified themselves; then they purified the people, the gates, and the wall.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: I led the leaders of Judah to the top of the wall and organized two large choirs to give thanks. One of the choirs proceeded southward
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to the right.
    marker-yv: yv-n
  - type: text
    text: ' along the top of the wall to the Dung Gate. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hoshaiah and half the leaders of Judah followed them, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'along with Azariah, Ezra, Meshullam, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Judah, Benjamin, Shemaiah, and Jeremiah. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then came some priests who played trumpets, including Zechariah son of Jonathan, son of Shemaiah, son of Mattaniah, son of Micaiah, son of Zaccur, a descendant of Asaph. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And Zechariah’s colleagues were Shemaiah, Azarel, Milalai, Gilalai, Maai, Nethanel, Judah, and Hanani. They used the musical instruments prescribed by David, the man of God. Ezra the scribe led this procession. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: At the Fountain Gate they went straight up the steps on the ascent of the city wall toward the City of David. They passed the house of David and then proceeded to the Water Gate on the east.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: The second choir giving thanks went northward
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to the left.
    marker-yv: yv-n
  - type: text
    text: ' around the other way to meet them. I followed them, together with the other half of the people, along the top of the wall past the Tower of the Ovens to the Broad Wall, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: then past the Ephraim Gate to the Old City Gate,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the Mishneh Gate, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Jeshanah Gate.
    marker-yv: yv-n
  - type: text
    text: ' past the Fish Gate and the Tower of Hananel, and on to the Tower of the Hundred. Then we continued on to the Sheep Gate and stopped at the Guard Gate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'The two choirs that were giving thanks then proceeded to the Temple of God, where they took their places. So did I, together with the group of leaders who were with me. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'We went together with the trumpet-playing priests—Eliakim, Maaseiah, Miniamin, Micaiah, Elioenai, Zechariah, and Hananiah— '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: and the singers—Maaseiah, Shemaiah, Eleazar, Uzzi, Jehohanan, Malkijah, Elam, and Ezer. They played and sang loudly under the direction of Jezrahiah the choir director.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Many sacrifices were offered on that joyous day, for God had given the people cause for great joy. The women and children also participated in the celebration, and the joy of the people of Jerusalem could be heard far away.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Provisions for Temple Worship
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'On that day men were appointed to be in charge of the storerooms for the offerings, the first part of the harvest, and the tithes. They were responsible to collect from the fields outside the towns the portions required by the Law for the priests and Levites. For all the people of Judah took joy in the priests and Levites and their work. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'They performed the service of their God and the service of purification, as commanded by David and his son Solomon, and so did the singers and the gatekeepers. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'The custom of having choir directors to lead the choirs in hymns of praise and thanksgiving to God began long ago in the days of David and Asaph. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: So now, in the days of Zerubbabel and of Nehemiah, all Israel brought a daily supply of food for the singers, the gatekeepers, and the Levites. The Levites, in turn, gave a portion of what they received to the priests, the descendants of Aaron.
