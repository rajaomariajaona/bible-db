document_id: DEU.29,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verse 29:1 is numbered 28:69 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: 'These are the terms of the covenant the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses to make with the Israelites while they were in the land of Moab, in addition to the covenant he had made with them at Mount Sinai.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Horeb, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: another name for Sinai.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses Reviews the Covenant
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All of you—tribal leaders, elders, officers, all the men of Israel—are standing today in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your little ones and your wives are with you, as well as the foreigners living among you who chop your wood and carry your water. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You are standing here today to enter into the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is making this covenant, including the curses. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: By entering into the covenant today, he will establish you as his people and confirm that he is your God, just as he promised you and as he swore to your ancestors Abraham, Isaac, and Jacob.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But you are not the only ones with whom I am making this covenant with its curses. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am making this covenant both with you who stand here today in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, and also with the future generations who are not standing here today.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You remember how we lived in the land of Egypt and how we traveled through the lands of enemy nations as we left. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You have seen their detestable practices and their idols
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term (literally '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: round things
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) probably alludes to dung.
      marker-yv: yv-n
    - type: text
      text: ' made of wood, stone, silver, and gold. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am making this covenant with you so that no one among you—no man, woman, clan, or tribe—will turn away from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God to worship these gods of other nations, and so that no root among you bears bitter and poisonous fruit.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Those who hear the warnings of this curse should not congratulate themselves, thinking, ‘I am safe, even though I am following the desires of my own stubborn heart.’ This would lead to utter ruin! '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 29:2-29 are numbered 29:1-28 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: 'Moses summoned all the Israelites and said to them, “You have seen with your own eyes everything the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did in the land of Egypt to Pharaoh and to all his servants and to his whole country— '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will never pardon such people. Instead his anger and jealousy will burn against them. All the curses written in this book will come down on them, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will erase their names from under heaven. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will separate them from all the tribes of Israel, to pour out on them all the curses of the covenant recorded in this Book of Instruction.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then the generations to come, both your own descendants and the foreigners who come from distant lands, will see the devastation of the land and the diseases the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' inflicts on it. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will exclaim, ‘The whole land is devastated by sulfur and salt. It is a wasteland with nothing planted and nothing growing, not even a blade of grass. It is like the cities of Sodom and Gomorrah, Admah and Zeboiim, which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' destroyed in his intense anger.’'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And all the surrounding nations will ask, ‘Why has the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' done this to this land? Why was he so angry?’'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And the answer will be, ‘This happened because the people of the land abandoned the covenant that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their ancestors, made with them when he brought them out of the land of Egypt. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Instead, they turned away to serve and worship gods they had not known before, gods that were not from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That is why the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anger has burned against this land, bringing down on it every curse recorded in this book. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In great anger and fury the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' uprooted his people from their land and banished them to another land, where they still live today!’'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God has secrets known to no one. We are not accountable for them, but we and our children are accountable forever for all that he has revealed to us, so that we may obey all the terms of these instructions.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'all the great tests of strength, the miraculous signs, and the amazing wonders. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But to this day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has not given you minds that understand, nor eyes that see, nor ears that hear! '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For forty years I led you through the wilderness, yet your clothes and sandals did not wear out. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'You ate no bread and drank no wine or other alcoholic drink, but he provided for you so you would know that he is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When we came here, King Sihon of Heshbon and King Og of Bashan came out to fight against us, but we defeated them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We took their land and gave it to the tribes of Reuben and Gad and to the half-tribe of Manasseh as their grant of land.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore, obey the terms of this covenant so that you will prosper in everything you do. '
