document_id: DEU.29,116
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Verse 29:1 is numbered 28:69 in Hebrew text.
  - type: text
    content: 'These are the terms of the covenant the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses to make with the Israelites while they were in the land of Moab, in addition to the covenant he had made with them at Mount Sinai.'
  - type: note
    content: Hebrew Horeb, another name for Sinai.
  - type: heading
    content: Moses Reviews the Covenant
  '10':
  - type: text
    content: 'All of you—tribal leaders, elders, officers, all the men of Israel—are standing today in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '11':
  - type: text
    content: 'Your little ones and your wives are with you, as well as the foreigners living among you who chop your wood and carry your water. '
  '12':
  - type: text
    content: 'You are standing here today to enter into the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. The '
  - type: text
    content: Lord
  - type: text
    content: ' is making this covenant, including the curses. '
  '13':
  - type: text
    content: By entering into the covenant today, he will establish you as his people and confirm that he is your God, just as he promised you and as he swore to your ancestors Abraham, Isaac, and Jacob.
  '14':
  - type: text
    content: '“But you are not the only ones with whom I am making this covenant with its curses. '
  '15':
  - type: text
    content: 'I am making this covenant both with you who stand here today in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, and also with the future generations who are not standing here today.'
  '16':
  - type: text
    content: '“You remember how we lived in the land of Egypt and how we traveled through the lands of enemy nations as we left. '
  '17':
  - type: text
    content: You have seen their detestable practices and their idols
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung.
  - type: text
    content: ' made of wood, stone, silver, and gold. '
  '18':
  - type: text
    content: 'I am making this covenant with you so that no one among you—no man, woman, clan, or tribe—will turn away from the '
  - type: text
    content: Lord
  - type: text
    content: ' our God to worship these gods of other nations, and so that no root among you bears bitter and poisonous fruit.'
  '19':
  - type: text
    content: '“Those who hear the warnings of this curse should not congratulate themselves, thinking, ‘I am safe, even though I am following the desires of my own stubborn heart.’ This would lead to utter ruin! '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Verses 29:2-29 are numbered 29:1-28 in Hebrew text.
  - type: text
    content: 'Moses summoned all the Israelites and said to them, “You have seen with your own eyes everything the '
  - type: text
    content: Lord
  - type: text
    content: ' did in the land of Egypt to Pharaoh and to all his servants and to his whole country— '
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will never pardon such people. Instead his anger and jealousy will burn against them. All the curses written in this book will come down on them, and the '
  - type: text
    content: Lord
  - type: text
    content: ' will erase their names from under heaven. '
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will separate them from all the tribes of Israel, to pour out on them all the curses of the covenant recorded in this Book of Instruction.'
  '22':
  - type: text
    content: '“Then the generations to come, both your own descendants and the foreigners who come from distant lands, will see the devastation of the land and the diseases the '
  - type: text
    content: Lord
  - type: text
    content: ' inflicts on it. '
  '23':
  - type: text
    content: 'They will exclaim, ‘The whole land is devastated by sulfur and salt. It is a wasteland with nothing planted and nothing growing, not even a blade of grass. It is like the cities of Sodom and Gomorrah, Admah and Zeboiim, which the '
  - type: text
    content: Lord
  - type: text
    content: ' destroyed in his intense anger.’'
  '24':
  - type: text
    content: '“And all the surrounding nations will ask, ‘Why has the '
  - type: text
    content: Lord
  - type: text
    content: ' done this to this land? Why was he so angry?’'
  '25':
  - type: text
    content: '“And the answer will be, ‘This happened because the people of the land abandoned the covenant that the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, made with them when he brought them out of the land of Egypt. '
  '26':
  - type: text
    content: 'Instead, they turned away to serve and worship gods they had not known before, gods that were not from the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'That is why the '
  - type: text
    content: Lord
  - type: text
    content: '’s anger has burned against this land, bringing down on it every curse recorded in this book. '
  '28':
  - type: text
    content: 'In great anger and fury the '
  - type: text
    content: Lord
  - type: text
    content: ' uprooted his people from their land and banished them to another land, where they still live today!’'
  '29':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' our God has secrets known to no one. We are not accountable for them, but we and our children are accountable forever for all that he has revealed to us, so that we may obey all the terms of these instructions.'
  '3':
  - type: text
    content: 'all the great tests of strength, the miraculous signs, and the amazing wonders. '
  '4':
  - type: text
    content: 'But to this day the '
  - type: text
    content: Lord
  - type: text
    content: ' has not given you minds that understand, nor eyes that see, nor ears that hear! '
  '5':
  - type: text
    content: 'For forty years I led you through the wilderness, yet your clothes and sandals did not wear out. '
  '6':
  - type: text
    content: 'You ate no bread and drank no wine or other alcoholic drink, but he provided for you so you would know that he is the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '7':
  - type: text
    content: '“When we came here, King Sihon of Heshbon and King Og of Bashan came out to fight against us, but we defeated them. '
  '8':
  - type: text
    content: We took their land and gave it to the tribes of Reuben and Gad and to the half-tribe of Manasseh as their grant of land.
  '9':
  - type: text
    content: '“Therefore, obey the terms of this covenant so that you will prosper in everything you do. '
