document_id: DEU.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Regulations concerning War
  - type: text
    content: '“When you go out to fight your enemies and you face horses and chariots and an army greater than your own, do not be afraid. The '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of the land of Egypt, is with you! '
  '10':
  - type: text
    content: '“As you approach a town to attack it, you must first offer its people terms for peace. '
  '11':
  - type: text
    content: 'If they accept your terms and open the gates to you, then all the people inside will serve you in forced labor. '
  '12':
  - type: text
    content: 'But if they refuse to make peace and prepare to fight, you must attack the town. '
  '13':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' your God hands the town over to you, use your swords to kill every man in the town. '
  '14':
  - type: text
    content: 'But you may keep for yourselves all the women, children, livestock, and other plunder. You may enjoy the plunder from your enemies that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given you.'
  '15':
  - type: text
    content: '“But these instructions apply only to distant towns, not to the towns of the nations in the land you will enter. '
  '16':
  - type: text
    content: 'In those towns that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you as a special possession, destroy every living thing. '
  '17':
  - type: text
    content: You must completely destroy
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering.
  - type: text
    content: ' the Hittites, Amorites, Canaanites, Perizzites, Hivites, and Jebusites, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has commanded you. '
  '18':
  - type: text
    content: 'This will prevent the people of the land from teaching you to imitate their detestable customs in the worship of their gods, which would cause you to sin deeply against the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '19':
  - type: text
    content: '“When you are attacking a town and the war drags on, you must not cut down the trees with your axes. You may eat the fruit, but do not cut down the trees. Are the trees your enemies, that you should attack them? '
  '2':
  - type: text
    content: 'When you prepare for battle, the priest must come forward to speak to the troops. '
  '20':
  - type: text
    content: You may only cut down trees that you know are not valuable for food. Use them to make the equipment you need to attack the enemy town until it falls.
  '3':
  - type: text
    content: 'He will say to them, ‘Listen to me, all you men of Israel! Do not be afraid as you go out to fight your enemies today! Do not lose heart or panic or tremble before them. '
  '4':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is going with you! He will fight for you against your enemies, and he will give you victory!’'
  '5':
  - type: text
    content: '“Then the officers of the army must address the troops and say, ‘Has anyone here just built a new house but not yet dedicated it? If so, you may go home! You might be killed in the battle, and someone else would dedicate your house. '
  '6':
  - type: text
    content: 'Has anyone here just planted a vineyard but not yet eaten any of its fruit? If so, you may go home! You might die in battle, and someone else would eat the first fruit. '
  '7':
  - type: text
    content: Has anyone here just become engaged to a woman but not yet married her? Well, you may go home and get married! You might die in the battle, and someone else would marry her.’
  '8':
  - type: text
    content: '“Then the officers will also say, ‘Is anyone here afraid or worried? If you are, you may go home before you frighten anyone else.’ '
  '9':
  - type: text
    content: When the officers have finished speaking to their troops, they will appoint the unit commanders.
