document_id: MAT.19,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Discussion about Divorce and Marriage
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When Jesus had finished saying these things, he left Galilee and went down to the region of Judea east of the Jordan River. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus’ disciples then said to him, “If this is the case, it is better not to marry!”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Not everyone can accept this statement,” '
    - type: text
      text: 'Jesus said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Only those whom God helps.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Some are born as eunuchs, some have been made eunuchs by others, and some choose not to marry
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and some make themselves eunuchs.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for the sake of the Kingdom of Heaven. Let anyone accept this who can.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Blesses the Children
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: One day some parents brought their children to Jesus so he could lay his hands on them and pray for them. But the disciples scolded the parents for bothering him.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Let the children come to me. Don’t stop them! For the Kingdom of Heaven belongs to those who are like these children.”
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he placed his hands on their heads and blessed them before he left.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Rich Man
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Someone came to Jesus with this question: “Teacher,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Good Teacher.
      marker-yv: yv-n
    - type: text
      text: ' what good deed must I do to have eternal life?”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Why ask me about what is good?” '
    - type: text
      text: 'Jesus replied. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “There is only One who is good. But to answer your question—if you want to receive eternal life, keep
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: continue to keep.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the commandments.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Which ones?” the man asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus replied: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “‘You must not murder. You must not commit adultery. You must not steal. You must not testify falsely.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Honor your father and mother. Love your neighbor as yourself.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:18-19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 20:12-16; Deut 5:16-20; Lev 19:18.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Large crowds followed him there, and he healed their sick.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I’ve obeyed all these commandments,” the young man replied. “What else must I do?”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus told him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If you want to be perfect, go and sell all your possessions and give the money to the poor, and you will have treasure in heaven. Then come, follow me.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when the young man heard this, he went away sad, for he had many possessions.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said to his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you the truth, it is very hard for a rich person to enter the Kingdom of Heaven.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I’ll say it again—it is easier for a camel to go through the eye of a needle than for a rich person to enter the Kingdom of God!”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The disciples were astounded. “Then who in the world can be saved?” they asked.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus looked at them intently and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Humanly speaking, it is impossible. But with God everything is possible.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Peter said to him, “We’ve given up everything to follow you. What will we get?”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I assure you that when the world is made new
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:28a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in the regeneration.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and the Son of Man
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:28b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: sits upon his glorious throne, you who have been my followers will also sit on twelve thrones, judging the twelve tribes of Israel.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And everyone who has given up houses or brothers or sisters or father or mother or children or property, for my sake, will receive a hundred times as much in return and will inherit eternal life.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some Pharisees came and tried to trap him with this question: “Should a man be allowed to divorce his wife for just any reason?”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But many who are the greatest now will be least important then, and those who seem least important now will be the greatest then.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: But many who are first will be last; and the last, first.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Haven’t you read the Scriptures?” '
    - type: text
      text: 'Jesus replied. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “They record that from the beginning ‘God made them male and female.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen 1:27; 5:2.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “‘This explains why a man leaves his father and mother and is joined to his wife, and the two are united into one.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen 2:24.
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Since they are no longer two but one, let no one split apart what God has joined together.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Then why did Moses say in the law that a man could give his wife a written notice of divorce and send her away?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Deut 24:1.
      marker-yv: yv-n
    - type: text
      text: ' they asked.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Moses permitted divorce only as a concession to your hard hearts, but it was not what God had originally intended.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And I tell you this, whoever divorces his wife and marries someone else commits adultery—unless his wife has been unfaithful.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'And anyone who marries a divorced woman commits adultery. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Matt 5:32.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
