document_id: MAT.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Discussion about Divorce and Marriage
  - type: text
    content: 'When Jesus had finished saying these things, he left Galilee and went down to the region of Judea east of the Jordan River. '
  '10':
  - type: text
    content: Jesus’ disciples then said to him, “If this is the case, it is better not to marry!”
  '11':
  - type: text
    content: ' '
  - type: text
    content: '“Not everyone can accept this statement,” '
  - type: text
    content: 'Jesus said. '
  - type: text
    content: “Only those whom God helps.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Some are born as eunuchs, some have been made eunuchs by others, and some choose not to marry
  - type: note
    content: Greek and some make themselves eunuchs.
  - type: text
    content: ' '
  - type: text
    content: for the sake of the Kingdom of Heaven. Let anyone accept this who can.”
  - type: heading
    content: Jesus Blesses the Children
  '13':
  - type: text
    content: One day some parents brought their children to Jesus so he could lay his hands on them and pray for them. But the disciples scolded the parents for bothering him.
  '14':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “Let the children come to me. Don’t stop them! For the Kingdom of Heaven belongs to those who are like these children.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: And he placed his hands on their heads and blessed them before he left.
  - type: heading
    content: The Rich Man
  '16':
  - type: text
    content: 'Someone came to Jesus with this question: “Teacher,'
  - type: note
    content: Some manuscripts read Good Teacher.
  - type: text
    content: ' what good deed must I do to have eternal life?”'
  '17':
  - type: text
    content: ' '
  - type: text
    content: '“Why ask me about what is good?” '
  - type: text
    content: 'Jesus replied. '
  - type: text
    content: “There is only One who is good. But to answer your question—if you want to receive eternal life, keep
  - type: note
    content: Some manuscripts read continue to keep.
  - type: text
    content: ' '
  - type: text
    content: the commandments.”
  '18':
  - type: text
    content: “Which ones?” the man asked.
  - type: text
    content: 'And Jesus replied: '
  - type: text
    content: “‘You must not murder. You must not commit adultery. You must not steal. You must not testify falsely.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Honor your father and mother. Love your neighbor as yourself.’
  - type: note
    content: Exod 20:12-16; Deut 5:16-20; Lev 19:18.
  - type: text
    content: ”
  '2':
  - type: text
    content: Large crowds followed him there, and he healed their sick.
  '20':
  - type: text
    content: “I’ve obeyed all these commandments,” the young man replied. “What else must I do?”
  '21':
  - type: text
    content: 'Jesus told him, '
  - type: text
    content: “If you want to be perfect, go and sell all your possessions and give the money to the poor, and you will have treasure in heaven. Then come, follow me.”
  '22':
  - type: text
    content: But when the young man heard this, he went away sad, for he had many possessions.
  '23':
  - type: text
    content: 'Then Jesus said to his disciples, '
  - type: text
    content: “I tell you the truth, it is very hard for a rich person to enter the Kingdom of Heaven.
  - type: text
    content: ' '
  '24':
  - type: text
    content: I’ll say it again—it is easier for a camel to go through the eye of a needle than for a rich person to enter the Kingdom of God!”
  '25':
  - type: text
    content: The disciples were astounded. “Then who in the world can be saved?” they asked.
  '26':
  - type: text
    content: 'Jesus looked at them intently and said, '
  - type: text
    content: “Humanly speaking, it is impossible. But with God everything is possible.”
  '27':
  - type: text
    content: Then Peter said to him, “We’ve given up everything to follow you. What will we get?”
  '28':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I assure you that when the world is made new
  - type: note
    content: Or in the regeneration.
  - type: text
    content: ' '
  - type: text
    content: and the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: sits upon his glorious throne, you who have been my followers will also sit on twelve thrones, judging the twelve tribes of Israel.
  - type: text
    content: ' '
  '29':
  - type: text
    content: And everyone who has given up houses or brothers or sisters or father or mother or children or property, for my sake, will receive a hundred times as much in return and will inherit eternal life.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Some Pharisees came and tried to trap him with this question: “Should a man be allowed to divorce his wife for just any reason?”'
  '30':
  - type: text
    content: But many who are the greatest now will be least important then, and those who seem least important now will be the greatest then.
  - type: note
    content: Greek But many who are first will be last; and the last, first.
  '4':
  - type: text
    content: ' '
  - type: text
    content: '“Haven’t you read the Scriptures?” '
  - type: text
    content: 'Jesus replied. '
  - type: text
    content: “They record that from the beginning ‘God made them male and female.’
  - type: note
    content: Gen 1:27; 5:2.
  - type: text
    content: ”
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And he said, '
  - type: text
    content: “‘This explains why a man leaves his father and mother and is joined to his wife, and the two are united into one.’
  - type: note
    content: Gen 2:24.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Since they are no longer two but one, let no one split apart what God has joined together.”
  '7':
  - type: text
    content: “Then why did Moses say in the law that a man could give his wife a written notice of divorce and send her away?”
  - type: note
    content: See Deut 24:1.
  - type: text
    content: ' they asked.'
  '8':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Moses permitted divorce only as a concession to your hard hearts, but it was not what God had originally intended.
  - type: text
    content: ' '
  '9':
  - type: text
    content: And I tell you this, whoever divorces his wife and marries someone else commits adultery—unless his wife has been unfaithful.
  - type: note
    content: Some manuscripts add And anyone who marries a divorced woman commits adultery. Compare Matt 5:32.
  - type: text
    content: ”
