document_id: PSA.94
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of vengeance,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: O God of vengeance, let your glorious justice shine forth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Arise, O Judge of the earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give the proud what they deserve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'How long, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: How long will the wicked be allowed to gloat?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: How long will they speak with arrogance?
- type: usfm
  marker: q2
  children:
  - type: text
    text: How long will these evil people boast?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They crush your people, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: hurting those you claim as your own.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They kill widows and foreigners
- type: usfm
  marker: q2
  children:
  - type: text
    text: and murder orphans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'Lord '
  - type: text
    text: isn’t looking,” they say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “and besides, the God of Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '94:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note on 44:4.
    marker-yv: yv-n
  - type: text
    text: ' doesn’t care.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Think again, you fools!
- type: usfm
  marker: q2
  children:
  - type: text
    text: When will you finally catch on?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Is he deaf—the one who made your ears?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is he blind—the one who formed your eyes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He punishes the nations—won’t he also punish you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: He knows everything—doesn’t he also know what you are doing?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' knows people’s thoughts;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he knows they are worthless!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Joyful are those you discipline, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: those you teach with your instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You give them relief from troubled times
- type: usfm
  marker: q2
  children:
  - type: text
    text: until a pit is dug to capture the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will not reject his people;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will not abandon his special possession.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Judgment will again be founded on justice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those with virtuous hearts will pursue it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Who will protect me from the wicked?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who will stand up for me against evildoers?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Unless the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had helped me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would soon have settled in the silence of the grave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I cried out, “I am slipping!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but your unfailing love, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', supported me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: When doubts filled my mind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your comfort gave me renewed hope and cheer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Can unjust leaders claim that God is on their side—
- type: usfm
  marker: q2
  children:
  - type: text
    text: leaders whose decrees permit injustice?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They gang up against the righteous
- type: usfm
  marker: q2
  children:
  - type: text
    text: and condemn the innocent to death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is my fortress;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: my God is the mighty rock where I hide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: God will turn the sins of evil people back on them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will destroy them for their sins.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God will destroy them.'
