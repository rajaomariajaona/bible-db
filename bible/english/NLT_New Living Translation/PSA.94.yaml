document_id: PSA.94,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of vengeance,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O God of vengeance, let your glorious justice shine forth!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He punishes the nations—won’t he also punish you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He knows everything—doesn’t he also know what you are doing?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' knows people’s thoughts;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he knows they are worthless!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Joyful are those you discipline, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those you teach with your instructions.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You give them relief from troubled times
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until a pit is dug to capture the wicked.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will not reject his people;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will not abandon his special possession.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Judgment will again be founded on justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those with virtuous hearts will pursue it.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who will protect me from the wicked?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who will stand up for me against evildoers?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Unless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had helped me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would soon have settled in the silence of the grave.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cried out, “I am slipping!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but your unfailing love, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', supported me.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When doubts filled my mind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your comfort gave me renewed hope and cheer.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arise, O Judge of the earth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Give the proud what they deserve.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can unjust leaders claim that God is on their side—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaders whose decrees permit injustice?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They gang up against the righteous
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and condemn the innocent to death.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my fortress;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my God is the mighty rock where I hide.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will turn the sins of evil people back on them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will destroy them for their sins.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God will destroy them.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How long, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will the wicked be allowed to gloat?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long will they speak with arrogance?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will these evil people boast?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They crush your people, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hurting those you claim as your own.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They kill widows and foreigners
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and murder orphans.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'Lord '
    - type: text
      text: isn’t looking,” they say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “and besides, the God of Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '94:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of Jacob. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 44:4.
      marker-yv: yv-n
    - type: text
      text: ' doesn’t care.”'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Think again, you fools!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When will you finally catch on?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is he deaf—the one who made your ears?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is he blind—the one who formed your eyes?
