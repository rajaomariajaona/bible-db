document_id: PSA.94,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', the God of vengeance,'
  - type: text
    content: O God of vengeance, let your glorious justice shine forth!
  '10':
  - type: text
    content: He punishes the nations—won’t he also punish you?
  - type: text
    content: He knows everything—doesn’t he also know what you are doing?
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' knows people’s thoughts;'
  - type: text
    content: he knows they are worthless!
  '12':
  - type: text
    content: 'Joyful are those you discipline, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: those you teach with your instructions.
  '13':
  - type: text
    content: You give them relief from troubled times
  - type: text
    content: until a pit is dug to capture the wicked.
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will not reject his people;'
  - type: text
    content: he will not abandon his special possession.
  '15':
  - type: text
    content: Judgment will again be founded on justice,
  - type: text
    content: and those with virtuous hearts will pursue it.
  '16':
  - type: text
    content: Who will protect me from the wicked?
  - type: text
    content: Who will stand up for me against evildoers?
  '17':
  - type: text
    content: 'Unless the '
  - type: text
    content: Lord
  - type: text
    content: ' had helped me,'
  - type: text
    content: I would soon have settled in the silence of the grave.
  '18':
  - type: text
    content: I cried out, “I am slipping!”
  - type: text
    content: 'but your unfailing love, O '
  - type: text
    content: Lord
  - type: text
    content: ', supported me.'
  '19':
  - type: text
    content: When doubts filled my mind,
  - type: text
    content: your comfort gave me renewed hope and cheer.
  '2':
  - type: text
    content: Arise, O Judge of the earth.
  - type: text
    content: Give the proud what they deserve.
  '20':
  - type: text
    content: Can unjust leaders claim that God is on their side—
  - type: text
    content: leaders whose decrees permit injustice?
  '21':
  - type: text
    content: They gang up against the righteous
  - type: text
    content: and condemn the innocent to death.
  '22':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' is my fortress;'
  - type: text
    content: my God is the mighty rock where I hide.
  '23':
  - type: text
    content: God will turn the sins of evil people back on them.
  - type: text
    content: He will destroy them for their sins.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' our God will destroy them.'
  '3':
  - type: text
    content: 'How long, O '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: How long will the wicked be allowed to gloat?
  '4':
  - type: text
    content: How long will they speak with arrogance?
  - type: text
    content: How long will these evil people boast?
  '5':
  - type: text
    content: 'They crush your people, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: hurting those you claim as your own.
  '6':
  - type: text
    content: They kill widows and foreigners
  - type: text
    content: and murder orphans.
  '7':
  - type: text
    content: '“The '
  - type: text
    content: 'Lord '
  - type: text
    content: isn’t looking,” they say,
  - type: text
    content: “and besides, the God of Israel
  - type: note
    content: Hebrew of Jacob. See note on 44:4.
  - type: text
    content: ' doesn’t care.”'
  '8':
  - type: text
    content: Think again, you fools!
  - type: text
    content: When will you finally catch on?
  '9':
  - type: text
    content: Is he deaf—the one who made your ears?
  - type: text
    content: Is he blind—the one who formed your eyes?
