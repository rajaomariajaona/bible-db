document_id: 2TI.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greetings from Paul
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: This letter is from Paul, chosen by the will of God to be an apostle of Christ Jesus. I have been sent out to tell others about the life he has promised through faith in Christ Jesus.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now he has made all of this plain to us by the appearing of Christ Jesus, our Savior. He broke the power of death and illuminated the way to life and immortality through the Good News. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And God chose me to be a preacher, an apostle, and a teacher of this Good News.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That is why I am suffering here in prison. But I am not ashamed of it, for I know the one in whom I trust, and I am sure that he is able to guard what I have entrusted to him
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: what has been entrusted to me.
      marker-yv: yv-n
    - type: text
      text: ' until the day of his return.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hold on to the pattern of wholesome teaching you learned from me—a pattern shaped by the faith and love that you have in Christ Jesus. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Through the power of the Holy Spirit who lives within us, carefully guard the precious truth that has been entrusted to you.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As you know, everyone from the province of Asia has deserted me—even Phygelus and Hermogenes.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'May the Lord show special kindness to Onesiphorus and all his family because he often visited and encouraged me. He was never ashamed of me because I was in chains. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he came to Rome, he searched everywhere until he found me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: May the Lord show him special kindness on the day of Christ’s return. And you know very well how helpful he was in Ephesus.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I am writing to Timothy, my dear son.
  - type: usfm
    marker: p
    children:
    - type: text
      text: May God the Father and Christ Jesus our Lord give you grace, mercy, and peace.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Encouragement to Be Faithful
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Timothy, I thank God for you—the God I serve with a clear conscience, just as my ancestors did. Night and day I constantly remember you in my prayers. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: I long to see you again, for I remember your tears as we parted. And I will be filled with joy when we are together again.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I remember your genuine faith, for you share the faith that first filled your grandmother Lois and your mother, Eunice. And I know that same faith continues strong in you. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is why I remind you to fan into flames the spiritual gift God gave you when I laid my hands on you. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For God has not given us a spirit of fear and timidity, but of power, love, and self-discipline.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So never be ashamed to tell others about our Lord. And don’t be ashamed of me, either, even though I’m in prison for him. With the strength God gives you, be ready to suffer with me for the sake of the Good News. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For God saved us and called us to live a holy life. He did this, not because we deserved it, but because that was his plan from before the beginning of time—to show us his grace through Christ Jesus. '
