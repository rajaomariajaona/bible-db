document_id: 2TI.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings from Paul
  - type: text
    content: This letter is from Paul, chosen by the will of God to be an apostle of Christ Jesus. I have been sent out to tell others about the life he has promised through faith in Christ Jesus.
  '10':
  - type: text
    content: 'And now he has made all of this plain to us by the appearing of Christ Jesus, our Savior. He broke the power of death and illuminated the way to life and immortality through the Good News. '
  '11':
  - type: text
    content: And God chose me to be a preacher, an apostle, and a teacher of this Good News.
  '12':
  - type: text
    content: That is why I am suffering here in prison. But I am not ashamed of it, for I know the one in whom I trust, and I am sure that he is able to guard what I have entrusted to him
  - type: note
    content: Or what has been entrusted to me.
  - type: text
    content: ' until the day of his return.'
  '13':
  - type: text
    content: 'Hold on to the pattern of wholesome teaching you learned from me—a pattern shaped by the faith and love that you have in Christ Jesus. '
  '14':
  - type: text
    content: Through the power of the Holy Spirit who lives within us, carefully guard the precious truth that has been entrusted to you.
  '15':
  - type: text
    content: As you know, everyone from the province of Asia has deserted me—even Phygelus and Hermogenes.
  '16':
  - type: text
    content: 'May the Lord show special kindness to Onesiphorus and all his family because he often visited and encouraged me. He was never ashamed of me because I was in chains. '
  '17':
  - type: text
    content: 'When he came to Rome, he searched everywhere until he found me. '
  '18':
  - type: text
    content: May the Lord show him special kindness on the day of Christ’s return. And you know very well how helpful he was in Ephesus.
  '2':
  - type: text
    content: I am writing to Timothy, my dear son.
  - type: text
    content: May God the Father and Christ Jesus our Lord give you grace, mercy, and peace.
  - type: heading
    content: Encouragement to Be Faithful
  '3':
  - type: text
    content: 'Timothy, I thank God for you—the God I serve with a clear conscience, just as my ancestors did. Night and day I constantly remember you in my prayers. '
  '4':
  - type: text
    content: I long to see you again, for I remember your tears as we parted. And I will be filled with joy when we are together again.
  '5':
  - type: text
    content: 'I remember your genuine faith, for you share the faith that first filled your grandmother Lois and your mother, Eunice. And I know that same faith continues strong in you. '
  '6':
  - type: text
    content: 'This is why I remind you to fan into flames the spiritual gift God gave you when I laid my hands on you. '
  '7':
  - type: text
    content: For God has not given us a spirit of fear and timidity, but of power, love, and self-discipline.
  '8':
  - type: text
    content: 'So never be ashamed to tell others about our Lord. And don’t be ashamed of me, either, even though I’m in prison for him. With the strength God gives you, be ready to suffer with me for the sake of the Good News. '
  '9':
  - type: text
    content: 'For God saved us and called us to live a holy life. He did this, not because we deserved it, but because that was his plan from before the beginning of time—to show us his grace through Christ Jesus. '
