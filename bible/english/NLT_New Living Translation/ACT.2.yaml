document_id: ACT.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Holy Spirit Comes
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: On the day of Pentecost
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Festival of Pentecost came 50 days after Passover (when Jesus was crucified).
    marker-yv: yv-n
  - type: text
    text: ' all the believers were meeting together in one place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Suddenly, there was a sound from heaven like the roaring of a mighty windstorm, and it filled the house where they were sitting. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then, what looked like flames or tongues of fire appeared and settled on each of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And everyone present was filled with the Holy Spirit and began speaking in other languages,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in other tongues.
    marker-yv: yv-n
  - type: text
    text: ' as the Holy Spirit gave them this ability.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'At that time there were devout Jews from every nation living in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When they heard the loud noise, everyone came running, and they were bewildered to hear their own languages being spoken by the believers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They were completely amazed. “How can this be?” they exclaimed. “These people are all from Galilee, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and yet we hear them speaking in our own native languages! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Here we are—Parthians, Medes, Elamites, people from Mesopotamia, Judea, Cappadocia, Pontus, the province of Asia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Phrygia, Pamphylia, Egypt, and the areas of Libya around Cyrene, visitors from Rome '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '(both Jews and converts to Judaism), Cretans, and Arabs. And we all hear these people speaking in our own languages about the wonderful things God has done!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They stood there amazed and perplexed. “What can this mean?” they asked each other.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But others in the crowd ridiculed them, saying, “They’re just drunk, that’s all!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter Preaches to the Crowd
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Peter stepped forward with the eleven other apostles and shouted to the crowd, “Listen carefully, all of you, fellow Jews and residents of Jerusalem! Make no mistake about this. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'These people are not drunk, as some of you are assuming. Nine o’clock in the morning is much too early for that. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'No, what you see was predicted long ago by the prophet Joel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ‘In the last days,’ God says,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I will pour out my Spirit upon all people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your sons and daughters will prophesy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your young men will see visions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your old men will dream dreams.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: In those days I will pour out my Spirit
- type: usfm
  marker: q2
  children:
  - type: text
    text: even on my servants—men and women alike—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will prophesy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And I will cause wonders in the heavens above
- type: usfm
  marker: q2
  children:
  - type: text
    text: and signs on the earth below—
- type: usfm
  marker: q2
  children:
  - type: text
    text: blood and fire and clouds of smoke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The sun will become dark,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the moon will turn blood red
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'before that great and glorious day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' arrives.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But everyone who calls on the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be saved.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:17-21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joel 2:28-32.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “People of Israel, listen! God publicly endorsed Jesus the Nazarene
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jesus of Nazareth.
    marker-yv: yv-n
  - type: text
    text: ' by doing powerful miracles, wonders, and signs through him, as you well know. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But God knew what would happen, and his prearranged plan was carried out when Jesus was betrayed. With the help of lawless Gentiles, you nailed him to a cross and killed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But God released him from the horrors of death and raised him back to life, for death could not keep him in its grip. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'King David said this about him:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘I see that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is always with me.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not be shaken, for he is right beside me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: No wonder my heart is glad,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my tongue shouts his praises!
- type: usfm
  marker: q2
  children:
  - type: text
    text: My body rests in hope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: For you will not leave my soul among the dead
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in Hades; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 2:31.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: or allow your Holy One to rot in the grave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: You have shown me the way of life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will fill me with the joy of your presence.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:25-28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 16:8-11 (Greek version).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“Dear brothers, think about this! You can be sure that the patriarch David wasn’t referring to himself, for he died and was buried, and his tomb is still here among us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But he was a prophet, and he knew God had promised with an oath that one of David’s own descendants would sit on his throne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: David was looking into the future and speaking of the Messiah’s resurrection. He was saying that God would not leave him among the dead or allow his body to rot in the grave.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '“God raised Jesus from the dead, and we are all witnesses of this. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Now he is exalted to the place of highest honor in heaven, at God’s right hand. And the Father, as he had promised, gave him the Holy Spirit to pour out upon us, just as you see and hear today. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: For David himself never ascended into heaven, yet he said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to my Lord,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Sit in the place of honor at my right hand
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: until I humble your enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: making them a footstool under your feet.”’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:34-35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 110:1.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: “So let everyone in Israel know for certain that God has made this Jesus, whom you crucified, to be both Lord and Messiah!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Peter’s words pierced their hearts, and they said to him and to the other apostles, “Brothers, what should we do?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Peter replied, “Each of you must repent of your sins and turn to God, and be baptized in the name of Jesus Christ for the forgiveness of your sins. Then you will receive the gift of the Holy Spirit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: This promise is to you, to your children, and to those far away
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'and to people far in the future, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and to the Gentiles.
    marker-yv: yv-n
  - type: text
    text: '—all who have been called by the Lord our God.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Then Peter continued preaching for a long time, strongly urging all his listeners, “Save yourselves from this crooked generation!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Those who believed what Peter said were baptized and added to the church that day—about 3,000 in all.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Believers Form a Community
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: All the believers devoted themselves to the apostles’ teaching, and to fellowship, and to sharing in meals (including the Lord’s Supper
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the breaking of bread; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 2:46.
    marker-yv: yv-n
  - type: text
    text: ), and to prayer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'A deep sense of awe came over them all, and the apostles performed many miraculous signs and wonders. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'And all the believers met together in one place and shared everything they had. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'They sold their property and possessions and shared the money with those in need. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: They worshiped together at the Temple each day, met in homes for the Lord’s Supper, and shared their meals with great joy and generosity
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and sincere hearts.
    marker-yv: yv-n
  - type: text
    text: '— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: all the while praising God and enjoying the goodwill of all the people. And each day the Lord added to their fellowship those who were being saved.
