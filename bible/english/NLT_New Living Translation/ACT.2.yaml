document_id: ACT.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Holy Spirit Comes
  - type: text
    content: On the day of Pentecost
  - type: note
    content: The Festival of Pentecost came 50 days after Passover (when Jesus was crucified).
  - type: text
    content: ' all the believers were meeting together in one place. '
  '10':
  - type: text
    content: 'Phrygia, Pamphylia, Egypt, and the areas of Libya around Cyrene, visitors from Rome '
  '11':
  - type: text
    content: '(both Jews and converts to Judaism), Cretans, and Arabs. And we all hear these people speaking in our own languages about the wonderful things God has done!” '
  '12':
  - type: text
    content: They stood there amazed and perplexed. “What can this mean?” they asked each other.
  '13':
  - type: text
    content: But others in the crowd ridiculed them, saying, “They’re just drunk, that’s all!”
  - type: heading
    content: Peter Preaches to the Crowd
  '14':
  - type: text
    content: 'Then Peter stepped forward with the eleven other apostles and shouted to the crowd, “Listen carefully, all of you, fellow Jews and residents of Jerusalem! Make no mistake about this. '
  '15':
  - type: text
    content: 'These people are not drunk, as some of you are assuming. Nine o’clock in the morning is much too early for that. '
  '16':
  - type: text
    content: 'No, what you see was predicted long ago by the prophet Joel:'
  '17':
  - type: text
    content: ‘In the last days,’ God says,
  - type: text
    content: ‘I will pour out my Spirit upon all people.
  - type: text
    content: Your sons and daughters will prophesy.
  - type: text
    content: Your young men will see visions,
  - type: text
    content: and your old men will dream dreams.
  '18':
  - type: text
    content: In those days I will pour out my Spirit
  - type: text
    content: even on my servants—men and women alike—
  - type: text
    content: and they will prophesy.
  '19':
  - type: text
    content: And I will cause wonders in the heavens above
  - type: text
    content: and signs on the earth below—
  - type: text
    content: blood and fire and clouds of smoke.
  '2':
  - type: text
    content: 'Suddenly, there was a sound from heaven like the roaring of a mighty windstorm, and it filled the house where they were sitting. '
  '20':
  - type: text
    content: The sun will become dark,
  - type: text
    content: and the moon will turn blood red
  - type: text
    content: 'before that great and glorious day of the '
  - type: text
    content: Lord
  - type: text
    content: ' arrives.'
  '21':
  - type: text
    content: 'But everyone who calls on the name of the '
  - type: text
    content: Lord
  - type: text
    content: will be saved.’
  - type: note
    content: Joel 2:28-32.
  '22':
  - type: text
    content: “People of Israel, listen! God publicly endorsed Jesus the Nazarene
  - type: note
    content: Or Jesus of Nazareth.
  - type: text
    content: ' by doing powerful miracles, wonders, and signs through him, as you well know. '
  '23':
  - type: text
    content: 'But God knew what would happen, and his prearranged plan was carried out when Jesus was betrayed. With the help of lawless Gentiles, you nailed him to a cross and killed him. '
  '24':
  - type: text
    content: 'But God released him from the horrors of death and raised him back to life, for death could not keep him in its grip. '
  '25':
  - type: text
    content: 'King David said this about him:'
  - type: text
    content: '‘I see that the '
  - type: text
    content: Lord
  - type: text
    content: ' is always with me.'
  - type: text
    content: I will not be shaken, for he is right beside me.
  '26':
  - type: text
    content: No wonder my heart is glad,
  - type: text
    content: and my tongue shouts his praises!
  - type: text
    content: My body rests in hope.
  '27':
  - type: text
    content: For you will not leave my soul among the dead
  - type: note
    content: Greek in Hades; also in 2:31.
  - type: text
    content: or allow your Holy One to rot in the grave.
  '28':
  - type: text
    content: You have shown me the way of life,
  - type: text
    content: and you will fill me with the joy of your presence.’
  - type: note
    content: Ps 16:8-11 (Greek version).
  '29':
  - type: text
    content: '“Dear brothers, think about this! You can be sure that the patriarch David wasn’t referring to himself, for he died and was buried, and his tomb is still here among us. '
  '3':
  - type: text
    content: 'Then, what looked like flames or tongues of fire appeared and settled on each of them. '
  '30':
  - type: text
    content: 'But he was a prophet, and he knew God had promised with an oath that one of David’s own descendants would sit on his throne. '
  '31':
  - type: text
    content: David was looking into the future and speaking of the Messiah’s resurrection. He was saying that God would not leave him among the dead or allow his body to rot in the grave.
  '32':
  - type: text
    content: '“God raised Jesus from the dead, and we are all witnesses of this. '
  '33':
  - type: text
    content: 'Now he is exalted to the place of highest honor in heaven, at God’s right hand. And the Father, as he had promised, gave him the Holy Spirit to pour out upon us, just as you see and hear today. '
  '34':
  - type: text
    content: For David himself never ascended into heaven, yet he said,
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' said to my Lord,'
  - type: text
    content: “Sit in the place of honor at my right hand
  '35':
  - type: text
    content: until I humble your enemies,
  - type: text
    content: making them a footstool under your feet.”’
  - type: note
    content: Ps 110:1.
  '36':
  - type: text
    content: “So let everyone in Israel know for certain that God has made this Jesus, whom you crucified, to be both Lord and Messiah!”
  '37':
  - type: text
    content: Peter’s words pierced their hearts, and they said to him and to the other apostles, “Brothers, what should we do?”
  '38':
  - type: text
    content: 'Peter replied, “Each of you must repent of your sins and turn to God, and be baptized in the name of Jesus Christ for the forgiveness of your sins. Then you will receive the gift of the Holy Spirit. '
  '39':
  - type: text
    content: This promise is to you, to your children, and to those far away
  - type: note
    content: Or and to people far in the future, or and to the Gentiles.
  - type: text
    content: '—all who have been called by the Lord our God.” '
  '4':
  - type: text
    content: And everyone present was filled with the Holy Spirit and began speaking in other languages,
  - type: note
    content: Or in other tongues.
  - type: text
    content: ' as the Holy Spirit gave them this ability.'
  '40':
  - type: text
    content: Then Peter continued preaching for a long time, strongly urging all his listeners, “Save yourselves from this crooked generation!”
  '41':
  - type: text
    content: Those who believed what Peter said were baptized and added to the church that day—about 3,000 in all.
  - type: heading
    content: The Believers Form a Community
  '42':
  - type: text
    content: All the believers devoted themselves to the apostles’ teaching, and to fellowship, and to sharing in meals (including the Lord’s Supper
  - type: note
    content: Greek the breaking of bread; also in 2:46.
  - type: text
    content: ), and to prayer.
  '43':
  - type: text
    content: 'A deep sense of awe came over them all, and the apostles performed many miraculous signs and wonders. '
  '44':
  - type: text
    content: 'And all the believers met together in one place and shared everything they had. '
  '45':
  - type: text
    content: 'They sold their property and possessions and shared the money with those in need. '
  '46':
  - type: text
    content: They worshiped together at the Temple each day, met in homes for the Lord’s Supper, and shared their meals with great joy and generosity
  - type: note
    content: Or and sincere hearts.
  - type: text
    content: '— '
  '47':
  - type: text
    content: all the while praising God and enjoying the goodwill of all the people. And each day the Lord added to their fellowship those who were being saved.
  '5':
  - type: text
    content: 'At that time there were devout Jews from every nation living in Jerusalem. '
  '6':
  - type: text
    content: When they heard the loud noise, everyone came running, and they were bewildered to hear their own languages being spoken by the believers.
  '7':
  - type: text
    content: 'They were completely amazed. “How can this be?” they exclaimed. “These people are all from Galilee, '
  '8':
  - type: text
    content: 'and yet we hear them speaking in our own native languages! '
  '9':
  - type: text
    content: 'Here we are—Parthians, Medes, Elamites, people from Mesopotamia, Judea, Cappadocia, Pontus, the province of Asia, '
