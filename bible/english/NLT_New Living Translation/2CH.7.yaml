document_id: 2CH.7,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Dedication of the Temple
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When Solomon finished praying, fire flashed down from heaven and burned up the burnt offerings and sacrifices, and the glorious presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' filled the Temple. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then at the end of the celebration,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Then on the twenty-third day of the seventh month. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This day of the ancient Hebrew lunar calendar occurred in October or early November.
      marker-yv: yv-n
    - type: text
      text: ' Solomon sent the people home. They were all joyful and glad because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had been so good to David and to Solomon and to his people Israel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Response to Solomon
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So Solomon finished the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', as well as the royal palace. He completed everything he had planned to do in the construction of the Temple and the palace. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then one night the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to Solomon and said,'
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: '“I have heard your prayer and have chosen this Temple as the place for making sacrifices. '
  '13':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'At times I might shut up the heavens so that no rain falls, or command grasshoppers to devour your crops, or send plagues among you. '
  '14':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then if my people who are called by my name will humble themselves and pray and seek my face and turn from their wicked ways, I will hear from heaven and will forgive their sins and restore their land. '
  '15':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'My eyes will be open and my ears attentive to every prayer made in this place. '
  '16':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: For I have chosen this Temple and set it apart to be holy—a place where my name will be honored forever. I will always watch over it, for it is dear to my heart.
  '17':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“As for you, if you faithfully follow me as David your father did, obeying all my commands, decrees, and regulations, '
  '18':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: then I will establish the throne of your dynasty. For I made this covenant with your father, David, when I said, ‘One of your descendants will always rule over Israel.’
  '19':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“But if you or your descendants abandon me and disobey the decrees and commands I have given you, and if you serve and worship other gods, '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The priests could not enter the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' because the glorious presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' filled it. '
  '20':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'then I will uproot the people from this land that I have given them. I will reject this Temple that I have made holy to honor my name. I will make it an object of mockery and ridicule among the nations. '
  '21':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And though this Temple is impressive now, all who pass by will be appalled. They will ask, ‘Why did the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' do such terrible things to this land and to this Temple?’'
  '22':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“And the answer will be, ‘Because his people abandoned the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their ancestors, who brought them out of Egypt, and they worshiped other gods instead and bowed down to them. That is why he has brought all these disasters on them.’”'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'When all the people of Israel saw the fire coming down and the glorious presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' filling the Temple, they fell face down on the ground and worshiped and praised the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He is good!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His faithful love endures forever!”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then the king and all the people offered sacrifices to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'King Solomon offered a sacrifice of 22,000 cattle and 120,000 sheep and goats. And so the king and all the people dedicated the Temple of God. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The priests took their assigned positions, and so did the Levites who were singing, “His faithful love endures forever!” They accompanied the singing with music from the instruments King David had made for praising the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . Across from the Levites, the priests blew the trumpets, while all Israel stood.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Solomon then consecrated the central area of the courtyard in front of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Temple. He offered burnt offerings and the fat of peace offerings there, because the bronze altar he had built could not hold all the burnt offerings, grain offerings, and sacrificial fat.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: For the next seven days Solomon and all Israel celebrated the Festival of Shelters.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the festival '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (also in 7:9); see note on 5:3.
      marker-yv: yv-n
    - type: text
      text: ' A large congregation had gathered from as far away as Lebo-hamath in the north and the Brook of Egypt in the south. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'On the eighth day they had a closing ceremony, for they had celebrated the dedication of the altar for seven days and the Festival of Shelters for seven days. '
