document_id: 2KI.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ahaz Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ahaz son of Jotham began to rule over Judah in the seventeenth year of King Pekah’s reign in Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ahaz was twenty years old when he became king, and he reigned in Jerusalem sixteen years. He did not do what was pleasing in the sight of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God, as his ancestor David had done. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Instead, he followed the example of the kings of Israel, even sacrificing his own son in the fire.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: even making his son pass through the fire.
    marker-yv: yv-n
  - type: text
    text: ' In this way, he followed the detestable practices of the pagan nations the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had driven from the land ahead of the Israelites. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He offered sacrifices and burned incense at the pagan shrines and on the hills and under every green tree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then King Rezin of Aram and King Pekah of Israel came up to attack Jerusalem. They besieged Ahaz but could not conquer him. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: At that time the king of Edom
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:6a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Latin Vulgate; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Rezin king of Aram.
    marker-yv: yv-n
  - type: text
    text: ' recovered the town of Elath for Edom.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:6b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Latin Vulgate; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Aram.
    marker-yv: yv-n
  - type: text
    text: ' He drove out the people of Judah and sent Edomites'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:6c '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version, Latin Vulgate, and an alternate reading of the Masoretic Text; the other alternate reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Arameans.
    marker-yv: yv-n
  - type: text
    text: ' to live there, as they do to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'King Ahaz sent messengers to King Tiglath-pileser of Assyria with this message: “I am your servant and your vassal.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: your son.
    marker-yv: yv-n
  - type: text
    text: ' Come up and rescue me from the attacking armies of Aram and Israel.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Ahaz took the silver and gold from the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and the palace treasury and sent it as a payment to the Assyrian king. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So the king of Assyria attacked the Aramean capital of Damascus and led its population away as captives, resettling them in Kir. He also killed King Rezin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'King Ahaz then went to Damascus to meet with King Tiglath-pileser of Assyria. While he was there, he took special note of the altar. Then he sent a model of the altar to Uriah the priest, along with its design in full detail. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Uriah followed the king’s instructions and built an altar just like it, and it was ready before the king returned from Damascus. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When the king returned, he inspected the altar and made offerings on it. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He presented a burnt offering and a grain offering, he poured out a liquid offering, and he sprinkled the blood of peace offerings on the altar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then King Ahaz removed the old bronze altar from its place in front of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple, between the entrance and the new altar, and placed it on the north side of the new altar. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He told Uriah the priest, “Use the new altar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the great altar.
    marker-yv: yv-n
  - type: text
    text: ' for the morning sacrifices of burnt offering, the evening grain offering, the king’s burnt offering and grain offering, and the burnt offerings of all the people, as well as their grain offerings and liquid offerings. Sprinkle the blood from all the burnt offerings and sacrifices on the new altar. The bronze altar will be for my personal use only.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Uriah the priest did just as King Ahaz commanded him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the king removed the side panels and basins from the portable water carts. He also removed the great bronze basin called the Sea from the backs of the bronze oxen and placed it on the stone pavement. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: In deference to the king of Assyria, he also removed the canopy that had been constructed inside the palace for use on the Sabbath day,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' as well as the king’s outer entrance to the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The rest of the events in Ahaz’s reign and everything he did are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Judah.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: When Ahaz died, he was buried with his ancestors in the City of David. Then his son Hezekiah became the next king.
