document_id: 2KI.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Ahaz Rules in Judah
  - type: text
    content: 'Ahaz son of Jotham began to rule over Judah in the seventeenth year of King Pekah’s reign in Israel. '
  '10':
  - type: text
    content: 'King Ahaz then went to Damascus to meet with King Tiglath-pileser of Assyria. While he was there, he took special note of the altar. Then he sent a model of the altar to Uriah the priest, along with its design in full detail. '
  '11':
  - type: text
    content: 'Uriah followed the king’s instructions and built an altar just like it, and it was ready before the king returned from Damascus. '
  '12':
  - type: text
    content: 'When the king returned, he inspected the altar and made offerings on it. '
  '13':
  - type: text
    content: He presented a burnt offering and a grain offering, he poured out a liquid offering, and he sprinkled the blood of peace offerings on the altar.
  '14':
  - type: text
    content: 'Then King Ahaz removed the old bronze altar from its place in front of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple, between the entrance and the new altar, and placed it on the north side of the new altar. '
  '15':
  - type: text
    content: He told Uriah the priest, “Use the new altar
  - type: note
    content: Hebrew the great altar.
  - type: text
    content: ' for the morning sacrifices of burnt offering, the evening grain offering, the king’s burnt offering and grain offering, and the burnt offerings of all the people, as well as their grain offerings and liquid offerings. Sprinkle the blood from all the burnt offerings and sacrifices on the new altar. The bronze altar will be for my personal use only.” '
  '16':
  - type: text
    content: Uriah the priest did just as King Ahaz commanded him.
  '17':
  - type: text
    content: 'Then the king removed the side panels and basins from the portable water carts. He also removed the great bronze basin called the Sea from the backs of the bronze oxen and placed it on the stone pavement. '
  '18':
  - type: text
    content: In deference to the king of Assyria, he also removed the canopy that had been constructed inside the palace for use on the Sabbath day,
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' as well as the king’s outer entrance to the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '19':
  - type: text
    content: 'The rest of the events in Ahaz’s reign and everything he did are recorded in '
  - type: text
    content: The Book of the History of the Kings of Judah.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Ahaz was twenty years old when he became king, and he reigned in Jerusalem sixteen years. He did not do what was pleasing in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God, as his ancestor David had done. '
  '20':
  - type: text
    content: When Ahaz died, he was buried with his ancestors in the City of David. Then his son Hezekiah became the next king.
  '3':
  - type: text
    content: Instead, he followed the example of the kings of Israel, even sacrificing his own son in the fire.
  - type: note
    content: Or even making his son pass through the fire.
  - type: text
    content: ' In this way, he followed the detestable practices of the pagan nations the '
  - type: text
    content: Lord
  - type: text
    content: ' had driven from the land ahead of the Israelites. '
  '4':
  - type: text
    content: He offered sacrifices and burned incense at the pagan shrines and on the hills and under every green tree.
  '5':
  - type: text
    content: 'Then King Rezin of Aram and King Pekah of Israel came up to attack Jerusalem. They besieged Ahaz but could not conquer him. '
  '6':
  - type: text
    content: At that time the king of Edom
  - type: note
    content: As in Latin Vulgate; Hebrew reads Rezin king of Aram.
  - type: text
    content: ' recovered the town of Elath for Edom.'
  - type: note
    content: As in Latin Vulgate; Hebrew reads Aram.
  - type: text
    content: ' He drove out the people of Judah and sent Edomites'
  - type: note
    content: As in Greek version, Latin Vulgate, and an alternate reading of the Masoretic Text; the other alternate reads Arameans.
  - type: text
    content: ' to live there, as they do to this day.'
  '7':
  - type: text
    content: 'King Ahaz sent messengers to King Tiglath-pileser of Assyria with this message: “I am your servant and your vassal.'
  - type: note
    content: Hebrew your son.
  - type: text
    content: ' Come up and rescue me from the attacking armies of Aram and Israel.” '
  '8':
  - type: text
    content: 'Then Ahaz took the silver and gold from the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the palace treasury and sent it as a payment to the Assyrian king. '
  '9':
  - type: text
    content: So the king of Assyria attacked the Aramean capital of Damascus and led its population away as captives, resettling them in Kir. He also killed King Rezin.
