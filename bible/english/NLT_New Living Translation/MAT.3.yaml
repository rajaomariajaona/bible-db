document_id: MAT.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: John the Baptist Prepares the Way
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'In those days John the Baptist came to the Judean wilderness and began preaching. His message was, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Even now the ax of God’s judgment is poised, ready to sever the roots of the trees. Yes, every tree that does not produce good fruit will be chopped down and thrown into the fire.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I baptize with
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in.
      marker-yv: yv-n
    - type: text
      text: ' water those who repent of their sins and turn to God. But someone is coming soon who is greater than I am—so much greater that I’m not worthy even to be his slave and carry his sandals. He will baptize you with the Holy Spirit and with fire.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in the Holy Spirit and in fire.
      marker-yv: yv-n
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He is ready to separate the chaff from the wheat with his winnowing fork. Then he will clean up the threshing area, gathering the wheat into his barn but burning the chaff with never-ending fire.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Baptism of Jesus
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Jesus went from Galilee to the Jordan River to be baptized by John. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But John tried to talk him out of it. “I am the one who needs to be baptized by you,” he said, “so why are you coming to me?”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It should be done, for we must carry out all that God requires.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for we must fulfill all righteousness.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
    - type: text
      text: ' So John agreed to baptize him.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After his baptism, as Jesus came up out of the water, the heavens were opened
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: opened to him.
      marker-yv: yv-n
    - type: text
      text: ' and he saw the Spirit of God descending like a dove and settling on him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And a voice from heaven said, “This is my dearly loved Son, who brings me great joy.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “Repent of your sins and turn to God, for the Kingdom of Heaven is near.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'has come, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: is coming soon.
      marker-yv: yv-n
    - type: text
      text: '” '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The prophet Isaiah was speaking about John when he said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He is a voice shouting in the wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Prepare the way for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s coming!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Clear the road for him!’”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 40:3 (Greek version).
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'John’s clothes were woven from coarse camel hair, and he wore a leather belt around his waist. For food he ate locusts and wild honey. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'People from Jerusalem and from all of Judea and all over the Jordan Valley went out to see and hear John. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when they confessed their sins, he baptized them in the Jordan River.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when he saw many Pharisees and Sadducees coming to watch him baptize,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: coming to be baptized.
      marker-yv: yv-n
    - type: text
      text: ' he denounced them. “You brood of snakes!” he exclaimed. “Who warned you to flee the coming wrath? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prove by the way you live that you have repented of your sins and turned to God. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Don’t just say to each other, ‘We’re safe, for we are descendants of Abraham.’ That means nothing, for I tell you, God can create children of Abraham from these very stones. '
