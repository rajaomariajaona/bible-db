document_id: MAT.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptist Prepares the Way
  - type: text
    content: 'In those days John the Baptist came to the Judean wilderness and began preaching. His message was, '
  '10':
  - type: text
    content: Even now the ax of God’s judgment is poised, ready to sever the roots of the trees. Yes, every tree that does not produce good fruit will be chopped down and thrown into the fire.
  '11':
  - type: text
    content: “I baptize with
  - type: note
    content: Or in.
  - type: text
    content: ' water those who repent of their sins and turn to God. But someone is coming soon who is greater than I am—so much greater that I’m not worthy even to be his slave and carry his sandals. He will baptize you with the Holy Spirit and with fire.'
  - type: note
    content: Or in the Holy Spirit and in fire.
  - type: text
    content: ' '
  '12':
  - type: text
    content: He is ready to separate the chaff from the wheat with his winnowing fork. Then he will clean up the threshing area, gathering the wheat into his barn but burning the chaff with never-ending fire.”
  - type: heading
    content: The Baptism of Jesus
  '13':
  - type: text
    content: 'Then Jesus went from Galilee to the Jordan River to be baptized by John. '
  '14':
  - type: text
    content: But John tried to talk him out of it. “I am the one who needs to be baptized by you,” he said, “so why are you coming to me?”
  '15':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “It should be done, for we must carry out all that God requires.
  - type: note
    content: Or for we must fulfill all righteousness.
  - type: text
    content: ”
  - type: text
    content: ' So John agreed to baptize him.'
  '16':
  - type: text
    content: After his baptism, as Jesus came up out of the water, the heavens were opened
  - type: note
    content: Some manuscripts read opened to him.
  - type: text
    content: ' and he saw the Spirit of God descending like a dove and settling on him. '
  '17':
  - type: text
    content: And a voice from heaven said, “This is my dearly loved Son, who brings me great joy.”
  '2':
  - type: text
    content: “Repent of your sins and turn to God, for the Kingdom of Heaven is near.
  - type: note
    content: Or has come, or is coming soon.
  - type: text
    content: '” '
  '3':
  - type: text
    content: The prophet Isaiah was speaking about John when he said,
  - type: text
    content: “He is a voice shouting in the wilderness,
  - type: text
    content: '‘Prepare the way for the '
  - type: text
    content: Lord
  - type: text
    content: ’s coming!
  - type: text
    content: Clear the road for him!’”
  - type: note
    content: Isa 40:3 (Greek version).
  '4':
  - type: text
    content: 'John’s clothes were woven from coarse camel hair, and he wore a leather belt around his waist. For food he ate locusts and wild honey. '
  '5':
  - type: text
    content: 'People from Jerusalem and from all of Judea and all over the Jordan Valley went out to see and hear John. '
  '6':
  - type: text
    content: And when they confessed their sins, he baptized them in the Jordan River.
  '7':
  - type: text
    content: But when he saw many Pharisees and Sadducees coming to watch him baptize,
  - type: note
    content: Or coming to be baptized.
  - type: text
    content: ' he denounced them. “You brood of snakes!” he exclaimed. “Who warned you to flee the coming wrath? '
  '8':
  - type: text
    content: 'Prove by the way you live that you have repented of your sins and turned to God. '
  '9':
  - type: text
    content: 'Don’t just say to each other, ‘We’re safe, for we are descendants of Abraham.’ That means nothing, for I tell you, God can create children of Abraham from these very stones. '
