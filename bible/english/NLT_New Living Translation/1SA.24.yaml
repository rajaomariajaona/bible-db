document_id: 1SA.24,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David Spares Saul’s Life
  - type: text
    content: ' '
  - type: note
    content: Verses 24:1-22 are numbered 24:2-23 in Hebrew text.
  - type: text
    content: 'After Saul returned from fighting the Philistines, he was told that David had gone into the wilderness of En-gedi. '
  '10':
  - type: text
    content: 'This very day you can see with your own eyes it isn’t true. For the '
  - type: text
    content: Lord
  - type: text
    content: ' placed you at my mercy back there in the cave. Some of my men told me to kill you, but I spared you. For I said, ‘I will never harm the king—he is the '
  - type: text
    content: Lord
  - type: text
    content: '’s anointed one.’ '
  '11':
  - type: text
    content: Look, my father, at what I have in my hand. It is a piece of the hem of your robe! I cut it off, but I didn’t kill you. This proves that I am not trying to harm you and that I have not sinned against you, even though you have been hunting for me to kill me.
  '12':
  - type: text
    content: '“May the '
  - type: text
    content: Lord
  - type: text
    content: ' judge between us. Perhaps the '
  - type: text
    content: Lord
  - type: text
    content: ' will punish you for what you are trying to do to me, but I will never harm you. '
  '13':
  - type: text
    content: 'As that old proverb says, ‘From evil people come evil deeds.’ So you can be sure I will never harm you. '
  '14':
  - type: text
    content: 'Who is the king of Israel trying to catch anyway? Should he spend his time chasing one who is as worthless as a dead dog or a single flea? '
  '15':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' therefore judge which of us is right and punish the guilty one. He is my advocate, and he will rescue me from your power!”'
  '16':
  - type: text
    content: 'When David had finished speaking, Saul called back, “Is that really you, my son David?” Then he began to cry. '
  '17':
  - type: text
    content: 'And he said to David, “You are a better man than I am, for you have repaid me good for evil. '
  '18':
  - type: text
    content: 'Yes, you have been amazingly kind to me today, for when the '
  - type: text
    content: Lord
  - type: text
    content: ' put me in a place where you could have killed me, you didn’t do it. '
  '19':
  - type: text
    content: 'Who else would let his enemy get away when he had him in his power? May the '
  - type: text
    content: Lord
  - type: text
    content: ' reward you well for the kindness you have shown me today. '
  '2':
  - type: text
    content: So Saul chose 3,000 elite troops from all Israel and went to search for David and his men near the rocks of the wild goats.
  '20':
  - type: text
    content: 'And now I realize that you are surely going to be king, and that the kingdom of Israel will flourish under your rule. '
  '21':
  - type: text
    content: 'Now swear to me by the '
  - type: text
    content: Lord
  - type: text
    content: ' that when that happens you will not kill my family and destroy my line of descendants!”'
  '22':
  - type: text
    content: So David promised this to Saul with an oath. Then Saul went home, but David and his men went back to their stronghold.
  '3':
  - type: text
    content: At the place where the road passes some sheepfolds, Saul went into a cave to relieve himself. But as it happened, David and his men were hiding farther back in that very cave!
  '4':
  - type: text
    content: '“Now’s your opportunity!” David’s men whispered to him. “Today the '
  - type: text
    content: Lord
  - type: text
    content: ' is telling you, ‘I will certainly put your enemy into your power, to do with as you wish.’” So David crept forward and cut off a piece of the hem of Saul’s robe.'
  '5':
  - type: text
    content: 'But then David’s conscience began bothering him because he had cut Saul’s robe. '
  '6':
  - type: text
    content: 'He said to his men, “The '
  - type: text
    content: Lord
  - type: text
    content: ' forbid that I should do this to my lord the king. I shouldn’t attack the '
  - type: text
    content: Lord
  - type: text
    content: '’s anointed one, for the '
  - type: text
    content: 'Lord '
  - type: text
    content: 'himself has chosen him.” '
  '7':
  - type: text
    content: So David restrained his men and did not let them kill Saul.
  - type: text
    content: 'After Saul had left the cave and gone on his way, '
  '8':
  - type: text
    content: David came out and shouted after him, “My lord the king!” And when Saul looked around, David bowed low before him.
  '9':
  - type: text
    content: 'Then he shouted to Saul, “Why do you listen to the people who say I am trying to harm you? '
