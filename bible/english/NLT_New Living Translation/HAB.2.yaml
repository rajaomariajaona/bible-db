document_id: HAB.2,116
type_code: eng
verses:
  '1':
  - type: text
    content: I will climb up to my watchtower
  - type: text
    content: and stand at my guardpost.
  - type: text
    content: 'There I will wait to see what the '
  - type: text
    content: Lord
  - type: text
    content: ' says'
  - type: text
    content: and how he
  - type: note
    content: As in Syriac version; Hebrew reads I.
  - type: text
    content: ' will answer my complaint.'
  - type: heading
    content: The Lord’s Second Reply
  '10':
  - type: text
    content: But by the murders you committed,
  - type: text
    content: you have shamed your name and forfeited your lives.
  '11':
  - type: text
    content: The very stones in the walls cry out against you,
  - type: text
    content: and the beams in the ceilings echo the complaint.
  '12':
  - type: text
    content: “What sorrow awaits you who build cities
  - type: text
    content: with money gained through murder and corruption!
  '13':
  - type: text
    content: 'Has not the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies promised'
  - type: text
    content: that the wealth of nations will turn to ashes?
  - type: text
    content: They work so hard,
  - type: text
    content: but all in vain!
  '14':
  - type: text
    content: For as the waters fill the sea,
  - type: text
    content: the earth will be filled with an awareness
  - type: text
    content: 'of the glory of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: “What sorrow awaits you who make your neighbors drunk!
  - type: text
    content: You force your cup on them
  - type: text
    content: so you can gloat over their shameful nakedness.
  '16':
  - type: text
    content: But soon it will be your turn to be disgraced.
  - type: text
    content: Come, drink and be exposed!
  - type: note
    content: Dead Sea Scrolls and Greek and Syriac versions read and stagger!
  - type: text
    content: 'Drink from the cup of the '
  - type: text
    content: Lord
  - type: text
    content: ’s judgment,
  - type: text
    content: and all your glory will be turned to shame.
  '17':
  - type: text
    content: You cut down the forests of Lebanon.
  - type: text
    content: Now you will be cut down.
  - type: text
    content: You destroyed the wild animals,
  - type: text
    content: so now their terror will be yours.
  - type: text
    content: You committed murder throughout the countryside
  - type: text
    content: and filled the towns with violence.
  '18':
  - type: text
    content: “What good is an idol carved by man,
  - type: text
    content: or a cast image that deceives you?
  - type: text
    content: How foolish to trust in your own creation—
  - type: text
    content: a god that can’t even talk!
  '19':
  - type: text
    content: What sorrow awaits you who say to wooden idols,
  - type: text
    content: ‘Wake up and save us!’
  - type: text
    content: To speechless stone images you say,
  - type: text
    content: ‘Rise up and teach us!’
  - type: text
    content: Can an idol tell you what to do?
  - type: text
    content: They may be overlaid with gold and silver,
  - type: text
    content: but they are lifeless inside.
  '2':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me,'
  - type: text
    content: “Write my answer plainly on tablets,
  - type: text
    content: so that a runner can carry the correct message to others.
  '20':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' is in his holy Temple.'
  - type: text
    content: Let all the earth be silent before him.”
  '3':
  - type: text
    content: This vision is for a future time.
  - type: text
    content: It describes the end, and it will be fulfilled.
  - type: text
    content: If it seems slow in coming, wait patiently,
  - type: text
    content: for it will surely take place.
  - type: text
    content: It will not be delayed.
  '4':
  - type: text
    content: “Look at the proud!
  - type: text
    content: They trust in themselves, and their lives are crooked.
  - type: text
    content: But the righteous will live by their faithfulness to God.
  - type: note
    content: Greek version reads If the vision is delayed, wait patiently, / for it will surely come and not delay. / 4I will take no pleasure in anyone who turns away. / But the righteous person will live by my faith. Compare Rom 1:17; Gal 3:11; Heb 10:37-38.
  '5':
  - type: text
    content: Wealth
  - type: note
    content: As in Dead Sea Scroll 1QpHab; other Hebrew manuscripts read Wine.
  - type: text
    content: ' is treacherous,'
  - type: text
    content: and the arrogant are never at rest.
  - type: text
    content: They open their mouths as wide as the grave,
  - type: note
    content: Hebrew as Sheol.
  - type: text
    content: and like death, they are never satisfied.
  - type: text
    content: In their greed they have gathered up many nations
  - type: text
    content: and swallowed many peoples.
  '6':
  - type: text
    content: “But soon their captives will taunt them.
  - type: text
    content: They will mock them, saying,
  - type: text
    content: ‘What sorrow awaits you thieves!
  - type: text
    content: Now you will get what you deserve!
  - type: text
    content: You’ve become rich by extortion,
  - type: text
    content: but how much longer can this go on?’
  '7':
  - type: text
    content: Suddenly, your debtors will take action.
  - type: text
    content: They will turn on you and take all you have,
  - type: text
    content: while you stand trembling and helpless.
  '8':
  - type: text
    content: Because you have plundered many nations,
  - type: text
    content: now all the survivors will plunder you.
  - type: text
    content: You committed murder throughout the countryside
  - type: text
    content: and filled the towns with violence.
  '9':
  - type: text
    content: “What sorrow awaits you who build big houses
  - type: text
    content: with money gained dishonestly!
  - type: text
    content: You believe your wealth will buy security,
  - type: text
    content: putting your family’s nest beyond the reach of danger.
