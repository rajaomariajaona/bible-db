document_id: HAB.2
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I will climb up to my watchtower
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stand at my guardpost.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'There I will wait to see what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and how he
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Syriac version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: I.
    marker-yv: yv-n
  - type: text
    text: ' will answer my complaint.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Second Reply
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Write my answer plainly on tablets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that a runner can carry the correct message to others.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: This vision is for a future time.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It describes the end, and it will be fulfilled.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If it seems slow in coming, wait patiently,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for it will surely take place.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It will not be delayed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Look at the proud!
- type: usfm
  marker: q2
  children:
  - type: text
    text: They trust in themselves, and their lives are crooked.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the righteous will live by their faithfulness to God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:3b-4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'If the vision is delayed, wait patiently, / for it will surely come and not delay. / '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'I will take no pleasure in anyone who turns away. / But the righteous person will live by my faith. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Rom 1:17; Gal 3:11; Heb 10:37-38.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Wealth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:5a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Dead Sea Scroll 1QpHab; other Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Wine.
    marker-yv: yv-n
  - type: text
    text: ' is treacherous,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the arrogant are never at rest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They open their mouths as wide as the grave,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:5b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: as Sheol.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and like death, they are never satisfied.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In their greed they have gathered up many nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: and swallowed many peoples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “But soon their captives will taunt them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will mock them, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘What sorrow awaits you thieves!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Now you will get what you deserve!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve become rich by extortion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but how much longer can this go on?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Suddenly, your debtors will take action.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will turn on you and take all you have,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while you stand trembling and helpless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Because you have plundered many nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: now all the survivors will plunder you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You committed murder throughout the countryside
- type: usfm
  marker: q2
  children:
  - type: text
    text: and filled the towns with violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “What sorrow awaits you who build big houses
- type: usfm
  marker: q2
  children:
  - type: text
    text: with money gained dishonestly!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You believe your wealth will buy security,
- type: usfm
  marker: q2
  children:
  - type: text
    text: putting your family’s nest beyond the reach of danger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But by the murders you committed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have shamed your name and forfeited your lives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The very stones in the walls cry out against you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the beams in the ceilings echo the complaint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “What sorrow awaits you who build cities
- type: usfm
  marker: q2
  children:
  - type: text
    text: with money gained through murder and corruption!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Has not the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies promised'
- type: usfm
  marker: q2
  children:
  - type: text
    text: that the wealth of nations will turn to ashes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: They work so hard,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but all in vain!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For as the waters fill the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the earth will be filled with an awareness
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'of the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “What sorrow awaits you who make your neighbors drunk!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You force your cup on them
- type: usfm
  marker: q2
  children:
  - type: text
    text: so you can gloat over their shameful nakedness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But soon it will be your turn to be disgraced.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Come, drink and be exposed!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dead Sea Scrolls and Greek and Syriac versions read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and stagger!
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Drink from the cup of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s judgment,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all your glory will be turned to shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: You cut down the forests of Lebanon.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Now you will be cut down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You destroyed the wild animals,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so now their terror will be yours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You committed murder throughout the countryside
- type: usfm
  marker: q2
  children:
  - type: text
    text: and filled the towns with violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “What good is an idol carved by man,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or a cast image that deceives you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How foolish to trust in your own creation—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a god that can’t even talk!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: What sorrow awaits you who say to wooden idols,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Wake up and save us!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: To speechless stone images you say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Rise up and teach us!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can an idol tell you what to do?
- type: usfm
  marker: q1
  children:
  - type: text
    text: They may be overlaid with gold and silver,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they are lifeless inside.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is in his holy Temple.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let all the earth be silent before him.”
