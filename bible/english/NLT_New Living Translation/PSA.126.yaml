document_id: PSA.126,116
type_code: eng
verses:
  '1':
  - type: text
    content: A song for pilgrims ascending to Jerusalem.
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' brought back his exiles to Jerusalem,'
  - type: note
    content: Hebrew Zion.
  - type: text
    content: it was like a dream!
  '2':
  - type: text
    content: We were filled with laughter,
  - type: text
    content: and we sang for joy.
  - type: text
    content: And the other nations said,
  - type: text
    content: '“What amazing things the '
  - type: text
    content: Lord
  - type: text
    content: ' has done for them.”'
  '3':
  - type: text
    content: 'Yes, the '
  - type: text
    content: Lord
  - type: text
    content: ' has done amazing things for us!'
  - type: text
    content: What joy!
  '4':
  - type: text
    content: 'Restore our fortunes, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: as streams renew the desert.
  '5':
  - type: text
    content: Those who plant in tears
  - type: text
    content: will harvest with shouts of joy.
  '6':
  - type: text
    content: They weep as they go to plant their seed,
  - type: text
    content: but they sing as they return with the harvest.
