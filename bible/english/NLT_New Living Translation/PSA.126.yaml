document_id: PSA.126,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song for pilgrims ascending to Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought back his exiles to Jerusalem,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '126:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zion.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it was like a dream!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We were filled with laughter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and we sang for joy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the other nations said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“What amazing things the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done for them.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done amazing things for us!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What joy!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Restore our fortunes, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as streams renew the desert.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who plant in tears
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will harvest with shouts of joy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They weep as they go to plant their seed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they sing as they return with the harvest.
