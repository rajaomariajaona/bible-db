document_id: MAT.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Do Not Judge Others
  - type: text
    content: ' '
  - type: text
    content: “Do not judge others, and you will not be judged.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Or if they ask for a fish, do you give them a snake? Of course not!
  - type: text
    content: ' '
  '11':
  - type: text
    content: So if you sinful people know how to give good gifts to your children, how much more will your heavenly Father give good gifts to those who ask him.
  - type: heading
    content: The Golden Rule
  '12':
  - type: text
    content: ' '
  - type: text
    content: “Do to others whatever you would like them to do to you. This is the essence of all that is taught in the law and the prophets.
  - type: heading
    content: The Narrow Gate
  '13':
  - type: text
    content: ' '
  - type: text
    content: “You can enter God’s Kingdom only through the narrow gate. The highway to hell
  - type: text
    content: ' '
  - type: note
    content: Greek The road that leads to destruction.
  - type: text
    content: is broad, and its gate is wide for the many who choose that way.
  - type: text
    content: ' '
  '14':
  - type: text
    content: But the gateway to life is very narrow and the road is difficult, and only a few ever find it.
  - type: heading
    content: The Tree and Its Fruit
  '15':
  - type: text
    content: ' '
  - type: text
    content: “Beware of false prophets who come disguised as harmless sheep but are really vicious wolves.
  - type: text
    content: ' '
  '16':
  - type: text
    content: You can identify them by their fruit, that is, by the way they act. Can you pick grapes from thornbushes, or figs from thistles?
  - type: text
    content: ' '
  '17':
  - type: text
    content: A good tree produces good fruit, and a bad tree produces bad fruit.
  - type: text
    content: ' '
  '18':
  - type: text
    content: A good tree can’t produce bad fruit, and a bad tree can’t produce good fruit.
  - type: text
    content: ' '
  '19':
  - type: text
    content: So every tree that does not produce good fruit is chopped down and thrown into the fire.
  - type: text
    content: ' '
  '2':
  - type: text
    content: For you will be treated as you treat others.
  - type: note
    content: Or For God will judge you as you judge others.
  - type: text
    content: ' '
  - type: text
    content: The standard you use in judging is the standard by which you will be judged.
  - type: note
    content: Or The measure you give will be the measure you get back.
  '20':
  - type: text
    content: Yes, just as you can identify a tree by its fruit, so you can identify people by their actions.
  - type: heading
    content: True Disciples
  '21':
  - type: text
    content: ' '
  - type: text
    content: “Not everyone who calls out to me, ‘Lord! Lord!’ will enter the Kingdom of Heaven. Only those who actually do the will of my Father in heaven will enter.
  - type: text
    content: ' '
  '22':
  - type: text
    content: On judgment day many will say to me, ‘Lord! Lord! We prophesied in your name and cast out demons in your name and performed many miracles in your name.’
  - type: text
    content: ' '
  '23':
  - type: text
    content: But I will reply, ‘I never knew you. Get away from me, you who break God’s laws.’
  - type: heading
    content: Building on a Solid Foundation
  '24':
  - type: text
    content: ' '
  - type: text
    content: “Anyone who listens to my teaching and follows it is wise, like a person who builds a house on solid rock.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Though the rain comes in torrents and the floodwaters rise and the winds beat against that house, it won’t collapse because it is built on bedrock.
  - type: text
    content: ' '
  '26':
  - type: text
    content: But anyone who hears my teaching and doesn’t obey it is foolish, like a person who builds a house on sand.
  - type: text
    content: ' '
  '27':
  - type: text
    content: When the rains and floods come and the winds beat against that house, it will collapse with a mighty crash.”
  '28':
  - type: text
    content: 'When Jesus had finished saying these things, the crowds were amazed at his teaching, '
  '29':
  - type: text
    content: for he taught with real authority—quite unlike their teachers of religious law.
  '3':
  - type: text
    content: ' '
  - type: text
    content: “And why worry about a speck in your friend’s eye
  - type: text
    content: ' '
  - type: note
    content: Greek your brother’s eye; also in 7:5.
  - type: text
    content: when you have a log in your own?
  - type: text
    content: ' '
  '4':
  - type: text
    content: How can you think of saying to your friend,
  - type: note
    content: Greek your brother.
  - type: text
    content: ' '
  - type: text
    content: ‘Let me help you get rid of that speck in your eye,’ when you can’t see past the log in your own eye?
  - type: text
    content: ' '
  '5':
  - type: text
    content: Hypocrite! First get rid of the log in your own eye; then you will see well enough to deal with the speck in your friend’s eye.
  '6':
  - type: text
    content: ' '
  - type: text
    content: “Don’t waste what is holy on people who are unholy.
  - type: text
    content: ' '
  - type: note
    content: Greek Don’t give the sacred to dogs.
  - type: text
    content: Don’t throw your pearls to pigs! They will trample the pearls, then turn and attack you.
  - type: heading
    content: Effective Prayer
  '7':
  - type: text
    content: ' '
  - type: text
    content: “Keep on asking, and you will receive what you ask for. Keep on seeking, and you will find. Keep on knocking, and the door will be opened to you.
  - type: text
    content: ' '
  '8':
  - type: text
    content: For everyone who asks, receives. Everyone who seeks, finds. And to everyone who knocks, the door will be opened.
  '9':
  - type: text
    content: ' '
  - type: text
    content: “You parents—if your children ask for a loaf of bread, do you give them a stone instead?
  - type: text
    content: ' '
