document_id: PSA.86,116
type_code: eng
verses:
  '1':
  - type: text
    content: A prayer of David.
  - type: text
    content: 'Bend down, O '
  - type: text
    content: Lord
  - type: text
    content: ', and hear my prayer;'
  - type: text
    content: answer me, for I need your help.
  '10':
  - type: text
    content: For you are great and perform wonderful deeds.
  - type: text
    content: You alone are God.
  '11':
  - type: text
    content: 'Teach me your ways, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: that I may live according to your truth!
  - type: text
    content: Grant me purity of heart,
  - type: text
    content: so that I may honor you.
  '12':
  - type: text
    content: With all my heart I will praise you, O Lord my God.
  - type: text
    content: I will give glory to your name forever,
  '13':
  - type: text
    content: for your love for me is very great.
  - type: text
    content: You have rescued me from the depths of death.
  - type: note
    content: Hebrew of Sheol.
  '14':
  - type: text
    content: O God, insolent people rise up against me;
  - type: text
    content: a violent gang is trying to kill me.
  - type: text
    content: You mean nothing to them.
  '15':
  - type: text
    content: But you, O Lord,
  - type: text
    content: are a God of compassion and mercy,
  - type: text
    content: slow to get angry
  - type: text
    content: and filled with unfailing love and faithfulness.
  '16':
  - type: text
    content: Look down and have mercy on me.
  - type: text
    content: Give your strength to your servant;
  - type: text
    content: save me, the son of your servant.
  '17':
  - type: text
    content: Send me a sign of your favor.
  - type: text
    content: Then those who hate me will be put to shame,
  - type: text
    content: 'for you, O '
  - type: text
    content: Lord
  - type: text
    content: ', help and comfort me.'
  '2':
  - type: text
    content: Protect me, for I am devoted to you.
  - type: text
    content: Save me, for I serve you and trust you.
  - type: text
    content: You are my God.
  '3':
  - type: text
    content: Be merciful to me, O Lord,
  - type: text
    content: for I am calling on you constantly.
  '4':
  - type: text
    content: Give me happiness, O Lord,
  - type: text
    content: for I give myself to you.
  '5':
  - type: text
    content: O Lord, you are so good, so ready to forgive,
  - type: text
    content: so full of unfailing love for all who ask for your help.
  '6':
  - type: text
    content: 'Listen closely to my prayer, O '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: hear my urgent cry.
  '7':
  - type: text
    content: I will call to you whenever I’m in trouble,
  - type: text
    content: and you will answer me.
  '8':
  - type: text
    content: No pagan god is like you, O Lord.
  - type: text
    content: None can do what you do!
  '9':
  - type: text
    content: All the nations you made
  - type: text
    content: will come and bow before you, Lord;
  - type: text
    content: they will praise your holy name.
