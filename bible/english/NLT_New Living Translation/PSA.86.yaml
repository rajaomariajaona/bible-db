document_id: PSA.86,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A prayer of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bend down, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and hear my prayer;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: answer me, for I need your help.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you are great and perform wonderful deeds.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You alone are God.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Teach me your ways, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I may live according to your truth!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Grant me purity of heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that I may honor you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With all my heart I will praise you, O Lord my God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will give glory to your name forever,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your love for me is very great.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have rescued me from the depths of death.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '86:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of Sheol.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, insolent people rise up against me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a violent gang is trying to kill me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You mean nothing to them.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you, O Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are a God of compassion and mercy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: slow to get angry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and filled with unfailing love and faithfulness.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look down and have mercy on me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Give your strength to your servant;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: save me, the son of your servant.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Send me a sign of your favor.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then those who hate me will be put to shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for you, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', help and comfort me.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protect me, for I am devoted to you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Save me, for I serve you and trust you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are my God.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be merciful to me, O Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I am calling on you constantly.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give me happiness, O Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I give myself to you.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Lord, you are so good, so ready to forgive,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so full of unfailing love for all who ask for your help.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen closely to my prayer, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hear my urgent cry.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will call to you whenever I’m in trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will answer me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No pagan god is like you, O Lord.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: None can do what you do!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the nations you made
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will come and bow before you, Lord;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will praise your holy name.
