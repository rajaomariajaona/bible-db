document_id: NUM.32,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tribes East of the Jordan
  - type: text
    content: 'The tribes of Reuben and Gad owned vast numbers of livestock. So when they saw that the lands of Jazer and Gilead were ideally suited for their flocks and herds, '
  '10':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' was very angry with them, and he vowed, '
  '11':
  - type: text
    content: '‘Of all those I rescued from Egypt, no one who is twenty years old or older will ever see the land I swore to give to Abraham, Isaac, and Jacob, for they have not obeyed me wholeheartedly. '
  '12':
  - type: text
    content: 'The only exceptions are Caleb son of Jephunneh the Kenizzite and Joshua son of Nun, for they have wholeheartedly followed the '
  - type: text
    content: Lord
  - type: text
    content: .’
  '13':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' was angry with Israel and made them wander in the wilderness for forty years until the entire generation that sinned in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight had died. '
  '14':
  - type: text
    content: 'But here you are, a brood of sinners, doing exactly the same thing! You are making the '
  - type: text
    content: Lord
  - type: text
    content: ' even angrier with Israel. '
  '15':
  - type: text
    content: If you turn away from him like this and he abandons them again in the wilderness, you will be responsible for destroying this entire nation!”
  '16':
  - type: text
    content: 'But they approached Moses and said, “We simply want to build pens for our livestock and fortified towns for our wives and children. '
  '17':
  - type: text
    content: 'Then we will arm ourselves and lead our fellow Israelites into battle until we have brought them safely to their land. Meanwhile, our families will stay in the fortified towns we build here, so they will be safe from any attacks by the local people. '
  '18':
  - type: text
    content: 'We will not return to our homes until all the people of Israel have received their portions of land. '
  '19':
  - type: text
    content: But we do not claim any of the land on the other side of the Jordan. We would rather live here on the east side and accept this as our grant of land.”
  '2':
  - type: text
    content: 'they came to Moses, Eleazar the priest, and the other leaders of the community. They said, '
  '20':
  - type: text
    content: 'Then Moses said, “If you keep your word and arm yourselves for the '
  - type: text
    content: Lord
  - type: text
    content: '’s battles, '
  '21':
  - type: text
    content: 'and if your troops cross the Jordan and keep fighting until the '
  - type: text
    content: Lord
  - type: text
    content: ' has driven out his enemies, '
  '22':
  - type: text
    content: 'then you may return when the '
  - type: text
    content: Lord
  - type: text
    content: ' has conquered the land. You will have fulfilled your duty to the '
  - type: text
    content: Lord
  - type: text
    content: ' and to the rest of the people of Israel. And the land on the east side of the Jordan will be your property from the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'But if you fail to keep your word, then you will have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ', and you may be sure that your sin will find you out. '
  '24':
  - type: text
    content: Go ahead and build towns for your families and pens for your flocks, but do everything you have promised.”
  '25':
  - type: text
    content: 'Then the men of Gad and Reuben replied, “We, your servants, will follow your instructions exactly. '
  '26':
  - type: text
    content: 'Our children, wives, flocks, and cattle will stay here in the towns of Gilead. '
  '27':
  - type: text
    content: 'But all who are able to bear arms will cross over to fight for the '
  - type: text
    content: Lord
  - type: text
    content: ', just as you have said.”'
  '28':
  - type: text
    content: 'So Moses gave orders to Eleazar the priest, Joshua son of Nun, and the leaders of the clans of Israel. '
  '29':
  - type: text
    content: 'He said, “The men of Gad and Reuben who are armed for battle must cross the Jordan with you to fight for the '
  - type: text
    content: Lord
  - type: text
    content: '. If they do, give them the land of Gilead as their property when the land is conquered. '
  '3':
  - type: text
    content: “Notice the towns of Ataroth, Dibon, Jazer, Nimrah, Heshbon, Elealeh, Sibmah,
  - type: note
    content: As in Samaritan Pentateuch and Greek version (see also 32:38); Hebrew reads Sebam.
  - type: text
    content: ' Nebo, and Beon. '
  '30':
  - type: text
    content: But if they refuse to arm themselves and cross over with you, then they must accept land with the rest of you in the land of Canaan.”
  '31':
  - type: text
    content: 'The tribes of Gad and Reuben said again, “We are your servants, and we will do as the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded! '
  '32':
  - type: text
    content: 'We will cross the Jordan into Canaan fully armed to fight for the '
  - type: text
    content: Lord
  - type: text
    content: ', but our property will be here on this side of the Jordan.”'
  '33':
  - type: text
    content: So Moses assigned land to the tribes of Gad, Reuben, and half the tribe of Manasseh son of Joseph. He gave them the territory of King Sihon of the Amorites and the land of King Og of Bashan—the whole land with its cities and surrounding lands.
  '34':
  - type: text
    content: 'The descendants of Gad built the towns of Dibon, Ataroth, Aroer, '
  '35':
  - type: text
    content: 'Atroth-shophan, Jazer, Jogbehah, '
  '36':
  - type: text
    content: Beth-nimrah, and Beth-haran. These were all fortified towns with pens for their flocks.
  '37':
  - type: text
    content: 'The descendants of Reuben built the towns of Heshbon, Elealeh, Kiriathaim, '
  '38':
  - type: text
    content: Nebo, Baal-meon, and Sibmah. They changed the names of some of the towns they conquered and rebuilt.
  '39':
  - type: text
    content: 'Then the descendants of Makir of the tribe of Manasseh went to Gilead and conquered it, and they drove out the Amorites living there. '
  '4':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has conquered this whole area for the community of Israel, and it is ideally suited for all our livestock. '
  '40':
  - type: text
    content: 'So Moses gave Gilead to the Makirites, descendants of Manasseh, and they settled there. '
  '41':
  - type: text
    content: The people of Jair, another clan of the tribe of Manasseh, captured many of the towns in Gilead and changed the name of that region to the Towns of Jair.
  - type: note
    content: Hebrew Havvoth-jair.
  - type: text
    content: ' '
  '42':
  - type: text
    content: Meanwhile, a man named Nobah captured the town of Kenath and its surrounding villages, and he renamed that area Nobah after himself.
  '5':
  - type: text
    content: If we have found favor with you, please let us have this land as our property instead of giving us land across the Jordan River.”
  '6':
  - type: text
    content: '“Do you intend to stay here while your brothers go across and do all the fighting?” Moses asked the men of Gad and Reuben. '
  '7':
  - type: text
    content: '“Why do you want to discourage the rest of the people of Israel from going across to the land the '
  - type: text
    content: Lord
  - type: text
    content: ' has given them? '
  '8':
  - type: text
    content: 'Your ancestors did the same thing when I sent them from Kadesh-barnea to explore the land. '
  '9':
  - type: text
    content: 'After they went up to the valley of Eshcol and explored the land, they discouraged the people of Israel from entering the land the '
  - type: text
    content: Lord
  - type: text
    content: ' was giving them. '
