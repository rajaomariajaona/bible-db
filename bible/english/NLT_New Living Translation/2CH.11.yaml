document_id: 2CH.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Shemaiah’s Prophecy
  - type: text
    content: When Rehoboam arrived at Jerusalem, he mobilized the men of Judah and Benjamin—180,000 select troops—to fight against Israel and to restore the kingdom to himself.
  '10':
  - type: text
    content: 'Zorah, Aijalon, and Hebron. These became the fortified towns of Judah and Benjamin. '
  '11':
  - type: text
    content: 'Rehoboam strengthened their defenses and stationed commanders in them, and he stored supplies of food, olive oil, and wine. '
  '12':
  - type: text
    content: He also put shields and spears in these towns as a further safety measure. So only Judah and Benjamin remained under his control.
  '13':
  - type: text
    content: 'But all the priests and Levites living among the northern tribes of Israel sided with Rehoboam. '
  '14':
  - type: text
    content: 'The Levites even abandoned their pasturelands and property and moved to Judah and Jerusalem, because Jeroboam and his sons would not allow them to serve the '
  - type: text
    content: Lord
  - type: text
    content: ' as priests. '
  '15':
  - type: text
    content: 'Jeroboam appointed his own priests to serve at the pagan shrines, where they worshiped the goat and calf idols he had made. '
  '16':
  - type: text
    content: 'From all the tribes of Israel, those who sincerely wanted to worship the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, followed the Levites to Jerusalem, where they could offer sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors. '
  '17':
  - type: text
    content: This strengthened the kingdom of Judah, and for three years they supported Rehoboam son of Solomon, for during those years they faithfully followed in the footsteps of David and Solomon.
  - type: heading
    content: Rehoboam’s Family
  '18':
  - type: text
    content: 'Rehoboam married his cousin Mahalath, the daughter of David’s son Jerimoth and of Abihail, the daughter of Eliab son of Jesse. '
  '19':
  - type: text
    content: Mahalath had three sons—Jeush, Shemariah, and Zaham.
  '2':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Shemaiah, the man of God, '
  '20':
  - type: text
    content: 'Later Rehoboam married another cousin, Maacah, the granddaughter of Absalom. Maacah gave birth to Abijah, Attai, Ziza, and Shelomith. '
  '21':
  - type: text
    content: Rehoboam loved Maacah more than any of his other wives and concubines. In all, he had eighteen wives and sixty concubines, and they gave birth to twenty-eight sons and sixty daughters.
  '22':
  - type: text
    content: 'Rehoboam appointed Maacah’s son Abijah as leader among the princes, making it clear that he would be the next king. '
  '23':
  - type: text
    content: Rehoboam also wisely gave responsibilities to his other sons and stationed some of them in the fortified towns throughout the land of Judah and Benjamin. He provided them with generous provisions, and he found many wives for them.
  '3':
  - type: text
    content: '“Say to Rehoboam son of Solomon, king of Judah, and to all the Israelites in Judah and Benjamin: '
  '4':
  - type: text
    content: '‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Do not fight against your relatives. Go back home, for what has happened is my doing!’” So they obeyed the message of the '
  - type: text
    content: Lord
  - type: text
    content: ' and did not fight against Jeroboam.'
  - type: heading
    content: Rehoboam Fortifies Judah
  '5':
  - type: text
    content: 'Rehoboam remained in Jerusalem and fortified various towns for the defense of Judah. '
  '6':
  - type: text
    content: 'He built up Bethlehem, Etam, Tekoa, '
  '7':
  - type: text
    content: 'Beth-zur, Soco, Adullam, '
  '8':
  - type: text
    content: 'Gath, Mareshah, Ziph, '
  '9':
  - type: text
    content: 'Adoraim, Lachish, Azekah, '
