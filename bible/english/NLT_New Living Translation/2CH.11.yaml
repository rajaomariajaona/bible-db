document_id: 2CH.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Shemaiah’s Prophecy
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When Rehoboam arrived at Jerusalem, he mobilized the men of Judah and Benjamin—180,000 select troops—to fight against Israel and to restore the kingdom to himself.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Shemaiah, the man of God, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Say to Rehoboam son of Solomon, king of Judah, and to all the Israelites in Judah and Benjamin: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Do not fight against your relatives. Go back home, for what has happened is my doing!’” So they obeyed the message of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and did not fight against Jeroboam.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rehoboam Fortifies Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehoboam remained in Jerusalem and fortified various towns for the defense of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He built up Bethlehem, Etam, Tekoa, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Beth-zur, Soco, Adullam, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Gath, Mareshah, Ziph, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Adoraim, Lachish, Azekah, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Zorah, Aijalon, and Hebron. These became the fortified towns of Judah and Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Rehoboam strengthened their defenses and stationed commanders in them, and he stored supplies of food, olive oil, and wine. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He also put shields and spears in these towns as a further safety measure. So only Judah and Benjamin remained under his control.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But all the priests and Levites living among the northern tribes of Israel sided with Rehoboam. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The Levites even abandoned their pasturelands and property and moved to Judah and Jerusalem, because Jeroboam and his sons would not allow them to serve the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as priests. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jeroboam appointed his own priests to serve at the pagan shrines, where they worshiped the goat and calf idols he had made. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'From all the tribes of Israel, those who sincerely wanted to worship the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, followed the Levites to Jerusalem, where they could offer sacrifices to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of their ancestors. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: This strengthened the kingdom of Judah, and for three years they supported Rehoboam son of Solomon, for during those years they faithfully followed in the footsteps of David and Solomon.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rehoboam’s Family
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Rehoboam married his cousin Mahalath, the daughter of David’s son Jerimoth and of Abihail, the daughter of Eliab son of Jesse. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mahalath had three sons—Jeush, Shemariah, and Zaham.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Later Rehoboam married another cousin, Maacah, the granddaughter of Absalom. Maacah gave birth to Abijah, Attai, Ziza, and Shelomith. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Rehoboam loved Maacah more than any of his other wives and concubines. In all, he had eighteen wives and sixty concubines, and they gave birth to twenty-eight sons and sixty daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Rehoboam appointed Maacah’s son Abijah as leader among the princes, making it clear that he would be the next king. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Rehoboam also wisely gave responsibilities to his other sons and stationed some of them in the fortified towns throughout the land of Judah and Benjamin. He provided them with generous provisions, and he found many wives for them.
