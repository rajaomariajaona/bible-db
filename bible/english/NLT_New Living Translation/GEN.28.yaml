document_id: GEN.28
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So Isaac called for Jacob, blessed him, and said, “You must not marry any of these Canaanite women. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Instead, go at once to Paddan-aram, to the house of your grandfather Bethuel, and marry one of your uncle Laban’s daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: May God Almighty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: El-Shaddai.
    marker-yv: yv-n
  - type: text
    text: ' bless you and give you many children. And may your descendants multiply and become many nations! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: May God pass on to you and your descendants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'seed; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 28:13, 14.
    marker-yv: yv-n
  - type: text
    text: ' the blessings he promised to Abraham. May you own this land where you are now living as a foreigner, for God gave this land to Abraham.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So Isaac sent Jacob away, and he went to Paddan-aram to stay with his uncle Laban, his mother’s brother, the son of Bethuel the Aramean.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Esau knew that his father, Isaac, had blessed Jacob and sent him to Paddan-aram to find a wife, and that he had warned Jacob, “You must not marry a Canaanite woman.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He also knew that Jacob had obeyed his parents and gone to Paddan-aram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'It was now very clear to Esau that his father did not like the local Canaanite women. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So Esau visited his uncle Ishmael’s family and married one of Ishmael’s daughters, in addition to the wives he already had. His new wife’s name was Mahalath. She was the sister of Nebaioth and the daughter of Ishmael, Abraham’s son.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob’s Dream at Bethel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Meanwhile, Jacob left Beersheba and traveled toward Haran. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'At sundown he arrived at a good place to set up camp and stopped there for the night. Jacob found a stone to rest his head against and lay down to sleep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: As he slept, he dreamed of a stairway that reached from the earth up to heaven. And he saw the angels of God going up and down the stairway.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'At the top of the stairway stood the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and he said, “I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of your grandfather Abraham, and the God of your father, Isaac. The ground you are lying on belongs to you. I am giving it to you and your descendants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Your descendants will be as numerous as the dust of the earth! They will spread out in all directions—to the west and the east, to the north and the south. And all the families of the earth will be blessed through you and your descendants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: What’s more, I am with you, and I will protect you wherever you go. One day I will bring you back to this land. I will not leave you until I have finished giving you everything I have promised you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Jacob awoke from his sleep and said, “Surely the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is in this place, and I wasn’t even aware of it!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But he was also afraid and said, “What an awesome place this is! It is none other than the house of God, the very gateway to heaven!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The next morning Jacob got up very early. He took the stone he had rested his head against, and he set it upright as a memorial pillar. Then he poured olive oil over it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He named that place Bethel (which means “house of God”), although it was previously called Luz.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Jacob made this vow: “If God will indeed be with me and protect me on this journey, and if he will provide me with food and clothing, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and if I return safely to my father’s home, then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will certainly be my God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And this memorial pillar I have set up will become a place for worshiping God, and I will present to God a tenth of everything he gives me.”
