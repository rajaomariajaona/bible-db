document_id: ISA.41,116
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Help for Israel
  - type: text
    content: “Listen in silence before me, you lands beyond the sea.
  - type: text
    content: Bring your strongest arguments.
  - type: text
    content: Come now and speak.
  - type: text
    content: The court is ready for your case.
  '10':
  - type: text
    content: Don’t be afraid, for I am with you.
  - type: text
    content: Don’t be discouraged, for I am your God.
  - type: text
    content: I will strengthen you and help you.
  - type: text
    content: I will hold you up with my victorious right hand.
  '11':
  - type: text
    content: “See, all your angry enemies lie there,
  - type: text
    content: confused and humiliated.
  - type: text
    content: Anyone who opposes you will die
  - type: text
    content: and come to nothing.
  '12':
  - type: text
    content: You will look in vain
  - type: text
    content: for those who tried to conquer you.
  - type: text
    content: Those who attack you
  - type: text
    content: will come to nothing.
  '13':
  - type: text
    content: For I hold you by your right hand—
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  - type: text
    content: And I say to you,
  - type: text
    content: ‘Don’t be afraid. I am here to help you.
  '14':
  - type: text
    content: Though you are a lowly worm, O Jacob,
  - type: text
    content: don’t be afraid, people of Israel, for I will help you.
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ', your Redeemer.'
  - type: text
    content: I am the Holy One of Israel.’
  '15':
  - type: text
    content: You will be a new threshing instrument
  - type: text
    content: with many sharp teeth.
  - type: text
    content: You will tear your enemies apart,
  - type: text
    content: making chaff of mountains.
  '16':
  - type: text
    content: You will toss them into the air,
  - type: text
    content: and the wind will blow them all away;
  - type: text
    content: a whirlwind will scatter them.
  - type: text
    content: 'Then you will rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: You will glory in the Holy One of Israel.
  '17':
  - type: text
    content: “When the poor and needy search for water and there is none,
  - type: text
    content: and their tongues are parched from thirst,
  - type: text
    content: 'then I, the '
  - type: text
    content: Lord
  - type: text
    content: ', will answer them.'
  - type: text
    content: I, the God of Israel, will never abandon them.
  '18':
  - type: text
    content: I will open up rivers for them on the high plateaus.
  - type: text
    content: I will give them fountains of water in the valleys.
  - type: text
    content: I will fill the desert with pools of water.
  - type: text
    content: Rivers fed by springs will flow across the parched ground.
  '19':
  - type: text
    content: I will plant trees in the barren desert—
  - type: text
    content: cedar, acacia, myrtle, olive, cypress, fir, and pine.
  '2':
  - type: text
    content: “Who has stirred up this king from the east,
  - type: text
    content: rightly calling him to God’s service?
  - type: text
    content: Who gives this man victory over many nations
  - type: text
    content: and permits him to trample their kings underfoot?
  - type: text
    content: With his sword, he reduces armies to dust.
  - type: text
    content: With his bow, he scatters them like chaff before the wind.
  '20':
  - type: text
    content: I am doing this so all who see this miracle
  - type: text
    content: will understand what it means—
  - type: text
    content: 'that it is the '
  - type: text
    content: Lord
  - type: text
    content: ' who has done this,'
  - type: text
    content: the Holy One of Israel who created it.
  '21':
  - type: text
    content: “Present the case for your idols,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Let them show what they can do,”
  - type: text
    content: says the King of Israel.
  - type: note
    content: Hebrew the King of Jacob. See note on 14:1.
  '22':
  - type: text
    content: “Let them try to tell us what happened long ago
  - type: text
    content: so that we may consider the evidence.
  - type: text
    content: Or let them tell us what the future holds,
  - type: text
    content: so we can know what’s going to happen.
  '23':
  - type: text
    content: Yes, tell us what will occur in the days ahead.
  - type: text
    content: Then we will know you are gods.
  - type: text
    content: In fact, do anything—good or bad!
  - type: text
    content: Do something that will amaze and frighten us.
  '24':
  - type: text
    content: But no! You are less than nothing and can do nothing at all.
  - type: text
    content: Those who choose you pollute themselves.
  '25':
  - type: text
    content: “But I have stirred up a leader who will approach from the north.
  - type: text
    content: From the east he will call on my name.
  - type: text
    content: I will give him victory over kings and princes.
  - type: text
    content: He will trample them as a potter treads on clay.
  '26':
  - type: text
    content: “Who told you from the beginning
  - type: text
    content: that this would happen?
  - type: text
    content: Who predicted this,
  - type: text
    content: making you admit that he was right?
  - type: text
    content: No one said a word!
  '27':
  - type: text
    content: I was the first to tell Zion,
  - type: text
    content: ‘Look! Help is on the way!’
  - type: note
    content: Or ‘Look! They are coming home.’
  - type: text
    content: I will send Jerusalem a messenger with good news.
  '28':
  - type: text
    content: Not one of your idols told you this.
  - type: text
    content: Not one gave any answer when I asked.
  '29':
  - type: text
    content: See, they are all foolish, worthless things.
  - type: text
    content: All your idols are as empty as the wind.
  '3':
  - type: text
    content: He chases them away and goes on safely,
  - type: text
    content: though he is walking over unfamiliar ground.
  '4':
  - type: text
    content: Who has done such mighty deeds,
  - type: text
    content: summoning each new generation from the beginning of time?
  - type: text
    content: 'It is I, the '
  - type: text
    content: Lord
  - type: text
    content: ', the First and the Last.'
  - type: text
    content: I alone am he.”
  '5':
  - type: text
    content: The lands beyond the sea watch in fear.
  - type: text
    content: Remote lands tremble and mobilize for war.
  '6':
  - type: text
    content: The idol makers encourage one another,
  - type: text
    content: saying to each other, “Be strong!”
  '7':
  - type: text
    content: The carver encourages the goldsmith,
  - type: text
    content: and the molder helps at the anvil.
  - type: text
    content: “Good,” they say. “It’s coming along fine.”
  - type: text
    content: Carefully they join the parts together,
  - type: text
    content: then fasten the thing in place so it won’t fall over.
  '8':
  - type: text
    content: “But as for you, Israel my servant,
  - type: text
    content: Jacob my chosen one,
  - type: text
    content: descended from Abraham my friend,
  '9':
  - type: text
    content: I have called you back from the ends of the earth,
  - type: text
    content: saying, ‘You are my servant.’
  - type: text
    content: For I have chosen you
  - type: text
    content: and will not throw you away.
