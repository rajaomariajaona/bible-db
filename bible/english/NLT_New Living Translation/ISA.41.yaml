document_id: ISA.41
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Help for Israel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Listen in silence before me, you lands beyond the sea.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Bring your strongest arguments.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come now and speak.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The court is ready for your case.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Who has stirred up this king from the east,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rightly calling him to God’s service?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who gives this man victory over many nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: and permits him to trample their kings underfoot?
- type: usfm
  marker: q1
  children:
  - type: text
    text: With his sword, he reduces armies to dust.
- type: usfm
  marker: q2
  children:
  - type: text
    text: With his bow, he scatters them like chaff before the wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He chases them away and goes on safely,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though he is walking over unfamiliar ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who has done such mighty deeds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: summoning each new generation from the beginning of time?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'It is I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the First and the Last.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I alone am he.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The lands beyond the sea watch in fear.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Remote lands tremble and mobilize for war.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The idol makers encourage one another,
- type: usfm
  marker: q2
  children:
  - type: text
    text: saying to each other, “Be strong!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The carver encourages the goldsmith,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the molder helps at the anvil.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Good,” they say. “It’s coming along fine.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Carefully they join the parts together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then fasten the thing in place so it won’t fall over.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “But as for you, Israel my servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jacob my chosen one,
- type: usfm
  marker: q2
  children:
  - type: text
    text: descended from Abraham my friend,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I have called you back from the ends of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: saying, ‘You are my servant.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I have chosen you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will not throw you away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Don’t be afraid, for I am with you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t be discouraged, for I am your God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will strengthen you and help you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will hold you up with my victorious right hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “See, all your angry enemies lie there,
- type: usfm
  marker: q2
  children:
  - type: text
    text: confused and humiliated.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anyone who opposes you will die
- type: usfm
  marker: q2
  children:
  - type: text
    text: and come to nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You will look in vain
- type: usfm
  marker: q2
  children:
  - type: text
    text: for those who tried to conquer you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who attack you
- type: usfm
  marker: q2
  children:
  - type: text
    text: will come to nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For I hold you by your right hand—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I say to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Don’t be afraid. I am here to help you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Though you are a lowly worm, O Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t be afraid, people of Israel, for I will help you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', your Redeemer.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am the Holy One of Israel.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: You will be a new threshing instrument
- type: usfm
  marker: q2
  children:
  - type: text
    text: with many sharp teeth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will tear your enemies apart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: making chaff of mountains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You will toss them into the air,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the wind will blow them all away;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a whirlwind will scatter them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then you will rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: You will glory in the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “When the poor and needy search for water and there is none,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their tongues are parched from thirst,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'then I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', will answer them.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I, the God of Israel, will never abandon them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I will open up rivers for them on the high plateaus.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will give them fountains of water in the valleys.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will fill the desert with pools of water.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rivers fed by springs will flow across the parched ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I will plant trees in the barren desert—
- type: usfm
  marker: q2
  children:
  - type: text
    text: cedar, acacia, myrtle, olive, cypress, fir, and pine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I am doing this so all who see this miracle
- type: usfm
  marker: q2
  children:
  - type: text
    text: will understand what it means—
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'that it is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' who has done this,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Holy One of Israel who created it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Present the case for your idols,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let them show what they can do,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: says the King of Israel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the King of Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note on 14:1.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Let them try to tell us what happened long ago
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that we may consider the evidence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or let them tell us what the future holds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so we can know what’s going to happen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Yes, tell us what will occur in the days ahead.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then we will know you are gods.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In fact, do anything—good or bad!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do something that will amaze and frighten us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: But no! You are less than nothing and can do nothing at all.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Those who choose you pollute themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “But I have stirred up a leader who will approach from the north.
- type: usfm
  marker: q2
  children:
  - type: text
    text: From the east he will call on my name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will give him victory over kings and princes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will trample them as a potter treads on clay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Who told you from the beginning
- type: usfm
  marker: q2
  children:
  - type: text
    text: that this would happen?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who predicted this,
- type: usfm
  marker: q2
  children:
  - type: text
    text: making you admit that he was right?
- type: usfm
  marker: q2
  children:
  - type: text
    text: No one said a word!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: I was the first to tell Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Look! Help is on the way!’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ‘Look! They are coming home.’
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will send Jerusalem a messenger with good news.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Not one of your idols told you this.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Not one gave any answer when I asked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: See, they are all foolish, worthless things.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All your idols are as empty as the wind.
