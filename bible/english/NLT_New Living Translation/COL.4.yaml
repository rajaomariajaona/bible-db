document_id: COL.4,116
type_code: eng
verses:
  '1':
  - type: text
    content: Masters, be just and fair to your slaves. Remember that you also have a Master—in heaven.
  - type: heading
    content: An Encouragement for Prayer
  '10':
  - type: text
    content: 'Aristarchus, who is in prison with me, sends you his greetings, and so does Mark, Barnabas’s cousin. As you were instructed before, make Mark welcome if he comes your way. '
  '11':
  - type: text
    content: Jesus (the one we call Justus) also sends his greetings. These are the only Jewish believers among my co-workers; they are working with me here for the Kingdom of God. And what a comfort they have been!
  '12':
  - type: text
    content: 'Epaphras, a member of your own fellowship and a servant of Christ Jesus, sends you his greetings. He always prays earnestly for you, asking God to make you strong and perfect, fully confident that you are following the whole will of God. '
  '13':
  - type: text
    content: I can assure you that he prays hard for you and also for the believers in Laodicea and Hierapolis.
  '14':
  - type: text
    content: 'Luke, the beloved doctor, sends his greetings, and so does Demas. '
  '15':
  - type: text
    content: Please give my greetings to our brothers and sisters
  - type: note
    content: Greek brothers.
  - type: text
    content: ' at Laodicea, and to Nympha and the church that meets in her house.'
  '16':
  - type: text
    content: After you have read this letter, pass it on to the church at Laodicea so they can read it, too. And you should read the letter I wrote to them.
  '17':
  - type: text
    content: And say to Archippus, “Be sure to carry out the ministry the Lord gave you.”
  '18':
  - type: text
    content: ' '
  - type: heading
    content: Here is my greeting in my own handwriting—Paul
  - type: text
    content: .
  - type: text
    content: Remember my chains.
  - type: text
    content: May God’s grace be with you.
  '2':
  - type: text
    content: 'Devote yourselves to prayer with an alert mind and a thankful heart. '
  '3':
  - type: text
    content: 'Pray for us, too, that God will give us many opportunities to speak about his mysterious plan concerning Christ. That is why I am here in chains. '
  '4':
  - type: text
    content: Pray that I will proclaim this message as clearly as I should.
  '5':
  - type: text
    content: 'Live wisely among those who are not believers, and make the most of every opportunity. '
  '6':
  - type: text
    content: Let your conversation be gracious and attractive
  - type: note
    content: Greek and seasoned with salt.
  - type: text
    content: ' so that you will have the right response for everyone.'
  - type: heading
    content: Paul’s Final Instructions and Greetings
  '7':
  - type: text
    content: 'Tychicus will give you a full report about how I am getting along. He is a beloved brother and faithful helper who serves with me in the Lord’s work. '
  '8':
  - type: text
    content: 'I have sent him to you for this very purpose—to let you know how we are doing and to encourage you. '
  '9':
  - type: text
    content: I am also sending Onesimus, a faithful and beloved brother, one of your own people. He and Tychicus will tell you everything that’s happening here.
