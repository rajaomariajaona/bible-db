document_id: 2TI.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Good Soldier of Christ Jesus
  - type: text
    content: 'Timothy, my dear son, be strong through the grace that God gives you in Christ Jesus. '
  '10':
  - type: text
    content: So I am willing to endure anything if it will bring salvation and eternal glory in Christ Jesus to those God has chosen.
  '11':
  - type: text
    content: 'This is a trustworthy saying:'
  - type: text
    content: If we die with him,
  - type: text
    content: we will also live with him.
  '12':
  - type: text
    content: If we endure hardship,
  - type: text
    content: we will reign with him.
  - type: text
    content: If we deny him,
  - type: text
    content: he will deny us.
  '13':
  - type: text
    content: If we are unfaithful,
  - type: text
    content: he remains faithful,
  - type: text
    content: for he cannot deny who he is.
  '14':
  - type: text
    content: Remind everyone about these things, and command them in God’s presence to stop fighting over words. Such arguments are useless, and they can ruin those who hear them.
  - type: heading
    content: An Approved Worker
  '15':
  - type: text
    content: 'Work hard so you can present yourself to God and receive his approval. Be a good worker, one who does not need to be ashamed and who correctly explains the word of truth. '
  '16':
  - type: text
    content: 'Avoid worthless, foolish talk that only leads to more godless behavior. '
  '17':
  - type: text
    content: This kind of talk spreads like cancer,
  - type: note
    content: Greek gangrene.
  - type: text
    content: ' as in the case of Hymenaeus and Philetus. '
  '18':
  - type: text
    content: They have left the path of truth, claiming that the resurrection of the dead has already occurred; in this way, they have turned some people away from the faith.
  '19':
  - type: text
    content: 'But God’s truth stands firm like a foundation stone with this inscription: “The '
  - type: text
    content: Lord
  - type: text
    content: ' knows those who are his,”'
  - type: note
    content: Num 16:5.
  - type: text
    content: ' and “All who belong to the '
  - type: text
    content: Lord
  - type: text
    content: ' must turn away from evil.”'
  - type: note
    content: See Isa 52:11.
  '2':
  - type: text
    content: You have heard me teach things that have been confirmed by many reliable witnesses. Now teach these truths to other trustworthy people who will be able to pass them on to others.
  '20':
  - type: text
    content: 'In a wealthy home some utensils are made of gold and silver, and some are made of wood and clay. The expensive utensils are used for special occasions, and the cheap ones are for everyday use. '
  '21':
  - type: text
    content: If you keep yourself pure, you will be a special utensil for honorable use. Your life will be clean, and you will be ready for the Master to use you for every good work.
  '22':
  - type: text
    content: Run from anything that stimulates youthful lusts. Instead, pursue righteous living, faithfulness, love, and peace. Enjoy the companionship of those who call on the Lord with pure hearts.
  '23':
  - type: text
    content: 'Again I say, don’t get involved in foolish, ignorant arguments that only start fights. '
  '24':
  - type: text
    content: 'A servant of the Lord must not quarrel but must be kind to everyone, be able to teach, and be patient with difficult people. '
  '25':
  - type: text
    content: 'Gently instruct those who oppose the truth. Perhaps God will change those people’s hearts, and they will learn the truth. '
  '26':
  - type: text
    content: Then they will come to their senses and escape from the devil’s trap. For they have been held captive by him to do whatever he wants.
  '3':
  - type: text
    content: 'Endure suffering along with me, as a good soldier of Christ Jesus. '
  '4':
  - type: text
    content: 'Soldiers don’t get tied up in the affairs of civilian life, for then they cannot please the officer who enlisted them. '
  '5':
  - type: text
    content: 'And athletes cannot win the prize unless they follow the rules. '
  '6':
  - type: text
    content: 'And hardworking farmers should be the first to enjoy the fruit of their labor. '
  '7':
  - type: text
    content: Think about what I am saying. The Lord will help you understand all these things.
  '8':
  - type: text
    content: 'Always remember that Jesus Christ, a descendant of King David, was raised from the dead. This is the Good News I preach. '
  '9':
  - type: text
    content: 'And because I preach this Good News, I am suffering and have been chained like a criminal. But the word of God cannot be chained. '
