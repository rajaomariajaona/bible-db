document_id: EST.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Esther Becomes Queen
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'But after Xerxes’ anger had subsided, he began thinking about Vashti and what she had done and the decree he had made. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Esther had not told anyone of her nationality and family background, because Mordecai had directed her not to do so. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Every day Mordecai would take a walk near the courtyard of the harem to find out about Esther and what was happening to her.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Before each young woman was taken to the king’s bed, she was given the prescribed twelve months of beauty treatments—six months with oil of myrrh, followed by six months with special perfumes and ointments. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When it was time for her to go to the king’s palace, she was given her choice of whatever clothing or jewelry she wanted to take from the harem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: That evening she was taken to the king’s private rooms, and the next morning she was brought to the second harem,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to another part of the harem.
      marker-yv: yv-n
    - type: text
      text: ' where the king’s wives lived. There she would be under the care of Shaashgaz, the king’s eunuch in charge of the concubines. She would never go to the king again unless he had especially enjoyed her and requested her by name.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Esther was the daughter of Abihail, who was Mordecai’s uncle. (Mordecai had adopted his younger cousin Esther.) When it was Esther’s turn to go to the king, she accepted the advice of Hegai, the eunuch in charge of the harem. She asked for nothing except what he suggested, and she was admired by everyone who saw her.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Esther was taken to King Xerxes at the royal palace in early winter
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in the tenth month, the month of Tebeth. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A number of dates in the book of Esther can be cross-checked with dates in surviving Persian records and related accurately to our modern calendar. This month of the ancient Hebrew lunar calendar occurred within the months of December 479 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ' and January 478 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
      marker-yv: yv-n
    - type: text
      text: ' of the seventh year of his reign. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the king loved Esther more than any of the other young women. He was so delighted with her that he set the royal crown on her head and declared her queen instead of Vashti. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: To celebrate the occasion, he gave a great banquet in Esther’s honor for all his nobles and officials, declaring a public holiday for the provinces and giving generous gifts to everyone.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Even after all the young women had been transferred to the second harem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:19a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' and Mordecai had become a palace official,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:19b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and Mordecai was sitting in the gate of the king.
      marker-yv: yv-n
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So his personal attendants suggested, “Let us search the empire to find beautiful young virgins for the king. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Esther continued to keep her family background and nationality a secret. She was still following Mordecai’s directions, just as she did when she lived in his home.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mordecai’s Loyalty to the King
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: One day as Mordecai was on duty at the king’s gate, two of the king’s eunuchs, Bigthana
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Bigthan; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare 6:2.
      marker-yv: yv-n
    - type: text
      text: ' and Teresh—who were guards at the door of the king’s private quarters—became angry at King Xerxes and plotted to assassinate him. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But Mordecai heard about the plot and gave the information to Queen Esther. She then told the king about it and gave Mordecai credit for the report. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'When an investigation was made and Mordecai’s story was found to be true, the two men were impaled on a sharpened pole. This was all recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the History of King Xerxes’ Reign.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Let the king appoint agents in each province to bring these beautiful young women into the royal harem at the fortress of Susa. Hegai, the king’s eunuch in charge of the harem, will see that they are all given beauty treatments. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: After that, the young woman who most pleases the king will be made queen instead of Vashti.” This advice was very appealing to the king, so he put the plan into effect.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'At that time there was a Jewish man in the fortress of Susa whose name was Mordecai son of Jair. He was from the tribe of Benjamin and was a descendant of Kish and Shimei. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: His family
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:6a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He.
      marker-yv: yv-n
    - type: text
      text: ' had been among those who, with King Jehoiachin'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:6b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jeconiah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Jehoiachin.
      marker-yv: yv-n
    - type: text
      text: ' of Judah, had been exiled from Jerusalem to Babylon by King Nebuchadnezzar. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: This man had a very beautiful and lovely young cousin, Hadassah, who was also called Esther. When her father and mother died, Mordecai adopted her into his family and raised her as his own daughter.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'As a result of the king’s decree, Esther, along with many other young women, was brought to the king’s harem at the fortress of Susa and placed in Hegai’s care. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Hegai was very impressed with Esther and treated her kindly. He quickly ordered a special menu for her and provided her with beauty treatments. He also assigned her seven maids specially chosen from the king’s palace, and he moved her and her maids into the best place in the harem.
