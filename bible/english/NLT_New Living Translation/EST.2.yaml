document_id: EST.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Esther Becomes Queen
  - type: text
    content: 'But after Xerxes’ anger had subsided, he began thinking about Vashti and what she had done and the decree he had made. '
  '10':
  - type: text
    content: 'Esther had not told anyone of her nationality and family background, because Mordecai had directed her not to do so. '
  '11':
  - type: text
    content: Every day Mordecai would take a walk near the courtyard of the harem to find out about Esther and what was happening to her.
  '12':
  - type: text
    content: 'Before each young woman was taken to the king’s bed, she was given the prescribed twelve months of beauty treatments—six months with oil of myrrh, followed by six months with special perfumes and ointments. '
  '13':
  - type: text
    content: 'When it was time for her to go to the king’s palace, she was given her choice of whatever clothing or jewelry she wanted to take from the harem. '
  '14':
  - type: text
    content: That evening she was taken to the king’s private rooms, and the next morning she was brought to the second harem,
  - type: note
    content: Or to another part of the harem.
  - type: text
    content: ' where the king’s wives lived. There she would be under the care of Shaashgaz, the king’s eunuch in charge of the concubines. She would never go to the king again unless he had especially enjoyed her and requested her by name.'
  '15':
  - type: text
    content: Esther was the daughter of Abihail, who was Mordecai’s uncle. (Mordecai had adopted his younger cousin Esther.) When it was Esther’s turn to go to the king, she accepted the advice of Hegai, the eunuch in charge of the harem. She asked for nothing except what he suggested, and she was admired by everyone who saw her.
  '16':
  - type: text
    content: Esther was taken to King Xerxes at the royal palace in early winter
  - type: note
    content: Hebrew in the tenth month, the month of Tebeth. A number of dates in the book of Esther can be cross-checked with dates in surviving Persian records and related accurately to our modern calendar. This month of the ancient Hebrew lunar calendar occurred within the months of December 479 b.c. and January 478 b.c.
  - type: text
    content: ' of the seventh year of his reign. '
  '17':
  - type: text
    content: 'And the king loved Esther more than any of the other young women. He was so delighted with her that he set the royal crown on her head and declared her queen instead of Vashti. '
  '18':
  - type: text
    content: To celebrate the occasion, he gave a great banquet in Esther’s honor for all his nobles and officials, declaring a public holiday for the provinces and giving generous gifts to everyone.
  '19':
  - type: text
    content: Even after all the young women had been transferred to the second harem
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' and Mordecai had become a palace official,'
  - type: note
    content: Hebrew and Mordecai was sitting in the gate of the king.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'So his personal attendants suggested, “Let us search the empire to find beautiful young virgins for the king. '
  '20':
  - type: text
    content: Esther continued to keep her family background and nationality a secret. She was still following Mordecai’s directions, just as she did when she lived in his home.
  - type: heading
    content: Mordecai’s Loyalty to the King
  '21':
  - type: text
    content: One day as Mordecai was on duty at the king’s gate, two of the king’s eunuchs, Bigthana
  - type: note
    content: Hebrew Bigthan; compare 6:2.
  - type: text
    content: ' and Teresh—who were guards at the door of the king’s private quarters—became angry at King Xerxes and plotted to assassinate him. '
  '22':
  - type: text
    content: 'But Mordecai heard about the plot and gave the information to Queen Esther. She then told the king about it and gave Mordecai credit for the report. '
  '23':
  - type: text
    content: 'When an investigation was made and Mordecai’s story was found to be true, the two men were impaled on a sharpened pole. This was all recorded in '
  - type: text
    content: The Book of the History of King Xerxes’ Reign.
  '3':
  - type: text
    content: 'Let the king appoint agents in each province to bring these beautiful young women into the royal harem at the fortress of Susa. Hegai, the king’s eunuch in charge of the harem, will see that they are all given beauty treatments. '
  '4':
  - type: text
    content: After that, the young woman who most pleases the king will be made queen instead of Vashti.” This advice was very appealing to the king, so he put the plan into effect.
  '5':
  - type: text
    content: 'At that time there was a Jewish man in the fortress of Susa whose name was Mordecai son of Jair. He was from the tribe of Benjamin and was a descendant of Kish and Shimei. '
  '6':
  - type: text
    content: His family
  - type: note
    content: Hebrew He.
  - type: text
    content: ' had been among those who, with King Jehoiachin'
  - type: note
    content: Hebrew Jeconiah, a variant spelling of Jehoiachin.
  - type: text
    content: ' of Judah, had been exiled from Jerusalem to Babylon by King Nebuchadnezzar. '
  '7':
  - type: text
    content: This man had a very beautiful and lovely young cousin, Hadassah, who was also called Esther. When her father and mother died, Mordecai adopted her into his family and raised her as his own daughter.
  '8':
  - type: text
    content: 'As a result of the king’s decree, Esther, along with many other young women, was brought to the king’s harem at the fortress of Susa and placed in Hegai’s care. '
  '9':
  - type: text
    content: Hegai was very impressed with Esther and treated her kindly. He quickly ordered a special menu for her and provided her with beauty treatments. He also assigned her seven maids specially chosen from the king’s palace, and he moved her and her maids into the best place in the harem.
