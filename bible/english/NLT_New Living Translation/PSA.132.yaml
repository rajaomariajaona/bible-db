document_id: PSA.132,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song for pilgrims ascending to Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', remember David'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all that he suffered.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the sake of your servant David,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not reject the king you have anointed.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' swore an oath to David'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'with a promise he will never take back:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will place one of your descendants
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on your throne.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If your descendants obey the terms of my covenant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the laws that I teach them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then your royal line
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will continue forever and ever.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has chosen Jerusalem'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zion.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has desired it for his home.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “This is my resting place forever,” he said.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I will live here, for this is the home I desired.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bless this city and make it prosperous;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will satisfy its poor with food.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will clothe its priests with godliness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its faithful servants will sing for joy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Here I will increase the power of David;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my anointed one will be a light for my people.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will clothe his enemies with shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he will be a glorious king.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He made a solemn promise to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He vowed to the Mighty One of Israel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of Jacob; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 132:5. See note on 44:4.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will not go home;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not let myself rest.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not let my eyes sleep
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor close my eyelids in slumber
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'until I find a place to build a house for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a sanctuary for the Mighty One of Israel.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We heard that the Ark was in Ephrathah;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then we found it in the distant countryside of Jaar.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let us go to the sanctuary of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let us worship at the footstool of his throne.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Arise, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and enter your resting place,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: along with the Ark, the symbol of your power.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May your priests be clothed in godliness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may your loyal servants sing for joy.
