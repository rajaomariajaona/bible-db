document_id: PSA.132,116
type_code: eng
verses:
  '1':
  - type: text
    content: A song for pilgrims ascending to Jerusalem.
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', remember David'
  - type: text
    content: and all that he suffered.
  '10':
  - type: text
    content: For the sake of your servant David,
  - type: text
    content: do not reject the king you have anointed.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' swore an oath to David'
  - type: text
    content: 'with a promise he will never take back:'
  - type: text
    content: “I will place one of your descendants
  - type: text
    content: on your throne.
  '12':
  - type: text
    content: If your descendants obey the terms of my covenant
  - type: text
    content: and the laws that I teach them,
  - type: text
    content: then your royal line
  - type: text
    content: will continue forever and ever.”
  '13':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen Jerusalem'
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ;
  - type: text
    content: he has desired it for his home.
  '14':
  - type: text
    content: “This is my resting place forever,” he said.
  - type: text
    content: “I will live here, for this is the home I desired.
  '15':
  - type: text
    content: I will bless this city and make it prosperous;
  - type: text
    content: I will satisfy its poor with food.
  '16':
  - type: text
    content: I will clothe its priests with godliness;
  - type: text
    content: its faithful servants will sing for joy.
  '17':
  - type: text
    content: Here I will increase the power of David;
  - type: text
    content: my anointed one will be a light for my people.
  '18':
  - type: text
    content: I will clothe his enemies with shame,
  - type: text
    content: but he will be a glorious king.”
  '2':
  - type: text
    content: 'He made a solemn promise to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: He vowed to the Mighty One of Israel,
  - type: note
    content: Hebrew of Jacob; also in 132:5. See note on 44:4.
  '3':
  - type: text
    content: “I will not go home;
  - type: text
    content: I will not let myself rest.
  '4':
  - type: text
    content: I will not let my eyes sleep
  - type: text
    content: nor close my eyelids in slumber
  '5':
  - type: text
    content: 'until I find a place to build a house for the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: a sanctuary for the Mighty One of Israel.”
  '6':
  - type: text
    content: We heard that the Ark was in Ephrathah;
  - type: text
    content: then we found it in the distant countryside of Jaar.
  '7':
  - type: text
    content: 'Let us go to the sanctuary of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: let us worship at the footstool of his throne.
  '8':
  - type: text
    content: 'Arise, O '
  - type: text
    content: Lord
  - type: text
    content: ', and enter your resting place,'
  - type: text
    content: along with the Ark, the symbol of your power.
  '9':
  - type: text
    content: May your priests be clothed in godliness;
  - type: text
    content: may your loyal servants sing for joy.
