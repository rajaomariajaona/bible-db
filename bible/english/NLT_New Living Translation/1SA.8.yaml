document_id: 1SA.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Requests a King
  - type: text
    content: 'As Samuel grew old, he appointed his sons to be judges over Israel. '
  '10':
  - type: text
    content: 'So Samuel passed on the '
  - type: text
    content: Lord
  - type: text
    content: '’s warning to the people who were asking him for a king. '
  '11':
  - type: text
    content: '“This is how a king will reign over you,” Samuel said. “The king will draft your sons and assign them to his chariots and his charioteers, making them run before his chariots. '
  '12':
  - type: text
    content: Some will be generals and captains in his army,
  - type: note
    content: Hebrew commanders of thousands and commanders of fifties.
  - type: text
    content: ' some will be forced to plow in his fields and harvest his crops, and some will make his weapons and chariot equipment. '
  '13':
  - type: text
    content: 'The king will take your daughters from you and force them to cook and bake and make perfumes for him. '
  '14':
  - type: text
    content: 'He will take away the best of your fields and vineyards and olive groves and give them to his own officials. '
  '15':
  - type: text
    content: 'He will take a tenth of your grain and your grape harvest and distribute it among his officers and attendants. '
  '16':
  - type: text
    content: He will take your male and female slaves and demand the finest of your cattle
  - type: note
    content: As in Greek version; Hebrew reads young men.
  - type: text
    content: ' and donkeys for his own use. '
  '17':
  - type: text
    content: 'He will demand a tenth of your flocks, and you will be his slaves. '
  '18':
  - type: text
    content: 'When that day comes, you will beg for relief from this king you are demanding, but then the '
  - type: text
    content: Lord
  - type: text
    content: ' will not help you.”'
  '19':
  - type: text
    content: 'But the people refused to listen to Samuel’s warning. “Even so, we still want a king,” they said. '
  '2':
  - type: text
    content: 'Joel and Abijah, his oldest sons, held court in Beersheba. '
  '20':
  - type: text
    content: “We want to be like the nations around us. Our king will judge us and lead us into battle.”
  '21':
  - type: text
    content: 'So Samuel repeated to the '
  - type: text
    content: Lord
  - type: text
    content: ' what the people had said, '
  '22':
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “Do as they say, and give them a king.” Then Samuel agreed and sent the people home.'
  '3':
  - type: text
    content: But they were not like their father, for they were greedy for money. They accepted bribes and perverted justice.
  '4':
  - type: text
    content: 'Finally, all the elders of Israel met at Ramah to discuss the matter with Samuel. '
  '5':
  - type: text
    content: “Look,” they told him, “you are now old, and your sons are not like you. Give us a king to judge us like all the other nations have.”
  '6':
  - type: text
    content: 'Samuel was displeased with their request and went to the '
  - type: text
    content: Lord
  - type: text
    content: ' for guidance. '
  '7':
  - type: text
    content: '“Do everything they say to you,” the '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “for they are rejecting me, not you. They don’t want me to be their king any longer. '
  '8':
  - type: text
    content: 'Ever since I brought them from Egypt they have continually abandoned me and followed other gods. And now they are giving you the same treatment. '
  '9':
  - type: text
    content: Do as they ask, but solemnly warn them about the way a king will reign over them.”
  - type: heading
    content: Samuel Warns against a Kingdom
