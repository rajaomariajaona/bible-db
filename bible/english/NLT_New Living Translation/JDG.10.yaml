document_id: JDG.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Tola Becomes Israel’s Judge
  - type: text
    content: 'After Abimelech died, Tola son of Puah, son of Dodo, was the next person to rescue Israel. He was from the tribe of Issachar but lived in the town of Shamir in the hill country of Ephraim. '
  '10':
  - type: text
    content: 'Finally, they cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' for help, saying, “We have sinned against you because we have abandoned you as our God and have served the images of Baal.”'
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “Did I not rescue you from the Egyptians, the Amorites, the Ammonites, the Philistines, '
  '12':
  - type: text
    content: 'the Sidonians, the Amalekites, and the Maonites? When they oppressed you, you cried out to me for help, and I rescued you. '
  '13':
  - type: text
    content: 'Yet you have abandoned me and served other gods. So I will not rescue you anymore. '
  '14':
  - type: text
    content: Go and cry out to the gods you have chosen! Let them rescue you in your hour of distress!”
  '15':
  - type: text
    content: 'But the Israelites pleaded with the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, “We have sinned. Punish us as you see fit, only rescue us today from our enemies.” '
  '16':
  - type: text
    content: 'Then the Israelites put aside their foreign gods and served the '
  - type: text
    content: Lord
  - type: text
    content: . And he was grieved by their misery.
  '17':
  - type: text
    content: 'At that time the armies of Ammon had gathered for war and were camped in Gilead, and the people of Israel assembled and camped at Mizpah. '
  '18':
  - type: text
    content: The leaders of Gilead said to each other, “Whoever attacks the Ammonites first will become ruler over all the people of Gilead.”
  '2':
  - type: text
    content: He judged Israel for twenty-three years. When he died, he was buried in Shamir.
  - type: heading
    content: Jair Becomes Israel’s Judge
  '3':
  - type: text
    content: 'After Tola died, Jair from Gilead judged Israel for twenty-two years. '
  '4':
  - type: text
    content: His thirty sons rode around on thirty donkeys, and they owned thirty towns in the land of Gilead, which are still called the Towns of Jair.
  - type: note
    content: Hebrew Havvoth-jair.
  - type: text
    content: ' '
  '5':
  - type: text
    content: When Jair died, he was buried in Kamon.
  - type: heading
    content: The Ammonites Oppress Israel
  '6':
  - type: text
    content: 'Again the Israelites did evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight. They served the images of Baal and Ashtoreth, and the gods of Aram, Sidon, Moab, Ammon, and Philistia. They abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ' and no longer served him at all. '
  '7':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' burned with anger against Israel, and he turned them over to the Philistines and the Ammonites, '
  '8':
  - type: text
    content: 'who began to oppress them that year. For eighteen years they oppressed all the Israelites east of the Jordan River in the land of the Amorites (that is, in Gilead). '
  '9':
  - type: text
    content: The Ammonites also crossed to the west side of the Jordan and attacked Judah, Benjamin, and Ephraim.
  - type: text
    content: 'The Israelites were in great distress. '
