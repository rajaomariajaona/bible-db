document_id: JDG.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tola Becomes Israel’s Judge
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After Abimelech died, Tola son of Puah, son of Dodo, was the next person to rescue Israel. He was from the tribe of Issachar but lived in the town of Shamir in the hill country of Ephraim. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He judged Israel for twenty-three years. When he died, he was buried in Shamir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jair Becomes Israel’s Judge
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'After Tola died, Jair from Gilead judged Israel for twenty-two years. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: His thirty sons rode around on thirty donkeys, and they owned thirty towns in the land of Gilead, which are still called the Towns of Jair.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Havvoth-jair.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: When Jair died, he was buried in Kamon.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ammonites Oppress Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Again the Israelites did evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s sight. They served the images of Baal and Ashtoreth, and the gods of Aram, Sidon, Moab, Ammon, and Philistia. They abandoned the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and no longer served him at all. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' burned with anger against Israel, and he turned them over to the Philistines and the Ammonites, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'who began to oppress them that year. For eighteen years they oppressed all the Israelites east of the Jordan River in the land of the Amorites (that is, in Gilead). '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The Ammonites also crossed to the west side of the Jordan and attacked Judah, Benjamin, and Ephraim.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The Israelites were in great distress. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Finally, they cried out to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for help, saying, “We have sinned against you because we have abandoned you as our God and have served the images of Baal.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' replied, “Did I not rescue you from the Egyptians, the Amorites, the Ammonites, the Philistines, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'the Sidonians, the Amalekites, and the Maonites? When they oppressed you, you cried out to me for help, and I rescued you. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Yet you have abandoned me and served other gods. So I will not rescue you anymore. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Go and cry out to the gods you have chosen! Let them rescue you in your hour of distress!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But the Israelites pleaded with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and said, “We have sinned. Punish us as you see fit, only rescue us today from our enemies.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then the Israelites put aside their foreign gods and served the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . And he was grieved by their misery.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'At that time the armies of Ammon had gathered for war and were camped in Gilead, and the people of Israel assembled and camped at Mizpah. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The leaders of Gilead said to each other, “Whoever attacks the Ammonites first will become ruler over all the people of Gilead.”
