document_id: PSA.22,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David, to be sung to the tune “Doe of the Dawn.”'
  - type: text
    content: My God, my God, why have you abandoned me?
  - type: text
    content: Why are you so far away when I groan for help?
  '10':
  - type: text
    content: I was thrust into your arms at my birth.
  - type: text
    content: You have been my God from the moment I was born.
  '11':
  - type: text
    content: Do not stay so far from me,
  - type: text
    content: for trouble is near,
  - type: text
    content: and no one else can help me.
  '12':
  - type: text
    content: My enemies surround me like a herd of bulls;
  - type: text
    content: fierce bulls of Bashan have hemmed me in!
  '13':
  - type: text
    content: Like lions they open their jaws against me,
  - type: text
    content: roaring and tearing into their prey.
  '14':
  - type: text
    content: My life is poured out like water,
  - type: text
    content: and all my bones are out of joint.
  - type: text
    content: My heart is like wax,
  - type: text
    content: melting within me.
  '15':
  - type: text
    content: My strength has dried up like sunbaked clay.
  - type: text
    content: My tongue sticks to the roof of my mouth.
  - type: text
    content: You have laid me in the dust and left me for dead.
  '16':
  - type: text
    content: My enemies surround me like a pack of dogs;
  - type: text
    content: an evil gang closes in on me.
  - type: text
    content: They have pierced
  - type: note
    content: As in some Hebrew manuscripts and Greek and Syriac versions; most Hebrew manuscripts read They are like a lion at.
  - type: text
    content: ' my hands and feet.'
  '17':
  - type: text
    content: I can count all my bones.
  - type: text
    content: My enemies stare at me and gloat.
  '18':
  - type: text
    content: They divide my garments among themselves
  - type: text
    content: and throw dice
  - type: note
    content: Hebrew cast lots.
  - type: text
    content: ' for my clothing.'
  '19':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', do not stay far away!'
  - type: text
    content: You are my strength; come quickly to my aid!
  '2':
  - type: text
    content: Every day I call to you, my God, but you do not answer.
  - type: text
    content: Every night I lift my voice, but I find no relief.
  '20':
  - type: text
    content: Save me from the sword;
  - type: text
    content: spare my precious life from these dogs.
  '21':
  - type: text
    content: Snatch me from the lion’s jaws
  - type: text
    content: and from the horns of these wild oxen.
  '22':
  - type: text
    content: I will proclaim your name to my brothers and sisters.
  - type: note
    content: Hebrew my brothers.
  - type: text
    content: I will praise you among your assembled people.
  '23':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', all you who fear him!'
  - type: text
    content: Honor him, all you descendants of Jacob!
  - type: text
    content: Show him reverence, all you descendants of Israel!
  '24':
  - type: text
    content: For he has not ignored or belittled the suffering of the needy.
  - type: text
    content: He has not turned his back on them,
  - type: text
    content: but has listened to their cries for help.
  '25':
  - type: text
    content: I will praise you in the great assembly.
  - type: text
    content: I will fulfill my vows in the presence of those who worship you.
  '26':
  - type: text
    content: The poor will eat and be satisfied.
  - type: text
    content: 'All who seek the '
  - type: text
    content: Lord
  - type: text
    content: ' will praise him.'
  - type: text
    content: Their hearts will rejoice with everlasting joy.
  '27':
  - type: text
    content: 'The whole earth will acknowledge the '
  - type: text
    content: Lord
  - type: text
    content: ' and return to him.'
  - type: text
    content: All the families of the nations will bow down before him.
  '28':
  - type: text
    content: 'For royal power belongs to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: He rules all the nations.
  '29':
  - type: text
    content: Let the rich of the earth feast and worship.
  - type: text
    content: Bow before him, all who are mortal,
  - type: text
    content: all whose lives will end as dust.
  '3':
  - type: text
    content: Yet you are holy,
  - type: text
    content: enthroned on the praises of Israel.
  '30':
  - type: text
    content: Our children will also serve him.
  - type: text
    content: Future generations will hear about the wonders of the Lord.
  '31':
  - type: text
    content: His righteous acts will be told to those not yet born.
  - type: text
    content: They will hear about everything he has done.
  '4':
  - type: text
    content: Our ancestors trusted in you,
  - type: text
    content: and you rescued them.
  '5':
  - type: text
    content: They cried out to you and were saved.
  - type: text
    content: They trusted in you and were never disgraced.
  '6':
  - type: text
    content: But I am a worm and not a man.
  - type: text
    content: I am scorned and despised by all!
  '7':
  - type: text
    content: Everyone who sees me mocks me.
  - type: text
    content: They sneer and shake their heads, saying,
  '8':
  - type: text
    content: '“Is this the one who relies on the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: 'Then let the '
  - type: text
    content: Lord
  - type: text
    content: ' save him!'
  - type: text
    content: 'If the '
  - type: text
    content: Lord
  - type: text
    content: ' loves him so much,'
  - type: text
    content: 'let the '
  - type: text
    content: Lord
  - type: text
    content: ' rescue him!”'
  '9':
  - type: text
    content: Yet you brought me safely from my mother’s womb
  - type: text
    content: and led me to trust you at my mother’s breast.
