document_id: PSA.22,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of David, to be sung to the tune “Doe of the Dawn.”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My God, my God, why have you abandoned me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why are you so far away when I groan for help?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was thrust into your arms at my birth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have been my God from the moment I was born.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not stay so far from me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for trouble is near,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one else can help me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My enemies surround me like a herd of bulls;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fierce bulls of Bashan have hemmed me in!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like lions they open their jaws against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: roaring and tearing into their prey.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My life is poured out like water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all my bones are out of joint.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart is like wax,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: melting within me.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My strength has dried up like sunbaked clay.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My tongue sticks to the roof of my mouth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have laid me in the dust and left me for dead.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My enemies surround me like a pack of dogs;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an evil gang closes in on me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have pierced
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts and Greek and Syriac versions; most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: They are like a lion at.
      marker-yv: yv-n
    - type: text
      text: ' my hands and feet.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I can count all my bones.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My enemies stare at me and gloat.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They divide my garments among themselves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and throw dice
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cast lots.
      marker-yv: yv-n
    - type: text
      text: ' for my clothing.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', do not stay far away!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are my strength; come quickly to my aid!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every day I call to you, my God, but you do not answer.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Every night I lift my voice, but I find no relief.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save me from the sword;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spare my precious life from these dogs.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Snatch me from the lion’s jaws
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from the horns of these wild oxen.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will proclaim your name to my brothers and sisters.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: my brothers.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will praise you among your assembled people.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', all you who fear him!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Honor him, all you descendants of Jacob!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Show him reverence, all you descendants of Israel!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he has not ignored or belittled the suffering of the needy.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has not turned his back on them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but has listened to their cries for help.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will praise you in the great assembly.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will fulfill my vows in the presence of those who worship you.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The poor will eat and be satisfied.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All who seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will praise him.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their hearts will rejoice with everlasting joy.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The whole earth will acknowledge the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and return to him.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the families of the nations will bow down before him.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For royal power belongs to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He rules all the nations.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the rich of the earth feast and worship.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Bow before him, all who are mortal,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all whose lives will end as dust.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet you are holy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: enthroned on the praises of Israel.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our children will also serve him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Future generations will hear about the wonders of the Lord.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His righteous acts will be told to those not yet born.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will hear about everything he has done.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our ancestors trusted in you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you rescued them.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They cried out to you and were saved.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They trusted in you and were never disgraced.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I am a worm and not a man.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am scorned and despised by all!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone who sees me mocks me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They sneer and shake their heads, saying,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Is this the one who relies on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then let the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' save him!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' loves him so much,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'let the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rescue him!”'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet you brought me safely from my mother’s womb
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and led me to trust you at my mother’s breast.
