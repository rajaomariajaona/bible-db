document_id: NUM.34,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Boundaries of the Land
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“The eastern boundary will start at Hazar-enan and run south to Shepham, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: then down to Riblah on the east side of Ain. From there the boundary will run down along the eastern edge of the Sea of Galilee,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Sea of Kinnereth.
      marker-yv: yv-n
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: and then along the Jordan River to the Dead Sea. These are the boundaries of your land.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then Moses told the Israelites, “This territory is the homeland you are to divide among yourselves by sacred lot. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded that the land be divided among the nine and a half remaining tribes. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The families of the tribes of Reuben, Gad, and half the tribe of Manasseh have already received their grants of land '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: on the east side of the Jordan River, across from Jericho toward the sunrise.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Leaders to Divide the Land
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“Eleazar the priest and Joshua son of Nun are the men designated to divide the grants of land among the people. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Enlist one leader from each tribe to help them with the task. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'These are the tribes and the names of the leaders:'
  - type: text
    text: TribeLeaderJudahCaleb son of Jephunneh
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Give these instructions to the Israelites: When you come into the land of Canaan, which I am giving you as your special possession, these will be the boundaries. '
  '20':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: SimeonShemuel son of Ammihud
  '21':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: BenjaminElidad son of Kislon
  '22':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: DanBukki son of Jogli
  '23':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Manasseh son of JosephHanniel son of Ephod
  '24':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ephraim son of JosephKemuel son of Shiphtan
  '25':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ZebulunElizaphan son of Parnach
  '26':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: IssacharPaltiel son of Azzan
  '27':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: AsherAhihud son of Shelomi
  '28':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: NaphtaliPedahel son of Ammihud
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'These are the men the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has appointed to divide the grants of land in Canaan among the Israelites.”'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The southern portion of your country will extend from the wilderness of Zin, along the edge of Edom. The southern boundary will begin on the east at the Dead Sea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Salt Sea; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 34:12.
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: It will then run south past Scorpion Pass
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the ascent of Akrabbim.
      marker-yv: yv-n
    - type: text
      text: ' in the direction of Zin. Its southernmost point will be Kadesh-barnea, from which it will go to Hazar-addar, and on to Azmon. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: From Azmon the boundary will turn toward the Brook of Egypt and end at the Mediterranean Sea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the sea; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 34:6, 7.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Your western boundary will be the coastline of the Mediterranean Sea.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“Your northern boundary will begin at the Mediterranean Sea and run east to Mount Hor, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'then to Lebo-hamath, and on through Zedad '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: and Ziphron to Hazar-enan. This will be your northern boundary.
