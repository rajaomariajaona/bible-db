document_id: NUM.34,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Boundaries of the Land
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: '“The eastern boundary will start at Hazar-enan and run south to Shepham, '
  '11':
  - type: text
    content: then down to Riblah on the east side of Ain. From there the boundary will run down along the eastern edge of the Sea of Galilee,
  - type: note
    content: Hebrew Sea of Kinnereth.
  - type: text
    content: ' '
  '12':
  - type: text
    content: and then along the Jordan River to the Dead Sea. These are the boundaries of your land.”
  '13':
  - type: text
    content: 'Then Moses told the Israelites, “This territory is the homeland you are to divide among yourselves by sacred lot. The '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded that the land be divided among the nine and a half remaining tribes. '
  '14':
  - type: text
    content: 'The families of the tribes of Reuben, Gad, and half the tribe of Manasseh have already received their grants of land '
  '15':
  - type: text
    content: on the east side of the Jordan River, across from Jericho toward the sunrise.”
  - type: heading
    content: Leaders to Divide the Land
  '16':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '17':
  - type: text
    content: '“Eleazar the priest and Joshua son of Nun are the men designated to divide the grants of land among the people. '
  '18':
  - type: text
    content: 'Enlist one leader from each tribe to help them with the task. '
  '19':
  - type: text
    content: 'These are the tribes and the names of the leaders:'
  - type: text
    content: Tribe
  - type: text
    content: Leader
  - type: text
    content: Judah
  - type: text
    content: Caleb son of Jephunneh
  '2':
  - type: text
    content: '“Give these instructions to the Israelites: When you come into the land of Canaan, which I am giving you as your special possession, these will be the boundaries. '
  '20':
  - type: text
    content: Simeon
  - type: text
    content: Shemuel son of Ammihud
  '21':
  - type: text
    content: Benjamin
  - type: text
    content: Elidad son of Kislon
  '22':
  - type: text
    content: Dan
  - type: text
    content: Bukki son of Jogli
  '23':
  - type: text
    content: Manasseh son of Joseph
  - type: text
    content: Hanniel son of Ephod
  '24':
  - type: text
    content: Ephraim son of Joseph
  - type: text
    content: Kemuel son of Shiphtan
  '25':
  - type: text
    content: Zebulun
  - type: text
    content: Elizaphan son of Parnach
  '26':
  - type: text
    content: Issachar
  - type: text
    content: Paltiel son of Azzan
  '27':
  - type: text
    content: Asher
  - type: text
    content: Ahihud son of Shelomi
  '28':
  - type: text
    content: Naphtali
  - type: text
    content: Pedahel son of Ammihud
  '29':
  - type: text
    content: 'These are the men the '
  - type: text
    content: Lord
  - type: text
    content: ' has appointed to divide the grants of land in Canaan among the Israelites.”'
  '3':
  - type: text
    content: The southern portion of your country will extend from the wilderness of Zin, along the edge of Edom. The southern boundary will begin on the east at the Dead Sea.
  - type: note
    content: Hebrew Salt Sea; also in 34:12.
  - type: text
    content: ' '
  '4':
  - type: text
    content: It will then run south past Scorpion Pass
  - type: note
    content: Or the ascent of Akrabbim.
  - type: text
    content: ' in the direction of Zin. Its southernmost point will be Kadesh-barnea, from which it will go to Hazar-addar, and on to Azmon. '
  '5':
  - type: text
    content: From Azmon the boundary will turn toward the Brook of Egypt and end at the Mediterranean Sea.
  - type: note
    content: Hebrew the sea; also in 34:6, 7.
  '6':
  - type: text
    content: “Your western boundary will be the coastline of the Mediterranean Sea.
  '7':
  - type: text
    content: '“Your northern boundary will begin at the Mediterranean Sea and run east to Mount Hor, '
  '8':
  - type: text
    content: 'then to Lebo-hamath, and on through Zedad '
  '9':
  - type: text
    content: and Ziphron to Hazar-enan. This will be your northern boundary.
