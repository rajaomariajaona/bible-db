document_id: AMO.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Failure to Learn
  - type: text
    content: Listen to me, you fat cows
  - type: note
    content: Hebrew you cows of Bashan.
  - type: text
    content: living in Samaria,
  - type: text
    content: you women who oppress the poor
  - type: text
    content: and crush the needy,
  - type: text
    content: and who are always calling to your husbands,
  - type: text
    content: “Bring us another drink!”
  '10':
  - type: text
    content: “I sent plagues on you
  - type: text
    content: like the plagues I sent on Egypt long ago.
  - type: text
    content: I killed your young men in war
  - type: text
    content: and led all your horses away.
  - type: note
    content: Or and slaughtered your captured horses.
  - type: text
    content: The stench of death filled the air!
  - type: text
    content: But still you would not return to me,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: “I destroyed some of your cities,
  - type: text
    content: as I destroyed
  - type: note
    content: Hebrew as when God destroyed.
  - type: text
    content: ' Sodom and Gomorrah.'
  - type: text
    content: Those of you who survived
  - type: text
    content: were like charred sticks pulled from a fire.
  - type: text
    content: But still you would not return to me,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: “Therefore, I will bring upon you all the disasters I have announced.
  - type: text
    content: Prepare to meet your God in judgment, you people of Israel!”
  '13':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is the one who shaped the mountains,'
  - type: text
    content: stirs up the winds, and reveals his thoughts to mankind.
  - type: text
    content: He turns the light of dawn into darkness
  - type: text
    content: and treads on the heights of the earth.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies is his name!'
  '2':
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' has sworn this by his holiness:'
  - type: text
    content: “The time will come when you will be led away
  - type: text
    content: with hooks in your noses.
  - type: text
    content: Every last one of you will be dragged away
  - type: text
    content: like a fish on a hook!
  '3':
  - type: text
    content: You will be led out through the ruins of the wall;
  - type: text
    content: you will be thrown from your fortresses,
  - type: note
    content: Or thrown out toward Harmon, possibly a reference to Mount Hermon.
  - type: text
    content: ”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: “Go ahead and offer sacrifices to the idols at Bethel.
  - type: text
    content: Keep on disobeying at Gilgal.
  - type: text
    content: Offer sacrifices each morning,
  - type: text
    content: and bring your tithes every three days.
  '5':
  - type: text
    content: Present your bread made with yeast
  - type: text
    content: as an offering of thanksgiving.
  - type: text
    content: Then give your extra voluntary offerings
  - type: text
    content: so you can brag about it everywhere!
  - type: text
    content: This is the kind of thing you Israelites love to do,”
  - type: text
    content: 'says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: “I brought hunger to every city
  - type: text
    content: and famine to every town.
  - type: text
    content: But still you would not return to me,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: “I kept the rain from falling
  - type: text
    content: when your crops needed it the most.
  - type: text
    content: I sent rain on one town
  - type: text
    content: but withheld it from another.
  - type: text
    content: Rain fell on one field,
  - type: text
    content: while another field withered away.
  '8':
  - type: text
    content: People staggered from town to town looking for water,
  - type: text
    content: but there was never enough.
  - type: text
    content: But still you would not return to me,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: “I struck your farms and vineyards with blight and mildew.
  - type: text
    content: Locusts devoured all your fig and olive trees.
  - type: text
    content: But still you would not return to me,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
