document_id: AMO.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel’s Failure to Learn
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Listen to me, you fat cows
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: you cows of Bashan.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: living in Samaria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you women who oppress the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and crush the needy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and who are always calling to your husbands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Bring us another drink!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has sworn this by his holiness:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The time will come when you will be led away
- type: usfm
  marker: q2
  children:
  - type: text
    text: with hooks in your noses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every last one of you will be dragged away
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a fish on a hook!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You will be led out through the ruins of the wall;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will be thrown from your fortresses,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'thrown out toward Harmon, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: possibly a reference to Mount Hermon.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Go ahead and offer sacrifices to the idols at Bethel.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Keep on disobeying at Gilgal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Offer sacrifices each morning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring your tithes every three days.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Present your bread made with yeast
- type: usfm
  marker: q2
  children:
  - type: text
    text: as an offering of thanksgiving.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then give your extra voluntary offerings
- type: usfm
  marker: q2
  children:
  - type: text
    text: so you can brag about it everywhere!
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is the kind of thing you Israelites love to do,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “I brought hunger to every city
- type: usfm
  marker: q2
  children:
  - type: text
    text: and famine to every town.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But still you would not return to me,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “I kept the rain from falling
- type: usfm
  marker: q2
  children:
  - type: text
    text: when your crops needed it the most.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I sent rain on one town
- type: usfm
  marker: q2
  children:
  - type: text
    text: but withheld it from another.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rain fell on one field,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while another field withered away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: People staggered from town to town looking for water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but there was never enough.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But still you would not return to me,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “I struck your farms and vineyards with blight and mildew.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Locusts devoured all your fig and olive trees.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But still you would not return to me,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “I sent plagues on you
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the plagues I sent on Egypt long ago.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I killed your young men in war
- type: usfm
  marker: q2
  children:
  - type: text
    text: and led all your horses away.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and slaughtered your captured horses.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: The stench of death filled the air!
- type: usfm
  marker: q1
  children:
  - type: text
    text: But still you would not return to me,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “I destroyed some of your cities,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as I destroyed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: as when God destroyed.
    marker-yv: yv-n
  - type: text
    text: ' Sodom and Gomorrah.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those of you who survived
- type: usfm
  marker: q2
  children:
  - type: text
    text: were like charred sticks pulled from a fire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But still you would not return to me,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Therefore, I will bring upon you all the disasters I have announced.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Prepare to meet your God in judgment, you people of Israel!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is the one who shaped the mountains,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: stirs up the winds, and reveals his thoughts to mankind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He turns the light of dawn into darkness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and treads on the heights of the earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Heaven’s Armies is his name!'
