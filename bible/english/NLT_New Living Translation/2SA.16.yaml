document_id: 2SA.16,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David and Ziba
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: When David had gone a little beyond the summit of the Mount of Olives, Ziba, the servant of Mephibosheth,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:1 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mephibosheth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is another name for Merib-baal.
      marker-yv: yv-n
    - type: text
      text: ' was waiting there for him. He had two donkeys loaded with 200 loaves of bread, 100 clusters of raisins, 100 bunches of summer fruit, and a wineskin full of wine.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“No!” the king said. “Who asked your opinion, you sons of Zeruiah! If the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has told him to curse me, who are you to stop him?”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then David said to Abishai and to all his servants, “My own son is trying to kill me. Doesn’t this relative of Saul
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: this Benjaminite.
      marker-yv: yv-n
    - type: text
      text: ' have even more reason to do so? Leave him alone and let him curse, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has told him to do it. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And perhaps the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will see that I am being wronged'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: see my iniquity.
      marker-yv: yv-n
    - type: text
      text: ' and will bless me because of these curses today.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: So David and his men continued down the road, and Shimei kept pace with them on a nearby hillside, cursing and throwing stones and dirt at David.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The king and all who were with him grew weary along the way, so they rested when they reached the Jordan River.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version (see also 17:16); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: when they reached their destination.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahithophel Advises Absalom
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Meanwhile, Absalom and all the army of Israel arrived at Jerusalem, accompanied by Ahithophel. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When David’s friend Hushai the Arkite arrived, he went immediately to see Absalom. “Long live the king!” he exclaimed. “Long live the king!”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Is this the way you treat your friend David?” Absalom asked him. “Why aren’t you with him?”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“I’m here because I belong to the man who is chosen by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and by all the men of Israel,” Hushai replied. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “And anyway, why shouldn’t I serve you? Just as I was your father’s adviser, now I will be your adviser!”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “What are these for?” the king asked Ziba.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ziba replied, “The donkeys are for the king’s people to ride on, and the bread and summer fruit are for the young men to eat. The wine is for those who become exhausted in the wilderness.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Then Absalom turned to Ahithophel and asked him, “What should I do next?”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ahithophel told him, “Go and sleep with your father’s concubines, for he has left them here to look after the palace. Then all Israel will know that you have insulted your father beyond hope of reconciliation, and they will throw their support to you.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: So they set up a tent on the palace roof where everyone could see it, and Absalom went in and had sex with his father’s concubines.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Absalom followed Ahithophel’s advice, just as David had done. For every word Ahithophel spoke seemed as wise as though it had come directly from the mouth of God.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “And where is Mephibosheth, Saul’s grandson?” the king asked him.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “He stayed in Jerusalem,” Ziba replied. “He said, ‘Today I will get back the kingdom of my grandfather Saul.’”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “In that case,” the king told Ziba, “I give you everything Mephibosheth owns.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I bow before you,” Ziba replied. “May I always be pleasing to you, my lord the king.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Shimei Curses David
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'As King David came to Bahurim, a man came out of the village cursing them. It was Shimei son of Gera, from the same clan as Saul’s family. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'He threw stones at the king and the king’s officers and all the mighty warriors who surrounded him. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“Get out of here, you murderer, you scoundrel!” he shouted at David. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is paying you back for all the bloodshed in Saul’s clan. You stole his throne, and now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given it to your son Absalom. At last you will taste some of your own medicine, for you are a murderer!”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Why should this dead dog curse my lord the king?” Abishai son of Zeruiah demanded. “Let me go over and cut off his head!”
