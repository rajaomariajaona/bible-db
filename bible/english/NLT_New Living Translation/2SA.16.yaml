document_id: 2SA.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David and Ziba
  - type: text
    content: When David had gone a little beyond the summit of the Mount of Olives, Ziba, the servant of Mephibosheth,
  - type: note
    content: Mephibosheth is another name for Merib-baal.
  - type: text
    content: ' was waiting there for him. He had two donkeys loaded with 200 loaves of bread, 100 clusters of raisins, 100 bunches of summer fruit, and a wineskin full of wine.'
  '10':
  - type: text
    content: '“No!” the king said. “Who asked your opinion, you sons of Zeruiah! If the '
  - type: text
    content: Lord
  - type: text
    content: ' has told him to curse me, who are you to stop him?”'
  '11':
  - type: text
    content: Then David said to Abishai and to all his servants, “My own son is trying to kill me. Doesn’t this relative of Saul
  - type: note
    content: Hebrew this Benjaminite.
  - type: text
    content: ' have even more reason to do so? Leave him alone and let him curse, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has told him to do it. '
  '12':
  - type: text
    content: 'And perhaps the '
  - type: text
    content: Lord
  - type: text
    content: ' will see that I am being wronged'
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads see my iniquity.
  - type: text
    content: ' and will bless me because of these curses today.” '
  '13':
  - type: text
    content: So David and his men continued down the road, and Shimei kept pace with them on a nearby hillside, cursing and throwing stones and dirt at David.
  '14':
  - type: text
    content: The king and all who were with him grew weary along the way, so they rested when they reached the Jordan River.
  - type: note
    content: As in Greek version (see also 17:16); Hebrew reads when they reached their destination.
  - type: heading
    content: Ahithophel Advises Absalom
  '15':
  - type: text
    content: 'Meanwhile, Absalom and all the army of Israel arrived at Jerusalem, accompanied by Ahithophel. '
  '16':
  - type: text
    content: When David’s friend Hushai the Arkite arrived, he went immediately to see Absalom. “Long live the king!” he exclaimed. “Long live the king!”
  '17':
  - type: text
    content: “Is this the way you treat your friend David?” Absalom asked him. “Why aren’t you with him?”
  '18':
  - type: text
    content: '“I’m here because I belong to the man who is chosen by the '
  - type: text
    content: Lord
  - type: text
    content: ' and by all the men of Israel,” Hushai replied. '
  '19':
  - type: text
    content: “And anyway, why shouldn’t I serve you? Just as I was your father’s adviser, now I will be your adviser!”
  '2':
  - type: text
    content: “What are these for?” the king asked Ziba.
  - type: text
    content: Ziba replied, “The donkeys are for the king’s people to ride on, and the bread and summer fruit are for the young men to eat. The wine is for those who become exhausted in the wilderness.”
  '20':
  - type: text
    content: Then Absalom turned to Ahithophel and asked him, “What should I do next?”
  '21':
  - type: text
    content: 'Ahithophel told him, “Go and sleep with your father’s concubines, for he has left them here to look after the palace. Then all Israel will know that you have insulted your father beyond hope of reconciliation, and they will throw their support to you.” '
  '22':
  - type: text
    content: So they set up a tent on the palace roof where everyone could see it, and Absalom went in and had sex with his father’s concubines.
  '23':
  - type: text
    content: Absalom followed Ahithophel’s advice, just as David had done. For every word Ahithophel spoke seemed as wise as though it had come directly from the mouth of God.
  '3':
  - type: text
    content: “And where is Mephibosheth, Saul’s grandson?” the king asked him.
  - type: text
    content: “He stayed in Jerusalem,” Ziba replied. “He said, ‘Today I will get back the kingdom of my grandfather Saul.’”
  '4':
  - type: text
    content: “In that case,” the king told Ziba, “I give you everything Mephibosheth owns.”
  - type: text
    content: “I bow before you,” Ziba replied. “May I always be pleasing to you, my lord the king.”
  - type: heading
    content: Shimei Curses David
  '5':
  - type: text
    content: 'As King David came to Bahurim, a man came out of the village cursing them. It was Shimei son of Gera, from the same clan as Saul’s family. '
  '6':
  - type: text
    content: 'He threw stones at the king and the king’s officers and all the mighty warriors who surrounded him. '
  '7':
  - type: text
    content: '“Get out of here, you murderer, you scoundrel!” he shouted at David. '
  '8':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is paying you back for all the bloodshed in Saul’s clan. You stole his throne, and now the '
  - type: text
    content: Lord
  - type: text
    content: ' has given it to your son Absalom. At last you will taste some of your own medicine, for you are a murderer!”'
  '9':
  - type: text
    content: “Why should this dead dog curse my lord the king?” Abishai son of Zeruiah demanded. “Let me go over and cut off his head!”
