document_id: PSA.80,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of Asaph, to be sung to the tune “Lilies of the Covenant.”'
  - type: text
    content: Please listen, O Shepherd of Israel,
  - type: text
    content: you who lead Joseph’s descendants like a flock.
  - type: text
    content: O God, enthroned above the cherubim,
  - type: text
    content: display your radiant glory
  '10':
  - type: text
    content: Our shade covered the mountains;
  - type: text
    content: our branches covered the mighty cedars.
  '11':
  - type: text
    content: We spread our branches west to the Mediterranean Sea;
  - type: text
    content: our shoots spread east to the Euphrates River.
  - type: note
    content: Hebrew west to the sea, . . . east to the river.
  '12':
  - type: text
    content: But now, why have you broken down our walls
  - type: text
    content: so that all who pass by may steal our fruit?
  '13':
  - type: text
    content: The wild boar from the forest devours it,
  - type: text
    content: and the wild animals feed on it.
  '14':
  - type: text
    content: Come back, we beg you, O God of Heaven’s Armies.
  - type: text
    content: Look down from heaven and see our plight.
  - type: text
    content: Take care of this grapevine
  '15':
  - type: text
    content: that you yourself have planted,
  - type: text
    content: this son you have raised for yourself.
  '16':
  - type: text
    content: For we are chopped up and burned by our enemies.
  - type: text
    content: May they perish at the sight of your frown.
  '17':
  - type: text
    content: Strengthen the man you love,
  - type: text
    content: the son of your choice.
  '18':
  - type: text
    content: Then we will never abandon you again.
  - type: text
    content: Revive us so we can call on your name once more.
  '19':
  - type: text
    content: 'Turn us again to yourself, O '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies.'
  - type: text
    content: Make your face shine down upon us.
  - type: text
    content: Only then will we be saved.
  '2':
  - type: text
    content: to Ephraim, Benjamin, and Manasseh.
  - type: text
    content: Show us your mighty power.
  - type: text
    content: Come to rescue us!
  '3':
  - type: text
    content: Turn us again to yourself, O God.
  - type: text
    content: Make your face shine down upon us.
  - type: text
    content: Only then will we be saved.
  '4':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies,'
  - type: text
    content: how long will you be angry with our prayers?
  '5':
  - type: text
    content: You have fed us with sorrow
  - type: text
    content: and made us drink tears by the bucketful.
  '6':
  - type: text
    content: You have made us the scorn
  - type: note
    content: As in Syriac version; Hebrew reads the strife.
  - type: text
    content: ' of neighboring nations.'
  - type: text
    content: Our enemies treat us as a joke.
  '7':
  - type: text
    content: Turn us again to yourself, O God of Heaven’s Armies.
  - type: text
    content: Make your face shine down upon us.
  - type: text
    content: Only then will we be saved.
  '8':
  - type: text
    content: You brought us from Egypt like a grapevine;
  - type: text
    content: you drove away the pagan nations and transplanted us into your land.
  '9':
  - type: text
    content: You cleared the ground for us,
  - type: text
    content: and we took root and filled the land.
