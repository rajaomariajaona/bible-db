document_id: PSA.80
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of Asaph, to be sung to the tune “Lilies of the Covenant.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Please listen, O Shepherd of Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who lead Joseph’s descendants like a flock.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O God, enthroned above the cherubim,
- type: usfm
  marker: q2
  children:
  - type: text
    text: display your radiant glory
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: to Ephraim, Benjamin, and Manasseh.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Show us your mighty power.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Come to rescue us!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Turn us again to yourself, O God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Make your face shine down upon us.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Only then will we be saved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Heaven’s Armies,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: how long will you be angry with our prayers?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You have fed us with sorrow
- type: usfm
  marker: q2
  children:
  - type: text
    text: and made us drink tears by the bucketful.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You have made us the scorn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '80:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Syriac version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the strife.
    marker-yv: yv-n
  - type: text
    text: ' of neighboring nations.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Our enemies treat us as a joke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Turn us again to yourself, O God of Heaven’s Armies.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Make your face shine down upon us.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Only then will we be saved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You brought us from Egypt like a grapevine;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you drove away the pagan nations and transplanted us into your land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You cleared the ground for us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and we took root and filled the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Our shade covered the mountains;
- type: usfm
  marker: q2
  children:
  - type: text
    text: our branches covered the mighty cedars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: We spread our branches west to the Mediterranean Sea;
- type: usfm
  marker: q2
  children:
  - type: text
    text: our shoots spread east to the Euphrates River.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '80:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: west to the sea, . . . east to the river.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But now, why have you broken down our walls
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that all who pass by may steal our fruit?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The wild boar from the forest devours it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the wild animals feed on it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Come back, we beg you, O God of Heaven’s Armies.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Look down from heaven and see our plight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take care of this grapevine
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: that you yourself have planted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: this son you have raised for yourself.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For we are chopped up and burned by our enemies.
- type: usfm
  marker: q2
  children:
  - type: text
    text: May they perish at the sight of your frown.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Strengthen the man you love,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the son of your choice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then we will never abandon you again.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Revive us so we can call on your name once more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Turn us again to yourself, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God of Heaven’s Armies.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Make your face shine down upon us.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Only then will we be saved.
