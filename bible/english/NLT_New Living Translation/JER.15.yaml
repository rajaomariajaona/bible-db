document_id: JER.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah’s Inevitable Doom
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Even if Moses and Samuel stood before me pleading for these people, I wouldn’t help them. Away with them! Get them out of my sight! '
  '10':
  - type: text
    content: Then I said,
  - type: text
    content: “What sorrow is mine, my mother.
  - type: text
    content: Oh, that I had died at birth!
  - type: text
    content: I am hated everywhere I go.
  - type: text
    content: I am neither a lender who threatens to foreclose
  - type: text
    content: nor a borrower who refuses to pay—
  - type: text
    content: yet they all curse me.”
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied,'
  - type: text
    content: “I will take care of you, Jeremiah.
  - type: text
    content: Your enemies will ask you to plead on their behalf
  - type: text
    content: in times of trouble and distress.
  '12':
  - type: text
    content: Can a man break a bar of iron from the north,
  - type: text
    content: or a bar of bronze?
  '13':
  - type: text
    content: At no cost to them,
  - type: text
    content: I will hand over your wealth and treasures
  - type: text
    content: as plunder to your enemies,
  - type: text
    content: for sin runs rampant in your land.
  '14':
  - type: text
    content: I will tell your enemies to take you
  - type: text
    content: as captives to a foreign land.
  - type: text
    content: For my anger blazes like a fire
  - type: text
    content: that will burn forever.
  - type: note
    content: As in some Hebrew manuscripts (see also 17:4); most Hebrew manuscripts read will burn against you.
  - type: text
    content: ”
  '15':
  - type: text
    content: Then I said,
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', you know what’s happening to me.'
  - type: text
    content: Please step in and help me. Punish my persecutors!
  - type: text
    content: Please give me time; don’t let me die young.
  - type: text
    content: It’s for your sake that I am suffering.
  '16':
  - type: text
    content: When I discovered your words, I devoured them.
  - type: text
    content: They are my joy and my heart’s delight,
  - type: text
    content: for I bear your name,
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies.'
  '17':
  - type: text
    content: I never joined the people in their merry feasts.
  - type: text
    content: I sat alone because your hand was on me.
  - type: text
    content: I was filled with indignation at their sins.
  '18':
  - type: text
    content: Why then does my suffering continue?
  - type: text
    content: Why is my wound so incurable?
  - type: text
    content: Your help seems as uncertain as a seasonal brook,
  - type: text
    content: like a spring that has gone dry.”
  '19':
  - type: text
    content: 'This is how the '
  - type: text
    content: Lord
  - type: text
    content: ' responds:'
  - type: text
    content: “If you return to me, I will restore you
  - type: text
    content: so you can continue to serve me.
  - type: text
    content: If you speak good words rather than worthless ones,
  - type: text
    content: you will be my spokesman.
  - type: text
    content: You must influence them;
  - type: text
    content: do not let them influence you!
  '2':
  - type: text
    content: 'And if they say to you, ‘But where can we go?’ tell them, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “‘Those who are destined for death, to death;
  - type: text
    content: those who are destined for war, to war;
  - type: text
    content: those who are destined for famine, to famine;
  - type: text
    content: those who are destined for captivity, to captivity.’
  '20':
  - type: text
    content: They will fight against you like an attacking army,
  - type: text
    content: but I will make you as secure as a fortified wall of bronze.
  - type: text
    content: They will not conquer you,
  - type: text
    content: for I am with you to protect and rescue you.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '21':
  - type: text
    content: Yes, I will certainly keep you safe from these wicked men.
  - type: text
    content: I will rescue you from their cruel hands.”
  '3':
  - type: text
    content: '“I will send four kinds of destroyers against them,” says the '
  - type: text
    content: Lord
  - type: text
    content: '. “I will send the sword to kill, the dogs to drag away, the vultures to devour, and the wild animals to finish up what is left. '
  '4':
  - type: text
    content: Because of the wicked things Manasseh son of Hezekiah, king of Judah, did in Jerusalem, I will make my people an object of horror to all the kingdoms of the earth.
  '5':
  - type: text
    content: “Who will feel sorry for you, Jerusalem?
  - type: text
    content: Who will weep for you?
  - type: text
    content: Who will even bother to ask how you are?
  '6':
  - type: text
    content: You have abandoned me
  - type: text
    content: and turned your back on me,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Therefore, I will raise my fist to destroy you.
  - type: text
    content: I am tired of always giving you another chance.
  '7':
  - type: text
    content: I will winnow you like grain at the gates of your cities
  - type: text
    content: and take away the children you hold dear.
  - type: text
    content: I will destroy my own people,
  - type: text
    content: because they refuse to change their evil ways.
  '8':
  - type: text
    content: There will be more widows
  - type: text
    content: than the grains of sand on the seashore.
  - type: text
    content: At noontime I will bring a destroyer
  - type: text
    content: against the mothers of young men.
  - type: text
    content: I will cause anguish and terror
  - type: text
    content: to come upon them suddenly.
  '9':
  - type: text
    content: The mother of seven grows faint and gasps for breath;
  - type: text
    content: her sun has gone down while it is still day.
  - type: text
    content: She sits childless now,
  - type: text
    content: disgraced and humiliated.
  - type: text
    content: And I will hand over those who are left
  - type: text
    content: to be killed by the enemy.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  - type: heading
    content: Jeremiah’s Complaint
