document_id: JER.15,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judah’s Inevitable Doom
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Even if Moses and Samuel stood before me pleading for these people, I wouldn’t help them. Away with them! Get them out of my sight! '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then I said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What sorrow is mine, my mother.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, that I had died at birth!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am hated everywhere I go.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am neither a lender who threatens to foreclose
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor a borrower who refuses to pay—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet they all curse me.”
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replied,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will take care of you, Jeremiah.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your enemies will ask you to plead on their behalf
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in times of trouble and distress.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Can a man break a bar of iron from the north,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or a bar of bronze?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: At no cost to them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will hand over your wealth and treasures
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as plunder to your enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for sin runs rampant in your land.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I will tell your enemies to take you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as captives to a foreign land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my anger blazes like a fire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that will burn forever.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts (see also 17:4); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will burn against you.
      marker-yv: yv-n
    - type: text
      text: ”
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then I said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you know what’s happening to me.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Please step in and help me. Punish my persecutors!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Please give me time; don’t let me die young.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s for your sake that I am suffering.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When I discovered your words, I devoured them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are my joy and my heart’s delight,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I bear your name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Heaven’s Armies.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I never joined the people in their merry feasts.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I sat alone because your hand was on me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I was filled with indignation at their sins.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Why then does my suffering continue?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why is my wound so incurable?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your help seems as uncertain as a seasonal brook,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a spring that has gone dry.”
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'This is how the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' responds:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If you return to me, I will restore you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so you can continue to serve me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you speak good words rather than worthless ones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will be my spokesman.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You must influence them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not let them influence you!
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And if they say to you, ‘But where can we go?’ tell them, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Those who are destined for death, to death;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who are destined for war, to war;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those who are destined for famine, to famine;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who are destined for captivity, to captivity.’
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: They will fight against you like an attacking army,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I will make you as secure as a fortified wall of bronze.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will not conquer you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I am with you to protect and rescue you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Yes, I will certainly keep you safe from these wicked men.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will rescue you from their cruel hands.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“I will send four kinds of destroyers against them,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. “I will send the sword to kill, the dogs to drag away, the vultures to devour, and the wild animals to finish up what is left. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Because of the wicked things Manasseh son of Hezekiah, king of Judah, did in Jerusalem, I will make my people an object of horror to all the kingdoms of the earth.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Who will feel sorry for you, Jerusalem?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who will weep for you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who will even bother to ask how you are?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You have abandoned me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and turned your back on me,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Therefore, I will raise my fist to destroy you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am tired of always giving you another chance.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I will winnow you like grain at the gates of your cities
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and take away the children you hold dear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will destroy my own people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because they refuse to change their evil ways.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: There will be more widows
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than the grains of sand on the seashore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At noontime I will bring a destroyer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against the mothers of young men.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will cause anguish and terror
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to come upon them suddenly.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The mother of seven grows faint and gasps for breath;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her sun has gone down while it is still day.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She sits childless now,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: disgraced and humiliated.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will hand over those who are left
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to be killed by the enemy.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah’s Complaint
    marker-yv: yv-h
