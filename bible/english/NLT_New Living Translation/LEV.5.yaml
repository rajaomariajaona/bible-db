document_id: LEV.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Sins Requiring a Sin Offering
  - type: text
    content: “If you are called to testify about something you have seen or that you know about, it is sinful to refuse to testify, and you will be punished for your sin.
  '10':
  - type: text
    content: 'The priest will then prepare the second bird as a burnt offering, following all the procedures that have been prescribed. Through this process the priest will purify you from your sin, making you right with the '
  - type: text
    content: Lord
  - type: text
    content: ', and you will be forgiven.'
  '11':
  - type: text
    content: “If you cannot afford to bring two turtledoves or two young pigeons, you may bring two quarts
  - type: note
    content: Hebrew 1/10 of an ephah [2.2 liters].
  - type: text
    content: ' of choice flour for your sin offering. Since it is an offering for sin, you must not moisten it with olive oil or put any frankincense on it. '
  '12':
  - type: text
    content: 'Take the flour to the priest, who will scoop out a handful as a representative portion. He will burn it on the altar on top of the special gifts presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. It is an offering for sin. '
  '13':
  - type: text
    content: 'Through this process, the priest will purify those who are guilty of any of these sins, making them right with the '
  - type: text
    content: Lord
  - type: text
    content: ', and they will be forgiven. The rest of the flour will belong to the priest, just as with the grain offering.”'
  - type: heading
    content: Procedures for the Guilt Offering
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '15':
  - type: text
    content: '“If one of you commits a sin by unintentionally defiling the '
  - type: text
    content: Lord
  - type: text
    content: '’s sacred property, you must bring a guilt offering to the '
  - type: text
    content: Lord
  - type: text
    content: . The offering must be your own ram with no defects, or you may buy one of equal value with silver, as measured by the weight of the sanctuary shekel.
  - type: note
    content: Each shekel was about 0.4 ounces or 11 grams in weight.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'You must make restitution for the sacred property you have harmed by paying for the loss, plus an additional 20 percent. When you give the payment to the priest, he will purify you with the ram sacrificed as a guilt offering, making you right with the '
  - type: text
    content: Lord
  - type: text
    content: ', and you will be forgiven.'
  '17':
  - type: text
    content: '“Suppose you sin by violating one of the '
  - type: text
    content: Lord
  - type: text
    content: '’s commands. Even if you are unaware of what you have done, you are guilty and will be punished for your sin. '
  '18':
  - type: text
    content: 'For a guilt offering, you must bring to the priest your own ram with no defects, or you may buy one of equal value. Through this process the priest will purify you from your unintentional sin, making you right with the '
  - type: text
    content: Lord
  - type: text
    content: ', and you will be forgiven. '
  '19':
  - type: text
    content: 'This is a guilt offering, for you have been guilty of an offense against the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '2':
  - type: text
    content: “Or suppose you unknowingly touch something that is ceremonially unclean, such as the carcass of an unclean animal. When you realize what you have done, you must admit your defilement and your guilt. This is true whether it is a wild animal, a domestic animal, or an animal that scurries along the ground.
  '3':
  - type: text
    content: “Or suppose you unknowingly touch something that makes a person unclean. When you realize what you have done, you must admit your guilt.
  '4':
  - type: text
    content: “Or suppose you make a foolish vow of any kind, whether its purpose is for good or for bad. When you realize its foolishness, you must admit your guilt.
  '5':
  - type: text
    content: '“When you become aware of your guilt in any of these ways, you must confess your sin. '
  '6':
  - type: text
    content: 'Then you must bring to the '
  - type: text
    content: Lord
  - type: text
    content: ' as the penalty for your sin a female from the flock, either a sheep or a goat. This is a sin offering with which the priest will purify you from your sin, making you right with the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Or will make atonement for you for your sin; similarly in 5:10, 13, 16, 18.
  '7':
  - type: text
    content: '“But if you cannot afford to bring a sheep, you may bring to the '
  - type: text
    content: Lord
  - type: text
    content: ' two turtledoves or two young pigeons as the penalty for your sin. One of the birds will be for a sin offering, and the other for a burnt offering. '
  '8':
  - type: text
    content: 'You must bring them to the priest, who will present the first bird as the sin offering. He will wring its neck but without severing its head from the body. '
  '9':
  - type: text
    content: 'Then he will sprinkle some of the blood of the sin offering against the sides of the altar, and the rest of the blood will be drained out at the base of the altar. This is an offering for sin. '
