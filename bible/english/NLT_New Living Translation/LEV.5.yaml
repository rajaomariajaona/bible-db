document_id: LEV.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sins Requiring a Sin Offering
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “If you are called to testify about something you have seen or that you know about, it is sinful to refuse to testify, and you will be punished for your sin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Or suppose you unknowingly touch something that is ceremonially unclean, such as the carcass of an unclean animal. When you realize what you have done, you must admit your defilement and your guilt. This is true whether it is a wild animal, a domestic animal, or an animal that scurries along the ground.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Or suppose you unknowingly touch something that makes a person unclean. When you realize what you have done, you must admit your guilt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Or suppose you make a foolish vow of any kind, whether its purpose is for good or for bad. When you realize its foolishness, you must admit your guilt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“When you become aware of your guilt in any of these ways, you must confess your sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then you must bring to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as the penalty for your sin a female from the flock, either a sheep or a goat. This is a sin offering with which the priest will purify you from your sin, making you right with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'will make atonement for you for your sin; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: similarly in 5:10, 13, 16, 18.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“But if you cannot afford to bring a sheep, you may bring to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' two turtledoves or two young pigeons as the penalty for your sin. One of the birds will be for a sin offering, and the other for a burnt offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'You must bring them to the priest, who will present the first bird as the sin offering. He will wring its neck but without severing its head from the body. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then he will sprinkle some of the blood of the sin offering against the sides of the altar, and the rest of the blood will be drained out at the base of the altar. This is an offering for sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The priest will then prepare the second bird as a burnt offering, following all the procedures that have been prescribed. Through this process the priest will purify you from your sin, making you right with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and you will be forgiven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “If you cannot afford to bring two turtledoves or two young pigeons, you may bring two quarts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1/10 of an ephah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2.2 liters].'
    marker-yv: yv-n
  - type: text
    text: ' of choice flour for your sin offering. Since it is an offering for sin, you must not moisten it with olive oil or put any frankincense on it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Take the flour to the priest, who will scoop out a handful as a representative portion. He will burn it on the altar on top of the special gifts presented to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. It is an offering for sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Through this process, the priest will purify those who are guilty of any of these sins, making them right with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and they will be forgiven. The rest of the flour will belong to the priest, just as with the grain offering.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Procedures for the Guilt Offering
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“If one of you commits a sin by unintentionally defiling the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s sacred property, you must bring a guilt offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . The offering must be your own ram with no defects, or you may buy one of equal value with silver, as measured by the weight of the sanctuary shekel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Each shekel was about 0.4 ounces or 11 grams in weight.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'You must make restitution for the sacred property you have harmed by paying for the loss, plus an additional 20 percent. When you give the payment to the priest, he will purify you with the ram sacrificed as a guilt offering, making you right with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and you will be forgiven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Suppose you sin by violating one of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s commands. Even if you are unaware of what you have done, you are guilty and will be punished for your sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For a guilt offering, you must bring to the priest your own ram with no defects, or you may buy one of equal value. Through this process the priest will purify you from your unintentional sin, making you right with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and you will be forgiven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'This is a guilt offering, for you have been guilty of an offense against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
