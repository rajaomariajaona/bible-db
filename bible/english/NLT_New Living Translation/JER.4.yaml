document_id: JER.4,116
type_code: eng
verses:
  '1':
  - type: text
    content: '“O Israel,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “if you wanted to return to me, you could.
  - type: text
    content: You could throw away your detestable idols
  - type: text
    content: and stray away no more.
  '10':
  - type: text
    content: 'Then I said, “O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the people have been deceived by what you said,
  - type: text
    content: for you promised peace for Jerusalem.
  - type: text
    content: But the sword is held at their throats!”
  '11':
  - type: text
    content: 'The time is coming when the '
  - type: text
    content: Lord
  - type: text
    content: ' will say'
  - type: text
    content: to the people of Jerusalem,
  - type: text
    content: “My dear people, a burning wind is blowing in from the desert,
  - type: text
    content: and it’s not a gentle breeze useful for winnowing grain.
  '12':
  - type: text
    content: It is a roaring blast sent by me!
  - type: text
    content: Now I will pronounce your destruction!”
  '13':
  - type: text
    content: Our enemy rushes down on us like storm clouds!
  - type: text
    content: His chariots are like whirlwinds.
  - type: text
    content: His horses are swifter than eagles.
  - type: text
    content: How terrible it will be, for we are doomed!
  '14':
  - type: text
    content: O Jerusalem, cleanse your heart
  - type: text
    content: that you may be saved.
  - type: text
    content: How long will you harbor
  - type: text
    content: your evil thoughts?
  '15':
  - type: text
    content: Your destruction has been announced
  - type: text
    content: from Dan and the hill country of Ephraim.
  '16':
  - type: text
    content: “Warn the surrounding nations
  - type: text
    content: 'and announce this to Jerusalem:'
  - type: text
    content: The enemy is coming from a distant land,
  - type: text
    content: raising a battle cry against the towns of Judah.
  '17':
  - type: text
    content: They surround Jerusalem like watchmen around a field,
  - type: text
    content: for my people have rebelled against me,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '18':
  - type: text
    content: “Your own actions have brought this upon you.
  - type: text
    content: This punishment is bitter, piercing you to the heart!”
  - type: heading
    content: Jeremiah Weeps for His People
  '19':
  - type: text
    content: My heart, my heart—I writhe in pain!
  - type: text
    content: My heart pounds within me! I cannot be still.
  - type: text
    content: For I have heard the blast of enemy trumpets
  - type: text
    content: and the roar of their battle cries.
  '2':
  - type: text
    content: Then when you swear by my name, saying,
  - type: text
    content: '‘As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives,’'
  - type: text
    content: you could do so
  - type: text
    content: with truth, justice, and righteousness.
  - type: text
    content: Then you would be a blessing to the nations of the world,
  - type: text
    content: and all people would come and praise my name.”
  - type: heading
    content: Coming Judgment against Judah
  '20':
  - type: text
    content: Waves of destruction roll over the land,
  - type: text
    content: until it lies in complete desolation.
  - type: text
    content: Suddenly my tents are destroyed;
  - type: text
    content: in a moment my shelters are crushed.
  '21':
  - type: text
    content: How long must I see the battle flags
  - type: text
    content: and hear the trumpets of war?
  '22':
  - type: text
    content: “My people are foolish
  - type: text
    content: 'and do not know me,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “They are stupid children
  - type: text
    content: who have no understanding.
  - type: text
    content: They are clever enough at doing wrong,
  - type: text
    content: but they have no idea how to do right!”
  - type: heading
    content: Jeremiah’s Vision of Coming Disaster
  '23':
  - type: text
    content: I looked at the earth, and it was empty and formless.
  - type: text
    content: I looked at the heavens, and there was no light.
  '24':
  - type: text
    content: I looked at the mountains and hills,
  - type: text
    content: and they trembled and shook.
  '25':
  - type: text
    content: I looked, and all the people were gone.
  - type: text
    content: All the birds of the sky had flown away.
  '26':
  - type: text
    content: I looked, and the fertile fields had become a wilderness.
  - type: text
    content: The towns lay in ruins,
  - type: text
    content: 'crushed by the '
  - type: text
    content: Lord
  - type: text
    content: ’s fierce anger.
  '27':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “The whole land will be ruined,
  - type: text
    content: but I will not destroy it completely.
  '28':
  - type: text
    content: The earth will mourn
  - type: text
    content: and the heavens will be draped in black
  - type: text
    content: because of my decree against my people.
  - type: text
    content: I have made up my mind and will not change it.”
  '29':
  - type: text
    content: At the noise of charioteers and archers,
  - type: text
    content: the people flee in terror.
  - type: text
    content: They hide in the bushes
  - type: text
    content: and run for the mountains.
  - type: text
    content: All the towns have been abandoned—
  - type: text
    content: not a person remains!
  '3':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to the people of Judah and Jerusalem:'
  - type: text
    content: “Plow up the hard ground of your hearts!
  - type: text
    content: Do not waste your good seed among thorns.
  '30':
  - type: text
    content: What are you doing,
  - type: text
    content: you who have been plundered?
  - type: text
    content: Why do you dress up in beautiful clothing
  - type: text
    content: and put on gold jewelry?
  - type: text
    content: Why do you brighten your eyes with mascara?
  - type: text
    content: Your primping will do you no good!
  - type: text
    content: The allies who were your lovers
  - type: text
    content: despise you and seek to kill you.
  '31':
  - type: text
    content: I hear a cry, like that of a woman in labor,
  - type: text
    content: the groans of a woman giving birth to her first child.
  - type: text
    content: It is beautiful Jerusalem
  - type: note
    content: Hebrew the daughter of Zion.
  - type: text
    content: gasping for breath and crying out,
  - type: text
    content: “Help! I’m being murdered!”
  '4':
  - type: text
    content: O people of Judah and Jerusalem,
  - type: text
    content: surrender your pride and power.
  - type: text
    content: 'Change your hearts before the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: Hebrew Circumcise yourselves to the Lord, and take away the foreskins of your heart.
  - type: text
    content: or my anger will burn like an unquenchable fire
  - type: text
    content: because of all your sins.
  '5':
  - type: text
    content: “Shout to Judah, and broadcast to Jerusalem!
  - type: text
    content: 'Tell them to sound the alarm throughout the land:'
  - type: text
    content: ‘Run for your lives!
  - type: text
    content: Flee to the fortified cities!’
  '6':
  - type: text
    content: Raise a signal flag as a warning for Jerusalem
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ':'
  - type: text
    content: ‘Flee now! Do not delay!’
  - type: text
    content: For I am bringing terrible destruction upon you
  - type: text
    content: from the north.”
  '7':
  - type: text
    content: A lion stalks from its den,
  - type: text
    content: a destroyer of nations.
  - type: text
    content: It has left its lair and is headed your way.
  - type: text
    content: It’s going to devastate your land!
  - type: text
    content: Your towns will lie in ruins,
  - type: text
    content: with no one living in them anymore.
  '8':
  - type: text
    content: So put on clothes of mourning
  - type: text
    content: and weep with broken hearts,
  - type: text
    content: 'for the fierce anger of the '
  - type: text
    content: Lord
  - type: text
    content: is still upon us.
  '9':
  - type: text
    content: '“In that day,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “the king and the officials will tremble in fear.
  - type: text
    content: The priests will be struck with horror,
  - type: text
    content: and the prophets will be appalled.”
