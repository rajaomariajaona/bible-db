document_id: JER.4
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“O Israel,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: “if you wanted to return to me, you could.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You could throw away your detestable idols
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stray away no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Then when you swear by my name, saying,
- type: usfm
  marker: q2
  children:
  - type: text
    text: '‘As surely as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lives,’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: you could do so
- type: usfm
  marker: q2
  children:
  - type: text
    text: with truth, justice, and righteousness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then you would be a blessing to the nations of the world,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all people would come and praise my name.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Coming Judgment against Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says to the people of Judah and Jerusalem:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Plow up the hard ground of your hearts!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not waste your good seed among thorns.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: O people of Judah and Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: surrender your pride and power.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Change your hearts before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Circumcise yourselves to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', and take away the foreskins of your heart.'
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: or my anger will burn like an unquenchable fire
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of all your sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Shout to Judah, and broadcast to Jerusalem!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Tell them to sound the alarm throughout the land:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Run for your lives!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Flee to the fortified cities!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raise a signal flag as a warning for Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zion.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Flee now! Do not delay!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I am bringing terrible destruction upon you
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the north.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A lion stalks from its den,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a destroyer of nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It has left its lair and is headed your way.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s going to devastate your land!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your towns will lie in ruins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with no one living in them anymore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So put on clothes of mourning
- type: usfm
  marker: q2
  children:
  - type: text
    text: and weep with broken hearts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for the fierce anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: is still upon us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“In that day,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: “the king and the officials will tremble in fear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The priests will be struck with horror,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the prophets will be appalled.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then I said, “O Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the people have been deceived by what you said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you promised peace for Jerusalem.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the sword is held at their throats!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The time is coming when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will say'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the people of Jerusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “My dear people, a burning wind is blowing in from the desert,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and it’s not a gentle breeze useful for winnowing grain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It is a roaring blast sent by me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Now I will pronounce your destruction!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Our enemy rushes down on us like storm clouds!
- type: usfm
  marker: q2
  children:
  - type: text
    text: His chariots are like whirlwinds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His horses are swifter than eagles.
- type: usfm
  marker: q2
  children:
  - type: text
    text: How terrible it will be, for we are doomed!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: O Jerusalem, cleanse your heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you may be saved.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How long will you harbor
- type: usfm
  marker: q2
  children:
  - type: text
    text: your evil thoughts?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Your destruction has been announced
- type: usfm
  marker: q2
  children:
  - type: text
    text: from Dan and the hill country of Ephraim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Warn the surrounding nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and announce this to Jerusalem:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The enemy is coming from a distant land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: raising a battle cry against the towns of Judah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They surround Jerusalem like watchmen around a field,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for my people have rebelled against me,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Your own actions have brought this upon you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: This punishment is bitter, piercing you to the heart!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah Weeps for His People
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: My heart, my heart—I writhe in pain!
- type: usfm
  marker: q2
  children:
  - type: text
    text: My heart pounds within me! I cannot be still.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I have heard the blast of enemy trumpets
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the roar of their battle cries.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Waves of destruction roll over the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: until it lies in complete desolation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Suddenly my tents are destroyed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in a moment my shelters are crushed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: How long must I see the battle flags
- type: usfm
  marker: q2
  children:
  - type: text
    text: and hear the trumpets of war?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “My people are foolish
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and do not know me,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “They are stupid children
- type: usfm
  marker: q2
  children:
  - type: text
    text: who have no understanding.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are clever enough at doing wrong,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they have no idea how to do right!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah’s Vision of Coming Disaster
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I looked at the earth, and it was empty and formless.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I looked at the heavens, and there was no light.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: I looked at the mountains and hills,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they trembled and shook.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I looked, and all the people were gone.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All the birds of the sky had flown away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I looked, and the fertile fields had become a wilderness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The towns lay in ruins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'crushed by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s fierce anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The whole land will be ruined,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I will not destroy it completely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The earth will mourn
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the heavens will be draped in black
- type: usfm
  marker: q1
  children:
  - type: text
    text: because of my decree against my people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have made up my mind and will not change it.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: At the noise of charioteers and archers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the people flee in terror.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They hide in the bushes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and run for the mountains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the towns have been abandoned—
- type: usfm
  marker: q2
  children:
  - type: text
    text: not a person remains!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: What are you doing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who have been plundered?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why do you dress up in beautiful clothing
- type: usfm
  marker: q2
  children:
  - type: text
    text: and put on gold jewelry?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why do you brighten your eyes with mascara?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your primping will do you no good!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The allies who were your lovers
- type: usfm
  marker: q2
  children:
  - type: text
    text: despise you and seek to kill you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: I hear a cry, like that of a woman in labor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the groans of a woman giving birth to her first child.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is beautiful Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the daughter of Zion.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: gasping for breath and crying out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Help! I’m being murdered!”
