document_id: EZK.45,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Division of the Land
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“When you divide the land among the tribes of Israel, you must set aside a section for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as his holy portion. This piece of land will be 8-1/3 miles long and 6-2/3 miles wide.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version, which reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '25,000 [cubits] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[13.3 kilometers] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long and 20,000 [cubits] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[10.6 kilometers] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'wide; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '25,000 [cubits] long and 10,000 [cubits] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[3-1/3 miles or 5.3 kilometers] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'wide. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare 45:3, 5; 48:9.
      marker-yv: yv-n
    - type: text
      text: ' The entire area will be holy. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Use only honest weights and scales and honest measures, both dry and liquid.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Use honest scales, an honest ephah, and an honest bath.
      marker-yv: yv-n
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The homer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:11a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'homer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: measures about 50 gallons or 220 liters.
      marker-yv: yv-n
    - type: text
      text: ' will be your standard unit for measuring volume. The ephah and the bath'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:11b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ephah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'is a dry measure; the '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'bath '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a liquid measure.
      marker-yv: yv-n
    - type: text
      text: ' will each measure one-tenth of a homer. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The standard unit for weight will be the silver shekel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:12a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'shekel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: weighs about 0.4 ounces or 11 grams.
      marker-yv: yv-n
    - type: text
      text: ' One shekel will consist of twenty gerahs, and sixty shekels will be equal to one mina.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:12b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Elsewhere the '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mina '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is equated to 50 shekels.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Special Offerings and Celebrations
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“You must give this tax to the prince: one bushel of wheat or barley for every 60'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 1/6 of an ephah from each homer of wheat and 1/6 of an ephah from each homer of barley.
      marker-yv: yv-n
    - type: text
      text: ' you harvest, '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: one percent of your olive oil,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the portion of oil, measured by the bath, is 1/10 of a bath from each cor, which consists of 10 baths or 1 homer, for 10 baths are equivalent to a homer.
      marker-yv: yv-n
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'and one sheep or goat for every 200 in your flocks in Israel. These will be the grain offerings, burnt offerings, and peace offerings that will make atonement for the people who bring them, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'All the people of Israel must join in bringing these offerings to the prince. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The prince will be required to provide offerings that are given at the religious festivals, the new moon celebrations, the Sabbath days, and all other similar occasions. He will provide the sin offerings, burnt offerings, grain offerings, liquid offerings, and peace offerings to purify the people of Israel, making them right with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to make atonement for the people of Israel.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: In early spring, on the first day of each new year,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'On the first day of the first month, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: of the Hebrew calendar. This day in the ancient Hebrew lunar calendar occurred in March or April.
      marker-yv: yv-n
    - type: text
      text: ' sacrifice a young bull with no defects to purify the Temple. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priest will take blood from this sin offering and put it on the doorposts of the Temple, the four corners of the upper ledge of the altar, and the gateposts at the entrance to the inner courtyard. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: A section of this land, measuring 875 feet by 875 feet,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:2a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '500 [cubits] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[265 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: by 500 [cubits], a square.
      marker-yv: yv-n
    - type: text
      text: ' will be set aside for the Temple. An additional strip of land 87-1/2 feet'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:2b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '50 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[26.5 meters].'
      marker-yv: yv-n
    - type: text
      text: ' wide is to be left empty all around it. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Do this also on the seventh day of the new year for anyone who has sinned through error or ignorance. In this way, you will purify
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will make atonement for.
      marker-yv: yv-n
    - type: text
      text: ' the Temple.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “On the fourteenth day of the first month,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This day in the ancient Hebrew lunar calendar occurred in late March, April, or early May.
      marker-yv: yv-n
    - type: text
      text: ' you must celebrate the Passover. This festival will last for seven days. The bread you eat during that time must be made without yeast. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the day of Passover the prince will provide a young bull as a sin offering for himself and the people of Israel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On each of the seven days of the feast he will prepare a burnt offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', consisting of seven young bulls and seven rams without defects. A male goat will also be given each day for a sin offering. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The prince will provide a basket of flour as a grain offering and a gallon of olive oil
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'an ephah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[20 quarts or 22 liters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of flour . . . and a hin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[3.8 liters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of olive oil.
      marker-yv: yv-n
    - type: text
      text: ' with each young bull and ram.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “During the seven days of the Festival of Shelters, which occurs every year in early autumn,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the festival which begins on the fifteenth day of the seventh month '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see Lev 23:34). This day in the ancient Hebrew lunar calendar occurred in late September, October, or early November.
      marker-yv: yv-n
    - type: text
      text: ' the prince will provide these same sacrifices for the sin offering, the burnt offering, and the grain offering, along with the required olive oil.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Within the larger sacred area, measure out a portion of land 8-1/3 miles long and 3-1/3 miles wide.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '25,000 [cubits] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[13.3 kilometers] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long and 10,000 [cubits] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[5.3 kilometers] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'wide; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 45:5.
      marker-yv: yv-n
    - type: text
      text: ' Within it the sanctuary of the Most Holy Place will be located. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This area will be holy, set aside for the priests who minister to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the sanctuary. They will use it for their homes, and my Temple will be located within it. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The strip of sacred land next to it, also 8-1/3 miles long and 3-1/3 miles wide, will be a living area for the Levites who work at the Temple. It will be their possession and a place for their towns.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: They will have as their possession 20 rooms.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Adjacent to the larger sacred area will be a section of land 8-1/3 miles long and 1-2/3 miles wide.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '25,000 [cubits] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[13.3 kilometers] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long and 5,000 [cubits] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.65 kilometers] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wide.
      marker-yv: yv-n
    - type: text
      text: ' This will be set aside for a city where anyone in Israel can live.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Two special sections of land will be set apart for the prince. One section will share a border with the east side of the sacred lands and city, and the second section will share a border on the west side. Then the far eastern and western borders of the prince’s lands will line up with the eastern and western boundaries of the tribal areas. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These sections of land will be the prince’s allotment. Then my princes will no longer oppress and rob my people; they will assign the rest of the land to the people, giving an allotment to each tribe.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rules for the Princes
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“For this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Enough, you princes of Israel! Stop your violence and oppression and do what is just and right. Quit robbing and cheating my people out of their land. Stop expelling them from their homes, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
