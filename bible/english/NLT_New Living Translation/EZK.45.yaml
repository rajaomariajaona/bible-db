document_id: EZK.45,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Division of the Land
  - type: text
    content: '“When you divide the land among the tribes of Israel, you must set aside a section for the '
  - type: text
    content: Lord
  - type: text
    content: ' as his holy portion. This piece of land will be 8-1/3 miles long and 6-2/3 miles wide.'
  - type: note
    content: As in Greek version, which reads 25,000 [cubits] [13.3 kilometers] long and 20,000 [cubits] [10.6 kilometers] wide; Hebrew reads 25,000 [cubits] long and 10,000 [cubits] [3-1/3 miles or 5.3 kilometers] wide. Compare 45:3, 5; 48:9.
  - type: text
    content: ' The entire area will be holy. '
  '10':
  - type: text
    content: Use only honest weights and scales and honest measures, both dry and liquid.
  - type: note
    content: Hebrew Use honest scales, an honest ephah, and an honest bath.
  - type: text
    content: ' '
  '11':
  - type: text
    content: The homer
  - type: note
    content: The homer measures about 50 gallons or 220 liters.
  - type: text
    content: ' will be your standard unit for measuring volume. The ephah and the bath'
  - type: note
    content: The ephah is a dry measure; the bath is a liquid measure.
  - type: text
    content: ' will each measure one-tenth of a homer. '
  '12':
  - type: text
    content: The standard unit for weight will be the silver shekel.
  - type: note
    content: The shekel weighs about 0.4 ounces or 11 grams.
  - type: text
    content: ' One shekel will consist of twenty gerahs, and sixty shekels will be equal to one mina.'
  - type: note
    content: Elsewhere the mina is equated to 50 shekels.
  - type: heading
    content: Special Offerings and Celebrations
  '13':
  - type: text
    content: '“You must give this tax to the prince: one bushel of wheat or barley for every 60'
  - type: note
    content: Hebrew 1/6 of an ephah from each homer of wheat and 1/6 of an ephah from each homer of barley.
  - type: text
    content: ' you harvest, '
  '14':
  - type: text
    content: one percent of your olive oil,
  - type: note
    content: Hebrew the portion of oil, measured by the bath, is 1/10 of a bath from each cor, which consists of 10 baths or 1 homer, for 10 baths are equivalent to a homer.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'and one sheep or goat for every 200 in your flocks in Israel. These will be the grain offerings, burnt offerings, and peace offerings that will make atonement for the people who bring them, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'All the people of Israel must join in bringing these offerings to the prince. '
  '17':
  - type: text
    content: 'The prince will be required to provide offerings that are given at the religious festivals, the new moon celebrations, the Sabbath days, and all other similar occasions. He will provide the sin offerings, burnt offerings, grain offerings, liquid offerings, and peace offerings to purify the people of Israel, making them right with the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Or to make atonement for the people of Israel.
  '18':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: In early spring, on the first day of each new year,'
  - type: note
    content: Hebrew On the first day of the first month, of the Hebrew calendar. This day in the ancient Hebrew lunar calendar occurred in March or April.
  - type: text
    content: ' sacrifice a young bull with no defects to purify the Temple. '
  '19':
  - type: text
    content: 'The priest will take blood from this sin offering and put it on the doorposts of the Temple, the four corners of the upper ledge of the altar, and the gateposts at the entrance to the inner courtyard. '
  '2':
  - type: text
    content: A section of this land, measuring 875 feet by 875 feet,
  - type: note
    content: Hebrew 500 [cubits] [265 meters] by 500 [cubits], a square.
  - type: text
    content: ' will be set aside for the Temple. An additional strip of land 87-1/2 feet'
  - type: note
    content: Hebrew 50 cubits [26.5 meters].
  - type: text
    content: ' wide is to be left empty all around it. '
  '20':
  - type: text
    content: Do this also on the seventh day of the new year for anyone who has sinned through error or ignorance. In this way, you will purify
  - type: note
    content: Or will make atonement for.
  - type: text
    content: ' the Temple.'
  '21':
  - type: text
    content: “On the fourteenth day of the first month,
  - type: note
    content: This day in the ancient Hebrew lunar calendar occurred in late March, April, or early May.
  - type: text
    content: ' you must celebrate the Passover. This festival will last for seven days. The bread you eat during that time must be made without yeast. '
  '22':
  - type: text
    content: 'On the day of Passover the prince will provide a young bull as a sin offering for himself and the people of Israel. '
  '23':
  - type: text
    content: 'On each of the seven days of the feast he will prepare a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', consisting of seven young bulls and seven rams without defects. A male goat will also be given each day for a sin offering. '
  '24':
  - type: text
    content: The prince will provide a basket of flour as a grain offering and a gallon of olive oil
  - type: note
    content: Hebrew an ephah [20 quarts or 22 liters] of flour . . . and a hin [3.8 liters] of olive oil.
  - type: text
    content: ' with each young bull and ram.'
  '25':
  - type: text
    content: “During the seven days of the Festival of Shelters, which occurs every year in early autumn,
  - type: note
    content: Hebrew the festival which begins on the fifteenth day of the seventh month (see Lev 23:34). This day in the ancient Hebrew lunar calendar occurred in late September, October, or early November.
  - type: text
    content: ' the prince will provide these same sacrifices for the sin offering, the burnt offering, and the grain offering, along with the required olive oil.'
  '3':
  - type: text
    content: Within the larger sacred area, measure out a portion of land 8-1/3 miles long and 3-1/3 miles wide.
  - type: note
    content: Hebrew 25,000 [cubits] [13.3 kilometers] long and 10,000 [cubits] [5.3 kilometers] wide; also in 45:5.
  - type: text
    content: ' Within it the sanctuary of the Most Holy Place will be located. '
  '4':
  - type: text
    content: 'This area will be holy, set aside for the priests who minister to the '
  - type: text
    content: Lord
  - type: text
    content: ' in the sanctuary. They will use it for their homes, and my Temple will be located within it. '
  '5':
  - type: text
    content: The strip of sacred land next to it, also 8-1/3 miles long and 3-1/3 miles wide, will be a living area for the Levites who work at the Temple. It will be their possession and a place for their towns.
  - type: note
    content: As in Greek version; Hebrew reads They will have as their possession 20 rooms.
  '6':
  - type: text
    content: “Adjacent to the larger sacred area will be a section of land 8-1/3 miles long and 1-2/3 miles wide.
  - type: note
    content: Hebrew 25,000 [cubits] [13.3 kilometers] long and 5,000 [cubits] [2.65 kilometers] wide.
  - type: text
    content: ' This will be set aside for a city where anyone in Israel can live.'
  '7':
  - type: text
    content: '“Two special sections of land will be set apart for the prince. One section will share a border with the east side of the sacred lands and city, and the second section will share a border on the west side. Then the far eastern and western borders of the prince’s lands will line up with the eastern and western boundaries of the tribal areas. '
  '8':
  - type: text
    content: These sections of land will be the prince’s allotment. Then my princes will no longer oppress and rob my people; they will assign the rest of the land to the people, giving an allotment to each tribe.
  - type: heading
    content: Rules for the Princes
  '9':
  - type: text
    content: '“For this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Enough, you princes of Israel! Stop your violence and oppression and do what is just and right. Quit robbing and cheating my people out of their land. Stop expelling them from their homes, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
