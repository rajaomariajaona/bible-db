document_id: ACT.27,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Sails for Rome
  - type: text
    content: When the time came, we set sail for Italy. Paul and several other prisoners were placed in the custody of a Roman officer
  - type: note
    content: Greek centurion; similarly in 27:6, 11, 31, 43.
  - type: text
    content: ' named Julius, a captain of the Imperial Regiment. '
  '10':
  - type: text
    content: '“Men,” he said, “I believe there is trouble ahead if we go on—shipwreck, loss of cargo, and danger to our lives as well.” '
  '11':
  - type: text
    content: 'But the officer in charge of the prisoners listened more to the ship’s captain and the owner than to Paul. '
  '12':
  - type: text
    content: And since Fair Havens was an exposed harbor—a poor place to spend the winter—most of the crew wanted to go on to Phoenix, farther up the coast of Crete, and spend the winter there. Phoenix was a good harbor with only a southwest and northwest exposure.
  - type: heading
    content: The Storm at Sea
  '13':
  - type: text
    content: 'When a light wind began blowing from the south, the sailors thought they could make it. So they pulled up anchor and sailed close to the shore of Crete. '
  '14':
  - type: text
    content: 'But the weather changed abruptly, and a wind of typhoon strength (called a “northeaster”) burst across the island and blew us out to sea. '
  '15':
  - type: text
    content: The sailors couldn’t turn the ship into the wind, so they gave up and let it run before the gale.
  '16':
  - type: text
    content: We sailed along the sheltered side of a small island named Cauda,
  - type: note
    content: Some manuscripts read Clauda.
  - type: text
    content: ' where with great difficulty we hoisted aboard the lifeboat being towed behind us. '
  '17':
  - type: text
    content: Then the sailors bound ropes around the hull of the ship to strengthen it. They were afraid of being driven across to the sandbars of Syrtis off the African coast, so they lowered the sea anchor to slow the ship and were driven before the wind.
  '18':
  - type: text
    content: 'The next day, as gale-force winds continued to batter the ship, the crew began throwing the cargo overboard. '
  '19':
  - type: text
    content: 'The following day they even took some of the ship’s gear and threw it overboard. '
  '2':
  - type: text
    content: Aristarchus, a Macedonian from Thessalonica, was also with us. We left on a ship whose home port was Adramyttium on the northwest coast of the province of Asia;
  - type: note
    content: Asia was a Roman province in what is now western Turkey.
  - type: text
    content: ' it was scheduled to make several stops at ports along the coast of the province.'
  '20':
  - type: text
    content: The terrible storm raged for many days, blotting out the sun and the stars, until at last all hope was gone.
  '21':
  - type: text
    content: 'No one had eaten for a long time. Finally, Paul called the crew together and said, “Men, you should have listened to me in the first place and not left Crete. You would have avoided all this damage and loss. '
  '22':
  - type: text
    content: 'But take courage! None of you will lose your lives, even though the ship will go down. '
  '23':
  - type: text
    content: 'For last night an angel of the God to whom I belong and whom I serve stood beside me, '
  '24':
  - type: text
    content: 'and he said, ‘Don’t be afraid, Paul, for you will surely stand trial before Caesar! What’s more, God in his goodness has granted safety to everyone sailing with you.’ '
  '25':
  - type: text
    content: 'So take courage! For I believe God. It will be just as he said. '
  '26':
  - type: text
    content: But we will be shipwrecked on an island.”
  - type: heading
    content: The Shipwreck
  '27':
  - type: text
    content: About midnight on the fourteenth night of the storm, as we were being driven across the Sea of Adria,
  - type: note
    content: The Sea of Adria includes the central portion of the Mediterranean.
  - type: text
    content: ' the sailors sensed land was near. '
  '28':
  - type: text
    content: They dropped a weighted line and found that the water was 120 feet deep. But a little later they measured again and found it was only 90 feet deep.
  - type: note
    content: Greek 20 fathoms . . . 15 fathoms [37 meters . . . 27 meters].
  - type: text
    content: ' '
  '29':
  - type: text
    content: At this rate they were afraid we would soon be driven against the rocks along the shore, so they threw out four anchors from the back of the ship and prayed for daylight.
  '3':
  - type: text
    content: 'The next day when we docked at Sidon, Julius was very kind to Paul and let him go ashore to visit with friends so they could provide for his needs. '
  '30':
  - type: text
    content: 'Then the sailors tried to abandon the ship; they lowered the lifeboat as though they were going to put out anchors from the front of the ship. '
  '31':
  - type: text
    content: 'But Paul said to the commanding officer and the soldiers, “You will all die unless the sailors stay aboard.” '
  '32':
  - type: text
    content: So the soldiers cut the ropes to the lifeboat and let it drift away.
  '33':
  - type: text
    content: 'Just as day was dawning, Paul urged everyone to eat. “You have been so worried that you haven’t touched food for two weeks,” he said. '
  '34':
  - type: text
    content: '“Please eat something now for your own good. For not a hair of your heads will perish.” '
  '35':
  - type: text
    content: 'Then he took some bread, gave thanks to God before them all, and broke off a piece and ate it. '
  '36':
  - type: text
    content: 'Then everyone was encouraged and began to eat— '
  '37':
  - type: text
    content: 'all 276 of us who were on board. '
  '38':
  - type: text
    content: After eating, the crew lightened the ship further by throwing the cargo of wheat overboard.
  '39':
  - type: text
    content: 'When morning dawned, they didn’t recognize the coastline, but they saw a bay with a beach and wondered if they could get to shore by running the ship aground. '
  '4':
  - type: text
    content: 'Putting out to sea from there, we encountered strong headwinds that made it difficult to keep the ship on course, so we sailed north of Cyprus between the island and the mainland. '
  '40':
  - type: text
    content: 'So they cut off the anchors and left them in the sea. Then they lowered the rudders, raised the foresail, and headed toward shore. '
  '41':
  - type: text
    content: But they hit a shoal and ran the ship aground too soon. The bow of the ship stuck fast, while the stern was repeatedly smashed by the force of the waves and began to break apart.
  '42':
  - type: text
    content: 'The soldiers wanted to kill the prisoners to make sure they didn’t swim ashore and escape. '
  '43':
  - type: text
    content: 'But the commanding officer wanted to spare Paul, so he didn’t let them carry out their plan. Then he ordered all who could swim to jump overboard first and make for land. '
  '44':
  - type: text
    content: The others held on to planks or debris from the broken ship.
  - type: note
    content: Or or were helped by members of the ship’s crew.
  - type: text
    content: ' So everyone escaped safely to shore.'
  '5':
  - type: text
    content: 'Keeping to the open sea, we passed along the coast of Cilicia and Pamphylia, landing at Myra, in the province of Lycia. '
  '6':
  - type: text
    content: There the commanding officer found an Egyptian ship from Alexandria that was bound for Italy, and he put us on board.
  '7':
  - type: text
    content: 'We had several days of slow sailing, and after great difficulty we finally neared Cnidus. But the wind was against us, so we sailed across to Crete and along the sheltered coast of the island, past the cape of Salmone. '
  '8':
  - type: text
    content: 'We struggled along the coast with great difficulty and finally arrived at Fair Havens, near the town of Lasea. '
  '9':
  - type: text
    content: We had lost a lot of time. The weather was becoming dangerous for sea travel because it was so late in the fall,
  - type: note
    content: Greek because the fast was now already gone by. This fast was associated with the Day of Atonement (Yom Kippur), which occurred in late September or early October.
  - type: text
    content: ' and Paul spoke to the ship’s officers about it.'
