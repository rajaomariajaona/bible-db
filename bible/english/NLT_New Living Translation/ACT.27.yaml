document_id: ACT.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Sails for Rome
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When the time came, we set sail for Italy. Paul and several other prisoners were placed in the custody of a Roman officer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'centurion; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: similarly in 27:6, 11, 31, 43.
    marker-yv: yv-n
  - type: text
    text: ' named Julius, a captain of the Imperial Regiment. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aristarchus, a Macedonian from Thessalonica, was also with us. We left on a ship whose home port was Adramyttium on the northwest coast of the province of Asia;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:2 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Asia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was a Roman province in what is now western Turkey.
    marker-yv: yv-n
  - type: text
    text: ' it was scheduled to make several stops at ports along the coast of the province.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The next day when we docked at Sidon, Julius was very kind to Paul and let him go ashore to visit with friends so they could provide for his needs. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Putting out to sea from there, we encountered strong headwinds that made it difficult to keep the ship on course, so we sailed north of Cyprus between the island and the mainland. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Keeping to the open sea, we passed along the coast of Cilicia and Pamphylia, landing at Myra, in the province of Lycia. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: There the commanding officer found an Egyptian ship from Alexandria that was bound for Italy, and he put us on board.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'We had several days of slow sailing, and after great difficulty we finally neared Cnidus. But the wind was against us, so we sailed across to Crete and along the sheltered coast of the island, past the cape of Salmone. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'We struggled along the coast with great difficulty and finally arrived at Fair Havens, near the town of Lasea. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: We had lost a lot of time. The weather was becoming dangerous for sea travel because it was so late in the fall,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'because the fast was now already gone by. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This fast was associated with the Day of Atonement (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Yom Kippur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), which occurred in late September or early October.
    marker-yv: yv-n
  - type: text
    text: ' and Paul spoke to the ship’s officers about it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Men,” he said, “I believe there is trouble ahead if we go on—shipwreck, loss of cargo, and danger to our lives as well.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But the officer in charge of the prisoners listened more to the ship’s captain and the owner than to Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And since Fair Havens was an exposed harbor—a poor place to spend the winter—most of the crew wanted to go on to Phoenix, farther up the coast of Crete, and spend the winter there. Phoenix was a good harbor with only a southwest and northwest exposure.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Storm at Sea
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When a light wind began blowing from the south, the sailors thought they could make it. So they pulled up anchor and sailed close to the shore of Crete. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But the weather changed abruptly, and a wind of typhoon strength (called a “northeaster”) burst across the island and blew us out to sea. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The sailors couldn’t turn the ship into the wind, so they gave up and let it run before the gale.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: We sailed along the sheltered side of a small island named Cauda,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Clauda.
    marker-yv: yv-n
  - type: text
    text: ' where with great difficulty we hoisted aboard the lifeboat being towed behind us. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then the sailors bound ropes around the hull of the ship to strengthen it. They were afraid of being driven across to the sandbars of Syrtis off the African coast, so they lowered the sea anchor to slow the ship and were driven before the wind.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The next day, as gale-force winds continued to batter the ship, the crew began throwing the cargo overboard. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The following day they even took some of the ship’s gear and threw it overboard. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The terrible storm raged for many days, blotting out the sun and the stars, until at last all hope was gone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'No one had eaten for a long time. Finally, Paul called the crew together and said, “Men, you should have listened to me in the first place and not left Crete. You would have avoided all this damage and loss. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But take courage! None of you will lose your lives, even though the ship will go down. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For last night an angel of the God to whom I belong and whom I serve stood beside me, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and he said, ‘Don’t be afraid, Paul, for you will surely stand trial before Caesar! What’s more, God in his goodness has granted safety to everyone sailing with you.’ '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So take courage! For I believe God. It will be just as he said. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: But we will be shipwrecked on an island.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Shipwreck
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: About midnight on the fourteenth night of the storm, as we were being driven across the Sea of Adria,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sea of Adria '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: includes the central portion of the Mediterranean.
    marker-yv: yv-n
  - type: text
    text: ' the sailors sensed land was near. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: They dropped a weighted line and found that the water was 120 feet deep. But a little later they measured again and found it was only 90 feet deep.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '20 fathoms . . . 15 fathoms '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[37 meters . . . 27 meters].'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: At this rate they were afraid we would soon be driven against the rocks along the shore, so they threw out four anchors from the back of the ship and prayed for daylight.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then the sailors tried to abandon the ship; they lowered the lifeboat as though they were going to put out anchors from the front of the ship. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'But Paul said to the commanding officer and the soldiers, “You will all die unless the sailors stay aboard.” '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: So the soldiers cut the ropes to the lifeboat and let it drift away.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Just as day was dawning, Paul urged everyone to eat. “You have been so worried that you haven’t touched food for two weeks,” he said. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '“Please eat something now for your own good. For not a hair of your heads will perish.” '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then he took some bread, gave thanks to God before them all, and broke off a piece and ate it. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Then everyone was encouraged and began to eat— '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'all 276 of us who were on board. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: After eating, the crew lightened the ship further by throwing the cargo of wheat overboard.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'When morning dawned, they didn’t recognize the coastline, but they saw a bay with a beach and wondered if they could get to shore by running the ship aground. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'So they cut off the anchors and left them in the sea. Then they lowered the rudders, raised the foresail, and headed toward shore. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: But they hit a shoal and ran the ship aground too soon. The bow of the ship stuck fast, while the stern was repeatedly smashed by the force of the waves and began to break apart.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'The soldiers wanted to kill the prisoners to make sure they didn’t swim ashore and escape. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'But the commanding officer wanted to spare Paul, so he didn’t let them carry out their plan. Then he ordered all who could swim to jump overboard first and make for land. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: The others held on to planks or debris from the broken ship.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: or were helped by members of the ship’s crew.
    marker-yv: yv-n
  - type: text
    text: ' So everyone escaped safely to shore.'
