document_id: PRO.19,116
type_code: eng
verses:
  '1':
  - type: text
    content: Better to be poor and honest
  - type: text
    content: than to be dishonest and a fool.
  '10':
  - type: text
    content: It isn’t right for a fool to live in luxury
  - type: text
    content: or for a slave to rule over princes!
  '11':
  - type: text
    content: Sensible people control their temper;
  - type: text
    content: they earn respect by overlooking wrongs.
  '12':
  - type: text
    content: The king’s anger is like a lion’s roar,
  - type: text
    content: but his favor is like dew on the grass.
  '13':
  - type: text
    content: A foolish child
  - type: note
    content: Hebrew son; also in 19:27.
  - type: text
    content: ' is a calamity to a father;'
  - type: text
    content: a quarrelsome wife is as annoying as constant dripping.
  '14':
  - type: text
    content: Fathers can give their sons an inheritance of houses and wealth,
  - type: text
    content: 'but only the '
  - type: text
    content: Lord
  - type: text
    content: ' can give an understanding wife.'
  '15':
  - type: text
    content: Lazy people sleep soundly,
  - type: text
    content: but idleness leaves them hungry.
  '16':
  - type: text
    content: Keep the commandments and keep your life;
  - type: text
    content: despising them leads to death.
  '17':
  - type: text
    content: 'If you help the poor, you are lending to the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: and he will repay you!
  '18':
  - type: text
    content: Discipline your children while there is hope.
  - type: text
    content: Otherwise you will ruin their lives.
  '19':
  - type: text
    content: Hot-tempered people must pay the penalty.
  - type: text
    content: If you rescue them once, you will have to do it again.
  '2':
  - type: text
    content: Enthusiasm without knowledge is no good;
  - type: text
    content: haste makes mistakes.
  '20':
  - type: text
    content: Get all the advice and instruction you can,
  - type: text
    content: so you will be wise the rest of your life.
  '21':
  - type: text
    content: You can make many plans,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ’s purpose will prevail.
  '22':
  - type: text
    content: Loyalty makes a person attractive.
  - type: text
    content: It is better to be poor than dishonest.
  '23':
  - type: text
    content: 'Fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' leads to life,'
  - type: text
    content: bringing security and protection from harm.
  '24':
  - type: text
    content: Lazy people take food in their hand
  - type: text
    content: but don’t even lift it to their mouth.
  '25':
  - type: text
    content: If you punish a mocker, the simpleminded will learn a lesson;
  - type: text
    content: if you correct the wise, they will be all the wiser.
  '26':
  - type: text
    content: Children who mistreat their father or chase away their mother
  - type: text
    content: are an embarrassment and a public disgrace.
  '27':
  - type: text
    content: If you stop listening to instruction, my child,
  - type: text
    content: you will turn your back on knowledge.
  '28':
  - type: text
    content: A corrupt witness makes a mockery of justice;
  - type: text
    content: the mouth of the wicked gulps down evil.
  '29':
  - type: text
    content: Punishment is made for mockers,
  - type: text
    content: and the backs of fools are made to be beaten.
  '3':
  - type: text
    content: People ruin their lives by their own foolishness
  - type: text
    content: 'and then are angry at the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: Wealth makes many “friends”;
  - type: text
    content: poverty drives them all away.
  '5':
  - type: text
    content: A false witness will not go unpunished,
  - type: text
    content: nor will a liar escape.
  '6':
  - type: text
    content: Many seek favors from a ruler;
  - type: text
    content: everyone is the friend of a person who gives gifts!
  '7':
  - type: text
    content: The relatives of the poor despise them;
  - type: text
    content: how much more will their friends avoid them!
  - type: text
    content: Though the poor plead with them,
  - type: text
    content: their friends are gone.
  '8':
  - type: text
    content: To acquire wisdom is to love yourself;
  - type: text
    content: people who cherish understanding will prosper.
  '9':
  - type: text
    content: A false witness will not go unpunished,
  - type: text
    content: and a liar will be destroyed.
