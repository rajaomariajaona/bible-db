document_id: PRO.19,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Better to be poor and honest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than to be dishonest and a fool.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: It isn’t right for a fool to live in luxury
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or for a slave to rule over princes!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Sensible people control their temper;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they earn respect by overlooking wrongs.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The king’s anger is like a lion’s roar,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but his favor is like dew on the grass.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: A foolish child
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 19:27.
      marker-yv: yv-n
    - type: text
      text: ' is a calamity to a father;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a quarrelsome wife is as annoying as constant dripping.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fathers can give their sons an inheritance of houses and wealth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but only the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' can give an understanding wife.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Lazy people sleep soundly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but idleness leaves them hungry.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Keep the commandments and keep your life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: despising them leads to death.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'If you help the poor, you are lending to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will repay you!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Discipline your children while there is hope.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Otherwise you will ruin their lives.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Hot-tempered people must pay the penalty.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If you rescue them once, you will have to do it again.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Enthusiasm without knowledge is no good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: haste makes mistakes.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Get all the advice and instruction you can,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so you will be wise the rest of your life.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: You can make many plans,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s purpose will prevail.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Loyalty makes a person attractive.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It is better to be poor than dishonest.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' leads to life,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bringing security and protection from harm.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Lazy people take food in their hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but don’t even lift it to their mouth.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: If you punish a mocker, the simpleminded will learn a lesson;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if you correct the wise, they will be all the wiser.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Children who mistreat their father or chase away their mother
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are an embarrassment and a public disgrace.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: If you stop listening to instruction, my child,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will turn your back on knowledge.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: A corrupt witness makes a mockery of justice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the mouth of the wicked gulps down evil.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Punishment is made for mockers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the backs of fools are made to be beaten.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: People ruin their lives by their own foolishness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and then are angry at the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Wealth makes many “friends”;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: poverty drives them all away.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: A false witness will not go unpunished,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor will a liar escape.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Many seek favors from a ruler;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone is the friend of a person who gives gifts!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The relatives of the poor despise them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how much more will their friends avoid them!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though the poor plead with them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their friends are gone.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: To acquire wisdom is to love yourself;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: people who cherish understanding will prosper.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: A false witness will not go unpunished,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a liar will be destroyed.
