document_id: PSA.141
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I am calling to you. Please hurry!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen when I cry to you for help!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Accept my prayer as incense offered to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my upraised hands as an evening offering.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Take control of what I say, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and guard my lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Don’t let me drift toward evil
- type: usfm
  marker: q2
  children:
  - type: text
    text: or take part in acts of wickedness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t let me share in the delicacies
- type: usfm
  marker: q2
  children:
  - type: text
    text: of those who do wrong.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Let the godly strike me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: It will be a kindness!
- type: usfm
  marker: q1
  children:
  - type: text
    text: If they correct me, it is soothing medicine.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t let me refuse it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I pray constantly
- type: usfm
  marker: q2
  children:
  - type: text
    text: against the wicked and their deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When their leaders are thrown down from a cliff,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wicked will listen to my words and find them true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Like rocks brought up by a plow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the bones of the wicked will lie scattered without burial.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '141:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: our bones will be scattered at the mouth of Sheol.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I look to you for help, O Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are my refuge; don’t let them kill me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Keep me from the traps they have set for me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the snares of those who do wrong.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Let the wicked fall into their own nets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but let me escape.
