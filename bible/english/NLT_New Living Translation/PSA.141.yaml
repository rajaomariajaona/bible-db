document_id: PSA.141,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', I am calling to you. Please hurry!'
  - type: text
    content: Listen when I cry to you for help!
  '10':
  - type: text
    content: Let the wicked fall into their own nets,
  - type: text
    content: but let me escape.
  '2':
  - type: text
    content: Accept my prayer as incense offered to you,
  - type: text
    content: and my upraised hands as an evening offering.
  '3':
  - type: text
    content: 'Take control of what I say, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and guard my lips.
  '4':
  - type: text
    content: Don’t let me drift toward evil
  - type: text
    content: or take part in acts of wickedness.
  - type: text
    content: Don’t let me share in the delicacies
  - type: text
    content: of those who do wrong.
  '5':
  - type: text
    content: Let the godly strike me!
  - type: text
    content: It will be a kindness!
  - type: text
    content: If they correct me, it is soothing medicine.
  - type: text
    content: Don’t let me refuse it.
  - type: text
    content: But I pray constantly
  - type: text
    content: against the wicked and their deeds.
  '6':
  - type: text
    content: When their leaders are thrown down from a cliff,
  - type: text
    content: the wicked will listen to my words and find them true.
  '7':
  - type: text
    content: Like rocks brought up by a plow,
  - type: text
    content: the bones of the wicked will lie scattered without burial.
  - type: note
    content: Hebrew our bones will be scattered at the mouth of Sheol.
  '8':
  - type: text
    content: 'I look to you for help, O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: You are my refuge; don’t let them kill me.
  '9':
  - type: text
    content: Keep me from the traps they have set for me,
  - type: text
    content: from the snares of those who do wrong.
