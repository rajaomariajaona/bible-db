document_id: MAT.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals a Paralyzed Man
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus climbed into a boat and went back across the lake to his own town. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Later, Matthew invited Jesus and his disciples to his home as dinner guests, along with many tax collectors and other disreputable sinners. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when the Pharisees saw this, they asked his disciples, “Why does your teacher eat with such scum?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: with tax collectors and sinners?
      marker-yv: yv-n
    - type: text
      text: ”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus heard this, he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Healthy people don’t need a doctor—sick people do.”
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he added, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Now go and learn the meaning of this Scripture: ‘I want you to show mercy, not offer sacrifices.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hos 6:6 (Greek version).
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For I have come to call not those who think they are righteous, but those who know they are sinners.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Discussion about Fasting
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: One day the disciples of John the Baptist came to Jesus and asked him, “Why don’t your disciples fast
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fast often.
      marker-yv: yv-n
    - type: text
      text: ' like we do and the Pharisees do?”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do wedding guests mourn while celebrating with the groom? Of course not. But someday the groom will be taken away from them, and then they will fast.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Besides, who would patch old clothing with new cloth? For the new patch would shrink and rip away from the old cloth, leaving an even bigger tear than before.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And no one puts new wine into old wineskins. For the old skins would burst from the pressure, spilling the wine and ruining the skins. New wine is stored in new wineskins so that both are preserved.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals in Response to Faith
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: As Jesus was saying this, the leader of a synagogue came and knelt before him. “My daughter has just died,” he said, “but you can bring her back to life again if you just come and lay your hand on her.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jesus and his disciples got up and went with him. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Some people brought to him a paralyzed man on a mat. Seeing their faith, Jesus said to the paralyzed man, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Be encouraged, my child! Your sins are forgiven.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just then a woman who had suffered for twelve years with constant bleeding came up behind him. She touched the fringe of his robe, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for she thought, “If I can just touch his robe, I will be healed.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus turned around, and when he saw her he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Daughter, be encouraged! Your faith has made you well.”
    - type: text
      text: ' And the woman was healed at that moment.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus arrived at the official’s home, he saw the noisy crowd and heard the funeral music. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Get out!” '
    - type: text
      text: 'he told them. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The girl isn’t dead; she’s only asleep.”
    - type: text
      text: ' But the crowd laughed at him. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the crowd was put outside, however, Jesus went in and took the girl by the hand, and she stood up! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The report of this miracle swept through the entire countryside.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals the Blind
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: After Jesus left the girl’s home, two blind men followed along behind him, shouting, “Son of David, have mercy on us!”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They went right into the house where he was staying, and Jesus asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you believe I can make you see?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, Lord,” they told him, “we do.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he touched their eyes and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Because of your faith, it will happen.”
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But some of the teachers of religious law said to themselves, “That’s blasphemy! Does he think he’s God?”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then their eyes were opened, and they could see! Jesus sternly warned them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t tell anyone about this.”
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But instead, they went out and spread his fame all over the region.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they left, a demon-possessed man who couldn’t speak was brought to Jesus. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Jesus cast out the demon, and then the man began to speak. The crowds were amazed. “Nothing like this has ever happened in Israel!” they exclaimed.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the Pharisees said, “He can cast out demons because he is empowered by the prince of demons.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Need for Workers
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus traveled through all the towns and villages of that area, teaching in the synagogues and announcing the Good News about the Kingdom. And he healed every kind of disease and illness. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When he saw the crowds, he had compassion on them because they were confused and helpless, like sheep without a shepherd. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He said to his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The harvest is great, but the workers are few.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So pray to the Lord who is in charge of the harvest; ask him to send more workers into his fields.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus knew
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: saw.
      marker-yv: yv-n
    - type: text
      text: ' what they were thinking, so he asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why do you have such evil thoughts in your hearts?
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Is it easier to say ‘Your sins are forgiven,’ or ‘Stand up and walk’?
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So I will prove to you that the Son of Man
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: has the authority on earth to forgive sins.”
    - type: text
      text: ' Then Jesus turned to the paralyzed man and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Stand up, pick up your mat, and go home!”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the man jumped up and went home! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fear swept through the crowd as they saw this happen. And they praised God for giving humans such authority.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Calls Matthew
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As Jesus was walking along, he saw a man named Matthew sitting at his tax collector’s booth. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Follow me and be my disciple,” '
    - type: text
      text: Jesus said to him. So Matthew got up and followed him.
