document_id: MAT.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals a Paralyzed Man
  - type: text
    content: 'Jesus climbed into a boat and went back across the lake to his own town. '
  '10':
  - type: text
    content: 'Later, Matthew invited Jesus and his disciples to his home as dinner guests, along with many tax collectors and other disreputable sinners. '
  '11':
  - type: text
    content: But when the Pharisees saw this, they asked his disciples, “Why does your teacher eat with such scum?
  - type: note
    content: Greek with tax collectors and sinners?
  - type: text
    content: ”
  '12':
  - type: text
    content: 'When Jesus heard this, he said, '
  - type: text
    content: “Healthy people don’t need a doctor—sick people do.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Then he added, '
  - type: text
    content: '“Now go and learn the meaning of this Scripture: ‘I want you to show mercy, not offer sacrifices.’'
  - type: note
    content: Hos 6:6 (Greek version).
  - type: text
    content: ' '
  - type: text
    content: For I have come to call not those who think they are righteous, but those who know they are sinners.”
  - type: heading
    content: A Discussion about Fasting
  '14':
  - type: text
    content: One day the disciples of John the Baptist came to Jesus and asked him, “Why don’t your disciples fast
  - type: note
    content: Some manuscripts read fast often.
  - type: text
    content: ' like we do and the Pharisees do?”'
  '15':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Do wedding guests mourn while celebrating with the groom? Of course not. But someday the groom will be taken away from them, and then they will fast.
  '16':
  - type: text
    content: ' '
  - type: text
    content: “Besides, who would patch old clothing with new cloth? For the new patch would shrink and rip away from the old cloth, leaving an even bigger tear than before.
  '17':
  - type: text
    content: ' '
  - type: text
    content: “And no one puts new wine into old wineskins. For the old skins would burst from the pressure, spilling the wine and ruining the skins. New wine is stored in new wineskins so that both are preserved.”
  - type: heading
    content: Jesus Heals in Response to Faith
  '18':
  - type: text
    content: As Jesus was saying this, the leader of a synagogue came and knelt before him. “My daughter has just died,” he said, “but you can bring her back to life again if you just come and lay your hand on her.”
  '19':
  - type: text
    content: 'So Jesus and his disciples got up and went with him. '
  '2':
  - type: text
    content: 'Some people brought to him a paralyzed man on a mat. Seeing their faith, Jesus said to the paralyzed man, '
  - type: text
    content: “Be encouraged, my child! Your sins are forgiven.”
  '20':
  - type: text
    content: 'Just then a woman who had suffered for twelve years with constant bleeding came up behind him. She touched the fringe of his robe, '
  '21':
  - type: text
    content: for she thought, “If I can just touch his robe, I will be healed.”
  '22':
  - type: text
    content: 'Jesus turned around, and when he saw her he said, '
  - type: text
    content: “Daughter, be encouraged! Your faith has made you well.”
  - type: text
    content: ' And the woman was healed at that moment.'
  '23':
  - type: text
    content: 'When Jesus arrived at the official’s home, he saw the noisy crowd and heard the funeral music. '
  '24':
  - type: text
    content: '“Get out!” '
  - type: text
    content: 'he told them. '
  - type: text
    content: “The girl isn’t dead; she’s only asleep.”
  - type: text
    content: ' But the crowd laughed at him. '
  '25':
  - type: text
    content: 'After the crowd was put outside, however, Jesus went in and took the girl by the hand, and she stood up! '
  '26':
  - type: text
    content: The report of this miracle swept through the entire countryside.
  - type: heading
    content: Jesus Heals the Blind
  '27':
  - type: text
    content: After Jesus left the girl’s home, two blind men followed along behind him, shouting, “Son of David, have mercy on us!”
  '28':
  - type: text
    content: 'They went right into the house where he was staying, and Jesus asked them, '
  - type: text
    content: “Do you believe I can make you see?”
  - type: text
    content: “Yes, Lord,” they told him, “we do.”
  '29':
  - type: text
    content: 'Then he touched their eyes and said, '
  - type: text
    content: “Because of your faith, it will happen.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: But some of the teachers of religious law said to themselves, “That’s blasphemy! Does he think he’s God?”
  '30':
  - type: text
    content: 'Then their eyes were opened, and they could see! Jesus sternly warned them, '
  - type: text
    content: “Don’t tell anyone about this.”
  - type: text
    content: ' '
  '31':
  - type: text
    content: But instead, they went out and spread his fame all over the region.
  '32':
  - type: text
    content: 'When they left, a demon-possessed man who couldn’t speak was brought to Jesus. '
  '33':
  - type: text
    content: So Jesus cast out the demon, and then the man began to speak. The crowds were amazed. “Nothing like this has ever happened in Israel!” they exclaimed.
  '34':
  - type: text
    content: But the Pharisees said, “He can cast out demons because he is empowered by the prince of demons.”
  - type: heading
    content: The Need for Workers
  '35':
  - type: text
    content: 'Jesus traveled through all the towns and villages of that area, teaching in the synagogues and announcing the Good News about the Kingdom. And he healed every kind of disease and illness. '
  '36':
  - type: text
    content: 'When he saw the crowds, he had compassion on them because they were confused and helpless, like sheep without a shepherd. '
  '37':
  - type: text
    content: 'He said to his disciples, '
  - type: text
    content: “The harvest is great, but the workers are few.
  - type: text
    content: ' '
  '38':
  - type: text
    content: So pray to the Lord who is in charge of the harvest; ask him to send more workers into his fields.”
  '4':
  - type: text
    content: Jesus knew
  - type: note
    content: Some manuscripts read saw.
  - type: text
    content: ' what they were thinking, so he asked them, '
  - type: text
    content: “Why do you have such evil thoughts in your hearts?
  - type: text
    content: ' '
  '5':
  - type: text
    content: Is it easier to say ‘Your sins are forgiven,’ or ‘Stand up and walk’?
  - type: text
    content: ' '
  '6':
  - type: text
    content: So I will prove to you that the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: has the authority on earth to forgive sins.”
  - type: text
    content: ' Then Jesus turned to the paralyzed man and said, '
  - type: text
    content: “Stand up, pick up your mat, and go home!”
  '7':
  - type: text
    content: 'And the man jumped up and went home! '
  '8':
  - type: text
    content: Fear swept through the crowd as they saw this happen. And they praised God for giving humans such authority.
  - type: heading
    content: Jesus Calls Matthew
  '9':
  - type: text
    content: 'As Jesus was walking along, he saw a man named Matthew sitting at his tax collector’s booth. '
  - type: text
    content: '“Follow me and be my disciple,” '
  - type: text
    content: Jesus said to him. So Matthew got up and followed him.
