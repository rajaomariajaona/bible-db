document_id: PSA.60,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm'
  - type: note
    content: Hebrew miktam. This may be a literary or musical term.
  - type: text
    content: ' of David useful for teaching, regarding the time David fought Aram-naharaim and Aram-zobah, and Joab returned and killed 12,000 Edomites in the Valley of Salt. To be sung to the tune “Lily of the Testimony.”'
  - type: text
    content: You have rejected us, O God, and broken our defenses.
  - type: text
    content: You have been angry with us; now restore us to your favor.
  '10':
  - type: text
    content: Have you rejected us, O God?
  - type: text
    content: Will you no longer march with our armies?
  '11':
  - type: text
    content: Oh, please help us against our enemies,
  - type: text
    content: for all human help is useless.
  '12':
  - type: text
    content: With God’s help we will do mighty things,
  - type: text
    content: for he will trample down our foes.
  '2':
  - type: text
    content: You have shaken our land and split it open.
  - type: text
    content: Seal the cracks, for the land trembles.
  '3':
  - type: text
    content: You have been very hard on us,
  - type: text
    content: making us drink wine that sent us reeling.
  '4':
  - type: text
    content: But you have raised a banner for those who fear you—
  - type: text
    content: 'a rallying point in the face of attack. '
  - type: text
    content: Interlude
  '5':
  - type: text
    content: Now rescue your beloved people.
  - type: text
    content: Answer and save us by your power.
  '6':
  - type: text
    content: God has promised this by his holiness
  - type: note
    content: Or in his sanctuary.
  - type: text
    content: ':'
  - type: text
    content: “I will divide up Shechem with joy.
  - type: text
    content: I will measure out the valley of Succoth.
  '7':
  - type: text
    content: Gilead is mine,
  - type: text
    content: and Manasseh, too.
  - type: text
    content: Ephraim, my helmet, will produce my warriors,
  - type: text
    content: and Judah, my scepter, will produce my kings.
  '8':
  - type: text
    content: But Moab, my washbasin, will become my servant,
  - type: text
    content: and I will wipe my feet on Edom
  - type: text
    content: and shout in triumph over Philistia.”
  '9':
  - type: text
    content: Who will bring me into the fortified city?
  - type: text
    content: Who will bring me victory over Edom?
