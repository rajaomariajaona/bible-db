document_id: PSA.60
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60:TITLE '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'miktam. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may be a literary or musical term.
    marker-yv: yv-n
  - type: text
    text: ' of David useful for teaching, regarding the time David fought Aram-naharaim and Aram-zobah, and Joab returned and killed 12,000 Edomites in the Valley of Salt. To be sung to the tune “Lily of the Testimony.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: You have rejected us, O God, and broken our defenses.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have been angry with us; now restore us to your favor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You have shaken our land and split it open.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Seal the cracks, for the land trembles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You have been very hard on us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: making us drink wine that sent us reeling.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But you have raised a banner for those who fear you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'a rallying point in the face of attack. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Now rescue your beloved people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Answer and save us by your power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: God has promised this by his holiness
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in his sanctuary.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will divide up Shechem with joy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will measure out the valley of Succoth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Gilead is mine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Manasseh, too.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraim, my helmet, will produce my warriors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Judah, my scepter, will produce my kings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But Moab, my washbasin, will become my servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will wipe my feet on Edom
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shout in triumph over Philistia.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Who will bring me into the fortified city?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who will bring me victory over Edom?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Have you rejected us, O God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will you no longer march with our armies?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Oh, please help us against our enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all human help is useless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: With God’s help we will do mighty things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he will trample down our foes.
