document_id: GEN.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Account of Creation
  - type: text
    content: In the beginning God created the heavens and the earth.
  - type: note
    content: Or In the beginning when God created the heavens and the earth, . . . Or When God began to create the heavens and the earth, . . .
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'God called the dry ground “land” and the waters “seas.” And God saw that it was good. '
  '11':
  - type: text
    content: 'Then God said, “Let the land sprout with vegetation—every sort of seed-bearing plant, and trees that grow seed-bearing fruit. These seeds will then produce the kinds of plants and trees from which they came.” And that is what happened. '
  '12':
  - type: text
    content: The land produced vegetation—all sorts of seed-bearing plants, and trees with seed-bearing fruit. Their seeds produced plants and trees of the same kind. And God saw that it was good.
  '13':
  - type: text
    content: And evening passed and morning came, marking the third day.
  '14':
  - type: text
    content: 'Then God said, “Let lights appear in the sky to separate the day from the night. Let them be signs to mark the seasons, days, and years. '
  '15':
  - type: text
    content: 'Let these lights in the sky shine down on the earth.” And that is what happened. '
  '16':
  - type: text
    content: 'God made two great lights—the larger one to govern the day, and the smaller one to govern the night. He also made the stars. '
  '17':
  - type: text
    content: 'God set these lights in the sky to light the earth, '
  '18':
  - type: text
    content: to govern the day and night, and to separate the light from the darkness. And God saw that it was good.
  '19':
  - type: text
    content: And evening passed and morning came, marking the fourth day.
  '2':
  - type: text
    content: The earth was formless and empty, and darkness covered the deep waters. And the Spirit of God was hovering over the surface of the waters.
  '20':
  - type: text
    content: 'Then God said, “Let the waters swarm with fish and other life. Let the skies be filled with birds of every kind.” '
  '21':
  - type: text
    content: 'So God created great sea creatures and every living thing that scurries and swarms in the water, and every sort of bird—each producing offspring of the same kind. And God saw that it was good. '
  '22':
  - type: text
    content: Then God blessed them, saying, “Be fruitful and multiply. Let the fish fill the seas, and let the birds multiply on the earth.”
  '23':
  - type: text
    content: And evening passed and morning came, marking the fifth day.
  '24':
  - type: text
    content: 'Then God said, “Let the earth produce every sort of animal, each producing offspring of the same kind—livestock, small animals that scurry along the ground, and wild animals.” And that is what happened. '
  '25':
  - type: text
    content: God made all sorts of wild animals, livestock, and small animals, each able to produce offspring of the same kind. And God saw that it was good.
  '26':
  - type: text
    content: Then God said, “Let us make human beings
  - type: note
    content: Or man; Hebrew reads adam.
  - type: text
    content: ' in our image, to be like us. They will reign over the fish in the sea, the birds in the sky, the livestock, all the wild animals on the earth,'
  - type: note
    content: As in Syriac version; Hebrew reads all the earth.
  - type: text
    content: ' and the small animals that scurry along the ground.”'
  '27':
  - type: text
    content: So God created human beings
  - type: note
    content: Or the man; Hebrew reads ha-adam.
  - type: text
    content: ' in his own image.'
  - type: text
    content: In the image of God he created them;
  - type: text
    content: male and female he created them.
  '28':
  - type: text
    content: Then God blessed them and said, “Be fruitful and multiply. Fill the earth and govern it. Reign over the fish in the sea, the birds in the sky, and all the animals that scurry along the ground.”
  '29':
  - type: text
    content: 'Then God said, “Look! I have given you every seed-bearing plant throughout the earth and all the fruit trees for your food. '
  '3':
  - type: text
    content: 'Then God said, “Let there be light,” and there was light. '
  '30':
  - type: text
    content: And I have given every green plant as food for all the wild animals, the birds in the sky, and the small animals that scurry along the ground—everything that has life.” And that is what happened.
  '31':
  - type: text
    content: Then God looked over all he had made, and he saw that it was very good!
  - type: text
    content: And evening passed and morning came, marking the sixth day.
  '4':
  - type: text
    content: 'And God saw that the light was good. Then he separated the light from the darkness. '
  '5':
  - type: text
    content: God called the light “day” and the darkness “night.”
  - type: text
    content: And evening passed and morning came, marking the first day.
  '6':
  - type: text
    content: 'Then God said, “Let there be a space between the waters, to separate the waters of the heavens from the waters of the earth.” '
  '7':
  - type: text
    content: 'And that is what happened. God made this space to separate the waters of the earth from the waters of the heavens. '
  '8':
  - type: text
    content: God called the space “sky.”
  - type: text
    content: And evening passed and morning came, marking the second day.
  '9':
  - type: text
    content: 'Then God said, “Let the waters beneath the sky flow together into one place, so dry ground may appear.” And that is what happened. '
