document_id: NUM.31,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Conquest of the Midianites
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'They burned all the towns and villages where the Midianites had lived. '
  '11':
  - type: text
    content: 'After they had gathered the plunder and captives, both people and animals, '
  '12':
  - type: text
    content: 'they brought them all to Moses and Eleazar the priest, and to the whole community of Israel, which was camped on the plains of Moab beside the Jordan River, across from Jericho. '
  '13':
  - type: text
    content: 'Moses, Eleazar the priest, and all the leaders of the community went to meet them outside the camp. '
  '14':
  - type: text
    content: But Moses was furious with all the generals and captains
  - type: note
    content: Hebrew the commanders of thousands, and the commanders of hundreds; also in 31:48, 52, 54.
  - type: text
    content: ' who had returned from the battle.'
  '15':
  - type: text
    content: '“Why have you let all the women live?” he demanded. '
  '16':
  - type: text
    content: '“These are the very ones who followed Balaam’s advice and caused the people of Israel to rebel against the '
  - type: text
    content: Lord
  - type: text
    content: ' at Mount Peor. They are the ones who caused the plague to strike the '
  - type: text
    content: Lord
  - type: text
    content: '’s people. '
  '17':
  - type: text
    content: 'So kill all the boys and all the women who have had intercourse with a man. '
  '18':
  - type: text
    content: 'Only the young girls who are virgins may live; you may keep them for yourselves. '
  '19':
  - type: text
    content: 'And all of you who have killed anyone or touched a dead body must stay outside the camp for seven days. You must purify yourselves and your captives on the third and seventh days. '
  '2':
  - type: text
    content: “On behalf of the people of Israel, take revenge on the Midianites for leading them into idolatry. After that, you will die and join your ancestors.”
  '20':
  - type: text
    content: Purify all your clothing, too, and everything made of leather, goat hair, or wood.”
  '21':
  - type: text
    content: 'Then Eleazar the priest said to the men who were in the battle, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has given Moses this legal requirement: '
  '22':
  - type: text
    content: 'Anything made of gold, silver, bronze, iron, tin, or lead— '
  '23':
  - type: text
    content: 'that is, all metals that do not burn—must be passed through fire in order to be made ceremonially pure. These metal objects must then be further purified with the water of purification. But everything that burns must be purified by the water alone. '
  '24':
  - type: text
    content: On the seventh day you must wash your clothes and be purified. Then you may return to the camp.”
  - type: heading
    content: Division of the Plunder
  '25':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '26':
  - type: text
    content: '“You and Eleazar the priest and the family leaders of each tribe are to make a list of all the plunder taken in the battle, including the people and animals. '
  '27':
  - type: text
    content: 'Then divide the plunder into two parts, and give half to the men who fought the battle and half to the rest of the people. '
  '28':
  - type: text
    content: 'From the army’s portion, first give the '
  - type: text
    content: 'Lord '
  - type: text
    content: 'his share of the plunder—one of every 500 of the prisoners and of the cattle, donkeys, sheep, and goats. '
  '29':
  - type: text
    content: 'Give this share of the army’s half to Eleazar the priest as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'So Moses said to the people, “Choose some men, and arm them to fight the '
  - type: text
    content: Lord
  - type: text
    content: '’s war of revenge against Midian. '
  '30':
  - type: text
    content: 'From the half that belongs to the people of Israel, take one of every fifty of the prisoners and of the cattle, donkeys, sheep, goats, and other animals. Give this share to the Levites, who are in charge of maintaining the '
  - type: text
    content: Lord
  - type: text
    content: '’s Tabernacle.” '
  '31':
  - type: text
    content: 'So Moses and Eleazar the priest did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '32':
  - type: text
    content: 'The plunder remaining from everything the fighting men had taken totaled 675,000 sheep and goats, '
  '33':
  - type: text
    content: '72,000 cattle, '
  '34':
  - type: text
    content: '61,000 donkeys, '
  '35':
  - type: text
    content: and 32,000 virgin girls.
  '36':
  - type: text
    content: 'Half of the plunder was given to the fighting men. It totaled 337,500 sheep and goats, '
  '37':
  - type: text
    content: 'of which 675 were the '
  - type: text
    content: Lord
  - type: text
    content: '’s share; '
  '38':
  - type: text
    content: '36,000 cattle, of which 72 were the '
  - type: text
    content: Lord
  - type: text
    content: '’s share; '
  '39':
  - type: text
    content: '30,500 donkeys, of which 61 were the '
  - type: text
    content: Lord
  - type: text
    content: '’s share; '
  '4':
  - type: text
    content: 'From each tribe of Israel, send 1,000 men into battle.” '
  '40':
  - type: text
    content: 'and 16,000 virgin girls, of whom 32 were the '
  - type: text
    content: Lord
  - type: text
    content: '’s share. '
  '41':
  - type: text
    content: 'Moses gave all the '
  - type: text
    content: Lord
  - type: text
    content: '’s share to Eleazar the priest, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had directed him.'
  '42':
  - type: text
    content: 'Half of the plunder belonged to the people of Israel, and Moses separated it from the half belonging to the fighting men. '
  '43':
  - type: text
    content: 'It totaled 337,500 sheep and goats, '
  '44':
  - type: text
    content: '36,000 cattle, '
  '45':
  - type: text
    content: '30,500 donkeys, '
  '46':
  - type: text
    content: 'and 16,000 virgin girls. '
  '47':
  - type: text
    content: 'From the half-share given to the people, Moses took one of every fifty prisoners and animals and gave them to the Levites, who maintained the '
  - type: text
    content: Lord
  - type: text
    content: '’s Tabernacle. All this was done as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '48':
  - type: text
    content: 'Then all the generals and captains came to Moses '
  '49':
  - type: text
    content: 'and said, “We, your servants, have accounted for all the men who went out to battle under our command; not one of us is missing! '
  '5':
  - type: text
    content: 'So they chose 1,000 men from each tribe of Israel, a total of 12,000 men armed for battle. '
  '50':
  - type: text
    content: 'So we are presenting the items of gold we captured as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' from our share of the plunder—armbands, bracelets, rings, earrings, and necklaces. This will purify our lives before the '
  - type: text
    content: Lord
  - type: text
    content: ' and make us right with him.'
  - type: note
    content: Or will make atonement for our lives before the Lord.
  - type: text
    content: ”
  '51':
  - type: text
    content: 'So Moses and Eleazar the priest received the gold from all the military commanders—all kinds of jewelry and crafted objects. '
  '52':
  - type: text
    content: 'In all, the gold that the generals and captains presented as a gift to the '
  - type: text
    content: Lord
  - type: text
    content: ' weighed about 420 pounds.'
  - type: note
    content: Hebrew 16,750 shekels [191 kilograms].
  - type: text
    content: ' '
  '53':
  - type: text
    content: 'All the fighting men had taken some of the plunder for themselves. '
  '54':
  - type: text
    content: So Moses and Eleazar the priest accepted the gifts from the generals and captains and brought the gold to the Tabernacle
  - type: note
    content: Hebrew the Tent of Meeting.
  - type: text
    content: ' as a reminder to the '
  - type: text
    content: Lord
  - type: text
    content: ' that the people of Israel belong to him.'
  '6':
  - type: text
    content: 'Then Moses sent them out, 1,000 men from each tribe, and Phinehas son of Eleazar the priest led them into battle. They carried along the holy objects of the sanctuary and the trumpets for sounding the charge. '
  '7':
  - type: text
    content: 'They attacked Midian as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses, and they killed all the men. '
  '8':
  - type: text
    content: All five of the Midianite kings—Evi, Rekem, Zur, Hur, and Reba—died in the battle. They also killed Balaam son of Beor with the sword.
  '9':
  - type: text
    content: 'Then the Israelite army captured the Midianite women and children and seized their cattle and flocks and all their wealth as plunder. '
