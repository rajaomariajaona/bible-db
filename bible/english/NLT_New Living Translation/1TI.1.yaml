document_id: 1TI.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greetings from Paul
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: This letter is from Paul, an apostle of Christ Jesus, appointed by the command of God our Savior and Christ Jesus, who gives us hope.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The law is for people who are sexually immoral, or who practice homosexuality, or are slave traders,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: kidnappers.
      marker-yv: yv-n
    - type: text
      text: ' liars, promise breakers, or who do anything else that contradicts the wholesome teaching '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: that comes from the glorious Good News entrusted to me by our blessed God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Gratitude for God’s Mercy
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I thank Christ Jesus our Lord, who has given me strength to do his work. He considered me trustworthy and appointed me to serve him, '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'even though I used to blaspheme the name of Christ. In my insolence, I persecuted his people. But God had mercy on me because I did it in ignorance and unbelief. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Oh, how generous and gracious our Lord was! He filled me with the faith and love that come from Christ Jesus.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'This is a trustworthy saying, and everyone should accept it: “Christ Jesus came into the world to save sinners”—and I am the worst of them all. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But God had mercy on me so that Christ Jesus could use me as a prime example of his great patience with even the worst sinners. Then others will realize that they, too, can believe in him and receive eternal life. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: All honor and glory to God forever and ever! He is the eternal King, the unseen one who never dies; he alone is God. Amen.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Timothy’s Responsibility
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Timothy, my son, here are my instructions for you, based on the prophetic words spoken about you earlier. May they help you fight well in the Lord’s battles. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Cling to your faith in Christ, and keep your conscience clear. For some people have deliberately violated their consciences; as a result, their faith has been shipwrecked. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I am writing to Timothy, my true son in the faith.
  - type: usfm
    marker: p
    children:
    - type: text
      text: May God the Father and Christ Jesus our Lord give you grace, mercy, and peace.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warnings against False Teachings
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hymenaeus and Alexander are two examples. I threw them out and handed them over to Satan so they might learn not to blaspheme God.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'When I left for Macedonia, I urged you to stay there in Ephesus and stop those whose teaching is contrary to the truth. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Don’t let them waste their time in endless discussion of myths and spiritual pedigrees. These things only lead to meaningless speculations,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in myths and endless genealogies, which cause speculation.
      marker-yv: yv-n
    - type: text
      text: ' which don’t help people live a life of faith in God.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a stewardship of God in faith.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The purpose of my instruction is that all believers would be filled with love that comes from a pure heart, a clear conscience, and genuine faith. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But some people have missed this whole point. They have turned away from these things and spend their time in meaningless discussions. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: They want to be known as teachers of the law of Moses, but they don’t know what they are talking about, even though they speak so confidently.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'We know that the law is good when used correctly. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For the law was not intended for people who do what is right. It is for people who are lawless and rebellious, who are ungodly and sinful, who consider nothing sacred and defile what is holy, who kill their father or mother or commit other murders. '
