document_id: DEU.26,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Harvest Offerings and Tithes
  - type: text
    content: '“When you enter the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you as a special possession and you have conquered it and settled there, '
  '10':
  - type: text
    content: 'And now, O '
  - type: text
    content: Lord
  - type: text
    content: ', I have brought you the first portion of the harvest you have given me from the ground.’ Then place the produce before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and bow to the ground in worship before him. '
  '11':
  - type: text
    content: 'Afterward you may go and celebrate because of all the good things the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given to you and your household. Remember to include the Levites and the foreigners living among you in the celebration.'
  '12':
  - type: text
    content: '“Every third year you must offer a special tithe of your crops. In this year of the special tithe you must give your tithes to the Levites, foreigners, orphans, and widows, so that they will have enough to eat in your towns. '
  '13':
  - type: text
    content: 'Then you must declare in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, ‘I have taken the sacred gift from my house and have given it to the Levites, foreigners, orphans, and widows, just as you commanded me. I have not violated or forgotten any of your commands. '
  '14':
  - type: text
    content: 'I have not eaten any of it while in mourning; I have not handled it while I was ceremonially unclean; and I have not offered any of it to the dead. I have obeyed the '
  - type: text
    content: Lord
  - type: text
    content: ' my God and have done everything you commanded me. '
  '15':
  - type: text
    content: Now look down from your holy dwelling place in heaven and bless your people Israel and the land you swore to our ancestors to give us—a land flowing with milk and honey.’
  - type: heading
    content: A Call to Obey the Lord’s Commands
  '16':
  - type: text
    content: '“Today the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has commanded you to obey all these decrees and regulations. So be careful to obey them wholeheartedly. '
  '17':
  - type: text
    content: 'You have declared today that the '
  - type: text
    content: Lord
  - type: text
    content: ' is your God. And you have promised to walk in his ways, and to obey his decrees, commands, and regulations, and to do everything he tells you. '
  '18':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has declared today that you are his people, his own special treasure, just as he promised, and that you must obey all his commands. '
  '19':
  - type: text
    content: 'And if you do, he will set you high above all the other nations he has made. Then you will receive praise, honor, and renown. You will be a nation that is holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, just as he promised.”'
  '2':
  - type: text
    content: 'put some of the first produce from each crop you harvest into a basket and bring it to the designated place of worship—the place the '
  - type: text
    content: Lord
  - type: text
    content: ' your God chooses for his name to be honored. '
  '3':
  - type: text
    content: 'Go to the priest in charge at that time and say to him, ‘With this gift I acknowledge to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God that I have entered the land he swore to our ancestors he would give us.’ '
  '4':
  - type: text
    content: 'The priest will then take the basket from your hand and set it before the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '5':
  - type: text
    content: '“You must then say in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, ‘My ancestor Jacob was a wandering Aramean who went to live as a foreigner in Egypt. His family arrived few in number, but in Egypt they became a large and mighty nation. '
  '6':
  - type: text
    content: 'When the Egyptians oppressed and humiliated us by making us their slaves, '
  '7':
  - type: text
    content: 'we cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of our ancestors. He heard our cries and saw our hardship, toil, and oppression. '
  '8':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' brought us out of Egypt with a strong hand and powerful arm, with overwhelming terror, and with miraculous signs and wonders. '
  '9':
  - type: text
    content: 'He brought us to this place and gave us this land flowing with milk and honey! '
