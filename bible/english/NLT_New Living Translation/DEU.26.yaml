document_id: DEU.26,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Harvest Offerings and Tithes
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“When you enter the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you as a special possession and you have conquered it and settled there, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I have brought you the first portion of the harvest you have given me from the ground.’ Then place the produce before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, and bow to the ground in worship before him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward you may go and celebrate because of all the good things the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has given to you and your household. Remember to include the Levites and the foreigners living among you in the celebration.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Every third year you must offer a special tithe of your crops. In this year of the special tithe you must give your tithes to the Levites, foreigners, orphans, and widows, so that they will have enough to eat in your towns. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you must declare in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, ‘I have taken the sacred gift from my house and have given it to the Levites, foreigners, orphans, and widows, just as you commanded me. I have not violated or forgotten any of your commands. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have not eaten any of it while in mourning; I have not handled it while I was ceremonially unclean; and I have not offered any of it to the dead. I have obeyed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God and have done everything you commanded me. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now look down from your holy dwelling place in heaven and bless your people Israel and the land you swore to our ancestors to give us—a land flowing with milk and honey.’
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'A Call to Obey the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Commands
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Today the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has commanded you to obey all these decrees and regulations. So be careful to obey them wholeheartedly. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'You have declared today that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is your God. And you have promised to walk in his ways, and to obey his decrees, commands, and regulations, and to do everything he tells you. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has declared today that you are his people, his own special treasure, just as he promised, and that you must obey all his commands. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And if you do, he will set you high above all the other nations he has made. Then you will receive praise, honor, and renown. You will be a nation that is holy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, just as he promised.”'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'put some of the first produce from each crop you harvest into a basket and bring it to the designated place of worship—the place the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God chooses for his name to be honored. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Go to the priest in charge at that time and say to him, ‘With this gift I acknowledge to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God that I have entered the land he swore to our ancestors he would give us.’ '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The priest will then take the basket from your hand and set it before the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You must then say in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, ‘My ancestor Jacob was a wandering Aramean who went to live as a foreigner in Egypt. His family arrived few in number, but in Egypt they became a large and mighty nation. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Egyptians oppressed and humiliated us by making us their slaves, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'we cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of our ancestors. He heard our cries and saw our hardship, toil, and oppression. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought us out of Egypt with a strong hand and powerful arm, with overwhelming terror, and with miraculous signs and wonders. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He brought us to this place and gave us this land flowing with milk and honey! '
