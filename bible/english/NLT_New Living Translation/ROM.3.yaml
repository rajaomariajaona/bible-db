document_id: ROM.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: God Remains Faithful
  - type: text
    content: 'Then what’s the advantage of being a Jew? Is there any value in the ceremony of circumcision? '
  '10':
  - type: text
    content: As the Scriptures say,
  - type: text
    content: “No one is righteous—
  - type: text
    content: not even one.
  '11':
  - type: text
    content: No one is truly wise;
  - type: text
    content: no one is seeking God.
  '12':
  - type: text
    content: All have turned away;
  - type: text
    content: all have become useless.
  - type: text
    content: No one does good,
  - type: text
    content: not a single one.”
  - type: note
    content: Pss 14:1-3; 53:1-3 (Greek version).
  '13':
  - type: text
    content: “Their talk is foul, like the stench from an open grave.
  - type: text
    content: Their tongues are filled with lies.”
  - type: text
    content: “Snake venom drips from their lips.”
  - type: note
    content: Pss 5:9 (Greek version); 140:3.
  '14':
  - type: text
    content: “Their mouths are full of cursing and bitterness.”
  - type: note
    content: Ps 10:7 (Greek version).
  '15':
  - type: text
    content: “They rush to commit murder.
  '16':
  - type: text
    content: Destruction and misery always follow them.
  '17':
  - type: text
    content: They don’t know where to find peace.”
  - type: note
    content: Isa 59:7-8.
  '18':
  - type: text
    content: “They have no fear of God at all.”
  - type: note
    content: Ps 36:1.
  '19':
  - type: text
    content: 'Obviously, the law applies to those to whom it was given, for its purpose is to keep people from having excuses, and to show that the entire world is guilty before God. '
  '2':
  - type: text
    content: Yes, there are great benefits! First of all, the Jews were entrusted with the whole revelation of God.
  - type: note
    content: Greek the oracles of God.
  '20':
  - type: text
    content: For no one can ever be made right with God by doing what the law commands. The law simply shows us how sinful we are.
  - type: heading
    content: Christ Took Our Punishment
  '21':
  - type: text
    content: But now God has shown us a way to be made right with him without keeping the requirements of the law, as was promised in the writings of Moses
  - type: note
    content: Greek in the law.
  - type: text
    content: ' and the prophets long ago. '
  '22':
  - type: text
    content: We are made right with God by placing our faith in Jesus Christ. And this is true for everyone who believes, no matter who we are.
  '23':
  - type: text
    content: 'For everyone has sinned; we all fall short of God’s glorious standard. '
  '24':
  - type: text
    content: 'Yet God, in his grace, freely makes us right in his sight. He did this through Christ Jesus when he freed us from the penalty for our sins. '
  '25':
  - type: text
    content: 'For God presented Jesus as the sacrifice for sin. People are made right with God when they believe that Jesus sacrificed his life, shedding his blood. This sacrifice shows that God was being fair when he held back and did not punish those who sinned in times past, '
  '26':
  - type: text
    content: for he was looking ahead and including them in what he would do in this present time. God did this to demonstrate his righteousness, for he himself is fair and just, and he makes sinners right in his sight when they believe in Jesus.
  '27':
  - type: text
    content: 'Can we boast, then, that we have done anything to be accepted by God? No, because our acquittal is not based on obeying the law. It is based on faith. '
  '28':
  - type: text
    content: So we are made right with God through faith and not by obeying the law.
  '29':
  - type: text
    content: 'After all, is God the God of the Jews only? Isn’t he also the God of the Gentiles? Of course he is. '
  '3':
  - type: text
    content: 'True, some of them were unfaithful; but just because they were unfaithful, does that mean God will be unfaithful? '
  '30':
  - type: text
    content: There is only one God, and he makes people right with himself only by faith, whether they are Jews or Gentiles.
  - type: note
    content: Greek whether they are circumcised or uncircumcised.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Well then, if we emphasize faith, does this mean that we can forget about the law? Of course not! In fact, only when we have faith do we truly fulfill the law.
  '4':
  - type: text
    content: Of course not! Even if everyone else is a liar, God is true. As the Scriptures say about him,
  - type: text
    content: “You will be proved right in what you say,
  - type: text
    content: and you will win your case in court.”
  - type: note
    content: Ps 51:4 (Greek version).
  '5':
  - type: text
    content: '“But,” some might say, “our sinfulness serves a good purpose, for it helps people see how righteous God is. Isn’t it unfair, then, for him to punish us?” (This is merely a human point of view.) '
  '6':
  - type: text
    content: 'Of course not! If God were not entirely fair, how would he be qualified to judge the world? '
  '7':
  - type: text
    content: '“But,” someone might still argue, “how can God condemn me as a sinner if my dishonesty highlights his truthfulness and brings him more glory?” '
  '8':
  - type: text
    content: And some people even slander us by claiming that we say, “The more we sin, the better it is!” Those who say such things deserve to be condemned.
  - type: heading
    content: All People Are Sinners
  '9':
  - type: text
    content: Well then, should we conclude that we Jews are better than others? No, not at all, for we have already shown that all people, whether Jews or Gentiles,
  - type: note
    content: Greek or Greeks.
  - type: text
    content: ' are under the power of sin. '
