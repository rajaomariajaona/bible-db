document_id: ROM.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God Remains Faithful
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then what’s the advantage of being a Jew? Is there any value in the ceremony of circumcision? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Yes, there are great benefits! First of all, the Jews were entrusted with the whole revelation of God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the oracles of God.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'True, some of them were unfaithful; but just because they were unfaithful, does that mean God will be unfaithful? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Of course not! Even if everyone else is a liar, God is true. As the Scriptures say about him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You will be proved right in what you say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will win your case in court.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 51:4 (Greek version).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“But,” some might say, “our sinfulness serves a good purpose, for it helps people see how righteous God is. Isn’t it unfair, then, for him to punish us?” (This is merely a human point of view.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Of course not! If God were not entirely fair, how would he be qualified to judge the world? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“But,” someone might still argue, “how can God condemn me as a sinner if my dishonesty highlights his truthfulness and brings him more glory?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And some people even slander us by claiming that we say, “The more we sin, the better it is!” Those who say such things deserve to be condemned.
- type: usfm
  marker: s1
  children:
  - type: text
    text: All People Are Sinners
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Well then, should we conclude that we Jews are better than others? No, not at all, for we have already shown that all people, whether Jews or Gentiles,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: or Greeks.
    marker-yv: yv-n
  - type: text
    text: ' are under the power of sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: As the Scriptures say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “No one is righteous—
- type: usfm
  marker: q2
  children:
  - type: text
    text: not even one.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: No one is truly wise;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one is seeking God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: All have turned away;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all have become useless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one does good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not a single one.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:10-12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pss 14:1-3; 53:1-3 (Greek version).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Their talk is foul, like the stench from an open grave.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their tongues are filled with lies.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Snake venom drips from their lips.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pss 5:9 (Greek version); 140:3.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Their mouths are full of cursing and bitterness.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 10:7 (Greek version).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “They rush to commit murder.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Destruction and misery always follow them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They don’t know where to find peace.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:15-17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 59:7-8.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “They have no fear of God at all.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 36:1.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Obviously, the law applies to those to whom it was given, for its purpose is to keep people from having excuses, and to show that the entire world is guilty before God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: For no one can ever be made right with God by doing what the law commands. The law simply shows us how sinful we are.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Christ Took Our Punishment
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But now God has shown us a way to be made right with him without keeping the requirements of the law, as was promised in the writings of Moses
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in the law.
    marker-yv: yv-n
  - type: text
    text: ' and the prophets long ago. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: We are made right with God by placing our faith in Jesus Christ. And this is true for everyone who believes, no matter who we are.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For everyone has sinned; we all fall short of God’s glorious standard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Yet God, in his grace, freely makes us right in his sight. He did this through Christ Jesus when he freed us from the penalty for our sins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For God presented Jesus as the sacrifice for sin. People are made right with God when they believe that Jesus sacrificed his life, shedding his blood. This sacrifice shows that God was being fair when he held back and did not punish those who sinned in times past, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: for he was looking ahead and including them in what he would do in this present time. God did this to demonstrate his righteousness, for he himself is fair and just, and he makes sinners right in his sight when they believe in Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Can we boast, then, that we have done anything to be accepted by God? No, because our acquittal is not based on obeying the law. It is based on faith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: So we are made right with God through faith and not by obeying the law.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'After all, is God the God of the Jews only? Isn’t he also the God of the Gentiles? Of course he is. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: There is only one God, and he makes people right with himself only by faith, whether they are Jews or Gentiles.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: whether they are circumcised or uncircumcised.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Well then, if we emphasize faith, does this mean that we can forget about the law? Of course not! In fact, only when we have faith do we truly fulfill the law.
