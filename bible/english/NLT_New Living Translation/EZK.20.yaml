document_id: EZK.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Rebellion of Israel
  - type: text
    content: On August 14,
  - type: note
    content: Hebrew In the fifth month, on the tenth day, of the ancient Hebrew lunar calendar. This day was August 14, 591 b.c.; also see note on 1:1.
  - type: text
    content: ' during the seventh year of King Jehoiachin’s captivity, some of the leaders of Israel came to request a message from the '
  - type: text
    content: Lord
  - type: text
    content: '. They sat down in front of me to wait for his reply. '
  '10':
  - type: text
    content: 'So I brought them out of Egypt and led them into the wilderness. '
  '11':
  - type: text
    content: 'There I gave them my decrees and regulations so they could find life by keeping them. '
  '12':
  - type: text
    content: 'And I gave them my Sabbath days of rest as a sign between them and me. It was to remind them that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who had set them apart to be holy.'
  '13':
  - type: text
    content: '“But the people of Israel rebelled against me, and they refused to obey my decrees there in the wilderness. They wouldn’t obey my regulations even though obedience would have given them life. They also violated my Sabbath days. So I threatened to pour out my fury on them, and I made plans to utterly consume them in the wilderness. '
  '14':
  - type: text
    content: 'But again I held back in order to protect the honor of my name before the nations who had seen my power in bringing Israel out of Egypt. '
  '15':
  - type: text
    content: 'But I took a solemn oath against them in the wilderness. I swore I would not bring them into the land I had given them, a land flowing with milk and honey, the most beautiful place on earth. '
  '16':
  - type: text
    content: 'For they had rejected my regulations, refused to follow my decrees, and violated my Sabbath days. Their hearts were given to their idols. '
  '17':
  - type: text
    content: Nevertheless, I took pity on them and held back from destroying them in the wilderness.
  '18':
  - type: text
    content: '“Then I warned their children not to follow in their parents’ footsteps, defiling themselves with their idols. '
  '19':
  - type: text
    content: '‘I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,’ I told them. ‘Follow my decrees, pay attention to my regulations, '
  '2':
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '20':
  - type: text
    content: 'and keep my Sabbath days holy, for they are a sign to remind you that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.’'
  '21':
  - type: text
    content: '“But their children, too, rebelled against me. They refused to keep my decrees and follow my regulations, even though obedience would have given them life. And they also violated my Sabbath days. So again I threatened to pour out my fury on them in the wilderness. '
  '22':
  - type: text
    content: 'Nevertheless, I withdrew my judgment against them to protect the honor of my name before the nations that had seen my power in bringing them out of Egypt. '
  '23':
  - type: text
    content: 'But I took a solemn oath against them in the wilderness. I swore I would scatter them among all the nations '
  '24':
  - type: text
    content: 'because they did not obey my regulations. They scorned my decrees by violating my Sabbath days and longing for the idols of their ancestors. '
  '25':
  - type: text
    content: 'I gave them over to worthless decrees and regulations that would not lead to life. '
  '26':
  - type: text
    content: I let them pollute themselves
  - type: note
    content: Or I gave them worthless decrees and regulations. . . . I polluted them.
  - type: text
    content: ' with the very gifts I had given them, and I allowed them to give their firstborn children as offerings to their gods—so I might devastate them and remind them that I alone am the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Judgment and Restoration
  '27':
  - type: text
    content: '“Therefore, son of man, give the people of Israel this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ': Your ancestors continued to blaspheme and betray me, '
  '28':
  - type: text
    content: 'for when I brought them into the land I had promised them, they offered sacrifices on every high hill and under every green tree they saw! They roused my fury as they offered up sacrifices to their gods. They brought their perfumes and incense and poured out their liquid offerings to them. '
  '29':
  - type: text
    content: I said to them, ‘What is this high place where you are going?’ (This kind of pagan shrine has been called Bamah—‘high place’—ever since.)
  '3':
  - type: text
    content: '“Son of man, tell the leaders of Israel, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: How dare you come to ask me for a message? As surely as I live, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', I will tell you nothing!’'
  '30':
  - type: text
    content: '“Therefore, give the people of Israel this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ': Do you plan to pollute yourselves just as your ancestors did? Do you intend to keep prostituting yourselves by worshiping vile images? '
  '31':
  - type: text
    content: For when you offer gifts to them and give your little children to be burned as sacrifices,
  - type: note
    content: Or and make your little children pass through the fire.
  - type: text
    content: ' you continue to pollute yourselves with idols to this day. Should I allow you to ask for a message from me, O people of Israel? As surely as I live, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', I will tell you nothing.'
  '32':
  - type: text
    content: '“You say, ‘We want to be like the nations all around us, who serve idols of wood and stone.’ But what you have in mind will never happen. '
  '33':
  - type: text
    content: 'As surely as I live, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', I will rule over you with an iron fist in great anger and with awesome power. '
  '34':
  - type: text
    content: And in anger I will reach out with my strong hand and powerful arm, and I will bring you back
  - type: note
    content: Greek version reads I will welcome you. Compare 2 Cor 6:17.
  - type: text
    content: ' from the lands where you are scattered. '
  '35':
  - type: text
    content: 'I will bring you into the wilderness of the nations, and there I will judge you face to face. '
  '36':
  - type: text
    content: 'I will judge you there just as I did your ancestors in the wilderness after bringing them out of Egypt, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '37':
  - type: text
    content: 'I will examine you carefully and hold you to the terms of the covenant. '
  '38':
  - type: text
    content: 'I will purge you of all those who rebel and revolt against me. I will bring them out of the countries where they are in exile, but they will never enter the land of Israel. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '39':
  - type: text
    content: '“As for you, O people of Israel, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Go right ahead and worship your idols, but sooner or later you will obey me and will stop bringing shame on my holy name by worshiping idols. '
  '4':
  - type: text
    content: '“Son of man, bring charges against them and condemn them. Make them realize how detestable the sins of their ancestors really were. '
  '40':
  - type: text
    content: 'For on my holy mountain, the great mountain of Israel, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', the people of Israel will someday worship me, and I will accept them. There I will require that you bring me all your offerings and choice gifts and sacrifices. '
  '41':
  - type: text
    content: 'When I bring you home from exile, you will be like a pleasing sacrifice to me. And I will display my holiness through you as all the nations watch. '
  '42':
  - type: text
    content: 'Then when I have brought you home to the land I promised with a solemn oath to give to your ancestors, you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '43':
  - type: text
    content: 'You will look back on all the ways you defiled yourselves and will hate yourselves because of the evil you have done. '
  '44':
  - type: text
    content: 'You will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', O people of Israel, when I have honored my name by treating you mercifully in spite of your wickedness. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  - type: heading
    content: Judgment against the Negev
  '45':
  - type: text
    content: ' '
  - type: note
    content: Verses 20:45-49 are numbered 21:1-5 in Hebrew text.
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '46':
  - type: text
    content: “Son of man, turn and face the south
  - type: note
    content: Hebrew toward Teman.
  - type: text
    content: ' and speak out against it; prophesy against the brushlands of the Negev. '
  '47':
  - type: text
    content: 'Tell the southern wilderness, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: '! I will set you on fire, and every tree, both green and dry, will be burned. The terrible flames will not be quenched and will scorch everything from south to north. '
  '48':
  - type: text
    content: 'And everyone in the world will see that I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have set this fire. It will not be put out.’”'
  '49':
  - type: text
    content: 'Then I said, “O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', they are saying of me, ‘He only talks in riddles!’”'
  '5':
  - type: text
    content: 'Give them this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ': When I chose Israel—when I revealed myself to the descendants of Jacob in Egypt—I took a solemn oath that I, the '
  - type: text
    content: Lord
  - type: text
    content: ', would be their God. '
  '6':
  - type: text
    content: 'I took a solemn oath that day that I would bring them out of Egypt to a land I had discovered and explored for them—a good land, a land flowing with milk and honey, the best of all lands anywhere. '
  '7':
  - type: text
    content: Then I said to them, ‘Each of you, get rid of the vile images you are so obsessed with. Do not defile yourselves with the idols
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung; also in 20:8, 16, 18, 24, 31, 39.
  - type: text
    content: ' of Egypt, for I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.’'
  '8':
  - type: text
    content: '“But they rebelled against me and would not listen. They did not get rid of the vile images they were obsessed with, or forsake the idols of Egypt. Then I threatened to pour out my fury on them to satisfy my anger while they were still in Egypt. '
  '9':
  - type: text
    content: 'But I didn’t do it, for I acted to protect the honor of my name. I would not allow shame to be brought on my name among the surrounding nations who saw me reveal myself by bringing the Israelites out of Egypt. '
