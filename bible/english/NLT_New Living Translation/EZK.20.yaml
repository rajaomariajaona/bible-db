document_id: EZK.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Rebellion of Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: On August 14,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'In the fifth month, on the tenth day, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. This day was August 14, 591 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 1:1.
    marker-yv: yv-n
  - type: text
    text: ' during the seventh year of King Jehoiachin’s captivity, some of the leaders of Israel came to request a message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. They sat down in front of me to wait for his reply. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Son of man, tell the leaders of Israel, ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: How dare you come to ask me for a message? As surely as I live, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I will tell you nothing!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“Son of man, bring charges against them and condemn them. Make them realize how detestable the sins of their ancestors really were. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Give them this message from the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': When I chose Israel—when I revealed myself to the descendants of Jacob in Egypt—I took a solemn oath that I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', would be their God. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I took a solemn oath that day that I would bring them out of Egypt to a land I had discovered and explored for them—a good land, a land flowing with milk and honey, the best of all lands anywhere. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then I said to them, ‘Each of you, get rid of the vile images you are so obsessed with. Do not defile yourselves with the idols
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term (literally '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: round things
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) probably alludes to dung; also in 20:8, 16, 18, 24, 31, 39.
    marker-yv: yv-n
  - type: text
    text: ' of Egypt, for I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“But they rebelled against me and would not listen. They did not get rid of the vile images they were obsessed with, or forsake the idols of Egypt. Then I threatened to pour out my fury on them to satisfy my anger while they were still in Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But I didn’t do it, for I acted to protect the honor of my name. I would not allow shame to be brought on my name among the surrounding nations who saw me reveal myself by bringing the Israelites out of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So I brought them out of Egypt and led them into the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'There I gave them my decrees and regulations so they could find life by keeping them. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And I gave them my Sabbath days of rest as a sign between them and me. It was to remind them that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who had set them apart to be holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“But the people of Israel rebelled against me, and they refused to obey my decrees there in the wilderness. They wouldn’t obey my regulations even though obedience would have given them life. They also violated my Sabbath days. So I threatened to pour out my fury on them, and I made plans to utterly consume them in the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But again I held back in order to protect the honor of my name before the nations who had seen my power in bringing Israel out of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But I took a solemn oath against them in the wilderness. I swore I would not bring them into the land I had given them, a land flowing with milk and honey, the most beautiful place on earth. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For they had rejected my regulations, refused to follow my decrees, and violated my Sabbath days. Their hearts were given to their idols. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nevertheless, I took pity on them and held back from destroying them in the wilderness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“Then I warned their children not to follow in their parents’ footsteps, defiling themselves with their idols. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '‘I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,’ I told them. ‘Follow my decrees, pay attention to my regulations, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and keep my Sabbath days holy, for they are a sign to remind you that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“But their children, too, rebelled against me. They refused to keep my decrees and follow my regulations, even though obedience would have given them life. And they also violated my Sabbath days. So again I threatened to pour out my fury on them in the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nevertheless, I withdrew my judgment against them to protect the honor of my name before the nations that had seen my power in bringing them out of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But I took a solemn oath against them in the wilderness. I swore I would scatter them among all the nations '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'because they did not obey my regulations. They scorned my decrees by violating my Sabbath days and longing for the idols of their ancestors. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I gave them over to worthless decrees and regulations that would not lead to life. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I let them pollute themselves
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:25-26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: I gave them worthless decrees and regulations. . . . I polluted them.
    marker-yv: yv-n
  - type: text
    text: ' with the very gifts I had given them, and I allowed them to give their firstborn children as offerings to their gods—so I might devastate them and remind them that I alone am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judgment and Restoration
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“Therefore, son of man, give the people of Israel this message from the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': Your ancestors continued to blaspheme and betray me, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'for when I brought them into the land I had promised them, they offered sacrifices on every high hill and under every green tree they saw! They roused my fury as they offered up sacrifices to their gods. They brought their perfumes and incense and poured out their liquid offerings to them. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: I said to them, ‘What is this high place where you are going?’ (This kind of pagan shrine has been called Bamah—‘high place’—ever since.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“Therefore, give the people of Israel this message from the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': Do you plan to pollute yourselves just as your ancestors did? Do you intend to keep prostituting yourselves by worshiping vile images? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: For when you offer gifts to them and give your little children to be burned as sacrifices,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and make your little children pass through the fire.
    marker-yv: yv-n
  - type: text
    text: ' you continue to pollute yourselves with idols to this day. Should I allow you to ask for a message from me, O people of Israel? As surely as I live, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I will tell you nothing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '“You say, ‘We want to be like the nations all around us, who serve idols of wood and stone.’ But what you have in mind will never happen. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'As surely as I live, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I will rule over you with an iron fist in great anger and with awesome power. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: And in anger I will reach out with my strong hand and powerful arm, and I will bring you back
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'I will welcome you. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare 2 Cor 6:17.
    marker-yv: yv-n
  - type: text
    text: ' from the lands where you are scattered. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'I will bring you into the wilderness of the nations, and there I will judge you face to face. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'I will judge you there just as I did your ancestors in the wilderness after bringing them out of Egypt, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'I will examine you carefully and hold you to the terms of the covenant. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'I will purge you of all those who rebel and revolt against me. I will bring them out of the countries where they are in exile, but they will never enter the land of Israel. Then you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '“As for you, O people of Israel, this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Go right ahead and worship your idols, but sooner or later you will obey me and will stop bringing shame on my holy name by worshiping idols. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'For on my holy mountain, the great mountain of Israel, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the people of Israel will someday worship me, and I will accept them. There I will require that you bring me all your offerings and choice gifts and sacrifices. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'When I bring you home from exile, you will be like a pleasing sacrifice to me. And I will display my holiness through you as all the nations watch. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Then when I have brought you home to the land I promised with a solemn oath to give to your ancestors, you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'You will look back on all the ways you defiled yourselves and will hate yourselves because of the evil you have done. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'You will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', O people of Israel, when I have honored my name by treating you mercifully in spite of your wickedness. I, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judgment against the Negev
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses 20:45-49 are numbered 21:1-5 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: 'Then this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: “Son of man, turn and face the south
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: toward Teman.
    marker-yv: yv-n
  - type: text
    text: ' and speak out against it; prophesy against the brushlands of the Negev. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Tell the southern wilderness, ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '! I will set you on fire, and every tree, both green and dry, will be burned. The terrible flames will not be quenched and will scorch everything from south to north. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'And everyone in the world will see that I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have set this fire. It will not be put out.’”'
