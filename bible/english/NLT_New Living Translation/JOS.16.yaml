document_id: JOS.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Land Given to Ephraim and West Manasseh
  - type: text
    content: 'The allotment for the descendants of Joseph extended from the Jordan River near Jericho, east of the springs of Jericho, through the wilderness and into the hill country of Bethel. '
  '10':
  - type: text
    content: They did not drive the Canaanites out of Gezer, however, so the people of Gezer live as slaves among the people of Ephraim to this day.
  '2':
  - type: text
    content: From Bethel (that is, Luz)
  - type: note
    content: As in Greek version (also see 18:13); Hebrew reads From Bethel to Luz.
  - type: text
    content: ' it ran over to Ataroth in the territory of the Arkites. '
  '3':
  - type: text
    content: Then it descended westward to the territory of the Japhletites as far as Lower Beth-horon, then to Gezer and over to the Mediterranean Sea.
  - type: note
    content: Hebrew the sea; also in 16:6, 8.
  '4':
  - type: text
    content: This was the homeland allocated to the families of Joseph’s sons, Manasseh and Ephraim.
  - type: heading
    content: The Land Given to Ephraim
  '5':
  - type: text
    content: The following territory was given to the clans of the tribe of Ephraim.
  - type: text
    content: 'The boundary of their homeland began at Ataroth-addar in the east. From there it ran to Upper Beth-horon, '
  '6':
  - type: text
    content: 'then on to the Mediterranean Sea. From Micmethath on the north, the boundary curved eastward past Taanath-shiloh to the east of Janoah. '
  '7':
  - type: text
    content: 'From Janoah it turned southward to Ataroth and Naarah, touched Jericho, and ended at the Jordan River. '
  '8':
  - type: text
    content: From Tappuah the boundary extended westward, following the Kanah Ravine to the Mediterranean Sea. This is the homeland allocated to the clans of the tribe of Ephraim.
  '9':
  - type: text
    content: 'In addition, some towns with their surrounding villages in the territory allocated to the half-tribe of Manasseh were set aside for the tribe of Ephraim. '
