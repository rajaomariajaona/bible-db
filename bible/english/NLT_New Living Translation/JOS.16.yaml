document_id: JOS.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land Given to Ephraim and West Manasseh
  marker-yv: yv-h
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The allotment for the descendants of Joseph extended from the Jordan River near Jericho, east of the springs of Jericho, through the wilderness and into the hill country of Bethel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: From Bethel (that is, Luz)
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version (also see 18:13); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: From Bethel to Luz.
    marker-yv: yv-n
  - type: text
    text: ' it ran over to Ataroth in the territory of the Arkites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then it descended westward to the territory of the Japhletites as far as Lower Beth-horon, then to Gezer and over to the Mediterranean Sea.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the sea; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 16:6, 8.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: This was the homeland allocated to the families of Joseph’s sons, Manasseh and Ephraim.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land Given to Ephraim
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The following territory was given to the clans of the tribe of Ephraim.
- type: usfm
  marker: pmo
  children:
  - type: text
    text: 'The boundary of their homeland began at Ataroth-addar in the east. From there it ran to Upper Beth-horon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'then on to the Mediterranean Sea. From Micmethath on the north, the boundary curved eastward past Taanath-shiloh to the east of Janoah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'From Janoah it turned southward to Ataroth and Naarah, touched Jericho, and ended at the Jordan River. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: From Tappuah the boundary extended westward, following the Kanah Ravine to the Mediterranean Sea. This is the homeland allocated to the clans of the tribe of Ephraim.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'In addition, some towns with their surrounding villages in the territory allocated to the half-tribe of Manasseh were set aside for the tribe of Ephraim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They did not drive the Canaanites out of Gezer, however, so the people of Gezer live as slaves among the people of Ephraim to this day.
