document_id: 1TH.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Live to Please God
  - type: text
    content: Finally, dear brothers and sisters,
  - type: note
    content: Greek brothers; also in 4:10, 13.
  - type: text
    content: ' we urge you in the name of the Lord Jesus to live in a way that pleases God, as we have taught you. You live this way already, and we encourage you to do so even more. '
  '10':
  - type: text
    content: Indeed, you already show your love for all the believers
  - type: note
    content: Greek the brothers.
  - type: text
    content: ' throughout Macedonia. Even so, dear brothers and sisters, we urge you to love them even more.'
  '11':
  - type: text
    content: 'Make it your goal to live a quiet life, minding your own business and working with your hands, just as we instructed you before. '
  '12':
  - type: text
    content: Then people who are not believers will respect the way you live, and you will not need to depend on others.
  - type: heading
    content: The Hope of the Resurrection
  '13':
  - type: text
    content: And now, dear brothers and sisters, we want you to know what will happen to the believers who have died
  - type: note
    content: Greek those who have fallen asleep; also in 4:14.
  - type: text
    content: ' so you will not grieve like people who have no hope. '
  '14':
  - type: text
    content: For since we believe that Jesus died and was raised to life again, we also believe that when Jesus returns, God will bring back with him the believers who have died.
  '15':
  - type: text
    content: 'We tell you this directly from the Lord: We who are still living when the Lord returns will not meet him ahead of those who have died.'
  - type: note
    content: Greek those who have fallen asleep.
  - type: text
    content: ' '
  '16':
  - type: text
    content: For the Lord himself will come down from heaven with a commanding shout, with the voice of the archangel, and with the trumpet call of God. First, the believers who have died
  - type: note
    content: Greek the dead in Christ.
  - type: text
    content: ' will rise from their graves. '
  '17':
  - type: text
    content: 'Then, together with them, we who are still alive and remain on the earth will be caught up in the clouds to meet the Lord in the air. Then we will be with the Lord forever. '
  '18':
  - type: text
    content: So encourage each other with these words.
  '2':
  - type: text
    content: For you remember what we taught you by the authority of the Lord Jesus.
  '3':
  - type: text
    content: 'God’s will is for you to be holy, so stay away from all sexual sin. '
  '4':
  - type: text
    content: Then each of you will control his own body
  - type: note
    content: Or will know how to take a wife for himself; or will learn to live with his own wife; Greek reads will know how to possess his own vessel.
  - type: text
    content: ' and live in holiness and honor— '
  '5':
  - type: text
    content: 'not in lustful passion like the pagans who do not know God and his ways. '
  '6':
  - type: text
    content: Never harm or cheat a fellow believer in this matter by violating his wife,
  - type: note
    content: Greek Never harm or cheat a brother in this matter.
  - type: text
    content: ' for the Lord avenges all such sins, as we have solemnly warned you before. '
  '7':
  - type: text
    content: 'God has called us to live holy lives, not impure lives. '
  '8':
  - type: text
    content: Therefore, anyone who refuses to live by these rules is not disobeying human teaching but is rejecting God, who gives his Holy Spirit to you.
  '9':
  - type: text
    content: But we don’t need to write to you about the importance of loving each other,
  - type: note
    content: Greek about brotherly love.
  - type: text
    content: ' for God himself has taught you to love one another. '
