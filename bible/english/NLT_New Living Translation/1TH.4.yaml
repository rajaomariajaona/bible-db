document_id: 1TH.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Live to Please God
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Finally, dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 4:10, 13.
      marker-yv: yv-n
    - type: text
      text: ' we urge you in the name of the Lord Jesus to live in a way that pleases God, as we have taught you. You live this way already, and we encourage you to do so even more. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indeed, you already show your love for all the believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the brothers.
      marker-yv: yv-n
    - type: text
      text: ' throughout Macedonia. Even so, dear brothers and sisters, we urge you to love them even more.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Make it your goal to live a quiet life, minding your own business and working with your hands, just as we instructed you before. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then people who are not believers will respect the way you live, and you will not need to depend on others.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Hope of the Resurrection
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And now, dear brothers and sisters, we want you to know what will happen to the believers who have died
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'those who have fallen asleep; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 4:14.
      marker-yv: yv-n
    - type: text
      text: ' so you will not grieve like people who have no hope. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For since we believe that Jesus died and was raised to life again, we also believe that when Jesus returns, God will bring back with him the believers who have died.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We tell you this directly from the Lord: We who are still living when the Lord returns will not meet him ahead of those who have died.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: those who have fallen asleep.
      marker-yv: yv-n
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the Lord himself will come down from heaven with a commanding shout, with the voice of the archangel, and with the trumpet call of God. First, the believers who have died
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the dead in Christ.
      marker-yv: yv-n
    - type: text
      text: ' will rise from their graves. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then, together with them, we who are still alive and remain on the earth will be caught up in the clouds to meet the Lord in the air. Then we will be with the Lord forever. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So encourage each other with these words.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For you remember what we taught you by the authority of the Lord Jesus.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God’s will is for you to be holy, so stay away from all sexual sin. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then each of you will control his own body
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'will know how to take a wife for himself; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'will learn to live with his own wife; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will know how to possess his own vessel.
      marker-yv: yv-n
    - type: text
      text: ' and live in holiness and honor— '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'not in lustful passion like the pagans who do not know God and his ways. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Never harm or cheat a fellow believer in this matter by violating his wife,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Never harm or cheat a brother in this matter.
      marker-yv: yv-n
    - type: text
      text: ' for the Lord avenges all such sins, as we have solemnly warned you before. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God has called us to live holy lives, not impure lives. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore, anyone who refuses to live by these rules is not disobeying human teaching but is rejecting God, who gives his Holy Spirit to you.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But we don’t need to write to you about the importance of loving each other,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: about brotherly love.
      marker-yv: yv-n
    - type: text
      text: ' for God himself has taught you to love one another. '
