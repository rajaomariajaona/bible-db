document_id: PRO.29,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Whoever stubbornly refuses to accept criticism
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will suddenly be destroyed beyond recovery.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The bloodthirsty hate blameless people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the upright seek to help them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The bloodthirsty hate blameless people, / and they seek to kill the upright; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The bloodthirsty hate blameless people; / as for the upright, they seek their life.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fools vent their anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the wise quietly hold it back.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: If a ruler pays attention to liars,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all his advisers will be wicked.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The poor and the oppressor have this in common—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gives sight to the eyes of both.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: If a king judges the poor fairly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his throne will last forever.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: To discipline a child produces wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a mother is disgraced by an undisciplined child.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When the wicked are in authority, sin flourishes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the godly will live to see their downfall.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Discipline your children, and they will give you peace of mind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will make your heart glad.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: When people do not accept divine guidance, they run wild.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But whoever obeys the law is joyful.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Words alone will not discipline a servant;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the words may be understood, but they are not heeded.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: When the godly are in authority, the people rejoice.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But when the wicked are in power, they groan.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: There is more hope for a fool
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than for someone who speaks without thinking.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: A servant pampered from childhood
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will become a rebel.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: An angry person starts fights;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a hot-tempered person commits all kinds of sin.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Pride ends in humiliation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while humility brings honor.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: If you assist a thief, you only hurt yourself.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are sworn to tell the truth, but you dare not testify.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fearing people is a dangerous trap,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but trusting the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' means safety.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Many seek the ruler’s favor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but justice comes from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The righteous despise the unjust;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wicked despise the godly.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The man who loves wisdom brings joy to his father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but if he hangs around with prostitutes, his wealth is wasted.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: A just king gives stability to his nation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but one who demands bribes destroys it.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: To flatter friends
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is to lay a trap for their feet.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Evil people are trapped by sin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the righteous escape, shouting for joy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The godly care about the rights of the poor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wicked don’t care at all.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mockers can get a whole town agitated,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the wise will calm anger.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: If a wise person takes a fool to court,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there will be ranting and ridicule but no satisfaction.
