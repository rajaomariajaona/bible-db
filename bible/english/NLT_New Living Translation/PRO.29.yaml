document_id: PRO.29,116
type_code: eng
verses:
  '1':
  - type: text
    content: Whoever stubbornly refuses to accept criticism
  - type: text
    content: will suddenly be destroyed beyond recovery.
  '10':
  - type: text
    content: The bloodthirsty hate blameless people,
  - type: text
    content: but the upright seek to help them.
  - type: note
    content: Or The bloodthirsty hate blameless people, / and they seek to kill the upright; Hebrew reads The bloodthirsty hate blameless people; / as for the upright, they seek their life.
  '11':
  - type: text
    content: Fools vent their anger,
  - type: text
    content: but the wise quietly hold it back.
  '12':
  - type: text
    content: If a ruler pays attention to liars,
  - type: text
    content: all his advisers will be wicked.
  '13':
  - type: text
    content: The poor and the oppressor have this in common—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' gives sight to the eyes of both.'
  '14':
  - type: text
    content: If a king judges the poor fairly,
  - type: text
    content: his throne will last forever.
  '15':
  - type: text
    content: To discipline a child produces wisdom,
  - type: text
    content: but a mother is disgraced by an undisciplined child.
  '16':
  - type: text
    content: When the wicked are in authority, sin flourishes,
  - type: text
    content: but the godly will live to see their downfall.
  '17':
  - type: text
    content: Discipline your children, and they will give you peace of mind
  - type: text
    content: and will make your heart glad.
  '18':
  - type: text
    content: When people do not accept divine guidance, they run wild.
  - type: text
    content: But whoever obeys the law is joyful.
  '19':
  - type: text
    content: Words alone will not discipline a servant;
  - type: text
    content: the words may be understood, but they are not heeded.
  '2':
  - type: text
    content: When the godly are in authority, the people rejoice.
  - type: text
    content: But when the wicked are in power, they groan.
  '20':
  - type: text
    content: There is more hope for a fool
  - type: text
    content: than for someone who speaks without thinking.
  '21':
  - type: text
    content: A servant pampered from childhood
  - type: text
    content: will become a rebel.
  '22':
  - type: text
    content: An angry person starts fights;
  - type: text
    content: a hot-tempered person commits all kinds of sin.
  '23':
  - type: text
    content: Pride ends in humiliation,
  - type: text
    content: while humility brings honor.
  '24':
  - type: text
    content: If you assist a thief, you only hurt yourself.
  - type: text
    content: You are sworn to tell the truth, but you dare not testify.
  '25':
  - type: text
    content: Fearing people is a dangerous trap,
  - type: text
    content: 'but trusting the '
  - type: text
    content: Lord
  - type: text
    content: ' means safety.'
  '26':
  - type: text
    content: Many seek the ruler’s favor,
  - type: text
    content: 'but justice comes from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '27':
  - type: text
    content: The righteous despise the unjust;
  - type: text
    content: the wicked despise the godly.
  '3':
  - type: text
    content: The man who loves wisdom brings joy to his father,
  - type: text
    content: but if he hangs around with prostitutes, his wealth is wasted.
  '4':
  - type: text
    content: A just king gives stability to his nation,
  - type: text
    content: but one who demands bribes destroys it.
  '5':
  - type: text
    content: To flatter friends
  - type: text
    content: is to lay a trap for their feet.
  '6':
  - type: text
    content: Evil people are trapped by sin,
  - type: text
    content: but the righteous escape, shouting for joy.
  '7':
  - type: text
    content: The godly care about the rights of the poor;
  - type: text
    content: the wicked don’t care at all.
  '8':
  - type: text
    content: Mockers can get a whole town agitated,
  - type: text
    content: but the wise will calm anger.
  '9':
  - type: text
    content: If a wise person takes a fool to court,
  - type: text
    content: there will be ranting and ridicule but no satisfaction.
