document_id: DEU.22,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “If you see your neighbor’s ox or sheep or goat wandering away, don’t ignore your responsibility.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'don’t hide yourself; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly in 22:3.
      marker-yv: yv-n
    - type: text
      text: ' Take it back to its owner. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “You must not plow with an ox and a donkey harnessed together.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “You must not wear clothing made of wool and linen woven together.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “You must put four tassels on the hem of the cloak with which you cover yourself—on the front, back, and sides.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Regulations for Sexual Purity
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“Suppose a man marries a woman, but after sleeping with her, he turns against her '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and publicly accuses her of shameful conduct, saying, ‘When I married this woman, I discovered she was not a virgin.’ '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then the woman’s father and mother must bring the proof of her virginity to the elders as they hold court at the town gate. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Her father must say to them, ‘I gave my daughter to this man to be his wife, and now he has turned against her. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'He has accused her of shameful conduct, saying, “I discovered that your daughter was not a virgin.” But here is the proof of my daughter’s virginity.’ Then they must spread her bed sheet before the elders. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The elders must then take the man and punish him. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: They must also fine him 100 pieces of silver,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '100 [shekels] of silver, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: about 2.5 pounds or 1.1 kilograms in weight.
      marker-yv: yv-n
    - type: text
      text: ' which he must pay to the woman’s father because he publicly accused a virgin of Israel of shameful conduct. The woman will then remain the man’s wife, and he may never divorce her.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'If its owner does not live nearby or you don’t know who the owner is, take it to your place and keep it until the owner comes looking for it. Then you must return it. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“But suppose the man’s accusations are true, and he can show that she was not a virgin. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The woman must be taken to the door of her father’s home, and there the men of the town must stone her to death, for she has committed a disgraceful crime in Israel by being promiscuous while living in her parents’ home. In this way, you will purge this evil from among you.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “If a man is discovered committing adultery, both he and the woman must die. In this way, you will purge Israel of such evil.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“Suppose a man meets a young woman, a virgin who is engaged to be married, and he has sexual intercourse with her. If this happens within a town, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: you must take both of them to the gates of that town and stone them to death. The woman is guilty because she did not scream for help. The man must die because he violated another man’s wife. In this way, you will purge this evil from among you.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“But if the man meets the engaged woman out in the country, and he rapes her, then only the man must die. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Do nothing to the young woman; she has committed no crime worthy of death. She is as innocent as a murder victim. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Since the man raped her out in the country, it must be assumed that she screamed, but there was no one to rescue her.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '“Suppose a man has intercourse with a young woman who is a virgin but is not engaged to be married. If they are discovered, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: he must pay her father fifty pieces of silver.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '50 [shekels] of silver, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: about 1.25 pounds or 570 grams in weight.
      marker-yv: yv-n
    - type: text
      text: ' Then he must marry the young woman because he violated her, and he may never divorce her as long as he lives.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Do the same if you find your neighbor’s donkey, clothing, or anything else your neighbor loses. Don’t ignore your responsibility.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verse 22:30 is numbered 23:1 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: “A man must not marry his father’s former wife, for this would violate his father.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “If you see that your neighbor’s donkey or ox has collapsed on the road, do not look the other way. Go and help your neighbor get it back on its feet!
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“A woman must not put on men’s clothing, and a man must not wear women’s clothing. Anyone who does this is detestable in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“If you happen to find a bird’s nest in a tree or on the ground, and there are young ones or eggs in it with the mother sitting in the nest, do not take the mother with the young. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: You may take the young, but let the mother go, so that you may prosper and enjoy a long life.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “When you build a new house, you must build a railing around the edge of its flat roof. That way you will not be considered guilty of murder if someone falls from the roof.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “You must not plant any other crop between the rows of your vineyard. If you do, you are forbidden to use either the grapes from the vineyard or the other crop.
