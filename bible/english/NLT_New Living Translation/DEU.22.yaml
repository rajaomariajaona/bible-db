document_id: DEU.22,116
type_code: eng
verses:
  '1':
  - type: text
    content: “If you see your neighbor’s ox or sheep or goat wandering away, don’t ignore your responsibility.
  - type: note
    content: Hebrew don’t hide yourself; similarly in 22:3.
  - type: text
    content: ' Take it back to its owner. '
  '10':
  - type: text
    content: “You must not plow with an ox and a donkey harnessed together.
  '11':
  - type: text
    content: “You must not wear clothing made of wool and linen woven together.
  '12':
  - type: text
    content: “You must put four tassels on the hem of the cloak with which you cover yourself—on the front, back, and sides.
  - type: heading
    content: Regulations for Sexual Purity
  '13':
  - type: text
    content: '“Suppose a man marries a woman, but after sleeping with her, he turns against her '
  '14':
  - type: text
    content: 'and publicly accuses her of shameful conduct, saying, ‘When I married this woman, I discovered she was not a virgin.’ '
  '15':
  - type: text
    content: 'Then the woman’s father and mother must bring the proof of her virginity to the elders as they hold court at the town gate. '
  '16':
  - type: text
    content: 'Her father must say to them, ‘I gave my daughter to this man to be his wife, and now he has turned against her. '
  '17':
  - type: text
    content: 'He has accused her of shameful conduct, saying, “I discovered that your daughter was not a virgin.” But here is the proof of my daughter’s virginity.’ Then they must spread her bed sheet before the elders. '
  '18':
  - type: text
    content: 'The elders must then take the man and punish him. '
  '19':
  - type: text
    content: They must also fine him 100 pieces of silver,
  - type: note
    content: Hebrew 100 [shekels] of silver, about 2.5 pounds or 1.1 kilograms in weight.
  - type: text
    content: ' which he must pay to the woman’s father because he publicly accused a virgin of Israel of shameful conduct. The woman will then remain the man’s wife, and he may never divorce her.'
  '2':
  - type: text
    content: 'If its owner does not live nearby or you don’t know who the owner is, take it to your place and keep it until the owner comes looking for it. Then you must return it. '
  '20':
  - type: text
    content: '“But suppose the man’s accusations are true, and he can show that she was not a virgin. '
  '21':
  - type: text
    content: The woman must be taken to the door of her father’s home, and there the men of the town must stone her to death, for she has committed a disgraceful crime in Israel by being promiscuous while living in her parents’ home. In this way, you will purge this evil from among you.
  '22':
  - type: text
    content: “If a man is discovered committing adultery, both he and the woman must die. In this way, you will purge Israel of such evil.
  '23':
  - type: text
    content: '“Suppose a man meets a young woman, a virgin who is engaged to be married, and he has sexual intercourse with her. If this happens within a town, '
  '24':
  - type: text
    content: you must take both of them to the gates of that town and stone them to death. The woman is guilty because she did not scream for help. The man must die because he violated another man’s wife. In this way, you will purge this evil from among you.
  '25':
  - type: text
    content: '“But if the man meets the engaged woman out in the country, and he rapes her, then only the man must die. '
  '26':
  - type: text
    content: 'Do nothing to the young woman; she has committed no crime worthy of death. She is as innocent as a murder victim. '
  '27':
  - type: text
    content: Since the man raped her out in the country, it must be assumed that she screamed, but there was no one to rescue her.
  '28':
  - type: text
    content: '“Suppose a man has intercourse with a young woman who is a virgin but is not engaged to be married. If they are discovered, '
  '29':
  - type: text
    content: he must pay her father fifty pieces of silver.
  - type: note
    content: Hebrew 50 [shekels] of silver, about 1.25 pounds or 570 grams in weight.
  - type: text
    content: ' Then he must marry the young woman because he violated her, and he may never divorce her as long as he lives.'
  '3':
  - type: text
    content: Do the same if you find your neighbor’s donkey, clothing, or anything else your neighbor loses. Don’t ignore your responsibility.
  '30':
  - type: text
    content: ' '
  - type: note
    content: Verse 22:30 is numbered 23:1 in Hebrew text.
  - type: text
    content: “A man must not marry his father’s former wife, for this would violate his father.
  '4':
  - type: text
    content: “If you see that your neighbor’s donkey or ox has collapsed on the road, do not look the other way. Go and help your neighbor get it back on its feet!
  '5':
  - type: text
    content: '“A woman must not put on men’s clothing, and a man must not wear women’s clothing. Anyone who does this is detestable in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '6':
  - type: text
    content: '“If you happen to find a bird’s nest in a tree or on the ground, and there are young ones or eggs in it with the mother sitting in the nest, do not take the mother with the young. '
  '7':
  - type: text
    content: You may take the young, but let the mother go, so that you may prosper and enjoy a long life.
  '8':
  - type: text
    content: “When you build a new house, you must build a railing around the edge of its flat roof. That way you will not be considered guilty of murder if someone falls from the roof.
  '9':
  - type: text
    content: “You must not plant any other crop between the rows of your vineyard. If you do, you are forbidden to use either the grapes from the vineyard or the other crop.
