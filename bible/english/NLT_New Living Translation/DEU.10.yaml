document_id: DEU.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A New Copy of the Covenant
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“At that time the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, ‘Chisel out two stone tablets like the first ones. Also make a wooden Ark—a sacred chest to store them in. Come up to me on the mountain, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and I will write on the tablets the same words that were on the ones you smashed. Then place the tablets in the Ark.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“So I made an Ark of acacia wood and cut two stone tablets like the first two. Then I went up the mountain with the tablets in my hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Once again the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' wrote the Ten Commandments'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the ten words.
    marker-yv: yv-n
  - type: text
    text: ' on the tablets and gave them to me. They were the same words the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had spoken to you from the heart of the fire on the day you were assembled at the foot of the mountain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then I turned and came down the mountain and placed the tablets in the Ark of the Covenant, which I had made, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded me. And the tablets are still there in the Ark.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: (The people of Israel set out from the wells of the people of Jaakan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: set out from Beeroth of Bene-jaakan.
    marker-yv: yv-n
  - type: text
    text: ' and traveled to Moserah, where Aaron died and was buried. His son Eleazar ministered as high priest in his place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then they journeyed to Gudgodah, and from there to Jotbathah, a land with many brooks and streams. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'At that time the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' set apart the tribe of Levi to carry the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Covenant, and to stand before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as his ministers, and to pronounce blessings in his name. These are their duties to this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'That is why the Levites have no share of property or possession of land among the other Israelite tribes. The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'Lord '
  - type: text
    text: 'himself is their special possession, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God told them.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“As for me, I stayed on the mountain in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s presence for forty days and nights, as I had done the first time. And once again the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' listened to my pleas and agreed not to destroy you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, ‘Get up and resume the journey, and lead the people to the land I swore to give to their ancestors, so they may take possession of it.’'
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Call to Love and Obedience
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“And now, Israel, what does the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God require of you? He requires only that you fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, and live in a way that pleases him, and love him and serve him with all your heart and soul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And you must always obey the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s commands and decrees that I am giving you today for your own good.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“Look, the highest heavens and the earth and everything in it all belong to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Yet the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' chose your ancestors as the objects of his love. And he chose you, their descendants, above all other nations, as is evident today. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Therefore, change your hearts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: circumcise the foreskin of your hearts.
    marker-yv: yv-n
  - type: text
    text: ' and stop being stubborn.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is the God of gods and Lord of lords. He is the great God, the mighty and awesome God, who shows no partiality and cannot be bribed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He ensures that orphans and widows receive justice. He shows love to the foreigners living among you and gives them food and clothing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So you, too, must show love to foreigners, for you yourselves were once foreigners in the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'You must fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God and worship him and cling to him. Your oaths must be in his name alone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He alone is your God, the only one who is worthy of your praise, the one who has done these mighty miracles that you have seen with your own eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'When your ancestors went down into Egypt, there were only seventy of them. But now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God has made you as numerous as the stars in the sky!'
