document_id: DEU.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A New Copy of the Covenant
  - type: text
    content: '“At that time the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, ‘Chisel out two stone tablets like the first ones. Also make a wooden Ark—a sacred chest to store them in. Come up to me on the mountain, '
  '10':
  - type: text
    content: '“As for me, I stayed on the mountain in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence for forty days and nights, as I had done the first time. And once again the '
  - type: text
    content: Lord
  - type: text
    content: ' listened to my pleas and agreed not to destroy you. '
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, ‘Get up and resume the journey, and lead the people to the land I swore to give to their ancestors, so they may take possession of it.’'
  - type: heading
    content: A Call to Love and Obedience
  '12':
  - type: text
    content: '“And now, Israel, what does the '
  - type: text
    content: Lord
  - type: text
    content: ' your God require of you? He requires only that you fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and live in a way that pleases him, and love him and serve him with all your heart and soul. '
  '13':
  - type: text
    content: 'And you must always obey the '
  - type: text
    content: Lord
  - type: text
    content: ’s commands and decrees that I am giving you today for your own good.
  '14':
  - type: text
    content: '“Look, the highest heavens and the earth and everything in it all belong to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '15':
  - type: text
    content: 'Yet the '
  - type: text
    content: Lord
  - type: text
    content: ' chose your ancestors as the objects of his love. And he chose you, their descendants, above all other nations, as is evident today. '
  '16':
  - type: text
    content: Therefore, change your hearts
  - type: note
    content: Hebrew circumcise the foreskin of your hearts.
  - type: text
    content: ' and stop being stubborn.'
  '17':
  - type: text
    content: '“For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is the God of gods and Lord of lords. He is the great God, the mighty and awesome God, who shows no partiality and cannot be bribed. '
  '18':
  - type: text
    content: 'He ensures that orphans and widows receive justice. He shows love to the foreigners living among you and gives them food and clothing. '
  '19':
  - type: text
    content: 'So you, too, must show love to foreigners, for you yourselves were once foreigners in the land of Egypt. '
  '2':
  - type: text
    content: and I will write on the tablets the same words that were on the ones you smashed. Then place the tablets in the Ark.’
  '20':
  - type: text
    content: 'You must fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and worship him and cling to him. Your oaths must be in his name alone. '
  '21':
  - type: text
    content: 'He alone is your God, the only one who is worthy of your praise, the one who has done these mighty miracles that you have seen with your own eyes. '
  '22':
  - type: text
    content: 'When your ancestors went down into Egypt, there were only seventy of them. But now the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has made you as numerous as the stars in the sky!'
  '3':
  - type: text
    content: '“So I made an Ark of acacia wood and cut two stone tablets like the first two. Then I went up the mountain with the tablets in my hand. '
  '4':
  - type: text
    content: 'Once again the '
  - type: text
    content: Lord
  - type: text
    content: ' wrote the Ten Commandments'
  - type: note
    content: Hebrew the ten words.
  - type: text
    content: ' on the tablets and gave them to me. They were the same words the '
  - type: text
    content: Lord
  - type: text
    content: ' had spoken to you from the heart of the fire on the day you were assembled at the foot of the mountain. '
  '5':
  - type: text
    content: 'Then I turned and came down the mountain and placed the tablets in the Ark of the Covenant, which I had made, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded me. And the tablets are still there in the Ark.”'
  '6':
  - type: text
    content: (The people of Israel set out from the wells of the people of Jaakan
  - type: note
    content: Or set out from Beeroth of Bene-jaakan.
  - type: text
    content: ' and traveled to Moserah, where Aaron died and was buried. His son Eleazar ministered as high priest in his place. '
  '7':
  - type: text
    content: 'Then they journeyed to Gudgodah, and from there to Jotbathah, a land with many brooks and streams. '
  '8':
  - type: text
    content: 'At that time the '
  - type: text
    content: Lord
  - type: text
    content: ' set apart the tribe of Levi to carry the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Covenant, and to stand before the '
  - type: text
    content: Lord
  - type: text
    content: ' as his ministers, and to pronounce blessings in his name. These are their duties to this day. '
  '9':
  - type: text
    content: 'That is why the Levites have no share of property or possession of land among the other Israelite tribes. The '
  - type: text
    content: 'Lord '
  - type: text
    content: 'himself is their special possession, as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God told them.)'
