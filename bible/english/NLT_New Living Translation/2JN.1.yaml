document_id: 2JN.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings
  - type: text
    content: This letter is from John, the elder.
  - type: note
    content: Greek From the elder.
  - type: text
    content: I am writing to the chosen lady and to her children,
  - type: note
    content: Or the church God has chosen and its members.
  - type: text
    content: ' whom I love in the truth—as does everyone else who knows the truth— '
  '10':
  - type: text
    content: 'If anyone comes to your meeting and does not teach the truth about Christ, don’t invite that person into your home or give any kind of encouragement. '
  '11':
  - type: text
    content: Anyone who encourages such people becomes a partner in their evil work.
  - type: heading
    content: Conclusion
  '12':
  - type: text
    content: I have much more to say to you, but I don’t want to do it with paper and ink. For I hope to visit you soon and talk with you face to face. Then our joy will be complete.
  '13':
  - type: text
    content: Greetings from the children of your sister,
  - type: note
    content: Or from the members of your sister church.
  - type: text
    content: ' chosen by God.'
  '2':
  - type: text
    content: because the truth lives in us and will be with us forever.
  '3':
  - type: text
    content: Grace, mercy, and peace, which come from God the Father and from Jesus Christ—the Son of the Father—will continue to be with us who live in truth and love.
  - type: heading
    content: Live in the Truth
  '4':
  - type: text
    content: How happy I was to meet some of your children and find them living according to the truth, just as the Father commanded.
  '5':
  - type: text
    content: I am writing to remind you, dear friends,
  - type: note
    content: Greek I urge you, lady.
  - type: text
    content: ' that we should love one another. This is not a new commandment, but one we have had from the beginning. '
  '6':
  - type: text
    content: Love means doing what God has commanded us, and he has commanded us to love one another, just as you heard from the beginning.
  '7':
  - type: text
    content: I say this because many deceivers have gone out into the world. They deny that Jesus Christ came
  - type: note
    content: Or will come.
  - type: text
    content: ' in a real body. Such a person is a deceiver and an antichrist. '
  '8':
  - type: text
    content: Watch out that you do not lose what we
  - type: note
    content: Some manuscripts read you.
  - type: text
    content: ' have worked so hard to achieve. Be diligent so that you receive your full reward. '
  '9':
  - type: text
    content: Anyone who wanders away from this teaching has no relationship with God. But anyone who remains in the teaching of Christ has a relationship with both the Father and the Son.
