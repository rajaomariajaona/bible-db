document_id: PSA.146,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'Let all that I am praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will reign forever.'
  - type: text
    content: He will be your God, O Jerusalem,
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ' throughout the generations.'
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '2':
  - type: text
    content: 'I will praise the '
  - type: text
    content: Lord
  - type: text
    content: ' as long as I live.'
  - type: text
    content: I will sing praises to my God with my dying breath.
  '3':
  - type: text
    content: Don’t put your confidence in powerful people;
  - type: text
    content: there is no help for you there.
  '4':
  - type: text
    content: When they breathe their last, they return to the earth,
  - type: text
    content: and all their plans die with them.
  '5':
  - type: text
    content: But joyful are those who have the God of Israel
  - type: note
    content: Hebrew of Jacob. See note on 44:4.
  - type: text
    content: ' as their helper,'
  - type: text
    content: 'whose hope is in the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.'
  '6':
  - type: text
    content: He made heaven and earth,
  - type: text
    content: the sea, and everything in them.
  - type: text
    content: He keeps every promise forever.
  '7':
  - type: text
    content: He gives justice to the oppressed
  - type: text
    content: and food to the hungry.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' frees the prisoners.'
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' opens the eyes of the blind.'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' lifts up those who are weighed down.'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' loves the godly.'
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' protects the foreigners among us.'
  - type: text
    content: He cares for the orphans and widows,
  - type: text
    content: but he frustrates the plans of the wicked.
