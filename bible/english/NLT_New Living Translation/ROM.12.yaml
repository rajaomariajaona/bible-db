document_id: ROM.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Living Sacrifice to God
  - type: text
    content: And so, dear brothers and sisters,
  - type: note
    content: Greek brothers.
  - type: text
    content: ' I plead with you to give your bodies to God because of all he has done for you. Let them be a living and holy sacrifice—the kind he will find acceptable. This is truly the way to worship him.'
  - type: note
    content: Or This is your spiritual worship; or This is your reasonable service.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Love each other with genuine affection,
  - type: note
    content: Greek with brotherly love.
  - type: text
    content: ' and take delight in honoring each other. '
  '11':
  - type: text
    content: Never be lazy, but work hard and serve the Lord enthusiastically.
  - type: note
    content: Or but serve the Lord with a zealous spirit; or but let the Spirit excite you as you serve the Lord.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Rejoice in our confident hope. Be patient in trouble, and keep on praying. '
  '13':
  - type: text
    content: When God’s people are in need, be ready to help them. Always be eager to practice hospitality.
  '14':
  - type: text
    content: 'Bless those who persecute you. Don’t curse them; pray that God will bless them. '
  '15':
  - type: text
    content: 'Be happy with those who are happy, and weep with those who weep. '
  '16':
  - type: text
    content: Live in harmony with each other. Don’t be too proud to enjoy the company of ordinary people. And don’t think you know it all!
  '17':
  - type: text
    content: 'Never pay back evil with more evil. Do things in such a way that everyone can see you are honorable. '
  '18':
  - type: text
    content: Do all that you can to live in peace with everyone.
  '19':
  - type: text
    content: Dear friends, never take revenge. Leave that to the righteous anger of God. For the Scriptures say,
  - type: text
    content: “I will take revenge;
  - type: text
    content: I will pay them back,”
  - type: note
    content: Deut 32:35.
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: Don’t copy the behavior and customs of this world, but let God transform you into a new person by changing the way you think. Then you will learn to know God’s will for you, which is good and pleasing and perfect.
  '20':
  - type: text
    content: Instead,
  - type: text
    content: “If your enemies are hungry, feed them.
  - type: text
    content: If they are thirsty, give them something to drink.
  - type: text
    content: In doing this, you will heap
  - type: text
    content: burning coals of shame on their heads.”
  - type: note
    content: Prov 25:21-22.
  '21':
  - type: text
    content: Don’t let evil conquer you, but conquer evil by doing good.
  '3':
  - type: text
    content: Because of the privilege and authority
  - type: note
    content: Or Because of the grace; compare 1:5.
  - type: text
    content: ' God has given me, I give each of you this warning: Don’t think you are better than you really are. Be honest in your evaluation of yourselves, measuring yourselves by the faith God has given us.'
  - type: note
    content: Or by the faith God has given you; or by the standard of our God-given faith.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Just as our bodies have many parts and each part has a special function, '
  '5':
  - type: text
    content: so it is with Christ’s body. We are many parts of one body, and we all belong to each other.
  '6':
  - type: text
    content: 'In his grace, God has given us different gifts for doing certain things well. So if God has given you the ability to prophesy, speak out with as much faith as God has given you. '
  '7':
  - type: text
    content: 'If your gift is serving others, serve them well. If you are a teacher, teach well. '
  '8':
  - type: text
    content: If your gift is to encourage others, be encouraging. If it is giving, give generously. If God has given you leadership ability, take the responsibility seriously. And if you have a gift for showing kindness to others, do it gladly.
  '9':
  - type: text
    content: 'Don’t just pretend to love others. Really love them. Hate what is wrong. Hold tightly to what is good. '
