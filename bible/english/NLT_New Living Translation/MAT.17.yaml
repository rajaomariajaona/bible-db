document_id: MAT.17,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Transfiguration
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Six days later Jesus took Peter and the two brothers, James and John, and led them up a high mountain to be alone. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then his disciples asked him, “Why do the teachers of religious law insist that Elijah must return before the Messiah comes?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: that Elijah must come first?
      marker-yv: yv-n
    - type: text
      text: ”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Elijah is indeed coming first to get everything ready.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I tell you, Elijah has already come, but he wasn’t recognized, and they chose to abuse him. And in the same way they will also make the Son of Man suffer.”
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the disciples realized he was talking about John the Baptist.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals a Demon-Possessed Boy
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'At the foot of the mountain, a large crowd was waiting for them. A man came and knelt before Jesus and said, '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Lord, have mercy on my son. He has seizures and suffers terribly. He often falls into the fire or into the water. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So I brought him to your disciples, but they couldn’t heal him.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You faithless and corrupt people! How long must I be with you? How long must I put up with you? Bring the boy here to me.”
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Jesus rebuked the demon in the boy, and it left him. From that moment the boy was well.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Afterward the disciples asked Jesus privately, “Why couldn’t we cast out that demon?”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As the men watched, Jesus’ appearance was transformed so that his face shone like the sun, and his clothes became as white as light. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“You don’t have enough faith,” '
    - type: text
      text: 'Jesus told them. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you the truth, if you had faith even as small as a mustard seed, you could say to this mountain, ‘Move from here to there,’ and it would move. Nothing would be impossible.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add verse 21, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'But this kind of demon won’t leave except by prayer and fasting. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Mark 9:29.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Again Predicts His Death
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'After they gathered again in Galilee, Jesus told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The Son of Man is going to be betrayed into the hands of his enemies.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He will be killed, but on the third day he will be raised from the dead.”
    - type: text
      text: ' And the disciples were filled with grief.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Payment of the Temple Tax
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: On their arrival in Capernaum, the collectors of the Temple tax
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the two-drachma [tax]; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 17:24b. See Exod 30:13-16; Neh 10:32-33.
      marker-yv: yv-n
    - type: text
      text: ' came to Peter and asked him, “Doesn’t your teacher pay the Temple tax?”'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, he does,” Peter replied. Then he went into the house.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But before he had a chance to speak, Jesus asked him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What do you think, Peter?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:25a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Simon?
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Do kings tax their own people or the people they have conquered?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:25b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: their sons or others?
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “They tax the people they have conquered,” Peter replied.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Well, then,” '
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “the citizens are free!
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: However, we don’t want to offend them, so go down to the lake and throw in a line. Open the mouth of the first fish you catch, and you will find a large silver coin.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a stater '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[a Greek coin equivalent to four drachmas].'
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Take it and pay the tax for both of us.”
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Suddenly, Moses and Elijah appeared and began talking with Jesus.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peter exclaimed, “Lord, it’s wonderful for us to be here! If you want, I’ll make three shelters as memorials
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: three tabernacles.
      marker-yv: yv-n
    - type: text
      text: —one for you, one for Moses, and one for Elijah.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But even as he spoke, a bright cloud overshadowed them, and a voice from the cloud said, “This is my dearly loved Son, who brings me great joy. Listen to him.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The disciples were terrified and fell face down on the ground.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus came over and touched them. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Get up,” '
    - type: text
      text: 'he said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t be afraid.”
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when they looked up, Moses and Elijah were gone, and they saw only Jesus.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As they went back down the mountain, Jesus commanded them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t tell anyone what you have seen until the Son of Man
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: has been raised from the dead.”
