document_id: MAT.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Transfiguration
  - type: text
    content: 'Six days later Jesus took Peter and the two brothers, James and John, and led them up a high mountain to be alone. '
  '10':
  - type: text
    content: Then his disciples asked him, “Why do the teachers of religious law insist that Elijah must return before the Messiah comes?
  - type: note
    content: Greek that Elijah must come first?
  - type: text
    content: ”
  '11':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Elijah is indeed coming first to get everything ready.
  - type: text
    content: ' '
  '12':
  - type: text
    content: But I tell you, Elijah has already come, but he wasn’t recognized, and they chose to abuse him. And in the same way they will also make the Son of Man suffer.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: Then the disciples realized he was talking about John the Baptist.
  - type: heading
    content: Jesus Heals a Demon-Possessed Boy
  '14':
  - type: text
    content: 'At the foot of the mountain, a large crowd was waiting for them. A man came and knelt before Jesus and said, '
  '15':
  - type: text
    content: '“Lord, have mercy on my son. He has seizures and suffers terribly. He often falls into the fire or into the water. '
  '16':
  - type: text
    content: So I brought him to your disciples, but they couldn’t heal him.”
  '17':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “You faithless and corrupt people! How long must I be with you? How long must I put up with you? Bring the boy here to me.”
  - type: text
    content: ' '
  '18':
  - type: text
    content: Then Jesus rebuked the demon in the boy, and it left him. From that moment the boy was well.
  '19':
  - type: text
    content: Afterward the disciples asked Jesus privately, “Why couldn’t we cast out that demon?”
  '2':
  - type: text
    content: 'As the men watched, Jesus’ appearance was transformed so that his face shone like the sun, and his clothes became as white as light. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: '“You don’t have enough faith,” '
  - type: text
    content: 'Jesus told them. '
  - type: text
    content: “I tell you the truth, if you had faith even as small as a mustard seed, you could say to this mountain, ‘Move from here to there,’ and it would move. Nothing would be impossible.
  - type: note
    content: Some manuscripts add verse 21, But this kind of demon won’t leave except by prayer and fasting. Compare Mark 9:29.
  - type: text
    content: ”
  - type: heading
    content: Jesus Again Predicts His Death
  '22':
  - type: text
    content: 'After they gathered again in Galilee, Jesus told them, '
  - type: text
    content: “The Son of Man is going to be betrayed into the hands of his enemies.
  - type: text
    content: ' '
  '23':
  - type: text
    content: He will be killed, but on the third day he will be raised from the dead.”
  - type: text
    content: ' And the disciples were filled with grief.'
  - type: heading
    content: Payment of the Temple Tax
  '24':
  - type: text
    content: On their arrival in Capernaum, the collectors of the Temple tax
  - type: note
    content: Greek the two-drachma [tax]; also in 17:24b. See Exod 30:13-16; Neh 10:32-33.
  - type: text
    content: ' came to Peter and asked him, “Doesn’t your teacher pay the Temple tax?”'
  '25':
  - type: text
    content: “Yes, he does,” Peter replied. Then he went into the house.
  - type: text
    content: 'But before he had a chance to speak, Jesus asked him, '
  - type: text
    content: “What do you think, Peter?
  - type: note
    content: Greek Simon?
  - type: text
    content: ' '
  - type: text
    content: Do kings tax their own people or the people they have conquered?
  - type: note
    content: Greek their sons or others?
  - type: text
    content: ”
  '26':
  - type: text
    content: “They tax the people they have conquered,” Peter replied.
  - type: text
    content: '“Well, then,” '
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “the citizens are free!
  - type: text
    content: ' '
  '27':
  - type: text
    content: However, we don’t want to offend them, so go down to the lake and throw in a line. Open the mouth of the first fish you catch, and you will find a large silver coin.
  - type: note
    content: Greek a stater [a Greek coin equivalent to four drachmas].
  - type: text
    content: ' '
  - type: text
    content: Take it and pay the tax for both of us.”
  '3':
  - type: text
    content: Suddenly, Moses and Elijah appeared and began talking with Jesus.
  '4':
  - type: text
    content: Peter exclaimed, “Lord, it’s wonderful for us to be here! If you want, I’ll make three shelters as memorials
  - type: note
    content: Greek three tabernacles.
  - type: text
    content: —one for you, one for Moses, and one for Elijah.”
  '5':
  - type: text
    content: 'But even as he spoke, a bright cloud overshadowed them, and a voice from the cloud said, “This is my dearly loved Son, who brings me great joy. Listen to him.” '
  '6':
  - type: text
    content: The disciples were terrified and fell face down on the ground.
  '7':
  - type: text
    content: 'Then Jesus came over and touched them. '
  - type: text
    content: '“Get up,” '
  - type: text
    content: 'he said. '
  - type: text
    content: “Don’t be afraid.”
  - type: text
    content: ' '
  '8':
  - type: text
    content: And when they looked up, Moses and Elijah were gone, and they saw only Jesus.
  '9':
  - type: text
    content: 'As they went back down the mountain, Jesus commanded them, '
  - type: text
    content: “Don’t tell anyone what you have seen until the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: has been raised from the dead.”
