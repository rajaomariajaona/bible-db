document_id: EXO.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Plague against Livestock
  - type: text
    content: '“Go back to Pharaoh,” the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses. “Tell him, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of the Hebrews, says: Let my people go, so they can worship me. '
  '10':
  - type: text
    content: 'So they took soot from a brick kiln and went and stood before Pharaoh. As Pharaoh watched, Moses threw the soot into the air, and boils broke out on people and animals alike. '
  '11':
  - type: text
    content: 'Even the magicians were unable to stand before Moses, because the boils had broken out on them and all the Egyptians. '
  '12':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' hardened Pharaoh’s heart, and just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had predicted to Moses, Pharaoh refused to listen.'
  - type: heading
    content: A Plague of Hail
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Get up early in the morning and stand before Pharaoh. Tell him, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of the Hebrews, says: Let my people go, so they can worship me. '
  '14':
  - type: text
    content: If you don’t, I will send more plagues on you
  - type: note
    content: Hebrew on your heart.
  - type: text
    content: ' and your officials and your people. Then you will know that there is no one like me in all the earth. '
  '15':
  - type: text
    content: 'By now I could have lifted my hand and struck you and your people with a plague to wipe you off the face of the earth. '
  '16':
  - type: text
    content: But I have spared you for a purpose—to show you my power
  - type: note
    content: Greek version reads to display my power in you; compare Rom 9:17.
  - type: text
    content: ' and to spread my fame throughout the earth. '
  '17':
  - type: text
    content: 'But you still lord it over my people and refuse to let them go. '
  '18':
  - type: text
    content: 'So tomorrow at this time I will send a hailstorm more devastating than any in all the history of Egypt. '
  '19':
  - type: text
    content: Quick! Order your livestock and servants to come in from the fields to find shelter. Any person or animal left outside will die when the hail falls.’”
  '2':
  - type: text
    content: 'If you continue to hold them and refuse to let them go, '
  '20':
  - type: text
    content: 'Some of Pharaoh’s officials were afraid because of what the '
  - type: text
    content: Lord
  - type: text
    content: ' had said. They quickly brought their servants and livestock in from the fields. '
  '21':
  - type: text
    content: 'But those who paid no attention to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' left theirs out in the open.'
  '22':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Lift your hand toward the sky so hail may fall on the people, the livestock, and all the plants throughout the land of Egypt.”'
  '23':
  - type: text
    content: 'So Moses lifted his staff toward the sky, and the '
  - type: text
    content: Lord
  - type: text
    content: ' sent thunder and hail, and lightning flashed toward the earth. The '
  - type: text
    content: Lord
  - type: text
    content: ' sent a tremendous hailstorm against all the land of Egypt. '
  '24':
  - type: text
    content: 'Never in all the history of Egypt had there been a storm like that, with such devastating hail and continuous lightning. '
  '25':
  - type: text
    content: 'It left all of Egypt in ruins. The hail struck down everything in the open field—people, animals, and plants alike. Even the trees were destroyed. '
  '26':
  - type: text
    content: The only place without hail was the region of Goshen, where the people of Israel lived.
  '27':
  - type: text
    content: 'Then Pharaoh quickly summoned Moses and Aaron. “This time I have sinned,” he confessed. “The '
  - type: text
    content: Lord
  - type: text
    content: ' is the righteous one, and my people and I are wrong. '
  '28':
  - type: text
    content: 'Please beg the '
  - type: text
    content: Lord
  - type: text
    content: ' to end this terrifying thunder and hail. We’ve had enough. I will let you go; you don’t need to stay any longer.”'
  '29':
  - type: text
    content: '“All right,” Moses replied. “As soon as I leave the city, I will lift my hands and pray to the '
  - type: text
    content: Lord
  - type: text
    content: '. Then the thunder and hail will stop, and you will know that the earth belongs to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' will strike all your livestock—your horses, donkeys, camels, cattle, sheep, and goats—with a deadly plague. '
  '30':
  - type: text
    content: 'But I know that you and your officials still do not fear the '
  - type: text
    content: Lord
  - type: text
    content: ' God.”'
  '31':
  - type: text
    content: '(All the flax and barley were ruined by the hail, because the barley had formed heads and the flax was budding. '
  '32':
  - type: text
    content: But the wheat and the emmer wheat were spared, because they had not yet sprouted from the ground.)
  '33':
  - type: text
    content: 'So Moses left Pharaoh’s court and went out of the city. When he lifted his hands to the '
  - type: text
    content: Lord
  - type: text
    content: ', the thunder and hail stopped, and the downpour ceased. '
  '34':
  - type: text
    content: But when Pharaoh saw that the rain, hail, and thunder had stopped, he and his officials sinned again, and Pharaoh again became stubborn.
  - type: note
    content: Hebrew made his heart heavy.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Because his heart was hard, Pharaoh refused to let the people leave, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had predicted through Moses.'
  '4':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' will again make a distinction between the livestock of the Israelites and that of the Egyptians. Not a single one of Israel’s animals will die! '
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has already set the time for the plague to begin. He has declared that he will strike the land tomorrow.’”'
  '6':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' did just as he had said. The next morning all the livestock of the Egyptians died, but the Israelites didn’t lose a single animal. '
  '7':
  - type: text
    content: Pharaoh sent his officials to investigate, and they discovered that the Israelites had not lost a single animal! But even so, Pharaoh’s heart remained stubborn,
  - type: note
    content: Hebrew heavy.
  - type: text
    content: ' and he still refused to let the people go.'
  - type: heading
    content: A Plague of Festering Boils
  '8':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, “Take handfuls of soot from a brick kiln, and have Moses toss it into the air while Pharaoh watches. '
  '9':
  - type: text
    content: The ashes will spread like fine dust over the whole land of Egypt, causing festering boils to break out on people and animals throughout the land.”
