document_id: PSA.88,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of the descendants of Korah. A song to be sung to the tune “The Suffering of Affliction.” A psalm'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '88:TITLE '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maskil. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may be a literary or musical term.
      marker-yv: yv-n
    - type: text
      text: ' of Heman the Ezrahite.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of my salvation,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I cry out to you by day.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I come to you at night.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are your wonderful deeds of any use to the dead?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Do the dead rise up and praise you? '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can those in the grave declare your unfailing love?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can they proclaim your faithfulness in the place of destruction?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '88:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in Abaddon?
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can the darkness speak of your wonderful deeds?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can anyone in the land of forgetfulness talk about your righteousness?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I cry out to you.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will keep on pleading day by day.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', why do you reject me?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do you turn your face from me?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have been sick and close to death since my youth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I stand helpless and desperate before your terrors.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your fierce anger has overwhelmed me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your terrors have paralyzed me.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They swirl around me like floodwaters all day long.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have engulfed me completely.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have taken away my companions and loved ones.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Darkness is my closest friend.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now hear my prayer;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen to my cry.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my life is full of troubles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and death
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '88:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Sheol.
      marker-yv: yv-n
    - type: text
      text: ' draws near.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am as good as dead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a strong man with no strength left.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have left me among the dead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I lie like a corpse in a grave.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am forgotten,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cut off from your care.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have thrown me into the lowest pit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into the darkest depths.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your anger weighs me down;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'with wave after wave you have engulfed me. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have driven my friends away
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by making me repulsive to them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am in a trap with no way of escape.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My eyes are blinded by my tears.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Each day I beg for your help, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I lift my hands to you for mercy.
