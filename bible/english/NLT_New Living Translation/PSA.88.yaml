document_id: PSA.88,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of the descendants of Korah. A song to be sung to the tune “The Suffering of Affliction.” A psalm'
  - type: note
    content: Hebrew maskil. This may be a literary or musical term.
  - type: text
    content: ' of Heman the Ezrahite.'
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', God of my salvation,'
  - type: text
    content: I cry out to you by day.
  - type: text
    content: I come to you at night.
  '10':
  - type: text
    content: Are your wonderful deeds of any use to the dead?
  - type: text
    content: 'Do the dead rise up and praise you? '
  - type: text
    content: Interlude
  '11':
  - type: text
    content: Can those in the grave declare your unfailing love?
  - type: text
    content: Can they proclaim your faithfulness in the place of destruction?
  - type: note
    content: Hebrew in Abaddon?
  '12':
  - type: text
    content: Can the darkness speak of your wonderful deeds?
  - type: text
    content: Can anyone in the land of forgetfulness talk about your righteousness?
  '13':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', I cry out to you.'
  - type: text
    content: I will keep on pleading day by day.
  '14':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', why do you reject me?'
  - type: text
    content: Why do you turn your face from me?
  '15':
  - type: text
    content: I have been sick and close to death since my youth.
  - type: text
    content: I stand helpless and desperate before your terrors.
  '16':
  - type: text
    content: Your fierce anger has overwhelmed me.
  - type: text
    content: Your terrors have paralyzed me.
  '17':
  - type: text
    content: They swirl around me like floodwaters all day long.
  - type: text
    content: They have engulfed me completely.
  '18':
  - type: text
    content: You have taken away my companions and loved ones.
  - type: text
    content: Darkness is my closest friend.
  '2':
  - type: text
    content: Now hear my prayer;
  - type: text
    content: listen to my cry.
  '3':
  - type: text
    content: For my life is full of troubles,
  - type: text
    content: and death
  - type: note
    content: Hebrew Sheol.
  - type: text
    content: ' draws near.'
  '4':
  - type: text
    content: I am as good as dead,
  - type: text
    content: like a strong man with no strength left.
  '5':
  - type: text
    content: They have left me among the dead,
  - type: text
    content: and I lie like a corpse in a grave.
  - type: text
    content: I am forgotten,
  - type: text
    content: cut off from your care.
  '6':
  - type: text
    content: You have thrown me into the lowest pit,
  - type: text
    content: into the darkest depths.
  '7':
  - type: text
    content: Your anger weighs me down;
  - type: text
    content: 'with wave after wave you have engulfed me. '
  - type: text
    content: Interlude
  '8':
  - type: text
    content: You have driven my friends away
  - type: text
    content: by making me repulsive to them.
  - type: text
    content: I am in a trap with no way of escape.
  '9':
  - type: text
    content: My eyes are blinded by my tears.
  - type: text
    content: 'Each day I beg for your help, O '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: I lift my hands to you for mercy.
