document_id: 1CH.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: From Adam to Noah’s Sons
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The descendants of Adam were Seth, Enosh, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Kenan, Mahalalel, Jared, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Enoch, Methuselah, Lamech, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: and Noah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The sons of Noah were
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version (see also Gen 5:3-32); Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The sons of Noah were.
    marker-yv: yv-n
  - type: text
    text: ' Shem, Ham, and Japheth.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Japheth
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The descendants of Japheth were Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The descendants of Gomer were Ashkenaz, Riphath,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Hebrew manuscripts and Greek version (see also Gen 10:3); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Diphath.
    marker-yv: yv-n
  - type: text
    text: ' and Togarmah.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The descendants of Javan were Elishah, Tarshish, Kittim, and Rodanim.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Ham
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The descendants of Ham were Cush, Mizraim,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Egypt; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 1:11.
    marker-yv: yv-n
  - type: text
    text: ' Put, and Canaan.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The descendants of Cush were Seba, Havilah, Sabtah, Raamah, and Sabteca. The descendants of Raamah were Sheba and Dedan. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Cush was also the ancestor of Nimrod, who was the first heroic warrior on earth.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mizraim was the ancestor of the Ludites, Anamites, Lehabites, Naphtuhites, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pathrusites, Casluhites, and the Caphtorites, from whom the Philistines came.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Casluhites, from whom the Philistines came, Caphtorites. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Jer 47:4; Amos 9:7.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Canaan’s oldest son was Sidon, the ancestor of the Sidonians. Canaan was also the ancestor of the Hittites,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ancestor of Heth.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jebusites, Amorites, Girgashites, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hivites, Arkites, Sinites, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Arvadites, Zemarites, and Hamathites.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Shem
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The descendants of Shem were Elam, Asshur, Arphaxad, Lud, and Aram.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The descendants of Aram were
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in one Hebrew manuscript and some Greek manuscripts (see also Gen 10:23); most Hebrew manuscripts lack '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The descendants of Aram were.
    marker-yv: yv-n
  - type: text
    text: ' Uz, Hul, Gether, and Mash.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at Gen 10:23; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and Meshech.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Arphaxad was the father of Shelah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Shelah was the father of Eber.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Eber had two sons. The first was named Peleg (which means “division”), for during his lifetime the people of the world were divided into different language groups. His brother’s name was Joktan.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Joktan was the ancestor of Almodad, Sheleph, Hazarmaveth, Jerah, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hadoram, Uzal, Diklah, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Obal,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Hebrew manuscripts and Syriac version (see also Gen 10:28); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ebal.
    marker-yv: yv-n
  - type: text
    text: ' Abimael, Sheba, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ophir, Havilah, and Jobab. All these were descendants of Joktan.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So this is the family line descended from Shem: Arphaxad, Shelah,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Greek manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Arphaxad, Cainan, Shelah. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See notes on Gen 10:24; 11:12-13.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Eber, Peleg, Reu, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Serug, Nahor, Terah, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: and Abram, later known as Abraham.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Abraham
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The sons of Abraham were Isaac and Ishmael. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'These are their genealogical records:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'The sons of Ishmael were Nebaioth (the oldest), Kedar, Adbeel, Mibsam, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mishma, Dumah, Massa, Hadad, Tema, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Jetur, Naphish, and Kedemah. These were the sons of Ishmael.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The sons of Keturah, Abraham’s concubine, were Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The sons of Jokshan were Sheba and Dedan.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: The sons of Midian were Ephah, Epher, Hanoch, Abida, and Eldaah.
- type: usfm
  marker: m
  children:
  - type: text
    text: All these were descendants of Abraham through his concubine Keturah.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Isaac
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Abraham was the father of Isaac. The sons of Isaac were Esau and Israel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:34 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Israel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is the name that God gave to Jacob.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Esau
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: The sons of Esau were Eliphaz, Reuel, Jeush, Jalam, and Korah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: The descendants of Eliphaz were Teman, Omar, Zepho,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:36a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in many Hebrew manuscripts and a few Greek manuscripts (see also Gen 36:11); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zephi.
    marker-yv: yv-n
  - type: text
    text: ' Gatam, Kenaz, and Amalek, who was born to Timna.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:36b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Greek manuscripts (see also Gen 36:12); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Kenaz, Timna, and Amalek.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: The descendants of Reuel were Nahath, Zerah, Shammah, and Mizzah.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Original Peoples of Edom
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: The descendants of Seir were Lotan, Shobal, Zibeon, Anah, Dishon, Ezer, and Dishan.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: The descendants of Lotan were Hori and Hemam.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at Gen 36:22; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and Homam.
    marker-yv: yv-n
  - type: text
    text: ' Lotan’s sister was named Timna.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: The descendants of Shobal were Alvan,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:40a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in many Hebrew manuscripts and a few Greek manuscripts (see also Gen 36:23); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Alian.
    marker-yv: yv-n
  - type: text
    text: ' Manahath, Ebal, Shepho,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:40b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Hebrew manuscripts (see also Gen 36:23); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shephi.
    marker-yv: yv-n
  - type: text
    text: ' and Onam.'
- type: usfm
  marker: li1
  children:
  - type: text
    text: The descendants of Zibeon were Aiah and Anah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: The son of Anah was Dishon.
- type: usfm
  marker: li1
  children:
  - type: text
    text: The descendants of Dishon were Hemdan,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in many Hebrew manuscripts and some Greek manuscripts (see also Gen 36:26); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hamran.
    marker-yv: yv-n
  - type: text
    text: ' Eshban, Ithran, and Keran.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: The descendants of Ezer were Bilhan, Zaavan, and Akan.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:42a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in many Hebrew and Greek manuscripts (see also Gen 36:27); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jaakan.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: The descendants of Dishan
  - type: usfm
    marker: f
    children:
