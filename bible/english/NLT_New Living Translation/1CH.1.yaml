document_id: 1CH.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: From Adam to Noah’s Sons
  - type: text
    content: 'The descendants of Adam were Seth, Enosh, '
  '10':
  - type: text
    content: Cush was also the ancestor of Nimrod, who was the first heroic warrior on earth.
  '11':
  - type: text
    content: 'Mizraim was the ancestor of the Ludites, Anamites, Lehabites, Naphtuhites, '
  '12':
  - type: text
    content: Pathrusites, Casluhites, and the Caphtorites, from whom the Philistines came.
  - type: note
    content: Hebrew Casluhites, from whom the Philistines came, Caphtorites. See Jer 47:4; Amos 9:7.
  '13':
  - type: text
    content: Canaan’s oldest son was Sidon, the ancestor of the Sidonians. Canaan was also the ancestor of the Hittites,
  - type: note
    content: Hebrew ancestor of Heth.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Jebusites, Amorites, Girgashites, '
  '15':
  - type: text
    content: 'Hivites, Arkites, Sinites, '
  '16':
  - type: text
    content: Arvadites, Zemarites, and Hamathites.
  - type: heading
    content: Descendants of Shem
  '17':
  - type: text
    content: The descendants of Shem were Elam, Asshur, Arphaxad, Lud, and Aram.
  - type: text
    content: The descendants of Aram were
  - type: note
    content: As in one Hebrew manuscript and some Greek manuscripts (see also Gen 10:23); most Hebrew manuscripts lack The descendants of Aram were.
  - type: text
    content: ' Uz, Hul, Gether, and Mash.'
  - type: note
    content: As in parallel text at Gen 10:23; Hebrew reads and Meshech.
  '18':
  - type: text
    content: Arphaxad was the father of Shelah.
  - type: text
    content: Shelah was the father of Eber.
  '19':
  - type: text
    content: Eber had two sons. The first was named Peleg (which means “division”), for during his lifetime the people of the world were divided into different language groups. His brother’s name was Joktan.
  '2':
  - type: text
    content: 'Kenan, Mahalalel, Jared, '
  '20':
  - type: text
    content: 'Joktan was the ancestor of Almodad, Sheleph, Hazarmaveth, Jerah, '
  '21':
  - type: text
    content: 'Hadoram, Uzal, Diklah, '
  '22':
  - type: text
    content: Obal,
  - type: note
    content: As in some Hebrew manuscripts and Syriac version (see also Gen 10:28); most Hebrew manuscripts read Ebal.
  - type: text
    content: ' Abimael, Sheba, '
  '23':
  - type: text
    content: Ophir, Havilah, and Jobab. All these were descendants of Joktan.
  '24':
  - type: text
    content: 'So this is the family line descended from Shem: Arphaxad, Shelah,'
  - type: note
    content: Some Greek manuscripts read Arphaxad, Cainan, Shelah. See notes on Gen 10:24; 11:12-13.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Eber, Peleg, Reu, '
  '26':
  - type: text
    content: 'Serug, Nahor, Terah, '
  '27':
  - type: text
    content: and Abram, later known as Abraham.
  - type: heading
    content: Descendants of Abraham
  '28':
  - type: text
    content: 'The sons of Abraham were Isaac and Ishmael. '
  '29':
  - type: text
    content: 'These are their genealogical records:'
  - type: text
    content: 'The sons of Ishmael were Nebaioth (the oldest), Kedar, Adbeel, Mibsam, '
  '3':
  - type: text
    content: 'Enoch, Methuselah, Lamech, '
  '30':
  - type: text
    content: 'Mishma, Dumah, Massa, Hadad, Tema, '
  '31':
  - type: text
    content: Jetur, Naphish, and Kedemah. These were the sons of Ishmael.
  '32':
  - type: text
    content: The sons of Keturah, Abraham’s concubine, were Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah.
  - type: text
    content: The sons of Jokshan were Sheba and Dedan.
  '33':
  - type: text
    content: The sons of Midian were Ephah, Epher, Hanoch, Abida, and Eldaah.
  - type: text
    content: All these were descendants of Abraham through his concubine Keturah.
  - type: heading
    content: Descendants of Isaac
  '34':
  - type: text
    content: Abraham was the father of Isaac. The sons of Isaac were Esau and Israel.
  - type: note
    content: Israel is the name that God gave to Jacob.
  - type: heading
    content: Descendants of Esau
  '35':
  - type: text
    content: The sons of Esau were Eliphaz, Reuel, Jeush, Jalam, and Korah.
  '36':
  - type: text
    content: The descendants of Eliphaz were Teman, Omar, Zepho,
  - type: note
    content: As in many Hebrew manuscripts and a few Greek manuscripts (see also Gen 36:11); most Hebrew manuscripts read Zephi.
  - type: text
    content: ' Gatam, Kenaz, and Amalek, who was born to Timna.'
  - type: note
    content: As in some Greek manuscripts (see also Gen 36:12); Hebrew reads Kenaz, Timna, and Amalek.
  '37':
  - type: text
    content: The descendants of Reuel were Nahath, Zerah, Shammah, and Mizzah.
  - type: heading
    content: Original Peoples of Edom
  '38':
  - type: text
    content: The descendants of Seir were Lotan, Shobal, Zibeon, Anah, Dishon, Ezer, and Dishan.
  '39':
  - type: text
    content: The descendants of Lotan were Hori and Hemam.
  - type: note
    content: As in parallel text at Gen 36:22; Hebrew reads and Homam.
  - type: text
    content: ' Lotan’s sister was named Timna.'
  '4':
  - type: text
    content: and Noah.
  - type: text
    content: The sons of Noah were
  - type: note
    content: As in Greek version (see also Gen 5:3-32); Hebrew lacks The sons of Noah were.
  - type: text
    content: ' Shem, Ham, and Japheth.'
  - type: heading
    content: Descendants of Japheth
  '40':
  - type: text
    content: The descendants of Shobal were Alvan,
  - type: note
    content: As in many Hebrew manuscripts and a few Greek manuscripts (see also Gen 36:23); most Hebrew manuscripts read Alian.
  - type: text
    content: ' Manahath, Ebal, Shepho,'
  - type: note
    content: As in some Hebrew manuscripts (see also Gen 36:23); most Hebrew manuscripts read Shephi.
  - type: text
    content: ' and Onam.'
  - type: text
    content: The descendants of Zibeon were Aiah and Anah.
  '41':
  - type: text
    content: The son of Anah was Dishon.
  - type: text
    content: The descendants of Dishon were Hemdan,
  - type: note
    content: As in many Hebrew manuscripts and some Greek manuscripts (see also Gen 36:26); most Hebrew manuscripts read Hamran.
  - type: text
    content: ' Eshban, Ithran, and Keran.'
  '42':
  - type: text
    content: The descendants of Ezer were Bilhan, Zaavan, and Akan.
  - type: note
    content: As in many Hebrew and Greek manuscripts (see also Gen 36:27); most Hebrew manuscripts read Jaakan.
  - type: text
    content: The descendants of Dishan
  - type: note
    content: Hebrew Dishon; compare 1:38 and parallel text at Gen 36:28.
  - type: text
    content: ' were Uz and Aran.'
  - type: heading
    content: Rulers of Edom
  '43':
  - type: text
    content: These are the kings who ruled in the land of Edom before any king ruled over the Israelites
  - type: note
    content: Or before an Israelite king ruled over them.
  - type: text
    content: ':'
  - type: text
    content: Bela son of Beor, who ruled from his city of Dinhabah.
  '44':
  - type: text
    content: When Bela died, Jobab son of Zerah from Bozrah became king in his place.
  '45':
  - type: text
    content: When Jobab died, Husham from the land of the Temanites became king in his place.
  '46':
  - type: text
    content: When Husham died, Hadad son of Bedad became king in his place and ruled from the city of Avith. He was the one who destroyed the Midianite army in the land of Moab.
  '47':
  - type: text
    content: When Hadad died, Samlah from the city of Masrekah became king in his place.
  '48':
  - type: text
    content: When Samlah died, Shaul from the city of Rehoboth-on-the-River became king in his place.
  '49':
  - type: text
    content: When Shaul died, Baal-hanan son of Acbor became king in his place.
  '5':
  - type: text
    content: The descendants of Japheth were Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras.
  '50':
  - type: text
    content: When Baal-hanan died, Hadad became king in his place and ruled from the city of Pau.
  - type: note
    content: As in many Hebrew manuscripts, some Greek manuscripts, Syriac version, and Latin Vulgate (see also Gen 36:39); most Hebrew manuscripts read Pai.
  - type: text
    content: ' His wife was Mehetabel, the daughter of Matred and granddaughter of Me-zahab. '
  '51':
  - type: text
    content: Then Hadad died.
  - type: text
    content: The clan leaders of Edom were Timna, Alvah,
  - type: note
    content: As in an alternate reading of the Masoretic Text (see also Gen 36:40); the other alternate reads Aliah.
  - type: text
    content: ' Jetheth, '
  '52':
  - type: text
    content: 'Oholibamah, Elah, Pinon, '
  '53':
  - type: text
    content: 'Kenaz, Teman, Mibzar, '
  '54':
  - type: text
    content: Magdiel, and Iram. These are the clan leaders of Edom.
  '6':
  - type: text
    content: The descendants of Gomer were Ashkenaz, Riphath,
  - type: note
    content: As in some Hebrew manuscripts and Greek version (see also Gen 10:3); most Hebrew manuscripts read Diphath.
  - type: text
    content: ' and Togarmah.'
  '7':
  - type: text
    content: The descendants of Javan were Elishah, Tarshish, Kittim, and Rodanim.
  - type: heading
    content: Descendants of Ham
  '8':
  - type: text
    content: The descendants of Ham were Cush, Mizraim,
  - type: note
    content: Or Egypt; also in 1:11.
  - type: text
    content: ' Put, and Canaan.'
  '9':
  - type: text
    content: 'The descendants of Cush were Seba, Havilah, Sabtah, Raamah, and Sabteca. The descendants of Raamah were Sheba and Dedan. '
