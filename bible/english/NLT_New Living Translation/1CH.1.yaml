document_id: 1CH.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: From Adam to Noah’s Sons
    marker-yv: yv-h
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The descendants of Adam were Seth, Enosh, '
  '10':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Cush was also the ancestor of Nimrod, who was the first heroic warrior on earth.
  '11':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Mizraim was the ancestor of the Ludites, Anamites, Lehabites, Naphtuhites, '
  '12':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Pathrusites, Casluhites, and the Caphtorites, from whom the Philistines came.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Casluhites, from whom the Philistines came, Caphtorites. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Jer 47:4; Amos 9:7.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Canaan’s oldest son was Sidon, the ancestor of the Sidonians. Canaan was also the ancestor of the Hittites,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ancestor of Heth.
      marker-yv: yv-n
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Jebusites, Amorites, Girgashites, '
  '15':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Hivites, Arkites, Sinites, '
  '16':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Arvadites, Zemarites, and Hamathites.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Shem
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The descendants of Shem were Elam, Asshur, Arphaxad, Lud, and Aram.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The descendants of Aram were
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in one Hebrew manuscript and some Greek manuscripts (see also Gen 10:23); most Hebrew manuscripts lack '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The descendants of Aram were.
      marker-yv: yv-n
    - type: text
      text: ' Uz, Hul, Gether, and Mash.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at Gen 10:23; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and Meshech.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Arphaxad was the father of Shelah.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shelah was the father of Eber.
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eber had two sons. The first was named Peleg (which means “division”), for during his lifetime the people of the world were divided into different language groups. His brother’s name was Joktan.
  '2':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Kenan, Mahalalel, Jared, '
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Joktan was the ancestor of Almodad, Sheleph, Hazarmaveth, Jerah, '
  '21':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Hadoram, Uzal, Diklah, '
  '22':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Obal,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts and Syriac version (see also Gen 10:28); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ebal.
      marker-yv: yv-n
    - type: text
      text: ' Abimael, Sheba, '
  '23':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ophir, Havilah, and Jobab. All these were descendants of Joktan.
  '24':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'So this is the family line descended from Shem: Arphaxad, Shelah,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Greek manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Arphaxad, Cainan, Shelah. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See notes on Gen 10:24; 11:12-13.
      marker-yv: yv-n
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Eber, Peleg, Reu, '
  '26':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Serug, Nahor, Terah, '
  '27':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: and Abram, later known as Abraham.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Abraham
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Abraham were Isaac and Ishmael. '
  '29':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'These are their genealogical records:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Ishmael were Nebaioth (the oldest), Kedar, Adbeel, Mibsam, '
  '3':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Enoch, Methuselah, Lamech, '
  '30':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Mishma, Dumah, Massa, Hadad, Tema, '
  '31':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jetur, Naphish, and Kedemah. These were the sons of Ishmael.
  '32':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sons of Keturah, Abraham’s concubine, were Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sons of Jokshan were Sheba and Dedan.
  '33':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sons of Midian were Ephah, Epher, Hanoch, Abida, and Eldaah.
  - type: usfm
    marker: m
    children:
    - type: text
      text: All these were descendants of Abraham through his concubine Keturah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Isaac
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Abraham was the father of Isaac. The sons of Isaac were Esau and Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:34 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Israel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is the name that God gave to Jacob.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Esau
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sons of Esau were Eliphaz, Reuel, Jeush, Jalam, and Korah.
  '36':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The descendants of Eliphaz were Teman, Omar, Zepho,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:36a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in many Hebrew manuscripts and a few Greek manuscripts (see also Gen 36:11); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zephi.
      marker-yv: yv-n
    - type: text
      text: ' Gatam, Kenaz, and Amalek, who was born to Timna.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:36b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts (see also Gen 36:12); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Kenaz, Timna, and Amalek.
      marker-yv: yv-n
  '37':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The descendants of Reuel were Nahath, Zerah, Shammah, and Mizzah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Original Peoples of Edom
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The descendants of Seir were Lotan, Shobal, Zibeon, Anah, Dishon, Ezer, and Dishan.
  '39':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The descendants of Lotan were Hori and Hemam.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at Gen 36:22; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and Homam.
      marker-yv: yv-n
    - type: text
      text: ' Lotan’s sister was named Timna.'
  '4':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: and Noah.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sons of Noah were
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version (see also Gen 5:3-32); Hebrew lacks '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The sons of Noah were.
      marker-yv: yv-n
    - type: text
      text: ' Shem, Ham, and Japheth.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Japheth
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The descendants of Shobal were Alvan,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:40a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in many Hebrew manuscripts and a few Greek manuscripts (see also Gen 36:23); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Alian.
      marker-yv: yv-n
    - type: text
      text: ' Manahath, Ebal, Shepho,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:40b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts (see also Gen 36:23); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shephi.
      marker-yv: yv-n
    - type: text
      text: ' and Onam.'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The descendants of Zibeon were Aiah and Anah.
  '41':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The son of Anah was Dishon.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The descendants of Dishon were Hemdan,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in many Hebrew manuscripts and some Greek manuscripts (see also Gen 36:26); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hamran.
      marker-yv: yv-n
    - type: text
      text: ' Eshban, Ithran, and Keran.'
  '42':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The descendants of Ezer were Bilhan, Zaavan, and Akan.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:42a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in many Hebrew and Greek manuscripts (see also Gen 36:27); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jaakan.
      marker-yv: yv-n
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The descendants of Dishan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:42b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dishon; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare 1:38 and parallel text at Gen 36:28.
      marker-yv: yv-n
    - type: text
      text: ' were Uz and Aran.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rulers of Edom
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: m
    children:
    - type: text
      text: These are the kings who ruled in the land of Edom before any king ruled over the Israelites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: before an Israelite king ruled over them.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Bela son of Beor, who ruled from his city of Dinhabah.
  '44':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: When Bela died, Jobab son of Zerah from Bozrah became king in his place.
  '45':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: When Jobab died, Husham from the land of the Temanites became king in his place.
  '46':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: When Husham died, Hadad son of Bedad became king in his place and ruled from the city of Avith. He was the one who destroyed the Midianite army in the land of Moab.
  '47':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: When Hadad died, Samlah from the city of Masrekah became king in his place.
  '48':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: When Samlah died, Shaul from the city of Rehoboth-on-the-River became king in his place.
  '49':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: When Shaul died, Baal-hanan son of Acbor became king in his place.
  '5':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The descendants of Japheth were Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras.
  '50':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: When Baal-hanan died, Hadad became king in his place and ruled from the city of Pau.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in many Hebrew manuscripts, some Greek manuscripts, Syriac version, and Latin Vulgate (see also Gen 36:39); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Pai.
      marker-yv: yv-n
    - type: text
      text: ' His wife was Mehetabel, the daughter of Matred and granddaughter of Me-zahab. '
  '51':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Then Hadad died.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The clan leaders of Edom were Timna, Alvah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:51 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in an alternate reading of the Masoretic Text (see also Gen 36:40); the other alternate reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Aliah.
      marker-yv: yv-n
    - type: text
      text: ' Jetheth, '
  '52':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Oholibamah, Elah, Pinon, '
  '53':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Kenaz, Teman, Mibzar, '
  '54':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Magdiel, and Iram. These are the clan leaders of Edom.
  '6':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The descendants of Gomer were Ashkenaz, Riphath,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts and Greek version (see also Gen 10:3); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Diphath.
      marker-yv: yv-n
    - type: text
      text: ' and Togarmah.'
  '7':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The descendants of Javan were Elishah, Tarshish, Kittim, and Rodanim.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendants of Ham
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The descendants of Ham were Cush, Mizraim,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Egypt; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 1:11.
      marker-yv: yv-n
    - type: text
      text: ' Put, and Canaan.'
  '9':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The descendants of Cush were Seba, Havilah, Sabtah, Raamah, and Sabteca. The descendants of Raamah were Sheba and Dedan. '
