document_id: 2KI.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoahaz Rules in Israel
  - type: text
    content: 'Jehoahaz son of Jehu began to rule over Israel in the twenty-third year of King Joash’s reign in Judah. He reigned in Samaria seventeen years. '
  '10':
  - type: text
    content: 'Jehoash son of Jehoahaz began to rule over Israel in the thirty-seventh year of King Joash’s reign in Judah. He reigned in Samaria sixteen years. '
  '11':
  - type: text
    content: 'But he did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight. He refused to turn from the sins that Jeroboam son of Nebat had led Israel to commit.
  '12':
  - type: text
    content: 'The rest of the events in Jehoash’s reign and everything he did, including the extent of his power and his war with King Amaziah of Judah, are recorded in '
  - type: text
    content: The Book of the History of the Kings of Israel.
  - type: text
    content: ' '
  '13':
  - type: text
    content: When Jehoash died, he was buried in Samaria with the kings of Israel. Then his son Jeroboam II became the next king.
  - type: heading
    content: Elisha’s Final Prophecy
  '14':
  - type: text
    content: When Elisha was in his last illness, King Jehoash of Israel visited him and wept over him. “My father! My father! I see the chariots and charioteers of Israel!” he cried.
  '15':
  - type: text
    content: 'Elisha told him, “Get a bow and some arrows.” And the king did as he was told. '
  '16':
  - type: text
    content: Elisha told him, “Put your hand on the bow,” and Elisha laid his own hands on the king’s hands.
  '17':
  - type: text
    content: 'Then he commanded, “Open that eastern window,” and he opened it. Then he said, “Shoot!” So he shot an arrow. Elisha proclaimed, “This is the '
  - type: text
    content: Lord
  - type: text
    content: ’s arrow, an arrow of victory over Aram, for you will completely conquer the Arameans at Aphek.”
  '18':
  - type: text
    content: 'Then he said, “Now pick up the other arrows and strike them against the ground.” So the king picked them up and struck the ground three times. '
  '19':
  - type: text
    content: But the man of God was angry with him. “You should have struck the ground five or six times!” he exclaimed. “Then you would have beaten Aram until it was entirely destroyed. Now you will be victorious only three times.”
  '2':
  - type: text
    content: 'But he did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight. He followed the example of Jeroboam son of Nebat, continuing the sins that Jeroboam had led Israel to commit. '
  '20':
  - type: text
    content: Then Elisha died and was buried.
  - type: text
    content: 'Groups of Moabite raiders used to invade the land each spring. '
  '21':
  - type: text
    content: Once when some Israelites were burying a man, they spied a band of these raiders. So they hastily threw the corpse into the tomb of Elisha and fled. But as soon as the body touched Elisha’s bones, the dead man revived and jumped to his feet!
  '22':
  - type: text
    content: 'King Hazael of Aram had oppressed Israel during the entire reign of King Jehoahaz. '
  '23':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' was gracious and merciful to the people of Israel, and they were not totally destroyed. He pitied them because of his covenant with Abraham, Isaac, and Jacob. And to this day he still has not completely destroyed them or banished them from his presence.'
  '24':
  - type: text
    content: 'King Hazael of Aram died, and his son Ben-hadad became the next king. '
  '25':
  - type: text
    content: Then Jehoash son of Jehoahaz recaptured from Ben-hadad son of Hazael the towns that had been taken from Jehoash’s father, Jehoahaz. Jehoash defeated Ben-hadad on three occasions, and he recovered the Israelite towns.
  '3':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' was very angry with Israel, and he allowed King Hazael of Aram and his son Ben-hadad to defeat them repeatedly.'
  '4':
  - type: text
    content: 'Then Jehoahaz prayed for the '
  - type: text
    content: Lord
  - type: text
    content: '’s help, and the '
  - type: text
    content: Lord
  - type: text
    content: ' heard his prayer, for he could see how severely the king of Aram was oppressing Israel. '
  '5':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' provided someone to rescue the Israelites from the tyranny of the Arameans. Then Israel lived in safety again as they had in former days.'
  '6':
  - type: text
    content: 'But they continued to sin, following the evil example of Jeroboam. They also allowed the Asherah pole in Samaria to remain standing. '
  '7':
  - type: text
    content: Finally, Jehoahaz’s army was reduced to 50 charioteers, 10 chariots, and 10,000 foot soldiers. The king of Aram had killed the others, trampling them like dust under his feet.
  '8':
  - type: text
    content: 'The rest of the events in Jehoahaz’s reign—everything he did and the extent of his power—are recorded in '
  - type: text
    content: The Book of the History of the Kings of Israel.
  - type: text
    content: ' '
  '9':
  - type: text
    content: When Jehoahaz died, he was buried in Samaria. Then his son Jehoash
  - type: note
    content: Hebrew Joash, a variant spelling of Jehoash; also in 13:10, 12, 13, 14, 25.
  - type: text
    content: ' became the next king.'
  - type: heading
    content: Jehoash Rules in Israel
