document_id: 2KI.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoahaz Rules in Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jehoahaz son of Jehu began to rule over Israel in the twenty-third year of King Joash’s reign in Judah. He reigned in Samaria seventeen years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But he did what was evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s sight. He followed the example of Jeroboam son of Nebat, continuing the sins that Jeroboam had led Israel to commit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was very angry with Israel, and he allowed King Hazael of Aram and his son Ben-hadad to defeat them repeatedly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Jehoahaz prayed for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s help, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' heard his prayer, for he could see how severely the king of Aram was oppressing Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' provided someone to rescue the Israelites from the tyranny of the Arameans. Then Israel lived in safety again as they had in former days.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But they continued to sin, following the evil example of Jeroboam. They also allowed the Asherah pole in Samaria to remain standing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Finally, Jehoahaz’s army was reduced to 50 charioteers, 10 chariots, and 10,000 foot soldiers. The king of Aram had killed the others, trampling them like dust under his feet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The rest of the events in Jehoahaz’s reign—everything he did and the extent of his power—are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: When Jehoahaz died, he was buried in Samaria. Then his son Jehoash
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Joash, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoash; also in 13:10, 12, 13, 14, 25.
    marker-yv: yv-n
  - type: text
    text: ' became the next king.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoash Rules in Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jehoash son of Jehoahaz began to rule over Israel in the thirty-seventh year of King Joash’s reign in Judah. He reigned in Samaria sixteen years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But he did what was evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s sight. He refused to turn from the sins that Jeroboam son of Nebat had led Israel to commit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The rest of the events in Jehoash’s reign and everything he did, including the extent of his power and his war with King Amaziah of Judah, are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When Jehoash died, he was buried in Samaria with the kings of Israel. Then his son Jeroboam II became the next king.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elisha’s Final Prophecy
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When Elisha was in his last illness, King Jehoash of Israel visited him and wept over him. “My father! My father! I see the chariots and charioteers of Israel!” he cried.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elisha told him, “Get a bow and some arrows.” And the king did as he was told. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Elisha told him, “Put your hand on the bow,” and Elisha laid his own hands on the king’s hands.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then he commanded, “Open that eastern window,” and he opened it. Then he said, “Shoot!” So he shot an arrow. Elisha proclaimed, “This is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s arrow, an arrow of victory over Aram, for you will completely conquer the Arameans at Aphek.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then he said, “Now pick up the other arrows and strike them against the ground.” So the king picked them up and struck the ground three times. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But the man of God was angry with him. “You should have struck the ground five or six times!” he exclaimed. “Then you would have beaten Aram until it was entirely destroyed. Now you will be victorious only three times.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then Elisha died and was buried.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Groups of Moabite raiders used to invade the land each spring. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Once when some Israelites were burying a man, they spied a band of these raiders. So they hastily threw the corpse into the tomb of Elisha and fled. But as soon as the body touched Elisha’s bones, the dead man revived and jumped to his feet!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'King Hazael of Aram had oppressed Israel during the entire reign of King Jehoahaz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was gracious and merciful to the people of Israel, and they were not totally destroyed. He pitied them because of his covenant with Abraham, Isaac, and Jacob. And to this day he still has not completely destroyed them or banished them from his presence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'King Hazael of Aram died, and his son Ben-hadad became the next king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then Jehoash son of Jehoahaz recaptured from Ben-hadad son of Hazael the towns that had been taken from Jehoash’s father, Jehoahaz. Jehoash defeated Ben-hadad on three occasions, and he recovered the Israelite towns.
