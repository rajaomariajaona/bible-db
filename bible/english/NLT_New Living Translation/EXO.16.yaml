document_id: EXO.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Manna and Quail from Heaven
  - type: text
    content: Then the whole community of Israel set out from Elim and journeyed into the wilderness of Sin,
  - type: note
    content: The geographical name Sin is related to Sinai and should not be confused with the English word sin.
  - type: text
    content: ' between Elim and Mount Sinai. They arrived there on the fifteenth day of the second month, one month after leaving the land of Egypt.'
  - type: note
    content: The Exodus had occurred on the fifteenth day of the first month (see Num 33:3).
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'And as Aaron spoke to the whole community of Israel, they looked out toward the wilderness. There they could see the awesome glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' in the cloud.'
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '12':
  - type: text
    content: '“I have heard the Israelites’ complaints. Now tell them, ‘In the evening you will have meat to eat, and in the morning you will have all the bread you want. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.’”'
  '13':
  - type: text
    content: 'That evening vast numbers of quail flew in and covered the camp. And the next morning the area around the camp was wet with dew. '
  '14':
  - type: text
    content: 'When the dew evaporated, a flaky substance as fine as frost blanketed the ground. '
  '15':
  - type: text
    content: The Israelites were puzzled when they saw it. “What is it?” they asked each other. They had no idea what it was.
  - type: text
    content: 'And Moses told them, “It is the food the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you to eat. '
  '16':
  - type: text
    content: 'These are the '
  - type: text
    content: Lord
  - type: text
    content: '’s instructions: Each household should gather as much as it needs. Pick up two quarts'
  - type: note
    content: Hebrew 1 omer [2.2 liters]; also in 16:32, 33.
  - type: text
    content: ' for each person in your tent.”'
  '17':
  - type: text
    content: 'So the people of Israel did as they were told. Some gathered a lot, some only a little. '
  '18':
  - type: text
    content: But when they measured it out,
  - type: note
    content: Hebrew measured it with an omer.
  - type: text
    content: ' everyone had just enough. Those who gathered a lot had nothing left over, and those who gathered only a little had enough. Each family had just what it needed.'
  '19':
  - type: text
    content: 'Then Moses told them, “Do not keep any of it until morning.” '
  '2':
  - type: text
    content: There, too, the whole community of Israel complained about Moses and Aaron.
  '20':
  - type: text
    content: But some of them didn’t listen and kept some of it until morning. But by then it was full of maggots and had a terrible smell. Moses was very angry with them.
  '21':
  - type: text
    content: 'After this the people gathered the food morning by morning, each family according to its need. And as the sun became hot, the flakes they had not picked up melted and disappeared. '
  '22':
  - type: text
    content: On the sixth day, they gathered twice as much as usual—four quarts
  - type: note
    content: Hebrew 2 omers [4.4 liters].
  - type: text
    content: ' for each person instead of two. Then all the leaders of the community came and asked Moses for an explanation. '
  '23':
  - type: text
    content: 'He told them, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded: Tomorrow will be a day of complete rest, a holy Sabbath day set apart for the '
  - type: text
    content: Lord
  - type: text
    content: . So bake or boil as much as you want today, and set aside what is left for tomorrow.”
  '24':
  - type: text
    content: 'So they put some aside until morning, just as Moses had commanded. And in the morning the leftover food was wholesome and good, without maggots or odor. '
  '25':
  - type: text
    content: 'Moses said, “Eat this food today, for today is a Sabbath day dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: '. There will be no food on the ground today. '
  '26':
  - type: text
    content: You may gather the food for six days, but the seventh day is the Sabbath. There will be no food on the ground that day.”
  '27':
  - type: text
    content: 'Some of the people went out anyway on the seventh day, but they found no food. '
  '28':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' asked Moses, “How long will these people refuse to obey my commands and instructions? '
  '29':
  - type: text
    content: 'They must realize that the Sabbath is the '
  - type: text
    content: Lord
  - type: text
    content: '’s gift to you. That is why he gives you a two-day supply on the sixth day, so there will be enough for two days. On the Sabbath day you must each stay in your place. Do not go out to pick up food on the seventh day.” '
  '3':
  - type: text
    content: '“If only the '
  - type: text
    content: Lord
  - type: text
    content: ' had killed us back in Egypt,” they moaned. “There we sat around pots filled with meat and ate all the bread we wanted. But now you have brought us into this wilderness to starve us all to death.”'
  '30':
  - type: text
    content: So the people did not gather any food on the seventh day.
  '31':
  - type: text
    content: The Israelites called the food manna.
  - type: note
    content: Manna means “What is it?” See 16:15.
  - type: text
    content: ' It was white like coriander seed, and it tasted like honey wafers.'
  '32':
  - type: text
    content: 'Then Moses said, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded: Fill a two-quart container with manna to preserve it for your descendants. Then later generations will be able to see the food I gave you in the wilderness when I set you free from Egypt.”'
  '33':
  - type: text
    content: 'Moses said to Aaron, “Get a jar and fill it with two quarts of manna. Then put it in a sacred place before the '
  - type: text
    content: Lord
  - type: text
    content: ' to preserve it for all future generations.” '
  '34':
  - type: text
    content: 'Aaron did just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. He eventually placed it in the Ark of the Covenant—in front of the stone tablets inscribed with the terms of the covenant.'
  - type: note
    content: Hebrew He placed it in front of the Testimony; see note on 25:16.
  - type: text
    content: ' '
  '35':
  - type: text
    content: So the people of Israel ate manna for forty years until they arrived at the land where they would settle. They ate manna until they came to the border of the land of Canaan.
  '36':
  - type: text
    content: The container used to measure the manna was an omer, which was one-tenth of an ephah; it held about two quarts.
  - type: note
    content: Hebrew An omer is one-tenth of an ephah.
  '4':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Look, I’m going to rain down food from heaven for you. Each day the people can go out and pick up as much food as they need for that day. I will test them in this to see whether or not they will follow my instructions. '
  '5':
  - type: text
    content: On the sixth day they will gather food, and when they prepare it, there will be twice as much as usual.”
  '6':
  - type: text
    content: 'So Moses and Aaron said to all the people of Israel, “By evening you will realize it was the '
  - type: text
    content: Lord
  - type: text
    content: ' who brought you out of the land of Egypt. '
  '7':
  - type: text
    content: 'In the morning you will see the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ', because he has heard your complaints, which are against him, not against us. What have we done that you should complain about us?” '
  '8':
  - type: text
    content: 'Then Moses added, “The '
  - type: text
    content: Lord
  - type: text
    content: ' will give you meat to eat in the evening and bread to satisfy you in the morning, for he has heard all your complaints against him. What have we done? Yes, your complaints are against the '
  - type: text
    content: Lord
  - type: text
    content: ', not against us.”'
  '9':
  - type: text
    content: 'Then Moses said to Aaron, “Announce this to the entire community of Israel: ‘Present yourselves before the '
  - type: text
    content: Lord
  - type: text
    content: ', for he has heard your complaining.’” '
