document_id: EXO.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manna and Quail from Heaven
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the whole community of Israel set out from Elim and journeyed into the wilderness of Sin,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The geographical name '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'is related to '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sinai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'and should not be confused with the English word '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sin.
    marker-yv: yv-n
  - type: text
    text: ' between Elim and Mount Sinai. They arrived there on the fifteenth day of the second month, one month after leaving the land of Egypt.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Exodus had occurred on the fifteenth day of the first month (see Num 33:3).
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: There, too, the whole community of Israel complained about Moses and Aaron.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“If only the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had killed us back in Egypt,” they moaned. “There we sat around pots filled with meat and ate all the bread we wanted. But now you have brought us into this wilderness to starve us all to death.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, “Look, I’m going to rain down food from heaven for you. Each day the people can go out and pick up as much food as they need for that day. I will test them in this to see whether or not they will follow my instructions. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On the sixth day they will gather food, and when they prepare it, there will be twice as much as usual.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Moses and Aaron said to all the people of Israel, “By evening you will realize it was the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' who brought you out of the land of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'In the morning you will see the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', because he has heard your complaints, which are against him, not against us. What have we done that you should complain about us?” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Moses added, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will give you meat to eat in the evening and bread to satisfy you in the morning, for he has heard all your complaints against him. What have we done? Yes, your complaints are against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', not against us.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Moses said to Aaron, “Announce this to the entire community of Israel: ‘Present yourselves before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for he has heard your complaining.’” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And as Aaron spoke to the whole community of Israel, they looked out toward the wilderness. There they could see the awesome glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in the cloud.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“I have heard the Israelites’ complaints. Now tell them, ‘In the evening you will have meat to eat, and in the morning you will have all the bread you want. Then you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'That evening vast numbers of quail flew in and covered the camp. And the next morning the area around the camp was wet with dew. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When the dew evaporated, a flaky substance as fine as frost blanketed the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The Israelites were puzzled when they saw it. “What is it?” they asked each other. They had no idea what it was.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And Moses told them, “It is the food the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has given you to eat. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'These are the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s instructions: Each household should gather as much as it needs. Pick up two quarts'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1 omer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2.2 liters]; also in 16:32, 33.'
    marker-yv: yv-n
  - type: text
    text: ' for each person in your tent.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So the people of Israel did as they were told. Some gathered a lot, some only a little. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But when they measured it out,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: measured it with an omer.
    marker-yv: yv-n
  - type: text
    text: ' everyone had just enough. Those who gathered a lot had nothing left over, and those who gathered only a little had enough. Each family had just what it needed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Moses told them, “Do not keep any of it until morning.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: But some of them didn’t listen and kept some of it until morning. But by then it was full of maggots and had a terrible smell. Moses was very angry with them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'After this the people gathered the food morning by morning, each family according to its need. And as the sun became hot, the flakes they had not picked up melted and disappeared. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: On the sixth day, they gathered twice as much as usual—four quarts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '2 omers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[4.4 liters].'
    marker-yv: yv-n
  - type: text
    text: ' for each person instead of two. Then all the leaders of the community came and asked Moses for an explanation. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'He told them, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded: Tomorrow will be a day of complete rest, a holy Sabbath day set apart for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . So bake or boil as much as you want today, and set aside what is left for tomorrow.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So they put some aside until morning, just as Moses had commanded. And in the morning the leftover food was wholesome and good, without maggots or odor. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Moses said, “Eat this food today, for today is a Sabbath day dedicated to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. There will be no food on the ground today. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: You may gather the food for six days, but the seventh day is the Sabbath. There will be no food on the ground that day.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Some of the people went out anyway on the seventh day, but they found no food. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' asked Moses, “How long will these people refuse to obey my commands and instructions? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'They must realize that the Sabbath is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s gift to you. That is why he gives you a two-day supply on the sixth day, so there will be enough for two days. On the Sabbath day you must each stay in your place. Do not go out to pick up food on the seventh day.” '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: So the people did not gather any food on the seventh day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The Israelites called the food manna.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:31 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Manna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “What is it?” See 16:15.
    marker-yv: yv-n
  - type: text
    text: ' It was white like coriander seed, and it tasted like honey wafers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Then Moses said, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has commanded: Fill a two-quart container with manna to preserve it for your descendants. Then later generations will be able to see the food I gave you in the wilderness when I set you free from Egypt.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Moses said to Aaron, “Get a jar and fill it with two quarts of manna. Then put it in a sacred place before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to preserve it for all future generations.” '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Aaron did just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses. He eventually placed it in the Ark of the Covenant—in front of the stone tablets inscribed with the terms of the covenant.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'He placed it in front of the Testimony; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see note on 25:16.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: So the people of Israel ate manna for forty years until they arrived at the land where they would settle. They ate manna until they came to the border of the land of Canaan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: The container used to measure the manna was an omer, which was one-tenth of an ephah; it held about two quarts.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: An omer is one-tenth of an ephah.
    marker-yv: yv-n
