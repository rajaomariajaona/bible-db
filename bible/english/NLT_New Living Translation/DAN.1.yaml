document_id: DAN.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Daniel in Nebuchadnezzar’s Court
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: During the third year of King Jehoiakim’s reign in Judah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This event occurred in 605 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ', during the third year of Jehoiakim’s reign (according to the calendar system in which the new year begins in the spring).'
    marker-yv: yv-n
  - type: text
    text: ' King Nebuchadnezzar of Babylon came to Jerusalem and besieged it. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The Lord gave him victory over King Jehoiakim of Judah and permitted him to take some of the sacred objects from the Temple of God. So Nebuchadnezzar took them back to the land of Babylonia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the land of Shinar.
    marker-yv: yv-n
  - type: text
    text: ' and placed them in the treasure-house of his god.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then the king ordered Ashpenaz, his chief of staff, to bring to the palace some of the young men of Judah’s royal family and other noble families, who had been brought to Babylon as captives. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Select only strong, healthy, and good-looking young men,” he said. “Make sure they are well versed in every branch of learning, are gifted with knowledge and good judgment, and are suited to serve in the royal palace. Train these young men in the language and literature of Babylon.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of the Chaldeans.
    marker-yv: yv-n
  - type: text
    text: '” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The king assigned them a daily ration of food and wine from his own kitchens. They were to be trained for three years, and then they would enter the royal service.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Daniel, Hananiah, Mishael, and Azariah were four of the young men chosen, all from the tribe of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The chief of staff renamed them with these Babylonian names:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Daniel was called Belteshazzar.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Hananiah was called Shadrach.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Mishael was called Meshach.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Azariah was called Abednego.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But Daniel was determined not to defile himself by eating the food and wine given to them by the king. He asked the chief of staff for permission not to eat these unacceptable foods. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now God had given the chief of staff both respect and affection for Daniel. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But he responded, “I am afraid of my lord the king, who has ordered that you eat this food and wine. If you become pale and thin compared to the other youths your age, I am afraid the king will have me beheaded.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Daniel spoke with the attendant who had been appointed by the chief of staff to look after Daniel, Hananiah, Mishael, and Azariah. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Please test us for ten days on a diet of vegetables and water,” Daniel said. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“At the end of the ten days, see how we look compared to the other young men who are eating the king’s food. Then make your decision in light of what you see.” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The attendant agreed to Daniel’s suggestion and tested them for ten days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'At the end of the ten days, Daniel and his three friends looked healthier and better nourished than the young men who had been eating the food assigned by the king. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So after that, the attendant fed them only vegetables instead of the food and wine provided for the others.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: God gave these four young men an unusual aptitude for understanding every aspect of literature and wisdom. And God gave Daniel the special ability to interpret the meanings of visions and dreams.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When the training period ordered by the king was completed, the chief of staff brought all the young men to King Nebuchadnezzar. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The king talked with them, and no one impressed him as much as Daniel, Hananiah, Mishael, and Azariah. So they entered the royal service. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Whenever the king consulted them in any matter requiring wisdom and balanced judgment, he found them ten times more capable than any of the magicians and enchanters in his entire kingdom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Daniel remained in the royal service until the first year of the reign of King Cyrus.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cyrus began his reign (over Babylon) in 539 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
