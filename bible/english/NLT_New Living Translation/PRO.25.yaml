document_id: PRO.25,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: More Proverbs of Solomon
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: These are more proverbs of Solomon, collected by the advisers of King Hezekiah of Judah.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Others may accuse you of gossip,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will never regain your good reputation.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Timely advice is lovely,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like golden apples in a silver basket.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To one who listens, valid criticism
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like a gold earring or other gold jewelry.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trustworthy messengers refresh like snow in summer.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They revive the spirit of their employer.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A person who promises a gift but doesn’t give it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like clouds and wind that bring no rain.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Patience can persuade a prince,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and soft speech can break bones.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you like honey?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t eat too much, or it will make you sick!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t visit your neighbors too often,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or you will wear out your welcome.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Telling lies about others
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is as harmful as hitting them with an ax,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: wounding them with a sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or shooting them with a sharp arrow.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Putting confidence in an unreliable person in times of trouble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like chewing with a broken tooth or walking on a lame foot.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is God’s privilege to conceal things
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the king’s privilege to discover them.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Singing cheerful songs to a person with a heavy heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like taking someone’s coat in cold weather
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or pouring vinegar in a wound.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pouring vinegar on soda.
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If your enemies are hungry, give them food to eat.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If they are thirsty, give them water to drink.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will heap burning coals of shame on their heads,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will reward you.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As surely as a north wind brings rain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so a gossiping tongue causes anger!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s better to live alone in the corner of an attic
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than with a quarrelsome wife in a lovely home.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Good news from far away
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like cold water to the thirsty.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If the godly give in to the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it’s like polluting a fountain or muddying a spring.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s not good to eat too much honey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and it’s not good to seek honors for yourself.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A person without self-control
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like a city with broken-down walls.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one can comprehend the height of heaven, the depth of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or all that goes on in the king’s mind!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remove the impurities from silver,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the sterling will be ready for the silversmith.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remove the wicked from the king’s court,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his reign will be made secure by justice.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t demand an audience with the king
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or push for a place among the great.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s better to wait for an invitation to the head table
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than to be sent away in public disgrace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just because you’ve seen something,
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t be in a hurry to go to court.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For what will you do in the end
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if your neighbor deals you a shameful defeat?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When arguing with your neighbor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t betray another person’s secret.
