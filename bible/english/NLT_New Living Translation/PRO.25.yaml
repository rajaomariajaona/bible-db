document_id: PRO.25,116
type_code: eng
verses:
  '1':
  - type: heading
    content: More Proverbs of Solomon
  - type: text
    content: These are more proverbs of Solomon, collected by the advisers of King Hezekiah of Judah.
  '10':
  - type: text
    content: Others may accuse you of gossip,
  - type: text
    content: and you will never regain your good reputation.
  '11':
  - type: text
    content: Timely advice is lovely,
  - type: text
    content: like golden apples in a silver basket.
  '12':
  - type: text
    content: To one who listens, valid criticism
  - type: text
    content: is like a gold earring or other gold jewelry.
  '13':
  - type: text
    content: Trustworthy messengers refresh like snow in summer.
  - type: text
    content: They revive the spirit of their employer.
  '14':
  - type: text
    content: A person who promises a gift but doesn’t give it
  - type: text
    content: is like clouds and wind that bring no rain.
  '15':
  - type: text
    content: Patience can persuade a prince,
  - type: text
    content: and soft speech can break bones.
  '16':
  - type: text
    content: Do you like honey?
  - type: text
    content: Don’t eat too much, or it will make you sick!
  '17':
  - type: text
    content: Don’t visit your neighbors too often,
  - type: text
    content: or you will wear out your welcome.
  '18':
  - type: text
    content: Telling lies about others
  - type: text
    content: is as harmful as hitting them with an ax,
  - type: text
    content: wounding them with a sword,
  - type: text
    content: or shooting them with a sharp arrow.
  '19':
  - type: text
    content: Putting confidence in an unreliable person in times of trouble
  - type: text
    content: is like chewing with a broken tooth or walking on a lame foot.
  '2':
  - type: text
    content: It is God’s privilege to conceal things
  - type: text
    content: and the king’s privilege to discover them.
  '20':
  - type: text
    content: Singing cheerful songs to a person with a heavy heart
  - type: text
    content: is like taking someone’s coat in cold weather
  - type: text
    content: or pouring vinegar in a wound.
  - type: note
    content: As in Greek version; Hebrew reads pouring vinegar on soda.
  '21':
  - type: text
    content: If your enemies are hungry, give them food to eat.
  - type: text
    content: If they are thirsty, give them water to drink.
  '22':
  - type: text
    content: You will heap burning coals of shame on their heads,
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' will reward you.'
  '23':
  - type: text
    content: As surely as a north wind brings rain,
  - type: text
    content: so a gossiping tongue causes anger!
  '24':
  - type: text
    content: It’s better to live alone in the corner of an attic
  - type: text
    content: than with a quarrelsome wife in a lovely home.
  '25':
  - type: text
    content: Good news from far away
  - type: text
    content: is like cold water to the thirsty.
  '26':
  - type: text
    content: If the godly give in to the wicked,
  - type: text
    content: it’s like polluting a fountain or muddying a spring.
  '27':
  - type: text
    content: It’s not good to eat too much honey,
  - type: text
    content: and it’s not good to seek honors for yourself.
  '28':
  - type: text
    content: A person without self-control
  - type: text
    content: is like a city with broken-down walls.
  '3':
  - type: text
    content: No one can comprehend the height of heaven, the depth of the earth,
  - type: text
    content: or all that goes on in the king’s mind!
  '4':
  - type: text
    content: Remove the impurities from silver,
  - type: text
    content: and the sterling will be ready for the silversmith.
  '5':
  - type: text
    content: Remove the wicked from the king’s court,
  - type: text
    content: and his reign will be made secure by justice.
  '6':
  - type: text
    content: Don’t demand an audience with the king
  - type: text
    content: or push for a place among the great.
  '7':
  - type: text
    content: It’s better to wait for an invitation to the head table
  - type: text
    content: than to be sent away in public disgrace.
  - type: text
    content: Just because you’ve seen something,
  '8':
  - type: text
    content: don’t be in a hurry to go to court.
  - type: text
    content: For what will you do in the end
  - type: text
    content: if your neighbor deals you a shameful defeat?
  '9':
  - type: text
    content: When arguing with your neighbor,
  - type: text
    content: don’t betray another person’s secret.
