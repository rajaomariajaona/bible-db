document_id: PSA.79,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of Asaph.
  - type: text
    content: O God, pagan nations have conquered your land,
  - type: text
    content: your special possession.
  - type: text
    content: They have defiled your holy Temple
  - type: text
    content: and made Jerusalem a heap of ruins.
  '10':
  - type: text
    content: Why should pagan nations be allowed to scoff,
  - type: text
    content: asking, “Where is their God?”
  - type: text
    content: Show us your vengeance against the nations,
  - type: text
    content: for they have spilled the blood of your servants.
  '11':
  - type: text
    content: Listen to the moaning of the prisoners.
  - type: text
    content: Demonstrate your great power by saving those condemned to die.
  '12':
  - type: text
    content: O Lord, pay back our neighbors seven times
  - type: text
    content: for the scorn they have hurled at you.
  '13':
  - type: text
    content: Then we your people, the sheep of your pasture,
  - type: text
    content: will thank you forever and ever,
  - type: text
    content: praising your greatness from generation to generation.
  '2':
  - type: text
    content: They have left the bodies of your servants
  - type: text
    content: as food for the birds of heaven.
  - type: text
    content: The flesh of your godly ones
  - type: text
    content: has become food for the wild animals.
  '3':
  - type: text
    content: Blood has flowed like water all around Jerusalem;
  - type: text
    content: no one is left to bury the dead.
  '4':
  - type: text
    content: We are mocked by our neighbors,
  - type: text
    content: an object of scorn and derision to those around us.
  '5':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', how long will you be angry with us? Forever?'
  - type: text
    content: How long will your jealousy burn like fire?
  '6':
  - type: text
    content: Pour out your wrath on the nations that refuse to acknowledge you—
  - type: text
    content: on kingdoms that do not call upon your name.
  '7':
  - type: text
    content: For they have devoured your people Israel,
  - type: note
    content: Hebrew devoured Jacob. See note on 44:4.
  - type: text
    content: making the land a desolate wilderness.
  '8':
  - type: text
    content: Do not hold us guilty for the sins of our ancestors!
  - type: text
    content: Let your compassion quickly meet our needs,
  - type: text
    content: for we are on the brink of despair.
  '9':
  - type: text
    content: Help us, O God of our salvation!
  - type: text
    content: Help us for the glory of your name.
  - type: text
    content: Save us and forgive our sins
  - type: text
    content: for the honor of your name.
