document_id: PSA.79,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O God, pagan nations have conquered your land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your special possession.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have defiled your holy Temple
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made Jerusalem a heap of ruins.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Why should pagan nations be allowed to scoff,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: asking, “Where is their God?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Show us your vengeance against the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they have spilled the blood of your servants.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Listen to the moaning of the prisoners.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Demonstrate your great power by saving those condemned to die.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: O Lord, pay back our neighbors seven times
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the scorn they have hurled at you.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then we your people, the sheep of your pasture,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will thank you forever and ever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: praising your greatness from generation to generation.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: They have left the bodies of your servants
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as food for the birds of heaven.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The flesh of your godly ones
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has become food for the wild animals.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Blood has flowed like water all around Jerusalem;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one is left to bury the dead.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: We are mocked by our neighbors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an object of scorn and derision to those around us.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', how long will you be angry with us? Forever?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will your jealousy burn like fire?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Pour out your wrath on the nations that refuse to acknowledge you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on kingdoms that do not call upon your name.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For they have devoured your people Israel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '79:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'devoured Jacob. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 44:4.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: making the land a desolate wilderness.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Do not hold us guilty for the sins of our ancestors!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let your compassion quickly meet our needs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for we are on the brink of despair.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Help us, O God of our salvation!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Help us for the glory of your name.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save us and forgive our sins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the honor of your name.
