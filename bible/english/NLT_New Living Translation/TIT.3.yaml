document_id: TIT.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Do What Is Good
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Remind the believers to submit to the government and its officers. They should be obedient, always ready to do what is good. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'If people are causing divisions among you, give a first and second warning. After that, have nothing more to do with them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: For people like that have turned away from the truth, and their own sins condemn them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Final Remarks and Greetings
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I am planning to send either Artemas or Tychicus to you. As soon as one of them arrives, do your best to meet me at Nicopolis, for I have decided to stay there for the winter. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Do everything you can to help Zenas the lawyer and Apollos with their trip. See that they are given everything they need. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Our people must learn to do good by meeting the urgent needs of others; then they will not be unproductive.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Everybody here sends greetings. Please give my greetings to the believers—all who love us.
  - type: usfm
    marker: p
    children:
    - type: text
      text: May God’s grace be with you all.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: They must not slander anyone and must avoid quarreling. Instead, they should be gentle and show true humility to everyone.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Once we, too, were foolish and disobedient. We were misled and became slaves to many lusts and pleasures. Our lives were full of evil and envy, and we hated each other. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But—
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'When God our Savior revealed his kindness and love, '
  '5':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: he saved us, not because of the righteous things we had done, but because of his mercy. He washed away our sins, giving us a new birth and new life through the Holy Spirit.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He saved us through the washing of regeneration and renewing of the Holy Spirit.
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'He generously poured out the Spirit upon us through Jesus Christ our Savior. '
  '7':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Because of his grace he made us right in his sight and gave us confidence that we will inherit eternal life.
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: This is a trustworthy saying, and I want you to insist on these teachings so that all who trust in God will devote themselves to doing good. These teachings are good and beneficial for everyone.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Do not get involved in foolish discussions about spiritual pedigrees
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: spiritual genealogies.
      marker-yv: yv-n
    - type: text
      text: ' or in quarrels and fights about obedience to Jewish laws. These things are useless and a waste of time. '
