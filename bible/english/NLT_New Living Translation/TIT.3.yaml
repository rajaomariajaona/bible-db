document_id: TIT.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Do What Is Good
  - type: text
    content: 'Remind the believers to submit to the government and its officers. They should be obedient, always ready to do what is good. '
  '10':
  - type: text
    content: 'If people are causing divisions among you, give a first and second warning. After that, have nothing more to do with them. '
  '11':
  - type: text
    content: For people like that have turned away from the truth, and their own sins condemn them.
  - type: heading
    content: Paul’s Final Remarks and Greetings
  '12':
  - type: text
    content: 'I am planning to send either Artemas or Tychicus to you. As soon as one of them arrives, do your best to meet me at Nicopolis, for I have decided to stay there for the winter. '
  '13':
  - type: text
    content: 'Do everything you can to help Zenas the lawyer and Apollos with their trip. See that they are given everything they need. '
  '14':
  - type: text
    content: Our people must learn to do good by meeting the urgent needs of others; then they will not be unproductive.
  '15':
  - type: text
    content: Everybody here sends greetings. Please give my greetings to the believers—all who love us.
  - type: text
    content: May God’s grace be with you all.
  '2':
  - type: text
    content: They must not slander anyone and must avoid quarreling. Instead, they should be gentle and show true humility to everyone.
  '3':
  - type: text
    content: 'Once we, too, were foolish and disobedient. We were misled and became slaves to many lusts and pleasures. Our lives were full of evil and envy, and we hated each other. '
  '4':
  - type: text
    content: But—
  - type: text
    content: 'When God our Savior revealed his kindness and love, '
  '5':
  - type: text
    content: he saved us, not because of the righteous things we had done, but because of his mercy. He washed away our sins, giving us a new birth and new life through the Holy Spirit.
  - type: note
    content: Greek He saved us through the washing of regeneration and renewing of the Holy Spirit.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'He generously poured out the Spirit upon us through Jesus Christ our Savior. '
  '7':
  - type: text
    content: Because of his grace he made us right in his sight and gave us confidence that we will inherit eternal life.
  '8':
  - type: text
    content: This is a trustworthy saying, and I want you to insist on these teachings so that all who trust in God will devote themselves to doing good. These teachings are good and beneficial for everyone.
  '9':
  - type: text
    content: Do not get involved in foolish discussions about spiritual pedigrees
  - type: note
    content: Or spiritual genealogies.
  - type: text
    content: ' or in quarrels and fights about obedience to Jewish laws. These things are useless and a waste of time. '
