document_id: JHN.3,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'There was a man named Nicodemus, a Jewish religious leader who was a Pharisee. '
  '10':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You are a respected Jewish teacher, and yet you don’t understand these things?
  - type: text
    content: ' '
  '11':
  - type: text
    content: I assure you, we tell you what we know and have seen, and yet you won’t believe our testimony.
  - type: text
    content: ' '
  '12':
  - type: text
    content: But if you don’t believe me when I tell you about earthly things, how can you possibly believe if I tell you about heavenly things?
  - type: text
    content: ' '
  '13':
  - type: text
    content: No one has ever gone to heaven and returned. But the Son of Man
  - type: note
    content: Some manuscripts add who lives in heaven. “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: has come down from heaven.
  - type: text
    content: ' '
  '14':
  - type: text
    content: And as Moses lifted up the bronze snake on a pole in the wilderness, so the Son of Man must be lifted up,
  - type: text
    content: ' '
  '15':
  - type: text
    content: so that everyone who believes in him will have eternal life.
  - type: note
    content: Or everyone who believes will have eternal life in him.
  '16':
  - type: text
    content: ' '
  - type: text
    content: '“For this is how God loved the world: He gave'
  - type: text
    content: ' '
  - type: note
    content: Or For God loved the world so much that he gave.
  - type: text
    content: his one and only Son, so that everyone who believes in him will not perish but have eternal life.
  - type: text
    content: ' '
  '17':
  - type: text
    content: God sent his Son into the world not to judge the world, but to save the world through him.
  '18':
  - type: text
    content: ' '
  - type: text
    content: “There is no judgment against anyone who believes in him. But anyone who does not believe in him has already been judged for not believing in God’s one and only Son.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'And the judgment is based on this fact: God’s light came into the world, but people loved the darkness more than the light, for their actions were evil.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: After dark one evening, he came to speak with Jesus. “Rabbi,” he said, “we all know that God has sent you to teach us. Your miraculous signs are evidence that God is with you.”
  '20':
  - type: text
    content: All who do evil hate the light and refuse to go near it for fear their sins will be exposed.
  - type: text
    content: ' '
  '21':
  - type: text
    content: But those who do what is right come to the light so others can see that they are doing what God wants.
  - type: note
    content: Or can see God at work in what he is doing.
  - type: text
    content: ”
  - type: heading
    content: John the Baptist Exalts Jesus
  '22':
  - type: text
    content: Then Jesus and his disciples left Jerusalem and went into the Judean countryside. Jesus spent some time with them there, baptizing people.
  '23':
  - type: text
    content: 'At this time John the Baptist was baptizing at Aenon, near Salim, because there was plenty of water there; and people kept coming to him for baptism. '
  '24':
  - type: text
    content: '(This was before John was thrown into prison.) '
  '25':
  - type: text
    content: A debate broke out between John’s disciples and a certain Jew
  - type: note
    content: Some manuscripts read some Jews.
  - type: text
    content: ' over ceremonial cleansing. '
  '26':
  - type: text
    content: So John’s disciples came to him and said, “Rabbi, the man you met on the other side of the Jordan River, the one you identified as the Messiah, is also baptizing people. And everybody is going to him instead of coming to us.”
  '27':
  - type: text
    content: 'John replied, “No one can receive anything unless God gives it from heaven. '
  '28':
  - type: text
    content: 'You yourselves know how plainly I told you, ‘I am not the Messiah. I am only here to prepare the way for him.’ '
  '29':
  - type: text
    content: 'It is the bridegroom who marries the bride, and the bridegroom’s friend is simply glad to stand with him and hear his vows. Therefore, I am filled with joy at his success. '
  '3':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I tell you the truth, unless you are born again,
  - type: note
    content: Or born from above; also in 3:7.
  - type: text
    content: ' '
  - type: text
    content: you cannot see the Kingdom of God.”
  '30':
  - type: text
    content: He must become greater and greater, and I must become less and less.
  '31':
  - type: text
    content: “He has come from above and is greater than anyone else. We are of the earth, and we speak of earthly things, but he has come from heaven and is greater than anyone else.
  - type: note
    content: Some manuscripts do not include and is greater than anyone else.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'He testifies about what he has seen and heard, but how few believe what he tells them! '
  '33':
  - type: text
    content: 'Anyone who accepts his testimony can affirm that God is true. '
  '34':
  - type: text
    content: 'For he is sent by God. He speaks God’s words, for God gives him the Spirit without limit. '
  '35':
  - type: text
    content: 'The Father loves his Son and has put everything into his hands. '
  '36':
  - type: text
    content: And anyone who believes in God’s Son has eternal life. Anyone who doesn’t obey the Son will never experience eternal life but remains under God’s angry judgment.”
  '4':
  - type: text
    content: “What do you mean?” exclaimed Nicodemus. “How can an old man go back into his mother’s womb and be born again?”
  '5':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I assure you, no one can enter the Kingdom of God without being born of water and the Spirit.
  - type: note
    content: Or and spirit. The Greek word for Spirit can also be translated wind; see 3:8.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Humans can reproduce only human life, but the Holy Spirit gives birth to spiritual life.
  - type: note
    content: Greek what is born of the Spirit is spirit.
  - type: text
    content: ' '
  '7':
  - type: text
    content: So don’t be surprised when I say, ‘You
  - type: note
    content: The Greek word for you is plural; also in 3:12.
  - type: text
    content: ' '
  - type: text
    content: must be born again.’
  - type: text
    content: ' '
  '8':
  - type: text
    content: The wind blows wherever it wants. Just as you can hear the wind but can’t tell where it comes from or where it is going, so you can’t explain how people are born of the Spirit.”
  '9':
  - type: text
    content: “How are these things possible?” Nicodemus asked.
