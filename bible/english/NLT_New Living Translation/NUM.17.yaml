document_id: NUM.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Budding of Aaron’s Staff
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses 17:1-13 are numbered 17:16-28 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Tell the people of Israel to bring you twelve wooden staffs, one from each leader of Israel’s ancestral tribes, and inscribe each leader’s name on his staff. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Inscribe Aaron’s name on the staff of the tribe of Levi, for there must be one staff for the leader of each ancestral tribe. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Place these staffs in the Tabernacle in front of the Ark containing the tablets of the Covenant,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in the Tent of Meeting before the Testimony. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew word for “testimony” refers to the terms of the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ’s covenant with Israel as written on stone tablets, which were kept in the Ark, and also to the covenant itself.
    marker-yv: yv-n
  - type: text
    text: ' where I meet with you. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Buds will sprout on the staff belonging to the man I choose. Then I will finally put an end to the people’s murmuring and complaining against you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Moses gave the instructions to the people of Israel, and each of the twelve tribal leaders, including Aaron, brought Moses a staff. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moses placed the staffs in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s presence in the Tabernacle of the Covenant.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tabernacle of the Testimony; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 17:8.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: When he went into the Tabernacle of the Covenant the next day, he found that Aaron’s staff, representing the tribe of Levi, had sprouted, budded, blossomed, and produced ripe almonds!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When Moses brought all the staffs out from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s presence, he showed them to the people. Each man claimed his own staff. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses: “Place Aaron’s staff permanently before the Ark of the Covenant'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'before the Testimony; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see note on 17:4.
    marker-yv: yv-n
  - type: text
    text: ' to serve as a warning to rebels. This should put an end to their complaints against me and prevent any further deaths.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So Moses did as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then the people of Israel said to Moses, “Look, we are doomed! We are dead! We are ruined! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Everyone who even comes close to the Tabernacle of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' dies. Are we all doomed to die?”'
