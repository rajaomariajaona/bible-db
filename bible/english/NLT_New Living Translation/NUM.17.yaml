document_id: NUM.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Budding of Aaron’s Staff
  - type: text
    content: ' '
  - type: note
    content: Verses 17:1-13 are numbered 17:16-28 in Hebrew text.
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses: “Place Aaron’s staff permanently before the Ark of the Covenant'
  - type: note
    content: Hebrew before the Testimony; see note on 17:4.
  - type: text
    content: ' to serve as a warning to rebels. This should put an end to their complaints against me and prevent any further deaths.” '
  '11':
  - type: text
    content: 'So Moses did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him.'
  '12':
  - type: text
    content: 'Then the people of Israel said to Moses, “Look, we are doomed! We are dead! We are ruined! '
  '13':
  - type: text
    content: 'Everyone who even comes close to the Tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: ' dies. Are we all doomed to die?”'
  '2':
  - type: text
    content: '“Tell the people of Israel to bring you twelve wooden staffs, one from each leader of Israel’s ancestral tribes, and inscribe each leader’s name on his staff. '
  '3':
  - type: text
    content: 'Inscribe Aaron’s name on the staff of the tribe of Levi, for there must be one staff for the leader of each ancestral tribe. '
  '4':
  - type: text
    content: Place these staffs in the Tabernacle in front of the Ark containing the tablets of the Covenant,
  - type: note
    content: Hebrew in the Tent of Meeting before the Testimony. The Hebrew word for “testimony” refers to the terms of the Lord’s covenant with Israel as written on stone tablets, which were kept in the Ark, and also to the covenant itself.
  - type: text
    content: ' where I meet with you. '
  '5':
  - type: text
    content: Buds will sprout on the staff belonging to the man I choose. Then I will finally put an end to the people’s murmuring and complaining against you.”
  '6':
  - type: text
    content: 'So Moses gave the instructions to the people of Israel, and each of the twelve tribal leaders, including Aaron, brought Moses a staff. '
  '7':
  - type: text
    content: 'Moses placed the staffs in the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence in the Tabernacle of the Covenant.
  - type: note
    content: Or Tabernacle of the Testimony; also in 17:8.
  - type: text
    content: ' '
  '8':
  - type: text
    content: When he went into the Tabernacle of the Covenant the next day, he found that Aaron’s staff, representing the tribe of Levi, had sprouted, budded, blossomed, and produced ripe almonds!
  '9':
  - type: text
    content: 'When Moses brought all the staffs out from the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence, he showed them to the people. Each man claimed his own staff. '
