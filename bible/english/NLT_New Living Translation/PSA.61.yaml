document_id: PSA.61
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of David, to be accompanied by stringed instruments.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God, listen to my cry!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hear my prayer!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: From the ends of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I cry to you for help
- type: usfm
  marker: q2
  children:
  - type: text
    text: when my heart is overwhelmed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lead me to the towering rock of safety,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: for you are my safe refuge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a fortress where my enemies cannot reach me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Let me live forever in your sanctuary,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'safe beneath the shelter of your wings! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For you have heard my vows, O God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have given me an inheritance reserved for those who fear your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Add many years to the life of the king!
- type: usfm
  marker: q2
  children:
  - type: text
    text: May his years span the generations!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: May he reign under God’s protection forever.
- type: usfm
  marker: q2
  children:
  - type: text
    text: May your unfailing love and faithfulness watch over him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then I will sing praises to your name forever
- type: usfm
  marker: q2
  children:
  - type: text
    text: as I fulfill my vows each day.
