document_id: PSA.61,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David, to be accompanied by stringed instruments.'
  - type: text
    content: O God, listen to my cry!
  - type: text
    content: Hear my prayer!
  '2':
  - type: text
    content: From the ends of the earth,
  - type: text
    content: I cry to you for help
  - type: text
    content: when my heart is overwhelmed.
  - type: text
    content: Lead me to the towering rock of safety,
  '3':
  - type: text
    content: for you are my safe refuge,
  - type: text
    content: a fortress where my enemies cannot reach me.
  '4':
  - type: text
    content: Let me live forever in your sanctuary,
  - type: text
    content: 'safe beneath the shelter of your wings! '
  - type: text
    content: Interlude
  '5':
  - type: text
    content: For you have heard my vows, O God.
  - type: text
    content: You have given me an inheritance reserved for those who fear your name.
  '6':
  - type: text
    content: Add many years to the life of the king!
  - type: text
    content: May his years span the generations!
  '7':
  - type: text
    content: May he reign under God’s protection forever.
  - type: text
    content: May your unfailing love and faithfulness watch over him.
  '8':
  - type: text
    content: Then I will sing praises to your name forever
  - type: text
    content: as I fulfill my vows each day.
