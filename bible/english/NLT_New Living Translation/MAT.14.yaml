document_id: MAT.14,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of John the Baptist
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: When Herod Antipas, the ruler of Galilee,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Herod the tetrarch. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Herod Antipas was a son of King Herod and was ruler over Galilee.
      marker-yv: yv-n
    - type: text
      text: ' heard about Jesus, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So John was beheaded in the prison, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and his head was brought on a tray and given to the girl, who took it to her mother. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Later, John’s disciples came for his body and buried it. Then they went and told Jesus what had happened.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Feeds Five Thousand
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As soon as Jesus heard the news, he left in a boat to a remote area to be alone. But the crowds heard where he was headed and followed on foot from many towns. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Jesus saw the huge crowd as he stepped from the boat, and he had compassion on them and healed their sick.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That evening the disciples came to him and said, “This is a remote place, and it’s already getting late. Send the crowds away so they can go to the villages and buy food for themselves.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “That isn’t necessary—you feed them.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But we have only five loaves of bread and two fish!” they answered.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Bring them here,” '
    - type: text
      text: 'he said. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he told the people to sit down on the grass. Jesus took the five loaves and two fish, looked up toward heaven, and blessed them. Then, breaking the loaves into pieces, he gave the bread to the disciples, who distributed it to the people. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: he said to his advisers, “This must be John the Baptist raised from the dead! That is why he can do such miracles.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They all ate as much as they wanted, and afterward, the disciples picked up twelve baskets of leftovers. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: About 5,000 men were fed that day, in addition to all the women and children!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Walks on Water
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Immediately after this, Jesus insisted that his disciples get back into the boat and cross to the other side of the lake, while he sent the people home. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: After sending them home, he went up into the hills by himself to pray. Night fell while he was there alone.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meanwhile, the disciples were in trouble far away from land, for a strong wind had risen, and they were fighting heavy waves. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: About three o’clock in the morning
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: In the fourth watch of the night.
      marker-yv: yv-n
    - type: text
      text: ' Jesus came toward them, walking on the water. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the disciples saw him walking on the water, they were terrified. In their fear, they cried out, “It’s a ghost!”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus spoke to them at once. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Don’t be afraid,” '
    - type: text
      text: 'he said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Take courage. I am here!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The ‘
        - type: usfm
          marker: nd
          children:
          - type: text
            text: I Am
        - type: text
          text: '’ is here; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'I am. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Exod 3:14.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Peter called to him, “Lord, if it’s really you, tell me to come to you, walking on the water.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Yes, come,” '
    - type: text
      text: Jesus said.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Peter went over the side of the boat and walked on the water toward Jesus. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Herod had arrested and imprisoned John as a favor to his wife Herodias (the former wife of Herod’s brother Philip). '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when he saw the strong
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts do not include '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: strong.
      marker-yv: yv-n
    - type: text
      text: ' wind and the waves, he was terrified and began to sink. “Save me, Lord!” he shouted.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus immediately reached out and grabbed him. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“You have so little faith,” '
    - type: text
      text: 'Jesus said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why did you doubt me?”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they climbed back into the boat, the wind stopped. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the disciples worshiped him. “You really are the Son of God!” they exclaimed.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After they had crossed the lake, they landed at Gennesaret. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the people recognized Jesus, the news of his arrival spread quickly throughout the whole area, and soon people were bringing all their sick to be healed. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They begged him to let the sick touch at least the fringe of his robe, and all who touched him were healed.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'John had been telling Herod, “It is against God’s law for you to marry her.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Herod wanted to kill John, but he was afraid of a riot, because all the people believed John was a prophet.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But at a birthday party for Herod, Herodias’s daughter performed a dance that greatly pleased him, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so he promised with a vow to give her anything she wanted. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At her mother’s urging, the girl said, “I want the head of John the Baptist on a tray!” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king regretted what he had said; but because of the vow he had made in front of his guests, he issued the necessary orders. '
