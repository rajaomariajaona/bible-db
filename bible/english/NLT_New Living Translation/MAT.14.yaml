document_id: MAT.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of John the Baptist
  - type: text
    content: When Herod Antipas, the ruler of Galilee,
  - type: note
    content: Greek Herod the tetrarch. Herod Antipas was a son of King Herod and was ruler over Galilee.
  - type: text
    content: ' heard about Jesus, '
  '10':
  - type: text
    content: 'So John was beheaded in the prison, '
  '11':
  - type: text
    content: 'and his head was brought on a tray and given to the girl, who took it to her mother. '
  '12':
  - type: text
    content: Later, John’s disciples came for his body and buried it. Then they went and told Jesus what had happened.
  - type: heading
    content: Jesus Feeds Five Thousand
  '13':
  - type: text
    content: 'As soon as Jesus heard the news, he left in a boat to a remote area to be alone. But the crowds heard where he was headed and followed on foot from many towns. '
  '14':
  - type: text
    content: Jesus saw the huge crowd as he stepped from the boat, and he had compassion on them and healed their sick.
  '15':
  - type: text
    content: That evening the disciples came to him and said, “This is a remote place, and it’s already getting late. Send the crowds away so they can go to the villages and buy food for themselves.”
  '16':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “That isn’t necessary—you feed them.”
  '17':
  - type: text
    content: “But we have only five loaves of bread and two fish!” they answered.
  '18':
  - type: text
    content: ' '
  - type: text
    content: '“Bring them here,” '
  - type: text
    content: 'he said. '
  '19':
  - type: text
    content: 'Then he told the people to sit down on the grass. Jesus took the five loaves and two fish, looked up toward heaven, and blessed them. Then, breaking the loaves into pieces, he gave the bread to the disciples, who distributed it to the people. '
  '2':
  - type: text
    content: he said to his advisers, “This must be John the Baptist raised from the dead! That is why he can do such miracles.”
  '20':
  - type: text
    content: 'They all ate as much as they wanted, and afterward, the disciples picked up twelve baskets of leftovers. '
  '21':
  - type: text
    content: About 5,000 men were fed that day, in addition to all the women and children!
  - type: heading
    content: Jesus Walks on Water
  '22':
  - type: text
    content: 'Immediately after this, Jesus insisted that his disciples get back into the boat and cross to the other side of the lake, while he sent the people home. '
  '23':
  - type: text
    content: After sending them home, he went up into the hills by himself to pray. Night fell while he was there alone.
  '24':
  - type: text
    content: 'Meanwhile, the disciples were in trouble far away from land, for a strong wind had risen, and they were fighting heavy waves. '
  '25':
  - type: text
    content: About three o’clock in the morning
  - type: note
    content: Greek In the fourth watch of the night.
  - type: text
    content: ' Jesus came toward them, walking on the water. '
  '26':
  - type: text
    content: When the disciples saw him walking on the water, they were terrified. In their fear, they cried out, “It’s a ghost!”
  '27':
  - type: text
    content: 'But Jesus spoke to them at once. '
  - type: text
    content: '“Don’t be afraid,” '
  - type: text
    content: 'he said. '
  - type: text
    content: “Take courage. I am here!
  - type: note
    content: Or The ‘I Am’ is here; Greek reads I am. See Exod 3:14.
  - type: text
    content: ”
  '28':
  - type: text
    content: Then Peter called to him, “Lord, if it’s really you, tell me to come to you, walking on the water.”
  '29':
  - type: text
    content: ' '
  - type: text
    content: '“Yes, come,” '
  - type: text
    content: Jesus said.
  - type: text
    content: 'So Peter went over the side of the boat and walked on the water toward Jesus. '
  '3':
  - type: text
    content: 'For Herod had arrested and imprisoned John as a favor to his wife Herodias (the former wife of Herod’s brother Philip). '
  '30':
  - type: text
    content: But when he saw the strong
  - type: note
    content: Some manuscripts do not include strong.
  - type: text
    content: ' wind and the waves, he was terrified and began to sink. “Save me, Lord!” he shouted.'
  '31':
  - type: text
    content: 'Jesus immediately reached out and grabbed him. '
  - type: text
    content: '“You have so little faith,” '
  - type: text
    content: 'Jesus said. '
  - type: text
    content: “Why did you doubt me?”
  '32':
  - type: text
    content: 'When they climbed back into the boat, the wind stopped. '
  '33':
  - type: text
    content: Then the disciples worshiped him. “You really are the Son of God!” they exclaimed.
  '34':
  - type: text
    content: 'After they had crossed the lake, they landed at Gennesaret. '
  '35':
  - type: text
    content: 'When the people recognized Jesus, the news of his arrival spread quickly throughout the whole area, and soon people were bringing all their sick to be healed. '
  '36':
  - type: text
    content: They begged him to let the sick touch at least the fringe of his robe, and all who touched him were healed.
  '4':
  - type: text
    content: 'John had been telling Herod, “It is against God’s law for you to marry her.” '
  '5':
  - type: text
    content: Herod wanted to kill John, but he was afraid of a riot, because all the people believed John was a prophet.
  '6':
  - type: text
    content: 'But at a birthday party for Herod, Herodias’s daughter performed a dance that greatly pleased him, '
  '7':
  - type: text
    content: 'so he promised with a vow to give her anything she wanted. '
  '8':
  - type: text
    content: 'At her mother’s urging, the girl said, “I want the head of John the Baptist on a tray!” '
  '9':
  - type: text
    content: 'Then the king regretted what he had said; but because of the vow he had made in front of his guests, he issued the necessary orders. '
