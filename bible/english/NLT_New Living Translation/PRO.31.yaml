document_id: PRO.31,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sayings of King Lemuel
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The sayings of King Lemuel contain this message,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of Lemuel, king of Massa; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of King Lemuel, an oracle.
      marker-yv: yv-n
    - type: text
      text: ' which his mother taught him.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 10-31 comprise a Hebrew acrostic poem; each verse begins with a successive letter of the Hebrew alphabet.
      marker-yv: yv-n
    - type: text
      text: Who can find a virtuous and capable wife?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She is more precious than rubies.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Her husband can trust her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and she will greatly enrich his life.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: She brings him good, not harm,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the days of her life.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: She finds wool and flax
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and busily spins it.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: She is like a merchant’s ship,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bringing her food from afar.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: She gets up before dawn to prepare breakfast for her household
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and plan the day’s work for her servant girls.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: She goes to inspect a field and buys it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with her earnings she plants a vineyard.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: She is energetic and strong,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a hard worker.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: She makes sure her dealings are profitable;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her lamp burns late into the night.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Her hands are busy spinning thread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her fingers twisting fiber.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: O my son, O son of my womb,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O son of my vows,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: She extends a helping hand to the poor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and opens her arms to the needy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: She has no fear of winter for her household,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for everyone has warm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Latin versions; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: scarlet.
      marker-yv: yv-n
    - type: text
      text: ' clothes.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: She makes her own bedspreads.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She dresses in fine linen and purple gowns.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Her husband is well known at the city gates,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where he sits with the other civic leaders.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: She makes belted linen garments
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sashes to sell to the merchants.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: She is clothed with strength and dignity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and she laughs without fear of the future.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: When she speaks, her words are wise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and she gives instructions with kindness.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: She carefully watches everything in her household
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and suffers nothing from laziness.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Her children stand and bless her.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Her husband praises her:'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “There are many virtuous and capable women in the world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you surpass them all!”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: do not waste your strength on women,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on those who ruin kings.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Charm is deceptive, and beauty does not last;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but a woman who fears the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be greatly praised.'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Reward her for all she has done.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let her deeds publicly declare her praise.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: It is not for kings, O Lemuel, to guzzle wine.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rulers should not crave alcohol.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: For if they drink, they may forget the law
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not give justice to the oppressed.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Alcohol is for the dying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wine for those in bitter distress.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Let them drink to forget their poverty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and remember their troubles no more.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Speak up for those who cannot speak for themselves;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ensure justice for those being crushed.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Yes, speak up for the poor and helpless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and see that they get justice.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Wife of Noble Character
    marker-yv: yv-h
