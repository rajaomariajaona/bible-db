document_id: PRO.31,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sayings of King Lemuel
  - type: text
    content: The sayings of King Lemuel contain this message,
  - type: note
    content: Or of Lemuel, king of Massa; or of King Lemuel, an oracle.
  - type: text
    content: ' which his mother taught him.'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Verses 10-31 comprise a Hebrew acrostic poem; each verse begins with a successive letter of the Hebrew alphabet.
  - type: text
    content: Who can find a virtuous and capable wife?
  - type: text
    content: She is more precious than rubies.
  '11':
  - type: text
    content: Her husband can trust her,
  - type: text
    content: and she will greatly enrich his life.
  '12':
  - type: text
    content: She brings him good, not harm,
  - type: text
    content: all the days of her life.
  '13':
  - type: text
    content: She finds wool and flax
  - type: text
    content: and busily spins it.
  '14':
  - type: text
    content: She is like a merchant’s ship,
  - type: text
    content: bringing her food from afar.
  '15':
  - type: text
    content: She gets up before dawn to prepare breakfast for her household
  - type: text
    content: and plan the day’s work for her servant girls.
  '16':
  - type: text
    content: She goes to inspect a field and buys it;
  - type: text
    content: with her earnings she plants a vineyard.
  '17':
  - type: text
    content: She is energetic and strong,
  - type: text
    content: a hard worker.
  '18':
  - type: text
    content: She makes sure her dealings are profitable;
  - type: text
    content: her lamp burns late into the night.
  '19':
  - type: text
    content: Her hands are busy spinning thread,
  - type: text
    content: her fingers twisting fiber.
  '2':
  - type: text
    content: O my son, O son of my womb,
  - type: text
    content: O son of my vows,
  '20':
  - type: text
    content: She extends a helping hand to the poor
  - type: text
    content: and opens her arms to the needy.
  '21':
  - type: text
    content: She has no fear of winter for her household,
  - type: text
    content: for everyone has warm
  - type: note
    content: As in Greek and Latin versions; Hebrew reads scarlet.
  - type: text
    content: ' clothes.'
  '22':
  - type: text
    content: She makes her own bedspreads.
  - type: text
    content: She dresses in fine linen and purple gowns.
  '23':
  - type: text
    content: Her husband is well known at the city gates,
  - type: text
    content: where he sits with the other civic leaders.
  '24':
  - type: text
    content: She makes belted linen garments
  - type: text
    content: and sashes to sell to the merchants.
  '25':
  - type: text
    content: She is clothed with strength and dignity,
  - type: text
    content: and she laughs without fear of the future.
  '26':
  - type: text
    content: When she speaks, her words are wise,
  - type: text
    content: and she gives instructions with kindness.
  '27':
  - type: text
    content: She carefully watches everything in her household
  - type: text
    content: and suffers nothing from laziness.
  '28':
  - type: text
    content: Her children stand and bless her.
  - type: text
    content: 'Her husband praises her:'
  '29':
  - type: text
    content: “There are many virtuous and capable women in the world,
  - type: text
    content: but you surpass them all!”
  '3':
  - type: text
    content: do not waste your strength on women,
  - type: text
    content: on those who ruin kings.
  '30':
  - type: text
    content: Charm is deceptive, and beauty does not last;
  - type: text
    content: 'but a woman who fears the '
  - type: text
    content: Lord
  - type: text
    content: ' will be greatly praised.'
  '31':
  - type: text
    content: Reward her for all she has done.
  - type: text
    content: Let her deeds publicly declare her praise.
  '4':
  - type: text
    content: It is not for kings, O Lemuel, to guzzle wine.
  - type: text
    content: Rulers should not crave alcohol.
  '5':
  - type: text
    content: For if they drink, they may forget the law
  - type: text
    content: and not give justice to the oppressed.
  '6':
  - type: text
    content: Alcohol is for the dying,
  - type: text
    content: and wine for those in bitter distress.
  '7':
  - type: text
    content: Let them drink to forget their poverty
  - type: text
    content: and remember their troubles no more.
  '8':
  - type: text
    content: Speak up for those who cannot speak for themselves;
  - type: text
    content: ensure justice for those being crushed.
  '9':
  - type: text
    content: Yes, speak up for the poor and helpless,
  - type: text
    content: and see that they get justice.
  - type: heading
    content: A Wife of Noble Character
