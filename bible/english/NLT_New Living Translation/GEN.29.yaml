document_id: GEN.29,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Arrives at Paddan-Aram
  - type: text
    content: 'Then Jacob hurried on, finally arriving in the land of the east. '
  '10':
  - type: text
    content: 'And because Rachel was his cousin—the daughter of Laban, his mother’s brother—and because the sheep and goats belonged to his uncle Laban, Jacob went over to the well and moved the stone from its mouth and watered his uncle’s flock. '
  '11':
  - type: text
    content: 'Then Jacob kissed Rachel, and he wept aloud. '
  '12':
  - type: text
    content: He explained to Rachel that he was her cousin on her father’s side—the son of her aunt Rebekah. So Rachel quickly ran and told her father, Laban.
  '13':
  - type: text
    content: 'As soon as Laban heard that his nephew Jacob had arrived, he ran out to meet him. He embraced and kissed him and brought him home. When Jacob had told him his story, '
  '14':
  - type: text
    content: Laban exclaimed, “You really are my own flesh and blood!”
  - type: heading
    content: Jacob Marries Leah and Rachel
  - type: text
    content: 'After Jacob had stayed with Laban for about a month, '
  '15':
  - type: text
    content: Laban said to him, “You shouldn’t work for me without pay just because we are relatives. Tell me how much your wages should be.”
  '16':
  - type: text
    content: 'Now Laban had two daughters. The older daughter was named Leah, and the younger one was Rachel. '
  '17':
  - type: text
    content: There was no sparkle in Leah’s eyes,
  - type: note
    content: Or Leah had dull eyes, or Leah had soft eyes. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' but Rachel had a beautiful figure and a lovely face. '
  '18':
  - type: text
    content: Since Jacob was in love with Rachel, he told her father, “I’ll work for you for seven years if you’ll give me Rachel, your younger daughter, as my wife.”
  '19':
  - type: text
    content: '“Agreed!” Laban replied. “I’d rather give her to you than to anyone else. Stay and work with me.” '
  '2':
  - type: text
    content: He saw a well in the distance. Three flocks of sheep and goats lay in an open field beside it, waiting to be watered. But a heavy stone covered the mouth of the well.
  '20':
  - type: text
    content: So Jacob worked seven years to pay for Rachel. But his love for her was so strong that it seemed to him but a few days.
  '21':
  - type: text
    content: Finally, the time came for him to marry her. “I have fulfilled my agreement,” Jacob said to Laban. “Now give me my wife so I can sleep with her.”
  '22':
  - type: text
    content: 'So Laban invited everyone in the neighborhood and prepared a wedding feast. '
  '23':
  - type: text
    content: 'But that night, when it was dark, Laban took Leah to Jacob, and he slept with her. '
  '24':
  - type: text
    content: (Laban had given Leah a servant, Zilpah, to be her maid.)
  '25':
  - type: text
    content: But when Jacob woke up in the morning—it was Leah! “What have you done to me?” Jacob raged at Laban. “I worked seven years for Rachel! Why have you tricked me?”
  '26':
  - type: text
    content: '“It’s not our custom here to marry off a younger daughter ahead of the firstborn,” Laban replied. '
  '27':
  - type: text
    content: “But wait until the bridal week is over; then we’ll give you Rachel, too—provided you promise to work another seven years for me.”
  '28':
  - type: text
    content: 'So Jacob agreed to work seven more years. A week after Jacob had married Leah, Laban gave him Rachel, too. '
  '29':
  - type: text
    content: '(Laban gave Rachel a servant, Bilhah, to be her maid.) '
  '3':
  - type: text
    content: 'It was the custom there to wait for all the flocks to arrive before removing the stone and watering the animals. Afterward the stone would be placed back over the mouth of the well. '
  '30':
  - type: text
    content: So Jacob slept with Rachel, too, and he loved her much more than Leah. He then stayed and worked for Laban the additional seven years.
  - type: heading
    content: Jacob’s Many Children
  '31':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' saw that Leah was unloved, he enabled her to have children, but Rachel could not conceive. '
  '32':
  - type: text
    content: So Leah became pregnant and gave birth to a son. She named him Reuben,
  - type: note
    content: Reuben means “Look, a son!” It also sounds like the Hebrew for “He has seen my misery.”
  - type: text
    content: ' for she said, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has noticed my misery, and now my husband will love me.”'
  '33':
  - type: text
    content: She soon became pregnant again and gave birth to another son. She named him Simeon,
  - type: note
    content: Simeon probably means “one who hears.”
  - type: text
    content: ' for she said, “The '
  - type: text
    content: Lord
  - type: text
    content: ' heard that I was unloved and has given me another son.”'
  '34':
  - type: text
    content: Then she became pregnant a third time and gave birth to another son. He was named Levi,
  - type: note
    content: Levi sounds like a Hebrew term that means “being attached” or “feeling affection for.”
  - type: text
    content: ' for she said, “Surely this time my husband will feel affection for me, since I have given him three sons!”'
  '35':
  - type: text
    content: Once again Leah became pregnant and gave birth to another son. She named him Judah,
  - type: note
    content: Judah is related to the Hebrew term for “praise.”
  - type: text
    content: ' for she said, “Now I will praise the '
  - type: text
    content: Lord
  - type: text
    content: '!” And then she stopped having children.'
  '4':
  - type: text
    content: Jacob went over to the shepherds and asked, “Where are you from, my friends?”
  - type: text
    content: “We are from Haran,” they answered.
  '5':
  - type: text
    content: “Do you know a man there named Laban, the grandson of Nahor?” he asked.
  - type: text
    content: “Yes, we do,” they replied.
  '6':
  - type: text
    content: “Is he doing well?” Jacob asked.
  - type: text
    content: “Yes, he’s well,” they answered. “Look, here comes his daughter Rachel with the flock now.”
  '7':
  - type: text
    content: Jacob said, “Look, it’s still broad daylight—too early to round up the animals. Why don’t you water the sheep and goats so they can get back out to pasture?”
  '8':
  - type: text
    content: “We can’t water the animals until all the flocks have arrived,” they replied. “Then the shepherds move the stone from the mouth of the well, and we water all the sheep and goats.”
  '9':
  - type: text
    content: 'Jacob was still talking with them when Rachel arrived with her father’s flock, for she was a shepherd. '
