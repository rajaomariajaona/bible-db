document_id: GEN.29,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Arrives at Paddan-Aram
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Jacob hurried on, finally arriving in the land of the east. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And because Rachel was his cousin—the daughter of Laban, his mother’s brother—and because the sheep and goats belonged to his uncle Laban, Jacob went over to the well and moved the stone from its mouth and watered his uncle’s flock. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then Jacob kissed Rachel, and he wept aloud. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: He explained to Rachel that he was her cousin on her father’s side—the son of her aunt Rebekah. So Rachel quickly ran and told her father, Laban.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'As soon as Laban heard that his nephew Jacob had arrived, he ran out to meet him. He embraced and kissed him and brought him home. When Jacob had told him his story, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Laban exclaimed, “You really are my own flesh and blood!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Marries Leah and Rachel
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'After Jacob had stayed with Laban for about a month, '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Laban said to him, “You shouldn’t work for me without pay just because we are relatives. Tell me how much your wages should be.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now Laban had two daughters. The older daughter was named Leah, and the younger one was Rachel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: There was no sparkle in Leah’s eyes,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Leah had dull eyes, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Leah had soft eyes. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' but Rachel had a beautiful figure and a lovely face. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Since Jacob was in love with Rachel, he told her father, “I’ll work for you for seven years if you’ll give me Rachel, your younger daughter, as my wife.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“Agreed!” Laban replied. “I’d rather give her to you than to anyone else. Stay and work with me.” '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He saw a well in the distance. Three flocks of sheep and goats lay in an open field beside it, waiting to be watered. But a heavy stone covered the mouth of the well.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So Jacob worked seven years to pay for Rachel. But his love for her was so strong that it seemed to him but a few days.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Finally, the time came for him to marry her. “I have fulfilled my agreement,” Jacob said to Laban. “Now give me my wife so I can sleep with her.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So Laban invited everyone in the neighborhood and prepared a wedding feast. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But that night, when it was dark, Laban took Leah to Jacob, and he slept with her. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: (Laban had given Leah a servant, Zilpah, to be her maid.)
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: But when Jacob woke up in the morning—it was Leah! “What have you done to me?” Jacob raged at Laban. “I worked seven years for Rachel! Why have you tricked me?”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“It’s not our custom here to marry off a younger daughter ahead of the firstborn,” Laban replied. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “But wait until the bridal week is over; then we’ll give you Rachel, too—provided you promise to work another seven years for me.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'So Jacob agreed to work seven more years. A week after Jacob had married Leah, Laban gave him Rachel, too. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '(Laban gave Rachel a servant, Bilhah, to be her maid.) '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'It was the custom there to wait for all the flocks to arrive before removing the stone and watering the animals. Afterward the stone would be placed back over the mouth of the well. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: So Jacob slept with Rachel, too, and he loved her much more than Leah. He then stayed and worked for Laban the additional seven years.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob’s Many Children
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saw that Leah was unloved, he enabled her to have children, but Rachel could not conceive. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: So Leah became pregnant and gave birth to a son. She named him Reuben,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:32 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Reuben '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “Look, a son!” It also sounds like the Hebrew for “He has seen my misery.”
      marker-yv: yv-n
    - type: text
      text: ' for she said, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has noticed my misery, and now my husband will love me.”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: She soon became pregnant again and gave birth to another son. She named him Simeon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:33 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Simeon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: probably means “one who hears.”
      marker-yv: yv-n
    - type: text
      text: ' for she said, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' heard that I was unloved and has given me another son.”'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Then she became pregnant a third time and gave birth to another son. He was named Levi,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:34 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Levi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sounds like a Hebrew term that means “being attached” or “feeling affection for.”
      marker-yv: yv-n
    - type: text
      text: ' for she said, “Surely this time my husband will feel affection for me, since I have given him three sons!”'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Once again Leah became pregnant and gave birth to another son. She named him Judah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:35 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Judah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is related to the Hebrew term for “praise.”
      marker-yv: yv-n
    - type: text
      text: ' for she said, “Now I will praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!” And then she stopped having children.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Jacob went over to the shepherds and asked, “Where are you from, my friends?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “We are from Haran,” they answered.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Do you know a man there named Laban, the grandson of Nahor?” he asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, we do,” they replied.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Is he doing well?” Jacob asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, he’s well,” they answered. “Look, here comes his daughter Rachel with the flock now.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Jacob said, “Look, it’s still broad daylight—too early to round up the animals. Why don’t you water the sheep and goats so they can get back out to pasture?”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “We can’t water the animals until all the flocks have arrived,” they replied. “Then the shepherds move the stone from the mouth of the well, and we water all the sheep and goats.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jacob was still talking with them when Rachel arrived with her father’s flock, for she was a shepherd. '
