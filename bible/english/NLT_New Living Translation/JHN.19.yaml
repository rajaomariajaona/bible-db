document_id: JHN.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Sentenced to Death
  - type: text
    content: 'Then Pilate had Jesus flogged with a lead-tipped whip. '
  '10':
  - type: text
    content: “Why don’t you talk to me?” Pilate demanded. “Don’t you realize that I have the power to release you or crucify you?”
  '11':
  - type: text
    content: 'Then Jesus said, '
  - type: text
    content: “You would have no power over me at all unless it were given to you from above. So the one who handed me over to you has the greater sin.”
  '12':
  - type: text
    content: Then Pilate tried to release him, but the Jewish leaders shouted, “If you release this man, you are no ‘friend of Caesar.’
  - type: note
    content: “Friend of Caesar” is a technical term that refers to an ally of the emperor.
  - type: text
    content: ' Anyone who declares himself a king is a rebel against Caesar.”'
  '13':
  - type: text
    content: 'When they said this, Pilate brought Jesus out to them again. Then Pilate sat down on the judgment seat on the platform that is called the Stone Pavement (in Hebrew, '
  - type: text
    content: Gabbatha
  - type: text
    content: '). '
  '14':
  - type: text
    content: It was now about noon on the day of preparation for the Passover. And Pilate said to the people,
  - type: note
    content: Greek Jewish people; also in 19:20.
  - type: text
    content: ' “Look, here is your king!”'
  '15':
  - type: text
    content: “Away with him,” they yelled. “Away with him! Crucify him!”
  - type: text
    content: “What? Crucify your king?” Pilate asked.
  - type: text
    content: “We have no king but Caesar,” the leading priests shouted back.
  '16':
  - type: text
    content: Then Pilate turned Jesus over to them to be crucified.
  - type: heading
    content: The Crucifixion
  - type: text
    content: 'So they took Jesus away. '
  '17':
  - type: text
    content: 'Carrying the cross by himself, he went to the place called Place of the Skull (in Hebrew, '
  - type: text
    content: Golgotha
  - type: text
    content: '). '
  '18':
  - type: text
    content: 'There they nailed him to the cross. Two others were crucified with him, one on either side, with Jesus between them. '
  '19':
  - type: text
    content: And Pilate posted a sign on the cross that read, “Jesus of Nazareth,
  - type: note
    content: Or Jesus the Nazarene.
  - type: text
    content: ' the King of the Jews.” '
  '2':
  - type: text
    content: 'The soldiers wove a crown of thorns and put it on his head, and they put a purple robe on him. '
  '20':
  - type: text
    content: The place where Jesus was crucified was near the city, and the sign was written in Hebrew, Latin, and Greek, so that many people could read it.
  '21':
  - type: text
    content: Then the leading priests objected and said to Pilate, “Change it from ‘The King of the Jews’ to ‘He said, I am King of the Jews.’”
  '22':
  - type: text
    content: Pilate replied, “No, what I have written, I have written.”
  '23':
  - type: text
    content: 'When the soldiers had crucified Jesus, they divided his clothes among the four of them. They also took his robe, but it was seamless, woven in one piece from top to bottom. '
  '24':
  - type: text
    content: So they said, “Rather than tearing it apart, let’s throw dice
  - type: note
    content: Greek cast lots.
  - type: text
    content: ' for it.” This fulfilled the Scripture that says, “They divided my garments among themselves and threw dice for my clothing.”'
  - type: note
    content: Ps 22:18.
  - type: text
    content: ' So that is what they did.'
  '25':
  - type: text
    content: 'Standing near the cross were Jesus’ mother, and his mother’s sister, Mary (the wife of Clopas), and Mary Magdalene. '
  '26':
  - type: text
    content: 'When Jesus saw his mother standing there beside the disciple he loved, he said to her, '
  - type: text
    content: “Dear woman, here is your son.”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And he said to this disciple, '
  - type: text
    content: “Here is your mother.”
  - type: text
    content: ' And from then on this disciple took her into his home.'
  - type: heading
    content: The Death of Jesus
  '28':
  - type: text
    content: 'Jesus knew that his mission was now finished, and to fulfill Scripture he said, '
  - type: text
    content: “I am thirsty.”
  - type: note
    content: See Pss 22:15; 69:21.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'A jar of sour wine was sitting there, so they soaked a sponge in it, put it on a hyssop branch, and held it up to his lips. '
  '3':
  - type: text
    content: “Hail! King of the Jews!” they mocked, as they slapped him across the face.
  '30':
  - type: text
    content: 'When Jesus had tasted it, he said, '
  - type: text
    content: “It is finished!”
  - type: text
    content: ' Then he bowed his head and gave up his spirit.'
  '31':
  - type: text
    content: 'It was the day of preparation, and the Jewish leaders didn’t want the bodies hanging there the next day, which was the Sabbath (and a very special Sabbath, because it was Passover week). So they asked Pilate to hasten their deaths by ordering that their legs be broken. Then their bodies could be taken down. '
  '32':
  - type: text
    content: 'So the soldiers came and broke the legs of the two men crucified with Jesus. '
  '33':
  - type: text
    content: 'But when they came to Jesus, they saw that he was already dead, so they didn’t break his legs. '
  '34':
  - type: text
    content: 'One of the soldiers, however, pierced his side with a spear, and immediately blood and water flowed out. '
  '35':
  - type: text
    content: (This report is from an eyewitness giving an accurate account. He speaks the truth so that you also may continue to believe.
  - type: note
    content: Some manuscripts read that you also may believe.
  - type: text
    content: ') '
  '36':
  - type: text
    content: These things happened in fulfillment of the Scriptures that say, “Not one of his bones will be broken,”
  - type: note
    content: Exod 12:46; Num 9:12; Ps 34:20.
  - type: text
    content: ' '
  '37':
  - type: text
    content: and “They will look on the one they pierced.”
  - type: note
    content: Zech 12:10.
  - type: heading
    content: The Burial of Jesus
  '38':
  - type: text
    content: 'Afterward Joseph of Arimathea, who had been a secret disciple of Jesus (because he feared the Jewish leaders), asked Pilate for permission to take down Jesus’ body. When Pilate gave permission, Joseph came and took the body away. '
  '39':
  - type: text
    content: With him came Nicodemus, the man who had come to Jesus at night. He brought about seventy-five pounds
  - type: note
    content: Greek 100 litras [32.7 kilograms].
  - type: text
    content: ' of perfumed ointment made from myrrh and aloes. '
  '4':
  - type: text
    content: 'Pilate went outside again and said to the people, “I am going to bring him out to you now, but understand clearly that I find him not guilty.” '
  '40':
  - type: text
    content: 'Following Jewish burial custom, they wrapped Jesus’ body with the spices in long sheets of linen cloth. '
  '41':
  - type: text
    content: 'The place of crucifixion was near a garden, where there was a new tomb, never used before. '
  '42':
  - type: text
    content: And so, because it was the day of preparation for the Jewish Passover
  - type: note
    content: Greek because of the Jewish day of preparation.
  - type: text
    content: ' and since the tomb was close at hand, they laid Jesus there.'
  '5':
  - type: text
    content: Then Jesus came out wearing the crown of thorns and the purple robe. And Pilate said, “Look, here is the man!”
  '6':
  - type: text
    content: When they saw him, the leading priests and Temple guards began shouting, “Crucify him! Crucify him!”
  - type: text
    content: “Take him yourselves and crucify him,” Pilate said. “I find him not guilty.”
  '7':
  - type: text
    content: The Jewish leaders replied, “By our law he ought to die because he called himself the Son of God.”
  '8':
  - type: text
    content: 'When Pilate heard this, he was more frightened than ever. '
  '9':
  - type: text
    content: He took Jesus back into the headquarters
  - type: note
    content: Greek the Praetorium.
  - type: text
    content: ' again and asked him, “Where are you from?” But Jesus gave no answer. '
