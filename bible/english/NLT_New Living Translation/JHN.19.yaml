document_id: JHN.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Sentenced to Death
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Pilate had Jesus flogged with a lead-tipped whip. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The soldiers wove a crown of thorns and put it on his head, and they put a purple robe on him. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Hail! King of the Jews!” they mocked, as they slapped him across the face.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pilate went outside again and said to the people, “I am going to bring him out to you now, but understand clearly that I find him not guilty.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then Jesus came out wearing the crown of thorns and the purple robe. And Pilate said, “Look, here is the man!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When they saw him, the leading priests and Temple guards began shouting, “Crucify him! Crucify him!”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Take him yourselves and crucify him,” Pilate said. “I find him not guilty.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The Jewish leaders replied, “By our law he ought to die because he called himself the Son of God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When Pilate heard this, he was more frightened than ever. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He took Jesus back into the headquarters
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Praetorium.
    marker-yv: yv-n
  - type: text
    text: ' again and asked him, “Where are you from?” But Jesus gave no answer. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Why don’t you talk to me?” Pilate demanded. “Don’t you realize that I have the power to release you or crucify you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You would have no power over me at all unless it were given to you from above. So the one who handed me over to you has the greater sin.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then Pilate tried to release him, but the Jewish leaders shouted, “If you release this man, you are no ‘friend of Caesar.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Friend of Caesar” is a technical term that refers to an ally of the emperor.
    marker-yv: yv-n
  - type: text
    text: ' Anyone who declares himself a king is a rebel against Caesar.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When they said this, Pilate brought Jesus out to them again. Then Pilate sat down on the judgment seat on the platform that is called the Stone Pavement (in Hebrew, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Gabbatha
  - type: text
    text: '). '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: It was now about noon on the day of preparation for the Passover. And Pilate said to the people,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jewish people; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 19:20.
    marker-yv: yv-n
  - type: text
    text: ' “Look, here is your king!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Away with him,” they yelled. “Away with him! Crucify him!”
- type: usfm
  marker: p
  children:
  - type: text
    text: “What? Crucify your king?” Pilate asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: “We have no king but Caesar,” the leading priests shouted back.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then Pilate turned Jesus over to them to be crucified.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Crucifixion
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: text
    text: 'So they took Jesus away. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Carrying the cross by himself, he went to the place called Place of the Skull (in Hebrew, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Golgotha
  - type: text
    text: '). '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'There they nailed him to the cross. Two others were crucified with him, one on either side, with Jesus between them. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And Pilate posted a sign on the cross that read, “Jesus of Nazareth,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jesus the Nazarene.
    marker-yv: yv-n
  - type: text
    text: ' the King of the Jews.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The place where Jesus was crucified was near the city, and the sign was written in Hebrew, Latin, and Greek, so that many people could read it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then the leading priests objected and said to Pilate, “Change it from ‘The King of the Jews’ to ‘He said, I am King of the Jews.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Pilate replied, “No, what I have written, I have written.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'When the soldiers had crucified Jesus, they divided his clothes among the four of them. They also took his robe, but it was seamless, woven in one piece from top to bottom. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So they said, “Rather than tearing it apart, let’s throw dice
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:24a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cast lots.
    marker-yv: yv-n
  - type: text
    text: ' for it.” This fulfilled the Scripture that says, “They divided my garments among themselves and threw dice for my clothing.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:24b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 22:18.
    marker-yv: yv-n
  - type: text
    text: ' So that is what they did.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Standing near the cross were Jesus’ mother, and his mother’s sister, Mary (the wife of Clopas), and Mary Magdalene. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When Jesus saw his mother standing there beside the disciple he loved, he said to her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Dear woman, here is your son.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And he said to this disciple, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Here is your mother.”
  - type: text
    text: ' And from then on this disciple took her into his home.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Death of Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jesus knew that his mission was now finished, and to fulfill Scripture he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I am thirsty.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Pss 22:15; 69:21.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'A jar of sour wine was sitting there, so they soaked a sponge in it, put it on a hyssop branch, and held it up to his lips. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'When Jesus had tasted it, he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “It is finished!”
  - type: text
    text: ' Then he bowed his head and gave up his spirit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'It was the day of preparation, and the Jewish leaders didn’t want the bodies hanging there the next day, which was the Sabbath (and a very special Sabbath, because it was Passover week). So they asked Pilate to hasten their deaths by ordering that their legs be broken. Then their bodies could be taken down. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So the soldiers came and broke the legs of the two men crucified with Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'But when they came to Jesus, they saw that he was already dead, so they didn’t break his legs. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'One of the soldiers, however, pierced his side with a spear, and immediately blood and water flowed out. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: (This report is from an eyewitness giving an accurate account. He speaks the truth so that you also may continue to believe.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: that you also may believe.
    marker-yv: yv-n
  - type: text
    text: ') '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: These things happened in fulfillment of the Scriptures that say, “Not one of his bones will be broken,”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Exod 12:46; Num 9:12; Ps 34:20.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: and “They will look on the one they pierced.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zech 12:10.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Burial of Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Afterward Joseph of Arimathea, who had been a secret disciple of Jesus (because he feared the Jewish leaders), asked Pilate for permission to take down Jesus’ body. When Pilate gave permission, Joseph came and took the body away. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: With him came Nicodemus, the man who had come to Jesus at night. He brought about seventy-five pounds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '100 litras '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[32.7 kilograms].'
    marker-yv: yv-n
  - type: text
    text: ' of perfumed ointment made from myrrh and aloes. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Following Jewish burial custom, they wrapped Jesus’ body with the spices in long sheets of linen cloth. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'The place of crucifixion was near a garden, where there was a new tomb, never used before. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: And so, because it was the day of preparation for the Jewish Passover
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: because of the Jewish day of preparation.
    marker-yv: yv-n
  - type: text
    text: ' and since the tomb was close at hand, they laid Jesus there.'
