document_id: EXO.7,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aaron’s Staff Becomes a Serpent
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Pay close attention to this. I will make you seem like God to Pharaoh, and your brother, Aaron, will be your prophet. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So Moses and Aaron went to Pharaoh and did what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded them. Aaron threw down his staff before Pharaoh and his officials, and it became a serpent! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then Pharaoh called in his own wise men and sorcerers, and these Egyptian magicians did the same thing with their magic. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'They threw down their staffs, which also became serpents! But then Aaron’s staff swallowed up their staffs. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Pharaoh’s heart, however, remained hard. He still refused to listen, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had predicted.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Plague of Blood
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Pharaoh’s heart is stubborn,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: heavy.
      marker-yv: yv-n
    - type: text
      text: ' and he still refuses to let the people go. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So go to Pharaoh in the morning as he goes down to the river. Stand on the bank of the Nile and meet him there. Be sure to take along the staff that turned into a snake. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then announce to him, ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of the Hebrews, has sent me to tell you, “Let my people go, so they can worship me in the wilderness.” Until now, you have refused to listen to him. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: “I will show you that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.” Look! I will strike the water of the Nile with this staff in my hand, and the river will turn to blood. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The fish in it will die, and the river will stink. The Egyptians will not be able to drink any water from the Nile.’”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses: “Tell Aaron, ‘Take your staff and raise your hand over the waters of Egypt—all its rivers, canals, ponds, and all the reservoirs. Turn all the water to blood. Everywhere in Egypt the water will turn to blood, even the water stored in wooden bowls and stone pots.’”'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tell Aaron everything I command you, and Aaron must command Pharaoh to let the people of Israel leave his country. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So Moses and Aaron did just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded them. As Pharaoh and all of his officials watched, Aaron raised his staff and struck the water of the Nile. Suddenly, the whole river turned to blood! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The fish in the river died, and the water became so foul that the Egyptians couldn’t drink it. There was blood everywhere throughout the land of Egypt. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But again the magicians of Egypt used their magic, and they, too, turned water into blood. So Pharaoh’s heart remained hard. He refused to listen to Moses and Aaron, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had predicted. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Pharaoh returned to his palace and put the whole thing out of his mind. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Then all the Egyptians dug along the riverbank to find drinking water, for they couldn’t drink the water from the Nile.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Seven days passed from the time the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' struck the Nile.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But I will make Pharaoh’s heart stubborn so I can multiply my miraculous signs and wonders in the land of Egypt. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Even then Pharaoh will refuse to listen to you. So I will bring down my fist on Egypt. Then I will rescue my forces—my people, the Israelites—from the land of Egypt with great acts of judgment. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'When I raise my powerful hand and bring out the Israelites, the Egyptians will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So Moses and Aaron did just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Moses was eighty years old, and Aaron was eighty-three when they made their demands to Pharaoh.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses and Aaron, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Pharaoh will demand, ‘Show me a miracle.’ When he does this, say to Aaron, ‘Take your staff and throw it down in front of Pharaoh, and it will become a serpent.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tannin, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: which elsewhere refers to a sea monster. Greek version translates it “dragon.”
      marker-yv: yv-n
    - type: text
      text: ’”
