document_id: JER.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Seventy Years of Captivity
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This message for all the people of Judah came to Jeremiah from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' during the fourth year of Jehoiakim’s reign over Judah.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The fourth year of Jehoiakim’s reign and the accession year of Nebuchadnezzar’s reign was 605 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' This was the year when King Nebuchadnezzar'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nebuchadrezzar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Nebuchadnezzar; also in 25:9.
    marker-yv: yv-n
  - type: text
    text: ' of Babylon began his reign.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jeremiah the prophet said to all the people in Judah and Jerusalem, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “For the past twenty-three years—from the thirteenth year of the reign of Josiah son of Amon,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The thirteenth year of Josiah’s reign was 627 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' king of Judah, until now—the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has been giving me his messages. I have faithfully passed them on to you, but you have not listened.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“Again and again the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has sent you his servants, the prophets, but you have not listened or even paid attention. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Each time the message was this: ‘Turn from the evil road you are traveling and from the evil things you are doing. Only then will I let you live in this land that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave to you and your ancestors forever. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Do not provoke my anger by worshiping idols you made with your own hands. Then I will not harm you.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“But you would not listen to me,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. “You made me furious by worshiping idols you made with your own hands, bringing on yourselves all the disasters you now suffer. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies says: Because you have not listened to me, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I will gather together all the armies of the north under King Nebuchadnezzar of Babylon, whom I have appointed as my deputy. I will bring them all against this land and its people and against the surrounding nations. I will completely destroy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering.'
    marker-yv: yv-n
  - type: text
    text: ' you and make you an object of horror and contempt and a ruin forever. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I will take away your happy singing and laughter. The joyful voices of bridegrooms and brides will no longer be heard. Your millstones will fall silent, and the lights in your homes will go out. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: This entire land will become a desolate wasteland. Israel and her neighboring lands will serve the king of Babylon for seventy years.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Then, after the seventy years of captivity are over, I will punish the king of Babylon and his people for their sins,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . “I will make the country of the Babylonians
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Chaldeans.
    marker-yv: yv-n
  - type: text
    text: ' a wasteland forever. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I will bring upon them all the terrors I have promised in this book—all the penalties announced by Jeremiah against the nations. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Many nations and great kings will enslave the Babylonians, just as they enslaved my people. I will punish them in proportion to the suffering they cause my people.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The Cup of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Anger
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, said to me: “Take from my hand this cup filled to the brim with my anger, and make all the nations to whom I send you drink from it. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When they drink from it, they will stagger, crazed by the warfare I will send against them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So I took the cup of anger from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and made all the nations drink from it—every nation to which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sent me. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I went to Jerusalem and the other towns of Judah, and their kings and officials drank from the cup. From that day until this, they have been a desolate ruin, an object of horror, contempt, and cursing. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I gave the cup to Pharaoh, king of Egypt, his attendants, his officials, and all his people, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'along with all the foreigners living in that land. I also gave it to all the kings of the land of Uz and the kings of the Philistine cities of Ashkelon, Gaza, Ekron, and what remains of Ashdod. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then I gave the cup to the nations of Edom, Moab, and Ammon, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and the kings of Tyre and Sidon, and the kings of the regions across the sea. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I gave it to Dedan, Tema, and Buz, and to the people who live in distant places.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: who clip the corners of their hair.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'I gave it to the kings of Arabia, the kings of the nomadic tribes of the desert, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and to the kings of Zimri, Elam, and Media. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And I gave it to the kings of the northern countries, far and near, one after the other—all the kingdoms of the world. And finally, the king of Babylon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of Sheshach, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a code name for Babylon.
    marker-yv: yv-n
  - type: text
    text: ' himself drank from the cup of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s anger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, “Now tell them, ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: Drink from this cup of my anger. Get drunk and vomit; fall to rise no more, for I am sending terrible wars against you.’ '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And if they refuse to accept the cup, tell them, ‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies says: You have no choice but to drink from it. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'I have begun to punish Jerusalem, the city that bears my name. Now should I let you go unpunished? No, you will not escape disaster. I will call for war against all the nations of the earth. I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, have spoken!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “Now prophesy all these things, and say to them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will roar against his own land'
- type: usfm
  marker: q2
  children:
  - type: text
    text: from his holy dwelling in heaven.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will shout like those who tread grapes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will shout against everyone on earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: His cry of judgment will reach the ends of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will bring his case against all the nations.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will judge all the people of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: slaughtering the wicked with the sword.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!’”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies says:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Look! Disaster will fall upon nation after nation!
- type: usfm
  marker: q1
  children:
  - type: text
    text: A great whirlwind of fury is rising
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the most distant corners of the earth!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'In that day those the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has slaughtered will fill the earth from one end to the other. No one will mourn for them or gather up their bodies to bury them. They will be scattered on the ground like manure.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Weep and moan, you evil shepherds!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Roll in the dust, you leaders of the flock!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The time of your slaughter has arrived;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will fall and shatter like a fragile vase.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: You will find no place to hide;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there will be no way to escape.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Listen to the frantic cries of the shepherds.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The leaders of the flock are wailing in despair,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is ruining their pastures.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Peaceful meadows will be turned into a wasteland
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s fierce anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: He has left his den like a strong lion seeking its prey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their land will be made desolate
- type: usfm
  marker: q1
  children:
  - type: text
    text: by the sword
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Hebrew manuscripts and Greek version; Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: by the anger.
    marker-yv: yv-n
  - type: text
    text: ' of the enemy'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s fierce anger.
