document_id: JER.25,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Seventy Years of Captivity
  - type: text
    content: 'This message for all the people of Judah came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ' during the fourth year of Jehoiakim’s reign over Judah.'
  - type: note
    content: The fourth year of Jehoiakim’s reign and the accession year of Nebuchadnezzar’s reign was 605 b.c.
  - type: text
    content: ' This was the year when King Nebuchadnezzar'
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar; also in 25:9.
  - type: text
    content: ' of Babylon began his reign.'
  '10':
  - type: text
    content: 'I will take away your happy singing and laughter. The joyful voices of bridegrooms and brides will no longer be heard. Your millstones will fall silent, and the lights in your homes will go out. '
  '11':
  - type: text
    content: This entire land will become a desolate wasteland. Israel and her neighboring lands will serve the king of Babylon for seventy years.
  '12':
  - type: text
    content: '“Then, after the seventy years of captivity are over, I will punish the king of Babylon and his people for their sins,” says the '
  - type: text
    content: Lord
  - type: text
    content: . “I will make the country of the Babylonians
  - type: note
    content: Or Chaldeans.
  - type: text
    content: ' a wasteland forever. '
  '13':
  - type: text
    content: 'I will bring upon them all the terrors I have promised in this book—all the penalties announced by Jeremiah against the nations. '
  '14':
  - type: text
    content: Many nations and great kings will enslave the Babylonians, just as they enslaved my people. I will punish them in proportion to the suffering they cause my people.”
  - type: heading
    content: The Cup of the Lord’s Anger
  '15':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, said to me: “Take from my hand this cup filled to the brim with my anger, and make all the nations to whom I send you drink from it. '
  '16':
  - type: text
    content: When they drink from it, they will stagger, crazed by the warfare I will send against them.”
  '17':
  - type: text
    content: 'So I took the cup of anger from the '
  - type: text
    content: Lord
  - type: text
    content: ' and made all the nations drink from it—every nation to which the '
  - type: text
    content: Lord
  - type: text
    content: ' sent me. '
  '18':
  - type: text
    content: 'I went to Jerusalem and the other towns of Judah, and their kings and officials drank from the cup. From that day until this, they have been a desolate ruin, an object of horror, contempt, and cursing. '
  '19':
  - type: text
    content: 'I gave the cup to Pharaoh, king of Egypt, his attendants, his officials, and all his people, '
  '2':
  - type: text
    content: 'Jeremiah the prophet said to all the people in Judah and Jerusalem, '
  '20':
  - type: text
    content: 'along with all the foreigners living in that land. I also gave it to all the kings of the land of Uz and the kings of the Philistine cities of Ashkelon, Gaza, Ekron, and what remains of Ashdod. '
  '21':
  - type: text
    content: 'Then I gave the cup to the nations of Edom, Moab, and Ammon, '
  '22':
  - type: text
    content: 'and the kings of Tyre and Sidon, and the kings of the regions across the sea. '
  '23':
  - type: text
    content: I gave it to Dedan, Tema, and Buz, and to the people who live in distant places.
  - type: note
    content: Or who clip the corners of their hair.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'I gave it to the kings of Arabia, the kings of the nomadic tribes of the desert, '
  '25':
  - type: text
    content: 'and to the kings of Zimri, Elam, and Media. '
  '26':
  - type: text
    content: And I gave it to the kings of the northern countries, far and near, one after the other—all the kingdoms of the world. And finally, the king of Babylon
  - type: note
    content: Hebrew of Sheshach, a code name for Babylon.
  - type: text
    content: ' himself drank from the cup of the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger.
  '27':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Now tell them, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: Drink from this cup of my anger. Get drunk and vomit; fall to rise no more, for I am sending terrible wars against you.’ '
  '28':
  - type: text
    content: 'And if they refuse to accept the cup, tell them, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: You have no choice but to drink from it. '
  '29':
  - type: text
    content: 'I have begun to punish Jerusalem, the city that bears my name. Now should I let you go unpunished? No, you will not escape disaster. I will call for war against all the nations of the earth. I, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, have spoken!’'
  '3':
  - type: text
    content: “For the past twenty-three years—from the thirteenth year of the reign of Josiah son of Amon,
  - type: note
    content: The thirteenth year of Josiah’s reign was 627 b.c.
  - type: text
    content: ' king of Judah, until now—the '
  - type: text
    content: Lord
  - type: text
    content: ' has been giving me his messages. I have faithfully passed them on to you, but you have not listened.'
  '30':
  - type: text
    content: “Now prophesy all these things, and say to them,
  - type: text
    content: '“‘The '
  - type: text
    content: Lord
  - type: text
    content: ' will roar against his own land'
  - type: text
    content: from his holy dwelling in heaven.
  - type: text
    content: He will shout like those who tread grapes;
  - type: text
    content: he will shout against everyone on earth.
  '31':
  - type: text
    content: His cry of judgment will reach the ends of the earth,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' will bring his case against all the nations.'
  - type: text
    content: He will judge all the people of the earth,
  - type: text
    content: slaughtering the wicked with the sword.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!’”'
  '32':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says:'
  - type: text
    content: “Look! Disaster will fall upon nation after nation!
  - type: text
    content: A great whirlwind of fury is rising
  - type: text
    content: from the most distant corners of the earth!”
  '33':
  - type: text
    content: 'In that day those the '
  - type: text
    content: Lord
  - type: text
    content: ' has slaughtered will fill the earth from one end to the other. No one will mourn for them or gather up their bodies to bury them. They will be scattered on the ground like manure.'
  '34':
  - type: text
    content: Weep and moan, you evil shepherds!
  - type: text
    content: Roll in the dust, you leaders of the flock!
  - type: text
    content: The time of your slaughter has arrived;
  - type: text
    content: you will fall and shatter like a fragile vase.
  '35':
  - type: text
    content: You will find no place to hide;
  - type: text
    content: there will be no way to escape.
  '36':
  - type: text
    content: Listen to the frantic cries of the shepherds.
  - type: text
    content: The leaders of the flock are wailing in despair,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' is ruining their pastures.'
  '37':
  - type: text
    content: Peaceful meadows will be turned into a wasteland
  - type: text
    content: 'by the '
  - type: text
    content: Lord
  - type: text
    content: ’s fierce anger.
  '38':
  - type: text
    content: He has left his den like a strong lion seeking its prey,
  - type: text
    content: and their land will be made desolate
  - type: text
    content: by the sword
  - type: note
    content: As in some Hebrew manuscripts and Greek version; Masoretic Text reads by the anger.
  - type: text
    content: ' of the enemy'
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ’s fierce anger.
  '4':
  - type: text
    content: '“Again and again the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent you his servants, the prophets, but you have not listened or even paid attention. '
  '5':
  - type: text
    content: 'Each time the message was this: ‘Turn from the evil road you are traveling and from the evil things you are doing. Only then will I let you live in this land that the '
  - type: text
    content: Lord
  - type: text
    content: ' gave to you and your ancestors forever. '
  '6':
  - type: text
    content: Do not provoke my anger by worshiping idols you made with your own hands. Then I will not harm you.’
  '7':
  - type: text
    content: '“But you would not listen to me,” says the '
  - type: text
    content: Lord
  - type: text
    content: '. “You made me furious by worshiping idols you made with your own hands, bringing on yourselves all the disasters you now suffer. '
  '8':
  - type: text
    content: 'And now the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: Because you have not listened to me, '
  '9':
  - type: text
    content: I will gather together all the armies of the north under King Nebuchadnezzar of Babylon, whom I have appointed as my deputy. I will bring them all against this land and its people and against the surrounding nations. I will completely destroy
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering.
  - type: text
    content: ' you and make you an object of horror and contempt and a ruin forever. '
