document_id: PSA.23,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my shepherd;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have all that I need.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He lets me rest in green meadows;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he leads me beside peaceful streams.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: He renews my strength.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He guides me along right paths,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bringing honor to his name.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Even when I walk
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through the darkest valley,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the dark valley of death.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not be afraid,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you are close beside me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your rod and your staff
  - type: usfm
    marker: q2
    children:
    - type: text
      text: protect and comfort me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You prepare a feast for me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the presence of my enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You honor me by anointing my head with oil.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My cup overflows with blessings.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Surely your goodness and unfailing love will pursue me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the days of my life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and I will live in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forever.
