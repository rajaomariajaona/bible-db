document_id: PSA.23,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is my shepherd;'
  - type: text
    content: I have all that I need.
  '2':
  - type: text
    content: He lets me rest in green meadows;
  - type: text
    content: he leads me beside peaceful streams.
  '3':
  - type: text
    content: He renews my strength.
  - type: text
    content: He guides me along right paths,
  - type: text
    content: bringing honor to his name.
  '4':
  - type: text
    content: Even when I walk
  - type: text
    content: through the darkest valley,
  - type: note
    content: Or the dark valley of death.
  - type: text
    content: I will not be afraid,
  - type: text
    content: for you are close beside me.
  - type: text
    content: Your rod and your staff
  - type: text
    content: protect and comfort me.
  '5':
  - type: text
    content: You prepare a feast for me
  - type: text
    content: in the presence of my enemies.
  - type: text
    content: You honor me by anointing my head with oil.
  - type: text
    content: My cup overflows with blessings.
  '6':
  - type: text
    content: Surely your goodness and unfailing love will pursue me
  - type: text
    content: all the days of my life,
  - type: text
    content: 'and I will live in the house of the '
  - type: text
    content: Lord
  - type: text
    content: forever.
