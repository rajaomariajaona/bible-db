document_id: JOB.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Zophar’s First Response to Job
  - type: text
    content: 'Then Zophar the Naamathite replied to Job:'
  '10':
  - type: text
    content: If God comes and puts a person in prison
  - type: text
    content: or calls the court to order, who can stop him?
  '11':
  - type: text
    content: For he knows those who are false,
  - type: text
    content: and he takes note of all their sins.
  '12':
  - type: text
    content: An empty-headed person won’t become wise
  - type: text
    content: any more than a wild donkey can bear a human child.
  - type: note
    content: Or than a wild male donkey can bear a tame colt.
  '13':
  - type: text
    content: “If only you would prepare your heart
  - type: text
    content: and lift up your hands to him in prayer!
  '14':
  - type: text
    content: Get rid of your sins,
  - type: text
    content: and leave all iniquity behind you.
  '15':
  - type: text
    content: Then your face will brighten with innocence.
  - type: text
    content: You will be strong and free of fear.
  '16':
  - type: text
    content: You will forget your misery;
  - type: text
    content: it will be like water flowing away.
  '17':
  - type: text
    content: Your life will be brighter than the noonday.
  - type: text
    content: Even darkness will be as bright as morning.
  '18':
  - type: text
    content: Having hope will give you courage.
  - type: text
    content: You will be protected and will rest in safety.
  '19':
  - type: text
    content: You will lie down unafraid,
  - type: text
    content: and many will look to you for help.
  '2':
  - type: text
    content: “Shouldn’t someone answer this torrent of words?
  - type: text
    content: Is a person proved innocent just by a lot of talking?
  '20':
  - type: text
    content: But the wicked will be blinded.
  - type: text
    content: They will have no escape.
  - type: text
    content: Their only hope is death.”
  '3':
  - type: text
    content: Should I remain silent while you babble on?
  - type: text
    content: When you mock God, shouldn’t someone make you ashamed?
  '4':
  - type: text
    content: You claim, ‘My beliefs are pure,’
  - type: text
    content: and ‘I am clean in the sight of God.’
  '5':
  - type: text
    content: If only God would speak;
  - type: text
    content: if only he would tell you what he thinks!
  '6':
  - type: text
    content: If only he would tell you the secrets of wisdom,
  - type: text
    content: for true wisdom is not a simple matter.
  - type: text
    content: Listen! God is doubtless punishing you
  - type: text
    content: far less than you deserve!
  '7':
  - type: text
    content: “Can you solve the mysteries of God?
  - type: text
    content: Can you discover everything about the Almighty?
  '8':
  - type: text
    content: Such knowledge is higher than the heavens—
  - type: text
    content: and who are you?
  - type: text
    content: It is deeper than the underworld
  - type: note
    content: Hebrew than Sheol.
  - type: text
    content: —
  - type: text
    content: what do you know?
  '9':
  - type: text
    content: It is broader than the earth
  - type: text
    content: and wider than the sea.
