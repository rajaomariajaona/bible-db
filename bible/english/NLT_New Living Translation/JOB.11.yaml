document_id: JOB.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zophar’s First Response to Job
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Zophar the Naamathite replied to Job:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Shouldn’t someone answer this torrent of words?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is a person proved innocent just by a lot of talking?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Should I remain silent while you babble on?
- type: usfm
  marker: q2
  children:
  - type: text
    text: When you mock God, shouldn’t someone make you ashamed?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You claim, ‘My beliefs are pure,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: and ‘I am clean in the sight of God.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: If only God would speak;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if only he would tell you what he thinks!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: If only he would tell you the secrets of wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for true wisdom is not a simple matter.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen! God is doubtless punishing you
- type: usfm
  marker: q2
  children:
  - type: text
    text: far less than you deserve!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Can you solve the mysteries of God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can you discover everything about the Almighty?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Such knowledge is higher than the heavens—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and who are you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is deeper than the underworld
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: than Sheol.
    marker-yv: yv-n
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: what do you know?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: It is broader than the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wider than the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: If God comes and puts a person in prison
- type: usfm
  marker: q2
  children:
  - type: text
    text: or calls the court to order, who can stop him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For he knows those who are false,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he takes note of all their sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: An empty-headed person won’t become wise
- type: usfm
  marker: q2
  children:
  - type: text
    text: any more than a wild donkey can bear a human child.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: than a wild male donkey can bear a tame colt.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “If only you would prepare your heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lift up your hands to him in prayer!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Get rid of your sins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and leave all iniquity behind you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then your face will brighten with innocence.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You will be strong and free of fear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You will forget your misery;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will be like water flowing away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Your life will be brighter than the noonday.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even darkness will be as bright as morning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Having hope will give you courage.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You will be protected and will rest in safety.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: You will lie down unafraid,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and many will look to you for help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: But the wicked will be blinded.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will have no escape.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their only hope is death.”
