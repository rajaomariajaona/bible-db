document_id: ISA.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Isaiah’s Cleansing and Call
  - type: text
    content: It was in the year King Uzziah died
  - type: note
    content: King Uzziah died in 740 b.c.
  - type: text
    content: ' that I saw the Lord. He was sitting on a lofty throne, and the train of his robe filled the Temple. '
  '10':
  - type: text
    content: Harden the hearts of these people.
  - type: text
    content: Plug their ears and shut their eyes.
  - type: text
    content: That way, they will not see with their eyes,
  - type: text
    content: nor hear with their ears,
  - type: text
    content: nor understand with their hearts
  - type: text
    content: and turn to me for healing.”
  - type: note
    content: Greek version reads And he said, “Go and say to this people, / ‘When you hear what I say, you will not understand. / When you see what I do, you will not comprehend.’ / For the hearts of these people are hardened, / and their ears cannot hear, and they have closed their eyes— / so their eyes cannot see, / and their ears cannot hear, / and their hearts cannot understand, / and they cannot turn to me and let me heal them.” Compare Matt 13:14-15; Mark 4:12; Luke 8:10; Acts 28:26-27.
  '11':
  - type: text
    content: Then I said, “Lord, how long will this go on?”
  - type: text
    content: And he replied,
  - type: text
    content: “Until their towns are empty,
  - type: text
    content: their houses are deserted,
  - type: text
    content: and the whole country is a wasteland;
  '12':
  - type: text
    content: 'until the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent everyone away,'
  - type: text
    content: and the entire land of Israel lies deserted.
  '13':
  - type: text
    content: If even a tenth—a remnant—survive,
  - type: text
    content: it will be invaded again and burned.
  - type: text
    content: But as a terebinth or oak tree leaves a stump when it is cut down,
  - type: text
    content: so Israel’s stump will be a holy seed.”
  '2':
  - type: text
    content: 'Attending him were mighty seraphim, each having six wings. With two wings they covered their faces, with two they covered their feet, and with two they flew. '
  '3':
  - type: text
    content: They were calling out to each other,
  - type: text
    content: '“Holy, holy, holy is the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies!'
  - type: text
    content: The whole earth is filled with his glory!”
  '4':
  - type: text
    content: Their voices shook the Temple to its foundations, and the entire building was filled with smoke.
  '5':
  - type: text
    content: 'Then I said, “It’s all over! I am doomed, for I am a sinful man. I have filthy lips, and I live among a people with filthy lips. Yet I have seen the King, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.”'
  '6':
  - type: text
    content: 'Then one of the seraphim flew to me with a burning coal he had taken from the altar with a pair of tongs. '
  '7':
  - type: text
    content: He touched my lips with it and said, “See, this coal has touched your lips. Now your guilt is removed, and your sins are forgiven.”
  '8':
  - type: text
    content: Then I heard the Lord asking, “Whom should I send as a messenger to this people? Who will go for us?”
  - type: text
    content: I said, “Here I am. Send me.”
  '9':
  - type: text
    content: And he said, “Yes, go, and say to this people,
  - type: text
    content: ‘Listen carefully, but do not understand.
  - type: text
    content: Watch closely, but learn nothing.’
