document_id: ISA.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isaiah’s Cleansing and Call
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: It was in the year King Uzziah died
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'King Uzziah died in 740 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
      marker-yv: yv-n
    - type: text
      text: ' that I saw the Lord. He was sitting on a lofty throne, and the train of his robe filled the Temple. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Harden the hearts of these people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Plug their ears and shut their eyes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That way, they will not see with their eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor hear with their ears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor understand with their hearts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and turn to me for healing.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:9-10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'And he said, “Go and say to this people, / ‘When you hear what I say, you will not understand. / When you see what I do, you will not comprehend.’ / For the hearts of these people are hardened, / and their ears cannot hear, and they have closed their eyes— / so their eyes cannot see, / and their ears cannot hear, / and their hearts cannot understand, / and they cannot turn to me and let me heal them.” '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Matt 13:14-15; Mark 4:12; Luke 8:10; Acts 28:26-27.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I said, “Lord, how long will this go on?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he replied,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Until their towns are empty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their houses are deserted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the whole country is a wasteland;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'until the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sent everyone away,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the entire land of Israel lies deserted.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If even a tenth—a remnant—survive,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will be invaded again and burned.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But as a terebinth or oak tree leaves a stump when it is cut down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so Israel’s stump will be a holy seed.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Attending him were mighty seraphim, each having six wings. With two wings they covered their faces, with two they covered their feet, and with two they flew. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: They were calling out to each other,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Holy, holy, holy is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The whole earth is filled with his glory!”
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Their voices shook the Temple to its foundations, and the entire building was filled with smoke.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I said, “It’s all over! I am doomed, for I am a sinful man. I have filthy lips, and I live among a people with filthy lips. Yet I have seen the King, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then one of the seraphim flew to me with a burning coal he had taken from the altar with a pair of tongs. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He touched my lips with it and said, “See, this coal has touched your lips. Now your guilt is removed, and your sins are forgiven.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I heard the Lord asking, “Whom should I send as a messenger to this people? Who will go for us?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: I said, “Here I am. Send me.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he said, “Yes, go, and say to this people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Listen carefully, but do not understand.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Watch closely, but learn nothing.’
