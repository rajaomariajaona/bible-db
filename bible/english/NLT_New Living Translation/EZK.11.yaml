document_id: EZK.11,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment on Israel’s Leaders
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the Spirit lifted me and brought me to the east gateway of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Temple, where I saw twenty-five prominent men of the city. Among them were Jaazaniah son of Azzur and Pelatiah son of Benaiah, who were leaders among the people.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will be slaughtered all the way to the borders of Israel. I will execute judgment on you, and you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No, this city will not be an iron pot for you, and you will not be like meat safe inside it. I will judge you even to the borders of Israel, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . For you have refused to obey my decrees and regulations; instead, you have copied the standards of the nations around you.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While I was still prophesying, Pelatiah son of Benaiah suddenly died. Then I fell face down on the ground and cried out, “O Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', are you going to kill everyone in Israel?”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hope for Exiled Israel
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then this message came to me from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Son of man, the people still left in Jerusalem are talking about you and your relatives and all the people of Israel who are in exile. They are saying, ‘Those people are far away from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', so now he has given their land to us!’'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore, tell the exiles, ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Although I have scattered you in the countries of the world, I will be a sanctuary to you during your time in exile. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I, the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', will gather you back from the nations where you have been scattered, and I will give you the land of Israel once again.’'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When the people return to their homeland, they will remove every trace of their vile images and detestable idols. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I will give them singleness of heart and put a new spirit within them. I will take away their stony, stubborn heart and give them a tender, responsive heart,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a heart of flesh.
      marker-yv: yv-n
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Spirit said to me, “Son of man, these are the men who are planning evil and giving wicked counsel in this city. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so they will obey my decrees and regulations. Then they will truly be my people, and I will be their God. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as for those who long for vile images and detestable idols, I will repay them fully for their sins. I, the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Glory Leaves Jerusalem
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the cherubim lifted their wings and rose into the air with their wheels beside them, and the glory of the God of Israel hovered above them. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' went up from the city and stopped above the mountain to the east.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Afterward the Spirit of God carried me back again to Babylonia,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldea.
      marker-yv: yv-n
    - type: text
      text: ' to the people in exile there. And so ended the vision of my visit to Jerusalem. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I told the exiles everything the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had shown me.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They say to the people, ‘Is it not a good time to build houses? This city is like an iron pot. We are safe inside it like meat in a pot.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: This city is the pot, and we are the meat.
      marker-yv: yv-n
    - type: text
      text: '’ '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore, son of man, prophesy against them loudly and clearly.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came upon me, and he told me to say, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to the people of Israel: I know what you are saying, for I know every thought that comes into your minds. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You have murdered many in this city and filled its streets with the dead.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore, this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: This city is an iron pot all right, but the pieces of meat are the victims of your injustice. As for you, I will soon drag you from this pot. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will bring on you the sword of war you so greatly fear, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will drive you out of Jerusalem and hand you over to foreigners, who will carry out my judgments against you. '
