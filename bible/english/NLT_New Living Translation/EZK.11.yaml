document_id: EZK.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment on Israel’s Leaders
  - type: text
    content: 'Then the Spirit lifted me and brought me to the east gateway of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple, where I saw twenty-five prominent men of the city. Among them were Jaazaniah son of Azzur and Pelatiah son of Benaiah, who were leaders among the people.
  '10':
  - type: text
    content: 'You will be slaughtered all the way to the borders of Israel. I will execute judgment on you, and you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'No, this city will not be an iron pot for you, and you will not be like meat safe inside it. I will judge you even to the borders of Israel, '
  '12':
  - type: text
    content: 'and you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: . For you have refused to obey my decrees and regulations; instead, you have copied the standards of the nations around you.”
  '13':
  - type: text
    content: 'While I was still prophesying, Pelatiah son of Benaiah suddenly died. Then I fell face down on the ground and cried out, “O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', are you going to kill everyone in Israel?”'
  - type: heading
    content: Hope for Exiled Israel
  '14':
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '15':
  - type: text
    content: '“Son of man, the people still left in Jerusalem are talking about you and your relatives and all the people of Israel who are in exile. They are saying, ‘Those people are far away from the '
  - type: text
    content: Lord
  - type: text
    content: ', so now he has given their land to us!’'
  '16':
  - type: text
    content: '“Therefore, tell the exiles, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Although I have scattered you in the countries of the world, I will be a sanctuary to you during your time in exile. '
  '17':
  - type: text
    content: 'I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', will gather you back from the nations where you have been scattered, and I will give you the land of Israel once again.’'
  '18':
  - type: text
    content: '“When the people return to their homeland, they will remove every trace of their vile images and detestable idols. '
  '19':
  - type: text
    content: And I will give them singleness of heart and put a new spirit within them. I will take away their stony, stubborn heart and give them a tender, responsive heart,
  - type: note
    content: Hebrew a heart of flesh.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'The Spirit said to me, “Son of man, these are the men who are planning evil and giving wicked counsel in this city. '
  '20':
  - type: text
    content: 'so they will obey my decrees and regulations. Then they will truly be my people, and I will be their God. '
  '21':
  - type: text
    content: 'But as for those who long for vile images and detestable idols, I will repay them fully for their sins. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  - type: heading
    content: The Lord’s Glory Leaves Jerusalem
  '22':
  - type: text
    content: 'Then the cherubim lifted their wings and rose into the air with their wheels beside them, and the glory of the God of Israel hovered above them. '
  '23':
  - type: text
    content: 'Then the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' went up from the city and stopped above the mountain to the east.'
  '24':
  - type: text
    content: Afterward the Spirit of God carried me back again to Babylonia,
  - type: note
    content: Or Chaldea.
  - type: text
    content: ' to the people in exile there. And so ended the vision of my visit to Jerusalem. '
  '25':
  - type: text
    content: 'And I told the exiles everything the '
  - type: text
    content: Lord
  - type: text
    content: ' had shown me.'
  '3':
  - type: text
    content: They say to the people, ‘Is it not a good time to build houses? This city is like an iron pot. We are safe inside it like meat in a pot.
  - type: note
    content: Hebrew This city is the pot, and we are the meat.
  - type: text
    content: '’ '
  '4':
  - type: text
    content: Therefore, son of man, prophesy against them loudly and clearly.”
  '5':
  - type: text
    content: 'Then the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' came upon me, and he told me to say, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to the people of Israel: I know what you are saying, for I know every thought that comes into your minds. '
  '6':
  - type: text
    content: You have murdered many in this city and filled its streets with the dead.
  '7':
  - type: text
    content: '“Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: This city is an iron pot all right, but the pieces of meat are the victims of your injustice. As for you, I will soon drag you from this pot. '
  '8':
  - type: text
    content: 'I will bring on you the sword of war you so greatly fear, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'I will drive you out of Jerusalem and hand you over to foreigners, who will carry out my judgments against you. '
