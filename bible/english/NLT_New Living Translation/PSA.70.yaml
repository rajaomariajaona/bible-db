document_id: PSA.70,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David, asking God to remember him.'
  - type: text
    content: Please, God, rescue me!
  - type: text
    content: 'Come quickly, '
  - type: text
    content: Lord
  - type: text
    content: ', and help me.'
  '2':
  - type: text
    content: May those who try to kill me
  - type: text
    content: be humiliated and put to shame.
  - type: text
    content: May those who take delight in my trouble
  - type: text
    content: be turned back in disgrace.
  '3':
  - type: text
    content: Let them be horrified by their shame,
  - type: text
    content: for they said, “Aha! We’ve got him now!”
  '4':
  - type: text
    content: But may all who search for you
  - type: text
    content: be filled with joy and gladness in you.
  - type: text
    content: May those who love your salvation
  - type: text
    content: repeatedly shout, “God is great!”
  '5':
  - type: text
    content: But as for me, I am poor and needy;
  - type: text
    content: please hurry to my aid, O God.
  - type: text
    content: You are my helper and my savior;
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', do not delay.'
