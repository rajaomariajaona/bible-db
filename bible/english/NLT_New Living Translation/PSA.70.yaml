document_id: PSA.70
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of David, asking God to remember him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Please, God, rescue me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Come quickly, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and help me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: May those who try to kill me
- type: usfm
  marker: q2
  children:
  - type: text
    text: be humiliated and put to shame.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May those who take delight in my trouble
- type: usfm
  marker: q2
  children:
  - type: text
    text: be turned back in disgrace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Let them be horrified by their shame,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they said, “Aha! We’ve got him now!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But may all who search for you
- type: usfm
  marker: q2
  children:
  - type: text
    text: be filled with joy and gladness in you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May those who love your salvation
- type: usfm
  marker: q2
  children:
  - type: text
    text: repeatedly shout, “God is great!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But as for me, I am poor and needy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: please hurry to my aid, O God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are my helper and my savior;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', do not delay.'
