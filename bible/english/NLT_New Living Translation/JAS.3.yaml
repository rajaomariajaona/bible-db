document_id: JAS.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Controlling the Tongue
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 3:10.
      marker-yv: yv-n
    - type: text
      text: ' not many of you should become teachers in the church, for we who teach will be judged more strictly. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so blessing and cursing come pouring out of the same mouth. Surely, my brothers and sisters, this is not right! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Does a spring of water bubble out with both fresh water and bitter water? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Does a fig tree produce olives, or a grapevine produce figs? No, and you can’t draw fresh water from a salty spring.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from salt.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: True Wisdom Comes from God
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'If you are wise and understand God’s ways, prove it by living an honorable life, doing good works with the humility that comes from wisdom. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But if you are bitterly jealous and there is selfish ambition in your heart, don’t cover up the truth with boasting and lying. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For jealousy and selfishness are not God’s kind of wisdom. Such things are earthly, unspiritual, and demonic. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For wherever there is jealousy and selfish ambition, there you will find disorder and evil of every kind.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the wisdom from above is first of all pure. It is also peace loving, gentle at all times, and willing to yield to others. It is full of mercy and the fruit of good deeds. It shows no favoritism and is always sincere. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And those who are peacemakers will plant seeds of peace and reap a harvest of righteousness.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of good things, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of justice.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Indeed, we all make many mistakes. For if we could control our tongues, we would be perfect and could also control ourselves in every other way.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We can make a large horse go wherever we want by means of a small bit in its mouth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And a small rudder makes a huge ship turn wherever the pilot chooses to go, even though the winds are strong. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the same way, the tongue is a small thing that makes grand speeches.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But a tiny spark can set a great forest on fire. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And among all the parts of the body, the tongue is a flame of fire. It is a whole world of wickedness, corrupting your entire body. It can set your whole life on fire, for it is set on fire by hell itself.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'for it will burn in hell '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Gehenna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'People can tame all kinds of animals, birds, reptiles, and fish, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but no one can tame the tongue. It is restless and evil, full of deadly poison. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sometimes it praises our Lord and Father, and sometimes it curses those who have been made in the image of God. '
