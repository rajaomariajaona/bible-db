document_id: JAS.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Controlling the Tongue
  - type: text
    content: Dear brothers and sisters,
  - type: note
    content: Greek brothers; also in 3:10.
  - type: text
    content: ' not many of you should become teachers in the church, for we who teach will be judged more strictly. '
  '10':
  - type: text
    content: 'And so blessing and cursing come pouring out of the same mouth. Surely, my brothers and sisters, this is not right! '
  '11':
  - type: text
    content: 'Does a spring of water bubble out with both fresh water and bitter water? '
  '12':
  - type: text
    content: Does a fig tree produce olives, or a grapevine produce figs? No, and you can’t draw fresh water from a salty spring.
  - type: note
    content: Greek from salt.
  - type: heading
    content: True Wisdom Comes from God
  '13':
  - type: text
    content: 'If you are wise and understand God’s ways, prove it by living an honorable life, doing good works with the humility that comes from wisdom. '
  '14':
  - type: text
    content: 'But if you are bitterly jealous and there is selfish ambition in your heart, don’t cover up the truth with boasting and lying. '
  '15':
  - type: text
    content: 'For jealousy and selfishness are not God’s kind of wisdom. Such things are earthly, unspiritual, and demonic. '
  '16':
  - type: text
    content: For wherever there is jealousy and selfish ambition, there you will find disorder and evil of every kind.
  '17':
  - type: text
    content: 'But the wisdom from above is first of all pure. It is also peace loving, gentle at all times, and willing to yield to others. It is full of mercy and the fruit of good deeds. It shows no favoritism and is always sincere. '
  '18':
  - type: text
    content: And those who are peacemakers will plant seeds of peace and reap a harvest of righteousness.
  - type: note
    content: Or of good things, or of justice.
  '2':
  - type: text
    content: Indeed, we all make many mistakes. For if we could control our tongues, we would be perfect and could also control ourselves in every other way.
  '3':
  - type: text
    content: 'We can make a large horse go wherever we want by means of a small bit in its mouth. '
  '4':
  - type: text
    content: 'And a small rudder makes a huge ship turn wherever the pilot chooses to go, even though the winds are strong. '
  '5':
  - type: text
    content: In the same way, the tongue is a small thing that makes grand speeches.
  - type: text
    content: 'But a tiny spark can set a great forest on fire. '
  '6':
  - type: text
    content: And among all the parts of the body, the tongue is a flame of fire. It is a whole world of wickedness, corrupting your entire body. It can set your whole life on fire, for it is set on fire by hell itself.
  - type: note
    content: Or for it will burn in hell (Greek Gehenna).
  '7':
  - type: text
    content: 'People can tame all kinds of animals, birds, reptiles, and fish, '
  '8':
  - type: text
    content: 'but no one can tame the tongue. It is restless and evil, full of deadly poison. '
  '9':
  - type: text
    content: 'Sometimes it praises our Lord and Father, and sometimes it curses those who have been made in the image of God. '
