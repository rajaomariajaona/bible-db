document_id: EZK.43,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Glory Returns
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After this, the man brought me back around to the east gateway. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“Son of man, describe to the people of Israel the Temple I have shown you, so they will be ashamed of all their sins. Let them study its plan, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: and they will be ashamed
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: if they are ashamed.
      marker-yv: yv-n
    - type: text
      text: ' of what they have done. Describe to them all the specifications of the Temple—including its entrances and exits—and everything else about it. Tell them about its decrees and laws. Write down all these specifications and decrees as they watch so they will be sure to remember and follow them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And this is the basic law of the Temple: absolute holiness! The entire top of the mountain where the Temple is built is holy. Yes, this is the basic law of the Temple.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Altar
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “These are the measurements of the altar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:13a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'measurements of the altar in long cubits, each being a cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[18 inches or 45 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and a handbreadth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[3 inches or 8 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in length.
      marker-yv: yv-n
    - type: text
      text: ': There is a gutter all around the altar 21 inches deep and 21 inches wide,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:13b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[53 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: deep and a cubit wide.
      marker-yv: yv-n
    - type: text
      text: ' with a curb 9 inches'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:13c '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 span '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[23 centimeters].'
      marker-yv: yv-n
    - type: text
      text: ' wide around its edge. And this is the height'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:13d '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: base.
      marker-yv: yv-n
    - type: text
      text: ' of the altar: '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: From the gutter the altar rises 3-1/2 feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:14a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[1.1 meters].'
      marker-yv: yv-n
    - type: text
      text: ' to a lower ledge that surrounds the altar and is 21 inches'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:14b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[53 centimeters]; also in 43:14d.'
      marker-yv: yv-n
    - type: text
      text: ' wide. From the lower ledge the altar rises 7 feet'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:14c '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '4 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.1 meters]; also in 43:15.'
      marker-yv: yv-n
    - type: text
      text: ' to the upper ledge that is also 21 inches wide. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The top of the altar, the hearth, rises another 7 feet higher, with a horn rising up from each of the four corners. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The top of the altar is square, measuring 21 feet by 21 feet.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '12 [cubits] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[6.4 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: long and 12 [cubits] wide.
      marker-yv: yv-n
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The upper ledge also forms a square, measuring 24-1/2 feet by 24-1/2 feet,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:17a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '14 [cubits] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[7.4 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: long and 14 [cubits] wide.
      marker-yv: yv-n
    - type: text
      text: ' with a 21-inch gutter and a 10-1/2-inch curb'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:17b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a gutter of 1 cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[53 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and a curb of 1/2 a cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[27 centimeters].'
      marker-yv: yv-n
    - type: text
      text: ' all around the edge. There are steps going up the east side of the altar.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then he said to me, “Son of man, this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: These will be the regulations for the burning of offerings and the sprinkling of blood when the altar is built. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'At that time, the Levitical priests of the family of Zadok, who minister before me, are to be given a young bull for a sin offering, says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Suddenly, the glory of the God of Israel appeared from the east. The sound of his coming was like the roar of rushing waters, and the whole landscape shone with his glory. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'You will take some of its blood and smear it on the four horns of the altar, the four corners of the upper ledge, and the curb that runs around that ledge. This will cleanse and make atonement for the altar. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then take the young bull for the sin offering and burn it at the appointed place outside the Temple area.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“On the second day, sacrifice as a sin offering a young male goat that has no physical defects. Then cleanse and make atonement for the altar again, just as you did with the young bull. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'When you have finished the cleansing ceremony, offer another young bull that has no defects and a perfect ram from the flock. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'You are to present them to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the priests are to sprinkle salt on them and offer them as a burnt offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“Every day for seven days a male goat, a young bull, and a ram from the flock will be sacrificed as a sin offering. None of these animals may have physical defects of any kind. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Do this each day for seven days to cleanse and make atonement for the altar, thus setting it apart for holy use. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'On the eighth day, and on each day afterward, the priests will sacrifice on the altar the burnt offerings and peace offerings of the people. Then I will accept you. I, the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!”'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: This vision was just like the others I had seen, first by the Kebar River and then when he came
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts and Latin Vulgate; Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: I came.
      marker-yv: yv-n
    - type: text
      text: ' to destroy Jerusalem. I fell face down on the ground. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came into the Temple through the east gateway.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then the Spirit took me up and brought me into the inner courtyard, and the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' filled the Temple. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And I heard someone speaking to me from within the Temple, while the man who had been measuring stood beside me. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Son of man, this is the place of my throne and the place where I will rest my feet. I will live here forever among the people of Israel. They and their kings will not defile my holy name any longer by their adulterous worship of other gods or by honoring the relics of their kings who have died.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: kings on their high places.
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'They put their idol altars right next to mine with only a wall between them and me. They defiled my holy name by such detestable sin, so I consumed them in my anger. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Now let them stop worshiping other gods and honoring the relics of their kings, and I will live among them forever.
