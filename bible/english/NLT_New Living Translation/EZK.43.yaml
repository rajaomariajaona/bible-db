document_id: EZK.43,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Glory Returns
  - type: text
    content: 'After this, the man brought me back around to the east gateway. '
  '10':
  - type: text
    content: '“Son of man, describe to the people of Israel the Temple I have shown you, so they will be ashamed of all their sins. Let them study its plan, '
  '11':
  - type: text
    content: and they will be ashamed
  - type: note
    content: As in Greek version; Hebrew reads if they are ashamed.
  - type: text
    content: ' of what they have done. Describe to them all the specifications of the Temple—including its entrances and exits—and everything else about it. Tell them about its decrees and laws. Write down all these specifications and decrees as they watch so they will be sure to remember and follow them. '
  '12':
  - type: text
    content: 'And this is the basic law of the Temple: absolute holiness! The entire top of the mountain where the Temple is built is holy. Yes, this is the basic law of the Temple.'
  - type: heading
    content: The Altar
  '13':
  - type: text
    content: “These are the measurements of the altar
  - type: note
    content: Hebrew measurements of the altar in long cubits, each being a cubit [18 inches or 45 centimeters] and a handbreadth [3 inches or 8 centimeters] in length.
  - type: text
    content: ': There is a gutter all around the altar 21 inches deep and 21 inches wide,'
  - type: note
    content: Hebrew a cubit [53 centimeters] deep and a cubit wide.
  - type: text
    content: ' with a curb 9 inches'
  - type: note
    content: Hebrew 1 span [23 centimeters].
  - type: text
    content: ' wide around its edge. And this is the height'
  - type: note
    content: As in Greek version; Hebrew reads base.
  - type: text
    content: ' of the altar: '
  '14':
  - type: text
    content: From the gutter the altar rises 3-1/2 feet
  - type: note
    content: Hebrew 2 cubits [1.1 meters].
  - type: text
    content: ' to a lower ledge that surrounds the altar and is 21 inches'
  - type: note
    content: Hebrew 1 cubit [53 centimeters]; also in 43:14d.
  - type: text
    content: ' wide. From the lower ledge the altar rises 7 feet'
  - type: note
    content: Hebrew 4 cubits [2.1 meters]; also in 43:15.
  - type: text
    content: ' to the upper ledge that is also 21 inches wide. '
  '15':
  - type: text
    content: 'The top of the altar, the hearth, rises another 7 feet higher, with a horn rising up from each of the four corners. '
  '16':
  - type: text
    content: The top of the altar is square, measuring 21 feet by 21 feet.
  - type: note
    content: Hebrew 12 [cubits] [6.4 meters] long and 12 [cubits] wide.
  - type: text
    content: ' '
  '17':
  - type: text
    content: The upper ledge also forms a square, measuring 24-1/2 feet by 24-1/2 feet,
  - type: note
    content: Hebrew 14 [cubits] [7.4 meters] long and 14 [cubits] wide.
  - type: text
    content: ' with a 21-inch gutter and a 10-1/2-inch curb'
  - type: note
    content: Hebrew a gutter of 1 cubit [53 centimeters] and a curb of 1/2 a cubit [27 centimeters].
  - type: text
    content: ' all around the edge. There are steps going up the east side of the altar.”'
  '18':
  - type: text
    content: 'Then he said to me, “Son of man, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: These will be the regulations for the burning of offerings and the sprinkling of blood when the altar is built. '
  '19':
  - type: text
    content: 'At that time, the Levitical priests of the family of Zadok, who minister before me, are to be given a young bull for a sin offering, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Suddenly, the glory of the God of Israel appeared from the east. The sound of his coming was like the roar of rushing waters, and the whole landscape shone with his glory. '
  '20':
  - type: text
    content: 'You will take some of its blood and smear it on the four horns of the altar, the four corners of the upper ledge, and the curb that runs around that ledge. This will cleanse and make atonement for the altar. '
  '21':
  - type: text
    content: Then take the young bull for the sin offering and burn it at the appointed place outside the Temple area.
  '22':
  - type: text
    content: '“On the second day, sacrifice as a sin offering a young male goat that has no physical defects. Then cleanse and make atonement for the altar again, just as you did with the young bull. '
  '23':
  - type: text
    content: 'When you have finished the cleansing ceremony, offer another young bull that has no defects and a perfect ram from the flock. '
  '24':
  - type: text
    content: 'You are to present them to the '
  - type: text
    content: Lord
  - type: text
    content: ', and the priests are to sprinkle salt on them and offer them as a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '25':
  - type: text
    content: '“Every day for seven days a male goat, a young bull, and a ram from the flock will be sacrificed as a sin offering. None of these animals may have physical defects of any kind. '
  '26':
  - type: text
    content: 'Do this each day for seven days to cleanse and make atonement for the altar, thus setting it apart for holy use. '
  '27':
  - type: text
    content: 'On the eighth day, and on each day afterward, the priests will sacrifice on the altar the burnt offerings and peace offerings of the people. Then I will accept you. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '3':
  - type: text
    content: This vision was just like the others I had seen, first by the Kebar River and then when he came
  - type: note
    content: As in some Hebrew manuscripts and Latin Vulgate; Masoretic Text reads I came.
  - type: text
    content: ' to destroy Jerusalem. I fell face down on the ground. '
  '4':
  - type: text
    content: 'And the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' came into the Temple through the east gateway.'
  '5':
  - type: text
    content: 'Then the Spirit took me up and brought me into the inner courtyard, and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the Temple. '
  '6':
  - type: text
    content: 'And I heard someone speaking to me from within the Temple, while the man who had been measuring stood beside me. '
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Son of man, this is the place of my throne and the place where I will rest my feet. I will live here forever among the people of Israel. They and their kings will not defile my holy name any longer by their adulterous worship of other gods or by honoring the relics of their kings who have died.'
  - type: note
    content: Or kings on their high places.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'They put their idol altars right next to mine with only a wall between them and me. They defiled my holy name by such detestable sin, so I consumed them in my anger. '
  '9':
  - type: text
    content: Now let them stop worshiping other gods and honoring the relics of their kings, and I will live among them forever.
