document_id: JER.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “If a man divorces a woman
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and she goes and marries someone else,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will not take her back again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for that would surely corrupt the land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you have prostituted yourself with many lovers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so why are you trying to come back to me?”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But despite all this, her faithless sister Judah has never sincerely returned to me. She has only pretended to be sorry. I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hope for Wayward Israel
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Even faithless Israel is less guilty than treacherous Judah! '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Therefore, go and give this message to Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toward the north.
      marker-yv: yv-n
    - type: text
      text: ' This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “O Israel, my faithless people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come home to me again,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I am merciful.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not be angry with you forever.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Only acknowledge your guilt.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Admit that you rebelled against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and committed adultery against him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by worshiping idols under every green tree.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Confess that you refused to listen to my voice.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Return home, you wayward children,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “for I am your master.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring you back to the land of Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to Zion.
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one from this town and two from that family—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from wherever you are scattered.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And I will give you shepherds after my own heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who will guide you with knowledge and understanding.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“And when your land is once more filled with people,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “you will no longer wish for ‘the good old days’ when you possessed the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Covenant. You will not miss those days or even remember them, and there will be no need to rebuild the Ark. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'In that day Jerusalem will be known as ‘The Throne of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.’ All nations will come there to honor the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. They will no longer stubbornly follow their own evil desires. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: In those days the people of Judah and Israel will return together from exile in the north. They will return to the land I gave your ancestors as an inheritance forever.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “I thought to myself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘I would love to treat you as my own children!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I wanted nothing more than to give you this beautiful land—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the finest possession in the world.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I looked forward to your calling me ‘Father,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I wanted you never to turn from me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Look at the shrines on every hilltop.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is there any place you have not been defiled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by your adultery with other gods?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You sit like a prostitute beside the road waiting for a customer.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You sit alone like a nomad in the desert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have polluted the land with your prostitution
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your wickedness.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: But you have been unfaithful to me, you people of Israel!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have been like a faithless wife who leaves her husband.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken.”'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Voices are heard high on the windswept mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the weeping and pleading of Israel’s people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they have chosen crooked paths
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and have forgotten the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“My wayward children,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “come back to me, and I will heal your wayward hearts.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yes, we’re coming,” the people reply,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“for you are the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Our worship of idols on the hills
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and our religious orgies on the mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are a delusion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Only in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will Israel ever find salvation.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: From childhood we have watched
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as everything our ancestors worked for—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their flocks and herds, their sons and daughters—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: was squandered on a delusion.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Let us now lie down in shame
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cover ourselves with dishonor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for we and our ancestors have sinned
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From our childhood to this day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we have never obeyed him.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: That’s why even the spring rains have failed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For you are a brazen prostitute and completely shameless.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Yet you say to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Father, you have been my guide since my youth.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Surely you won’t be angry forever!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Surely you can forget about it!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So you talk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you keep on doing all the evil you can.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judah Follows Israel’s Example
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'During the reign of King Josiah, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Have you seen what fickle Israel has done? Like a wife who commits adultery, Israel has worshiped other gods on every hill and under every green tree. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I thought, ‘After she has done all this, she will return to me.’ But she did not return, and her faithless sister Judah saw this. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: She saw
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Dead Sea Scrolls, one Greek manuscript, and Syriac version; Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: I saw.
      marker-yv: yv-n
    - type: text
      text: ' that I divorced faithless Israel because of her adultery. But that treacherous sister Judah had no fear, and now she, too, has left me and given herself to prostitution. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Israel treated it all so lightly—she thought nothing of committing adultery by worshiping idols made of wood and stone. So now the land has been polluted. '
