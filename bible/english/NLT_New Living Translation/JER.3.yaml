document_id: JER.3,116
type_code: eng
verses:
  '1':
  - type: text
    content: “If a man divorces a woman
  - type: text
    content: and she goes and marries someone else,
  - type: text
    content: he will not take her back again,
  - type: text
    content: for that would surely corrupt the land.
  - type: text
    content: But you have prostituted yourself with many lovers,
  - type: text
    content: so why are you trying to come back to me?”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '10':
  - type: text
    content: 'But despite all this, her faithless sister Judah has never sincerely returned to me. She has only pretended to be sorry. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  - type: heading
    content: Hope for Wayward Israel
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Even faithless Israel is less guilty than treacherous Judah! '
  '12':
  - type: text
    content: Therefore, go and give this message to Israel.
  - type: note
    content: Hebrew toward the north.
  - type: text
    content: ' This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “O Israel, my faithless people,
  - type: text
    content: come home to me again,
  - type: text
    content: for I am merciful.
  - type: text
    content: I will not be angry with you forever.
  '13':
  - type: text
    content: Only acknowledge your guilt.
  - type: text
    content: 'Admit that you rebelled against the '
  - type: text
    content: Lord
  - type: text
    content: ' your God'
  - type: text
    content: and committed adultery against him
  - type: text
    content: by worshiping idols under every green tree.
  - type: text
    content: Confess that you refused to listen to my voice.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '14':
  - type: text
    content: “Return home, you wayward children,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “for I am your master.
  - type: text
    content: I will bring you back to the land of Israel
  - type: note
    content: Hebrew to Zion.
  - type: text
    content: —
  - type: text
    content: one from this town and two from that family—
  - type: text
    content: from wherever you are scattered.
  '15':
  - type: text
    content: And I will give you shepherds after my own heart,
  - type: text
    content: who will guide you with knowledge and understanding.
  '16':
  - type: text
    content: '“And when your land is once more filled with people,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “you will no longer wish for ‘the good old days’ when you possessed the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Covenant. You will not miss those days or even remember them, and there will be no need to rebuild the Ark. '
  '17':
  - type: text
    content: 'In that day Jerusalem will be known as ‘The Throne of the '
  - type: text
    content: Lord
  - type: text
    content: '.’ All nations will come there to honor the '
  - type: text
    content: Lord
  - type: text
    content: '. They will no longer stubbornly follow their own evil desires. '
  '18':
  - type: text
    content: In those days the people of Judah and Israel will return together from exile in the north. They will return to the land I gave your ancestors as an inheritance forever.
  '19':
  - type: text
    content: “I thought to myself,
  - type: text
    content: ‘I would love to treat you as my own children!’
  - type: text
    content: I wanted nothing more than to give you this beautiful land—
  - type: text
    content: the finest possession in the world.
  - type: text
    content: I looked forward to your calling me ‘Father,’
  - type: text
    content: and I wanted you never to turn from me.
  '2':
  - type: text
    content: “Look at the shrines on every hilltop.
  - type: text
    content: Is there any place you have not been defiled
  - type: text
    content: by your adultery with other gods?
  - type: text
    content: You sit like a prostitute beside the road waiting for a customer.
  - type: text
    content: You sit alone like a nomad in the desert.
  - type: text
    content: You have polluted the land with your prostitution
  - type: text
    content: and your wickedness.
  '20':
  - type: text
    content: But you have been unfaithful to me, you people of Israel!
  - type: text
    content: You have been like a faithless wife who leaves her husband.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken.”'
  '21':
  - type: text
    content: Voices are heard high on the windswept mountains,
  - type: text
    content: the weeping and pleading of Israel’s people.
  - type: text
    content: For they have chosen crooked paths
  - type: text
    content: 'and have forgotten the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.'
  '22':
  - type: text
    content: '“My wayward children,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “come back to me, and I will heal your wayward hearts.”
  - type: text
    content: “Yes, we’re coming,” the people reply,
  - type: text
    content: '“for you are the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.'
  '23':
  - type: text
    content: Our worship of idols on the hills
  - type: text
    content: and our religious orgies on the mountains
  - type: text
    content: are a delusion.
  - type: text
    content: 'Only in the '
  - type: text
    content: Lord
  - type: text
    content: ' our God'
  - type: text
    content: will Israel ever find salvation.
  '24':
  - type: text
    content: From childhood we have watched
  - type: text
    content: as everything our ancestors worked for—
  - type: text
    content: their flocks and herds, their sons and daughters—
  - type: text
    content: was squandered on a delusion.
  '25':
  - type: text
    content: Let us now lie down in shame
  - type: text
    content: and cover ourselves with dishonor,
  - type: text
    content: for we and our ancestors have sinned
  - type: text
    content: 'against the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.'
  - type: text
    content: From our childhood to this day
  - type: text
    content: we have never obeyed him.”
  '3':
  - type: text
    content: That’s why even the spring rains have failed.
  - type: text
    content: For you are a brazen prostitute and completely shameless.
  '4':
  - type: text
    content: Yet you say to me,
  - type: text
    content: ‘Father, you have been my guide since my youth.
  '5':
  - type: text
    content: Surely you won’t be angry forever!
  - type: text
    content: Surely you can forget about it!’
  - type: text
    content: So you talk,
  - type: text
    content: but you keep on doing all the evil you can.”
  - type: heading
    content: Judah Follows Israel’s Example
  '6':
  - type: text
    content: 'During the reign of King Josiah, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Have you seen what fickle Israel has done? Like a wife who commits adultery, Israel has worshiped other gods on every hill and under every green tree. '
  '7':
  - type: text
    content: 'I thought, ‘After she has done all this, she will return to me.’ But she did not return, and her faithless sister Judah saw this. '
  '8':
  - type: text
    content: She saw
  - type: note
    content: As in Dead Sea Scrolls, one Greek manuscript, and Syriac version; Masoretic Text reads I saw.
  - type: text
    content: ' that I divorced faithless Israel because of her adultery. But that treacherous sister Judah had no fear, and now she, too, has left me and given herself to prostitution. '
  '9':
  - type: text
    content: 'Israel treated it all so lightly—she thought nothing of committing adultery by worshiping idols made of wood and stone. So now the land has been polluted. '
