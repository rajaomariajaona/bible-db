document_id: PSA.144,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who is my rock.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He trains my hands for war
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gives my fingers skill for battle.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you grant victory to kings!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You rescued your servant David from the fatal sword.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save me!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rescue me from the power of my enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their mouths are full of lies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they swear to tell the truth, but they lie instead.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May our sons flourish in their youth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like well-nurtured plants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May our daughters be like graceful pillars,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: carved to beautify a palace.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May our barns be filled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with crops of every kind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the flocks in our fields multiply by the thousands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even tens of thousands,
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and may our oxen be loaded down with produce.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May there be no enemy breaking through our walls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no going into captivity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no cries of alarm in our town squares.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, joyful are those who live like this!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Joyful indeed are those whose God is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is my loving ally and my fortress,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my tower of safety, my rescuer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is my shield, and I take refuge in him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He makes the nations
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '144:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: my people.
      marker-yv: yv-n
    - type: text
      text: ' submit to me.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', what are human beings that you should notice them,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mere mortals that you should think about them?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they are like a breath of air;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their days are like a passing shadow.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Open the heavens, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and come down.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Touch the mountains so they billow smoke.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hurl your lightning bolts and scatter your enemies!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shoot your arrows and confuse them!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reach down from heaven and rescue me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rescue me from deep waters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the power of my enemies.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their mouths are full of lies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they swear to tell the truth, but they lie instead.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing a new song to you, O God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing your praises with a ten-stringed harp.
