document_id: PSA.144,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', who is my rock.'
  - type: text
    content: He trains my hands for war
  - type: text
    content: and gives my fingers skill for battle.
  '10':
  - type: text
    content: For you grant victory to kings!
  - type: text
    content: You rescued your servant David from the fatal sword.
  '11':
  - type: text
    content: Save me!
  - type: text
    content: Rescue me from the power of my enemies.
  - type: text
    content: Their mouths are full of lies;
  - type: text
    content: they swear to tell the truth, but they lie instead.
  '12':
  - type: text
    content: May our sons flourish in their youth
  - type: text
    content: like well-nurtured plants.
  - type: text
    content: May our daughters be like graceful pillars,
  - type: text
    content: carved to beautify a palace.
  '13':
  - type: text
    content: May our barns be filled
  - type: text
    content: with crops of every kind.
  - type: text
    content: May the flocks in our fields multiply by the thousands,
  - type: text
    content: even tens of thousands,
  '14':
  - type: text
    content: and may our oxen be loaded down with produce.
  - type: text
    content: May there be no enemy breaking through our walls,
  - type: text
    content: no going into captivity,
  - type: text
    content: no cries of alarm in our town squares.
  '15':
  - type: text
    content: Yes, joyful are those who live like this!
  - type: text
    content: 'Joyful indeed are those whose God is the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: He is my loving ally and my fortress,
  - type: text
    content: my tower of safety, my rescuer.
  - type: text
    content: He is my shield, and I take refuge in him.
  - type: text
    content: He makes the nations
  - type: note
    content: Some manuscripts read my people.
  - type: text
    content: ' submit to me.'
  '3':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', what are human beings that you should notice them,'
  - type: text
    content: mere mortals that you should think about them?
  '4':
  - type: text
    content: For they are like a breath of air;
  - type: text
    content: their days are like a passing shadow.
  '5':
  - type: text
    content: 'Open the heavens, '
  - type: text
    content: Lord
  - type: text
    content: ', and come down.'
  - type: text
    content: Touch the mountains so they billow smoke.
  '6':
  - type: text
    content: Hurl your lightning bolts and scatter your enemies!
  - type: text
    content: Shoot your arrows and confuse them!
  '7':
  - type: text
    content: Reach down from heaven and rescue me;
  - type: text
    content: rescue me from deep waters,
  - type: text
    content: from the power of my enemies.
  '8':
  - type: text
    content: Their mouths are full of lies;
  - type: text
    content: they swear to tell the truth, but they lie instead.
  '9':
  - type: text
    content: I will sing a new song to you, O God!
  - type: text
    content: I will sing your praises with a ten-stringed harp.
