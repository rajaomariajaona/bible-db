document_id: ISA.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message about Egypt
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This message came to me concerning Egypt:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Look! The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is advancing against Egypt,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: riding on a swift cloud.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The idols of Egypt tremble.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The hearts of the Egyptians melt with fear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I will make Egyptian fight against Egyptian—
- type: usfm
  marker: q2
  children:
  - type: text
    text: brother against brother,
- type: usfm
  marker: q1
  children:
  - type: text
    text: neighbor against neighbor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: city against city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: province against province.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The Egyptians will lose heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will confuse their plans.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will plead with their idols for wisdom
- type: usfm
  marker: q2
  children:
  - type: text
    text: and call on spirits, mediums, and those who consult the spirits of the dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will hand Egypt over
- type: usfm
  marker: q2
  children:
  - type: text
    text: to a hard, cruel master.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A fierce king will rule them,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The waters of the Nile will fail to rise and flood the fields.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The riverbed will be parched and dry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The canals of the Nile will dry up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the streams of Egypt will stink
- type: usfm
  marker: q2
  children:
  - type: text
    text: with rotting reeds and rushes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All the greenery along the riverbank
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the crops along the river
- type: usfm
  marker: q2
  children:
  - type: text
    text: will dry up and blow away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The fishermen will lament for lack of work.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Those who cast hooks into the Nile will groan,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who use nets will lose heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: There will be no flax for the harvesters,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no thread for the weavers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They will be in despair,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the workers will be sick at heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: What fools are the officials of Zoan!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their best counsel to the king of Egypt is stupid and wrong.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will they still boast to Pharaoh of their wisdom?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will they dare brag about all their wise ancestors?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Where are your wise counselors, Pharaoh?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let them tell you what God plans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies is going to do to Egypt.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The officials of Zoan are fools,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the officials of Memphis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Noph.
    marker-yv: yv-n
  - type: text
    text: ' are deluded.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The leaders of the people
- type: usfm
  marker: q2
  children:
  - type: text
    text: have led Egypt astray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has sent a spirit of foolishness on them,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: so all their suggestions are wrong.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cause Egypt to stagger
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a drunk in his vomit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: There is nothing Egypt can do.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All are helpless—
- type: usfm
  marker: q1
  children:
  - type: text
    text: the head and the tail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the noble palm branch and the lowly reed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'In that day the Egyptians will be as weak as women. They will cower in fear beneath the upraised fist of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Just to speak the name of Israel will terrorize them, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies has laid out his plans against them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'In that day five of Egypt’s cities will follow the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies. They will even begin to speak Hebrew, the language of Canaan. One of these cities will be Heliopolis, the City of the Sun.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: will be the City of Destruction.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'In that day there will be an altar to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in the heart of Egypt, and there will be a monument to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' at its border. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'It will be a sign and a witness that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies is worshiped in the land of Egypt. When the people cry to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for help against those who oppress them, he will send them a savior who will rescue them. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will make himself known to the Egyptians. Yes, they will know the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and will give their sacrifices and offerings to him. They will make a vow to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and will keep it. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will strike Egypt, and then he will bring healing. For the Egyptians will turn to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and he will listen to their pleas and heal them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'In that day Egypt and Assyria will be connected by a highway. The Egyptians and Assyrians will move freely between their lands, and they will both worship God. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'In that day Israel will be the third, along with Egypt and Assyria, a blessing in the midst of the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies will say, “Blessed be Egypt, my people. Blessed be Assyria, the land I have made. Blessed be Israel, my special possession!”'
