document_id: ISA.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Egypt
  - type: text
    content: 'This message came to me concerning Egypt:'
  - type: text
    content: 'Look! The '
  - type: text
    content: Lord
  - type: text
    content: ' is advancing against Egypt,'
  - type: text
    content: riding on a swift cloud.
  - type: text
    content: The idols of Egypt tremble.
  - type: text
    content: The hearts of the Egyptians melt with fear.
  '10':
  - type: text
    content: They will be in despair,
  - type: text
    content: and all the workers will be sick at heart.
  '11':
  - type: text
    content: What fools are the officials of Zoan!
  - type: text
    content: Their best counsel to the king of Egypt is stupid and wrong.
  - type: text
    content: Will they still boast to Pharaoh of their wisdom?
  - type: text
    content: Will they dare brag about all their wise ancestors?
  '12':
  - type: text
    content: Where are your wise counselors, Pharaoh?
  - type: text
    content: Let them tell you what God plans,
  - type: text
    content: 'what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies is going to do to Egypt.'
  '13':
  - type: text
    content: The officials of Zoan are fools,
  - type: text
    content: and the officials of Memphis
  - type: note
    content: Hebrew Noph.
  - type: text
    content: ' are deluded.'
  - type: text
    content: The leaders of the people
  - type: text
    content: have led Egypt astray.
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has sent a spirit of foolishness on them,'
  - type: text
    content: so all their suggestions are wrong.
  - type: text
    content: They cause Egypt to stagger
  - type: text
    content: like a drunk in his vomit.
  '15':
  - type: text
    content: There is nothing Egypt can do.
  - type: text
    content: All are helpless—
  - type: text
    content: the head and the tail,
  - type: text
    content: the noble palm branch and the lowly reed.
  '16':
  - type: text
    content: 'In that day the Egyptians will be as weak as women. They will cower in fear beneath the upraised fist of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. '
  '17':
  - type: text
    content: 'Just to speak the name of Israel will terrorize them, for the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies has laid out his plans against them.'
  '18':
  - type: text
    content: 'In that day five of Egypt’s cities will follow the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. They will even begin to speak Hebrew, the language of Canaan. One of these cities will be Heliopolis, the City of the Sun.'
  - type: note
    content: Or will be the City of Destruction.
  '19':
  - type: text
    content: 'In that day there will be an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' in the heart of Egypt, and there will be a monument to the '
  - type: text
    content: Lord
  - type: text
    content: ' at its border. '
  '2':
  - type: text
    content: “I will make Egyptian fight against Egyptian—
  - type: text
    content: brother against brother,
  - type: text
    content: neighbor against neighbor,
  - type: text
    content: city against city,
  - type: text
    content: province against province.
  '20':
  - type: text
    content: 'It will be a sign and a witness that the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies is worshiped in the land of Egypt. When the people cry to the '
  - type: text
    content: Lord
  - type: text
    content: ' for help against those who oppress them, he will send them a savior who will rescue them. '
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will make himself known to the Egyptians. Yes, they will know the '
  - type: text
    content: Lord
  - type: text
    content: ' and will give their sacrifices and offerings to him. They will make a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ' and will keep it. '
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will strike Egypt, and then he will bring healing. For the Egyptians will turn to the '
  - type: text
    content: Lord
  - type: text
    content: ', and he will listen to their pleas and heal them.'
  '23':
  - type: text
    content: 'In that day Egypt and Assyria will be connected by a highway. The Egyptians and Assyrians will move freely between their lands, and they will both worship God. '
  '24':
  - type: text
    content: 'In that day Israel will be the third, along with Egypt and Assyria, a blessing in the midst of the earth. '
  '25':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies will say, “Blessed be Egypt, my people. Blessed be Assyria, the land I have made. Blessed be Israel, my special possession!”'
  '3':
  - type: text
    content: The Egyptians will lose heart,
  - type: text
    content: and I will confuse their plans.
  - type: text
    content: They will plead with their idols for wisdom
  - type: text
    content: and call on spirits, mediums, and those who consult the spirits of the dead.
  '4':
  - type: text
    content: I will hand Egypt over
  - type: text
    content: to a hard, cruel master.
  - type: text
    content: A fierce king will rule them,”
  - type: text
    content: 'says the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '5':
  - type: text
    content: The waters of the Nile will fail to rise and flood the fields.
  - type: text
    content: The riverbed will be parched and dry.
  '6':
  - type: text
    content: The canals of the Nile will dry up,
  - type: text
    content: and the streams of Egypt will stink
  - type: text
    content: with rotting reeds and rushes.
  '7':
  - type: text
    content: All the greenery along the riverbank
  - type: text
    content: and all the crops along the river
  - type: text
    content: will dry up and blow away.
  '8':
  - type: text
    content: The fishermen will lament for lack of work.
  - type: text
    content: Those who cast hooks into the Nile will groan,
  - type: text
    content: and those who use nets will lose heart.
  '9':
  - type: text
    content: There will be no flax for the harvesters,
  - type: text
    content: no thread for the weavers.
