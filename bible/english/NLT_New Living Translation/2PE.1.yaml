document_id: 2PE.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings from Peter
  - type: text
    content: This letter is from Simon
  - type: note
    content: Greek Simeon.
  - type: text
    content: ' Peter, a slave and apostle of Jesus Christ.'
  - type: text
    content: I am writing to you who share the same precious faith we have. This faith was given to you because of the justice and fairness
  - type: note
    content: Or to you in the righteousness.
  - type: text
    content: ' of Jesus Christ, our God and Savior.'
  '10':
  - type: text
    content: So, dear brothers and sisters,
  - type: note
    content: Greek brothers.
  - type: text
    content: ' work hard to prove that you really are among those God has called and chosen. Do these things, and you will never fall away. '
  '11':
  - type: text
    content: Then God will give you a grand entrance into the eternal Kingdom of our Lord and Savior Jesus Christ.
  - type: heading
    content: Paying Attention to Scripture
  '12':
  - type: text
    content: 'Therefore, I will always remind you about these things—even though you already know them and are standing firm in the truth you have been taught. '
  '13':
  - type: text
    content: And it is only right that I should keep on reminding you as long as I live.
  - type: note
    content: Greek as long as I am in this tent [or tabernacle].
  - type: text
    content: ' '
  '14':
  - type: text
    content: For our Lord Jesus Christ has shown me that I must soon leave this earthly life,
  - type: note
    content: Greek I must soon put off my tent [or tabernacle].
  - type: text
    content: ' '
  '15':
  - type: text
    content: so I will work hard to make sure you always remember these things after I am gone.
  '16':
  - type: text
    content: 'For we were not making up clever stories when we told you about the powerful coming of our Lord Jesus Christ. We saw his majestic splendor with our own eyes '
  '17':
  - type: text
    content: when he received honor and glory from God the Father. The voice from the majestic glory of God said to him, “This is my dearly loved Son, who brings me great joy.”
  - type: note
    content: Matt 17:5; Mark 9:7; Luke 9:35.
  - type: text
    content: ' '
  '18':
  - type: text
    content: We ourselves heard that voice from heaven when we were with him on the holy mountain.
  '19':
  - type: text
    content: Because of that experience, we have even greater confidence in the message proclaimed by the prophets. You must pay close attention to what they wrote, for their words are like a lamp shining in a dark place—until the Day dawns, and Christ the Morning Star shines
  - type: note
    content: Or rises.
  - type: text
    content: ' in your hearts. '
  '2':
  - type: text
    content: May God give you more and more grace and peace as you grow in your knowledge of God and Jesus our Lord.
  - type: heading
    content: Growing in Faith
  '20':
  - type: text
    content: Above all, you must realize that no prophecy in Scripture ever came from the prophet’s own understanding,
  - type: note
    content: Or is a matter of one’s own interpretation.
  - type: text
    content: ' '
  '21':
  - type: text
    content: or from human initiative. No, those prophets were moved by the Holy Spirit, and they spoke from God.
  '3':
  - type: text
    content: 'By his divine power, God has given us everything we need for living a godly life. We have received all of this by coming to know him, the one who called us to himself by means of his marvelous glory and excellence. '
  '4':
  - type: text
    content: And because of his glory and excellence, he has given us great and precious promises. These are the promises that enable you to share his divine nature and escape the world’s corruption caused by human desires.
  '5':
  - type: text
    content: 'In view of all this, make every effort to respond to God’s promises. Supplement your faith with a generous provision of moral excellence, and moral excellence with knowledge, '
  '6':
  - type: text
    content: 'and knowledge with self-control, and self-control with patient endurance, and patient endurance with godliness, '
  '7':
  - type: text
    content: and godliness with brotherly affection, and brotherly affection with love for everyone.
  '8':
  - type: text
    content: 'The more you grow like this, the more productive and useful you will be in your knowledge of our Lord Jesus Christ. '
  '9':
  - type: text
    content: But those who fail to develop in this way are shortsighted or blind, forgetting that they have been cleansed from their old sins.
