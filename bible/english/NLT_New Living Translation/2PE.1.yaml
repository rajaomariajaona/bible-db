document_id: 2PE.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greetings from Peter
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: This letter is from Simon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Simeon.
    marker-yv: yv-n
  - type: text
    text: ' Peter, a slave and apostle of Jesus Christ.'
- type: usfm
  marker: p
  children:
  - type: text
    text: I am writing to you who share the same precious faith we have. This faith was given to you because of the justice and fairness
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to you in the righteousness.
    marker-yv: yv-n
  - type: text
    text: ' of Jesus Christ, our God and Savior.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: May God give you more and more grace and peace as you grow in your knowledge of God and Jesus our Lord.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Growing in Faith
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'By his divine power, God has given us everything we need for living a godly life. We have received all of this by coming to know him, the one who called us to himself by means of his marvelous glory and excellence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And because of his glory and excellence, he has given us great and precious promises. These are the promises that enable you to share his divine nature and escape the world’s corruption caused by human desires.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'In view of all this, make every effort to respond to God’s promises. Supplement your faith with a generous provision of moral excellence, and moral excellence with knowledge, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and knowledge with self-control, and self-control with patient endurance, and patient endurance with godliness, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: and godliness with brotherly affection, and brotherly affection with love for everyone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The more you grow like this, the more productive and useful you will be in your knowledge of our Lord Jesus Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But those who fail to develop in this way are shortsighted or blind, forgetting that they have been cleansed from their old sins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So, dear brothers and sisters,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: brothers.
    marker-yv: yv-n
  - type: text
    text: ' work hard to prove that you really are among those God has called and chosen. Do these things, and you will never fall away. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then God will give you a grand entrance into the eternal Kingdom of our Lord and Savior Jesus Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paying Attention to Scripture
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Therefore, I will always remind you about these things—even though you already know them and are standing firm in the truth you have been taught. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And it is only right that I should keep on reminding you as long as I live.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'as long as I am in this tent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tabernacle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '].'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For our Lord Jesus Christ has shown me that I must soon leave this earthly life,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'I must soon put off my tent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tabernacle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '].'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: so I will work hard to make sure you always remember these things after I am gone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For we were not making up clever stories when we told you about the powerful coming of our Lord Jesus Christ. We saw his majestic splendor with our own eyes '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: when he received honor and glory from God the Father. The voice from the majestic glory of God said to him, “This is my dearly loved Son, who brings me great joy.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Matt 17:5; Mark 9:7; Luke 9:35.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: We ourselves heard that voice from heaven when we were with him on the holy mountain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Because of that experience, we have even greater confidence in the message proclaimed by the prophets. You must pay close attention to what they wrote, for their words are like a lamp shining in a dark place—until the Day dawns, and Christ the Morning Star shines
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rises.
    marker-yv: yv-n
  - type: text
    text: ' in your hearts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Above all, you must realize that no prophecy in Scripture ever came from the prophet’s own understanding,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: is a matter of one’s own interpretation.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: or from human initiative. No, those prophets were moved by the Holy Spirit, and they spoke from God.
