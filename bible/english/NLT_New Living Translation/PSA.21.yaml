document_id: PSA.21,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'How the king rejoices in your strength, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shouts with joy because you give him victory.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: You will wipe their children from the face of the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will never have descendants.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Although they plot against you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their evil schemes will never succeed.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: For they will turn and run
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they see your arrows aimed at them.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Rise up, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', in all your power.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With music and singing we celebrate your mighty acts.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: For you have given him his heart’s desire;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'you have withheld nothing he requested. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: You welcomed him back with success and prosperity.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You placed a crown of finest gold on his head.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He asked you to preserve his life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you granted his request.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The days of his life stretch on forever.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Your victory brings him great honor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you have clothed him with splendor and majesty.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You have endowed him with eternal blessings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and given him the joy of your presence.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For the king trusts in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The unfailing love of the Most High will keep him from stumbling.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: You will capture all your enemies.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your strong right hand will seize all who hate you.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You will throw them in a flaming furnace
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you appear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will consume them in his anger;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fire will devour them.
