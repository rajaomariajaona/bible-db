document_id: PSA.21,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David.'
  - type: text
    content: 'How the king rejoices in your strength, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: He shouts with joy because you give him victory.
  '10':
  - type: text
    content: You will wipe their children from the face of the earth;
  - type: text
    content: they will never have descendants.
  '11':
  - type: text
    content: Although they plot against you,
  - type: text
    content: their evil schemes will never succeed.
  '12':
  - type: text
    content: For they will turn and run
  - type: text
    content: when they see your arrows aimed at them.
  '13':
  - type: text
    content: 'Rise up, O '
  - type: text
    content: Lord
  - type: text
    content: ', in all your power.'
  - type: text
    content: With music and singing we celebrate your mighty acts.
  '2':
  - type: text
    content: For you have given him his heart’s desire;
  - type: text
    content: 'you have withheld nothing he requested. '
  - type: text
    content: Interlude
  '3':
  - type: text
    content: You welcomed him back with success and prosperity.
  - type: text
    content: You placed a crown of finest gold on his head.
  '4':
  - type: text
    content: He asked you to preserve his life,
  - type: text
    content: and you granted his request.
  - type: text
    content: The days of his life stretch on forever.
  '5':
  - type: text
    content: Your victory brings him great honor,
  - type: text
    content: and you have clothed him with splendor and majesty.
  '6':
  - type: text
    content: You have endowed him with eternal blessings
  - type: text
    content: and given him the joy of your presence.
  '7':
  - type: text
    content: 'For the king trusts in the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: The unfailing love of the Most High will keep him from stumbling.
  '8':
  - type: text
    content: You will capture all your enemies.
  - type: text
    content: Your strong right hand will seize all who hate you.
  '9':
  - type: text
    content: You will throw them in a flaming furnace
  - type: text
    content: when you appear.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will consume them in his anger;'
  - type: text
    content: fire will devour them.
