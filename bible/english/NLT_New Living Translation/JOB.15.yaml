document_id: JOB.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Eliphaz’s Second Response to Job
  - type: text
    content: 'Then Eliphaz the Temanite replied:'
  '10':
  - type: text
    content: On our side are aged, gray-haired men
  - type: text
    content: much older than your father!
  '11':
  - type: text
    content: “Is God’s comfort too little for you?
  - type: text
    content: Is his gentle word not enough?
  '12':
  - type: text
    content: What has taken away your reason?
  - type: text
    content: What has weakened your vision,
  - type: note
    content: Or Why do your eyes flash with anger; Hebrew reads Why do your eyes blink.
  '13':
  - type: text
    content: that you turn against God
  - type: text
    content: and say all these evil things?
  '14':
  - type: text
    content: Can any mortal be pure?
  - type: text
    content: Can anyone born of a woman be just?
  '15':
  - type: text
    content: Look, God does not even trust the angels.
  - type: note
    content: Hebrew the holy ones.
  - type: text
    content: Even the heavens are not absolutely pure in his sight.
  '16':
  - type: text
    content: How much less pure is a corrupt and sinful person
  - type: text
    content: with a thirst for wickedness!
  '17':
  - type: text
    content: “If you will listen, I will show you.
  - type: text
    content: I will answer you from my own experience.
  '18':
  - type: text
    content: And it is confirmed by the reports of wise men
  - type: text
    content: who have heard the same thing from their fathers—
  '19':
  - type: text
    content: from those to whom the land was given
  - type: text
    content: long before any foreigners arrived.
  '2':
  - type: text
    content: “A wise man wouldn’t answer with such empty talk!
  - type: text
    content: You are nothing but a windbag.
  '20':
  - type: text
    content: “The wicked writhe in pain throughout their lives.
  - type: text
    content: Years of trouble are stored up for the ruthless.
  '21':
  - type: text
    content: The sound of terror rings in their ears,
  - type: text
    content: and even on good days they fear the attack of the destroyer.
  '22':
  - type: text
    content: They dare not go out into the darkness
  - type: text
    content: for fear they will be murdered.
  '23':
  - type: text
    content: They wander around, saying, ‘Where can I find bread?’
  - type: note
    content: Greek version reads He is appointed to be food for a vulture.
  - type: text
    content: They know their day of destruction is near.
  '24':
  - type: text
    content: That dark day terrifies them.
  - type: text
    content: They live in distress and anguish,
  - type: text
    content: like a king preparing for battle.
  '25':
  - type: text
    content: For they shake their fists at God,
  - type: text
    content: defying the Almighty.
  '26':
  - type: text
    content: Holding their strong shields,
  - type: text
    content: they defiantly charge against him.
  '27':
  - type: text
    content: “These wicked people are heavy and prosperous;
  - type: text
    content: their waists bulge with fat.
  '28':
  - type: text
    content: But their cities will be ruined.
  - type: text
    content: They will live in abandoned houses
  - type: text
    content: that are ready to tumble down.
  '29':
  - type: text
    content: Their riches will not last,
  - type: text
    content: and their wealth will not endure.
  - type: text
    content: Their possessions will no longer spread across the horizon.
  '3':
  - type: text
    content: The wise don’t engage in empty chatter.
  - type: text
    content: What good are such words?
  '30':
  - type: text
    content: “They will not escape the darkness.
  - type: text
    content: The burning sun will wither their shoots,
  - type: text
    content: and the breath of God will destroy them.
  '31':
  - type: text
    content: Let them no longer fool themselves by trusting in empty riches,
  - type: text
    content: for emptiness will be their only reward.
  '32':
  - type: text
    content: They will be cut down in the prime of life;
  - type: text
    content: their branches will never again be green.
  '33':
  - type: text
    content: They will be like a vine whose grapes are harvested too early,
  - type: text
    content: like an olive tree that loses its blossoms before the fruit can form.
  '34':
  - type: text
    content: For the godless are barren.
  - type: text
    content: Their homes, enriched through bribery, will burn.
  '35':
  - type: text
    content: They conceive trouble and give birth to evil.
  - type: text
    content: Their womb produces deceit.”
  '4':
  - type: text
    content: Have you no fear of God,
  - type: text
    content: no reverence for him?
  '5':
  - type: text
    content: Your sins are telling your mouth what to say.
  - type: text
    content: Your words are based on clever deception.
  '6':
  - type: text
    content: Your own mouth condemns you, not I.
  - type: text
    content: Your own lips testify against you.
  '7':
  - type: text
    content: “Were you the first person ever born?
  - type: text
    content: Were you born before the hills were made?
  '8':
  - type: text
    content: Were you listening at God’s secret council?
  - type: text
    content: Do you have a monopoly on wisdom?
  '9':
  - type: text
    content: What do you know that we don’t?
  - type: text
    content: What do you understand that we do not?
