document_id: JOB.15,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Eliphaz’s Second Response to Job
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Eliphaz the Temanite replied:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: On our side are aged, gray-haired men
  - type: usfm
    marker: q2
    children:
    - type: text
      text: much older than your father!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Is God’s comfort too little for you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is his gentle word not enough?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: What has taken away your reason?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What has weakened your vision,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Why do your eyes flash with anger; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Why do your eyes blink.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: that you turn against God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and say all these evil things?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Can any mortal be pure?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can anyone born of a woman be just?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Look, God does not even trust the angels.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the holy ones.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even the heavens are not absolutely pure in his sight.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: How much less pure is a corrupt and sinful person
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with a thirst for wickedness!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “If you will listen, I will show you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will answer you from my own experience.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: And it is confirmed by the reports of wise men
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who have heard the same thing from their fathers—
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: from those to whom the land was given
  - type: usfm
    marker: q2
    children:
    - type: text
      text: long before any foreigners arrived.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “A wise man wouldn’t answer with such empty talk!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are nothing but a windbag.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “The wicked writhe in pain throughout their lives.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Years of trouble are stored up for the ruthless.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The sound of terror rings in their ears,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and even on good days they fear the attack of the destroyer.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: They dare not go out into the darkness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for fear they will be murdered.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: They wander around, saying, ‘Where can I find bread?’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He is appointed to be food for a vulture.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They know their day of destruction is near.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: That dark day terrifies them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They live in distress and anguish,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a king preparing for battle.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: For they shake their fists at God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: defying the Almighty.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Holding their strong shields,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they defiantly charge against him.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “These wicked people are heavy and prosperous;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their waists bulge with fat.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: But their cities will be ruined.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will live in abandoned houses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that are ready to tumble down.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Their riches will not last,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their wealth will not endure.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their possessions will no longer spread across the horizon.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The wise don’t engage in empty chatter.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What good are such words?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “They will not escape the darkness.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The burning sun will wither their shoots,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the breath of God will destroy them.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Let them no longer fool themselves by trusting in empty riches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for emptiness will be their only reward.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: They will be cut down in the prime of life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their branches will never again be green.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: They will be like a vine whose grapes are harvested too early,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like an olive tree that loses its blossoms before the fruit can form.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: For the godless are barren.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their homes, enriched through bribery, will burn.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: They conceive trouble and give birth to evil.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their womb produces deceit.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Have you no fear of God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no reverence for him?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Your sins are telling your mouth what to say.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your words are based on clever deception.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Your own mouth condemns you, not I.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your own lips testify against you.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Were you the first person ever born?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Were you born before the hills were made?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Were you listening at God’s secret council?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you have a monopoly on wisdom?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: What do you know that we don’t?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What do you understand that we do not?
