document_id: REV.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Song of Moses and of the Lamb
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then I saw in heaven another marvelous event of great significance. Seven angels were holding the seven last plagues, which would bring God’s wrath to completion. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I saw before me what seemed to be a glass sea mixed with fire. And on it stood all the people who had been victorious over the beast and his statue and the number representing his name. They were all holding harps that God had given them. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And they were singing the song of Moses, the servant of God, and the song of the Lamb:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Great and marvelous are your works,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O Lord God, the Almighty.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Just and true are your ways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O King of the nations.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: King of the ages.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who will not fear you, Lord,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and glorify your name?
- type: usfm
  marker: q2
  children:
  - type: text
    text: For you alone are holy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All nations will come and worship before you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your righteous deeds have been revealed.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Seven Bowls of the Seven Plagues
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then I looked and saw that the Temple in heaven, God’s Tabernacle, was thrown wide open. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The seven angels who were holding the seven plagues came out of the Temple. They were clothed in spotless white linen
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Other manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'white stone; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'still others read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: white [garments] made of linen.
    marker-yv: yv-n
  - type: text
    text: ' with gold sashes across their chests. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then one of the four living beings handed each of the seven angels a gold bowl filled with the wrath of God, who lives forever and ever. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The Temple was filled with smoke from God’s glory and power. No one could enter the Temple until the seven angels had completed pouring out the seven plagues.
