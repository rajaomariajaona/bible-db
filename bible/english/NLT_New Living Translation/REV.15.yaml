document_id: REV.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Song of Moses and of the Lamb
  - type: text
    content: 'Then I saw in heaven another marvelous event of great significance. Seven angels were holding the seven last plagues, which would bring God’s wrath to completion. '
  '2':
  - type: text
    content: 'I saw before me what seemed to be a glass sea mixed with fire. And on it stood all the people who had been victorious over the beast and his statue and the number representing his name. They were all holding harps that God had given them. '
  '3':
  - type: text
    content: 'And they were singing the song of Moses, the servant of God, and the song of the Lamb:'
  - type: text
    content: “Great and marvelous are your works,
  - type: text
    content: O Lord God, the Almighty.
  - type: text
    content: Just and true are your ways,
  - type: text
    content: O King of the nations.
  - type: note
    content: Some manuscripts read King of the ages.
  '4':
  - type: text
    content: Who will not fear you, Lord,
  - type: text
    content: and glorify your name?
  - type: text
    content: For you alone are holy.
  - type: text
    content: All nations will come and worship before you,
  - type: text
    content: for your righteous deeds have been revealed.”
  - type: heading
    content: The Seven Bowls of the Seven Plagues
  '5':
  - type: text
    content: 'Then I looked and saw that the Temple in heaven, God’s Tabernacle, was thrown wide open. '
  '6':
  - type: text
    content: The seven angels who were holding the seven plagues came out of the Temple. They were clothed in spotless white linen
  - type: note
    content: Other manuscripts read white stone; still others read white [garments] made of linen.
  - type: text
    content: ' with gold sashes across their chests. '
  '7':
  - type: text
    content: 'Then one of the four living beings handed each of the seven angels a gold bowl filled with the wrath of God, who lives forever and ever. '
  '8':
  - type: text
    content: The Temple was filled with smoke from God’s glory and power. No one could enter the Temple until the seven angels had completed pouring out the seven plagues.
