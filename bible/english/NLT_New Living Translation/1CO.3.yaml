document_id: 1CO.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul and Apollos, Servants of Christ
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dear brothers and sisters,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Brothers.
    marker-yv: yv-n
  - type: text
    text: ' when I was with you I couldn’t talk to you as I would to spiritual people.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to people who have the Spirit.
    marker-yv: yv-n
  - type: text
    text: ' I had to talk as though you belonged to this world or as though you were infants in Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I had to feed you with milk, not with solid food, because you weren’t ready for anything stronger. And you still aren’t ready, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'for you are still controlled by your sinful nature. You are jealous of one another and quarrel with each other. Doesn’t that prove you are controlled by your sinful nature? Aren’t you living like people of the world? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: When one of you says, “I am a follower of Paul,” and another says, “I follow Apollos,” aren’t you acting just like people of the world?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'After all, who is Apollos? Who is Paul? We are only God’s servants through whom you believed the Good News. Each of us did the work the Lord gave us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I planted the seed in your hearts, and Apollos watered it, but it was God who made it grow. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'It’s not important who does the planting, or who does the watering. What’s important is that God makes the seed grow. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The one who plants and the one who waters work together with the same purpose. And both will be rewarded for their own hard work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For we are both God’s workers. And you are God’s field. You are God’s building.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Because of God’s grace to me, I have laid the foundation like an expert builder. Now others are building on it. But whoever is building on this foundation must be very careful. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For no one can lay any foundation other than the one we already have—Jesus Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Anyone who builds on that foundation may use a variety of materials—gold, silver, jewels, wood, hay, or straw. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But on the judgment day, fire will reveal what kind of work each builder has done. The fire will show if a person’s work has any value. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'If the work survives, that builder will receive a reward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But if the work is burned up, the builder will suffer great loss. The builder will be saved, but like someone barely escaping through a wall of flames.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Don’t you realize that all of you together are the temple of God and that the Spirit of God lives in
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: among.
    marker-yv: yv-n
  - type: text
    text: ' you? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: God will destroy anyone who destroys this temple. For God’s temple is holy, and you are that temple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Stop deceiving yourselves. If you think you are wise by this world’s standards, you need to become a fool to be truly wise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: For the wisdom of this world is foolishness to God. As the Scriptures say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “He traps the wise
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the snare of their own cleverness.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Job 5:13.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And again,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' knows the thoughts of the wise;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he knows they are worthless.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 94:11.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So don’t boast about following a particular human leader. For everything belongs to you— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: whether Paul or Apollos or Peter,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Cephas.
    marker-yv: yv-n
  - type: text
    text: ' or the world, or life and death, or the present and the future. Everything belongs to you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: and you belong to Christ, and Christ belongs to God.
