document_id: 1CO.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul and Apollos, Servants of Christ
  - type: text
    content: Dear brothers and sisters,
  - type: note
    content: Greek Brothers.
  - type: text
    content: ' when I was with you I couldn’t talk to you as I would to spiritual people.'
  - type: note
    content: Or to people who have the Spirit.
  - type: text
    content: ' I had to talk as though you belonged to this world or as though you were infants in Christ. '
  '10':
  - type: text
    content: 'Because of God’s grace to me, I have laid the foundation like an expert builder. Now others are building on it. But whoever is building on this foundation must be very careful. '
  '11':
  - type: text
    content: For no one can lay any foundation other than the one we already have—Jesus Christ.
  '12':
  - type: text
    content: 'Anyone who builds on that foundation may use a variety of materials—gold, silver, jewels, wood, hay, or straw. '
  '13':
  - type: text
    content: 'But on the judgment day, fire will reveal what kind of work each builder has done. The fire will show if a person’s work has any value. '
  '14':
  - type: text
    content: 'If the work survives, that builder will receive a reward. '
  '15':
  - type: text
    content: But if the work is burned up, the builder will suffer great loss. The builder will be saved, but like someone barely escaping through a wall of flames.
  '16':
  - type: text
    content: Don’t you realize that all of you together are the temple of God and that the Spirit of God lives in
  - type: note
    content: Or among.
  - type: text
    content: ' you? '
  '17':
  - type: text
    content: God will destroy anyone who destroys this temple. For God’s temple is holy, and you are that temple.
  '18':
  - type: text
    content: 'Stop deceiving yourselves. If you think you are wise by this world’s standards, you need to become a fool to be truly wise. '
  '19':
  - type: text
    content: For the wisdom of this world is foolishness to God. As the Scriptures say,
  - type: text
    content: “He traps the wise
  - type: text
    content: in the snare of their own cleverness.”
  - type: note
    content: Job 5:13.
  '2':
  - type: text
    content: 'I had to feed you with milk, not with solid food, because you weren’t ready for anything stronger. And you still aren’t ready, '
  '20':
  - type: text
    content: And again,
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' knows the thoughts of the wise;'
  - type: text
    content: he knows they are worthless.”
  - type: note
    content: Ps 94:11.
  '21':
  - type: text
    content: 'So don’t boast about following a particular human leader. For everything belongs to you— '
  '22':
  - type: text
    content: whether Paul or Apollos or Peter,
  - type: note
    content: Greek Cephas.
  - type: text
    content: ' or the world, or life and death, or the present and the future. Everything belongs to you, '
  '23':
  - type: text
    content: and you belong to Christ, and Christ belongs to God.
  '3':
  - type: text
    content: 'for you are still controlled by your sinful nature. You are jealous of one another and quarrel with each other. Doesn’t that prove you are controlled by your sinful nature? Aren’t you living like people of the world? '
  '4':
  - type: text
    content: When one of you says, “I am a follower of Paul,” and another says, “I follow Apollos,” aren’t you acting just like people of the world?
  '5':
  - type: text
    content: 'After all, who is Apollos? Who is Paul? We are only God’s servants through whom you believed the Good News. Each of us did the work the Lord gave us. '
  '6':
  - type: text
    content: 'I planted the seed in your hearts, and Apollos watered it, but it was God who made it grow. '
  '7':
  - type: text
    content: 'It’s not important who does the planting, or who does the watering. What’s important is that God makes the seed grow. '
  '8':
  - type: text
    content: 'The one who plants and the one who waters work together with the same purpose. And both will be rewarded for their own hard work. '
  '9':
  - type: text
    content: For we are both God’s workers. And you are God’s field. You are God’s building.
