document_id: NUM.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Purity in Israel’s Camp
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave these instructions to Moses: '
  '10':
  - type: text
    content: Each priest may keep all the sacred donations that he receives.”
  - type: heading
    content: Protecting Marital Faithfulness
  '11':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '12':
  - type: text
    content: “Give the following instructions to the people of Israel.
  - type: text
    content: '“Suppose a man’s wife goes astray, and she is unfaithful to her husband '
  '13':
  - type: text
    content: 'and has sex with another man, but neither her husband nor anyone else knows about it. She has defiled herself, even though there was no witness and she was not caught in the act. '
  '14':
  - type: text
    content: 'If her husband becomes jealous and is suspicious of his wife and needs to know whether or not she has defiled herself, '
  '15':
  - type: text
    content: the husband must bring his wife to the priest. He must also bring an offering of two quarts
  - type: note
    content: Hebrew 1/10 of an ephah [2.2 liters].
  - type: text
    content: ' of barley flour to be presented on her behalf. Do not mix it with olive oil or frankincense, for it is a jealousy offering—an offering to prove whether or not she is guilty.'
  '16':
  - type: text
    content: '“The priest will then present her to stand trial before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'He must take some holy water in a clay jar and pour into it dust he has taken from the Tabernacle floor. '
  '18':
  - type: text
    content: 'When the priest has presented the woman before the '
  - type: text
    content: Lord
  - type: text
    content: ', he must unbind her hair and place in her hands the offering of proof—the jealousy offering to determine whether her husband’s suspicions are justified. The priest will stand before her, holding the jar of bitter water that brings a curse to those who are guilty. '
  '19':
  - type: text
    content: 'The priest will then put the woman under oath and say to her, ‘If no other man has had sex with you, and you have not gone astray and defiled yourself while under your husband’s authority, may you be immune from the effects of this bitter water that brings on the curse. '
  '2':
  - type: text
    content: “Command the people of Israel to remove from the camp anyone who has a skin disease
  - type: note
    content: Traditionally rendered leprosy. The Hebrew word used here describes various skin diseases.
  - type: text
    content: ' or a discharge, or who has become ceremonially unclean by touching a dead person. '
  '20':
  - type: text
    content: But if you have gone astray by being unfaithful to your husband, and have defiled yourself by having sex with another man—’
  '21':
  - type: text
    content: '“At this point the priest must put the woman under oath by saying, ‘May the people know that the '
  - type: text
    content: Lord
  - type: text
    content: ’s curse is upon you when he makes you infertile, causing your womb to shrivel
  - type: note
    content: Hebrew when he causes your thigh to waste away.
  - type: text
    content: ' and your abdomen to swell. '
  '22':
  - type: text
    content: Now may this water that brings the curse enter your body and cause your abdomen to swell and your womb to shrivel.
  - type: note
    content: Hebrew and your thigh to waste away.
  - type: text
    content: '’ And the woman will be required to say, ‘Yes, let it be so.’ '
  '23':
  - type: text
    content: 'And the priest will write these curses on a piece of leather and wash them off into the bitter water. '
  '24':
  - type: text
    content: He will make the woman drink the bitter water that brings on the curse. When the water enters her body, it will cause bitter suffering if she is guilty.
  '25':
  - type: text
    content: '“The priest will take the jealousy offering from the woman’s hand, lift it up before the '
  - type: text
    content: Lord
  - type: text
    content: ', and carry it to the altar. '
  '26':
  - type: text
    content: 'He will take a handful of the flour as a token portion and burn it on the altar, and he will require the woman to drink the water. '
  '27':
  - type: text
    content: If she has defiled herself by being unfaithful to her husband, the water that brings on the curse will cause bitter suffering. Her abdomen will swell and her womb will shrink,
  - type: note
    content: Hebrew and her thigh will waste away.
  - type: text
    content: ' and her name will become a curse among her people. '
  '28':
  - type: text
    content: But if she has not defiled herself and is pure, then she will be unharmed and will still be able to have children.
  '29':
  - type: text
    content: '“This is the ritual law for dealing with suspicion. If a woman goes astray and defiles herself while under her husband’s authority, '
  '3':
  - type: text
    content: 'This command applies to men and women alike. Remove them so they will not defile the camp in which I live among them.” '
  '30':
  - type: text
    content: 'or if a man becomes jealous and is suspicious that his wife has been unfaithful, the husband must present his wife before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the priest will apply this entire ritual law to her. '
  '31':
  - type: text
    content: The husband will be innocent of any guilt in this matter, but his wife will be held accountable for her sin.”
  '4':
  - type: text
    content: 'So the Israelites did as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses and removed such people from the camp.'
  '5':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '6':
  - type: text
    content: '“Give the following instructions to the people of Israel: If any of the people—men or women—betray the '
  - type: text
    content: Lord
  - type: text
    content: ' by doing wrong to another person, they are guilty. '
  '7':
  - type: text
    content: 'They must confess their sin and make full restitution for what they have done, adding an additional 20 percent and returning it to the person who was wronged. '
  '8':
  - type: text
    content: 'But if the person who was wronged is dead, and there are no near relatives to whom restitution can be made, the payment belongs to the '
  - type: text
    content: Lord
  - type: text
    content: ' and must be given to the priest. Those who are guilty must also bring a ram as a sacrifice, and they will be purified and made right with the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Or bring a ram for atonement, which will make atonement for them.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'All the sacred offerings that the Israelites bring to a priest will belong to him. '
