document_id: 1CO.14,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tongues and Prophecy
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Let love be your highest goal! But you should also desire the special abilities the Spirit gives—especially the ability to prophesy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There are many different languages in the world, and every language has meaning. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if I don’t understand a language, I will be a foreigner to someone who speaks it, and the one who speaks it will be a foreigner to me. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the same is true for you. Since you are so eager to have the special abilities the Spirit gives, seek those that will strengthen the whole church.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So anyone who speaks in tongues should pray also for the ability to interpret what has been said. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For if I pray in tongues, my spirit is praying, but I don’t understand what I am saying.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Well then, what shall I do? I will pray in the spirit,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in the Spirit; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 14:15b, 16.
      marker-yv: yv-n
    - type: text
      text: ' and I will also pray in words I understand. I will sing in the spirit, and I will also sing in words I understand. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if you praise God only in the spirit, how can those who don’t understand you praise God along with you? How can they join you in giving thanks when they don’t understand what you are saying? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You will be giving thanks very well, but it won’t strengthen the people who hear you.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I thank God that I speak in tongues more than any of you. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But in a church meeting I would rather speak five understandable words to help others than ten thousand words in an unknown language.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For if you have the ability to speak in tongues,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:2a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in unknown languages; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 14:4, 5, 13, 14, 18, 22, 26, 27, 28, 39.
      marker-yv: yv-n
    - type: text
      text: ' you will be talking only to God, since people won’t be able to understand you. You will be speaking by the power of the Spirit,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:2b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: speaking in your spirit.
      marker-yv: yv-n
    - type: text
      text: ' but it will all be mysterious. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dear brothers and sisters, don’t be childish in your understanding of these things. Be innocent as babies when it comes to evil, but be mature in understanding matters of this kind. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It is written in the Scriptures
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:21a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in the law.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will speak to my own people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through strange languages
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and through the lips of foreigners.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But even then, they will not listen to me,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:21b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isa 28:11-12.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So you see that speaking in tongues is a sign, not for believers, but for unbelievers. Prophecy, however, is for the benefit of believers, not unbelievers. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even so, if unbelievers or people who don’t understand these things come into your church meeting and hear everyone speaking in an unknown language, they will think you are crazy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if all of you are prophesying, and unbelievers or people who don’t understand these things come into your meeting, they will be convicted of sin and judged by what you say. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As they listen, their secret thoughts will be exposed, and they will fall to their knees and worship God, declaring, “God is truly here among you.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Call to Orderly Worship
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Well, my brothers and sisters, let’s summarize. When you meet together, one will sing, another will teach, another will tell some special revelation God has given, one will speak in tongues, and another will interpret what is said. But everything that is done must strengthen all of you.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No more than two or three should speak in tongues. They must speak one at a time, and someone must interpret what they say. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if no one is present who can interpret, they must be silent in your church meeting and speak in tongues to God privately.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let two or three people prophesy, and let the others evaluate what is said. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But one who prophesies strengthens others, encourages them, and comforts them. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if someone is prophesying and another person receives a revelation from the Lord, the one who is speaking must stop. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In this way, all who prophesy will have a turn to speak, one after the other, so that everyone will learn and be encouraged. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remember that people who prophesy are in control of their spirit and can take turns. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For God is not a God of disorder but of peace, as in all the meetings of God’s holy people.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The phrase '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'as in all the meetings of God’s holy people '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: could instead be joined to the beginning of 14:34.
      marker-yv: yv-n
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Women should be silent during the church meetings. It is not proper for them to speak. They should be submissive, just as the law says. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If they have any questions, they should ask their husbands at home, for it is improper for women to speak in church meetings.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts place verses 34-35 after 14:40.
      marker-yv: yv-n
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or do you think God’s word originated with you Corinthians? Are you the only ones to whom it was given? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you claim to be a prophet or think you are spiritual, you should recognize that what I am saying is a command from the Lord himself. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if you do not recognize this, you yourself will not be recognized.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: If you are ignorant of this, stay in your ignorance.
      marker-yv: yv-n
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So, my dear brothers and sisters, be eager to prophesy, and don’t forbid speaking in tongues. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: A person who speaks in tongues is strengthened personally, but one who speaks a word of prophecy strengthens the entire church.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But be sure that everything is done properly and in order.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I wish you could all speak in tongues, but even more I wish you could all prophesy. For prophecy is greater than speaking in tongues, unless someone interprets what you are saying so that the whole church will be strengthened.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:6a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 14:20, 26, 39.
      marker-yv: yv-n
    - type: text
      text: ' if I should come to you speaking in an unknown language,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:6b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in tongues; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 14:19, 23.
      marker-yv: yv-n
    - type: text
      text: ' how would that help you? But if I bring you a revelation or some special knowledge or prophecy or teaching, that will be helpful. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even lifeless instruments like the flute or the harp must play the notes clearly, or no one will recognize the melody. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And if the bugler doesn’t sound a clear call, how will the soldiers know they are being called to battle?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It’s the same for you. If you speak to people in words they don’t understand, how will they know what you are saying? You might as well be talking into empty space.
