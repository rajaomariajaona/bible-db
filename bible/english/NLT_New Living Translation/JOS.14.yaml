document_id: JOS.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Land Divided West of the Jordan
  - type: text
    content: 'The remaining tribes of Israel received land in Canaan as allotted by Eleazar the priest, Joshua son of Nun, and the tribal leaders. '
  '10':
  - type: text
    content: '“Now, as you can see, the '
  - type: text
    content: Lord
  - type: text
    content: ' has kept me alive and well as he promised for all these forty-five years since Moses made this promise—even while Israel wandered in the wilderness. Today I am eighty-five years old. '
  '11':
  - type: text
    content: 'I am as strong now as I was when Moses sent me on that journey, and I can still travel and fight as well as I could then. '
  '12':
  - type: text
    content: 'So give me the hill country that the '
  - type: text
    content: Lord
  - type: text
    content: ' promised me. You will remember that as scouts we found the descendants of Anak living there in great, walled towns. But if the '
  - type: text
    content: Lord
  - type: text
    content: ' is with me, I will drive them out of the land, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' said.”'
  '13':
  - type: text
    content: 'So Joshua blessed Caleb son of Jephunneh and gave Hebron to him as his portion of land. '
  '14':
  - type: text
    content: 'Hebron still belongs to the descendants of Caleb son of Jephunneh the Kenizzite because he wholeheartedly followed the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '15':
  - type: text
    content: (Previously Hebron had been called Kiriath-arba. It had been named after Arba, a great hero of the descendants of Anak.)
  - type: text
    content: And the land had rest from war.
  '2':
  - type: text
    content: 'These nine and a half tribes received their grants of land by means of sacred lots, in accordance with the '
  - type: text
    content: Lord
  - type: text
    content: '’s command through Moses. '
  '3':
  - type: text
    content: 'Moses had already given a grant of land to the two and a half tribes on the east side of the Jordan River, but he had given the Levites no such allotment. '
  '4':
  - type: text
    content: 'The descendants of Joseph had become two separate tribes—Manasseh and Ephraim. And the Levites were given no land at all, only towns to live in with surrounding pasturelands for their livestock and all their possessions. '
  '5':
  - type: text
    content: 'So the land was distributed in strict accordance with the '
  - type: text
    content: Lord
  - type: text
    content: ’s commands to Moses.
  - type: heading
    content: Caleb Requests His Land
  '6':
  - type: text
    content: 'A delegation from the tribe of Judah, led by Caleb son of Jephunneh the Kenizzite, came to Joshua at Gilgal. Caleb said to Joshua, “Remember what the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, the man of God, about you and me when we were at Kadesh-barnea. '
  '7':
  - type: text
    content: 'I was forty years old when Moses, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', sent me from Kadesh-barnea to explore the land of Canaan. I returned and gave an honest report, '
  '8':
  - type: text
    content: 'but my brothers who went with me frightened the people from entering the Promised Land. For my part, I wholeheartedly followed the '
  - type: text
    content: Lord
  - type: text
    content: ' my God. '
  '9':
  - type: text
    content: 'So that day Moses solemnly promised me, ‘The land of Canaan on which you were just walking will be your grant of land and that of your descendants forever, because you wholeheartedly followed the '
  - type: text
    content: Lord
  - type: text
    content: ' my God.’'
