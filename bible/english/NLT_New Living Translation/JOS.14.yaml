document_id: JOS.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land Divided West of the Jordan
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The remaining tribes of Israel received land in Canaan as allotted by Eleazar the priest, Joshua son of Nun, and the tribal leaders. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'These nine and a half tribes received their grants of land by means of sacred lots, in accordance with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s command through Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moses had already given a grant of land to the two and a half tribes on the east side of the Jordan River, but he had given the Levites no such allotment. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The descendants of Joseph had become two separate tribes—Manasseh and Ephraim. And the Levites were given no land at all, only towns to live in with surrounding pasturelands for their livestock and all their possessions. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the land was distributed in strict accordance with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s commands to Moses.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Caleb Requests His Land
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'A delegation from the tribe of Judah, led by Caleb son of Jephunneh the Kenizzite, came to Joshua at Gilgal. Caleb said to Joshua, “Remember what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, the man of God, about you and me when we were at Kadesh-barnea. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I was forty years old when Moses, the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', sent me from Kadesh-barnea to explore the land of Canaan. I returned and gave an honest report, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'but my brothers who went with me frightened the people from entering the Promised Land. For my part, I wholeheartedly followed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So that day Moses solemnly promised me, ‘The land of Canaan on which you were just walking will be your grant of land and that of your descendants forever, because you wholeheartedly followed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Now, as you can see, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has kept me alive and well as he promised for all these forty-five years since Moses made this promise—even while Israel wandered in the wilderness. Today I am eighty-five years old. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I am as strong now as I was when Moses sent me on that journey, and I can still travel and fight as well as I could then. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So give me the hill country that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' promised me. You will remember that as scouts we found the descendants of Anak living there in great, walled towns. But if the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is with me, I will drive them out of the land, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So Joshua blessed Caleb son of Jephunneh and gave Hebron to him as his portion of land. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hebron still belongs to the descendants of Caleb son of Jephunneh the Kenizzite because he wholeheartedly followed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: (Previously Hebron had been called Kiriath-arba. It had been named after Arba, a great hero of the descendants of Anak.)
- type: usfm
  marker: p
  children:
  - type: text
    text: And the land had rest from war.
