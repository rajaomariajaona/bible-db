document_id: AMO.6,116
type_code: eng
verses:
  '1':
  - type: text
    content: What sorrow awaits you who lounge in luxury in Jerusalem,
  - type: note
    content: Hebrew in Zion.
  - type: text
    content: and you who feel secure in Samaria!
  - type: text
    content: You are famous and popular in Israel,
  - type: text
    content: and people go to you for help.
  '10':
  - type: text
    content: And when a relative who is responsible to dispose of the dead
  - type: note
    content: Or to burn the dead. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' goes into the house to carry out the bodies, he will ask the last survivor, “Is anyone else with you?” When the person begins to swear, “No, by . . . ,” he will interrupt and say, “Stop! Don’t even mention the name of the '
  - type: text
    content: Lord
  - type: text
    content: .”)
  '11':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' gives the command,'
  - type: text
    content: homes both great and small will be smashed to pieces.
  '12':
  - type: text
    content: Can horses gallop over boulders?
  - type: text
    content: Can oxen be used to plow them?
  - type: text
    content: But that’s how foolish you are when you turn justice into poison
  - type: text
    content: and the sweet fruit of righteousness into bitterness.
  '13':
  - type: text
    content: And you brag about your conquest of Lo-debar.
  - type: note
    content: Lo-debar means “nothing.”
  - type: text
    content: You boast, “Didn’t we take Karnaim
  - type: note
    content: Karnaim means “horns,” a term that symbolizes strength.
  - type: text
    content: ' by our own strength?”'
  '14':
  - type: text
    content: “O people of Israel, I am about to bring an enemy nation against you,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies.'
  - type: text
    content: “They will oppress you throughout your land—
  - type: text
    content: from Lebo-hamath in the north
  - type: text
    content: to the Arabah Valley in the south.”
  '2':
  - type: text
    content: But go over to Calneh
  - type: text
    content: and see what happened there.
  - type: text
    content: Then go to the great city of Hamath
  - type: text
    content: and down to the Philistine city of Gath.
  - type: text
    content: You are no better than they were,
  - type: text
    content: and look at how they were destroyed.
  '3':
  - type: text
    content: You push away every thought of coming disaster,
  - type: text
    content: but your actions only bring the day of judgment closer.
  '4':
  - type: text
    content: How terrible for you who sprawl on ivory beds
  - type: text
    content: and lounge on your couches,
  - type: text
    content: eating the meat of tender lambs from the flock
  - type: text
    content: and of choice calves fattened in the stall.
  '5':
  - type: text
    content: You sing trivial songs to the sound of the harp
  - type: text
    content: and fancy yourselves to be great musicians like David.
  '6':
  - type: text
    content: You drink wine by the bowlful
  - type: text
    content: and perfume yourselves with fragrant lotions.
  - type: text
    content: You care nothing about the ruin of your nation.
  - type: note
    content: Hebrew of Joseph.
  '7':
  - type: text
    content: Therefore, you will be the first to be led away as captives.
  - type: text
    content: Suddenly, all your parties will end.
  '8':
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' has sworn by his own name, and this is what he, the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies, says:'
  - type: text
    content: “I despise the arrogance of Israel,
  - type: note
    content: Hebrew Jacob. See note on 3:13.
  - type: text
    content: and I hate their fortresses.
  - type: text
    content: I will give this city
  - type: text
    content: and everything in it to their enemies.”
  '9':
  - type: text
    content: '(If there are ten men left in one house, they will all die. '
