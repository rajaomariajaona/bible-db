document_id: PSA.62,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For Jeduthun, the choir director: A psalm of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I wait quietly before God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my victory comes from him.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t make your living by extortion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or put your hope in stealing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And if your wealth increases,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t make it the center of your life.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God has spoken plainly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and I have heard it many times:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Power, O God, belongs to you;
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: unfailing love, O Lord, is yours.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely you repay all people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: according to what they have done.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He alone is my rock and my salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my fortress where I will never be shaken.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So many enemies against one man—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all of them trying to kill me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To them I’m just a broken-down wall
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or a tottering fence.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They plan to topple me from my high position.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They delight in telling lies about me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They praise me to my face
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but curse me in their hearts. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all that I am wait quietly before God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my hope is in him.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He alone is my rock and my salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my fortress where I will not be shaken.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My victory and honor come from God alone.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is my refuge, a rock where no enemy can reach me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O my people, trust in him at all times.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pour out your heart to him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for God is our refuge. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Common people are as worthless as a puff of wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the powerful are not what they appear to be.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you weigh them on the scales,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: together they are lighter than a breath of air.
