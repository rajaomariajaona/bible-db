document_id: PSA.62
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For Jeduthun, the choir director: A psalm of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I wait quietly before God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for my victory comes from him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He alone is my rock and my salvation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my fortress where I will never be shaken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So many enemies against one man—
- type: usfm
  marker: q2
  children:
  - type: text
    text: all of them trying to kill me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: To them I’m just a broken-down wall
- type: usfm
  marker: q2
  children:
  - type: text
    text: or a tottering fence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They plan to topple me from my high position.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They delight in telling lies about me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They praise me to my face
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but curse me in their hearts. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Let all that I am wait quietly before God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for my hope is in him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He alone is my rock and my salvation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my fortress where I will not be shaken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: My victory and honor come from God alone.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is my refuge, a rock where no enemy can reach me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: O my people, trust in him at all times.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Pour out your heart to him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for God is our refuge. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Common people are as worthless as a puff of wind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the powerful are not what they appear to be.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you weigh them on the scales,
- type: usfm
  marker: q2
  children:
  - type: text
    text: together they are lighter than a breath of air.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Don’t make your living by extortion
- type: usfm
  marker: q2
  children:
  - type: text
    text: or put your hope in stealing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And if your wealth increases,
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t make it the center of your life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: God has spoken plainly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and I have heard it many times:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Power, O God, belongs to you;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: unfailing love, O Lord, is yours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Surely you repay all people
- type: usfm
  marker: q2
  children:
  - type: text
    text: according to what they have done.
