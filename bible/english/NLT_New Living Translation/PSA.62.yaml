document_id: PSA.62,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For Jeduthun, the choir director: A psalm of David.'
  - type: text
    content: I wait quietly before God,
  - type: text
    content: for my victory comes from him.
  '10':
  - type: text
    content: Don’t make your living by extortion
  - type: text
    content: or put your hope in stealing.
  - type: text
    content: And if your wealth increases,
  - type: text
    content: don’t make it the center of your life.
  '11':
  - type: text
    content: God has spoken plainly,
  - type: text
    content: 'and I have heard it many times:'
  - type: text
    content: Power, O God, belongs to you;
  '12':
  - type: text
    content: unfailing love, O Lord, is yours.
  - type: text
    content: Surely you repay all people
  - type: text
    content: according to what they have done.
  '2':
  - type: text
    content: He alone is my rock and my salvation,
  - type: text
    content: my fortress where I will never be shaken.
  '3':
  - type: text
    content: So many enemies against one man—
  - type: text
    content: all of them trying to kill me.
  - type: text
    content: To them I’m just a broken-down wall
  - type: text
    content: or a tottering fence.
  '4':
  - type: text
    content: They plan to topple me from my high position.
  - type: text
    content: They delight in telling lies about me.
  - type: text
    content: They praise me to my face
  - type: text
    content: 'but curse me in their hearts. '
  - type: text
    content: Interlude
  '5':
  - type: text
    content: Let all that I am wait quietly before God,
  - type: text
    content: for my hope is in him.
  '6':
  - type: text
    content: He alone is my rock and my salvation,
  - type: text
    content: my fortress where I will not be shaken.
  '7':
  - type: text
    content: My victory and honor come from God alone.
  - type: text
    content: He is my refuge, a rock where no enemy can reach me.
  '8':
  - type: text
    content: O my people, trust in him at all times.
  - type: text
    content: Pour out your heart to him,
  - type: text
    content: 'for God is our refuge. '
  - type: text
    content: Interlude
  '9':
  - type: text
    content: Common people are as worthless as a puff of wind,
  - type: text
    content: and the powerful are not what they appear to be.
  - type: text
    content: If you weigh them on the scales,
  - type: text
    content: together they are lighter than a breath of air.
