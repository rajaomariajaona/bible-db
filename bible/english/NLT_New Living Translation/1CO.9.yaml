document_id: 1CO.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Gives Up His Rights
  - type: text
    content: 'Am I not as free as anyone else? Am I not an apostle? Haven’t I seen Jesus our Lord with my own eyes? Isn’t it because of my work that you belong to the Lord? '
  '10':
  - type: text
    content: Wasn’t he actually speaking to us? Yes, it was written for us, so that the one who plows and the one who threshes the grain might both expect a share of the harvest.
  '11':
  - type: text
    content: 'Since we have planted spiritual seed among you, aren’t we entitled to a harvest of physical food and drink? '
  '12':
  - type: text
    content: If you support others who preach to you, shouldn’t we have an even greater right to be supported? But we have never used this right. We would rather put up with anything than be an obstacle to the Good News about Christ.
  '13':
  - type: text
    content: 'Don’t you realize that those who work in the temple get their meals from the offerings brought to the temple? And those who serve at the altar get a share of the sacrificial offerings. '
  '14':
  - type: text
    content: 'In the same way, the Lord ordered that those who preach the Good News should be supported by those who benefit from it. '
  '15':
  - type: text
    content: 'Yet I have never used any of these rights. And I am not writing this to suggest that I want to start now. In fact, I would rather die than lose my right to boast about preaching without charge. '
  '16':
  - type: text
    content: Yet preaching the Good News is not something I can boast about. I am compelled by God to do it. How terrible for me if I didn’t preach the Good News!
  '17':
  - type: text
    content: 'If I were doing this on my own initiative, I would deserve payment. But I have no choice, for God has given me this sacred trust. '
  '18':
  - type: text
    content: What then is my pay? It is the opportunity to preach the Good News without charging anyone. That’s why I never demand my rights when I preach the Good News.
  '19':
  - type: text
    content: 'Even though I am a free man with no master, I have become a slave to all people to bring many to Christ. '
  '2':
  - type: text
    content: Even if others think I am not an apostle, I certainly am to you. You yourselves are proof that I am the Lord’s apostle.
  '20':
  - type: text
    content: 'When I was with the Jews, I lived like a Jew to bring the Jews to Christ. When I was with those who follow the Jewish law, I too lived under that law. Even though I am not subject to the law, I did this so I could bring to Christ those who are under the law. '
  '21':
  - type: text
    content: When I am with the Gentiles who do not follow the Jewish law,
  - type: note
    content: Greek those without the law.
  - type: text
    content: ' I too live apart from that law so I can bring them to Christ. But I do not ignore the law of God; I obey the law of Christ.'
  '22':
  - type: text
    content: 'When I am with those who are weak, I share their weakness, for I want to bring the weak to Christ. Yes, I try to find common ground with everyone, doing everything I can to save some. '
  '23':
  - type: text
    content: I do everything to spread the Good News and share in its blessings.
  '24':
  - type: text
    content: 'Don’t you realize that in a race everyone runs, but only one person gets the prize? So run to win! '
  '25':
  - type: text
    content: 'All athletes are disciplined in their training. They do it to win a prize that will fade away, but we do it for an eternal prize. '
  '26':
  - type: text
    content: 'So I run with purpose in every step. I am not just shadowboxing. '
  '27':
  - type: text
    content: I discipline my body like an athlete, training it to do what it should. Otherwise, I fear that after preaching to others I myself might be disqualified.
  '3':
  - type: text
    content: This is my answer to those who question my authority.
  - type: note
    content: Greek those who examine me.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Don’t we have the right to live in your homes and share your meals? '
  '5':
  - type: text
    content: Don’t we have the right to bring a believing wife
  - type: note
    content: Greek a sister a wife.
  - type: text
    content: ' with us as the other apostles and the Lord’s brothers do, and as Peter'
  - type: note
    content: Greek Cephas.
  - type: text
    content: ' does? '
  '6':
  - type: text
    content: Or is it only Barnabas and I who have to work to support ourselves?
  '7':
  - type: text
    content: 'What soldier has to pay his own expenses? What farmer plants a vineyard and doesn’t have the right to eat some of its fruit? What shepherd cares for a flock of sheep and isn’t allowed to drink some of the milk? '
  '8':
  - type: text
    content: 'Am I expressing merely a human opinion, or does the law say the same thing? '
  '9':
  - type: text
    content: For the law of Moses says, “You must not muzzle an ox to keep it from eating as it treads out the grain.”
  - type: note
    content: Deut 25:4.
  - type: text
    content: ' Was God thinking only about oxen when he said this? '
