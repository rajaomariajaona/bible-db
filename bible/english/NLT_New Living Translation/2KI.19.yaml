document_id: 2KI.19,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Hezekiah Seeks the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Help
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When King Hezekiah heard their report, he tore his clothes and put on burlap and went into the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: '“This message is for King Hezekiah of Judah. Don’t let your God, in whom you trust, deceive you with promises that Jerusalem will not be captured by the king of Assyria. '
  '11':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'You know perfectly well what the kings of Assyria have done wherever they have gone. They have completely destroyed everyone who stood in their way! Why should you be any different? '
  '12':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'Have the gods of other nations rescued them—such nations as Gozan, Haran, Rezeph, and the people of Eden who were in Tel-assar? My predecessors destroyed them all! '
  '13':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: What happened to the king of Hamath and the king of Arpad? What happened to the kings of Sepharvaim, Hena, and Ivvah?”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Hezekiah received the letter from the messengers and read it, he went up to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple and spread it out before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Hezekiah prayed this prayer before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': “O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of Israel, you are enthroned between the mighty cherubim! You alone are God of all the kingdoms of the earth. You alone created the heavens and the earth. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bend down, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and listen! Open your eyes, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and see! Listen to Sennacherib’s words of defiance against the living God.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“It is true, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', that the kings of Assyria have destroyed all these nations. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they have thrown the gods of these nations into the fire and burned them. But of course the Assyrians could destroy them! They were not gods at all—only idols of wood and stone shaped by human hands. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, rescue us from his power; then all the kingdoms of the earth will know that you alone, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', are God.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isaiah Predicts Judah’s Deliverance
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And he sent Eliakim the palace administrator, Shebna the court secretary, and the leading priests, all dressed in burlap, to the prophet Isaiah son of Amoz. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Isaiah son of Amoz sent this message to Hezekiah: “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: I have heard your prayer about King Sennacherib of Assyria. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken this word against him:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The virgin daughter of Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: despises you and laughs at you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The daughter of Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shakes her head in derision as you flee.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Whom have you been defying and ridiculing?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Against whom did you raise your voice?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At whom did you look with such haughty eyes?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It was the Holy One of Israel!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By your messengers you have defied the Lord.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have said, ‘With my many chariots
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have conquered the highest mountains—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, the remotest peaks of Lebanon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have cut down its tallest cedars
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and its finest cypress trees.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have reached its farthest corners
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and explored its deepest forests.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have dug wells in many foreign lands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and refreshed myself with their water.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the sole of my foot
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I stopped up all the rivers of Egypt!’
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But have you not heard?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I decided this long ago.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Long ago I planned it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and now I am making it happen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I planned for you to crush fortified cities
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into heaps of rubble.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That is why their people have so little power
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and are so frightened and confused.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are as weak as grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as easily trampled as tender green shoots.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are like grass sprouting on a housetop,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: scorched before it can grow lush and tall.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But I know you well—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where you stay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and when you come and go.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I know the way you have raged against me.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And because of your raging against me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your arrogance, which I have heard for myself,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put my hook in your nose
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my bit in your mouth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make you return
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the same road on which you came.”
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Isaiah said to Hezekiah, “Here is the proof that what I say is true:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “This year you will eat only what grows up by itself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and next year you will eat what springs up from that.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But in the third year you will plant crops and harvest them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will tend vineyards and eat their fruit.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They told him, “This is what King Hezekiah says: Today is a day of trouble, insults, and disgrace. It is like when a child is ready to be born, but the mother has no strength to deliver the baby. '
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you who are left in Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who have escaped the ravages of the siege,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will put roots down in your own soil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will grow up and flourish.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For a remnant of my people will spread out from Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a group of survivors from Mount Zion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The passionate commitment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions, Latin Vulgate, and an alternate reading of the Masoretic Text (see also Isa 37:32); the other alternate reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will make this happen!
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“And this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says about the king of Assyria:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His armies will not enter Jerusalem.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will not even shoot an arrow at it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will not march outside its gates with their shields
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor build banks of earth against its walls.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The king will return to his own country
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the same road on which he came.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will not enter this city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my own honor and for the sake of my servant David,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will defend this city and protect it.”
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That night the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' went out to the Assyrian camp and killed 185,000 Assyrian soldiers. When the surviving Assyrians'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: When they.
      marker-yv: yv-n
    - type: text
      text: ' woke up the next morning, they found corpses everywhere. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then King Sennacherib of Assyria broke camp and returned to his own land. He went home to his capital of Nineveh and stayed there.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One day while he was worshiping in the temple of his god Nisroch, his sons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version and an alternate reading of the Masoretic Text (see also Isa 37:38); the other alternate reading lacks '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his sons.
      marker-yv: yv-n
    - type: text
      text: ' Adrammelech and Sharezer killed him with their swords. They then escaped to the land of Ararat, and another son, Esarhaddon, became the next king of Assyria.'
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But perhaps the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has heard the Assyrian chief of staff,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the rabshakeh; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 19:8.
      marker-yv: yv-n
    - type: text
      text: ' sent by the king to defy the living God, and will punish him for his words. Oh, pray for those of us who are left!”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After King Hezekiah’s officials delivered the king’s message to Isaiah, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the prophet replied, “Say to your master, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Do not be disturbed by this blasphemous speech against me from the Assyrian king’s messengers. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Listen! I myself will move against him,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: I will put a spirit in him.
      marker-yv: yv-n
    - type: text
      text: ' and the king will receive a message that he is needed at home. So he will return to his land, where I will have him killed with a sword.’”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, the Assyrian chief of staff left Jerusalem and went to consult the king of Assyria, who had left Lachish and was attacking Libnah.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Soon afterward King Sennacherib received word that King Tirhakah of Ethiopia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of Cush.
      marker-yv: yv-n
    - type: text
      text: ' was leading an army to fight against him. Before leaving to meet the attack, he sent messengers back to Hezekiah in Jerusalem with this message:'
