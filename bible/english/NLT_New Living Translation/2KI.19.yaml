document_id: 2KI.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah Seeks the Lord’s Help
  - type: text
    content: 'When King Hezekiah heard their report, he tore his clothes and put on burlap and went into the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: '“This message is for King Hezekiah of Judah. Don’t let your God, in whom you trust, deceive you with promises that Jerusalem will not be captured by the king of Assyria. '
  '11':
  - type: text
    content: 'You know perfectly well what the kings of Assyria have done wherever they have gone. They have completely destroyed everyone who stood in their way! Why should you be any different? '
  '12':
  - type: text
    content: 'Have the gods of other nations rescued them—such nations as Gozan, Haran, Rezeph, and the people of Eden who were in Tel-assar? My predecessors destroyed them all! '
  '13':
  - type: text
    content: What happened to the king of Hamath and the king of Arpad? What happened to the kings of Sepharvaim, Hena, and Ivvah?”
  '14':
  - type: text
    content: 'After Hezekiah received the letter from the messengers and read it, he went up to the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple and spread it out before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'And Hezekiah prayed this prayer before the '
  - type: text
    content: Lord
  - type: text
    content: ': “O '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, you are enthroned between the mighty cherubim! You alone are God of all the kingdoms of the earth. You alone created the heavens and the earth. '
  '16':
  - type: text
    content: 'Bend down, O '
  - type: text
    content: Lord
  - type: text
    content: ', and listen! Open your eyes, O '
  - type: text
    content: Lord
  - type: text
    content: ', and see! Listen to Sennacherib’s words of defiance against the living God.'
  '17':
  - type: text
    content: '“It is true, '
  - type: text
    content: Lord
  - type: text
    content: ', that the kings of Assyria have destroyed all these nations. '
  '18':
  - type: text
    content: 'And they have thrown the gods of these nations into the fire and burned them. But of course the Assyrians could destroy them! They were not gods at all—only idols of wood and stone shaped by human hands. '
  '19':
  - type: text
    content: 'Now, O '
  - type: text
    content: Lord
  - type: text
    content: ' our God, rescue us from his power; then all the kingdoms of the earth will know that you alone, O '
  - type: text
    content: Lord
  - type: text
    content: ', are God.”'
  - type: heading
    content: Isaiah Predicts Judah’s Deliverance
  '2':
  - type: text
    content: 'And he sent Eliakim the palace administrator, Shebna the court secretary, and the leading priests, all dressed in burlap, to the prophet Isaiah son of Amoz. '
  '20':
  - type: text
    content: 'Then Isaiah son of Amoz sent this message to Hezekiah: “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: I have heard your prayer about King Sennacherib of Assyria. '
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken this word against him:'
  - type: text
    content: “The virgin daughter of Zion
  - type: text
    content: despises you and laughs at you.
  - type: text
    content: The daughter of Jerusalem
  - type: text
    content: shakes her head in derision as you flee.
  '22':
  - type: text
    content: “Whom have you been defying and ridiculing?
  - type: text
    content: Against whom did you raise your voice?
  - type: text
    content: At whom did you look with such haughty eyes?
  - type: text
    content: It was the Holy One of Israel!
  '23':
  - type: text
    content: By your messengers you have defied the Lord.
  - type: text
    content: You have said, ‘With my many chariots
  - type: text
    content: I have conquered the highest mountains—
  - type: text
    content: yes, the remotest peaks of Lebanon.
  - type: text
    content: I have cut down its tallest cedars
  - type: text
    content: and its finest cypress trees.
  - type: text
    content: I have reached its farthest corners
  - type: text
    content: and explored its deepest forests.
  '24':
  - type: text
    content: I have dug wells in many foreign lands
  - type: text
    content: and refreshed myself with their water.
  - type: text
    content: With the sole of my foot
  - type: text
    content: I stopped up all the rivers of Egypt!’
  '25':
  - type: text
    content: “But have you not heard?
  - type: text
    content: I decided this long ago.
  - type: text
    content: Long ago I planned it,
  - type: text
    content: and now I am making it happen.
  - type: text
    content: I planned for you to crush fortified cities
  - type: text
    content: into heaps of rubble.
  '26':
  - type: text
    content: That is why their people have so little power
  - type: text
    content: and are so frightened and confused.
  - type: text
    content: They are as weak as grass,
  - type: text
    content: as easily trampled as tender green shoots.
  - type: text
    content: They are like grass sprouting on a housetop,
  - type: text
    content: scorched before it can grow lush and tall.
  '27':
  - type: text
    content: “But I know you well—
  - type: text
    content: where you stay
  - type: text
    content: and when you come and go.
  - type: text
    content: I know the way you have raged against me.
  '28':
  - type: text
    content: And because of your raging against me
  - type: text
    content: and your arrogance, which I have heard for myself,
  - type: text
    content: I will put my hook in your nose
  - type: text
    content: and my bit in your mouth.
  - type: text
    content: I will make you return
  - type: text
    content: by the same road on which you came.”
  '29':
  - type: text
    content: 'Then Isaiah said to Hezekiah, “Here is the proof that what I say is true:'
  - type: text
    content: “This year you will eat only what grows up by itself,
  - type: text
    content: and next year you will eat what springs up from that.
  - type: text
    content: But in the third year you will plant crops and harvest them;
  - type: text
    content: you will tend vineyards and eat their fruit.
  '3':
  - type: text
    content: 'They told him, “This is what King Hezekiah says: Today is a day of trouble, insults, and disgrace. It is like when a child is ready to be born, but the mother has no strength to deliver the baby. '
  '30':
  - type: text
    content: And you who are left in Judah,
  - type: text
    content: who have escaped the ravages of the siege,
  - type: text
    content: will put roots down in your own soil
  - type: text
    content: and will grow up and flourish.
  '31':
  - type: text
    content: For a remnant of my people will spread out from Jerusalem,
  - type: text
    content: a group of survivors from Mount Zion.
  - type: text
    content: 'The passionate commitment of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies'
  - type: note
    content: As in Greek and Syriac versions, Latin Vulgate, and an alternate reading of the Masoretic Text (see also Isa 37:32); the other alternate reads the Lord.
  - type: text
    content: will make this happen!
  '32':
  - type: text
    content: '“And this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says about the king of Assyria:'
  - type: text
    content: “His armies will not enter Jerusalem.
  - type: text
    content: They will not even shoot an arrow at it.
  - type: text
    content: They will not march outside its gates with their shields
  - type: text
    content: nor build banks of earth against its walls.
  '33':
  - type: text
    content: The king will return to his own country
  - type: text
    content: by the same road on which he came.
  - type: text
    content: He will not enter this city,
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '34':
  - type: text
    content: For my own honor and for the sake of my servant David,
  - type: text
    content: I will defend this city and protect it.”
  '35':
  - type: text
    content: 'That night the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' went out to the Assyrian camp and killed 185,000 Assyrian soldiers. When the surviving Assyrians'
  - type: note
    content: Hebrew When they.
  - type: text
    content: ' woke up the next morning, they found corpses everywhere. '
  '36':
  - type: text
    content: Then King Sennacherib of Assyria broke camp and returned to his own land. He went home to his capital of Nineveh and stayed there.
  '37':
  - type: text
    content: One day while he was worshiping in the temple of his god Nisroch, his sons
  - type: note
    content: As in Greek version and an alternate reading of the Masoretic Text (see also Isa 37:38); the other alternate reading lacks his sons.
  - type: text
    content: ' Adrammelech and Sharezer killed him with their swords. They then escaped to the land of Ararat, and another son, Esarhaddon, became the next king of Assyria.'
  '4':
  - type: text
    content: 'But perhaps the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has heard the Assyrian chief of staff,'
  - type: note
    content: Or the rabshakeh; also in 19:8.
  - type: text
    content: ' sent by the king to defy the living God, and will punish him for his words. Oh, pray for those of us who are left!”'
  '5':
  - type: text
    content: 'After King Hezekiah’s officials delivered the king’s message to Isaiah, '
  '6':
  - type: text
    content: 'the prophet replied, “Say to your master, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Do not be disturbed by this blasphemous speech against me from the Assyrian king’s messengers. '
  '7':
  - type: text
    content: Listen! I myself will move against him,
  - type: note
    content: Hebrew I will put a spirit in him.
  - type: text
    content: ' and the king will receive a message that he is needed at home. So he will return to his land, where I will have him killed with a sword.’”'
  '8':
  - type: text
    content: Meanwhile, the Assyrian chief of staff left Jerusalem and went to consult the king of Assyria, who had left Lachish and was attacking Libnah.
  '9':
  - type: text
    content: Soon afterward King Sennacherib received word that King Tirhakah of Ethiopia
  - type: note
    content: Hebrew of Cush.
  - type: text
    content: ' was leading an army to fight against him. Before leaving to meet the attack, he sent messengers back to Hezekiah in Jerusalem with this message:'
