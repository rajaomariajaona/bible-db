document_id: JER.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah Wears an Ox Yoke
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This message came to Jeremiah from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' early in the reign of Zedekiah'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Hebrew manuscripts and Syriac version (see also 27:3, 12); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jehoiakim.
    marker-yv: yv-n
  - type: text
    text: ' son of Josiah, king of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me: “Make a yoke, and fasten it on your neck with leather straps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then send messages to the kings of Edom, Moab, Ammon, Tyre, and Sidon through their ambassadors who have come to see King Zedekiah in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Give them this message for their masters: ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'With my great strength and powerful arm I made the earth and all its people and every animal. I can give these things of mine to anyone I choose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now I will give your countries to King Nebuchadnezzar of Babylon, who is my servant. I have put everything, even the wild animals, under his control. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'All the nations will serve him, his son, and his grandson until his time is up. Then many nations and great kings will conquer and rule over Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So you must submit to Babylon’s king and serve him; put your neck under Babylon’s yoke! I will punish any nation that refuses to be his slave, says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . I will send war, famine, and disease upon that nation until Babylon has conquered it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“‘Do not listen to your false prophets, fortune-tellers, interpreters of dreams, mediums, and sorcerers who say, “The king of Babylon will not conquer you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They are all liars, and their lies will lead to your being driven out of your land. I will drive you out and send you far away to die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But the people of any nation that submits to the king of Babylon will be allowed to stay in their own country to farm the land as usual. I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then I repeated this same message to King Zedekiah of Judah. “If you want to live, submit to the yoke of the king of Babylon and his people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Why do you insist on dying—you and your people? Why should you choose war, famine, and disease, which the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will bring against every nation that refuses to submit to Babylon’s king? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Do not listen to the false prophets who keep telling you, ‘The king of Babylon will not conquer you.’ They are liars. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: ‘I have not sent these prophets! They are telling you lies in my name, so I will drive you from this land. You will all die—you and all these prophets, too.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then I spoke to the priests and the people and said, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: ‘Do not listen to your prophets who claim that soon the gold articles taken from my Temple will be returned from Babylon. It is all a lie! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Do not listen to them. Surrender to the king of Babylon, and you will live. Why should this whole city be destroyed? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'If they really are prophets and speak the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s messages, let them pray to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies. Let them pray that the articles remaining in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple and in the king’s palace and in the palaces of Jerusalem will not be carried away to Babylon!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies has spoken about the pillars in front of the Temple, the great bronze basin called the Sea, the water carts, and all the other ceremonial articles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: King Nebuchadnezzar of Babylon left them here when he exiled Jehoiachin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jeconiah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoiachin.
    marker-yv: yv-n
  - type: text
    text: ' son of Jehoiakim, king of Judah, to Babylon, along with all the other nobles of Judah and Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Yes, this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies, the God of Israel, says about the precious things still in the Temple, in the palace of Judah’s king, and in Jerusalem: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '‘They will all be carried away to Babylon and will stay there until I send for them,’ says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . ‘Then I will bring them back to Jerusalem again.’”
