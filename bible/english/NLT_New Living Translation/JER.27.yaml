document_id: JER.27,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Wears an Ox Yoke
  - type: text
    content: 'This message came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ' early in the reign of Zedekiah'
  - type: note
    content: As in some Hebrew manuscripts and Syriac version (see also 27:3, 12); most Hebrew manuscripts read Jehoiakim.
  - type: text
    content: ' son of Josiah, king of Judah.'
  '10':
  - type: text
    content: 'They are all liars, and their lies will lead to your being driven out of your land. I will drive you out and send you far away to die. '
  '11':
  - type: text
    content: 'But the people of any nation that submits to the king of Babylon will be allowed to stay in their own country to farm the land as usual. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!’”'
  '12':
  - type: text
    content: 'Then I repeated this same message to King Zedekiah of Judah. “If you want to live, submit to the yoke of the king of Babylon and his people. '
  '13':
  - type: text
    content: 'Why do you insist on dying—you and your people? Why should you choose war, famine, and disease, which the '
  - type: text
    content: Lord
  - type: text
    content: ' will bring against every nation that refuses to submit to Babylon’s king? '
  '14':
  - type: text
    content: 'Do not listen to the false prophets who keep telling you, ‘The king of Babylon will not conquer you.’ They are liars. '
  '15':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘I have not sent these prophets! They are telling you lies in my name, so I will drive you from this land. You will all die—you and all these prophets, too.’”'
  '16':
  - type: text
    content: 'Then I spoke to the priests and the people and said, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘Do not listen to your prophets who claim that soon the gold articles taken from my Temple will be returned from Babylon. It is all a lie! '
  '17':
  - type: text
    content: 'Do not listen to them. Surrender to the king of Babylon, and you will live. Why should this whole city be destroyed? '
  '18':
  - type: text
    content: 'If they really are prophets and speak the '
  - type: text
    content: Lord
  - type: text
    content: '’s messages, let them pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. Let them pray that the articles remaining in the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple and in the king’s palace and in the palaces of Jerusalem will not be carried away to Babylon!’
  '19':
  - type: text
    content: '“For the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies has spoken about the pillars in front of the Temple, the great bronze basin called the Sea, the water carts, and all the other ceremonial articles. '
  '2':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me: “Make a yoke, and fasten it on your neck with leather straps. '
  '20':
  - type: text
    content: King Nebuchadnezzar of Babylon left them here when he exiled Jehoiachin
  - type: note
    content: Hebrew Jeconiah, a variant spelling of Jehoiachin.
  - type: text
    content: ' son of Jehoiakim, king of Judah, to Babylon, along with all the other nobles of Judah and Jerusalem. '
  '21':
  - type: text
    content: 'Yes, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says about the precious things still in the Temple, in the palace of Judah’s king, and in Jerusalem: '
  '22':
  - type: text
    content: '‘They will all be carried away to Babylon and will stay there until I send for them,’ says the '
  - type: text
    content: Lord
  - type: text
    content: . ‘Then I will bring them back to Jerusalem again.’”
  '3':
  - type: text
    content: 'Then send messages to the kings of Edom, Moab, Ammon, Tyre, and Sidon through their ambassadors who have come to see King Zedekiah in Jerusalem. '
  '4':
  - type: text
    content: 'Give them this message for their masters: ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel, says: '
  '5':
  - type: text
    content: 'With my great strength and powerful arm I made the earth and all its people and every animal. I can give these things of mine to anyone I choose. '
  '6':
  - type: text
    content: 'Now I will give your countries to King Nebuchadnezzar of Babylon, who is my servant. I have put everything, even the wild animals, under his control. '
  '7':
  - type: text
    content: 'All the nations will serve him, his son, and his grandson until his time is up. Then many nations and great kings will conquer and rule over Babylon. '
  '8':
  - type: text
    content: 'So you must submit to Babylon’s king and serve him; put your neck under Babylon’s yoke! I will punish any nation that refuses to be his slave, says the '
  - type: text
    content: Lord
  - type: text
    content: . I will send war, famine, and disease upon that nation until Babylon has conquered it.
  '9':
  - type: text
    content: '“‘Do not listen to your false prophets, fortune-tellers, interpreters of dreams, mediums, and sorcerers who say, “The king of Babylon will not conquer you.” '
