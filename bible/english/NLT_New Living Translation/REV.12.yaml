document_id: REV.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Woman and the Dragon
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then I witnessed in heaven an event of great significance. I saw a woman clothed with the sun, with the moon beneath her feet, and a crown of twelve stars on her head. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I heard a loud voice shouting across the heavens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “It has come at last—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: salvation and power
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the Kingdom of our God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the authority of his Christ.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:10a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his Messiah.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the accuser of our brothers and sisters
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:10b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has been thrown down to earth—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the one who accuses them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before our God day and night.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they have defeated him by the blood of the Lamb
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and by their testimony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they did not love their lives so much
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that they were afraid to die.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, rejoice, O heavens!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And you who live in the heavens, rejoice!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But terror will come on the earth and the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the devil has come down to you in great anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: knowing that he has little time.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the dragon realized that he had been thrown down to the earth, he pursued the woman who had given birth to the male child. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But she was given two wings like those of a great eagle so she could fly to the place prepared for her in the wilderness. There she would be cared for and protected from the dragon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the serpent; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 12:15. See 12:9.
      marker-yv: yv-n
    - type: text
      text: ' for a time, times, and half a time.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the dragon tried to drown the woman with a flood of water that flowed from his mouth. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the earth helped her by opening its mouth and swallowing the river that gushed out from the mouth of the dragon. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the dragon was angry at the woman and declared war against the rest of her children—all who keep God’s commandments and maintain their testimony for Jesus.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the dragon took his stand
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Then he took his stand; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Then I took my stand
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Some translations put this entire sentence into 13:1.
      marker-yv: yv-n
    - type: text
      text: ' on the shore beside the sea.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: She was pregnant, and she cried out because of her labor pains and the agony of giving birth.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I witnessed in heaven another significant event. I saw a large red dragon with seven heads and ten horns, with seven crowns on his heads. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: His tail swept away one-third of the stars in the sky, and he threw them to the earth. He stood in front of the woman as she was about to give birth, ready to devour her baby as soon as it was born.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She gave birth to a son who was to rule all nations with an iron rod. And her child was snatched away from the dragon and was caught up to God and to his throne. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the woman fled into the wilderness, where God had prepared a place to care for her for 1,260 days.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then there was war in heaven. Michael and his angels fought against the dragon and his angels. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the dragon lost the battle, and he and his angels were forced out of heaven. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This great dragon—the ancient serpent called the devil, or Satan, the one deceiving the whole world—was thrown down to the earth with all his angels.
