document_id: REV.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Woman and the Dragon
  - type: text
    content: 'Then I witnessed in heaven an event of great significance. I saw a woman clothed with the sun, with the moon beneath her feet, and a crown of twelve stars on her head. '
  '10':
  - type: text
    content: Then I heard a loud voice shouting across the heavens,
  - type: text
    content: “It has come at last—
  - type: text
    content: salvation and power
  - type: text
    content: and the Kingdom of our God,
  - type: text
    content: and the authority of his Christ.
  - type: note
    content: Or his Messiah.
  - type: text
    content: For the accuser of our brothers and sisters
  - type: note
    content: Greek brothers.
  - type: text
    content: has been thrown down to earth—
  - type: text
    content: the one who accuses them
  - type: text
    content: before our God day and night.
  '11':
  - type: text
    content: And they have defeated him by the blood of the Lamb
  - type: text
    content: and by their testimony.
  - type: text
    content: And they did not love their lives so much
  - type: text
    content: that they were afraid to die.
  '12':
  - type: text
    content: Therefore, rejoice, O heavens!
  - type: text
    content: And you who live in the heavens, rejoice!
  - type: text
    content: But terror will come on the earth and the sea,
  - type: text
    content: for the devil has come down to you in great anger,
  - type: text
    content: knowing that he has little time.”
  '13':
  - type: text
    content: 'When the dragon realized that he had been thrown down to the earth, he pursued the woman who had given birth to the male child. '
  '14':
  - type: text
    content: But she was given two wings like those of a great eagle so she could fly to the place prepared for her in the wilderness. There she would be cared for and protected from the dragon
  - type: note
    content: Greek the serpent; also in 12:15. See 12:9.
  - type: text
    content: ' for a time, times, and half a time.'
  '15':
  - type: text
    content: 'Then the dragon tried to drown the woman with a flood of water that flowed from his mouth. '
  '16':
  - type: text
    content: 'But the earth helped her by opening its mouth and swallowing the river that gushed out from the mouth of the dragon. '
  '17':
  - type: text
    content: And the dragon was angry at the woman and declared war against the rest of her children—all who keep God’s commandments and maintain their testimony for Jesus.
  '18':
  - type: text
    content: Then the dragon took his stand
  - type: note
    content: Greek Then he took his stand; some manuscripts read Then I took my stand. Some translations put this entire sentence into 13:1.
  - type: text
    content: ' on the shore beside the sea.'
  '2':
  - type: text
    content: She was pregnant, and she cried out because of her labor pains and the agony of giving birth.
  '3':
  - type: text
    content: 'Then I witnessed in heaven another significant event. I saw a large red dragon with seven heads and ten horns, with seven crowns on his heads. '
  '4':
  - type: text
    content: His tail swept away one-third of the stars in the sky, and he threw them to the earth. He stood in front of the woman as she was about to give birth, ready to devour her baby as soon as it was born.
  '5':
  - type: text
    content: 'She gave birth to a son who was to rule all nations with an iron rod. And her child was snatched away from the dragon and was caught up to God and to his throne. '
  '6':
  - type: text
    content: And the woman fled into the wilderness, where God had prepared a place to care for her for 1,260 days.
  '7':
  - type: text
    content: 'Then there was war in heaven. Michael and his angels fought against the dragon and his angels. '
  '8':
  - type: text
    content: 'And the dragon lost the battle, and he and his angels were forced out of heaven. '
  '9':
  - type: text
    content: This great dragon—the ancient serpent called the devil, or Satan, the one deceiving the whole world—was thrown down to the earth with all his angels.
