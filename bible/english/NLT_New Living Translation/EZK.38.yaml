document_id: EZK.38
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message for Gog
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is another message that came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, turn and face Gog of the land of Magog, the prince who rules over the nations of Meshech and Tubal, and prophesy against him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Give him this message from the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': Gog, I am your enemy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I will turn you around and put hooks in your jaws to lead you out with your whole army—your horses and charioteers in full armor and a great horde armed with shields and swords. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Persia, Ethiopia, and Libya
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Paras, Cush, and Put.
    marker-yv: yv-n
  - type: text
    text: ' will join you, too, with all their weapons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Gomer and all its armies will also join you, along with the armies of Beth-togarmah from the distant north, and many others.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Get ready; be prepared! Keep all the armies around you mobilized, and take command of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'A long time from now you will be called into action. In the distant future you will swoop down on the land of Israel, which will be enjoying peace after recovering from war and after its people have returned from many lands to the mountains of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You and all your allies—a vast and awesome army—will roll down on them like a storm and cover the land like a cloud.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: At that time evil thoughts will come to your mind, and you will devise a wicked scheme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'You will say, ‘Israel is an unprotected land filled with unwalled villages! I will march against her and destroy these people who live in such confidence! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I will go to those formerly desolate cities that are now filled with people who have returned from exile in many nations. I will capture vast amounts of plunder, for the people are rich with livestock and other possessions now. They think the whole world revolves around them!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But Sheba and Dedan and the merchants of Tarshish will ask, ‘Do you really think the armies you have gathered can rob them of silver and gold? Do you think you can drive away their livestock and seize their goods and carry off plunder?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“Therefore, son of man, prophesy against Gog. Give him this message from the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': When my people are living in peace in their land, then you will rouse yourself.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: then you will know.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'You will come from your homeland in the distant north with your vast cavalry and your mighty army, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and you will attack my people Israel, covering their land like a cloud. At that time in the distant future, I will bring you against my land as everyone watches, and my holiness will be displayed by what happens to you, Gog. Then all the nations will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' asks: Are you the one I was talking about long ago, when I announced through Israel’s prophets that in the future I would bring you against my people? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: When Gog invades the land of Israel, my fury will boil over! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'In my jealousy and blazing anger, I promise a mighty shaking in the land of Israel on that day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'All living things—the fish in the sea, the birds of the sky, the animals of the field, the small animals that scurry along the ground, and all the people on earth—will quake in terror at my presence. Mountains will be thrown down; cliffs will crumble; walls will fall to the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I will summon the sword against you on all the hills of Israel, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. Your men will turn their swords against each other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I will punish you and your armies with disease and bloodshed; I will send torrential rain, hailstones, fire, and burning sulfur! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'In this way, I will show my greatness and holiness, and I will make myself known to all the nations of the world. Then they will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
