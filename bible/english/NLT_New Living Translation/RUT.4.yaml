document_id: RUT.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Boaz Marries Ruth
  - type: text
    content: 'Boaz went to the town gate and took a seat there. Just then the family redeemer he had mentioned came by, so Boaz called out to him, “Come over here and sit down, friend. I want to talk to you.” So they sat down together. '
  '10':
  - type: text
    content: And with the land I have acquired Ruth, the Moabite widow of Mahlon, to be my wife. This way she can have a son to carry on the family name of her dead husband and to inherit the family property here in his hometown. You are all witnesses today.”
  '11':
  - type: text
    content: 'Then the elders and all the people standing in the gate replied, “We are witnesses! May the '
  - type: text
    content: Lord
  - type: text
    content: ' make this woman who is coming into your home like Rachel and Leah, from whom all the nation of Israel descended! May you prosper in Ephrathah and be famous in Bethlehem. '
  '12':
  - type: text
    content: 'And may the '
  - type: text
    content: Lord
  - type: text
    content: ' give you descendants by this young woman who will be like those of our ancestor Perez, the son of Tamar and Judah.”'
  - type: heading
    content: The Descendants of Boaz
  '13':
  - type: text
    content: 'So Boaz took Ruth into his home, and she became his wife. When he slept with her, the '
  - type: text
    content: Lord
  - type: text
    content: ' enabled her to become pregnant, and she gave birth to a son. '
  '14':
  - type: text
    content: 'Then the women of the town said to Naomi, “Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', who has now provided a redeemer for your family! May this child be famous in Israel. '
  '15':
  - type: text
    content: May he restore your youth and care for you in your old age. For he is the son of your daughter-in-law who loves you and has been better to you than seven sons!”
  '16':
  - type: text
    content: 'Naomi took the baby and cuddled him to her breast. And she cared for him as if he were her own. '
  '17':
  - type: text
    content: The neighbor women said, “Now at last Naomi has a son again!” And they named him Obed. He became the father of Jesse and the grandfather of David.
  '18':
  - type: text
    content: 'This is the genealogical record of their ancestor Perez:'
  - type: text
    content: Perez was the father of Hezron.
  '19':
  - type: text
    content: Hezron was the father of Ram.
  - type: text
    content: Ram was the father of Amminadab.
  '2':
  - type: text
    content: 'Then Boaz called ten leaders from the town and asked them to sit as witnesses. '
  '20':
  - type: text
    content: Amminadab was the father of Nahshon.
  - type: text
    content: Nahshon was the father of Salmon.
  - type: note
    content: As in some Greek manuscripts (see also 4:21); Hebrew reads Salma.
  '21':
  - type: text
    content: Salmon was the father of Boaz.
  - type: text
    content: Boaz was the father of Obed.
  '22':
  - type: text
    content: Obed was the father of Jesse.
  - type: text
    content: Jesse was the father of David.
  '3':
  - type: text
    content: 'And Boaz said to the family redeemer, “You know Naomi, who came back from Moab. She is selling the land that belonged to our relative Elimelech. '
  '4':
  - type: text
    content: I thought I should speak to you about it so that you can redeem it if you wish. If you want the land, then buy it here in the presence of these witnesses. But if you don’t want it, let me know right away, because I am next in line to redeem it after you.”
  - type: text
    content: The man replied, “All right, I’ll redeem it.”
  '5':
  - type: text
    content: Then Boaz told him, “Of course, your purchase of the land from Naomi also requires that you marry Ruth, the Moabite widow. That way she can have children who will carry on her husband’s name and keep the land in the family.”
  '6':
  - type: text
    content: “Then I can’t redeem it,” the family redeemer replied, “because this might endanger my own estate. You redeem the land; I cannot do it.”
  '7':
  - type: text
    content: 'Now in those days it was the custom in Israel for anyone transferring a right of purchase to remove his sandal and hand it to the other party. This publicly validated the transaction. '
  '8':
  - type: text
    content: So the other family redeemer drew off his sandal as he said to Boaz, “You buy the land.”
  '9':
  - type: text
    content: 'Then Boaz said to the elders and to the crowd standing around, “You are witnesses that today I have bought from Naomi all the property of Elimelech, Kilion, and Mahlon. '
