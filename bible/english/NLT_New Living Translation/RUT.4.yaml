document_id: RUT.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Boaz Marries Ruth
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Boaz went to the town gate and took a seat there. Just then the family redeemer he had mentioned came by, so Boaz called out to him, “Come over here and sit down, friend. I want to talk to you.” So they sat down together. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Boaz called ten leaders from the town and asked them to sit as witnesses. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Boaz said to the family redeemer, “You know Naomi, who came back from Moab. She is selling the land that belonged to our relative Elimelech. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I thought I should speak to you about it so that you can redeem it if you wish. If you want the land, then buy it here in the presence of these witnesses. But if you don’t want it, let me know right away, because I am next in line to redeem it after you.”
- type: usfm
  marker: p
  children:
  - type: text
    text: The man replied, “All right, I’ll redeem it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then Boaz told him, “Of course, your purchase of the land from Naomi also requires that you marry Ruth, the Moabite widow. That way she can have children who will carry on her husband’s name and keep the land in the family.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Then I can’t redeem it,” the family redeemer replied, “because this might endanger my own estate. You redeem the land; I cannot do it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now in those days it was the custom in Israel for anyone transferring a right of purchase to remove his sandal and hand it to the other party. This publicly validated the transaction. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So the other family redeemer drew off his sandal as he said to Boaz, “You buy the land.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Boaz said to the elders and to the crowd standing around, “You are witnesses that today I have bought from Naomi all the property of Elimelech, Kilion, and Mahlon. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And with the land I have acquired Ruth, the Moabite widow of Mahlon, to be my wife. This way she can have a son to carry on the family name of her dead husband and to inherit the family property here in his hometown. You are all witnesses today.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then the elders and all the people standing in the gate replied, “We are witnesses! May the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' make this woman who is coming into your home like Rachel and Leah, from whom all the nation of Israel descended! May you prosper in Ephrathah and be famous in Bethlehem. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And may the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' give you descendants by this young woman who will be like those of our ancestor Perez, the son of Tamar and Judah.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Descendants of Boaz
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So Boaz took Ruth into his home, and she became his wife. When he slept with her, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' enabled her to become pregnant, and she gave birth to a son. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then the women of the town said to Naomi, “Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who has now provided a redeemer for your family! May this child be famous in Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: May he restore your youth and care for you in your old age. For he is the son of your daughter-in-law who loves you and has been better to you than seven sons!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Naomi took the baby and cuddled him to her breast. And she cared for him as if he were her own. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The neighbor women said, “Now at last Naomi has a son again!” And they named him Obed. He became the father of Jesse and the grandfather of David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'This is the genealogical record of their ancestor Perez:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Perez was the father of Hezron.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hezron was the father of Ram.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ram was the father of Amminadab.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Amminadab was the father of Nahshon.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Nahshon was the father of Salmon.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Greek manuscripts (see also 4:21); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Salma.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Salmon was the father of Boaz.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Boaz was the father of Obed.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Obed was the father of Jesse.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jesse was the father of David.
