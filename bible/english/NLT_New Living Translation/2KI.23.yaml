document_id: 2KI.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josiah’s Religious Reforms
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the king summoned all the elders of Judah and Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the king went up to the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with all the people of Judah and Jerusalem, along with the priests and the prophets—all the people from the least to the greatest. There the king read to them the entire Book of the Covenant that had been found in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The king took his place of authority beside the pillar and renewed the covenant in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s presence. He pledged to obey the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' by keeping all his commands, laws, and decrees with all his heart and soul. In this way, he confirmed all the terms of the covenant that were written in the scroll, and all the people pledged themselves to the covenant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the king instructed Hilkiah the high priest and the priests of the second rank and the Temple gatekeepers to remove from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple all the articles that were used to worship Baal, Asherah, and all the powers of the heavens. The king had all these things burned outside Jerusalem on the terraces of the Kidron Valley, and he carried the ashes away to Bethel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He did away with the idolatrous priests, who had been appointed by the previous kings of Judah, for they had offered sacrifices at the pagan shrines throughout Judah and even in the vicinity of Jerusalem. They had also offered sacrifices to Baal, and to the sun, the moon, the constellations, and to all the powers of the heavens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The king removed the Asherah pole from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple and took it outside Jerusalem to the Kidron Valley, where he burned it. Then he ground the ashes of the pole to dust and threw the dust over the graves of the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He also tore down the living quarters of the male and female shrine prostitutes that were inside the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', where the women wove coverings for the Asherah pole.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Josiah brought to Jerusalem all the priests who were living in other towns of Judah. He also defiled the pagan shrines, where they had offered sacrifices—all the way from Geba to Beersheba. He destroyed the shrines at the entrance to the gate of Joshua, the governor of Jerusalem. This gate was located to the left of the city gate as one enters the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The priests who had served at the pagan shrines were not allowed to serve at
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: did not come up to.
    marker-yv: yv-n
  - type: text
    text: ' the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s altar in Jerusalem, but they were allowed to eat unleavened bread with the other priests.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then the king defiled the altar of Topheth in the valley of Ben-Hinnom, so no one could ever again use it to sacrifice a son or daughter in the fire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to make a son or daughter pass through the fire.
    marker-yv: yv-n
  - type: text
    text: ' as an offering to Molech. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He removed from the entrance of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple the horse statues that the former kings of Judah had dedicated to the sun. They were near the quarters of Nathan-melech the eunuch, an officer of the court.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' The king also burned the chariots dedicated to the sun.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Josiah tore down the altars that the kings of Judah had built on the palace roof above the upper room of Ahaz. The king destroyed the altars that Manasseh had built in the two courtyards of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple. He smashed them to bits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: He quickly removed them.
    marker-yv: yv-n
  - type: text
    text: ' and scattered the pieces in the Kidron Valley. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The king also desecrated the pagan shrines east of Jerusalem, to the south of the Mount of Corruption, where King Solomon of Israel had built shrines for Ashtoreth, the detestable goddess of the Sidonians; and for Chemosh, the detestable god of the Moabites; and for Molech,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Milcom, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Molech.
    marker-yv: yv-n
  - type: text
    text: ' the vile god of the Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He smashed the sacred pillars and cut down the Asherah poles. Then he desecrated these places by scattering human bones over them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The king also tore down the altar at Bethel—the pagan shrine that Jeroboam son of Nebat had made when he caused Israel to sin. He burned down the shrine and ground it to dust, and he burned the Asherah pole. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Josiah turned around and noticed several tombs in the side of the hill. He ordered that the bones be brought out, and he burned them on the altar at Bethel to desecrate it. (This happened just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had promised through the man of God when Jeroboam stood beside the altar at the festival.)'
- type: usfm
  marker: p
  children:
  - type: text
    text: Then Josiah turned and looked up at the tomb of the man of God
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: when Jeroboam stood beside the altar at the festival. Then Josiah turned and looked up at the tomb of the man of God.
    marker-yv: yv-n
  - type: text
    text: ' who had predicted these things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “What is that monument over there?” Josiah asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: And the people of the town told him, “It is the tomb of the man of God who came from Judah and predicted the very things that you have just done to the altar at Bethel!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Josiah replied, “Leave it alone. Don’t disturb his bones.” So they did not burn his bones or those of the old prophet from Samaria.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Josiah demolished all the buildings at the pagan shrines in the towns of Samaria, just as he had done at Bethel. They had been built by the various kings of Israel and had made the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions and Latin Vulgate; Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' very angry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He executed the priests of the pagan shrines on their own altars, and he burned human bones on the altars to desecrate them. Finally, he returned to Jerusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josiah Celebrates Passover
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'King Josiah then issued this order to all the people: “You must celebrate the Passover to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, as required in this Book of the Covenant.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'There had not been a Passover celebration like that since the time when the judges ruled in Israel, nor throughout all the years of the kings of Israel and Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But in the eighteenth year of King Josiah’s reign, this Passover was celebrated to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Josiah also got rid of the mediums and psychics, the household gods, the idols,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term (literally '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: round things
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) probably alludes to dung.
    marker-yv: yv-n
  - type: text
    text: ' and every other kind of detestable practice, both in Jerusalem and throughout the land of Judah. He did this in obedience to the laws written in the scroll that Hilkiah the priest had found in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Never before had there been a king like Josiah, who turned to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with all his heart and soul and strength, obeying all the laws of Moses. And there has never been a king like him since.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Even so, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was very angry with Judah because of all the wicked things Manasseh had done to provoke him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “I will also banish Judah from my presence just as I have banished Israel. And I will reject my chosen city of Jerusalem and the Temple where my name was to be honored.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The rest of the events in Josiah’s reign and all his deeds are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: While Josiah was king, Pharaoh Neco, king of Egypt, went to the Euphrates River to help the king of Assyria. King Josiah and his army marched out to fight him,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:29a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Josiah went out to meet him.
    marker-yv: yv-n
  - type: text
    text: ' but King Neco'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:29b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he.
    marker-yv: yv-n
  - type: text
    text: ' killed him when they met at Megiddo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Josiah’s officers took his body back in a chariot from Megiddo to Jerusalem and buried him in his own tomb. Then the people of the land anointed Josiah’s son Jehoahaz and made him the next king.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoahaz Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jehoahaz was twenty-three years old when he became king, and he reigned in Jerusalem three months. His mother was Hamutal, the daughter of Jeremiah from Libnah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'He did what was evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s sight, just as his ancestors had done.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Pharaoh Neco put Jehoahaz in prison at Riblah in the land of Hamath to prevent him from ruling
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:33a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' in Jerusalem. He also demanded that Judah pay 7,500 pounds of silver and 75 pounds of gold'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:33b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '100 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3,400 kilograms] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of silver and 1 talent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[34 kilograms] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of gold.
    marker-yv: yv-n
  - type: text
    text: ' as tribute.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoiakim Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Pharaoh Neco then installed Eliakim, another of Josiah’s sons, to reign in place of his father, and he changed Eliakim’s name to Jehoiakim. Jehoahaz was taken to Egypt as a prisoner, where he died.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: In order to get the silver and gold demanded as tribute by Pharaoh Neco, Jehoiakim collected a tax from the people of Judah, requiring them to pay in proportion to their wealth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Jehoiakim was twenty-five years old when he became king, and he reigned in Jerusalem eleven years. His mother was Zebidah, the daughter of Pedaiah from Rumah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'He did what was evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s sight, just as his ancestors had done.
