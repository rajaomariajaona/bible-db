document_id: 2KI.23,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Josiah’s Religious Reforms
  - type: text
    content: 'Then the king summoned all the elders of Judah and Jerusalem. '
  '10':
  - type: text
    content: Then the king defiled the altar of Topheth in the valley of Ben-Hinnom, so no one could ever again use it to sacrifice a son or daughter in the fire
  - type: note
    content: Or to make a son or daughter pass through the fire.
  - type: text
    content: ' as an offering to Molech. '
  '11':
  - type: text
    content: 'He removed from the entrance of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple the horse statues that the former kings of Judah had dedicated to the sun. They were near the quarters of Nathan-melech the eunuch, an officer of the court.
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' The king also burned the chariots dedicated to the sun.'
  '12':
  - type: text
    content: 'Josiah tore down the altars that the kings of Judah had built on the palace roof above the upper room of Ahaz. The king destroyed the altars that Manasseh had built in the two courtyards of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple. He smashed them to bits
  - type: note
    content: Or He quickly removed them.
  - type: text
    content: ' and scattered the pieces in the Kidron Valley. '
  '13':
  - type: text
    content: The king also desecrated the pagan shrines east of Jerusalem, to the south of the Mount of Corruption, where King Solomon of Israel had built shrines for Ashtoreth, the detestable goddess of the Sidonians; and for Chemosh, the detestable god of the Moabites; and for Molech,
  - type: note
    content: Hebrew Milcom, a variant spelling of Molech.
  - type: text
    content: ' the vile god of the Ammonites. '
  '14':
  - type: text
    content: He smashed the sacred pillars and cut down the Asherah poles. Then he desecrated these places by scattering human bones over them.
  '15':
  - type: text
    content: 'The king also tore down the altar at Bethel—the pagan shrine that Jeroboam son of Nebat had made when he caused Israel to sin. He burned down the shrine and ground it to dust, and he burned the Asherah pole. '
  '16':
  - type: text
    content: 'Then Josiah turned around and noticed several tombs in the side of the hill. He ordered that the bones be brought out, and he burned them on the altar at Bethel to desecrate it. (This happened just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had promised through the man of God when Jeroboam stood beside the altar at the festival.)'
  - type: text
    content: Then Josiah turned and looked up at the tomb of the man of God
  - type: note
    content: As in Greek version; Hebrew lacks when Jeroboam stood beside the altar at the festival. Then Josiah turned and looked up at the tomb of the man of God.
  - type: text
    content: ' who had predicted these things. '
  '17':
  - type: text
    content: “What is that monument over there?” Josiah asked.
  - type: text
    content: And the people of the town told him, “It is the tomb of the man of God who came from Judah and predicted the very things that you have just done to the altar at Bethel!”
  '18':
  - type: text
    content: Josiah replied, “Leave it alone. Don’t disturb his bones.” So they did not burn his bones or those of the old prophet from Samaria.
  '19':
  - type: text
    content: 'Then Josiah demolished all the buildings at the pagan shrines in the towns of Samaria, just as he had done at Bethel. They had been built by the various kings of Israel and had made the '
  - type: text
    content: Lord
  - type: note
    content: As in Greek and Syriac versions and Latin Vulgate; Hebrew lacks the Lord.
  - type: text
    content: ' very angry. '
  '2':
  - type: text
    content: 'And the king went up to the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' with all the people of Judah and Jerusalem, along with the priests and the prophets—all the people from the least to the greatest. There the king read to them the entire Book of the Covenant that had been found in the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple. '
  '20':
  - type: text
    content: He executed the priests of the pagan shrines on their own altars, and he burned human bones on the altars to desecrate them. Finally, he returned to Jerusalem.
  - type: heading
    content: Josiah Celebrates Passover
  '21':
  - type: text
    content: 'King Josiah then issued this order to all the people: “You must celebrate the Passover to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, as required in this Book of the Covenant.” '
  '22':
  - type: text
    content: 'There had not been a Passover celebration like that since the time when the judges ruled in Israel, nor throughout all the years of the kings of Israel and Judah. '
  '23':
  - type: text
    content: 'But in the eighteenth year of King Josiah’s reign, this Passover was celebrated to the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem.'
  '24':
  - type: text
    content: Josiah also got rid of the mediums and psychics, the household gods, the idols,
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung.
  - type: text
    content: ' and every other kind of detestable practice, both in Jerusalem and throughout the land of Judah. He did this in obedience to the laws written in the scroll that Hilkiah the priest had found in the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple. '
  '25':
  - type: text
    content: 'Never before had there been a king like Josiah, who turned to the '
  - type: text
    content: Lord
  - type: text
    content: ' with all his heart and soul and strength, obeying all the laws of Moses. And there has never been a king like him since.'
  '26':
  - type: text
    content: 'Even so, the '
  - type: text
    content: Lord
  - type: text
    content: ' was very angry with Judah because of all the wicked things Manasseh had done to provoke him. '
  '27':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “I will also banish Judah from my presence just as I have banished Israel. And I will reject my chosen city of Jerusalem and the Temple where my name was to be honored.”'
  '28':
  - type: text
    content: 'The rest of the events in Josiah’s reign and all his deeds are recorded in '
  - type: text
    content: The Book of the History of the Kings of Judah.
  '29':
  - type: text
    content: While Josiah was king, Pharaoh Neco, king of Egypt, went to the Euphrates River to help the king of Assyria. King Josiah and his army marched out to fight him,
  - type: note
    content: Or Josiah went out to meet him.
  - type: text
    content: ' but King Neco'
  - type: note
    content: Hebrew he.
  - type: text
    content: ' killed him when they met at Megiddo. '
  '3':
  - type: text
    content: 'The king took his place of authority beside the pillar and renewed the covenant in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence. He pledged to obey the '
  - type: text
    content: Lord
  - type: text
    content: ' by keeping all his commands, laws, and decrees with all his heart and soul. In this way, he confirmed all the terms of the covenant that were written in the scroll, and all the people pledged themselves to the covenant.'
  '30':
  - type: text
    content: Josiah’s officers took his body back in a chariot from Megiddo to Jerusalem and buried him in his own tomb. Then the people of the land anointed Josiah’s son Jehoahaz and made him the next king.
  - type: heading
    content: Jehoahaz Rules in Judah
  '31':
  - type: text
    content: 'Jehoahaz was twenty-three years old when he became king, and he reigned in Jerusalem three months. His mother was Hamutal, the daughter of Jeremiah from Libnah. '
  '32':
  - type: text
    content: 'He did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight, just as his ancestors had done.
  '33':
  - type: text
    content: Pharaoh Neco put Jehoahaz in prison at Riblah in the land of Hamath to prevent him from ruling
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' in Jerusalem. He also demanded that Judah pay 7,500 pounds of silver and 75 pounds of gold'
  - type: note
    content: Hebrew 100 talents [3,400 kilograms] of silver and 1 talent [34 kilograms] of gold.
  - type: text
    content: ' as tribute.'
  - type: heading
    content: Jehoiakim Rules in Judah
  '34':
  - type: text
    content: Pharaoh Neco then installed Eliakim, another of Josiah’s sons, to reign in place of his father, and he changed Eliakim’s name to Jehoiakim. Jehoahaz was taken to Egypt as a prisoner, where he died.
  '35':
  - type: text
    content: In order to get the silver and gold demanded as tribute by Pharaoh Neco, Jehoiakim collected a tax from the people of Judah, requiring them to pay in proportion to their wealth.
  '36':
  - type: text
    content: 'Jehoiakim was twenty-five years old when he became king, and he reigned in Jerusalem eleven years. His mother was Zebidah, the daughter of Pedaiah from Rumah. '
  '37':
  - type: text
    content: 'He did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight, just as his ancestors had done.
  '4':
  - type: text
    content: 'Then the king instructed Hilkiah the high priest and the priests of the second rank and the Temple gatekeepers to remove from the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple all the articles that were used to worship Baal, Asherah, and all the powers of the heavens. The king had all these things burned outside Jerusalem on the terraces of the Kidron Valley, and he carried the ashes away to Bethel. '
  '5':
  - type: text
    content: 'He did away with the idolatrous priests, who had been appointed by the previous kings of Judah, for they had offered sacrifices at the pagan shrines throughout Judah and even in the vicinity of Jerusalem. They had also offered sacrifices to Baal, and to the sun, the moon, the constellations, and to all the powers of the heavens. '
  '6':
  - type: text
    content: 'The king removed the Asherah pole from the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple and took it outside Jerusalem to the Kidron Valley, where he burned it. Then he ground the ashes of the pole to dust and threw the dust over the graves of the people. '
  '7':
  - type: text
    content: 'He also tore down the living quarters of the male and female shrine prostitutes that were inside the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', where the women wove coverings for the Asherah pole.'
  '8':
  - type: text
    content: 'Josiah brought to Jerusalem all the priests who were living in other towns of Judah. He also defiled the pagan shrines, where they had offered sacrifices—all the way from Geba to Beersheba. He destroyed the shrines at the entrance to the gate of Joshua, the governor of Jerusalem. This gate was located to the left of the city gate as one enters the city. '
  '9':
  - type: text
    content: The priests who had served at the pagan shrines were not allowed to serve at
  - type: note
    content: Hebrew did not come up to.
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ’s altar in Jerusalem, but they were allowed to eat unleavened bread with the other priests.
