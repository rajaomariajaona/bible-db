document_id: HAG.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The New Temple’s Diminished Splendor
  - type: text
    content: Then on October 17 of that same year,
  - type: note
    content: Hebrew on the twenty-first day of the seventh month, of the ancient Hebrew lunar calendar. This event (in the second year of Darius’s reign) occurred on October 17, 520 b.c.; also see note on 1:1a.
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' sent another message through the prophet Haggai. '
  '10':
  - type: text
    content: On December 18
  - type: note
    content: Hebrew On the twenty-fourth day of the ninth month, of the ancient Hebrew lunar calendar (similarly in 2:18). This event occurred on December 18, 520 b.c.; also see note on 1:1a.
  - type: text
    content: ' of the second year of King Darius’s reign, the '
  - type: text
    content: Lord
  - type: text
    content: ' sent this message to the prophet Haggai: '
  '11':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says. Ask the priests this question about the law: '
  '12':
  - type: text
    content: ‘If one of you is carrying some meat from a holy sacrifice in his robes and his robe happens to brush against some bread or stew, wine or olive oil, or any other kind of food, will it also become holy?’”
  - type: text
    content: The priests replied, “No.”
  '13':
  - type: text
    content: Then Haggai asked, “If someone becomes ceremonially unclean by touching a dead person and then touches any of these foods, will the food be defiled?”
  - type: text
    content: And the priests answered, “Yes.”
  '14':
  - type: text
    content: 'Then Haggai responded, “That is how it is with this people and this nation, says the '
  - type: text
    content: Lord
  - type: text
    content: '. Everything they do and everything they offer is defiled by their sin. '
  '15':
  - type: text
    content: 'Look at what was happening to you before you began to lay the foundation of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple. '
  '16':
  - type: text
    content: 'When you hoped for a twenty-bushel crop, you harvested only ten. When you expected to draw fifty gallons from the winepress, you found only twenty. '
  '17':
  - type: text
    content: 'I sent blight and mildew and hail to destroy everything you worked so hard to produce. Even so, you refused to return to me, says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '18':
  - type: text
    content: “Think about this eighteenth day of December, the day
  - type: note
    content: Or On this eighteenth day of December, think about the day.
  - type: text
    content: ' when the foundation of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple was laid. Think carefully. '
  '19':
  - type: text
    content: I am giving you a promise now while the seed is still in the barn.
  - type: note
    content: Hebrew Is the seed yet in the barn?
  - type: text
    content: ' You have not yet harvested your grain, and your grapevines, fig trees, pomegranates, and olive trees have not yet produced their crops. But from this day onward I will bless you.”'
  - type: heading
    content: Promises for Zerubbabel
  '2':
  - type: text
    content: “Say this to Zerubbabel son of Shealtiel, governor of Judah, and to Jeshua
  - type: note
    content: Hebrew Joshua, a variant spelling of Jeshua; also in 2:4.
  - type: text
    content: ' son of Jehozadak, the high priest, and to the remnant of God’s people there in the land: '
  '20':
  - type: text
    content: On that same day, December 18,
  - type: note
    content: Hebrew On the twenty-fourth day of the [ninth] month; see note on 2:10.
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' sent this second message to Haggai: '
  '21':
  - type: text
    content: '“Tell Zerubbabel, the governor of Judah, that I am about to shake the heavens and the earth. '
  '22':
  - type: text
    content: I will overthrow royal thrones and destroy the power of foreign kingdoms. I will overturn their chariots and riders. The horses will fall, and their riders will kill each other.
  '23':
  - type: text
    content: '“But when this happens, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, I will honor you, Zerubbabel son of Shealtiel, my servant. I will make you like a signet ring on my finger, says the '
  - type: text
    content: Lord
  - type: text
    content: ', for I have chosen you. I, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, have spoken!”'
  '3':
  - type: text
    content: '‘Does anyone remember this house—this Temple—in its former splendor? How, in comparison, does it look to you now? It must seem like nothing at all! '
  '4':
  - type: text
    content: 'But now the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Be strong, Zerubbabel. Be strong, Jeshua son of Jehozadak, the high priest. Be strong, all you people still left in the land. And now get to work, for I am with you, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. '
  '5':
  - type: text
    content: My Spirit remains among you, just as I promised when you came out of Egypt. So do not be afraid.’
  '6':
  - type: text
    content: '“For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: In just a little while I will again shake the heavens and the earth, the oceans and the dry land. '
  '7':
  - type: text
    content: 'I will shake all the nations, and the treasures of all the nations will be brought to this Temple. I will fill this place with glory, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. '
  '8':
  - type: text
    content: 'The silver is mine, and the gold is mine, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. '
  '9':
  - type: text
    content: 'The future glory of this Temple will be greater than its past glory, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. And in this place I will bring peace. I, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, have spoken!”'
  - type: heading
    content: Blessings Promised for Obedience
