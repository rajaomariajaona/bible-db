document_id: 1KI.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon’s Officials and Governors
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'King Solomon now ruled over all Israel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and these were his high officials:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Azariah son of Zadok was the priest.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Elihoreph and Ahijah, the sons of Shisha, were court secretaries.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jehoshaphat son of Ahilud was the royal historian.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Benaiah son of Jehoiada was commander of the army.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Zadok and Abiathar were priests.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Azariah son of Nathan was in charge of the district governors.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Zabud son of Nathan, a priest, was a trusted adviser to the king.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ahishar was manager of the palace property.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Adoniram son of Abda was in charge of forced labor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Solomon also had twelve district governors who were over all Israel. They were responsible for providing food for the king’s household. Each of them arranged provisions for one month of the year. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'These are the names of the twelve governors:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ben-hur, in the hill country of Ephraim.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ben-deker, in Makaz, Shaalbim, Beth-shemesh, and Elon-bethhanan.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ben-hesed, in Arubboth, including Socoh and all the land of Hepher.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ben-abinadab, in all of Naphoth-dor.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Naphath-dor, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Naphoth-dor.
    marker-yv: yv-n
  - type: text
    text: ' (He was married to Taphath, one of Solomon’s daughters.)'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Baana son of Ahilud, in Taanach and Megiddo, all of Beth-shan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beth-shean, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Beth-shan; also in 4:12b.
    marker-yv: yv-n
  - type: text
    text: ' near Zarethan below Jezreel, and all the territory from Beth-shan to Abel-meholah and over to Jokmeam.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ben-geber, in Ramoth-gilead, including the Towns of Jair (named for Jair of the tribe of Manasseh
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jair son of Manasseh; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare 1 Chr 2:22.
    marker-yv: yv-n
  - type: text
    text: ) in Gilead, and in the Argob region of Bashan, including sixty large fortified towns with bronze bars on their gates.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ahinadab son of Iddo, in Mahanaim.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ahimaaz, in Naphtali. (He was married to Basemath, another of Solomon’s daughters.)
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Baana son of Hushai, in Asher and in Aloth.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Jehoshaphat son of Paruah, in Issachar.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Shimei son of Ela, in Benjamin.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Geber son of Uri, in the land of Gilead,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:19a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of Gad; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare 4:13.
    marker-yv: yv-n
  - type: text
    text: ' including the territories of King Sihon of the Amorites and King Og of Bashan.'
- type: usfm
  marker: li1
  children:
  - type: text
    text: There was also one governor over the land of Judah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:19b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Greek manuscripts; Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of Judah. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon’s Prosperity and Wisdom
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The people of Judah and Israel were as numerous as the sand on the seashore. They were very contented, with plenty to eat and drink. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:21a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses 4:21-34 are numbered 5:1-14 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: Solomon ruled over all the kingdoms from the Euphrates River
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:21b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the river; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 4:24.
    marker-yv: yv-n
  - type: text
    text: ' in the north to the land of the Philistines and the border of Egypt in the south. The conquered peoples of those lands sent tribute money to Solomon and continued to serve him throughout his lifetime.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The daily food requirements for Solomon’s palace were 150 bushels of choice flour and 300 bushels of meal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '30 cors '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[6.6 kiloliters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of choice flour and 60 cors '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[13.2 kiloliters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of meal.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: also 10 oxen from the fattening pens, 20 pasture-fed cattle, 100 sheep or goats, as well as deer, gazelles, roe deer, and choice poultry.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and fattened geese.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Solomon’s dominion extended over all the kingdoms west of the Euphrates River, from Tiphsah to Gaza. And there was peace on all his borders. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: During the lifetime of Solomon, all of Judah and Israel lived in peace and safety. And from Dan in the north to Beersheba in the south, each family had its own home and garden.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: each family lived under its own grapevine and under its own fig tree.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Solomon had 4,000
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:26a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Greek manuscripts (see also 2 Chr 9:25); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 40,000.
    marker-yv: yv-n
  - type: text
    text: ' stalls for his chariot horses, and he had 12,000 horses.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:26b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 12,000 charioteers.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The district governors faithfully provided food for King Solomon and his court; each made sure nothing was lacking during the month assigned to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: They also brought the necessary barley and straw for the royal horses in the stables.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'God gave Solomon very great wisdom and understanding, and knowledge as vast as the sands of the seashore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'In fact, his wisdom exceeded that of all the wise men of the East and the wise men of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'He was wiser than anyone else, including Ethan the Ezrahite and the sons of Mahol—Heman, Calcol, and Darda. His fame spread throughout all the surrounding nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'He composed some 3,000 proverbs and wrote 1,005 songs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'He could speak with authority about all kinds of plants, from the great cedar of Lebanon to the tiny hyssop that grows from cracks in a wall. He could also speak about animals, birds, small creatures, and fish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: And kings from every nation sent their ambassadors to listen to the wisdom of Solomon.
