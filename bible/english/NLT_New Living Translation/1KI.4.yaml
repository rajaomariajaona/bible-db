document_id: 1KI.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon’s Officials and Governors
  - type: text
    content: 'King Solomon now ruled over all Israel, '
  '10':
  - type: text
    content: Ben-hesed, in Arubboth, including Socoh and all the land of Hepher.
  '11':
  - type: text
    content: Ben-abinadab, in all of Naphoth-dor.
  - type: note
    content: Hebrew Naphath-dor, a variant spelling of Naphoth-dor.
  - type: text
    content: ' (He was married to Taphath, one of Solomon’s daughters.)'
  '12':
  - type: text
    content: Baana son of Ahilud, in Taanach and Megiddo, all of Beth-shan
  - type: note
    content: Hebrew Beth-shean, a variant spelling of Beth-shan; also in 4:12b.
  - type: text
    content: ' near Zarethan below Jezreel, and all the territory from Beth-shan to Abel-meholah and over to Jokmeam.'
  '13':
  - type: text
    content: Ben-geber, in Ramoth-gilead, including the Towns of Jair (named for Jair of the tribe of Manasseh
  - type: note
    content: Hebrew Jair son of Manasseh; compare 1 Chr 2:22.
  - type: text
    content: ) in Gilead, and in the Argob region of Bashan, including sixty large fortified towns with bronze bars on their gates.
  '14':
  - type: text
    content: Ahinadab son of Iddo, in Mahanaim.
  '15':
  - type: text
    content: Ahimaaz, in Naphtali. (He was married to Basemath, another of Solomon’s daughters.)
  '16':
  - type: text
    content: Baana son of Hushai, in Asher and in Aloth.
  '17':
  - type: text
    content: Jehoshaphat son of Paruah, in Issachar.
  '18':
  - type: text
    content: Shimei son of Ela, in Benjamin.
  '19':
  - type: text
    content: Geber son of Uri, in the land of Gilead,
  - type: note
    content: Greek version reads of Gad; compare 4:13.
  - type: text
    content: ' including the territories of King Sihon of the Amorites and King Og of Bashan.'
  - type: text
    content: There was also one governor over the land of Judah.
  - type: note
    content: As in some Greek manuscripts; Hebrew lacks of Judah. The meaning of the Hebrew is uncertain.
  - type: heading
    content: Solomon’s Prosperity and Wisdom
  '2':
  - type: text
    content: 'and these were his high officials:'
  - type: text
    content: Azariah son of Zadok was the priest.
  '20':
  - type: text
    content: 'The people of Judah and Israel were as numerous as the sand on the seashore. They were very contented, with plenty to eat and drink. '
  '21':
  - type: note
    content: Verses 4:21-34 are numbered 5:1-14 in Hebrew text.
  - type: text
    content: Solomon ruled over all the kingdoms from the Euphrates River
  - type: note
    content: Hebrew the river; also in 4:24.
  - type: text
    content: ' in the north to the land of the Philistines and the border of Egypt in the south. The conquered peoples of those lands sent tribute money to Solomon and continued to serve him throughout his lifetime.'
  '22':
  - type: text
    content: The daily food requirements for Solomon’s palace were 150 bushels of choice flour and 300 bushels of meal
  - type: note
    content: Hebrew 30 cors [6.6 kiloliters] of choice flour and 60 cors [13.2 kiloliters] of meal.
  - type: text
    content: '; '
  '23':
  - type: text
    content: also 10 oxen from the fattening pens, 20 pasture-fed cattle, 100 sheep or goats, as well as deer, gazelles, roe deer, and choice poultry.
  - type: note
    content: Or and fattened geese.
  '24':
  - type: text
    content: 'Solomon’s dominion extended over all the kingdoms west of the Euphrates River, from Tiphsah to Gaza. And there was peace on all his borders. '
  '25':
  - type: text
    content: During the lifetime of Solomon, all of Judah and Israel lived in peace and safety. And from Dan in the north to Beersheba in the south, each family had its own home and garden.
  - type: note
    content: Hebrew each family lived under its own grapevine and under its own fig tree.
  '26':
  - type: text
    content: Solomon had 4,000
  - type: note
    content: As in some Greek manuscripts (see also 2 Chr 9:25); Hebrew reads 40,000.
  - type: text
    content: ' stalls for his chariot horses, and he had 12,000 horses.'
  - type: note
    content: Or 12,000 charioteers.
  '27':
  - type: text
    content: 'The district governors faithfully provided food for King Solomon and his court; each made sure nothing was lacking during the month assigned to him. '
  '28':
  - type: text
    content: They also brought the necessary barley and straw for the royal horses in the stables.
  '29':
  - type: text
    content: 'God gave Solomon very great wisdom and understanding, and knowledge as vast as the sands of the seashore. '
  '3':
  - type: text
    content: Elihoreph and Ahijah, the sons of Shisha, were court secretaries.
  - type: text
    content: Jehoshaphat son of Ahilud was the royal historian.
  '30':
  - type: text
    content: 'In fact, his wisdom exceeded that of all the wise men of the East and the wise men of Egypt. '
  '31':
  - type: text
    content: 'He was wiser than anyone else, including Ethan the Ezrahite and the sons of Mahol—Heman, Calcol, and Darda. His fame spread throughout all the surrounding nations. '
  '32':
  - type: text
    content: 'He composed some 3,000 proverbs and wrote 1,005 songs. '
  '33':
  - type: text
    content: 'He could speak with authority about all kinds of plants, from the great cedar of Lebanon to the tiny hyssop that grows from cracks in a wall. He could also speak about animals, birds, small creatures, and fish. '
  '34':
  - type: text
    content: And kings from every nation sent their ambassadors to listen to the wisdom of Solomon.
  '4':
  - type: text
    content: Benaiah son of Jehoiada was commander of the army.
  - type: text
    content: Zadok and Abiathar were priests.
  '5':
  - type: text
    content: Azariah son of Nathan was in charge of the district governors.
  - type: text
    content: Zabud son of Nathan, a priest, was a trusted adviser to the king.
  '6':
  - type: text
    content: Ahishar was manager of the palace property.
  - type: text
    content: Adoniram son of Abda was in charge of forced labor.
  '7':
  - type: text
    content: 'Solomon also had twelve district governors who were over all Israel. They were responsible for providing food for the king’s household. Each of them arranged provisions for one month of the year. '
  '8':
  - type: text
    content: 'These are the names of the twelve governors:'
  - type: text
    content: Ben-hur, in the hill country of Ephraim.
  '9':
  - type: text
    content: Ben-deker, in Makaz, Shaalbim, Beth-shemesh, and Elon-bethhanan.
