document_id: NUM.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Complaints of Miriam and Aaron
  - type: text
    content: 'While they were at Hazeroth, Miriam and Aaron criticized Moses because he had married a Cushite woman. '
  '10':
  - type: text
    content: As the cloud moved from above the Tabernacle, there stood Miriam, her skin as white as snow from leprosy.
  - type: note
    content: Or with a skin disease. The Hebrew word used here can describe various skin diseases.
  - type: text
    content: ' When Aaron saw what had happened to her, '
  '11':
  - type: text
    content: 'he cried out to Moses, “Oh, my master! Please don’t punish us for this sin we have so foolishly committed. '
  '12':
  - type: text
    content: Don’t let her be like a stillborn baby, already decayed at birth.”
  '13':
  - type: text
    content: 'So Moses cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', “O God, I beg you, please heal her!”'
  '14':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “If her father had done nothing more than spit in her face, wouldn’t she be defiled for seven days? So keep her outside the camp for seven days, and after that she may be accepted back.”'
  '15':
  - type: text
    content: 'So Miriam was kept outside the camp for seven days, and the people waited until she was brought back before they traveled again. '
  '16':
  - type: text
    content: Then they left Hazeroth and camped in the wilderness of Paran.
  '2':
  - type: text
    content: 'They said, “Has the '
  - type: text
    content: Lord
  - type: text
    content: ' spoken only through Moses? Hasn’t he spoken through us, too?” But the '
  - type: text
    content: Lord
  - type: text
    content: ' heard them. '
  '3':
  - type: text
    content: (Now Moses was very humble—more humble than any other person on earth.)
  '4':
  - type: text
    content: 'So immediately the '
  - type: text
    content: Lord
  - type: text
    content: ' called to Moses, Aaron, and Miriam and said, “Go out to the Tabernacle,'
  - type: note
    content: Hebrew the Tent of Meeting.
  - type: text
    content: ' all three of you!” So the three of them went to the Tabernacle. '
  '5':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' descended in the pillar of cloud and stood at the entrance of the Tabernacle.'
  - type: note
    content: Hebrew the tent; also in 12:10.
  - type: text
    content: ' “Aaron and Miriam!” he called, and they stepped forward. '
  '6':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to them, “Now listen to what I say:'
  - type: text
    content: “If there were prophets among you,
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', would reveal myself in visions.'
  - type: text
    content: I would speak to them in dreams.
  '7':
  - type: text
    content: But not with my servant Moses.
  - type: text
    content: Of all my house, he is the one I trust.
  '8':
  - type: text
    content: I speak to him face to face,
  - type: text
    content: clearly, and not in riddles!
  - type: text
    content: 'He sees the '
  - type: text
    content: Lord
  - type: text
    content: ' as he is.'
  - type: text
    content: So why were you not afraid
  - type: text
    content: to criticize my servant Moses?”
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' was very angry with them, and he departed. '
