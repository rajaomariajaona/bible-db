document_id: NUM.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Complaints of Miriam and Aaron
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'While they were at Hazeroth, Miriam and Aaron criticized Moses because he had married a Cushite woman. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As the cloud moved from above the Tabernacle, there stood Miriam, her skin as white as snow from leprosy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'with a skin disease. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word used here can describe various skin diseases.
      marker-yv: yv-n
    - type: text
      text: ' When Aaron saw what had happened to her, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he cried out to Moses, “Oh, my master! Please don’t punish us for this sin we have so foolishly committed. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Don’t let her be like a stillborn baby, already decayed at birth.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “O God, I beg you, please heal her!”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “If her father had done nothing more than spit in her face, wouldn’t she be defiled for seven days? So keep her outside the camp for seven days, and after that she may be accepted back.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Miriam was kept outside the camp for seven days, and the people waited until she was brought back before they traveled again. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they left Hazeroth and camped in the wilderness of Paran.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They said, “Has the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoken only through Moses? Hasn’t he spoken through us, too?” But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' heard them. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: (Now Moses was very humble—more humble than any other person on earth.)
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So immediately the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' called to Moses, Aaron, and Miriam and said, “Go out to the Tabernacle,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Tent of Meeting.
      marker-yv: yv-n
    - type: text
      text: ' all three of you!” So the three of them went to the Tabernacle. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' descended in the pillar of cloud and stood at the entrance of the Tabernacle.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the tent; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 12:10.
      marker-yv: yv-n
    - type: text
      text: ' “Aaron and Miriam!” he called, and they stepped forward. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to them, “Now listen to what I say:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If there were prophets among you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', would reveal myself in visions.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would speak to them in dreams.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But not with my servant Moses.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Of all my house, he is the one I trust.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I speak to him face to face,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: clearly, and not in riddles!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He sees the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as he is.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So why were you not afraid
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to criticize my servant Moses?”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was very angry with them, and he departed. '
