document_id: GEN.35
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob’s Return to Bethel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then God said to Jacob, “Get ready and move to Bethel and settle there. Build an altar there to the God who appeared to you when you fled from your brother, Esau.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So Jacob told everyone in his household, “Get rid of all your pagan idols, purify yourselves, and put on clean clothing. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: We are now going to Bethel, where I will build an altar to the God who answered my prayers when I was in distress. He has been with me wherever I have gone.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So they gave Jacob all their pagan idols and earrings, and he buried them under the great tree near Shechem. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: As they set out, a terror from God spread over the people in all the towns of that area, so no one attacked Jacob’s family.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Eventually, Jacob and his household arrived at Luz (also called Bethel) in Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Jacob built an altar there and named the place El-bethel (which means “God of Bethel”), because God had appeared to him there when he was fleeing from his brother, Esau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Soon after this, Rebekah’s old nurse, Deborah, died. She was buried beneath the oak tree in the valley below Bethel. Ever since, the tree has been called Allon-bacuth (which means “oak of weeping”).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now that Jacob had returned from Paddan-aram, God appeared to him again at Bethel. God blessed him, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: saying, “Your name is Jacob, but you will not be called Jacob any longer. From now on your name will be Israel.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:10 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jacob '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sounds like the Hebrew words for “heel” and “deceiver.” '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Israel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “God fights.”
    marker-yv: yv-n
  - type: text
    text: ' So God renamed him Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then God said, “I am El-Shaddai—‘God Almighty.’ Be fruitful and multiply. You will become a great nation, even many nations. Kings will be among your descendants! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And I will give you the land I once gave to Abraham and Isaac. Yes, I will give it to you and your descendants after you.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then God went up from the place where he had spoken to Jacob.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jacob set up a stone pillar to mark the place where God had spoken to him. Then he poured wine over it as an offering to God and anointed the pillar with olive oil. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And Jacob named the place Bethel (which means “house of God”), because God had spoken to him there.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Deaths of Rachel and Isaac
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Leaving Bethel, Jacob and his clan moved on toward Ephrath. But Rachel went into labor while they were still some distance away. Her labor pains were intense. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'After a very hard delivery, the midwife finally exclaimed, “Don’t be afraid—you have another son!” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Rachel was about to die, but with her last breath she named the baby Ben-oni (which means “son of my sorrow”). The baby’s father, however, called him Benjamin (which means “son of my right hand”). '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So Rachel died and was buried on the way to Ephrath (that is, Bethlehem). '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jacob set up a stone monument over Rachel’s grave, and it can be seen there to this day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Israel; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 35:22a. The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
    marker-yv: yv-n
  - type: text
    text: ' traveled on and camped beyond Migdal-eder. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: While he was living there, Reuben had intercourse with Bilhah, his father’s concubine, and Jacob soon heard about it.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'These are the names of the twelve sons of Jacob:'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The sons of Leah were Reuben (Jacob’s oldest son), Simeon, Levi, Judah, Issachar, and Zebulun.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The sons of Rachel were Joseph and Benjamin.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The sons of Bilhah, Rachel’s servant, were Dan and Naphtali.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The sons of Zilpah, Leah’s servant, were Gad and Asher.
- type: usfm
  marker: m
  children:
  - type: text
    text: These are the names of the sons who were born to Jacob at Paddan-aram.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'So Jacob returned to his father, Isaac, in Mamre, which is near Kiriath-arba (now called Hebron), where Abraham and Isaac had both lived as foreigners. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Isaac lived for 180 years. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Then he breathed his last and died at a ripe old age, joining his ancestors in death. And his sons, Esau and Jacob, buried him.
