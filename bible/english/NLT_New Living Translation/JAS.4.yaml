document_id: JAS.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Drawing Close to God
  - type: text
    content: 'What is causing the quarrels and fights among you? Don’t they come from the evil desires at war within you? '
  '10':
  - type: text
    content: Humble yourselves before the Lord, and he will lift you up in honor.
  - type: heading
    content: Warning against Judging Others
  '11':
  - type: text
    content: Don’t speak evil against each other, dear brothers and sisters.
  - type: note
    content: Greek brothers.
  - type: text
    content: ' If you criticize and judge each other, then you are criticizing and judging God’s law. But your job is to obey the law, not to judge whether it applies to you. '
  '12':
  - type: text
    content: God alone, who gave the law, is the Judge. He alone has the power to save or to destroy. So what right do you have to judge your neighbor?
  - type: heading
    content: Warning about Self-Confidence
  '13':
  - type: text
    content: 'Look here, you who say, “Today or tomorrow we are going to a certain town and will stay there a year. We will do business there and make a profit.” '
  '14':
  - type: text
    content: 'How do you know what your life will be like tomorrow? Your life is like the morning fog—it’s here a little while, then it’s gone. '
  '15':
  - type: text
    content: 'What you ought to say is, “If the Lord wants us to, we will live and do this or that.” '
  '16':
  - type: text
    content: Otherwise you are boasting about your own pretentious plans, and all such boasting is evil.
  '17':
  - type: text
    content: Remember, it is sin to know what you ought to do and then not do it.
  '2':
  - type: text
    content: 'You want what you don’t have, so you scheme and kill to get it. You are jealous of what others have, but you can’t get it, so you fight and wage war to take it away from them. Yet you don’t have what you want because you don’t ask God for it. '
  '3':
  - type: text
    content: And even when you ask, you don’t get it because your motives are all wrong—you want only what will give you pleasure.
  '4':
  - type: text
    content: You adulterers!
  - type: note
    content: Greek You adulteresses!
  - type: text
    content: ' Don’t you realize that friendship with the world makes you an enemy of God? I say it again: If you want to be a friend of the world, you make yourself an enemy of God. '
  '5':
  - type: text
    content: Do you think the Scriptures have no meaning? They say that God is passionate that the spirit he has placed within us should be faithful to him.
  - type: note
    content: Or They say that the spirit God has placed within us is filled with envy; or They say that the Holy Spirit, whom God has placed within us, opposes our envy.
  - type: text
    content: ' '
  '6':
  - type: text
    content: And he gives grace generously. As the Scriptures say,
  - type: text
    content: “God opposes the proud
  - type: text
    content: but gives grace to the humble.”
  - type: note
    content: Prov 3:34 (Greek version).
  '7':
  - type: text
    content: 'So humble yourselves before God. Resist the devil, and he will flee from you. '
  '8':
  - type: text
    content: 'Come close to God, and God will come close to you. Wash your hands, you sinners; purify your hearts, for your loyalty is divided between God and the world. '
  '9':
  - type: text
    content: 'Let there be tears for what you have done. Let there be sorrow and deep grief. Let there be sadness instead of laughter, and gloom instead of joy. '
