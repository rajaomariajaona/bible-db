verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Verses 7:1-13 are numbered 7:2-14 in Hebrew text.
  - type: text
    content: How beautiful are your sandaled feet,
  - type: text
    content: O queenly maiden.
  - type: text
    content: Your rounded thighs are like jewels,
  - type: text
    content: the work of a skilled craftsman.
  '10':
  - type: text
    content: I am my lover’s,
  - type: text
    content: and he claims me as his own.
  '11':
  - type: text
    content: Come, my love, let us go out to the fields
  - type: text
    content: and spend the night among the wildflowers.
  - type: note
    content: Or in the villages.
  '12':
  - type: text
    content: Let us get up early and go to the vineyards
  - type: text
    content: to see if the grapevines have budded,
  - type: text
    content: if the blossoms have opened,
  - type: text
    content: and if the pomegranates have bloomed.
  - type: text
    content: There I will give you my love.
  '13':
  - type: text
    content: There the mandrakes give off their fragrance,
  - type: text
    content: and the finest fruits are at our door,
  - type: text
    content: new delights as well as old,
  - type: text
    content: which I have saved for you, my lover.
  '2':
  - type: text
    content: Your navel is perfectly formed
  - type: text
    content: like a goblet filled with mixed wine.
  - type: text
    content: Between your thighs lies a mound of wheat
  - type: text
    content: bordered with lilies.
  '3':
  - type: text
    content: Your breasts are like two fawns,
  - type: text
    content: twin fawns of a gazelle.
  '4':
  - type: text
    content: Your neck is as beautiful as an ivory tower.
  - type: text
    content: Your eyes are like the sparkling pools in Heshbon
  - type: text
    content: by the gate of Bath-rabbim.
  - type: text
    content: Your nose is as fine as the tower of Lebanon
  - type: text
    content: overlooking Damascus.
  '5':
  - type: text
    content: Your head is as majestic as Mount Carmel,
  - type: text
    content: and the sheen of your hair radiates royalty.
  - type: text
    content: The king is held captive by its tresses.
  '6':
  - type: text
    content: Oh, how beautiful you are!
  - type: text
    content: How pleasing, my love, how full of delights!
  '7':
  - type: text
    content: You are slender like a palm tree,
  - type: text
    content: and your breasts are like its clusters of fruit.
  '8':
  - type: text
    content: I said, “I will climb the palm tree
  - type: text
    content: and take hold of its fruit.”
  - type: text
    content: May your breasts be like grape clusters,
  - type: text
    content: and the fragrance of your breath like apples.
  '9':
  - type: text
    content: May your kisses be as exciting as the best wine—
  - type: heading
    content: Young Woman
  - type: text
    content: Yes, wine that goes down smoothly for my lover,
  - type: text
    content: flowing gently over lips and teeth.
  - type: note
    content: As in Greek and Syriac versions and Latin Vulgate; Hebrew reads over lips of sleepers.
