document_id: 1SA.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Hannah’s Prayer of Praise
  - type: text
    content: 'Then Hannah prayed:'
  - type: text
    content: '“My heart rejoices in the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has made me strong.'
  - type: note
    content: Hebrew has exalted my horn.
  - type: text
    content: Now I have an answer for my enemies;
  - type: text
    content: I rejoice because you rescued me.
  '10':
  - type: text
    content: 'Those who fight against the '
  - type: text
    content: Lord
  - type: text
    content: ' will be shattered.'
  - type: text
    content: He thunders against them from heaven;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' judges throughout the earth.'
  - type: text
    content: He gives power to his king;
  - type: text
    content: he increases the strength
  - type: note
    content: Hebrew he exalts the horn.
  - type: text
    content: ' of his anointed one.”'
  '11':
  - type: text
    content: 'Then Elkanah returned home to Ramah without Samuel. And the boy served the '
  - type: text
    content: Lord
  - type: text
    content: ' by assisting Eli the priest.'
  - type: heading
    content: Eli’s Wicked Sons
  '12':
  - type: text
    content: 'Now the sons of Eli were scoundrels who had no respect for the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'or for their duties as priests. Whenever anyone offered a sacrifice, Eli’s sons would send over a servant with a three-pronged fork. While the meat of the sacrificed animal was still boiling, '
  '14':
  - type: text
    content: 'the servant would stick the fork into the pot and demand that whatever it brought up be given to Eli’s sons. All the Israelites who came to worship at Shiloh were treated this way. '
  '15':
  - type: text
    content: Sometimes the servant would come even before the animal’s fat had been burned on the altar. He would demand raw meat before it had been boiled so that it could be used for roasting.
  '16':
  - type: text
    content: 'The man offering the sacrifice might reply, “Take as much as you want, but the fat must be burned first.” Then the servant would demand, “No, give it to me now, or I’ll take it by force.” '
  '17':
  - type: text
    content: 'So the sin of these young men was very serious in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, for they treated the '
  - type: text
    content: Lord
  - type: text
    content: ’s offerings with contempt.
  '18':
  - type: text
    content: 'But Samuel, though he was only a boy, served the '
  - type: text
    content: Lord
  - type: text
    content: . He wore a linen garment like that of a priest.
  - type: note
    content: Hebrew He wore a linen ephod.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Each year his mother made a small coat for him and brought it to him when she came with her husband for the sacrifice. '
  '2':
  - type: text
    content: 'No one is holy like the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: There is no one besides you;
  - type: text
    content: there is no Rock like our God.
  '20':
  - type: text
    content: 'Before they returned home, Eli would bless Elkanah and his wife and say, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' give you other children to take the place of this one she gave to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: As in Dead Sea Scrolls and Greek version; Masoretic Text reads this one he requested of the Lord.
  - type: text
    content: '” '
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed Hannah, and she conceived and gave birth to three sons and two daughters. Meanwhile, Samuel grew up in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '22':
  - type: text
    content: Now Eli was very old, but he was aware of what his sons were doing to the people of Israel. He knew, for instance, that his sons were seducing the young women who assisted at the entrance of the Tabernacle.
  - type: note
    content: Hebrew Tent of Meeting. Some manuscripts lack this entire sentence.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Eli said to them, “I have been hearing reports from all the people about the wicked things you are doing. Why do you keep sinning? '
  '24':
  - type: text
    content: 'You must stop, my sons! The reports I hear among the '
  - type: text
    content: Lord
  - type: text
    content: '’s people are not good. '
  '25':
  - type: text
    content: If someone sins against another person, God
  - type: note
    content: Or the judges.
  - type: text
    content: ' can mediate for the guilty party. But if someone sins against the '
  - type: text
    content: Lord
  - type: text
    content: ', who can intercede?” But Eli’s sons wouldn’t listen to their father, for the '
  - type: text
    content: Lord
  - type: text
    content: ' was already planning to put them to death.'
  '26':
  - type: text
    content: 'Meanwhile, the boy Samuel grew taller and grew in favor with the '
  - type: text
    content: Lord
  - type: text
    content: ' and with the people.'
  - type: heading
    content: A Warning for Eli’s Family
  '27':
  - type: text
    content: 'One day a man of God came to Eli and gave him this message from the '
  - type: text
    content: Lord
  - type: text
    content: ': “I revealed myself'
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads Did I reveal myself.
  - type: text
    content: ' to your ancestors when they were Pharaoh’s slaves in Egypt. '
  '28':
  - type: text
    content: I chose your ancestor Aaron
  - type: note
    content: Hebrew your father.
  - type: text
    content: ' from among all the tribes of Israel to be my priest, to offer sacrifices on my altar, to burn incense, and to wear the priestly vest'
  - type: note
    content: Hebrew an ephod.
  - type: text
    content: ' as he served me. And I assigned the sacrificial offerings to you priests. '
  '29':
  - type: text
    content: So why do you scorn my sacrifices and offerings? Why do you give your sons more honor than you give me—for you and they have become fat from the best offerings of my people Israel!
  '3':
  - type: text
    content: “Stop acting so proud and haughty!
  - type: text
    content: Don’t speak with such arrogance!
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is a God who knows what you have done;'
  - type: text
    content: he will judge your actions.
  '30':
  - type: text
    content: '“Therefore, the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: I promised that your branch of the tribe of Levi'
  - type: note
    content: Hebrew that your house and your father’s house.
  - type: text
    content: ' would always be my priests. But I will honor those who honor me, and I will despise those who think lightly of me. '
  '31':
  - type: text
    content: 'The time is coming when I will put an end to your family, so it will no longer serve as my priests. All the members of your family will die before their time. None will reach old age. '
  '32':
  - type: text
    content: 'You will watch with envy as I pour out prosperity on the people of Israel. But no members of your family will ever live out their days. '
  '33':
  - type: text
    content: The few not cut off from serving at my altar will survive, but only so their eyes can go blind and their hearts break, and their children will die a violent death.
  - type: note
    content: As in Dead Sea Scrolls and Greek version, which read die by the sword; Masoretic Text reads die like mortals.
  - type: text
    content: ' '
  '34':
  - type: text
    content: And to prove that what I have said will come true, I will cause your two sons, Hophni and Phinehas, to die on the same day!
  '35':
  - type: text
    content: '“Then I will raise up a faithful priest who will serve me and do what I desire. I will establish his family, and they will be priests to my anointed kings forever. '
  '36':
  - type: text
    content: Then all of your surviving family will bow before him, begging for money and food. ‘Please,’ they will say, ‘give us jobs among the priests so we will have enough to eat.’”
  '4':
  - type: text
    content: The bow of the mighty is now broken,
  - type: text
    content: and those who stumbled are now strong.
  '5':
  - type: text
    content: Those who were well fed are now starving,
  - type: text
    content: and those who were starving are now full.
  - type: text
    content: The childless woman now has seven children,
  - type: text
    content: and the woman with many children wastes away.
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gives both death and life;'
  - type: text
    content: he brings some down to the grave
  - type: note
    content: Hebrew to Sheol.
  - type: text
    content: ' but raises others up.'
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' makes some poor and others rich;'
  - type: text
    content: he brings some down and lifts others up.
  '8':
  - type: text
    content: He lifts the poor from the dust
  - type: text
    content: and the needy from the garbage dump.
  - type: text
    content: He sets them among princes,
  - type: text
    content: placing them in seats of honor.
  - type: text
    content: 'For all the earth is the '
  - type: text
    content: Lord
  - type: text
    content: ’s,
  - type: text
    content: and he has set the world in order.
  '9':
  - type: text
    content: “He will protect his faithful ones,
  - type: text
    content: but the wicked will disappear in darkness.
  - type: text
    content: No one will succeed by strength alone.
