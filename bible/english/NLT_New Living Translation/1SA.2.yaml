document_id: 1SA.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hannah’s Prayer of Praise
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Hannah prayed:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“My heart rejoices in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has made me strong.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: has exalted my horn.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I have an answer for my enemies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I rejoice because you rescued me.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Those who fight against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be shattered.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He thunders against them from heaven;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' judges throughout the earth.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gives power to his king;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he increases the strength
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he exalts the horn.
      marker-yv: yv-n
    - type: text
      text: ' of his anointed one.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Elkanah returned home to Ramah without Samuel. And the boy served the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by assisting Eli the priest.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Eli’s Wicked Sons
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now the sons of Eli were scoundrels who had no respect for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'or for their duties as priests. Whenever anyone offered a sacrifice, Eli’s sons would send over a servant with a three-pronged fork. While the meat of the sacrificed animal was still boiling, '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'the servant would stick the fork into the pot and demand that whatever it brought up be given to Eli’s sons. All the Israelites who came to worship at Shiloh were treated this way. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Sometimes the servant would come even before the animal’s fat had been burned on the altar. He would demand raw meat before it had been boiled so that it could be used for roasting.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The man offering the sacrifice might reply, “Take as much as you want, but the fat must be burned first.” Then the servant would demand, “No, give it to me now, or I’ll take it by force.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the sin of these young men was very serious in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight, for they treated the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s offerings with contempt.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Samuel, though he was only a boy, served the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . He wore a linen garment like that of a priest.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He wore a linen ephod.
      marker-yv: yv-n
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each year his mother made a small coat for him and brought it to him when she came with her husband for the sacrifice. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'No one is holy like the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There is no one besides you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no Rock like our God.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Before they returned home, Eli would bless Elkanah and his wife and say, “May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' give you other children to take the place of this one she gave to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Dead Sea Scrolls and Greek version; Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'this one he requested of the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' blessed Hannah, and she conceived and gave birth to three sons and two daughters. Meanwhile, Samuel grew up in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Eli was very old, but he was aware of what his sons were doing to the people of Israel. He knew, for instance, that his sons were seducing the young women who assisted at the entrance of the Tabernacle.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tent of Meeting. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts lack this entire sentence.
      marker-yv: yv-n
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eli said to them, “I have been hearing reports from all the people about the wicked things you are doing. Why do you keep sinning? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You must stop, my sons! The reports I hear among the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s people are not good. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If someone sins against another person, God
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the judges.
      marker-yv: yv-n
    - type: text
      text: ' can mediate for the guilty party. But if someone sins against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who can intercede?” But Eli’s sons wouldn’t listen to their father, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was already planning to put them to death.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meanwhile, the boy Samuel grew taller and grew in favor with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and with the people.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Warning for Eli’s Family
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'One day a man of God came to Eli and gave him this message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': “I revealed myself'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Did I reveal myself.
      marker-yv: yv-n
    - type: text
      text: ' to your ancestors when they were Pharaoh’s slaves in Egypt. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: I chose your ancestor Aaron
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:28a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your father.
      marker-yv: yv-n
    - type: text
      text: ' from among all the tribes of Israel to be my priest, to offer sacrifices on my altar, to burn incense, and to wear the priestly vest'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:28b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: an ephod.
      marker-yv: yv-n
    - type: text
      text: ' as he served me. And I assigned the sacrificial offerings to you priests. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So why do you scorn my sacrifices and offerings? Why do you give your sons more honor than you give me—for you and they have become fat from the best offerings of my people Israel!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Stop acting so proud and haughty!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t speak with such arrogance!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is a God who knows what you have done;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will judge your actions.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: I promised that your branch of the tribe of Levi'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: that your house and your father’s house.
      marker-yv: yv-n
    - type: text
      text: ' would always be my priests. But I will honor those who honor me, and I will despise those who think lightly of me. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The time is coming when I will put an end to your family, so it will no longer serve as my priests. All the members of your family will die before their time. None will reach old age. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will watch with envy as I pour out prosperity on the people of Israel. But no members of your family will ever live out their days. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The few not cut off from serving at my altar will survive, but only so their eyes can go blind and their hearts break, and their children will die a violent death.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Dead Sea Scrolls and Greek version, which read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'die by the sword; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: die like mortals.
      marker-yv: yv-n
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And to prove that what I have said will come true, I will cause your two sons, Hophni and Phinehas, to die on the same day!
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then I will raise up a faithful priest who will serve me and do what I desire. I will establish his family, and they will be priests to my anointed kings forever. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then all of your surviving family will bow before him, begging for money and food. ‘Please,’ they will say, ‘give us jobs among the priests so we will have enough to eat.’”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The bow of the mighty is now broken,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who stumbled are now strong.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who were well fed are now starving,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who were starving are now full.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The childless woman now has seven children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the woman with many children wastes away.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gives both death and life;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he brings some down to the grave
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to Sheol.
      marker-yv: yv-n
    - type: text
      text: ' but raises others up.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' makes some poor and others rich;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he brings some down and lifts others up.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He lifts the poor from the dust
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the needy from the garbage dump.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sets them among princes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: placing them in seats of honor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For all the earth is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he has set the world in order.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He will protect his faithful ones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the wicked will disappear in darkness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one will succeed by strength alone.
