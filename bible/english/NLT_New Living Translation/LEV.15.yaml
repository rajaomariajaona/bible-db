document_id: LEV.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Bodily Discharges
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, '
  '10':
  - type: text
    content: 'If you touch anything that was under the man, you will be unclean until evening. You must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '11':
  - type: text
    content: 'If the man touches you without first rinsing his hands, you must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '12':
  - type: text
    content: Any clay pot the man touches must be broken, and any wooden utensil he touches must be rinsed with water.
  '13':
  - type: text
    content: '“When the man with the discharge is healed, he must count off seven days for the period of purification. Then he must wash his clothes and bathe himself in fresh water, and he will be ceremonially clean. '
  '14':
  - type: text
    content: 'On the eighth day he must get two turtledoves or two young pigeons and come before the '
  - type: text
    content: Lord
  - type: text
    content: ' at the entrance of the Tabernacle'
  - type: note
    content: Hebrew Tent of Meeting; also in 15:29.
  - type: text
    content: ' and give his offerings to the priest. '
  '15':
  - type: text
    content: The priest will offer one bird for a sin offering and the other for a burnt offering. Through this process, the priest will purify
  - type: note
    content: Or will make atonement for; also in 15:30.
  - type: text
    content: ' the man before the '
  - type: text
    content: Lord
  - type: text
    content: ' for his discharge.'
  '16':
  - type: text
    content: “Whenever a man has an emission of semen, he must bathe his entire body in water, and he will remain ceremonially unclean until the next evening.
  - type: note
    content: Hebrew until evening; also in 15:18.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Any clothing or leather with semen on it must be washed in water, and it will remain unclean until evening. '
  '18':
  - type: text
    content: After a man and a woman have sexual intercourse, they must each bathe in water, and they will remain unclean until the next evening.
  '19':
  - type: text
    content: '“Whenever a woman has her menstrual period, she will be ceremonially unclean for seven days. Anyone who touches her during that time will be unclean until evening. '
  '2':
  - type: text
    content: “Give the following instructions to the people of Israel.
  - type: text
    content: '“Any man who has a bodily discharge is ceremonially unclean. '
  '20':
  - type: text
    content: 'Anything on which the woman lies or sits during the time of her period will be unclean. '
  '21':
  - type: text
    content: 'If any of you touch her bed, you must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '22':
  - type: text
    content: 'If you touch any object she has sat on, you must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '23':
  - type: text
    content: 'This includes her bed or any other object she has sat on; you will be unclean until evening if you touch it. '
  '24':
  - type: text
    content: If a man has sexual intercourse with her and her blood touches him, her menstrual impurity will be transmitted to him. He will remain unclean for seven days, and any bed on which he lies will be unclean.
  '25':
  - type: text
    content: '“If a woman has a flow of blood for many days that is unrelated to her menstrual period, or if the blood continues beyond the normal period, she is ceremonially unclean. As during her menstrual period, the woman will be unclean as long as the discharge continues. '
  '26':
  - type: text
    content: 'Any bed she lies on and any object she sits on during that time will be unclean, just as during her normal menstrual period. '
  '27':
  - type: text
    content: If any of you touch these things, you will be ceremonially unclean. You must wash your clothes and bathe yourself in water, and you will remain unclean until evening.
  '28':
  - type: text
    content: '“When the woman’s bleeding stops, she must count off seven days. Then she will be ceremonially clean. '
  '29':
  - type: text
    content: 'On the eighth day she must bring two turtledoves or two young pigeons and present them to the priest at the entrance of the Tabernacle. '
  '3':
  - type: text
    content: 'This defilement is caused by his discharge, whether the discharge continues or stops. In either case the man is unclean. '
  '30':
  - type: text
    content: 'The priest will offer one for a sin offering and the other for a burnt offering. Through this process, the priest will purify her before the '
  - type: text
    content: Lord
  - type: text
    content: ' for the ceremonial impurity caused by her bleeding.'
  '31':
  - type: text
    content: '“This is how you will guard the people of Israel from ceremonial uncleanness. Otherwise they would die, for their impurity would defile my Tabernacle that stands among them. '
  '32':
  - type: text
    content: 'These are the instructions for dealing with anyone who has a bodily discharge—a man who is unclean because of an emission of semen '
  '33':
  - type: text
    content: or a woman during her menstrual period. It applies to any man or woman who has a bodily discharge, and to a man who has sexual intercourse with a woman who is ceremonially unclean.”
  '4':
  - type: text
    content: 'Any bed on which the man with the discharge lies and anything on which he sits will be ceremonially unclean. '
  '5':
  - type: text
    content: 'So if you touch the man’s bed, you must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '6':
  - type: text
    content: 'If you sit where the man with the discharge has sat, you must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '7':
  - type: text
    content: 'If you touch the man with the discharge, you must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '8':
  - type: text
    content: 'If the man spits on you, you must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '9':
  - type: text
    content: 'Any saddle blanket on which the man rides will be ceremonially unclean. '
