document_id: LEV.15,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bodily Discharges
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses and Aaron, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you touch anything that was under the man, you will be unclean until evening. You must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the man touches you without first rinsing his hands, you must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Any clay pot the man touches must be broken, and any wooden utensil he touches must be rinsed with water.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When the man with the discharge is healed, he must count off seven days for the period of purification. Then he must wash his clothes and bathe himself in fresh water, and he will be ceremonially clean. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the eighth day he must get two turtledoves or two young pigeons and come before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at the entrance of the Tabernacle'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tent of Meeting; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 15:29.
      marker-yv: yv-n
    - type: text
      text: ' and give his offerings to the priest. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The priest will offer one bird for a sin offering and the other for a burnt offering. Through this process, the priest will purify
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'will make atonement for; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 15:30.
      marker-yv: yv-n
    - type: text
      text: ' the man before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for his discharge.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Whenever a man has an emission of semen, he must bathe his entire body in water, and he will remain ceremonially unclean until the next evening.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'until evening; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 15:18.
      marker-yv: yv-n
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Any clothing or leather with semen on it must be washed in water, and it will remain unclean until evening. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After a man and a woman have sexual intercourse, they must each bathe in water, and they will remain unclean until the next evening.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Whenever a woman has her menstrual period, she will be ceremonially unclean for seven days. Anyone who touches her during that time will be unclean until evening. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “Give the following instructions to the people of Israel.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Any man who has a bodily discharge is ceremonially unclean. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anything on which the woman lies or sits during the time of her period will be unclean. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If any of you touch her bed, you must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you touch any object she has sat on, you must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This includes her bed or any other object she has sat on; you will be unclean until evening if you touch it. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If a man has sexual intercourse with her and her blood touches him, her menstrual impurity will be transmitted to him. He will remain unclean for seven days, and any bed on which he lies will be unclean.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If a woman has a flow of blood for many days that is unrelated to her menstrual period, or if the blood continues beyond the normal period, she is ceremonially unclean. As during her menstrual period, the woman will be unclean as long as the discharge continues. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Any bed she lies on and any object she sits on during that time will be unclean, just as during her normal menstrual period. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If any of you touch these things, you will be ceremonially unclean. You must wash your clothes and bathe yourself in water, and you will remain unclean until evening.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When the woman’s bleeding stops, she must count off seven days. Then she will be ceremonially clean. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the eighth day she must bring two turtledoves or two young pigeons and present them to the priest at the entrance of the Tabernacle. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This defilement is caused by his discharge, whether the discharge continues or stops. In either case the man is unclean. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priest will offer one for a sin offering and the other for a burnt offering. Through this process, the priest will purify her before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for the ceremonial impurity caused by her bleeding.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is how you will guard the people of Israel from ceremonial uncleanness. Otherwise they would die, for their impurity would defile my Tabernacle that stands among them. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the instructions for dealing with anyone who has a bodily discharge—a man who is unclean because of an emission of semen '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: or a woman during her menstrual period. It applies to any man or woman who has a bodily discharge, and to a man who has sexual intercourse with a woman who is ceremonially unclean.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Any bed on which the man with the discharge lies and anything on which he sits will be ceremonially unclean. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So if you touch the man’s bed, you must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you sit where the man with the discharge has sat, you must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you touch the man with the discharge, you must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the man spits on you, you must wash your clothes and bathe yourself in water, and you will remain unclean until evening. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Any saddle blanket on which the man rides will be ceremonially unclean. '
