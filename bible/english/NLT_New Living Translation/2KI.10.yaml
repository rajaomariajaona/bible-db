document_id: 2KI.10,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehu Kills Ahab’s Family
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ahab had seventy sons living in the city of Samaria. So Jehu wrote letters and sent them to Samaria, to the elders and officials of the city,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts and Latin Vulgate (see also 10:6); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of Jezreel.
      marker-yv: yv-n
    - type: text
      text: ' and to the guardians of King Ahab’s sons. He said, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'You can be sure that the message of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that was spoken concerning Ahab’s family will not fail. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' declared through his servant Elijah that this would happen.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then Jehu killed all who were left of Ahab’s relatives living in Jezreel and all his important officials, his personal friends, and his priests. So Ahab was left without a single survivor.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then Jehu set out for Samaria. Along the way, while he was at Beth-eked of the Shepherds, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: he met some relatives of King Ahaziah of Judah. “Who are you?” he asked them.
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they replied, “We are relatives of King Ahaziah. We are going to visit the sons of King Ahab and the sons of the queen mother.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Take them alive!” Jehu shouted to his men. And they captured all forty-two of them and killed them at the well of Beth-eked. None of them escaped.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: When Jehu left there, he met Jehonadab son of Recab, who was coming to meet him. After they had greeted each other, Jehu said to him, “Are you as loyal to me as I am to you?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, I am,” Jehonadab replied.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If you are,” Jehu said, “then give me your hand.” So Jehonadab put out his hand, and Jehu helped him into the chariot. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then Jehu said, “Now come with me, and see how devoted I am to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .” So Jehonadab rode along with him.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'When Jehu arrived in Samaria, he killed everyone who was left there from Ahab’s family, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had promised through Elijah.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehu Kills the Priests of Baal
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then Jehu called a meeting of all the people of the city and said to them, “Ahab’s worship of Baal was nothing compared to the way I will worship him! '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Therefore, summon all the prophets and worshipers of Baal, and call together all his priests. See to it that every one of them comes, for I am going to offer a great sacrifice to Baal. Anyone who fails to come will be put to death.” But Jehu’s cunning plan was to destroy all the worshipers of Baal.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“The king’s sons are with you, and you have at your disposal chariots, horses, a fortified city, and weapons. As soon as you receive this letter, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then Jehu ordered, “Prepare a solemn assembly to worship Baal!” So they did. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'He sent messengers throughout all Israel summoning those who worshiped Baal. They all came—not a single one remained behind—and they filled the temple of Baal from one end to the other. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: And Jehu instructed the keeper of the wardrobe, “Be sure that every worshiper of Baal wears one of these robes.” So robes were given to them.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Then Jehu went into the temple of Baal with Jehonadab son of Recab. Jehu said to the worshipers of Baal, “Make sure no one who worships the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is here—only those who worship Baal.” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: So they were all inside the temple to offer sacrifices and burnt offerings. Now Jehu had stationed eighty of his men outside the building and had warned them, “If you let anyone escape, you will pay for it with your own life.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: As soon as Jehu had finished sacrificing the burnt offering, he commanded his guards and officers, “Go in and kill all of them. Don’t let a single one escape!” So they killed them all with their swords, and the guards and officers dragged their bodies outside.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:25a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and they left their bodies lying there; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and they threw them out into the outermost court.
      marker-yv: yv-n
    - type: text
      text: ' Then Jehu’s men went into the innermost fortress'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:25b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: city.
      marker-yv: yv-n
    - type: text
      text: ' of the temple of Baal. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: They dragged out the sacred pillar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions and Latin Vulgate; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sacred pillars.
      marker-yv: yv-n
    - type: text
      text: ' used in the worship of Baal and burned it. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: They smashed the sacred pillar and wrecked the temple of Baal, converting it into a public toilet, as it remains to this day.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'In this way, Jehu destroyed every trace of Baal worship from Israel. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: He did not, however, destroy the gold calves at Bethel and Dan, with which Jeroboam son of Nebat had caused Israel to sin.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: select the best qualified of your master’s sons to be your king, and prepare to fight for Ahab’s dynasty.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Nonetheless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Jehu, “You have done well in following my instructions to destroy the family of Ahab. Therefore, your descendants will be kings of Israel down to the fourth generation.” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'But Jehu did not obey the Law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, with all his heart. He refused to turn from the sins that Jeroboam had led Israel to commit.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Jehu
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'At about that time the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' began to cut down the size of Israel’s territory. King Hazael conquered several sections of the country '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: east of the Jordan River, including all of Gilead, Gad, Reuben, and Manasseh. He conquered the area from the town of Aroer by the Arnon Gorge to as far north as Gilead and Bashan.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'The rest of the events in Jehu’s reign—everything he did and all his achievements—are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the History of the Kings of Israel.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'When Jehu died, he was buried in Samaria. Then his son Jehoahaz became the next king. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: In all, Jehu reigned over Israel from Samaria for twenty-eight years.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But they were paralyzed with fear and said, “We’ve seen that two kings couldn’t stand against this man! What can we do?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So the palace and city administrators, together with the elders and the guardians of the king’s sons, sent this message to Jehu: “We are your servants and will do anything you tell us. We will not make anyone king; do whatever you think is best.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Jehu responded with a second letter: “If you are on my side and are going to obey me, bring the heads of your master’s sons to me at Jezreel by this time tomorrow.” Now the seventy sons of the king were being cared for by the leaders of Samaria, where they had been raised since childhood. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: When the letter arrived, the leaders killed all seventy of the king’s sons. They placed their heads in baskets and presented them to Jehu at Jezreel.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: A messenger went to Jehu and said, “They have brought the heads of the king’s sons.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Jehu ordered, “Pile them in two heaps at the entrance of the city gate, and leave them there until morning.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'In the morning he went out and spoke to the crowd that had gathered around them. “You are not to blame,” he told them. “I am the one who conspired against my master and killed him. But who killed all these? '
