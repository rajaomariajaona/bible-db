document_id: 2KI.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehu Kills Ahab’s Family
  - type: text
    content: Ahab had seventy sons living in the city of Samaria. So Jehu wrote letters and sent them to Samaria, to the elders and officials of the city,
  - type: note
    content: As in some Greek manuscripts and Latin Vulgate (see also 10:6); Hebrew reads of Jezreel.
  - type: text
    content: ' and to the guardians of King Ahab’s sons. He said, '
  '10':
  - type: text
    content: 'You can be sure that the message of the '
  - type: text
    content: Lord
  - type: text
    content: ' that was spoken concerning Ahab’s family will not fail. The '
  - type: text
    content: Lord
  - type: text
    content: ' declared through his servant Elijah that this would happen.” '
  '11':
  - type: text
    content: Then Jehu killed all who were left of Ahab’s relatives living in Jezreel and all his important officials, his personal friends, and his priests. So Ahab was left without a single survivor.
  '12':
  - type: text
    content: 'Then Jehu set out for Samaria. Along the way, while he was at Beth-eked of the Shepherds, '
  '13':
  - type: text
    content: he met some relatives of King Ahaziah of Judah. “Who are you?” he asked them.
  - type: text
    content: And they replied, “We are relatives of King Ahaziah. We are going to visit the sons of King Ahab and the sons of the queen mother.”
  '14':
  - type: text
    content: “Take them alive!” Jehu shouted to his men. And they captured all forty-two of them and killed them at the well of Beth-eked. None of them escaped.
  '15':
  - type: text
    content: When Jehu left there, he met Jehonadab son of Recab, who was coming to meet him. After they had greeted each other, Jehu said to him, “Are you as loyal to me as I am to you?”
  - type: text
    content: “Yes, I am,” Jehonadab replied.
  - type: text
    content: '“If you are,” Jehu said, “then give me your hand.” So Jehonadab put out his hand, and Jehu helped him into the chariot. '
  '16':
  - type: text
    content: 'Then Jehu said, “Now come with me, and see how devoted I am to the '
  - type: text
    content: Lord
  - type: text
    content: .” So Jehonadab rode along with him.
  '17':
  - type: text
    content: 'When Jehu arrived in Samaria, he killed everyone who was left there from Ahab’s family, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had promised through Elijah.'
  - type: heading
    content: Jehu Kills the Priests of Baal
  '18':
  - type: text
    content: 'Then Jehu called a meeting of all the people of the city and said to them, “Ahab’s worship of Baal was nothing compared to the way I will worship him! '
  '19':
  - type: text
    content: Therefore, summon all the prophets and worshipers of Baal, and call together all his priests. See to it that every one of them comes, for I am going to offer a great sacrifice to Baal. Anyone who fails to come will be put to death.” But Jehu’s cunning plan was to destroy all the worshipers of Baal.
  '2':
  - type: text
    content: '“The king’s sons are with you, and you have at your disposal chariots, horses, a fortified city, and weapons. As soon as you receive this letter, '
  '20':
  - type: text
    content: 'Then Jehu ordered, “Prepare a solemn assembly to worship Baal!” So they did. '
  '21':
  - type: text
    content: 'He sent messengers throughout all Israel summoning those who worshiped Baal. They all came—not a single one remained behind—and they filled the temple of Baal from one end to the other. '
  '22':
  - type: text
    content: And Jehu instructed the keeper of the wardrobe, “Be sure that every worshiper of Baal wears one of these robes.” So robes were given to them.
  '23':
  - type: text
    content: 'Then Jehu went into the temple of Baal with Jehonadab son of Recab. Jehu said to the worshipers of Baal, “Make sure no one who worships the '
  - type: text
    content: Lord
  - type: text
    content: ' is here—only those who worship Baal.” '
  '24':
  - type: text
    content: So they were all inside the temple to offer sacrifices and burnt offerings. Now Jehu had stationed eighty of his men outside the building and had warned them, “If you let anyone escape, you will pay for it with your own life.”
  '25':
  - type: text
    content: As soon as Jehu had finished sacrificing the burnt offering, he commanded his guards and officers, “Go in and kill all of them. Don’t let a single one escape!” So they killed them all with their swords, and the guards and officers dragged their bodies outside.
  - type: note
    content: Or and they left their bodies lying there; or and they threw them out into the outermost court.
  - type: text
    content: ' Then Jehu’s men went into the innermost fortress'
  - type: note
    content: Hebrew city.
  - type: text
    content: ' of the temple of Baal. '
  '26':
  - type: text
    content: They dragged out the sacred pillar
  - type: note
    content: As in Greek and Syriac versions and Latin Vulgate; Hebrew reads sacred pillars.
  - type: text
    content: ' used in the worship of Baal and burned it. '
  '27':
  - type: text
    content: They smashed the sacred pillar and wrecked the temple of Baal, converting it into a public toilet, as it remains to this day.
  '28':
  - type: text
    content: 'In this way, Jehu destroyed every trace of Baal worship from Israel. '
  '29':
  - type: text
    content: He did not, however, destroy the gold calves at Bethel and Dan, with which Jeroboam son of Nebat had caused Israel to sin.
  '3':
  - type: text
    content: select the best qualified of your master’s sons to be your king, and prepare to fight for Ahab’s dynasty.”
  '30':
  - type: text
    content: 'Nonetheless the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Jehu, “You have done well in following my instructions to destroy the family of Ahab. Therefore, your descendants will be kings of Israel down to the fourth generation.” '
  '31':
  - type: text
    content: 'But Jehu did not obey the Law of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, with all his heart. He refused to turn from the sins that Jeroboam had led Israel to commit.'
  - type: heading
    content: The Death of Jehu
  '32':
  - type: text
    content: 'At about that time the '
  - type: text
    content: Lord
  - type: text
    content: ' began to cut down the size of Israel’s territory. King Hazael conquered several sections of the country '
  '33':
  - type: text
    content: east of the Jordan River, including all of Gilead, Gad, Reuben, and Manasseh. He conquered the area from the town of Aroer by the Arnon Gorge to as far north as Gilead and Bashan.
  '34':
  - type: text
    content: 'The rest of the events in Jehu’s reign—everything he did and all his achievements—are recorded in '
  - type: text
    content: The Book of the History of the Kings of Israel.
  '35':
  - type: text
    content: 'When Jehu died, he was buried in Samaria. Then his son Jehoahaz became the next king. '
  '36':
  - type: text
    content: In all, Jehu reigned over Israel from Samaria for twenty-eight years.
  '4':
  - type: text
    content: But they were paralyzed with fear and said, “We’ve seen that two kings couldn’t stand against this man! What can we do?”
  '5':
  - type: text
    content: 'So the palace and city administrators, together with the elders and the guardians of the king’s sons, sent this message to Jehu: “We are your servants and will do anything you tell us. We will not make anyone king; do whatever you think is best.”'
  '6':
  - type: text
    content: 'Jehu responded with a second letter: “If you are on my side and are going to obey me, bring the heads of your master’s sons to me at Jezreel by this time tomorrow.” Now the seventy sons of the king were being cared for by the leaders of Samaria, where they had been raised since childhood. '
  '7':
  - type: text
    content: When the letter arrived, the leaders killed all seventy of the king’s sons. They placed their heads in baskets and presented them to Jehu at Jezreel.
  '8':
  - type: text
    content: A messenger went to Jehu and said, “They have brought the heads of the king’s sons.”
  - type: text
    content: So Jehu ordered, “Pile them in two heaps at the entrance of the city gate, and leave them there until morning.”
  '9':
  - type: text
    content: 'In the morning he went out and spoke to the crowd that had gathered around them. “You are not to blame,” he told them. “I am the one who conspired against my master and killed him. But who killed all these? '
