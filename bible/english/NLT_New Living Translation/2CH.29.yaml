document_id: 2CH.29,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hezekiah Rules in Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Hezekiah was twenty-five years old when he became the king of Judah, and he reigned in Jerusalem twenty-nine years. His mother was Abijah, the daughter of Zechariah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But now I will make a covenant with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, so that his fierce anger will turn away from us. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'My sons, do not neglect your duties any longer! The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has chosen you to stand in his presence, to minister to him, and to lead the people in worship and present offerings to him.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then these Levites got right to work:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the clan of Kohath: Mahath son of Amasai and Joel son of Azariah.'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the clan of Merari: Kish son of Abdi and Azariah son of Jehallelel.'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the clan of Gershon: Joah son of Zimmah and Eden son of Joah.'
  '13':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'From the family of Elizaphan: Shimri and Jeiel.'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Asaph: Zechariah and Mattaniah.'
  '14':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'From the family of Heman: Jehiel and Shimei.'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the family of Jeduthun: Shemaiah and Uzziel.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'These men called together their fellow Levites, and they all purified themselves. Then they began to cleanse the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', just as the king had commanded. They were careful to follow all the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s instructions in their work. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The priests went into the sanctuary of the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to cleanse it, and they took out to the Temple courtyard all the defiled things they found. From there the Levites carted it all out to the Kidron Valley.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: They began the work in early spring, on the first day of the new year,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on the first day of the first month. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This day in the ancient Hebrew lunar calendar occurred in March or early April, 715 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
      marker-yv: yv-n
    - type: text
      text: ' and in eight days they had reached the entry room of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple. Then they purified the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' itself, which took another eight days. So the entire task was completed in sixteen days.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Temple Rededication
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then the Levites went to King Hezekiah and gave him this report: “We have cleansed the entire Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the altar of burnt offering with all its utensils, and the table of the Bread of the Presence with all its utensils. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'We have also recovered all the items discarded by King Ahaz when he was unfaithful and closed the Temple. They are now in front of the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', purified and ready for use.”'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He did what was pleasing in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s sight, just as his ancestor David had done.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hezekiah Reopens the Temple
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Early the next morning King Hezekiah gathered the city officials and went to the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'They brought seven bulls, seven rams, and seven male lambs as a burnt offering, together with seven male goats as a sin offering for the kingdom, for the Temple, and for Judah. The king commanded the priests, who were descendants of Aaron, to sacrifice the animals on the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So they killed the bulls, and the priests took the blood and sprinkled it on the altar. Next they killed the rams and sprinkled their blood on the altar. And finally, they did the same with the male lambs. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The male goats for the sin offering were then brought before the king and the assembly of people, who laid their hands on them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: The priests then killed the goats as a sin offering and sprinkled their blood on the altar to make atonement for the sins of all Israel. The king had specifically commanded that this burnt offering and sin offering should be made for all Israel.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'King Hezekiah then stationed the Levites at the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with cymbals, lyres, and harps. He obeyed all the commands that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given to King David through Gad, the king’s seer, and the prophet Nathan. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: The Levites then took their positions around the Temple with the instruments of David, and the priests took their positions with the trumpets.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Then Hezekiah ordered that the burnt offering be placed on the altar. As the burnt offering was presented, songs of praise to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' were begun, accompanied by the trumpets and other instruments of David, the former king of Israel. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The entire assembly worshiped the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as the singers sang and the trumpets blew, until all the burnt offerings were finished. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then the king and everyone with him bowed down in worship. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'In the very first month of the first year of his reign, Hezekiah reopened the doors of the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and repaired them. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'King Hezekiah and the officials ordered the Levites to praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with the psalms written by David and by Asaph the seer. So they offered joyous praise and bowed down in worship.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then Hezekiah declared, “Now that you have consecrated yourselves to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', bring your sacrifices and thanksgiving offerings to the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.” So the people brought their sacrifices and thanksgiving offerings, and all whose hearts were willing brought burnt offerings, too. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'The people brought to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' 70 bulls, 100 rams, and 200 male lambs for burnt offerings. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: They also brought 600 cattle and 3,000 sheep and goats as sacred offerings.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'But there were too few priests to prepare all the burnt offerings. So their relatives the Levites helped them until the work was finished and more priests had been purified, for the Levites had been more conscientious about purifying themselves than the priests had been. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: There was an abundance of burnt offerings, along with the usual liquid offerings, and a great deal of fat from the many peace offerings.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was restored to service. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: And Hezekiah and all the people rejoiced because of what God had done for the people, for everything had been accomplished so quickly.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He summoned the priests and Levites to meet him at the courtyard east of the Temple. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He said to them, “Listen to me, you Levites! Purify yourselves, and purify the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your ancestors. Remove all the defiled things from the sanctuary. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Our ancestors were unfaithful and did what was evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God. They abandoned the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and his dwelling place; they turned their backs on him. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: They also shut the doors to the Temple’s entry room, and they snuffed out the lamps. They stopped burning incense and presenting burnt offerings at the sanctuary of the God of Israel.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“That is why the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anger has fallen upon Judah and Jerusalem. He has made them an object of dread, horror, and ridicule, as you can see with your own eyes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Because of this, our fathers have been killed in battle, and our sons and daughters and wives have been captured. '
