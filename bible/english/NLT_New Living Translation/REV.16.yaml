document_id: REV.16,116
type_code: eng
verses:
  '1':
  - type: text
    content: Then I heard a mighty voice from the Temple say to the seven angels, “Go your ways and pour out on the earth the seven bowls containing God’s wrath.”
  '10':
  - type: text
    content: Then the fifth angel poured out his bowl on the throne of the beast, and his kingdom was plunged into darkness. His subjects ground their teeth
  - type: note
    content: Greek gnawed their tongues.
  - type: text
    content: ' in anguish, '
  '11':
  - type: text
    content: and they cursed the God of heaven for their pains and sores. But they did not repent of their evil deeds and turn to God.
  '12':
  - type: text
    content: 'Then the sixth angel poured out his bowl on the great Euphrates River, and it dried up so that the kings from the east could march their armies toward the west without hindrance. '
  '13':
  - type: text
    content: And I saw three evil
  - type: note
    content: Greek unclean.
  - type: text
    content: ' spirits that looked like frogs leap from the mouths of the dragon, the beast, and the false prophet. '
  '14':
  - type: text
    content: They are demonic spirits who work miracles and go out to all the rulers of the world to gather them for battle against the Lord on that great judgment day of God the Almighty.
  '15':
  - type: text
    content: ' '
  - type: text
    content: “Look, I will come as unexpectedly as a thief! Blessed are all who are watching for me, who keep their clothing ready so they will not have to walk around naked and ashamed.”
  '16':
  - type: text
    content: 'And the demonic spirits gathered all the rulers and their armies to a place with the Hebrew name '
  - type: text
    content: Armageddon
  - type: text
    content: .
  - type: note
    content: Or Harmagedon.
  '17':
  - type: text
    content: 'Then the seventh angel poured out his bowl into the air. And a mighty shout came from the throne in the Temple, saying, “It is finished!” '
  '18':
  - type: text
    content: 'Then the thunder crashed and rolled, and lightning flashed. And a great earthquake struck—the worst since people were placed on the earth. '
  '19':
  - type: text
    content: 'The great city of Babylon split into three sections, and the cities of many nations fell into heaps of rubble. So God remembered all of Babylon’s sins, and he made her drink the cup that was filled with the wine of his fierce wrath. '
  '2':
  - type: text
    content: So the first angel left the Temple and poured out his bowl on the earth, and horrible, malignant sores broke out on everyone who had the mark of the beast and who worshiped his statue.
  '20':
  - type: text
    content: 'And every island disappeared, and all the mountains were leveled. '
  '21':
  - type: text
    content: There was a terrible hailstorm, and hailstones weighing as much as seventy-five pounds
  - type: note
    content: Greek 1 talent [34 kilograms].
  - type: text
    content: ' fell from the sky onto the people below. They cursed God because of the terrible plague of the hailstorm.'
  '3':
  - type: text
    content: Then the second angel poured out his bowl on the sea, and it became like the blood of a corpse. And everything in the sea died.
  '4':
  - type: text
    content: 'Then the third angel poured out his bowl on the rivers and springs, and they became blood. '
  '5':
  - type: text
    content: And I heard the angel who had authority over all water saying,
  - type: text
    content: “You are just, O Holy One, who is and who always was,
  - type: text
    content: because you have sent these judgments.
  '6':
  - type: text
    content: Since they shed the blood
  - type: text
    content: of your holy people and your prophets,
  - type: text
    content: you have given them blood to drink.
  - type: text
    content: It is their just reward.”
  '7':
  - type: text
    content: And I heard a voice from the altar,
  - type: note
    content: Greek I heard the altar.
  - type: text
    content: ' saying,'
  - type: text
    content: “Yes, O Lord God, the Almighty,
  - type: text
    content: your judgments are true and just.”
  '8':
  - type: text
    content: 'Then the fourth angel poured out his bowl on the sun, causing it to scorch everyone with its fire. '
  '9':
  - type: text
    content: Everyone was burned by this blast of heat, and they cursed the name of God, who had control over all these plagues. They did not repent of their sins and turn to God and give him glory.
