document_id: REV.16,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I heard a mighty voice from the Temple say to the seven angels, “Go your ways and pour out on the earth the seven bowls containing God’s wrath.”
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the fifth angel poured out his bowl on the throne of the beast, and his kingdom was plunged into darkness. His subjects ground their teeth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: gnawed their tongues.
      marker-yv: yv-n
    - type: text
      text: ' in anguish, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and they cursed the God of heaven for their pains and sores. But they did not repent of their evil deeds and turn to God.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the sixth angel poured out his bowl on the great Euphrates River, and it dried up so that the kings from the east could march their armies toward the west without hindrance. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I saw three evil
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: unclean.
      marker-yv: yv-n
    - type: text
      text: ' spirits that looked like frogs leap from the mouths of the dragon, the beast, and the false prophet. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They are demonic spirits who work miracles and go out to all the rulers of the world to gather them for battle against the Lord on that great judgment day of God the Almighty.
  '15':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Look, I will come as unexpectedly as a thief! Blessed are all who are watching for me, who keep their clothing ready so they will not have to walk around naked and ashamed.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the demonic spirits gathered all the rulers and their armies to a place with the Hebrew name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Armageddon
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Harmagedon.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the seventh angel poured out his bowl into the air. And a mighty shout came from the throne in the Temple, saying, “It is finished!” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the thunder crashed and rolled, and lightning flashed. And a great earthquake struck—the worst since people were placed on the earth. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The great city of Babylon split into three sections, and the cities of many nations fell into heaps of rubble. So God remembered all of Babylon’s sins, and he made her drink the cup that was filled with the wine of his fierce wrath. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the first angel left the Temple and poured out his bowl on the earth, and horrible, malignant sores broke out on everyone who had the mark of the beast and who worshiped his statue.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And every island disappeared, and all the mountains were leveled. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There was a terrible hailstorm, and hailstones weighing as much as seventy-five pounds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 talent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[34 kilograms].'
      marker-yv: yv-n
    - type: text
      text: ' fell from the sky onto the people below. They cursed God because of the terrible plague of the hailstorm.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the second angel poured out his bowl on the sea, and it became like the blood of a corpse. And everything in the sea died.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the third angel poured out his bowl on the rivers and springs, and they became blood. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I heard the angel who had authority over all water saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You are just, O Holy One, who is and who always was,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you have sent these judgments.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Since they shed the blood
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of your holy people and your prophets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you have given them blood to drink.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It is their just reward.”
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And I heard a voice from the altar,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: I heard the altar.
      marker-yv: yv-n
    - type: text
      text: ' saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yes, O Lord God, the Almighty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your judgments are true and just.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the fourth angel poured out his bowl on the sun, causing it to scorch everyone with its fire. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Everyone was burned by this blast of heat, and they cursed the name of God, who had control over all these plagues. They did not repent of their sins and turn to God and give him glory.
