document_id: MRK.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of the Farmer Scattering Seed
  - type: text
    content: 'Once again Jesus began teaching by the lakeshore. A very large crowd soon gathered around him, so he got into a boat. Then he sat in the boat while all the people remained on the shore. '
  '10':
  - type: text
    content: Later, when Jesus was alone with the twelve disciples and with the others who were gathered around, they asked him what the parables meant.
  '11':
  - type: text
    content: 'He replied, '
  - type: text
    content: “You are permitted to understand the secret
  - type: note
    content: Greek mystery.
  - type: text
    content: ' '
  - type: text
    content: of the Kingdom of God. But I use parables for everything I say to outsiders,
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'so that the Scriptures might be fulfilled:'
  - type: text
    content: ‘When they see what I do,
  - type: text
    content: they will learn nothing.
  - type: text
    content: When they hear what I say,
  - type: text
    content: they will not understand.
  - type: text
    content: Otherwise, they will turn to me
  - type: text
    content: and be forgiven.’
  - type: text
    content: ' '
  - type: note
    content: Isa 6:9-10 (Greek version).
  - type: text
    content: ”
  '13':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: “If you can’t understand the meaning of this parable, how will you understand all the other parables?
  - type: text
    content: ' '
  '14':
  - type: text
    content: The farmer plants seed by taking God’s word to others.
  - type: text
    content: ' '
  '15':
  - type: text
    content: The seed that fell on the footpath represents those who hear the message, only to have Satan come at once and take it away.
  - type: text
    content: ' '
  '16':
  - type: text
    content: The seed on the rocky soil represents those who hear the message and immediately receive it with joy.
  - type: text
    content: ' '
  '17':
  - type: text
    content: But since they don’t have deep roots, they don’t last long. They fall away as soon as they have problems or are persecuted for believing God’s word.
  - type: text
    content: ' '
  '18':
  - type: text
    content: The seed that fell among the thorns represents others who hear God’s word,
  - type: text
    content: ' '
  '19':
  - type: text
    content: but all too quickly the message is crowded out by the worries of this life, the lure of wealth, and the desire for other things, so no fruit is produced.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'He taught them by telling many stories in the form of parables, such as this one:'
  '20':
  - type: text
    content: And the seed that fell on good soil represents those who hear and accept God’s word and produce a harvest of thirty, sixty, or even a hundred times as much as had been planted!”
  - type: heading
    content: Parable of the Lamp
  '21':
  - type: text
    content: 'Then Jesus asked them, '
  - type: text
    content: “Would anyone light a lamp and then put it under a basket or under a bed? Of course not! A lamp is placed on a stand, where its light will shine.
  - type: text
    content: ' '
  '22':
  - type: text
    content: For everything that is hidden will eventually be brought into the open, and every secret will be brought to light.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Anyone with ears to hear should listen and understand.”
  '24':
  - type: text
    content: 'Then he added, '
  - type: text
    content: “Pay close attention to what you hear. The closer you listen, the more understanding you will be given
  - type: note
    content: Or The measure you give will be the measure you get back.
  - type: text
    content: —and you will receive even more.
  - type: text
    content: ' '
  '25':
  - type: text
    content: To those who listen to my teaching, more understanding will be given. But for those who are not listening, even what little understanding they have will be taken away from them.”
  - type: heading
    content: Parable of the Growing Seed
  '26':
  - type: text
    content: 'Jesus also said, '
  - type: text
    content: “The Kingdom of God is like a farmer who scatters seed on the ground.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Night and day, while he’s asleep or awake, the seed sprouts and grows, but he does not understand how it happens.
  - type: text
    content: ' '
  '28':
  - type: text
    content: The earth produces the crops on its own. First a leaf blade pushes through, then the heads of wheat are formed, and finally the grain ripens.
  - type: text
    content: ' '
  '29':
  - type: text
    content: And as soon as the grain is ready, the farmer comes and harvests it with a sickle, for the harvest time has come.”
  - type: heading
    content: Parable of the Mustard Seed
  '3':
  - type: text
    content: ' '
  - type: text
    content: “Listen! A farmer went out to plant some seed.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “How can I describe the Kingdom of God? What story should I use to illustrate it?
  - type: text
    content: ' '
  '31':
  - type: text
    content: It is like a mustard seed planted in the ground. It is the smallest of all seeds,
  - type: text
    content: ' '
  '32':
  - type: text
    content: but it becomes the largest of all garden plants; it grows long branches, and birds can make nests in its shade.”
  '33':
  - type: text
    content: 'Jesus used many similar stories and illustrations to teach the people as much as they could understand. '
  '34':
  - type: text
    content: In fact, in his public ministry he never taught without using parables; but afterward, when he was alone with his disciples, he explained everything to them.
  - type: heading
    content: Jesus Calms the Storm
  '35':
  - type: text
    content: 'As evening came, Jesus said to his disciples, '
  - type: text
    content: “Let’s cross to the other side of the lake.”
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'So they took Jesus in the boat and started out, leaving the crowds behind (although other boats followed). '
  '37':
  - type: text
    content: But soon a fierce storm came up. High waves were breaking into the boat, and it began to fill with water.
  '38':
  - type: text
    content: Jesus was sleeping at the back of the boat with his head on a cushion. The disciples woke him up, shouting, “Teacher, don’t you care that we’re going to drown?”
  '39':
  - type: text
    content: 'When Jesus woke up, he rebuked the wind and said to the waves, '
  - type: text
    content: “Silence! Be still!”
  - type: text
    content: ' Suddenly the wind stopped, and there was a great calm. '
  '4':
  - type: text
    content: As he scattered it across his field, some of the seed fell on a footpath, and the birds came and ate it.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Then he asked them, '
  - type: text
    content: “Why are you afraid? Do you still have no faith?”
  '41':
  - type: text
    content: The disciples were absolutely terrified. “Who is this man?” they asked each other. “Even the wind and waves obey him!”
  '5':
  - type: text
    content: Other seed fell on shallow soil with underlying rock. The seed sprouted quickly because the soil was shallow.
  - type: text
    content: ' '
  '6':
  - type: text
    content: But the plant soon wilted under the hot sun, and since it didn’t have deep roots, it died.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Other seed fell among thorns that grew up and choked out the tender plants so they produced no grain.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Still other seeds fell on fertile soil, and they sprouted, grew, and produced a crop that was thirty, sixty, and even a hundred times as much as had been planted!”
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Then he said, '
  - type: text
    content: “Anyone with ears to hear should listen and understand.”
