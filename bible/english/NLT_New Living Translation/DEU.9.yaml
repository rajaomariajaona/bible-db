document_id: DEU.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Victory by God’s Grace
  - type: text
    content: '“Listen, O Israel! Today you are about to cross the Jordan River to take over the land belonging to nations much greater and more powerful than you. They live in cities with walls that reach to the sky! '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave me the two tablets on which God had written with his own finger all the words he had spoken to you from the heart of the fire when you were assembled at the mountain.'
  '11':
  - type: text
    content: '“At the end of the forty days and nights, the '
  - type: text
    content: Lord
  - type: text
    content: ' handed me the two stone tablets inscribed with the words of the covenant. '
  '12':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, ‘Get up! Go down immediately, for the people you brought out of Egypt have corrupted themselves. How quickly they have turned away from the way I commanded them to live! They have melted gold and made an idol for themselves!’'
  '13':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' also said to me, ‘I have seen how stubborn and rebellious these people are. '
  '14':
  - type: text
    content: Leave me alone so I may destroy them and erase their name from under heaven. Then I will make a mighty nation of your descendants, a nation larger and more powerful than they are.’
  '15':
  - type: text
    content: '“So while the mountain was blazing with fire I turned and came down, holding in my hands the two stone tablets inscribed with the terms of the covenant. '
  '16':
  - type: text
    content: 'There below me I could see that you had sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. You had melted gold and made a calf idol for yourselves. How quickly you had turned away from the path the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded you to follow! '
  '17':
  - type: text
    content: So I took the stone tablets and threw them to the ground, smashing them before your eyes.
  '18':
  - type: text
    content: '“Then, as before, I threw myself down before the '
  - type: text
    content: Lord
  - type: text
    content: ' for forty days and nights. I ate no bread and drank no water because of the great sin you had committed by doing what the '
  - type: text
    content: Lord
  - type: text
    content: ' hated, provoking him to anger. '
  '19':
  - type: text
    content: 'I feared that the furious anger of the '
  - type: text
    content: Lord
  - type: text
    content: ', which turned him against you, would drive him to destroy you. But again he listened to me. '
  '2':
  - type: text
    content: 'The people are strong and tall—descendants of the famous Anakite giants. You’ve heard the saying, ‘Who can stand up to the Anakites?’ '
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' was so angry with Aaron that he wanted to destroy him, too. But I prayed for Aaron, and the '
  - type: text
    content: Lord
  - type: text
    content: ' spared him. '
  '21':
  - type: text
    content: I took your sin—the calf you had made—and I melted it down in the fire and ground it into fine dust. Then I threw the dust into the stream that flows down the mountain.
  '22':
  - type: text
    content: '“You also made the '
  - type: text
    content: Lord
  - type: text
    content: ' angry at Taberah,'
  - type: note
    content: Taberah means “place of burning.” See Num 11:1-3.
  - type: text
    content: ' Massah,'
  - type: note
    content: Massah means “place of testing.” See Exod 17:1-7.
  - type: text
    content: ' and Kibroth-hattaavah.'
  - type: note
    content: Kibroth-hattaavah means “graves of gluttony.” See Num 11:31-34.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And at Kadesh-barnea the '
  - type: text
    content: Lord
  - type: text
    content: ' sent you out with this command: ‘Go up and take over the land I have given you.’ But you rebelled against the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and refused to put your trust in him or obey him. '
  '24':
  - type: text
    content: 'Yes, you have been rebelling against the '
  - type: text
    content: Lord
  - type: text
    content: ' as long as I have known you.'
  '25':
  - type: text
    content: '“That is why I threw myself down before the '
  - type: text
    content: Lord
  - type: text
    content: ' for forty days and nights—for the '
  - type: text
    content: Lord
  - type: text
    content: ' said he would destroy you. '
  '26':
  - type: text
    content: 'I prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, ‘O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', do not destroy them. They are your own people. They are your special possession, whom you redeemed from Egypt by your mighty power and your strong hand. '
  '27':
  - type: text
    content: 'Please overlook the stubbornness and the awful sin of these people, and remember instead your servants Abraham, Isaac, and Jacob. '
  '28':
  - type: text
    content: 'If you destroy these people, the Egyptians will say, “The Israelites died because the '
  - type: text
    content: 'Lord '
  - type: text
    content: 'wasn’t able to bring them to the land he had promised to give them.” Or they might say, “He destroyed them because he hated them; he deliberately took them into the wilderness to slaughter them.” '
  '29':
  - type: text
    content: But they are your people and your special possession, whom you brought out of Egypt by your great strength and powerful arm.’
  '3':
  - type: text
    content: 'But recognize today that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is the one who will cross over ahead of you like a devouring fire to destroy them. He will subdue them so that you will quickly conquer them and drive them out, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' has promised.'
  '4':
  - type: text
    content: '“After the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has done this for you, don’t say in your hearts, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' has given us this land because we are such good people!’ No, it is because of the wickedness of the other nations that he is pushing them out of your way. '
  '5':
  - type: text
    content: 'It is not because you are so good or have such integrity that you are about to occupy their land. The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will drive these nations out ahead of you only because of their wickedness, and to fulfill the oath he swore to your ancestors Abraham, Isaac, and Jacob. '
  '6':
  - type: text
    content: 'You must recognize that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is not giving you this good land because you are good, for you are not—you are a stubborn people.'
  - type: heading
    content: Remembering the Gold Calf
  '7':
  - type: text
    content: '“Remember and never forget how angry you made the '
  - type: text
    content: Lord
  - type: text
    content: ' your God out in the wilderness. From the day you left Egypt until now, you have been constantly rebelling against him. '
  '8':
  - type: text
    content: Even at Mount Sinai
  - type: note
    content: Hebrew Horeb, another name for Sinai.
  - type: text
    content: ' you made the '
  - type: text
    content: Lord
  - type: text
    content: ' so angry he was ready to destroy you. '
  '9':
  - type: text
    content: 'This happened when I was on the mountain receiving the tablets of stone inscribed with the words of the covenant that the '
  - type: text
    content: Lord
  - type: text
    content: ' had made with you. I was there for forty days and forty nights, and all that time I ate no food and drank no water. '
