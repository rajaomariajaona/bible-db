document_id: DEU.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Introduction to Moses’ First Address
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: These are the words that Moses spoke to all the people of Israel while they were in the wilderness east of the Jordan River. They were camped in the Jordan Valley
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Arabah; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 1:7.
      marker-yv: yv-n
    - type: text
      text: ' near Suph, between Paran on one side and Tophel, Laban, Hazeroth, and Di-zahab on the other.'
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has increased your population, making you as numerous as the stars! '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your ancestors, multiply you a thousand times more and bless you as he promised! '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But you are such a heavy load to carry! How can I deal with all your problems and bickering? '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Choose some well-respected men from each tribe who are known for their wisdom and understanding, and I will appoint them as your leaders.’
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“Then you responded, ‘Your plan is a good one.’ '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: So I took the wise and respected men you had selected from your tribes and appointed them to serve as judges and officials over you. Some were responsible for a thousand people, some for a hundred, some for fifty, and some for ten.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“At that time I instructed the judges, ‘You must hear the cases of your fellow Israelites and the foreigners living among you. Be perfectly fair in your decisions '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: and impartial in your judgments. Hear the cases of those who are poor as well as those who are rich. Don’t be afraid of anyone’s anger, for the decision you make is God’s decision. Bring me any cases that are too difficult for you, and I will handle them.’
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “At that time I gave you instructions about everything you were to do.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Scouts Explore the Land
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“Then, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God commanded us, we left Mount Sinai and traveled through the great and terrifying wilderness, as you yourselves remember, and headed toward the hill country of the Amorites. When we arrived at Kadesh-barnea, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Normally it takes only eleven days to travel from Mount Sinai
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Horeb, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: another name for Sinai; also in 1:6, 19.
      marker-yv: yv-n
    - type: text
      text: ' to Kadesh-barnea, going by way of Mount Seir. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'I said to you, ‘You have now reached the hill country of the Amorites that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God is giving us. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Look! He has placed the land in front of you. Go and occupy it as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your ancestors, has promised you. Don’t be afraid! Don’t be discouraged!’'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “But you all came to me and said, ‘First, let’s send out scouts to explore the land for us. They will advise us on the best route to take and which towns we should enter.’
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“This seemed like a good idea to me, so I chose twelve scouts, one from each of your tribes. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'They headed for the hill country and came to the valley of Eshcol and explored it. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'They picked some of its fruit and brought it back to us. And they reported, ‘The land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God has given us is indeed a good land.’'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Israel’s Rebellion against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“But you rebelled against the command of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and refused to go in. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'You complained in your tents and said, ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' must hate us. That’s why he has brought us here from Egypt—to hand us over to the Amorites to be slaughtered. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Where can we go? Our brothers have demoralized us with their report. They tell us, “The people of the land are taller and more powerful than we are, and their towns are large, with walls rising high into the sky! We even saw giants there—the descendants of Anak!”’
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '“But I said to you, ‘Don’t be shocked or afraid of them! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But forty years after the Israelites left Egypt, on the first day of the eleventh month,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'In the fortieth year, on the first day of the eleventh month. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This day in the ancient Hebrew lunar calendar occurred in January or February.
      marker-yv: yv-n
    - type: text
      text: ' Moses addressed the people of Israel, telling them everything the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded him to say. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is going ahead of you. He will fight for you, just as you saw him do in Egypt. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And you saw how the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God cared for you all along the way as you traveled through the wilderness, just as a father cares for his child. Now he has brought you to this place.’'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: '“But even after all he did, you refused to trust the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: who goes before you looking for the best places to camp, guiding you with a pillar of fire by night and a pillar of cloud by day.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: '“When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' heard your complaining, he became very angry. So he solemnly swore, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: '‘Not one of you from this wicked generation will live to see the good land I swore to give your ancestors, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'except Caleb son of Jephunneh. He will see this land because he has followed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' completely. I will give to him and his descendants some of the very land he explored during his scouting mission.’'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: '“And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was also angry with me because of you. He said to me, ‘Moses, not even you will enter the Promised Land! '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Instead, your assistant, Joshua son of Nun, will lead the people into the land. Encourage him, for he will lead Israel as they take possession of it. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'I will give the land to your little ones—your innocent children. You were afraid they would be captured, but they will be the ones who occupy it. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: This took place after he had defeated King Sihon of the Amorites, who ruled in Heshbon, and at Edrei had defeated King Og of Bashan, who ruled in Ashtaroth.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: As for you, turn around now and go on back through the wilderness toward the Red Sea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sea of reeds.
      marker-yv: yv-n
    - type: text
      text: ’
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: '“Then you confessed, ‘We have sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! We will go into the land and fight for it, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God has commanded us.’ So your men strapped on their weapons, thinking it would be easy to attack the hill country.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: '“But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told me to tell you, ‘Do not attack, for I am not with you. If you go ahead on your own, you will be crushed by your enemies.’'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: '“This is what I told you, but you would not listen. Instead, you again rebelled against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s command and arrogantly went into the hill country to fight. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'But the Amorites who lived there came out against you like a swarm of bees. They chased and battered you all the way from Seir to Hormah. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Then you returned and wept before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', but he refused to listen. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: So you stayed there at Kadesh for a long time.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'While the Israelites were in the land of Moab east of the Jordan River, Moses carefully explained the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s instructions as follows.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Command to Leave Sinai
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“When we were at Mount Sinai, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God said to us, ‘You have stayed at this mountain long enough. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: It is time to break camp and move on. Go to the hill country of the Amorites and to all the neighboring regions—the Jordan Valley, the hill country, the western foothills,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Shephelah.
      marker-yv: yv-n
    - type: text
      text: ' the Negev, and the coastal plain. Go to the land of the Canaanites and to Lebanon, and all the way to the great Euphrates River. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Look, I am giving all this land to you! Go in and occupy it, for it is the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' swore to give to your ancestors Abraham, Isaac, and Jacob, and to all their descendants.’”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses Appoints Leaders from Each Tribe
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Moses continued, “At that time I told you, ‘You are too great a burden for me to carry all by myself. '
