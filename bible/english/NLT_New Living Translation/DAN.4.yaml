document_id: DAN.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nebuchadnezzar’s Dream about a Tree
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses 4:1-3 are numbered 3:31-33 in Aramaic text.
    marker-yv: yv-n
  - type: text
    text: 'King Nebuchadnezzar sent this message to the people of every race and nation and language throughout the world:'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: “Peace and prosperity to you!
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I want you all to know about the miraculous signs and wonders the Most High God has performed for me.
- type: usfm
  marker: qm1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: How great are his signs,
- type: usfm
  marker: qm2
  children:
  - type: text
    text: how powerful his wonders!
- type: usfm
  marker: qm1
  children:
  - type: text
    text: His kingdom will last forever,
- type: usfm
  marker: qm2
  children:
  - type: text
    text: his rule through all generations.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses 4:4-37 are numbered 4:1-34 in Aramaic text.
    marker-yv: yv-n
  - type: text
    text: '“I, Nebuchadnezzar, was living in my palace in comfort and prosperity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But one night I had a dream that frightened me; I saw visions that terrified me as I lay in my bed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So I issued an order calling in all the wise men of Babylon, so they could tell me what my dream meant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When all the magicians, enchanters, astrologers,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Chaldeans.
    marker-yv: yv-n
  - type: text
    text: ' and fortune-tellers came in, I told them the dream, but they could not tell me what it meant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: At last Daniel came in before me, and I told him the dream. (He was named Belteshazzar after my god, and the spirit of the holy gods is in him.)
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “I said to him, ‘Belteshazzar, chief of the magicians, I know that the spirit of the holy gods is in you and that no mystery is too great for you to solve. Now tell me what my dream means.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“‘While I was lying in my bed, this is what I dreamed. I saw a large tree in the middle of the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The tree grew very tall and strong, reaching high into the heavens for all the world to see. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It had fresh green leaves, and it was loaded with fruit for all to eat. Wild animals lived in its shade, and birds nested in its branches. All the world was fed from this tree.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “‘Then as I lay there dreaming, I saw a messenger,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'a watcher; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 4:23.
    marker-yv: yv-n
  - type: text
    text: ' a holy one, coming down from heaven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The messenger shouted,
- type: usfm
  marker: qm1
  children:
  - type: text
    text: “Cut down the tree and lop off its branches!
- type: usfm
  marker: qm2
  children:
  - type: text
    text: Shake off its leaves and scatter its fruit!
- type: usfm
  marker: qm1
  children:
  - type: text
    text: Chase the wild animals from its shade
- type: usfm
  marker: qm2
  children:
  - type: text
    text: and the birds from its branches.
- type: usfm
  marker: qm1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But leave the stump and the roots in the ground,
- type: usfm
  marker: qm2
  children:
  - type: text
    text: bound with a band of iron and bronze
- type: usfm
  marker: qm2
  children:
  - type: text
    text: and surrounded by tender grass.
- type: usfm
  marker: qm1
  children:
  - type: text
    text: Now let him be drenched with the dew of heaven,
- type: usfm
  marker: qm2
  children:
  - type: text
    text: and let him live with the wild animals among the plants of the field.
- type: usfm
  marker: qm1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For seven periods of time,
- type: usfm
  marker: qm2
  children:
  - type: text
    text: let him have the mind of a wild animal
- type: usfm
  marker: qm2
  children:
  - type: text
    text: instead of the mind of a human.
- type: usfm
  marker: qm1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For this has been decreed by the messengers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the watchers.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: qm2
  children:
  - type: text
    text: it is commanded by the holy ones,
- type: usfm
  marker: qm1
  children:
  - type: text
    text: so that everyone may know
- type: usfm
  marker: qm2
  children:
  - type: text
    text: that the Most High rules over the kingdoms of the world.
- type: usfm
  marker: qm1
  children:
  - type: text
    text: He gives them to anyone he chooses—
- type: usfm
  marker: qm2
  children:
  - type: text
    text: even to the lowliest of people.”
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “‘Belteshazzar, that was the dream that I, King Nebuchadnezzar, had. Now tell me what it means, for none of the wise men of my kingdom can do so. But you can tell me because the spirit of the holy gods is in you.’
- type: usfm
  marker: s1
  children:
  - type: text
    text: Daniel Explains the Dream
  marker-yv: yv-h
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Upon hearing this, Daniel (also known as Belteshazzar) was overcome for a time, frightened by the meaning of the dream. Then the king said to him, ‘Belteshazzar, don’t be alarmed by the dream and what it means.’
- type: usfm
  marker: pm
  children:
  - type: text
    text: '“Belteshazzar replied, ‘I wish the events foreshadowed in this dream would happen to your enemies, my lord, and not to you! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The tree you saw was growing very tall and strong, reaching high into the heavens for all the world to see. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'It had fresh green leaves and was loaded with fruit for all to eat. Wild animals lived in its shade, and birds nested in its branches. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: That tree, Your Majesty, is you. For you have grown strong and great; your greatness reaches up to heaven, and your rule to the ends of the earth.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “‘Then you saw a messenger, a holy one, coming down from heaven and saying, “Cut down the tree and destroy it. But leave the stump and the roots in the ground, bound with a band of iron and bronze and surrounded by tender grass. Let him be drenched with the dew of heaven. Let him live with the animals of the field for seven periods of time.”
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“‘This is what the dream means, Your Majesty, and what the Most High has declared will happen to my lord the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'You will be driven from human society, and you will live in the fields with the wild animals. You will eat grass like a cow, and you will be drenched with the dew of heaven. Seven periods of time will pass while you live this way, until you learn that the Most High rules over the kingdoms of the world and gives them to anyone he chooses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: But the stump and roots of the tree were left in the ground. This means that you will receive your kingdom back again when you have learned that heaven rules.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “‘King Nebuchadnezzar, please accept my advice. Stop sinning and do what is right. Break from your wicked past and be merciful to the poor. Perhaps then you will continue to prosper.’
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Dream’s Fulfillment
  marker-yv: yv-h
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“But all these things did happen to King Nebuchadnezzar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Twelve months later he was taking a walk on the flat roof of the royal palace in Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: As he looked out across the city, he said, ‘Look at this great city of Babylon! By my own mighty power, I have built this beautiful city as my royal residence to display my majestic splendor.’
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“While these words were still in his mouth, a voice called down from heaven, ‘O King Nebuchadnezzar, this message is for you! You are no longer ruler of this kingdom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: You will be driven from human society. You will live in the fields with the wild animals, and you will eat grass like a cow. Seven periods of time will pass while you live this way, until you learn that the Most High rules over the kingdoms of the world and gives them to anyone he chooses.’
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: “That same hour the judgment was fulfilled, and Nebuchadnezzar was driven from human society. He ate grass like a cow, and he was drenched with the dew of heaven. He lived this way until his hair was as long as eagles’ feathers and his nails were like birds’ claws.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nebuchadnezzar Praises God
  marker-yv: yv-h
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “After this time had passed, I, Nebuchadnezzar, looked up to heaven. My sanity returned, and I praised and worshiped the Most High and honored the one who lives forever.
- type: usfm
  marker: qm1
  children:
  - type: text
    text: His rule is everlasting,
- type: usfm
  marker: qm2
  children:
  - type: text
    text: and his kingdom is eternal.
- type: usfm
  marker: qm1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: All the people of the earth
- type: usfm
  marker: qm2
  children:
  - type: text
    text: are nothing compared to him.
- type: usfm
  marker: qm1
  children:
  - type: text
    text: He does as he pleases
- type: usfm
  marker: qm2
  children:
  - type: text
    text: among the angels of heaven
- type: usfm
  marker: qm2
  children:
  - type: text
    text: and among the people of the earth.
- type: usfm
  marker: qm1
  children:
  - type: text
    text: No one can stop him or say to him,
- type: usfm
  marker: qm2
  children:
  - type: text
    text: ‘What do you mean by doing these things?’
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: “When my sanity returned to me, so did my honor and glory and kingdom. My advisers and nobles sought me out, and I was restored as head of my kingdom, with even greater honor than before.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: “Now I, Nebuchadnezzar, praise and glorify and honor the King of heaven. All his acts are just and true, and he is able to humble the proud.”
