document_id: DAN.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Nebuchadnezzar’s Dream about a Tree
  - type: text
    content: ' '
  - type: note
    content: Verses 4:1-3 are numbered 3:31-33 in Aramaic text.
  - type: text
    content: 'King Nebuchadnezzar sent this message to the people of every race and nation and language throughout the world:'
  - type: text
    content: “Peace and prosperity to you!
  '10':
  - type: text
    content: '“‘While I was lying in my bed, this is what I dreamed. I saw a large tree in the middle of the earth. '
  '11':
  - type: text
    content: 'The tree grew very tall and strong, reaching high into the heavens for all the world to see. '
  '12':
  - type: text
    content: It had fresh green leaves, and it was loaded with fruit for all to eat. Wild animals lived in its shade, and birds nested in its branches. All the world was fed from this tree.
  '13':
  - type: text
    content: “‘Then as I lay there dreaming, I saw a messenger,
  - type: note
    content: Aramaic a watcher; also in 4:23.
  - type: text
    content: ' a holy one, coming down from heaven. '
  '14':
  - type: text
    content: The messenger shouted,
  - type: text
    content: “Cut down the tree and lop off its branches!
  - type: text
    content: Shake off its leaves and scatter its fruit!
  - type: text
    content: Chase the wild animals from its shade
  - type: text
    content: and the birds from its branches.
  '15':
  - type: text
    content: But leave the stump and the roots in the ground,
  - type: text
    content: bound with a band of iron and bronze
  - type: text
    content: and surrounded by tender grass.
  - type: text
    content: Now let him be drenched with the dew of heaven,
  - type: text
    content: and let him live with the wild animals among the plants of the field.
  '16':
  - type: text
    content: For seven periods of time,
  - type: text
    content: let him have the mind of a wild animal
  - type: text
    content: instead of the mind of a human.
  '17':
  - type: text
    content: For this has been decreed by the messengers
  - type: note
    content: Aramaic the watchers.
  - type: text
    content: ;
  - type: text
    content: it is commanded by the holy ones,
  - type: text
    content: so that everyone may know
  - type: text
    content: that the Most High rules over the kingdoms of the world.
  - type: text
    content: He gives them to anyone he chooses—
  - type: text
    content: even to the lowliest of people.”
  '18':
  - type: text
    content: “‘Belteshazzar, that was the dream that I, King Nebuchadnezzar, had. Now tell me what it means, for none of the wise men of my kingdom can do so. But you can tell me because the spirit of the holy gods is in you.’
  - type: heading
    content: Daniel Explains the Dream
  '19':
  - type: text
    content: “Upon hearing this, Daniel (also known as Belteshazzar) was overcome for a time, frightened by the meaning of the dream. Then the king said to him, ‘Belteshazzar, don’t be alarmed by the dream and what it means.’
  - type: text
    content: '“Belteshazzar replied, ‘I wish the events foreshadowed in this dream would happen to your enemies, my lord, and not to you! '
  '2':
  - type: text
    content: “I want you all to know about the miraculous signs and wonders the Most High God has performed for me.
  '20':
  - type: text
    content: 'The tree you saw was growing very tall and strong, reaching high into the heavens for all the world to see. '
  '21':
  - type: text
    content: 'It had fresh green leaves and was loaded with fruit for all to eat. Wild animals lived in its shade, and birds nested in its branches. '
  '22':
  - type: text
    content: That tree, Your Majesty, is you. For you have grown strong and great; your greatness reaches up to heaven, and your rule to the ends of the earth.
  '23':
  - type: text
    content: “‘Then you saw a messenger, a holy one, coming down from heaven and saying, “Cut down the tree and destroy it. But leave the stump and the roots in the ground, bound with a band of iron and bronze and surrounded by tender grass. Let him be drenched with the dew of heaven. Let him live with the animals of the field for seven periods of time.”
  '24':
  - type: text
    content: '“‘This is what the dream means, Your Majesty, and what the Most High has declared will happen to my lord the king. '
  '25':
  - type: text
    content: 'You will be driven from human society, and you will live in the fields with the wild animals. You will eat grass like a cow, and you will be drenched with the dew of heaven. Seven periods of time will pass while you live this way, until you learn that the Most High rules over the kingdoms of the world and gives them to anyone he chooses. '
  '26':
  - type: text
    content: But the stump and roots of the tree were left in the ground. This means that you will receive your kingdom back again when you have learned that heaven rules.
  '27':
  - type: text
    content: “‘King Nebuchadnezzar, please accept my advice. Stop sinning and do what is right. Break from your wicked past and be merciful to the poor. Perhaps then you will continue to prosper.’
  - type: heading
    content: The Dream’s Fulfillment
  '28':
  - type: text
    content: '“But all these things did happen to King Nebuchadnezzar. '
  '29':
  - type: text
    content: 'Twelve months later he was taking a walk on the flat roof of the royal palace in Babylon. '
  '3':
  - type: text
    content: How great are his signs,
  - type: text
    content: how powerful his wonders!
  - type: text
    content: His kingdom will last forever,
  - type: text
    content: his rule through all generations.
  '30':
  - type: text
    content: As he looked out across the city, he said, ‘Look at this great city of Babylon! By my own mighty power, I have built this beautiful city as my royal residence to display my majestic splendor.’
  '31':
  - type: text
    content: '“While these words were still in his mouth, a voice called down from heaven, ‘O King Nebuchadnezzar, this message is for you! You are no longer ruler of this kingdom. '
  '32':
  - type: text
    content: You will be driven from human society. You will live in the fields with the wild animals, and you will eat grass like a cow. Seven periods of time will pass while you live this way, until you learn that the Most High rules over the kingdoms of the world and gives them to anyone he chooses.’
  '33':
  - type: text
    content: “That same hour the judgment was fulfilled, and Nebuchadnezzar was driven from human society. He ate grass like a cow, and he was drenched with the dew of heaven. He lived this way until his hair was as long as eagles’ feathers and his nails were like birds’ claws.
  - type: heading
    content: Nebuchadnezzar Praises God
  '34':
  - type: text
    content: “After this time had passed, I, Nebuchadnezzar, looked up to heaven. My sanity returned, and I praised and worshiped the Most High and honored the one who lives forever.
  - type: text
    content: His rule is everlasting,
  - type: text
    content: and his kingdom is eternal.
  '35':
  - type: text
    content: All the people of the earth
  - type: text
    content: are nothing compared to him.
  - type: text
    content: He does as he pleases
  - type: text
    content: among the angels of heaven
  - type: text
    content: and among the people of the earth.
  - type: text
    content: No one can stop him or say to him,
  - type: text
    content: ‘What do you mean by doing these things?’
  '36':
  - type: text
    content: “When my sanity returned to me, so did my honor and glory and kingdom. My advisers and nobles sought me out, and I was restored as head of my kingdom, with even greater honor than before.
  '37':
  - type: text
    content: “Now I, Nebuchadnezzar, praise and glorify and honor the King of heaven. All his acts are just and true, and he is able to humble the proud.”
  '4':
  - type: text
    content: ' '
  - type: note
    content: Verses 4:4-37 are numbered 4:1-34 in Aramaic text.
  - type: text
    content: '“I, Nebuchadnezzar, was living in my palace in comfort and prosperity. '
  '5':
  - type: text
    content: 'But one night I had a dream that frightened me; I saw visions that terrified me as I lay in my bed. '
  '6':
  - type: text
    content: 'So I issued an order calling in all the wise men of Babylon, so they could tell me what my dream meant. '
  '7':
  - type: text
    content: When all the magicians, enchanters, astrologers,
  - type: note
    content: Or Chaldeans.
  - type: text
    content: ' and fortune-tellers came in, I told them the dream, but they could not tell me what it meant. '
  '8':
  - type: text
    content: At last Daniel came in before me, and I told him the dream. (He was named Belteshazzar after my god, and the spirit of the holy gods is in him.)
  '9':
  - type: text
    content: “I said to him, ‘Belteshazzar, chief of the magicians, I know that the spirit of the holy gods is in you and that no mystery is too great for you to solve. Now tell me what my dream means.
