document_id: 1CO.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Message of Wisdom
  - type: text
    content: When I first came to you, dear brothers and sisters,
  - type: note
    content: Greek brothers.
  - type: text
    content: ' I didn’t use lofty words and impressive wisdom to tell you God’s secret plan.'
  - type: note
    content: Greek God’s mystery; other manuscripts read God’s testimony.
  - type: text
    content: ' '
  '10':
  - type: text
    content: But
  - type: note
    content: Some manuscripts read For.
  - type: text
    content: ' it was to us that God revealed these things by his Spirit. For his Spirit searches out everything and shows us God’s deep secrets. '
  '11':
  - type: text
    content: 'No one can know a person’s thoughts except that person’s own spirit, and no one can know God’s thoughts except God’s own Spirit. '
  '12':
  - type: text
    content: And we have received God’s Spirit (not the world’s spirit), so we can know the wonderful things God has freely given us.
  '13':
  - type: text
    content: When we tell you these things, we do not use words that come from human wisdom. Instead, we speak words given to us by the Spirit, using the Spirit’s words to explain spiritual truths.
  - type: note
    content: Or explaining spiritual truths in spiritual language, or explaining spiritual truths to spiritual people.
  - type: text
    content: ' '
  '14':
  - type: text
    content: But people who aren’t spiritual
  - type: note
    content: Or who don’t have the Spirit; or who have only physical life.
  - type: text
    content: ' can’t receive these truths from God’s Spirit. It all sounds foolish to them and they can’t understand it, for only those who are spiritual can understand what the Spirit means. '
  '15':
  - type: text
    content: 'Those who are spiritual can evaluate all things, but they themselves cannot be evaluated by others. '
  '16':
  - type: text
    content: For,
  - type: text
    content: '“Who can know the '
  - type: text
    content: Lord
  - type: text
    content: ’s thoughts?
  - type: text
    content: Who knows enough to teach him?”
  - type: note
    content: Isa 40:13 (Greek version).
  - type: text
    content: But we understand these things, for we have the mind of Christ.
  '2':
  - type: text
    content: 'For I decided that while I was with you I would forget everything except Jesus Christ, the one who was crucified. '
  '3':
  - type: text
    content: 'I came to you in weakness—timid and trembling. '
  '4':
  - type: text
    content: 'And my message and my preaching were very plain. Rather than using clever and persuasive speeches, I relied only on the power of the Holy Spirit. '
  '5':
  - type: text
    content: I did this so you would trust not in human wisdom but in the power of God.
  '6':
  - type: text
    content: 'Yet when I am among mature believers, I do speak with words of wisdom, but not the kind of wisdom that belongs to this world or to the rulers of this world, who are soon forgotten. '
  '7':
  - type: text
    content: No, the wisdom we speak of is the mystery of God
  - type: note
    content: Greek But we speak God’s wisdom in a mystery.
  - type: text
    content: '—his plan that was previously hidden, even though he made it for our ultimate glory before the world began. '
  '8':
  - type: text
    content: 'But the rulers of this world have not understood it; if they had, they would not have crucified our glorious Lord. '
  '9':
  - type: text
    content: That is what the Scriptures mean when they say,
  - type: text
    content: “No eye has seen, no ear has heard,
  - type: text
    content: and no mind has imagined
  - type: text
    content: what God has prepared
  - type: text
    content: for those who love him.”
  - type: note
    content: Isa 64:4.
