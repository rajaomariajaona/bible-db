document_id: 1CO.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Message of Wisdom
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When I first came to you, dear brothers and sisters,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: brothers.
    marker-yv: yv-n
  - type: text
    text: ' I didn’t use lofty words and impressive wisdom to tell you God’s secret plan.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'God’s mystery; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'other manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: God’s testimony.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For I decided that while I was with you I would forget everything except Jesus Christ, the one who was crucified. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I came to you in weakness—timid and trembling. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And my message and my preaching were very plain. Rather than using clever and persuasive speeches, I relied only on the power of the Holy Spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I did this so you would trust not in human wisdom but in the power of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Yet when I am among mature believers, I do speak with words of wisdom, but not the kind of wisdom that belongs to this world or to the rulers of this world, who are soon forgotten. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: No, the wisdom we speak of is the mystery of God
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: But we speak God’s wisdom in a mystery.
    marker-yv: yv-n
  - type: text
    text: '—his plan that was previously hidden, even though he made it for our ultimate glory before the world began. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But the rulers of this world have not understood it; if they had, they would not have crucified our glorious Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: That is what the Scriptures mean when they say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “No eye has seen, no ear has heard,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no mind has imagined
- type: usfm
  marker: q1
  children:
  - type: text
    text: what God has prepared
- type: usfm
  marker: q2
  children:
  - type: text
    text: for those who love him.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 64:4.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: For.
    marker-yv: yv-n
  - type: text
    text: ' it was to us that God revealed these things by his Spirit. For his Spirit searches out everything and shows us God’s deep secrets. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'No one can know a person’s thoughts except that person’s own spirit, and no one can know God’s thoughts except God’s own Spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And we have received God’s Spirit (not the world’s spirit), so we can know the wonderful things God has freely given us.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When we tell you these things, we do not use words that come from human wisdom. Instead, we speak words given to us by the Spirit, using the Spirit’s words to explain spiritual truths.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'explaining spiritual truths in spiritual language, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: explaining spiritual truths to spiritual people.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But people who aren’t spiritual
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'who don’t have the Spirit; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: who have only physical life.
    marker-yv: yv-n
  - type: text
    text: ' can’t receive these truths from God’s Spirit. It all sounds foolish to them and they can’t understand it, for only those who are spiritual can understand what the Spirit means. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Those who are spiritual can evaluate all things, but they themselves cannot be evaluated by others. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Who can know the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s thoughts?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who knows enough to teach him?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 40:13 (Greek version).
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: text
    text: But we understand these things, for we have the mind of Christ.
