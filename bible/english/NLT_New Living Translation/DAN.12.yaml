document_id: DAN.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Time of the End
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: “At that time Michael, the archangel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the great prince.
      marker-yv: yv-n
    - type: text
      text: ' who stands guard over your nation, will arise. Then there will be a time of anguish greater than any since nations first came into existence. But at that time every one of your people whose name is written in the book will be rescued. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Many will be purified, cleansed, and refined by these trials. But the wicked will continue in their wickedness, and none of them will understand. Only those who are wise will know what it means.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “From the time the daily sacrifice is stopped and the sacrilegious object that causes desecration
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the abomination of desolation.
      marker-yv: yv-n
    - type: text
      text: ' is set up to be worshiped, there will be 1,290 days. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And blessed are those who wait and remain until the end of the 1,335 days!
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “As for you, go your way until the end. You will rest, and then at the end of the days, you will rise again to receive the inheritance set aside for you.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Many of those whose bodies lie dead and buried will rise up, some to everlasting life and some to shame and everlasting disgrace. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Those who are wise will shine as bright as the sky, and those who lead many to righteousness will shine like the stars forever. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But you, Daniel, keep this prophecy a secret; seal up the book until the time of the end, when many will rush here and there, and knowledge will increase.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I, Daniel, looked and saw two others standing on opposite banks of the river. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One of them asked the man dressed in linen, who was now standing above the river, “How long will it be until these shocking events are over?”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The man dressed in linen, who was standing above the river, raised both his hands toward heaven and took a solemn oath by the One who lives forever, saying, “It will go on for a time, times, and half a time. When the shattering of the holy people has finally come to an end, all these things will have happened.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I heard what he said, but I did not understand what he meant. So I asked, “How will all this finally end, my lord?”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he said, “Go now, Daniel, for what I have said is kept secret and sealed until the time of the end. '
