document_id: REV.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Prologue
  - type: text
    content: This is a revelation from
  - type: note
    content: Or of.
  - type: text
    content: ' Jesus Christ, which God gave him to show his servants the events that must soon'
  - type: note
    content: Or suddenly, or quickly.
  - type: text
    content: ' take place. He sent an angel to present this revelation to his servant John, '
  '10':
  - type: text
    content: It was the Lord’s Day, and I was worshiping in the Spirit.
  - type: note
    content: Or in spirit.
  - type: text
    content: ' Suddenly, I heard behind me a loud voice like a trumpet blast. '
  '11':
  - type: text
    content: 'It said, '
  - type: text
    content: “Write in a book
  - type: note
    content: Or on a scroll.
  - type: text
    content: ' '
  - type: text
    content: everything you see, and send it to the seven churches in the cities of Ephesus, Smyrna, Pergamum, Thyatira, Sardis, Philadelphia, and Laodicea.”
  '12':
  - type: text
    content: 'When I turned to see who was speaking to me, I saw seven gold lampstands. '
  '13':
  - type: text
    content: And standing in the middle of the lampstands was someone like the Son of Man.
  - type: note
    content: Or like a son of man. See Dan 7:13. “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' He was wearing a long robe with a gold sash across his chest. '
  '14':
  - type: text
    content: 'His head and his hair were white like wool, as white as snow. And his eyes were like flames of fire. '
  '15':
  - type: text
    content: 'His feet were like polished bronze refined in a furnace, and his voice thundered like mighty ocean waves. '
  '16':
  - type: text
    content: He held seven stars in his right hand, and a sharp two-edged sword came from his mouth. And his face was like the sun in all its brilliance.
  '17':
  - type: text
    content: 'When I saw him, I fell at his feet as if I were dead. But he laid his right hand on me and said, '
  - type: text
    content: “Don’t be afraid! I am the First and the Last.
  - type: text
    content: ' '
  '18':
  - type: text
    content: I am the living one. I died, but look—I am alive forever and ever! And I hold the keys of death and the grave.
  - type: note
    content: Greek and Hades.
  '19':
  - type: text
    content: ' '
  - type: text
    content: “Write down what you have seen—both the things that are now happening and the things that will happen.
  - type: text
    content: ' '
  - type: note
    content: Or what you have seen and what they mean—the things that have already begun to happen.
  '2':
  - type: text
    content: who faithfully reported everything he saw. This is his report of the word of God and the testimony of Jesus Christ.
  '20':
  - type: text
    content: 'This is the meaning of the mystery of the seven stars you saw in my right hand and the seven gold lampstands: The seven stars are the angels'
  - type: note
    content: Or the messengers.
  - type: text
    content: ' '
  - type: text
    content: of the seven churches, and the seven lampstands are the seven churches.
  '3':
  - type: text
    content: God blesses the one who reads the words of this prophecy to the church, and he blesses all who listen to its message and obey what it says, for the time is near.
  - type: heading
    content: John’s Greeting to the Seven Churches
  '4':
  - type: text
    content: This letter is from John to the seven churches in the province of Asia.
  - type: note
    content: Asia was a Roman province in what is now western Turkey.
  - type: text
    content: Grace and peace to you from the one who is, who always was, and who is still to come; from the sevenfold Spirit
  - type: note
    content: Greek the seven spirits.
  - type: text
    content: ' before his throne; '
  '5':
  - type: text
    content: and from Jesus Christ. He is the faithful witness to these things, the first to rise from the dead, and the ruler of all the kings of the world.
  - type: text
    content: 'All glory to him who loves us and has freed us from our sins by shedding his blood for us. '
  '6':
  - type: text
    content: He has made us a Kingdom of priests for God his Father. All glory and power to him forever and ever! Amen.
  '7':
  - type: text
    content: Look! He comes with the clouds of heaven.
  - type: text
    content: And everyone will see him—
  - type: text
    content: even those who pierced him.
  - type: text
    content: And all the nations of the world
  - type: text
    content: will mourn for him.
  - type: text
    content: Yes! Amen!
  '8':
  - type: text
    content: “I am the Alpha and the Omega—the beginning and the end,”
  - type: note
    content: Greek I am the Alpha and the Omega, referring to the first and last letters of the Greek alphabet.
  - type: text
    content: ' says the Lord God. “I am the one who is, who always was, and who is still to come—the Almighty One.”'
  - type: heading
    content: Vision of the Son of Man
  '9':
  - type: text
    content: 'I, John, am your brother and your partner in suffering and in God’s Kingdom and in the patient endurance to which Jesus calls us. I was exiled to the island of Patmos for preaching the word of God and for my testimony about Jesus. '
