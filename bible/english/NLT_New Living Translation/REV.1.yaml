document_id: REV.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prologue
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: This is a revelation from
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of.
      marker-yv: yv-n
    - type: text
      text: ' Jesus Christ, which God gave him to show his servants the events that must soon'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'suddenly, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quickly.
      marker-yv: yv-n
    - type: text
      text: ' take place. He sent an angel to present this revelation to his servant John, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: It was the Lord’s Day, and I was worshiping in the Spirit.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in spirit.
      marker-yv: yv-n
    - type: text
      text: ' Suddenly, I heard behind me a loud voice like a trumpet blast. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'It said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Write in a book
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on a scroll.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: everything you see, and send it to the seven churches in the cities of Ephesus, Smyrna, Pergamum, Thyatira, Sardis, Philadelphia, and Laodicea.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When I turned to see who was speaking to me, I saw seven gold lampstands. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: And standing in the middle of the lampstands was someone like the Son of Man.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'like a son of man. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Dan 7:13. “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: text
      text: ' He was wearing a long robe with a gold sash across his chest. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'His head and his hair were white like wool, as white as snow. And his eyes were like flames of fire. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'His feet were like polished bronze refined in a furnace, and his voice thundered like mighty ocean waves. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: He held seven stars in his right hand, and a sharp two-edged sword came from his mouth. And his face was like the sun in all its brilliance.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'When I saw him, I fell at his feet as if I were dead. But he laid his right hand on me and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t be afraid! I am the First and the Last.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am the living one. I died, but look—I am alive forever and ever! And I hold the keys of death and the grave.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and Hades.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Write down what you have seen—both the things that are now happening and the things that will happen.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: what you have seen and what they mean—the things that have already begun to happen.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: who faithfully reported everything he saw. This is his report of the word of God and the testimony of Jesus Christ.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'This is the meaning of the mystery of the seven stars you saw in my right hand and the seven gold lampstands: The seven stars are the angels'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the messengers.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: of the seven churches, and the seven lampstands are the seven churches.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: God blesses the one who reads the words of this prophecy to the church, and he blesses all who listen to its message and obey what it says, for the time is near.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: John’s Greeting to the Seven Churches
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: This letter is from John to the seven churches in the province of Asia.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4a '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Asia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was a Roman province in what is now western Turkey.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: Grace and peace to you from the one who is, who always was, and who is still to come; from the sevenfold Spirit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the seven spirits.
      marker-yv: yv-n
    - type: text
      text: ' before his throne; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: and from Jesus Christ. He is the faithful witness to these things, the first to rise from the dead, and the ruler of all the kings of the world.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All glory to him who loves us and has freed us from our sins by shedding his blood for us. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: He has made us a Kingdom of priests for God his Father. All glory and power to him forever and ever! Amen.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Look! He comes with the clouds of heaven.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And everyone will see him—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even those who pierced him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all the nations of the world
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will mourn for him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes! Amen!
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “I am the Alpha and the Omega—the beginning and the end,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'I am the Alpha and the Omega, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referring to the first and last letters of the Greek alphabet.
      marker-yv: yv-n
    - type: text
      text: ' says the Lord God. “I am the one who is, who always was, and who is still to come—the Almighty One.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vision of the Son of Man
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I, John, am your brother and your partner in suffering and in God’s Kingdom and in the patient endurance to which Jesus calls us. I was exiled to the island of Patmos for preaching the word of God and for my testimony about Jesus. '
