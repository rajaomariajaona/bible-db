document_id: 1CH.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David Takes a Census
  - type: text
    content: 'Satan rose up against Israel and caused David to take a census of the people of Israel. '
  '10':
  - type: text
    content: '“Go and say to David, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will give you three choices. Choose one of these punishments, and I will inflict it on you.’”'
  '11':
  - type: text
    content: 'So Gad came to David and said, “These are the choices the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you. '
  '12':
  - type: text
    content: 'You may choose three years of famine, three months of destruction by the sword of your enemies, or three days of severe plague as the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' brings devastation throughout the land of Israel. Decide what answer I should give the '
  - type: text
    content: Lord
  - type: text
    content: ' who sent me.”'
  '13':
  - type: text
    content: '“I’m in a desperate situation!” David replied to Gad. “But let me fall into the hands of the '
  - type: text
    content: Lord
  - type: text
    content: ', for his mercy is very great. Do not let me fall into human hands.”'
  '14':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' sent a plague upon Israel, and 70,000 people died as a result. '
  '15':
  - type: text
    content: 'And God sent an angel to destroy Jerusalem. But just as the angel was preparing to destroy it, the '
  - type: text
    content: Lord
  - type: text
    content: ' relented and said to the death angel, “Stop! That is enough!” At that moment the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' was standing by the threshing floor of Araunah'
  - type: note
    content: As in parallel text at 2 Sam 24:16; Hebrew reads Ornan, another name for Araunah; also in 21:18-28.
  - type: text
    content: ' the Jebusite.'
  '16':
  - type: text
    content: 'David looked up and saw the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' standing between heaven and earth with his sword drawn, reaching out over Jerusalem. So David and the leaders of Israel put on burlap to show their deep distress and fell face down on the ground. '
  '17':
  - type: text
    content: 'And David said to God, “I am the one who called for the census! I am the one who has sinned and done wrong! But these people are as innocent as sheep—what have they done? O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, let your anger fall against me and my family, but do not destroy your people.”'
  - type: heading
    content: David Builds an Altar
  '18':
  - type: text
    content: 'Then the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' told Gad to instruct David to go up and build an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' on the threshing floor of Araunah the Jebusite. '
  '19':
  - type: text
    content: 'So David went up to do what the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him through Gad. '
  '2':
  - type: text
    content: So David said to Joab and the commanders of the army, “Take a census of all the people of Israel—from Beersheba in the south to Dan in the north—and bring me a report so I may know how many there are.”
  '20':
  - type: text
    content: 'Araunah, who was busy threshing wheat at the time, turned and saw the angel there. His four sons, who were with him, ran away and hid. '
  '21':
  - type: text
    content: When Araunah saw David approaching, he left his threshing floor and bowed before David with his face to the ground.
  '22':
  - type: text
    content: 'David said to Araunah, “Let me buy this threshing floor from you at its full price. Then I will build an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' there, so that he will stop the plague.”'
  '23':
  - type: text
    content: “Take it, my lord the king, and use it as you wish,” Araunah said to David. “I will give the oxen for the burnt offerings, and the threshing boards for wood to build a fire on the altar, and the wheat for the grain offering. I will give it all to you.”
  '24':
  - type: text
    content: 'But King David replied to Araunah, “No, I insist on buying it for the full price. I will not take what is yours and give it to the '
  - type: text
    content: Lord
  - type: text
    content: '. I will not present burnt offerings that have cost me nothing!” '
  '25':
  - type: text
    content: So David gave Araunah 600 pieces of gold
  - type: note
    content: Hebrew 600 shekels of gold, about 15 pounds or 6.8 kilograms in weight.
  - type: text
    content: ' in payment for the threshing floor.'
  '26':
  - type: text
    content: 'David built an altar there to the '
  - type: text
    content: Lord
  - type: text
    content: ' and sacrificed burnt offerings and peace offerings. And when David prayed, the '
  - type: text
    content: Lord
  - type: text
    content: ' answered him by sending fire from heaven to burn up the offering on the altar. '
  '27':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to the angel, who put the sword back into its sheath.'
  '28':
  - type: text
    content: 'When David saw that the '
  - type: text
    content: Lord
  - type: text
    content: ' had answered his prayer, he offered sacrifices there at Araunah’s threshing floor. '
  '29':
  - type: text
    content: 'At that time the Tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the altar of burnt offering that Moses had made in the wilderness were located at the place of worship in Gibeon. '
  '3':
  - type: text
    content: 'But Joab replied, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' increase the number of his people a hundred times over! But why, my lord the king, do you want to do this? Are they not all your servants? Why must you cause Israel to sin?”'
  '30':
  - type: text
    content: 'But David was not able to go there to inquire of God, because he was terrified by the drawn sword of the angel of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: 'But the king insisted that they take the census, so Joab traveled throughout all Israel to count the people. Then he returned to Jerusalem '
  '5':
  - type: text
    content: 'and reported the number of people to David. There were 1,100,000 warriors in all Israel who could handle a sword, and 470,000 in Judah. '
  '6':
  - type: text
    content: But Joab did not include the tribes of Levi and Benjamin in the census because he was so distressed at what the king had made him do.
  - type: heading
    content: Judgment for David’s Sin
  '7':
  - type: text
    content: 'God was very displeased with the census, and he punished Israel for it. '
  '8':
  - type: text
    content: Then David said to God, “I have sinned greatly by taking this census. Please forgive my guilt for doing this foolish thing.”
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Gad, David’s seer. This was the message: '
