document_id: 1CH.21,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Takes a Census
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Satan rose up against Israel and caused David to take a census of the people of Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go and say to David, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I will give you three choices. Choose one of these punishments, and I will inflict it on you.’”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Gad came to David and said, “These are the choices the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You may choose three years of famine, three months of destruction by the sword of your enemies, or three days of severe plague as the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brings devastation throughout the land of Israel. Decide what answer I should give the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who sent me.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I’m in a desperate situation!” David replied to Gad. “But let me fall into the hands of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for his mercy is very great. Do not let me fall into human hands.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent a plague upon Israel, and 70,000 people died as a result. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God sent an angel to destroy Jerusalem. But just as the angel was preparing to destroy it, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' relented and said to the death angel, “Stop! That is enough!” At that moment the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was standing by the threshing floor of Araunah'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 2 Sam 24:16; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ornan, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: another name for Araunah; also in 21:18-28.
      marker-yv: yv-n
    - type: text
      text: ' the Jebusite.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David looked up and saw the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' standing between heaven and earth with his sword drawn, reaching out over Jerusalem. So David and the leaders of Israel put on burlap to show their deep distress and fell face down on the ground. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David said to God, “I am the one who called for the census! I am the one who has sinned and done wrong! But these people are as innocent as sheep—what have they done? O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, let your anger fall against me and my family, but do not destroy your people.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Builds an Altar
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told Gad to instruct David to go up and build an altar to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on the threshing floor of Araunah the Jebusite. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So David went up to do what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded him through Gad. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So David said to Joab and the commanders of the army, “Take a census of all the people of Israel—from Beersheba in the south to Dan in the north—and bring me a report so I may know how many there are.”
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Araunah, who was busy threshing wheat at the time, turned and saw the angel there. His four sons, who were with him, ran away and hid. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When Araunah saw David approaching, he left his threshing floor and bowed before David with his face to the ground.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David said to Araunah, “Let me buy this threshing floor from you at its full price. Then I will build an altar to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' there, so that he will stop the plague.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Take it, my lord the king, and use it as you wish,” Araunah said to David. “I will give the oxen for the burnt offerings, and the threshing boards for wood to build a fire on the altar, and the wheat for the grain offering. I will give it all to you.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But King David replied to Araunah, “No, I insist on buying it for the full price. I will not take what is yours and give it to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. I will not present burnt offerings that have cost me nothing!” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David gave Araunah 600 pieces of gold
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '600 shekels of gold, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: about 15 pounds or 6.8 kilograms in weight.
      marker-yv: yv-n
    - type: text
      text: ' in payment for the threshing floor.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David built an altar there to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and sacrificed burnt offerings and peace offerings. And when David prayed, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered him by sending fire from heaven to burn up the offering on the altar. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to the angel, who put the sword back into its sheath.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David saw that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had answered his prayer, he offered sacrifices there at Araunah’s threshing floor. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time the Tabernacle of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the altar of burnt offering that Moses had made in the wilderness were located at the place of worship in Gibeon. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Joab replied, “May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' increase the number of his people a hundred times over! But why, my lord the king, do you want to do this? Are they not all your servants? Why must you cause Israel to sin?”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But David was not able to go there to inquire of God, because he was terrified by the drawn sword of the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the king insisted that they take the census, so Joab traveled throughout all Israel to count the people. Then he returned to Jerusalem '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and reported the number of people to David. There were 1,100,000 warriors in all Israel who could handle a sword, and 470,000 in Judah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Joab did not include the tribes of Levi and Benjamin in the census because he was so distressed at what the king had made him do.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment for David’s Sin
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'God was very displeased with the census, and he punished Israel for it. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then David said to God, “I have sinned greatly by taking this census. Please forgive my guilt for doing this foolish thing.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Gad, David’s seer. This was the message: '
