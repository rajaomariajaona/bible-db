document_id: JAS.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings from James
  - type: text
    content: This letter is from James, a slave of God and of the Lord Jesus Christ.
  - type: text
    content: I am writing to the “twelve tribes”—Jewish believers scattered abroad.
  - type: text
    content: Greetings!
  - type: heading
    content: Faith and Endurance
  '10':
  - type: text
    content: 'And those who are rich should boast that God has humbled them. They will fade away like a little flower in the field. '
  '11':
  - type: text
    content: The hot sun rises and the grass withers; the little flower droops and falls, and its beauty fades away. In the same way, the rich will fade away with all of their achievements.
  '12':
  - type: text
    content: 'God blesses those who patiently endure testing and temptation. Afterward they will receive the crown of life that God has promised to those who love him. '
  '13':
  - type: text
    content: And remember, when you are being tempted, do not say, “God is tempting me.” God is never tempted to do wrong,
  - type: note
    content: Or God should not be put to a test by evil people.
  - type: text
    content: ' and he never tempts anyone else. '
  '14':
  - type: text
    content: 'Temptation comes from our own desires, which entice us and drag us away. '
  '15':
  - type: text
    content: These desires give birth to sinful actions. And when sin is allowed to grow, it gives birth to death.
  '16':
  - type: text
    content: 'So don’t be misled, my dear brothers and sisters. '
  '17':
  - type: text
    content: Whatever is good and perfect is a gift coming down to us from God our Father, who created all the lights in the heavens.
  - type: note
    content: Greek from above, from the Father of lights.
  - type: text
    content: ' He never changes or casts a shifting shadow.'
  - type: note
    content: Some manuscripts read He never changes, as a shifting shadow does.
  - type: text
    content: ' '
  '18':
  - type: text
    content: He chose to give birth to us by giving us his true word. And we, out of all creation, became his prized possession.
  - type: note
    content: Greek we became a kind of firstfruit of his creatures.
  - type: heading
    content: Listening and Doing
  '19':
  - type: text
    content: 'Understand this, my dear brothers and sisters: You must all be quick to listen, slow to speak, and slow to get angry. '
  '2':
  - type: text
    content: Dear brothers and sisters,
  - type: note
    content: Greek brothers; also in 1:16, 19.
  - type: text
    content: ' when troubles of any kind come your way, consider it an opportunity for great joy. '
  '20':
  - type: text
    content: Human anger
  - type: note
    content: Greek A man’s anger.
  - type: text
    content: ' does not produce the righteousness'
  - type: note
    content: Or the justice.
  - type: text
    content: ' God desires. '
  '21':
  - type: text
    content: So get rid of all the filth and evil in your lives, and humbly accept the word God has planted in your hearts, for it has the power to save your souls.
  '22':
  - type: text
    content: 'But don’t just listen to God’s word. You must do what it says. Otherwise, you are only fooling yourselves. '
  '23':
  - type: text
    content: 'For if you listen to the word and don’t obey, it is like glancing at your face in a mirror. '
  '24':
  - type: text
    content: 'You see yourself, walk away, and forget what you look like. '
  '25':
  - type: text
    content: But if you look carefully into the perfect law that sets you free, and if you do what it says and don’t forget what you heard, then God will bless you for doing it.
  '26':
  - type: text
    content: 'If you claim to be religious but don’t control your tongue, you are fooling yourself, and your religion is worthless. '
  '27':
  - type: text
    content: Pure and genuine religion in the sight of God the Father means caring for orphans and widows in their distress and refusing to let the world corrupt you.
  '3':
  - type: text
    content: 'For you know that when your faith is tested, your endurance has a chance to grow. '
  '4':
  - type: text
    content: So let it grow, for when your endurance is fully developed, you will be perfect and complete, needing nothing.
  '5':
  - type: text
    content: 'If you need wisdom, ask our generous God, and he will give it to you. He will not rebuke you for asking. '
  '6':
  - type: text
    content: 'But when you ask him, be sure that your faith is in God alone. Do not waver, for a person with divided loyalty is as unsettled as a wave of the sea that is blown and tossed by the wind. '
  '7':
  - type: text
    content: 'Such people should not expect to receive anything from the Lord. '
  '8':
  - type: text
    content: Their loyalty is divided between God and the world, and they are unstable in everything they do.
  '9':
  - type: text
    content: Believers who are
  - type: note
    content: Greek The brother who is.
  - type: text
    content: ' poor have something to boast about, for God has honored them. '
