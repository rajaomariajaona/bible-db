document_id: JAS.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greetings from James
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: This letter is from James, a slave of God and of the Lord Jesus Christ.
  - type: usfm
    marker: p
    children:
    - type: text
      text: I am writing to the “twelve tribes”—Jewish believers scattered abroad.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Greetings!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faith and Endurance
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And those who are rich should boast that God has humbled them. They will fade away like a little flower in the field. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The hot sun rises and the grass withers; the little flower droops and falls, and its beauty fades away. In the same way, the rich will fade away with all of their achievements.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God blesses those who patiently endure testing and temptation. Afterward they will receive the crown of life that God has promised to those who love him. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And remember, when you are being tempted, do not say, “God is tempting me.” God is never tempted to do wrong,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: God should not be put to a test by evil people.
      marker-yv: yv-n
    - type: text
      text: ' and he never tempts anyone else. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Temptation comes from our own desires, which entice us and drag us away. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These desires give birth to sinful actions. And when sin is allowed to grow, it gives birth to death.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So don’t be misled, my dear brothers and sisters. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whatever is good and perfect is a gift coming down to us from God our Father, who created all the lights in the heavens.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from above, from the Father of lights.
      marker-yv: yv-n
    - type: text
      text: ' He never changes or casts a shifting shadow.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He never changes, as a shifting shadow does.
      marker-yv: yv-n
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He chose to give birth to us by giving us his true word. And we, out of all creation, became his prized possession.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: we became a kind of firstfruit of his creatures.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Listening and Doing
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Understand this, my dear brothers and sisters: You must all be quick to listen, slow to speak, and slow to get angry. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 1:16, 19.
      marker-yv: yv-n
    - type: text
      text: ' when troubles of any kind come your way, consider it an opportunity for great joy. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Human anger
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:20a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: A man’s anger.
      marker-yv: yv-n
    - type: text
      text: ' does not produce the righteousness'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:20b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the justice.
      marker-yv: yv-n
    - type: text
      text: ' God desires. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So get rid of all the filth and evil in your lives, and humbly accept the word God has planted in your hearts, for it has the power to save your souls.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But don’t just listen to God’s word. You must do what it says. Otherwise, you are only fooling yourselves. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if you listen to the word and don’t obey, it is like glancing at your face in a mirror. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You see yourself, walk away, and forget what you look like. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if you look carefully into the perfect law that sets you free, and if you do what it says and don’t forget what you heard, then God will bless you for doing it.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you claim to be religious but don’t control your tongue, you are fooling yourself, and your religion is worthless. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pure and genuine religion in the sight of God the Father means caring for orphans and widows in their distress and refusing to let the world corrupt you.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For you know that when your faith is tested, your endurance has a chance to grow. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So let it grow, for when your endurance is fully developed, you will be perfect and complete, needing nothing.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you need wisdom, ask our generous God, and he will give it to you. He will not rebuke you for asking. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when you ask him, be sure that your faith is in God alone. Do not waver, for a person with divided loyalty is as unsettled as a wave of the sea that is blown and tossed by the wind. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Such people should not expect to receive anything from the Lord. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Their loyalty is divided between God and the world, and they are unstable in everything they do.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Believers who are
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The brother who is.
      marker-yv: yv-n
    - type: text
      text: ' poor have something to boast about, for God has honored them. '
