  - type: text
    content: ' for all his deceitful ways,'
  - type: text
    content: and pay him back for all he has done.
  '3':
  - type: text
    content: Even in the womb,
  - type: text
    content: Jacob struggled with his brother;
  - type: text
    content: when he became a man,
  - type: text
    content: he even fought with God.
  '4':
  - type: text
    content: Yes, he wrestled with the angel and won.
  - type: text
    content: He wept and pleaded for a blessing from him.
  - type: text
    content: There at Bethel he met God face to face,
  - type: text
    content: and God spoke to him
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads to us.
  - type: text
    content: —
  '5':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies,'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is his name!'
  '6':
  - type: text
    content: So now, come back to your God.
  - type: text
    content: Act with love and justice,
  - type: text
    content: and always depend on him.
  '7':
  - type: text
    content: But no, the people are like crafty merchants
  - type: text
    content: selling from dishonest scales—
  - type: text
    content: they love to cheat.
  '8':
  - type: text
    content: Israel boasts, “I am rich!
  - type: text
    content: I’ve made a fortune all by myself!
  - type: text
    content: No one has caught me cheating!
  - type: text
    content: My record is spotless!”
  '9':
  - type: text
    content: '“But I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: who rescued you from slavery in Egypt.
  - type: text
    content: And I will make you live in tents again,
  - type: text
    content: as you do each year at the Festival of Shelters.
  - type: note
    content: Hebrew as in the days of your appointed feast.
