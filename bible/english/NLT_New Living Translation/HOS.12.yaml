    content: But the people of Gilead are worthless
  - type: text
    content: because of their idol worship.
  - type: text
    content: And in Gilgal, too, they sacrifice bulls;
  - type: text
    content: their altars are lined up like the heaps of stone
  - type: text
    content: along the edges of a plowed field.
