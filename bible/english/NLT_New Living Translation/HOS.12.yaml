document_id: HOS.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 12:1-14 are numbered 12:2-15 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: The people of Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ephraim, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referring to the northern kingdom of Israel; also in 12:8, 14.
      marker-yv: yv-n
    - type: text
      text: ' feed on the wind;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they chase after the east wind all day long.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They pile up lies and violence;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are making an alliance with Assyria
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while sending olive oil to buy support from Egypt.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I sent my prophets to warn you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with many visions and parables.”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But the people of Gilead are worthless
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of their idol worship.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in Gilgal, too, they sacrifice bulls;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their altars are lined up like the heaps of stone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: along the edges of a plowed field.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Jacob fled to the land of Aram,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there he
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Israel. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 10:11b.
      marker-yv: yv-n
    - type: text
      text: ' earned a wife by tending sheep.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then by a prophet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought Jacob’s descendants'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brought Israel. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 10:11b.
      marker-yv: yv-n
    - type: text
      text: ' out of Egypt;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and by that prophet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they were protected.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: But the people of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'have bitterly provoked the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so their Lord will now sentence them to death
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in payment for their sins.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is bringing charges against Judah.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is about to punish Jacob
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:2 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jacob '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sounds like the Hebrew word for “deceiver.”
      marker-yv: yv-n
    - type: text
      text: ' for all his deceitful ways,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pay him back for all he has done.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Even in the womb,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jacob struggled with his brother;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when he became a man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he even fought with God.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Yes, he wrestled with the angel and won.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He wept and pleaded for a blessing from him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There at Bethel he met God face to face,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and God spoke to him
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to us.
      marker-yv: yv-n
    - type: text
      text: —
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Heaven’s Armies,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is his name!'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: So now, come back to your God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Act with love and justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and always depend on him.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But no, the people are like crafty merchants
  - type: usfm
    marker: q2
    children:
    - type: text
      text: selling from dishonest scales—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they love to cheat.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Israel boasts, “I am rich!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve made a fortune all by myself!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one has caught me cheating!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My record is spotless!”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“But I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who rescued you from slavery in Egypt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will make you live in tents again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as you do each year at the Festival of Shelters.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: as in the days of your appointed feast.
      marker-yv: yv-n
