document_id: ISA.43
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Savior of Israel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But now, O Jacob, listen to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' who created you.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: O Israel, the one who formed you says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Do not be afraid, for I have ransomed you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have called you by name; you are mine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When you go through deep waters,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will be with you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you go through rivers of difficulty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will not drown.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you walk through the fire of oppression,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will not be burned up;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the flames will not consume you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', your God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Holy One of Israel, your Savior.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I gave Egypt as a ransom for your freedom;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I gave Ethiopia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Cush.
    marker-yv: yv-n
  - type: text
    text: ' and Seba in your place.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Others were given in exchange for you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I traded their lives for yours
- type: usfm
  marker: q1
  children:
  - type: text
    text: because you are precious to me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are honored, and I love you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Do not be afraid, for I am with you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will gather you and your children from east and west.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I will say to the north and south,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Bring my sons and daughters back to Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the distant corners of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Bring all who claim me as their God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have made them for my glory.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It was I who created them.’”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Bring out the people who have eyes but are blind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who have ears but are deaf.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Gather the nations together!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Assemble the peoples of the world!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which of their idols has ever foretold such things?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Which can predict what will happen tomorrow?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where are the witnesses of such predictions?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can verify that they spoke the truth?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“But you are my witnesses, O Israel!” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: “You are my servant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have been chosen to know me, believe in me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and understand that I alone am God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is no other God—
- type: usfm
  marker: q2
  children:
  - type: text
    text: there never has been, and there never will be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I, yes I, am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and there is no other Savior.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: First I predicted your rescue,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then I saved you and proclaimed it to the world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No foreign god has ever done this.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are witnesses that I am the only God,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “From eternity to eternity I am God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No one can snatch anyone out of my hand.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No one can undo what I have done.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Promise of Victory
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says—your Redeemer, the Holy One of Israel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “For your sakes I will send an army against Babylon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: forcing the Babylonians
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Chaldeans.
    marker-yv: yv-n
  - type: text
    text: ' to flee in those ships they are so proud of.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', your Holy One,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel’s Creator and King.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who opened a way through the waters,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: making a dry path through the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I called forth the mighty army of Egypt
- type: usfm
  marker: q2
  children:
  - type: text
    text: with all its chariots and horses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I drew them beneath the waves, and they drowned,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their lives snuffed out like a smoldering candlewick.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “But forget all that—
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is nothing compared to what I am going to do.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: For I am about to do something new.
- type: usfm
  marker: q2
  children:
  - type: text
    text: See, I have already begun! Do you not see it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will make a pathway through the wilderness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will create rivers in the dry wasteland.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The wild animals in the fields will thank me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the jackals and owls, too,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for giving them water in the desert.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, I will make rivers in the dry wasteland
- type: usfm
  marker: q2
  children:
  - type: text
    text: so my chosen people can be refreshed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I have made Israel for myself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will someday honor me before the whole world.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “But, dear family of Jacob, you refuse to ask for my help.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have grown tired of me, O Israel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: You have not brought me sheep or goats for burnt offerings.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have not honored me with sacrifices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: though I have not burdened and wearied you
- type: usfm
  marker: q2
  children:
  - type: text
    text: with requests for grain offerings and frankincense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: You have not brought me fragrant calamus
- type: usfm
  marker: q2
  children:
  - type: text
    text: or pleased me with the fat from sacrifices.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Instead, you have burdened me with your sins
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wearied me with your faults.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “I—yes, I alone—will blot out your sins for my own sake
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will never think of them again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Let us review the situation together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you can present your case to prove your innocence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: From the very beginning, your first ancestor sinned against me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all your leaders broke my laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: That is why I have disgraced your priests;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have decreed complete destruction
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering.'
    marker-yv: yv-n
  - type: text
    text: ' for Jacob'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shame for Israel.
