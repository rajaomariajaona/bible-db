document_id: ISA.43,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Savior of Israel
  - type: text
    content: 'But now, O Jacob, listen to the '
  - type: text
    content: Lord
  - type: text
    content: ' who created you.'
  - type: text
    content: O Israel, the one who formed you says,
  - type: text
    content: “Do not be afraid, for I have ransomed you.
  - type: text
    content: I have called you by name; you are mine.
  '10':
  - type: text
    content: '“But you are my witnesses, O Israel!” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “You are my servant.
  - type: text
    content: You have been chosen to know me, believe in me,
  - type: text
    content: and understand that I alone am God.
  - type: text
    content: There is no other God—
  - type: text
    content: there never has been, and there never will be.
  '11':
  - type: text
    content: 'I, yes I, am the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and there is no other Savior.
  '12':
  - type: text
    content: First I predicted your rescue,
  - type: text
    content: then I saved you and proclaimed it to the world.
  - type: text
    content: No foreign god has ever done this.
  - type: text
    content: You are witnesses that I am the only God,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: “From eternity to eternity I am God.
  - type: text
    content: No one can snatch anyone out of my hand.
  - type: text
    content: No one can undo what I have done.”
  - type: heading
    content: The Lord’s Promise of Victory
  '14':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—your Redeemer, the Holy One of Israel:'
  - type: text
    content: “For your sakes I will send an army against Babylon,
  - type: text
    content: forcing the Babylonians
  - type: note
    content: Or Chaldeans.
  - type: text
    content: ' to flee in those ships they are so proud of.'
  '15':
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ', your Holy One,'
  - type: text
    content: Israel’s Creator and King.
  '16':
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who opened a way through the waters,'
  - type: text
    content: making a dry path through the sea.
  '17':
  - type: text
    content: I called forth the mighty army of Egypt
  - type: text
    content: with all its chariots and horses.
  - type: text
    content: I drew them beneath the waves, and they drowned,
  - type: text
    content: their lives snuffed out like a smoldering candlewick.
  '18':
  - type: text
    content: “But forget all that—
  - type: text
    content: it is nothing compared to what I am going to do.
  '19':
  - type: text
    content: For I am about to do something new.
  - type: text
    content: See, I have already begun! Do you not see it?
  - type: text
    content: I will make a pathway through the wilderness.
  - type: text
    content: I will create rivers in the dry wasteland.
  '2':
  - type: text
    content: When you go through deep waters,
  - type: text
    content: I will be with you.
  - type: text
    content: When you go through rivers of difficulty,
  - type: text
    content: you will not drown.
  - type: text
    content: When you walk through the fire of oppression,
  - type: text
    content: you will not be burned up;
  - type: text
    content: the flames will not consume you.
  '20':
  - type: text
    content: The wild animals in the fields will thank me,
  - type: text
    content: the jackals and owls, too,
  - type: text
    content: for giving them water in the desert.
  - type: text
    content: Yes, I will make rivers in the dry wasteland
  - type: text
    content: so my chosen people can be refreshed.
  '21':
  - type: text
    content: I have made Israel for myself,
  - type: text
    content: and they will someday honor me before the whole world.
  '22':
  - type: text
    content: “But, dear family of Jacob, you refuse to ask for my help.
  - type: text
    content: You have grown tired of me, O Israel!
  '23':
  - type: text
    content: You have not brought me sheep or goats for burnt offerings.
  - type: text
    content: You have not honored me with sacrifices,
  - type: text
    content: though I have not burdened and wearied you
  - type: text
    content: with requests for grain offerings and frankincense.
  '24':
  - type: text
    content: You have not brought me fragrant calamus
  - type: text
    content: or pleased me with the fat from sacrifices.
  - type: text
    content: Instead, you have burdened me with your sins
  - type: text
    content: and wearied me with your faults.
  '25':
  - type: text
    content: “I—yes, I alone—will blot out your sins for my own sake
  - type: text
    content: and will never think of them again.
  '26':
  - type: text
    content: Let us review the situation together,
  - type: text
    content: and you can present your case to prove your innocence.
  '27':
  - type: text
    content: From the very beginning, your first ancestor sinned against me;
  - type: text
    content: all your leaders broke my laws.
  '28':
  - type: text
    content: That is why I have disgraced your priests;
  - type: text
    content: I have decreed complete destruction
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering.
  - type: text
    content: ' for Jacob'
  - type: text
    content: and shame for Israel.
  '3':
  - type: text
    content: 'For I am the '
  - type: text
    content: Lord
  - type: text
    content: ', your God,'
  - type: text
    content: the Holy One of Israel, your Savior.
  - type: text
    content: I gave Egypt as a ransom for your freedom;
  - type: text
    content: I gave Ethiopia
  - type: note
    content: Hebrew Cush.
  - type: text
    content: ' and Seba in your place.'
  '4':
  - type: text
    content: Others were given in exchange for you.
  - type: text
    content: I traded their lives for yours
  - type: text
    content: because you are precious to me.
  - type: text
    content: You are honored, and I love you.
  '5':
  - type: text
    content: “Do not be afraid, for I am with you.
  - type: text
    content: I will gather you and your children from east and west.
  '6':
  - type: text
    content: I will say to the north and south,
  - type: text
    content: ‘Bring my sons and daughters back to Israel
  - type: text
    content: from the distant corners of the earth.
  '7':
  - type: text
    content: Bring all who claim me as their God,
  - type: text
    content: for I have made them for my glory.
  - type: text
    content: It was I who created them.’”
  '8':
  - type: text
    content: Bring out the people who have eyes but are blind,
  - type: text
    content: who have ears but are deaf.
  '9':
  - type: text
    content: Gather the nations together!
  - type: text
    content: Assemble the peoples of the world!
  - type: text
    content: Which of their idols has ever foretold such things?
  - type: text
    content: Which can predict what will happen tomorrow?
  - type: text
    content: Where are the witnesses of such predictions?
  - type: text
    content: Who can verify that they spoke the truth?
