document_id: 2CH.31,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hezekiah’s Religious Reforms
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: When the festival ended, the Israelites who attended went to all the towns of Judah, Benjamin, Ephraim, and Manasseh, and they smashed all the sacred pillars, cut down the Asherah poles, and removed the pagan shrines and altars. After this, the Israelites returned to their own towns and homes.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And Azariah the high priest, from the family of Zadok, replied, “Since the people began bringing their gifts to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple, we have had enough to eat and plenty to spare. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has blessed his people, and all this is left over.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hezekiah ordered that storerooms be prepared in the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. When this was done, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'the people faithfully brought all the gifts, tithes, and other items dedicated for use in the Temple. Conaniah the Levite was put in charge, assisted by his brother Shimei. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The supervisors under them were Jehiel, Azaziah, Nahath, Asahel, Jerimoth, Jozabad, Eliel, Ismakiah, Mahath, and Benaiah. These appointments were made by King Hezekiah and Azariah, the chief official in the Temple of God.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Kore son of Imnah the Levite, who was the gatekeeper at the East Gate, was put in charge of distributing the voluntary offerings given to God, the gifts, and the things that had been dedicated to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'His faithful assistants were Eden, Miniamin, Jeshua, Shemaiah, Amariah, and Shecaniah. They distributed the gifts among the families of priests in their towns by their divisions, dividing the gifts fairly among old and young alike. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'They distributed the gifts to all males three years old or older, regardless of their place in the genealogical records. The distribution went to all who would come to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple to perform their daily duties according to their divisions. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'They distributed gifts to the priests who were listed by their families in the genealogical records, and to the Levites twenty years old or older who were listed according to their jobs and their divisions. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Food allotments were also given to the families of all those listed in the genealogical records, including their little babies, wives, sons, and daughters. For they had all been faithful in purifying themselves.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: As for the priests, the descendants of Aaron, who were living in the open villages around the towns, men were appointed by name to distribute portions to every male among the priests and to all the Levites listed in the genealogical records.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hezekiah then organized the priests and Levites into divisions to offer the burnt offerings and peace offerings, and to worship and give thanks and praise to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at the gates of the Temple. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'In this way, King Hezekiah handled the distribution throughout all Judah, doing what was pleasing and good in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: In all that he did in the service of the Temple of God and in his efforts to follow God’s laws and commands, Hezekiah sought his God wholeheartedly. As a result, he was very successful.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The king also made a personal contribution of animals for the daily morning and evening burnt offerings, the weekly Sabbath festivals, the monthly new moon festivals, and the annual festivals as prescribed in the Law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'In addition, he required the people in Jerusalem to bring a portion of their goods to the priests and Levites, so they could devote themselves fully to the Law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'When the people of Israel heard these requirements, they responded generously by bringing the first share of their grain, new wine, olive oil, honey, and all the produce of their fields. They brought a large quantity—a tithe of all they produced. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The people who had moved to Judah from Israel, and the people of Judah themselves, brought in the tithes of their cattle, sheep, and goats and a tithe of the things that had been dedicated to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God, and they piled them up in great heaps. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: They began piling them up in late spring, and the heaps continued to grow until early autumn.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in the third month . . . until the seventh month. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The third month of the ancient Hebrew lunar calendar usually occurs within the months of May and June; the seventh month usually occurs within September and October.
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'When Hezekiah and his officials came and saw these huge piles, they thanked the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and his people Israel!'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Where did all this come from?” Hezekiah asked the priests and Levites.
