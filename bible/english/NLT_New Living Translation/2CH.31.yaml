document_id: 2CH.31,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah’s Religious Reforms
  - type: text
    content: When the festival ended, the Israelites who attended went to all the towns of Judah, Benjamin, Ephraim, and Manasseh, and they smashed all the sacred pillars, cut down the Asherah poles, and removed the pagan shrines and altars. After this, the Israelites returned to their own towns and homes.
  '10':
  - type: text
    content: 'And Azariah the high priest, from the family of Zadok, replied, “Since the people began bringing their gifts to the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple, we have had enough to eat and plenty to spare. The '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed his people, and all this is left over.”'
  '11':
  - type: text
    content: 'Hezekiah ordered that storerooms be prepared in the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. When this was done, '
  '12':
  - type: text
    content: 'the people faithfully brought all the gifts, tithes, and other items dedicated for use in the Temple. Conaniah the Levite was put in charge, assisted by his brother Shimei. '
  '13':
  - type: text
    content: The supervisors under them were Jehiel, Azaziah, Nahath, Asahel, Jerimoth, Jozabad, Eliel, Ismakiah, Mahath, and Benaiah. These appointments were made by King Hezekiah and Azariah, the chief official in the Temple of God.
  '14':
  - type: text
    content: 'Kore son of Imnah the Levite, who was the gatekeeper at the East Gate, was put in charge of distributing the voluntary offerings given to God, the gifts, and the things that had been dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'His faithful assistants were Eden, Miniamin, Jeshua, Shemaiah, Amariah, and Shecaniah. They distributed the gifts among the families of priests in their towns by their divisions, dividing the gifts fairly among old and young alike. '
  '16':
  - type: text
    content: 'They distributed the gifts to all males three years old or older, regardless of their place in the genealogical records. The distribution went to all who would come to the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple to perform their daily duties according to their divisions. '
  '17':
  - type: text
    content: 'They distributed gifts to the priests who were listed by their families in the genealogical records, and to the Levites twenty years old or older who were listed according to their jobs and their divisions. '
  '18':
  - type: text
    content: Food allotments were also given to the families of all those listed in the genealogical records, including their little babies, wives, sons, and daughters. For they had all been faithful in purifying themselves.
  '19':
  - type: text
    content: As for the priests, the descendants of Aaron, who were living in the open villages around the towns, men were appointed by name to distribute portions to every male among the priests and to all the Levites listed in the genealogical records.
  '2':
  - type: text
    content: 'Hezekiah then organized the priests and Levites into divisions to offer the burnt offerings and peace offerings, and to worship and give thanks and praise to the '
  - type: text
    content: Lord
  - type: text
    content: ' at the gates of the Temple. '
  '20':
  - type: text
    content: 'In this way, King Hezekiah handled the distribution throughout all Judah, doing what was pleasing and good in the sight of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God. '
  '21':
  - type: text
    content: In all that he did in the service of the Temple of God and in his efforts to follow God’s laws and commands, Hezekiah sought his God wholeheartedly. As a result, he was very successful.
  '3':
  - type: text
    content: 'The king also made a personal contribution of animals for the daily morning and evening burnt offerings, the weekly Sabbath festivals, the monthly new moon festivals, and the annual festivals as prescribed in the Law of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'In addition, he required the people in Jerusalem to bring a portion of their goods to the priests and Levites, so they could devote themselves fully to the Law of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: 'When the people of Israel heard these requirements, they responded generously by bringing the first share of their grain, new wine, olive oil, honey, and all the produce of their fields. They brought a large quantity—a tithe of all they produced. '
  '6':
  - type: text
    content: 'The people who had moved to Judah from Israel, and the people of Judah themselves, brought in the tithes of their cattle, sheep, and goats and a tithe of the things that had been dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, and they piled them up in great heaps. '
  '7':
  - type: text
    content: They began piling them up in late spring, and the heaps continued to grow until early autumn.
  - type: note
    content: Hebrew in the third month . . . until the seventh month. The third month of the ancient Hebrew lunar calendar usually occurs within the months of May and June; the seventh month usually occurs within September and October.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'When Hezekiah and his officials came and saw these huge piles, they thanked the '
  - type: text
    content: Lord
  - type: text
    content: ' and his people Israel!'
  '9':
  - type: text
    content: “Where did all this come from?” Hezekiah asked the priests and Levites.
