document_id: PSA.31,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David.'
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', I have come to you for protection;'
  - type: text
    content: don’t let me be disgraced.
  - type: text
    content: Save me, for you do what is right.
  '10':
  - type: text
    content: I am dying from grief;
  - type: text
    content: my years are shortened by sadness.
  - type: text
    content: Sin has drained my strength;
  - type: text
    content: I am wasting away from within.
  '11':
  - type: text
    content: I am scorned by all my enemies
  - type: text
    content: and despised by my neighbors—
  - type: text
    content: even my friends are afraid to come near me.
  - type: text
    content: When they see me on the street,
  - type: text
    content: they run the other way.
  '12':
  - type: text
    content: I am ignored as if I were dead,
  - type: text
    content: as if I were a broken pot.
  '13':
  - type: text
    content: I have heard the many rumors about me,
  - type: text
    content: and I am surrounded by terror.
  - type: text
    content: My enemies conspire against me,
  - type: text
    content: plotting to take my life.
  '14':
  - type: text
    content: 'But I am trusting you, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: saying, “You are my God!”
  '15':
  - type: text
    content: My future is in your hands.
  - type: text
    content: Rescue me from those who hunt me down relentlessly.
  '16':
  - type: text
    content: Let your favor shine on your servant.
  - type: text
    content: In your unfailing love, rescue me.
  '17':
  - type: text
    content: 'Don’t let me be disgraced, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for I call out to you for help.
  - type: text
    content: Let the wicked be disgraced;
  - type: text
    content: let them lie silent in the grave.
  - type: note
    content: Hebrew in Sheol.
  '18':
  - type: text
    content: Silence their lying lips—
  - type: text
    content: those proud and arrogant lips that accuse the godly.
  '19':
  - type: text
    content: How great is the goodness
  - type: text
    content: you have stored up for those who fear you.
  - type: text
    content: You lavish it on those who come to you for protection,
  - type: text
    content: blessing them before the watching world.
  '2':
  - type: text
    content: Turn your ear to listen to me;
  - type: text
    content: rescue me quickly.
  - type: text
    content: Be my rock of protection,
  - type: text
    content: a fortress where I will be safe.
  '20':
  - type: text
    content: You hide them in the shelter of your presence,
  - type: text
    content: safe from those who conspire against them.
  - type: text
    content: You shelter them in your presence,
  - type: text
    content: far from accusing tongues.
  '21':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for he has shown me the wonders of his unfailing love.
  - type: text
    content: He kept me safe when my city was under attack.
  '22':
  - type: text
    content: In panic I cried out,
  - type: text
    content: '“I am cut off from the '
  - type: text
    content: Lord
  - type: text
    content: '!”'
  - type: text
    content: But you heard my cry for mercy
  - type: text
    content: and answered my call for help.
  '23':
  - type: text
    content: 'Love the '
  - type: text
    content: Lord
  - type: text
    content: ', all you godly ones!'
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' protects those who are loyal to him,'
  - type: text
    content: but he harshly punishes the arrogant.
  '24':
  - type: text
    content: So be strong and courageous,
  - type: text
    content: 'all you who put your hope in the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '3':
  - type: text
    content: You are my rock and my fortress.
  - type: text
    content: For the honor of your name, lead me out of this danger.
  '4':
  - type: text
    content: Pull me from the trap my enemies set for me,
  - type: text
    content: for I find protection in you alone.
  '5':
  - type: text
    content: I entrust my spirit into your hand.
  - type: text
    content: 'Rescue me, '
  - type: text
    content: Lord
  - type: text
    content: ', for you are a faithful God.'
  '6':
  - type: text
    content: I hate those who worship worthless idols.
  - type: text
    content: 'I trust in the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: I will be glad and rejoice in your unfailing love,
  - type: text
    content: for you have seen my troubles,
  - type: text
    content: and you care about the anguish of my soul.
  '8':
  - type: text
    content: You have not handed me over to my enemies
  - type: text
    content: but have set me in a safe place.
  '9':
  - type: text
    content: 'Have mercy on me, '
  - type: text
    content: Lord
  - type: text
    content: ', for I am in distress.'
  - type: text
    content: Tears blur my eyes.
  - type: text
    content: My body and soul are withering away.
