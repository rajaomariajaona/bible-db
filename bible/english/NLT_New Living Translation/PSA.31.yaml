document_id: PSA.31
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I have come to you for protection;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t let me be disgraced.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Save me, for you do what is right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Turn your ear to listen to me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: rescue me quickly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be my rock of protection,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a fortress where I will be safe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You are my rock and my fortress.
- type: usfm
  marker: q2
  children:
  - type: text
    text: For the honor of your name, lead me out of this danger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Pull me from the trap my enemies set for me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I find protection in you alone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I entrust my spirit into your hand.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Rescue me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for you are a faithful God.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I hate those who worship worthless idols.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I will be glad and rejoice in your unfailing love,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you have seen my troubles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you care about the anguish of my soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You have not handed me over to my enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: but have set me in a safe place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Have mercy on me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for I am in distress.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tears blur my eyes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My body and soul are withering away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I am dying from grief;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my years are shortened by sadness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sin has drained my strength;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am wasting away from within.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I am scorned by all my enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: and despised by my neighbors—
- type: usfm
  marker: q2
  children:
  - type: text
    text: even my friends are afraid to come near me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When they see me on the street,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they run the other way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I am ignored as if I were dead,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as if I were a broken pot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I have heard the many rumors about me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I am surrounded by terror.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My enemies conspire against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: plotting to take my life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But I am trusting you, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: saying, “You are my God!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My future is in your hands.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rescue me from those who hunt me down relentlessly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Let your favor shine on your servant.
- type: usfm
  marker: q2
  children:
  - type: text
    text: In your unfailing love, rescue me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Don’t let me be disgraced, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I call out to you for help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the wicked be disgraced;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let them lie silent in the grave.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in Sheol.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Silence their lying lips—
- type: usfm
  marker: q2
  children:
  - type: text
    text: those proud and arrogant lips that accuse the godly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: How great is the goodness
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have stored up for those who fear you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You lavish it on those who come to you for protection,
- type: usfm
  marker: q2
  children:
  - type: text
    text: blessing them before the watching world.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You hide them in the shelter of your presence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: safe from those who conspire against them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You shelter them in your presence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: far from accusing tongues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he has shown me the wonders of his unfailing love.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He kept me safe when my city was under attack.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: In panic I cried out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: '“I am cut off from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!”'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you heard my cry for mercy
- type: usfm
  marker: q2
  children:
  - type: text
    text: and answered my call for help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Love the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', all you godly ones!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' protects those who are loyal to him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he harshly punishes the arrogant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So be strong and courageous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'all you who put your hope in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
