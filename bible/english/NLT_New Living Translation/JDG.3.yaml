document_id: JDG.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Nations Left in Canaan
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'These are the nations that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' left in the land to test those Israelites who had not experienced the wars of Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He did this to teach warfare to generations of Israelites who had no experience in battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'These are the nations: the Philistines (those living under the five Philistine rulers), all the Canaanites, the Sidonians, and the Hivites living in the mountains of Lebanon from Mount Baal-hermon to Lebo-hamath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'These people were left to test the Israelites—to see whether they would obey the commands the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had given to their ancestors through Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the people of Israel lived among the Canaanites, Hittites, Amorites, Perizzites, Hivites, and Jebusites, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and they intermarried with them. Israelite sons married their daughters, and Israelite daughters were given in marriage to their sons. And the Israelites served their gods.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Othniel Becomes Israel’s Judge
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The Israelites did evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s sight. They forgot about the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God, and they served the images of Baal and the Asherah poles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' burned with anger against Israel, and he turned them over to King Cushan-rishathaim of Aram-naharaim.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:8 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Aram-naharaim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “Aram of the two rivers,” thought to have been located between the Euphrates and Balih Rivers in northwestern Mesopotamia.
    marker-yv: yv-n
  - type: text
    text: ' And the Israelites served Cushan-rishathaim for eight years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But when the people of Israel cried out to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for help, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' raised up a rescuer to save them. His name was Othniel, the son of Caleb’s younger brother, Kenaz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came upon him, and he became Israel’s judge. He went to war against King Cushan-rishathaim of Aram, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave Othniel victory over him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So there was peace in the land for forty years. Then Othniel son of Kenaz died.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ehud Becomes Israel’s Judge
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Once again the Israelites did evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s sight, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave King Eglon of Moab control over Israel because of their evil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Eglon enlisted the Ammonites and Amalekites as allies, and then he went out and defeated Israel, taking possession of Jericho, the city of palms. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And the Israelites served Eglon of Moab for eighteen years.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But when the people of Israel cried out to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for help, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' again raised up a rescuer to save them. His name was Ehud son of Gera, a left-handed man of the tribe of Benjamin. The Israelites sent Ehud to deliver their tribute money to King Eglon of Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So Ehud made a double-edged dagger that was about a foot
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'gomed, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: the length of which is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' long, and he strapped it to his right thigh, keeping it hidden under his clothing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He brought the tribute money to Eglon, who was very fat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'After delivering the payment, Ehud started home with those who had helped carry the tribute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But when Ehud reached the stone idols near Gilgal, he turned back. He came to Eglon and said, “I have a secret message for you.”
- type: usfm
  marker: p
  children:
  - type: text
    text: So the king commanded his servants, “Be quiet!” and he sent them all out of the room.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ehud walked over to Eglon, who was sitting alone in a cool upstairs room. And Ehud said, “I have a message from God for you!” As King Eglon rose from his seat, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ehud reached with his left hand, pulled out the dagger strapped to his right thigh, and plunged it into the king’s belly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The dagger went so deep that the handle disappeared beneath the king’s fat. So Ehud did not pull out the dagger, and the king’s bowels emptied.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and it came out behind.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then Ehud closed and locked the doors of the room and escaped down the latrine.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'and went out through the porch; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: the meaning of the Hebrew is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'After Ehud was gone, the king’s servants returned and found the doors to the upstairs room locked. They thought he might be using the latrine in the room, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: so they waited. But when the king didn’t come out after a long delay, they became concerned and got a key. And when they opened the doors, they found their master dead on the floor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'While the servants were waiting, Ehud escaped, passing the stone idols on his way to Seirah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: When he arrived in the hill country of Ephraim, Ehud sounded a call to arms. Then he led a band of Israelites down from the hills.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“Follow me,” he said, “for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has given you victory over Moab your enemy.” So they followed him. And the Israelites took control of the shallow crossings of the Jordan River across from Moab, preventing anyone from crossing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'They attacked the Moabites and killed about 10,000 of their strongest and most able-bodied warriors. Not one of them escaped. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: So Moab was conquered by Israel that day, and there was peace in the land for eighty years.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Shamgar Becomes Israel’s Judge
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: After Ehud, Shamgar son of Anath rescued Israel. He once killed 600 Philistines with an ox goad.
