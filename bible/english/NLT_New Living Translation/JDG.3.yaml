document_id: JDG.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Nations Left in Canaan
  - type: text
    content: 'These are the nations that the '
  - type: text
    content: Lord
  - type: text
    content: ' left in the land to test those Israelites who had not experienced the wars of Canaan. '
  '10':
  - type: text
    content: 'The Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' came upon him, and he became Israel’s judge. He went to war against King Cushan-rishathaim of Aram, and the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Othniel victory over him. '
  '11':
  - type: text
    content: So there was peace in the land for forty years. Then Othniel son of Kenaz died.
  - type: heading
    content: Ehud Becomes Israel’s Judge
  '12':
  - type: text
    content: 'Once again the Israelites did evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, and the '
  - type: text
    content: Lord
  - type: text
    content: ' gave King Eglon of Moab control over Israel because of their evil. '
  '13':
  - type: text
    content: 'Eglon enlisted the Ammonites and Amalekites as allies, and then he went out and defeated Israel, taking possession of Jericho, the city of palms. '
  '14':
  - type: text
    content: And the Israelites served Eglon of Moab for eighteen years.
  '15':
  - type: text
    content: 'But when the people of Israel cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' for help, the '
  - type: text
    content: Lord
  - type: text
    content: ' again raised up a rescuer to save them. His name was Ehud son of Gera, a left-handed man of the tribe of Benjamin. The Israelites sent Ehud to deliver their tribute money to King Eglon of Moab. '
  '16':
  - type: text
    content: So Ehud made a double-edged dagger that was about a foot
  - type: note
    content: Hebrew gomed, the length of which is uncertain.
  - type: text
    content: ' long, and he strapped it to his right thigh, keeping it hidden under his clothing. '
  '17':
  - type: text
    content: He brought the tribute money to Eglon, who was very fat.
  '18':
  - type: text
    content: 'After delivering the payment, Ehud started home with those who had helped carry the tribute. '
  '19':
  - type: text
    content: But when Ehud reached the stone idols near Gilgal, he turned back. He came to Eglon and said, “I have a secret message for you.”
  - type: text
    content: So the king commanded his servants, “Be quiet!” and he sent them all out of the room.
  '2':
  - type: text
    content: 'He did this to teach warfare to generations of Israelites who had no experience in battle. '
  '20':
  - type: text
    content: 'Ehud walked over to Eglon, who was sitting alone in a cool upstairs room. And Ehud said, “I have a message from God for you!” As King Eglon rose from his seat, '
  '21':
  - type: text
    content: 'Ehud reached with his left hand, pulled out the dagger strapped to his right thigh, and plunged it into the king’s belly. '
  '22':
  - type: text
    content: The dagger went so deep that the handle disappeared beneath the king’s fat. So Ehud did not pull out the dagger, and the king’s bowels emptied.
  - type: note
    content: Or and it came out behind.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Then Ehud closed and locked the doors of the room and escaped down the latrine.
  - type: note
    content: Or and went out through the porch; the meaning of the Hebrew is uncertain.
  '24':
  - type: text
    content: 'After Ehud was gone, the king’s servants returned and found the doors to the upstairs room locked. They thought he might be using the latrine in the room, '
  '25':
  - type: text
    content: so they waited. But when the king didn’t come out after a long delay, they became concerned and got a key. And when they opened the doors, they found their master dead on the floor.
  '26':
  - type: text
    content: 'While the servants were waiting, Ehud escaped, passing the stone idols on his way to Seirah. '
  '27':
  - type: text
    content: When he arrived in the hill country of Ephraim, Ehud sounded a call to arms. Then he led a band of Israelites down from the hills.
  '28':
  - type: text
    content: '“Follow me,” he said, “for the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you victory over Moab your enemy.” So they followed him. And the Israelites took control of the shallow crossings of the Jordan River across from Moab, preventing anyone from crossing.'
  '29':
  - type: text
    content: 'They attacked the Moabites and killed about 10,000 of their strongest and most able-bodied warriors. Not one of them escaped. '
  '3':
  - type: text
    content: 'These are the nations: the Philistines (those living under the five Philistine rulers), all the Canaanites, the Sidonians, and the Hivites living in the mountains of Lebanon from Mount Baal-hermon to Lebo-hamath. '
  '30':
  - type: text
    content: So Moab was conquered by Israel that day, and there was peace in the land for eighty years.
  - type: heading
    content: Shamgar Becomes Israel’s Judge
  '31':
  - type: text
    content: After Ehud, Shamgar son of Anath rescued Israel. He once killed 600 Philistines with an ox goad.
  '4':
  - type: text
    content: 'These people were left to test the Israelites—to see whether they would obey the commands the '
  - type: text
    content: Lord
  - type: text
    content: ' had given to their ancestors through Moses.'
  '5':
  - type: text
    content: 'So the people of Israel lived among the Canaanites, Hittites, Amorites, Perizzites, Hivites, and Jebusites, '
  '6':
  - type: text
    content: and they intermarried with them. Israelite sons married their daughters, and Israelite daughters were given in marriage to their sons. And the Israelites served their gods.
  - type: heading
    content: Othniel Becomes Israel’s Judge
  '7':
  - type: text
    content: 'The Israelites did evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight. They forgot about the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, and they served the images of Baal and the Asherah poles. '
  '8':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' burned with anger against Israel, and he turned them over to King Cushan-rishathaim of Aram-naharaim.'
  - type: note
    content: Aram-naharaim means “Aram of the two rivers,” thought to have been located between the Euphrates and Balih Rivers in northwestern Mesopotamia.
  - type: text
    content: ' And the Israelites served Cushan-rishathaim for eight years.'
  '9':
  - type: text
    content: 'But when the people of Israel cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' for help, the '
  - type: text
    content: Lord
  - type: text
    content: ' raised up a rescuer to save them. His name was Othniel, the son of Caleb’s younger brother, Kenaz. '
