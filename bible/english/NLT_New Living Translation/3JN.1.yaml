document_id: 3JN.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greetings
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: This letter is from John, the elder.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: From the elder.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: I am writing to Gaius, my dear friend, whom I love in the truth.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When I come, I will report some of the things he is doing and the evil accusations he is making against us. Not only does he refuse to welcome the traveling teachers, he also tells others not to help them. And when they do help, he puts them out of the church.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dear friend, don’t let this bad example influence you. Follow only what is good. Remember that those who do good prove that they are God’s children, and those who do evil prove that they do not know God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: they have not seen God.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Everyone speaks highly of Demetrius, as does the truth itself. We ourselves can say the same for him, and you know we speak the truth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conclusion
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I have much more to say to you, but I don’t want to write it with pen and ink. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For I hope to see you soon, and then we will talk face to face.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some English translations combine verses 14 and 15 into verse 14.
      marker-yv: yv-n
    - type: text
      text: Peace be with you.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Your friends here send you their greetings. Please give my personal greetings to each of our friends there.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dear friend, I hope all is well with you and that you are as healthy in body as you are strong in spirit. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Some of the traveling teachers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in verses 5 and 10.
      marker-yv: yv-n
    - type: text
      text: ' recently returned and made me very happy by telling me about your faithfulness and that you are living according to the truth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I could have no greater joy than to hear that my children are following the truth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Caring for the Lord’s Workers
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dear friend, you are being faithful to God when you care for the traveling teachers who pass through, even though they are strangers to you. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They have told the church here of your loving friendship. Please continue providing for such teachers in a manner that pleases God. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For they are traveling for the Lord,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:7a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: They went out on behalf of the Name.
      marker-yv: yv-n
    - type: text
      text: ' and they accept nothing from people who are not believers.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:7b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from Gentiles.
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So we ourselves should support them so that we can be their partners as they teach the truth.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I wrote to the church about this, but Diotrephes, who loves to be the leader, refuses to have anything to do with us. '
