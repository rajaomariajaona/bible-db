document_id: 3JN.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings
  - type: text
    content: This letter is from John, the elder.
  - type: note
    content: Greek From the elder.
  - type: text
    content: I am writing to Gaius, my dear friend, whom I love in the truth.
  '10':
  - type: text
    content: When I come, I will report some of the things he is doing and the evil accusations he is making against us. Not only does he refuse to welcome the traveling teachers, he also tells others not to help them. And when they do help, he puts them out of the church.
  '11':
  - type: text
    content: Dear friend, don’t let this bad example influence you. Follow only what is good. Remember that those who do good prove that they are God’s children, and those who do evil prove that they do not know God.
  - type: note
    content: Greek they have not seen God.
  '12':
  - type: text
    content: Everyone speaks highly of Demetrius, as does the truth itself. We ourselves can say the same for him, and you know we speak the truth.
  - type: heading
    content: Conclusion
  '13':
  - type: text
    content: 'I have much more to say to you, but I don’t want to write it with pen and ink. '
  '14':
  - type: text
    content: For I hope to see you soon, and then we will talk face to face.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Some English translations combine verses 14 and 15 into verse 14.
  - type: text
    content: Peace be with you.
  - type: text
    content: Your friends here send you their greetings. Please give my personal greetings to each of our friends there.
  '2':
  - type: text
    content: 'Dear friend, I hope all is well with you and that you are as healthy in body as you are strong in spirit. '
  '3':
  - type: text
    content: Some of the traveling teachers
  - type: note
    content: Greek the brothers; also in verses 5 and 10.
  - type: text
    content: ' recently returned and made me very happy by telling me about your faithfulness and that you are living according to the truth. '
  '4':
  - type: text
    content: I could have no greater joy than to hear that my children are following the truth.
  - type: heading
    content: Caring for the Lord’s Workers
  '5':
  - type: text
    content: 'Dear friend, you are being faithful to God when you care for the traveling teachers who pass through, even though they are strangers to you. '
  '6':
  - type: text
    content: 'They have told the church here of your loving friendship. Please continue providing for such teachers in a manner that pleases God. '
  '7':
  - type: text
    content: For they are traveling for the Lord,
  - type: note
    content: Greek They went out on behalf of the Name.
  - type: text
    content: ' and they accept nothing from people who are not believers.'
  - type: note
    content: Greek from Gentiles.
  - type: text
    content: ' '
  '8':
  - type: text
    content: So we ourselves should support them so that we can be their partners as they teach the truth.
  '9':
  - type: text
    content: 'I wrote to the church about this, but Diotrephes, who loves to be the leader, refuses to have anything to do with us. '
