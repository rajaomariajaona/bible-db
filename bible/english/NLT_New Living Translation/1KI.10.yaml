document_id: 1KI.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Visit of the Queen of Sheba
  - type: text
    content: 'When the queen of Sheba heard of Solomon’s fame, which brought honor to the name of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: Or which was due to the name of the Lord. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' she came to test him with hard questions. '
  '10':
  - type: text
    content: Then she gave the king a gift of 9,000 pounds
  - type: note
    content: Hebrew 120 talents [4,000 kilograms].
  - type: text
    content: ' of gold, great quantities of spices, and precious jewels. Never again were so many spices brought in as those the queen of Sheba gave to King Solomon.'
  '11':
  - type: text
    content: (In addition, Hiram’s ships brought gold from Ophir, and they also brought rich cargoes of red sandalwood
  - type: note
    content: Hebrew almug wood; also in 10:12.
  - type: text
    content: ' and precious jewels. '
  '12':
  - type: text
    content: 'The king used the sandalwood to make railings for the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the royal palace, and to construct lyres and harps for the musicians. Never before or since has there been such a supply of sandalwood.)'
  '13':
  - type: text
    content: King Solomon gave the queen of Sheba whatever she asked for, besides all the customary gifts he had so generously given. Then she and all her attendants returned to their own land.
  - type: heading
    content: Solomon’s Wealth and Splendor
  '14':
  - type: text
    content: Each year Solomon received about 25 tons
  - type: note
    content: Hebrew 666 talents [23 metric tons].
  - type: text
    content: ' of gold. '
  '15':
  - type: text
    content: This did not include the additional revenue he received from merchants and traders, all the kings of Arabia, and the governors of the land.
  '16':
  - type: text
    content: King Solomon made 200 large shields of hammered gold, each weighing more than fifteen pounds.
  - type: note
    content: Hebrew 600 [shekels] of gold [6.8 kilograms].
  - type: text
    content: ' '
  '17':
  - type: text
    content: He also made 300 smaller shields of hammered gold, each weighing nearly four pounds.
  - type: note
    content: Hebrew 3 minas [1.8 kilograms].
  - type: text
    content: ' The king placed these shields in the Palace of the Forest of Lebanon.'
  '18':
  - type: text
    content: 'Then the king made a huge throne, decorated with ivory and overlaid with fine gold. '
  '19':
  - type: text
    content: 'The throne had six steps and a rounded back. There were armrests on both sides of the seat, and the figure of a lion stood on each side of the throne. '
  '2':
  - type: text
    content: 'She arrived in Jerusalem with a large group of attendants and a great caravan of camels loaded with spices, large quantities of gold, and precious jewels. When she met with Solomon, she talked with him about everything she had on her mind. '
  '20':
  - type: text
    content: There were also twelve other lions, one standing on each end of the six steps. No other throne in all the world could be compared with it!
  '21':
  - type: text
    content: All of King Solomon’s drinking cups were solid gold, as were all the utensils in the Palace of the Forest of Lebanon. They were not made of silver, for silver was considered worthless in Solomon’s day!
  '22':
  - type: text
    content: The king had a fleet of trading ships of Tarshish that sailed with Hiram’s fleet. Once every three years the ships returned, loaded with gold, silver, ivory, apes, and peacocks.
  - type: note
    content: Or and baboons.
  '23':
  - type: text
    content: 'So King Solomon became richer and wiser than any other king on earth. '
  '24':
  - type: text
    content: 'People from every nation came to consult him and to hear the wisdom God had given him. '
  '25':
  - type: text
    content: Year after year everyone who visited brought him gifts of silver and gold, clothing, weapons, spices, horses, and mules.
  '26':
  - type: text
    content: Solomon built up a huge force of chariots and horses.
  - type: note
    content: Or charioteers; also in 10:26b.
  - type: text
    content: ' He had 1,400 chariots and 12,000 horses. He stationed some of them in the chariot cities and some near him in Jerusalem. '
  '27':
  - type: text
    content: The king made silver as plentiful in Jerusalem as stone. And valuable cedar timber was as common as the sycamore-fig trees that grow in the foothills of Judah.
  - type: note
    content: Hebrew the Shephelah.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Solomon’s horses were imported from Egypt
  - type: note
    content: Possibly Muzur, a district near Cilicia; also in 10:29.
  - type: text
    content: ' and from Cilicia'
  - type: note
    content: Hebrew Kue, probably another name for Cilicia.
  - type: text
    content: '; the king’s traders acquired them from Cilicia at the standard price. '
  '29':
  - type: text
    content: At that time chariots from Egypt could be purchased for 600 pieces of silver,
  - type: note
    content: Hebrew 600 [shekels] of silver, about 15 pounds or 6.8 kilograms in weight.
  - type: text
    content: ' and horses for 150 pieces of silver.'
  - type: note
    content: Hebrew 150 [shekels], about 3.8 pounds or 1.7 kilograms in weight.
  - type: text
    content: ' They were then exported to the kings of the Hittites and the kings of Aram.'
  '3':
  - type: text
    content: 'Solomon had answers for all her questions; nothing was too hard for the king to explain to her. '
  '4':
  - type: text
    content: 'When the queen of Sheba realized how very wise Solomon was, and when she saw the palace he had built, '
  '5':
  - type: text
    content: 'she was overwhelmed. She was also amazed at the food on his tables, the organization of his officials and their splendid clothing, the cup-bearers, and the burnt offerings Solomon made at the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: She exclaimed to the king, “Everything I heard in my country about your achievements
  - type: note
    content: Hebrew your words.
  - type: text
    content: ' and wisdom is true! '
  '7':
  - type: text
    content: 'I didn’t believe what was said until I arrived here and saw it with my own eyes. In fact, I had not heard the half of it! Your wisdom and prosperity are far beyond what I was told. '
  '8':
  - type: text
    content: How happy your people
  - type: note
    content: Greek and Syriac versions and Latin Vulgate read your wives.
  - type: text
    content: ' must be! What a privilege for your officials to stand here day after day, listening to your wisdom! '
  '9':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who delights in you and has placed you on the throne of Israel. Because of the '
  - type: text
    content: Lord
  - type: text
    content: ’s eternal love for Israel, he has made you king so you can rule with justice and righteousness.”
