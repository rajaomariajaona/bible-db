document_id: 2CH.24,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Joash Repairs the Temple
  - type: text
    content: 'Joash was seven years old when he became king, and he reigned in Jerusalem forty years. His mother was Zibiah from Beersheba. '
  '10':
  - type: text
    content: This pleased all the leaders and the people, and they gladly brought their money and filled the chest with it.
  '11':
  - type: text
    content: 'Whenever the chest became full, the Levites would carry it to the king’s officials. Then the court secretary and an officer of the high priest would come and empty the chest and take it back to the Temple again. This went on day after day, and a large amount of money was collected. '
  '12':
  - type: text
    content: 'The king and Jehoiada gave the money to the construction supervisors, who hired masons and carpenters to restore the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. They also hired metalworkers, who made articles of iron and bronze for the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple.
  '13':
  - type: text
    content: 'The men in charge of the renovation worked hard and made steady progress. They restored the Temple of God according to its original design and strengthened it. '
  '14':
  - type: text
    content: 'When all the repairs were finished, they brought the remaining money to the king and Jehoiada. It was used to make various articles for the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '—articles for worship services and for burnt offerings, including ladles and other articles made of gold and silver. And the burnt offerings were sacrificed continually in the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' during the lifetime of Jehoiada the priest.'
  '15':
  - type: text
    content: 'Jehoiada lived to a very old age, finally dying at 130. '
  '16':
  - type: text
    content: He was buried among the kings in the City of David, because he had done so much good in Israel for God and his Temple.
  - type: heading
    content: Jehoiada’s Reforms Reversed
  '17':
  - type: text
    content: 'But after Jehoiada’s death, the leaders of Judah came and bowed before King Joash and persuaded him to listen to their advice. '
  '18':
  - type: text
    content: 'They decided to abandon the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, and they worshiped Asherah poles and idols instead! Because of this sin, divine anger fell on Judah and Jerusalem. '
  '19':
  - type: text
    content: 'Yet the '
  - type: text
    content: Lord
  - type: text
    content: ' sent prophets to bring them back to him. The prophets warned them, but still the people would not listen.'
  '2':
  - type: text
    content: 'Joash did what was pleasing in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight throughout the lifetime of Jehoiada the priest. '
  '20':
  - type: text
    content: 'Then the Spirit of God came upon Zechariah son of Jehoiada the priest. He stood before the people and said, “This is what God says: Why do you disobey the '
  - type: text
    content: Lord
  - type: text
    content: '’s commands and keep yourselves from prospering? You have abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ', and now he has abandoned you!”'
  '21':
  - type: text
    content: 'Then the leaders plotted to kill Zechariah, and King Joash ordered that they stone him to death in the courtyard of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple. '
  '22':
  - type: text
    content: 'That was how King Joash repaid Jehoiada for his loyalty—by killing his son. Zechariah’s last words as he died were, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' see what they are doing and avenge my death!”'
  - type: heading
    content: The End of Joash’s Reign
  '23':
  - type: text
    content: In the spring of the year
  - type: note
    content: Hebrew At the turn of the year. The first day of the year in the ancient Hebrew lunar calendar occurred in March or April.
  - type: text
    content: ' the Aramean army marched against Joash. They invaded Judah and Jerusalem and killed all the leaders of the nation. Then they sent all the plunder back to their king in Damascus. '
  '24':
  - type: text
    content: 'Although the Arameans attacked with only a small army, the '
  - type: text
    content: Lord
  - type: text
    content: ' helped them conquer the much larger army of Judah. The people of Judah had abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, so judgment was carried out against Joash.'
  '25':
  - type: text
    content: The Arameans withdrew, leaving Joash severely wounded. But his own officials plotted to kill him for murdering the son
  - type: note
    content: As in Greek version and Latin Vulgate; Hebrew reads sons.
  - type: text
    content: ' of Jehoiada the priest. They assassinated him as he lay in bed. Then he was buried in the City of David, but not in the royal cemetery. '
  '26':
  - type: text
    content: The assassins were Jozacar,
  - type: note
    content: As in parallel text at 2 Kgs 12:21; Hebrew reads Zabad.
  - type: text
    content: ' the son of an Ammonite woman named Shimeath, and Jehozabad, the son of a Moabite woman named Shomer.'
  - type: note
    content: As in parallel text at 2 Kgs 12:21; Hebrew reads Shimrith, a variant spelling of Shomer.
  '27':
  - type: text
    content: 'The account of the sons of Joash, the prophecies about him, and the record of his restoration of the Temple of God are written in '
  - type: text
    content: The Commentary on the Book of the Kings.
  - type: text
    content: ' His son Amaziah became the next king.'
  '3':
  - type: text
    content: Jehoiada chose two wives for Joash, and he had sons and daughters.
  '4':
  - type: text
    content: 'At one point Joash decided to repair and restore the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'He summoned the priests and Levites and gave them these instructions: “Go to all the towns of Judah and collect the required annual offerings, so that we can repair the Temple of your God. Do not delay!” But the Levites did not act immediately.'
  '6':
  - type: text
    content: 'So the king called for Jehoiada the high priest and asked him, “Why haven’t you demanded that the Levites go out and collect the Temple taxes from the towns of Judah and from Jerusalem? Moses, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', levied this tax on the community of Israel in order to maintain the Tabernacle of the Covenant.'
  - type: note
    content: Hebrew Tent of the Testimony.
  - type: text
    content: ”
  '7':
  - type: text
    content: 'Over the years the followers of wicked Athaliah had broken into the Temple of God, and they had used all the dedicated things from the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' to worship the images of Baal.'
  '8':
  - type: text
    content: 'So now the king ordered a chest to be made and set outside the gate leading to the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Then a proclamation was sent throughout Judah and Jerusalem, telling the people to bring to the '
  - type: text
    content: Lord
  - type: text
    content: ' the tax that Moses, the servant of God, had required of the Israelites in the wilderness. '
