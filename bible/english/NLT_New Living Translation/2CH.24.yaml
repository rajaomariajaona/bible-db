document_id: 2CH.24,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joash Repairs the Temple
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Joash was seven years old when he became king, and he reigned in Jerusalem forty years. His mother was Zibiah from Beersheba. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: This pleased all the leaders and the people, and they gladly brought their money and filled the chest with it.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Whenever the chest became full, the Levites would carry it to the king’s officials. Then the court secretary and an officer of the high priest would come and empty the chest and take it back to the Temple again. This went on day after day, and a large amount of money was collected. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The king and Jehoiada gave the money to the construction supervisors, who hired masons and carpenters to restore the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. They also hired metalworkers, who made articles of iron and bronze for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Temple.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The men in charge of the renovation worked hard and made steady progress. They restored the Temple of God according to its original design and strengthened it. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'When all the repairs were finished, they brought the remaining money to the king and Jehoiada. It was used to make various articles for the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '—articles for worship services and for burnt offerings, including ladles and other articles made of gold and silver. And the burnt offerings were sacrificed continually in the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' during the lifetime of Jehoiada the priest.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Jehoiada lived to a very old age, finally dying at 130. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: He was buried among the kings in the City of David, because he had done so much good in Israel for God and his Temple.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoiada’s Reforms Reversed
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But after Jehoiada’s death, the leaders of Judah came and bowed before King Joash and persuaded him to listen to their advice. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'They decided to abandon the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their ancestors, and they worshiped Asherah poles and idols instead! Because of this sin, divine anger fell on Judah and Jerusalem. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Yet the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent prophets to bring them back to him. The prophets warned them, but still the people would not listen.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Joash did what was pleasing in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight throughout the lifetime of Jehoiada the priest. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then the Spirit of God came upon Zechariah son of Jehoiada the priest. He stood before the people and said, “This is what God says: Why do you disobey the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s commands and keep yourselves from prospering? You have abandoned the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and now he has abandoned you!”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then the leaders plotted to kill Zechariah, and King Joash ordered that they stone him to death in the courtyard of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'That was how King Joash repaid Jehoiada for his loyalty—by killing his son. Zechariah’s last words as he died were, “May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' see what they are doing and avenge my death!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The End of Joash’s Reign
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: In the spring of the year
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'At the turn of the year. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The first day of the year in the ancient Hebrew lunar calendar occurred in March or April.
      marker-yv: yv-n
    - type: text
      text: ' the Aramean army marched against Joash. They invaded Judah and Jerusalem and killed all the leaders of the nation. Then they sent all the plunder back to their king in Damascus. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Although the Arameans attacked with only a small army, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' helped them conquer the much larger army of Judah. The people of Judah had abandoned the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their ancestors, so judgment was carried out against Joash.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The Arameans withdrew, leaving Joash severely wounded. But his own officials plotted to kill him for murdering the son
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version and Latin Vulgate; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sons.
      marker-yv: yv-n
    - type: text
      text: ' of Jehoiada the priest. They assassinated him as he lay in bed. Then he was buried in the City of David, but not in the royal cemetery. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: The assassins were Jozacar,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:26a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 2 Kgs 12:21; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zabad.
      marker-yv: yv-n
    - type: text
      text: ' the son of an Ammonite woman named Shimeath, and Jehozabad, the son of a Moabite woman named Shomer.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:26b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 2 Kgs 12:21; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Shimrith, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Shomer.
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The account of the sons of Joash, the prophecies about him, and the record of his restoration of the Temple of God are written in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Commentary on the Book of the Kings.
    - type: text
      text: ' His son Amaziah became the next king.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jehoiada chose two wives for Joash, and he had sons and daughters.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'At one point Joash decided to repair and restore the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He summoned the priests and Levites and gave them these instructions: “Go to all the towns of Judah and collect the required annual offerings, so that we can repair the Temple of your God. Do not delay!” But the Levites did not act immediately.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So the king called for Jehoiada the high priest and asked him, “Why haven’t you demanded that the Levites go out and collect the Temple taxes from the towns of Judah and from Jerusalem? Moses, the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', levied this tax on the community of Israel in order to maintain the Tabernacle of the Covenant.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tent of the Testimony.
      marker-yv: yv-n
    - type: text
      text: ”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Over the years the followers of wicked Athaliah had broken into the Temple of God, and they had used all the dedicated things from the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to worship the images of Baal.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So now the king ordered a chest to be made and set outside the gate leading to the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then a proclamation was sent throughout Judah and Jerusalem, telling the people to bring to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the tax that Moses, the servant of God, had required of the Israelites in the wilderness. '
