document_id: ISA.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song about the Lord’s Vineyard
  - type: text
    content: Now I will sing for the one I love
  - type: text
    content: 'a song about his vineyard:'
  - type: text
    content: My beloved had a vineyard
  - type: text
    content: on a rich and fertile hill.
  '10':
  - type: text
    content: Ten acres
  - type: note
    content: Hebrew A ten yoke, that is, the area of land plowed by ten teams of oxen in one day.
  - type: text
    content: ' of vineyard will not produce even six gallons'
  - type: note
    content: Hebrew a bath [21 liters].
  - type: text
    content: ' of wine.'
  - type: text
    content: Ten baskets of seed will yield only one basket
  - type: note
    content: Hebrew A homer [5 bushels or 220 liters] of seed will yield only an ephah [20 quarts or 22 liters].
  - type: text
    content: ' of grain.”'
  '11':
  - type: text
    content: What sorrow for those who get up early in the morning
  - type: text
    content: looking for a drink of alcohol
  - type: text
    content: and spend long evenings drinking wine
  - type: text
    content: to make themselves flaming drunk.
  '12':
  - type: text
    content: They furnish wine and lovely music at their grand parties—
  - type: text
    content: lyre and harp, tambourine and flute—
  - type: text
    content: 'but they never think about the '
  - type: text
    content: Lord
  - type: text
    content: or notice what he is doing.
  '13':
  - type: text
    content: So my people will go into exile far away
  - type: text
    content: because they do not know me.
  - type: text
    content: Those who are great and honored will starve,
  - type: text
    content: and the common people will die of thirst.
  '14':
  - type: text
    content: The grave
  - type: note
    content: Hebrew Sheol.
  - type: text
    content: ' is licking its lips in anticipation,'
  - type: text
    content: opening its mouth wide.
  - type: text
    content: The great and the lowly
  - type: text
    content: and all the drunken mob will be swallowed up.
  '15':
  - type: text
    content: Humanity will be destroyed, and people brought down;
  - type: text
    content: even the arrogant will lower their eyes in humiliation.
  '16':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies will be exalted by his justice.'
  - type: text
    content: The holiness of God will be displayed by his righteousness.
  '17':
  - type: text
    content: In that day lambs will find good pastures,
  - type: text
    content: and fattened sheep and young goats
  - type: note
    content: As in Greek version; Hebrew reads and strangers.
  - type: text
    content: ' will feed among the ruins.'
  '18':
  - type: text
    content: What sorrow for those who drag their sins behind them
  - type: text
    content: with ropes made of lies,
  - type: text
    content: who drag wickedness behind them like a cart!
  '19':
  - type: text
    content: They even mock God and say,
  - type: text
    content: “Hurry up and do something!
  - type: text
    content: We want to see what you can do.
  - type: text
    content: Let the Holy One of Israel carry out his plan,
  - type: text
    content: for we want to know what it is.”
  '2':
  - type: text
    content: He plowed the land, cleared its stones,
  - type: text
    content: and planted it with the best vines.
  - type: text
    content: In the middle he built a watchtower
  - type: text
    content: and carved a winepress in the nearby rocks.
  - type: text
    content: Then he waited for a harvest of sweet grapes,
  - type: text
    content: but the grapes that grew were bitter.
  '20':
  - type: text
    content: What sorrow for those who say
  - type: text
    content: that evil is good and good is evil,
  - type: text
    content: that dark is light and light is dark,
  - type: text
    content: that bitter is sweet and sweet is bitter.
  '21':
  - type: text
    content: What sorrow for those who are wise in their own eyes
  - type: text
    content: and think themselves so clever.
  '22':
  - type: text
    content: What sorrow for those who are heroes at drinking wine
  - type: text
    content: and boast about all the alcohol they can hold.
  '23':
  - type: text
    content: They take bribes to let the wicked go free,
  - type: text
    content: and they punish the innocent.
  '24':
  - type: text
    content: Therefore, just as fire licks up stubble
  - type: text
    content: and dry grass shrivels in the flame,
  - type: text
    content: so their roots will rot
  - type: text
    content: and their flowers wither.
  - type: text
    content: 'For they have rejected the law of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies;'
  - type: text
    content: they have despised the word of the Holy One of Israel.
  '25':
  - type: text
    content: 'That is why the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger burns against his people,
  - type: text
    content: and why he has raised his fist to crush them.
  - type: text
    content: The mountains tremble,
  - type: text
    content: and the corpses of his people litter the streets like garbage.
  - type: text
    content: 'But even then the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger is not satisfied.
  - type: text
    content: His fist is still poised to strike!
  '26':
  - type: text
    content: He will send a signal to distant nations far away
  - type: text
    content: and whistle to those at the ends of the earth.
  - type: text
    content: They will come racing toward Jerusalem.
  '27':
  - type: text
    content: They will not get tired or stumble.
  - type: text
    content: They will not stop for rest or sleep.
  - type: text
    content: Not a belt will be loose,
  - type: text
    content: not a sandal strap broken.
  '28':
  - type: text
    content: Their arrows will be sharp
  - type: text
    content: and their bows ready for battle.
  - type: text
    content: Sparks will fly from their horses’ hooves,
  - type: text
    content: and the wheels of their chariots will spin like a whirlwind.
  '29':
  - type: text
    content: They will roar like lions,
  - type: text
    content: like the strongest of lions.
  - type: text
    content: Growling, they will pounce on their victims and carry them off,
  - type: text
    content: and no one will be there to rescue them.
  '3':
  - type: text
    content: Now, you people of Jerusalem and Judah,
  - type: text
    content: you judge between me and my vineyard.
  '30':
  - type: text
    content: They will roar over their victims on that day of destruction
  - type: text
    content: like the roaring of the sea.
  - type: text
    content: If someone looks across the land,
  - type: text
    content: only darkness and distress will be seen;
  - type: text
    content: even the light will be darkened by clouds.
  '4':
  - type: text
    content: What more could I have done for my vineyard
  - type: text
    content: that I have not already done?
  - type: text
    content: When I expected sweet grapes,
  - type: text
    content: why did my vineyard give me bitter grapes?
  '5':
  - type: text
    content: Now let me tell you
  - type: text
    content: 'what I will do to my vineyard:'
  - type: text
    content: I will tear down its hedges
  - type: text
    content: and let it be destroyed.
  - type: text
    content: I will break down its walls
  - type: text
    content: and let the animals trample it.
  '6':
  - type: text
    content: I will make it a wild place
  - type: text
    content: where the vines are not pruned and the ground is not hoed,
  - type: text
    content: a place overgrown with briers and thorns.
  - type: text
    content: I will command the clouds
  - type: text
    content: to drop no rain on it.
  '7':
  - type: text
    content: 'The nation of Israel is the vineyard of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  - type: text
    content: The people of Judah are his pleasant garden.
  - type: text
    content: He expected a crop of justice,
  - type: text
    content: but instead he found oppression.
  - type: text
    content: He expected to find righteousness,
  - type: text
    content: but instead he heard cries of violence.
  - type: heading
    content: Judah’s Guilt and Judgment
  '8':
  - type: text
    content: What sorrow for you who buy up house after house and field after field,
  - type: text
    content: until everyone is evicted and you live alone in the land.
  '9':
  - type: text
    content: 'But I have heard the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies'
  - type: text
    content: 'swear a solemn oath:'
  - type: text
    content: “Many houses will stand deserted;
  - type: text
    content: even beautiful mansions will be empty.
