document_id: ISA.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'A Song about the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Vineyard
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now I will sing for the one I love
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'a song about his vineyard:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My beloved had a vineyard
- type: usfm
  marker: q2
  children:
  - type: text
    text: on a rich and fertile hill.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He plowed the land, cleared its stones,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and planted it with the best vines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the middle he built a watchtower
- type: usfm
  marker: q2
  children:
  - type: text
    text: and carved a winepress in the nearby rocks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then he waited for a harvest of sweet grapes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the grapes that grew were bitter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Now, you people of Jerusalem and Judah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you judge between me and my vineyard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: What more could I have done for my vineyard
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I have not already done?
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I expected sweet grapes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: why did my vineyard give me bitter grapes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Now let me tell you
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'what I will do to my vineyard:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will tear down its hedges
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let it be destroyed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will break down its walls
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let the animals trample it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I will make it a wild place
- type: usfm
  marker: q2
  children:
  - type: text
    text: where the vines are not pruned and the ground is not hoed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a place overgrown with briers and thorns.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will command the clouds
- type: usfm
  marker: q2
  children:
  - type: text
    text: to drop no rain on it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The nation of Israel is the vineyard of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The people of Judah are his pleasant garden.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He expected a crop of justice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but instead he found oppression.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He expected to find righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but instead he heard cries of violence.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judah’s Guilt and Judgment
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: What sorrow for you who buy up house after house and field after field,
- type: usfm
  marker: q2
  children:
  - type: text
    text: until everyone is evicted and you live alone in the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But I have heard the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'swear a solemn oath:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Many houses will stand deserted;
- type: usfm
  marker: q2
  children:
  - type: text
    text: even beautiful mansions will be empty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ten acres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:10a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'A ten yoke, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: that is, the area of land plowed by ten teams of oxen in one day.
    marker-yv: yv-n
  - type: text
    text: ' of vineyard will not produce even six gallons'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:10b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'a bath '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[21 liters].'
    marker-yv: yv-n
  - type: text
    text: ' of wine.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ten baskets of seed will yield only one basket
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:10c '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'A homer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[5 bushels or 220 liters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of seed will yield only an ephah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[20 quarts or 22 liters].'
    marker-yv: yv-n
  - type: text
    text: ' of grain.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: What sorrow for those who get up early in the morning
- type: usfm
  marker: q2
  children:
  - type: text
    text: looking for a drink of alcohol
- type: usfm
  marker: q1
  children:
  - type: text
    text: and spend long evenings drinking wine
- type: usfm
  marker: q2
  children:
  - type: text
    text: to make themselves flaming drunk.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They furnish wine and lovely music at their grand parties—
- type: usfm
  marker: q2
  children:
  - type: text
    text: lyre and harp, tambourine and flute—
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'but they never think about the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: or notice what he is doing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So my people will go into exile far away
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they do not know me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who are great and honored will starve,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the common people will die of thirst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The grave
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Sheol.
    marker-yv: yv-n
  - type: text
    text: ' is licking its lips in anticipation,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: opening its mouth wide.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The great and the lowly
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the drunken mob will be swallowed up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Humanity will be destroyed, and people brought down;
- type: usfm
  marker: q2
  children:
  - type: text
    text: even the arrogant will lower their eyes in humiliation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies will be exalted by his justice.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The holiness of God will be displayed by his righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: In that day lambs will find good pastures,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fattened sheep and young goats
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and strangers.
    marker-yv: yv-n
  - type: text
    text: ' will feed among the ruins.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: What sorrow for those who drag their sins behind them
- type: usfm
  marker: q2
  children:
  - type: text
    text: with ropes made of lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who drag wickedness behind them like a cart!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: They even mock God and say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Hurry up and do something!
- type: usfm
  marker: q2
  children:
  - type: text
    text: We want to see what you can do.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the Holy One of Israel carry out his plan,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for we want to know what it is.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: What sorrow for those who say
- type: usfm
  marker: q2
  children:
  - type: text
    text: that evil is good and good is evil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: that dark is light and light is dark,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that bitter is sweet and sweet is bitter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: What sorrow for those who are wise in their own eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and think themselves so clever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: What sorrow for those who are heroes at drinking wine
- type: usfm
  marker: q2
  children:
  - type: text
    text: and boast about all the alcohol they can hold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They take bribes to let the wicked go free,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they punish the innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Therefore, just as fire licks up stubble
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dry grass shrivels in the flame,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so their roots will rot
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their flowers wither.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For they have rejected the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have despised the word of the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'That is why the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s anger burns against his people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and why he has raised his fist to crush them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The mountains tremble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the corpses of his people litter the streets like garbage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But even then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s anger is not satisfied.
- type: usfm
  marker: q2
  children:
  - type: text
    text: His fist is still poised to strike!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He will send a signal to distant nations far away
- type: usfm
  marker: q2
  children:
  - type: text
    text: and whistle to those at the ends of the earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will come racing toward Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: They will not get tired or stumble.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will not stop for rest or sleep.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not a belt will be loose,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not a sandal strap broken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Their arrows will be sharp
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their bows ready for battle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sparks will fly from their horses’ hooves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the wheels of their chariots will spin like a whirlwind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: They will roar like lions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the strongest of lions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Growling, they will pounce on their victims and carry them off,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one will be there to rescue them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: They will roar over their victims on that day of destruction
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the roaring of the sea.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If someone looks across the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: only darkness and distress will be seen;
- type: usfm
  marker: q2
  children:
  - type: text
    text: even the light will be darkened by clouds.
