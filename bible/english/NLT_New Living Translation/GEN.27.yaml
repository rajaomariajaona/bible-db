document_id: GEN.27,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Steals Esau’s Blessing
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: One day when Isaac was old and turning blind, he called for Esau, his older son, and said, “My son.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, Father?” Esau replied.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then take the food to your father so he can eat it and bless you before he dies.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“But look,” Jacob replied to Rebekah, “my brother, Esau, is a hairy man, and my skin is smooth. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: What if my father touches me? He’ll see that I’m trying to trick him, and then he’ll curse me instead of blessing me.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But his mother replied, “Then let the curse fall on me, my son! Just do what I tell you. Go out and get the goats for me!”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So Jacob went out and got the young goats for his mother. Rebekah took them and prepared a delicious meal, just the way Isaac liked it. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then she took Esau’s favorite clothes, which were there in the house, and gave them to her younger son, Jacob. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'She covered his arms and the smooth part of his neck with the skin of the young goats. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then she gave Jacob the delicious meal, including freshly baked bread.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: So Jacob took the food to his father. “My father?” he said.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, my son,” Isaac answered. “Who are you—Esau or Jacob?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Jacob replied, “It’s Esau, your firstborn son. I’ve done as you told me. Here is the wild game. Now sit up and eat it so you can give me your blessing.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“I am an old man now,” Isaac said, “and I don’t know when I may die. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Isaac asked, “How did you find it so quickly, my son?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God put it in my path!” Jacob replied.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then Isaac said to Jacob, “Come closer so I can touch you and make sure that you really are Esau.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So Jacob went closer to his father, and Isaac touched him. “The voice is Jacob’s, but the hands are Esau’s,” Isaac said. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But he did not recognize Jacob, because Jacob’s hands felt hairy just like Esau’s. So Isaac prepared to bless Jacob. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “But are you really my son Esau?” he asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, I am,” Jacob replied.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then Isaac said, “Now, my son, bring me the wild game. Let me eat it, and then I will give you my blessing.” So Jacob took the food to his father, and Isaac ate it. He also drank the wine that Jacob served him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Then Isaac said to Jacob, “Please come a little closer and kiss me, my son.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'So Jacob went over and kissed him. And when Isaac caught the smell of his clothes, he was finally convinced, and he blessed his son. He said, “Ah! The smell of my son is like the smell of the outdoors, which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has blessed!'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “From the dew of heaven
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the richness of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: may God always give you abundant harvests of grain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bountiful new wine.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: May many nations become your servants,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and may they bow down to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May you be the master over your brothers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and may your mother’s sons bow down to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who curse you will be cursed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all who bless you will be blessed.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Take your bow and a quiver full of arrows, and go out into the open country to hunt some wild game for me. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'As soon as Isaac had finished blessing Jacob, and almost before Jacob had left his father, Esau returned from his hunt. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Esau prepared a delicious meal and brought it to his father. Then he said, “Sit up, my father, and eat my wild game so you can give me your blessing.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: But Isaac asked him, “Who are you?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Esau replied, “It’s your son, your firstborn son, Esau.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Isaac began to tremble uncontrollably and said, “Then who just served me wild game? I have already eaten it, and I blessed him just before you came. And yes, that blessing must stand!”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: When Esau heard his father’s words, he let out a loud and bitter cry. “Oh my father, what about me? Bless me, too!” he begged.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: But Isaac said, “Your brother was here, and he tricked me. He has taken away your blessing.”
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Esau exclaimed, “No wonder his name is Jacob, for now he has cheated me twice.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:36 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jacob '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sounds like the Hebrew words for “heel” and “deceiver.”
      marker-yv: yv-n
    - type: text
      text: ' First he took my rights as the firstborn, and now he has stolen my blessing. Oh, haven’t you saved even one blessing for me?”'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Isaac said to Esau, “I have made Jacob your master and have declared that all his brothers will be his servants. I have guaranteed him an abundance of grain and wine—what is left for me to give you, my son?”
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Esau pleaded, “But do you have only one blessing? Oh my father, bless me, too!” Then Esau broke down and wept.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Finally, his father, Isaac, said to him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You will live away from the richness of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and away from the dew of the heaven above.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Prepare my favorite dish, and bring it here for me to eat. Then I will pronounce the blessing that belongs to you, my firstborn son, before I die.”
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: You will live by your sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will serve your brother.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when you decide to break free,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will shake his yoke from your neck.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Flees to Paddan-Aram
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'From that time on, Esau hated Jacob because their father had given Jacob the blessing. And Esau began to scheme: “I will soon be mourning my father’s death. Then I will kill my brother, Jacob.”'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'But Rebekah heard about Esau’s plans. So she sent for Jacob and told him, “Listen, Esau is consoling himself by plotting to kill you. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'So listen carefully, my son. Get ready and flee to my brother, Laban, in Haran. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Stay there with him until your brother cools off. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: When he calms down and forgets what you have done to him, I will send for you to come back. Why should I lose both of you in one day?”
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Then Rebekah said to Isaac, “I’m sick and tired of these local Hittite women! I would rather die than see Jacob marry one of them.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But Rebekah overheard what Isaac had said to his son Esau. So when Esau left to hunt for the wild game, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'she said to her son Jacob, “Listen. I overheard your father say to Esau, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '‘Bring me some wild game and prepare me a delicious meal. Then I will bless you in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s presence before I die.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Now, my son, listen to me. Do exactly as I tell you. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Go out to the flocks, and bring me two fine young goats. I’ll use them to prepare your father’s favorite dish. '
