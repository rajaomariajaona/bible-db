document_id: DAN.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel’s Vision of a Messenger
  - type: text
    content: In the third year of the reign of King Cyrus of Persia,
  - type: note
    content: The third year of Cyrus’s reign was 536 b.c.
  - type: text
    content: ' Daniel (also known as Belteshazzar) had another vision. He understood that the vision concerned events certain to happen in the future—times of war and great hardship.'
  '10':
  - type: text
    content: 'Just then a hand touched me and lifted me, still trembling, to my hands and knees. '
  '11':
  - type: text
    content: And the man said to me, “Daniel, you are very precious to God, so listen carefully to what I have to say to you. Stand up, for I have been sent to you.” When he said this to me, I stood up, still trembling.
  '12':
  - type: text
    content: 'Then he said, “Don’t be afraid, Daniel. Since the first day you began to pray for understanding and to humble yourself before your God, your request has been heard in heaven. I have come in answer to your prayer. '
  '13':
  - type: text
    content: But for twenty-one days the spirit prince
  - type: note
    content: Hebrew the prince; also in 10:13c, 20.
  - type: text
    content: ' of the kingdom of Persia blocked my way. Then Michael, one of the archangels,'
  - type: note
    content: Hebrew the chief princes.
  - type: text
    content: ' came to help me, and I left him there with the spirit prince of the kingdom of Persia.'
  - type: note
    content: As in one Greek version; Hebrew reads and I was left there with the kings of Persia. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Now I am here to explain what will happen to your people in the future, for this vision concerns a time yet to come.”
  '15':
  - type: text
    content: 'While he was speaking to me, I looked down at the ground, unable to say a word. '
  '16':
  - type: text
    content: Then the one who looked like a man
  - type: note
    content: As in most manuscripts of the Masoretic Text; one manuscript of the Masoretic Text and one Greek version read Then something that looked like a human hand.
  - type: text
    content: ' touched my lips, and I opened my mouth and began to speak. I said to the one standing in front of me, “I am filled with anguish because of the vision I have seen, my lord, and I am very weak. '
  '17':
  - type: text
    content: How can someone like me, your servant, talk to you, my lord? My strength is gone, and I can hardly breathe.”
  '18':
  - type: text
    content: 'Then the one who looked like a man touched me again, and I felt my strength returning. '
  '19':
  - type: text
    content: “Don’t be afraid,” he said, “for you are very precious to God. Peace! Be encouraged! Be strong!”
  - type: text
    content: As he spoke these words to me, I suddenly felt stronger and said to him, “Please speak to me, my lord, for you have strengthened me.”
  '2':
  - type: text
    content: 'When this vision came to me, I, Daniel, had been in mourning for three whole weeks. '
  '20':
  - type: text
    content: He replied, “Do you know why I have come? Soon I must return to fight against the spirit prince of the kingdom of Persia, and after that the spirit prince of the kingdom of Greece
  - type: note
    content: Hebrew of Javan.
  - type: text
    content: ' will come. '
  '21':
  - type: text
    content: Meanwhile, I will tell you what is written in the Book of Truth. (No one helps me against these spirit princes except Michael, your spirit prince.
  - type: note
    content: Hebrew against these except Michael, your prince.
  '3':
  - type: text
    content: All that time I had eaten no rich food. No meat or wine crossed my lips, and I used no fragrant lotions until those three weeks had passed.
  '4':
  - type: text
    content: On April 23,
  - type: note
    content: Hebrew On the twenty-fourth day of the first month, of the ancient Hebrew lunar calendar. This date in the book of Daniel can be cross-checked with dates in surviving Persian records and can be related accurately to our modern calendar. This event occurred on April 23, 536 b.c.
  - type: text
    content: ' as I was standing on the bank of the great Tigris River, '
  '5':
  - type: text
    content: 'I looked up and saw a man dressed in linen clothing, with a belt of pure gold around his waist. '
  '6':
  - type: text
    content: His body looked like a precious gem. His face flashed like lightning, and his eyes flamed like torches. His arms and feet shone like polished bronze, and his voice roared like a vast multitude of people.
  '7':
  - type: text
    content: 'Only I, Daniel, saw this vision. The men with me saw nothing, but they were suddenly terrified and ran away to hide. '
  '8':
  - type: text
    content: 'So I was left there all alone to see this amazing vision. My strength left me, my face grew deathly pale, and I felt very weak. '
  '9':
  - type: text
    content: Then I heard the man speak, and when I heard the sound of his voice, I fainted and lay there with my face to the ground.
