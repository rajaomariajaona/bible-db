document_id: ACT.8,116
type_code: eng
verses:
  '1':
  - type: text
    content: Saul was one of the witnesses, and he agreed completely with the killing of Stephen.
  - type: heading
    content: Persecution Scatters the Believers
  - type: text
    content: 'A great wave of persecution began that day, sweeping over the church in Jerusalem; and all the believers except the apostles were scattered through the regions of Judea and Samaria. '
  '10':
  - type: text
    content: 'Everyone, from the least to the greatest, often spoke of him as “the Great One—the Power of God.” '
  '11':
  - type: text
    content: They listened closely to him because for a long time he had astounded them with his magic.
  '12':
  - type: text
    content: 'But now the people believed Philip’s message of Good News concerning the Kingdom of God and the name of Jesus Christ. As a result, many men and women were baptized. '
  '13':
  - type: text
    content: Then Simon himself believed and was baptized. He began following Philip wherever he went, and he was amazed by the signs and great miracles Philip performed.
  '14':
  - type: text
    content: 'When the apostles in Jerusalem heard that the people of Samaria had accepted God’s message, they sent Peter and John there. '
  '15':
  - type: text
    content: 'As soon as they arrived, they prayed for these new believers to receive the Holy Spirit. '
  '16':
  - type: text
    content: 'The Holy Spirit had not yet come upon any of them, for they had only been baptized in the name of the Lord Jesus. '
  '17':
  - type: text
    content: Then Peter and John laid their hands upon these believers, and they received the Holy Spirit.
  '18':
  - type: text
    content: 'When Simon saw that the Spirit was given when the apostles laid their hands on people, he offered them money to buy this power. '
  '19':
  - type: text
    content: “Let me have this power, too,” he exclaimed, “so that when I lay my hands on people, they will receive the Holy Spirit!”
  '2':
  - type: text
    content: '(Some devout men came and buried Stephen with great mourning.) '
  '20':
  - type: text
    content: 'But Peter replied, “May your money be destroyed with you for thinking God’s gift can be bought! '
  '21':
  - type: text
    content: 'You can have no part in this, for your heart is not right with God. '
  '22':
  - type: text
    content: 'Repent of your wickedness and pray to the Lord. Perhaps he will forgive your evil thoughts, '
  '23':
  - type: text
    content: for I can see that you are full of bitter jealousy and are held captive by sin.”
  '24':
  - type: text
    content: “Pray to the Lord for me,” Simon exclaimed, “that these terrible things you’ve said won’t happen to me!”
  '25':
  - type: text
    content: After testifying and preaching the word of the Lord in Samaria, Peter and John returned to Jerusalem. And they stopped in many Samaritan villages along the way to preach the Good News.
  - type: heading
    content: Philip and the Ethiopian Eunuch
  '26':
  - type: text
    content: As for Philip, an angel of the Lord said to him, “Go south
  - type: note
    content: Or Go at noon.
  - type: text
    content: ' down the desert road that runs from Jerusalem to Gaza.” '
  '27':
  - type: text
    content: 'So he started out, and he met the treasurer of Ethiopia, a eunuch of great authority under the Kandake, the queen of Ethiopia. The eunuch had gone to Jerusalem to worship, '
  '28':
  - type: text
    content: and he was now returning. Seated in his carriage, he was reading aloud from the book of the prophet Isaiah.
  '29':
  - type: text
    content: The Holy Spirit said to Philip, “Go over and walk along beside the carriage.”
  '3':
  - type: text
    content: But Saul was going everywhere to destroy the church. He went from house to house, dragging out both men and women to throw them into prison.
  - type: heading
    content: Philip Preaches in Samaria
  '30':
  - type: text
    content: Philip ran over and heard the man reading from the prophet Isaiah. Philip asked, “Do you understand what you are reading?”
  '31':
  - type: text
    content: The man replied, “How can I, unless someone instructs me?” And he urged Philip to come up into the carriage and sit with him.
  '32':
  - type: text
    content: 'The passage of Scripture he had been reading was this:'
  - type: text
    content: “He was led like a sheep to the slaughter.
  - type: text
    content: And as a lamb is silent before the shearers,
  - type: text
    content: he did not open his mouth.
  '33':
  - type: text
    content: He was humiliated and received no justice.
  - type: text
    content: Who can speak of his descendants?
  - type: text
    content: For his life was taken from the earth.”
  - type: note
    content: Isa 53:7-8 (Greek version).
  '34':
  - type: text
    content: 'The eunuch asked Philip, “Tell me, was the prophet talking about himself or someone else?” '
  '35':
  - type: text
    content: So beginning with this same Scripture, Philip told him the Good News about Jesus.
  '36':
  - type: text
    content: As they rode along, they came to some water, and the eunuch said, “Look! There’s some water! Why can’t I be baptized?”
  - type: note
    content: Some manuscripts add verse 37, “You can,” Philip answered, “if you believe with all your heart.” And the eunuch replied, “I believe that Jesus Christ is the Son of God.”
  - type: text
    content: ' '
  '38':
  - type: text
    content: He ordered the carriage to stop, and they went down into the water, and Philip baptized him.
  '39':
  - type: text
    content: 'When they came up out of the water, the Spirit of the Lord snatched Philip away. The eunuch never saw him again but went on his way rejoicing. '
  '4':
  - type: text
    content: 'But the believers who were scattered preached the Good News about Jesus wherever they went. '
  '40':
  - type: text
    content: Meanwhile, Philip found himself farther north at the town of Azotus. He preached the Good News there and in every town along the way until he came to Caesarea.
  '5':
  - type: text
    content: 'Philip, for example, went to the city of Samaria and told the people there about the Messiah. '
  '6':
  - type: text
    content: 'Crowds listened intently to Philip because they were eager to hear his message and see the miraculous signs he did. '
  '7':
  - type: text
    content: Many evil
  - type: note
    content: Greek unclean.
  - type: text
    content: ' spirits were cast out, screaming as they left their victims. And many who had been paralyzed or lame were healed. '
  '8':
  - type: text
    content: So there was great joy in that city.
  '9':
  - type: text
    content: 'A man named Simon had been a sorcerer there for many years, amazing the people of Samaria and claiming to be someone great. '
