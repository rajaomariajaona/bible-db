document_id: ACT.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Saul was one of the witnesses, and he agreed completely with the killing of Stephen.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Persecution Scatters the Believers
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: text
    text: 'A great wave of persecution began that day, sweeping over the church in Jerusalem; and all the believers except the apostles were scattered through the regions of Judea and Samaria. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '(Some devout men came and buried Stephen with great mourning.) '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But Saul was going everywhere to destroy the church. He went from house to house, dragging out both men and women to throw them into prison.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Philip Preaches in Samaria
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But the believers who were scattered preached the Good News about Jesus wherever they went. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Philip, for example, went to the city of Samaria and told the people there about the Messiah. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Crowds listened intently to Philip because they were eager to hear his message and see the miraculous signs he did. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Many evil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: unclean.
    marker-yv: yv-n
  - type: text
    text: ' spirits were cast out, screaming as they left their victims. And many who had been paralyzed or lame were healed. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So there was great joy in that city.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A man named Simon had been a sorcerer there for many years, amazing the people of Samaria and claiming to be someone great. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Everyone, from the least to the greatest, often spoke of him as “the Great One—the Power of God.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They listened closely to him because for a long time he had astounded them with his magic.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But now the people believed Philip’s message of Good News concerning the Kingdom of God and the name of Jesus Christ. As a result, many men and women were baptized. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then Simon himself believed and was baptized. He began following Philip wherever he went, and he was amazed by the signs and great miracles Philip performed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When the apostles in Jerusalem heard that the people of Samaria had accepted God’s message, they sent Peter and John there. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'As soon as they arrived, they prayed for these new believers to receive the Holy Spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The Holy Spirit had not yet come upon any of them, for they had only been baptized in the name of the Lord Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then Peter and John laid their hands upon these believers, and they received the Holy Spirit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When Simon saw that the Spirit was given when the apostles laid their hands on people, he offered them money to buy this power. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Let me have this power, too,” he exclaimed, “so that when I lay my hands on people, they will receive the Holy Spirit!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But Peter replied, “May your money be destroyed with you for thinking God’s gift can be bought! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'You can have no part in this, for your heart is not right with God. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Repent of your wickedness and pray to the Lord. Perhaps he will forgive your evil thoughts, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: for I can see that you are full of bitter jealousy and are held captive by sin.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Pray to the Lord for me,” Simon exclaimed, “that these terrible things you’ve said won’t happen to me!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: After testifying and preaching the word of the Lord in Samaria, Peter and John returned to Jerusalem. And they stopped in many Samaritan villages along the way to preach the Good News.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Philip and the Ethiopian Eunuch
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: As for Philip, an angel of the Lord said to him, “Go south
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Go at noon.
    marker-yv: yv-n
  - type: text
    text: ' down the desert road that runs from Jerusalem to Gaza.” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'So he started out, and he met the treasurer of Ethiopia, a eunuch of great authority under the Kandake, the queen of Ethiopia. The eunuch had gone to Jerusalem to worship, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: and he was now returning. Seated in his carriage, he was reading aloud from the book of the prophet Isaiah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The Holy Spirit said to Philip, “Go over and walk along beside the carriage.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Philip ran over and heard the man reading from the prophet Isaiah. Philip asked, “Do you understand what you are reading?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The man replied, “How can I, unless someone instructs me?” And he urged Philip to come up into the carriage and sit with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The passage of Scripture he had been reading was this:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “He was led like a sheep to the slaughter.
- type: usfm
  marker: q2
  children:
  - type: text
    text: And as a lamb is silent before the shearers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he did not open his mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: He was humiliated and received no justice.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can speak of his descendants?
- type: usfm
  marker: q2
  children:
  - type: text
    text: For his life was taken from the earth.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:32-33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 53:7-8 (Greek version).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The eunuch asked Philip, “Tell me, was the prophet talking about himself or someone else?” '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: So beginning with this same Scripture, Philip told him the Good News about Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: As they rode along, they came to some water, and the eunuch said, “Look! There’s some water! Why can’t I be baptized?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts add verse 37, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: “You can,” Philip answered, “if you believe with all your heart.” And the eunuch replied, “I believe that Jesus Christ is the Son of God.”
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: He ordered the carriage to stop, and they went down into the water, and Philip baptized him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'When they came up out of the water, the Spirit of the Lord snatched Philip away. The eunuch never saw him again but went on his way rejoicing. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Meanwhile, Philip found himself farther north at the town of Azotus. He preached the Good News there and in every town along the way until he came to Caesarea.
