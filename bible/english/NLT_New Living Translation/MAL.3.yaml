document_id: MAL.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Coming Day of Judgment
  - type: text
    content: '“Look! I am sending my messenger, and he will prepare the way before me. Then the Lord you are seeking will suddenly come to his Temple. The messenger of the covenant, whom you look for so eagerly, is surely coming,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '10':
  - type: text
    content: 'Bring all the tithes into the storehouse so there will be enough food in my Temple. If you do,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, “I will open the windows of heaven for you. I will pour out a blessing so great you won’t have enough room to take it in! Try it! Put me to the test! '
  '11':
  - type: text
    content: Your crops will be abundant, for I will guard them from insects and disease.
  - type: note
    content: Hebrew from the devourer.
  - type: text
    content: ' Your grapes will not fall from the vine before they are ripe,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. '
  '12':
  - type: text
    content: '“Then all nations will call you blessed, for your land will be such a delight,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '13':
  - type: text
    content: '“You have said terrible things about me,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “But you say, ‘What do you mean? What have we said against you?’
  '14':
  - type: text
    content: '“You have said, ‘What’s the use of serving God? What have we gained by obeying his commands or by trying to show the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies that we are sorry for our sins? '
  '15':
  - type: text
    content: From now on we will call the arrogant blessed. For those who do evil get rich, and those who dare God to punish them suffer no harm.’”
  - type: heading
    content: The Lord’s Promise of Mercy
  '16':
  - type: text
    content: 'Then those who feared the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke with each other, and the '
  - type: text
    content: Lord
  - type: text
    content: ' listened to what they said. In his presence, a scroll of remembrance was written to record the names of those who feared him and always thought about the honor of his name.'
  '17':
  - type: text
    content: '“They will be my people,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies. “On the day when I act in judgment, they will be my own special treasure. I will spare them as a father spares an obedient child. '
  '18':
  - type: text
    content: Then you will again see the difference between the righteous and the wicked, between those who serve God and those who do not.”
  '2':
  - type: text
    content: '“But who will be able to endure it when he comes? Who will be able to stand and face him when he appears? For he will be like a blazing fire that refines metal, or like a strong soap that bleaches clothes. '
  '3':
  - type: text
    content: 'He will sit like a refiner of silver, burning away the dross. He will purify the Levites, refining them like gold and silver, so that they may once again offer acceptable sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Then once more the '
  - type: text
    content: Lord
  - type: text
    content: ' will accept the offerings brought to him by the people of Judah and Jerusalem, as he did in the past.'
  '5':
  - type: text
    content: '“At that time I will put you on trial. I am eager to witness against all sorcerers and adulterers and liars. I will speak against those who cheat employees of their wages, who oppress widows and orphans, or who deprive the foreigners living among you of justice, for these people do not fear me,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  - type: heading
    content: A Call to Repentance
  '6':
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ', and I do not change. That is why you descendants of Jacob are not already destroyed. '
  '7':
  - type: text
    content: 'Ever since the days of your ancestors, you have scorned my decrees and failed to obey them. Now return to me, and I will return to you,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  - type: text
    content: “But you ask, ‘How can we return when we have never gone away?’
  '8':
  - type: text
    content: “Should people cheat God? Yet you have cheated me!
  - type: text
    content: “But you ask, ‘What do you mean? When did we ever cheat you?’
  - type: text
    content: '“You have cheated me of the tithes and offerings due to me. '
  '9':
  - type: text
    content: 'You are under a curse, for your whole nation has been cheating me. '
