document_id: GEN.16,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Birth of Ishmael
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now Sarai, Abram’s wife, had not been able to bear children for him. But she had an Egyptian servant named Hagar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then he added, “I will give you more descendants than you can count.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the angel also said, “You are now pregnant and will give birth to a son. You are to name him Ishmael (which means ‘God hears’), for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has heard your cry of distress. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: This son of yours will be a wild man, as untamed as a wild donkey! He will raise his fist against everyone, and everyone will be against him. Yes, he will live in open hostility against all his relatives.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Thereafter, Hagar used another name to refer to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who had spoken to her. She said, “You are the God who sees me.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: El-roi.
      marker-yv: yv-n
    - type: text
      text: ' She also said, “Have I truly seen the One who sees me?” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So that well was named Beer-lahai-roi (which means “well of the Living One who sees me”). It can still be found between Kadesh and Bered.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So Hagar gave Abram a son, and Abram named him Ishmael. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Abram was eighty-six years old when Ishmael was born.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So Sarai said to Abram, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has prevented me from having children. Go and sleep with my servant. Perhaps I can have children through her.” And Abram agreed with Sarai’s proposal. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So Sarai, Abram’s wife, took Hagar the Egyptian servant and gave her to Abram as a wife. (This happened ten years after Abram had settled in the land of Canaan.)
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So Abram had sexual relations with Hagar, and she became pregnant. But when Hagar knew she was pregnant, she began to treat her mistress, Sarai, with contempt. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then Sarai said to Abram, “This is all your fault! I put my servant into your arms, but now that she’s pregnant she treats me with contempt. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will show who’s wrong—you or me!”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Abram replied, “Look, she is your servant, so deal with her as you see fit.” Then Sarai treated Hagar so harshly that she finally ran away.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' found Hagar beside a spring of water in the wilderness, along the road to Shur. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The angel said to her, “Hagar, Sarai’s servant, where have you come from, and where are you going?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I’m running away from my mistress, Sarai,” she replied.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to her, “Return to your mistress, and submit to her authority.” '
