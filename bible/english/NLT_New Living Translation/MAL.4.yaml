document_id: MAL.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Coming Day of Judgment
  - type: text
    content: ' '
  - type: note
    content: Verses 4:1-6 are numbered 3:19-24 in Hebrew text.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says, “The day of judgment is coming, burning like a furnace. On that day the arrogant and the wicked will be burned up like straw. They will be consumed—roots, branches, and all.'
  '2':
  - type: text
    content: “But for you who fear my name, the Sun of Righteousness will rise with healing in his wings.
  - type: note
    content: Or the sun of righteousness will rise with healing in its wings.
  - type: text
    content: ' And you will go free, leaping with joy like calves let out to pasture. '
  '3':
  - type: text
    content: 'On the day when I act, you will tread upon the wicked as if they were dust under your feet,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '4':
  - type: text
    content: “Remember to obey the Law of Moses, my servant—all the decrees and regulations that I gave him on Mount Sinai
  - type: note
    content: Hebrew Horeb, another name for Sinai.
  - type: text
    content: ' for all Israel.'
  '5':
  - type: text
    content: '“Look, I am sending you the prophet Elijah before the great and dreadful day of the '
  - type: text
    content: Lord
  - type: text
    content: ' arrives. '
  '6':
  - type: text
    content: His preaching will turn the hearts of fathers to their children, and the hearts of children to their fathers. Otherwise I will come and strike the land with a curse.”
