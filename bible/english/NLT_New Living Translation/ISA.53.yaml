document_id: ISA.53,116
type_code: eng
verses:
  '1':
  - type: text
    content: Who has believed our message?
  - type: text
    content: 'To whom has the '
  - type: text
    content: Lord
  - type: text
    content: ' revealed his powerful arm?'
  '10':
  - type: text
    content: 'But it was the '
  - type: text
    content: Lord
  - type: text
    content: ’s good plan to crush him
  - type: text
    content: and cause him grief.
  - type: text
    content: Yet when his life is made an offering for sin,
  - type: text
    content: he will have many descendants.
  - type: text
    content: He will enjoy a long life,
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ’s good plan will prosper in his hands.
  '11':
  - type: text
    content: When he sees all that is accomplished by his anguish,
  - type: text
    content: he will be satisfied.
  - type: text
    content: And because of his experience,
  - type: text
    content: my righteous servant will make it possible
  - type: text
    content: for many to be counted righteous,
  - type: text
    content: for he will bear all their sins.
  '12':
  - type: text
    content: I will give him the honors of a victorious soldier,
  - type: text
    content: because he exposed himself to death.
  - type: text
    content: He was counted among the rebels.
  - type: text
    content: He bore the sins of many and interceded for rebels.
  '2':
  - type: text
    content: 'My servant grew up in the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence like a tender green shoot,
  - type: text
    content: like a root in dry ground.
  - type: text
    content: There was nothing beautiful or majestic about his appearance,
  - type: text
    content: nothing to attract us to him.
  '3':
  - type: text
    content: He was despised and rejected—
  - type: text
    content: a man of sorrows, acquainted with deepest grief.
  - type: text
    content: We turned our backs on him and looked the other way.
  - type: text
    content: He was despised, and we did not care.
  '4':
  - type: text
    content: Yet it was our weaknesses he carried;
  - type: text
    content: it was our sorrows
  - type: note
    content: Or Yet it was our sicknesses he carried; / it was our diseases.
  - type: text
    content: ' that weighed him down.'
  - type: text
    content: And we thought his troubles were a punishment from God,
  - type: text
    content: a punishment for his own sins!
  '5':
  - type: text
    content: But he was pierced for our rebellion,
  - type: text
    content: crushed for our sins.
  - type: text
    content: He was beaten so we could be whole.
  - type: text
    content: He was whipped so we could be healed.
  '6':
  - type: text
    content: All of us, like sheep, have strayed away.
  - type: text
    content: We have left God’s paths to follow our own.
  - type: text
    content: 'Yet the '
  - type: text
    content: Lord
  - type: text
    content: ' laid on him'
  - type: text
    content: the sins of us all.
  '7':
  - type: text
    content: He was oppressed and treated harshly,
  - type: text
    content: yet he never said a word.
  - type: text
    content: He was led like a lamb to the slaughter.
  - type: text
    content: And as a sheep is silent before the shearers,
  - type: text
    content: he did not open his mouth.
  '8':
  - type: text
    content: Unjustly condemned,
  - type: text
    content: he was led away.
  - type: note
    content: Greek version reads He was humiliated and received no justice. Compare Acts 8:33.
  - type: text
    content: No one cared that he died without descendants,
  - type: text
    content: that his life was cut short in midstream.
  - type: note
    content: Or As for his contemporaries, / who cared that his life was cut short in midstream? Greek version reads Who can speak of his descendants? / For his life was taken from the earth. Compare Acts 8:33.
  - type: text
    content: But he was struck down
  - type: text
    content: for the rebellion of my people.
  '9':
  - type: text
    content: He had done no wrong
  - type: text
    content: and had never deceived anyone.
  - type: text
    content: But he was buried like a criminal;
  - type: text
    content: he was put in a rich man’s grave.
