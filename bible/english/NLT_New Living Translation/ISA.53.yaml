document_id: ISA.53
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Who has believed our message?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'To whom has the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' revealed his powerful arm?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'My servant grew up in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s presence like a tender green shoot,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a root in dry ground.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There was nothing beautiful or majestic about his appearance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing to attract us to him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He was despised and rejected—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a man of sorrows, acquainted with deepest grief.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We turned our backs on him and looked the other way.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He was despised, and we did not care.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Yet it was our weaknesses he carried;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it was our sorrows
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '53:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Yet it was our sicknesses he carried; / it was our diseases.
    marker-yv: yv-n
  - type: text
    text: ' that weighed him down.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And we thought his troubles were a punishment from God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a punishment for his own sins!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But he was pierced for our rebellion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: crushed for our sins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He was beaten so we could be whole.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He was whipped so we could be healed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: All of us, like sheep, have strayed away.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We have left God’s paths to follow our own.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yet the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' laid on him'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the sins of us all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He was oppressed and treated harshly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet he never said a word.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He was led like a lamb to the slaughter.
- type: usfm
  marker: q2
  children:
  - type: text
    text: And as a sheep is silent before the shearers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he did not open his mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Unjustly condemned,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he was led away.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '53:8a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'He was humiliated and received no justice. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Acts 8:33.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one cared that he died without descendants,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that his life was cut short in midstream.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '53:8b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'As for his contemporaries, / who cared that his life was cut short in midstream? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Who can speak of his descendants? / For his life was taken from the earth. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare Acts 8:33.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he was struck down
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the rebellion of my people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He had done no wrong
- type: usfm
  marker: q2
  children:
  - type: text
    text: and had never deceived anyone.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he was buried like a criminal;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he was put in a rich man’s grave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But it was the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s good plan to crush him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cause him grief.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet when his life is made an offering for sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will have many descendants.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will enjoy a long life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s good plan will prosper in his hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: When he sees all that is accomplished by his anguish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will be satisfied.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And because of his experience,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my righteous servant will make it possible
- type: usfm
  marker: q1
  children:
  - type: text
    text: for many to be counted righteous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he will bear all their sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I will give him the honors of a victorious soldier,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because he exposed himself to death.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He was counted among the rebels.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He bore the sins of many and interceded for rebels.
