document_id: ISA.35,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hope for Restoration
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Even the wilderness and desert will be glad in those days.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The wasteland will rejoice and blossom with spring crocuses.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Those who have been ransomed by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will return.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will enter Jerusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zion.
      marker-yv: yv-n
    - type: text
      text: ' singing,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: crowned with everlasting joy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sorrow and mourning will disappear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will be filled with joy and gladness.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Yes, there will be an abundance of flowers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and singing and joy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The deserts will become as green as the mountains of Lebanon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as lovely as Mount Carmel or the plain of Sharon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will display his glory,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the splendor of our God.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: With this news, strengthen those who have tired hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and encourage those who have weak knees.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Say to those with fearful hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Be strong, and do not fear,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your God is coming to destroy your enemies.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is coming to save you.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And when he comes, he will open the eyes of the blind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and unplug the ears of the deaf.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The lame will leap like a deer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who cannot speak will sing for joy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Springs will gush forth in the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and streams will water the wasteland.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The parched ground will become a pool,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and springs of water will satisfy the thirsty land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marsh grass and reeds and rushes will flourish
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where desert jackals once lived.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: And a great road will go through that once deserted land.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It will be named the Highway of Holiness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Evil-minded people will never travel on it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It will be only for those who walk in God’s ways;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fools will never walk there.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Lions will not lurk along its course,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor any other ferocious beasts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There will be no other dangers.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Only the redeemed will walk on it.
