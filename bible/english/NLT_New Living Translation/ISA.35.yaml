document_id: ISA.35,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Hope for Restoration
  - type: text
    content: Even the wilderness and desert will be glad in those days.
  - type: text
    content: The wasteland will rejoice and blossom with spring crocuses.
  '10':
  - type: text
    content: 'Those who have been ransomed by the '
  - type: text
    content: Lord
  - type: text
    content: ' will return.'
  - type: text
    content: They will enter Jerusalem
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ' singing,'
  - type: text
    content: crowned with everlasting joy.
  - type: text
    content: Sorrow and mourning will disappear,
  - type: text
    content: and they will be filled with joy and gladness.
  '2':
  - type: text
    content: Yes, there will be an abundance of flowers
  - type: text
    content: and singing and joy!
  - type: text
    content: The deserts will become as green as the mountains of Lebanon,
  - type: text
    content: as lovely as Mount Carmel or the plain of Sharon.
  - type: text
    content: 'There the '
  - type: text
    content: Lord
  - type: text
    content: ' will display his glory,'
  - type: text
    content: the splendor of our God.
  '3':
  - type: text
    content: With this news, strengthen those who have tired hands,
  - type: text
    content: and encourage those who have weak knees.
  '4':
  - type: text
    content: Say to those with fearful hearts,
  - type: text
    content: “Be strong, and do not fear,
  - type: text
    content: for your God is coming to destroy your enemies.
  - type: text
    content: He is coming to save you.”
  '5':
  - type: text
    content: And when he comes, he will open the eyes of the blind
  - type: text
    content: and unplug the ears of the deaf.
  '6':
  - type: text
    content: The lame will leap like a deer,
  - type: text
    content: and those who cannot speak will sing for joy!
  - type: text
    content: Springs will gush forth in the wilderness,
  - type: text
    content: and streams will water the wasteland.
  '7':
  - type: text
    content: The parched ground will become a pool,
  - type: text
    content: and springs of water will satisfy the thirsty land.
  - type: text
    content: Marsh grass and reeds and rushes will flourish
  - type: text
    content: where desert jackals once lived.
  '8':
  - type: text
    content: And a great road will go through that once deserted land.
  - type: text
    content: It will be named the Highway of Holiness.
  - type: text
    content: Evil-minded people will never travel on it.
  - type: text
    content: It will be only for those who walk in God’s ways;
  - type: text
    content: fools will never walk there.
  '9':
  - type: text
    content: Lions will not lurk along its course,
  - type: text
    content: nor any other ferocious beasts.
  - type: text
    content: There will be no other dangers.
  - type: text
    content: Only the redeemed will walk on it.
