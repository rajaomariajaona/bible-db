document_id: 1SA.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samuel’s Farewell Address
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Samuel addressed all Israel: “I have done as you asked and given you a king. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then they cried to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' again and confessed, ‘We have sinned by turning away from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and worshiping the images of Baal and Ashtoreth. But we will worship you and you alone if you will rescue us from our enemies.’ '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent Gideon,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:11a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jerub-baal, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: another name for Gideon; see Judg 6:32.
      marker-yv: yv-n
    - type: text
      text: ' Bedan,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:11b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek and Syriac versions read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Barak.
      marker-yv: yv-n
    - type: text
      text: ' Jephthah, and Samuel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:11c '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek and Syriac versions read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Samson.
      marker-yv: yv-n
    - type: text
      text: ' to save you, and you lived in safety.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But when you were afraid of Nahash, the king of Ammon, you came to me and said that you wanted a king to reign over you, even though the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God was already your king. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All right, here is the king you have chosen. You asked for him, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has granted your request.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now if you fear and worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and listen to his voice, and if you do not rebel against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s commands, then both you and your king will show that you recognize the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as your God. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if you rebel against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s commands and refuse to listen to him, then his hand will be as heavy upon you as it was upon your ancestors.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now stand here and see the great thing the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is about to do. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You know that it does not rain at this time of the year during the wheat harvest. I will ask the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to send thunder and rain today. Then you will realize how wicked you have been in asking the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for a king!”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Samuel called to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent thunder and rain that day. And all the people were terrified of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and of Samuel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Pray to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God for us, or we will die!” they all said to Samuel. “For now we have added to our sins by asking for a king.”'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Your king is now your leader. I stand here before you—an old, gray-haired man—and my sons serve you. I have served as your leader from the time I was a boy to this very day. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Don’t be afraid,” Samuel reassured them. “You have certainly done wrong, but make sure now that you worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with all your heart, and don’t turn your back on him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Don’t go back to worshiping worthless idols that cannot help or rescue you—they are totally useless! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will not abandon his people, because that would dishonor his great name. For it has pleased the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to make you his very own people.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“As for me, I will certainly not sin against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by ending my prayers for you. And I will continue to teach you what is good and right. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But be sure to fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and faithfully serve him. Think of all the wonderful things he has done for you. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if you continue to sin, you and your king will be swept away.”
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now testify against me in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and before his anointed one. Whose ox or donkey have I stolen? Have I ever cheated any of you? Have I ever oppressed you? Have I ever taken a bribe and perverted justice? Tell me and I will make right whatever I have done wrong.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No,” they replied, “you have never cheated or oppressed us, and you have never taken even a single bribe.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and his anointed one are my witnesses today,” Samuel declared, “that my hands are clean.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, he is a witness,” they replied.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“It was the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who appointed Moses and Aaron,” Samuel continued. “He brought your ancestors out of the land of Egypt. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now stand here quietly before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as I remind you of all the great things the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done for you and your ancestors.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “When the Israelites were
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'When Jacob was. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
      marker-yv: yv-n
    - type: text
      text: ' in Egypt and cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', he sent Moses and Aaron to rescue them from Egypt and to bring them into this land. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people soon forgot about the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God, so he handed them over to Sisera, the commander of Hazor’s army, and also to the Philistines and to the king of Moab, who fought against them.'
