document_id: 1SA.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Samuel’s Farewell Address
  - type: text
    content: 'Then Samuel addressed all Israel: “I have done as you asked and given you a king. '
  '10':
  - type: text
    content: '“Then they cried to the '
  - type: text
    content: Lord
  - type: text
    content: ' again and confessed, ‘We have sinned by turning away from the '
  - type: text
    content: Lord
  - type: text
    content: ' and worshiping the images of Baal and Ashtoreth. But we will worship you and you alone if you will rescue us from our enemies.’ '
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' sent Gideon,'
  - type: note
    content: Hebrew Jerub-baal, another name for Gideon; see Judg 6:32.
  - type: text
    content: ' Bedan,'
  - type: note
    content: Greek and Syriac versions read Barak.
  - type: text
    content: ' Jephthah, and Samuel'
  - type: note
    content: Greek and Syriac versions read Samson.
  - type: text
    content: ' to save you, and you lived in safety.'
  '12':
  - type: text
    content: '“But when you were afraid of Nahash, the king of Ammon, you came to me and said that you wanted a king to reign over you, even though the '
  - type: text
    content: Lord
  - type: text
    content: ' your God was already your king. '
  '13':
  - type: text
    content: 'All right, here is the king you have chosen. You asked for him, and the '
  - type: text
    content: Lord
  - type: text
    content: ' has granted your request.'
  '14':
  - type: text
    content: '“Now if you fear and worship the '
  - type: text
    content: Lord
  - type: text
    content: ' and listen to his voice, and if you do not rebel against the '
  - type: text
    content: Lord
  - type: text
    content: '’s commands, then both you and your king will show that you recognize the '
  - type: text
    content: Lord
  - type: text
    content: ' as your God. '
  '15':
  - type: text
    content: 'But if you rebel against the '
  - type: text
    content: Lord
  - type: text
    content: ’s commands and refuse to listen to him, then his hand will be as heavy upon you as it was upon your ancestors.
  '16':
  - type: text
    content: '“Now stand here and see the great thing the '
  - type: text
    content: Lord
  - type: text
    content: ' is about to do. '
  '17':
  - type: text
    content: 'You know that it does not rain at this time of the year during the wheat harvest. I will ask the '
  - type: text
    content: Lord
  - type: text
    content: ' to send thunder and rain today. Then you will realize how wicked you have been in asking the '
  - type: text
    content: Lord
  - type: text
    content: ' for a king!”'
  '18':
  - type: text
    content: 'So Samuel called to the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: text
    content: ' sent thunder and rain that day. And all the people were terrified of the '
  - type: text
    content: Lord
  - type: text
    content: ' and of Samuel. '
  '19':
  - type: text
    content: '“Pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God for us, or we will die!” they all said to Samuel. “For now we have added to our sins by asking for a king.”'
  '2':
  - type: text
    content: 'Your king is now your leader. I stand here before you—an old, gray-haired man—and my sons serve you. I have served as your leader from the time I was a boy to this very day. '
  '20':
  - type: text
    content: '“Don’t be afraid,” Samuel reassured them. “You have certainly done wrong, but make sure now that you worship the '
  - type: text
    content: Lord
  - type: text
    content: ' with all your heart, and don’t turn your back on him. '
  '21':
  - type: text
    content: 'Don’t go back to worshiping worthless idols that cannot help or rescue you—they are totally useless! '
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will not abandon his people, because that would dishonor his great name. For it has pleased the '
  - type: text
    content: Lord
  - type: text
    content: ' to make you his very own people.'
  '23':
  - type: text
    content: '“As for me, I will certainly not sin against the '
  - type: text
    content: Lord
  - type: text
    content: ' by ending my prayers for you. And I will continue to teach you what is good and right. '
  '24':
  - type: text
    content: 'But be sure to fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and faithfully serve him. Think of all the wonderful things he has done for you. '
  '25':
  - type: text
    content: But if you continue to sin, you and your king will be swept away.”
  '3':
  - type: text
    content: 'Now testify against me in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' and before his anointed one. Whose ox or donkey have I stolen? Have I ever cheated any of you? Have I ever oppressed you? Have I ever taken a bribe and perverted justice? Tell me and I will make right whatever I have done wrong.”'
  '4':
  - type: text
    content: “No,” they replied, “you have never cheated or oppressed us, and you have never taken even a single bribe.”
  '5':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' and his anointed one are my witnesses today,” Samuel declared, “that my hands are clean.”'
  - type: text
    content: “Yes, he is a witness,” they replied.
  '6':
  - type: text
    content: '“It was the '
  - type: text
    content: Lord
  - type: text
    content: ' who appointed Moses and Aaron,” Samuel continued. “He brought your ancestors out of the land of Egypt. '
  '7':
  - type: text
    content: 'Now stand here quietly before the '
  - type: text
    content: Lord
  - type: text
    content: ' as I remind you of all the great things the '
  - type: text
    content: Lord
  - type: text
    content: ' has done for you and your ancestors.'
  '8':
  - type: text
    content: “When the Israelites were
  - type: note
    content: Hebrew When Jacob was. The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
  - type: text
    content: ' in Egypt and cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', he sent Moses and Aaron to rescue them from Egypt and to bring them into this land. '
  '9':
  - type: text
    content: 'But the people soon forgot about the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, so he handed them over to Sisera, the commander of Hazor’s army, and also to the Philistines and to the king of Moab, who fought against them.'
