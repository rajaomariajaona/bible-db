document_id: EZK.48,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Division of the Land
  - type: text
    content: “Here is the list of the tribes of Israel and the territory each is to receive. The territory of Dan is in the extreme north. Its boundary line follows the Hethlon road to Lebo-hamath and then runs on to Hazar-enan on the border of Damascus, with Hamath to the north. Dan’s territory extends all the way across the land of Israel from east to west.
  '10':
  - type: text
    content: For the priests there will be a strip of land measuring 8-1/3 miles long by 3-1/3 miles wide,
  - type: note
    content: Hebrew 25,000 [cubits] [13.3 kilometers] long by 10,000 [cubits] [5.3 kilometers] wide; also in 48:13a.
  - type: text
    content: ' with the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple at the center. '
  '11':
  - type: text
    content: 'This area is set aside for the ordained priests, the descendants of Zadok who served me faithfully and did not go astray with the people of Israel and the rest of the Levites. '
  '12':
  - type: text
    content: It will be their special portion when the land is distributed, the most sacred land of all. Next to the priests’ territory will lie the land where the other Levites will live.
  '13':
  - type: text
    content: “The land allotted to the Levites will be the same size and shape as that belonging to the priests—8-1/3 miles long and 3-1/3 miles wide. Together these portions of land will measure 8-1/3 miles long by 6-2/3 miles wide.
  - type: note
    content: See note on 48:9.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'None of this special land may ever be sold or traded or used by others, for it belongs to the '
  - type: text
    content: Lord
  - type: text
    content: ; it is set apart as holy.
  '15':
  - type: text
    content: “An additional strip of land 8-1/3 miles long by 1-2/3 miles wide,
  - type: note
    content: Hebrew 25,000 [cubits] [13.3 kilometers] long by 5,000 [cubits] [2.65 kilometers] wide.
  - type: text
    content: ' south of the sacred Temple area, will be allotted for public use—homes, pasturelands, and common lands, with a city at the center. '
  '16':
  - type: text
    content: The city will measure 1-1/2 miles
  - type: note
    content: Hebrew 4,500 [cubits] [2.4 kilometers]; also in 48:30, 32, 33, 34.
  - type: text
    content: ' on each side—north, south, east, and west. '
  '17':
  - type: text
    content: Open lands will surround the city for 150 yards
  - type: note
    content: Hebrew 250 [cubits] [133 meters].
  - type: text
    content: ' in every direction. '
  '18':
  - type: text
    content: Outside the city there will be a farming area that stretches 3-1/3 miles to the east and 3-1/3 miles to the west
  - type: note
    content: Hebrew 10,000 [cubits] [5.3 kilometers] to the east and 10,000 [cubits] to the west.
  - type: text
    content: ' along the border of the sacred area. This farmland will produce food for the people working in the city. '
  '19':
  - type: text
    content: 'Those who come from the various tribes to work in the city may farm it. '
  '2':
  - type: text
    content: '“Asher’s territory lies south of Dan’s and also extends from east to west. '
  '20':
  - type: text
    content: This entire area—including the sacred lands and the city—is a square that measures 8-1/3 miles
  - type: note
    content: Hebrew 25,000 [cubits] [13.3 kilometers]; also in 48:21.
  - type: text
    content: ' on each side.'
  '21':
  - type: text
    content: '“The areas that remain, to the east and to the west of the sacred lands and the city, will belong to the prince. Each of these areas will be 8-1/3 miles wide, extending in opposite directions to the eastern and western borders of Israel, with the sacred lands and the sanctuary of the Temple in the center. '
  '22':
  - type: text
    content: So the prince’s land will include everything between the territories allotted to Judah and Benjamin, except for the areas set aside for the sacred lands and the city.
  '23':
  - type: text
    content: '“These are the territories allotted to the rest of the tribes. Benjamin’s territory lies just south of the prince’s lands, and it extends across the entire land of Israel from east to west. '
  '24':
  - type: text
    content: 'South of Benjamin’s territory lies that of Simeon, also extending across the land from east to west. '
  '25':
  - type: text
    content: Next is the territory of Issachar with the same eastern and western boundaries.
  '26':
  - type: text
    content: '“Then comes the territory of Zebulun, which also extends across the land from east to west. '
  '27':
  - type: text
    content: 'The territory of Gad is just south of Zebulun with the same borders to the east and west. '
  '28':
  - type: text
    content: The southern border of Gad runs from Tamar to the waters of Meribah at Kadesh
  - type: note
    content: Hebrew waters of Meribath-kadesh.
  - type: text
    content: ' and then follows the Brook of Egypt to the Mediterranean.'
  - type: note
    content: Hebrew the Great Sea.
  '29':
  - type: text
    content: '“These are the allotments that will be set aside for each tribe’s exclusive possession. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  - type: heading
    content: The Gates of the City
  '3':
  - type: text
    content: 'Naphtali’s land lies south of Asher’s, also extending from east to west. '
  '30':
  - type: text
    content: '“These will be the exits to the city: On the north wall, which is 1-1/2 miles long, '
  '31':
  - type: text
    content: 'there will be three gates, each one named after a tribe of Israel. The first will be named for Reuben, the second for Judah, and the third for Levi. '
  '32':
  - type: text
    content: 'On the east wall, also 1-1/2 miles long, the gates will be named for Joseph, Benjamin, and Dan. '
  '33':
  - type: text
    content: 'The south wall, also 1-1/2 miles long, will have gates named for Simeon, Issachar, and Zebulun. '
  '34':
  - type: text
    content: And on the west wall, also 1-1/2 miles long, the gates will be named for Gad, Asher, and Naphtali.
  '35':
  - type: text
    content: “The distance around the entire city will be 6 miles.
  - type: note
    content: Hebrew 18,000 [cubits] [9.6 kilometers].
  - type: text
    content: ' And from that day the name of the city will be ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' Is There.’'
  - type: note
    content: Hebrew Yahweh Shammah.
  - type: text
    content: ”
  '4':
  - type: text
    content: 'Then comes Manasseh south of Naphtali, and its territory also extends from east to west. '
  '5':
  - type: text
    content: 'South of Manasseh is Ephraim, '
  '6':
  - type: text
    content: 'and then Reuben, '
  '7':
  - type: text
    content: and then Judah, all of whose boundaries extend from east to west.
  '8':
  - type: text
    content: “South of Judah is the land set aside for a special purpose. It will be 8-1/3 miles
  - type: note
    content: Hebrew 25,000 [cubits] [13.3 kilometers].
  - type: text
    content: ' wide and will extend as far east and west as the tribal territories, with the Temple at the center.'
  '9':
  - type: text
    content: '“The area set aside for the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple will be 8-1/3 miles long and 6-2/3 miles wide.
  - type: note
    content: 'As in one Greek manuscript and the Greek reading in 45:1: 25,000 [cubits] [13.3 kilometers] long and 20,000 [cubits] [10.6 kilometers] wide; Hebrew reads 25,000 [cubits] long and 10,000 [cubits] [3-1/3 miles or 5.3 kilometers] wide. Similarly in 48:13b. Compare 45:1-5; 48:10-13.'
  - type: text
    content: ' '
