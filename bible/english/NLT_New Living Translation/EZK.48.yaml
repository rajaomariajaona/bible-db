document_id: EZK.48
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Division of the Land
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Here is the list of the tribes of Israel and the territory each is to receive. The territory of Dan is in the extreme north. Its boundary line follows the Hethlon road to Lebo-hamath and then runs on to Hazar-enan on the border of Damascus, with Hamath to the north. Dan’s territory extends all the way across the land of Israel from east to west.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Asher’s territory lies south of Dan’s and also extends from east to west. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Naphtali’s land lies south of Asher’s, also extending from east to west. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then comes Manasseh south of Naphtali, and its territory also extends from east to west. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'South of Manasseh is Ephraim, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and then Reuben, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: and then Judah, all of whose boundaries extend from east to west.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “South of Judah is the land set aside for a special purpose. It will be 8-1/3 miles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '25,000 [cubits] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[13.3 kilometers].'
    marker-yv: yv-n
  - type: text
    text: ' wide and will extend as far east and west as the tribal territories, with the Temple at the center.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“The area set aside for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple will be 8-1/3 miles long and 6-2/3 miles wide.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in one Greek manuscript and the Greek reading in 45:1: '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '25,000 [cubits] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[13.3 kilometers] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'long and 20,000 [cubits] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[10.6 kilometers] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'wide; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '25,000 [cubits] long and 10,000 [cubits] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3-1/3 miles or 5.3 kilometers] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'wide. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Similarly in 48:13b. Compare 45:1-5; 48:10-13.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For the priests there will be a strip of land measuring 8-1/3 miles long by 3-1/3 miles wide,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '25,000 [cubits] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[13.3 kilometers] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'long by 10,000 [cubits] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[5.3 kilometers] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'wide; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 48:13a.
    marker-yv: yv-n
  - type: text
    text: ' with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple at the center. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'This area is set aside for the ordained priests, the descendants of Zadok who served me faithfully and did not go astray with the people of Israel and the rest of the Levites. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It will be their special portion when the land is distributed, the most sacred land of all. Next to the priests’ territory will lie the land where the other Levites will live.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “The land allotted to the Levites will be the same size and shape as that belonging to the priests—8-1/3 miles long and 3-1/3 miles wide. Together these portions of land will measure 8-1/3 miles long by 6-2/3 miles wide.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note on 48:9.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'None of this special land may ever be sold or traded or used by others, for it belongs to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ; it is set apart as holy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “An additional strip of land 8-1/3 miles long by 1-2/3 miles wide,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '25,000 [cubits] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[13.3 kilometers] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'long by 5,000 [cubits] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2.65 kilometers] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: wide.
    marker-yv: yv-n
  - type: text
    text: ' south of the sacred Temple area, will be allotted for public use—homes, pasturelands, and common lands, with a city at the center. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The city will measure 1-1/2 miles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '4,500 [cubits] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2.4 kilometers]; also in 48:30, 32, 33, 34.'
    marker-yv: yv-n
  - type: text
    text: ' on each side—north, south, east, and west. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Open lands will surround the city for 150 yards
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '250 [cubits] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[133 meters].'
    marker-yv: yv-n
  - type: text
    text: ' in every direction. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Outside the city there will be a farming area that stretches 3-1/3 miles to the east and 3-1/3 miles to the west
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '10,000 [cubits] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[5.3 kilometers] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to the east and 10,000 [cubits] to the west.
    marker-yv: yv-n
  - type: text
    text: ' along the border of the sacred area. This farmland will produce food for the people working in the city. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Those who come from the various tribes to work in the city may farm it. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: This entire area—including the sacred lands and the city—is a square that measures 8-1/3 miles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '25,000 [cubits] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[13.3 kilometers]; also in 48:21.'
    marker-yv: yv-n
  - type: text
    text: ' on each side.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“The areas that remain, to the east and to the west of the sacred lands and the city, will belong to the prince. Each of these areas will be 8-1/3 miles wide, extending in opposite directions to the eastern and western borders of Israel, with the sacred lands and the sanctuary of the Temple in the center. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: So the prince’s land will include everything between the territories allotted to Judah and Benjamin, except for the areas set aside for the sacred lands and the city.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“These are the territories allotted to the rest of the tribes. Benjamin’s territory lies just south of the prince’s lands, and it extends across the entire land of Israel from east to west. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'South of Benjamin’s territory lies that of Simeon, also extending across the land from east to west. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Next is the territory of Issachar with the same eastern and western boundaries.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“Then comes the territory of Zebulun, which also extends across the land from east to west. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The territory of Gad is just south of Zebulun with the same borders to the east and west. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The southern border of Gad runs from Tamar to the waters of Meribah at Kadesh
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:28a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: waters of Meribath-kadesh.
    marker-yv: yv-n
  - type: text
    text: ' and then follows the Brook of Egypt to the Mediterranean.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:28b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Great Sea.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“These are the allotments that will be set aside for each tribe’s exclusive possession. I, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Gates of the City
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“These will be the exits to the city: On the north wall, which is 1-1/2 miles long, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'there will be three gates, each one named after a tribe of Israel. The first will be named for Reuben, the second for Judah, and the third for Levi. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'On the east wall, also 1-1/2 miles long, the gates will be named for Joseph, Benjamin, and Dan. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The south wall, also 1-1/2 miles long, will have gates named for Simeon, Issachar, and Zebulun. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: And on the west wall, also 1-1/2 miles long, the gates will be named for Gad, Asher, and Naphtali.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “The distance around the entire city will be 6 miles.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:35a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '18,000 [cubits] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[9.6 kilometers].'
    marker-yv: yv-n
  - type: text
    text: ' And from that day the name of the city will be ‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Is There.’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:35b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Yahweh Shammah.
    marker-yv: yv-n
  - type: text
    text: ”
