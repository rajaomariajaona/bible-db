document_id: JOS.22,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Eastern Tribes Return Home
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Joshua called together the tribes of Reuben, Gad, and the half-tribe of Manasseh. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: But while they were still in Canaan, and when they came to a place called Geliloth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'to the circle of stones; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly in 22:11.
      marker-yv: yv-n
    - type: text
      text: ' near the Jordan River, the men of Reuben, Gad, and the half-tribe of Manasseh stopped to build a large and imposing altar.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The rest of Israel heard that the people of Reuben, Gad, and the half-tribe of Manasseh had built an altar at Geliloth at the edge of the land of Canaan, on the west side of the Jordan River. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So the whole community of Israel gathered at Shiloh and prepared to go to war against them. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'First, however, they sent a delegation led by Phinehas son of Eleazar, the priest, to talk with the tribes of Reuben, Gad, and the half-tribe of Manasseh. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: In this delegation were ten leaders of Israel, one from each of the ten tribes, and each the head of his family within the clans of Israel.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'When they arrived in the land of Gilead, they said to the tribes of Reuben, Gad, and the half-tribe of Manasseh, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“The whole community of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' demands to know why you are betraying the God of Israel. How could you turn away from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and build an altar for yourselves in rebellion against him? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Was our sin at Peor not enough? To this day we are not fully cleansed of it, even after the plague that struck the entire community of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And yet today you are turning away from following the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. If you rebel against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' today, he will be angry with all of us tomorrow.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“If you need the altar because the land you possess is defiled, then join us in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s land, where the Tabernacle of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is situated, and share our land with us. But do not rebel against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' or against us by building an altar other than the one true altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He told them, “You have done as Moses, the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', commanded you, and you have obeyed every order I have given you. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Didn’t divine anger fall on the entire community of Israel when Achan, a member of the clan of Zerah, sinned by stealing the things set apart for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', either by destroying them or by giving them as an offering.'
      marker-yv: yv-n
    - type: text
      text: '? He was not the only one who died because of his sin.”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then the people of Reuben, Gad, and the half-tribe of Manasseh answered the heads of the clans of Israel: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the Mighty One, is God! The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the Mighty One, is God! He knows the truth, and may Israel know it, too! We have not built the altar in treacherous rebellion against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. If we have done so, do not spare our lives this day. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'If we have built an altar for ourselves to turn away from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' or to offer burnt offerings or grain offerings or peace offerings, may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'Lord '
    - type: text
      text: himself punish us.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“The truth is, we have built this altar because we fear that in the future your descendants will say to ours, ‘What right do you have to worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has placed the Jordan River as a barrier between our people and you people of Reuben and Gad. You have no claim to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.’ So your descendants may prevent our descendants from worshiping the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“So we decided to build the altar, not for burnt offerings or sacrifices, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'but as a memorial. It will remind our descendants and your descendants that we, too, have the right to worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at his sanctuary with our burnt offerings, sacrifices, and peace offerings. Then your descendants will not be able to say to ours, ‘You have no claim to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .’
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '“If they say this, our descendants can reply, ‘Look at this copy of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s altar that our ancestors made. It is not for burnt offerings or sacrifices; it is a reminder of the relationship both of us have with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Far be it from us to rebel against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' or turn away from him by building our own altar for burnt offerings, grain offerings, or sacrifices. Only the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God that stands in front of the Tabernacle may be used for that purpose.”'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'During all this time you have not deserted the other tribes. You have been careful to obey the commands of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God right up to the present day. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'When Phinehas the priest and the leaders of the community—the heads of the clans of Israel—heard this from the tribes of Reuben, Gad, and the half-tribe of Manasseh, they were satisfied. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Phinehas son of Eleazar, the priest, replied to them, “Today we know the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is among us because you have not committed this treachery against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as we thought. Instead, you have rescued Israel from being destroyed by the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Then Phinehas son of Eleazar, the priest, and the other leaders left the tribes of Reuben and Gad in Gilead and returned to the land of Canaan to tell the Israelites what had happened. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: And all the Israelites were satisfied and praised God and spoke no more of war against Reuben and Gad.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: The people of Reuben and Gad named the altar “Witness,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts lack this word.
      marker-yv: yv-n
    - type: text
      text: ' for they said, “It is a witness between us and them that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is our God, too.”'
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has given the other tribes rest, as he promised them. So go back home to the land that Moses, the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', gave you as your possession on the east side of the Jordan River. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But be very careful to obey all the commands and the instructions that Moses gave to you. Love the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, walk in all his ways, obey his commands, hold firmly to him, and serve him with all your heart and all your soul.” '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: So Joshua blessed them and sent them away, and they went home.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Moses had given the land of Bashan, east of the Jordan River, to the half-tribe of Manasseh. (The other half of the tribe was given land west of the Jordan.) As Joshua sent them away and blessed them, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: he said to them, “Go back to your homes with the great wealth you have taken from your enemies—the vast herds of livestock, the silver, gold, bronze, and iron, and the large supply of clothing. Share the plunder with your relatives.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So the men of Reuben, Gad, and the half-tribe of Manasseh left the rest of Israel at Shiloh in the land of Canaan. They started the journey back to their own land of Gilead, the territory that belonged to them according to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s command through Moses.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Eastern Tribes Build an Altar
    marker-yv: yv-h
