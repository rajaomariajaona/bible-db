    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Joash, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoash.
    marker-yv: yv-n
  - type: text
    text: ' was king of Israel.'
