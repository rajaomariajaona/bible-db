document_id: AMO.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This message was given to Amos, a shepherd from the town of Tekoa in Judah. He received this message in visions two years before the earthquake, when Uzziah was king of Judah and Jeroboam II, the son of Jehoash,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Joash, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Jehoash.
      marker-yv: yv-n
    - type: text
      text: ' was king of Israel.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I will send down fire on the walls of Tyre,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all its fortresses will be destroyed.”
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The people of Edom have sinned again and again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will not let them go unpunished!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They chased down their relatives, the Israelites, with swords,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: showing them no mercy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In their rage, they slashed them continually
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and were unrelenting in their anger.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I will send down fire on Teman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the fortresses of Bozrah will be destroyed.”
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The people of Ammon have sinned again and again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will not let them go unpunished!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they attacked Gilead to extend their borders,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they ripped open pregnant women with their swords.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I will send down fire on the walls of Rabbah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all its fortresses will be destroyed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The battle will come upon them with shouts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a whirlwind in a mighty storm.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their king
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'malcam, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: possibly referring to their god Molech.
      marker-yv: yv-n
    - type: text
      text: ' and his princes will go into exile together,”'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what he saw and heard:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s voice will roar from Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and thunder from Jerusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lush pastures of the shepherds will dry up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the grass on Mount Carmel will wither and die.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Judgment on Israel’s Neighbors
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The people of Damascus have sinned again and again,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'have committed three sins, even four; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 1:6, 9, 11, 13.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will not let them go unpunished!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They beat down my people in Gilead
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as grain is threshed with iron sledges.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I will send down fire on King Hazael’s palace,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the fortresses of King Ben-hadad will be destroyed.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will break down the gates of Damascus
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and slaughter the people in the valley of Aven.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will destroy the ruler in Beth-eden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the people of Aram will go as captives to Kir,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The people of Gaza have sinned again and again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will not let them go unpunished!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sent whole villages into exile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: selling them as slaves to Edom.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I will send down fire on the walls of Gaza,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all its fortresses will be destroyed.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will slaughter the people of Ashdod
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroy the king of Ashkelon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I will turn to attack Ekron,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the few Philistines still left will be killed,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The people of Tyre have sinned again and again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will not let them go unpunished!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They broke their treaty of brotherhood with Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: selling whole villages as slaves to Edom.
