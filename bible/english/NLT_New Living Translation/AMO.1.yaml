document_id: AMO.1,116
type_code: eng
verses:
  '1':
  - type: text
    content: This message was given to Amos, a shepherd from the town of Tekoa in Judah. He received this message in visions two years before the earthquake, when Uzziah was king of Judah and Jeroboam II, the son of Jehoash,
  - type: note
    content: Hebrew Joash, a variant spelling of Jehoash.
  - type: text
    content: ' was king of Israel.'
  '10':
  - type: text
    content: So I will send down fire on the walls of Tyre,
  - type: text
    content: and all its fortresses will be destroyed.”
  '11':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “The people of Edom have sinned again and again,
  - type: text
    content: and I will not let them go unpunished!
  - type: text
    content: They chased down their relatives, the Israelites, with swords,
  - type: text
    content: showing them no mercy.
  - type: text
    content: In their rage, they slashed them continually
  - type: text
    content: and were unrelenting in their anger.
  '12':
  - type: text
    content: So I will send down fire on Teman,
  - type: text
    content: and the fortresses of Bozrah will be destroyed.”
  '13':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “The people of Ammon have sinned again and again,
  - type: text
    content: and I will not let them go unpunished!
  - type: text
    content: When they attacked Gilead to extend their borders,
  - type: text
    content: they ripped open pregnant women with their swords.
  '14':
  - type: text
    content: So I will send down fire on the walls of Rabbah,
  - type: text
    content: and all its fortresses will be destroyed.
  - type: text
    content: The battle will come upon them with shouts,
  - type: text
    content: like a whirlwind in a mighty storm.
  '15':
  - type: text
    content: And their king
  - type: note
    content: Hebrew malcam, possibly referring to their god Molech.
  - type: text
    content: ' and his princes will go into exile together,”'
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: 'This is what he saw and heard:'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ’s voice will roar from Zion
  - type: text
    content: and thunder from Jerusalem!
  - type: text
    content: The lush pastures of the shepherds will dry up;
  - type: text
    content: the grass on Mount Carmel will wither and die.”
  - type: heading
    content: God’s Judgment on Israel’s Neighbors
  '3':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “The people of Damascus have sinned again and again,
  - type: note
    content: Hebrew have committed three sins, even four; also in 1:6, 9, 11, 13.
  - type: text
    content: and I will not let them go unpunished!
  - type: text
    content: They beat down my people in Gilead
  - type: text
    content: as grain is threshed with iron sledges.
  '4':
  - type: text
    content: So I will send down fire on King Hazael’s palace,
  - type: text
    content: and the fortresses of King Ben-hadad will be destroyed.
  '5':
  - type: text
    content: I will break down the gates of Damascus
  - type: text
    content: and slaughter the people in the valley of Aven.
  - type: text
    content: I will destroy the ruler in Beth-eden,
  - type: text
    content: and the people of Aram will go as captives to Kir,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “The people of Gaza have sinned again and again,
  - type: text
    content: and I will not let them go unpunished!
  - type: text
    content: They sent whole villages into exile,
  - type: text
    content: selling them as slaves to Edom.
  '7':
  - type: text
    content: So I will send down fire on the walls of Gaza,
  - type: text
    content: and all its fortresses will be destroyed.
  '8':
  - type: text
    content: I will slaughter the people of Ashdod
  - type: text
    content: and destroy the king of Ashkelon.
  - type: text
    content: Then I will turn to attack Ekron,
  - type: text
    content: and the few Philistines still left will be killed,”
  - type: text
    content: 'says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “The people of Tyre have sinned again and again,
  - type: text
    content: and I will not let them go unpunished!
  - type: text
    content: They broke their treaty of brotherhood with Israel,
  - type: text
    content: selling whole villages as slaves to Edom.
