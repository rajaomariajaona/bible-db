document_id: AMO.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Vision of Ripe Fruit
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' showed me another vision. In it I saw a basket filled with ripe fruit. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will turn your celebrations into times of mourning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your singing into weeping.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will wear funeral clothes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shave your heads to show your sorrow—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as if your only son had died.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How very bitter that day will be!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The time is surely coming,” says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “when I will send a famine on the land—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: not a famine of bread or water
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but of hearing the words of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People will stagger from sea to sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wander from border to border
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from north to east.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'searching for the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they will not find it.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beautiful girls and strong young men
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will grow faint in that day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'thirsting for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s word.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And those who swear by the shameful idols of Samaria—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who take oaths in the name of the god of Dan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make vows in the name of the god of Beersheba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the way of Beersheba.
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will all fall down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never to rise again.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “What do you see, Amos?” he asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: I replied, “A basket full of ripe fruit.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “Like this fruit, Israel is ripe for punishment! I will not delay their punishment again. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day the singing in the temple will turn to wailing. Dead bodies will be scattered everywhere. They will be carried out of the city in silence. I, the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!”'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to this, you who rob the poor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and trample down the needy!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You can’t wait for the Sabbath day to be over
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the religious festivals to end
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so you can get back to cheating the helpless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You measure out grain with dishonest measures
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cheat the buyer with dishonest scales.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'You make the ephah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[a unit for measuring grain] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'small and the shekel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[a unit of weight] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: great, and you deal falsely by using deceitful balances.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you mix the grain you sell
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with chaff swept from the floor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you enslave poor people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for one piece of silver or a pair of sandals.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sworn this oath'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by his own name, the Pride of Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the pride of Jacob. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 3:13.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will never forget
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wicked things you have done!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth will tremble for your deeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and everyone will mourn.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ground will rise like the Nile River at floodtime;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will heave up, then sink again.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“In that day,” says the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will make the sun go down at noon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and darken the earth while it is still day.
