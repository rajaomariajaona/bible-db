document_id: AMO.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Vision of Ripe Fruit
  - type: text
    content: 'Then the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' showed me another vision. In it I saw a basket filled with ripe fruit. '
  '10':
  - type: text
    content: I will turn your celebrations into times of mourning
  - type: text
    content: and your singing into weeping.
  - type: text
    content: You will wear funeral clothes
  - type: text
    content: and shave your heads to show your sorrow—
  - type: text
    content: as if your only son had died.
  - type: text
    content: How very bitter that day will be!
  '11':
  - type: text
    content: '“The time is surely coming,” says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “when I will send a famine on the land—
  - type: text
    content: not a famine of bread or water
  - type: text
    content: 'but of hearing the words of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: People will stagger from sea to sea
  - type: text
    content: and wander from border to border
  - type: note
    content: Hebrew from north to east.
  - type: text
    content: 'searching for the word of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: but they will not find it.
  '13':
  - type: text
    content: Beautiful girls and strong young men
  - type: text
    content: will grow faint in that day,
  - type: text
    content: 'thirsting for the '
  - type: text
    content: Lord
  - type: text
    content: ’s word.
  '14':
  - type: text
    content: And those who swear by the shameful idols of Samaria—
  - type: text
    content: who take oaths in the name of the god of Dan
  - type: text
    content: and make vows in the name of the god of Beersheba
  - type: note
    content: Hebrew the way of Beersheba.
  - type: text
    content: —
  - type: text
    content: they will all fall down,
  - type: text
    content: never to rise again.”
  '2':
  - type: text
    content: “What do you see, Amos?” he asked.
  - type: text
    content: I replied, “A basket full of ripe fruit.”
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Like this fruit, Israel is ripe for punishment! I will not delay their punishment again. '
  '3':
  - type: text
    content: 'In that day the singing in the temple will turn to wailing. Dead bodies will be scattered everywhere. They will be carried out of the city in silence. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '4':
  - type: text
    content: Listen to this, you who rob the poor
  - type: text
    content: and trample down the needy!
  '5':
  - type: text
    content: You can’t wait for the Sabbath day to be over
  - type: text
    content: and the religious festivals to end
  - type: text
    content: so you can get back to cheating the helpless.
  - type: text
    content: You measure out grain with dishonest measures
  - type: text
    content: and cheat the buyer with dishonest scales.
  - type: note
    content: Hebrew You make the ephah [a unit for measuring grain] small and the shekel [a unit of weight] great, and you deal falsely by using deceitful balances.
  '6':
  - type: text
    content: And you mix the grain you sell
  - type: text
    content: with chaff swept from the floor.
  - type: text
    content: Then you enslave poor people
  - type: text
    content: for one piece of silver or a pair of sandals.
  '7':
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' has sworn this oath'
  - type: text
    content: by his own name, the Pride of Israel
  - type: note
    content: Hebrew the pride of Jacob. See note on 3:13.
  - type: text
    content: ':'
  - type: text
    content: “I will never forget
  - type: text
    content: the wicked things you have done!
  '8':
  - type: text
    content: The earth will tremble for your deeds,
  - type: text
    content: and everyone will mourn.
  - type: text
    content: The ground will rise like the Nile River at floodtime;
  - type: text
    content: it will heave up, then sink again.
  '9':
  - type: text
    content: '“In that day,” says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “I will make the sun go down at noon
  - type: text
    content: and darken the earth while it is still day.
