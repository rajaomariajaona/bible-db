document_id: LEV.26,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Blessings for Obedience
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“Do not make idols or set up carved images, or sacred pillars, or sculptured stones in your land so you may worship them. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'You will have such a surplus of crops that you will need to clear out the old grain to make room for the new harvest! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I will live among you, and I will not despise you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I will walk among you; I will be your God, and you will be my people. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, who brought you out of the land of Egypt so you would no longer be their slaves. I broke the yoke of slavery from your neck so you can walk with your heads held high.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Punishments for Disobedience
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“However, if you do not listen to me or obey all these commands, '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and if you break my covenant by rejecting my decrees, treating my regulations with contempt, and refusing to obey my commands, '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'I will punish you. I will bring sudden terrors upon you—wasting diseases and burning fevers that will cause your eyes to fail and your life to ebb away. You will plant your crops in vain because your enemies will eat them. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I will turn against you, and you will be defeated by your enemies. Those who hate you will rule over you, and you will run even when no one is chasing you!
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“And if, in spite of all this, you still disobey me, I will punish you seven times over for your sins. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'I will break your proud spirit by making the skies as unyielding as iron and the earth as hard as bronze. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'You must keep my Sabbath days of rest and show reverence for my sanctuary. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: All your work will be for nothing, for your land will yield no crops, and your trees will bear no fruit.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“If even then you remain hostile toward me and refuse to obey me, I will inflict disaster on you seven times over for your sins. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: I will send wild animals that will rob you of your children and destroy your livestock. Your numbers will dwindle, and your roads will be deserted.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“And if you fail to learn the lesson and continue your hostility toward me, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'then I myself will be hostile toward you. I will personally strike you with calamity seven times over for your sins. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'I will send armies against you to carry out the curse of the covenant you have broken. When you run to your towns for safety, I will send a plague to destroy you there, and you will be handed over to your enemies. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: I will destroy your food supply, so that ten women will need only one oven to bake bread for their families. They will ration your food by weight, and though you have food to eat, you will not be satisfied.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“If in spite of all this you still refuse to listen and still remain hostile toward me, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'then I will give full vent to my hostility. I myself will punish you seven times over for your sins. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then you will eat the flesh of your own sons and daughters. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“If you follow my decrees and are careful to obey my commands, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: I will destroy your pagan shrines and knock down your places of worship. I will leave your lifeless corpses piled on top of your lifeless idols,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term (literally '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: round things
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) probably alludes to dung.
      marker-yv: yv-n
    - type: text
      text: ' and I will despise you. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'I will make your cities desolate and destroy your places of pagan worship. I will take no pleasure in your offerings that should be a pleasing aroma to me. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Yes, I myself will devastate your land, and your enemies who come to occupy it will be appalled at what they see. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'I will scatter you among the nations and bring out my sword against you. Your land will become desolate, and your cities will lie in ruins. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Then at last the land will enjoy its neglected Sabbath years as it lies desolate while you are in exile in the land of your enemies. Then the land will finally rest and enjoy the Sabbaths it missed. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: As long as the land lies in ruins, it will enjoy the rest you never allowed it to take every seventh year while you lived in it.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: '“And for those of you who survive, I will demoralize you in the land of your enemies. You will live in such fear that the sound of a leaf driven by the wind will send you fleeing. You will run as though fleeing from a sword, and you will fall even when no one pursues you. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Though no one is chasing you, you will stumble over each other as though fleeing from a sword. You will have no power to stand up against your enemies. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'You will die among the foreign nations and be devoured in the land of your enemies. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Those of you who survive will waste away in your enemies’ lands because of their sins and the sins of their ancestors.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I will send you the seasonal rains. The land will then yield its crops, and the trees of the field will produce their fruit. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: '“But at last my people will confess their sins and the sins of their ancestors for betraying me and being hostile toward me. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'When I have turned their hostility back on them and brought them to the land of their enemies, then at last their stubborn hearts will be humbled, and they will pay for their sins. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Then I will remember my covenant with Jacob and my covenant with Isaac and my covenant with Abraham, and I will remember the land. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: For the land must be abandoned to enjoy its years of Sabbath rest as it lies deserted. At last the people will pay for their sins, for they have continually rejected my regulations and despised my decrees.
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: '“But despite all this, I will not utterly reject or despise them while they are in exile in the land of their enemies. I will not cancel my covenant with them by wiping them out, for I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'For their sakes I will remember my ancient covenant with their ancestors, whom I brought out of the land of Egypt in the sight of all the nations, that I might be their God. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'These are the decrees, regulations, and instructions that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave through Moses on Mount Sinai as evidence of the relationship between himself and the Israelites.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Your threshing season will overlap with the grape harvest, and your grape harvest will overlap with the season of planting grain. You will eat your fill and live securely in your own land.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“I will give you peace in the land, and you will be able to sleep with no cause for fear. I will rid the land of wild animals and keep your enemies out of your land. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In fact, you will chase down your enemies and slaughter them with your swords. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Five of you will chase a hundred, and a hundred of you will chase ten thousand! All your enemies will fall beneath your sword.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“I will look favorably upon you, making you fertile and multiplying your people. And I will fulfill my covenant with you. '
