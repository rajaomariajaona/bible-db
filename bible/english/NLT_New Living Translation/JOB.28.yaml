document_id: JOB.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job Speaks of Wisdom and Understanding
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “People know where to mine silver
- type: usfm
  marker: q2
  children:
  - type: text
    text: and how to refine gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They know where to dig iron from the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and how to smelt copper from rock.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They know how to shine light in the darkness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and explore the farthest regions of the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they search in the dark for ore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They sink a mine shaft into the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: far from where anyone lives.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They descend on ropes, swinging back and forth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Food is grown on the earth above,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but down below, the earth is melted as by fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Here the rocks contain precious lapis lazuli,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the dust contains gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: These are treasures no bird of prey can see,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no falcon’s eye observe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: No wild animal has walked upon these treasures;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no lion has ever set his paw there.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: People know how to tear apart flinty rocks
- type: usfm
  marker: q2
  children:
  - type: text
    text: and overturn the roots of mountains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They cut tunnels in the rocks
- type: usfm
  marker: q2
  children:
  - type: text
    text: and uncover precious stones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They dam up the trickling streams
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring to light the hidden treasures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “But do people know where to find wisdom?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where can they find understanding?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: No one knows where to find it,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: knows its value.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: for it is not found among the living.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ‘It is not here,’ says the ocean.
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Nor is it here,’ says the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: It cannot be bought with gold.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It cannot be purchased with silver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: It’s worth more than all the gold of Ophir,
- type: usfm
  marker: q2
  children:
  - type: text
    text: greater than precious onyx or lapis lazuli.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Wisdom is more valuable than gold and crystal.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It cannot be purchased with jewels mounted in fine gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Coral and jasper are worthless in trying to get it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The price of wisdom is far above rubies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Precious peridot from Ethiopia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from Cush.
    marker-yv: yv-n
  - type: text
    text: ' cannot be exchanged for it.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s worth more than the purest gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “But do people know where to find wisdom?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where can they find understanding?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: It is hidden from the eyes of all humanity.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even the sharp-eyed birds in the sky cannot discover it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Destruction
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Abaddon.
    marker-yv: yv-n
  - type: text
    text: ' and Death say,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘We’ve heard only rumors of where wisdom can be found.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “God alone understands the way to wisdom;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he knows where it can be found,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: for he looks throughout the whole earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sees everything under the heavens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: He decided how hard the winds should blow
- type: usfm
  marker: q2
  children:
  - type: text
    text: and how much rain should fall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He made the laws for the rain
- type: usfm
  marker: q2
  children:
  - type: text
    text: and laid out a path for the lightning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then he saw wisdom and evaluated it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He set it in place and examined it thoroughly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And this is what he says to all humanity:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘The fear of the Lord is true wisdom;
- type: usfm
  marker: q2
  children:
  - type: text
    text: to forsake evil is real understanding.’”
