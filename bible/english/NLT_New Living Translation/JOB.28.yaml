document_id: JOB.28,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job Speaks of Wisdom and Understanding
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “People know where to mine silver
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and how to refine gold.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They cut tunnels in the rocks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and uncover precious stones.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They dam up the trickling streams
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bring to light the hidden treasures.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But do people know where to find wisdom?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Where can they find understanding?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one knows where to find it,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: knows its value.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for it is not found among the living.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘It is not here,’ says the ocean.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Nor is it here,’ says the sea.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It cannot be bought with gold.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It cannot be purchased with silver.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s worth more than all the gold of Ophir,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: greater than precious onyx or lapis lazuli.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom is more valuable than gold and crystal.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It cannot be purchased with jewels mounted in fine gold.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Coral and jasper are worthless in trying to get it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The price of wisdom is far above rubies.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Precious peridot from Ethiopia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from Cush.
      marker-yv: yv-n
    - type: text
      text: ' cannot be exchanged for it.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s worth more than the purest gold.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They know where to dig iron from the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and how to smelt copper from rock.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But do people know where to find wisdom?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Where can they find understanding?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is hidden from the eyes of all humanity.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even the sharp-eyed birds in the sky cannot discover it.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Destruction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abaddon.
      marker-yv: yv-n
    - type: text
      text: ' and Death say,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘We’ve heard only rumors of where wisdom can be found.’
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “God alone understands the way to wisdom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he knows where it can be found,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he looks throughout the whole earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sees everything under the heavens.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He decided how hard the winds should blow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and how much rain should fall.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made the laws for the rain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and laid out a path for the lightning.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he saw wisdom and evaluated it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He set it in place and examined it thoroughly.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And this is what he says to all humanity:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘The fear of the Lord is true wisdom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to forsake evil is real understanding.’”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They know how to shine light in the darkness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and explore the farthest regions of the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they search in the dark for ore.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sink a mine shaft into the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: far from where anyone lives.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They descend on ropes, swinging back and forth.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Food is grown on the earth above,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but down below, the earth is melted as by fire.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Here the rocks contain precious lapis lazuli,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the dust contains gold.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These are treasures no bird of prey can see,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no falcon’s eye observe.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No wild animal has walked upon these treasures;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no lion has ever set his paw there.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People know how to tear apart flinty rocks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and overturn the roots of mountains.
