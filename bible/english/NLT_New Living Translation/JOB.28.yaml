document_id: JOB.28,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Speaks of Wisdom and Understanding
  - type: text
    content: “People know where to mine silver
  - type: text
    content: and how to refine gold.
  '10':
  - type: text
    content: They cut tunnels in the rocks
  - type: text
    content: and uncover precious stones.
  '11':
  - type: text
    content: They dam up the trickling streams
  - type: text
    content: and bring to light the hidden treasures.
  '12':
  - type: text
    content: “But do people know where to find wisdom?
  - type: text
    content: Where can they find understanding?
  '13':
  - type: text
    content: No one knows where to find it,
  - type: note
    content: As in Greek version; Hebrew reads knows its value.
  - type: text
    content: for it is not found among the living.
  '14':
  - type: text
    content: ‘It is not here,’ says the ocean.
  - type: text
    content: ‘Nor is it here,’ says the sea.
  '15':
  - type: text
    content: It cannot be bought with gold.
  - type: text
    content: It cannot be purchased with silver.
  '16':
  - type: text
    content: It’s worth more than all the gold of Ophir,
  - type: text
    content: greater than precious onyx or lapis lazuli.
  '17':
  - type: text
    content: Wisdom is more valuable than gold and crystal.
  - type: text
    content: It cannot be purchased with jewels mounted in fine gold.
  '18':
  - type: text
    content: Coral and jasper are worthless in trying to get it.
  - type: text
    content: The price of wisdom is far above rubies.
  '19':
  - type: text
    content: Precious peridot from Ethiopia
  - type: note
    content: Hebrew from Cush.
  - type: text
    content: ' cannot be exchanged for it.'
  - type: text
    content: It’s worth more than the purest gold.
  '2':
  - type: text
    content: They know where to dig iron from the earth
  - type: text
    content: and how to smelt copper from rock.
  '20':
  - type: text
    content: “But do people know where to find wisdom?
  - type: text
    content: Where can they find understanding?
  '21':
  - type: text
    content: It is hidden from the eyes of all humanity.
  - type: text
    content: Even the sharp-eyed birds in the sky cannot discover it.
  '22':
  - type: text
    content: Destruction
  - type: note
    content: Hebrew Abaddon.
  - type: text
    content: ' and Death say,'
  - type: text
    content: ‘We’ve heard only rumors of where wisdom can be found.’
  '23':
  - type: text
    content: “God alone understands the way to wisdom;
  - type: text
    content: he knows where it can be found,
  '24':
  - type: text
    content: for he looks throughout the whole earth
  - type: text
    content: and sees everything under the heavens.
  '25':
  - type: text
    content: He decided how hard the winds should blow
  - type: text
    content: and how much rain should fall.
  '26':
  - type: text
    content: He made the laws for the rain
  - type: text
    content: and laid out a path for the lightning.
  '27':
  - type: text
    content: Then he saw wisdom and evaluated it.
  - type: text
    content: He set it in place and examined it thoroughly.
  '28':
  - type: text
    content: 'And this is what he says to all humanity:'
  - type: text
    content: ‘The fear of the Lord is true wisdom;
  - type: text
    content: to forsake evil is real understanding.’”
  '3':
  - type: text
    content: They know how to shine light in the darkness
  - type: text
    content: and explore the farthest regions of the earth
  - type: text
    content: as they search in the dark for ore.
  '4':
  - type: text
    content: They sink a mine shaft into the earth
  - type: text
    content: far from where anyone lives.
  - type: text
    content: They descend on ropes, swinging back and forth.
  '5':
  - type: text
    content: Food is grown on the earth above,
  - type: text
    content: but down below, the earth is melted as by fire.
  '6':
  - type: text
    content: Here the rocks contain precious lapis lazuli,
  - type: text
    content: and the dust contains gold.
  '7':
  - type: text
    content: These are treasures no bird of prey can see,
  - type: text
    content: no falcon’s eye observe.
  '8':
  - type: text
    content: No wild animal has walked upon these treasures;
  - type: text
    content: no lion has ever set his paw there.
  '9':
  - type: text
    content: People know how to tear apart flinty rocks
  - type: text
    content: and overturn the roots of mountains.
