        children:
        - type: text
          text: also in 5:29, 30.
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “So if you are presenting a sacrifice
    - type: text
      text: ' '
