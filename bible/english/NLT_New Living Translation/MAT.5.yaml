      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teaching about Adultery
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have heard the commandment that says, ‘You must not commit adultery.’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 20:14; Deut 5:18.
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I say, anyone who even looks at a woman with lust has already committed adultery with her in his heart.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So if your eye—even your good eye
    - type: usfm
