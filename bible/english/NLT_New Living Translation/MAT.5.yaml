document_id: MAT.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sermon on the Mount
  - type: text
    content: 'One day as he saw the crowds gathering, Jesus went up on the mountainside and sat down. His disciples gathered around him, '
  '10':
  - type: text
    content: ' '
  - type: text
    content: God blesses those who are persecuted for doing right,
  - type: text
    content: for the Kingdom of Heaven is theirs.
  '11':
  - type: text
    content: ' '
  - type: text
    content: “God blesses you when people mock you and persecute you and lie about you and say all sorts of evil things against you because you are my followers.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Be happy about it! Be very glad! For a great reward awaits you in heaven. And remember, the ancient prophets were persecuted in the same way.
  - type: heading
    content: Teaching about Salt and Light
  '13':
  - type: text
    content: ' '
  - type: text
    content: “You are the salt of the earth. But what good is salt if it has lost its flavor? Can you make it salty again? It will be thrown out and trampled underfoot as worthless.
  '14':
  - type: text
    content: ' '
  - type: text
    content: “You are the light of the world—like a city on a hilltop that cannot be hidden.
  - type: text
    content: ' '
  '15':
  - type: text
    content: No one lights a lamp and then puts it under a basket. Instead, a lamp is placed on a stand, where it gives light to everyone in the house.
  - type: text
    content: ' '
  '16':
  - type: text
    content: In the same way, let your good deeds shine out for all to see, so that everyone will praise your heavenly Father.
  - type: heading
    content: Teaching about the Law
  '17':
  - type: text
    content: ' '
  - type: text
    content: “Don’t misunderstand why I have come. I did not come to abolish the law of Moses or the writings of the prophets. No, I came to accomplish their purpose.
  - type: text
    content: ' '
  '18':
  - type: text
    content: I tell you the truth, until heaven and earth disappear, not even the smallest detail of God’s law will disappear until its purpose is achieved.
  - type: text
    content: ' '
  '19':
  - type: text
    content: So if you ignore the least commandment and teach others to do the same, you will be called the least in the Kingdom of Heaven. But anyone who obeys God’s laws and teaches them will be called great in the Kingdom of Heaven.
  '2':
  - type: text
    content: and he began to teach them.
  - type: heading
    content: The Beatitudes
  '20':
  - type: text
    content: ' '
  - type: text
    content: “But I warn you—unless your righteousness is better than the righteousness of the teachers of religious law and the Pharisees, you will never enter the Kingdom of Heaven!
  - type: heading
    content: Teaching about Anger
  '21':
  - type: text
    content: ' '
  - type: text
    content: “You have heard that our ancestors were told, ‘You must not murder. If you commit murder, you are subject to judgment.’
  - type: text
    content: ' '
  - type: note
    content: Exod 20:13; Deut 5:17.
  '22':
  - type: text
    content: But I say, if you are even angry with someone,
  - type: note
    content: Some manuscripts add without cause.
  - type: text
    content: ' '
  - type: text
    content: you are subject to judgment! If you call someone an idiot,
  - type: note
    content: 'Greek uses an Aramaic term of contempt: If you say to your brother, ‘Raca.’'
  - type: text
    content: ' '
  - type: text
    content: you are in danger of being brought before the court. And if you curse someone,
  - type: note
    content: Greek if you say, ‘You fool.’
  - type: text
    content: ' '
  - type: text
    content: you are in danger of the fires of hell.
  - type: note
    content: Greek Gehenna; also in 5:29, 30.
  '23':
  - type: text
    content: ' '
  - type: text
    content: “So if you are presenting a sacrifice
  - type: text
    content: ' '
  - type: note
    content: Greek gift; also in 5:24.
  - type: text
    content: at the altar in the Temple and you suddenly remember that someone has something against you,
  - type: text
    content: ' '
  '24':
  - type: text
    content: leave your sacrifice there at the altar. Go and be reconciled to that person. Then come and offer your sacrifice to God.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “When you are on the way to court with your adversary, settle your differences quickly. Otherwise, your accuser may hand you over to the judge, who will hand you over to an officer, and you will be thrown into prison.
  - type: text
    content: ' '
  '26':
  - type: text
    content: And if that happens, you surely won’t be free again until you have paid the last penny.
  - type: note
    content: Greek the last kodrantes [i.e., quadrans].
  - type: heading
    content: Teaching about Adultery
  '27':
  - type: text
    content: ' '
  - type: text
    content: “You have heard the commandment that says, ‘You must not commit adultery.’
  - type: text
    content: ' '
  - type: note
    content: Exod 20:14; Deut 5:18.
  '28':
  - type: text
    content: But I say, anyone who even looks at a woman with lust has already committed adultery with her in his heart.
  - type: text
    content: ' '
  '29':
  - type: text
    content: So if your eye—even your good eye
  - type: note
    content: Greek your right eye.
  - type: text
    content: —causes you to lust, gouge it out and throw it away. It is better for you to lose one part of your body than for your whole body to be thrown into hell.
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: text
    content: “God blesses those who are poor and realize their need for him,
  - type: note
    content: Greek poor in spirit.
  - type: text
    content: for the Kingdom of Heaven is theirs.
  '30':
  - type: text
    content: And if your hand—even your stronger hand
  - type: note
    content: Greek your right hand.
  - type: text
    content: —causes you to sin, cut it off and throw it away. It is better for you to lose one part of your body than for your whole body to be thrown into hell.
  - type: heading
    content: Teaching about Divorce
  '31':
  - type: text
    content: ' '
  - type: text
    content: “You have heard the law that says, ‘A man can divorce his wife by merely giving her a written notice of divorce.’
  - type: text
    content: ' '
  - type: note
    content: Deut 24:1.
  '32':
  - type: text
    content: But I say that a man who divorces his wife, unless she has been unfaithful, causes her to commit adultery. And anyone who marries a divorced woman also commits adultery.
  - type: heading
    content: Teaching about Vows
  '33':
  - type: text
    content: ' '
  - type: text
    content: '“You have also heard that our ancestors were told, ‘You must not break your vows; you must carry out the vows you make to the '
  - type: text
    content: Lord
  - type: text
    content: .’
  - type: text
    content: ' '
  - type: note
    content: Num 30:2.
  '34':
  - type: text
    content: But I say, do not make any vows! Do not say, ‘By heaven!’ because heaven is God’s throne.
  - type: text
    content: ' '
  '35':
  - type: text
    content: And do not say, ‘By the earth!’ because the earth is his footstool. And do not say, ‘By Jerusalem!’ for Jerusalem is the city of the great King.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Do not even say, ‘By my head!’ for you can’t turn one hair white or black.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Just say a simple, ‘Yes, I will,’ or ‘No, I won’t.’ Anything beyond this is from the evil one.
  - type: heading
    content: Teaching about Revenge
  '38':
  - type: text
    content: ' '
  - type: text
    content: '“You have heard the law that says the punishment must match the injury: ‘An eye for an eye, and a tooth for a tooth.’'
  - type: text
    content: ' '
  - type: note
    content: 'Greek the law that says: ‘An eye for an eye and a tooth for a tooth.’ Exod 21:24; Lev 24:20; Deut 19:21.'
  '39':
  - type: text
    content: But I say, do not resist an evil person! If someone slaps you on the right cheek, offer the other cheek also.
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: God blesses those who mourn,
  - type: text
    content: for they will be comforted.
  '40':
  - type: text
    content: If you are sued in court and your shirt is taken from you, give your coat, too.
  - type: text
    content: ' '
  '41':
  - type: text
    content: If a soldier demands that you carry his gear for a mile,
  - type: note
    content: Greek milion [4,854 feet or 1,478 meters].
  - type: text
    content: ' '
  - type: text
    content: carry it two miles.
  - type: text
    content: ' '
  '42':
  - type: text
    content: Give to those who ask, and don’t turn away from those who want to borrow.
  - type: heading
    content: Teaching about Love for Enemies
  '43':
  - type: text
    content: ' '
  - type: text
    content: “You have heard the law that says, ‘Love your neighbor’
  - type: text
    content: ' '
  - type: note
    content: Lev 19:18.
  - type: text
    content: and hate your enemy.
  - type: text
    content: ' '
  '44':
  - type: text
    content: But I say, love your enemies!
  - type: note
    content: Some manuscripts add Bless those who curse you. Do good to those who hate you. Compare Luke 6:27-28.
  - type: text
    content: ' '
  - type: text
    content: Pray for those who persecute you!
  - type: text
    content: ' '
  '45':
  - type: text
    content: In that way, you will be acting as true children of your Father in heaven. For he gives his sunlight to both the evil and the good, and he sends rain on the just and the unjust alike.
  - type: text
    content: ' '
  '46':
  - type: text
    content: If you love only those who love you, what reward is there for that? Even corrupt tax collectors do that much.
  - type: text
    content: ' '
  '47':
  - type: text
    content: If you are kind only to your friends,
  - type: note
    content: Greek your brothers.
  - type: text
    content: ' '
  - type: text
    content: how are you different from anyone else? Even pagans do that.
  - type: text
    content: ' '
  '48':
  - type: text
    content: But you are to be perfect, even as your Father in heaven is perfect.
  '5':
  - type: text
    content: ' '
  - type: text
    content: God blesses those who are humble,
  - type: text
    content: for they will inherit the whole earth.
  '6':
  - type: text
    content: ' '
  - type: text
    content: God blesses those who hunger and thirst for justice,
  - type: note
    content: Or for righteousness.
  - type: text
    content: for they will be satisfied.
  '7':
  - type: text
    content: ' '
  - type: text
    content: God blesses those who are merciful,
  - type: text
    content: for they will be shown mercy.
  '8':
  - type: text
    content: ' '
  - type: text
    content: God blesses those whose hearts are pure,
  - type: text
    content: for they will see God.
  '9':
  - type: text
    content: ' '
  - type: text
    content: God blesses those who work for peace,
  - type: text
    content: for they will be called the children of God.
