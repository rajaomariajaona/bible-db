      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for the Kingdom of Heaven is theirs.
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if your hand—even your stronger hand
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your right hand.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: —causes you to sin, cut it off and throw it away. It is better for you to lose one part of your body than for your whole body to be thrown into hell.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teaching about Divorce
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have heard the law that says, ‘A man can divorce his wife by merely giving her a written notice of divorce.’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut 24:1.
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I say that a man who divorces his wife, unless she has been unfaithful, causes her to commit adultery. And anyone who marries a divorced woman also commits adultery.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teaching about Vows
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“You have also heard that our ancestors were told, ‘You must not break your vows; you must carry out the vows you make to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: .’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Num 30:2.
      marker-yv: yv-n
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I say, do not make any vows! Do not say, ‘By heaven!’ because heaven is God’s throne.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And do not say, ‘By the earth!’ because the earth is his footstool. And do not say, ‘By Jerusalem!’ for Jerusalem is the city of the great King.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Do not even say, ‘By my head!’ for you can’t turn one hair white or black.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Just say a simple, ‘Yes, I will,’ or ‘No, I won’t.’ Anything beyond this is from the evil one.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teaching about Revenge
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
