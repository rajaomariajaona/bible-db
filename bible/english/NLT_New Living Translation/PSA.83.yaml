document_id: PSA.83
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A song. A psalm of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God, do not be silent!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not be deaf.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not be quiet, O God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Don’t you hear the uproar of your enemies?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t you see that your arrogant enemies are rising up?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They devise crafty schemes against your people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they conspire against your precious ones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Come,” they say, “let us wipe out Israel as a nation.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We will destroy the very memory of its existence.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Yes, this was their unanimous decision.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They signed a treaty as allies against you—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: these Edomites and Ishmaelites;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Moabites and Hagrites;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Gebalites, Ammonites, and Amalekites;
- type: usfm
  marker: q2
  children:
  - type: text
    text: and people from Philistia and Tyre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Assyria has joined them, too,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and is allied with the descendants of Lot. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Do to them as you did to the Midianites
- type: usfm
  marker: q2
  children:
  - type: text
    text: and as you did to Sisera and Jabin at the Kishon River.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They were destroyed at Endor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their decaying corpses fertilized the soil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Let their mighty nobles die as Oreb and Zeeb did.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let all their princes die like Zebah and Zalmunna,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: for they said, “Let us seize for our own use
- type: usfm
  marker: q2
  children:
  - type: text
    text: these pasturelands of God!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: O my God, scatter them like tumbleweed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like chaff before the wind!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: As a fire burns a forest
- type: usfm
  marker: q2
  children:
  - type: text
    text: and as a flame sets mountains ablaze,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: chase them with your fierce storm;
- type: usfm
  marker: q2
  children:
  - type: text
    text: terrify them with your tempest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Utterly disgrace them
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'until they submit to your name, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Let them be ashamed and terrified forever.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let them die in disgrace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then they will learn that you alone are called the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you alone are the Most High,
- type: usfm
  marker: q2
  children:
  - type: text
    text: supreme over all the earth.
