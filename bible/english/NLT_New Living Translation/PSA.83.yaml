document_id: PSA.83,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song. A psalm of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, do not be silent!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not be deaf.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not be quiet, O God.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were destroyed at Endor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their decaying corpses fertilized the soil.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let their mighty nobles die as Oreb and Zeeb did.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let all their princes die like Zebah and Zalmunna,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they said, “Let us seize for our own use
  - type: usfm
    marker: q2
    children:
    - type: text
      text: these pasturelands of God!”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O my God, scatter them like tumbleweed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like chaff before the wind!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As a fire burns a forest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and as a flame sets mountains ablaze,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chase them with your fierce storm;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: terrify them with your tempest.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Utterly disgrace them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'until they submit to your name, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them be ashamed and terrified forever.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them die in disgrace.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then they will learn that you alone are called the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you alone are the Most High,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: supreme over all the earth.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t you hear the uproar of your enemies?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t you see that your arrogant enemies are rising up?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They devise crafty schemes against your people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they conspire against your precious ones.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Come,” they say, “let us wipe out Israel as a nation.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We will destroy the very memory of its existence.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, this was their unanimous decision.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They signed a treaty as allies against you—
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: these Edomites and Ishmaelites;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Moabites and Hagrites;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gebalites, Ammonites, and Amalekites;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and people from Philistia and Tyre.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assyria has joined them, too,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and is allied with the descendants of Lot. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do to them as you did to the Midianites
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and as you did to Sisera and Jabin at the Kishon River.
