document_id: PSA.83,116
type_code: eng
verses:
  '1':
  - type: text
    content: A song. A psalm of Asaph.
  - type: text
    content: O God, do not be silent!
  - type: text
    content: Do not be deaf.
  - type: text
    content: Do not be quiet, O God.
  '10':
  - type: text
    content: They were destroyed at Endor,
  - type: text
    content: and their decaying corpses fertilized the soil.
  '11':
  - type: text
    content: Let their mighty nobles die as Oreb and Zeeb did.
  - type: text
    content: Let all their princes die like Zebah and Zalmunna,
  '12':
  - type: text
    content: for they said, “Let us seize for our own use
  - type: text
    content: these pasturelands of God!”
  '13':
  - type: text
    content: O my God, scatter them like tumbleweed,
  - type: text
    content: like chaff before the wind!
  '14':
  - type: text
    content: As a fire burns a forest
  - type: text
    content: and as a flame sets mountains ablaze,
  '15':
  - type: text
    content: chase them with your fierce storm;
  - type: text
    content: terrify them with your tempest.
  '16':
  - type: text
    content: Utterly disgrace them
  - type: text
    content: 'until they submit to your name, O '
  - type: text
    content: Lord
  - type: text
    content: .
  '17':
  - type: text
    content: Let them be ashamed and terrified forever.
  - type: text
    content: Let them die in disgrace.
  '18':
  - type: text
    content: 'Then they will learn that you alone are called the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: that you alone are the Most High,
  - type: text
    content: supreme over all the earth.
  '2':
  - type: text
    content: Don’t you hear the uproar of your enemies?
  - type: text
    content: Don’t you see that your arrogant enemies are rising up?
  '3':
  - type: text
    content: They devise crafty schemes against your people;
  - type: text
    content: they conspire against your precious ones.
  '4':
  - type: text
    content: “Come,” they say, “let us wipe out Israel as a nation.
  - type: text
    content: We will destroy the very memory of its existence.”
  '5':
  - type: text
    content: Yes, this was their unanimous decision.
  - type: text
    content: They signed a treaty as allies against you—
  '6':
  - type: text
    content: these Edomites and Ishmaelites;
  - type: text
    content: Moabites and Hagrites;
  '7':
  - type: text
    content: Gebalites, Ammonites, and Amalekites;
  - type: text
    content: and people from Philistia and Tyre.
  '8':
  - type: text
    content: Assyria has joined them, too,
  - type: text
    content: 'and is allied with the descendants of Lot. '
  - type: text
    content: Interlude
  '9':
  - type: text
    content: Do to them as you did to the Midianites
  - type: text
    content: and as you did to Sisera and Jabin at the Kishon River.
