document_id: JER.37
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zedekiah Calls for Jeremiah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Zedekiah son of Josiah succeeded Jehoiachin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Coniah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoiachin.
    marker-yv: yv-n
  - type: text
    text: ' son of Jehoiakim as the king of Judah. He was appointed by King Nebuchadnezzar'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nebuchadrezzar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Nebuchadnezzar.
    marker-yv: yv-n
  - type: text
    text: ' of Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But neither King Zedekiah nor his attendants nor the people who were left in the land listened to what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said through Jeremiah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nevertheless, King Zedekiah sent Jehucal son of Shelemiah, and Zephaniah the priest, son of Maaseiah, to ask Jeremiah, “Please pray to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God for us.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jeremiah had not yet been imprisoned, so he could come and go among the people as he pleased.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: At this time the army of Pharaoh Hophra
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:5a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'army of Pharaoh; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see 44:30.
    marker-yv: yv-n
  - type: text
    text: ' of Egypt appeared at the southern border of Judah. When the Babylonian'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:5b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Chaldean; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 37:10, 11.
    marker-yv: yv-n
  - type: text
    text: ' army heard about it, they withdrew from their siege of Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave this message to Jeremiah: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, says: The king of Judah sent you to ask me what is going to happen. Tell him, ‘Pharaoh’s army is about to return to Egypt, though he came here to help you. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then the Babylonians
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Chaldeans; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 37:9, 13.
    marker-yv: yv-n
  - type: text
    text: ' will come back and capture this city and burn it to the ground.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Do not fool yourselves into thinking that the Babylonians are gone for good. They aren’t! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Even if you were to destroy the entire Babylonian army, leaving only a handful of wounded survivors, they would still stagger from their tents and burn this city to the ground!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah Is Imprisoned
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When the Babylonian army left Jerusalem because of Pharaoh’s approaching army, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Jeremiah started to leave the city on his way to the territory of Benjamin, to claim his share of the property among his relatives there.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to separate from there in the midst of the people.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But as he was walking through the Benjamin Gate, a sentry arrested him and said, “You are defecting to the Babylonians!” The sentry making the arrest was Irijah son of Shelemiah, grandson of Hananiah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“That’s not true!” Jeremiah protested. “I had no intention of doing any such thing.” But Irijah wouldn’t listen, and he took Jeremiah before the officials. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'They were furious with Jeremiah and had him flogged and imprisoned in the house of Jonathan the secretary. Jonathan’s house had been converted into a prison. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Jeremiah was put into a dungeon cell, where he remained for many days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Later King Zedekiah secretly requested that Jeremiah come to the palace, where the king asked him, “Do you have any messages from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes, I do!” said Jeremiah. “You will be defeated by the king of Babylon.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Jeremiah asked the king, “What crime have I committed? What have I done against you, your attendants, or the people that I should be imprisoned like this? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Where are your prophets now who told you the king of Babylon would not attack you or this land? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Listen, my lord the king, I beg you. Don’t send me back to the dungeon in the house of Jonathan the secretary, for I will die there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So King Zedekiah commanded that Jeremiah not be returned to the dungeon. Instead, he was imprisoned in the courtyard of the guard in the royal palace. The king also commanded that Jeremiah be given a loaf of fresh bread every day as long as there was any left in the city. So Jeremiah was put in the palace prison.
