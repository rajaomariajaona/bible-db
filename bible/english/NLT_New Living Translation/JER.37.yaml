document_id: JER.37,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Zedekiah Calls for Jeremiah
  - type: text
    content: Zedekiah son of Josiah succeeded Jehoiachin
  - type: note
    content: Hebrew Coniah, a variant spelling of Jehoiachin.
  - type: text
    content: ' son of Jehoiakim as the king of Judah. He was appointed by King Nebuchadnezzar'
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar.
  - type: text
    content: ' of Babylon. '
  '10':
  - type: text
    content: Even if you were to destroy the entire Babylonian army, leaving only a handful of wounded survivors, they would still stagger from their tents and burn this city to the ground!”
  - type: heading
    content: Jeremiah Is Imprisoned
  '11':
  - type: text
    content: 'When the Babylonian army left Jerusalem because of Pharaoh’s approaching army, '
  '12':
  - type: text
    content: Jeremiah started to leave the city on his way to the territory of Benjamin, to claim his share of the property among his relatives there.
  - type: note
    content: Hebrew to separate from there in the midst of the people.
  - type: text
    content: ' '
  '13':
  - type: text
    content: But as he was walking through the Benjamin Gate, a sentry arrested him and said, “You are defecting to the Babylonians!” The sentry making the arrest was Irijah son of Shelemiah, grandson of Hananiah.
  '14':
  - type: text
    content: '“That’s not true!” Jeremiah protested. “I had no intention of doing any such thing.” But Irijah wouldn’t listen, and he took Jeremiah before the officials. '
  '15':
  - type: text
    content: 'They were furious with Jeremiah and had him flogged and imprisoned in the house of Jonathan the secretary. Jonathan’s house had been converted into a prison. '
  '16':
  - type: text
    content: Jeremiah was put into a dungeon cell, where he remained for many days.
  '17':
  - type: text
    content: 'Later King Zedekiah secretly requested that Jeremiah come to the palace, where the king asked him, “Do you have any messages from the '
  - type: text
    content: Lord
  - type: text
    content: ?”
  - type: text
    content: “Yes, I do!” said Jeremiah. “You will be defeated by the king of Babylon.”
  '18':
  - type: text
    content: 'Then Jeremiah asked the king, “What crime have I committed? What have I done against you, your attendants, or the people that I should be imprisoned like this? '
  '19':
  - type: text
    content: 'Where are your prophets now who told you the king of Babylon would not attack you or this land? '
  '2':
  - type: text
    content: 'But neither King Zedekiah nor his attendants nor the people who were left in the land listened to what the '
  - type: text
    content: Lord
  - type: text
    content: ' said through Jeremiah.'
  '20':
  - type: text
    content: Listen, my lord the king, I beg you. Don’t send me back to the dungeon in the house of Jonathan the secretary, for I will die there.”
  '21':
  - type: text
    content: So King Zedekiah commanded that Jeremiah not be returned to the dungeon. Instead, he was imprisoned in the courtyard of the guard in the royal palace. The king also commanded that Jeremiah be given a loaf of fresh bread every day as long as there was any left in the city. So Jeremiah was put in the palace prison.
  '3':
  - type: text
    content: 'Nevertheless, King Zedekiah sent Jehucal son of Shelemiah, and Zephaniah the priest, son of Maaseiah, to ask Jeremiah, “Please pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God for us.” '
  '4':
  - type: text
    content: Jeremiah had not yet been imprisoned, so he could come and go among the people as he pleased.
  '5':
  - type: text
    content: At this time the army of Pharaoh Hophra
  - type: note
    content: Hebrew army of Pharaoh; see 44:30.
  - type: text
    content: ' of Egypt appeared at the southern border of Judah. When the Babylonian'
  - type: note
    content: Or Chaldean; also in 37:10, 11.
  - type: text
    content: ' army heard about it, they withdrew from their siege of Jerusalem.'
  '6':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' gave this message to Jeremiah: '
  '7':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: The king of Judah sent you to ask me what is going to happen. Tell him, ‘Pharaoh’s army is about to return to Egypt, though he came here to help you. '
  '8':
  - type: text
    content: Then the Babylonians
  - type: note
    content: Or Chaldeans; also in 37:9, 13.
  - type: text
    content: ' will come back and capture this city and burn it to the ground.’'
  '9':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Do not fool yourselves into thinking that the Babylonians are gone for good. They aren’t! '
