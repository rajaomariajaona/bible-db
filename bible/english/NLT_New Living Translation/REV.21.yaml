document_id: REV.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The New Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then I saw a new heaven and a new earth, for the old heaven and the old earth had disappeared. And the sea was also gone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And I saw the holy city, the new Jerusalem, coming down from God out of heaven like a bride beautifully dressed for her husband.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I heard a loud shout from the throne, saying, “Look, God’s home is now among his people! He will live with them, and they will be his people. God himself will be with them.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: God himself will be with them, their God.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He will wipe every tear from their eyes, and there will be no more death or sorrow or crying or pain. All these things are gone forever.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the one sitting on the throne said, “Look, I am making everything new!” And then he said to me, “Write this down, for what I tell you is trustworthy and true.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he also said, “It is finished! I am the Alpha and the Omega—the Beginning and the End. To all who are thirsty I will give freely from the springs of the water of life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All who are victorious will inherit all these blessings, and I will be their God, and they will be my children.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “But cowards, unbelievers, the corrupt, murderers, the immoral, those who practice witchcraft, idol worshipers, and all liars—their fate is in the fiery lake of burning sulfur. This is the second death.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then one of the seven angels who held the seven bowls containing the seven last plagues came and said to me, “Come with me! I will show you the bride, the wife of the Lamb.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So he took me in the Spirit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in spirit.
    marker-yv: yv-n
  - type: text
    text: ' to a great, high mountain, and he showed me the holy city, Jerusalem, descending out of heaven from God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'It shone with the glory of God and sparkled like a precious stone—like jasper as clear as crystal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The city wall was broad and high, with twelve gates guarded by twelve angels. And the names of the twelve tribes of Israel were written on the gates. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'There were three gates on each side—east, north, south, and west. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The wall of the city had twelve foundation stones, and on them were written the names of the twelve apostles of the Lamb.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The angel who talked to me held in his hand a gold measuring stick to measure the city, its gates, and its wall. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When he measured it, he found it was a square, as wide as it was long. In fact, its length and width and height were each 1,400 miles.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '12,000 stadia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2,220 kilometers].'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then he measured the walls and found them to be 216 feet thick
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '144 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[65 meters].'
    marker-yv: yv-n
  - type: text
    text: ' (according to the human standard used by the angel).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The wall was made of jasper, and the city was pure gold, as clear as glass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The wall of the city was built on foundation stones inlaid with twelve precious stones:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The identification of some of these gemstones is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' the first was jasper, the second sapphire, the third agate, the fourth emerald, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: the fifth onyx, the sixth carnelian, the seventh chrysolite, the eighth beryl, the ninth topaz, the tenth chrysoprase, the eleventh jacinth, the twelfth amethyst.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The twelve gates were made of pearls—each gate from a single pearl! And the main street was pure gold, as clear as glass.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I saw no temple in the city, for the Lord God Almighty and the Lamb are its temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And the city has no need of sun or moon, for the glory of God illuminates the city, and the Lamb is its light. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The nations will walk in its light, and the kings of the world will enter the city in all their glory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Its gates will never be closed at the end of day because there is no night there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And all the nations will bring their glory and honor into the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nothing evil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ceremonially unclean.
    marker-yv: yv-n
  - type: text
    text: ' will be allowed to enter, nor anyone who practices shameful idolatry and dishonesty—but only those whose names are written in the Lamb’s Book of Life.'
