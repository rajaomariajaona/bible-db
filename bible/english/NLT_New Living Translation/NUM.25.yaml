document_id: NUM.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moab Seduces Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: While the Israelites were camped at Acacia Grove,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shittim.
    marker-yv: yv-n
  - type: text
    text: ' some of the men defiled themselves by having'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: some of the men began having.
    marker-yv: yv-n
  - type: text
    text: ' sexual relations with local Moabite women. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'These women invited them to attend sacrifices to their gods, so the Israelites feasted with them and worshiped the gods of Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'In this way, Israel joined in the worship of Baal of Peor, causing the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s anger to blaze against his people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' issued the following command to Moses: “Seize all the ringleaders and execute them before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in broad daylight, so his fierce anger will turn away from the people of Israel.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So Moses ordered Israel’s judges, “Each of you must put to death the men under your authority who have joined in worshiping Baal of Peor.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Just then one of the Israelite men brought a Midianite woman into his tent, right before the eyes of Moses and all the people, as everyone was weeping at the entrance of the Tabernacle.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Tent of Meeting.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When Phinehas son of Eleazar and grandson of Aaron the priest saw this, he jumped up and left the assembly. He took a spear '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and rushed after the man into his tent. Phinehas thrust the spear all the way through the man’s body and into the woman’s stomach. So the plague against the Israelites was stopped, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: but not before 24,000 people had died.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Phinehas son of Eleazar and grandson of Aaron the priest has turned my anger away from the Israelites by being as zealous among them as I was. So I stopped destroying all Israel as I had intended to do in my zealous anger. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now tell him that I am making my special covenant of peace with him. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: In this covenant, I give him and his descendants a permanent right to the priesthood, for in his zeal for me, his God, he purified the people of Israel, making them right with me.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he made atonement for the people of Israel.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The Israelite man killed with the Midianite woman was named Zimri son of Salu, the leader of a family from the tribe of Simeon. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The woman’s name was Cozbi; she was the daughter of Zur, the leader of a Midianite clan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Attack the Midianites and destroy them, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: because they assaulted you with deceit and tricked you into worshiping Baal of Peor, and because of Cozbi, the daughter of a Midianite leader, who was killed at the time of the plague because of what happened at Peor.”
