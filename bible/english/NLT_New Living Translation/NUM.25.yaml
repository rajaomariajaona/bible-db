document_id: NUM.25,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Moab Seduces Israel
  - type: text
    content: While the Israelites were camped at Acacia Grove,
  - type: note
    content: Hebrew Shittim.
  - type: text
    content: ' some of the men defiled themselves by having'
  - type: note
    content: As in Greek version; Hebrew reads some of the men began having.
  - type: text
    content: ' sexual relations with local Moabite women. '
  '10':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '11':
  - type: text
    content: '“Phinehas son of Eleazar and grandson of Aaron the priest has turned my anger away from the Israelites by being as zealous among them as I was. So I stopped destroying all Israel as I had intended to do in my zealous anger. '
  '12':
  - type: text
    content: 'Now tell him that I am making my special covenant of peace with him. '
  '13':
  - type: text
    content: In this covenant, I give him and his descendants a permanent right to the priesthood, for in his zeal for me, his God, he purified the people of Israel, making them right with me.
  - type: note
    content: Or he made atonement for the people of Israel.
  - type: text
    content: ”
  '14':
  - type: text
    content: 'The Israelite man killed with the Midianite woman was named Zimri son of Salu, the leader of a family from the tribe of Simeon. '
  '15':
  - type: text
    content: The woman’s name was Cozbi; she was the daughter of Zur, the leader of a Midianite clan.
  '16':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '17':
  - type: text
    content: '“Attack the Midianites and destroy them, '
  '18':
  - type: text
    content: because they assaulted you with deceit and tricked you into worshiping Baal of Peor, and because of Cozbi, the daughter of a Midianite leader, who was killed at the time of the plague because of what happened at Peor.”
  '2':
  - type: text
    content: 'These women invited them to attend sacrifices to their gods, so the Israelites feasted with them and worshiped the gods of Moab. '
  '3':
  - type: text
    content: 'In this way, Israel joined in the worship of Baal of Peor, causing the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger to blaze against his people.
  '4':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' issued the following command to Moses: “Seize all the ringleaders and execute them before the '
  - type: text
    content: Lord
  - type: text
    content: ' in broad daylight, so his fierce anger will turn away from the people of Israel.”'
  '5':
  - type: text
    content: So Moses ordered Israel’s judges, “Each of you must put to death the men under your authority who have joined in worshiping Baal of Peor.”
  '6':
  - type: text
    content: Just then one of the Israelite men brought a Midianite woman into his tent, right before the eyes of Moses and all the people, as everyone was weeping at the entrance of the Tabernacle.
  - type: note
    content: Hebrew the Tent of Meeting.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'When Phinehas son of Eleazar and grandson of Aaron the priest saw this, he jumped up and left the assembly. He took a spear '
  '8':
  - type: text
    content: 'and rushed after the man into his tent. Phinehas thrust the spear all the way through the man’s body and into the woman’s stomach. So the plague against the Israelites was stopped, '
  '9':
  - type: text
    content: but not before 24,000 people had died.
