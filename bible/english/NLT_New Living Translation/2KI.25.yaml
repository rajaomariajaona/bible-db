document_id: 2KI.25,116
type_code: eng
verses:
  '1':
  - type: text
    content: So on January 15,
  - type: note
    content: Hebrew on the tenth day of the tenth month, of the ancient Hebrew lunar calendar. A number of events in 2 Kings can be cross-checked with dates in surviving Babylonian records and related accurately to our modern calendar. This day was January 15, 588 b.c.
  - type: text
    content: ' during the ninth year of Zedekiah’s reign, King Nebuchadnezzar of Babylon led his entire army against Jerusalem. They surrounded the city and built siege ramps against its walls. '
  '10':
  - type: text
    content: 'Then he supervised the entire Babylonian army as they tore down the walls of Jerusalem on every side. '
  '11':
  - type: text
    content: 'Then Nebuzaradan, the captain of the guard, took as exiles the rest of the people who remained in the city, the defectors who had declared their allegiance to the king of Babylon, and the rest of the population. '
  '12':
  - type: text
    content: But the captain of the guard allowed some of the poorest people to stay behind to care for the vineyards and fields.
  '13':
  - type: text
    content: 'The Babylonians broke up the bronze pillars in front of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple, the bronze water carts, and the great bronze basin called the Sea, and they carried all the bronze away to Babylon. '
  '14':
  - type: text
    content: 'They also took all the ash buckets, shovels, lamp snuffers, ladles, and all the other bronze articles used for making sacrifices at the Temple. '
  '15':
  - type: text
    content: The captain of the guard also took the incense burners and basins, and all the other articles made of pure gold or silver.
  '16':
  - type: text
    content: 'The weight of the bronze from the two pillars, the Sea, and the water carts was too great to be measured. These things had been made for the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple in the days of Solomon. '
  '17':
  - type: text
    content: Each of the pillars was 27 feet
  - type: note
    content: Hebrew 18 cubits [8.3 meters].
  - type: text
    content: ' tall. The bronze capital on top of each pillar was 7-1/2 feet'
  - type: note
    content: As in parallel texts at 1 Kgs 7:16, 2 Chr 3:15, and Jer 52:22, all of which read 5 cubits [2.3 meters]; Hebrew reads 3 cubits, which is 4.5 feet or 1.4 meters.
  - type: text
    content: ' high and was decorated with a network of bronze pomegranates all the way around.'
  '18':
  - type: text
    content: 'Nebuzaradan, the captain of the guard, took with him as prisoners Seraiah the high priest, Zephaniah the priest of the second rank, and the three chief gatekeepers. '
  '19':
  - type: text
    content: 'And from among the people still hiding in the city, he took an officer who had been in charge of the Judean army; five of the king’s personal advisers; the army commander’s chief secretary, who was in charge of recruitment; and sixty other citizens. '
  '2':
  - type: text
    content: Jerusalem was kept under siege until the eleventh year of King Zedekiah’s reign.
  '20':
  - type: text
    content: 'Nebuzaradan, the captain of the guard, took them all to the king of Babylon at Riblah. '
  '21':
  - type: text
    content: And there at Riblah, in the land of Hamath, the king of Babylon had them all put to death. So the people of Judah were sent into exile from their land.
  - type: heading
    content: Gedaliah Governs in Judah
  '22':
  - type: text
    content: 'Then King Nebuchadnezzar appointed Gedaliah son of Ahikam and grandson of Shaphan as governor over the people he had left in Judah. '
  '23':
  - type: text
    content: When all the army commanders and their men learned that the king of Babylon had appointed Gedaliah as governor, they went to see him at Mizpah. These included Ishmael son of Nethaniah, Johanan son of Kareah, Seraiah son of Tanhumeth the Netophathite, Jezaniah
  - type: note
    content: As in parallel text at Jer 40:8; Hebrew reads Jaazaniah, a variant spelling of Jezaniah.
  - type: text
    content: ' son of the Maacathite, and all their men.'
  '24':
  - type: text
    content: Gedaliah vowed to them that the Babylonian officials meant them no harm. “Don’t be afraid of them. Live in the land and serve the king of Babylon, and all will go well for you,” he promised.
  '25':
  - type: text
    content: But in midautumn of that year,
  - type: note
    content: Hebrew in the seventh month, of the ancient Hebrew lunar calendar. This month occurred within the months of October and November 586 b.c.; also see note on 25:1.
  - type: text
    content: ' Ishmael son of Nethaniah and grandson of Elishama, who was a member of the royal family, went to Mizpah with ten men and killed Gedaliah. He also killed all the Judeans and Babylonians who were with him at Mizpah.'
  '26':
  - type: text
    content: Then all the people of Judah, from the least to the greatest, as well as the army commanders, fled in panic to Egypt, for they were afraid of what the Babylonians would do to them.
  - type: heading
    content: Hope for Israel’s Royal Line
  '27':
  - type: text
    content: In the thirty-seventh year of the exile of King Jehoiachin of Judah, Evil-merodach ascended to the Babylonian throne. He was kind to
  - type: note
    content: Hebrew He raised the head of.
  - type: text
    content: ' Jehoiachin and released him'
  - type: note
    content: As in some Hebrew manuscripts and Greek and Syriac versions (see also Jer 52:31); Masoretic Text lacks released him.
  - type: text
    content: ' from prison on April 2 of that year.'
  - type: note
    content: Hebrew on the twenty-seventh day of the twelfth month, of the ancient Hebrew lunar calendar. This day was April 2, 561 b.c.; also see note on 25:1.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'He spoke kindly to Jehoiachin and gave him a higher place than all the other exiled kings in Babylon. '
  '29':
  - type: text
    content: 'He supplied Jehoiachin with new clothes to replace his prison garb and allowed him to dine in the king’s presence for the rest of his life. '
  '3':
  - type: text
    content: By July 18 in the eleventh year of Zedekiah’s reign,
  - type: note
    content: Hebrew By the ninth day of the [fourth] month [in the eleventh year of Zedekiah’s reign] (compare Jer 39:2; 52:6 and the notes there). This day was July 18, 586 b.c.; also see note on 25:1.
  - type: text
    content: ' the famine in the city had become very severe, and the last of the food was entirely gone. '
  '30':
  - type: text
    content: So the king gave him a regular food allowance as long as he lived.
  '4':
  - type: text
    content: Then a section of the city wall was broken down. Since the city was surrounded by the Babylonians,
  - type: note
    content: Or the Chaldeans; also in 25:13, 25, 26.
  - type: text
    content: ' the soldiers waited for nightfall and escaped'
  - type: note
    content: As in Greek version (see also Jer 39:4; 52:7); Hebrew lacks escaped.
  - type: text
    content: ' through the gate between the two walls behind the king’s garden. Then they headed toward the Jordan Valley.'
  - type: note
    content: Hebrew the Arabah.
  '5':
  - type: text
    content: But the Babylonian
  - type: note
    content: Or Chaldean; also in 25:10, 24.
  - type: text
    content: ' troops chased the king and overtook him on the plains of Jericho, for his men had all deserted him and scattered. '
  '6':
  - type: text
    content: 'They captured the king and took him to the king of Babylon at Riblah, where they pronounced judgment upon Zedekiah. '
  '7':
  - type: text
    content: They made Zedekiah watch as they slaughtered his sons. Then they gouged out Zedekiah’s eyes, bound him in bronze chains, and led him away to Babylon.
  - type: heading
    content: The Temple Destroyed
  '8':
  - type: text
    content: On August 14 of that year,
  - type: note
    content: Hebrew On the seventh day of the fifth month, of the ancient Hebrew lunar calendar. This day was August 14, 586 b.c.; also see note on 25:1.
  - type: text
    content: ' which was the nineteenth year of King Nebuchadnezzar’s reign, Nebuzaradan, the captain of the guard and an official of the Babylonian king, arrived in Jerusalem. '
  '9':
  - type: text
    content: 'He burned down the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the royal palace, and all the houses of Jerusalem. He destroyed all the important buildings'
  - type: note
    content: Or destroyed the houses of all the important people.
  - type: text
    content: ' in the city. '
