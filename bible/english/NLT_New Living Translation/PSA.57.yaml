document_id: PSA.57,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '57:TITLE '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'miktam. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may be a literary or musical term.
      marker-yv: yv-n
    - type: text
      text: ' of David, regarding the time he fled from Saul and went into the cave. To be sung to the tune “Do Not Destroy!”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have mercy on me, O God, have mercy!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I look to you for protection.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will hide beneath the shadow of your wings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until the danger passes by.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your unfailing love is as high as the heavens.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your faithfulness reaches to the clouds.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be exalted, O God, above the highest heavens.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May your glory shine over all the earth.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cry out to God Most High,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '57:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Elohim-Elyon.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to God who will fulfill his purpose for me.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will send help from heaven to rescue me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'disgracing those who hound me. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My God will send forth his unfailing love and faithfulness.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am surrounded by fierce lions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who greedily devour human prey—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: whose teeth pierce like spears and arrows,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and whose tongues cut like swords.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be exalted, O God, above the highest heavens!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May your glory shine over all the earth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My enemies have set a trap for me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am weary from distress.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have dug a deep pit in my path,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but they themselves have fallen into it. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart is confident in you, O God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my heart is confident.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No wonder I can sing your praises!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wake up, my heart!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wake up, O lyre and harp!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will wake the dawn with my song.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will thank you, Lord, among all the people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing your praises among the nations.
