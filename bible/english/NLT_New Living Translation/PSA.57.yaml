document_id: PSA.57,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm'
  - type: note
    content: Hebrew miktam. This may be a literary or musical term.
  - type: text
    content: ' of David, regarding the time he fled from Saul and went into the cave. To be sung to the tune “Do Not Destroy!”'
  - type: text
    content: Have mercy on me, O God, have mercy!
  - type: text
    content: I look to you for protection.
  - type: text
    content: I will hide beneath the shadow of your wings
  - type: text
    content: until the danger passes by.
  '10':
  - type: text
    content: For your unfailing love is as high as the heavens.
  - type: text
    content: Your faithfulness reaches to the clouds.
  '11':
  - type: text
    content: Be exalted, O God, above the highest heavens.
  - type: text
    content: May your glory shine over all the earth.
  '2':
  - type: text
    content: I cry out to God Most High,
  - type: note
    content: Hebrew Elohim-Elyon.
  - type: text
    content: to God who will fulfill his purpose for me.
  '3':
  - type: text
    content: He will send help from heaven to rescue me,
  - type: text
    content: 'disgracing those who hound me. '
  - type: text
    content: Interlude
  - type: text
    content: My God will send forth his unfailing love and faithfulness.
  '4':
  - type: text
    content: I am surrounded by fierce lions
  - type: text
    content: who greedily devour human prey—
  - type: text
    content: whose teeth pierce like spears and arrows,
  - type: text
    content: and whose tongues cut like swords.
  '5':
  - type: text
    content: Be exalted, O God, above the highest heavens!
  - type: text
    content: May your glory shine over all the earth.
  '6':
  - type: text
    content: My enemies have set a trap for me.
  - type: text
    content: I am weary from distress.
  - type: text
    content: They have dug a deep pit in my path,
  - type: text
    content: 'but they themselves have fallen into it. '
  - type: text
    content: Interlude
  '7':
  - type: text
    content: My heart is confident in you, O God;
  - type: text
    content: my heart is confident.
  - type: text
    content: No wonder I can sing your praises!
  '8':
  - type: text
    content: Wake up, my heart!
  - type: text
    content: Wake up, O lyre and harp!
  - type: text
    content: I will wake the dawn with my song.
  '9':
  - type: text
    content: I will thank you, Lord, among all the people.
  - type: text
    content: I will sing your praises among the nations.
