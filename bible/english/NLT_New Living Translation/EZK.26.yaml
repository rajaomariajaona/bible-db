document_id: EZK.26,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message for Tyre
  - type: text
    content: On February 3, during the twelfth year of King Jehoiachin’s captivity,
  - type: note
    content: 'Hebrew In the eleventh year, on the first day of the month, of the ancient Hebrew lunar calendar year. Since an element is missing in the date formula here, scholars have reconstructed this probable reading: In the eleventh [month of the twelfth] year, on the first day of the month. This reading would put this message on February 3, 585 b.c.; also see note on 1:1.'
  - type: text
    content: ' this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'The hooves of his horses will choke the city with dust, and the noise of the charioteers and chariot wheels will shake your walls as they storm through your broken gates. '
  '11':
  - type: text
    content: His horsemen will trample through every street in the city. They will butcher your people, and your strong pillars will topple.
  '12':
  - type: text
    content: '“They will plunder all your riches and merchandise and break down your walls. They will destroy your lovely homes and dump your stones and timbers and even your dust into the sea. '
  '13':
  - type: text
    content: 'I will stop the music of your songs. No more will the sound of harps be heard among your people. '
  '14':
  - type: text
    content: 'I will make your island a bare rock, a place for fishermen to spread their nets. You will never be rebuilt, for I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken. Yes, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken!'
  - type: heading
    content: The Effect of Tyre’s Destruction
  '15':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says to Tyre: The whole coastline will tremble at the sound of your fall, as the screams of the wounded echo in the continuing slaughter. '
  '16':
  - type: text
    content: 'All the seaport rulers will step down from their thrones and take off their royal robes and beautiful clothing. They will sit on the ground trembling with horror at your destruction. '
  '17':
  - type: text
    content: 'Then they will wail for you, singing this funeral song:'
  - type: text
    content: “O famous island city,
  - type: text
    content: once ruler of the sea,
  - type: text
    content: how you have been destroyed!
  - type: text
    content: Your people, with their naval power,
  - type: text
    content: once spread fear around the world.
  '18':
  - type: text
    content: Now the coastlands tremble at your fall.
  - type: text
    content: The islands are dismayed as you disappear.
  '19':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will make Tyre an uninhabited ruin, like many others. I will bury you beneath the terrible waves of enemy attack. Great seas will swallow you. '
  '2':
  - type: text
    content: “Son of man, Tyre has rejoiced over the fall of Jerusalem, saying, ‘Ha! She who was the gateway to the rich trade routes to the east has been broken, and I am the heir! Because she has been made desolate, I will become wealthy!’
  '20':
  - type: text
    content: 'I will send you to the pit to join those who descended there long ago. Your city will lie in ruins, buried beneath the earth, like those in the pit who have entered the world of the dead. You will have no place of respect here in the land of the living. '
  '21':
  - type: text
    content: 'I will bring you to a terrible end, and you will exist no more. You will be looked for, but you will never again be found. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '3':
  - type: text
    content: '“Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am your enemy, O Tyre, and I will bring many nations against you, like the waves of the sea crashing against your shoreline. '
  '4':
  - type: text
    content: 'They will destroy the walls of Tyre and tear down its towers. I will scrape away its soil and make it a bare rock! '
  '5':
  - type: text
    content: 'It will be just a rock in the sea, a place for fishermen to spread their nets, for I have spoken, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. Tyre will become the prey of many nations, '
  '6':
  - type: text
    content: 'and its mainland villages will be destroyed by the sword. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: From the north I will bring King Nebuchadnezzar'
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar.
  - type: text
    content: ' of Babylon against Tyre. He is king of kings and brings his horses, chariots, charioteers, and great army. '
  '8':
  - type: text
    content: 'First he will destroy your mainland villages. Then he will attack you by building a siege wall, constructing a ramp, and raising a roof of shields against you. '
  '9':
  - type: text
    content: 'He will pound your walls with battering rams and demolish your towers with sledgehammers. '
