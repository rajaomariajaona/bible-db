document_id: EZK.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message for Tyre
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: On February 3, during the twelfth year of King Jehoiachin’s captivity,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'In the eleventh year, on the first day of the month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar year. Since an element is missing in the date formula here, scholars have reconstructed this probable reading: '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'In the eleventh [month of the twelfth] year, on the first day of the month. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This reading would put this message on February 3, 585 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 1:1.
    marker-yv: yv-n
  - type: text
    text: ' this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Son of man, Tyre has rejoiced over the fall of Jerusalem, saying, ‘Ha! She who was the gateway to the rich trade routes to the east has been broken, and I am the heir! Because she has been made desolate, I will become wealthy!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Therefore, this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I am your enemy, O Tyre, and I will bring many nations against you, like the waves of the sea crashing against your shoreline. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They will destroy the walls of Tyre and tear down its towers. I will scrape away its soil and make it a bare rock! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'It will be just a rock in the sea, a place for fishermen to spread their nets, for I have spoken, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. Tyre will become the prey of many nations, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and its mainland villages will be destroyed by the sword. Then they will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: From the north I will bring King Nebuchadnezzar'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nebuchadrezzar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Nebuchadnezzar.
    marker-yv: yv-n
  - type: text
    text: ' of Babylon against Tyre. He is king of kings and brings his horses, chariots, charioteers, and great army. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'First he will destroy your mainland villages. Then he will attack you by building a siege wall, constructing a ramp, and raising a roof of shields against you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He will pound your walls with battering rams and demolish your towers with sledgehammers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The hooves of his horses will choke the city with dust, and the noise of the charioteers and chariot wheels will shake your walls as they storm through your broken gates. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: His horsemen will trample through every street in the city. They will butcher your people, and your strong pillars will topple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“They will plunder all your riches and merchandise and break down your walls. They will destroy your lovely homes and dump your stones and timbers and even your dust into the sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I will stop the music of your songs. No more will the sound of harps be heard among your people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will make your island a bare rock, a place for fishermen to spread their nets. You will never be rebuilt, for I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken. Yes, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Effect of Tyre’s Destruction
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says to Tyre: The whole coastline will tremble at the sound of your fall, as the screams of the wounded echo in the continuing slaughter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'All the seaport rulers will step down from their thrones and take off their royal robes and beautiful clothing. They will sit on the ground trembling with horror at your destruction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then they will wail for you, singing this funeral song:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “O famous island city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: once ruler of the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: how you have been destroyed!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your people, with their naval power,
- type: usfm
  marker: q2
  children:
  - type: text
    text: once spread fear around the world.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Now the coastlands tremble at your fall.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The islands are dismayed as you disappear.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I will make Tyre an uninhabited ruin, like many others. I will bury you beneath the terrible waves of enemy attack. Great seas will swallow you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'I will send you to the pit to join those who descended there long ago. Your city will lie in ruins, buried beneath the earth, like those in the pit who have entered the world of the dead. You will have no place of respect here in the land of the living. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I will bring you to a terrible end, and you will exist no more. You will be looked for, but you will never again be found. I, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
