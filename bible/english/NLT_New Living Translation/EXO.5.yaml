type_code: eng
verses:
  '1':
  - type: heading
    content: Moses and Aaron Speak to Pharaoh
  - type: text
    content: 'After this presentation to Israel’s leaders, Moses and Aaron went and spoke to Pharaoh. They told him, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: Let my people go so they may hold a festival in my honor in the wilderness.”'
  '10':
  - type: text
    content: 'So the slave drivers and foremen went out and told the people: “This is what Pharaoh says: I will not provide any more straw for you. '
  '11':
  - type: text
    content: 'Go and get it yourselves. Find it wherever you can. But you must produce just as many bricks as before!” '
  '12':
  - type: text
    content: So the people scattered throughout the land of Egypt in search of stubble to use as straw.
  '13':
  - type: text
    content: 'Meanwhile, the Egyptian slave drivers continued to push hard. “Meet your daily quota of bricks, just as you did when we provided you with straw!” they demanded. '
  '14':
  - type: text
    content: Then they whipped the Israelite foremen they had put in charge of the work crews. “Why haven’t you met your quotas either yesterday or today?” they demanded.
  '15':
  - type: text
    content: 'So the Israelite foremen went to Pharaoh and pleaded with him. “Please don’t treat your servants like this,” they begged. '
  '16':
  - type: text
    content: “We are given no straw, but the slave drivers still demand, ‘Make bricks!’ We are being beaten, but it isn’t our fault! Your own people are to blame!”
  '17':
  - type: text
    content: 'But Pharaoh shouted, “You’re just lazy! Lazy! That’s why you’re saying, ‘Let us go and offer sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: '.’ '
  '18':
  - type: text
    content: Now get back to work! No straw will be given to you, but you must still produce the full quota of bricks.”
  '19':
  - type: text
    content: 'The Israelite foremen could see that they were in serious trouble when they were told, “You must not reduce the number of bricks you make each day.” '
  '2':
  - type: text
    content: '“Is that so?” retorted Pharaoh. “And who is the '
  - type: text
    content: Lord
  - type: text
    content: '? Why should I listen to him and let Israel go? I don’t know the '
  - type: text
    content: Lord
  - type: text
    content: ', and I will not let Israel go.”'
  '20':
  - type: text
    content: 'As they left Pharaoh’s court, they confronted Moses and Aaron, who were waiting outside for them. '
  '21':
  - type: text
    content: 'The foremen said to them, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' judge and punish you for making us stink before Pharaoh and his officials. You have put a sword into their hands, an excuse to kill us!”'
  '22':
  - type: text
    content: 'Then Moses went back to the '
  - type: text
    content: Lord
  - type: text
    content: ' and protested, “Why have you brought all this trouble on your own people, Lord? Why did you send me? '
  '23':
  - type: text
    content: Ever since I came to Pharaoh as your spokesman, he has been even more brutal to your people. And you have done nothing to rescue them!”
  '3':
  - type: text
    content: 'But Aaron and Moses persisted. “The God of the Hebrews has met with us,” they declared. “So let us take a three-day journey into the wilderness so we can offer sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. If we don’t, he will kill us with a plague or with the sword.”'
  '4':
  - type: text
    content: 'Pharaoh replied, “Moses and Aaron, why are you distracting the people from their tasks? Get back to work! '
  '5':
  - type: text
    content: Look, there are many of your people in the land, and you are stopping them from their work.”
  - type: heading
    content: Making Bricks without Straw
  '6':
  - type: text
    content: 'That same day Pharaoh sent this order to the Egyptian slave drivers and the Israelite foremen: '
  '7':
  - type: text
    content: '“Do not supply any more straw for making bricks. Make the people get it themselves! '
  '8':
  - type: text
    content: 'But still require them to make the same number of bricks as before. Don’t reduce the quota. They are lazy. That’s why they are crying out, ‘Let us go and offer sacrifices to our God.’ '
  '9':
  - type: text
    content: Load them down with more work. Make them sweat! That will teach them to listen to lies!”
