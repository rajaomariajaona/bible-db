document_id: EXO.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moses and Aaron Speak to Pharaoh
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After this presentation to Israel’s leaders, Moses and Aaron went and spoke to Pharaoh. They told him, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, says: Let my people go so they may hold a festival in my honor in the wilderness.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Is that so?” retorted Pharaoh. “And who is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '? Why should I listen to him and let Israel go? I don’t know the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and I will not let Israel go.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But Aaron and Moses persisted. “The God of the Hebrews has met with us,” they declared. “So let us take a three-day journey into the wilderness so we can offer sacrifices to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God. If we don’t, he will kill us with a plague or with the sword.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pharaoh replied, “Moses and Aaron, why are you distracting the people from their tasks? Get back to work! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Look, there are many of your people in the land, and you are stopping them from their work.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Making Bricks without Straw
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'That same day Pharaoh sent this order to the Egyptian slave drivers and the Israelite foremen: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Do not supply any more straw for making bricks. Make the people get it themselves! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But still require them to make the same number of bricks as before. Don’t reduce the quota. They are lazy. That’s why they are crying out, ‘Let us go and offer sacrifices to our God.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Load them down with more work. Make them sweat! That will teach them to listen to lies!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So the slave drivers and foremen went out and told the people: “This is what Pharaoh says: I will not provide any more straw for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Go and get it yourselves. Find it wherever you can. But you must produce just as many bricks as before!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So the people scattered throughout the land of Egypt in search of stubble to use as straw.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Meanwhile, the Egyptian slave drivers continued to push hard. “Meet your daily quota of bricks, just as you did when we provided you with straw!” they demanded. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then they whipped the Israelite foremen they had put in charge of the work crews. “Why haven’t you met your quotas either yesterday or today?” they demanded.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So the Israelite foremen went to Pharaoh and pleaded with him. “Please don’t treat your servants like this,” they begged. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “We are given no straw, but the slave drivers still demand, ‘Make bricks!’ We are being beaten, but it isn’t our fault! Your own people are to blame!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But Pharaoh shouted, “You’re just lazy! Lazy! That’s why you’re saying, ‘Let us go and offer sacrifices to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Now get back to work! No straw will be given to you, but you must still produce the full quota of bricks.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The Israelite foremen could see that they were in serious trouble when they were told, “You must not reduce the number of bricks you make each day.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'As they left Pharaoh’s court, they confronted Moses and Aaron, who were waiting outside for them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The foremen said to them, “May the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' judge and punish you for making us stink before Pharaoh and his officials. You have put a sword into their hands, an excuse to kill us!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then Moses went back to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and protested, “Why have you brought all this trouble on your own people, Lord? Why did you send me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ever since I came to Pharaoh as your spokesman, he has been even more brutal to your people. And you have done nothing to rescue them!”
