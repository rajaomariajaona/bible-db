  '1':
  - type: heading
    content: Procedures for the Peace Offering
  - type: text
    content: '“If you present an animal from the herd as a peace offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', it may be a male or a female, but it must have no defects. '
  '10':
  - type: text
    content: 'the two kidneys and the fat around them near the loins, and the long lobe of the liver. These must be removed with the kidneys, '
  '11':
  - type: text
    content: 'and the priest will burn them on the altar. It is a special gift of food presented to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: '“If you present a goat as your offering, bring it to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '13':
  - type: text
    content: 'lay your hand on its head, and slaughter it in front of the Tabernacle. Aaron’s sons will then splatter the goat’s blood against all sides of the altar. '
  '14':
  - type: text
    content: 'The priest must present part of this offering as a special gift to the '
  - type: text
    content: Lord
  - type: text
    content: '. This includes all the fat around the internal organs, '
  '15':
  - type: text
    content: 'the two kidneys and the fat around them near the loins, and the long lobe of the liver. These must be removed with the kidneys, '
  '16':
  - type: text
    content: 'and the priest will burn them on the altar. It is a special gift of food, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. All the fat belongs to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '17':
  - type: text
    content: “You must never eat any fat or blood. This is a permanent law for you, and it must be observed from generation to generation, wherever you live.”
  '2':
  - type: text
    content: Lay your hand on the animal’s head, and slaughter it at the entrance of the Tabernacle.
  - type: note
    content: Hebrew Tent of Meeting; also in 3:8, 13.
