document_id: ISA.50,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Was your mother sent away because I divorced her?
  - type: text
    content: Did I sell you as slaves to my creditors?
  - type: text
    content: No, you were sold because of your sins.
  - type: text
    content: And your mother, too, was taken because of your sins.
  '10':
  - type: text
    content: 'Who among you fears the '
  - type: text
    content: Lord
  - type: text
    content: and obeys his servant?
  - type: text
    content: If you are walking in darkness,
  - type: text
    content: without a ray of light,
  - type: text
    content: 'trust in the '
  - type: text
    content: Lord
  - type: text
    content: and rely on your God.
  '11':
  - type: text
    content: But watch out, you who live in your own light
  - type: text
    content: and warm yourselves by your own fires.
  - type: text
    content: 'This is the reward you will receive from me:'
  - type: text
    content: You will soon fall down in great torment.
  '2':
  - type: text
    content: Why was no one there when I came?
  - type: text
    content: Why didn’t anyone answer when I called?
  - type: text
    content: Is it because I have no power to rescue?
  - type: text
    content: No, that is not the reason!
  - type: text
    content: For I can speak to the sea and make it dry up!
  - type: text
    content: I can turn rivers into deserts covered with dying fish.
  '3':
  - type: text
    content: I dress the skies in darkness,
  - type: text
    content: covering them with clothes of mourning.”
  - type: heading
    content: The Lord’s Obedient Servant
  '4':
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' has given me his words of wisdom,'
  - type: text
    content: so that I know how to comfort the weary.
  - type: text
    content: Morning by morning he wakens me
  - type: text
    content: and opens my understanding to his will.
  '5':
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken to me,'
  - type: text
    content: and I have listened.
  - type: text
    content: I have not rebelled or turned away.
  '6':
  - type: text
    content: I offered my back to those who beat me
  - type: text
    content: and my cheeks to those who pulled out my beard.
  - type: text
    content: I did not hide my face
  - type: text
    content: from mockery and spitting.
  '7':
  - type: text
    content: 'Because the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' helps me,'
  - type: text
    content: I will not be disgraced.
  - type: text
    content: Therefore, I have set my face like a stone,
  - type: text
    content: determined to do his will.
  - type: text
    content: And I know that I will not be put to shame.
  '8':
  - type: text
    content: He who gives me justice is near.
  - type: text
    content: Who will dare to bring charges against me now?
  - type: text
    content: Where are my accusers?
  - type: text
    content: Let them appear!
  '9':
  - type: text
    content: 'See, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' is on my side!'
  - type: text
    content: Who will declare me guilty?
  - type: text
    content: All my enemies will be destroyed
  - type: text
    content: like old clothes that have been eaten by moths!
