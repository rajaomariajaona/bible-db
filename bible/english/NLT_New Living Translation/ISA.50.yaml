document_id: ISA.50,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Was your mother sent away because I divorced her?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Did I sell you as slaves to my creditors?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No, you were sold because of your sins.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your mother, too, was taken because of your sins.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who among you fears the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and obeys his servant?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you are walking in darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without a ray of light,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rely on your God.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But watch out, you who live in your own light
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and warm yourselves by your own fires.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is the reward you will receive from me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will soon fall down in great torment.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why was no one there when I came?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why didn’t anyone answer when I called?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is it because I have no power to rescue?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No, that is not the reason!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I can speak to the sea and make it dry up!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I can turn rivers into deserts covered with dying fish.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I dress the skies in darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: covering them with clothes of mourning.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Obedient Servant
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given me his words of wisdom,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that I know how to comfort the weary.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Morning by morning he wakens me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and opens my understanding to his will.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken to me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I have listened.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have not rebelled or turned away.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I offered my back to those who beat me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my cheeks to those who pulled out my beard.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I did not hide my face
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from mockery and spitting.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' helps me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not be disgraced.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, I have set my face like a stone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: determined to do his will.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I know that I will not be put to shame.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who gives me justice is near.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who will dare to bring charges against me now?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where are my accusers?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them appear!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'See, the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is on my side!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who will declare me guilty?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All my enemies will be destroyed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like old clothes that have been eaten by moths!
