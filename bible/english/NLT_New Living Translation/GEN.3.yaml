- type: usfm
  marker: s1
  children:
  - type: text
    text: The Man and Woman Sin
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The serpent was the shrewdest of all the wild animals the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God had made. One day he asked the woman, “Did God really say you must not eat the fruit from any of the trees in the garden?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Of course we may eat fruit from the trees in the garden,” the woman replied. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “It’s only the fruit from the tree in the middle of the garden that we are not allowed to eat. God said, ‘You must not eat it or even touch it; if you do, you will die.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“You won’t die!” the serpent replied to the woman. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “God knows that your eyes will be opened as soon as you eat it, and you will be like God, knowing both good and evil.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The woman was convinced. She saw that the tree was beautiful and its fruit looked delicious, and she wanted the wisdom it would give her. So she took some of the fruit and ate it. Then she gave some to her husband, who was with her, and he ate it, too. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: At that moment their eyes were opened, and they suddenly felt shame at their nakedness. So they sewed fig leaves together to cover themselves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: When the cool evening breezes were blowing, the man
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Adam, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and so throughout the chapter.
    marker-yv: yv-n
  - type: text
    text: ' and his wife heard the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God walking about in the garden. So they hid from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God among the trees. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God called to the man, “Where are you?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He replied, “I heard you walking in the garden, so I hid. I was afraid because I was naked.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Who told you that you were naked?” the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God asked. “Have you eaten from the tree whose fruit I commanded you not to eat?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The man replied, “It was the woman you gave me who gave me the fruit, and I ate it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God asked the woman, “What have you done?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: “The serpent deceived me,” she replied. “That’s why I ate it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God said to the serpent,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Because you have done this, you are cursed
- type: usfm
  marker: q2
  children:
  - type: text
    text: more than all animals, domestic and wild.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will crawl on your belly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: groveling in the dust as long as you live.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And I will cause hostility between you and the woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and between your offspring and her offspring.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will strike
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'bruise; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 3:15b.
    marker-yv: yv-n
  - type: text
    text: ' your head,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will strike his heel.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then he said to the woman,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will sharpen the pain of your pregnancy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and in pain you will give birth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you will desire to control your husband,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he will rule over you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: And though you will have desire for your husband, / he will rule over you.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And to the man he said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Since you listened to your wife and ate from the tree
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose fruit I commanded you not to eat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the ground is cursed because of you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All your life you will struggle to scratch a living from it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: It will grow thorns and thistles for you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though you will eat of its grains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: By the sweat of your brow
- type: usfm
  marker: q2
  children:
  - type: text
    text: will you have food to eat
- type: usfm
  marker: q1
  children:
  - type: text
    text: until you return to the ground
- type: usfm
  marker: q2
  children:
  - type: text
    text: from which you were made.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you were made from dust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to dust you will return.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Paradise Lost: God’s Judgment'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then the man—Adam—named his wife Eve, because she would be the mother of all who live.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:20 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Eve '
    - type: usfm
