document_id: GEN.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Man and Woman Sin
  - type: text
    content: 'The serpent was the shrewdest of all the wild animals the '
  - type: text
    content: Lord
  - type: text
    content: ' God had made. One day he asked the woman, “Did God really say you must not eat the fruit from any of the trees in the garden?”'
  '10':
  - type: text
    content: He replied, “I heard you walking in the garden, so I hid. I was afraid because I was naked.”
  '11':
  - type: text
    content: '“Who told you that you were naked?” the '
  - type: text
    content: Lord
  - type: text
    content: ' God asked. “Have you eaten from the tree whose fruit I commanded you not to eat?”'
  '12':
  - type: text
    content: The man replied, “It was the woman you gave me who gave me the fruit, and I ate it.”
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' God asked the woman, “What have you done?”'
  - type: text
    content: “The serpent deceived me,” she replied. “That’s why I ate it.”
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' God said to the serpent,'
  - type: text
    content: “Because you have done this, you are cursed
  - type: text
    content: more than all animals, domestic and wild.
  - type: text
    content: You will crawl on your belly,
  - type: text
    content: groveling in the dust as long as you live.
  '15':
  - type: text
    content: And I will cause hostility between you and the woman,
  - type: text
    content: and between your offspring and her offspring.
  - type: text
    content: He will strike
  - type: note
    content: Or bruise; also in 3:15b.
  - type: text
    content: ' your head,'
  - type: text
    content: and you will strike his heel.”
  '16':
  - type: text
    content: Then he said to the woman,
  - type: text
    content: “I will sharpen the pain of your pregnancy,
  - type: text
    content: and in pain you will give birth.
  - type: text
    content: And you will desire to control your husband,
  - type: text
    content: but he will rule over you.
  - type: note
    content: Or And though you will have desire for your husband, / he will rule over you.
  - type: text
    content: ”
  '17':
  - type: text
    content: And to the man he said,
  - type: text
    content: “Since you listened to your wife and ate from the tree
  - type: text
    content: whose fruit I commanded you not to eat,
  - type: text
    content: the ground is cursed because of you.
  - type: text
    content: All your life you will struggle to scratch a living from it.
  '18':
  - type: text
    content: It will grow thorns and thistles for you,
  - type: text
    content: though you will eat of its grains.
  '19':
  - type: text
    content: By the sweat of your brow
  - type: text
    content: will you have food to eat
  - type: text
    content: until you return to the ground
  - type: text
    content: from which you were made.
  - type: text
    content: For you were made from dust,
  - type: text
    content: and to dust you will return.”
  - type: heading
    content: 'Paradise Lost: God’s Judgment'
  '2':
  - type: text
    content: '“Of course we may eat fruit from the trees in the garden,” the woman replied. '
  '20':
  - type: text
    content: Then the man—Adam—named his wife Eve, because she would be the mother of all who live.
  - type: note
    content: Eve sounds like a Hebrew term that means “to give life.”
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' God made clothing from animal skins for Adam and his wife.'
  '22':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' God said, “Look, the human beings'
  - type: note
    content: Or the man; Hebrew reads ha-adam.
  - type: text
    content: ' have become like us, knowing both good and evil. What if they reach out, take fruit from the tree of life, and eat it? Then they will live forever!” '
  '23':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' God banished them from the Garden of Eden, and he sent Adam out to cultivate the ground from which he had been made. '
  '24':
  - type: text
    content: 'After sending them out, the '
  - type: text
    content: Lord
  - type: text
    content: ' God stationed mighty cherubim to the east of the Garden of Eden. And he placed a flaming sword that flashed back and forth to guard the way to the tree of life.'
  '3':
  - type: text
    content: “It’s only the fruit from the tree in the middle of the garden that we are not allowed to eat. God said, ‘You must not eat it or even touch it; if you do, you will die.’”
  '4':
  - type: text
    content: '“You won’t die!” the serpent replied to the woman. '
  '5':
  - type: text
    content: “God knows that your eyes will be opened as soon as you eat it, and you will be like God, knowing both good and evil.”
  '6':
  - type: text
    content: 'The woman was convinced. She saw that the tree was beautiful and its fruit looked delicious, and she wanted the wisdom it would give her. So she took some of the fruit and ate it. Then she gave some to her husband, who was with her, and he ate it, too. '
  '7':
  - type: text
    content: At that moment their eyes were opened, and they suddenly felt shame at their nakedness. So they sewed fig leaves together to cover themselves.
  '8':
  - type: text
    content: When the cool evening breezes were blowing, the man
  - type: note
    content: Or Adam, and so throughout the chapter.
  - type: text
    content: ' and his wife heard the '
  - type: text
    content: Lord
  - type: text
    content: ' God walking about in the garden. So they hid from the '
  - type: text
    content: Lord
  - type: text
    content: ' God among the trees. '
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' God called to the man, “Where are you?”'
