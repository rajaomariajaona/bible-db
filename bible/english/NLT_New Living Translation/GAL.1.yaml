document_id: GAL.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings from Paul
  - type: text
    content: This letter is from Paul, an apostle. I was not appointed by any group of people or any human authority, but by Jesus Christ himself and by God the Father, who raised Jesus from the dead.
  '10':
  - type: text
    content: Obviously, I’m not trying to win the approval of people, but of God. If pleasing people were my goal, I would not be Christ’s servant.
  - type: heading
    content: Paul’s Message Comes from Christ
  '11':
  - type: text
    content: 'Dear brothers and sisters, I want you to understand that the gospel message I preach is not based on mere human reasoning. '
  '12':
  - type: text
    content: I received my message from no human source, and no one taught me. Instead, I received it by direct revelation from Jesus Christ.
  - type: note
    content: Or by the revelation of Jesus Christ.
  '13':
  - type: text
    content: 'You know what I was like when I followed the Jewish religion—how I violently persecuted God’s church. I did my best to destroy it. '
  '14':
  - type: text
    content: I was far ahead of my fellow Jews in my zeal for the traditions of my ancestors.
  '15':
  - type: text
    content: 'But even before I was born, God chose me and called me by his marvelous grace. Then it pleased him '
  '16':
  - type: text
    content: to reveal his Son to me
  - type: note
    content: Or in me.
  - type: text
    content: ' so that I would proclaim the Good News about Jesus to the Gentiles.'
  - type: text
    content: When this happened, I did not rush out to consult with any human being.
  - type: note
    content: Greek with flesh and blood.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Nor did I go up to Jerusalem to consult with those who were apostles before I was. Instead, I went away into Arabia, and later I returned to the city of Damascus.
  '18':
  - type: text
    content: Then three years later I went to Jerusalem to get to know Peter,
  - type: note
    content: Greek Cephas.
  - type: text
    content: ' and I stayed with him for fifteen days. '
  '19':
  - type: text
    content: 'The only other apostle I met at that time was James, the Lord’s brother. '
  '2':
  - type: text
    content: All the brothers and sisters
  - type: note
    content: Greek brothers; also in 1:11.
  - type: text
    content: ' here join me in sending this letter to the churches of Galatia.'
  '20':
  - type: text
    content: I declare before God that what I am writing to you is not a lie.
  '21':
  - type: text
    content: 'After that visit I went north into the provinces of Syria and Cilicia. '
  '22':
  - type: text
    content: 'And still the churches in Christ that are in Judea didn’t know me personally. '
  '23':
  - type: text
    content: 'All they knew was that people were saying, “The one who used to persecute us is now preaching the very faith he tried to destroy!” '
  '24':
  - type: text
    content: And they praised God because of me.
  '3':
  - type: text
    content: May God the Father and our Lord Jesus Christ
  - type: note
    content: Some manuscripts read God our Father and the Lord Jesus Christ.
  - type: text
    content: ' give you grace and peace. '
  '4':
  - type: text
    content: 'Jesus gave his life for our sins, just as God our Father planned, in order to rescue us from this evil world in which we live. '
  '5':
  - type: text
    content: All glory to God forever and ever! Amen.
  - type: heading
    content: There Is Only One Good News
  '6':
  - type: text
    content: I am shocked that you are turning away so soon from God, who called you to himself through the loving mercy of Christ.
  - type: note
    content: Some manuscripts read through loving mercy.
  - type: text
    content: ' You are following a different way that pretends to be the Good News '
  '7':
  - type: text
    content: but is not the Good News at all. You are being fooled by those who deliberately twist the truth concerning Christ.
  '8':
  - type: text
    content: 'Let God’s curse fall on anyone, including us or even an angel from heaven, who preaches a different kind of Good News than the one we preached to you. '
  '9':
  - type: text
    content: 'I say again what we have said before: If anyone preaches any other Good News than the one you welcomed, let that person be cursed.'
