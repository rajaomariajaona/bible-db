document_id: GAL.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greetings from Paul
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: This letter is from Paul, an apostle. I was not appointed by any group of people or any human authority, but by Jesus Christ himself and by God the Father, who raised Jesus from the dead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: All the brothers and sisters
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'brothers; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 1:11.
    marker-yv: yv-n
  - type: text
    text: ' here join me in sending this letter to the churches of Galatia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: May God the Father and our Lord Jesus Christ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: God our Father and the Lord Jesus Christ.
    marker-yv: yv-n
  - type: text
    text: ' give you grace and peace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jesus gave his life for our sins, just as God our Father planned, in order to rescue us from this evil world in which we live. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: All glory to God forever and ever! Amen.
- type: usfm
  marker: s1
  children:
  - type: text
    text: There Is Only One Good News
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I am shocked that you are turning away so soon from God, who called you to himself through the loving mercy of Christ.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: through loving mercy.
    marker-yv: yv-n
  - type: text
    text: ' You are following a different way that pretends to be the Good News '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: but is not the Good News at all. You are being fooled by those who deliberately twist the truth concerning Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Let God’s curse fall on anyone, including us or even an angel from heaven, who preaches a different kind of Good News than the one we preached to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I say again what we have said before: If anyone preaches any other Good News than the one you welcomed, let that person be cursed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Obviously, I’m not trying to win the approval of people, but of God. If pleasing people were my goal, I would not be Christ’s servant.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Message Comes from Christ
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dear brothers and sisters, I want you to understand that the gospel message I preach is not based on mere human reasoning. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I received my message from no human source, and no one taught me. Instead, I received it by direct revelation from Jesus Christ.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: by the revelation of Jesus Christ.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'You know what I was like when I followed the Jewish religion—how I violently persecuted God’s church. I did my best to destroy it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I was far ahead of my fellow Jews in my zeal for the traditions of my ancestors.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But even before I was born, God chose me and called me by his marvelous grace. Then it pleased him '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: to reveal his Son to me
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:16a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in me.
    marker-yv: yv-n
  - type: text
    text: ' so that I would proclaim the Good News about Jesus to the Gentiles.'
- type: usfm
  marker: p
  children:
  - type: text
    text: When this happened, I did not rush out to consult with any human being.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:16b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: with flesh and blood.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nor did I go up to Jerusalem to consult with those who were apostles before I was. Instead, I went away into Arabia, and later I returned to the city of Damascus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then three years later I went to Jerusalem to get to know Peter,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Cephas.
    marker-yv: yv-n
  - type: text
    text: ' and I stayed with him for fifteen days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The only other apostle I met at that time was James, the Lord’s brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I declare before God that what I am writing to you is not a lie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'After that visit I went north into the provinces of Syria and Cilicia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And still the churches in Christ that are in Judea didn’t know me personally. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'All they knew was that people were saying, “The one who used to persecute us is now preaching the very faith he tried to destroy!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And they praised God because of me.
