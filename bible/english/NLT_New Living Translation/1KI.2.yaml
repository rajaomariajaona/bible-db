document_id: 1KI.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Final Instructions to Solomon
  - type: text
    content: 'As the time of King David’s death approached, he gave this charge to his son Solomon:'
  '10':
  - type: text
    content: 'Then David died and was buried with his ancestors in the City of David. '
  '11':
  - type: text
    content: 'David had reigned over Israel for forty years, seven of them in Hebron and thirty-three in Jerusalem. '
  '12':
  - type: text
    content: Solomon became king and sat on the throne of David his father, and his kingdom was firmly established.
  - type: heading
    content: Solomon Establishes His Rule
  '13':
  - type: text
    content: One day Adonijah, whose mother was Haggith, came to see Bathsheba, Solomon’s mother. “Have you come with peaceful intentions?” she asked him.
  - type: text
    content: '“Yes,” he said, “I come in peace. '
  '14':
  - type: text
    content: In fact, I have a favor to ask of you.”
  - type: text
    content: “What is it?” she asked.
  '15':
  - type: text
    content: 'He replied, “As you know, the kingdom was rightfully mine; all Israel wanted me to be the next king. But the tables were turned, and the kingdom went to my brother instead; for that is the way the '
  - type: text
    content: Lord
  - type: text
    content: ' wanted it. '
  '16':
  - type: text
    content: So now I have just one favor to ask of you. Please don’t turn me down.”
  - type: text
    content: “What is it?” she asked.
  '17':
  - type: text
    content: He replied, “Speak to King Solomon on my behalf, for I know he will do anything you request. Ask him to let me marry Abishag, the girl from Shunem.”
  '18':
  - type: text
    content: “All right,” Bathsheba replied. “I will speak to the king for you.”
  '19':
  - type: text
    content: So Bathsheba went to King Solomon to speak on Adonijah’s behalf. The king rose from his throne to meet her, and he bowed down before her. When he sat down on his throne again, the king ordered that a throne be brought for his mother, and she sat at his right hand.
  '2':
  - type: text
    content: '“I am going where everyone on earth must someday go. Take courage and be a man. '
  '20':
  - type: text
    content: “I have one small request to make of you,” she said. “I hope you won’t turn me down.”
  - type: text
    content: “What is it, my mother?” he asked. “You know I won’t refuse you.”
  '21':
  - type: text
    content: “Then let your brother Adonijah marry Abishag, the girl from Shunem,” she replied.
  '22':
  - type: text
    content: “How can you possibly ask me to give Abishag to Adonijah?” King Solomon demanded. “You might as well ask me to give him the kingdom! You know that he is my older brother, and that he has Abiathar the priest and Joab son of Zeruiah on his side.”
  '23':
  - type: text
    content: 'Then King Solomon made a vow before the '
  - type: text
    content: Lord
  - type: text
    content: ': “May God strike me and even kill me if Adonijah has not sealed his fate with this request. '
  '24':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has confirmed me and placed me on the throne of my father, David; he has established my dynasty as he promised. So as surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, Adonijah will die this very day!” '
  '25':
  - type: text
    content: So King Solomon ordered Benaiah son of Jehoiada to execute him, and Adonijah was put to death.
  '26':
  - type: text
    content: 'Then the king said to Abiathar the priest, “Go back to your home in Anathoth. You deserve to die, but I will not kill you now, because you carried the Ark of the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' for David my father and you shared all his hardships.” '
  '27':
  - type: text
    content: 'So Solomon deposed Abiathar from his position as priest of the '
  - type: text
    content: Lord
  - type: text
    content: ', thereby fulfilling the prophecy the '
  - type: text
    content: Lord
  - type: text
    content: ' had given at Shiloh concerning the descendants of Eli.'
  '28':
  - type: text
    content: 'Joab had not joined Absalom’s earlier rebellion, but he had joined Adonijah’s rebellion. So when Joab heard about Adonijah’s death, he ran to the sacred tent of the '
  - type: text
    content: Lord
  - type: text
    content: ' and grabbed on to the horns of the altar. '
  '29':
  - type: text
    content: When this was reported to King Solomon, he sent Benaiah son of Jehoiada to execute him.
  '3':
  - type: text
    content: 'Observe the requirements of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and follow all his ways. Keep the decrees, commands, regulations, and laws written in the Law of Moses so that you will be successful in all you do and wherever you go. '
  '30':
  - type: text
    content: 'Benaiah went to the sacred tent of the '
  - type: text
    content: Lord
  - type: text
    content: ' and said to Joab, “The king orders you to come out!”'
  - type: text
    content: But Joab answered, “No, I will die here.”
  - type: text
    content: So Benaiah returned to the king and told him what Joab had said.
  '31':
  - type: text
    content: '“Do as he said,” the king replied. “Kill him there beside the altar and bury him. This will remove the guilt of Joab’s senseless murders from me and from my father’s family. '
  '32':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will repay him'
  - type: note
    content: Hebrew will return his blood on his own head.
  - type: text
    content: ' for the murders of two men who were more righteous and better than he. For my father knew nothing about the deaths of Abner son of Ner, commander of the army of Israel, and of Amasa son of Jether, commander of the army of Judah. '
  '33':
  - type: text
    content: 'May their blood be on Joab and his descendants forever, and may the '
  - type: text
    content: Lord
  - type: text
    content: ' grant peace forever to David, his descendants, his dynasty, and his throne.”'
  '34':
  - type: text
    content: 'So Benaiah son of Jehoiada returned to the sacred tent and killed Joab, and he was buried at his home in the wilderness. '
  '35':
  - type: text
    content: Then the king appointed Benaiah to command the army in place of Joab, and he installed Zadok the priest to take the place of Abiathar.
  '36':
  - type: text
    content: 'The king then sent for Shimei and told him, “Build a house here in Jerusalem and live there. But don’t step outside the city to go anywhere else. '
  '37':
  - type: text
    content: On the day you so much as cross the Kidron Valley, you will surely die; and your blood will be on your own head.”
  '38':
  - type: text
    content: Shimei replied, “Your sentence is fair; I will do whatever my lord the king commands.” So Shimei lived in Jerusalem for a long time.
  '39':
  - type: text
    content: 'But three years later two of Shimei’s slaves ran away to King Achish son of Maacah of Gath. When Shimei learned where they were, '
  '4':
  - type: text
    content: 'If you do this, then the '
  - type: text
    content: Lord
  - type: text
    content: ' will keep the promise he made to me. He told me, ‘If your descendants live as they should and follow me faithfully with all their heart and soul, one of them will always sit on the throne of Israel.’'
  '40':
  - type: text
    content: he saddled his donkey and went to Gath to search for them. When he found them, he brought them back to Jerusalem.
  '41':
  - type: text
    content: 'Solomon heard that Shimei had left Jerusalem and had gone to Gath and returned. '
  '42':
  - type: text
    content: 'So the king sent for Shimei and demanded, “Didn’t I make you swear by the '
  - type: text
    content: Lord
  - type: text
    content: ' and warn you not to go anywhere else or you would surely die? And you replied, ‘The sentence is fair; I will do as you say.’ '
  '43':
  - type: text
    content: 'Then why haven’t you kept your oath to the '
  - type: text
    content: Lord
  - type: text
    content: ' and obeyed my command?”'
  '44':
  - type: text
    content: 'The king also said to Shimei, “You certainly remember all the wicked things you did to my father, David. May the '
  - type: text
    content: Lord
  - type: text
    content: ' now bring that evil on your own head. '
  '45':
  - type: text
    content: 'But may I, King Solomon, receive the '
  - type: text
    content: Lord
  - type: text
    content: '’s blessings, and may one of David’s descendants always sit on this throne in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '46':
  - type: text
    content: Then, at the king’s command, Benaiah son of Jehoiada took Shimei outside and killed him.
  - type: text
    content: So the kingdom was now firmly in Solomon’s grip.
  '5':
  - type: text
    content: “And there is something else. You know what Joab son of Zeruiah did to me when he murdered my two army commanders, Abner son of Ner and Amasa son of Jether. He pretended that it was an act of war, but it was done in a time of peace,
  - type: note
    content: Or He murdered them during a time of peace as revenge for deaths they had caused in time of war.
  - type: text
    content: ' staining his belt and sandals with innocent blood.'
  - type: note
    content: As in some Greek and Old Latin manuscripts; Hebrew reads with the blood of war.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Do with him what you think best, but don’t let him grow old and go to his grave in peace.
  - type: note
    content: Hebrew don’t let his white head go down to Sheol in peace.
  '7':
  - type: text
    content: “Be kind to the sons of Barzillai of Gilead. Make them permanent guests at your table, for they took care of me when I fled from your brother Absalom.
  '8':
  - type: text
    content: '“And remember Shimei son of Gera, the man from Bahurim in Benjamin. He cursed me with a terrible curse as I was fleeing to Mahanaim. When he came down to meet me at the Jordan River, I swore by the '
  - type: text
    content: Lord
  - type: text
    content: ' that I would not kill him. '
  '9':
  - type: text
    content: But that oath does not make him innocent. You are a wise man, and you will know how to arrange a bloody death for him.
  - type: note
    content: Hebrew how to bring his white head down to Sheol in blood.
  - type: text
    content: ”
