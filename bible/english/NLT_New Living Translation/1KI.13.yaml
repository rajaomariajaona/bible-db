document_id: 1KI.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prophet Denounces Jeroboam
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'At the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s command, a man of God from Judah went to Bethel, arriving there just as Jeroboam was approaching the altar to burn incense. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he left Bethel and went home another way.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As it happened, there was an old prophet living in Bethel, and his sons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son.
      marker-yv: yv-n
    - type: text
      text: ' came home and told him what the man of God had done in Bethel that day. They also told their father what the man had said to the king. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The old prophet asked them, “Which way did he go?” So they showed their father
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: They had seen.
      marker-yv: yv-n
    - type: text
      text: ' which road the man of God had taken. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Quick, saddle the donkey,” the old man said. So they saddled the donkey for him, and he mounted it.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he rode after the man of God and found him sitting under a great tree. The old prophet asked him, “Are you the man of God who came from Judah?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, I am,” he replied.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he said to the man of God, “Come home with me and eat some food.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“No, I cannot,” he replied. “I am not allowed to eat or drink anything here in this place. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave me this command: ‘You must not eat or drink anything while you are there, and do not return to Judah by the same way you came.’”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the old prophet answered, “I am a prophet, too, just as you are. And an angel gave me this command from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': ‘Bring him home with you so he can have something to eat and drink.’” But the old man was lying to him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they went back together, and the man of God ate and drank at the prophet’s home.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then at the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s command, he shouted, “O altar, altar! This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: A child named Josiah will be born into the dynasty of David. On you he will sacrifice the priests from the pagan shrines who come here to burn incense, and human bones will be burned on you.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then while they were sitting at the table, a command from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to the old prophet. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He cried out to the man of God from Judah, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: You have defied the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and have disobeyed the command the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God gave you. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You came back to this place and ate and drank where he told you not to eat or drink. Because of this, your body will not be buried in the grave of your ancestors.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the man of God had finished eating and drinking, the old prophet saddled his own donkey for him, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the man of God started off again. But as he was traveling along, a lion came out and killed him. His body lay there on the road, with the donkey and the lion standing beside it. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: People who passed by saw the body lying in the road and the lion standing beside it, and they went and reported it in Bethel, where the old prophet lived.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the prophet heard the report, he said, “It is the man of God who disobeyed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s command. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has fulfilled his word by causing the lion to attack and kill him.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the prophet said to his sons, “Saddle a donkey for me.” So they saddled a donkey, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he went out and found the body lying in the road. The donkey and lion were still standing there beside it, for the lion had not eaten the body nor attacked the donkey. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the prophet laid the body of the man of God on the donkey and took it back to the town to mourn over him and bury him. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'That same day the man of God gave a sign to prove his message. He said, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has promised to give this sign: This altar will split apart, and its ashes will be poured out on the ground.”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He laid the body in his own grave, crying out in grief, “Oh, my brother!”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward the prophet said to his sons, “When I die, bury me in the grave where the man of God is buried. Lay my bones beside his bones. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the message the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told him to proclaim against the altar in Bethel and against the pagan shrines in the towns of Samaria will certainly come true.”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But even after this, Jeroboam did not turn from his evil ways. He continued to choose priests from the common people. He appointed anyone who wanted to become a priest for the pagan shrines. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This became a great sin and resulted in the utter destruction of Jeroboam’s dynasty from the face of the earth.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When King Jeroboam heard the man of God speaking against the altar at Bethel, he pointed at him and shouted, “Seize that man!” But instantly the king’s hand became paralyzed in that position, and he couldn’t pull it back. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the same time a wide crack appeared in the altar, and the ashes poured out, just as the man of God had predicted in his message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king cried out to the man of God, “Please ask the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God to restore my hand again!” So the man of God prayed to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the king’s hand was restored and he could move it again.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the king said to the man of God, “Come to the palace with me and have something to eat, and I will give you a gift.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the man of God said to the king, “Even if you gave me half of everything you own, I would not go with you. I would not eat or drink anything in this place. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave me this command: ‘You must not eat or drink anything while you are there, and do not return to Judah by the same way you came.’” '
