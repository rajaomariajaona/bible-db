document_id: 1KI.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophet Denounces Jeroboam
  - type: text
    content: 'At the '
  - type: text
    content: Lord
  - type: text
    content: '’s command, a man of God from Judah went to Bethel, arriving there just as Jeroboam was approaching the altar to burn incense. '
  '10':
  - type: text
    content: So he left Bethel and went home another way.
  '11':
  - type: text
    content: As it happened, there was an old prophet living in Bethel, and his sons
  - type: note
    content: As in Greek version; Hebrew reads son.
  - type: text
    content: ' came home and told him what the man of God had done in Bethel that day. They also told their father what the man had said to the king. '
  '12':
  - type: text
    content: The old prophet asked them, “Which way did he go?” So they showed their father
  - type: note
    content: As in Greek version; Hebrew reads They had seen.
  - type: text
    content: ' which road the man of God had taken. '
  '13':
  - type: text
    content: “Quick, saddle the donkey,” the old man said. So they saddled the donkey for him, and he mounted it.
  '14':
  - type: text
    content: Then he rode after the man of God and found him sitting under a great tree. The old prophet asked him, “Are you the man of God who came from Judah?”
  - type: text
    content: “Yes, I am,” he replied.
  '15':
  - type: text
    content: Then he said to the man of God, “Come home with me and eat some food.”
  '16':
  - type: text
    content: '“No, I cannot,” he replied. “I am not allowed to eat or drink anything here in this place. '
  '17':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' gave me this command: ‘You must not eat or drink anything while you are there, and do not return to Judah by the same way you came.’”'
  '18':
  - type: text
    content: 'But the old prophet answered, “I am a prophet, too, just as you are. And an angel gave me this command from the '
  - type: text
    content: Lord
  - type: text
    content: ': ‘Bring him home with you so he can have something to eat and drink.’” But the old man was lying to him. '
  '19':
  - type: text
    content: So they went back together, and the man of God ate and drank at the prophet’s home.
  '2':
  - type: text
    content: 'Then at the '
  - type: text
    content: Lord
  - type: text
    content: '’s command, he shouted, “O altar, altar! This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: A child named Josiah will be born into the dynasty of David. On you he will sacrifice the priests from the pagan shrines who come here to burn incense, and human bones will be burned on you.” '
  '20':
  - type: text
    content: 'Then while they were sitting at the table, a command from the '
  - type: text
    content: Lord
  - type: text
    content: ' came to the old prophet. '
  '21':
  - type: text
    content: 'He cried out to the man of God from Judah, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: You have defied the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' and have disobeyed the command the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gave you. '
  '22':
  - type: text
    content: You came back to this place and ate and drank where he told you not to eat or drink. Because of this, your body will not be buried in the grave of your ancestors.”
  '23':
  - type: text
    content: 'After the man of God had finished eating and drinking, the old prophet saddled his own donkey for him, '
  '24':
  - type: text
    content: 'and the man of God started off again. But as he was traveling along, a lion came out and killed him. His body lay there on the road, with the donkey and the lion standing beside it. '
  '25':
  - type: text
    content: People who passed by saw the body lying in the road and the lion standing beside it, and they went and reported it in Bethel, where the old prophet lived.
  '26':
  - type: text
    content: 'When the prophet heard the report, he said, “It is the man of God who disobeyed the '
  - type: text
    content: Lord
  - type: text
    content: '’s command. The '
  - type: text
    content: Lord
  - type: text
    content: ' has fulfilled his word by causing the lion to attack and kill him.”'
  '27':
  - type: text
    content: 'Then the prophet said to his sons, “Saddle a donkey for me.” So they saddled a donkey, '
  '28':
  - type: text
    content: 'and he went out and found the body lying in the road. The donkey and lion were still standing there beside it, for the lion had not eaten the body nor attacked the donkey. '
  '29':
  - type: text
    content: 'So the prophet laid the body of the man of God on the donkey and took it back to the town to mourn over him and bury him. '
  '3':
  - type: text
    content: 'That same day the man of God gave a sign to prove his message. He said, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has promised to give this sign: This altar will split apart, and its ashes will be poured out on the ground.”'
  '30':
  - type: text
    content: He laid the body in his own grave, crying out in grief, “Oh, my brother!”
  '31':
  - type: text
    content: 'Afterward the prophet said to his sons, “When I die, bury me in the grave where the man of God is buried. Lay my bones beside his bones. '
  '32':
  - type: text
    content: 'For the message the '
  - type: text
    content: Lord
  - type: text
    content: ' told him to proclaim against the altar in Bethel and against the pagan shrines in the towns of Samaria will certainly come true.”'
  '33':
  - type: text
    content: 'But even after this, Jeroboam did not turn from his evil ways. He continued to choose priests from the common people. He appointed anyone who wanted to become a priest for the pagan shrines. '
  '34':
  - type: text
    content: This became a great sin and resulted in the utter destruction of Jeroboam’s dynasty from the face of the earth.
  '4':
  - type: text
    content: 'When King Jeroboam heard the man of God speaking against the altar at Bethel, he pointed at him and shouted, “Seize that man!” But instantly the king’s hand became paralyzed in that position, and he couldn’t pull it back. '
  '5':
  - type: text
    content: 'At the same time a wide crack appeared in the altar, and the ashes poured out, just as the man of God had predicted in his message from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: 'The king cried out to the man of God, “Please ask the '
  - type: text
    content: Lord
  - type: text
    content: ' your God to restore my hand again!” So the man of God prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', and the king’s hand was restored and he could move it again.'
  '7':
  - type: text
    content: Then the king said to the man of God, “Come to the palace with me and have something to eat, and I will give you a gift.”
  '8':
  - type: text
    content: 'But the man of God said to the king, “Even if you gave me half of everything you own, I would not go with you. I would not eat or drink anything in this place. '
  '9':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' gave me this command: ‘You must not eat or drink anything while you are there, and do not return to Judah by the same way you came.’” '
