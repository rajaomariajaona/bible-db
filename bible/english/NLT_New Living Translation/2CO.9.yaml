document_id: 2CO.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Collection for Christians in Jerusalem
  - type: text
    content: I really don’t need to write to you about this ministry of giving for the believers in Jerusalem.
  - type: note
    content: Greek about the offering for God’s holy people.
  - type: text
    content: ' '
  '10':
  - type: text
    content: For God is the one who provides seed for the farmer and then bread to eat. In the same way, he will provide and increase your resources and then produce a great harvest of generosity
  - type: note
    content: Greek righteousness.
  - type: text
    content: ' in you.'
  '11':
  - type: text
    content: 'Yes, you will be enriched in every way so that you can always be generous. And when we take your gifts to those who need them, they will thank God. '
  '12':
  - type: text
    content: So two good things will result from this ministry of giving—the needs of the believers in Jerusalem
  - type: note
    content: Greek of God’s holy people.
  - type: text
    content: ' will be met, and they will joyfully express their thanks to God.'
  '13':
  - type: text
    content: 'As a result of your ministry, they will give glory to God. For your generosity to them and to all believers will prove that you are obedient to the Good News of Christ. '
  '14':
  - type: text
    content: 'And they will pray for you with deep affection because of the overflowing grace God has given to you. '
  '15':
  - type: text
    content: Thank God for this gift
  - type: note
    content: Greek his gift.
  - type: text
    content: ' too wonderful for words!'
  '2':
  - type: text
    content: For I know how eager you are to help, and I have been boasting to the churches in Macedonia that you in Greece
  - type: note
    content: Greek in Achaia, the southern region of the Greek peninsula. Macedonia was in the northern region of Greece.
  - type: text
    content: ' were ready to send an offering a year ago. In fact, it was your enthusiasm that stirred up many of the Macedonian believers to begin giving.'
  '3':
  - type: text
    content: 'But I am sending these brothers to be sure you really are ready, as I have been telling them, and that your money is all collected. I don’t want to be wrong in my boasting about you. '
  '4':
  - type: text
    content: 'We would be embarrassed—not to mention your own embarrassment—if some Macedonian believers came with me and found that you weren’t ready after all I had told them! '
  '5':
  - type: text
    content: So I thought I should send these brothers ahead of me to make sure the gift you promised is ready. But I want it to be a willing gift, not one given grudgingly.
  '6':
  - type: text
    content: 'Remember this—a farmer who plants only a few seeds will get a small crop. But the one who plants generously will get a generous crop. '
  '7':
  - type: text
    content: You must each decide in your heart how much to give. And don’t give reluctantly or in response to pressure. “For God loves a person who gives cheerfully.”
  - type: note
    content: See footnote on Prov 22:8.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'And God will generously provide all you need. Then you will always have everything you need and plenty left over to share with others. '
  '9':
  - type: text
    content: As the Scriptures say,
  - type: text
    content: “They share freely and give generously to the poor.
  - type: text
    content: Their good deeds will be remembered forever.”
  - type: note
    content: Ps 112:9.
