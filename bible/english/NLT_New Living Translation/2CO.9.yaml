document_id: 2CO.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Collection for Christians in Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I really don’t need to write to you about this ministry of giving for the believers in Jerusalem.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: about the offering for God’s holy people.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For God is the one who provides seed for the farmer and then bread to eat. In the same way, he will provide and increase your resources and then produce a great harvest of generosity
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: righteousness.
      marker-yv: yv-n
    - type: text
      text: ' in you.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Yes, you will be enriched in every way so that you can always be generous. And when we take your gifts to those who need them, they will thank God. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: So two good things will result from this ministry of giving—the needs of the believers in Jerusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of God’s holy people.
      marker-yv: yv-n
    - type: text
      text: ' will be met, and they will joyfully express their thanks to God.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'As a result of your ministry, they will give glory to God. For your generosity to them and to all believers will prove that you are obedient to the Good News of Christ. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And they will pray for you with deep affection because of the overflowing grace God has given to you. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Thank God for this gift
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his gift.
      marker-yv: yv-n
    - type: text
      text: ' too wonderful for words!'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: For I know how eager you are to help, and I have been boasting to the churches in Macedonia that you in Greece
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in Achaia, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'the southern region of the Greek peninsula. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Macedonia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was in the northern region of Greece.
      marker-yv: yv-n
    - type: text
      text: ' were ready to send an offering a year ago. In fact, it was your enthusiasm that stirred up many of the Macedonian believers to begin giving.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But I am sending these brothers to be sure you really are ready, as I have been telling them, and that your money is all collected. I don’t want to be wrong in my boasting about you. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'We would be embarrassed—not to mention your own embarrassment—if some Macedonian believers came with me and found that you weren’t ready after all I had told them! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: So I thought I should send these brothers ahead of me to make sure the gift you promised is ready. But I want it to be a willing gift, not one given grudgingly.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Remember this—a farmer who plants only a few seeds will get a small crop. But the one who plants generously will get a generous crop. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: You must each decide in your heart how much to give. And don’t give reluctantly or in response to pressure. “For God loves a person who gives cheerfully.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See footnote on Prov 22:8.
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And God will generously provide all you need. Then you will always have everything you need and plenty left over to share with others. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: As the Scriptures say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They share freely and give generously to the poor.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their good deeds will be remembered forever.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 112:9.
      marker-yv: yv-n
