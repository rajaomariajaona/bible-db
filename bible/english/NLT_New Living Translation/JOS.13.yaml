document_id: JOS.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Land Yet to Be Conquered
  - type: text
    content: 'When Joshua was an old man, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “You are growing old, and much land remains to be conquered. '
  '10':
  - type: text
    content: 'It also included all the towns of King Sihon of the Amorites, who had reigned in Heshbon, and extended as far as the borders of Ammon. '
  '11':
  - type: text
    content: 'It included Gilead, the territory of the kingdoms of Geshur and Maacah, all of Mount Hermon, all of Bashan as far as Salecah, '
  '12':
  - type: text
    content: 'and all the territory of King Og of Bashan, who had reigned in Ashtaroth and Edrei. King Og was the last of the Rephaites, for Moses had attacked them and driven them out. '
  '13':
  - type: text
    content: But the Israelites failed to drive out the people of Geshur and Maacah, so they continue to live among the Israelites to this day.
  - type: heading
    content: An Allotment for the Tribe of Levi
  '14':
  - type: text
    content: 'Moses did not assign any allotment of land to the tribe of Levi. Instead, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had promised them, their allotment came from the offerings burned on the altar to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel.'
  - type: heading
    content: The Land Given to the Tribe of Reuben
  '15':
  - type: text
    content: Moses had assigned the following area to the clans of the tribe of Reuben.
  '16':
  - type: text
    content: 'Their territory extended from Aroer on the edge of the Arnon Gorge (including the town in the middle of the gorge) to the plain beyond Medeba. '
  '17':
  - type: text
    content: 'It included Heshbon and the other towns on the plain—Dibon, Bamoth-baal, Beth-baal-meon, '
  '18':
  - type: text
    content: 'Jahaz, Kedemoth, Mephaath, '
  '19':
  - type: text
    content: 'Kiriathaim, Sibmah, Zereth-shahar on the hill above the valley, '
  '2':
  - type: text
    content: 'This is the territory that remains: all the regions of the Philistines and the Geshurites, '
  '20':
  - type: text
    content: Beth-peor, the slopes of Pisgah, and Beth-jeshimoth.
  '21':
  - type: text
    content: 'The land of Reuben also included all the towns of the plain and the entire kingdom of Sihon. Sihon was the Amorite king who had reigned in Heshbon and was killed by Moses along with the leaders of Midian—Evi, Rekem, Zur, Hur, and Reba—princes living in the region who were allied with Sihon. '
  '22':
  - type: text
    content: 'The Israelites had also killed Balaam son of Beor, who used magic to tell the future. '
  '23':
  - type: text
    content: The Jordan River marked the western boundary for the tribe of Reuben. The towns and their surrounding villages in this area were given as a homeland to the clans of the tribe of Reuben.
  - type: heading
    content: The Land Given to the Tribe of Gad
  '24':
  - type: text
    content: Moses had assigned the following area to the clans of the tribe of Gad.
  '25':
  - type: text
    content: Their territory included Jazer, all the towns of Gilead, and half of the land of Ammon, as far as the town of Aroer just west of
  - type: note
    content: Hebrew in front of.
  - type: text
    content: ' Rabbah. '
  '26':
  - type: text
    content: It extended from Heshbon to Ramath-mizpeh and Betonim, and from Mahanaim to the territory of Lo-debar.
  - type: note
    content: Hebrew Li-debir, apparently a variant spelling of Lo-debar (compare 2 Sam 9:4; 17:27; Amos 6:13).
  - type: text
    content: ' '
  '27':
  - type: text
    content: In the valley were Beth-haram, Beth-nimrah, Succoth, Zaphon, and the rest of the kingdom of King Sihon of Heshbon. The western boundary ran along the Jordan River, extended as far north as the tip of the Sea of Galilee,
  - type: note
    content: Hebrew Sea of Kinnereth.
  - type: text
    content: ' and then turned eastward. '
  '28':
  - type: text
    content: The towns and their surrounding villages in this area were given as a homeland to the clans of the tribe of Gad.
  - type: heading
    content: The Land Given to the Half-Tribe of Manasseh
  '29':
  - type: text
    content: Moses had assigned the following area to the clans of the half-tribe of Manasseh.
  '3':
  - type: text
    content: 'and the larger territory of the Canaanites, extending from the stream of Shihor on the border of Egypt, northward to the boundary of Ekron. It includes the territory of the five Philistine rulers of Gaza, Ashdod, Ashkelon, Gath, and Ekron. The land of the Avvites '
  '30':
  - type: text
    content: 'Their territory extended from Mahanaim, including all of Bashan, all the former kingdom of King Og, and the sixty towns of Jair in Bashan. '
  '31':
  - type: text
    content: It also included half of Gilead and King Og’s royal cities of Ashtaroth and Edrei. All this was given to the clans of the descendants of Makir, who was Manasseh’s son.
  '32':
  - type: text
    content: 'These are the allotments Moses had made while he was on the plains of Moab, across the Jordan River, east of Jericho. '
  '33':
  - type: text
    content: 'But Moses gave no allotment of land to the tribe of Levi, for the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, had promised that he himself would be their allotment.'
  '4':
  - type: text
    content: 'in the south also remains to be conquered. In the north, the following area has not yet been conquered: all the land of the Canaanites, including Mearah (which belongs to the Sidonians), stretching northward to Aphek on the border of the Amorites; '
  '5':
  - type: text
    content: 'the land of the Gebalites and all of the Lebanon mountain area to the east, from Baal-gad below Mount Hermon to Lebo-hamath; '
  '6':
  - type: text
    content: and all the hill country from Lebanon to Misrephoth-maim, including all the land of the Sidonians.
  - type: text
    content: '“I myself will drive these people out of the land ahead of the Israelites. So be sure to give this land to Israel as a special possession, just as I have commanded you. '
  '7':
  - type: text
    content: Include all this territory as Israel’s possession when you divide this land among the nine tribes and the half-tribe of Manasseh.”
  - type: heading
    content: The Land Divided East of the Jordan
  '8':
  - type: text
    content: 'Half the tribe of Manasseh and the tribes of Reuben and Gad had already received their grants of land on the east side of the Jordan, for Moses, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', had previously assigned this land to them.'
  '9':
  - type: text
    content: 'Their territory extended from Aroer on the edge of the Arnon Gorge (including the town in the middle of the gorge) to the plain beyond Medeba, as far as Dibon. '
