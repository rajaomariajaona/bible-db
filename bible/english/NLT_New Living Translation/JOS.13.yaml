document_id: JOS.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land Yet to Be Conquered
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When Joshua was an old man, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to him, “You are growing old, and much land remains to be conquered. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'This is the territory that remains: all the regions of the Philistines and the Geshurites, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and the larger territory of the Canaanites, extending from the stream of Shihor on the border of Egypt, northward to the boundary of Ekron. It includes the territory of the five Philistine rulers of Gaza, Ashdod, Ashkelon, Gath, and Ekron. The land of the Avvites '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'in the south also remains to be conquered. In the north, the following area has not yet been conquered: all the land of the Canaanites, including Mearah (which belongs to the Sidonians), stretching northward to Aphek on the border of the Amorites; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'the land of the Gebalites and all of the Lebanon mountain area to the east, from Baal-gad below Mount Hermon to Lebo-hamath; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and all the hill country from Lebanon to Misrephoth-maim, including all the land of the Sidonians.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“I myself will drive these people out of the land ahead of the Israelites. So be sure to give this land to Israel as a special possession, just as I have commanded you. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Include all this territory as Israel’s possession when you divide this land among the nine tribes and the half-tribe of Manasseh.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land Divided East of the Jordan
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Half the tribe of Manasseh and the tribes of Reuben and Gad had already received their grants of land on the east side of the Jordan, for Moses, the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', had previously assigned this land to them.'
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Their territory extended from Aroer on the edge of the Arnon Gorge (including the town in the middle of the gorge) to the plain beyond Medeba, as far as Dibon. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'It also included all the towns of King Sihon of the Amorites, who had reigned in Heshbon, and extended as far as the borders of Ammon. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'It included Gilead, the territory of the kingdoms of Geshur and Maacah, all of Mount Hermon, all of Bashan as far as Salecah, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and all the territory of King Og of Bashan, who had reigned in Ashtaroth and Edrei. King Og was the last of the Rephaites, for Moses had attacked them and driven them out. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But the Israelites failed to drive out the people of Geshur and Maacah, so they continue to live among the Israelites to this day.
- type: usfm
  marker: s1
  children:
  - type: text
    text: An Allotment for the Tribe of Levi
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Moses did not assign any allotment of land to the tribe of Levi. Instead, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had promised them, their allotment came from the offerings burned on the altar to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land Given to the Tribe of Reuben
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Moses had assigned the following area to the clans of the tribe of Reuben.
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Their territory extended from Aroer on the edge of the Arnon Gorge (including the town in the middle of the gorge) to the plain beyond Medeba. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'It included Heshbon and the other towns on the plain—Dibon, Bamoth-baal, Beth-baal-meon, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jahaz, Kedemoth, Mephaath, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kiriathaim, Sibmah, Zereth-shahar on the hill above the valley, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Beth-peor, the slopes of Pisgah, and Beth-jeshimoth.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The land of Reuben also included all the towns of the plain and the entire kingdom of Sihon. Sihon was the Amorite king who had reigned in Heshbon and was killed by Moses along with the leaders of Midian—Evi, Rekem, Zur, Hur, and Reba—princes living in the region who were allied with Sihon. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The Israelites had also killed Balaam son of Beor, who used magic to tell the future. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The Jordan River marked the western boundary for the tribe of Reuben. The towns and their surrounding villages in this area were given as a homeland to the clans of the tribe of Reuben.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land Given to the Tribe of Gad
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Moses had assigned the following area to the clans of the tribe of Gad.
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Their territory included Jazer, all the towns of Gilead, and half of the land of Ammon, as far as the town of Aroer just west of
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in front of.
    marker-yv: yv-n
  - type: text
    text: ' Rabbah. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: It extended from Heshbon to Ramath-mizpeh and Betonim, and from Mahanaim to the territory of Lo-debar.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Li-debir, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: apparently a variant spelling of Lo-debar (compare 2 Sam 9:4; 17:27; Amos 6:13).
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: In the valley were Beth-haram, Beth-nimrah, Succoth, Zaphon, and the rest of the kingdom of King Sihon of Heshbon. The western boundary ran along the Jordan River, extended as far north as the tip of the Sea of Galilee,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Sea of Kinnereth.
    marker-yv: yv-n
  - type: text
    text: ' and then turned eastward. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The towns and their surrounding villages in this area were given as a homeland to the clans of the tribe of Gad.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land Given to the Half-Tribe of Manasseh
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Moses had assigned the following area to the clans of the half-tribe of Manasseh.
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Their territory extended from Mahanaim, including all of Bashan, all the former kingdom of King Og, and the sixty towns of Jair in Bashan. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: It also included half of Gilead and King Og’s royal cities of Ashtaroth and Edrei. All this was given to the clans of the descendants of Makir, who was Manasseh’s son.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'These are the allotments Moses had made while he was on the plains of Moab, across the Jordan River, east of Jericho. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'But Moses gave no allotment of land to the tribe of Levi, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, had promised that he himself would be their allotment.'
