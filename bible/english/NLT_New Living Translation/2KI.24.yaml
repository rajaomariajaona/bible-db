document_id: 2KI.24,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'During Jehoiakim’s reign, King Nebuchadnezzar of Babylon invaded the land of Judah. Jehoiakim surrendered and paid him tribute for three years but then rebelled. '
  '10':
  - type: text
    content: 'During Jehoiachin’s reign, the officers of King Nebuchadnezzar of Babylon came up against Jerusalem and besieged it. '
  '11':
  - type: text
    content: 'Nebuchadnezzar himself arrived at the city during the siege. '
  '12':
  - type: text
    content: Then King Jehoiachin, along with the queen mother, his advisers, his commanders, and his officials, surrendered to the Babylonians.
  - type: text
    content: 'In the eighth year of Nebuchadnezzar’s reign, he took Jehoiachin prisoner. '
  '13':
  - type: text
    content: 'As the '
  - type: text
    content: Lord
  - type: text
    content: ' had said beforehand, Nebuchadnezzar carried away all the treasures from the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple and the royal palace. He stripped away
  - type: note
    content: Or He cut apart.
  - type: text
    content: ' all the gold objects that King Solomon of Israel had placed in the Temple. '
  '14':
  - type: text
    content: King Nebuchadnezzar took all of Jerusalem captive, including all the commanders and the best of the soldiers, craftsmen, and artisans—10,000 in all. Only the poorest people were left in the land.
  '15':
  - type: text
    content: 'Nebuchadnezzar led King Jehoiachin away as a captive to Babylon, along with the queen mother, his wives and officials, and all Jerusalem’s elite. '
  '16':
  - type: text
    content: 'He also exiled 7,000 of the best troops and 1,000 craftsmen and artisans, all of whom were strong and fit for war. '
  '17':
  - type: text
    content: Then the king of Babylon installed Mattaniah, Jehoiachin’s
  - type: note
    content: Hebrew his.
  - type: text
    content: ' uncle, as the next king, and he changed Mattaniah’s name to Zedekiah.'
  - type: heading
    content: Zedekiah Rules in Judah
  '18':
  - type: text
    content: 'Zedekiah was twenty-one years old when he became king, and he reigned in Jerusalem eleven years. His mother was Hamutal, the daughter of Jeremiah from Libnah. '
  '19':
  - type: text
    content: 'But Zedekiah did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, just as Jehoiakim had done. '
  '2':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' sent bands of Babylonian,'
  - type: note
    content: Or Chaldean.
  - type: text
    content: ' Aramean, Moabite, and Ammonite raiders against Judah to destroy it, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had promised through his prophets. '
  '20':
  - type: text
    content: 'These things happened because of the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger against the people of Jerusalem and Judah, until he finally banished them from his presence and sent them into exile.
  - type: heading
    content: The Fall of Jerusalem
  - type: text
    content: Zedekiah rebelled against the king of Babylon.
  '3':
  - type: text
    content: 'These disasters happened to Judah because of the '
  - type: text
    content: Lord
  - type: text
    content: '’s command. He had decided to banish Judah from his presence because of the many sins of Manasseh, '
  '4':
  - type: text
    content: 'who had filled Jerusalem with innocent blood. The '
  - type: text
    content: Lord
  - type: text
    content: ' would not forgive this.'
  '5':
  - type: text
    content: 'The rest of the events in Jehoiakim’s reign and all his deeds are recorded in '
  - type: text
    content: The Book of the History of the Kings of Judah.
  - type: text
    content: ' '
  '6':
  - type: text
    content: When Jehoiakim died, his son Jehoiachin became the next king.
  '7':
  - type: text
    content: The king of Egypt did not venture out of his country after that, for the king of Babylon captured the entire area formerly claimed by Egypt—from the Brook of Egypt to the Euphrates River.
  - type: heading
    content: Jehoiachin Rules in Judah
  '8':
  - type: text
    content: 'Jehoiachin was eighteen years old when he became king, and he reigned in Jerusalem three months. His mother was Nehushta, the daughter of Elnathan from Jerusalem. '
  '9':
  - type: text
    content: 'Jehoiachin did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight, just as his father had done.
