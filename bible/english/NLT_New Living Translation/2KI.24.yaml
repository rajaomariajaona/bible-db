document_id: 2KI.24,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'During Jehoiakim’s reign, King Nebuchadnezzar of Babylon invaded the land of Judah. Jehoiakim surrendered and paid him tribute for three years but then rebelled. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'During Jehoiachin’s reign, the officers of King Nebuchadnezzar of Babylon came up against Jerusalem and besieged it. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nebuchadnezzar himself arrived at the city during the siege. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then King Jehoiachin, along with the queen mother, his advisers, his commanders, and his officials, surrendered to the Babylonians.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the eighth year of Nebuchadnezzar’s reign, he took Jehoiachin prisoner. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'As the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said beforehand, Nebuchadnezzar carried away all the treasures from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Temple and the royal palace. He stripped away
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He cut apart.
      marker-yv: yv-n
    - type: text
      text: ' all the gold objects that King Solomon of Israel had placed in the Temple. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: King Nebuchadnezzar took all of Jerusalem captive, including all the commanders and the best of the soldiers, craftsmen, and artisans—10,000 in all. Only the poorest people were left in the land.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nebuchadnezzar led King Jehoiachin away as a captive to Babylon, along with the queen mother, his wives and officials, and all Jerusalem’s elite. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'He also exiled 7,000 of the best troops and 1,000 craftsmen and artisans, all of whom were strong and fit for war. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then the king of Babylon installed Mattaniah, Jehoiachin’s
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his.
      marker-yv: yv-n
    - type: text
      text: ' uncle, as the next king, and he changed Mattaniah’s name to Zedekiah.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zedekiah Rules in Judah
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Zedekiah was twenty-one years old when he became king, and he reigned in Jerusalem eleven years. His mother was Hamutal, the daughter of Jeremiah from Libnah. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But Zedekiah did what was evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight, just as Jehoiakim had done. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent bands of Babylonian,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldean.
      marker-yv: yv-n
    - type: text
      text: ' Aramean, Moabite, and Ammonite raiders against Judah to destroy it, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had promised through his prophets. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'These things happened because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger against the people of Jerusalem and Judah, until he finally banished them from his presence and sent them into exile.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Fall of Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Zedekiah rebelled against the king of Babylon.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'These disasters happened to Judah because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s command. He had decided to banish Judah from his presence because of the many sins of Manasseh, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'who had filled Jerusalem with innocent blood. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' would not forgive this.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The rest of the events in Jehoiakim’s reign and all his deeds are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the History of the Kings of Judah.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: When Jehoiakim died, his son Jehoiachin became the next king.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The king of Egypt did not venture out of his country after that, for the king of Babylon captured the entire area formerly claimed by Egypt—from the Brook of Egypt to the Euphrates River.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoiachin Rules in Judah
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Jehoiachin was eighteen years old when he became king, and he reigned in Jerusalem three months. His mother was Nehushta, the daughter of Elnathan from Jerusalem. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jehoiachin did what was evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s sight, just as his father had done.
