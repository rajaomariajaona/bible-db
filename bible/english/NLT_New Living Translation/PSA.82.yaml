document_id: PSA.82,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of Asaph.
  - type: text
    content: God presides over heaven’s court;
  - type: text
    content: 'he pronounces judgment on the heavenly beings:'
  '2':
  - type: text
    content: “How long will you hand down unjust decisions
  - type: text
    content: 'by favoring the wicked? '
  - type: text
    content: Interlude
  '3':
  - type: text
    content: “Give justice to the poor and the orphan;
  - type: text
    content: uphold the rights of the oppressed and the destitute.
  '4':
  - type: text
    content: Rescue the poor and helpless;
  - type: text
    content: deliver them from the grasp of evil people.
  '5':
  - type: text
    content: But these oppressors know nothing;
  - type: text
    content: they are so ignorant!
  - type: text
    content: They wander about in darkness,
  - type: text
    content: while the whole world is shaken to the core.
  '6':
  - type: text
    content: I say, ‘You are gods;
  - type: text
    content: you are all children of the Most High.
  '7':
  - type: text
    content: But you will die like mere mortals
  - type: text
    content: and fall like every other ruler.’”
  '8':
  - type: text
    content: Rise up, O God, and judge the earth,
  - type: text
    content: for all the nations belong to you.
