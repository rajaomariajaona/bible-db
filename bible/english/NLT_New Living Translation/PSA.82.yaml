document_id: PSA.82
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God presides over heaven’s court;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'he pronounces judgment on the heavenly beings:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “How long will you hand down unjust decisions
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'by favoring the wicked? '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Give justice to the poor and the orphan;
- type: usfm
  marker: q2
  children:
  - type: text
    text: uphold the rights of the oppressed and the destitute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Rescue the poor and helpless;
- type: usfm
  marker: q2
  children:
  - type: text
    text: deliver them from the grasp of evil people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But these oppressors know nothing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are so ignorant!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They wander about in darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while the whole world is shaken to the core.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I say, ‘You are gods;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you are all children of the Most High.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But you will die like mere mortals
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fall like every other ruler.’”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Rise up, O God, and judge the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all the nations belong to you.
