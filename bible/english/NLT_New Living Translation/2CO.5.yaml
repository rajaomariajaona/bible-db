document_id: 2CO.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: New Bodies
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For we know that when this earthly tent we live in is taken down (that is, when we die and leave this earthly body), we will have a house in heaven, an eternal body made for us by God himself and not by human hands. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For we must all stand before Christ to be judged. We will each receive whatever we deserve for the good or evil we have done in this earthly body.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: We Are God’s Ambassadors
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Because we understand our fearful responsibility to the Lord, we work hard to persuade others. God knows we are sincere, and I hope you know this, too. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Are we commending ourselves to you again? No, we are giving you a reason to be proud of us,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: proud of yourselves.
      marker-yv: yv-n
    - type: text
      text: ' so you can answer those who brag about having a spectacular ministry rather than having a sincere heart. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'If it seems we are crazy, it is to bring glory to God. And if we are in our right minds, it is for your benefit. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Either way, Christ’s love controls us.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:14a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: urges us on.
      marker-yv: yv-n
    - type: text
      text: ' Since we believe that Christ died for all, we also believe that we have all died to our old life.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:14b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Since one died for all, then all died.
      marker-yv: yv-n
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He died for everyone so that those who receive his new life will no longer live for themselves. Instead, they will live for Christ, who died and was raised for them.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So we have stopped evaluating others from a human point of view. At one time we thought of Christ merely from a human point of view. How differently we know him now! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This means that anyone who belongs to Christ has become a new person. The old life is gone; a new life has begun!
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all of this is a gift from God, who brought us back to himself through Christ. And God has given us this task of reconciling people to him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For God was in Christ, reconciling the world to himself, no longer counting people’s sins against them. And he gave us this wonderful message of reconciliation. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'We grow weary in our present bodies, and we long to put on our heavenly bodies like new clothing. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So we are Christ’s ambassadors; God is making his appeal through us. We speak for Christ when we plead, “Come back to God!” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For God made Christ, who never sinned, to be the offering for our sin,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to become sin itself.
      marker-yv: yv-n
    - type: text
      text: ' so that we could be made right with God through Christ.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For we will put on heavenly bodies; we will not be spirits without bodies.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: we will not be naked.
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'While we live in these earthly bodies, we groan and sigh, but it’s not that we want to die and get rid of these bodies that clothe us. Rather, we want to put on our new bodies so that these dying bodies will be swallowed up by life. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: God himself has prepared us for this, and as a guarantee he has given us his Holy Spirit.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So we are always confident, even though we know that as long as we live in these bodies we are not at home with the Lord. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we live by believing and not by seeing. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yes, we are fully confident, and we would rather be away from these earthly bodies, for then we will be at home with the Lord. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So whether we are here in this body or away from this body, our goal is to please him. '
