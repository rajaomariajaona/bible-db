document_id: ZEC.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment against Israel’s Enemies
  - type: text
    content: This is the message
  - type: note
    content: 'Hebrew An Oracle: The message.'
  - type: text
    content: ' from the '
  - type: text
    content: Lord
  - type: text
    content: ' against the land of Aram'
  - type: note
    content: Hebrew land of Hadrach.
  - type: text
    content: ' and the city of Damascus, for the eyes of humanity, including all the tribes of Israel, are on the '
  - type: text
    content: Lord
  - type: text
    content: .
  '10':
  - type: text
    content: I will remove the battle chariots from Israel
  - type: note
    content: Hebrew Ephraim, referring to the northern kingdom of Israel; also in 9:13.
  - type: text
    content: and the warhorses from Jerusalem.
  - type: text
    content: I will destroy all the weapons used in battle,
  - type: text
    content: and your king will bring peace to the nations.
  - type: text
    content: His realm will stretch from sea to sea
  - type: text
    content: and from the Euphrates River
  - type: note
    content: Hebrew the river.
  - type: text
    content: ' to the ends of the earth.'
  - type: note
    content: Or the end of the land.
  '11':
  - type: text
    content: Because of the covenant I made with you,
  - type: text
    content: sealed with blood,
  - type: text
    content: I will free your prisoners
  - type: text
    content: from death in a waterless dungeon.
  '12':
  - type: text
    content: Come back to the place of safety,
  - type: text
    content: all you prisoners who still have hope!
  - type: text
    content: I promise this very day
  - type: text
    content: that I will repay two blessings for each of your troubles.
  '13':
  - type: text
    content: Judah is my bow,
  - type: text
    content: and Israel is my arrow.
  - type: text
    content: Jerusalem
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ' is my sword,'
  - type: text
    content: and like a warrior, I will brandish it against the Greeks.
  - type: note
    content: Hebrew the sons of Javan.
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will appear above his people;'
  - type: text
    content: his arrows will fly like lightning!
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' will sound the ram’s horn'
  - type: text
    content: and attack like a whirlwind from the southern desert.
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies will protect his people,'
  - type: text
    content: and they will defeat their enemies by hurling great stones.
  - type: text
    content: They will shout in battle as though drunk with wine.
  - type: text
    content: They will be filled with blood like a bowl,
  - type: text
    content: drenched with blood like the corners of the altar.
  '16':
  - type: text
    content: 'On that day the '
  - type: text
    content: Lord
  - type: text
    content: ' their God will rescue his people,'
  - type: text
    content: just as a shepherd rescues his sheep.
  - type: text
    content: They will sparkle in his land
  - type: text
    content: like jewels in a crown.
  '17':
  - type: text
    content: How wonderful and beautiful they will be!
  - type: text
    content: The young men will thrive on abundant grain,
  - type: text
    content: and the young women will flourish on new wine.
  '2':
  - type: text
    content: Doom is certain for Hamath,
  - type: text
    content: near Damascus,
  - type: text
    content: and for the cities of Tyre and Sidon,
  - type: text
    content: though they are so clever.
  '3':
  - type: text
    content: Tyre has built a strong fortress
  - type: text
    content: and has made silver and gold
  - type: text
    content: as plentiful as dust in the streets!
  '4':
  - type: text
    content: But now the Lord will strip away Tyre’s possessions
  - type: text
    content: and hurl its fortifications into the sea,
  - type: text
    content: and it will be burned to the ground.
  '5':
  - type: text
    content: The city of Ashkelon will see Tyre fall
  - type: text
    content: and will be filled with fear.
  - type: text
    content: Gaza will shake with terror,
  - type: text
    content: as will Ekron, for their hopes will be dashed.
  - type: text
    content: Gaza’s king will be killed,
  - type: text
    content: and Ashkelon will be deserted.
  '6':
  - type: text
    content: Foreigners will occupy the city of Ashdod.
  - type: text
    content: I will destroy the pride of the Philistines.
  '7':
  - type: text
    content: I will grab the bloody meat from their mouths
  - type: text
    content: and snatch the detestable sacrifices from their teeth.
  - type: text
    content: Then the surviving Philistines will worship our God
  - type: text
    content: and become like a clan in Judah.
  - type: note
    content: Hebrew like a leader in Judah.
  - type: text
    content: The Philistines of Ekron will join my people,
  - type: text
    content: as the ancient Jebusites once did.
  '8':
  - type: text
    content: I will guard my Temple
  - type: text
    content: and protect it from invading armies.
  - type: text
    content: I am watching closely to ensure
  - type: text
    content: that no more foreign oppressors overrun my people’s land.
  - type: heading
    content: Zion’s Coming King
  '9':
  - type: text
    content: Rejoice, O people of Zion!
  - type: note
    content: Hebrew O daughter of Zion!
  - type: text
    content: Shout in triumph, O people of Jerusalem!
  - type: text
    content: Look, your king is coming to you.
  - type: text
    content: He is righteous and victorious,
  - type: note
    content: Hebrew and is being vindicated.
  - type: text
    content: yet he is humble, riding on a donkey—
  - type: text
    content: riding on a donkey’s colt.
