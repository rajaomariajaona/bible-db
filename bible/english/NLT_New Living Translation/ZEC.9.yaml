document_id: ZEC.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment against Israel’s Enemies
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: This is the message
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'An Oracle: The message.'
      marker-yv: yv-n
    - type: text
      text: ' from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' against the land of Aram'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: land of Hadrach.
      marker-yv: yv-n
    - type: text
      text: ' and the city of Damascus, for the eyes of humanity, including all the tribes of Israel, are on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I will remove the battle chariots from Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:10a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ephraim, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referring to the northern kingdom of Israel; also in 9:13.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the warhorses from Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will destroy all the weapons used in battle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your king will bring peace to the nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His realm will stretch from sea to sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from the Euphrates River
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:10b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the river.
      marker-yv: yv-n
    - type: text
      text: ' to the ends of the earth.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:10c '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the end of the land.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Because of the covenant I made with you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sealed with blood,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will free your prisoners
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from death in a waterless dungeon.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Come back to the place of safety,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all you prisoners who still have hope!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I promise this very day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I will repay two blessings for each of your troubles.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Judah is my bow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Israel is my arrow.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:13a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zion.
      marker-yv: yv-n
    - type: text
      text: ' is my sword,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and like a warrior, I will brandish it against the Greeks.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:13b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the sons of Javan.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will appear above his people;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his arrows will fly like lightning!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will sound the ram’s horn'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and attack like a whirlwind from the southern desert.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies will protect his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will defeat their enemies by hurling great stones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will shout in battle as though drunk with wine.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be filled with blood like a bowl,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: drenched with blood like the corners of the altar.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'On that day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God will rescue his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as a shepherd rescues his sheep.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will sparkle in his land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like jewels in a crown.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: How wonderful and beautiful they will be!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The young men will thrive on abundant grain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the young women will flourish on new wine.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Doom is certain for Hamath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: near Damascus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and for the cities of Tyre and Sidon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though they are so clever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tyre has built a strong fortress
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and has made silver and gold
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as plentiful as dust in the streets!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But now the Lord will strip away Tyre’s possessions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hurl its fortifications into the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and it will be burned to the ground.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The city of Ashkelon will see Tyre fall
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will be filled with fear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gaza will shake with terror,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as will Ekron, for their hopes will be dashed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gaza’s king will be killed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Ashkelon will be deserted.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Foreigners will occupy the city of Ashdod.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will destroy the pride of the Philistines.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I will grab the bloody meat from their mouths
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and snatch the detestable sacrifices from their teeth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the surviving Philistines will worship our God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and become like a clan in Judah.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: like a leader in Judah.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Philistines of Ekron will join my people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the ancient Jebusites once did.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I will guard my Temple
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and protect it from invading armies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am watching closely to ensure
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that no more foreign oppressors overrun my people’s land.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zion’s Coming King
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Rejoice, O people of Zion!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:9a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: O daughter of Zion!
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shout in triumph, O people of Jerusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look, your king is coming to you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is righteous and victorious,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:9b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and is being vindicated.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet he is humble, riding on a donkey—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: riding on a donkey’s colt.
