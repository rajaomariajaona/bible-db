document_id: PSA.125,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song for pilgrims ascending to Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Those who trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' are as secure as Mount Zion;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will not be defeated but will endure forever.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Just as the mountains surround Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'so the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' surrounds his people, both now and forever.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The wicked will not rule the land of the godly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for then the godly might be tempted to do wrong.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', do good to those who are good,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose hearts are in tune with you.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But banish those who turn to crooked ways, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Take them away with those who do evil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May Israel have peace!
