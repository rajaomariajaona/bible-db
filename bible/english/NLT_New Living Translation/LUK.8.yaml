  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: While he was still speaking to her, a messenger arrived from the home of Jairus, the leader of the synagogue. He told him, “Your daughter is dead. There’s no use troubling the Teacher now.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'But when Jesus heard what had happened, he said to Jairus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t be afraid. Just have faith, and she will be healed.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'When they arrived at the house, Jesus wouldn’t let anyone go in with him except Peter, John, James, and the little girl’s father and mother. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'The house was filled with people weeping and wailing, but he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Stop the weeping! She isn’t dead; she’s only asleep.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'But the crowd laughed at him because they all knew she had died. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Then Jesus took her by the hand and said in a loud voice, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My child, get up!”
  - type: text
    text: ' '
  - type: usfm
    marker: v
