document_id: LUK.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Women Who Followed Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Soon afterward Jesus began a tour of the nearby towns and villages, preaching and announcing the Good News about the Kingdom of God. He took his twelve disciples with him, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'along with some women who had been cured of evil spirits and diseases. Among them were Mary Magdalene, from whom he had cast out seven demons; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Joanna, the wife of Chuza, Herod’s business manager; Susanna; and many others who were contributing from their own resources to support Jesus and his disciples.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Farmer Scattering Seed
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'One day Jesus told a story in the form of a parable to a large crowd that had gathered from many towns to hear him: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A farmer went out to plant his seed. As he scattered it across his field, some seed fell on a footpath, where it was stepped on, and the birds ate it.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Other seed fell among rocks. It began to grow, but the plant soon wilted and died for lack of moisture.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Other seed fell among thorns that grew up with it and choked out the tender plants.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Still other seed fell on fertile soil. This seed grew and produced a crop that was a hundred times as much as had been planted!”
  - type: text
    text: ' When he had said this, he called out, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Anyone with ears to hear should listen and understand.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'His disciples asked him what this parable meant. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You are permitted to understand the secrets
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:10a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mysteries.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'of the Kingdom of God. But I use parables to teach the others so that the Scriptures might be fulfilled:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘When they look, they won’t really see.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When they hear, they won’t understand.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:10b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 6:9 (Greek version).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“This is the meaning of the parable: The seed is God’s word.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The seeds that fell on the footpath represent those who hear the message, only to have the devil come and take it away from their hearts and prevent them from believing and being saved.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The seeds on the rocky soil represent those who hear the message and receive it with joy. But since they don’t have deep roots, they believe for a while, then they fall away when they face temptation.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The seeds that fell among the thorns represent those who hear the message, but all too quickly the message is crowded out by the cares and riches and pleasures of this life. And so they never grow into maturity.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And the seeds that fell on the good soil represent honest, good-hearted people who hear God’s word, cling to it, and patiently produce a huge harvest.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Lamp
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “No one lights a lamp and then covers it with a bowl or hides it under a bed. A lamp is placed on a stand, where its light can be seen by all who enter the house.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For all that is secret will eventually be brought into the open, and everything that is concealed will be brought to light and made known to all.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “So pay attention to how you hear. To those who listen to my teaching, more understanding will be given. But for those who are not listening, even what they think they understand will be taken away from them.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The True Family of Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Jesus’ mother and brothers came to see him, but they couldn’t get to him because of the crowd. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Someone told Jesus, “Your mother and your brothers are standing outside, and they want to see you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My mother and my brothers are all those who hear God’s word and obey it.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Calms the Storm
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'One day Jesus said to his disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Let’s cross to the other side of the lake.”
  - type: text
    text: ' So they got into a boat and started out. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: As they sailed across, Jesus settled down for a nap. But soon a fierce storm came down on the lake. The boat was filling with water, and they were in real danger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The disciples went and woke him up, shouting, “Master, Master, we’re going to drown!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'When Jesus woke up, he rebuked the wind and the raging waves. Suddenly the storm stopped and all was calm. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then he asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Where is your faith?”
- type: usfm
  marker: p
  children:
  - type: text
    text: The disciples were terrified and amazed. “Who is this man?” they asked each other. “When he gives a command, even the wind and waves obey him!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals a Demon-Possessed Man
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: So they arrived in the region of the Gerasenes,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Other manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gadarenes; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'still others read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gergesenes; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 8:37. See Matt 8:28; Mark 5:1.
    marker-yv: yv-n
  - type: text
    text: ' across the lake from Galilee. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: As Jesus was climbing out of the boat, a man who was possessed by demons came out to meet him. For a long time he had been homeless and naked, living in the tombs outside the town.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'As soon as he saw Jesus, he shrieked and fell down in front of him. Then he screamed, “Why are you interfering with me, Jesus, Son of the Most High God? Please, I beg you, don’t torture me!” '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: For Jesus had already commanded the evil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: unclean.
    marker-yv: yv-n
  - type: text
    text: ' spirit to come out of him. This spirit had often taken control of the man. Even when he was placed under guard and put in chains and shackles, he simply broke them and rushed out into the wilderness, completely under the demon’s power.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jesus demanded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What is your name?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Legion,” he replied, for he was filled with many demons. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The demons kept begging Jesus not to send them into the bottomless pit.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the abyss, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the underworld.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: There happened to be a large herd of pigs feeding on the hillside nearby, and the demons begged him to let them enter into the pigs.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So Jesus gave them permission. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Then the demons came out of the man and entered the pigs, and the entire herd plunged down the steep hillside into the lake and drowned.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'When the herdsmen saw it, they fled to the nearby town and the surrounding countryside, spreading the news as they ran. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'People rushed out to see what had happened. A crowd soon gathered around Jesus, and they saw the man who had been freed from the demons. He was sitting at Jesus’ feet, fully clothed and perfectly sane, and they were all afraid. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Then those who had seen what happened told the others how the demon-possessed man had been healed. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: And all the people in the region of the Gerasenes begged Jesus to go away and leave them alone, for a great wave of fear swept over them.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So Jesus returned to the boat and left, crossing back to the other side of the lake. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'The man who had been freed from the demons begged to go with him. But Jesus sent him home, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “No, go back to your family, and tell them everything God has done for you.”
  - type: text
    text: ' So he went all through the town proclaiming the great things Jesus had done for him.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals in Response to Faith
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'On the other side of the lake the crowds welcomed Jesus, because they had been waiting for him. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Then a man named Jairus, a leader of the local synagogue, came and fell at Jesus’ feet, pleading with him to come home with him. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: His only daughter,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: His only child, a daughter.
    marker-yv: yv-n
  - type: text
    text: ' who was about twelve years old, was dying.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'As Jesus went with him, he was surrounded by the crowds. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: A woman in the crowd had suffered for twelve years with constant bleeding,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts add '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: having spent everything she had on doctors.
    marker-yv: yv-n
  - type: text
    text: ' and she could find no cure. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Coming up behind Jesus, she touched the fringe of his robe. Immediately, the bleeding stopped.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Who touched me?” '
  - type: text
    text: Jesus asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: Everyone denied it, and Peter said, “Master, this whole crowd is pressing up against you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'But Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Someone deliberately touched me, for I felt healing power go out from me.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'When the woman realized that she could not stay hidden, she began to tremble and fell to her knees in front of him. The whole crowd heard her explain why she had touched him and that she had been immediately healed. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Daughter,” '
  - type: text
    text: 'he said to her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “your faith has made you well. Go in peace.”
