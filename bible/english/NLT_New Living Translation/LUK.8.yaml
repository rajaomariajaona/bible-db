document_id: LUK.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Women Who Followed Jesus
  - type: text
    content: 'Soon afterward Jesus began a tour of the nearby towns and villages, preaching and announcing the Good News about the Kingdom of God. He took his twelve disciples with him, '
  '10':
  - type: text
    content: 'He replied, '
  - type: text
    content: “You are permitted to understand the secrets
  - type: note
    content: Greek mysteries.
  - type: text
    content: ' '
  - type: text
    content: 'of the Kingdom of God. But I use parables to teach the others so that the Scriptures might be fulfilled:'
  - type: text
    content: ‘When they look, they won’t really see.
  - type: text
    content: When they hear, they won’t understand.’
  - type: note
    content: Isa 6:9 (Greek version).
  '11':
  - type: text
    content: ' '
  - type: text
    content: '“This is the meaning of the parable: The seed is God’s word.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: The seeds that fell on the footpath represent those who hear the message, only to have the devil come and take it away from their hearts and prevent them from believing and being saved.
  - type: text
    content: ' '
  '13':
  - type: text
    content: The seeds on the rocky soil represent those who hear the message and receive it with joy. But since they don’t have deep roots, they believe for a while, then they fall away when they face temptation.
  - type: text
    content: ' '
  '14':
  - type: text
    content: The seeds that fell among the thorns represent those who hear the message, but all too quickly the message is crowded out by the cares and riches and pleasures of this life. And so they never grow into maturity.
  - type: text
    content: ' '
  '15':
  - type: text
    content: And the seeds that fell on the good soil represent honest, good-hearted people who hear God’s word, cling to it, and patiently produce a huge harvest.
  - type: heading
    content: Parable of the Lamp
  '16':
  - type: text
    content: ' '
  - type: text
    content: “No one lights a lamp and then covers it with a bowl or hides it under a bed. A lamp is placed on a stand, where its light can be seen by all who enter the house.
  - type: text
    content: ' '
  '17':
  - type: text
    content: For all that is secret will eventually be brought into the open, and everything that is concealed will be brought to light and made known to all.
  '18':
  - type: text
    content: ' '
  - type: text
    content: “So pay attention to how you hear. To those who listen to my teaching, more understanding will be given. But for those who are not listening, even what they think they understand will be taken away from them.”
  - type: heading
    content: The True Family of Jesus
  '19':
  - type: text
    content: 'Then Jesus’ mother and brothers came to see him, but they couldn’t get to him because of the crowd. '
  '2':
  - type: text
    content: 'along with some women who had been cured of evil spirits and diseases. Among them were Mary Magdalene, from whom he had cast out seven demons; '
  '20':
  - type: text
    content: Someone told Jesus, “Your mother and your brothers are standing outside, and they want to see you.”
  '21':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “My mother and my brothers are all those who hear God’s word and obey it.”
  - type: heading
    content: Jesus Calms the Storm
  '22':
  - type: text
    content: 'One day Jesus said to his disciples, '
  - type: text
    content: “Let’s cross to the other side of the lake.”
  - type: text
    content: ' So they got into a boat and started out. '
  '23':
  - type: text
    content: As they sailed across, Jesus settled down for a nap. But soon a fierce storm came down on the lake. The boat was filling with water, and they were in real danger.
  '24':
  - type: text
    content: The disciples went and woke him up, shouting, “Master, Master, we’re going to drown!”
  - type: text
    content: 'When Jesus woke up, he rebuked the wind and the raging waves. Suddenly the storm stopped and all was calm. '
  '25':
  - type: text
    content: 'Then he asked them, '
  - type: text
    content: “Where is your faith?”
  - type: text
    content: The disciples were terrified and amazed. “Who is this man?” they asked each other. “When he gives a command, even the wind and waves obey him!”
  - type: heading
    content: Jesus Heals a Demon-Possessed Man
  '26':
  - type: text
    content: So they arrived in the region of the Gerasenes,
  - type: note
    content: Other manuscripts read Gadarenes; still others read Gergesenes; also in 8:37. See Matt 8:28; Mark 5:1.
  - type: text
    content: ' across the lake from Galilee. '
  '27':
  - type: text
    content: As Jesus was climbing out of the boat, a man who was possessed by demons came out to meet him. For a long time he had been homeless and naked, living in the tombs outside the town.
  '28':
  - type: text
    content: 'As soon as he saw Jesus, he shrieked and fell down in front of him. Then he screamed, “Why are you interfering with me, Jesus, Son of the Most High God? Please, I beg you, don’t torture me!” '
  '29':
  - type: text
    content: For Jesus had already commanded the evil
  - type: note
    content: Greek unclean.
  - type: text
    content: ' spirit to come out of him. This spirit had often taken control of the man. Even when he was placed under guard and put in chains and shackles, he simply broke them and rushed out into the wilderness, completely under the demon’s power.'
  '3':
  - type: text
    content: Joanna, the wife of Chuza, Herod’s business manager; Susanna; and many others who were contributing from their own resources to support Jesus and his disciples.
  - type: heading
    content: Parable of the Farmer Scattering Seed
  '30':
  - type: text
    content: 'Jesus demanded, '
  - type: text
    content: “What is your name?”
  - type: text
    content: '“Legion,” he replied, for he was filled with many demons. '
  '31':
  - type: text
    content: The demons kept begging Jesus not to send them into the bottomless pit.
  - type: note
    content: Or the abyss, or the underworld.
  '32':
  - type: text
    content: There happened to be a large herd of pigs feeding on the hillside nearby, and the demons begged him to let them enter into the pigs.
  - type: text
    content: 'So Jesus gave them permission. '
  '33':
  - type: text
    content: Then the demons came out of the man and entered the pigs, and the entire herd plunged down the steep hillside into the lake and drowned.
  '34':
  - type: text
    content: 'When the herdsmen saw it, they fled to the nearby town and the surrounding countryside, spreading the news as they ran. '
  '35':
  - type: text
    content: 'People rushed out to see what had happened. A crowd soon gathered around Jesus, and they saw the man who had been freed from the demons. He was sitting at Jesus’ feet, fully clothed and perfectly sane, and they were all afraid. '
  '36':
  - type: text
    content: 'Then those who had seen what happened told the others how the demon-possessed man had been healed. '
  '37':
  - type: text
    content: And all the people in the region of the Gerasenes begged Jesus to go away and leave them alone, for a great wave of fear swept over them.
  - type: text
    content: 'So Jesus returned to the boat and left, crossing back to the other side of the lake. '
  '38':
  - type: text
    content: 'The man who had been freed from the demons begged to go with him. But Jesus sent him home, saying, '
  '39':
  - type: text
    content: “No, go back to your family, and tell them everything God has done for you.”
  - type: text
    content: ' So he went all through the town proclaiming the great things Jesus had done for him.'
  - type: heading
    content: Jesus Heals in Response to Faith
  '4':
  - type: text
    content: 'One day Jesus told a story in the form of a parable to a large crowd that had gathered from many towns to hear him: '
  '40':
  - type: text
    content: 'On the other side of the lake the crowds welcomed Jesus, because they had been waiting for him. '
  '41':
  - type: text
    content: 'Then a man named Jairus, a leader of the local synagogue, came and fell at Jesus’ feet, pleading with him to come home with him. '
  '42':
  - type: text
    content: His only daughter,
  - type: note
    content: Or His only child, a daughter.
  - type: text
    content: ' who was about twelve years old, was dying.'
  - type: text
    content: 'As Jesus went with him, he was surrounded by the crowds. '
  '43':
  - type: text
    content: A woman in the crowd had suffered for twelve years with constant bleeding,
  - type: note
    content: Some manuscripts add having spent everything she had on doctors.
  - type: text
    content: ' and she could find no cure. '
  '44':
  - type: text
    content: Coming up behind Jesus, she touched the fringe of his robe. Immediately, the bleeding stopped.
  '45':
  - type: text
    content: ' '
  - type: text
    content: '“Who touched me?” '
  - type: text
    content: Jesus asked.
  - type: text
    content: Everyone denied it, and Peter said, “Master, this whole crowd is pressing up against you.”
  '46':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “Someone deliberately touched me, for I felt healing power go out from me.”
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'When the woman realized that she could not stay hidden, she began to tremble and fell to her knees in front of him. The whole crowd heard her explain why she had touched him and that she had been immediately healed. '
  '48':
  - type: text
    content: '“Daughter,” '
  - type: text
    content: 'he said to her, '
  - type: text
    content: “your faith has made you well. Go in peace.”
  '49':
  - type: text
    content: While he was still speaking to her, a messenger arrived from the home of Jairus, the leader of the synagogue. He told him, “Your daughter is dead. There’s no use troubling the Teacher now.”
  '5':
  - type: text
    content: “A farmer went out to plant his seed. As he scattered it across his field, some seed fell on a footpath, where it was stepped on, and the birds ate it.
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'But when Jesus heard what had happened, he said to Jairus, '
  - type: text
    content: “Don’t be afraid. Just have faith, and she will be healed.”
  '51':
  - type: text
    content: 'When they arrived at the house, Jesus wouldn’t let anyone go in with him except Peter, John, James, and the little girl’s father and mother. '
  '52':
  - type: text
    content: 'The house was filled with people weeping and wailing, but he said, '
  - type: text
    content: “Stop the weeping! She isn’t dead; she’s only asleep.”
  '53':
  - type: text
    content: 'But the crowd laughed at him because they all knew she had died. '
  '54':
  - type: text
    content: 'Then Jesus took her by the hand and said in a loud voice, '
  - type: text
    content: “My child, get up!”
  - type: text
    content: ' '
  '55':
  - type: text
    content: And at that moment her life
  - type: note
    content: Or her spirit.
  - type: text
    content: ' returned, and she immediately stood up! Then Jesus told them to give her something to eat. '
  '56':
  - type: text
    content: Her parents were overwhelmed, but Jesus insisted that they not tell anyone what had happened.
  '6':
  - type: text
    content: Other seed fell among rocks. It began to grow, but the plant soon wilted and died for lack of moisture.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Other seed fell among thorns that grew up with it and choked out the tender plants.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Still other seed fell on fertile soil. This seed grew and produced a crop that was a hundred times as much as had been planted!”
  - type: text
    content: ' When he had said this, he called out, '
  - type: text
    content: “Anyone with ears to hear should listen and understand.”
  '9':
  - type: text
    content: 'His disciples asked him what this parable meant. '
