document_id: PSA.63,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David, regarding a time when David was in the wilderness of Judah.
  - type: text
    content: O God, you are my God;
  - type: text
    content: I earnestly search for you.
  - type: text
    content: My soul thirsts for you;
  - type: text
    content: my whole body longs for you
  - type: text
    content: in this parched and weary land
  - type: text
    content: where there is no water.
  '10':
  - type: text
    content: They will die by the sword
  - type: text
    content: and become the food of jackals.
  '11':
  - type: text
    content: But the king will rejoice in God.
  - type: text
    content: All who swear to tell the truth will praise him,
  - type: text
    content: while liars will be silenced.
  '2':
  - type: text
    content: I have seen you in your sanctuary
  - type: text
    content: and gazed upon your power and glory.
  '3':
  - type: text
    content: Your unfailing love is better than life itself;
  - type: text
    content: how I praise you!
  '4':
  - type: text
    content: I will praise you as long as I live,
  - type: text
    content: lifting up my hands to you in prayer.
  '5':
  - type: text
    content: You satisfy me more than the richest feast.
  - type: text
    content: I will praise you with songs of joy.
  '6':
  - type: text
    content: I lie awake thinking of you,
  - type: text
    content: meditating on you through the night.
  '7':
  - type: text
    content: Because you are my helper,
  - type: text
    content: I sing for joy in the shadow of your wings.
  '8':
  - type: text
    content: I cling to you;
  - type: text
    content: your strong right hand holds me securely.
  '9':
  - type: text
    content: But those plotting to destroy me will come to ruin.
  - type: text
    content: They will go down into the depths of the earth.
