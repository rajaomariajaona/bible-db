document_id: PSA.63
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm of David, regarding a time when David was in the wilderness of Judah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God, you are my God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I earnestly search for you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My soul thirsts for you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my whole body longs for you
- type: usfm
  marker: q1
  children:
  - type: text
    text: in this parched and weary land
- type: usfm
  marker: q2
  children:
  - type: text
    text: where there is no water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I have seen you in your sanctuary
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gazed upon your power and glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Your unfailing love is better than life itself;
- type: usfm
  marker: q2
  children:
  - type: text
    text: how I praise you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will praise you as long as I live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lifting up my hands to you in prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You satisfy me more than the richest feast.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will praise you with songs of joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I lie awake thinking of you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: meditating on you through the night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Because you are my helper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I sing for joy in the shadow of your wings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I cling to you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your strong right hand holds me securely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But those plotting to destroy me will come to ruin.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will go down into the depths of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They will die by the sword
- type: usfm
  marker: q2
  children:
  - type: text
    text: and become the food of jackals.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But the king will rejoice in God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All who swear to tell the truth will praise him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while liars will be silenced.
