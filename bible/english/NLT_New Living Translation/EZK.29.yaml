document_id: EZK.29,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message for Egypt
  - type: text
    content: On January 7,
  - type: note
    content: Hebrew On the twelfth day of the tenth month, of the ancient Hebrew lunar calendar. This event occurred on January 7, 587 b.c.; also see note on 1:1.
  - type: text
    content: ' during the tenth year of King Jehoiachin’s captivity, this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: I am now the enemy of both you and your river. I will make the land of Egypt a totally desolate wasteland, from Migdol to Aswan, as far south as the border of Ethiopia.
  - type: note
    content: Hebrew from Migdol to Syene as far as the border of Cush.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'For forty years not a soul will pass that way, neither people nor animals. It will be completely uninhabited. '
  '12':
  - type: text
    content: I will make Egypt desolate, and it will be surrounded by other desolate nations. Its cities will be empty and desolate for forty years, surrounded by other ruined cities. I will scatter the Egyptians to distant lands.
  '13':
  - type: text
    content: '“But this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' also says: At the end of the forty years I will bring the Egyptians home again from the nations to which they have been scattered. '
  '14':
  - type: text
    content: 'I will restore the prosperity of Egypt and bring its people back to the land of Pathros in southern Egypt from which they came. But Egypt will remain an unimportant, minor kingdom. '
  '15':
  - type: text
    content: It will be the lowliest of all the nations, never again great enough to rise above its neighbors.
  '16':
  - type: text
    content: '“Then Israel will no longer be tempted to trust in Egypt for help. Egypt’s shattered condition will remind Israel of how sinful she was to trust Egypt in earlier days. Then Israel will know that I am the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: Nebuchadnezzar to Conquer Egypt
  '17':
  - type: text
    content: On April 26, the first day of the new year,
  - type: note
    content: Hebrew On the first day of the first month, of the ancient Hebrew lunar calendar. This event occurred on April 26, 571 b.c.; also see note on 1:1.
  - type: text
    content: ' during the twenty-seventh year of King Jehoiachin’s captivity, this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '18':
  - type: text
    content: “Son of man, the army of King Nebuchadnezzar
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar; also in 29:19.
  - type: text
    content: ' of Babylon fought so hard against Tyre that the warriors’ heads were rubbed bare and their shoulders were raw and blistered. Yet Nebuchadnezzar and his army won no plunder to compensate them for all their work. '
  '19':
  - type: text
    content: 'Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will give the land of Egypt to Nebuchadnezzar, king of Babylon. He will carry off its wealth, plundering everything it has so he can pay his army. '
  '2':
  - type: text
    content: '“Son of man, turn and face Egypt and prophesy against Pharaoh the king and all the people of Egypt. '
  '20':
  - type: text
    content: 'Yes, I have given him the land of Egypt as a reward for his work, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', because he was working for me when he destroyed Tyre.'
  '21':
  - type: text
    content: “And the day will come when I will cause the ancient glory of Israel to revive,
  - type: note
    content: Hebrew I will cause a horn to sprout for the house of Israel.
  - type: text
    content: ' and then, Ezekiel, your words will be respected. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: 'Give them this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “I am your enemy, O Pharaoh, king of Egypt—
  - type: text
    content: you great monster, lurking in the streams of the Nile.
  - type: text
    content: For you have said, ‘The Nile River is mine;
  - type: text
    content: I made it for myself.’
  '4':
  - type: text
    content: I will put hooks in your jaws
  - type: text
    content: and drag you out on the land
  - type: text
    content: with fish sticking to your scales.
  '5':
  - type: text
    content: I will leave you and all your fish
  - type: text
    content: stranded in the wilderness to die.
  - type: text
    content: You will lie unburied on the open ground,
  - type: text
    content: for I have given you as food to the wild animals and birds.
  '6':
  - type: text
    content: 'All the people of Egypt will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for to Israel you were just a staff made of reeds.
  '7':
  - type: text
    content: When Israel leaned on you,
  - type: text
    content: you splintered and broke
  - type: text
    content: and stabbed her in the armpit.
  - type: text
    content: When she put her weight on you,
  - type: text
    content: you collapsed, and her legs gave way.
  '8':
  - type: text
    content: '“Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will bring an army against you, O Egypt, and destroy both people and animals. '
  '9':
  - type: text
    content: 'The land of Egypt will become a desolate wasteland, and the Egyptians will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: '“Because you said, ‘The Nile River is mine; I made it,’ '
