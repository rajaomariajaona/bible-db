document_id: EZK.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message for Egypt
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: On January 7,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the twelfth day of the tenth month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. This event occurred on January 7, 587 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 1:1.
    marker-yv: yv-n
  - type: text
    text: ' during the tenth year of King Jehoiachin’s captivity, this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, turn and face Egypt and prophesy against Pharaoh the king and all the people of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Give them this message from the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I am your enemy, O Pharaoh, king of Egypt—
- type: usfm
  marker: q2
  children:
  - type: text
    text: you great monster, lurking in the streams of the Nile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you have said, ‘The Nile River is mine;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I made it for myself.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will put hooks in your jaws
- type: usfm
  marker: q2
  children:
  - type: text
    text: and drag you out on the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: with fish sticking to your scales.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I will leave you and all your fish
- type: usfm
  marker: q2
  children:
  - type: text
    text: stranded in the wilderness to die.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will lie unburied on the open ground,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have given you as food to the wild animals and birds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'All the people of Egypt will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: for to Israel you were just a staff made of reeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When Israel leaned on you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you splintered and broke
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stabbed her in the armpit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When she put her weight on you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you collapsed, and her legs gave way.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Therefore, this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I will bring an army against you, O Egypt, and destroy both people and animals. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The land of Egypt will become a desolate wasteland, and the Egyptians will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Because you said, ‘The Nile River is mine; I made it,’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I am now the enemy of both you and your river. I will make the land of Egypt a totally desolate wasteland, from Migdol to Aswan, as far south as the border of Ethiopia.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from Migdol to Syene as far as the border of Cush.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For forty years not a soul will pass that way, neither people nor animals. It will be completely uninhabited. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I will make Egypt desolate, and it will be surrounded by other desolate nations. Its cities will be empty and desolate for forty years, surrounded by other ruined cities. I will scatter the Egyptians to distant lands.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“But this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' also says: At the end of the forty years I will bring the Egyptians home again from the nations to which they have been scattered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will restore the prosperity of Egypt and bring its people back to the land of Pathros in southern Egypt from which they came. But Egypt will remain an unimportant, minor kingdom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: It will be the lowliest of all the nations, never again great enough to rise above its neighbors.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Then Israel will no longer be tempted to trust in Egypt for help. Egypt’s shattered condition will remind Israel of how sinful she was to trust Egypt in earlier days. Then Israel will know that I am the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nebuchadnezzar to Conquer Egypt
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: On April 26, the first day of the new year,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the first day of the first month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. This event occurred on April 26, 571 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 1:1.
    marker-yv: yv-n
  - type: text
    text: ' during the twenty-seventh year of King Jehoiachin’s captivity, this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Son of man, the army of King Nebuchadnezzar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nebuchadrezzar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Nebuchadnezzar; also in 29:19.
    marker-yv: yv-n
  - type: text
    text: ' of Babylon fought so hard against Tyre that the warriors’ heads were rubbed bare and their shoulders were raw and blistered. Yet Nebuchadnezzar and his army won no plunder to compensate them for all their work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Therefore, this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I will give the land of Egypt to Nebuchadnezzar, king of Babylon. He will carry off its wealth, plundering everything it has so he can pay his army. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Yes, I have given him the land of Egypt as a reward for his work, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', because he was working for me when he destroyed Tyre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “And the day will come when I will cause the ancient glory of Israel to revive,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: I will cause a horn to sprout for the house of Israel.
    marker-yv: yv-n
  - type: text
    text: ' and then, Ezekiel, your words will be respected. Then they will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
