document_id: PSA.85,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of the descendants of Korah.'
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you poured out blessings on your land!'
  - type: text
    content: You restored the fortunes of Israel.
  - type: note
    content: Hebrew of Jacob. See note on 44:4.
  '10':
  - type: text
    content: Unfailing love and truth have met together.
  - type: text
    content: Righteousness and peace have kissed!
  '11':
  - type: text
    content: Truth springs up from the earth,
  - type: text
    content: and righteousness smiles down from heaven.
  '12':
  - type: text
    content: 'Yes, the '
  - type: text
    content: Lord
  - type: text
    content: ' pours down his blessings.'
  - type: text
    content: Our land will yield its bountiful harvest.
  '13':
  - type: text
    content: Righteousness goes as a herald before him,
  - type: text
    content: preparing the way for his steps.
  '2':
  - type: text
    content: You forgave the guilt of your people—
  - type: text
    content: 'yes, you covered all their sins. '
  - type: text
    content: Interlude
  '3':
  - type: text
    content: You held back your fury.
  - type: text
    content: You kept back your blazing anger.
  '4':
  - type: text
    content: Now restore us again, O God of our salvation.
  - type: text
    content: Put aside your anger against us once more.
  '5':
  - type: text
    content: Will you be angry with us always?
  - type: text
    content: Will you prolong your wrath to all generations?
  '6':
  - type: text
    content: Won’t you revive us again,
  - type: text
    content: so your people can rejoice in you?
  '7':
  - type: text
    content: 'Show us your unfailing love, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and grant us your salvation.
  '8':
  - type: text
    content: 'I listen carefully to what God the '
  - type: text
    content: Lord
  - type: text
    content: ' is saying,'
  - type: text
    content: for he speaks peace to his faithful people.
  - type: text
    content: But let them not return to their foolish ways.
  '9':
  - type: text
    content: Surely his salvation is near to those who fear him,
  - type: text
    content: so our land will be filled with his glory.
