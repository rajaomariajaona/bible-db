document_id: PSA.85
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of the descendants of Korah.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you poured out blessings on your land!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You restored the fortunes of Israel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '85:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note on 44:4.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You forgave the guilt of your people—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'yes, you covered all their sins. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You held back your fury.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You kept back your blazing anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Now restore us again, O God of our salvation.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Put aside your anger against us once more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Will you be angry with us always?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will you prolong your wrath to all generations?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Won’t you revive us again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so your people can rejoice in you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Show us your unfailing love, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and grant us your salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I listen carefully to what God the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is saying,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he speaks peace to his faithful people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But let them not return to their foolish ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Surely his salvation is near to those who fear him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so our land will be filled with his glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Unfailing love and truth have met together.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Righteousness and peace have kissed!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Truth springs up from the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and righteousness smiles down from heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Yes, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' pours down his blessings.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Our land will yield its bountiful harvest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Righteousness goes as a herald before him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: preparing the way for his steps.
