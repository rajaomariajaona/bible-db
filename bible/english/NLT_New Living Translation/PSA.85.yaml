document_id: PSA.85,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of the descendants of Korah.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you poured out blessings on your land!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You restored the fortunes of Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '85:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of Jacob. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 44:4.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Unfailing love and truth have met together.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Righteousness and peace have kissed!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Truth springs up from the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and righteousness smiles down from heaven.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' pours down his blessings.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Our land will yield its bountiful harvest.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Righteousness goes as a herald before him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: preparing the way for his steps.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You forgave the guilt of your people—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'yes, you covered all their sins. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You held back your fury.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You kept back your blazing anger.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now restore us again, O God of our salvation.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Put aside your anger against us once more.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you be angry with us always?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you prolong your wrath to all generations?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Won’t you revive us again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so your people can rejoice in you?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Show us your unfailing love, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and grant us your salvation.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I listen carefully to what God the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is saying,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he speaks peace to his faithful people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But let them not return to their foolish ways.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely his salvation is near to those who fear him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so our land will be filled with his glory.
