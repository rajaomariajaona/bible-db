  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'A door led from the entry room of one of the inner gateways into a side room, where the meat for sacrifices was washed. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'On each side of this entry room were two tables, where the sacrificial animals were slaughtered for the burnt offerings, sin offerings, and guilt offerings. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Outside the entry room, on each side of the stairs going up to the north entrance, were two more tables. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'So there were eight tables in all—four inside and four outside—where the sacrifices were cut up and prepared. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
