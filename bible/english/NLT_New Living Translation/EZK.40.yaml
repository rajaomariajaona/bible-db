document_id: EZK.40
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The New Temple Area
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: On April 28,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'At the beginning of the year, on the tenth day of the month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. This event occurred on April 28, 573 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 1:1.
    marker-yv: yv-n
  - type: text
    text: ' during the twenty-fifth year of our captivity—fourteen years after the fall of Jerusalem—the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' took hold of me. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'In a vision from God he took me to the land of Israel and set me down on a very high mountain. From there I could see toward the south what appeared to be a city. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: As he brought me nearer, I saw a man whose face shone like bronze standing beside a gateway entrance. He was holding in his hand a linen measuring cord and a measuring rod.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He said to me, “Son of man, watch and listen. Pay close attention to everything I show you. You have been brought here so I can show you many things. Then you will return to the people of Israel and tell them everything you have seen.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The East Gateway
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I could see a wall completely surrounding the Temple area. The man took a measuring rod that was 10-1/2 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:5a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '6 long cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3.2 meters], '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'each being a cubit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[18 inches or 45 centimeters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'and a handbreadth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3 inches or 8 centimeters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in length.
    marker-yv: yv-n
  - type: text
    text: ' long and measured the wall, and the wall was 10-1/2 feet'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:5b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1 rod '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3.2 meters]; also in 40:5c, 7.'
    marker-yv: yv-n
  - type: text
    text: ' thick and 10-1/2 feet high.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then he went over to the eastern gateway. He climbed the steps and measured the threshold of the gateway; it was 10-1/2 feet front to back.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version, which reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1 rod '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3.2 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'deep; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 1 rod deep, and 1 threshold, 1 rod deep.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: There were guard alcoves on each side built into the gateway passage. Each of these alcoves was 10-1/2 feet square, with a distance between them of 8-3/4 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '5 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2.7 meters]; also in 40:48.'
    marker-yv: yv-n
  - type: text
    text: ' along the passage wall. The gateway’s inner threshold, which led to the entry room at the inner end of the gateway passage, was 10-1/2 feet front to back. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He also measured the entry room of the gateway.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in many Hebrew manuscripts and Syriac version; other Hebrew manuscripts add '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'which faced inward toward the Temple; it was 1 rod '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[10.5 feet or 3.2 meters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'deep. '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Then he measured the entry room of the gateway.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: It was 14 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:9a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '8 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[4.2 meters].'
    marker-yv: yv-n
  - type: text
    text: ' across, with supporting columns 3-1/2 feet'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:9b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '2 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[1.1 meters].'
    marker-yv: yv-n
  - type: text
    text: ' thick. This entry room was at the inner end of the gateway structure, facing toward the Temple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'There were three guard alcoves on each side of the gateway passage. Each had the same measurements, and the dividing walls separating them were also identical. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The man measured the gateway entrance, which was 17-1/2 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:11a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '10 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[5.3 meters].'
    marker-yv: yv-n
  - type: text
    text: ' wide at the opening and 22-3/4 feet'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:11b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '13 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[6.9 meters].'
    marker-yv: yv-n
  - type: text
    text: ' wide in the gateway passage. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: In front of each of the guard alcoves was a 21-inch
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:12a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1 cubit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[53 centimeters].'
    marker-yv: yv-n
  - type: text
    text: ' curb. The alcoves themselves were 10-1/2 feet'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:12b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '6 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3.2 meters].'
    marker-yv: yv-n
  - type: text
    text: ' on each side.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then he measured the entire width of the gateway, measuring the distance between the back walls of facing guard alcoves; this distance was 43-3/4 feet.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '25 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[13.3 meters]; also in 40:21, 25, 29, 30, 33, 36.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He measured the dividing walls all along the inside of the gateway up to the entry room of the gateway; this distance was 105 feet.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '60 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[31.8 meters]. Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '20 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[35 feet or 10.6 meters]. The meaning of the Hebrew in this verse is uncertain.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The full length of the gateway passage was 87-1/2 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '50 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[26.5 meters]; also in 40:21, 25, 29, 33, 36.'
    marker-yv: yv-n
  - type: text
    text: ' from one end to the other. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: There were recessed windows that narrowed inward through the walls of the guard alcoves and their dividing walls. There were also windows in the entry room. The surfaces of the dividing walls were decorated with carved palm trees.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Outer Courtyard
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the man brought me through the gateway into the outer courtyard of the Temple. A stone pavement ran along the walls of the courtyard, and thirty rooms were built against the walls, opening onto the pavement. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'This pavement flanked the gates and extended out from the walls into the courtyard the same distance as the gateway entrance. This was the lower pavement. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then the man measured across the Temple’s outer courtyard between the outer and inner gateways; the distance was 175 feet.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '100 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[53 meters]; also in 40:23, 27, 47.'
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The North Gateway
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The man measured the gateway on the north just like the one on the east. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Here, too, there were three guard alcoves on each side, with dividing walls and an entry room. All the measurements matched those of the east gateway. The gateway passage was 87-1/2 feet long and 43-3/4 feet wide between the back walls of facing guard alcoves. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The windows, the entry room, and the palm tree decorations were identical to those in the east gateway. There were seven steps leading up to the gateway entrance, and the entry room was at the inner end of the gateway passage. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Here on the north side, just as on the east, there was another gateway leading to the Temple’s inner courtyard directly opposite this outer gateway. The distance between the two gateways was 175 feet.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The South Gateway
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then the man took me around to the south gateway and measured its various parts, and they were exactly the same as in the others. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'It had windows along the walls as the others did, and there was an entry room where the gateway passage opened into the outer courtyard. And like the others, the gateway passage was 87-1/2 feet long and 43-3/4 feet wide between the back walls of facing guard alcoves. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'This gateway also had a stairway of seven steps leading up to it, and an entry room at the inner end, and palm tree decorations along the dividing walls. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And here again, directly opposite the outer gateway, was another gateway that led into the inner courtyard. The distance between the two gateways was 175 feet.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gateways to the Inner Courtyard
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then the man took me to the south gateway leading into the inner courtyard. He measured it, and it had the same measurements as the other gateways. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Its guard alcoves, dividing walls, and entry room were the same size as those in the others. It also had windows along its walls and in the entry room. And like the others, the gateway passage was 87-1/2 feet long and 43-3/4 feet wide. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: (The entry rooms of the gateways leading into the inner courtyard were 14 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in 40:9, which reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '8 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[14 feet or 4.2 meters]; here the Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '5 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[8-3/4 feet or 2.7 meters]. Some Hebrew manuscripts and the Greek version lack this entire verse.'
    marker-yv: yv-n
  - type: text
    text: ' across and 43-3/4 feet wide.) '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The entry room to the south gateway faced into the outer courtyard. It had palm tree decorations on its columns, and there were eight steps leading to its entrance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Then he took me to the east gateway leading to the inner courtyard. He measured it, and it had the same measurements as the other gateways. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Its guard alcoves, dividing walls, and entry room were the same size as those of the others, and there were windows along the walls and in the entry room. The gateway passage measured 87-1/2 feet long and 43-3/4 feet wide. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Its entry room faced into the outer courtyard. It had palm tree decorations on its columns, and there were eight steps leading to its entrance.
