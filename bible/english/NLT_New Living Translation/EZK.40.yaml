  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'The guard alcoves, dividing walls, and entry room of this gateway had the same measurements as in the others and the same window arrangements. The gateway passage measured 87-1/2 feet long and 43-3/4 feet wide. '
  - type: usfm
    marker: v
