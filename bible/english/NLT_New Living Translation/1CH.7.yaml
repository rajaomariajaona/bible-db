document_id: 1CH.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Descendants of Issachar
  - type: text
    content: The four sons of Issachar were Tola, Puah, Jashub, and Shimron.
  '10':
  - type: text
    content: 'The son of Jediael was Bilhan. The sons of Bilhan were Jeush, Benjamin, Ehud, Kenaanah, Zethan, Tarshish, and Ahishahar. '
  '11':
  - type: text
    content: Each of them was the leader of an ancestral clan. From these clans the total number of mighty warriors ready for war was 17,200.
  '12':
  - type: text
    content: The sons of Ir were Shuppim and Huppim. Hushim was the son of Aher.
  - type: heading
    content: Descendants of Naphtali
  '13':
  - type: text
    content: The sons of Naphtali were Jahzeel,
  - type: note
    content: As in parallel text at Gen 46:24; Hebrew reads Jahziel, a variant spelling of Jahzeel.
  - type: text
    content: ' Guni, Jezer, and Shillem.'
  - type: note
    content: As in some Hebrew and Greek manuscripts (see also Gen 46:24; Num 26:49); most Hebrew manuscripts read Shallum.
  - type: text
    content: ' They were all descendants of Jacob’s concubine Bilhah.'
  - type: heading
    content: Descendants of Manasseh
  '14':
  - type: text
    content: 'The descendants of Manasseh through his Aramean concubine included Asriel. She also bore Makir, the father of Gilead. '
  '15':
  - type: text
    content: Makir found wives for
  - type: note
    content: Or Makir took a wife from. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' Huppim and Shuppim. Makir had a sister named Maacah. One of his descendants was Zelophehad, who had only daughters.'
  '16':
  - type: text
    content: 'Makir’s wife, Maacah, gave birth to a son whom she named Peresh. His brother’s name was Sheresh. The sons of Peresh were Ulam and Rakem. '
  '17':
  - type: text
    content: The son of Ulam was Bedan. All these were considered Gileadites, descendants of Makir son of Manasseh.
  '18':
  - type: text
    content: Makir’s sister Hammoleketh gave birth to Ishhod, Abiezer, and Mahlah.
  '19':
  - type: text
    content: The sons of Shemida were Ahian, Shechem, Likhi, and Aniam.
  - type: heading
    content: Descendants of Ephraim
  '2':
  - type: text
    content: The sons of Tola were Uzzi, Rephaiah, Jeriel, Jahmai, Ibsam, and Shemuel. Each of them was the leader of an ancestral clan. At the time of King David, the total number of mighty warriors listed in the records of these clans was 22,600.
  '20':
  - type: text
    content: 'The descendants of Ephraim were Shuthelah, Bered, Tahath, Eleadah, Tahath, '
  '21':
  - type: text
    content: 'Zabad, Shuthelah, Ezer, and Elead. These two were killed trying to steal livestock from the local farmers near Gath. '
  '22':
  - type: text
    content: 'Their father, Ephraim, mourned for them a long time, and his relatives came to comfort him. '
  '23':
  - type: text
    content: Afterward Ephraim slept with his wife, and she became pregnant and gave birth to a son. Ephraim named him Beriah
  - type: note
    content: Beriah sounds like a Hebrew term meaning “tragedy” or “misfortune.”
  - type: text
    content: ' because of the tragedy his family had suffered. '
  '24':
  - type: text
    content: He had a daughter named Sheerah. She built the towns of Lower and Upper Beth-horon and Uzzen-sheerah.
  '25':
  - type: text
    content: 'The descendants of Ephraim included Rephah, Resheph, Telah, Tahan, '
  '26':
  - type: text
    content: 'Ladan, Ammihud, Elishama, '
  '27':
  - type: text
    content: Nun, and Joshua.
  '28':
  - type: text
    content: 'The descendants of Ephraim lived in the territory that included Bethel and its surrounding towns to the south, Naaran to the east, Gezer and its villages to the west, and Shechem and its surrounding villages to the north as far as Ayyah and its towns. '
  '29':
  - type: text
    content: Along the border of Manasseh were the towns of Beth-shan,
  - type: note
    content: Hebrew Beth-shean, a variant spelling of Beth-shan.
  - type: text
    content: ' Taanach, Megiddo, Dor, and their surrounding villages. The descendants of Joseph son of Israel'
  - type: note
    content: Israel is the name that God gave to Jacob.
  - type: text
    content: ' lived in these towns.'
  - type: heading
    content: Descendants of Asher
  '3':
  - type: text
    content: 'The son of Uzzi was Izrahiah. The sons of Izrahiah were Michael, Obadiah, Joel, and Isshiah. These five became the leaders of clans. '
  '30':
  - type: text
    content: The sons of Asher were Imnah, Ishvah, Ishvi, and Beriah. They had a sister named Serah.
  '31':
  - type: text
    content: The sons of Beriah were Heber and Malkiel (the father of Birzaith).
  '32':
  - type: text
    content: The sons of Heber were Japhlet, Shomer, and Hotham. They had a sister named Shua.
  '33':
  - type: text
    content: The sons of Japhlet were Pasach, Bimhal, and Ashvath.
  '34':
  - type: text
    content: The sons of Shomer were Ahi,
  - type: note
    content: Or The sons of Shomer, his brother, were.
  - type: text
    content: ' Rohgah, Hubbah, and Aram.'
  '35':
  - type: text
    content: The sons of his brother Helem
  - type: note
    content: Possibly another name for Hotham; compare 7:32.
  - type: text
    content: ' were Zophah, Imna, Shelesh, and Amal.'
  '36':
  - type: text
    content: 'The sons of Zophah were Suah, Harnepher, Shual, Beri, Imrah, '
  '37':
  - type: text
    content: Bezer, Hod, Shamma, Shilshah, Ithran,
  - type: note
    content: Possibly another name for Jether; compare 7:38.
  - type: text
    content: ' and Beera.'
  '38':
  - type: text
    content: The sons of Jether were Jephunneh, Pispah, and Ara.
  '39':
  - type: text
    content: The sons of Ulla were Arah, Hanniel, and Rizia.
  '4':
  - type: text
    content: All of them had many wives and many sons, so the total number of men available for military service among their descendants was 36,000.
  '40':
  - type: text
    content: Each of these descendants of Asher was the head of an ancestral clan. They were all select men—mighty warriors and outstanding leaders. The total number of men available for military service was 26,000, as listed in their genealogical records.
  '5':
  - type: text
    content: The total number of mighty warriors from all the clans of the tribe of Issachar was 87,000. All of them were listed in their genealogical records.
  - type: heading
    content: Descendants of Benjamin
  '6':
  - type: text
    content: Three of Benjamin’s sons were Bela, Beker, and Jediael.
  '7':
  - type: text
    content: The five sons of Bela were Ezbon, Uzzi, Uzziel, Jerimoth, and Iri. Each of them was the leader of an ancestral clan. The total number of mighty warriors from these clans was 22,034, as listed in their genealogical records.
  '8':
  - type: text
    content: 'The sons of Beker were Zemirah, Joash, Eliezer, Elioenai, Omri, Jeremoth, Abijah, Anathoth, and Alemeth. '
  '9':
  - type: text
    content: Each of them was the leader of an ancestral clan. The total number of mighty warriors and leaders from these clans was 20,200, as listed in their genealogical records.
