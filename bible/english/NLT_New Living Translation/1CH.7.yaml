document_id: 1CH.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Issachar
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The four sons of Issachar were Tola, Puah, Jashub, and Shimron.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The sons of Tola were Uzzi, Rephaiah, Jeriel, Jahmai, Ibsam, and Shemuel. Each of them was the leader of an ancestral clan. At the time of King David, the total number of mighty warriors listed in the records of these clans was 22,600.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The son of Uzzi was Izrahiah. The sons of Izrahiah were Michael, Obadiah, Joel, and Isshiah. These five became the leaders of clans. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: All of them had many wives and many sons, so the total number of men available for military service among their descendants was 36,000.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The total number of mighty warriors from all the clans of the tribe of Issachar was 87,000. All of them were listed in their genealogical records.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Benjamin
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Three of Benjamin’s sons were Bela, Beker, and Jediael.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The five sons of Bela were Ezbon, Uzzi, Uzziel, Jerimoth, and Iri. Each of them was the leader of an ancestral clan. The total number of mighty warriors from these clans was 22,034, as listed in their genealogical records.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The sons of Beker were Zemirah, Joash, Eliezer, Elioenai, Omri, Jeremoth, Abijah, Anathoth, and Alemeth. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Each of them was the leader of an ancestral clan. The total number of mighty warriors and leaders from these clans was 20,200, as listed in their genealogical records.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The son of Jediael was Bilhan. The sons of Bilhan were Jeush, Benjamin, Ehud, Kenaanah, Zethan, Tarshish, and Ahishahar. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Each of them was the leader of an ancestral clan. From these clans the total number of mighty warriors ready for war was 17,200.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The sons of Ir were Shuppim and Huppim. Hushim was the son of Aher.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Naphtali
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The sons of Naphtali were Jahzeel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:13a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at Gen 46:24; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jahziel, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jahzeel.
    marker-yv: yv-n
  - type: text
    text: ' Guni, Jezer, and Shillem.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:13b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Hebrew and Greek manuscripts (see also Gen 46:24; Num 26:49); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shallum.
    marker-yv: yv-n
  - type: text
    text: ' They were all descendants of Jacob’s concubine Bilhah.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Manasseh
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The descendants of Manasseh through his Aramean concubine included Asriel. She also bore Makir, the father of Gilead. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Makir found wives for
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Makir took a wife from. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' Huppim and Shuppim. Makir had a sister named Maacah. One of his descendants was Zelophehad, who had only daughters.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Makir’s wife, Maacah, gave birth to a son whom she named Peresh. His brother’s name was Sheresh. The sons of Peresh were Ulam and Rakem. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The son of Ulam was Bedan. All these were considered Gileadites, descendants of Makir son of Manasseh.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Makir’s sister Hammoleketh gave birth to Ishhod, Abiezer, and Mahlah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The sons of Shemida were Ahian, Shechem, Likhi, and Aniam.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Ephraim
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The descendants of Ephraim were Shuthelah, Bered, Tahath, Eleadah, Tahath, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Zabad, Shuthelah, Ezer, and Elead. These two were killed trying to steal livestock from the local farmers near Gath. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Their father, Ephraim, mourned for them a long time, and his relatives came to comfort him. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Afterward Ephraim slept with his wife, and she became pregnant and gave birth to a son. Ephraim named him Beriah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:23 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beriah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sounds like a Hebrew term meaning “tragedy” or “misfortune.”
    marker-yv: yv-n
  - type: text
    text: ' because of the tragedy his family had suffered. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He had a daughter named Sheerah. She built the towns of Lower and Upper Beth-horon and Uzzen-sheerah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The descendants of Ephraim included Rephah, Resheph, Telah, Tahan, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ladan, Ammihud, Elishama, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nun, and Joshua.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The descendants of Ephraim lived in the territory that included Bethel and its surrounding towns to the south, Naaran to the east, Gezer and its villages to the west, and Shechem and its surrounding villages to the north as far as Ayyah and its towns. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Along the border of Manasseh were the towns of Beth-shan,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:29a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beth-shean, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Beth-shan.
    marker-yv: yv-n
  - type: text
    text: ' Taanach, Megiddo, Dor, and their surrounding villages. The descendants of Joseph son of Israel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:29b '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Israel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is the name that God gave to Jacob.
    marker-yv: yv-n
  - type: text
    text: ' lived in these towns.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Asher
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The sons of Asher were Imnah, Ishvah, Ishvi, and Beriah. They had a sister named Serah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The sons of Beriah were Heber and Malkiel (the father of Birzaith).
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The sons of Heber were Japhlet, Shomer, and Hotham. They had a sister named Shua.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: The sons of Japhlet were Pasach, Bimhal, and Ashvath.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: The sons of Shomer were Ahi,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The sons of Shomer, his brother, were.
    marker-yv: yv-n
  - type: text
    text: ' Rohgah, Hubbah, and Aram.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: The sons of his brother Helem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Possibly another name for '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hotham; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare 7:32.
    marker-yv: yv-n
  - type: text
    text: ' were Zophah, Imna, Shelesh, and Amal.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'The sons of Zophah were Suah, Harnepher, Shual, Beri, Imrah, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Bezer, Hod, Shamma, Shilshah, Ithran,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Possibly another name for '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jether; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare 7:38.
    marker-yv: yv-n
  - type: text
    text: ' and Beera.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: The sons of Jether were Jephunneh, Pispah, and Ara.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: The sons of Ulla were Arah, Hanniel, and Rizia.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Each of these descendants of Asher was the head of an ancestral clan. They were all select men—mighty warriors and outstanding leaders. The total number of men available for military service was 26,000, as listed in their genealogical records.
