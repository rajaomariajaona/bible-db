document_id: ZEP.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Call to Repentance
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Gather together—yes, gather together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you shameless nation.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They will receive the wages of their pride,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for they have scoffed at the people of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will terrify them'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as he destroys all the gods in the land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then nations around the world will worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: each in their own land.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment against Ethiopia and Assyria
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “You Ethiopians
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Cushites.
      marker-yv: yv-n
    - type: text
      text: ' will also be slaughtered'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'by my sword,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will strike the lands of the north with his fist,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: destroying the land of Assyria.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will make its great capital, Nineveh, a desolate wasteland,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: parched like a desert.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The proud city will become a pasture for flocks and herds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all sorts of wild animals will settle there.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The desert owl and screech owl will roost on its ruined columns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their calls echoing through the gaping windows.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rubble will block all the doorways,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the cedar paneling will be exposed to the weather.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: This is the boisterous city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: once so secure.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am the greatest!” it boasted.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “No other city can compare with me!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But now, look how it has become an utter ruin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a haven for wild animals.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone passing by will laugh in derision
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shake a defiant fist.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Gather before judgment begins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before your time to repent is blown away like chaff.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Act now, before the fierce fury of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' falls'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and the terrible day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger begins.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', all who are humble,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and follow his commands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seek to do what is right
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to live humbly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Perhaps even yet the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will protect you—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: protect you from his anger on that day of destruction.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment against Philistia
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Gaza and Ashkelon will be abandoned,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ashdod and Ekron torn down.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And what sorrow awaits you Philistines
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Kerethites.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who live along the coast and in the land of Canaan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for this judgment is against you, too!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will destroy you'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until not one of you is left.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The Philistine coast will become a wilderness pasture,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a place of shepherd camps
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and enclosures for sheep and goats.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The remnant of the tribe of Judah will pasture there.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will rest at night in the abandoned houses in Ashkelon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God will visit his people in kindness'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and restore their prosperity again.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment against Moab and Ammon
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “I have heard the taunts of the Moabites
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the insults of the Ammonites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mocking my people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and invading their borders.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Now, as surely as I live,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, the God of Israel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Moab and Ammon will be destroyed—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: destroyed as completely as Sodom and Gomorrah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their land will become a place of stinging nettles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: salt pits, and eternal desolation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The remnant of my people will plunder them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and take their land.”
