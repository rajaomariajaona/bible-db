document_id: ZEP.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Repentance
  - type: text
    content: Gather together—yes, gather together,
  - type: text
    content: you shameless nation.
  '10':
  - type: text
    content: They will receive the wages of their pride,
  - type: text
    content: 'for they have scoffed at the people of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will terrify them'
  - type: text
    content: as he destroys all the gods in the land.
  - type: text
    content: 'Then nations around the world will worship the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: each in their own land.
  - type: heading
    content: Judgment against Ethiopia and Assyria
  '12':
  - type: text
    content: “You Ethiopians
  - type: note
    content: Hebrew Cushites.
  - type: text
    content: ' will also be slaughtered'
  - type: text
    content: 'by my sword,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will strike the lands of the north with his fist,'
  - type: text
    content: destroying the land of Assyria.
  - type: text
    content: He will make its great capital, Nineveh, a desolate wasteland,
  - type: text
    content: parched like a desert.
  '14':
  - type: text
    content: The proud city will become a pasture for flocks and herds,
  - type: text
    content: and all sorts of wild animals will settle there.
  - type: text
    content: The desert owl and screech owl will roost on its ruined columns,
  - type: text
    content: their calls echoing through the gaping windows.
  - type: text
    content: Rubble will block all the doorways,
  - type: text
    content: and the cedar paneling will be exposed to the weather.
  '15':
  - type: text
    content: This is the boisterous city,
  - type: text
    content: once so secure.
  - type: text
    content: “I am the greatest!” it boasted.
  - type: text
    content: “No other city can compare with me!”
  - type: text
    content: But now, look how it has become an utter ruin,
  - type: text
    content: a haven for wild animals.
  - type: text
    content: Everyone passing by will laugh in derision
  - type: text
    content: and shake a defiant fist.
  '2':
  - type: text
    content: Gather before judgment begins,
  - type: text
    content: before your time to repent is blown away like chaff.
  - type: text
    content: 'Act now, before the fierce fury of the '
  - type: text
    content: Lord
  - type: text
    content: ' falls'
  - type: text
    content: 'and the terrible day of the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger begins.
  '3':
  - type: text
    content: 'Seek the '
  - type: text
    content: Lord
  - type: text
    content: ', all who are humble,'
  - type: text
    content: and follow his commands.
  - type: text
    content: Seek to do what is right
  - type: text
    content: and to live humbly.
  - type: text
    content: 'Perhaps even yet the '
  - type: text
    content: Lord
  - type: text
    content: ' will protect you—'
  - type: text
    content: protect you from his anger on that day of destruction.
  - type: heading
    content: Judgment against Philistia
  '4':
  - type: text
    content: Gaza and Ashkelon will be abandoned,
  - type: text
    content: Ashdod and Ekron torn down.
  '5':
  - type: text
    content: And what sorrow awaits you Philistines
  - type: note
    content: Hebrew Kerethites.
  - type: text
    content: who live along the coast and in the land of Canaan,
  - type: text
    content: for this judgment is against you, too!
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will destroy you'
  - type: text
    content: until not one of you is left.
  '6':
  - type: text
    content: The Philistine coast will become a wilderness pasture,
  - type: text
    content: a place of shepherd camps
  - type: text
    content: and enclosures for sheep and goats.
  '7':
  - type: text
    content: The remnant of the tribe of Judah will pasture there.
  - type: text
    content: They will rest at night in the abandoned houses in Ashkelon.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' their God will visit his people in kindness'
  - type: text
    content: and restore their prosperity again.
  - type: heading
    content: Judgment against Moab and Ammon
  '8':
  - type: text
    content: “I have heard the taunts of the Moabites
  - type: text
    content: and the insults of the Ammonites,
  - type: text
    content: mocking my people
  - type: text
    content: and invading their borders.
  '9':
  - type: text
    content: Now, as surely as I live,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, the God of Israel,'
  - type: text
    content: “Moab and Ammon will be destroyed—
  - type: text
    content: destroyed as completely as Sodom and Gomorrah.
  - type: text
    content: Their land will become a place of stinging nettles,
  - type: text
    content: salt pits, and eternal desolation.
  - type: text
    content: The remnant of my people will plunder them
  - type: text
    content: and take their land.”
