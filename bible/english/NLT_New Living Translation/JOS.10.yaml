document_id: JOS.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Defeats the Southern Armies
  - type: text
    content: Adoni-zedek, king of Jerusalem, heard that Joshua had captured and completely destroyed
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering; also in 10:28, 35, 37, 39, 40.
  - type: text
    content: ' Ai and killed its king, just as he had destroyed the town of Jericho and killed its king. He also learned that the Gibeonites had made peace with Israel and were now their allies. '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' threw them into a panic, and the Israelites slaughtered great numbers of them at Gibeon. Then the Israelites chased the enemy along the road to Beth-horon, killing them all along the way to Azekah and Makkedah. '
  '11':
  - type: text
    content: 'As the Amorites retreated down the road from Beth-horon, the '
  - type: text
    content: Lord
  - type: text
    content: ' destroyed them with a terrible hailstorm from heaven that continued until they reached Azekah. The hail killed more of the enemy than the Israelites killed with the sword.'
  '12':
  - type: text
    content: 'On the day the '
  - type: text
    content: Lord
  - type: text
    content: ' gave the Israelites victory over the Amorites, Joshua prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' in front of all the people of Israel. He said,'
  - type: text
    content: “Let the sun stand still over Gibeon,
  - type: text
    content: and the moon over the valley of Aijalon.”
  '13':
  - type: text
    content: So the sun stood still and the moon stayed in place until the nation of Israel had defeated its enemies.
  - type: text
    content: 'Is this event not recorded in '
  - type: text
    content: The Book of Jashar
  - type: note
    content: Or The Book of the Upright.
  - type: text
    content: '? The sun stayed in the middle of the sky, and it did not set as on a normal day.'
  - type: note
    content: Or did not set for about a whole day.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'There has never been a day like this one before or since, when the '
  - type: text
    content: Lord
  - type: text
    content: ' answered such a prayer. Surely the '
  - type: text
    content: Lord
  - type: text
    content: ' fought for Israel that day!'
  '15':
  - type: text
    content: Then Joshua and the Israelite army returned to their camp at Gilgal.
  - type: heading
    content: Joshua Kills the Five Southern Kings
  '16':
  - type: text
    content: 'During the battle the five kings escaped and hid in a cave at Makkedah. '
  '17':
  - type: text
    content: 'When Joshua heard that they had been found, '
  '18':
  - type: text
    content: 'he issued this command: “Cover the opening of the cave with large rocks, and place guards at the entrance to keep the kings inside. '
  '19':
  - type: text
    content: 'The rest of you continue chasing the enemy and cut them down from the rear. Don’t give them a chance to get back to their towns, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given you victory over them.”'
  '2':
  - type: text
    content: He and his people became very afraid when they heard all this because Gibeon was a large town—as large as the royal cities and larger than Ai. And the Gibeonite men were strong warriors.
  '20':
  - type: text
    content: 'So Joshua and the Israelite army continued the slaughter and completely crushed the enemy. They totally wiped out the five armies except for a tiny remnant that managed to reach their fortified towns. '
  '21':
  - type: text
    content: Then the Israelites returned safely to Joshua in the camp at Makkedah. After that, no one dared to speak even a word against Israel.
  '22':
  - type: text
    content: 'Then Joshua said, “Remove the rocks covering the opening of the cave, and bring the five kings to me.” '
  '23':
  - type: text
    content: 'So they brought the five kings out of the cave—the kings of Jerusalem, Hebron, Jarmuth, Lachish, and Eglon. '
  '24':
  - type: text
    content: When they brought them out, Joshua told the commanders of his army, “Come and put your feet on the kings’ necks.” And they did as they were told.
  '25':
  - type: text
    content: '“Don’t ever be afraid or discouraged,” Joshua told his men. “Be strong and courageous, for the '
  - type: text
    content: Lord
  - type: text
    content: ' is going to do this to all of your enemies.” '
  '26':
  - type: text
    content: Then Joshua killed each of the five kings and impaled them on five sharpened poles, where they hung until evening.
  '27':
  - type: text
    content: As the sun was going down, Joshua gave instructions for the bodies of the kings to be taken down from the poles and thrown into the cave where they had been hiding. Then they covered the opening of the cave with a pile of large rocks, which remains to this very day.
  - type: heading
    content: Israel Destroys the Southern Towns
  '28':
  - type: text
    content: 'That same day Joshua captured and destroyed the town of Makkedah. He killed everyone in it, including the king, leaving no survivors. He destroyed them all, and he killed the king of Makkedah as he had killed the king of Jericho. '
  '29':
  - type: text
    content: 'Then Joshua and the Israelites went to Libnah and attacked it. '
  '3':
  - type: text
    content: 'So King Adoni-zedek of Jerusalem sent messengers to several other kings: Hoham of Hebron, Piram of Jarmuth, Japhia of Lachish, and Debir of Eglon. '
  '30':
  - type: text
    content: 'There, too, the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them the town and its king. He killed everyone in it, leaving no survivors. Then Joshua killed the king of Libnah as he had killed the king of Jericho.'
  '31':
  - type: text
    content: 'From Libnah, Joshua and the Israelites went to Lachish and attacked it. '
  '32':
  - type: text
    content: 'Here again, the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them Lachish. Joshua took it on the second day and killed everyone in it, just as he had done at Libnah. '
  '33':
  - type: text
    content: During the attack on Lachish, King Horam of Gezer arrived with his army to help defend the town. But Joshua’s men killed him and his army, leaving no survivors.
  '34':
  - type: text
    content: 'Then Joshua and the Israelite army went on to Eglon and attacked it. '
  '35':
  - type: text
    content: 'They captured it that day and killed everyone in it. He completely destroyed everyone, just as he had done at Lachish. '
  '36':
  - type: text
    content: 'From Eglon, Joshua and the Israelite army went up to Hebron and attacked it. '
  '37':
  - type: text
    content: They captured the town and killed everyone in it, including its king, leaving no survivors. They did the same thing to all of its surrounding villages. And just as he had done at Eglon, he completely destroyed the entire population.
  '38':
  - type: text
    content: 'Then Joshua and the Israelites turned back and attacked Debir. '
  '39':
  - type: text
    content: He captured the town, its king, and all of its surrounding villages. He completely destroyed everyone in it, leaving no survivors. He did to Debir and its king just what he had done to Hebron and to Libnah and its king.
  '4':
  - type: text
    content: '“Come and help me destroy Gibeon,” he urged them, “for they have made peace with Joshua and the people of Israel.” '
  '40':
  - type: text
    content: So Joshua conquered the whole region—the kings and people of the hill country, the Negev, the western foothills,
  - type: note
    content: Hebrew the Shephelah.
  - type: text
    content: ' and the mountain slopes. He completely destroyed everyone in the land, leaving no survivors, just as the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, had commanded. '
  '41':
  - type: text
    content: 'Joshua slaughtered them from Kadesh-barnea to Gaza and from the region around the town of Goshen up to Gibeon. '
  '42':
  - type: text
    content: 'Joshua conquered all these kings and their land in a single campaign, for the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, was fighting for his people.'
  '43':
  - type: text
    content: Then Joshua and the Israelite army returned to their camp at Gilgal.
  '5':
  - type: text
    content: So these five Amorite kings combined their armies for a united attack. They moved all their troops into place and attacked Gibeon.
  '6':
  - type: text
    content: The men of Gibeon quickly sent messengers to Joshua at his camp in Gilgal. “Don’t abandon your servants now!” they pleaded. “Come at once! Save us! Help us! For all the Amorite kings who live in the hill country have joined forces to attack us.”
  '7':
  - type: text
    content: 'So Joshua and his entire army, including his best warriors, left Gilgal and set out for Gibeon. '
  '8':
  - type: text
    content: '“Do not be afraid of them,” the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “for I have given you victory over them. Not a single one of them will be able to stand up to you.”'
  '9':
  - type: text
    content: 'Joshua traveled all night from Gilgal and took the Amorite armies by surprise. '
