document_id: JOS.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Defeats the Southern Armies
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Adoni-zedek, king of Jerusalem, heard that Joshua had captured and completely destroyed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering; also in 10:28, 35, 37, 39, 40.'
    marker-yv: yv-n
  - type: text
    text: ' Ai and killed its king, just as he had destroyed the town of Jericho and killed its king. He also learned that the Gibeonites had made peace with Israel and were now their allies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He and his people became very afraid when they heard all this because Gibeon was a large town—as large as the royal cities and larger than Ai. And the Gibeonite men were strong warriors.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So King Adoni-zedek of Jerusalem sent messengers to several other kings: Hoham of Hebron, Piram of Jarmuth, Japhia of Lachish, and Debir of Eglon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“Come and help me destroy Gibeon,” he urged them, “for they have made peace with Joshua and the people of Israel.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So these five Amorite kings combined their armies for a united attack. They moved all their troops into place and attacked Gibeon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The men of Gibeon quickly sent messengers to Joshua at his camp in Gilgal. “Don’t abandon your servants now!” they pleaded. “Come at once! Save us! Help us! For all the Amorite kings who live in the hill country have joined forces to attack us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Joshua and his entire army, including his best warriors, left Gilgal and set out for Gibeon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Do not be afraid of them,” the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Joshua, “for I have given you victory over them. Not a single one of them will be able to stand up to you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joshua traveled all night from Gilgal and took the Amorite armies by surprise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' threw them into a panic, and the Israelites slaughtered great numbers of them at Gibeon. Then the Israelites chased the enemy along the road to Beth-horon, killing them all along the way to Azekah and Makkedah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'As the Amorites retreated down the road from Beth-horon, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' destroyed them with a terrible hailstorm from heaven that continued until they reached Azekah. The hail killed more of the enemy than the Israelites killed with the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On the day the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave the Israelites victory over the Amorites, Joshua prayed to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in front of all the people of Israel. He said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let the sun stand still over Gibeon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the moon over the valley of Aijalon.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So the sun stood still and the moon stayed in place until the nation of Israel had defeated its enemies.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Is this event not recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of Jashar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:13a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The Book of the Upright.
    marker-yv: yv-n
  - type: text
    text: '? The sun stayed in the middle of the sky, and it did not set as on a normal day.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:13b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: did not set for about a whole day.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'There has never been a day like this one before or since, when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' answered such a prayer. Surely the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' fought for Israel that day!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then Joshua and the Israelite army returned to their camp at Gilgal.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joshua Kills the Five Southern Kings
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'During the battle the five kings escaped and hid in a cave at Makkedah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When Joshua heard that they had been found, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'he issued this command: “Cover the opening of the cave with large rocks, and place guards at the entrance to keep the kings inside. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The rest of you continue chasing the enemy and cut them down from the rear. Don’t give them a chance to get back to their towns, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God has given you victory over them.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So Joshua and the Israelite army continued the slaughter and completely crushed the enemy. They totally wiped out the five armies except for a tiny remnant that managed to reach their fortified towns. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then the Israelites returned safely to Joshua in the camp at Makkedah. After that, no one dared to speak even a word against Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then Joshua said, “Remove the rocks covering the opening of the cave, and bring the five kings to me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So they brought the five kings out of the cave—the kings of Jerusalem, Hebron, Jarmuth, Lachish, and Eglon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: When they brought them out, Joshua told the commanders of his army, “Come and put your feet on the kings’ necks.” And they did as they were told.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“Don’t ever be afraid or discouraged,” Joshua told his men. “Be strong and courageous, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is going to do this to all of your enemies.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then Joshua killed each of the five kings and impaled them on five sharpened poles, where they hung until evening.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: As the sun was going down, Joshua gave instructions for the bodies of the kings to be taken down from the poles and thrown into the cave where they had been hiding. Then they covered the opening of the cave with a pile of large rocks, which remains to this very day.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Destroys the Southern Towns
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'That same day Joshua captured and destroyed the town of Makkedah. He killed everyone in it, including the king, leaving no survivors. He destroyed them all, and he killed the king of Makkedah as he had killed the king of Jericho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Joshua and the Israelites went to Libnah and attacked it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'There, too, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave them the town and its king. He killed everyone in it, leaving no survivors. Then Joshua killed the king of Libnah as he had killed the king of Jericho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'From Libnah, Joshua and the Israelites went to Lachish and attacked it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Here again, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave them Lachish. Joshua took it on the second day and killed everyone in it, just as he had done at Libnah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: During the attack on Lachish, King Horam of Gezer arrived with his army to help defend the town. But Joshua’s men killed him and his army, leaving no survivors.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Then Joshua and the Israelite army went on to Eglon and attacked it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'They captured it that day and killed everyone in it. He completely destroyed everyone, just as he had done at Lachish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'From Eglon, Joshua and the Israelite army went up to Hebron and attacked it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: They captured the town and killed everyone in it, including its king, leaving no survivors. They did the same thing to all of its surrounding villages. And just as he had done at Eglon, he completely destroyed the entire population.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Then Joshua and the Israelites turned back and attacked Debir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: He captured the town, its king, and all of its surrounding villages. He completely destroyed everyone in it, leaving no survivors. He did to Debir and its king just what he had done to Hebron and to Libnah and its king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: So Joshua conquered the whole region—the kings and people of the hill country, the Negev, the western foothills,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Shephelah.
    marker-yv: yv-n
  - type: text
    text: ' and the mountain slopes. He completely destroyed everyone in the land, leaving no survivors, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, had commanded. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Joshua slaughtered them from Kadesh-barnea to Gaza and from the region around the town of Goshen up to Gibeon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Joshua conquered all these kings and their land in a single campaign, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, was fighting for his people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Then Joshua and the Israelite army returned to their camp at Gilgal.
