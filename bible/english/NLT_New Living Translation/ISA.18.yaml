document_id: ISA.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Ethiopia
  - type: text
    content: Listen, Ethiopia
  - type: note
    content: Hebrew Cush.
  - type: text
    content: —land of fluttering sails
  - type: note
    content: Or land of many locusts; Hebrew reads land of whirring wings.
  - type: text
    content: that lies at the headwaters of the Nile,
  '2':
  - type: text
    content: that sends ambassadors
  - type: text
    content: in swift boats down the river.
  - type: text
    content: Go, swift messengers!
  - type: text
    content: Take a message to a tall, smooth-skinned people,
  - type: text
    content: who are feared far and wide
  - type: text
    content: for their conquests and destruction,
  - type: text
    content: and whose land is divided by rivers.
  '3':
  - type: text
    content: All you people of the world,
  - type: text
    content: everyone who lives on the earth—
  - type: text
    content: when I raise my battle flag on the mountain, look!
  - type: text
    content: When I blow the ram’s horn, listen!
  '4':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has told me this:'
  - type: text
    content: “I will watch quietly from my dwelling place—
  - type: text
    content: as quietly as the heat rises on a summer day,
  - type: text
    content: or as the morning dew forms during the harvest.”
  '5':
  - type: text
    content: Even before you begin your attack,
  - type: text
    content: while your plans are ripening like grapes,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will cut off your new growth with pruning shears.'
  - type: text
    content: He will snip off and discard your spreading branches.
  '6':
  - type: text
    content: Your mighty army will be left dead in the fields
  - type: text
    content: for the mountain vultures and wild animals.
  - type: text
    content: The vultures will tear at the corpses all summer.
  - type: text
    content: The wild animals will gnaw at the bones all winter.
  '7':
  - type: text
    content: 'At that time the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies will receive gifts'
  - type: text
    content: from this land divided by rivers,
  - type: text
    content: from this tall, smooth-skinned people,
  - type: text
    content: who are feared far and wide for their conquests and destruction.
  - type: text
    content: They will bring the gifts to Jerusalem,
  - type: note
    content: Hebrew to Mount Zion.
  - type: text
    content: 'where the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies dwells.'
