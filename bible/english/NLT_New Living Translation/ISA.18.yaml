document_id: ISA.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message about Ethiopia
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Listen, Ethiopia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Cush.
    marker-yv: yv-n
  - type: text
    text: —land of fluttering sails
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'land of many locusts; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: land of whirring wings.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: that lies at the headwaters of the Nile,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: that sends ambassadors
- type: usfm
  marker: q2
  children:
  - type: text
    text: in swift boats down the river.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Go, swift messengers!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take a message to a tall, smooth-skinned people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who are feared far and wide
- type: usfm
  marker: q1
  children:
  - type: text
    text: for their conquests and destruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and whose land is divided by rivers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: All you people of the world,
- type: usfm
  marker: q2
  children:
  - type: text
    text: everyone who lives on the earth—
- type: usfm
  marker: q1
  children:
  - type: text
    text: when I raise my battle flag on the mountain, look!
- type: usfm
  marker: q2
  children:
  - type: text
    text: When I blow the ram’s horn, listen!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has told me this:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will watch quietly from my dwelling place—
- type: usfm
  marker: q2
  children:
  - type: text
    text: as quietly as the heat rises on a summer day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or as the morning dew forms during the harvest.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Even before you begin your attack,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while your plans are ripening like grapes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will cut off your new growth with pruning shears.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will snip off and discard your spreading branches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Your mighty army will be left dead in the fields
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the mountain vultures and wild animals.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The vultures will tear at the corpses all summer.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The wild animals will gnaw at the bones all winter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'At that time the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies will receive gifts'
- type: usfm
  marker: q2
  children:
  - type: text
    text: from this land divided by rivers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: from this tall, smooth-skinned people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who are feared far and wide for their conquests and destruction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will bring the gifts to Jerusalem,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to Mount Zion.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'where the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies dwells.'
