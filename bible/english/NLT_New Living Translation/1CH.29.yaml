document_id: 1CH.29,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Gifts for Building the Temple
  - type: text
    content: 'Then King David turned to the entire assembly and said, “My son Solomon, whom God has clearly chosen as the next king of Israel, is still young and inexperienced. The work ahead of him is enormous, for the Temple he will build is not for mere mortals—it is for the '
  - type: text
    content: Lord
  - type: text
    content: ' God himself! '
  '10':
  - type: text
    content: 'Then David praised the '
  - type: text
    content: Lord
  - type: text
    content: ' in the presence of the whole assembly:'
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ', the God of our ancestor Israel,'
  - type: note
    content: Israel is the name that God gave to Jacob.
  - type: text
    content: ' may you be praised forever and ever! '
  '11':
  - type: text
    content: 'Yours, O '
  - type: text
    content: Lord
  - type: text
    content: ', is the greatness, the power, the glory, the victory, and the majesty. Everything in the heavens and on earth is yours, O '
  - type: text
    content: Lord
  - type: text
    content: ', and this is your kingdom. We adore you as the one who is over all things. '
  '12':
  - type: text
    content: Wealth and honor come from you alone, for you rule over everything. Power and might are in your hand, and at your discretion people are made great and given strength.
  '13':
  - type: text
    content: '“O our God, we thank you and praise your glorious name! '
  '14':
  - type: text
    content: 'But who am I, and who are my people, that we could give anything to you? Everything we have has come from you, and we give you only what you first gave us! '
  '15':
  - type: text
    content: We are here for only a moment, visitors and strangers in the land as our ancestors were before us. Our days on earth are like a passing shadow, gone so soon without a trace.
  '16':
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ' our God, even this material we have gathered to build a Temple to honor your holy name comes from you! It all belongs to you! '
  '17':
  - type: text
    content: I know, my God, that you examine our hearts and rejoice when you find integrity there. You know I have done all this with good motives, and I have watched your people offer their gifts willingly and joyously.
  '18':
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ', the God of our ancestors Abraham, Isaac, and Israel, make your people always want to obey you. See to it that their love for you never changes. '
  '19':
  - type: text
    content: Give my son Solomon the wholehearted desire to obey all your commands, laws, and decrees, and to do everything necessary to build this Temple, for which I have made these preparations.”
  '2':
  - type: text
    content: Using every resource at my command, I have gathered as much as I could for building the Temple of my God. Now there is enough gold, silver, bronze, iron, and wood, as well as great quantities of onyx, other precious stones, costly jewels, and all kinds of fine stone and marble.
  '20':
  - type: text
    content: 'Then David said to the whole assembly, “Give praise to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God!” And the entire assembly praised the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, and they bowed low and knelt before the '
  - type: text
    content: Lord
  - type: text
    content: ' and the king.'
  - type: heading
    content: Solomon Named as King
  '21':
  - type: text
    content: 'The next day they brought 1,000 bulls, 1,000 rams, and 1,000 male lambs as burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '. They also brought liquid offerings and many other sacrifices on behalf of all Israel. '
  '22':
  - type: text
    content: 'They feasted and drank in the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence with great joy that day.
  - type: text
    content: 'And again they crowned David’s son Solomon as their new king. They anointed him before the '
  - type: text
    content: Lord
  - type: text
    content: ' as their leader, and they anointed Zadok as priest. '
  '23':
  - type: text
    content: 'So Solomon took the throne of the '
  - type: text
    content: Lord
  - type: text
    content: ' in place of his father, David, and he succeeded in everything, and all Israel obeyed him. '
  '24':
  - type: text
    content: 'All the officials, the warriors, and the sons of King David pledged their loyalty to King Solomon. '
  '25':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' exalted Solomon in the sight of all Israel, and he gave Solomon greater royal splendor than any king in Israel before him.'
  - type: heading
    content: Summary of David’s Reign
  '26':
  - type: text
    content: 'So David son of Jesse reigned over all Israel. '
  '27':
  - type: text
    content: 'He reigned over Israel for forty years, seven of them in Hebron and thirty-three in Jerusalem. '
  '28':
  - type: text
    content: He died at a ripe old age, having enjoyed long life, wealth, and honor. Then his son Solomon ruled in his place.
  '29':
  - type: text
    content: 'All the events of King David’s reign, from beginning to end, are written in '
  - type: text
    content: The Record of Samuel the Seer, The Record of Nathan the Prophet,
  - type: text
    content: ' and '
  - type: text
    content: The Record of Gad the Seer.
  - type: text
    content: ' '
  '3':
  - type: text
    content: '“And now, because of my devotion to the Temple of my God, I am giving all of my own private treasures of gold and silver to help in the construction. This is in addition to the building materials I have already collected for his holy Temple. '
  '30':
  - type: text
    content: These accounts include the mighty deeds of his reign and everything that happened to him and to Israel and to all the surrounding kingdoms.
  '4':
  - type: text
    content: I am donating more than 112 tons of gold
  - type: note
    content: Hebrew 3,000 talents [102 metric tons] of gold.
  - type: text
    content: ' from Ophir and 262 tons of refined silver'
  - type: note
    content: Hebrew 7,000 talents [238 metric tons] of silver.
  - type: text
    content: ' to be used for overlaying the walls of the buildings '
  '5':
  - type: text
    content: 'and for the other gold and silver work to be done by the craftsmen. Now then, who will follow my example and give offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ' today?”'
  '6':
  - type: text
    content: Then the family leaders, the leaders of the tribes of Israel, the generals and captains of the army,
  - type: note
    content: Hebrew the commanders of thousands and commanders of hundreds.
  - type: text
    content: ' and the king’s administrative officers all gave willingly. '
  '7':
  - type: text
    content: For the construction of the Temple of God, they gave about 188 tons of gold,
  - type: note
    content: Hebrew 5,000 talents [170 metric tons] of gold.
  - type: text
    content: ' 10,000 gold coins,'
  - type: note
    content: Hebrew 10,000 darics [a Persian coin] of gold, about 185 pounds or 84 kilograms in weight.
  - type: text
    content: ' 375 tons of silver,'
  - type: note
    content: Hebrew 10,000 talents [340 metric tons] of silver.
  - type: text
    content: ' 675 tons of bronze,'
  - type: note
    content: Hebrew 18,000 talents [612 metric tons] of bronze.
  - type: text
    content: ' and 3,750 tons of iron.'
  - type: note
    content: Hebrew 100,000 talents [3,400 metric tons] of iron.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'They also contributed numerous precious stones, which were deposited in the treasury of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' under the care of Jehiel, a descendant of Gershon. '
  '9':
  - type: text
    content: 'The people rejoiced over the offerings, for they had given freely and wholeheartedly to the '
  - type: text
    content: Lord
  - type: text
    content: ', and King David was filled with joy.'
  - type: heading
    content: David’s Prayer of Praise
