document_id: 1CH.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gifts for Building the Temple
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then King David turned to the entire assembly and said, “My son Solomon, whom God has clearly chosen as the next king of Israel, is still young and inexperienced. The work ahead of him is enormous, for the Temple he will build is not for mere mortals—it is for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God himself! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Using every resource at my command, I have gathered as much as I could for building the Temple of my God. Now there is enough gold, silver, bronze, iron, and wood, as well as great quantities of onyx, other precious stones, costly jewels, and all kinds of fine stone and marble.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“And now, because of my devotion to the Temple of my God, I am giving all of my own private treasures of gold and silver to help in the construction. This is in addition to the building materials I have already collected for his holy Temple. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I am donating more than 112 tons of gold
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:4a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '3,000 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[102 metric tons] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of gold.
    marker-yv: yv-n
  - type: text
    text: ' from Ophir and 262 tons of refined silver'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:4b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '7,000 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[238 metric tons] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of silver.
    marker-yv: yv-n
  - type: text
    text: ' to be used for overlaying the walls of the buildings '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and for the other gold and silver work to be done by the craftsmen. Now then, who will follow my example and give offerings to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' today?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then the family leaders, the leaders of the tribes of Israel, the generals and captains of the army,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the commanders of thousands and commanders of hundreds.
    marker-yv: yv-n
  - type: text
    text: ' and the king’s administrative officers all gave willingly. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For the construction of the Temple of God, they gave about 188 tons of gold,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:7a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '5,000 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[170 metric tons] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of gold.
    marker-yv: yv-n
  - type: text
    text: ' 10,000 gold coins,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:7b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '10,000 darics '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[a Persian coin] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of gold, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 185 pounds or 84 kilograms in weight.
    marker-yv: yv-n
  - type: text
    text: ' 375 tons of silver,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:7c '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '10,000 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[340 metric tons] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of silver.
    marker-yv: yv-n
  - type: text
    text: ' 675 tons of bronze,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:7d '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '18,000 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[612 metric tons] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of bronze.
    marker-yv: yv-n
  - type: text
    text: ' and 3,750 tons of iron.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:7e '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '100,000 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[3,400 metric tons] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of iron.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'They also contributed numerous precious stones, which were deposited in the treasury of the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' under the care of Jehiel, a descendant of Gershon. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The people rejoiced over the offerings, for they had given freely and wholeheartedly to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and King David was filled with joy.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: David’s Prayer of Praise
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then David praised the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in the presence of the whole assembly:'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: '“O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of our ancestor Israel,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:10 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Israel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is the name that God gave to Jacob.
    marker-yv: yv-n
  - type: text
    text: ' may you be praised forever and ever! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Yours, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', is the greatness, the power, the glory, the victory, and the majesty. Everything in the heavens and on earth is yours, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and this is your kingdom. We adore you as the one who is over all things. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Wealth and honor come from you alone, for you rule over everything. Power and might are in your hand, and at your discretion people are made great and given strength.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“O our God, we thank you and praise your glorious name! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But who am I, and who are my people, that we could give anything to you? Everything we have has come from you, and we give you only what you first gave us! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: We are here for only a moment, visitors and strangers in the land as our ancestors were before us. Our days on earth are like a passing shadow, gone so soon without a trace.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God, even this material we have gathered to build a Temple to honor your holy name comes from you! It all belongs to you! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I know, my God, that you examine our hearts and rejoice when you find integrity there. You know I have done all this with good motives, and I have watched your people offer their gifts willingly and joyously.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of our ancestors Abraham, Isaac, and Israel, make your people always want to obey you. See to it that their love for you never changes. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Give my son Solomon the wholehearted desire to obey all your commands, laws, and decrees, and to do everything necessary to build this Temple, for which I have made these preparations.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then David said to the whole assembly, “Give praise to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God!” And the entire assembly praised the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of their ancestors, and they bowed low and knelt before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and the king.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon Named as King
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The next day they brought 1,000 bulls, 1,000 rams, and 1,000 male lambs as burnt offerings to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. They also brought liquid offerings and many other sacrifices on behalf of all Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'They feasted and drank in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s presence with great joy that day.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And again they crowned David’s son Solomon as their new king. They anointed him before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as their leader, and they anointed Zadok as priest. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So Solomon took the throne of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in place of his father, David, and he succeeded in everything, and all Israel obeyed him. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'All the officials, the warriors, and the sons of King David pledged their loyalty to King Solomon. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' exalted Solomon in the sight of all Israel, and he gave Solomon greater royal splendor than any king in Israel before him.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Summary of David’s Reign
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'So David son of Jesse reigned over all Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'He reigned over Israel for forty years, seven of them in Hebron and thirty-three in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: He died at a ripe old age, having enjoyed long life, wealth, and honor. Then his son Solomon ruled in his place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'All the events of King David’s reign, from beginning to end, are written in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Record of Samuel the Seer, The Record of Nathan the Prophet,
  - type: text
    text: ' and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Record of Gad the Seer.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: These accounts include the mighty deeds of his reign and everything that happened to him and to Israel and to all the surrounding kingdoms.
