document_id: EZK.30,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Sad Day for Egypt
  - type: text
    content: 'This is another message that came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: '“For this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: By the power of King Nebuchadnezzar
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar.
  - type: text
    content: ' of Babylon,'
  - type: text
    content: I will destroy the hordes of Egypt.
  '11':
  - type: text
    content: He and his armies—the most ruthless of all—
  - type: text
    content: will be sent to demolish the land.
  - type: text
    content: They will make war against Egypt
  - type: text
    content: until slaughtered Egyptians cover the ground.
  '12':
  - type: text
    content: I will dry up the Nile River
  - type: text
    content: and sell the land to wicked men.
  - type: text
    content: I will destroy the land of Egypt and everything in it
  - type: text
    content: by the hands of foreigners.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '13':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: I will smash the idols
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung.
  - type: text
    content: ' of Egypt'
  - type: text
    content: and the images at Memphis.
  - type: note
    content: Hebrew Noph; also in 30:16.
  - type: text
    content: There will be no rulers left in Egypt;
  - type: text
    content: terror will sweep the land.
  '14':
  - type: text
    content: I will destroy southern Egypt,
  - type: note
    content: Hebrew Pathros.
  - type: text
    content: set fire to Zoan,
  - type: text
    content: and bring judgment against Thebes.
  - type: note
    content: Hebrew No; also in 30:15, 16.
  '15':
  - type: text
    content: I will pour out my fury on Pelusium,
  - type: note
    content: Hebrew Sin; also in 30:16.
  - type: text
    content: the strongest fortress of Egypt,
  - type: text
    content: and I will stamp out
  - type: text
    content: the hordes of Thebes.
  '16':
  - type: text
    content: Yes, I will set fire to all Egypt!
  - type: text
    content: Pelusium will be racked with pain;
  - type: text
    content: Thebes will be torn apart;
  - type: text
    content: Memphis will live in constant terror.
  '17':
  - type: text
    content: The young men of Heliopolis and Bubastis
  - type: note
    content: Hebrew of Awen and Pi-beseth.
  - type: text
    content: ' will die in battle,'
  - type: text
    content: and the women
  - type: note
    content: Or and her cities.
  - type: text
    content: ' will be taken away as slaves.'
  '18':
  - type: text
    content: When I come to break the proud strength of Egypt,
  - type: text
    content: it will be a dark day for Tahpanhes, too.
  - type: text
    content: A dark cloud will cover Tahpanhes,
  - type: text
    content: and its daughters will be led away as captives.
  '19':
  - type: text
    content: And so I will greatly punish Egypt,
  - type: text
    content: 'and they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: The Broken Arms of Pharaoh
  '2':
  - type: text
    content: '“Son of man, prophesy and give this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “Weep and wail
  - type: text
    content: for that day,
  '20':
  - type: text
    content: On April 29,
  - type: note
    content: Hebrew On the seventh day of the first month, of the ancient Hebrew lunar calendar. This event occurred on April 29, 587 b.c.; also see note on 1:1.
  - type: text
    content: ' during the eleventh year of King Jehoiachin’s captivity, this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '21':
  - type: text
    content: '“Son of man, I have broken the arm of Pharaoh, the king of Egypt. His arm has not been put in a cast so that it may heal. Neither has it been bound up with a splint to make it strong enough to hold a sword. '
  '22':
  - type: text
    content: 'Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am the enemy of Pharaoh, the king of Egypt! I will break both of his arms—the good arm along with the broken one—and I will make his sword clatter to the ground. '
  '23':
  - type: text
    content: 'I will scatter the Egyptians to many lands throughout the world. '
  '24':
  - type: text
    content: 'I will strengthen the arms of Babylon’s king and put my sword in his hand. But I will break the arms of Pharaoh, king of Egypt, and he will lie there mortally wounded, groaning in pain. '
  '25':
  - type: text
    content: 'I will strengthen the arms of the king of Babylon, while the arms of Pharaoh fall useless to his sides. And when I put my sword in the hand of Babylon’s king and he brings it against the land of Egypt, Egypt will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'I will scatter the Egyptians among the nations, dispersing them throughout the earth. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: for the terrible day is almost here—
  - type: text
    content: 'the day of the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: It is a day of clouds and gloom,
  - type: text
    content: a day of despair for the nations.
  '4':
  - type: text
    content: A sword will come against Egypt,
  - type: text
    content: and those who are slaughtered will cover the ground.
  - type: text
    content: Its wealth will be carried away
  - type: text
    content: and its foundations destroyed.
  - type: text
    content: The land of Ethiopia
  - type: note
    content: Hebrew Cush; similarly in 30:9.
  - type: text
    content: ' will be ravished.'
  '5':
  - type: text
    content: Ethiopia, Libya, Lydia, all Arabia,
  - type: note
    content: Hebrew Cush, Put, Lud, all Arabia, Cub. Cub is otherwise unknown and may be another spelling for Lub (Libya).
  - type: text
    content: and all their other allies
  - type: text
    content: will be destroyed in that war.
  '6':
  - type: text
    content: '“For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: All of Egypt’s allies will fall,
  - type: text
    content: and the pride of her power will end.
  - type: text
    content: From Migdol to Aswan
  - type: note
    content: Hebrew to Syene.
  - type: text
    content: they will be slaughtered by the sword,
  - type: text
    content: 'says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: Egypt will be desolate,
  - type: text
    content: surrounded by desolate nations,
  - type: text
    content: and its cities will be in ruins,
  - type: text
    content: surrounded by other ruined cities.
  '8':
  - type: text
    content: 'And the people of Egypt will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: when I have set Egypt on fire
  - type: text
    content: and destroyed all their allies.
  '9':
  - type: text
    content: At that time I will send swift messengers in ships
  - type: text
    content: to terrify the complacent Ethiopians.
  - type: text
    content: Great panic will come upon them
  - type: text
    content: on that day of Egypt’s certain destruction.
  - type: text
    content: Watch for it!
  - type: text
    content: It is sure to come!
