    marker-yv: yv-n
  - type: text
    text: ' during the eleventh year of King Jehoiachin’s captivity, this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“Son of man, I have broken the arm of Pharaoh, the king of Egypt. His arm has not been put in a cast so that it may heal. Neither has it been bound up with a splint to make it strong enough to hold a sword. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Therefore, this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I am the enemy of Pharaoh, the king of Egypt! I will break both of his arms—the good arm along with the broken one—and I will make his sword clatter to the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'I will scatter the Egyptians to many lands throughout the world. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'I will strengthen the arms of Babylon’s king and put my sword in his hand. But I will break the arms of Pharaoh, king of Egypt, and he will lie there mortally wounded, groaning in pain. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I will strengthen the arms of the king of Babylon, while the arms of Pharaoh fall useless to his sides. And when I put my sword in the hand of Babylon’s king and he brings it against the land of Egypt, Egypt will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I will scatter the Egyptians among the nations, dispersing them throughout the earth. Then they will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
