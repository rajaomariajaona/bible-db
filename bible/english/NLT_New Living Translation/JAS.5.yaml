document_id: JAS.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warning to the Rich
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Look here, you rich people: Weep and groan with anguish because of all the terrible troubles ahead of you. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For examples of patience in suffering, dear brothers and sisters, look at the prophets who spoke in the name of the Lord. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We give great honor to those who endure under suffering. For instance, you know about Job, a man of great endurance. You can see how the Lord was kind to him at the end, for the Lord is full of tenderness and mercy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But most of all, my brothers and sisters, never take an oath, by heaven or earth or anything else. Just say a simple yes or no, so that you will not sin and be condemned.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Power of Prayer
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Are any of you suffering hardships? You should pray. Are any of you happy? You should sing praises. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Are any of you sick? You should call for the elders of the church to come and pray over you, anointing you with oil in the name of the Lord. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Such a prayer offered in faith will heal the sick, and the Lord will make you well. And if you have committed any sins, you will be forgiven.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Confess your sins to each other and pray for each other so that you may be healed. The earnest prayer of a righteous person has great power and produces wonderful results. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elijah was as human as we are, and yet when he prayed earnestly that no rain would fall, none fell for three and a half years! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then, when he prayed again, the sky sent down rain and the earth began to yield its crops.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Restore Wandering Believers
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'My dear brothers and sisters, if someone among you wanders away from the truth and is brought back, '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Your wealth is rotting away, and your fine clothes are moth-eaten rags. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: you can be sure that whoever brings the sinner back from wandering will save that person from death and bring about the forgiveness of many sins.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Your gold and silver are corroded. The very wealth you were counting on will eat away your flesh like fire. This corroded treasure you have hoarded will testify against you on the day of judgment. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For listen! Hear the cries of the field workers whom you have cheated of their pay. The cries of those who harvest your fields have reached the ears of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You have spent your years on earth in luxury, satisfying your every desire. You have fattened yourselves for the day of slaughter. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You have condemned and killed innocent people,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: killed the Righteous One.
      marker-yv: yv-n
    - type: text
      text: ' who do not resist you.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Don’t they resist you? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Doesn’t God oppose you? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Aren’t they now accusing you before God?
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Patience and Endurance
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 5:9, 10, 12, 19.
      marker-yv: yv-n
    - type: text
      text: ' be patient as you wait for the Lord’s return. Consider the farmers who patiently wait for the rains in the fall and in the spring. They eagerly look for the valuable harvest to ripen. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: You, too, must be patient. Take courage, for the coming of the Lord is near.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Don’t grumble about each other, brothers and sisters, or you will be judged. For look—the Judge is standing at the door!
