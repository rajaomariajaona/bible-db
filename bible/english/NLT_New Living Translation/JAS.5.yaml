document_id: JAS.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning to the Rich
  - type: text
    content: 'Look here, you rich people: Weep and groan with anguish because of all the terrible troubles ahead of you. '
  '10':
  - type: text
    content: 'For examples of patience in suffering, dear brothers and sisters, look at the prophets who spoke in the name of the Lord. '
  '11':
  - type: text
    content: We give great honor to those who endure under suffering. For instance, you know about Job, a man of great endurance. You can see how the Lord was kind to him at the end, for the Lord is full of tenderness and mercy.
  '12':
  - type: text
    content: But most of all, my brothers and sisters, never take an oath, by heaven or earth or anything else. Just say a simple yes or no, so that you will not sin and be condemned.
  - type: heading
    content: The Power of Prayer
  '13':
  - type: text
    content: 'Are any of you suffering hardships? You should pray. Are any of you happy? You should sing praises. '
  '14':
  - type: text
    content: 'Are any of you sick? You should call for the elders of the church to come and pray over you, anointing you with oil in the name of the Lord. '
  '15':
  - type: text
    content: Such a prayer offered in faith will heal the sick, and the Lord will make you well. And if you have committed any sins, you will be forgiven.
  '16':
  - type: text
    content: 'Confess your sins to each other and pray for each other so that you may be healed. The earnest prayer of a righteous person has great power and produces wonderful results. '
  '17':
  - type: text
    content: 'Elijah was as human as we are, and yet when he prayed earnestly that no rain would fall, none fell for three and a half years! '
  '18':
  - type: text
    content: Then, when he prayed again, the sky sent down rain and the earth began to yield its crops.
  - type: heading
    content: Restore Wandering Believers
  '19':
  - type: text
    content: 'My dear brothers and sisters, if someone among you wanders away from the truth and is brought back, '
  '2':
  - type: text
    content: 'Your wealth is rotting away, and your fine clothes are moth-eaten rags. '
  '20':
  - type: text
    content: you can be sure that whoever brings the sinner back from wandering will save that person from death and bring about the forgiveness of many sins.
  '3':
  - type: text
    content: 'Your gold and silver are corroded. The very wealth you were counting on will eat away your flesh like fire. This corroded treasure you have hoarded will testify against you on the day of judgment. '
  '4':
  - type: text
    content: 'For listen! Hear the cries of the field workers whom you have cheated of their pay. The cries of those who harvest your fields have reached the ears of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '5':
  - type: text
    content: 'You have spent your years on earth in luxury, satisfying your every desire. You have fattened yourselves for the day of slaughter. '
  '6':
  - type: text
    content: You have condemned and killed innocent people,
  - type: note
    content: Or killed the Righteous One.
  - type: text
    content: ' who do not resist you.'
  - type: note
    content: Or Don’t they resist you? or Doesn’t God oppose you? or Aren’t they now accusing you before God?
  - type: heading
    content: Patience and Endurance
  '7':
  - type: text
    content: Dear brothers and sisters,
  - type: note
    content: Greek brothers; also in 5:9, 10, 12, 19.
  - type: text
    content: ' be patient as you wait for the Lord’s return. Consider the farmers who patiently wait for the rains in the fall and in the spring. They eagerly look for the valuable harvest to ripen. '
  '8':
  - type: text
    content: You, too, must be patient. Take courage, for the coming of the Lord is near.
  '9':
  - type: text
    content: Don’t grumble about each other, brothers and sisters, or you will be judged. For look—the Judge is standing at the door!
