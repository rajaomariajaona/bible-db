verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Book Two
    - type: text
      text: ' (Psalms 42–72)'
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:TITLE '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maskil. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may be a literary or musical term.
      marker-yv: yv-n
    - type: text
      text: ' of the descendants of Korah.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As the deer longs for streams of water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I long for you, O God.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their taunts break my bones.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They scoff, “Where is this God of yours?”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why am I discouraged?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why is my heart so sad?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put my hope in God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will praise him again—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my Savior and my God!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I thirst for God, the living God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When can I go and stand before him?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day and night I have only tears for food,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while my enemies continually taunt me, saying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Where is this God of yours?”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart is breaking
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'as I remember how it used to be:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I walked among the crowds of worshipers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leading a great procession to the house of God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: singing for joy and giving thanks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: amid the sound of a great celebration!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why am I discouraged?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why is my heart so sad?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put my hope in God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will praise him again—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'my Savior and '
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I am deeply discouraged,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I will remember you—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even from distant Mount Hermon, the source of the Jordan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the land of Mount Mizar.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hear the tumult of the raging seas
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as your waves and surging tides sweep over me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But each day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' pours his unfailing love upon me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and through each night I sing his songs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: praying to God who gives me life.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “O God my rock,” I cry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “why have you forgotten me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why must I wander around in grief,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: oppressed by my enemies?”
