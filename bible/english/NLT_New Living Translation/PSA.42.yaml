document_id: PSA.42,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Book Two (Psalms 42–72)
  - type: text
    content: 'For the choir director: A psalm'
  - type: note
    content: Hebrew maskil. This may be a literary or musical term.
  - type: text
    content: ' of the descendants of Korah.'
  - type: text
    content: As the deer longs for streams of water,
  - type: text
    content: so I long for you, O God.
  '10':
  - type: text
    content: Their taunts break my bones.
  - type: text
    content: They scoff, “Where is this God of yours?”
  '11':
  - type: text
    content: Why am I discouraged?
  - type: text
    content: Why is my heart so sad?
  - type: text
    content: I will put my hope in God!
  - type: text
    content: I will praise him again—
  - type: text
    content: my Savior and my God!
  '2':
  - type: text
    content: I thirst for God, the living God.
  - type: text
    content: When can I go and stand before him?
  '3':
  - type: text
    content: Day and night I have only tears for food,
  - type: text
    content: while my enemies continually taunt me, saying,
  - type: text
    content: “Where is this God of yours?”
  '4':
  - type: text
    content: My heart is breaking
  - type: text
    content: 'as I remember how it used to be:'
  - type: text
    content: I walked among the crowds of worshipers,
  - type: text
    content: leading a great procession to the house of God,
  - type: text
    content: singing for joy and giving thanks
  - type: text
    content: amid the sound of a great celebration!
  '5':
  - type: text
    content: Why am I discouraged?
  - type: text
    content: Why is my heart so sad?
  - type: text
    content: I will put my hope in God!
  - type: text
    content: I will praise him again—
  - type: text
    content: 'my Savior and '
  '6':
  - type: text
    content: my God!
  - type: text
    content: Now I am deeply discouraged,
  - type: text
    content: but I will remember you—
  - type: text
    content: even from distant Mount Hermon, the source of the Jordan,
  - type: text
    content: from the land of Mount Mizar.
  '7':
  - type: text
    content: I hear the tumult of the raging seas
  - type: text
    content: as your waves and surging tides sweep over me.
  '8':
  - type: text
    content: 'But each day the '
  - type: text
    content: Lord
  - type: text
    content: ' pours his unfailing love upon me,'
  - type: text
    content: and through each night I sing his songs,
  - type: text
    content: praying to God who gives me life.
  '9':
  - type: text
    content: “O God my rock,” I cry,
  - type: text
    content: “why have you forgotten me?
  - type: text
    content: Why must I wander around in grief,
  - type: text
    content: oppressed by my enemies?”
