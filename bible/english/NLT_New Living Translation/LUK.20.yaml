document_id: LUK.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Authority of Jesus Challenged
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'One day as Jesus was teaching the people and preaching the Good News in the Temple, the leading priests, the teachers of religious law, and the elders came up to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They demanded, “By what authority are you doing all these things? Who gave you the right?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Let me ask you a question first,” '
  - type: text
    text: 'he replied. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Did John’s authority to baptize come from heaven, or was it merely human?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They talked it over among themselves. “If we say it was from heaven, he will ask why we didn’t believe John. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But if we say it was merely human, the people will stone us because they are convinced John was a prophet.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So they finally replied that they didn’t know.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then I won’t tell you by what authority I do these things.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Evil Farmers
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now Jesus turned to the people again and told them this story: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A man planted a vineyard, leased it to tenant farmers, and moved to another country to live for several years.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: At the time of the grape harvest, he sent one of his servants to collect his share of the crop. But the farmers attacked the servant, beat him up, and sent him back empty-handed.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So the owner sent another servant, but they also insulted him, beat him up, and sent him away empty-handed.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A third man was sent, and they wounded him and chased him away.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “‘What will I do?’ the owner asked himself. ‘I know! I’ll send my cherished son. Surely they will respect him.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But when the tenant farmers saw his son, they said to each other, ‘Here comes the heir to this estate. Let’s kill him and get the estate for ourselves!’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So they dragged him out of the vineyard and murdered him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“What do you suppose the owner of the vineyard will do to them?” '
  - type: text
    text: 'Jesus asked. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I’ll tell you—he will come and kill those farmers and lease the vineyard to others.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “How terrible that such a thing should ever happen,” his listeners protested.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jesus looked at them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then what does this Scripture mean?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘The stone that the builders rejected
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: has now become the cornerstone.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 118:22.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Everyone who stumbles over that stone will be broken to pieces, and it will crush anyone it falls on.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The teachers of religious law and the leading priests wanted to arrest Jesus immediately because they realized he was telling the story against them—they were the wicked farmers. But they were afraid of the people’s reaction.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Taxes for Caesar
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Watching for their opportunity, the leaders sent spies pretending to be honest men. They tried to get Jesus to say something that could be reported to the Roman governor so he would arrest Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“Teacher,” they said, “we know that you speak and teach what is right and are not influenced by what others think. You teach the way of God truthfully. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Now tell us—is it right for us to pay taxes to Caesar or not?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'He saw through their trickery and said, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Show me a Roman coin.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a denarius.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whose picture and title are stamped on it?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Caesar’s,” they replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Well then,” '
  - type: text
    text: 'he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “give to Caesar what belongs to Caesar, and give to God what belongs to God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: So they failed to trap him by what he said in front of the people. Instead, they were amazed by his answer, and they became silent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Discussion about Resurrection
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then Jesus was approached by some Sadducees—religious leaders who say there is no resurrection from the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'They posed this question: “Teacher, Moses gave us a law that if a man dies, leaving a wife but no children, his brother should marry the widow and have a child who will carry on the brother’s name.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Deut 25:5-6.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Well, suppose there were seven brothers. The oldest one married and then died without children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So the second brother married the widow, but he also died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then the third brother married her. This continued with all seven of them, who died without children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Finally, the woman also died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: So tell us, whose wife will she be in the resurrection? For all seven were married to her!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Marriage is for people here on earth.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But in the age to come, those worthy of being raised from the dead will neither marry nor be given in marriage.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And they will never die again. In this respect they will be like angels. They are children of God and children of the resurrection.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But now, as to whether the dead will be raised—even Moses proved this when he wrote about the burning bush. Long after Abraham, Isaac, and Jacob had died, he referred to the Lord
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:37a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: when he wrote about the bush. He referred to the Lord.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: as ‘the God of Abraham, the God of Isaac, and the God of Jacob.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:37b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Exod 3:6.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So he is the God of the living, not the dead, for they are all alive to him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '“Well said, Teacher!” remarked some of the teachers of religious law who were standing there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: And then no one dared to ask him any more questions.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Whose Son Is the Messiah?
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Then Jesus presented them with a question. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Why is it,” '
  - type: text
    text: 'he asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “that the Messiah is said to be the son of David?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For David himself wrote in the book of Psalms:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to my Lord,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Sit in the place of honor at my right hand
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: until I humble your enemies,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: making them a footstool under your feet.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:42-43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 110:1.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Since David called the Messiah ‘Lord,’ how can the Messiah be his son?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Then, with the crowds listening, he turned to his disciples and said, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Beware of these teachers of religious law! For they like to parade around in flowing robes and love to receive respectful greetings as they walk in the marketplaces. And how they love the seats of honor in the synagogues and the head table at banquets.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Yet they shamelessly cheat widows out of their property and then pretend to be pious by making long prayers in public. Because of this, they will be severely punished.”
