document_id: LUK.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Authority of Jesus Challenged
  - type: text
    content: 'One day as Jesus was teaching the people and preaching the Good News in the Temple, the leading priests, the teachers of religious law, and the elders came up to him. '
  '10':
  - type: text
    content: At the time of the grape harvest, he sent one of his servants to collect his share of the crop. But the farmers attacked the servant, beat him up, and sent him back empty-handed.
  - type: text
    content: ' '
  '11':
  - type: text
    content: So the owner sent another servant, but they also insulted him, beat him up, and sent him away empty-handed.
  - type: text
    content: ' '
  '12':
  - type: text
    content: A third man was sent, and they wounded him and chased him away.
  '13':
  - type: text
    content: ' '
  - type: text
    content: “‘What will I do?’ the owner asked himself. ‘I know! I’ll send my cherished son. Surely they will respect him.’
  '14':
  - type: text
    content: ' '
  - type: text
    content: “But when the tenant farmers saw his son, they said to each other, ‘Here comes the heir to this estate. Let’s kill him and get the estate for ourselves!’
  - type: text
    content: ' '
  '15':
  - type: text
    content: So they dragged him out of the vineyard and murdered him.
  - type: text
    content: '“What do you suppose the owner of the vineyard will do to them?” '
  - type: text
    content: 'Jesus asked. '
  '16':
  - type: text
    content: “I’ll tell you—he will come and kill those farmers and lease the vineyard to others.”
  - type: text
    content: “How terrible that such a thing should ever happen,” his listeners protested.
  '17':
  - type: text
    content: 'Jesus looked at them and said, '
  - type: text
    content: “Then what does this Scripture mean?
  - type: text
    content: ‘The stone that the builders rejected
  - type: text
    content: has now become the cornerstone.’
  - type: note
    content: Ps 118:22.
  '18':
  - type: text
    content: ' '
  - type: text
    content: Everyone who stumbles over that stone will be broken to pieces, and it will crush anyone it falls on.”
  '19':
  - type: text
    content: The teachers of religious law and the leading priests wanted to arrest Jesus immediately because they realized he was telling the story against them—they were the wicked farmers. But they were afraid of the people’s reaction.
  - type: heading
    content: Taxes for Caesar
  '2':
  - type: text
    content: They demanded, “By what authority are you doing all these things? Who gave you the right?”
  '20':
  - type: text
    content: 'Watching for their opportunity, the leaders sent spies pretending to be honest men. They tried to get Jesus to say something that could be reported to the Roman governor so he would arrest Jesus. '
  '21':
  - type: text
    content: '“Teacher,” they said, “we know that you speak and teach what is right and are not influenced by what others think. You teach the way of God truthfully. '
  '22':
  - type: text
    content: Now tell us—is it right for us to pay taxes to Caesar or not?”
  '23':
  - type: text
    content: 'He saw through their trickery and said, '
  '24':
  - type: text
    content: “Show me a Roman coin.
  - type: note
    content: Greek a denarius.
  - type: text
    content: ' '
  - type: text
    content: Whose picture and title are stamped on it?”
  - type: text
    content: “Caesar’s,” they replied.
  '25':
  - type: text
    content: ' '
  - type: text
    content: '“Well then,” '
  - type: text
    content: 'he said, '
  - type: text
    content: “give to Caesar what belongs to Caesar, and give to God what belongs to God.”
  '26':
  - type: text
    content: So they failed to trap him by what he said in front of the people. Instead, they were amazed by his answer, and they became silent.
  - type: heading
    content: Discussion about Resurrection
  '27':
  - type: text
    content: 'Then Jesus was approached by some Sadducees—religious leaders who say there is no resurrection from the dead. '
  '28':
  - type: text
    content: 'They posed this question: “Teacher, Moses gave us a law that if a man dies, leaving a wife but no children, his brother should marry the widow and have a child who will carry on the brother’s name.'
  - type: note
    content: See Deut 25:5-6.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Well, suppose there were seven brothers. The oldest one married and then died without children. '
  '3':
  - type: text
    content: ' '
  - type: text
    content: '“Let me ask you a question first,” '
  - type: text
    content: 'he replied. '
  '30':
  - type: text
    content: 'So the second brother married the widow, but he also died. '
  '31':
  - type: text
    content: 'Then the third brother married her. This continued with all seven of them, who died without children. '
  '32':
  - type: text
    content: 'Finally, the woman also died. '
  '33':
  - type: text
    content: So tell us, whose wife will she be in the resurrection? For all seven were married to her!”
  '34':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Marriage is for people here on earth.
  - type: text
    content: ' '
  '35':
  - type: text
    content: But in the age to come, those worthy of being raised from the dead will neither marry nor be given in marriage.
  - type: text
    content: ' '
  '36':
  - type: text
    content: And they will never die again. In this respect they will be like angels. They are children of God and children of the resurrection.
  '37':
  - type: text
    content: ' '
  - type: text
    content: “But now, as to whether the dead will be raised—even Moses proved this when he wrote about the burning bush. Long after Abraham, Isaac, and Jacob had died, he referred to the Lord
  - type: text
    content: ' '
  - type: note
    content: Greek when he wrote about the bush. He referred to the Lord.
  - type: text
    content: as ‘the God of Abraham, the God of Isaac, and the God of Jacob.’
  - type: note
    content: Exod 3:6.
  - type: text
    content: ' '
  '38':
  - type: text
    content: So he is the God of the living, not the dead, for they are all alive to him.”
  '39':
  - type: text
    content: '“Well said, Teacher!” remarked some of the teachers of religious law who were standing there. '
  '4':
  - type: text
    content: “Did John’s authority to baptize come from heaven, or was it merely human?”
  '40':
  - type: text
    content: And then no one dared to ask him any more questions.
  - type: heading
    content: Whose Son Is the Messiah?
  '41':
  - type: text
    content: 'Then Jesus presented them with a question. '
  - type: text
    content: '“Why is it,” '
  - type: text
    content: 'he asked, '
  - type: text
    content: “that the Messiah is said to be the son of David?
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'For David himself wrote in the book of Psalms:'
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' said to my Lord,'
  - type: text
    content: Sit in the place of honor at my right hand
  '43':
  - type: text
    content: ' '
  - type: text
    content: until I humble your enemies,
  - type: text
    content: making them a footstool under your feet.’
  - type: note
    content: Ps 110:1.
  '44':
  - type: text
    content: ' '
  - type: text
    content: Since David called the Messiah ‘Lord,’ how can the Messiah be his son?”
  '45':
  - type: text
    content: 'Then, with the crowds listening, he turned to his disciples and said, '
  '46':
  - type: text
    content: “Beware of these teachers of religious law! For they like to parade around in flowing robes and love to receive respectful greetings as they walk in the marketplaces. And how they love the seats of honor in the synagogues and the head table at banquets.
  - type: text
    content: ' '
  '47':
  - type: text
    content: Yet they shamelessly cheat widows out of their property and then pretend to be pious by making long prayers in public. Because of this, they will be severely punished.”
  '5':
  - type: text
    content: 'They talked it over among themselves. “If we say it was from heaven, he will ask why we didn’t believe John. '
  '6':
  - type: text
    content: 'But if we say it was merely human, the people will stone us because they are convinced John was a prophet.” '
  '7':
  - type: text
    content: So they finally replied that they didn’t know.
  '8':
  - type: text
    content: 'And Jesus responded, '
  - type: text
    content: “Then I won’t tell you by what authority I do these things.”
  - type: heading
    content: Parable of the Evil Farmers
  '9':
  - type: text
    content: 'Now Jesus turned to the people again and told them this story: '
  - type: text
    content: “A man planted a vineyard, leased it to tenant farmers, and moved to another country to live for several years.
  - type: text
    content: ' '
