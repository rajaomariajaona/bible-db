document_id: 2KI.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah Rules in Judah
  - type: text
    content: 'Hezekiah son of Ahaz began to rule over Judah in the third year of King Hoshea’s reign in Israel. '
  '10':
  - type: text
    content: 'Three years later, during the sixth year of King Hezekiah’s reign and the ninth year of King Hoshea’s reign in Israel, Samaria fell. '
  '11':
  - type: text
    content: 'At that time the king of Assyria exiled the Israelites to Assyria and placed them in colonies in Halah, along the banks of the Habor River in Gozan, and in the cities of the Medes. '
  '12':
  - type: text
    content: 'For they refused to listen to the '
  - type: text
    content: Lord
  - type: text
    content: ' their God and obey him. Instead, they violated his covenant—all the laws that Moses the '
  - type: text
    content: Lord
  - type: text
    content: ’s servant had commanded them to obey.
  - type: heading
    content: Assyria Invades Judah
  '13':
  - type: text
    content: In the fourteenth year of King Hezekiah’s reign,
  - type: note
    content: The fourteenth year of Hezekiah’s reign was 701 b.c.
  - type: text
    content: ' King Sennacherib of Assyria came to attack the fortified towns of Judah and conquered them. '
  '14':
  - type: text
    content: 'King Hezekiah sent this message to the king of Assyria at Lachish: “I have done wrong. I will pay whatever tribute money you demand if you will only withdraw.” The king of Assyria then demanded a settlement of more than eleven tons of silver and one ton of gold.'
  - type: note
    content: Hebrew 300 talents [10 metric tons] of silver and 30 talents [1 metric ton] of gold.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'To gather this amount, King Hezekiah used all the silver stored in the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and in the palace treasury. '
  '16':
  - type: text
    content: 'Hezekiah even stripped the gold from the doors of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple and from the doorposts he had overlaid with gold, and he gave it all to the Assyrian king.
  '17':
  - type: text
    content: Nevertheless, the king of Assyria sent his commander in chief, his field commander, and his chief of staff
  - type: note
    content: Or the rabshakeh; also in 18:19, 26, 27, 28, 37.
  - type: text
    content: ' from Lachish with a huge army to confront King Hezekiah in Jerusalem. The Assyrians took up a position beside the aqueduct that feeds water into the upper pool, near the road leading to the field where cloth is washed.'
  - type: note
    content: Or bleached.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'They summoned King Hezekiah, but the king sent these officials to meet with them: Eliakim son of Hilkiah, the palace administrator; Shebna the court secretary; and Joah son of Asaph, the royal historian.'
  - type: heading
    content: Sennacherib Threatens Jerusalem
  '19':
  - type: text
    content: 'Then the Assyrian king’s chief of staff told them to give this message to Hezekiah:'
  - type: text
    content: '“This is what the great king of Assyria says: What are you trusting in that makes you so confident? '
  '2':
  - type: text
    content: He was twenty-five years old when he became king, and he reigned in Jerusalem twenty-nine years. His mother was Abijah,
  - type: note
    content: As in parallel text at 2 Chr 29:1; Hebrew reads Abi, a variant spelling of Abijah.
  - type: text
    content: ' the daughter of Zechariah. '
  '20':
  - type: text
    content: 'Do you think that mere words can substitute for military skill and strength? Who are you counting on, that you have rebelled against me? '
  '21':
  - type: text
    content: On Egypt? If you lean on Egypt, it will be like a reed that splinters beneath your weight and pierces your hand. Pharaoh, the king of Egypt, is completely unreliable!
  '22':
  - type: text
    content: '“But perhaps you will say to me, ‘We are trusting in the '
  - type: text
    content: Lord
  - type: text
    content: ' our God!’ But isn’t he the one who was insulted by Hezekiah? Didn’t Hezekiah tear down his shrines and altars and make everyone in Judah and Jerusalem worship only at the altar here in Jerusalem?'
  '23':
  - type: text
    content: '“I’ll tell you what! Strike a bargain with my master, the king of Assyria. I will give you 2,000 horses if you can find that many men to ride on them! '
  '24':
  - type: text
    content: 'With your tiny army, how can you think of challenging even the weakest contingent of my master’s troops, even with the help of Egypt’s chariots and charioteers? '
  '25':
  - type: text
    content: 'What’s more, do you think we have invaded your land without the '
  - type: text
    content: Lord
  - type: text
    content: '’s direction? The '
  - type: text
    content: 'Lord '
  - type: text
    content: himself told us, ‘Attack this land and destroy it!’”
  '26':
  - type: text
    content: Then Eliakim son of Hilkiah, Shebna, and Joah said to the Assyrian chief of staff, “Please speak to us in Aramaic, for we understand it well. Don’t speak in Hebrew,
  - type: note
    content: Hebrew in the dialect of Judah; also in 18:28.
  - type: text
    content: ' for the people on the wall will hear.”'
  '27':
  - type: text
    content: But Sennacherib’s chief of staff replied, “Do you think my master sent this message only to you and your master? He wants all the people to hear it, for when we put this city under siege, they will suffer along with you. They will be so hungry and thirsty that they will eat their own dung and drink their own urine.”
  '28':
  - type: text
    content: 'Then the chief of staff stood and shouted in Hebrew to the people on the wall, “Listen to this message from the great king of Assyria! '
  '29':
  - type: text
    content: 'This is what the king says: Don’t let Hezekiah deceive you. He will never be able to rescue you from my power. '
  '3':
  - type: text
    content: 'He did what was pleasing in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, just as his ancestor David had done. '
  '30':
  - type: text
    content: 'Don’t let him fool you into trusting in the '
  - type: text
    content: Lord
  - type: text
    content: ' by saying, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' will surely rescue us. This city will never fall into the hands of the Assyrian king!’'
  '31':
  - type: text
    content: '“Don’t listen to Hezekiah! These are the terms the king of Assyria is offering: Make peace with me—open the gates and come out. Then each of you can continue eating from your own grapevine and fig tree and drinking from your own well. '
  '32':
  - type: text
    content: Then I will arrange to take you to another land like this one—a land of grain and new wine, bread and vineyards, olive groves and honey. Choose life instead of death!
  - type: text
    content: '“Don’t listen to Hezekiah when he tries to mislead you by saying, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' will rescue us!’ '
  '33':
  - type: text
    content: 'Have the gods of any other nations ever saved their people from the king of Assyria? '
  '34':
  - type: text
    content: 'What happened to the gods of Hamath and Arpad? And what about the gods of Sepharvaim, Hena, and Ivvah? Did any god rescue Samaria from my power? '
  '35':
  - type: text
    content: 'What god of any nation has ever been able to save its people from my power? So what makes you think that the '
  - type: text
    content: Lord
  - type: text
    content: ' can rescue Jerusalem from me?”'
  '36':
  - type: text
    content: But the people were silent and did not utter a word because Hezekiah had commanded them, “Do not answer him.”
  '37':
  - type: text
    content: Then Eliakim son of Hilkiah, the palace administrator; Shebna the court secretary; and Joah son of Asaph, the royal historian, went back to Hezekiah. They tore their clothes in despair, and they went in to see the king and told him what the Assyrian chief of staff had said.
  '4':
  - type: text
    content: He removed the pagan shrines, smashed the sacred pillars, and cut down the Asherah poles. He broke up the bronze serpent that Moses had made, because the people of Israel had been offering sacrifices to it. The bronze serpent was called Nehushtan.
  - type: note
    content: Nehushtan sounds like the Hebrew terms that mean “snake,” “bronze,” and “unclean thing.”
  '5':
  - type: text
    content: 'Hezekiah trusted in the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. There was no one like him among all the kings of Judah, either before or after his time. '
  '6':
  - type: text
    content: 'He remained faithful to the '
  - type: text
    content: Lord
  - type: text
    content: ' in everything, and he carefully obeyed all the commands the '
  - type: text
    content: Lord
  - type: text
    content: ' had given Moses. '
  '7':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' was with him, and Hezekiah was successful in everything he did. He revolted against the king of Assyria and refused to pay him tribute. '
  '8':
  - type: text
    content: He also conquered the Philistines as far distant as Gaza and its territory, from their smallest outpost to their largest walled city.
  '9':
  - type: text
    content: 'During the fourth year of Hezekiah’s reign, which was the seventh year of King Hoshea’s reign in Israel, King Shalmaneser of Assyria attacked the city of Samaria and began a siege against it. '
