document_id: 2KI.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hezekiah Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hezekiah son of Ahaz began to rule over Judah in the third year of King Hoshea’s reign in Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He was twenty-five years old when he became king, and he reigned in Jerusalem twenty-nine years. His mother was Abijah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 2 Chr 29:1; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Abi, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Abijah.
    marker-yv: yv-n
  - type: text
    text: ' the daughter of Zechariah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He did what was pleasing in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s sight, just as his ancestor David had done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He removed the pagan shrines, smashed the sacred pillars, and cut down the Asherah poles. He broke up the bronze serpent that Moses had made, because the people of Israel had been offering sacrifices to it. The bronze serpent was called Nehushtan.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:4 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Nehushtan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sounds like the Hebrew terms that mean “snake,” “bronze,” and “unclean thing.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hezekiah trusted in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. There was no one like him among all the kings of Judah, either before or after his time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He remained faithful to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in everything, and he carefully obeyed all the commands the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had given Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was with him, and Hezekiah was successful in everything he did. He revolted against the king of Assyria and refused to pay him tribute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He also conquered the Philistines as far distant as Gaza and its territory, from their smallest outpost to their largest walled city.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'During the fourth year of Hezekiah’s reign, which was the seventh year of King Hoshea’s reign in Israel, King Shalmaneser of Assyria attacked the city of Samaria and began a siege against it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Three years later, during the sixth year of King Hezekiah’s reign and the ninth year of King Hoshea’s reign in Israel, Samaria fell. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'At that time the king of Assyria exiled the Israelites to Assyria and placed them in colonies in Halah, along the banks of the Habor River in Gozan, and in the cities of the Medes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For they refused to listen to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God and obey him. Instead, they violated his covenant—all the laws that Moses the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s servant had commanded them to obey.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Assyria Invades Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: In the fourteenth year of King Hezekiah’s reign,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The fourteenth year of Hezekiah’s reign was 701 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' King Sennacherib of Assyria came to attack the fortified towns of Judah and conquered them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'King Hezekiah sent this message to the king of Assyria at Lachish: “I have done wrong. I will pay whatever tribute money you demand if you will only withdraw.” The king of Assyria then demanded a settlement of more than eleven tons of silver and one ton of gold.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '300 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[10 metric tons] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of silver and 30 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[1 metric ton] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of gold.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'To gather this amount, King Hezekiah used all the silver stored in the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and in the palace treasury. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hezekiah even stripped the gold from the doors of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple and from the doorposts he had overlaid with gold, and he gave it all to the Assyrian king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nevertheless, the king of Assyria sent his commander in chief, his field commander, and his chief of staff
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:17a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the rabshakeh; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 18:19, 26, 27, 28, 37.
    marker-yv: yv-n
  - type: text
    text: ' from Lachish with a huge army to confront King Hezekiah in Jerusalem. The Assyrians took up a position beside the aqueduct that feeds water into the upper pool, near the road leading to the field where cloth is washed.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:17b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bleached.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They summoned King Hezekiah, but the king sent these officials to meet with them: Eliakim son of Hilkiah, the palace administrator; Shebna the court secretary; and Joah son of Asaph, the royal historian.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sennacherib Threatens Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then the Assyrian king’s chief of staff told them to give this message to Hezekiah:'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: '“This is what the great king of Assyria says: What are you trusting in that makes you so confident? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Do you think that mere words can substitute for military skill and strength? Who are you counting on, that you have rebelled against me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: On Egypt? If you lean on Egypt, it will be like a reed that splinters beneath your weight and pierces your hand. Pharaoh, the king of Egypt, is completely unreliable!
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“But perhaps you will say to me, ‘We are trusting in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God!’ But isn’t he the one who was insulted by Hezekiah? Didn’t Hezekiah tear down his shrines and altars and make everyone in Judah and Jerusalem worship only at the altar here in Jerusalem?'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“I’ll tell you what! Strike a bargain with my master, the king of Assyria. I will give you 2,000 horses if you can find that many men to ride on them! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'With your tiny army, how can you think of challenging even the weakest contingent of my master’s troops, even with the help of Egypt’s chariots and charioteers? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'What’s more, do you think we have invaded your land without the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s direction? The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'Lord '
  - type: text
    text: himself told us, ‘Attack this land and destroy it!’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then Eliakim son of Hilkiah, Shebna, and Joah said to the Assyrian chief of staff, “Please speak to us in Aramaic, for we understand it well. Don’t speak in Hebrew,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in the dialect of Judah; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 18:28.
    marker-yv: yv-n
  - type: text
    text: ' for the people on the wall will hear.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But Sennacherib’s chief of staff replied, “Do you think my master sent this message only to you and your master? He wants all the people to hear it, for when we put this city under siege, they will suffer along with you. They will be so hungry and thirsty that they will eat their own dung and drink their own urine.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then the chief of staff stood and shouted in Hebrew to the people on the wall, “Listen to this message from the great king of Assyria! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'This is what the king says: Don’t let Hezekiah deceive you. He will never be able to rescue you from my power. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Don’t let him fool you into trusting in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' by saying, ‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will surely rescue us. This city will never fall into the hands of the Assyrian king!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“Don’t listen to Hezekiah! These are the terms the king of Assyria is offering: Make peace with me—open the gates and come out. Then each of you can continue eating from your own grapevine and fig tree and drinking from your own well. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Then I will arrange to take you to another land like this one—a land of grain and new wine, bread and vineyards, olive groves and honey. Choose life instead of death!
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Don’t listen to Hezekiah when he tries to mislead you by saying, ‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will rescue us!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Have the gods of any other nations ever saved their people from the king of Assyria? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'What happened to the gods of Hamath and Arpad? And what about the gods of Sepharvaim, Hena, and Ivvah? Did any god rescue Samaria from my power? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'What god of any nation has ever been able to save its people from my power? So what makes you think that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' can rescue Jerusalem from me?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: But the people were silent and did not utter a word because Hezekiah had commanded them, “Do not answer him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Then Eliakim son of Hilkiah, the palace administrator; Shebna the court secretary; and Joah son of Asaph, the royal historian, went back to Hezekiah. They tore their clothes in despair, and they went in to see the king and told him what the Assyrian chief of staff had said.
