document_id: ZEC.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Cleansing for the High Priest
  - type: text
    content: Then the angel showed me Jeshua
  - type: note
    content: Hebrew Joshua, a variant spelling of Jeshua; also in 3:3, 4, 6, 8, 9.
  - type: text
    content: ' the high priest standing before the angel of the '
  - type: text
    content: Lord
  - type: text
    content: . The Accuser, Satan,
  - type: note
    content: Hebrew The satan; similarly in 3:2.
  - type: text
    content: ' was there at the angel’s right hand, making accusations against Jeshua. '
  '10':
  - type: text
    content: '“And on that day, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, each of you will invite your neighbor to sit with you peacefully under your own grapevine and fig tree.”'
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Satan, “I, the '
  - type: text
    content: Lord
  - type: text
    content: ', reject your accusations, Satan. Yes, the '
  - type: text
    content: Lord
  - type: text
    content: ', who has chosen Jerusalem, rebukes you. This man is like a burning stick that has been snatched from the fire.”'
  '3':
  - type: text
    content: 'Jeshua’s clothing was filthy as he stood there before the angel. '
  '4':
  - type: text
    content: So the angel said to the others standing there, “Take off his filthy clothes.” And turning to Jeshua he said, “See, I have taken away your sins, and now I am giving you these fine new clothes.”
  '5':
  - type: text
    content: 'Then I said, “They should also place a clean turban on his head.” So they put a clean priestly turban on his head and dressed him in new clothes while the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' stood by.'
  '6':
  - type: text
    content: 'Then the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke very solemnly to Jeshua and said, '
  '7':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says: If you follow my ways and carefully serve me, then you will be given authority over my Temple and its courtyards. I will let you walk among these others standing here.'
  '8':
  - type: text
    content: '“Listen to me, O Jeshua the high priest, and all you other priests. You are symbols of things to come. Soon I am going to bring my servant, the Branch. '
  '9':
  - type: text
    content: Now look at the jewel I have set before Jeshua, a single stone with seven facets.
  - type: note
    content: Hebrew seven eyes.
  - type: text
    content: ' I will engrave an inscription on it, says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, and I will remove the sins of this land in a single day.'
