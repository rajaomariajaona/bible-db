document_id: ZEC.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cleansing for the High Priest
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then the angel showed me Jeshua
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Joshua, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Jeshua; also in 3:3, 4, 6, 8, 9.
      marker-yv: yv-n
    - type: text
      text: ' the high priest standing before the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . The Accuser, Satan,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The satan; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly in 3:2.
      marker-yv: yv-n
    - type: text
      text: ' was there at the angel’s right hand, making accusations against Jeshua. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“And on that day, says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, each of you will invite your neighbor to sit with you peacefully under your own grapevine and fig tree.”'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Satan, “I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', reject your accusations, Satan. Yes, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who has chosen Jerusalem, rebukes you. This man is like a burning stick that has been snatched from the fire.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jeshua’s clothing was filthy as he stood there before the angel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So the angel said to the others standing there, “Take off his filthy clothes.” And turning to Jeshua he said, “See, I have taken away your sins, and now I am giving you these fine new clothes.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then I said, “They should also place a clean turban on his head.” So they put a clean priestly turban on his head and dressed him in new clothes while the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' stood by.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke very solemnly to Jeshua and said, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies says: If you follow my ways and carefully serve me, then you will be given authority over my Temple and its courtyards. I will let you walk among these others standing here.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“Listen to me, O Jeshua the high priest, and all you other priests. You are symbols of things to come. Soon I am going to bring my servant, the Branch. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Now look at the jewel I have set before Jeshua, a single stone with seven facets.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: seven eyes.
      marker-yv: yv-n
    - type: text
      text: ' I will engrave an inscription on it, says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, and I will remove the sins of this land in a single day.'
