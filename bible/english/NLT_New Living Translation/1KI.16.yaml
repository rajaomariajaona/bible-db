document_id: 1KI.16
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was delivered to King Baasha by the prophet Jehu son of Hanani: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“I lifted you out of the dust to make you ruler of my people Israel, but you have followed the evil example of Jeroboam. You have provoked my anger by causing my people Israel to sin. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So now I will destroy you and your family, just as I destroyed the descendants of Jeroboam son of Nebat. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The members of Baasha’s family who die in the city will be eaten by dogs, and those who die in the field will be eaten by vultures.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The rest of the events in Baasha’s reign and the extent of his power are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When Baasha died, he was buried in Tirzah. Then his son Elah became the next king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' against Baasha and his family came through the prophet Jehu son of Hanani. It was delivered because Baasha had done what was evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s sight (just as the family of Jeroboam had done), and also because Baasha had destroyed the family of Jeroboam. The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s anger was provoked by Baasha’s sins.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elah Rules in Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Elah son of Baasha began to rule over Israel in the twenty-sixth year of King Asa’s reign in Judah. He reigned in the city of Tirzah for two years.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Zimri, who commanded half of the royal chariots, made plans to kill him. One day in Tirzah, Elah was getting drunk at the home of Arza, the supervisor of the palace. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Zimri walked in and struck him down and killed him. This happened in the twenty-seventh year of King Asa’s reign in Judah. Then Zimri became the next king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Zimri immediately killed the entire royal family of Baasha, leaving him not even a single male child. He even destroyed distant relatives and friends. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So Zimri destroyed the dynasty of Baasha as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had promised through the prophet Jehu. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'This happened because of all the sins Baasha and his son Elah had committed, and because of the sins they led Israel to commit. They provoked the anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, with their worthless idols.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The rest of the events in Elah’s reign and everything he did are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Israel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zimri Rules in Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Zimri began to rule over Israel in the twenty-seventh year of King Asa’s reign in Judah, but his reign in Tirzah lasted only seven days. The army of Israel was then attacking the Philistine town of Gibbethon. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When they heard that Zimri had committed treason and had assassinated the king, that very day they chose Omri, commander of the army, as the new king of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So Omri led the entire army of Israel up from Gibbethon to attack Tirzah, Israel’s capital. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When Zimri saw that the city had been taken, he went into the citadel of the palace and burned it down over himself and died in the flames. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For he, too, had done what was evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s sight. He followed the example of Jeroboam in all the sins he had committed and led Israel to commit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The rest of the events in Zimri’s reign and his conspiracy are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Israel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Omri Rules in Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But now the people of Israel were split into two factions. Half the people tried to make Tibni son of Ginath their king, while the other half supported Omri. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But Omri’s supporters defeated the supporters of Tibni. So Tibni was killed, and Omri became the next king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Omri began to rule over Israel in the thirty-first year of King Asa’s reign in Judah. He reigned twelve years in all, six of them in Tirzah. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Then Omri bought the hill now known as Samaria from its owner, Shemer, for 150 pounds of silver.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'for 2 talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[68 kilograms] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of silver.
    marker-yv: yv-n
  - type: text
    text: ' He built a city on it and called the city Samaria in honor of Shemer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But Omri did what was evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s sight, even more than any of the kings before him. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'He followed the example of Jeroboam son of Nebat in all the sins he had committed and led Israel to commit. The people provoked the anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, with their worthless idols.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The rest of the events in Omri’s reign, the extent of his power, and everything he did are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: When Omri died, he was buried in Samaria. Then his son Ahab became the next king.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ahab Rules in Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ahab son of Omri began to rule over Israel in the thirty-eighth year of King Asa’s reign in Judah. He reigned in Samaria twenty-two years. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But Ahab son of Omri did what was evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s sight, even more than any of the kings before him. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And as though it were not enough to follow the sinful example of Jeroboam, he married Jezebel, the daughter of King Ethbaal of the Sidonians, and he began to bow down in worship of Baal. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'First Ahab built a temple and an altar for Baal in Samaria. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then he set up an Asherah pole. He did more to provoke the anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, than any of the other kings of Israel before him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: It was during his reign that Hiel, a man from Bethel, rebuilt Jericho. When he laid its foundations, it cost him the life of his oldest son, Abiram. And when he completed it and set up its gates, it cost him the life of his youngest son, Segub.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'An ancient Hebrew scribal tradition reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: He killed his oldest son when he laid its foundations, and he killed his youngest son when he set up its gates.
    marker-yv: yv-n
  - type: text
    text: ' This all happened according to the message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' concerning Jericho spoken by Joshua son of Nun.'
