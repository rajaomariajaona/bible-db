document_id: 1KI.16,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'This message from the '
  - type: text
    content: Lord
  - type: text
    content: ' was delivered to King Baasha by the prophet Jehu son of Hanani: '
  '10':
  - type: text
    content: Zimri walked in and struck him down and killed him. This happened in the twenty-seventh year of King Asa’s reign in Judah. Then Zimri became the next king.
  '11':
  - type: text
    content: 'Zimri immediately killed the entire royal family of Baasha, leaving him not even a single male child. He even destroyed distant relatives and friends. '
  '12':
  - type: text
    content: 'So Zimri destroyed the dynasty of Baasha as the '
  - type: text
    content: Lord
  - type: text
    content: ' had promised through the prophet Jehu. '
  '13':
  - type: text
    content: 'This happened because of all the sins Baasha and his son Elah had committed, and because of the sins they led Israel to commit. They provoked the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, with their worthless idols.'
  '14':
  - type: text
    content: 'The rest of the events in Elah’s reign and everything he did are recorded in '
  - type: text
    content: The Book of the History of the Kings of Israel.
  - type: heading
    content: Zimri Rules in Israel
  '15':
  - type: text
    content: 'Zimri began to rule over Israel in the twenty-seventh year of King Asa’s reign in Judah, but his reign in Tirzah lasted only seven days. The army of Israel was then attacking the Philistine town of Gibbethon. '
  '16':
  - type: text
    content: 'When they heard that Zimri had committed treason and had assassinated the king, that very day they chose Omri, commander of the army, as the new king of Israel. '
  '17':
  - type: text
    content: 'So Omri led the entire army of Israel up from Gibbethon to attack Tirzah, Israel’s capital. '
  '18':
  - type: text
    content: 'When Zimri saw that the city had been taken, he went into the citadel of the palace and burned it down over himself and died in the flames. '
  '19':
  - type: text
    content: 'For he, too, had done what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight. He followed the example of Jeroboam in all the sins he had committed and led Israel to commit.
  '2':
  - type: text
    content: '“I lifted you out of the dust to make you ruler of my people Israel, but you have followed the evil example of Jeroboam. You have provoked my anger by causing my people Israel to sin. '
  '20':
  - type: text
    content: 'The rest of the events in Zimri’s reign and his conspiracy are recorded in '
  - type: text
    content: The Book of the History of the Kings of Israel.
  - type: heading
    content: Omri Rules in Israel
  '21':
  - type: text
    content: 'But now the people of Israel were split into two factions. Half the people tried to make Tibni son of Ginath their king, while the other half supported Omri. '
  '22':
  - type: text
    content: But Omri’s supporters defeated the supporters of Tibni. So Tibni was killed, and Omri became the next king.
  '23':
  - type: text
    content: 'Omri began to rule over Israel in the thirty-first year of King Asa’s reign in Judah. He reigned twelve years in all, six of them in Tirzah. '
  '24':
  - type: text
    content: Then Omri bought the hill now known as Samaria from its owner, Shemer, for 150 pounds of silver.
  - type: note
    content: Hebrew for 2 talents [68 kilograms] of silver.
  - type: text
    content: ' He built a city on it and called the city Samaria in honor of Shemer.'
  '25':
  - type: text
    content: 'But Omri did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, even more than any of the kings before him. '
  '26':
  - type: text
    content: 'He followed the example of Jeroboam son of Nebat in all the sins he had committed and led Israel to commit. The people provoked the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, with their worthless idols.'
  '27':
  - type: text
    content: 'The rest of the events in Omri’s reign, the extent of his power, and everything he did are recorded in '
  - type: text
    content: The Book of the History of the Kings of Israel.
  - type: text
    content: ' '
  '28':
  - type: text
    content: When Omri died, he was buried in Samaria. Then his son Ahab became the next king.
  - type: heading
    content: Ahab Rules in Israel
  '29':
  - type: text
    content: 'Ahab son of Omri began to rule over Israel in the thirty-eighth year of King Asa’s reign in Judah. He reigned in Samaria twenty-two years. '
  '3':
  - type: text
    content: 'So now I will destroy you and your family, just as I destroyed the descendants of Jeroboam son of Nebat. '
  '30':
  - type: text
    content: 'But Ahab son of Omri did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, even more than any of the kings before him. '
  '31':
  - type: text
    content: 'And as though it were not enough to follow the sinful example of Jeroboam, he married Jezebel, the daughter of King Ethbaal of the Sidonians, and he began to bow down in worship of Baal. '
  '32':
  - type: text
    content: 'First Ahab built a temple and an altar for Baal in Samaria. '
  '33':
  - type: text
    content: 'Then he set up an Asherah pole. He did more to provoke the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, than any of the other kings of Israel before him.'
  '34':
  - type: text
    content: It was during his reign that Hiel, a man from Bethel, rebuilt Jericho. When he laid its foundations, it cost him the life of his oldest son, Abiram. And when he completed it and set up its gates, it cost him the life of his youngest son, Segub.
  - type: note
    content: An ancient Hebrew scribal tradition reads He killed his oldest son when he laid its foundations, and he killed his youngest son when he set up its gates.
  - type: text
    content: ' This all happened according to the message from the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning Jericho spoken by Joshua son of Nun.'
  '4':
  - type: text
    content: The members of Baasha’s family who die in the city will be eaten by dogs, and those who die in the field will be eaten by vultures.”
  '5':
  - type: text
    content: 'The rest of the events in Baasha’s reign and the extent of his power are recorded in '
  - type: text
    content: The Book of the History of the Kings of Israel.
  - type: text
    content: ' '
  '6':
  - type: text
    content: When Baasha died, he was buried in Tirzah. Then his son Elah became the next king.
  '7':
  - type: text
    content: 'The message from the '
  - type: text
    content: Lord
  - type: text
    content: ' against Baasha and his family came through the prophet Jehu son of Hanani. It was delivered because Baasha had done what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight (just as the family of Jeroboam had done), and also because Baasha had destroyed the family of Jeroboam. The '
  - type: text
    content: Lord
  - type: text
    content: ’s anger was provoked by Baasha’s sins.
  - type: heading
    content: Elah Rules in Israel
  '8':
  - type: text
    content: Elah son of Baasha began to rule over Israel in the twenty-sixth year of King Asa’s reign in Judah. He reigned in the city of Tirzah for two years.
  '9':
  - type: text
    content: 'Then Zimri, who commanded half of the royal chariots, made plans to kill him. One day in Tirzah, Elah was getting drunk at the home of Arza, the supervisor of the palace. '
