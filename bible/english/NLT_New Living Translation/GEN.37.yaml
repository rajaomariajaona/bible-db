document_id: GEN.37,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph’s Dreams
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: So Jacob settled again in the land of Canaan, where his father had lived as a foreigner.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'This time he told the dream to his father as well as to his brothers, but his father scolded him. “What kind of dream is that?” he asked. “Will your mother and I and your brothers actually come and bow to the ground before you?” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But while his brothers were jealous of Joseph, his father wondered what the dreams meant.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Soon after this, Joseph’s brothers went to pasture their father’s flocks at Shechem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: When they had been gone for some time, Jacob said to Joseph, “Your brothers are pasturing the sheep at Shechem. Get ready, and I will send you to them.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I’m ready to go,” Joseph replied.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Go and see how your brothers and the flocks are getting along,” Jacob said. “Then come back and bring me a report.” So Jacob sent him on his way, and Joseph traveled to Shechem from their home in the valley of Hebron.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: When he arrived there, a man from the area noticed him wandering around the countryside. “What are you looking for?” he asked.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “I’m looking for my brothers,” Joseph replied. “Do you know where they are pasturing their sheep?”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Yes,” the man told him. “They have moved on from here, but I heard them say, ‘Let’s go on to Dothan.’” So Joseph followed his brothers to Dothan and found them there.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph Sold into Slavery
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'When Joseph’s brothers saw him coming, they recognized him in the distance. As he approached, they made plans to kill him. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“Here comes the dreamer!” they said. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: This is the account of Jacob and his family. When Joseph was seventeen years old, he often tended his father’s flocks. He worked for his half brothers, the sons of his father’s wives Bilhah and Zilpah. But Joseph reported to his father some of the bad things his brothers were doing.
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “Come on, let’s kill him and throw him into one of these cisterns. We can tell our father, ‘A wild animal has eaten him.’ Then we’ll see what becomes of his dreams!”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But when Reuben heard of their scheme, he came to Joseph’s rescue. “Let’s not kill him,” he said. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Why should we shed any blood? Let’s just throw him into this empty cistern here in the wilderness. Then he’ll die without our laying a hand on him.” Reuben was secretly planning to rescue Joseph and return him to his father.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So when Joseph arrived, his brothers ripped off the beautiful robe he was wearing. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then they grabbed him and threw him into the cistern. Now the cistern was empty; there was no water in it. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Then, just as they were sitting down to eat, they looked up and saw a caravan of camels in the distance coming toward them. It was a group of Ishmaelite traders taking a load of gum, balm, and aromatic resin from Gilead down to Egypt.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Judah said to his brothers, “What will we gain by killing our brother? We’d have to cover up the crime.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cover his blood.
      marker-yv: yv-n
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Instead of hurting him, let’s sell him to those Ishmaelite traders. After all, he is our brother—our own flesh and blood!” And his brothers agreed. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: So when the Ishmaelites, who were Midianite traders, came by, Joseph’s brothers pulled him out of the cistern and sold him to them for twenty pieces
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20 [shekels], '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: about 8 ounces or 228 grams in weight.
      marker-yv: yv-n
    - type: text
      text: ' of silver. And the traders took him to Egypt.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Some time later, Reuben returned to get Joseph out of the cistern. When he discovered that Joseph was missing, he tore his clothes in grief. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jacob
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:3a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Israel; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 37:13. See note on 35:21.
      marker-yv: yv-n
    - type: text
      text: ' loved Joseph more than any of his other children because Joseph had been born to him in his old age. So one day Jacob had a special gift made for Joseph—a beautiful robe.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:3b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traditionally rendered '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a coat of many colors. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The exact meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Then he went back to his brothers and lamented, “The boy is gone! What will I do now?”
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then the brothers killed a young goat and dipped Joseph’s robe in its blood. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'They sent the beautiful robe to their father with this message: “Look at what we found. Doesn’t this robe belong to your son?”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Their father recognized it immediately. “Yes,” he said, “it is my son’s robe. A wild animal must have eaten him. Joseph has clearly been torn to pieces!” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Then Jacob tore his clothes and dressed himself in burlap. He mourned deeply for his son for a long time. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: His family all tried to comfort him, but he refused to be comforted. “I will go to my grave
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: go down to Sheol.
      marker-yv: yv-n
    - type: text
      text: ' mourning for my son,” he would say, and then he would weep.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Meanwhile, the Midianite traders
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Medanites. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The relationship between the Midianites and Medanites is unclear; compare 37:28. See also 25:2.
      marker-yv: yv-n
    - type: text
      text: ' arrived in Egypt, where they sold Joseph to Potiphar, an officer of Pharaoh, the king of Egypt. Potiphar was captain of the palace guard.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But his brothers hated Joseph because their father loved him more than the rest of them. They couldn’t say a kind word to him.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'One night Joseph had a dream, and when he told his brothers about it, they hated him more than ever. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“Listen to this dream,” he said. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “We were out in the field, tying up bundles of grain. Suddenly my bundle stood up, and your bundles all gathered around and bowed low before mine!”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: His brothers responded, “So you think you will be our king, do you? Do you actually think you will reign over us?” And they hated him all the more because of his dreams and the way he talked about them.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Soon Joseph had another dream, and again he told his brothers about it. “Listen, I have had another dream,” he said. “The sun, moon, and eleven stars bowed low before me!”
