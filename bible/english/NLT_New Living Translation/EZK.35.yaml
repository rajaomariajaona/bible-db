document_id: EZK.35,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message for Edom
  - type: text
    content: 'Again a message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: '“For you said, ‘The lands of Israel and Judah will be ours. We will take possession of them. What do we care that the '
  - type: text
    content: Lord
  - type: text
    content: ' is there!’ '
  '11':
  - type: text
    content: 'Therefore, as surely as I live, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', I will pay back your angry deeds with my own. I will punish you for all your acts of anger, envy, and hatred. And I will make myself known to Israel'
  - type: note
    content: Hebrew to them; Greek version reads to you.
  - type: text
    content: ' by what I do to you. '
  '12':
  - type: text
    content: 'Then you will know that I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have heard every contemptuous word you spoke against the mountains of Israel. For you said, ‘They are desolate; they have been given to us as food to eat!’ '
  '13':
  - type: text
    content: In saying that, you boasted proudly against me, and I have heard it all!
  '14':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: The whole world will rejoice when I make you desolate. '
  '15':
  - type: text
    content: 'You rejoiced at the desolation of Israel’s territory. Now I will rejoice at yours! You will be wiped out, you people of Mount Seir and all who live in Edom! Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: '“Son of man, turn and face Mount Seir, and prophesy against its people. '
  '3':
  - type: text
    content: 'Give them this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “I am your enemy, O Mount Seir,
  - type: text
    content: and I will raise my fist against you
  - type: text
    content: to destroy you completely.
  '4':
  - type: text
    content: I will demolish your cities
  - type: text
    content: and make you desolate.
  - type: text
    content: 'Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: '“Your eternal hatred for the people of Israel led you to butcher them when they were helpless, when I had already punished them for all their sins. '
  '6':
  - type: text
    content: 'As surely as I live, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', since you show no distaste for blood, I will give you a bloodbath of your own. Your turn has come! '
  '7':
  - type: text
    content: 'I will make Mount Seir utterly desolate, killing off all who try to escape and any who return. '
  '8':
  - type: text
    content: 'I will fill your mountains with the dead. Your hills, your valleys, and your ravines will be filled with people slaughtered by the sword. '
  '9':
  - type: text
    content: 'I will make you desolate forever. Your cities will never be rebuilt. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
