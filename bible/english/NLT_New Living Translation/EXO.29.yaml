document_id: EXO.29,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Dedication of the Priests
  - type: text
    content: '“This is the ceremony you must follow when you consecrate Aaron and his sons to serve me as priests: Take a young bull and two rams with no defects. '
  '10':
  - type: text
    content: '“Bring the young bull to the entrance of the Tabernacle, where Aaron and his sons will lay their hands on its head. '
  '11':
  - type: text
    content: 'Then slaughter the bull in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence at the entrance of the Tabernacle. '
  '12':
  - type: text
    content: 'Put some of its blood on the horns of the altar with your finger, and pour out the rest at the base of the altar. '
  '13':
  - type: text
    content: 'Take all the fat around the internal organs, the long lobe of the liver, and the two kidneys and the fat around them, and burn it all on the altar. '
  '14':
  - type: text
    content: Then take the rest of the bull, including its hide, meat, and dung, and burn it outside the camp as a sin offering.
  '15':
  - type: text
    content: '“Next Aaron and his sons must lay their hands on the head of one of the rams. '
  '16':
  - type: text
    content: 'Then slaughter the ram, and splatter its blood against all sides of the altar. '
  '17':
  - type: text
    content: 'Cut the ram into pieces, and wash off the internal organs and the legs. Set them alongside the head and the other pieces of the body, '
  '18':
  - type: text
    content: 'then burn the entire animal on the altar. This is a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '; it is a pleasing aroma, a special gift presented to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '19':
  - type: text
    content: '“Now take the other ram, and have Aaron and his sons lay their hands on its head. '
  '2':
  - type: text
    content: 'Then, using choice wheat flour and no yeast, make loaves of bread, thin cakes mixed with olive oil, and wafers spread with oil. '
  '20':
  - type: text
    content: 'Then slaughter it, and apply some of its blood to the right earlobes of Aaron and his sons. Also put it on the thumbs of their right hands and the big toes of their right feet. Splatter the rest of the blood against all sides of the altar. '
  '21':
  - type: text
    content: Then take some of the blood from the altar and some of the anointing oil, and sprinkle it on Aaron and his sons and on their garments. In this way, they and their garments will be set apart as holy.
  '22':
  - type: text
    content: '“Since this is the ram for the ordination of Aaron and his sons, take the fat of the ram, including the fat of the broad tail, the fat around the internal organs, the long lobe of the liver, and the two kidneys and the fat around them, along with the right thigh. '
  '23':
  - type: text
    content: 'Then take one round loaf of bread, one thin cake mixed with olive oil, and one wafer from the basket of bread without yeast that was placed in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence. '
  '24':
  - type: text
    content: 'Put all these in the hands of Aaron and his sons to be lifted up as a special offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Afterward take the various breads from their hands, and burn them on the altar along with the burnt offering. It is a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: ', a special gift for him. '
  '26':
  - type: text
    content: 'Then take the breast of Aaron’s ordination ram, and lift it up in the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence as a special offering to him. Then keep it as your own portion.
  '27':
  - type: text
    content: '“Set aside the portions of the ordination ram that belong to Aaron and his sons. This includes the breast and the thigh that were lifted up before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a special offering. '
  '28':
  - type: text
    content: 'In the future, whenever the people of Israel lift up a peace offering, a portion of it must be set aside for Aaron and his descendants. This is their permanent right, and it is a sacred offering from the Israelites to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '29':
  - type: text
    content: '“Aaron’s sacred garments must be preserved for his descendants who succeed him, and they will wear them when they are anointed and ordained. '
  '3':
  - type: text
    content: Place them all in a single basket, and present them at the entrance of the Tabernacle, along with the young bull and the two rams.
  '30':
  - type: text
    content: The descendant who succeeds him as high priest will wear these clothes for seven days as he ministers in the Tabernacle and the Holy Place.
  '31':
  - type: text
    content: '“Take the ram used in the ordination ceremony, and boil its meat in a sacred place. '
  '32':
  - type: text
    content: 'Then Aaron and his sons will eat this meat, along with the bread in the basket, at the Tabernacle entrance. '
  '33':
  - type: text
    content: They alone may eat the meat and bread used for their purification
  - type: note
    content: Or their atonement.
  - type: text
    content: ' in the ordination ceremony. No one else may eat them, for these things are set apart and holy. '
  '34':
  - type: text
    content: If any of the ordination meat or bread remains until the morning, it must be burned. It may not be eaten, for it is holy.
  '35':
  - type: text
    content: '“This is how you will ordain Aaron and his sons to their offices, just as I have commanded you. The ordination ceremony will go on for seven days. '
  '36':
  - type: text
    content: 'Each day you must sacrifice a young bull as a sin offering to purify them, making them right with the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Or to make atonement.
  - type: text
    content: ' Afterward, cleanse the altar by purifying it'
  - type: note
    content: Or by making atonement for it; similarly in 29:37.
  - type: text
    content: '; make it holy by anointing it with oil. '
  '37':
  - type: text
    content: Purify the altar, and consecrate it every day for seven days. After that, the altar will be absolutely holy, and whatever touches it will become holy.
  '38':
  - type: text
    content: '“These are the sacrifices you are to offer regularly on the altar. Each day, offer two lambs that are a year old, '
  '39':
  - type: text
    content: 'one in the morning and the other in the evening. '
  '4':
  - type: text
    content: “Present Aaron and his sons at the entrance of the Tabernacle,
  - type: note
    content: Hebrew Tent of Meeting; also in 29:10, 11, 30, 32, 42, 44.
  - type: text
    content: ' and wash them with water. '
  '40':
  - type: text
    content: With one of them, offer two quarts of choice flour mixed with one quart of pure oil of pressed olives; also, offer one quart of wine
  - type: note
    content: Hebrew 1/10 [of an ephah] [2.2 liters] of choice flour . . . 1/4 of a hin [1 liter] of pure oil . . . 1/4 of a hin of wine.
  - type: text
    content: ' as a liquid offering. '
  '41':
  - type: text
    content: 'Offer the other lamb in the evening, along with the same offerings of flour and wine as in the morning. It will be a pleasing aroma, a special gift presented to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '42':
  - type: text
    content: '“These burnt offerings are to be made each day from generation to generation. Offer them in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence at the Tabernacle entrance; there I will meet with you and speak with you. '
  '43':
  - type: text
    content: 'I will meet the people of Israel there, in the place made holy by my glorious presence. '
  '44':
  - type: text
    content: 'Yes, I will consecrate the Tabernacle and the altar, and I will consecrate Aaron and his sons to serve me as priests. '
  '45':
  - type: text
    content: 'Then I will live among the people of Israel and be their God, '
  '46':
  - type: text
    content: 'and they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. I am the one who brought them out of the land of Egypt so that I could live among them. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.'
  '5':
  - type: text
    content: 'Dress Aaron in his priestly garments—the tunic, the robe worn with the ephod, the ephod itself, and the chestpiece. Then wrap the decorative sash of the ephod around him. '
  '6':
  - type: text
    content: 'Place the turban on his head, and fasten the sacred medallion to the turban. '
  '7':
  - type: text
    content: 'Then anoint him by pouring the anointing oil over his head. '
  '8':
  - type: text
    content: 'Next present his sons, and dress them in their tunics. '
  '9':
  - type: text
    content: Wrap the sashes around the waists of Aaron and his sons, and put their special head coverings on them. Then the right to the priesthood will be theirs by law forever. In this way, you will ordain Aaron and his sons.
