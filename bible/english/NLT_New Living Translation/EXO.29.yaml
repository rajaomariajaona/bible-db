document_id: EXO.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dedication of the Priests
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“This is the ceremony you must follow when you consecrate Aaron and his sons to serve me as priests: Take a young bull and two rams with no defects. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then, using choice wheat flour and no yeast, make loaves of bread, thin cakes mixed with olive oil, and wafers spread with oil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Place them all in a single basket, and present them at the entrance of the Tabernacle, along with the young bull and the two rams.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Present Aaron and his sons at the entrance of the Tabernacle,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tent of Meeting; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 29:10, 11, 30, 32, 42, 44.
    marker-yv: yv-n
  - type: text
    text: ' and wash them with water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dress Aaron in his priestly garments—the tunic, the robe worn with the ephod, the ephod itself, and the chestpiece. Then wrap the decorative sash of the ephod around him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Place the turban on his head, and fasten the sacred medallion to the turban. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then anoint him by pouring the anointing oil over his head. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Next present his sons, and dress them in their tunics. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Wrap the sashes around the waists of Aaron and his sons, and put their special head coverings on them. Then the right to the priesthood will be theirs by law forever. In this way, you will ordain Aaron and his sons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Bring the young bull to the entrance of the Tabernacle, where Aaron and his sons will lay their hands on its head. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then slaughter the bull in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s presence at the entrance of the Tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Put some of its blood on the horns of the altar with your finger, and pour out the rest at the base of the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Take all the fat around the internal organs, the long lobe of the liver, and the two kidneys and the fat around them, and burn it all on the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then take the rest of the bull, including its hide, meat, and dung, and burn it outside the camp as a sin offering.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Next Aaron and his sons must lay their hands on the head of one of the rams. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then slaughter the ram, and splatter its blood against all sides of the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cut the ram into pieces, and wash off the internal organs and the legs. Set them alongside the head and the other pieces of the body, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'then burn the entire animal on the altar. This is a burnt offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '; it is a pleasing aroma, a special gift presented to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“Now take the other ram, and have Aaron and his sons lay their hands on its head. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then slaughter it, and apply some of its blood to the right earlobes of Aaron and his sons. Also put it on the thumbs of their right hands and the big toes of their right feet. Splatter the rest of the blood against all sides of the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then take some of the blood from the altar and some of the anointing oil, and sprinkle it on Aaron and his sons and on their garments. In this way, they and their garments will be set apart as holy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“Since this is the ram for the ordination of Aaron and his sons, take the fat of the ram, including the fat of the broad tail, the fat around the internal organs, the long lobe of the liver, and the two kidneys and the fat around them, along with the right thigh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then take one round loaf of bread, one thin cake mixed with olive oil, and one wafer from the basket of bread without yeast that was placed in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s presence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Put all these in the hands of Aaron and his sons to be lifted up as a special offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Afterward take the various breads from their hands, and burn them on the altar along with the burnt offering. It is a pleasing aroma to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', a special gift for him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then take the breast of Aaron’s ordination ram, and lift it up in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s presence as a special offering to him. Then keep it as your own portion.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“Set aside the portions of the ordination ram that belong to Aaron and his sons. This includes the breast and the thigh that were lifted up before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as a special offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'In the future, whenever the people of Israel lift up a peace offering, a portion of it must be set aside for Aaron and his descendants. This is their permanent right, and it is a sacred offering from the Israelites to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“Aaron’s sacred garments must be preserved for his descendants who succeed him, and they will wear them when they are anointed and ordained. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The descendant who succeeds him as high priest will wear these clothes for seven days as he ministers in the Tabernacle and the Holy Place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“Take the ram used in the ordination ceremony, and boil its meat in a sacred place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Then Aaron and his sons will eat this meat, along with the bread in the basket, at the Tabernacle entrance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: They alone may eat the meat and bread used for their purification
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: their atonement.
    marker-yv: yv-n
  - type: text
    text: ' in the ordination ceremony. No one else may eat them, for these things are set apart and holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: If any of the ordination meat or bread remains until the morning, it must be burned. It may not be eaten, for it is holy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '“This is how you will ordain Aaron and his sons to their offices, just as I have commanded you. The ordination ceremony will go on for seven days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Each day you must sacrifice a young bull as a sin offering to purify them, making them right with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:36a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to make atonement.
    marker-yv: yv-n
  - type: text
    text: ' Afterward, cleanse the altar by purifying it'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:36b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'by making atonement for it; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: similarly in 29:37.
    marker-yv: yv-n
  - type: text
    text: '; make it holy by anointing it with oil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Purify the altar, and consecrate it every day for seven days. After that, the altar will be absolutely holy, and whatever touches it will become holy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '“These are the sacrifices you are to offer regularly on the altar. Each day, offer two lambs that are a year old, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'one in the morning and the other in the evening. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: With one of them, offer two quarts of choice flour mixed with one quart of pure oil of pressed olives; also, offer one quart of wine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1/10 [of an ephah] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2.2 liters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of choice flour . . . 1/4 of a hin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[1 liter] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of pure oil . . . 1/4 of a hin of wine.
    marker-yv: yv-n
  - type: text
    text: ' as a liquid offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Offer the other lamb in the evening, along with the same offerings of flour and wine as in the morning. It will be a pleasing aroma, a special gift presented to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: '“These burnt offerings are to be made each day from generation to generation. Offer them in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s presence at the Tabernacle entrance; there I will meet with you and speak with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'I will meet the people of Israel there, in the place made holy by my glorious presence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Yes, I will consecrate the Tabernacle and the altar, and I will consecrate Aaron and his sons to serve me as priests. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Then I will live among the people of Israel and be their God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'and they will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God. I am the one who brought them out of the land of Egypt so that I could live among them. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God.'
