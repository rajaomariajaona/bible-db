document_id: EXO.35,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Instructions for the Sabbath
  - type: text
    content: 'Then Moses called together the whole community of Israel and told them, “These are the instructions the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded you to follow. '
  '10':
  - type: text
    content: '“Come, all of you who are gifted craftsmen. Construct everything that the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded:'
  '11':
  - type: text
    content: the Tabernacle and its sacred tent, its covering, clasps, frames, crossbars, posts, and bases;
  '12':
  - type: text
    content: the Ark and its carrying poles;
  - type: text
    content: the Ark’s cover—the place of atonement;
  - type: text
    content: the inner curtain to shield the Ark;
  '13':
  - type: text
    content: the table, its carrying poles, and all its utensils;
  - type: text
    content: the Bread of the Presence;
  '14':
  - type: text
    content: for light, the lampstand, its accessories, the lamp cups, and the olive oil for lighting;
  '15':
  - type: text
    content: the incense altar and its carrying poles;
  - type: text
    content: the anointing oil and fragrant incense;
  - type: text
    content: the curtain for the entrance of the Tabernacle;
  '16':
  - type: text
    content: the altar of burnt offering;
  - type: text
    content: the bronze grating of the altar and its carrying poles and utensils;
  - type: text
    content: the washbasin with its stand;
  '17':
  - type: text
    content: the curtains for the walls of the courtyard;
  - type: text
    content: the posts and their bases;
  - type: text
    content: the curtain for the entrance to the courtyard;
  '18':
  - type: text
    content: the tent pegs of the Tabernacle and courtyard and their ropes;
  '19':
  - type: text
    content: the beautifully stitched garments for the priests to wear while ministering in the Holy Place—the sacred garments for Aaron the priest, and the garments for his sons to wear as they minister as priests.”
  '2':
  - type: text
    content: 'You have six days each week for your ordinary work, but the seventh day must be a Sabbath day of complete rest, a holy day dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: '. Anyone who works on that day must be put to death. '
  '20':
  - type: text
    content: 'So the whole community of Israel left Moses and returned to their tents. '
  '21':
  - type: text
    content: 'All whose hearts were stirred and whose spirits were moved came and brought their sacred offerings to the '
  - type: text
    content: Lord
  - type: text
    content: . They brought all the materials needed for the Tabernacle,
  - type: note
    content: Hebrew Tent of Meeting.
  - type: text
    content: ' for the performance of its rituals, and for the sacred garments. '
  '22':
  - type: text
    content: 'Both men and women came, all whose hearts were willing. They brought to the '
  - type: text
    content: Lord
  - type: text
    content: ' their offerings of gold—brooches, earrings, rings from their fingers, and necklaces. They presented gold objects of every kind as a special offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'All those who owned the following items willingly brought them: blue, purple, and scarlet thread; fine linen and goat hair for cloth; and tanned ram skins and fine goatskin leather. '
  '24':
  - type: text
    content: 'And all who had silver and bronze objects gave them as a sacred offering to the '
  - type: text
    content: Lord
  - type: text
    content: . And those who had acacia wood brought it for use in the project.
  '25':
  - type: text
    content: 'All the women who were skilled in sewing and spinning prepared blue, purple, and scarlet thread, and fine linen cloth. '
  '26':
  - type: text
    content: 'All the women who were willing used their skills to spin the goat hair into yarn. '
  '27':
  - type: text
    content: 'The leaders brought onyx stones and the special gemstones to be set in the ephod and the priest’s chestpiece. '
  '28':
  - type: text
    content: 'They also brought spices and olive oil for the light, the anointing oil, and the fragrant incense. '
  '29':
  - type: text
    content: 'So the people of Israel—every man and woman who was eager to help in the work the '
  - type: text
    content: Lord
  - type: text
    content: ' had given them through Moses—brought their gifts and gave them freely to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: You must not even light a fire in any of your homes on the Sabbath.”
  - type: heading
    content: Offerings for the Tabernacle
  '30':
  - type: text
    content: 'Then Moses told the people of Israel, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has specifically chosen Bezalel son of Uri, grandson of Hur, of the tribe of Judah. '
  '31':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has filled Bezalel with the Spirit of God, giving him great wisdom, ability, and expertise in all kinds of crafts. '
  '32':
  - type: text
    content: 'He is a master craftsman, expert in working with gold, silver, and bronze. '
  '33':
  - type: text
    content: 'He is skilled in engraving and mounting gemstones and in carving wood. He is a master at every craft. '
  '34':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' has given both him and Oholiab son of Ahisamach, of the tribe of Dan, the ability to teach their skills to others. '
  '35':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has given them special skills as engravers, designers, embroiderers in blue, purple, and scarlet thread on fine linen cloth, and weavers. They excel as craftsmen and as designers.'
  '4':
  - type: text
    content: 'Then Moses said to the whole community of Israel, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded: '
  '5':
  - type: text
    content: 'Take a sacred offering for the '
  - type: text
    content: Lord
  - type: text
    content: '. Let those with generous hearts present the following gifts to the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: gold, silver, and bronze;
  '6':
  - type: text
    content: blue, purple, and scarlet thread;
  - type: text
    content: fine linen and goat hair for cloth;
  '7':
  - type: text
    content: tanned ram skins and fine goatskin leather;
  - type: text
    content: acacia wood;
  '8':
  - type: text
    content: olive oil for the lamps;
  - type: text
    content: spices for the anointing oil and the fragrant incense;
  '9':
  - type: text
    content: onyx stones, and other gemstones to be set in the ephod and the priest’s chestpiece.
