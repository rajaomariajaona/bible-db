document_id: EXO.35,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Instructions for the Sabbath
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Moses called together the whole community of Israel and told them, “These are the instructions the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded you to follow. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Come, all of you who are gifted craftsmen. Construct everything that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded:'
  '11':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the Tabernacle and its sacred tent, its covering, clasps, frames, crossbars, posts, and bases;
  '12':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the Ark and its carrying poles;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the Ark’s cover—the place of atonement;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the inner curtain to shield the Ark;
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the table, its carrying poles, and all its utensils;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the Bread of the Presence;
  '14':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: for light, the lampstand, its accessories, the lamp cups, and the olive oil for lighting;
  '15':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the incense altar and its carrying poles;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the anointing oil and fragrant incense;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the curtain for the entrance of the Tabernacle;
  '16':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the altar of burnt offering;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the bronze grating of the altar and its carrying poles and utensils;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the washbasin with its stand;
  '17':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the curtains for the walls of the courtyard;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the posts and their bases;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the curtain for the entrance to the courtyard;
  '18':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the tent pegs of the Tabernacle and courtyard and their ropes;
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the beautifully stitched garments for the priests to wear while ministering in the Holy Place—the sacred garments for Aaron the priest, and the garments for his sons to wear as they minister as priests.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'You have six days each week for your ordinary work, but the seventh day must be a Sabbath day of complete rest, a holy day dedicated to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Anyone who works on that day must be put to death. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the whole community of Israel left Moses and returned to their tents. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All whose hearts were stirred and whose spirits were moved came and brought their sacred offerings to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . They brought all the materials needed for the Tabernacle,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tent of Meeting.
      marker-yv: yv-n
    - type: text
      text: ' for the performance of its rituals, and for the sacred garments. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Both men and women came, all whose hearts were willing. They brought to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their offerings of gold—brooches, earrings, rings from their fingers, and necklaces. They presented gold objects of every kind as a special offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All those who owned the following items willingly brought them: blue, purple, and scarlet thread; fine linen and goat hair for cloth; and tanned ram skins and fine goatskin leather. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all who had silver and bronze objects gave them as a sacred offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . And those who had acacia wood brought it for use in the project.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the women who were skilled in sewing and spinning prepared blue, purple, and scarlet thread, and fine linen cloth. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the women who were willing used their skills to spin the goat hair into yarn. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The leaders brought onyx stones and the special gemstones to be set in the ephod and the priest’s chestpiece. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They also brought spices and olive oil for the light, the anointing oil, and the fragrant incense. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the people of Israel—every man and woman who was eager to help in the work the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given them through Moses—brought their gifts and gave them freely to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: You must not even light a fire in any of your homes on the Sabbath.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Offerings for the Tabernacle
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses told the people of Israel, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has specifically chosen Bezalel son of Uri, grandson of Hur, of the tribe of Judah. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has filled Bezalel with the Spirit of God, giving him great wisdom, ability, and expertise in all kinds of crafts. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He is a master craftsman, expert in working with gold, silver, and bronze. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He is skilled in engraving and mounting gemstones and in carving wood. He is a master at every craft. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given both him and Oholiab son of Ahisamach, of the tribe of Dan, the ability to teach their skills to others. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given them special skills as engravers, designers, embroiderers in blue, purple, and scarlet thread on fine linen cloth, and weavers. They excel as craftsmen and as designers.'
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Moses said to the whole community of Israel, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded: '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Take a sacred offering for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Let those with generous hearts present the following gifts to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ':'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: gold, silver, and bronze;
  '6':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: blue, purple, and scarlet thread;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: fine linen and goat hair for cloth;
  '7':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: tanned ram skins and fine goatskin leather;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: acacia wood;
  '8':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: olive oil for the lamps;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: spices for the anointing oil and the fragrant incense;
  '9':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: onyx stones, and other gemstones to be set in the ephod and the priest’s chestpiece.
