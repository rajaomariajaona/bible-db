document_id: 1PE.4,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living for God
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: So then, since Christ suffered physical pain, you must arm yourselves with the same attitude he had, and be ready to suffer, too. For if you have suffered physically for Christ, you have finished with sin.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'For the one '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: One
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: who has suffered physically has finished with sin.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God has given each of you a gift from his great variety of spiritual gifts. Use them well to serve one another. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Do you have the gift of speaking? Then speak as though God himself were speaking through you. Do you have the gift of helping others? Do it with all the strength and energy that God supplies. Then everything you do will bring glory to God through Jesus Christ. All glory and power to him forever and ever! Amen.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Suffering for Being a Christian
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dear friends, don’t be surprised at the fiery trials you are going through, as if something strange were happening to you. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Instead, be very glad—for these trials make you partners with Christ in his suffering, so that you will have the wonderful joy of seeing his glory when it is revealed to all the world.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If you are insulted because you bear the name of Christ, you will be blessed, for the glorious Spirit of God
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:14a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for the glory of God, which is his Spirit.
      marker-yv: yv-n
    - type: text
      text: ' rests upon you.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:14b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts add '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: On their part he is blasphemed, but on your part he is glorified.
      marker-yv: yv-n
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you suffer, however, it must not be for murder, stealing, making trouble, or prying into other people’s affairs. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But it is no shame to suffer for being a Christian. Praise God for the privilege of being called by his name! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the time has come for judgment, and it must begin with God’s household. And if judgment begins with us, what terrible fate awaits those who have never obeyed God’s Good News? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And also,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If the righteous are barely saved,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what will happen to godless sinners?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Prov 11:31 (Greek version).
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So if you are suffering in a manner that pleases God, keep on doing what is right, and trust your lives to the God who created you, for he will never fail you.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'You won’t spend the rest of your lives chasing your own desires, but you will be anxious to do the will of God. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: You have had enough in the past of the evil things that godless people enjoy—their immorality and lust, their feasting and drunkenness and wild parties, and their terrible worship of idols.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of course, your former friends are surprised when you no longer plunge into the flood of wild and destructive things they do. So they slander you. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But remember that they will have to face God, who stands ready to judge everyone, both the living and the dead. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That is why the Good News was preached to those who are now dead
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: preached even to the dead.
      marker-yv: yv-n
    - type: text
      text: —so although they were destined to die like all people,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: so although people had judged them worthy of death.
      marker-yv: yv-n
    - type: text
      text: ' they now live forever with God in the Spirit.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6c '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in spirit.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The end of the world is coming soon. Therefore, be earnest and disciplined in your prayers. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Most important of all, continue to show deep love for each other, for love covers a multitude of sins. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cheerfully share your home with those who need a meal or a place to stay.
