document_id: 1PE.4,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Living for God
  - type: text
    content: So then, since Christ suffered physical pain, you must arm yourselves with the same attitude he had, and be ready to suffer, too. For if you have suffered physically for Christ, you have finished with sin.
  - type: note
    content: Or For the one [or One] who has suffered physically has finished with sin.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'God has given each of you a gift from his great variety of spiritual gifts. Use them well to serve one another. '
  '11':
  - type: text
    content: Do you have the gift of speaking? Then speak as though God himself were speaking through you. Do you have the gift of helping others? Do it with all the strength and energy that God supplies. Then everything you do will bring glory to God through Jesus Christ. All glory and power to him forever and ever! Amen.
  - type: heading
    content: Suffering for Being a Christian
  '12':
  - type: text
    content: 'Dear friends, don’t be surprised at the fiery trials you are going through, as if something strange were happening to you. '
  '13':
  - type: text
    content: Instead, be very glad—for these trials make you partners with Christ in his suffering, so that you will have the wonderful joy of seeing his glory when it is revealed to all the world.
  '14':
  - type: text
    content: If you are insulted because you bear the name of Christ, you will be blessed, for the glorious Spirit of God
  - type: note
    content: Or for the glory of God, which is his Spirit.
  - type: text
    content: ' rests upon you.'
  - type: note
    content: Some manuscripts add On their part he is blasphemed, but on your part he is glorified.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'If you suffer, however, it must not be for murder, stealing, making trouble, or prying into other people’s affairs. '
  '16':
  - type: text
    content: 'But it is no shame to suffer for being a Christian. Praise God for the privilege of being called by his name! '
  '17':
  - type: text
    content: 'For the time has come for judgment, and it must begin with God’s household. And if judgment begins with us, what terrible fate awaits those who have never obeyed God’s Good News? '
  '18':
  - type: text
    content: And also,
  - type: text
    content: “If the righteous are barely saved,
  - type: text
    content: what will happen to godless sinners?”
  - type: note
    content: Prov 11:31 (Greek version).
  '19':
  - type: text
    content: So if you are suffering in a manner that pleases God, keep on doing what is right, and trust your lives to the God who created you, for he will never fail you.
  '2':
  - type: text
    content: 'You won’t spend the rest of your lives chasing your own desires, but you will be anxious to do the will of God. '
  '3':
  - type: text
    content: You have had enough in the past of the evil things that godless people enjoy—their immorality and lust, their feasting and drunkenness and wild parties, and their terrible worship of idols.
  '4':
  - type: text
    content: 'Of course, your former friends are surprised when you no longer plunge into the flood of wild and destructive things they do. So they slander you. '
  '5':
  - type: text
    content: 'But remember that they will have to face God, who stands ready to judge everyone, both the living and the dead. '
  '6':
  - type: text
    content: That is why the Good News was preached to those who are now dead
  - type: note
    content: Greek preached even to the dead.
  - type: text
    content: —so although they were destined to die like all people,
  - type: note
    content: Or so although people had judged them worthy of death.
  - type: text
    content: ' they now live forever with God in the Spirit.'
  - type: note
    content: Or in spirit.
  '7':
  - type: text
    content: 'The end of the world is coming soon. Therefore, be earnest and disciplined in your prayers. '
  '8':
  - type: text
    content: 'Most important of all, continue to show deep love for each other, for love covers a multitude of sins. '
  '9':
  - type: text
    content: Cheerfully share your home with those who need a meal or a place to stay.
