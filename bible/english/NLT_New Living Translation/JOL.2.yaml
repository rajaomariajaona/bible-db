document_id: JOL.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Locusts Invade like an Army
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Sound the trumpet in Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Zion; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 2:15, 23.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Raise the alarm on my holy mountain!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let everyone tremble in fear
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'because the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is upon us.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: It is a day of darkness and gloom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a day of thick clouds and deep blackness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Suddenly, like dawn spreading across the mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a great and mighty army appears.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nothing like it has been seen before
- type: usfm
  marker: q2
  children:
  - type: text
    text: or will ever be seen again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fire burns in front of them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and flames follow after them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ahead of them the land lies
- type: usfm
  marker: q2
  children:
  - type: text
    text: as beautiful as the Garden of Eden.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behind them is nothing but desolation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: not one thing escapes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They look like horses;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they charge forward like warhorses.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: like charioteers.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Look at them as they leap along the mountaintops.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen to the noise they make—like the rumbling of chariots,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like the roar of fire sweeping across a field of stubble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or like a mighty army moving into battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fear grips all the people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: every face grows pale with terror.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The attackers march like warriors
- type: usfm
  marker: q2
  children:
  - type: text
    text: and scale city walls like soldiers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Straight forward they march,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never breaking rank.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They never jostle each other;
- type: usfm
  marker: q2
  children:
  - type: text
    text: each moves in exactly the right position.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They break through defenses
- type: usfm
  marker: q2
  children:
  - type: text
    text: without missing a step.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They swarm over the city
- type: usfm
  marker: q2
  children:
  - type: text
    text: and run along its walls.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They enter all the houses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: climbing like thieves through the windows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The earth quakes as they advance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the heavens tremble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sun and moon grow dark,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the stars no longer shine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is at the head of the column.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He leads them with a shout.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is his mighty army,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they follow his orders.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is an awesome, terrible thing.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can possibly survive?
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Call to Repentance
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'That is why the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Turn to me now, while there is time.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give me your hearts.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Come with fasting, weeping, and mourning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Don’t tear your clothing in your grief,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but tear your hearts instead.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Return to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he is merciful and compassionate,
- type: usfm
  marker: q1
  children:
  - type: text
    text: slow to get angry and filled with unfailing love.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is eager to relent and not punish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Who knows? Perhaps he will give you a reprieve,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sending you a blessing instead of this curse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Perhaps you will be able to offer grain and wine
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God as before.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Blow the ram’s horn in Jerusalem!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Announce a time of fasting;
- type: usfm
  marker: q1
  children:
  - type: text
    text: call the people together
- type: usfm
  marker: q2
  children:
  - type: text
    text: for a solemn meeting.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Gather all the people—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the elders, the children, and even the babies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Call the bridegroom from his quarters
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the bride from her private room.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Let the priests, who minister in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s presence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: stand and weep between the entry room to the Temple and the altar.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let them pray, “Spare your people, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t let your special possession become an object of mockery.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t let them become a joke for unbelieving foreigners who say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Has the God of Israel left them?’”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Promise of Restoration
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will pity his people'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and jealously guard the honor of his land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will reply,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Look! I am sending you grain and new wine and olive oil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: enough to satisfy your needs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will no longer be an object of mockery
- type: usfm
  marker: q2
  children:
  - type: text
    text: among the surrounding nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I will drive away these armies from the north.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will send them into the parched wastelands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those in the front will be driven into the Dead Sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those at the rear into the Mediterranean.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: into the eastern sea, . . . into the western sea.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: The stench of their rotting bodies will rise over the land.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Surely the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has done great things!'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Don’t be afraid, O land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be glad now and rejoice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has done great things.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Don’t be afraid, you animals of the field,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the wilderness pastures will soon be green.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The trees will again be filled with fruit;
- type: usfm
  marker: q2
  children:
  - type: text
    text: fig trees and grapevines will be loaded down once more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Rejoice, you people of Jerusalem!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the rain he sends demonstrates his faithfulness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Once more the autumn rains will come,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as well as the rains of spring.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The threshing floors will again be piled high with grain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the presses will overflow with new wine and olive oil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says, “I will give you back what you lost'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the swarming locusts, the hopping locusts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the stripping locusts, and the cutting locusts.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The precise identification of the four kinds of locusts mentioned here is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: It was I who sent this great destroying army against you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Once again you will have all the food you want,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and you will praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: who does these miracles for you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Never again will my people be disgraced.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then you will know that I am among my people Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, and there is no other.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Never again will my people be disgraced.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Promise of His Spirit
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses 2:28-32 are numbered 3:1-5 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: “Then, after doing all those things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will pour out my Spirit upon all people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your sons and daughters will prophesy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your old men will dream dreams,
- type: usfm
  marker: q2
  children:
  - type: text
