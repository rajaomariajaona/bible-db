document_id: JOL.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Locusts Invade like an Army
  - type: text
    content: Sound the trumpet in Jerusalem
  - type: note
    content: Hebrew Zion; also in 2:15, 23.
  - type: text
    content: '!'
  - type: text
    content: Raise the alarm on my holy mountain!
  - type: text
    content: Let everyone tremble in fear
  - type: text
    content: 'because the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is upon us.'
  '10':
  - type: text
    content: The earth quakes as they advance,
  - type: text
    content: and the heavens tremble.
  - type: text
    content: The sun and moon grow dark,
  - type: text
    content: and the stars no longer shine.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is at the head of the column.'
  - type: text
    content: He leads them with a shout.
  - type: text
    content: This is his mighty army,
  - type: text
    content: and they follow his orders.
  - type: text
    content: 'The day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is an awesome, terrible thing.'
  - type: text
    content: Who can possibly survive?
  - type: heading
    content: A Call to Repentance
  '12':
  - type: text
    content: 'That is why the '
  - type: text
    content: Lord
  - type: text
    content: ' says,'
  - type: text
    content: “Turn to me now, while there is time.
  - type: text
    content: Give me your hearts.
  - type: text
    content: Come with fasting, weeping, and mourning.
  '13':
  - type: text
    content: Don’t tear your clothing in your grief,
  - type: text
    content: but tear your hearts instead.”
  - type: text
    content: 'Return to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: for he is merciful and compassionate,
  - type: text
    content: slow to get angry and filled with unfailing love.
  - type: text
    content: He is eager to relent and not punish.
  '14':
  - type: text
    content: Who knows? Perhaps he will give you a reprieve,
  - type: text
    content: sending you a blessing instead of this curse.
  - type: text
    content: Perhaps you will be able to offer grain and wine
  - type: text
    content: 'to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God as before.'
  '15':
  - type: text
    content: Blow the ram’s horn in Jerusalem!
  - type: text
    content: Announce a time of fasting;
  - type: text
    content: call the people together
  - type: text
    content: for a solemn meeting.
  '16':
  - type: text
    content: Gather all the people—
  - type: text
    content: the elders, the children, and even the babies.
  - type: text
    content: Call the bridegroom from his quarters
  - type: text
    content: and the bride from her private room.
  '17':
  - type: text
    content: 'Let the priests, who minister in the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence,
  - type: text
    content: stand and weep between the entry room to the Temple and the altar.
  - type: text
    content: 'Let them pray, “Spare your people, '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Don’t let your special possession become an object of mockery.
  - type: text
    content: Don’t let them become a joke for unbelieving foreigners who say,
  - type: text
    content: ‘Has the God of Israel left them?’”
  - type: heading
    content: The Lord’s Promise of Restoration
  '18':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will pity his people'
  - type: text
    content: and jealously guard the honor of his land.
  '19':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will reply,'
  - type: text
    content: “Look! I am sending you grain and new wine and olive oil,
  - type: text
    content: enough to satisfy your needs.
  - type: text
    content: You will no longer be an object of mockery
  - type: text
    content: among the surrounding nations.
  '2':
  - type: text
    content: It is a day of darkness and gloom,
  - type: text
    content: a day of thick clouds and deep blackness.
  - type: text
    content: Suddenly, like dawn spreading across the mountains,
  - type: text
    content: a great and mighty army appears.
  - type: text
    content: Nothing like it has been seen before
  - type: text
    content: or will ever be seen again.
  '20':
  - type: text
    content: I will drive away these armies from the north.
  - type: text
    content: I will send them into the parched wastelands.
  - type: text
    content: Those in the front will be driven into the Dead Sea,
  - type: text
    content: and those at the rear into the Mediterranean.
  - type: note
    content: Hebrew into the eastern sea, . . . into the western sea.
  - type: text
    content: The stench of their rotting bodies will rise over the land.”
  - type: text
    content: 'Surely the '
  - type: text
    content: Lord
  - type: text
    content: ' has done great things!'
  '21':
  - type: text
    content: Don’t be afraid, O land.
  - type: text
    content: Be glad now and rejoice,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has done great things.'
  '22':
  - type: text
    content: Don’t be afraid, you animals of the field,
  - type: text
    content: for the wilderness pastures will soon be green.
  - type: text
    content: The trees will again be filled with fruit;
  - type: text
    content: fig trees and grapevines will be loaded down once more.
  '23':
  - type: text
    content: Rejoice, you people of Jerusalem!
  - type: text
    content: 'Rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: ' your God!'
  - type: text
    content: For the rain he sends demonstrates his faithfulness.
  - type: text
    content: Once more the autumn rains will come,
  - type: text
    content: as well as the rains of spring.
  '24':
  - type: text
    content: The threshing floors will again be piled high with grain,
  - type: text
    content: and the presses will overflow with new wine and olive oil.
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says, “I will give you back what you lost'
  - type: text
    content: to the swarming locusts, the hopping locusts,
  - type: text
    content: the stripping locusts, and the cutting locusts.
  - type: note
    content: The precise identification of the four kinds of locusts mentioned here is uncertain.
  - type: text
    content: It was I who sent this great destroying army against you.
  '26':
  - type: text
    content: Once again you will have all the food you want,
  - type: text
    content: 'and you will praise the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: who does these miracles for you.
  - type: text
    content: Never again will my people be disgraced.
  '27':
  - type: text
    content: Then you will know that I am among my people Israel,
  - type: text
    content: 'that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and there is no other.'
  - type: text
    content: Never again will my people be disgraced.
  - type: heading
    content: The Lord’s Promise of His Spirit
  '28':
  - type: text
    content: ' '
  - type: note
    content: Verses 2:28-32 are numbered 3:1-5 in Hebrew text.
  - type: text
    content: “Then, after doing all those things,
  - type: text
    content: I will pour out my Spirit upon all people.
  - type: text
    content: Your sons and daughters will prophesy.
  - type: text
    content: Your old men will dream dreams,
  - type: text
    content: and your young men will see visions.
  '29':
  - type: text
    content: In those days I will pour out my Spirit
  - type: text
    content: even on servants—men and women alike.
  '3':
  - type: text
    content: Fire burns in front of them,
  - type: text
    content: and flames follow after them.
  - type: text
    content: Ahead of them the land lies
  - type: text
    content: as beautiful as the Garden of Eden.
  - type: text
    content: Behind them is nothing but desolation;
  - type: text
    content: not one thing escapes.
  '30':
  - type: text
    content: And I will cause wonders in the heavens and on the earth—
  - type: text
    content: blood and fire and columns of smoke.
  '31':
  - type: text
    content: The sun will become dark,
  - type: text
    content: and the moon will turn blood red
  - type: text
    content: before that great and terrible
  - type: note
    content: Greek version reads glorious.
  - type: text
    content: ' day of the '
  - type: text
    content: Lord
  - type: text
    content: ' arrives.'
  '32':
  - type: text
    content: 'But everyone who calls on the name of the '
  - type: text
    content: Lord
  - type: text
    content: will be saved,
  - type: text
    content: for some on Mount Zion in Jerusalem will escape,
  - type: text
    content: 'just as the '
  - type: text
    content: Lord
  - type: text
    content: ' has said.'
  - type: text
    content: These will be among the survivors
  - type: text
    content: 'whom the '
  - type: text
    content: Lord
  - type: text
    content: ' has called.'
  '4':
  - type: text
    content: They look like horses;
  - type: text
    content: they charge forward like warhorses.
  - type: note
    content: Or like charioteers.
  '5':
  - type: text
    content: Look at them as they leap along the mountaintops.
  - type: text
    content: Listen to the noise they make—like the rumbling of chariots,
  - type: text
    content: like the roar of fire sweeping across a field of stubble,
  - type: text
    content: or like a mighty army moving into battle.
  '6':
  - type: text
    content: Fear grips all the people;
  - type: text
    content: every face grows pale with terror.
  '7':
  - type: text
    content: The attackers march like warriors
  - type: text
    content: and scale city walls like soldiers.
  - type: text
    content: Straight forward they march,
  - type: text
    content: never breaking rank.
  '8':
  - type: text
    content: They never jostle each other;
  - type: text
    content: each moves in exactly the right position.
  - type: text
    content: They break through defenses
  - type: text
    content: without missing a step.
  '9':
  - type: text
    content: They swarm over the city
  - type: text
    content: and run along its walls.
  - type: text
    content: They enter all the houses,
  - type: text
    content: climbing like thieves through the windows.
