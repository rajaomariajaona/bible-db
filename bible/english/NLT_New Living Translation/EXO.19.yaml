document_id: EXO.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Reveals Himself at Sinai
  - type: text
    content: Exactly two months after the Israelites left Egypt,
  - type: note
    content: Hebrew In the third month after the Israelites left Egypt, on the very day, i.e., two lunar months to the day after leaving Egypt. Compare Num 33:3.
  - type: text
    content: ' they arrived in the wilderness of Sinai. '
  '10':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' told Moses, “Go down and prepare the people for my arrival. Consecrate them today and tomorrow, and have them wash their clothing. '
  '11':
  - type: text
    content: 'Be sure they are ready on the third day, for on that day the '
  - type: text
    content: Lord
  - type: text
    content: ' will come down on Mount Sinai as all the people watch. '
  '12':
  - type: text
    content: 'Mark off a boundary all around the mountain. Warn the people, ‘Be careful! Do not go up on the mountain or even touch its boundaries. Anyone who touches the mountain will certainly be put to death. '
  '13':
  - type: text
    content: No hand may touch the person or animal that crosses the boundary; instead, stone them or shoot them with arrows. They must be put to death.’ However, when the ram’s horn sounds a long blast, then the people may go up on the mountain.
  - type: note
    content: Or up to the mountain.
  - type: text
    content: ”
  '14':
  - type: text
    content: 'So Moses went down to the people. He consecrated them for worship, and they washed their clothes. '
  '15':
  - type: text
    content: He told them, “Get ready for the third day, and until then abstain from having sexual intercourse.”
  '16':
  - type: text
    content: 'On the morning of the third day, thunder roared and lightning flashed, and a dense cloud came down on the mountain. There was a long, loud blast from a ram’s horn, and all the people trembled. '
  '17':
  - type: text
    content: 'Moses led them out from the camp to meet with God, and they stood at the foot of the mountain. '
  '18':
  - type: text
    content: 'All of Mount Sinai was covered with smoke because the '
  - type: text
    content: Lord
  - type: text
    content: ' had descended on it in the form of fire. The smoke billowed into the sky like smoke from a brick kiln, and the whole mountain shook violently. '
  '19':
  - type: text
    content: 'As the blast of the ram’s horn grew louder and louder, Moses spoke, and God thundered his reply. '
  '2':
  - type: text
    content: After breaking camp at Rephidim, they came to the wilderness of Sinai and set up camp there at the base of Mount Sinai.
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' came down on the top of Mount Sinai and called Moses to the top of the mountain. So Moses climbed the mountain.'
  '21':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' told Moses, “Go back down and warn the people not to break through the boundaries to see the '
  - type: text
    content: Lord
  - type: text
    content: ', or they will die. '
  '22':
  - type: text
    content: 'Even the priests who regularly come near to the '
  - type: text
    content: Lord
  - type: text
    content: ' must purify themselves so that the '
  - type: text
    content: Lord
  - type: text
    content: ' does not break out and destroy them.”'
  '23':
  - type: text
    content: '“But '
  - type: text
    content: Lord
  - type: text
    content: ',” Moses protested, “the people cannot come up to Mount Sinai. You already warned us. You told me, ‘Mark off a boundary all around the mountain to set it apart as holy.’”'
  '24':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Go down and bring Aaron back up with you. In the meantime, do not let the priests or the people break through to approach the '
  - type: text
    content: Lord
  - type: text
    content: ', or he will break out and destroy them.”'
  '25':
  - type: text
    content: 'So Moses went down to the people and told them what the '
  - type: text
    content: Lord
  - type: text
    content: ' had said.'
  '3':
  - type: text
    content: 'Then Moses climbed the mountain to appear before God. The '
  - type: text
    content: Lord
  - type: text
    content: ' called to him from the mountain and said, “Give these instructions to the family of Jacob; announce it to the descendants of Israel: '
  '4':
  - type: text
    content: '‘You have seen what I did to the Egyptians. You know how I carried you on eagles’ wings and brought you to myself. '
  '5':
  - type: text
    content: 'Now if you will obey me and keep my covenant, you will be my own special treasure from among all the peoples on earth; for all the earth belongs to me. '
  '6':
  - type: text
    content: And you will be my kingdom of priests, my holy nation.’ This is the message you must give to the people of Israel.”
  '7':
  - type: text
    content: 'So Moses returned from the mountain and called together the elders of the people and told them everything the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him. '
  '8':
  - type: text
    content: 'And all the people responded together, “We will do everything the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded.” So Moses brought the people’s answer back to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “I will come to you in a thick cloud, Moses, so the people themselves can hear me when I speak with you. Then they will always trust you.”'
  - type: text
    content: 'Moses told the '
  - type: text
    content: Lord
  - type: text
    content: ' what the people had said. '
