document_id: LEV.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Redemption of Gifts Offered to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Give the following instructions to the people of Israel. If anyone makes a special vow to dedicate someone to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' by paying the value of that person, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: here is the scale of values to be used. A man between the ages of twenty and sixty is valued at fifty shekels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '20 ounces '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[570 grams].'
    marker-yv: yv-n
  - type: text
    text: ' of silver, as measured by the sanctuary shekel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A woman of that age is valued at thirty shekels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '12 ounces '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[342 grams].'
    marker-yv: yv-n
  - type: text
    text: ' of silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A boy between the ages of five and twenty is valued at twenty shekels of silver; a girl of that age is valued at ten shekels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'A boy . . . 8 ounces '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[228 grams] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of silver; a girl . . . 4 ounces '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[114 grams].'
    marker-yv: yv-n
  - type: text
    text: ' of silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A boy between the ages of one month and five years is valued at five shekels of silver; a girl of that age is valued at three shekels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'A boy . . . 2 ounces '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[57 grams] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of silver; a girl . . . 1.2 ounces '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[34 grams].'
    marker-yv: yv-n
  - type: text
    text: ' of silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A man older than sixty is valued at fifteen shekels of silver; a woman of that age is valued at ten shekels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'A man . . . 6 ounces '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[171 grams] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of silver; a woman . . . 4 ounces '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[114 grams].'
    marker-yv: yv-n
  - type: text
    text: ' of silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: If you desire to make such a vow but cannot afford to pay the required amount, take the person to the priest. He will determine the amount for you to pay based on what you can afford.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“If your vow involves giving an animal that is acceptable as an offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', any gift to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be considered holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'You may not exchange or substitute it for another animal—neither a good animal for a bad one nor a bad animal for a good one. But if you do exchange one animal for another, then both the original animal and its substitute will be considered holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'If your vow involves an unclean animal—one that is not acceptable as an offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '—then you must bring the animal to the priest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He will assess its value, and his assessment will be final, whether high or low. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: If you want to buy back the animal, you must pay the value set by the priest, plus 20 percent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“If someone dedicates a house to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the priest will come to assess its value. The priest’s assessment will be final, whether high or low. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: If the person who dedicated the house wants to buy it back, he must pay the value set by the priest, plus 20 percent. Then the house will again be his.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“If someone dedicates to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' a piece of his family property, its value will be assessed according to the amount of seed required to plant it—fifty shekels of silver for a field planted with five bushels of barley seed.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '50 shekels '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[20 ounces or 570 grams] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of silver for a homer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[220 liters] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of barley seed.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'If the field is dedicated to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in the Year of Jubilee, then the entire assessment will apply. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But if the field is dedicated after the Year of Jubilee, the priest will assess the land’s value in proportion to the number of years left until the next Year of Jubilee. Its assessed value is reduced each year. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'If the person who dedicated the field wants to buy it back, he must pay the value set by the priest, plus 20 percent. Then the field will again be legally his. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But if he does not want to buy it back, and it is sold to someone else, the field can no longer be bought back. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: When the field is released in the Year of Jubilee, it will be holy, a field specially set apart
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering; also in 27:28, 29.'
    marker-yv: yv-n
  - type: text
    text: ' for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . It will become the property of the priests.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“If someone dedicates to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' a field he has purchased but which is not part of his family property, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'the priest will assess its value based on the number of years left until the next Year of Jubilee. On that day he must give the assessed value of the land as a sacred donation to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'In the Year of Jubilee the field must be returned to the person from whom he purchased it, the one who inherited it as family property. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: (All the payments must be measured by the weight of the sanctuary shekel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Each shekel was about 0.4 ounces [11 grams] in weight.
    marker-yv: yv-n
  - type: text
    text: ' which equals twenty gerahs.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“You may not dedicate a firstborn animal to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for the firstborn of your cattle, sheep, and goats already belong to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: However, you may buy back the firstborn of a ceremonially unclean animal by paying the priest’s assessment of its worth, plus 20 percent. If you do not buy it back, the priest will sell it at its assessed value.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“However, anything specially set apart for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '—whether a person, an animal, or family property—must never be sold or bought back. Anything devoted in this way has been set apart as holy, and it belongs to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: No person specially set apart for destruction may be bought back. Such a person must be put to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“One-tenth of the produce of the land, whether grain from the fields or fruit from the trees, belongs to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and must be set apart to him as holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'If you want to buy back the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s tenth of the grain or fruit, you must pay its value, plus 20 percent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Count off every tenth animal from your herds and flocks and set them apart for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: You may not pick and choose between good and bad animals, and you may not substitute one for another. But if you do exchange one animal for another, then both the original animal and its substitute will be considered holy and cannot be bought back.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'These are the commands that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave through Moses on Mount Sinai for the Israelites.'
