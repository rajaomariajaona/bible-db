document_id: 1JN.2,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'My dear children, I am writing this to you so that you will not sin. But if anyone does sin, we have an advocate who pleads our case before the Father. He is Jesus Christ, the one who is truly righteous. '
  '10':
  - type: text
    content: Anyone who loves a fellow believer
  - type: note
    content: Greek loves his brother.
  - type: text
    content: ' is living in the light and does not cause others to stumble. '
  '11':
  - type: text
    content: But anyone who hates a fellow believer is still living and walking in darkness. Such a person does not know the way to go, having been blinded by the darkness.
  '12':
  - type: text
    content: I am writing to you who are God’s children
  - type: text
    content: because your sins have been forgiven through Jesus.
  - type: note
    content: Greek through his name.
  '13':
  - type: text
    content: I am writing to you who are mature in the faith
  - type: note
    content: Or to you fathers; also in 2:14.
  - type: text
    content: because you know Christ, who existed from the beginning.
  - type: text
    content: I am writing to you who are young in the faith
  - type: text
    content: because you have won your battle with the evil one.
  '14':
  - type: text
    content: I have written to you who are God’s children
  - type: text
    content: because you know the Father.
  - type: text
    content: I have written to you who are mature in the faith
  - type: text
    content: because you know Christ, who existed from the beginning.
  - type: text
    content: I have written to you who are young in the faith
  - type: text
    content: because you are strong.
  - type: text
    content: God’s word lives in your hearts,
  - type: text
    content: and you have won your battle with the evil one.
  - type: heading
    content: Do Not Love This World
  '15':
  - type: text
    content: 'Do not love this world nor the things it offers you, for when you love the world, you do not have the love of the Father in you. '
  '16':
  - type: text
    content: 'For the world offers only a craving for physical pleasure, a craving for everything we see, and pride in our achievements and possessions. These are not from the Father, but are from this world. '
  '17':
  - type: text
    content: And this world is fading away, along with everything that people crave. But anyone who does what pleases God will live forever.
  - type: heading
    content: Warning about Antichrists
  '18':
  - type: text
    content: 'Dear children, the last hour is here. You have heard that the Antichrist is coming, and already many such antichrists have appeared. From this we know that the last hour has come. '
  '19':
  - type: text
    content: These people left our churches, but they never really belonged with us; otherwise they would have stayed with us. When they left, it proved that they did not belong with us.
  '2':
  - type: text
    content: He himself is the sacrifice that atones for our sins—and not only our sins but the sins of all the world.
  '20':
  - type: text
    content: But you are not like that, for the Holy One has given you his Spirit,
  - type: note
    content: Greek But you have an anointing from the Holy One.
  - type: text
    content: ' and all of you know the truth. '
  '21':
  - type: text
    content: 'So I am writing to you not because you don’t know the truth but because you know the difference between truth and lies. '
  '22':
  - type: text
    content: And who is a liar? Anyone who says that Jesus is not the Christ.
  - type: note
    content: Or not the Messiah.
  - type: text
    content: ' Anyone who denies the Father and the Son is an antichrist.'
  - type: note
    content: Or the antichrist.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Anyone who denies the Son doesn’t have the Father, either. But anyone who acknowledges the Son has the Father also.
  '24':
  - type: text
    content: 'So you must remain faithful to what you have been taught from the beginning. If you do, you will remain in fellowship with the Son and with the Father. '
  '25':
  - type: text
    content: And in this fellowship we enjoy the eternal life he promised us.
  '26':
  - type: text
    content: 'I am writing these things to warn you about those who want to lead you astray. '
  '27':
  - type: text
    content: But you have received the Holy Spirit,
  - type: note
    content: Greek the anointing from him.
  - type: text
    content: ' and he lives within you, so you don’t need anyone to teach you what is true. For the Spirit'
  - type: note
    content: Greek the anointing.
  - type: text
    content: ' teaches you everything you need to know, and what he teaches is true—it is not a lie. So just as he has taught you, remain in fellowship with Christ.'
  - type: heading
    content: Living as Children of God
  '28':
  - type: text
    content: And now, dear children, remain in fellowship with Christ so that when he returns, you will be full of courage and not shrink back from him in shame.
  '29':
  - type: text
    content: Since we know that Christ is righteous, we also know that all who do what is right are God’s children.
  '3':
  - type: text
    content: 'And we can be sure that we know him if we obey his commandments. '
  '4':
  - type: text
    content: 'If someone claims, “I know God,” but doesn’t obey God’s commandments, that person is a liar and is not living in the truth. '
  '5':
  - type: text
    content: 'But those who obey God’s word truly show how completely they love him. That is how we know we are living in him. '
  '6':
  - type: text
    content: Those who say they live in God should live their lives as Jesus did.
  - type: heading
    content: A New Commandment
  '7':
  - type: text
    content: 'Dear friends, I am not writing a new commandment for you; rather it is an old one you have had from the very beginning. This old commandment—to love one another—is the same message you heard before. '
  '8':
  - type: text
    content: Yet it is also new. Jesus lived the truth of this commandment, and you also are living it. For the darkness is disappearing, and the true light is already shining.
  '9':
  - type: text
    content: If anyone claims, “I am living in the light,” but hates a fellow believer,
  - type: note
    content: Greek hates his brother; also in 2:11.
  - type: text
    content: ' that person is still living in darkness. '
