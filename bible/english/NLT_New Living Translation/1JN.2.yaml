document_id: 1JN.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My dear children, I am writing this to you so that you will not sin. But if anyone does sin, we have an advocate who pleads our case before the Father. He is Jesus Christ, the one who is truly righteous. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anyone who loves a fellow believer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: loves his brother.
      marker-yv: yv-n
    - type: text
      text: ' is living in the light and does not cause others to stumble. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But anyone who hates a fellow believer is still living and walking in darkness. Such a person does not know the way to go, having been blinded by the darkness.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am writing to you who are God’s children
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because your sins have been forgiven through Jesus.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: through his name.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am writing to you who are mature in the faith
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'to you fathers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 2:14.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you know Christ, who existed from the beginning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am writing to you who are young in the faith
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you have won your battle with the evil one.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have written to you who are God’s children
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you know the Father.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have written to you who are mature in the faith
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you know Christ, who existed from the beginning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have written to you who are young in the faith
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you are strong.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God’s word lives in your hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you have won your battle with the evil one.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Do Not Love This World
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Do not love this world nor the things it offers you, for when you love the world, you do not have the love of the Father in you. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For the world offers only a craving for physical pleasure, a craving for everything we see, and pride in our achievements and possessions. These are not from the Father, but are from this world. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And this world is fading away, along with everything that people crave. But anyone who does what pleases God will live forever.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warning about Antichrists
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dear children, the last hour is here. You have heard that the Antichrist is coming, and already many such antichrists have appeared. From this we know that the last hour has come. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: These people left our churches, but they never really belonged with us; otherwise they would have stayed with us. When they left, it proved that they did not belong with us.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He himself is the sacrifice that atones for our sins—and not only our sins but the sins of all the world.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But you are not like that, for the Holy One has given you his Spirit,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: But you have an anointing from the Holy One.
      marker-yv: yv-n
    - type: text
      text: ' and all of you know the truth. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I am writing to you not because you don’t know the truth but because you know the difference between truth and lies. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And who is a liar? Anyone who says that Jesus is not the Christ.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:22a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: not the Messiah.
      marker-yv: yv-n
    - type: text
      text: ' Anyone who denies the Father and the Son is an antichrist.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:22b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the antichrist.
      marker-yv: yv-n
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anyone who denies the Son doesn’t have the Father, either. But anyone who acknowledges the Son has the Father also.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So you must remain faithful to what you have been taught from the beginning. If you do, you will remain in fellowship with the Son and with the Father. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And in this fellowship we enjoy the eternal life he promised us.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am writing these things to warn you about those who want to lead you astray. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But you have received the Holy Spirit,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:27a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the anointing from him.
      marker-yv: yv-n
    - type: text
      text: ' and he lives within you, so you don’t need anyone to teach you what is true. For the Spirit'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:27b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the anointing.
      marker-yv: yv-n
    - type: text
      text: ' teaches you everything you need to know, and what he teaches is true—it is not a lie. So just as he has taught you, remain in fellowship with Christ.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living as Children of God
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And now, dear children, remain in fellowship with Christ so that when he returns, you will be full of courage and not shrink back from him in shame.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Since we know that Christ is righteous, we also know that all who do what is right are God’s children.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we can be sure that we know him if we obey his commandments. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If someone claims, “I know God,” but doesn’t obey God’s commandments, that person is a liar and is not living in the truth. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But those who obey God’s word truly show how completely they love him. That is how we know we are living in him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Those who say they live in God should live their lives as Jesus did.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A New Commandment
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Dear friends, I am not writing a new commandment for you; rather it is an old one you have had from the very beginning. This old commandment—to love one another—is the same message you heard before. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Yet it is also new. Jesus lived the truth of this commandment, and you also are living it. For the darkness is disappearing, and the true light is already shining.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If anyone claims, “I am living in the light,” but hates a fellow believer,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'hates his brother; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 2:11.
      marker-yv: yv-n
    - type: text
      text: ' that person is still living in darkness. '
