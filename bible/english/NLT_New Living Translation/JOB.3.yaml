document_id: JOB.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Job’s First Speech
  - type: text
    content: 'At last Job spoke, and he cursed the day of his birth. '
  '10':
  - type: text
    content: Curse that day for failing to shut my mother’s womb,
  - type: text
    content: for letting me be born to see all this trouble.
  '11':
  - type: text
    content: “Why wasn’t I born dead?
  - type: text
    content: Why didn’t I die as I came from the womb?
  '12':
  - type: text
    content: Why was I laid on my mother’s lap?
  - type: text
    content: Why did she nurse me at her breasts?
  '13':
  - type: text
    content: Had I died at birth, I would now be at peace.
  - type: text
    content: I would be asleep and at rest.
  '14':
  - type: text
    content: I would rest with the world’s kings and prime ministers,
  - type: text
    content: whose great buildings now lie in ruins.
  '15':
  - type: text
    content: I would rest with princes, rich in gold,
  - type: text
    content: whose palaces were filled with silver.
  '16':
  - type: text
    content: Why wasn’t I buried like a stillborn child,
  - type: text
    content: like a baby who never lives to see the light?
  '17':
  - type: text
    content: For in death the wicked cause no trouble,
  - type: text
    content: and the weary are at rest.
  '18':
  - type: text
    content: Even captives are at ease in death,
  - type: text
    content: with no guards to curse them.
  '19':
  - type: text
    content: Rich and poor are both there,
  - type: text
    content: and the slave is free from his master.
  '2':
  - type: text
    content: 'He said:'
  '20':
  - type: text
    content: “Oh, why give light to those in misery,
  - type: text
    content: and life to those who are bitter?
  '21':
  - type: text
    content: They long for death, and it won’t come.
  - type: text
    content: They search for death more eagerly than for hidden treasure.
  '22':
  - type: text
    content: They’re filled with joy when they finally die,
  - type: text
    content: and rejoice when they find the grave.
  '23':
  - type: text
    content: Why is life given to those with no future,
  - type: text
    content: those God has surrounded with difficulties?
  '24':
  - type: text
    content: I cannot eat for sighing;
  - type: text
    content: my groans pour out like water.
  '25':
  - type: text
    content: What I always feared has happened to me.
  - type: text
    content: What I dreaded has come true.
  '26':
  - type: text
    content: I have no peace, no quietness.
  - type: text
    content: I have no rest; only trouble comes.”
  '3':
  - type: text
    content: “Let the day of my birth be erased,
  - type: text
    content: and the night I was conceived.
  '4':
  - type: text
    content: Let that day be turned to darkness.
  - type: text
    content: Let it be lost even to God on high,
  - type: text
    content: and let no light shine on it.
  '5':
  - type: text
    content: Let the darkness and utter gloom claim that day for its own.
  - type: text
    content: Let a black cloud overshadow it,
  - type: text
    content: and let the darkness terrify it.
  '6':
  - type: text
    content: Let that night be blotted off the calendar,
  - type: text
    content: never again to be counted among the days of the year,
  - type: text
    content: never again to appear among the months.
  '7':
  - type: text
    content: Let that night be childless.
  - type: text
    content: Let it have no joy.
  '8':
  - type: text
    content: Let those who are experts at cursing—
  - type: text
    content: whose cursing could rouse Leviathan
  - type: note
    content: The identification of Leviathan is disputed, ranging from an earthly creature to a mythical sea monster in ancient literature.
  - type: text
    content: —
  - type: text
    content: curse that day.
  '9':
  - type: text
    content: Let its morning stars remain dark.
  - type: text
    content: Let it hope for light, but in vain;
  - type: text
    content: may it never see the morning light.
