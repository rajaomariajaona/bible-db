document_id: JOB.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job’s First Speech
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'At last Job spoke, and he cursed the day of his birth. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He said:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Let the day of my birth be erased,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the night I was conceived.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Let that day be turned to darkness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let it be lost even to God on high,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let no light shine on it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Let the darkness and utter gloom claim that day for its own.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let a black cloud overshadow it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let the darkness terrify it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Let that night be blotted off the calendar,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never again to be counted among the days of the year,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never again to appear among the months.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Let that night be childless.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let it have no joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Let those who are experts at cursing—
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose cursing could rouse Leviathan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The identification of Leviathan is disputed, ranging from an earthly creature to a mythical sea monster in ancient literature.
    marker-yv: yv-n
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: curse that day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Let its morning stars remain dark.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let it hope for light, but in vain;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may it never see the morning light.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Curse that day for failing to shut my mother’s womb,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for letting me be born to see all this trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Why wasn’t I born dead?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why didn’t I die as I came from the womb?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Why was I laid on my mother’s lap?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why did she nurse me at her breasts?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Had I died at birth, I would now be at peace.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would be asleep and at rest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I would rest with the world’s kings and prime ministers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose great buildings now lie in ruins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I would rest with princes, rich in gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose palaces were filled with silver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Why wasn’t I buried like a stillborn child,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a baby who never lives to see the light?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For in death the wicked cause no trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the weary are at rest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Even captives are at ease in death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with no guards to curse them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Rich and poor are both there,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the slave is free from his master.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Oh, why give light to those in misery,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and life to those who are bitter?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They long for death, and it won’t come.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They search for death more eagerly than for hidden treasure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: They’re filled with joy when they finally die,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rejoice when they find the grave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Why is life given to those with no future,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those God has surrounded with difficulties?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: I cannot eat for sighing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my groans pour out like water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: What I always feared has happened to me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: What I dreaded has come true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I have no peace, no quietness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have no rest; only trouble comes.”
