document_id: 2CH.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Asks for Wisdom
  - type: text
    content: 'Solomon son of David took firm control of his kingdom, for the '
  - type: text
    content: Lord
  - type: text
    content: ' his God was with him and made him very powerful.'
  '10':
  - type: text
    content: Give me the wisdom and knowledge to lead them properly,
  - type: note
    content: Hebrew to go out and come in before this people.
  - type: text
    content: ' for who could possibly govern this great people of yours?”'
  '11':
  - type: text
    content: 'God said to Solomon, “Because your greatest desire is to help your people, and you did not ask for wealth, riches, fame, or even the death of your enemies or a long life, but rather you asked for wisdom and knowledge to properly govern my people— '
  '12':
  - type: text
    content: I will certainly give you the wisdom and knowledge you requested. But I will also give you wealth, riches, and fame such as no other king has had before you or will ever have in the future!”
  '13':
  - type: text
    content: Then Solomon returned to Jerusalem from the Tabernacle at the place of worship in Gibeon, and he reigned over Israel.
  '14':
  - type: text
    content: Solomon built up a huge force of chariots and horses.
  - type: note
    content: Or charioteers; also in 1:14b.
  - type: text
    content: ' He had 1,400 chariots and 12,000 horses. He stationed some of them in the chariot cities and some near him in Jerusalem. '
  '15':
  - type: text
    content: The king made silver and gold as plentiful in Jerusalem as stone. And valuable cedar timber was as common as the sycamore-fig trees that grow in the foothills of Judah.
  - type: note
    content: Hebrew the Shephelah.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Solomon’s horses were imported from Egypt
  - type: note
    content: Possibly Muzur, a district near Cilicia; also in 1:17.
  - type: text
    content: ' and from Cilicia'
  - type: note
    content: Hebrew Kue, probably another name for Cilicia.
  - type: text
    content: '; the king’s traders acquired them from Cilicia at the standard price. '
  '17':
  - type: text
    content: At that time chariots from Egypt could be purchased for 600 pieces of silver,
  - type: note
    content: Hebrew 600 [shekels] of silver, about 15 pounds or 6.8 kilograms in weight.
  - type: text
    content: ' and horses for 150 pieces of silver.'
  - type: note
    content: Hebrew 150 [shekels], about 3.8 pounds or 1.7 kilograms in weight.
  - type: text
    content: ' They were then exported to the kings of the Hittites and the kings of Aram.'
  '2':
  - type: text
    content: Solomon called together all the leaders of Israel—the generals and captains of the army,
  - type: note
    content: Hebrew the commanders of thousands and of hundreds.
  - type: text
    content: ' the judges, and all the political and clan leaders. '
  '3':
  - type: text
    content: Then he led the entire assembly to the place of worship in Gibeon, for God’s Tabernacle
  - type: note
    content: Hebrew Tent of Meeting; also in 1:6, 13.
  - type: text
    content: ' was located there. (This was the Tabernacle that Moses, the '
  - type: text
    content: Lord
  - type: text
    content: ’s servant, had made in the wilderness.)
  '4':
  - type: text
    content: 'David had already moved the Ark of God from Kiriath-jearim to the tent he had prepared for it in Jerusalem. '
  '5':
  - type: text
    content: But the bronze altar made by Bezalel son of Uri and grandson of Hur was there
  - type: note
    content: As in Greek version and Latin Vulgate, and some Hebrew manuscripts; Masoretic Text reads he placed.
  - type: text
    content: ' at Gibeon in front of the Tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: '. So Solomon and the people gathered in front of it to consult the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Hebrew to consult him.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'There in front of the Tabernacle, Solomon went up to the bronze altar in the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence and sacrificed 1,000 burnt offerings on it.
  '7':
  - type: text
    content: That night God appeared to Solomon and said, “What do you want? Ask, and I will give it to you!”
  '8':
  - type: text
    content: 'Solomon replied to God, “You showed great and faithful love to David, my father, and now you have made me king in his place. '
  '9':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' God, please continue to keep your promise to David my father, for you have made me king over a people as numerous as the dust of the earth! '
