document_id: 2CH.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon Asks for Wisdom
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Solomon son of David took firm control of his kingdom, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God was with him and made him very powerful.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Solomon called together all the leaders of Israel—the generals and captains of the army,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the commanders of thousands and of hundreds.
    marker-yv: yv-n
  - type: text
    text: ' the judges, and all the political and clan leaders. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then he led the entire assembly to the place of worship in Gibeon, for God’s Tabernacle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tent of Meeting; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 1:6, 13.
    marker-yv: yv-n
  - type: text
    text: ' was located there. (This was the Tabernacle that Moses, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s servant, had made in the wilderness.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David had already moved the Ark of God from Kiriath-jearim to the tent he had prepared for it in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But the bronze altar made by Bezalel son of Uri and grandson of Hur was there
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version and Latin Vulgate, and some Hebrew manuscripts; Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he placed.
    marker-yv: yv-n
  - type: text
    text: ' at Gibeon in front of the Tabernacle of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. So Solomon and the people gathered in front of it to consult the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to consult him.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'There in front of the Tabernacle, Solomon went up to the bronze altar in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s presence and sacrificed 1,000 burnt offerings on it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: That night God appeared to Solomon and said, “What do you want? Ask, and I will give it to you!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Solomon replied to God, “You showed great and faithful love to David, my father, and now you have made me king in his place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God, please continue to keep your promise to David my father, for you have made me king over a people as numerous as the dust of the earth! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Give me the wisdom and knowledge to lead them properly,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to go out and come in before this people.
    marker-yv: yv-n
  - type: text
    text: ' for who could possibly govern this great people of yours?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'God said to Solomon, “Because your greatest desire is to help your people, and you did not ask for wealth, riches, fame, or even the death of your enemies or a long life, but rather you asked for wisdom and knowledge to properly govern my people— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I will certainly give you the wisdom and knowledge you requested. But I will also give you wealth, riches, and fame such as no other king has had before you or will ever have in the future!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then Solomon returned to Jerusalem from the Tabernacle at the place of worship in Gibeon, and he reigned over Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Solomon built up a huge force of chariots and horses.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'charioteers; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 1:14b.
    marker-yv: yv-n
  - type: text
    text: ' He had 1,400 chariots and 12,000 horses. He stationed some of them in the chariot cities and some near him in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The king made silver and gold as plentiful in Jerusalem as stone. And valuable cedar timber was as common as the sycamore-fig trees that grow in the foothills of Judah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Shephelah.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Solomon’s horses were imported from Egypt
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:16a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Possibly '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Muzur, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a district near Cilicia; also in 1:17.
    marker-yv: yv-n
  - type: text
    text: ' and from Cilicia'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:16b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Kue, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: probably another name for Cilicia.
    marker-yv: yv-n
  - type: text
    text: '; the king’s traders acquired them from Cilicia at the standard price. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: At that time chariots from Egypt could be purchased for 600 pieces of silver,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '600 [shekels] of silver, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 15 pounds or 6.8 kilograms in weight.
    marker-yv: yv-n
  - type: text
    text: ' and horses for 150 pieces of silver.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '150 [shekels], '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 3.8 pounds or 1.7 kilograms in weight.
    marker-yv: yv-n
  - type: text
    text: ' They were then exported to the kings of the Hittites and the kings of Aram.'
