document_id: JER.52,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Fall of Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Zedekiah was twenty-one years old when he became king, and he reigned in Jerusalem eleven years. His mother was Hamutal, the daughter of Jeremiah from Libnah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king of Babylon made Zedekiah watch as he slaughtered his sons. He also slaughtered all the officials of Judah at Riblah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he gouged out Zedekiah’s eyes and bound him in bronze chains, and the king of Babylon led him away to Babylon. Zedekiah remained there in prison until the day of his death.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Temple Destroyed
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: On August 17 of that year,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'On the tenth day of the fifth month, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'of the ancient Hebrew lunar calendar. This day was August 17, 586 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ; also see note on 52:4a.
      marker-yv: yv-n
    - type: text
      text: ' which was the nineteenth year of King Nebuchadnezzar’s reign, Nebuzaradan, the captain of the guard and an official of the Babylonian king, arrived in Jerusalem. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He burned down the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the royal palace, and all the houses of Jerusalem. He destroyed all the important buildings'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: destroyed the houses of all the important people.
      marker-yv: yv-n
    - type: text
      text: ' in the city. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then he supervised the entire Babylonian
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldean.
      marker-yv: yv-n
    - type: text
      text: ' army as they tore down the walls of Jerusalem on every side. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Nebuzaradan, the captain of the guard, took as exiles some of the poorest of the people, the rest of the people who remained in the city, the defectors who had declared their allegiance to the king of Babylon, and the rest of the craftsmen. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But Nebuzaradan allowed some of the poorest people to stay behind to care for the vineyards and fields.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Babylonians broke up the bronze pillars in front of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple, the bronze water carts, and the great bronze basin called the Sea, and they carried all the bronze away to Babylon. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They also took all the ash buckets, shovels, lamp snuffers, basins, dishes, and all the other bronze articles used for making sacrifices at the Temple. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The captain of the guard also took the small bowls, incense burners, basins, pots, lampstands, ladles, bowls used for liquid offerings, and all the other articles made of pure gold or silver.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But Zedekiah did what was evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight, just as Jehoiakim had done. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The weight of the bronze from the two pillars, the Sea with the twelve bronze oxen beneath it, and the water carts was too great to be measured. These things had been made for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple in the days of King Solomon. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Each of the pillars was 27 feet tall and 18 feet in circumference.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:21a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '18 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[8.3 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tall and 12 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[5.5 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in circumference.
      marker-yv: yv-n
    - type: text
      text: ' They were hollow, with walls 3 inches thick.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:21b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '4 fingers thick '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[8 centimeters].'
      marker-yv: yv-n
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The bronze capital on top of each pillar was 7-1/2 feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.3 meters].'
      marker-yv: yv-n
    - type: text
      text: ' high and was decorated with a network of bronze pomegranates all the way around. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There were 96 pomegranates on the sides, and a total of 100 pomegranates on the network around the top.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nebuzaradan, the captain of the guard, took with him as prisoners Seraiah the high priest, Zephaniah the priest of the second rank, and the three chief gatekeepers. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And from among the people still hiding in the city, he took an officer who had been in charge of the Judean army; seven of the king’s personal advisers; the army commander’s chief secretary, who was in charge of recruitment; and sixty other citizens. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nebuzaradan, the captain of the guard, took them all to the king of Babylon at Riblah. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And there at Riblah, in the land of Hamath, the king of Babylon had them all put to death. So the people of Judah were sent into exile from their land.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The number of captives taken to Babylon in the seventh year of Nebuchadnezzar’s reign
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This exile in the seventh year of Nebuchadnezzar’s reign occurred in 597 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
      marker-yv: yv-n
    - type: text
      text: ' was 3,023. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then in Nebuchadnezzar’s eighteenth year
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This exile in the eighteenth year of Nebuchadnezzar’s reign occurred in 586 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
      marker-yv: yv-n
    - type: text
      text: ' he took 832 more. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'These things happened because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger against the people of Jerusalem and Judah, until he finally banished them from his presence and sent them into exile.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zedekiah rebelled against the king of Babylon. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In Nebuchadnezzar’s twenty-third year
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This exile in the twenty-third year of Nebuchadnezzar’s reign occurred in 581 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
      marker-yv: yv-n
    - type: text
      text: ' he sent Nebuzaradan, the captain of the guard, who took 745 more—a total of 4,600 captives in all.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hope for Israel’s Royal Line
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: In the thirty-seventh year of the exile of King Jehoiachin of Judah, Evil-merodach ascended to the Babylonian throne. He was kind to
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:31a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He raised the head of.
      marker-yv: yv-n
    - type: text
      text: ' Jehoiachin and released him from prison on March 31 of that year.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:31b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on the twenty-fifth day of the twelfth month, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'of the ancient Hebrew lunar calendar. This day was March 31, 561 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ; also see note on 52:4a.
      marker-yv: yv-n
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He spoke kindly to Jehoiachin and gave him a higher place than all the other exiled kings in Babylon. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He supplied Jehoiachin with new clothes to replace his prison garb and allowed him to dine in the king’s presence for the rest of his life. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So the Babylonian king gave him a regular food allowance as long as he lived. This continued until the day of his death.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So on January 15,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:4a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on the tenth day of the tenth month, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'of the ancient Hebrew lunar calendar. A number of events in Jeremiah can be cross-checked with dates in surviving Babylonian records and related accurately to our modern calendar. This day was January 15, 588 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
      marker-yv: yv-n
    - type: text
      text: ' during the ninth year of Zedekiah’s reign, King Nebuchadnezzar'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:4b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Nebuchadrezzar, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Nebuchadnezzar; also in 52:12, 28, 29, 30.
      marker-yv: yv-n
    - type: text
      text: ' of Babylon led his entire army against Jerusalem. They surrounded the city and built siege ramps against its walls. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jerusalem was kept under siege until the eleventh year of King Zedekiah’s reign.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: By July 18 in the eleventh year of Zedekiah’s reign,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'By the ninth day of the fourth month '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[in the eleventh year of Zedekiah’s reign]. This day was July 18, 586 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ; also see note on 52:4a.
      marker-yv: yv-n
    - type: text
      text: ' the famine in the city had become very severe, and the last of the food was entirely gone. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then a section of the city wall was broken down, and all the soldiers fled. Since the city was surrounded by the Babylonians,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:7a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Chaldeans; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly in 52:8, 17.
      marker-yv: yv-n
    - type: text
      text: ' they waited for nightfall. Then they slipped through the gate between the two walls behind the king’s garden and headed toward the Jordan Valley.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:7b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Arabah.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Babylonian troops chased King Zedekiah and overtook him on the plains of Jericho, for his men had all deserted him and scattered. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They captured the king and took him to the king of Babylon at Riblah in the land of Hamath. There the king of Babylon pronounced judgment upon Zedekiah. '
