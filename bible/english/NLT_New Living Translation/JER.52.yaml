document_id: JER.52,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Jerusalem
  - type: text
    content: 'Zedekiah was twenty-one years old when he became king, and he reigned in Jerusalem eleven years. His mother was Hamutal, the daughter of Jeremiah from Libnah. '
  '10':
  - type: text
    content: 'The king of Babylon made Zedekiah watch as he slaughtered his sons. He also slaughtered all the officials of Judah at Riblah. '
  '11':
  - type: text
    content: Then he gouged out Zedekiah’s eyes and bound him in bronze chains, and the king of Babylon led him away to Babylon. Zedekiah remained there in prison until the day of his death.
  - type: heading
    content: The Temple Destroyed
  '12':
  - type: text
    content: On August 17 of that year,
  - type: note
    content: Hebrew On the tenth day of the fifth month, of the ancient Hebrew lunar calendar. This day was August 17, 586 b.c.; also see note on 52:4a.
  - type: text
    content: ' which was the nineteenth year of King Nebuchadnezzar’s reign, Nebuzaradan, the captain of the guard and an official of the Babylonian king, arrived in Jerusalem. '
  '13':
  - type: text
    content: 'He burned down the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the royal palace, and all the houses of Jerusalem. He destroyed all the important buildings'
  - type: note
    content: Or destroyed the houses of all the important people.
  - type: text
    content: ' in the city. '
  '14':
  - type: text
    content: Then he supervised the entire Babylonian
  - type: note
    content: Or Chaldean.
  - type: text
    content: ' army as they tore down the walls of Jerusalem on every side. '
  '15':
  - type: text
    content: 'Then Nebuzaradan, the captain of the guard, took as exiles some of the poorest of the people, the rest of the people who remained in the city, the defectors who had declared their allegiance to the king of Babylon, and the rest of the craftsmen. '
  '16':
  - type: text
    content: But Nebuzaradan allowed some of the poorest people to stay behind to care for the vineyards and fields.
  '17':
  - type: text
    content: 'The Babylonians broke up the bronze pillars in front of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple, the bronze water carts, and the great bronze basin called the Sea, and they carried all the bronze away to Babylon. '
  '18':
  - type: text
    content: 'They also took all the ash buckets, shovels, lamp snuffers, basins, dishes, and all the other bronze articles used for making sacrifices at the Temple. '
  '19':
  - type: text
    content: The captain of the guard also took the small bowls, incense burners, basins, pots, lampstands, ladles, bowls used for liquid offerings, and all the other articles made of pure gold or silver.
  '2':
  - type: text
    content: 'But Zedekiah did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, just as Jehoiakim had done. '
  '20':
  - type: text
    content: 'The weight of the bronze from the two pillars, the Sea with the twelve bronze oxen beneath it, and the water carts was too great to be measured. These things had been made for the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple in the days of King Solomon. '
  '21':
  - type: text
    content: Each of the pillars was 27 feet tall and 18 feet in circumference.
  - type: note
    content: Hebrew 18 cubits [8.3 meters] tall and 12 cubits [5.5 meters] in circumference.
  - type: text
    content: ' They were hollow, with walls 3 inches thick.'
  - type: note
    content: Hebrew 4 fingers thick [8 centimeters].
  - type: text
    content: ' '
  '22':
  - type: text
    content: The bronze capital on top of each pillar was 7-1/2 feet
  - type: note
    content: Hebrew 5 cubits [2.3 meters].
  - type: text
    content: ' high and was decorated with a network of bronze pomegranates all the way around. '
  '23':
  - type: text
    content: There were 96 pomegranates on the sides, and a total of 100 pomegranates on the network around the top.
  '24':
  - type: text
    content: 'Nebuzaradan, the captain of the guard, took with him as prisoners Seraiah the high priest, Zephaniah the priest of the second rank, and the three chief gatekeepers. '
  '25':
  - type: text
    content: 'And from among the people still hiding in the city, he took an officer who had been in charge of the Judean army; seven of the king’s personal advisers; the army commander’s chief secretary, who was in charge of recruitment; and sixty other citizens. '
  '26':
  - type: text
    content: 'Nebuzaradan, the captain of the guard, took them all to the king of Babylon at Riblah. '
  '27':
  - type: text
    content: And there at Riblah, in the land of Hamath, the king of Babylon had them all put to death. So the people of Judah were sent into exile from their land.
  '28':
  - type: text
    content: The number of captives taken to Babylon in the seventh year of Nebuchadnezzar’s reign
  - type: note
    content: This exile in the seventh year of Nebuchadnezzar’s reign occurred in 597 b.c.
  - type: text
    content: ' was 3,023. '
  '29':
  - type: text
    content: Then in Nebuchadnezzar’s eighteenth year
  - type: note
    content: This exile in the eighteenth year of Nebuchadnezzar’s reign occurred in 586 b.c.
  - type: text
    content: ' he took 832 more. '
  '3':
  - type: text
    content: 'These things happened because of the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger against the people of Jerusalem and Judah, until he finally banished them from his presence and sent them into exile.
  - type: text
    content: 'Zedekiah rebelled against the king of Babylon. '
  '30':
  - type: text
    content: In Nebuchadnezzar’s twenty-third year
  - type: note
    content: This exile in the twenty-third year of Nebuchadnezzar’s reign occurred in 581 b.c.
  - type: text
    content: ' he sent Nebuzaradan, the captain of the guard, who took 745 more—a total of 4,600 captives in all.'
  - type: heading
    content: Hope for Israel’s Royal Line
  '31':
  - type: text
    content: In the thirty-seventh year of the exile of King Jehoiachin of Judah, Evil-merodach ascended to the Babylonian throne. He was kind to
  - type: note
    content: Hebrew He raised the head of.
  - type: text
    content: ' Jehoiachin and released him from prison on March 31 of that year.'
  - type: note
    content: Hebrew on the twenty-fifth day of the twelfth month, of the ancient Hebrew lunar calendar. This day was March 31, 561 b.c.; also see note on 52:4a.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'He spoke kindly to Jehoiachin and gave him a higher place than all the other exiled kings in Babylon. '
  '33':
  - type: text
    content: 'He supplied Jehoiachin with new clothes to replace his prison garb and allowed him to dine in the king’s presence for the rest of his life. '
  '34':
  - type: text
    content: So the Babylonian king gave him a regular food allowance as long as he lived. This continued until the day of his death.
  '4':
  - type: text
    content: So on January 15,
  - type: note
    content: Hebrew on the tenth day of the tenth month, of the ancient Hebrew lunar calendar. A number of events in Jeremiah can be cross-checked with dates in surviving Babylonian records and related accurately to our modern calendar. This day was January 15, 588 b.c.
  - type: text
    content: ' during the ninth year of Zedekiah’s reign, King Nebuchadnezzar'
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar; also in 52:12, 28, 29, 30.
  - type: text
    content: ' of Babylon led his entire army against Jerusalem. They surrounded the city and built siege ramps against its walls. '
  '5':
  - type: text
    content: Jerusalem was kept under siege until the eleventh year of King Zedekiah’s reign.
  '6':
  - type: text
    content: By July 18 in the eleventh year of Zedekiah’s reign,
  - type: note
    content: Hebrew By the ninth day of the fourth month [in the eleventh year of Zedekiah’s reign]. This day was July 18, 586 b.c.; also see note on 52:4a.
  - type: text
    content: ' the famine in the city had become very severe, and the last of the food was entirely gone. '
  '7':
  - type: text
    content: Then a section of the city wall was broken down, and all the soldiers fled. Since the city was surrounded by the Babylonians,
  - type: note
    content: Or the Chaldeans; similarly in 52:8, 17.
  - type: text
    content: ' they waited for nightfall. Then they slipped through the gate between the two walls behind the king’s garden and headed toward the Jordan Valley.'
  - type: note
    content: Hebrew the Arabah.
  '8':
  - type: text
    content: 'But the Babylonian troops chased King Zedekiah and overtook him on the plains of Jericho, for his men had all deserted him and scattered. '
  '9':
  - type: text
    content: 'They captured the king and took him to the king of Babylon at Riblah in the land of Hamath. There the king of Babylon pronounced judgment upon Zedekiah. '
