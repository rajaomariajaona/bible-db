document_id: 2KI.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Hoshea Rules in Israel
  - type: text
    content: 'Hoshea son of Elah began to rule over Israel in the twelfth year of King Ahaz’s reign in Judah. He reigned in Samaria nine years. '
  '10':
  - type: text
    content: 'They set up sacred pillars and Asherah poles at the top of every hill and under every green tree. '
  '11':
  - type: text
    content: 'They offered sacrifices on all the hilltops, just like the nations the '
  - type: text
    content: Lord
  - type: text
    content: ' had driven from the land ahead of them. So the people of Israel had done many evil things, arousing the '
  - type: text
    content: Lord
  - type: text
    content: '’s anger. '
  '12':
  - type: text
    content: Yes, they worshiped idols,
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung.
  - type: text
    content: ' despite the '
  - type: text
    content: Lord
  - type: text
    content: ’s specific and repeated warnings.
  '13':
  - type: text
    content: 'Again and again the '
  - type: text
    content: Lord
  - type: text
    content: ' had sent his prophets and seers to warn both Israel and Judah: “Turn from all your evil ways. Obey my commands and decrees—the entire law that I commanded your ancestors to obey, and that I gave you through my servants the prophets.”'
  '14':
  - type: text
    content: 'But the Israelites would not listen. They were as stubborn as their ancestors who had refused to believe in the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. '
  '15':
  - type: text
    content: 'They rejected his decrees and the covenant he had made with their ancestors, and they despised all his warnings. They worshiped worthless idols, so they became worthless themselves. They followed the example of the nations around them, disobeying the '
  - type: text
    content: Lord
  - type: text
    content: ’s command not to imitate them.
  '16':
  - type: text
    content: 'They rejected all the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' their God and made two calves from metal. They set up an Asherah pole and worshiped Baal and all the forces of heaven. '
  '17':
  - type: text
    content: They even sacrificed their own sons and daughters in the fire.
  - type: note
    content: Or They even made their sons and daughters pass through the fire.
  - type: text
    content: ' They consulted fortune-tellers and practiced sorcery and sold themselves to evil, arousing the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger.
  '18':
  - type: text
    content: 'Because the '
  - type: text
    content: Lord
  - type: text
    content: ' was very angry with Israel, he swept them away from his presence. Only the tribe of Judah remained in the land. '
  '19':
  - type: text
    content: 'But even the people of Judah refused to obey the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, for they followed the evil practices that Israel had introduced. '
  '2':
  - type: text
    content: 'He did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight, but not to the same extent as the kings of Israel who ruled before him.
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' rejected all the descendants of Israel. He punished them by handing them over to their attackers until he had banished Israel from his presence.'
  '21':
  - type: text
    content: 'For when the '
  - type: text
    content: Lord
  - type: note
    content: Hebrew he; compare 1 Kgs 11:31-32.
  - type: text
    content: ' tore Israel away from the kingdom of David, they chose Jeroboam son of Nebat as their king. But Jeroboam drew Israel away from following the '
  - type: text
    content: Lord
  - type: text
    content: ' and made them commit a great sin. '
  '22':
  - type: text
    content: 'And the people of Israel persisted in all the evil ways of Jeroboam. They did not turn from these sins '
  '23':
  - type: text
    content: 'until the '
  - type: text
    content: Lord
  - type: text
    content: ' finally swept them away from his presence, just as all his prophets had warned. So Israel was exiled from their land to Assyria, where they remain to this day.'
  - type: heading
    content: Foreigners Settle in Israel
  '24':
  - type: text
    content: 'The king of Assyria transported groups of people from Babylon, Cuthah, Avva, Hamath, and Sepharvaim and resettled them in the towns of Samaria, replacing the people of Israel. They took possession of Samaria and lived in its towns. '
  '25':
  - type: text
    content: 'But since these foreign settlers did not worship the '
  - type: text
    content: Lord
  - type: text
    content: ' when they first arrived, the '
  - type: text
    content: Lord
  - type: text
    content: ' sent lions among them, which killed some of them.'
  '26':
  - type: text
    content: 'So a message was sent to the king of Assyria: “The people you have sent to live in the towns of Samaria do not know the religious customs of the God of the land. He has sent lions among them to destroy them because they have not worshiped him correctly.”'
  '27':
  - type: text
    content: 'The king of Assyria then commanded, “Send one of the exiled priests back to Samaria. Let him live there and teach the new residents the religious customs of the God of the land.” '
  '28':
  - type: text
    content: 'So one of the priests who had been exiled from Samaria returned to Bethel and taught the new residents how to worship the '
  - type: text
    content: Lord
  - type: text
    content: .
  '29':
  - type: text
    content: 'But these various groups of foreigners also continued to worship their own gods. In town after town where they lived, they placed their idols at the pagan shrines that the people of Samaria had built. '
  '3':
  - type: text
    content: 'King Shalmaneser of Assyria attacked King Hoshea, so Hoshea was forced to pay heavy tribute to Assyria. '
  '30':
  - type: text
    content: 'Those from Babylon worshiped idols of their god Succoth-benoth. Those from Cuthah worshiped their god Nergal. And those from Hamath worshiped Ashima. '
  '31':
  - type: text
    content: The Avvites worshiped their gods Nibhaz and Tartak. And the people from Sepharvaim even burned their own children as sacrifices to their gods Adrammelech and Anammelech.
  '32':
  - type: text
    content: 'These new residents worshiped the '
  - type: text
    content: Lord
  - type: text
    content: ', but they also appointed from among themselves all sorts of people as priests to offer sacrifices at their places of worship. '
  '33':
  - type: text
    content: 'And though they worshiped the '
  - type: text
    content: Lord
  - type: text
    content: ', they continued to follow their own gods according to the religious customs of the nations from which they came. '
  '34':
  - type: text
    content: 'And this is still going on today. They continue to follow their former practices instead of truly worshiping the '
  - type: text
    content: Lord
  - type: text
    content: ' and obeying the decrees, regulations, instructions, and commands he gave the descendants of Jacob, whose name he changed to Israel.'
  '35':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' had made a covenant with the descendants of Jacob and commanded them: “Do not worship any other gods or bow before them or serve them or offer sacrifices to them. '
  '36':
  - type: text
    content: 'But worship only the '
  - type: text
    content: Lord
  - type: text
    content: ', who brought you out of Egypt with great strength and a powerful arm. Bow down to him alone, and offer sacrifices only to him. '
  '37':
  - type: text
    content: 'Be careful at all times to obey the decrees, regulations, instructions, and commands that he wrote for you. You must not worship other gods. '
  '38':
  - type: text
    content: 'Do not forget the covenant I made with you, and do not worship other gods. '
  '39':
  - type: text
    content: 'You must worship only the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. He is the one who will rescue you from all your enemies.”'
  '4':
  - type: text
    content: But Hoshea stopped paying the annual tribute and conspired against the king of Assyria by asking King So of Egypt
  - type: note
    content: Or by asking the king of Egypt at Sais.
  - type: text
    content: ' to help him shake free of Assyria’s power. When the king of Assyria discovered this treachery, he seized Hoshea and put him in prison.'
  - type: heading
    content: Samaria Falls to Assyria
  '40':
  - type: text
    content: 'But the people would not listen and continued to follow their former practices. '
  '41':
  - type: text
    content: 'So while these new residents worshiped the '
  - type: text
    content: Lord
  - type: text
    content: ', they also worshiped their idols. And to this day their descendants do the same.'
  '5':
  - type: text
    content: 'Then the king of Assyria invaded the entire land, and for three years he besieged the city of Samaria. '
  '6':
  - type: text
    content: Finally, in the ninth year of King Hoshea’s reign, Samaria fell, and the people of Israel were exiled to Assyria. They were settled in colonies in Halah, along the banks of the Habor River in Gozan, and in the cities of the Medes.
  '7':
  - type: text
    content: 'This disaster came upon the people of Israel because they worshiped other gods. They sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, who had brought them safely out of Egypt and had rescued them from the power of Pharaoh, the king of Egypt. '
  '8':
  - type: text
    content: 'They had followed the practices of the pagan nations the '
  - type: text
    content: Lord
  - type: text
    content: ' had driven from the land ahead of them, as well as the practices the kings of Israel had introduced. '
  '9':
  - type: text
    content: 'The people of Israel had also secretly done many things that were not pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. They built pagan shrines for themselves in all their towns, from the smallest outpost to the largest walled city. '
