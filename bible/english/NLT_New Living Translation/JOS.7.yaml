document_id: JOS.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Ai Defeats the Israelites
  - type: text
    content: 'But Israel violated the instructions about the things set apart for the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering; similarly in 7:11, 12, 13, 15.
  - type: text
    content: ' A man named Achan had stolen some of these dedicated things, so the '
  - type: text
    content: Lord
  - type: text
    content: ' was very angry with the Israelites. Achan was the son of Carmi, a descendant of Zimri'
  - type: note
    content: As in parallel text at 1 Chr 2:6; Hebrew reads Zabdi. Also in 7:17, 18.
  - type: text
    content: ' son of Zerah, of the tribe of Judah.'
  '10':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “Get up! Why are you lying on your face like this? '
  '11':
  - type: text
    content: 'Israel has sinned and broken my covenant! They have stolen some of the things that I commanded must be set apart for me. And they have not only stolen them but have lied about it and hidden the things among their own belongings. '
  '12':
  - type: text
    content: That is why the Israelites are running from their enemies in defeat. For now Israel itself has been set apart for destruction. I will not remain with you any longer unless you destroy the things among you that were set apart for destruction.
  '13':
  - type: text
    content: '“Get up! Command the people to purify themselves in preparation for tomorrow. For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: Hidden among you, O Israel, are things set apart for the '
  - type: text
    content: Lord
  - type: text
    content: . You will never defeat your enemies until you remove these things from among you.
  '14':
  - type: text
    content: '“In the morning you must present yourselves by tribes, and the '
  - type: text
    content: Lord
  - type: text
    content: ' will point out the tribe to which the guilty man belongs. That tribe must come forward with its clans, and the '
  - type: text
    content: Lord
  - type: text
    content: ' will point out the guilty clan. That clan will then come forward, and the '
  - type: text
    content: Lord
  - type: text
    content: ' will point out the guilty family. Finally, each member of the guilty family must come forward one by one. '
  '15':
  - type: text
    content: 'The one who has stolen what was set apart for destruction will himself be burned with fire, along with everything he has, for he has broken the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' and has done a horrible thing in Israel.”'
  - type: heading
    content: Achan’s Sin
  '16':
  - type: text
    content: 'Early the next morning Joshua brought the tribes of Israel before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the tribe of Judah was singled out. '
  '17':
  - type: text
    content: 'Then the clans of Judah came forward, and the clan of Zerah was singled out. Then the families of Zerah came forward, and the family of Zimri was singled out. '
  '18':
  - type: text
    content: Every member of Zimri’s family was brought forward person by person, and Achan was singled out.
  '19':
  - type: text
    content: 'Then Joshua said to Achan, “My son, give glory to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, by telling the truth. Make your confession and tell me what you have done. Don’t hide it from me.”'
  '2':
  - type: text
    content: 'Joshua sent some of his men from Jericho to spy out the town of Ai, east of Bethel, near Beth-aven. '
  '20':
  - type: text
    content: 'Achan replied, “It is true! I have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '21':
  - type: text
    content: Among the plunder I saw a beautiful robe from Babylon,
  - type: note
    content: Hebrew Shinar.
  - type: text
    content: ' 200 silver coins,'
  - type: note
    content: Hebrew 200 shekels of silver, about 5 pounds or 2.3 kilograms in weight.
  - type: text
    content: ' and a bar of gold weighing more than a pound.'
  - type: note
    content: Hebrew 50 shekels, about 20 ounces or 570 grams in weight.
  - type: text
    content: ' I wanted them so much that I took them. They are hidden in the ground beneath my tent, with the silver buried deeper than the rest.”'
  '22':
  - type: text
    content: 'So Joshua sent some men to make a search. They ran to the tent and found the stolen goods hidden there, just as Achan had said, with the silver buried beneath the rest. '
  '23':
  - type: text
    content: 'They took the things from the tent and brought them to Joshua and all the Israelites. Then they laid them on the ground in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '24':
  - type: text
    content: 'Then Joshua and all the Israelites took Achan, the silver, the robe, the bar of gold, his sons, daughters, cattle, donkeys, sheep, goats, tent, and everything he had, and they brought them to the valley of Achor. '
  '25':
  - type: text
    content: 'Then Joshua said to Achan, “Why have you brought trouble on us? The '
  - type: text
    content: Lord
  - type: text
    content: ' will now bring trouble on you.” And all the Israelites stoned Achan and his family and burned their bodies. '
  '26':
  - type: text
    content: They piled a great heap of stones over Achan, which remains to this day. That is why the place has been called the Valley of Trouble
  - type: note
    content: Hebrew valley of Achor.
  - type: text
    content: ' ever since. So the '
  - type: text
    content: Lord
  - type: text
    content: ' was no longer angry.'
  '3':
  - type: text
    content: When they returned, they told Joshua, “There’s no need for all of us to go up there; it won’t take more than two or three thousand men to attack Ai. Since there are so few of them, don’t make all our people struggle to go up there.”
  '4':
  - type: text
    content: 'So approximately 3,000 warriors were sent, but they were soundly defeated. The men of Ai '
  '5':
  - type: text
    content: chased the Israelites from the town gate as far as the quarries,
  - type: note
    content: Or as far as Shebarim.
  - type: text
    content: ' and they killed about thirty-six who were retreating down the slope. The Israelites were paralyzed with fear at this turn of events, and their courage melted away.'
  '6':
  - type: text
    content: 'Joshua and the elders of Israel tore their clothing in dismay, threw dust on their heads, and bowed face down to the ground before the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' until evening. '
  '7':
  - type: text
    content: 'Then Joshua cried out, “Oh, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', why did you bring us across the Jordan River if you are going to let the Amorites kill us? If only we had been content to stay on the other side! '
  '8':
  - type: text
    content: 'Lord, what can I say now that Israel has fled from its enemies? '
  '9':
  - type: text
    content: For when the Canaanites and all the other people living in the land hear about it, they will surround us and wipe our name off the face of the earth. And then what will happen to the honor of your great name?”
