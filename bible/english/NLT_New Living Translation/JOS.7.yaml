document_id: JOS.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ai Defeats the Israelites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But Israel violated the instructions about the things set apart for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering; similarly in 7:11, 12, 13, 15.'
    marker-yv: yv-n
  - type: text
    text: ' A man named Achan had stolen some of these dedicated things, so the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was very angry with the Israelites. Achan was the son of Carmi, a descendant of Zimri'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 1 Chr 2:6; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Zabdi. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Also in 7:17, 18.
    marker-yv: yv-n
  - type: text
    text: ' son of Zerah, of the tribe of Judah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Joshua sent some of his men from Jericho to spy out the town of Ai, east of Bethel, near Beth-aven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When they returned, they told Joshua, “There’s no need for all of us to go up there; it won’t take more than two or three thousand men to attack Ai. Since there are so few of them, don’t make all our people struggle to go up there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So approximately 3,000 warriors were sent, but they were soundly defeated. The men of Ai '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: chased the Israelites from the town gate as far as the quarries,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: as far as Shebarim.
    marker-yv: yv-n
  - type: text
    text: ' and they killed about thirty-six who were retreating down the slope. The Israelites were paralyzed with fear at this turn of events, and their courage melted away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Joshua and the elders of Israel tore their clothing in dismay, threw dust on their heads, and bowed face down to the ground before the Ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' until evening. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then Joshua cried out, “Oh, Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', why did you bring us across the Jordan River if you are going to let the Amorites kill us? If only we had been content to stay on the other side! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lord, what can I say now that Israel has fled from its enemies? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For when the Canaanites and all the other people living in the land hear about it, they will surround us and wipe our name off the face of the earth. And then what will happen to the honor of your great name?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Joshua, “Get up! Why are you lying on your face like this? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Israel has sinned and broken my covenant! They have stolen some of the things that I commanded must be set apart for me. And they have not only stolen them but have lied about it and hidden the things among their own belongings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: That is why the Israelites are running from their enemies in defeat. For now Israel itself has been set apart for destruction. I will not remain with you any longer unless you destroy the things among you that were set apart for destruction.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“Get up! Command the people to purify themselves in preparation for tomorrow. For this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, says: Hidden among you, O Israel, are things set apart for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . You will never defeat your enemies until you remove these things from among you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“In the morning you must present yourselves by tribes, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will point out the tribe to which the guilty man belongs. That tribe must come forward with its clans, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will point out the guilty clan. That clan will then come forward, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will point out the guilty family. Finally, each member of the guilty family must come forward one by one. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The one who has stolen what was set apart for destruction will himself be burned with fire, along with everything he has, for he has broken the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and has done a horrible thing in Israel.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Achan’s Sin
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Early the next morning Joshua brought the tribes of Israel before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and the tribe of Judah was singled out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the clans of Judah came forward, and the clan of Zerah was singled out. Then the families of Zerah came forward, and the family of Zimri was singled out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Every member of Zimri’s family was brought forward person by person, and Achan was singled out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Joshua said to Achan, “My son, give glory to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, by telling the truth. Make your confession and tell me what you have done. Don’t hide it from me.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Achan replied, “It is true! I have sinned against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Among the plunder I saw a beautiful robe from Babylon,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:21a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shinar.
    marker-yv: yv-n
  - type: text
    text: ' 200 silver coins,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:21b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '200 shekels of silver, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 5 pounds or 2.3 kilograms in weight.
    marker-yv: yv-n
  - type: text
    text: ' and a bar of gold weighing more than a pound.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:21c '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '50 shekels, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 20 ounces or 570 grams in weight.
    marker-yv: yv-n
  - type: text
    text: ' I wanted them so much that I took them. They are hidden in the ground beneath my tent, with the silver buried deeper than the rest.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So Joshua sent some men to make a search. They ran to the tent and found the stolen goods hidden there, just as Achan had said, with the silver buried beneath the rest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'They took the things from the tent and brought them to Joshua and all the Israelites. Then they laid them on the ground in the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then Joshua and all the Israelites took Achan, the silver, the robe, the bar of gold, his sons, daughters, cattle, donkeys, sheep, goats, tent, and everything he had, and they brought them to the valley of Achor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Joshua said to Achan, “Why have you brought trouble on us? The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will now bring trouble on you.” And all the Israelites stoned Achan and his family and burned their bodies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: They piled a great heap of stones over Achan, which remains to this day. That is why the place has been called the Valley of Trouble
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: valley of Achor.
    marker-yv: yv-n
  - type: text
    text: ' ever since. So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was no longer angry.'
