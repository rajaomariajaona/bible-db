document_id: ACT.14,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul and Barnabas in Iconium
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The same thing happened in Iconium.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:1 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Iconium, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'as well as '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Lystra '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'and '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Derbe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (14:6), were towns in what is now Turkey.
      marker-yv: yv-n
    - type: text
      text: ' Paul and Barnabas went to the Jewish synagogue and preached with such power that a great number of both Jews and Greeks became believers. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: So Paul called to him in a loud voice, “Stand up!” And the man jumped to his feet and started walking.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'When the crowd saw what Paul had done, they shouted in their local dialect, “These men are gods in human form!” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'They decided that Barnabas was the Greek god Zeus and that Paul was Hermes, since he was the chief speaker. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Now the temple of Zeus was located just outside the town. So the priest of the temple and the crowd brought bulls and wreaths of flowers to the town gates, and they prepared to offer sacrifices to the apostles.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But when the apostles Barnabas and Paul heard what was happening, they tore their clothing in dismay and ran out among the people, shouting, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “Friends,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Men.
      marker-yv: yv-n
    - type: text
      text: ' why are you doing this? We are merely human beings—just like you! We have come to bring you the Good News that you should turn from these worthless things and turn to the living God, who made heaven and earth, the sea, and everything in them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'In the past he permitted all the nations to go their own ways, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'but he never left them without evidence of himself and his goodness. For instance, he sends you rain and good crops and gives you food and joyful hearts.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But even with these words, Paul and Barnabas could scarcely restrain the people from sacrificing to them.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then some Jews arrived from Antioch and Iconium and won the crowds to their side. They stoned Paul and dragged him out of town, thinking he was dead. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Some of the Jews, however, spurned God’s message and poisoned the minds of the Gentiles against Paul and Barnabas. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: But as the believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'disciples; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 14:22, 28.
      marker-yv: yv-n
    - type: text
      text: ' gathered around him, he got up and went back into the town. The next day he left with Barnabas for Derbe.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul and Barnabas Return to Antioch of Syria
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'After preaching the Good News in Derbe and making many disciples, Paul and Barnabas returned to Lystra, Iconium, and Antioch of Pisidia, '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'where they strengthened the believers. They encouraged them to continue in the faith, reminding them that we must suffer many hardships to enter the Kingdom of God. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Paul and Barnabas also appointed elders in every church. With prayer and fasting, they turned the elders over to the care of the Lord, in whom they had put their trust. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then they traveled back through Pisidia to Pamphylia. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: They preached the word in Perga, then went down to Attalia.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Finally, they returned by ship to Antioch of Syria, where their journey had begun. The believers there had entrusted them to the grace of God to do the work they had now completed. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Upon arriving in Antioch, they called the church together and reported everything God had done through them and how he had opened the door of faith to the Gentiles, too. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: And they stayed there with the believers for a long time.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But the apostles stayed there a long time, preaching boldly about the grace of the Lord. And the Lord proved their message was true by giving them power to do miraculous signs and wonders. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But the people of the town were divided in their opinion about them. Some sided with the Jews, and some with the apostles.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then a mob of Gentiles and Jews, along with their leaders, decided to attack and stone them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'When the apostles learned of it, they fled to the region of Lycaonia—to the towns of Lystra and Derbe and the surrounding area. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And there they preached the Good News.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul and Barnabas in Lystra and Derbe
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'While they were at Lystra, Paul and Barnabas came upon a man with crippled feet. He had been that way from birth, so he had never walked. He was sitting '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'and listening as Paul preached. Looking straight at him, Paul realized he had faith to be healed. '
