document_id: ACT.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul and Barnabas in Iconium
  - type: text
    content: The same thing happened in Iconium.
  - type: note
    content: Iconium, as well as Lystra and Derbe (14:6), were towns in what is now Turkey.
  - type: text
    content: ' Paul and Barnabas went to the Jewish synagogue and preached with such power that a great number of both Jews and Greeks became believers. '
  '10':
  - type: text
    content: So Paul called to him in a loud voice, “Stand up!” And the man jumped to his feet and started walking.
  '11':
  - type: text
    content: 'When the crowd saw what Paul had done, they shouted in their local dialect, “These men are gods in human form!” '
  '12':
  - type: text
    content: 'They decided that Barnabas was the Greek god Zeus and that Paul was Hermes, since he was the chief speaker. '
  '13':
  - type: text
    content: Now the temple of Zeus was located just outside the town. So the priest of the temple and the crowd brought bulls and wreaths of flowers to the town gates, and they prepared to offer sacrifices to the apostles.
  '14':
  - type: text
    content: 'But when the apostles Barnabas and Paul heard what was happening, they tore their clothing in dismay and ran out among the people, shouting, '
  '15':
  - type: text
    content: “Friends,
  - type: note
    content: Greek Men.
  - type: text
    content: ' why are you doing this? We are merely human beings—just like you! We have come to bring you the Good News that you should turn from these worthless things and turn to the living God, who made heaven and earth, the sea, and everything in them. '
  '16':
  - type: text
    content: 'In the past he permitted all the nations to go their own ways, '
  '17':
  - type: text
    content: 'but he never left them without evidence of himself and his goodness. For instance, he sends you rain and good crops and gives you food and joyful hearts.” '
  '18':
  - type: text
    content: But even with these words, Paul and Barnabas could scarcely restrain the people from sacrificing to them.
  '19':
  - type: text
    content: 'Then some Jews arrived from Antioch and Iconium and won the crowds to their side. They stoned Paul and dragged him out of town, thinking he was dead. '
  '2':
  - type: text
    content: 'Some of the Jews, however, spurned God’s message and poisoned the minds of the Gentiles against Paul and Barnabas. '
  '20':
  - type: text
    content: But as the believers
  - type: note
    content: Greek disciples; also in 14:22, 28.
  - type: text
    content: ' gathered around him, he got up and went back into the town. The next day he left with Barnabas for Derbe.'
  - type: heading
    content: Paul and Barnabas Return to Antioch of Syria
  '21':
  - type: text
    content: 'After preaching the Good News in Derbe and making many disciples, Paul and Barnabas returned to Lystra, Iconium, and Antioch of Pisidia, '
  '22':
  - type: text
    content: 'where they strengthened the believers. They encouraged them to continue in the faith, reminding them that we must suffer many hardships to enter the Kingdom of God. '
  '23':
  - type: text
    content: 'Paul and Barnabas also appointed elders in every church. With prayer and fasting, they turned the elders over to the care of the Lord, in whom they had put their trust. '
  '24':
  - type: text
    content: 'Then they traveled back through Pisidia to Pamphylia. '
  '25':
  - type: text
    content: They preached the word in Perga, then went down to Attalia.
  '26':
  - type: text
    content: 'Finally, they returned by ship to Antioch of Syria, where their journey had begun. The believers there had entrusted them to the grace of God to do the work they had now completed. '
  '27':
  - type: text
    content: 'Upon arriving in Antioch, they called the church together and reported everything God had done through them and how he had opened the door of faith to the Gentiles, too. '
  '28':
  - type: text
    content: And they stayed there with the believers for a long time.
  '3':
  - type: text
    content: 'But the apostles stayed there a long time, preaching boldly about the grace of the Lord. And the Lord proved their message was true by giving them power to do miraculous signs and wonders. '
  '4':
  - type: text
    content: But the people of the town were divided in their opinion about them. Some sided with the Jews, and some with the apostles.
  '5':
  - type: text
    content: 'Then a mob of Gentiles and Jews, along with their leaders, decided to attack and stone them. '
  '6':
  - type: text
    content: 'When the apostles learned of it, they fled to the region of Lycaonia—to the towns of Lystra and Derbe and the surrounding area. '
  '7':
  - type: text
    content: And there they preached the Good News.
  - type: heading
    content: Paul and Barnabas in Lystra and Derbe
  '8':
  - type: text
    content: 'While they were at Lystra, Paul and Barnabas came upon a man with crippled feet. He had been that way from birth, so he had never walked. He was sitting '
  '9':
  - type: text
    content: 'and listening as Paul preached. Looking straight at him, Paul realized he had faith to be healed. '
