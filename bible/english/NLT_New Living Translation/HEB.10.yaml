document_id: HEB.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Christ’s Sacrifice Once for All
  - type: text
    content: 'The old system under the law of Moses was only a shadow, a dim preview of the good things to come, not the good things themselves. The sacrifices under that system were repeated again and again, year after year, but they were never able to provide perfect cleansing for those who came to worship. '
  '10':
  - type: text
    content: For God’s will was for us to be made holy by the sacrifice of the body of Jesus Christ, once for all time.
  '11':
  - type: text
    content: 'Under the old covenant, the priest stands and ministers before the altar day after day, offering the same sacrifices again and again, which can never take away sins. '
  '12':
  - type: text
    content: 'But our High Priest offered himself to God as a single sacrifice for sins, good for all time. Then he sat down in the place of honor at God’s right hand. '
  '13':
  - type: text
    content: 'There he waits until his enemies are humbled and made a footstool under his feet. '
  '14':
  - type: text
    content: For by that one offering he forever made perfect those who are being made holy.
  '15':
  - type: text
    content: And the Holy Spirit also testifies that this is so. For he says,
  '16':
  - type: text
    content: “This is the new covenant I will make
  - type: text
    content: with my people on that day,
  - type: note
    content: Greek after those days.
  - type: text
    content: ' says the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: I will put my laws in their hearts,
  - type: text
    content: and I will write them on their minds.”
  - type: note
    content: Jer 31:33a.
  '17':
  - type: text
    content: Then he says,
  - type: text
    content: “I will never again remember
  - type: text
    content: their sins and lawless deeds.”
  - type: note
    content: Jer 31:34b.
  '18':
  - type: text
    content: And when sins have been forgiven, there is no need to offer any more sacrifices.
  - type: heading
    content: A Call to Persevere
  '19':
  - type: text
    content: And so, dear brothers and sisters,
  - type: note
    content: Greek brothers.
  - type: text
    content: ' we can boldly enter heaven’s Most Holy Place because of the blood of Jesus. '
  '2':
  - type: text
    content: If they could have provided perfect cleansing, the sacrifices would have stopped, for the worshipers would have been purified once for all time, and their feelings of guilt would have disappeared.
  '20':
  - type: text
    content: By his death,
  - type: note
    content: Greek Through his flesh.
  - type: text
    content: ' Jesus opened a new and life-giving way through the curtain into the Most Holy Place. '
  '21':
  - type: text
    content: 'And since we have a great High Priest who rules over God’s house, '
  '22':
  - type: text
    content: let us go right into the presence of God with sincere hearts fully trusting him. For our guilty consciences have been sprinkled with Christ’s blood to make us clean, and our bodies have been washed with pure water.
  '23':
  - type: text
    content: 'Let us hold tightly without wavering to the hope we affirm, for God can be trusted to keep his promise. '
  '24':
  - type: text
    content: 'Let us think of ways to motivate one another to acts of love and good works. '
  '25':
  - type: text
    content: And let us not neglect our meeting together, as some people do, but encourage one another, especially now that the day of his return is drawing near.
  '26':
  - type: text
    content: 'Dear friends, if we deliberately continue sinning after we have received knowledge of the truth, there is no longer any sacrifice that will cover these sins. '
  '27':
  - type: text
    content: 'There is only the terrible expectation of God’s judgment and the raging fire that will consume his enemies. '
  '28':
  - type: text
    content: 'For anyone who refused to obey the law of Moses was put to death without mercy on the testimony of two or three witnesses. '
  '29':
  - type: text
    content: 'Just think how much worse the punishment will be for those who have trampled on the Son of God, and have treated the blood of the covenant, which made us holy, as if it were common and unholy, and have insulted and disdained the Holy Spirit who brings God’s mercy to us. '
  '3':
  - type: text
    content: 'But instead, those sacrifices actually reminded them of their sins year after year. '
  '30':
  - type: text
    content: For we know the one who said,
  - type: text
    content: “I will take revenge.
  - type: text
    content: I will pay them back.”
  - type: note
    content: Deut 32:35.
  - type: text
    content: He also said,
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will judge his own people.”'
  - type: note
    content: Deut 32:36.
  '31':
  - type: text
    content: It is a terrible thing to fall into the hands of the living God.
  '32':
  - type: text
    content: Think back on those early days when you first learned about Christ.
  - type: note
    content: Greek when you were first enlightened.
  - type: text
    content: ' Remember how you remained faithful even though it meant terrible suffering. '
  '33':
  - type: text
    content: 'Sometimes you were exposed to public ridicule and were beaten, and sometimes you helped others who were suffering the same things. '
  '34':
  - type: text
    content: You suffered along with those who were thrown into jail, and when all you owned was taken from you, you accepted it with joy. You knew there were better things waiting for you that will last forever.
  '35':
  - type: text
    content: 'So do not throw away this confident trust in the Lord. Remember the great reward it brings you! '
  '36':
  - type: text
    content: Patient endurance is what you need now, so that you will continue to do God’s will. Then you will receive all that he has promised.
  '37':
  - type: text
    content: “For in just a little while,
  - type: text
    content: the Coming One will come and not delay.
  '38':
  - type: text
    content: And my righteous ones will live by faith.
  - type: note
    content: Or my righteous ones will live by their faithfulness; Greek reads my righteous one will live by faith.
  - type: text
    content: But I will take no pleasure in anyone who turns away.”
  - type: note
    content: Hab 2:3-4.
  '39':
  - type: text
    content: But we are not like those who turn away from God to their own destruction. We are the faithful ones, whose souls will be saved.
  '4':
  - type: text
    content: 'For it is not possible for the blood of bulls and goats to take away sins. '
  '5':
  - type: text
    content: That is why, when Christ
  - type: note
    content: Greek he; also in 10:8.
  - type: text
    content: ' came into the world, he said to God,'
  - type: text
    content: “You did not want animal sacrifices or sin offerings.
  - type: text
    content: But you have given me a body to offer.
  '6':
  - type: text
    content: You were not pleased with burnt offerings
  - type: text
    content: or other offerings for sin.
  '7':
  - type: text
    content: Then I said, ‘Look, I have come to do your will, O God—
  - type: text
    content: as is written about me in the Scriptures.’”
  - type: note
    content: Ps 40:6-8 (Greek version).
  '8':
  - type: text
    content: 'First, Christ said, “You did not want animal sacrifices or sin offerings or burnt offerings or other offerings for sin, nor were you pleased with them” (though they are required by the law of Moses). '
  '9':
  - type: text
    content: 'Then he said, “Look, I have come to do your will.” He cancels the first covenant in order to put the second into effect. '
