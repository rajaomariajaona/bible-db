document_id: HEB.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Christ’s Sacrifice Once for All
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The old system under the law of Moses was only a shadow, a dim preview of the good things to come, not the good things themselves. The sacrifices under that system were repeated again and again, year after year, but they were never able to provide perfect cleansing for those who came to worship. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: If they could have provided perfect cleansing, the sacrifices would have stopped, for the worshipers would have been purified once for all time, and their feelings of guilt would have disappeared.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But instead, those sacrifices actually reminded them of their sins year after year. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For it is not possible for the blood of bulls and goats to take away sins. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: That is why, when Christ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'he; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 10:8.
    marker-yv: yv-n
  - type: text
    text: ' came into the world, he said to God,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You did not want animal sacrifices or sin offerings.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But you have given me a body to offer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You were not pleased with burnt offerings
- type: usfm
  marker: q2
  children:
  - type: text
    text: or other offerings for sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then I said, ‘Look, I have come to do your will, O God—
- type: usfm
  marker: q2
  children:
  - type: text
    text: as is written about me in the Scriptures.’”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:5-7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 40:6-8 (Greek version).
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'First, Christ said, “You did not want animal sacrifices or sin offerings or burnt offerings or other offerings for sin, nor were you pleased with them” (though they are required by the law of Moses). '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then he said, “Look, I have come to do your will.” He cancels the first covenant in order to put the second into effect. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For God’s will was for us to be made holy by the sacrifice of the body of Jesus Christ, once for all time.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Under the old covenant, the priest stands and ministers before the altar day after day, offering the same sacrifices again and again, which can never take away sins. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But our High Priest offered himself to God as a single sacrifice for sins, good for all time. Then he sat down in the place of honor at God’s right hand. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'There he waits until his enemies are humbled and made a footstool under his feet. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For by that one offering he forever made perfect those who are being made holy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And the Holy Spirit also testifies that this is so. For he says,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “This is the new covenant I will make
- type: usfm
  marker: q2
  children:
  - type: text
    text: with my people on that day,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:16a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: after those days.
    marker-yv: yv-n
  - type: text
    text: ' says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will put my laws in their hearts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will write them on their minds.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:16b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jer 31:33a.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then he says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will never again remember
- type: usfm
  marker: q2
  children:
  - type: text
    text: their sins and lawless deeds.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jer 31:34b.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And when sins have been forgiven, there is no need to offer any more sacrifices.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Call to Persevere
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And so, dear brothers and sisters,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: brothers.
    marker-yv: yv-n
  - type: text
    text: ' we can boldly enter heaven’s Most Holy Place because of the blood of Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: By his death,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Through his flesh.
    marker-yv: yv-n
  - type: text
    text: ' Jesus opened a new and life-giving way through the curtain into the Most Holy Place. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And since we have a great High Priest who rules over God’s house, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: let us go right into the presence of God with sincere hearts fully trusting him. For our guilty consciences have been sprinkled with Christ’s blood to make us clean, and our bodies have been washed with pure water.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Let us hold tightly without wavering to the hope we affirm, for God can be trusted to keep his promise. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Let us think of ways to motivate one another to acts of love and good works. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: And let us not neglect our meeting together, as some people do, but encourage one another, especially now that the day of his return is drawing near.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dear friends, if we deliberately continue sinning after we have received knowledge of the truth, there is no longer any sacrifice that will cover these sins. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'There is only the terrible expectation of God’s judgment and the raging fire that will consume his enemies. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For anyone who refused to obey the law of Moses was put to death without mercy on the testimony of two or three witnesses. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Just think how much worse the punishment will be for those who have trampled on the Son of God, and have treated the blood of the covenant, which made us holy, as if it were common and unholy, and have insulted and disdained the Holy Spirit who brings God’s mercy to us. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: For we know the one who said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will take revenge.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will pay them back.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:30a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deut 32:35.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: text
    text: He also said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will judge his own people.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:30b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deut 32:36.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: It is a terrible thing to fall into the hands of the living God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Think back on those early days when you first learned about Christ.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: when you were first enlightened.
    marker-yv: yv-n
  - type: text
    text: ' Remember how you remained faithful even though it meant terrible suffering. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Sometimes you were exposed to public ridicule and were beaten, and sometimes you helped others who were suffering the same things. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: You suffered along with those who were thrown into jail, and when all you owned was taken from you, you accepted it with joy. You knew there were better things waiting for you that will last forever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'So do not throw away this confident trust in the Lord. Remember the great reward it brings you! '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Patient endurance is what you need now, so that you will continue to do God’s will. Then you will receive all that he has promised.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: “For in just a little while,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Coming One will come and not delay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: And my righteous ones will live by faith.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'my righteous ones will live by their faithfulness; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: my righteous one will live by faith.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: But I will take no pleasure in anyone who turns away.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:37-38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hab 2:3-4.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: But we are not like those who turn away from God to their own destruction. We are the faithful ones, whose souls will be saved.
