document_id: JER.50,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Babylon
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave Jeremiah the prophet this message concerning Babylon and the land of the Babylonians.'
  - type: note
    content: Or Chaldeans; also in 50:8, 25, 35, 45.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Babylonia
  - type: note
    content: Or Chaldea.
  - type: text
    content: ' will be looted'
  - type: text
    content: until the attackers are glutted with loot.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  - type: heading
    content: Babylon’s Sure Fall
  '11':
  - type: text
    content: “You rejoice and are glad,
  - type: text
    content: you who plundered my chosen people.
  - type: text
    content: You frisk about like a calf in a meadow
  - type: text
    content: and neigh like a stallion.
  '12':
  - type: text
    content: But your homeland
  - type: note
    content: Hebrew your mother.
  - type: text
    content: ' will be overwhelmed'
  - type: text
    content: with shame and disgrace.
  - type: text
    content: You will become the least of nations—
  - type: text
    content: a wilderness, a dry and desolate land.
  '13':
  - type: text
    content: 'Because of the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger,
  - type: text
    content: Babylon will become a deserted wasteland.
  - type: text
    content: All who pass by will be horrified
  - type: text
    content: and will gasp at the destruction they see there.
  '14':
  - type: text
    content: “Yes, prepare to attack Babylon,
  - type: text
    content: all you surrounding nations.
  - type: text
    content: Let your archers shoot at her; spare no arrows.
  - type: text
    content: 'For she has sinned against the '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: Shout war cries against her from every side.
  - type: text
    content: Look! She surrenders!
  - type: text
    content: Her walls have fallen.
  - type: text
    content: 'It is the '
  - type: text
    content: Lord
  - type: text
    content: ’s vengeance,
  - type: text
    content: so take vengeance on her.
  - type: text
    content: Do to her as she has done to others!
  '16':
  - type: text
    content: Take from Babylon all those who plant crops;
  - type: text
    content: send all the harvesters away.
  - type: text
    content: Because of the sword of the enemy,
  - type: text
    content: everyone will run away and rush back to their own lands.
  - type: heading
    content: Hope for God’s People
  '17':
  - type: text
    content: “The Israelites are like sheep
  - type: text
    content: that have been scattered by lions.
  - type: text
    content: First the king of Assyria ate them up.
  - type: text
    content: Then King Nebuchadnezzar
  - type: note
    content: Hebrew Nebuchadrezzar, a variant spelling of Nebuchadnezzar.
  - type: text
    content: ' of Babylon cracked their bones.”'
  '18':
  - type: text
    content: 'Therefore, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: 'the God of Israel, says:'
  - type: text
    content: “Now I will punish the king of Babylon and his land,
  - type: text
    content: just as I punished the king of Assyria.
  '19':
  - type: text
    content: And I will bring Israel home again to its own land,
  - type: text
    content: to feed in the fields of Carmel and Bashan,
  - type: text
    content: and to be satisfied once more
  - type: text
    content: in the hill country of Ephraim and Gilead.
  '2':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Tell the whole world,
  - type: text
    content: and keep nothing back.
  - type: text
    content: Raise a signal flag
  - type: text
    content: to tell everyone that Babylon will fall!
  - type: text
    content: Her images and idols
  - type: note
    content: The Hebrew term (literally round things) probably alludes to dung.
  - type: text
    content: ' will be shattered.'
  - type: text
    content: Her gods Bel and Marduk will be utterly disgraced.
  '20':
  - type: text
    content: 'In those days,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “no sin will be found in Israel or in Judah,
  - type: text
    content: for I will forgive the remnant I preserve.
  - type: heading
    content: The Lord’s Judgment on Babylon
  '21':
  - type: text
    content: “Go up, my warriors, against the land of Merathaim
  - type: text
    content: and against the people of Pekod.
  - type: text
    content: Pursue, kill, and completely destroy
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering.
  - type: text
    content: ' them,'
  - type: text
    content: 'as I have commanded you,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '22':
  - type: text
    content: “Let the battle cry be heard in the land,
  - type: text
    content: a shout of great destruction.
  '23':
  - type: text
    content: Babylon, the mightiest hammer in all the earth,
  - type: text
    content: lies broken and shattered.
  - type: text
    content: Babylon is desolate among the nations!
  '24':
  - type: text
    content: Listen, Babylon, for I have set a trap for you.
  - type: text
    content: 'You are caught, for you have fought against the '
  - type: text
    content: Lord
  - type: text
    content: .
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has opened his armory'
  - type: text
    content: and brought out weapons to vent his fury.
  - type: text
    content: The terror that falls upon the Babylonians
  - type: text
    content: 'will be the work of the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '26':
  - type: text
    content: Yes, come against her from distant lands.
  - type: text
    content: Break open her granaries.
  - type: text
    content: Crush her walls and houses into heaps of rubble.
  - type: text
    content: Destroy her completely, and leave nothing!
  '27':
  - type: text
    content: Destroy even her young bulls—
  - type: text
    content: it will be terrible for them, too!
  - type: text
    content: Slaughter them all!
  - type: text
    content: For Babylon’s day of reckoning has come.
  '28':
  - type: text
    content: Listen to the people who have escaped from Babylon,
  - type: text
    content: as they tell in Jerusalem
  - type: text
    content: 'how the '
  - type: text
    content: Lord
  - type: text
    content: ' our God has taken vengeance'
  - type: text
    content: against those who destroyed his Temple.
  '29':
  - type: text
    content: “Send out a call for archers to come to Babylon.
  - type: text
    content: Surround the city so none can escape.
  - type: text
    content: Do to her as she has done to others,
  - type: text
    content: 'for she has defied the '
  - type: text
    content: Lord
  - type: text
    content: ', the Holy One of Israel.'
  '3':
  - type: text
    content: For a nation will attack her from the north
  - type: text
    content: and bring such destruction that no one will live there again.
  - type: text
    content: Everything will be gone;
  - type: text
    content: both people and animals will flee.
  - type: heading
    content: Hope for Israel and Judah
  '30':
  - type: text
    content: Her young men will fall in the streets and die.
  - type: text
    content: Her soldiers will all be killed,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '31':
  - type: text
    content: “See, I am your enemy, you arrogant people,”
  - type: text
    content: 'says the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  - type: text
    content: “Your day of reckoning has arrived—
  - type: text
    content: the day when I will punish you.
  '32':
  - type: text
    content: O land of arrogance, you will stumble and fall,
  - type: text
    content: and no one will raise you up.
  - type: text
    content: For I will light a fire in the cities of Babylon
  - type: text
    content: that will burn up everything around them.”
  '33':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies says:'
  - type: text
    content: “The people of Israel and Judah have been wronged.
  - type: text
    content: Their captors hold them and refuse to let them go.
  '34':
  - type: text
    content: But the one who redeems them is strong.
  - type: text
    content: 'His name is the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  - type: text
    content: He will defend them
  - type: text
    content: and give them rest again in Israel.
  - type: text
    content: But for the people of Babylon
  - type: text
    content: there will be no rest!
  '35':
  - type: text
    content: “The sword of destruction will strike the Babylonians,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “It will strike the people of Babylon—
  - type: text
    content: her officials and wise men, too.
  '36':
  - type: text
    content: The sword will strike her wise counselors,
  - type: text
    content: and they will become fools.
  - type: text
    content: The sword will strike her mightiest warriors,
  - type: text
    content: and panic will seize them.
  '37':
  - type: text
    content: The sword will strike her horses and chariots
  - type: text
    content: and her allies from other lands,
  - type: text
    content: and they will all become like women.
  - type: text
    content: The sword will strike her treasures,
  - type: text
    content: and they all will be plundered.
  '38':
  - type: text
    content: A drought
  - type: note
    content: Or sword; the Hebrew words for drought and sword are very similar.
  - type: text
    content: ' will strike her water supply,'
  - type: text
    content: causing it to dry up.
  - type: text
    content: And why? Because the whole land is filled with idols,
  - type: text
    content: and the people are madly in love with them.
  '39':
  - type: text
    content: “Soon Babylon will be inhabited by desert animals and hyenas.
  - type: text
    content: It will be a home for owls.
  - type: text
    content: Never again will people live there;
  - type: text
    content: it will lie desolate forever.
  '4':
  - type: text
    content: “In those coming days,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “the people of Israel will return home
  - type: text
    content: together with the people of Judah.
  - type: text
    content: They will come weeping
  - type: text
    content: 'and seeking the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.'
  '40':
  - type: text
    content: I will destroy it as I
  - type: note
    content: Hebrew as God.
  - type: text
    content: ' destroyed Sodom and Gomorrah'
  - type: text
    content: 'and their neighboring towns,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “No one will live there;
  - type: text
    content: no one will inhabit it.
  '41':
  - type: text
    content: “Look! A great army is coming from the north.
  - type: text
    content: A great nation and many kings
  - type: text
    content: are rising against you from far-off lands.
  '42':
  - type: text
    content: They are armed with bows and spears.
  - type: text
    content: They are cruel and show no mercy.
  - type: text
    content: As they ride forward on horses,
  - type: text
    content: they sound like a roaring sea.
  - type: text
    content: They are coming in battle formation,
  - type: text
    content: planning to destroy you, Babylon.
  '43':
  - type: text
    content: The king of Babylon has heard reports about the enemy,
  - type: text
    content: and he is weak with fright.
  - type: text
    content: Pangs of anguish have gripped him,
  - type: text
    content: like those of a woman in labor.
  '44':
  - type: text
    content: “I will come like a lion from the thickets of the Jordan,
  - type: text
    content: leaping on the sheep in the pasture.
  - type: text
    content: I will chase Babylon from its land,
  - type: text
    content: and I will appoint the leader of my choice.
  - type: text
    content: For who is like me, and who can challenge me?
  - type: text
    content: What ruler can oppose my will?”
  '45':
  - type: text
    content: 'Listen to the '
  - type: text
    content: Lord
  - type: text
    content: ’s plans against Babylon
  - type: text
    content: and the land of the Babylonians.
  - type: text
    content: Even the little children will be dragged off like sheep,
  - type: text
    content: and their homes will be destroyed.
  '46':
  - type: text
    content: The earth will shake with the shout, “Babylon has been taken!”
  - type: text
    content: and its cry of despair will be heard around the world.
  '5':
  - type: text
    content: They will ask the way to Jerusalem
  - type: note
    content: Hebrew Zion; also in 50:28.
  - type: text
    content: and will start back home again.
  - type: text
    content: 'They will bind themselves to the '
  - type: text
    content: Lord
  - type: text
    content: with an eternal covenant that will never be forgotten.
  '6':
  - type: text
    content: “My people have been lost sheep.
  - type: text
    content: Their shepherds have led them astray
  - type: text
    content: and turned them loose in the mountains.
  - type: text
    content: They have lost their way
  - type: text
    content: and can’t remember how to get back to the sheepfold.
  '7':
  - type: text
    content: All who found them devoured them.
  - type: text
    content: Their enemies said,
  - type: text
    content: ‘We did nothing wrong in attacking them,
  - type: text
    content: 'for they sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: their true place of rest,
  - type: text
    content: and the hope of their ancestors.’
  '8':
  - type: text
    content: “But now, flee from Babylon!
  - type: text
    content: Leave the land of the Babylonians.
  - type: text
    content: Like male goats at the head of the flock,
  - type: text
    content: lead my people home again.
  '9':
  - type: text
    content: For I am raising up an army
  - type: text
    content: of great nations from the north.
  - type: text
    content: They will join forces to attack Babylon,
  - type: text
    content: and she will be captured.
  - type: text
    content: The enemies’ arrows will go straight to the mark;
  - type: text
    content: they will not miss!
