document_id: JER.50,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message about Babylon
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave Jeremiah the prophet this message concerning Babylon and the land of the Babylonians.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Chaldeans; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 50:8, 25, 35, 45.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylonia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldea.
      marker-yv: yv-n
    - type: text
      text: ' will be looted'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until the attackers are glutted with loot.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Babylon’s Sure Fall
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You rejoice and are glad,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who plundered my chosen people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You frisk about like a calf in a meadow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and neigh like a stallion.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But your homeland
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your mother.
      marker-yv: yv-n
    - type: text
      text: ' will be overwhelmed'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with shame and disgrace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will become the least of nations—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a wilderness, a dry and desolate land.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Babylon will become a deserted wasteland.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who pass by will be horrified
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will gasp at the destruction they see there.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yes, prepare to attack Babylon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all you surrounding nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let your archers shoot at her; spare no arrows.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For she has sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shout war cries against her from every side.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Look! She surrenders!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Her walls have fallen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s vengeance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so take vengeance on her.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do to her as she has done to others!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take from Babylon all those who plant crops;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: send all the harvesters away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the sword of the enemy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone will run away and rush back to their own lands.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hope for God’s People
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The Israelites are like sheep
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that have been scattered by lions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: First the king of Assyria ate them up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then King Nebuchadnezzar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Nebuchadrezzar, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Nebuchadnezzar.
      marker-yv: yv-n
    - type: text
      text: ' of Babylon cracked their bones.”'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore, this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the God of Israel, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Now I will punish the king of Babylon and his land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as I punished the king of Assyria.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will bring Israel home again to its own land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to feed in the fields of Carmel and Bashan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and to be satisfied once more
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the hill country of Ephraim and Gilead.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Tell the whole world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and keep nothing back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raise a signal flag
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to tell everyone that Babylon will fall!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her images and idols
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term (literally '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: round things
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) probably alludes to dung.
      marker-yv: yv-n
    - type: text
      text: ' will be shattered.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Her gods Bel and Marduk will be utterly disgraced.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In those days,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “no sin will be found in Israel or in Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I will forgive the remnant I preserve.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Judgment on Babylon
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go up, my warriors, against the land of Merathaim
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and against the people of Pekod.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pursue, kill, and completely destroy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', either by destroying them or by giving them as an offering.'
      marker-yv: yv-n
    - type: text
      text: ' them,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'as I have commanded you,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let the battle cry be heard in the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a shout of great destruction.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylon, the mightiest hammer in all the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lies broken and shattered.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Babylon is desolate among the nations!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, Babylon, for I have set a trap for you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You are caught, for you have fought against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has opened his armory'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and brought out weapons to vent his fury.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The terror that falls upon the Babylonians
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'will be the work of the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, come against her from distant lands.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Break open her granaries.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Crush her walls and houses into heaps of rubble.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Destroy her completely, and leave nothing!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Destroy even her young bulls—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will be terrible for them, too!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Slaughter them all!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For Babylon’s day of reckoning has come.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to the people who have escaped from Babylon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they tell in Jerusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'how the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God has taken vengeance'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against those who destroyed his Temple.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Send out a call for archers to come to Babylon.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Surround the city so none can escape.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do to her as she has done to others,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for she has defied the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the Holy One of Israel.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For a nation will attack her from the north
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bring such destruction that no one will live there again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything will be gone;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both people and animals will flee.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hope for Israel and Judah
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her young men will fall in the streets and die.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Her soldiers will all be killed,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See, I am your enemy, you arrogant people,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your day of reckoning has arrived—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the day when I will punish you.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O land of arrogance, you will stumble and fall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one will raise you up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I will light a fire in the cities of Babylon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that will burn up everything around them.”
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The people of Israel and Judah have been wronged.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their captors hold them and refuse to let them go.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the one who redeems them is strong.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His name is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will defend them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and give them rest again in Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But for the people of Babylon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there will be no rest!
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The sword of destruction will strike the Babylonians,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “It will strike the people of Babylon—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her officials and wise men, too.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sword will strike her wise counselors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will become fools.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sword will strike her mightiest warriors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and panic will seize them.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sword will strike her horses and chariots
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her allies from other lands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will all become like women.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sword will strike her treasures,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they all will be plundered.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A drought
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sword; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'the Hebrew words for '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'drought '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'and '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sword '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: are very similar.
      marker-yv: yv-n
    - type: text
      text: ' will strike her water supply,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: causing it to dry up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And why? Because the whole land is filled with idols,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the people are madly in love with them.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Soon Babylon will be inhabited by desert animals and hyenas.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It will be a home for owls.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never again will people live there;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will lie desolate forever.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “In those coming days,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “the people of Israel will return home
  - type: usfm
    marker: q2
    children:
    - type: text
      text: together with the people of Judah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will come weeping
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and seeking the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God.'
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will destroy it as I
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: as God.
      marker-yv: yv-n
    - type: text
      text: ' destroyed Sodom and Gomorrah'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and their neighboring towns,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “No one will live there;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one will inhabit it.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look! A great army is coming from the north.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A great nation and many kings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are rising against you from far-off lands.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are armed with bows and spears.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are cruel and show no mercy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As they ride forward on horses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they sound like a roaring sea.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are coming in battle formation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: planning to destroy you, Babylon.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The king of Babylon has heard reports about the enemy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he is weak with fright.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pangs of anguish have gripped him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like those of a woman in labor.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will come like a lion from the thickets of the Jordan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaping on the sheep in the pasture.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will chase Babylon from its land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will appoint the leader of my choice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For who is like me, and who can challenge me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What ruler can oppose my will?”
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s plans against Babylon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the land of the Babylonians.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the little children will be dragged off like sheep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their homes will be destroyed.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth will shake with the shout, “Babylon has been taken!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and its cry of despair will be heard around the world.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will ask the way to Jerusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Zion; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 50:28.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will start back home again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will bind themselves to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with an eternal covenant that will never be forgotten.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My people have been lost sheep.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their shepherds have led them astray
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and turned them loose in the mountains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have lost their way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and can’t remember how to get back to the sheepfold.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who found them devoured them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their enemies said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘We did nothing wrong in attacking them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for they sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their true place of rest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the hope of their ancestors.’
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But now, flee from Babylon!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Leave the land of the Babylonians.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like male goats at the head of the flock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lead my people home again.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I am raising up an army
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of great nations from the north.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will join forces to attack Babylon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and she will be captured.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The enemies’ arrows will go straight to the mark;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will not miss!
