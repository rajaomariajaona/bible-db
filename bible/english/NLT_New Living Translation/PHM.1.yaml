document_id: PHM.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings from Paul
  - type: text
    content: This letter is from Paul, a prisoner for preaching the Good News about Christ Jesus, and from our brother Timothy.
  - type: text
    content: 'I am writing to Philemon, our beloved co-worker, '
  '10':
  - type: text
    content: 'I appeal to you to show kindness to my child, Onesimus. I became his father in the faith while here in prison. '
  '11':
  - type: text
    content: Onesimus
  - type: note
    content: Onesimus means “useful.”
  - type: text
    content: ' hasn’t been of much use to you in the past, but now he is very useful to both of us. '
  '12':
  - type: text
    content: I am sending him back to you, and with him comes my own heart.
  '13':
  - type: text
    content: 'I wanted to keep him here with me while I am in these chains for preaching the Good News, and he would have helped me on your behalf. '
  '14':
  - type: text
    content: 'But I didn’t want to do anything without your consent. I wanted you to help because you were willing, not because you were forced. '
  '15':
  - type: text
    content: 'It seems you lost Onesimus for a little while so that you could have him back forever. '
  '16':
  - type: text
    content: He is no longer like a slave to you. He is more than a slave, for he is a beloved brother, especially to me. Now he will mean much more to you, both as a man and as a brother in the Lord.
  '17':
  - type: text
    content: 'So if you consider me your partner, welcome him as you would welcome me. '
  '18':
  - type: text
    content: 'If he has wronged you in any way or owes you anything, charge it to me. '
  '19':
  - type: heading
    content: 'I, Paul, write this with my own hand: I will repay it. And I won’t mention that you owe me your very soul'
  - type: text
    content: '!'
  '2':
  - type: text
    content: and to our sister Apphia, and to our fellow soldier Archippus, and to the church that meets in your
  - type: note
    content: Throughout this letter, you and your are singular except in verses 3, 22, and 25.
  - type: text
    content: ' house.'
  '20':
  - type: text
    content: Yes, my brother, please do me this favor
  - type: note
    content: Greek onaimen, a play on the name Onesimus.
  - type: text
    content: ' for the Lord’s sake. Give me this encouragement in Christ.'
  '21':
  - type: text
    content: 'I am confident as I write this letter that you will do what I ask and even more! '
  '22':
  - type: text
    content: One more thing—please prepare a guest room for me, for I am hoping that God will answer your prayers and let me return to you soon.
  - type: heading
    content: Paul’s Final Greetings
  '23':
  - type: text
    content: 'Epaphras, my fellow prisoner in Christ Jesus, sends you his greetings. '
  '24':
  - type: text
    content: So do Mark, Aristarchus, Demas, and Luke, my co-workers.
  '25':
  - type: text
    content: May the grace of the Lord Jesus Christ be with your spirit.
  '3':
  - type: text
    content: May God our Father and the Lord Jesus Christ give you grace and peace.
  - type: heading
    content: Paul’s Thanksgiving and Prayer
  '4':
  - type: text
    content: 'I always thank my God when I pray for you, Philemon, '
  '5':
  - type: text
    content: 'because I keep hearing about your faith in the Lord Jesus and your love for all of God’s people. '
  '6':
  - type: text
    content: 'And I am praying that you will put into action the generosity that comes from your faith as you understand and experience all the good things we have in Christ. '
  '7':
  - type: text
    content: Your love has given me much joy and comfort, my brother, for your kindness has often refreshed the hearts of God’s people.
  - type: heading
    content: Paul’s Appeal for Onesimus
  '8':
  - type: text
    content: 'That is why I am boldly asking a favor of you. I could demand it in the name of Christ because it is the right thing for you to do. '
  '9':
  - type: text
    content: But because of our love, I prefer simply to ask you. Consider this as a request from me—Paul, an old man and now also a prisoner for the sake of Christ Jesus.
  - type: note
    content: Or a prisoner of Christ Jesus.
