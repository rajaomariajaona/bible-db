document_id: PHM.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greetings from Paul
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: This letter is from Paul, a prisoner for preaching the Good News about Christ Jesus, and from our brother Timothy.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I am writing to Philemon, our beloved co-worker, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and to our sister Apphia, and to our fellow soldier Archippus, and to the church that meets in your
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Throughout this letter, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'you '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'and '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'your '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: are singular except in verses 3, 22, and 25.
    marker-yv: yv-n
  - type: text
    text: ' house.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: May God our Father and the Lord Jesus Christ give you grace and peace.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Thanksgiving and Prayer
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I always thank my God when I pray for you, Philemon, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'because I keep hearing about your faith in the Lord Jesus and your love for all of God’s people. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And I am praying that you will put into action the generosity that comes from your faith as you understand and experience all the good things we have in Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Your love has given me much joy and comfort, my brother, for your kindness has often refreshed the hearts of God’s people.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Appeal for Onesimus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'That is why I am boldly asking a favor of you. I could demand it in the name of Christ because it is the right thing for you to do. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But because of our love, I prefer simply to ask you. Consider this as a request from me—Paul, an old man and now also a prisoner for the sake of Christ Jesus.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a prisoner of Christ Jesus.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I appeal to you to show kindness to my child, Onesimus. I became his father in the faith while here in prison. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Onesimus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Onesimus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “useful.”
    marker-yv: yv-n
  - type: text
    text: ' hasn’t been of much use to you in the past, but now he is very useful to both of us. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I am sending him back to you, and with him comes my own heart.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I wanted to keep him here with me while I am in these chains for preaching the Good News, and he would have helped me on your behalf. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But I didn’t want to do anything without your consent. I wanted you to help because you were willing, not because you were forced. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'It seems you lost Onesimus for a little while so that you could have him back forever. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He is no longer like a slave to you. He is more than a slave, for he is a beloved brother, especially to me. Now he will mean much more to you, both as a man and as a brother in the Lord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So if you consider me your partner, welcome him as you would welcome me. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'If he has wronged you in any way or owes you anything, charge it to me. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: 'I, Paul, write this with my own hand: I will repay it. And I won’t mention that you owe me your very soul'
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Yes, my brother, please do me this favor
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'onaimen, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a play on the name Onesimus.
    marker-yv: yv-n
  - type: text
    text: ' for the Lord’s sake. Give me this encouragement in Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I am confident as I write this letter that you will do what I ask and even more! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: One more thing—please prepare a guest room for me, for I am hoping that God will answer your prayers and let me return to you soon.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Final Greetings
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Epaphras, my fellow prisoner in Christ Jesus, sends you his greetings. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So do Mark, Aristarchus, Demas, and Luke, my co-workers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: May the grace of the Lord Jesus Christ be with your spirit.
