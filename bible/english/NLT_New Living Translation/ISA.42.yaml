document_id: ISA.42,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Chosen Servant
  - type: text
    content: “Look at my servant, whom I strengthen.
  - type: text
    content: He is my chosen one, who pleases me.
  - type: text
    content: I have put my Spirit upon him.
  - type: text
    content: He will bring justice to the nations.
  '10':
  - type: text
    content: 'Sing a new song to the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Sing his praises from the ends of the earth!
  - type: text
    content: Sing, all you who sail the seas,
  - type: text
    content: all you who live in distant coastlands.
  '11':
  - type: text
    content: Join in the chorus, you desert towns;
  - type: text
    content: let the villages of Kedar rejoice!
  - type: text
    content: Let the people of Sela sing for joy;
  - type: text
    content: shout praises from the mountaintops!
  '12':
  - type: text
    content: 'Let the whole world glorify the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: let it sing his praise.
  '13':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will march forth like a mighty hero;'
  - type: text
    content: he will come out like a warrior, full of fury.
  - type: text
    content: He will shout his battle cry
  - type: text
    content: and crush all his enemies.
  '14':
  - type: text
    content: He will say, “I have long been silent;
  - type: text
    content: yes, I have restrained myself.
  - type: text
    content: But now, like a woman in labor,
  - type: text
    content: I will cry and groan and pant.
  '15':
  - type: text
    content: I will level the mountains and hills
  - type: text
    content: and blight all their greenery.
  - type: text
    content: I will turn the rivers into dry land
  - type: text
    content: and will dry up all the pools.
  '16':
  - type: text
    content: I will lead blind Israel down a new path,
  - type: text
    content: guiding them along an unfamiliar way.
  - type: text
    content: I will brighten the darkness before them
  - type: text
    content: and smooth out the road ahead of them.
  - type: text
    content: Yes, I will indeed do these things;
  - type: text
    content: I will not forsake them.
  '17':
  - type: text
    content: But those who trust in idols,
  - type: text
    content: who say, ‘You are our gods,’
  - type: text
    content: will be turned away in shame.
  - type: heading
    content: Israel’s Failure to Listen and See
  '18':
  - type: text
    content: “Listen, you who are deaf!
  - type: text
    content: Look and see, you blind!
  '19':
  - type: text
    content: Who is as blind as my own people, my servant?
  - type: text
    content: Who is as deaf as my messenger?
  - type: text
    content: Who is as blind as my chosen people,
  - type: text
    content: 'the servant of the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  '2':
  - type: text
    content: He will not shout
  - type: text
    content: or raise his voice in public.
  '20':
  - type: text
    content: You see and recognize what is right
  - type: text
    content: but refuse to act on it.
  - type: text
    content: You hear with your ears,
  - type: text
    content: but you don’t really listen.”
  '21':
  - type: text
    content: Because he is righteous,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has exalted his glorious law.'
  '22':
  - type: text
    content: But his own people have been robbed and plundered,
  - type: text
    content: enslaved, imprisoned, and trapped.
  - type: text
    content: They are fair game for anyone
  - type: text
    content: and have no one to protect them,
  - type: text
    content: no one to take them back home.
  '23':
  - type: text
    content: Who will hear these lessons from the past
  - type: text
    content: and see the ruin that awaits you in the future?
  '24':
  - type: text
    content: Who allowed Israel to be robbed and hurt?
  - type: text
    content: 'It was the '
  - type: text
    content: Lord
  - type: text
    content: ', against whom we sinned,'
  - type: text
    content: for the people would not walk in his path,
  - type: text
    content: nor would they obey his law.
  '25':
  - type: text
    content: Therefore, he poured out his fury on them
  - type: text
    content: and destroyed them in battle.
  - type: text
    content: They were enveloped in flames,
  - type: text
    content: but they still refused to understand.
  - type: text
    content: They were consumed by fire,
  - type: text
    content: but they did not learn their lesson.
  '3':
  - type: text
    content: He will not crush the weakest reed
  - type: text
    content: or put out a flickering candle.
  - type: text
    content: He will bring justice to all who have been wronged.
  '4':
  - type: text
    content: He will not falter or lose heart
  - type: text
    content: until justice prevails throughout the earth.
  - type: text
    content: Even distant lands beyond the sea will wait for his instruction.
  - type: note
    content: Greek version reads And his name will be the hope of all the world. Compare Matt 12:21.
  - type: text
    content: ”
  '5':
  - type: text
    content: 'God, the '
  - type: text
    content: Lord
  - type: text
    content: ', created the heavens and stretched them out.'
  - type: text
    content: He created the earth and everything in it.
  - type: text
    content: He gives breath to everyone,
  - type: text
    content: life to everyone who walks the earth.
  - type: text
    content: And it is he who says,
  '6':
  - type: text
    content: '“I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have called you to demonstrate my righteousness.'
  - type: text
    content: I will take you by the hand and guard you,
  - type: text
    content: and I will give you to my people, Israel,
  - type: text
    content: as a symbol of my covenant with them.
  - type: text
    content: And you will be a light to guide the nations.
  '7':
  - type: text
    content: You will open the eyes of the blind.
  - type: text
    content: You will free the captives from prison,
  - type: text
    content: releasing those who sit in dark dungeons.
  '8':
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ; that is my name!
  - type: text
    content: I will not give my glory to anyone else,
  - type: text
    content: nor share my praise with carved idols.
  '9':
  - type: text
    content: Everything I prophesied has come true,
  - type: text
    content: and now I will prophesy again.
  - type: text
    content: I will tell you the future before it happens.”
  - type: heading
    content: A Song of Praise to the Lord
