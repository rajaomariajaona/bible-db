document_id: ISA.42,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Chosen Servant
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Look at my servant, whom I strengthen.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is my chosen one, who pleases me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have put my Spirit upon him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will bring justice to the nations.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Sing a new song to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sing his praises from the ends of the earth!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing, all you who sail the seas,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all you who live in distant coastlands.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Join in the chorus, you desert towns;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the villages of Kedar rejoice!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the people of Sela sing for joy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shout praises from the mountaintops!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Let the whole world glorify the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let it sing his praise.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will march forth like a mighty hero;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will come out like a warrior, full of fury.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will shout his battle cry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and crush all his enemies.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: He will say, “I have long been silent;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, I have restrained myself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But now, like a woman in labor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will cry and groan and pant.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: I will level the mountains and hills
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and blight all their greenery.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will turn the rivers into dry land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will dry up all the pools.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: I will lead blind Israel down a new path,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: guiding them along an unfamiliar way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will brighten the darkness before them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and smooth out the road ahead of them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, I will indeed do these things;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not forsake them.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: But those who trust in idols,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who say, ‘You are our gods,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be turned away in shame.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Failure to Listen and See
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “Listen, you who are deaf!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Look and see, you blind!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Who is as blind as my own people, my servant?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who is as deaf as my messenger?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who is as blind as my chosen people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He will not shout
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or raise his voice in public.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: You see and recognize what is right
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but refuse to act on it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You hear with your ears,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you don’t really listen.”
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Because he is righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has exalted his glorious law.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: But his own people have been robbed and plundered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: enslaved, imprisoned, and trapped.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are fair game for anyone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have no one to protect them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one to take them back home.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Who will hear these lessons from the past
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and see the ruin that awaits you in the future?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Who allowed Israel to be robbed and hurt?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'It was the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', against whom we sinned,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the people would not walk in his path,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor would they obey his law.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Therefore, he poured out his fury on them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroyed them in battle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were enveloped in flames,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they still refused to understand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were consumed by fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they did not learn their lesson.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: He will not crush the weakest reed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or put out a flickering candle.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will bring justice to all who have been wronged.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He will not falter or lose heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until justice prevails throughout the earth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even distant lands beyond the sea will wait for his instruction.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'And his name will be the hope of all the world. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Matt 12:21.
      marker-yv: yv-n
    - type: text
      text: ”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'God, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', created the heavens and stretched them out.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He created the earth and everything in it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gives breath to everyone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: life to everyone who walks the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it is he who says,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have called you to demonstrate my righteousness.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will take you by the hand and guard you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will give you to my people, Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as a symbol of my covenant with them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will be a light to guide the nations.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: You will open the eyes of the blind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will free the captives from prison,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: releasing those who sit in dark dungeons.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ; that is my name!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not give my glory to anyone else,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor share my praise with carved idols.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Everything I prophesied has come true,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and now I will prophesy again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will tell you the future before it happens.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'A Song of Praise to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
