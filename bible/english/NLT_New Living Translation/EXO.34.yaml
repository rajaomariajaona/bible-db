document_id: EXO.34,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A New Copy of the Covenant
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told Moses, “Chisel out two stone tablets like the first ones. I will write on them the same words that were on the tablets you smashed. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replied, “Listen, I am making a covenant with you in the presence of all your people. I will perform miracles that have never been performed anywhere in all the earth or in any nation. And all the people around you will see the power of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '—the awesome power I will display for you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But listen carefully to everything I command you today. Then I will go ahead of you and drive out the Amorites, Canaanites, Hittites, Perizzites, Hivites, and Jebusites.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“Be very careful never to make a treaty with the people who live in the land where you are going. If you do, you will follow their evil ways and be trapped. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Instead, you must break down their pagan altars, smash their sacred pillars, and cut down their Asherah poles. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'You must worship no other gods, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', whose very name is Jealous, is a God who is jealous about his relationship with you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“You must not make a treaty of any kind with the people living in the land. They lust after their gods, offering sacrifices to them. They will invite you to join them in their sacrificial meals, and you will go with them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then you will accept their daughters, who sacrifice to other gods, as wives for your sons. And they will seduce your sons to commit adultery against me by worshiping other gods. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: You must not make any gods of molten metal for yourselves.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “You must celebrate the Festival of Unleavened Bread. For seven days the bread you eat must be made without yeast, just as I commanded you. Celebrate this festival annually at the appointed time in early spring, in the month of Abib,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'appointed time in the month of Abib. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This first month of the ancient Hebrew lunar calendar usually occurs within the months of March and April.
      marker-yv: yv-n
    - type: text
      text: ' for that is the anniversary of your departure from Egypt.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “The firstborn of every animal belongs to me, including the firstborn males
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As in Greek version; the meaning of the Hebrew word is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' from your herds of cattle and your flocks of sheep and goats. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Be ready in the morning to climb up Mount Sinai and present yourself to me on the top of the mountain. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'A firstborn donkey may be bought back from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by presenting a lamb or young goat in its place. But if you do not buy it back, you must break its neck. However, you must buy back every firstborn son.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No one may appear before me without an offering.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “You have six days each week for your ordinary work, but on the seventh day you must stop working, even during the seasons of plowing and harvest.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “You must celebrate the Festival of Harvest
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:22a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Festival of Weeks; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare 23:16. This was later called the Festival of Pentecost. It is celebrated today as Shavuot (or Shabuoth).
      marker-yv: yv-n
    - type: text
      text: ' with the first crop of the wheat harvest, and celebrate the Festival of the Final Harvest'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:22b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Festival of Ingathering. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was later called the Festival of Shelters or Festival of Tabernacles (see Lev 23:33-36). It is celebrated today as Sukkot (or Succoth).
      marker-yv: yv-n
    - type: text
      text: ' at the end of the harvest season. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Three times each year every man in Israel must appear before the Sovereign, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'I will drive out the other nations ahead of you and expand your territory, so no one will covet and conquer your land while you appear before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God three times each year.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “You must not offer the blood of my sacrificial offerings together with any baked goods containing yeast. And none of the meat of the Passover sacrifice may be kept over until the next morning.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“As you harvest your crops, bring the very best of the first harvest to the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You must not cook a young goat in its mother’s milk.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Write down all these instructions, for they represent the terms of the covenant I am making with you and with Israel.”'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Moses remained there on the mountain with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' forty days and forty nights. In all that time he ate no bread and drank no water. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:28a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he.
      marker-yv: yv-n
    - type: text
      text: ' wrote the terms of the covenant—the Ten Commandments'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:28b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the ten words.
      marker-yv: yv-n
    - type: text
      text: —on the stone tablets.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: When Moses came down Mount Sinai carrying the two stone tablets inscribed with the terms of the covenant,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the two tablets of the Testimony; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see note on 25:16.
      marker-yv: yv-n
    - type: text
      text: ' he wasn’t aware that his face had become radiant because he had spoken to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: No one else may come with you. In fact, no one is to appear anywhere on the mountain. Do not even let the flocks or herds graze near the mountain.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: So when Aaron and the people of Israel saw the radiance of Moses’ face, they were afraid to come near him.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'But Moses called out to them and asked Aaron and all the leaders of the community to come over, and he talked with them. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Then all the people of Israel approached him, and Moses gave them all the instructions the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given him on Mount Sinai. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'When Moses finished speaking with them, he covered his face with a veil. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'But whenever he went into the Tent of Meeting to speak with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', he would remove the veil until he came out again. Then he would give the people whatever instructions the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given him, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'and the people of Israel would see the radiant glow of his face. So he would put the veil over his face until he returned to speak with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So Moses chiseled out two tablets of stone like the first ones. Early in the morning he climbed Mount Sinai as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded him, and he carried the two stone tablets in his hands.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came down in a cloud and stood there with him; and he called out his own name, Yahweh.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:5 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yahweh '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'is a transliteration of the proper name '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'YHWH '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'that is sometimes rendered “Jehovah”; in this translation it is usually rendered “the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ” (note the use of small capitals).
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' passed in front of Moses, calling out,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yahweh!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note on 34:5.
      marker-yv: yv-n
    - type: text
      text: ' The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The God of compassion and mercy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am slow to anger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and filled with unfailing love and faithfulness.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I lavish unfailing love to a thousand generations.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for thousands.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I forgive iniquity, rebellion, and sin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I do not excuse the guilty.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I lay the sins of the parents upon their children and grandchildren;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the entire family is affected—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even children in the third and fourth generations.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Moses immediately threw himself to the ground and worshiped. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: And he said, “O Lord, if it is true that I have found favor with you, then please travel with us. Yes, this is a stubborn and rebellious people, but please forgive our iniquity and our sins. Claim us as your own special possession.”
