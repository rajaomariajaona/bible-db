document_id: EXO.34,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A New Copy of the Covenant
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' told Moses, “Chisel out two stone tablets like the first ones. I will write on them the same words that were on the tablets you smashed. '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “Listen, I am making a covenant with you in the presence of all your people. I will perform miracles that have never been performed anywhere in all the earth or in any nation. And all the people around you will see the power of the '
  - type: text
    content: Lord
  - type: text
    content: '—the awesome power I will display for you. '
  '11':
  - type: text
    content: But listen carefully to everything I command you today. Then I will go ahead of you and drive out the Amorites, Canaanites, Hittites, Perizzites, Hivites, and Jebusites.
  '12':
  - type: text
    content: '“Be very careful never to make a treaty with the people who live in the land where you are going. If you do, you will follow their evil ways and be trapped. '
  '13':
  - type: text
    content: 'Instead, you must break down their pagan altars, smash their sacred pillars, and cut down their Asherah poles. '
  '14':
  - type: text
    content: 'You must worship no other gods, for the '
  - type: text
    content: Lord
  - type: text
    content: ', whose very name is Jealous, is a God who is jealous about his relationship with you.'
  '15':
  - type: text
    content: '“You must not make a treaty of any kind with the people living in the land. They lust after their gods, offering sacrifices to them. They will invite you to join them in their sacrificial meals, and you will go with them. '
  '16':
  - type: text
    content: 'Then you will accept their daughters, who sacrifice to other gods, as wives for your sons. And they will seduce your sons to commit adultery against me by worshiping other gods. '
  '17':
  - type: text
    content: You must not make any gods of molten metal for yourselves.
  '18':
  - type: text
    content: “You must celebrate the Festival of Unleavened Bread. For seven days the bread you eat must be made without yeast, just as I commanded you. Celebrate this festival annually at the appointed time in early spring, in the month of Abib,
  - type: note
    content: Hebrew appointed time in the month of Abib. This first month of the ancient Hebrew lunar calendar usually occurs within the months of March and April.
  - type: text
    content: ' for that is the anniversary of your departure from Egypt.'
  '19':
  - type: text
    content: “The firstborn of every animal belongs to me, including the firstborn males
  - type: note
    content: As in Greek version; the meaning of the Hebrew word is uncertain.
  - type: text
    content: ' from your herds of cattle and your flocks of sheep and goats. '
  '2':
  - type: text
    content: 'Be ready in the morning to climb up Mount Sinai and present yourself to me on the top of the mountain. '
  '20':
  - type: text
    content: 'A firstborn donkey may be bought back from the '
  - type: text
    content: Lord
  - type: text
    content: ' by presenting a lamb or young goat in its place. But if you do not buy it back, you must break its neck. However, you must buy back every firstborn son.'
  - type: text
    content: “No one may appear before me without an offering.
  '21':
  - type: text
    content: “You have six days each week for your ordinary work, but on the seventh day you must stop working, even during the seasons of plowing and harvest.
  '22':
  - type: text
    content: “You must celebrate the Festival of Harvest
  - type: note
    content: Hebrew Festival of Weeks; compare 23:16. This was later called the Festival of Pentecost. It is celebrated today as Shavuot (or Shabuoth).
  - type: text
    content: ' with the first crop of the wheat harvest, and celebrate the Festival of the Final Harvest'
  - type: note
    content: Or Festival of Ingathering. This was later called the Festival of Shelters or Festival of Tabernacles (see Lev 23:33-36). It is celebrated today as Sukkot (or Succoth).
  - type: text
    content: ' at the end of the harvest season. '
  '23':
  - type: text
    content: 'Three times each year every man in Israel must appear before the Sovereign, the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '24':
  - type: text
    content: 'I will drive out the other nations ahead of you and expand your territory, so no one will covet and conquer your land while you appear before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God three times each year.'
  '25':
  - type: text
    content: “You must not offer the blood of my sacrificial offerings together with any baked goods containing yeast. And none of the meat of the Passover sacrifice may be kept over until the next morning.
  '26':
  - type: text
    content: '“As you harvest your crops, bring the very best of the first harvest to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  - type: text
    content: “You must not cook a young goat in its mother’s milk.”
  '27':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Write down all these instructions, for they represent the terms of the covenant I am making with you and with Israel.”'
  '28':
  - type: text
    content: 'Moses remained there on the mountain with the '
  - type: text
    content: Lord
  - type: text
    content: ' forty days and forty nights. In all that time he ate no bread and drank no water. And the '
  - type: text
    content: Lord
  - type: note
    content: Hebrew he.
  - type: text
    content: ' wrote the terms of the covenant—the Ten Commandments'
  - type: note
    content: Hebrew the ten words.
  - type: text
    content: —on the stone tablets.
  '29':
  - type: text
    content: When Moses came down Mount Sinai carrying the two stone tablets inscribed with the terms of the covenant,
  - type: note
    content: Hebrew the two tablets of the Testimony; see note on 25:16.
  - type: text
    content: ' he wasn’t aware that his face had become radiant because he had spoken to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: No one else may come with you. In fact, no one is to appear anywhere on the mountain. Do not even let the flocks or herds graze near the mountain.”
  '30':
  - type: text
    content: So when Aaron and the people of Israel saw the radiance of Moses’ face, they were afraid to come near him.
  '31':
  - type: text
    content: 'But Moses called out to them and asked Aaron and all the leaders of the community to come over, and he talked with them. '
  '32':
  - type: text
    content: 'Then all the people of Israel approached him, and Moses gave them all the instructions the '
  - type: text
    content: Lord
  - type: text
    content: ' had given him on Mount Sinai. '
  '33':
  - type: text
    content: 'When Moses finished speaking with them, he covered his face with a veil. '
  '34':
  - type: text
    content: 'But whenever he went into the Tent of Meeting to speak with the '
  - type: text
    content: Lord
  - type: text
    content: ', he would remove the veil until he came out again. Then he would give the people whatever instructions the '
  - type: text
    content: Lord
  - type: text
    content: ' had given him, '
  '35':
  - type: text
    content: 'and the people of Israel would see the radiant glow of his face. So he would put the veil over his face until he returned to speak with the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: 'So Moses chiseled out two tablets of stone like the first ones. Early in the morning he climbed Mount Sinai as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him, and he carried the two stone tablets in his hands.'
  '5':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' came down in a cloud and stood there with him; and he called out his own name, Yahweh.'
  - type: note
    content: Yahweh is a transliteration of the proper name YHWH that is sometimes rendered “Jehovah”; in this translation it is usually rendered “the Lord” (note the use of small capitals).
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' passed in front of Moses, calling out,'
  - type: text
    content: “Yahweh!
  - type: note
    content: See note on 34:5.
  - type: text
    content: ' The '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: The God of compassion and mercy!
  - type: text
    content: I am slow to anger
  - type: text
    content: and filled with unfailing love and faithfulness.
  '7':
  - type: text
    content: I lavish unfailing love to a thousand generations.
  - type: note
    content: Hebrew for thousands.
  - type: text
    content: I forgive iniquity, rebellion, and sin.
  - type: text
    content: But I do not excuse the guilty.
  - type: text
    content: I lay the sins of the parents upon their children and grandchildren;
  - type: text
    content: the entire family is affected—
  - type: text
    content: even children in the third and fourth generations.”
  '8':
  - type: text
    content: 'Moses immediately threw himself to the ground and worshiped. '
  '9':
  - type: text
    content: And he said, “O Lord, if it is true that I have found favor with you, then please travel with us. Yes, this is a stubborn and rebellious people, but please forgive our iniquity and our sins. Claim us as your own special possession.”
