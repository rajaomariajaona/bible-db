document_id: EXO.14,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' gave these instructions to Moses: '
  '10':
  - type: text
    content: 'As Pharaoh approached, the people of Israel looked up and panicked when they saw the Egyptians overtaking them. They cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '11':
  - type: text
    content: 'and they said to Moses, “Why did you bring us out here to die in the wilderness? Weren’t there enough graves for us in Egypt? What have you done to us? Why did you make us leave Egypt? '
  '12':
  - type: text
    content: Didn’t we tell you this would happen while we were still in Egypt? We said, ‘Leave us alone! Let us be slaves to the Egyptians. It’s better to be a slave in Egypt than a corpse in the wilderness!’”
  '13':
  - type: text
    content: 'But Moses told the people, “Don’t be afraid. Just stand still and watch the '
  - type: text
    content: Lord
  - type: text
    content: ' rescue you today. The Egyptians you see today will never be seen again. '
  '14':
  - type: text
    content: 'The '
  - type: text
    content: 'Lord '
  - type: text
    content: himself will fight for you. Just stay calm.”
  - type: heading
    content: Escape through the Red Sea
  '15':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Why are you crying out to me? Tell the people to get moving! '
  '16':
  - type: text
    content: 'Pick up your staff and raise your hand over the sea. Divide the water so the Israelites can walk through the middle of the sea on dry ground. '
  '17':
  - type: text
    content: 'And I will harden the hearts of the Egyptians, and they will charge in after the Israelites. My great glory will be displayed through Pharaoh and his troops, his chariots, and his charioteers. '
  '18':
  - type: text
    content: 'When my glory is displayed through them, all Egypt will see my glory and know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '!”'
  '19':
  - type: text
    content: 'Then the angel of God, who had been leading the people of Israel, moved to the rear of the camp. The pillar of cloud also moved from the front and stood behind them. '
  '2':
  - type: text
    content: '“Order the Israelites to turn back and camp by Pi-hahiroth between Migdol and the sea. Camp there along the shore, across from Baal-zephon. '
  '20':
  - type: text
    content: The cloud settled between the Egyptian and Israelite camps. As darkness fell, the cloud turned to fire, lighting up the night. But the Egyptians and Israelites did not approach each other all night.
  '21':
  - type: text
    content: 'Then Moses raised his hand over the sea, and the '
  - type: text
    content: Lord
  - type: text
    content: ' opened up a path through the water with a strong east wind. The wind blew all that night, turning the seabed into dry land. '
  '22':
  - type: text
    content: So the people of Israel walked through the middle of the sea on dry ground, with walls of water on each side!
  '23':
  - type: text
    content: 'Then the Egyptians—all of Pharaoh’s horses, chariots, and charioteers—chased them into the middle of the sea. '
  '24':
  - type: text
    content: 'But just before dawn the '
  - type: text
    content: Lord
  - type: text
    content: ' looked down on the Egyptian army from the pillar of fire and cloud, and he threw their forces into total confusion. '
  '25':
  - type: text
    content: He twisted
  - type: note
    content: As in Greek version, Samaritan Pentateuch, and Syriac version; Hebrew reads He removed.
  - type: text
    content: ' their chariot wheels, making their chariots difficult to drive. “Let’s get out of here—away from these Israelites!” the Egyptians shouted. “The '
  - type: text
    content: Lord
  - type: text
    content: ' is fighting for them against Egypt!”'
  '26':
  - type: text
    content: 'When all the Israelites had reached the other side, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Raise your hand over the sea again. Then the waters will rush back and cover the Egyptians and their chariots and charioteers.” '
  '27':
  - type: text
    content: 'So as the sun began to rise, Moses raised his hand over the sea, and the water rushed back into its usual place. The Egyptians tried to escape, but the '
  - type: text
    content: Lord
  - type: text
    content: ' swept them into the sea. '
  '28':
  - type: text
    content: Then the waters returned and covered all the chariots and charioteers—the entire army of Pharaoh. Of all the Egyptians who had chased the Israelites into the sea, not a single one survived.
  '29':
  - type: text
    content: 'But the people of Israel had walked through the middle of the sea on dry ground, as the water stood up like a wall on both sides. '
  '3':
  - type: text
    content: 'Then Pharaoh will think, ‘The Israelites are confused. They are trapped in the wilderness!’ '
  '30':
  - type: text
    content: 'That is how the '
  - type: text
    content: Lord
  - type: text
    content: ' rescued Israel from the hand of the Egyptians that day. And the Israelites saw the bodies of the Egyptians washed up on the seashore. '
  '31':
  - type: text
    content: 'When the people of Israel saw the mighty power that the '
  - type: text
    content: Lord
  - type: text
    content: ' had unleashed against the Egyptians, they were filled with awe before him. They put their faith in the '
  - type: text
    content: Lord
  - type: text
    content: ' and in his servant Moses.'
  '4':
  - type: text
    content: And once again I will harden Pharaoh’s heart, and he will chase after you.
  - type: note
    content: Hebrew after them.
  - type: text
    content: ' I have planned this in order to display my glory through Pharaoh and his whole army. After this the Egyptians will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '!” So the Israelites camped there as they were told.'
  - type: heading
    content: The Egyptians Pursue Israel
  '5':
  - type: text
    content: 'When word reached the king of Egypt that the Israelites had fled, Pharaoh and his officials changed their minds. “What have we done, letting all those Israelite slaves get away?” they asked. '
  '6':
  - type: text
    content: 'So Pharaoh harnessed his chariot and called up his troops. '
  '7':
  - type: text
    content: 'He took with him 600 of Egypt’s best chariots, along with the rest of the chariots of Egypt, each with its commander. '
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' hardened the heart of Pharaoh, the king of Egypt, so he chased after the people of Israel, who had left with fists raised in defiance. '
  '9':
  - type: text
    content: The Egyptians chased after them with all the forces in Pharaoh’s army—all his horses and chariots, his charioteers, and his troops. The Egyptians caught up with the people of Israel as they were camped beside the shore near Pi-hahiroth, across from Baal-zephon.
