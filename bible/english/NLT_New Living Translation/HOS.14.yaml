document_id: HOS.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Healing for the Repentant
  - type: text
    content: ' '
  - type: note
    content: Verses 14:1-9 are numbered 14:2-10 in Hebrew text.
  - type: text
    content: 'Return, O Israel, to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: for your sins have brought you down.
  '2':
  - type: text
    content: 'Bring your confessions, and return to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Say to him,
  - type: text
    content: “Forgive all our sins and graciously receive us,
  - type: text
    content: so that we may offer you our praises.
  - type: note
    content: As in Greek and Syriac versions, which read may repay the fruit of our lips; Hebrew reads may repay the bulls of our lips.
  '3':
  - type: text
    content: Assyria cannot save us,
  - type: text
    content: nor can our warhorses.
  - type: text
    content: Never again will we say to the idols we have made,
  - type: text
    content: ‘You are our gods.’
  - type: text
    content: No, in you alone
  - type: text
    content: do the orphans find mercy.”
  '4':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says,'
  - type: text
    content: “Then I will heal you of your faithlessness;
  - type: text
    content: my love will know no bounds,
  - type: text
    content: for my anger will be gone forever.
  '5':
  - type: text
    content: I will be to Israel
  - type: text
    content: like a refreshing dew from heaven.
  - type: text
    content: Israel will blossom like the lily;
  - type: text
    content: it will send roots deep into the soil
  - type: text
    content: like the cedars in Lebanon.
  '6':
  - type: text
    content: Its branches will spread out like beautiful olive trees,
  - type: text
    content: as fragrant as the cedars of Lebanon.
  '7':
  - type: text
    content: My people will again live under my shade.
  - type: text
    content: They will flourish like grain and blossom like grapevines.
  - type: text
    content: They will be as fragrant as the wines of Lebanon.
  '8':
  - type: text
    content: “O Israel,
  - type: note
    content: Hebrew Ephraim, referring to the northern kingdom of Israel.
  - type: text
    content: ' stay away from idols!'
  - type: text
    content: I am the one who answers your prayers and cares for you.
  - type: text
    content: I am like a tree that is always green;
  - type: text
    content: all your fruit comes from me.”
  '9':
  - type: text
    content: Let those who are wise understand these things.
  - type: text
    content: Let those with discernment listen carefully.
  - type: text
    content: 'The paths of the '
  - type: text
    content: Lord
  - type: text
    content: ' are true and right,'
  - type: text
    content: and righteous people live by walking in them.
  - type: text
    content: But in those paths sinners stumble and fall.
