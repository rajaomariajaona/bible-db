segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Healing for the Repentant
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses 14:1-9 are numbered 14:2-10 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: 'Return, O Israel, to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your sins have brought you down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Bring your confessions, and return to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: Say to him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Forgive all our sins and graciously receive us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that we may offer you our praises.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions, which read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'may repay the fruit of our lips; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: may repay the bulls of our lips.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Assyria cannot save us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor can our warhorses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Never again will we say to the idols we have made,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘You are our gods.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: No, in you alone
- type: usfm
  marker: q2
  children:
  - type: text
    text: do the orphans find mercy.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Then I will heal you of your faithlessness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my love will know no bounds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for my anger will be gone forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I will be to Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a refreshing dew from heaven.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israel will blossom like the lily;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will send roots deep into the soil
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the cedars in Lebanon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Its branches will spread out like beautiful olive trees,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as fragrant as the cedars of Lebanon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: My people will again live under my shade.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will flourish like grain and blossom like grapevines.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will be as fragrant as the wines of Lebanon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “O Israel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ephraim, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: referring to the northern kingdom of Israel.
    marker-yv: yv-n
  - type: text
    text: ' stay away from idols!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am the one who answers your prayers and cares for you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am like a tree that is always green;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all your fruit comes from me.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Let those who are wise understand these things.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let those with discernment listen carefully.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The paths of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' are true and right,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and righteous people live by walking in them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But in those paths sinners stumble and fall.
