document_id: 1SA.28,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul Consults a Medium
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: About that time the Philistines mustered their armies for another war with Israel. King Achish told David, “You and your men will be expected to join me in battle.”
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Saul took an oath in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and promised, “As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, nothing bad will happen to you for doing this.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Finally, the woman said, “Well, whose spirit do you want me to call up?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Call up Samuel,” Saul replied.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the woman saw Samuel, she screamed, “You’ve deceived me! You are Saul!”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Don’t be afraid!” the king told her. “What do you see?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I see a god
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: gods.
      marker-yv: yv-n
    - type: text
      text: ' coming up out of the earth,” she said.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What does he look like?” Saul asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “He is an old man wrapped in a robe,” she replied. Saul realized it was Samuel, and he fell to the ground before him.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Why have you disturbed me by calling me back?” Samuel asked Saul.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Because I am in deep trouble,” Saul replied. “The Philistines are at war with me, and God has left me and won’t reply by prophets or dreams. So I have called for you to tell me what to do.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Samuel replied, “Why ask me, since the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has left you and has become your enemy? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done just as he said he would. He has torn the kingdom from you and given it to your rival, David. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done this to you today because you refused to carry out his fierce anger against the Amalekites. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What’s more, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will hand you and the army of Israel over to the Philistines tomorrow, and you and your sons will be here with me. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will bring down the entire army of Israel in defeat.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Very well!” David agreed. “Now you will see for yourself what we can do.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Achish told David, “I will make you my personal bodyguard for life.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul fell full length on the ground, paralyzed with fright because of Samuel’s words. He was also faint with hunger, for he had eaten nothing all day and all night.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the woman saw how distraught he was, she said, “Sir, I obeyed your command at the risk of my life. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now do what I say, and let me give you a little something to eat so you can regain your strength for the trip back.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Saul refused to eat anything. Then his advisers joined the woman in urging him to eat, so he finally yielded and got up from the ground and sat on the couch.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The woman had been fattening a calf, so she hurried out and killed it. She took some flour, kneaded it into dough and baked unleavened bread. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She brought the meal to Saul and his advisers, and they ate it. Then they went out into the night.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, Samuel had died, and all Israel had mourned for him. He was buried in Ramah, his hometown. And Saul had banned from the land of Israel all mediums and those who consult the spirits of the dead.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Philistines set up their camp at Shunem, and Saul gathered all the army of Israel and camped at Gilboa. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Saul saw the vast Philistine army, he became frantic with fear. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He asked the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' what he should do, but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' refused to answer him, either by dreams or by sacred lots'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: by Urim.
      marker-yv: yv-n
    - type: text
      text: ' or by the prophets. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul then said to his advisers, “Find a woman who is a medium, so I can go and ask her what to do.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: His advisers replied, “There is a medium at Endor.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Saul disguised himself by wearing ordinary clothing instead of his royal robes. Then he went to the woman’s home at night, accompanied by two of his men.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I have to talk to a man who has died,” he said. “Will you call up his spirit for me?”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Are you trying to get me killed?” the woman demanded. “You know that Saul has outlawed all the mediums and all who consult the spirits of the dead. Why are you setting a trap for me?”
