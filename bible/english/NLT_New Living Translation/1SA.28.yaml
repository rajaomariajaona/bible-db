document_id: 1SA.28,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul Consults a Medium
  - type: text
    content: About that time the Philistines mustered their armies for another war with Israel. King Achish told David, “You and your men will be expected to join me in battle.”
  '10':
  - type: text
    content: 'But Saul took an oath in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' and promised, “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, nothing bad will happen to you for doing this.”'
  '11':
  - type: text
    content: Finally, the woman said, “Well, whose spirit do you want me to call up?”
  - type: text
    content: “Call up Samuel,” Saul replied.
  '12':
  - type: text
    content: When the woman saw Samuel, she screamed, “You’ve deceived me! You are Saul!”
  '13':
  - type: text
    content: “Don’t be afraid!” the king told her. “What do you see?”
  - type: text
    content: “I see a god
  - type: note
    content: Or gods.
  - type: text
    content: ' coming up out of the earth,” she said.'
  '14':
  - type: text
    content: “What does he look like?” Saul asked.
  - type: text
    content: “He is an old man wrapped in a robe,” she replied. Saul realized it was Samuel, and he fell to the ground before him.
  '15':
  - type: text
    content: “Why have you disturbed me by calling me back?” Samuel asked Saul.
  - type: text
    content: “Because I am in deep trouble,” Saul replied. “The Philistines are at war with me, and God has left me and won’t reply by prophets or dreams. So I have called for you to tell me what to do.”
  '16':
  - type: text
    content: 'But Samuel replied, “Why ask me, since the '
  - type: text
    content: Lord
  - type: text
    content: ' has left you and has become your enemy? '
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has done just as he said he would. He has torn the kingdom from you and given it to your rival, David. '
  '18':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has done this to you today because you refused to carry out his fierce anger against the Amalekites. '
  '19':
  - type: text
    content: 'What’s more, the '
  - type: text
    content: Lord
  - type: text
    content: ' will hand you and the army of Israel over to the Philistines tomorrow, and you and your sons will be here with me. The '
  - type: text
    content: Lord
  - type: text
    content: ' will bring down the entire army of Israel in defeat.”'
  '2':
  - type: text
    content: “Very well!” David agreed. “Now you will see for yourself what we can do.”
  - type: text
    content: Then Achish told David, “I will make you my personal bodyguard for life.”
  '20':
  - type: text
    content: Saul fell full length on the ground, paralyzed with fright because of Samuel’s words. He was also faint with hunger, for he had eaten nothing all day and all night.
  '21':
  - type: text
    content: 'When the woman saw how distraught he was, she said, “Sir, I obeyed your command at the risk of my life. '
  '22':
  - type: text
    content: Now do what I say, and let me give you a little something to eat so you can regain your strength for the trip back.”
  '23':
  - type: text
    content: But Saul refused to eat anything. Then his advisers joined the woman in urging him to eat, so he finally yielded and got up from the ground and sat on the couch.
  '24':
  - type: text
    content: 'The woman had been fattening a calf, so she hurried out and killed it. She took some flour, kneaded it into dough and baked unleavened bread. '
  '25':
  - type: text
    content: She brought the meal to Saul and his advisers, and they ate it. Then they went out into the night.
  '3':
  - type: text
    content: Meanwhile, Samuel had died, and all Israel had mourned for him. He was buried in Ramah, his hometown. And Saul had banned from the land of Israel all mediums and those who consult the spirits of the dead.
  '4':
  - type: text
    content: 'The Philistines set up their camp at Shunem, and Saul gathered all the army of Israel and camped at Gilboa. '
  '5':
  - type: text
    content: 'When Saul saw the vast Philistine army, he became frantic with fear. '
  '6':
  - type: text
    content: 'He asked the '
  - type: text
    content: Lord
  - type: text
    content: ' what he should do, but the '
  - type: text
    content: Lord
  - type: text
    content: ' refused to answer him, either by dreams or by sacred lots'
  - type: note
    content: Hebrew by Urim.
  - type: text
    content: ' or by the prophets. '
  '7':
  - type: text
    content: Saul then said to his advisers, “Find a woman who is a medium, so I can go and ask her what to do.”
  - type: text
    content: His advisers replied, “There is a medium at Endor.”
  '8':
  - type: text
    content: So Saul disguised himself by wearing ordinary clothing instead of his royal robes. Then he went to the woman’s home at night, accompanied by two of his men.
  - type: text
    content: “I have to talk to a man who has died,” he said. “Will you call up his spirit for me?”
  '9':
  - type: text
    content: “Are you trying to get me killed?” the woman demanded. “You know that Saul has outlawed all the mediums and all who consult the spirits of the dead. Why are you setting a trap for me?”
