document_id: PSA.51,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of David, regarding the time Nathan the prophet came to him after David had committed adultery with Bathsheba.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have mercy on me, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of your unfailing love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of your great compassion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: blot out the stain of my sins.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Create in me a clean heart, O God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Renew a loyal spirit within me.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not banish me from your presence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and don’t take your Holy Spirit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your spirit of holiness.
      marker-yv: yv-n
    - type: text
      text: ' from me.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Restore to me the joy of your salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make me willing to obey you.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I will teach your ways to rebels,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will return to you.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Forgive me for shedding blood, O God who saves;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then I will joyfully sing of your forgiveness.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Unseal my lips, O Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that my mouth may praise you.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You do not desire a sacrifice, or I would offer one.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You do not want a burnt offering.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sacrifice you desire is a broken spirit.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will not reject a broken and repentant heart, O God.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look with favor on Zion and help her;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rebuild the walls of Jerusalem.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you will be pleased with sacrifices offered in the right spirit—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with burnt offerings and whole burnt offerings.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then bulls will again be sacrificed on your altar.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wash me clean from my guilt.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Purify me from my sin.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I recognize my rebellion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it haunts me day and night.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Against you, and you alone, have I sinned;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have done what is evil in your sight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be proved right in what you say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your judgment against me is just.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and you will win your case in court. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Rom 3:4.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I was born a sinner—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, from the moment my mother conceived me.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you desire honesty from the womb,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'from the heart; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in the inward parts.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: teaching me wisdom even there.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Purify me from my sins,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Purify me with the hyssop branch.
      marker-yv: yv-n
    - type: text
      text: ' and I will be clean;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wash me, and I will be whiter than snow.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, give me back my joy again;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have broken me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now let me rejoice.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t keep looking at my sins.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Remove the stain of my guilt.
