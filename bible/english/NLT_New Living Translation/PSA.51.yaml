document_id: PSA.51,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David, regarding the time Nathan the prophet came to him after David had committed adultery with Bathsheba.'
  - type: text
    content: Have mercy on me, O God,
  - type: text
    content: because of your unfailing love.
  - type: text
    content: Because of your great compassion,
  - type: text
    content: blot out the stain of my sins.
  '10':
  - type: text
    content: Create in me a clean heart, O God.
  - type: text
    content: Renew a loyal spirit within me.
  '11':
  - type: text
    content: Do not banish me from your presence,
  - type: text
    content: and don’t take your Holy Spirit
  - type: note
    content: Or your spirit of holiness.
  - type: text
    content: ' from me.'
  '12':
  - type: text
    content: Restore to me the joy of your salvation,
  - type: text
    content: and make me willing to obey you.
  '13':
  - type: text
    content: Then I will teach your ways to rebels,
  - type: text
    content: and they will return to you.
  '14':
  - type: text
    content: Forgive me for shedding blood, O God who saves;
  - type: text
    content: then I will joyfully sing of your forgiveness.
  '15':
  - type: text
    content: Unseal my lips, O Lord,
  - type: text
    content: that my mouth may praise you.
  '16':
  - type: text
    content: You do not desire a sacrifice, or I would offer one.
  - type: text
    content: You do not want a burnt offering.
  '17':
  - type: text
    content: The sacrifice you desire is a broken spirit.
  - type: text
    content: You will not reject a broken and repentant heart, O God.
  '18':
  - type: text
    content: Look with favor on Zion and help her;
  - type: text
    content: rebuild the walls of Jerusalem.
  '19':
  - type: text
    content: Then you will be pleased with sacrifices offered in the right spirit—
  - type: text
    content: with burnt offerings and whole burnt offerings.
  - type: text
    content: Then bulls will again be sacrificed on your altar.
  '2':
  - type: text
    content: Wash me clean from my guilt.
  - type: text
    content: Purify me from my sin.
  '3':
  - type: text
    content: For I recognize my rebellion;
  - type: text
    content: it haunts me day and night.
  '4':
  - type: text
    content: Against you, and you alone, have I sinned;
  - type: text
    content: I have done what is evil in your sight.
  - type: text
    content: You will be proved right in what you say,
  - type: text
    content: and your judgment against me is just.
  - type: note
    content: Greek version reads and you will win your case in court. Compare Rom 3:4.
  '5':
  - type: text
    content: For I was born a sinner—
  - type: text
    content: yes, from the moment my mother conceived me.
  '6':
  - type: text
    content: But you desire honesty from the womb,
  - type: note
    content: Or from the heart; Hebrew reads in the inward parts.
  - type: text
    content: teaching me wisdom even there.
  '7':
  - type: text
    content: Purify me from my sins,
  - type: note
    content: Hebrew Purify me with the hyssop branch.
  - type: text
    content: ' and I will be clean;'
  - type: text
    content: wash me, and I will be whiter than snow.
  '8':
  - type: text
    content: Oh, give me back my joy again;
  - type: text
    content: you have broken me—
  - type: text
    content: now let me rejoice.
  '9':
  - type: text
    content: Don’t keep looking at my sins.
  - type: text
    content: Remove the stain of my guilt.
