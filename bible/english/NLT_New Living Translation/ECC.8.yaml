document_id: ECC.8,116
type_code: eng
verses:
  '1':
  - type: text
    content: How wonderful to be wise,
  - type: text
    content: to analyze and interpret things.
  - type: text
    content: Wisdom lights up a person’s face,
  - type: text
    content: softening its harshness.
  - type: heading
    content: Obedience to the King
  '10':
  - type: text
    content: I have seen wicked people buried with honor. Yet they were the very ones who frequented the Temple and are now praised
  - type: note
    content: As in some Hebrew manuscripts and Greek version; many Hebrew manuscripts read and are forgotten.
  - type: text
    content: ' in the same city where they committed their crimes! This, too, is meaningless. '
  '11':
  - type: text
    content: 'When a crime is not punished quickly, people feel it is safe to do wrong. '
  '12':
  - type: text
    content: 'But even though a person sins a hundred times and still lives a long time, I know that those who fear God will be better off. '
  '13':
  - type: text
    content: The wicked will not prosper, for they do not fear God. Their days will never grow long like the evening shadows.
  '14':
  - type: text
    content: And this is not all that is meaningless in our world. In this life, good people are often treated as though they were wicked, and wicked people are often treated as though they were good. This is so meaningless!
  '15':
  - type: text
    content: So I recommend having fun, because there is nothing better for people in this world than to eat, drink, and enjoy life. That way they will experience some happiness along with all the hard work God gives them under the sun.
  '16':
  - type: text
    content: 'In my search for wisdom and in my observation of people’s burdens here on earth, I discovered that there is ceaseless activity, day and night. '
  '17':
  - type: text
    content: I realized that no one can discover everything God is doing under the sun. Not even the wisest people discover everything, no matter what they claim.
  '2':
  - type: text
    content: 'Obey the king since you vowed to God that you would. '
  '3':
  - type: text
    content: 'Don’t try to avoid doing your duty, and don’t stand with those who plot evil, for the king can do whatever he wants. '
  '4':
  - type: text
    content: 'His command is backed by great power. No one can resist or question it. '
  '5':
  - type: text
    content: 'Those who obey him will not be punished. Those who are wise will find a time and a way to do what is right, '
  '6':
  - type: text
    content: for there is a time and a way for everything, even when a person is in trouble.
  '7':
  - type: text
    content: 'Indeed, how can people avoid what they don’t know is going to happen? '
  '8':
  - type: text
    content: None of us can hold back our spirit from departing. None of us has the power to prevent the day of our death. There is no escaping that obligation, that dark battle. And in the face of death, wickedness will certainly not rescue the wicked.
  - type: heading
    content: The Wicked and the Righteous
  '9':
  - type: text
    content: 'I have thought deeply about all that goes on here under the sun, where people have the power to hurt each other. '
