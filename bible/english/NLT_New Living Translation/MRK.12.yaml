document_id: MRK.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of the Evil Farmers
  - type: text
    content: 'Then Jesus began teaching them with stories: '
  - type: text
    content: “A man planted a vineyard. He built a wall around it, dug a pit for pressing out the grape juice, and built a lookout tower. Then he leased the vineyard to tenant farmers and moved to another country.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Didn’t you ever read this in the Scriptures?
  - type: text
    content: ‘The stone that the builders rejected
  - type: text
    content: has now become the cornerstone.
  '11':
  - type: text
    content: ' '
  - type: text
    content: 'This is the '
  - type: text
    content: Lord
  - type: text
    content: ’s doing,
  - type: text
    content: and it is wonderful to see.’
  - type: text
    content: ' '
  - type: note
    content: Ps 118:22-23.
  - type: text
    content: ”
  '12':
  - type: text
    content: The religious leaders
  - type: note
    content: Greek They.
  - type: text
    content: ' wanted to arrest Jesus because they realized he was telling the story against them—they were the wicked farmers. But they were afraid of the crowd, so they left him and went away.'
  - type: heading
    content: Taxes for Caesar
  '13':
  - type: text
    content: 'Later the leaders sent some Pharisees and supporters of Herod to trap Jesus into saying something for which he could be arrested. '
  '14':
  - type: text
    content: '“Teacher,” they said, “we know how honest you are. You are impartial and don’t play favorites. You teach the way of God truthfully. Now tell us—is it right to pay taxes to Caesar or not? '
  '15':
  - type: text
    content: Should we pay them, or shouldn’t we?”
  - type: text
    content: 'Jesus saw through their hypocrisy and said, '
  - type: text
    content: “Why are you trying to trap me? Show me a Roman coin,
  - type: note
    content: Greek a denarius.
  - type: text
    content: ' '
  - type: text
    content: and I’ll tell you.”
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'When they handed it to him, he asked, '
  - type: text
    content: “Whose picture and title are stamped on it?”
  - type: text
    content: “Caesar’s,” they replied.
  '17':
  - type: text
    content: ' '
  - type: text
    content: '“Well, then,” '
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “give to Caesar what belongs to Caesar, and give to God what belongs to God.”
  - type: text
    content: His reply completely amazed them.
  - type: heading
    content: Discussion about Resurrection
  '18':
  - type: text
    content: 'Then Jesus was approached by some Sadducees—religious leaders who say there is no resurrection from the dead. They posed this question: '
  '19':
  - type: text
    content: “Teacher, Moses gave us a law that if a man dies, leaving a wife without children, his brother should marry the widow and have a child who will carry on the brother’s name.
  - type: note
    content: See Deut 25:5-6.
  - type: text
    content: ' '
  '2':
  - type: text
    content: At the time of the grape harvest, he sent one of his servants to collect his share of the crop.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Well, suppose there were seven brothers. The oldest one married and then died without children. '
  '21':
  - type: text
    content: 'So the second brother married the widow, but he also died without children. Then the third brother married her. '
  '22':
  - type: text
    content: 'This continued with all seven of them, and still there were no children. Last of all, the woman also died. '
  '23':
  - type: text
    content: So tell us, whose wife will she be in the resurrection? For all seven were married to her.”
  '24':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Your mistake is that you don’t know the Scriptures, and you don’t know the power of God.
  - type: text
    content: ' '
  '25':
  - type: text
    content: For when the dead rise, they will neither marry nor be given in marriage. In this respect they will be like the angels in heaven.
  '26':
  - type: text
    content: ' '
  - type: text
    content: “But now, as to whether the dead will be raised—haven’t you ever read about this in the writings of Moses, in the story of the burning bush? Long after Abraham, Isaac, and Jacob had died, God said to Moses,
  - type: text
    content: ' '
  - type: note
    content: Greek in the story of the bush? God said to him.
  - type: text
    content: ‘I am the God of Abraham, the God of Isaac, and the God of Jacob.’
  - type: note
    content: Exod 3:6.
  - type: text
    content: ' '
  '27':
  - type: text
    content: So he is the God of the living, not the dead. You have made a serious error.”
  - type: heading
    content: The Most Important Commandment
  '28':
  - type: text
    content: One of the teachers of religious law was standing there listening to the debate. He realized that Jesus had answered well, so he asked, “Of all the commandments, which is the most important?”
  '29':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: '“The most important commandment is this: ‘Listen, O Israel! The '
  - type: text
    content: Lord
  - type: text
    content: ' our God is the one and only '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: ' '
  '3':
  - type: text
    content: But the farmers grabbed the servant, beat him up, and sent him back empty-handed.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And you must love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with all your heart, all your soul, all your mind, and all your strength.’'
  - type: note
    content: Deut 6:4-5.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'The second is equally important: ‘Love your neighbor as yourself.’'
  - type: note
    content: Lev 19:18.
  - type: text
    content: ' '
  - type: text
    content: No other commandment is greater than these.”
  '32':
  - type: text
    content: 'The teacher of religious law replied, “Well said, Teacher. You have spoken the truth by saying that there is only one God and no other. '
  '33':
  - type: text
    content: And I know it is important to love him with all my heart and all my understanding and all my strength, and to love my neighbor as myself. This is more important than to offer all of the burnt offerings and sacrifices required in the law.”
  '34':
  - type: text
    content: 'Realizing how much the man understood, Jesus said to him, '
  - type: text
    content: “You are not far from the Kingdom of God.”
  - type: text
    content: ' And after that, no one dared to ask him any more questions.'
  - type: heading
    content: Whose Son Is the Messiah?
  '35':
  - type: text
    content: 'Later, as Jesus was teaching the people in the Temple, he asked, '
  - type: text
    content: “Why do the teachers of religious law claim that the Messiah is the son of David?
  - type: text
    content: ' '
  '36':
  - type: text
    content: For David himself, speaking under the inspiration of the Holy Spirit, said,
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' said to my Lord,'
  - type: text
    content: Sit in the place of honor at my right hand
  - type: text
    content: until I humble your enemies beneath your feet.’
  - type: note
    content: Ps 110:1.
  '37':
  - type: text
    content: ' '
  - type: text
    content: Since David himself called the Messiah ‘my Lord,’ how can the Messiah be his son?”
  - type: text
    content: ' The large crowd listened to him with great delight.'
  '38':
  - type: text
    content: 'Jesus also taught: '
  - type: text
    content: “Beware of these teachers of religious law! For they like to parade around in flowing robes and receive respectful greetings as they walk in the marketplaces.
  - type: text
    content: ' '
  '39':
  - type: text
    content: And how they love the seats of honor in the synagogues and the head table at banquets.
  - type: text
    content: ' '
  '4':
  - type: text
    content: The owner then sent another servant, but they insulted him and beat him over the head.
  - type: text
    content: ' '
  '40':
  - type: text
    content: Yet they shamelessly cheat widows out of their property and then pretend to be pious by making long prayers in public. Because of this, they will be more severely punished.”
  - type: heading
    content: The Widow’s Offering
  '41':
  - type: text
    content: 'Jesus sat down near the collection box in the Temple and watched as the crowds dropped in their money. Many rich people put in large amounts. '
  '42':
  - type: text
    content: Then a poor widow came and dropped in two small coins.
  - type: note
    content: Greek two lepta, which is a kodrantes [i.e., a quadrans].
  '43':
  - type: text
    content: 'Jesus called his disciples to him and said, '
  - type: text
    content: “I tell you the truth, this poor widow has given more than all the others who are making contributions.
  - type: text
    content: ' '
  '44':
  - type: text
    content: For they gave a tiny part of their surplus, but she, poor as she is, has given everything she had to live on.”
  '5':
  - type: text
    content: The next servant he sent was killed. Others he sent were either beaten or killed,
  - type: text
    content: ' '
  '6':
  - type: text
    content: until there was only one left—his son whom he loved dearly. The owner finally sent him, thinking, ‘Surely they will respect my son.’
  '7':
  - type: text
    content: ' '
  - type: text
    content: “But the tenant farmers said to one another, ‘Here comes the heir to this estate. Let’s kill him and get the estate for ourselves!’
  - type: text
    content: ' '
  '8':
  - type: text
    content: So they grabbed him and murdered him and threw his body out of the vineyard.
  '9':
  - type: text
    content: ' '
  - type: text
    content: '“What do you suppose the owner of the vineyard will do?” '
  - type: text
    content: 'Jesus asked. '
  - type: text
    content: “I’ll tell you—he will come and kill those farmers and lease the vineyard to others.
  - type: text
    content: ' '
