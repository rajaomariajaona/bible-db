document_id: PRO.30,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sayings of Agur
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: The sayings of Agur son of Jakeh contain this message.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son of Jakeh from Massa; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son of Jakeh, an oracle.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am weary, O God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am weary and worn out, O God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew can also be translated '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The man declares this to Ithiel, / to Ithiel and to Ucal.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never slander a worker to the employer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or the person will curse you, and you will pay for it.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Some people curse their father
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do not thank their mother.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are pure in their own eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they are filthy and unwashed.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They look proudly around,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: casting disdainful glances.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have teeth like swords
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fangs like knives.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They devour the poor from the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the needy from among humanity.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The leech has two suckers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that cry out, “More, more!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: two daughters who cry out, “Give, give!”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There are three things that are never satisfied—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'no, four that never say, “Enough!”:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the grave,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Sheol.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the barren womb,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the thirsty desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the blazing fire.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The eye that mocks a father
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and despises a mother’s instructions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be plucked out by ravens of the valley
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and eaten by vultures.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There are three things that amaze me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'no, four things that I don’t understand:'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: how an eagle glides through the sky,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how a snake slithers on a rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how a ship navigates the ocean,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how a man loves a woman.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am too stupid to be human,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I lack common sense.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An adulterous woman consumes a man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then wipes her mouth and says, “What’s wrong with that?”
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There are three things that make the earth tremble—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'no, four it cannot endure:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a slave who becomes a king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an overbearing fool who prospers,
  '23':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a bitter woman who finally gets a husband,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a servant girl who supplants her mistress.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There are four things on earth that are small but unusually wise:'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ants—they aren’t strong,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they store up food all summer.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hyraxes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Coneys, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Rock badgers.
      marker-yv: yv-n
    - type: text
      text: —they aren’t powerful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they make their homes among the rocks.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Locusts—they have no king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they march in formation.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lizards—they are easy to catch,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they are found even in kings’ palaces.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There are three things that walk with stately stride—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'no, four that strut about:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have not mastered human wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor do I know the Holy One.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the lion, king of animals, who won’t turn aside for anything,
  '31':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the strutting rooster,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the male goat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a king as he leads his army.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you have been a fool by being proud or plotting evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cover your mouth in shame.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As the beating of cream yields butter
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and striking the nose causes bleeding,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so stirring up anger causes quarrels.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who but God goes up to heaven and comes back down?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who holds the wind in his fists?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who wraps up the oceans in his cloak?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who has created the whole wide world?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What is his name—and his son’s name?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tell me if you know!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every word of God proves true.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is a shield to all who come to him for protection.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not add to his words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or he may rebuke you and expose you as a liar.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, I beg two favors from you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let me have them before I die.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: First, help me never to tell a lie.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Second, give me neither poverty nor riches!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Give me just enough to satisfy my needs.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For if I grow rich, I may deny you and say, “Who is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ?”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And if I am too poor, I may steal and thus insult God’s holy name.
