document_id: PRO.30,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sayings of Agur
  - type: text
    content: The sayings of Agur son of Jakeh contain this message.
  - type: note
    content: Or son of Jakeh from Massa; or son of Jakeh, an oracle.
  - type: text
    content: I am weary, O God;
  - type: text
    content: I am weary and worn out, O God.
  - type: note
    content: The Hebrew can also be translated The man declares this to Ithiel, / to Ithiel and to Ucal.
  '10':
  - type: text
    content: Never slander a worker to the employer,
  - type: text
    content: or the person will curse you, and you will pay for it.
  '11':
  - type: text
    content: Some people curse their father
  - type: text
    content: and do not thank their mother.
  '12':
  - type: text
    content: They are pure in their own eyes,
  - type: text
    content: but they are filthy and unwashed.
  '13':
  - type: text
    content: They look proudly around,
  - type: text
    content: casting disdainful glances.
  '14':
  - type: text
    content: They have teeth like swords
  - type: text
    content: and fangs like knives.
  - type: text
    content: They devour the poor from the earth
  - type: text
    content: and the needy from among humanity.
  '15':
  - type: text
    content: The leech has two suckers
  - type: text
    content: that cry out, “More, more!”
  - type: note
    content: Hebrew two daughters who cry out, “Give, give!”
  - type: text
    content: There are three things that are never satisfied—
  - type: text
    content: 'no, four that never say, “Enough!”:'
  '16':
  - type: text
    content: the grave,
  - type: note
    content: Hebrew Sheol.
  - type: text
    content: the barren womb,
  - type: text
    content: the thirsty desert,
  - type: text
    content: the blazing fire.
  '17':
  - type: text
    content: The eye that mocks a father
  - type: text
    content: and despises a mother’s instructions
  - type: text
    content: will be plucked out by ravens of the valley
  - type: text
    content: and eaten by vultures.
  '18':
  - type: text
    content: There are three things that amaze me—
  - type: text
    content: 'no, four things that I don’t understand:'
  '19':
  - type: text
    content: how an eagle glides through the sky,
  - type: text
    content: how a snake slithers on a rock,
  - type: text
    content: how a ship navigates the ocean,
  - type: text
    content: how a man loves a woman.
  '2':
  - type: text
    content: I am too stupid to be human,
  - type: text
    content: and I lack common sense.
  '20':
  - type: text
    content: An adulterous woman consumes a man,
  - type: text
    content: then wipes her mouth and says, “What’s wrong with that?”
  '21':
  - type: text
    content: There are three things that make the earth tremble—
  - type: text
    content: 'no, four it cannot endure:'
  '22':
  - type: text
    content: a slave who becomes a king,
  - type: text
    content: an overbearing fool who prospers,
  '23':
  - type: text
    content: a bitter woman who finally gets a husband,
  - type: text
    content: a servant girl who supplants her mistress.
  '24':
  - type: text
    content: 'There are four things on earth that are small but unusually wise:'
  '25':
  - type: text
    content: Ants—they aren’t strong,
  - type: text
    content: but they store up food all summer.
  '26':
  - type: text
    content: Hyraxes
  - type: note
    content: Or Coneys, or Rock badgers.
  - type: text
    content: —they aren’t powerful,
  - type: text
    content: but they make their homes among the rocks.
  '27':
  - type: text
    content: Locusts—they have no king,
  - type: text
    content: but they march in formation.
  '28':
  - type: text
    content: Lizards—they are easy to catch,
  - type: text
    content: but they are found even in kings’ palaces.
  '29':
  - type: text
    content: There are three things that walk with stately stride—
  - type: text
    content: 'no, four that strut about:'
  '3':
  - type: text
    content: I have not mastered human wisdom,
  - type: text
    content: nor do I know the Holy One.
  '30':
  - type: text
    content: the lion, king of animals, who won’t turn aside for anything,
  '31':
  - type: text
    content: the strutting rooster,
  - type: text
    content: the male goat,
  - type: text
    content: a king as he leads his army.
  '32':
  - type: text
    content: If you have been a fool by being proud or plotting evil,
  - type: text
    content: cover your mouth in shame.
  '33':
  - type: text
    content: As the beating of cream yields butter
  - type: text
    content: and striking the nose causes bleeding,
  - type: text
    content: so stirring up anger causes quarrels.
  '4':
  - type: text
    content: Who but God goes up to heaven and comes back down?
  - type: text
    content: Who holds the wind in his fists?
  - type: text
    content: Who wraps up the oceans in his cloak?
  - type: text
    content: Who has created the whole wide world?
  - type: text
    content: What is his name—and his son’s name?
  - type: text
    content: Tell me if you know!
  '5':
  - type: text
    content: Every word of God proves true.
  - type: text
    content: He is a shield to all who come to him for protection.
  '6':
  - type: text
    content: Do not add to his words,
  - type: text
    content: or he may rebuke you and expose you as a liar.
  '7':
  - type: text
    content: O God, I beg two favors from you;
  - type: text
    content: let me have them before I die.
  '8':
  - type: text
    content: First, help me never to tell a lie.
  - type: text
    content: Second, give me neither poverty nor riches!
  - type: text
    content: Give me just enough to satisfy my needs.
  '9':
  - type: text
    content: 'For if I grow rich, I may deny you and say, “Who is the '
  - type: text
    content: Lord
  - type: text
    content: ?”
  - type: text
    content: And if I am too poor, I may steal and thus insult God’s holy name.
