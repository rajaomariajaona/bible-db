document_id: PRO.30
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sayings of Agur
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The sayings of Agur son of Jakeh contain this message.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'son of Jakeh from Massa; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son of Jakeh, an oracle.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am weary, O God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am weary and worn out, O God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew can also be translated '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The man declares this to Ithiel, / to Ithiel and to Ucal.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I am too stupid to be human,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I lack common sense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I have not mastered human wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor do I know the Holy One.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who but God goes up to heaven and comes back down?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who holds the wind in his fists?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who wraps up the oceans in his cloak?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who has created the whole wide world?
- type: usfm
  marker: q1
  children:
  - type: text
    text: What is his name—and his son’s name?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tell me if you know!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Every word of God proves true.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is a shield to all who come to him for protection.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Do not add to his words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or he may rebuke you and expose you as a liar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: O God, I beg two favors from you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let me have them before I die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: First, help me never to tell a lie.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Second, give me neither poverty nor riches!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give me just enough to satisfy my needs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For if I grow rich, I may deny you and say, “Who is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ?”
- type: usfm
  marker: q2
  children:
  - type: text
    text: And if I am too poor, I may steal and thus insult God’s holy name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Never slander a worker to the employer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the person will curse you, and you will pay for it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Some people curse their father
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do not thank their mother.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They are pure in their own eyes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they are filthy and unwashed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They look proudly around,
- type: usfm
  marker: q2
  children:
  - type: text
    text: casting disdainful glances.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They have teeth like swords
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fangs like knives.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They devour the poor from the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the needy from among humanity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The leech has two suckers
- type: usfm
  marker: q2
  children:
  - type: text
    text: that cry out, “More, more!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: two daughters who cry out, “Give, give!”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: There are three things that are never satisfied—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'no, four that never say, “Enough!”:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: the grave,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Sheol.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: the barren womb,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the thirsty desert,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the blazing fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The eye that mocks a father
- type: usfm
  marker: q2
  children:
  - type: text
    text: and despises a mother’s instructions
- type: usfm
  marker: q1
  children:
  - type: text
    text: will be plucked out by ravens of the valley
- type: usfm
  marker: q2
  children:
  - type: text
    text: and eaten by vultures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: There are three things that amaze me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'no, four things that I don’t understand:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: how an eagle glides through the sky,
- type: usfm
  marker: q2
  children:
  - type: text
    text: how a snake slithers on a rock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: how a ship navigates the ocean,
- type: usfm
  marker: q2
  children:
  - type: text
    text: how a man loves a woman.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: An adulterous woman consumes a man,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then wipes her mouth and says, “What’s wrong with that?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: There are three things that make the earth tremble—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'no, four it cannot endure:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: a slave who becomes a king,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an overbearing fool who prospers,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: a bitter woman who finally gets a husband,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a servant girl who supplants her mistress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'There are four things on earth that are small but unusually wise:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ants—they aren’t strong,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they store up food all summer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hyraxes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Coneys, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Rock badgers.
    marker-yv: yv-n
  - type: text
    text: —they aren’t powerful,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they make their homes among the rocks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Locusts—they have no king,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they march in formation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Lizards—they are easy to catch,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they are found even in kings’ palaces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: There are three things that walk with stately stride—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'no, four that strut about:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: the lion, king of animals, who won’t turn aside for anything,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: the strutting rooster,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the male goat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a king as he leads his army.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: If you have been a fool by being proud or plotting evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: cover your mouth in shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: As the beating of cream yields butter
- type: usfm
  marker: q2
  children:
  - type: text
    text: and striking the nose causes bleeding,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so stirring up anger causes quarrels.
