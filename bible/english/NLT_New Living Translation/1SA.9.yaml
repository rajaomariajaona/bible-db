document_id: 1SA.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saul Meets Samuel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'There was a wealthy, influential man named Kish from the tribe of Benjamin. He was the son of Abiel, son of Zeror, son of Becorath, son of Aphiah, of the tribe of Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: His son Saul was the most handsome man in Israel—head and shoulders taller than anyone else in the land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'One day Kish’s donkeys strayed away, and he told Saul, “Take a servant with you, and go look for the donkeys.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So Saul took one of the servants and traveled through the hill country of Ephraim, the land of Shalishah, the Shaalim area, and the entire land of Benjamin, but they couldn’t find the donkeys anywhere.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Finally, they entered the region of Zuph, and Saul said to his servant, “Let’s go home. By now my father will be more worried about us than about the donkeys!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But the servant said, “I’ve just thought of something! There is a man of God who lives here in this town. He is held in high honor by all the people because everything he says comes true. Let’s go find him. Perhaps he can tell us which way to go.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “But we don’t have anything to offer him,” Saul replied. “Even our food is gone, and we don’t have a thing to give him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Well,” the servant said, “I have one small silver piece.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1/4 shekel of silver, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: about 0.1 ounces or 3 grams in weight.
    marker-yv: yv-n
  - type: text
    text: ' We can at least offer it to the man of God and see what happens!” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: (In those days if people wanted a message from God, they would say, “Let’s go and ask the seer,” for prophets used to be called seers.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “All right,” Saul agreed, “let’s try it!” So they started into the town where the man of God lived.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: As they were climbing the hill to the town, they met some young women coming out to draw water. So Saul and his servant asked, “Is the seer here today?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Yes,” they replied. “Stay right on this road. He is at the town gates. He has just arrived to take part in a public sacrifice up at the place of worship. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hurry and catch him before he goes up there to eat. The guests won’t begin eating until he arrives to bless the food.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: So they entered the town, and as they passed through the gates, Samuel was coming out toward them to go up to the place of worship.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had told Samuel the previous day, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “About this time tomorrow I will send you a man from the land of Benjamin. Anoint him to be the leader of my people, Israel. He will rescue them from the Philistines, for I have looked down on my people in mercy and have heard their cry.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When Samuel saw Saul, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “That’s the man I told you about! He will rule my people.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Just then Saul approached Samuel at the gateway and asked, “Can you please tell me where the seer’s house is?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“I am the seer!” Samuel replied. “Go up to the place of worship ahead of me. We will eat there together, and in the morning I’ll tell you what you want to know and send you on your way. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And don’t worry about those donkeys that were lost three days ago, for they have been found. And I am here to tell you that you and your family are the focus of all Israel’s hopes.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Saul replied, “But I’m only from the tribe of Benjamin, the smallest tribe in Israel, and my family is the least important of all the families of that tribe! Why are you talking like this to me?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then Samuel brought Saul and his servant into the hall and placed them at the head of the table, honoring them above the thirty special guests. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Samuel then instructed the cook to bring Saul the finest cut of meat, the piece that had been set aside for the guest of honor. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So the cook brought in the meat and placed it before Saul. “Go ahead and eat it,” Samuel said. “I was saving it for you even before I invited these others!” So Saul ate with Samuel that day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: When they came down from the place of worship and returned to town, Samuel took Saul up to the roof of the house and prepared a bed for him there.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and talked with him there.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'At daybreak the next morning, Samuel called to Saul, “Get up! It’s time you were on your way.” So Saul got ready, and he and Samuel left the house together. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: When they reached the edge of town, Samuel told Saul to send his servant on ahead. After the servant was gone, Samuel said, “Stay here, for I have received a special message for you from God.”
