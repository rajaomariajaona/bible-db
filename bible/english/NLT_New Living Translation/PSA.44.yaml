document_id: PSA.44,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm'
  - type: note
    content: Hebrew maskil. This may be a literary or musical term.
  - type: text
    content: ' of the descendants of Korah.'
  - type: text
    content: O God, we have heard it with our own ears—
  - type: text
    content: our ancestors have told us
  - type: text
    content: of all you did in their day,
  - type: text
    content: 'in days long ago:'
  '10':
  - type: text
    content: You make us retreat from our enemies
  - type: text
    content: and allow those who hate us to plunder our land.
  '11':
  - type: text
    content: You have butchered us like sheep
  - type: text
    content: and scattered us among the nations.
  '12':
  - type: text
    content: You sold your precious people for a pittance,
  - type: text
    content: making nothing on the sale.
  '13':
  - type: text
    content: You let our neighbors mock us.
  - type: text
    content: We are an object of scorn and derision to those around us.
  '14':
  - type: text
    content: You have made us the butt of their jokes;
  - type: text
    content: they shake their heads at us in scorn.
  '15':
  - type: text
    content: We can’t escape the constant humiliation;
  - type: text
    content: shame is written across our faces.
  '16':
  - type: text
    content: All we hear are the taunts of our mockers.
  - type: text
    content: All we see are our vengeful enemies.
  '17':
  - type: text
    content: All this has happened though we have not forgotten you.
  - type: text
    content: We have not violated your covenant.
  '18':
  - type: text
    content: Our hearts have not deserted you.
  - type: text
    content: We have not strayed from your path.
  '19':
  - type: text
    content: Yet you have crushed us in the jackal’s desert home.
  - type: text
    content: You have covered us with darkness and death.
  '2':
  - type: text
    content: You drove out the pagan nations by your power
  - type: text
    content: and gave all the land to our ancestors.
  - type: text
    content: You crushed their enemies
  - type: text
    content: and set our ancestors free.
  '20':
  - type: text
    content: If we had forgotten the name of our God
  - type: text
    content: or spread our hands in prayer to foreign gods,
  '21':
  - type: text
    content: God would surely have known it,
  - type: text
    content: for he knows the secrets of every heart.
  '22':
  - type: text
    content: But for your sake we are killed every day;
  - type: text
    content: we are being slaughtered like sheep.
  '23':
  - type: text
    content: Wake up, O Lord! Why do you sleep?
  - type: text
    content: Get up! Do not reject us forever.
  '24':
  - type: text
    content: Why do you look the other way?
  - type: text
    content: Why do you ignore our suffering and oppression?
  '25':
  - type: text
    content: We collapse in the dust,
  - type: text
    content: lying face down in the dirt.
  '26':
  - type: text
    content: Rise up! Help us!
  - type: text
    content: Ransom us because of your unfailing love.
  '3':
  - type: text
    content: They did not conquer the land with their swords;
  - type: text
    content: it was not their own strong arm that gave them victory.
  - type: text
    content: It was your right hand and strong arm
  - type: text
    content: and the blinding light from your face that helped them,
  - type: text
    content: for you loved them.
  '4':
  - type: text
    content: You are my King and my God.
  - type: text
    content: You command victories for Israel.
  - type: note
    content: Hebrew for Jacob. The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
  '5':
  - type: text
    content: Only by your power can we push back our enemies;
  - type: text
    content: only in your name can we trample our foes.
  '6':
  - type: text
    content: I do not trust in my bow;
  - type: text
    content: I do not count on my sword to save me.
  '7':
  - type: text
    content: You are the one who gives us victory over our enemies;
  - type: text
    content: you disgrace those who hate us.
  '8':
  - type: text
    content: O God, we give glory to you all day long
  - type: text
    content: 'and constantly praise your name. '
  - type: text
    content: Interlude
  '9':
  - type: text
    content: But now you have tossed us aside in dishonor.
  - type: text
    content: You no longer lead our armies to battle.
