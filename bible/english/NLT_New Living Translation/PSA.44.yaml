document_id: PSA.44,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44:TITLE '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maskil. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may be a literary or musical term.
      marker-yv: yv-n
    - type: text
      text: ' of the descendants of Korah.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O God, we have heard it with our own ears—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our ancestors have told us
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of all you did in their day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in days long ago:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: You make us retreat from our enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and allow those who hate us to plunder our land.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: You have butchered us like sheep
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and scattered us among the nations.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: You sold your precious people for a pittance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: making nothing on the sale.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: You let our neighbors mock us.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We are an object of scorn and derision to those around us.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: You have made us the butt of their jokes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they shake their heads at us in scorn.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: We can’t escape the constant humiliation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shame is written across our faces.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: All we hear are the taunts of our mockers.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All we see are our vengeful enemies.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: All this has happened though we have not forgotten you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We have not violated your covenant.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Our hearts have not deserted you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We have not strayed from your path.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Yet you have crushed us in the jackal’s desert home.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have covered us with darkness and death.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You drove out the pagan nations by your power
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gave all the land to our ancestors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You crushed their enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and set our ancestors free.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: If we had forgotten the name of our God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or spread our hands in prayer to foreign gods,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: God would surely have known it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he knows the secrets of every heart.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: But for your sake we are killed every day;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we are being slaughtered like sheep.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Wake up, O Lord! Why do you sleep?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Get up! Do not reject us forever.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Why do you look the other way?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do you ignore our suffering and oppression?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: We collapse in the dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lying face down in the dirt.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Rise up! Help us!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ransom us because of your unfailing love.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: They did not conquer the land with their swords;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it was not their own strong arm that gave them victory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was your right hand and strong arm
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the blinding light from your face that helped them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you loved them.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: You are my King and my God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You command victories for Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'for Jacob. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Only by your power can we push back our enemies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: only in your name can we trample our foes.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I do not trust in my bow;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I do not count on my sword to save me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: You are the one who gives us victory over our enemies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you disgrace those who hate us.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: O God, we give glory to you all day long
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and constantly praise your name. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: But now you have tossed us aside in dishonor.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You no longer lead our armies to battle.
