document_id: LUK.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of the Shrewd Manager
  - type: text
    content: 'Jesus told this story to his disciples: '
  - type: text
    content: “There was a certain rich man who had a manager handling his affairs. One day a report came that the manager was wasting his employer’s money.
  - type: text
    content: ' '
  '10':
  - type: text
    content: ' '
  - type: text
    content: “If you are faithful in little things, you will be faithful in large ones. But if you are dishonest in little things, you won’t be honest with greater responsibilities.
  - type: text
    content: ' '
  '11':
  - type: text
    content: And if you are untrustworthy about worldly wealth, who will trust you with the true riches of heaven?
  - type: text
    content: ' '
  '12':
  - type: text
    content: And if you are not faithful with other people’s things, why should you be trusted with things of your own?
  '13':
  - type: text
    content: ' '
  - type: text
    content: “No one can serve two masters. For you will hate one and love the other; you will be devoted to one and despise the other. You cannot serve God and be enslaved to money.”
  '14':
  - type: text
    content: 'The Pharisees, who dearly loved their money, heard all this and scoffed at him. '
  '15':
  - type: text
    content: 'Then he said to them, '
  - type: text
    content: “You like to appear righteous in public, but God knows your hearts. What this world honors is detestable in the sight of God.
  '16':
  - type: text
    content: ' '
  - type: text
    content: “Until John the Baptist, the law of Moses and the messages of the prophets were your guides. But now the Good News of the Kingdom of God is preached, and everyone is eager to get in.
  - type: text
    content: ' '
  - type: note
    content: Or everyone is urged to enter in.
  '17':
  - type: text
    content: But that doesn’t mean that the law has lost its force. It is easier for heaven and earth to disappear than for the smallest point of God’s law to be overturned.
  '18':
  - type: text
    content: ' '
  - type: text
    content: “For example, a man who divorces his wife and marries someone else commits adultery. And anyone who marries a woman divorced from her husband commits adultery.”
  - type: heading
    content: Parable of the Rich Man and Lazarus
  '19':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “There was a certain rich man who was splendidly clothed in purple and fine linen and who lived each day in luxury.
  - type: text
    content: ' '
  '2':
  - type: text
    content: So the employer called him in and said, ‘What’s this I hear about you? Get your report in order, because you are going to be fired.’
  '20':
  - type: text
    content: At his gate lay a poor man named Lazarus who was covered with sores.
  - type: text
    content: ' '
  '21':
  - type: text
    content: As Lazarus lay there longing for scraps from the rich man’s table, the dogs would come and lick his open sores.
  '22':
  - type: text
    content: ' '
  - type: text
    content: “Finally, the poor man died and was carried by the angels to sit beside Abraham at the heavenly banquet.
  - type: text
    content: ' '
  - type: note
    content: Greek to Abraham’s bosom.
  - type: text
    content: The rich man also died and was buried,
  - type: text
    content: ' '
  '23':
  - type: text
    content: and he went to the place of the dead.
  - type: note
    content: Greek to Hades.
  - type: text
    content: ' '
  - type: text
    content: There, in torment, he saw Abraham in the far distance with Lazarus at his side.
  '24':
  - type: text
    content: ' '
  - type: text
    content: “The rich man shouted, ‘Father Abraham, have some pity! Send Lazarus over here to dip the tip of his finger in water and cool my tongue. I am in anguish in these flames.’
  '25':
  - type: text
    content: ' '
  - type: text
    content: “But Abraham said to him, ‘Son, remember that during your lifetime you had everything you wanted, and Lazarus had nothing. So now he is here being comforted, and you are in anguish.
  - type: text
    content: ' '
  '26':
  - type: text
    content: And besides, there is a great chasm separating us. No one can cross over to you from here, and no one can cross over to us from there.’
  '27':
  - type: text
    content: ' '
  - type: text
    content: “Then the rich man said, ‘Please, Father Abraham, at least send him to my father’s home.
  - type: text
    content: ' '
  '28':
  - type: text
    content: For I have five brothers, and I want him to warn them so they don’t end up in this place of torment.’
  '29':
  - type: text
    content: ' '
  - type: text
    content: “But Abraham said, ‘Moses and the prophets have warned them. Your brothers can read what they wrote.’
  '3':
  - type: text
    content: ' '
  - type: text
    content: “The manager thought to himself, ‘Now what? My boss has fired me. I don’t have the strength to dig ditches, and I’m too proud to beg.
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: text
    content: “The rich man replied, ‘No, Father Abraham! But if someone is sent to them from the dead, then they will repent of their sins and turn to God.’
  '31':
  - type: text
    content: ' '
  - type: text
    content: “But Abraham said, ‘If they won’t listen to Moses and the prophets, they won’t be persuaded even if someone rises from the dead.’”
  '4':
  - type: text
    content: Ah, I know how to ensure that I’ll have plenty of friends who will give me a home when I am fired.’
  '5':
  - type: text
    content: ' '
  - type: text
    content: “So he invited each person who owed money to his employer to come and discuss the situation. He asked the first one, ‘How much do you owe him?’
  - type: text
    content: ' '
  '6':
  - type: text
    content: The man replied, ‘I owe him 800 gallons of olive oil.’ So the manager told him, ‘Take the bill and quickly change it to 400 gallons.
  - type: note
    content: Greek 100 baths . . . 50 [baths].
  - type: text
    content: ’
  '7':
  - type: text
    content: ' '
  - type: text
    content: “‘And how much do you owe my employer?’ he asked the next man. ‘I owe him 1,000 bushels of wheat,’ was the reply. ‘Here,’ the manager said, ‘take the bill and change it to 800 bushels.
  - type: text
    content: ' '
  - type: note
    content: Greek 100 korous . . . 80 [korous].
  - type: text
    content: ’
  '8':
  - type: text
    content: ' '
  - type: text
    content: “The rich man had to admire the dishonest rascal for being so shrewd. And it is true that the children of this world are more shrewd in dealing with the world around them than are the children of the light.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Here’s the lesson: Use your worldly resources to benefit others and make friends. Then, when your possessions are gone, they will welcome you to an eternal home.'
  - type: note
    content: Or you will be welcomed into eternal homes.
