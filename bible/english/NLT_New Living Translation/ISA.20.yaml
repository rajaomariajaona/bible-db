document_id: ISA.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message about Egypt and Ethiopia
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: In the year when King Sargon of Assyria sent his commander in chief to capture the Philistine city of Ashdod,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ashdod was captured by Assyria in 711 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told Isaiah son of Amoz, “Take off the burlap you have been wearing, and remove your sandals.” Isaiah did as he was told and walked around naked and barefoot.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “My servant Isaiah has been walking around naked and barefoot for the last three years. This is a sign—a symbol of the terrible troubles I will bring upon Egypt and Ethiopia.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Cush; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 20:5.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For the king of Assyria will take away the Egyptians and Ethiopians
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Cushites.
    marker-yv: yv-n
  - type: text
    text: ' as prisoners. He will make them walk naked and barefoot, both young and old, their buttocks bared, to the shame of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the Philistines will be thrown into panic, for they counted on the power of Ethiopia and boasted of their allies in Egypt! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They will say, ‘If this can happen to Egypt, what chance do we have? We were counting on Egypt to protect us from the king of Assyria.’”
