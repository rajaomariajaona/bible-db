document_id: ISA.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Egypt and Ethiopia
  - type: text
    content: In the year when King Sargon of Assyria sent his commander in chief to capture the Philistine city of Ashdod,
  - type: note
    content: Ashdod was captured by Assyria in 711 b.c.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' told Isaiah son of Amoz, “Take off the burlap you have been wearing, and remove your sandals.” Isaiah did as he was told and walked around naked and barefoot.'
  '3':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “My servant Isaiah has been walking around naked and barefoot for the last three years. This is a sign—a symbol of the terrible troubles I will bring upon Egypt and Ethiopia.'
  - type: note
    content: Hebrew Cush; also in 20:5.
  - type: text
    content: ' '
  '4':
  - type: text
    content: For the king of Assyria will take away the Egyptians and Ethiopians
  - type: note
    content: Hebrew Cushites.
  - type: text
    content: ' as prisoners. He will make them walk naked and barefoot, both young and old, their buttocks bared, to the shame of Egypt. '
  '5':
  - type: text
    content: 'Then the Philistines will be thrown into panic, for they counted on the power of Ethiopia and boasted of their allies in Egypt! '
  '6':
  - type: text
    content: They will say, ‘If this can happen to Egypt, what chance do we have? We were counting on Egypt to protect us from the king of Assyria.’”
