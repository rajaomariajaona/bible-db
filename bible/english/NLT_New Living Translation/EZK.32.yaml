document_id: EZK.32,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Warning for Pharaoh
  - type: text
    content: On March 3,
  - type: note
    content: Hebrew On the first day of the twelfth month, of the ancient Hebrew lunar calendar. This event occurred on March 3, 585 b.c.; also see note on 1:1.
  - type: text
    content: ' during the twelfth year of King Jehoiachin’s captivity, this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'Yes, I will shock many lands, and their kings will be terrified at your fate. They will shudder in fear for their lives as I brandish my sword before them on the day of your fall. '
  '11':
  - type: text
    content: 'For this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “The sword of the king of Babylon
  - type: text
    content: will come against you.
  '12':
  - type: text
    content: I will destroy your hordes with the swords of mighty warriors—
  - type: text
    content: the terror of the nations.
  - type: text
    content: They will shatter the pride of Egypt,
  - type: text
    content: and all its hordes will be destroyed.
  '13':
  - type: text
    content: I will destroy all your flocks and herds
  - type: text
    content: that graze beside the streams.
  - type: text
    content: Never again will people or animals
  - type: text
    content: muddy those waters with their feet.
  '14':
  - type: text
    content: Then I will let the waters of Egypt become calm again,
  - type: text
    content: and they will flow as smoothly as olive oil,
  - type: text
    content: 'says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: And when I destroy Egypt
  - type: text
    content: and strip you of everything you own
  - type: text
    content: and strike down all your people,
  - type: text
    content: 'then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '16':
  - type: text
    content: Yes, this is the funeral song
  - type: text
    content: they will sing for Egypt.
  - type: text
    content: Let all the nations mourn.
  - type: text
    content: Let them mourn for Egypt and its hordes.
  - type: text
    content: 'I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  - type: heading
    content: Egypt Falls into the Pit
  '17':
  - type: text
    content: On March 17,
  - type: note
    content: Hebrew On the fifteenth day of the month, presumably in the twelfth month of the ancient Hebrew lunar calendar (see 32:1). This would put this message at the end of King Jehoiachin’s twelfth year of captivity, on March 17, 585 b.c.; also see note on 1:1. Greek version reads On the fifteenth day of the first month, which would put this message on April 27, 586 b.c., at the beginning of Jehoiachin’s twelfth year.
  - type: text
    content: ' during the twelfth year, another message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '18':
  - type: text
    content: “Son of man, weep for the hordes of Egypt and for the other mighty nations.
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' For I will send them down to the world below in company with those who descend to the pit. '
  '19':
  - type: text
    content: Say to them,
  - type: text
    content: ‘O Egypt, are you lovelier than the other nations?
  - type: text
    content: No! So go down to the pit and lie there among the outcasts.
  - type: note
    content: Hebrew the uncircumcised; also in 32:21, 24, 25, 26, 28, 29, 30, 32.
  - type: text
    content: ’
  '2':
  - type: text
    content: '“Son of man, mourn for Pharaoh, king of Egypt, and give him this message:'
  - type: text
    content: “You think of yourself as a strong young lion among the nations,
  - type: text
    content: but you are really just a sea monster,
  - type: text
    content: heaving around in your own rivers,
  - type: text
    content: stirring up mud with your feet.
  '20':
  - type: text
    content: 'The Egyptians will fall with the many who have died by the sword, for the sword is drawn against them. Egypt and its hordes will be dragged away to their judgment. '
  '21':
  - type: text
    content: Down in the grave
  - type: note
    content: Hebrew in Sheol.
  - type: text
    content: ' mighty leaders will mockingly welcome Egypt and its allies, saying, ‘They have come down; they lie among the outcasts, hordes slaughtered by the sword.’'
  '22':
  - type: text
    content: '“Assyria lies there surrounded by the graves of its army, those who were slaughtered by the sword. '
  '23':
  - type: text
    content: Their graves are in the depths of the pit, and they are surrounded by their allies. They struck terror in the hearts of people everywhere, but now they have been slaughtered by the sword.
  '24':
  - type: text
    content: '“Elam lies there surrounded by the graves of all its hordes, those who were slaughtered by the sword. They struck terror in the hearts of people everywhere, but now they have descended as outcasts to the world below. Now they lie in the pit and share the shame of those who have gone before them. '
  '25':
  - type: text
    content: They have a resting place among the slaughtered, surrounded by the graves of all their hordes. Yes, they terrorized the nations while they lived, but now they lie in shame with others in the pit, all of them outcasts, slaughtered by the sword.
  '26':
  - type: text
    content: '“Meshech and Tubal are there, surrounded by the graves of all their hordes. They once struck terror in the hearts of people everywhere. But now they are outcasts, all slaughtered by the sword. '
  '27':
  - type: text
    content: They are not buried in honor like their fallen heroes, who went down to the grave
  - type: note
    content: Hebrew to Sheol.
  - type: text
    content: ' with their weapons—their shields covering their bodies'
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' and their swords beneath their heads. Their guilt rests upon them because they brought terror to everyone while they were still alive.'
  '28':
  - type: text
    content: “You too, Egypt, will lie crushed and broken among the outcasts, all slaughtered by the sword.
  '29':
  - type: text
    content: “Edom is there with its kings and princes. Mighty as they were, they also lie among those slaughtered by the sword, with the outcasts who have gone down to the pit.
  '3':
  - type: text
    content: 'Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: I will send many people
  - type: text
    content: to catch you in my net
  - type: text
    content: and haul you out of the water.
  '30':
  - type: text
    content: “All the princes of the north and the Sidonians are there with others who have died. Once a terror, they have been put to shame. They lie there as outcasts with others who were slaughtered by the sword. They share the shame of all who have descended to the pit.
  '31':
  - type: text
    content: '“When Pharaoh and his entire army arrive, he will take comfort that he is not alone in having his hordes killed, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Although I have caused his terror to fall upon all the living, Pharaoh and his hordes will lie there among the outcasts who were slaughtered by the sword. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '4':
  - type: text
    content: I will leave you stranded on the land to die.
  - type: text
    content: All the birds of the heavens will land on you,
  - type: text
    content: and the wild animals of the whole earth
  - type: text
    content: will gorge themselves on you.
  '5':
  - type: text
    content: I will scatter your flesh on the hills
  - type: text
    content: and fill the valleys with your bones.
  '6':
  - type: text
    content: I will drench the earth with your gushing blood
  - type: text
    content: all the way to the mountains,
  - type: text
    content: filling the ravines to the brim.
  '7':
  - type: text
    content: When I blot you out,
  - type: text
    content: I will veil the heavens and darken the stars.
  - type: text
    content: I will cover the sun with a cloud,
  - type: text
    content: and the moon will not give you its light.
  '8':
  - type: text
    content: I will darken the bright stars overhead
  - type: text
    content: and cover your land in darkness.
  - type: text
    content: 'I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '9':
  - type: text
    content: '“I will disturb many hearts when I bring news of your downfall to distant nations you have never seen. '
