document_id: EZK.32
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Warning for Pharaoh
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: On March 3,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the first day of the twelfth month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. This event occurred on March 3, 585 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 1:1.
    marker-yv: yv-n
  - type: text
    text: ' during the twelfth year of King Jehoiachin’s captivity, this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, mourn for Pharaoh, king of Egypt, and give him this message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You think of yourself as a strong young lion among the nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you are really just a sea monster,
- type: usfm
  marker: q1
  children:
  - type: text
    text: heaving around in your own rivers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: stirring up mud with your feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Therefore, this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will send many people
- type: usfm
  marker: q2
  children:
  - type: text
    text: to catch you in my net
- type: usfm
  marker: q2
  children:
  - type: text
    text: and haul you out of the water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will leave you stranded on the land to die.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All the birds of the heavens will land on you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the wild animals of the whole earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: will gorge themselves on you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I will scatter your flesh on the hills
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fill the valleys with your bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I will drench the earth with your gushing blood
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the way to the mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: filling the ravines to the brim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When I blot you out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will veil the heavens and darken the stars.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will cover the sun with a cloud,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the moon will not give you its light.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I will darken the bright stars overhead
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cover your land in darkness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“I will disturb many hearts when I bring news of your downfall to distant nations you have never seen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Yes, I will shock many lands, and their kings will be terrified at your fate. They will shudder in fear for their lives as I brandish my sword before them on the day of your fall. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The sword of the king of Babylon
- type: usfm
  marker: q2
  children:
  - type: text
    text: will come against you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I will destroy your hordes with the swords of mighty warriors—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the terror of the nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will shatter the pride of Egypt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all its hordes will be destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I will destroy all your flocks and herds
- type: usfm
  marker: q2
  children:
  - type: text
    text: that graze beside the streams.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Never again will people or animals
- type: usfm
  marker: q2
  children:
  - type: text
    text: muddy those waters with their feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then I will let the waters of Egypt become calm again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will flow as smoothly as olive oil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And when I destroy Egypt
- type: usfm
  marker: q2
  children:
  - type: text
    text: and strip you of everything you own
- type: usfm
  marker: q1
  children:
  - type: text
    text: and strike down all your people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'then you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Yes, this is the funeral song
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will sing for Egypt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let all the nations mourn.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let them mourn for Egypt and its hordes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Egypt Falls into the Pit
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: On March 17,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the fifteenth day of the month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'presumably in the twelfth month of the ancient Hebrew lunar calendar (see 32:1). This would put this message at the end of King Jehoiachin’s twelfth year of captivity, on March 17, 585 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: '; also see note on 1:1. Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the fifteenth day of the first month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'which would put this message on April 27, 586 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ', at the beginning of Jehoiachin’s twelfth year.'
    marker-yv: yv-n
  - type: text
    text: ' during the twelfth year, another message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Son of man, weep for the hordes of Egypt and for the other mighty nations.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' For I will send them down to the world below in company with those who descend to the pit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Say to them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘O Egypt, are you lovelier than the other nations?
- type: usfm
  marker: q2
  children:
  - type: text
    text: No! So go down to the pit and lie there among the outcasts.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the uncircumcised; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 32:21, 24, 25, 26, 28, 29, 30, 32.
    marker-yv: yv-n
  - type: text
    text: ’
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The Egyptians will fall with the many who have died by the sword, for the sword is drawn against them. Egypt and its hordes will be dragged away to their judgment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Down in the grave
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in Sheol.
    marker-yv: yv-n
  - type: text
    text: ' mighty leaders will mockingly welcome Egypt and its allies, saying, ‘They have come down; they lie among the outcasts, hordes slaughtered by the sword.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“Assyria lies there surrounded by the graves of its army, those who were slaughtered by the sword. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Their graves are in the depths of the pit, and they are surrounded by their allies. They struck terror in the hearts of people everywhere, but now they have been slaughtered by the sword.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“Elam lies there surrounded by the graves of all its hordes, those who were slaughtered by the sword. They struck terror in the hearts of people everywhere, but now they have descended as outcasts to the world below. Now they lie in the pit and share the shame of those who have gone before them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: They have a resting place among the slaughtered, surrounded by the graves of all their hordes. Yes, they terrorized the nations while they lived, but now they lie in shame with others in the pit, all of them outcasts, slaughtered by the sword.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“Meshech and Tubal are there, surrounded by the graves of all their hordes. They once struck terror in the hearts of people everywhere. But now they are outcasts, all slaughtered by the sword. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: They are not buried in honor like their fallen heroes, who went down to the grave
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:27a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to Sheol.
    marker-yv: yv-n
  - type: text
    text: ' with their weapons—their shields covering their bodies'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:27b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' and their swords beneath their heads. Their guilt rests upon them because they brought terror to everyone while they were still alive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “You too, Egypt, will lie crushed and broken among the outcasts, all slaughtered by the sword.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Edom is there with its kings and princes. Mighty as they were, they also lie among those slaughtered by the sword, with the outcasts who have gone down to the pit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “All the princes of the north and the Sidonians are there with others who have died. Once a terror, they have been put to shame. They lie there as outcasts with others who were slaughtered by the sword. They share the shame of all who have descended to the pit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“When Pharaoh and his entire army arrive, he will take comfort that he is not alone in having his hordes killed, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Although I have caused his terror to fall upon all the living, Pharaoh and his hordes will lie there among the outcasts who were slaughtered by the sword. I, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
