document_id: PSA.18
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of David, the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. He sang this song to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' on the day the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rescued him from all his enemies and from Saul. He sang:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I love you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you are my strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is my rock, my fortress, and my savior;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: my God is my rock, in whom I find protection.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is my shield, the power that saves me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my place of safety.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I called on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who is worthy of praise,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he saved me from my enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The ropes of death entangled me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: floods of destruction swept over me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The grave
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Sheol.
    marker-yv: yv-n
  - type: text
    text: ' wrapped its ropes around me;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: death laid a trap in my path.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But in my distress I cried out to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, I prayed to my God for help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He heard me from his sanctuary;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my cry to him reached his ears.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then the earth quaked and trembled.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The foundations of the mountains shook;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they quaked because of his anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Smoke poured from his nostrils;
- type: usfm
  marker: q2
  children:
  - type: text
    text: fierce flames leaped from his mouth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Glowing coals blazed forth from him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He opened the heavens and came down;
- type: usfm
  marker: q2
  children:
  - type: text
    text: dark storm clouds were beneath his feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mounted on a mighty angelic being,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a cherub.
    marker-yv: yv-n
  - type: text
    text: ' he flew,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: soaring on the wings of the wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He shrouded himself in darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: veiling his approach with dark rain clouds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Thick clouds shielded the brightness around him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rained down hail and burning coals.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'and lightning bolts; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 18:13.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' thundered from heaven;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the voice of the Most High resounded
- type: usfm
  marker: q2
  children:
  - type: text
    text: amid the hail and burning coals.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He shot his arrows and scattered his enemies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: great bolts of lightning flashed, and they were confused.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then at your command, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the blast of your breath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the bottom of the sea could be seen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the foundations of the earth were laid bare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He reached down from heaven and rescued me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he drew me out of deep waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He rescued me from my powerful enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from those who hated me and were too strong for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They attacked me at a moment when I was in distress,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' supported me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He led me to a place of safety;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he rescued me because he delights in me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rewarded me for doing right;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he restored me because of my innocence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For I have kept the ways of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have not turned from my God to follow evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: I have followed all his regulations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have never abandoned his decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I am blameless before God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have kept myself from sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rewarded me for doing right.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has seen my innocence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: To the faithful you show yourself faithful;
- type: usfm
  marker: q2
  children:
  - type: text
    text: to those with integrity you show integrity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: To the pure you show yourself pure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but to the crooked you show yourself shrewd.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: You rescue the humble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you humiliate the proud.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: You light a lamp for me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', my God, lights up my darkness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: In your strength I can crush an army;
- type: usfm
  marker: q2
  children:
  - type: text
    text: with my God I can scale any wall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: God’s way is perfect.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'All the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s promises prove true.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is a shield for all who look to him for protection.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'For who is God except the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who but our God is a solid rock?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: God arms me with strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he makes my way perfect.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: He makes me as surefooted as a deer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: enabling me to stand on mountain heights.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: He trains my hands for battle;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he strengthens my arm to draw a bronze bow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: You have given me your shield of victory.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your right hand supports me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your help
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'your humility; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare 2 Sam 22:36.
    marker-yv: yv-n
  - type: text
    text: ' has made me great.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: You have made a wide path for my feet
- type: usfm
  marker: q2
  children:
  - type: text
    text: to keep them from slipping.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: I chased my enemies and caught them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I did not stop until they were conquered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: I struck them down so they could not get up;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they fell beneath my feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: You have armed me with strength for the battle;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have subdued my enemies under my feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: You placed my foot on their necks.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have destroyed all who hated me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: They called for help, but no one came to their rescue.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They even cried to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', but he refused to answer.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: I ground them as fine as dust in the wind.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I swept them into the gutter like dirt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: You gave me victory over my accusers.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You appointed me ruler over nations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: people I don’t even know now serve me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: As soon as they hear of me, they submit;
- type: usfm
  marker: q2
  children:
  - type: text
    text: foreign nations cringe before me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: They all lose their courage
- type: usfm
  marker: q2
  children:
  - type: text
    text: and come trembling from their strongholds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lives! Praise to my Rock!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: May the God of my salvation be exalted!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: He is the God who pays back those who harm me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he subdues the nations under me
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: and rescues me from my enemies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You hold me safe beyond the reach of my enemies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you save me from violent opponents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'For this, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I will praise you among the nations;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing praises to your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: You give great victories to your king;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you show unfailing love to your anointed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to David and all his descendants forever.
