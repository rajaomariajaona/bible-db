document_id: MAT.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Visitors from the East
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Jesus was born in Bethlehem in Judea, during the reign of King Herod. About that time some wise men
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'royal astrologers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'magi; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 2:7, 16.
      marker-yv: yv-n
    - type: text
      text: ' from eastern lands arrived in Jerusalem, asking, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'When they saw the star, they were filled with joy! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They entered the house and saw the child with his mother, Mary, and they bowed down and worshiped him. Then they opened their treasure chests and gave him gifts of gold, frankincense, and myrrh.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: When it was time to leave, they returned to their own country by another route, for God had warned them in a dream not to return to Herod.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Escape to Egypt
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: After the wise men were gone, an angel of the Lord appeared to Joseph in a dream. “Get up! Flee to Egypt with the child and his mother,” the angel said. “Stay there until I tell you to return, because Herod is going to search for the child to kill him.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'That night Joseph left for Egypt with the child and Mary, his mother, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and they stayed there until Herod’s death. This fulfilled what the Lord had spoken through the prophet: “I called my Son out of Egypt.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hos 11:1.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Herod was furious when he realized that the wise men had outwitted him. He sent soldiers to kill all the boys in and around Bethlehem who were two years old and under, based on the wise men’s report of the star’s first appearance. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Herod’s brutal action fulfilled what God had spoken through the prophet Jeremiah:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “A cry was heard in Ramah—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: weeping and great mourning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rachel weeps for her children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: refusing to be comforted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they are dead.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jer 31:15.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Return to Nazareth
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'When Herod died, an angel of the Lord appeared in a dream to Joseph in Egypt. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Where is the newborn king of the Jews? We saw his star as it rose,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: star in the east.
      marker-yv: yv-n
    - type: text
      text: ' and we have come to worship him.”'
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “Get up!” the angel said. “Take the child and his mother back to the land of Israel, because those who were trying to kill the child are dead.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So Joseph got up and returned to the land of Israel with Jesus and his mother. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But when he learned that the new ruler of Judea was Herod’s son Archelaus, he was afraid to go there. Then, after being warned in a dream, he left for the region of Galilee. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So the family went and lived in a town called Nazareth. This fulfilled what the prophets had said: “He will be called a Nazarene.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'King Herod was deeply disturbed when he heard this, as was everyone in Jerusalem. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He called a meeting of the leading priests and teachers of religious law and asked, “Where is the Messiah supposed to be born?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“In Bethlehem in Judea,” they said, “for this is what the prophet wrote:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ‘And you, O Bethlehem in the land of Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are not least among the ruling cities
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:6a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the rulers.
      marker-yv: yv-n
    - type: text
      text: ' of Judah,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for a ruler will come from you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who will be the shepherd for my people Israel.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:6b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mic 5:2; 2 Sam 5:2.
      marker-yv: yv-n
    - type: text
      text: ”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then Herod called for a private meeting with the wise men, and he learned from them the time when the star first appeared. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Then he told them, “Go to Bethlehem and search carefully for the child. And when you find him, come back and tell me so that I can go and worship him, too!”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'After this interview the wise men went their way. And the star they had seen in the east guided them to Bethlehem. It went ahead of them and stopped over the place where the child was. '
