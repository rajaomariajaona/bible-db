document_id: MAT.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Visitors from the East
  - type: text
    content: Jesus was born in Bethlehem in Judea, during the reign of King Herod. About that time some wise men
  - type: note
    content: Or royal astrologers; Greek reads magi; also in 2:7, 16.
  - type: text
    content: ' from eastern lands arrived in Jerusalem, asking, '
  '10':
  - type: text
    content: 'When they saw the star, they were filled with joy! '
  '11':
  - type: text
    content: They entered the house and saw the child with his mother, Mary, and they bowed down and worshiped him. Then they opened their treasure chests and gave him gifts of gold, frankincense, and myrrh.
  '12':
  - type: text
    content: When it was time to leave, they returned to their own country by another route, for God had warned them in a dream not to return to Herod.
  - type: heading
    content: The Escape to Egypt
  '13':
  - type: text
    content: After the wise men were gone, an angel of the Lord appeared to Joseph in a dream. “Get up! Flee to Egypt with the child and his mother,” the angel said. “Stay there until I tell you to return, because Herod is going to search for the child to kill him.”
  '14':
  - type: text
    content: 'That night Joseph left for Egypt with the child and Mary, his mother, '
  '15':
  - type: text
    content: 'and they stayed there until Herod’s death. This fulfilled what the Lord had spoken through the prophet: “I called my Son out of Egypt.”'
  - type: note
    content: Hos 11:1.
  '16':
  - type: text
    content: 'Herod was furious when he realized that the wise men had outwitted him. He sent soldiers to kill all the boys in and around Bethlehem who were two years old and under, based on the wise men’s report of the star’s first appearance. '
  '17':
  - type: text
    content: 'Herod’s brutal action fulfilled what God had spoken through the prophet Jeremiah:'
  '18':
  - type: text
    content: “A cry was heard in Ramah—
  - type: text
    content: weeping and great mourning.
  - type: text
    content: Rachel weeps for her children,
  - type: text
    content: refusing to be comforted,
  - type: text
    content: for they are dead.”
  - type: note
    content: Jer 31:15.
  - type: heading
    content: The Return to Nazareth
  '19':
  - type: text
    content: 'When Herod died, an angel of the Lord appeared in a dream to Joseph in Egypt. '
  '2':
  - type: text
    content: “Where is the newborn king of the Jews? We saw his star as it rose,
  - type: note
    content: Or star in the east.
  - type: text
    content: ' and we have come to worship him.”'
  '20':
  - type: text
    content: “Get up!” the angel said. “Take the child and his mother back to the land of Israel, because those who were trying to kill the child are dead.”
  '21':
  - type: text
    content: 'So Joseph got up and returned to the land of Israel with Jesus and his mother. '
  '22':
  - type: text
    content: 'But when he learned that the new ruler of Judea was Herod’s son Archelaus, he was afraid to go there. Then, after being warned in a dream, he left for the region of Galilee. '
  '23':
  - type: text
    content: 'So the family went and lived in a town called Nazareth. This fulfilled what the prophets had said: “He will be called a Nazarene.”'
  '3':
  - type: text
    content: 'King Herod was deeply disturbed when he heard this, as was everyone in Jerusalem. '
  '4':
  - type: text
    content: He called a meeting of the leading priests and teachers of religious law and asked, “Where is the Messiah supposed to be born?”
  '5':
  - type: text
    content: '“In Bethlehem in Judea,” they said, “for this is what the prophet wrote:'
  '6':
  - type: text
    content: ‘And you, O Bethlehem in the land of Judah,
  - type: text
    content: are not least among the ruling cities
  - type: note
    content: Greek the rulers.
  - type: text
    content: ' of Judah,'
  - type: text
    content: for a ruler will come from you
  - type: text
    content: who will be the shepherd for my people Israel.’
  - type: note
    content: Mic 5:2; 2 Sam 5:2.
  - type: text
    content: ”
  '7':
  - type: text
    content: 'Then Herod called for a private meeting with the wise men, and he learned from them the time when the star first appeared. '
  '8':
  - type: text
    content: Then he told them, “Go to Bethlehem and search carefully for the child. And when you find him, come back and tell me so that I can go and worship him, too!”
  '9':
  - type: text
    content: 'After this interview the wise men went their way. And the star they had seen in the east guided them to Bethlehem. It went ahead of them and stopped over the place where the child was. '
