document_id: 2TH.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Request for Prayer
  - type: text
    content: Finally, dear brothers and sisters,
  - type: note
    content: Greek brothers; also in 3:6, 13.
  - type: text
    content: ' we ask you to pray for us. Pray that the Lord’s message will spread rapidly and be honored wherever it goes, just as when it came to you. '
  '10':
  - type: text
    content: 'Even while we were with you, we gave you this command: “Those unwilling to work will not get to eat.”'
  '11':
  - type: text
    content: 'Yet we hear that some of you are living idle lives, refusing to work and meddling in other people’s business. '
  '12':
  - type: text
    content: 'We command such people and urge them in the name of the Lord Jesus Christ to settle down and work to earn their own living. '
  '13':
  - type: text
    content: As for the rest of you, dear brothers and sisters, never get tired of doing good.
  '14':
  - type: text
    content: 'Take note of those who refuse to obey what we say in this letter. Stay away from them so they will be ashamed. '
  '15':
  - type: text
    content: Don’t think of them as enemies, but warn them as you would a brother or sister.
  - type: note
    content: Greek as a brother.
  - type: heading
    content: Paul’s Final Greetings
  '16':
  - type: text
    content: Now may the Lord of peace himself give you his peace at all times and in every situation. The Lord be with you all.
  '17':
  - type: text
    content: ' '
  - type: heading
    content: Here is my greeting in my own handwriting—Paul. I do this in all my letters to prove they are from me.
  '18':
  - type: text
    content: May the grace of our Lord Jesus Christ be with you all.
  '2':
  - type: text
    content: 'Pray, too, that we will be rescued from wicked and evil people, for not everyone is a believer. '
  '3':
  - type: text
    content: But the Lord is faithful; he will strengthen you and guard you from the evil one.
  - type: note
    content: Or from evil.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'And we are confident in the Lord that you are doing and will continue to do the things we commanded you. '
  '5':
  - type: text
    content: May the Lord lead your hearts into a full understanding and expression of the love of God and the patient endurance that comes from Christ.
  - type: heading
    content: An Exhortation to Proper Living
  '6':
  - type: text
    content: 'And now, dear brothers and sisters, we give you this command in the name of our Lord Jesus Christ: Stay away from all believers'
  - type: note
    content: Greek from every brother.
  - type: text
    content: ' who live idle lives and don’t follow the tradition they received'
  - type: note
    content: Some manuscripts read you received.
  - type: text
    content: ' from us. '
  '7':
  - type: text
    content: 'For you know that you ought to imitate us. We were not idle when we were with you. '
  '8':
  - type: text
    content: 'We never accepted food from anyone without paying for it. We worked hard day and night so we would not be a burden to any of you. '
  '9':
  - type: text
    content: 'We certainly had the right to ask you to feed us, but we wanted to give you an example to follow. '
