document_id: 2TH.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Request for Prayer
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Finally, dear brothers and sisters,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'brothers; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 3:6, 13.
    marker-yv: yv-n
  - type: text
    text: ' we ask you to pray for us. Pray that the Lord’s message will spread rapidly and be honored wherever it goes, just as when it came to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pray, too, that we will be rescued from wicked and evil people, for not everyone is a believer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But the Lord is faithful; he will strengthen you and guard you from the evil one.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from evil.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And we are confident in the Lord that you are doing and will continue to do the things we commanded you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: May the Lord lead your hearts into a full understanding and expression of the love of God and the patient endurance that comes from Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: An Exhortation to Proper Living
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And now, dear brothers and sisters, we give you this command in the name of our Lord Jesus Christ: Stay away from all believers'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from every brother.
    marker-yv: yv-n
  - type: text
    text: ' who live idle lives and don’t follow the tradition they received'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: you received.
    marker-yv: yv-n
  - type: text
    text: ' from us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For you know that you ought to imitate us. We were not idle when we were with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'We never accepted food from anyone without paying for it. We worked hard day and night so we would not be a burden to any of you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'We certainly had the right to ask you to feed us, but we wanted to give you an example to follow. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Even while we were with you, we gave you this command: “Those unwilling to work will not get to eat.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Yet we hear that some of you are living idle lives, refusing to work and meddling in other people’s business. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'We command such people and urge them in the name of the Lord Jesus Christ to settle down and work to earn their own living. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: As for the rest of you, dear brothers and sisters, never get tired of doing good.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Take note of those who refuse to obey what we say in this letter. Stay away from them so they will be ashamed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Don’t think of them as enemies, but warn them as you would a brother or sister.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: as a brother.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Final Greetings
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Now may the Lord of peace himself give you his peace at all times and in every situation. The Lord be with you all.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Here is my greeting in my own handwriting—Paul. I do this in all my letters to prove they are from me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: May the grace of our Lord Jesus Christ be with you all.
