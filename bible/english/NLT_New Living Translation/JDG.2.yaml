document_id: JDG.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Messenger Comes to Bokim
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' went up from Gilgal to Bokim and said to the Israelites, “I brought you out of Egypt into this land that I swore to give your ancestors, and I said I would never break my covenant with you. '
  '10':
  - type: text
    content: 'After that generation died, another generation grew up who did not acknowledge the '
  - type: text
    content: Lord
  - type: text
    content: ' or remember the mighty things he had done for Israel.'
  '11':
  - type: text
    content: 'The Israelites did evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight and served the images of Baal. '
  '12':
  - type: text
    content: 'They abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, who had brought them out of Egypt. They went after other gods, worshiping the gods of the people around them. And they angered the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'They abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ' to serve Baal and the images of Ashtoreth. '
  '14':
  - type: text
    content: 'This made the '
  - type: text
    content: Lord
  - type: text
    content: ' burn with anger against Israel, so he handed them over to raiders who stole their possessions. He turned them over to their enemies all around, and they were no longer able to resist them. '
  '15':
  - type: text
    content: 'Every time Israel went out to battle, the '
  - type: text
    content: Lord
  - type: text
    content: ' fought against them, causing them to be defeated, just as he had warned. And the people were in great distress.'
  - type: heading
    content: The Lord Rescues His People
  '16':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' raised up judges to rescue the Israelites from their attackers. '
  '17':
  - type: text
    content: 'Yet Israel did not listen to the judges but prostituted themselves by worshiping other gods. How quickly they turned away from the path of their ancestors, who had walked in obedience to the '
  - type: text
    content: Lord
  - type: text
    content: ’s commands.
  '18':
  - type: text
    content: 'Whenever the '
  - type: text
    content: Lord
  - type: text
    content: ' raised up a judge over Israel, he was with that judge and rescued the people from their enemies throughout the judge’s lifetime. For the '
  - type: text
    content: Lord
  - type: text
    content: ' took pity on his people, who were burdened by oppression and suffering. '
  '19':
  - type: text
    content: But when the judge died, the people returned to their corrupt ways, behaving worse than those who had lived before them. They went after other gods, serving and worshiping them. And they refused to give up their evil practices and stubborn ways.
  '2':
  - type: text
    content: 'For your part, you were not to make any covenants with the people living in this land; instead, you were to destroy their altars. But you disobeyed my command. Why did you do this? '
  '20':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' burned with anger against Israel. He said, “Because these people have violated my covenant, which I made with their ancestors, and have ignored my commands, '
  '21':
  - type: text
    content: 'I will no longer drive out the nations that Joshua left unconquered when he died. '
  '22':
  - type: text
    content: 'I did this to test Israel—to see whether or not they would follow the ways of the '
  - type: text
    content: Lord
  - type: text
    content: ' as their ancestors did.” '
  '23':
  - type: text
    content: 'That is why the '
  - type: text
    content: Lord
  - type: text
    content: ' left those nations in place. He did not quickly drive them out or allow Joshua to conquer them all.'
  '3':
  - type: text
    content: So now I declare that I will no longer drive out the people living in your land. They will be thorns in your sides,
  - type: note
    content: Hebrew They will be in your sides; compare Num 33:55.
  - type: text
    content: ' and their gods will be a constant temptation to you.”'
  '4':
  - type: text
    content: 'When the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' finished speaking to all the Israelites, the people wept loudly. '
  '5':
  - type: text
    content: 'So they called the place Bokim (which means “weeping”), and they offered sacrifices there to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: The Death of Joshua
  '6':
  - type: text
    content: 'After Joshua sent the people away, each of the tribes left to take possession of the land allotted to them. '
  '7':
  - type: text
    content: 'And the Israelites served the '
  - type: text
    content: Lord
  - type: text
    content: ' throughout the lifetime of Joshua and the leaders who outlived him—those who had seen all the great things the '
  - type: text
    content: Lord
  - type: text
    content: ' had done for Israel.'
  '8':
  - type: text
    content: 'Joshua son of Nun, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', died at the age of 110. '
  '9':
  - type: text
    content: They buried him in the land he had been allocated, at Timnath-serah
  - type: note
    content: As in parallel text at Josh 24:30; Hebrew reads Timnath-heres, a variant spelling of Timnath-serah.
  - type: text
    content: ' in the hill country of Ephraim, north of Mount Gaash.'
  - type: heading
    content: Israel Disobeys the Lord
