document_id: EST.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Esther’s Request to the King
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'On the third day of the fast, Esther put on her royal robes and entered the inner court of the palace, just across from the king’s hall. The king was sitting on his royal throne, facing the entrance. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: However, he restrained himself and went on home.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Haman gathered together his friends and Zeresh, his wife, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: and boasted to them about his great wealth and his many children. He bragged about the honors the king had given him and how he had been promoted over all the other nobles and officials.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then Haman added, “And that’s not all! Queen Esther invited only me and the king himself to the banquet she prepared for us. And she has invited me to dine with her and the king again tomorrow!” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then he added, “But this is all worth nothing as long as I see Mordecai the Jew just sitting there at the palace gate.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So Haman’s wife, Zeresh, and all his friends suggested, “Set up a sharpened pole that stands seventy-five feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '50 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[23 meters].'
      marker-yv: yv-n
    - type: text
      text: ' tall, and in the morning ask the king to impale Mordecai on it. When this is done, you can go on your merry way to the banquet with the king.” This pleased Haman, and he ordered the pole set up.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: When he saw Queen Esther standing there in the inner court, he welcomed her and held out the gold scepter to her. So Esther approached and touched the end of the scepter.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Then the king asked her, “What do you want, Queen Esther? What is your request? I will give it to you, even if it is half the kingdom!”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: And Esther replied, “If it please the king, let the king and Haman come today to a banquet I have prepared for the king.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The king turned to his attendants and said, “Tell Haman to come quickly to a banquet, as Esther has requested.” So the king and Haman went to Esther’s banquet.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And while they were drinking wine, the king said to Esther, “Now tell me what you really want. What is your request? I will give it to you, even if it is half the kingdom!”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Esther replied, “This is my request and deepest wish. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: If I have found favor with the king, and if it pleases the king to grant my request and do what I ask, please come with Haman tomorrow to the banquet I will prepare for you. Then I will explain what this is all about.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Haman’s Plan to Kill Mordecai
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Haman was a happy man as he left the banquet! But when he saw Mordecai sitting at the palace gate, not standing up or trembling nervously before him, Haman became furious. '
