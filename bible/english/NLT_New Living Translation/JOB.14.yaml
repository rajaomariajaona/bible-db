document_id: JOB.14,116
type_code: eng
verses:
  '1':
  - type: text
    content: “How frail is humanity!
  - type: text
    content: How short is life, how full of trouble!
  '10':
  - type: text
    content: “But when people die, their strength is gone.
  - type: text
    content: They breathe their last, and then where are they?
  '11':
  - type: text
    content: As water evaporates from a lake
  - type: text
    content: and a river disappears in drought,
  '12':
  - type: text
    content: people are laid to rest and do not rise again.
  - type: text
    content: Until the heavens are no more, they will not wake up
  - type: text
    content: nor be roused from their sleep.
  '13':
  - type: text
    content: “I wish you would hide me in the grave
  - type: note
    content: Hebrew in Sheol.
  - type: text
    content: and forget me there until your anger has passed.
  - type: text
    content: But mark your calendar to think of me again!
  '14':
  - type: text
    content: Can the dead live again?
  - type: text
    content: If so, this would give me hope through all my years of struggle,
  - type: text
    content: and I would eagerly await the release of death.
  '15':
  - type: text
    content: You would call and I would answer,
  - type: text
    content: and you would yearn for me, your handiwork.
  '16':
  - type: text
    content: For then you would guard my steps,
  - type: text
    content: instead of watching for my sins.
  '17':
  - type: text
    content: My sins would be sealed in a pouch,
  - type: text
    content: and you would cover my guilt.
  '18':
  - type: text
    content: “But instead, as mountains fall and crumble
  - type: text
    content: and as rocks fall from a cliff,
  '19':
  - type: text
    content: as water wears away the stones
  - type: text
    content: and floods wash away the soil,
  - type: text
    content: so you destroy people’s hope.
  '2':
  - type: text
    content: We blossom like a flower and then wither.
  - type: text
    content: Like a passing shadow, we quickly disappear.
  '20':
  - type: text
    content: You always overpower them, and they pass from the scene.
  - type: text
    content: You disfigure them in death and send them away.
  '21':
  - type: text
    content: They never know if their children grow up in honor
  - type: text
    content: or sink to insignificance.
  '22':
  - type: text
    content: They suffer painfully;
  - type: text
    content: their life is full of trouble.”
  '3':
  - type: text
    content: Must you keep an eye on such a frail creature
  - type: text
    content: and demand an accounting from me?
  '4':
  - type: text
    content: Who can bring purity out of an impure person?
  - type: text
    content: No one!
  '5':
  - type: text
    content: You have decided the length of our lives.
  - type: text
    content: You know how many months we will live,
  - type: text
    content: and we are not given a minute longer.
  '6':
  - type: text
    content: So leave us alone and let us rest!
  - type: text
    content: We are like hired hands, so let us finish our work in peace.
  '7':
  - type: text
    content: “Even a tree has more hope!
  - type: text
    content: If it is cut down, it will sprout again
  - type: text
    content: and grow new branches.
  '8':
  - type: text
    content: Though its roots have grown old in the earth
  - type: text
    content: and its stump decays,
  '9':
  - type: text
    content: at the scent of water it will bud
  - type: text
    content: and sprout again like a new seedling.
