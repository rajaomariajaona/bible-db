document_id: JOB.14
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “How frail is humanity!
- type: usfm
  marker: q2
  children:
  - type: text
    text: How short is life, how full of trouble!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: We blossom like a flower and then wither.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Like a passing shadow, we quickly disappear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Must you keep an eye on such a frail creature
- type: usfm
  marker: q2
  children:
  - type: text
    text: and demand an accounting from me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who can bring purity out of an impure person?
- type: usfm
  marker: q2
  children:
  - type: text
    text: No one!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You have decided the length of our lives.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You know how many months we will live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and we are not given a minute longer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So leave us alone and let us rest!
- type: usfm
  marker: q2
  children:
  - type: text
    text: We are like hired hands, so let us finish our work in peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Even a tree has more hope!
- type: usfm
  marker: q2
  children:
  - type: text
    text: If it is cut down, it will sprout again
- type: usfm
  marker: q2
  children:
  - type: text
    text: and grow new branches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Though its roots have grown old in the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and its stump decays,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: at the scent of water it will bud
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sprout again like a new seedling.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “But when people die, their strength is gone.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They breathe their last, and then where are they?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: As water evaporates from a lake
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a river disappears in drought,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: people are laid to rest and do not rise again.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Until the heavens are no more, they will not wake up
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor be roused from their sleep.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “I wish you would hide me in the grave
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in Sheol.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and forget me there until your anger has passed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But mark your calendar to think of me again!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Can the dead live again?
- type: usfm
  marker: q2
  children:
  - type: text
    text: If so, this would give me hope through all my years of struggle,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I would eagerly await the release of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: You would call and I would answer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you would yearn for me, your handiwork.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For then you would guard my steps,
- type: usfm
  marker: q2
  children:
  - type: text
    text: instead of watching for my sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: My sins would be sealed in a pouch,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you would cover my guilt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “But instead, as mountains fall and crumble
- type: usfm
  marker: q2
  children:
  - type: text
    text: and as rocks fall from a cliff,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: as water wears away the stones
- type: usfm
  marker: q2
  children:
  - type: text
    text: and floods wash away the soil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so you destroy people’s hope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You always overpower them, and they pass from the scene.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You disfigure them in death and send them away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They never know if their children grow up in honor
- type: usfm
  marker: q2
  children:
  - type: text
    text: or sink to insignificance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: They suffer painfully;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their life is full of trouble.”
