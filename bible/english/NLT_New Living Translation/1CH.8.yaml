document_id: 1CH.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Descendants of Benjamin
  - type: text
    content: 'Benjamin’s first son was Bela, the second was Ashbel, the third was Aharah, '
  '10':
  - type: text
    content: Jeuz, Sakia, and Mirmah. These sons all became the leaders of clans.
  '11':
  - type: text
    content: 'Shaharaim’s wife Hushim had already given birth to Abitub and Elpaal. '
  '12':
  - type: text
    content: 'The sons of Elpaal were Eber, Misham, Shemed (who built the towns of Ono and Lod and their nearby villages), '
  '13':
  - type: text
    content: Beriah, and Shema. They were the leaders of the clans living in Aijalon, and they drove out the inhabitants of Gath.
  '14':
  - type: text
    content: 'Ahio, Shashak, Jeremoth, '
  '15':
  - type: text
    content: 'Zebadiah, Arad, Eder, '
  '16':
  - type: text
    content: Michael, Ishpah, and Joha were the sons of Beriah.
  '17':
  - type: text
    content: 'Zebadiah, Meshullam, Hizki, Heber, '
  '18':
  - type: text
    content: Ishmerai, Izliah, and Jobab were the sons of Elpaal.
  '19':
  - type: text
    content: 'Jakim, Zicri, Zabdi, '
  '2':
  - type: text
    content: the fourth was Nohah, and the fifth was Rapha.
  '20':
  - type: text
    content: 'Elienai, Zillethai, Eliel, '
  '21':
  - type: text
    content: Adaiah, Beraiah, and Shimrath were the sons of Shimei.
  '22':
  - type: text
    content: 'Ishpan, Eber, Eliel, '
  '23':
  - type: text
    content: 'Abdon, Zicri, Hanan, '
  '24':
  - type: text
    content: 'Hananiah, Elam, Anthothijah, '
  '25':
  - type: text
    content: Iphdeiah, and Penuel were the sons of Shashak.
  '26':
  - type: text
    content: 'Shamsherai, Shehariah, Athaliah, '
  '27':
  - type: text
    content: Jaareshiah, Elijah, and Zicri were the sons of Jeroham.
  '28':
  - type: text
    content: These were the leaders of the ancestral clans; they were listed in their genealogical records, and they all lived in Jerusalem.
  - type: heading
    content: The Family of Saul
  '29':
  - type: text
    content: Jeiel
  - type: note
    content: As in some Greek manuscripts (see also 9:35); Hebrew lacks Jeiel.
  - type: text
    content: ' (the father of'
  - type: note
    content: Or the founder of.
  - type: text
    content: ' Gibeon) lived in the town of Gibeon. His wife’s name was Maacah, '
  '3':
  - type: text
    content: The sons of Bela were Addar, Gera, Abihud,
  - type: note
    content: Possibly Gera the father of Ehud; compare 8:6.
  - type: text
    content: ' '
  '30':
  - type: text
    content: and his oldest son was named Abdon. Jeiel’s other sons were Zur, Kish, Baal, Ner,
  - type: note
    content: As in some Greek manuscripts (see also 9:36); Hebrew lacks Ner.
  - type: text
    content: ' Nadab, '
  '31':
  - type: text
    content: Gedor, Ahio, Zechariah,
  - type: note
    content: As in parallel text at 9:37; Hebrew reads Zeker, a variant spelling of Zechariah.
  - type: text
    content: ' '
  '32':
  - type: text
    content: and Mikloth, who was the father of Shimeam.
  - type: note
    content: As in parallel text at 9:38; Hebrew reads Shimeah, a variant spelling of Shimeam.
  - type: text
    content: ' All these families lived near each other in Jerusalem.'
  '33':
  - type: text
    content: Ner was the father of Kish.
  - type: text
    content: Kish was the father of Saul.
  - type: text
    content: Saul was the father of Jonathan, Malkishua, Abinadab, and Esh-baal.
  '34':
  - type: text
    content: Jonathan was the father of Merib-baal.
  - type: text
    content: Merib-baal was the father of Micah.
  '35':
  - type: text
    content: Micah was the father of Pithon, Melech, Tahrea,
  - type: note
    content: As in parallel text at 9:41; Hebrew reads Tarea, a variant spelling of Tahrea.
  - type: text
    content: ' and Ahaz.'
  '36':
  - type: text
    content: Ahaz was the father of Jadah.
  - type: note
    content: As in parallel text at 9:42; Hebrew reads Jehoaddah, a variant spelling of Jadah.
  - type: text
    content: Jadah was the father of Alemeth, Azmaveth, and Zimri.
  - type: text
    content: Zimri was the father of Moza.
  '37':
  - type: text
    content: Moza was the father of Binea.
  - type: text
    content: Binea was the father of Rephaiah.
  - type: note
    content: As in parallel text at 9:43; Hebrew reads Raphah, a variant spelling of Rephaiah.
  - type: text
    content: Rephaiah was the father of Eleasah.
  - type: text
    content: Eleasah was the father of Azel.
  '38':
  - type: text
    content: 'Azel had six sons: Azrikam, Bokeru, Ishmael, Sheariah, Obadiah, and Hanan. These were the sons of Azel.'
  '39':
  - type: text
    content: 'Azel’s brother Eshek had three sons: the first was Ulam, the second was Jeush, and the third was Eliphelet. '
  '4':
  - type: text
    content: 'Abishua, Naaman, Ahoah, '
  '40':
  - type: text
    content: Ulam’s sons were all mighty warriors and expert archers. They had many sons and grandsons—150 in all.
  - type: text
    content: All these were descendants of Benjamin.
  '5':
  - type: text
    content: Gera, Shephuphan, and Huram.
  '6':
  - type: text
    content: 'The sons of Ehud, leaders of the clans living at Geba, were exiled to Manahath. '
  '7':
  - type: text
    content: Ehud’s sons were Naaman, Ahijah, and Gera. Gera, who led them into exile, was the father of Uzza and Ahihud.
  - type: note
    content: Or Gera, that is Heglam, was the father of Uzza and Ahihud.
  '8':
  - type: text
    content: 'After Shaharaim divorced his wives Hushim and Baara, he had children in the land of Moab. '
  '9':
  - type: text
    content: 'His wife Hodesh gave birth to Jobab, Zibia, Mesha, Malcam, '
