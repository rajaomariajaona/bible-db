document_id: 1CH.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants of Benjamin
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Benjamin’s first son was Bela, the second was Ashbel, the third was Aharah, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: the fourth was Nohah, and the fifth was Rapha.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The sons of Bela were Addar, Gera, Abihud,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Possibly '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gera the father of Ehud; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: compare 8:6.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Abishua, Naaman, Ahoah, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Gera, Shephuphan, and Huram.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The sons of Ehud, leaders of the clans living at Geba, were exiled to Manahath. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ehud’s sons were Naaman, Ahijah, and Gera. Gera, who led them into exile, was the father of Uzza and Ahihud.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gera, that is Heglam, was the father of Uzza and Ahihud.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'After Shaharaim divorced his wives Hushim and Baara, he had children in the land of Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'His wife Hodesh gave birth to Jobab, Zibia, Mesha, Malcam, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jeuz, Sakia, and Mirmah. These sons all became the leaders of clans.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Shaharaim’s wife Hushim had already given birth to Abitub and Elpaal. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The sons of Elpaal were Eber, Misham, Shemed (who built the towns of Ono and Lod and their nearby villages), '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Beriah, and Shema. They were the leaders of the clans living in Aijalon, and they drove out the inhabitants of Gath.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ahio, Shashak, Jeremoth, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Zebadiah, Arad, Eder, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Michael, Ishpah, and Joha were the sons of Beriah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Zebadiah, Meshullam, Hizki, Heber, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ishmerai, Izliah, and Jobab were the sons of Elpaal.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jakim, Zicri, Zabdi, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Elienai, Zillethai, Eliel, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Adaiah, Beraiah, and Shimrath were the sons of Shimei.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ishpan, Eber, Eliel, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Abdon, Zicri, Hanan, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hananiah, Elam, Anthothijah, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Iphdeiah, and Penuel were the sons of Shashak.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Shamsherai, Shehariah, Athaliah, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Jaareshiah, Elijah, and Zicri were the sons of Jeroham.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: These were the leaders of the ancestral clans; they were listed in their genealogical records, and they all lived in Jerusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Family of Saul
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Jeiel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:29a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Greek manuscripts (see also 9:35); Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jeiel.
    marker-yv: yv-n
  - type: text
    text: ' (the father of'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:29b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the founder of.
    marker-yv: yv-n
  - type: text
    text: ' Gibeon) lived in the town of Gibeon. His wife’s name was Maacah, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: and his oldest son was named Abdon. Jeiel’s other sons were Zur, Kish, Baal, Ner,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Greek manuscripts (see also 9:36); Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ner.
    marker-yv: yv-n
  - type: text
    text: ' Nadab, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Gedor, Ahio, Zechariah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 9:37; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Zeker, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Zechariah.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: and Mikloth, who was the father of Shimeam.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 9:38; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shimeah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Shimeam.
    marker-yv: yv-n
  - type: text
    text: ' All these families lived near each other in Jerusalem.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ner was the father of Kish.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Kish was the father of Saul.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Saul was the father of Jonathan, Malkishua, Abinadab, and Esh-baal.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Jonathan was the father of Merib-baal.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Merib-baal was the father of Micah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Micah was the father of Pithon, Melech, Tahrea,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 9:41; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tarea, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Tahrea.
    marker-yv: yv-n
  - type: text
    text: ' and Ahaz.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ahaz was the father of Jadah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 9:42; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jehoaddah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jadah.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jadah was the father of Alemeth, Azmaveth, and Zimri.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Zimri was the father of Moza.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Moza was the father of Binea.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Binea was the father of Rephaiah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 9:43; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Raphah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Rephaiah.
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: text
    text: Rephaiah was the father of Eleasah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Eleasah was the father of Azel.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Azel had six sons: Azrikam, Bokeru, Ishmael, Sheariah, Obadiah, and Hanan. These were the sons of Azel.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Azel’s brother Eshek had three sons: the first was Ulam, the second was Jeush, and the third was Eliphelet. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ulam’s sons were all mighty warriors and expert archers. They had many sons and grandsons—150 in all.
- type: usfm
  marker: m
  children:
  - type: text
    text: All these were descendants of Benjamin.
