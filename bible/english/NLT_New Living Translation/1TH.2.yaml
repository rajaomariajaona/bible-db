document_id: 1TH.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Remembers His Visit
  - type: text
    content: You yourselves know, dear brothers and sisters,
  - type: note
    content: Greek brothers; also in 2:9, 14, 17.
  - type: text
    content: ' that our visit to you was not a failure. '
  '10':
  - type: text
    content: 'You yourselves are our witnesses—and so is God—that we were devout and honest and faultless toward all of you believers. '
  '11':
  - type: text
    content: 'And you know that we treated each of you as a father treats his own children. '
  '12':
  - type: text
    content: We pleaded with you, encouraged you, and urged you to live your lives in a way that God would consider worthy. For he called you to share in his Kingdom and glory.
  '13':
  - type: text
    content: Therefore, we never stop thanking God that when you received his message from us, you didn’t think of our words as mere human ideas. You accepted what we said as the very word of God—which, of course, it is. And this word continues to work in you who believe.
  '14':
  - type: text
    content: 'And then, dear brothers and sisters, you suffered persecution from your own countrymen. In this way, you imitated the believers in God’s churches in Judea who, because of their belief in Christ Jesus, suffered from their own people, the Jews. '
  '15':
  - type: text
    content: 'For some of the Jews killed the prophets, and some even killed the Lord Jesus. Now they have persecuted us, too. They fail to please God and work against all humanity '
  '16':
  - type: text
    content: as they try to keep us from preaching the Good News of salvation to the Gentiles. By doing this, they continue to pile up their sins. But the anger of God has caught up with them at last.
  - type: heading
    content: Timothy’s Good Report about the Church
  '17':
  - type: text
    content: 'Dear brothers and sisters, after we were separated from you for a little while (though our hearts never left you), we tried very hard to come back because of our intense longing to see you again. '
  '18':
  - type: text
    content: 'We wanted very much to come to you, and I, Paul, tried again and again, but Satan prevented us. '
  '19':
  - type: text
    content: 'After all, what gives us hope and joy, and what will be our proud reward and crown as we stand before our Lord Jesus when he returns? It is you! '
  '2':
  - type: text
    content: 'You know how badly we had been treated at Philippi just before we came to you and how much we suffered there. Yet our God gave us the courage to declare his Good News to you boldly, in spite of great opposition. '
  '20':
  - type: text
    content: Yes, you are our pride and joy.
  '3':
  - type: text
    content: So you can see we were not preaching with any deceit or impure motives or trickery.
  '4':
  - type: text
    content: 'For we speak as messengers approved by God to be entrusted with the Good News. Our purpose is to please God, not people. He alone examines the motives of our hearts. '
  '5':
  - type: text
    content: 'Never once did we try to win you with flattery, as you well know. And God is our witness that we were not pretending to be your friends just to get your money! '
  '6':
  - type: text
    content: As for human praise, we have never sought it from you or anyone else.
  '7':
  - type: text
    content: As apostles of Christ we certainly had a right to make some demands of you, but instead we were like children
  - type: note
    content: Some manuscripts read we were gentle.
  - type: text
    content: ' among you. Or we were like a mother feeding and caring for her own children. '
  '8':
  - type: text
    content: We loved you so much that we shared with you not only God’s Good News but our own lives, too.
  '9':
  - type: text
    content: 'Don’t you remember, dear brothers and sisters, how hard we worked among you? Night and day we toiled to earn a living so that we would not be a burden to any of you as we preached God’s Good News to you. '
