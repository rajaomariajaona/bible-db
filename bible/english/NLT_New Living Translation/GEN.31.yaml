document_id: GEN.31,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Flees from Laban
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'But Jacob soon learned that Laban’s sons were grumbling about him. “Jacob has robbed our father of everything!” they said. “He has gained all his wealth at our father’s expense.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“One time during the mating season, I had a dream and saw that the male goats mating with the females were streaked, speckled, and spotted. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then in my dream, the angel of God said to me, ‘Jacob!’ And I replied, ‘Yes, here I am.’
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“The angel said, ‘Look up, and you will see that only the streaked, speckled, and spotted males are mating with the females of your flock. For I have seen how Laban has treated you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I am the God who appeared to you at Bethel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version and an Aramaic Targum; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the God of Bethel.
      marker-yv: yv-n
    - type: text
      text: ' the place where you anointed the pillar of stone and made your vow to me. Now get ready and leave this country and return to the land of your birth.’”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Rachel and Leah responded, “That’s fine with us! We won’t inherit any of our father’s wealth anyway. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'He has reduced our rights to those of foreign women. And after he sold us, he wasted the money you paid him for us. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: All the wealth God has given you from our father legally belongs to us and our children. So go ahead and do whatever God has told you.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So Jacob put his wives and children on camels, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and he drove all his livestock in front of him. He packed all the belongings he had acquired in Paddan-aram and set out for the land of Canaan, where his father, Isaac, lived. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'At the time they left, Laban was some distance away, shearing his sheep. Rachel stole her father’s household idols and took them with her. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: And Jacob began to notice a change in Laban’s attitude toward him.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Jacob outwitted Laban the Aramean, for they set out secretly and never told Laban they were leaving. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: So Jacob took all his possessions with him and crossed the Euphrates River,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the river.
      marker-yv: yv-n
    - type: text
      text: ' heading for the hill country of Gilead.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Laban Pursues Jacob
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Three days later, Laban was told that Jacob had fled. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So he gathered a group of his relatives and set out in hot pursuit. He caught up with Jacob seven days later in the hill country of Gilead. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: But the previous night God had appeared to Laban the Aramean in a dream and told him, “I’m warning you—leave Jacob alone!”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Laban caught up with Jacob as he was camped in the hill country of Gilead, and he set up his camp not far from Jacob’s. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“What do you mean by deceiving me like this?” Laban demanded. “How dare you drag my daughters away like prisoners of war? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Why did you slip away secretly? Why did you deceive me? And why didn’t you say you wanted to leave? I would have given you a farewell feast, with singing and music, accompanied by tambourines and harps. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Why didn’t you let me kiss my daughters and grandchildren and tell them good-bye? You have acted very foolishly! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'I could destroy you, but the God of your father appeared to me last night and warned me, ‘Leave Jacob alone!’ '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Jacob, “Return to the land of your father and grandfather and to your relatives there, and I will be with you.”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: I can understand your feeling that you must go, and your intense longing for your father’s home. But why have you stolen my gods?”
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '“I rushed away because I was afraid,” Jacob answered. “I thought you would take your daughters from me by force. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: But as for your gods, see if you can find them, and let the person who has taken them die! And if you find anything else that belongs to you, identify it before all these relatives of ours, and I will give it back!” But Jacob did not know that Rachel had stolen the household idols.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Laban went first into Jacob’s tent to search there, then into Leah’s, and then the tents of the two servant wives—but he found nothing. Finally, he went into Rachel’s tent. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'But Rachel had taken the household idols and hidden them in her camel saddle, and now she was sitting on them. When Laban had thoroughly searched her tent without finding them, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: she said to her father, “Please, sir, forgive me if I don’t get up for you. I’m having my monthly period.” So Laban continued his search, but he could not find the household idols.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Then Jacob became very angry, and he challenged Laban. “What’s my crime?” he demanded. “What have I done wrong to make you chase after me as though I were a criminal? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: You have rummaged through everything I own. Now show me what you found that belongs to you! Set it out here in front of us, before our relatives, for all to see. Let them judge between us!
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: '“For twenty years I have been with you, caring for your flocks. In all that time your sheep and goats never miscarried. In all those years I never used a single ram of yours for food. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: If any were attacked and killed by wild animals, I never showed you the carcass and asked you to reduce the count of your flock. No, I took the loss myself! You made me pay for every stolen animal, whether it was taken in broad daylight or in the dark of night.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So Jacob called Rachel and Leah out to the field where he was watching his flock. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: '“I worked for you through the scorching heat of the day and through cold and sleepless nights. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Yes, for twenty years I slaved in your house! I worked for fourteen years earning your two daughters, and then six more years for your flock. And you changed my wages ten times! '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: In fact, if the God of my father had not been on my side—the God of Abraham and the fearsome God of Isaac
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and the Fear of Isaac.
      marker-yv: yv-n
    - type: text
      text: —you would have sent me away empty-handed. But God has seen your abuse and my hard work. That is why he appeared to you last night and rebuked you!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob’s Treaty with Laban
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Then Laban replied to Jacob, “These women are my daughters, these children are my grandchildren, and these flocks are my flocks—in fact, everything you see is mine. But what can I do now about my daughters and their children? '
  '44':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: So come, let’s make a covenant, you and I, and it will be a witness to our commitment.”
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'So Jacob took a stone and set it up as a monument. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Then he told his family members, “Gather some stones.” So they gathered stones and piled them in a heap. Then Jacob and Laban sat down beside the pile of stones to eat a covenant meal. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: To commemorate the event, Laban called the place Jegar-sahadutha (which means “witness pile” in Aramaic), and Jacob called it Galeed (which means “witness pile” in Hebrew).
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Then Laban declared, “This pile of stones will stand as a witness to remind us of the covenant we have made today.” This explains why it was called Galeed—“Witness Pile.” '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'But it was also called Mizpah (which means “watchtower”), for Laban said, “May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' keep watch between us to make sure that we keep this covenant when we are out of each other’s sight. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He said to them, “I have noticed that your father’s attitude toward me has changed. But the God of my father has been with me. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: If you mistreat my daughters or if you marry other wives, God will see it even if no one else does. He is a witness to this covenant between us.
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: '“See this pile of stones,” Laban continued, “and see this monument I have set between us. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'They stand between us as witnesses of our vows. I will never pass this pile of stones to harm you, and you must never pass these stones or this monument to harm me. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: I call on the God of our ancestors—the God of your grandfather Abraham and the God of my grandfather Nahor—to serve as a judge between us.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Jacob took an oath before the fearsome God of his father, Isaac,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:53 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Fear of his father, Isaac.
      marker-yv: yv-n
    - type: text
      text: ' to respect the boundary line. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Then Jacob offered a sacrifice to God there on the mountain and invited everyone to a covenant feast. After they had eaten, they spent the night on the mountain.
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:55 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verse 31:55 is numbered 32:1 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: Laban got up early the next morning, and he kissed his grandchildren and his daughters and blessed them. Then he left and returned home.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'You know how hard I have worked for your father, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'but he has cheated me, changing my wages ten times. But God has not allowed him to do me any harm. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For if he said, ‘The speckled animals will be your wages,’ the whole flock began to produce speckled young. And when he changed his mind and said, ‘The striped animals will be your wages,’ then the whole flock produced striped young. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: In this way, God has taken your father’s animals and given them to me.
