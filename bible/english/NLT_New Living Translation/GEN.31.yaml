document_id: GEN.31,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Flees from Laban
  - type: text
    content: 'But Jacob soon learned that Laban’s sons were grumbling about him. “Jacob has robbed our father of everything!” they said. “He has gained all his wealth at our father’s expense.” '
  '10':
  - type: text
    content: '“One time during the mating season, I had a dream and saw that the male goats mating with the females were streaked, speckled, and spotted. '
  '11':
  - type: text
    content: Then in my dream, the angel of God said to me, ‘Jacob!’ And I replied, ‘Yes, here I am.’
  '12':
  - type: text
    content: '“The angel said, ‘Look up, and you will see that only the streaked, speckled, and spotted males are mating with the females of your flock. For I have seen how Laban has treated you. '
  '13':
  - type: text
    content: I am the God who appeared to you at Bethel,
  - type: note
    content: As in Greek version and an Aramaic Targum; Hebrew reads the God of Bethel.
  - type: text
    content: ' the place where you anointed the pillar of stone and made your vow to me. Now get ready and leave this country and return to the land of your birth.’”'
  '14':
  - type: text
    content: 'Rachel and Leah responded, “That’s fine with us! We won’t inherit any of our father’s wealth anyway. '
  '15':
  - type: text
    content: 'He has reduced our rights to those of foreign women. And after he sold us, he wasted the money you paid him for us. '
  '16':
  - type: text
    content: All the wealth God has given you from our father legally belongs to us and our children. So go ahead and do whatever God has told you.”
  '17':
  - type: text
    content: 'So Jacob put his wives and children on camels, '
  '18':
  - type: text
    content: 'and he drove all his livestock in front of him. He packed all the belongings he had acquired in Paddan-aram and set out for the land of Canaan, where his father, Isaac, lived. '
  '19':
  - type: text
    content: 'At the time they left, Laban was some distance away, shearing his sheep. Rachel stole her father’s household idols and took them with her. '
  '2':
  - type: text
    content: And Jacob began to notice a change in Laban’s attitude toward him.
  '20':
  - type: text
    content: 'Jacob outwitted Laban the Aramean, for they set out secretly and never told Laban they were leaving. '
  '21':
  - type: text
    content: So Jacob took all his possessions with him and crossed the Euphrates River,
  - type: note
    content: Hebrew the river.
  - type: text
    content: ' heading for the hill country of Gilead.'
  - type: heading
    content: Laban Pursues Jacob
  '22':
  - type: text
    content: 'Three days later, Laban was told that Jacob had fled. '
  '23':
  - type: text
    content: 'So he gathered a group of his relatives and set out in hot pursuit. He caught up with Jacob seven days later in the hill country of Gilead. '
  '24':
  - type: text
    content: But the previous night God had appeared to Laban the Aramean in a dream and told him, “I’m warning you—leave Jacob alone!”
  '25':
  - type: text
    content: 'Laban caught up with Jacob as he was camped in the hill country of Gilead, and he set up his camp not far from Jacob’s. '
  '26':
  - type: text
    content: '“What do you mean by deceiving me like this?” Laban demanded. “How dare you drag my daughters away like prisoners of war? '
  '27':
  - type: text
    content: 'Why did you slip away secretly? Why did you deceive me? And why didn’t you say you wanted to leave? I would have given you a farewell feast, with singing and music, accompanied by tambourines and harps. '
  '28':
  - type: text
    content: 'Why didn’t you let me kiss my daughters and grandchildren and tell them good-bye? You have acted very foolishly! '
  '29':
  - type: text
    content: 'I could destroy you, but the God of your father appeared to me last night and warned me, ‘Leave Jacob alone!’ '
  '3':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Jacob, “Return to the land of your father and grandfather and to your relatives there, and I will be with you.”'
  '30':
  - type: text
    content: I can understand your feeling that you must go, and your intense longing for your father’s home. But why have you stolen my gods?”
  '31':
  - type: text
    content: '“I rushed away because I was afraid,” Jacob answered. “I thought you would take your daughters from me by force. '
  '32':
  - type: text
    content: But as for your gods, see if you can find them, and let the person who has taken them die! And if you find anything else that belongs to you, identify it before all these relatives of ours, and I will give it back!” But Jacob did not know that Rachel had stolen the household idols.
  '33':
  - type: text
    content: 'Laban went first into Jacob’s tent to search there, then into Leah’s, and then the tents of the two servant wives—but he found nothing. Finally, he went into Rachel’s tent. '
  '34':
  - type: text
    content: 'But Rachel had taken the household idols and hidden them in her camel saddle, and now she was sitting on them. When Laban had thoroughly searched her tent without finding them, '
  '35':
  - type: text
    content: she said to her father, “Please, sir, forgive me if I don’t get up for you. I’m having my monthly period.” So Laban continued his search, but he could not find the household idols.
  '36':
  - type: text
    content: 'Then Jacob became very angry, and he challenged Laban. “What’s my crime?” he demanded. “What have I done wrong to make you chase after me as though I were a criminal? '
  '37':
  - type: text
    content: You have rummaged through everything I own. Now show me what you found that belongs to you! Set it out here in front of us, before our relatives, for all to see. Let them judge between us!
  '38':
  - type: text
    content: '“For twenty years I have been with you, caring for your flocks. In all that time your sheep and goats never miscarried. In all those years I never used a single ram of yours for food. '
  '39':
  - type: text
    content: If any were attacked and killed by wild animals, I never showed you the carcass and asked you to reduce the count of your flock. No, I took the loss myself! You made me pay for every stolen animal, whether it was taken in broad daylight or in the dark of night.
  '4':
  - type: text
    content: 'So Jacob called Rachel and Leah out to the field where he was watching his flock. '
  '40':
  - type: text
    content: '“I worked for you through the scorching heat of the day and through cold and sleepless nights. '
  '41':
  - type: text
    content: 'Yes, for twenty years I slaved in your house! I worked for fourteen years earning your two daughters, and then six more years for your flock. And you changed my wages ten times! '
  '42':
  - type: text
    content: In fact, if the God of my father had not been on my side—the God of Abraham and the fearsome God of Isaac
  - type: note
    content: Or and the Fear of Isaac.
  - type: text
    content: —you would have sent me away empty-handed. But God has seen your abuse and my hard work. That is why he appeared to you last night and rebuked you!”
  - type: heading
    content: Jacob’s Treaty with Laban
  '43':
  - type: text
    content: 'Then Laban replied to Jacob, “These women are my daughters, these children are my grandchildren, and these flocks are my flocks—in fact, everything you see is mine. But what can I do now about my daughters and their children? '
  '44':
  - type: text
    content: So come, let’s make a covenant, you and I, and it will be a witness to our commitment.”
  '45':
  - type: text
    content: 'So Jacob took a stone and set it up as a monument. '
  '46':
  - type: text
    content: 'Then he told his family members, “Gather some stones.” So they gathered stones and piled them in a heap. Then Jacob and Laban sat down beside the pile of stones to eat a covenant meal. '
  '47':
  - type: text
    content: To commemorate the event, Laban called the place Jegar-sahadutha (which means “witness pile” in Aramaic), and Jacob called it Galeed (which means “witness pile” in Hebrew).
  '48':
  - type: text
    content: 'Then Laban declared, “This pile of stones will stand as a witness to remind us of the covenant we have made today.” This explains why it was called Galeed—“Witness Pile.” '
  '49':
  - type: text
    content: 'But it was also called Mizpah (which means “watchtower”), for Laban said, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' keep watch between us to make sure that we keep this covenant when we are out of each other’s sight. '
  '5':
  - type: text
    content: 'He said to them, “I have noticed that your father’s attitude toward me has changed. But the God of my father has been with me. '
  '50':
  - type: text
    content: If you mistreat my daughters or if you marry other wives, God will see it even if no one else does. He is a witness to this covenant between us.
  '51':
  - type: text
    content: '“See this pile of stones,” Laban continued, “and see this monument I have set between us. '
  '52':
  - type: text
    content: 'They stand between us as witnesses of our vows. I will never pass this pile of stones to harm you, and you must never pass these stones or this monument to harm me. '
  '53':
  - type: text
    content: I call on the God of our ancestors—the God of your grandfather Abraham and the God of my grandfather Nahor—to serve as a judge between us.”
  - type: text
    content: So Jacob took an oath before the fearsome God of his father, Isaac,
  - type: note
    content: Or the Fear of his father, Isaac.
  - type: text
    content: ' to respect the boundary line. '
  '54':
  - type: text
    content: Then Jacob offered a sacrifice to God there on the mountain and invited everyone to a covenant feast. After they had eaten, they spent the night on the mountain.
  '55':
  - type: text
    content: ' '
  - type: note
    content: Verse 31:55 is numbered 32:1 in Hebrew text.
  - type: text
    content: Laban got up early the next morning, and he kissed his grandchildren and his daughters and blessed them. Then he left and returned home.
  '6':
  - type: text
    content: 'You know how hard I have worked for your father, '
  '7':
  - type: text
    content: 'but he has cheated me, changing my wages ten times. But God has not allowed him to do me any harm. '
  '8':
  - type: text
    content: 'For if he said, ‘The speckled animals will be your wages,’ the whole flock began to produce speckled young. And when he changed his mind and said, ‘The striped animals will be your wages,’ then the whole flock produced striped young. '
  '9':
  - type: text
    content: In this way, God has taken your father’s animals and given them to me.
