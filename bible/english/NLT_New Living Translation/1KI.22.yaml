document_id: 1KI.22,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoshaphat and Ahab
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For three years there was no war between Aram and Israel. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'King Ahab of Israel and King Jehoshaphat of Judah, dressed in their royal robes, were sitting on thrones at the threshing floor near the gate of Samaria. All of Ahab’s prophets were prophesying there in front of them. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'One of them, Zedekiah son of Kenaanah, made some iron horns and proclaimed, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: With these horns you will gore the Arameans to death!”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the other prophets agreed. “Yes,” they said, “go up to Ramoth-gilead and be victorious, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will give the king victory!”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, the messenger who went to get Micaiah said to him, “Look, all the prophets are promising victory for the king. Be sure that you agree with them and promise success.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Micaiah replied, “As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, I will say only what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' tells me to say.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Micaiah arrived before the king, Ahab asked him, “Micaiah, should we go to war against Ramoth-gilead, or should we hold back?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Micaiah replied sarcastically, “Yes, go up and be victorious, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will give the king victory!”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the king replied sharply, “How many times must I demand that you speak only the truth to me when you speak for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ?”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Micaiah told him, “In a vision I saw all Israel scattered on the mountains, like sheep without a shepherd. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, ‘Their master has been killed.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: These people have no master.
      marker-yv: yv-n
    - type: text
      text: ' Send them home in peace.’”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Didn’t I tell you?” the king of Israel exclaimed to Jehoshaphat. “He never prophesies anything but trouble for me.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Micaiah continued, “Listen to what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says! I saw the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sitting on his throne with all the armies of heaven around him, on his right and on his left. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then during the third year, King Jehoshaphat of Judah went to visit King Ahab of Israel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, ‘Who can entice Ahab to go into battle against Ramoth-gilead so he can be killed?’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“There were many suggestions, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and finally a spirit approached the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and said, ‘I can do it!’'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘How will you do this?’ the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' asked.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And the spirit replied, ‘I will go out and inspire all of Ahab’s prophets to speak lies.’
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘You will succeed,’ said the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . ‘Go ahead and do it.’
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“So you see, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has put a lying spirit in the mouths of all your prophets. For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has pronounced your doom.”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Zedekiah son of Kenaanah walked up to Micaiah and slapped him across the face. “Since when did the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' leave me to speak to you?” he demanded.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Micaiah replied, “You will find out soon enough when you are trying to hide in some secret room!”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Arrest him!” the king of Israel ordered. “Take him back to Amon, the governor of the city, and to my son Joash. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Give them this order from the king: ‘Put this man in prison, and feed him nothing but bread and water until I return safely from the battle!’”'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Micaiah replied, “If you return safely, it will mean that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has not spoken through me!” Then he added to those standing around, “Everyone mark my words!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Ahab
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So King Ahab of Israel and King Jehoshaphat of Judah led their armies against Ramoth-gilead. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: During the visit, the king of Israel said to his officials, “Do you realize that the town of Ramoth-gilead belongs to us? And yet we’ve done nothing to recapture it from the king of Aram!”
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The king of Israel said to Jehoshaphat, “As we go into battle, I will disguise myself so no one will recognize me, but you wear your royal robes.” So the king of Israel disguised himself, and they went into battle.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meanwhile, the king of Aram had issued these orders to his thirty-two chariot commanders: “Attack only the king of Israel. Don’t bother with anyone else!” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when the Aramean chariot commanders saw Jehoshaphat in his royal robes, they went after him. “There is the king of Israel!” they shouted. But when Jehoshaphat called out, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the chariot commanders realized he was not the king of Israel, and they stopped chasing him.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: An Aramean soldier, however, randomly shot an arrow at the Israelite troops and hit the king of Israel between the joints of his armor. “Turn the horses
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Turn your hand.
      marker-yv: yv-n
    - type: text
      text: ' and get me out of here!” Ahab groaned to the driver of his chariot. “I’m badly wounded!”'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The battle raged all that day, and the king remained propped up in his chariot facing the Arameans. The blood from his wound ran down to the floor of his chariot, and as evening arrived he died. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just as the sun was setting, the cry ran through his troops: “We’re done for! Run for your lives!”'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king died, and his body was taken to Samaria and buried there. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then his chariot was washed beside the pool of Samaria, and dogs came and licked his blood at the place where the prostitutes bathed,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'his blood, and the prostitutes bathed [in it]; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his blood, and they washed his armor.
      marker-yv: yv-n
    - type: text
      text: ' just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had promised.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of the events in Ahab’s reign and everything he did, including the story of the ivory palace and the towns he built, are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the History of the Kings of Israel.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he turned to Jehoshaphat and asked, “Will you join me in battle to recover Ramoth-gilead?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat replied to the king of Israel, “Why, of course! You and I are as one. My troops are your troops, and my horses are your horses.” '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Ahab died, and his son Ahaziah became the next king.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoshaphat Rules in Judah
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jehoshaphat son of Asa began to rule over Judah in the fourth year of King Ahab’s reign in Israel. '
  '42':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Jehoshaphat was thirty-five years old when he became king, and he reigned in Jerusalem twenty-five years. His mother was Azubah, the daughter of Shilhi.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat was a good king, following the example of his father, Asa. He did what was pleasing in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 22:43b-53 are numbered 22:44-54 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: 'During his reign, however, he failed to remove all the pagan shrines, and the people still offered sacrifices and burned incense there. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehoshaphat also made peace with the king of Israel.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of the events in Jehoshaphat’s reign, the extent of his power, and the wars he waged are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of the History of the Kings of Judah.
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He banished from the land the rest of the male and female shrine prostitutes, who still continued their practices from the days of his father, Asa.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (There was no king in Edom at that time, only a deputy.)
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehoshaphat also built a fleet of trading ships
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:48 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fleet of ships of Tarshish.
      marker-yv: yv-n
    - type: text
      text: ' to sail to Ophir for gold. But the ships never set sail, for they met with disaster in their home port of Ezion-geber. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At one time Ahaziah son of Ahab had proposed to Jehoshaphat, “Let my men sail with your men in the ships.” But Jehoshaphat refused the request.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jehoshaphat added, “But first let’s find out what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says.”'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Jehoshaphat died, he was buried with his ancestors in the City of David. Then his son Jehoram became the next king.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahaziah Rules in Israel
    marker-yv: yv-h
  '51':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ahaziah son of Ahab began to rule over Israel in the seventeenth year of King Jehoshaphat’s reign in Judah. He reigned in Samaria two years. '
  '52':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But he did what was evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight, following the example of his father and mother and the example of Jeroboam son of Nebat, who had led Israel to sin. '
  '53':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He served Baal and worshiped him, provoking the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, just as his father had done.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the king of Israel summoned the prophets, about 400 of them, and asked them, “Should I go to war against Ramoth-gilead, or should I hold back?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They all replied, “Yes, go right ahead! The Lord will give the king victory.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jehoshaphat asked, “Is there not also a prophet of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' here? We should ask him the same question.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king of Israel replied to Jehoshaphat, “There is one more man who could consult the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for us, but I hate him. He never prophesies anything but trouble for me! His name is Micaiah son of Imlah.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehoshaphat replied, “That’s not the way a king should talk! Let’s hear what he has to say.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the king of Israel called one of his officials and said, “Quick! Bring Micaiah son of Imlah.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Micaiah Prophesies against Ahab
    marker-yv: yv-h
