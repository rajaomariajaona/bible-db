document_id: 1KI.22,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoshaphat and Ahab
  - type: text
    content: 'For three years there was no war between Aram and Israel. '
  '10':
  - type: text
    content: 'King Ahab of Israel and King Jehoshaphat of Judah, dressed in their royal robes, were sitting on thrones at the threshing floor near the gate of Samaria. All of Ahab’s prophets were prophesying there in front of them. '
  '11':
  - type: text
    content: 'One of them, Zedekiah son of Kenaanah, made some iron horns and proclaimed, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: With these horns you will gore the Arameans to death!”'
  '12':
  - type: text
    content: 'All the other prophets agreed. “Yes,” they said, “go up to Ramoth-gilead and be victorious, for the '
  - type: text
    content: Lord
  - type: text
    content: ' will give the king victory!”'
  '13':
  - type: text
    content: Meanwhile, the messenger who went to get Micaiah said to him, “Look, all the prophets are promising victory for the king. Be sure that you agree with them and promise success.”
  '14':
  - type: text
    content: 'But Micaiah replied, “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, I will say only what the '
  - type: text
    content: Lord
  - type: text
    content: ' tells me to say.”'
  '15':
  - type: text
    content: When Micaiah arrived before the king, Ahab asked him, “Micaiah, should we go to war against Ramoth-gilead, or should we hold back?”
  - type: text
    content: 'Micaiah replied sarcastically, “Yes, go up and be victorious, for the '
  - type: text
    content: Lord
  - type: text
    content: ' will give the king victory!”'
  '16':
  - type: text
    content: 'But the king replied sharply, “How many times must I demand that you speak only the truth to me when you speak for the '
  - type: text
    content: Lord
  - type: text
    content: ?”
  '17':
  - type: text
    content: 'Then Micaiah told him, “In a vision I saw all Israel scattered on the mountains, like sheep without a shepherd. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, ‘Their master has been killed.'
  - type: note
    content: Hebrew These people have no master.
  - type: text
    content: ' Send them home in peace.’”'
  '18':
  - type: text
    content: “Didn’t I tell you?” the king of Israel exclaimed to Jehoshaphat. “He never prophesies anything but trouble for me.”
  '19':
  - type: text
    content: 'Then Micaiah continued, “Listen to what the '
  - type: text
    content: Lord
  - type: text
    content: ' says! I saw the '
  - type: text
    content: Lord
  - type: text
    content: ' sitting on his throne with all the armies of heaven around him, on his right and on his left. '
  '2':
  - type: text
    content: 'Then during the third year, King Jehoshaphat of Judah went to visit King Ahab of Israel. '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, ‘Who can entice Ahab to go into battle against Ramoth-gilead so he can be killed?’'
  - type: text
    content: '“There were many suggestions, '
  '21':
  - type: text
    content: 'and finally a spirit approached the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, ‘I can do it!’'
  '22':
  - type: text
    content: '“‘How will you do this?’ the '
  - type: text
    content: Lord
  - type: text
    content: ' asked.'
  - type: text
    content: “And the spirit replied, ‘I will go out and inspire all of Ahab’s prophets to speak lies.’
  - type: text
    content: '“‘You will succeed,’ said the '
  - type: text
    content: Lord
  - type: text
    content: . ‘Go ahead and do it.’
  '23':
  - type: text
    content: '“So you see, the '
  - type: text
    content: Lord
  - type: text
    content: ' has put a lying spirit in the mouths of all your prophets. For the '
  - type: text
    content: Lord
  - type: text
    content: ' has pronounced your doom.”'
  '24':
  - type: text
    content: 'Then Zedekiah son of Kenaanah walked up to Micaiah and slapped him across the face. “Since when did the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' leave me to speak to you?” he demanded.'
  '25':
  - type: text
    content: And Micaiah replied, “You will find out soon enough when you are trying to hide in some secret room!”
  '26':
  - type: text
    content: '“Arrest him!” the king of Israel ordered. “Take him back to Amon, the governor of the city, and to my son Joash. '
  '27':
  - type: text
    content: 'Give them this order from the king: ‘Put this man in prison, and feed him nothing but bread and water until I return safely from the battle!’”'
  '28':
  - type: text
    content: 'But Micaiah replied, “If you return safely, it will mean that the '
  - type: text
    content: Lord
  - type: text
    content: ' has not spoken through me!” Then he added to those standing around, “Everyone mark my words!”'
  - type: heading
    content: The Death of Ahab
  '29':
  - type: text
    content: 'So King Ahab of Israel and King Jehoshaphat of Judah led their armies against Ramoth-gilead. '
  '3':
  - type: text
    content: During the visit, the king of Israel said to his officials, “Do you realize that the town of Ramoth-gilead belongs to us? And yet we’ve done nothing to recapture it from the king of Aram!”
  '30':
  - type: text
    content: The king of Israel said to Jehoshaphat, “As we go into battle, I will disguise myself so no one will recognize me, but you wear your royal robes.” So the king of Israel disguised himself, and they went into battle.
  '31':
  - type: text
    content: 'Meanwhile, the king of Aram had issued these orders to his thirty-two chariot commanders: “Attack only the king of Israel. Don’t bother with anyone else!” '
  '32':
  - type: text
    content: 'So when the Aramean chariot commanders saw Jehoshaphat in his royal robes, they went after him. “There is the king of Israel!” they shouted. But when Jehoshaphat called out, '
  '33':
  - type: text
    content: the chariot commanders realized he was not the king of Israel, and they stopped chasing him.
  '34':
  - type: text
    content: An Aramean soldier, however, randomly shot an arrow at the Israelite troops and hit the king of Israel between the joints of his armor. “Turn the horses
  - type: note
    content: Hebrew Turn your hand.
  - type: text
    content: ' and get me out of here!” Ahab groaned to the driver of his chariot. “I’m badly wounded!”'
  '35':
  - type: text
    content: 'The battle raged all that day, and the king remained propped up in his chariot facing the Arameans. The blood from his wound ran down to the floor of his chariot, and as evening arrived he died. '
  '36':
  - type: text
    content: 'Just as the sun was setting, the cry ran through his troops: “We’re done for! Run for your lives!”'
  '37':
  - type: text
    content: 'So the king died, and his body was taken to Samaria and buried there. '
  '38':
  - type: text
    content: Then his chariot was washed beside the pool of Samaria, and dogs came and licked his blood at the place where the prostitutes bathed,
  - type: note
    content: Or his blood, and the prostitutes bathed [in it]; or his blood, and they washed his armor.
  - type: text
    content: ' just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had promised.'
  '39':
  - type: text
    content: 'The rest of the events in Ahab’s reign and everything he did, including the story of the ivory palace and the towns he built, are recorded in '
  - type: text
    content: The Book of the History of the Kings of Israel.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Then he turned to Jehoshaphat and asked, “Will you join me in battle to recover Ramoth-gilead?”
  - type: text
    content: 'Jehoshaphat replied to the king of Israel, “Why, of course! You and I are as one. My troops are your troops, and my horses are your horses.” '
  '40':
  - type: text
    content: So Ahab died, and his son Ahaziah became the next king.
  - type: heading
    content: Jehoshaphat Rules in Judah
  '41':
  - type: text
    content: 'Jehoshaphat son of Asa began to rule over Judah in the fourth year of King Ahab’s reign in Israel. '
  '42':
  - type: text
    content: Jehoshaphat was thirty-five years old when he became king, and he reigned in Jerusalem twenty-five years. His mother was Azubah, the daughter of Shilhi.
  '43':
  - type: text
    content: 'Jehoshaphat was a good king, following the example of his father, Asa. He did what was pleasing in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight. '
  - type: note
    content: Verses 22:43b-53 are numbered 22:44-54 in Hebrew text.
  - type: text
    content: 'During his reign, however, he failed to remove all the pagan shrines, and the people still offered sacrifices and burned incense there. '
  '44':
  - type: text
    content: Jehoshaphat also made peace with the king of Israel.
  '45':
  - type: text
    content: 'The rest of the events in Jehoshaphat’s reign, the extent of his power, and the wars he waged are recorded in '
  - type: text
    content: The Book of the History of the Kings of Judah.
  - type: text
    content: ' '
  '46':
  - type: text
    content: He banished from the land the rest of the male and female shrine prostitutes, who still continued their practices from the days of his father, Asa.
  '47':
  - type: text
    content: (There was no king in Edom at that time, only a deputy.)
  '48':
  - type: text
    content: Jehoshaphat also built a fleet of trading ships
  - type: note
    content: Hebrew fleet of ships of Tarshish.
  - type: text
    content: ' to sail to Ophir for gold. But the ships never set sail, for they met with disaster in their home port of Ezion-geber. '
  '49':
  - type: text
    content: At one time Ahaziah son of Ahab had proposed to Jehoshaphat, “Let my men sail with your men in the ships.” But Jehoshaphat refused the request.
  '5':
  - type: text
    content: 'Then Jehoshaphat added, “But first let’s find out what the '
  - type: text
    content: Lord
  - type: text
    content: ' says.”'
  '50':
  - type: text
    content: When Jehoshaphat died, he was buried with his ancestors in the City of David. Then his son Jehoram became the next king.
  - type: heading
    content: Ahaziah Rules in Israel
  '51':
  - type: text
    content: 'Ahaziah son of Ahab began to rule over Israel in the seventeenth year of King Jehoshaphat’s reign in Judah. He reigned in Samaria two years. '
  '52':
  - type: text
    content: 'But he did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, following the example of his father and mother and the example of Jeroboam son of Nebat, who had led Israel to sin. '
  '53':
  - type: text
    content: 'He served Baal and worshiped him, provoking the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, just as his father had done.'
  '6':
  - type: text
    content: So the king of Israel summoned the prophets, about 400 of them, and asked them, “Should I go to war against Ramoth-gilead, or should I hold back?”
  - type: text
    content: They all replied, “Yes, go right ahead! The Lord will give the king victory.”
  '7':
  - type: text
    content: 'But Jehoshaphat asked, “Is there not also a prophet of the '
  - type: text
    content: Lord
  - type: text
    content: ' here? We should ask him the same question.”'
  '8':
  - type: text
    content: 'The king of Israel replied to Jehoshaphat, “There is one more man who could consult the '
  - type: text
    content: Lord
  - type: text
    content: ' for us, but I hate him. He never prophesies anything but trouble for me! His name is Micaiah son of Imlah.”'
  - type: text
    content: Jehoshaphat replied, “That’s not the way a king should talk! Let’s hear what he has to say.”
  '9':
  - type: text
    content: So the king of Israel called one of his officials and said, “Quick! Bring Micaiah son of Imlah.”
  - type: heading
    content: Micaiah Prophesies against Ahab
