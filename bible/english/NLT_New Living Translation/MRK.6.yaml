document_id: MRK.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Rejected at Nazareth
  - type: text
    content: 'Jesus left that part of the country and returned with his disciples to Nazareth, his hometown. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: '“Wherever you go,” '
  - type: text
    content: 'he said, '
  - type: text
    content: “stay in the same house until you leave town.
  - type: text
    content: ' '
  '11':
  - type: text
    content: But if any place refuses to welcome you or listen to you, shake its dust from your feet as you leave to show that you have abandoned those people to their fate.”
  '12':
  - type: text
    content: 'So the disciples went out, telling everyone they met to repent of their sins and turn to God. '
  '13':
  - type: text
    content: And they cast out many demons and healed many sick people, anointing them with olive oil.
  - type: heading
    content: The Death of John the Baptist
  '14':
  - type: text
    content: Herod Antipas, the king, soon heard about Jesus, because everyone was talking about him. Some were saying,
  - type: note
    content: Some manuscripts read He was saying.
  - type: text
    content: ' “This must be John the Baptist raised from the dead. That is why he can do such miracles.” '
  '15':
  - type: text
    content: Others said, “He’s the prophet Elijah.” Still others said, “He’s a prophet like the other great prophets of the past.”
  '16':
  - type: text
    content: When Herod heard about Jesus, he said, “John, the man I beheaded, has come back from the dead.”
  '17':
  - type: text
    content: 'For Herod had sent soldiers to arrest and imprison John as a favor to Herodias. She had been his brother Philip’s wife, but Herod had married her. '
  '18':
  - type: text
    content: 'John had been telling Herod, “It is against God’s law for you to marry your brother’s wife.” '
  '19':
  - type: text
    content: 'So Herodias bore a grudge against John and wanted to kill him. But without Herod’s approval she was powerless, '
  '2':
  - type: text
    content: 'The next Sabbath he began teaching in the synagogue, and many who heard him were amazed. They asked, “Where did he get all this wisdom and the power to perform such miracles?” '
  '20':
  - type: text
    content: for Herod respected John; and knowing that he was a good and holy man, he protected him. Herod was greatly disturbed whenever he talked with John, but even so, he liked to listen to him.
  '21':
  - type: text
    content: 'Herodias’s chance finally came on Herod’s birthday. He gave a party for his high government officials, army officers, and the leading citizens of Galilee. '
  '22':
  - type: text
    content: Then his daughter, also named Herodias,
  - type: note
    content: Some manuscripts read the daughter of Herodias herself.
  - type: text
    content: ' came in and performed a dance that greatly pleased Herod and his guests. “Ask me for anything you like,” the king said to the girl, “and I will give it to you.” '
  '23':
  - type: text
    content: He even vowed, “I will give you whatever you ask, up to half my kingdom!”
  '24':
  - type: text
    content: She went out and asked her mother, “What should I ask for?”
  - type: text
    content: Her mother told her, “Ask for the head of John the Baptist!”
  '25':
  - type: text
    content: So the girl hurried back to the king and told him, “I want the head of John the Baptist, right now, on a tray!”
  '26':
  - type: text
    content: 'Then the king deeply regretted what he had said; but because of the vows he had made in front of his guests, he couldn’t refuse her. '
  '27':
  - type: text
    content: 'So he immediately sent an executioner to the prison to cut off John’s head and bring it to him. The soldier beheaded John in the prison, '
  '28':
  - type: text
    content: 'brought his head on a tray, and gave it to the girl, who took it to her mother. '
  '29':
  - type: text
    content: When John’s disciples heard what had happened, they came to get his body and buried it in a tomb.
  - type: heading
    content: Jesus Feeds Five Thousand
  '3':
  - type: text
    content: Then they scoffed, “He’s just a carpenter, the son of Mary
  - type: note
    content: Some manuscripts read He’s just the son of the carpenter and of Mary.
  - type: text
    content: ' and the brother of James, Joseph,'
  - type: note
    content: Most manuscripts read Joses; see Matt 13:55.
  - type: text
    content: ' Judas, and Simon. And his sisters live right here among us.” They were deeply offended and refused to believe in him.'
  '30':
  - type: text
    content: 'The apostles returned to Jesus from their ministry tour and told him all they had done and taught. '
  '31':
  - type: text
    content: 'Then Jesus said, '
  - type: text
    content: “Let’s go off by ourselves to a quiet place and rest awhile.”
  - type: text
    content: ' He said this because there were so many people coming and going that Jesus and his apostles didn’t even have time to eat.'
  '32':
  - type: text
    content: 'So they left by boat for a quiet place, where they could be alone. '
  '33':
  - type: text
    content: 'But many people recognized them and saw them leaving, and people from many towns ran ahead along the shore and got there ahead of them. '
  '34':
  - type: text
    content: Jesus saw the huge crowd as he stepped from the boat, and he had compassion on them because they were like sheep without a shepherd. So he began teaching them many things.
  '35':
  - type: text
    content: 'Late in the afternoon his disciples came to him and said, “This is a remote place, and it’s already getting late. '
  '36':
  - type: text
    content: Send the crowds away so they can go to the nearby farms and villages and buy something to eat.”
  '37':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “You feed them.”
  - type: text
    content: “With what?” they asked. “We’d have to work for months to earn enough money
  - type: note
    content: Greek It would take 200 denarii. A denarius was equivalent to a laborer’s full day’s wage.
  - type: text
    content: ' to buy food for all these people!”'
  '38':
  - type: text
    content: ' '
  - type: text
    content: '“How much bread do you have?” '
  - type: text
    content: 'he asked. '
  - type: text
    content: “Go and find out.”
  - type: text
    content: They came back and reported, “We have five loaves of bread and two fish.”
  '39':
  - type: text
    content: 'Then Jesus told the disciples to have the people sit down in groups on the green grass. '
  '4':
  - type: text
    content: 'Then Jesus told them, '
  - type: text
    content: “A prophet is honored everywhere except in his own hometown and among his relatives and his own family.”
  - type: text
    content: ' '
  '40':
  - type: text
    content: So they sat down in groups of fifty or a hundred.
  '41':
  - type: text
    content: 'Jesus took the five loaves and two fish, looked up toward heaven, and blessed them. Then, breaking the loaves into pieces, he kept giving the bread to the disciples so they could distribute it to the people. He also divided the fish for everyone to share. '
  '42':
  - type: text
    content: 'They all ate as much as they wanted, '
  '43':
  - type: text
    content: 'and afterward, the disciples picked up twelve baskets of leftover bread and fish. '
  '44':
  - type: text
    content: A total of 5,000 men and their families were fed.
  - type: note
    content: Some manuscripts read fed from the loaves.
  - type: heading
    content: Jesus Walks on Water
  '45':
  - type: text
    content: 'Immediately after this, Jesus insisted that his disciples get back into the boat and head across the lake to Bethsaida, while he sent the people home. '
  '46':
  - type: text
    content: After telling everyone good-bye, he went up into the hills by himself to pray.
  '47':
  - type: text
    content: 'Late that night, the disciples were in their boat in the middle of the lake, and Jesus was alone on land. '
  '48':
  - type: text
    content: He saw that they were in serious trouble, rowing hard and struggling against the wind and waves. About three o’clock in the morning
  - type: note
    content: Greek About the fourth watch of the night.
  - type: text
    content: ' Jesus came toward them, walking on the water. He intended to go past them, '
  '49':
  - type: text
    content: 'but when they saw him walking on the water, they cried out in terror, thinking he was a ghost. '
  '5':
  - type: text
    content: 'And because of their unbelief, he couldn’t do any miracles among them except to place his hands on a few sick people and heal them. '
  '50':
  - type: text
    content: They were all terrified when they saw him.
  - type: text
    content: 'But Jesus spoke to them at once. '
  - type: text
    content: '“Don’t be afraid,” '
  - type: text
    content: 'he said. '
  - type: text
    content: “Take courage! I am here!
  - type: note
    content: Or The ‘I Am’ is here; Greek reads I am. See Exod 3:14.
  - type: text
    content: ”
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'Then he climbed into the boat, and the wind stopped. They were totally amazed, '
  '52':
  - type: text
    content: for they still didn’t understand the significance of the miracle of the loaves. Their hearts were too hard to take it in.
  '53':
  - type: text
    content: 'After they had crossed the lake, they landed at Gennesaret. They brought the boat to shore '
  '54':
  - type: text
    content: 'and climbed out. The people recognized Jesus at once, '
  '55':
  - type: text
    content: 'and they ran throughout the whole area, carrying sick people on mats to wherever they heard he was. '
  '56':
  - type: text
    content: Wherever he went—in villages, cities, or the countryside—they brought the sick out to the marketplaces. They begged him to let the sick touch at least the fringe of his robe, and all who touched him were healed.
  '6':
  - type: text
    content: And he was amazed at their unbelief.
  - type: heading
    content: Jesus Sends Out the Twelve Disciples
  - type: text
    content: 'Then Jesus went from village to village, teaching the people. '
  '7':
  - type: text
    content: And he called his twelve disciples together and began sending them out two by two, giving them authority to cast out evil
  - type: note
    content: Greek unclean.
  - type: text
    content: ' spirits. '
  '8':
  - type: text
    content: He told them to take nothing for their journey except a walking stick—no food, no traveler’s bag, no money.
  - type: note
    content: Greek no copper coins in their money belts.
  - type: text
    content: ' '
  '9':
  - type: text
    content: He allowed them to wear sandals but not to take a change of clothes.
