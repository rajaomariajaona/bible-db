document_id: MRK.6,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Rejected at Nazareth
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jesus left that part of the country and returned with his disciples to Nazareth, his hometown. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Wherever you go,” '
    - type: text
      text: 'he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “stay in the same house until you leave town.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But if any place refuses to welcome you or listen to you, shake its dust from your feet as you leave to show that you have abandoned those people to their fate.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So the disciples went out, telling everyone they met to repent of their sins and turn to God. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: And they cast out many demons and healed many sick people, anointing them with olive oil.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of John the Baptist
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Herod Antipas, the king, soon heard about Jesus, because everyone was talking about him. Some were saying,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He was saying.
      marker-yv: yv-n
    - type: text
      text: ' “This must be John the Baptist raised from the dead. That is why he can do such miracles.” '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Others said, “He’s the prophet Elijah.” Still others said, “He’s a prophet like the other great prophets of the past.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When Herod heard about Jesus, he said, “John, the man I beheaded, has come back from the dead.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For Herod had sent soldiers to arrest and imprison John as a favor to Herodias. She had been his brother Philip’s wife, but Herod had married her. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'John had been telling Herod, “It is against God’s law for you to marry your brother’s wife.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So Herodias bore a grudge against John and wanted to kill him. But without Herod’s approval she was powerless, '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The next Sabbath he began teaching in the synagogue, and many who heard him were amazed. They asked, “Where did he get all this wisdom and the power to perform such miracles?” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: for Herod respected John; and knowing that he was a good and holy man, he protected him. Herod was greatly disturbed whenever he talked with John, but even so, he liked to listen to him.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Herodias’s chance finally came on Herod’s birthday. He gave a party for his high government officials, army officers, and the leading citizens of Galilee. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Then his daughter, also named Herodias,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the daughter of Herodias herself.
      marker-yv: yv-n
    - type: text
      text: ' came in and performed a dance that greatly pleased Herod and his guests. “Ask me for anything you like,” the king said to the girl, “and I will give it to you.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: He even vowed, “I will give you whatever you ask, up to half my kingdom!”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: She went out and asked her mother, “What should I ask for?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Her mother told her, “Ask for the head of John the Baptist!”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: So the girl hurried back to the king and told him, “I want the head of John the Baptist, right now, on a tray!”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Then the king deeply regretted what he had said; but because of the vows he had made in front of his guests, he couldn’t refuse her. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'So he immediately sent an executioner to the prison to cut off John’s head and bring it to him. The soldier beheaded John in the prison, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'brought his head on a tray, and gave it to the girl, who took it to her mother. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: When John’s disciples heard what had happened, they came to get his body and buried it in a tomb.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Feeds Five Thousand
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Then they scoffed, “He’s just a carpenter, the son of Mary
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:3a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He’s just the son of the carpenter and of Mary.
      marker-yv: yv-n
    - type: text
      text: ' and the brother of James, Joseph,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:3b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Most manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Joses; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see Matt 13:55.
      marker-yv: yv-n
    - type: text
      text: ' Judas, and Simon. And his sisters live right here among us.” They were deeply offended and refused to believe in him.'
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'The apostles returned to Jesus from their ministry tour and told him all they had done and taught. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Let’s go off by ourselves to a quiet place and rest awhile.”
    - type: text
      text: ' He said this because there were so many people coming and going that Jesus and his apostles didn’t even have time to eat.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'So they left by boat for a quiet place, where they could be alone. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'But many people recognized them and saw them leaving, and people from many towns ran ahead along the shore and got there ahead of them. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Jesus saw the huge crowd as he stepped from the boat, and he had compassion on them because they were like sheep without a shepherd. So he began teaching them many things.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Late in the afternoon his disciples came to him and said, “This is a remote place, and it’s already getting late. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Send the crowds away so they can go to the nearby farms and villages and buy something to eat.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'But Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You feed them.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “With what?” they asked. “We’d have to work for months to earn enough money
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'It would take 200 denarii. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A denarius was equivalent to a laborer’s full day’s wage.
      marker-yv: yv-n
    - type: text
      text: ' to buy food for all these people!”'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“How much bread do you have?” '
    - type: text
      text: 'he asked. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go and find out.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They came back and reported, “We have five loaves of bread and two fish.”
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Then Jesus told the disciples to have the people sit down in groups on the green grass. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then Jesus told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “A prophet is honored everywhere except in his own hometown and among his relatives and his own family.”
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: So they sat down in groups of fifty or a hundred.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Jesus took the five loaves and two fish, looked up toward heaven, and blessed them. Then, breaking the loaves into pieces, he kept giving the bread to the disciples so they could distribute it to the people. He also divided the fish for everyone to share. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'They all ate as much as they wanted, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'and afterward, the disciples picked up twelve baskets of leftover bread and fish. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: A total of 5,000 men and their families were fed.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fed from the loaves.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Walks on Water
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Immediately after this, Jesus insisted that his disciples get back into the boat and head across the lake to Bethsaida, while he sent the people home. '
  '46':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: After telling everyone good-bye, he went up into the hills by himself to pray.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Late that night, the disciples were in their boat in the middle of the lake, and Jesus was alone on land. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: He saw that they were in serious trouble, rowing hard and struggling against the wind and waves. About three o’clock in the morning
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:48 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: About the fourth watch of the night.
      marker-yv: yv-n
    - type: text
      text: ' Jesus came toward them, walking on the water. He intended to go past them, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'but when they saw him walking on the water, they cried out in terror, thinking he was a ghost. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And because of their unbelief, he couldn’t do any miracles among them except to place his hands on a few sick people and heal them. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: They were all terrified when they saw him.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus spoke to them at once. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Don’t be afraid,” '
    - type: text
      text: 'he said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Take courage! I am here!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The ‘
        - type: usfm
          marker: nd
          children:
          - type: text
            text: I Am
        - type: text
          text: '’ is here; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'I am. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Exod 3:14.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
    - type: text
      text: ' '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Then he climbed into the boat, and the wind stopped. They were totally amazed, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: for they still didn’t understand the significance of the miracle of the loaves. Their hearts were too hard to take it in.
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'After they had crossed the lake, they landed at Gennesaret. They brought the boat to shore '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'and climbed out. The people recognized Jesus at once, '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'and they ran throughout the whole area, carrying sick people on mats to wherever they heard he was. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: Wherever he went—in villages, cities, or the countryside—they brought the sick out to the marketplaces. They begged him to let the sick touch at least the fringe of his robe, and all who touched him were healed.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And he was amazed at their unbelief.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Sends Out the Twelve Disciples
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Jesus went from village to village, teaching the people. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And he called his twelve disciples together and began sending them out two by two, giving them authority to cast out evil
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: unclean.
      marker-yv: yv-n
    - type: text
      text: ' spirits. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He told them to take nothing for their journey except a walking stick—no food, no traveler’s bag, no money.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:8 '
      - type: usfm
        marker: ft
        children:
