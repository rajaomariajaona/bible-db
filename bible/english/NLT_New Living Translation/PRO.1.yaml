document_id: PRO.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Purpose of Proverbs
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: These are the proverbs of Solomon, David’s son, king of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Their purpose is to teach people wisdom and discipline,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to help them understand the insights of the wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Their purpose is to teach people to live disciplined and successful lives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to help them do what is right, just, and fair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: These proverbs will give insight to the simple,
- type: usfm
  marker: q2
  children:
  - type: text
    text: knowledge and discernment to the young.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Let the wise listen to these proverbs and become even wiser.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let those with understanding receive guidance
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: by exploring the meaning in these proverbs and parables,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the words of the wise and their riddles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is the foundation of true knowledge,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but fools despise wisdom and discipline.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'A Father’s Exhortation: Acquire Wisdom'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: My child,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'My son; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 1:10, 15.
    marker-yv: yv-n
  - type: text
    text: ' listen when your father corrects you.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t neglect your mother’s instruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: What you learn from them will crown you with grace
- type: usfm
  marker: q2
  children:
  - type: text
    text: and be a chain of honor around your neck.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: My child, if sinners entice you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: turn your back on them!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They may say, “Come and join us.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let’s hide and kill someone!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Just for fun, let’s ambush the innocent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Let’s swallow them alive, like the grave
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: like Sheol.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let’s swallow them whole, like those who go down to the pit of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Think of the great things we’ll get!
- type: usfm
  marker: q2
  children:
  - type: text
    text: We’ll fill our houses with all the stuff we take.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Come, throw in your lot with us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we’ll all share the loot.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My child, don’t go along with them!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Stay far away from their paths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: They rush to commit evil deeds.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They hurry to commit murder.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: If a bird sees a trap being set,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it knows to stay away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But these people set an ambush for themselves;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are trying to get themselves killed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Such is the fate of all who are greedy for money;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it robs them of life.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom Shouts in the Streets
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Wisdom shouts in the streets.
- type: usfm
  marker: q2
  children:
  - type: text
    text: She cries out in the public square.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: She calls to the crowds along the main street,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to those gathered in front of the city gate:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “How long, you simpletons,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will you insist on being simpleminded?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How long will you mockers relish your mocking?
- type: usfm
  marker: q2
  children:
  - type: text
    text: How long will you fools hate knowledge?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Come and listen to my counsel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll share my heart with you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make you wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “I called you so often, but you wouldn’t come.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I reached out to you, but you paid no attention.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: You ignored my advice
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rejected the correction I offered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: So I will laugh when you are in trouble!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will mock you when disaster overtakes you—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: when calamity overtakes you like a storm,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when disaster engulfs you like a cyclone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and anguish and distress overwhelm you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “When they cry for help, I will not answer.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Though they anxiously search for me, they will not find me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: For they hated knowledge
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and chose not to fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: They rejected my advice
- type: usfm
  marker: q2
  children:
  - type: text
    text: and paid no attention when I corrected them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Therefore, they must eat the bitter fruit of living their own way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: choking on their own schemes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: For simpletons turn away from me—to death.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Fools are destroyed by their own complacency.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: But all who listen to me will live in peace,
- type: usfm
  marker: q2
  children:
  - type: text
    text: untroubled by fear of harm.”
