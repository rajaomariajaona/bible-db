document_id: PRO.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Purpose of Proverbs
  - type: text
    content: These are the proverbs of Solomon, David’s son, king of Israel.
  '10':
  - type: text
    content: My child, if sinners entice you,
  - type: text
    content: turn your back on them!
  '11':
  - type: text
    content: They may say, “Come and join us.
  - type: text
    content: Let’s hide and kill someone!
  - type: text
    content: Just for fun, let’s ambush the innocent!
  '12':
  - type: text
    content: Let’s swallow them alive, like the grave
  - type: note
    content: Hebrew like Sheol.
  - type: text
    content: ;
  - type: text
    content: let’s swallow them whole, like those who go down to the pit of death.
  '13':
  - type: text
    content: Think of the great things we’ll get!
  - type: text
    content: We’ll fill our houses with all the stuff we take.
  '14':
  - type: text
    content: Come, throw in your lot with us;
  - type: text
    content: we’ll all share the loot.”
  '15':
  - type: text
    content: My child, don’t go along with them!
  - type: text
    content: Stay far away from their paths.
  '16':
  - type: text
    content: They rush to commit evil deeds.
  - type: text
    content: They hurry to commit murder.
  '17':
  - type: text
    content: If a bird sees a trap being set,
  - type: text
    content: it knows to stay away.
  '18':
  - type: text
    content: But these people set an ambush for themselves;
  - type: text
    content: they are trying to get themselves killed.
  '19':
  - type: text
    content: Such is the fate of all who are greedy for money;
  - type: text
    content: it robs them of life.
  - type: heading
    content: Wisdom Shouts in the Streets
  '2':
  - type: text
    content: Their purpose is to teach people wisdom and discipline,
  - type: text
    content: to help them understand the insights of the wise.
  '20':
  - type: text
    content: Wisdom shouts in the streets.
  - type: text
    content: She cries out in the public square.
  '21':
  - type: text
    content: She calls to the crowds along the main street,
  - type: text
    content: 'to those gathered in front of the city gate:'
  '22':
  - type: text
    content: “How long, you simpletons,
  - type: text
    content: will you insist on being simpleminded?
  - type: text
    content: How long will you mockers relish your mocking?
  - type: text
    content: How long will you fools hate knowledge?
  '23':
  - type: text
    content: Come and listen to my counsel.
  - type: text
    content: I’ll share my heart with you
  - type: text
    content: and make you wise.
  '24':
  - type: text
    content: “I called you so often, but you wouldn’t come.
  - type: text
    content: I reached out to you, but you paid no attention.
  '25':
  - type: text
    content: You ignored my advice
  - type: text
    content: and rejected the correction I offered.
  '26':
  - type: text
    content: So I will laugh when you are in trouble!
  - type: text
    content: I will mock you when disaster overtakes you—
  '27':
  - type: text
    content: when calamity overtakes you like a storm,
  - type: text
    content: when disaster engulfs you like a cyclone,
  - type: text
    content: and anguish and distress overwhelm you.
  '28':
  - type: text
    content: “When they cry for help, I will not answer.
  - type: text
    content: Though they anxiously search for me, they will not find me.
  '29':
  - type: text
    content: For they hated knowledge
  - type: text
    content: 'and chose not to fear the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: Their purpose is to teach people to live disciplined and successful lives,
  - type: text
    content: to help them do what is right, just, and fair.
  '30':
  - type: text
    content: They rejected my advice
  - type: text
    content: and paid no attention when I corrected them.
  '31':
  - type: text
    content: Therefore, they must eat the bitter fruit of living their own way,
  - type: text
    content: choking on their own schemes.
  '32':
  - type: text
    content: For simpletons turn away from me—to death.
  - type: text
    content: Fools are destroyed by their own complacency.
  '33':
  - type: text
    content: But all who listen to me will live in peace,
  - type: text
    content: untroubled by fear of harm.”
  '4':
  - type: text
    content: These proverbs will give insight to the simple,
  - type: text
    content: knowledge and discernment to the young.
  '5':
  - type: text
    content: Let the wise listen to these proverbs and become even wiser.
  - type: text
    content: Let those with understanding receive guidance
  '6':
  - type: text
    content: by exploring the meaning in these proverbs and parables,
  - type: text
    content: the words of the wise and their riddles.
  '7':
  - type: text
    content: 'Fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' is the foundation of true knowledge,'
  - type: text
    content: but fools despise wisdom and discipline.
  - type: heading
    content: 'A Father’s Exhortation: Acquire Wisdom'
  '8':
  - type: text
    content: My child,
  - type: note
    content: Hebrew My son; also in 1:10, 15.
  - type: text
    content: ' listen when your father corrects you.'
  - type: text
    content: Don’t neglect your mother’s instruction.
  '9':
  - type: text
    content: What you learn from them will crown you with grace
  - type: text
    content: and be a chain of honor around your neck.
