document_id: ACT.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Peter Explains His Actions
  - type: text
    content: Soon the news reached the apostles and other believers
  - type: note
    content: Greek brothers.
  - type: text
    content: ' in Judea that the Gentiles had received the word of God. '
  '10':
  - type: text
    content: This happened three times before the sheet and all it contained was pulled back up to heaven.
  '11':
  - type: text
    content: '“Just then three men who had been sent from Caesarea arrived at the house where we were staying. '
  '12':
  - type: text
    content: 'The Holy Spirit told me to go with them and not to worry that they were Gentiles. These six brothers here accompanied me, and we soon entered the home of the man who had sent for us. '
  '13':
  - type: text
    content: 'He told us how an angel had appeared to him in his home and had told him, ‘Send messengers to Joppa, and summon a man named Simon Peter. '
  '14':
  - type: text
    content: He will tell you how you and everyone in your household can be saved!’
  '15':
  - type: text
    content: '“As I began to speak,” Peter continued, “the Holy Spirit fell on them, just as he fell on us at the beginning. '
  '16':
  - type: text
    content: 'Then I thought of the Lord’s words when he said, '
  - type: text
    content: ‘John baptized with
  - type: note
    content: Or in; also in 11:16b.
  - type: text
    content: ' '
  - type: text
    content: water, but you will be baptized with the Holy Spirit.’
  - type: text
    content: ' '
  '17':
  - type: text
    content: And since God gave these Gentiles the same gift he gave us when we believed in the Lord Jesus Christ, who was I to stand in God’s way?”
  '18':
  - type: text
    content: When the others heard this, they stopped objecting and began praising God. They said, “We can see that God has also given the Gentiles the privilege of repenting of their sins and receiving eternal life.”
  - type: heading
    content: The Church in Antioch of Syria
  '19':
  - type: text
    content: 'Meanwhile, the believers who had been scattered during the persecution after Stephen’s death traveled as far as Phoenicia, Cyprus, and Antioch of Syria. They preached the word of God, but only to Jews. '
  '2':
  - type: text
    content: But when Peter arrived back in Jerusalem, the Jewish believers
  - type: note
    content: Greek those of the circumcision.
  - type: text
    content: ' criticized him. '
  '20':
  - type: text
    content: However, some of the believers who went to Antioch from Cyprus and Cyrene began preaching to the Gentiles
  - type: note
    content: Greek the Hellenists (i.e., those who speak Greek); other manuscripts read the Greeks.
  - type: text
    content: ' about the Lord Jesus. '
  '21':
  - type: text
    content: The power of the Lord was with them, and a large number of these Gentiles believed and turned to the Lord.
  '22':
  - type: text
    content: 'When the church at Jerusalem heard what had happened, they sent Barnabas to Antioch. '
  '23':
  - type: text
    content: 'When he arrived and saw this evidence of God’s blessing, he was filled with joy, and he encouraged the believers to stay true to the Lord. '
  '24':
  - type: text
    content: Barnabas was a good man, full of the Holy Spirit and strong in faith. And many people were brought to the Lord.
  '25':
  - type: text
    content: 'Then Barnabas went on to Tarsus to look for Saul. '
  '26':
  - type: text
    content: When he found him, he brought him back to Antioch. Both of them stayed there with the church for a full year, teaching large crowds of people. (It was at Antioch that the believers
  - type: note
    content: Greek disciples; also in 11:29.
  - type: text
    content: ' were first called Christians.)'
  '27':
  - type: text
    content: 'During this time some prophets traveled from Jerusalem to Antioch. '
  '28':
  - type: text
    content: 'One of them named Agabus stood up in one of the meetings and predicted by the Spirit that a great famine was coming upon the entire Roman world. (This was fulfilled during the reign of Claudius.) '
  '29':
  - type: text
    content: So the believers in Antioch decided to send relief to the brothers and sisters
  - type: note
    content: Greek the brothers.
  - type: text
    content: ' in Judea, everyone giving as much as they could. '
  '3':
  - type: text
    content: “You entered the home of Gentiles
  - type: note
    content: Greek of uncircumcised men.
  - type: text
    content: ' and even ate with them!” they said.'
  '30':
  - type: text
    content: This they did, entrusting their gifts to Barnabas and Saul to take to the elders of the church in Jerusalem.
  '4':
  - type: text
    content: 'Then Peter told them exactly what had happened. '
  '5':
  - type: text
    content: '“I was in the town of Joppa,” he said, “and while I was praying, I went into a trance and saw a vision. Something like a large sheet was let down by its four corners from the sky. And it came right down to me. '
  '6':
  - type: text
    content: 'When I looked inside the sheet, I saw all sorts of tame and wild animals, reptiles, and birds. '
  '7':
  - type: text
    content: And I heard a voice say, ‘Get up, Peter; kill and eat them.’
  '8':
  - type: text
    content: “‘No, Lord,’ I replied. ‘I have never eaten anything that our Jewish laws have declared impure or unclean.
  - type: note
    content: Greek anything common or unclean.
  - type: text
    content: ’
  '9':
  - type: text
    content: '“But the voice from heaven spoke again: ‘Do not call something unclean if God has made it clean.’ '
