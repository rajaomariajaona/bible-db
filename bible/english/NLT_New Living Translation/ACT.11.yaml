document_id: ACT.11,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter Explains His Actions
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Soon the news reached the apostles and other believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers.
      marker-yv: yv-n
    - type: text
      text: ' in Judea that the Gentiles had received the word of God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This happened three times before the sheet and all it contained was pulled back up to heaven.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Just then three men who had been sent from Caesarea arrived at the house where we were staying. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Holy Spirit told me to go with them and not to worry that they were Gentiles. These six brothers here accompanied me, and we soon entered the home of the man who had sent for us. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He told us how an angel had appeared to him in his home and had told him, ‘Send messengers to Joppa, and summon a man named Simon Peter. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He will tell you how you and everyone in your household can be saved!’
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“As I began to speak,” Peter continued, “the Holy Spirit fell on them, just as he fell on us at the beginning. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I thought of the Lord’s words when he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘John baptized with
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 11:16b.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: water, but you will be baptized with the Holy Spirit.’
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And since God gave these Gentiles the same gift he gave us when we believed in the Lord Jesus Christ, who was I to stand in God’s way?”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the others heard this, they stopped objecting and began praising God. They said, “We can see that God has also given the Gentiles the privilege of repenting of their sins and receiving eternal life.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Church in Antioch of Syria
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Meanwhile, the believers who had been scattered during the persecution after Stephen’s death traveled as far as Phoenicia, Cyprus, and Antioch of Syria. They preached the word of God, but only to Jews. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But when Peter arrived back in Jerusalem, the Jewish believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: those of the circumcision.
      marker-yv: yv-n
    - type: text
      text: ' criticized him. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: However, some of the believers who went to Antioch from Cyprus and Cyrene began preaching to the Gentiles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Hellenists '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(i.e., those who speak Greek); other manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Greeks.
      marker-yv: yv-n
    - type: text
      text: ' about the Lord Jesus. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The power of the Lord was with them, and a large number of these Gentiles believed and turned to the Lord.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the church at Jerusalem heard what had happened, they sent Barnabas to Antioch. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he arrived and saw this evidence of God’s blessing, he was filled with joy, and he encouraged the believers to stay true to the Lord. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Barnabas was a good man, full of the Holy Spirit and strong in faith. And many people were brought to the Lord.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Barnabas went on to Tarsus to look for Saul. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he found him, he brought him back to Antioch. Both of them stayed there with the church for a full year, teaching large crowds of people. (It was at Antioch that the believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'disciples; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 11:29.
      marker-yv: yv-n
    - type: text
      text: ' were first called Christians.)'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'During this time some prophets traveled from Jerusalem to Antioch. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of them named Agabus stood up in one of the meetings and predicted by the Spirit that a great famine was coming upon the entire Roman world. (This was fulfilled during the reign of Claudius.) '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the believers in Antioch decided to send relief to the brothers and sisters
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the brothers.
      marker-yv: yv-n
    - type: text
      text: ' in Judea, everyone giving as much as they could. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “You entered the home of Gentiles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of uncircumcised men.
      marker-yv: yv-n
    - type: text
      text: ' and even ate with them!” they said.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This they did, entrusting their gifts to Barnabas and Saul to take to the elders of the church in Jerusalem.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Peter told them exactly what had happened. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I was in the town of Joppa,” he said, “and while I was praying, I went into a trance and saw a vision. Something like a large sheet was let down by its four corners from the sky. And it came right down to me. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I looked inside the sheet, I saw all sorts of tame and wild animals, reptiles, and birds. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I heard a voice say, ‘Get up, Peter; kill and eat them.’
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘No, Lord,’ I replied. ‘I have never eaten anything that our Jewish laws have declared impure or unclean.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: anything common or unclean.
      marker-yv: yv-n
    - type: text
      text: ’
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But the voice from heaven spoke again: ‘Do not call something unclean if God has made it clean.’ '
