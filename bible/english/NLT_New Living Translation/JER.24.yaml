document_id: JER.24,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Good and Bad Figs
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: After King Nebuchadnezzar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Nebuchadrezzar, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Nebuchadnezzar.
      marker-yv: yv-n
    - type: text
      text: ' of Babylon exiled Jehoiachin'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jeconiah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Jehoiachin.
      marker-yv: yv-n
    - type: text
      text: ' son of Jehoiakim, king of Judah, to Babylon along with the officials of Judah and all the craftsmen and artisans, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave me this vision. I saw two baskets of figs placed in front of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple in Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And I will send war, famine, and disease until they have vanished from the land of Israel, which I gave to them and their ancestors.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: One basket was filled with fresh, ripe figs, while the other was filled with bad figs that were too rotten to eat.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “What do you see, Jeremiah?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: I replied, “Figs, some very good and some very bad, too rotten to eat.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave me this message: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: The good figs represent the exiles I sent from Judah to the land of the Babylonians.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans.
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I will watch over and care for them, and I will bring them back here again. I will build them up and not tear them down. I will plant them and not uproot them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I will give them hearts that recognize me as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . They will be my people, and I will be their God, for they will return to me wholeheartedly.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“But the bad figs,” the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “represent King Zedekiah of Judah, his officials, all the people left in Jerusalem, and those who live in Egypt. I will treat them like bad figs, too rotten to eat. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I will make them an object of horror and a symbol of evil to every nation on earth. They will be disgraced and mocked, taunted and cursed, wherever I scatter them. '
