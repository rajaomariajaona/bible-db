document_id: LUK.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of the Persistent Widow
  - type: text
    content: 'One day Jesus told his disciples a story to show that they should always pray and never give up. '
  '10':
  - type: text
    content: “Two men went to the Temple to pray. One was a Pharisee, and the other was a despised tax collector.
  - type: text
    content: ' '
  '11':
  - type: text
    content: The Pharisee stood by himself and prayed this prayer
  - type: note
    content: Some manuscripts read stood and prayed this prayer to himself.
  - type: text
    content: ': ‘I thank you, God, that I am not like other people—cheaters, sinners, adulterers. I’m certainly not like that tax collector!'
  - type: text
    content: ' '
  '12':
  - type: text
    content: I fast twice a week, and I give you a tenth of my income.’
  '13':
  - type: text
    content: ' '
  - type: text
    content: “But the tax collector stood at a distance and dared not even lift his eyes to heaven as he prayed. Instead, he beat his chest in sorrow, saying, ‘O God, be merciful to me, for I am a sinner.’
  - type: text
    content: ' '
  '14':
  - type: text
    content: I tell you, this sinner, not the Pharisee, returned home justified before God. For those who exalt themselves will be humbled, and those who humble themselves will be exalted.”
  - type: heading
    content: Jesus Blesses the Children
  '15':
  - type: text
    content: One day some parents brought their little children to Jesus so he could touch and bless them. But when the disciples saw this, they scolded the parents for bothering him.
  '16':
  - type: text
    content: 'Then Jesus called for the children and said to the disciples, '
  - type: text
    content: “Let the children come to me. Don’t stop them! For the Kingdom of God belongs to those who are like these children.
  - type: text
    content: ' '
  '17':
  - type: text
    content: I tell you the truth, anyone who doesn’t receive the Kingdom of God like a child will never enter it.”
  - type: heading
    content: The Rich Man
  '18':
  - type: text
    content: 'Once a religious leader asked Jesus this question: “Good Teacher, what should I do to inherit eternal life?”'
  '19':
  - type: text
    content: ' '
  - type: text
    content: '“Why do you call me good?” '
  - type: text
    content: 'Jesus asked him. '
  - type: text
    content: “Only God is truly good.
  - type: text
    content: ' '
  '2':
  - type: text
    content: '“There was a judge in a certain city,” '
  - type: text
    content: 'he said, '
  - type: text
    content: “who neither feared God nor cared about people.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'But to answer your question, you know the commandments: ‘You must not commit adultery. You must not murder. You must not steal. You must not testify falsely. Honor your father and mother.’'
  - type: note
    content: Exod 20:12-16; Deut 5:16-20.
  - type: text
    content: ”
  '21':
  - type: text
    content: The man replied, “I’ve obeyed all these commandments since I was young.”
  '22':
  - type: text
    content: 'When Jesus heard his answer, he said, '
  - type: text
    content: “There is still one thing you haven’t done. Sell all your possessions and give the money to the poor, and you will have treasure in heaven. Then come, follow me.”
  '23':
  - type: text
    content: But when the man heard this he became very sad, for he was very rich.
  '24':
  - type: text
    content: When Jesus saw this,
  - type: note
    content: Some manuscripts read When Jesus saw how sad the man was.
  - type: text
    content: ' he said, '
  - type: text
    content: “How hard it is for the rich to enter the Kingdom of God!
  - type: text
    content: ' '
  '25':
  - type: text
    content: In fact, it is easier for a camel to go through the eye of a needle than for a rich person to enter the Kingdom of God!”
  '26':
  - type: text
    content: Those who heard this said, “Then who in the world can be saved?”
  '27':
  - type: text
    content: 'He replied, '
  - type: text
    content: “What is impossible for people is possible with God.”
  '28':
  - type: text
    content: Peter said, “We’ve left our homes to follow you.”
  '29':
  - type: text
    content: ' '
  - type: text
    content: '“Yes,” '
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “and I assure you that everyone who has given up house or wife or brothers or parents or children, for the sake of the Kingdom of God,
  - type: text
    content: ' '
  '3':
  - type: text
    content: A widow of that city came to him repeatedly, saying, ‘Give me justice in this dispute with my enemy.’
  - type: text
    content: ' '
  '30':
  - type: text
    content: will be repaid many times over in this life, and will have eternal life in the world to come.”
  - type: heading
    content: Jesus Again Predicts His Death
  '31':
  - type: text
    content: 'Taking the twelve disciples aside, Jesus said, '
  - type: text
    content: “Listen, we’re going up to Jerusalem, where all the predictions of the prophets concerning the Son of Man will come true.
  - type: text
    content: ' '
  '32':
  - type: text
    content: He will be handed over to the Romans,
  - type: note
    content: Greek the Gentiles.
  - type: text
    content: ' '
  - type: text
    content: and he will be mocked, treated shamefully, and spit upon.
  - type: text
    content: ' '
  '33':
  - type: text
    content: They will flog him with a whip and kill him, but on the third day he will rise again.”
  '34':
  - type: text
    content: But they didn’t understand any of this. The significance of his words was hidden from them, and they failed to grasp what he was talking about.
  - type: heading
    content: Jesus Heals a Blind Beggar
  '35':
  - type: text
    content: 'As Jesus approached Jericho, a blind beggar was sitting beside the road. '
  '36':
  - type: text
    content: 'When he heard the noise of a crowd going past, he asked what was happening. '
  '37':
  - type: text
    content: They told him that Jesus the Nazarene
  - type: note
    content: Or Jesus of Nazareth.
  - type: text
    content: ' was going by. '
  '38':
  - type: text
    content: So he began shouting, “Jesus, Son of David, have mercy on me!”
  '39':
  - type: text
    content: “Be quiet!” the people in front yelled at him.
  - type: text
    content: But he only shouted louder, “Son of David, have mercy on me!”
  '4':
  - type: text
    content: The judge ignored her for a while, but finally he said to himself, ‘I don’t fear God or care about people,
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'When Jesus heard him, he stopped and ordered that the man be brought to him. As the man came near, Jesus asked him, '
  '41':
  - type: text
    content: “What do you want me to do for you?”
  - type: text
    content: “Lord,” he said, “I want to see!”
  '42':
  - type: text
    content: 'And Jesus said, '
  - type: text
    content: “All right, receive your sight! Your faith has healed you.”
  - type: text
    content: ' '
  '43':
  - type: text
    content: Instantly the man could see, and he followed Jesus, praising God. And all who saw it praised God, too.
  '5':
  - type: text
    content: but this woman is driving me crazy. I’m going to see that she gets justice, because she is wearing me out with her constant requests!’”
  '6':
  - type: text
    content: 'Then the Lord said, '
  - type: text
    content: “Learn a lesson from this unjust judge.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Even he rendered a just decision in the end. So don’t you think God will surely give justice to his chosen people who cry out to him day and night? Will he keep putting them off?
  - type: text
    content: ' '
  '8':
  - type: text
    content: I tell you, he will grant justice to them quickly! But when the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: returns, how many will he find on the earth who have faith?”
  - type: heading
    content: Parable of the Pharisee and Tax Collector
  '9':
  - type: text
    content: 'Then Jesus told this story to some who had great confidence in their own righteousness and scorned everyone else: '
