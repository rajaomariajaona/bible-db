document_id: JOB.25,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bildad’s Third Response to Job
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Bildad the Shuhite replied:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “God is powerful and dreadful.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He enforces peace in the heavens.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who is able to count his heavenly army?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Doesn’t his light shine on all the earth?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How can a mortal be innocent before God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can anyone born of a woman be pure?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God is more glorious than the moon;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he shines brighter than the stars.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In comparison, people are maggots;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we mortals are mere worms.”
