document_id: JOB.25,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Bildad’s Third Response to Job
  - type: text
    content: 'Then Bildad the Shuhite replied:'
  '2':
  - type: text
    content: “God is powerful and dreadful.
  - type: text
    content: He enforces peace in the heavens.
  '3':
  - type: text
    content: Who is able to count his heavenly army?
  - type: text
    content: Doesn’t his light shine on all the earth?
  '4':
  - type: text
    content: How can a mortal be innocent before God?
  - type: text
    content: Can anyone born of a woman be pure?
  '5':
  - type: text
    content: God is more glorious than the moon;
  - type: text
    content: he shines brighter than the stars.
  '6':
  - type: text
    content: In comparison, people are maggots;
  - type: text
    content: we mortals are mere worms.”
