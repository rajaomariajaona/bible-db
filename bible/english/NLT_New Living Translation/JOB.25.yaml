document_id: JOB.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bildad’s Third Response to Job
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Bildad the Shuhite replied:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “God is powerful and dreadful.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He enforces peace in the heavens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Who is able to count his heavenly army?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Doesn’t his light shine on all the earth?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: How can a mortal be innocent before God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can anyone born of a woman be pure?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: God is more glorious than the moon;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he shines brighter than the stars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: In comparison, people are maggots;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we mortals are mere worms.”
