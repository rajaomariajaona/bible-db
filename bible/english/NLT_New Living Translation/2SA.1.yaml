document_id: 2SA.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David Learns of Saul’s Death
  - type: text
    content: 'After the death of Saul, David returned from his victory over the Amalekites and spent two days in Ziklag. '
  '10':
  - type: text
    content: “So I killed him,” the Amalekite told David, “for I knew he couldn’t live. Then I took his crown and his armband, and I have brought them here to you, my lord.”
  '11':
  - type: text
    content: 'David and his men tore their clothes in sorrow when they heard the news. '
  '12':
  - type: text
    content: 'They mourned and wept and fasted all day for Saul and his son Jonathan, and for the '
  - type: text
    content: Lord
  - type: text
    content: ’s army and the nation of Israel, because they had died by the sword that day.
  '13':
  - type: text
    content: Then David said to the young man who had brought the news, “Where are you from?”
  - type: text
    content: And he replied, “I am a foreigner, an Amalekite, who lives in your land.”
  '14':
  - type: text
    content: '“Why were you not afraid to kill the '
  - type: text
    content: Lord
  - type: text
    content: ’s anointed one?” David asked.
  '15':
  - type: text
    content: 'Then David said to one of his men, “Kill him!” So the man thrust his sword into the Amalekite and killed him. '
  '16':
  - type: text
    content: '“You have condemned yourself,” David said, “for you yourself confessed that you killed the '
  - type: text
    content: Lord
  - type: text
    content: ’s anointed one.”
  - type: heading
    content: David’s Song for Saul and Jonathan
  '17':
  - type: text
    content: 'Then David composed a funeral song for Saul and Jonathan, '
  '18':
  - type: text
    content: 'and he commanded that it be taught to the people of Judah. It is known as the Song of the Bow, and it is recorded in '
  - type: text
    content: The Book of Jashar.
  - type: note
    content: Or The Book of the Upright.
  '19':
  - type: text
    content: Your pride and joy, O Israel, lies dead on the hills!
  - type: text
    content: Oh, how the mighty heroes have fallen!
  '2':
  - type: text
    content: On the third day a man arrived from Saul’s army camp. He had torn his clothes and put dirt on his head to show that he was in mourning. He fell to the ground before David in deep respect.
  '20':
  - type: text
    content: Don’t announce the news in Gath,
  - type: text
    content: don’t proclaim it in the streets of Ashkelon,
  - type: text
    content: or the daughters of the Philistines will rejoice
  - type: text
    content: and the pagans will laugh in triumph.
  '21':
  - type: text
    content: O mountains of Gilboa,
  - type: text
    content: let there be no dew or rain upon you,
  - type: text
    content: nor fruitful fields producing offerings of grain.
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: For there the shield of the mighty heroes was defiled;
  - type: text
    content: the shield of Saul will no longer be anointed with oil.
  '22':
  - type: text
    content: The bow of Jonathan was powerful,
  - type: text
    content: and the sword of Saul did its mighty work.
  - type: text
    content: They shed the blood of their enemies
  - type: text
    content: and pierced the bodies of mighty heroes.
  '23':
  - type: text
    content: How beloved and gracious were Saul and Jonathan!
  - type: text
    content: They were together in life and in death.
  - type: text
    content: They were swifter than eagles,
  - type: text
    content: stronger than lions.
  '24':
  - type: text
    content: O women of Israel, weep for Saul,
  - type: text
    content: for he dressed you in luxurious scarlet clothing,
  - type: text
    content: in garments decorated with gold.
  '25':
  - type: text
    content: Oh, how the mighty heroes have fallen in battle!
  - type: text
    content: Jonathan lies dead on the hills.
  '26':
  - type: text
    content: How I weep for you, my brother Jonathan!
  - type: text
    content: Oh, how much I loved you!
  - type: text
    content: And your love for me was deep,
  - type: text
    content: deeper than the love of women!
  '27':
  - type: text
    content: Oh, how the mighty heroes have fallen!
  - type: text
    content: Stripped of their weapons, they lie dead.
  '3':
  - type: text
    content: “Where have you come from?” David asked.
  - type: text
    content: “I escaped from the Israelite camp,” the man replied.
  '4':
  - type: text
    content: “What happened?” David demanded. “Tell me how the battle went.”
  - type: text
    content: The man replied, “Our entire army fled from the battle. Many of the men are dead, and Saul and his son Jonathan are also dead.”
  '5':
  - type: text
    content: “How do you know Saul and Jonathan are dead?” David demanded of the young man.
  '6':
  - type: text
    content: 'The man answered, “I happened to be on Mount Gilboa, and there was Saul leaning on his spear with the enemy chariots and charioteers closing in on him. '
  '7':
  - type: text
    content: When he turned and saw me, he cried out for me to come to him. ‘How can I help?’ I asked him.
  '8':
  - type: text
    content: “He responded, ‘Who are you?’
  - type: text
    content: “‘I am an Amalekite,’ I told him.
  '9':
  - type: text
    content: “Then he begged me, ‘Come over here and put me out of my misery, for I am in terrible pain and want to die.’
