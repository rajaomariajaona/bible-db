document_id: 2SA.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Learns of Saul’s Death
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After the death of Saul, David returned from his victory over the Amalekites and spent two days in Ziklag. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “So I killed him,” the Amalekite told David, “for I knew he couldn’t live. Then I took his crown and his armband, and I have brought them here to you, my lord.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'David and his men tore their clothes in sorrow when they heard the news. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'They mourned and wept and fasted all day for Saul and his son Jonathan, and for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s army and the nation of Israel, because they had died by the sword that day.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then David said to the young man who had brought the news, “Where are you from?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he replied, “I am a foreigner, an Amalekite, who lives in your land.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“Why were you not afraid to kill the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anointed one?” David asked.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then David said to one of his men, “Kill him!” So the man thrust his sword into the Amalekite and killed him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“You have condemned yourself,” David said, “for you yourself confessed that you killed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anointed one.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Song for Saul and Jonathan
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then David composed a funeral song for Saul and Jonathan, '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and he commanded that it be taught to the people of Judah. It is known as the Song of the Bow, and it is recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Book of Jashar.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The Book of the Upright.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Your pride and joy, O Israel, lies dead on the hills!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, how the mighty heroes have fallen!
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: On the third day a man arrived from Saul’s army camp. He had torn his clothes and put dirt on his head to show that he was in mourning. He fell to the ground before David in deep respect.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Don’t announce the news in Gath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t proclaim it in the streets of Ashkelon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or the daughters of the Philistines will rejoice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the pagans will laugh in triumph.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: O mountains of Gilboa,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let there be no dew or rain upon you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor fruitful fields producing offerings of grain.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For there the shield of the mighty heroes was defiled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the shield of Saul will no longer be anointed with oil.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The bow of Jonathan was powerful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the sword of Saul did its mighty work.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shed the blood of their enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pierced the bodies of mighty heroes.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: How beloved and gracious were Saul and Jonathan!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They were together in life and in death.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were swifter than eagles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stronger than lions.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: O women of Israel, weep for Saul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he dressed you in luxurious scarlet clothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in garments decorated with gold.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Oh, how the mighty heroes have fallen in battle!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jonathan lies dead on the hills.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: How I weep for you, my brother Jonathan!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, how much I loved you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your love for me was deep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deeper than the love of women!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Oh, how the mighty heroes have fallen!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Stripped of their weapons, they lie dead.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Where have you come from?” David asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I escaped from the Israelite camp,” the man replied.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “What happened?” David demanded. “Tell me how the battle went.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: The man replied, “Our entire army fled from the battle. Many of the men are dead, and Saul and his son Jonathan are also dead.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “How do you know Saul and Jonathan are dead?” David demanded of the young man.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The man answered, “I happened to be on Mount Gilboa, and there was Saul leaning on his spear with the enemy chariots and charioteers closing in on him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: When he turned and saw me, he cried out for me to come to him. ‘How can I help?’ I asked him.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “He responded, ‘Who are you?’
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘I am an Amalekite,’ I told him.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Then he begged me, ‘Come over here and put me out of my misery, for I am in terrible pain and want to die.’
