  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oh, the joys of those who do not
- type: usfm
  marker: q2
  children:
  - type: text
    text: follow the advice of the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or stand around with sinners,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or join in with mockers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But they delight in the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: meditating on it day and night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They are like trees planted along the riverbank,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bearing fruit each season.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their leaves never wither,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they prosper in all they do.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But not the wicked!
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are like worthless chaff, scattered by the wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They will be condemned at the time of judgment.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Sinners will have no place among the godly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' watches over the path of the godly,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the path of the wicked leads to destruction.
