document_id: PSA.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Book One (Psalms 1–41)
  - type: text
    content: Oh, the joys of those who do not
  - type: text
    content: follow the advice of the wicked,
  - type: text
    content: or stand around with sinners,
  - type: text
    content: or join in with mockers.
  '2':
  - type: text
    content: 'But they delight in the law of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: meditating on it day and night.
  '3':
  - type: text
    content: They are like trees planted along the riverbank,
  - type: text
    content: bearing fruit each season.
  - type: text
    content: Their leaves never wither,
  - type: text
    content: and they prosper in all they do.
  '4':
  - type: text
    content: But not the wicked!
  - type: text
    content: They are like worthless chaff, scattered by the wind.
  '5':
  - type: text
    content: They will be condemned at the time of judgment.
  - type: text
    content: Sinners will have no place among the godly.
  '6':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' watches over the path of the godly,'
  - type: text
    content: but the path of the wicked leads to destruction.
