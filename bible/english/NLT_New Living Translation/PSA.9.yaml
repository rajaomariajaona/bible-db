document_id: PSA.9,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David, to be sung to the tune “Death of the Son.”'
  - type: text
    content: 'I will praise you, '
  - type: text
    content: Lord
  - type: text
    content: ', with all my heart;'
  - type: text
    content: I will tell of all the marvelous things you have done.
  '10':
  - type: text
    content: Those who know your name trust in you,
  - type: text
    content: 'for you, O '
  - type: text
    content: Lord
  - type: text
    content: ', do not abandon those who search for you.'
  '11':
  - type: text
    content: 'Sing praises to the '
  - type: text
    content: Lord
  - type: text
    content: ' who reigns in Jerusalem.'
  - type: note
    content: Hebrew Zion; also in 9:14.
  - type: text
    content: Tell the world about his unforgettable deeds.
  '12':
  - type: text
    content: For he who avenges murder cares for the helpless.
  - type: text
    content: He does not ignore the cries of those who suffer.
  '13':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', have mercy on me.'
  - type: text
    content: See how my enemies torment me.
  - type: text
    content: Snatch me back from the jaws of death.
  '14':
  - type: text
    content: Save me so I can praise you publicly at Jerusalem’s gates,
  - type: text
    content: so I can rejoice that you have rescued me.
  '15':
  - type: text
    content: The nations have fallen into the pit they dug for others.
  - type: text
    content: Their own feet have been caught in the trap they set.
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is known for his justice.'
  - type: text
    content: 'The wicked are trapped by their own deeds. '
  - type: text
    content: Quiet Interlude
  - type: note
    content: Hebrew Higgaion Selah. The meaning of this phrase is uncertain.
  '17':
  - type: text
    content: The wicked will go down to the grave.
  - type: note
    content: Hebrew to Sheol.
  - type: text
    content: This is the fate of all the nations who ignore God.
  '18':
  - type: text
    content: But the needy will not be ignored forever;
  - type: text
    content: the hopes of the poor will not always be crushed.
  '19':
  - type: text
    content: 'Arise, O '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Do not let mere mortals defy you!
  - type: text
    content: Judge the nations!
  '2':
  - type: text
    content: I will be filled with joy because of you.
  - type: text
    content: I will sing praises to your name, O Most High.
  '20':
  - type: text
    content: 'Make them tremble in fear, O '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: 'Let the nations know they are merely human. '
  - type: text
    content: Interlude
  '3':
  - type: text
    content: My enemies retreated;
  - type: text
    content: they staggered and died when you appeared.
  '4':
  - type: text
    content: For you have judged in my favor;
  - type: text
    content: from your throne you have judged with fairness.
  '5':
  - type: text
    content: You have rebuked the nations and destroyed the wicked;
  - type: text
    content: you have erased their names forever.
  '6':
  - type: text
    content: The enemy is finished, in endless ruins;
  - type: text
    content: the cities you uprooted are now forgotten.
  '7':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' reigns forever,'
  - type: text
    content: executing judgment from his throne.
  '8':
  - type: text
    content: He will judge the world with justice
  - type: text
    content: and rule the nations with fairness.
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is a shelter for the oppressed,'
  - type: text
    content: a refuge in times of trouble.
