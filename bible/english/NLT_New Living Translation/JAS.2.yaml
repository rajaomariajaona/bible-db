document_id: JAS.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Warning against Prejudice
  - type: text
    content: My dear brothers and sisters,
  - type: note
    content: Greek brothers; also in 2:5, 14.
  - type: text
    content: ' how can you claim to have faith in our glorious Lord Jesus Christ if you favor some people over others?'
  '10':
  - type: text
    content: 'For the person who keeps all of the laws except one is as guilty as a person who has broken all of God’s laws. '
  '11':
  - type: text
    content: For the same God who said, “You must not commit adultery,” also said, “You must not murder.”
  - type: note
    content: Exod 20:13-14; Deut 5:17-18.
  - type: text
    content: ' So if you murder someone but do not commit adultery, you have still broken the law.'
  '12':
  - type: text
    content: 'So whatever you say or whatever you do, remember that you will be judged by the law that sets you free. '
  '13':
  - type: text
    content: There will be no mercy for those who have not shown mercy to others. But if you have been merciful, God will be merciful when he judges you.
  - type: heading
    content: Faith without Good Deeds Is Dead
  '14':
  - type: text
    content: 'What good is it, dear brothers and sisters, if you say you have faith but don’t show it by your actions? Can that kind of faith save anyone? '
  '15':
  - type: text
    content: 'Suppose you see a brother or sister who has no food or clothing, '
  '16':
  - type: text
    content: and you say, “Good-bye and have a good day; stay warm and eat well”—but then you don’t give that person any food or clothing. What good does that do?
  '17':
  - type: text
    content: So you see, faith by itself isn’t enough. Unless it produces good deeds, it is dead and useless.
  '18':
  - type: text
    content: Now someone may argue, “Some people have faith; others have good deeds.” But I say, “How can you show me your faith if you don’t have good deeds? I will show you my faith by my good deeds.”
  '19':
  - type: text
    content: You say you have faith, for you believe that there is one God.
  - type: note
    content: Some manuscripts read that God is one; see Deut 6:4.
  - type: text
    content: ' Good for you! Even the demons believe this, and they tremble in terror. '
  '2':
  - type: text
    content: For example, suppose someone comes into your meeting
  - type: note
    content: Greek your synagogue.
  - type: text
    content: ' dressed in fancy clothes and expensive jewelry, and another comes in who is poor and dressed in dirty clothes. '
  '20':
  - type: text
    content: How foolish! Can’t you see that faith without good deeds is useless?
  '21':
  - type: text
    content: 'Don’t you remember that our ancestor Abraham was shown to be right with God by his actions when he offered his son Isaac on the altar? '
  '22':
  - type: text
    content: 'You see, his faith and his actions worked together. His actions made his faith complete. '
  '23':
  - type: text
    content: 'And so it happened just as the Scriptures say: “Abraham believed God, and God counted him as righteous because of his faith.”'
  - type: note
    content: Gen 15:6.
  - type: text
    content: ' He was even called the friend of God.'
  - type: note
    content: See Isa 41:8.
  - type: text
    content: ' '
  '24':
  - type: text
    content: So you see, we are shown to be right with God by what we do, not by faith alone.
  '25':
  - type: text
    content: 'Rahab the prostitute is another example. She was shown to be right with God by her actions when she hid those messengers and sent them safely away by a different road. '
  '26':
  - type: text
    content: Just as the body is dead without breath,
  - type: note
    content: Or without spirit.
  - type: text
    content: ' so also faith is dead without good works.'
  '3':
  - type: text
    content: 'If you give special attention and a good seat to the rich person, but you say to the poor one, “You can stand over there, or else sit on the floor”—well, '
  '4':
  - type: text
    content: doesn’t this discrimination show that your judgments are guided by evil motives?
  '5':
  - type: text
    content: 'Listen to me, dear brothers and sisters. Hasn’t God chosen the poor in this world to be rich in faith? Aren’t they the ones who will inherit the Kingdom he promised to those who love him? '
  '6':
  - type: text
    content: 'But you dishonor the poor! Isn’t it the rich who oppress you and drag you into court? '
  '7':
  - type: text
    content: Aren’t they the ones who slander Jesus Christ, whose noble name
  - type: note
    content: Greek slander the noble name.
  - type: text
    content: ' you bear?'
  '8':
  - type: text
    content: 'Yes indeed, it is good when you obey the royal law as found in the Scriptures: “Love your neighbor as yourself.”'
  - type: note
    content: Lev 19:18.
  - type: text
    content: ' '
  '9':
  - type: text
    content: But if you favor some people over others, you are committing a sin. You are guilty of breaking the law.
