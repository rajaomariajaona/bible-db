document_id: 1KI.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Elijah Fed by Ravens
  - type: text
    content: 'Now Elijah, who was from Tishbe in Gilead, told King Ahab, “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, lives—the God I serve—there will be no dew or rain during the next few years until I give the word!”'
  '10':
  - type: text
    content: 'So he went to Zarephath. As he arrived at the gates of the village, he saw a widow gathering sticks, and he asked her, “Would you please bring me a little water in a cup?” '
  '11':
  - type: text
    content: As she was going to get it, he called to her, “Bring me a bite of bread, too.”
  '12':
  - type: text
    content: 'But she said, “I swear by the '
  - type: text
    content: Lord
  - type: text
    content: ' your God that I don’t have a single piece of bread in the house. And I have only a handful of flour left in the jar and a little cooking oil in the bottom of the jug. I was just gathering a few sticks to cook this last meal, and then my son and I will die.”'
  '13':
  - type: text
    content: 'But Elijah said to her, “Don’t be afraid! Go ahead and do just what you’ve said, but make a little bread for me first. Then use what’s left to prepare a meal for yourself and your son. '
  '14':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: There will always be flour and olive oil left in your containers until the time when the '
  - type: text
    content: Lord
  - type: text
    content: ' sends rain and the crops grow again!”'
  '15':
  - type: text
    content: 'So she did as Elijah said, and she and Elijah and her family continued to eat for many days. '
  '16':
  - type: text
    content: 'There was always enough flour and olive oil left in the containers, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had promised through Elijah.'
  '17':
  - type: text
    content: 'Some time later the woman’s son became sick. He grew worse and worse, and finally he died. '
  '18':
  - type: text
    content: Then she said to Elijah, “O man of God, what have you done to me? Have you come here to point out my sins and kill my son?”
  '19':
  - type: text
    content: 'But Elijah replied, “Give me your son.” And he took the child’s body from her arms, carried him up the stairs to the room where he was staying, and laid the body on his bed. '
  '2':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Elijah, '
  '20':
  - type: text
    content: 'Then Elijah cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', “O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, why have you brought tragedy to this widow who has opened her home to me, causing her son to die?”'
  '21':
  - type: text
    content: 'And he stretched himself out over the child three times and cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', “O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, please let this child’s life return to him.” '
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' heard Elijah’s prayer, and the life of the child returned, and he revived! '
  '23':
  - type: text
    content: Then Elijah brought him down from the upper room and gave him to his mother. “Look!” he said. “Your son is alive!”
  '24':
  - type: text
    content: 'Then the woman told Elijah, “Now I know for sure that you are a man of God, and that the '
  - type: text
    content: Lord
  - type: text
    content: ' truly speaks through you.”'
  '3':
  - type: text
    content: '“Go to the east and hide by Kerith Brook, near where it enters the Jordan River. '
  '4':
  - type: text
    content: Drink from the brook and eat what the ravens bring you, for I have commanded them to bring you food.”
  '5':
  - type: text
    content: 'So Elijah did as the '
  - type: text
    content: Lord
  - type: text
    content: ' told him and camped beside Kerith Brook, east of the Jordan. '
  '6':
  - type: text
    content: 'The ravens brought him bread and meat each morning and evening, and he drank from the brook. '
  '7':
  - type: text
    content: But after a while the brook dried up, for there was no rainfall anywhere in the land.
  - type: heading
    content: The Widow at Zarephath
  '8':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Elijah, '
  '9':
  - type: text
    content: “Go and live in the village of Zarephath, near the city of Sidon. I have instructed a widow there to feed you.”
