document_id: 2CH.10,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Northern Tribes Revolt
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Rehoboam went to Shechem, where all Israel had gathered to make him king. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The young men replied, “This is what you should tell those complainers who want a lighter burden: ‘My little finger is thicker than my father’s waist! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Yes, my father laid heavy burdens on you, but I’m going to make them even heavier! My father beat you with whips, but I will beat you with scorpions!’”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Three days later Jeroboam and all the people returned to hear Rehoboam’s decision, just as the king had ordered. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But Rehoboam spoke harshly to them, for he rejected the advice of the older counselors '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: and followed the counsel of his younger advisers. He told the people, “My father laid
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version and many Hebrew manuscripts (see also 1 Kgs 12:14); Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: I will lay.
      marker-yv: yv-n
    - type: text
      text: ' heavy burdens on you, but I’m going to make them even heavier! My father beat you with whips, but I will beat you with scorpions!”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So the king paid no attention to the people. This turn of events was the will of God, for it fulfilled the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s message to Jeroboam son of Nebat through the prophet Ahijah from Shiloh.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When all Israel realized
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Syriac version, Latin Vulgate, and many Hebrew manuscripts (see also 1 Kgs 12:16); Masoretic Text lacks '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: realized.
      marker-yv: yv-n
    - type: text
      text: ' that the king had refused to listen to them, they responded,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Down with the dynasty of David!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We have no interest in the son of Jesse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Back to your homes, O Israel!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Look out for your own house, O David!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all the people of Israel returned home. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: But Rehoboam continued to rule over the Israelites who lived in the towns of Judah.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: King Rehoboam sent Adoniram,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hadoram, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Adoniram; compare 1 Kgs 4:6; 5:14; 12:18.
      marker-yv: yv-n
    - type: text
      text: ' who was in charge of forced labor, to restore order, but the people of Israel stoned him to death. When this news reached King Rehoboam, he quickly jumped into his chariot and fled to Jerusalem. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: And to this day the northern tribes of Israel have refused to be ruled by a descendant of David.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'When Jeroboam son of Nebat heard of this, he returned from Egypt, for he had fled to Egypt to escape from King Solomon. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The leaders of Israel summoned him, and Jeroboam and all Israel went to speak with Rehoboam. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Your father was a hard master,” they said. “Lighten the harsh labor demands and heavy taxes that your father imposed on us. Then we will be your loyal subjects.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Rehoboam replied, “Come back in three days for my answer.” So the people went away.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then King Rehoboam discussed the matter with the older men who had counseled his father, Solomon. “What is your advice?” he asked. “How should I answer these people?”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The older counselors replied, “If you are good to these people and do your best to please them and give them a favorable answer, they will always be your loyal subjects.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But Rehoboam rejected the advice of the older men and instead asked the opinion of the young men who had grown up with him and were now his advisers. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “What is your advice?” he asked them. “How should I answer these people who want me to lighten the burdens imposed by my father?”
