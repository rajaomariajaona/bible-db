document_id: 2CH.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Northern Tribes Revolt
  - type: text
    content: 'Rehoboam went to Shechem, where all Israel had gathered to make him king. '
  '10':
  - type: text
    content: 'The young men replied, “This is what you should tell those complainers who want a lighter burden: ‘My little finger is thicker than my father’s waist! '
  '11':
  - type: text
    content: Yes, my father laid heavy burdens on you, but I’m going to make them even heavier! My father beat you with whips, but I will beat you with scorpions!’”
  '12':
  - type: text
    content: 'Three days later Jeroboam and all the people returned to hear Rehoboam’s decision, just as the king had ordered. '
  '13':
  - type: text
    content: 'But Rehoboam spoke harshly to them, for he rejected the advice of the older counselors '
  '14':
  - type: text
    content: and followed the counsel of his younger advisers. He told the people, “My father laid
  - type: note
    content: As in Greek version and many Hebrew manuscripts (see also 1 Kgs 12:14); Masoretic Text reads I will lay.
  - type: text
    content: ' heavy burdens on you, but I’m going to make them even heavier! My father beat you with whips, but I will beat you with scorpions!”'
  '15':
  - type: text
    content: 'So the king paid no attention to the people. This turn of events was the will of God, for it fulfilled the '
  - type: text
    content: Lord
  - type: text
    content: ’s message to Jeroboam son of Nebat through the prophet Ahijah from Shiloh.
  '16':
  - type: text
    content: When all Israel realized
  - type: note
    content: As in Syriac version, Latin Vulgate, and many Hebrew manuscripts (see also 1 Kgs 12:16); Masoretic Text lacks realized.
  - type: text
    content: ' that the king had refused to listen to them, they responded,'
  - type: text
    content: “Down with the dynasty of David!
  - type: text
    content: We have no interest in the son of Jesse.
  - type: text
    content: Back to your homes, O Israel!
  - type: text
    content: Look out for your own house, O David!”
  - type: text
    content: 'So all the people of Israel returned home. '
  '17':
  - type: text
    content: But Rehoboam continued to rule over the Israelites who lived in the towns of Judah.
  '18':
  - type: text
    content: King Rehoboam sent Adoniram,
  - type: note
    content: Hebrew Hadoram, a variant spelling of Adoniram; compare 1 Kgs 4:6; 5:14; 12:18.
  - type: text
    content: ' who was in charge of forced labor, to restore order, but the people of Israel stoned him to death. When this news reached King Rehoboam, he quickly jumped into his chariot and fled to Jerusalem. '
  '19':
  - type: text
    content: And to this day the northern tribes of Israel have refused to be ruled by a descendant of David.
  '2':
  - type: text
    content: 'When Jeroboam son of Nebat heard of this, he returned from Egypt, for he had fled to Egypt to escape from King Solomon. '
  '3':
  - type: text
    content: 'The leaders of Israel summoned him, and Jeroboam and all Israel went to speak with Rehoboam. '
  '4':
  - type: text
    content: “Your father was a hard master,” they said. “Lighten the harsh labor demands and heavy taxes that your father imposed on us. Then we will be your loyal subjects.”
  '5':
  - type: text
    content: Rehoboam replied, “Come back in three days for my answer.” So the people went away.
  '6':
  - type: text
    content: Then King Rehoboam discussed the matter with the older men who had counseled his father, Solomon. “What is your advice?” he asked. “How should I answer these people?”
  '7':
  - type: text
    content: The older counselors replied, “If you are good to these people and do your best to please them and give them a favorable answer, they will always be your loyal subjects.”
  '8':
  - type: text
    content: 'But Rehoboam rejected the advice of the older men and instead asked the opinion of the young men who had grown up with him and were now his advisers. '
  '9':
  - type: text
    content: “What is your advice?” he asked them. “How should I answer these people who want me to lighten the burdens imposed by my father?”
