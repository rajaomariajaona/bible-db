document_id: LEV.24,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Pure Oil and Holy Bread
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'One day a man who had an Israelite mother and an Egyptian father came out of his tent and got into a fight with one of the Israelite men. '
  '11':
  - type: text
    content: 'During the fight, this son of an Israelite woman blasphemed the Name of the '
  - type: text
    content: Lord
  - type: note
    content: Hebrew the Name; also in 24:16b.
  - type: text
    content: ' with a curse. So the man was brought to Moses for judgment. His mother was Shelomith, the daughter of Dibri of the tribe of Dan. '
  '12':
  - type: text
    content: 'They kept the man in custody until the '
  - type: text
    content: Lord
  - type: text
    content: ’s will in the matter should become clear to them.
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '14':
  - type: text
    content: '“Take the blasphemer outside the camp, and tell all those who heard the curse to lay their hands on his head. Then let the entire community stone him to death. '
  '15':
  - type: text
    content: 'Say to the people of Israel: Those who curse their God will be punished for their sin. '
  '16':
  - type: text
    content: 'Anyone who blasphemes the Name of the '
  - type: text
    content: Lord
  - type: text
    content: ' must be stoned to death by the whole community of Israel. Any native-born Israelite or foreigner among you who blasphemes the Name of the '
  - type: text
    content: Lord
  - type: text
    content: ' must be put to death.'
  '17':
  - type: text
    content: “Anyone who takes another person’s life must be put to death.
  '18':
  - type: text
    content: “Anyone who kills another person’s animal must pay for it in full—a live animal for the animal that was killed.
  '19':
  - type: text
    content: '“Anyone who injures another person must be dealt with according to the injury inflicted— '
  '2':
  - type: text
    content: '“Command the people of Israel to bring you pure oil of pressed olives for the light, to keep the lamps burning continually. '
  '20':
  - type: text
    content: a fracture for a fracture, an eye for an eye, a tooth for a tooth. Whatever anyone does to injure another person must be paid back in kind.
  '21':
  - type: text
    content: “Whoever kills an animal must pay for it in full, but whoever kills another person must be put to death.
  '22':
  - type: text
    content: '“This same standard applies both to native-born Israelites and to the foreigners living among you. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.”'
  '23':
  - type: text
    content: 'After Moses gave all these instructions to the Israelites, they took the blasphemer outside the camp and stoned him to death. The Israelites did just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '3':
  - type: text
    content: This is the lampstand that stands in the Tabernacle, in front of the inner curtain that shields the Ark of the Covenant.
  - type: note
    content: Hebrew in the Tent of Meeting, outside the inner curtain of the Testimony; see note on 16:13.
  - type: text
    content: ' Aaron must keep the lamps burning in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence all night. This is a permanent law for you, and it must be observed from generation to generation. '
  '4':
  - type: text
    content: 'Aaron and the priests must tend the lamps on the pure gold lampstand continually in the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence.
  '5':
  - type: text
    content: “You must bake twelve flat loaves of bread from choice flour, using four quarts
  - type: note
    content: Hebrew 2/10 of an ephah [4.4 liters].
  - type: text
    content: ' of flour for each loaf. '
  '6':
  - type: text
    content: 'Place the bread before the '
  - type: text
    content: Lord
  - type: text
    content: ' on the pure gold table, and arrange the loaves in two stacks, with six loaves in each stack. '
  '7':
  - type: text
    content: 'Put some pure frankincense near each stack to serve as a representative offering, a special gift presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Every Sabbath day this bread must be laid out before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a gift from the Israelites; it is an ongoing expression of the eternal covenant. '
  '9':
  - type: text
    content: 'The loaves of bread will belong to Aaron and his descendants, who must eat them in a sacred place, for they are most holy. It is the permanent right of the priests to claim this portion of the special gifts presented to the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: An Example of Just Punishment
