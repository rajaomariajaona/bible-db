document_id: LEV.24,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pure Oil and Holy Bread
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'One day a man who had an Israelite mother and an Egyptian father came out of his tent and got into a fight with one of the Israelite men. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'During the fight, this son of an Israelite woman blasphemed the Name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Name; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 24:16b.
      marker-yv: yv-n
    - type: text
      text: ' with a curse. So the man was brought to Moses for judgment. His mother was Shelomith, the daughter of Dibri of the tribe of Dan. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They kept the man in custody until the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s will in the matter should become clear to them.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take the blasphemer outside the camp, and tell all those who heard the curse to lay their hands on his head. Then let the entire community stone him to death. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Say to the people of Israel: Those who curse their God will be punished for their sin. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anyone who blasphemes the Name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' must be stoned to death by the whole community of Israel. Any native-born Israelite or foreigner among you who blasphemes the Name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' must be put to death.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Anyone who takes another person’s life must be put to death.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Anyone who kills another person’s animal must pay for it in full—a live animal for the animal that was killed.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Anyone who injures another person must be dealt with according to the injury inflicted— '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Command the people of Israel to bring you pure oil of pressed olives for the light, to keep the lamps burning continually. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: a fracture for a fracture, an eye for an eye, a tooth for a tooth. Whatever anyone does to injure another person must be paid back in kind.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Whoever kills an animal must pay for it in full, but whoever kills another person must be put to death.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This same standard applies both to native-born Israelites and to the foreigners living among you. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Moses gave all these instructions to the Israelites, they took the blasphemer outside the camp and stoned him to death. The Israelites did just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: This is the lampstand that stands in the Tabernacle, in front of the inner curtain that shields the Ark of the Covenant.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'in the Tent of Meeting, outside the inner curtain of the Testimony; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: see note on 16:13.
      marker-yv: yv-n
    - type: text
      text: ' Aaron must keep the lamps burning in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s presence all night. This is a permanent law for you, and it must be observed from generation to generation. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Aaron and the priests must tend the lamps on the pure gold lampstand continually in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s presence.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You must bake twelve flat loaves of bread from choice flour, using four quarts
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2/10 of an ephah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[4.4 liters].'
      marker-yv: yv-n
    - type: text
      text: ' of flour for each loaf. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Place the bread before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on the pure gold table, and arrange the loaves in two stacks, with six loaves in each stack. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Put some pure frankincense near each stack to serve as a representative offering, a special gift presented to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every Sabbath day this bread must be laid out before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as a gift from the Israelites; it is an ongoing expression of the eternal covenant. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The loaves of bread will belong to Aaron and his descendants, who must eat them in a sacred place, for they are most holy. It is the permanent right of the priests to claim this portion of the special gifts presented to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: An Example of Just Punishment
    marker-yv: yv-h
