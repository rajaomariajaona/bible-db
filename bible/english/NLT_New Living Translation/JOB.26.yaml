document_id: JOB.26,116
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Job’s Ninth Speech: A Response to Bildad'
  - type: text
    content: 'Then Job spoke again:'
  '10':
  - type: text
    content: He created the horizon when he separated the waters;
  - type: text
    content: he set the boundary between day and night.
  '11':
  - type: text
    content: The foundations of heaven tremble;
  - type: text
    content: they shudder at his rebuke.
  '12':
  - type: text
    content: By his power the sea grew calm.
  - type: text
    content: By his skill he crushed the great sea monster.
  - type: note
    content: Hebrew Rahab, the name of a mythical sea monster that represents chaos in ancient literature.
  '13':
  - type: text
    content: His Spirit made the heavens beautiful,
  - type: text
    content: and his power pierced the gliding serpent.
  '14':
  - type: text
    content: These are just the beginning of all that he does,
  - type: text
    content: merely a whisper of his power.
  - type: text
    content: Who, then, can comprehend the thunder of his power?”
  '2':
  - type: text
    content: “How you have helped the powerless!
  - type: text
    content: How you have saved the weak!
  '3':
  - type: text
    content: How you have enlightened my stupidity!
  - type: text
    content: What wise advice you have offered!
  '4':
  - type: text
    content: Where have you gotten all these wise sayings?
  - type: text
    content: Whose spirit speaks through you?
  '5':
  - type: text
    content: “The dead tremble—
  - type: text
    content: those who live beneath the waters.
  '6':
  - type: text
    content: The underworld
  - type: note
    content: Hebrew Sheol.
  - type: text
    content: ' is naked in God’s presence.'
  - type: text
    content: The place of destruction
  - type: note
    content: Hebrew Abaddon.
  - type: text
    content: ' is uncovered.'
  '7':
  - type: text
    content: God stretches the northern sky over empty space
  - type: text
    content: and hangs the earth on nothing.
  '8':
  - type: text
    content: He wraps the rain in his thick clouds,
  - type: text
    content: and the clouds don’t burst with the weight.
  '9':
  - type: text
    content: He covers the face of the moon,
  - type: note
    content: Or covers his throne.
  - type: text
    content: shrouding it with his clouds.
