document_id: JOB.26,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Job’s Ninth Speech: A Response to Bildad'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Job spoke again:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He created the horizon when he separated the waters;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he set the boundary between day and night.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The foundations of heaven tremble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they shudder at his rebuke.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By his power the sea grew calm.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By his skill he crushed the great sea monster.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Rahab, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: the name of a mythical sea monster that represents chaos in ancient literature.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His Spirit made the heavens beautiful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his power pierced the gliding serpent.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These are just the beginning of all that he does,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: merely a whisper of his power.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who, then, can comprehend the thunder of his power?”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How you have helped the powerless!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How you have saved the weak!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How you have enlightened my stupidity!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What wise advice you have offered!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where have you gotten all these wise sayings?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whose spirit speaks through you?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The dead tremble—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who live beneath the waters.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The underworld
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:6a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Sheol.
      marker-yv: yv-n
    - type: text
      text: ' is naked in God’s presence.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The place of destruction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:6b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abaddon.
      marker-yv: yv-n
    - type: text
      text: ' is uncovered.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God stretches the northern sky over empty space
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hangs the earth on nothing.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He wraps the rain in his thick clouds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the clouds don’t burst with the weight.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He covers the face of the moon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: covers his throne.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shrouding it with his clouds.
