document_id: EZK.47
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The River of Healing
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In my vision, the man brought me back to the entrance of the Temple. There I saw a stream flowing east from beneath the door of the Temple and passing to the right of the altar on its south side. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The man brought me outside the wall through the north gateway and led me around to the eastern entrance. There I could see the water flowing out through the south side of the east gateway.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Measuring as he went, he took me along the stream for 1,750 feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1,000 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[530 meters]; also in 47:4, 5.'
    marker-yv: yv-n
  - type: text
    text: ' and then led me across. The water was up to my ankles. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He measured off another 1,750 feet and led me across again. This time the water was up to my knees. After another 1,750 feet, it was up to my waist. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then he measured another 1,750 feet, and the river was too deep to walk across. It was deep enough to swim in, but too deep to walk through.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He asked me, “Have you been watching, son of man?” Then he led me back along the riverbank. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When I returned, I was surprised by the sight of many trees growing on both sides of the river. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then he said to me, “This river flows east through the desert into the valley of the Dead Sea.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the sea.
    marker-yv: yv-n
  - type: text
    text: ' The waters of this stream will make the salty waters of the Dead Sea fresh and pure. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: There will be swarms of living things wherever the water of this river flows.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of these two rivers flow.
    marker-yv: yv-n
  - type: text
    text: ' Fish will abound in the Dead Sea, for its waters will become fresh. Life will flourish wherever this water flows. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fishermen will stand along the shores of the Dead Sea. All the way from En-gedi to En-eglaim, the shores will be covered with nets drying in the sun. Fish of every kind will fill the Dead Sea, just as they fill the Mediterranean.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the Great Sea; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 47:15, 17, 19, 20.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But the marshes and swamps will not be purified; they will still be salty. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fruit trees of all kinds will grow along both sides of the river. The leaves of these trees will never turn brown and fall, and there will always be fruit on their branches. There will be a new crop every month, for they are watered by the river flowing from the Temple. The fruit will be for food and the leaves for healing.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Boundaries for the Land
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: “Divide the land in this way for the twelve tribes of Israel: The descendants of Joseph will be given two shares of land.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It was important to retain twelve portions of land. Since Levi had no portion, the descendants of Joseph’s sons, Ephraim and Manasseh, received land as two tribes.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Otherwise each tribe will receive an equal share. I took a solemn oath and swore that I would give this land to your ancestors, and it will now come to you as your possession.
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“These are the boundaries of the land: The northern border will run from the Mediterranean toward Hethlon, then on through Lebo-hamath to Zedad; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: then it will run to Berothah and Sibraim,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:15-16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'then on through Lebo to Zedad; '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: then it will run to Hamath, Berothah, and Sibraim.
    marker-yv: yv-n
  - type: text
    text: ' which are on the border between Damascus and Hamath, and finally to Hazer-hatticon, on the border of Hauran. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: So the northern border will run from the Mediterranean to Hazar-enan, on the border between Hamath to the north and Damascus to the south.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “The eastern border starts at a point between Hauran and Damascus and runs south along the Jordan River between Israel and Gilead, past the Dead Sea
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:18a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the eastern sea.
    marker-yv: yv-n
  - type: text
    text: ' and as far south as Tamar.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:18b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: you will measure.
    marker-yv: yv-n
  - type: text
    text: ' This will be the eastern border.'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “The southern border will go west from Tamar to the waters of Meribah at Kadesh
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: waters of Meribath-kadesh.
    marker-yv: yv-n
  - type: text
    text: ' and then follow the course of the Brook of Egypt to the Mediterranean. This will be the southern border.'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “On the west side, the Mediterranean itself will be your border from the southern border to the point where the northern border begins, opposite Lebo-hamath.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“Divide the land within these boundaries among the tribes of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Distribute the land as an allotment for yourselves and for the foreigners who have joined you and are raising their families among you. They will be like native-born Israelites to you and will receive an allotment among the tribes. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'These foreigners are to be given land within the territory of the tribe with whom they now live. I, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!'
