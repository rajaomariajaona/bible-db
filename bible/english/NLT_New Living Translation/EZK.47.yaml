document_id: EZK.47,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The River of Healing
  - type: text
    content: 'In my vision, the man brought me back to the entrance of the Temple. There I saw a stream flowing east from beneath the door of the Temple and passing to the right of the altar on its south side. '
  '10':
  - type: text
    content: Fishermen will stand along the shores of the Dead Sea. All the way from En-gedi to En-eglaim, the shores will be covered with nets drying in the sun. Fish of every kind will fill the Dead Sea, just as they fill the Mediterranean.
  - type: note
    content: Hebrew the Great Sea; also in 47:15, 17, 19, 20.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'But the marshes and swamps will not be purified; they will still be salty. '
  '12':
  - type: text
    content: Fruit trees of all kinds will grow along both sides of the river. The leaves of these trees will never turn brown and fall, and there will always be fruit on their branches. There will be a new crop every month, for they are watered by the river flowing from the Temple. The fruit will be for food and the leaves for healing.”
  - type: heading
    content: Boundaries for the Land
  '13':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: “Divide the land in this way for the twelve tribes of Israel: The descendants of Joseph will be given two shares of land.'
  - type: note
    content: It was important to retain twelve portions of land. Since Levi had no portion, the descendants of Joseph’s sons, Ephraim and Manasseh, received land as two tribes.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Otherwise each tribe will receive an equal share. I took a solemn oath and swore that I would give this land to your ancestors, and it will now come to you as your possession.
  '15':
  - type: text
    content: '“These are the boundaries of the land: The northern border will run from the Mediterranean toward Hethlon, then on through Lebo-hamath to Zedad; '
  '16':
  - type: text
    content: then it will run to Berothah and Sibraim,
  - type: note
    content: As in Greek version; Masoretic Text reads then on through Lebo to Zedad; 16then it will run to Hamath, Berothah, and Sibraim.
  - type: text
    content: ' which are on the border between Damascus and Hamath, and finally to Hazer-hatticon, on the border of Hauran. '
  '17':
  - type: text
    content: So the northern border will run from the Mediterranean to Hazar-enan, on the border between Hamath to the north and Damascus to the south.
  '18':
  - type: text
    content: “The eastern border starts at a point between Hauran and Damascus and runs south along the Jordan River between Israel and Gilead, past the Dead Sea
  - type: note
    content: Hebrew the eastern sea.
  - type: text
    content: ' and as far south as Tamar.'
  - type: note
    content: As in Greek version; Hebrew reads you will measure.
  - type: text
    content: ' This will be the eastern border.'
  '19':
  - type: text
    content: “The southern border will go west from Tamar to the waters of Meribah at Kadesh
  - type: note
    content: Hebrew waters of Meribath-kadesh.
  - type: text
    content: ' and then follow the course of the Brook of Egypt to the Mediterranean. This will be the southern border.'
  '2':
  - type: text
    content: The man brought me outside the wall through the north gateway and led me around to the eastern entrance. There I could see the water flowing out through the south side of the east gateway.
  '20':
  - type: text
    content: “On the west side, the Mediterranean itself will be your border from the southern border to the point where the northern border begins, opposite Lebo-hamath.
  '21':
  - type: text
    content: '“Divide the land within these boundaries among the tribes of Israel. '
  '22':
  - type: text
    content: 'Distribute the land as an allotment for yourselves and for the foreigners who have joined you and are raising their families among you. They will be like native-born Israelites to you and will receive an allotment among the tribes. '
  '23':
  - type: text
    content: 'These foreigners are to be given land within the territory of the tribe with whom they now live. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '3':
  - type: text
    content: Measuring as he went, he took me along the stream for 1,750 feet
  - type: note
    content: Hebrew 1,000 cubits [530 meters]; also in 47:4, 5.
  - type: text
    content: ' and then led me across. The water was up to my ankles. '
  '4':
  - type: text
    content: 'He measured off another 1,750 feet and led me across again. This time the water was up to my knees. After another 1,750 feet, it was up to my waist. '
  '5':
  - type: text
    content: Then he measured another 1,750 feet, and the river was too deep to walk across. It was deep enough to swim in, but too deep to walk through.
  '6':
  - type: text
    content: 'He asked me, “Have you been watching, son of man?” Then he led me back along the riverbank. '
  '7':
  - type: text
    content: 'When I returned, I was surprised by the sight of many trees growing on both sides of the river. '
  '8':
  - type: text
    content: Then he said to me, “This river flows east through the desert into the valley of the Dead Sea.
  - type: note
    content: Hebrew the sea.
  - type: text
    content: ' The waters of this stream will make the salty waters of the Dead Sea fresh and pure. '
  '9':
  - type: text
    content: There will be swarms of living things wherever the water of this river flows.
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads of these two rivers flow.
  - type: text
    content: ' Fish will abound in the Dead Sea, for its waters will become fresh. Life will flourish wherever this water flows. '
