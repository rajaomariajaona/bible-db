document_id: 2SA.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Rape of Tamar
  - type: text
    content: 'Now David’s son Absalom had a beautiful sister named Tamar. And Amnon, her half brother, fell desperately in love with her. '
  '10':
  - type: text
    content: 'Then he said to Tamar, “Now bring the food into my bedroom and feed it to me here.” So Tamar took his favorite dish to him. '
  '11':
  - type: text
    content: But as she was feeding him, he grabbed her and demanded, “Come to bed with me, my darling sister.”
  '12':
  - type: text
    content: '“No, my brother!” she cried. “Don’t be foolish! Don’t do this to me! Such wicked things aren’t done in Israel. '
  '13':
  - type: text
    content: Where could I go in my shame? And you would be called one of the greatest fools in Israel. Please, just speak to the king about it, and he will let you marry me.”
  '14':
  - type: text
    content: 'But Amnon wouldn’t listen to her, and since he was stronger than she was, he raped her. '
  '15':
  - type: text
    content: Then suddenly Amnon’s love turned to hate, and he hated her even more than he had loved her. “Get out of here!” he snarled at her.
  '16':
  - type: text
    content: “No, no!” Tamar cried. “Sending me away now is worse than what you’ve already done to me.”
  - type: text
    content: 'But Amnon wouldn’t listen to her. '
  '17':
  - type: text
    content: He shouted for his servant and demanded, “Throw this woman out, and lock the door behind her!”
  '18':
  - type: text
    content: So the servant put her out and locked the door behind her. She was wearing a long, beautiful robe,
  - type: note
    content: Or a robe with sleeves, or an ornamented robe. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' as was the custom in those days for the king’s virgin daughters. '
  '19':
  - type: text
    content: But now Tamar tore her robe and put ashes on her head. And then, with her face in her hands, she went away crying.
  '2':
  - type: text
    content: Amnon became so obsessed with Tamar that he became ill. She was a virgin, and Amnon thought he could never have her.
  '20':
  - type: text
    content: Her brother Absalom saw her and asked, “Is it true that Amnon has been with you? Well, my sister, keep quiet for now, since he’s your brother. Don’t you worry about it.” So Tamar lived as a desolate woman in her brother Absalom’s house.
  '21':
  - type: text
    content: When King David heard what had happened, he was very angry.
  - type: note
    content: Dead Sea Scrolls and Greek version add But he did not punish his son Amnon, because he loved him, for he was his firstborn.
  - type: text
    content: ' '
  '22':
  - type: text
    content: And though Absalom never spoke to Amnon about this, he hated Amnon deeply because of what he had done to his sister.
  - type: heading
    content: Absalom’s Revenge on Amnon
  '23':
  - type: text
    content: 'Two years later, when Absalom’s sheep were being sheared at Baal-hazor near Ephraim, Absalom invited all the king’s sons to come to a feast. '
  '24':
  - type: text
    content: He went to the king and said, “My sheep-shearers are now at work. Would the king and his servants please come to celebrate the occasion with me?”
  '25':
  - type: text
    content: The king replied, “No, my son. If we all came, we would be too much of a burden on you.” Absalom pressed him, but the king would not come, though he gave Absalom his blessing.
  '26':
  - type: text
    content: “Well, then,” Absalom said, “if you can’t come, how about sending my brother Amnon with us?”
  - type: text
    content: '“Why Amnon?” the king asked. '
  '27':
  - type: text
    content: But Absalom kept on pressing the king until he finally agreed to let all his sons attend, including Amnon. So Absalom prepared a feast fit for a king.
  - type: note
    content: As in Greek and Latin versions (compare also Dead Sea Scrolls); the Hebrew text lacks this sentence.
  '28':
  - type: text
    content: 'Absalom told his men, “Wait until Amnon gets drunk; then at my signal, kill him! Don’t be afraid. I’m the one who has given the command. Take courage and do it!” '
  '29':
  - type: text
    content: So at Absalom’s signal they murdered Amnon. Then the other sons of the king jumped on their mules and fled.
  '3':
  - type: text
    content: But Amnon had a very crafty friend—his cousin Jonadab. He was the son of David’s brother Shimea.
  - type: note
    content: Hebrew Shimeah (also in 13:32), a variant spelling of Shimea; compare 1 Chr 2:13.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'As they were on the way back to Jerusalem, this report reached David: “Absalom has killed all the king’s sons; not one is left alive!” '
  '31':
  - type: text
    content: The king got up, tore his robe, and threw himself on the ground. His advisers also tore their clothes in horror and sorrow.
  '32':
  - type: text
    content: 'But just then Jonadab, the son of David’s brother Shimea, arrived and said, “No, don’t believe that all the king’s sons have been killed! It was only Amnon! Absalom has been plotting this ever since Amnon raped his sister Tamar. '
  '33':
  - type: text
    content: 'No, my lord the king, your sons aren’t all dead! It was only Amnon.” '
  '34':
  - type: text
    content: Meanwhile Absalom escaped.
  - type: text
    content: Then the watchman on the Jerusalem wall saw a great crowd coming down the hill on the road from the west. He ran to tell the king, “I see a crowd of people coming from the Horonaim road along the side of the hill.”
  - type: note
    content: As in Greek version; Hebrew lacks this sentence.
  '35':
  - type: text
    content: “Look!” Jonadab told the king. “There they are now! The king’s sons are coming, just as I said.”
  '36':
  - type: text
    content: 'They soon arrived, weeping and sobbing, and the king and all his servants wept bitterly with them. '
  '37':
  - type: text
    content: And David mourned many days for his son Amnon.
  - type: text
    content: 'Absalom fled to his grandfather, Talmai son of Ammihud, the king of Geshur. '
  '38':
  - type: text
    content: 'He stayed there in Geshur for three years. '
  '39':
  - type: text
    content: And King David,
  - type: note
    content: Dead Sea Scrolls and Greek version read And the spirit of the king.
  - type: text
    content: ' now reconciled to Amnon’s death, longed to be reunited with his son Absalom.'
  - type: note
    content: Or no longer felt a need to go out after Absalom.
  '4':
  - type: text
    content: One day Jonadab said to Amnon, “What’s the trouble? Why should the son of a king look so dejected morning after morning?”
  - type: text
    content: So Amnon told him, “I am in love with Tamar, my brother Absalom’s sister.”
  '5':
  - type: text
    content: “Well,” Jonadab said, “I’ll tell you what to do. Go back to bed and pretend you are ill. When your father comes to see you, ask him to let Tamar come and prepare some food for you. Tell him you’ll feel better if she prepares it as you watch and feeds you with her own hands.”
  '6':
  - type: text
    content: So Amnon lay down and pretended to be sick. And when the king came to see him, Amnon asked him, “Please let my sister Tamar come and cook my favorite dish
  - type: note
    content: Or a couple of cakes; also in 13:8, 10.
  - type: text
    content: ' as I watch. Then I can eat it from her own hands.” '
  '7':
  - type: text
    content: So David agreed and sent Tamar to Amnon’s house to prepare some food for him.
  '8':
  - type: text
    content: 'When Tamar arrived at Amnon’s house, she went to the place where he was lying down so he could watch her mix some dough. Then she baked his favorite dish for him. '
  '9':
  - type: text
    content: But when she set the serving tray before him, he refused to eat. “Everyone get out of here,” Amnon told his servants. So they all left.
