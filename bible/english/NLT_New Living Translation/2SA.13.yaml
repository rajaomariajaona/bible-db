document_id: 2SA.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Rape of Tamar
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now David’s son Absalom had a beautiful sister named Tamar. And Amnon, her half brother, fell desperately in love with her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Amnon became so obsessed with Tamar that he became ill. She was a virgin, and Amnon thought he could never have her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But Amnon had a very crafty friend—his cousin Jonadab. He was the son of David’s brother Shimea.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shimeah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (also in 13:32), a variant spelling of Shimea; compare 1 Chr 2:13.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: One day Jonadab said to Amnon, “What’s the trouble? Why should the son of a king look so dejected morning after morning?”
- type: usfm
  marker: p
  children:
  - type: text
    text: So Amnon told him, “I am in love with Tamar, my brother Absalom’s sister.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Well,” Jonadab said, “I’ll tell you what to do. Go back to bed and pretend you are ill. When your father comes to see you, ask him to let Tamar come and prepare some food for you. Tell him you’ll feel better if she prepares it as you watch and feeds you with her own hands.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So Amnon lay down and pretended to be sick. And when the king came to see him, Amnon asked him, “Please let my sister Tamar come and cook my favorite dish
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'a couple of cakes; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 13:8, 10.
    marker-yv: yv-n
  - type: text
    text: ' as I watch. Then I can eat it from her own hands.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So David agreed and sent Tamar to Amnon’s house to prepare some food for him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When Tamar arrived at Amnon’s house, she went to the place where he was lying down so he could watch her mix some dough. Then she baked his favorite dish for him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But when she set the serving tray before him, he refused to eat. “Everyone get out of here,” Amnon told his servants. So they all left.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then he said to Tamar, “Now bring the food into my bedroom and feed it to me here.” So Tamar took his favorite dish to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But as she was feeding him, he grabbed her and demanded, “Come to bed with me, my darling sister.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“No, my brother!” she cried. “Don’t be foolish! Don’t do this to me! Such wicked things aren’t done in Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Where could I go in my shame? And you would be called one of the greatest fools in Israel. Please, just speak to the king about it, and he will let you marry me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But Amnon wouldn’t listen to her, and since he was stronger than she was, he raped her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then suddenly Amnon’s love turned to hate, and he hated her even more than he had loved her. “Get out of here!” he snarled at her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “No, no!” Tamar cried. “Sending me away now is worse than what you’ve already done to me.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But Amnon wouldn’t listen to her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He shouted for his servant and demanded, “Throw this woman out, and lock the door behind her!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So the servant put her out and locked the door behind her. She was wearing a long, beautiful robe,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'a robe with sleeves, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'an ornamented robe. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' as was the custom in those days for the king’s virgin daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But now Tamar tore her robe and put ashes on her head. And then, with her face in her hands, she went away crying.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Her brother Absalom saw her and asked, “Is it true that Amnon has been with you? Well, my sister, keep quiet for now, since he’s your brother. Don’t you worry about it.” So Tamar lived as a desolate woman in her brother Absalom’s house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: When King David heard what had happened, he was very angry.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dead Sea Scrolls and Greek version add '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: But he did not punish his son Amnon, because he loved him, for he was his firstborn.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And though Absalom never spoke to Amnon about this, he hated Amnon deeply because of what he had done to his sister.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Absalom’s Revenge on Amnon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Two years later, when Absalom’s sheep were being sheared at Baal-hazor near Ephraim, Absalom invited all the king’s sons to come to a feast. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He went to the king and said, “My sheep-shearers are now at work. Would the king and his servants please come to celebrate the occasion with me?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The king replied, “No, my son. If we all came, we would be too much of a burden on you.” Absalom pressed him, but the king would not come, though he gave Absalom his blessing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Well, then,” Absalom said, “if you can’t come, how about sending my brother Amnon with us?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Why Amnon?” the king asked. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But Absalom kept on pressing the king until he finally agreed to let all his sons attend, including Amnon. So Absalom prepared a feast fit for a king.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As in Greek and Latin versions (compare also Dead Sea Scrolls); the Hebrew text lacks this sentence.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Absalom told his men, “Wait until Amnon gets drunk; then at my signal, kill him! Don’t be afraid. I’m the one who has given the command. Take courage and do it!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: So at Absalom’s signal they murdered Amnon. Then the other sons of the king jumped on their mules and fled.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'As they were on the way back to Jerusalem, this report reached David: “Absalom has killed all the king’s sons; not one is left alive!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The king got up, tore his robe, and threw himself on the ground. His advisers also tore their clothes in horror and sorrow.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But just then Jonadab, the son of David’s brother Shimea, arrived and said, “No, don’t believe that all the king’s sons have been killed! It was only Amnon! Absalom has been plotting this ever since Amnon raped his sister Tamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'No, my lord the king, your sons aren’t all dead! It was only Amnon.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Meanwhile Absalom escaped.
- type: usfm
  marker: p
  children:
  - type: text
    text: Then the watchman on the Jerusalem wall saw a great crowd coming down the hill on the road from the west. He ran to tell the king, “I see a crowd of people coming from the Horonaim road along the side of the hill.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As in Greek version; Hebrew lacks this sentence.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “Look!” Jonadab told the king. “There they are now! The king’s sons are coming, just as I said.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'They soon arrived, weeping and sobbing, and the king and all his servants wept bitterly with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: And David mourned many days for his son Amnon.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Absalom fled to his grandfather, Talmai son of Ammihud, the king of Geshur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'He stayed there in Geshur for three years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: And King David,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:39a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dead Sea Scrolls and Greek version read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: And the spirit of the king.
    marker-yv: yv-n
  - type: text
    text: ' now reconciled to Amnon’s death, longed to be reunited with his son Absalom.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:39b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: no longer felt a need to go out after Absalom.
    marker-yv: yv-n
