document_id: GAL.5,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Freedom in Christ
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: So Christ has truly set us free. Now make sure that you stay free, and don’t get tied up again in slavery to the law.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I am trusting the Lord to keep you from believing false teachings. God will judge that person, whoever he is, who has been confusing you.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Brothers; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: similarly in 5:13.
      marker-yv: yv-n
    - type: text
      text: ' if I were still preaching that you must be circumcised—as some say I do—why am I still being persecuted? If I were no longer preaching salvation through the cross of Christ, no one would be offended. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I just wish that those troublemakers who want to mutilate you by circumcision would mutilate themselves.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'castrate themselves, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cut themselves off from you; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cut themselves off.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For you have been called to live in freedom, my brothers and sisters. But don’t use your freedom to satisfy your sinful nature. Instead, use your freedom to serve one another in love. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For the whole law can be summed up in this one command: “Love your neighbor as yourself.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lev 19:18.
      marker-yv: yv-n
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: But if you are always biting and devouring one another, watch out! Beware of destroying one another.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living by the Spirit’s Power
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So I say, let the Holy Spirit guide your lives. Then you won’t be doing what your sinful nature craves. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The sinful nature wants to do evil, which is just the opposite of what the Spirit wants. And the Spirit gives us desires that are the opposite of what the sinful nature desires. These two forces are constantly fighting each other, so you are not free to carry out your good intentions. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But when you are directed by the Spirit, you are not under obligation to the law of Moses.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'When you follow the desires of your sinful nature, the results are very clear: sexual immorality, impurity, lustful pleasures, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Listen! I, Paul, tell you this: If you are counting on circumcision to make you right with God, then Christ will be of no benefit to you. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'idolatry, sorcery, hostility, quarreling, jealousy, outbursts of anger, selfish ambition, dissension, division, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: envy, drunkenness, wild parties, and other sins like these. Let me tell you again, as I have before, that anyone living that sort of life will not inherit the Kingdom of God.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But the Holy Spirit produces this kind of fruit in our lives: love, joy, peace, patience, kindness, goodness, faithfulness, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: gentleness, and self-control. There is no law against these things!
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Those who belong to Christ Jesus have nailed the passions and desires of their sinful nature to his cross and crucified them there. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Since we are living by the Spirit, let us follow the Spirit’s leading in every part of our lives. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Let us not become conceited, or provoke one another, or be jealous of one another.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I’ll say it again. If you are trying to find favor with God by being circumcised, you must obey every regulation in the whole law of Moses. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For if you are trying to make yourselves right with God by keeping the law, you have been cut off from Christ! You have fallen away from God’s grace.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But we who live by the Spirit eagerly wait to receive by faith the righteousness God has promised to us. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For when we place our faith in Christ Jesus, there is no benefit in being circumcised or being uncircumcised. What is important is faith expressing itself in love.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'You were running the race so well. Who has held you back from following the truth? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'It certainly isn’t God, for he is the one who called you to freedom. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'This false teaching is like a little yeast that spreads through the whole batch of dough! '
