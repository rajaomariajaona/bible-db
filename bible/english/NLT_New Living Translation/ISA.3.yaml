document_id: ISA.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment against Judah
  - type: text
    content: 'The Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: will take away from Jerusalem and Judah
  - type: text
    content: 'everything they depend on:'
  - type: text
    content: every bit of bread
  - type: text
    content: and every drop of water,
  '10':
  - type: text
    content: Tell the godly that all will be well for them.
  - type: text
    content: They will enjoy the rich reward they have earned!
  '11':
  - type: text
    content: But the wicked are doomed,
  - type: text
    content: for they will get exactly what they deserve.
  '12':
  - type: text
    content: Childish leaders oppress my people,
  - type: text
    content: and women rule over them.
  - type: text
    content: O my people, your leaders mislead you;
  - type: text
    content: they send you down the wrong road.
  '13':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' takes his place in court'
  - type: text
    content: and presents his case against his people.
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads against the peoples.
  '14':
  - type: text
    content: 'The '
  - type: text
    content: 'Lord '
  - type: text
    content: comes forward to pronounce judgment
  - type: text
    content: 'on the elders and rulers of his people:'
  - type: text
    content: “You have ruined Israel, my vineyard.
  - type: text
    content: Your houses are filled with things stolen from the poor.
  '15':
  - type: text
    content: How dare you crush my people,
  - type: text
    content: grinding the faces of the poor into the dust?”
  - type: text
    content: 'demands the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  - type: heading
    content: A Warning to Jerusalem
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says, “Beautiful Zion'
  - type: note
    content: Or The women of Zion (with corresponding changes to plural forms through verse 24); Hebrew reads The daughters of Zion; also in 3:17.
  - type: text
    content: ' is haughty:'
  - type: text
    content: craning her elegant neck,
  - type: text
    content: flirting with her eyes,
  - type: text
    content: walking with dainty steps,
  - type: text
    content: tinkling her ankle bracelets.
  '17':
  - type: text
    content: So the Lord will send scabs on her head;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will make beautiful Zion bald.”'
  '18':
  - type: text
    content: On that day of judgment
  - type: text
    content: 'the Lord will strip away everything that makes her beautiful:'
  - type: text
    content: ornaments, headbands, crescent necklaces,
  '19':
  - type: text
    content: earrings, bracelets, and veils;
  '2':
  - type: text
    content: all their heroes and soldiers,
  - type: text
    content: judges and prophets,
  - type: text
    content: fortune-tellers and elders,
  '20':
  - type: text
    content: scarves, ankle bracelets, sashes,
  - type: text
    content: perfumes, and charms;
  '21':
  - type: text
    content: rings, jewels,
  '22':
  - type: text
    content: party clothes, gowns, capes, and purses;
  '23':
  - type: text
    content: mirrors, fine linen garments,
  - type: text
    content: head ornaments, and shawls.
  '24':
  - type: text
    content: Instead of smelling of sweet perfume, she will stink.
  - type: text
    content: She will wear a rope for a sash,
  - type: text
    content: and her elegant hair will fall out.
  - type: text
    content: She will wear rough burlap instead of rich robes.
  - type: text
    content: Shame will replace her beauty.
  - type: note
    content: As in Dead Sea Scrolls; Masoretic Text reads robes / because instead of beauty.
  '25':
  - type: text
    content: The men of the city will be killed with the sword,
  - type: text
    content: and her warriors will die in battle.
  '26':
  - type: text
    content: The gates of Zion will weep and mourn.
  - type: text
    content: The city will be like a ravaged woman,
  - type: text
    content: huddled on the ground.
  '3':
  - type: text
    content: army officers and high officials,
  - type: text
    content: advisers, skilled sorcerers, and astrologers.
  '4':
  - type: text
    content: I will make boys their leaders,
  - type: text
    content: and toddlers their rulers.
  '5':
  - type: text
    content: People will oppress each other—
  - type: text
    content: man against man,
  - type: text
    content: neighbor against neighbor.
  - type: text
    content: Young people will insult their elders,
  - type: text
    content: and vulgar people will sneer at the honorable.
  '6':
  - type: text
    content: In those days a man will say to his brother,
  - type: text
    content: “Since you have a coat, you be our leader!
  - type: text
    content: Take charge of this heap of ruins!”
  '7':
  - type: text
    content: But he will reply,
  - type: text
    content: “No! I can’t help.
  - type: text
    content: I don’t have any extra food or clothes.
  - type: text
    content: Don’t put me in charge!”
  '8':
  - type: text
    content: For Jerusalem will stumble,
  - type: text
    content: and Judah will fall,
  - type: text
    content: 'because they speak out against the '
  - type: text
    content: Lord
  - type: text
    content: ' and refuse to obey him.'
  - type: text
    content: They provoke him to his face.
  '9':
  - type: text
    content: The very look on their faces gives them away.
  - type: text
    content: They display their sin like the people of Sodom
  - type: text
    content: and don’t even try to hide it.
  - type: text
    content: They are doomed!
  - type: text
    content: They have brought destruction upon themselves.
