document_id: ISA.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment against Judah
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will take away from Jerusalem and Judah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'everything they depend on:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every bit of bread
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and every drop of water,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell the godly that all will be well for them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will enjoy the rich reward they have earned!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the wicked are doomed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they will get exactly what they deserve.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Childish leaders oppress my people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and women rule over them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O my people, your leaders mislead you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they send you down the wrong road.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' takes his place in court'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and presents his case against his people.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: against the peoples.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'Lord '
    - type: text
      text: comes forward to pronounce judgment
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'on the elders and rulers of his people:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You have ruined Israel, my vineyard.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your houses are filled with things stolen from the poor.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How dare you crush my people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: grinding the faces of the poor into the dust?”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'demands the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Warning to Jerusalem
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says, “Beautiful Zion'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The women of Zion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(with corresponding changes to plural forms through verse 24); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The daughters of Zion; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 3:17.
      marker-yv: yv-n
    - type: text
      text: ' is haughty:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: craning her elegant neck,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flirting with her eyes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: walking with dainty steps,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tinkling her ankle bracelets.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So the Lord will send scabs on her head;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will make beautiful Zion bald.”'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On that day of judgment
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the Lord will strip away everything that makes her beautiful:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ornaments, headbands, crescent necklaces,
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: earrings, bracelets, and veils;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all their heroes and soldiers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: judges and prophets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fortune-tellers and elders,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: scarves, ankle bracelets, sashes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: perfumes, and charms;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rings, jewels,
  '22':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: party clothes, gowns, capes, and purses;
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mirrors, fine linen garments,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: head ornaments, and shawls.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead of smelling of sweet perfume, she will stink.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She will wear a rope for a sash,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her elegant hair will fall out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She will wear rough burlap instead of rich robes.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shame will replace her beauty.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Dead Sea Scrolls; Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: robes / because instead of beauty.
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The men of the city will be killed with the sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her warriors will die in battle.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The gates of Zion will weep and mourn.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The city will be like a ravaged woman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: huddled on the ground.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: army officers and high officials,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: advisers, skilled sorcerers, and astrologers.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make boys their leaders,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and toddlers their rulers.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People will oppress each other—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: man against man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: neighbor against neighbor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Young people will insult their elders,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and vulgar people will sneer at the honorable.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In those days a man will say to his brother,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Since you have a coat, you be our leader!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Take charge of this heap of ruins!”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he will reply,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “No! I can’t help.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I don’t have any extra food or clothes.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t put me in charge!”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For Jerusalem will stumble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Judah will fall,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'because they speak out against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and refuse to obey him.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They provoke him to his face.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The very look on their faces gives them away.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They display their sin like the people of Sodom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and don’t even try to hide it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are doomed!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have brought destruction upon themselves.
