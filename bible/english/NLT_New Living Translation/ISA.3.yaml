document_id: ISA.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judgment against Judah
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: will take away from Jerusalem and Judah
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'everything they depend on:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: every bit of bread
- type: usfm
  marker: q2
  children:
  - type: text
    text: and every drop of water,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: all their heroes and soldiers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: judges and prophets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fortune-tellers and elders,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: army officers and high officials,
- type: usfm
  marker: q2
  children:
  - type: text
    text: advisers, skilled sorcerers, and astrologers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will make boys their leaders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and toddlers their rulers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: People will oppress each other—
- type: usfm
  marker: q2
  children:
  - type: text
    text: man against man,
- type: usfm
  marker: q2
  children:
  - type: text
    text: neighbor against neighbor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Young people will insult their elders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and vulgar people will sneer at the honorable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: In those days a man will say to his brother,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Since you have a coat, you be our leader!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Take charge of this heap of ruins!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But he will reply,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “No! I can’t help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I don’t have any extra food or clothes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t put me in charge!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For Jerusalem will stumble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Judah will fall,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'because they speak out against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and refuse to obey him.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They provoke him to his face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The very look on their faces gives them away.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They display their sin like the people of Sodom
- type: usfm
  marker: q2
  children:
  - type: text
    text: and don’t even try to hide it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are doomed!
- type: usfm
  marker: q2
  children:
  - type: text
    text: They have brought destruction upon themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tell the godly that all will be well for them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will enjoy the rich reward they have earned!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But the wicked are doomed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they will get exactly what they deserve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Childish leaders oppress my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and women rule over them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O my people, your leaders mislead you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they send you down the wrong road.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' takes his place in court'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and presents his case against his people.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: against the peoples.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'Lord '
  - type: text
    text: comes forward to pronounce judgment
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'on the elders and rulers of his people:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You have ruined Israel, my vineyard.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your houses are filled with things stolen from the poor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: How dare you crush my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: grinding the faces of the poor into the dust?”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'demands the Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Warning to Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says, “Beautiful Zion'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'The women of Zion '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(with corresponding changes to plural forms through verse 24); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'The daughters of Zion; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 3:17.
    marker-yv: yv-n
  - type: text
    text: ' is haughty:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: craning her elegant neck,
- type: usfm
  marker: q2
  children:
  - type: text
    text: flirting with her eyes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: walking with dainty steps,
- type: usfm
  marker: q2
  children:
  - type: text
    text: tinkling her ankle bracelets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: So the Lord will send scabs on her head;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will make beautiful Zion bald.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: On that day of judgment
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the Lord will strip away everything that makes her beautiful:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ornaments, headbands, crescent necklaces,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: earrings, bracelets, and veils;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: scarves, ankle bracelets, sashes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: perfumes, and charms;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: rings, jewels,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: party clothes, gowns, capes, and purses;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: mirrors, fine linen garments,
- type: usfm
  marker: q2
  children:
  - type: text
    text: head ornaments, and shawls.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Instead of smelling of sweet perfume, she will stink.
- type: usfm
  marker: q2
  children:
  - type: text
    text: She will wear a rope for a sash,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and her elegant hair will fall out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She will wear rough burlap instead of rich robes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shame will replace her beauty.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Dead Sea Scrolls; Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: robes / because instead of beauty.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The men of the city will be killed with the sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and her warriors will die in battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The gates of Zion will weep and mourn.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The city will be like a ravaged woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: huddled on the ground.
