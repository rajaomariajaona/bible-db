document_id: PSA.127,116
type_code: eng
verses:
  '1':
  - type: text
    content: A song for pilgrims ascending to Jerusalem. A psalm of Solomon.
  - type: text
    content: 'Unless the '
  - type: text
    content: Lord
  - type: text
    content: ' builds a house,'
  - type: text
    content: the work of the builders is wasted.
  - type: text
    content: 'Unless the '
  - type: text
    content: Lord
  - type: text
    content: ' protects a city,'
  - type: text
    content: guarding it with sentries will do no good.
  '2':
  - type: text
    content: It is useless for you to work so hard
  - type: text
    content: from early morning until late at night,
  - type: text
    content: anxiously working for food to eat;
  - type: text
    content: for God gives rest to his loved ones.
  '3':
  - type: text
    content: 'Children are a gift from the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: they are a reward from him.
  '4':
  - type: text
    content: Children born to a young man
  - type: text
    content: are like arrows in a warrior’s hands.
  '5':
  - type: text
    content: How joyful is the man whose quiver is full of them!
  - type: text
    content: He will not be put to shame when he confronts his accusers at the city gates.
