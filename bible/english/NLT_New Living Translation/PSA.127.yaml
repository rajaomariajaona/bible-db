document_id: PSA.127,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song for pilgrims ascending to Jerusalem. A psalm of Solomon.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Unless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' builds a house,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the work of the builders is wasted.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Unless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' protects a city,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: guarding it with sentries will do no good.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: It is useless for you to work so hard
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from early morning until late at night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: anxiously working for food to eat;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for God gives rest to his loved ones.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Children are a gift from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are a reward from him.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Children born to a young man
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are like arrows in a warrior’s hands.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: How joyful is the man whose quiver is full of them!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will not be put to shame when he confronts his accusers at the city gates.
