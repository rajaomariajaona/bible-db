document_id: 1CH.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Warriors Join David’s Army
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The following men joined David at Ziklag while he was hiding from Saul son of Kish. They were among the warriors who fought beside David in battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'All of them were expert archers, and they could shoot arrows or sling stones with their left hand as well as their right. They were all relatives of Saul from the tribe of Benjamin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Their leader was Ahiezer son of Shemaah from Gibeah; his brother Joash was second-in-command. These were the other warriors:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jeziel and Pelet, sons of Azmaveth;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Beracah;
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jehu from Anathoth;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ishmaiah from Gibeon, a famous warrior and leader among the Thirty;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses 12:4b-40 are numbered 12:5-41 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: Jeremiah, Jahaziel, Johanan, and Jozabad from Gederah;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Eluzai, Jerimoth, Bealiah, Shemariah, and Shephatiah from Haruph;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Elkanah, Isshiah, Azarel, Joezer, and Jashobeam, who were Korahites;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Joelah and Zebadiah, sons of Jeroham from Gedor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Some brave and experienced warriors from the tribe of Gad also defected to David while he was at the stronghold in the wilderness. They were expert with both shield and spear, as fierce as lions and as swift as deer on the mountains.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ezer was their leader.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Obadiah was second.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Eliab was third.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mishmannah was fourth.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jeremiah was fifth.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Attai was sixth.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Eliel was seventh.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Johanan was eighth.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Elzabad was ninth.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Jeremiah was tenth.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Macbannai was eleventh.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'These warriors from Gad were army commanders. The weakest among them could take on a hundred regular troops, and the strongest could take on a thousand! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: These were the men who crossed the Jordan River during its seasonal flooding at the beginning of the year and drove out all the people living in the lowlands on both the east and west banks.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Others from Benjamin and Judah came to David at the stronghold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: David went out to meet them and said, “If you have come in peace to help me, we are friends. But if you have come to betray me to my enemies when I am innocent, then may the God of our ancestors see it and punish you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then the Spirit came upon Amasai, the leader of the Thirty, and he said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “We are yours, David!
- type: usfm
  marker: q2
  children:
  - type: text
    text: We are on your side, son of Jesse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peace and prosperity be with you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and success to all who help you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your God is the one who helps you.”
- type: usfm
  marker: m
  children:
  - type: text
    text: So David let them join him, and he made them officers over his troops.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Some men from Manasseh defected from the Israelite army and joined David when he set out with the Philistines to fight against Saul. But as it turned out, the Philistine rulers refused to let David and his men go with them. After much discussion, they sent them back, for they said, “It will cost us our heads if David switches loyalties to Saul and turns against us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Here is a list of the men from Manasseh who defected to David as he was returning to Ziklag: Adnah, Jozabad, Jediael, Michael, Jozabad, Elihu, and Zillethai. Each commanded 1,000 troops from the tribe of Manasseh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'They helped David chase down bands of raiders, for they were all brave and able warriors who became commanders in his army. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Day after day more men joined David until he had a great army, like the army of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'These are the numbers of armed warriors who joined David at Hebron. They were all eager to see David become king instead of Saul, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had promised.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: From the tribe of Judah, there were 6,800 warriors armed with shields and spears.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: From the tribe of Simeon, there were 7,100 brave warriors.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'From the tribe of Levi, there were 4,600 warriors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'This included Jehoiada, leader of the family of Aaron, who had 3,700 under his command. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: This also included Zadok, a brave young warrior, with 22 members of his family who were all officers.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: From the tribe of Benjamin, Saul’s relatives, there were 3,000 warriors. Most of the men from Benjamin had remained loyal to Saul until this time.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: From the tribe of Ephraim, there were 20,800 brave warriors, each highly respected in his own clan.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: From the half-tribe of Manasseh west of the Jordan, 18,000 men were designated by name to help David become king.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: From the tribe of Issachar, there were 200 leaders of the tribe with their relatives. All these men understood the signs of the times and knew the best course for Israel to take.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: From the tribe of Zebulun, there were 50,000 skilled warriors. They were fully armed and prepared for battle and completely loyal to David.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: From the tribe of Naphtali, there were 1,000 officers and 37,000 warriors armed with shields and spears.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: From the tribe of Dan, there were 28,600 warriors, all prepared for battle.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: From the tribe of Asher, there were 40,000 trained warriors, all prepared for battle.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: From the east side of the Jordan River—where the tribes of Reuben and Gad and the half-tribe of Manasseh lived—there were 120,000 troops armed with every kind of weapon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'All these men came in battle array to Hebron with the single purpose of making David the king over all Israel. In fact, everyone in Israel agreed that David should be their king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'They feasted and drank with David for three days, for preparations had been made by their relatives for their arrival. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: And people from as far away as Issachar, Zebulun, and Naphtali brought food on donkeys, camels, mules, and oxen. Vast supplies of flour, fig cakes, clusters of raisins, wine, olive oil, cattle, sheep, and goats were brought to the celebration. There was great joy throughout the land of Israel.
