document_id: EXO.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dedication of the Firstborn
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: So observe the decree of this festival at the appointed time each year.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“This is what you must do when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' fulfills the promise he swore to you and to your ancestors. When he gives you the land where the Canaanites now live, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'you must present all firstborn sons and firstborn male animals to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for they belong to him. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'A firstborn donkey may be bought back from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by presenting a lamb or young goat in its place. But if you do not buy it back, you must break its neck. However, you must buy back every firstborn son.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“And in the future, your children will ask you, ‘What does all this mean?’ Then you will tell them, ‘With the power of his mighty hand, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought us out of Egypt, the place of our slavery. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Pharaoh stubbornly refused to let us go, so the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' killed all the firstborn males throughout the land of Egypt, both people and animals. That is why I now sacrifice all the firstborn males to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '—except that the firstborn sons are always bought back.’ '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'This ceremony will be like a mark branded on your hand or your forehead. It is a reminder that the power of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s mighty hand brought us out of Egypt.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Wilderness Detour
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'When Pharaoh finally let the people go, God did not lead them along the main road that runs through Philistine territory, even though that was the shortest route to the Promised Land. God said, “If the people are faced with a battle, they might change their minds and return to Egypt.” '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: So God led them in a roundabout way through the wilderness toward the Red Sea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:18a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sea of reeds.
      marker-yv: yv-n
    - type: text
      text: ' Thus the Israelites left Egypt like an army ready for battle.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:18b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: left Egypt in the fifth generation.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Moses took the bones of Joseph with him, for Joseph had made the sons of Israel swear to do this. He said, “God will certainly come to help you. When he does, you must take my bones with you from this place.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Dedicate to me every firstborn among the Israelites. The first offspring to be born, of both humans and animals, belongs to me.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The Israelites left Succoth and camped at Etham on the edge of the wilderness. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' went ahead of them. He guided them during the day with a pillar of cloud, and he provided light at night with a pillar of fire. This allowed them to travel by day or by night. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did not remove the pillar of cloud or pillar of fire from its place in front of the people.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So Moses said to the people, “This is a day to remember forever—the day you left Egypt, the place of your slavery. Today the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has brought you out by the power of his mighty hand. (Remember, eat no food containing yeast.) '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: On this day in early spring, in the month of Abib,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'On this day in the month of Abib. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This first month of the ancient Hebrew lunar calendar usually occurs within the months of March and April.
      marker-yv: yv-n
    - type: text
      text: ' you have been set free. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'You must celebrate this event in this month each year after the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brings you into the land of the Canaanites, Hittites, Amorites, Hivites, and Jebusites. (He swore to your ancestors that he would give you this land—a land flowing with milk and honey.) '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For seven days the bread you eat must be made without yeast. Then on the seventh day, celebrate a feast to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Eat bread without yeast during those seven days. In fact, there must be no yeast bread or any yeast at all found within the borders of your land during this time.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“On the seventh day you must explain to your children, ‘I am celebrating what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did for me when I left Egypt.’ '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'This annual festival will be a visible sign to you, like a mark branded on your hand or your forehead. Let it remind you always to recite this teaching of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': ‘With a strong hand, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rescued you from Egypt.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Let it remind you always to keep the instructions of the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' on the tip of your tongue, because with a strong hand, the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' rescued you from Egypt.'
      marker-yv: yv-n
    - type: text
      text: ' '
