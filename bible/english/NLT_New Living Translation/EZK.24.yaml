document_id: EZK.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sign of the Cooking Pot
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: On January 15,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the tenth day of the tenth month, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. This event occurred on January 15, 588 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 1:1.
    marker-yv: yv-n
  - type: text
    text: ' during the ninth year of King Jehoiachin’s captivity, this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, write down today’s date, because on this very day the king of Babylon is beginning his attack against Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then give these rebels an illustration with this message from the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Put a pot on the fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pour in some water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fill it with choice pieces of meat—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rump and the shoulder
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the most tender cuts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Use only the best sheep from the flock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and heap fuel on the fire beneath the pot.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring the pot to a boil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cook the bones along with the meat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Now this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: What sorrow awaits Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the city of murderers!
- type: usfm
  marker: q1
  children:
  - type: text
    text: She is a cooking pot
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose corruption can’t be cleaned out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take the meat out in random order,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for no piece is better than another.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For the blood of her murders
- type: usfm
  marker: q2
  children:
  - type: text
    text: is splashed on the rocks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It isn’t even spilled on the ground,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where the dust could cover it!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So I will splash her blood on a rock
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all to see,
- type: usfm
  marker: q1
  children:
  - type: text
    text: an expression of my anger
- type: usfm
  marker: q2
  children:
  - type: text
    text: and vengeance against her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: What sorrow awaits Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the city of murderers!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I myself will pile up the fuel beneath her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Yes, heap on the wood!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let the fire roar to make the pot boil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cook the meat with many spices,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and afterward burn the bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Now set the empty pot on the coals.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Heat it red hot!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Burn away the filth and corruption.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But it’s hopeless;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the corruption can’t be cleaned out.
- type: usfm
  marker: q2
  children:
  - type: text
    text: So throw it into the fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Your impurity is your lewdness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the corruption of your idolatry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I tried to cleanse you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you refused.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So now you will remain in your filth
- type: usfm
  marker: q2
  children:
  - type: text
    text: until my fury against you has been satisfied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken! The time has come, and I won’t hold back. I will not change my mind, and I will have no pity on you. You will be judged on the basis of all your wicked actions, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Death of Ezekiel’s Wife
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Son of man, with one blow I will take away your dearest treasure. Yet you must not show any sorrow at her death. Do not weep; let there be no tears. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Groan silently, but let there be no wailing at her grave. Do not uncover your head or take off your sandals. Do not perform the usual rituals of mourning or accept any food brought to you by consoling friends.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So I proclaimed this to the people the next morning, and in the evening my wife died. The next morning I did everything I had been told to do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then the people asked, “What does all this mean? What are you trying to tell us?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So I said to them, “A message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and I was told to give this message to the people of Israel. This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I will defile my Temple, the source of your security and pride, the place your heart delights in. Your sons and daughters whom you left behind in Judah will be slaughtered by the sword. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then you will do as Ezekiel has done. You will not mourn in public or console yourselves by eating the food brought by friends. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Your heads will remain covered, and your sandals will not be taken off. You will not mourn or weep, but you will waste away because of your sins. You will groan among yourselves for all the evil you have done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ezekiel is an example for you; you will do just as he has done. And when that time comes, you will know that I am the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, “Son of man, on the day I take away their stronghold—their joy and glory, their heart’s desire, their dearest treasure—I will also take away their sons and daughters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And on that day a survivor from Jerusalem will come to you in Babylon and tell you what has happened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And when he arrives, your voice will suddenly return so you can talk to him, and you will be a symbol for these people. Then they will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
