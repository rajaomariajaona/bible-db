document_id: EZK.24,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sign of the Cooking Pot
  - type: text
    content: On January 15,
  - type: note
    content: Hebrew On the tenth day of the tenth month, of the ancient Hebrew lunar calendar. This event occurred on January 15, 588 b.c.; also see note on 1:1.
  - type: text
    content: ' during the ninth year of King Jehoiachin’s captivity, this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: Yes, heap on the wood!
  - type: text
    content: Let the fire roar to make the pot boil.
  - type: text
    content: Cook the meat with many spices,
  - type: text
    content: and afterward burn the bones.
  '11':
  - type: text
    content: Now set the empty pot on the coals.
  - type: text
    content: Heat it red hot!
  - type: text
    content: Burn away the filth and corruption.
  '12':
  - type: text
    content: But it’s hopeless;
  - type: text
    content: the corruption can’t be cleaned out.
  - type: text
    content: So throw it into the fire.
  '13':
  - type: text
    content: Your impurity is your lewdness
  - type: text
    content: and the corruption of your idolatry.
  - type: text
    content: I tried to cleanse you,
  - type: text
    content: but you refused.
  - type: text
    content: So now you will remain in your filth
  - type: text
    content: until my fury against you has been satisfied.
  '14':
  - type: text
    content: '“I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken! The time has come, and I won’t hold back. I will not change my mind, and I will have no pity on you. You will be judged on the basis of all your wicked actions, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: The Death of Ezekiel’s Wife
  '15':
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '16':
  - type: text
    content: '“Son of man, with one blow I will take away your dearest treasure. Yet you must not show any sorrow at her death. Do not weep; let there be no tears. '
  '17':
  - type: text
    content: Groan silently, but let there be no wailing at her grave. Do not uncover your head or take off your sandals. Do not perform the usual rituals of mourning or accept any food brought to you by consoling friends.”
  '18':
  - type: text
    content: 'So I proclaimed this to the people the next morning, and in the evening my wife died. The next morning I did everything I had been told to do. '
  '19':
  - type: text
    content: Then the people asked, “What does all this mean? What are you trying to tell us?”
  '2':
  - type: text
    content: '“Son of man, write down today’s date, because on this very day the king of Babylon is beginning his attack against Jerusalem. '
  '20':
  - type: text
    content: 'So I said to them, “A message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '21':
  - type: text
    content: 'and I was told to give this message to the people of Israel. This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will defile my Temple, the source of your security and pride, the place your heart delights in. Your sons and daughters whom you left behind in Judah will be slaughtered by the sword. '
  '22':
  - type: text
    content: 'Then you will do as Ezekiel has done. You will not mourn in public or console yourselves by eating the food brought by friends. '
  '23':
  - type: text
    content: 'Your heads will remain covered, and your sandals will not be taken off. You will not mourn or weep, but you will waste away because of your sins. You will groan among yourselves for all the evil you have done. '
  '24':
  - type: text
    content: 'Ezekiel is an example for you; you will do just as he has done. And when that time comes, you will know that I am the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .”
  '25':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Son of man, on the day I take away their stronghold—their joy and glory, their heart’s desire, their dearest treasure—I will also take away their sons and daughters. '
  '26':
  - type: text
    content: 'And on that day a survivor from Jerusalem will come to you in Babylon and tell you what has happened. '
  '27':
  - type: text
    content: 'And when he arrives, your voice will suddenly return so you can talk to him, and you will be a symbol for these people. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: 'Then give these rebels an illustration with this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “Put a pot on the fire,
  - type: text
    content: and pour in some water.
  '4':
  - type: text
    content: Fill it with choice pieces of meat—
  - type: text
    content: the rump and the shoulder
  - type: text
    content: and all the most tender cuts.
  '5':
  - type: text
    content: Use only the best sheep from the flock,
  - type: text
    content: and heap fuel on the fire beneath the pot.
  - type: text
    content: Bring the pot to a boil,
  - type: text
    content: and cook the bones along with the meat.
  '6':
  - type: text
    content: '“Now this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: What sorrow awaits Jerusalem,
  - type: text
    content: the city of murderers!
  - type: text
    content: She is a cooking pot
  - type: text
    content: whose corruption can’t be cleaned out.
  - type: text
    content: Take the meat out in random order,
  - type: text
    content: for no piece is better than another.
  '7':
  - type: text
    content: For the blood of her murders
  - type: text
    content: is splashed on the rocks.
  - type: text
    content: It isn’t even spilled on the ground,
  - type: text
    content: where the dust could cover it!
  '8':
  - type: text
    content: So I will splash her blood on a rock
  - type: text
    content: for all to see,
  - type: text
    content: an expression of my anger
  - type: text
    content: and vengeance against her.
  '9':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: What sorrow awaits Jerusalem,
  - type: text
    content: the city of murderers!
  - type: text
    content: I myself will pile up the fuel beneath her.
