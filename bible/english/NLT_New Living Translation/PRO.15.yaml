document_id: PRO.15
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A gentle answer deflects anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but harsh words make tempers flare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The tongue of the wise makes knowledge appealing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the mouth of a fool belches out foolishness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is watching everywhere,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: keeping his eye on both the evil and the good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Gentle words are a tree of life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a deceitful tongue crushes the spirit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Only a fool despises a parent’s
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: father’s.
    marker-yv: yv-n
  - type: text
    text: ' discipline;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever learns from correction is wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: There is treasure in the house of the godly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the earnings of the wicked bring trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The lips of the wise give good advice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the heart of a fool has none to give.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests the sacrifice of the wicked,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he delights in the prayers of the upright.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests the way of the wicked,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he loves those who pursue godliness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Whoever abandons the right path will be severely disciplined;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever hates correction will die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Even Death and Destruction
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Sheol and Abaddon.
    marker-yv: yv-n
  - type: text
    text: ' hold no secrets from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: How much more does he know the human heart!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mockers hate to be corrected,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so they stay away from the wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: A glad heart makes a happy face;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a broken heart crushes the spirit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A wise person is hungry for knowledge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while the fool feeds on trash.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For the despondent, every day brings trouble;
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the happy heart, life is a continual feast.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Better to have little, with fear for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: than to have great treasure and inner turmoil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A bowl of vegetables with someone you love
- type: usfm
  marker: q2
  children:
  - type: text
    text: is better than steak with someone you hate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A hot-tempered person starts fights;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a cool-tempered person stops them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A lazy person’s way is blocked with briers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the path of the upright is an open highway.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Sensible children bring joy to their father;
- type: usfm
  marker: q2
  children:
  - type: text
    text: foolish children despise their mother.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Foolishness brings joy to those with no sense;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a sensible person stays on the right path.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Plans go wrong for lack of advice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: many advisers bring success.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Everyone enjoys a fitting reply;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is wonderful to say the right thing at the right time!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The path of life leads upward for the wise;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they leave the grave
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Sheol.
    marker-yv: yv-n
  - type: text
    text: ' behind.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' tears down the house of the proud,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he protects the property of widows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests evil plans,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he delights in pure words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Greed brings grief to the whole family,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but those who hate bribes will live.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The heart of the godly thinks carefully before speaking;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the mouth of the wicked overflows with evil words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is far from the wicked,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he hears the prayers of the righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: A cheerful look brings joy to the heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: good news makes for good health.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: If you listen to constructive criticism,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will be at home among the wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: If you reject discipline, you only harm yourself;
- type: usfm
  marker: q2
  children:
  - type: text
    text: but if you listen to correction, you grow in understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' teaches wisdom;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: humility precedes honor.
