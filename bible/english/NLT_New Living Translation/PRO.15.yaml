document_id: PRO.15,116
type_code: eng
verses:
  '1':
  - type: text
    content: A gentle answer deflects anger,
  - type: text
    content: but harsh words make tempers flare.
  '10':
  - type: text
    content: Whoever abandons the right path will be severely disciplined;
  - type: text
    content: whoever hates correction will die.
  '11':
  - type: text
    content: Even Death and Destruction
  - type: note
    content: Hebrew Sheol and Abaddon.
  - type: text
    content: ' hold no secrets from the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: How much more does he know the human heart!
  '12':
  - type: text
    content: Mockers hate to be corrected,
  - type: text
    content: so they stay away from the wise.
  '13':
  - type: text
    content: A glad heart makes a happy face;
  - type: text
    content: a broken heart crushes the spirit.
  '14':
  - type: text
    content: A wise person is hungry for knowledge,
  - type: text
    content: while the fool feeds on trash.
  '15':
  - type: text
    content: For the despondent, every day brings trouble;
  - type: text
    content: for the happy heart, life is a continual feast.
  '16':
  - type: text
    content: 'Better to have little, with fear for the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: than to have great treasure and inner turmoil.
  '17':
  - type: text
    content: A bowl of vegetables with someone you love
  - type: text
    content: is better than steak with someone you hate.
  '18':
  - type: text
    content: A hot-tempered person starts fights;
  - type: text
    content: a cool-tempered person stops them.
  '19':
  - type: text
    content: A lazy person’s way is blocked with briers,
  - type: text
    content: but the path of the upright is an open highway.
  '2':
  - type: text
    content: The tongue of the wise makes knowledge appealing,
  - type: text
    content: but the mouth of a fool belches out foolishness.
  '20':
  - type: text
    content: Sensible children bring joy to their father;
  - type: text
    content: foolish children despise their mother.
  '21':
  - type: text
    content: Foolishness brings joy to those with no sense;
  - type: text
    content: a sensible person stays on the right path.
  '22':
  - type: text
    content: Plans go wrong for lack of advice;
  - type: text
    content: many advisers bring success.
  '23':
  - type: text
    content: Everyone enjoys a fitting reply;
  - type: text
    content: it is wonderful to say the right thing at the right time!
  '24':
  - type: text
    content: The path of life leads upward for the wise;
  - type: text
    content: they leave the grave
  - type: note
    content: Hebrew Sheol.
  - type: text
    content: ' behind.'
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' tears down the house of the proud,'
  - type: text
    content: but he protects the property of widows.
  '26':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests evil plans,'
  - type: text
    content: but he delights in pure words.
  '27':
  - type: text
    content: Greed brings grief to the whole family,
  - type: text
    content: but those who hate bribes will live.
  '28':
  - type: text
    content: The heart of the godly thinks carefully before speaking;
  - type: text
    content: the mouth of the wicked overflows with evil words.
  '29':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is far from the wicked,'
  - type: text
    content: but he hears the prayers of the righteous.
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is watching everywhere,'
  - type: text
    content: keeping his eye on both the evil and the good.
  '30':
  - type: text
    content: A cheerful look brings joy to the heart;
  - type: text
    content: good news makes for good health.
  '31':
  - type: text
    content: If you listen to constructive criticism,
  - type: text
    content: you will be at home among the wise.
  '32':
  - type: text
    content: If you reject discipline, you only harm yourself;
  - type: text
    content: but if you listen to correction, you grow in understanding.
  '33':
  - type: text
    content: 'Fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' teaches wisdom;'
  - type: text
    content: humility precedes honor.
  '4':
  - type: text
    content: Gentle words are a tree of life;
  - type: text
    content: a deceitful tongue crushes the spirit.
  '5':
  - type: text
    content: Only a fool despises a parent’s
  - type: note
    content: Hebrew father’s.
  - type: text
    content: ' discipline;'
  - type: text
    content: whoever learns from correction is wise.
  '6':
  - type: text
    content: There is treasure in the house of the godly,
  - type: text
    content: but the earnings of the wicked bring trouble.
  '7':
  - type: text
    content: The lips of the wise give good advice;
  - type: text
    content: the heart of a fool has none to give.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests the sacrifice of the wicked,'
  - type: text
    content: but he delights in the prayers of the upright.
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests the way of the wicked,'
  - type: text
    content: but he loves those who pursue godliness.
