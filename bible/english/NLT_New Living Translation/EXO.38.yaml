document_id: EXO.38,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Building the Altar of Burnt Offering
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Next Bezalel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'he; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 38:8, 9.
      marker-yv: yv-n
    - type: text
      text: ' used acacia wood to construct the square altar of burnt offering. It was 7-1/2 feet wide, 7-1/2 feet long, and 4-1/2 feet high.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.3 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'wide, 5 cubits long, a square, and 3 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[1.4 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: high.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They were held up by twenty posts set securely in twenty bronze bases. He hung the curtains with silver hooks and rings. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He made a similar set of curtains for the north side—150 feet of curtains held up by twenty posts set securely in bronze bases. He hung the curtains with silver hooks and rings. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The curtains on the west end of the courtyard were 75 feet long,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '50 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[23 meters]; also in 38:13.'
      marker-yv: yv-n
    - type: text
      text: ' hung with silver hooks and rings and supported by ten posts set into ten bases. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The east end, the front, was also 75 feet long.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The courtyard entrance was on the east end, flanked by two curtains. The curtain on the right side was 22-1/2 feet long
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '15 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[6.9 meters]; also in 38:15.'
      marker-yv: yv-n
    - type: text
      text: ' and was supported by three posts set into three bases. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The curtain on the left side was also 22-1/2 feet long and was supported by three posts set into three bases. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the curtains used in the courtyard were made of finely woven linen. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Each post had a bronze base, and all the hooks and rings were silver. The tops of the posts of the courtyard were overlaid with silver, and the rings to hold up the curtains were made of silver.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He made the curtain for the entrance to the courtyard of finely woven linen, and he decorated it with beautiful embroidery in blue, purple, and scarlet thread. It was 30 feet long, and its height was 7-1/2 feet,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[9.2 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long and 5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.3 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: high.
      marker-yv: yv-n
    - type: text
      text: ' just like the curtains of the courtyard walls. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It was supported by four posts, each set securely in its own bronze base. The tops of the posts were overlaid with silver, and the hooks and rings were also made of silver.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He made horns for each of its four corners so that the horns and altar were all one piece. He overlaid the altar with bronze. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the tent pegs used in the Tabernacle and courtyard were made of bronze.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Inventory of Materials
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: This is an inventory of the materials used in building the Tabernacle of the Covenant.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Tabernacle, the Tabernacle of the Testimony.
      marker-yv: yv-n
    - type: text
      text: ' The Levites compiled the figures, as Moses directed, and Ithamar son of Aaron the priest served as recorder. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Bezalel son of Uri, grandson of Hur, of the tribe of Judah, made everything just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He was assisted by Oholiab son of Ahisamach, of the tribe of Dan, a craftsman expert at engraving, designing, and embroidering with blue, purple, and scarlet thread on fine linen cloth.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The people brought special offerings of gold totaling 2,193 pounds,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '29 talents and 730 shekels '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[994 kilograms]. Each shekel weighed about 0.4 ounces or 11 grams.'
      marker-yv: yv-n
    - type: text
      text: ' as measured by the weight of the sanctuary shekel. This gold was used throughout the Tabernacle.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The whole community of Israel gave 7,545 pounds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '100 talents and 1,775 shekels '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[3,420 kilograms].'
      marker-yv: yv-n
    - type: text
      text: ' of silver, as measured by the weight of the sanctuary shekel. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This silver came from the tax collected from each man registered in the census. (The tax is one beka, which is half a shekel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '0.2 ounces '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[6 grams].'
      marker-yv: yv-n
    - type: text
      text: ' based on the sanctuary shekel.) The tax was collected from 603,550 men who had reached their twentieth birthday. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The hundred bases for the frames of the sanctuary walls and for the posts supporting the inner curtain required 7,500 pounds of silver, about 75 pounds for each base.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '100 talents '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[3,400 kilograms] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of silver, 1 talent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[34 kilograms] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for each base.
      marker-yv: yv-n
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The remaining 45 pounds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1,775 [shekels] '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[20.2 kilograms].'
      marker-yv: yv-n
    - type: text
      text: ' of silver was used to make the hooks and rings and to overlay the tops of the posts.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The people also brought as special offerings 5,310 pounds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '70 talents and 2,400 shekels '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2,407 kilograms].'
      marker-yv: yv-n
    - type: text
      text: ' of bronze, '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then he made all the altar utensils of bronze—the ash buckets, shovels, basins, meat forks, and firepans. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'which was used for casting the bases for the posts at the entrance to the Tabernacle, and for the bronze altar with its bronze grating and all the altar utensils. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Bronze was also used to make the bases for the posts that supported the curtains around the courtyard, the bases for the curtain at the entrance of the courtyard, and all the tent pegs for the Tabernacle and the courtyard.
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Next he made a bronze grating and installed it halfway down the side of the altar, under the ledge. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He cast four rings and attached them to the corners of the bronze grating to hold the carrying poles. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He made the poles from acacia wood and overlaid them with bronze. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He inserted the poles through the rings on the sides of the altar. The altar was hollow and was made from planks.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Building the Washbasin
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Bezalel made the bronze washbasin and its bronze stand from bronze mirrors donated by the women who served at the entrance of the Tabernacle.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tent of Meeting; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 38:30.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Building the Courtyard
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then Bezalel made the courtyard, which was enclosed with curtains made of finely woven linen. On the south side the curtains were 150 feet long.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '100 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[46 meters]; also in 38:11.'
      marker-yv: yv-n
    - type: text
      text: ' '
