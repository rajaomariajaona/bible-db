document_id: EXO.38,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Building the Altar of Burnt Offering
  - type: text
    content: Next Bezalel
  - type: note
    content: Hebrew he; also in 38:8, 9.
  - type: text
    content: ' used acacia wood to construct the square altar of burnt offering. It was 7-1/2 feet wide, 7-1/2 feet long, and 4-1/2 feet high.'
  - type: note
    content: Hebrew 5 cubits [2.3 meters] wide, 5 cubits long, a square, and 3 cubits [1.4 meters] high.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'They were held up by twenty posts set securely in twenty bronze bases. He hung the curtains with silver hooks and rings. '
  '11':
  - type: text
    content: 'He made a similar set of curtains for the north side—150 feet of curtains held up by twenty posts set securely in bronze bases. He hung the curtains with silver hooks and rings. '
  '12':
  - type: text
    content: The curtains on the west end of the courtyard were 75 feet long,
  - type: note
    content: Hebrew 50 cubits [23 meters]; also in 38:13.
  - type: text
    content: ' hung with silver hooks and rings and supported by ten posts set into ten bases. '
  '13':
  - type: text
    content: The east end, the front, was also 75 feet long.
  '14':
  - type: text
    content: The courtyard entrance was on the east end, flanked by two curtains. The curtain on the right side was 22-1/2 feet long
  - type: note
    content: Hebrew 15 cubits [6.9 meters]; also in 38:15.
  - type: text
    content: ' and was supported by three posts set into three bases. '
  '15':
  - type: text
    content: 'The curtain on the left side was also 22-1/2 feet long and was supported by three posts set into three bases. '
  '16':
  - type: text
    content: 'All the curtains used in the courtyard were made of finely woven linen. '
  '17':
  - type: text
    content: Each post had a bronze base, and all the hooks and rings were silver. The tops of the posts of the courtyard were overlaid with silver, and the rings to hold up the curtains were made of silver.
  '18':
  - type: text
    content: He made the curtain for the entrance to the courtyard of finely woven linen, and he decorated it with beautiful embroidery in blue, purple, and scarlet thread. It was 30 feet long, and its height was 7-1/2 feet,
  - type: note
    content: Hebrew 20 cubits [9.2 meters] long and 5 cubits [2.3 meters] high.
  - type: text
    content: ' just like the curtains of the courtyard walls. '
  '19':
  - type: text
    content: It was supported by four posts, each set securely in its own bronze base. The tops of the posts were overlaid with silver, and the hooks and rings were also made of silver.
  '2':
  - type: text
    content: 'He made horns for each of its four corners so that the horns and altar were all one piece. He overlaid the altar with bronze. '
  '20':
  - type: text
    content: All the tent pegs used in the Tabernacle and courtyard were made of bronze.
  - type: heading
    content: Inventory of Materials
  '21':
  - type: text
    content: This is an inventory of the materials used in building the Tabernacle of the Covenant.
  - type: note
    content: Hebrew the Tabernacle, the Tabernacle of the Testimony.
  - type: text
    content: ' The Levites compiled the figures, as Moses directed, and Ithamar son of Aaron the priest served as recorder. '
  '22':
  - type: text
    content: 'Bezalel son of Uri, grandson of Hur, of the tribe of Judah, made everything just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '23':
  - type: text
    content: He was assisted by Oholiab son of Ahisamach, of the tribe of Dan, a craftsman expert at engraving, designing, and embroidering with blue, purple, and scarlet thread on fine linen cloth.
  '24':
  - type: text
    content: The people brought special offerings of gold totaling 2,193 pounds,
  - type: note
    content: Hebrew 29 talents and 730 shekels [994 kilograms]. Each shekel weighed about 0.4 ounces or 11 grams.
  - type: text
    content: ' as measured by the weight of the sanctuary shekel. This gold was used throughout the Tabernacle.'
  '25':
  - type: text
    content: The whole community of Israel gave 7,545 pounds
  - type: note
    content: Hebrew 100 talents and 1,775 shekels [3,420 kilograms].
  - type: text
    content: ' of silver, as measured by the weight of the sanctuary shekel. '
  '26':
  - type: text
    content: This silver came from the tax collected from each man registered in the census. (The tax is one beka, which is half a shekel,
  - type: note
    content: Or 0.2 ounces [6 grams].
  - type: text
    content: ' based on the sanctuary shekel.) The tax was collected from 603,550 men who had reached their twentieth birthday. '
  '27':
  - type: text
    content: The hundred bases for the frames of the sanctuary walls and for the posts supporting the inner curtain required 7,500 pounds of silver, about 75 pounds for each base.
  - type: note
    content: Hebrew 100 talents [3,400 kilograms] of silver, 1 talent [34 kilograms] for each base.
  - type: text
    content: ' '
  '28':
  - type: text
    content: The remaining 45 pounds
  - type: note
    content: Hebrew 1,775 [shekels] [20.2 kilograms].
  - type: text
    content: ' of silver was used to make the hooks and rings and to overlay the tops of the posts.'
  '29':
  - type: text
    content: The people also brought as special offerings 5,310 pounds
  - type: note
    content: Hebrew 70 talents and 2,400 shekels [2,407 kilograms].
  - type: text
    content: ' of bronze, '
  '3':
  - type: text
    content: 'Then he made all the altar utensils of bronze—the ash buckets, shovels, basins, meat forks, and firepans. '
  '30':
  - type: text
    content: 'which was used for casting the bases for the posts at the entrance to the Tabernacle, and for the bronze altar with its bronze grating and all the altar utensils. '
  '31':
  - type: text
    content: Bronze was also used to make the bases for the posts that supported the curtains around the courtyard, the bases for the curtain at the entrance of the courtyard, and all the tent pegs for the Tabernacle and the courtyard.
  '4':
  - type: text
    content: 'Next he made a bronze grating and installed it halfway down the side of the altar, under the ledge. '
  '5':
  - type: text
    content: 'He cast four rings and attached them to the corners of the bronze grating to hold the carrying poles. '
  '6':
  - type: text
    content: 'He made the poles from acacia wood and overlaid them with bronze. '
  '7':
  - type: text
    content: He inserted the poles through the rings on the sides of the altar. The altar was hollow and was made from planks.
  - type: heading
    content: Building the Washbasin
  '8':
  - type: text
    content: Bezalel made the bronze washbasin and its bronze stand from bronze mirrors donated by the women who served at the entrance of the Tabernacle.
  - type: note
    content: Hebrew Tent of Meeting; also in 38:30.
  - type: heading
    content: Building the Courtyard
  '9':
  - type: text
    content: Then Bezalel made the courtyard, which was enclosed with curtains made of finely woven linen. On the south side the curtains were 150 feet long.
  - type: note
    content: Hebrew 100 cubits [46 meters]; also in 38:11.
  - type: text
    content: ' '
