document_id: ACT.23,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Gazing intently at the high council,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sanhedrin; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 23:6, 15, 20, 28.
      marker-yv: yv-n
    - type: text
      text: ' Paul began: “Brothers, I have always lived before God with a clear conscience!”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: As the conflict grew more violent, the commander was afraid they would tear Paul apart. So he ordered his soldiers to go and rescue him by force and take him back to the fortress.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'That night the Lord appeared to Paul and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Be encouraged, Paul. Just as you have been a witness to me here in Jerusalem, you must preach the Good News in Rome as well.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Plan to Kill Paul
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The next morning a group of Jews
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Jews.
      marker-yv: yv-n
    - type: text
      text: ' got together and bound themselves with an oath not to eat or drink until they had killed Paul. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'There were more than forty of them in the conspiracy. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'They went to the leading priests and elders and told them, “We have bound ourselves with an oath to eat nothing until we have killed Paul. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: So you and the high council should ask the commander to bring Paul back to the council again. Pretend you want to examine his case more fully. We will kill him on the way.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But Paul’s nephew—his sister’s son—heard of their plan and went to the fortress and told Paul. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Paul called for one of the Roman officers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'centurions; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 23:23.
      marker-yv: yv-n
    - type: text
      text: ' and said, “Take this young man to the commander. He has something important to tell him.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: So the officer did, explaining, “Paul, the prisoner, called me over and asked me to bring this young man to you because he has something to tell you.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The commander took his hand, led him aside, and asked, “What is it you want to tell me?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Instantly Ananias the high priest commanded those close to Paul to slap him on the mouth. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Paul’s nephew told him, “Some Jews are going to ask you to bring Paul before the high council tomorrow, pretending they want to get some more information. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: But don’t do it! There are more than forty men hiding along the way ready to ambush him. They have vowed not to eat or drink anything until they have killed him. They are ready now, just waiting for your consent.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Don’t let anyone know you told me this,” the commander warned the young man.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Is Sent to Caesarea
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Then the commander called two of his officers and ordered, “Get 200 soldiers ready to leave for Caesarea at nine o’clock tonight. Also take 200 spearmen and 70 mounted troops. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Provide horses for Paul to ride, and get him safely to Governor Felix.” '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then he wrote this letter to the governor:'
  '26':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“From Claudius Lysias, to his Excellency, Governor Felix: Greetings!'
  '27':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“This man was seized by some Jews, and they were about to kill him when I arrived with the troops. When I learned that he was a Roman citizen, I removed him to safety. '
  '28':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Then I took him to their high council to try to learn the basis of the accusations against him. '
  '29':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'I soon discovered the charge was something regarding their religious law—certainly nothing worthy of imprisonment or death. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But Paul said to him, “God will slap you, you corrupt hypocrite!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: you whitewashed wall.
      marker-yv: yv-n
    - type: text
      text: ' What kind of judge are you to break the law yourself by ordering me struck like that?”'
  '30':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: But when I was informed of a plot to kill him, I immediately sent him on to you. I have told his accusers to bring their charges before you.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'So that night, as ordered, the soldiers took Paul as far as Antipatris. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'They returned to the fortress the next morning, while the mounted troops took him on to Caesarea. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'When they arrived in Caesarea, they presented Paul and the letter to Governor Felix. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: He read it and then asked Paul what province he was from. “Cilicia,” Paul answered.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: “I will hear your case myself when your accusers arrive,” the governor told him. Then the governor ordered him kept in the prison at Herod’s headquarters.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Herod’s Praetorium.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Those standing near Paul said to him, “Do you dare to insult God’s high priest?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “I’m sorry, brothers. I didn’t realize he was the high priest,” Paul replied, “for the Scriptures say, ‘You must not speak evil of any of your rulers.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exod 22:28.
      marker-yv: yv-n
    - type: text
      text: ”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Paul realized that some members of the high council were Sadducees and some were Pharisees, so he shouted, “Brothers, I am a Pharisee, as were my ancestors! And I am on trial because my hope is in the resurrection of the dead!”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'This divided the council—the Pharisees against the Sadducees— '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'for the Sadducees say there is no resurrection or angels or spirits, but the Pharisees believe in all of these. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So there was a great uproar. Some of the teachers of religious law who were Pharisees jumped up and began to argue forcefully. “We see nothing wrong with him,” they shouted. “Perhaps a spirit or an angel spoke to him.” '
