document_id: PSA.15,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David.
  - type: text
    content: 'Who may worship in your sanctuary, '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: Who may enter your presence on your holy hill?
  '2':
  - type: text
    content: Those who lead blameless lives and do what is right,
  - type: text
    content: speaking the truth from sincere hearts.
  '3':
  - type: text
    content: Those who refuse to gossip
  - type: text
    content: or harm their neighbors
  - type: text
    content: or speak evil of their friends.
  '4':
  - type: text
    content: Those who despise flagrant sinners,
  - type: text
    content: 'and honor the faithful followers of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and keep their promises even when it hurts.
  '5':
  - type: text
    content: Those who lend money without charging interest,
  - type: text
    content: and who cannot be bribed to lie about the innocent.
  - type: text
    content: Such people will stand firm forever.
