document_id: PSA.15
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Who may worship in your sanctuary, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who may enter your presence on your holy hill?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Those who lead blameless lives and do what is right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: speaking the truth from sincere hearts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Those who refuse to gossip
- type: usfm
  marker: q2
  children:
  - type: text
    text: or harm their neighbors
- type: usfm
  marker: q2
  children:
  - type: text
    text: or speak evil of their friends.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Those who despise flagrant sinners,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and honor the faithful followers of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and keep their promises even when it hurts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Those who lend money without charging interest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and who cannot be bribed to lie about the innocent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Such people will stand firm forever.
