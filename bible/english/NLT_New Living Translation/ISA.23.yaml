document_id: ISA.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message about Tyre
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This message came to me concerning Tyre:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wail, you trading ships of Tarshish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the harbor and houses of Tyre are gone!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The rumors you heard in Cyprus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Kittim; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 23:12.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: are all true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mourn in silence, you people of the coast
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you merchants of Sidon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your traders crossed the sea,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Dead Sea Scrolls and Greek version; Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Those who have gone over the sea have filled you.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: sailing over deep waters.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They brought you grain from Egypt
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'from Shihor, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a branch of the Nile River.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and harvests from along the Nile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You were the marketplace of the world.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But now you are put to shame, city of Sidon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for Tyre, the fortress of the sea, says,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'for the god of the sea says; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: for the sea, the fortress of the sea, says.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Now I am childless;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have no sons or daughters.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: When Egypt hears the news about Tyre,
- type: usfm
  marker: q2
  children:
  - type: text
    text: there will be great sorrow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Send word now to Tarshish!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wail, you people who live in distant lands!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Is this silent ruin all that is left of your once joyous city?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What a long history was yours!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Think of all the colonists you sent to distant places.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Who has brought this disaster on Tyre,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that great creator of kingdoms?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her traders were all princes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: her merchants were nobles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies has done it'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to destroy your pride
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring low all earth’s nobility.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Come, people of Tarshish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sweep over the land like the flooding Nile,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for Tyre is defenseless.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew in this verse is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' held out his hand over the sea'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shook the kingdoms of the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has spoken out against Phoenicia,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Canaan.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: ordering that her fortresses be destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He says, “Never again will you rejoice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O daughter of Sidon, for you have been crushed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even if you flee to Cyprus,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will find no rest.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Look at the land of Babylonia
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Chaldea.
    marker-yv: yv-n
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: the people of that land are gone!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Assyrians have handed Babylon over
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the wild animals of the desert.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have built siege ramps against its walls,
- type: usfm
  marker: q2
  children:
  - type: text
    text: torn down its palaces,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and turned it to a heap of rubble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Wail, you ships of Tarshish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your harbor is destroyed!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For seventy years, the length of a king’s life, Tyre will be forgotten. But then the city will come back to life as in the song about the prostitute:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Take a harp and walk the streets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you forgotten harlot.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make sweet melody and sing your songs
- type: usfm
  marker: q2
  children:
  - type: text
    text: so you will be remembered again.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Yes, after seventy years the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will revive Tyre. But she will be no different than she was before. She will again be a prostitute to all kingdoms around the world. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But in the end her profits will be given to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. Her wealth will not be hoarded but will provide good food and fine clothing for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s priests.
