document_id: ISA.23,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Tyre
  - type: text
    content: 'This message came to me concerning Tyre:'
  - type: text
    content: Wail, you trading ships of Tarshish,
  - type: text
    content: for the harbor and houses of Tyre are gone!
  - type: text
    content: The rumors you heard in Cyprus
  - type: note
    content: Hebrew Kittim; also in 23:12.
  - type: text
    content: are all true.
  '10':
  - type: text
    content: Come, people of Tarshish,
  - type: text
    content: sweep over the land like the flooding Nile,
  - type: text
    content: for Tyre is defenseless.
  - type: note
    content: The meaning of the Hebrew in this verse is uncertain.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' held out his hand over the sea'
  - type: text
    content: and shook the kingdoms of the earth.
  - type: text
    content: He has spoken out against Phoenicia,
  - type: note
    content: Hebrew Canaan.
  - type: text
    content: ordering that her fortresses be destroyed.
  '12':
  - type: text
    content: He says, “Never again will you rejoice,
  - type: text
    content: O daughter of Sidon, for you have been crushed.
  - type: text
    content: Even if you flee to Cyprus,
  - type: text
    content: you will find no rest.”
  '13':
  - type: text
    content: Look at the land of Babylonia
  - type: note
    content: Or Chaldea.
  - type: text
    content: —
  - type: text
    content: the people of that land are gone!
  - type: text
    content: The Assyrians have handed Babylon over
  - type: text
    content: to the wild animals of the desert.
  - type: text
    content: They have built siege ramps against its walls,
  - type: text
    content: torn down its palaces,
  - type: text
    content: and turned it to a heap of rubble.
  '14':
  - type: text
    content: Wail, you ships of Tarshish,
  - type: text
    content: for your harbor is destroyed!
  '15':
  - type: text
    content: 'For seventy years, the length of a king’s life, Tyre will be forgotten. But then the city will come back to life as in the song about the prostitute:'
  '16':
  - type: text
    content: Take a harp and walk the streets,
  - type: text
    content: you forgotten harlot.
  - type: text
    content: Make sweet melody and sing your songs
  - type: text
    content: so you will be remembered again.
  '17':
  - type: text
    content: 'Yes, after seventy years the '
  - type: text
    content: Lord
  - type: text
    content: ' will revive Tyre. But she will be no different than she was before. She will again be a prostitute to all kingdoms around the world. '
  '18':
  - type: text
    content: 'But in the end her profits will be given to the '
  - type: text
    content: Lord
  - type: text
    content: '. Her wealth will not be hoarded but will provide good food and fine clothing for the '
  - type: text
    content: Lord
  - type: text
    content: ’s priests.
  '2':
  - type: text
    content: Mourn in silence, you people of the coast
  - type: text
    content: and you merchants of Sidon.
  - type: text
    content: Your traders crossed the sea,
  - type: note
    content: As in Dead Sea Scrolls and Greek version; Masoretic Text reads Those who have gone over the sea have filled you.
  '3':
  - type: text
    content: sailing over deep waters.
  - type: text
    content: They brought you grain from Egypt
  - type: note
    content: Hebrew from Shihor, a branch of the Nile River.
  - type: text
    content: and harvests from along the Nile.
  - type: text
    content: You were the marketplace of the world.
  '4':
  - type: text
    content: But now you are put to shame, city of Sidon,
  - type: text
    content: for Tyre, the fortress of the sea, says,
  - type: note
    content: Or for the god of the sea says; Hebrew reads for the sea, the fortress of the sea, says.
  - type: text
    content: “Now I am childless;
  - type: text
    content: I have no sons or daughters.”
  '5':
  - type: text
    content: When Egypt hears the news about Tyre,
  - type: text
    content: there will be great sorrow.
  '6':
  - type: text
    content: Send word now to Tarshish!
  - type: text
    content: Wail, you people who live in distant lands!
  '7':
  - type: text
    content: Is this silent ruin all that is left of your once joyous city?
  - type: text
    content: What a long history was yours!
  - type: text
    content: Think of all the colonists you sent to distant places.
  '8':
  - type: text
    content: Who has brought this disaster on Tyre,
  - type: text
    content: that great creator of kingdoms?
  - type: text
    content: Her traders were all princes,
  - type: text
    content: her merchants were nobles.
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies has done it'
  - type: text
    content: to destroy your pride
  - type: text
    content: and bring low all earth’s nobility.
