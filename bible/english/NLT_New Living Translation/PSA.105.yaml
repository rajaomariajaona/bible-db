document_id: PSA.105
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Give thanks to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and proclaim his greatness.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let the whole world know what he has done.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sing to him; yes, sing his praises.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tell everyone about his wonderful deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Exult in his holy name;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'rejoice, you who worship the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Search for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and for his strength;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: continually seek him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Remember the wonders he has performed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his miracles, and the rulings he has given,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: you children of his servant Abraham,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you descendants of Jacob, his chosen ones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: His justice is seen throughout the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He always stands by his covenant—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the commitment he made to a thousand generations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: This is the covenant he made with Abraham
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the oath he swore to Isaac.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He confirmed it to Jacob as a decree,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and to the people of Israel as a never-ending covenant:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “I will give you the land of Canaan
- type: usfm
  marker: q2
  children:
  - type: text
    text: as your special possession.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He said this when they were few in number,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a tiny group of strangers in Canaan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They wandered from nation to nation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from one kingdom to another.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Yet he did not let anyone oppress them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'He warned kings on their behalf:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Do not touch my chosen people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do not hurt my prophets.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He called for a famine on the land of Canaan,
- type: usfm
  marker: q2
  children:
  - type: text
    text: cutting off its food supply.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then he sent someone to Egypt ahead of them—
- type: usfm
  marker: q2
  children:
  - type: text
    text: Joseph, who was sold as a slave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They bruised his feet with fetters
- type: usfm
  marker: q2
  children:
  - type: text
    text: and placed his neck in an iron collar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Until the time came to fulfill his dreams,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: his word.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' tested Joseph’s character.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then Pharaoh sent for him and set him free;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the ruler of the nation opened his prison door.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Joseph was put in charge of all the king’s household;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he became ruler over all the king’s possessions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: He could instruct
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'bind '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: imprison.
    marker-yv: yv-n
  - type: text
    text: ' the king’s aides as he pleased'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and teach the king’s advisers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then Israel arrived in Egypt;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jacob lived as a foreigner in the land of Ham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' multiplied the people of Israel'
- type: usfm
  marker: q2
  children:
  - type: text
    text: until they became too mighty for their enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then he turned the Egyptians against the Israelites,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and they plotted against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s servants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sent his servant Moses,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: along with Aaron, whom he had chosen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: They performed miraculous signs among the Egyptians,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wonders in the land of Ham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' blanketed Egypt in darkness,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they had defied
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: had not defied.
    marker-yv: yv-n
  - type: text
    text: ' his commands to let his people go.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: He turned their water into blood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: poisoning all the fish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Then frogs overran the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and even invaded the king’s bedrooms.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke, flies descended on the Egyptians,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gnats swarmed across Egypt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: He sent them hail instead of rain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lightning flashed over the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: He ruined their grapevines and fig trees
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shattered all the trees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: He spoke, and hordes of locusts came—
- type: usfm
  marker: q2
  children:
  - type: text
    text: young locusts beyond number.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: They ate up everything green in the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: destroying all the crops in their fields.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Then he killed the oldest son in each Egyptian home,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the pride and joy of each family.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' brought his people out of Egypt, loaded with silver and gold;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and not one among the tribes of Israel even stumbled.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Egypt was glad when they were gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they feared them greatly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spread a cloud above them as a covering'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gave them a great fire to light the darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: They asked for meat, and he sent them quail;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he satisfied their hunger with manna—bread from heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: He split open a rock, and water gushed out
- type: usfm
  marker: q2
  children:
  - type: text
    text: to form a river through the dry wasteland.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: For he remembered his sacred promise
- type: usfm
  marker: q2
  children:
  - type: text
    text: to his servant Abraham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: So he brought his people out of Egypt with joy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his chosen ones with rejoicing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: He gave his people the lands of pagan nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they harvested crops that others had planted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: All this happened so they would follow his decrees
- type: usfm
  marker: q2
  children:
  - type: text
    text: and obey his instructions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
