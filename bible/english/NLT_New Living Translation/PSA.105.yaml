document_id: PSA.105,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and proclaim his greatness.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the whole world know what he has done.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He confirmed it to Jacob as a decree,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and to the people of Israel as a never-ending covenant:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will give you the land of Canaan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as your special possession.”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He said this when they were few in number,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a tiny group of strangers in Canaan.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They wandered from nation to nation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from one kingdom to another.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet he did not let anyone oppress them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He warned kings on their behalf:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not touch my chosen people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do not hurt my prophets.”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He called for a famine on the land of Canaan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cutting off its food supply.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he sent someone to Egypt ahead of them—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Joseph, who was sold as a slave.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They bruised his feet with fetters
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and placed his neck in an iron collar.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until the time came to fulfill his dreams,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '105:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his word.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' tested Joseph’s character.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing to him; yes, sing his praises.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tell everyone about his wonderful deeds.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then Pharaoh sent for him and set him free;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the ruler of the nation opened his prison door.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Joseph was put in charge of all the king’s household;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he became ruler over all the king’s possessions.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He could instruct
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '105:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'bind '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: imprison.
      marker-yv: yv-n
    - type: text
      text: ' the king’s aides as he pleased'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and teach the king’s advisers.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then Israel arrived in Egypt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jacob lived as a foreigner in the land of Ham.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' multiplied the people of Israel'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until they became too mighty for their enemies.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he turned the Egyptians against the Israelites,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and they plotted against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s servants.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent his servant Moses,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: along with Aaron, whom he had chosen.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They performed miraculous signs among the Egyptians,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wonders in the land of Ham.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' blanketed Egypt in darkness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they had defied
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '105:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek and Syriac versions; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: had not defied.
      marker-yv: yv-n
    - type: text
      text: ' his commands to let his people go.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He turned their water into blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: poisoning all the fish.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Exult in his holy name;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'rejoice, you who worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then frogs overran the land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and even invaded the king’s bedrooms.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke, flies descended on the Egyptians,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gnats swarmed across Egypt.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sent them hail instead of rain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lightning flashed over the land.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He ruined their grapevines and fig trees
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shattered all the trees.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He spoke, and hordes of locusts came—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: young locusts beyond number.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They ate up everything green in the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: destroying all the crops in their fields.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he killed the oldest son in each Egyptian home,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the pride and joy of each family.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought his people out of Egypt, loaded with silver and gold;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not one among the tribes of Israel even stumbled.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Egypt was glad when they were gone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they feared them greatly.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spread a cloud above them as a covering'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gave them a great fire to light the darkness.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Search for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and for his strength;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: continually seek him.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They asked for meat, and he sent them quail;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he satisfied their hunger with manna—bread from heaven.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He split open a rock, and water gushed out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to form a river through the dry wasteland.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he remembered his sacred promise
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to his servant Abraham.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So he brought his people out of Egypt with joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his chosen ones with rejoicing.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gave his people the lands of pagan nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they harvested crops that others had planted.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All this happened so they would follow his decrees
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and obey his instructions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember the wonders he has performed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his miracles, and the rulings he has given,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you children of his servant Abraham,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you descendants of Jacob, his chosen ones.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His justice is seen throughout the land.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He always stands by his covenant—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the commitment he made to a thousand generations.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is the covenant he made with Abraham
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the oath he swore to Isaac.
