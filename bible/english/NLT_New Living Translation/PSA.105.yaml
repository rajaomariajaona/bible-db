document_id: PSA.105,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ' and proclaim his greatness.'
  - type: text
    content: Let the whole world know what he has done.
  '10':
  - type: text
    content: He confirmed it to Jacob as a decree,
  - type: text
    content: 'and to the people of Israel as a never-ending covenant:'
  '11':
  - type: text
    content: “I will give you the land of Canaan
  - type: text
    content: as your special possession.”
  '12':
  - type: text
    content: He said this when they were few in number,
  - type: text
    content: a tiny group of strangers in Canaan.
  '13':
  - type: text
    content: They wandered from nation to nation,
  - type: text
    content: from one kingdom to another.
  '14':
  - type: text
    content: Yet he did not let anyone oppress them.
  - type: text
    content: 'He warned kings on their behalf:'
  '15':
  - type: text
    content: “Do not touch my chosen people,
  - type: text
    content: and do not hurt my prophets.”
  '16':
  - type: text
    content: He called for a famine on the land of Canaan,
  - type: text
    content: cutting off its food supply.
  '17':
  - type: text
    content: Then he sent someone to Egypt ahead of them—
  - type: text
    content: Joseph, who was sold as a slave.
  '18':
  - type: text
    content: They bruised his feet with fetters
  - type: text
    content: and placed his neck in an iron collar.
  '19':
  - type: text
    content: Until the time came to fulfill his dreams,
  - type: note
    content: Hebrew his word.
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' tested Joseph’s character.'
  '2':
  - type: text
    content: Sing to him; yes, sing his praises.
  - type: text
    content: Tell everyone about his wonderful deeds.
  '20':
  - type: text
    content: Then Pharaoh sent for him and set him free;
  - type: text
    content: the ruler of the nation opened his prison door.
  '21':
  - type: text
    content: Joseph was put in charge of all the king’s household;
  - type: text
    content: he became ruler over all the king’s possessions.
  '22':
  - type: text
    content: He could instruct
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads bind or imprison.
  - type: text
    content: ' the king’s aides as he pleased'
  - type: text
    content: and teach the king’s advisers.
  '23':
  - type: text
    content: Then Israel arrived in Egypt;
  - type: text
    content: Jacob lived as a foreigner in the land of Ham.
  '24':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' multiplied the people of Israel'
  - type: text
    content: until they became too mighty for their enemies.
  '25':
  - type: text
    content: Then he turned the Egyptians against the Israelites,
  - type: text
    content: 'and they plotted against the '
  - type: text
    content: Lord
  - type: text
    content: ’s servants.
  '26':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' sent his servant Moses,'
  - type: text
    content: along with Aaron, whom he had chosen.
  '27':
  - type: text
    content: They performed miraculous signs among the Egyptians,
  - type: text
    content: and wonders in the land of Ham.
  '28':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' blanketed Egypt in darkness,'
  - type: text
    content: for they had defied
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads had not defied.
  - type: text
    content: ' his commands to let his people go.'
  '29':
  - type: text
    content: He turned their water into blood,
  - type: text
    content: poisoning all the fish.
  '3':
  - type: text
    content: Exult in his holy name;
  - type: text
    content: 'rejoice, you who worship the '
  - type: text
    content: Lord
  - type: text
    content: .
  '30':
  - type: text
    content: Then frogs overran the land
  - type: text
    content: and even invaded the king’s bedrooms.
  '31':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke, flies descended on the Egyptians,'
  - type: text
    content: and gnats swarmed across Egypt.
  '32':
  - type: text
    content: He sent them hail instead of rain,
  - type: text
    content: and lightning flashed over the land.
  '33':
  - type: text
    content: He ruined their grapevines and fig trees
  - type: text
    content: and shattered all the trees.
  '34':
  - type: text
    content: He spoke, and hordes of locusts came—
  - type: text
    content: young locusts beyond number.
  '35':
  - type: text
    content: They ate up everything green in the land,
  - type: text
    content: destroying all the crops in their fields.
  '36':
  - type: text
    content: Then he killed the oldest son in each Egyptian home,
  - type: text
    content: the pride and joy of each family.
  '37':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' brought his people out of Egypt, loaded with silver and gold;'
  - type: text
    content: and not one among the tribes of Israel even stumbled.
  '38':
  - type: text
    content: Egypt was glad when they were gone,
  - type: text
    content: for they feared them greatly.
  '39':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spread a cloud above them as a covering'
  - type: text
    content: and gave them a great fire to light the darkness.
  '4':
  - type: text
    content: 'Search for the '
  - type: text
    content: Lord
  - type: text
    content: ' and for his strength;'
  - type: text
    content: continually seek him.
  '40':
  - type: text
    content: They asked for meat, and he sent them quail;
  - type: text
    content: he satisfied their hunger with manna—bread from heaven.
  '41':
  - type: text
    content: He split open a rock, and water gushed out
  - type: text
    content: to form a river through the dry wasteland.
  '42':
  - type: text
    content: For he remembered his sacred promise
  - type: text
    content: to his servant Abraham.
  '43':
  - type: text
    content: So he brought his people out of Egypt with joy,
  - type: text
    content: his chosen ones with rejoicing.
  '44':
  - type: text
    content: He gave his people the lands of pagan nations,
  - type: text
    content: and they harvested crops that others had planted.
  '45':
  - type: text
    content: All this happened so they would follow his decrees
  - type: text
    content: and obey his instructions.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '5':
  - type: text
    content: Remember the wonders he has performed,
  - type: text
    content: his miracles, and the rulings he has given,
  '6':
  - type: text
    content: you children of his servant Abraham,
  - type: text
    content: you descendants of Jacob, his chosen ones.
  '7':
  - type: text
    content: 'He is the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.'
  - type: text
    content: His justice is seen throughout the land.
  '8':
  - type: text
    content: He always stands by his covenant—
  - type: text
    content: the commitment he made to a thousand generations.
  '9':
  - type: text
    content: This is the covenant he made with Abraham
  - type: text
    content: and the oath he swore to Isaac.
