document_id: PSA.74
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '74:TITLE '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'maskil. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may be a literary or musical term.
    marker-yv: yv-n
  - type: text
    text: ' of Asaph.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God, why have you rejected us so long?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why is your anger so intense against the sheep of your own pasture?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Remember that we are the people you chose long ago,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the tribe you redeemed as your own special possession!
- type: usfm
  marker: q2
  children:
  - type: text
    text: And remember Jerusalem,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '74:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mount Zion.
    marker-yv: yv-n
  - type: text
    text: ' your home here on earth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Walk through the awful ruins of the city;
- type: usfm
  marker: q2
  children:
  - type: text
    text: see how the enemy has destroyed your sanctuary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: There your enemies shouted their victorious battle cries;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there they set up their battle standards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They swung their axes
- type: usfm
  marker: q2
  children:
  - type: text
    text: like woodcutters in a forest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: With axes and picks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they smashed the carved paneling.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They burned your sanctuary to the ground.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They defiled the place that bears your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then they thought, “Let’s destroy everything!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: So they burned down all the places where God was worshiped.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: We no longer see your miraculous signs.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All the prophets are gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one can tell us when it will end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: How long, O God, will you allow our enemies to insult you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will you let them dishonor your name forever?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Why do you hold back your strong right hand?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Unleash your powerful fist and destroy them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You, O God, are my king from ages past,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bringing salvation to the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You split the sea by your strength
- type: usfm
  marker: q2
  children:
  - type: text
    text: and smashed the heads of the sea monsters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You crushed the heads of Leviathan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '74:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The identification of Leviathan is disputed, ranging from an earthly creature to a mythical sea monster in ancient literature.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let the desert animals eat him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: You caused the springs and streams to gush forth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you dried up rivers that never run dry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Both day and night belong to you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you made the starlight
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '74:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'moon; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: light.
    marker-yv: yv-n
  - type: text
    text: ' and the sun.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: You set the boundaries of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you made both summer and winter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'See how these enemies insult you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: A foolish nation has dishonored your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Don’t let these wild beasts destroy your turtledoves.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t forget your suffering people forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Remember your covenant promises,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the land is full of darkness and violence!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Don’t let the downtrodden be humiliated again.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Instead, let the poor and needy praise your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Arise, O God, and defend your cause.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Remember how these fools insult you all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Don’t overlook what your enemies have said
- type: usfm
  marker: q2
  children:
  - type: text
    text: or their growing uproar.
