document_id: PSA.74,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm
  - type: note
    content: Hebrew maskil. This may be a literary or musical term.
  - type: text
    content: ' of Asaph.'
  - type: text
    content: O God, why have you rejected us so long?
  - type: text
    content: Why is your anger so intense against the sheep of your own pasture?
  '10':
  - type: text
    content: How long, O God, will you allow our enemies to insult you?
  - type: text
    content: Will you let them dishonor your name forever?
  '11':
  - type: text
    content: Why do you hold back your strong right hand?
  - type: text
    content: Unleash your powerful fist and destroy them.
  '12':
  - type: text
    content: You, O God, are my king from ages past,
  - type: text
    content: bringing salvation to the earth.
  '13':
  - type: text
    content: You split the sea by your strength
  - type: text
    content: and smashed the heads of the sea monsters.
  '14':
  - type: text
    content: You crushed the heads of Leviathan
  - type: note
    content: The identification of Leviathan is disputed, ranging from an earthly creature to a mythical sea monster in ancient literature.
  - type: text
    content: and let the desert animals eat him.
  '15':
  - type: text
    content: You caused the springs and streams to gush forth,
  - type: text
    content: and you dried up rivers that never run dry.
  '16':
  - type: text
    content: Both day and night belong to you;
  - type: text
    content: you made the starlight
  - type: note
    content: Or moon; Hebrew reads light.
  - type: text
    content: ' and the sun.'
  '17':
  - type: text
    content: You set the boundaries of the earth,
  - type: text
    content: and you made both summer and winter.
  '18':
  - type: text
    content: 'See how these enemies insult you, '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: A foolish nation has dishonored your name.
  '19':
  - type: text
    content: Don’t let these wild beasts destroy your turtledoves.
  - type: text
    content: Don’t forget your suffering people forever.
  '2':
  - type: text
    content: Remember that we are the people you chose long ago,
  - type: text
    content: the tribe you redeemed as your own special possession!
  - type: text
    content: And remember Jerusalem,
  - type: note
    content: Hebrew Mount Zion.
  - type: text
    content: ' your home here on earth.'
  '20':
  - type: text
    content: Remember your covenant promises,
  - type: text
    content: for the land is full of darkness and violence!
  '21':
  - type: text
    content: Don’t let the downtrodden be humiliated again.
  - type: text
    content: Instead, let the poor and needy praise your name.
  '22':
  - type: text
    content: Arise, O God, and defend your cause.
  - type: text
    content: Remember how these fools insult you all day long.
  '23':
  - type: text
    content: Don’t overlook what your enemies have said
  - type: text
    content: or their growing uproar.
  '3':
  - type: text
    content: Walk through the awful ruins of the city;
  - type: text
    content: see how the enemy has destroyed your sanctuary.
  '4':
  - type: text
    content: There your enemies shouted their victorious battle cries;
  - type: text
    content: there they set up their battle standards.
  '5':
  - type: text
    content: They swung their axes
  - type: text
    content: like woodcutters in a forest.
  '6':
  - type: text
    content: With axes and picks,
  - type: text
    content: they smashed the carved paneling.
  '7':
  - type: text
    content: They burned your sanctuary to the ground.
  - type: text
    content: They defiled the place that bears your name.
  '8':
  - type: text
    content: Then they thought, “Let’s destroy everything!”
  - type: text
    content: So they burned down all the places where God was worshiped.
  '9':
  - type: text
    content: We no longer see your miraculous signs.
  - type: text
    content: All the prophets are gone,
  - type: text
    content: and no one can tell us when it will end.
