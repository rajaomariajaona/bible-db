document_id: PSA.74,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74:TITLE '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maskil. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may be a literary or musical term.
      marker-yv: yv-n
    - type: text
      text: ' of Asaph.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, why have you rejected us so long?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why is your anger so intense against the sheep of your own pasture?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long, O God, will you allow our enemies to insult you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you let them dishonor your name forever?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do you hold back your strong right hand?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Unleash your powerful fist and destroy them.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You, O God, are my king from ages past,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bringing salvation to the earth.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You split the sea by your strength
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and smashed the heads of the sea monsters.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You crushed the heads of Leviathan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The identification of Leviathan is disputed, ranging from an earthly creature to a mythical sea monster in ancient literature.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let the desert animals eat him.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You caused the springs and streams to gush forth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you dried up rivers that never run dry.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Both day and night belong to you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you made the starlight
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'moon; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: light.
      marker-yv: yv-n
    - type: text
      text: ' and the sun.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You set the boundaries of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you made both summer and winter.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'See how these enemies insult you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A foolish nation has dishonored your name.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let these wild beasts destroy your turtledoves.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t forget your suffering people forever.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember that we are the people you chose long ago,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the tribe you redeemed as your own special possession!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And remember Jerusalem,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mount Zion.
      marker-yv: yv-n
    - type: text
      text: ' your home here on earth.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember your covenant promises,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the land is full of darkness and violence!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let the downtrodden be humiliated again.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Instead, let the poor and needy praise your name.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arise, O God, and defend your cause.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Remember how these fools insult you all day long.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t overlook what your enemies have said
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or their growing uproar.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Walk through the awful ruins of the city;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: see how the enemy has destroyed your sanctuary.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There your enemies shouted their victorious battle cries;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there they set up their battle standards.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They swung their axes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like woodcutters in a forest.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With axes and picks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they smashed the carved paneling.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They burned your sanctuary to the ground.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They defiled the place that bears your name.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they thought, “Let’s destroy everything!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So they burned down all the places where God was worshiped.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We no longer see your miraculous signs.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the prophets are gone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one can tell us when it will end.
