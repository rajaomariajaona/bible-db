document_id: LUK.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Birth of Jesus
  - type: text
    content: 'At that time the Roman emperor, Augustus, decreed that a census should be taken throughout the Roman Empire. '
  '10':
  - type: text
    content: 'but the angel reassured them. “Don’t be afraid!” he said. “I bring you good news that will bring great joy to all people. '
  '11':
  - type: text
    content: 'The Savior—yes, the Messiah, the Lord—has been born today in Bethlehem, the city of David! '
  '12':
  - type: text
    content: 'And you will recognize him by this sign: You will find a baby wrapped snugly in strips of cloth, lying in a manger.”'
  '13':
  - type: text
    content: Suddenly, the angel was joined by a vast host of others—the armies of heaven—praising God and saying,
  '14':
  - type: text
    content: “Glory to God in highest heaven,
  - type: text
    content: and peace on earth to those with whom God is pleased.”
  '15':
  - type: text
    content: When the angels had returned to heaven, the shepherds said to each other, “Let’s go to Bethlehem! Let’s see this thing that has happened, which the Lord has told us about.”
  '16':
  - type: text
    content: 'They hurried to the village and found Mary and Joseph. And there was the baby, lying in the manger. '
  '17':
  - type: text
    content: 'After seeing him, the shepherds told everyone what had happened and what the angel had said to them about this child. '
  '18':
  - type: text
    content: 'All who heard the shepherds’ story were astonished, '
  '19':
  - type: text
    content: 'but Mary kept all these things in her heart and thought about them often. '
  '2':
  - type: text
    content: '(This was the first census taken when Quirinius was governor of Syria.) '
  '20':
  - type: text
    content: The shepherds went back to their flocks, glorifying and praising God for all they had heard and seen. It was just as the angel had told them.
  - type: heading
    content: Jesus Is Presented in the Temple
  '21':
  - type: text
    content: Eight days later, when the baby was circumcised, he was named Jesus, the name given him by the angel even before he was conceived.
  '22':
  - type: text
    content: 'Then it was time for their purification offering, as required by the law of Moses after the birth of a child; so his parents took him to Jerusalem to present him to the Lord. '
  '23':
  - type: text
    content: 'The law of the Lord says, “If a woman’s first child is a boy, he must be dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: note
    content: Exod 13:2.
  - type: text
    content: ' '
  '24':
  - type: text
    content: So they offered the sacrifice required in the law of the Lord—“either a pair of turtledoves or two young pigeons.”
  - type: note
    content: Lev 12:8.
  - type: heading
    content: The Prophecy of Simeon
  '25':
  - type: text
    content: 'At that time there was a man in Jerusalem named Simeon. He was righteous and devout and was eagerly waiting for the Messiah to come and rescue Israel. The Holy Spirit was upon him '
  '26':
  - type: text
    content: 'and had revealed to him that he would not die until he had seen the Lord’s Messiah. '
  '27':
  - type: text
    content: 'That day the Spirit led him to the Temple. So when Mary and Joseph came to present the baby Jesus to the Lord as the law required, '
  '28':
  - type: text
    content: Simeon was there. He took the child in his arms and praised God, saying,
  '29':
  - type: text
    content: “Sovereign Lord, now let your servant die in peace,
  - type: text
    content: as you have promised.
  '3':
  - type: text
    content: 'All returned to their own ancestral towns to register for this census. '
  '30':
  - type: text
    content: I have seen your salvation,
  '31':
  - type: text
    content: which you have prepared for all people.
  '32':
  - type: text
    content: He is a light to reveal God to the nations,
  - type: text
    content: and he is the glory of your people Israel!”
  '33':
  - type: text
    content: 'Jesus’ parents were amazed at what was being said about him. '
  '34':
  - type: text
    content: 'Then Simeon blessed them, and he said to Mary, the baby’s mother, “This child is destined to cause many in Israel to fall, and many others to rise. He has been sent as a sign from God, but many will oppose him. '
  '35':
  - type: text
    content: As a result, the deepest thoughts of many hearts will be revealed. And a sword will pierce your very soul.”
  - type: heading
    content: The Prophecy of Anna
  '36':
  - type: text
    content: 'Anna, a prophet, was also there in the Temple. She was the daughter of Phanuel from the tribe of Asher, and she was very old. Her husband died when they had been married only seven years. '
  '37':
  - type: text
    content: Then she lived as a widow to the age of eighty-four.
  - type: note
    content: Or She had been a widow for eighty-four years.
  - type: text
    content: ' She never left the Temple but stayed there day and night, worshiping God with fasting and prayer. '
  '38':
  - type: text
    content: She came along just as Simeon was talking with Mary and Joseph, and she began praising God. She talked about the child to everyone who had been waiting expectantly for God to rescue Jerusalem.
  '39':
  - type: text
    content: 'When Jesus’ parents had fulfilled all the requirements of the law of the Lord, they returned home to Nazareth in Galilee. '
  '4':
  - type: text
    content: 'And because Joseph was a descendant of King David, he had to go to Bethlehem in Judea, David’s ancient home. He traveled there from the village of Nazareth in Galilee. '
  '40':
  - type: text
    content: There the child grew up healthy and strong. He was filled with wisdom, and God’s favor was on him.
  - type: heading
    content: Jesus Speaks with the Teachers
  '41':
  - type: text
    content: 'Every year Jesus’ parents went to Jerusalem for the Passover festival. '
  '42':
  - type: text
    content: 'When Jesus was twelve years old, they attended the festival as usual. '
  '43':
  - type: text
    content: 'After the celebration was over, they started home to Nazareth, but Jesus stayed behind in Jerusalem. His parents didn’t miss him at first, '
  '44':
  - type: text
    content: because they assumed he was among the other travelers. But when he didn’t show up that evening, they started looking for him among their relatives and friends.
  '45':
  - type: text
    content: 'When they couldn’t find him, they went back to Jerusalem to search for him there. '
  '46':
  - type: text
    content: 'Three days later they finally discovered him in the Temple, sitting among the religious teachers, listening to them and asking questions. '
  '47':
  - type: text
    content: All who heard him were amazed at his understanding and his answers.
  '48':
  - type: text
    content: His parents didn’t know what to think. “Son,” his mother said to him, “why have you done this to us? Your father and I have been frantic, searching for you everywhere.”
  '49':
  - type: text
    content: ' '
  - type: text
    content: '“But why did you need to search?” '
  - type: text
    content: 'he asked. '
  - type: text
    content: “Didn’t you know that I must be in my Father’s house?”
  - type: note
    content: Or “Didn’t you realize that I should be involved with my Father’s affairs?”
  - type: text
    content: ' '
  '5':
  - type: text
    content: He took with him Mary, to whom he was engaged, who was now expecting a child.
  '50':
  - type: text
    content: But they didn’t understand what he meant.
  '51':
  - type: text
    content: Then he returned to Nazareth with them and was obedient to them. And his mother stored all these things in her heart.
  '52':
  - type: text
    content: Jesus grew in wisdom and in stature and in favor with God and all the people.
  '6':
  - type: text
    content: 'And while they were there, the time came for her baby to be born. '
  '7':
  - type: text
    content: She gave birth to her firstborn son. She wrapped him snugly in strips of cloth and laid him in a manger, because there was no lodging available for them.
  - type: heading
    content: The Shepherds and Angels
  '8':
  - type: text
    content: 'That night there were shepherds staying in the fields nearby, guarding their flocks of sheep. '
  '9':
  - type: text
    content: 'Suddenly, an angel of the Lord appeared among them, and the radiance of the Lord’s glory surrounded them. They were terrified, '
