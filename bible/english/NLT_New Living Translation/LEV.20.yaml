document_id: LEV.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Punishments for Disobedience
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: “If a man commits adultery with his neighbor’s wife, both the man and the woman who have committed adultery must be put to death.
  '11':
  - type: text
    content: “If a man violates his father by having sex with one of his father’s wives, both the man and the woman must be put to death, for they are guilty of a capital offense.
  '12':
  - type: text
    content: “If a man has sex with his daughter-in-law, both must be put to death. They have committed a perverse act and are guilty of a capital offense.
  '13':
  - type: text
    content: “If a man practices homosexuality, having sex with another man as with a woman, both men have committed a detestable act. They must both be put to death, for they are guilty of a capital offense.
  '14':
  - type: text
    content: “If a man marries both a woman and her mother, he has committed a wicked act. The man and both women must be burned to death to wipe out such wickedness from among you.
  '15':
  - type: text
    content: “If a man has sex with an animal, he must be put to death, and the animal must be killed.
  '16':
  - type: text
    content: “If a woman presents herself to a male animal to have intercourse with it, she and the animal must both be put to death. You must kill both, for they are guilty of a capital offense.
  '17':
  - type: text
    content: “If a man marries his sister, the daughter of either his father or his mother, and they have sexual relations, it is a shameful disgrace. They must be publicly cut off from the community. Since the man has violated his sister, he will be punished for his sin.
  '18':
  - type: text
    content: “If a man has sexual relations with a woman during her menstrual period, both of them must be cut off from the community, for together they have exposed the source of her blood flow.
  '19':
  - type: text
    content: “Do not have sexual relations with your aunt, whether your mother’s sister or your father’s sister. This would dishonor a close relative. Both parties are guilty and will be punished for their sin.
  '2':
  - type: text
    content: “Give the people of Israel these instructions, which apply both to native Israelites and to the foreigners living in Israel.
  - type: text
    content: '“If any of them offer their children as a sacrifice to Molech, they must be put to death. The people of the community must stone them to death. '
  '20':
  - type: text
    content: “If a man has sex with his uncle’s wife, he has violated his uncle. Both the man and woman will be punished for their sin, and they will die childless.
  '21':
  - type: text
    content: “If a man marries his brother’s wife, it is an act of impurity. He has violated his brother, and the guilty couple will remain childless.
  '22':
  - type: text
    content: '“You must keep all my decrees and regulations by putting them into practice; otherwise the land to which I am bringing you as your new home will vomit you out. '
  '23':
  - type: text
    content: 'Do not live according to the customs of the people I am driving out before you. It is because they do these shameful things that I detest them. '
  '24':
  - type: text
    content: 'But I have promised you, ‘You will possess their land because I will give it to you as your possession—a land flowing with milk and honey.’ I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who has set you apart from all other people.'
  '25':
  - type: text
    content: '“You must therefore make a distinction between ceremonially clean and unclean animals, and between clean and unclean birds. You must not defile yourselves by eating any unclean animal or bird or creature that scurries along the ground. I have identified them as being unclean for you. '
  '26':
  - type: text
    content: 'You must be holy because I, the '
  - type: text
    content: Lord
  - type: text
    content: ', am holy. I have set you apart from all other people to be my very own.'
  '27':
  - type: text
    content: “Men and women among you who act as mediums or who consult the spirits of the dead must be put to death by stoning. They are guilty of a capital offense.”
  '3':
  - type: text
    content: 'I myself will turn against them and cut them off from the community, because they have defiled my sanctuary and brought shame on my holy name by offering their children to Molech. '
  '4':
  - type: text
    content: 'And if the people of the community ignore those who offer their children to Molech and refuse to execute them, '
  '5':
  - type: text
    content: I myself will turn against them and their families and will cut them off from the community. This will happen to all who commit spiritual prostitution by worshiping Molech.
  '6':
  - type: text
    content: '“I will also turn against those who commit spiritual prostitution by putting their trust in mediums or in those who consult the spirits of the dead. I will cut them off from the community. '
  '7':
  - type: text
    content: 'So set yourselves apart to be holy, for I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '8':
  - type: text
    content: 'Keep all my decrees by putting them into practice, for I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who makes you holy.'
  '9':
  - type: text
    content: “Anyone who dishonors
  - type: note
    content: Greek version reads Anyone who speaks disrespectfully of. Compare Matt 15:4; Mark 7:10.
  - type: text
    content: ' father or mother must be put to death. Such a person is guilty of a capital offense.'
