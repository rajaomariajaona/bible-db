document_id: LAM.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Hope in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Faithfulness
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I am the one who has seen the afflictions
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that come from the rod of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He has led me into darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shutting out all light.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He has turned his hand against me
- type: usfm
  marker: q2
  children:
  - type: text
    text: again and again, all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He has made my skin and flesh grow old.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has broken my bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He has besieged and surrounded me
- type: usfm
  marker: q2
  children:
  - type: text
    text: with anguish and distress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He has buried me in a dark place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like those long dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He has walled me in, and I cannot escape.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has bound me in heavy chains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And though I cry and shout,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has shut out my prayers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He has blocked my way with a high stone wall;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has made my road crooked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He has hidden like a bear or a lion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: waiting to attack me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He has dragged me off the path and torn me in pieces,
- type: usfm
  marker: q2
  children:
  - type: text
    text: leaving me helpless and devastated.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He has drawn his bow
- type: usfm
  marker: q2
  children:
  - type: text
    text: and made me the target for his arrows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He shot his arrows
- type: usfm
  marker: q2
  children:
  - type: text
    text: deep into my heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: My own people laugh at me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All day long they sing their mocking songs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He has filled me with bitterness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and given me a bitter cup of sorrow to drink.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He has made me chew on gravel.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has rolled me in the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Peace has been stripped away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I have forgotten what prosperity is.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I cry out, “My splendor is gone!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Everything I had hoped for from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is lost!”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The thought of my suffering and homelessness
- type: usfm
  marker: q2
  children:
  - type: text
    text: is bitter beyond words.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: is wormwood and gall.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I will never forget this awful time,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as I grieve over my loss.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Yet I still dare to hope
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'when I remember this:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The faithful love of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' never ends!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Syriac version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' keeps us from destruction.'
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: His mercies never cease.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Great is his faithfulness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his mercies begin afresh each morning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'I say to myself, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is my inheritance;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: therefore, I will hope in him!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is good to those who depend on him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to those who search for him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: So it is good to wait quietly
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for salvation from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And it is good for people to submit at an early age
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to the yoke of his discipline:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Let them sit alone in silence
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'beneath the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s demands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Let them lie face down in the dust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for there may be hope at last.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Let them turn the other cheek to those who strike them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and accept the insults of their enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: For no one is abandoned
- type: usfm
  marker: q2
  children:
  - type: text
    text: by the Lord forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Though he brings grief, he also shows compassion
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of the greatness of his unfailing love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: For he does not enjoy hurting people
- type: usfm
  marker: q2
  children:
  - type: text
    text: or causing them sorrow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: If people crush underfoot
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the prisoners of the land,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: if they deprive others of their rights
- type: usfm
  marker: q2
  children:
  - type: text
    text: in defiance of the Most High,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: if they twist justice in the courts—
- type: usfm
  marker: q2
  children:
  - type: text
    text: doesn’t the Lord see all these things?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Who can command things to happen
- type: usfm
  marker: q2
  children:
  - type: text
    text: without the Lord’s permission?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Does not the Most High
- type: usfm
  marker: q2
  children:
  - type: text
    text: send both calamity and good?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Then why should we, mere humans, complain
- type: usfm
  marker: q2
  children:
  - type: text
    text: when we are punished for our sins?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Instead, let us test and examine our ways.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Let us turn back to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Let us lift our hearts and hands
- type: usfm
  marker: q2
  children:
  - type: text
    text: to God in heaven and say,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: “We have sinned and rebelled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you have not forgiven us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: “You have engulfed us with your anger, chased us down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and slaughtered us without mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: You have hidden yourself in a cloud
- type: usfm
  marker: q2
  children:
  - type: text
    text: so our prayers cannot reach you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: You have discarded us as refuse and garbage
- type: usfm
  marker: q2
  children:
  - type: text
    text: among the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: “All our enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: have spoken out against us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: We are filled with fear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for we are trapped, devastated, and ruined.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Tears stream from my eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of the destruction of my people!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: My tears flow endlessly;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will not stop
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'until the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' looks down'
- type: usfm
  marker: q2
  children:
  - type: text
    text: from heaven and sees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: My heart is breaking
- type: usfm
  marker: q2
  children:
  - type: text
    text: over the fate of all the women of Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: My enemies, whom I have never harmed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hunted me down like a bird.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: They threw me into a pit
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dropped stones on me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: The water rose over my head,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I cried out, “This is the end!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'But I called on your name, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: from deep within the pit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: You heard me when I cried, “Listen to my pleading!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hear my cry for help!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Yes, you came when I called;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you told me, “Do not fear.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Lord, you have come to my defense;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have redeemed my life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'You have seen the wrong they have done to me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: Be my judge, and prove me right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: You have seen the vengeful plots
- type: usfm
  marker: q2
  children:
  - type: text
    text: my enemies have laid against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you have heard the vile names they call me.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You know all about the plans they have made.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: My enemies whisper and mutter
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they plot against me all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Look at them! Whether they sit or stand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am the object of their mocking songs.
- type: usfm
  marker: q1
  children:
  - type: usfm
