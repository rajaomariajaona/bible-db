document_id: LAM.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Hope in the Lord’s Faithfulness
  - type: text
    content: I am the one who has seen the afflictions
  - type: text
    content: 'that come from the rod of the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger.
  '10':
  - type: text
    content: He has hidden like a bear or a lion,
  - type: text
    content: waiting to attack me.
  '11':
  - type: text
    content: He has dragged me off the path and torn me in pieces,
  - type: text
    content: leaving me helpless and devastated.
  '12':
  - type: text
    content: He has drawn his bow
  - type: text
    content: and made me the target for his arrows.
  '13':
  - type: text
    content: He shot his arrows
  - type: text
    content: deep into my heart.
  '14':
  - type: text
    content: My own people laugh at me.
  - type: text
    content: All day long they sing their mocking songs.
  '15':
  - type: text
    content: He has filled me with bitterness
  - type: text
    content: and given me a bitter cup of sorrow to drink.
  '16':
  - type: text
    content: He has made me chew on gravel.
  - type: text
    content: He has rolled me in the dust.
  '17':
  - type: text
    content: Peace has been stripped away,
  - type: text
    content: and I have forgotten what prosperity is.
  '18':
  - type: text
    content: I cry out, “My splendor is gone!
  - type: text
    content: 'Everything I had hoped for from the '
  - type: text
    content: Lord
  - type: text
    content: ' is lost!”'
  '19':
  - type: text
    content: The thought of my suffering and homelessness
  - type: text
    content: is bitter beyond words.
  - type: note
    content: Or is wormwood and gall.
  '2':
  - type: text
    content: He has led me into darkness,
  - type: text
    content: shutting out all light.
  '20':
  - type: text
    content: I will never forget this awful time,
  - type: text
    content: as I grieve over my loss.
  '21':
  - type: text
    content: Yet I still dare to hope
  - type: text
    content: 'when I remember this:'
  '22':
  - type: text
    content: 'The faithful love of the '
  - type: text
    content: Lord
  - type: text
    content: ' never ends!'
  - type: note
    content: As in Syriac version; Hebrew reads of the Lord keeps us from destruction.
  - type: text
    content: His mercies never cease.
  '23':
  - type: text
    content: Great is his faithfulness;
  - type: text
    content: his mercies begin afresh each morning.
  '24':
  - type: text
    content: 'I say to myself, “The '
  - type: text
    content: Lord
  - type: text
    content: ' is my inheritance;'
  - type: text
    content: therefore, I will hope in him!”
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is good to those who depend on him,'
  - type: text
    content: to those who search for him.
  '26':
  - type: text
    content: So it is good to wait quietly
  - type: text
    content: 'for salvation from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '27':
  - type: text
    content: And it is good for people to submit at an early age
  - type: text
    content: 'to the yoke of his discipline:'
  '28':
  - type: text
    content: Let them sit alone in silence
  - type: text
    content: 'beneath the '
  - type: text
    content: Lord
  - type: text
    content: ’s demands.
  '29':
  - type: text
    content: Let them lie face down in the dust,
  - type: text
    content: for there may be hope at last.
  '3':
  - type: text
    content: He has turned his hand against me
  - type: text
    content: again and again, all day long.
  '30':
  - type: text
    content: Let them turn the other cheek to those who strike them
  - type: text
    content: and accept the insults of their enemies.
  '31':
  - type: text
    content: For no one is abandoned
  - type: text
    content: by the Lord forever.
  '32':
  - type: text
    content: Though he brings grief, he also shows compassion
  - type: text
    content: because of the greatness of his unfailing love.
  '33':
  - type: text
    content: For he does not enjoy hurting people
  - type: text
    content: or causing them sorrow.
  '34':
  - type: text
    content: If people crush underfoot
  - type: text
    content: all the prisoners of the land,
  '35':
  - type: text
    content: if they deprive others of their rights
  - type: text
    content: in defiance of the Most High,
  '36':
  - type: text
    content: if they twist justice in the courts—
  - type: text
    content: doesn’t the Lord see all these things?
  '37':
  - type: text
    content: Who can command things to happen
  - type: text
    content: without the Lord’s permission?
  '38':
  - type: text
    content: Does not the Most High
  - type: text
    content: send both calamity and good?
  '39':
  - type: text
    content: Then why should we, mere humans, complain
  - type: text
    content: when we are punished for our sins?
  '4':
  - type: text
    content: He has made my skin and flesh grow old.
  - type: text
    content: He has broken my bones.
  '40':
  - type: text
    content: Instead, let us test and examine our ways.
  - type: text
    content: 'Let us turn back to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '41':
  - type: text
    content: Let us lift our hearts and hands
  - type: text
    content: to God in heaven and say,
  '42':
  - type: text
    content: “We have sinned and rebelled,
  - type: text
    content: and you have not forgiven us.
  '43':
  - type: text
    content: “You have engulfed us with your anger, chased us down,
  - type: text
    content: and slaughtered us without mercy.
  '44':
  - type: text
    content: You have hidden yourself in a cloud
  - type: text
    content: so our prayers cannot reach you.
  '45':
  - type: text
    content: You have discarded us as refuse and garbage
  - type: text
    content: among the nations.
  '46':
  - type: text
    content: “All our enemies
  - type: text
    content: have spoken out against us.
  '47':
  - type: text
    content: We are filled with fear,
  - type: text
    content: for we are trapped, devastated, and ruined.”
  '48':
  - type: text
    content: Tears stream from my eyes
  - type: text
    content: because of the destruction of my people!
  '49':
  - type: text
    content: My tears flow endlessly;
  - type: text
    content: they will not stop
  '5':
  - type: text
    content: He has besieged and surrounded me
  - type: text
    content: with anguish and distress.
  '50':
  - type: text
    content: 'until the '
  - type: text
    content: Lord
  - type: text
    content: ' looks down'
  - type: text
    content: from heaven and sees.
  '51':
  - type: text
    content: My heart is breaking
  - type: text
    content: over the fate of all the women of Jerusalem.
  '52':
  - type: text
    content: My enemies, whom I have never harmed,
  - type: text
    content: hunted me down like a bird.
  '53':
  - type: text
    content: They threw me into a pit
  - type: text
    content: and dropped stones on me.
  '54':
  - type: text
    content: The water rose over my head,
  - type: text
    content: and I cried out, “This is the end!”
  '55':
  - type: text
    content: 'But I called on your name, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: from deep within the pit.
  '56':
  - type: text
    content: You heard me when I cried, “Listen to my pleading!
  - type: text
    content: Hear my cry for help!”
  '57':
  - type: text
    content: Yes, you came when I called;
  - type: text
    content: you told me, “Do not fear.”
  '58':
  - type: text
    content: Lord, you have come to my defense;
  - type: text
    content: you have redeemed my life.
  '59':
  - type: text
    content: 'You have seen the wrong they have done to me, '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Be my judge, and prove me right.
  '6':
  - type: text
    content: He has buried me in a dark place,
  - type: text
    content: like those long dead.
  '60':
  - type: text
    content: You have seen the vengeful plots
  - type: text
    content: my enemies have laid against me.
  '61':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you have heard the vile names they call me.'
  - type: text
    content: You know all about the plans they have made.
  '62':
  - type: text
    content: My enemies whisper and mutter
  - type: text
    content: as they plot against me all day long.
  '63':
  - type: text
    content: Look at them! Whether they sit or stand,
  - type: text
    content: I am the object of their mocking songs.
  '64':
  - type: text
    content: 'Pay them back, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for all the evil they have done.
  '65':
  - type: text
    content: Give them hard and stubborn hearts,
  - type: text
    content: and then let your curse fall on them!
  '66':
  - type: text
    content: Chase them down in your anger,
  - type: text
    content: 'destroying them beneath the '
  - type: text
    content: Lord
  - type: text
    content: ’s heavens.
  '7':
  - type: text
    content: He has walled me in, and I cannot escape.
  - type: text
    content: He has bound me in heavy chains.
  '8':
  - type: text
    content: And though I cry and shout,
  - type: text
    content: he has shut out my prayers.
  '9':
  - type: text
    content: He has blocked my way with a high stone wall;
  - type: text
    content: he has made my road crooked.
