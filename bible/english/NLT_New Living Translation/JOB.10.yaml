document_id: JOB.10,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Frames His Plea to God
  - type: text
    content: “I am disgusted with my life.
  - type: text
    content: Let me complain freely.
  - type: text
    content: My bitter soul must complain.
  '10':
  - type: text
    content: You guided my conception
  - type: text
    content: and formed me in the womb.
  - type: note
    content: Hebrew You poured me out like milk / and curdled me like cheese.
  '11':
  - type: text
    content: You clothed me with skin and flesh,
  - type: text
    content: and you knit my bones and sinews together.
  '12':
  - type: text
    content: You gave me life and showed me your unfailing love.
  - type: text
    content: My life was preserved by your care.
  '13':
  - type: text
    content: “‘Yet your real motive—
  - type: text
    content: your true intent—
  '14':
  - type: text
    content: was to watch me, and if I sinned,
  - type: text
    content: you would not forgive my guilt.
  '15':
  - type: text
    content: If I am guilty, too bad for me;
  - type: text
    content: and even if I’m innocent, I can’t hold my head high,
  - type: text
    content: because I am filled with shame and misery.
  '16':
  - type: text
    content: And if I hold my head high, you hunt me like a lion
  - type: text
    content: and display your awesome power against me.
  '17':
  - type: text
    content: Again and again you witness against me.
  - type: text
    content: You pour out your growing anger on me
  - type: text
    content: and bring fresh armies against me.
  '18':
  - type: text
    content: “‘Why, then, did you deliver me from my mother’s womb?
  - type: text
    content: Why didn’t you let me die at birth?
  '19':
  - type: text
    content: It would be as though I had never existed,
  - type: text
    content: going directly from the womb to the grave.
  '2':
  - type: text
    content: I will say to God, ‘Don’t simply condemn me—
  - type: text
    content: tell me the charge you are bringing against me.
  '20':
  - type: text
    content: I have only a few days left, so leave me alone,
  - type: text
    content: that I may have a moment of comfort
  '21':
  - type: text
    content: before I leave—never to return—
  - type: text
    content: for the land of darkness and utter gloom.
  '22':
  - type: text
    content: It is a land as dark as midnight,
  - type: text
    content: a land of gloom and confusion,
  - type: text
    content: where even the light is dark as midnight.’”
  '3':
  - type: text
    content: What do you gain by oppressing me?
  - type: text
    content: Why do you reject me, the work of your own hands,
  - type: text
    content: while smiling on the schemes of the wicked?
  '4':
  - type: text
    content: Are your eyes like those of a human?
  - type: text
    content: Do you see things only as people see them?
  '5':
  - type: text
    content: Is your lifetime only as long as ours?
  - type: text
    content: Is your life so short
  '6':
  - type: text
    content: that you must quickly probe for my guilt
  - type: text
    content: and search for my sin?
  '7':
  - type: text
    content: Although you know I am not guilty,
  - type: text
    content: no one can rescue me from your hands.
  '8':
  - type: text
    content: “‘You formed me with your hands; you made me,
  - type: text
    content: yet now you completely destroy me.
  '9':
  - type: text
    content: Remember that you made me from dust—
  - type: text
    content: will you turn me back to dust so soon?
