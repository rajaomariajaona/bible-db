document_id: JOB.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job Frames His Plea to God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “I am disgusted with my life.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let me complain freely.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My bitter soul must complain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I will say to God, ‘Don’t simply condemn me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: tell me the charge you are bringing against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: What do you gain by oppressing me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why do you reject me, the work of your own hands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while smiling on the schemes of the wicked?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Are your eyes like those of a human?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you see things only as people see them?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Is your lifetime only as long as ours?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is your life so short
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: that you must quickly probe for my guilt
- type: usfm
  marker: q2
  children:
  - type: text
    text: and search for my sin?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Although you know I am not guilty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one can rescue me from your hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “‘You formed me with your hands; you made me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet now you completely destroy me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Remember that you made me from dust—
- type: usfm
  marker: q2
  children:
  - type: text
    text: will you turn me back to dust so soon?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You guided my conception
- type: usfm
  marker: q2
  children:
  - type: text
    text: and formed me in the womb.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: You poured me out like milk / and curdled me like cheese.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You clothed me with skin and flesh,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you knit my bones and sinews together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You gave me life and showed me your unfailing love.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My life was preserved by your care.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “‘Yet your real motive—
- type: usfm
  marker: q2
  children:
  - type: text
    text: your true intent—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: was to watch me, and if I sinned,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you would not forgive my guilt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: If I am guilty, too bad for me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: and even if I’m innocent, I can’t hold my head high,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because I am filled with shame and misery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And if I hold my head high, you hunt me like a lion
- type: usfm
  marker: q2
  children:
  - type: text
    text: and display your awesome power against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Again and again you witness against me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You pour out your growing anger on me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring fresh armies against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “‘Why, then, did you deliver me from my mother’s womb?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why didn’t you let me die at birth?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: It would be as though I had never existed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: going directly from the womb to the grave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I have only a few days left, so leave me alone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I may have a moment of comfort
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: before I leave—never to return—
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the land of darkness and utter gloom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: It is a land as dark as midnight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a land of gloom and confusion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where even the light is dark as midnight.’”
