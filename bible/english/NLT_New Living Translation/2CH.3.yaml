document_id: 2CH.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon Builds the Temple
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So Solomon began to build the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in Jerusalem on Mount Moriah, where the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had appeared to David, his father. The Temple was built on the threshing floor of Araunah'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ornan, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Araunah; compare 2 Sam 24:16.
      marker-yv: yv-n
    - type: text
      text: ' the Jebusite, the site that David had selected. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He made two figures shaped like cherubim, overlaid them with gold, and placed them in the Most Holy Place. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The total wingspan of the two cherubim standing side by side was 30 feet. One wing of the first figure was 7-1/2 feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[2.3 meters]; also in 3:11b, 12, 15.'
      marker-yv: yv-n
    - type: text
      text: ' long, and it touched the Temple wall. The other wing, also 7-1/2 feet long, touched one of the wings of the second figure. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the same way, the second figure had one wing 7-1/2 feet long that touched the opposite wall. The other wing, also 7-1/2 feet long, touched the wing of the first figure. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the wingspan of the two cherubim side by side was 30 feet. They stood on their feet and faced out toward the main room of the Temple.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Across the entrance of the Most Holy Place he hung a curtain made of fine linen, decorated with blue, purple, and scarlet thread and embroidered with figures of cherubim.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the front of the Temple, he made two pillars that were 27 feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Syriac version (see also 1 Kgs 7:15; 2 Kgs 25:17; Jer 52:21), which reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '18 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[8.3 meters]; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '35 cubits, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: which is 52.5 feet or 16.5 meters.
      marker-yv: yv-n
    - type: text
      text: ' tall, each topped by a capital extending upward another 7-1/2 feet. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He made a network of interwoven chains
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'He made chains in the inner sanctuary. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' and used them to decorate the tops of the pillars. He also made 100 decorative pomegranates and attached them to the chains. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he set up the two pillars at the entrance of the Temple, one to the south of the entrance and the other to the north. He named the one on the south Jakin, and the one on the north Boaz.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:17 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jakin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'probably means “he establishes”; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Boaz '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: probably means “in him is strength.”
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The construction began in midspring,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on the second [day] of the second month. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This day of the ancient Hebrew lunar calendar occurred in April or May.
      marker-yv: yv-n
    - type: text
      text: ' during the fourth year of Solomon’s reign.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These are the dimensions Solomon used for the foundation of the Temple of God (using the old standard of measurement).
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The “old standard of measurement” was a cubit equal to 18 inches [46 centimeters]. The new standard was a cubit of approximately 21 inches [53 centimeters].
      marker-yv: yv-n
    - type: text
      text: ' It was 90 feet long and 30 feet wide.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '60 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[27.6 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long and 20 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[9.2 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wide.
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The entry room at the front of the Temple was 30 feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:4a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[9.2 meters]; also in 3:8, 11, 13.'
      marker-yv: yv-n
    - type: text
      text: ' wide, running across the entire width of the Temple, and 30 feet'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:4b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek and Syriac manuscripts, which read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[9.2 meters]; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '120 [cubits], '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: which is 180 feet or 55 meters.
      marker-yv: yv-n
    - type: text
      text: ' high. He overlaid the inside with pure gold.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He paneled the main room of the Temple with cypress wood, overlaid it with fine gold, and decorated it with carvings of palm trees and chains. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He decorated the walls of the Temple with beautiful jewels and with gold from the land of Parvaim. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He overlaid the beams, thresholds, walls, and doors throughout the Temple with gold, and he carved figures of cherubim on the walls.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He made the Most Holy Place 30 feet wide, corresponding to the width of the Temple, and 30 feet deep. He overlaid its interior with 23 tons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '600 talents '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[20.4 metric tons].'
      marker-yv: yv-n
    - type: text
      text: ' of fine gold. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The gold nails that were used weighed 20 ounces
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '50 shekels '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[570 grams].'
      marker-yv: yv-n
    - type: text
      text: ' each. He also overlaid the walls of the upper rooms with gold.'
