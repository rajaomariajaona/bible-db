document_id: EST.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Decree to Help the Jews
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On that same day King Xerxes gave the property of Haman, the enemy of the Jews, to Queen Esther. Then Mordecai was brought before the king, for Esther had told the king how they were related. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The king took off his signet ring—which he had taken back from Haman—and gave it to Mordecai. And Esther appointed Mordecai to be in charge of Haman’s property.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Esther went again before the king, falling down at his feet and begging him with tears to stop the evil plot devised by Haman the Agagite against the Jews. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Again the king held out the gold scepter to Esther. So she rose and stood before him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Esther said, “If it please the king, and if I have found favor with him, and if he thinks it is right, and if I am pleasing to him, let there be a decree that reverses the orders of Haman son of Hammedatha the Agagite, who ordered that Jews throughout all the king’s provinces should be destroyed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For how can I endure to see my people and my family slaughtered and destroyed?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then King Xerxes said to Queen Esther and Mordecai the Jew, “I have given Esther the property of Haman, and he has been impaled on a pole because he tried to destroy the Jews. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Now go ahead and send a message to the Jews in the king’s name, telling them whatever you want, and seal it with the king’s signet ring. But remember that whatever has already been written in the king’s name and sealed with his signet ring can never be revoked.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So on June 25
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:9a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on the twenty-third day of the third month, the month of Sivan, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. This day was June 25, 474 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 2:16.
    marker-yv: yv-n
  - type: text
    text: ' the king’s secretaries were summoned, and a decree was written exactly as Mordecai dictated. It was sent to the Jews and to the highest officers, the governors, and the nobles of all the 127 provinces stretching from India to Ethiopia.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:9b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to Cush.
    marker-yv: yv-n
  - type: text
    text: ' The decree was written in the scripts and languages of all the peoples of the empire, including that of the Jews. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The decree was written in the name of King Xerxes and sealed with the king’s signet ring. Mordecai sent the dispatches by swift messengers, who rode fast horses especially bred for the king’s service.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The king’s decree gave the Jews in every city authority to unite to defend their lives. They were allowed to kill, slaughter, and annihilate anyone of any nationality or province who might attack them or their children and wives, and to take the property of their enemies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The day chosen for this event throughout all the provinces of King Xerxes was March 7 of the next year.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the thirteenth day of the twelfth month, the month of Adar, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'of the ancient Hebrew lunar calendar. The date selected was March 7, 473 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
      - type: text
        text: ; also see note on 2:16.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A copy of this decree was to be issued as law in every province and proclaimed to all peoples, so that the Jews would be ready to take revenge on their enemies on the appointed day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: So urged on by the king’s command, the messengers rode out swiftly on fast horses bred for the king’s service. The same decree was also proclaimed in the fortress of Susa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Mordecai left the king’s presence, wearing the royal robe of blue and white, the great crown of gold, and an outer cloak of fine linen and purple. And the people of Susa celebrated the new decree. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The Jews were filled with joy and gladness and were honored everywhere. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: In every province and city, wherever the king’s decree arrived, the Jews rejoiced and had a great celebration and declared a public festival and holiday. And many of the people of the land became Jews themselves, for they feared what the Jews might do to them.
