document_id: 2KI.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Queen Athaliah Rules in Judah
  - type: text
    content: 'When Athaliah, the mother of King Ahaziah of Judah, learned that her son was dead, she began to destroy the rest of the royal family. '
  '10':
  - type: text
    content: 'and he supplied them with the spears and small shields that had once belonged to King David and were stored in the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: text
    content: The palace guards stationed themselves around the king, with their weapons ready. They formed a line from the south side of the Temple around to the north side and all around the altar.
  '12':
  - type: text
    content: Then Jehoiada brought out Joash, the king’s son, placed the crown on his head, and presented him with a copy of God’s laws.
  - type: note
    content: Or a copy of the covenant.
  - type: text
    content: ' They anointed him and proclaimed him king, and everyone clapped their hands and shouted, “Long live the king!”'
  - type: heading
    content: The Death of Athaliah
  '13':
  - type: text
    content: 'When Athaliah heard the noise made by the palace guards and the people, she hurried to the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple to see what was happening. '
  '14':
  - type: text
    content: When she arrived, she saw the newly crowned king standing in his place of authority by the pillar, as was the custom at times of coronation. The commanders and trumpeters were surrounding him, and people from all over the land were rejoicing and blowing trumpets. When Athaliah saw all this, she tore her clothes in despair and shouted, “Treason! Treason!”
  '15':
  - type: text
    content: Then Jehoiada the priest ordered the commanders who were in charge of the troops, “Take her to the soldiers in front of the Temple,
  - type: note
    content: Or Bring her out from between the ranks; or Take her out of the Temple precincts. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' and kill anyone who tries to rescue her.” For the priest had said, “She must not be killed in the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '16':
  - type: text
    content: So they seized her and led her out to the gate where horses enter the palace grounds, and she was killed there.
  - type: heading
    content: Jehoiada’s Religious Reforms
  '17':
  - type: text
    content: 'Then Jehoiada made a covenant between the '
  - type: text
    content: Lord
  - type: text
    content: ' and the king and the people that they would be the '
  - type: text
    content: Lord
  - type: text
    content: '’s people. He also made a covenant between the king and the people. '
  '18':
  - type: text
    content: And all the people of the land went over to the temple of Baal and tore it down. They demolished the altars and smashed the idols to pieces, and they killed Mattan the priest of Baal in front of the altars.
  - type: text
    content: 'Jehoiada the priest stationed guards at the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Then the commanders, the Carite mercenaries, the palace guards, and all the people of the land escorted the king from the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. They went through the gate of the guards and into the palace, and the king took his seat on the royal throne. '
  '2':
  - type: text
    content: But Ahaziah’s sister Jehosheba, the daughter of King Jehoram,
  - type: note
    content: Hebrew Joram, a variant spelling of Jehoram.
  - type: text
    content: ' took Ahaziah’s infant son, Joash, and stole him away from among the rest of the king’s children, who were about to be killed. She put Joash and his nurse in a bedroom, and they hid him from Athaliah, so the child was not murdered. '
  '20':
  - type: text
    content: So all the people of the land rejoiced, and the city was peaceful because Athaliah had been killed at the king’s palace.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Verse 11:21 is numbered 12:1 in Hebrew text.
  - type: text
    content: Joash
  - type: note
    content: Hebrew Jehoash, a variant spelling of Joash.
  - type: text
    content: ' was seven years old when he became king.'
  '3':
  - type: text
    content: 'Joash remained hidden in the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' for six years while Athaliah ruled over the land.'
  - type: heading
    content: Revolt against Athaliah
  '4':
  - type: text
    content: 'In the seventh year of Athaliah’s reign, Jehoiada the priest summoned the commanders, the Carite mercenaries, and the palace guards to come to the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. He made a solemn pact with them and made them swear an oath of loyalty there in the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple; then he showed them the king’s son.
  '5':
  - type: text
    content: 'Jehoiada told them, “This is what you must do. A third of you who are on duty on the Sabbath are to guard the royal palace itself. '
  '6':
  - type: text
    content: 'Another third of you are to stand guard at the Sur Gate. And the final third must stand guard behind the palace guard. These three groups will all guard the palace. '
  '7':
  - type: text
    content: 'The other two units who are off duty on the Sabbath must stand guard for the king at the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple. '
  '8':
  - type: text
    content: Form a bodyguard around the king and keep your weapons in hand. Kill anyone who tries to break through. Stay with the king wherever he goes.”
  '9':
  - type: text
    content: 'So the commanders did everything as Jehoiada the priest ordered. The commanders took charge of the men reporting for duty that Sabbath, as well as those who were going off duty. They brought them all to Jehoiada the priest, '
