document_id: 2KI.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Queen Athaliah Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When Athaliah, the mother of King Ahaziah of Judah, learned that her son was dead, she began to destroy the rest of the royal family. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: But Ahaziah’s sister Jehosheba, the daughter of King Jehoram,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Joram, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Jehoram.
    marker-yv: yv-n
  - type: text
    text: ' took Ahaziah’s infant son, Joash, and stole him away from among the rest of the king’s children, who were about to be killed. She put Joash and his nurse in a bedroom, and they hid him from Athaliah, so the child was not murdered. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Joash remained hidden in the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for six years while Athaliah ruled over the land.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Revolt against Athaliah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'In the seventh year of Athaliah’s reign, Jehoiada the priest summoned the commanders, the Carite mercenaries, and the palace guards to come to the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. He made a solemn pact with them and made them swear an oath of loyalty there in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple; then he showed them the king’s son.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jehoiada told them, “This is what you must do. A third of you who are on duty on the Sabbath are to guard the royal palace itself. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Another third of you are to stand guard at the Sur Gate. And the final third must stand guard behind the palace guard. These three groups will all guard the palace. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The other two units who are off duty on the Sabbath must stand guard for the king at the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Form a bodyguard around the king and keep your weapons in hand. Kill anyone who tries to break through. Stay with the king wherever he goes.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So the commanders did everything as Jehoiada the priest ordered. The commanders took charge of the men reporting for duty that Sabbath, as well as those who were going off duty. They brought them all to Jehoiada the priest, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and he supplied them with the spears and small shields that had once belonged to King David and were stored in the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The palace guards stationed themselves around the king, with their weapons ready. They formed a line from the south side of the Temple around to the north side and all around the altar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then Jehoiada brought out Joash, the king’s son, placed the crown on his head, and presented him with a copy of God’s laws.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a copy of the covenant.
    marker-yv: yv-n
  - type: text
    text: ' They anointed him and proclaimed him king, and everyone clapped their hands and shouted, “Long live the king!”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Death of Athaliah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When Athaliah heard the noise made by the palace guards and the people, she hurried to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple to see what was happening. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When she arrived, she saw the newly crowned king standing in his place of authority by the pillar, as was the custom at times of coronation. The commanders and trumpeters were surrounding him, and people from all over the land were rejoicing and blowing trumpets. When Athaliah saw all this, she tore her clothes in despair and shouted, “Treason! Treason!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then Jehoiada the priest ordered the commanders who were in charge of the troops, “Take her to the soldiers in front of the Temple,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Bring her out from between the ranks; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Take her out of the Temple precincts. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' and kill anyone who tries to rescue her.” For the priest had said, “She must not be killed in the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So they seized her and led her out to the gate where horses enter the palace grounds, and she was killed there.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoiada’s Religious Reforms
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Jehoiada made a covenant between the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and the king and the people that they would be the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s people. He also made a covenant between the king and the people. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And all the people of the land went over to the temple of Baal and tore it down. They demolished the altars and smashed the idols to pieces, and they killed Mattan the priest of Baal in front of the altars.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jehoiada the priest stationed guards at the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then the commanders, the Carite mercenaries, the palace guards, and all the people of the land escorted the king from the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. They went through the gate of the guards and into the palace, and the king took his seat on the royal throne. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So all the people of the land rejoiced, and the city was peaceful because Athaliah had been killed at the king’s palace.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:21a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verse 11:21 is numbered 12:1 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: Joash
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:21b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jehoash, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Joash.
    marker-yv: yv-n
  - type: text
    text: ' was seven years old when he became king.'
