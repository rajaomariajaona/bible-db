document_id: JDG.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gideon Kills Zebah and Zalmunna
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the people of Ephraim asked Gideon, “Why have you treated us this way? Why didn’t you send for us when you first went out to fight the Midianites?” And they argued heatedly with Gideon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But Gideon replied, “What have I accomplished compared to you? Aren’t even the leftover grapes of Ephraim’s harvest better than the entire crop of my little clan of Abiezer? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: God gave you victory over Oreb and Zeeb, the commanders of the Midianite army. What have I accomplished compared to that?” When the men of Ephraim heard Gideon’s answer, their anger subsided.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Gideon then crossed the Jordan River with his 300 men, and though exhausted, they continued to chase the enemy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: When they reached Succoth, Gideon asked the leaders of the town, “Please give my warriors some food. They are very tired. I am chasing Zebah and Zalmunna, the kings of Midian.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But the officials of Succoth replied, “Catch Zebah and Zalmunna first, and then we will feed your army.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Gideon said, “After the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gives me victory over Zebah and Zalmunna, I will return and tear your flesh with the thorns and briers from the wilderness.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: From there Gideon went up to Peniel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Penuel, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Peniel; also in 8:9, 17.
    marker-yv: yv-n
  - type: text
    text: ' and again asked for food, but he got the same answer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So he said to the people of Peniel, “After I return in victory, I will tear down this tower.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'By this time Zebah and Zalmunna were in Karkor with about 15,000 warriors—all that remained of the allied armies of the east, for 120,000 had already been killed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Gideon circled around by the caravan route east of Nobah and Jogbehah, taking the Midianite army by surprise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Zebah and Zalmunna, the two Midianite kings, fled, but Gideon chased them down and captured all their warriors.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'After this, Gideon returned from the battle by way of Heres Pass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'There he captured a young man from Succoth and demanded that he write down the names of all the seventy-seven officials and elders in the town. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Gideon then returned to Succoth and said to the leaders, “Here are Zebah and Zalmunna. When we were here before, you taunted me, saying, ‘Catch Zebah and Zalmunna first, and then we will feed your exhausted army.’” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Gideon took the elders of the town and taught them a lesson, punishing them with thorns and briers from the wilderness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He also tore down the tower of Peniel and killed all the men in the town.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then Gideon asked Zebah and Zalmunna, “The men you killed at Tabor—what were they like?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Like you,” they replied. “They all had the look of a king’s son.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“They were my brothers, the sons of my own mother!” Gideon exclaimed. “As surely as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lives, I wouldn’t kill you if you hadn’t killed them.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Turning to Jether, his oldest son, he said, “Kill them!” But Jether did not draw his sword, for he was only a boy and was afraid.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then Zebah and Zalmunna said to Gideon, “Be a man! Kill us yourself!” So Gideon killed them both and took the royal ornaments from the necks of their camels.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gideon’s Sacred Ephod
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then the Israelites said to Gideon, “Be our ruler! You and your son and your grandson will be our rulers, for you have rescued us from Midian.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But Gideon replied, “I will not rule over you, nor will my son. The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will rule over you! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: However, I do have one request—that each of you give me an earring from the plunder you collected from your fallen enemies.” (The enemies, being Ishmaelites, all wore gold earrings.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“Gladly!” they replied. They spread out a cloak, and each one threw in a gold earring he had gathered from the plunder. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The weight of the gold earrings was forty-three pounds,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1,700 [shekels] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[19.4 kilograms].'
    marker-yv: yv-n
  - type: text
    text: ' not including the royal ornaments and pendants, the purple clothing worn by the kings of Midian, or the chains around the necks of their camels.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Gideon made a sacred ephod from the gold and put it in Ophrah, his hometown. But soon all the Israelites prostituted themselves by worshiping it, and it became a trap for Gideon and his family.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: That is the story of how the people of Israel defeated Midian, which never recovered. Throughout the rest of Gideon’s lifetime—about forty years—there was peace in the land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Then Gideon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jerub-baal; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see 6:32.
    marker-yv: yv-n
  - type: text
    text: ' son of Joash returned home. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'He had seventy sons born to him, for he had many wives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'He also had a concubine in Shechem, who gave birth to a son, whom he named Abimelech. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Gideon died when he was very old, and he was buried in the grave of his father, Joash, at Ophrah in the land of the clan of Abiezer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'As soon as Gideon died, the Israelites prostituted themselves by worshiping the images of Baal, making Baal-berith their god. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'They forgot the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God, who had rescued them from all their enemies surrounding them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Nor did they show any loyalty to the family of Jerub-baal (that is, Gideon), despite all the good he had done for Israel.
