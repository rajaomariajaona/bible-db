document_id: JOS.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Defeats the Northern Armies
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When King Jabin of Hazor heard what had happened, he sent messages to the following kings: King Jobab of Madon; the king of Shimron; the king of Acshaph; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: all the kings of the northern hill country; the kings in the Jordan Valley south of Galilee
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:2a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in the Arabah south of Kinnereth.
    marker-yv: yv-n
  - type: text
    text: ; the kings in the Galilean foothills
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:2b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the Shephelah; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 11:16.
    marker-yv: yv-n
  - type: text
    text: '; the kings of Naphoth-dor on the west; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: the kings of Canaan, both east and west; the kings of the Amorites, the Hittites, the Perizzites, the Jebusites in the hill country, and the Hivites in the towns on the slopes of Mount Hermon in the land of Mizpah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'All these kings came out to fight. Their combined armies formed a vast horde. And with all their horses and chariots, they covered the landscape like the sand on the seashore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The kings joined forces and established their camp around the water near Merom to fight against Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Joshua, “Do not be afraid of them. By this time tomorrow I will hand all of them over to Israel as dead men. Then you must cripple their horses and burn their chariots.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Joshua and all his fighting men traveled to the water near Merom and attacked suddenly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave them victory over their enemies. The Israelites chased them as far as Greater Sidon and Misrephoth-maim, and eastward into the valley of Mizpah, until not one enemy warrior was left alive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Joshua crippled the horses and burned all the chariots, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had instructed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Joshua then turned back and captured Hazor and killed its king. (Hazor had at one time been the capital of all these kingdoms.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The Israelites completely destroyed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering; also in 11:12, 20, 21.'
    marker-yv: yv-n
  - type: text
    text: ' every living thing in the city, leaving no survivors. Not a single person was spared. And then Joshua burned the city.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Joshua slaughtered all the other kings and their people, completely destroying them, just as Moses, the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', had commanded. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But the Israelites did not burn any of the towns built on mounds except Hazor, which Joshua burned. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the Israelites took all the plunder and livestock of the ravaged towns for themselves. But they killed all the people, leaving no survivors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'As the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded his servant Moses, so Moses commanded Joshua. And Joshua did as he was told, carefully obeying all the commands that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had given to Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So Joshua conquered the entire region—the hill country, the entire Negev, the whole area around the town of Goshen, the western foothills, the Jordan Valley,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Shephelah, the Arabah.
    marker-yv: yv-n
  - type: text
    text: ' the mountains of Israel, and the Galilean foothills. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The Israelite territory now extended all the way from Mount Halak, which leads up to Seir in the south, as far north as Baal-gad at the foot of Mount Hermon in the valley of Lebanon. Joshua killed all the kings of those territories, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'waging war for a long time to accomplish this. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'No one in this region made peace with the Israelites except the Hivites of Gibeon. All the others were defeated. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' hardened their hearts and caused them to fight the Israelites. So they were completely destroyed without mercy, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'During this period Joshua destroyed all the descendants of Anak, who lived in the hill country of Hebron, Debir, Anab, and the entire hill country of Judah and Israel. He killed them all and completely destroyed their towns. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: None of the descendants of Anak were left in all the land of Israel, though some still remained in Gaza, Gath, and Ashdod.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So Joshua took control of the entire land, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had instructed Moses. He gave it to the people of Israel as their special possession, dividing the land among the tribes. So the land finally had rest from war.'
