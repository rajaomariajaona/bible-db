document_id: JOS.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Defeats the Northern Armies
  - type: text
    content: 'When King Jabin of Hazor heard what had happened, he sent messages to the following kings: King Jobab of Madon; the king of Shimron; the king of Acshaph; '
  '10':
  - type: text
    content: 'Joshua then turned back and captured Hazor and killed its king. (Hazor had at one time been the capital of all these kingdoms.) '
  '11':
  - type: text
    content: The Israelites completely destroyed
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering; also in 11:12, 20, 21.
  - type: text
    content: ' every living thing in the city, leaving no survivors. Not a single person was spared. And then Joshua burned the city.'
  '12':
  - type: text
    content: 'Joshua slaughtered all the other kings and their people, completely destroying them, just as Moses, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', had commanded. '
  '13':
  - type: text
    content: 'But the Israelites did not burn any of the towns built on mounds except Hazor, which Joshua burned. '
  '14':
  - type: text
    content: 'And the Israelites took all the plunder and livestock of the ravaged towns for themselves. But they killed all the people, leaving no survivors. '
  '15':
  - type: text
    content: 'As the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded his servant Moses, so Moses commanded Joshua. And Joshua did as he was told, carefully obeying all the commands that the '
  - type: text
    content: Lord
  - type: text
    content: ' had given to Moses.'
  '16':
  - type: text
    content: So Joshua conquered the entire region—the hill country, the entire Negev, the whole area around the town of Goshen, the western foothills, the Jordan Valley,
  - type: note
    content: Hebrew the Shephelah, the Arabah.
  - type: text
    content: ' the mountains of Israel, and the Galilean foothills. '
  '17':
  - type: text
    content: 'The Israelite territory now extended all the way from Mount Halak, which leads up to Seir in the south, as far north as Baal-gad at the foot of Mount Hermon in the valley of Lebanon. Joshua killed all the kings of those territories, '
  '18':
  - type: text
    content: 'waging war for a long time to accomplish this. '
  '19':
  - type: text
    content: 'No one in this region made peace with the Israelites except the Hivites of Gibeon. All the others were defeated. '
  '2':
  - type: text
    content: all the kings of the northern hill country; the kings in the Jordan Valley south of Galilee
  - type: note
    content: Hebrew in the Arabah south of Kinnereth.
  - type: text
    content: ; the kings in the Galilean foothills
  - type: note
    content: Hebrew the Shephelah; also in 11:16.
  - type: text
    content: '; the kings of Naphoth-dor on the west; '
  '20':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' hardened their hearts and caused them to fight the Israelites. So they were completely destroyed without mercy, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '21':
  - type: text
    content: 'During this period Joshua destroyed all the descendants of Anak, who lived in the hill country of Hebron, Debir, Anab, and the entire hill country of Judah and Israel. He killed them all and completely destroyed their towns. '
  '22':
  - type: text
    content: None of the descendants of Anak were left in all the land of Israel, though some still remained in Gaza, Gath, and Ashdod.
  '23':
  - type: text
    content: 'So Joshua took control of the entire land, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had instructed Moses. He gave it to the people of Israel as their special possession, dividing the land among the tribes. So the land finally had rest from war.'
  '3':
  - type: text
    content: the kings of Canaan, both east and west; the kings of the Amorites, the Hittites, the Perizzites, the Jebusites in the hill country, and the Hivites in the towns on the slopes of Mount Hermon in the land of Mizpah.
  '4':
  - type: text
    content: 'All these kings came out to fight. Their combined armies formed a vast horde. And with all their horses and chariots, they covered the landscape like the sand on the seashore. '
  '5':
  - type: text
    content: The kings joined forces and established their camp around the water near Merom to fight against Israel.
  '6':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “Do not be afraid of them. By this time tomorrow I will hand all of them over to Israel as dead men. Then you must cripple their horses and burn their chariots.”'
  '7':
  - type: text
    content: 'So Joshua and all his fighting men traveled to the water near Merom and attacked suddenly. '
  '8':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them victory over their enemies. The Israelites chased them as far as Greater Sidon and Misrephoth-maim, and eastward into the valley of Mizpah, until not one enemy warrior was left alive. '
  '9':
  - type: text
    content: 'Then Joshua crippled the horses and burned all the chariots, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had instructed.'
