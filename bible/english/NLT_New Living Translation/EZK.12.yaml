document_id: EZK.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Signs of the Coming Exile
  - type: text
    content: 'Again a message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'Say to them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: These actions contain a message for King Zedekiah in Jerusalem'
  - type: note
    content: Hebrew the prince in Jerusalem; similarly in 12:12.
  - type: text
    content: ' and for all the people of Israel.’ '
  '11':
  - type: text
    content: Explain that your actions are a sign to show what will soon happen to them, for they will be driven into exile as captives.
  '12':
  - type: text
    content: '“Even Zedekiah will leave Jerusalem at night through a hole in the wall, taking only what he can carry with him. He will cover his face, and his eyes will not see the land he is leaving. '
  '13':
  - type: text
    content: Then I will throw my net over him and capture him in my snare. I will bring him to Babylon, the land of the Babylonians,
  - type: note
    content: Or Chaldeans.
  - type: text
    content: ' though he will never see it, and he will die there. '
  '14':
  - type: text
    content: 'I will scatter his servants and warriors to the four winds and send the sword after them. '
  '15':
  - type: text
    content: 'And when I scatter them among the nations, they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'But I will spare a few of them from death by war, famine, or disease, so they can confess all their detestable sins to their captors. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '17':
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '18':
  - type: text
    content: '“Son of man, tremble as you eat your food. Shake with fear as you drink your water. '
  '19':
  - type: text
    content: 'Tell the people, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says concerning those living in Israel and Jerusalem: They will eat their food with trembling and sip their water in despair, for their land will be stripped bare because of their violence. '
  '2':
  - type: text
    content: “Son of man, you live among rebels who have eyes but refuse to see. They have ears but refuse to hear. For they are a rebellious people.
  '20':
  - type: text
    content: 'The cities will be destroyed and the farmland made desolate. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’”
  - type: heading
    content: A New Proverb for Israel
  '21':
  - type: text
    content: 'Again a message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '22':
  - type: text
    content: '“Son of man, you’ve heard that proverb they quote in Israel: ‘Time passes, and prophecies come to nothing.’ '
  '23':
  - type: text
    content: 'Tell the people, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will put an end to this proverb, and you will soon stop quoting it.’ Now give them this new proverb to replace the old one: ‘The time has come for every prophecy to be fulfilled!’'
  '24':
  - type: text
    content: '“There will be no more false visions and flattering predictions in Israel. '
  '25':
  - type: text
    content: 'For I am the '
  - type: text
    content: Lord
  - type: text
    content: '! If I say it, it will happen. There will be no more delays, you rebels of Israel. I will fulfill my threat of destruction in your own lifetime. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '26':
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '27':
  - type: text
    content: '“Son of man, the people of Israel are saying, ‘He’s talking about the distant future. His visions won’t come true for a long, long time.’ '
  '28':
  - type: text
    content: 'Therefore, tell them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: No more delay! I will now do everything I have threatened. I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!’”'
  '3':
  - type: text
    content: '“So now, son of man, pretend you are being sent into exile. Pack the few items an exile could carry, and leave your home to go somewhere else. Do this right in front of the people so they can see you. For perhaps they will pay attention to this, even though they are such rebels. '
  '4':
  - type: text
    content: 'Bring your baggage outside during the day so they can watch you. Then in the evening, as they are watching, leave your house as captives do when they begin a long march to distant lands. '
  '5':
  - type: text
    content: 'Dig a hole through the wall while they are watching and go out through it. '
  '6':
  - type: text
    content: As they watch, lift your pack to your shoulders and walk away into the night. Cover your face so you cannot see the land you are leaving. For I have made you a sign for the people of Israel.”
  '7':
  - type: text
    content: So I did as I was told. In broad daylight I brought my pack outside, filled with the things I might carry into exile. Then in the evening while the people looked on, I dug through the wall with my hands and went out into the night with my pack on my shoulder.
  '8':
  - type: text
    content: 'The next morning this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '9':
  - type: text
    content: '“Son of man, these rebels, the people of Israel, have asked you what all this means. '
