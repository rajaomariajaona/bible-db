document_id: JER.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah and Pashhur
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Pashhur son of Immer, the priest in charge of the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', heard what Jeremiah was prophesying. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So he arrested Jeremiah the prophet and had him whipped and put in stocks at the Benjamin Gate of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Temple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The next day, when Pashhur finally released him, Jeremiah said, “Pashhur, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has changed your name. From now on you are to be called ‘The Man Who Lives in Terror.’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Magor-missabib, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: which means “surrounded by terror”; also in 20:10.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: ‘I will send terror upon you and all your friends, and you will watch as they are slaughtered by the swords of the enemy. I will hand the people of Judah over to the king of Babylon. He will take them captive to Babylon or run them through with the sword. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And I will let your enemies plunder Jerusalem. All the famed treasures of the city—the precious jewels and gold and silver of your kings—will be carried off to Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: As for you, Pashhur, you and all your household will go as captives to Babylon. There you will die and be buried, you and all your friends to whom you prophesied that everything would be all right.’”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah’s Complaint
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you misled me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I allowed myself to be misled.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are stronger than I am,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you overpowered me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now I am mocked every day;
- type: usfm
  marker: q2
  children:
  - type: text
    text: everyone laughs at me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: When I speak, the words burst out.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Violence and destruction!” I shout.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So these messages from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: have made me a household joke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But if I say I’ll never mention the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: or speak in his name,
- type: usfm
  marker: q1
  children:
  - type: text
    text: his word burns in my heart like a fire.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s like a fire in my bones!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am worn out trying to hold it in!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I can’t do it!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I have heard the many rumors about me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They call me “The Man Who Lives in Terror.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: They threaten, “If you say anything, we will report it.”
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even my old friends are watching me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: waiting for a fatal slip.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “He will trap himself,” they say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “and then we will get our revenge on him.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' stands beside me like a great warrior.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Before him my persecutors will stumble.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They cannot defeat me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will fail and be thoroughly humiliated.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their dishonor will never be forgotten.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: you test those who are righteous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you examine the deepest thoughts and secrets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let me see your vengeance against them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have committed my cause to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Sing to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For though I was poor and needy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he rescued me from my oppressors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Yet I curse the day I was born!
- type: usfm
  marker: q2
  children:
  - type: text
    text: May no one celebrate the day of my birth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I curse the messenger who told my father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Good news—you have a son!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Let him be destroyed like the cities of old
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' overthrew without mercy.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Terrify him all day long with battle shouts,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: because he did not kill me at birth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh, that I had died in my mother’s womb,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that her body had been my grave!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Why was I ever born?
- type: usfm
  marker: q2
  children:
  - type: text
    text: My entire life has been filled
- type: usfm
  marker: q2
  children:
  - type: text
    text: with trouble, sorrow, and shame.
