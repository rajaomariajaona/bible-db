document_id: JER.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah and Pashhur
  - type: text
    content: 'Now Pashhur son of Immer, the priest in charge of the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', heard what Jeremiah was prophesying. '
  '10':
  - type: text
    content: I have heard the many rumors about me.
  - type: text
    content: They call me “The Man Who Lives in Terror.”
  - type: text
    content: They threaten, “If you say anything, we will report it.”
  - type: text
    content: Even my old friends are watching me,
  - type: text
    content: waiting for a fatal slip.
  - type: text
    content: “He will trap himself,” they say,
  - type: text
    content: “and then we will get our revenge on him.”
  '11':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' stands beside me like a great warrior.'
  - type: text
    content: Before him my persecutors will stumble.
  - type: text
    content: They cannot defeat me.
  - type: text
    content: They will fail and be thoroughly humiliated.
  - type: text
    content: Their dishonor will never be forgotten.
  '12':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: you test those who are righteous,
  - type: text
    content: and you examine the deepest thoughts and secrets.
  - type: text
    content: Let me see your vengeance against them,
  - type: text
    content: for I have committed my cause to you.
  '13':
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: For though I was poor and needy,
  - type: text
    content: he rescued me from my oppressors.
  '14':
  - type: text
    content: Yet I curse the day I was born!
  - type: text
    content: May no one celebrate the day of my birth.
  '15':
  - type: text
    content: I curse the messenger who told my father,
  - type: text
    content: “Good news—you have a son!”
  '16':
  - type: text
    content: Let him be destroyed like the cities of old
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' overthrew without mercy.'
  - type: text
    content: Terrify him all day long with battle shouts,
  '17':
  - type: text
    content: because he did not kill me at birth.
  - type: text
    content: Oh, that I had died in my mother’s womb,
  - type: text
    content: that her body had been my grave!
  '18':
  - type: text
    content: Why was I ever born?
  - type: text
    content: My entire life has been filled
  - type: text
    content: with trouble, sorrow, and shame.
  '2':
  - type: text
    content: 'So he arrested Jeremiah the prophet and had him whipped and put in stocks at the Benjamin Gate of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple.
  '3':
  - type: text
    content: 'The next day, when Pashhur finally released him, Jeremiah said, “Pashhur, the '
  - type: text
    content: Lord
  - type: text
    content: ' has changed your name. From now on you are to be called ‘The Man Who Lives in Terror.’'
  - type: note
    content: Hebrew Magor-missabib, which means “surrounded by terror”; also in 20:10.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘I will send terror upon you and all your friends, and you will watch as they are slaughtered by the swords of the enemy. I will hand the people of Judah over to the king of Babylon. He will take them captive to Babylon or run them through with the sword. '
  '5':
  - type: text
    content: 'And I will let your enemies plunder Jerusalem. All the famed treasures of the city—the precious jewels and gold and silver of your kings—will be carried off to Babylon. '
  '6':
  - type: text
    content: As for you, Pashhur, you and all your household will go as captives to Babylon. There you will die and be buried, you and all your friends to whom you prophesied that everything would be all right.’”
  - type: heading
    content: Jeremiah’s Complaint
  '7':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', you misled me,'
  - type: text
    content: and I allowed myself to be misled.
  - type: text
    content: You are stronger than I am,
  - type: text
    content: and you overpowered me.
  - type: text
    content: Now I am mocked every day;
  - type: text
    content: everyone laughs at me.
  '8':
  - type: text
    content: When I speak, the words burst out.
  - type: text
    content: “Violence and destruction!” I shout.
  - type: text
    content: 'So these messages from the '
  - type: text
    content: Lord
  - type: text
    content: have made me a household joke.
  '9':
  - type: text
    content: 'But if I say I’ll never mention the '
  - type: text
    content: Lord
  - type: text
    content: or speak in his name,
  - type: text
    content: his word burns in my heart like a fire.
  - type: text
    content: It’s like a fire in my bones!
  - type: text
    content: I am worn out trying to hold it in!
  - type: text
    content: I can’t do it!
