document_id: NUM.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Offerings of Dedication
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On the day Moses set up the Tabernacle, he anointed it and set it apart as holy. He also anointed and set apart all its furnishings and the altar with its utensils. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then the leaders of Israel—the tribal leaders who had registered the troops—came and brought their offerings. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Together they brought six large wagons and twelve oxen. There was a wagon for every two leaders and an ox for each leader. They presented these to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in front of the Tabernacle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Receive their gifts, and use these oxen and wagons for transporting the Tabernacle.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the Tent of Meeting; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 7:89.
    marker-yv: yv-n
  - type: text
    text: ' Distribute them among the Levites according to the work they have to do.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Moses took the wagons and oxen and presented them to the Levites. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He gave two wagons and four oxen to the Gershonite division for their work, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and he gave four wagons and eight oxen to the Merarite division for their work. All their work was done under the leadership of Ithamar son of Aaron the priest. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But he gave none of the wagons or oxen to the Kohathite division, since they were required to carry the sacred objects of the Tabernacle on their shoulders.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The leaders also presented dedication gifts for the altar at the time it was anointed. They each placed their gifts before the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, “Let one leader bring his gift each day for the dedication of the altar.”'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: On the first day Nahshon son of Amminadab, leader of the tribe of Judah, presented his offering.
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: His offering consisted of a silver platter weighing 3-1/4 pounds and a silver basin weighing 1-3/4 pounds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'silver platter weighing 130 [shekels] '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[1.5 kilograms] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'and a silver basin weighing 70 shekels '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[800 grams]; also in 7:19, 25, 31, 37, 43, 49, 55, 61, 67, 73, 79, 85.'
    marker-yv: yv-n
  - type: text
    text: ' (as measured by the weight of the sanctuary shekel). These were both filled with grain offerings of choice flour moistened with olive oil. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He also brought a gold container weighing four ounces,
  - type: usfm
