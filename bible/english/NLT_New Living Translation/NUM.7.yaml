  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Twelve young bulls, twelve rams, and twelve one-year-old male lambs were donated for the burnt offerings, along with their prescribed grain offerings. Twelve male goats were brought for the sin offerings. '
  '88':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Twenty-four bulls, sixty rams, sixty male goats, and sixty one-year-old male lambs were donated for the peace offerings. This was the dedication offering for the altar after it was anointed.
  '89':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whenever Moses went into the Tabernacle to speak with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', he heard the voice speaking to him from between the two cherubim above the Ark’s cover—the place of atonement—that rests on the Ark of the Covenant.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:89 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ark of the Testimony.
      marker-yv: yv-n
    - type: text
      text: ' The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to him from there.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But he gave none of the wagons or oxen to the Kohathite division, since they were required to carry the sacred objects of the Tabernacle on their shoulders.
