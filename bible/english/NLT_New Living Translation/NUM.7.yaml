  '8':
  - type: text
    content: 'and he gave four wagons and eight oxen to the Merarite division for their work. All their work was done under the leadership of Ithamar son of Aaron the priest. '
  '80':
  - type: text
    content: 'He also brought a gold container weighing four ounces, which was filled with incense. '
