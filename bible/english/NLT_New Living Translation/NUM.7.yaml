  '84':
  - type: text
    content: 'So this was the dedication offering brought by the leaders of Israel at the time the altar was anointed: twelve silver platters, twelve silver basins, and twelve gold incense containers. '
  '85':
  - type: text
    content: Each silver platter weighed 3-1/4 pounds, and each silver basin weighed 1-3/4 pounds. The total weight of the silver was 60 pounds
  - type: note
    content: Hebrew 2,400 [shekels] [27.6 kilograms].
  - type: text
    content: ' (as measured by the weight of the sanctuary shekel). '
  '86':
  - type: text
    content: Each of the twelve gold containers that was filled with incense weighed four ounces (as measured by the weight of the sanctuary shekel). The total weight of the gold was three pounds.
  - type: note
    content: Hebrew 120 [shekels] [1.4 kilograms].
  - type: text
    content: ' '
  '87':
  - type: text
    content: 'Twelve young bulls, twelve rams, and twelve one-year-old male lambs were donated for the burnt offerings, along with their prescribed grain offerings. Twelve male goats were brought for the sin offerings. '
  '88':
  - type: text
    content: Twenty-four bulls, sixty rams, sixty male goats, and sixty one-year-old male lambs were donated for the peace offerings. This was the dedication offering for the altar after it was anointed.
  '89':
  - type: text
    content: 'Whenever Moses went into the Tabernacle to speak with the '
  - type: text
    content: Lord
  - type: text
    content: ', he heard the voice speaking to him from between the two cherubim above the Ark’s cover—the place of atonement—that rests on the Ark of the Covenant.'
  - type: note
    content: Or Ark of the Testimony.
  - type: text
    content: ' The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to him from there.'
  '9':
  - type: text
    content: But he gave none of the wagons or oxen to the Kohathite division, since they were required to carry the sacred objects of the Tabernacle on their shoulders.
