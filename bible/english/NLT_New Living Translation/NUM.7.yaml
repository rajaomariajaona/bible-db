verses:
  '1':
  - type: heading
    content: Offerings of Dedication
  - type: text
    content: 'On the day Moses set up the Tabernacle, he anointed it and set it apart as holy. He also anointed and set apart all its furnishings and the altar with its utensils. '
  '10':
  - type: text
    content: 'The leaders also presented dedication gifts for the altar at the time it was anointed. They each placed their gifts before the altar. '
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Let one leader bring his gift each day for the dedication of the altar.”'
  '12':
  - type: text
    content: On the first day Nahshon son of Amminadab, leader of the tribe of Judah, presented his offering.
  '13':
  - type: text
    content: His offering consisted of a silver platter weighing 3-1/4 pounds and a silver basin weighing 1-3/4 pounds
  - type: note
    content: Hebrew silver platter weighing 130 [shekels] [1.5 kilograms] and a silver basin weighing 70 shekels [800 grams]; also in 7:19, 25, 31, 37, 43, 49, 55, 61, 67, 73, 79, 85.
  - type: text
    content: ' (as measured by the weight of the sanctuary shekel). These were both filled with grain offerings of choice flour moistened with olive oil. '
  '14':
  - type: text
    content: He also brought a gold container weighing four ounces,
  - type: note
    content: Hebrew 10 [shekels] [114 grams]; also in 7:20, 26, 32, 38, 44, 50, 56, 62, 68, 74, 80, 86.
  - type: text
    content: ' which was filled with incense. '
  '15':
  - type: text
    content: 'He brought a young bull, a ram, and a one-year-old male lamb for a burnt offering, '
  '16':
  - type: text
    content: 'and a male goat for a sin offering. '
  '17':
  - type: text
    content: For a peace offering he brought two bulls, five rams, five male goats, and five one-year-old male lambs. This was the offering brought by Nahshon son of Amminadab.
  '18':
  - type: text
    content: On the second day Nethanel son of Zuar, leader of the tribe of Issachar, presented his offering.
  '19':
  - type: text
    content: 'His offering consisted of a silver platter weighing 3-1/4 pounds and a silver basin weighing 1-3/4 pounds (as measured by the weight of the sanctuary shekel). These were both filled with grain offerings of choice flour moistened with olive oil. '
  '2':
  - type: text
    content: 'Then the leaders of Israel—the tribal leaders who had registered the troops—came and brought their offerings. '
  '20':
  - type: text
    content: 'He also brought a gold container weighing four ounces, which was filled with incense. '
