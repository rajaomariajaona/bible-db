    marker-yv: yv-n
  - type: text
    text: ' which was filled with incense. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He brought a young bull, a ram, and a one-year-old male lamb for a burnt offering, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and a male goat for a sin offering. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For a peace offering he brought two bulls, five rams, five male goats, and five one-year-old male lambs. This was the offering brought by Nahshon son of Amminadab.
