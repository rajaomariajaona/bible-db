document_id: JER.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah’s Escape from Death
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This message came to Jeremiah from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' early in the reign of Jehoiakim son of Josiah,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The first year of Jehoiakim’s reign was 608 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b.c.
    marker-yv: yv-n
  - type: text
    text: ' king of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Stand in the courtyard in front of the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and make an announcement to the people who have come there to worship from all over Judah. Give them my entire message; include every word. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Perhaps they will listen and turn from their evil ways. Then I will change my mind about the disaster I am ready to pour out on them because of their sins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“Say to them, ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: If you will not listen to me and obey my word I have given you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and if you will not listen to my servants, the prophets—for I sent them again and again to warn you, but you would not listen to them— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: then I will destroy this Temple as I destroyed Shiloh, the place where the Tabernacle was located. And I will make Jerusalem an object of cursing in every nation on earth.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The priests, the prophets, and all the people listened to Jeremiah as he spoke in front of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But when Jeremiah had finished his message, saying everything the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had told him to say, the priests and prophets and all the people at the Temple mobbed him. “Kill him!” they shouted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“What right do you have to prophesy in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s name that this Temple will be destroyed like Shiloh? What do you mean, saying that Jerusalem will be destroyed and left with no inhabitants?” And all the people threatened him as he stood in front of the Temple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When the officials of Judah heard what was happening, they rushed over from the palace and sat down at the New Gate of the Temple to hold court. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The priests and prophets presented their accusations to the officials and the people. “This man should die!” they said. “You have heard with your own ears what a traitor he is, for he has prophesied against this city.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then Jeremiah spoke to the officials and the people in his own defense. “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sent me to prophesy against this Temple and this city,” he said. “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave me every word that I have spoken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But if you stop your sinning and begin to obey the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, he will change his mind about this disaster that he has announced against you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'As for me, I am in your hands—do with me as you think best. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But if you kill me, rest assured that you will be killing an innocent man! The responsibility for such a deed will lie on you, on this city, and on every person living in it. For it is absolutely true that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sent me to speak every word you have heard.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then the officials and the people said to the priests and prophets, “This man does not deserve the death sentence, for he has spoken to us in the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then some of the wise old men stood and spoke to all the people assembled there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They said, “Remember when Micah of Moresheth prophesied during the reign of King Hezekiah of Judah. He told the people of Judah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mount Zion will be plowed like an open field;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jerusalem will be reduced to ruins!
- type: usfm
  marker: q1
  children:
  - type: text
    text: A thicket will grow on the heights
- type: usfm
  marker: q2
  children:
  - type: text
    text: where the Temple now stands.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mic 3:12.
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But did King Hezekiah and the people kill him for saying this? No, they turned from their sins and worshiped the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. They begged him for mercy. Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' changed his mind about the terrible disaster he had pronounced against them. So we are about to do ourselves great harm.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'At this time Uriah son of Shemaiah from Kiriath-jearim was also prophesying for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. And he predicted the same terrible disaster against the city and nation as Jeremiah did. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'When King Jehoiakim and the army officers and officials heard what he was saying, the king sent someone to kill him. But Uriah heard about the plan and escaped in fear to Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then King Jehoiakim sent Elnathan son of Acbor to Egypt along with several other men to capture Uriah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They took him prisoner and brought him back to King Jehoiakim. The king then killed Uriah with a sword and had him buried in an unmarked grave.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nevertheless, Ahikam son of Shaphan stood up for Jeremiah and persuaded the court not to turn him over to the mob to be killed.
