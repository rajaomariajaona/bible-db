document_id: 2CO.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greetings from Paul
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: This letter is from Paul, chosen by the will of God to be an apostle of Christ Jesus, and from our brother Timothy.
  - type: usfm
    marker: p
    children:
    - type: text
      text: I am writing to God’s church in Corinth and to all of his holy people throughout Greece.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Achaia, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: the southern region of the Greek peninsula.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And he did rescue us from mortal danger, and he will rescue us again. We have placed our confidence in him, and he will continue to rescue us. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: And you are helping us by praying for us. Then many people will give thanks because God has graciously answered so many prayers for our safety.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Change of Plans
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: We can say with confidence and a clear conscience that we have lived with a God-given holiness
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: honesty.
      marker-yv: yv-n
    - type: text
      text: ' and sincerity in all our dealings. We have depended on God’s grace, not on our own human wisdom. That is how we have conducted ourselves before the world, and especially toward you. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Our letters have been straightforward, and there is nothing written between the lines and nothing you can’t understand. I hope someday you will fully understand us, '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: even if you don’t understand us now. Then on the day when the Lord Jesus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: our Lord Jesus.
      marker-yv: yv-n
    - type: text
      text: ' returns, you will be proud of us in the same way we are proud of you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Since I was so sure of your understanding and trust, I wanted to give you a double blessing by visiting you twice— '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: first on my way to Macedonia and again when I returned from Macedonia.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:16 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Macedonia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was in the northern region of Greece.
      marker-yv: yv-n
    - type: text
      text: ' Then you could send me on my way to Judea.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'You may be asking why I changed my plan. Do you think I make my plans carelessly? Do you think I am like people of the world who say “Yes” when they really mean “No”? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'As surely as God is faithful, our word to you does not waver between “Yes” and “No.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: For Jesus Christ, the Son of God, does not waver between “Yes” and “No.” He is the one whom Silas,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Silvanus.
      marker-yv: yv-n
    - type: text
      text: ' Timothy, and I preached to you, and as God’s ultimate “Yes,” he always does what he says. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: May God our Father and the Lord Jesus Christ give you grace and peace.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Offers Comfort to All
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: For all of God’s promises have been fulfilled in Christ with a resounding “Yes!” And through Christ, our “Amen” (which means “Yes”) ascends to God for his glory.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'It is God who enables us, along with you, to stand firm for Christ. He has commissioned us, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: and he has identified us as his own by placing the Holy Spirit in our hearts as the first installment that guarantees everything he has promised us.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Now I call upon God as my witness that I am telling the truth. The reason I didn’t return to Corinth was to spare you from a severe rebuke. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: But that does not mean we want to dominate you by telling you how to put your faith into practice. We want to work together with you so you will be full of joy, for it is by your own faith that you stand firm.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'All praise to God, the Father of our Lord Jesus Christ. God is our merciful Father and the source of all comfort. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He comforts us in all our troubles so that we can comfort others. When they are troubled, we will be able to give them the same comfort God has given us. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For the more we suffer for Christ, the more God will shower us with his comfort through Christ. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Even when we are weighed down with troubles, it is for your comfort and salvation! For when we ourselves are comforted, we will certainly comfort you. Then you can patiently endure the same things we suffer. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: We are confident that as you share in our sufferings, you will also share in the comfort God gives us.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: We think you ought to know, dear brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers.
      marker-yv: yv-n
    - type: text
      text: ' about the trouble we went through in the province of Asia. We were crushed and overwhelmed beyond our ability to endure, and we thought we would never live through it. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'In fact, we expected to die. But as a result, we stopped relying on ourselves and learned to rely only on God, who raises the dead. '
