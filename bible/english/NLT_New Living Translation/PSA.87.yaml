document_id: PSA.87,116
type_code: eng
verses:
  '1':
  - type: text
    content: A song. A psalm of the descendants of Korah.
  - type: text
    content: On the holy mountain
  - type: text
    content: 'stands the city founded by the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: He loves the city of Jerusalem
  - type: text
    content: more than any other city in Israel.
  - type: note
    content: Hebrew He loves the gates of Zion more than all the dwellings of Jacob. See note on 44:4.
  '3':
  - type: text
    content: O city of God,
  - type: text
    content: 'what glorious things are said of you! '
  - type: text
    content: Interlude
  '4':
  - type: text
    content: I will count Egypt
  - type: note
    content: Hebrew Rahab, the name of a mythical sea monster that represents chaos in ancient literature. The name is used here as a poetic name for Egypt.
  - type: text
    content: ' and Babylon among those who know me—'
  - type: text
    content: also Philistia and Tyre, and even distant Ethiopia.
  - type: note
    content: Hebrew Cush.
  - type: text
    content: They have all become citizens of Jerusalem!
  '5':
  - type: text
    content: Regarding Jerusalem
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ' it will be said,'
  - type: text
    content: “Everyone enjoys the rights of citizenship there.”
  - type: text
    content: And the Most High will personally bless this city.
  '6':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' registers the nations, he will say,'
  - type: text
    content: '“They have all become citizens of Jerusalem.” '
  - type: text
    content: Interlude
  '7':
  - type: text
    content: The people will play flutes
  - type: note
    content: Or will dance.
  - type: text
    content: ' and sing,'
  - type: text
    content: “The source of my life springs from Jerusalem!”
