document_id: EST.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Victory of the Jews
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: So on March 7
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on the thirteenth day of the twelfth month, the month of Adar, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'of the ancient Hebrew lunar calendar. This day was March 7, 473 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ; also see note on 2:16.
      marker-yv: yv-n
    - type: text
      text: ' the two decrees of the king were put into effect. On that day, the enemies of the Jews had hoped to overpower them, but quite the opposite happened. It was the Jews who overpowered their enemies. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: the ten sons of Haman son of Hammedatha, the enemy of the Jews. But they did not take any plunder.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'That very day, when the king was informed of the number of people killed in the fortress of Susa, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: he called for Queen Esther. He said, “The Jews have killed 500 men in the fortress of Susa alone, as well as Haman’s ten sons. If they have done that here, what has happened in the rest of the provinces? But now, what more do you want? It will be granted to you; tell me and I will do it.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Esther responded, “If it please the king, give the Jews in Susa permission to do again tomorrow as they have done today, and let the bodies of Haman’s ten sons be impaled on a pole.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So the king agreed, and the decree was announced in Susa. And they impaled the bodies of Haman’s ten sons. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then the Jews at Susa gathered together on March 8
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the fourteenth day of the month of Adar, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'of the ancient Hebrew lunar calendar. This day was March 8, 473 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ; also see note on 2:16.
      marker-yv: yv-n
    - type: text
      text: ' and killed 300 more men, and again they took no plunder.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Meanwhile, the other Jews throughout the king’s provinces had gathered together to defend their lives. They gained relief from all their enemies, killing 75,000 of those who hated them. But they did not take any plunder. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: This was done throughout the provinces on March 7, and on March 8 they rested,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on the thirteenth day of the month of Adar, and on the fourteenth day they rested. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'These days were March 7 and 8, 473 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: ; also see note on 2:16.
      marker-yv: yv-n
    - type: text
      text: ' celebrating their victory with a day of feasting and gladness. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: (The Jews at Susa killed their enemies on March 7 and again on March 8, then rested on March 9,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'killed their enemies on the thirteenth day and the fourteenth day, and then rested on the fifteenth day, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: of the Hebrew month of Adar.
      marker-yv: yv-n
    - type: text
      text: ' making that their day of feasting and gladness.) '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: So to this day, rural Jews living in remote villages celebrate an annual festival and holiday on the appointed day in late winter,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on the fourteenth day of the month of Adar. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This day of the ancient Hebrew lunar calendar occurs in February or March.
      marker-yv: yv-n
    - type: text
      text: ' when they rejoice and send gifts of food to each other.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Festival of Purim
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The Jews gathered in their cities throughout all the king’s provinces to attack anyone who tried to harm them. But no one could make a stand against them, for everyone was afraid of them. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mordecai recorded these events and sent letters to the Jews near and far, throughout all the provinces of King Xerxes, '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: calling on them to celebrate an annual festival on these two days.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on the fourteenth and fifteenth days of Adar, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: of the ancient Hebrew lunar calendar.
      marker-yv: yv-n
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: He told them to celebrate these days with feasting and gladness and by giving gifts of food to each other and presents to the poor. This would commemorate a time when the Jews gained relief from their enemies, when their sorrow was turned into gladness and their mourning into joy.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So the Jews accepted Mordecai’s proposal and adopted this annual custom. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Haman son of Hammedatha the Agagite, the enemy of the Jews, had plotted to crush and destroy them on the date determined by casting lots (the lots were called '
    - type: usfm
      marker: it
      children:
      - type: text
        text: purim
    - type: text
      text: '). '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But when Esther came before the king, he issued a decree causing Haman’s evil plot to backfire, and Haman and his sons were impaled on a sharpened pole. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: That is why this celebration is called Purim, because it is the ancient word for casting lots.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So because of Mordecai’s letter and because of what they had experienced, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'the Jews throughout the realm agreed to inaugurate this tradition and to pass it on to their descendants and to all who became Jews. They declared they would never fail to celebrate these two prescribed days at the appointed time each year. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: These days would be remembered and kept from generation to generation and celebrated by every family throughout the provinces and cities of the empire. This Festival of Purim would never cease to be celebrated among the Jews, nor would the memory of what happened ever die out among their descendants.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then Queen Esther, the daughter of Abihail, along with Mordecai the Jew, wrote another letter putting the queen’s full authority behind Mordecai’s letter to establish the Festival of Purim. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And all the nobles of the provinces, the highest officers, the governors, and the royal officials helped the Jews for fear of Mordecai. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Letters wishing peace and security were sent to the Jews throughout the 127 provinces of the empire of Xerxes. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'These letters established the Festival of Purim—an annual celebration of these days at the appointed time, decreed by both Mordecai the Jew and Queen Esther. (The people decided to observe this festival, just as they had decided for themselves and their descendants to establish the times of fasting and mourning.) '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: So the command of Esther confirmed the practices of Purim, and it was all written down in the records.
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For Mordecai had been promoted in the king’s palace, and his fame spread throughout all the provinces as he became more and more powerful.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So the Jews went ahead on the appointed day and struck down their enemies with the sword. They killed and annihilated their enemies and did as they pleased with those who hated them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'In the fortress of Susa itself, the Jews killed 500 men. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'They also killed Parshandatha, Dalphon, Aspatha, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Poratha, Adalia, Aridatha, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Parmashta, Arisai, Aridai, and Vaizatha— '
