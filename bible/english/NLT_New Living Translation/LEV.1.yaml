document_id: LEV.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Procedures for the Burnt Offering
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' called to Moses from the Tabernacle'
  - type: note
    content: Hebrew Tent of Meeting; also in 1:3, 5.
  - type: text
    content: ' and said to him, '
  '10':
  - type: text
    content: '“If the animal you present as a burnt offering is from the flock, it may be either a sheep or a goat, but it must be a male with no defects. '
  '11':
  - type: text
    content: 'Slaughter the animal on the north side of the altar in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence, and Aaron’s sons, the priests, will splatter its blood against all sides of the altar. '
  '12':
  - type: text
    content: 'Then cut the animal in pieces, and the priests will arrange the pieces of the offering, including the head and fat, on the wood burning on the altar. '
  '13':
  - type: text
    content: 'But the internal organs and the legs must first be washed with water. Then the priest will burn the entire sacrifice on the altar as a burnt offering. It is a special gift, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '14':
  - type: text
    content: '“If you present a bird as a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', choose either a turtledove or a young pigeon. '
  '15':
  - type: text
    content: 'The priest will take the bird to the altar, wring off its head, and burn it on the altar. But first he must drain its blood against the side of the altar. '
  '16':
  - type: text
    content: The priest must also remove the crop and the feathers
  - type: note
    content: Or the crop and its contents. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' and throw them in the ashes on the east side of the altar. '
  '17':
  - type: text
    content: 'Then, grasping the bird by its wings, the priest will tear the bird open, but without tearing it apart. Then he will burn it as a burnt offering on the wood burning on the altar. It is a special gift, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: '“Give the following instructions to the people of Israel. When you present an animal as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', you may take it from your herd of cattle or your flock of sheep and goats.'
  '3':
  - type: text
    content: “If the animal you present as a burnt offering is from the herd, it must be a male with no defects. Bring it to the entrance of the Tabernacle so you
  - type: note
    content: Or it.
  - type: text
    content: ' may be accepted by the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Lay your hand on the animal’s head, and the '
  - type: text
    content: Lord
  - type: text
    content: ' will accept its death in your place to purify you, making you right with him.'
  - type: note
    content: Or to make atonement for you.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Then slaughter the young bull in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence, and Aaron’s sons, the priests, will present the animal’s blood by splattering it against all sides of the altar that stands at the entrance to the Tabernacle. '
  '6':
  - type: text
    content: 'Then skin the animal and cut it into pieces. '
  '7':
  - type: text
    content: 'The sons of Aaron the priest will build a wood fire on the altar. '
  '8':
  - type: text
    content: 'They will arrange the pieces of the offering, including the head and fat, on the wood burning on the altar. '
  '9':
  - type: text
    content: 'But the internal organs and the legs must first be washed with water. Then the priest will burn the entire sacrifice on the altar as a burnt offering. It is a special gift, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: .
