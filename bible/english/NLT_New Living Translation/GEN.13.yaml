document_id: GEN.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abram and Lot Separate
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So Abram left Egypt and traveled north into the Negev, along with his wife and Lot and all that they owned. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lot took a long look at the fertile plains of the Jordan Valley in the direction of Zoar. The whole area was well watered everywhere, like the garden of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' or the beautiful land of Egypt. (This was before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' destroyed Sodom and Gomorrah.) '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lot chose for himself the whole Jordan Valley to the east of them. He went there with his flocks and servants and parted company with his uncle Abram. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Abram settled in the land of Canaan, and Lot moved his tents to a place near Sodom and settled among the cities of the plain. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people of this area were extremely wicked and constantly sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Lot had gone, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Abram, “Look as far as you can see in every direction—north and south, east and west. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I am giving all this land, as far as you can see, to you and your descendants
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'seed; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 13:16.
      marker-yv: yv-n
    - type: text
      text: ' as a permanent possession. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will give you so many descendants that, like the dust of the earth, they cannot be counted! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Go and walk through the land in every direction, for I am giving it to you.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Abram moved his camp to Hebron and settled near the oak grove belonging to Mamre. There he built another altar to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '(Abram was very rich in livestock, silver, and gold.) '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'From the Negev, they continued traveling by stages toward Bethel, and they pitched their tents between Bethel and Ai, where they had camped before. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This was the same place where Abram had built the altar, and there he worshiped the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' again.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lot, who was traveling with Abram, had also become very wealthy with flocks of sheep and goats, herds of cattle, and many tents. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the land could not support both Abram and Lot with all their flocks and herds living so close together. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So disputes broke out between the herdsmen of Abram and Lot. (At that time Canaanites and Perizzites were also living in the land.)
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finally Abram said to Lot, “Let’s not allow this conflict to come between us or our herdsmen. After all, we are close relatives! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The whole countryside is open to you. Take your choice of any section of the land you want, and we will separate. If you want the land to the left, then I’ll take the land on the right. If you prefer the land on the right, then I’ll go to the left.”
