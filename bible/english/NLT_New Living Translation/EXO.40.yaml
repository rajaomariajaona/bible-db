document_id: EXO.40,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tabernacle Completed
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'Anoint the altar of burnt offering and its utensils to consecrate them. Then the altar will become absolutely holy. '
  '11':
  - type: text
    content: Next anoint the washbasin and its stand to consecrate them.
  '12':
  - type: text
    content: '“Present Aaron and his sons at the entrance of the Tabernacle, and wash them with water. '
  '13':
  - type: text
    content: 'Dress Aaron with the sacred garments and anoint him, consecrating him to serve me as a priest. '
  '14':
  - type: text
    content: 'Then present his sons and dress them in their tunics. '
  '15':
  - type: text
    content: Anoint them as you did their father, so they may also serve me as priests. With their anointing, Aaron’s descendants are set apart for the priesthood forever, from generation to generation.”
  '16':
  - type: text
    content: 'Moses proceeded to do everything just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him. '
  '17':
  - type: text
    content: 'So the Tabernacle was set up on the first day of the first month of the second year. '
  '18':
  - type: text
    content: 'Moses erected the Tabernacle by setting down its bases, inserting the frames, attaching the crossbars, and setting up the posts. '
  '19':
  - type: text
    content: 'Then he spread the coverings over the Tabernacle framework and put on the protective layers, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him.'
  '2':
  - type: text
    content: “Set up the Tabernacle
  - type: note
    content: Hebrew the Tabernacle, the Tent of Meeting; also in 40:6, 29.
  - type: text
    content: ' on the first day of the new year.'
  - type: note
    content: Hebrew the first day of the first month. This day of the ancient Hebrew lunar calendar occurred in March or April.
  - type: text
    content: ' '
  '20':
  - type: text
    content: He took the stone tablets inscribed with the terms of the covenant and placed them
  - type: note
    content: Hebrew He placed the Testimony; see note on 25:16.
  - type: text
    content: ' inside the Ark. Then he attached the carrying poles to the Ark, and he set the Ark’s cover—the place of atonement—on top of it. '
  '21':
  - type: text
    content: 'Then he brought the Ark of the Covenant into the Tabernacle and hung the inner curtain to shield it from view, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him.'
  '22':
  - type: text
    content: 'Next Moses placed the table in the Tabernacle, along the north side of the Holy Place, just outside the inner curtain. '
  '23':
  - type: text
    content: 'And he arranged the Bread of the Presence on the table before the '
  - type: text
    content: Lord
  - type: text
    content: ', just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him.'
  '24':
  - type: text
    content: 'He set the lampstand in the Tabernacle across from the table on the south side of the Holy Place. '
  '25':
  - type: text
    content: 'Then he lit the lamps in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him. '
  '26':
  - type: text
    content: 'He also placed the gold incense altar in the Tabernacle, in the Holy Place in front of the inner curtain. '
  '27':
  - type: text
    content: 'On it he burned the fragrant incense, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him.'
  '28':
  - type: text
    content: 'He hung the curtain at the entrance of the Tabernacle, '
  '29':
  - type: text
    content: 'and he placed the altar of burnt offering near the Tabernacle entrance. On it he offered a burnt offering and a grain offering, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him.'
  '3':
  - type: text
    content: Place the Ark of the Covenant
  - type: note
    content: Or Ark of the Testimony; also in 40:5, 21.
  - type: text
    content: ' inside, and install the inner curtain to enclose the Ark within the Most Holy Place. '
  '30':
  - type: text
    content: 'Next Moses placed the washbasin between the Tabernacle and the altar. He filled it with water so the priests could wash themselves. '
  '31':
  - type: text
    content: 'Moses and Aaron and Aaron’s sons used water from it to wash their hands and feet. '
  '32':
  - type: text
    content: 'Whenever they approached the altar and entered the Tabernacle, they washed themselves, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '33':
  - type: text
    content: Then he hung the curtains forming the courtyard around the Tabernacle and the altar. And he set up the curtain at the entrance of the courtyard. So at last Moses finished the work.
  - type: heading
    content: The Lord’s Glory Fills the Tabernacle
  '34':
  - type: text
    content: 'Then the cloud covered the Tabernacle, and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the Tabernacle. '
  '35':
  - type: text
    content: 'Moses could no longer enter the Tabernacle because the cloud had settled down over it, and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the Tabernacle.'
  '36':
  - type: text
    content: 'Now whenever the cloud lifted from the Tabernacle, the people of Israel would set out on their journey, following it. '
  '37':
  - type: text
    content: 'But if the cloud did not rise, they remained where they were until it lifted. '
  '38':
  - type: text
    content: 'The cloud of the '
  - type: text
    content: Lord
  - type: text
    content: ' hovered over the Tabernacle during the day, and at night fire glowed inside the cloud so the whole family of Israel could see it. This continued throughout all their journeys.'
  '4':
  - type: text
    content: Then bring in the table, and arrange the utensils on it. And bring in the lampstand, and set up the lamps.
  '5':
  - type: text
    content: '“Place the gold incense altar in front of the Ark of the Covenant. Then hang the curtain at the entrance of the Tabernacle. '
  '6':
  - type: text
    content: 'Place the altar of burnt offering in front of the Tabernacle entrance. '
  '7':
  - type: text
    content: Set the washbasin between the Tabernacle
  - type: note
    content: Hebrew Tent of Meeting; also in 40:12, 22, 24, 26, 30, 32, 34, 35.
  - type: text
    content: ' and the altar, and fill it with water. '
  '8':
  - type: text
    content: Then set up the courtyard around the outside of the tent, and hang the curtain for the courtyard entrance.
  '9':
  - type: text
    content: '“Take the anointing oil and anoint the Tabernacle and all its furnishings to consecrate them and make them holy. '
