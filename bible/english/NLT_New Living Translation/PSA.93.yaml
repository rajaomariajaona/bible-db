document_id: PSA.93,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is king! He is robed in majesty.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Indeed, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is robed in majesty and armed with strength.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The world stands firm
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cannot be shaken.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Your throne, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', has stood from time immemorial.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You yourself are from the everlasting past.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The floods have risen up, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The floods have roared like thunder;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the floods have lifted their pounding waves.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But mightier than the violent raging of the seas,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mightier than the breakers on the shore—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' above is mightier than these!'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Your royal laws cannot be changed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Your reign, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', is holy forever and ever.'
