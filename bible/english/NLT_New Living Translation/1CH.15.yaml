document_id: 1CH.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Preparing to Move the Ark
  - type: text
    content: 'David now built several buildings for himself in the City of David. He also prepared a place for the Ark of God and set up a special tent for it. '
  '10':
  - type: text
    content: From the descendants of Uzziel, 112, with Amminadab as their leader.
  '11':
  - type: text
    content: 'Then David summoned the priests, Zadok and Abiathar, and these Levite leaders: Uriel, Asaiah, Joel, Shemaiah, Eliel, and Amminadab. '
  '12':
  - type: text
    content: 'He said to them, “You are the leaders of the Levite families. You must purify yourselves and all your fellow Levites, so you can bring the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, to the place I have prepared for it. '
  '13':
  - type: text
    content: 'Because you Levites did not carry the Ark the first time, the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God burst out against us. We failed to ask God how to move it properly.” '
  '14':
  - type: text
    content: 'So the priests and the Levites purified themselves in order to bring the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, to Jerusalem. '
  '15':
  - type: text
    content: 'Then the Levites carried the Ark of God on their shoulders with its carrying poles, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had instructed Moses.'
  '16':
  - type: text
    content: 'David also ordered the Levite leaders to appoint a choir of Levites who were singers and musicians to sing joyful songs to the accompaniment of harps, lyres, and cymbals. '
  '17':
  - type: text
    content: 'So the Levites appointed Heman son of Joel along with his fellow Levites: Asaph son of Berekiah, and Ethan son of Kushaiah from the clan of Merari. '
  '18':
  - type: text
    content: 'The following men were chosen as their assistants: Zechariah, Jaaziel,'
  - type: note
    content: As in several Hebrew manuscripts and Greek version (see also parallel lists in 15:20; 16:5); Masoretic Text reads Zechariah ben Jaaziel.
  - type: text
    content: ' Shemiramoth, Jehiel, Unni, Eliab, Benaiah, Maaseiah, Mattithiah, Eliphelehu, Mikneiah, and the gatekeepers—Obed-edom and Jeiel.'
  '19':
  - type: text
    content: 'The musicians Heman, Asaph, and Ethan were chosen to sound the bronze cymbals. '
  '2':
  - type: text
    content: 'Then he commanded, “No one except the Levites may carry the Ark of God. The '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen them to carry the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' and to serve him forever.”'
  '20':
  - type: text
    content: Zechariah, Aziel, Shemiramoth, Jehiel, Unni, Eliab, Maaseiah, and Benaiah were chosen to play the harps.
  - type: note
    content: Hebrew adds according to Alamoth, which is probably a musical term. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Mattithiah, Eliphelehu, Mikneiah, Obed-edom, Jeiel, and Azaziah were chosen to play the lyres.
  - type: note
    content: Hebrew adds according to the Sheminith, which is probably a musical term. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Kenaniah, the head Levite, was chosen as the choir leader because of his skill.
  '23':
  - type: text
    content: Berekiah and Elkanah were chosen to guard
  - type: note
    content: Hebrew chosen as gatekeepers for; also in 15:24.
  - type: text
    content: ' the Ark. '
  '24':
  - type: text
    content: Shebaniah, Joshaphat, Nethanel, Amasai, Zechariah, Benaiah, and Eliezer—all of whom were priests—were chosen to blow the trumpets as they marched in front of the Ark of God. Obed-edom and Jehiah were chosen to guard the Ark.
  - type: heading
    content: Moving the Ark to Jerusalem
  '25':
  - type: text
    content: Then David and the elders of Israel and the generals of the army
  - type: note
    content: Hebrew the commanders of thousands.
  - type: text
    content: ' went to the house of Obed-edom to bring the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Covenant up to Jerusalem with a great celebration. '
  '26':
  - type: text
    content: 'And because God was clearly helping the Levites as they carried the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Covenant, they sacrificed seven bulls and seven rams.
  '27':
  - type: text
    content: David was dressed in a robe of fine linen, as were all the Levites who carried the Ark, and also the singers, and Kenaniah the choir leader. David was also wearing a priestly garment.
  - type: note
    content: Hebrew a linen ephod.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'So all Israel brought up the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Covenant with shouts of joy, the blowing of rams’ horns and trumpets, the crashing of cymbals, and loud playing on harps and lyres.
  '29':
  - type: text
    content: 'But as the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ’s Covenant entered the City of David, Michal, the daughter of Saul, looked down from her window. When she saw King David skipping about and laughing with joy, she was filled with contempt for him.
  '3':
  - type: text
    content: 'Then David summoned all Israel to Jerusalem to bring the Ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' to the place he had prepared for it. '
  '4':
  - type: text
    content: 'This is the number of the descendants of Aaron (the priests) and the Levites who were called together:'
  '5':
  - type: text
    content: From the clan of Kohath, 120, with Uriel as their leader.
  '6':
  - type: text
    content: From the clan of Merari, 220, with Asaiah as their leader.
  '7':
  - type: text
    content: From the clan of Gershon,
  - type: note
    content: Hebrew Gershom, a variant spelling of Gershon.
  - type: text
    content: ' 130, with Joel as their leader.'
  '8':
  - type: text
    content: From the descendants of Elizaphan, 200, with Shemaiah as their leader.
  '9':
  - type: text
    content: From the descendants of Hebron, 80, with Eliel as their leader.
