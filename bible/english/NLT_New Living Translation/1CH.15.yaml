document_id: 1CH.15,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Preparing to Move the Ark
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'David now built several buildings for himself in the City of David. He also prepared a place for the Ark of God and set up a special tent for it. '
  '10':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: From the descendants of Uzziel, 112, with Amminadab as their leader.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David summoned the priests, Zadok and Abiathar, and these Levite leaders: Uriel, Asaiah, Joel, Shemaiah, Eliel, and Amminadab. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them, “You are the leaders of the Levite families. You must purify yourselves and all your fellow Levites, so you can bring the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, to the place I have prepared for it. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because you Levites did not carry the Ark the first time, the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God burst out against us. We failed to ask God how to move it properly.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the priests and the Levites purified themselves in order to bring the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, to Jerusalem. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Levites carried the Ark of God on their shoulders with its carrying poles, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had instructed Moses.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David also ordered the Levite leaders to appoint a choir of Levites who were singers and musicians to sing joyful songs to the accompaniment of harps, lyres, and cymbals. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Levites appointed Heman son of Joel along with his fellow Levites: Asaph son of Berekiah, and Ethan son of Kushaiah from the clan of Merari. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The following men were chosen as their assistants: Zechariah, Jaaziel,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in several Hebrew manuscripts and Greek version (see also parallel lists in 15:20; 16:5); Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zechariah ben Jaaziel.
      marker-yv: yv-n
    - type: text
      text: ' Shemiramoth, Jehiel, Unni, Eliab, Benaiah, Maaseiah, Mattithiah, Eliphelehu, Mikneiah, and the gatekeepers—Obed-edom and Jeiel.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The musicians Heman, Asaph, and Ethan were chosen to sound the bronze cymbals. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then he commanded, “No one except the Levites may carry the Ark of God. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has chosen them to carry the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and to serve him forever.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Zechariah, Aziel, Shemiramoth, Jehiel, Unni, Eliab, Maaseiah, and Benaiah were chosen to play the harps.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew adds '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'according to Alamoth, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: which is probably a musical term. The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mattithiah, Eliphelehu, Mikneiah, Obed-edom, Jeiel, and Azaziah were chosen to play the lyres.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew adds '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'according to the Sheminith, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: which is probably a musical term. The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kenaniah, the head Levite, was chosen as the choir leader because of his skill.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Berekiah and Elkanah were chosen to guard
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'chosen as gatekeepers for; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 15:24.
      marker-yv: yv-n
    - type: text
      text: ' the Ark. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Shebaniah, Joshaphat, Nethanel, Amasai, Zechariah, Benaiah, and Eliezer—all of whom were priests—were chosen to blow the trumpets as they marched in front of the Ark of God. Obed-edom and Jehiah were chosen to guard the Ark.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moving the Ark to Jerusalem
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then David and the elders of Israel and the generals of the army
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the commanders of thousands.
      marker-yv: yv-n
    - type: text
      text: ' went to the house of Obed-edom to bring the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Covenant up to Jerusalem with a great celebration. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And because God was clearly helping the Levites as they carried the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Covenant, they sacrificed seven bulls and seven rams.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David was dressed in a robe of fine linen, as were all the Levites who carried the Ark, and also the singers, and Kenaniah the choir leader. David was also wearing a priestly garment.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a linen ephod.
      marker-yv: yv-n
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all Israel brought up the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Covenant with shouts of joy, the blowing of rams’ horns and trumpets, the crashing of cymbals, and loud playing on harps and lyres.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Covenant entered the City of David, Michal, the daughter of Saul, looked down from her window. When she saw King David skipping about and laughing with joy, she was filled with contempt for him.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David summoned all Israel to Jerusalem to bring the Ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to the place he had prepared for it. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the number of the descendants of Aaron (the priests) and the Levites who were called together:'
  '5':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: From the clan of Kohath, 120, with Uriel as their leader.
  '6':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: From the clan of Merari, 220, with Asaiah as their leader.
  '7':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: From the clan of Gershon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Gershom, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Gershon.
      marker-yv: yv-n
    - type: text
      text: ' 130, with Joel as their leader.'
  '8':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: From the descendants of Elizaphan, 200, with Shemaiah as their leader.
  '9':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: From the descendants of Hebron, 80, with Eliel as their leader.
