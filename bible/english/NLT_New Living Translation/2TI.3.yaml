document_id: 2TI.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Dangers of the Last Days
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'You should know this, Timothy, that in the last days there will be very difficult times. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But you, Timothy, certainly know what I teach, and how I live, and what my purpose in life is. You know my faith, my patience, my love, and my endurance. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'You know how much persecution and suffering I have endured. You know all about how I was persecuted in Antioch, Iconium, and Lystra—but the Lord rescued me from all of it. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Yes, and everyone who wants to live a godly life in Christ Jesus will suffer persecution. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But evil people and impostors will flourish. They will deceive others and will themselves be deceived.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you must remain faithful to the things you have been taught. You know they are true, for you know you can trust those who taught you. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You have been taught the holy Scriptures from childhood, and they have given you the wisdom to receive the salvation that comes by trusting in Christ Jesus. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All Scripture is inspired by God and is useful to teach us what is true and to make us realize what is wrong in our lives. It corrects us when we are wrong and teaches us to do what is right. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: God uses it to prepare and equip his people to do every good work.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For people will love only themselves and their money. They will be boastful and proud, scoffing at God, disobedient to their parents, and ungrateful. They will consider nothing sacred. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They will be unloving and unforgiving; they will slander others and have no self-control. They will be cruel and hate what is good. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They will betray their friends, be reckless, be puffed up with pride, and love pleasure rather than God. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: They will act religious, but they will reject the power that could make them godly. Stay away from people like that!
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They are the kind who work their way into people’s homes and win the confidence of
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and take captive.
      marker-yv: yv-n
    - type: text
      text: ' vulnerable women who are burdened with the guilt of sin and controlled by various desires. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(Such women are forever following new teachings, but they are never able to understand the truth.) '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These teachers oppose the truth just as Jannes and Jambres opposed Moses. They have depraved minds and a counterfeit faith. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they won’t get away with this for long. Someday everyone will recognize what fools they are, just as with Jannes and Jambres.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Charge to Timothy
    marker-yv: yv-h
