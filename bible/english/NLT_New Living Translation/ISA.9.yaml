document_id: ISA.9,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hope in the Messiah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verse 9:1 is numbered 8:23 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: Nevertheless, that time of darkness and despair will not go on forever. The land of Zebulun and Naphtali will be humbled, but there will be a time in the future when Galilee of the Gentiles, which lies along the road that runs between the Jordan and the sea, will be filled with glory.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They said, “We will replace the broken bricks of our ruins with finished stone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and replant the felled sycamore-fig trees with cedars.”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will bring Rezin’s enemies against Israel'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stir up all their foes.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The Syrians
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Arameans.
      marker-yv: yv-n
    - type: text
      text: ' from the east and the Philistines from the west'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will bare their fangs and devour Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But even then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger will not be satisfied.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His fist is still poised to strike.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: For after all this punishment, the people will still not repent.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They will not seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Therefore, in a single day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will destroy both the head and the tail,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the noble palm branch and the lowly reed.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The leaders of Israel are the head,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the lying prophets are the tail.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: For the leaders of the people have misled them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have led them down the path of destruction.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: That is why the Lord takes no pleasure in the young men
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shows no mercy even to the widows and orphans.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they are all wicked hypocrites,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they all speak foolishness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But even then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger will not be satisfied.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His fist is still poised to strike.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: This wickedness is like a brushfire.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It burns not only briers and thorns
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but also sets the forests ablaze.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Its burning sends up clouds of smoke.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The land will be blackened
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'by the fury of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people will be fuel for the fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one will spare even his own brother.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:2a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 9:2-21 are numbered 9:1-20 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: The people who walk in darkness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will see a great light.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For those who live in a land of deep darkness,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:2b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a land where death casts its shadow. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Matt 4:16.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a light will shine.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: They will attack their neighbor on the right
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but will still be hungry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will devour their neighbor on the left
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but will not be satisfied.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the end they will even eat their own children.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: eat their own arms.
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Manasseh will feed on Ephraim,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ephraim will feed on Manasseh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and both will devour Judah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But even then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger will not be satisfied.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His fist is still poised to strike.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: You will enlarge the nation of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and its people will rejoice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will rejoice before you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as people rejoice at the harvest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and like warriors dividing the plunder.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For you will break the yoke of their slavery
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lift the heavy burden from their shoulders.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will break the oppressor’s rod,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as you did when you destroyed the army of Midian.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The boots of the warrior
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the uniforms bloodstained by war
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will all be burned.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be fuel for the fire.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For a child is born to us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a son is given to us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The government will rest on his shoulders.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And he will be called:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wonderful Counselor,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Wonderful, Counselor.
      marker-yv: yv-n
    - type: text
      text: ' Mighty God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Everlasting Father, Prince of Peace.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: His government and its peace
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will never end.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will rule with fairness and justice from the throne of his ancestor David
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all eternity.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The passionate commitment of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will make this happen!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Anger against Israel
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The Lord has spoken out against Jacob;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his judgment has fallen upon Israel.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: And the people of Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of Ephraim, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referring to the northern kingdom of Israel.
      marker-yv: yv-n
    - type: text
      text: ' and Samaria,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who spoke with such pride and arrogance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will soon know it.
