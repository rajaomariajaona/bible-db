document_id: ISA.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Hope in the Messiah
  - type: text
    content: ' '
  - type: note
    content: Verse 9:1 is numbered 8:23 in Hebrew text.
  - type: text
    content: Nevertheless, that time of darkness and despair will not go on forever. The land of Zebulun and Naphtali will be humbled, but there will be a time in the future when Galilee of the Gentiles, which lies along the road that runs between the Jordan and the sea, will be filled with glory.
  '10':
  - type: text
    content: They said, “We will replace the broken bricks of our ruins with finished stone,
  - type: text
    content: and replant the felled sycamore-fig trees with cedars.”
  '11':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' will bring Rezin’s enemies against Israel'
  - type: text
    content: and stir up all their foes.
  '12':
  - type: text
    content: The Syrians
  - type: note
    content: Hebrew Arameans.
  - type: text
    content: ' from the east and the Philistines from the west'
  - type: text
    content: will bare their fangs and devour Israel.
  - type: text
    content: 'But even then the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger will not be satisfied.
  - type: text
    content: His fist is still poised to strike.
  '13':
  - type: text
    content: For after all this punishment, the people will still not repent.
  - type: text
    content: 'They will not seek the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  '14':
  - type: text
    content: 'Therefore, in a single day the '
  - type: text
    content: Lord
  - type: text
    content: ' will destroy both the head and the tail,'
  - type: text
    content: the noble palm branch and the lowly reed.
  '15':
  - type: text
    content: The leaders of Israel are the head,
  - type: text
    content: and the lying prophets are the tail.
  '16':
  - type: text
    content: For the leaders of the people have misled them.
  - type: text
    content: They have led them down the path of destruction.
  '17':
  - type: text
    content: That is why the Lord takes no pleasure in the young men
  - type: text
    content: and shows no mercy even to the widows and orphans.
  - type: text
    content: For they are all wicked hypocrites,
  - type: text
    content: and they all speak foolishness.
  - type: text
    content: 'But even then the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger will not be satisfied.
  - type: text
    content: His fist is still poised to strike.
  '18':
  - type: text
    content: This wickedness is like a brushfire.
  - type: text
    content: It burns not only briers and thorns
  - type: text
    content: but also sets the forests ablaze.
  - type: text
    content: Its burning sends up clouds of smoke.
  '19':
  - type: text
    content: The land will be blackened
  - type: text
    content: 'by the fury of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  - type: text
    content: The people will be fuel for the fire,
  - type: text
    content: and no one will spare even his own brother.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Verses 9:2-21 are numbered 9:1-20 in Hebrew text.
  - type: text
    content: The people who walk in darkness
  - type: text
    content: will see a great light.
  - type: text
    content: For those who live in a land of deep darkness,
  - type: note
    content: Greek version reads a land where death casts its shadow. Compare Matt 4:16.
  - type: text
    content: a light will shine.
  '20':
  - type: text
    content: They will attack their neighbor on the right
  - type: text
    content: but will still be hungry.
  - type: text
    content: They will devour their neighbor on the left
  - type: text
    content: but will not be satisfied.
  - type: text
    content: In the end they will even eat their own children.
  - type: note
    content: Or eat their own arms.
  '21':
  - type: text
    content: Manasseh will feed on Ephraim,
  - type: text
    content: Ephraim will feed on Manasseh,
  - type: text
    content: and both will devour Judah.
  - type: text
    content: 'But even then the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger will not be satisfied.
  - type: text
    content: His fist is still poised to strike.
  '3':
  - type: text
    content: You will enlarge the nation of Israel,
  - type: text
    content: and its people will rejoice.
  - type: text
    content: They will rejoice before you
  - type: text
    content: as people rejoice at the harvest
  - type: text
    content: and like warriors dividing the plunder.
  '4':
  - type: text
    content: For you will break the yoke of their slavery
  - type: text
    content: and lift the heavy burden from their shoulders.
  - type: text
    content: You will break the oppressor’s rod,
  - type: text
    content: just as you did when you destroyed the army of Midian.
  '5':
  - type: text
    content: The boots of the warrior
  - type: text
    content: and the uniforms bloodstained by war
  - type: text
    content: will all be burned.
  - type: text
    content: They will be fuel for the fire.
  '6':
  - type: text
    content: For a child is born to us,
  - type: text
    content: a son is given to us.
  - type: text
    content: The government will rest on his shoulders.
  - type: text
    content: 'And he will be called:'
  - type: text
    content: Wonderful Counselor,
  - type: note
    content: Or Wonderful, Counselor.
  - type: text
    content: ' Mighty God,'
  - type: text
    content: Everlasting Father, Prince of Peace.
  '7':
  - type: text
    content: His government and its peace
  - type: text
    content: will never end.
  - type: text
    content: He will rule with fairness and justice from the throne of his ancestor David
  - type: text
    content: for all eternity.
  - type: text
    content: 'The passionate commitment of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies'
  - type: text
    content: will make this happen!
  - type: heading
    content: The Lord’s Anger against Israel
  '8':
  - type: text
    content: The Lord has spoken out against Jacob;
  - type: text
    content: his judgment has fallen upon Israel.
  '9':
  - type: text
    content: And the people of Israel
  - type: note
    content: Hebrew of Ephraim, referring to the northern kingdom of Israel.
  - type: text
    content: ' and Samaria,'
  - type: text
    content: who spoke with such pride and arrogance,
  - type: text
    content: will soon know it.
