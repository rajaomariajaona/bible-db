document_id: PSA.104,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Let all that I am praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, how great you are!'
  - type: text
    content: You are robed with honor and majesty.
  '10':
  - type: text
    content: You make springs pour water into the ravines,
  - type: text
    content: so streams gush down from the mountains.
  '11':
  - type: text
    content: They provide water for all the animals,
  - type: text
    content: and the wild donkeys quench their thirst.
  '12':
  - type: text
    content: The birds nest beside the streams
  - type: text
    content: and sing among the branches of the trees.
  '13':
  - type: text
    content: You send rain on the mountains from your heavenly home,
  - type: text
    content: and you fill the earth with the fruit of your labor.
  '14':
  - type: text
    content: You cause grass to grow for the livestock
  - type: text
    content: and plants for people to use.
  - type: text
    content: You allow them to produce food from the earth—
  '15':
  - type: text
    content: wine to make them glad,
  - type: text
    content: olive oil to soothe their skin,
  - type: text
    content: and bread to give them strength.
  '16':
  - type: text
    content: 'The trees of the '
  - type: text
    content: Lord
  - type: text
    content: ' are well cared for—'
  - type: text
    content: the cedars of Lebanon that he planted.
  '17':
  - type: text
    content: There the birds make their nests,
  - type: text
    content: and the storks make their homes in the cypresses.
  '18':
  - type: text
    content: High in the mountains live the wild goats,
  - type: text
    content: and the rocks form a refuge for the hyraxes.
  - type: note
    content: Or coneys, or rock badgers.
  '19':
  - type: text
    content: You made the moon to mark the seasons,
  - type: text
    content: and the sun knows when to set.
  '2':
  - type: text
    content: You are dressed in a robe of light.
  - type: text
    content: You stretch out the starry curtain of the heavens;
  '20':
  - type: text
    content: You send the darkness, and it becomes night,
  - type: text
    content: when all the forest animals prowl about.
  '21':
  - type: text
    content: Then the young lions roar for their prey,
  - type: text
    content: stalking the food provided by God.
  '22':
  - type: text
    content: At dawn they slink back
  - type: text
    content: into their dens to rest.
  '23':
  - type: text
    content: Then people go off to their work,
  - type: text
    content: where they labor until evening.
  '24':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', what a variety of things you have made!'
  - type: text
    content: In wisdom you have made them all.
  - type: text
    content: The earth is full of your creatures.
  '25':
  - type: text
    content: Here is the ocean, vast and wide,
  - type: text
    content: teeming with life of every kind,
  - type: text
    content: both large and small.
  '26':
  - type: text
    content: See the ships sailing along,
  - type: text
    content: and Leviathan,
  - type: note
    content: The identification of Leviathan is disputed, ranging from an earthly creature to a mythical sea monster in ancient literature.
  - type: text
    content: ' which you made to play in the sea.'
  '27':
  - type: text
    content: They all depend on you
  - type: text
    content: to give them food as they need it.
  '28':
  - type: text
    content: When you supply it, they gather it.
  - type: text
    content: You open your hand to feed them,
  - type: text
    content: and they are richly satisfied.
  '29':
  - type: text
    content: But if you turn away from them, they panic.
  - type: text
    content: When you take away their breath,
  - type: text
    content: they die and turn again to dust.
  '3':
  - type: text
    content: you lay out the rafters of your home in the rain clouds.
  - type: text
    content: You make the clouds your chariot;
  - type: text
    content: you ride upon the wings of the wind.
  '30':
  - type: text
    content: When you give them your breath,
  - type: note
    content: Or When you send your Spirit.
  - type: text
    content: ' life is created,'
  - type: text
    content: and you renew the face of the earth.
  '31':
  - type: text
    content: 'May the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' continue forever!'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' takes pleasure in all he has made!'
  '32':
  - type: text
    content: The earth trembles at his glance;
  - type: text
    content: the mountains smoke at his touch.
  '33':
  - type: text
    content: 'I will sing to the '
  - type: text
    content: Lord
  - type: text
    content: ' as long as I live.'
  - type: text
    content: I will praise my God to my last breath!
  '34':
  - type: text
    content: May all my thoughts be pleasing to him,
  - type: text
    content: 'for I rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: .
  '35':
  - type: text
    content: Let all sinners vanish from the face of the earth;
  - type: text
    content: let the wicked disappear forever.
  - type: text
    content: 'Let all that I am praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '4':
  - type: text
    content: The winds are your messengers;
  - type: text
    content: flames of fire are your servants.
  - type: note
    content: Greek version reads He sends his angels like the winds, / his servants like flames of fire. Compare Heb 1:7.
  '5':
  - type: text
    content: You placed the world on its foundation
  - type: text
    content: so it would never be moved.
  '6':
  - type: text
    content: You clothed the earth with floods of water,
  - type: text
    content: water that covered even the mountains.
  '7':
  - type: text
    content: At your command, the water fled;
  - type: text
    content: at the sound of your thunder, it hurried away.
  '8':
  - type: text
    content: Mountains rose and valleys sank
  - type: text
    content: to the levels you decreed.
  '9':
  - type: text
    content: Then you set a firm boundary for the seas,
  - type: text
    content: so they would never again cover the earth.
