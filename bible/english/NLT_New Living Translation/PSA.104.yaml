document_id: PSA.104,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let all that I am praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, how great you are!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are robed with honor and majesty.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You make springs pour water into the ravines,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so streams gush down from the mountains.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They provide water for all the animals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the wild donkeys quench their thirst.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The birds nest beside the streams
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sing among the branches of the trees.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You send rain on the mountains from your heavenly home,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you fill the earth with the fruit of your labor.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You cause grass to grow for the livestock
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and plants for people to use.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You allow them to produce food from the earth—
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wine to make them glad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: olive oil to soothe their skin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bread to give them strength.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The trees of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' are well cared for—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the cedars of Lebanon that he planted.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There the birds make their nests,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the storks make their homes in the cypresses.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: High in the mountains live the wild goats,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the rocks form a refuge for the hyraxes.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '104:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'coneys, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rock badgers.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You made the moon to mark the seasons,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the sun knows when to set.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are dressed in a robe of light.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You stretch out the starry curtain of the heavens;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You send the darkness, and it becomes night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when all the forest animals prowl about.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the young lions roar for their prey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stalking the food provided by God.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At dawn they slink back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into their dens to rest.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then people go off to their work,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where they labor until evening.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', what a variety of things you have made!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In wisdom you have made them all.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The earth is full of your creatures.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Here is the ocean, vast and wide,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: teeming with life of every kind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both large and small.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See the ships sailing along,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Leviathan,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '104:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The identification of Leviathan is disputed, ranging from an earthly creature to a mythical sea monster in ancient literature.
      marker-yv: yv-n
    - type: text
      text: ' which you made to play in the sea.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They all depend on you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to give them food as they need it.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you supply it, they gather it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You open your hand to feed them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they are richly satisfied.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you turn away from them, they panic.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When you take away their breath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they die and turn again to dust.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you lay out the rafters of your home in the rain clouds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You make the clouds your chariot;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you ride upon the wings of the wind.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you give them your breath,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '104:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: When you send your Spirit.
      marker-yv: yv-n
    - type: text
      text: ' life is created,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you renew the face of the earth.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' continue forever!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' takes pleasure in all he has made!'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth trembles at his glance;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the mountains smoke at his touch.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as long as I live.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will praise my God to my last breath!
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May all my thoughts be pleasing to him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for I rejoice in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all sinners vanish from the face of the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the wicked disappear forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let all that I am praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The winds are your messengers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flames of fire are your servants.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '104:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'He sends his angels like the winds, / his servants like flames of fire. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Heb 1:7.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You placed the world on its foundation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so it would never be moved.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You clothed the earth with floods of water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: water that covered even the mountains.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At your command, the water fled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the sound of your thunder, it hurried away.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mountains rose and valleys sank
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the levels you decreed.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you set a firm boundary for the seas,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so they would never again cover the earth.
