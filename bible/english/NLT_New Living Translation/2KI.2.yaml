document_id: 2KI.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elijah Taken into Heaven
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was about to take Elijah up to heaven in a whirlwind, Elijah and Elisha were traveling from Gilgal. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You have asked a difficult thing,” Elijah replied. “If you see me when I am taken from you, then you will get your request. But if not, then you won’t.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As they were walking along and talking, suddenly a chariot of fire appeared, drawn by horses of fire. It drove between the two men, separating them, and Elijah was carried by a whirlwind into heaven. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha saw it and cried out, “My father! My father! I see the chariots and charioteers of Israel!” And as they disappeared from sight, Elisha tore his clothes in distress.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisha picked up Elijah’s cloak, which had fallen when he was taken up. Then Elisha returned to the bank of the Jordan River. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He struck the water with Elijah’s cloak and cried out, “Where is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Elijah?” Then the river divided, and Elisha went across.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the group of prophets from Jericho saw from a distance what happened, they exclaimed, “Elijah’s spirit rests upon Elisha!” And they went to meet him and bowed to the ground before him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Sir,” they said, “just say the word and fifty of our strongest men will search the wilderness for your master. Perhaps the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has left him on some mountain or in some valley.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“No,” Elisha said, “don’t send them.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they kept urging him until they shamed him into agreeing, and he finally said, “All right, send them.” So fifty men searched for three days but did not find Elijah. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha was still at Jericho when they returned. “Didn’t I tell you not to go?” he asked.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elisha’s First Miracles
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: One day the leaders of the town of Jericho visited Elisha. “We have a problem, my lord,” they told him. “This town is located in pleasant surroundings, as you can see. But the water is bad, and the land is unproductive.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And Elijah said to Elisha, “Stay here, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has told me to go to Bethel.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Elisha replied, “As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives and you yourself live, I will never leave you!” So they went down together to Bethel.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisha said, “Bring me a new bowl with salt in it.” So they brought it to him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he went out to the spring that supplied the town with water and threw the salt into it. And he said, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I have purified this water. It will no longer cause death or infertility.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'or make the land unproductive; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: or barrenness.
      marker-yv: yv-n
    - type: text
      text: '” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the water has remained pure ever since, just as Elisha said.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisha left Jericho and went up to Bethel. As he was walking along the road, a group of boys from the town began mocking and making fun of him. “Go away, baldy!” they chanted. “Go away, baldy!” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisha turned around and looked at them, and he cursed them in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Then two bears came out of the woods and mauled forty-two of them. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: From there Elisha went to Mount Carmel and finally returned to Samaria.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The group of prophets from Bethel came to Elisha and asked him, “Did you know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is going to take your master away from you today?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Of course I know,” Elisha answered. “But be quiet about it.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Elijah said to Elisha, “Stay here, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has told me to go to Jericho.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Elisha replied again, “As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives and you yourself live, I will never leave you.” So they went on together to Jericho.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the group of prophets from Jericho came to Elisha and asked him, “Did you know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is going to take your master away from you today?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Of course I know,” Elisha answered. “But be quiet about it.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Elijah said to Elisha, “Stay here, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has told me to go to the Jordan River.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But again Elisha replied, “As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives and you yourself live, I will never leave you.” So they went on together.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fifty men from the group of prophets also went and watched from a distance as Elijah and Elisha stopped beside the Jordan River. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Elijah folded his cloak together and struck the water with it. The river divided, and the two of them went across on dry ground!
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they came to the other side, Elijah said to Elisha, “Tell me what I can do for you before I am taken away.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Elisha replied, “Please let me inherit a double share of your spirit and become your successor.”
