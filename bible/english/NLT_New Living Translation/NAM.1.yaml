document_id: NAM.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: This message concerning Nineveh came as a vision to Nahum, who lived in Elkosh.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Anger against Nineveh
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is a jealous God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: filled with vengeance and rage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He takes revenge on all who oppose him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and continues to rage against his enemies!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is slow to get angry, but his power is great,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he never lets the guilty go unpunished.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He displays his power in the whirlwind and the storm.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The billowing clouds are the dust beneath his feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: At his command the oceans dry up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the rivers disappear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The lush pastures of Bashan and Carmel fade,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the green forests of Lebanon wither.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: In his presence the mountains quake,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the hills melt away;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the earth trembles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and its people are destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Who can stand before his fierce anger?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can survive his burning fury?
- type: usfm
  marker: q1
  children:
  - type: text
    text: His rage blazes forth like fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the mountains crumble to dust in his presence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is good,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a strong refuge when trouble comes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is close to those who trust in him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But he will sweep away his enemies
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sweep away her place.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: in an overwhelming flood.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will pursue his foes
- type: usfm
  marker: q2
  children:
  - type: text
    text: into the darkness of night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Why are you scheming against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will destroy you with one blow;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he won’t need to strike twice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: His enemies, tangled like thornbushes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and staggering like drunks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be burned up like dry stubble in a field.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Who is this wicked counselor of yours
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'who plots evil against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Though the Assyrians have many allies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will be destroyed and disappear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O my people, I have punished you before,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I will not punish you again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Now I will break the yoke of bondage from your neck
- type: usfm
  marker: q2
  children:
  - type: text
    text: and tear off the chains of Assyrian oppression.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says concerning the Assyrians in Nineveh:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You will have no more children to carry on your name.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will destroy all the idols in the temples of your gods.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am preparing a grave for you
- type: usfm
  marker: q2
  children:
  - type: text
    text: because you are despicable!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verse 1:15 is numbered 2:1 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: Look! A messenger is coming over the mountains with good news!
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is bringing a message of peace.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celebrate your festivals, O people of Judah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fulfill all your vows,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for your wicked enemies will never invade your land again.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will be completely destroyed!
