document_id: NAM.1,116
type_code: eng
verses:
  '1':
  - type: text
    content: This message concerning Nineveh came as a vision to Nahum, who lived in Elkosh.
  - type: heading
    content: The Lord’s Anger against Nineveh
  '10':
  - type: text
    content: His enemies, tangled like thornbushes
  - type: text
    content: and staggering like drunks,
  - type: text
    content: will be burned up like dry stubble in a field.
  '11':
  - type: text
    content: Who is this wicked counselor of yours
  - type: text
    content: 'who plots evil against the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  '12':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Though the Assyrians have many allies,
  - type: text
    content: they will be destroyed and disappear.
  - type: text
    content: O my people, I have punished you before,
  - type: text
    content: but I will not punish you again.
  '13':
  - type: text
    content: Now I will break the yoke of bondage from your neck
  - type: text
    content: and tear off the chains of Assyrian oppression.”
  '14':
  - type: text
    content: 'And this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says concerning the Assyrians in Nineveh:'
  - type: text
    content: “You will have no more children to carry on your name.
  - type: text
    content: I will destroy all the idols in the temples of your gods.
  - type: text
    content: I am preparing a grave for you
  - type: text
    content: because you are despicable!”
  '15':
  - type: text
    content: ' '
  - type: note
    content: Verse 1:15 is numbered 2:1 in Hebrew text.
  - type: text
    content: Look! A messenger is coming over the mountains with good news!
  - type: text
    content: He is bringing a message of peace.
  - type: text
    content: Celebrate your festivals, O people of Judah,
  - type: text
    content: and fulfill all your vows,
  - type: text
    content: for your wicked enemies will never invade your land again.
  - type: text
    content: They will be completely destroyed!
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is a jealous God,'
  - type: text
    content: filled with vengeance and rage.
  - type: text
    content: He takes revenge on all who oppose him
  - type: text
    content: and continues to rage against his enemies!
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is slow to get angry, but his power is great,'
  - type: text
    content: and he never lets the guilty go unpunished.
  - type: text
    content: He displays his power in the whirlwind and the storm.
  - type: text
    content: The billowing clouds are the dust beneath his feet.
  '4':
  - type: text
    content: At his command the oceans dry up,
  - type: text
    content: and the rivers disappear.
  - type: text
    content: The lush pastures of Bashan and Carmel fade,
  - type: text
    content: and the green forests of Lebanon wither.
  '5':
  - type: text
    content: In his presence the mountains quake,
  - type: text
    content: and the hills melt away;
  - type: text
    content: the earth trembles,
  - type: text
    content: and its people are destroyed.
  '6':
  - type: text
    content: Who can stand before his fierce anger?
  - type: text
    content: Who can survive his burning fury?
  - type: text
    content: His rage blazes forth like fire,
  - type: text
    content: and the mountains crumble to dust in his presence.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is good,'
  - type: text
    content: a strong refuge when trouble comes.
  - type: text
    content: He is close to those who trust in him.
  '8':
  - type: text
    content: But he will sweep away his enemies
  - type: note
    content: As in Greek version; Hebrew reads sweep away her place.
  - type: text
    content: in an overwhelming flood.
  - type: text
    content: He will pursue his foes
  - type: text
    content: into the darkness of night.
  '9':
  - type: text
    content: 'Why are you scheming against the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: He will destroy you with one blow;
  - type: text
    content: he won’t need to strike twice!
