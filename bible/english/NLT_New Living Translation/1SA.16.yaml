document_id: 1SA.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Samuel Anoints David as King
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Samuel, “You have mourned long enough for Saul. I have rejected him as king of Israel, so fill your flask with olive oil and go to Bethlehem. Find a man named Jesse who lives there, for I have selected one of his sons to be my king.”'
  '10':
  - type: text
    content: 'In the same way all seven of Jesse’s sons were presented to Samuel. But Samuel said to Jesse, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has not chosen any of these.” '
  '11':
  - type: text
    content: Then Samuel asked, “Are these all the sons you have?”
  - type: text
    content: “There is still the youngest,” Jesse replied. “But he’s out in the fields watching the sheep and goats.”
  - type: text
    content: “Send for him at once,” Samuel said. “We will not sit down to eat until he arrives.”
  '12':
  - type: text
    content: So Jesse sent for him. He was dark and handsome, with beautiful eyes.
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “This is the one; anoint him.”'
  '13':
  - type: text
    content: 'So as David stood there among his brothers, Samuel took the flask of olive oil he had brought and anointed David with the oil. And the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' came powerfully upon David from that day on. Then Samuel returned to Ramah.'
  - type: heading
    content: David Serves in Saul’s Court
  '14':
  - type: text
    content: 'Now the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' had left Saul, and the '
  - type: text
    content: Lord
  - type: text
    content: ' sent a tormenting spirit'
  - type: note
    content: Or an evil spirit; also in 16:15, 16, 23.
  - type: text
    content: ' that filled him with depression and fear.'
  '15':
  - type: text
    content: 'Some of Saul’s servants said to him, “A tormenting spirit from God is troubling you. '
  '16':
  - type: text
    content: Let us find a good musician to play the harp whenever the tormenting spirit troubles you. He will play soothing music, and you will soon be well again.”
  '17':
  - type: text
    content: “All right,” Saul said. “Find me someone who plays well, and bring him here.”
  '18':
  - type: text
    content: 'One of the servants said to Saul, “One of Jesse’s sons from Bethlehem is a talented harp player. Not only that—he is a brave warrior, a man of war, and has good judgment. He is also a fine-looking young man, and the '
  - type: text
    content: Lord
  - type: text
    content: ' is with him.”'
  '19':
  - type: text
    content: 'So Saul sent messengers to Jesse to say, “Send me your son David, the shepherd.” '
  '2':
  - type: text
    content: But Samuel asked, “How can I do that? If Saul hears about it, he will kill me.”
  - type: text
    content: '“Take a heifer with you,” the '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “and say that you have come to make a sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: Jesse responded by sending David to Saul, along with a young goat, a donkey loaded with bread, and a wineskin full of wine.
  '21':
  - type: text
    content: So David went to Saul and began serving him. Saul loved David very much, and David became his armor bearer.
  '22':
  - type: text
    content: Then Saul sent word to Jesse asking, “Please let David remain in my service, for I am very pleased with him.”
  '23':
  - type: text
    content: And whenever the tormenting spirit from God troubled Saul, David would play the harp. Then Saul would feel better, and the tormenting spirit would go away.
  '3':
  - type: text
    content: Invite Jesse to the sacrifice, and I will show you which of his sons to anoint for me.”
  '4':
  - type: text
    content: 'So Samuel did as the '
  - type: text
    content: Lord
  - type: text
    content: ' instructed. When he arrived at Bethlehem, the elders of the town came trembling to meet him. “What’s wrong?” they asked. “Do you come in peace?”'
  '5':
  - type: text
    content: '“Yes,” Samuel replied. “I have come to sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: . Purify yourselves and come with me to the sacrifice.” Then Samuel performed the purification rite for Jesse and his sons and invited them to the sacrifice, too.
  '6':
  - type: text
    content: 'When they arrived, Samuel took one look at Eliab and thought, “Surely this is the '
  - type: text
    content: Lord
  - type: text
    content: ’s anointed!”
  '7':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Samuel, “Don’t judge by his appearance or height, for I have rejected him. The '
  - type: text
    content: 'Lord '
  - type: text
    content: 'doesn’t see things the way you see them. People judge by outward appearance, but the '
  - type: text
    content: Lord
  - type: text
    content: ' looks at the heart.”'
  '8':
  - type: text
    content: 'Then Jesse told his son Abinadab to step forward and walk in front of Samuel. But Samuel said, “This is not the one the '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen.” '
  '9':
  - type: text
    content: Next Jesse summoned Shimea,
  - type: note
    content: Hebrew Shammah, a variant spelling of Shimea; compare 1 Chr 2:13; 20:7.
  - type: text
    content: ' but Samuel said, “Neither is this the one the '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen.” '
