document_id: 1SA.16,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samuel Anoints David as King
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Samuel, “You have mourned long enough for Saul. I have rejected him as king of Israel, so fill your flask with olive oil and go to Bethlehem. Find a man named Jesse who lives there, for I have selected one of his sons to be my king.”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the same way all seven of Jesse’s sons were presented to Samuel. But Samuel said to Jesse, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has not chosen any of these.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Samuel asked, “Are these all the sons you have?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “There is still the youngest,” Jesse replied. “But he’s out in the fields watching the sheep and goats.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Send for him at once,” Samuel said. “We will not sit down to eat until he arrives.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Jesse sent for him. He was dark and handsome, with beautiful eyes.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “This is the one; anoint him.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So as David stood there among his brothers, Samuel took the flask of olive oil he had brought and anointed David with the oil. And the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came powerfully upon David from that day on. Then Samuel returned to Ramah.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Serves in Saul’s Court
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had left Saul, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent a tormenting spirit'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'an evil spirit; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 16:15, 16, 23.
      marker-yv: yv-n
    - type: text
      text: ' that filled him with depression and fear.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some of Saul’s servants said to him, “A tormenting spirit from God is troubling you. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Let us find a good musician to play the harp whenever the tormenting spirit troubles you. He will play soothing music, and you will soon be well again.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “All right,” Saul said. “Find me someone who plays well, and bring him here.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of the servants said to Saul, “One of Jesse’s sons from Bethlehem is a talented harp player. Not only that—he is a brave warrior, a man of war, and has good judgment. He is also a fine-looking young man, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is with him.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Saul sent messengers to Jesse to say, “Send me your son David, the shepherd.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Samuel asked, “How can I do that? If Saul hears about it, he will kill me.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take a heifer with you,” the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replied, “and say that you have come to make a sacrifice to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesse responded by sending David to Saul, along with a young goat, a donkey loaded with bread, and a wineskin full of wine.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David went to Saul and began serving him. Saul loved David very much, and David became his armor bearer.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Saul sent word to Jesse asking, “Please let David remain in my service, for I am very pleased with him.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And whenever the tormenting spirit from God troubled Saul, David would play the harp. Then Saul would feel better, and the tormenting spirit would go away.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Invite Jesse to the sacrifice, and I will show you which of his sons to anoint for me.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Samuel did as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' instructed. When he arrived at Bethlehem, the elders of the town came trembling to meet him. “What’s wrong?” they asked. “Do you come in peace?”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Yes,” Samuel replied. “I have come to sacrifice to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . Purify yourselves and come with me to the sacrifice.” Then Samuel performed the purification rite for Jesse and his sons and invited them to the sacrifice, too.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they arrived, Samuel took one look at Eliab and thought, “Surely this is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anointed!”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Samuel, “Don’t judge by his appearance or height, for I have rejected him. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'Lord '
    - type: text
      text: 'doesn’t see things the way you see them. People judge by outward appearance, but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' looks at the heart.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesse told his son Abinadab to step forward and walk in front of Samuel. But Samuel said, “This is not the one the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has chosen.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Next Jesse summoned Shimea,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Shammah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Shimea; compare 1 Chr 2:13; 20:7.
      marker-yv: yv-n
    - type: text
      text: ' but Samuel said, “Neither is this the one the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has chosen.” '
