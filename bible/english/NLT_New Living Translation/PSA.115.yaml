document_id: PSA.115,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Not to us, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', not to us,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but to your name goes all the glory
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your unfailing love and faithfulness.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O priests, descendants of Aaron, trust the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is your helper and your shield.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All you who fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', trust the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is your helper and your shield.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' remembers us and will bless us.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will bless the people of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bless the priests, the descendants of Aaron.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He will bless those who fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both great and lowly.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' richly bless'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both you and your children.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May you be blessed by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who made heaven and earth.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The heavens belong to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he has given the earth to all humanity.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The dead cannot sing praises to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they have gone into the silence of the grave.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But we can praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both now and forever!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why let the nations say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Where is their God?”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our God is in the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he does as he wishes.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their idols are merely things of silver and gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shaped by human hands.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have mouths but cannot speak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and eyes but cannot see.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have ears but cannot hear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and noses but cannot smell.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have hands but cannot feel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and feet but cannot walk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and throats but cannot make a sound.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And those who make idols are just like them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as are all who trust in them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O Israel, trust the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is your helper and your shield.
