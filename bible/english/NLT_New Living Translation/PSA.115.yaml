document_id: PSA.115,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Not to us, O '
  - type: text
    content: Lord
  - type: text
    content: ', not to us,'
  - type: text
    content: but to your name goes all the glory
  - type: text
    content: for your unfailing love and faithfulness.
  '10':
  - type: text
    content: 'O priests, descendants of Aaron, trust the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: He is your helper and your shield.
  '11':
  - type: text
    content: 'All you who fear the '
  - type: text
    content: Lord
  - type: text
    content: ', trust the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: He is your helper and your shield.
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' remembers us and will bless us.'
  - type: text
    content: He will bless the people of Israel
  - type: text
    content: and bless the priests, the descendants of Aaron.
  '13':
  - type: text
    content: 'He will bless those who fear the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: both great and lowly.
  '14':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' richly bless'
  - type: text
    content: both you and your children.
  '15':
  - type: text
    content: 'May you be blessed by the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who made heaven and earth.
  '16':
  - type: text
    content: 'The heavens belong to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: but he has given the earth to all humanity.
  '17':
  - type: text
    content: 'The dead cannot sing praises to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for they have gone into the silence of the grave.
  '18':
  - type: text
    content: 'But we can praise the '
  - type: text
    content: Lord
  - type: text
    content: both now and forever!
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '2':
  - type: text
    content: Why let the nations say,
  - type: text
    content: “Where is their God?”
  '3':
  - type: text
    content: Our God is in the heavens,
  - type: text
    content: and he does as he wishes.
  '4':
  - type: text
    content: Their idols are merely things of silver and gold,
  - type: text
    content: shaped by human hands.
  '5':
  - type: text
    content: They have mouths but cannot speak,
  - type: text
    content: and eyes but cannot see.
  '6':
  - type: text
    content: They have ears but cannot hear,
  - type: text
    content: and noses but cannot smell.
  '7':
  - type: text
    content: They have hands but cannot feel,
  - type: text
    content: and feet but cannot walk,
  - type: text
    content: and throats but cannot make a sound.
  '8':
  - type: text
    content: And those who make idols are just like them,
  - type: text
    content: as are all who trust in them.
  '9':
  - type: text
    content: 'O Israel, trust the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: He is your helper and your shield.
