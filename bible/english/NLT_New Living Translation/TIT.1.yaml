document_id: TIT.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings from Paul
  - type: text
    content: This letter is from Paul, a slave of God and an apostle of Jesus Christ. I have been sent to proclaim faith to
  - type: note
    content: Or to strengthen the faith of.
  - type: text
    content: ' those God has chosen and to teach them to know the truth that shows them how to live godly lives. '
  '10':
  - type: text
    content: 'For there are many rebellious people who engage in useless talk and deceive others. This is especially true of those who insist on circumcision for salvation. '
  '11':
  - type: text
    content: 'They must be silenced, because they are turning whole families away from the truth by their false teaching. And they do it only for money. '
  '12':
  - type: text
    content: Even one of their own men, a prophet from Crete, has said about them, “The people of Crete are all liars, cruel animals, and lazy gluttons.”
  - type: note
    content: This quotation is from Epimenides of Knossos.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'This is true. So reprimand them sternly to make them strong in the faith. '
  '14':
  - type: text
    content: They must stop listening to Jewish myths and the commands of people who have turned away from the truth.
  '15':
  - type: text
    content: 'Everything is pure to those whose hearts are pure. But nothing is pure to those who are corrupt and unbelieving, because their minds and consciences are corrupted. '
  '16':
  - type: text
    content: Such people claim they know God, but they deny him by the way they live. They are detestable and disobedient, worthless for doing anything good.
  '2':
  - type: text
    content: 'This truth gives them confidence that they have eternal life, which God—who does not lie—promised them before the world began. '
  '3':
  - type: text
    content: And now at just the right time he has revealed this message, which we announce to everyone. It is by the command of God our Savior that I have been entrusted with this work for him.
  '4':
  - type: text
    content: I am writing to Titus, my true son in the faith that we share.
  - type: text
    content: May God the Father and Christ Jesus our Savior give you grace and peace.
  - type: heading
    content: Titus’s Work in Crete
  '5':
  - type: text
    content: 'I left you on the island of Crete so you could complete our work there and appoint elders in each town as I instructed you. '
  '6':
  - type: text
    content: An elder must live a blameless life. He must be faithful to his wife,
  - type: note
    content: Or must have only one wife, or must be married only once; Greek reads must be the husband of one wife.
  - type: text
    content: ' and his children must be believers who don’t have a reputation for being wild or rebellious. '
  '7':
  - type: text
    content: A church leader
  - type: note
    content: Or An overseer, or A bishop.
  - type: text
    content: ' is a manager of God’s household, so he must live a blameless life. He must not be arrogant or quick-tempered; he must not be a heavy drinker,'
  - type: note
    content: Greek must not drink too much wine.
  - type: text
    content: ' violent, or dishonest with money.'
  '8':
  - type: text
    content: 'Rather, he must enjoy having guests in his home, and he must love what is good. He must live wisely and be just. He must live a devout and disciplined life. '
  '9':
  - type: text
    content: He must have a strong belief in the trustworthy message he was taught; then he will be able to encourage others with wholesome teaching and show those who oppose it where they are wrong.
