document_id: TIT.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greetings from Paul
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: This letter is from Paul, a slave of God and an apostle of Jesus Christ. I have been sent to proclaim faith to
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to strengthen the faith of.
    marker-yv: yv-n
  - type: text
    text: ' those God has chosen and to teach them to know the truth that shows them how to live godly lives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'This truth gives them confidence that they have eternal life, which God—who does not lie—promised them before the world began. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And now at just the right time he has revealed this message, which we announce to everyone. It is by the command of God our Savior that I have been entrusted with this work for him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I am writing to Titus, my true son in the faith that we share.
- type: usfm
  marker: p
  children:
  - type: text
    text: May God the Father and Christ Jesus our Savior give you grace and peace.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Titus’s Work in Crete
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I left you on the island of Crete so you could complete our work there and appoint elders in each town as I instructed you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: An elder must live a blameless life. He must be faithful to his wife,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'must have only one wife, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'must be married only once; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: must be the husband of one wife.
    marker-yv: yv-n
  - type: text
    text: ' and his children must be believers who don’t have a reputation for being wild or rebellious. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A church leader
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:7a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'An overseer, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: A bishop.
    marker-yv: yv-n
  - type: text
    text: ' is a manager of God’s household, so he must live a blameless life. He must not be arrogant or quick-tempered; he must not be a heavy drinker,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:7b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: must not drink too much wine.
    marker-yv: yv-n
  - type: text
    text: ' violent, or dishonest with money.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rather, he must enjoy having guests in his home, and he must love what is good. He must live wisely and be just. He must live a devout and disciplined life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He must have a strong belief in the trustworthy message he was taught; then he will be able to encourage others with wholesome teaching and show those who oppose it where they are wrong.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For there are many rebellious people who engage in useless talk and deceive others. This is especially true of those who insist on circumcision for salvation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They must be silenced, because they are turning whole families away from the truth by their false teaching. And they do it only for money. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Even one of their own men, a prophet from Crete, has said about them, “The people of Crete are all liars, cruel animals, and lazy gluttons.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This quotation is from Epimenides of Knossos.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'This is true. So reprimand them sternly to make them strong in the faith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They must stop listening to Jewish myths and the commands of people who have turned away from the truth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Everything is pure to those whose hearts are pure. But nothing is pure to those who are corrupt and unbelieving, because their minds and consciences are corrupted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Such people claim they know God, but they deny him by the way they live. They are detestable and disobedient, worthless for doing anything good.
