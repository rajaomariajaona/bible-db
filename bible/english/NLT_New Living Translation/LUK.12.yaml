document_id: LUK.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Warning against Hypocrisy
  - type: text
    content: 'Meanwhile, the crowds grew until thousands were milling about and stepping on each other. Jesus turned first to his disciples and warned them, '
  - type: text
    content: “Beware of the yeast of the Pharisees—their hypocrisy.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Anyone who speaks against the Son of Man can be forgiven, but anyone who blasphemes the Holy Spirit will not be forgiven.
  '11':
  - type: text
    content: ' '
  - type: text
    content: “And when you are brought to trial in the synagogues and before rulers and authorities, don’t worry about how to defend yourself or what to say,
  - type: text
    content: ' '
  '12':
  - type: text
    content: for the Holy Spirit will teach you at that time what needs to be said.”
  - type: heading
    content: Parable of the Rich Fool
  '13':
  - type: text
    content: Then someone called from the crowd, “Teacher, please tell my brother to divide our father’s estate with me.”
  '14':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Friend, who made me a judge over you to decide such things as that?”
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Then he said, '
  - type: text
    content: “Beware! Guard against every kind of greed. Life is not measured by how much you own.”
  '16':
  - type: text
    content: 'Then he told them a story: '
  - type: text
    content: “A rich man had a fertile farm that produced fine crops.
  - type: text
    content: ' '
  '17':
  - type: text
    content: He said to himself, ‘What should I do? I don’t have room for all my crops.’
  - type: text
    content: ' '
  '18':
  - type: text
    content: Then he said, ‘I know! I’ll tear down my barns and build bigger ones. Then I’ll have room enough to store all my wheat and other goods.
  - type: text
    content: ' '
  '19':
  - type: text
    content: And I’ll sit back and say to myself, “My friend, you have enough stored away for years to come. Now take it easy! Eat, drink, and be merry!”’
  '2':
  - type: text
    content: The time is coming when everything that is covered up will be revealed, and all that is secret will be made known to all.
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: text
    content: “But God said to him, ‘You fool! You will die this very night. Then who will get everything you worked for?’
  '21':
  - type: text
    content: ' '
  - type: text
    content: “Yes, a person is a fool to store up earthly wealth but not have a rich relationship with God.”
  - type: heading
    content: Teaching about Money and Possessions
  '22':
  - type: text
    content: 'Then, turning to his disciples, Jesus said, '
  - type: text
    content: “That is why I tell you not to worry about everyday life—whether you have enough food to eat or enough clothes to wear.
  - type: text
    content: ' '
  '23':
  - type: text
    content: For life is more than food, and your body more than clothing.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Look at the ravens. They don’t plant or harvest or store food in barns, for God feeds them. And you are far more valuable to him than any birds!
  - type: text
    content: ' '
  '25':
  - type: text
    content: Can all your worries add a single moment to your life?
  - type: text
    content: ' '
  '26':
  - type: text
    content: And if worry can’t accomplish a little thing like that, what’s the use of worrying over bigger things?
  '27':
  - type: text
    content: ' '
  - type: text
    content: “Look at the lilies and how they grow. They don’t work or make their clothing, yet Solomon in all his glory was not dressed as beautifully as they are.
  - type: text
    content: ' '
  '28':
  - type: text
    content: And if God cares so wonderfully for flowers that are here today and thrown into the fire tomorrow, he will certainly care for you. Why do you have so little faith?
  '29':
  - type: text
    content: ' '
  - type: text
    content: “And don’t be concerned about what to eat and what to drink. Don’t worry about such things.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Whatever you have said in the dark will be heard in the light, and what you have whispered behind closed doors will be shouted from the housetops for all to hear!
  '30':
  - type: text
    content: These things dominate the thoughts of unbelievers all over the world, but your Father already knows your needs.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Seek the Kingdom of God above all else, and he will give you everything you need.
  '32':
  - type: text
    content: ' '
  - type: text
    content: “So don’t be afraid, little flock. For it gives your Father great happiness to give you the Kingdom.
  '33':
  - type: text
    content: ' '
  - type: text
    content: “Sell your possessions and give to those in need. This will store up treasure for you in heaven! And the purses of heaven never get old or develop holes. Your treasure will be safe; no thief can steal it and no moth can destroy it.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Wherever your treasure is, there the desires of your heart will also be.
  - type: heading
    content: Be Ready for the Lord’s Coming
  '35':
  - type: text
    content: ' '
  - type: text
    content: “Be dressed for service and keep your lamps burning,
  - type: text
    content: ' '
  '36':
  - type: text
    content: as though you were waiting for your master to return from the wedding feast. Then you will be ready to open the door and let him in the moment he arrives and knocks.
  - type: text
    content: ' '
  '37':
  - type: text
    content: The servants who are ready and waiting for his return will be rewarded. I tell you the truth, he himself will seat them, put on an apron, and serve them as they sit and eat!
  - type: text
    content: ' '
  '38':
  - type: text
    content: He may come in the middle of the night or just before dawn.
  - type: note
    content: Greek in the second or third watch.
  - type: text
    content: ' '
  - type: text
    content: But whenever he comes, he will reward the servants who are ready.
  '39':
  - type: text
    content: ' '
  - type: text
    content: '“Understand this: If a homeowner knew exactly when a burglar was coming, he would not permit his house to be broken into.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: “Dear friends, don’t be afraid of those who want to kill your body; they cannot do any more to you after that.
  - type: text
    content: ' '
  '40':
  - type: text
    content: You also must be ready all the time, for the Son of Man will come when least expected.”
  '41':
  - type: text
    content: Peter asked, “Lord, is that illustration just for us or for everyone?”
  '42':
  - type: text
    content: 'And the Lord replied, '
  - type: text
    content: “A faithful, sensible servant is one to whom the master can give the responsibility of managing his other household servants and feeding them.
  - type: text
    content: ' '
  '43':
  - type: text
    content: If the master returns and finds that the servant has done a good job, there will be a reward.
  - type: text
    content: ' '
  '44':
  - type: text
    content: I tell you the truth, the master will put that servant in charge of all he owns.
  - type: text
    content: ' '
  '45':
  - type: text
    content: But what if the servant thinks, ‘My master won’t be back for a while,’ and he begins beating the other servants, partying, and getting drunk?
  - type: text
    content: ' '
  '46':
  - type: text
    content: The master will return unannounced and unexpected, and he will cut the servant in pieces and banish him with the unfaithful.
  '47':
  - type: text
    content: ' '
  - type: text
    content: “And a servant who knows what the master wants, but isn’t prepared and doesn’t carry out those instructions, will be severely punished.
  - type: text
    content: ' '
  '48':
  - type: text
    content: But someone who does not know, and then does something wrong, will be punished only lightly. When someone has been given much, much will be required in return; and when someone has been entrusted with much, even more will be required.
  - type: heading
    content: Jesus Causes Division
  '49':
  - type: text
    content: ' '
  - type: text
    content: “I have come to set the world on fire, and I wish it were already burning!
  - type: text
    content: ' '
  '5':
  - type: text
    content: But I’ll tell you whom to fear. Fear God, who has the power to kill you and then throw you into hell.
  - type: note
    content: Greek Gehenna.
  - type: text
    content: ' '
  - type: text
    content: Yes, he’s the one to fear.
  '50':
  - type: text
    content: I have a terrible baptism of suffering ahead of me, and I am under a heavy burden until it is accomplished.
  - type: text
    content: ' '
  '51':
  - type: text
    content: Do you think I have come to bring peace to the earth? No, I have come to divide people against each other!
  - type: text
    content: ' '
  '52':
  - type: text
    content: From now on families will be split apart, three in favor of me, and two against—or two in favor and three against.
  '53':
  - type: text
    content: ' '
  - type: text
    content: ‘Father will be divided against son
  - type: text
    content: and son against father;
  - type: text
    content: mother against daughter
  - type: text
    content: and daughter against mother;
  - type: text
    content: and mother-in-law against daughter-in-law
  - type: text
    content: and daughter-in-law against mother-in-law.’
  - type: text
    content: ' '
  - type: note
    content: Mic 7:6.
  - type: text
    content: ”
  '54':
  - type: text
    content: 'Then Jesus turned to the crowd and said, '
  - type: text
    content: “When you see clouds beginning to form in the west, you say, ‘Here comes a shower.’ And you are right.
  - type: text
    content: ' '
  '55':
  - type: text
    content: When the south wind blows, you say, ‘Today will be a scorcher.’ And it is.
  - type: text
    content: ' '
  '56':
  - type: text
    content: You fools! You know how to interpret the weather signs of the earth and sky, but you don’t know how to interpret the present times.
  '57':
  - type: text
    content: ' '
  - type: text
    content: “Why can’t you decide for yourselves what is right?
  - type: text
    content: ' '
  '58':
  - type: text
    content: When you are on the way to court with your accuser, try to settle the matter before you get there. Otherwise, your accuser may drag you before the judge, who will hand you over to an officer, who will throw you into prison.
  - type: text
    content: ' '
  '59':
  - type: text
    content: And if that happens, you won’t be free again until you have paid the very last penny.
  - type: note
    content: Greek last lepton [the smallest Jewish coin].
  - type: text
    content: ”
  '6':
  - type: text
    content: ' '
  - type: text
    content: “What is the price of five sparrows—two copper coins
  - type: text
    content: ' '
  - type: note
    content: Greek two assaria [Roman coins equal to 1/16 of a denarius].
  - type: text
    content: '? Yet God does not forget a single one of them.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: And the very hairs on your head are all numbered. So don’t be afraid; you are more valuable to God than a whole flock of sparrows.
  '8':
  - type: text
    content: ' '
  - type: text
    content: “I tell you the truth, everyone who acknowledges me publicly here on earth, the Son of Man
  - type: text
    content: ' '
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: will also acknowledge in the presence of God’s angels.
  - type: text
    content: ' '
  '9':
  - type: text
    content: But anyone who denies me here on earth will be denied before God’s angels.
  - type: text
    content: ' '
