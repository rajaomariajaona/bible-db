document_id: LUK.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Warning against Hypocrisy
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Meanwhile, the crowds grew until thousands were milling about and stepping on each other. Jesus turned first to his disciples and warned them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Beware of the yeast of the Pharisees—their hypocrisy.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Anyone who speaks against the Son of Man can be forgiven, but anyone who blasphemes the Holy Spirit will not be forgiven.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And when you are brought to trial in the synagogues and before rulers and authorities, don’t worry about how to defend yourself or what to say,
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for the Holy Spirit will teach you at that time what needs to be said.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parable of the Rich Fool
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then someone called from the crowd, “Teacher, please tell my brother to divide our father’s estate with me.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Friend, who made me a judge over you to decide such things as that?”
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Beware! Guard against every kind of greed. Life is not measured by how much you own.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he told them a story: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “A rich man had a fertile farm that produced fine crops.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He said to himself, ‘What should I do? I don’t have room for all my crops.’
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then he said, ‘I know! I’ll tear down my barns and build bigger ones. Then I’ll have room enough to store all my wheat and other goods.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And I’ll sit back and say to myself, “My friend, you have enough stored away for years to come. Now take it easy! Eat, drink, and be merry!”’
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The time is coming when everything that is covered up will be revealed, and all that is secret will be made known to all.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But God said to him, ‘You fool! You will die this very night. Then who will get everything you worked for?’
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Yes, a person is a fool to store up earthly wealth but not have a rich relationship with God.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Teaching about Money and Possessions
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then, turning to his disciples, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “That is why I tell you not to worry about everyday life—whether you have enough food to eat or enough clothes to wear.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For life is more than food, and your body more than clothing.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Look at the ravens. They don’t plant or harvest or store food in barns, for God feeds them. And you are far more valuable to him than any birds!
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Can all your worries add a single moment to your life?
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if worry can’t accomplish a little thing like that, what’s the use of worrying over bigger things?
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Look at the lilies and how they grow. They don’t work or make their clothing, yet Solomon in all his glory was not dressed as beautifully as they are.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if God cares so wonderfully for flowers that are here today and thrown into the fire tomorrow, he will certainly care for you. Why do you have so little faith?
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And don’t be concerned about what to eat and what to drink. Don’t worry about such things.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whatever you have said in the dark will be heard in the light, and what you have whispered behind closed doors will be shouted from the housetops for all to hear!
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: These things dominate the thoughts of unbelievers all over the world, but your Father already knows your needs.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Seek the Kingdom of God above all else, and he will give you everything you need.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “So don’t be afraid, little flock. For it gives your Father great happiness to give you the Kingdom.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Sell your possessions and give to those in need. This will store up treasure for you in heaven! And the purses of heaven never get old or develop holes. Your treasure will be safe; no thief can steal it and no moth can destroy it.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Wherever your treasure is, there the desires of your heart will also be.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Be Ready for the Lord’s Coming
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Be dressed for service and keep your lamps burning,
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: as though you were waiting for your master to return from the wedding feast. Then you will be ready to open the door and let him in the moment he arrives and knocks.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The servants who are ready and waiting for his return will be rewarded. I tell you the truth, he himself will seat them, put on an apron, and serve them as they sit and eat!
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He may come in the middle of the night or just before dawn.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in the second or third watch.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But whenever he comes, he will reward the servants who are ready.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Understand this: If a homeowner knew exactly when a burglar was coming, he would not permit his house to be broken into.'
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Dear friends, don’t be afraid of those who want to kill your body; they cannot do any more to you after that.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You also must be ready all the time, for the Son of Man will come when least expected.”
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peter asked, “Lord, is that illustration just for us or for everyone?”
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Lord replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “A faithful, sensible servant is one to whom the master can give the responsibility of managing his other household servants and feeding them.
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If the master returns and finds that the servant has done a good job, there will be a reward.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you the truth, the master will put that servant in charge of all he owns.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But what if the servant thinks, ‘My master won’t be back for a while,’ and he begins beating the other servants, partying, and getting drunk?
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The master will return unannounced and unexpected, and he will cut the servant in pieces and banish him with the unfaithful.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And a servant who knows what the master wants, but isn’t prepared and doesn’t carry out those instructions, will be severely punished.
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But someone who does not know, and then does something wrong, will be punished only lightly. When someone has been given much, much will be required in return; and when someone has been entrusted with much, even more will be required.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Causes Division
    marker-yv: yv-h
  '49':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have come to set the world on fire, and I wish it were already burning!
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I’ll tell you whom to fear. Fear God, who has the power to kill you and then throw you into hell.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Gehenna.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yes, he’s the one to fear.
  '50':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have a terrible baptism of suffering ahead of me, and I am under a heavy burden until it is accomplished.
    - type: text
      text: ' '
  '51':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Do you think I have come to bring peace to the earth? No, I have come to divide people against each other!
    - type: text
      text: ' '
  '52':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: From now on families will be split apart, three in favor of me, and two against—or two in favor and three against.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Father will be divided against son
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and son against father;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: mother against daughter
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and daughter against mother;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and mother-in-law against daughter-in-law
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and daughter-in-law against mother-in-law.’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:53 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mic 7:6.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus turned to the crowd and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When you see clouds beginning to form in the west, you say, ‘Here comes a shower.’ And you are right.
    - type: text
      text: ' '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When the south wind blows, you say, ‘Today will be a scorcher.’ And it is.
    - type: text
      text: ' '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You fools! You know how to interpret the weather signs of the earth and sky, but you don’t know how to interpret the present times.
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why can’t you decide for yourselves what is right?
    - type: text
      text: ' '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When you are on the way to court with your accuser, try to settle the matter before you get there. Otherwise, your accuser may drag you before the judge, who will hand you over to an officer, who will throw you into prison.
    - type: text
      text: ' '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if that happens, you won’t be free again until you have paid the very last penny.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:59 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'last lepton '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[the smallest Jewish coin].'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What is the price of five sparrows—two copper coins
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'two assaria '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[Roman coins equal to 1/16 of a denarius].'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '? Yet God does not forget a single one of them.'
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And the very hairs on your head are all numbered. So don’t be afraid; you are more valuable to God than a whole flock of sparrows.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you the truth, everyone who acknowledges me publicly here on earth, the Son of Man
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Son of Man” is a title Jesus used for himself.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will also acknowledge in the presence of God’s angels.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But anyone who denies me here on earth will be denied before God’s angels.
    - type: text
      text: ' '
