document_id: NUM.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Duties of Priests and Levites
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Aaron: “You, your sons, and your relatives from the tribe of Levi will be held responsible for any offenses related to the sanctuary. But you and your sons alone will be held responsible for violations connected with the priesthood.'
  '10':
  - type: text
    content: You must eat it as a most holy offering. All the males may eat of it, and you must treat it as most holy.
  '11':
  - type: text
    content: “All the sacred offerings and special offerings presented to me when the Israelites lift them up before the altar also belong to you. I have given them to you and to your sons and daughters as your permanent share. Any member of your family who is ceremonially clean may eat of these offerings.
  '12':
  - type: text
    content: '“I also give you the harvest gifts brought by the people as offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '—the best of the olive oil, new wine, and grain. '
  '13':
  - type: text
    content: 'All the first crops of their land that the people present to the '
  - type: text
    content: Lord
  - type: text
    content: ' belong to you. Any member of your family who is ceremonially clean may eat this food.'
  '14':
  - type: text
    content: '“Everything in Israel that is specially set apart for the '
  - type: text
    content: Lord
  - type: note
    content: The Hebrew term used here refers to the complete consecration of things or people to the Lord, either by destroying them or by giving them as an offering.
  - type: text
    content: ' also belongs to you.'
  '15':
  - type: text
    content: '“The firstborn of every mother, whether human or animal, that is offered to the '
  - type: text
    content: Lord
  - type: text
    content: ' will be yours. But you must always redeem your firstborn sons and the firstborn of ceremonially unclean animals. '
  '16':
  - type: text
    content: Redeem them when they are one month old. The redemption price is five pieces of silver
  - type: note
    content: Hebrew 5 shekels [2 ounces or 57 grams] of silver.
  - type: text
    content: ' (as measured by the weight of the sanctuary shekel, which equals twenty gerahs).'
  '17':
  - type: text
    content: '“However, you may not redeem the firstborn of cattle, sheep, or goats. They are holy and have been set apart for the '
  - type: text
    content: Lord
  - type: text
    content: '. Sprinkle their blood on the altar, and burn their fat as a special gift, a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'The meat of these animals will be yours, just like the breast and right thigh that are presented by lifting them up as a special offering before the altar. '
  '19':
  - type: text
    content: 'Yes, I am giving you all these holy offerings that the people of Israel bring to the '
  - type: text
    content: Lord
  - type: text
    content: . They are for you and your sons and daughters, to be eaten as your permanent share. This is an eternal and unbreakable covenant
  - type: note
    content: Hebrew a covenant of salt.
  - type: text
    content: ' between the '
  - type: text
    content: Lord
  - type: text
    content: ' and you, and it also applies to your descendants.”'
  '2':
  - type: text
    content: “Bring your relatives of the tribe of Levi—your ancestral tribe—to assist you and your sons as you perform the sacred duties in front of the Tabernacle of the Covenant.
  - type: note
    content: Or Tabernacle of the Testimony.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Aaron, “You priests will receive no allotment of land or share of property among the people of Israel. I am your share and your allotment. '
  '21':
  - type: text
    content: As for the tribe of Levi, your relatives, I will compensate them for their service in the Tabernacle. Instead of an allotment of land, I will give them the tithes from the entire land of Israel.
  '22':
  - type: text
    content: '“From now on, no Israelites except priests or Levites may approach the Tabernacle. If they come too near, they will be judged guilty and will die. '
  '23':
  - type: text
    content: 'Only the Levites may serve at the Tabernacle, and they will be held responsible for any offenses against it. This is a permanent law for you, to be observed from generation to generation. The Levites will receive no allotment of land among the Israelites, '
  '24':
  - type: text
    content: 'because I have given them the Israelites’ tithes, which have been presented as sacred offerings to the '
  - type: text
    content: Lord
  - type: text
    content: . This will be the Levites’ share. That is why I said they would receive no allotment of land among the Israelites.”
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' also told Moses, '
  '26':
  - type: text
    content: '“Give these instructions to the Levites: When you receive from the people of Israel the tithes I have assigned as your allotment, give a tenth of the tithes you receive—a tithe of the tithe—to the '
  - type: text
    content: Lord
  - type: text
    content: ' as a sacred offering. '
  '27':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will consider this offering to be your harvest offering, as though it were the first grain from your own threshing floor or wine from your own winepress. '
  '28':
  - type: text
    content: 'You must present one-tenth of the tithe received from the Israelites as a sacred offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. This is the '
  - type: text
    content: Lord
  - type: text
    content: '’s sacred portion, and you must present it to Aaron the priest. '
  '29':
  - type: text
    content: 'Be sure to give to the '
  - type: text
    content: Lord
  - type: text
    content: ' the best portions of the gifts given to you.'
  '3':
  - type: text
    content: 'But as the Levites go about all their assigned duties at the Tabernacle, they must be careful not to go near any of the sacred objects or the altar. If they do, both you and they will die. '
  '30':
  - type: text
    content: '“Also, give these instructions to the Levites: When you present the best part as your offering, it will be considered as though it came from your own threshing floor or winepress. '
  '31':
  - type: text
    content: 'You Levites and your families may eat this food anywhere you wish, for it is your compensation for serving in the Tabernacle. '
  '32':
  - type: text
    content: 'You will not be considered guilty for accepting the '
  - type: text
    content: Lord
  - type: text
    content: ’s tithes if you give the best portion to the priests. But be careful not to treat the holy gifts of the people of Israel as though they were common. If you do, you will die.”
  '4':
  - type: text
    content: The Levites must join you in fulfilling their responsibilities for the care and maintenance of the Tabernacle,
  - type: note
    content: Hebrew the Tent of Meeting; also in 18:6, 21, 22, 23, 31.
  - type: text
    content: ' but no unauthorized person may assist you.'
  '5':
  - type: text
    content: '“You yourselves must perform the sacred duties inside the sanctuary and at the altar. If you follow these instructions, the '
  - type: text
    content: Lord
  - type: text
    content: '’s anger will never again blaze against the people of Israel. '
  '6':
  - type: text
    content: 'I myself have chosen your fellow Levites from among the Israelites to be your special assistants. They are a gift to you, dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: ' for service in the Tabernacle. '
  '7':
  - type: text
    content: But you and your sons, the priests, must personally handle all the priestly rituals associated with the altar and with everything behind the inner curtain. I am giving you the priesthood as your special privilege of service. Any unauthorized person who comes too near the sanctuary will be put to death.”
  - type: heading
    content: Support for the Priests and Levites
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave these further instructions to Aaron: “I myself have put you in charge of all the holy offerings that are brought to me by the people of Israel. I have given all these consecrated offerings to you and your sons as your permanent share. '
  '9':
  - type: text
    content: 'You are allotted the portion of the most holy offerings that is not burned on the fire. This portion of all the most holy offerings—including the grain offerings, sin offerings, and guilt offerings—will be most holy, and it belongs to you and your sons. '
