document_id: NUM.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Duties of Priests and Levites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Aaron: “You, your sons, and your relatives from the tribe of Levi will be held responsible for any offenses related to the sanctuary. But you and your sons alone will be held responsible for violations connected with the priesthood.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Bring your relatives of the tribe of Levi—your ancestral tribe—to assist you and your sons as you perform the sacred duties in front of the Tabernacle of the Covenant.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Tabernacle of the Testimony.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But as the Levites go about all their assigned duties at the Tabernacle, they must be careful not to go near any of the sacred objects or the altar. If they do, both you and they will die. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The Levites must join you in fulfilling their responsibilities for the care and maintenance of the Tabernacle,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the Tent of Meeting; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 18:6, 21, 22, 23, 31.
    marker-yv: yv-n
  - type: text
    text: ' but no unauthorized person may assist you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“You yourselves must perform the sacred duties inside the sanctuary and at the altar. If you follow these instructions, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s anger will never again blaze against the people of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I myself have chosen your fellow Levites from among the Israelites to be your special assistants. They are a gift to you, dedicated to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for service in the Tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But you and your sons, the priests, must personally handle all the priestly rituals associated with the altar and with everything behind the inner curtain. I am giving you the priesthood as your special privilege of service. Any unauthorized person who comes too near the sanctuary will be put to death.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Support for the Priests and Levites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave these further instructions to Aaron: “I myself have put you in charge of all the holy offerings that are brought to me by the people of Israel. I have given all these consecrated offerings to you and your sons as your permanent share. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'You are allotted the portion of the most holy offerings that is not burned on the fire. This portion of all the most holy offerings—including the grain offerings, sin offerings, and guilt offerings—will be most holy, and it belongs to you and your sons. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You must eat it as a most holy offering. All the males may eat of it, and you must treat it as most holy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “All the sacred offerings and special offerings presented to me when the Israelites lift them up before the altar also belong to you. I have given them to you and to your sons and daughters as your permanent share. Any member of your family who is ceremonially clean may eat of these offerings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“I also give you the harvest gifts brought by the people as offerings to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '—the best of the olive oil, new wine, and grain. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'All the first crops of their land that the people present to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' belong to you. Any member of your family who is ceremonially clean may eat this food.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“Everything in Israel that is specially set apart for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering.'
    marker-yv: yv-n
  - type: text
    text: ' also belongs to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“The firstborn of every mother, whether human or animal, that is offered to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be yours. But you must always redeem your firstborn sons and the firstborn of ceremonially unclean animals. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Redeem them when they are one month old. The redemption price is five pieces of silver
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '5 shekels '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2 ounces or 57 grams] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of silver.
    marker-yv: yv-n
  - type: text
    text: ' (as measured by the weight of the sanctuary shekel, which equals twenty gerahs).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“However, you may not redeem the firstborn of cattle, sheep, or goats. They are holy and have been set apart for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. Sprinkle their blood on the altar, and burn their fat as a special gift, a pleasing aroma to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The meat of these animals will be yours, just like the breast and right thigh that are presented by lifting them up as a special offering before the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Yes, I am giving you all these holy offerings that the people of Israel bring to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . They are for you and your sons and daughters, to be eaten as your permanent share. This is an eternal and unbreakable covenant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a covenant of salt.
    marker-yv: yv-n
  - type: text
    text: ' between the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and you, and it also applies to your descendants.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Aaron, “You priests will receive no allotment of land or share of property among the people of Israel. I am your share and your allotment. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: As for the tribe of Levi, your relatives, I will compensate them for their service in the Tabernacle. Instead of an allotment of land, I will give them the tithes from the entire land of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“From now on, no Israelites except priests or Levites may approach the Tabernacle. If they come too near, they will be judged guilty and will die. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Only the Levites may serve at the Tabernacle, and they will be held responsible for any offenses against it. This is a permanent law for you, to be observed from generation to generation. The Levites will receive no allotment of land among the Israelites, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'because I have given them the Israelites’ tithes, which have been presented as sacred offerings to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . This will be the Levites’ share. That is why I said they would receive no allotment of land among the Israelites.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' also told Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“Give these instructions to the Levites: When you receive from the people of Israel the tithes I have assigned as your allotment, give a tenth of the tithes you receive—a tithe of the tithe—to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as a sacred offering. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will consider this offering to be your harvest offering, as though it were the first grain from your own threshing floor or wine from your own winepress. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'You must present one-tenth of the tithe received from the Israelites as a sacred offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. This is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s sacred portion, and you must present it to Aaron the priest. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Be sure to give to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' the best portions of the gifts given to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“Also, give these instructions to the Levites: When you present the best part as your offering, it will be considered as though it came from your own threshing floor or winepress. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'You Levites and your families may eat this food anywhere you wish, for it is your compensation for serving in the Tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'You will not be considered guilty for accepting the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s tithes if you give the best portion to the priests. But be careful not to treat the holy gifts of the people of Israel as though they were common. If you do, you will die.”
