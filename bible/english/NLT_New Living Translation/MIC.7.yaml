document_id: MIC.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Misery Turned to Hope
  - type: text
    content: How miserable I am!
  - type: text
    content: I feel like the fruit picker after the harvest
  - type: text
    content: who can find nothing to eat.
  - type: text
    content: Not a cluster of grapes or a single early fig
  - type: text
    content: can be found to satisfy my hunger.
  '10':
  - type: text
    content: 'Then my enemies will see that the '
  - type: text
    content: Lord
  - type: text
    content: ' is on my side.'
  - type: text
    content: They will be ashamed that they taunted me, saying,
  - type: text
    content: '“So where is the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: that God of yours?”
  - type: text
    content: With my own eyes I will see their downfall;
  - type: text
    content: they will be trampled like mud in the streets.
  '11':
  - type: text
    content: In that day, Israel, your cities will be rebuilt,
  - type: text
    content: and your borders will be extended.
  '12':
  - type: text
    content: People from many lands will come and honor you—
  - type: text
    content: from Assyria all the way to the towns of Egypt,
  - type: text
    content: from Egypt all the way to the Euphrates River,
  - type: note
    content: Hebrew the river.
  - type: text
    content: and from distant seas and mountains.
  '13':
  - type: text
    content: But the land
  - type: note
    content: Or earth.
  - type: text
    content: ' will become empty and desolate'
  - type: text
    content: because of the wickedness of those who live there.
  - type: heading
    content: The Lord’s Compassion on Israel
  '14':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', protect your people with your shepherd’s staff;'
  - type: text
    content: lead your flock, your special possession.
  - type: text
    content: Though they live alone in a thicket
  - type: text
    content: on the heights of Mount Carmel,
  - type: note
    content: Or surrounded by a fruitful land.
  - type: text
    content: let them graze in the fertile pastures of Bashan and Gilead
  - type: text
    content: as they did long ago.
  '15':
  - type: text
    content: '“Yes,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “I will do mighty miracles for you,
  - type: text
    content: like those I did when I rescued you
  - type: text
    content: from slavery in Egypt.”
  '16':
  - type: text
    content: All the nations of the world will stand amazed
  - type: text
    content: 'at what the '
  - type: text
    content: Lord
  - type: text
    content: ' will do for you.'
  - type: text
    content: They will be embarrassed
  - type: text
    content: at their feeble power.
  - type: text
    content: They will cover their mouths in silent awe,
  - type: text
    content: deaf to everything around them.
  '17':
  - type: text
    content: Like snakes crawling from their holes,
  - type: text
    content: 'they will come out to meet the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.'
  - type: text
    content: They will fear him greatly,
  - type: text
    content: trembling in terror at his presence.
  '18':
  - type: text
    content: Where is another God like you,
  - type: text
    content: who pardons the guilt of the remnant,
  - type: text
    content: overlooking the sins of his special people?
  - type: text
    content: You will not stay angry with your people forever,
  - type: text
    content: because you delight in showing unfailing love.
  '19':
  - type: text
    content: Once again you will have compassion on us.
  - type: text
    content: You will trample our sins under your feet
  - type: text
    content: and throw them into the depths of the ocean!
  '2':
  - type: text
    content: The godly people have all disappeared;
  - type: text
    content: not one honest person is left on the earth.
  - type: text
    content: They are all murderers,
  - type: text
    content: setting traps even for their own brothers.
  '20':
  - type: text
    content: You will show us your faithfulness and unfailing love
  - type: text
    content: as you promised to our ancestors Abraham and Jacob long ago.
  '3':
  - type: text
    content: Both their hands are equally skilled at doing evil!
  - type: text
    content: Officials and judges alike demand bribes.
  - type: text
    content: The people with influence get what they want,
  - type: text
    content: and together they scheme to twist justice.
  '4':
  - type: text
    content: Even the best of them is like a brier;
  - type: text
    content: the most honest is as dangerous as a hedge of thorns.
  - type: text
    content: But your judgment day is coming swiftly now.
  - type: text
    content: Your time of punishment is here, a time of confusion.
  '5':
  - type: text
    content: Don’t trust anyone—
  - type: text
    content: not your best friend or even your wife!
  '6':
  - type: text
    content: For the son despises his father.
  - type: text
    content: The daughter defies her mother.
  - type: text
    content: The daughter-in-law defies her mother-in-law.
  - type: text
    content: Your enemies are right in your own household!
  '7':
  - type: text
    content: 'As for me, I look to the '
  - type: text
    content: Lord
  - type: text
    content: ' for help.'
  - type: text
    content: I wait confidently for God to save me,
  - type: text
    content: and my God will certainly hear me.
  '8':
  - type: text
    content: Do not gloat over me, my enemies!
  - type: text
    content: For though I fall, I will rise again.
  - type: text
    content: Though I sit in darkness,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will be my light.'
  '9':
  - type: text
    content: 'I will be patient as the '
  - type: text
    content: Lord
  - type: text
    content: ' punishes me,'
  - type: text
    content: for I have sinned against him.
  - type: text
    content: But after that, he will take up my case
  - type: text
    content: and give me justice for all I have suffered from my enemies.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will bring me into the light,'
  - type: text
    content: and I will see his righteousness.
