document_id: MIC.7,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Misery Turned to Hope
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How miserable I am!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I feel like the fruit picker after the harvest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who can find nothing to eat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not a cluster of grapes or a single early fig
  - type: usfm
    marker: q2
    children:
    - type: text
      text: can be found to satisfy my hunger.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then my enemies will see that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is on my side.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be ashamed that they taunted me, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“So where is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that God of yours?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With my own eyes I will see their downfall;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be trampled like mud in the streets.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In that day, Israel, your cities will be rebuilt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your borders will be extended.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People from many lands will come and honor you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from Assyria all the way to the towns of Egypt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from Egypt all the way to the Euphrates River,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the river.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from distant seas and mountains.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the land
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: earth.
      marker-yv: yv-n
    - type: text
      text: ' will become empty and desolate'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of the wickedness of those who live there.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Compassion on Israel
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', protect your people with your shepherd’s staff;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lead your flock, your special possession.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though they live alone in a thicket
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the heights of Mount Carmel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: surrounded by a fruitful land.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: let them graze in the fertile pastures of Bashan and Gilead
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they did long ago.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Yes,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I will do mighty miracles for you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like those I did when I rescued you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from slavery in Egypt.”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the nations of the world will stand amazed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'at what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will do for you.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be embarrassed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at their feeble power.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will cover their mouths in silent awe,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deaf to everything around them.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like snakes crawling from their holes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'they will come out to meet the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will fear him greatly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trembling in terror at his presence.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where is another God like you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who pardons the guilt of the remnant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: overlooking the sins of his special people?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will not stay angry with your people forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you delight in showing unfailing love.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Once again you will have compassion on us.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will trample our sins under your feet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and throw them into the depths of the ocean!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The godly people have all disappeared;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not one honest person is left on the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are all murderers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: setting traps even for their own brothers.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will show us your faithfulness and unfailing love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as you promised to our ancestors Abraham and Jacob long ago.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Both their hands are equally skilled at doing evil!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Officials and judges alike demand bribes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people with influence get what they want,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and together they scheme to twist justice.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the best of them is like a brier;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the most honest is as dangerous as a hedge of thorns.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But your judgment day is coming swiftly now.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your time of punishment is here, a time of confusion.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t trust anyone—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not your best friend or even your wife!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the son despises his father.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The daughter defies her mother.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The daughter-in-law defies her mother-in-law.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your enemies are right in your own household!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As for me, I look to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for help.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I wait confidently for God to save me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my God will certainly hear me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not gloat over me, my enemies!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For though I fall, I will rise again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though I sit in darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be my light.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will be patient as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' punishes me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have sinned against him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But after that, he will take up my case
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and give me justice for all I have suffered from my enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will bring me into the light,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will see his righteousness.
