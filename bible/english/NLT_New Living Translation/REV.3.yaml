document_id: REV.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Message to the Church in Sardis
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Write this letter to the angel
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the messenger; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 3:7, 14.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: of the church in Sardis. This is the message from the one who has the sevenfold Spirit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the seven spirits.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'of God and the seven stars:'
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I know all the things you do, and that you have a reputation for being alive—but you are dead.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Wake up! Strengthen what little remains, for even what is left is almost dead. I find that your actions do not meet the requirements of my God.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Go back to what you heard and believed at first; hold to it firmly. Repent and turn to me again. If you don’t wake up, I will come to you suddenly, as unexpected as a thief.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Yet there are some in the church in Sardis who have not soiled their clothes with evil. They will walk with me in white, for they are worthy.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: All who are victorious will be clothed in white. I will never erase their names from the Book of Life, but I will announce before my Father and his angels that they are mine.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Anyone with ears to hear must listen to the Spirit and understand what he is saying to the churches.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Message to the Church in Philadelphia
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Write this letter to the angel of the church in Philadelphia.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This is the message from the one who is holy and true,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the one who has the key of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: What he opens, no one can close;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and what he closes, no one can open:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isa 22:22.
    marker-yv: yv-n
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I know all the things you do, and I have opened a door for you that no one can close. You have little strength, yet you obeyed my word and did not deny me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Look, I will force those who belong to Satan’s synagogue—those liars who say they are Jews but are not—to come and bow down at your feet. They will acknowledge that you are the ones I love.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Because you have obeyed my command to persevere, I will protect you from the great time of testing that will come upon the whole world to test those who belong to this world.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am coming soon.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: suddenly
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quickly.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Hold on to what you have, so that no one will take away your crown.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: All who are victorious will become pillars in the Temple of my God, and they will never have to leave it. And I will write on them the name of my God, and they will be citizens in the city of my God—the new Jerusalem that comes down from heaven from my God. And I will also write on them my new name.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Anyone with ears to hear must listen to the Spirit and understand what he is saying to the churches.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Message to the Church in Laodicea
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Write this letter to the angel of the church in Laodicea. This is the message from the one who is the Amen—the faithful and true witness, the beginning
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the ruler, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the source.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'of God’s new creation:'
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I know all the things you do, that you are neither hot nor cold. I wish that you were one or the other!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But since you are like lukewarm water, neither hot nor cold, I will spit you out of my mouth!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You say, ‘I am rich. I have everything I want. I don’t need a thing!’ And you don’t realize that you are wretched and miserable and poor and blind and naked.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So I advise you to buy gold from me—gold that has been purified by fire. Then you will be rich. Also buy white garments from me so you will not be shamed by your nakedness, and ointment for your eyes so you will be able to see.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I correct and discipline everyone I love. So be diligent and turn from your indifference.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Look! I stand at the door and knock. If you hear my voice and open the door, I will come in, and we will share a meal together as friends.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Those who are victorious will sit with me on my throne, just as I was victorious and sat with my Father on his throne.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Anyone with ears to hear must listen to the Spirit and understand what he is saying to the churches.”
