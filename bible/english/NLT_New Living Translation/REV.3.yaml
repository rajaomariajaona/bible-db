document_id: REV.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Message to the Church in Sardis
  - type: text
    content: ' '
  - type: text
    content: “Write this letter to the angel
  - type: text
    content: ' '
  - type: note
    content: Or the messenger; also in 3:7, 14.
  - type: text
    content: of the church in Sardis. This is the message from the one who has the sevenfold Spirit
  - type: note
    content: Greek the seven spirits.
  - type: text
    content: ' '
  - type: text
    content: 'of God and the seven stars:'
  - type: text
    content: “I know all the things you do, and that you have a reputation for being alive—but you are dead.
  - type: text
    content: ' '
  '10':
  - type: text
    content: ' '
  - type: text
    content: “Because you have obeyed my command to persevere, I will protect you from the great time of testing that will come upon the whole world to test those who belong to this world.
  - type: text
    content: ' '
  '11':
  - type: text
    content: I am coming soon.
  - type: note
    content: Or suddenly, or quickly.
  - type: text
    content: ' '
  - type: text
    content: Hold on to what you have, so that no one will take away your crown.
  - type: text
    content: ' '
  '12':
  - type: text
    content: All who are victorious will become pillars in the Temple of my God, and they will never have to leave it. And I will write on them the name of my God, and they will be citizens in the city of my God—the new Jerusalem that comes down from heaven from my God. And I will also write on them my new name.
  '13':
  - type: text
    content: ' '
  - type: text
    content: “Anyone with ears to hear must listen to the Spirit and understand what he is saying to the churches.
  - type: heading
    content: The Message to the Church in Laodicea
  '14':
  - type: text
    content: ' '
  - type: text
    content: “Write this letter to the angel of the church in Laodicea. This is the message from the one who is the Amen—the faithful and true witness, the beginning
  - type: text
    content: ' '
  - type: note
    content: Or the ruler, or the source.
  - type: text
    content: 'of God’s new creation:'
  '15':
  - type: text
    content: ' '
  - type: text
    content: “I know all the things you do, that you are neither hot nor cold. I wish that you were one or the other!
  - type: text
    content: ' '
  '16':
  - type: text
    content: But since you are like lukewarm water, neither hot nor cold, I will spit you out of my mouth!
  - type: text
    content: ' '
  '17':
  - type: text
    content: You say, ‘I am rich. I have everything I want. I don’t need a thing!’ And you don’t realize that you are wretched and miserable and poor and blind and naked.
  - type: text
    content: ' '
  '18':
  - type: text
    content: So I advise you to buy gold from me—gold that has been purified by fire. Then you will be rich. Also buy white garments from me so you will not be shamed by your nakedness, and ointment for your eyes so you will be able to see.
  - type: text
    content: ' '
  '19':
  - type: text
    content: I correct and discipline everyone I love. So be diligent and turn from your indifference.
  '2':
  - type: text
    content: Wake up! Strengthen what little remains, for even what is left is almost dead. I find that your actions do not meet the requirements of my God.
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: text
    content: “Look! I stand at the door and knock. If you hear my voice and open the door, I will come in, and we will share a meal together as friends.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Those who are victorious will sit with me on my throne, just as I was victorious and sat with my Father on his throne.
  '22':
  - type: text
    content: ' '
  - type: text
    content: “Anyone with ears to hear must listen to the Spirit and understand what he is saying to the churches.”
  '3':
  - type: text
    content: Go back to what you heard and believed at first; hold to it firmly. Repent and turn to me again. If you don’t wake up, I will come to you suddenly, as unexpected as a thief.
  '4':
  - type: text
    content: ' '
  - type: text
    content: “Yet there are some in the church in Sardis who have not soiled their clothes with evil. They will walk with me in white, for they are worthy.
  - type: text
    content: ' '
  '5':
  - type: text
    content: All who are victorious will be clothed in white. I will never erase their names from the Book of Life, but I will announce before my Father and his angels that they are mine.
  '6':
  - type: text
    content: ' '
  - type: text
    content: “Anyone with ears to hear must listen to the Spirit and understand what he is saying to the churches.
  - type: heading
    content: The Message to the Church in Philadelphia
  '7':
  - type: text
    content: ' '
  - type: text
    content: “Write this letter to the angel of the church in Philadelphia.
  - type: text
    content: This is the message from the one who is holy and true,
  - type: text
    content: the one who has the key of David.
  - type: text
    content: What he opens, no one can close;
  - type: text
    content: 'and what he closes, no one can open:'
  - type: note
    content: Isa 22:22.
  '8':
  - type: text
    content: ' '
  - type: text
    content: “I know all the things you do, and I have opened a door for you that no one can close. You have little strength, yet you obeyed my word and did not deny me.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Look, I will force those who belong to Satan’s synagogue—those liars who say they are Jews but are not—to come and bow down at your feet. They will acknowledge that you are the ones I love.
