document_id: EXO.26,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Plans for the Tabernacle
  - type: text
    content: '“Make the Tabernacle from ten curtains of finely woven linen. Decorate the curtains with blue, purple, and scarlet thread and with skillfully embroidered cherubim. '
  '10':
  - type: text
    content: 'Make fifty loops for one edge of each large curtain. '
  '11':
  - type: text
    content: 'Then make fifty bronze clasps, and fasten the loops of the long curtains with the clasps. In this way, the tent covering will be made of one continuous piece. '
  '12':
  - type: text
    content: The remaining 3 feet
  - type: note
    content: Hebrew The half sheet that is left over.
  - type: text
    content: ' of this tent covering will be left to hang over the back of the Tabernacle. '
  '13':
  - type: text
    content: Allow 18 inches
  - type: note
    content: Hebrew 1 cubit [46 centimeters].
  - type: text
    content: ' of remaining material to hang down over each side, so the Tabernacle is completely covered. '
  '14':
  - type: text
    content: Complete the tent covering with a protective layer of tanned ram skins and a layer of fine goatskin leather.
  '15':
  - type: text
    content: '“For the framework of the Tabernacle, construct frames of acacia wood. '
  '16':
  - type: text
    content: Each frame must be 15 feet high and 27 inches wide,
  - type: note
    content: Hebrew 10 cubits [4.6 meters] high and 1.5 cubits [69 centimeters] wide.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'with two pegs under each frame. Make all the frames identical. '
  '18':
  - type: text
    content: 'Make twenty of these frames to support the curtains on the south side of the Tabernacle. '
  '19':
  - type: text
    content: 'Also make forty silver bases—two bases under each frame, with the pegs fitting securely into the bases. '
  '2':
  - type: text
    content: These ten curtains must all be exactly the same size—42 feet long and 6 feet wide.
  - type: note
    content: Hebrew 28 cubits [12.9 meters] long and 4 cubits [1.8 meters] wide.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'For the north side of the Tabernacle, make another twenty frames, '
  '21':
  - type: text
    content: 'with their forty silver bases, two bases under each frame. '
  '22':
  - type: text
    content: 'Make six frames for the rear—the west side of the Tabernacle— '
  '23':
  - type: text
    content: 'along with two additional frames to reinforce the rear corners of the Tabernacle. '
  '24':
  - type: text
    content: 'These corner frames will be matched at the bottom and firmly attached at the top with a single ring, forming a single corner unit. Make both of these corner units the same way. '
  '25':
  - type: text
    content: So there will be eight frames at the rear of the Tabernacle, set in sixteen silver bases—two bases under each frame.
  '26':
  - type: text
    content: '“Make crossbars of acacia wood to link the frames, five crossbars for the north side of the Tabernacle '
  '27':
  - type: text
    content: 'and five for the south side. Also make five crossbars for the rear of the Tabernacle, which will face west. '
  '28':
  - type: text
    content: 'The middle crossbar, attached halfway up the frames, will run all the way from one end of the Tabernacle to the other. '
  '29':
  - type: text
    content: Overlay the frames with gold, and make gold rings to hold the crossbars. Overlay the crossbars with gold as well.
  '3':
  - type: text
    content: 'Join five of these curtains together to make one long curtain, then join the other five into a second long curtain. '
  '30':
  - type: text
    content: “Set up this Tabernacle according to the pattern you were shown on the mountain.
  '31':
  - type: text
    content: '“For the inside of the Tabernacle, make a special curtain of finely woven linen. Decorate it with blue, purple, and scarlet thread and with skillfully embroidered cherubim. '
  '32':
  - type: text
    content: 'Hang this curtain on gold hooks attached to four posts of acacia wood. Overlay the posts with gold, and set them in four silver bases. '
  '33':
  - type: text
    content: Hang the inner curtain from clasps, and put the Ark of the Covenant
  - type: note
    content: Or Ark of the Testimony; also in 26:34.
  - type: text
    content: ' in the room behind it. This curtain will separate the Holy Place from the Most Holy Place.'
  '34':
  - type: text
    content: '“Then put the Ark’s cover—the place of atonement—on top of the Ark of the Covenant inside the Most Holy Place. '
  '35':
  - type: text
    content: Place the table outside the inner curtain on the north side of the Tabernacle, and place the lampstand across the room on the south side.
  '36':
  - type: text
    content: '“Make another curtain for the entrance to the sacred tent. Make it of finely woven linen and embroider it with exquisite designs, using blue, purple, and scarlet thread. '
  '37':
  - type: text
    content: Craft five posts from acacia wood. Overlay them with gold, and hang the curtain from them with gold hooks. Cast five bronze bases for the posts.
  '4':
  - type: text
    content: 'Put loops of blue yarn along the edge of the last curtain in each set. '
  '5':
  - type: text
    content: 'The fifty loops along the edge of one curtain are to match the fifty loops along the edge of the other curtain. '
  '6':
  - type: text
    content: Then make fifty gold clasps and fasten the long curtains together with the clasps. In this way, the Tabernacle will be made of one continuous piece.
  '7':
  - type: text
    content: '“Make eleven curtains of goat-hair cloth to serve as a tent covering for the Tabernacle. '
  '8':
  - type: text
    content: These eleven curtains must all be exactly the same size—45 feet long and 6 feet wide.
  - type: note
    content: Hebrew 30 cubits [13.8 meters] long and 4 cubits [1.8 meters] wide.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Join five of these curtains together to make one long curtain, and join the other six into a second long curtain. Allow 3 feet of material from the second set of curtains to hang over the front
  - type: note
    content: Hebrew Double over the sixth sheet at the front.
  - type: text
    content: ' of the sacred tent. '
