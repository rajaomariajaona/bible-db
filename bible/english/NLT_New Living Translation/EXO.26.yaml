document_id: EXO.26,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plans for the Tabernacle
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Make the Tabernacle from ten curtains of finely woven linen. Decorate the curtains with blue, purple, and scarlet thread and with skillfully embroidered cherubim. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Make fifty loops for one edge of each large curtain. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then make fifty bronze clasps, and fasten the loops of the long curtains with the clasps. In this way, the tent covering will be made of one continuous piece. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The remaining 3 feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The half sheet that is left over.
      marker-yv: yv-n
    - type: text
      text: ' of this tent covering will be left to hang over the back of the Tabernacle. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Allow 18 inches
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 cubit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[46 centimeters].'
      marker-yv: yv-n
    - type: text
      text: ' of remaining material to hang down over each side, so the Tabernacle is completely covered. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Complete the tent covering with a protective layer of tanned ram skins and a layer of fine goatskin leather.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“For the framework of the Tabernacle, construct frames of acacia wood. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Each frame must be 15 feet high and 27 inches wide,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '10 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[4.6 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'high and 1.5 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[69 centimeters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wide.
      marker-yv: yv-n
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'with two pegs under each frame. Make all the frames identical. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Make twenty of these frames to support the curtains on the south side of the Tabernacle. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also make forty silver bases—two bases under each frame, with the pegs fitting securely into the bases. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: These ten curtains must all be exactly the same size—42 feet long and 6 feet wide.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '28 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[12.9 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long and 4 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[1.8 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wide.
      marker-yv: yv-n
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the north side of the Tabernacle, make another twenty frames, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'with their forty silver bases, two bases under each frame. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Make six frames for the rear—the west side of the Tabernacle— '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'along with two additional frames to reinforce the rear corners of the Tabernacle. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These corner frames will be matched at the bottom and firmly attached at the top with a single ring, forming a single corner unit. Make both of these corner units the same way. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So there will be eight frames at the rear of the Tabernacle, set in sixteen silver bases—two bases under each frame.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Make crossbars of acacia wood to link the frames, five crossbars for the north side of the Tabernacle '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and five for the south side. Also make five crossbars for the rear of the Tabernacle, which will face west. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The middle crossbar, attached halfway up the frames, will run all the way from one end of the Tabernacle to the other. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Overlay the frames with gold, and make gold rings to hold the crossbars. Overlay the crossbars with gold as well.
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Join five of these curtains together to make one long curtain, then join the other five into a second long curtain. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Set up this Tabernacle according to the pattern you were shown on the mountain.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“For the inside of the Tabernacle, make a special curtain of finely woven linen. Decorate it with blue, purple, and scarlet thread and with skillfully embroidered cherubim. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hang this curtain on gold hooks attached to four posts of acacia wood. Overlay the posts with gold, and set them in four silver bases. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hang the inner curtain from clasps, and put the Ark of the Covenant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ark of the Testimony; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 26:34.
      marker-yv: yv-n
    - type: text
      text: ' in the room behind it. This curtain will separate the Holy Place from the Most Holy Place.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then put the Ark’s cover—the place of atonement—on top of the Ark of the Covenant inside the Most Holy Place. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Place the table outside the inner curtain on the north side of the Tabernacle, and place the lampstand across the room on the south side.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Make another curtain for the entrance to the sacred tent. Make it of finely woven linen and embroider it with exquisite designs, using blue, purple, and scarlet thread. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Craft five posts from acacia wood. Overlay them with gold, and hang the curtain from them with gold hooks. Cast five bronze bases for the posts.
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Put loops of blue yarn along the edge of the last curtain in each set. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The fifty loops along the edge of one curtain are to match the fifty loops along the edge of the other curtain. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then make fifty gold clasps and fasten the long curtains together with the clasps. In this way, the Tabernacle will be made of one continuous piece.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Make eleven curtains of goat-hair cloth to serve as a tent covering for the Tabernacle. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These eleven curtains must all be exactly the same size—45 feet long and 6 feet wide.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '30 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[13.8 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'long and 4 cubits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[1.8 meters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wide.
      marker-yv: yv-n
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Join five of these curtains together to make one long curtain, and join the other six into a second long curtain. Allow 3 feet of material from the second set of curtains to hang over the front
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Double over the sixth sheet at the front.
      marker-yv: yv-n
    - type: text
      text: ' of the sacred tent. '
