document_id: GEN.41,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Pharaoh’s Dreams
  - type: text
    content: 'Two full years later, Pharaoh dreamed that he was standing on the bank of the Nile River. '
  '10':
  - type: text
    content: '“Some time ago, you were angry with the chief baker and me, and you imprisoned us in the palace of the captain of the guard. '
  '11':
  - type: text
    content: 'One night the chief baker and I each had a dream, and each dream had its own meaning. '
  '12':
  - type: text
    content: 'There was a young Hebrew man with us in the prison who was a slave of the captain of the guard. We told him our dreams, and he told us what each of our dreams meant. '
  '13':
  - type: text
    content: And everything happened just as he had predicted. I was restored to my position as cup-bearer, and the chief baker was executed and impaled on a pole.”
  '14':
  - type: text
    content: 'Pharaoh sent for Joseph at once, and he was quickly brought from the prison. After he shaved and changed his clothes, he went in and stood before Pharaoh. '
  '15':
  - type: text
    content: Then Pharaoh said to Joseph, “I had a dream last night, and no one here can tell me what it means. But I have heard that when you hear about a dream you can interpret it.”
  '16':
  - type: text
    content: “It is beyond my power to do this,” Joseph replied. “But God can tell you what it means and set you at ease.”
  '17':
  - type: text
    content: 'So Pharaoh told Joseph his dream. “In my dream,” he said, “I was standing on the bank of the Nile River, '
  '18':
  - type: text
    content: 'and I saw seven fat, healthy cows come up out of the river and begin grazing in the marsh grass. '
  '19':
  - type: text
    content: 'But then I saw seven sick-looking cows, scrawny and thin, come up after them. I’ve never seen such sorry-looking animals in all the land of Egypt. '
  '2':
  - type: text
    content: 'In his dream he saw seven fat, healthy cows come up out of the river and begin grazing in the marsh grass. '
  '20':
  - type: text
    content: 'These thin, scrawny cows ate the seven fat cows. '
  '21':
  - type: text
    content: But afterward you wouldn’t have known it, for they were still as thin and scrawny as before! Then I woke up.
  '22':
  - type: text
    content: '“In my dream I also saw seven heads of grain, full and beautiful, growing on a single stalk. '
  '23':
  - type: text
    content: 'Then seven more heads of grain appeared, but these were blighted, shriveled, and withered by the east wind. '
  '24':
  - type: text
    content: And the shriveled heads swallowed the seven healthy heads. I told these dreams to the magicians, but no one could tell me what they mean.”
  '25':
  - type: text
    content: 'Joseph responded, “Both of Pharaoh’s dreams mean the same thing. God is telling Pharaoh in advance what he is about to do. '
  '26':
  - type: text
    content: 'The seven healthy cows and the seven healthy heads of grain both represent seven years of prosperity. '
  '27':
  - type: text
    content: The seven thin, scrawny cows that came up later and the seven thin heads of grain, withered by the east wind, represent seven years of famine.
  '28':
  - type: text
    content: '“This will happen just as I have described it, for God has revealed to Pharaoh in advance what he is about to do. '
  '29':
  - type: text
    content: 'The next seven years will be a period of great prosperity throughout the land of Egypt. '
  '3':
  - type: text
    content: 'Then he saw seven more cows come up behind them from the Nile, but these were scrawny and thin. These cows stood beside the fat cows on the riverbank. '
  '30':
  - type: text
    content: 'But afterward there will be seven years of famine so great that all the prosperity will be forgotten in Egypt. Famine will destroy the land. '
  '31':
  - type: text
    content: 'This famine will be so severe that even the memory of the good years will be erased. '
  '32':
  - type: text
    content: As for having two similar dreams, it means that these events have been decreed by God, and he will soon make them happen.
  '33':
  - type: text
    content: '“Therefore, Pharaoh should find an intelligent and wise man and put him in charge of the entire land of Egypt. '
  '34':
  - type: text
    content: 'Then Pharaoh should appoint supervisors over the land and let them collect one-fifth of all the crops during the seven good years. '
  '35':
  - type: text
    content: 'Have them gather all the food produced in the good years that are just ahead and bring it to Pharaoh’s storehouses. Store it away, and guard it so there will be food in the cities. '
  '36':
  - type: text
    content: That way there will be enough to eat when the seven years of famine come to the land of Egypt. Otherwise this famine will destroy the land.”
  - type: heading
    content: Joseph Made Ruler of Egypt
  '37':
  - type: text
    content: 'Joseph’s suggestions were well received by Pharaoh and his officials. '
  '38':
  - type: text
    content: 'So Pharaoh asked his officials, “Can we find anyone else like this man so obviously filled with the spirit of God?” '
  '39':
  - type: text
    content: 'Then Pharaoh said to Joseph, “Since God has revealed the meaning of the dreams to you, clearly no one else is as intelligent or wise as you are. '
  '4':
  - type: text
    content: Then the scrawny, thin cows ate the seven healthy, fat cows! At this point in the dream, Pharaoh woke up.
  '40':
  - type: text
    content: You will be in charge of my court, and all my people will take orders from you. Only I, sitting on my throne, will have a rank higher than yours.”
  '41':
  - type: text
    content: 'Pharaoh said to Joseph, “I hereby put you in charge of the entire land of Egypt.” '
  '42':
  - type: text
    content: 'Then Pharaoh removed his signet ring from his hand and placed it on Joseph’s finger. He dressed him in fine linen clothing and hung a gold chain around his neck. '
  '43':
  - type: text
    content: 'Then he had Joseph ride in the chariot reserved for his second-in-command. And wherever Joseph went, the command was shouted, “Kneel down!” So Pharaoh put Joseph in charge of all Egypt. '
  '44':
  - type: text
    content: And Pharaoh said to him, “I am Pharaoh, but no one will lift a hand or foot in the entire land of Egypt without your approval.”
  '45':
  - type: text
    content: Then Pharaoh gave Joseph a new Egyptian name, Zaphenath-paneah.
  - type: note
    content: Zaphenath-paneah probably means “God speaks and lives.”
  - type: text
    content: ' He also gave him a wife, whose name was Asenath. She was the daughter of Potiphera, the priest of On.'
  - type: note
    content: Greek version reads of Heliopolis; also in 41:50.
  - type: text
    content: ' So Joseph took charge of the entire land of Egypt. '
  '46':
  - type: text
    content: He was thirty years old when he began serving in the court of Pharaoh, the king of Egypt. And when Joseph left Pharaoh’s presence, he inspected the entire land of Egypt.
  '47':
  - type: text
    content: 'As predicted, for seven years the land produced bumper crops. '
  '48':
  - type: text
    content: 'During those years, Joseph gathered all the crops grown in Egypt and stored the grain from the surrounding fields in the cities. '
  '49':
  - type: text
    content: He piled up huge amounts of grain like sand on the seashore. Finally, he stopped keeping records because there was too much to measure.
  '5':
  - type: text
    content: 'But he fell asleep again and had a second dream. This time he saw seven heads of grain, plump and beautiful, growing on a single stalk. '
  '50':
  - type: text
    content: 'During this time, before the first of the famine years, two sons were born to Joseph and his wife, Asenath, the daughter of Potiphera, the priest of On. '
  '51':
  - type: text
    content: Joseph named his older son Manasseh,
  - type: note
    content: Manasseh sounds like a Hebrew term that means “causing to forget.”
  - type: text
    content: ' for he said, “God has made me forget all my troubles and everyone in my father’s family.” '
  '52':
  - type: text
    content: Joseph named his second son Ephraim,
  - type: note
    content: Ephraim sounds like a Hebrew term that means “fruitful.”
  - type: text
    content: ' for he said, “God has made me fruitful in this land of my grief.”'
  '53':
  - type: text
    content: 'At last the seven years of bumper crops throughout the land of Egypt came to an end. '
  '54':
  - type: text
    content: 'Then the seven years of famine began, just as Joseph had predicted. The famine also struck all the surrounding countries, but throughout Egypt there was plenty of food. '
  '55':
  - type: text
    content: 'Eventually, however, the famine spread throughout the land of Egypt as well. And when the people cried out to Pharaoh for food, he told them, “Go to Joseph, and do whatever he tells you.” '
  '56':
  - type: text
    content: 'So with severe famine everywhere, Joseph opened up the storehouses and distributed grain to the Egyptians, for the famine was severe throughout the land of Egypt. '
  '57':
  - type: text
    content: And people from all around came to Egypt to buy grain from Joseph because the famine was severe throughout the world.
  '6':
  - type: text
    content: 'Then seven more heads of grain appeared, but these were shriveled and withered by the east wind. '
  '7':
  - type: text
    content: And these thin heads swallowed up the seven plump, well-formed heads! Then Pharaoh woke up again and realized it was a dream.
  '8':
  - type: text
    content: The next morning Pharaoh was very disturbed by the dreams. So he called for all the magicians and wise men of Egypt. When Pharaoh told them his dreams, not one of them could tell him what they meant.
  '9':
  - type: text
    content: 'Finally, the king’s chief cup-bearer spoke up. “Today I have been reminded of my failure,” he told Pharaoh. '
