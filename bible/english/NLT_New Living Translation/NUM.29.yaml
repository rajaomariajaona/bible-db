  - type: text
    text: Offerings for the Festival of Trumpets
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Celebrate the Festival of Trumpets each year on the first day of the appointed month in early autumn.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the first day of the seventh month. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This day in the ancient Hebrew lunar calendar occurred in September or October. This festival is celebrated today as Rosh Hashanah, the Jewish new year.
    marker-yv: yv-n
  - type: text
    text: ' You must call an official day for holy assembly, and you may do no ordinary work. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On that day you must present a burnt offering as a pleasing aroma to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. It will consist of one young bull, one ram, and seven one-year-old male lambs, all with no defects. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: These must be accompanied by grain offerings of choice flour moistened with olive oil—six quarts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:3a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '3/10 of an ephah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[6.6 liters]; also in 29:9, 14.'
    marker-yv: yv-n
  - type: text
    text: ' with the bull, four quarts'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:3b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '2/10 of an ephah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[4.4 liters]; also in 29:9, 14.'
    marker-yv: yv-n
  - type: text
    text: ' with the ram, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: and two quarts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1/10 of an ephah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[2.2 liters]; also in 29:10, 15.'
    marker-yv: yv-n
  - type: text
    text: ' with each of the seven lambs. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'In addition, you must sacrifice a male goat as a sin offering to purify yourselves and make yourselves right with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to make atonement for yourselves.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'These special sacrifices are in addition to your regular monthly and daily burnt offerings, and they must be given with their prescribed grain offerings and liquid offerings. These offerings are given as a special gift to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', a pleasing aroma to him.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Offerings for the Day of Atonement
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Ten days later, on the tenth day of the same month,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the tenth day of the seventh month; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see 29:1 and the note there. This day in the ancient Hebrew lunar calendar occurred in September or October. It is celebrated today as Yom Kippur.
    marker-yv: yv-n
  - type: text
    text: ' you must call another holy assembly. On that day, the Day of Atonement, the people must go without food and must do no ordinary work. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'You must present a burnt offering as a pleasing aroma to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. It will consist of one young bull, one ram, and seven one-year-old male lambs, all with no defects. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'These offerings must be accompanied by the prescribed grain offerings of choice flour moistened with olive oil—six quarts of choice flour with the bull, four quarts of choice flour with the ram, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and two quarts of choice flour with each of the seven lambs. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You must also sacrifice one male goat for a sin offering. This is in addition to the sin offering of atonement and the regular daily burnt offering with its grain offering, and their accompanying liquid offerings.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Offerings for the Festival of Shelters
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Five days later, on the fifteenth day of the same month,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:12a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the fifteenth day of the seventh month; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see 29:1, 7 and the notes there. This day in the ancient Hebrew lunar calendar occurred in late September, October, or early November.
    marker-yv: yv-n
  - type: text
    text: ' you must call another holy assembly of all the people, and you may do no ordinary work on that day. It is the beginning of the Festival of Shelters,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:12b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Festival of Booths, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Festival of Tabernacles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . This was earlier called the Festival of the Final Harvest or Festival of Ingathering (see Exod 23:16b). It is celebrated today as Sukkot (or Succoth).
    marker-yv: yv-n
  - type: text
    text: ' a seven-day festival to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'On the first day of the festival, you must present a burnt offering as a special gift, a pleasing aroma to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. It will consist of thirteen young bulls, two rams, and fourteen one-year-old male lambs, all with no defects. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Each of these offerings must be accompanied by a grain offering of choice flour moistened with olive oil—six quarts for each of the thirteen bulls, four quarts for each of the two rams, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and two quarts for each of the fourteen lambs. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You must also sacrifice a male goat as a sin offering, in addition to the regular burnt offering with its accompanying grain offering and liquid offering.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“On the second day of this seven-day festival, sacrifice twelve young bulls, two rams, and fourteen one-year-old male lambs, all with no defects. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
