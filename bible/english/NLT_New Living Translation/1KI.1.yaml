document_id: 1KI.1,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David in His Old Age
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'King David was now very old, and no matter how many blankets covered him, he could not keep warm. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: But he did not invite Nathan the prophet or Benaiah or the king’s bodyguard or his brother Solomon.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then Nathan went to Bathsheba, Solomon’s mother, and asked her, “Haven’t you heard that Haggith’s son, Adonijah, has made himself king, and our lord David doesn’t even know about it? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'If you want to save your own life and the life of your son Solomon, follow my advice. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Go at once to King David and say to him, ‘My lord the king, didn’t you make a vow and say to me, “Your son Solomon will surely be the next king and will sit on my throne”? Why then has Adonijah become king?’ '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: And while you are still talking with him, I will come and confirm everything you have said.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So Bathsheba went into the king’s bedroom. (He was very old now, and Abishag was taking care of him.) '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Bathsheba bowed down before the king.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What can I do for you?” he asked her.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'She replied, “My lord, you made a vow before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God when you said to me, ‘Your son Solomon will surely be the next king and will sit on my throne.’ '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But instead, Adonijah has made himself king, and my lord the king does not even know about it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'He has sacrificed many cattle, fattened calves, and sheep, and he has invited all the king’s sons to attend the celebration. He also invited Abiathar the priest and Joab, the commander of the army. But he did not invite your servant Solomon. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: So his advisers told him, “Let us find a young virgin to wait on you and look after you, my lord. She will lie in your arms and keep you warm.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And now, my lord the king, all Israel is waiting for you to announce who will become king after you. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: If you do not act, my son Solomon and I will be treated as criminals as soon as my lord the king has died.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'While she was still speaking with the king, Nathan the prophet arrived. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: The king’s officials told him, “Nathan the prophet is here to see you.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nathan went in and bowed before the king with his face to the ground. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nathan asked, “My lord the king, have you decided that Adonijah will be the next king and that he will sit on your throne? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Today he has sacrificed many cattle, fattened calves, and sheep, and he has invited all the king’s sons to attend the celebration. He also invited the commanders of the army and Abiathar the priest. They are feasting and drinking with him and shouting, ‘Long live King Adonijah!’ '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'But he did not invite me or Zadok the priest or Benaiah or your servant Solomon. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Has my lord the king really done this without letting any of his officials know who should be the next king?”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Makes Solomon King
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'King David responded, “Call Bathsheba!” So she came back in and stood before the king. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'And the king repeated his vow: “As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, who has rescued me from every danger, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So they searched throughout the land of Israel for a beautiful girl, and they found Abishag from Shunem and brought her to the king. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'your son Solomon will be the next king and will sit on my throne this very day, just as I vowed to you before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel.”'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Then Bathsheba bowed down with her face to the ground before the king and exclaimed, “May my lord King David live forever!”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Then King David ordered, “Call Zadok the priest, Nathan the prophet, and Benaiah son of Jehoiada.” When they came into the king’s presence, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'the king said to them, “Take Solomon and my officials down to Gihon Spring. Solomon is to ride on my own mule. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'There Zadok the priest and Nathan the prophet are to anoint him king over Israel. Blow the ram’s horn and shout, ‘Long live King Solomon!’ '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Then escort him back here, and he will sit on my throne. He will succeed me as king, for I have appointed him to be ruler over Israel and Judah.”
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: '“Amen!” Benaiah son of Jehoiada replied. “May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of my lord the king, decree that it happen. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be with Solomon as he has been with you, my lord the king, and may he make Solomon’s reign even greater than yours!”'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: So Zadok the priest, Nathan the prophet, Benaiah son of Jehoiada, and the king’s bodyguard
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Kerethites and Pelethites; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 1:44.
      marker-yv: yv-n
    - type: text
      text: ' took Solomon down to Gihon Spring, with Solomon riding on King David’s own mule. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'There Zadok the priest took the flask of olive oil from the sacred tent and anointed Solomon with the oil. Then they sounded the ram’s horn and all the people shouted, “Long live King Solomon!” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The girl was very beautiful, and she looked after the king and took care of him. But the king had no sexual relations with her.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Adonijah Claims the Throne
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: And all the people followed Solomon into Jerusalem, playing flutes and shouting for joy. The celebration was so joyous and noisy that the earth shook with the sound.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Adonijah and his guests heard the celebrating and shouting just as they were finishing their banquet. When Joab heard the sound of the ram’s horn, he asked, “What’s going on? Why is the city in such an uproar?”
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: And while he was still speaking, Jonathan son of Abiathar the priest arrived. “Come in,” Adonijah said to him, “for you are a good man. You must have good news.”
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: '“Not at all!” Jonathan replied. “Our lord King David has just declared Solomon king! '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'The king sent him down to Gihon Spring with Zadok the priest, Nathan the prophet, and Benaiah son of Jehoiada, protected by the king’s bodyguard. They had him ride on the king’s own mule, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'and Zadok and Nathan have anointed him at Gihon Spring as the new king. They have just returned, and the whole city is celebrating and rejoicing. That’s what all the noise is about. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'What’s more, Solomon is now sitting on the royal throne as king. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'And all the royal officials have gone to King David and congratulated him, saying, ‘May your God make Solomon’s fame even greater than your own, and may Solomon’s reign be even greater than yours!’ Then the king bowed his head in worship as he lay in his bed, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'and he said, ‘Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, who today has chosen a successor to sit on my throne while I am still alive to see it.’”'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Then all of Adonijah’s guests jumped up in panic from the banquet table and quickly scattered. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'About that time David’s son Adonijah, whose mother was Haggith, began boasting, “I will make myself king.” So he provided himself with chariots and charioteers and recruited fifty men to run in front of him. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Adonijah was afraid of Solomon, so he rushed to the sacred tent and grabbed on to the horns of the altar. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Word soon reached Solomon that Adonijah had seized the horns of the altar in fear, and that he was pleading, “Let King Solomon swear today that he will not kill me!”
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Solomon replied, “If he proves himself to be loyal, not a hair on his head will be touched. But if he makes trouble, he will die.” '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: So King Solomon summoned Adonijah, and they brought him down from the altar. He came and bowed respectfully before King Solomon, who dismissed him, saying, “Go on home.”
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Now his father, King David, had never disciplined him at any time, even by asking, “Why are you doing that?” Adonijah had been born next after Absalom, and he was very handsome.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Adonijah took Joab son of Zeruiah and Abiathar the priest into his confidence, and they agreed to help him become king. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But Zadok the priest, Benaiah son of Jehoiada, Nathan the prophet, Shimei, Rei, and David’s personal bodyguard refused to support Adonijah.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Adonijah went to the Stone of Zoheleth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'to the Serpent’s Stone; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version supports reading '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Zoheleth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: as a proper name.
      marker-yv: yv-n
    - type: text
      text: ' near the spring of En-rogel, where he sacrificed sheep, cattle, and fattened calves. He invited all his brothers—the other sons of King David—and all the royal officials of Judah. '
