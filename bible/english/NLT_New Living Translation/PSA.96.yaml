verses:
  '1':
  - type: text
    content: 'Sing a new song to the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'Let the whole earth sing to the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '10':
  - type: text
    content: 'Tell all the nations, “The '
  - type: text
    content: Lord
  - type: text
    content: ' reigns!”'
  - type: text
    content: The world stands firm and cannot be shaken.
  - type: text
    content: He will judge all peoples fairly.
  '11':
  - type: text
    content: Let the heavens be glad, and the earth rejoice!
  - type: text
    content: Let the sea and everything in it shout his praise!
  '12':
  - type: text
    content: Let the fields and their crops burst out with joy!
  - type: text
    content: Let the trees of the forest sing for joy
  '13':
  - type: text
    content: 'before the '
  - type: text
    content: Lord
  - type: text
    content: ', for he is coming!'
  - type: text
    content: He is coming to judge the earth.
  - type: text
    content: He will judge the world with justice,
  - type: text
    content: and the nations with his truth.
  '2':
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ; praise his name.
  - type: text
    content: Each day proclaim the good news that he saves.
  '3':
  - type: text
    content: Publish his glorious deeds among the nations.
  - type: text
    content: Tell everyone about the amazing things he does.
  '4':
  - type: text
    content: 'Great is the '
  - type: text
    content: Lord
  - type: text
    content: '! He is most worthy of praise!'
  - type: text
    content: He is to be feared above all gods.
  '5':
  - type: text
    content: The gods of other nations are mere idols,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' made the heavens!'
  '6':
  - type: text
    content: Honor and majesty surround him;
  - type: text
    content: strength and beauty fill his sanctuary.
  '7':
  - type: text
    content: 'O nations of the world, recognize the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'recognize that the '
  - type: text
    content: Lord
  - type: text
    content: ' is glorious and strong.'
  '8':
  - type: text
    content: 'Give to the '
  - type: text
    content: Lord
  - type: text
    content: ' the glory he deserves!'
  - type: text
    content: Bring your offering and come into his courts.
  '9':
  - type: text
    content: 'Worship the '
  - type: text
    content: Lord
  - type: text
    content: ' in all his holy splendor.'
  - type: text
    content: Let all the earth tremble before him.
