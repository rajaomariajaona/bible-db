  - type: text
    text: 'Sing a new song to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Let the whole earth sing to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sing to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ; praise his name.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Each day proclaim the good news that he saves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Publish his glorious deeds among the nations.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tell everyone about the amazing things he does.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Great is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '! He is most worthy of praise!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is to be feared above all gods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The gods of other nations are mere idols,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' made the heavens!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Honor and majesty surround him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: strength and beauty fill his sanctuary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'O nations of the world, recognize the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'recognize that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is glorious and strong.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Give to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' the glory he deserves!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Bring your offering and come into his courts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Worship the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in all his holy splendor.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let all the earth tremble before him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tell all the nations, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' reigns!”'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The world stands firm and cannot be shaken.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will judge all peoples fairly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Let the heavens be glad, and the earth rejoice!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let the sea and everything in it shout his praise!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Let the fields and their crops burst out with joy!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let the trees of the forest sing for joy
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for he is coming!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is coming to judge the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will judge the world with justice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the nations with his truth.
