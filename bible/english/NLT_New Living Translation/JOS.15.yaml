document_id: JOS.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Land Given to the Tribe of Judah
  - type: text
    content: The allotment for the clans of the tribe of Judah reached southward to the border of Edom, as far south as the wilderness of Zin.
  '10':
  - type: text
    content: 'The boundary circled west of Baalah to Mount Seir, passed along to the town of Kesalon on the northern slope of Mount Jearim, and went down to Beth-shemesh and on to Timnah. '
  '11':
  - type: text
    content: The boundary then proceeded to the slope of the hill north of Ekron, where it turned toward Shikkeron and Mount Baalah. It passed Jabneel and ended at the Mediterranean Sea.
  '12':
  - type: text
    content: The western boundary was the shoreline of the Mediterranean Sea.
  - type: note
    content: Hebrew the Great Sea; also in 15:47.
  - type: text
    content: These are the boundaries for the clans of the tribe of Judah.
  - type: heading
    content: The Land Given to Caleb
  '13':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Joshua to assign some of Judah’s territory to Caleb son of Jephunneh. So Caleb was given the town of Kiriath-arba (that is, Hebron), which had been named after Anak’s ancestor. '
  '14':
  - type: text
    content: Caleb drove out the three groups of Anakites—the descendants of Sheshai, Ahiman, and Talmai, the sons of Anak.
  '15':
  - type: text
    content: 'From there he went to fight against the people living in the town of Debir (formerly called Kiriath-sepher). '
  '16':
  - type: text
    content: 'Caleb said, “I will give my daughter Acsah in marriage to the one who attacks and captures Kiriath-sepher.” '
  '17':
  - type: text
    content: Othniel, the son of Caleb’s brother Kenaz, was the one who conquered it, so Acsah became Othniel’s wife.
  '18':
  - type: text
    content: When Acsah married Othniel, she urged him
  - type: note
    content: Some Greek manuscripts read he urged her.
  - type: text
    content: ' to ask her father for a field. As she got down off her donkey, Caleb asked her, “What’s the matter?”'
  '19':
  - type: text
    content: She said, “Give me another gift. You have already given me land in the Negev; now please give me springs of water, too.” So Caleb gave her the upper and lower springs.
  - type: heading
    content: The Towns Allotted to Judah
  '2':
  - type: text
    content: The southern boundary began at the south bay of the Dead Sea,
  - type: note
    content: Hebrew the Salt Sea; also in 15:5.
  - type: text
    content: ' '
  '20':
  - type: text
    content: This was the homeland allocated to the clans of the tribe of Judah.
  '21':
  - type: text
    content: 'The towns of Judah situated along the borders of Edom in the extreme south were Kabzeel, Eder, Jagur, '
  '22':
  - type: text
    content: 'Kinah, Dimonah, Adadah, '
  '23':
  - type: text
    content: 'Kedesh, Hazor, Ithnan, '
  '24':
  - type: text
    content: 'Ziph, Telem, Bealoth, '
  '25':
  - type: text
    content: 'Hazor-hadattah, Kerioth-hezron (that is, Hazor), '
  '26':
  - type: text
    content: 'Amam, Shema, Moladah, '
  '27':
  - type: text
    content: 'Hazar-gaddah, Heshmon, Beth-pelet, '
  '28':
  - type: text
    content: 'Hazar-shual, Beersheba, Biziothiah, '
  '29':
  - type: text
    content: 'Baalah, Iim, Ezem, '
  '3':
  - type: text
    content: ran south of Scorpion Pass
  - type: note
    content: Hebrew Akrabbim.
  - type: text
    content: ' into the wilderness of Zin, and then went south of Kadesh-barnea to Hezron. Then it went up to Addar, where it turned toward Karka. '
  '30':
  - type: text
    content: 'Eltolad, Kesil, Hormah, '
  '31':
  - type: text
    content: 'Ziklag, Madmannah, Sansannah, '
  '32':
  - type: text
    content: Lebaoth, Shilhim, Ain, and Rimmon—twenty-nine towns with their surrounding villages.
  '33':
  - type: text
    content: The following towns situated in the western foothills
  - type: note
    content: Hebrew the Shephelah.
  - type: text
    content: ' were also given to Judah: Eshtaol, Zorah, Ashnah, '
  '34':
  - type: text
    content: 'Zanoah, En-gannim, Tappuah, Enam, '
  '35':
  - type: text
    content: 'Jarmuth, Adullam, Socoh, Azekah, '
  '36':
  - type: text
    content: Shaaraim, Adithaim, Gederah, and Gederothaim—fourteen towns with their surrounding villages.
  '37':
  - type: text
    content: 'Also included were Zenan, Hadashah, Migdal-gad, '
  '38':
  - type: text
    content: 'Dilean, Mizpeh, Joktheel, '
  '39':
  - type: text
    content: 'Lachish, Bozkath, Eglon, '
  '4':
  - type: text
    content: From there it passed to Azmon until it finally reached the Brook of Egypt, which it followed to the Mediterranean Sea.
  - type: note
    content: Hebrew the sea; also in 15:11.
  - type: text
    content: ' This was their'
  - type: note
    content: Hebrew your.
  - type: text
    content: ' southern boundary.'
  '40':
  - type: text
    content: 'Cabbon, Lahmam, Kitlish, '
  '41':
  - type: text
    content: Gederoth, Beth-dagon, Naamah, and Makkedah—sixteen towns with their surrounding villages.
  '42':
  - type: text
    content: 'Besides these, there were Libnah, Ether, Ashan, '
  '43':
  - type: text
    content: 'Iphtah, Ashnah, Nezib, '
  '44':
  - type: text
    content: Keilah, Aczib, and Mareshah—nine towns with their surrounding villages.
  '45':
  - type: text
    content: 'The territory of the tribe of Judah also included Ekron and its surrounding settlements and villages. '
  '46':
  - type: text
    content: 'From Ekron the boundary extended west and included the towns near Ashdod with their surrounding villages. '
  '47':
  - type: text
    content: It also included Ashdod with its surrounding settlements and villages and Gaza with its settlements and villages, as far as the Brook of Egypt and along the coast of the Mediterranean Sea.
  '48':
  - type: text
    content: 'Judah also received the following towns in the hill country: Shamir, Jattir, Socoh, '
  '49':
  - type: text
    content: 'Dannah, Kiriath-sannah (that is, Debir), '
  '5':
  - type: text
    content: The eastern boundary extended along the Dead Sea to the mouth of the Jordan River.
  - type: text
    content: 'The northern boundary began at the bay where the Jordan River empties into the Dead Sea, '
  '50':
  - type: text
    content: 'Anab, Eshtemoh, Anim, '
  '51':
  - type: text
    content: Goshen, Holon, and Giloh—eleven towns with their surrounding villages.
  '52':
  - type: text
    content: 'Also included were the towns of Arab, Dumah, Eshan, '
  '53':
  - type: text
    content: 'Janim, Beth-tappuah, Aphekah, '
  '54':
  - type: text
    content: Humtah, Kiriath-arba (that is, Hebron), and Zior—nine towns with their surrounding villages.
  '55':
  - type: text
    content: 'Besides these, there were Maon, Carmel, Ziph, Juttah, '
  '56':
  - type: text
    content: 'Jezreel, Jokdeam, Zanoah, '
  '57':
  - type: text
    content: Kain, Gibeah, and Timnah—ten towns with their surrounding villages.
  '58':
  - type: text
    content: 'In addition, there were Halhul, Beth-zur, Gedor, '
  '59':
  - type: text
    content: Maarath, Beth-anoth, and Eltekon—six towns with their surrounding villages.
  '6':
  - type: text
    content: 'went up from there to Beth-hoglah, then proceeded north of Beth-arabah to the Stone of Bohan. (Bohan was Reuben’s son.) '
  '60':
  - type: text
    content: There were also Kiriath-baal (that is, Kiriath-jearim) and Rabbah—two towns with their surrounding villages.
  '61':
  - type: text
    content: 'In the wilderness there were the towns of Beth-arabah, Middin, Secacah, '
  '62':
  - type: text
    content: Nibshan, the City of Salt, and En-gedi—six towns with their surrounding villages.
  '63':
  - type: text
    content: But the tribe of Judah could not drive out the Jebusites, who lived in the city of Jerusalem, so the Jebusites live there among the people of Judah to this day.
  '7':
  - type: text
    content: 'From that point it went through the valley of Achor to Debir, turning north toward Gilgal, which is across from the slopes of Adummim on the south side of the valley. From there the boundary extended to the springs at En-shemesh and on to En-rogel. '
  '8':
  - type: text
    content: 'The boundary then passed through the valley of Ben-Hinnom, along the southern slopes of the Jebusites, where the city of Jerusalem is located. Then it went west to the top of the mountain above the valley of Hinnom, and on up to the northern end of the valley of Rephaim. '
  '9':
  - type: text
    content: From there the boundary extended from the top of the mountain to the spring at the waters of Nephtoah,
  - type: note
    content: Or the spring at Me-nephtoah.
  - type: text
    content: ' and from there to the towns on Mount Ephron. Then it turned toward Baalah (that is, Kiriath-jearim). '
