document_id: JOS.15,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Land Given to the Tribe of Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The allotment for the clans of the tribe of Judah reached southward to the border of Edom, as far south as the wilderness of Zin.
  '10':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The boundary circled west of Baalah to Mount Seir, passed along to the town of Kesalon on the northern slope of Mount Jearim, and went down to Beth-shemesh and on to Timnah. '
  '11':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The boundary then proceeded to the slope of the hill north of Ekron, where it turned toward Shikkeron and Mount Baalah. It passed Jabneel and ended at the Mediterranean Sea.
  '12':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The western boundary was the shoreline of the Mediterranean Sea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Great Sea; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 15:47.
      marker-yv: yv-n
  - type: usfm
    marker: m
    children:
    - type: text
      text: These are the boundaries for the clans of the tribe of Judah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Land Given to Caleb
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Joshua to assign some of Judah’s territory to Caleb son of Jephunneh. So Caleb was given the town of Kiriath-arba (that is, Hebron), which had been named after Anak’s ancestor. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Caleb drove out the three groups of Anakites—the descendants of Sheshai, Ahiman, and Talmai, the sons of Anak.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'From there he went to fight against the people living in the town of Debir (formerly called Kiriath-sepher). '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Caleb said, “I will give my daughter Acsah in marriage to the one who attacks and captures Kiriath-sepher.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Othniel, the son of Caleb’s brother Kenaz, was the one who conquered it, so Acsah became Othniel’s wife.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: When Acsah married Othniel, she urged him
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Greek manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he urged her.
      marker-yv: yv-n
    - type: text
      text: ' to ask her father for a field. As she got down off her donkey, Caleb asked her, “What’s the matter?”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: She said, “Give me another gift. You have already given me land in the Negev; now please give me springs of water, too.” So Caleb gave her the upper and lower springs.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Towns Allotted to Judah
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The southern boundary began at the south bay of the Dead Sea,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the Salt Sea; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 15:5.
      marker-yv: yv-n
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: This was the homeland allocated to the clans of the tribe of Judah.
  '21':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The towns of Judah situated along the borders of Edom in the extreme south were Kabzeel, Eder, Jagur, '
  '22':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Kinah, Dimonah, Adadah, '
  '23':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Kedesh, Hazor, Ithnan, '
  '24':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ziph, Telem, Bealoth, '
  '25':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Hazor-hadattah, Kerioth-hezron (that is, Hazor), '
  '26':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Amam, Shema, Moladah, '
  '27':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Hazar-gaddah, Heshmon, Beth-pelet, '
  '28':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Hazar-shual, Beersheba, Biziothiah, '
  '29':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Baalah, Iim, Ezem, '
  '3':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ran south of Scorpion Pass
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Akrabbim.
      marker-yv: yv-n
    - type: text
      text: ' into the wilderness of Zin, and then went south of Kadesh-barnea to Hezron. Then it went up to Addar, where it turned toward Karka. '
  '30':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Eltolad, Kesil, Hormah, '
  '31':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ziklag, Madmannah, Sansannah, '
  '32':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Lebaoth, Shilhim, Ain, and Rimmon—twenty-nine towns with their surrounding villages.
  '33':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: The following towns situated in the western foothills
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Shephelah.
      marker-yv: yv-n
    - type: text
      text: ' were also given to Judah: Eshtaol, Zorah, Ashnah, '
  '34':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Zanoah, En-gannim, Tappuah, Enam, '
  '35':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Jarmuth, Adullam, Socoh, Azekah, '
  '36':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Shaaraim, Adithaim, Gederah, and Gederothaim—fourteen towns with their surrounding villages.
  '37':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Also included were Zenan, Hadashah, Migdal-gad, '
  '38':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Dilean, Mizpeh, Joktheel, '
  '39':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Lachish, Bozkath, Eglon, '
  '4':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: From there it passed to Azmon until it finally reached the Brook of Egypt, which it followed to the Mediterranean Sea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:4a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the sea; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 15:11.
      marker-yv: yv-n
    - type: text
      text: ' This was their'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:4b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your.
      marker-yv: yv-n
    - type: text
      text: ' southern boundary.'
  '40':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Cabbon, Lahmam, Kitlish, '
  '41':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Gederoth, Beth-dagon, Naamah, and Makkedah—sixteen towns with their surrounding villages.
  '42':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Besides these, there were Libnah, Ether, Ashan, '
  '43':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Iphtah, Ashnah, Nezib, '
  '44':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Keilah, Aczib, and Mareshah—nine towns with their surrounding villages.
  '45':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'The territory of the tribe of Judah also included Ekron and its surrounding settlements and villages. '
  '46':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'From Ekron the boundary extended west and included the towns near Ashdod with their surrounding villages. '
  '47':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: It also included Ashdod with its surrounding settlements and villages and Gaza with its settlements and villages, as far as the Brook of Egypt and along the coast of the Mediterranean Sea.
  '48':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Judah also received the following towns in the hill country: Shamir, Jattir, Socoh, '
  '49':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Dannah, Kiriath-sannah (that is, Debir), '
  '5':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The eastern boundary extended along the Dead Sea to the mouth of the Jordan River.
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'The northern boundary began at the bay where the Jordan River empties into the Dead Sea, '
  '50':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Anab, Eshtemoh, Anim, '
  '51':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Goshen, Holon, and Giloh—eleven towns with their surrounding villages.
  '52':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Also included were the towns of Arab, Dumah, Eshan, '
  '53':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Janim, Beth-tappuah, Aphekah, '
  '54':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Humtah, Kiriath-arba (that is, Hebron), and Zior—nine towns with their surrounding villages.
  '55':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Besides these, there were Maon, Carmel, Ziph, Juttah, '
  '56':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'Jezreel, Jokdeam, Zanoah, '
  '57':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: Kain, Gibeah, and Timnah—ten towns with their surrounding villages.
  '58':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'In addition, there were Halhul, Beth-zur, Gedor, '
  '59':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: Maarath, Beth-anoth, and Eltekon—six towns with their surrounding villages.
  '6':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'went up from there to Beth-hoglah, then proceeded north of Beth-arabah to the Stone of Bohan. (Bohan was Reuben’s son.) '
  '60':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: There were also Kiriath-baal (that is, Kiriath-jearim) and Rabbah—two towns with their surrounding villages.
  '61':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'In the wilderness there were the towns of Beth-arabah, Middin, Secacah, '
  '62':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: Nibshan, the City of Salt, and En-gedi—six towns with their surrounding villages.
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: But the tribe of Judah could not drive out the Jebusites, who lived in the city of Jerusalem, so the Jebusites live there among the people of Judah to this day.
  '7':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'From that point it went through the valley of Achor to Debir, turning north toward Gilgal, which is across from the slopes of Adummim on the south side of the valley. From there the boundary extended to the springs at En-shemesh and on to En-rogel. '
  '8':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The boundary then passed through the valley of Ben-Hinnom, along the southern slopes of the Jebusites, where the city of Jerusalem is located. Then it went west to the top of the mountain above the valley of Hinnom, and on up to the northern end of the valley of Rephaim. '
  '9':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: From there the boundary extended from the top of the mountain to the spring at the waters of Nephtoah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the spring at Me-nephtoah.
      marker-yv: yv-n
    - type: text
      text: ' and from there to the towns on Mount Ephron. Then it turned toward Baalah (that is, Kiriath-jearim). '
