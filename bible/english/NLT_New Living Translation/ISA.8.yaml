document_id: ISA.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Coming Assyrian Invasion
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, “Make a large signboard and clearly write this name on it: Maher-shalal-hash-baz.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:1 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Maher-shalal-hash-baz '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “Swift to plunder and quick to carry away.”
    marker-yv: yv-n
  - type: text
    text: '” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I asked Uriah the priest and Zechariah son of Jeberekiah, both known as honest men, to witness my doing this.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then I slept with my wife, and she became pregnant and gave birth to a son. And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “Call him Maher-shalal-hash-baz. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For before this child is old enough to say ‘Papa’ or ‘Mama,’ the king of Assyria will carry away both the abundance of Damascus and the riches of Samaria.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to me again and said, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “My care for the people of Judah is like the gently flowing waters of Shiloah, but they have rejected it. They are rejoicing over what will happen to
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:6a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: They are rejoicing because of.
    marker-yv: yv-n
  - type: text
    text: ' King Rezin and King Pekah.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:6b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and the son of Remaliah.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Therefore, the Lord will overwhelm them with a mighty flood from the Euphrates River
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the river.
    marker-yv: yv-n
  - type: text
    text: '—the king of Assyria and all his glory. This flood will overflow all its channels '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: and sweep into Judah until it is chin deep. It will spread its wings, submerging your land from one end to the other, O Immanuel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Huddle together, you nations, and be terrified.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen, all you distant lands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prepare for battle, but you will be crushed!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, prepare for battle, but you will be crushed!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Call your councils of war, but they will be worthless.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Develop your strategies, but they will not succeed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: For God is with us!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Immanuel!
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'A Call to Trust the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has given me a strong warning not to think like everyone else does. He said,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Don’t call everything a conspiracy, like they do,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and don’t live in dread of what frightens them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Make the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies holy in your life.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He is the one you should fear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is the one who should make you tremble.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He will keep you safe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But to Israel and Judah
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will be a stone that makes people stumble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a rock that makes them fall.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And for the people of Jerusalem
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will be a trap and a snare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Many will stumble and fall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never to rise again.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will be snared and captured.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Preserve the teaching of God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: entrust his instructions to those who follow me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I will wait for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: who has turned away from the descendants of Jacob.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will put my hope in him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I and the children the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has given me serve as signs and warnings to Israel from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies who dwells in his Temple on Mount Zion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Someone may say to you, “Let’s ask the mediums and those who consult the spirits of the dead. With their whisperings and mutterings, they will tell us what to do.” But shouldn’t people ask God for guidance? Should the living seek guidance from the dead?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Look to God’s instructions and teachings! People who contradict his word are completely in the dark. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'They will go from one place to another, weary and hungry. And because they are hungry, they will rage and curse their king and their God. They will look up to heaven '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: and down at the earth, but wherever they look, there will be trouble and anguish and dark despair. They will be thrown out into the darkness.
