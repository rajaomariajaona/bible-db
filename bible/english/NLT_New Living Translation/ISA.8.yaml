document_id: ISA.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Coming Assyrian Invasion
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Make a large signboard and clearly write this name on it: Maher-shalal-hash-baz.'
  - type: note
    content: Maher-shalal-hash-baz means “Swift to plunder and quick to carry away.”
  - type: text
    content: '” '
  '10':
  - type: text
    content: Call your councils of war, but they will be worthless.
  - type: text
    content: Develop your strategies, but they will not succeed.
  - type: text
    content: For God is with us!
  - type: note
    content: Hebrew Immanuel!
  - type: text
    content: ”
  - type: heading
    content: A Call to Trust the Lord
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has given me a strong warning not to think like everyone else does. He said,'
  '12':
  - type: text
    content: “Don’t call everything a conspiracy, like they do,
  - type: text
    content: and don’t live in dread of what frightens them.
  '13':
  - type: text
    content: 'Make the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies holy in your life.'
  - type: text
    content: He is the one you should fear.
  - type: text
    content: He is the one who should make you tremble.
  '14':
  - type: text
    content: He will keep you safe.
  - type: text
    content: But to Israel and Judah
  - type: text
    content: he will be a stone that makes people stumble,
  - type: text
    content: a rock that makes them fall.
  - type: text
    content: And for the people of Jerusalem
  - type: text
    content: he will be a trap and a snare.
  '15':
  - type: text
    content: Many will stumble and fall,
  - type: text
    content: never to rise again.
  - type: text
    content: They will be snared and captured.”
  '16':
  - type: text
    content: Preserve the teaching of God;
  - type: text
    content: entrust his instructions to those who follow me.
  '17':
  - type: text
    content: 'I will wait for the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who has turned away from the descendants of Jacob.
  - type: text
    content: I will put my hope in him.
  '18':
  - type: text
    content: 'I and the children the '
  - type: text
    content: Lord
  - type: text
    content: ' has given me serve as signs and warnings to Israel from the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies who dwells in his Temple on Mount Zion.'
  '19':
  - type: text
    content: Someone may say to you, “Let’s ask the mediums and those who consult the spirits of the dead. With their whisperings and mutterings, they will tell us what to do.” But shouldn’t people ask God for guidance? Should the living seek guidance from the dead?
  '2':
  - type: text
    content: I asked Uriah the priest and Zechariah son of Jeberekiah, both known as honest men, to witness my doing this.
  '20':
  - type: text
    content: 'Look to God’s instructions and teachings! People who contradict his word are completely in the dark. '
  '21':
  - type: text
    content: 'They will go from one place to another, weary and hungry. And because they are hungry, they will rage and curse their king and their God. They will look up to heaven '
  '22':
  - type: text
    content: and down at the earth, but wherever they look, there will be trouble and anguish and dark despair. They will be thrown out into the darkness.
  '3':
  - type: text
    content: 'Then I slept with my wife, and she became pregnant and gave birth to a son. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Call him Maher-shalal-hash-baz. '
  '4':
  - type: text
    content: For before this child is old enough to say ‘Papa’ or ‘Mama,’ the king of Assyria will carry away both the abundance of Damascus and the riches of Samaria.”
  '5':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to me again and said, '
  '6':
  - type: text
    content: “My care for the people of Judah is like the gently flowing waters of Shiloah, but they have rejected it. They are rejoicing over what will happen to
  - type: note
    content: Or They are rejoicing because of.
  - type: text
    content: ' King Rezin and King Pekah.'
  - type: note
    content: Hebrew and the son of Remaliah.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Therefore, the Lord will overwhelm them with a mighty flood from the Euphrates River
  - type: note
    content: Hebrew the river.
  - type: text
    content: '—the king of Assyria and all his glory. This flood will overflow all its channels '
  '8':
  - type: text
    content: and sweep into Judah until it is chin deep. It will spread its wings, submerging your land from one end to the other, O Immanuel.
  '9':
  - type: text
    content: “Huddle together, you nations, and be terrified.
  - type: text
    content: Listen, all you distant lands.
  - type: text
    content: Prepare for battle, but you will be crushed!
  - type: text
    content: Yes, prepare for battle, but you will be crushed!
