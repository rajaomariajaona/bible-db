document_id: EST.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The King Executes Haman
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So the king and Haman went to Queen Esther’s banquet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: On this second occasion, while they were drinking wine, the king again said to Esther, “Tell me what you want, Queen Esther. What is your request? I will give it to you, even if it is half the kingdom!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Queen Esther replied, “If I have found favor with the king, and if it pleases the king to grant my request, I ask that my life and the lives of my people will be spared. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For my people and I have been sold to those who would kill, slaughter, and annihilate us. If we had merely been sold as slaves, I could remain quiet, for that would be too trivial a matter to warrant disturbing the king.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Who would do such a thing?” King Xerxes demanded. “Who would be so presumptuous as to touch you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Esther replied, “This wicked Haman is our adversary and our enemy.” Haman grew pale with fright before the king and queen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then the king jumped to his feet in a rage and went out into the palace garden.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Haman, however, stayed behind to plead for his life with Queen Esther, for he knew that the king intended to kill him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: In despair he fell on the couch where Queen Esther was reclining, just as the king was returning from the palace garden.
- type: usfm
  marker: p
  children:
  - type: text
    text: The king exclaimed, “Will he even assault the queen right here in the palace, before my very eyes?” And as soon as the king spoke, his attendants covered Haman’s face, signaling his doom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then Harbona, one of the king’s eunuchs, said, “Haman has set up a sharpened pole that stands seventy-five feet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '50 cubits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[23 meters].'
    marker-yv: yv-n
  - type: text
    text: ' tall in his own courtyard. He intended to use it to impale Mordecai, the man who saved the king from assassination.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Then impale Haman on it!” the king ordered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So they impaled Haman on the pole he had set up for Mordecai, and the king’s anger subsided.
