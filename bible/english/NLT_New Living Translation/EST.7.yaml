document_id: EST.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The King Executes Haman
  - type: text
    content: 'So the king and Haman went to Queen Esther’s banquet. '
  '10':
  - type: text
    content: So they impaled Haman on the pole he had set up for Mordecai, and the king’s anger subsided.
  '2':
  - type: text
    content: On this second occasion, while they were drinking wine, the king again said to Esther, “Tell me what you want, Queen Esther. What is your request? I will give it to you, even if it is half the kingdom!”
  '3':
  - type: text
    content: 'Queen Esther replied, “If I have found favor with the king, and if it pleases the king to grant my request, I ask that my life and the lives of my people will be spared. '
  '4':
  - type: text
    content: For my people and I have been sold to those who would kill, slaughter, and annihilate us. If we had merely been sold as slaves, I could remain quiet, for that would be too trivial a matter to warrant disturbing the king.”
  '5':
  - type: text
    content: “Who would do such a thing?” King Xerxes demanded. “Who would be so presumptuous as to touch you?”
  '6':
  - type: text
    content: 'Esther replied, “This wicked Haman is our adversary and our enemy.” Haman grew pale with fright before the king and queen. '
  '7':
  - type: text
    content: Then the king jumped to his feet in a rage and went out into the palace garden.
  - type: text
    content: 'Haman, however, stayed behind to plead for his life with Queen Esther, for he knew that the king intended to kill him. '
  '8':
  - type: text
    content: In despair he fell on the couch where Queen Esther was reclining, just as the king was returning from the palace garden.
  - type: text
    content: The king exclaimed, “Will he even assault the queen right here in the palace, before my very eyes?” And as soon as the king spoke, his attendants covered Haman’s face, signaling his doom.
  '9':
  - type: text
    content: Then Harbona, one of the king’s eunuchs, said, “Haman has set up a sharpened pole that stands seventy-five feet
  - type: note
    content: Hebrew 50 cubits [23 meters].
  - type: text
    content: ' tall in his own courtyard. He intended to use it to impale Mordecai, the man who saved the king from assassination.”'
  - type: text
    content: '“Then impale Haman on it!” the king ordered. '
