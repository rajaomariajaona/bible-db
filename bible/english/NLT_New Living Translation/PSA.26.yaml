document_id: PSA.26,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David.
  - type: text
    content: 'Declare me innocent, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for I have acted with integrity;
  - type: text
    content: 'I have trusted in the '
  - type: text
    content: Lord
  - type: text
    content: ' without wavering.'
  '10':
  - type: text
    content: Their hands are dirty with evil schemes,
  - type: text
    content: and they constantly take bribes.
  '11':
  - type: text
    content: But I am not like that; I live with integrity.
  - type: text
    content: So redeem me and show me mercy.
  '12':
  - type: text
    content: Now I stand on solid ground,
  - type: text
    content: 'and I will publicly praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: 'Put me on trial, '
  - type: text
    content: Lord
  - type: text
    content: ', and cross-examine me.'
  - type: text
    content: Test my motives and my heart.
  '3':
  - type: text
    content: For I am always aware of your unfailing love,
  - type: text
    content: and I have lived according to your truth.
  '4':
  - type: text
    content: I do not spend time with liars
  - type: text
    content: or go along with hypocrites.
  '5':
  - type: text
    content: I hate the gatherings of those who do evil,
  - type: text
    content: and I refuse to join in with the wicked.
  '6':
  - type: text
    content: I wash my hands to declare my innocence.
  - type: text
    content: 'I come to your altar, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  '7':
  - type: text
    content: singing a song of thanksgiving
  - type: text
    content: and telling of all your wonders.
  '8':
  - type: text
    content: 'I love your sanctuary, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the place where your glorious presence dwells.
  '9':
  - type: text
    content: Don’t let me suffer the fate of sinners.
  - type: text
    content: Don’t condemn me along with murderers.
