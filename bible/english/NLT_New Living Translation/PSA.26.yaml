document_id: PSA.26,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Declare me innocent, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have acted with integrity;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I have trusted in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' without wavering.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their hands are dirty with evil schemes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they constantly take bribes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I am not like that; I live with integrity.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So redeem me and show me mercy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I stand on solid ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and I will publicly praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Put me on trial, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and cross-examine me.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Test my motives and my heart.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I am always aware of your unfailing love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I have lived according to your truth.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I do not spend time with liars
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or go along with hypocrites.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hate the gatherings of those who do evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I refuse to join in with the wicked.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I wash my hands to declare my innocence.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I come to your altar, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: singing a song of thanksgiving
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and telling of all your wonders.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I love your sanctuary, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the place where your glorious presence dwells.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let me suffer the fate of sinners.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t condemn me along with murderers.
