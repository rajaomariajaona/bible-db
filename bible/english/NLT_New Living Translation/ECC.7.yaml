document_id: ECC.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom for Life
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A good reputation is more valuable than costly perfume.
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the day you die is better than the day you are born.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Better to spend your time at funerals than at parties.
- type: usfm
  marker: q2
  children:
  - type: text
    text: After all, everyone dies—
- type: usfm
  marker: q2
  children:
  - type: text
    text: so the living should take this to heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sorrow is better than laughter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for sadness has a refining influence on us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A wise person thinks a lot about death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while a fool thinks only about having a good time.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Better to be criticized by a wise person
- type: usfm
  marker: q2
  children:
  - type: text
    text: than to be praised by a fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A fool’s laughter is quickly gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like thorns crackling in a fire.
- type: usfm
  marker: q2
  children:
  - type: text
    text: This also is meaningless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Extortion turns wise people into fools,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bribes corrupt the heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Finishing is better than starting.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Patience is better than pride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Control your temper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for anger labels you a fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Don’t long for “the good old days.”
- type: usfm
  marker: q2
  children:
  - type: text
    text: This is not wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Wisdom is even better when you have money.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Both are a benefit as you go through life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Wisdom and money can get you almost anything,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but only wisdom can save your life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Accept the way God does things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for who can straighten what he has made crooked?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Enjoy prosperity while you can,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but when hard times strike, realize that both come from God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Remember that nothing is certain in this life.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Limits of Human Wisdom
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I have seen everything in this meaningless life, including the death of good young people and the long life of wicked people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So don’t be too good or too wise! Why destroy yourself? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'On the other hand, don’t be too wicked either. Don’t be a fool! Why die before your time? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Pay attention to these instructions, for anyone who fears God will avoid both extremes.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: will follow them both.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: One wise person is stronger than ten leading citizens of a town!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Not a single person on earth is always good and never sins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Don’t eavesdrop on others—you may hear your servant curse you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For you know how often you yourself have cursed others.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'I have always tried my best to let wisdom guide my thoughts and actions. I said to myself, “I am determined to be wise.” But it didn’t work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Wisdom is always distant and difficult to find. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I searched everywhere, determined to find wisdom and to understand the reason for things. I was determined to prove to myself that wickedness is stupid and that foolishness is madness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I discovered that a seductive woman
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a woman.
    marker-yv: yv-n
  - type: text
    text: ' is a trap more bitter than death. Her passion is a snare, and her soft hands are chains. Those who are pleasing to God will escape her, but sinners will be caught in her snare.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“This is my conclusion,” says the Teacher. “I discovered this after looking at the matter from every possible angle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Though I have searched repeatedly, I have not found what I was looking for. Only one out of a thousand men is virtuous, but not one woman! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'But I did find this: God created people to be virtuous, but they have each turned to follow their own downward path.”'
