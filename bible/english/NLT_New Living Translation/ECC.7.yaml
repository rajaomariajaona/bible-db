document_id: ECC.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom for Life
  - type: text
    content: A good reputation is more valuable than costly perfume.
  - type: text
    content: And the day you die is better than the day you are born.
  '10':
  - type: text
    content: Don’t long for “the good old days.”
  - type: text
    content: This is not wise.
  '11':
  - type: text
    content: Wisdom is even better when you have money.
  - type: text
    content: Both are a benefit as you go through life.
  '12':
  - type: text
    content: Wisdom and money can get you almost anything,
  - type: text
    content: but only wisdom can save your life.
  '13':
  - type: text
    content: Accept the way God does things,
  - type: text
    content: for who can straighten what he has made crooked?
  '14':
  - type: text
    content: Enjoy prosperity while you can,
  - type: text
    content: but when hard times strike, realize that both come from God.
  - type: text
    content: Remember that nothing is certain in this life.
  - type: heading
    content: The Limits of Human Wisdom
  '15':
  - type: text
    content: 'I have seen everything in this meaningless life, including the death of good young people and the long life of wicked people. '
  '16':
  - type: text
    content: 'So don’t be too good or too wise! Why destroy yourself? '
  '17':
  - type: text
    content: 'On the other hand, don’t be too wicked either. Don’t be a fool! Why die before your time? '
  '18':
  - type: text
    content: Pay attention to these instructions, for anyone who fears God will avoid both extremes.
  - type: note
    content: Or will follow them both.
  '19':
  - type: text
    content: One wise person is stronger than ten leading citizens of a town!
  '2':
  - type: text
    content: Better to spend your time at funerals than at parties.
  - type: text
    content: After all, everyone dies—
  - type: text
    content: so the living should take this to heart.
  '20':
  - type: text
    content: Not a single person on earth is always good and never sins.
  '21':
  - type: text
    content: 'Don’t eavesdrop on others—you may hear your servant curse you. '
  '22':
  - type: text
    content: For you know how often you yourself have cursed others.
  '23':
  - type: text
    content: 'I have always tried my best to let wisdom guide my thoughts and actions. I said to myself, “I am determined to be wise.” But it didn’t work. '
  '24':
  - type: text
    content: 'Wisdom is always distant and difficult to find. '
  '25':
  - type: text
    content: I searched everywhere, determined to find wisdom and to understand the reason for things. I was determined to prove to myself that wickedness is stupid and that foolishness is madness.
  '26':
  - type: text
    content: I discovered that a seductive woman
  - type: note
    content: Hebrew a woman.
  - type: text
    content: ' is a trap more bitter than death. Her passion is a snare, and her soft hands are chains. Those who are pleasing to God will escape her, but sinners will be caught in her snare.'
  '27':
  - type: text
    content: '“This is my conclusion,” says the Teacher. “I discovered this after looking at the matter from every possible angle. '
  '28':
  - type: text
    content: 'Though I have searched repeatedly, I have not found what I was looking for. Only one out of a thousand men is virtuous, but not one woman! '
  '29':
  - type: text
    content: 'But I did find this: God created people to be virtuous, but they have each turned to follow their own downward path.”'
  '3':
  - type: text
    content: Sorrow is better than laughter,
  - type: text
    content: for sadness has a refining influence on us.
  '4':
  - type: text
    content: A wise person thinks a lot about death,
  - type: text
    content: while a fool thinks only about having a good time.
  '5':
  - type: text
    content: Better to be criticized by a wise person
  - type: text
    content: than to be praised by a fool.
  '6':
  - type: text
    content: A fool’s laughter is quickly gone,
  - type: text
    content: like thorns crackling in a fire.
  - type: text
    content: This also is meaningless.
  '7':
  - type: text
    content: Extortion turns wise people into fools,
  - type: text
    content: and bribes corrupt the heart.
  '8':
  - type: text
    content: Finishing is better than starting.
  - type: text
    content: Patience is better than pride.
  '9':
  - type: text
    content: Control your temper,
  - type: text
    content: for anger labels you a fool.
