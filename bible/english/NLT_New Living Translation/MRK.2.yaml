verses:
  '1':
  - type: heading
    content: Jesus Heals a Paralyzed Man
  - type: text
    content: 'When Jesus returned to Capernaum several days later, the news spread quickly that he was back home. '
  '10':
  - type: text
    content: So I will prove to you that the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: has the authority on earth to forgive sins.”
  - type: text
    content: ' Then Jesus turned to the paralyzed man and said, '
  '11':
  - type: text
    content: “Stand up, pick up your mat, and go home!”
  '12':
  - type: text
    content: And the man jumped up, grabbed his mat, and walked out through the stunned onlookers. They were all amazed and praised God, exclaiming, “We’ve never seen anything like this before!”
  - type: heading
    content: Jesus Calls Levi (Matthew)
  '13':
  - type: text
    content: 'Then Jesus went out to the lakeshore again and taught the crowds that were coming to him. '
  '14':
  - type: text
    content: 'As he walked along, he saw Levi son of Alphaeus sitting at his tax collector’s booth. '
  - type: text
    content: '“Follow me and be my disciple,” '
  - type: text
    content: Jesus said to him. So Levi got up and followed him.
  '15':
  - type: text
    content: 'Later, Levi invited Jesus and his disciples to his home as dinner guests, along with many tax collectors and other disreputable sinners. (There were many people of this kind among Jesus’ followers.) '
  '16':
  - type: text
    content: But when the teachers of religious law who were Pharisees
  - type: note
    content: Greek the scribes of the Pharisees.
  - type: text
    content: ' saw him eating with tax collectors and other sinners, they asked his disciples, “Why does he eat with such scum?'
  - type: note
    content: Greek with tax collectors and sinners?
  - type: text
    content: ”
  '17':
  - type: text
    content: 'When Jesus heard this, he told them, '
  - type: text
    content: “Healthy people don’t need a doctor—sick people do. I have come to call not those who think they are righteous, but those who know they are sinners.”
  - type: heading
    content: A Discussion about Fasting
  '18':
  - type: text
    content: Once when John’s disciples and the Pharisees were fasting, some people came to Jesus and asked, “Why don’t your disciples fast like John’s disciples and the Pharisees do?”
  '19':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Do wedding guests fast while celebrating with the groom? Of course not. They can’t fast while the groom is with them.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Soon the house where he was staying was so packed with visitors that there was no more room, even outside the door. While he was preaching God’s word to them, '
  '20':
  - type: text
    content: But someday the groom will be taken away from them, and then they will fast.
  '21':
  - type: text
    content: ' '
  - type: text
    content: “Besides, who would patch old clothing with new cloth? For the new patch would shrink and rip away from the old cloth, leaving an even bigger tear than before.
  '22':
  - type: text
    content: ' '
  - type: text
    content: “And no one puts new wine into old wineskins. For the wine would burst the wineskins, and the wine and the skins would both be lost. New wine calls for new wineskins.”
  - type: heading
    content: A Discussion about the Sabbath
  '23':
  - type: text
    content: 'One Sabbath day as Jesus was walking through some grainfields, his disciples began breaking off heads of grain to eat. '
  '24':
  - type: text
    content: But the Pharisees said to Jesus, “Look, why are they breaking the law by harvesting grain on the Sabbath?”
  '25':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “Haven’t you ever read in the Scriptures what David did when he and his companions were hungry?
  - type: text
    content: ' '
  '26':
  - type: text
    content: He went into the house of God (during the days when Abiathar was high priest) and broke the law by eating the sacred loaves of bread that only the priests are allowed to eat. He also gave some to his companions.”
  '27':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: “The Sabbath was made to meet the needs of people, and not people to meet the requirements of the Sabbath.
  - type: text
    content: ' '
  '28':
  - type: text
    content: So the Son of Man is Lord, even over the Sabbath!”
  '3':
  - type: text
    content: 'four men arrived carrying a paralyzed man on a mat. '
  '4':
  - type: text
    content: 'They couldn’t bring him to Jesus because of the crowd, so they dug a hole through the roof above his head. Then they lowered the man on his mat, right down in front of Jesus. '
  '5':
  - type: text
    content: 'Seeing their faith, Jesus said to the paralyzed man, '
  - type: text
    content: “My child, your sins are forgiven.”
  '6':
  - type: text
    content: 'But some of the teachers of religious law who were sitting there thought to themselves, '
  '7':
  - type: text
    content: “What is he saying? This is blasphemy! Only God can forgive sins!”
  '8':
  - type: text
    content: 'Jesus knew immediately what they were thinking, so he asked them, '
  - type: text
    content: “Why do you question this in your hearts?
  - type: text
    content: ' '
  '9':
  - type: text
    content: Is it easier to say to the paralyzed man ‘Your sins are forgiven,’ or ‘Stand up, pick up your mat, and walk’?
  - type: text
    content: ' '
