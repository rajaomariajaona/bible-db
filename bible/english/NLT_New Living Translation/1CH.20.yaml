document_id: 1CH.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David Captures Rabbah
  - type: text
    content: In the spring of the year,
  - type: note
    content: Hebrew At the turn of the year. The first day of the year in the ancient Hebrew lunar calendar occurred in March or April.
  - type: text
    content: ' when kings normally go out to war, Joab led the Israelite army in successful attacks against the land of the Ammonites. In the process he laid siege to the city of Rabbah, attacking and destroying it. However, David stayed behind in Jerusalem.'
  '2':
  - type: text
    content: Then David went to Rabbah and removed the crown from the king’s head,
  - type: note
    content: Or from the head of Milcom (as in Greek version and Latin Vulgate). Milcom, also called Molech, was the god of the Ammonites.
  - type: text
    content: ' and it was placed on his own head. The crown was made of gold and set with gems, and he found that it weighed seventy-five pounds.'
  - type: note
    content: Hebrew 1 talent [34 kilograms].
  - type: text
    content: ' David took a vast amount of plunder from the city. '
  '3':
  - type: text
    content: He also made slaves of the people of Rabbah and forced them to labor with saws, iron picks, and iron axes.
  - type: note
    content: As in parallel text at 2 Sam 12:31; Hebrew reads and cut them with saws, iron picks, and saws.
  - type: text
    content: ' That is how David dealt with the people of all the Ammonite towns. Then David and all the army returned to Jerusalem.'
  - type: heading
    content: Battles against Philistine Giants
  '4':
  - type: text
    content: After this, war broke out with the Philistines at Gezer. As they fought, Sibbecai from Hushah killed Saph,
  - type: note
    content: As in parallel text at 2 Sam 21:18; Hebrew reads Sippai.
  - type: text
    content: ' a descendant of the giants,'
  - type: note
    content: Hebrew descendant of the Rephaites; also in 20:6, 8.
  - type: text
    content: ' and so the Philistines were subdued.'
  '5':
  - type: text
    content: During another battle with the Philistines, Elhanan son of Jair killed Lahmi, the brother of Goliath of Gath. The handle of Lahmi’s spear was as thick as a weaver’s beam!
  '6':
  - type: text
    content: 'In another battle with the Philistines at Gath, they encountered a huge man with six fingers on each hand and six toes on each foot, twenty-four in all, who was also a descendant of the giants. '
  '7':
  - type: text
    content: But when he defied and taunted Israel, he was killed by Jonathan, the son of David’s brother Shimea.
  '8':
  - type: text
    content: These Philistines were descendants of the giants of Gath, but David and his warriors killed them.
