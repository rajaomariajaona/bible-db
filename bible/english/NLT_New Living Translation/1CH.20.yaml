document_id: 1CH.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Captures Rabbah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: In the spring of the year,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'At the turn of the year. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The first day of the year in the ancient Hebrew lunar calendar occurred in March or April.
    marker-yv: yv-n
  - type: text
    text: ' when kings normally go out to war, Joab led the Israelite army in successful attacks against the land of the Ammonites. In the process he laid siege to the city of Rabbah, attacking and destroying it. However, David stayed behind in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Then David went to Rabbah and removed the crown from the king’s head,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:2a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'from the head of Milcom '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (as in Greek version and Latin Vulgate). Milcom, also called Molech, was the god of the Ammonites.
    marker-yv: yv-n
  - type: text
    text: ' and it was placed on his own head. The crown was made of gold and set with gems, and he found that it weighed seventy-five pounds.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:2b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1 talent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[34 kilograms].'
    marker-yv: yv-n
  - type: text
    text: ' David took a vast amount of plunder from the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He also made slaves of the people of Rabbah and forced them to labor with saws, iron picks, and iron axes.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 2 Sam 12:31; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and cut them with saws, iron picks, and saws.
    marker-yv: yv-n
  - type: text
    text: ' That is how David dealt with the people of all the Ammonite towns. Then David and all the army returned to Jerusalem.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Battles against Philistine Giants
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: After this, war broke out with the Philistines at Gezer. As they fought, Sibbecai from Hushah killed Saph,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:4a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 2 Sam 21:18; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Sippai.
    marker-yv: yv-n
  - type: text
    text: ' a descendant of the giants,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:4b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'descendant of the Rephaites; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 20:6, 8.
    marker-yv: yv-n
  - type: text
    text: ' and so the Philistines were subdued.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: During another battle with the Philistines, Elhanan son of Jair killed Lahmi, the brother of Goliath of Gath. The handle of Lahmi’s spear was as thick as a weaver’s beam!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'In another battle with the Philistines at Gath, they encountered a huge man with six fingers on each hand and six toes on each foot, twenty-four in all, who was also a descendant of the giants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But when he defied and taunted Israel, he was killed by Jonathan, the son of David’s brother Shimea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: These Philistines were descendants of the giants of Gath, but David and his warriors killed them.
