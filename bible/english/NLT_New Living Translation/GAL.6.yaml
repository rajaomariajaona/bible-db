document_id: GAL.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: We Harvest What We Plant
  - type: text
    content: Dear brothers and sisters, if another believer
  - type: note
    content: Greek Brothers, if a man.
  - type: text
    content: ' is overcome by some sin, you who are godly'
  - type: note
    content: Greek spiritual.
  - type: text
    content: ' should gently and humbly help that person back onto the right path. And be careful not to fall into the same temptation yourself. '
  '10':
  - type: text
    content: Therefore, whenever we have the opportunity, we should do good to everyone—especially to those in the family of faith.
  - type: heading
    content: Paul’s Final Advice
  '11':
  - type: text
    content: ' '
  - type: heading
    content: Notice what large letters I use as I write these closing words in my own handwriting.
  '12':
  - type: text
    content: 'Those who are trying to force you to be circumcised want to look good to others. They don’t want to be persecuted for teaching that the cross of Christ alone can save. '
  '13':
  - type: text
    content: And even those who advocate circumcision don’t keep the whole law themselves. They only want you to be circumcised so they can boast about it and claim you as their disciples.
  '14':
  - type: text
    content: As for me, may I never boast about anything except the cross of our Lord Jesus Christ. Because of that cross,
  - type: note
    content: Or Because of him.
  - type: text
    content: ' my interest in this world has been crucified, and the world’s interest in me has also died. '
  '15':
  - type: text
    content: 'It doesn’t matter whether we have been circumcised or not. What counts is whether we have been transformed into a new creation. '
  '16':
  - type: text
    content: May God’s peace and mercy be upon all who live by this principle; they are the new people of God.
  - type: note
    content: Greek this principle, and upon the Israel of God.
  '17':
  - type: text
    content: From now on, don’t let anyone trouble me with these things. For I bear on my body the scars that show I belong to Jesus.
  '18':
  - type: text
    content: Dear brothers and sisters,
  - type: note
    content: Greek Brothers.
  - type: text
    content: ' may the grace of our Lord Jesus Christ be with your spirit. Amen.'
  '2':
  - type: text
    content: 'Share each other’s burdens, and in this way obey the law of Christ. '
  '3':
  - type: text
    content: If you think you are too important to help someone, you are only fooling yourself. You are not that important.
  '4':
  - type: text
    content: 'Pay careful attention to your own work, for then you will get the satisfaction of a job well done, and you won’t need to compare yourself to anyone else. '
  '5':
  - type: text
    content: For we are each responsible for our own conduct.
  '6':
  - type: text
    content: Those who are taught the word of God should provide for their teachers, sharing all good things with them.
  '7':
  - type: text
    content: 'Don’t be misled—you cannot mock the justice of God. You will always harvest what you plant. '
  '8':
  - type: text
    content: 'Those who live only to satisfy their own sinful nature will harvest decay and death from that sinful nature. But those who live to please the Spirit will harvest everlasting life from the Spirit. '
  '9':
  - type: text
    content: 'So let’s not get tired of doing what is good. At just the right time we will reap a harvest of blessing if we don’t give up. '
