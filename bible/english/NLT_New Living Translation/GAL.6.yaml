document_id: GAL.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: We Harvest What We Plant
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dear brothers and sisters, if another believer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:1a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Brothers, if a man.
    marker-yv: yv-n
  - type: text
    text: ' is overcome by some sin, you who are godly'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:1b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: spiritual.
    marker-yv: yv-n
  - type: text
    text: ' should gently and humbly help that person back onto the right path. And be careful not to fall into the same temptation yourself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Share each other’s burdens, and in this way obey the law of Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: If you think you are too important to help someone, you are only fooling yourself. You are not that important.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pay careful attention to your own work, for then you will get the satisfaction of a job well done, and you won’t need to compare yourself to anyone else. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For we are each responsible for our own conduct.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Those who are taught the word of God should provide for their teachers, sharing all good things with them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Don’t be misled—you cannot mock the justice of God. You will always harvest what you plant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Those who live only to satisfy their own sinful nature will harvest decay and death from that sinful nature. But those who live to please the Spirit will harvest everlasting life from the Spirit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So let’s not get tired of doing what is good. At just the right time we will reap a harvest of blessing if we don’t give up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Therefore, whenever we have the opportunity, we should do good to everyone—especially to those in the family of faith.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Final Advice
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Notice what large letters I use as I write these closing words in my own handwriting.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Those who are trying to force you to be circumcised want to look good to others. They don’t want to be persecuted for teaching that the cross of Christ alone can save. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And even those who advocate circumcision don’t keep the whole law themselves. They only want you to be circumcised so they can boast about it and claim you as their disciples.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: As for me, may I never boast about anything except the cross of our Lord Jesus Christ. Because of that cross,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Because of him.
    marker-yv: yv-n
  - type: text
    text: ' my interest in this world has been crucified, and the world’s interest in me has also died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'It doesn’t matter whether we have been circumcised or not. What counts is whether we have been transformed into a new creation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: May God’s peace and mercy be upon all who live by this principle; they are the new people of God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: this principle, and upon the Israel of God.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: From now on, don’t let anyone trouble me with these things. For I bear on my body the scars that show I belong to Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dear brothers and sisters,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Brothers.
    marker-yv: yv-n
  - type: text
    text: ' may the grace of our Lord Jesus Christ be with your spirit. Amen.'
