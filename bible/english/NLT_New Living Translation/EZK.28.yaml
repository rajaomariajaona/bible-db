document_id: EZK.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message for Tyre’s King
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then this message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, give the prince of Tyre this message from the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “In your great pride you claim, ‘I am a god!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I sit on a divine throne in the heart of the sea.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you are only a man and not a god,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though you boast that you are a god.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You regard yourself as wiser than Daniel
- type: usfm
  marker: q2
  children:
  - type: text
    text: and think no secret is hidden from you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: With your wisdom and understanding you have amassed great wealth—
- type: usfm
  marker: q2
  children:
  - type: text
    text: gold and silver for your treasuries.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Yes, your wisdom has made you very rich,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your riches have made you very proud.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Therefore, this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because you think you are as wise as a god,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I will now bring against you a foreign army,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the terror of the nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will draw their swords against your marvelous wisdom
- type: usfm
  marker: q2
  children:
  - type: text
    text: and defile your splendor!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They will bring you down to the pit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will die in the heart of the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pierced with many wounds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Will you then boast, ‘I am a god!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: to those who kill you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: To them you will be no god
- type: usfm
  marker: q2
  children:
  - type: text
    text: but merely a man!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You will die like an outcast
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: will die the death of the uncircumcised.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the hands of foreigners.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then this further message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Son of man, sing this funeral song for the king of Tyre. Give him this message from the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You were the model of perfection,
- type: usfm
  marker: q2
  children:
  - type: text
    text: full of wisdom and exquisite in beauty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You were in Eden,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the garden of God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your clothing was adorned with every precious stone
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The identification of some of these gemstones is uncertain.
    marker-yv: yv-n
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: red carnelian, pale-green peridot, white moonstone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: blue-green beryl, onyx, green jasper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: blue lapis lazuli, turquoise, and emerald—
- type: usfm
  marker: q1
  children:
  - type: text
    text: all beautifully crafted for you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and set in the finest gold.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They were given to you
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the day you were created.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I ordained and anointed you
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the mighty angelic guardian.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'guardian cherub; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: similarly in 28:16.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: You had access to the holy mountain of God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and walked among the stones of fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “You were blameless in all you did
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the day you were created
- type: usfm
  marker: q2
  children:
  - type: text
    text: until the day evil was found in you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Your rich commerce led you to violence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you sinned.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I banished you in disgrace
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the mountain of God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I expelled you, O mighty guardian,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from your place among the stones of fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Your heart was filled with pride
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of all your beauty.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your wisdom was corrupted
- type: usfm
  marker: q2
  children:
  - type: text
    text: by your love of splendor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I threw you to the ground
- type: usfm
  marker: q2
  children:
  - type: text
    text: and exposed you to the curious gaze of kings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: You defiled your sanctuaries
- type: usfm
  marker: q2
  children:
  - type: text
    text: with your many sins and your dishonest trade.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I brought fire out from within you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and it consumed you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I reduced you to ashes on the ground
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the sight of all who were watching.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: All who knew you are appalled at your fate.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have come to a terrible end,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will exist no more.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message for Sidon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then another message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“Son of man, turn and face the city of Sidon and prophesy against it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Give the people of Sidon this message from the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I am your enemy, O Sidon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will reveal my glory by what I do to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I bring judgment against you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and reveal my holiness among you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: everyone watching will know
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I will send a plague against you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and blood will be spilled in your streets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The attack will come from every direction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your people will lie slaughtered within your walls.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then everyone will know
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: No longer will Israel’s scornful neighbors
- type: usfm
  marker: q2
  children:
  - type: text
    text: prick and tear at her like briers and thorns.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For then they will know
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that I am the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Restoration for Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: The people of Israel will again live in their own land, the land I gave my servant Jacob. For I will gather them from the distant lands where I have scattered them. I will reveal to the nations of the world my holiness among my people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'They will live safely in Israel and build homes and plant vineyards. And when I punish the neighboring nations that treated them with contempt, they will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God.”'
