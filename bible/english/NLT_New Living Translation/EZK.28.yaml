document_id: EZK.28,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message for Tyre’s King
  - type: text
    content: 'Then this message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: You will die like an outcast
  - type: note
    content: Hebrew will die the death of the uncircumcised.
  - type: text
    content: at the hands of foreigners.
  - type: text
    content: 'I, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '11':
  - type: text
    content: 'Then this further message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '12':
  - type: text
    content: '“Son of man, sing this funeral song for the king of Tyre. Give him this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “You were the model of perfection,
  - type: text
    content: full of wisdom and exquisite in beauty.
  '13':
  - type: text
    content: You were in Eden,
  - type: text
    content: the garden of God.
  - type: text
    content: Your clothing was adorned with every precious stone
  - type: note
    content: The identification of some of these gemstones is uncertain.
  - type: text
    content: —
  - type: text
    content: red carnelian, pale-green peridot, white moonstone,
  - type: text
    content: blue-green beryl, onyx, green jasper,
  - type: text
    content: blue lapis lazuli, turquoise, and emerald—
  - type: text
    content: all beautifully crafted for you
  - type: text
    content: and set in the finest gold.
  - type: text
    content: They were given to you
  - type: text
    content: on the day you were created.
  '14':
  - type: text
    content: I ordained and anointed you
  - type: text
    content: as the mighty angelic guardian.
  - type: note
    content: Hebrew guardian cherub; similarly in 28:16.
  - type: text
    content: You had access to the holy mountain of God
  - type: text
    content: and walked among the stones of fire.
  '15':
  - type: text
    content: “You were blameless in all you did
  - type: text
    content: from the day you were created
  - type: text
    content: until the day evil was found in you.
  '16':
  - type: text
    content: Your rich commerce led you to violence,
  - type: text
    content: and you sinned.
  - type: text
    content: So I banished you in disgrace
  - type: text
    content: from the mountain of God.
  - type: text
    content: I expelled you, O mighty guardian,
  - type: text
    content: from your place among the stones of fire.
  '17':
  - type: text
    content: Your heart was filled with pride
  - type: text
    content: because of all your beauty.
  - type: text
    content: Your wisdom was corrupted
  - type: text
    content: by your love of splendor.
  - type: text
    content: So I threw you to the ground
  - type: text
    content: and exposed you to the curious gaze of kings.
  '18':
  - type: text
    content: You defiled your sanctuaries
  - type: text
    content: with your many sins and your dishonest trade.
  - type: text
    content: So I brought fire out from within you,
  - type: text
    content: and it consumed you.
  - type: text
    content: I reduced you to ashes on the ground
  - type: text
    content: in the sight of all who were watching.
  '19':
  - type: text
    content: All who knew you are appalled at your fate.
  - type: text
    content: You have come to a terrible end,
  - type: text
    content: and you will exist no more.”
  - type: heading
    content: A Message for Sidon
  '2':
  - type: text
    content: '“Son of man, give the prince of Tyre this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “In your great pride you claim, ‘I am a god!
  - type: text
    content: I sit on a divine throne in the heart of the sea.’
  - type: text
    content: But you are only a man and not a god,
  - type: text
    content: though you boast that you are a god.
  '20':
  - type: text
    content: 'Then another message came to me from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '21':
  - type: text
    content: '“Son of man, turn and face the city of Sidon and prophesy against it. '
  '22':
  - type: text
    content: 'Give the people of Sidon this message from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “I am your enemy, O Sidon,
  - type: text
    content: and I will reveal my glory by what I do to you.
  - type: text
    content: When I bring judgment against you
  - type: text
    content: and reveal my holiness among you,
  - type: text
    content: everyone watching will know
  - type: text
    content: 'that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '23':
  - type: text
    content: I will send a plague against you,
  - type: text
    content: and blood will be spilled in your streets.
  - type: text
    content: The attack will come from every direction,
  - type: text
    content: and your people will lie slaughtered within your walls.
  - type: text
    content: Then everyone will know
  - type: text
    content: 'that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '24':
  - type: text
    content: No longer will Israel’s scornful neighbors
  - type: text
    content: prick and tear at her like briers and thorns.
  - type: text
    content: For then they will know
  - type: text
    content: 'that I am the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Restoration for Israel
  '25':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: The people of Israel will again live in their own land, the land I gave my servant Jacob. For I will gather them from the distant lands where I have scattered them. I will reveal to the nations of the world my holiness among my people. '
  '26':
  - type: text
    content: 'They will live safely in Israel and build homes and plant vineyards. And when I punish the neighboring nations that treated them with contempt, they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.”'
  '3':
  - type: text
    content: You regard yourself as wiser than Daniel
  - type: text
    content: and think no secret is hidden from you.
  '4':
  - type: text
    content: With your wisdom and understanding you have amassed great wealth—
  - type: text
    content: gold and silver for your treasuries.
  '5':
  - type: text
    content: Yes, your wisdom has made you very rich,
  - type: text
    content: and your riches have made you very proud.
  '6':
  - type: text
    content: '“Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: Because you think you are as wise as a god,
  '7':
  - type: text
    content: I will now bring against you a foreign army,
  - type: text
    content: the terror of the nations.
  - type: text
    content: They will draw their swords against your marvelous wisdom
  - type: text
    content: and defile your splendor!
  '8':
  - type: text
    content: They will bring you down to the pit,
  - type: text
    content: and you will die in the heart of the sea,
  - type: text
    content: pierced with many wounds.
  '9':
  - type: text
    content: Will you then boast, ‘I am a god!’
  - type: text
    content: to those who kill you?
  - type: text
    content: To them you will be no god
  - type: text
    content: but merely a man!
