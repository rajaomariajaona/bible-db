document_id: PSA.37,116
type_code: eng
verses:
  '1':
  - type: note
    content: This psalm is a Hebrew acrostic poem; each stanza begins with a successive letter of the Hebrew alphabet.
  - type: text
    content: A psalm of David.
  - type: text
    content: Don’t worry about the wicked
  - type: text
    content: or envy those who do wrong.
  '10':
  - type: text
    content: Soon the wicked will disappear.
  - type: text
    content: Though you look for them, they will be gone.
  '11':
  - type: text
    content: The lowly will possess the land
  - type: text
    content: and will live in peace and prosperity.
  '12':
  - type: text
    content: The wicked plot against the godly;
  - type: text
    content: they snarl at them in defiance.
  '13':
  - type: text
    content: But the Lord just laughs,
  - type: text
    content: for he sees their day of judgment coming.
  '14':
  - type: text
    content: The wicked draw their swords
  - type: text
    content: and string their bows
  - type: text
    content: to kill the poor and the oppressed,
  - type: text
    content: to slaughter those who do right.
  '15':
  - type: text
    content: But their swords will stab their own hearts,
  - type: text
    content: and their bows will be broken.
  '16':
  - type: text
    content: It is better to be godly and have little
  - type: text
    content: than to be evil and rich.
  '17':
  - type: text
    content: For the strength of the wicked will be shattered,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' takes care of the godly.'
  '18':
  - type: text
    content: 'Day by day the '
  - type: text
    content: Lord
  - type: text
    content: ' takes care of the innocent,'
  - type: text
    content: and they will receive an inheritance that lasts forever.
  '19':
  - type: text
    content: They will not be disgraced in hard times;
  - type: text
    content: even in famine they will have more than enough.
  '2':
  - type: text
    content: For like grass, they soon fade away.
  - type: text
    content: Like spring flowers, they soon wither.
  '20':
  - type: text
    content: But the wicked will die.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s enemies are like flowers in a field—
  - type: text
    content: they will disappear like smoke.
  '21':
  - type: text
    content: The wicked borrow and never repay,
  - type: text
    content: but the godly are generous givers.
  '22':
  - type: text
    content: 'Those the '
  - type: text
    content: Lord
  - type: text
    content: ' blesses will possess the land,'
  - type: text
    content: but those he curses will die.
  '23':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' directs the steps of the godly.'
  - type: text
    content: He delights in every detail of their lives.
  '24':
  - type: text
    content: Though they stumble, they will never fall,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' holds them by the hand.'
  '25':
  - type: text
    content: Once I was young, and now I am old.
  - type: text
    content: Yet I have never seen the godly abandoned
  - type: text
    content: or their children begging for bread.
  '26':
  - type: text
    content: The godly always give generous loans to others,
  - type: text
    content: and their children are a blessing.
  '27':
  - type: text
    content: Turn from evil and do good,
  - type: text
    content: and you will live in the land forever.
  '28':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' loves justice,'
  - type: text
    content: and he will never abandon the godly.
  - type: text
    content: He will keep them safe forever,
  - type: text
    content: but the children of the wicked will die.
  '29':
  - type: text
    content: The godly will possess the land
  - type: text
    content: and will live there forever.
  '3':
  - type: text
    content: 'Trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' and do good.'
  - type: text
    content: Then you will live safely in the land and prosper.
  '30':
  - type: text
    content: The godly offer good counsel;
  - type: text
    content: they teach right from wrong.
  '31':
  - type: text
    content: They have made God’s law their own,
  - type: text
    content: so they will never slip from his path.
  '32':
  - type: text
    content: The wicked wait in ambush for the godly,
  - type: text
    content: looking for an excuse to kill them.
  '33':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' will not let the wicked succeed'
  - type: text
    content: or let the godly be condemned when they are put on trial.
  '34':
  - type: text
    content: 'Put your hope in the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Travel steadily along his path.
  - type: text
    content: He will honor you by giving you the land.
  - type: text
    content: You will see the wicked destroyed.
  '35':
  - type: text
    content: I have seen wicked and ruthless people
  - type: text
    content: flourishing like a tree in its native soil.
  '36':
  - type: text
    content: But when I looked again, they were gone!
  - type: text
    content: Though I searched for them, I could not find them!
  '37':
  - type: text
    content: Look at those who are honest and good,
  - type: text
    content: for a wonderful future awaits those who love peace.
  '38':
  - type: text
    content: But the rebellious will be destroyed;
  - type: text
    content: they have no future.
  '39':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' rescues the godly;'
  - type: text
    content: he is their fortress in times of trouble.
  '4':
  - type: text
    content: 'Take delight in the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and he will give you your heart’s desires.
  '40':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' helps them,'
  - type: text
    content: rescuing them from the wicked.
  - type: text
    content: He saves them,
  - type: text
    content: and they find shelter in him.
  '5':
  - type: text
    content: 'Commit everything you do to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Trust him, and he will help you.
  '6':
  - type: text
    content: He will make your innocence radiate like the dawn,
  - type: text
    content: and the justice of your cause will shine like the noonday sun.
  '7':
  - type: text
    content: 'Be still in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and wait patiently for him to act.
  - type: text
    content: Don’t worry about evil people who prosper
  - type: text
    content: or fret about their wicked schemes.
  '8':
  - type: text
    content: Stop being angry!
  - type: text
    content: Turn from your rage!
  - type: text
    content: Do not lose your temper—
  - type: text
    content: it only leads to harm.
  '9':
  - type: text
    content: For the wicked will be destroyed,
  - type: text
    content: 'but those who trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' will possess the land.'
