document_id: PSA.37
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This psalm is a Hebrew acrostic poem; each stanza begins with a successive letter of the Hebrew alphabet.
    marker-yv: yv-n
  - type: text
    text: A psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Don’t worry about the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: or envy those who do wrong.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For like grass, they soon fade away.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Like spring flowers, they soon wither.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and do good.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Then you will live safely in the land and prosper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Take delight in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will give you your heart’s desires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Commit everything you do to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: Trust him, and he will help you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He will make your innocence radiate like the dawn,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the justice of your cause will shine like the noonday sun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Be still in the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wait patiently for him to act.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t worry about evil people who prosper
- type: usfm
  marker: q2
  children:
  - type: text
    text: or fret about their wicked schemes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Stop being angry!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Turn from your rage!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not lose your temper—
- type: usfm
  marker: q2
  children:
  - type: text
    text: it only leads to harm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For the wicked will be destroyed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but those who trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will possess the land.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Soon the wicked will disappear.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Though you look for them, they will be gone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The lowly will possess the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will live in peace and prosperity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The wicked plot against the godly;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they snarl at them in defiance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But the Lord just laughs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he sees their day of judgment coming.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The wicked draw their swords
- type: usfm
  marker: q2
  children:
  - type: text
    text: and string their bows
- type: usfm
  marker: q1
  children:
  - type: text
    text: to kill the poor and the oppressed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to slaughter those who do right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But their swords will stab their own hearts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their bows will be broken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: It is better to be godly and have little
- type: usfm
  marker: q2
  children:
  - type: text
    text: than to be evil and rich.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For the strength of the wicked will be shattered,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' takes care of the godly.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Day by day the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' takes care of the innocent,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will receive an inheritance that lasts forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: They will not be disgraced in hard times;
- type: usfm
  marker: q2
  children:
  - type: text
    text: even in famine they will have more than enough.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: But the wicked will die.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s enemies are like flowers in a field—
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will disappear like smoke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The wicked borrow and never repay,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the godly are generous givers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Those the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' blesses will possess the land,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but those he curses will die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' directs the steps of the godly.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He delights in every detail of their lives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Though they stumble, they will never fall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' holds them by the hand.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Once I was young, and now I am old.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yet I have never seen the godly abandoned
- type: usfm
  marker: q2
  children:
  - type: text
    text: or their children begging for bread.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The godly always give generous loans to others,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their children are a blessing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Turn from evil and do good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will live in the land forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' loves justice,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will never abandon the godly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will keep them safe forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the children of the wicked will die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The godly will possess the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will live there forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The godly offer good counsel;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they teach right from wrong.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: They have made God’s law their own,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so they will never slip from his path.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The wicked wait in ambush for the godly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: looking for an excuse to kill them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will not let the wicked succeed'
- type: usfm
  marker: q2
  children:
  - type: text
    text: or let the godly be condemned when they are put on trial.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Put your hope in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: Travel steadily along his path.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will honor you by giving you the land.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You will see the wicked destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: I have seen wicked and ruthless people
- type: usfm
  marker: q2
  children:
  - type: text
    text: flourishing like a tree in its native soil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: But when I looked again, they were gone!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Though I searched for them, I could not find them!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Look at those who are honest and good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for a wonderful future awaits those who love peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: But the rebellious will be destroyed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have no future.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rescues the godly;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is their fortress in times of trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' helps them,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: rescuing them from the wicked.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He saves them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they find shelter in him.
