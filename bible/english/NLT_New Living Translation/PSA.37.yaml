document_id: PSA.37,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm is a Hebrew acrostic poem; each stanza begins with a successive letter of the Hebrew alphabet.
      marker-yv: yv-n
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t worry about the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or envy those who do wrong.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soon the wicked will disappear.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Though you look for them, they will be gone.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lowly will possess the land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will live in peace and prosperity.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked plot against the godly;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they snarl at them in defiance.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the Lord just laughs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he sees their day of judgment coming.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked draw their swords
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and string their bows
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to kill the poor and the oppressed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to slaughter those who do right.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But their swords will stab their own hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their bows will be broken.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is better to be godly and have little
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than to be evil and rich.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the strength of the wicked will be shattered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' takes care of the godly.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Day by day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' takes care of the innocent,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will receive an inheritance that lasts forever.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will not be disgraced in hard times;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even in famine they will have more than enough.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For like grass, they soon fade away.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like spring flowers, they soon wither.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the wicked will die.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s enemies are like flowers in a field—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will disappear like smoke.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked borrow and never repay,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the godly are generous givers.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Those the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' blesses will possess the land,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but those he curses will die.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' directs the steps of the godly.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He delights in every detail of their lives.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though they stumble, they will never fall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' holds them by the hand.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Once I was young, and now I am old.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet I have never seen the godly abandoned
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or their children begging for bread.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The godly always give generous loans to others,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their children are a blessing.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn from evil and do good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will live in the land forever.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' loves justice,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will never abandon the godly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will keep them safe forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the children of the wicked will die.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The godly will possess the land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will live there forever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and do good.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then you will live safely in the land and prosper.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The godly offer good counsel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they teach right from wrong.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have made God’s law their own,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so they will never slip from his path.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked wait in ambush for the godly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: looking for an excuse to kill them.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will not let the wicked succeed'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or let the godly be condemned when they are put on trial.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Put your hope in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Travel steadily along his path.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will honor you by giving you the land.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will see the wicked destroyed.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have seen wicked and ruthless people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flourishing like a tree in its native soil.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when I looked again, they were gone!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Though I searched for them, I could not find them!
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look at those who are honest and good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for a wonderful future awaits those who love peace.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the rebellious will be destroyed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have no future.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rescues the godly;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is their fortress in times of trouble.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Take delight in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will give you your heart’s desires.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' helps them,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rescuing them from the wicked.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He saves them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they find shelter in him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Commit everything you do to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Trust him, and he will help you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will make your innocence radiate like the dawn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the justice of your cause will shine like the noonday sun.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Be still in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wait patiently for him to act.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t worry about evil people who prosper
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or fret about their wicked schemes.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stop being angry!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Turn from your rage!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not lose your temper—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it only leads to harm.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the wicked will be destroyed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but those who trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will possess the land.'
