document_id: ROM.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sin’s Power Is Broken
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Well then, should we keep on sinning so that God can show us more and more of his wonderful grace? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Of course not! Since we have died to sin, how can we continue to live in it? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Or have you forgotten that when we were joined with Christ Jesus in baptism, we joined him in his death? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For we died and were buried with Christ by baptism. And just as Christ was raised from the dead by the glorious power of the Father, now we also may live new lives.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Since we have been united with him in his death, we will also be raised to life as he was. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'We know that our old sinful selves were crucified with Christ so that sin might lose its power in our lives. We are no longer slaves to sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For when we died with Christ we were set free from the power of sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And since we died with Christ, we know we will also live with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'We are sure of this because Christ was raised from the dead, and he will never die again. Death no longer has any power over him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When he died, he died once to break the power of sin. But now that he lives, he lives for the glory of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So you also should consider yourselves to be dead to the power of sin and alive to God through Christ Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Do not let sin control the way you live;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Do not let sin reign in your body, which is subject to death.
    marker-yv: yv-n
  - type: text
    text: ' do not give in to sinful desires. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Do not let any part of your body become an instrument of evil to serve sin. Instead, give yourselves completely to God, for you were dead, but now you have new life. So use your whole body as an instrument to do what is right for the glory of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Sin is no longer your master, for you no longer live under the requirements of the law. Instead, you live under the freedom of God’s grace.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Well then, since God’s grace has set us free from the law, does that mean we can go on sinning? Of course not! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Don’t you realize that you become the slave of whatever you choose to obey? You can be a slave to sin, which leads to death, or you can choose to obey God, which leads to righteous living. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Thank God! Once you were slaves of sin, but now you wholeheartedly obey this teaching we have given you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Now you are free from your slavery to sin, and you have become slaves to righteous living.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Because of the weakness of your human nature, I am using the illustration of slavery to help you understand all this. Previously, you let yourselves be slaves to impurity and lawlessness, which led ever deeper into sin. Now you must give yourselves to be slaves to righteous living so that you will become holy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'When you were slaves to sin, you were free from the obligation to do right. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And what was the result? You are now ashamed of the things you used to do, things that end in eternal doom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But now you are free from the power of sin and have become slaves of God. Now you do those things that lead to holiness and result in eternal life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: For the wages of sin is death, but the free gift of God is eternal life through Christ Jesus our Lord.
