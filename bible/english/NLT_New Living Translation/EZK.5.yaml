document_id: EZK.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Sign of the Coming Judgment
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Son of man, take a sharp sword and use it as a razor to shave your head and beard. Use a scale to weigh the hair into three equal parts. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Place a third of it at the center of your map of Jerusalem. After acting out the siege, burn it there. Scatter another third across your map and chop it with a sword. Scatter the last third to the wind, for I will scatter my people with the sword. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Keep just a bit of the hair and tie it up in your robe. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then take some of these hairs out and throw them into the fire, burning them up. A fire will then spread from this remnant and destroy all of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: This is an illustration of what will happen to Jerusalem. I placed her at the center of the nations, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: but she has rebelled against my regulations and decrees and has been even more wicked than the surrounding nations. She has refused to obey the regulations and decrees I gave her to follow.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Therefore, this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: You people have behaved worse than your neighbors and have refused to obey my decrees and regulations. You have not even lived up to the standards of the nations around you. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore, I myself, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', am now your enemy. I will punish you publicly while all the nations watch. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Because of your detestable idols, I will punish you like I have never punished anyone before or ever will again. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Parents will eat their own children, and children will eat their parents. I will punish you and scatter to the winds the few who survive.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“As surely as I live, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I will cut you off completely. I will show you no pity at all because you have defiled my Temple with your vile images and detestable sins. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A third of your people will die in the city from disease and famine. A third of them will be slaughtered by the enemy outside the city walls. And I will scatter a third to the winds, chasing them with my sword. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then at last my anger will be spent, and I will be satisfied. And when my fury against them has subsided, all Israel will know that I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken to them in my jealous anger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“So I will turn you into a ruin, a mockery in the eyes of the surrounding nations and to all who pass by. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'You will become an object of mockery and taunting and horror. You will be a warning to all the nations around you. They will see what happens when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' punishes a nation in anger and rebukes it, says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“I will shower you with the deadly arrows of famine to destroy you. The famine will become more and more severe until every crumb of food is gone. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And along with the famine, wild animals will attack you and rob you of your children. Disease and war will stalk your land, and I will bring the sword of the enemy against you. I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
