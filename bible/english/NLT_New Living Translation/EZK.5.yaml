document_id: EZK.5,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Sign of the Coming Judgment
  - type: text
    content: '“Son of man, take a sharp sword and use it as a razor to shave your head and beard. Use a scale to weigh the hair into three equal parts. '
  '10':
  - type: text
    content: Parents will eat their own children, and children will eat their parents. I will punish you and scatter to the winds the few who survive.
  '11':
  - type: text
    content: '“As surely as I live, says the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', I will cut you off completely. I will show you no pity at all because you have defiled my Temple with your vile images and detestable sins. '
  '12':
  - type: text
    content: 'A third of your people will die in the city from disease and famine. A third of them will be slaughtered by the enemy outside the city walls. And I will scatter a third to the winds, chasing them with my sword. '
  '13':
  - type: text
    content: 'Then at last my anger will be spent, and I will be satisfied. And when my fury against them has subsided, all Israel will know that I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken to them in my jealous anger.'
  '14':
  - type: text
    content: '“So I will turn you into a ruin, a mockery in the eyes of the surrounding nations and to all who pass by. '
  '15':
  - type: text
    content: 'You will become an object of mockery and taunting and horror. You will be a warning to all the nations around you. They will see what happens when the '
  - type: text
    content: Lord
  - type: text
    content: ' punishes a nation in anger and rebukes it, says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '16':
  - type: text
    content: '“I will shower you with the deadly arrows of famine to destroy you. The famine will become more and more severe until every crumb of food is gone. '
  '17':
  - type: text
    content: 'And along with the famine, wild animals will attack you and rob you of your children. Disease and war will stalk your land, and I will bring the sword of the enemy against you. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '2':
  - type: text
    content: 'Place a third of it at the center of your map of Jerusalem. After acting out the siege, burn it there. Scatter another third across your map and chop it with a sword. Scatter the last third to the wind, for I will scatter my people with the sword. '
  '3':
  - type: text
    content: 'Keep just a bit of the hair and tie it up in your robe. '
  '4':
  - type: text
    content: Then take some of these hairs out and throw them into the fire, burning them up. A fire will then spread from this remnant and destroy all of Israel.
  '5':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: This is an illustration of what will happen to Jerusalem. I placed her at the center of the nations, '
  '6':
  - type: text
    content: but she has rebelled against my regulations and decrees and has been even more wicked than the surrounding nations. She has refused to obey the regulations and decrees I gave her to follow.
  '7':
  - type: text
    content: '“Therefore, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: You people have behaved worse than your neighbors and have refused to obey my decrees and regulations. You have not even lived up to the standards of the nations around you. '
  '8':
  - type: text
    content: 'Therefore, I myself, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', am now your enemy. I will punish you publicly while all the nations watch. '
  '9':
  - type: text
    content: 'Because of your detestable idols, I will punish you like I have never punished anyone before or ever will again. '
