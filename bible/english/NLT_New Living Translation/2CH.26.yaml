document_id: 2CH.26,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Uzziah Rules in Judah
  - type: text
    content: 'All the people of Judah had crowned Amaziah’s sixteen-year-old son, Uzziah, as king in place of his father. '
  '10':
  - type: text
    content: He also constructed forts in the wilderness and dug many water cisterns, because he kept great herds of livestock in the foothills of Judah
  - type: note
    content: Hebrew the Shephelah.
  - type: text
    content: ' and on the plains. He was also a man who loved the soil. He had many workers who cared for his farms and vineyards, both on the hillsides and in the fertile valleys.'
  '11':
  - type: text
    content: 'Uzziah had an army of well-trained warriors, ready to march into battle, unit by unit. This army had been mustered and organized by Jeiel, the secretary of the army, and his assistant, Maaseiah. They were under the direction of Hananiah, one of the king’s officials. '
  '12':
  - type: text
    content: 'These regiments of mighty warriors were commanded by 2,600 clan leaders. '
  '13':
  - type: text
    content: The army consisted of 307,500 men, all elite troops. They were prepared to assist the king against any enemy.
  '14':
  - type: text
    content: 'Uzziah provided the entire army with shields, spears, helmets, coats of mail, bows, and sling stones. '
  '15':
  - type: text
    content: And he built structures on the walls of Jerusalem, designed by experts to protect those who shot arrows and hurled large stones
  - type: note
    content: Or to shoot arrows and hurl large stones.
  - type: text
    content: ' from the towers and the corners of the wall. His fame spread far and wide, for the '
  - type: text
    content: Lord
  - type: text
    content: ' gave him marvelous help, and he became very powerful.'
  - type: heading
    content: Uzziah’s Sin and Punishment
  '16':
  - type: text
    content: 'But when he had become powerful, he also became proud, which led to his downfall. He sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ' his God by entering the sanctuary of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple and personally burning incense on the incense altar. '
  '17':
  - type: text
    content: 'Azariah the high priest went in after him with eighty other priests of the '
  - type: text
    content: Lord
  - type: text
    content: ', all brave men. '
  '18':
  - type: text
    content: 'They confronted King Uzziah and said, “It is not for you, Uzziah, to burn incense to the '
  - type: text
    content: Lord
  - type: text
    content: '. That is the work of the priests alone, the descendants of Aaron who are set apart for this work. Get out of the sanctuary, for you have sinned. The '
  - type: text
    content: Lord
  - type: text
    content: ' God will not honor you for this!”'
  '19':
  - type: text
    content: 'Uzziah, who was holding an incense burner, became furious. But as he was standing there raging at the priests before the incense altar in the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple, leprosy
  - type: note
    content: Or a contagious skin disease. The Hebrew word used here and throughout this passage can describe various skin diseases.
  - type: text
    content: ' suddenly broke out on his forehead. '
  '2':
  - type: text
    content: After his father’s death, Uzziah rebuilt the town of Elath
  - type: note
    content: As in Greek version (see also 2 Kgs 14:22; 16:6); Hebrew reads Eloth, a variant spelling of Elath.
  - type: text
    content: ' and restored it to Judah.'
  '20':
  - type: text
    content: 'When Azariah the high priest and all the other priests saw the leprosy, they rushed him out. And the king himself was eager to get out because the '
  - type: text
    content: Lord
  - type: text
    content: ' had struck him. '
  '21':
  - type: text
    content: 'So King Uzziah had leprosy until the day he died. He lived in isolation in a separate house, for he was excluded from the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: . His son Jotham was put in charge of the royal palace, and he governed the people of the land.
  '22':
  - type: text
    content: 'The rest of the events of Uzziah’s reign, from beginning to end, are recorded by the prophet Isaiah son of Amoz. '
  '23':
  - type: text
    content: When Uzziah died, he was buried with his ancestors; his grave was in a nearby burial field belonging to the kings, for the people said, “He had leprosy.” And his son Jotham became the next king.
  '3':
  - type: text
    content: 'Uzziah was sixteen years old when he became king, and he reigned in Jerusalem fifty-two years. His mother was Jecoliah from Jerusalem. '
  '4':
  - type: text
    content: 'He did what was pleasing in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, just as his father, Amaziah, had done. '
  '5':
  - type: text
    content: Uzziah sought God during the days of Zechariah, who taught him to fear God.
  - type: note
    content: As in Syriac and Greek versions; Hebrew reads who instructed him in divine visions.
  - type: text
    content: ' And as long as the king sought guidance from the '
  - type: text
    content: Lord
  - type: text
    content: ', God gave him success.'
  '6':
  - type: text
    content: 'Uzziah declared war on the Philistines and broke down the walls of Gath, Jabneh, and Ashdod. Then he built new towns in the Ashdod area and in other parts of Philistia. '
  '7':
  - type: text
    content: God helped him in his wars against the Philistines, his battles with the Arabs of Gur,
  - type: note
    content: As in Greek version; Hebrew reads Gur-baal.
  - type: text
    content: ' and his wars with the Meunites. '
  '8':
  - type: text
    content: The Meunites
  - type: note
    content: As in Greek version; Hebrew reads Ammonites. Compare 26:7.
  - type: text
    content: ' paid annual tribute to him, and his fame spread even to Egypt, for he had become very powerful.'
  '9':
  - type: text
    content: 'Uzziah built fortified towers in Jerusalem at the Corner Gate, at the Valley Gate, and at the angle in the wall. '
