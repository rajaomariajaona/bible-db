document_id: 2CH.26,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Uzziah Rules in Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'All the people of Judah had crowned Amaziah’s sixteen-year-old son, Uzziah, as king in place of his father. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also constructed forts in the wilderness and dug many water cisterns, because he kept great herds of livestock in the foothills of Judah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Shephelah.
      marker-yv: yv-n
    - type: text
      text: ' and on the plains. He was also a man who loved the soil. He had many workers who cared for his farms and vineyards, both on the hillsides and in the fertile valleys.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Uzziah had an army of well-trained warriors, ready to march into battle, unit by unit. This army had been mustered and organized by Jeiel, the secretary of the army, and his assistant, Maaseiah. They were under the direction of Hananiah, one of the king’s officials. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These regiments of mighty warriors were commanded by 2,600 clan leaders. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The army consisted of 307,500 men, all elite troops. They were prepared to assist the king against any enemy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Uzziah provided the entire army with shields, spears, helmets, coats of mail, bows, and sling stones. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he built structures on the walls of Jerusalem, designed by experts to protect those who shot arrows and hurled large stones
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to shoot arrows and hurl large stones.
      marker-yv: yv-n
    - type: text
      text: ' from the towers and the corners of the wall. His fame spread far and wide, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave him marvelous help, and he became very powerful.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Uzziah’s Sin and Punishment
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But when he had become powerful, he also became proud, which led to his downfall. He sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God by entering the sanctuary of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple and personally burning incense on the incense altar. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Azariah the high priest went in after him with eighty other priests of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', all brave men. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They confronted King Uzziah and said, “It is not for you, Uzziah, to burn incense to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. That is the work of the priests alone, the descendants of Aaron who are set apart for this work. Get out of the sanctuary, for you have sinned. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God will not honor you for this!”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Uzziah, who was holding an incense burner, became furious. But as he was standing there raging at the priests before the incense altar in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Temple, leprosy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a contagious skin disease. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word used here and throughout this passage can describe various skin diseases.
      marker-yv: yv-n
    - type: text
      text: ' suddenly broke out on his forehead. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: After his father’s death, Uzziah rebuilt the town of Elath
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version (see also 2 Kgs 14:22; 16:6); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Eloth, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Elath.
      marker-yv: yv-n
    - type: text
      text: ' and restored it to Judah.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Azariah the high priest and all the other priests saw the leprosy, they rushed him out. And the king himself was eager to get out because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had struck him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So King Uzziah had leprosy until the day he died. He lived in isolation in a separate house, for he was excluded from the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . His son Jotham was put in charge of the royal palace, and he governed the people of the land.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of the events of Uzziah’s reign, from beginning to end, are recorded by the prophet Isaiah son of Amoz. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Uzziah died, he was buried with his ancestors; his grave was in a nearby burial field belonging to the kings, for the people said, “He had leprosy.” And his son Jotham became the next king.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Uzziah was sixteen years old when he became king, and he reigned in Jerusalem fifty-two years. His mother was Jecoliah from Jerusalem. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did what was pleasing in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight, just as his father, Amaziah, had done. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Uzziah sought God during the days of Zechariah, who taught him to fear God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Syriac and Greek versions; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: who instructed him in divine visions.
      marker-yv: yv-n
    - type: text
      text: ' And as long as the king sought guidance from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God gave him success.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Uzziah declared war on the Philistines and broke down the walls of Gath, Jabneh, and Ashdod. Then he built new towns in the Ashdod area and in other parts of Philistia. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: God helped him in his wars against the Philistines, his battles with the Arabs of Gur,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Gur-baal.
      marker-yv: yv-n
    - type: text
      text: ' and his wars with the Meunites. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Meunites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ammonites. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare 26:7.
      marker-yv: yv-n
    - type: text
      text: ' paid annual tribute to him, and his fame spread even to Egypt, for he had become very powerful.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Uzziah built fortified towers in Jerusalem at the Corner Gate, at the Valley Gate, and at the angle in the wall. '
