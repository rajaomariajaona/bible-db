document_id: 2PE.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Day of the Lord Is Coming
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is my second letter to you, dear friends, and in both of them I have tried to stimulate your wholesome thinking and refresh your memory. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I want you to remember what the holy prophets said long ago and what our Lord and Savior commanded through your apostles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Most importantly, I want to remind you that in the last days scoffers will come, mocking the truth and following their own desires. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They will say, “What happened to the promise that Jesus is coming again? From before the times of our ancestors, everything has remained the same since the world was first created.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They deliberately forget that God made the heavens long ago by the word of his command, and he brought the earth out from the water and surrounded it with water. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then he used the water to destroy the ancient world with a mighty flood. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And by the same word, the present heavens and earth have been stored up for fire. They are being kept for the day of judgment, when ungodly people will be destroyed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But you must not forget this one thing, dear friends: A day is like a thousand years to the Lord, and a thousand years is like a day. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The Lord isn’t really being slow about his promise, as some people think. No, he is being patient for your sake. He does not want anyone to be destroyed, but wants everyone to repent. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But the day of the Lord will come as unexpectedly as a thief. Then the heavens will pass away with a terrible noise, and the very elements themselves will disappear in fire, and the earth and everything on it will be found to deserve judgment.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Other manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'will be burned up; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'one early manuscript reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: will be found destroyed.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Since everything around us is going to be destroyed like this, what holy and godly lives you should live, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'looking forward to the day of God and hurrying it along. On that day, he will set the heavens on fire, and the elements will melt away in the flames. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But we are looking forward to the new heavens and new earth he has promised, a world filled with God’s righteousness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And so, dear friends, while you are waiting for these things to happen, make every effort to be found living peaceful lives that are pure and blameless in his sight.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And remember, our Lord’s patience gives people time to be saved. This is what our beloved brother Paul also wrote to you with the wisdom God gave him— '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: speaking of these things in all of his letters. Some of his comments are hard to understand, and those who are ignorant and unstable have twisted his letters to mean something quite different, just as they do with other parts of Scripture. And this will result in their destruction.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter’s Final Words
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'You already know these things, dear friends. So be on guard; then you will not be carried away by the errors of these wicked people and lose your own secure footing. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Rather, you must grow in the grace and knowledge of our Lord and Savior Jesus Christ.
- type: usfm
  marker: p
  children:
  - type: text
    text: All glory to him, both now and forever! Amen.
