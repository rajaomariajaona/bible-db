document_id: PSA.124,116
type_code: eng
verses:
  '1':
  - type: text
    content: A song for pilgrims ascending to Jerusalem. A psalm of David.
  - type: text
    content: 'What if the '
  - type: text
    content: Lord
  - type: text
    content: ' had not been on our side?'
  - type: text
    content: 'Let all Israel repeat:'
  '2':
  - type: text
    content: 'What if the '
  - type: text
    content: Lord
  - type: text
    content: ' had not been on our side'
  - type: text
    content: when people attacked us?
  '3':
  - type: text
    content: They would have swallowed us alive
  - type: text
    content: in their burning anger.
  '4':
  - type: text
    content: The waters would have engulfed us;
  - type: text
    content: a torrent would have overwhelmed us.
  '5':
  - type: text
    content: Yes, the raging waters of their fury
  - type: text
    content: would have overwhelmed our very lives.
  '6':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who did not let their teeth tear us apart!
  '7':
  - type: text
    content: We escaped like a bird from a hunter’s trap.
  - type: text
    content: The trap is broken, and we are free!
  '8':
  - type: text
    content: 'Our help is from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who made heaven and earth.
