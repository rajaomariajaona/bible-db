document_id: 1TH.1,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings from Paul
  - type: text
    content: This letter is from Paul, Silas,
  - type: note
    content: Greek Silvanus, the Greek form of the name.
  - type: text
    content: ' and Timothy.'
  - type: text
    content: We are writing to the church in Thessalonica, to you who belong to God the Father and the Lord Jesus Christ.
  - type: text
    content: May God give you grace and peace.
  - type: heading
    content: The Faith of the Thessalonian Believers
  '10':
  - type: text
    content: And they speak of how you are looking forward to the coming of God’s Son from heaven—Jesus, whom God raised from the dead. He is the one who has rescued us from the terrors of the coming judgment.
  '2':
  - type: text
    content: 'We always thank God for all of you and pray for you constantly. '
  '3':
  - type: text
    content: As we pray to our God and Father about you, we think of your faithful work, your loving deeds, and the enduring hope you have because of our Lord Jesus Christ.
  '4':
  - type: text
    content: We know, dear brothers and sisters,
  - type: note
    content: Greek brothers.
  - type: text
    content: ' that God loves you and has chosen you to be his own people. '
  '5':
  - type: text
    content: For when we brought you the Good News, it was not only with words but also with power, for the Holy Spirit gave you full assurance
  - type: note
    content: Or with the power of the Holy Spirit, so you can have full assurance.
  - type: text
    content: ' that what we said was true. And you know of our concern for you from the way we lived when we were with you. '
  '6':
  - type: text
    content: 'So you received the message with joy from the Holy Spirit in spite of the severe suffering it brought you. In this way, you imitated both us and the Lord. '
  '7':
  - type: text
    content: As a result, you have become an example to all the believers in Greece—throughout both Macedonia and Achaia.
  - type: note
    content: Macedonia and Achaia were the northern and southern regions of Greece.
  '8':
  - type: text
    content: 'And now the word of the Lord is ringing out from you to people everywhere, even beyond Macedonia and Achaia, for wherever we go we find people telling us about your faith in God. We don’t need to tell them about it, '
  '9':
  - type: text
    content: 'for they keep talking about the wonderful welcome you gave us and how you turned away from idols to serve the living and true God. '
