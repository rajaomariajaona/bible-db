document_id: 1TH.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greetings from Paul
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: This letter is from Paul, Silas,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Silvanus, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: the Greek form of the name.
    marker-yv: yv-n
  - type: text
    text: ' and Timothy.'
- type: usfm
  marker: p
  children:
  - type: text
    text: We are writing to the church in Thessalonica, to you who belong to God the Father and the Lord Jesus Christ.
- type: usfm
  marker: p
  children:
  - type: text
    text: May God give you grace and peace.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Faith of the Thessalonian Believers
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'We always thank God for all of you and pray for you constantly. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: As we pray to our God and Father about you, we think of your faithful work, your loving deeds, and the enduring hope you have because of our Lord Jesus Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: We know, dear brothers and sisters,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: brothers.
    marker-yv: yv-n
  - type: text
    text: ' that God loves you and has chosen you to be his own people. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For when we brought you the Good News, it was not only with words but also with power, for the Holy Spirit gave you full assurance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: with the power of the Holy Spirit, so you can have full assurance.
    marker-yv: yv-n
  - type: text
    text: ' that what we said was true. And you know of our concern for you from the way we lived when we were with you. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So you received the message with joy from the Holy Spirit in spite of the severe suffering it brought you. In this way, you imitated both us and the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: As a result, you have become an example to all the believers in Greece—throughout both Macedonia and Achaia.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:7 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Macedonia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'and '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Achaia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: were the northern and southern regions of Greece.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And now the word of the Lord is ringing out from you to people everywhere, even beyond Macedonia and Achaia, for wherever we go we find people telling us about your faith in God. We don’t need to tell them about it, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'for they keep talking about the wonderful welcome you gave us and how you turned away from idols to serve the living and true God. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And they speak of how you are looking forward to the coming of God’s Son from heaven—Jesus, whom God raised from the dead. He is the one who has rescued us from the terrors of the coming judgment.
