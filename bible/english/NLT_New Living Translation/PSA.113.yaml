    - type: text
      text: '!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed be the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now and forever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everywhere—from east to west—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'praise the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is high above the nations;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his glory is higher than the heavens.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who can be compared with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who is enthroned on high?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He stoops to look down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on heaven and on earth.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He lifts the poor from the dust
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the needy from the garbage dump.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sets them among princes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even the princes of his own people!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gives the childless woman a family,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: making her a happy mother.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
