document_id: PSA.113,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'Yes, give praise, O servants of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: 'Praise the name of the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '2':
  - type: text
    content: 'Blessed be the name of the '
  - type: text
    content: Lord
  - type: text
    content: now and forever.
  '3':
  - type: text
    content: Everywhere—from east to west—
  - type: text
    content: 'praise the name of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is high above the nations;'
  - type: text
    content: his glory is higher than the heavens.
  '5':
  - type: text
    content: 'Who can be compared with the '
  - type: text
    content: Lord
  - type: text
    content: ' our God,'
  - type: text
    content: who is enthroned on high?
  '6':
  - type: text
    content: He stoops to look down
  - type: text
    content: on heaven and on earth.
  '7':
  - type: text
    content: He lifts the poor from the dust
  - type: text
    content: and the needy from the garbage dump.
  '8':
  - type: text
    content: He sets them among princes,
  - type: text
    content: even the princes of his own people!
  '9':
  - type: text
    content: He gives the childless woman a family,
  - type: text
    content: making her a happy mother.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
