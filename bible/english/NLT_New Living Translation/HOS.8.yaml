document_id: HOS.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Harvests the Whirlwind
  - type: text
    content: “Sound the alarm!
  - type: text
    content: 'The enemy descends like an eagle on the people of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for they have broken my covenant
  - type: text
    content: and revolted against my law.
  '10':
  - type: text
    content: But though they have sold themselves to many allies,
  - type: text
    content: I will now gather them together for judgment.
  - type: text
    content: Then they will writhe
  - type: text
    content: under the burden of the great king.
  '11':
  - type: text
    content: “Israel has built many altars to take away sin,
  - type: text
    content: but these very altars became places for sinning!
  '12':
  - type: text
    content: Even though I gave them all my laws,
  - type: text
    content: they act as if those laws don’t apply to them.
  '13':
  - type: text
    content: The people love to offer sacrifices to me,
  - type: text
    content: feasting on the meat,
  - type: text
    content: but I do not accept their sacrifices.
  - type: text
    content: I will hold my people accountable for their sins,
  - type: text
    content: and I will punish them.
  - type: text
    content: They will return to Egypt.
  '14':
  - type: text
    content: Israel has forgotten its Maker and built great palaces,
  - type: text
    content: and Judah has fortified its cities.
  - type: text
    content: Therefore, I will send down fire on their cities
  - type: text
    content: and will burn up their fortresses.”
  '2':
  - type: text
    content: Now Israel pleads with me,
  - type: text
    content: ‘Help us, for you are our God!’
  '3':
  - type: text
    content: But it is too late.
  - type: text
    content: The people of Israel have rejected what is good,
  - type: text
    content: and now their enemies will chase after them.
  '4':
  - type: text
    content: The people have appointed kings without my consent,
  - type: text
    content: and princes without my approval.
  - type: text
    content: By making idols for themselves from their silver and gold,
  - type: text
    content: they have brought about their own destruction.
  '5':
  - type: text
    content: “O Samaria, I reject this calf—
  - type: text
    content: this idol you have made.
  - type: text
    content: My fury burns against you.
  - type: text
    content: How long will you be incapable of innocence?
  '6':
  - type: text
    content: This calf you worship, O Israel,
  - type: text
    content: was crafted by your own hands!
  - type: text
    content: It is not God!
  - type: text
    content: Therefore, it must be smashed to bits.
  '7':
  - type: text
    content: “They have planted the wind
  - type: text
    content: and will harvest the whirlwind.
  - type: text
    content: The stalks of grain wither
  - type: text
    content: and produce nothing to eat.
  - type: text
    content: And even if there is any grain,
  - type: text
    content: foreigners will eat it.
  '8':
  - type: text
    content: The people of Israel have been swallowed up;
  - type: text
    content: they lie among the nations like an old discarded pot.
  '9':
  - type: text
    content: Like a wild donkey looking for a mate,
  - type: text
    content: they have gone up to Assyria.
  - type: text
    content: The people of Israel
  - type: note
    content: Hebrew Ephraim, referring to the northern kingdom of Israel; also in 8:11.
  - type: text
    content: ' have sold themselves—'
  - type: text
    content: sold themselves to many lovers.
