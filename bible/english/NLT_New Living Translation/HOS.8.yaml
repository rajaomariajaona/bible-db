document_id: HOS.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Harvests the Whirlwind
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Sound the alarm!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The enemy descends like an eagle on the people of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: for they have broken my covenant
- type: usfm
  marker: q2
  children:
  - type: text
    text: and revolted against my law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Now Israel pleads with me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Help us, for you are our God!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But it is too late.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The people of Israel have rejected what is good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and now their enemies will chase after them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The people have appointed kings without my consent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and princes without my approval.
- type: usfm
  marker: q1
  children:
  - type: text
    text: By making idols for themselves from their silver and gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have brought about their own destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “O Samaria, I reject this calf—
- type: usfm
  marker: q2
  children:
  - type: text
    text: this idol you have made.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My fury burns against you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: How long will you be incapable of innocence?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: This calf you worship, O Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: was crafted by your own hands!
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is not God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore, it must be smashed to bits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “They have planted the wind
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will harvest the whirlwind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The stalks of grain wither
- type: usfm
  marker: q2
  children:
  - type: text
    text: and produce nothing to eat.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And even if there is any grain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: foreigners will eat it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The people of Israel have been swallowed up;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they lie among the nations like an old discarded pot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Like a wild donkey looking for a mate,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have gone up to Assyria.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The people of Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ephraim, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: referring to the northern kingdom of Israel; also in 8:11.
    marker-yv: yv-n
  - type: text
    text: ' have sold themselves—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: sold themselves to many lovers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But though they have sold themselves to many allies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will now gather them together for judgment.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then they will writhe
- type: usfm
  marker: q2
  children:
  - type: text
    text: under the burden of the great king.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Israel has built many altars to take away sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but these very altars became places for sinning!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Even though I gave them all my laws,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they act as if those laws don’t apply to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The people love to offer sacrifices to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: feasting on the meat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I do not accept their sacrifices.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will hold my people accountable for their sins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will punish them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will return to Egypt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Israel has forgotten its Maker and built great palaces,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Judah has fortified its cities.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore, I will send down fire on their cities
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will burn up their fortresses.”
