document_id: PSA.36,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Sin whispers to the wicked, deep within their hearts.
  - type: note
    content: As in some Hebrew manuscripts and Syriac version, which read in his heart. Masoretic Text reads in my heart.
  - type: text
    content: They have no fear of God at all.
  '10':
  - type: text
    content: Pour out your unfailing love on those who love you;
  - type: text
    content: give justice to those with honest hearts.
  '11':
  - type: text
    content: Don’t let the proud trample me
  - type: text
    content: or the wicked push me around.
  '12':
  - type: text
    content: Look! Those who do evil have fallen!
  - type: text
    content: They are thrown down, never to rise again.
  '2':
  - type: text
    content: In their blind conceit,
  - type: text
    content: they cannot see how wicked they really are.
  '3':
  - type: text
    content: Everything they say is crooked and deceitful.
  - type: text
    content: They refuse to act wisely or do good.
  '4':
  - type: text
    content: They lie awake at night, hatching sinful plots.
  - type: text
    content: Their actions are never good.
  - type: text
    content: They make no attempt to turn from evil.
  '5':
  - type: text
    content: 'Your unfailing love, O '
  - type: text
    content: Lord
  - type: text
    content: ', is as vast as the heavens;'
  - type: text
    content: your faithfulness reaches beyond the clouds.
  '6':
  - type: text
    content: Your righteousness is like the mighty mountains,
  - type: text
    content: your justice like the ocean depths.
  - type: text
    content: 'You care for people and animals alike, O '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: How precious is your unfailing love, O God!
  - type: text
    content: All humanity finds shelter
  - type: text
    content: in the shadow of your wings.
  '8':
  - type: text
    content: You feed them from the abundance of your own house,
  - type: text
    content: letting them drink from your river of delights.
  '9':
  - type: text
    content: For you are the fountain of life,
  - type: text
    content: the light by which we see.
