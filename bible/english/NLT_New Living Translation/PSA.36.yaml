document_id: PSA.36
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of David, the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Sin whispers to the wicked, deep within their hearts.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Hebrew manuscripts and Syriac version, which read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in his heart. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in my heart.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: They have no fear of God at all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: In their blind conceit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they cannot see how wicked they really are.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Everything they say is crooked and deceitful.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They refuse to act wisely or do good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They lie awake at night, hatching sinful plots.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their actions are never good.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They make no attempt to turn from evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Your unfailing love, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', is as vast as the heavens;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: your faithfulness reaches beyond the clouds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Your righteousness is like the mighty mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your justice like the ocean depths.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You care for people and animals alike, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: How precious is your unfailing love, O God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: All humanity finds shelter
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the shadow of your wings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You feed them from the abundance of your own house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: letting them drink from your river of delights.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For you are the fountain of life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the light by which we see.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pour out your unfailing love on those who love you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: give justice to those with honest hearts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Don’t let the proud trample me
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the wicked push me around.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Look! Those who do evil have fallen!
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are thrown down, never to rise again.
