document_id: NUM.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victory over the Canaanites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The Canaanite king of Arad, who lived in the Negev, heard that the Israelites were approaching on the road through Atharim. So he attacked the Israelites and took some of them as prisoners. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then the people of Israel made this vow to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': “If you will hand these people over to us, we will completely destroy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term used here refers to the complete consecration of things or people to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', either by destroying them or by giving them as an offering; also in 21:3.'
    marker-yv: yv-n
  - type: text
    text: ' all their towns.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' heard the Israelites’ request and gave them victory over the Canaanites. The Israelites completely destroyed them and their towns, and the place has been called Hormah'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:3 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hormah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “destruction.”
    marker-yv: yv-n
  - type: text
    text: ' ever since.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Bronze Snake
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then the people of Israel set out from Mount Hor, taking the road to the Red Sea
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sea of reeds.
    marker-yv: yv-n
  - type: text
    text: ' to go around the land of Edom. But the people grew impatient with the long journey, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: and they began to speak against God and Moses. “Why have you brought us out of Egypt to die here in the wilderness?” they complained. “There is nothing to eat here and nothing to drink. And we hate this horrible manna!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sent poisonous snakes among the people, and many were bitten and died. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then the people came to Moses and cried out, “We have sinned by speaking against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and against you. Pray that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will take away the snakes.” So Moses prayed for the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told him, “Make a replica of a poisonous snake and attach it to a pole. All who are bitten will live if they simply look at it!” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So Moses made a snake out of bronze and attached it to a pole. Then anyone who was bitten by a snake could look at the bronze snake and be healed!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel’s Journey to Moab
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The Israelites traveled next to Oboth and camped there. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then they went on to Iye-abarim, in the wilderness on the eastern border of Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'From there they traveled to the valley of Zered Brook and set up camp. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then they moved out and camped on the far side of the Arnon River, in the wilderness adjacent to the territory of the Amorites. The Arnon is the boundary line between the Moabites and the Amorites. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For this reason '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'The Book of the Wars of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: text
    text: ' speaks of “the town of Waheb in the area of Suphah, and the ravines of the Arnon River, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: and the ravines that extend as far as the settlement of Ar on the border of Moab.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: From there the Israelites traveled to Beer,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:16 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “well.”
    marker-yv: yv-n
  - type: text
    text: ' which is the well where the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, “Assemble the people, and I will give them water.” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'There the Israelites sang this song:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Spring up, O well!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, sing its praises!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Sing of this well,
- type: usfm
  marker: q2
  children:
  - type: text
    text: which princes dug,
- type: usfm
  marker: q1
  children:
  - type: text
    text: which great leaders hollowed out
- type: usfm
  marker: q2
  children:
  - type: text
    text: with their scepters and staffs.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then the Israelites left the wilderness and proceeded on through Mattanah, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nahaliel, and Bamoth. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: After that they went to the valley in Moab where Pisgah Peak overlooks the wasteland.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: overlooks Jeshimon.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victory over Sihon and Og
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The Israelites sent ambassadors to King Sihon of the Amorites with this message:'
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Let us travel through your land. We will be careful not to go through your fields and vineyards. We won’t even drink water from your wells. We will stay on the king’s road until we have passed through your territory.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But King Sihon refused to let them cross his territory. Instead, he mobilized his entire army and attacked Israel in the wilderness, engaging them in battle at Jahaz. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: But the Israelites slaughtered them with their swords and occupied their land from the Arnon River to the Jabbok River. They went only as far as the Ammonite border because the boundary of the Ammonites was fortified.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'because the terrain of the Ammonite frontier was rugged; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: because the boundary of the Ammonites was strong.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So Israel captured all the towns of the Amorites and settled in them, including the city of Heshbon and its surrounding villages. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Heshbon had been the capital of King Sihon of the Amorites. He had defeated a former Moabite king and seized all his land as far as the Arnon River. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Therefore, the ancient poets wrote this about him:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Come to Heshbon and let it be rebuilt!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let the city of Sihon be restored.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A fire flamed forth from Heshbon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a blaze from the city of Sihon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It burned the city of Ar in Moab;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it destroyed the rulers of the Arnon heights.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: What sorrow awaits you, O people of Moab!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are finished, O worshipers of Chemosh!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chemosh has left his sons as refugees,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his daughters as captives of Sihon, the Amorite king.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: We have utterly destroyed them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from Heshbon to Dibon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We have completely wiped them out
- type: usfm
  marker: q2
  children:
  - type: text
    text: as far away as Nophah and Medeba.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'until fire spread to Medeba. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'So the people of Israel occupied the territory of the Amorites. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'After Moses sent men to explore the Jazer area, they captured all the towns in the region and drove out the Amorites who lived there. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then they turned and marched up the road to Bashan, but King Og of Bashan and all his people attacked them at Edrei. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, “Do not be afraid of him, for I have handed him over to you, along with all his people and his land. Do the same to him as you did to King Sihon of the Amorites, who ruled in Heshbon.” '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: And Israel killed King Og, his sons, and all his subjects; not a single survivor remained. Then Israel occupied their land.
