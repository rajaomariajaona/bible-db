document_id: PSA.73,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Book Three (Psalms 73–89)
  - type: text
    content: A psalm of Asaph.
  - type: text
    content: Truly God is good to Israel,
  - type: text
    content: to those whose hearts are pure.
  '10':
  - type: text
    content: And so the people are dismayed and confused,
  - type: text
    content: drinking in all their words.
  '11':
  - type: text
    content: “What does God know?” they ask.
  - type: text
    content: “Does the Most High even know what’s happening?”
  '12':
  - type: text
    content: Look at these wicked people—
  - type: text
    content: enjoying a life of ease while their riches multiply.
  '13':
  - type: text
    content: Did I keep my heart pure for nothing?
  - type: text
    content: Did I keep myself innocent for no reason?
  '14':
  - type: text
    content: I get nothing but trouble all day long;
  - type: text
    content: every morning brings me pain.
  '15':
  - type: text
    content: If I had really spoken this way to others,
  - type: text
    content: I would have been a traitor to your people.
  '16':
  - type: text
    content: So I tried to understand why the wicked prosper.
  - type: text
    content: But what a difficult task it is!
  '17':
  - type: text
    content: Then I went into your sanctuary, O God,
  - type: text
    content: and I finally understood the destiny of the wicked.
  '18':
  - type: text
    content: Truly, you put them on a slippery path
  - type: text
    content: and send them sliding over the cliff to destruction.
  '19':
  - type: text
    content: In an instant they are destroyed,
  - type: text
    content: completely swept away by terrors.
  '2':
  - type: text
    content: But as for me, I almost lost my footing.
  - type: text
    content: My feet were slipping, and I was almost gone.
  '20':
  - type: text
    content: When you arise, O Lord,
  - type: text
    content: you will laugh at their silly ideas
  - type: text
    content: as a person laughs at dreams in the morning.
  '21':
  - type: text
    content: Then I realized that my heart was bitter,
  - type: text
    content: and I was all torn up inside.
  '22':
  - type: text
    content: I was so foolish and ignorant—
  - type: text
    content: I must have seemed like a senseless animal to you.
  '23':
  - type: text
    content: Yet I still belong to you;
  - type: text
    content: you hold my right hand.
  '24':
  - type: text
    content: You guide me with your counsel,
  - type: text
    content: leading me to a glorious destiny.
  '25':
  - type: text
    content: Whom have I in heaven but you?
  - type: text
    content: I desire you more than anything on earth.
  '26':
  - type: text
    content: My health may fail, and my spirit may grow weak,
  - type: text
    content: but God remains the strength of my heart;
  - type: text
    content: he is mine forever.
  '27':
  - type: text
    content: Those who desert him will perish,
  - type: text
    content: for you destroy those who abandon you.
  '28':
  - type: text
    content: But as for me, how good it is to be near God!
  - type: text
    content: 'I have made the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' my shelter,'
  - type: text
    content: and I will tell everyone about the wonderful things you do.
  '3':
  - type: text
    content: For I envied the proud
  - type: text
    content: when I saw them prosper despite their wickedness.
  '4':
  - type: text
    content: They seem to live such painless lives;
  - type: text
    content: their bodies are so healthy and strong.
  '5':
  - type: text
    content: They don’t have troubles like other people;
  - type: text
    content: they’re not plagued with problems like everyone else.
  '6':
  - type: text
    content: They wear pride like a jeweled necklace
  - type: text
    content: and clothe themselves with cruelty.
  '7':
  - type: text
    content: These fat cats have everything
  - type: text
    content: their hearts could ever wish for!
  '8':
  - type: text
    content: They scoff and speak only evil;
  - type: text
    content: in their pride they seek to crush others.
  '9':
  - type: text
    content: They boast against the very heavens,
  - type: text
    content: and their words strut throughout the earth.
