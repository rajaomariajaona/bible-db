document_id: PSA.73
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Book Three
  - type: text
    text: ' (Psalms 73–89)'
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Truly God is good to Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to those whose hearts are pure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: But as for me, I almost lost my footing.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My feet were slipping, and I was almost gone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For I envied the proud
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I saw them prosper despite their wickedness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They seem to live such painless lives;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their bodies are so healthy and strong.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They don’t have troubles like other people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’re not plagued with problems like everyone else.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They wear pride like a jeweled necklace
- type: usfm
  marker: q2
  children:
  - type: text
    text: and clothe themselves with cruelty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: These fat cats have everything
- type: usfm
  marker: q2
  children:
  - type: text
    text: their hearts could ever wish for!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They scoff and speak only evil;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in their pride they seek to crush others.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They boast against the very heavens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their words strut throughout the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And so the people are dismayed and confused,
- type: usfm
  marker: q2
  children:
  - type: text
    text: drinking in all their words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “What does God know?” they ask.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Does the Most High even know what’s happening?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Look at these wicked people—
- type: usfm
  marker: q2
  children:
  - type: text
    text: enjoying a life of ease while their riches multiply.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Did I keep my heart pure for nothing?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Did I keep myself innocent for no reason?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I get nothing but trouble all day long;
- type: usfm
  marker: q2
  children:
  - type: text
    text: every morning brings me pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: If I had really spoken this way to others,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would have been a traitor to your people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So I tried to understand why the wicked prosper.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But what a difficult task it is!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then I went into your sanctuary, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I finally understood the destiny of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Truly, you put them on a slippery path
- type: usfm
  marker: q2
  children:
  - type: text
    text: and send them sliding over the cliff to destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: In an instant they are destroyed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: completely swept away by terrors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: When you arise, O Lord,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will laugh at their silly ideas
- type: usfm
  marker: q2
  children:
  - type: text
    text: as a person laughs at dreams in the morning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then I realized that my heart was bitter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I was all torn up inside.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: I was so foolish and ignorant—
- type: usfm
  marker: q2
  children:
  - type: text
    text: I must have seemed like a senseless animal to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Yet I still belong to you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you hold my right hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: You guide me with your counsel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: leading me to a glorious destiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Whom have I in heaven but you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: I desire you more than anything on earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: My health may fail, and my spirit may grow weak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but God remains the strength of my heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is mine forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Those who desert him will perish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you destroy those who abandon you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: But as for me, how good it is to be near God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I have made the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my shelter,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will tell everyone about the wonderful things you do.
