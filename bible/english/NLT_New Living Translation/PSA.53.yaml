document_id: PSA.53,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A meditation; a psalm'
  - type: note
    content: Hebrew According to mahalath; a maskil. These may be literary or musical terms.
  - type: text
    content: ' of David.'
  - type: text
    content: Only fools say in their hearts,
  - type: text
    content: “There is no God.”
  - type: text
    content: They are corrupt, and their actions are evil;
  - type: text
    content: not one of them does good!
  '2':
  - type: text
    content: God looks down from heaven
  - type: text
    content: on the entire human race;
  - type: text
    content: he looks to see if anyone is truly wise,
  - type: text
    content: if anyone seeks God.
  '3':
  - type: text
    content: But no, all have turned away;
  - type: text
    content: all have become corrupt.
  - type: note
    content: Greek version reads have become useless. Compare Rom 3:12.
  - type: text
    content: No one does good,
  - type: text
    content: not a single one!
  '4':
  - type: text
    content: Will those who do evil never learn?
  - type: text
    content: They eat up my people like bread
  - type: text
    content: and wouldn’t think of praying to God.
  '5':
  - type: text
    content: Terror will grip them,
  - type: text
    content: terror like they have never known before.
  - type: text
    content: God will scatter the bones of your enemies.
  - type: text
    content: You will put them to shame, for God has rejected them.
  '6':
  - type: text
    content: Who will come from Mount Zion to rescue Israel?
  - type: text
    content: When God restores his people,
  - type: text
    content: Jacob will shout with joy, and Israel will rejoice.
