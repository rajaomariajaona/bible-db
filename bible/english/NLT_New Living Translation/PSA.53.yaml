document_id: PSA.53,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A meditation; a psalm'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:TITLE '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'According to mahalath; a maskil. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These may be literary or musical terms.
      marker-yv: yv-n
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Only fools say in their hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “There is no God.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are corrupt, and their actions are evil;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not one of them does good!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: God looks down from heaven
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the entire human race;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he looks to see if anyone is truly wise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if anyone seeks God.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But no, all have turned away;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all have become corrupt.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'have become useless. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Rom 3:12.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one does good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not a single one!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Will those who do evil never learn?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They eat up my people like bread
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wouldn’t think of praying to God.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Terror will grip them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: terror like they have never known before.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will scatter the bones of your enemies.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will put them to shame, for God has rejected them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Who will come from Mount Zion to rescue Israel?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When God restores his people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jacob will shout with joy, and Israel will rejoice.
