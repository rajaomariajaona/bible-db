document_id: ISA.30,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah’s Worthless Treaty with Egypt
  - type: text
    content: “What sorrow awaits my rebellious children,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “You make plans that are contrary to mine.
  - type: text
    content: You make alliances not directed by my Spirit,
  - type: text
    content: thus piling up your sins.
  '10':
  - type: text
    content: They tell the seers,
  - type: text
    content: “Stop seeing visions!”
  - type: text
    content: They tell the prophets,
  - type: text
    content: “Don’t tell us what is right.
  - type: text
    content: Tell us nice things.
  - type: text
    content: Tell us lies.
  '11':
  - type: text
    content: Forget all this gloom.
  - type: text
    content: Get off your narrow path.
  - type: text
    content: Stop telling us about your
  - type: text
    content: ‘Holy One of Israel.’”
  '12':
  - type: text
    content: 'This is the reply of the Holy One of Israel:'
  - type: text
    content: “Because you despise what I tell you
  - type: text
    content: and trust instead in oppression and lies,
  '13':
  - type: text
    content: calamity will come upon you suddenly—
  - type: text
    content: like a bulging wall that bursts and falls.
  - type: text
    content: In an instant it will collapse
  - type: text
    content: and come crashing down.
  '14':
  - type: text
    content: You will be smashed like a piece of pottery—
  - type: text
    content: shattered so completely that
  - type: text
    content: there won’t be a piece big enough
  - type: text
    content: to carry coals from a fireplace
  - type: text
    content: or a little water from the well.”
  '15':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'the Holy One of Israel, says:'
  - type: text
    content: “Only in returning to me
  - type: text
    content: and resting in me will you be saved.
  - type: text
    content: In quietness and confidence is your strength.
  - type: text
    content: But you would have none of it.
  '16':
  - type: text
    content: You said, ‘No, we will get our help from Egypt.
  - type: text
    content: They will give us swift horses for riding into battle.’
  - type: text
    content: But the only swiftness you are going to see
  - type: text
    content: is the swiftness of your enemies chasing you!
  '17':
  - type: text
    content: One of them will chase a thousand of you.
  - type: text
    content: Five of them will make all of you flee.
  - type: text
    content: You will be left like a lonely flagpole on a hill
  - type: text
    content: or a tattered banner on a distant mountaintop.”
  - type: heading
    content: Blessings for the Lord’s People
  '18':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' must wait for you to come to him'
  - type: text
    content: so he can show you his love and compassion.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is a faithful God.'
  - type: text
    content: Blessed are those who wait for his help.
  '19':
  - type: text
    content: O people of Zion, who live in Jerusalem,
  - type: text
    content: you will weep no more.
  - type: text
    content: He will be gracious if you ask for help.
  - type: text
    content: He will surely respond to the sound of your cries.
  '2':
  - type: text
    content: For without consulting me,
  - type: text
    content: you have gone down to Egypt for help.
  - type: text
    content: You have put your trust in Pharaoh’s protection.
  - type: text
    content: You have tried to hide in his shade.
  '20':
  - type: text
    content: Though the Lord gave you adversity for food
  - type: text
    content: and suffering for drink,
  - type: text
    content: he will still be with you to teach you.
  - type: text
    content: You will see your teacher with your own eyes.
  '21':
  - type: text
    content: Your own ears will hear him.
  - type: text
    content: Right behind you a voice will say,
  - type: text
    content: “This is the way you should go,”
  - type: text
    content: whether to the right or to the left.
  '22':
  - type: text
    content: Then you will destroy all your silver idols
  - type: text
    content: and your precious gold images.
  - type: text
    content: You will throw them out like filthy rags,
  - type: text
    content: saying to them, “Good riddance!”
  '23':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will bless you with rain at planting time. There will be wonderful harvests and plenty of pastureland for your livestock. '
  '24':
  - type: text
    content: 'The oxen and donkeys that till the ground will eat good grain, its chaff blown away by the wind. '
  '25':
  - type: text
    content: 'In that day, when your enemies are slaughtered and the towers fall, there will be streams of water flowing down every mountain and hill. '
  '26':
  - type: text
    content: 'The moon will be as bright as the sun, and the sun will be seven times brighter—like the light of seven days in one! So it will be when the '
  - type: text
    content: Lord
  - type: text
    content: ' begins to heal his people and cure the wounds he gave them.'
  '27':
  - type: text
    content: 'Look! The '
  - type: text
    content: Lord
  - type: text
    content: ' is coming from far away,'
  - type: text
    content: burning with anger,
  - type: text
    content: surrounded by thick, rising smoke.
  - type: text
    content: His lips are filled with fury;
  - type: text
    content: his words consume like fire.
  '28':
  - type: text
    content: His hot breath pours out like a flood
  - type: text
    content: up to the neck of his enemies.
  - type: text
    content: He will sift out the proud nations for destruction.
  - type: text
    content: He will bridle them and lead them away to ruin.
  '29':
  - type: text
    content: But the people of God will sing a song of joy,
  - type: text
    content: like the songs at the holy festivals.
  - type: text
    content: You will be filled with joy,
  - type: text
    content: as when a flutist leads a group of pilgrims
  - type: text
    content: 'to Jerusalem, the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: to the Rock of Israel.
  '3':
  - type: text
    content: But by trusting Pharaoh, you will be humiliated,
  - type: text
    content: and by depending on him, you will be disgraced.
  '30':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will make his majestic voice heard.'
  - type: text
    content: He will display the strength of his mighty arm.
  - type: text
    content: It will descend with devouring flames,
  - type: text
    content: with cloudbursts, thunderstorms, and huge hailstones.
  '31':
  - type: text
    content: 'At the '
  - type: text
    content: Lord
  - type: text
    content: ’s command, the Assyrians will be shattered.
  - type: text
    content: He will strike them down with his royal scepter.
  '32':
  - type: text
    content: 'And as the '
  - type: text
    content: Lord
  - type: text
    content: ' strikes them with his rod of punishment,'
  - type: note
    content: As in some Hebrew manuscripts and Syriac version; Masoretic Text reads with the founded rod.
  - type: text
    content: his people will celebrate with tambourines and harps.
  - type: text
    content: Lifting his mighty arm, he will fight the Assyrians.
  '33':
  - type: text
    content: Topheth—the place of burning—
  - type: text
    content: has long been ready for the Assyrian king;
  - type: text
    content: the pyre is piled high with wood.
  - type: text
    content: 'The breath of the '
  - type: text
    content: Lord
  - type: text
    content: ', like fire from a volcano,'
  - type: text
    content: will set it ablaze.
  '4':
  - type: text
    content: For though his power extends to Zoan
  - type: text
    content: and his officials have arrived in Hanes,
  '5':
  - type: text
    content: all who trust in him will be ashamed.
  - type: text
    content: He will not help you.
  - type: text
    content: Instead, he will disgrace you.”
  '6':
  - type: text
    content: 'This message came to me concerning the animals in the Negev:'
  - type: text
    content: The caravan moves slowly
  - type: text
    content: across the terrible desert to Egypt—
  - type: text
    content: donkeys weighed down with riches
  - type: text
    content: and camels loaded with treasure—
  - type: text
    content: all to pay for Egypt’s protection.
  - type: text
    content: They travel through the wilderness,
  - type: text
    content: a place of lionesses and lions,
  - type: text
    content: a place where vipers and poisonous snakes live.
  - type: text
    content: All this, and Egypt will give you nothing in return.
  '7':
  - type: text
    content: Egypt’s promises are worthless!
  - type: text
    content: Therefore, I call her Rahab—
  - type: text
    content: the Harmless Dragon.
  - type: note
    content: Hebrew Rahab who sits still. Rahab is the name of a mythical sea monster that represents chaos in ancient literature. The name is used here as a poetic name for Egypt.
  - type: heading
    content: A Warning for Rebellious Judah
  '8':
  - type: text
    content: Now go and write down these words.
  - type: text
    content: Write them in a book.
  - type: text
    content: They will stand until the end of time
  - type: text
    content: as a witness
  '9':
  - type: text
    content: that these people are stubborn rebels
  - type: text
    content: 'who refuse to pay attention to the '
  - type: text
    content: Lord
  - type: text
    content: ’s instructions.
