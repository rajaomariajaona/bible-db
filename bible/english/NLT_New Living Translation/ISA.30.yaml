document_id: ISA.30
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judah’s Worthless Treaty with Egypt
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “What sorrow awaits my rebellious children,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You make plans that are contrary to mine.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You make alliances not directed by my Spirit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: thus piling up your sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For without consulting me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have gone down to Egypt for help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have put your trust in Pharaoh’s protection.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have tried to hide in his shade.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But by trusting Pharaoh, you will be humiliated,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and by depending on him, you will be disgraced.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For though his power extends to Zoan
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his officials have arrived in Hanes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: all who trust in him will be ashamed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will not help you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Instead, he will disgrace you.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'This message came to me concerning the animals in the Negev:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The caravan moves slowly
- type: usfm
  marker: q2
  children:
  - type: text
    text: across the terrible desert to Egypt—
- type: usfm
  marker: q1
  children:
  - type: text
    text: donkeys weighed down with riches
- type: usfm
  marker: q2
  children:
  - type: text
    text: and camels loaded with treasure—
- type: usfm
  marker: q2
  children:
  - type: text
    text: all to pay for Egypt’s protection.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They travel through the wilderness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a place of lionesses and lions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a place where vipers and poisonous snakes live.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All this, and Egypt will give you nothing in return.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Egypt’s promises are worthless!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore, I call her Rahab—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Harmless Dragon.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Rahab who sits still. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rahab is the name of a mythical sea monster that represents chaos in ancient literature. The name is used here as a poetic name for Egypt.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Warning for Rebellious Judah
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Now go and write down these words.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Write them in a book.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will stand until the end of time
- type: usfm
  marker: q2
  children:
  - type: text
    text: as a witness
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: that these people are stubborn rebels
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'who refuse to pay attention to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They tell the seers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Stop seeing visions!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: They tell the prophets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Don’t tell us what is right.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell us nice things.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tell us lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Forget all this gloom.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Get off your narrow path.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Stop telling us about your
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Holy One of Israel.’”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'This is the reply of the Holy One of Israel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Because you despise what I tell you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and trust instead in oppression and lies,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: calamity will come upon you suddenly—
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a bulging wall that bursts and falls.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In an instant it will collapse
- type: usfm
  marker: q2
  children:
  - type: text
    text: and come crashing down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You will be smashed like a piece of pottery—
- type: usfm
  marker: q2
  children:
  - type: text
    text: shattered so completely that
- type: usfm
  marker: q1
  children:
  - type: text
    text: there won’t be a piece big enough
- type: usfm
  marker: q2
  children:
  - type: text
    text: to carry coals from a fireplace
- type: usfm
  marker: q2
  children:
  - type: text
    text: or a little water from the well.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the Holy One of Israel, says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Only in returning to me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and resting in me will you be saved.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In quietness and confidence is your strength.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But you would have none of it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You said, ‘No, we will get our help from Egypt.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will give us swift horses for riding into battle.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the only swiftness you are going to see
- type: usfm
  marker: q2
  children:
  - type: text
    text: is the swiftness of your enemies chasing you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: One of them will chase a thousand of you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Five of them will make all of you flee.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will be left like a lonely flagpole on a hill
- type: usfm
  marker: q2
  children:
  - type: text
    text: or a tattered banner on a distant mountaintop.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Blessings for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s People
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' must wait for you to come to him'
- type: usfm
  marker: q2
  children:
  - type: text
    text: so he can show you his love and compassion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is a faithful God.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Blessed are those who wait for his help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: O people of Zion, who live in Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will weep no more.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will be gracious if you ask for help.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will surely respond to the sound of your cries.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Though the Lord gave you adversity for food
- type: usfm
  marker: q2
  children:
  - type: text
    text: and suffering for drink,
- type: usfm
  marker: q1
  children:
  - type: text
    text: he will still be with you to teach you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You will see your teacher with your own eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Your own ears will hear him.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Right behind you a voice will say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “This is the way you should go,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: whether to the right or to the left.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then you will destroy all your silver idols
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your precious gold images.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will throw them out like filthy rags,
- type: usfm
  marker: q2
  children:
  - type: text
    text: saying to them, “Good riddance!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will bless you with rain at planting time. There will be wonderful harvests and plenty of pastureland for your livestock. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The oxen and donkeys that till the ground will eat good grain, its chaff blown away by the wind. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'In that day, when your enemies are slaughtered and the towers fall, there will be streams of water flowing down every mountain and hill. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The moon will be as bright as the sun, and the sun will be seven times brighter—like the light of seven days in one! So it will be when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' begins to heal his people and cure the wounds he gave them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Look! The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is coming from far away,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: burning with anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: surrounded by thick, rising smoke.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His lips are filled with fury;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his words consume like fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: His hot breath pours out like a flood
- type: usfm
  marker: q2
  children:
  - type: text
    text: up to the neck of his enemies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will sift out the proud nations for destruction.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will bridle them and lead them away to ruin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: But the people of God will sing a song of joy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the songs at the holy festivals.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will be filled with joy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as when a flutist leads a group of pilgrims
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'to Jerusalem, the mountain of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the Rock of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will make his majestic voice heard.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will display the strength of his mighty arm.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will descend with devouring flames,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with cloudbursts, thunderstorms, and huge hailstones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'At the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s command, the Assyrians will be shattered.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will strike them down with his royal scepter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' strikes them with his rod of punishment,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Hebrew manuscripts and Syriac version; Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: with the founded rod.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: his people will celebrate with tambourines and harps.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Lifting his mighty arm, he will fight the Assyrians.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Topheth—the place of burning—
- type: usfm
  marker: q2
  children:
  - type: text
    text: has long been ready for the Assyrian king;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the pyre is piled high with wood.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The breath of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', like fire from a volcano,'
