document_id: ISA.44,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “But now, listen to me, Jacob my servant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel my chosen one.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Who but a fool would make his own god—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an idol that cannot help him one bit?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: All who worship idols will be disgraced
  - type: usfm
    marker: q2
    children:
    - type: text
      text: along with all these craftsmen—mere humans—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who claim they can make a god.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They may all stand together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they will stand in terror and shame.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The blacksmith stands at his forge to make a sharp tool,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pounding and shaping it with all his might.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His work makes him hungry and weak.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It makes him thirsty and faint.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then the wood-carver measures a block of wood
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and draws a pattern on it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He works with chisel and plane
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and carves it into a human figure.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gives it human beauty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and puts it in a little shrine.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: He cuts down cedars;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he selects the cypress and the oak;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he plants the pine in the forest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to be nourished by the rain.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then he uses part of the wood to make a fire.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With it he warms himself and bakes his bread.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then—yes, it’s true—he takes the rest of it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and makes himself a god to worship!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes an idol
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bows down in front of it!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: He burns part of the tree to roast his meat
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to keep himself warm.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He says, “Ah, that fire feels good.”
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then he takes what’s left
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and makes his god: a carved idol!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He falls down in front of it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: worshiping and praying to it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Rescue me!” he says.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “You are my god!”
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Such stupidity and ignorance!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their eyes are closed, and they cannot see.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their minds are shut, and they cannot think.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The person who made the idol never stops to reflect,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Why, it’s just a block of wood!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I burned half of it for heat
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and used it to bake my bread and roast my meat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How can the rest of it be a god?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Should I bow down to worship a piece of wood?”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who made you and helps you says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not be afraid, O Jacob, my servant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O dear Israel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jeshurun, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a term of endearment for Israel.
      marker-yv: yv-n
    - type: text
      text: ' my chosen one.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The poor, deluded fool feeds on ashes.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He trusts something that can’t help him at all.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet he cannot bring himself to ask,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Is this idol that I’m holding in my hand a lie?”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Restoration for Jerusalem
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “Pay attention, O Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you are my servant, O Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', made you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will not forget you.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: I have swept away your sins like a cloud.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have scattered your offenses like the morning mist.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, return to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have paid the price to set you free.”
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Sing, O heavens, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done this wondrous thing.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shout for joy, O depths of the earth!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Break into song,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O mountains and forests and every tree!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has redeemed Jacob'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and is glorified in Israel.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'your Redeemer and Creator:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who made all things.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I alone stretched out the heavens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who was with me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I made the earth?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: I expose the false prophets as liars
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make fools of fortune-tellers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cause the wise to give bad advice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thus proving them to be fools.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: But I carry out the predictions of my prophets!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By them I say to Jerusalem, ‘People will live here again,’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and to the towns of Judah, ‘You will be rebuilt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will restore all your ruins!’
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: When I speak to the rivers and say, ‘Dry up!’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be dry.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: When I say of Cyrus, ‘He is my shepherd,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will certainly do as I say.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will command, ‘Rebuild Jerusalem’;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will say, ‘Restore the Temple.’”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For I will pour out water to quench your thirst
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to irrigate your parched fields.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will pour out my Spirit on your descendants,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my blessing on your children.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They will thrive like watered grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like willows on a riverbank.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Some will proudly claim, ‘I belong to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Others will say, ‘I am a descendant of Jacob.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Some will write the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s name on their hands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will take the name of Israel as their own.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Foolishness of Idols
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says—Israel’s King and Redeemer, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am the First and the Last;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no other God.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Who is like me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let him step forward and prove to you his power.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let him do as I have done since ancient times
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I established a people and explained its future.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Do not tremble; do not be afraid.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Did I not proclaim my purposes for you long ago?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are my witnesses—is there any other God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No! There is no other Rock—not one!”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: How foolish are those who manufacture idols.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: These prized objects are really worthless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people who worship idols don’t know this,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so they are all put to shame.
