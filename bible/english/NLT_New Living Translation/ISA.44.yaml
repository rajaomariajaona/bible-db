document_id: ISA.44,116
type_code: eng
verses:
  '1':
  - type: text
    content: “But now, listen to me, Jacob my servant,
  - type: text
    content: Israel my chosen one.
  '10':
  - type: text
    content: Who but a fool would make his own god—
  - type: text
    content: an idol that cannot help him one bit?
  '11':
  - type: text
    content: All who worship idols will be disgraced
  - type: text
    content: along with all these craftsmen—mere humans—
  - type: text
    content: who claim they can make a god.
  - type: text
    content: They may all stand together,
  - type: text
    content: but they will stand in terror and shame.
  '12':
  - type: text
    content: The blacksmith stands at his forge to make a sharp tool,
  - type: text
    content: pounding and shaping it with all his might.
  - type: text
    content: His work makes him hungry and weak.
  - type: text
    content: It makes him thirsty and faint.
  '13':
  - type: text
    content: Then the wood-carver measures a block of wood
  - type: text
    content: and draws a pattern on it.
  - type: text
    content: He works with chisel and plane
  - type: text
    content: and carves it into a human figure.
  - type: text
    content: He gives it human beauty
  - type: text
    content: and puts it in a little shrine.
  '14':
  - type: text
    content: He cuts down cedars;
  - type: text
    content: he selects the cypress and the oak;
  - type: text
    content: he plants the pine in the forest
  - type: text
    content: to be nourished by the rain.
  '15':
  - type: text
    content: Then he uses part of the wood to make a fire.
  - type: text
    content: With it he warms himself and bakes his bread.
  - type: text
    content: Then—yes, it’s true—he takes the rest of it
  - type: text
    content: and makes himself a god to worship!
  - type: text
    content: He makes an idol
  - type: text
    content: and bows down in front of it!
  '16':
  - type: text
    content: He burns part of the tree to roast his meat
  - type: text
    content: and to keep himself warm.
  - type: text
    content: He says, “Ah, that fire feels good.”
  '17':
  - type: text
    content: Then he takes what’s left
  - type: text
    content: 'and makes his god: a carved idol!'
  - type: text
    content: He falls down in front of it,
  - type: text
    content: worshiping and praying to it.
  - type: text
    content: “Rescue me!” he says.
  - type: text
    content: “You are my god!”
  '18':
  - type: text
    content: Such stupidity and ignorance!
  - type: text
    content: Their eyes are closed, and they cannot see.
  - type: text
    content: Their minds are shut, and they cannot think.
  '19':
  - type: text
    content: The person who made the idol never stops to reflect,
  - type: text
    content: “Why, it’s just a block of wood!
  - type: text
    content: I burned half of it for heat
  - type: text
    content: and used it to bake my bread and roast my meat.
  - type: text
    content: How can the rest of it be a god?
  - type: text
    content: Should I bow down to worship a piece of wood?”
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' who made you and helps you says:'
  - type: text
    content: Do not be afraid, O Jacob, my servant,
  - type: text
    content: O dear Israel,
  - type: note
    content: Hebrew Jeshurun, a term of endearment for Israel.
  - type: text
    content: ' my chosen one.'
  '20':
  - type: text
    content: The poor, deluded fool feeds on ashes.
  - type: text
    content: He trusts something that can’t help him at all.
  - type: text
    content: Yet he cannot bring himself to ask,
  - type: text
    content: “Is this idol that I’m holding in my hand a lie?”
  - type: heading
    content: Restoration for Jerusalem
  '21':
  - type: text
    content: “Pay attention, O Jacob,
  - type: text
    content: for you are my servant, O Israel.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', made you,'
  - type: text
    content: and I will not forget you.
  '22':
  - type: text
    content: I have swept away your sins like a cloud.
  - type: text
    content: I have scattered your offenses like the morning mist.
  - type: text
    content: Oh, return to me,
  - type: text
    content: for I have paid the price to set you free.”
  '23':
  - type: text
    content: 'Sing, O heavens, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has done this wondrous thing.'
  - type: text
    content: Shout for joy, O depths of the earth!
  - type: text
    content: Break into song,
  - type: text
    content: O mountains and forests and every tree!
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has redeemed Jacob'
  - type: text
    content: and is glorified in Israel.
  '24':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—'
  - type: text
    content: 'your Redeemer and Creator:'
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who made all things.'
  - type: text
    content: I alone stretched out the heavens.
  - type: text
    content: Who was with me
  - type: text
    content: when I made the earth?
  '25':
  - type: text
    content: I expose the false prophets as liars
  - type: text
    content: and make fools of fortune-tellers.
  - type: text
    content: I cause the wise to give bad advice,
  - type: text
    content: thus proving them to be fools.
  '26':
  - type: text
    content: But I carry out the predictions of my prophets!
  - type: text
    content: By them I say to Jerusalem, ‘People will live here again,’
  - type: text
    content: and to the towns of Judah, ‘You will be rebuilt;
  - type: text
    content: I will restore all your ruins!’
  '27':
  - type: text
    content: When I speak to the rivers and say, ‘Dry up!’
  - type: text
    content: they will be dry.
  '28':
  - type: text
    content: When I say of Cyrus, ‘He is my shepherd,’
  - type: text
    content: he will certainly do as I say.
  - type: text
    content: He will command, ‘Rebuild Jerusalem’;
  - type: text
    content: he will say, ‘Restore the Temple.’”
  '3':
  - type: text
    content: For I will pour out water to quench your thirst
  - type: text
    content: and to irrigate your parched fields.
  - type: text
    content: And I will pour out my Spirit on your descendants,
  - type: text
    content: and my blessing on your children.
  '4':
  - type: text
    content: They will thrive like watered grass,
  - type: text
    content: like willows on a riverbank.
  '5':
  - type: text
    content: 'Some will proudly claim, ‘I belong to the '
  - type: text
    content: Lord
  - type: text
    content: .’
  - type: text
    content: Others will say, ‘I am a descendant of Jacob.’
  - type: text
    content: 'Some will write the '
  - type: text
    content: Lord
  - type: text
    content: ’s name on their hands
  - type: text
    content: and will take the name of Israel as their own.”
  - type: heading
    content: The Foolishness of Idols
  '6':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—Israel’s King and Redeemer, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies:'
  - type: text
    content: “I am the First and the Last;
  - type: text
    content: there is no other God.
  '7':
  - type: text
    content: Who is like me?
  - type: text
    content: Let him step forward and prove to you his power.
  - type: text
    content: Let him do as I have done since ancient times
  - type: text
    content: when I established a people and explained its future.
  '8':
  - type: text
    content: Do not tremble; do not be afraid.
  - type: text
    content: Did I not proclaim my purposes for you long ago?
  - type: text
    content: You are my witnesses—is there any other God?
  - type: text
    content: No! There is no other Rock—not one!”
  '9':
  - type: text
    content: How foolish are those who manufacture idols.
  - type: text
    content: These prized objects are really worthless.
  - type: text
    content: The people who worship idols don’t know this,
  - type: text
    content: so they are all put to shame.
