document_id: HAB.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Habakkuk’s Prayer
  - type: text
    content: This prayer was sung by the prophet Habakkuk
  - type: note
    content: Hebrew adds according to shigionoth, probably indicating the musical setting for the prayer.
  - type: text
    content: ':'
  '10':
  - type: text
    content: The mountains watched and trembled.
  - type: text
    content: Onward swept the raging waters.
  - type: text
    content: The mighty deep cried out,
  - type: text
    content: lifting its hands in submission.
  '11':
  - type: text
    content: The sun and moon stood still in the sky
  - type: text
    content: as your brilliant arrows flew
  - type: text
    content: and your glittering spear flashed.
  '12':
  - type: text
    content: You marched across the land in anger
  - type: text
    content: and trampled the nations in your fury.
  '13':
  - type: text
    content: You went out to rescue your chosen people,
  - type: text
    content: to save your anointed ones.
  - type: text
    content: You crushed the heads of the wicked
  - type: text
    content: and stripped their bones from head to toe.
  '14':
  - type: text
    content: With his own weapons,
  - type: text
    content: you destroyed the chief of those
  - type: text
    content: who rushed out like a whirlwind,
  - type: text
    content: thinking Israel would be easy prey.
  '15':
  - type: text
    content: You trampled the sea with your horses,
  - type: text
    content: and the mighty waters piled high.
  '16':
  - type: text
    content: I trembled inside when I heard this;
  - type: text
    content: my lips quivered with fear.
  - type: text
    content: My legs gave way beneath me,
  - type: note
    content: Hebrew Decay entered my bones.
  - type: text
    content: and I shook in terror.
  - type: text
    content: I will wait quietly for the coming day
  - type: text
    content: when disaster will strike the people who invade us.
  '17':
  - type: text
    content: Even though the fig trees have no blossoms,
  - type: text
    content: and there are no grapes on the vines;
  - type: text
    content: even though the olive crop fails,
  - type: text
    content: and the fields lie empty and barren;
  - type: text
    content: even though the flocks die in the fields,
  - type: text
    content: and the cattle barns are empty,
  '18':
  - type: text
    content: 'yet I will rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: I will be joyful in the God of my salvation!
  '19':
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' is my strength!'
  - type: text
    content: He makes me as surefooted as a deer,
  - type: note
    content: Or He gives me the speed of a deer.
  - type: text
    content: able to tread upon the heights.
  - type: text
    content: '(For the choir director: This prayer is to be accompanied by stringed instruments.)'
  '2':
  - type: text
    content: 'I have heard all about you, '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: I am filled with awe by your amazing works.
  - type: text
    content: In this time of our deep need,
  - type: text
    content: help us again as you did in years gone by.
  - type: text
    content: And in your anger,
  - type: text
    content: remember your mercy.
  '3':
  - type: text
    content: I see God moving across the deserts from Edom,
  - type: note
    content: Hebrew Teman.
  - type: text
    content: the Holy One coming from Mount Paran.
  - type: note
    content: Hebrew adds selah; also in 3:9, 13. The meaning of this Hebrew term is uncertain; it is probably a musical or literary term.
  - type: text
    content: His brilliant splendor fills the heavens,
  - type: text
    content: and the earth is filled with his praise.
  '4':
  - type: text
    content: His coming is as brilliant as the sunrise.
  - type: text
    content: Rays of light flash from his hands,
  - type: text
    content: where his awesome power is hidden.
  '5':
  - type: text
    content: Pestilence marches before him;
  - type: text
    content: plague follows close behind.
  '6':
  - type: text
    content: When he stops, the earth shakes.
  - type: text
    content: When he looks, the nations tremble.
  - type: text
    content: He shatters the everlasting mountains
  - type: text
    content: and levels the eternal hills.
  - type: text
    content: He is the Eternal One!
  - type: note
    content: Or The ancient paths belong to him.
  '7':
  - type: text
    content: I see the people of Cushan in distress,
  - type: text
    content: and the nation of Midian trembling in terror.
  '8':
  - type: text
    content: 'Was it in anger, '
  - type: text
    content: Lord
  - type: text
    content: ', that you struck the rivers'
  - type: text
    content: and parted the sea?
  - type: text
    content: Were you displeased with them?
  - type: text
    content: No, you were sending your chariots of salvation!
  '9':
  - type: text
    content: You brandished your bow
  - type: text
    content: and your quiver of arrows.
  - type: text
    content: You split open the earth with flowing rivers.
