document_id: HAB.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Habakkuk’s Prayer
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: This prayer was sung by the prophet Habakkuk
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew adds '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'according to shigionoth, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: probably indicating the musical setting for the prayer.
      marker-yv: yv-n
    - type: text
      text: ':'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mountains watched and trembled.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Onward swept the raging waters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mighty deep cried out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lifting its hands in submission.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun and moon stood still in the sky
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as your brilliant arrows flew
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your glittering spear flashed.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You marched across the land in anger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and trampled the nations in your fury.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You went out to rescue your chosen people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to save your anointed ones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You crushed the heads of the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stripped their bones from head to toe.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With his own weapons,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you destroyed the chief of those
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who rushed out like a whirlwind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thinking Israel would be easy prey.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You trampled the sea with your horses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the mighty waters piled high.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I trembled inside when I heard this;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my lips quivered with fear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My legs gave way beneath me,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Decay entered my bones.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I shook in terror.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will wait quietly for the coming day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when disaster will strike the people who invade us.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even though the fig trees have no blossoms,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there are no grapes on the vines;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even though the olive crop fails,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the fields lie empty and barren;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even though the flocks die in the fields,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the cattle barns are empty,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'yet I will rejoice in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will be joyful in the God of my salvation!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my strength!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He makes me as surefooted as a deer,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He gives me the speed of a deer.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: able to tread upon the heights.
  - type: usfm
    marker: m
    children:
    - type: text
      text: '(For the choir director: This prayer is to be accompanied by stringed instruments.)'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have heard all about you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am filled with awe by your amazing works.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In this time of our deep need,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: help us again as you did in years gone by.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in your anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: remember your mercy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I see God moving across the deserts from Edom,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Teman.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Holy One coming from Mount Paran.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew adds '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'selah; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 3:9, 13. The meaning of this Hebrew term is uncertain; it is probably a musical or literary term.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His brilliant splendor fills the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the earth is filled with his praise.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His coming is as brilliant as the sunrise.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rays of light flash from his hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where his awesome power is hidden.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pestilence marches before him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: plague follows close behind.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he stops, the earth shakes.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When he looks, the nations tremble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shatters the everlasting mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and levels the eternal hills.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is the Eternal One!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The ancient paths belong to him.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I see the people of Cushan in distress,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the nation of Midian trembling in terror.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Was it in anger, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', that you struck the rivers'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and parted the sea?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Were you displeased with them?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No, you were sending your chariots of salvation!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You brandished your bow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your quiver of arrows.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You split open the earth with flowing rivers.
