document_id: JER.8,116
type_code: eng
verses:
  '1':
  - type: text
    content: '“In that day,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “the enemy will break open the graves of the kings and officials of Judah, and the graves of the priests, prophets, and common people of Jerusalem. '
  '10':
  - type: text
    content: I will give their wives to others
  - type: text
    content: and their farms to strangers.
  - type: text
    content: From the least to the greatest,
  - type: text
    content: their lives are ruled by greed.
  - type: text
    content: Yes, even my prophets and priests are like that.
  - type: text
    content: They are all frauds.
  '11':
  - type: text
    content: They offer superficial treatments
  - type: text
    content: for my people’s mortal wound.
  - type: text
    content: They give assurances of peace
  - type: text
    content: when there is no peace.
  '12':
  - type: text
    content: Are they ashamed of these disgusting actions?
  - type: text
    content: Not at all—they don’t even know how to blush!
  - type: text
    content: Therefore, they will lie among the slaughtered.
  - type: text
    content: They will be brought down when I punish them,
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: I will surely consume them.
  - type: text
    content: There will be no more harvests of figs and grapes.
  - type: text
    content: Their fruit trees will all die.
  - type: text
    content: Whatever I gave them will soon be gone.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!’'
  '14':
  - type: text
    content: “Then the people will say,
  - type: text
    content: ‘Why should we wait here to die?
  - type: text
    content: Come, let’s go to the fortified towns and die there.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' our God has decreed our destruction'
  - type: text
    content: and has given us a cup of poison to drink
  - type: text
    content: 'because we sinned against the '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: We hoped for peace, but no peace came.
  - type: text
    content: We hoped for a time of healing, but found only terror.’
  '16':
  - type: text
    content: “The snorting of the enemies’ warhorses can be heard
  - type: text
    content: all the way from the land of Dan in the north!
  - type: text
    content: The neighing of their stallions makes the whole land tremble.
  - type: text
    content: They are coming to devour the land and everything in it—
  - type: text
    content: cities and people alike.
  '17':
  - type: text
    content: I will send these enemy troops among you
  - type: text
    content: like poisonous snakes you cannot charm.
  - type: text
    content: They will bite you, and you will die.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  - type: heading
    content: Jeremiah Weeps for Sinful Judah
  '18':
  - type: text
    content: My grief is beyond healing;
  - type: text
    content: my heart is broken.
  '19':
  - type: text
    content: Listen to the weeping of my people;
  - type: text
    content: it can be heard all across the land.
  - type: text
    content: '“Has the '
  - type: text
    content: Lord
  - type: text
    content: ' abandoned Jerusalem?'
  - type: note
    content: Hebrew Zion?
  - type: text
    content: ” the people ask.
  - type: text
    content: “Is her King no longer there?”
  - type: text
    content: “Oh, why have they provoked my anger with their carved idols
  - type: text
    content: 'and their worthless foreign gods?” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: 'They will spread out their bones on the ground before the sun, moon, and stars—the gods my people have loved, served, and worshiped. Their bones will not be gathered up again or buried but will be scattered on the ground like manure. '
  '20':
  - type: text
    content: “The harvest is finished,
  - type: text
    content: and the summer is gone,” the people cry,
  - type: text
    content: “yet we are not saved!”
  '21':
  - type: text
    content: I hurt with the hurt of my people.
  - type: text
    content: I mourn and am overcome with grief.
  '22':
  - type: text
    content: Is there no medicine in Gilead?
  - type: text
    content: Is there no physician there?
  - type: text
    content: Why is there no healing
  - type: text
    content: for the wounds of my people?
  '3':
  - type: text
    content: 'And the people of this evil nation who survive will wish to die rather than live where I will send them. I, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies, have spoken!'
  - type: heading
    content: Deception by False Prophets
  '4':
  - type: text
    content: '“Jeremiah, say to the people, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “‘When people fall down, don’t they get up again?
  - type: text
    content: When they discover they’re on the wrong road, don’t they turn back?
  '5':
  - type: text
    content: Then why do these people stay on their self-destructive path?
  - type: text
    content: Why do the people of Jerusalem refuse to turn back?
  - type: text
    content: They cling tightly to their lies
  - type: text
    content: and will not turn around.
  '6':
  - type: text
    content: I listen to their conversations
  - type: text
    content: and don’t hear a word of truth.
  - type: text
    content: Is anyone sorry for doing wrong?
  - type: text
    content: Does anyone say, “What a terrible thing I have done”?
  - type: text
    content: No! All are running down the path of sin
  - type: text
    content: as swiftly as a horse galloping into battle!
  '7':
  - type: text
    content: Even the stork that flies across the sky
  - type: text
    content: knows the time of her migration,
  - type: text
    content: as do the turtledove, the swallow, and the crane.
  - type: note
    content: The identification of some of these birds is uncertain.
  - type: text
    content: They all return at the proper time each year.
  - type: text
    content: But not my people!
  - type: text
    content: 'They do not know the '
  - type: text
    content: Lord
  - type: text
    content: ’s laws.
  '8':
  - type: text
    content: '“‘How can you say, “We are wise because we have the word of the '
  - type: text
    content: Lord
  - type: text
    content: ',”'
  - type: text
    content: when your teachers have twisted it by writing lies?
  '9':
  - type: text
    content: These wise teachers will fall
  - type: text
    content: into the trap of their own foolishness,
  - type: text
    content: 'for they have rejected the word of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Are they so wise after all?
