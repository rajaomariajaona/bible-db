document_id: JER.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“In that day,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “the enemy will break open the graves of the kings and officials of Judah, and the graves of the priests, prophets, and common people of Jerusalem. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I will give their wives to others
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their farms to strangers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the least to the greatest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their lives are ruled by greed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, even my prophets and priests are like that.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are all frauds.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They offer superficial treatments
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my people’s mortal wound.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They give assurances of peace
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when there is no peace.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Are they ashamed of these disgusting actions?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Not at all—they don’t even know how to blush!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, they will lie among the slaughtered.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be brought down when I punish them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I will surely consume them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There will be no more harvests of figs and grapes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their fruit trees will all die.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whatever I gave them will soon be gone.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!’'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Then the people will say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Why should we wait here to die?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, let’s go to the fortified towns and die there.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God has decreed our destruction'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and has given us a cup of poison to drink
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because we sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: We hoped for peace, but no peace came.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We hoped for a time of healing, but found only terror.’
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “The snorting of the enemies’ warhorses can be heard
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the way from the land of Dan in the north!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The neighing of their stallions makes the whole land tremble.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are coming to devour the land and everything in it—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cities and people alike.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I will send these enemy troops among you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like poisonous snakes you cannot charm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will bite you, and you will die.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have spoken!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah Weeps for Sinful Judah
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: My grief is beyond healing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my heart is broken.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Listen to the weeping of my people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it can be heard all across the land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Has the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' abandoned Jerusalem?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zion?
      marker-yv: yv-n
    - type: text
      text: ” the people ask.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Is her King no longer there?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Oh, why have they provoked my anger with their carved idols
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and their worthless foreign gods?” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'They will spread out their bones on the ground before the sun, moon, and stars—the gods my people have loved, served, and worshiped. Their bones will not be gathered up again or buried but will be scattered on the ground like manure. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “The harvest is finished,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the summer is gone,” the people cry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “yet we are not saved!”
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: I hurt with the hurt of my people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I mourn and am overcome with grief.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Is there no medicine in Gilead?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is there no physician there?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why is there no healing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the wounds of my people?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the people of this evil nation who survive will wish to die rather than live where I will send them. I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies, have spoken!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Deception by False Prophets
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“Jeremiah, say to the people, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘When people fall down, don’t they get up again?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When they discover they’re on the wrong road, don’t they turn back?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then why do these people stay on their self-destructive path?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do the people of Jerusalem refuse to turn back?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They cling tightly to their lies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will not turn around.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I listen to their conversations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and don’t hear a word of truth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is anyone sorry for doing wrong?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Does anyone say, “What a terrible thing I have done”?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No! All are running down the path of sin
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as swiftly as a horse galloping into battle!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Even the stork that flies across the sky
  - type: usfm
    marker: q2
    children:
    - type: text
      text: knows the time of her migration,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as do the turtledove, the swallow, and the crane.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The identification of some of these birds is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They all return at the proper time each year.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But not my people!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They do not know the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s laws.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“‘How can you say, “We are wise because we have the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ',”'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when your teachers have twisted it by writing lies?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: These wise teachers will fall
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into the trap of their own foolishness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for they have rejected the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Are they so wise after all?
