document_id: REV.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Lamb and the 144,000
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then I saw the Lamb standing on Mount Zion, and with him were 144,000 who had his name and his Father’s name written on their foreheads. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And I heard a sound from heaven like the roar of mighty ocean waves or the rolling of loud thunder. It was like the sound of many harpists playing together.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'This great choir sang a wonderful new song in front of the throne of God and before the four living beings and the twenty-four elders. No one could learn this song except the 144,000 who had been redeemed from the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They have kept themselves as pure as virgins,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:4a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: They are virgins who have not defiled themselves with women.
    marker-yv: yv-n
  - type: text
    text: ' following the Lamb wherever he goes. They have been purchased from among the people on the earth as a special offering'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:4b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: as firstfruits.
    marker-yv: yv-n
  - type: text
    text: ' to God and to the Lamb. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They have told no lies; they are without blame.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Three Angels
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And I saw another angel flying through the sky, carrying the eternal Good News to proclaim to the people who belong to this world—to every nation, tribe, language, and people. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Fear God,” he shouted. “Give glory to him. For the time has come when he will sit as judge. Worship him who made the heavens, the earth, the sea, and all the springs of water.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then another angel followed him through the sky, shouting, “Babylon is fallen—that great city is fallen—because she made all the nations of the world drink the wine of her passionate immorality.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then a third angel followed them, shouting, “Anyone who worships the beast and his statue or who accepts his mark on the forehead or on the hand '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'must drink the wine of God’s anger. It has been poured full strength into God’s cup of wrath. And they will be tormented with fire and burning sulfur in the presence of the holy angels and the Lamb. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The smoke of their torment will rise forever and ever, and they will have no relief day or night, for they have worshiped the beast and his statue and have accepted the mark of his name.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: This means that God’s holy people must endure persecution patiently, obeying his commands and maintaining their faith in Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And I heard a voice from heaven saying, “Write this down: Blessed are those who die in the Lord from now on. Yes, says the Spirit, they are blessed indeed, for they will rest from their hard work; for their good deeds follow them!”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Harvest of the Earth
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then I saw a white cloud, and seated on the cloud was someone like the Son of Man.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'like a son of man. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Dan 7:13. “Son of Man” is a title Jesus used for himself.
    marker-yv: yv-n
  - type: text
    text: ' He had a gold crown on his head and a sharp sickle in his hand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then another angel came from the Temple and shouted to the one sitting on the cloud, “Swing the sickle, for the time of harvest has come; the crop on earth is ripe.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So the one sitting on the cloud swung his sickle over the earth, and the whole earth was harvested.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'After that, another angel came from the Temple in heaven, and he also had a sharp sickle. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then another angel, who had power to destroy with fire, came from the altar. He shouted to the angel with the sharp sickle, “Swing your sickle now to gather the clusters of grapes from the vines of the earth, for they are ripe for judgment.” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So the angel swung his sickle over the earth and loaded the grapes into the great winepress of God’s wrath. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The grapes were trampled in the winepress outside the city, and blood flowed from the winepress in a stream about 180 miles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1,600 stadia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[300 kilometers].'
    marker-yv: yv-n
  - type: text
    text: ' long and as high as a horse’s bridle.'
