document_id: JOB.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Job’s Fifth Speech: A Response to Eliphaz'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Job spoke again:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I have heard all this before.
- type: usfm
  marker: q2
  children:
  - type: text
    text: What miserable comforters you are!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Won’t you ever stop blowing hot air?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What makes you keep on talking?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I could say the same things if you were in my place.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I could spout off criticism and shake my head at you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But if it were me, I would encourage you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would try to take away your grief.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Instead, I suffer if I defend myself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I suffer no less if I refuse to speak.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “O God, you have ground me down
- type: usfm
  marker: q2
  children:
  - type: text
    text: and devastated my family.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: As if to prove I have sinned, you’ve reduced me to skin and bones.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My gaunt flesh testifies against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: God hates me and angrily tears me apart.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He snaps his teeth at me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pierces me with his eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: People jeer and laugh at me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They slap my cheek in contempt.
- type: usfm
  marker: q2
  children:
  - type: text
    text: A mob gathers against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: God has handed me over to sinners.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has tossed me into the hands of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “I was living quietly until he shattered me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He took me by the neck and broke me in pieces.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then he set me up as his target,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: and now his archers surround me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His arrows pierce me without mercy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The ground is wet with my blood.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: my gall.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Again and again he smashes against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: charging at me like a warrior.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I wear burlap to show my grief.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My pride lies in the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: My eyes are red with weeping;
- type: usfm
  marker: q2
  children:
  - type: text
    text: dark shadows circle my eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Yet I have done no wrong,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my prayer is pure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “O earth, do not conceal my blood.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let it cry out on my behalf.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Even now my witness is in heaven.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My advocate is there on high.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: My friends scorn me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I pour out my tears to God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I need someone to mediate between God and me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as a person mediates between friends.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For soon I must go down that road
- type: usfm
  marker: q2
  children:
  - type: text
    text: from which I will never return.
