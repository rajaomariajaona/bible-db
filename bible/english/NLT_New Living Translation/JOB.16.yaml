document_id: JOB.16,116
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Job’s Fifth Speech: A Response to Eliphaz'
  - type: text
    content: 'Then Job spoke again:'
  '10':
  - type: text
    content: People jeer and laugh at me.
  - type: text
    content: They slap my cheek in contempt.
  - type: text
    content: A mob gathers against me.
  '11':
  - type: text
    content: God has handed me over to sinners.
  - type: text
    content: He has tossed me into the hands of the wicked.
  '12':
  - type: text
    content: “I was living quietly until he shattered me.
  - type: text
    content: He took me by the neck and broke me in pieces.
  - type: text
    content: Then he set me up as his target,
  '13':
  - type: text
    content: and now his archers surround me.
  - type: text
    content: His arrows pierce me without mercy.
  - type: text
    content: The ground is wet with my blood.
  - type: note
    content: Hebrew my gall.
  '14':
  - type: text
    content: Again and again he smashes against me,
  - type: text
    content: charging at me like a warrior.
  '15':
  - type: text
    content: I wear burlap to show my grief.
  - type: text
    content: My pride lies in the dust.
  '16':
  - type: text
    content: My eyes are red with weeping;
  - type: text
    content: dark shadows circle my eyes.
  '17':
  - type: text
    content: Yet I have done no wrong,
  - type: text
    content: and my prayer is pure.
  '18':
  - type: text
    content: “O earth, do not conceal my blood.
  - type: text
    content: Let it cry out on my behalf.
  '19':
  - type: text
    content: Even now my witness is in heaven.
  - type: text
    content: My advocate is there on high.
  '2':
  - type: text
    content: “I have heard all this before.
  - type: text
    content: What miserable comforters you are!
  '20':
  - type: text
    content: My friends scorn me,
  - type: text
    content: but I pour out my tears to God.
  '21':
  - type: text
    content: I need someone to mediate between God and me,
  - type: text
    content: as a person mediates between friends.
  '22':
  - type: text
    content: For soon I must go down that road
  - type: text
    content: from which I will never return.
  '3':
  - type: text
    content: Won’t you ever stop blowing hot air?
  - type: text
    content: What makes you keep on talking?
  '4':
  - type: text
    content: I could say the same things if you were in my place.
  - type: text
    content: I could spout off criticism and shake my head at you.
  '5':
  - type: text
    content: But if it were me, I would encourage you.
  - type: text
    content: I would try to take away your grief.
  '6':
  - type: text
    content: Instead, I suffer if I defend myself,
  - type: text
    content: and I suffer no less if I refuse to speak.
  '7':
  - type: text
    content: “O God, you have ground me down
  - type: text
    content: and devastated my family.
  '8':
  - type: text
    content: As if to prove I have sinned, you’ve reduced me to skin and bones.
  - type: text
    content: My gaunt flesh testifies against me.
  '9':
  - type: text
    content: God hates me and angrily tears me apart.
  - type: text
    content: He snaps his teeth at me
  - type: text
    content: and pierces me with his eyes.
