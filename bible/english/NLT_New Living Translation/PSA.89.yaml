document_id: PSA.89,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89:TITLE '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maskil. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may be a literary or musical term.
      marker-yv: yv-n
    - type: text
      text: ' of Ethan the Ezrahite.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will sing of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s unfailing love forever!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Young and old will hear of your faithfulness.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You crushed the great sea monster.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Rahab, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: the name of a mythical sea monster that represents chaos in ancient literature.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You scattered your enemies with your mighty arm.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The heavens are yours, and the earth is yours;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everything in the world is yours—you created it all.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You created north and south.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Mount Tabor and Mount Hermon praise your name.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Powerful is your arm!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Strong is your hand!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your right hand is lifted high in glorious strength.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Righteousness and justice are the foundation of your throne.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Unfailing love and truth walk before you as attendants.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Happy are those who hear the joyful call to worship,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for they will walk in the light of your presence, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They rejoice all day long in your wonderful reputation.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They exult in your righteousness.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are their glorious strength.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It pleases you to make us strong.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, our protection comes from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he, the Holy One of Israel, has given us our king.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Long ago you spoke in a vision to your faithful people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You said, “I have raised up a warrior.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have selected him from the common people to be king.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your unfailing love will last forever.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your faithfulness is as enduring as the heavens.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have found my servant David.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have anointed him with my holy oil.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will steady him with my hand;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with my powerful arm I will make him strong.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His enemies will not defeat him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor will the wicked overpower him.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will beat down his adversaries before him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroy those who hate him.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My faithfulness and unfailing love will be with him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and by my authority he will grow in power.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will extend his rule over the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his dominion over the rivers.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he will call out to me, ‘You are my Father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my God, and the Rock of my salvation.’
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make him my firstborn son,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the mightiest king on earth.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will love him and be kind to him forever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my covenant with him will never end.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will preserve an heir for him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his throne will be as endless as the days of heaven.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “I have made a covenant with David, my chosen servant.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I have sworn this oath to him:'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if his descendants forsake my instructions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fail to obey my regulations,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: if they do not obey my decrees
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fail to keep my commands,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then I will punish their sin with the rod,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their disobedience with beating.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I will never stop loving him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor fail to keep my promise to him.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No, I will not break my covenant;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not take back a single word I said.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have sworn an oath to David,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and in my holiness I cannot lie:'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His dynasty will go on forever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his kingdom will endure as the sun.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be as eternal as the moon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'my faithful witness in the sky!” '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But now you have rejected him and cast him off.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are angry with your anointed king.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have renounced your covenant with him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have thrown his crown in the dust.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘I will establish your descendants as kings forever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'they will sit on your throne from now until eternity.’” '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have broken down the walls protecting him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ruined every fort defending him.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone who comes along has robbed him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he has become a joke to his neighbors.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have strengthened his enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made them all rejoice.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have made his sword useless
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and refused to help him in battle.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have ended his splendor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and overturned his throne.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have made him old before his time
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and publicly disgraced him. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', how long will this go on?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you hide yourself forever?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will your anger burn like fire?
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember how short my life is,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how empty and futile this human existence!
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one can live forever; all will die.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one can escape the power of the grave.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89:48 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of Sheol.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, where is your unfailing love?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You promised it to David with a faithful pledge.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All heaven will praise your great wonders, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: myriads of angels will praise you for your faithfulness.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Consider, Lord, how your servants are disgraced!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I carry in my heart the insults of so many people.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your enemies have mocked me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they mock your anointed king wherever he goes.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' forever!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Amen and amen!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For who in all of heaven can compare with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'What mightiest angel is anything like the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The highest angelic powers stand in awe of God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is far more awesome than all who surround his throne.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Heaven’s Armies!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Where is there anyone as mighty as you, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are entirely faithful.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You rule the oceans.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You subdue their storm-tossed waves.
