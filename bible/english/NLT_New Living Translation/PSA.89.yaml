document_id: PSA.89,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm
  - type: note
    content: Hebrew maskil. This may be a literary or musical term.
  - type: text
    content: ' of Ethan the Ezrahite.'
  - type: text
    content: 'I will sing of the '
  - type: text
    content: Lord
  - type: text
    content: ’s unfailing love forever!
  - type: text
    content: Young and old will hear of your faithfulness.
  '10':
  - type: text
    content: You crushed the great sea monster.
  - type: note
    content: Hebrew Rahab, the name of a mythical sea monster that represents chaos in ancient literature.
  - type: text
    content: You scattered your enemies with your mighty arm.
  '11':
  - type: text
    content: The heavens are yours, and the earth is yours;
  - type: text
    content: everything in the world is yours—you created it all.
  '12':
  - type: text
    content: You created north and south.
  - type: text
    content: Mount Tabor and Mount Hermon praise your name.
  '13':
  - type: text
    content: Powerful is your arm!
  - type: text
    content: Strong is your hand!
  - type: text
    content: Your right hand is lifted high in glorious strength.
  '14':
  - type: text
    content: Righteousness and justice are the foundation of your throne.
  - type: text
    content: Unfailing love and truth walk before you as attendants.
  '15':
  - type: text
    content: Happy are those who hear the joyful call to worship,
  - type: text
    content: 'for they will walk in the light of your presence, '
  - type: text
    content: Lord
  - type: text
    content: .
  '16':
  - type: text
    content: They rejoice all day long in your wonderful reputation.
  - type: text
    content: They exult in your righteousness.
  '17':
  - type: text
    content: You are their glorious strength.
  - type: text
    content: It pleases you to make us strong.
  '18':
  - type: text
    content: 'Yes, our protection comes from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and he, the Holy One of Israel, has given us our king.
  '19':
  - type: text
    content: Long ago you spoke in a vision to your faithful people.
  - type: text
    content: You said, “I have raised up a warrior.
  - type: text
    content: I have selected him from the common people to be king.
  '2':
  - type: text
    content: Your unfailing love will last forever.
  - type: text
    content: Your faithfulness is as enduring as the heavens.
  '20':
  - type: text
    content: I have found my servant David.
  - type: text
    content: I have anointed him with my holy oil.
  '21':
  - type: text
    content: I will steady him with my hand;
  - type: text
    content: with my powerful arm I will make him strong.
  '22':
  - type: text
    content: His enemies will not defeat him,
  - type: text
    content: nor will the wicked overpower him.
  '23':
  - type: text
    content: I will beat down his adversaries before him
  - type: text
    content: and destroy those who hate him.
  '24':
  - type: text
    content: My faithfulness and unfailing love will be with him,
  - type: text
    content: and by my authority he will grow in power.
  '25':
  - type: text
    content: I will extend his rule over the sea,
  - type: text
    content: his dominion over the rivers.
  '26':
  - type: text
    content: And he will call out to me, ‘You are my Father,
  - type: text
    content: my God, and the Rock of my salvation.’
  '27':
  - type: text
    content: I will make him my firstborn son,
  - type: text
    content: the mightiest king on earth.
  '28':
  - type: text
    content: I will love him and be kind to him forever;
  - type: text
    content: my covenant with him will never end.
  '29':
  - type: text
    content: I will preserve an heir for him;
  - type: text
    content: his throne will be as endless as the days of heaven.
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “I have made a covenant with David, my chosen servant.'
  - type: text
    content: 'I have sworn this oath to him:'
  '30':
  - type: text
    content: But if his descendants forsake my instructions
  - type: text
    content: and fail to obey my regulations,
  '31':
  - type: text
    content: if they do not obey my decrees
  - type: text
    content: and fail to keep my commands,
  '32':
  - type: text
    content: then I will punish their sin with the rod,
  - type: text
    content: and their disobedience with beating.
  '33':
  - type: text
    content: But I will never stop loving him
  - type: text
    content: nor fail to keep my promise to him.
  '34':
  - type: text
    content: No, I will not break my covenant;
  - type: text
    content: I will not take back a single word I said.
  '35':
  - type: text
    content: I have sworn an oath to David,
  - type: text
    content: 'and in my holiness I cannot lie:'
  '36':
  - type: text
    content: His dynasty will go on forever;
  - type: text
    content: his kingdom will endure as the sun.
  '37':
  - type: text
    content: It will be as eternal as the moon,
  - type: text
    content: 'my faithful witness in the sky!” '
  - type: text
    content: Interlude
  '38':
  - type: text
    content: But now you have rejected him and cast him off.
  - type: text
    content: You are angry with your anointed king.
  '39':
  - type: text
    content: You have renounced your covenant with him;
  - type: text
    content: you have thrown his crown in the dust.
  '4':
  - type: text
    content: ‘I will establish your descendants as kings forever;
  - type: text
    content: 'they will sit on your throne from now until eternity.’” '
  - type: text
    content: Interlude
  '40':
  - type: text
    content: You have broken down the walls protecting him
  - type: text
    content: and ruined every fort defending him.
  '41':
  - type: text
    content: Everyone who comes along has robbed him,
  - type: text
    content: and he has become a joke to his neighbors.
  '42':
  - type: text
    content: You have strengthened his enemies
  - type: text
    content: and made them all rejoice.
  '43':
  - type: text
    content: You have made his sword useless
  - type: text
    content: and refused to help him in battle.
  '44':
  - type: text
    content: You have ended his splendor
  - type: text
    content: and overturned his throne.
  '45':
  - type: text
    content: You have made him old before his time
  - type: text
    content: 'and publicly disgraced him. '
  - type: text
    content: Interlude
  '46':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', how long will this go on?'
  - type: text
    content: Will you hide yourself forever?
  - type: text
    content: How long will your anger burn like fire?
  '47':
  - type: text
    content: Remember how short my life is,
  - type: text
    content: how empty and futile this human existence!
  '48':
  - type: text
    content: No one can live forever; all will die.
  - type: text
    content: No one can escape the power of the grave.
  - type: note
    content: Hebrew of Sheol.
  - type: text
    content: ' '
  - type: text
    content: Interlude
  '49':
  - type: text
    content: Lord, where is your unfailing love?
  - type: text
    content: You promised it to David with a faithful pledge.
  '5':
  - type: text
    content: 'All heaven will praise your great wonders, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: myriads of angels will praise you for your faithfulness.
  '50':
  - type: text
    content: Consider, Lord, how your servants are disgraced!
  - type: text
    content: I carry in my heart the insults of so many people.
  '51':
  - type: text
    content: 'Your enemies have mocked me, O '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: they mock your anointed king wherever he goes.
  '52':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ' forever!'
  - type: text
    content: Amen and amen!
  '6':
  - type: text
    content: 'For who in all of heaven can compare with the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: 'What mightiest angel is anything like the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  '7':
  - type: text
    content: The highest angelic powers stand in awe of God.
  - type: text
    content: He is far more awesome than all who surround his throne.
  '8':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' God of Heaven’s Armies!'
  - type: text
    content: 'Where is there anyone as mighty as you, O '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: You are entirely faithful.
  '9':
  - type: text
    content: You rule the oceans.
  - type: text
    content: You subdue their storm-tossed waves.
