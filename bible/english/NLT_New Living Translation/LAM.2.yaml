document_id: LAM.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Anger at Sin
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord in his anger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has cast a dark shadow over beautiful Jerusalem.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the daughter of Zion; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 2:8, 10, 18.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fairest of Israel’s cities lies in the dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thrown down from the heights of heaven.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In his day of great anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Lord has shown no mercy even to his Temple.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his footstool.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The leaders of beautiful Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sit on the ground in silence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are clothed in burlap
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and throw dust on their heads.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The young women of Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hang their heads in shame.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have cried until the tears no longer come;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my heart is broken.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My spirit is poured out in agony
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as I see the desperate plight of my people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Little children and tiny babies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are fainting and dying in the streets.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They cry out to their mothers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “We need food and drink!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their lives ebb away in the streets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like the life of a warrior wounded in battle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They gasp for life
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they collapse in their mothers’ arms.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What can I say about you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who has ever seen such sorrow?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O daughter of Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to what can I compare your anguish?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O virgin daughter of Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how can I comfort you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your wound is as deep as the sea.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can heal you?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your prophets have said
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so many foolish things, false to the core.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They did not save you from exile
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by pointing out your sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead, they painted false pictures,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: filling you with false hope.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who pass by jeer at you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They scoff and insult beautiful Jerusalem,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the daughter of Jerusalem.
      marker-yv: yv-n
    - type: text
      text: ' saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Is this the city called ‘Most Beautiful in All the World’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ‘Joy of All the Earth’?”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All your enemies mock you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They scoff and snarl and say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “We have destroyed her at last!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We have long waited for this day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and it is finally here!”
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But it is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who did just as he planned.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has fulfilled the promises of disaster
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he made long ago.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has destroyed Jerusalem without mercy.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has caused her enemies to gloat over her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and has given them power over her.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cry aloud
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Their heart cried.
      marker-yv: yv-n
    - type: text
      text: ' before the Lord,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O walls of beautiful Jerusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let your tears flow like a river
  - type: usfm
    marker: q2
    children:
    - type: text
      text: day and night.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give yourselves no rest;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: give your eyes no relief.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rise during the night and cry out.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pour out your hearts like water to the Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lift up your hands to him in prayer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pleading for your children,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for in every street
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are faint with hunger.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Without mercy the Lord has destroyed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every home in Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:2a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jacob; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 2:3b. See note on 1:17.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In his anger he has broken down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the fortress walls of beautiful Jerusalem.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:2b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the daughter of Judah; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 2:5.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has brought them to the ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dishonoring the kingdom and its rulers.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', think about this!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Should you treat your own people this way?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should mothers eat their own children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those they once bounced on their knees?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should priests and prophets be killed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: within the Lord’s Temple?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See them lying in the streets—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: young and old,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: boys and girls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: killed by the swords of the enemy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have killed them in your anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: slaughtering them without mercy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You have invited terrors from all around,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as though you were calling them to a day of feasting.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one has escaped or survived.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The enemy has killed all the children
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whom I carried and raised.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the strength of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: vanishes beneath his fierce anger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord has withdrawn his protection
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the enemy attacks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He consumes the whole land of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a raging fire.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He bends his bow against his people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as though he were their enemy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His strength is used against them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to kill their finest youth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His fury is poured out like fire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on beautiful Jerusalem.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on the tent of the daughter of Zion.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, the Lord has vanquished Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like an enemy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has destroyed her palaces
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and demolished her fortresses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has brought unending sorrow and tears
  - type: usfm
    marker: q2
    children:
    - type: text
      text: upon beautiful Jerusalem.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has broken down his Temple
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as though it were merely a garden shelter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has blotted out all memory'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of the holy festivals and Sabbath days.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kings and priests fall together
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before his fierce anger.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord has rejected his own altar;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he despises his own sanctuary.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has given Jerusalem’s palaces
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to her enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They shout in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Temple
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as though it were a day of celebration.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was determined'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to destroy the walls of beautiful Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made careful plans for their destruction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then did what he had planned.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, the ramparts and walls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have fallen down before him.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem’s gates have sunk into the ground.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has smashed their locks and bars.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her kings and princes have been exiled to distant lands;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her law has ceased to exist.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her prophets receive
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'no more visions from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
