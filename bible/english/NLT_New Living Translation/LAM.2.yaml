document_id: LAM.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Anger at Sin
  - type: text
    content: The Lord in his anger
  - type: text
    content: has cast a dark shadow over beautiful Jerusalem.
  - type: note
    content: Hebrew the daughter of Zion; also in 2:8, 10, 18.
  - type: text
    content: The fairest of Israel’s cities lies in the dust,
  - type: text
    content: thrown down from the heights of heaven.
  - type: text
    content: In his day of great anger,
  - type: text
    content: the Lord has shown no mercy even to his Temple.
  - type: note
    content: Hebrew his footstool.
  '10':
  - type: text
    content: The leaders of beautiful Jerusalem
  - type: text
    content: sit on the ground in silence.
  - type: text
    content: They are clothed in burlap
  - type: text
    content: and throw dust on their heads.
  - type: text
    content: The young women of Jerusalem
  - type: text
    content: hang their heads in shame.
  '11':
  - type: text
    content: I have cried until the tears no longer come;
  - type: text
    content: my heart is broken.
  - type: text
    content: My spirit is poured out in agony
  - type: text
    content: as I see the desperate plight of my people.
  - type: text
    content: Little children and tiny babies
  - type: text
    content: are fainting and dying in the streets.
  '12':
  - type: text
    content: They cry out to their mothers,
  - type: text
    content: “We need food and drink!”
  - type: text
    content: Their lives ebb away in the streets
  - type: text
    content: like the life of a warrior wounded in battle.
  - type: text
    content: They gasp for life
  - type: text
    content: as they collapse in their mothers’ arms.
  '13':
  - type: text
    content: What can I say about you?
  - type: text
    content: Who has ever seen such sorrow?
  - type: text
    content: O daughter of Jerusalem,
  - type: text
    content: to what can I compare your anguish?
  - type: text
    content: O virgin daughter of Zion,
  - type: text
    content: how can I comfort you?
  - type: text
    content: For your wound is as deep as the sea.
  - type: text
    content: Who can heal you?
  '14':
  - type: text
    content: Your prophets have said
  - type: text
    content: so many foolish things, false to the core.
  - type: text
    content: They did not save you from exile
  - type: text
    content: by pointing out your sins.
  - type: text
    content: Instead, they painted false pictures,
  - type: text
    content: filling you with false hope.
  '15':
  - type: text
    content: All who pass by jeer at you.
  - type: text
    content: They scoff and insult beautiful Jerusalem,
  - type: note
    content: Hebrew the daughter of Jerusalem.
  - type: text
    content: ' saying,'
  - type: text
    content: “Is this the city called ‘Most Beautiful in All the World’
  - type: text
    content: and ‘Joy of All the Earth’?”
  '16':
  - type: text
    content: All your enemies mock you.
  - type: text
    content: They scoff and snarl and say,
  - type: text
    content: “We have destroyed her at last!
  - type: text
    content: We have long waited for this day,
  - type: text
    content: and it is finally here!”
  '17':
  - type: text
    content: 'But it is the '
  - type: text
    content: Lord
  - type: text
    content: ' who did just as he planned.'
  - type: text
    content: He has fulfilled the promises of disaster
  - type: text
    content: he made long ago.
  - type: text
    content: He has destroyed Jerusalem without mercy.
  - type: text
    content: He has caused her enemies to gloat over her
  - type: text
    content: and has given them power over her.
  '18':
  - type: text
    content: Cry aloud
  - type: note
    content: Hebrew Their heart cried.
  - type: text
    content: ' before the Lord,'
  - type: text
    content: O walls of beautiful Jerusalem!
  - type: text
    content: Let your tears flow like a river
  - type: text
    content: day and night.
  - type: text
    content: Give yourselves no rest;
  - type: text
    content: give your eyes no relief.
  '19':
  - type: text
    content: Rise during the night and cry out.
  - type: text
    content: Pour out your hearts like water to the Lord.
  - type: text
    content: Lift up your hands to him in prayer,
  - type: text
    content: pleading for your children,
  - type: text
    content: for in every street
  - type: text
    content: they are faint with hunger.
  '2':
  - type: text
    content: Without mercy the Lord has destroyed
  - type: text
    content: every home in Israel.
  - type: note
    content: Hebrew Jacob; also in 2:3b. See note on 1:17.
  - type: text
    content: In his anger he has broken down
  - type: text
    content: the fortress walls of beautiful Jerusalem.
  - type: note
    content: Hebrew the daughter of Judah; also in 2:5.
  - type: text
    content: He has brought them to the ground,
  - type: text
    content: dishonoring the kingdom and its rulers.
  '20':
  - type: text
    content: '“O '
  - type: text
    content: Lord
  - type: text
    content: ', think about this!'
  - type: text
    content: Should you treat your own people this way?
  - type: text
    content: Should mothers eat their own children,
  - type: text
    content: those they once bounced on their knees?
  - type: text
    content: Should priests and prophets be killed
  - type: text
    content: within the Lord’s Temple?
  '21':
  - type: text
    content: “See them lying in the streets—
  - type: text
    content: young and old,
  - type: text
    content: boys and girls,
  - type: text
    content: killed by the swords of the enemy.
  - type: text
    content: You have killed them in your anger,
  - type: text
    content: slaughtering them without mercy.
  '22':
  - type: text
    content: “You have invited terrors from all around,
  - type: text
    content: as though you were calling them to a day of feasting.
  - type: text
    content: 'In the day of the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger,
  - type: text
    content: no one has escaped or survived.
  - type: text
    content: The enemy has killed all the children
  - type: text
    content: whom I carried and raised.”
  '3':
  - type: text
    content: All the strength of Israel
  - type: text
    content: vanishes beneath his fierce anger.
  - type: text
    content: The Lord has withdrawn his protection
  - type: text
    content: as the enemy attacks.
  - type: text
    content: He consumes the whole land of Israel
  - type: text
    content: like a raging fire.
  '4':
  - type: text
    content: He bends his bow against his people,
  - type: text
    content: as though he were their enemy.
  - type: text
    content: His strength is used against them
  - type: text
    content: to kill their finest youth.
  - type: text
    content: His fury is poured out like fire
  - type: text
    content: on beautiful Jerusalem.
  - type: note
    content: Hebrew on the tent of the daughter of Zion.
  '5':
  - type: text
    content: Yes, the Lord has vanquished Israel
  - type: text
    content: like an enemy.
  - type: text
    content: He has destroyed her palaces
  - type: text
    content: and demolished her fortresses.
  - type: text
    content: He has brought unending sorrow and tears
  - type: text
    content: upon beautiful Jerusalem.
  '6':
  - type: text
    content: He has broken down his Temple
  - type: text
    content: as though it were merely a garden shelter.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has blotted out all memory'
  - type: text
    content: of the holy festivals and Sabbath days.
  - type: text
    content: Kings and priests fall together
  - type: text
    content: before his fierce anger.
  '7':
  - type: text
    content: The Lord has rejected his own altar;
  - type: text
    content: he despises his own sanctuary.
  - type: text
    content: He has given Jerusalem’s palaces
  - type: text
    content: to her enemies.
  - type: text
    content: 'They shout in the '
  - type: text
    content: Lord
  - type: text
    content: ’s Temple
  - type: text
    content: as though it were a day of celebration.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' was determined'
  - type: text
    content: to destroy the walls of beautiful Jerusalem.
  - type: text
    content: He made careful plans for their destruction,
  - type: text
    content: then did what he had planned.
  - type: text
    content: Therefore, the ramparts and walls
  - type: text
    content: have fallen down before him.
  '9':
  - type: text
    content: Jerusalem’s gates have sunk into the ground.
  - type: text
    content: He has smashed their locks and bars.
  - type: text
    content: Her kings and princes have been exiled to distant lands;
  - type: text
    content: her law has ceased to exist.
  - type: text
    content: Her prophets receive
  - type: text
    content: 'no more visions from the '
  - type: text
    content: Lord
  - type: text
    content: .
