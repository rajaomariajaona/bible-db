document_id: REV.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Lamb Breaks the First Six Seals
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: As I watched, the Lamb broke the first of the seven seals on the scroll.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: book.
    marker-yv: yv-n
  - type: text
    text: ' Then I heard one of the four living beings say with a voice like thunder, “Come!” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I looked up and saw a white horse standing there. Its rider carried a bow, and a crown was placed on his head. He rode out to win many battles and gain the victory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When the Lamb broke the second seal, I heard the second living being say, “Come!” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then another horse appeared, a red one. Its rider was given a mighty sword and the authority to take peace from the earth. And there was war and slaughter everywhere.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When the Lamb broke the third seal, I heard the third living being say, “Come!” I looked up and saw a black horse, and its rider was holding a pair of scales in his hand. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And I heard a voice from among the four living beings say, “A loaf of wheat bread or three loaves of barley will cost a day’s pay.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:6a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'A choinix '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[1 quart or 1 liter] '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of wheat for a denarius, and 3 choinix of barley for a denarius. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A denarius was equivalent to a laborer’s full day’s wage.
    marker-yv: yv-n
  - type: text
    text: ' And don’t waste'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:6b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: harm.
    marker-yv: yv-n
  - type: text
    text: ' the olive oil and wine.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When the Lamb broke the fourth seal, I heard the fourth living being say, “Come!” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I looked up and saw a horse whose color was pale green. Its rider was named Death, and his companion was the Grave.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:8a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: was Hades.
    marker-yv: yv-n
  - type: text
    text: ' These two were given authority over one-fourth of the earth, to kill with the sword and famine and disease'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:8b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: death.
    marker-yv: yv-n
  - type: text
    text: ' and wild animals.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When the Lamb broke the fifth seal, I saw under the altar the souls of all who had been martyred for the word of God and for being faithful in their testimony. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They shouted to the Lord and said, “O Sovereign Lord, holy and true, how long before you judge the people who belong to this world and avenge our blood for what they have done to us?” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then a white robe was given to each of them. And they were told to rest a little longer until the full number of their brothers and sisters
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: their brothers.
    marker-yv: yv-n
  - type: text
    text: —their fellow servants of Jesus who were to be martyred—had joined them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I watched as the Lamb broke the sixth seal, and there was a great earthquake. The sun became as dark as black cloth, and the moon became as red as blood. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the stars of the sky fell to the earth like green figs falling from a tree shaken by a strong wind. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The sky was rolled up like a scroll, and all of the mountains and islands were moved from their places.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then everyone—the kings of the earth, the rulers, the generals, the wealthy, the powerful, and every slave and free person—all hid themselves in the caves and among the rocks of the mountains. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And they cried to the mountains and the rocks, “Fall on us and hide us from the face of the one who sits on the throne and from the wrath of the Lamb. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For the great day of their wrath has come, and who is able to survive?”
