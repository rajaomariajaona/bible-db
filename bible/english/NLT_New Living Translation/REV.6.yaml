document_id: REV.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lamb Breaks the First Six Seals
  - type: text
    content: As I watched, the Lamb broke the first of the seven seals on the scroll.
  - type: note
    content: Or book.
  - type: text
    content: ' Then I heard one of the four living beings say with a voice like thunder, “Come!” '
  '10':
  - type: text
    content: 'They shouted to the Lord and said, “O Sovereign Lord, holy and true, how long before you judge the people who belong to this world and avenge our blood for what they have done to us?” '
  '11':
  - type: text
    content: Then a white robe was given to each of them. And they were told to rest a little longer until the full number of their brothers and sisters
  - type: note
    content: Greek their brothers.
  - type: text
    content: —their fellow servants of Jesus who were to be martyred—had joined them.
  '12':
  - type: text
    content: 'I watched as the Lamb broke the sixth seal, and there was a great earthquake. The sun became as dark as black cloth, and the moon became as red as blood. '
  '13':
  - type: text
    content: 'Then the stars of the sky fell to the earth like green figs falling from a tree shaken by a strong wind. '
  '14':
  - type: text
    content: The sky was rolled up like a scroll, and all of the mountains and islands were moved from their places.
  '15':
  - type: text
    content: 'Then everyone—the kings of the earth, the rulers, the generals, the wealthy, the powerful, and every slave and free person—all hid themselves in the caves and among the rocks of the mountains. '
  '16':
  - type: text
    content: 'And they cried to the mountains and the rocks, “Fall on us and hide us from the face of the one who sits on the throne and from the wrath of the Lamb. '
  '17':
  - type: text
    content: For the great day of their wrath has come, and who is able to survive?”
  '2':
  - type: text
    content: I looked up and saw a white horse standing there. Its rider carried a bow, and a crown was placed on his head. He rode out to win many battles and gain the victory.
  '3':
  - type: text
    content: 'When the Lamb broke the second seal, I heard the second living being say, “Come!” '
  '4':
  - type: text
    content: Then another horse appeared, a red one. Its rider was given a mighty sword and the authority to take peace from the earth. And there was war and slaughter everywhere.
  '5':
  - type: text
    content: 'When the Lamb broke the third seal, I heard the third living being say, “Come!” I looked up and saw a black horse, and its rider was holding a pair of scales in his hand. '
  '6':
  - type: text
    content: And I heard a voice from among the four living beings say, “A loaf of wheat bread or three loaves of barley will cost a day’s pay.
  - type: note
    content: Greek A choinix [1 quart or 1 liter] of wheat for a denarius, and 3 choinix of barley for a denarius. A denarius was equivalent to a laborer’s full day’s wage.
  - type: text
    content: ' And don’t waste'
  - type: note
    content: Or harm.
  - type: text
    content: ' the olive oil and wine.”'
  '7':
  - type: text
    content: 'When the Lamb broke the fourth seal, I heard the fourth living being say, “Come!” '
  '8':
  - type: text
    content: I looked up and saw a horse whose color was pale green. Its rider was named Death, and his companion was the Grave.
  - type: note
    content: Greek was Hades.
  - type: text
    content: ' These two were given authority over one-fourth of the earth, to kill with the sword and famine and disease'
  - type: note
    content: Greek death.
  - type: text
    content: ' and wild animals.'
  '9':
  - type: text
    content: 'When the Lamb broke the fifth seal, I saw under the altar the souls of all who had been martyred for the word of God and for being faithful in their testimony. '
