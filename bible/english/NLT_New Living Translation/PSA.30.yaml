document_id: PSA.30,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David. A song for the dedication of the Temple.
  - type: text
    content: 'I will exalt you, '
  - type: text
    content: Lord
  - type: text
    content: ', for you rescued me.'
  - type: text
    content: You refused to let my enemies triumph over me.
  '10':
  - type: text
    content: 'Hear me, '
  - type: text
    content: Lord
  - type: text
    content: ', and have mercy on me.'
  - type: text
    content: 'Help me, O '
  - type: text
    content: Lord
  - type: text
    content: .”
  '11':
  - type: text
    content: You have turned my mourning into joyful dancing.
  - type: text
    content: You have taken away my clothes of mourning and clothed me with joy,
  '12':
  - type: text
    content: that I might sing praises to you and not be silent.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, I will give you thanks forever!'
  '2':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' my God, I cried to you for help,'
  - type: text
    content: and you restored my health.
  '3':
  - type: text
    content: You brought me up from the grave,
  - type: note
    content: Hebrew from Sheol.
  - type: text
    content: ' O '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: You kept me from falling into the pit of death.
  '4':
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ', all you godly ones!'
  - type: text
    content: Praise his holy name.
  '5':
  - type: text
    content: For his anger lasts only a moment,
  - type: text
    content: but his favor lasts a lifetime!
  - type: text
    content: Weeping may last through the night,
  - type: text
    content: but joy comes with the morning.
  '6':
  - type: text
    content: When I was prosperous, I said,
  - type: text
    content: “Nothing can stop me now!”
  '7':
  - type: text
    content: 'Your favor, O '
  - type: text
    content: Lord
  - type: text
    content: ', made me as secure as a mountain.'
  - type: text
    content: Then you turned away from me, and I was shattered.
  '8':
  - type: text
    content: 'I cried out to you, O '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: I begged the Lord for mercy, saying,
  '9':
  - type: text
    content: “What will you gain if I die,
  - type: text
    content: if I sink into the grave?
  - type: text
    content: Can my dust praise you?
  - type: text
    content: Can it tell of your faithfulness?
