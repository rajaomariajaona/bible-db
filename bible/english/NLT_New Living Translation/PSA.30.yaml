document_id: PSA.30,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David. A song for the dedication of the Temple.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I will exalt you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for you rescued me.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You refused to let my enemies triumph over me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hear me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and have mercy on me.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Help me, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: You have turned my mourning into joyful dancing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have taken away my clothes of mourning and clothed me with joy,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: that I might sing praises to you and not be silent.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, I will give you thanks forever!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, I cried to you for help,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you restored my health.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: You brought me up from the grave,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from Sheol.
      marker-yv: yv-n
    - type: text
      text: ' O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You kept me from falling into the pit of death.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', all you godly ones!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Praise his holy name.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: For his anger lasts only a moment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but his favor lasts a lifetime!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Weeping may last through the night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but joy comes with the morning.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: When I was prosperous, I said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Nothing can stop me now!”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Your favor, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', made me as secure as a mountain.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then you turned away from me, and I was shattered.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I cried out to you, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I begged the Lord for mercy, saying,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “What will you gain if I die,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if I sink into the grave?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can my dust praise you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can it tell of your faithfulness?
