document_id: EXO.15,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Song of Deliverance
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Moses and the people of Israel sang this song to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I will sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he has triumphed gloriously;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he has hurled both horse and rider
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into the sea.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you blew with your breath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the sea covered them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sank like lead
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the mighty waters.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Who is like you among the gods, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: glorious in holiness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: awesome in splendor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: performing great wonders?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You raised your right hand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the earth swallowed our enemies.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “With your unfailing love you lead
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the people you have redeemed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In your might, you guide them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to your sacred home.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The peoples hear and tremble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: anguish grips those who live in Philistia.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The leaders of Edom are terrified;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the nobles of Moab tremble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who live in Canaan melt away;
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: terror and dread fall upon them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The power of your arm
  - type: usfm
    marker: q2
    children:
    - type: text
      text: makes them lifeless as stone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'until your people pass by, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until the people you purchased pass by.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will bring them in and plant them on your own mountain—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the place, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', reserved for your own dwelling,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the sanctuary, O Lord, that your hands have established.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will reign forever and ever!”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Pharaoh’s horses, chariots, and charioteers rushed into the sea, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought the water crashing down on them. But the people of Israel had walked through the middle of the sea on dry ground!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my strength and my song;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has given me victory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is my God, and I will praise him—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my father’s God, and I will exalt him!
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Miriam the prophet, Aaron’s sister, took a tambourine and led all the women as they played their tambourines and danced. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Miriam sang this song:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he has triumphed gloriously;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he has hurled both horse and rider
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into the sea.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bitter Water at Marah
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Moses led the people of Israel away from the Red Sea, and they moved out into the desert of Shur. They traveled in this desert for three days without finding any water. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When they came to the oasis of Marah, the water was too bitter to drink. So they called the place Marah (which means “bitter”).
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the people complained and turned against Moses. “What are we going to drink?” they demanded. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for help, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' showed him a piece of wood. Moses threw it into the water, and this made the water good to drink.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was there at Marah that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' set before them the following decree as a standard to test their faithfulness to him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said, “If you will listen carefully to the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and do what is right in his sight, obeying his commands and keeping all his decrees, then I will not make you suffer any of the diseases I sent on the Egyptians; for I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who heals you.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After leaving Marah, the Israelites traveled on to the oasis of Elim, where they found twelve springs and seventy palm trees. They camped there beside the water.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is a warrior;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yahweh
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:3 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yahweh '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'is a transliteration of the proper name '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'YHWH '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'that is sometimes rendered “Jehovah”; in this translation it is usually rendered “the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ” (note the use of small capitals).
      marker-yv: yv-n
    - type: text
      text: ' is his name!'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pharaoh’s chariots and army
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has hurled into the sea.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The finest of Pharaoh’s officers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are drowned in the Red Sea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sea of reeds; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 15:22.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The deep waters gushed over them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they sank to the bottom like a stone.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Your right hand, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is glorious in power.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your right hand, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: smashes the enemy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the greatness of your majesty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you overthrow those who rise against you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You unleash your blazing fury;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it consumes them like straw.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the blast of your breath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the waters piled up!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The surging waters stood straight like a wall;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the heart of the sea the deep waters became hard.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The enemy boasted, ‘I will chase them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and catch up with them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will plunder them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and consume them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will flash my sword;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my powerful hand will destroy them.’
