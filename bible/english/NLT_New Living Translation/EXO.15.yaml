document_id: EXO.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Deliverance
  - type: text
    content: 'Then Moses and the people of Israel sang this song to the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: '“I will sing to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for he has triumphed gloriously;
  - type: text
    content: he has hurled both horse and rider
  - type: text
    content: into the sea.
  '10':
  - type: text
    content: But you blew with your breath,
  - type: text
    content: and the sea covered them.
  - type: text
    content: They sank like lead
  - type: text
    content: in the mighty waters.
  '11':
  - type: text
    content: '“Who is like you among the gods, O '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: glorious in holiness,
  - type: text
    content: awesome in splendor,
  - type: text
    content: performing great wonders?
  '12':
  - type: text
    content: You raised your right hand,
  - type: text
    content: and the earth swallowed our enemies.
  '13':
  - type: text
    content: “With your unfailing love you lead
  - type: text
    content: the people you have redeemed.
  - type: text
    content: In your might, you guide them
  - type: text
    content: to your sacred home.
  '14':
  - type: text
    content: The peoples hear and tremble;
  - type: text
    content: anguish grips those who live in Philistia.
  '15':
  - type: text
    content: The leaders of Edom are terrified;
  - type: text
    content: the nobles of Moab tremble.
  - type: text
    content: All who live in Canaan melt away;
  '16':
  - type: text
    content: terror and dread fall upon them.
  - type: text
    content: The power of your arm
  - type: text
    content: makes them lifeless as stone
  - type: text
    content: 'until your people pass by, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: until the people you purchased pass by.
  '17':
  - type: text
    content: You will bring them in and plant them on your own mountain—
  - type: text
    content: 'the place, O '
  - type: text
    content: Lord
  - type: text
    content: ', reserved for your own dwelling,'
  - type: text
    content: the sanctuary, O Lord, that your hands have established.
  '18':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will reign forever and ever!”'
  '19':
  - type: text
    content: 'When Pharaoh’s horses, chariots, and charioteers rushed into the sea, the '
  - type: text
    content: Lord
  - type: text
    content: ' brought the water crashing down on them. But the people of Israel had walked through the middle of the sea on dry ground!'
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is my strength and my song;'
  - type: text
    content: he has given me victory.
  - type: text
    content: This is my God, and I will praise him—
  - type: text
    content: my father’s God, and I will exalt him!
  '20':
  - type: text
    content: 'Then Miriam the prophet, Aaron’s sister, took a tambourine and led all the women as they played their tambourines and danced. '
  '21':
  - type: text
    content: 'And Miriam sang this song:'
  - type: text
    content: '“Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for he has triumphed gloriously;
  - type: text
    content: he has hurled both horse and rider
  - type: text
    content: into the sea.”
  - type: heading
    content: Bitter Water at Marah
  '22':
  - type: text
    content: 'Then Moses led the people of Israel away from the Red Sea, and they moved out into the desert of Shur. They traveled in this desert for three days without finding any water. '
  '23':
  - type: text
    content: When they came to the oasis of Marah, the water was too bitter to drink. So they called the place Marah (which means “bitter”).
  '24':
  - type: text
    content: 'Then the people complained and turned against Moses. “What are we going to drink?” they demanded. '
  '25':
  - type: text
    content: 'So Moses cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' for help, and the '
  - type: text
    content: Lord
  - type: text
    content: ' showed him a piece of wood. Moses threw it into the water, and this made the water good to drink.'
  - type: text
    content: 'It was there at Marah that the '
  - type: text
    content: Lord
  - type: text
    content: ' set before them the following decree as a standard to test their faithfulness to him. '
  '26':
  - type: text
    content: 'He said, “If you will listen carefully to the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and do what is right in his sight, obeying his commands and keeping all his decrees, then I will not make you suffer any of the diseases I sent on the Egyptians; for I am the '
  - type: text
    content: Lord
  - type: text
    content: ' who heals you.”'
  '27':
  - type: text
    content: After leaving Marah, the Israelites traveled on to the oasis of Elim, where they found twelve springs and seventy palm trees. They camped there beside the water.
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is a warrior;'
  - type: text
    content: Yahweh
  - type: note
    content: Yahweh is a transliteration of the proper name YHWH that is sometimes rendered “Jehovah”; in this translation it is usually rendered “the Lord” (note the use of small capitals).
  - type: text
    content: ' is his name!'
  '4':
  - type: text
    content: Pharaoh’s chariots and army
  - type: text
    content: he has hurled into the sea.
  - type: text
    content: The finest of Pharaoh’s officers
  - type: text
    content: are drowned in the Red Sea.
  - type: note
    content: Hebrew sea of reeds; also in 15:22.
  '5':
  - type: text
    content: The deep waters gushed over them;
  - type: text
    content: they sank to the bottom like a stone.
  '6':
  - type: text
    content: '“Your right hand, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: is glorious in power.
  - type: text
    content: 'Your right hand, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: smashes the enemy.
  '7':
  - type: text
    content: In the greatness of your majesty,
  - type: text
    content: you overthrow those who rise against you.
  - type: text
    content: You unleash your blazing fury;
  - type: text
    content: it consumes them like straw.
  '8':
  - type: text
    content: At the blast of your breath,
  - type: text
    content: the waters piled up!
  - type: text
    content: The surging waters stood straight like a wall;
  - type: text
    content: in the heart of the sea the deep waters became hard.
  '9':
  - type: text
    content: “The enemy boasted, ‘I will chase them
  - type: text
    content: and catch up with them.
  - type: text
    content: I will plunder them
  - type: text
    content: and consume them.
  - type: text
    content: I will flash my sword;
  - type: text
    content: my powerful hand will destroy them.’
