document_id: PSA.50
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the Mighty One, is God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he has spoken;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he has summoned all humanity
- type: usfm
  marker: q2
  children:
  - type: text
    text: from where the sun rises to where it sets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: From Mount Zion, the perfection of beauty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: God shines in glorious radiance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Our God approaches,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he is not silent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fire devours everything in his way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a great storm rages around him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He calls on the heavens above and earth below
- type: usfm
  marker: q2
  children:
  - type: text
    text: to witness the judgment of his people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Bring my faithful people to me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who made a covenant with me by giving sacrifices.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then let the heavens proclaim his justice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for God himself will be the judge. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “O my people, listen as I speak.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Here are my charges against you, O Israel:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am God, your God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I have no complaint about your sacrifices
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the burnt offerings you constantly offer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But I do not need the bulls from your barns
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the goats from your pens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For all the animals of the forest are mine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I own the cattle on a thousand hills.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I know every bird on the mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the animals of the field are mine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: If I were hungry, I would not tell you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all the world is mine and everything in it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Do I eat the meat of bulls?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do I drink the blood of goats?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Make thankfulness your sacrifice to God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and keep the vows you made to the Most High.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then call on me when you are in trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will rescue you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will give me glory.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But God says to the wicked:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Why bother reciting my decrees
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pretending to obey my covenant?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For you refuse my discipline
- type: usfm
  marker: q2
  children:
  - type: text
    text: and treat my words like trash.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: When you see thieves, you approve of them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you spend your time with adulterers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Your mouth is filled with wickedness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your tongue is full of lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You sit around and slander your brother—
- type: usfm
  marker: q2
  children:
  - type: text
    text: your own mother’s son.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: While you did all this, I remained silent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you thought I didn’t care.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But now I will rebuke you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: listing all my charges against you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Repent, all of you who forget me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or I will tear you apart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one will help you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But giving thanks is a sacrifice that truly honors me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: If you keep to my path,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will reveal to you the salvation of God.”
