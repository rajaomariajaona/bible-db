document_id: PSA.50,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of Asaph.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ', the Mighty One, is God,'
  - type: text
    content: and he has spoken;
  - type: text
    content: he has summoned all humanity
  - type: text
    content: from where the sun rises to where it sets.
  '10':
  - type: text
    content: For all the animals of the forest are mine,
  - type: text
    content: and I own the cattle on a thousand hills.
  '11':
  - type: text
    content: I know every bird on the mountains,
  - type: text
    content: and all the animals of the field are mine.
  '12':
  - type: text
    content: If I were hungry, I would not tell you,
  - type: text
    content: for all the world is mine and everything in it.
  '13':
  - type: text
    content: Do I eat the meat of bulls?
  - type: text
    content: Do I drink the blood of goats?
  '14':
  - type: text
    content: Make thankfulness your sacrifice to God,
  - type: text
    content: and keep the vows you made to the Most High.
  '15':
  - type: text
    content: Then call on me when you are in trouble,
  - type: text
    content: and I will rescue you,
  - type: text
    content: and you will give me glory.”
  '16':
  - type: text
    content: 'But God says to the wicked:'
  - type: text
    content: “Why bother reciting my decrees
  - type: text
    content: and pretending to obey my covenant?
  '17':
  - type: text
    content: For you refuse my discipline
  - type: text
    content: and treat my words like trash.
  '18':
  - type: text
    content: When you see thieves, you approve of them,
  - type: text
    content: and you spend your time with adulterers.
  '19':
  - type: text
    content: Your mouth is filled with wickedness,
  - type: text
    content: and your tongue is full of lies.
  '2':
  - type: text
    content: From Mount Zion, the perfection of beauty,
  - type: text
    content: God shines in glorious radiance.
  '20':
  - type: text
    content: You sit around and slander your brother—
  - type: text
    content: your own mother’s son.
  '21':
  - type: text
    content: While you did all this, I remained silent,
  - type: text
    content: and you thought I didn’t care.
  - type: text
    content: But now I will rebuke you,
  - type: text
    content: listing all my charges against you.
  '22':
  - type: text
    content: Repent, all of you who forget me,
  - type: text
    content: or I will tear you apart,
  - type: text
    content: and no one will help you.
  '23':
  - type: text
    content: But giving thanks is a sacrifice that truly honors me.
  - type: text
    content: If you keep to my path,
  - type: text
    content: I will reveal to you the salvation of God.”
  '3':
  - type: text
    content: Our God approaches,
  - type: text
    content: and he is not silent.
  - type: text
    content: Fire devours everything in his way,
  - type: text
    content: and a great storm rages around him.
  '4':
  - type: text
    content: He calls on the heavens above and earth below
  - type: text
    content: to witness the judgment of his people.
  '5':
  - type: text
    content: “Bring my faithful people to me—
  - type: text
    content: those who made a covenant with me by giving sacrifices.”
  '6':
  - type: text
    content: Then let the heavens proclaim his justice,
  - type: text
    content: 'for God himself will be the judge. '
  - type: text
    content: Interlude
  '7':
  - type: text
    content: “O my people, listen as I speak.
  - type: text
    content: 'Here are my charges against you, O Israel:'
  - type: text
    content: I am God, your God!
  '8':
  - type: text
    content: I have no complaint about your sacrifices
  - type: text
    content: or the burnt offerings you constantly offer.
  '9':
  - type: text
    content: But I do not need the bulls from your barns
  - type: text
    content: or the goats from your pens.
