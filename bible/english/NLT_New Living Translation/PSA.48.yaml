document_id: PSA.48,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song. A psalm of the descendants of Korah.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'How great is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how deserving of praise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the city of our God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which sits on his holy mountain!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: As your name deserves, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will be praised to the ends of the earth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your strong right hand is filled with victory.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Let the people on Mount Zion rejoice.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let all the towns of Judah be glad
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of your justice.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Go, inspect the city of Jerusalem.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zion.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Walk around and count the many towers.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Take note of the fortified walls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and tour all the citadels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that you may describe them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to future generations.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: For that is what God is like.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He is our God forever and ever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will guide us until we die.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: It is high and magnificent;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the whole earth rejoices to see it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mount Zion, the holy mountain,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mount Zion, in the far north; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mount Zion, the heights of Zaphon.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is the city of the great King!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: God himself is in Jerusalem’s towers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: revealing himself as its defender.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The kings of the earth joined forces
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and advanced against the city.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But when they saw it, they were stunned;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they were terrified and ran away.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: They were gripped with terror
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and writhed in pain like a woman in labor.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: You destroyed them like the mighty ships of Tarshish
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shattered by a powerful east wind.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: We had heard of the city’s glory,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but now we have seen it ourselves—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the city of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is the city of our God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'he will make it safe forever. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: O God, we meditate on your unfailing love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as we worship in your Temple.
