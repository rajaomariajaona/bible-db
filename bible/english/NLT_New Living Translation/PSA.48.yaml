document_id: PSA.48,116
type_code: eng
verses:
  '1':
  - type: text
    content: A song. A psalm of the descendants of Korah.
  - type: text
    content: 'How great is the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: how deserving of praise,
  - type: text
    content: in the city of our God,
  - type: text
    content: which sits on his holy mountain!
  '10':
  - type: text
    content: As your name deserves, O God,
  - type: text
    content: you will be praised to the ends of the earth.
  - type: text
    content: Your strong right hand is filled with victory.
  '11':
  - type: text
    content: Let the people on Mount Zion rejoice.
  - type: text
    content: Let all the towns of Judah be glad
  - type: text
    content: because of your justice.
  '12':
  - type: text
    content: Go, inspect the city of Jerusalem.
  - type: note
    content: Hebrew Zion.
  - type: text
    content: Walk around and count the many towers.
  '13':
  - type: text
    content: Take note of the fortified walls,
  - type: text
    content: and tour all the citadels,
  - type: text
    content: that you may describe them
  - type: text
    content: to future generations.
  '14':
  - type: text
    content: For that is what God is like.
  - type: text
    content: He is our God forever and ever,
  - type: text
    content: and he will guide us until we die.
  '2':
  - type: text
    content: It is high and magnificent;
  - type: text
    content: the whole earth rejoices to see it!
  - type: text
    content: Mount Zion, the holy mountain,
  - type: note
    content: Or Mount Zion, in the far north; Hebrew reads Mount Zion, the heights of Zaphon.
  - type: text
    content: is the city of the great King!
  '3':
  - type: text
    content: God himself is in Jerusalem’s towers,
  - type: text
    content: revealing himself as its defender.
  '4':
  - type: text
    content: The kings of the earth joined forces
  - type: text
    content: and advanced against the city.
  '5':
  - type: text
    content: But when they saw it, they were stunned;
  - type: text
    content: they were terrified and ran away.
  '6':
  - type: text
    content: They were gripped with terror
  - type: text
    content: and writhed in pain like a woman in labor.
  '7':
  - type: text
    content: You destroyed them like the mighty ships of Tarshish
  - type: text
    content: shattered by a powerful east wind.
  '8':
  - type: text
    content: We had heard of the city’s glory,
  - type: text
    content: but now we have seen it ourselves—
  - type: text
    content: 'the city of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies.'
  - type: text
    content: It is the city of our God;
  - type: text
    content: 'he will make it safe forever. '
  - type: text
    content: Interlude
  '9':
  - type: text
    content: O God, we meditate on your unfailing love
  - type: text
    content: as we worship in your Temple.
