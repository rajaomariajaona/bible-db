document_id: EXO.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Birth of Moses
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'About this time, a man and woman from the tribe of Levi got married. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Later, when the boy was older, his mother brought him back to Pharaoh’s daughter, who adopted him as her own son. The princess named him Moses,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:10 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Moses '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sounds like a Hebrew term that means “to lift out.”
      marker-yv: yv-n
    - type: text
      text: ' for she explained, “I lifted him out of the water.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses Escapes to Midian
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Many years later, when Moses had grown up, he went out to visit his own people, the Hebrews, and he saw how hard they were forced to work. During his visit, he saw an Egyptian beating one of his fellow Hebrews. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: After looking in all directions to make sure no one was watching, Moses killed the Egyptian and hid the body in the sand.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The next day, when Moses went out to visit his people again, he saw two Hebrew men fighting. “Why are you beating up your friend?” Moses said to the one who had started the fight.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The man replied, “Who appointed you to be our prince and judge? Are you going to kill me as you killed that Egyptian yesterday?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses was afraid, thinking, “Everyone knows what I did.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And sure enough, Pharaoh heard what had happened, and he tried to kill Moses. But Moses fled from Pharaoh and went to live in the land of Midian.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Moses arrived in Midian, he sat down beside a well. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the priest of Midian had seven daughters who came as usual to draw water and fill the water troughs for their father’s flocks. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But some other shepherds came and chased them away. So Moses jumped up and rescued the girls from the shepherds. Then he drew water for their flocks.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the girls returned to Reuel, their father, he asked, “Why are you back so soon today?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “An Egyptian rescued us from the shepherds,” they answered. “And then he drew water for us and watered our flocks.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The woman became pregnant and gave birth to a son. She saw that he was a special baby and kept him hidden for three months. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Then where is he?” their father asked. “Why did you leave him there? Invite him to come and eat with us.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses accepted the invitation, and he settled there with him. In time, Reuel gave Moses his daughter Zipporah to be his wife. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Later she gave birth to a son, and Moses named him Gershom,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:22 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Gershom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sounds like a Hebrew term that means “a foreigner there.”
      marker-yv: yv-n
    - type: text
      text: ' for he explained, “I have been a foreigner in a foreign land.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Years passed, and the king of Egypt died. But the Israelites continued to groan under their burden of slavery. They cried out for help, and their cry rose up to God. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God heard their groaning, and he remembered his covenant promise to Abraham, Isaac, and Jacob. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He looked down on the people of Israel and knew it was time to act.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and acknowledged his obligation to help them.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But when she could no longer hide him, she got a basket made of papyrus reeds and waterproofed it with tar and pitch. She put the baby in the basket and laid it among the reeds along the bank of the Nile River. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The baby’s sister then stood at a distance, watching to see what would happen to him.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soon Pharaoh’s daughter came down to bathe in the river, and her attendants walked along the riverbank. When the princess saw the basket among the reeds, she sent her maid to get it for her. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the princess opened it, she saw the baby. The little boy was crying, and she felt sorry for him. “This must be one of the Hebrew children,” she said.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the baby’s sister approached the princess. “Should I go and find one of the Hebrew women to nurse the baby for you?” she asked.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, do!” the princess replied. So the girl went and called the baby’s mother.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Take this baby and nurse him for me,” the princess told the baby’s mother. “I will pay you for your help.” So the woman took her baby home and nursed him.
