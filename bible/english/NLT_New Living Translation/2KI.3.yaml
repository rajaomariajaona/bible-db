document_id: 2KI.3,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: War between Israel and Moab
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ahab’s son Joram
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jehoram, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Joram; also in 3:6.
      marker-yv: yv-n
    - type: text
      text: ' began to rule over Israel in the eighteenth year of King Jehoshaphat’s reign in Judah. He reigned in Samaria twelve years. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“What should we do?” the king of Israel cried out. “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has brought the three of us here to let the king of Moab defeat us.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But King Jehoshaphat of Judah asked, “Is there no prophet of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with us? If there is, we can ask the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' what to do through him.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: One of King Joram’s officers replied, “Elisha son of Shaphat is here. He used to be Elijah’s personal assistant.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He used to pour water on the hands of Elijah.
      marker-yv: yv-n
    - type: text
      text: ”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat said, “Yes, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' speaks through him.” So the king of Israel, King Jehoshaphat of Judah, and the king of Edom went to consult with Elisha.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Why are you coming to me?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: What is there in common between you and me?
      marker-yv: yv-n
    - type: text
      text: ' Elisha asked the king of Israel. “Go to the pagan prophets of your father and mother!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But King Joram of Israel said, “No! For it was the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who called us three kings here—only to be defeated by the king of Moab!”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisha replied, “As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty lives, whom I serve, I wouldn’t even bother with you except for my respect for King Jehoshaphat of Judah. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now bring me someone who can play the harp.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: While the harp was being played, the power
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the hand.
      marker-yv: yv-n
    - type: text
      text: ' of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came upon Elisha, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he said, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: This dry valley will be filled with pools of water! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will see neither wind nor rain, says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', but this valley will be filled with water. You will have plenty for yourselves and your cattle and other animals. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But this is only a simple thing for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for he will make you victorious over the army of Moab! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You will conquer the best of their towns, even the fortified ones. You will cut down all their good trees, stop up all their springs, and ruin all their good land with stones.”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He did what was evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight, but not to the same extent as his father and mother. He at least tore down the sacred pillar of Baal that his father had set up. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The next day at about the time when the morning sacrifice was offered, water suddenly appeared! It was flowing from the direction of Edom, and soon there was water everywhere.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meanwhile, when the people of Moab heard about the three armies marching against them, they mobilized every man who was old enough to strap on a sword, and they stationed themselves along their border. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when they got up the next morning, the sun was shining across the water, making it appear red to the Moabites—like blood. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “It’s blood!” the Moabites exclaimed. “The three armies must have attacked and killed each other! Let’s go, men of Moab, and collect the plunder!”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when the Moabites arrived at the Israelite camp, the army of Israel rushed out and attacked them until they turned and ran. The army of Israel chased them into the land of Moab, destroying everything as they went.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They destroyed the towns, covered their good land with stones, stopped up all the springs, and cut down all the good trees. Finally, only Kir-hareseth and its stone walls were left, but men with slings surrounded and attacked it.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the king of Moab saw that he was losing the battle, he led 700 of his swordsmen in a desperate attempt to break through the enemy lines near the king of Edom, but they failed. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the king of Moab took his oldest son, who would have been the next king, and sacrificed him as a burnt offering on the wall. So there was great anger against Israel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'So Israel’s anger was great. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' and the Israelites withdrew and returned to their own land.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Nevertheless, he continued in the sins that Jeroboam son of Nebat had committed and led the people of Israel to commit.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Mesha of Moab was a sheep breeder. He used to pay the king of Israel an annual tribute of 100,000 lambs and the wool of 100,000 rams. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But after Ahab’s death, the king of Moab rebelled against the king of Israel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So King Joram promptly mustered the army of Israel and marched from Samaria. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the way, he sent this message to King Jehoshaphat of Judah: “The king of Moab has rebelled against me. Will you join me in battle against him?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jehoshaphat replied, “Why, of course! You and I are as one. My troops are your troops, and my horses are your horses.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Jehoshaphat asked, “What route will we take?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “We will attack from the wilderness of Edom,” Joram replied.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king of Edom and his troops joined them, and all three armies traveled along a roundabout route through the wilderness for seven days. But there was no water for the men or their animals.
