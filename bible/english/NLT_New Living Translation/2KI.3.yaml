document_id: 2KI.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: War between Israel and Moab
  - type: text
    content: Ahab’s son Joram
  - type: note
    content: Hebrew Jehoram, a variant spelling of Joram; also in 3:6.
  - type: text
    content: ' began to rule over Israel in the eighteenth year of King Jehoshaphat’s reign in Judah. He reigned in Samaria twelve years. '
  '10':
  - type: text
    content: '“What should we do?” the king of Israel cried out. “The '
  - type: text
    content: Lord
  - type: text
    content: ' has brought the three of us here to let the king of Moab defeat us.”'
  '11':
  - type: text
    content: 'But King Jehoshaphat of Judah asked, “Is there no prophet of the '
  - type: text
    content: Lord
  - type: text
    content: ' with us? If there is, we can ask the '
  - type: text
    content: Lord
  - type: text
    content: ' what to do through him.”'
  - type: text
    content: One of King Joram’s officers replied, “Elisha son of Shaphat is here. He used to be Elijah’s personal assistant.
  - type: note
    content: Hebrew He used to pour water on the hands of Elijah.
  - type: text
    content: ”
  '12':
  - type: text
    content: 'Jehoshaphat said, “Yes, the '
  - type: text
    content: Lord
  - type: text
    content: ' speaks through him.” So the king of Israel, King Jehoshaphat of Judah, and the king of Edom went to consult with Elisha.'
  '13':
  - type: text
    content: “Why are you coming to me?”
  - type: note
    content: Hebrew What is there in common between you and me?
  - type: text
    content: ' Elisha asked the king of Israel. “Go to the pagan prophets of your father and mother!”'
  - type: text
    content: 'But King Joram of Israel said, “No! For it was the '
  - type: text
    content: Lord
  - type: text
    content: ' who called us three kings here—only to be defeated by the king of Moab!”'
  '14':
  - type: text
    content: 'Elisha replied, “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty lives, whom I serve, I wouldn’t even bother with you except for my respect for King Jehoshaphat of Judah. '
  '15':
  - type: text
    content: Now bring me someone who can play the harp.”
  - type: text
    content: While the harp was being played, the power
  - type: note
    content: Hebrew the hand.
  - type: text
    content: ' of the '
  - type: text
    content: Lord
  - type: text
    content: ' came upon Elisha, '
  '16':
  - type: text
    content: 'and he said, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: This dry valley will be filled with pools of water! '
  '17':
  - type: text
    content: 'You will see neither wind nor rain, says the '
  - type: text
    content: Lord
  - type: text
    content: ', but this valley will be filled with water. You will have plenty for yourselves and your cattle and other animals. '
  '18':
  - type: text
    content: 'But this is only a simple thing for the '
  - type: text
    content: Lord
  - type: text
    content: ', for he will make you victorious over the army of Moab! '
  '19':
  - type: text
    content: You will conquer the best of their towns, even the fortified ones. You will cut down all their good trees, stop up all their springs, and ruin all their good land with stones.”
  '2':
  - type: text
    content: 'He did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, but not to the same extent as his father and mother. He at least tore down the sacred pillar of Baal that his father had set up. '
  '20':
  - type: text
    content: The next day at about the time when the morning sacrifice was offered, water suddenly appeared! It was flowing from the direction of Edom, and soon there was water everywhere.
  '21':
  - type: text
    content: 'Meanwhile, when the people of Moab heard about the three armies marching against them, they mobilized every man who was old enough to strap on a sword, and they stationed themselves along their border. '
  '22':
  - type: text
    content: 'But when they got up the next morning, the sun was shining across the water, making it appear red to the Moabites—like blood. '
  '23':
  - type: text
    content: “It’s blood!” the Moabites exclaimed. “The three armies must have attacked and killed each other! Let’s go, men of Moab, and collect the plunder!”
  '24':
  - type: text
    content: But when the Moabites arrived at the Israelite camp, the army of Israel rushed out and attacked them until they turned and ran. The army of Israel chased them into the land of Moab, destroying everything as they went.
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' '
  '25':
  - type: text
    content: They destroyed the towns, covered their good land with stones, stopped up all the springs, and cut down all the good trees. Finally, only Kir-hareseth and its stone walls were left, but men with slings surrounded and attacked it.
  '26':
  - type: text
    content: 'When the king of Moab saw that he was losing the battle, he led 700 of his swordsmen in a desperate attempt to break through the enemy lines near the king of Edom, but they failed. '
  '27':
  - type: text
    content: Then the king of Moab took his oldest son, who would have been the next king, and sacrificed him as a burnt offering on the wall. So there was great anger against Israel,
  - type: note
    content: Or So Israel’s anger was great. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' and the Israelites withdrew and returned to their own land.'
  '3':
  - type: text
    content: Nevertheless, he continued in the sins that Jeroboam son of Nebat had committed and led the people of Israel to commit.
  '4':
  - type: text
    content: 'King Mesha of Moab was a sheep breeder. He used to pay the king of Israel an annual tribute of 100,000 lambs and the wool of 100,000 rams. '
  '5':
  - type: text
    content: 'But after Ahab’s death, the king of Moab rebelled against the king of Israel. '
  '6':
  - type: text
    content: 'So King Joram promptly mustered the army of Israel and marched from Samaria. '
  '7':
  - type: text
    content: 'On the way, he sent this message to King Jehoshaphat of Judah: “The king of Moab has rebelled against me. Will you join me in battle against him?”'
  - type: text
    content: 'And Jehoshaphat replied, “Why, of course! You and I are as one. My troops are your troops, and my horses are your horses.” '
  '8':
  - type: text
    content: Then Jehoshaphat asked, “What route will we take?”
  - type: text
    content: “We will attack from the wilderness of Edom,” Joram replied.
  '9':
  - type: text
    content: The king of Edom and his troops joined them, and all three armies traveled along a roundabout route through the wilderness for seven days. But there was no water for the men or their animals.
