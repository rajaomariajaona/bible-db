document_id: 1SA.17,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Goliath Challenges the Israelites
  - type: text
    content: 'The Philistines now mustered their army for battle and camped between Socoh in Judah and Azekah at Ephes-dammim. '
  '10':
  - type: text
    content: 'I defy the armies of Israel today! Send me a man who will fight me!” '
  '11':
  - type: text
    content: When Saul and the Israelites heard this, they were terrified and deeply shaken.
  - type: heading
    content: Jesse Sends David to Saul’s Camp
  '12':
  - type: text
    content: 'Now David was the son of a man named Jesse, an Ephrathite from Bethlehem in the land of Judah. Jesse was an old man at that time, and he had eight sons. '
  '13':
  - type: text
    content: Jesse’s three oldest sons—Eliab, Abinadab, and Shimea
  - type: note
    content: Hebrew Shammah, a variant spelling of Shimea; compare 1 Chr 2:13; 20:7.
  - type: text
    content: '—had already joined Saul’s army to fight the Philistines. '
  '14':
  - type: text
    content: 'David was the youngest son. David’s three oldest brothers stayed with Saul’s army, '
  '15':
  - type: text
    content: but David went back and forth so he could help his father with the sheep in Bethlehem.
  '16':
  - type: text
    content: For forty days, every morning and evening, the Philistine champion strutted in front of the Israelite army.
  '17':
  - type: text
    content: One day Jesse said to David, “Take this basket
  - type: note
    content: Hebrew ephah [20 quarts or 22 liters].
  - type: text
    content: ' of roasted grain and these ten loaves of bread, and carry them quickly to your brothers. '
  '18':
  - type: text
    content: And give these ten cuts of cheese to their captain. See how your brothers are getting along, and bring back a report on how they are doing.
  - type: note
    content: Hebrew and take their pledge.
  - type: text
    content: '” '
  '19':
  - type: text
    content: David’s brothers were with Saul and the Israelite army at the valley of Elah, fighting against the Philistines.
  '2':
  - type: text
    content: 'Saul countered by gathering his Israelite troops near the valley of Elah. '
  '20':
  - type: text
    content: 'So David left the sheep with another shepherd and set out early the next morning with the gifts, as Jesse had directed him. He arrived at the camp just as the Israelite army was leaving for the battlefield with shouts and battle cries. '
  '21':
  - type: text
    content: 'Soon the Israelite and Philistine forces stood facing each other, army against army. '
  '22':
  - type: text
    content: 'David left his things with the keeper of supplies and hurried out to the ranks to greet his brothers. '
  '23':
  - type: text
    content: As he was talking with them, Goliath, the Philistine champion from Gath, came out from the Philistine ranks. Then David heard him shout his usual taunt to the army of Israel.
  '24':
  - type: text
    content: 'As soon as the Israelite army saw him, they began to run away in fright. '
  '25':
  - type: text
    content: “Have you seen the giant?” the men asked. “He comes out each day to defy Israel. The king has offered a huge reward to anyone who kills him. He will give that man one of his daughters for a wife, and the man’s entire family will be exempted from paying taxes!”
  '26':
  - type: text
    content: David asked the soldiers standing nearby, “What will a man get for killing this Philistine and ending his defiance of Israel? Who is this pagan Philistine anyway, that he is allowed to defy the armies of the living God?”
  '27':
  - type: text
    content: And these men gave David the same reply. They said, “Yes, that is the reward for killing him.”
  '28':
  - type: text
    content: But when David’s oldest brother, Eliab, heard David talking to the men, he was angry. “What are you doing around here anyway?” he demanded. “What about those few sheep you’re supposed to be taking care of? I know about your pride and deceit. You just want to see the battle!”
  '29':
  - type: text
    content: '“What have I done now?” David replied. “I was only asking a question!” '
  '3':
  - type: text
    content: So the Philistines and Israelites faced each other on opposite hills, with the valley between them.
  '30':
  - type: text
    content: 'He walked over to some others and asked them the same thing and received the same answer. '
  '31':
  - type: text
    content: Then David’s question was reported to King Saul, and the king sent for him.
  - type: heading
    content: David Kills Goliath
  '32':
  - type: text
    content: “Don’t worry about this Philistine,” David told Saul. “I’ll go fight him!”
  '33':
  - type: text
    content: “Don’t be ridiculous!” Saul replied. “There’s no way you can fight this Philistine and possibly win! You’re only a boy, and he’s been a man of war since his youth.”
  '34':
  - type: text
    content: 'But David persisted. “I have been taking care of my father’s sheep and goats,” he said. “When a lion or a bear comes to steal a lamb from the flock, '
  '35':
  - type: text
    content: 'I go after it with a club and rescue the lamb from its mouth. If the animal turns on me, I catch it by the jaw and club it to death. '
  '36':
  - type: text
    content: 'I have done this to both lions and bears, and I’ll do it to this pagan Philistine, too, for he has defied the armies of the living God! '
  '37':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' who rescued me from the claws of the lion and the bear will rescue me from this Philistine!”'
  - type: text
    content: 'Saul finally consented. “All right, go ahead,” he said. “And may the '
  - type: text
    content: Lord
  - type: text
    content: ' be with you!”'
  '38':
  - type: text
    content: 'Then Saul gave David his own armor—a bronze helmet and a coat of mail. '
  '39':
  - type: text
    content: David put it on, strapped the sword over it, and took a step or two to see what it was like, for he had never worn such things before.
  - type: text
    content: '“I can’t go in these,” he protested to Saul. “I’m not used to them.” So David took them off again. '
  '4':
  - type: text
    content: Then Goliath, a Philistine champion from Gath, came out of the Philistine ranks to face the forces of Israel. He was over nine feet
  - type: note
    content: Hebrew 6 cubits and 1 span [which totals about 9.75 feet or 3 meters]; Dead Sea Scrolls and Greek version read 4 cubits and 1 span [which totals about 6.75 feet or 2 meters].
  - type: text
    content: ' tall! '
  '40':
  - type: text
    content: He picked up five smooth stones from a stream and put them into his shepherd’s bag. Then, armed only with his shepherd’s staff and sling, he started across the valley to fight the Philistine.
  '41':
  - type: text
    content: 'Goliath walked out toward David with his shield bearer ahead of him, '
  '42':
  - type: text
    content: 'sneering in contempt at this ruddy-faced boy. '
  '43':
  - type: text
    content: '“Am I a dog,” he roared at David, “that you come at me with a stick?” And he cursed David by the names of his gods. '
  '44':
  - type: text
    content: “Come over here, and I’ll give your flesh to the birds and wild animals!” Goliath yelled.
  '45':
  - type: text
    content: 'David replied to the Philistine, “You come to me with sword, spear, and javelin, but I come to you in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies—the God of the armies of Israel, whom you have defied. '
  '46':
  - type: text
    content: 'Today the '
  - type: text
    content: Lord
  - type: text
    content: ' will conquer you, and I will kill you and cut off your head. And then I will give the dead bodies of your men to the birds and wild animals, and the whole world will know that there is a God in Israel! '
  '47':
  - type: text
    content: 'And everyone assembled here will know that the '
  - type: text
    content: Lord
  - type: text
    content: ' rescues his people, but not with sword and spear. This is the '
  - type: text
    content: Lord
  - type: text
    content: ’s battle, and he will give you to us!”
  '48':
  - type: text
    content: 'As Goliath moved closer to attack, David quickly ran out to meet him. '
  '49':
  - type: text
    content: Reaching into his shepherd’s bag and taking out a stone, he hurled it with his sling and hit the Philistine in the forehead. The stone sank in, and Goliath stumbled and fell face down on the ground.
  '5':
  - type: text
    content: He wore a bronze helmet, and his bronze coat of mail weighed 125 pounds.
  - type: note
    content: Hebrew 5,000 shekels [57 kilograms].
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'So David triumphed over the Philistine with only a sling and a stone, for he had no sword. '
  '51':
  - type: text
    content: Then David ran over and pulled Goliath’s sword from its sheath. David used it to kill him and cut off his head.
  - type: heading
    content: Israel Routs the Philistines
  - type: text
    content: 'When the Philistines saw that their champion was dead, they turned and ran. '
  '52':
  - type: text
    content: Then the men of Israel and Judah gave a great shout of triumph and rushed after the Philistines, chasing them as far as Gath
  - type: note
    content: As in some Greek manuscripts; Hebrew reads a valley.
  - type: text
    content: ' and the gates of Ekron. The bodies of the dead and wounded Philistines were strewn all along the road from Shaaraim, as far as Gath and Ekron. '
  '53':
  - type: text
    content: 'Then the Israelite army returned and plundered the deserted Philistine camp. '
  '54':
  - type: text
    content: (David took the Philistine’s head to Jerusalem, but he stored the man’s armor in his own tent.)
  '55':
  - type: text
    content: As Saul watched David go out to fight the Philistine, he asked Abner, the commander of his army, “Abner, whose son is this young man?”
  - type: text
    content: “I really don’t know,” Abner declared.
  '56':
  - type: text
    content: “Well, find out who he is!” the king told him.
  '57':
  - type: text
    content: 'As soon as David returned from killing Goliath, Abner brought him to Saul with the Philistine’s head still in his hand. '
  '58':
  - type: text
    content: “Tell me about your father, young man,” Saul said.
  - type: text
    content: And David replied, “His name is Jesse, and we live in Bethlehem.”
  '6':
  - type: text
    content: 'He also wore bronze leg armor, and he carried a bronze javelin on his shoulder. '
  '7':
  - type: text
    content: The shaft of his spear was as heavy and thick as a weaver’s beam, tipped with an iron spearhead that weighed 15 pounds.
  - type: note
    content: Hebrew 600 shekels [6.8 kilograms].
  - type: text
    content: ' His armor bearer walked ahead of him carrying a shield.'
  '8':
  - type: text
    content: 'Goliath stood and shouted a taunt across to the Israelites. “Why are you all coming out to fight?” he called. “I am the Philistine champion, but you are only the servants of Saul. Choose one man to come down here and fight me! '
  '9':
  - type: text
    content: 'If he kills me, then we will be your slaves. But if I kill him, you will be our slaves! '
