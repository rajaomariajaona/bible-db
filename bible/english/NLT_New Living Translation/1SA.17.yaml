document_id: 1SA.17,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Goliath Challenges the Israelites
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The Philistines now mustered their army for battle and camped between Socoh in Judah and Azekah at Ephes-dammim. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I defy the armies of Israel today! Send me a man who will fight me!” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Saul and the Israelites heard this, they were terrified and deeply shaken.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesse Sends David to Saul’s Camp
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now David was the son of a man named Jesse, an Ephrathite from Bethlehem in the land of Judah. Jesse was an old man at that time, and he had eight sons. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Jesse’s three oldest sons—Eliab, Abinadab, and Shimea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Shammah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Shimea; compare 1 Chr 2:13; 20:7.
      marker-yv: yv-n
    - type: text
      text: '—had already joined Saul’s army to fight the Philistines. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'David was the youngest son. David’s three oldest brothers stayed with Saul’s army, '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: but David went back and forth so he could help his father with the sheep in Bethlehem.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For forty days, every morning and evening, the Philistine champion strutted in front of the Israelite army.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One day Jesse said to David, “Take this basket
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ephah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[20 quarts or 22 liters].'
      marker-yv: yv-n
    - type: text
      text: ' of roasted grain and these ten loaves of bread, and carry them quickly to your brothers. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And give these ten cuts of cheese to their captain. See how your brothers are getting along, and bring back a report on how they are doing.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and take their pledge.
      marker-yv: yv-n
    - type: text
      text: '” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David’s brothers were with Saul and the Israelite army at the valley of Elah, fighting against the Philistines.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Saul countered by gathering his Israelite troops near the valley of Elah. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David left the sheep with another shepherd and set out early the next morning with the gifts, as Jesse had directed him. He arrived at the camp just as the Israelite army was leaving for the battlefield with shouts and battle cries. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soon the Israelite and Philistine forces stood facing each other, army against army. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David left his things with the keeper of supplies and hurried out to the ranks to greet his brothers. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As he was talking with them, Goliath, the Philistine champion from Gath, came out from the Philistine ranks. Then David heard him shout his usual taunt to the army of Israel.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as the Israelite army saw him, they began to run away in fright. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Have you seen the giant?” the men asked. “He comes out each day to defy Israel. The king has offered a huge reward to anyone who kills him. He will give that man one of his daughters for a wife, and the man’s entire family will be exempted from paying taxes!”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David asked the soldiers standing nearby, “What will a man get for killing this Philistine and ending his defiance of Israel? Who is this pagan Philistine anyway, that he is allowed to defy the armies of the living God?”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And these men gave David the same reply. They said, “Yes, that is the reward for killing him.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when David’s oldest brother, Eliab, heard David talking to the men, he was angry. “What are you doing around here anyway?” he demanded. “What about those few sheep you’re supposed to be taking care of? I know about your pride and deceit. You just want to see the battle!”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“What have I done now?” David replied. “I was only asking a question!” '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So the Philistines and Israelites faced each other on opposite hills, with the valley between them.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He walked over to some others and asked them the same thing and received the same answer. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then David’s question was reported to King Saul, and the king sent for him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Kills Goliath
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “Don’t worry about this Philistine,” David told Saul. “I’ll go fight him!”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Don’t be ridiculous!” Saul replied. “There’s no way you can fight this Philistine and possibly win! You’re only a boy, and he’s been a man of war since his youth.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But David persisted. “I have been taking care of my father’s sheep and goats,” he said. “When a lion or a bear comes to steal a lamb from the flock, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I go after it with a club and rescue the lamb from its mouth. If the animal turns on me, I catch it by the jaw and club it to death. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have done this to both lions and bears, and I’ll do it to this pagan Philistine, too, for he has defied the armies of the living God! '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who rescued me from the claws of the lion and the bear will rescue me from this Philistine!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul finally consented. “All right, go ahead,” he said. “And may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be with you!”'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul gave David his own armor—a bronze helmet and a coat of mail. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David put it on, strapped the sword over it, and took a step or two to see what it was like, for he had never worn such things before.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I can’t go in these,” he protested to Saul. “I’m not used to them.” So David took them off again. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Goliath, a Philistine champion from Gath, came out of the Philistine ranks to face the forces of Israel. He was over nine feet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '6 cubits and 1 span '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[which totals about 9.75 feet or 3 meters]; Dead Sea Scrolls and Greek version read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '4 cubits and 1 span '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[which totals about 6.75 feet or 2 meters].'
      marker-yv: yv-n
    - type: text
      text: ' tall! '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He picked up five smooth stones from a stream and put them into his shepherd’s bag. Then, armed only with his shepherd’s staff and sling, he started across the valley to fight the Philistine.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Goliath walked out toward David with his shield bearer ahead of him, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sneering in contempt at this ruddy-faced boy. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Am I a dog,” he roared at David, “that you come at me with a stick?” And he cursed David by the names of his gods. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Come over here, and I’ll give your flesh to the birds and wild animals!” Goliath yelled.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David replied to the Philistine, “You come to me with sword, spear, and javelin, but I come to you in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of Heaven’s Armies—the God of the armies of Israel, whom you have defied. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Today the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will conquer you, and I will kill you and cut off your head. And then I will give the dead bodies of your men to the birds and wild animals, and the whole world will know that there is a God in Israel! '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And everyone assembled here will know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rescues his people, but not with sword and spear. This is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s battle, and he will give you to us!”
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Goliath moved closer to attack, David quickly ran out to meet him. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Reaching into his shepherd’s bag and taking out a stone, he hurled it with his sling and hit the Philistine in the forehead. The stone sank in, and Goliath stumbled and fell face down on the ground.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He wore a bronze helmet, and his bronze coat of mail weighed 125 pounds.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '5,000 shekels '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[57 kilograms].'
      marker-yv: yv-n
    - type: text
      text: ' '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David triumphed over the Philistine with only a sling and a stone, for he had no sword. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then David ran over and pulled Goliath’s sword from its sheath. David used it to kill him and cut off his head.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel Routs the Philistines
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When the Philistines saw that their champion was dead, they turned and ran. '
  '52':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then the men of Israel and Judah gave a great shout of triumph and rushed after the Philistines, chasing them as far as Gath
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:52 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a valley.
      marker-yv: yv-n
    - type: text
      text: ' and the gates of Ekron. The bodies of the dead and wounded Philistines were strewn all along the road from Shaaraim, as far as Gath and Ekron. '
  '53':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the Israelite army returned and plundered the deserted Philistine camp. '
  '54':
  - type: usfm
    marker: m
    children:
    - type: text
      text: (David took the Philistine’s head to Jerusalem, but he stored the man’s armor in his own tent.)
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As Saul watched David go out to fight the Philistine, he asked Abner, the commander of his army, “Abner, whose son is this young man?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I really don’t know,” Abner declared.
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Well, find out who he is!” the king told him.
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as David returned from killing Goliath, Abner brought him to Saul with the Philistine’s head still in his hand. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Tell me about your father, young man,” Saul said.
  - type: usfm
    marker: p
    children:
    - type: text
      text: And David replied, “His name is Jesse, and we live in Bethlehem.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also wore bronze leg armor, and he carried a bronze javelin on his shoulder. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The shaft of his spear was as heavy and thick as a weaver’s beam, tipped with an iron spearhead that weighed 15 pounds.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '600 shekels '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[6.8 kilograms].'
      marker-yv: yv-n
    - type: text
      text: ' His armor bearer walked ahead of him carrying a shield.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Goliath stood and shouted a taunt across to the Israelites. “Why are you all coming out to fight?” he called. “I am the Philistine champion, but you are only the servants of Saul. Choose one man to come down here and fight me! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If he kills me, then we will be your slaves. But if I kill him, you will be our slaves! '
