document_id: ACT.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Council at Jerusalem
  - type: text
    content: While Paul and Barnabas were at Antioch of Syria, some men from Judea arrived and began to teach the believers
  - type: note
    content: Greek brothers; also in 15:3, 23, 32, 33, 36, 40.
  - type: text
    content: ': “Unless you are circumcised as required by the law of Moses, you cannot be saved.” '
  '10':
  - type: text
    content: So why are you now challenging God by burdening the Gentile believers
  - type: note
    content: Greek disciples.
  - type: text
    content: ' with a yoke that neither we nor our ancestors were able to bear? '
  '11':
  - type: text
    content: We believe that we are all saved the same way, by the undeserved grace of the Lord Jesus.”
  '12':
  - type: text
    content: Everyone listened quietly as Barnabas and Paul told about the miraculous signs and wonders God had done through them among the Gentiles.
  '13':
  - type: text
    content: 'When they had finished, James stood and said, “Brothers, listen to me. '
  '14':
  - type: text
    content: Peter
  - type: note
    content: Greek Simeon.
  - type: text
    content: ' has told you about the time God first visited the Gentiles to take from them a people for himself. '
  '15':
  - type: text
    content: 'And this conversion of Gentiles is exactly what the prophets predicted. As it is written:'
  '16':
  - type: text
    content: ‘Afterward I will return
  - type: text
    content: and restore the fallen house
  - type: note
    content: Or kingdom; Greek reads tent.
  - type: text
    content: ' of David.'
  - type: text
    content: I will rebuild its ruins
  - type: text
    content: and restore it,
  '17':
  - type: text
    content: 'so that the rest of humanity might seek the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: including the Gentiles—
  - type: text
    content: all those I have called to be mine.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken—'
  '18':
  - type: text
    content: he who made these things known so long ago.’
  - type: note
    content: Amos 9:11-12 (Greek version); Isa 45:21.
  '19':
  - type: text
    content: '“And so my judgment is that we should not make it difficult for the Gentiles who are turning to God. '
  '2':
  - type: text
    content: 'Paul and Barnabas disagreed with them, arguing vehemently. Finally, the church decided to send Paul and Barnabas to Jerusalem, accompanied by some local believers, to talk to the apostles and elders about this question. '
  '20':
  - type: text
    content: 'Instead, we should write and tell them to abstain from eating food offered to idols, from sexual immorality, from eating the meat of strangled animals, and from consuming blood. '
  '21':
  - type: text
    content: For these laws of Moses have been preached in Jewish synagogues in every city on every Sabbath for many generations.”
  - type: heading
    content: The Letter for Gentile Believers
  '22':
  - type: text
    content: Then the apostles and elders together with the whole church in Jerusalem chose delegates, and they sent them to Antioch of Syria with Paul and Barnabas to report on this decision. The men chosen were two of the church leaders
  - type: note
    content: Greek were leaders among the brothers.
  - type: text
    content: '—Judas (also called Barsabbas) and Silas. '
  '23':
  - type: text
    content: 'This is the letter they took with them:'
  - type: text
    content: “This letter is from the apostles and elders, your brothers in Jerusalem. It is written to the Gentile believers in Antioch, Syria, and Cilicia. Greetings!
  '24':
  - type: text
    content: '“We understand that some men from here have troubled you and upset you with their teaching, but we did not send them! '
  '25':
  - type: text
    content: 'So we decided, having come to complete agreement, to send you official representatives, along with our beloved Barnabas and Paul, '
  '26':
  - type: text
    content: 'who have risked their lives for the name of our Lord Jesus Christ. '
  '27':
  - type: text
    content: We are sending Judas and Silas to confirm what we have decided concerning your question.
  '28':
  - type: text
    content: '“For it seemed good to the Holy Spirit and to us to lay no greater burden on you than these few requirements: '
  '29':
  - type: text
    content: You must abstain from eating food offered to idols, from consuming blood or the meat of strangled animals, and from sexual immorality. If you do this, you will do well. Farewell.”
  '3':
  - type: text
    content: The church sent the delegates to Jerusalem, and they stopped along the way in Phoenicia and Samaria to visit the believers. They told them—much to everyone’s joy—that the Gentiles, too, were being converted.
  '30':
  - type: text
    content: 'The messengers went at once to Antioch, where they called a general meeting of the believers and delivered the letter. '
  '31':
  - type: text
    content: And there was great joy throughout the church that day as they read this encouraging message.
  '32':
  - type: text
    content: 'Then Judas and Silas, both being prophets, spoke at length to the believers, encouraging and strengthening their faith. '
  '33':
  - type: text
    content: They stayed for a while, and then the believers sent them back to the church in Jerusalem with a blessing of peace.
  - type: note
    content: Some manuscripts add verse 34, But Silas decided to stay there.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Paul and Barnabas stayed in Antioch. They and many others taught and preached the word of the Lord there.
  - type: heading
    content: Paul and Barnabas Separate
  '36':
  - type: text
    content: 'After some time Paul said to Barnabas, “Let’s go back and visit each city where we previously preached the word of the Lord, to see how the new believers are doing.” '
  '37':
  - type: text
    content: 'Barnabas agreed and wanted to take along John Mark. '
  '38':
  - type: text
    content: 'But Paul disagreed strongly, since John Mark had deserted them in Pamphylia and had not continued with them in their work. '
  '39':
  - type: text
    content: 'Their disagreement was so sharp that they separated. Barnabas took John Mark with him and sailed for Cyprus. '
  '4':
  - type: text
    content: 'When they arrived in Jerusalem, Barnabas and Paul were welcomed by the whole church, including the apostles and elders. They reported everything God had done through them. '
  '40':
  - type: text
    content: 'Paul chose Silas, and as he left, the believers entrusted him to the Lord’s gracious care. '
  '41':
  - type: text
    content: Then he traveled throughout Syria and Cilicia, strengthening the churches there.
  '5':
  - type: text
    content: But then some of the believers who belonged to the sect of the Pharisees stood up and insisted, “The Gentile converts must be circumcised and required to follow the law of Moses.”
  '6':
  - type: text
    content: 'So the apostles and elders met together to resolve this issue. '
  '7':
  - type: text
    content: 'At the meeting, after a long discussion, Peter stood and addressed them as follows: “Brothers, you all know that God chose me from among you some time ago to preach to the Gentiles so that they could hear the Good News and believe. '
  '8':
  - type: text
    content: 'God knows people’s hearts, and he confirmed that he accepts Gentiles by giving them the Holy Spirit, just as he did to us. '
  '9':
  - type: text
    content: 'He made no distinction between us and them, for he cleansed their hearts through faith. '
