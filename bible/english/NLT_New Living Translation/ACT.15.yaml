document_id: ACT.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Council at Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: While Paul and Barnabas were at Antioch of Syria, some men from Judea arrived and began to teach the believers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'brothers; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 15:3, 23, 32, 33, 36, 40.
    marker-yv: yv-n
  - type: text
    text: ': “Unless you are circumcised as required by the law of Moses, you cannot be saved.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Paul and Barnabas disagreed with them, arguing vehemently. Finally, the church decided to send Paul and Barnabas to Jerusalem, accompanied by some local believers, to talk to the apostles and elders about this question. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The church sent the delegates to Jerusalem, and they stopped along the way in Phoenicia and Samaria to visit the believers. They told them—much to everyone’s joy—that the Gentiles, too, were being converted.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When they arrived in Jerusalem, Barnabas and Paul were welcomed by the whole church, including the apostles and elders. They reported everything God had done through them. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But then some of the believers who belonged to the sect of the Pharisees stood up and insisted, “The Gentile converts must be circumcised and required to follow the law of Moses.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So the apostles and elders met together to resolve this issue. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'At the meeting, after a long discussion, Peter stood and addressed them as follows: “Brothers, you all know that God chose me from among you some time ago to preach to the Gentiles so that they could hear the Good News and believe. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'God knows people’s hearts, and he confirmed that he accepts Gentiles by giving them the Holy Spirit, just as he did to us. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He made no distinction between us and them, for he cleansed their hearts through faith. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So why are you now challenging God by burdening the Gentile believers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: disciples.
    marker-yv: yv-n
  - type: text
    text: ' with a yoke that neither we nor our ancestors were able to bear? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: We believe that we are all saved the same way, by the undeserved grace of the Lord Jesus.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Everyone listened quietly as Barnabas and Paul told about the miraculous signs and wonders God had done through them among the Gentiles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When they had finished, James stood and said, “Brothers, listen to me. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Peter
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Simeon.
    marker-yv: yv-n
  - type: text
    text: ' has told you about the time God first visited the Gentiles to take from them a people for himself. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And this conversion of Gentiles is exactly what the prophets predicted. As it is written:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ‘Afterward I will return
- type: usfm
  marker: q2
  children:
  - type: text
    text: and restore the fallen house
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'kingdom; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tent.
    marker-yv: yv-n
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will rebuild its ruins
- type: usfm
  marker: q2
  children:
  - type: text
    text: and restore it,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'so that the rest of humanity might seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: including the Gentiles—
- type: usfm
  marker: q2
  children:
  - type: text
    text: all those I have called to be mine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken—'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: he who made these things known so long ago.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:16-18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Amos 9:11-12 (Greek version); Isa 45:21.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“And so my judgment is that we should not make it difficult for the Gentiles who are turning to God. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Instead, we should write and tell them to abstain from eating food offered to idols, from sexual immorality, from eating the meat of strangled animals, and from consuming blood. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For these laws of Moses have been preached in Jewish synagogues in every city on every Sabbath for many generations.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Letter for Gentile Believers
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then the apostles and elders together with the whole church in Jerusalem chose delegates, and they sent them to Antioch of Syria with Paul and Barnabas to report on this decision. The men chosen were two of the church leaders
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: were leaders among the brothers.
    marker-yv: yv-n
  - type: text
    text: '—Judas (also called Barsabbas) and Silas. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'This is the letter they took with them:'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: “This letter is from the apostles and elders, your brothers in Jerusalem. It is written to the Gentile believers in Antioch, Syria, and Cilicia. Greetings!
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“We understand that some men from here have troubled you and upset you with their teaching, but we did not send them! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So we decided, having come to complete agreement, to send you official representatives, along with our beloved Barnabas and Paul, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'who have risked their lives for the name of our Lord Jesus Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: We are sending Judas and Silas to confirm what we have decided concerning your question.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“For it seemed good to the Holy Spirit and to us to lay no greater burden on you than these few requirements: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: You must abstain from eating food offered to idols, from consuming blood or the meat of strangled animals, and from sexual immorality. If you do this, you will do well. Farewell.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The messengers went at once to Antioch, where they called a general meeting of the believers and delivered the letter. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: And there was great joy throughout the church that day as they read this encouraging message.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Then Judas and Silas, both being prophets, spoke at length to the believers, encouraging and strengthening their faith. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: They stayed for a while, and then the believers sent them back to the church in Jerusalem with a blessing of peace.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts add verse 34, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: But Silas decided to stay there.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Paul and Barnabas stayed in Antioch. They and many others taught and preached the word of the Lord there.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul and Barnabas Separate
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'After some time Paul said to Barnabas, “Let’s go back and visit each city where we previously preached the word of the Lord, to see how the new believers are doing.” '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Barnabas agreed and wanted to take along John Mark. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'But Paul disagreed strongly, since John Mark had deserted them in Pamphylia and had not continued with them in their work. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Their disagreement was so sharp that they separated. Barnabas took John Mark with him and sailed for Cyprus. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Paul chose Silas, and as he left, the believers entrusted him to the Lord’s gracious care. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Then he traveled throughout Syria and Cilicia, strengthening the churches there.
