document_id: JDG.13,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Birth of Samson
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Again the Israelites did evil in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight, so the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' handed them over to the Philistines, who oppressed them for forty years.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: So she quickly ran and told her husband, “The man who appeared to me the other day is here again!”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Manoah ran back with his wife and asked, “Are you the man who spoke to my wife the other day?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes,” he replied, “I am.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: So Manoah asked him, “When your words come true, what kind of rules should govern the boy’s life and work?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replied, “Be sure your wife follows the instructions I gave her. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: She must not eat grapes or raisins, drink wine or any other alcoholic drink, or eat any forbidden food.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then Manoah said to the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “Please stay here until we can prepare a young goat for you to eat.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“I will stay,” the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replied, “but I will not eat anything. However, you may prepare a burnt offering as a sacrifice to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.” (Manoah didn’t realize it was the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .)
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Manoah asked the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “What is your name? For when all this comes true, we want to honor you.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Why do you ask my name?” the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replied. “It is too wonderful for you to understand.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then Manoah took a young goat and a grain offering and offered it on a rock as a sacrifice to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. And as Manoah and his wife watched, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did an amazing thing. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'In those days a man named Manoah from the tribe of Dan lived in the town of Zorah. His wife was unable to become pregnant, and they had no children. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'As the flames from the altar shot up toward the sky, the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' ascended in the fire. When Manoah and his wife saw this, they fell with their faces to the ground.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The angel did not appear again to Manoah and his wife. Manoah finally realized it was the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: and he said to his wife, “We will certainly die, for we have seen God!”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But his wife said, “If the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' were going to kill us, he wouldn’t have accepted our burnt offering and grain offering. He wouldn’t have appeared to us and told us this wonderful thing and done these miracles.”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'When her son was born, she named him Samson. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' blessed him as he grew up. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' began to stir him while he lived in Mahaneh-dan, which is located between the towns of Zorah and Eshtaol.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to Manoah’s wife and said, “Even though you have been unable to have children, you will soon become pregnant and give birth to a son. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So be careful; you must not drink wine or any other alcoholic drink nor eat any forbidden food.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'any unclean thing; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 13:7, 14.
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You will become pregnant and give birth to a son, and his hair must never be cut. For he will be dedicated to God as a Nazirite from birth. He will begin to rescue Israel from the Philistines.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The woman ran and told her husband, “A man of God appeared to me! He looked like one of God’s angels, terrifying to see. I didn’t ask where he was from, and he didn’t tell me his name. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But he told me, ‘You will become pregnant and give birth to a son. You must not drink wine or any other alcoholic drink nor eat any forbidden food. For your son will be dedicated to God as a Nazirite from the moment of his birth until the day of his death.’”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then Manoah prayed to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, “Lord, please let the man of God come back to us again and give us more instructions about this son who is to be born.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'God answered Manoah’s prayer, and the angel of God appeared once again to his wife as she was sitting in the field. But her husband, Manoah, was not with her. '
