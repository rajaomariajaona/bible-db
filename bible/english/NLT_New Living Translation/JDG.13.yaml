document_id: JDG.13,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Birth of Samson
  - type: text
    content: 'Again the Israelites did evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, so the '
  - type: text
    content: Lord
  - type: text
    content: ' handed them over to the Philistines, who oppressed them for forty years.'
  '10':
  - type: text
    content: So she quickly ran and told her husband, “The man who appeared to me the other day is here again!”
  '11':
  - type: text
    content: Manoah ran back with his wife and asked, “Are you the man who spoke to my wife the other day?”
  - type: text
    content: “Yes,” he replied, “I am.”
  '12':
  - type: text
    content: So Manoah asked him, “When your words come true, what kind of rules should govern the boy’s life and work?”
  '13':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “Be sure your wife follows the instructions I gave her. '
  '14':
  - type: text
    content: She must not eat grapes or raisins, drink wine or any other alcoholic drink, or eat any forbidden food.”
  '15':
  - type: text
    content: 'Then Manoah said to the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', “Please stay here until we can prepare a young goat for you to eat.”'
  '16':
  - type: text
    content: '“I will stay,” the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “but I will not eat anything. However, you may prepare a burnt offering as a sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: '.” (Manoah didn’t realize it was the angel of the '
  - type: text
    content: Lord
  - type: text
    content: .)
  '17':
  - type: text
    content: 'Then Manoah asked the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', “What is your name? For when all this comes true, we want to honor you.”'
  '18':
  - type: text
    content: '“Why do you ask my name?” the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' replied. “It is too wonderful for you to understand.”'
  '19':
  - type: text
    content: 'Then Manoah took a young goat and a grain offering and offered it on a rock as a sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: '. And as Manoah and his wife watched, the '
  - type: text
    content: Lord
  - type: text
    content: ' did an amazing thing. '
  '2':
  - type: text
    content: 'In those days a man named Manoah from the tribe of Dan lived in the town of Zorah. His wife was unable to become pregnant, and they had no children. '
  '20':
  - type: text
    content: 'As the flames from the altar shot up toward the sky, the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' ascended in the fire. When Manoah and his wife saw this, they fell with their faces to the ground.'
  '21':
  - type: text
    content: 'The angel did not appear again to Manoah and his wife. Manoah finally realized it was the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '22':
  - type: text
    content: and he said to his wife, “We will certainly die, for we have seen God!”
  '23':
  - type: text
    content: 'But his wife said, “If the '
  - type: text
    content: Lord
  - type: text
    content: ' were going to kill us, he wouldn’t have accepted our burnt offering and grain offering. He wouldn’t have appeared to us and told us this wonderful thing and done these miracles.”'
  '24':
  - type: text
    content: 'When her son was born, she named him Samson. And the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed him as he grew up. '
  '25':
  - type: text
    content: 'And the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' began to stir him while he lived in Mahaneh-dan, which is located between the towns of Zorah and Eshtaol.'
  '3':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to Manoah’s wife and said, “Even though you have been unable to have children, you will soon become pregnant and give birth to a son. '
  '4':
  - type: text
    content: So be careful; you must not drink wine or any other alcoholic drink nor eat any forbidden food.
  - type: note
    content: Hebrew any unclean thing; also in 13:7, 14.
  - type: text
    content: ' '
  '5':
  - type: text
    content: You will become pregnant and give birth to a son, and his hair must never be cut. For he will be dedicated to God as a Nazirite from birth. He will begin to rescue Israel from the Philistines.”
  '6':
  - type: text
    content: 'The woman ran and told her husband, “A man of God appeared to me! He looked like one of God’s angels, terrifying to see. I didn’t ask where he was from, and he didn’t tell me his name. '
  '7':
  - type: text
    content: But he told me, ‘You will become pregnant and give birth to a son. You must not drink wine or any other alcoholic drink nor eat any forbidden food. For your son will be dedicated to God as a Nazirite from the moment of his birth until the day of his death.’”
  '8':
  - type: text
    content: 'Then Manoah prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, “Lord, please let the man of God come back to us again and give us more instructions about this son who is to be born.”'
  '9':
  - type: text
    content: 'God answered Manoah’s prayer, and the angel of God appeared once again to his wife as she was sitting in the field. But her husband, Manoah, was not with her. '
