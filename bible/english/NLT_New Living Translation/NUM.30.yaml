document_id: NUM.30,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws concerning Vows
  - type: text
    content: ' '
  - type: note
    content: Verses 30:1-16 are numbered 30:2-17 in Hebrew text.
  - type: text
    content: 'Then Moses summoned the leaders of the tribes of Israel and told them, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded: '
  '10':
  - type: text
    content: '“But suppose a woman is married and living in her husband’s home when she makes a vow or binds herself with a pledge. '
  '11':
  - type: text
    content: 'If her husband hears of it and does not object to it, her vow or pledge will stand. '
  '12':
  - type: text
    content: 'But if her husband refuses to accept it on the day he hears of it, her vow or pledge will be nullified, and the '
  - type: text
    content: Lord
  - type: text
    content: ' will forgive her. '
  '13':
  - type: text
    content: 'So her husband may either confirm or nullify any vows or pledges she makes to deny herself. '
  '14':
  - type: text
    content: 'But if he does not object on the day he hears of it, then he is agreeing to all her vows and pledges. '
  '15':
  - type: text
    content: If he waits more than a day and then tries to nullify a vow or pledge, he will be punished for her guilt.”
  '16':
  - type: text
    content: 'These are the regulations the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Moses concerning relationships between a man and his wife, and between a father and a young daughter who still lives at home.'
  '2':
  - type: text
    content: 'A man who makes a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ' or makes a pledge under oath must never break it. He must do exactly what he said he would do.'
  '3':
  - type: text
    content: '“If a young woman makes a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ' or a pledge under oath while she is still living at her father’s home, '
  '4':
  - type: text
    content: 'and her father hears of the vow or pledge and does not object to it, then all her vows and pledges will stand. '
  '5':
  - type: text
    content: 'But if her father refuses to let her fulfill the vow or pledge on the day he hears of it, then all her vows and pledges will become invalid. The '
  - type: text
    content: Lord
  - type: text
    content: ' will forgive her because her father would not let her fulfill them.'
  '6':
  - type: text
    content: '“Now suppose a young woman makes a vow or binds herself with an impulsive pledge and later marries. '
  '7':
  - type: text
    content: 'If her husband learns of her vow or pledge and does not object on the day he hears of it, her vows and pledges will stand. '
  '8':
  - type: text
    content: 'But if her husband refuses to accept her vow or impulsive pledge on the day he hears of it, he nullifies her commitments, and the '
  - type: text
    content: Lord
  - type: text
    content: ' will forgive her. '
  '9':
  - type: text
    content: If, however, a woman is a widow or is divorced, she must fulfill all her vows and pledges.
