  - type: text
    text: Laws concerning Vows
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses 30:1-16 are numbered 30:2-17 in Hebrew text.
    marker-yv: yv-n
  - type: text
    text: 'Then Moses summoned the leaders of the tribes of Israel and told them, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has commanded: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A man who makes a vow to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' or makes a pledge under oath must never break it. He must do exactly what he said he would do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“If a young woman makes a vow to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' or a pledge under oath while she is still living at her father’s home, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and her father hears of the vow or pledge and does not object to it, then all her vows and pledges will stand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But if her father refuses to let her fulfill the vow or pledge on the day he hears of it, then all her vows and pledges will become invalid. The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will forgive her because her father would not let her fulfill them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Now suppose a young woman makes a vow or binds herself with an impulsive pledge and later marries. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'If her husband learns of her vow or pledge and does not object on the day he hears of it, her vows and pledges will stand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But if her husband refuses to accept her vow or impulsive pledge on the day he hears of it, he nullifies her commitments, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will forgive her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: If, however, a woman is a widow or is divorced, she must fulfill all her vows and pledges.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“But suppose a woman is married and living in her husband’s home when she makes a vow or binds herself with a pledge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'If her husband hears of it and does not object to it, her vow or pledge will stand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But if her husband refuses to accept it on the day he hears of it, her vow or pledge will be nullified, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will forgive her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So her husband may either confirm or nullify any vows or pledges she makes to deny herself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But if he does not object on the day he hears of it, then he is agreeing to all her vows and pledges. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: If he waits more than a day and then tries to nullify a vow or pledge, he will be punished for her guilt.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'These are the regulations the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave Moses concerning relationships between a man and his wife, and between a father and a young daughter who still lives at home.'
