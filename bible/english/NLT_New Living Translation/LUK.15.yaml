document_id: LUK.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of the Lost Sheep
  - type: text
    content: 'Tax collectors and other notorious sinners often came to listen to Jesus teach. '
  '10':
  - type: text
    content: In the same way, there is joy in the presence of God’s angels when even one sinner repents.”
  - type: heading
    content: Parable of the Lost Son
  '11':
  - type: text
    content: 'To illustrate the point further, Jesus told them this story: '
  - type: text
    content: “A man had two sons.
  - type: text
    content: ' '
  '12':
  - type: text
    content: The younger son told his father, ‘I want my share of your estate now before you die.’ So his father agreed to divide his wealth between his sons.
  '13':
  - type: text
    content: ' '
  - type: text
    content: “A few days later this younger son packed all his belongings and moved to a distant land, and there he wasted all his money in wild living.
  - type: text
    content: ' '
  '14':
  - type: text
    content: About the time his money ran out, a great famine swept over the land, and he began to starve.
  - type: text
    content: ' '
  '15':
  - type: text
    content: He persuaded a local farmer to hire him, and the man sent him into his fields to feed the pigs.
  - type: text
    content: ' '
  '16':
  - type: text
    content: The young man became so hungry that even the pods he was feeding the pigs looked good to him. But no one gave him anything.
  '17':
  - type: text
    content: ' '
  - type: text
    content: “When he finally came to his senses, he said to himself, ‘At home even the hired servants have food enough to spare, and here I am dying of hunger!
  - type: text
    content: ' '
  '18':
  - type: text
    content: I will go home to my father and say, “Father, I have sinned against both heaven and you,
  - type: text
    content: ' '
  '19':
  - type: text
    content: and I am no longer worthy of being called your son. Please take me on as a hired servant.”’
  '2':
  - type: text
    content: This made the Pharisees and teachers of religious law complain that he was associating with such sinful people—even eating with them!
  '20':
  - type: text
    content: ' '
  - type: text
    content: “So he returned home to his father. And while he was still a long way off, his father saw him coming. Filled with love and compassion, he ran to his son, embraced him, and kissed him.
  - type: text
    content: ' '
  '21':
  - type: text
    content: His son said to him, ‘Father, I have sinned against both heaven and you, and I am no longer worthy of being called your son.
  - type: note
    content: Some manuscripts add Please take me on as a hired servant.
  - type: text
    content: ’
  '22':
  - type: text
    content: ' '
  - type: text
    content: “But his father said to the servants, ‘Quick! Bring the finest robe in the house and put it on him. Get a ring for his finger and sandals for his feet.
  - type: text
    content: ' '
  '23':
  - type: text
    content: And kill the calf we have been fattening. We must celebrate with a feast,
  - type: text
    content: ' '
  '24':
  - type: text
    content: for this son of mine was dead and has now returned to life. He was lost, but now he is found.’ So the party began.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “Meanwhile, the older son was in the fields working. When he returned home, he heard music and dancing in the house,
  - type: text
    content: ' '
  '26':
  - type: text
    content: and he asked one of the servants what was going on.
  - type: text
    content: ' '
  '27':
  - type: text
    content: ‘Your brother is back,’ he was told, ‘and your father has killed the fattened calf. We are celebrating because of his safe return.’
  '28':
  - type: text
    content: ' '
  - type: text
    content: “The older brother was angry and wouldn’t go in. His father came out and begged him,
  - type: text
    content: ' '
  '29':
  - type: text
    content: but he replied, ‘All these years I’ve slaved for you and never once refused to do a single thing you told me to. And in all that time you never gave me even one young goat for a feast with my friends.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'So Jesus told them this story: '
  '30':
  - type: text
    content: Yet when this son of yours comes back after squandering your money on prostitutes, you celebrate by killing the fattened calf!’
  '31':
  - type: text
    content: ' '
  - type: text
    content: “His father said to him, ‘Look, dear son, you have always stayed by me, and everything I have is yours.
  - type: text
    content: ' '
  '32':
  - type: text
    content: We had to celebrate this happy day. For your brother was dead and has come back to life! He was lost, but now he is found!’”
  '4':
  - type: text
    content: “If a man has a hundred sheep and one of them gets lost, what will he do? Won’t he leave the ninety-nine others in the wilderness and go to search for the one that is lost until he finds it?
  - type: text
    content: ' '
  '5':
  - type: text
    content: And when he has found it, he will joyfully carry it home on his shoulders.
  - type: text
    content: ' '
  '6':
  - type: text
    content: When he arrives, he will call together his friends and neighbors, saying, ‘Rejoice with me because I have found my lost sheep.’
  - type: text
    content: ' '
  '7':
  - type: text
    content: In the same way, there is more joy in heaven over one lost sinner who repents and returns to God than over ninety-nine others who are righteous and haven’t strayed away!
  - type: heading
    content: Parable of the Lost Coin
  '8':
  - type: text
    content: ' '
  - type: text
    content: “Or suppose a woman has ten silver coins
  - type: text
    content: ' '
  - type: note
    content: Greek ten drachmas. A drachma was the equivalent of a full day’s wage.
  - type: text
    content: and loses one. Won’t she light a lamp and sweep the entire house and search carefully until she finds it?
  - type: text
    content: ' '
  '9':
  - type: text
    content: And when she finds it, she will call in her friends and neighbors and say, ‘Rejoice with me because I have found my lost coin.’
  - type: text
    content: ' '
