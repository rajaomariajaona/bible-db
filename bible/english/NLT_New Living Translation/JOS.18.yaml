document_id: JOS.18,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Allotments of the Remaining Land
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Now that the land was under Israelite control, the entire community of Israel gathered at Shiloh and set up the Tabernacle.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tent of Meeting.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there at Shiloh, Joshua cast sacred lots in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to determine which tribe should have each section.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Land Given to Benjamin
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The first allotment of land went to the clans of the tribe of Benjamin. It lay between the territory assigned to the tribes of Judah and Joseph.
  '12':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'The northern boundary of Benjamin’s land began at the Jordan River, went north of the slope of Jericho, then west through the hill country and the wilderness of Beth-aven. '
  '13':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: From there the boundary went south to Luz (that is, Bethel) and proceeded down to Ataroth-addar on the hill that lies south of Lower Beth-horon.
  '14':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: The boundary then made a turn and swung south along the western edge of the hill facing Beth-horon, ending at the village of Kiriath-baal (that is, Kiriath-jearim), a town belonging to the tribe of Judah. This was the western boundary.
  '15':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: The southern boundary began at the outskirts of Kiriath-jearim. From that western point it ran
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:15a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'From there it went to Mozah. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' to the spring at the waters of Nephtoah,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:15b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the spring at Me-nephtoah.
      marker-yv: yv-n
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'and down to the base of the mountain beside the valley of Ben-Hinnom, at the northern end of the valley of Rephaim. From there it went down the valley of Hinnom, crossing south of the slope where the Jebusites lived, and continued down to En-rogel. '
  '17':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'From En-rogel the boundary proceeded in a northerly direction and came to En-shemesh and on to Geliloth (which is across from the slopes of Adummim). Then it went down to the Stone of Bohan. (Bohan was Reuben’s son.) '
  '18':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: From there it passed along the north side of the slope overlooking the Jordan Valley.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'overlooking the Arabah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: overlooking Beth-arabah.
      marker-yv: yv-n
    - type: text
      text: ' The border then went down into the valley, '
  '19':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: ran past the north slope of Beth-hoglah, and ended at the north bay of the Dead Sea,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Salt Sea.
      marker-yv: yv-n
    - type: text
      text: ' which is the southern end of the Jordan River. This was the southern boundary.'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But there remained seven tribes who had not yet been allotted their grants of land.
  '20':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: The eastern boundary was the Jordan River.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the boundaries of the homeland allocated to the clans of the tribe of Benjamin.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Towns Given to Benjamin
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the towns given to the clans of the tribe of Benjamin.
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'Jericho, Beth-hoglah, Emek-keziz, '
  '22':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'Beth-arabah, Zemaraim, Bethel, '
  '23':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'Avvim, Parah, Ophrah, '
  '24':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'Kephar-ammoni, Ophni, and Geba—twelve towns with their surrounding villages. '
  '25':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'Also Gibeon, Ramah, Beeroth, '
  '26':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'Mizpah, Kephirah, Mozah, '
  '27':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'Rekem, Irpeel, Taralah, '
  '28':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: Zela, Haeleph, the Jebusite town (that is, Jerusalem), Gibeah, and Kiriath-jearim
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Kiriath.
      marker-yv: yv-n
    - type: text
      text: —fourteen towns with their surrounding villages.
  - type: usfm
    marker: m
    children:
    - type: text
      text: This was the homeland allocated to the clans of the tribe of Benjamin.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua asked them, “How long are you going to wait before taking possession of the remaining land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your ancestors, has given to you? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Select three men from each tribe, and I will send them out to explore the land and map it out. They will then return to me with a written report of their proposed divisions of their new homeland. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let them divide the land into seven sections, excluding Judah’s territory in the south and Joseph’s territory in the north. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when you record the seven divisions of the land and bring them to me, I will cast sacred lots in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God to assign land to each tribe.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The Levites, however, will not receive any allotment of land. Their role as priests of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is their allotment. And the tribes of Gad, Reuben, and the half-tribe of Manasseh won’t receive any more land, for they have already received their grant of land, which Moses, the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', gave them on the east side of the Jordan River.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the men started on their way to map out the land, Joshua commanded them, “Go and explore the land and write a description of it. Then return to me, and I will assign the land to the tribes by casting sacred lots here in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at Shiloh.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The men did as they were told and mapped the entire territory into seven sections, listing the towns in each section. They made a written record and then returned to Joshua in the camp at Shiloh. '
