document_id: JOS.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Allotments of the Remaining Land
  - type: text
    content: Now that the land was under Israelite control, the entire community of Israel gathered at Shiloh and set up the Tabernacle.
  - type: note
    content: Hebrew Tent of Meeting.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'And there at Shiloh, Joshua cast sacred lots in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' to determine which tribe should have each section.'
  - type: heading
    content: The Land Given to Benjamin
  '11':
  - type: text
    content: The first allotment of land went to the clans of the tribe of Benjamin. It lay between the territory assigned to the tribes of Judah and Joseph.
  '12':
  - type: text
    content: 'The northern boundary of Benjamin’s land began at the Jordan River, went north of the slope of Jericho, then west through the hill country and the wilderness of Beth-aven. '
  '13':
  - type: text
    content: From there the boundary went south to Luz (that is, Bethel) and proceeded down to Ataroth-addar on the hill that lies south of Lower Beth-horon.
  '14':
  - type: text
    content: The boundary then made a turn and swung south along the western edge of the hill facing Beth-horon, ending at the village of Kiriath-baal (that is, Kiriath-jearim), a town belonging to the tribe of Judah. This was the western boundary.
  '15':
  - type: text
    content: The southern boundary began at the outskirts of Kiriath-jearim. From that western point it ran
  - type: note
    content: Or From there it went to Mozah. The meaning of the Hebrew is uncertain.
  - type: text
    content: ' to the spring at the waters of Nephtoah,'
  - type: note
    content: Or the spring at Me-nephtoah.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'and down to the base of the mountain beside the valley of Ben-Hinnom, at the northern end of the valley of Rephaim. From there it went down the valley of Hinnom, crossing south of the slope where the Jebusites lived, and continued down to En-rogel. '
  '17':
  - type: text
    content: 'From En-rogel the boundary proceeded in a northerly direction and came to En-shemesh and on to Geliloth (which is across from the slopes of Adummim). Then it went down to the Stone of Bohan. (Bohan was Reuben’s son.) '
  '18':
  - type: text
    content: From there it passed along the north side of the slope overlooking the Jordan Valley.
  - type: note
    content: Hebrew overlooking the Arabah, or overlooking Beth-arabah.
  - type: text
    content: ' The border then went down into the valley, '
  '19':
  - type: text
    content: ran past the north slope of Beth-hoglah, and ended at the north bay of the Dead Sea,
  - type: note
    content: Hebrew Salt Sea.
  - type: text
    content: ' which is the southern end of the Jordan River. This was the southern boundary.'
  '2':
  - type: text
    content: But there remained seven tribes who had not yet been allotted their grants of land.
  '20':
  - type: text
    content: The eastern boundary was the Jordan River.
  - type: text
    content: These were the boundaries of the homeland allocated to the clans of the tribe of Benjamin.
  - type: heading
    content: The Towns Given to Benjamin
  '21':
  - type: text
    content: These were the towns given to the clans of the tribe of Benjamin.
  - type: text
    content: 'Jericho, Beth-hoglah, Emek-keziz, '
  '22':
  - type: text
    content: 'Beth-arabah, Zemaraim, Bethel, '
  '23':
  - type: text
    content: 'Avvim, Parah, Ophrah, '
  '24':
  - type: text
    content: 'Kephar-ammoni, Ophni, and Geba—twelve towns with their surrounding villages. '
  '25':
  - type: text
    content: 'Also Gibeon, Ramah, Beeroth, '
  '26':
  - type: text
    content: 'Mizpah, Kephirah, Mozah, '
  '27':
  - type: text
    content: 'Rekem, Irpeel, Taralah, '
  '28':
  - type: text
    content: Zela, Haeleph, the Jebusite town (that is, Jerusalem), Gibeah, and Kiriath-jearim
  - type: note
    content: As in Greek version; Hebrew reads Kiriath.
  - type: text
    content: —fourteen towns with their surrounding villages.
  - type: text
    content: This was the homeland allocated to the clans of the tribe of Benjamin.
  '3':
  - type: text
    content: 'Then Joshua asked them, “How long are you going to wait before taking possession of the remaining land the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestors, has given to you? '
  '4':
  - type: text
    content: 'Select three men from each tribe, and I will send them out to explore the land and map it out. They will then return to me with a written report of their proposed divisions of their new homeland. '
  '5':
  - type: text
    content: 'Let them divide the land into seven sections, excluding Judah’s territory in the south and Joseph’s territory in the north. '
  '6':
  - type: text
    content: 'And when you record the seven divisions of the land and bring them to me, I will cast sacred lots in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God to assign land to each tribe.'
  '7':
  - type: text
    content: '“The Levites, however, will not receive any allotment of land. Their role as priests of the '
  - type: text
    content: Lord
  - type: text
    content: ' is their allotment. And the tribes of Gad, Reuben, and the half-tribe of Manasseh won’t receive any more land, for they have already received their grant of land, which Moses, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', gave them on the east side of the Jordan River.”'
  '8':
  - type: text
    content: 'As the men started on their way to map out the land, Joshua commanded them, “Go and explore the land and write a description of it. Then return to me, and I will assign the land to the tribes by casting sacred lots here in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' at Shiloh.” '
  '9':
  - type: text
    content: 'The men did as they were told and mapped the entire territory into seven sections, listing the towns in each section. They made a written record and then returned to Joshua in the camp at Shiloh. '
