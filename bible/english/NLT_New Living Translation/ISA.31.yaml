document_id: ISA.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Futility of Relying on Egypt
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: What sorrow awaits those who look to Egypt for help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: trusting their horses, chariots, and charioteers
- type: usfm
  marker: q1
  children:
  - type: text
    text: and depending on the strength of human armies
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'instead of looking to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'In his wisdom, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will send great disaster;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will not change his mind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will rise against the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: and against their helpers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For these Egyptians are mere humans, not God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their horses are puny flesh, not mighty spirits!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' raises his fist against them,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who help will stumble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and those being helped will fall.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will all fall down and die together.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has told me:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “When a strong young lion
- type: usfm
  marker: q2
  children:
  - type: text
    text: stands growling over a sheep it has killed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: it is not frightened by the shouts and noise
- type: usfm
  marker: q2
  children:
  - type: text
    text: of a whole crowd of shepherds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In the same way, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies'
- type: usfm
  marker: q2
  children:
  - type: text
    text: will come down and fight on Mount Zion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies will hover over Jerusalem'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and protect it like a bird protecting its nest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will defend and save the city;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will pass over it and rescue it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Though you are such wicked rebels, my people, come and return to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I know the glorious day will come when each of you will throw away the gold idols and silver images your sinful hands have made.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “The Assyrians will be destroyed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but not by the swords of men.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sword of God will strike them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will panic and flee.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The strong young Assyrians
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be taken away as captives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Even the strongest will quake with terror,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and princes will flee when they see your battle flags,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', whose fire burns in Zion,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose flame blazes from Jerusalem.
