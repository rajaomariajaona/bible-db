document_id: ISA.31,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Futility of Relying on Egypt
  - type: text
    content: What sorrow awaits those who look to Egypt for help,
  - type: text
    content: trusting their horses, chariots, and charioteers
  - type: text
    content: and depending on the strength of human armies
  - type: text
    content: 'instead of looking to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the Holy One of Israel.
  '2':
  - type: text
    content: 'In his wisdom, the '
  - type: text
    content: Lord
  - type: text
    content: ' will send great disaster;'
  - type: text
    content: he will not change his mind.
  - type: text
    content: He will rise against the wicked
  - type: text
    content: and against their helpers.
  '3':
  - type: text
    content: For these Egyptians are mere humans, not God!
  - type: text
    content: Their horses are puny flesh, not mighty spirits!
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' raises his fist against them,'
  - type: text
    content: those who help will stumble,
  - type: text
    content: and those being helped will fall.
  - type: text
    content: They will all fall down and die together.
  '4':
  - type: text
    content: 'But this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has told me:'
  - type: text
    content: “When a strong young lion
  - type: text
    content: stands growling over a sheep it has killed,
  - type: text
    content: it is not frightened by the shouts and noise
  - type: text
    content: of a whole crowd of shepherds.
  - type: text
    content: 'In the same way, the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies'
  - type: text
    content: will come down and fight on Mount Zion.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies will hover over Jerusalem'
  - type: text
    content: and protect it like a bird protecting its nest.
  - type: text
    content: He will defend and save the city;
  - type: text
    content: he will pass over it and rescue it.”
  '6':
  - type: text
    content: 'Though you are such wicked rebels, my people, come and return to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: I know the glorious day will come when each of you will throw away the gold idols and silver images your sinful hands have made.
  '8':
  - type: text
    content: “The Assyrians will be destroyed,
  - type: text
    content: but not by the swords of men.
  - type: text
    content: The sword of God will strike them,
  - type: text
    content: and they will panic and flee.
  - type: text
    content: The strong young Assyrians
  - type: text
    content: will be taken away as captives.
  '9':
  - type: text
    content: Even the strongest will quake with terror,
  - type: text
    content: and princes will flee when they see your battle flags,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ', whose fire burns in Zion,'
  - type: text
    content: whose flame blazes from Jerusalem.
