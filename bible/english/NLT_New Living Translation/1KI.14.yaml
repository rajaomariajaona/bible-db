document_id: 1KI.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Ahijah’s Prophecy against Jeroboam
  - type: text
    content: 'At that time Jeroboam’s son Abijah became very sick. '
  '10':
  - type: text
    content: 'I will bring disaster on your dynasty and will destroy every one of your male descendants, slave and free alike, anywhere in Israel. I will burn up your royal dynasty as one burns up trash until it is all gone. '
  '11':
  - type: text
    content: 'The members of Jeroboam’s family who die in the city will be eaten by dogs, and those who die in the field will be eaten by vultures. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken.’”'
  '12':
  - type: text
    content: 'Then Ahijah said to Jeroboam’s wife, “Go on home, and when you enter the city, the child will die. '
  '13':
  - type: text
    content: 'All Israel will mourn for him and bury him. He is the only member of your family who will have a proper burial, for this child is the only good thing that the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, sees in the entire family of Jeroboam.'
  '14':
  - type: text
    content: '“In addition, the '
  - type: text
    content: Lord
  - type: text
    content: ' will raise up a king over Israel who will destroy the family of Jeroboam. This will happen today, even now! '
  '15':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will shake Israel like a reed whipped about in a stream. He will uproot the people of Israel from this good land that he gave their ancestors and will scatter them beyond the Euphrates River,'
  - type: note
    content: Hebrew the river.
  - type: text
    content: ' for they have angered the '
  - type: text
    content: Lord
  - type: text
    content: ' with the Asherah poles they have set up for worship. '
  '16':
  - type: text
    content: He will abandon Israel because Jeroboam sinned and made Israel sin along with him.”
  '17':
  - type: text
    content: 'So Jeroboam’s wife returned to Tirzah, and the child died just as she walked through the door of her home. '
  '18':
  - type: text
    content: 'And all Israel buried him and mourned for him, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had promised through the prophet Ahijah.'
  '19':
  - type: text
    content: 'The rest of the events in Jeroboam’s reign, including all his wars and how he ruled, are recorded in '
  - type: text
    content: The Book of the History of the Kings of Israel.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'So Jeroboam told his wife, “Disguise yourself so that no one will recognize you as my wife. Then go to the prophet Ahijah at Shiloh—the man who told me I would become king. '
  '20':
  - type: text
    content: Jeroboam reigned in Israel twenty-two years. When Jeroboam died, his son Nadab became the next king.
  - type: heading
    content: Rehoboam Rules in Judah
  '21':
  - type: text
    content: 'Meanwhile, Rehoboam son of Solomon was king in Judah. He was forty-one years old when he became king, and he reigned seventeen years in Jerusalem, the city the '
  - type: text
    content: Lord
  - type: text
    content: ' had chosen from among all the tribes of Israel as the place to honor his name. Rehoboam’s mother was Naamah, an Ammonite woman.'
  '22':
  - type: text
    content: 'During Rehoboam’s reign, the people of Judah did what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, provoking his anger with their sin, for it was even worse than that of their ancestors. '
  '23':
  - type: text
    content: 'For they also built for themselves pagan shrines and set up sacred pillars and Asherah poles on every high hill and under every green tree. '
  '24':
  - type: text
    content: 'There were even male and female shrine prostitutes throughout the land. The people imitated the detestable practices of the pagan nations the '
  - type: text
    content: Lord
  - type: text
    content: ' had driven from the land ahead of the Israelites.'
  '25':
  - type: text
    content: 'In the fifth year of King Rehoboam’s reign, King Shishak of Egypt came up and attacked Jerusalem. '
  '26':
  - type: text
    content: 'He ransacked the treasuries of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple and the royal palace; he stole everything, including all the gold shields Solomon had made. '
  '27':
  - type: text
    content: 'King Rehoboam later replaced them with bronze shields as substitutes, and he entrusted them to the care of the commanders of the guard who protected the entrance to the royal palace. '
  '28':
  - type: text
    content: 'Whenever the king went to the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the guards would also take the shields and then return them to the guardroom.'
  '29':
  - type: text
    content: 'The rest of the events in Rehoboam’s reign and everything he did are recorded in '
  - type: text
    content: The Book of the History of the Kings of Judah.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Take him a gift of ten loaves of bread, some cakes, and a jar of honey, and ask him what will happen to the boy.”
  '30':
  - type: text
    content: 'There was constant war between Rehoboam and Jeroboam. '
  '31':
  - type: text
    content: When Rehoboam died, he was buried among his ancestors in the City of David. His mother was Naamah, an Ammonite woman. Then his son Abijam
  - type: note
    content: Also known as Abijah.
  - type: text
    content: ' became the next king.'
  '4':
  - type: text
    content: 'So Jeroboam’s wife went to Ahijah’s home at Shiloh. He was an old man now and could no longer see. '
  '5':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' had told Ahijah, “Jeroboam’s wife will come here, pretending to be someone else. She will ask you about her son, for he is very sick. Give her the answer I give you.”'
  '6':
  - type: text
    content: 'So when Ahijah heard her footsteps at the door, he called out, “Come in, wife of Jeroboam! Why are you pretending to be someone else?” Then he told her, “I have bad news for you. '
  '7':
  - type: text
    content: 'Give your husband, Jeroboam, this message from the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: ‘I promoted you from the ranks of the common people and made you ruler over my people Israel. '
  '8':
  - type: text
    content: 'I ripped the kingdom away from the family of David and gave it to you. But you have not been like my servant David, who obeyed my commands and followed me with all his heart and always did whatever I wanted. '
  '9':
  - type: text
    content: 'You have done more evil than all who lived before you. You have made other gods for yourself and have made me furious with your gold calves. And since you have turned your back on me, '
