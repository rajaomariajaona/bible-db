document_id: 1KI.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ahijah’s Prophecy against Jeroboam
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'At that time Jeroboam’s son Abijah became very sick. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So Jeroboam told his wife, “Disguise yourself so that no one will recognize you as my wife. Then go to the prophet Ahijah at Shiloh—the man who told me I would become king. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Take him a gift of ten loaves of bread, some cakes, and a jar of honey, and ask him what will happen to the boy.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Jeroboam’s wife went to Ahijah’s home at Shiloh. He was an old man now and could no longer see. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had told Ahijah, “Jeroboam’s wife will come here, pretending to be someone else. She will ask you about her son, for he is very sick. Give her the answer I give you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So when Ahijah heard her footsteps at the door, he called out, “Come in, wife of Jeroboam! Why are you pretending to be someone else?” Then he told her, “I have bad news for you. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Give your husband, Jeroboam, this message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel: ‘I promoted you from the ranks of the common people and made you ruler over my people Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I ripped the kingdom away from the family of David and gave it to you. But you have not been like my servant David, who obeyed my commands and followed me with all his heart and always did whatever I wanted. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'You have done more evil than all who lived before you. You have made other gods for yourself and have made me furious with your gold calves. And since you have turned your back on me, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I will bring disaster on your dynasty and will destroy every one of your male descendants, slave and free alike, anywhere in Israel. I will burn up your royal dynasty as one burns up trash until it is all gone. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The members of Jeroboam’s family who die in the city will be eaten by dogs, and those who die in the field will be eaten by vultures. I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then Ahijah said to Jeroboam’s wife, “Go on home, and when you enter the city, the child will die. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'All Israel will mourn for him and bury him. He is the only member of your family who will have a proper burial, for this child is the only good thing that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, sees in the entire family of Jeroboam.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“In addition, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will raise up a king over Israel who will destroy the family of Jeroboam. This will happen today, even now! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will shake Israel like a reed whipped about in a stream. He will uproot the people of Israel from this good land that he gave their ancestors and will scatter them beyond the Euphrates River,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the river.
    marker-yv: yv-n
  - type: text
    text: ' for they have angered the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with the Asherah poles they have set up for worship. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He will abandon Israel because Jeroboam sinned and made Israel sin along with him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So Jeroboam’s wife returned to Tirzah, and the child died just as she walked through the door of her home. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And all Israel buried him and mourned for him, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had promised through the prophet Ahijah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The rest of the events in Jeroboam’s reign, including all his wars and how he ruled, are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jeroboam reigned in Israel twenty-two years. When Jeroboam died, his son Nadab became the next king.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rehoboam Rules in Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Meanwhile, Rehoboam son of Solomon was king in Judah. He was forty-one years old when he became king, and he reigned seventeen years in Jerusalem, the city the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had chosen from among all the tribes of Israel as the place to honor his name. Rehoboam’s mother was Naamah, an Ammonite woman.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'During Rehoboam’s reign, the people of Judah did what was evil in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s sight, provoking his anger with their sin, for it was even worse than that of their ancestors. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For they also built for themselves pagan shrines and set up sacred pillars and Asherah poles on every high hill and under every green tree. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'There were even male and female shrine prostitutes throughout the land. The people imitated the detestable practices of the pagan nations the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had driven from the land ahead of the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'In the fifth year of King Rehoboam’s reign, King Shishak of Egypt came up and attacked Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'He ransacked the treasuries of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Temple and the royal palace; he stole everything, including all the gold shields Solomon had made. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'King Rehoboam later replaced them with bronze shields as substitutes, and he entrusted them to the care of the commanders of the guard who protected the entrance to the royal palace. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Whenever the king went to the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the guards would also take the shields and then return them to the guardroom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The rest of the events in Rehoboam’s reign and everything he did are recorded in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of the History of the Kings of Judah.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'There was constant war between Rehoboam and Jeroboam. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: When Rehoboam died, he was buried among his ancestors in the City of David. His mother was Naamah, an Ammonite woman. Then his son Abijam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Also known as '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Abijah.
    marker-yv: yv-n
  - type: text
    text: ' became the next king.'
