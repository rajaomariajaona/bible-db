document_id: LUK.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Sends Out the Twelve Disciples
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: One day Jesus called together his twelve disciples
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the Twelve; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'other manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the twelve apostles.
    marker-yv: yv-n
  - type: text
    text: ' and gave them power and authority to cast out all demons and to heal all diseases. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then he sent them out to tell everyone about the Kingdom of God and to heal the sick. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Take nothing for your journey,” '
  - type: text
    text: 'he instructed them. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t take a walking stick, a traveler’s bag, food, money,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: silver coins.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: or even a change of clothes.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Wherever you go, stay in the same house until you leave town.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if a town refuses to welcome you, shake its dust from your feet as you leave to show that you have abandoned those people to their fate.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So they began their circuit of the villages, preaching the Good News and healing the sick.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Herod’s Confusion
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When Herod Antipas, the ruler of Galilee,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Herod the tetrarch. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Herod Antipas was a son of King Herod and was ruler over Galilee.
    marker-yv: yv-n
  - type: text
    text: ' heard about everything Jesus was doing, he was puzzled. Some were saying that John the Baptist had been raised from the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Others thought Jesus was Elijah or one of the other prophets risen from the dead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “I beheaded John,” Herod said, “so who is this man about whom I hear such stories?” And he kept trying to see him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Feeds Five Thousand
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When the apostles returned, they told Jesus everything they had done. Then he slipped quietly away with them toward the town of Bethsaida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But the crowds found out where he was going, and they followed him. He welcomed them and taught them about the Kingdom of God, and he healed those who were sick.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Late in the afternoon the twelve disciples came to him and said, “Send the crowds away to the nearby villages and farms, so they can find food and lodging for the night. There is nothing to eat here in this remote place.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You feed them.”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“But we have only five loaves of bread and two fish,” they answered. “Or are you expecting us to go and buy enough food for this whole crowd?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For there were about 5,000 men there.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Tell them to sit down in groups of about fifty each.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So the people all sat down. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jesus took the five loaves and two fish, looked up toward heaven, and blessed them. Then, breaking the loaves into pieces, he kept giving the bread and fish to the disciples so they could distribute it to the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They all ate as much as they wanted, and afterward, the disciples picked up twelve baskets of leftovers!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter’s Declaration about Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'One day Jesus left the crowds to pray alone. Only his disciples were with him, and he asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who do people say I am?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Well,” they replied, “some say John the Baptist, some say Elijah, and others say you are one of the other ancient prophets risen from the dead.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then he asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But who do you say I am?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Peter replied, “You are the Messiah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the Christ. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Messiah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(a Hebrew term) and '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Christ '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a Greek term) both mean “anointed one.”
    marker-yv: yv-n
  - type: text
    text: ' sent from God!”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Predicts His Death
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jesus warned his disciples not to tell anyone who he was. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The Son of Man
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Son of Man” is a title Jesus used for himself.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'must suffer many terrible things,” '
  - type: text
    text: 'he said. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “He will be rejected by the elders, the leading priests, and the teachers of religious law. He will be killed, but on the third day he will be raised from the dead.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then he said to the crowd, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If any of you wants to be my follower, you must give up your own way, take up your cross daily, and follow me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you try to hang on to your life, you will lose it. But if you give up your life for my sake, you will save it.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And what do you benefit if you gain the whole world but are yourself lost or destroyed?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If anyone is ashamed of me and my message, the Son of Man will be ashamed of that person when he returns in his glory and in the glory of the Father and the holy angels.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I tell you the truth, some standing here right now will not die before they see the Kingdom of God.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Transfiguration
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'About eight days later Jesus took Peter, John, and James up on a mountain to pray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And as he was praying, the appearance of his face was transformed, and his clothes became dazzling white. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Suddenly, two men, Moses and Elijah, appeared and began talking with Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: They were glorious to see. And they were speaking about his exodus from this world, which was about to be fulfilled in Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Peter and the others had fallen asleep. When they woke up, they saw Jesus’ glory and the two men standing with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: As Moses and Elijah were starting to leave, Peter, not even knowing what he was saying, blurted out, “Master, it’s wonderful for us to be here! Let’s make three shelters as memorials
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: three tabernacles.
    marker-yv: yv-n
  - type: text
    text: '—one for you, one for Moses, and one for Elijah.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: But even as he was saying this, a cloud overshadowed them, and terror gripped them as the cloud covered them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Then a voice from the cloud said, “This is my Son, my Chosen One.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: This is my dearly loved Son.
    marker-yv: yv-n
  - type: text
    text: ' Listen to him.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: When the voice finished, Jesus was there alone. They didn’t tell anyone at that time what they had seen.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals a Demon-Possessed Boy
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'The next day, after they had come down the mountain, a large crowd met Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'A man in the crowd called out to him, “Teacher, I beg you to look at my son, my only child. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'An evil spirit keeps seizing him, making him scream. It throws him into convulsions so that he foams at the mouth. It batters him and hardly ever leaves him alone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: I begged your disciples to cast out the spirit, but they couldn’t do it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You faithless and corrupt people! How long must I be with you and put up with you?”
  - type: text
    text: ' Then he said to the man, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Bring your son here.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: As the boy came forward, the demon knocked him to the ground and threw him into a violent convulsion. But Jesus rebuked the evil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: unclean.
    marker-yv: yv-n
  - type: text
    text: ' spirit and healed the boy. Then he gave him back to his father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Awe gripped the people as they saw this majestic display of God’s power.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Again Predicts His Death
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: text
    text: 'While everyone was marveling at everything he was doing, Jesus said to his disciples, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Listen to me and remember what I say. The Son of Man is going to be betrayed into the hands of his enemies.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: But they didn’t know what he meant. Its significance was hidden from them, so they couldn’t understand it, and they were afraid to ask him about it.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Greatest in the Kingdom
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Then his disciples began arguing about which of them was the greatest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'But Jesus knew their thoughts, so he brought a little child to his side. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Then he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Anyone who welcomes a little child like this on my behalf
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:48 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in my name.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: welcomes me, and anyone who welcomes me also welcomes my Father who sent me. Whoever is the least among you is the greatest.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Using the Name of Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: John said to Jesus, “Master, we saw someone using your name to cast out demons, but we told him to stop because he isn’t in our group.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'But Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t stop him! Anyone who is not against you is for you.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Opposition from Samaritans
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'As the time drew near for him to ascend to heaven, Jesus resolutely set out for Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'He sent messengers ahead to a Samaritan village to prepare for his arrival. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'But the people of the village did not welcome Jesus because he was on his way to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: When James and John saw this, they said to Jesus, “Lord, should we call down fire from heaven to burn them up
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:54 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts add '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: as Elijah did.
    marker-yv: yv-n
  - type: text
    text: '?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: But Jesus turned and rebuked them.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:55 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts add an expanded conclusion to verse 55 and an additional sentence in verse 56: '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'And he said, “You don’t realize what your hearts are like. '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '56'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: For the Son of Man has not come to destroy people’s lives, but to save them.”
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
