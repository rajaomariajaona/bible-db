document_id: LUK.9,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Sends Out the Twelve Disciples
  - type: text
    content: One day Jesus called together his twelve disciples
  - type: note
    content: Greek the Twelve; other manuscripts read the twelve apostles.
  - type: text
    content: ' and gave them power and authority to cast out all demons and to heal all diseases. '
  '10':
  - type: text
    content: 'When the apostles returned, they told Jesus everything they had done. Then he slipped quietly away with them toward the town of Bethsaida. '
  '11':
  - type: text
    content: But the crowds found out where he was going, and they followed him. He welcomed them and taught them about the Kingdom of God, and he healed those who were sick.
  '12':
  - type: text
    content: Late in the afternoon the twelve disciples came to him and said, “Send the crowds away to the nearby villages and farms, so they can find food and lodging for the night. There is nothing to eat here in this remote place.”
  '13':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “You feed them.”
  - type: text
    content: '“But we have only five loaves of bread and two fish,” they answered. “Or are you expecting us to go and buy enough food for this whole crowd?” '
  '14':
  - type: text
    content: For there were about 5,000 men there.
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Tell them to sit down in groups of about fifty each.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'So the people all sat down. '
  '16':
  - type: text
    content: 'Jesus took the five loaves and two fish, looked up toward heaven, and blessed them. Then, breaking the loaves into pieces, he kept giving the bread and fish to the disciples so they could distribute it to the people. '
  '17':
  - type: text
    content: They all ate as much as they wanted, and afterward, the disciples picked up twelve baskets of leftovers!
  - type: heading
    content: Peter’s Declaration about Jesus
  '18':
  - type: text
    content: 'One day Jesus left the crowds to pray alone. Only his disciples were with him, and he asked them, '
  - type: text
    content: “Who do people say I am?”
  '19':
  - type: text
    content: “Well,” they replied, “some say John the Baptist, some say Elijah, and others say you are one of the other ancient prophets risen from the dead.”
  '2':
  - type: text
    content: 'Then he sent them out to tell everyone about the Kingdom of God and to heal the sick. '
  '20':
  - type: text
    content: 'Then he asked them, '
  - type: text
    content: “But who do you say I am?”
  - type: text
    content: Peter replied, “You are the Messiah
  - type: note
    content: Or the Christ. Messiah (a Hebrew term) and Christ (a Greek term) both mean “anointed one.”
  - type: text
    content: ' sent from God!”'
  - type: heading
    content: Jesus Predicts His Death
  '21':
  - type: text
    content: 'Jesus warned his disciples not to tell anyone who he was. '
  '22':
  - type: text
    content: “The Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: 'must suffer many terrible things,” '
  - type: text
    content: 'he said. '
  - type: text
    content: “He will be rejected by the elders, the leading priests, and the teachers of religious law. He will be killed, but on the third day he will be raised from the dead.”
  '23':
  - type: text
    content: 'Then he said to the crowd, '
  - type: text
    content: “If any of you wants to be my follower, you must give up your own way, take up your cross daily, and follow me.
  - type: text
    content: ' '
  '24':
  - type: text
    content: If you try to hang on to your life, you will lose it. But if you give up your life for my sake, you will save it.
  - type: text
    content: ' '
  '25':
  - type: text
    content: And what do you benefit if you gain the whole world but are yourself lost or destroyed?
  - type: text
    content: ' '
  '26':
  - type: text
    content: If anyone is ashamed of me and my message, the Son of Man will be ashamed of that person when he returns in his glory and in the glory of the Father and the holy angels.
  - type: text
    content: ' '
  '27':
  - type: text
    content: I tell you the truth, some standing here right now will not die before they see the Kingdom of God.”
  - type: heading
    content: The Transfiguration
  '28':
  - type: text
    content: 'About eight days later Jesus took Peter, John, and James up on a mountain to pray. '
  '29':
  - type: text
    content: 'And as he was praying, the appearance of his face was transformed, and his clothes became dazzling white. '
  '3':
  - type: text
    content: '“Take nothing for your journey,” '
  - type: text
    content: 'he instructed them. '
  - type: text
    content: “Don’t take a walking stick, a traveler’s bag, food, money,
  - type: note
    content: Or silver coins.
  - type: text
    content: ' '
  - type: text
    content: or even a change of clothes.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Suddenly, two men, Moses and Elijah, appeared and began talking with Jesus. '
  '31':
  - type: text
    content: They were glorious to see. And they were speaking about his exodus from this world, which was about to be fulfilled in Jerusalem.
  '32':
  - type: text
    content: 'Peter and the others had fallen asleep. When they woke up, they saw Jesus’ glory and the two men standing with him. '
  '33':
  - type: text
    content: As Moses and Elijah were starting to leave, Peter, not even knowing what he was saying, blurted out, “Master, it’s wonderful for us to be here! Let’s make three shelters as memorials
  - type: note
    content: Greek three tabernacles.
  - type: text
    content: '—one for you, one for Moses, and one for Elijah.” '
  '34':
  - type: text
    content: But even as he was saying this, a cloud overshadowed them, and terror gripped them as the cloud covered them.
  '35':
  - type: text
    content: Then a voice from the cloud said, “This is my Son, my Chosen One.
  - type: note
    content: Some manuscripts read This is my dearly loved Son.
  - type: text
    content: ' Listen to him.” '
  '36':
  - type: text
    content: When the voice finished, Jesus was there alone. They didn’t tell anyone at that time what they had seen.
  - type: heading
    content: Jesus Heals a Demon-Possessed Boy
  '37':
  - type: text
    content: 'The next day, after they had come down the mountain, a large crowd met Jesus. '
  '38':
  - type: text
    content: 'A man in the crowd called out to him, “Teacher, I beg you to look at my son, my only child. '
  '39':
  - type: text
    content: 'An evil spirit keeps seizing him, making him scream. It throws him into convulsions so that he foams at the mouth. It batters him and hardly ever leaves him alone. '
  '4':
  - type: text
    content: Wherever you go, stay in the same house until you leave town.
  - type: text
    content: ' '
  '40':
  - type: text
    content: I begged your disciples to cast out the spirit, but they couldn’t do it.”
  '41':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “You faithless and corrupt people! How long must I be with you and put up with you?”
  - type: text
    content: ' Then he said to the man, '
  - type: text
    content: “Bring your son here.”
  '42':
  - type: text
    content: As the boy came forward, the demon knocked him to the ground and threw him into a violent convulsion. But Jesus rebuked the evil
  - type: note
    content: Greek unclean.
  - type: text
    content: ' spirit and healed the boy. Then he gave him back to his father. '
  '43':
  - type: text
    content: Awe gripped the people as they saw this majestic display of God’s power.
  - type: heading
    content: Jesus Again Predicts His Death
  - type: text
    content: 'While everyone was marveling at everything he was doing, Jesus said to his disciples, '
  '44':
  - type: text
    content: “Listen to me and remember what I say. The Son of Man is going to be betrayed into the hands of his enemies.”
  - type: text
    content: ' '
  '45':
  - type: text
    content: But they didn’t know what he meant. Its significance was hidden from them, so they couldn’t understand it, and they were afraid to ask him about it.
  - type: heading
    content: The Greatest in the Kingdom
  '46':
  - type: text
    content: 'Then his disciples began arguing about which of them was the greatest. '
  '47':
  - type: text
    content: 'But Jesus knew their thoughts, so he brought a little child to his side. '
  '48':
  - type: text
    content: 'Then he said to them, '
  - type: text
    content: “Anyone who welcomes a little child like this on my behalf
  - type: note
    content: Greek in my name.
  - type: text
    content: ' '
  - type: text
    content: welcomes me, and anyone who welcomes me also welcomes my Father who sent me. Whoever is the least among you is the greatest.”
  - type: heading
    content: Using the Name of Jesus
  '49':
  - type: text
    content: John said to Jesus, “Master, we saw someone using your name to cast out demons, but we told him to stop because he isn’t in our group.”
  '5':
  - type: text
    content: And if a town refuses to welcome you, shake its dust from your feet as you leave to show that you have abandoned those people to their fate.”
  '50':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “Don’t stop him! Anyone who is not against you is for you.”
  - type: heading
    content: Opposition from Samaritans
  '51':
  - type: text
    content: 'As the time drew near for him to ascend to heaven, Jesus resolutely set out for Jerusalem. '
  '52':
  - type: text
    content: 'He sent messengers ahead to a Samaritan village to prepare for his arrival. '
  '53':
  - type: text
    content: 'But the people of the village did not welcome Jesus because he was on his way to Jerusalem. '
  '54':
  - type: text
    content: When James and John saw this, they said to Jesus, “Lord, should we call down fire from heaven to burn them up
  - type: note
    content: Some manuscripts add as Elijah did.
  - type: text
    content: '?” '
  '55':
  - type: text
    content: But Jesus turned and rebuked them.
  - type: note
    content: 'Some manuscripts add an expanded conclusion to verse 55 and an additional sentence in verse 56: And he said, “You don’t realize what your hearts are like. 56For the Son of Man has not come to destroy people’s lives, but to save them.”'
  - type: text
    content: ' '
  '56':
  - type: text
    content: So they went on to another village.
  - type: heading
    content: The Cost of Following Jesus
  '57':
  - type: text
    content: As they were walking along, someone said to Jesus, “I will follow you wherever you go.”
  '58':
  - type: text
    content: 'But Jesus replied, '
  - type: text
    content: “Foxes have dens to live in, and birds have nests, but the Son of Man has no place even to lay his head.”
  '59':
  - type: text
    content: 'He said to another person, '
  - type: text
    content: “Come, follow me.”
  - type: text
    content: The man agreed, but he said, “Lord, first let me return home and bury my father.”
  '6':
  - type: text
    content: So they began their circuit of the villages, preaching the Good News and healing the sick.
  - type: heading
    content: Herod’s Confusion
  '60':
  - type: text
    content: 'But Jesus told him, '
  - type: text
    content: “Let the spiritually dead bury their own dead!
  - type: note
    content: Greek Let the dead bury their own dead.
  - type: text
    content: ' '
  - type: text
    content: Your duty is to go and preach about the Kingdom of God.”
  '61':
  - type: text
    content: Another said, “Yes, Lord, I will follow you, but first let me say good-bye to my family.”
  '62':
  - type: text
    content: 'But Jesus told him, '
  - type: text
    content: “Anyone who puts a hand to the plow and then looks back is not fit for the Kingdom of God.”
  '7':
  - type: text
    content: When Herod Antipas, the ruler of Galilee,
  - type: note
    content: Greek Herod the tetrarch. Herod Antipas was a son of King Herod and was ruler over Galilee.
  - type: text
    content: ' heard about everything Jesus was doing, he was puzzled. Some were saying that John the Baptist had been raised from the dead. '
  '8':
  - type: text
    content: Others thought Jesus was Elijah or one of the other prophets risen from the dead.
  '9':
  - type: text
    content: “I beheaded John,” Herod said, “so who is this man about whom I hear such stories?” And he kept trying to see him.
  - type: heading
    content: Jesus Feeds Five Thousand
