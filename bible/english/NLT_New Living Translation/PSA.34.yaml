document_id: PSA.34,116
type_code: eng
verses:
  '1':
  - type: note
    content: This psalm is a Hebrew acrostic poem; each verse begins with a successive letter of the Hebrew alphabet.
  - type: text
    content: A psalm of David, regarding the time he pretended to be insane in front of Abimelech, who sent him away.
  - type: text
    content: 'I will praise the '
  - type: text
    content: Lord
  - type: text
    content: ' at all times.'
  - type: text
    content: I will constantly speak his praises.
  '10':
  - type: text
    content: Even strong young lions sometimes go hungry,
  - type: text
    content: 'but those who trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' will lack no good thing.'
  '11':
  - type: text
    content: Come, my children, and listen to me,
  - type: text
    content: 'and I will teach you to fear the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: Does anyone want to live a life
  - type: text
    content: that is long and prosperous?
  '13':
  - type: text
    content: Then keep your tongue from speaking evil
  - type: text
    content: and your lips from telling lies!
  '14':
  - type: text
    content: Turn away from evil and do good.
  - type: text
    content: Search for peace, and work to maintain it.
  '15':
  - type: text
    content: 'The eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' watch over those who do right;'
  - type: text
    content: his ears are open to their cries for help.
  '16':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' turns his face against those who do evil;'
  - type: text
    content: he will erase their memory from the earth.
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' hears his people when they call to him for help.'
  - type: text
    content: He rescues them from all their troubles.
  '18':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is close to the brokenhearted;'
  - type: text
    content: he rescues those whose spirits are crushed.
  '19':
  - type: text
    content: The righteous person faces many troubles,
  - type: text
    content: 'but the '
  - type: text
    content: 'Lord '
  - type: text
    content: comes to the rescue each time.
  '2':
  - type: text
    content: 'I will boast only in the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: let all who are helpless take heart.
  '20':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' protects the bones of the righteous;'
  - type: text
    content: not one of them is broken!
  '21':
  - type: text
    content: Calamity will surely destroy the wicked,
  - type: text
    content: and those who hate the righteous will be punished.
  '22':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' will redeem those who serve him.'
  - type: text
    content: No one who takes refuge in him will be condemned.
  '3':
  - type: text
    content: 'Come, let us tell of the '
  - type: text
    content: Lord
  - type: text
    content: ’s greatness;
  - type: text
    content: let us exalt his name together.
  '4':
  - type: text
    content: 'I prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', and he answered me.'
  - type: text
    content: He freed me from all my fears.
  '5':
  - type: text
    content: Those who look to him for help will be radiant with joy;
  - type: text
    content: no shadow of shame will darken their faces.
  '6':
  - type: text
    content: 'In my desperation I prayed, and the '
  - type: text
    content: Lord
  - type: text
    content: ' listened;'
  - type: text
    content: he saved me from all my troubles.
  '7':
  - type: text
    content: 'For the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' is a guard;'
  - type: text
    content: he surrounds and defends all who fear him.
  '8':
  - type: text
    content: 'Taste and see that the '
  - type: text
    content: Lord
  - type: text
    content: ' is good.'
  - type: text
    content: Oh, the joys of those who take refuge in him!
  '9':
  - type: text
    content: 'Fear the '
  - type: text
    content: Lord
  - type: text
    content: ', you his godly people,'
  - type: text
    content: for those who fear him will have all they need.
