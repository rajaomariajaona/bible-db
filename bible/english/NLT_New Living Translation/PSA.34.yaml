document_id: PSA.34
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This psalm is a Hebrew acrostic poem; each verse begins with a successive letter of the Hebrew alphabet.
    marker-yv: yv-n
  - type: text
    text: A psalm of David, regarding the time he pretended to be insane in front of Abimelech, who sent him away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I will praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' at all times.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will constantly speak his praises.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I will boast only in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let all who are helpless take heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Come, let us tell of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s greatness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let us exalt his name together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I prayed to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and he answered me.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He freed me from all my fears.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Those who look to him for help will be radiant with joy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no shadow of shame will darken their faces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'In my desperation I prayed, and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' listened;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he saved me from all my troubles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is a guard;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he surrounds and defends all who fear him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Taste and see that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is good.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Oh, the joys of those who take refuge in him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you his godly people,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for those who fear him will have all they need.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Even strong young lions sometimes go hungry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but those who trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will lack no good thing.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Come, my children, and listen to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and I will teach you to fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Does anyone want to live a life
- type: usfm
  marker: q2
  children:
  - type: text
    text: that is long and prosperous?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then keep your tongue from speaking evil
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your lips from telling lies!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Turn away from evil and do good.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Search for peace, and work to maintain it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' watch over those who do right;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: his ears are open to their cries for help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' turns his face against those who do evil;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will erase their memory from the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' hears his people when they call to him for help.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He rescues them from all their troubles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is close to the brokenhearted;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he rescues those whose spirits are crushed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The righteous person faces many troubles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'Lord '
  - type: text
    text: comes to the rescue each time.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' protects the bones of the righteous;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: not one of them is broken!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Calamity will surely destroy the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who hate the righteous will be punished.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will redeem those who serve him.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: No one who takes refuge in him will be condemned.
