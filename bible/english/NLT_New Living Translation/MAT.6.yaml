document_id: MAT.6,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Teaching about Giving to the Needy
  - type: text
    content: ' '
  - type: text
    content: “Watch out! Don’t do your good deeds publicly, to be admired by others, for you will lose the reward from your Father in heaven.
  - type: text
    content: ' '
  '10':
  - type: text
    content: ' '
  - type: text
    content: May your Kingdom come soon.
  - type: text
    content: May your will be done on earth,
  - type: text
    content: as it is in heaven.
  '11':
  - type: text
    content: ' '
  - type: text
    content: Give us today the food we need,
  - type: note
    content: Or Give us today our food for the day; or Give us today our food for tomorrow.
  '12':
  - type: text
    content: ' '
  - type: text
    content: and forgive us our sins,
  - type: text
    content: as we have forgiven those who sin against us.
  '13':
  - type: text
    content: ' '
  - type: text
    content: And don’t let us yield to temptation,
  - type: note
    content: Or And keep us from being tested.
  - type: text
    content: but rescue us from the evil one.
  - type: note
    content: Or from evil. Some manuscripts add For yours is the kingdom and the power and the glory forever. Amen.
  '14':
  - type: text
    content: ' '
  - type: text
    content: “If you forgive those who sin against you, your heavenly Father will forgive you.
  - type: text
    content: ' '
  '15':
  - type: text
    content: But if you refuse to forgive others, your Father will not forgive your sins.
  '16':
  - type: text
    content: ' '
  - type: text
    content: “And when you fast, don’t make it obvious, as the hypocrites do, for they try to look miserable and disheveled so people will admire them for their fasting. I tell you the truth, that is the only reward they will ever get.
  - type: text
    content: ' '
  '17':
  - type: text
    content: But when you fast, comb your hair
  - type: note
    content: Greek anoint your head.
  - type: text
    content: ' '
  - type: text
    content: and wash your face.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Then no one will notice that you are fasting, except your Father, who knows what you do in private. And your Father, who sees everything, will reward you.
  - type: heading
    content: Teaching about Money and Possessions
  '19':
  - type: text
    content: ' '
  - type: text
    content: “Don’t store up treasures here on earth, where moths eat them and rust destroys them, and where thieves break in and steal.
  - type: text
    content: ' '
  '2':
  - type: text
    content: When you give to someone in need, don’t do as the hypocrites do—blowing trumpets in the synagogues and streets to call attention to their acts of charity! I tell you the truth, they have received all the reward they will ever get.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Store your treasures in heaven, where moths and rust cannot destroy, and thieves do not break in and steal.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Wherever your treasure is, there the desires of your heart will also be.
  '22':
  - type: text
    content: ' '
  - type: text
    content: “Your eye is like a lamp that provides light for your body. When your eye is healthy, your whole body is filled with light.
  - type: text
    content: ' '
  '23':
  - type: text
    content: But when your eye is unhealthy, your whole body is filled with darkness. And if the light you think you have is actually darkness, how deep that darkness is!
  '24':
  - type: text
    content: ' '
  - type: text
    content: “No one can serve two masters. For you will hate one and love the other; you will be devoted to one and despise the other. You cannot serve God and be enslaved to money.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “That is why I tell you not to worry about everyday life—whether you have enough food and drink, or enough clothes to wear. Isn’t life more than food, and your body more than clothing?
  - type: text
    content: ' '
  '26':
  - type: text
    content: Look at the birds. They don’t plant or harvest or store food in barns, for your heavenly Father feeds them. And aren’t you far more valuable to him than they are?
  - type: text
    content: ' '
  '27':
  - type: text
    content: Can all your worries add a single moment to your life?
  '28':
  - type: text
    content: ' '
  - type: text
    content: “And why worry about your clothing? Look at the lilies of the field and how they grow. They don’t work or make their clothing,
  - type: text
    content: ' '
  '29':
  - type: text
    content: yet Solomon in all his glory was not dressed as beautifully as they are.
  - type: text
    content: ' '
  '3':
  - type: text
    content: But when you give to someone in need, don’t let your left hand know what your right hand is doing.
  - type: text
    content: ' '
  '30':
  - type: text
    content: And if God cares so wonderfully for wildflowers that are here today and thrown into the fire tomorrow, he will certainly care for you. Why do you have so little faith?
  '31':
  - type: text
    content: ' '
  - type: text
    content: “So don’t worry about these things, saying, ‘What will we eat? What will we drink? What will we wear?’
  - type: text
    content: ' '
  '32':
  - type: text
    content: These things dominate the thoughts of unbelievers, but your heavenly Father already knows all your needs.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Seek the Kingdom of God
  - type: note
    content: Some manuscripts do not include of God.
  - type: text
    content: ' '
  - type: text
    content: above all else, and live righteously, and he will give you everything you need.
  '34':
  - type: text
    content: ' '
  - type: text
    content: “So don’t worry about tomorrow, for tomorrow will bring its own worries. Today’s trouble is enough for today.
  '4':
  - type: text
    content: Give your gifts in private, and your Father, who sees everything, will reward you.
  - type: heading
    content: Teaching about Prayer and Fasting
  '5':
  - type: text
    content: ' '
  - type: text
    content: “When you pray, don’t be like the hypocrites who love to pray publicly on street corners and in the synagogues where everyone can see them. I tell you the truth, that is all the reward they will ever get.
  - type: text
    content: ' '
  '6':
  - type: text
    content: But when you pray, go away by yourself, shut the door behind you, and pray to your Father in private. Then your Father, who sees everything, will reward you.
  '7':
  - type: text
    content: ' '
  - type: text
    content: “When you pray, don’t babble on and on as the Gentiles do. They think their prayers are answered merely by repeating their words again and again.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Don’t be like them, for your Father knows exactly what you need even before you ask him!
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Pray like this:'
  - type: text
    content: Our Father in heaven,
  - type: text
    content: may your name be kept holy.
