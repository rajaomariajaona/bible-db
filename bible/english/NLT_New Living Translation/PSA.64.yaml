document_id: PSA.64,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David.'
  - type: text
    content: O God, listen to my complaint.
  - type: text
    content: Protect my life from my enemies’ threats.
  '10':
  - type: text
    content: 'The godly will rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: and find shelter in him.
  - type: text
    content: And those who do what is right
  - type: text
    content: will praise him.
  '2':
  - type: text
    content: Hide me from the plots of this evil mob,
  - type: text
    content: from this gang of wrongdoers.
  '3':
  - type: text
    content: They sharpen their tongues like swords
  - type: text
    content: and aim their bitter words like arrows.
  '4':
  - type: text
    content: They shoot from ambush at the innocent,
  - type: text
    content: attacking suddenly and fearlessly.
  '5':
  - type: text
    content: They encourage each other to do evil
  - type: text
    content: and plan how to set their traps in secret.
  - type: text
    content: “Who will ever notice?” they ask.
  '6':
  - type: text
    content: As they plot their crimes, they say,
  - type: text
    content: “We have devised the perfect plan!”
  - type: text
    content: Yes, the human heart and mind are cunning.
  '7':
  - type: text
    content: But God himself will shoot them with his arrows,
  - type: text
    content: suddenly striking them down.
  '8':
  - type: text
    content: Their own tongues will ruin them,
  - type: text
    content: and all who see them will shake their heads in scorn.
  '9':
  - type: text
    content: Then everyone will be afraid;
  - type: text
    content: they will proclaim the mighty acts of God
  - type: text
    content: and realize all the amazing things he does.
