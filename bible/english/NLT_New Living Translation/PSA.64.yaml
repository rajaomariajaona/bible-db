document_id: PSA.64
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God, listen to my complaint.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Protect my life from my enemies’ threats.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hide me from the plots of this evil mob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from this gang of wrongdoers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They sharpen their tongues like swords
- type: usfm
  marker: q2
  children:
  - type: text
    text: and aim their bitter words like arrows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They shoot from ambush at the innocent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: attacking suddenly and fearlessly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They encourage each other to do evil
- type: usfm
  marker: q2
  children:
  - type: text
    text: and plan how to set their traps in secret.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Who will ever notice?” they ask.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: As they plot their crimes, they say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “We have devised the perfect plan!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, the human heart and mind are cunning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But God himself will shoot them with his arrows,
- type: usfm
  marker: q2
  children:
  - type: text
    text: suddenly striking them down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Their own tongues will ruin them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all who see them will shake their heads in scorn.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then everyone will be afraid;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will proclaim the mighty acts of God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and realize all the amazing things he does.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The godly will rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and find shelter in him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those who do what is right
- type: usfm
  marker: q2
  children:
  - type: text
    text: will praise him.
