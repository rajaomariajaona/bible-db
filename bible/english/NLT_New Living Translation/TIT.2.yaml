document_id: TIT.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Promote Right Teaching
  - type: text
    content: 'As for you, Titus, promote the kind of living that reflects wholesome teaching. '
  '10':
  - type: text
    content: or steal, but must show themselves to be entirely trustworthy and good. Then they will make the teaching about God our Savior attractive in every way.
  '11':
  - type: text
    content: 'For the grace of God has been revealed, bringing salvation to all people. '
  '12':
  - type: text
    content: 'And we are instructed to turn from godless living and sinful pleasures. We should live in this evil world with wisdom, righteousness, and devotion to God, '
  '13':
  - type: text
    content: 'while we look forward with hope to that wonderful day when the glory of our great God and Savior, Jesus Christ, will be revealed. '
  '14':
  - type: text
    content: He gave his life to free us from every kind of sin, to cleanse us, and to make us his very own people, totally committed to doing good deeds.
  '15':
  - type: text
    content: You must teach these things and encourage the believers to do them. You have the authority to correct them when necessary, so don’t let anyone disregard what you say.
  '2':
  - type: text
    content: Teach the older men to exercise self-control, to be worthy of respect, and to live wisely. They must have sound faith and be filled with love and patience.
  '3':
  - type: text
    content: Similarly, teach the older women to live in a way that honors God. They must not slander others or be heavy drinkers.
  - type: note
    content: Greek be enslaved to much wine.
  - type: text
    content: ' Instead, they should teach others what is good. '
  '4':
  - type: text
    content: 'These older women must train the younger women to love their husbands and their children, '
  '5':
  - type: text
    content: to live wisely and be pure, to work in their homes,
  - type: note
    content: Some manuscripts read to care for their homes.
  - type: text
    content: ' to do good, and to be submissive to their husbands. Then they will not bring shame on the word of God.'
  '6':
  - type: text
    content: 'In the same way, encourage the young men to live wisely. '
  '7':
  - type: text
    content: 'And you yourself must be an example to them by doing good works of every kind. Let everything you do reflect the integrity and seriousness of your teaching. '
  '8':
  - type: text
    content: Teach the truth so that your teaching can’t be criticized. Then those who oppose us will be ashamed and have nothing bad to say about us.
  '9':
  - type: text
    content: 'Slaves must always obey their masters and do their best to please them. They must not talk back '
