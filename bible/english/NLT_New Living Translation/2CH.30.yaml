document_id: 2CH.30,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Preparations for Passover
  - type: text
    content: 'King Hezekiah now sent word to all Israel and Judah, and he wrote letters of invitation to the people of Ephraim and Manasseh. He asked everyone to come to the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' at Jerusalem to celebrate the Passover of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '10':
  - type: text
    content: 'The runners went from town to town throughout Ephraim and Manasseh and as far as the territory of Zebulun. But most of the people just laughed at the runners and made fun of them. '
  '11':
  - type: text
    content: However, some people from Asher, Manasseh, and Zebulun humbled themselves and went to Jerusalem.
  '12':
  - type: text
    content: 'At the same time, God’s hand was on the people in the land of Judah, giving them all one heart to obey the orders of the king and his officials, who were following the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: So a huge crowd assembled at Jerusalem in midspring
  - type: note
    content: Hebrew in the second month. The second month of the ancient Hebrew lunar calendar usually occurs within the months of April and May.
  - type: text
    content: ' to celebrate the Festival of Unleavened Bread. '
  '14':
  - type: text
    content: They set to work and removed the pagan altars from Jerusalem. They took away all the incense altars and threw them into the Kidron Valley.
  '15':
  - type: text
    content: On the fourteenth day of the second month, one month later than usual,
  - type: note
    content: Hebrew On the fourteenth day of the second month. Passover normally began on the fourteenth day of the first month (see Lev 23:5).
  - type: text
    content: ' the people slaughtered the Passover lamb. This shamed the priests and Levites, so they purified themselves and brought burnt offerings to the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: Then they took their places at the Temple as prescribed in the Law of Moses, the man of God. The Levites brought the sacrificial blood to the priests, who then sprinkled it on the altar.
  '17':
  - type: text
    content: 'Since many of the people had not purified themselves, the Levites had to slaughter their Passover lamb for them, to set them apart for the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Most of those who came from Ephraim, Manasseh, Issachar, and Zebulun had not purified themselves. But King Hezekiah prayed for them, and they were allowed to eat the Passover meal anyway, even though this was contrary to the requirements of the Law. For Hezekiah said, “May the '
  - type: text
    content: Lord
  - type: text
    content: ', who is good, pardon those '
  '19':
  - type: text
    content: 'who decide to follow the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, even though they are not properly cleansed for the ceremony.” '
  '2':
  - type: text
    content: The king, his officials, and all the community of Jerusalem decided to celebrate Passover a month later than usual.
  - type: note
    content: Hebrew in the second month. Passover was normally observed in the first month (of the ancient Hebrew lunar calendar).
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' listened to Hezekiah’s prayer and healed the people.'
  '21':
  - type: text
    content: 'So the people of Israel who were present in Jerusalem joyously celebrated the Festival of Unleavened Bread for seven days. Each day the Levites and priests sang to the '
  - type: text
    content: Lord
  - type: text
    content: ', accompanied by loud instruments.'
  - type: note
    content: Or sang to the Lord with all their strength.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Hezekiah encouraged all the Levites regarding the skill they displayed as they served the '
  - type: text
    content: Lord
  - type: text
    content: '. The celebration continued for seven days. Peace offerings were sacrificed, and the people gave thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors.'
  '23':
  - type: text
    content: 'The entire assembly then decided to continue the festival another seven days, so they celebrated joyfully for another week. '
  '24':
  - type: text
    content: King Hezekiah gave the people 1,000 bulls and 7,000 sheep and goats for offerings, and the officials donated 1,000 bulls and 10,000 sheep and goats. Meanwhile, many more priests purified themselves.
  '25':
  - type: text
    content: 'The entire assembly of Judah rejoiced, including the priests, the Levites, all who came from the land of Israel, the foreigners who came to the festival, and all those who lived in Judah. '
  '26':
  - type: text
    content: 'There was great joy in the city, for Jerusalem had not seen a celebration like this one since the days of Solomon, King David’s son. '
  '27':
  - type: text
    content: Then the priests and Levites stood and blessed the people, and God heard their prayer from his holy dwelling in heaven.
  '3':
  - type: text
    content: They were unable to celebrate it at the prescribed time because not enough priests could be purified by then, and the people had not yet assembled at Jerusalem.
  '4':
  - type: text
    content: 'This plan for keeping the Passover seemed right to the king and all the people. '
  '5':
  - type: text
    content: 'So they sent a proclamation throughout all Israel, from Beersheba in the south to Dan in the north, inviting everyone to come to Jerusalem to celebrate the Passover of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. The people had not been celebrating it in great numbers as required in the Law.'
  '6':
  - type: text
    content: 'At the king’s command, runners were sent throughout Israel and Judah. They carried letters that said:'
  - type: text
    content: '“O people of Israel, return to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Abraham, Isaac, and Israel,'
  - type: note
    content: Israel is the name that God gave to Jacob.
  - type: text
    content: ' so that he will return to the few of us who have survived the conquest of the Assyrian kings. '
  '7':
  - type: text
    content: 'Do not be like your ancestors and relatives who abandoned the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, and became an object of derision, as you yourselves can see. '
  '8':
  - type: text
    content: 'Do not be stubborn, as they were, but submit yourselves to the '
  - type: text
    content: Lord
  - type: text
    content: '. Come to his Temple, which he has set apart as holy forever. Worship the '
  - type: text
    content: Lord
  - type: text
    content: ' your God so that his fierce anger will turn away from you.'
  '9':
  - type: text
    content: '“For if you return to the '
  - type: text
    content: Lord
  - type: text
    content: ', your relatives and your children will be treated mercifully by their captors, and they will be able to return to this land. For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is gracious and merciful. If you return to him, he will not continue to turn his face from you.”'
  - type: heading
    content: Celebration of Passover
