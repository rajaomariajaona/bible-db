document_id: 2CH.30
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Preparations for Passover
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'King Hezekiah now sent word to all Israel and Judah, and he wrote letters of invitation to the people of Ephraim and Manasseh. He asked everyone to come to the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' at Jerusalem to celebrate the Passover of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The king, his officials, and all the community of Jerusalem decided to celebrate Passover a month later than usual.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in the second month. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Passover was normally observed in the first month (of the ancient Hebrew lunar calendar).
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They were unable to celebrate it at the prescribed time because not enough priests could be purified by then, and the people had not yet assembled at Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'This plan for keeping the Passover seemed right to the king and all the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So they sent a proclamation throughout all Israel, from Beersheba in the south to Dan in the north, inviting everyone to come to Jerusalem to celebrate the Passover of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. The people had not been celebrating it in great numbers as required in the Law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'At the king’s command, runners were sent throughout Israel and Judah. They carried letters that said:'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: '“O people of Israel, return to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Abraham, Isaac, and Israel,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:6 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Israel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is the name that God gave to Jacob.
    marker-yv: yv-n
  - type: text
    text: ' so that he will return to the few of us who have survived the conquest of the Assyrian kings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Do not be like your ancestors and relatives who abandoned the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of their ancestors, and became an object of derision, as you yourselves can see. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Do not be stubborn, as they were, but submit yourselves to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. Come to his Temple, which he has set apart as holy forever. Worship the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God so that his fierce anger will turn away from you.'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“For if you return to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', your relatives and your children will be treated mercifully by their captors, and they will be able to return to this land. For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is gracious and merciful. If you return to him, he will not continue to turn his face from you.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Celebration of Passover
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The runners went from town to town throughout Ephraim and Manasseh and as far as the territory of Zebulun. But most of the people just laughed at the runners and made fun of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: However, some people from Asher, Manasseh, and Zebulun humbled themselves and went to Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'At the same time, God’s hand was on the people in the land of Judah, giving them all one heart to obey the orders of the king and his officials, who were following the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So a huge crowd assembled at Jerusalem in midspring
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'in the second month. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The second month of the ancient Hebrew lunar calendar usually occurs within the months of April and May.
    marker-yv: yv-n
  - type: text
    text: ' to celebrate the Festival of Unleavened Bread. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They set to work and removed the pagan altars from Jerusalem. They took away all the incense altars and threw them into the Kidron Valley.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: On the fourteenth day of the second month, one month later than usual,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'On the fourteenth day of the second month. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Passover normally began on the fourteenth day of the first month (see Lev 23:5).
    marker-yv: yv-n
  - type: text
    text: ' the people slaughtered the Passover lamb. This shamed the priests and Levites, so they purified themselves and brought burnt offerings to the Temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then they took their places at the Temple as prescribed in the Law of Moses, the man of God. The Levites brought the sacrificial blood to the priests, who then sprinkled it on the altar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Since many of the people had not purified themselves, the Levites had to slaughter their Passover lamb for them, to set them apart for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Most of those who came from Ephraim, Manasseh, Issachar, and Zebulun had not purified themselves. But King Hezekiah prayed for them, and they were allowed to eat the Passover meal anyway, even though this was contrary to the requirements of the Law. For Hezekiah said, “May the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who is good, pardon those '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'who decide to follow the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of their ancestors, even though they are not properly cleansed for the ceremony.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' listened to Hezekiah’s prayer and healed the people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So the people of Israel who were present in Jerusalem joyously celebrated the Festival of Unleavened Bread for seven days. Each day the Levites and priests sang to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', accompanied by loud instruments.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sang to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' with all their strength.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hezekiah encouraged all the Levites regarding the skill they displayed as they served the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. The celebration continued for seven days. Peace offerings were sacrificed, and the people gave thanks to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of their ancestors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The entire assembly then decided to continue the festival another seven days, so they celebrated joyfully for another week. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: King Hezekiah gave the people 1,000 bulls and 7,000 sheep and goats for offerings, and the officials donated 1,000 bulls and 10,000 sheep and goats. Meanwhile, many more priests purified themselves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The entire assembly of Judah rejoiced, including the priests, the Levites, all who came from the land of Israel, the foreigners who came to the festival, and all those who lived in Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'There was great joy in the city, for Jerusalem had not seen a celebration like this one since the days of Solomon, King David’s son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then the priests and Levites stood and blessed the people, and God heard their prayer from his holy dwelling in heaven.
