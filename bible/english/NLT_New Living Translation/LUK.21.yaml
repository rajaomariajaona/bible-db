document_id: LUK.21,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Widow’s Offering
  - type: text
    content: 'While Jesus was in the Temple, he watched the rich people dropping their gifts in the collection box. '
  '10':
  - type: text
    content: 'Then he added, '
  - type: text
    content: “Nation will go to war against nation, and kingdom against kingdom.
  - type: text
    content: ' '
  '11':
  - type: text
    content: There will be great earthquakes, and there will be famines and plagues in many lands, and there will be terrifying things and great miraculous signs from heaven.
  '12':
  - type: text
    content: ' '
  - type: text
    content: “But before all this occurs, there will be a time of great persecution. You will be dragged into synagogues and prisons, and you will stand trial before kings and governors because you are my followers.
  - type: text
    content: ' '
  '13':
  - type: text
    content: But this will be your opportunity to tell them about me.
  - type: note
    content: Or This will be your testimony against them.
  - type: text
    content: ' '
  '14':
  - type: text
    content: So don’t worry in advance about how to answer the charges against you,
  - type: text
    content: ' '
  '15':
  - type: text
    content: for I will give you the right words and such wisdom that none of your opponents will be able to reply or refute you!
  - type: text
    content: ' '
  '16':
  - type: text
    content: Even those closest to you—your parents, brothers, relatives, and friends—will betray you. They will even kill some of you.
  - type: text
    content: ' '
  '17':
  - type: text
    content: And everyone will hate you because you are my followers.
  - type: note
    content: Greek on account of my name.
  - type: text
    content: ' '
  '18':
  - type: text
    content: But not a hair of your head will perish!
  - type: text
    content: ' '
  '19':
  - type: text
    content: By standing firm, you will win your souls.
  '2':
  - type: text
    content: Then a poor widow came by and dropped in two small coins.
  - type: note
    content: Greek two lepta [the smallest of Jewish coins].
  '20':
  - type: text
    content: ' '
  - type: text
    content: “And when you see Jerusalem surrounded by armies, then you will know that the time of its destruction has arrived.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Then those in Judea must flee to the hills. Those in Jerusalem must get out, and those out in the country should not return to the city.
  - type: text
    content: ' '
  '22':
  - type: text
    content: For those will be days of God’s vengeance, and the prophetic words of the Scriptures will be fulfilled.
  - type: text
    content: ' '
  '23':
  - type: text
    content: How terrible it will be for pregnant women and for nursing mothers in those days. For there will be disaster in the land and great anger against this people.
  - type: text
    content: ' '
  '24':
  - type: text
    content: They will be killed by the sword or sent away as captives to all the nations of the world. And Jerusalem will be trampled down by the Gentiles until the period of the Gentiles comes to an end.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “And there will be strange signs in the sun, moon, and stars. And here on earth the nations will be in turmoil, perplexed by the roaring seas and strange tides.
  - type: text
    content: ' '
  '26':
  - type: text
    content: People will be terrified at what they see coming upon the earth, for the powers in the heavens will be shaken.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Then everyone will see the Son of Man
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: coming on a cloud with power and great glory.
  - type: note
    content: See Dan 7:13.
  - type: text
    content: ' '
  '28':
  - type: text
    content: So when all these things begin to happen, stand and look up, for your salvation is near!”
  '29':
  - type: text
    content: 'Then he gave them this illustration: '
  - type: text
    content: “Notice the fig tree, or any other tree.
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: text
    content: '“I tell you the truth,” '
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “this poor widow has given more than all the rest of them.
  - type: text
    content: ' '
  '30':
  - type: text
    content: When the leaves come out, you know without being told that summer is near.
  - type: text
    content: ' '
  '31':
  - type: text
    content: In the same way, when you see all these things taking place, you can know that the Kingdom of God is near.
  - type: text
    content: ' '
  '32':
  - type: text
    content: I tell you the truth, this generation will not pass from the scene until all these things have taken place.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Heaven and earth will disappear, but my words will never disappear.
  '34':
  - type: text
    content: ' '
  - type: text
    content: “Watch out! Don’t let your hearts be dulled by carousing and drunkenness, and by the worries of this life. Don’t let that day catch you unaware,
  - type: text
    content: ' '
  '35':
  - type: text
    content: like a trap. For that day will come upon everyone living on the earth.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Keep alert at all times. And pray that you might be strong enough to escape these coming horrors and stand before the Son of Man.”
  '37':
  - type: text
    content: 'Every day Jesus went to the Temple to teach, and each evening he returned to spend the night on the Mount of Olives. '
  '38':
  - type: text
    content: The crowds gathered at the Temple early each morning to hear him.
  '4':
  - type: text
    content: For they have given a tiny part of their surplus, but she, poor as she is, has given everything she has.”
  - type: heading
    content: Jesus Speaks about the Future
  '5':
  - type: text
    content: 'Some of his disciples began talking about the majestic stonework of the Temple and the memorial decorations on the walls. But Jesus said, '
  '6':
  - type: text
    content: “The time is coming when all these things will be completely demolished. Not one stone will be left on top of another!”
  '7':
  - type: text
    content: “Teacher,” they asked, “when will all this happen? What sign will show us that these things are about to take place?”
  '8':
  - type: text
    content: 'He replied, '
  - type: text
    content: “Don’t let anyone mislead you, for many will come in my name, claiming, ‘I am the Messiah,’
  - type: note
    content: Greek claiming, ‘I am.’
  - type: text
    content: ' '
  - type: text
    content: and saying, ‘The time has come!’ But don’t believe them.
  - type: text
    content: ' '
  '9':
  - type: text
    content: And when you hear of wars and insurrections, don’t panic. Yes, these things must take place first, but the end won’t follow immediately.”
  - type: text
    content: ' '
