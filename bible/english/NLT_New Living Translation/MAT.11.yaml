document_id: MAT.11,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus and John the Baptist
  - type: text
    content: When Jesus had finished giving these instructions to his twelve disciples, he went out to teach and preach in towns throughout the region.
  '10':
  - type: text
    content: John is the man to whom the Scriptures refer when they say,
  - type: text
    content: ‘Look, I am sending my messenger ahead of you,
  - type: text
    content: and he will prepare your way before you.’
  - type: note
    content: Mal 3:1.
  '11':
  - type: text
    content: ' '
  - type: text
    content: “I tell you the truth, of all who have ever lived, none is greater than John the Baptist. Yet even the least person in the Kingdom of Heaven is greater than he is!
  - type: text
    content: ' '
  '12':
  - type: text
    content: And from the time John the Baptist began preaching until now, the Kingdom of Heaven has been forcefully advancing,
  - type: note
    content: Or the Kingdom of Heaven has suffered from violence.
  - type: text
    content: ' '
  - type: text
    content: and violent people are attacking it.
  - type: text
    content: ' '
  '13':
  - type: text
    content: For before John came, all the prophets and the law of Moses looked forward to this present time.
  - type: text
    content: ' '
  '14':
  - type: text
    content: And if you are willing to accept what I say, he is Elijah, the one the prophets said would come.
  - type: note
    content: See Mal 4:5.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Anyone with ears to hear should listen and understand!
  '16':
  - type: text
    content: ' '
  - type: text
    content: “To what can I compare this generation? It is like children playing a game in the public square. They complain to their friends,
  '17':
  - type: text
    content: ' '
  - type: text
    content: ‘We played wedding songs,
  - type: text
    content: and you didn’t dance,
  - type: text
    content: so we played funeral songs,
  - type: text
    content: and you didn’t mourn.’
  '18':
  - type: text
    content: ' '
  - type: text
    content: For John didn’t spend his time eating and drinking, and you say, ‘He’s possessed by a demon.’
  - type: text
    content: ' '
  '19':
  - type: text
    content: The Son of Man,
  - type: note
    content: “Son of Man” is a title Jesus used for himself.
  - type: text
    content: ' '
  - type: text
    content: on the other hand, feasts and drinks, and you say, ‘He’s a glutton and a drunkard, and a friend of tax collectors and other sinners!’ But wisdom is shown to be right by its results.”
  - type: heading
    content: Judgment for the Unbelievers
  '2':
  - type: text
    content: 'John the Baptist, who was in prison, heard about all the things the Messiah was doing. So he sent his disciples to ask Jesus, '
  '20':
  - type: text
    content: 'Then Jesus began to denounce the towns where he had done so many of his miracles, because they hadn’t repented of their sins and turned to God. '
  '21':
  - type: text
    content: “What sorrow awaits you, Korazin and Bethsaida! For if the miracles I did in you had been done in wicked Tyre and Sidon, their people would have repented of their sins long ago, clothing themselves in burlap and throwing ashes on their heads to show their remorse.
  - type: text
    content: ' '
  '22':
  - type: text
    content: I tell you, Tyre and Sidon will be better off on judgment day than you.
  '23':
  - type: text
    content: ' '
  - type: text
    content: “And you people of Capernaum, will you be honored in heaven? No, you will go down to the place of the dead.
  - type: text
    content: ' '
  - type: note
    content: Greek to Hades.
  - type: text
    content: For if the miracles I did for you had been done in wicked Sodom, it would still be here today.
  - type: text
    content: ' '
  '24':
  - type: text
    content: I tell you, even Sodom will be better off on judgment day than you.”
  - type: heading
    content: Jesus’ Prayer of Thanksgiving
  '25':
  - type: text
    content: 'At that time Jesus prayed this prayer: '
  - type: text
    content: “O Father, Lord of heaven and earth, thank you for hiding these things from those who think themselves wise and clever, and for revealing them to the childlike.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Yes, Father, it pleased you to do it this way!
  '27':
  - type: text
    content: ' '
  - type: text
    content: “My Father has entrusted everything to me. No one truly knows the Son except the Father, and no one truly knows the Father except the Son and those to whom the Son chooses to reveal him.”
  '28':
  - type: text
    content: 'Then Jesus said, '
  - type: text
    content: “Come to me, all of you who are weary and carry heavy burdens, and I will give you rest.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Take my yoke upon you. Let me teach you, because I am humble and gentle at heart, and you will find rest for your souls.
  - type: text
    content: ' '
  '3':
  - type: text
    content: “Are you the Messiah we’ve been expecting,
  - type: note
    content: Greek Are you the one who is coming?
  - type: text
    content: ' or should we keep looking for someone else?”'
  '30':
  - type: text
    content: For my yoke is easy to bear, and the burden I give you is light.”
  '4':
  - type: text
    content: 'Jesus told them, '
  - type: text
    content: “Go back to John and tell him what you have heard and seen—
  - type: text
    content: ' '
  '5':
  - type: text
    content: the blind see, the lame walk, those with leprosy are cured, the deaf hear, the dead are raised to life, and the Good News is being preached to the poor.”
  - type: text
    content: ' '
  '6':
  - type: text
    content: And he added, “God blesses those who do not fall away because of me.
  - type: note
    content: Or who are not offended by me.
  - type: text
    content: ”
  '7':
  - type: text
    content: 'As John’s disciples were leaving, Jesus began talking about him to the crowds. '
  - type: text
    content: “What kind of man did you go into the wilderness to see? Was he a weak reed, swayed by every breath of wind?
  - type: text
    content: ' '
  '8':
  - type: text
    content: Or were you expecting to see a man dressed in expensive clothes? No, people with expensive clothes live in palaces.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Were you looking for a prophet? Yes, and he is more than a prophet.
  - type: text
    content: ' '
