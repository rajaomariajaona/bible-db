document_id: JER.30
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Promises of Deliverance
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave another message to Jeremiah. He said, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, says: Write down for the record everything I have said to you, Jeremiah. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For the time is coming when I will restore the fortunes of my people of Israel and Judah. I will bring them home to this land that I gave to their ancestors, and they will possess it again. I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'This is the message the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave concerning Israel and Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I hear cries of fear;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is terror and no peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now let me ask you a question:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do men give birth to babies?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then why do they stand there, ashen-faced,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hands pressed against their sides
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a woman in labor?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: In all history there has never been such a time of terror.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It will be a time of trouble for my people Israel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jacob; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 30:10b, 18. See note on 5:20.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yet in the end they will be saved!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For in that day,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of Heaven’s Armies,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will break the yoke from their necks
- type: usfm
  marker: q2
  children:
  - type: text
    text: and snap their chains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Foreigners will no longer be their masters.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For my people will serve the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God'
- type: usfm
  marker: q1
  children:
  - type: text
    text: and their king descended from David—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the king I will raise up for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “So do not be afraid, Jacob, my servant;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not be dismayed, Israel,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “For I will bring you home again from distant lands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your children will return from their exile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israel will return to a life of peace and quiet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one will terrorize them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For I am with you and will save you,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will completely destroy the nations where I have scattered you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I will not completely destroy you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will discipline you, but with justice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I cannot let you go unpunished.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Your injury is incurable—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a terrible wound.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: There is no one to help you
- type: usfm
  marker: q2
  children:
  - type: text
    text: or to bind up your injury.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No medicine can heal you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: All your lovers—your allies—have left you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do not care about you anymore.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have wounded you cruelly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as though I were your enemy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For your sins are many,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your guilt is great.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Why do you protest your punishment—
- type: usfm
  marker: q2
  children:
  - type: text
    text: this wound that has no cure?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have had to punish you
- type: usfm
  marker: q2
  children:
  - type: text
    text: because your sins are many
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your guilt is great.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “But all who devour you will be devoured,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all your enemies will be sent into exile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All who plunder you will be plundered,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all who attack you will be attacked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I will give you back your health
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and heal your wounds,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “For you are called an outcast—
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zion.
    marker-yv: yv-n
  - type: text
    text: ' for whom no one cares.’”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “When I bring Israel home again from captivity
- type: usfm
  marker: q2
  children:
  - type: text
    text: and restore their fortunes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jerusalem will be rebuilt on its ruins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the palace reconstructed as before.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: There will be joy and songs of thanksgiving,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will multiply my people, not diminish them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will honor them, not despise them.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Their children will prosper as they did long ago.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will establish them as a nation before me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will punish anyone who hurts them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They will have their own ruler again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will come from their own people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will invite him to approach me,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: “for who would dare to come unless invited?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: You will be my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will be your God.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Look! The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s anger bursts out like a storm,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a driving wind that swirls down on the heads of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The fierce anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will not diminish'
- type: usfm
  marker: q2
  children:
  - type: text
    text: until it has finished all he has planned.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the days to come
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will understand all this.
