document_id: JER.30,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Promises of Deliverance
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave another message to Jeremiah. He said, '
  '10':
  - type: text
    content: “So do not be afraid, Jacob, my servant;
  - type: text
    content: do not be dismayed, Israel,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “For I will bring you home again from distant lands,
  - type: text
    content: and your children will return from their exile.
  - type: text
    content: Israel will return to a life of peace and quiet,
  - type: text
    content: and no one will terrorize them.
  '11':
  - type: text
    content: For I am with you and will save you,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “I will completely destroy the nations where I have scattered you,
  - type: text
    content: but I will not completely destroy you.
  - type: text
    content: I will discipline you, but with justice;
  - type: text
    content: I cannot let you go unpunished.”
  '12':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Your injury is incurable—
  - type: text
    content: a terrible wound.
  '13':
  - type: text
    content: There is no one to help you
  - type: text
    content: or to bind up your injury.
  - type: text
    content: No medicine can heal you.
  '14':
  - type: text
    content: All your lovers—your allies—have left you
  - type: text
    content: and do not care about you anymore.
  - type: text
    content: I have wounded you cruelly,
  - type: text
    content: as though I were your enemy.
  - type: text
    content: For your sins are many,
  - type: text
    content: and your guilt is great.
  '15':
  - type: text
    content: Why do you protest your punishment—
  - type: text
    content: this wound that has no cure?
  - type: text
    content: I have had to punish you
  - type: text
    content: because your sins are many
  - type: text
    content: and your guilt is great.
  '16':
  - type: text
    content: “But all who devour you will be devoured,
  - type: text
    content: and all your enemies will be sent into exile.
  - type: text
    content: All who plunder you will be plundered,
  - type: text
    content: and all who attack you will be attacked.
  '17':
  - type: text
    content: I will give you back your health
  - type: text
    content: 'and heal your wounds,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “For you are called an outcast—
  - type: text
    content: ‘Jerusalem
  - type: note
    content: Hebrew Zion.
  - type: text
    content: ' for whom no one cares.’”'
  '18':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “When I bring Israel home again from captivity
  - type: text
    content: and restore their fortunes,
  - type: text
    content: Jerusalem will be rebuilt on its ruins,
  - type: text
    content: and the palace reconstructed as before.
  '19':
  - type: text
    content: There will be joy and songs of thanksgiving,
  - type: text
    content: and I will multiply my people, not diminish them;
  - type: text
    content: I will honor them, not despise them.
  '2':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: Write down for the record everything I have said to you, Jeremiah. '
  '20':
  - type: text
    content: Their children will prosper as they did long ago.
  - type: text
    content: I will establish them as a nation before me,
  - type: text
    content: and I will punish anyone who hurts them.
  '21':
  - type: text
    content: They will have their own ruler again,
  - type: text
    content: and he will come from their own people.
  - type: text
    content: 'I will invite him to approach me,” says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “for who would dare to come unless invited?
  '22':
  - type: text
    content: You will be my people,
  - type: text
    content: and I will be your God.”
  '23':
  - type: text
    content: 'Look! The '
  - type: text
    content: Lord
  - type: text
    content: ’s anger bursts out like a storm,
  - type: text
    content: a driving wind that swirls down on the heads of the wicked.
  '24':
  - type: text
    content: 'The fierce anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' will not diminish'
  - type: text
    content: until it has finished all he has planned.
  - type: text
    content: In the days to come
  - type: text
    content: you will understand all this.
  '3':
  - type: text
    content: 'For the time is coming when I will restore the fortunes of my people of Israel and Judah. I will bring them home to this land that I gave to their ancestors, and they will possess it again. I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!”'
  '4':
  - type: text
    content: 'This is the message the '
  - type: text
    content: Lord
  - type: text
    content: ' gave concerning Israel and Judah. '
  '5':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “I hear cries of fear;
  - type: text
    content: there is terror and no peace.
  '6':
  - type: text
    content: 'Now let me ask you a question:'
  - type: text
    content: Do men give birth to babies?
  - type: text
    content: Then why do they stand there, ashen-faced,
  - type: text
    content: hands pressed against their sides
  - type: text
    content: like a woman in labor?
  '7':
  - type: text
    content: In all history there has never been such a time of terror.
  - type: text
    content: It will be a time of trouble for my people Israel.
  - type: note
    content: Hebrew Jacob; also in 30:10b, 18. See note on 5:20.
  - type: text
    content: Yet in the end they will be saved!
  '8':
  - type: text
    content: For in that day,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ' of Heaven’s Armies,'
  - type: text
    content: “I will break the yoke from their necks
  - type: text
    content: and snap their chains.
  - type: text
    content: Foreigners will no longer be their masters.
  '9':
  - type: text
    content: 'For my people will serve the '
  - type: text
    content: Lord
  - type: text
    content: ' their God'
  - type: text
    content: and their king descended from David—
  - type: text
    content: the king I will raise up for them.
