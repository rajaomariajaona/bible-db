document_id: 1CO.8,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Food Sacrificed to Idols
  - type: text
    content: 'Now regarding your question about food that has been offered to idols. Yes, we know that “we all have knowledge” about this issue. But while knowledge makes us feel important, it is love that strengthens the church. '
  '10':
  - type: text
    content: 'For if others see you—with your “superior knowledge”—eating in the temple of an idol, won’t they be encouraged to violate their conscience by eating food that has been offered to an idol? '
  '11':
  - type: text
    content: So because of your superior knowledge, a weak believer
  - type: note
    content: Greek brother; also in 8:13.
  - type: text
    content: ' for whom Christ died will be destroyed. '
  '12':
  - type: text
    content: And when you sin against other believers
  - type: note
    content: Greek brothers.
  - type: text
    content: ' by encouraging them to do something they believe is wrong, you are sinning against Christ. '
  '13':
  - type: text
    content: So if what I eat causes another believer to sin, I will never eat meat again as long as I live—for I don’t want to cause another believer to stumble.
  '2':
  - type: text
    content: 'Anyone who claims to know all the answers doesn’t really know very much. '
  '3':
  - type: text
    content: But the person who loves God is the one whom God recognizes.
  - type: note
    content: Some manuscripts read the person who loves has full knowledge.
  '4':
  - type: text
    content: 'So, what about eating meat that has been offered to idols? Well, we all know that an idol is not really a god and that there is only one God. '
  '5':
  - type: text
    content: 'There may be so-called gods both in heaven and on earth, and some people actually worship many gods and many lords. '
  '6':
  - type: text
    content: But for us,
  - type: text
    content: There is one God, the Father,
  - type: text
    content: by whom all things were created,
  - type: text
    content: and for whom we live.
  - type: text
    content: And there is one Lord, Jesus Christ,
  - type: text
    content: through whom all things were created,
  - type: text
    content: and through whom we live.
  '7':
  - type: text
    content: 'However, not all believers know this. Some are accustomed to thinking of idols as being real, so when they eat food that has been offered to idols, they think of it as the worship of real gods, and their weak consciences are violated. '
  '8':
  - type: text
    content: It’s true that we can’t win God’s approval by what we eat. We don’t lose anything if we don’t eat it, and we don’t gain anything if we do.
  '9':
  - type: text
    content: 'But you must be careful so that your freedom does not cause others with a weaker conscience to stumble. '
