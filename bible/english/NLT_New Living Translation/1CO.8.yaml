document_id: 1CO.8,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Food Sacrificed to Idols
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now regarding your question about food that has been offered to idols. Yes, we know that “we all have knowledge” about this issue. But while knowledge makes us feel important, it is love that strengthens the church. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For if others see you—with your “superior knowledge”—eating in the temple of an idol, won’t they be encouraged to violate their conscience by eating food that has been offered to an idol? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So because of your superior knowledge, a weak believer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brother; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 8:13.
      marker-yv: yv-n
    - type: text
      text: ' for whom Christ died will be destroyed. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And when you sin against other believers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brothers.
      marker-yv: yv-n
    - type: text
      text: ' by encouraging them to do something they believe is wrong, you are sinning against Christ. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: So if what I eat causes another believer to sin, I will never eat meat again as long as I live—for I don’t want to cause another believer to stumble.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Anyone who claims to know all the answers doesn’t really know very much. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But the person who loves God is the one whom God recognizes.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the person who loves has full knowledge.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So, what about eating meat that has been offered to idols? Well, we all know that an idol is not really a god and that there is only one God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'There may be so-called gods both in heaven and on earth, and some people actually worship many gods and many lords. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: But for us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is one God, the Father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by whom all things were created,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and for whom we live.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there is one Lord, Jesus Christ,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through whom all things were created,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and through whom we live.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'However, not all believers know this. Some are accustomed to thinking of idols as being real, so when they eat food that has been offered to idols, they think of it as the worship of real gods, and their weak consciences are violated. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: It’s true that we can’t win God’s approval by what we eat. We don’t lose anything if we don’t eat it, and we don’t gain anything if we do.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But you must be careful so that your freedom does not cause others with a weaker conscience to stumble. '
