document_id: EZK.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Justice of a Righteous God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then another message came to me from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Why do you quote this proverb concerning the land of Israel: ‘The parents have eaten sour grapes, but their children’s mouths pucker at the taste’? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'As surely as I live, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you will not quote this proverb anymore in Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For all people are mine to judge—both parents and children alike. And this is my rule: The person who sins is the one who will die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Suppose a certain man is righteous and does what is just and right. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He does not feast in the mountains before Israel’s idols
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term (literally '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: round things
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) probably alludes to dung; also in 18:12, 15.
    marker-yv: yv-n
  - type: text
    text: ' or worship them. He does not commit adultery or have intercourse with a woman during her menstrual period. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He is a merciful creditor, not keeping the items given as security by poor debtors. He does not rob the poor but instead gives food to the hungry and provides clothes for the needy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He grants loans without interest, stays away from injustice, is honest and fair when judging others, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and faithfully obeys my decrees and regulations. Anyone who does these things is just and will surely live, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“But suppose that man has a son who grows up to be a robber or murderer and refuses to do what is right. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And that son does all the evil things his father would never do—he worships idols on the mountains, commits adultery, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'oppresses the poor and helpless, steals from debtors by refusing to let them redeem their security, worships idols, commits detestable sins, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: and lends money at excessive interest. Should such a sinful person live? No! He must die and must take full blame.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“But suppose that sinful son, in turn, has a son who sees his father’s wickedness and decides against that kind of life. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'This son refuses to worship idols on the mountains and does not commit adultery. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He does not exploit the poor, but instead is fair to debtors and does not rob them. He gives food to the hungry and provides clothes for the needy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He helps the poor,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek version reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: He refuses to do evil.
    marker-yv: yv-n
  - type: text
    text: ' does not lend money at interest, and obeys all my regulations and decrees. Such a person will not die because of his father’s sins; he will surely live. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But the father will die for his many sins—for being cruel, robbing people, and doing what was clearly wrong among his people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“‘What?’ you ask. ‘Doesn’t the child pay for the parent’s sins?’ No! For if the child does what is just and right and keeps my decrees, that child will surely live. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The person who sins is the one who will die. The child will not be punished for the parent’s sins, and the parent will not be punished for the child’s sins. Righteous people will be rewarded for their own righteous behavior, and wicked people will be punished for their own wickedness. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But if wicked people turn away from all their sins and begin to obey my decrees and do what is just and right, they will surely live and not die. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: All their past sins will be forgotten, and they will live because of the righteous things they have done.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“Do you think that I like to see wicked people die? says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. Of course not! I want them to turn from their wicked ways and live. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: However, if righteous people turn from their righteous behavior and start doing sinful things and act like other sinners, should they be allowed to live? No, of course not! All their righteous acts will be forgotten, and they will die for their sins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“Yet you say, ‘The Lord isn’t doing what’s right!’ Listen to me, O people of Israel. Am I the one not doing what’s right, or is it you? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When righteous people turn from their righteous behavior and start doing sinful things, they will die for it. Yes, they will die because of their sinful deeds. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And if wicked people turn from their wickedness, obey the law, and do what is just and right, they will save their lives. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'They will live because they thought it over and decided to turn from their sins. Such people will not die. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: And yet the people of Israel keep saying, ‘The Lord isn’t doing what’s right!’ O people of Israel, it is you who are not doing what’s right, not I.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“Therefore, I will judge each of you, O people of Israel, according to your actions, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. Repent, and turn from your sins. Don’t let them destroy you! '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Put all your rebellion behind you, and find yourselves a new heart and a new spirit. For why should you die, O people of Israel? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'I don’t want you to die, says the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . Turn back and live!
