document_id: 2SA.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Revolt of Sheba
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'There happened to be a troublemaker there named Sheba son of Bicri, a man from the tribe of Benjamin. Sheba blew a ram’s horn and began to chant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Down with the dynasty of David!
- type: usfm
  marker: q2
  children:
  - type: text
    text: We have no interest in the son of Jesse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come on, you men of Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: back to your homes!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So all the men of Israel deserted David and followed Sheba son of Bicri. But the men of Judah stayed with their king and escorted him from the Jordan River to Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When David came to his palace in Jerusalem, he took the ten concubines he had left to look after the palace and placed them in seclusion. Their needs were provided for, but he no longer slept with them. So each of them lived like a widow until she died.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the king told Amasa, “Mobilize the army of Judah within three days, and report back at that time.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So Amasa went out to notify Judah, but it took him longer than the time he had been given.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then David said to Abishai, “Sheba son of Bicri is going to hurt us more than Absalom did. Quick, take my troops and chase after him before he gets into a fortified town where we can’t reach him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So Abishai and Joab,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:7a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: So Joab’s men.
    marker-yv: yv-n
  - type: text
    text: ' together with the king’s bodyguard'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:7b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the Kerethites and Pelethites; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 20:23.
    marker-yv: yv-n
  - type: text
    text: ' and all the mighty warriors, set out from Jerusalem to go after Sheba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: As they arrived at the great stone in Gibeon, Amasa met them. Joab was wearing his military tunic with a dagger strapped to his belt. As he stepped forward to greet Amasa, he slipped the dagger from its sheath.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: As he stepped forward, it fell out.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“How are you, my cousin?” Joab said and took him by the beard with his right hand as though to kiss him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Amasa didn’t notice the dagger in his left hand, and Joab stabbed him in the stomach with it so that his insides gushed out onto the ground. Joab did not need to strike again, and Amasa soon died. Joab and his brother Abishai left him lying there and continued after Sheba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'One of Joab’s young men shouted to Amasa’s troops, “If you are for Joab and David, come and follow Joab.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But Amasa lay in his blood in the middle of the road, and Joab’s man saw that everyone was stopping to stare at him. So he pulled him off the road into a field and threw a cloak over him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: With Amasa’s body out of the way, everyone went on with Joab to capture Sheba son of Bicri.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Meanwhile, Sheba traveled through all the tribes of Israel and eventually came to the town of Abel-beth-maacah. All the members of his own clan, the Bicrites,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Latin versions; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: All the Berites.
    marker-yv: yv-n
  - type: text
    text: ' assembled for battle and followed him into the town. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When Joab’s forces arrived, they attacked Abel-beth-maacah. They built a siege ramp against the town’s fortifications and began battering down the wall. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But a wise woman in the town called out to Joab, “Listen to me, Joab. Come over here so I can talk to you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: As he approached, the woman asked, “Are you Joab?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “I am,” he replied.
- type: usfm
  marker: p
  children:
  - type: text
    text: So she said, “Listen carefully to your servant.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “I’m listening,” he said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then she continued, “There used to be a saying, ‘If you want to settle an argument, ask advice at the town of Abel.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I am one who is peace loving and faithful in Israel. But you are destroying an important town in Israel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a town that is a mother in Israel.
    marker-yv: yv-n
  - type: text
    text: ' Why do you want to devour what belongs to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Joab replied, “Believe me, I don’t want to devour or destroy your town! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: That’s not my purpose. All I want is a man named Sheba son of Bicri from the hill country of Ephraim, who has revolted against King David. If you hand over this one man to me, I will leave the town in peace.”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“All right,” the woman replied, “we will throw his head over the wall to you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then the woman went to all the people with her wise advice, and they cut off Sheba’s head and threw it out to Joab. So he blew the ram’s horn and called his troops back from the attack. They all returned to their homes, and Joab returned to the king at Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now Joab was the commander of the army of Israel. Benaiah son of Jehoiada was captain of the king’s bodyguard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Adoniram
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version (see also 1 Kgs 4:6; 5:14); Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Adoram.
    marker-yv: yv-n
  - type: text
    text: ' was in charge of forced labor. Jehoshaphat son of Ahilud was the royal historian. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Sheva was the court secretary. Zadok and Abiathar were the priests. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And Ira, a descendant of Jair, was David’s personal priest.
