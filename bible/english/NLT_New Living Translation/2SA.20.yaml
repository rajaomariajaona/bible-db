document_id: 2SA.20,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Revolt of Sheba
  - type: text
    content: 'There happened to be a troublemaker there named Sheba son of Bicri, a man from the tribe of Benjamin. Sheba blew a ram’s horn and began to chant:'
  - type: text
    content: “Down with the dynasty of David!
  - type: text
    content: We have no interest in the son of Jesse.
  - type: text
    content: Come on, you men of Israel,
  - type: text
    content: back to your homes!”
  '10':
  - type: text
    content: Amasa didn’t notice the dagger in his left hand, and Joab stabbed him in the stomach with it so that his insides gushed out onto the ground. Joab did not need to strike again, and Amasa soon died. Joab and his brother Abishai left him lying there and continued after Sheba.
  '11':
  - type: text
    content: 'One of Joab’s young men shouted to Amasa’s troops, “If you are for Joab and David, come and follow Joab.” '
  '12':
  - type: text
    content: 'But Amasa lay in his blood in the middle of the road, and Joab’s man saw that everyone was stopping to stare at him. So he pulled him off the road into a field and threw a cloak over him. '
  '13':
  - type: text
    content: With Amasa’s body out of the way, everyone went on with Joab to capture Sheba son of Bicri.
  '14':
  - type: text
    content: Meanwhile, Sheba traveled through all the tribes of Israel and eventually came to the town of Abel-beth-maacah. All the members of his own clan, the Bicrites,
  - type: note
    content: As in Greek and Latin versions; Hebrew reads All the Berites.
  - type: text
    content: ' assembled for battle and followed him into the town. '
  '15':
  - type: text
    content: 'When Joab’s forces arrived, they attacked Abel-beth-maacah. They built a siege ramp against the town’s fortifications and began battering down the wall. '
  '16':
  - type: text
    content: 'But a wise woman in the town called out to Joab, “Listen to me, Joab. Come over here so I can talk to you.” '
  '17':
  - type: text
    content: As he approached, the woman asked, “Are you Joab?”
  - type: text
    content: “I am,” he replied.
  - type: text
    content: So she said, “Listen carefully to your servant.”
  - type: text
    content: “I’m listening,” he said.
  '18':
  - type: text
    content: 'Then she continued, “There used to be a saying, ‘If you want to settle an argument, ask advice at the town of Abel.’ '
  '19':
  - type: text
    content: I am one who is peace loving and faithful in Israel. But you are destroying an important town in Israel.
  - type: note
    content: Hebrew a town that is a mother in Israel.
  - type: text
    content: ' Why do you want to devour what belongs to the '
  - type: text
    content: Lord
  - type: text
    content: ?”
  '2':
  - type: text
    content: So all the men of Israel deserted David and followed Sheba son of Bicri. But the men of Judah stayed with their king and escorted him from the Jordan River to Jerusalem.
  '20':
  - type: text
    content: 'And Joab replied, “Believe me, I don’t want to devour or destroy your town! '
  '21':
  - type: text
    content: That’s not my purpose. All I want is a man named Sheba son of Bicri from the hill country of Ephraim, who has revolted against King David. If you hand over this one man to me, I will leave the town in peace.”
  - type: text
    content: '“All right,” the woman replied, “we will throw his head over the wall to you.” '
  '22':
  - type: text
    content: Then the woman went to all the people with her wise advice, and they cut off Sheba’s head and threw it out to Joab. So he blew the ram’s horn and called his troops back from the attack. They all returned to their homes, and Joab returned to the king at Jerusalem.
  '23':
  - type: text
    content: 'Now Joab was the commander of the army of Israel. Benaiah son of Jehoiada was captain of the king’s bodyguard. '
  '24':
  - type: text
    content: Adoniram
  - type: note
    content: As in Greek version (see also 1 Kgs 4:6; 5:14); Hebrew reads Adoram.
  - type: text
    content: ' was in charge of forced labor. Jehoshaphat son of Ahilud was the royal historian. '
  '25':
  - type: text
    content: 'Sheva was the court secretary. Zadok and Abiathar were the priests. '
  '26':
  - type: text
    content: And Ira, a descendant of Jair, was David’s personal priest.
  '3':
  - type: text
    content: When David came to his palace in Jerusalem, he took the ten concubines he had left to look after the palace and placed them in seclusion. Their needs were provided for, but he no longer slept with them. So each of them lived like a widow until she died.
  '4':
  - type: text
    content: 'Then the king told Amasa, “Mobilize the army of Judah within three days, and report back at that time.” '
  '5':
  - type: text
    content: So Amasa went out to notify Judah, but it took him longer than the time he had been given.
  '6':
  - type: text
    content: Then David said to Abishai, “Sheba son of Bicri is going to hurt us more than Absalom did. Quick, take my troops and chase after him before he gets into a fortified town where we can’t reach him.”
  '7':
  - type: text
    content: So Abishai and Joab,
  - type: note
    content: Hebrew So Joab’s men.
  - type: text
    content: ' together with the king’s bodyguard'
  - type: note
    content: Hebrew the Kerethites and Pelethites; also in 20:23.
  - type: text
    content: ' and all the mighty warriors, set out from Jerusalem to go after Sheba. '
  '8':
  - type: text
    content: As they arrived at the great stone in Gibeon, Amasa met them. Joab was wearing his military tunic with a dagger strapped to his belt. As he stepped forward to greet Amasa, he slipped the dagger from its sheath.
  - type: note
    content: Hebrew As he stepped forward, it fell out.
  '9':
  - type: text
    content: '“How are you, my cousin?” Joab said and took him by the beard with his right hand as though to kiss him. '
