document_id: PSA.29,116
type_code: eng
verses:
  '1':
  - type: text
    content: A psalm of David.
  - type: text
    content: 'Honor the '
  - type: text
    content: Lord
  - type: text
    content: ', you heavenly beings'
  - type: note
    content: Hebrew you sons of God.
  - type: text
    content: ;
  - type: text
    content: 'honor the '
  - type: text
    content: Lord
  - type: text
    content: ' for his glory and strength.'
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' rules over the floodwaters.'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' reigns as king forever.'
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gives his people strength.'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' blesses them with peace.'
  '2':
  - type: text
    content: 'Honor the '
  - type: text
    content: Lord
  - type: text
    content: ' for the glory of his name.'
  - type: text
    content: 'Worship the '
  - type: text
    content: Lord
  - type: text
    content: ' in the splendor of his holiness.'
  '3':
  - type: text
    content: 'The voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' echoes above the sea.'
  - type: text
    content: The God of glory thunders.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' thunders over the mighty sea.'
  '4':
  - type: text
    content: 'The voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' is powerful;'
  - type: text
    content: 'the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' is majestic.'
  '5':
  - type: text
    content: 'The voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' splits the mighty cedars;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' shatters the cedars of Lebanon.'
  '6':
  - type: text
    content: He makes Lebanon’s mountains skip like a calf;
  - type: text
    content: he makes Mount Hermon
  - type: note
    content: Hebrew Sirion, another name for Mount Hermon.
  - type: text
    content: ' leap like a young wild ox.'
  '7':
  - type: text
    content: 'The voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' strikes'
  - type: text
    content: with bolts of lightning.
  '8':
  - type: text
    content: 'The voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' makes the barren wilderness quake;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' shakes the wilderness of Kadesh.'
  '9':
  - type: text
    content: 'The voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' twists mighty oaks'
  - type: note
    content: Or causes the deer to writhe in labor.
  - type: text
    content: and strips the forests bare.
  - type: text
    content: In his Temple everyone shouts, “Glory!”
