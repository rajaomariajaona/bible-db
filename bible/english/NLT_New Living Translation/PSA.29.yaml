document_id: PSA.29,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Honor the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you heavenly beings'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: you sons of God.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'honor the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for his glory and strength.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rules over the floodwaters.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' reigns as king forever.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gives his people strength.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' blesses them with peace.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Honor the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for the glory of his name.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the splendor of his holiness.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' echoes above the sea.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The God of glory thunders.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' thunders over the mighty sea.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is powerful;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is majestic.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' splits the mighty cedars;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' shatters the cedars of Lebanon.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes Lebanon’s mountains skip like a calf;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he makes Mount Hermon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sirion, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: another name for Mount Hermon.
      marker-yv: yv-n
    - type: text
      text: ' leap like a young wild ox.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' strikes'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with bolts of lightning.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' makes the barren wilderness quake;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' shakes the wilderness of Kadesh.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' twists mighty oaks'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: causes the deer to writhe in labor.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and strips the forests bare.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In his Temple everyone shouts, “Glory!”
