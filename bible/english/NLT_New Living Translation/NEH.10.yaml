  - type: heading
    content: The Vow of the People
  '28':
  - type: text
    content: 'Then the rest of the people—the priests, Levites, gatekeepers, singers, Temple servants, and all who had separated themselves from the pagan people of the land in order to obey the Law of God, together with their wives, sons, daughters, and all who were old enough to understand— '
  '29':
  - type: text
    content: 'joined their leaders and bound themselves with an oath. They swore a curse on themselves if they failed to obey the Law of God as issued by his servant Moses. They solemnly promised to carefully follow all the commands, regulations, and decrees of the '
  - type: text
    content: Lord
  - type: text
    content: ' our Lord:'
  '3':
  - type: text
    content: 'Pashhur, Amariah, Malkijah, '
  '30':
  - type: text
    content: “We promise not to let our daughters marry the pagan people of the land, and not to let our sons marry their daughters.
  '31':
  - type: text
    content: “We also promise that if the people of the land should bring any merchandise or grain to be sold on the Sabbath or on any other holy day, we will refuse to buy it. Every seventh year we will let our land rest, and we will cancel all debts owed to us.
  '32':
  - type: text
    content: “In addition, we promise to obey the command to pay the annual Temple tax of one-eighth of an ounce of silver
  - type: note
    content: Hebrew tax of 1/3 of a shekel [4 grams].
  - type: text
    content: ' for the care of the Temple of our God. '
  '33':
  - type: text
    content: This will provide for the Bread of the Presence; for the regular grain offerings and burnt offerings; for the offerings on the Sabbaths, the new moon celebrations, and the annual festivals; for the holy offerings; and for the sin offerings to make atonement for Israel. It will provide for everything necessary for the work of the Temple of our God.
  '34':
  - type: text
    content: '“We have cast sacred lots to determine when—at regular times each year—the families of the priests, Levites, and the common people should bring wood to God’s Temple to be burned on the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, as is written in the Law.'
  '35':
  - type: text
    content: '“We promise to bring the first part of every harvest to the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple year after year—whether it be a crop from the soil or from our fruit trees. '
  '36':
  - type: text
    content: 'We agree to give God our oldest sons and the firstborn of all our herds and flocks, as prescribed in the Law. We will present them to the priests who minister in the Temple of our God. '
  '37':
  - type: text
    content: We will store the produce in the storerooms of the Temple of our God. We will bring the best of our flour and other grain offerings, the best of our fruit, and the best of our new wine and olive oil. And we promise to bring to the Levites a tenth of everything our land produces, for it is the Levites who collect the tithes in all our rural towns.
  '38':
  - type: text
    content: '“A priest—a descendant of Aaron—will be with the Levites as they receive these tithes. And a tenth of all that is collected as tithes will be delivered by the Levites to the Temple of our God and placed in the storerooms. '
  '39':
  - type: text
    content: The people and the Levites must bring these offerings of grain, new wine, and olive oil to the storerooms and place them in the sacred containers near the ministering priests, the gatekeepers, and the singers.
  - type: text
    content: “We promise together not to neglect the Temple of our God.”
  '4':
  - type: text
    content: 'Hattush, Shebaniah, Malluch, '
  '5':
  - type: text
    content: 'Harim, Meremoth, Obadiah, '
  '6':
