document_id: ISA.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message about Moab
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This message came to me concerning Moab:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In one night the town of Ar will be leveled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the city of Kir will be destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Your people will go to their temple in Dibon to mourn.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will go to their sacred shrines to weep.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will wail for the fate of Nebo and Medeba,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shaving their heads in sorrow and cutting off their beards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They will wear burlap as they wander the streets.
- type: usfm
  marker: q2
  children:
  - type: text
    text: From every home and public square will come the sound of wailing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The people of Heshbon and Elealeh will cry out;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their voices will be heard as far away as Jahaz!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The bravest warriors of Moab will cry out in utter terror.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will be helpless with fear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: My heart weeps for Moab.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Its people flee to Zoar and Eglath-shelishiyah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Weeping, they climb the road to Luhith.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their cries of distress can be heard all along the road to Horonaim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Even the waters of Nimrim are dried up!
- type: usfm
  marker: q2
  children:
  - type: text
    text: The grassy banks are scorched.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The tender plants are gone;
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing green remains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The people grab their possessions
- type: usfm
  marker: q2
  children:
  - type: text
    text: and carry them across the Ravine of Willows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A cry of distress echoes through the land of Moab
- type: usfm
  marker: q2
  children:
  - type: text
    text: from one end to the other—
- type: usfm
  marker: q2
  children:
  - type: text
    text: from Eglaim to Beer-elim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The stream near Dibon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Dead Sea Scrolls, some Greek manuscripts, and Latin Vulgate; Masoretic Text reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Dimon; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 15:9b.
    marker-yv: yv-n
  - type: text
    text: ' runs red with blood,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I am still not finished with Dibon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lions will hunt down the survivors—
- type: usfm
  marker: q2
  children:
  - type: text
    text: both those who try to escape
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who remain behind.
