document_id: ISA.15,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message about Moab
  - type: text
    content: 'This message came to me concerning Moab:'
  - type: text
    content: In one night the town of Ar will be leveled,
  - type: text
    content: and the city of Kir will be destroyed.
  '2':
  - type: text
    content: Your people will go to their temple in Dibon to mourn.
  - type: text
    content: They will go to their sacred shrines to weep.
  - type: text
    content: They will wail for the fate of Nebo and Medeba,
  - type: text
    content: shaving their heads in sorrow and cutting off their beards.
  '3':
  - type: text
    content: They will wear burlap as they wander the streets.
  - type: text
    content: From every home and public square will come the sound of wailing.
  '4':
  - type: text
    content: The people of Heshbon and Elealeh will cry out;
  - type: text
    content: their voices will be heard as far away as Jahaz!
  - type: text
    content: The bravest warriors of Moab will cry out in utter terror.
  - type: text
    content: They will be helpless with fear.
  '5':
  - type: text
    content: My heart weeps for Moab.
  - type: text
    content: Its people flee to Zoar and Eglath-shelishiyah.
  - type: text
    content: Weeping, they climb the road to Luhith.
  - type: text
    content: Their cries of distress can be heard all along the road to Horonaim.
  '6':
  - type: text
    content: Even the waters of Nimrim are dried up!
  - type: text
    content: The grassy banks are scorched.
  - type: text
    content: The tender plants are gone;
  - type: text
    content: nothing green remains.
  '7':
  - type: text
    content: The people grab their possessions
  - type: text
    content: and carry them across the Ravine of Willows.
  '8':
  - type: text
    content: A cry of distress echoes through the land of Moab
  - type: text
    content: from one end to the other—
  - type: text
    content: from Eglaim to Beer-elim.
  '9':
  - type: text
    content: The stream near Dibon
  - type: note
    content: As in Dead Sea Scrolls, some Greek manuscripts, and Latin Vulgate; Masoretic Text reads Dimon; also in 15:9b.
  - type: text
    content: ' runs red with blood,'
  - type: text
    content: but I am still not finished with Dibon!
  - type: text
    content: Lions will hunt down the survivors—
  - type: text
    content: both those who try to escape
  - type: text
    content: and those who remain behind.
