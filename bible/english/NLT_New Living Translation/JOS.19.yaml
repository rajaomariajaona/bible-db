document_id: JOS.19,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Land Given to Simeon
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The second allotment of land went to the clans of the tribe of Simeon. Their homeland was surrounded by Judah’s territory.
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The third allotment of land went to the clans of the tribe of Zebulun.
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'The boundary of Zebulun’s homeland started at Sarid. '
  '11':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'From there it went west, going past Maralah, touching Dabbesheth, and proceeding to the brook east of Jokneam. '
  '12':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'In the other direction, the boundary went east from Sarid to the border of Kisloth-tabor, and from there to Daberath and up to Japhia. '
  '13':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then it continued east to Gath-hepher, Eth-kazin, and Rimmon and turned toward Neah. '
  '14':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The northern boundary of Zebulun passed Hannathon and ended at the valley of Iphtah-el. '
  '15':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The towns in these areas included Kattath, Nahalal, Shimron, Idalah, and Bethlehem—twelve towns with their surrounding villages.
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The homeland allocated to the clans of the tribe of Zebulun included these towns and their surrounding villages.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Land Given to Issachar
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The fourth allotment of land went to the clans of the tribe of Issachar.
  '18':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Its boundaries included the following towns: Jezreel, Kesulloth, Shunem, '
  '19':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Hapharaim, Shion, Anaharath, '
  '2':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Simeon’s homeland included Beersheba, Sheba, Moladah, '
  '20':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Rabbith, Kishion, Ebez, '
  '21':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Remeth, En-gannim, En-haddah, and Beth-pazzez. '
  '22':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The boundary also touched Tabor, Shahazumah, and Beth-shemesh, ending at the Jordan River—sixteen towns with their surrounding villages.
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: The homeland allocated to the clans of the tribe of Issachar included these towns and their surrounding villages.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Land Given to Asher
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: The fifth allotment of land went to the clans of the tribe of Asher.
  '25':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Its boundaries included these towns: Helkath, Hali, Beten, Acshaph, '
  '26':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Allammelech, Amad, and Mishal. The boundary on the west touched Carmel and Shihor-libnath, '
  '27':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'then it turned east toward Beth-dagon, and ran as far as Zebulun in the valley of Iphtah-el, going north to Beth-emek and Neiel. It then continued north to Cabul, '
  '28':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Abdon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts (see also 21:30); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ebron.
      marker-yv: yv-n
    - type: text
      text: ' Rehob, Hammon, Kanah, and as far as Greater Sidon. '
  '29':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Then the boundary turned toward Ramah and the fortress of Tyre, where it turned toward Hosah and came to the Mediterranean Sea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the sea.
      marker-yv: yv-n
    - type: text
      text: ' The territory also included Mehebel, Aczib, '
  '3':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Hazar-shual, Balah, Ezem, '
  '30':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ummah, Aphek, and Rehob—twenty-two towns with their surrounding villages.
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: The homeland allocated to the clans of the tribe of Asher included these towns and their surrounding villages.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Land Given to Naphtali
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: The sixth allotment of land went to the clans of the tribe of Naphtali.
  '33':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Its boundary ran from Heleph, from the oak at Zaanannim, and extended across to Adami-nekeb, Jabneel, and as far as Lakkum, ending at the Jordan River. '
  '34':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: The western boundary ran past Aznoth-tabor, then to Hukkok, and touched the border of Zebulun in the south, the border of Asher on the west, and the Jordan River
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and Judah at the Jordan River.
      marker-yv: yv-n
    - type: text
      text: ' on the east. '
  '35':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'The fortified towns included in this territory were Ziddim, Zer, Hammath, Rakkath, Kinnereth, '
  '36':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Adamah, Ramah, Hazor, '
  '37':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Kedesh, Edrei, En-hazor, '
  '38':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Yiron, Migdal-el, Horem, Beth-anath, and Beth-shemesh—nineteen towns with their surrounding villages.
  '39':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: The homeland allocated to the clans of the tribe of Naphtali included these towns and their surrounding villages.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Land Given to Dan
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Eltolad, Bethul, Hormah, '
  '40':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: The seventh allotment of land went to the clans of the tribe of Dan.
  '41':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'The land allocated as their homeland included the following towns: Zorah, Eshtaol, Ir-shemesh, '
  '42':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Shaalabbin, Aijalon, Ithlah, '
  '43':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Elon, Timnah, Ekron, '
  '44':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Eltekeh, Gibbethon, Baalath, '
  '45':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Jehud, Bene-berak, Gath-rimmon, '
  '46':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Me-jarkon, Rakkon, and the territory across from Joppa.
  '47':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: But the tribe of Dan had trouble taking possession of their land,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:47a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: had trouble holding on to their land.
      marker-yv: yv-n
    - type: text
      text: ' so they attacked the town of Laish.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:47b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Leshem, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Laish.
      marker-yv: yv-n
    - type: text
      text: ' They captured it, slaughtered its people, and settled there. They renamed the town Dan after their ancestor.'
  '48':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: The homeland allocated to the clans of the tribe of Dan included these towns and their surrounding villages.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Land Given to Joshua
    marker-yv: yv-h
  '49':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'After all the land was divided among the tribes, the Israelites gave a piece of land to Joshua as his allocation. '
  '5':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ziklag, Beth-marcaboth, Hazar-susah, '
  '50':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said he could have any town he wanted. He chose Timnath-serah in the hill country of Ephraim. He rebuilt the town and lived there.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'These are the territories that Eleazar the priest, Joshua son of Nun, and the tribal leaders allocated as grants of land to the tribes of Israel by casting sacred lots in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at the entrance of the Tabernacle'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:51 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tent of Meeting.
      marker-yv: yv-n
    - type: text
      text: ' at Shiloh. So the division of the land was completed.'
  '6':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Beth-lebaoth, and Sharuhen—thirteen towns with their surrounding villages. '
  '7':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'It also included Ain, Rimmon, Ether, and Ashan—four towns with their villages, '
  '8':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: including all the surrounding villages as far south as Baalath-beer (also known as Ramah of the Negev).
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'This was the homeland allocated to the clans of the tribe of Simeon. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Their allocation of land came from part of what had been given to Judah because Judah’s territory was too large for them. So the tribe of Simeon received an allocation within the territory of Judah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Land Given to Zebulun
    marker-yv: yv-h
