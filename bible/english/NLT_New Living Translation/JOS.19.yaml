document_id: JOS.19,116
type_code: eng
verses:
  '1':
  - type: heading
    content: The Land Given to Simeon
  - type: text
    content: The second allotment of land went to the clans of the tribe of Simeon. Their homeland was surrounded by Judah’s territory.
  '10':
  - type: text
    content: The third allotment of land went to the clans of the tribe of Zebulun.
  - type: text
    content: 'The boundary of Zebulun’s homeland started at Sarid. '
  '11':
  - type: text
    content: 'From there it went west, going past Maralah, touching Dabbesheth, and proceeding to the brook east of Jokneam. '
  '12':
  - type: text
    content: 'In the other direction, the boundary went east from Sarid to the border of Kisloth-tabor, and from there to Daberath and up to Japhia. '
  '13':
  - type: text
    content: 'Then it continued east to Gath-hepher, Eth-kazin, and Rimmon and turned toward Neah. '
  '14':
  - type: text
    content: 'The northern boundary of Zebulun passed Hannathon and ended at the valley of Iphtah-el. '
  '15':
  - type: text
    content: The towns in these areas included Kattath, Nahalal, Shimron, Idalah, and Bethlehem—twelve towns with their surrounding villages.
  '16':
  - type: text
    content: The homeland allocated to the clans of the tribe of Zebulun included these towns and their surrounding villages.
  - type: heading
    content: The Land Given to Issachar
  '17':
  - type: text
    content: The fourth allotment of land went to the clans of the tribe of Issachar.
  '18':
  - type: text
    content: 'Its boundaries included the following towns: Jezreel, Kesulloth, Shunem, '
  '19':
  - type: text
    content: 'Hapharaim, Shion, Anaharath, '
  '2':
  - type: text
    content: 'Simeon’s homeland included Beersheba, Sheba, Moladah, '
  '20':
  - type: text
    content: 'Rabbith, Kishion, Ebez, '
  '21':
  - type: text
    content: 'Remeth, En-gannim, En-haddah, and Beth-pazzez. '
  '22':
  - type: text
    content: The boundary also touched Tabor, Shahazumah, and Beth-shemesh, ending at the Jordan River—sixteen towns with their surrounding villages.
  '23':
  - type: text
    content: The homeland allocated to the clans of the tribe of Issachar included these towns and their surrounding villages.
  - type: heading
    content: The Land Given to Asher
  '24':
  - type: text
    content: The fifth allotment of land went to the clans of the tribe of Asher.
  '25':
  - type: text
    content: 'Its boundaries included these towns: Helkath, Hali, Beten, Acshaph, '
  '26':
  - type: text
    content: 'Allammelech, Amad, and Mishal. The boundary on the west touched Carmel and Shihor-libnath, '
  '27':
  - type: text
    content: 'then it turned east toward Beth-dagon, and ran as far as Zebulun in the valley of Iphtah-el, going north to Beth-emek and Neiel. It then continued north to Cabul, '
  '28':
  - type: text
    content: Abdon,
  - type: note
    content: As in some Hebrew manuscripts (see also 21:30); most Hebrew manuscripts read Ebron.
  - type: text
    content: ' Rehob, Hammon, Kanah, and as far as Greater Sidon. '
  '29':
  - type: text
    content: Then the boundary turned toward Ramah and the fortress of Tyre, where it turned toward Hosah and came to the Mediterranean Sea.
  - type: note
    content: Hebrew the sea.
  - type: text
    content: ' The territory also included Mehebel, Aczib, '
  '3':
  - type: text
    content: 'Hazar-shual, Balah, Ezem, '
  '30':
  - type: text
    content: Ummah, Aphek, and Rehob—twenty-two towns with their surrounding villages.
  '31':
  - type: text
    content: The homeland allocated to the clans of the tribe of Asher included these towns and their surrounding villages.
  - type: heading
    content: The Land Given to Naphtali
  '32':
  - type: text
    content: The sixth allotment of land went to the clans of the tribe of Naphtali.
  '33':
  - type: text
    content: 'Its boundary ran from Heleph, from the oak at Zaanannim, and extended across to Adami-nekeb, Jabneel, and as far as Lakkum, ending at the Jordan River. '
  '34':
  - type: text
    content: The western boundary ran past Aznoth-tabor, then to Hukkok, and touched the border of Zebulun in the south, the border of Asher on the west, and the Jordan River
  - type: note
    content: Hebrew and Judah at the Jordan River.
  - type: text
    content: ' on the east. '
  '35':
  - type: text
    content: 'The fortified towns included in this territory were Ziddim, Zer, Hammath, Rakkath, Kinnereth, '
  '36':
  - type: text
    content: 'Adamah, Ramah, Hazor, '
  '37':
  - type: text
    content: 'Kedesh, Edrei, En-hazor, '
  '38':
  - type: text
    content: Yiron, Migdal-el, Horem, Beth-anath, and Beth-shemesh—nineteen towns with their surrounding villages.
  '39':
  - type: text
    content: The homeland allocated to the clans of the tribe of Naphtali included these towns and their surrounding villages.
  - type: heading
    content: The Land Given to Dan
  '4':
  - type: text
    content: 'Eltolad, Bethul, Hormah, '
  '40':
  - type: text
    content: The seventh allotment of land went to the clans of the tribe of Dan.
  '41':
  - type: text
    content: 'The land allocated as their homeland included the following towns: Zorah, Eshtaol, Ir-shemesh, '
  '42':
  - type: text
    content: 'Shaalabbin, Aijalon, Ithlah, '
  '43':
  - type: text
    content: 'Elon, Timnah, Ekron, '
  '44':
  - type: text
    content: 'Eltekeh, Gibbethon, Baalath, '
  '45':
  - type: text
    content: 'Jehud, Bene-berak, Gath-rimmon, '
  '46':
  - type: text
    content: Me-jarkon, Rakkon, and the territory across from Joppa.
  '47':
  - type: text
    content: But the tribe of Dan had trouble taking possession of their land,
  - type: note
    content: Or had trouble holding on to their land.
  - type: text
    content: ' so they attacked the town of Laish.'
  - type: note
    content: Hebrew Leshem, a variant spelling of Laish.
  - type: text
    content: ' They captured it, slaughtered its people, and settled there. They renamed the town Dan after their ancestor.'
  '48':
  - type: text
    content: The homeland allocated to the clans of the tribe of Dan included these towns and their surrounding villages.
  - type: heading
    content: The Land Given to Joshua
  '49':
  - type: text
    content: 'After all the land was divided among the tribes, the Israelites gave a piece of land to Joshua as his allocation. '
  '5':
  - type: text
    content: 'Ziklag, Beth-marcaboth, Hazar-susah, '
  '50':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' had said he could have any town he wanted. He chose Timnath-serah in the hill country of Ephraim. He rebuilt the town and lived there.'
  '51':
  - type: text
    content: 'These are the territories that Eleazar the priest, Joshua son of Nun, and the tribal leaders allocated as grants of land to the tribes of Israel by casting sacred lots in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' at the entrance of the Tabernacle'
  - type: note
    content: Hebrew Tent of Meeting.
  - type: text
    content: ' at Shiloh. So the division of the land was completed.'
  '6':
  - type: text
    content: 'Beth-lebaoth, and Sharuhen—thirteen towns with their surrounding villages. '
  '7':
  - type: text
    content: 'It also included Ain, Rimmon, Ether, and Ashan—four towns with their villages, '
  '8':
  - type: text
    content: including all the surrounding villages as far south as Baalath-beer (also known as Ramah of the Negev).
  - type: text
    content: 'This was the homeland allocated to the clans of the tribe of Simeon. '
  '9':
  - type: text
    content: Their allocation of land came from part of what had been given to Judah because Judah’s territory was too large for them. So the tribe of Simeon received an allocation within the territory of Judah.
  - type: heading
    content: The Land Given to Zebulun
