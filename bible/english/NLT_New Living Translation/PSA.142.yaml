  '2':
  - type: text
    content: I pour out my complaints before him
  - type: text
    content: and tell him all my troubles.
  '3':
  - type: text
    content: When I am overwhelmed,
  - type: text
    content: you alone know the way I should turn.
  - type: text
    content: Wherever I go,
  - type: text
    content: my enemies have set traps for me.
  '4':
  - type: text
    content: I look for someone to come and help me,
  - type: text
    content: but no one gives me a passing thought!
  - type: text
    content: No one will help me;
  - type: text
    content: no one cares a bit what happens to me.
  '5':
  - type: text
    content: 'Then I pray to you, O '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: I say, “You are my place of refuge.
  - type: text
    content: You are all I really want in life.
  '6':
  - type: text
    content: Hear my cry,
  - type: text
    content: for I am very low.
  - type: text
    content: Rescue me from my persecutors,
  - type: text
    content: for they are too strong for me.
  '7':
  - type: text
    content: Bring me out of prison
  - type: text
    content: so I can thank you.
  - type: text
    content: The godly will crowd around me,
  - type: text
