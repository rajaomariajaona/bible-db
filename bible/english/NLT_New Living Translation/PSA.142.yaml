      - type: text
        text: This may be a literary or musical term.
    marker-yv: yv-n
  - type: text
    text: ' of David, regarding his experience in the cave. A prayer.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I cry out to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I plead for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I pour out my complaints before him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and tell him all my troubles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When I am overwhelmed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you alone know the way I should turn.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wherever I go,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my enemies have set traps for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I look for someone to come and help me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but no one gives me a passing thought!
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one will help me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one cares a bit what happens to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then I pray to you, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: I say, “You are my place of refuge.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are all I really want in life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hear my cry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I am very low.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rescue me from my persecutors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they are too strong for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Bring me out of prison
- type: usfm
  marker: q2
  children:
  - type: text
    text: so I can thank you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The godly will crowd around me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you are good to me.”
