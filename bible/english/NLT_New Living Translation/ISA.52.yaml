document_id: ISA.52,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Deliverance for Jerusalem
  - type: text
    content: Wake up, wake up, O Zion!
  - type: text
    content: Clothe yourself with strength.
  - type: text
    content: Put on your beautiful clothes, O holy city of Jerusalem,
  - type: text
    content: for unclean and godless people will enter your gates no longer.
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has demonstrated his holy power'
  - type: text
    content: before the eyes of all the nations.
  - type: text
    content: All the ends of the earth will see
  - type: text
    content: the victory of our God.
  '11':
  - type: text
    content: Get out! Get out and leave your captivity,
  - type: text
    content: where everything you touch is unclean.
  - type: text
    content: Get out of there and purify yourselves,
  - type: text
    content: 'you who carry home the sacred objects of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: You will not leave in a hurry,
  - type: text
    content: running for your lives.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will go ahead of you;'
  - type: text
    content: yes, the God of Israel will protect you from behind.
  - type: heading
    content: The Lord’s Suffering Servant
  '13':
  - type: text
    content: See, my servant will prosper;
  - type: text
    content: he will be highly exalted.
  '14':
  - type: text
    content: But many were amazed when they saw him.
  - type: note
    content: As in Syriac version; Hebrew reads you.
  - type: text
    content: His face was so disfigured he seemed hardly human,
  - type: text
    content: and from his appearance, one would scarcely know he was a man.
  '15':
  - type: text
    content: And he will startle
  - type: note
    content: Or cleanse.
  - type: text
    content: ' many nations.'
  - type: text
    content: Kings will stand speechless in his presence.
  - type: text
    content: For they will see what they had not been told;
  - type: text
    content: they will understand what they had not heard about.
  - type: note
    content: Greek version reads Those who have never been told about him will see, / and those who have never heard of him will understand. Compare Rom 15:21.
  '2':
  - type: text
    content: Rise from the dust, O Jerusalem.
  - type: text
    content: Sit in a place of honor.
  - type: text
    content: Remove the chains of slavery from your neck,
  - type: text
    content: O captive daughter of Zion.
  '3':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “When I sold you into exile,
  - type: text
    content: I received no payment.
  - type: text
    content: Now I can redeem you
  - type: text
    content: without having to pay for you.”
  '4':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: “Long ago my people chose to live in Egypt. Now they are oppressed by Assyria. '
  '5':
  - type: text
    content: 'What is this?” asks the '
  - type: text
    content: Lord
  - type: text
    content: . “Why are my people enslaved again? Those who rule them shout in exultation.
  - type: note
    content: As in Dead Sea Scrolls; Masoretic Text reads Those who rule them wail.
  - type: text
    content: ' My name is blasphemed all day long.'
  - type: note
    content: Greek version reads The Gentiles continually blaspheme my name because of you. Compare Rom 2:24.
  - type: text
    content: ' '
  '6':
  - type: text
    content: But I will reveal my name to my people, and they will come to know its power. Then at last they will recognize that I am the one who speaks to them.”
  '7':
  - type: text
    content: How beautiful on the mountains
  - type: text
    content: are the feet of the messenger who brings good news,
  - type: text
    content: the good news of peace and salvation,
  - type: text
    content: the news that the God of Israel
  - type: note
    content: Hebrew of Zion.
  - type: text
    content: ' reigns!'
  '8':
  - type: text
    content: The watchmen shout and sing with joy,
  - type: text
    content: for before their very eyes
  - type: text
    content: 'they see the '
  - type: text
    content: Lord
  - type: text
    content: ' returning to Jerusalem.'
  - type: note
    content: Hebrew to Zion.
  '9':
  - type: text
    content: Let the ruins of Jerusalem break into joyful song,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has comforted his people.'
  - type: text
    content: He has redeemed Jerusalem.
