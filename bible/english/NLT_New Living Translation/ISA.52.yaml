document_id: ISA.52,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Deliverance for Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Wake up, wake up, O Zion!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Clothe yourself with strength.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put on your beautiful clothes, O holy city of Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for unclean and godless people will enter your gates no longer.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has demonstrated his holy power'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before the eyes of all the nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the ends of the earth will see
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the victory of our God.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Get out! Get out and leave your captivity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where everything you touch is unclean.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get out of there and purify yourselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'you who carry home the sacred objects of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: You will not leave in a hurry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: running for your lives.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will go ahead of you;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, the God of Israel will protect you from behind.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Suffering Servant
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: See, my servant will prosper;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will be highly exalted.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: But many were amazed when they saw him.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Syriac version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: you.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His face was so disfigured he seemed hardly human,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from his appearance, one would scarcely know he was a man.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And he will startle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:15a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cleanse.
      marker-yv: yv-n
    - type: text
      text: ' many nations.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Kings will stand speechless in his presence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they will see what they had not been told;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will understand what they had not heard about.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:15b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Those who have never been told about him will see, / and those who have never heard of him will understand. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Rom 15:21.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Rise from the dust, O Jerusalem.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sit in a place of honor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remove the chains of slavery from your neck,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O captive daughter of Zion.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When I sold you into exile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I received no payment.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I can redeem you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without having to pay for you.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: “Long ago my people chose to live in Egypt. Now they are oppressed by Assyria. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'What is this?” asks the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . “Why are my people enslaved again? Those who rule them shout in exultation.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:5a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Dead Sea Scrolls; Masoretic Text reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Those who rule them wail.
      marker-yv: yv-n
    - type: text
      text: ' My name is blasphemed all day long.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:5b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'The Gentiles continually blaspheme my name because of you. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Rom 2:24.
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: But I will reveal my name to my people, and they will come to know its power. Then at last they will recognize that I am the one who speaks to them.”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: How beautiful on the mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are the feet of the messenger who brings good news,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the good news of peace and salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the news that the God of Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of Zion.
      marker-yv: yv-n
    - type: text
      text: ' reigns!'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The watchmen shout and sing with joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for before their very eyes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'they see the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' returning to Jerusalem.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to Zion.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Let the ruins of Jerusalem break into joyful song,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has comforted his people.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has redeemed Jerusalem.
