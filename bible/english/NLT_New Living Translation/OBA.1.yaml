document_id: OBA.1,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'This is the vision that the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' revealed to Obadiah concerning the land of Edom.'
  - type: heading
    content: Edom’s Judgment Announced
  - type: text
    content: 'We have heard a message from the '
  - type: text
    content: Lord
  - type: text
    content: that an ambassador was sent to the nations to say,
  - type: text
    content: “Get ready, everyone!
  - type: text
    content: Let’s assemble our armies and attack Edom!”
  '10':
  - type: text
    content: “Because of the violence you did
  - type: text
    content: to your close relatives in Israel,
  - type: note
    content: Hebrew your brother Jacob. The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
  - type: text
    content: you will be filled with shame
  - type: text
    content: and destroyed forever.
  '11':
  - type: text
    content: When they were invaded,
  - type: text
    content: you stood aloof, refusing to help them.
  - type: text
    content: Foreign invaders carried off their wealth
  - type: text
    content: and cast lots to divide up Jerusalem,
  - type: text
    content: but you acted like one of Israel’s enemies.
  '12':
  - type: text
    content: “You should not have gloated
  - type: text
    content: when they exiled your relatives to distant lands.
  - type: text
    content: You should not have rejoiced
  - type: text
    content: when the people of Judah suffered such misfortune.
  - type: text
    content: You should not have spoken arrogantly
  - type: text
    content: in that terrible time of trouble.
  '13':
  - type: text
    content: You should not have plundered the land of Israel
  - type: text
    content: when they were suffering such calamity.
  - type: text
    content: You should not have gloated over their destruction
  - type: text
    content: when they were suffering such calamity.
  - type: text
    content: You should not have seized their wealth
  - type: text
    content: when they were suffering such calamity.
  '14':
  - type: text
    content: You should not have stood at the crossroads,
  - type: text
    content: killing those who tried to escape.
  - type: text
    content: You should not have captured the survivors
  - type: text
    content: and handed them over in their terrible time of trouble.
  - type: heading
    content: Edom Destroyed, Israel Restored
  '15':
  - type: text
    content: '“The day is near when I, the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: will judge all godless nations!
  - type: text
    content: As you have done to Israel,
  - type: text
    content: so it will be done to you.
  - type: text
    content: All your evil deeds
  - type: text
    content: will fall back on your own heads.
  '16':
  - type: text
    content: Just as you swallowed up my people
  - type: text
    content: on my holy mountain,
  - type: text
    content: so you and the surrounding nations
  - type: text
    content: will swallow the punishment I pour out on you.
  - type: text
    content: Yes, all you nations will drink and stagger
  - type: text
    content: and disappear from history.
  '17':
  - type: text
    content: “But Jerusalem
  - type: note
    content: Hebrew Mount Zion.
  - type: text
    content: ' will become a refuge for those who escape;'
  - type: text
    content: it will be a holy place.
  - type: text
    content: And the people of Israel
  - type: note
    content: Hebrew house of Jacob; also in 18. See note on 10.
  - type: text
    content: ' will come back'
  - type: text
    content: to reclaim their inheritance.
  '18':
  - type: text
    content: The people of Israel will be a raging fire,
  - type: text
    content: and Edom a field of dry stubble.
  - type: text
    content: The descendants of Joseph will be a flame
  - type: text
    content: roaring across the field, devouring everything.
  - type: text
    content: There will be no survivors in Edom.
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken!'
  '19':
  - type: text
    content: “Then my people living in the Negev
  - type: text
    content: will occupy the mountains of Edom.
  - type: text
    content: Those living in the foothills of Judah
  - type: note
    content: Hebrew the Shephelah.
  - type: text
    content: will possess the Philistine plains
  - type: text
    content: and take over the fields of Ephraim and Samaria.
  - type: text
    content: And the people of Benjamin
  - type: text
    content: will occupy the land of Gilead.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says to Edom,'
  - type: text
    content: “I will cut you down to size among the nations;
  - type: text
    content: you will be greatly despised.
  '20':
  - type: text
    content: The exiles of Israel will return to their land
  - type: text
    content: and occupy the Phoenician coast as far north as Zarephath.
  - type: text
    content: The captives from Jerusalem exiled in the north
  - type: note
    content: Hebrew in Sepharad.
  - type: text
    content: will return home and resettle the towns of the Negev.
  '21':
  - type: text
    content: Those who have been rescued
  - type: note
    content: As in Greek and Syriac versions; Hebrew reads Rescuers.
  - type: text
    content: ' will go up to'
  - type: note
    content: Or from.
  - type: text
    content: ' Mount Zion in Jerusalem'
  - type: text
    content: to rule over the mountains of Edom.
  - type: text
    content: 'And the '
  - type: text
    content: 'Lord '
  - type: text
    content: himself will be king!”
  '3':
  - type: text
    content: You have been deceived by your own pride
  - type: text
    content: because you live in a rock fortress
  - type: text
    content: and make your home high in the mountains.
  - type: text
    content: ‘Who can ever reach us way up here?’
  - type: text
    content: you ask boastfully.
  '4':
  - type: text
    content: But even if you soar as high as eagles
  - type: text
    content: and build your nest among the stars,
  - type: text
    content: I will bring you crashing down,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: “If thieves came at night and robbed you
  - type: text
    content: (what a disaster awaits you!),
  - type: text
    content: they would not take everything.
  - type: text
    content: Those who harvest grapes
  - type: text
    content: always leave a few for the poor.
  - type: text
    content: But your enemies will wipe you out completely!
  '6':
  - type: text
    content: Every nook and cranny of Edom
  - type: note
    content: Hebrew Esau; also in 8b, 9, 18, 19, 21.
  - type: text
    content: will be searched and looted.
  - type: text
    content: Every treasure will be found and taken.
  '7':
  - type: text
    content: “All your allies will turn against you.
  - type: text
    content: They will help to chase you from your land.
  - type: text
    content: They will promise you peace
  - type: text
    content: while plotting to deceive and destroy you.
  - type: text
    content: Your trusted friends will set traps for you,
  - type: text
    content: and you won’t even know about it.
  '8':
  - type: text
    content: At that time not a single wise person
  - type: text
    content: will be left in the whole land of Edom,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “For on the mountains of Edom
  - type: text
    content: I will destroy everyone who has understanding.
  '9':
  - type: text
    content: The mightiest warriors of Teman
  - type: text
    content: will be terrified,
  - type: text
    content: and everyone on the mountains of Edom
  - type: text
    content: will be cut down in the slaughter.
  - type: heading
    content: Reasons for Edom’s Punishment
