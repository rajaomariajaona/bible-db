document_id: OBA.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is the vision that the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' revealed to Obadiah concerning the land of Edom.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Edom’s Judgment Announced
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'We have heard a message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: that an ambassador was sent to the nations to say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Get ready, everyone!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let’s assemble our armies and attack Edom!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says to Edom,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will cut you down to size among the nations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will be greatly despised.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You have been deceived by your own pride
- type: usfm
  marker: q2
  children:
  - type: text
    text: because you live in a rock fortress
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make your home high in the mountains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Who can ever reach us way up here?’
- type: usfm
  marker: q2
  children:
  - type: text
    text: you ask boastfully.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But even if you soar as high as eagles
- type: usfm
  marker: q2
  children:
  - type: text
    text: and build your nest among the stars,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will bring you crashing down,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “If thieves came at night and robbed you
- type: usfm
  marker: q2
  children:
  - type: text
    text: (what a disaster awaits you!),
- type: usfm
  marker: q2
  children:
  - type: text
    text: they would not take everything.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who harvest grapes
- type: usfm
  marker: q2
  children:
  - type: text
    text: always leave a few for the poor.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But your enemies will wipe you out completely!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Every nook and cranny of Edom
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Esau; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 8b, 9, 18, 19, 21.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be searched and looted.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Every treasure will be found and taken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “All your allies will turn against you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will help to chase you from your land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will promise you peace
- type: usfm
  marker: q2
  children:
  - type: text
    text: while plotting to deceive and destroy you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your trusted friends will set traps for you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you won’t even know about it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: At that time not a single wise person
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be left in the whole land of Edom,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “For on the mountains of Edom
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will destroy everyone who has understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The mightiest warriors of Teman
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be terrified,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and everyone on the mountains of Edom
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be cut down in the slaughter.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reasons for Edom’s Punishment
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Because of the violence you did
- type: usfm
  marker: q2
  children:
  - type: text
    text: to your close relatives in Israel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'your brother Jacob. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The names “Jacob” and “Israel” are often interchanged throughout the Old Testament, referring sometimes to the individual patriarch and sometimes to the nation.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: you will be filled with shame
- type: usfm
  marker: q2
  children:
  - type: text
    text: and destroyed forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: When they were invaded,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you stood aloof, refusing to help them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Foreign invaders carried off their wealth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cast lots to divide up Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you acted like one of Israel’s enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “You should not have gloated
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they exiled your relatives to distant lands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You should not have rejoiced
- type: usfm
  marker: q2
  children:
  - type: text
    text: when the people of Judah suffered such misfortune.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You should not have spoken arrogantly
- type: usfm
  marker: q2
  children:
  - type: text
    text: in that terrible time of trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You should not have plundered the land of Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they were suffering such calamity.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You should not have gloated over their destruction
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they were suffering such calamity.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You should not have seized their wealth
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they were suffering such calamity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You should not have stood at the crossroads,
- type: usfm
  marker: q2
  children:
  - type: text
    text: killing those who tried to escape.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You should not have captured the survivors
- type: usfm
  marker: q2
  children:
  - type: text
    text: and handed them over in their terrible time of trouble.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Edom Destroyed, Israel Restored
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“The day is near when I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: will judge all godless nations!
- type: usfm
  marker: q1
  children:
  - type: text
    text: As you have done to Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so it will be done to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All your evil deeds
- type: usfm
  marker: q2
  children:
  - type: text
    text: will fall back on your own heads.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Just as you swallowed up my people
- type: usfm
  marker: q2
  children:
  - type: text
    text: on my holy mountain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so you and the surrounding nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: will swallow the punishment I pour out on you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, all you nations will drink and stagger
- type: usfm
  marker: q2
  children:
  - type: text
    text: and disappear from history.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “But Jerusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mount Zion.
    marker-yv: yv-n
  - type: text
    text: ' will become a refuge for those who escape;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will be a holy place.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the people of Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'house of Jacob; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 18. See note on 10.
    marker-yv: yv-n
  - type: text
    text: ' will come back'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to reclaim their inheritance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The people of Israel will be a raging fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Edom a field of dry stubble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The descendants of Joseph will be a flame
- type: usfm
  marker: q2
  children:
  - type: text
    text: roaring across the field, devouring everything.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There will be no survivors in Edom.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have spoken!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Then my people living in the Negev
- type: usfm
  marker: q2
  children:
  - type: text
    text: will occupy the mountains of Edom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those living in the foothills of Judah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Shephelah.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: will possess the Philistine plains
- type: usfm
  marker: q2
  children:
  - type: text
    text: and take over the fields of Ephraim and Samaria.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the people of Benjamin
- type: usfm
  marker: q2
  children:
  - type: text
    text: will occupy the land of Gilead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The exiles of Israel will return to their land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and occupy the Phoenician coast as far north as Zarephath.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The captives from Jerusalem exiled in the north
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in Sepharad.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: will return home and resettle the towns of the Negev.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Those who have been rescued
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:21a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek and Syriac versions; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Rescuers.
    marker-yv: yv-n
  - type: text
    text: ' will go up to'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:21b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from.
    marker-yv: yv-n
  - type: text
    text: ' Mount Zion in Jerusalem'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to rule over the mountains of Edom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'Lord '
  - type: text
    text: himself will be king!”
