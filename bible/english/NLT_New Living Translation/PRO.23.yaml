document_id: PRO.23
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: While dining with a ruler,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pay attention to what is put before you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: If you are a big eater,
- type: usfm
  marker: q2
  children:
  - type: text
    text: put a knife to your throat;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: don’t desire all the delicacies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he might be trying to trick you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Don’t wear yourself out trying to get rich.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Be wise enough to know when to quit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: In the blink of an eye wealth disappears,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for it will sprout wings
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fly away like an eagle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Don’t eat with people who are stingy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t desire their delicacies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They are always thinking about how much it costs.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Eat and drink,” they say, but they don’t mean it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You will throw up what little you’ve eaten,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your compliments will be wasted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Don’t waste your breath on fools,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they will despise the wisest advice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Don’t cheat your neighbor by moving the ancient boundary markers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t take the land of defenseless orphans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For their Redeemer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: redeemer.
    marker-yv: yv-n
  - type: text
    text: ' is strong;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he himself will bring their charges against you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Commit yourself to instruction;
- type: usfm
  marker: q2
  children:
  - type: text
    text: listen carefully to words of knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Don’t fail to discipline your children.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The rod of punishment won’t kill them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Physical discipline
- type: usfm
  marker: q2
  children:
  - type: text
    text: may well save them from death.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from Sheol.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My child,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'My son; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 23:19.
    marker-yv: yv-n
  - type: text
    text: ' if your heart is wise,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: my own heart will rejoice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Everything in me will celebrate
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you speak what is right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Don’t envy sinners,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but always continue to fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: You will be rewarded for this;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your hope will not be disappointed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'My child, listen and be wise:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Keep your heart on the right course.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Do not carouse with drunkards
- type: usfm
  marker: q2
  children:
  - type: text
    text: or feast with gluttons,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: for they are on their way to poverty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and too much sleep clothes them in rags.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Listen to your father, who gave you life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and don’t despise your mother when she is old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Get the truth and never sell it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: also get wisdom, discipline, and good judgment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The father of godly children has cause for joy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: What a pleasure to have children who are wise.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to have a wise son.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: So give your father and mother joy!
- type: usfm
  marker: q2
  children:
  - type: text
    text: May she who gave you birth be happy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: O my son, give me your heart.
- type: usfm
  marker: q2
  children:
  - type: text
    text: May your eyes take delight in following my ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: A prostitute is a dangerous trap;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a promiscuous woman is as dangerous as falling into a narrow well.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: She hides and waits like a robber,
- type: usfm
  marker: q2
  children:
  - type: text
    text: eager to make more men unfaithful.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Who has anguish? Who has sorrow?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who is always fighting? Who is always complaining?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who has unnecessary bruises? Who has bloodshot eyes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: It is the one who spends long hours in the taverns,
- type: usfm
  marker: q2
  children:
  - type: text
    text: trying out new drinks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Don’t gaze at the wine, seeing how red it is,
- type: usfm
  marker: q2
  children:
  - type: text
    text: how it sparkles in the cup, how smoothly it goes down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: For in the end it bites like a poisonous snake;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it stings like a viper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: You will see hallucinations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will say crazy things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: You will stagger like a sailor tossed at sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: clinging to a swaying mast.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: And you will say, “They hit me, but I didn’t feel it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I didn’t even know it when they beat me up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When will I wake up
- type: usfm
  marker: q2
  children:
  - type: text
    text: so I can look for another drink?”
