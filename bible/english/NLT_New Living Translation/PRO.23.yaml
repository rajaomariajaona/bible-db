document_id: PRO.23,116
type_code: eng
verses:
  '1':
  - type: text
    content: While dining with a ruler,
  - type: text
    content: pay attention to what is put before you.
  '10':
  - type: text
    content: Don’t cheat your neighbor by moving the ancient boundary markers;
  - type: text
    content: don’t take the land of defenseless orphans.
  '11':
  - type: text
    content: For their Redeemer
  - type: note
    content: Or redeemer.
  - type: text
    content: ' is strong;'
  - type: text
    content: he himself will bring their charges against you.
  '12':
  - type: text
    content: Commit yourself to instruction;
  - type: text
    content: listen carefully to words of knowledge.
  '13':
  - type: text
    content: Don’t fail to discipline your children.
  - type: text
    content: The rod of punishment won’t kill them.
  '14':
  - type: text
    content: Physical discipline
  - type: text
    content: may well save them from death.
  - type: note
    content: Hebrew from Sheol.
  '15':
  - type: text
    content: My child,
  - type: note
    content: Hebrew My son; also in 23:19.
  - type: text
    content: ' if your heart is wise,'
  - type: text
    content: my own heart will rejoice!
  '16':
  - type: text
    content: Everything in me will celebrate
  - type: text
    content: when you speak what is right.
  '17':
  - type: text
    content: Don’t envy sinners,
  - type: text
    content: 'but always continue to fear the '
  - type: text
    content: Lord
  - type: text
    content: .
  '18':
  - type: text
    content: You will be rewarded for this;
  - type: text
    content: your hope will not be disappointed.
  '19':
  - type: text
    content: 'My child, listen and be wise:'
  - type: text
    content: Keep your heart on the right course.
  '2':
  - type: text
    content: If you are a big eater,
  - type: text
    content: put a knife to your throat;
  '20':
  - type: text
    content: Do not carouse with drunkards
  - type: text
    content: or feast with gluttons,
  '21':
  - type: text
    content: for they are on their way to poverty,
  - type: text
    content: and too much sleep clothes them in rags.
  '22':
  - type: text
    content: Listen to your father, who gave you life,
  - type: text
    content: and don’t despise your mother when she is old.
  '23':
  - type: text
    content: Get the truth and never sell it;
  - type: text
    content: also get wisdom, discipline, and good judgment.
  '24':
  - type: text
    content: The father of godly children has cause for joy.
  - type: text
    content: What a pleasure to have children who are wise.
  - type: note
    content: Hebrew to have a wise son.
  '25':
  - type: text
    content: So give your father and mother joy!
  - type: text
    content: May she who gave you birth be happy.
  '26':
  - type: text
    content: O my son, give me your heart.
  - type: text
    content: May your eyes take delight in following my ways.
  '27':
  - type: text
    content: A prostitute is a dangerous trap;
  - type: text
    content: a promiscuous woman is as dangerous as falling into a narrow well.
  '28':
  - type: text
    content: She hides and waits like a robber,
  - type: text
    content: eager to make more men unfaithful.
  '29':
  - type: text
    content: Who has anguish? Who has sorrow?
  - type: text
    content: Who is always fighting? Who is always complaining?
  - type: text
    content: Who has unnecessary bruises? Who has bloodshot eyes?
  '3':
  - type: text
    content: don’t desire all the delicacies,
  - type: text
    content: for he might be trying to trick you.
  '30':
  - type: text
    content: It is the one who spends long hours in the taverns,
  - type: text
    content: trying out new drinks.
  '31':
  - type: text
    content: Don’t gaze at the wine, seeing how red it is,
  - type: text
    content: how it sparkles in the cup, how smoothly it goes down.
  '32':
  - type: text
    content: For in the end it bites like a poisonous snake;
  - type: text
    content: it stings like a viper.
  '33':
  - type: text
    content: You will see hallucinations,
  - type: text
    content: and you will say crazy things.
  '34':
  - type: text
    content: You will stagger like a sailor tossed at sea,
  - type: text
    content: clinging to a swaying mast.
  '35':
  - type: text
    content: And you will say, “They hit me, but I didn’t feel it.
  - type: text
    content: I didn’t even know it when they beat me up.
  - type: text
    content: When will I wake up
  - type: text
    content: so I can look for another drink?”
  '4':
  - type: text
    content: Don’t wear yourself out trying to get rich.
  - type: text
    content: Be wise enough to know when to quit.
  '5':
  - type: text
    content: In the blink of an eye wealth disappears,
  - type: text
    content: for it will sprout wings
  - type: text
    content: and fly away like an eagle.
  '6':
  - type: text
    content: Don’t eat with people who are stingy;
  - type: text
    content: don’t desire their delicacies.
  '7':
  - type: text
    content: They are always thinking about how much it costs.
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: “Eat and drink,” they say, but they don’t mean it.
  '8':
  - type: text
    content: You will throw up what little you’ve eaten,
  - type: text
    content: and your compliments will be wasted.
  '9':
  - type: text
    content: Don’t waste your breath on fools,
  - type: text
    content: for they will despise the wisest advice.
