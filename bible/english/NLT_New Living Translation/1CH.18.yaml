document_id: 1CH.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David’s Military Victories
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After this, David defeated and subdued the Philistines by conquering Gath and its surrounding towns. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: David also conquered the land of Moab, and the Moabites who were spared became David’s subjects and paid him tribute money.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: David also destroyed the forces of Hadadezer, king of Zobah, as far as Hamath,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' when Hadadezer marched out to strengthen his control along the Euphrates River. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: David captured 1,000 chariots, 7,000 charioteers, and 20,000 foot soldiers. He crippled all the chariot horses except enough for 100 chariots.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Arameans from Damascus arrived to help King Hadadezer, David killed 22,000 of them. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then he placed several army garrisons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in Greek version and Latin Vulgate (see also 2 Sam 8:6); Hebrew lacks '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: several army garrisons.
    marker-yv: yv-n
  - type: text
    text: ' in Damascus, the Aramean capital, and the Arameans became David’s subjects and paid him tribute money. So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' made David victorious wherever he went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'David brought the gold shields of Hadadezer’s officers to Jerusalem, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: along with a large amount of bronze from Hadadezer’s towns of Tebah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tibhath, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Tebah; compare parallel text at 2 Sam 8:8.
    marker-yv: yv-n
  - type: text
    text: ' and Cun. Later Solomon melted the bronze and molded it into the great bronze basin called the Sea, the pillars, and the various bronze articles used at the Temple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: When King Toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 2 Sam 8:9; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tou; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 18:10.
    marker-yv: yv-n
  - type: text
    text: ' of Hamath heard that David had destroyed the entire army of King Hadadezer of Zobah, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: he sent his son Joram
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 2 Sam 8:10; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hadoram, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Joram.
    marker-yv: yv-n
  - type: text
    text: ' to congratulate King David for his successful campaign. Hadadezer and Toi had been enemies and were often at war. Joram presented David with many gifts of gold, silver, and bronze.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'King David dedicated all these gifts to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', along with the silver and gold he had taken from the other nations—from Edom, Moab, Ammon, Philistia, and Amalek.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Abishai son of Zeruiah destroyed 18,000 Edomites in the Valley of Salt. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He placed army garrisons in Edom, and all the Edomites became David’s subjects. In fact, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' made David victorious wherever he went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So David reigned over all Israel and did what was just and right for all his people. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Joab son of Zeruiah was commander of the army. Jehoshaphat son of Ahilud was the royal historian. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Zadok son of Ahitub and Ahimelech
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:16a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in some Hebrew manuscripts, Syriac version, and Latin Vulgate (see also 2 Sam 8:17); most Hebrew manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Abimelech.
    marker-yv: yv-n
  - type: text
    text: ' son of Abiathar were the priests. Seraiah'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:16b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'As in parallel text at 2 Sam 8:17; Hebrew reads '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shavsha.
    marker-yv: yv-n
  - type: text
    text: ' was the court secretary. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Benaiah son of Jehoiada was captain of the king’s bodyguard.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of the Kerethites and Pelethites.
    marker-yv: yv-n
  - type: text
    text: ' And David’s sons served as the king’s chief assistants.'
