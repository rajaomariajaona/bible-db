document_id: 1CH.18,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Military Victories
  - type: text
    content: 'After this, David defeated and subdued the Philistines by conquering Gath and its surrounding towns. '
  '10':
  - type: text
    content: he sent his son Joram
  - type: note
    content: As in parallel text at 2 Sam 8:10; Hebrew reads Hadoram, a variant spelling of Joram.
  - type: text
    content: ' to congratulate King David for his successful campaign. Hadadezer and Toi had been enemies and were often at war. Joram presented David with many gifts of gold, silver, and bronze.'
  '11':
  - type: text
    content: 'King David dedicated all these gifts to the '
  - type: text
    content: Lord
  - type: text
    content: ', along with the silver and gold he had taken from the other nations—from Edom, Moab, Ammon, Philistia, and Amalek.'
  '12':
  - type: text
    content: 'Abishai son of Zeruiah destroyed 18,000 Edomites in the Valley of Salt. '
  '13':
  - type: text
    content: 'He placed army garrisons in Edom, and all the Edomites became David’s subjects. In fact, the '
  - type: text
    content: Lord
  - type: text
    content: ' made David victorious wherever he went.'
  '14':
  - type: text
    content: 'So David reigned over all Israel and did what was just and right for all his people. '
  '15':
  - type: text
    content: 'Joab son of Zeruiah was commander of the army. Jehoshaphat son of Ahilud was the royal historian. '
  '16':
  - type: text
    content: Zadok son of Ahitub and Ahimelech
  - type: note
    content: As in some Hebrew manuscripts, Syriac version, and Latin Vulgate (see also 2 Sam 8:17); most Hebrew manuscripts read Abimelech.
  - type: text
    content: ' son of Abiathar were the priests. Seraiah'
  - type: note
    content: As in parallel text at 2 Sam 8:17; Hebrew reads Shavsha.
  - type: text
    content: ' was the court secretary. '
  '17':
  - type: text
    content: Benaiah son of Jehoiada was captain of the king’s bodyguard.
  - type: note
    content: Hebrew of the Kerethites and Pelethites.
  - type: text
    content: ' And David’s sons served as the king’s chief assistants.'
  '2':
  - type: text
    content: David also conquered the land of Moab, and the Moabites who were spared became David’s subjects and paid him tribute money.
  '3':
  - type: text
    content: David also destroyed the forces of Hadadezer, king of Zobah, as far as Hamath,
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: ' when Hadadezer marched out to strengthen his control along the Euphrates River. '
  '4':
  - type: text
    content: David captured 1,000 chariots, 7,000 charioteers, and 20,000 foot soldiers. He crippled all the chariot horses except enough for 100 chariots.
  '5':
  - type: text
    content: 'When Arameans from Damascus arrived to help King Hadadezer, David killed 22,000 of them. '
  '6':
  - type: text
    content: Then he placed several army garrisons
  - type: note
    content: As in Greek version and Latin Vulgate (see also 2 Sam 8:6); Hebrew lacks several army garrisons.
  - type: text
    content: ' in Damascus, the Aramean capital, and the Arameans became David’s subjects and paid him tribute money. So the '
  - type: text
    content: Lord
  - type: text
    content: ' made David victorious wherever he went.'
  '7':
  - type: text
    content: 'David brought the gold shields of Hadadezer’s officers to Jerusalem, '
  '8':
  - type: text
    content: along with a large amount of bronze from Hadadezer’s towns of Tebah
  - type: note
    content: Hebrew reads Tibhath, a variant spelling of Tebah; compare parallel text at 2 Sam 8:8.
  - type: text
    content: ' and Cun. Later Solomon melted the bronze and molded it into the great bronze basin called the Sea, the pillars, and the various bronze articles used at the Temple.'
  '9':
  - type: text
    content: When King Toi
  - type: note
    content: As in parallel text at 2 Sam 8:9; Hebrew reads Tou; also in 18:10.
  - type: text
    content: ' of Hamath heard that David had destroyed the entire army of King Hadadezer of Zobah, '
