document_id: ISA.26,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Praise to the Lord
  - type: text
    content: 'In that day, everyone in the land of Judah will sing this song:'
  - type: text
    content: Our city is strong!
  - type: text
    content: We are surrounded by the walls of God’s salvation.
  '10':
  - type: text
    content: Your kindness to the wicked
  - type: text
    content: does not make them do good.
  - type: text
    content: Although others do right, the wicked keep doing wrong
  - type: text
    content: 'and take no notice of the '
  - type: text
    content: Lord
  - type: text
    content: ’s majesty.
  '11':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', they pay no attention to your upraised fist.'
  - type: text
    content: Show them your eagerness to defend your people.
  - type: text
    content: Then they will be ashamed.
  - type: text
    content: Let your fire consume your enemies.
  '12':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you will grant us peace;'
  - type: text
    content: all we have accomplished is really from you.
  '13':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ' our God, others have ruled us,'
  - type: text
    content: but you alone are the one we worship.
  '14':
  - type: text
    content: Those we served before are dead and gone.
  - type: text
    content: Their departed spirits will never return!
  - type: text
    content: You attacked them and destroyed them,
  - type: text
    content: and they are long forgotten.
  '15':
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', you have made our nation great;'
  - type: text
    content: yes, you have made us great.
  - type: text
    content: You have extended our borders,
  - type: text
    content: and we give you the glory!
  '16':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', in distress we searched for you.'
  - type: text
    content: We prayed beneath the burden of your discipline.
  '17':
  - type: text
    content: Just as a pregnant woman
  - type: text
    content: writhes and cries out in pain as she gives birth,
  - type: text
    content: 'so were we in your presence, '
  - type: text
    content: Lord
  - type: text
    content: .
  '18':
  - type: text
    content: We, too, writhe in agony,
  - type: text
    content: but nothing comes of our suffering.
  - type: text
    content: We have not given salvation to the earth,
  - type: text
    content: nor brought life into the world.
  '19':
  - type: text
    content: 'But those who die in the '
  - type: text
    content: Lord
  - type: text
    content: ' will live;'
  - type: text
    content: their bodies will rise again!
  - type: text
    content: Those who sleep in the earth
  - type: text
    content: will rise up and sing for joy!
  - type: text
    content: For your life-giving light will fall like dew
  - type: text
    content: on your people in the place of the dead!
  - type: heading
    content: Restoration for Israel
  '2':
  - type: text
    content: Open the gates to all who are righteous;
  - type: text
    content: allow the faithful to enter.
  '20':
  - type: text
    content: Go home, my people,
  - type: text
    content: and lock your doors!
  - type: text
    content: Hide yourselves for a little while
  - type: text
    content: 'until the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger has passed.
  '21':
  - type: text
    content: 'Look! The '
  - type: text
    content: Lord
  - type: text
    content: ' is coming from heaven'
  - type: text
    content: to punish the people of the earth for their sins.
  - type: text
    content: The earth will no longer hide those who have been killed.
  - type: text
    content: They will be brought out for all to see.
  '3':
  - type: text
    content: You will keep in perfect peace
  - type: text
    content: all who trust in you,
  - type: text
    content: all whose thoughts are fixed on you!
  '4':
  - type: text
    content: 'Trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' always,'
  - type: text
    content: 'for the '
  - type: text
    content: Lord God
  - type: text
    content: ' is the eternal Rock.'
  '5':
  - type: text
    content: He humbles the proud
  - type: text
    content: and brings down the arrogant city.
  - type: text
    content: He brings it down to the dust.
  '6':
  - type: text
    content: The poor and oppressed trample it underfoot,
  - type: text
    content: and the needy walk all over it.
  '7':
  - type: text
    content: But for those who are righteous,
  - type: text
    content: the way is not steep and rough.
  - type: text
    content: You are a God who does what is right,
  - type: text
    content: and you smooth out the path ahead of them.
  '8':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', we show our trust in you by obeying your laws;'
  - type: text
    content: our heart’s desire is to glorify your name.
  '9':
  - type: text
    content: In the night I search for you;
  - type: text
    content: in the morning
  - type: note
    content: Hebrew within me.
  - type: text
    content: ' I earnestly seek you.'
  - type: text
    content: For only when you come to judge the earth
  - type: text
    content: will people learn what is right.
