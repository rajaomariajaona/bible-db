document_id: ISA.26,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'A Song of Praise to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'In that day, everyone in the land of Judah will sing this song:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our city is strong!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We are surrounded by the walls of God’s salvation.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your kindness to the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: does not make them do good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Although others do right, the wicked keep doing wrong
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and take no notice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s majesty.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', they pay no attention to your upraised fist.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Show them your eagerness to defend your people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they will be ashamed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let your fire consume your enemies.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you will grant us peace;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all we have accomplished is really from you.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, others have ruled us,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you alone are the one we worship.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those we served before are dead and gone.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their departed spirits will never return!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You attacked them and destroyed them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they are long forgotten.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you have made our nation great;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, you have made us great.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have extended our borders,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and we give you the glory!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', in distress we searched for you.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We prayed beneath the burden of your discipline.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just as a pregnant woman
  - type: usfm
    marker: q2
    children:
    - type: text
      text: writhes and cries out in pain as she gives birth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'so were we in your presence, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We, too, writhe in agony,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but nothing comes of our suffering.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have not given salvation to the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor brought life into the world.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But those who die in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will live;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their bodies will rise again!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who sleep in the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will rise up and sing for joy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your life-giving light will fall like dew
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on your people in the place of the dead!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Restoration for Israel
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Open the gates to all who are righteous;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: allow the faithful to enter.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go home, my people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lock your doors!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hide yourselves for a little while
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'until the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger has passed.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look! The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is coming from heaven'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to punish the people of the earth for their sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth will no longer hide those who have been killed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be brought out for all to see.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will keep in perfect peace
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all who trust in you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all whose thoughts are fixed on you!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' always,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord God
    - type: text
      text: ' is the eternal Rock.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He humbles the proud
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and brings down the arrogant city.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He brings it down to the dust.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The poor and oppressed trample it underfoot,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the needy walk all over it.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But for those who are righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the way is not steep and rough.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are a God who does what is right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you smooth out the path ahead of them.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', we show our trust in you by obeying your laws;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our heart’s desire is to glorify your name.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the night I search for you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the morning
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: within me.
      marker-yv: yv-n
    - type: text
      text: ' I earnestly seek you.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For only when you come to judge the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will people learn what is right.
