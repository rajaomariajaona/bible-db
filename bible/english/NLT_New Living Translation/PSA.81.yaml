document_id: PSA.81
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of Asaph, to be accompanied by a stringed instrument.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '81:TITLE '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: according to the gittith.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Sing praises to God, our strength.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Sing to the God of Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sing! Beat the tambourine.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Play the sweet lyre and the harp.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Blow the ram’s horn at new moon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and again at full moon to call a festival!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For this is required by the decrees of Israel;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is a regulation of the God of Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He made it a law for Israel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '81:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: for Joseph.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he attacked Egypt to set us free.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I heard an unknown voice say,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Now I will take the load from your shoulders;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will free your hands from their heavy tasks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You cried to me in trouble, and I saved you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I answered out of the thundercloud
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and tested your faith when there was no water at Meribah. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Listen to me, O my people, while I give you stern warnings.
- type: usfm
  marker: q2
  children:
  - type: text
    text: O Israel, if you would only listen to me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You must never have a foreign god;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you must not bow down before a false god.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For it was I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who rescued you from the land of Egypt.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Open your mouth wide, and I will fill it with good things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “But no, my people wouldn’t listen.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel did not want me around.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So I let them follow their own stubborn desires,
- type: usfm
  marker: q2
  children:
  - type: text
    text: living according to their own ideas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Oh, that my people would listen to me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Oh, that Israel would follow me, walking in my paths!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: How quickly I would then subdue their enemies!
- type: usfm
  marker: q2
  children:
  - type: text
    text: How soon my hands would be upon their foes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Those who hate the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' would cringe before him;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: they would be doomed forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But I would feed you with the finest wheat.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would satisfy you with wild honey from the rock.”
