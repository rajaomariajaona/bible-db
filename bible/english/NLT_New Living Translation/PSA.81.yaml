document_id: PSA.81,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of Asaph, to be accompanied by a stringed instrument.'
  - type: note
    content: Hebrew according to the gittith.
  - type: text
    content: Sing praises to God, our strength.
  - type: text
    content: Sing to the God of Jacob.
  '10':
  - type: text
    content: 'For it was I, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: who rescued you from the land of Egypt.
  - type: text
    content: Open your mouth wide, and I will fill it with good things.
  '11':
  - type: text
    content: “But no, my people wouldn’t listen.
  - type: text
    content: Israel did not want me around.
  '12':
  - type: text
    content: So I let them follow their own stubborn desires,
  - type: text
    content: living according to their own ideas.
  '13':
  - type: text
    content: Oh, that my people would listen to me!
  - type: text
    content: Oh, that Israel would follow me, walking in my paths!
  '14':
  - type: text
    content: How quickly I would then subdue their enemies!
  - type: text
    content: How soon my hands would be upon their foes!
  '15':
  - type: text
    content: 'Those who hate the '
  - type: text
    content: Lord
  - type: text
    content: ' would cringe before him;'
  - type: text
    content: they would be doomed forever.
  '16':
  - type: text
    content: But I would feed you with the finest wheat.
  - type: text
    content: I would satisfy you with wild honey from the rock.”
  '2':
  - type: text
    content: Sing! Beat the tambourine.
  - type: text
    content: Play the sweet lyre and the harp.
  '3':
  - type: text
    content: Blow the ram’s horn at new moon,
  - type: text
    content: and again at full moon to call a festival!
  '4':
  - type: text
    content: For this is required by the decrees of Israel;
  - type: text
    content: it is a regulation of the God of Jacob.
  '5':
  - type: text
    content: He made it a law for Israel
  - type: note
    content: Hebrew for Joseph.
  - type: text
    content: when he attacked Egypt to set us free.
  - type: text
    content: I heard an unknown voice say,
  '6':
  - type: text
    content: “Now I will take the load from your shoulders;
  - type: text
    content: I will free your hands from their heavy tasks.
  '7':
  - type: text
    content: You cried to me in trouble, and I saved you;
  - type: text
    content: I answered out of the thundercloud
  - type: text
    content: 'and tested your faith when there was no water at Meribah. '
  - type: text
    content: Interlude
  '8':
  - type: text
    content: “Listen to me, O my people, while I give you stern warnings.
  - type: text
    content: O Israel, if you would only listen to me!
  '9':
  - type: text
    content: You must never have a foreign god;
  - type: text
    content: you must not bow down before a false god.
