document_id: 1CO.11,116
type_code: eng
verses:
  '1':
  - type: text
    content: And you should imitate me, just as I imitate Christ.
  - type: heading
    content: Instructions for Public Worship
  '10':
  - type: text
    content: For this reason, and because the angels are watching, a woman should wear a covering on her head to show she is under authority.
  - type: note
    content: Greek should have an authority on her head.
  '11':
  - type: text
    content: 'But among the Lord’s people, women are not independent of men, and men are not independent of women. '
  '12':
  - type: text
    content: For although the first woman came from man, every other man was born from a woman, and everything comes from God.
  '13':
  - type: text
    content: 'Judge for yourselves. Is it right for a woman to pray to God in public without covering her head? '
  '14':
  - type: text
    content: 'Isn’t it obvious that it’s disgraceful for a man to have long hair? '
  '15':
  - type: text
    content: 'And isn’t long hair a woman’s pride and joy? For it has been given to her as a covering. '
  '16':
  - type: text
    content: But if anyone wants to argue about this, I simply say that we have no other custom than this, and neither do God’s other churches.
  - type: heading
    content: Order at the Lord’s Supper
  '17':
  - type: text
    content: 'But in the following instructions, I cannot praise you. For it sounds as if more harm than good is done when you meet together. '
  '18':
  - type: text
    content: 'First, I hear that there are divisions among you when you meet as a church, and to some extent I believe it. '
  '19':
  - type: text
    content: But, of course, there must be divisions among you so that you who have God’s approval will be recognized!
  '2':
  - type: text
    content: 'I am so glad that you always keep me in your thoughts, and that you are following the teachings I passed on to you. '
  '20':
  - type: text
    content: 'When you meet together, you are not really interested in the Lord’s Supper. '
  '21':
  - type: text
    content: 'For some of you hurry to eat your own meal without sharing with others. As a result, some go hungry while others get drunk. '
  '22':
  - type: text
    content: What? Don’t you have your own homes for eating and drinking? Or do you really want to disgrace God’s church and shame the poor? What am I supposed to say? Do you want me to praise you? Well, I certainly will not praise you for this!
  '23':
  - type: text
    content: 'For I pass on to you what I received from the Lord himself. On the night when he was betrayed, the Lord Jesus took some bread '
  '24':
  - type: text
    content: 'and gave thanks to God for it. Then he broke it in pieces and said, '
  - type: text
    content: “This is my body, which is given for you.
  - type: note
    content: Greek which is for you; other manuscripts read which is broken for you.
  - type: text
    content: ' '
  - type: text
    content: Do this in remembrance of me.”
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'In the same way, he took the cup of wine after supper, saying, '
  - type: text
    content: “This cup is the new covenant between God and his people—an agreement confirmed with my blood. Do this in remembrance of me as often as you drink it.”
  - type: text
    content: ' '
  '26':
  - type: text
    content: For every time you eat this bread and drink this cup, you are announcing the Lord’s death until he comes again.
  '27':
  - type: text
    content: So anyone who eats this bread or drinks this cup of the Lord unworthily is guilty of sinning against
  - type: note
    content: Or is responsible for.
  - type: text
    content: ' the body and blood of the Lord. '
  '28':
  - type: text
    content: 'That is why you should examine yourself before eating the bread and drinking the cup. '
  '29':
  - type: text
    content: For if you eat the bread or drink the cup without honoring the body of Christ,
  - type: note
    content: Greek the body; other manuscripts read the Lord’s body.
  - type: text
    content: ' you are eating and drinking God’s judgment upon yourself. '
  '3':
  - type: text
    content: 'But there is one thing I want you to know: The head of every man is Christ, the head of woman is man, and the head of Christ is God.'
  - type: note
    content: 'Or to know: The source of every man is Christ, the source of woman is man, and the source of Christ is God. Or to know: Every man is responsible to Christ, a woman is responsible to her husband, and Christ is responsible to God.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: That is why many of you are weak and sick and some have even died.
  '31':
  - type: text
    content: 'But if we would examine ourselves, we would not be judged by God in this way. '
  '32':
  - type: text
    content: Yet when we are judged by the Lord, we are being disciplined so that we will not be condemned along with the world.
  '33':
  - type: text
    content: So, my dear brothers and sisters,
  - type: note
    content: Greek brothers.
  - type: text
    content: ' when you gather for the Lord’s Supper, wait for each other. '
  '34':
  - type: text
    content: If you are really hungry, eat at home so you won’t bring judgment upon yourselves when you meet together. I’ll give you instructions about the other matters after I arrive.
  '4':
  - type: text
    content: A man dishonors his head
  - type: note
    content: Or dishonors Christ.
  - type: text
    content: ' if he covers his head while praying or prophesying. '
  '5':
  - type: text
    content: But a woman dishonors her head
  - type: note
    content: Or dishonors her husband.
  - type: text
    content: ' if she prays or prophesies without a covering on her head, for this is the same as shaving her head. '
  '6':
  - type: text
    content: Yes, if she refuses to wear a head covering, she should cut off all her hair! But since it is shameful for a woman to have her hair cut or her head shaved, she should wear a covering.
  - type: note
    content: Or should have long hair.
  '7':
  - type: text
    content: 'A man should not wear anything on his head when worshiping, for man is made in God’s image and reflects God’s glory. And woman reflects man’s glory. '
  '8':
  - type: text
    content: 'For the first man didn’t come from woman, but the first woman came from man. '
  '9':
  - type: text
    content: 'And man was not made for woman, but woman was made for man. '
