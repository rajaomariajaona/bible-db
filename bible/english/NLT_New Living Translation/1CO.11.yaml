document_id: 1CO.11
type_code: eng
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: And you should imitate me, just as I imitate Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Instructions for Public Worship
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I am so glad that you always keep me in your thoughts, and that you are following the teachings I passed on to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But there is one thing I want you to know: The head of every man is Christ, the head of woman is man, and the head of Christ is God.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'to know: The source of every man is Christ, the source of woman is man, and the source of Christ is God. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'to know: Every man is responsible to Christ, a woman is responsible to her husband, and Christ is responsible to God.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A man dishonors his head
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dishonors Christ.
    marker-yv: yv-n
  - type: text
    text: ' if he covers his head while praying or prophesying. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But a woman dishonors her head
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dishonors her husband.
    marker-yv: yv-n
  - type: text
    text: ' if she prays or prophesies without a covering on her head, for this is the same as shaving her head. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Yes, if she refuses to wear a head covering, she should cut off all her hair! But since it is shameful for a woman to have her hair cut or her head shaved, she should wear a covering.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: should have long hair.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'A man should not wear anything on his head when worshiping, for man is made in God’s image and reflects God’s glory. And woman reflects man’s glory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For the first man didn’t come from woman, but the first woman came from man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And man was not made for woman, but woman was made for man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For this reason, and because the angels are watching, a woman should wear a covering on her head to show she is under authority.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: should have an authority on her head.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But among the Lord’s people, women are not independent of men, and men are not independent of women. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For although the first woman came from man, every other man was born from a woman, and everything comes from God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Judge for yourselves. Is it right for a woman to pray to God in public without covering her head? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Isn’t it obvious that it’s disgraceful for a man to have long hair? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And isn’t long hair a woman’s pride and joy? For it has been given to her as a covering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But if anyone wants to argue about this, I simply say that we have no other custom than this, and neither do God’s other churches.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Order at the Lord’s Supper
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But in the following instructions, I cannot praise you. For it sounds as if more harm than good is done when you meet together. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'First, I hear that there are divisions among you when you meet as a church, and to some extent I believe it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But, of course, there must be divisions among you so that you who have God’s approval will be recognized!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'When you meet together, you are not really interested in the Lord’s Supper. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For some of you hurry to eat your own meal without sharing with others. As a result, some go hungry while others get drunk. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: What? Don’t you have your own homes for eating and drinking? Or do you really want to disgrace God’s church and shame the poor? What am I supposed to say? Do you want me to praise you? Well, I certainly will not praise you for this!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For I pass on to you what I received from the Lord himself. On the night when he was betrayed, the Lord Jesus took some bread '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and gave thanks to God for it. Then he broke it in pieces and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This is my body, which is given for you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'which is for you; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'other manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: which is broken for you.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Do this in remembrance of me.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'In the same way, he took the cup of wine after supper, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This cup is the new covenant between God and his people—an agreement confirmed with my blood. Do this in remembrance of me as often as you drink it.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: For every time you eat this bread and drink this cup, you are announcing the Lord’s death until he comes again.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: So anyone who eats this bread or drinks this cup of the Lord unworthily is guilty of sinning against
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: is responsible for.
    marker-yv: yv-n
  - type: text
    text: ' the body and blood of the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'That is why you should examine yourself before eating the bread and drinking the cup. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: For if you eat the bread or drink the cup without honoring the body of Christ,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the body; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'other manuscripts read '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Lord’s body.
    marker-yv: yv-n
  - type: text
    text: ' you are eating and drinking God’s judgment upon yourself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: That is why many of you are weak and sick and some have even died.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'But if we would examine ourselves, we would not be judged by God in this way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Yet when we are judged by the Lord, we are being disciplined so that we will not be condemned along with the world.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: So, my dear brothers and sisters,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: brothers.
    marker-yv: yv-n
  - type: text
    text: ' when you gather for the Lord’s Supper, wait for each other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: If you are really hungry, eat at home so you won’t bring judgment upon yourselves when you meet together. I’ll give you instructions about the other matters after I arrive.
