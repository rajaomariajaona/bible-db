document_id: ACT.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter Heals a Crippled Beggar
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Peter and John went to the Temple one afternoon to take part in the three o’clock prayer service. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'As they approached the Temple, a man lame from birth was being carried in. Each day he was put beside the Temple gate, the one called the Beautiful Gate, so he could beg from the people going into the Temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When he saw Peter and John about to enter, he asked them for some money.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Peter and John looked at him intently, and Peter said, “Look at us!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The lame man looked at them eagerly, expecting some money. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But Peter said, “I don’t have any silver or gold for you. But I’ll give you what I have. In the name of Jesus Christ the Nazarene,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jesus Christ of Nazareth.
    marker-yv: yv-n
  - type: text
    text: ' get up and'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts do not include '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: get up and.
    marker-yv: yv-n
  - type: text
    text: ' walk!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then Peter took the lame man by the right hand and helped him up. And as he did, the man’s feet and ankles were instantly healed and strengthened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He jumped up, stood on his feet, and began to walk! Then, walking, leaping, and praising God, he went into the Temple with them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'All the people saw him walking and heard him praising God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When they realized he was the lame beggar they had seen so often at the Beautiful Gate, they were absolutely astounded! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They all rushed out in amazement to Solomon’s Colonnade, where the man was holding tightly to Peter and John.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter Preaches in the Temple
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Peter saw his opportunity and addressed the crowd. “People of Israel,” he said, “what is so surprising about this? And why stare at us as though we had made this man walk by our own power or godliness? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For it is the God of Abraham, Isaac, and Jacob—the God of all our ancestors—who has brought glory to his servant Jesus by doing this. This is the same Jesus whom you handed over and rejected before Pilate, despite Pilate’s decision to release him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You rejected this holy, righteous one and instead demanded the release of a murderer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: You killed the author of life, but God raised him from the dead. And we are witnesses of this fact!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Through faith in the name of Jesus, this man was healed—and you know how crippled he was before. Faith in Jesus’ name has healed him before your very eyes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Friends,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Brothers.
    marker-yv: yv-n
  - type: text
    text: ' I realize that what you and your leaders did to Jesus was done in ignorance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But God was fulfilling what all the prophets had foretold about the Messiah—that he must suffer these things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now repent of your sins and turn to God, so that your sins may be wiped away. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then times of refreshment will come from the presence of the Lord, and he will again send you Jesus, your appointed Messiah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For he must remain in heaven until the time for the final restoration of all things, as God promised long ago through his holy prophets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Moses said, ‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will raise up for you a Prophet like me from among your own people. Listen carefully to everything he tells you.’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deut 18:15.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then Moses said, ‘Anyone who will not listen to that Prophet will be completely cut off from God’s people.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deut 18:19; Lev 23:29.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“Starting with Samuel, every prophet spoke about what is happening today. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: You are the children of those prophets, and you are included in the covenant God promised to your ancestors. For God said to Abraham, ‘Through your descendants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'your seed; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: see Gen 12:3; 22:18.
    marker-yv: yv-n
  - type: text
    text: ' all the families on earth will be blessed.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: When God raised up his servant, Jesus, he sent him first to you people of Israel, to bless you by turning each of you back from your sinful ways.”
