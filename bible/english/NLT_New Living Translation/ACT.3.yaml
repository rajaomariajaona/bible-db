document_id: ACT.3,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Peter Heals a Crippled Beggar
  - type: text
    content: 'Peter and John went to the Temple one afternoon to take part in the three o’clock prayer service. '
  '10':
  - type: text
    content: 'When they realized he was the lame beggar they had seen so often at the Beautiful Gate, they were absolutely astounded! '
  '11':
  - type: text
    content: They all rushed out in amazement to Solomon’s Colonnade, where the man was holding tightly to Peter and John.
  - type: heading
    content: Peter Preaches in the Temple
  '12':
  - type: text
    content: 'Peter saw his opportunity and addressed the crowd. “People of Israel,” he said, “what is so surprising about this? And why stare at us as though we had made this man walk by our own power or godliness? '
  '13':
  - type: text
    content: 'For it is the God of Abraham, Isaac, and Jacob—the God of all our ancestors—who has brought glory to his servant Jesus by doing this. This is the same Jesus whom you handed over and rejected before Pilate, despite Pilate’s decision to release him. '
  '14':
  - type: text
    content: 'You rejected this holy, righteous one and instead demanded the release of a murderer. '
  '15':
  - type: text
    content: You killed the author of life, but God raised him from the dead. And we are witnesses of this fact!
  '16':
  - type: text
    content: “Through faith in the name of Jesus, this man was healed—and you know how crippled he was before. Faith in Jesus’ name has healed him before your very eyes.
  '17':
  - type: text
    content: “Friends,
  - type: note
    content: Greek Brothers.
  - type: text
    content: ' I realize that what you and your leaders did to Jesus was done in ignorance. '
  '18':
  - type: text
    content: 'But God was fulfilling what all the prophets had foretold about the Messiah—that he must suffer these things. '
  '19':
  - type: text
    content: 'Now repent of your sins and turn to God, so that your sins may be wiped away. '
  '2':
  - type: text
    content: 'As they approached the Temple, a man lame from birth was being carried in. Each day he was put beside the Temple gate, the one called the Beautiful Gate, so he could beg from the people going into the Temple. '
  '20':
  - type: text
    content: 'Then times of refreshment will come from the presence of the Lord, and he will again send you Jesus, your appointed Messiah. '
  '21':
  - type: text
    content: 'For he must remain in heaven until the time for the final restoration of all things, as God promised long ago through his holy prophets. '
  '22':
  - type: text
    content: 'Moses said, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will raise up for you a Prophet like me from among your own people. Listen carefully to everything he tells you.’'
  - type: note
    content: Deut 18:15.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Then Moses said, ‘Anyone who will not listen to that Prophet will be completely cut off from God’s people.’
  - type: note
    content: Deut 18:19; Lev 23:29.
  '24':
  - type: text
    content: '“Starting with Samuel, every prophet spoke about what is happening today. '
  '25':
  - type: text
    content: You are the children of those prophets, and you are included in the covenant God promised to your ancestors. For God said to Abraham, ‘Through your descendants
  - type: note
    content: Greek your seed; see Gen 12:3; 22:18.
  - type: text
    content: ' all the families on earth will be blessed.’ '
  '26':
  - type: text
    content: When God raised up his servant, Jesus, he sent him first to you people of Israel, to bless you by turning each of you back from your sinful ways.”
  '3':
  - type: text
    content: When he saw Peter and John about to enter, he asked them for some money.
  '4':
  - type: text
    content: 'Peter and John looked at him intently, and Peter said, “Look at us!” '
  '5':
  - type: text
    content: 'The lame man looked at them eagerly, expecting some money. '
  '6':
  - type: text
    content: But Peter said, “I don’t have any silver or gold for you. But I’ll give you what I have. In the name of Jesus Christ the Nazarene,
  - type: note
    content: Or Jesus Christ of Nazareth.
  - type: text
    content: ' get up and'
  - type: note
    content: Some manuscripts do not include get up and.
  - type: text
    content: ' walk!”'
  '7':
  - type: text
    content: 'Then Peter took the lame man by the right hand and helped him up. And as he did, the man’s feet and ankles were instantly healed and strengthened. '
  '8':
  - type: text
    content: He jumped up, stood on his feet, and began to walk! Then, walking, leaping, and praising God, he went into the Temple with them.
  '9':
  - type: text
    content: 'All the people saw him walking and heard him praising God. '
