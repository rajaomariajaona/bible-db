document_id: REV.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Message to the Church in Ephesus
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Write this letter to the angel
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the messenger; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 2:8, 12, 18.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'of the church in Ephesus. This is the message from the one who holds the seven stars in his right hand, the one who walks among the seven gold lampstands:'
  '10':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Don’t be afraid of what you are about to suffer. The devil will throw some of you into prison to test you. You will suffer for ten days. But if you remain faithful even when facing death, I will give you the crown of life.
  '11':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Anyone with ears to hear must listen to the Spirit and understand what he is saying to the churches. Whoever is victorious will not be harmed by the second death.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Message to the Church in Pergamum
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Write this letter to the angel of the church in Pergamum. This is the message from the one with the sharp two-edged sword:'
  '13':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I know that you live in the city where Satan has his throne, yet you have remained loyal to me. You refused to deny me even when Antipas, my faithful witness, was martyred among you there in Satan’s city.
  '14':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But I have a few complaints against you. You tolerate some among you whose teaching is like that of Balaam, who showed Balak how to trip up the people of Israel. He taught them to sin by eating food offered to idols and by committing sexual sin.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In a similar way, you have some Nicolaitans among you who follow the same teaching.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Repent of your sin, or I will come to you suddenly and fight against them with the sword of my mouth.
  '17':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Anyone with ears to hear must listen to the Spirit and understand what he is saying to the churches. To everyone who is victorious I will give some of the manna that has been hidden away in heaven. And I will give to each one a white stone, and on the stone will be engraved a new name that no one understands except the one who receives it.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Message to the Church in Thyatira
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Write this letter to the angel of the church in Thyatira. This is the message from the Son of God, whose eyes are like flames of fire, whose feet are like polished bronze:'
  '19':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I know all the things you do. I have seen your love, your faith, your service, and your patient endurance. And I can see your constant improvement in all these things.
  '2':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I know all the things you do. I have seen your hard work and your patient endurance. I know you don’t tolerate evil people. You have examined the claims of those who say they are apostles but are not. You have discovered they are liars.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But I have this complaint against you. You are permitting that woman—that Jezebel who calls herself a prophet—to lead my servants astray. She teaches them to commit sexual sin and to eat food offered to idols.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I gave her time to repent, but she does not want to turn away from her immorality.
  '22':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Therefore, I will throw her on a bed of suffering,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a bed.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and those who commit adultery with her will suffer greatly unless they repent and turn away from her evil deeds.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will strike her children dead. Then all the churches will know that I am the one who searches out the thoughts and intentions of every person. And I will give to each of you whatever you deserve.
  '24':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But I also have a message for the rest of you in Thyatira who have not followed this false teaching (‘deeper truths,’ as they call them—depths of Satan, actually). I will ask nothing more of you
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: except that you hold tightly to what you have until I come.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: To all who are victorious, who obey me to the very end,
  - type: usfm
    marker: qm1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: To them I will give authority over all the nations.
  '27':
  - type: usfm
    marker: qm1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They will rule the nations with an iron rod
  - type: usfm
    marker: qm2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and smash them like clay pots.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:26-27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 2:8-9 (Greek version).
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They will have the same authority I received from my Father, and I will also give them the morning star!
  '29':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Anyone with ears to hear must listen to the Spirit and understand what he is saying to the churches.
  '3':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You have patiently suffered for me without quitting.
  '4':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But I have this complaint against you. You don’t love me or each other as you did at first!
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: You have lost your first love.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Look how far you have fallen! Turn back to me and do the works you did at first. If you don’t repent, I will come and remove your lampstand from its place among the churches.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But this is in your favor: You hate the evil deeds of the Nicolaitans, just as I do.'
  '7':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Anyone with ears to hear must listen to the Spirit and understand what he is saying to the churches. To everyone who is victorious I will give fruit from the tree of life in the paradise of God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Message to the Church in Smyrna
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Write this letter to the angel of the church in Smyrna. This is the message from the one who is the First and the Last, who was dead but is now alive:'
  '9':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I know about your suffering and your poverty—but you are rich! I know the blasphemy of those opposing you. They say they are Jews, but they are not, because their synagogue belongs to Satan.
    - type: text
      text: ' '
