document_id: 2CH.2,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Preparations for Building the Temple
  - type: text
    content: ' '
  - type: note
    content: Verse 2:1 is numbered 1:18 in Hebrew text.
  - type: text
    content: 'Solomon decided to build a Temple to honor the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', and also a royal palace for himself. '
  '10':
  - type: text
    content: In payment for your woodcutters, I will send 100,000 bushels of crushed wheat, 100,000 bushels of barley,
  - type: note
    content: Hebrew 20,000 cors [4,400 kiloliters] of crushed wheat, 20,000 cors of barley.
  - type: text
    content: ' 110,000 gallons of wine, and 110,000 gallons of olive oil.'
  - type: note
    content: Hebrew 20,000 baths [420 kiloliters] of wine, and 20,000 baths of olive oil.
  - type: text
    content: ”
  '11':
  - type: text
    content: 'King Hiram sent this letter of reply to Solomon:'
  - type: text
    content: '“It is because the '
  - type: text
    content: Lord
  - type: text
    content: ' loves his people that he has made you their king! '
  '12':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, who made the heavens and the earth! He has given King David a wise son, gifted with skill and understanding, who will build a Temple for the '
  - type: text
    content: Lord
  - type: text
    content: ' and a royal palace for himself.'
  '13':
  - type: text
    content: '“I am sending you a master craftsman named Huram-abi, who is extremely talented. '
  '14':
  - type: text
    content: His mother is from the tribe of Dan in Israel, and his father is from Tyre. He is skillful at making things from gold, silver, bronze, and iron, and he also works with stone and wood. He can work with purple, blue, and scarlet cloth and fine linen. He is also an engraver and can follow any design given to him. He will work with your craftsmen and those appointed by my lord David, your father.
  '15':
  - type: text
    content: '“Send along the wheat, barley, olive oil, and wine that my lord has mentioned. '
  '16':
  - type: text
    content: We will cut whatever timber you need from the Lebanon mountains and will float the logs in rafts down the coast of the Mediterranean Sea
  - type: note
    content: Hebrew the sea.
  - type: text
    content: ' to Joppa. From there you can transport the logs up to Jerusalem.”'
  '17':
  - type: text
    content: 'Solomon took a census of all foreigners in the land of Israel, like the census his father had taken, and he counted 153,600. '
  '18':
  - type: text
    content: He assigned 70,000 of them as common laborers, 80,000 as quarry workers in the hill country, and 3,600 as foremen.
  '2':
  - type: note
    content: Verses 2:2-18 are numbered 2:1-17 in Hebrew text.
  - type: text
    content: He enlisted a force of 70,000 laborers, 80,000 men to quarry stone in the hill country, and 3,600 foremen.
  '3':
  - type: text
    content: Solomon also sent this message to King Hiram
  - type: note
    content: Hebrew Huram, a variant spelling of Hiram; also in 2:11.
  - type: text
    content: ' at Tyre:'
  - type: text
    content: '“Send me cedar logs as you did for my father, David, when he was building his palace. '
  '4':
  - type: text
    content: 'I am about to build a Temple to honor the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' my God. It will be a place set apart to burn fragrant incense before him, to display the special sacrificial bread, and to sacrifice burnt offerings each morning and evening, on the Sabbaths, at new moon celebrations, and at the other appointed festivals of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. He has commanded Israel to do these things forever.'
  '5':
  - type: text
    content: '“This must be a magnificent Temple because our God is greater than all other gods. '
  '6':
  - type: text
    content: But who can really build him a worthy home? Not even the highest heavens can contain him! So who am I to consider building a Temple for him, except as a place to burn sacrifices to him?
  '7':
  - type: text
    content: “So send me a master craftsman who can work with gold, silver, bronze, and iron, as well as with purple, scarlet, and blue cloth. He must be a skilled engraver who can work with the craftsmen of Judah and Jerusalem who were selected by my father, David.
  '8':
  - type: text
    content: “Also send me cedar, cypress, and red sandalwood
  - type: note
    content: Or juniper; Hebrew reads algum, perhaps a variant spelling of almug; compare 9:10-11 and parallel text at 1 Kgs 10:11-12.
  - type: text
    content: ' logs from Lebanon, for I know that your men are without equal at cutting timber in Lebanon. I will send my men to help them. '
  '9':
  - type: text
    content: 'An immense amount of timber will be needed, for the Temple I am going to build will be very large and magnificent. '
