document_id: 2CH.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Preparations for Building the Temple
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verse 2:1 is numbered 1:18 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: 'Solomon decided to build a Temple to honor the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and also a royal palace for himself. '
  '10':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: In payment for your woodcutters, I will send 100,000 bushels of crushed wheat, 100,000 bushels of barley,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:10a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20,000 cors '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[4,400 kiloliters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of crushed wheat, 20,000 cors of barley.
      marker-yv: yv-n
    - type: text
      text: ' 110,000 gallons of wine, and 110,000 gallons of olive oil.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:10b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '20,000 baths '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[420 kiloliters] '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of wine, and 20,000 baths of olive oil.
      marker-yv: yv-n
    - type: text
      text: ”
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'King Hiram sent this letter of reply to Solomon:'
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: '“It is because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' loves his people that he has made you their king! '
  '12':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, who made the heavens and the earth! He has given King David a wise son, gifted with skill and understanding, who will build a Temple for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and a royal palace for himself.'
  '13':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“I am sending you a master craftsman named Huram-abi, who is extremely talented. '
  '14':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: His mother is from the tribe of Dan in Israel, and his father is from Tyre. He is skillful at making things from gold, silver, bronze, and iron, and he also works with stone and wood. He can work with purple, blue, and scarlet cloth and fine linen. He is also an engraver and can follow any design given to him. He will work with your craftsmen and those appointed by my lord David, your father.
  '15':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“Send along the wheat, barley, olive oil, and wine that my lord has mentioned. '
  '16':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: We will cut whatever timber you need from the Lebanon mountains and will float the logs in rafts down the coast of the Mediterranean Sea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the sea.
      marker-yv: yv-n
    - type: text
      text: ' to Joppa. From there you can transport the logs up to Jerusalem.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Solomon took a census of all foreigners in the land of Israel, like the census his father had taken, and he counted 153,600. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: He assigned 70,000 of them as common laborers, 80,000 as quarry workers in the hill country, and 3,600 as foremen.
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses 2:2-18 are numbered 2:1-17 in Hebrew text.
      marker-yv: yv-n
    - type: text
      text: He enlisted a force of 70,000 laborers, 80,000 men to quarry stone in the hill country, and 3,600 foremen.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Solomon also sent this message to King Hiram
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Huram, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a variant spelling of Hiram; also in 2:11.
      marker-yv: yv-n
    - type: text
      text: ' at Tyre:'
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: '“Send me cedar logs as you did for my father, David, when he was building his palace. '
  '4':
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I am about to build a Temple to honor the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God. It will be a place set apart to burn fragrant incense before him, to display the special sacrificial bread, and to sacrifice burnt offerings each morning and evening, on the Sabbaths, at new moon celebrations, and at the other appointed festivals of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God. He has commanded Israel to do these things forever.'
  '5':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“This must be a magnificent Temple because our God is greater than all other gods. '
  '6':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: But who can really build him a worthy home? Not even the highest heavens can contain him! So who am I to consider building a Temple for him, except as a place to burn sacrifices to him?
  '7':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “So send me a master craftsman who can work with gold, silver, bronze, and iron, as well as with purple, scarlet, and blue cloth. He must be a skilled engraver who can work with the craftsmen of Judah and Jerusalem who were selected by my father, David.
  '8':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Also send me cedar, cypress, and red sandalwood
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'juniper; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'algum, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'perhaps a variant spelling of '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'almug; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: compare 9:10-11 and parallel text at 1 Kgs 10:11-12.
      marker-yv: yv-n
    - type: text
      text: ' logs from Lebanon, for I know that your men are without equal at cutting timber in Lebanon. I will send my men to help them. '
  '9':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'An immense amount of timber will be needed, for the Temple I am going to build will be very large and magnificent. '
