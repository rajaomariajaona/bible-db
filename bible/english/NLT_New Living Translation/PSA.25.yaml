document_id: PSA.25,116
type_code: eng
verses:
  '1':
  - type: note
    content: This psalm is a Hebrew acrostic poem; each verse begins with a successive letter of the Hebrew alphabet.
  - type: text
    content: A psalm of David.
  - type: text
    content: 'O '
  - type: text
    content: Lord
  - type: text
    content: ', I give my life to you.'
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' leads with unfailing love and faithfulness'
  - type: text
    content: all who keep his covenant and obey his demands.
  '11':
  - type: text
    content: 'For the honor of your name, O '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: forgive my many, many sins.
  '12':
  - type: text
    content: 'Who are those who fear the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: He will show them the path they should choose.
  '13':
  - type: text
    content: They will live in prosperity,
  - type: text
    content: and their children will inherit the land.
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is a friend to those who fear him.'
  - type: text
    content: He teaches them his covenant.
  '15':
  - type: text
    content: 'My eyes are always on the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for he rescues me from the traps of my enemies.
  '16':
  - type: text
    content: Turn to me and have mercy,
  - type: text
    content: for I am alone and in deep distress.
  '17':
  - type: text
    content: My problems go from bad to worse.
  - type: text
    content: Oh, save me from them all!
  '18':
  - type: text
    content: Feel my pain and see my trouble.
  - type: text
    content: Forgive all my sins.
  '19':
  - type: text
    content: See how many enemies I have
  - type: text
    content: and how viciously they hate me!
  '2':
  - type: text
    content: I trust in you, my God!
  - type: text
    content: Do not let me be disgraced,
  - type: text
    content: or let my enemies rejoice in my defeat.
  '20':
  - type: text
    content: Protect me! Rescue my life from them!
  - type: text
    content: Do not let me be disgraced, for in you I take refuge.
  '21':
  - type: text
    content: May integrity and honesty protect me,
  - type: text
    content: for I put my hope in you.
  '22':
  - type: text
    content: O God, ransom Israel
  - type: text
    content: from all its troubles.
  '3':
  - type: text
    content: No one who trusts in you will ever be disgraced,
  - type: text
    content: but disgrace comes to those who try to deceive others.
  '4':
  - type: text
    content: 'Show me the right path, O '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: point out the road for me to follow.
  '5':
  - type: text
    content: Lead me by your truth and teach me,
  - type: text
    content: for you are the God who saves me.
  - type: text
    content: All day long I put my hope in you.
  '6':
  - type: text
    content: 'Remember, O '
  - type: text
    content: Lord
  - type: text
    content: ', your compassion and unfailing love,'
  - type: text
    content: which you have shown from long ages past.
  '7':
  - type: text
    content: Do not remember the rebellious sins of my youth.
  - type: text
    content: Remember me in the light of your unfailing love,
  - type: text
    content: 'for you are merciful, O '
  - type: text
    content: Lord
  - type: text
    content: .
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is good and does what is right;'
  - type: text
    content: he shows the proper path to those who go astray.
  '9':
  - type: text
    content: He leads the humble in doing right,
  - type: text
    content: teaching them his way.
