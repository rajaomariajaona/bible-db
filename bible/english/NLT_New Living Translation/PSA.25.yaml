document_id: PSA.25,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm is a Hebrew acrostic poem; each verse begins with a successive letter of the Hebrew alphabet.
      marker-yv: yv-n
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I give my life to you.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' leads with unfailing love and faithfulness'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all who keep his covenant and obey his demands.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the honor of your name, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forgive my many, many sins.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who are those who fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will show them the path they should choose.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will live in prosperity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their children will inherit the land.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is a friend to those who fear him.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He teaches them his covenant.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My eyes are always on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he rescues me from the traps of my enemies.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn to me and have mercy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I am alone and in deep distress.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My problems go from bad to worse.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, save me from them all!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feel my pain and see my trouble.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Forgive all my sins.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See how many enemies I have
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and how viciously they hate me!
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I trust in you, my God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not let me be disgraced,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or let my enemies rejoice in my defeat.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protect me! Rescue my life from them!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not let me be disgraced, for in you I take refuge.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May integrity and honesty protect me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I put my hope in you.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, ransom Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from all its troubles.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one who trusts in you will ever be disgraced,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but disgrace comes to those who try to deceive others.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Show me the right path, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: point out the road for me to follow.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lead me by your truth and teach me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you are the God who saves me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All day long I put my hope in you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Remember, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', your compassion and unfailing love,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which you have shown from long ages past.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not remember the rebellious sins of my youth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Remember me in the light of your unfailing love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for you are merciful, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is good and does what is right;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he shows the proper path to those who go astray.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He leads the humble in doing right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: teaching them his way.
