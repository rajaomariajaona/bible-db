document_id: PSA.25
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This psalm is a Hebrew acrostic poem; each verse begins with a successive letter of the Hebrew alphabet.
    marker-yv: yv-n
  - type: text
    text: A psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I give my life to you.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I trust in you, my God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not let me be disgraced,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or let my enemies rejoice in my defeat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: No one who trusts in you will ever be disgraced,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but disgrace comes to those who try to deceive others.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Show me the right path, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: point out the road for me to follow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lead me by your truth and teach me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you are the God who saves me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All day long I put my hope in you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Remember, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', your compassion and unfailing love,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: which you have shown from long ages past.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Do not remember the rebellious sins of my youth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Remember me in the light of your unfailing love,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for you are merciful, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is good and does what is right;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he shows the proper path to those who go astray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He leads the humble in doing right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: teaching them his way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' leads with unfailing love and faithfulness'
- type: usfm
  marker: q2
  children:
  - type: text
    text: all who keep his covenant and obey his demands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For the honor of your name, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: forgive my many, many sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Who are those who fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He will show them the path they should choose.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They will live in prosperity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their children will inherit the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is a friend to those who fear him.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He teaches them his covenant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'My eyes are always on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he rescues me from the traps of my enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Turn to me and have mercy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I am alone and in deep distress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: My problems go from bad to worse.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Oh, save me from them all!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Feel my pain and see my trouble.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Forgive all my sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: See how many enemies I have
- type: usfm
  marker: q2
  children:
  - type: text
    text: and how viciously they hate me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Protect me! Rescue my life from them!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not let me be disgraced, for in you I take refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: May integrity and honesty protect me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I put my hope in you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: O God, ransom Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: from all its troubles.
