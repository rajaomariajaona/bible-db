document_id: PSA.75,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of Asaph. A song to be sung to the tune “Do Not Destroy!”'
  - type: text
    content: We thank you, O God!
  - type: text
    content: We give thanks because you are near.
  - type: text
    content: People everywhere tell of your wonderful deeds.
  '10':
  - type: text
    content: For God says, “I will break the strength of the wicked,
  - type: text
    content: but I will increase the power of the godly.”
  '2':
  - type: text
    content: God says, “At the time I have planned,
  - type: text
    content: I will bring justice against the wicked.
  '3':
  - type: text
    content: When the earth quakes and its people live in turmoil,
  - type: text
    content: 'I am the one who keeps its foundations firm. '
  - type: text
    content: Interlude
  '4':
  - type: text
    content: “I warned the proud, ‘Stop your boasting!’
  - type: text
    content: I told the wicked, ‘Don’t raise your fists!
  '5':
  - type: text
    content: Don’t raise your fists in defiance at the heavens
  - type: text
    content: or speak with such arrogance.’”
  '6':
  - type: text
    content: For no one on earth—from east or west,
  - type: text
    content: or even from the wilderness—
  - type: text
    content: should raise a defiant fist.
  - type: note
    content: Hebrew should lift.
  '7':
  - type: text
    content: It is God alone who judges;
  - type: text
    content: he decides who will rise and who will fall.
  '8':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' holds a cup in his hand'
  - type: text
    content: that is full of foaming wine mixed with spices.
  - type: text
    content: He pours out the wine in judgment,
  - type: text
    content: and all the wicked must drink it,
  - type: text
    content: draining it to the dregs.
  '9':
  - type: text
    content: But as for me, I will always proclaim what God has done;
  - type: text
    content: I will sing praises to the God of Jacob.
