document_id: PSA.75
type_code: eng
segments:
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the choir director: A psalm of Asaph. A song to be sung to the tune “Do Not Destroy!”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: We thank you, O God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: We give thanks because you are near.
- type: usfm
  marker: q2
  children:
  - type: text
    text: People everywhere tell of your wonderful deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: God says, “At the time I have planned,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will bring justice against the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When the earth quakes and its people live in turmoil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I am the one who keeps its foundations firm. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Interlude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “I warned the proud, ‘Stop your boasting!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: I told the wicked, ‘Don’t raise your fists!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Don’t raise your fists in defiance at the heavens
- type: usfm
  marker: q2
  children:
  - type: text
    text: or speak with such arrogance.’”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For no one on earth—from east or west,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or even from the wilderness—
- type: usfm
  marker: q2
  children:
  - type: text
    text: should raise a defiant fist.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '75:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: should lift.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: It is God alone who judges;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he decides who will rise and who will fall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' holds a cup in his hand'
- type: usfm
  marker: q2
  children:
  - type: text
    text: that is full of foaming wine mixed with spices.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He pours out the wine in judgment,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the wicked must drink it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: draining it to the dregs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But as for me, I will always proclaim what God has done;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing praises to the God of Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For God says, “I will break the strength of the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I will increase the power of the godly.”
