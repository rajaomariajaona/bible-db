document_id: 2CH.12,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Egypt Invades Judah
  - type: text
    content: 'But when Rehoboam was firmly established and strong, he abandoned the Law of the '
  - type: text
    content: Lord
  - type: text
    content: ', and all Israel followed him in this sin. '
  '10':
  - type: text
    content: 'King Rehoboam later replaced them with bronze shields as substitutes, and he entrusted them to the care of the commanders of the guard who protected the entrance to the royal palace. '
  '11':
  - type: text
    content: 'Whenever the king went to the Temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the guards would also take the shields and then return them to the guardroom. '
  '12':
  - type: text
    content: 'Because Rehoboam humbled himself, the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger was turned away, and he did not destroy him completely. There were still some good things in the land of Judah.
  - type: heading
    content: Summary of Rehoboam’s Reign
  '13':
  - type: text
    content: 'King Rehoboam firmly established himself in Jerusalem and continued to rule. He was forty-one years old when he became king, and he reigned seventeen years in Jerusalem, the city the '
  - type: text
    content: Lord
  - type: text
    content: ' had chosen from among all the tribes of Israel as the place to honor his name. Rehoboam’s mother was Naamah, a woman from Ammon. '
  '14':
  - type: text
    content: 'But he was an evil king, for he did not seek the '
  - type: text
    content: Lord
  - type: text
    content: ' with all his heart.'
  '15':
  - type: text
    content: 'The rest of the events of Rehoboam’s reign, from beginning to end, are recorded in '
  - type: text
    content: The Record of Shemaiah the Prophet
  - type: text
    content: ' and '
  - type: text
    content: The Record of Iddo the Seer,
  - type: text
    content: ' which are part of the genealogical record. Rehoboam and Jeroboam were continually at war with each other. '
  '16':
  - type: text
    content: When Rehoboam died, he was buried in the City of David. Then his son Abijah became the next king.
  '2':
  - type: text
    content: 'Because they were unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: ', King Shishak of Egypt came up and attacked Jerusalem in the fifth year of King Rehoboam’s reign. '
  '3':
  - type: text
    content: He came with 1,200 chariots, 60,000 horses,
  - type: note
    content: Or charioteers, or horsemen.
  - type: text
    content: ' and a countless army of foot soldiers, including Libyans, Sukkites, and Ethiopians.'
  - type: note
    content: Hebrew and Cushites.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Shishak conquered Judah’s fortified towns and then advanced to attack Jerusalem.
  '5':
  - type: text
    content: 'The prophet Shemaiah then met with Rehoboam and Judah’s leaders, who had all fled to Jerusalem because of Shishak. Shemaiah told them, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: You have abandoned me, so I am abandoning you to Shishak.”'
  '6':
  - type: text
    content: 'Then the leaders of Israel and the king humbled themselves and said, “The '
  - type: text
    content: Lord
  - type: text
    content: ' is right in doing this to us!”'
  '7':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' saw their change of heart, he gave this message to Shemaiah: “Since the people have humbled themselves, I will not completely destroy them and will soon give them some relief. I will not use Shishak to pour out my anger on Jerusalem. '
  '8':
  - type: text
    content: But they will become his subjects, so they will know the difference between serving me and serving earthly rulers.”
  '9':
  - type: text
    content: 'So King Shishak of Egypt came up and attacked Jerusalem. He ransacked the treasuries of the '
  - type: text
    content: Lord
  - type: text
    content: '’s Temple and the royal palace; he stole everything, including all the gold shields Solomon had made. '
