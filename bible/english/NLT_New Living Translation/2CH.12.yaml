document_id: 2CH.12,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Egypt Invades Judah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But when Rehoboam was firmly established and strong, he abandoned the Law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and all Israel followed him in this sin. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Rehoboam later replaced them with bronze shields as substitutes, and he entrusted them to the care of the commanders of the guard who protected the entrance to the royal palace. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whenever the king went to the Temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the guards would also take the shields and then return them to the guardroom. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because Rehoboam humbled himself, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger was turned away, and he did not destroy him completely. There were still some good things in the land of Judah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Summary of Rehoboam’s Reign
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'King Rehoboam firmly established himself in Jerusalem and continued to rule. He was forty-one years old when he became king, and he reigned seventeen years in Jerusalem, the city the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had chosen from among all the tribes of Israel as the place to honor his name. Rehoboam’s mother was Naamah, a woman from Ammon. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But he was an evil king, for he did not seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with all his heart.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of the events of Rehoboam’s reign, from beginning to end, are recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Record of Shemaiah the Prophet
    - type: text
      text: ' and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Record of Iddo the Seer,
    - type: text
      text: ' which are part of the genealogical record. Rehoboam and Jeroboam were continually at war with each other. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Rehoboam died, he was buried in the City of David. Then his son Abijah became the next king.
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Because they were unfaithful to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', King Shishak of Egypt came up and attacked Jerusalem in the fifth year of King Rehoboam’s reign. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: He came with 1,200 chariots, 60,000 horses,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:3a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'charioteers, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: horsemen.
      marker-yv: yv-n
    - type: text
      text: ' and a countless army of foot soldiers, including Libyans, Sukkites, and Ethiopians.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:3b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and Cushites.
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Shishak conquered Judah’s fortified towns and then advanced to attack Jerusalem.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The prophet Shemaiah then met with Rehoboam and Judah’s leaders, who had all fled to Jerusalem because of Shishak. Shemaiah told them, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: You have abandoned me, so I am abandoning you to Shishak.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the leaders of Israel and the king humbled themselves and said, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is right in doing this to us!”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saw their change of heart, he gave this message to Shemaiah: “Since the people have humbled themselves, I will not completely destroy them and will soon give them some relief. I will not use Shishak to pour out my anger on Jerusalem. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they will become his subjects, so they will know the difference between serving me and serving earthly rulers.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So King Shishak of Egypt came up and attacked Jerusalem. He ransacked the treasuries of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s Temple and the royal palace; he stole everything, including all the gold shields Solomon had made. '
