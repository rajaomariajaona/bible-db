document_id: PSA.76,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of Asaph. A song to be accompanied by stringed instruments.'
  - type: text
    content: God is honored in Judah;
  - type: text
    content: his name is great in Israel.
  '10':
  - type: text
    content: Human defiance only enhances your glory,
  - type: text
    content: for you use it as a weapon.
  - type: note
    content: The meaning of the Hebrew is uncertain.
  '11':
  - type: text
    content: 'Make vows to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and keep them.'
  - type: text
    content: Let everyone bring tribute to the Awesome One.
  '12':
  - type: text
    content: For he breaks the pride of princes,
  - type: text
    content: and the kings of the earth fear him.
  '2':
  - type: text
    content: Jerusalem
  - type: note
    content: Hebrew Salem, another name for Jerusalem.
  - type: text
    content: ' is where he lives;'
  - type: text
    content: Mount Zion is his home.
  '3':
  - type: text
    content: There he has broken the fiery arrows of the enemy,
  - type: text
    content: 'the shields and swords and weapons of war. '
  - type: text
    content: Interlude
  '4':
  - type: text
    content: You are glorious and more majestic
  - type: text
    content: than the everlasting mountains.
  - type: note
    content: As in Greek version; Hebrew reads than mountains filled with beasts of prey.
  '5':
  - type: text
    content: Our boldest enemies have been plundered.
  - type: text
    content: They lie before us in the sleep of death.
  - type: text
    content: No warrior could lift a hand against us.
  '6':
  - type: text
    content: At the blast of your breath, O God of Jacob,
  - type: text
    content: their horses and chariots lay still.
  '7':
  - type: text
    content: No wonder you are greatly feared!
  - type: text
    content: Who can stand before you when your anger explodes?
  '8':
  - type: text
    content: From heaven you sentenced your enemies;
  - type: text
    content: the earth trembled and stood silent before you.
  '9':
  - type: text
    content: You stand up to judge those who do evil, O God,
  - type: text
    content: 'and to rescue the oppressed of the earth. '
  - type: text
    content: Interlude
