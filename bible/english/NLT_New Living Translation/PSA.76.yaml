document_id: PSA.76,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of Asaph. A song to be accompanied by stringed instruments.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: God is honored in Judah;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his name is great in Israel.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Human defiance only enhances your glory,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you use it as a weapon.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '76:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Make vows to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, and keep them.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let everyone bring tribute to the Awesome One.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: For he breaks the pride of princes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the kings of the earth fear him.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Jerusalem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '76:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Salem, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: another name for Jerusalem.
      marker-yv: yv-n
    - type: text
      text: ' is where he lives;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Mount Zion is his home.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: There he has broken the fiery arrows of the enemy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the shields and swords and weapons of war. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: You are glorious and more majestic
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than the everlasting mountains.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '76:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Greek version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: than mountains filled with beasts of prey.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Our boldest enemies have been plundered.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They lie before us in the sleep of death.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No warrior could lift a hand against us.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: At the blast of your breath, O God of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their horses and chariots lay still.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: No wonder you are greatly feared!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can stand before you when your anger explodes?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: From heaven you sentenced your enemies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the earth trembled and stood silent before you.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You stand up to judge those who do evil, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and to rescue the oppressed of the earth. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Interlude
