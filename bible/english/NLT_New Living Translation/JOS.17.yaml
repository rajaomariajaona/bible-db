document_id: JOS.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land Given to West Manasseh
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The next allotment of land was given to the half-tribe of Manasseh, the descendants of Joseph’s older son. Makir, the firstborn son of Manasseh, was the father of Gilead. Because his descendants were experienced soldiers, the regions of Gilead and Bashan on the east side of the Jordan had already been given to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So the allotment on the west side of the Jordan was for the remaining families within the clans of the tribe of Manasseh: Abiezer, Helek, Asriel, Shechem, Hepher, and Shemida. These clans represent the male descendants of Manasseh son of Joseph.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'However, Zelophehad, a descendant of Hepher son of Gilead, son of Makir, son of Manasseh, had no sons. He had only daughters, whose names were Mahlah, Noah, Hoglah, Milcah, and Tirzah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'These women came to Eleazar the priest, Joshua son of Nun, and the Israelite leaders and said, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses to give us a grant of land along with the men of our tribe.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So Joshua gave them a grant of land along with their uncles, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'As a result, Manasseh’s total allocation came to ten parcels of land, in addition to the land of Gilead and Bashan across the Jordan River, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: because the female descendants of Manasseh received a grant of land along with the male descendants. (The land of Gilead was given to the rest of the male descendants of Manasseh.)
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The boundary of the tribe of Manasseh extended from the border of Asher to Micmethath, near Shechem. Then the boundary went south from Micmethath to the settlement near the spring of Tappuah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The land surrounding Tappuah belonged to Manasseh, but the town of Tappuah itself, on the border of Manasseh’s territory, belonged to the tribe of Ephraim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: From the spring of Tappuah, the boundary of Manasseh followed the Kanah Ravine to the Mediterranean Sea.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the sea; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 17:10.
    marker-yv: yv-n
  - type: text
    text: ' Several towns south of the ravine were inside Manasseh’s territory, but they actually belonged to the tribe of Ephraim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: In general, however, the land south of the ravine belonged to Ephraim, and the land north of the ravine belonged to Manasseh. Manasseh’s boundary ran along the northern side of the ravine and ended at the Mediterranean Sea. North of Manasseh was the territory of Asher, and to the east was the territory of Issachar.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The following towns within the territory of Issachar and Asher, however, were given to Manasseh: Beth-shan,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:11a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Beth-shean, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a variant spelling of Beth-shan; also in 17:16.
    marker-yv: yv-n
  - type: text
    text: ' Ibleam, Dor (that is, Naphoth-dor),'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:11b '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew here is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' Endor, Taanach, and Megiddo, each with their surrounding settlements.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But the descendants of Manasseh were unable to occupy these towns because the Canaanites were determined to stay in that region. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Later, however, when the Israelites became strong enough, they forced the Canaanites to work as slaves. But they did not drive them out of the land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The descendants of Joseph came to Joshua and asked, “Why have you given us only one portion of land as our homeland when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has blessed us with so many people?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Joshua replied, “If there are so many of you, and if the hill country of Ephraim is not large enough for you, clear out land for yourselves in the forest where the Perizzites and Rephaites live.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The descendants of Joseph responded, “It’s true that the hill country is not large enough for us. But all the Canaanites in the lowlands have iron chariots, both those in Beth-shan and its surrounding settlements and those in the valley of Jezreel. They are too strong for us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Joshua said to the tribes of Ephraim and Manasseh, the descendants of Joseph, “Since you are so large and strong, you will be given more than one portion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The forests of the hill country will be yours as well. Clear as much of the land as you wish, and take possession of its farthest corners. And you will drive out the Canaanites from the valleys, too, even though they are strong and have iron chariots.”
