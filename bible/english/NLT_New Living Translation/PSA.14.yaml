document_id: PSA.14,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'For the choir director: A psalm of David.'
  - type: text
    content: Only fools say in their hearts,
  - type: text
    content: “There is no God.”
  - type: text
    content: They are corrupt, and their actions are evil;
  - type: text
    content: not one of them does good!
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' looks down from heaven'
  - type: text
    content: on the entire human race;
  - type: text
    content: he looks to see if anyone is truly wise,
  - type: text
    content: if anyone seeks God.
  '3':
  - type: text
    content: But no, all have turned away;
  - type: text
    content: all have become corrupt.
  - type: note
    content: Greek version reads have become useless. Compare Rom 3:12.
  - type: text
    content: No one does good,
  - type: text
    content: not a single one!
  '4':
  - type: text
    content: Will those who do evil never learn?
  - type: text
    content: They eat up my people like bread
  - type: text
    content: 'and wouldn’t think of praying to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: Terror will grip them,
  - type: text
    content: for God is with those who obey him.
  '6':
  - type: text
    content: The wicked frustrate the plans of the oppressed,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' will protect his people.'
  '7':
  - type: text
    content: Who will come from Mount Zion to rescue Israel?
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' restores his people,'
  - type: text
    content: Jacob will shout with joy, and Israel will rejoice.
