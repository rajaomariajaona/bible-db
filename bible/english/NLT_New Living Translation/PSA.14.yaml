document_id: PSA.14,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the choir director: A psalm of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Only fools say in their hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “There is no God.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are corrupt, and their actions are evil;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not one of them does good!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' looks down from heaven'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the entire human race;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he looks to see if anyone is truly wise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if anyone seeks God.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But no, all have turned away;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all have become corrupt.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek version reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'have become useless. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Compare Rom 3:12.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one does good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not a single one!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Will those who do evil never learn?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They eat up my people like bread
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and wouldn’t think of praying to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Terror will grip them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for God is with those who obey him.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The wicked frustrate the plans of the oppressed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will protect his people.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Who will come from Mount Zion to rescue Israel?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' restores his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jacob will shout with joy, and Israel will rejoice.
