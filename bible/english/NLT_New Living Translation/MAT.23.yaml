document_id: MAT.23,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Criticizes the Religious Leaders
  - type: text
    content: 'Then Jesus said to the crowds and to his disciples, '
  '10':
  - type: text
    content: And don’t let anyone call you ‘Teacher,’ for you have only one teacher, the Messiah.
  - type: text
    content: ' '
  '11':
  - type: text
    content: The greatest among you must be a servant.
  - type: text
    content: ' '
  '12':
  - type: text
    content: But those who exalt themselves will be humbled, and those who humble themselves will be exalted.
  '13':
  - type: text
    content: ' '
  - type: text
    content: “What sorrow awaits you teachers of religious law and you Pharisees. Hypocrites! For you shut the door of the Kingdom of Heaven in people’s faces. You won’t go in yourselves, and you don’t let others enter either.
  - type: note
    content: Some manuscripts add verse 14, What sorrow awaits you teachers of religious law and you Pharisees. Hypocrites! You shamelessly cheat widows out of their property and then pretend to be pious by making long prayers in public. Because of this, you will be severely punished. Compare Mark 12:40 and Luke 20:47.
  '15':
  - type: text
    content: ' '
  - type: text
    content: “What sorrow awaits you teachers of religious law and you Pharisees. Hypocrites! For you cross land and sea to make one convert, and then you turn that person into twice the child of hell
  - type: text
    content: ' '
  - type: note
    content: Greek of Gehenna; also in 23:33.
  - type: text
    content: you yourselves are!
  '16':
  - type: text
    content: ' '
  - type: text
    content: “Blind guides! What sorrow awaits you! For you say that it means nothing to swear ‘by God’s Temple,’ but that it is binding to swear ‘by the gold in the Temple.’
  - type: text
    content: ' '
  '17':
  - type: text
    content: Blind fools! Which is more important—the gold or the Temple that makes the gold sacred?
  - type: text
    content: ' '
  '18':
  - type: text
    content: And you say that to swear ‘by the altar’ is not binding, but to swear ‘by the gifts on the altar’ is binding.
  - type: text
    content: ' '
  '19':
  - type: text
    content: How blind! For which is more important—the gift on the altar or the altar that makes the gift sacred?
  - type: text
    content: ' '
  '2':
  - type: text
    content: “The teachers of religious law and the Pharisees are the official interpreters of the law of Moses.
  - type: note
    content: Greek and the Pharisees sit in the seat of Moses.
  - type: text
    content: ' '
  '20':
  - type: text
    content: When you swear ‘by the altar,’ you are swearing by it and by everything on it.
  - type: text
    content: ' '
  '21':
  - type: text
    content: And when you swear ‘by the Temple,’ you are swearing by it and by God, who lives in it.
  - type: text
    content: ' '
  '22':
  - type: text
    content: And when you swear ‘by heaven,’ you are swearing by the throne of God and by God, who sits on the throne.
  '23':
  - type: text
    content: ' '
  - type: text
    content: “What sorrow awaits you teachers of religious law and you Pharisees. Hypocrites! For you are careful to tithe even the tiniest income from your herb gardens,
  - type: text
    content: ' '
  - type: note
    content: Greek tithe the mint, the dill, and the cumin.
  - type: text
    content: but you ignore the more important aspects of the law—justice, mercy, and faith. You should tithe, yes, but do not neglect the more important things.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Blind guides! You strain your water so you won’t accidentally swallow a gnat, but you swallow a camel!
  - type: note
    content: See Lev 11:4, 23, where gnats and camels are both forbidden as food.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “What sorrow awaits you teachers of religious law and you Pharisees. Hypocrites! For you are so careful to clean the outside of the cup and the dish, but inside you are filthy—full of greed and self-indulgence!
  - type: text
    content: ' '
  '26':
  - type: text
    content: You blind Pharisee! First wash the inside of the cup and the dish,
  - type: note
    content: Some manuscripts do not include and the dish.
  - type: text
    content: ' '
  - type: text
    content: and then the outside will become clean, too.
  '27':
  - type: text
    content: ' '
  - type: text
    content: “What sorrow awaits you teachers of religious law and you Pharisees. Hypocrites! For you are like whitewashed tombs—beautiful on the outside but filled on the inside with dead people’s bones and all sorts of impurity.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Outwardly you look like righteous people, but inwardly your hearts are filled with hypocrisy and lawlessness.
  '29':
  - type: text
    content: ' '
  - type: text
    content: “What sorrow awaits you teachers of religious law and you Pharisees. Hypocrites! For you build tombs for the prophets your ancestors killed, and you decorate the monuments of the godly people your ancestors destroyed.
  - type: text
    content: ' '
  '3':
  - type: text
    content: So practice and obey whatever they tell you, but don’t follow their example. For they don’t practice what they teach.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Then you say, ‘If we had lived in the days of our ancestors, we would never have joined them in killing the prophets.’
  '31':
  - type: text
    content: ' '
  - type: text
    content: “But in saying that, you testify against yourselves that you are indeed the descendants of those who murdered the prophets.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Go ahead and finish what your ancestors started.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Snakes! Sons of vipers! How will you escape the judgment of hell?
  '34':
  - type: text
    content: ' '
  - type: text
    content: “Therefore, I am sending you prophets and wise men and teachers of religious law. But you will kill some by crucifixion, and you will flog others with whips in your synagogues, chasing them from city to city.
  - type: text
    content: ' '
  '35':
  - type: text
    content: As a result, you will be held responsible for the murder of all godly people of all time—from the murder of righteous Abel to the murder of Zechariah son of Berekiah, whom you killed in the Temple between the sanctuary and the altar.
  - type: text
    content: ' '
  '36':
  - type: text
    content: I tell you the truth, this judgment will fall on this very generation.
  - type: heading
    content: Jesus Grieves over Jerusalem
  '37':
  - type: text
    content: ' '
  - type: text
    content: “O Jerusalem, Jerusalem, the city that kills the prophets and stones God’s messengers! How often I have wanted to gather your children together as a hen protects her chicks beneath her wings, but you wouldn’t let me.
  - type: text
    content: ' '
  '38':
  - type: text
    content: And now, look, your house is abandoned and desolate.
  - type: note
    content: Some manuscripts do not include and desolate.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'For I tell you this, you will never see me again until you say, ‘Blessings on the one who comes in the name of the '
  - type: text
    content: Lord
  - type: text
    content: '!’'
  - type: note
    content: Ps 118:26.
  - type: text
    content: ”
  '4':
  - type: text
    content: They crush people with unbearable religious demands and never lift a finger to ease the burden.
  '5':
  - type: text
    content: ' '
  - type: text
    content: “Everything they do is for show. On their arms they wear extra wide prayer boxes with Scripture verses inside, and they wear robes with extra long tassels.
  - type: text
    content: ' '
  - type: note
    content: Greek They enlarge their phylacteries and lengthen their tassels.
  '6':
  - type: text
    content: And they love to sit at the head table at banquets and in the seats of honor in the synagogues.
  - type: text
    content: ' '
  '7':
  - type: text
    content: They love to receive respectful greetings as they walk in the marketplaces, and to be called ‘Rabbi.’
  - type: note
    content: Rabbi, from Aramaic, means “master” or “teacher.”
  '8':
  - type: text
    content: ' '
  - type: text
    content: “Don’t let anyone call you ‘Rabbi,’ for you have only one teacher, and all of you are equal as brothers and sisters.
  - type: text
    content: ' '
  - type: note
    content: Greek brothers.
  '9':
  - type: text
    content: And don’t address anyone here on earth as ‘Father,’ for only God in heaven is your Father.
  - type: text
    content: ' '
