document_id: GEN.14,116
type_code: eng
verses:
  '1':
  - type: heading
    content: Abram Rescues Lot
  - type: text
    content: About this time war broke out in the region. King Amraphel of Babylonia,
  - type: note
    content: Hebrew Shinar; also in 14:9.
  - type: text
    content: ' King Arioch of Ellasar, King Kedorlaomer of Elam, and King Tidal of Goiim '
  '10':
  - type: text
    content: 'As it happened, the valley of the Dead Sea was filled with tar pits. And as the army of the kings of Sodom and Gomorrah fled, some fell into the tar pits, while the rest escaped into the mountains. '
  '11':
  - type: text
    content: 'The victorious invaders then plundered Sodom and Gomorrah and headed for home, taking with them all the spoils of war and the food supplies. '
  '12':
  - type: text
    content: They also captured Lot—Abram’s nephew who lived in Sodom—and carried off everything he owned.
  '13':
  - type: text
    content: But one of Lot’s men escaped and reported everything to Abram the Hebrew, who was living near the oak grove belonging to Mamre the Amorite. Mamre and his relatives, Eshcol and Aner, were Abram’s allies.
  '14':
  - type: text
    content: 'When Abram heard that his nephew Lot had been captured, he mobilized the 318 trained men who had been born into his household. Then he pursued Kedorlaomer’s army until he caught up with them at Dan. '
  '15':
  - type: text
    content: 'There he divided his men and attacked during the night. Kedorlaomer’s army fled, but Abram chased them as far as Hobah, north of Damascus. '
  '16':
  - type: text
    content: Abram recovered all the goods that had been taken, and he brought back his nephew Lot with his possessions and all the women and other captives.
  - type: heading
    content: Melchizedek Blesses Abram
  '17':
  - type: text
    content: After Abram returned from his victory over Kedorlaomer and all his allies, the king of Sodom went out to meet him in the valley of Shaveh (that is, the King’s Valley).
  '18':
  - type: text
    content: And Melchizedek, the king of Salem and a priest of God Most High,
  - type: note
    content: Hebrew El-Elyon; also in 14:19, 20, 22.
  - type: text
    content: ' brought Abram some bread and wine. '
  '19':
  - type: text
    content: 'Melchizedek blessed Abram with this blessing:'
  - type: text
    content: “Blessed be Abram by God Most High,
  - type: text
    content: Creator of heaven and earth.
  '2':
  - type: text
    content: fought against King Bera of Sodom, King Birsha of Gomorrah, King Shinab of Admah, King Shemeber of Zeboiim, and the king of Bela (also called Zoar).
  '20':
  - type: text
    content: And blessed be God Most High,
  - type: text
    content: who has defeated your enemies for you.”
  - type: text
    content: Then Abram gave Melchizedek a tenth of all the goods he had recovered.
  '21':
  - type: text
    content: The king of Sodom said to Abram, “Give back my people who were captured. But you may keep for yourself all the goods you have recovered.”
  '22':
  - type: text
    content: 'Abram replied to the king of Sodom, “I solemnly swear to the '
  - type: text
    content: Lord
  - type: text
    content: ', God Most High, Creator of heaven and earth, '
  '23':
  - type: text
    content: 'that I will not take so much as a single thread or sandal thong from what belongs to you. Otherwise you might say, ‘I am the one who made Abram rich.’ '
  '24':
  - type: text
    content: I will accept only what my young warriors have already eaten, and I request that you give a fair share of the goods to my allies—Aner, Eshcol, and Mamre.”
  '3':
  - type: text
    content: This second group of kings joined forces in Siddim Valley (that is, the valley of the Dead Sea
  - type: note
    content: Hebrew Salt Sea.
  - type: text
    content: '). '
  '4':
  - type: text
    content: For twelve years they had been subject to King Kedorlaomer, but in the thirteenth year they rebelled against him.
  '5':
  - type: text
    content: 'One year later Kedorlaomer and his allies arrived and defeated the Rephaites at Ashteroth-karnaim, the Zuzites at Ham, the Emites at Shaveh-kiriathaim, '
  '6':
  - type: text
    content: 'and the Horites at Mount Seir, as far as El-paran at the edge of the wilderness. '
  '7':
  - type: text
    content: Then they turned back and came to En-mishpat (now called Kadesh) and conquered all the territory of the Amalekites, and also the Amorites living in Hazazon-tamar.
  '8':
  - type: text
    content: Then the rebel kings of Sodom, Gomorrah, Admah, Zeboiim, and Bela (also called Zoar) prepared for battle in the valley of the Dead Sea.
  - type: note
    content: Hebrew Siddim Valley (see 14:3); also in 14:10.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'They fought against King Kedorlaomer of Elam, King Tidal of Goiim, King Amraphel of Babylonia, and King Arioch of Ellasar—four kings against five. '
