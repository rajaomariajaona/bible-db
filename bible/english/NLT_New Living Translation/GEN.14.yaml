document_id: GEN.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abram Rescues Lot
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: About this time war broke out in the region. King Amraphel of Babylonia,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shinar; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 14:9.
    marker-yv: yv-n
  - type: text
    text: ' King Arioch of Ellasar, King Kedorlaomer of Elam, and King Tidal of Goiim '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: fought against King Bera of Sodom, King Birsha of Gomorrah, King Shinab of Admah, King Shemeber of Zeboiim, and the king of Bela (also called Zoar).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: This second group of kings joined forces in Siddim Valley (that is, the valley of the Dead Sea
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Salt Sea.
    marker-yv: yv-n
  - type: text
    text: '). '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For twelve years they had been subject to King Kedorlaomer, but in the thirteenth year they rebelled against him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'One year later Kedorlaomer and his allies arrived and defeated the Rephaites at Ashteroth-karnaim, the Zuzites at Ham, the Emites at Shaveh-kiriathaim, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and the Horites at Mount Seir, as far as El-paran at the edge of the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then they turned back and came to En-mishpat (now called Kadesh) and conquered all the territory of the Amalekites, and also the Amorites living in Hazazon-tamar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then the rebel kings of Sodom, Gomorrah, Admah, Zeboiim, and Bela (also called Zoar) prepared for battle in the valley of the Dead Sea.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Siddim Valley '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (see 14:3); also in 14:10.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'They fought against King Kedorlaomer of Elam, King Tidal of Goiim, King Amraphel of Babylonia, and King Arioch of Ellasar—four kings against five. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'As it happened, the valley of the Dead Sea was filled with tar pits. And as the army of the kings of Sodom and Gomorrah fled, some fell into the tar pits, while the rest escaped into the mountains. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The victorious invaders then plundered Sodom and Gomorrah and headed for home, taking with them all the spoils of war and the food supplies. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They also captured Lot—Abram’s nephew who lived in Sodom—and carried off everything he owned.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But one of Lot’s men escaped and reported everything to Abram the Hebrew, who was living near the oak grove belonging to Mamre the Amorite. Mamre and his relatives, Eshcol and Aner, were Abram’s allies.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When Abram heard that his nephew Lot had been captured, he mobilized the 318 trained men who had been born into his household. Then he pursued Kedorlaomer’s army until he caught up with them at Dan. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'There he divided his men and attacked during the night. Kedorlaomer’s army fled, but Abram chased them as far as Hobah, north of Damascus. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Abram recovered all the goods that had been taken, and he brought back his nephew Lot with his possessions and all the women and other captives.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Melchizedek Blesses Abram
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: After Abram returned from his victory over Kedorlaomer and all his allies, the king of Sodom went out to meet him in the valley of Shaveh (that is, the King’s Valley).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And Melchizedek, the king of Salem and a priest of God Most High,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'El-Elyon; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in 14:19, 20, 22.
    marker-yv: yv-n
  - type: text
    text: ' brought Abram some bread and wine. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Melchizedek blessed Abram with this blessing:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Blessed be Abram by God Most High,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Creator of heaven and earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And blessed be God Most High,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who has defeated your enemies for you.”
- type: usfm
  marker: m
  children:
  - type: text
    text: Then Abram gave Melchizedek a tenth of all the goods he had recovered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The king of Sodom said to Abram, “Give back my people who were captured. But you may keep for yourself all the goods you have recovered.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Abram replied to the king of Sodom, “I solemnly swear to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', God Most High, Creator of heaven and earth, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'that I will not take so much as a single thread or sandal thong from what belongs to you. Otherwise you might say, ‘I am the one who made Abram rich.’ '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: I will accept only what my young warriors have already eaten, and I request that you give a fair share of the goods to my allies—Aner, Eshcol, and Mamre.”
