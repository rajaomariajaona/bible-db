        children:
        - type: text
          text: 'As in some Greek manuscripts (see also 1 Chr 11:11); the meaning of the Hebrew is uncertain, though it might be rendered '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Three. It was Adino the Eznite who killed 800 men at one time.
