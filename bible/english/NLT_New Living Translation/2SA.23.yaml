document_id: 2SA.23,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Last Words
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'These are the last words of David:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “David, the son of Jesse, speaks—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: David, the man who was raised up so high,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: David, the man anointed by the God of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: David, the sweet psalmist of Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the favorite subject of the songs of Israel; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the favorite of the Strong One of Israel.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'He killed Philistines until his hand was too tired to lift his sword, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave him a great victory that day. The rest of the army did not return until it was time to collect the plunder!'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Next in rank was Shammah son of Agee from Harar. One time the Philistines gathered at Lehi and attacked the Israelites in a field full of lentils. The Israelite army fled, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: but Shammah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he.
      marker-yv: yv-n
    - type: text
      text: ' held his ground in the middle of the field and beat back the Philistines. So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought about a great victory.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Once during the harvest, when David was at the cave of Adullam, the Philistine army was camped in the valley of Rephaim. The Three (who were among the Thirty—an elite group among David’s fighting men) went down to meet him there. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: David was staying in the stronghold at the time, and a Philistine detachment had occupied the town of Bethlehem.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'David remarked longingly to his men, “Oh, how I would love some of that good water from the well by the gate in Bethlehem.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So the Three broke through the Philistine lines, drew some water from the well by the gate in Bethlehem, and brought it back to David. But he refused to drink it. Instead, he poured it out as an offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' forbid that I should drink this!” he exclaimed. “This water is as precious as the blood of these men'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shall I drink the blood of these men?
      marker-yv: yv-n
    - type: text
      text: ' who risked their lives to bring it to me.” So David did not drink it. These are examples of the exploits of the Three.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Thirty Mighty Men
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Abishai son of Zeruiah, the brother of Joab, was the leader of the Thirty.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in a few Hebrew manuscripts and Syriac version; most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Three.
      marker-yv: yv-n
    - type: text
      text: ' He once used his spear to kill 300 enemy warriors in a single battle. It was by such feats that he became as famous as the Three. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Abishai was the most famous of the Thirty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in Syriac version; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Three.
      marker-yv: yv-n
    - type: text
      text: ' and was their commander, though he was not one of the Three.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“The Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' speaks through me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his words are upon my tongue.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: There was also Benaiah son of Jehoiada, a valiant warrior
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:20a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son of Jehoiada, son of Ish-hai.
      marker-yv: yv-n
    - type: text
      text: ' from Kabzeel. He did many heroic deeds, which included killing two champions'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:20b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: two of Ariel.
      marker-yv: yv-n
    - type: text
      text: ' of Moab. Another time, on a snowy day, he chased a lion down into a pit and killed it. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Once, armed only with a club, he killed an imposing Egyptian warrior who was armed with a spear. Benaiah wrenched the spear from the Egyptian’s hand and killed him with it. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Deeds like these made Benaiah as famous as the Three mightiest warriors. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: He was more honored than the other members of the Thirty, though he was not one of the Three. And David made him captain of his bodyguard.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Other members of the Thirty included:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Asahel, Joab’s brother;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Elhanan son of Dodo from Bethlehem;
  '25':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Shammah from Harod;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Elika from Harod;
  '26':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Helez from Pelon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 1 Chr 11:27 (see also 1 Chr 27:10); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from Palti.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ira son of Ikkesh from Tekoa;
  '27':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Abiezer from Anathoth;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Sibbecai
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts (see also 1 Chr 11:29); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mebunnai.
      marker-yv: yv-n
    - type: text
      text: ' from Hushah;'
  '28':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Zalmon from Ahoah;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Maharai from Netophah;
  '29':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Heled
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:29a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Hebrew manuscripts (see also 1 Chr 11:30); most Hebrew manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Heleb.
      marker-yv: yv-n
    - type: text
      text: ' son of Baanah from Netophah;'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ithai
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:29b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 1 Chr 11:31; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ittai.
      marker-yv: yv-n
    - type: text
      text: ' son of Ribai from Gibeah (in the land of Benjamin);'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The God of Israel spoke.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The Rock of Israel said to me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘The one who rules righteously,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who rules in the fear of God,
  '30':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Benaiah from Pirathon;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hurai
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:30a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in some Greek manuscripts (see also 1 Chr 11:32); Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hiddai.
      marker-yv: yv-n
    - type: text
      text: ' from Nahale-gaash'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:30b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from the ravines of Gaash.
      marker-yv: yv-n
    - type: text
      text: ;
  '31':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Abi-albon from Arabah;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Azmaveth from Bahurim;
  '32':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Eliahba from Shaalbon;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the sons of Jashen;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Jonathan '
  '33':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: son of Shagee
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 1 Chr 11:34; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jonathan, Shammah; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'some Greek manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jonathan son of Shammah.
      marker-yv: yv-n
    - type: text
      text: ' from Harar;'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ahiam son of Sharar from Harar;
  '34':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Eliphelet son of Ahasbai from Maacah;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eliam son of Ahithophel from Giloh;
  '35':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Hezro from Carmel;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Paarai from Arba;
  '36':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Igal son of Nathan from Zobah;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Bani from Gad;
  '37':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Zelek from Ammon;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Naharai from Beeroth, the armor bearer of Joab son of Zeruiah;
  '38':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Ira from Jattir;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Gareb from Jattir;
  '39':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Uriah the Hittite.
  - type: usfm
    marker: m
    children:
    - type: text
      text: There were thirty-seven in all.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: is like the light of morning at sunrise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a morning without clouds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like the gleaming of the sun
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on new grass after rain.’
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Is it not my family God has chosen?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, he has made an everlasting covenant with me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His agreement is arranged and guaranteed in every detail.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will ensure my safety and success.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: But the godless are like thorns to be thrown away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they tear the hand that touches them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: One must use iron tools to chop them down;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be totally consumed by fire.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Mightiest Warriors
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: These are the names of David’s mightiest warriors. The first was Jashobeam the Hacmonite,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:8a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As in parallel text at 1 Chr 11:11; Hebrew reads '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Josheb-basshebeth the Tahkemonite.
      marker-yv: yv-n
    - type: text
      text: ' who was leader of the Three'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:8b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As in Greek and Latin versions (see also 1 Chr 11:11); the meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: —the three mightiest warriors among David’s men. He once used his spear to kill 800 enemy warriors in a single battle.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
