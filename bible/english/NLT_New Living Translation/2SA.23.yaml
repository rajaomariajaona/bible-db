document_id: 2SA.23,116
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Last Words
  - type: text
    content: 'These are the last words of David:'
  - type: text
    content: “David, the son of Jesse, speaks—
  - type: text
    content: David, the man who was raised up so high,
  - type: text
    content: David, the man anointed by the God of Jacob,
  - type: text
    content: David, the sweet psalmist of Israel.
  - type: note
    content: Or the favorite subject of the songs of Israel; or the favorite of the Strong One of Israel.
  '10':
  - type: text
    content: 'He killed Philistines until his hand was too tired to lift his sword, and the '
  - type: text
    content: Lord
  - type: text
    content: ' gave him a great victory that day. The rest of the army did not return until it was time to collect the plunder!'
  '11':
  - type: text
    content: 'Next in rank was Shammah son of Agee from Harar. One time the Philistines gathered at Lehi and attacked the Israelites in a field full of lentils. The Israelite army fled, '
  '12':
  - type: text
    content: but Shammah
  - type: note
    content: Hebrew he.
  - type: text
    content: ' held his ground in the middle of the field and beat back the Philistines. So the '
  - type: text
    content: Lord
  - type: text
    content: ' brought about a great victory.'
  '13':
  - type: text
    content: 'Once during the harvest, when David was at the cave of Adullam, the Philistine army was camped in the valley of Rephaim. The Three (who were among the Thirty—an elite group among David’s fighting men) went down to meet him there. '
  '14':
  - type: text
    content: David was staying in the stronghold at the time, and a Philistine detachment had occupied the town of Bethlehem.
  '15':
  - type: text
    content: 'David remarked longingly to his men, “Oh, how I would love some of that good water from the well by the gate in Bethlehem.” '
  '16':
  - type: text
    content: 'So the Three broke through the Philistine lines, drew some water from the well by the gate in Bethlehem, and brought it back to David. But he refused to drink it. Instead, he poured it out as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '17':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' forbid that I should drink this!” he exclaimed. “This water is as precious as the blood of these men'
  - type: note
    content: Hebrew Shall I drink the blood of these men?
  - type: text
    content: ' who risked their lives to bring it to me.” So David did not drink it. These are examples of the exploits of the Three.'
  - type: heading
    content: David’s Thirty Mighty Men
  '18':
  - type: text
    content: Abishai son of Zeruiah, the brother of Joab, was the leader of the Thirty.
  - type: note
    content: As in a few Hebrew manuscripts and Syriac version; most Hebrew manuscripts read the Three.
  - type: text
    content: ' He once used his spear to kill 300 enemy warriors in a single battle. It was by such feats that he became as famous as the Three. '
  '19':
  - type: text
    content: Abishai was the most famous of the Thirty
  - type: note
    content: As in Syriac version; Hebrew reads the Three.
  - type: text
    content: ' and was their commander, though he was not one of the Three.'
  '2':
  - type: text
    content: '“The Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' speaks through me;'
  - type: text
    content: his words are upon my tongue.
  '20':
  - type: text
    content: There was also Benaiah son of Jehoiada, a valiant warrior
  - type: note
    content: Or son of Jehoiada, son of Ish-hai.
  - type: text
    content: ' from Kabzeel. He did many heroic deeds, which included killing two champions'
  - type: note
    content: Hebrew two of Ariel.
  - type: text
    content: ' of Moab. Another time, on a snowy day, he chased a lion down into a pit and killed it. '
  '21':
  - type: text
    content: 'Once, armed only with a club, he killed an imposing Egyptian warrior who was armed with a spear. Benaiah wrenched the spear from the Egyptian’s hand and killed him with it. '
  '22':
  - type: text
    content: 'Deeds like these made Benaiah as famous as the Three mightiest warriors. '
  '23':
  - type: text
    content: He was more honored than the other members of the Thirty, though he was not one of the Three. And David made him captain of his bodyguard.
  '24':
  - type: text
    content: 'Other members of the Thirty included:'
  - type: text
    content: Asahel, Joab’s brother;
  - type: text
    content: Elhanan son of Dodo from Bethlehem;
  '25':
  - type: text
    content: Shammah from Harod;
  - type: text
    content: Elika from Harod;
  '26':
  - type: text
    content: Helez from Pelon
  - type: note
    content: As in parallel text at 1 Chr 11:27 (see also 1 Chr 27:10); Hebrew reads from Palti.
  - type: text
    content: ;
  - type: text
    content: Ira son of Ikkesh from Tekoa;
  '27':
  - type: text
    content: Abiezer from Anathoth;
  - type: text
    content: Sibbecai
  - type: note
    content: As in some Greek manuscripts (see also 1 Chr 11:29); Hebrew reads Mebunnai.
  - type: text
    content: ' from Hushah;'
  '28':
  - type: text
    content: Zalmon from Ahoah;
  - type: text
    content: Maharai from Netophah;
  '29':
  - type: text
    content: Heled
  - type: note
    content: As in some Hebrew manuscripts (see also 1 Chr 11:30); most Hebrew manuscripts read Heleb.
  - type: text
    content: ' son of Baanah from Netophah;'
  - type: text
    content: Ithai
  - type: note
    content: As in parallel text at 1 Chr 11:31; Hebrew reads Ittai.
  - type: text
    content: ' son of Ribai from Gibeah (in the land of Benjamin);'
  '3':
  - type: text
    content: The God of Israel spoke.
  - type: text
    content: 'The Rock of Israel said to me:'
  - type: text
    content: ‘The one who rules righteously,
  - type: text
    content: who rules in the fear of God,
  '30':
  - type: text
    content: Benaiah from Pirathon;
  - type: text
    content: Hurai
  - type: note
    content: As in some Greek manuscripts (see also 1 Chr 11:32); Hebrew reads Hiddai.
  - type: text
    content: ' from Nahale-gaash'
  - type: note
    content: Or from the ravines of Gaash.
  - type: text
    content: ;
  '31':
  - type: text
    content: Abi-albon from Arabah;
  - type: text
    content: Azmaveth from Bahurim;
  '32':
  - type: text
    content: Eliahba from Shaalbon;
  - type: text
    content: the sons of Jashen;
  - type: text
    content: 'Jonathan '
  '33':
  - type: text
    content: son of Shagee
  - type: note
    content: As in parallel text at 1 Chr 11:34; Hebrew reads Jonathan, Shammah; some Greek manuscripts read Jonathan son of Shammah.
  - type: text
    content: ' from Harar;'
  - type: text
    content: Ahiam son of Sharar from Harar;
  '34':
  - type: text
    content: Eliphelet son of Ahasbai from Maacah;
  - type: text
    content: Eliam son of Ahithophel from Giloh;
  '35':
  - type: text
    content: Hezro from Carmel;
  - type: text
    content: Paarai from Arba;
  '36':
  - type: text
    content: Igal son of Nathan from Zobah;
  - type: text
    content: Bani from Gad;
  '37':
  - type: text
    content: Zelek from Ammon;
  - type: text
    content: Naharai from Beeroth, the armor bearer of Joab son of Zeruiah;
  '38':
  - type: text
    content: Ira from Jattir;
  - type: text
    content: Gareb from Jattir;
  '39':
  - type: text
    content: Uriah the Hittite.
  - type: text
    content: There were thirty-seven in all.
  '4':
  - type: text
    content: is like the light of morning at sunrise,
  - type: text
    content: like a morning without clouds,
  - type: text
    content: like the gleaming of the sun
  - type: text
    content: on new grass after rain.’
  '5':
  - type: text
    content: “Is it not my family God has chosen?
  - type: text
    content: Yes, he has made an everlasting covenant with me.
  - type: text
    content: His agreement is arranged and guaranteed in every detail.
  - type: text
    content: He will ensure my safety and success.
  '6':
  - type: text
    content: But the godless are like thorns to be thrown away,
  - type: text
    content: for they tear the hand that touches them.
  '7':
  - type: text
    content: One must use iron tools to chop them down;
  - type: text
    content: they will be totally consumed by fire.”
  - type: heading
    content: David’s Mightiest Warriors
  '8':
  - type: text
    content: These are the names of David’s mightiest warriors. The first was Jashobeam the Hacmonite,
  - type: note
    content: As in parallel text at 1 Chr 11:11; Hebrew reads Josheb-basshebeth the Tahkemonite.
  - type: text
    content: ' who was leader of the Three'
  - type: note
    content: As in Greek and Latin versions (see also 1 Chr 11:11); the meaning of the Hebrew is uncertain.
  - type: text
    content: —the three mightiest warriors among David’s men. He once used his spear to kill 800 enemy warriors in a single battle.
  - type: note
    content: As in some Greek manuscripts (see also 1 Chr 11:11); the meaning of the Hebrew is uncertain, though it might be rendered the Three. It was Adino the Eznite who killed 800 men at one time.
  '9':
  - type: text
    content: 'Next in rank among the Three was Eleazar son of Dodai, a descendant of Ahoah. Once Eleazar and David stood together against the Philistines when the entire Israelite army had fled. '
