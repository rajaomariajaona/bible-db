document_id: AMO.7,116
type_code: eng
verses:
  '1':
  - type: heading
    content: A Vision of Locusts
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' showed me a vision. I saw him preparing to send a vast swarm of locusts over the land. This was after the king’s share had been harvested from the fields and as the main crop was coming up. '
  '10':
  - type: text
    content: 'Then Amaziah, the priest of Bethel, sent a message to Jeroboam, king of Israel: “Amos is hatching a plot against you right here on your very doorstep! What he is saying is intolerable. '
  '11':
  - type: text
    content: He is saying, ‘Jeroboam will soon be killed, and the people of Israel will be sent away into exile.’”
  '12':
  - type: text
    content: 'Then Amaziah sent orders to Amos: “Get out of here, you prophet! Go on back to the land of Judah, and earn your living by prophesying there! '
  '13':
  - type: text
    content: Don’t bother us with your prophecies here in Bethel. This is the king’s sanctuary and the national place of worship!”
  '14':
  - type: text
    content: But Amos replied, “I’m not a professional prophet, and I was never trained to be one.
  - type: note
    content: Or I’m not a prophet nor the son of a prophet.
  - type: text
    content: ' I’m just a shepherd, and I take care of sycamore-fig trees. '
  '15':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' called me away from my flock and told me, ‘Go and prophesy to my people in Israel.’ '
  '16':
  - type: text
    content: 'Now then, listen to this message from the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “You say,
  - type: text
    content: ‘Don’t prophesy against Israel.
  - type: text
    content: Stop preaching against my people.
  - type: note
    content: Hebrew against the house of Isaac.
  - type: text
    content: ’
  '17':
  - type: text
    content: 'But this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: ‘Your wife will become a prostitute in this city,
  - type: text
    content: and your sons and daughters will be killed.
  - type: text
    content: Your land will be divided up,
  - type: text
    content: and you yourself will die in a foreign land.
  - type: text
    content: And the people of Israel will certainly become captives in exile,
  - type: text
    content: far from their homeland.’”
  '2':
  - type: text
    content: 'In my vision the locusts ate every green plant in sight. Then I said, “O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', please forgive us or we will not survive, for Israel'
  - type: note
    content: Hebrew Jacob; also in 7:5. See note on 3:13.
  - type: text
    content: ' is so small.”'
  '3':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' relented from this plan. “I will not do it,” he said.'
  - type: heading
    content: A Vision of Fire
  '4':
  - type: text
    content: 'Then the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' showed me another vision. I saw him preparing to punish his people with a great fire. The fire had burned up the depths of the sea and was devouring the entire land. '
  '5':
  - type: text
    content: 'Then I said, “O Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', please stop or we will not survive, for Israel is so small.”'
  '6':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' relented from this plan, too. “I will not do that either,” said the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: A Vision of a Plumb Line
  '7':
  - type: text
    content: 'Then he showed me another vision. I saw the Lord standing beside a wall that had been built using a plumb line. He was using a plumb line to see if it was still straight. '
  '8':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Amos, what do you see?”'
  - type: text
    content: I answered, “A plumb line.”
  - type: text
    content: 'And the Lord replied, “I will test my people with this plumb line. I will no longer ignore all their sins. '
  '9':
  - type: text
    content: The pagan shrines of your ancestors
  - type: note
    content: Hebrew of Isaac.
  - type: text
    content: ' will be ruined, and the temples of Israel will be destroyed; I will bring the dynasty of King Jeroboam to a sudden end.”'
  - type: heading
    content: Amos and Amaziah
