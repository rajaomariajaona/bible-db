document_id: JOB.40,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Job,'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: All right, put on your glory and splendor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your honor and majesty.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Give vent to your anger.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let it overflow against the proud.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Humiliate the proud with a glance;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: walk on the wicked where they stand.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Bury them in the dust.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Imprison them in the world of the dead.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then even I would praise you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your own strength would save you.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “Take a look at Behemoth,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The identification of Behemoth is disputed, ranging from an earthly creature to a mythical sea monster in ancient literature.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which I made, just as I made you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It eats grass like an ox.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: See its powerful loins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the muscles of its belly.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Its tail is as strong as a cedar.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The sinews of its thighs are knit tightly together.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Its bones are tubes of bronze.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Its limbs are bars of iron.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: It is a prime example of God’s handiwork,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and only its Creator can threaten it.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Do you still want to argue with the Almighty?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are God’s critic, but do you have the answers?”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Job Responds to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The mountains offer it their best food,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where all the wild animals play.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: It lies under the lotus plants,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'bramble bushes; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also in 40:22.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hidden by the reeds in the marsh.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The lotus plants give it shade
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among the willows beside the stream.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: It is not disturbed by the raging river,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not concerned when the swelling Jordan rushes around it.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: No one can catch it off guard
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or put a ring in its nose and lead it away.
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then Job replied to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “I am nothing—how could I ever find the answers?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will cover my mouth with my hand.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: I have said too much already.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have nothing more to say.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Challenges Job Again'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered Job from the whirlwind:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Brace yourself like a man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because I have some questions for you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you must answer them.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Will you discredit my justice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and condemn me just to prove you are right?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Are you as strong as God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can you thunder with a voice like his?
