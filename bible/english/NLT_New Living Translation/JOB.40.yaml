document_id: JOB.40,116
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Job,'
  '10':
  - type: text
    content: All right, put on your glory and splendor,
  - type: text
    content: your honor and majesty.
  '11':
  - type: text
    content: Give vent to your anger.
  - type: text
    content: Let it overflow against the proud.
  '12':
  - type: text
    content: Humiliate the proud with a glance;
  - type: text
    content: walk on the wicked where they stand.
  '13':
  - type: text
    content: Bury them in the dust.
  - type: text
    content: Imprison them in the world of the dead.
  '14':
  - type: text
    content: Then even I would praise you,
  - type: text
    content: for your own strength would save you.
  '15':
  - type: text
    content: “Take a look at Behemoth,
  - type: note
    content: The identification of Behemoth is disputed, ranging from an earthly creature to a mythical sea monster in ancient literature.
  - type: text
    content: which I made, just as I made you.
  - type: text
    content: It eats grass like an ox.
  '16':
  - type: text
    content: See its powerful loins
  - type: text
    content: and the muscles of its belly.
  '17':
  - type: text
    content: Its tail is as strong as a cedar.
  - type: text
    content: The sinews of its thighs are knit tightly together.
  '18':
  - type: text
    content: Its bones are tubes of bronze.
  - type: text
    content: Its limbs are bars of iron.
  '19':
  - type: text
    content: It is a prime example of God’s handiwork,
  - type: text
    content: and only its Creator can threaten it.
  '2':
  - type: text
    content: “Do you still want to argue with the Almighty?
  - type: text
    content: You are God’s critic, but do you have the answers?”
  - type: heading
    content: Job Responds to the Lord
  '20':
  - type: text
    content: The mountains offer it their best food,
  - type: text
    content: where all the wild animals play.
  '21':
  - type: text
    content: It lies under the lotus plants,
  - type: note
    content: Or bramble bushes; also in 40:22.
  - type: text
    content: hidden by the reeds in the marsh.
  '22':
  - type: text
    content: The lotus plants give it shade
  - type: text
    content: among the willows beside the stream.
  '23':
  - type: text
    content: It is not disturbed by the raging river,
  - type: text
    content: not concerned when the swelling Jordan rushes around it.
  '24':
  - type: text
    content: No one can catch it off guard
  - type: text
    content: or put a ring in its nose and lead it away.
  '3':
  - type: text
    content: 'Then Job replied to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  '4':
  - type: text
    content: “I am nothing—how could I ever find the answers?
  - type: text
    content: I will cover my mouth with my hand.
  '5':
  - type: text
    content: I have said too much already.
  - type: text
    content: I have nothing more to say.”
  - type: heading
    content: The Lord Challenges Job Again
  '6':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' answered Job from the whirlwind:'
  '7':
  - type: text
    content: “Brace yourself like a man,
  - type: text
    content: because I have some questions for you,
  - type: text
    content: and you must answer them.
  '8':
  - type: text
    content: “Will you discredit my justice
  - type: text
    content: and condemn me just to prove you are right?
  '9':
  - type: text
    content: Are you as strong as God?
  - type: text
    content: Can you thunder with a voice like his?
