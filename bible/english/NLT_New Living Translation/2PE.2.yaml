document_id: 2PE.2,116
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Danger of False Teachers
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'But there were also false prophets in Israel, just as there will be false teachers among you. They will cleverly teach destructive heresies and even deny the Master who bought them. In this way, they will bring sudden destruction on themselves. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He is especially hard on those who follow their own twisted sexual desire, and who despise authority.
  - type: usfm
    marker: p
    children:
    - type: text
      text: These people are proud and arrogant, daring even to scoff at supernatural beings
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'at glorious ones, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: which are probably evil angels.
      marker-yv: yv-n
    - type: text
      text: ' without so much as trembling. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But the angels, who are far greater in power and strength, do not dare to bring from the Lord
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Other manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'to the Lord; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: still others do not include this phrase at all.
      marker-yv: yv-n
    - type: text
      text: ' a charge of blasphemy against those supernatural beings.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'These false teachers are like unthinking animals, creatures of instinct, born to be caught and destroyed. They scoff at things they do not understand, and like animals, they will be destroyed. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Their destruction is their reward for the harm they have done. They love to indulge in evil pleasures in broad daylight. They are a disgrace and a stain among you. They delight in deception
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in fellowship meals.
      marker-yv: yv-n
    - type: text
      text: ' even as they eat with you in your fellowship meals. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'They commit adultery with their eyes, and their desire for sin is never satisfied. They lure unstable people into sin, and they are well trained in greed. They live under God’s curse. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: They have wandered off the right road and followed the footsteps of Balaam son of Beor,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Bosor.
      marker-yv: yv-n
    - type: text
      text: ' who loved to earn money by doing wrong. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But Balaam was stopped from his mad course when his donkey rebuked him with a human voice.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'These people are as useless as dried-up springs or as mist blown away by the wind. They are doomed to blackest darkness. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'They brag about themselves with empty, foolish boasting. With an appeal to twisted sexual desires, they lure back into sin those who have barely escaped from a lifestyle of deception. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'They promise freedom, but they themselves are slaves of sin and corruption. For you are a slave to whatever controls you. '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Many will follow their evil teaching and shameful immorality. And because of these teachers, the way of truth will be slandered. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And when people escape from the wickedness of the world by knowing our Lord and Savior Jesus Christ and then get tangled up and enslaved by sin again, they are worse off than before. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'It would be better if they had never known the way to righteousness than to know it and then reject the command they were given to live a holy life. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'They prove the truth of this proverb: “A dog returns to its vomit.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Prov 26:11.
      marker-yv: yv-n
    - type: text
      text: ' And another says, “A washed pig returns to the mud.”'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: In their greed they will make up clever lies to get hold of your money. But God condemned them long ago, and their destruction will not be delayed.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For God did not spare even the angels who sinned. He threw them into hell,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:4a '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tartarus.
      marker-yv: yv-n
    - type: text
      text: ' in gloomy pits of darkness,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:4b '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts read '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in chains of gloom.
      marker-yv: yv-n
    - type: text
      text: ' where they are being held until the day of judgment. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And God did not spare the ancient world—except for Noah and the seven others in his family. Noah warned the world of God’s righteous judgment. So God protected Noah when he destroyed the world of ungodly people with a vast flood. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Later, God condemned the cities of Sodom and Gomorrah and turned them into heaps of ashes. He made them an example of what will happen to ungodly people. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But God also rescued Lot out of Sodom because he was a righteous man who was sick of the shameful immorality of the wicked people around him. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Yes, Lot was a righteous man who was tormented in his soul by the wickedness he saw and heard day after day. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So you see, the Lord knows how to rescue godly people from their trials, even while keeping the wicked under punishment until the day of final judgment. '
